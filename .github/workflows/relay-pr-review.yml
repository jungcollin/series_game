name: Relay PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  relay-pr-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start local server
        run: |
          python3 -m http.server 4173 > /tmp/relay-http.log 2>&1 &
          echo $! > /tmp/relay-http.pid

      - name: Run relay PR review
        id: review
        run: |
          set +e
          node relay-tools/scripts/pr_review.js \
            --base-ref "origin/${{ github.base_ref }}" \
            --head-ref "HEAD" \
            --base-url "http://127.0.0.1:4173" > relay-pr-review.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          safe=$(node -p "require('./relay-pr-review.json').safeToApprove")
          echo "safe_to_approve=$safe" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload relay review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: relay-pr-review
          path: |
            relay-pr-review.json
            output/relay-tools/**
          if-no-files-found: ignore

      - name: Comment relay review summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('relay-pr-review.json', 'utf8'));
            const marker = '<!-- relay-auto-review -->';
            const lines = [
              marker,
              '## Relay Auto Review',
              '',
              `- Result: ${report.ok ? 'pass' : 'fail'}`,
              `- Safe to auto-approve: ${report.safeToApprove ? 'yes' : 'no'}`,
              report.stageSlugs?.length ? `- Stages: ${report.stageSlugs.join(', ')}` : '- Stages: none',
              report.nonStageFiles?.length ? `- Non-stage files: ${report.nonStageFiles.join(', ')}` : '- Non-stage files: none',
              report.risks?.length ? `- Risks: ${report.risks.map((item) => `${item.file} (${item.risk})`).join(', ')}` : '- Risks: none',
              '',
              '```json',
              JSON.stringify(report, null, 2),
              '```',
            ];
            const body = lines.join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Approve safe relay PR
        if: steps.review.outputs.safe_to_approve == 'true' && env.HAS_RELAY_TOKEN == 'true'
        uses: actions/github-script@v7
        env:
          HAS_RELAY_TOKEN: ${{ secrets.RELAY_REVIEW_TOKEN != '' }}
        with:
          github-token: ${{ secrets.RELAY_REVIEW_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Relay auto review passed and this PR only changes a single stage directory plus registry.',
            });

      - name: Fail when relay review fails
        if: steps.review.outputs.status != '0'
        run: |
          cat relay-pr-review.json
          exit 1
