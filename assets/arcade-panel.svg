<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 130" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Surface noise / grain texture -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="gn"/>
      <feBlend mode="multiply" in="SourceGraphic" in2="gn" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Drop shadow -->
    <filter id="ds" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="off" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Inset shadow for button wells -->
    <filter id="well" x="-5%" y="-5%" width="115%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="b"/>
      <feOffset dx="0" dy="1" result="o"/>
      <feFlood flood-color="#000" flood-opacity="0.5" result="c"/>
      <feComposite in="c" in2="o" operator="in" result="s"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode in="s"/></feMerge>
    </filter>

    <!-- Green ball top (specular highlight) -->
    <radialGradient id="ballG" cx="38%" cy="32%" r="52%" fx="35%" fy="28%">
      <stop offset="0%" stop-color="#7aff9e"/>
      <stop offset="25%" stop-color="#3de068"/>
      <stop offset="60%" stop-color="#1fb845"/>
      <stop offset="85%" stop-color="#0f8a2e"/>
      <stop offset="100%" stop-color="#065a1a"/>
    </radialGradient>

    <!-- Red button (concave 3D) -->
    <radialGradient id="btnR" cx="42%" cy="38%" r="55%" fx="38%" fy="32%">
      <stop offset="0%" stop-color="#ff7070"/>
      <stop offset="30%" stop-color="#e63838"/>
      <stop offset="65%" stop-color="#c02020"/>
      <stop offset="90%" stop-color="#8a1212"/>
      <stop offset="100%" stop-color="#601010"/>
    </radialGradient>

    <!-- White/cream button (concave 3D) -->
    <radialGradient id="btnW" cx="42%" cy="38%" r="55%" fx="38%" fy="32%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#f0ece4"/>
      <stop offset="60%" stop-color="#d8d0c4"/>
      <stop offset="90%" stop-color="#b0a898"/>
      <stop offset="100%" stop-color="#908880"/>
    </radialGradient>

    <!-- Blue button -->
    <radialGradient id="btnB" cx="42%" cy="38%" r="55%" fx="38%" fy="32%">
      <stop offset="0%" stop-color="#70a0ff"/>
      <stop offset="30%" stop-color="#3870e6"/>
      <stop offset="65%" stop-color="#2050c0"/>
      <stop offset="90%" stop-color="#12308a"/>
      <stop offset="100%" stop-color="#102060"/>
    </radialGradient>

    <!-- Button ring (plastic housing) -->
    <radialGradient id="ring" cx="50%" cy="45%" r="55%">
      <stop offset="60%" stop-color="#3a3a3a"/>
      <stop offset="80%" stop-color="#252525"/>
      <stop offset="95%" stop-color="#151515"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Joystick base plate -->
    <radialGradient id="jbase" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="50%" stop-color="#303030"/>
      <stop offset="85%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </radialGradient>

    <!-- Screw head -->
    <radialGradient id="scr" cx="38%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#bbb"/>
      <stop offset="40%" stop-color="#999"/>
      <stop offset="75%" stop-color="#666"/>
      <stop offset="100%" stop-color="#444"/>
    </radialGradient>

    <!-- Gold panel -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0be48"/>
      <stop offset="8%" stop-color="#d8b442"/>
      <stop offset="35%" stop-color="#cca438"/>
      <stop offset="65%" stop-color="#b89028"/>
      <stop offset="92%" stop-color="#a88020"/>
      <stop offset="100%" stop-color="#9a7418"/>
    </linearGradient>

    <!-- Panel edge bevel (top highlight) -->
    <linearGradient id="bevelT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d868" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c8a030" stop-opacity="0"/>
    </linearGradient>

    <!-- Speaker grill holes -->
    <pattern id="grill" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="2.2" fill="#1a1510" opacity="0.55"/>
    </pattern>
    <pattern id="grill2" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="translate(5,5)">
      <circle cx="5" cy="5" r="2.2" fill="#1a1510" opacity="0.45"/>
    </pattern>

    <!-- Joystick shaft metallic -->
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="30%" stop-color="#444"/>
      <stop offset="50%" stop-color="#555"/>
      <stop offset="70%" stop-color="#444"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- === GOLD CONTROL PANEL === -->
  <rect x="0" y="0" width="600" height="82" fill="url(#gold)" filter="url(#grain)"/>
  <!-- Top bevel highlight -->
  <rect x="0" y="0" width="600" height="4" fill="url(#bevelT)"/>
  <!-- Bottom edge shadow -->
  <line x1="0" y1="81" x2="600" y2="81" stroke="#8a6c18" stroke-width="1" opacity="0.5"/>

  <!-- === DARK FRONT PANEL === -->
  <rect x="0" y="82" width="600" height="48" fill="#161412"/>
  <rect x="0" y="82" width="600" height="2" fill="#2a2420" opacity="0.8"/>
  <!-- Subtle front panel gradient -->
  <rect x="0" y="84" width="600" height="46" fill="url(#gold)" opacity="0.03"/>

  <!-- ===============================
       JOYSTICK 1 (Player 1)
       =============================== -->
  <g filter="url(#ds)">
    <!-- Base plate -->
    <rect x="72" y="24" width="52" height="50" rx="4" fill="url(#jbase)" stroke="#111" stroke-width="1"/>
    <!-- Base plate inner ring -->
    <circle cx="98" cy="46" r="16" fill="none" stroke="#444" stroke-width="0.5" opacity="0.4"/>
    <!-- Shaft -->
    <rect x="93" y="20" width="10" height="24" rx="2" fill="url(#shaft)"/>
    <!-- Ball top -->
    <circle cx="98" cy="18" r="13" fill="url(#ballG)" stroke="#0a6a1e" stroke-width="0.5"/>
    <!-- Specular highlight (sharp) -->
    <ellipse cx="93" cy="12" rx="5.5" ry="3.5" fill="white" opacity="0.5"/>
    <!-- Secondary highlight -->
    <ellipse cx="96" cy="15" rx="3" ry="1.5" fill="white" opacity="0.15"/>
    <!-- Base screws -->
    <g>
      <circle cx="78" cy="30" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="76.5" y1="30" x2="79.5" y2="30" stroke="#555" stroke-width="0.5"/>
      <line x1="78" y1="28.5" x2="78" y2="31.5" stroke="#555" stroke-width="0.5"/>
    </g>
    <g>
      <circle cx="118" cy="30" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="116.5" y1="30" x2="119.5" y2="30" stroke="#555" stroke-width="0.5"/>
      <line x1="118" y1="28.5" x2="118" y2="31.5" stroke="#555" stroke-width="0.5"/>
    </g>
    <g>
      <circle cx="78" cy="62" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="76.5" y1="62" x2="79.5" y2="62" stroke="#555" stroke-width="0.5"/>
      <line x1="78" y1="60.5" x2="78" y2="63.5" stroke="#555" stroke-width="0.5"/>
    </g>
    <g>
      <circle cx="118" cy="62" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="116.5" y1="62" x2="119.5" y2="62" stroke="#555" stroke-width="0.5"/>
      <line x1="118" y1="60.5" x2="118" y2="63.5" stroke="#555" stroke-width="0.5"/>
    </g>
  </g>

  <!-- ===============================
       JOYSTICK 2 (Player 2)
       =============================== -->
  <g filter="url(#ds)">
    <rect x="152" y="24" width="52" height="50" rx="4" fill="url(#jbase)" stroke="#111" stroke-width="1"/>
    <circle cx="178" cy="46" r="16" fill="none" stroke="#444" stroke-width="0.5" opacity="0.4"/>
    <rect x="173" y="20" width="10" height="24" rx="2" fill="url(#shaft)"/>
    <circle cx="178" cy="18" r="13" fill="url(#ballG)" stroke="#0a6a1e" stroke-width="0.5"/>
    <ellipse cx="173" cy="12" rx="5.5" ry="3.5" fill="white" opacity="0.5"/>
    <ellipse cx="176" cy="15" rx="3" ry="1.5" fill="white" opacity="0.15"/>
    <g>
      <circle cx="158" cy="30" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="156.5" y1="30" x2="159.5" y2="30" stroke="#555" stroke-width="0.5"/>
      <line x1="158" y1="28.5" x2="158" y2="31.5" stroke="#555" stroke-width="0.5"/>
    </g>
    <g>
      <circle cx="198" cy="30" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="196.5" y1="30" x2="199.5" y2="30" stroke="#555" stroke-width="0.5"/>
      <line x1="198" y1="28.5" x2="198" y2="31.5" stroke="#555" stroke-width="0.5"/>
    </g>
    <g>
      <circle cx="158" cy="62" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="156.5" y1="62" x2="159.5" y2="62" stroke="#555" stroke-width="0.5"/>
      <line x1="158" y1="60.5" x2="158" y2="63.5" stroke="#555" stroke-width="0.5"/>
    </g>
    <g>
      <circle cx="198" cy="62" r="3" fill="url(#scr)" stroke="#333" stroke-width="0.3"/>
      <line x1="196.5" y1="62" x2="199.5" y2="62" stroke="#555" stroke-width="0.5"/>
      <line x1="198" y1="60.5" x2="198" y2="63.5" stroke="#555" stroke-width="0.5"/>
    </g>
  </g>

  <!-- ===============================
       BUTTON ROW 1 (top arc)
       =============================== -->
  <!-- Button 1: Red -->
  <g filter="url(#ds)">
    <circle cx="290" cy="30" r="15" fill="url(#ring)"/>
    <circle cx="290" cy="29" r="11.5" fill="url(#btnR)" filter="url(#well)"/>
    <ellipse cx="286" cy="24" rx="4.5" ry="2.5" fill="white" opacity="0.18"/>
  </g>
  <!-- Button 2: Red -->
  <g filter="url(#ds)">
    <circle cx="332" cy="28" r="15" fill="url(#ring)"/>
    <circle cx="332" cy="27" r="11.5" fill="url(#btnR)" filter="url(#well)"/>
    <ellipse cx="328" cy="22" rx="4.5" ry="2.5" fill="white" opacity="0.18"/>
  </g>
  <!-- Button 3: Blue -->
  <g filter="url(#ds)">
    <circle cx="374" cy="30" r="15" fill="url(#ring)"/>
    <circle cx="374" cy="29" r="11.5" fill="url(#btnB)" filter="url(#well)"/>
    <ellipse cx="370" cy="24" rx="4.5" ry="2.5" fill="white" opacity="0.2"/>
  </g>

  <!-- ===============================
       BUTTON ROW 2 (bottom arc, offset)
       =============================== -->
  <!-- Button 4: Red -->
  <g filter="url(#ds)">
    <circle cx="308" cy="60" r="15" fill="url(#ring)"/>
    <circle cx="308" cy="59" r="11.5" fill="url(#btnR)" filter="url(#well)"/>
    <ellipse cx="304" cy="54" rx="4.5" ry="2.5" fill="white" opacity="0.18"/>
  </g>
  <!-- Button 5: White -->
  <g filter="url(#ds)">
    <circle cx="350" cy="58" r="15" fill="url(#ring)"/>
    <circle cx="350" cy="57" r="11.5" fill="url(#btnW)" filter="url(#well)"/>
    <ellipse cx="346" cy="52" rx="4.5" ry="2.5" fill="white" opacity="0.2"/>
  </g>
  <!-- Button 6: Blue -->
  <g filter="url(#ds)">
    <circle cx="392" cy="60" r="15" fill="url(#ring)"/>
    <circle cx="392" cy="59" r="11.5" fill="url(#btnB)" filter="url(#well)"/>
    <ellipse cx="388" cy="54" rx="4.5" ry="2.5" fill="white" opacity="0.2"/>
  </g>

  <!-- ===============================
       SPEAKER GRILL
       =============================== -->
  <g>
    <rect x="458" y="14" width="120" height="54" rx="6" fill="#3a3218" stroke="#2a2418" stroke-width="1.5"/>
    <rect x="460" y="16" width="116" height="50" rx="5" fill="url(#grill)"/>
    <rect x="460" y="16" width="116" height="50" rx="5" fill="url(#grill2)"/>
    <!-- Grill frame inner highlight -->
    <rect x="460" y="16" width="116" height="1" rx="0.5" fill="#c8a830" opacity="0.15"/>
  </g>

  <!-- ===============================
       PANEL CORNER SCREWS (hex bolts)
       =============================== -->
  <g>
    <circle cx="16" cy="12" r="4" fill="url(#scr)" stroke="#444" stroke-width="0.5"/>
    <line x1="14" y1="12" x2="18" y2="12" stroke="#777" stroke-width="0.6"/>
    <line x1="16" y1="10" x2="16" y2="14" stroke="#777" stroke-width="0.6"/>
  </g>
  <g>
    <circle cx="584" cy="12" r="4" fill="url(#scr)" stroke="#444" stroke-width="0.5"/>
    <line x1="582" y1="12" x2="586" y2="12" stroke="#777" stroke-width="0.6"/>
    <line x1="584" y1="10" x2="584" y2="14" stroke="#777" stroke-width="0.6"/>
  </g>
  <g>
    <circle cx="16" cy="70" r="4" fill="url(#scr)" stroke="#444" stroke-width="0.5"/>
    <line x1="14" y1="70" x2="18" y2="70" stroke="#777" stroke-width="0.6"/>
    <line x1="16" y1="68" x2="16" y2="72" stroke="#777" stroke-width="0.6"/>
  </g>
  <g>
    <circle cx="584" cy="70" r="4" fill="url(#scr)" stroke="#444" stroke-width="0.5"/>
    <line x1="582" y1="70" x2="586" y2="70" stroke="#777" stroke-width="0.6"/>
    <line x1="584" y1="68" x2="584" y2="72" stroke="#777" stroke-width="0.6"/>
  </g>

  <!-- === T-MOLDING (edge strip) === -->
  <rect x="0" y="80" width="600" height="2.5" rx="1" fill="#e8c040" opacity="0.3"/>
</svg>
