<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>조개 줍기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #F5E6C8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 140, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(50, 80, 100, 0.92);
        color: #F5E6C8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F5E6C8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(14, 116, 144, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">조개 줍기. 화면 터치로 이동, 조개 위에서 탭으로 수집. 조개 15개를 수집하면 클리어. 파도에 3번 휩쓸리면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="조개 줍기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = 960, H = 540, CX = W/2, CY = H/2;
      const FIXED_DT = 1/60, MAX_DT = 1/20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id:"tidal-shells", title:"조개 줍기",
        description:"밀려오는 파도 사이에서 조개를 줍는 게임",
        creator:"jungcollin", genre:"Tide collection",
        clearCondition:"조개 15개를 수집하면 클리어",
        failCondition:"파도에 3번 휩쓸리면 실패",
        controls:"화면 터치로 이동, 조개 위에서 탭으로 수집",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id)||{history:[],clearCount:0,previousStageId:null};
      window.relayStageMeta = {id:META.id,title:META.title,description:META.description,creator:META.creator,genre:META.genre,clearCondition:META.clearCondition,failCondition:META.failCondition,controls:META.controls};
      window.relayStageResult = {status:"running"};

      const COL = {
        sand:"#F5E6C8", sandWet:"#D4C4A0", sky:"#87CEEB",
        ocean:"#0E7490", oceanLight:"rgba(14,116,144,0.4)",
        wave:"#1E90C0", waveWhite:"rgba(255,255,255,0.6)",
        shell:"#FFB7C5", shellDark:"#E8889A",
        player:"#D2691E", playerDark:"#8B4513",
        text:"#2A4A5A", red:"#DC2626", gold:"#F59E0B",
      };

      const TARGET = 15, MAX_HITS = 3, DURATION = 40;
      const BEACH_TOP = 120; // sky/ocean border
      const SAFE_Y = 460; // safe zone at bottom

      let mode="menu", elapsed=0, lastTimestamp=0, animFrame=0;
      let hostFailedReported=false, hostClearedReported=false;
      let collected=0, hits=0;
      let shake=0, flashA=0, clearAnim=0;
      let particles=[];

      // Tide system
      let tidePhase = 0; // 0-1 cycle
      let tideSpeed = 0.12; // cycles per second
      let tideY = 0; // current water line Y position

      // Player
      let player = {x: CX, y: SAFE_Y - 20, tx: CX, ty: SAFE_Y - 20};

      // Shells
      let shells = [];
      const SHELL_SHAPES = ["spiral","clam","starfish"];

      // Wave foam particles
      let foamPs = [];

      function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
      function lerp(a,b,t){return a+(b-a)*t;}
      function rand(lo,hi){return lo+Math.random()*(hi-lo);}
      function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1);}

      function inRelayHost(){try{return window.parent&&window.parent!==window&&window.parent.RelayHost;}catch{return false;}}
      function reportReady(){if(inRelayHost())window.parent.RelayHost.onStageReady?.(window.relayStageMeta);}
      function reportFailed(reason){if(!inRelayHost()||hostFailedReported)return;hostFailedReported=true;window.parent.RelayHost.onStageFailed?.({stageId:META.id,stageTitle:META.title,reason,durationSec:+elapsed.toFixed(1)});}
      function reportCleared(){if(!inRelayHost()||hostClearedReported)return;hostClearedReported=true;window.parent.RelayHost.onStageCleared?.({stageId:META.id,stageTitle:META.title,clearCountAfter:relayContext.clearCount+1,durationSec:+elapsed.toFixed(1)});}

      function spawnP(x,y,n,col,sr){for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(40,120);particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:1,color:col,size:rand(sr[0],sr[1])});}}

      function spawnShells(){
        shells=[];
        for(let i=0;i<8;i++){
          shells.push({
            x: rand(60, W-60),
            y: rand(BEACH_TOP+60, SAFE_Y-40),
            shape: SHELL_SHAPES[Math.floor(rand(0,3))],
            size: rand(10,16),
            rot: rand(0, Math.PI*2),
            collected: false,
            bobPhase: rand(0, Math.PI*2),
          });
        }
      }

      function refillShells(){
        // Add shells in exposed sand area
        const needed = Math.max(0, 5 - shells.filter(s=>!s.collected).length);
        for(let i=0;i<needed;i++){
          shells.push({
            x: rand(60, W-60),
            y: rand(Math.max(BEACH_TOP+60, tideY+40), SAFE_Y-40),
            shape: SHELL_SHAPES[Math.floor(rand(0,3))],
            size: rand(10,16),
            rot: rand(0, Math.PI*2),
            collected: false,
            bobPhase: rand(0, Math.PI*2),
          });
        }
      }

      function reset(){
        elapsed=0;collected=0;hits=0;shake=0;flashA=0;clearAnim=0;
        particles=[];foamPs=[];tidePhase=0;
        player={x:CX,y:SAFE_Y-20,tx:CX,ty:SAFE_Y-20};
        hostFailedReported=false;hostClearedReported=false;
        window.relayStageResult.status="running";
        spawnShells();
      }

      function getTideY(){
        // Sinusoidal tide: goes up (dangerous) and back down (safe)
        // Range: BEACH_TOP+40 (highest) to SAFE_Y-20 (lowest, exposing most sand)
        const t = Math.sin(tidePhase * Math.PI * 2);
        return lerp(SAFE_Y-60, BEACH_TOP+80, (t+1)/2);
      }

      function update(dt){
        if(mode!=="running"&&mode!=="clear")return;
        if(mode==="clear"){clearAnim=clamp(clearAnim+dt*1.5,0,1);updP(dt);return;}
        elapsed+=dt;

        // Tide
        tidePhase += tideSpeed * dt;
        tideY = getTideY();
        tideSpeed = lerp(0.12, 0.18, elapsed/DURATION); // gets faster

        // Player movement (lerp to target)
        player.x = lerp(player.x, player.tx, clamp(8*dt,0,1));
        player.y = lerp(player.y, player.ty, clamp(8*dt,0,1));
        player.x = clamp(player.x, 20, W-20);
        player.y = clamp(player.y, BEACH_TOP+20, SAFE_Y);

        // Check if player is in water
        if(player.y < tideY){
          hits++;
          shake=8; flashA=0.35;
          spawnP(player.x, player.y, reducedMotion?3:8, COL.wave, [3,6]);
          // Push player back to safe zone
          player.ty = SAFE_Y - 20;
          player.y = SAFE_Y - 20;
          if(hits>=MAX_HITS){
            mode="failed";window.relayStageResult.status="failed";reportFailed("파도에 휩쓸림");
            return;
          }
        }

        // Shell collection: auto-collect when close
        for(const s of shells){
          if(s.collected) continue;
          if(s.y < tideY) continue; // underwater, can't collect
          if(dist(player.x, player.y, s.x, s.y) < 30){
            s.collected = true;
            collected++;
            spawnP(s.x, s.y, reducedMotion?3:8, COL.shell, [2,5]);
            if(collected>=TARGET){
              mode="clear";clearAnim=0;
              window.relayStageResult.status="cleared";reportCleared();
              spawnP(player.x, player.y, reducedMotion?6:20, COL.gold, [3,8]);
              return;
            }
          }
        }

        // Refill shells periodically
        if(Math.floor(elapsed*2)%3===0) refillShells();

        // Foam
        if(!reducedMotion && Math.random()<0.3){
          foamPs.push({x:rand(0,W), y:tideY+rand(-8,8), life:1, size:rand(2,5)});
        }
        for(let i=foamPs.length-1;i>=0;i--){foamPs[i].life-=dt*1.5;if(foamPs[i].life<=0)foamPs.splice(i,1);}

        shake*=0.88;if(shake<0.3)shake=0;flashA*=0.92;
        updP(dt);

        if(elapsed>=DURATION){mode="failed";window.relayStageResult.status="failed";reportFailed("시간 초과");}
      }

      function updP(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;p.life-=dt*2.5;if(p.life<=0)particles.splice(i,1);}}

      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0,sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);

        // Sky gradient
        const skyG = ctx.createLinearGradient(0,0,0,BEACH_TOP);
        skyG.addColorStop(0,"#87CEEB");skyG.addColorStop(1,"#B0E0F0");
        ctx.fillStyle=skyG;ctx.fillRect(0,0,W,BEACH_TOP);

        // Sun
        ctx.beginPath();ctx.arc(W-80,50,30,0,Math.PI*2);
        ctx.fillStyle="#FFE066";ctx.fill();

        // Sand
        const sandG = ctx.createLinearGradient(0,BEACH_TOP,0,H);
        sandG.addColorStop(0,"#E8D5B0");sandG.addColorStop(1,"#F5E6C8");
        ctx.fillStyle=sandG;ctx.fillRect(0,BEACH_TOP,W,H-BEACH_TOP);

        // Wet sand zone
        if(mode==="running"||mode==="clear"||mode==="failed"){
          ctx.fillStyle=COL.sandWet;
          ctx.fillRect(0,BEACH_TOP,W,Math.max(0,tideY-BEACH_TOP));
        }

        // Ocean water
        if(mode==="running"||mode==="clear"||mode==="failed"){
          const waveG = ctx.createLinearGradient(0,BEACH_TOP,0,tideY+20);
          waveG.addColorStop(0,COL.ocean);waveG.addColorStop(0.7,"rgba(14,116,144,0.7)");waveG.addColorStop(1,"rgba(14,116,144,0.1)");
          ctx.fillStyle=waveG;ctx.fillRect(0,BEACH_TOP,W,tideY-BEACH_TOP+20);

          // Wave edge
          ctx.strokeStyle=COL.waveWhite;ctx.lineWidth=2;
          ctx.beginPath();
          for(let x=0;x<=W;x+=4){
            const wy = tideY + Math.sin(x*0.03+elapsed*3)*4;
            x===0?ctx.moveTo(x,wy):ctx.lineTo(x,wy);
          }
          ctx.stroke();

          // Foam
          for(const f of foamPs){
            ctx.beginPath();ctx.arc(f.x,f.y,f.size*f.life,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${f.life*0.5})`;ctx.fill();
          }

          // Shells
          for(const s of shells){
            if(s.collected) continue;
            const underwater = s.y < tideY;
            ctx.globalAlpha = underwater ? 0.3 : 1;
            drawShell(s);
            ctx.globalAlpha = 1;
          }

          // Player
          drawPlayer();

          // Safe zone line
          ctx.setLineDash([6,4]);
          ctx.strokeStyle="rgba(42,74,90,0.2)";ctx.lineWidth=1;
          ctx.beginPath();ctx.moveTo(0,SAFE_Y);ctx.lineTo(W,SAFE_Y);ctx.stroke();
          ctx.setLineDash([]);

          // Tide warning
          if(tideY > SAFE_Y - 100){
            ctx.fillStyle=`rgba(220,38,38,${0.3+Math.sin(elapsed*8)*0.2})`;
            ctx.font="bold 16px 'Segoe UI',sans-serif";ctx.textAlign="center";
            ctx.fillText("파도 주의!",CX,BEACH_TOP+30);
          }

          if(mode==="running") drawHUD();
        }

        drawParts();
        if(flashA>0.01){ctx.fillStyle=`rgba(14,116,144,${flashA})`;ctx.fillRect(0,0,W,H);}
        ctx.restore();

        if(mode==="menu") drawMenu();
        else if(mode==="clear") drawClearScreen();
        else if(mode==="failed") drawFailedScreen();
      }

      function drawShell(s){
        ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.rot);
        if(s.shape==="spiral"){
          ctx.beginPath();ctx.arc(0,0,s.size,0,Math.PI*2);
          ctx.fillStyle=COL.shell;ctx.fill();
          ctx.beginPath();ctx.arc(2,2,s.size*0.5,0,Math.PI*1.5);
          ctx.strokeStyle=COL.shellDark;ctx.lineWidth=1.5;ctx.stroke();
        }else if(s.shape==="clam"){
          ctx.beginPath();ctx.ellipse(0,0,s.size,s.size*0.7,0,0,Math.PI*2);
          ctx.fillStyle="#FFD4B2";ctx.fill();
          for(let i=0;i<5;i++){
            ctx.beginPath();ctx.moveTo(0,0);
            ctx.lineTo(Math.cos(i*Math.PI/4-Math.PI/2)*s.size, Math.sin(i*Math.PI/4-Math.PI/2)*s.size*0.7);
            ctx.strokeStyle="rgba(200,150,100,0.4)";ctx.lineWidth=1;ctx.stroke();
          }
        }else{
          // Starfish
          for(let i=0;i<5;i++){
            const a=i*Math.PI*2/5-Math.PI/2;
            ctx.beginPath();ctx.moveTo(0,0);
            ctx.lineTo(Math.cos(a)*s.size,Math.sin(a)*s.size);
            ctx.strokeStyle="#FF9999";ctx.lineWidth=3;ctx.lineCap="round";ctx.stroke();
          }
          ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fillStyle="#FF9999";ctx.fill();
        }
        ctx.restore();
      }

      function drawPlayer(){
        const bob = Math.sin(elapsed*4)*2;
        ctx.save();ctx.translate(player.x,player.y+bob);
        // Body
        ctx.beginPath();ctx.arc(0,-4,12,0,Math.PI*2);
        ctx.fillStyle=COL.player;ctx.fill();
        // Bucket
        ctx.fillStyle=COL.playerDark;
        ctx.fillRect(-8,4,16,10);
        ctx.fillStyle=COL.sand;ctx.fillRect(-6,6,12,6);
        // Eyes
        ctx.fillStyle="#fff";
        ctx.fillRect(-5,-7,4,3);ctx.fillRect(1,-7,4,3);
        ctx.fillStyle="#333";
        ctx.fillRect(-4,-6,2,2);ctx.fillRect(2,-6,2,2);
        ctx.restore();
      }

      function drawHUD(){
        ctx.fillStyle=COL.text;ctx.font="600 15px 'Segoe UI',sans-serif";
        ctx.textAlign="left";ctx.textBaseline="top";
        ctx.fillText(`조개: ${collected}/${TARGET}`,24,10);
        ctx.textAlign="right";
        ctx.fillText(`${Math.ceil(Math.max(0,DURATION-elapsed))}초`,W-24,10);
        // Lives
        for(let i=0;i<MAX_HITS;i++){
          ctx.beginPath();ctx.arc(30+i*22,H-20,6,0,Math.PI*2);
          ctx.fillStyle=i<MAX_HITS-hits?COL.shell:"rgba(42,74,90,0.15)";ctx.fill();
        }
      }

      function drawParts(){for(const p of particles){ctx.beginPath();ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=clamp(p.life,0,1);ctx.fill();ctx.globalAlpha=1;}}

      function rr(c2,x,y,w,h,r){c2.beginPath();c2.moveTo(x+r,y);c2.lineTo(x+w-r,y);c2.arcTo(x+w,y,x+w,y+r,r);c2.lineTo(x+w,y+h-r);c2.arcTo(x+w,y+h,x+w-r,y+h,r);c2.lineTo(x+r,y+h);c2.arcTo(x,y+h,x,y+h-r,r);c2.lineTo(x,y+r);c2.arcTo(x,y,x+r,y,r);c2.closePath();}

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40),ch=44+lines.length*28+40,cx2=CX-cw/2,cy2=CY-ch/2;
        ctx.fillStyle="rgba(245,230,200,0.96)";ctx.beginPath();rr(ctx,cx2,cy2,cw,ch,10);ctx.fill();
        ctx.fillStyle=accent;ctx.fillRect(cx2+14,cy2,cw-28,3);
        ctx.fillStyle=COL.text;ctx.font="bold 24px 'Segoe UI',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(title,CX,cy2+18);
        ctx.font="400 14px 'Segoe UI',sans-serif";ctx.fillStyle="rgba(42,74,90,0.7)";
        for(let i=0;i<lines.length;i++)ctx.fillText(lines[i],CX,cy2+52+i*28);
        ctx.fillStyle="rgba(42,74,90,0.35)";ctx.font="400 12px 'Segoe UI',sans-serif";
        ctx.fillText("TAP or ENTER",CX,cy2+ch-20);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(245,230,200,0.5)";ctx.fillRect(0,0,W,H);
        drawCard("조개 줍기",["밀려오는 파도 사이에서","조개를 주워 모으세요","","조작: 화면 터치로 이동","클리어: 조개 15개 수집","실패: 파도에 3번 휩쓸리면 게임 오버"],COL.ocean);
      }

      function drawClearScreen(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(245,230,200,${clearAnim*0.5})`;ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3)drawCard("수집 완료!",[`${Math.ceil(elapsed)}초 만에 완료`,"바구니가 조개로 가득!"],COL.gold);
      }

      function drawFailedScreen(){
        ctx.fillStyle="rgba(40,60,70,0.25)";ctx.fillRect(0,0,W,H);
        drawCard("수집 실패",[elapsed>=DURATION?"시간이 다했습니다":"파도에 휩쓸렸습니다",`조개: ${collected}/${TARGET}`],COL.red);
      }

      function handleStart(){if(mode==="menu"||mode==="clear"||mode==="failed"){reset();mode="running";}}

      function getCanvasPos(cx,cy){const r=canvas.getBoundingClientRect();return{x:(cx-r.left)*(W/r.width),y:(cy-r.top)*(H/r.height)};}

      canvas.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if(mode!=="running"){handleStart();return;}
        const p=getCanvasPos(e.clientX,e.clientY);
        player.tx=p.x;player.ty=p.y;
      });
      canvas.addEventListener("pointermove",(e)=>{
        if(mode!=="running")return;
        if(e.pressure>0){const p=getCanvasPos(e.clientX,e.clientY);player.tx=p.x;player.ty=p.y;}
      });
      canvas.addEventListener("keydown",(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();handleStart();}});

      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){lastTimestamp=ts;return;}
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT);lastTimestamp=ts;
        let steps=0;while(dt>=FIXED_DT&&steps<4){update(FIXED_DT);dt-=FIXED_DT;steps++;}
        if(dt>0&&steps<4)update(dt);draw();
      }

      function renderGameToText(){return JSON.stringify({mode,elapsed:+elapsed.toFixed(1),collected,hits,tideY:+tideY.toFixed(0),result:window.relayStageResult.status});}

      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{const s=Math.max(1,Math.round(ms/(FIXED_DT*1000)));for(let i=0;i<s;i++)update(FIXED_DT);draw();return renderGameToText();};
      window.relayStageDebug={
        forceClear(){reset();mode="running";collected=TARGET;mode="clear";clearAnim=0;window.relayStageResult.status="cleared";reportCleared();draw();},
        forceFail(){reset();mode="running";hits=MAX_HITS;mode="failed";window.relayStageResult.status="failed";reportFailed("debug_force_fail");draw();},
      };

      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
