<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusk Subway: Gravity Fold</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #110f24;
        --bg-night: #221a46;
        --ink: #f8f1ff;
        --accent-cyan: #6df7ff;
        --accent-amber: #ffbf66;
        --accent-rose: #ff6e9d;
        --accent-violet: #a88cff;
        --panel: rgba(12, 10, 28, 0.76);
        --panel-border: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 160, 88, 0.22), transparent 38%),
          radial-gradient(circle at 20% 30%, rgba(109, 247, 255, 0.14), transparent 24%),
          linear-gradient(180deg, #34245b 0%, #1a1732 42%, #090914 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas,
      button {
        -webkit-tap-highlight-color: rgba(109, 247, 255, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 30;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.94);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      #shell {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #game {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      #game:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.92);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 14px;
        z-index: 20;
        display: flex;
        justify-content: center;
        padding: 0 14px calc(14px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 10px;
        width: min(100%, 360px);
        justify-content: center;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 22px;
        min-width: 70px;
        min-height: 62px;
        padding: 0 16px;
        background:
          linear-gradient(180deg, rgba(31, 27, 58, 0.95), rgba(11, 9, 23, 0.95));
        color: var(--ink);
        font: 800 22px "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        box-shadow:
          0 14px 32px rgba(5, 4, 18, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        touch-action: none;
      }

      .mobile-btn--fold {
        min-width: 92px;
        color: #10101f;
        background:
          linear-gradient(180deg, rgba(255, 206, 120, 0.98), rgba(255, 135, 93, 0.98));
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        border-color: rgba(109, 247, 255, 0.6);
        box-shadow:
          0 14px 32px rgba(5, 4, 18, 0.42),
          0 0 0 1px rgba(109, 247, 255, 0.18),
          0 0 22px rgba(109, 247, 255, 0.22);
      }

      .mobile-btn--fold[data-active="true"] {
        border-color: rgba(255, 243, 203, 0.7);
        box-shadow:
          0 14px 32px rgba(5, 4, 18, 0.42),
          0 0 0 1px rgba(255, 196, 128, 0.24),
          0 0 24px rgba(255, 165, 122, 0.36);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 10px;
          padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          min-width: 62px;
          min-height: 56px;
          padding: 0 12px;
          border-radius: 18px;
          font-size: 18px;
        }

        .mobile-btn--fold {
          min-width: 82px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dusk Subway: Gravity Fold. 터치 또는 Enter로 시작하세요. 좌우 이동으로 지하철을 가로지르고,
      클릭 또는 터치로 중력 폴드를 시도하세요. 길게 누르면 코어를 안정화합니다. 모바일에서는 화면
      터치, 드래그, 하단 버튼으로 플레이할 수 있습니다.
    </p>
    <div id="shell">
      <canvas id="game" width="960" height="540" aria-label="Dusk Subway: Gravity Fold" aria-describedby="stage-instructions" tabindex="0"></canvas>
      <div class="mobile-controls" aria-label="모바일 조작">
        <div class="mobile-controls__row">
          <button class="mobile-btn" type="button" data-control="left" data-active="false" aria-label="왼쪽으로 이동">◀</button>
          <button class="mobile-btn mobile-btn--fold" type="button" data-control="fold" data-active="false" aria-label="중력 폴드">폴드</button>
          <button class="mobile-btn" type="button" data-control="right" data-active="false" aria-label="오른쪽으로 이동">▶</button>
        </div>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "dusk-subway-gravity-folding-tempo";
      const STAGE_TITLE = "Dusk Subway: Gravity Fold";
      const STAGE_CREATOR = "jungcollin";
      const STAGE_GENRE = "Gravity courier / 템포 윈도우";
      const STAGE_DESCRIPTION = "황혼 지하철에서 박자에 맞춰 중력 폴드를 성공시키고 코어를 슬롯까지 배달하세요.";
      const STAGE_CLEAR = "템포 창을 놓치지 않고 코어를 균열 없이 슬롯까지 운반";
      const STAGE_FAIL = "박자 밖 입력 누적 또는 충격 게이지가 가득 차면 실패";
      const STAGE_CONTROLS = "좌우 이동, 클릭·터치로 중력 축 전환, 길게 눌러 안정화, 모바일 터치·드래그 지원";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const MOTION_REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const TRACK_LEFT = 92;
      const TRACK_RIGHT = 850;
      const SLOT_X = 862;
      const SLOT_LANE = -1;
      const PLAYER_WIDTH = 46;
      const PLAYER_HEIGHT = 78;
      const FLOOR_Y = 404;
      const CEILING_Y = 142;
      const CORE_RADIUS = 13;
      const CORE_TETHER = 30;
      const FOLD_DURATION = 0.28;
      const BASE_BEAT_INTERVAL = 0.96;
      const TAP_THRESHOLD = 0.23;
      const HOLD_THRESHOLD = 0.28;
      const DRAG_THRESHOLD = 18;
      const MAX_OFFBEAT_STREAK = 3;
      const SHOCK_LIMIT = 100;
      const GATE_HALF_WIDTH = 22;
      const GATE_GLOW = 54;

      const GATE_LAYOUT = [
        { x: 280, blockedLane: 1, label: "A1" },
        { x: 500, blockedLane: -1, label: "A2" },
        { x: 710, blockedLane: 1, label: "A3" },
      ];

      const input = {
        left: false,
        right: false,
        stabilizeKey: false,
        dragActive: false,
        dragX: null,
      };

      const pointerState = {
        active: false,
        pointerId: null,
        startX: 0,
        startY: 0,
        x: 0,
        y: 0,
        duration: 0,
        moved: false,
        longHold: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeInOut(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function approach(current, target, delta) {
        if (current < target) {
          return Math.min(target, current + delta);
        }
        return Math.max(target, current - delta);
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function getLaneY(laneSign) {
        return laneSign === 1 ? FLOOR_Y : CEILING_Y;
      }

      function getProgress() {
        return clamp((state.player.x - TRACK_LEFT) / (SLOT_X - TRACK_LEFT), 0, 1);
      }

      function getBeatInterval() {
        return BASE_BEAT_INTERVAL - getProgress() * 0.12;
      }

      function getBeatDistanceSeconds() {
        const interval = getBeatInterval();
        const phase = state.elapsed % interval;
        return Math.min(phase, interval - phase);
      }

      function getBeatWindow() {
        return lerp(0.16, 0.09, getProgress());
      }

      function getCurrentLaneBlend() {
        if (state.player.foldTimer <= 0) {
          return 1;
        }
        return easeInOut(1 - state.player.foldTimer / FOLD_DURATION);
      }

      function getCurrentCarrierLane() {
        if (state.player.foldTimer <= 0) {
          return state.player.lane;
        }
        return getCurrentLaneBlend() < 0.5 ? state.player.laneFrom : state.player.lane;
      }

      function getCarrierY() {
        if (state.player.foldTimer <= 0) {
          return getLaneY(state.player.lane);
        }
        const t = getCurrentLaneBlend();
        return lerp(getLaneY(state.player.laneFrom), getLaneY(state.player.lane), t);
      }

      function getCorePosition() {
        const anchorX = state.player.x + PLAYER_WIDTH * 0.5;
        const carrierY = getCarrierY();
        const verticalSign = state.player.lane;
        return {
          x: anchorX + state.core.offsetX,
          y: carrierY + verticalSign * CORE_TETHER,
          anchorX,
          anchorY: carrierY,
        };
      }

      function createPlayer() {
        return {
          x: TRACK_LEFT,
          vx: 0,
          lane: 1,
          laneFrom: 1,
          foldTimer: 0,
          squash: 0,
          glow: 0,
        };
      }

      function createCore() {
        return {
          offsetX: 0,
          vx: 0,
        };
      }

      function createGateStates() {
        return GATE_LAYOUT.map((gate) => ({
          x: gate.x,
          blockedLane: gate.blockedLane,
          label: gate.label,
          passed: false,
          hitCooldown: 0,
          pulse: 0,
        }));
      }

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        resultReason: "",
        shock: 0,
        offbeatStreak: 0,
        player: createPlayer(),
        core: createCore(),
        gates: createGateStates(),
        particles: [],
        popups: [],
        skylineOffset: 0,
        tunnelOffset: 0,
        joltTimer: 2.1,
        flash: 0,
        shake: 0,
        beatGlow: 0,
        successGlow: 0,
        ambientPulse: 0,
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetEffects() {
        state.particles = [];
        state.popups = [];
        state.flash = 0;
        state.shake = 0;
        state.beatGlow = 0;
        state.successGlow = 0;
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.resultReason = "";
        state.shock = 0;
        state.offbeatStreak = 0;
        state.player = createPlayer();
        state.core = createCore();
        state.gates = createGateStates();
        state.skylineOffset = 0;
        state.tunnelOffset = 0;
        state.joltTimer = 2.1;
        state.ambientPulse = 0;
        resetEffects();
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function spawnParticles(x, y, color, count, speedScale = 1, spread = Math.PI * 2) {
        const total = MOTION_REDUCED ? Math.min(10, Math.ceil(count * 0.45)) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = rand(-spread * 0.5, spread * 0.5) + (spread === Math.PI * 2 ? 0 : -Math.PI * 0.5);
          const speed = rand(40, 190) * speedScale;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.24, 0.7),
            maxLife: 1,
            size: rand(2, 7),
            color,
          });
        }
      }

      function addPopup(text, color, x, y, scale = 1) {
        state.popups.push({
          text,
          color,
          x,
          y,
          life: 0.9,
          scale,
        });
      }

      function markGatePassed(gate) {
        gate.passed = true;
        gate.pulse = 1;
        addPopup(`${gate.label} CLEAR`, "#6df7ff", gate.x, 104, 0.88);
        spawnParticles(gate.x, getLaneY(-gate.blockedLane), "rgba(109, 247, 255, 0.88)", 16, 0.9, Math.PI);
      }

      function failStage(reason = "failed") {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.resultReason = reason;
        window.relayStageResult.status = "failed";
        state.flash = 0.45;
        state.shake = 18;
        const core = getCorePosition();
        spawnParticles(core.x, core.y, "rgba(255, 110, 157, 0.95)", 26, 1.18);
        addPopup(reason === "offbeat" ? "OUT OF WINDOW" : "CORE FRACTURE", "#ff6e9d", core.x, core.y - 24, 1.08);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.resultReason = "cleared";
        window.relayStageResult.status = "cleared";
        state.successGlow = 1;
        state.flash = 0.3;
        state.shake = 10;
        const slotY = getLaneY(SLOT_LANE);
        spawnParticles(SLOT_X, slotY, "rgba(255, 203, 128, 0.95)", 36, 1.2);
        addPopup("DELIVERY LOCKED", "#ffcf79", SLOT_X, slotY - 34, 1.06);
        reportClearedToHost();
      }

      function addShock(amount, reason) {
        state.shock = clamp(state.shock + amount, 0, SHOCK_LIMIT);
        state.flash = Math.max(state.flash, 0.12 + amount / 180);
        state.shake = Math.max(state.shake, 4 + amount * 0.25);
        const core = getCorePosition();
        spawnParticles(core.x, core.y, "rgba(255, 153, 164, 0.8)", 10 + Math.round(amount * 0.25), 0.85);
        if (reason === "impact") {
          addPopup("IMPACT", "#ffbf66", core.x, core.y - 26, 0.82);
        } else if (reason === "offbeat") {
          addPopup("OFF BEAT", "#ff6e9d", core.x, core.y - 32, 0.96);
        } else if (reason === "swing") {
          addPopup("CORE SWAY", "#ffd98f", core.x, core.y - 28, 0.8);
        }
        if (state.shock >= SHOCK_LIMIT) {
          failStage("impact");
        }
      }

      function attemptFold(source = "tap") {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
          return;
        }
        if (state.mode !== "running" || state.player.foldTimer > 0.04) {
          return;
        }

        const beatDistance = getBeatDistanceSeconds();
        const beatWindow = getBeatWindow();
        const coreSwing = Math.abs(state.core.offsetX);
        const core = getCorePosition();

        if (beatDistance <= beatWindow) {
          state.player.laneFrom = getCurrentCarrierLane();
          state.player.lane = -state.player.laneFrom;
          state.player.foldTimer = FOLD_DURATION;
          state.player.squash = 1;
          state.player.glow = 1;
          state.beatGlow = 1;
          state.successGlow = Math.max(state.successGlow, 0.55);
          state.offbeatStreak = 0;
          state.core.vx *= input.stabilizeKey || pointerState.longHold ? 0.28 : 0.52;
          state.player.vx += source === "button" ? 12 : 18;

          const precision = beatDistance < beatWindow * 0.42 ? "PERFECT FOLD" : "SYNC FOLD";
          const popupColor = precision === "PERFECT FOLD" ? "#6df7ff" : "#ffd98f";
          addPopup(precision, popupColor, core.x, core.y - 42, precision === "PERFECT FOLD" ? 1.02 : 0.9);
          spawnParticles(core.x, core.y, "rgba(109, 247, 255, 0.92)", precision === "PERFECT FOLD" ? 26 : 18, 1.08);

          const safeSwing = (input.stabilizeKey || pointerState.longHold) ? 22 : 14;
          if (coreSwing > safeSwing) {
            addShock((coreSwing - safeSwing) * 0.48, "swing");
          } else {
            state.shock = clamp(state.shock - 5, 0, SHOCK_LIMIT);
          }
          return;
        }

        state.offbeatStreak += 1;
        addShock(12 + state.offbeatStreak * 7, "offbeat");
        state.player.glow = 0.35;
        if (state.offbeatStreak >= MAX_OFFBEAT_STREAK) {
          failStage("offbeat");
        }
      }

      function getDesiredVelocity() {
        const stabilize = input.stabilizeKey || pointerState.longHold;
        const maxSpeed = stabilize ? 165 : 258;
        if (input.dragActive && Number.isFinite(input.dragX)) {
          const targetCenter = clamp(input.dragX, TRACK_LEFT + PLAYER_WIDTH * 0.5, TRACK_RIGHT - PLAYER_WIDTH * 0.5);
          const delta = targetCenter - (state.player.x + PLAYER_WIDTH * 0.5);
          return clamp(delta * 5.5, -maxSpeed, maxSpeed);
        }
        const moveAxis = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        return moveAxis * maxSpeed;
      }

      function triggerJolt() {
        const progress = getProgress();
        state.joltTimer = lerp(2.25, 1.05, progress) + rand(-0.12, 0.22);
        state.core.vx += rand(-84, 84) * (0.6 + progress * 0.4);
        state.shake = Math.max(state.shake, 2 + progress * 5);
        spawnParticles(rand(90, 870), rand(130, 440), "rgba(255, 211, 150, 0.4)", 9, 0.72, Math.PI);
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 26 * dt;
          particle.size *= 0.992;
          return particle.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= 18 * dt;
          return popup.life > 0;
        });
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.ambientPulse += dt;

        pointerState.duration = pointerState.active ? pointerState.duration + dt : 0;
        pointerState.longHold = pointerState.active && !pointerState.moved && pointerState.duration >= HOLD_THRESHOLD;

        const desiredVelocity = getDesiredVelocity();
        const accelerate = (input.stabilizeKey || pointerState.longHold) ? 540 : 820;
        state.player.vx = approach(state.player.vx, desiredVelocity, accelerate * dt);
        state.player.x += state.player.vx * dt;
        state.player.x = clamp(state.player.x, TRACK_LEFT, TRACK_RIGHT - PLAYER_WIDTH);

        if (state.player.foldTimer > 0) {
          state.player.foldTimer = Math.max(0, state.player.foldTimer - dt);
        }

        state.player.squash = Math.max(0, state.player.squash - dt * 3.8);
        state.player.glow = Math.max(0, state.player.glow - dt * 2.4);

        state.joltTimer -= dt;
        if (state.joltTimer <= 0) {
          triggerJolt();
        }

        const stabilize = input.stabilizeKey || pointerState.longHold;
        const spring = stabilize ? 14 : 8;
        const damping = stabilize ? 10 : 4.7;
        const swayNoise = Math.sin(state.elapsed * (3.1 + getProgress() * 1.4)) * (stabilize ? 6 : 12);
        state.core.vx += (-state.player.vx * 0.1 - state.core.offsetX * spring + swayNoise - state.core.vx * damping) * dt;
        state.core.offsetX += state.core.vx * dt;
        state.core.offsetX = clamp(state.core.offsetX, -48, 48);

        state.flash = Math.max(0, state.flash - dt * 1.8);
        state.shake = Math.max(0, state.shake - dt * 24);
        state.beatGlow = Math.max(0, state.beatGlow - dt * 2.8);
        state.successGlow = Math.max(0, state.successGlow - dt * 1.45);
        state.skylineOffset = (state.skylineOffset + dt * (24 + getProgress() * 70)) % 280;
        state.tunnelOffset = (state.tunnelOffset + dt * (110 + getProgress() * 80)) % 240;

        const carrierLane = getCurrentCarrierLane();
        const playerCenterX = state.player.x + PLAYER_WIDTH * 0.5;

        state.gates.forEach((gate) => {
          gate.hitCooldown = Math.max(0, gate.hitCooldown - dt);
          gate.pulse = Math.max(0, gate.pulse - dt * 2);
          if (!gate.passed && playerCenterX > gate.x + 30 && carrierLane !== gate.blockedLane) {
            markGatePassed(gate);
          }

          if (
            !gate.passed &&
            gate.hitCooldown <= 0 &&
            carrierLane === gate.blockedLane &&
            state.player.foldTimer <= 0.05 &&
            Math.abs(playerCenterX - gate.x) < GATE_HALF_WIDTH + PLAYER_WIDTH * 0.5 - 4
          ) {
            gate.hitCooldown = 0.28;
            state.player.x = gate.x - GATE_HALF_WIDTH - PLAYER_WIDTH * 0.5 - PLAYER_WIDTH * 0.5;
            state.player.x = clamp(state.player.x, TRACK_LEFT, TRACK_RIGHT - PLAYER_WIDTH);
            state.player.vx = Math.min(state.player.vx, -42);
            addShock(11 + getProgress() * 15, "impact");
          }
        });

        const slotReady =
          state.player.foldTimer <= 0.04 &&
          playerCenterX > SLOT_X - 30 &&
          carrierLane === SLOT_LANE &&
          state.gates.every((gate) => gate.passed);
        if (slotReady) {
          clearStage();
        }
      }

      function update(dt) {
        updateParticles(dt);
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          state.flash = Math.max(0, state.flash - dt * 1.3);
          state.shake = Math.max(0, state.shake - dt * 14);
          state.successGlow = Math.max(0, state.successGlow - dt * 1.1);
          state.skylineOffset = (state.skylineOffset + dt * 14) % 280;
          state.tunnelOffset = (state.tunnelOffset + dt * 54) % 240;
          state.ambientPulse += dt;
        }
      }

      function stepFrame(dt) {
        const limitedDt = Math.min(MAX_DT, dt);
        update(limitedDt);
      }

      function drawSkyline(windowX, windowY, width, height) {
        const base = -state.skylineOffset;
        for (let index = 0; index < 9; index += 1) {
          const x = base + index * 150;
          const towerHeight = 40 + (index % 4) * 26;
          const towerWidth = 48 + (index % 3) * 18;
          const y = windowY + height - towerHeight - 10;
          const hue = index % 2 === 0 ? "rgba(21, 31, 68, 0.95)" : "rgba(31, 46, 84, 0.95)";
          ctx.fillStyle = hue;
          ctx.fillRect(windowX + x, y, towerWidth, towerHeight);
          for (let row = 0; row < 4; row += 1) {
            for (let col = 0; col < 3; col += 1) {
              if ((row + col + index) % 2 !== 0) {
                continue;
              }
              ctx.fillStyle = "rgba(255, 207, 137, 0.7)";
              ctx.fillRect(windowX + x + 8 + col * 10, y + 8 + row * 10, 4, 5);
            }
          }
        }
      }

      function drawBackground() {
        const ambient = (Math.sin(state.ambientPulse * 1.6) + 1) * 0.5;
        ctx.fillStyle = "#090913";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#4b315e");
        sky.addColorStop(0.38, "#5a365a");
        sky.addColorStop(0.75, "#1a1834");
        sky.addColorStop(1, "#0a0b12");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = `rgba(255, 164, 101, ${0.12 + ambient * 0.08})`;
        ctx.beginPath();
        ctx.ellipse(520, 88, 280, 80, 0, 0, Math.PI * 2);
        ctx.fill();

        const windowGradient = ctx.createLinearGradient(0, 80, 0, 260);
        windowGradient.addColorStop(0, "rgba(255, 178, 124, 0.35)");
        windowGradient.addColorStop(0.48, "rgba(71, 120, 190, 0.2)");
        windowGradient.addColorStop(1, "rgba(8, 10, 22, 0.45)");

        for (let index = 0; index < 4; index += 1) {
          const wx = 68 + index * 208;
          ctx.fillStyle = "rgba(219, 237, 255, 0.12)";
          ctx.fillRect(wx, 72, 170, 134);
          ctx.fillStyle = windowGradient;
          ctx.fillRect(wx + 8, 80, 154, 118);
          drawSkyline(wx + 8, 80, 154, 118);
          ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
          ctx.lineWidth = 2;
          ctx.strokeRect(wx + 8, 80, 154, 118);
          ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
          ctx.fillRect(wx + 18, 90, 42, 96);
        }

        ctx.fillStyle = "rgba(7, 8, 15, 0.58)";
        ctx.fillRect(0, 212, VIEW.width, 138);

        for (let index = 0; index < 5; index += 1) {
          const poleX = 40 + index * 210 - (state.tunnelOffset % 20) * 0.05;
          ctx.fillStyle = "rgba(225, 237, 255, 0.1)";
          ctx.fillRect(poleX, 40, 12, 440);
          ctx.fillStyle = "rgba(255, 255, 255, 0.07)";
          ctx.fillRect(poleX + 2, 40, 2, 440);
        }

        const railGradient = ctx.createLinearGradient(0, 120, VIEW.width, 450);
        railGradient.addColorStop(0, "rgba(25, 23, 48, 0.96)");
        railGradient.addColorStop(0.5, "rgba(16, 14, 32, 0.98)");
        railGradient.addColorStop(1, "rgba(31, 24, 54, 0.96)");
        ctx.fillStyle = railGradient;
        ctx.fillRect(34, 102, 892, 344);

        ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
        ctx.fillRect(48, 116, 864, 34);
        ctx.fillRect(48, 390, 864, 42);

        const laneGlowTop = ctx.createLinearGradient(0, 0, VIEW.width, 0);
        laneGlowTop.addColorStop(0, "rgba(109, 247, 255, 0)");
        laneGlowTop.addColorStop(0.5, "rgba(109, 247, 255, 0.18)");
        laneGlowTop.addColorStop(1, "rgba(109, 247, 255, 0)");
        ctx.strokeStyle = laneGlowTop;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(80, CEILING_Y + 32);
        ctx.lineTo(880, CEILING_Y + 32);
        ctx.stroke();

        const laneGlowBottom = ctx.createLinearGradient(0, 0, VIEW.width, 0);
        laneGlowBottom.addColorStop(0, "rgba(255, 191, 102, 0)");
        laneGlowBottom.addColorStop(0.5, "rgba(255, 191, 102, 0.22)");
        laneGlowBottom.addColorStop(1, "rgba(255, 191, 102, 0)");
        ctx.strokeStyle = laneGlowBottom;
        ctx.beginPath();
        ctx.moveTo(80, FLOOR_Y + 30);
        ctx.lineTo(880, FLOOR_Y + 30);
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 255, 255, 0.02)";
        ctx.fillRect(40, 430, 880, 70);

        const floorGradient = ctx.createLinearGradient(0, 360, 0, VIEW.height);
        floorGradient.addColorStop(0, "rgba(43, 30, 48, 0)");
        floorGradient.addColorStop(1, "rgba(7, 8, 18, 0.95)");
        ctx.fillStyle = floorGradient;
        ctx.fillRect(0, 320, VIEW.width, VIEW.height - 320);
      }

      function drawGate(gate) {
        const glow = gate.passed ? gate.pulse * 0.65 : 0.16 + state.beatGlow * 0.22;
        const blockedY = getLaneY(gate.blockedLane);
        const safeY = getLaneY(-gate.blockedLane);

        ctx.save();
        ctx.translate(gate.x, 0);

        const beamGradient = ctx.createLinearGradient(0, blockedY - 82, 0, blockedY + 82);
        beamGradient.addColorStop(0, "rgba(255, 110, 157, 0)");
        beamGradient.addColorStop(0.5, gate.passed ? "rgba(109, 247, 255, 0.18)" : "rgba(255, 110, 157, 0.52)");
        beamGradient.addColorStop(1, "rgba(255, 110, 157, 0)");
        ctx.fillStyle = beamGradient;
        ctx.fillRect(-GATE_GLOW, blockedY - 82, GATE_GLOW * 2, 164);

        if (!gate.passed) {
          ctx.fillStyle = "rgba(255, 110, 157, 0.88)";
          ctx.fillRect(-GATE_HALF_WIDTH, blockedY - 64, GATE_HALF_WIDTH * 2, 128);
          ctx.fillStyle = "rgba(255, 203, 128, 0.72)";
          ctx.fillRect(-6, blockedY - 64, 12, 128);
        }

        ctx.strokeStyle = `rgba(109, 247, 255, ${0.2 + glow})`;
        ctx.lineWidth = 3;
        ctx.strokeRect(-30, safeY - 42, 60, 84);

        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        ctx.font = "700 12px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(gate.label, 0, 58);
        ctx.restore();
      }

      function drawSlot() {
        const laneY = getLaneY(SLOT_LANE);
        const beatScale = 1 + (1 - getBeatDistanceSeconds() / getBeatInterval()) * 0.12;
        ctx.save();
        ctx.translate(SLOT_X, laneY);
        ctx.scale(beatScale, beatScale);

        const glowGradient = ctx.createRadialGradient(0, 0, 14, 0, 0, 52);
        glowGradient.addColorStop(0, "rgba(255, 211, 136, 0.7)");
        glowGradient.addColorStop(0.6, "rgba(255, 191, 102, 0.18)");
        glowGradient.addColorStop(1, "rgba(255, 191, 102, 0)");
        ctx.fillStyle = glowGradient;
        ctx.beginPath();
        ctx.arc(0, 0, 54, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(18, 15, 38, 0.95)";
        ctx.beginPath();
        ctx.roundRect(-26, -44, 52, 88, 18);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 211, 136, 0.9)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(-18, -28, 36, 56, 14);
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 233, 196, 0.88)";
        ctx.fillRect(-4, -16, 8, 32);
        ctx.restore();
      }

      function drawCourier() {
        const carrierY = getCarrierY();
        const bodySquash = 1 - state.player.squash * 0.12;
        const bodyStretch = 1 + state.player.squash * 0.08;
        const glow = state.player.glow * 0.7 + state.successGlow * 0.22;
        const bodyX = state.player.x + PLAYER_WIDTH * 0.5;
        const bodyY = carrierY;

        ctx.save();
        ctx.translate(bodyX, bodyY);
        ctx.scale(bodyStretch, bodySquash);

        const shadowGradient = ctx.createRadialGradient(0, 0, 12, 0, 0, 56);
        shadowGradient.addColorStop(0, `rgba(109, 247, 255, ${0.36 + glow * 0.22})`);
        shadowGradient.addColorStop(1, "rgba(109, 247, 255, 0)");
        ctx.fillStyle = shadowGradient;
        ctx.beginPath();
        ctx.arc(0, 0, 56, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(10, 14, 28, 0.98)";
        ctx.beginPath();
        ctx.roundRect(-22, -34, 44, 68, 18);
        ctx.fill();

        const suitGradient = ctx.createLinearGradient(0, -34, 0, 34);
        suitGradient.addColorStop(0, "#d7f5ff");
        suitGradient.addColorStop(0.25, "#84e7ff");
        suitGradient.addColorStop(0.72, "#2b7db6");
        suitGradient.addColorStop(1, "#123053");
        ctx.fillStyle = suitGradient;
        ctx.beginPath();
        ctx.roundRect(-18, -28, 36, 56, 16);
        ctx.fill();

        ctx.fillStyle = "#08101f";
        ctx.beginPath();
        ctx.arc(0, -18, 9, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f8f1ff";
        ctx.beginPath();
        ctx.arc(-3, -20, 1.8, 0, Math.PI * 2);
        ctx.arc(3, -20, 1.8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255, 186, 114, 0.92)";
        ctx.beginPath();
        ctx.roundRect(-12, 8, 24, 10, 5);
        ctx.fill();

        ctx.restore();
      }

      function drawCore() {
        const core = getCorePosition();
        const crackRatio = state.shock / SHOCK_LIMIT;
        const glowRadius = 34 + state.successGlow * 22;

        ctx.save();
        ctx.translate(core.x, core.y);

        ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(core.anchorX - core.x, core.anchorY - core.y);
        ctx.lineTo(0, 0);
        ctx.stroke();

        const halo = ctx.createRadialGradient(0, 0, 8, 0, 0, glowRadius);
        halo.addColorStop(0, `rgba(255, 220, 153, ${0.72 - crackRatio * 0.24})`);
        halo.addColorStop(0.55, `rgba(168, 140, 255, ${0.3 + state.beatGlow * 0.2})`);
        halo.addColorStop(1, "rgba(168, 140, 255, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
        ctx.fill();

        const shell = ctx.createRadialGradient(-4, -6, 4, 0, 0, CORE_RADIUS + 3);
        shell.addColorStop(0, "#fff6d9");
        shell.addColorStop(0.3, "#ffe1a3");
        shell.addColorStop(0.55, "#bda6ff");
        shell.addColorStop(1, "#5d4ba6");
        ctx.fillStyle = shell;
        ctx.beginPath();
        ctx.arc(0, 0, CORE_RADIUS + 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 248, 232, 0.8)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, CORE_RADIUS + 2, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255, 92, 138, ${0.16 + crackRatio * 0.78})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(-2, -3);
        ctx.lineTo(6 + crackRatio * 4, -8 - crackRatio * 3);
        ctx.lineTo(2, 2 + crackRatio * 8);
        ctx.lineTo(10 + crackRatio * 6, 8);
        ctx.stroke();

        ctx.restore();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = particle.color.replace(/[\d.]+\)$/u, `${alpha})`);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, Math.max(0.8, particle.size * alpha), 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawPopups() {
        state.popups.forEach((popup) => {
          const alpha = clamp(popup.life / 0.9, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(popup.x, popup.y);
          ctx.scale(popup.scale + (1 - alpha) * 0.1, popup.scale + (1 - alpha) * 0.1);
          ctx.textAlign = "center";
          ctx.font = "800 16px Trebuchet MS";
          ctx.fillStyle = "rgba(10, 10, 20, 0.6)";
          ctx.fillText(popup.text, 2, 2);
          ctx.fillStyle = popup.color;
          ctx.fillText(popup.text, 0, 0);
          ctx.restore();
        });
      }

      function drawBeatDial() {
        const beatDistance = getBeatDistanceSeconds();
        const beatInterval = getBeatInterval();
        const beatWindow = getBeatWindow();
        const normalized = 1 - beatDistance / (beatInterval * 0.5);

        ctx.save();
        ctx.translate(846, 82);
        ctx.fillStyle = "rgba(11, 12, 26, 0.78)";
        ctx.beginPath();
        ctx.roundRect(-82, -42, 96, 96, 28);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 6, 28, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
        ctx.lineWidth = 6;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 6, 28, -Math.PI / 2, -Math.PI / 2 + normalized * Math.PI * 2);
        ctx.strokeStyle = beatDistance <= beatWindow ? "#6df7ff" : "#ffbf66";
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 6, lerp(18, 30, normalized), 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(109, 247, 255, ${0.15 + normalized * 0.22 + state.beatGlow * 0.18})`;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "#f8f1ff";
        ctx.textAlign = "left";
        ctx.font = "800 11px Trebuchet MS";
        ctx.fillText("TEMPO", -74, -14);
        ctx.fillStyle = beatDistance <= beatWindow ? "#6df7ff" : "#ffdba0";
        ctx.font = "800 13px Trebuchet MS";
        ctx.fillText(beatDistance <= beatWindow ? "SYNC" : "WAIT", -74, 6);
        ctx.fillStyle = "rgba(248, 241, 255, 0.72)";
        ctx.font = "700 11px Trebuchet MS";
        ctx.fillText(`창 ${beatWindow.toFixed(2)}s`, -74, 24);
        ctx.restore();
      }

      function drawShockPanel() {

        ctx.fillStyle = shockGradient;
        ctx.beginPath();
        ctx.roundRect(38, 72, 270 * (state.shock / SHOCK_LIMIT), 12, 999);
        ctx.fill();

        ctx.fillStyle = "rgba(248, 241, 255, 0.72)";
        ctx.font = "700 12px Trebuchet MS";
        ctx.fillText(`슬롯 접근 ${Math.round(progress * 100)}%`, 38, 101);
        ctx.restore();
      }

      function drawProgressRail() {
        const progress = getProgress();
        ctx.save();
        ctx.fillStyle = "rgba(11, 12, 26, 0.7)";
        ctx.beginPath();
        ctx.roundRect(340, 22, 380, 18, 999);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const progressGradient = ctx.createLinearGradient(340, 0, 720, 0);
        progressGradient.addColorStop(0, "#ffbf66");
        progressGradient.addColorStop(0.5, "#ffd98f");
        progressGradient.addColorStop(1, "#6df7ff");
        ctx.fillStyle = progressGradient;
        ctx.beginPath();
        ctx.roundRect(340, 22, 380 * progress, 18, 999);
        ctx.fill();

        state.gates.forEach((gate) => {
          const marker = 340 + ((gate.x - TRACK_LEFT) / (SLOT_X - TRACK_LEFT)) * 380;
          ctx.fillStyle = gate.passed ? "#6df7ff" : "#ff6e9d";
          ctx.beginPath();
          ctx.arc(marker, 31, gate.passed ? 5 : 4, 0, Math.PI * 2);
          ctx.fill();
        });

        const slotMarker = 340 + ((SLOT_X - TRACK_LEFT) / (SLOT_X - TRACK_LEFT)) * 380;
        ctx.fillStyle = "#ffedc2";
        ctx.fillRect(slotMarker - 2, 18, 4, 26);
        ctx.restore();
      }

      function drawOverlayCard(title, subtitle, lines, accent) {
        const width = 396;
        const height = lines.length > 4 ? 248 : 228;
        const x = VIEW.width * 0.5 - width * 0.5;
        const y = VIEW.height * 0.5 - height * 0.5;

        ctx.save();
        ctx.fillStyle = "rgba(8, 8, 18, 0.58)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const panel = ctx.createLinearGradient(x, y, x, y + height);
        panel.addColorStop(0, "rgba(21, 19, 42, 0.94)");
        panel.addColorStop(1, "rgba(10, 9, 20, 0.94)");
        ctx.fillStyle = panel;
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, 30);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.fillRect(x + 24, y + 24, 48, 5);
        ctx.fillStyle = "#f8f1ff";
        ctx.font = "800 33px Trebuchet MS";
        ctx.fillText(title, x + 24, y + 72);
        ctx.fillStyle = "rgba(248, 241, 255, 0.78)";
        ctx.font = "700 16px Trebuchet MS";
        ctx.fillText(subtitle, x + 24, y + 100);

        lines.forEach((line, index) => {
          ctx.fillStyle = line.highlight ? accent : "rgba(248, 241, 255, 0.88)";
          ctx.fillText(line.text, x + 24, y + 138 + index * 24);

            ],

          );

        }

        const failedByBeat = state.resultReason === "offbeat";
        drawOverlayCard(
          "Delivery Lost",
          failedByBeat ? "핵심 입력이 템포 창에서 연속으로 벗어났습니다." : "코어 충격 게이지가 한계를 넘겼습니다.",
          [
            { text: failedByBeat ? "폴드는 SYNC / PERFECT 표시일 때만 강하게 먹힙니다." : "게이트에 비비거나 흔들린 채 폴드하면 충격이 크게 쌓입니다.", highlight: true },
            { text: "짧은 대기 후 박자를 확인하고, 긴 누르기로 먼저 흔들림을 죽이세요.", highlight: false },
            { text: `기록 ${state.lastRunTime.toFixed(1)}초`, highlight: false },
          ],
          "#ff6e9d"
        );
      }

      function drawScene() {
        ctx.save();
        if (state.shake > 0 && !MOTION_REDUCED) {
          ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));
        }

        drawBackground();
        state.gates.forEach(drawGate);
        drawSlot();
        drawCourier();
        drawCore();
        drawParticles();
        ctx.restore();

        drawShockPanel();
        drawProgressRail();
        drawBeatDial();
        drawPopups();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawResultOverlay();
        }

        if (state.flash > 0) {
          ctx.fillStyle = state.mode === "failed"
            ? `rgba(255, 110, 157, ${state.flash * 0.28})`
            : `rgba(255, 211, 136, ${state.flash * 0.22})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        stepFrame(delta);
        drawScene();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function resizePointer(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function releasePointer() {
        pointerState.active = false;
        pointerState.pointerId = null;
        pointerState.moved = false;
        pointerState.longHold = false;
        pointerState.duration = 0;
        input.dragActive = false;
        input.dragX = null;
      }

      function beginRunFromInput() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
          return true;
        }
        return false;
      }

      canvas.addEventListener("pointerdown", (event) => {
        const point = resizePointer(event);
        canvas.focus({ preventScroll: true });
        const startedNow = beginRunFromInput();
        if (startedNow || state.mode !== "running") {
          return;
        }
        pointerState.active = true;
        pointerState.pointerId = event.pointerId;
        pointerState.startX = point.x;
        pointerState.startY = point.y;
        pointerState.x = point.x;
        pointerState.y = point.y;
        pointerState.duration = 0;
        pointerState.moved = false;
        pointerState.longHold = false;
        input.dragActive = false;
        input.dragX = null;
        canvas.setPointerCapture?.(event.pointerId);
        event.preventDefault();
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!pointerState.active || pointerState.pointerId !== event.pointerId || state.mode !== "running") {
          return;
        }
        const point = resizePointer(event);
        pointerState.x = point.x;
        pointerState.y = point.y;
        if (Math.abs(point.x - pointerState.startX) > DRAG_THRESHOLD || Math.abs(point.y - pointerState.startY) > DRAG_THRESHOLD) {
          pointerState.moved = true;
          input.dragActive = true;
          input.dragX = point.x;
        }
        event.preventDefault();
      });

      function endPointerInteraction(event) {
        if (!pointerState.active || (event && pointerState.pointerId !== event.pointerId)) {
          return;
        }
        const tapped = !pointerState.moved && pointerState.duration < TAP_THRESHOLD && state.mode === "running";
        if (tapped) {
          attemptFold("tap");
        }
        releasePointer();
        if (event) {
          canvas.releasePointerCapture?.(event.pointerId);
          event.preventDefault();
        }
      }

      canvas.addEventListener("pointerup", endPointerInteraction);
      canvas.addEventListener("pointercancel", endPointerInteraction);
      canvas.addEventListener("pointerleave", (event) => {
        if (!pointerState.active || pointerState.pointerId !== event.pointerId) {
          return;
        }
        if (input.dragActive) {
          releasePointer();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.repeat && (event.code === "Space" || event.code === "ShiftLeft" || event.code === "ShiftRight")) {
          return;
        }
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = true;
          event.preventDefault();
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = true;
          event.preventDefault();
        } else if (event.code === "Space") {
          if (state.mode === "running") {
            attemptFold("key");
          } else {
            resetRun();
          }
          event.preventDefault();
        } else if (event.code === "ShiftLeft" || event.code === "ShiftRight") {
          input.stabilizeKey = true;
          event.preventDefault();
        } else if (event.code === "Enter") {
          beginRunFromInput();
          event.preventDefault();
        } else if (event.code === "KeyF") {
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.().catch(() => {});
          } else {
            document.exitFullscreen?.().catch(() => {});
          }
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = false;
          event.preventDefault();
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = false;
          event.preventDefault();
        } else if (event.code === "ShiftLeft" || event.code === "ShiftRight") {
          input.stabilizeKey = false;
          event.preventDefault();
        }
      });

      function bindMoveButton(button, key) {
        if (!button) {
          return;
        }

        const activate = (event) => {
          const startedNow = beginRunFromInput();
          if (startedNow) {
            button.dataset.active = "false";
            event.preventDefault();
            return;
          }
          input[key] = true;
          button.dataset.active = "true";
          event.preventDefault();
        };

        const deactivate = (event) => {
          input[key] = false;
          button.dataset.active = "false";
          if (event) {
            event.preventDefault();
          }
        };

        button.addEventListener("pointerdown", activate);
        button.addEventListener("pointerup", deactivate);
        button.addEventListener("pointercancel", deactivate);
        button.addEventListener("pointerleave", deactivate);
      }

      function bindFoldButton(button) {
        if (!button) {
          return;
        }
        const deactivate = () => {
          button.dataset.active = "false";
        };

        button.addEventListener("pointerdown", (event) => {
          const startedNow = beginRunFromInput();
          button.dataset.active = "true";
          if (!startedNow && state.mode === "running") {
            attemptFold("button");
          }
          event.preventDefault();
        });

        button.addEventListener("pointerup", deactivate);
        button.addEventListener("pointercancel", deactivate);
        button.addEventListener("pointerleave", deactivate);
      }

      bindMoveButton(document.querySelector('[data-control="left"]'), "left");
      bindMoveButton(document.querySelector('[data-control="right"]'), "right");
      bindFoldButton(document.querySelector('[data-control="fold"]'));

      window.render_game_to_text = function renderGameToText() {
        const core = getCorePosition();
        const playerCenterX = state.player.x + PLAYER_WIDTH * 0.5;
        return JSON.stringify({
          coordinateSystem: "origin top-left, x right, y down",
          mode: state.mode,
          elapsed: Number(state.elapsed.toFixed(2)),
          player: {
            x: Number(playerCenterX.toFixed(1)),
            y: Number(getCarrierY().toFixed(1)),
            lane: getCurrentCarrierLane() === 1 ? "floor" : "ceiling",
            vx: Number(state.player.vx.toFixed(1)),
          },
          core: {
            x: Number(core.x.toFixed(1)),
            y: Number(core.y.toFixed(1)),
            shock: Number(state.shock.toFixed(1)),
            swing: Number(state.core.offsetX.toFixed(1)),
          },
          beat: {
            distanceSec: Number(getBeatDistanceSeconds().toFixed(3)),
            windowSec: Number(getBeatWindow().toFixed(3)),
            offbeatStreak: state.offbeatStreak,
          },
          slot: {
            x: SLOT_X,
            lane: SLOT_LANE === 1 ? "floor" : "ceiling",
            ready: state.gates.every((gate) => gate.passed),
          },
          gates: state.gates.map((gate) => ({
            label: gate.label,
            x: gate.x,
            blockedLane: gate.blockedLane === 1 ? "floor" : "ceiling",
            passed: gate.passed,
          })),
          result: window.relayStageResult.status,
        });
      };

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          stepFrame(FIXED_DT);
        }
        drawScene();
      };

      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        creator: STAGE_CREATOR,
        genre: STAGE_GENRE,
        clearCondition: STAGE_CLEAR,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "running") {
            resetRun();
          }
          state.gates.forEach((gate) => {
            gate.passed = true;
          });
          state.player.x = SLOT_X - PLAYER_WIDTH;
          state.player.lane = SLOT_LANE;
          state.player.laneFrom = SLOT_LANE;
          state.player.foldTimer = 0;
          state.shock = 12;
          clearStage();
          drawScene();
        },
        forceFail() {
          if (state.mode !== "running") {
            resetRun();
          }
          state.shock = SHOCK_LIMIT;
          failStage("impact");
          drawScene();
        },
      };

      drawScene();
      reportReadyToHost();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
