<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Shadow Stitch</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #040610;
        --bg-1: #0f1630;
        --bg-2: #211539;
        --panel: rgba(9, 14, 29, 0.72);
        --line: rgba(166, 201, 255, 0.18);
        --text: #f5fbff;
        --accent: #8ef6ff;
        --accent-2: #ff9ee3;
        --ember: #ffb347;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 22%, rgba(142, 246, 255, 0.08), transparent 24%),
          radial-gradient(circle at 78% 10%, rgba(255, 158, 227, 0.12), transparent 28%),
          linear-gradient(180deg, var(--bg-2), var(--bg-0) 58%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(142, 246, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 30;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 12, 26, 0.95);
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      #shell {
        position: relative;
        width: 100%;
        height: 100%;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(245, 251, 255, 0.95);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        inset: auto 0 14px 0;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 0 14px calc(14px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-pad,
      .mobile-actions {
        pointer-events: auto;
      }

      .mobile-pad {
        display: grid;
        grid-template-columns: repeat(3, 58px);
        grid-template-rows: repeat(2, 58px);
        gap: 8px;
      }

      .mobile-actions {
        display: flex;
        align-items: flex-end;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(173, 225, 255, 0.24);
        border-radius: 18px;
        min-width: 58px;
        min-height: 58px;
        padding: 0 12px;
        background:
          linear-gradient(180deg, rgba(21, 31, 59, 0.92), rgba(10, 16, 34, 0.92));
        color: var(--text);
        font: 800 22px "Avenir Next", "Segoe UI", sans-serif;
        box-shadow:
          0 18px 34px rgba(0, 0, 0, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        touch-action: none;
        backdrop-filter: blur(10px);
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        border-color: rgba(142, 246, 255, 0.42);
        box-shadow:
          0 14px 26px rgba(0, 0, 0, 0.34),
          0 0 0 1px rgba(142, 246, 255, 0.22),
          0 0 22px rgba(142, 246, 255, 0.2);
      }

      .mobile-btn--cut {
        min-width: 92px;
        padding: 0 18px;
        font-size: 17px;
        letter-spacing: 0.06em;
      }

      #btn-up {
        grid-column: 2;
        grid-row: 1;
      }

      #btn-left {
        grid-column: 1;
        grid-row: 2;
      }

      #btn-down {
        grid-column: 2;
        grid-row: 2;
      }

      #btn-right {
        grid-column: 3;
        grid-row: 2;
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          inset: auto 0 10px 0;
          padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-pad {
          grid-template-columns: repeat(3, 54px);
          grid-template-rows: repeat(2, 54px);
          gap: 6px;
        }

        .mobile-btn {
          min-width: 54px;
          min-height: 54px;
          border-radius: 16px;
          font-size: 20px;
        }

        .mobile-btn--cut {
          min-width: 84px;
          font-size: 16px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Shadow Stitch. 캔버스를 터치하거나 Enter로 시작하세요.
      기본 조작은 이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실
      끊기, 같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도
      플레이 가능하게 구현 입니다. 클리어 조건은 동기화 문을 모두 맞춘 뒤 봉합
      다리로 4개 제단을 모두 점등하면 클리어 이고, 실패 조건은 동기화 창을 여러
      번 놓치거나 강한 빛에 오래 노출돼 실이 타면 실패 입니다.
    </p>

    <div id="shell">
      <canvas
        id="game"
        width="1280"
        height="720"
        aria-label="Crystal Foundry: Shadow Stitch"
        aria-describedby="stage-instructions"
        tabindex="0"
      ></canvas>
    </div>

    <nav class="mobile-controls" aria-label="모바일 조작">
      <div class="mobile-pad">
        <button id="btn-up" class="mobile-btn" aria-label="위">▲</button>
        <button id="btn-left" class="mobile-btn" aria-label="왼쪽">◀</button>
        <button id="btn-down" class="mobile-btn" aria-label="아래">▼</button>
        <button id="btn-right" class="mobile-btn" aria-label="오른쪽">▶</button>
      </div>
      <div class="mobile-actions">
        <button id="btn-cut" class="mobile-btn mobile-btn--cut" aria-label="실 끊기">
          CUT
        </button>
      </div>
    </nav>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");

      const VIEW = { width: canvas.width, height: canvas.height };
      const CENTER = { x: VIEW.width / 2, y: VIEW.height / 2 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const HUB_RADIUS = 172;
      const PLAYER_RADIUS = 16;
      const BRIDGE_HALF_WIDTH = 20;
      const ALTAR_RADIUS = 34;

      const STAGE_TITLE = "Crystal Foundry: Shadow Stitch";
      const STAGE_ID = "crystal-foundry-shadow-stitch-sync";
      const STAGE_DESCRIPTION =
        "빛과 그림자 경계를 꿰매 봉합 다리로 바꾸고, 같은 박자의 동기화 문을 맞춰 수정 제단 4개를 밝히는 액션 퍼즐";
      const CONTROLS_TEXT =
        "이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_TEXT =
        "동기화 문을 모두 맞춘 뒤 봉합 다리로 4개 제단을 모두 점등하면 클리어";
      const FAIL_TEXT =
        "동기화 창을 여러 번 놓치거나 강한 빛에 오래 노출돼 실이 타면 실패";

      const relayContext =
        window.RelayRuntime?.readContext(STAGE_ID) || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const palette = {
        bg0: "#050814",
        bg1: "#0e1730",
        bg2: "#1b1232",
        ink: "#f5fbff",
        muted: "#9bb2cf",
        cyan: "#8ef6ff",
        cyanSoft: "rgba(142, 246, 255, 0.18)",
        violet: "#aab3ff",
        pink: "#ff9ee3",
        pinkSoft: "rgba(255, 158, 227, 0.18)",
        amber: "#ffb347",
        amberSoft: "rgba(255, 179, 71, 0.16)",
        ember: "#ff744f",
        red: "#ff667d",
        floor: "#131f38",
        floor2: "#22365c",
        molten: "#ff8b3d",
        moltenBright: "#ffd179",
        shadow: "rgba(3, 6, 16, 0.84)",
      };

      const pillars = [
        { x: 546, y: 284, r: 42, tint: "#9af6ff" },
        { x: 742, y: 262, r: 34, tint: "#d0bdff" },
        { x: 726, y: 452, r: 45, tint: "#ffa9dd" },
        { x: 522, y: 434, r: 31, tint: "#baf0ff" },
      ];

      const syncDoorsTemplate = [
        { x: 640, y: 220, label: "I" },
        { x: 812, y: 364, label: "II" },
        { x: 640, y: 506, label: "III" },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let lastRenderTimestamp = 0;
      let accumulator = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        phase: "gates",
        elapsed: 0,
        lastRunTime: 0,
        misses: 0,
        maxMisses: 4,
        heat: 0,
        heatMax: 100,
        shake: 0,
        flash: 0,
        beamAngle: -0.96,
        beamSpeed: 0.42,
        guidePulse: 0,
        actionLock: 0,
        justStarted: 0,
        message: "",
        messageTimer: 0,
        resultWord: "",
        player: {
          x: CENTER.x,
          y: CENTER.y,
          r: PLAYER_RADIUS,
          speed: 250,
          exposed: false,
        },
        input: {
          left: false,
          right: false,
          up: false,
          down: false,
        },
        pointer: {
          down: false,
          id: null,
          x: CENTER.x,
          y: CENTER.y,
          lastTapTime: 0,
          lastTapX: 0,
          lastTapY: 0,
          stitchAltarId: null,
        },
        sync: {
          activeDoor: 0,
          interval: 0.94,
          targetRatio: 0.74,
          window: 0.12,
          beatTime: 0,
          cycleConsumed: false,
        },
        altars: [],
        particles: [],
        popups: [],
        sparkles: [],
      };

      function createAltars() {
        return [
          {
            id: "north-west",
            name: "서북 제단",
            x: 372,
            y: 186,
            accent: "#8ef6ff",
            anchor: { x: 502, y: 276 },
            path: [
              { x: 502, y: 276 },
              { x: 452, y: 252 },
              { x: 410, y: 210 },
              { x: 372, y: 186 },
            ],
            lit: false,
            active: false,
            timer: 0,
            progress: 0,
          },
          {
            id: "north-east",
            name: "동북 제단",
            x: 908,
            y: 182,
            accent: "#ff9ee3",
            anchor: { x: 778, y: 272 },
            path: [
              { x: 778, y: 272 },
              { x: 832, y: 246 },
              { x: 872, y: 210 },
              { x: 908, y: 182 },
            ],
            lit: false,
            active: false,
            timer: 0,
            progress: 0,
          },
          {
            id: "south-west",
            name: "서남 제단",
            x: 360,
            y: 540,
            accent: "#ffd36a",
            anchor: { x: 502, y: 446 },
            path: [
              { x: 502, y: 446 },
              { x: 458, y: 476 },
              { x: 408, y: 508 },
              { x: 360, y: 540 },
            ],
            lit: false,
            active: false,
            timer: 0,
            progress: 0,
          },
          {
            id: "south-east",
            name: "동남 제단",
            x: 920,
            y: 548,
            accent: "#aab3ff",
            anchor: { x: 782, y: 448 },
            path: [
              { x: 782, y: 448 },
              { x: 836, y: 482 },
              { x: 878, y: 516 },
              { x: 920, y: 548 },
            ],
            lit: false,
            active: false,
            timer: 0,
            progress: 0,
          },
        ].map((altar) => ({
          ...altar,
          pathLength: polylineLength(altar.path),
        }));
      }

      function resetRuntime() {
        state.mode = "menu";
        state.phase = "gates";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.misses = 0;
        state.heat = 0;
        state.shake = 0;
        state.flash = 0;
        state.beamAngle = -0.96;
        state.guidePulse = 0;
        state.actionLock = 0;
        state.justStarted = 0;
        state.message = "";
        state.messageTimer = 0;
        state.resultWord = "";
        state.player.x = CENTER.x;
        state.player.y = CENTER.y;
        state.player.exposed = false;
        state.input.left = false;
        state.input.right = false;
        state.input.up = false;
        state.input.down = false;
        state.pointer.down = false;
        state.pointer.id = null;
        state.pointer.x = CENTER.x;
        state.pointer.y = CENTER.y;
        state.pointer.stitchAltarId = null;
        state.sync.activeDoor = 0;
        state.sync.beatTime = 0;
        state.sync.cycleConsumed = false;
        state.altars = createAltars();
        state.particles.length = 0;
        state.popups.length = 0;
        state.sparkles.length = 0;
      }

      resetRuntime();

      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        creator: "jungcollin",
        genre: "Light-shadow action / 동기화 문",
        clearCondition: CLEAR_TEXT,
      };

      window.relayStageResult = { status: "running" };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeOutCubic(t) {
        const p = clamp(t, 0, 1);
        return 1 - Math.pow(1 - p, 3);
      }

      function angleDiff(a, b) {
        let diff = a - b;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return diff;
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function pointInCircle(px, py, cx, cy, radius) {
        return distance(px, py, cx, cy) <= radius;
      }

      function distancePointToSegment(px, py, ax, ay, bx, by) {
        const abx = bx - ax;
        const aby = by - ay;
        const lengthSquared = abx * abx + aby * aby || 1;
        const t = clamp(((px - ax) * abx + (py - ay) * aby) / lengthSquared, 0, 1);
        const x = ax + abx * t;
        const y = ay + aby * t;
        return { distance: Math.hypot(px - x, py - y), t, x, y };
      }

      function distanceToPolyline(px, py, points) {
        let best = { distance: Infinity, t: 0, x: points[0].x, y: points[0].y };
        let walked = 0;
        const total = polylineLength(points) || 1;

        for (let index = 0; index < points.length - 1; index += 1) {
          const a = points[index];
          const b = points[index + 1];
          const segLength = distance(a.x, a.y, b.x, b.y);
          const hit = distancePointToSegment(px, py, a.x, a.y, b.x, b.y);
          if (hit.distance < best.distance) {
            best = {
              distance: hit.distance,
              t: clamp((walked + segLength * hit.t) / total, 0, 1),
              x: hit.x,
              y: hit.y,
            };
          }
          walked += segLength;
        }

        return best;
      }

      function polylineLength(points) {
        let total = 0;
        for (let index = 0; index < points.length - 1; index += 1) {
          total += distance(
            points[index].x,
            points[index].y,
            points[index + 1].x,
            points[index + 1].y
          );
        }
        return total;
      }

      function pointOnPolyline(points, t) {
        const clamped = clamp(t, 0, 1);
        const total = polylineLength(points);
        let remaining = total * clamped;

        for (let index = 0; index < points.length - 1; index += 1) {
          const a = points[index];
          const b = points[index + 1];
          const segLength = distance(a.x, a.y, b.x, b.y);
          if (remaining <= segLength || index === points.length - 2) {
            const ratio = segLength <= 0 ? 0 : remaining / segLength;
            return {
              x: lerp(a.x, b.x, ratio),
              y: lerp(a.y, b.y, ratio),
            };
          }
          remaining -= segLength;
        }

        return { x: points[points.length - 1].x, y: points[points.length - 1].y };
      }

      function segmentCircleBlocked(source, point, pillar) {
        const hit = distancePointToSegment(
          pillar.x,
          pillar.y,
          source.x,
          source.y,
          point.x,
          point.y
        );
        if (hit.distance > pillar.r + 2) {
          return false;
        }
        const pointDistance = distance(source.x, source.y, point.x, point.y);
        const pillarDistance = distance(source.x, source.y, pillar.x, pillar.y);
        return pillarDistance < pointDistance;
      }

      function getLightSource() {
        return {
          x: CENTER.x + Math.cos(state.beamAngle) * 702,
          y: CENTER.y + Math.sin(state.beamAngle) * 438,
        };
      }

      function isPointExposed(x, y) {
        const source = getLightSource();
        const toCenter = Math.atan2(CENTER.y - source.y, CENTER.x - source.x);
        const toPoint = Math.atan2(y - source.y, x - source.x);
        if (Math.abs(angleDiff(toPoint, toCenter)) > 1.03) {
          return false;
        }

        const point = { x, y };
        for (const pillar of pillars) {
          if (segmentCircleBlocked(source, point, pillar)) {
            return false;
          }
        }

        return true;
      }

      function activeBridge() {
        return state.altars.find((altar) => altar.active && !altar.lit) || null;
      }

      function isWalkable(x, y) {
        if (pointInCircle(x, y, CENTER.x, CENTER.y, HUB_RADIUS)) {
          return true;
        }

        if (state.phase !== "altars") {
          return false;
        }

        for (const altar of state.altars) {
          if (!altar.active && !altar.lit) {
            continue;
          }
          if (pointInCircle(x, y, altar.x, altar.y, ALTAR_RADIUS + 12)) {
            return true;
          }
          if (distanceToPolyline(x, y, altar.path).distance <= BRIDGE_HALF_WIDTH) {
            return true;
          }
        }

        return false;
      }

      function roundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function diamond(x, y, radius) {
        ctx.beginPath();
        ctx.moveTo(x, y - radius);
        ctx.lineTo(x + radius, y);
        ctx.lineTo(x, y + radius);
        ctx.lineTo(x - radius, y);
        ctx.closePath();
      }

      function spawnParticles(x, y, options = {}) {
        const count = options.count || 12;
        const spread = options.spread || Math.PI * 2;
        const speed = options.speed || 220;
        const color = options.color || palette.cyan;
        const life = options.life || 0.9;

        for (let index = 0; index < count; index += 1) {
          const angle = (spread * index) / count + Math.random() * 0.35;
          const magnitude = speed * (0.35 + Math.random() * 0.85);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * magnitude,
            vy: Math.sin(angle) * magnitude,
            life,
            maxLife: life,
            size: 2 + Math.random() * 5,
            color,
          });
        }
      }

      function spawnPopup(text, x, y, color = palette.cyan) {
        state.popups.push({
          text,
          x,
          y,
          vy: -28,
          life: 0.92,
          maxLife: 0.92,
          color,
        });
      }

      function startStage() {
        resetRuntime();
        state.mode = "running";
        state.phase = "gates";
        state.justStarted = 0.34;
        state.message = "문 공명과 빛 경로를 먼저 맞추세요";
        state.messageTimer = 1.8;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        spawnParticles(CENTER.x, CENTER.y, {
          count: 20,
          speed: 180,
          color: palette.cyan,
          life: 0.8,
        });
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.flash = 0.6;
        state.resultWord =
          reason === "thread-burn" ? "실이 타버렸습니다" : "동기화가 무너졌습니다";
        window.relayStageResult.status = "failed";
        spawnParticles(state.player.x, state.player.y, {
          count: 32,
          speed: 320,
          color: palette.red,
          life: 1.1,
        });
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.75;
        state.resultWord = "제단이 모두 점등되었습니다";
        window.relayStageResult.status = "cleared";
        spawnParticles(CENTER.x, CENTER.y, {
          count: 52,
          speed: 340,
          color: "#ffffff",
          life: 1.4,
        });
        reportClearedToHost();
      }

      function registerMiss(text) {
        state.misses += 1;
        state.shake = Math.max(state.shake, 10);
        state.flash = Math.max(state.flash, 0.18);
        spawnPopup(text, CENTER.x, 118, palette.red);
        spawnParticles(CENTER.x, 164, {
          count: 14,
          speed: 180,
          color: palette.red,
          life: 0.8,
        });
        if (state.misses >= state.maxMisses) {
          failStage("sync-miss");
        }
      }

      function completeSyncDoor() {
        const door = syncDoorsTemplate[state.sync.activeDoor];
        state.sync.activeDoor += 1;
        state.sync.beatTime = 0;
        state.sync.cycleConsumed = false;
        state.actionLock = 0.2;
        state.shake = Math.max(state.shake, 5);
        spawnPopup("SYNC", door.x, door.y - 22, palette.cyan);
        spawnParticles(door.x, door.y, {
          count: 18,
          speed: 180,
          color: palette.cyan,
          life: 0.85,
        });
        if (state.sync.activeDoor >= syncDoorsTemplate.length) {
          state.phase = "altars";
          state.message = "봉합 다리로 네 제단을 점등하세요";
          state.messageTimer = 2.2;
          spawnParticles(CENTER.x, CENTER.y, {
            count: 26,
            speed: 260,
            color: palette.pink,
            life: 1,
          });
        }
      }

      function trySyncInput() {
        if (state.mode !== "running" || state.phase !== "gates") {
          return;
        }
        if (state.actionLock > 0 || state.justStarted > 0.02) {
          return;
        }

        const targetTime = state.sync.interval * state.sync.targetRatio;
        const error = Math.abs(state.sync.beatTime - targetTime);
        if (!state.sync.cycleConsumed && error <= state.sync.window) {
          completeSyncDoor();
          return;
        }

        if (!state.sync.cycleConsumed) {
          state.sync.cycleConsumed = true;
          registerMiss("박자 이탈");
        }
      }

      function cutThread(silent = false) {
        let hadThread = false;
        for (const altar of state.altars) {
          if ((altar.active || altar.progress > 0) && !altar.lit) {
            hadThread = true;
            altar.active = false;
            altar.timer = 0;
            altar.progress = 0;
          }
        }
        state.pointer.stitchAltarId = null;
        state.pointer.down = false;

        if (!hadThread) {
          return;
        }

        state.heat = Math.max(0, state.heat - 24);
        state.shake = Math.max(state.shake, 4);
        if (!silent) {
          spawnPopup("실 절단", state.player.x, state.player.y - 18, palette.amber);
          spawnParticles(state.player.x, state.player.y, {
            count: 10,
            speed: 160,
            color: palette.amber,
            life: 0.72,
          });
        }
        if (!isWalkable(state.player.x, state.player.y)) {
          state.player.x = CENTER.x;
          state.player.y = CENTER.y;
        }
      }

      function lightAltar(altar) {
        altar.lit = true;
        altar.active = false;
        altar.timer = 0;
        altar.progress = 1;
        state.heat = Math.max(0, state.heat - 10);
        state.player.x = CENTER.x;
        state.player.y = CENTER.y;
        state.pointer.stitchAltarId = null;
        spawnPopup("ALTAR ON", altar.x, altar.y - 18, altar.accent);
        spawnParticles(altar.x, altar.y, {
          count: 24,
          speed: 240,
          color: altar.accent,
          life: 1.15,
        });
        state.message = `${altar.name} 점등 완료`;
        state.messageTimer = 1.2;

        if (state.altars.every((entry) => entry.lit)) {
          clearStage();
        }
      }

      function updatePlayer(dt) {
        const x =
          (state.input.right ? 1 : 0) - (state.input.left ? 1 : 0);
        const y = (state.input.down ? 1 : 0) - (state.input.up ? 1 : 0);
        const magnitude = Math.hypot(x, y) || 1;
        const moveX = (x / magnitude) * state.player.speed * dt;
        const moveY = (y / magnitude) * state.player.speed * dt;

        if (moveX === 0 && moveY === 0) {
          return;
        }

        const nextX = state.player.x + moveX;
        if (isWalkable(nextX, state.player.y)) {
          state.player.x = nextX;
        }

        const nextY = state.player.y + moveY;
        if (isWalkable(state.player.x, nextY)) {
          state.player.y = nextY;
        }
      }

      function updateHeat(dt) {
        const playerExposed = isPointExposed(state.player.x, state.player.y);
        state.player.exposed = playerExposed;

        let bridgeExposure = 0;
        for (const altar of state.altars) {
          if (!altar.active || altar.lit) {
            continue;
          }
          const samples = [0.25, 0.5, 0.75];
          let exposedSamples = 0;
          for (const sample of samples) {
            const point = pointOnPolyline(altar.path, sample);
            if (isPointExposed(point.x, point.y)) {
              exposedSamples += 1;
            }
          }
          bridgeExposure = Math.max(bridgeExposure, exposedSamples / samples.length);
        }

        let heatDelta = 0;
        if (playerExposed) {
          heatDelta += 30;
        } else {
          heatDelta -= 18;
        }

        if (bridgeExposure > 0) {
          heatDelta += 16 * bridgeExposure;
        }

        state.heat = clamp(state.heat + heatDelta * dt, 0, state.heatMax);
        if (state.heat >= state.heatMax - 0.001) {
          failStage("thread-burn");
        }
      }

      function updateSync(dt) {
        if (state.phase !== "gates" || state.mode !== "running") {
          return;
        }
        state.sync.beatTime += dt;
        const targetTime = state.sync.interval * state.sync.targetRatio;
        if (!state.sync.cycleConsumed && state.sync.beatTime > targetTime + state.sync.window) {
          state.sync.cycleConsumed = true;
          registerMiss("창 놓침");
        }
        if (state.sync.beatTime >= state.sync.interval) {
          state.sync.beatTime -= state.sync.interval;
          state.sync.cycleConsumed = false;
        }
      }

      function updateAltars(dt) {
        if (state.phase !== "altars" || state.mode !== "running") {
          return;
        }

        for (const altar of state.altars) {
          if (altar.lit) {
            continue;
          }

          if (!altar.active && state.pointer.stitchAltarId !== altar.id) {
            altar.progress = Math.max(0, altar.progress - dt * 0.08);
          }

          if (altar.active) {
            altar.timer -= dt;
            if (altar.timer <= 0) {
              altar.active = false;
              altar.progress = 0;
              spawnPopup("봉합 붕괴", altar.anchor.x, altar.anchor.y - 12, palette.amber);
              if (!isWalkable(state.player.x, state.player.y)) {
                state.player.x = CENTER.x;
                state.player.y = CENTER.y;
              }
            }

            if (pointInCircle(state.player.x, state.player.y, altar.x, altar.y, ALTAR_RADIUS + 10)) {
              lightAltar(altar);
            }
          }
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
            continue;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.96;
          particle.vy *= 0.96;
          particle.vy += 38 * dt;
        }

        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
            continue;
          }
          popup.y += popup.vy * dt;
        }
      }

      function update(dt) {
        state.guidePulse += dt * 1.5;
        state.beamAngle += dt * state.beamSpeed;
        state.shake = Math.max(0, state.shake - dt * 16);
        state.flash = Math.max(0, state.flash - dt * 1.2);
        state.actionLock = Math.max(0, state.actionLock - dt);
        state.justStarted = Math.max(0, state.justStarted - dt);
        state.messageTimer = Math.max(0, state.messageTimer - dt);

        if (state.mode === "running") {
          state.elapsed += dt;
          updatePlayer(dt);
          updateHeat(dt);
          updateSync(dt);
          updateAltars(dt);
        }

        updateParticles(dt);
      }

      function beginStitch(pointerX, pointerY) {
        if (state.phase !== "altars" || state.mode !== "running") {
          return false;
        }

        const chosen = state.altars
          .filter(
            (altar) =>
              !altar.lit &&
              distance(pointerX, pointerY, altar.anchor.x, altar.anchor.y) <= 54 &&
              distance(state.player.x, state.player.y, altar.anchor.x, altar.anchor.y) <= 82
          )
          .sort(
            (a, b) =>
              distance(pointerX, pointerY, a.anchor.x, a.anchor.y) -
              distance(pointerX, pointerY, b.anchor.x, b.anchor.y)
          )[0];

        if (!chosen) {
          return false;
        }

        const current = activeBridge();
        if (current && current.id !== chosen.id) {
          cutThread(true);
        }

        state.pointer.stitchAltarId = chosen.id;
        chosen.progress = Math.max(chosen.progress, 0.06);
        return true;
      }

      function advanceStitch(pointerX, pointerY) {
        const altar = state.altars.find((entry) => entry.id === state.pointer.stitchAltarId);
        if (!altar || altar.lit) {
          return;
        }

        const hit = distanceToPolyline(pointerX, pointerY, altar.path);
        if (hit.distance > 44) {
          return;
        }

        if (distance(state.player.x, state.player.y, altar.anchor.x, altar.anchor.y) > 86) {
          return;
        }

        if (hit.t + 0.02 >= altar.progress) {
          altar.progress = Math.max(altar.progress, Math.min(1, hit.t + 0.04));
          if (altar.progress >= 1 && !altar.active) {
            altar.active = true;
            altar.timer = 6.8;
            spawnPopup("봉합 다리 완성", altar.anchor.x, altar.anchor.y - 18, altar.accent);
            spawnParticles(altar.anchor.x, altar.anchor.y, {
              count: 20,
              speed: 210,
              color: altar.accent,
              life: 0.95,
            });
          }
        }
      }

      function onPointerDown(clientX, clientY, pointerId) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;
        state.pointer.down = true;
        state.pointer.id = pointerId;
        state.pointer.x = x;
        state.pointer.y = y;

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }

        const now = performance.now();
        const isDoubleTap =
          now - state.pointer.lastTapTime < 320 &&
          distance(x, y, state.pointer.lastTapX, state.pointer.lastTapY) < 48;
        state.pointer.lastTapTime = now;
        state.pointer.lastTapX = x;
        state.pointer.lastTapY = y;

        if (isDoubleTap) {
          cutThread();
          return;
        }

        if (state.phase === "gates") {
          trySyncInput();
          return;
        }

        beginStitch(x, y);
      }

      function onPointerMove(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        state.pointer.x = (clientX - rect.left) * scaleX;
        state.pointer.y = (clientY - rect.top) * scaleY;

        if (state.pointer.down && state.pointer.stitchAltarId) {
          advanceStitch(state.pointer.x, state.pointer.y);
        }
      }

      function onPointerUp() {
        state.pointer.down = false;
        state.pointer.id = null;
        state.pointer.stitchAltarId = null;
      }

      function bindMoveButton(button, key) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          state.input[key] = false;
        };

        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (state.mode !== "running") {
            startStage();
          }
          button.dataset.active = "true";
          state.input[key] = true;
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function bindCutButton(button) {
        if (!button) {
          return;
        }
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (state.mode !== "running") {
            startStage();
            return;
          }
          button.dataset.active = "true";
          cutThread();
          button.setPointerCapture?.(event.pointerId);
        });
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
        };
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function handleKey(event, pressed) {
        if (event.repeat && pressed) {
          return;
        }

        if (event.code === "Enter" && pressed) {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          } else if (state.phase === "gates") {
            trySyncInput();
          }
          return;
        }

        if (event.code === "Space" && pressed) {
          event.preventDefault();
          trySyncInput();
          return;
        }

        if ((event.code === "KeyX" || event.code === "Backspace") && pressed) {
          event.preventDefault();
          cutThread();
          return;
        }

        const mapping = {
          ArrowLeft: "left",
          ArrowRight: "right",
          ArrowUp: "up",
          ArrowDown: "down",
          KeyA: "left",
          KeyD: "right",
          KeyW: "up",
          KeyS: "down",
        };
        const key = mapping[event.code];
        if (key) {
          event.preventDefault();
          state.input[key] = pressed;
        }
      }

      function renderBackdrop() {
        const bg = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        bg.addColorStop(0, palette.bg2);
        bg.addColorStop(0.5, palette.bg1);
        bg.addColorStop(1, palette.bg0);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 6; index += 1) {
          const x = 120 + index * 210;
          const gradient = ctx.createRadialGradient(x, 96 + (index % 2) * 42, 20, x, 96, 160);
          gradient.addColorStop(0, index % 2 ? "rgba(255, 158, 227, 0.18)" : "rgba(142, 246, 255, 0.18)");
          gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(x, 96 + (index % 2) * 42, 160, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.translate(0, 18);
        for (let index = 0; index < 8; index += 1) {
          const x = 100 + index * 160;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.025)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + 44, VIEW.height);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawIsland(x, y, radius, accent, lit) {
        const island = ctx.createRadialGradient(x - radius * 0.3, y - radius * 0.35, 10, x, y, radius * 1.1);
        island.addColorStop(0, lit ? "rgba(255,255,255,0.95)" : "#3a557f");
        island.addColorStop(0.5, lit ? accent : "#243855");
        island.addColorStop(1, "#102038");
        ctx.fillStyle = island;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = lit ? accent : "rgba(173, 225, 255, 0.16)";
        ctx.lineWidth = lit ? 4 : 2;
        ctx.shadowBlur = lit ? 26 : 0;
        ctx.shadowColor = accent;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      function drawArenaBase() {
        const hub = ctx.createRadialGradient(CENTER.x - 30, CENTER.y - 36, 26, CENTER.x, CENTER.y, HUB_RADIUS * 1.3);
        hub.addColorStop(0, "#315088");
        hub.addColorStop(0.55, palette.floor2);
        hub.addColorStop(1, "#101829");
        ctx.fillStyle = hub;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, HUB_RADIUS + 18, 0, Math.PI * 2);
        ctx.fill();

        ctx.lineWidth = 18;
        ctx.strokeStyle = "rgba(255, 182, 97, 0.12)";
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, HUB_RADIUS + 30, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(173, 225, 255, 0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, HUB_RADIUS, 0, Math.PI * 2);
        ctx.stroke();

        for (const altar of state.altars) {
          drawIsland(altar.x, altar.y, ALTAR_RADIUS + 14, altar.accent, altar.lit);
          const molten = ctx.createLinearGradient(altar.anchor.x, altar.anchor.y, altar.x, altar.y);
          molten.addColorStop(0, "rgba(255, 139, 61, 0.08)");
          molten.addColorStop(0.5, "rgba(255, 139, 61, 0.34)");
          molten.addColorStop(1, "rgba(255, 209, 121, 0.08)");
          ctx.strokeStyle = molten;
          ctx.lineWidth = 46;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(altar.anchor.x, altar.anchor.y);
          ctx.lineTo(altar.x, altar.y);
          ctx.stroke();
        }
      }

      function drawLight() {
        const source = getLightSource();
        const centerAngle = Math.atan2(CENTER.y - source.y, CENTER.x - source.x);
        const leftAngle = centerAngle - 1.03;
        const rightAngle = centerAngle + 1.03;

        const leftX = source.x + Math.cos(leftAngle) * 1180;
        const leftY = source.y + Math.sin(leftAngle) * 1180;
        const midX = source.x + Math.cos(centerAngle) * 1280;
        const midY = source.y + Math.sin(centerAngle) * 1280;
        const rightX = source.x + Math.cos(rightAngle) * 1180;
        const rightY = source.y + Math.sin(rightAngle) * 1180;

        ctx.save();
        const cone = ctx.createRadialGradient(source.x, source.y, 20, source.x, source.y, 980);
        cone.addColorStop(0, "rgba(255, 244, 213, 0.58)");
        cone.addColorStop(0.24, "rgba(255, 214, 138, 0.22)");
        cone.addColorStop(1, "rgba(255, 214, 138, 0)");
        ctx.fillStyle = cone;
        ctx.beginPath();
        ctx.moveTo(source.x, source.y);
        ctx.lineTo(leftX, leftY);
        ctx.lineTo(midX, midY);
        ctx.lineTo(rightX, rightY);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        for (const pillar of pillars) {
          const angle = Math.atan2(pillar.y - source.y, pillar.x - source.x);
          const offset = Math.asin(clamp(pillar.r / Math.max(distance(source.x, source.y, pillar.x, pillar.y), pillar.r + 1), -1, 1));
          const angles = [angle - offset, angle + offset];
          const points = angles.map((a) => ({
            x: pillar.x + Math.cos(a) * pillar.r,
            y: pillar.y + Math.sin(a) * pillar.r,
          }));
          const far = points.map((point) => {
            const dx = point.x - source.x;
            const dy = point.y - source.y;
            const len = Math.hypot(dx, dy) || 1;
            return {
              x: point.x + (dx / len) * 1500,
              y: point.y + (dy / len) * 1500,
            };
          });

          ctx.fillStyle = palette.shadow;
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          ctx.lineTo(far[0].x, far[0].y);
          ctx.lineTo(far[1].x, far[1].y);
          ctx.lineTo(points[1].x, points[1].y);
          ctx.closePath();
          ctx.fill();
        }

        const glow = ctx.createRadialGradient(source.x, source.y, 0, source.x, source.y, 70);
        glow.addColorStop(0, "rgba(255,255,255,0.95)");
        glow.addColorStop(0.35, "rgba(255, 218, 157, 0.8)");
        glow.addColorStop(1, "rgba(255, 218, 157, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(source.x, source.y, 70, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawPillars() {
        for (const pillar of pillars) {
          const gradient = ctx.createRadialGradient(
            pillar.x - pillar.r * 0.3,
            pillar.y - pillar.r * 0.42,
            6,
            pillar.x,
            pillar.y,
            pillar.r * 1.2
          );
          gradient.addColorStop(0, pillar.tint);
          gradient.addColorStop(0.36, "#b9c3ff");
          gradient.addColorStop(1, "#172848");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(pillar.x, pillar.y, pillar.r, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(255,255,255,0.18)";
          ctx.lineWidth = 2;
          ctx.shadowBlur = 20;
          ctx.shadowColor = pillar.tint;
          ctx.stroke();
          ctx.shadowBlur = 0;

          diamond(pillar.x, pillar.y, pillar.r * 0.72);
          ctx.strokeStyle = "rgba(255,255,255,0.26)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }

      function drawPartialPolyline(points, t) {
        const clamped = clamp(t, 0, 1);
        const total = polylineLength(points);
        let remaining = total * clamped;

        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);

        for (let index = 0; index < points.length - 1; index += 1) {
          const a = points[index];
          const b = points[index + 1];
          const segmentLength = distance(a.x, a.y, b.x, b.y);
          if (remaining <= 0) {
            break;
          }
          if (remaining >= segmentLength) {
            ctx.lineTo(b.x, b.y);
            remaining -= segmentLength;
          } else {
            const ratio = remaining / segmentLength;
            ctx.lineTo(lerp(a.x, b.x, ratio), lerp(a.y, b.y, ratio));
            break;
          }
        }
      }

      function drawAltarsAndBridges() {
        for (const altar of state.altars) {
          ctx.lineCap = "round";
          ctx.lineJoin = "round";

          ctx.strokeStyle = "rgba(173, 225, 255, 0.18)";
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.moveTo(altar.path[0].x, altar.path[0].y);
          for (let index = 1; index < altar.path.length; index += 1) {
            ctx.lineTo(altar.path[index].x, altar.path[index].y);
          }
          ctx.stroke();

          ctx.strokeStyle = "rgba(255, 171, 105, 0.18)";
          ctx.lineWidth = 16;
          ctx.stroke();

          if (altar.progress > 0 && !altar.lit) {
            ctx.shadowBlur = altar.active ? 28 : 18;
            ctx.shadowColor = altar.accent;
            ctx.strokeStyle = altar.accent;
            ctx.lineWidth = altar.active ? 18 : 11;
            drawPartialPolyline(altar.path, altar.progress);
            ctx.stroke();
            ctx.shadowBlur = 0;

            ctx.strokeStyle = "rgba(255,255,255,0.92)";
            ctx.lineWidth = altar.active ? 4 : 2.5;
            ctx.setLineDash([10, 8]);
            ctx.lineDashOffset = -state.elapsed * 90;
            drawPartialPolyline(altar.path, altar.progress);
            ctx.stroke();
            ctx.setLineDash([]);
          }

          const anchorPulse =
            state.phase === "altars" && !altar.lit
              ? 1 + Math.sin(state.guidePulse * 2 + altar.x * 0.01) * 0.12
              : 1;
          const anchorRadius = 12 * anchorPulse;
          ctx.fillStyle = altar.lit ? altar.accent : "rgba(245, 251, 255, 0.12)";
          ctx.beginPath();
          ctx.arc(altar.anchor.x, altar.anchor.y, anchorRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = altar.lit ? altar.accent : "rgba(173, 225, 255, 0.34)";
          ctx.lineWidth = altar.lit ? 3 : 2;
          ctx.stroke();

          diamond(altar.x, altar.y, ALTAR_RADIUS - 6);
          const crystal = ctx.createLinearGradient(altar.x - 24, altar.y - 24, altar.x + 24, altar.y + 24);
          crystal.addColorStop(0, "#fefefe");
          crystal.addColorStop(1, altar.lit ? altar.accent : "#405577");
          ctx.fillStyle = crystal;
          ctx.shadowBlur = altar.lit ? 26 : 0;
          ctx.shadowColor = altar.accent;
          ctx.fill();
          ctx.shadowBlur = 0;

          ctx.fillStyle = altar.lit ? altar.accent : palette.muted;
          ctx.font = "700 12px 'Avenir Next', 'Segoe UI', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(altar.name, altar.x, altar.y + 58);
        }
        ctx.textAlign = "left";
      }

      function drawSyncDoors() {
        const targetTime = state.sync.interval * state.sync.targetRatio;
        const beatProgress = clamp(state.sync.beatTime / Math.max(targetTime, 0.001), 0, 1);

        for (let index = 0; index < syncDoorsTemplate.length; index += 1) {
          const door = syncDoorsTemplate[index];
          const done = index < state.sync.activeDoor;
          const active = state.phase === "gates" && index === state.sync.activeDoor;
          const accent = done ? palette.cyan : active ? palette.pink : "rgba(245, 251, 255, 0.2)";
          const ring = active ? lerp(46, 18, easeOutCubic(beatProgress)) : 22;

          ctx.save();
          diamond(door.x, door.y, 18);
          const gradient = ctx.createLinearGradient(door.x - 18, door.y - 18, door.x + 18, door.y + 18);
          gradient.addColorStop(0, done ? "#ffffff" : active ? "#ffe1f5" : "#40506f");
          gradient.addColorStop(1, done ? palette.cyan : active ? palette.pink : "#182238");
          ctx.fillStyle = gradient;
          ctx.shadowBlur = done || active ? 24 : 0;
          ctx.shadowColor = done ? palette.cyan : palette.pink;
          ctx.fill();
          ctx.shadowBlur = 0;

          ctx.strokeStyle = accent;
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(door.x, door.y, ring, 0, Math.PI * 2);
          ctx.strokeStyle = accent;
          ctx.lineWidth = active ? 4 : 2;
          ctx.globalAlpha = active ? 0.85 : 0.36;
          ctx.stroke();

          ctx.fillStyle = done ? palette.bg0 : palette.ink;
          ctx.globalAlpha = 1;
          ctx.font = "700 12px 'Avenir Next', 'Segoe UI', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(door.label, door.x, door.y + 4);
          ctx.restore();
        }
        ctx.textAlign = "left";
      }

      function drawPlayer() {
        const glow = state.player.exposed ? palette.amber : palette.cyan;
        const radius = state.player.r;
        ctx.save();
        ctx.translate(state.player.x, state.player.y);
        ctx.rotate(Math.sin(state.elapsed * 4) * 0.08);

        ctx.fillStyle = "rgba(6, 10, 20, 0.3)";
        ctx.beginPath();
        ctx.ellipse(0, 18, radius * 0.9, radius * 0.52, 0, 0, Math.PI * 2);
        ctx.fill();

        diamond(0, 0, radius + 2);
        const shard = ctx.createLinearGradient(-14, -16, 14, 18);
        shard.addColorStop(0, "#ffffff");
        shard.addColorStop(0.35, glow);
        shard.addColorStop(1, "#20314f");
        ctx.fillStyle = shard;
        ctx.shadowBlur = state.player.exposed ? 22 : 18;
        ctx.shadowColor = glow;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "rgba(255, 255, 255, 0.65)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = particle.life / particle.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.shadowBlur = 14;
          ctx.shadowColor = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;

        for (const popup of state.popups) {
          const alpha = popup.life / popup.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "800 18px 'Avenir Next', 'Segoe UI', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.globalAlpha = 1;
        ctx.textAlign = "left";
      }

      function drawHudPanel(x, y, width, height, title, value, accent) {
        roundedRect(x, y, width, height, 22);
        ctx.fillStyle = "rgba(8, 12, 26, 0.72)";
        ctx.fill();
        ctx.strokeStyle = "rgba(173, 225, 255, 0.12)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = palette.muted;
        ctx.font = "700 12px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.textTransform = "uppercase";
        ctx.fillText(title, x + 18, y + 22);

        ctx.fillStyle = accent;
        ctx.font = "800 26px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(value, x + 18, y + 52);
      }

      function drawBar(x, y, width, height, ratio, fillA, fillB) {
        roundedRect(x, y, width, height, height / 2);
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fill();

        const fillWidth = Math.max(8, width * clamp(ratio, 0, 1));
        roundedRect(x, y, fillWidth, height, height / 2);
        const fill = ctx.createLinearGradient(x, y, x + width, y);
        fill.addColorStop(0, fillA);
        fill.addColorStop(1, fillB);
        ctx.fillStyle = fill;
        ctx.fill();
      }

      function drawHud() {
        if (state.mode !== "running") {
          return;
        }

        const litCount = state.altars.filter((altar) => altar.lit).length;
        drawHudPanel(24, 22, 268, 78, "PHASE", state.phase === "gates" ? "SYNC DOORS" : "SHADOW STITCH", palette.cyan);
        drawHudPanel(
          VIEW.width - 232,
          22,
          208,
          78,
          "ALTARS",
          `${litCount} / 4`,
          palette.pink
        );

        roundedRect(24, VIEW.height - 110, 360, 72, 24);
        ctx.fillStyle = "rgba(8, 12, 26, 0.72)";
        ctx.fill();
        ctx.strokeStyle = "rgba(173, 225, 255, 0.12)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = palette.muted;
        ctx.font = "700 12px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText("THREAD HEAT", 42, VIEW.height - 84);
        drawBar(42, VIEW.height - 68, 222, 14, state.heat / state.heatMax, palette.cyan, palette.ember);
        ctx.fillStyle = state.heat > 75 ? palette.ember : palette.ink;
        ctx.font = "800 16px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(`${Math.round(state.heat)}%`, 278, VIEW.height - 56);

        ctx.fillStyle = palette.muted;
        ctx.font = "700 12px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText("MISSES", 310, VIEW.height - 84);
        ctx.fillStyle = state.misses >= 2 ? palette.red : palette.ink;
        ctx.font = "800 20px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(`${state.misses} / ${state.maxMisses}`, 310, VIEW.height - 56);

        if (state.messageTimer > 0) {
          roundedRect(VIEW.width / 2 - 236, 28, 472, 54, 24);
          ctx.fillStyle = "rgba(245, 251, 255, 0.08)";
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.12)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = palette.ink;
          ctx.font = "700 17px 'Avenir Next', 'Segoe UI', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(state.message, VIEW.width / 2, 61);
          ctx.textAlign = "left";
        }

        const hint =
          state.phase === "gates"
            ? "펄스가 중심에 닿을 때 클릭 또는 터치"
            : "앵커 가까이 이동해 경계를 드래그, 더블탭으로 CUT";
        ctx.fillStyle = "rgba(245, 251, 255, 0.92)";
        ctx.font = "700 15px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(hint, 24, 120);
      }

      function wrapText(text, maxWidth, font) {
        ctx.font = font;
        const words = text.split(" ");
        const lines = [];
        let line = "";

        for (const word of words) {
          const next = line ? `${line} ${word}` : word;
          if (ctx.measureText(next).width <= maxWidth) {
            line = next;
          } else if (line) {
            lines.push(line);
            line = word;
          } else {
            let buffer = "";
            for (const char of word) {
              const candidate = buffer + char;
              if (ctx.measureText(candidate).width <= maxWidth || !buffer) {
                buffer = candidate;
              } else {
                lines.push(buffer);
                buffer = char;
              }
            }
            line = buffer;
          }
        }

        if (line) {
          lines.push(line);
        }
        return lines;
      }

      function drawCard(title, subtitle, lines, footer, accent, buttonLabel) {
        const x = 110;
        const y = 88;
        const width = VIEW.width - 220;
        const height = VIEW.height - 176;

        roundedRect(x, y, width, height, 30);
        const card = ctx.createLinearGradient(x, y, x + width, y + height);
        card.addColorStop(0, "rgba(9, 14, 29, 0.88)");
        card.addColorStop(1, "rgba(14, 22, 44, 0.84)");
        ctx.fillStyle = card;
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 1.2;
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = "800 15px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(subtitle, x + 36, y + 42);

        ctx.fillStyle = palette.ink;
        ctx.font = "800 42px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(title, x + 36, y + 94);

        let cursorY = y + 136;
        for (const line of lines) {
          const wrapped = wrapText(line, width - 72, "600 20px 'Avenir Next', 'Segoe UI', sans-serif");
          ctx.fillStyle = line.startsWith("조작")
            ? "#d7f7ff"
            : line.startsWith("클리어 조건")
              ? "#fff4c8"
              : line.startsWith("실패 조건")
                ? "#ffd5d9"
                : "rgba(245, 251, 255, 0.92)";
          ctx.font = "600 20px 'Avenir Next', 'Segoe UI', sans-serif";
          for (const wrappedLine of wrapped) {
            ctx.fillText(wrappedLine, x + 36, cursorY);
            cursorY += 28;
          }
          cursorY += 10;
        }

        roundedRect(x + 36, y + height - 86, 240, 54, 20);
        const button = ctx.createLinearGradient(x + 36, y + height - 86, x + 276, y + height - 32);
        button.addColorStop(0, accent);
        button.addColorStop(1, "#ffffff");
        ctx.fillStyle = button;
        ctx.fill();
        ctx.fillStyle = palette.bg0;
        ctx.font = "800 20px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(buttonLabel, x + 64, y + height - 52);

        ctx.fillStyle = palette.muted;
        ctx.font = "600 17px 'Avenir Next', 'Segoe UI', sans-serif";
        const footerLines = wrapText(footer, width - 330, "600 17px 'Avenir Next', 'Segoe UI', sans-serif");
        footerLines.forEach((footerLine, index) => {
          ctx.fillText(footerLine, x + 320, y + height - 60 + index * 22);
        });
      }

      function drawOverlay() {
        if (state.mode === "running") {
          return;
        }

        ctx.fillStyle = "rgba(4, 7, 16, 0.58)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        if (state.mode === "menu") {
          drawCard(
            STAGE_TITLE,
            "수정 주조소 / Light-shadow action",
            [
              STAGE_DESCRIPTION,
              `조작: ${CONTROLS_TEXT}`,
              `클리어 조건: ${CLEAR_TEXT}`,
              `실패 조건: ${FAIL_TEXT}`,
            ],
            "터치 한 번으로 시작할 수 있고, 모바일에서는 화면 버튼으로 이동한 뒤 앵커를 드래그해 봉합합니다.",
            palette.cyan,
            "터치 또는 Enter로 시작"
          );
          return;
        }

        const litCount = state.altars.filter((altar) => altar.lit).length;
        drawCard(
          state.mode === "cleared" ? "Foundry Synchronized" : "Thread Lost",
          state.mode === "cleared" ? "ALL ALTARS ACTIVE" : "SYSTEM DESYNC",
          [
            state.resultWord,
            `점등 제단: ${litCount} / 4`,
            `놓친 창: ${state.misses} / ${state.maxMisses}`,
            `경과 시간: ${state.lastRunTime.toFixed(1)}초`,
          ],
          "다시 도전하려면 캔버스를 터치하거나 Enter를 누르세요.",
          state.mode === "cleared" ? palette.cyan : palette.red,
          "다시 시작"
        );
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        const shake = state.shake > 0 ? state.shake : 0;
        const offsetX = shake ? (Math.random() - 0.5) * shake : 0;
        const offsetY = shake ? (Math.random() - 0.5) * shake : 0;

        ctx.save();
        ctx.translate(offsetX, offsetY);
        renderBackdrop();
        drawArenaBase();
        drawLight();
        drawAltarsAndBridges();
        drawPillars();
        drawSyncDoors();
        drawPlayer();
        drawParticles();
        drawHud();
        ctx.restore();

        if (state.flash > 0) {
          ctx.fillStyle =
            state.mode === "failed"
              ? `rgba(255, 90, 120, ${state.flash * 0.26})`
              : `rgba(255, 255, 255, ${state.flash * 0.22})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        drawOverlay();
      }

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        accumulator += dt;

        while (accumulator >= FIXED_DT) {
          update(FIXED_DT);
          accumulator -= FIXED_DT;
        }

        if (!lastRenderTimestamp || timestamp - lastRenderTimestamp >= 1000 / 30) {
          render();
          lastRenderTimestamp = timestamp;
        }
        animationFrame = window.requestAnimationFrame(loop);
      }

      window.render_game_to_text = function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          phase: state.phase,
          coordSystem: {
            origin: "top-left",
            x: "right",
            y: "down",
          },
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            exposed: state.player.exposed,
          },
          misses: state.misses,
          heat: Number(state.heat.toFixed(1)),
          syncDoor: state.sync.activeDoor + 1,
          altars: state.altars.map((altar) => ({
            id: altar.id,
            lit: altar.lit,
            active: altar.active,
            progress: Number(altar.progress.toFixed(2)),
          })),
          lightAngle: Number(state.beamAngle.toFixed(2)),
        });
      };

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.altars.forEach((altar) => {
            altar.lit = true;
            altar.active = false;
            altar.progress = 1;
          });
          state.phase = "altars";
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("forced");
          render();
        },
      };

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        canvas.focus({ preventScroll: true });
        try {
          canvas.setPointerCapture?.(event.pointerId);
        } catch (_error) {
          // Synthetic pointer events from automation may not be capturable.
        }
        onPointerDown(event.clientX, event.clientY, event.pointerId);
      });
      canvas.addEventListener("pointermove", (event) => {
        onPointerMove(event.clientX, event.clientY);
      });
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerUp);

      window.addEventListener("keydown", (event) => handleKey(event, true), { passive: false });
      window.addEventListener("keyup", (event) => handleKey(event, false), { passive: false });

      bindMoveButton(document.querySelector("#btn-left"), "left");
      bindMoveButton(document.querySelector("#btn-right"), "right");
      bindMoveButton(document.querySelector("#btn-up"), "up");
      bindMoveButton(document.querySelector("#btn-down"), "down");
      bindCutButton(document.querySelector("#btn-cut"));

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          window.cancelAnimationFrame(animationFrame);
          animationFrame = 0;
          return;
        }
        lastTimestamp = 0;
        lastRenderTimestamp = 0;
        if (!animationFrame) {
          animationFrame = window.requestAnimationFrame(loop);
        }
      });

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(loop);

      window.addEventListener("beforeunload", () => {
        window.cancelAnimationFrame(animationFrame);
      });
    </script>
  </body>
</html>
