<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Motel: Weather Mix</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23f472b6'/%3E%3Cstop offset='1' stop-color='%2338bdf8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='18' fill='%23090b18'/%3E%3Cpath d='M16 38c4-11 12-18 24-20-3 4-4 7-4 10 5-4 11-6 17-5-8 7-11 14-11 22-12 1-20-1-26-7Z' fill='url(%23g)'/%3E%3Ccircle cx='47' cy='18' r='5' fill='%23fde68a'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(251, 191, 36, 0.16), transparent 22%),
          radial-gradient(circle at 82% 18%, rgba(129, 140, 248, 0.22), transparent 28%),
          linear-gradient(180deg, #070917 0%, #0f172b 46%, #1c1122 100%);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(244, 114, 182, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 10, 20, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(244, 114, 182, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dream Motel: Weather Mix. 캔버스를 터치하거나 클릭하면 시작합니다.
      터치 또는 마우스 드래그로 구름 이동, 탭으로 바람 방향 전환, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      목격 게이지를 낮게 유지한 채 활공체를 3개 관측대에 모두 착륙시키면 클리어. 목격 게이지가 끝까지 차거나 활공체가 폭풍 코어에 빨려 들어가면 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dream Motel: Weather Mix"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TARGET_ROUTE = [0, 2, 1];
      const META_TITLE = "Dream Motel: Weather Mix";
      const META_DESCRIPTION = "구름 결을 섞어 종이 활공체를 숨기듯 밀어 보내는 드림 모텔 기류 퍼즐";
      const META_CONTROLS =
        "터치 또는 마우스 드래그로 구름 이동, 탭으로 바람 방향 전환, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const META_CLEAR =
        "목격 게이지를 낮게 유지한 채 활공체를 3개 관측대에 모두 착륙시키면 클리어";
      const META_FAIL =
        "목격 게이지가 끝까지 차거나 활공체가 폭풍 코어에 빨려 들어가면 실패";
      const relayContext =
        window.RelayRuntime?.readContext("dream-motel-weather-mixing-witness") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };
      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;

      const OBSERVATORIES = [
        { x: 190, y: 146, ring: 34, label: "North Lens", accent: "#fbbf24" },
        { x: 482, y: 110, ring: 34, label: "Moon Deck", accent: "#f472b6" },
        { x: 774, y: 152, ring: 34, label: "Sky Loop", accent: "#38bdf8" },
      ];

      const SPOTLIGHTS = [
        {
          originX: 118,
          originY: 316,
          baseAngle: -0.96,
          sweep: 0.72,
          speed: 0.75,
          width: 0.24,
          range: 316,
          power: 0.2,
          color: "rgba(255, 214, 153, 0.15)",
        },
        {
          originX: 276,
          originY: 304,
          baseAngle: -1.16,
          sweep: 0.88,
          speed: 0.92,
          width: 0.22,
          range: 330,
          power: 0.22,
          color: "rgba(255, 255, 222, 0.14)",
        },
        {
          originX: 702,
          originY: 302,
          baseAngle: -2.08,
          sweep: 0.92,
          speed: 0.88,
          width: 0.22,
          range: 332,
          power: 0.24,
          color: "rgba(199, 241, 255, 0.14)",
        },
        {
          originX: 848,
          originY: 320,
          baseAngle: -2.3,
          sweep: 0.76,
          speed: 1.02,
          width: 0.23,
          range: 322,
          power: 0.28,
          color: "rgba(243, 232, 255, 0.14)",
        },
      ];

      const input = {
        pointerId: null,
        pointerCanvas: { x: VIEW.width / 2, y: VIEW.height / 2 },
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        witnessMeter: 0.14,
        deliveredCount: 0,
        spawnTimer: 0,
        tipPulse: 0,
        flashAlpha: 0,
        shake: 0,
        popupText: "",
        popupTimer: 0,
        lastReason: "",
        lastReasonDetail: "",
        glider: null,
        clouds: [],
        particles: [],
        ribbons: [],
        skylinePulse: 0,
        previewPath: [],
        previewTimer: 0,
        drag: null,
        hoveredCloudId: null,
        starSeed: 31813,
        runSeed: 912341,
        alarmBeats: 0,
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function smoothstep(edge0, edge1, value) {
        const t = clamp((value - edge0) / (edge1 - edge0 || 1), 0, 1);
        return t * t * (3 - 2 * t);
      }

      function length2D(x, y) {
        return Math.hypot(x, y);
      }

      function angleDelta(a, b) {
        let delta = a - b;
        while (delta > Math.PI) delta -= Math.PI * 2;
        while (delta < -Math.PI) delta += Math.PI * 2;
        return delta;
      }

      function random() {
        state.runSeed = (1664525 * state.runSeed + 1013904223) >>> 0;
        return state.runSeed / 4294967296;
      }

      function currentTarget() {
        return OBSERVATORIES[TARGET_ROUTE[state.deliveredCount]] || null;
      }

      function createClouds() {
        return [
          {
            id: "suite-a",
            label: "Suite A",
            x: 250,
            y: 374,
            radius: 64,
            angle: -0.92,
            strength: 238,
            cover: 0.96,
            glow: "#f9a8d4",
            body: "#fbcfe8",
            shadow: "#be185d",
          },
          {
            id: "suite-b",
            label: "Suite B",
            x: 506,
            y: 292,
            radius: 72,
            angle: -1.48,
            strength: 264,
            cover: 0.88,
            glow: "#c4b5fd",
            body: "#ddd6fe",
            shadow: "#6d28d9",
          },
          {
            id: "suite-c",
            label: "Suite C",
            x: 744,
            y: 334,
            radius: 66,
            angle: -2.52,
            strength: 246,
            cover: 0.92,
            glow: "#67e8f9",
            body: "#cffafe",
            shadow: "#0f766e",
          },
        ];
      }

      function createGlider() {
        return {
          x: 480,
          y: 424,
          vx: 66,
          vy: -62,
          angle: -0.24,
          hidden: 0,
          wobble: 0,
          drift: 0,
          active: true,
        };
      }

      function addBurst(x, y, color, count, speedMin, speedMax, life, size) {
        const total = prefersReducedMotion ? Math.min(8, count) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = random() * Math.PI * 2;
          const speed = lerp(speedMin, speedMax, random());
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life,
            maxLife: life,
            size: lerp(size * 0.5, size, random()),
            color,
          });
        }
      }

      function addRibbon(x, y, angle, color) {
        state.ribbons.push({
          x,
          y,
          angle,
          life: 0.44,
          maxLife: 0.44,
          color,
        });
      }

      function pushPopup(text) {
        state.popupText = text;
        state.popupTimer = 1.35;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetTransientState() {
        state.particles = [];
        state.ribbons = [];
        state.previewPath = [];
        state.previewTimer = 0;
        state.flashAlpha = 0;
        state.shake = 0;
        state.popupText = "";
        state.popupTimer = 0;
        state.drag = null;
        state.hoveredCloudId = null;
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.witnessMeter = 0.14;
        state.deliveredCount = 0;
        state.spawnTimer = 0;
        state.tipPulse = 0;
        state.glider = createGlider();
        state.clouds = createClouds();
        state.skylinePulse = 0;
        state.lastReason = "";
        state.lastReasonDetail = "";
        state.runSeed = 912341;
        state.alarmBeats = 0;
        resetTransientState();
        pushPopup("Suite A부터 바람 결을 섞어 보세요");
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.flashAlpha = 0.5;
        state.shake = Math.max(state.shake, 11);
        state.lastReason = reason;
        state.lastReasonDetail =
          reason === "storm-core"
            ? "폭풍 코어에 휩쓸렸습니다"
            : "목격 게이지가 한계치를 넘겼습니다";
        addBurst(
          state.glider ? state.glider.x : VIEW.width / 2,
          state.glider ? state.glider.y : VIEW.height / 2,
          reason === "storm-core" ? "rgba(56, 189, 248, 0.95)" : "rgba(244, 114, 182, 0.95)",
          36,
          90,
          280,
          0.8,
          14
        );
        pushPopup(reason === "storm-core" ? "폭풍 코어 붕괴" : "시선 폭주");
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flashAlpha = 0.36;
        state.shake = Math.max(state.shake, 7);
        addBurst(VIEW.width / 2, 176, "rgba(250, 204, 21, 0.98)", 44, 90, 260, 1.15, 15);
        addBurst(VIEW.width / 2, 228, "rgba(96, 250, 184, 0.94)", 28, 60, 210, 0.95, 11);
        pushPopup("세 관측대 착륙 성공");
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function cloudDirectionLabel(cloud) {
        const x = Math.cos(cloud.angle);
        const y = Math.sin(cloud.angle);
        if (Math.abs(x) > Math.abs(y)) {
          return x > 0 ? "동향" : "서향";
        }
        return y < 0 ? "상승" : "하강";
      }

      function stormCoreState() {
        const phase = state.elapsed * (0.64 + state.deliveredCount * 0.12) + state.deliveredCount * 0.7;
        return {
          x: 488 + Math.sin(phase) * (118 + state.deliveredCount * 24),
          y: 256 + Math.cos(phase * 0.72) * (72 - state.deliveredCount * 8),
          radius: 46 + state.deliveredCount * 7,
          pullRadius: 176 + state.deliveredCount * 14,
          pull: 246 + state.deliveredCount * 42,
        };
      }

      function activeSpotlights() {
        return SPOTLIGHTS.slice(0, 2 + state.deliveredCount);
      }

      function spotlightAngle(light) {
        const tempo = state.elapsed * (light.speed + state.deliveredCount * 0.1);
        return light.baseAngle + Math.sin(tempo) * light.sweep;
      }

      function windFieldAt(x, y) {
        const target = currentTarget();
        const targetDx = target ? target.x - x : 0;
        const targetDy = target ? target.y - y : -120;
        const targetDistance = Math.max(1, length2D(targetDx, targetDy));
        let ax = (targetDx / targetDistance) * 12;
        let ay = (targetDy / targetDistance) * 12 + 30;
        let cover = 0;

        for (const cloud of state.clouds) {
          const dx = x - cloud.x;
          const dy = y - cloud.y;
          const distance = Math.max(1, length2D(dx, dy));
          const reach = cloud.radius * 2.22;
          if (distance > reach) {
            continue;
          }
          const strengthRatio = 1 - distance / reach;
          ax += Math.cos(cloud.angle) * cloud.strength * strengthRatio;
          ay += Math.sin(cloud.angle) * cloud.strength * strengthRatio;
          cover = Math.max(
            cover,
            smoothstep(cloud.radius * 1.42, cloud.radius * 0.28, distance) * cloud.cover
          );
        }

        const core = stormCoreState();
        const coreDx = core.x - x;
        const coreDy = core.y - y;
        const coreDistance = Math.max(1, length2D(coreDx, coreDy));
        if (coreDistance < core.pullRadius) {
          const pullRatio = 1 - coreDistance / core.pullRadius;
          ax += (coreDx / coreDistance) * core.pull * pullRatio;
          ay += (coreDy / coreDistance) * core.pull * pullRatio;
        }

        return { ax, ay, cover, core, targetDistance };
      }

      function computeExposure(glider) {
        if (!glider || !glider.active) {
          return 0;
        }
        const visibility = clamp(1 - glider.hidden, 0.08, 1);
        const speed = length2D(glider.vx, glider.vy);
        const stillness = 1 - clamp(speed / 180, 0, 1);
        const target = currentTarget();
        let exposure = 0;

        for (const light of activeSpotlights()) {
          const angle = spotlightAngle(light);
          const dx = glider.x - light.originX;
          const dy = glider.y - light.originY;
          const distance = length2D(dx, dy);
          if (distance > light.range) {
            continue;
          }
          const delta = Math.abs(angleDelta(Math.atan2(dy, dx), angle));
          if (delta > light.width) {
            continue;
          }
          const beamRatio = 1 - delta / light.width;
          const distanceRatio = 1 - distance / light.range;
          exposure += beamRatio * distanceRatio * light.power;
        }

        if (target) {
          const proximity = 1 - clamp(length2D(glider.x - target.x, glider.y - target.y) / 250, 0, 1);
          exposure += proximity * (0.09 + state.deliveredCount * 0.06);
        }

        exposure *= visibility * (0.84 + (1 - stillness) * 0.24);
        return exposure;
      }

      function maybeDeliverGlider() {
        const glider = state.glider;
        const target = currentTarget();
        if (!glider || !glider.active || !target) {
          return;
        }
        const dx = glider.x - target.x;
        const dy = glider.y - target.y;
        const distance = length2D(dx, dy);
        const speed = length2D(glider.vx, glider.vy);
        if (distance > target.ring || speed > 116) {
          return;
        }
        glider.active = false;
        state.deliveredCount += 1;
        state.witnessMeter = Math.max(0.06, state.witnessMeter - 0.16);
        state.spawnTimer = state.deliveredCount >= 3 ? 0 : 1.04;
        addBurst(target.x, target.y, target.accent, 30, 38, 184, 0.9, 12);
        pushPopup(`${target.label} 착륙 완료`);
        state.flashAlpha = Math.max(state.flashAlpha, 0.22);
        state.shake = Math.max(state.shake, 5);
        if (state.deliveredCount >= 3) {
          clearStage();
          return;
        }
        const nextTarget = currentTarget();
        if (nextTarget) {
          pushPopup(`${nextTarget.label} 경로를 다시 짜세요`);
        }
      }

      function spawnNextGlider() {
        state.glider = createGlider();
        state.spawnTimer = 0;
        addBurst(480, 424, "rgba(255,255,255,0.82)", 16, 30, 110, 0.7, 8);
      }

      function updateGlider(dt) {
        const glider = state.glider;
        if (!glider || !glider.active) {
          return;
        }
        const field = windFieldAt(glider.x, glider.y);
        glider.hidden = lerp(glider.hidden, field.cover, 0.16);
        glider.vx += field.ax * dt;
        glider.vy += field.ay * dt;
        glider.vx *= 0.993;
        glider.vy *= 0.992;

        const speed = length2D(glider.vx, glider.vy);
        const maxSpeed = 220;
        if (speed > maxSpeed) {
          const ratio = maxSpeed / speed;
          glider.vx *= ratio;
          glider.vy *= ratio;
        }

        glider.x += glider.vx * dt;
        glider.y += glider.vy * dt;
        glider.wobble += dt * (3.1 + state.deliveredCount * 0.45);
        glider.angle = Math.atan2(glider.vy, glider.vx);

        if (glider.x < 30) {
          glider.x = 30;
          glider.vx = Math.abs(glider.vx) * 0.5;
          state.witnessMeter = clamp(state.witnessMeter + 0.012, 0, 1);
        } else if (glider.x > VIEW.width - 30) {
          glider.x = VIEW.width - 30;
          glider.vx = -Math.abs(glider.vx) * 0.5;
          state.witnessMeter = clamp(state.witnessMeter + 0.012, 0, 1);
        }

        if (glider.y < 54) {
          glider.y = 54;
          glider.vy = Math.abs(glider.vy) * 0.46;
          state.witnessMeter = clamp(state.witnessMeter + 0.008, 0, 1);
        } else if (glider.y > 496) {
          glider.y = 496;
          glider.vy = -Math.abs(glider.vy) * 0.52;
          glider.vx *= 0.82;
          state.witnessMeter = clamp(state.witnessMeter + 0.018, 0, 1);
        }

        const exposure = computeExposure(glider);
        const driftDrain = 0.06 + glider.hidden * 0.16;
        state.witnessMeter = clamp(state.witnessMeter + exposure * dt - driftDrain * dt, 0, 1);
        state.alarmBeats = lerp(state.alarmBeats, state.witnessMeter, 0.06);

        if (!prefersReducedMotion && random() > 0.62) {
          addRibbon(
            glider.x - Math.cos(glider.angle) * 18,
            glider.y - Math.sin(glider.angle) * 18,
            glider.angle + Math.sin(glider.wobble) * 0.1,
            glider.hidden > 0.45 ? "rgba(255,255,255,0.22)" : "rgba(251, 191, 36, 0.26)"
          );
        }

        if (length2D(glider.x - field.core.x, glider.y - field.core.y) < field.core.radius * 0.74) {
          failStage("storm-core");
          return;
        }
        if (state.witnessMeter >= 0.999) {
          failStage("witness-meter");
          return;
        }
        maybeDeliverGlider();
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          particle.vy += 60 * dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }

        for (let index = state.ribbons.length - 1; index >= 0; index -= 1) {
          const ribbon = state.ribbons[index];
          ribbon.life -= dt;
          ribbon.x -= Math.cos(ribbon.angle) * 24 * dt;
          ribbon.y -= Math.sin(ribbon.angle) * 24 * dt;
          if (ribbon.life <= 0) {
            state.ribbons.splice(index, 1);
          }
        }
      }

      function updatePreview(dt) {
        state.previewTimer -= dt;
        if (state.previewTimer > 0) {
          return;
        }
        state.previewTimer = 0.18;
        if (!state.glider || !state.glider.active || state.mode !== "running") {
          state.previewPath = [];
          return;
        }
        const points = [];
        let x = state.glider.x;
        let y = state.glider.y;
        let vx = state.glider.vx;
        let vy = state.glider.vy;
        for (let index = 0; index < 24; index += 1) {
          const field = windFieldAt(x, y);
          vx += field.ax * FIXED_DT * 0.8;
          vy += field.ay * FIXED_DT * 0.8;
          vx *= 0.993;
          vy *= 0.992;
          const speed = length2D(vx, vy);
          if (speed > 220) {
            const ratio = 220 / speed;
            vx *= ratio;
            vy *= ratio;
          }
          x += vx * FIXED_DT * 1.35;
          y += vy * FIXED_DT * 1.35;
          points.push({ x, y });
          if (x < 18 || x > VIEW.width - 18 || y < 36 || y > VIEW.height - 18) {
            break;
          }
        }
        state.previewPath = points;
      }

      function update(dt) {
        state.tipPulse += dt;
        state.skylinePulse += dt * 0.8;
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * 0.72);
        state.shake = Math.max(0, state.shake - dt * 12);
        if (state.popupTimer > 0) {
          state.popupTimer = Math.max(0, state.popupTimer - dt);
        }
        updateParticles(dt);

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        state.lastRunTime = state.elapsed;
        updatePreview(dt);

        if (state.spawnTimer > 0) {
          state.spawnTimer -= dt;
          if (state.spawnTimer <= 0) {
            spawnNextGlider();
          }
        }

        updateGlider(dt);
      }

      function drawRoundedPanel(x, y, width, height, radius, fill, stroke) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
        if (stroke) {
          ctx.strokeStyle = stroke;
          ctx.stroke();
        }
      }

        const angle = spotlightAngle(light);
        const left = angle - light.width;
        const right = angle + light.width;
        const x1 = light.originX + Math.cos(left) * light.range;
        const y1 = light.originY + Math.sin(left) * light.range;
        const x2 = light.originX + Math.cos(right) * light.range;
        const y2 = light.originY + Math.sin(right) * light.range;
        const gradient = ctx.createRadialGradient(
          light.originX,
          light.originY,
          12,
          light.originX,
          light.originY,
          light.range
        );
        gradient.addColorStop(0, light.color.replace("0.15", "0.26").replace("0.14", "0.24"));
        gradient.addColorStop(0.3, light.color);
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(light.originX, light.originY);
        ctx.lineTo(x1, y1);
        ctx.arc(light.originX, light.originY, light.range, left, right);
        ctx.closePath();
        ctx.fill();

      function drawCloud(cloud) {
        const hovered = state.hoveredCloudId === cloud.id;
        const active = state.drag?.cloudId === cloud.id;
        const pulse = 0.64 + Math.sin(state.tipPulse * 3.6 + cloud.x * 0.01) * 0.08;

        ctx.save();
        ctx.translate(cloud.x, cloud.y);
        ctx.shadowColor = cloud.glow;
        ctx.shadowBlur = active ? 30 : hovered ? 24 : 20;
        const halo = ctx.createRadialGradient(0, 0, 10, 0, 0, cloud.radius * 1.36);
        halo.addColorStop(0, "rgba(255,255,255,0.2)");
        halo.addColorStop(0.25, cloud.glow.replace(")", ", 0.24)"));
        halo.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(0, 0, cloud.radius * 1.36, 0, Math.PI * 2);
        ctx.fill();

        const body = ctx.createLinearGradient(-cloud.radius, -cloud.radius, cloud.radius, cloud.radius);
        body.addColorStop(0, "rgba(255,255,255,0.95)");
        body.addColorStop(0.55, cloud.body);
        body.addColorStop(1, "rgba(255,255,255,0.65)");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(-cloud.radius * 0.34, 6, cloud.radius * 0.48, Math.PI * 0.9, Math.PI * 1.95);
        ctx.arc(cloud.radius * 0.02, -cloud.radius * 0.08, cloud.radius * 0.58, Math.PI, Math.PI * 2);
        ctx.arc(cloud.radius * 0.42, 8, cloud.radius * 0.42, Math.PI * 1.08, Math.PI * 1.96);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = active
          ? "rgba(255,255,255,0.86)"
          : hovered
            ? "rgba(255,255,255,0.72)"
            : "rgba(255,255,255,0.28)";
        ctx.lineWidth = active ? 2.6 : 1.4;
        ctx.beginPath();
        ctx.arc(0, 0, cloud.radius + 8 + pulse * 5, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = cloud.shadow;
        ctx.lineWidth = 5;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(cloud.angle) * 42, Math.sin(cloud.angle) * 42);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255,255,255,0.94)";
        ctx.lineWidth = 2.8;
        ctx.beginPath();
        ctx.moveTo(Math.cos(cloud.angle) * 28, Math.sin(cloud.angle) * 28);
        ctx.lineTo(Math.cos(cloud.angle) * 42, Math.sin(cloud.angle) * 42);
        ctx.lineTo(
          Math.cos(cloud.angle) * 42 - Math.cos(cloud.angle - 0.45) * 10,
          Math.sin(cloud.angle) * 42 - Math.sin(cloud.angle - 0.45) * 10
        );
        ctx.moveTo(Math.cos(cloud.angle) * 42, Math.sin(cloud.angle) * 42);
        ctx.lineTo(
          Math.cos(cloud.angle) * 42 - Math.cos(cloud.angle + 0.45) * 10,
          Math.sin(cloud.angle) * 42 - Math.sin(cloud.angle + 0.45) * 10
        );
        ctx.stroke();

        ctx.fillStyle = "rgba(8, 10, 24, 0.62)";
        drawRoundedPanel(-54, cloud.radius + 18, 108, 42, 18, "rgba(8, 10, 24, 0.62)", "rgba(255,255,255,0.08)");
        ctx.fillStyle = "#fff7ed";
        ctx.font = "700 12px Avenir Next, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(cloud.label, 0, cloud.radius + 35);
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "700 10px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(cloudDirectionLabel(cloud), 0, cloud.radius + 49);
        ctx.restore();
      }

        for (let ring = 0; ring < 3; ring += 1) {
          ctx.beginPath();
          ctx.arc(core.x, core.y, core.radius + ring * 16 + Math.sin(state.tipPulse * 3 + ring) * 4, 0, Math.PI * 2);

        ctx.translate(core.x, core.y);
        ctx.rotate(state.elapsed * (1.2 + state.deliveredCount * 0.2));

          ctx.beginPath();
          ctx.arc(0, 0, core.radius - arm * 5, start, start + 0.95);
          ctx.stroke();
        }
        ctx.restore();
      }

        let line = "";
        let y = startY;
        for (const word of words) {
          const next = line ? `${line} ${word}` : word;
          if (ctx.measureText(next).width > maxWidth && line) {
            lines.push({ text: line, x, y, color, font });
            line = word;
            y += lineHeight;
          } else {
            line = next;
          }
        }
        if (line) {
          lines.push({ text: line, x, y, color, font });
        }
        return y;
      }

      function drawCenterOverlay(title, subtitle, accent, footer) {
        const panelWidth = 520;
        const panelHeight = 278;
        const x = VIEW.width / 2 - panelWidth / 2;
        const y = VIEW.height / 2 - panelHeight / 2 + 10;
        drawRoundedPanel(
          x,
          y,
          panelWidth,
          panelHeight,
          28,
          "rgba(3, 6, 18, 0.76)",
          "rgba(255,255,255,0.1)"
        );
        const glow = ctx.createLinearGradient(x, y, x + panelWidth, y + panelHeight);
        glow.addColorStop(0, `${accent}22`);
        glow.addColorStop(1, "#ffffff00");
        ctx.fillStyle = glow;
        ctx.fillRect(x, y, panelWidth, panelHeight);
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 36px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(title, x + 34, y + 64);
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.font = "700 16px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(subtitle, x + 34, y + 94);
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "600 13px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(footer, x + 34, y + 244);
      }

      function drawMenu() {
        drawCenterOverlay(
          "Dream Motel: Weather Mix",
          "구름 결을 섞어 종이 활공체를 숨기듯 밀어 보내는 드림 모텔 기류 퍼즐",
          "#f472b6",
          "캔버스를 터치 또는 클릭하면 바로 시작합니다"
        );

        const lines = [];
        wrapText(
          lines,
          META_CONTROLS,
          258,
          258,
          20,
          444,
          "rgba(255,255,255,0.88)",
          "600 14px Avenir Next, Segoe UI, sans-serif"
        );
        wrapText(
          lines,
          META_CLEAR,
          258,
          332,
          20,
          444,
          "rgba(190, 242, 100, 0.96)",
          "700 14px Avenir Next, Segoe UI, sans-serif"
        );
        wrapText(
          lines,
          META_FAIL,
          258,
          378,
          20,
          444,
          "rgba(251, 146, 160, 0.96)",
          "700 14px Avenir Next, Segoe UI, sans-serif"
        );
        for (const line of lines) {
          ctx.fillStyle = line.color;
          ctx.font = line.font;
          ctx.fillText(line.text, line.x, line.y);
        }

        ctx.fillStyle = "rgba(255,255,255,0.64)";
        ctx.font = "700 12px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText("드래그로 구름 위치를 바꾸고, 짧게 탭하면 해당 구름의 바람이 반전됩니다.", 258, 228);
      }

      function drawFinishOverlay() {
        if (state.mode !== "failed" && state.mode !== "cleared") {
          return;
        }
        const clear = state.mode === "cleared";
        drawCenterOverlay(
          clear ? "Motel Route Secured" : "Witnesses Spotted You",
          clear ? "세 활공체가 모두 무사히 착륙했습니다" : state.lastReasonDetail,
          clear ? "#facc15" : "#fb7185",
          "터치, 클릭, Enter로 재시작"
        );
        ctx.fillStyle = clear ? "rgba(190, 242, 100, 0.94)" : "rgba(254, 202, 202, 0.94)";
        ctx.font = "700 14px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(`착륙 ${state.deliveredCount}/3`, 258, 254);
        ctx.fillText(`기록 ${state.lastRunTime.toFixed(1)}s`, 368, 254);
        ctx.fillText(
          clear ? "숨김 유지 성공" : state.lastReason === "storm-core" ? "폭풍 코어 흡입" : "목격 게이지 초과",
          476,
          254
        );
        ctx.fillStyle = "rgba(255,255,255,0.76)";
        ctx.font = "600 14px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText("첫 성공 후에는 스포트라이트가 늘어나므로 다음 활공 전마다 구름을 재배치하세요.", 258, 320);
        ctx.fillText("관측대 근처에서 속도를 낮추면 착륙 판정이 쉬워집니다.", 258, 346);
      }

      function drawFrame() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = state.shake > 0 ? Math.sin(state.tipPulse * 28) * state.shake : 0;
        const shakeY = state.shake > 0 ? Math.cos(state.tipPulse * 22) * state.shake * 0.5 : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawSky();
        drawStormCore();
        drawCity();
        drawObservatories();
        drawPreviewPath();
        for (const cloud of state.clouds) {
          drawCloud(cloud);
        }
        drawGlider();
        drawParticles();
        drawHUD();
        if (state.mode === "menu") {
          drawMenu();
        } else {
          drawFinishOverlay();
        }
        ctx.restore();

        if (state.flashAlpha > 0) {
          ctx.fillStyle =
            state.mode === "failed"
              ? `rgba(251, 113, 133, ${state.flashAlpha.toFixed(3)})`
              : `rgba(250, 204, 21, ${state.flashAlpha.toFixed(3)})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        if (state.mode === "running") {
          const pulse = 0.4 + Math.sin(state.tipPulse * 8) * 0.1;
          ctx.fillStyle = `rgba(255,255,255,${(0.1 + pulse * 0.08).toFixed(3)})`;
          ctx.font = "700 11px Avenir Next, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("구름 짧게 탭 = 방향 반전 / 드래그 = 경로 수정", VIEW.width / 2, VIEW.height - 18);
          ctx.textAlign = "left";
        }
      }

      function render() {
        drawFrame();
      }

      function step(dt) {
        update(Math.min(dt, MAX_DT));
        render();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        step(delta);
        animationFrame = window.requestAnimationFrame(frame);
      }

      function pointerToCanvas(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function nearestCloud(point) {
        let winner = null;
        let bestDistance = Infinity;
        for (const cloud of state.clouds) {
          const distance = length2D(point.x - cloud.x, point.y - cloud.y);
          if (distance < bestDistance) {
            bestDistance = distance;
            winner = cloud;
          }
        }
        return bestDistance < 118 ? winner : null;
      }

      function startFromOverlay() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function toggleCloud(cloud) {
        if (!cloud) {
          return;
        }
        cloud.angle += Math.PI;
        addBurst(cloud.x, cloud.y, "rgba(255,255,255,0.72)", 10, 16, 90, 0.5, 6);
        pushPopup(`${cloud.label} ${cloudDirectionLabel(cloud)} 결로 전환`);
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus({ preventScroll: true });
        const point = pointerToCanvas(event);
        input.pointerId = event.pointerId;
        input.pointerCanvas = point;

        if (state.mode !== "running") {
          startFromOverlay();
          return;
        }

        const cloud = nearestCloud(point);
        state.hoveredCloudId = cloud?.id || null;
        if (cloud) {
          state.drag = {
            cloudId: cloud.id,
            startPoint: point,
            startCloudX: cloud.x,
            startCloudY: cloud.y,
            moved: false,
          };
        } else {
          state.drag = {
            cloudId: null,
            startPoint: point,
            moved: false,
          };
        }
        canvas.setPointerCapture(event.pointerId);
      }

      function handlePointerMove(event) {
        const point = pointerToCanvas(event);
        input.pointerCanvas = point;
        if (state.mode !== "running") {
          return;
        }
        const hover = nearestCloud(point);
        state.hoveredCloudId = hover?.id || null;

        if (!state.drag) {
          return;
        }
        const moveDistance = length2D(
          point.x - state.drag.startPoint.x,
          point.y - state.drag.startPoint.y
        );
        if (moveDistance > 8) {
          state.drag.moved = true;
        }
        if (!state.drag.cloudId) {
          return;
        }
        const cloud = state.clouds.find((entry) => entry.id === state.drag.cloudId);
        if (!cloud) {
          return;
        }
        cloud.x = clamp(state.drag.startCloudX + (point.x - state.drag.startPoint.x), 76, VIEW.width - 76);
        cloud.y = clamp(state.drag.startCloudY + (point.y - state.drag.startPoint.y), 88, VIEW.height - 108);
      }

      function releaseDrag(event) {
        if (event && input.pointerId !== null && event.pointerId !== input.pointerId) {
          return;
        }
        if (event && canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
        if (state.mode === "running" && state.drag && !state.drag.moved) {
          const cloud =
            state.drag.cloudId
              ? state.clouds.find((entry) => entry.id === state.drag.cloudId)
              : nearestCloud(input.pointerCanvas);
          toggleCloud(cloud);
        }
        state.drag = null;
        input.pointerId = null;
      }

      function handleKeyDown(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          startFromOverlay();
          return;
        }
        if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          if (!document.fullscreenElement) {
            canvas.requestFullscreen?.().catch(() => {});
          } else {
            document.exitFullscreen?.().catch(() => {});
          }
        }
        if (state.mode !== "running") {
          return;
        }
        if (event.key === "1") toggleCloud(state.clouds[0]);
        if (event.key === "2") toggleCloud(state.clouds[1]);
        if (event.key === "3") toggleCloud(state.clouds[2]);
      }

      function renderGameToText() {
        const glider = state.glider;
        const target = currentTarget();
        const core = stormCoreState();
        return JSON.stringify({
          mode: state.mode,
          coordinateSystem: "origin top-left, +x right, +y down",
          delivered: state.deliveredCount,
          target: target
            ? { label: target.label, x: Number(target.x.toFixed(1)), y: Number(target.y.toFixed(1)) }
            : null,
          witnessMeter: Number(state.witnessMeter.toFixed(3)),
          glider: glider
            ? {
                active: !!glider.active,
                x: Number(glider.x.toFixed(1)),
                y: Number(glider.y.toFixed(1)),
                vx: Number(glider.vx.toFixed(1)),
                vy: Number(glider.vy.toFixed(1)),
                hidden: Number(glider.hidden.toFixed(2)),
              }
            : null,
          stormCore: {
            x: Number(core.x.toFixed(1)),
            y: Number(core.y.toFixed(1)),
            radius: Number(core.radius.toFixed(1)),
            pullRadius: Number(core.pullRadius.toFixed(1)),
          },
          clouds: state.clouds.map((cloud) => ({
            id: cloud.id,
            x: Number(cloud.x.toFixed(1)),
            y: Number(cloud.y.toFixed(1)),
            direction: cloudDirectionLabel(cloud),
            angle: Number(cloud.angle.toFixed(2)),
          })),
          popup: state.popupText || "",
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const stepCount = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < stepCount; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageMeta = {
        id: "dream-motel-weather-mixing-witness",
        title: META_TITLE,
        description: META_DESCRIPTION,
        creator: {
          name: "jungcollin",
          github: "jungcollin",
        },
        genre: "Climate puzzler / 목격 게이지",
        clearCondition: META_CLEAR,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.deliveredCount = 3;
          state.witnessMeter = 0.21;
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          state.witnessMeter = 1;
          failStage("witness-meter");
          render();
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", releaseDrag);
      canvas.addEventListener("pointercancel", releaseDrag);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("keydown", handleKeyDown);

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
