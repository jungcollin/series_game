<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Gravity Fold</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(122, 211, 255, 0.15), transparent 30%),
          radial-gradient(circle at bottom, rgba(255, 126, 95, 0.12), transparent 40%),
          #07111d;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 17, 29, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 50% 15%, rgba(147, 197, 253, 0.1), transparent 26%),
          linear-gradient(180deg, #09121f 0%, #08131f 38%, #170c14 100%);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.92);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 14px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 12px calc(14px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(168, 242, 255, 0.25);
        border-radius: 18px;
        min-width: 76px;
        min-height: 58px;
        padding: 0 14px;
        background:
          linear-gradient(180deg, rgba(13, 27, 40, 0.94), rgba(10, 20, 31, 0.78));
        color: #ecfeff;
        font: 800 18px/1 "Avenir Next Condensed", "Trebuchet MS", sans-serif;
        letter-spacing: 0.08em;
        box-shadow:
          0 12px 24px rgba(3, 7, 18, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        border-color: rgba(251, 191, 36, 0.75);
        background:
          linear-gradient(180deg, rgba(20, 50, 74, 0.98), rgba(10, 25, 42, 0.92));
        box-shadow:
          0 0 0 1px rgba(251, 191, 36, 0.2),
          0 12px 30px rgba(56, 189, 248, 0.28);
      }

      .mobile-btn--wide {
        min-width: 92px;
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-btn {
          min-width: 68px;
          min-height: 54px;
          border-radius: 16px;
          font-size: 16px;
        }

        .mobile-btn--wide {
          min-width: 86px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Gravity Fold. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은
      좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 픽업 선택 전에 페널티 아이콘 확인, 모바일은 터치·드래그
      이며, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하고 화면 버튼도 함께 제공됩니다.
      클리어 조건은 저주를 버티며 코어를 균열 없이 슬롯까지 운반, 실패 조건은 저주 한계 초과 또는 충격 게이지 최대 입니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Crystal Foundry: Gravity Fold"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작 버튼">
      <div class="mobile-controls__row">
        <button class="mobile-btn" type="button" data-control="left" data-active="false" aria-label="왼쪽 이동">◀</button>
        <button class="mobile-btn mobile-btn--wide" type="button" data-control="stabilize" data-active="false" aria-label="안정화 유지">HOLD</button>
        <button class="mobile-btn" type="button" data-control="right" data-active="false" aria-label="오른쪽 이동">▶</button>
        <button class="mobile-btn mobile-btn--wide" type="button" data-control="fold" data-active="false" aria-label="중력 축 전환">FOLD</button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const META_ID = "crystal-foundry-gravity-folding-cursed";
      const META_TITLE = "Crystal Foundry: Gravity Fold";
      const META_DESCRIPTION =
        "중력 축을 접어 수정 코어를 운반하고, 축복과 저주가 섞인 픽업을 골라 위기를 버티는 배달 액션";
      const META_CONTROLS =
        "좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 픽업 선택 전에 페널티 아이콘 확인, 모바일은 터치·드래그";
      const META_CLEAR = "저주를 버티며 코어를 균열 없이 슬롯까지 운반";
      const META_FAIL = "저주 한계 초과 또는 충격 게이지 최대";
      const TRACK = {
        left: 96,
        right: 864,
        floor: 414,
        ceiling: 126,
        goalX: 858,
      };
      const PLAYER_SIZE = { width: 64, height: 26 };
      const CORE_RADIUS = 18;
      const SHOCK_LIMIT = 100;
      const CURSE_LIMIT = 4;
      const HOLD_DELAY_MS = 220;
      const integerFormat = new Intl.NumberFormat("ko-KR");
      const oneDecimalFormat = new Intl.NumberFormat("ko-KR", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      });
      const relayContext = window.RelayRuntime?.readContext(META_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const input = {
        left: false,
        right: false,
        dragDir: 0,
        stabilize: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let canvasHoldTimer = 0;
      let lastPointerId = null;

      const pointerGesture = {
        active: false,
        startX: 0,
        startY: 0,
        moved: false,
        holdTriggered: false,
        startedAt: 0,
      };

      const stationBlueprints = [
        {
          x: 266,
          tag: "FORK-01",
          title: "Kiln Fork",
          subtitle: "첫 균열 창",
          choices: [
            {
              title: "Anchor Resin",
              boon: "충격 -18 / 10초 안정화 보강",
              curse: "정전기 누수 +1",
              load: 1,
              penaltyIcons: [
                { code: "LK", label: "누수" },
              ],
              apply() {
                healShock(18);
                state.effects.anchorTimer = Math.max(state.effects.anchorTimer, 10);
                state.effects.staticLeak += 0.95;
                addShieldPulse("#7dd3fc");
                pushBurst("ANCHOR", state.player.x, state.player.y - 64, "#7dd3fc");
              },
            },
            {
              title: "Fold Surge",
              boon: "속도 상승 / 9초 결정파 완화",
              curse: "축 전환 충격 +4",
              load: 2,
              penaltyIcons: [
                { code: "FX", label: "축충격" },
                { code: "FX", label: "축충격" },
              ],
              apply() {
                state.effects.speedBonus += 0.24;
                state.effects.hazardSlowTimer = Math.max(state.effects.hazardSlowTimer, 9);
                state.effects.flipShock += 4;
                pushBurst("SURGE", state.player.x, state.player.y - 64, "#f59e0b");
              },
            },
          ],
        },
        {
          x: 514,
          tag: "FORK-02",
          title: "Mirror Vat",
          subtitle: "중반 추출",
          choices: [
            {
              title: "Mirror Bark",
              boon: "차폐 1회 / 코어 재정렬",
              curse: "9초 좌우 반전",
              load: 1,
              penaltyIcons: [
                { code: "RV", label: "반전" },
              ],
              apply() {
                state.effects.shield += 1;
                state.effects.reverseTimer = Math.max(state.effects.reverseTimer, 9);
                state.core.x = state.player.x + 12;
                state.core.y = state.player.y + state.gravitySign * 58;
                state.core.vx = 0;
                state.core.vy = 0;
                pushBurst("MIRROR", state.player.x, state.player.y - 64, "#c084fc");
              },
            },
            {
              title: "Soft Crucible",
              boon: "충격 -14 / 7초 균열파 완화",
              curse: "충돌 피해 +45%",
              load: 1,
              penaltyIcons: [
                { code: "CR", label: "균열" },
              ],
              apply() {
                healShock(14);
                state.effects.hazardSlowTimer = Math.max(state.effects.hazardSlowTimer, 7);
                state.effects.brittle += 0.45;
                pushBurst("SOFT", state.player.x, state.player.y - 64, "#fb7185");
              },
            },
          ],
        },
        {
          x: 738,
          tag: "FORK-03",
          title: "Slot Bloom",
          subtitle: "최종 봉합",
          choices: [
            {
              title: "Beacon Bloom",
              boon: "슬롯 유도 강화 / 차폐 1회",
              curse: "정전기 누수 +2",
              load: 2,
              penaltyIcons: [
                { code: "LK", label: "누수" },
                { code: "LK", label: "누수" },
              ],
              apply() {
                state.effects.goalAssist += 1;
                state.effects.shield += 1;
                state.effects.staticLeak += 1.2;
                pushBurst("BEACON", state.player.x, state.player.y - 64, "#5eead4");
              },
            },
            {
              title: "Null Clamp",
              boon: "충격 -10 / 12초 안정화 고정",
              curse: "축 전환 충격 +3 / 충돌 피해 +25%",
              load: 2,
              penaltyIcons: [
                { code: "FX", label: "축충격" },
                { code: "CR", label: "균열" },
              ],
              apply() {
                healShock(10);
                state.effects.anchorTimer = Math.max(state.effects.anchorTimer, 12);
                state.effects.flipShock += 3;
                state.effects.brittle += 0.25;
                pushBurst("NULL", state.player.x, state.player.y - 64, "#38bdf8");
              },
            },
          ],
        },
      ];

      const hazardBlueprints = [
        { x: 184, lane: "floor", width: 84, height: 148, pulse: 0.3, hue: "#ff7e5f", damage: 11 },
        { x: 346, lane: "ceiling", width: 96, height: 134, pulse: 1.15, hue: "#93c5fd", damage: 12 },
        { x: 438, lane: "floor", width: 110, height: 142, pulse: 2.4, hue: "#fb7185", damage: 12 },
        { x: 602, lane: "ceiling", width: 92, height: 124, pulse: 0.8, hue: "#67e8f9", damage: 13 },
        { x: 694, lane: "floor", width: 102, height: 152, pulse: 1.8, hue: "#f97316", damage: 13 },
        { x: 808, lane: "ceiling", width: 94, height: 120, pulse: 2.9, hue: "#c084fc", damage: 14 },
      ];

      function railY(lane) {
        return lane === "ceiling" ? TRACK.ceiling : TRACK.floor;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function createPlayer() {
        return {
          x: 132,
          y: TRACK.floor,
          width: PLAYER_SIZE.width,
          height: PLAYER_SIZE.height,
          vx: 0,
          glow: 0,
        };
      }

      function createCore() {
        return {
          x: 144,
          y: TRACK.floor + 58,
          vx: 0,
          vy: 0,
          radius: CORE_RADIUS,
          fractureGlow: 0,
        };
      }

      function createParticles() {
        return [];
      }

      function createBursts() {
        return [];
      }

      function createHazards() {
        return hazardBlueprints.map((hazard) => ({
          ...hazard,
          cooldown: 0,
        }));
      }

      function createStations() {
        return stationBlueprints.map((station, index) => ({
          ...station,
          id: index,
          used: false,
        }));
      }

      function createBackgroundCrystals() {
        return Array.from({ length: 18 }, (_, index) => ({
          x: 48 + index * 52,
          y: 80 + (index % 6) * 54,
          size: 14 + (index % 4) * 5,
          alpha: 0.08 + (index % 5) * 0.03,
          drift: 0.35 + (index % 3) * 0.22,
        }));
      }

      function createEmbers() {
        return Array.from({ length: 44 }, (_, index) => ({
          x: (index * 47) % VIEW.width,
          y: (index * 89) % VIEW.height,
          size: 1.8 + (index % 4) * 1.2,
          speed: 18 + (index % 5) * 9,
          sway: 8 + (index % 7) * 2,
          phase: index * 0.61,
          hue: index % 3 === 0 ? "#f97316" : index % 3 === 1 ? "#67e8f9" : "#fde68a",
        }));
      }

      const state = {
        mode: "menu",
        elapsed: 0,
        uiTime: 0,
        lastRunTime: 0,
        gravitySign: 1,
        lane: "floor",
        shock: 18,
        curseLoad: 0,
        player: createPlayer(),
        core: createCore(),
        particles: createParticles(),
        bursts: createBursts(),
        hazards: createHazards(),
        stations: createStations(),
        backgroundCrystals: createBackgroundCrystals(),
        embers: createEmbers(),
        shake: 0,
        flash: 0,
        lastReason: "",
        activeStationId: -1,
        finishFlash: 0,
        effects: {
          shield: 0,
          anchorTimer: 0,
          hazardSlowTimer: 0,
          reverseTimer: 0,
          staticLeak: 0,
          flipShock: 0,
          brittle: 0,
          speedBonus: 0,
          goalAssist: 0,
        },
        activeCurseLabels: [],
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "impact_overload") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clearInput() {
        input.left = false;
        input.right = false;
        input.dragDir = 0;
        input.stabilize = false;
        pointerGesture.active = false;
        pointerGesture.moved = false;
        pointerGesture.holdTriggered = false;
        if (canvasHoldTimer) {
          clearTimeout(canvasHoldTimer);
          canvasHoldTimer = 0;
        }
        document.querySelectorAll(".mobile-btn").forEach((button) => {
          button.dataset.active = "false";
        });
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.gravitySign = 1;
        state.lane = "floor";
        state.shock = 18;
        state.curseLoad = 0;
        state.player = createPlayer();
        state.core = createCore();
        state.particles = createParticles();
        state.bursts = createBursts();
        state.hazards = createHazards();
        state.stations = createStations();
        state.shake = 0;
        state.flash = 0;
        state.lastReason = "";
        state.activeStationId = -1;
        state.finishFlash = 0;
        state.effects = {
          shield: 0,
          anchorTimer: 0,
          hazardSlowTimer: 0,
          reverseTimer: 0,
          staticLeak: 0,
          flipShock: 0,
          brittle: 0,
          speedBonus: 0,
          goalAssist: 0,
        };
        state.activeCurseLabels = [];
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        clearInput();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
        }
      }

      function spawnSparkBurst(x, y, color, count) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.6;
          const speed = 70 + Math.random() * 120;
          state.particles.push({
            type: "spark",
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: 1.8 + Math.random() * 2.8,
            life: 0.5 + Math.random() * 0.4,
            color,
          });
        }
      }

      function pushBurst(text, x, y, color) {
        state.bursts.push({
          text,
          x,
          y,
          vy: -18,
          life: 0.95,
          color,
        });
      }

      function addShieldPulse(color) {
        state.particles.push({
          type: "ring",
          x: state.core.x,
          y: state.core.y,
          radius: state.core.radius,
          grow: 98,
          life: 0.4,
          color,
        });
      }

      function healShock(amount) {
        state.shock = clamp(state.shock - amount, 0, SHOCK_LIMIT);
      }

      function damageShock(amount, reason, x, y, color) {
        if (state.mode !== "running") {
          return;
        }
        if (state.effects.shield > 0 && reason === "hazard") {
          state.effects.shield -= 1;
          addShieldPulse("#a7f3d0");
          pushBurst("WARD", x, y - 22, "#a7f3d0");
          return;
        }
        state.shock = clamp(state.shock + amount, 0, SHOCK_LIMIT);
        state.shake = Math.max(state.shake, 10 + amount * 0.35);
        state.flash = Math.max(state.flash, 0.36);
        state.core.fractureGlow = 1;
        spawnSparkBurst(x, y, color, 10);
        pushBurst(`CRACK +${integerFormat.format(Math.round(amount))}`, x, y - 16, color);
        if (state.shock >= SHOCK_LIMIT) {
          failRun(reason === "hazard" ? "impact_overload" : reason);
        }
      }

      function failRun(reason = "impact_overload") {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.finishFlash = 1;
        state.flash = Math.max(state.flash, 0.55);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
        clearInput();
      }

      function clearRun() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.lastReason = "slot_delivered";
        state.finishFlash = 1;
        state.flash = Math.max(state.flash, 0.45);
        spawnSparkBurst(TRACK.goalX, railY("floor") - 26, "#67e8f9", 18);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
        clearInput();
      }

      function getGoalAnchor() {
        return {
          x: TRACK.goalX,
          y: TRACK.floor + 54,
          radius: 36 + state.effects.goalAssist * 18,
        };
      }

      function foldGravity() {
        if (state.mode !== "running") {
          return;
        }
        state.gravitySign *= -1;
        state.lane = state.gravitySign > 0 ? "floor" : "ceiling";
        state.player.glow = 1;
        state.core.vy -= state.gravitySign * 170;
        state.core.vx += clamp(state.player.vx * 0.2, -48, 48);
        if (state.effects.flipShock > 0) {
          damageShock(
            state.effects.flipShock,
            "fold_feedback",
            state.core.x,
            state.core.y,
            "#fbbf24"
          );
        } else {
          spawnSparkBurst(state.player.x + 10, state.player.y, "#93c5fd", 6);
        }
      }

      function getPickupCards() {
        const overlayWidth = 760;
        const overlayHeight = 250;
        const overlayX = VIEW.width / 2 - overlayWidth / 2;
        const overlayY = VIEW.height / 2 - overlayHeight / 2 + 24;
        const cardWidth = 320;
        const gap = 30;
        return [
          {
            x: overlayX + 40,
            y: overlayY + 66,
            width: cardWidth,
            height: 146,
          },
          {
            x: overlayX + 40 + cardWidth + gap,
            y: overlayY + 66,
            width: cardWidth,
            height: 146,
          },
        ];
      }

      function choosePickup(choiceIndex) {
        if (state.mode !== "pickup" || state.activeStationId < 0) {
          return;
        }
        const station = state.stations[state.activeStationId];
        const choice = station?.choices?.[choiceIndex];
        if (!station || !choice) {
          return;
        }
        station.used = true;
        state.activeStationId = -1;
        state.mode = "running";
        state.curseLoad += choice.load;
        state.activeCurseLabels.push(choice.curse);
        choice.apply();
        pushBurst(choice.title.toUpperCase(), state.player.x, state.player.y - 46, "#e2e8f0");
        if (state.curseLoad > CURSE_LIMIT) {
          failRun("curse_overload");
        }
      }

      function enterPickupMode(index) {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "pickup";
        state.activeStationId = index;
        state.player.vx = 0;
        input.dragDir = 0;
        input.left = false;
        input.right = false;
        input.stabilize = false;
        pushBurst("CHOICE WINDOW", state.player.x + 12, state.player.y - 70, "#f8fafc");
      }

      function getHazardRect(hazard) {
        const pulseScale =
          1 + Math.sin(state.uiTime * 1.8 + hazard.pulse) * 0.14 * (state.effects.hazardSlowTimer > 0 ? 0.4 : 1);
        const height = hazard.height * pulseScale;
        const width = hazard.width * (0.94 + Math.sin(state.uiTime * 2.4 + hazard.pulse) * 0.06);
        if (hazard.lane === "floor") {
          return {
            left: hazard.x - width / 2,
            right: hazard.x + width / 2,
            top: VIEW.height - 44 - height,
            bottom: VIEW.height - 44,
            width,
            height,
          };
        }
        return {
          left: hazard.x - width / 2,
          right: hazard.x + width / 2,
          top: 42,
          bottom: 42 + height,
          width,
          height,
        };
      }

      function collideCircleRect(circle, rect) {
        const closestX = clamp(circle.x, rect.left, rect.right);
        const closestY = clamp(circle.y, rect.top, rect.bottom);
        return distance(circle.x, circle.y, closestX, closestY) < circle.radius;
      }

      function updateEffects(dt) {
        state.effects.anchorTimer = Math.max(0, state.effects.anchorTimer - dt);
        state.effects.hazardSlowTimer = Math.max(0, state.effects.hazardSlowTimer - dt);
        state.effects.reverseTimer = Math.max(0, state.effects.reverseTimer - dt);
        state.player.glow = Math.max(0, state.player.glow - dt * 2.4);
        state.core.fractureGlow = Math.max(0, state.core.fractureGlow - dt * 2.6);
      }

      function updateBackground(dt) {
        state.uiTime += dt;
        for (const ember of state.embers) {
          ember.y -= ember.speed * dt;
          ember.x += Math.sin(state.uiTime * 0.8 + ember.phase) * ember.sway * dt;
          if (ember.y < -20) {
            ember.y = VIEW.height + 20;
            ember.x = Math.random() * VIEW.width;
          }
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          if (particle.life <= 0) {
            return false;
          }
          if (particle.type === "ring") {
            particle.radius += particle.grow * dt;
          } else {
            particle.x += particle.vx * dt;
            particle.y += particle.vy * dt;
            particle.vx *= 0.98;
            particle.vy *= 0.98;
          }
          return true;
        });
        state.bursts = state.bursts.filter((burst) => {
          burst.life -= dt;
          if (burst.life <= 0) {
            return false;
          }
          burst.y += burst.vy * dt;
          return true;
        });
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        updateEffects(dt);

        const rawDirection =
          (input.right ? 1 : 0) - (input.left ? 1 : 0) + (input.dragDir || 0);
        const direction = clamp(
          state.effects.reverseTimer > 0 ? rawDirection * -1 : rawDirection,
          -1,
          1
        );
        const stabilizing = input.stabilize;
        const moveSpeed =
          196 *
          (1 + state.effects.speedBonus) *
          (stabilizing ? 0.62 : 1);
        const targetVx = direction * moveSpeed;
        state.player.vx = lerp(state.player.vx, targetVx, 1 - Math.pow(0.0001, dt));
        state.player.x = clamp(
          state.player.x + state.player.vx * dt,
          TRACK.left,
          TRACK.right
        );
        const targetY = railY(state.lane);
        state.player.y = lerp(state.player.y, targetY, 1 - Math.pow(0.00001, dt));

        const anchorX = state.player.x + 8 + state.player.vx * 0.05;
        const anchorY = state.player.y + state.gravitySign * 58;
        const spring = stabilizing || state.effects.anchorTimer > 0 ? 14.5 : 9.2;
        const damping = stabilizing || state.effects.anchorTimer > 0 ? 0.83 : 0.91;

        state.core.vx += (anchorX - state.core.x) * spring * dt;
        state.core.vy += (anchorY - state.core.y) * spring * dt;
        state.core.vy += state.gravitySign * 168 * dt;
        state.core.vx *= Math.pow(damping, dt * 60);
        state.core.vy *= Math.pow(damping, dt * 60);

        const goal = getGoalAnchor();
        if (state.effects.goalAssist > 0 && state.player.x > 730) {
          const magnet = clamp((state.player.x - 730) / 160, 0, 1) * 58;
          state.core.vx += ((goal.x - state.core.x) * magnet * dt) / 24;
          state.core.vy += ((goal.y - state.core.y) * magnet * dt) / 24;
        }

        state.core.x += state.core.vx * dt;
        state.core.y += state.core.vy * dt;

        if (state.effects.staticLeak > 0) {
          state.shock = clamp(state.shock + state.effects.staticLeak * 1.25 * dt, 0, SHOCK_LIMIT);
        }
        const passiveRecovery = stabilizing
          ? 3.2
          : state.effects.anchorTimer > 0
            ? 1.5
            : 0.35;
        state.shock = clamp(state.shock - passiveRecovery * dt, 0, SHOCK_LIMIT);

        const wallMargin = 24;
        if (state.core.x < TRACK.left - wallMargin) {
          state.core.x = TRACK.left - wallMargin;
          state.core.vx = Math.abs(state.core.vx) * 0.45;
          damageShock(6.5, "wall_impact", state.core.x, state.core.y, "#fb7185");
        } else if (state.core.x > TRACK.right + wallMargin) {
          state.core.x = TRACK.right + wallMargin;
          state.core.vx = -Math.abs(state.core.vx) * 0.45;
          damageShock(6.5, "wall_impact", state.core.x, state.core.y, "#fb7185");
        }

        if (state.core.y < 34) {
          state.core.y = 34;
          state.core.vy = Math.abs(state.core.vy) * 0.4;
          damageShock(5.5, "ceiling_impact", state.core.x, state.core.y, "#a78bfa");
        } else if (state.core.y > VIEW.height - 30) {
          state.core.y = VIEW.height - 30;
          state.core.vy = -Math.abs(state.core.vy) * 0.4;
          damageShock(5.5, "floor_impact", state.core.x, state.core.y, "#fb923c");
        }

        for (const hazard of state.hazards) {
          hazard.cooldown = Math.max(0, hazard.cooldown - dt);
          const rect = getHazardRect(hazard);
          if (hazard.cooldown <= 0 && collideCircleRect(state.core, rect)) {
            hazard.cooldown = 0.38;
            const damage = hazard.damage * (1 + state.effects.brittle);
            const normal = hazard.lane === "floor" ? -1 : 1;
            state.core.vy += normal * 170;
            state.core.vx += Math.sign(state.core.x - hazard.x || 1) * 96;
            damageShock(damage, "hazard", state.core.x, state.core.y, hazard.hue);
          }
        }

        for (let index = 0; index < state.stations.length; index += 1) {
          const station = state.stations[index];
          if (!station.used && state.player.x >= station.x) {
            enterPickupMode(index);
            break;
          }
        }

        if (state.curseLoad > CURSE_LIMIT) {
          failRun("curse_overload");
        }

        if (state.shock >= SHOCK_LIMIT) {
          failRun("impact_overload");
        }

        const slotDistance = distance(state.core.x, state.core.y, goal.x, goal.y);
        if (
          state.player.x >= TRACK.goalX - 26 &&
          state.lane === "floor" &&
          slotDistance <= goal.radius
        ) {
          clearRun();
        }
      }

      function update(dt) {
        updateBackground(dt);
        updateParticles(dt);
        state.shake = Math.max(0, state.shake - dt * 18);
        state.flash = Math.max(0, state.flash - dt * 1.7);
        state.finishFlash = Math.max(0, state.finishFlash - dt * 1.2);

        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          updateEffects(dt);
        }
      }

      function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        if (fillStyle) {
          ctx.fillStyle = fillStyle;
          ctx.fill();
        }
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.stroke();
        }
      }

      function drawBackdrop() {
        const bgGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        bgGradient.addColorStop(0, "#07111d");
        bgGradient.addColorStop(0.45, "#091a29");
        bgGradient.addColorStop(1, "#1a0c16");
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const glowGradient = ctx.createRadialGradient(480, 120, 20, 480, 120, 360);
        glowGradient.addColorStop(0, "rgba(125, 211, 252, 0.22)");
        glowGradient.addColorStop(1, "rgba(125, 211, 252, 0)");
        ctx.fillStyle = glowGradient;
        ctx.fillRect(0, 0, VIEW.width, 280);

        for (const crystal of state.backgroundCrystals) {
          const drift = Math.sin(state.uiTime * crystal.drift + crystal.x * 0.02) * 6;
          ctx.save();
          ctx.translate(crystal.x, crystal.y + drift);
          ctx.rotate(Math.sin(state.uiTime * 0.6 + crystal.y * 0.03) * 0.25);
          ctx.beginPath();
          ctx.moveTo(0, -crystal.size);
          ctx.lineTo(crystal.size * 0.58, 0);
          ctx.lineTo(0, crystal.size);
          ctx.lineTo(-crystal.size * 0.58, 0);
          ctx.closePath();
          ctx.fillStyle = `rgba(147, 197, 253, ${crystal.alpha})`;
          ctx.fill();
          ctx.restore();
        }

        ctx.fillStyle = "rgba(14, 25, 38, 0.92)";
        ctx.fillRect(0, 0, VIEW.width, 36);

        for (let column = 0; column < 6; column += 1) {
          const x = 70 + column * 164;
          ctx.fillStyle = "rgba(15, 25, 38, 0.72)";
          ctx.fillRect(x, 40, 22, 420);
          ctx.fillStyle = "rgba(148, 163, 184, 0.08)";
          ctx.fillRect(x + 4, 40, 4, 420);
        }

        const molten = ctx.createLinearGradient(0, VIEW.height - 68, 0, VIEW.height);
        molten.addColorStop(0, "rgba(249, 115, 22, 0.28)");
        molten.addColorStop(1, "rgba(127, 29, 29, 0.92)");
        ctx.fillStyle = molten;
        ctx.fillRect(0, VIEW.height - 68, VIEW.width, 68);

        ctx.strokeStyle = "rgba(125, 211, 252, 0.18)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(TRACK.left - 18, TRACK.ceiling);
        ctx.lineTo(TRACK.right + 10, TRACK.ceiling);
        ctx.moveTo(TRACK.left - 18, TRACK.floor);
        ctx.lineTo(TRACK.right + 10, TRACK.floor);
        ctx.stroke();

        ctx.strokeStyle = "rgba(248, 250, 252, 0.06)";
        ctx.lineWidth = 1;
        for (let index = 0; index < 24; index += 1) {
          const x = TRACK.left + index * 34;
          ctx.beginPath();
          ctx.moveTo(x, TRACK.ceiling - 9);
          ctx.lineTo(x + 12, TRACK.ceiling + 9);
          ctx.moveTo(x, TRACK.floor - 9);
          ctx.lineTo(x + 12, TRACK.floor + 9);
          ctx.stroke();
        }
      }

      function drawEmbers() {
        for (const ember of state.embers) {
          ctx.fillStyle = ember.hue;
          ctx.globalAlpha = 0.14 + ((Math.sin(state.uiTime * 3 + ember.phase) + 1) * 0.08);
          ctx.beginPath();
          ctx.arc(ember.x, ember.y, ember.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawStations() {
        for (const station of state.stations) {
          const usedAlpha = station.used ? 0.18 : 1;
          const haloY = VIEW.height / 2;
          const pulse = (Math.sin(state.uiTime * 2.3 + station.id) + 1) * 0.5;
          ctx.save();
          ctx.globalAlpha = usedAlpha;
          ctx.strokeStyle = `rgba(94, 234, 212, ${0.18 + pulse * 0.18})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(station.x, haloY, 30 + pulse * 12, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(station.x, 170);
          ctx.lineTo(station.x, 370);
          ctx.strokeStyle = "rgba(94, 234, 212, 0.18)";
          ctx.stroke();
          ctx.fillStyle = "rgba(8, 19, 32, 0.82)";
          drawRoundedRect(station.x - 34, haloY - 18, 68, 36, 14, "rgba(8, 19, 32, 0.82)", "rgba(94, 234, 212, 0.35)");
          ctx.fillStyle = "#e0f2fe";
          ctx.font = '700 14px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.textAlign = "center";
          ctx.fillText("PICK", station.x, haloY + 5);
          ctx.restore();
        }
      }

      function drawHazards() {
        for (const hazard of state.hazards) {
          const rect = getHazardRect(hazard);
          const glow = ctx.createLinearGradient(rect.left, rect.top, rect.right, rect.bottom);
          glow.addColorStop(0, "rgba(255, 255, 255, 0.18)");
          glow.addColorStop(1, hazard.hue);
          ctx.save();
          ctx.shadowBlur = 18;
          ctx.shadowColor = hazard.hue;
          ctx.fillStyle = glow;
          ctx.beginPath();
          if (hazard.lane === "floor") {
            ctx.moveTo(rect.left, rect.bottom);
            ctx.lineTo(rect.left + rect.width * 0.2, rect.top + rect.height * 0.28);
            ctx.lineTo(rect.left + rect.width * 0.5, rect.top);
            ctx.lineTo(rect.right - rect.width * 0.2, rect.top + rect.height * 0.24);
            ctx.lineTo(rect.right, rect.bottom);
          } else {
            ctx.moveTo(rect.left, rect.top);
            ctx.lineTo(rect.left + rect.width * 0.18, rect.bottom - rect.height * 0.22);
            ctx.lineTo(rect.left + rect.width * 0.5, rect.bottom);
            ctx.lineTo(rect.right - rect.width * 0.2, rect.bottom - rect.height * 0.2);
            ctx.lineTo(rect.right, rect.top);
          }
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.2)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawGoal() {
        const goal = getGoalAnchor();
        const glowSize = 44 + Math.sin(state.uiTime * 3.2) * 6;
        const radial = ctx.createRadialGradient(goal.x, goal.y - 6, 8, goal.x, goal.y - 6, 52 + glowSize);
        radial.addColorStop(0, "rgba(103, 232, 249, 0.8)");
        radial.addColorStop(0.45, "rgba(56, 189, 248, 0.24)");
        radial.addColorStop(1, "rgba(56, 189, 248, 0)");
        ctx.fillStyle = radial;
        ctx.fillRect(goal.x - 80, goal.y - 80, 160, 160);

        drawRoundedRect(
          goal.x - 28,
          goal.y - 62,
          56,
          82,
          18,
          "rgba(10, 22, 33, 0.88)",
          "rgba(103, 232, 249, 0.52)"
        );
        ctx.strokeStyle = "rgba(125, 211, 252, 0.6)";
        ctx.lineWidth = 2;
        ctx.strokeRect(goal.x - 12, goal.y - 42, 24, 44);
        ctx.fillStyle = "#cffafe";
        ctx.font = '700 12px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.textAlign = "center";
        ctx.fillText("SLOT", goal.x, goal.y + 34);
      }

      function drawTetherAndCore() {
        const anchorX = state.player.x + 8;
        const anchorY = state.player.y + state.gravitySign * 20;

        ctx.save();
        ctx.strokeStyle = "rgba(226, 232, 240, 0.55)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(anchorX, anchorY);
        ctx.quadraticCurveTo(
          (anchorX + state.core.x) / 2,
          (anchorY + state.core.y) / 2 + state.gravitySign * 16,
          state.core.x,
          state.core.y
        );
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.shadowBlur = 26;
        ctx.shadowColor = state.core.fractureGlow > 0 ? "#fb7185" : "#67e8f9";
        const coreGradient = ctx.createRadialGradient(
          state.core.x - 4,
          state.core.y - 6,
          2,
          state.core.x,
          state.core.y,
          state.core.radius + 10
        );
        coreGradient.addColorStop(0, "#ffffff");
        coreGradient.addColorStop(0.35, "#a5f3fc");
        coreGradient.addColorStop(0.75, "#38bdf8");
        coreGradient.addColorStop(1, "#0f172a");
        ctx.fillStyle = coreGradient;
        ctx.beginPath();
        ctx.arc(state.core.x, state.core.y, state.core.radius, 0, Math.PI * 2);
        ctx.fill();

        if (state.core.fractureGlow > 0) {
          ctx.globalAlpha = state.core.fractureGlow * 0.8;
          ctx.strokeStyle = "#fee2e2";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(state.core.x - 8, state.core.y + 4);
          ctx.lineTo(state.core.x - 2, state.core.y - 4);
          ctx.lineTo(state.core.x + 5, state.core.y + 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPlayer() {
        ctx.save();
        ctx.translate(state.player.x, state.player.y);
        ctx.shadowBlur = 18;
        ctx.shadowColor = state.player.glow > 0 ? "#fde68a" : "rgba(125, 211, 252, 0.28)";
        const sledGradient = ctx.createLinearGradient(-40, -12, 34, 22);
        sledGradient.addColorStop(0, "#0f172a");
        sledGradient.addColorStop(0.52, "#164e63");
        sledGradient.addColorStop(1, "#1d4ed8");
        drawRoundedRect(-34, -14, 68, 28, 14, sledGradient, "rgba(186, 230, 253, 0.38)");
        ctx.fillStyle = "rgba(255, 255, 255, 0.86)";
        ctx.fillRect(-4, -22, 8, 12);
        ctx.fillStyle = "#e0f2fe";
        ctx.beginPath();
        ctx.arc(0, -26, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.arc(-4, -28, 2, 0, Math.PI * 2);
        ctx.arc(4, -28, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          ctx.save();
          ctx.globalAlpha = clamp(particle.life * 1.2, 0, 1);
          if (particle.type === "ring") {
            ctx.strokeStyle = particle.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
            ctx.stroke();
          } else {
            ctx.fillStyle = particle.color;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }

        ctx.textAlign = "center";
        for (const burst of state.bursts) {
          ctx.save();
          ctx.globalAlpha = clamp(burst.life * 1.2, 0, 1);
          ctx.fillStyle = burst.color;
          ctx.font = '800 18px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.fillText(burst.text, burst.x, burst.y);
          ctx.restore();
        }
      }

      function drawHud() {
        const topPanel = ctx.createLinearGradient(0, 0, 360, 0);
        topPanel.addColorStop(0, "rgba(8, 19, 32, 0.9)");
        topPanel.addColorStop(1, "rgba(8, 19, 32, 0.58)");
        drawRoundedRect(22, 18, 316, 86, 24, topPanel, "rgba(148, 163, 184, 0.18)");

        ctx.fillStyle = "#ecfeff";
        ctx.font = '800 26px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.textAlign = "left";
        ctx.fillText("CRYSTAL FOUNDRY", 38, 48);
        ctx.font = '700 13px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillStyle = "rgba(226, 232, 240, 0.82)";
        ctx.fillText("FOLD / CARRY / ENDURE", 38, 68);

        ctx.fillStyle = "rgba(226, 232, 240, 0.78)";
        ctx.font = '700 12px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText("충격", 38, 92);
        drawRoundedRect(84, 78, 164, 14, 8, "rgba(15, 23, 42, 0.94)", "rgba(148, 163, 184, 0.16)");
        const shockGradient = ctx.createLinearGradient(84, 78, 248, 78);
        shockGradient.addColorStop(0, "#67e8f9");
        shockGradient.addColorStop(0.55, "#f59e0b");
        shockGradient.addColorStop(1, "#fb7185");
        drawRoundedRect(84, 78, 164 * (state.shock / SHOCK_LIMIT), 14, 8, shockGradient, null);
        ctx.fillStyle = "#f8fafc";
        ctx.fillText(`${integerFormat.format(Math.round(state.shock))}/${integerFormat.format(SHOCK_LIMIT)}`, 256, 90);

        drawRoundedRect(354, 18, 218, 86, 24, "rgba(8, 19, 32, 0.74)", "rgba(94, 234, 212, 0.18)");
        ctx.fillStyle = "#f8fafc";
        ctx.font = '800 18px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText("저주 조합", 374, 46);
        ctx.font = '700 14px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillStyle = "rgba(226, 232, 240, 0.78)";
        ctx.fillText(`${integerFormat.format(state.curseLoad)} / ${integerFormat.format(CURSE_LIMIT)}`, 374, 68);
        ctx.fillText(`시간 ${oneDecimalFormat.format(state.elapsed)}초`, 374, 90);

        for (let index = 0; index < CURSE_LIMIT; index += 1) {
          const filled = index < state.curseLoad;
          const x = 490 + index * 18;
          ctx.fillStyle = filled ? "#f97316" : "rgba(71, 85, 105, 0.7)";
          ctx.beginPath();
          ctx.arc(x, 67, 6, 0, Math.PI * 2);
          ctx.fill();
        }

        const goal = getGoalAnchor();
        drawRoundedRect(602, 18, 336, 86, 24, "rgba(8, 19, 32, 0.66)", "rgba(148, 163, 184, 0.18)");
        ctx.fillStyle = "#ecfeff";
        ctx.font = '800 16px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(META_CLEAR, 622, 44);
        ctx.font = '700 13px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillStyle = "rgba(226, 232, 240, 0.72)";
        ctx.fillText(`슬롯 거리 ${integerFormat.format(Math.max(0, Math.round(goal.x - state.player.x)))}m`, 622, 66);
        const stateHint = input.stabilize || state.effects.anchorTimer > 0 ? "안정화 유지" : "탭으로 축 전환";
        ctx.fillText(stateHint, 622, 88);

        let chipX = 22;
        const chipY = VIEW.height - 36;
        const labels = state.activeCurseLabels.slice(-3);
        for (const label of labels) {
          const chipWidth = Math.min(190, 60 + label.length * 8);
          drawRoundedRect(chipX, chipY, chipWidth, 24, 12, "rgba(15, 23, 42, 0.84)", "rgba(248, 113, 113, 0.26)");
          ctx.fillStyle = "#fecaca";
          ctx.font = '700 12px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.fillText(label, chipX + 12, chipY + 16);
          chipX += chipWidth + 8;
        }
      }

      function drawMenuOverlay() {
        const panelX = 84;
        const panelY = 84;
        const panelW = 792;
        const panelH = 364;
        const panelGradient = ctx.createLinearGradient(panelX, panelY, panelX + panelW, panelY + panelH);
        panelGradient.addColorStop(0, "rgba(6, 17, 29, 0.92)");
        panelGradient.addColorStop(1, "rgba(22, 12, 27, 0.88)");
        drawRoundedRect(panelX, panelY, panelW, panelH, 34, panelGradient, "rgba(125, 211, 252, 0.22)");

        ctx.fillStyle = "#67e8f9";
        ctx.font = '800 16px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.textAlign = "left";
        ctx.fillText("CRYSTAL COURIER / CURSED PICKS", 122, 142);
        ctx.fillStyle = "#f8fafc";
        ctx.font = '800 44px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(META_TITLE, 122, 190);
        ctx.font = '700 19px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillStyle = "rgba(226, 232, 240, 0.88)";
        ctx.fillText(META_DESCRIPTION, 122, 226);

        const infoCards = [
          {
            title: "조작",
            body: META_CONTROLS,
            hue: "rgba(103, 232, 249, 0.18)",
          },
          {
            title: "클리어",
            body: META_CLEAR,
            hue: "rgba(94, 234, 212, 0.18)",
          },
          {
            title: "실패",
            body: META_FAIL,
            hue: "rgba(251, 113, 133, 0.18)",
          },
        ];

        infoCards.forEach((card, index) => {
          const x = 122 + index * 208;
          drawRoundedRect(x, 260, 188, 112, 22, "rgba(8, 19, 32, 0.8)", card.hue);
          ctx.fillStyle = "#e2e8f0";
          ctx.font = '800 15px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.fillText(card.title, x + 18, 286);
          ctx.font = '700 13px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          wrapText(card.body, x + 18, 308, 152, 18, 3, "#cbd5e1");
        });

        drawRoundedRect(642, 260, 164, 112, 24, "rgba(16, 30, 45, 0.88)", "rgba(251, 191, 36, 0.36)");
        ctx.fillStyle = "#fde68a";
        ctx.font = '800 18px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText("TAP TO FOLD", 662, 292);
        ctx.fillStyle = "rgba(226, 232, 240, 0.8)";
        ctx.font = '700 13px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        wrapText("짧게 터치하면 축 전환, 길게 누르면 안정화. 모바일은 드래그로 좌우 유지.", 662, 316, 126, 18, 4, "#cbd5e1");

        ctx.fillStyle = "#f8fafc";
        ctx.font = '800 20px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText("ENTER / TAP TO START", 122, 408);
      }

      function drawPickupOverlay() {
        const station = state.stations[state.activeStationId];
        if (!station) {
          return;
        }
        ctx.fillStyle = "rgba(2, 6, 23, 0.58)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const overlayW = 760;
        const overlayH = 250;
        const overlayX = VIEW.width / 2 - overlayW / 2;
        const overlayY = VIEW.height / 2 - overlayH / 2 + 24;
        drawRoundedRect(
          overlayX,
          overlayY,
          overlayW,
          overlayH,
          28,
          "rgba(7, 17, 29, 0.96)",
          "rgba(125, 211, 252, 0.22)"
        );

        ctx.fillStyle = "#67e8f9";
        ctx.font = '800 14px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.textAlign = "center";
        ctx.fillText(`${station.tag} / ${station.subtitle}`, VIEW.width / 2, overlayY + 28);
        ctx.fillStyle = "#f8fafc";
        ctx.font = '800 32px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(`${station.title}: 픽업 하나만 가져간다`, VIEW.width / 2, overlayY + 64);
        ctx.font = '700 15px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillStyle = "rgba(226, 232, 240, 0.82)";
        ctx.fillText("픽업 선택 전에 페널티 아이콘 확인", VIEW.width / 2, overlayY + 90);

        const cards = getPickupCards();
        station.choices.forEach((choice, index) => {
          const rect = cards[index];
          drawRoundedRect(
            rect.x,
            rect.y,
            rect.width,
            rect.height,
            24,
            "rgba(11, 24, 37, 0.94)",
            index === 0 ? "rgba(94, 234, 212, 0.32)" : "rgba(251, 191, 36, 0.32)"
          );
          ctx.fillStyle = "#f8fafc";
          ctx.font = '800 26px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.textAlign = "left";
          ctx.fillText(choice.title, rect.x + 22, rect.y + 34);
          ctx.font = '700 14px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.fillStyle = "#bae6fd";
          ctx.fillText(choice.boon, rect.x + 22, rect.y + 62);
          ctx.fillStyle = "#fecaca";
          ctx.fillText(choice.curse, rect.x + 22, rect.y + 84);

          let chipX = rect.x + 22;
          choice.penaltyIcons.forEach((icon) => {
            drawRoundedRect(
              chipX,
              rect.y + 104,
              66,
              26,
              13,
              "rgba(29, 10, 16, 0.92)",
              "rgba(251, 113, 133, 0.26)"
            );
            ctx.fillStyle = "#fecaca";
            ctx.font = '800 11px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
            ctx.fillText(icon.code, chipX + 10, rect.y + 121);
            ctx.fillStyle = "#fda4af";
            ctx.font = '700 11px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
            ctx.fillText(icon.label, chipX + 34, rect.y + 121);
            chipX += 72;
          });

          ctx.fillStyle = "rgba(226, 232, 240, 0.72)";
          ctx.font = '700 13px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.fillText(`저주 +${integerFormat.format(choice.load)}`, rect.x + 22, rect.y + 145);
        });
      }

      function drawEndOverlay(isClear) {
        ctx.fillStyle = isClear ? "rgba(2, 20, 27, 0.52)" : "rgba(25, 7, 11, 0.58)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        drawRoundedRect(
          VIEW.width / 2 - 250,
          VIEW.height / 2 - 120,
          500,
          240,
          32,
          "rgba(7, 17, 29, 0.95)",
          isClear ? "rgba(94, 234, 212, 0.32)" : "rgba(251, 113, 133, 0.28)"
        );
        ctx.fillStyle = isClear ? "#5eead4" : "#fb7185";
        ctx.textAlign = "center";
        ctx.font = '800 18px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(isClear ? "DELIVERY STABLE" : "FOUNDRY LOST", VIEW.width / 2, VIEW.height / 2 - 52);
        ctx.fillStyle = "#f8fafc";
        ctx.font = '800 42px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(isClear ? "CLEAR" : "FAILED", VIEW.width / 2, VIEW.height / 2 - 6);
        ctx.font = '700 18px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillStyle = "rgba(226, 232, 240, 0.84)";
        ctx.fillText(
          isClear
            ? "코어를 슬롯에 봉합했습니다."
            : state.lastReason === "curse_overload"
              ? "저주 누적이 한계를 넘었습니다."
              : "코어 충격 게이지가 붕괴했습니다.",
          VIEW.width / 2,
          VIEW.height / 2 + 34
        );
        ctx.font = '700 16px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(`기록 ${oneDecimalFormat.format(state.lastRunTime)}초`, VIEW.width / 2, VIEW.height / 2 + 66);
        ctx.fillText("Enter 또는 터치로 재시동", VIEW.width / 2, VIEW.height / 2 + 98);
      }

      function wrapText(text, x, y, maxWidth, lineHeight, maxLines, color) {
        ctx.fillStyle = color;
        const words = String(text).split(" ");
        let line = "";
        let lineIndex = 0;
        for (let index = 0; index < words.length; index += 1) {
          const testLine = line ? `${line} ${words[index]}` : words[index];
          if (ctx.measureText(testLine).width > maxWidth && line) {
            ctx.fillText(line, x, y + lineIndex * lineHeight);
            line = words[index];
            lineIndex += 1;
            if (lineIndex >= maxLines - 1) {
              break;
            }
          } else {
            line = testLine;
          }
        }
        if (lineIndex < maxLines) {
          ctx.fillText(line, x, y + lineIndex * lineHeight);
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        const shakeX = state.shake > 0 ? Math.sin(state.uiTime * 42) * state.shake : 0;
        const shakeY = state.shake > 0 ? Math.cos(state.uiTime * 35) * state.shake * 0.6 : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackdrop();
        drawEmbers();
        drawStations();
        drawHazards();
        drawGoal();
        drawTetherAndCore();
        drawPlayer();
        drawParticles();
        drawHud();
        ctx.restore();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "pickup") {
          drawPickupOverlay();
        } else if (state.mode === "failed") {
          drawEndOverlay(false);
        } else if (state.mode === "cleared") {
          drawEndOverlay(true);
        }

        if (state.flash > 0 || state.finishFlash > 0) {
          ctx.fillStyle = `rgba(255, 255, 255, ${state.flash * 0.18 + state.finishFlash * 0.14})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function stepSimulation(deltaSeconds) {
        let remaining = Math.min(MAX_DT, Math.max(0, deltaSeconds));
        while (remaining > 0) {
          const step = Math.min(FIXED_DT, remaining);
          update(step);
          remaining -= step;
        }
        render();
      }

      function renderGameToText() {
        const goal = getGoalAnchor();
        const station = state.activeStationId >= 0 ? state.stations[state.activeStationId] : null;
        return JSON.stringify({
          mode: state.mode,
          note: "origin=(0,0) top-left, x rightward, y downward",
          player: {
            x: Math.round(state.player.x),
            y: Math.round(state.player.y),
            lane: state.lane,
            vx: Math.round(state.player.vx),
          },
          core: {
            x: Math.round(state.core.x),
            y: Math.round(state.core.y),
            vx: Math.round(state.core.vx),
            vy: Math.round(state.core.vy),
          },
          shock: Number(state.shock.toFixed(1)),
          curseLoad: state.curseLoad,
          curseLimit: CURSE_LIMIT,
          activeCurses: state.activeCurseLabels.slice(-3),
          goal: {
            x: goal.x,
            y: goal.y,
            distance: Math.round(distance(state.core.x, state.core.y, goal.x, goal.y)),
          },
          pickup:
            station && station.choices
              ? {
                  title: station.title,
                  choices: station.choices.map((choice) => ({
                    title: choice.title,
                    boon: choice.boon,
                    curse: choice.curse,
                    load: choice.load,
                  })),
                }
              : null,
        });
      }

      function animationLoop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const deltaSeconds = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        stepSimulation(deltaSeconds);
        animationFrame = window.requestAnimationFrame(animationLoop);
      }

      function pointerToCanvas(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function handlePickupPointer(event) {
        const point = pointerToCanvas(event);
        const cards = getPickupCards();
        for (let index = 0; index < cards.length; index += 1) {
          const rect = cards[index];
          if (
            point.x >= rect.x &&
            point.x <= rect.x + rect.width &&
            point.y >= rect.y &&
            point.y <= rect.y + rect.height
          ) {
            choosePickup(index);
            return true;
          }
        }
        return false;
      }

      function handleCanvasPointerDown(event) {
        event.preventDefault();
        canvas.focus({ preventScroll: true });

        if (state.mode === "pickup") {
          handlePickupPointer(event);
          return;
        }

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startFromTouch();
          return;
        }

        lastPointerId = event.pointerId;
        pointerGesture.active = true;
        pointerGesture.startX = event.clientX;
        pointerGesture.startY = event.clientY;
        pointerGesture.moved = false;
        pointerGesture.holdTriggered = false;
        pointerGesture.startedAt = performance.now();
        canvas.setPointerCapture?.(event.pointerId);

        if (canvasHoldTimer) {
          clearTimeout(canvasHoldTimer);
        }
        canvasHoldTimer = window.setTimeout(() => {
          if (pointerGesture.active && state.mode === "running") {
            pointerGesture.holdTriggered = true;
            input.stabilize = true;
          }
        }, HOLD_DELAY_MS);
      }

      function handleCanvasPointerMove(event) {
        if (!pointerGesture.active || state.mode !== "running") {
          return;
        }
        const dx = event.clientX - pointerGesture.startX;
        if (Math.abs(dx) > 18) {
          pointerGesture.moved = true;
          input.dragDir = dx > 0 ? 1 : -1;
        } else {
          input.dragDir = 0;
        }
      }

      function finishCanvasGesture(event) {
        if (event) {
          event.preventDefault();
        }
        if (canvasHoldTimer) {
          clearTimeout(canvasHoldTimer);
          canvasHoldTimer = 0;
        }
        if (!pointerGesture.active) {
          input.dragDir = 0;
          input.stabilize = false;
          return;
        }
        const tapped = !pointerGesture.moved && !pointerGesture.holdTriggered;
        pointerGesture.active = false;
        input.dragDir = 0;
        input.stabilize = false;
        if (tapped && state.mode === "running") {
          foldGravity();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      bindHoldButton(
        document.querySelector('[data-control="left"]'),
        () => {
          input.left = true;
        },
        () => {
          input.left = false;
        }
      );

      bindHoldButton(
        document.querySelector('[data-control="right"]'),
        () => {
          input.right = true;
        },
        () => {
          input.right = false;
        }
      );

      bindHoldButton(
        document.querySelector('[data-control="stabilize"]'),
        () => {
          input.stabilize = true;
        },
        () => {
          input.stabilize = false;
        }
      );

      const foldButton = document.querySelector('[data-control="fold"]');
      if (foldButton) {
        foldButton.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          foldButton.dataset.active = "true";
          if (state.mode === "running") {
            foldGravity();
          }
          foldButton.setPointerCapture?.(event.pointerId);
        });
        const releaseFold = (event) => {
          if (event) {
            event.preventDefault();
          }
          foldButton.dataset.active = "false";
        };
        foldButton.addEventListener("pointerup", releaseFold);
        foldButton.addEventListener("pointercancel", releaseFold);
        foldButton.addEventListener("lostpointercapture", releaseFold);
      }

      canvas.addEventListener("pointerdown", handleCanvasPointerDown);
      canvas.addEventListener("pointermove", handleCanvasPointerMove);
      canvas.addEventListener("pointerup", finishCanvasGesture);
      canvas.addEventListener("pointercancel", finishCanvasGesture);
      canvas.addEventListener("lostpointercapture", finishCanvasGesture);
      canvas.addEventListener("touchstart", (event) => {
        if (state.mode === "running") {
          event.preventDefault();
        }
      }, { passive: false });

      window.addEventListener("keydown", (event) => {
        if (event.repeat) {
          if (event.code === "ArrowLeft" || event.code === "KeyA") input.left = true;
          if (event.code === "ArrowRight" || event.code === "KeyD") input.right = true;
          return;
        }

        if (state.mode === "pickup") {
          if (event.code === "Digit1") choosePickup(0);
          if (event.code === "Digit2") choosePickup(1);
          if (event.code === "ArrowLeft") choosePickup(0);
          if (event.code === "ArrowRight") choosePickup(1);
          return;
        }

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          if (event.code === "Enter" || event.code === "Space") {
            event.preventDefault();
            startFromTouch();
          }
          return;
        }

        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = true;
        }
        if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = true;
        }
        if (event.code === "ShiftLeft" || event.code === "ShiftRight") {
          input.stabilize = true;
        }
        if (event.code === "Space" || event.code === "Enter" || event.code === "KeyW") {
          event.preventDefault();
          foldGravity();
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = false;
        }
        if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = false;
        }
        if (event.code === "ShiftLeft" || event.code === "ShiftRight") {
          input.stabilize = false;
        }
      });

      window.addEventListener("blur", clearInput);

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const total = Math.max(0, Number(ms) || 0) / 1000;
        let remaining = total;
        while (remaining > 0) {
          const step = Math.min(FIXED_DT, remaining);
          update(step);
          remaining -= step;
        }
        render();
      };

      window.relayStageMeta = {
        id: META_ID,
        title: META_TITLE,
        creator: "jungcollin",
        genre: "Gravity courier / 저주 픽업",
        clearCondition: META_CLEAR,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          clearRun();
        },
        forceFail() {
          failRun("debug_forced");
        },
      };

      render();
      reportReadyToHost();
      animationFrame = window.requestAnimationFrame(animationLoop);

      window.addEventListener("beforeunload", () => {
        if (animationFrame) {
          window.cancelAnimationFrame(animationFrame);
        }
      });
    </script>
  </body>
</html>
