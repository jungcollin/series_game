<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>유리공방</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Serif KR", "Georgia", serif;
        background: #3a2a1a; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(200, 140, 60, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 30, 10, 0.92);
        color: #fce4c0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f5e6d0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 120, 40, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">유리공방. 용광로에서 떨어지는 유리 방울을 기울여 냉각실을 통과시키세요. 마우스 또는 터치로 중력 방향 조절, 모바일은 화면 터치와 드래그. 유리를 최종 틀에 무사히 도달시키면 성공. 3번 깨지거나 용광로에 빠지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="유리공방" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "crystal-foundry-gravity-folding-cursed",
        title: "유리공방",
        description: "용광로에서 떨어지는 유리 방울을 기울여 냉각실을 통과시키세요.",
        creator: "jungcollin",
        genre: "Gravity puzzle",
        clearCondition: "유리를 최종 틀에 무사히 도달시키면 성공",
        failCondition: "3번 깨지거나 용광로에 빠지면 실패",
        controls: "마우스 또는 터치로 중력 방향을 조절하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#f5e6d0", furnace: "#c8652a",
        amber: "#e8a030", molten: "#ff6820",
        glass: "#b8d4e8", glassCool: "#8aacbe",
        darkStone: "#4a3828", stone: "#8a7a6a",
        crack: "#9e2020", mold: "#6a8a6a",
        cursed: "#5a2040", cursedGlow: "rgba(90, 32, 64, 0.3)",
        text: "#3a2a1a", textLight: "rgba(58, 42, 26, 0.6)",
      };

      // --- State ---
      const DURATION = 40;
      const MAX_CRACKS = 3;
      const NUM_GATES = 5;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      let glass = { x: 60, y: CY, vx: 0, vy: 0, temp: 1.0, cracks: 0 };
      let gravAngle = Math.PI / 2;
      let pointerPos = { x: CX, y: CY };
      let pointerDown = false;

      let gates = [];
      let gatesPassed = 0;
      let cursedMolds = [];
      let particles = [];
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;
      let embers = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Level generation ---
      function buildGates() {
        gates = []; cursedMolds = [];
        const spacing = (W - 140) / (NUM_GATES + 1);
        for (let i = 0; i < NUM_GATES; i++) {
          const gx = 120 + spacing * (i + 1);
          const gapH = lerp(180, 110, i / NUM_GATES);
          const gapY = rand(gapH / 2 + 50, H - gapH / 2 - 50);
          gates.push({ x: gx, gapY, gapH, passed: false, tempRatio: (i + 1) / (NUM_GATES + 1) });
        }
        for (let i = 0; i < NUM_GATES - 1; i++) {
          if (Math.random() < 0.55) {
            const cx = (gates[i].x + gates[i + 1].x) / 2 + rand(-20, 20);
            cursedMolds.push({
              x: cx, y: rand(80, H - 80),
              r: rand(16, 22), pulse: rand(0, Math.PI * 2), active: true,
            });
          }
        }
      }

      function initEmbers() {
        embers = [];
        if (reducedMotion) return;
        for (let i = 0; i < 14; i++) {
          embers.push({
            x: rand(10, 110), y: rand(20, H - 20),
            vy: rand(-25, -55), size: rand(1.5, 3),
            life: rand(0.2, 1), flicker: rand(0, Math.PI * 2),
          });
        }
      }

      function reset() {
        elapsed = 0;
        glass = { x: 60, y: CY, vx: 0, vy: 0, temp: 1.0, cracks: 0 };
        gravAngle = Math.PI / 2;
        gatesPassed = 0;
        particles = []; shake = 0; flashAlpha = 0; clearAnim = 0;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        buildGates(); initEmbers();
      }

      function spawnParticles(x, y, count, color, sizeRange) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), sp = rand(30, 100);
          particles.push({
            x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, color, size: rand(sizeRange[0], sizeRange[1]),
          });
        }
      }

      function crackGlass() {
        glass.cracks++;
        shake = 8; flashAlpha = 0.35;
        spawnParticles(glass.x, glass.y, reducedMotion ? 3 : 7, COL.crack, [2, 5]);
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Gravity toward pointer when held
        if (pointerDown) {
          gravAngle = Math.atan2(pointerPos.y - glass.y, pointerPos.x - glass.x);
        }

        const G = 220;
        glass.vx += Math.cos(gravAngle) * G * dt;
        glass.vy += Math.sin(gravAngle) * G * dt;
        glass.vx *= 0.985; glass.vy *= 0.985;
        glass.x += glass.vx * dt;
        glass.y += glass.vy * dt;

        glass.temp = clamp(1 - glass.x / W, 0, 1);

        // Walls
        const R = 12;
        if (glass.y < R) { glass.y = R; glass.vy = Math.abs(glass.vy) * 0.4; crackGlass(); }
        if (glass.y > H - R) { glass.y = H - R; glass.vy = -Math.abs(glass.vy) * 0.4; crackGlass(); }
        if (glass.x < R) { glass.x = R; glass.vx = Math.abs(glass.vx) * 0.4; }

        // Gates
        for (const g of gates) {
          if (g.passed) continue;
          if (glass.x + R > g.x - 6 && glass.x - R < g.x + 6) {
            const top = g.gapY - g.gapH / 2;
            const bot = g.gapY + g.gapH / 2;
            if (glass.y - R < top || glass.y + R > bot) {
              glass.vx = -glass.vx * 0.3;
              glass.x = glass.vx > 0 ? g.x - 6 - R : g.x + 6 + R;
              crackGlass();
            } else {
              g.passed = true; gatesPassed++;
              spawnParticles(g.x, glass.y, reducedMotion ? 3 : 6, COL.glass, [2, 4]);
            }
          }
        }

        // Cursed molds
        for (const cm of cursedMolds) {
          if (!cm.active) continue;
          cm.pulse += dt * 3;
          if (dist(glass.x, glass.y, cm.x, cm.y) < R + cm.r) {
            cm.active = false;
            crackGlass();
            glass.vx += 130; // speed boost shortcut
            spawnParticles(cm.x, cm.y, reducedMotion ? 4 : 8, COL.cursed, [3, 6]);
          }
        }

        // Reach final mold
        if (glass.x > W - 40) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          spawnParticles(glass.x, glass.y, reducedMotion ? 5 : 12, COL.glass, [3, 7]);
        }

        // Fail
        if (glass.cracks >= MAX_CRACKS) {
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("유리 파손");
        } else if (elapsed >= DURATION) {
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.93; p.vy *= 0.93;
          p.life -= dt * 2.2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Embers
        for (const e of embers) {
          e.y += e.vy * dt;
          e.flicker += rand(2, 5) * dt;
          e.life -= dt * 0.5;
          if (e.life <= 0) { e.y = H + 5; e.life = 1; e.x = rand(10, 110); }
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.9;
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // BG gradient: furnace amber -> cool blue-gray
        const bg = ctx.createLinearGradient(0, 0, W, 0);
        bg.addColorStop(0, "#f0c890");
        bg.addColorStop(0.3, "#f5e6d0");
        bg.addColorStop(1, "#d0e0ec");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Furnace glow
        const fg = ctx.createRadialGradient(0, CY, 20, 0, CY, 160);
        fg.addColorStop(0, "rgba(255, 104, 32, 0.3)");
        fg.addColorStop(1, "rgba(255, 104, 32, 0)");
        ctx.fillStyle = fg;
        ctx.fillRect(0, 0, 200, H);

        drawEmbers();
        drawFinalMold();
        drawGates();
        drawCursedMolds();
        drawGlass();
        drawParticles();
        if (mode === "running") { drawGravityArrow(); drawHUD(); }

        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(158, 32, 32, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawEmbers() {
        if (reducedMotion) return;
        for (const e of embers) {
          const a = (Math.sin(e.flicker) * 0.3 + 0.5) * 0.5;
          ctx.beginPath();
          ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 140, 40, ${a})`;
          ctx.fill();
        }
      }

      function drawGates() {
        for (const g of gates) {
          const top = g.gapY - g.gapH / 2;
          const bot = g.gapY + g.gapH / 2;

          ctx.fillStyle = COL.darkStone;
          ctx.fillRect(g.x - 5, 0, 10, top);
          ctx.fillRect(g.x - 5, bot, 10, H - bot);

          // Gate edge markers
          const col = g.passed ? "rgba(100, 180, 100, 0.5)" : "rgba(200, 160, 80, 0.4)";
          ctx.fillStyle = col;
          ctx.fillRect(g.x - 3, top - 2, 6, 6);
          ctx.fillRect(g.x - 3, bot - 4, 6, 6);
        }
      }

      function drawFinalMold() {
        const mx = W - 28, my = CY;
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = COL.mold;
        ctx.beginPath();
        roundRect(ctx, mx - 18, my - 45, 36, 90, 8);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.strokeStyle = COL.mold;
        ctx.lineWidth = 2;
        ctx.beginPath();
        roundRect(ctx, mx - 18, my - 45, 36, 90, 8);
        ctx.stroke();

        ctx.fillStyle = COL.mold;
        ctx.font = `bold 13px "Noto Serif KR", serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("틀", mx, my);
      }

      function drawCursedMolds() {
        for (const cm of cursedMolds) {
          if (!cm.active) continue;
          const pr = cm.r + Math.sin(cm.pulse) * 3;

          ctx.beginPath();
          ctx.arc(cm.x, cm.y, pr + 8, 0, Math.PI * 2);
          ctx.fillStyle = COL.cursedGlow;
          ctx.fill();

          ctx.beginPath();
          ctx.arc(cm.x, cm.y, pr, 0, Math.PI * 2);
          ctx.fillStyle = COL.cursed;
          ctx.globalAlpha = 0.7;
          ctx.fill();
          ctx.globalAlpha = 1;

          // X mark
          ctx.strokeStyle = "#e0a0c0"; ctx.lineWidth = 2;
          const s = pr * 0.4;
          ctx.beginPath();
          ctx.moveTo(cm.x - s, cm.y - s); ctx.lineTo(cm.x + s, cm.y + s);
          ctx.moveTo(cm.x + s, cm.y - s); ctx.lineTo(cm.x - s, cm.y + s);
          ctx.stroke();
        }
      }

      function drawGlass() {
        const R = 12;
        const r = Math.round(lerp(255, 138, 1 - glass.temp));
        const g = Math.round(lerp(104, 172, 1 - glass.temp));
        const b = Math.round(lerp(32, 232, 1 - glass.temp));

        if (glass.temp > 0.3) {
          ctx.beginPath();
          ctx.arc(glass.x, glass.y, R + 10, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 140, 40, ${glass.temp * 0.25})`;
          ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(glass.x, glass.y, R, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.globalAlpha = 0.85;
        ctx.fill();
        ctx.globalAlpha = 1;

        // Highlight
        ctx.beginPath();
        ctx.arc(glass.x - 3, glass.y - 3, R * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.fill();

        // Cracks
        for (let i = 0; i < glass.cracks; i++) {
          const a = (i / MAX_CRACKS) * Math.PI * 2 + 0.3;
          ctx.beginPath();
          ctx.moveTo(glass.x, glass.y);
          ctx.lineTo(glass.x + Math.cos(a) * R * 1.3, glass.y + Math.sin(a) * R * 1.3);
          ctx.strokeStyle = COL.crack; ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }

      function drawGravityArrow() {
        const ax = glass.x + Math.cos(gravAngle) * 28;
        const ay = glass.y + Math.sin(gravAngle) * 28;
        ctx.beginPath();
        ctx.moveTo(glass.x + Math.cos(gravAngle) * 18, glass.y + Math.sin(gravAngle) * 18);
        ctx.lineTo(ax, ay);
        ctx.strokeStyle = "rgba(58, 42, 26, 0.3)"; ctx.lineWidth = 2;
        ctx.stroke();
        const ha = 0.4;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - Math.cos(gravAngle - ha) * 8, ay - Math.sin(gravAngle - ha) * 8);
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - Math.cos(gravAngle + ha) * 8, ay - Math.sin(gravAngle + ha) * 8);
        ctx.stroke();
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
          ctx.fill(); ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px "Noto Serif KR", serif`;
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`통과 ${gatesPassed}/${NUM_GATES}`, 24, 20);

        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(Math.max(0, DURATION - elapsed))}`, W - 24, 20);

        // Crack dots
        const dotY = H - 24;
        for (let i = 0; i < MAX_CRACKS; i++) {
          const dotX = CX - (MAX_CRACKS - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_CRACKS - glass.cracks ? COL.amber : "#d8d0c4";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(245, 230, 208, 0.95)";
        ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 8); ctx.fill();

        ctx.fillStyle = accent || COL.furnace;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = `bold 22px "Noto Serif KR", serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = `400 14px "Noto Serif KR", serif`;
        ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);

        ctx.fillStyle = "rgba(58, 42, 26, 0.35)";
        ctx.font = `400 13px "Noto Serif KR", serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(245, 230, 208, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("유리공방", [
          "용광로에서 떨어지는 유리 방울을",
          "기울여 냉각실을 통과시키세요",
          "",
          "조작: 터치/클릭으로 중력 방향 조절",
          "클리어: 유리를 최종 틀에 도달",
          "실패: 3번 깨지면 실패",
        ], COL.furnace);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(216, 232, 240, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("유리 완성", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `균열: ${glass.cracks}개`,
          ], COL.mold);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(60, 20, 10, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("유리 파손", [
          elapsed >= DURATION ? "시간이 다했습니다" : "균열이 한계를 넘었습니다",
          `통과: ${gatesPassed} / ${NUM_GATES}`,
        ], COL.crack);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        pointerDown = true;
        pointerPos = getCanvasPos(e.clientX, e.clientY);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running") return;
        pointerPos = getCanvasPos(e.clientX, e.clientY);
      });
      canvas.addEventListener("pointerup", () => { pointerDown = false; });
      canvas.addEventListener("pointerleave", () => { pointerDown = false; });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          cracks: glass.cracks, gatesPassed, temp: +glass.temp.toFixed(2),
          result: window.relayStageResult.status,
        });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running"; glass.x = W;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running"; glass.cracks = MAX_CRACKS;
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      buildGates(); initEmbers();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
