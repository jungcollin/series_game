<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>날아라 새야</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">날아라 새야. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 화면 터치/클릭 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="날아라 새야" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("fly-bird") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "다가오는 장애물을 피해 10초간 생존하세요.",
        bird: { x: 200, y: 270, velocity: 0, radius: 20 },
        gravity: 1200,
        jumpPower: -500,
        pipes: [],
        pipeSpeed: 300,
        pipeWidth: 60,
        pipeGap: 180,
        pipeSpawnTimer: 0,
        pipeSpawnInterval: 1.5,
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.bird = { x: 200, y: 270, velocity: 0, radius: 20 };
        state.pipes = [];
        state.pipeSpawnTimer = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function jump() {
        if (state.mode === "running") {
          state.bird.velocity = state.jumpPower;
        } else if (state.mode === "menu") {
          startStage();
        }
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function checkCollision(bird, pipe) {
        // bird is a circle, pipe has top and bottom rects
        const b = bird;
        const topPipe = { x: pipe.x, y: 0, w: state.pipeWidth, h: pipe.topHeight };
        const bottomPipe = { x: pipe.x, y: pipe.topHeight + state.pipeGap, w: state.pipeWidth, h: VIEW.height - pipe.topHeight - state.pipeGap };

        function circleRectIntersect(cx, cy, r, rx, ry, rw, rh) {
          const testX = cx < rx ? rx : (cx > rx + rw ? rx + rw : cx);
          const testY = cy < ry ? ry : (cy > ry + rh ? ry + rh : cy);
          const distXD = cx - testX;
          const distYD = cy - testY;
          return (distXD * distXD + distYD * distYD) <= r * r;
        }

        if (circleRectIntersect(b.x, b.y, b.radius, topPipe.x, topPipe.y, topPipe.w, topPipe.h)) return true;
        if (circleRectIntersect(b.x, b.y, b.radius, bottomPipe.x, bottomPipe.y, bottomPipe.w, bottomPipe.h)) return true;

        if (b.y - b.radius < 0 || b.y + b.radius > VIEW.height) return true;

        return false;
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (state.elapsed >= 10) {
            clearStage();
            return;
          }

          state.bird.velocity += state.gravity * dt;
          state.bird.y += state.bird.velocity * dt;

          state.pipeSpawnTimer += dt;
          if (state.pipeSpawnTimer >= state.pipeSpawnInterval) {
            state.pipeSpawnTimer = 0;
            const minHeight = 50;
            const maxHeight = VIEW.height - state.pipeGap - minHeight;
            const topHeight = minHeight + Math.random() * (maxHeight - minHeight);
            state.pipes.push({ x: VIEW.width, topHeight });
          }

          for (let i = 0; i < state.pipes.length; i++) {
            state.pipes[i].x -= state.pipeSpeed * dt;
          }

          state.pipes = state.pipes.filter(p => p.x + state.pipeWidth > 0);

          for (let i = 0; i < state.pipes.length; i++) {
            if (checkCollision(state.bird, state.pipes[i])) {
              failStage("장애물 충돌");
              return;
            }
          }

          if (state.bird.y + state.bird.radius >= VIEW.height || state.bird.y - state.bird.radius <= 0) {
            failStage("바닥/천장 충돌");
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function drawBird(x, y, radius, isDead) {
        ctx.fillStyle = isDead ? "#ef4444" : "#eab308";
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(x + radius * 0.4, y - radius * 0.3, radius * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(x + radius * 0.5, y - radius * 0.3, radius * 0.15, 0, Math.PI * 2);
        ctx.fill();
      }

      function renderGameScene() {
        ctx.fillStyle = "#38bdf8"; // Sky
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "#16a34a"; // Pipes
        for (const pipe of state.pipes) {
          ctx.fillRect(pipe.x, 0, state.pipeWidth, pipe.topHeight);
          ctx.fillRect(pipe.x, pipe.topHeight + state.pipeGap, state.pipeWidth, VIEW.height - pipe.topHeight - state.pipeGap);
          // Pipe borders
          ctx.strokeStyle = "#14532d";
          ctx.lineWidth = 4;
          ctx.strokeRect(pipe.x, 0, state.pipeWidth, pipe.topHeight);
          ctx.strokeRect(pipe.x, pipe.topHeight + state.pipeGap, state.pipeWidth, VIEW.height - pipe.topHeight - state.pipeGap);
        }

        drawBird(state.bird.x, state.bird.y, state.bird.radius, state.mode === "failed");

        // UI
        ctx.fillStyle = "#0f172a";
        ctx.font = "bold 24px 'Trebuchet MS', sans-serif";
        ctx.fillText(`Time: ${Math.max(0, 10 - state.elapsed).toFixed(1)}s`, 20, 40);
      }

      function render() {
        if (state.mode === "running") {
          renderGameScene();
          return;
        }

        if (state.mode === "menu") {
          renderCard("날아라 새야", [
            "다가오는 장애물을 피해 10초간 생존하세요.",
            "조작: 화면 터치/클릭, 스페이스바",
            "클리어 조건: 10초 버티기",
            "실패 조건: 장애물 충돌",
          ], "#f97316");
          return;
        }

        if (state.mode === "failed") {
          renderGameScene();
          ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          renderCard("실패", [
            "장애물에 충돌했습니다.",
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
          renderGameScene();
          ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          renderCard("클리어", [
            "10초 동안 생존했습니다!",
          ], "#15803d");
          return;
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
        if (event.key === " " || event.key === "ArrowUp") {
          event.preventDefault();
          jump();
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "fly-bird",
        title: "날아라 새야",
        creator: "Jules",
        genre: "아케이드",
        clearCondition: "10초 버티기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        event.preventDefault();
        jump();
      }, { passive: false });
      canvas.addEventListener("mousedown", (event) => {
        event.preventDefault();
        canvas.focus();
        jump();
      });
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
