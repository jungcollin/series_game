<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>협곡 조각가</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #F0E8D8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180,120,80,0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0,0,0,0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(140,90,60,0.92);
        color: #faf0e0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F0E8D8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180,120,80,0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">협곡 조각가. 화면 터치 드래그로 물줄기 방향을 정해 바위를 깎으세요. 목표 지형 5개를 완성하면 클리어. 물을 3번 잘못 흘리면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="협곡 조각가" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "canyon-carver",
        title: "협곡 조각가",
        description: "물줄기로 바위를 깎아 목표 모양을 만드세요",
        creator: "jungcollin",
        genre: "Erosion puzzle",
        clearCondition: "목표 지형 5개를 완성하면 클리어",
        failCondition: "물을 3번 잘못 흘리면 실패",
        controls: "화면 터치 드래그로 물줄기 방향을 정하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        rock: "#C4A882", rockDark: "#A08868", rockLight: "#D8C8A8",
        target: "rgba(100,180,220,0.25)", targetLine: "#60A0C8",
        water: "#80C0E0", waterDark: "#5098C0", waterLight: "#A0D8F0",
        sky: "#E0F0F8", skyDark: "#C8E0F0",
        sand: "#E8D8C0", sandDark: "#D0C0A0",
        hud: "#8A7050", fail: "#C05050", success: "#5A9A60",
        cardBg: "rgba(255,255,255,0.95)", card: "#8A7050",
      };

      // Grid erosion system
      const GRID_COLS = 12;
      const GRID_ROWS = 8;
      const CELL = 50;
      const GRID_X = (W - GRID_COLS * CELL) / 2;
      const GRID_Y = (H - GRID_ROWS * CELL) / 2 + 20;
      const TARGET_ROUNDS = 5;
      const MAX_MISTAKES = 3;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      // Game state
      let grid = []; // 2D: 0=empty, 1=rock
      let targetGrid = []; // 2D: target pattern (0=should be empty)
      let completed = 0;
      let mistakes = 0;
      let round = 0;
      let isDragging = false;
      let dragPath = [];
      let waterTrails = [];
      let particles = [];
      let roundComplete = false;
      let roundTimer = 0;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color, sizeR, speedR) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2);
          const spd = rand(speedR[0], speedR[1]);
          particles.push({
            x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            life: 1, decay: rand(0.8, 1.5), color, size: rand(sizeR[0], sizeR[1]),
          });
        }
      }

      // Shape templates for carving targets
      const shapes = [
        // Canyon (horizontal channel)
        (g) => { const r = 3 + Math.floor(Math.random() * 2);
          for (let c = 2; c < GRID_COLS - 2; c++) g[r][c] = 0; },
        // Valley (V shape)
        (g) => { const cx = Math.floor(GRID_COLS / 2);
          for (let r = 2; r < GRID_ROWS - 2; r++) {
            const w = Math.floor((r - 2) * 0.8);
            for (let c = cx - w; c <= cx + w; c++) if (c >= 0 && c < GRID_COLS) g[r][c] = 0;
          }},
        // Cross
        (g) => { const cx = Math.floor(GRID_COLS / 2), cy = Math.floor(GRID_ROWS / 2);
          for (let r = cy - 2; r <= cy + 2; r++) if (r >= 0 && r < GRID_ROWS) g[r][cx] = 0;
          for (let c = cx - 2; c <= cx + 2; c++) if (c >= 0 && c < GRID_COLS) g[cy][c] = 0;
        },
        // L shape
        (g) => { for (let r = 2; r < GRID_ROWS - 2; r++) g[r][3] = 0;
          for (let c = 3; c < GRID_COLS - 3; c++) g[GRID_ROWS - 3][c] = 0; },
        // Diamond
        (g) => { const cx = Math.floor(GRID_COLS / 2), cy = Math.floor(GRID_ROWS / 2);
          for (let r = 0; r < GRID_ROWS; r++) for (let c = 0; c < GRID_COLS; c++) {
            if (Math.abs(r - cy) + Math.abs(c - cx) <= 2) g[r][c] = 0;
          }},
        // Zigzag
        (g) => { let c = 2;
          for (let r = 1; r < GRID_ROWS - 1; r++) {
            g[r][c] = 0;
            if (r % 2 === 0) c = Math.min(GRID_COLS - 3, c + 2);
            else c = Math.max(2, c - 1);
          }},
        // U shape
        (g) => { for (let r = 2; r < GRID_ROWS - 2; r++) { g[r][3] = 0; g[r][GRID_COLS - 4] = 0; }
          for (let c = 3; c <= GRID_COLS - 4; c++) g[GRID_ROWS - 3][c] = 0; },
        // Stairs
        (g) => { for (let i = 0; i < 5; i++) {
          const r = 2 + i, c = 2 + i * 2;
          if (r < GRID_ROWS && c < GRID_COLS) { g[r][c] = 0; if (c + 1 < GRID_COLS) g[r][c + 1] = 0; }
        }},
      ];

      function generateRound() {
        grid = [];
        targetGrid = [];
        for (let r = 0; r < GRID_ROWS; r++) {
          grid.push(new Array(GRID_COLS).fill(1));
          targetGrid.push(new Array(GRID_COLS).fill(1));
        }
        // Apply random shape to target
        const shapeIdx = (round * 3 + Math.floor(Math.random() * shapes.length)) % shapes.length;
        shapes[shapeIdx](targetGrid);
        waterTrails = [];
        dragPath = [];
        roundComplete = false;
        roundTimer = 0;
      }

      function startGame() {
        mode = "running"; elapsed = 0;
        completed = 0; mistakes = 0; round = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateRound();
      }

      function doFail(reason) {
        mode = "failed";
        window.relayStageResult.status = "failed";
        reportFailed(reason);
      }

      function doClear() {
        mode = "cleared"; clearAnim = 0;
        window.relayStageResult.status = "cleared";
        reportCleared();
      }

      function getGridCell(px, py) {
        const c = Math.floor((px - GRID_X) / CELL);
        const r = Math.floor((py - GRID_Y) / CELL);
        if (c >= 0 && c < GRID_COLS && r >= 0 && r < GRID_ROWS) return { r, c };
        return null;
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) / rect.width * W, y: (e.clientY - rect.top) / rect.height * H };
      }

      function erodeCell(r, c) {
        if (grid[r][c] === 0) return; // already empty
        grid[r][c] = 0;
        const cx = GRID_X + c * CELL + CELL / 2;
        const cy = GRID_Y + r * CELL + CELL / 2;

        if (targetGrid[r][c] === 0) {
          // Correct erosion
          spawnParticles(cx, cy, 4, COL.sand, [2, 4], [20, 50]);
          waterTrails.push({ x: cx, y: cy, life: 1 });
        } else {
          // Wrong erosion - carved where shouldn't
          mistakes++;
          shake = 0.3;
          spawnParticles(cx, cy, 6, COL.fail, [2, 5], [30, 70]);
          if (mistakes >= MAX_MISTAKES) { doFail("잘못된 침식 3회"); return; }
        }

        // Check if round complete
        let match = true;
        for (let rr = 0; rr < GRID_ROWS; rr++) {
          for (let cc = 0; cc < GRID_COLS; cc++) {
            if (targetGrid[rr][cc] === 0 && grid[rr][cc] !== 0) { match = false; break; }
          }
          if (!match) break;
        }
        if (match) {
          roundComplete = true;
          roundTimer = 0;
          completed++;
          flashAlpha = 0.25;
          spawnParticles(CX, CY, 15, COL.water, [3, 7], [40, 100]);
          if (completed >= TARGET_ROUNDS) { doClear(); return; }
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { startGame(); return; }
        if (roundComplete) return;
        isDragging = true;
        dragPath = [];
        const p = getCanvasPos(e);
        const cell = getGridCell(p.x, p.y);
        if (cell) { erodeCell(cell.r, cell.c); dragPath.push(cell); }
        canvas.setPointerCapture?.(e.pointerId);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (!isDragging || mode !== "running" || roundComplete) return;
        const p = getCanvasPos(e);
        const cell = getGridCell(p.x, p.y);
        if (cell) {
          const last = dragPath[dragPath.length - 1];
          if (!last || last.r !== cell.r || last.c !== cell.c) {
            erodeCell(cell.r, cell.c);
            dragPath.push(cell);
          }
        }
      });
      canvas.addEventListener("pointerup", () => { isDragging = false; });
      canvas.addEventListener("pointercancel", () => { isDragging = false; });
      window.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && mode !== "running") startGame();
      });

      function update(dt) {
        if (mode !== "running") { if (mode === "cleared") clearAnim += dt; return; }
        elapsed += dt;

        if (roundComplete) {
          roundTimer += dt;
          if (roundTimer > 1 && completed < TARGET_ROUNDS) {
            round++;
            generateRound();
          }
        }

        // Water trails decay
        for (let i = waterTrails.length - 1; i >= 0; i--) {
          waterTrails[i].life -= dt;
          if (waterTrails[i].life <= 0) waterTrails.splice(i, 1);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 40 * dt; p.vx *= 0.97;
          p.life -= p.decay * dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
        if (shake > 0) shake = Math.max(0, shake - dt * 3);
        if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt);
      }

      function drawBackground() {
        const grd = ctx.createLinearGradient(0, 0, 0, H);
        grd.addColorStop(0, COL.sky);
        grd.addColorStop(0.3, COL.skyDark);
        grd.addColorStop(1, "#F0E8D8");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);
      }

      function drawGrid() {
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            const x = GRID_X + c * CELL;
            const y = GRID_Y + r * CELL;

            // Target overlay (show where to carve)
            if (targetGrid[r][c] === 0) {
              ctx.fillStyle = COL.target;
              ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
            }

            if (grid[r][c] === 1) {
              // Rock
              const shade = ((r + c) % 3) * 0.04;
              ctx.fillStyle = `rgb(${196 - shade * 200}, ${168 - shade * 200}, ${130 - shade * 200})`;
              ctx.beginPath(); ctx.roundRect(x + 1, y + 1, CELL - 2, CELL - 2, 4); ctx.fill();
              // Rock highlight
              ctx.fillStyle = `rgba(255,255,255,${0.1 - shade * 0.5})`;
              ctx.fillRect(x + 3, y + 3, CELL - 6, 3);
              // Rock edge
              ctx.strokeStyle = COL.rockDark;
              ctx.lineWidth = 0.5;
              ctx.beginPath(); ctx.roundRect(x + 1, y + 1, CELL - 2, CELL - 2, 4); ctx.stroke();
            } else {
              // Empty (carved)
              ctx.fillStyle = COL.sand;
              ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
            }
          }
        }

        // Target outline overlay
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            if (targetGrid[r][c] === 0 && grid[r][c] === 1) {
              const x = GRID_X + c * CELL;
              const y = GRID_Y + r * CELL;
              ctx.setLineDash([3, 3]);
              ctx.strokeStyle = COL.targetLine;
              ctx.lineWidth = 1.5;
              ctx.strokeRect(x + 3, y + 3, CELL - 6, CELL - 6);
              ctx.setLineDash([]);
            }
          }
        }
      }

      function drawWaterTrails() {
        for (const wt of waterTrails) {
          ctx.beginPath();
          ctx.arc(wt.x, wt.y, 6 * wt.life, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(128,192,224,${wt.life * 0.4})`;
          ctx.fill();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawHUD() {
        ctx.font = "bold 20px Trebuchet MS"; ctx.textAlign = "left";
        ctx.fillStyle = COL.hud;
        ctx.fillText(`🏔 ${completed}/${TARGET_ROUNDS}`, 20, 32);

        ctx.textAlign = "center"; ctx.font = "600 16px Trebuchet MS";
        ctx.fillText(`라운드 ${round + 1}`, W / 2, 32);

        ctx.textAlign = "right";
        ctx.fillStyle = mistakes > 0 ? COL.fail : COL.hud;
        ctx.font = "bold 20px Trebuchet MS";
        ctx.fillText(`✕ ${mistakes}/${MAX_MISTAKES}`, W - 20, 32);
        ctx.textAlign = "left";

        // Instruction
        ctx.font = "400 14px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(138,112,80,0.6)";
        ctx.fillText("점선 영역을 드래그하여 깎으세요", W / 2, H - 16);
        ctx.textAlign = "left";
      }

      function drawCard(title, lines, accent, sub) {
        ctx.fillStyle = "rgba(240,232,216,0.92)";
        ctx.fillRect(0, 0, W, H);
        const cardW = Math.min(600, W - 40), cardH = Math.min(360, H - 40);
        const cardX = (W - cardW) / 2, cardY = (H - cardH) / 2;
        ctx.fillStyle = "rgba(180,150,120,0.1)";
        ctx.beginPath(); ctx.roundRect(cardX + 4, cardY + 4, cardW, cardH, 18); ctx.fill();
        ctx.fillStyle = COL.cardBg;
        ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 18); ctx.fill();
        ctx.fillStyle = accent;
        ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, 6, [18, 18, 0, 0]); ctx.fill();
        ctx.fillStyle = accent; ctx.font = "bold 32px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText(title, W / 2, cardY + 56);
        ctx.fillStyle = "#5A4A3A"; ctx.font = "500 18px Trebuchet MS";
        lines.forEach((line, i) => { ctx.fillText(line, W / 2, cardY + 100 + i * 36); });
        if (sub) { ctx.fillStyle = "rgba(90,74,58,0.5)"; ctx.font = "400 15px Trebuchet MS"; ctx.fillText(sub, W / 2, cardY + cardH - 24); }
        ctx.textAlign = "left";
      }

      function render() {
        ctx.save();
        if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 14, (Math.random() - 0.5) * shake * 14);

        if (mode === "menu") {
          drawCard("협곡 조각가", [
            "물줄기로 바위를 깎아 목표 모양을 만드세요",
            "💧 화면 터치 드래그로 바위를 침식",
            "🏔 목표 지형 5개 완성 → 클리어",
            "✕ 잘못된 곳 3번 깎으면 실패",
          ], COL.card, "화면 터치 또는 Enter로 시작");
          ctx.restore(); return;
        }

        if (mode === "running") {
          drawBackground(); drawGrid(); drawWaterTrails();
          drawParticles(); drawHUD();
          if (flashAlpha > 0) { ctx.fillStyle = `rgba(128,192,224,${flashAlpha})`; ctx.fillRect(0, 0, W, H); }
          if (roundComplete) {
            ctx.font = "bold 28px Trebuchet MS"; ctx.textAlign = "center";
            ctx.fillStyle = COL.success;
            ctx.fillText("완성!", W / 2, CY);
            ctx.textAlign = "left";
          }
          ctx.restore(); return;
        }

        if (mode === "cleared") {
          drawBackground(); drawGrid(); drawParticles();
          ctx.globalAlpha = Math.min(1, clearAnim * 2);
          drawCard("클리어!", [`지형 ${completed}개 완성!`, `소요 시간: ${elapsed.toFixed(1)}초`], COL.success, "탭으로 다시 시작");
          ctx.globalAlpha = 1; ctx.restore(); return;
        }

        if (mode === "failed") {
          drawBackground(); drawGrid();
          drawCard("실패", ["잘못된 곳을 3번 깎았습니다!", `완성: ${completed}/${TARGET_ROUNDS}`], COL.fail, "탭으로 다시 시작");
          ctx.restore(); return;
        }
        ctx.restore();
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt); render();
        animFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = function() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1), completed, mistakes, round,
          result: window.relayStageResult.status,
        });
      };
      window.advanceTime = function(ms) {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        render(); return window.render_game_to_text();
      };
      window.relayStageDebug = {
        forceClear() { startGame(); doClear(); render(); },
        forceFail() { startGame(); doFail("debug_force_fail"); render(); },
      };

      reportReady(); render(); canvas.focus();
      animFrame = requestAnimationFrame(frame);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
    </script>
  </body>
</html>
