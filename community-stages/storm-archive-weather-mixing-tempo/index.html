<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storm Archive: Weather Mix</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #06111f;
        --bg-mid: #10253d;
        --panel: rgba(5, 15, 29, 0.64);
        --panel-border: rgba(177, 224, 255, 0.22);
        --text-main: #f6f0dd;
        --text-dim: rgba(246, 240, 221, 0.7);
        --amber: #ffbf73;
        --teal: #8ff7e3;
        --coral: #ff7e8d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(104, 186, 255, 0.16), transparent 30%),
          radial-gradient(circle at 20% 80%, rgba(255, 171, 99, 0.15), transparent 30%),
          linear-gradient(180deg, #05101b 0%, #08192d 44%, #03101a 100%);
      }

      body {
        position: relative;
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0.12);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 30;
        width: 1px;
        height: 1px;
        overflow: hidden;
        padding: 0;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 16, 25, 0.92);
        color: var(--text-main);
        text-decoration: none;
        white-space: nowrap;
        font-weight: 800;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        clip: auto;
        clip-path: none;
        overflow: visible;
        padding: 12px 16px;
        outline: 2px solid rgba(255, 191, 115, 0.9);
        outline-offset: 2px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 3px solid rgba(255, 225, 185, 0.96);
        outline-offset: -8px;
      }

      .control-dock {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 20;
        display: flex;
        justify-content: center;
        pointer-events: none;
        padding: 0 14px calc(16px + env(safe-area-inset-bottom, 0px));
      }

      .control-dock[hidden] {
        display: none;
      }

      .control-dock__inner {
        width: min(100%, 360px);
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        pointer-events: auto;
      }

      .control-btn {
        appearance: none;
        border: 1px solid rgba(170, 225, 255, 0.22);
        border-radius: 22px;
        min-height: 68px;
        background:
          linear-gradient(180deg, rgba(10, 27, 45, 0.96), rgba(6, 17, 29, 0.92)),
          rgba(6, 17, 29, 0.9);
        color: var(--text-main);
        font: 800 18px/1 "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        box-shadow:
          0 18px 30px rgba(0, 0, 0, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        touch-action: manipulation;
        transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      }

      .control-btn small {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-dim);
        letter-spacing: 0.08em;
      }

      .control-btn:focus-visible {
        outline: 3px solid rgba(255, 223, 184, 0.95);
        outline-offset: 2px;
      }

      .control-btn[data-active="true"] {
        transform: translateY(1px) scale(0.98);
      }

      .control-btn[data-tone="amber"] {
        border-color: rgba(255, 191, 115, 0.45);
        box-shadow:
          0 18px 34px rgba(255, 120, 48, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .control-btn[data-tone="teal"] {
        border-color: rgba(143, 247, 227, 0.42);
        box-shadow:
          0 18px 34px rgba(58, 196, 186, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      @media (max-width: 420px) {
        .control-dock {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .control-dock__inner {
          gap: 8px;
        }

        .control-btn {
          min-height: 64px;
          border-radius: 20px;
          font-size: 16px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Storm Archive: Weather Mix. 캔버스를 터치하거나 Enter로 시작하세요.
      기본 조작은 터치 또는 마우스 드래그로 구름 이동, 탭으로 바람 방향 전환, 박자 링이 맞을 때 핵심 입력 사용,
      모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 입니다.
      메뉴, 실행 HUD, 실패/클리어 화면은 390픽셀 모바일에서도 가로로 넘치지 않습니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Storm Archive: Weather Mix"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div id="control-dock" class="control-dock" hidden>
      <div class="control-dock__inner">
        <button
          id="rotate-btn"
          class="control-btn"
          type="button"
          data-tone="amber"
          aria-label="바람 방향 전환"
        >
          풍향 전환
          <small id="rotate-caption">NORTHWEST</small>
        </button>
        <button
          id="surge-btn"
          class="control-btn"
          type="button"
          data-tone="teal"
          aria-label="박자 입력"
        >
          박자 입력
          <small id="surge-caption">READY</small>
        </button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const dock = document.querySelector("#control-dock");
      const rotateBtn = document.querySelector("#rotate-btn");
      const surgeBtn = document.querySelector("#surge-btn");
      const rotateCaption = document.querySelector("#rotate-caption");
      const surgeCaption = document.querySelector("#surge-caption");

      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TITLE_FONT = '"Palatino Linotype", "Book Antiqua", Georgia, serif';
      const UI_FONT = '"Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif';
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext = window.RelayRuntime?.readContext("storm-archive-weather-mixing-tempo") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const META = {
        id: "storm-archive-weather-mixing-tempo",
        title: "Storm Archive: Weather Mix",
        description: "구름층과 바람 결을 섞어 종이 활공체를 세 관측대에 착륙시키는 리듬 퍼즐.",
        creator: "jungcollin",
        genre: "Climate puzzler / 템포 윈도우",
        controls:
          "터치 또는 마우스 드래그로 구름 이동, 탭으로 바람 방향 전환, 박자 링이 맞을 때 핵심 입력 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition: "템포 창을 놓치지 않고 활공체를 3개 관측대에 모두 착륙시키면 클리어",
        failCondition: "핵심 입력을 연속으로 박자 밖에 쓰거나 활공체가 폭풍 코어에 빨려 들어가면 실패",
      };

      const windStates = [
        { label: "북동 결", short: "NORTHEAST", hDir: 1, vDir: -1, glyph: "NE" },
        { label: "북서 결", short: "NORTHWEST", hDir: -1, vDir: -1, glyph: "NW" },
        { label: "남서 결", short: "SOUTHWEST", hDir: -1, vDir: 1, glyph: "SW" },
        { label: "남동 결", short: "SOUTHEAST", hDir: 1, vDir: 1, glyph: "SE" },
      ];

      const routes = [
        {
          label: "관측대 01",
          subtitle: "남서 기록실",
          hint: "lift를 왼쪽으로 끌어당긴 뒤 북서 결에서 첫 돔을 눌러 붙이세요.",
          spawn: { x: 182, y: 420 },
          target: { x: 212, y: 144, radius: 34 },
          bands: {
            shear: { x: 292, y: 356 },
            lift: { x: 216, y: 298 },
          },
          corePull: 34,
          beatInterval: 0.92,
          perfectWindow: 0.08,
          goodWindow: 0.16,
          surgeGood: 120,
          surgePerfect: 160,
          windBias: 1.0,
          color: "#ffbf73",
        },
        {
          label: "관측대 02",
          subtitle: "천정 분류실",
          hint: "코어 가장자리에 두 구름 띠를 겹쳐 중앙 돔까지 사선 상승을 만드세요.",
          spawn: { x: 212, y: 434 },
          target: { x: 482, y: 92, radius: 34 },
          bands: {
            shear: { x: 406, y: 310 },
            lift: { x: 398, y: 278 },
          },
          corePull: 38,
          beatInterval: 0.88,
          perfectWindow: 0.075,
          goodWindow: 0.145,
          surgeGood: 126,
          surgePerfect: 168,
          windBias: 1.06,
          color: "#8ff7e3",
        },
        {
          label: "관측대 03",
          subtitle: "동편 기압실",
          hint: "풍향을 돌려 코어 오른편 기류를 타고 최종 돔에 내려앉으세요.",
          spawn: { x: 132, y: 446 },
          target: { x: 786, y: 138, radius: 36 },
          bands: {
            shear: { x: 624, y: 270 },
            lift: { x: 640, y: 258 },
          },
          corePull: 42,
          beatInterval: 0.84,
          perfectWindow: 0.07,
          goodWindow: 0.13,
          surgeGood: 132,
          surgePerfect: 178,
          windBias: 1.12,
          color: "#ffc897",
        },
      ];

      const observatories = routes.map((route, index) => ({
        x: route.target.x,
        y: route.target.y,
        radius: route.target.radius,
        label: String(index + 1).padStart(2, "0"),
        accent: route.color,
      }));

      const core = { x: 480, y: 284, radius: 72 };
      const stars = Array.from({ length: 52 }, (_, index) => ({
        x: (index * 83.1) % VIEW.width,
        y: (index * 41.7 + 30) % (VIEW.height * 0.72),
        size: 1.2 + (index % 3) * 0.75,
        speed: 0.1 + (index % 5) * 0.04,
      }));
      const wisps = Array.from({ length: reduceMotion ? 8 : 18 }, (_, index) => ({
        seed: 17 + index * 29,
        lane: index % 5,
        phase: index * 0.37,
        amp: 10 + (index % 4) * 6,
      }));

      const bands = {
        shear: {
          key: "shear",
          title: "전단",
          x: routes[0].bands.shear.x,
          y: routes[0].bands.shear.y,
          targetX: routes[0].bands.shear.x,
          targetY: routes[0].bands.shear.y,
          rx: 264,
          ry: 60,
          color: "#ffbf73",
          glow: "rgba(255, 191, 115, 0.48)",
          icon: "H",
        },
        lift: {
          key: "lift",
          title: "상승",
          x: routes[0].bands.lift.x,
          y: routes[0].bands.lift.y,
          targetX: routes[0].bands.lift.x,
          targetY: routes[0].bands.lift.y,
          rx: 84,
          ry: 220,
          color: "#8ff7e3",
          glow: "rgba(143, 247, 227, 0.4)",
          icon: "V",
        },
      };

      const glider = {
        x: routes[0].spawn.x,
        y: routes[0].spawn.y,
        vx: 0,
        vy: 0,
        angle: -0.38,
        trail: [],
        surgeFlash: 0,
        landed: false,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: META.description,
        routeIndex: 0,
        landedCount: 0,
        missStreak: 0,
        beatClock: 0,
        windIndex: 1,
        routeTransition: 0,
        bannerText: "기류 도감 준비",
        bannerTimer: 1.2,
        pulseGlow: 0,
        ambience: 0,
        screenShake: 0,
        pendingRouteIndex: null,
        failReason: "",
      };

      const dragState = {
        pointerId: null,
        bandKey: null,
      };

      const particles = [];
      const popups = [];
      const shockwaves = [];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, t) {
        return start + (end - start) * t;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function normalize(x, y) {
        const length = Math.hypot(x, y) || 1;
        return { x: x / length, y: y / length, length };
      }

      function currentRoute() {
        return routes[state.routeIndex] || routes[routes.length - 1];
      }

      function failureText(reason) {
        if (reason === "tempo_chain") {
          return "박자 창 밖 입력이 연속 누적돼 도감 기류가 붕괴되었습니다.";
        }
        if (reason === "storm_core") {
          return "활공체가 폭풍 코어에 빨려 들어가 기록을 잃었습니다.";
        }
        return META.failCondition;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function spawnPopup(text, x, y, color, scale = 1) {
        popups.push({
          text,
          x,
          y,
          vy: -28,
          life: 0.85,
          ttl: 0.85,
          color,
          scale,
        });
      }

      function spawnShockwave(x, y, color) {
        shockwaves.push({
          x,
          y,
          radius: 18,
          life: 0.46,
          ttl: 0.46,
          color,
        });
      }

      function spawnParticles(x, y, color, count, spread = 1) {
        const amount = reduceMotion ? Math.ceil(count * 0.35) : count;
        for (let index = 0; index < amount; index += 1) {
          const angle = (Math.PI * 2 * index) / amount + randomBetween(-0.2, 0.2);
          const speed = randomBetween(28, 180) * spread;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: randomBetween(2.4, 6.8),
            life: randomBetween(0.4, 0.95),
            ttl: randomBetween(0.4, 0.95),
            color,
          });
        }
      }

      function triggerShake(power) {
        if (reduceMotion) {
          return;
        }
        state.screenShake = Math.max(state.screenShake, power);
      }

      function setDockVisible(visible) {
        dock.hidden = !visible;
      }

      function updateButtonState() {
        rotateCaption.textContent = windStates[state.windIndex].short;
        const rating = getBeatRating();
        if (state.mode !== "running") {
          surgeCaption.textContent = "TAP TO START";
        } else if (rating === "perfect") {
          surgeCaption.textContent = "HIT NOW";
        } else if (rating === "good") {
          surgeCaption.textContent = "ALMOST";
        } else if (state.missStreak > 0) {
          surgeCaption.textContent = `MISS ${state.missStreak}/2`;
        } else {
          surgeCaption.textContent = "BUILD";
        }
      }

      function routeBeatDistance() {
        const interval = currentRoute().beatInterval;
        const phase = (state.beatClock % interval) / interval;
        return Math.min(phase, 1 - phase);
      }

      function getBeatRating() {
        const route = currentRoute();
        const distance = routeBeatDistance();
        if (distance <= route.perfectWindow) {
          return "perfect";
        }
        if (distance <= route.goodWindow) {
          return "good";
        }
        return "miss";
      }

      function syncBandTargets(route) {
        bands.shear.x = route.bands.shear.x;
        bands.shear.y = route.bands.shear.y;
        bands.shear.targetX = route.bands.shear.x;
        bands.shear.targetY = route.bands.shear.y;
        bands.lift.x = route.bands.lift.x;
        bands.lift.y = route.bands.lift.y;
        bands.lift.targetX = route.bands.lift.x;
        bands.lift.targetY = route.bands.lift.y;
      }

      function setRoute(index, immediate = false) {
        const route = routes[index];
        state.routeIndex = index;
        state.pendingRouteIndex = null;
        state.note = route.hint;
        state.bannerText = `${route.label} ${route.subtitle}`;
        state.bannerTimer = 1.45;
        glider.x = route.spawn.x;
        glider.y = route.spawn.y;
        glider.vx = 10;
        glider.vy = -14;
        glider.angle = -0.34;
        glider.trail.length = 0;
        glider.surgeFlash = 0;
        glider.landed = false;
        if (immediate) {
          syncBandTargets(route);
        } else {
          bands.shear.targetX = route.bands.shear.x;
          bands.shear.targetY = route.bands.shear.y;
          bands.lift.targetX = route.bands.lift.x;
          bands.lift.targetY = route.bands.lift.y;
        }
      }

      function resetRun() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.routeIndex = 0;
        state.landedCount = 0;
        state.missStreak = 0;
        state.beatClock = 0;
        state.windIndex = 1;
        state.routeTransition = 0;
        state.bannerText = "기류 도감 동기화";
        state.bannerTimer = 1.6;
        state.pulseGlow = 0;
        state.ambience = 0;
        state.screenShake = 0;
        state.pendingRouteIndex = null;
        state.failReason = "";
        particles.length = 0;
        popups.length = 0;
        shockwaves.length = 0;
        setRoute(0, true);
        updateButtonState();
      }

      function startStage() {
        hostFailedReported = false;
        hostClearedReported = false;
        state.mode = "running";
        window.relayStageResult.status = "running";
        resetRun();
        setDockVisible(true);
        ensureAnimationLoop();
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.failReason = reason;
        state.lastRunTime = state.elapsed;
        state.note = failureText(reason);
        state.bannerText = "아카이브 소실";
        state.bannerTimer = 1.8;
        window.relayStageResult.status = "failed";
        setDockVisible(false);
        triggerShake(14);
        spawnParticles(glider.x, glider.y, "#ff7e8d", 42, 1.1);
        spawnShockwave(glider.x, glider.y, "rgba(255, 126, 141, 0.85)");
        reportFailedToHost(reason);
        ensureAnimationLoop();
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.note = "모든 관측대에 착륙해 폭풍 도감이 완성되었습니다.";
        state.bannerText = "아카이브 확보 완료";
        state.bannerTimer = 2.2;
        window.relayStageResult.status = "cleared";
        setDockVisible(false);
        triggerShake(10);
        spawnParticles(glider.x, glider.y, "#8ff7e3", 56, 1.4);
        spawnShockwave(glider.x, glider.y, "rgba(143, 247, 227, 0.88)");
        reportClearedToHost();
        ensureAnimationLoop();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function toggleWind() {
        if (state.mode !== "running") {
          startStage();
          return;
        }
        state.windIndex = (state.windIndex + 1) % windStates.length;
        state.pulseGlow = Math.max(state.pulseGlow, 0.26);
        state.note = `${windStates[state.windIndex].label}로 기류를 회전했습니다.`;
        spawnPopup(windStates[state.windIndex].glyph, bands.shear.x, bands.shear.y - 28, "#ffbf73", 1.1);
        triggerShake(4);
        updateButtonState();
      }

      function computeWind(x, y) {
        const route = currentRoute();
        const wind = windStates[state.windIndex];
        const shearDX = (x - bands.shear.x) / bands.shear.rx;
        const shearDY = (y - bands.shear.y) / bands.shear.ry;
        const liftDX = (x - bands.lift.x) / bands.lift.rx;
        const liftDY = (y - bands.lift.y) / bands.lift.ry;
        const shearPower = Math.exp(-(shearDY * shearDY + shearDX * shearDX * 0.52));
        const liftPower = Math.exp(-(liftDX * liftDX + liftDY * liftDY * 0.46));
        let fx = wind.hDir * 82 * route.windBias * shearPower;
        let fy = wind.vDir * 82 * route.windBias * liftPower;

        const toCore = normalize(core.x - x, core.y - y);
        const coreDistance = Math.max(14, toCore.length);
        const coreInfluence = clamp(1 - (coreDistance - 46) / 220, 0, 1);
        const coreForce = route.corePull + coreInfluence * (44 + state.landedCount * 6);
        fx += toCore.x * coreForce;
        fy += toCore.y * coreForce;

        const target = currentRoute().target;
        const toTarget = normalize(target.x - x, target.y - y);
        const targetAssist = 16 + (1 - clamp(toTarget.length / 580, 0, 1)) * 18;
        fx += toTarget.x * targetAssist;
        fy += toTarget.y * targetAssist;

        fy += 17;

        return {
          x: fx,
          y: fy,
          shearPower,
          liftPower,
          coreDistance,
        };
      }

      function pulseSurge() {
        if (state.mode !== "running") {
          startStage();
          return;
        }
        if (state.routeTransition > 0) {
          return;
        }
        const rating = getBeatRating();
        const route = currentRoute();
        const wind = computeWind(glider.x, glider.y);
        const toTarget = normalize(route.target.x - glider.x, route.target.y - glider.y);
        const mix = normalize(wind.x + toTarget.x * 56, wind.y + toTarget.y * 56);

        if (rating === "miss") {
          state.missStreak += 1;
          state.note = "박자를 벗어난 입력으로 활공 기록이 흔들립니다.";
          spawnPopup(
            state.missStreak >= 2 ? "리듬 붕괴" : "박자 이탈",
            glider.x,
            glider.y - 34,
            "#ff7e8d",
            1.06
          );
          triggerShake(state.missStreak >= 2 ? 9 : 5);
          glider.vx *= 0.8;
          glider.vy *= 0.8;
          if (state.missStreak >= 2) {
            failStage("tempo_chain");
          }
          updateButtonState();
          return;
        }

        state.missStreak = 0;
        const force = rating === "perfect" ? route.surgePerfect : route.surgeGood;
        glider.vx += mix.x * force;
        glider.vy += mix.y * force;
        glider.surgeFlash = rating === "perfect" ? 1 : 0.68;
        state.pulseGlow = rating === "perfect" ? 1 : 0.68;
        state.note = rating === "perfect" ? "완벽한 박자. 기류가 활공체를 밀어 올립니다." : "박자 창에 맞춰 기류 폭주를 활성화했습니다.";
        spawnShockwave(glider.x, glider.y, rating === "perfect" ? "rgba(255, 208, 143, 0.92)" : "rgba(143, 247, 227, 0.82)");
        spawnParticles(glider.x, glider.y, rating === "perfect" ? "#ffbf73" : "#8ff7e3", rating === "perfect" ? 30 : 20, rating === "perfect" ? 1.3 : 1.05);
        spawnPopup(
          rating === "perfect" ? "PERFECT GUST" : "ON BEAT",
          glider.x,
          glider.y - 36,
          rating === "perfect" ? "#ffe3b3" : "#c8fff3",
          rating === "perfect" ? 1.18 : 1.0
        );
        triggerShake(rating === "perfect" ? 12 : 7);
        updateButtonState();
      }

      function handleLanding() {
        const route = currentRoute();
        state.landedCount += 1;
        glider.landed = true;
        glider.vx *= 0.24;
        glider.vy *= 0.24;
        state.note = `${route.subtitle}에 기록 고정. 다음 기류를 읽으세요.`;
        spawnParticles(route.target.x, route.target.y, route.color, 44, 1.15);
        spawnShockwave(route.target.x, route.target.y, "rgba(255, 236, 205, 0.9)");
        spawnPopup("OBSERVED", route.target.x, route.target.y - 30, "#fff1d5", 1.18);
        triggerShake(8);

        if (state.landedCount >= routes.length) {
          clearStage();
          return;
        }

        state.routeTransition = 1.08;
        state.pendingRouteIndex = state.landedCount;
        state.bannerText = `${route.subtitle} 기록 완료`;
        state.bannerTimer = 1.45;
      }

      function updateBandPosition(bandKey, x, y) {
        const band = bands[bandKey];
        band.x = clamp(x, band.key === "shear" ? 120 : 90, band.key === "shear" ? 840 : 870);
        band.y = clamp(y, 98, 454);
        band.targetX = band.x;
        band.targetY = band.y;
      }

      function pickBand(x, y) {
        let best = null;
        let bestScore = Infinity;
        for (const key of Object.keys(bands)) {
          const band = bands[key];
          const score = Math.hypot(x - band.x, y - band.y);
          if (score < bestScore) {
            bestScore = score;
            best = key;
          }
        }
        return bestScore <= 96 ? best : null;
      }

      function pointerToCanvas(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function releaseButtonState(button) {
        button.dataset.active = "false";
      }

      function bindTapButton(button, handler) {
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          button.dataset.active = "true";
          handler();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", () => releaseButtonState(button));
        button.addEventListener("pointercancel", () => releaseButtonState(button));
        button.addEventListener("lostpointercapture", () => releaseButtonState(button));
      }

      function updateEffects(dt) {
        for (let index = particles.length - 1; index >= 0; index -= 1) {
          const particle = particles[index];
          particle.life -= dt;
          if (particle.life <= 0) {
            particles.splice(index, 1);
            continue;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 4.5;
        }

        for (let index = popups.length - 1; index >= 0; index -= 1) {
          const popup = popups[index];
          popup.life -= dt;
          if (popup.life <= 0) {
            popups.splice(index, 1);
            continue;
          }
          popup.y += popup.vy * dt;
        }

        for (let index = shockwaves.length - 1; index >= 0; index -= 1) {
          const wave = shockwaves[index];
          wave.life -= dt;
          if (wave.life <= 0) {
            shockwaves.splice(index, 1);
            continue;
          }
          wave.radius += dt * 220;
        }

        state.bannerTimer = Math.max(0, state.bannerTimer - dt);
        state.pulseGlow = Math.max(0, state.pulseGlow - dt * 1.8);
        glider.surgeFlash = Math.max(0, glider.surgeFlash - dt * 2.2);
        state.screenShake = Math.max(0, state.screenShake - dt * 34);
      }

      function update(dt) {
        state.ambience += dt;
        updateEffects(dt);

        if (dragState.bandKey) {
          const band = bands[dragState.bandKey];
          band.targetX = band.x;
          band.targetY = band.y;
        } else {
          for (const band of Object.values(bands)) {
            band.x = lerp(band.x, band.targetX, Math.min(1, dt * 6));
            band.y = lerp(band.y, band.targetY, Math.min(1, dt * 6));
          }
        }

        if (state.mode !== "running") {
          glider.angle = lerp(glider.angle, -0.32, Math.min(1, dt * 2.2));
          updateButtonState();
          return;
        }

        state.elapsed += dt;
        state.beatClock += dt;

        if (state.routeTransition > 0) {
          state.routeTransition -= dt;
          const route = currentRoute();
          glider.x = lerp(glider.x, route.target.x, Math.min(1, dt * 3.6));
          glider.y = lerp(glider.y, route.target.y, Math.min(1, dt * 3.6));
          glider.angle = lerp(glider.angle, -0.25, Math.min(1, dt * 5));
          if (state.routeTransition <= 0 && state.pendingRouteIndex !== null) {
            setRoute(state.pendingRouteIndex);
          }
          updateButtonState();
          return;
        }

        const route = currentRoute();
        const wind = computeWind(glider.x, glider.y);
        glider.vx += wind.x * dt;
        glider.vy += wind.y * dt;

        const speed = Math.hypot(glider.vx, glider.vy);
        const cap = 220;
        if (speed > cap) {
          const normalized = normalize(glider.vx, glider.vy);
          glider.vx = normalized.x * cap;
          glider.vy = normalized.y * cap;
        }

        glider.vx *= 0.993;
        glider.vy *= 0.993;
        glider.x += glider.vx * dt;
        glider.y += glider.vy * dt;
        glider.angle = lerp(glider.angle, Math.atan2(glider.vy, glider.vx), Math.min(1, dt * 6));

        if (glider.x < 36 || glider.x > VIEW.width - 36) {
          glider.x = clamp(glider.x, 36, VIEW.width - 36);
          glider.vx *= -0.34;
        }
        if (glider.y < 36 || glider.y > VIEW.height - 28) {
          glider.y = clamp(glider.y, 36, VIEW.height - 28);
          glider.vy *= -0.34;
        }

        glider.trail.push({ x: glider.x, y: glider.y, life: 1 });
        if (glider.trail.length > 28) {
          glider.trail.shift();
        }
        for (const node of glider.trail) {
          node.life = Math.max(0, node.life - dt * 1.8);
        }

        const coreDistance = Math.hypot(glider.x - core.x, glider.y - core.y);
        if (coreDistance <= core.radius * 0.72) {
          failStage("storm_core");
          updateButtonState();
          return;
        }

        const targetDistance = Math.hypot(glider.x - route.target.x, glider.y - route.target.y);
        if (targetDistance < route.target.radius + 34) {
          glider.vx *= 0.988;
          glider.vy *= 0.988;
        }
        if (targetDistance <= route.target.radius + 10 && Math.hypot(glider.vx, glider.vy) <= 110) {
          handleLanding();
        }

        updateButtonState();
      }

      function drawRoundedRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
      }

      function drawPanel(x, y, width, height, accent, fillAlpha = 0.62) {
        ctx.save();
        drawRoundedRect(x, y, width, height, 24);
        ctx.fillStyle = `rgba(5, 15, 29, ${fillAlpha})`;
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function wrapText(text, maxWidth, font) {
        ctx.save();
        ctx.font = font;
        const words = text.split(" ");
        const lines = [];
        let current = "";
        for (const word of words) {
          const proposal = current ? `${current} ${word}` : word;
          if (ctx.measureText(proposal).width <= maxWidth) {
            current = proposal;
          } else {
            if (current) {
              lines.push(current);
            }
            current = word;
          }
        }
        if (current) {
          lines.push(current);
        }
        ctx.restore();
        return lines;
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#061322");
        gradient.addColorStop(0.48, "#10304d");
        gradient.addColorStop(1, "#05111c");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const skyGlow = ctx.createRadialGradient(180, 110, 40, 180, 110, 340);
        skyGlow.addColorStop(0, "rgba(255, 184, 112, 0.18)");
        skyGlow.addColorStop(1, "rgba(255, 184, 112, 0)");
        ctx.fillStyle = skyGlow;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const archiveGlow = ctx.createRadialGradient(744, 126, 50, 744, 126, 280);
        archiveGlow.addColorStop(0, "rgba(143, 247, 227, 0.14)");
        archiveGlow.addColorStop(1, "rgba(143, 247, 227, 0)");
        ctx.fillStyle = archiveGlow;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        for (const star of stars) {
          const twinkle = 0.45 + 0.4 * Math.sin(state.ambience * (0.8 + star.speed) + star.x * 0.01);
          ctx.globalAlpha = twinkle;
          ctx.fillStyle = "#f8f1df";
          ctx.fillRect(star.x, star.y + Math.sin(state.ambience * star.speed + star.x * 0.03) * 2, star.size, star.size);
        }
        ctx.restore();

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (const wisp of wisps) {
          ctx.lineWidth = 1.25 + (wisp.lane % 2) * 0.8;
          ctx.strokeStyle = wisp.lane % 2 === 0 ? "rgba(143, 247, 227, 0.08)" : "rgba(255, 191, 115, 0.08)";
          ctx.beginPath();
          for (let step = 0; step <= 24; step += 1) {
            const progress = step / 24;
            const x = progress * VIEW.width;
            const y =
              82 +
              wisp.lane * 82 +
              Math.sin(progress * 6 + state.ambience * 0.9 + wisp.phase) * wisp.amp +
              Math.cos(progress * 12 + state.ambience * 0.5 + wisp.seed) * 5;
            if (step === 0) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(246, 240, 221, 0.08)";
        ctx.lineWidth = 1;
        ctx.setLineDash([8, 10]);
        ctx.beginPath();
        ctx.arc(480, 238, 302, Math.PI * 0.14, Math.PI * 0.92);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(480, 248, 252, Math.PI * 0.08, Math.PI * 0.97);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.fillStyle = "rgba(5, 11, 20, 0.34)";
        ctx.beginPath();
        ctx.moveTo(0, VIEW.height);
        ctx.bezierCurveTo(200, 426, 360, 422, 540, 468);
        ctx.bezierCurveTo(736, 516, 868, 474, VIEW.width, 422);
        ctx.lineTo(VIEW.width, VIEW.height);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawObservatories() {
        observatories.forEach((observatory, index) => {
          const active = state.mode === "running" && index === state.routeIndex;
          const completed = index < state.landedCount || state.mode === "cleared";
          const glow = completed ? "rgba(143, 247, 227, 0.34)" : active ? "rgba(255, 191, 115, 0.32)" : "rgba(255, 255, 255, 0.07)";

          ctx.save();
          ctx.shadowColor = glow;
          ctx.shadowBlur = completed || active ? 28 : 10;
          ctx.fillStyle = completed ? "rgba(143, 247, 227, 0.22)" : "rgba(247, 236, 215, 0.08)";
          ctx.beginPath();
          ctx.arc(observatory.x, observatory.y, observatory.radius + 8, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(5, 15, 29, 0.9)";
          ctx.beginPath();
          ctx.arc(observatory.x, observatory.y + 16, 22, Math.PI, 0);
          ctx.lineTo(observatory.x + 24, observatory.y + 34);
          ctx.lineTo(observatory.x - 24, observatory.y + 34);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = completed ? "#8ff7e3" : active ? "#ffbf73" : "rgba(246, 240, 221, 0.32)";
          ctx.beginPath();
          ctx.arc(observatory.x, observatory.y + 8, 16, Math.PI, 0);
          ctx.lineTo(observatory.x + 18, observatory.y + 16);
          ctx.lineTo(observatory.x - 18, observatory.y + 16);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = completed ? "#081622" : "#f6f0dd";
          ctx.font = `700 12px ${UI_FONT}`;
          ctx.textAlign = "center";
          ctx.fillText(observatory.label, observatory.x, observatory.y + 13);
          ctx.restore();
        });
        ctx.textAlign = "left";
      }

      function drawStormCore() {
        const pulse = 1 + 0.08 * Math.sin(state.ambience * 2.5);
        const ringRadius = core.radius * pulse;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const glow = ctx.createRadialGradient(core.x, core.y, 12, core.x, core.y, 180);
        glow.addColorStop(0, "rgba(255, 126, 141, 0.22)");
        glow.addColorStop(0.45, "rgba(255, 191, 115, 0.2)");
        glow.addColorStop(1, "rgba(255, 126, 141, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(core.x - 180, core.y - 180, 360, 360);

        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(255, 200, 150, 0.22)";
        ctx.beginPath();
        ctx.arc(core.x, core.y, ringRadius + 38, state.ambience, state.ambience + Math.PI * 1.35);
        ctx.stroke();
        ctx.strokeStyle = "rgba(143, 247, 227, 0.22)";
        ctx.beginPath();
        ctx.arc(core.x, core.y, ringRadius + 18, -state.ambience * 1.2, -state.ambience * 1.2 + Math.PI * 1.5);
        ctx.stroke();

        const coreGradient = ctx.createRadialGradient(core.x, core.y, 18, core.x, core.y, core.radius + 16);
        coreGradient.addColorStop(0, "rgba(255, 167, 124, 0.95)");
        coreGradient.addColorStop(0.35, "rgba(255, 122, 140, 0.78)");
        coreGradient.addColorStop(0.72, "rgba(18, 52, 82, 0.78)");
        coreGradient.addColorStop(1, "rgba(5, 11, 20, 0)");
        ctx.fillStyle = coreGradient;
        ctx.beginPath();
        ctx.arc(core.x, core.y, core.radius + 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(255, 236, 214, 0.35)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 5]);
        for (let index = 0; index < 7; index += 1) {
          const angle = state.ambience * 1.3 + index * 0.9;
          const inner = core.radius * 0.42;
          const outer = core.radius + 16 + (index % 2) * 8;
          ctx.beginPath();
          ctx.moveTo(core.x + Math.cos(angle) * inner, core.y + Math.sin(angle) * inner);
          ctx.lineTo(core.x + Math.cos(angle + 0.34) * outer, core.y + Math.sin(angle + 0.34) * outer);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBand(band, axis) {
        const wind = windStates[state.windIndex];
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = band.glow;
        ctx.beginPath();
        ctx.ellipse(band.x, band.y, band.rx, band.ry, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = band.color;
        ctx.globalAlpha = 0.18;
        ctx.lineWidth = 1.4;
        for (let index = -2; index <= 2; index += 1) {
          const offset = index * (axis === "shear" ? 18 : 20);
          ctx.beginPath();
          if (axis === "shear") {
            ctx.moveTo(band.x - band.rx + 32, band.y + offset);
            ctx.bezierCurveTo(
              band.x - 76,
              band.y + offset - 14 * wind.hDir,
              band.x + 72,
              band.y + offset + 12 * wind.hDir,
              band.x + band.rx - 32,
              band.y + offset
            );
          } else {
            ctx.moveTo(band.x + offset, band.y - band.ry + 34);
            ctx.bezierCurveTo(
              band.x + offset - 14 * wind.vDir,
              band.y - 68,
              band.x + offset + 12 * wind.vDir,
              band.y + 72,
              band.x + offset,
              band.y + band.ry - 34
            );
          }
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.shadowColor = band.color;
        ctx.shadowBlur = 18;
        ctx.fillStyle = "rgba(248, 240, 221, 0.92)";
        ctx.beginPath();
        ctx.arc(band.x, band.y, 19, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = band.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(band.x, band.y, 22, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = "#071019";
        ctx.font = `800 11px ${UI_FONT}`;
        ctx.textAlign = "center";
        ctx.fillText(band.title, band.x, band.y - 28);
        ctx.font = `700 13px ${UI_FONT}`;
        ctx.fillText(band.icon, band.x, band.y + 4);
        ctx.restore();
        ctx.textAlign = "left";
      }

      function drawGlider() {
        ctx.save();
        for (let index = 0; index < glider.trail.length; index += 1) {
          const node = glider.trail[index];
          const alpha = (index + 1) / glider.trail.length;
          ctx.fillStyle = `rgba(246, 240, 221, ${alpha * 0.12})`;
          ctx.beginPath();
          ctx.arc(node.x, node.y, 1.6 + alpha * 4.2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.translate(glider.x, glider.y);
        ctx.rotate(glider.angle);
        ctx.shadowColor = glider.surgeFlash > 0 ? "rgba(255, 191, 115, 0.72)" : "rgba(0, 0, 0, 0.34)";
        ctx.shadowBlur = glider.surgeFlash > 0 ? 24 : 12;
        ctx.fillStyle = "#f6f0dd";
        ctx.beginPath();
        ctx.moveTo(18, 0);
        ctx.lineTo(-14, -9);
        ctx.lineTo(-7, -2);
        ctx.lineTo(-15, 8);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(143, 247, 227, 0.78)";
        ctx.beginPath();
        ctx.moveTo(3, 0);
        ctx.lineTo(-11, -4.8);
        ctx.lineTo(-2, 0);
        ctx.lineTo(-11, 4.8);
        ctx.closePath();
        ctx.fill();

        if (glider.surgeFlash > 0) {
          ctx.globalAlpha = glider.surgeFlash * 0.75;
          ctx.fillStyle = "rgba(255, 191, 115, 0.72)";
          ctx.beginPath();
          ctx.moveTo(-8, 0);
          ctx.lineTo(-26, -6);
          ctx.lineTo(-30, 0);
          ctx.lineTo(-26, 6);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      function drawParticlesAndPopups() {
        ctx.save();
        for (const wave of shockwaves) {
          const alpha = wave.life / wave.ttl;
          ctx.strokeStyle = wave.color.replace(/0\.\d+\)/, `${alpha.toFixed(3)})`);
          ctx.lineWidth = 2.2;
          ctx.beginPath();
          ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (const particle of particles) {
          const alpha = particle.life / particle.ttl;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = 1;
        ctx.textAlign = "center";
        for (const popup of popups) {
          const alpha = popup.life / popup.ttl;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = `800 ${Math.round(15 * popup.scale)}px ${UI_FONT}`;
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.restore();
        ctx.textAlign = "left";
      }

      function drawHUD() {
        const route = currentRoute();
        drawPanel(20, 18, 256, 88, "rgba(255, 191, 115, 0.25)");
        drawPanel(684, 18, 256, 88, "rgba(143, 247, 227, 0.25)");
        drawPanel(24, 454, 430, 58, "rgba(246, 240, 221, 0.12)", 0.5);

        ctx.save();
        ctx.fillStyle = "#f6f0dd";
        ctx.font = `700 13px ${UI_FONT}`;
        ctx.fillText("ARCHIVE ROUTE", 40, 42);
        ctx.font = `800 28px ${TITLE_FONT}`;
        ctx.fillText(`${String(state.landedCount).padStart(2, "0")} / 03`, 40, 74);
        ctx.font = `700 13px ${UI_FONT}`;
        ctx.fillStyle = "rgba(246, 240, 221, 0.74)";
        ctx.fillText(`MISS CHAIN ${state.missStreak}/2`, 150, 43);
        ctx.fillText(route.label, 150, 64);
        ctx.fillText(route.subtitle, 150, 84);

        ctx.fillStyle = "#f6f0dd";
        ctx.font = `700 13px ${UI_FONT}`;
        ctx.fillText("MIXED WIND", 704, 42);
        ctx.font = `800 24px ${TITLE_FONT}`;
        ctx.fillText(windStates[state.windIndex].label, 704, 72);
        ctx.font = `700 13px ${UI_FONT}`;
        ctx.fillStyle = "rgba(246, 240, 221, 0.74)";
        ctx.fillText(`ELAPSED ${state.elapsed.toFixed(1)}s`, 704, 92);

        ctx.fillStyle = "rgba(246, 240, 221, 0.76)";
        ctx.font = `600 13px ${UI_FONT}`;
        ctx.fillText(state.note, 42, 490);
        ctx.restore();

        const beatCenter = { x: 872, y: 468 };
        const interval = route.beatInterval;
        const phase = (state.beatClock % interval) / interval;
        const proximity = 1 - routeBeatDistance() / route.goodWindow;
        const ringRadius = 30 + (1 - phase) * 18;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = proximity > 0 ? "rgba(143, 247, 227, 0.68)" : "rgba(255, 191, 115, 0.22)";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.arc(beatCenter.x, beatCenter.y, ringRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = proximity > 0 ? "rgba(143, 247, 227, 0.2)" : "rgba(255, 191, 115, 0.12)";
        ctx.beginPath();
        ctx.arc(beatCenter.x, beatCenter.y, 20 + state.pulseGlow * 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.textAlign = "center";
        ctx.fillStyle = "#f6f0dd";
        ctx.font = `700 12px ${UI_FONT}`;
        ctx.fillText("TEMPO", beatCenter.x, beatCenter.y - 4);
        ctx.font = `800 11px ${UI_FONT}`;
        ctx.fillStyle = proximity > 0 ? "#8ff7e3" : "#ffbf73";
        ctx.fillText(getBeatRating().toUpperCase(), beatCenter.x, beatCenter.y + 12);
        ctx.restore();
        ctx.textAlign = "left";
      }

      function drawTargetGuides() {
        const route = currentRoute();
        ctx.save();
        ctx.strokeStyle = "rgba(246, 240, 221, 0.15)";
        ctx.lineWidth = 1.1;
        ctx.setLineDash([7, 8]);
        ctx.beginPath();
        ctx.moveTo(glider.x, glider.y);
        ctx.lineTo(route.target.x, route.target.y);
        ctx.stroke();
        ctx.restore();
      }

      function drawBanner() {
        if (state.bannerTimer <= 0) {
          return;
        }
        const progress = clamp(state.bannerTimer / 1.45, 0, 1);
        const eased = easeOutCubic(progress);
        const width = 340;
        const height = 46;
        const x = (VIEW.width - width) / 2;
        const y = 28 + (1 - eased) * -22;
        drawPanel(x, y, width, height, "rgba(255, 255, 255, 0.16)", 0.46);
        ctx.save();
        ctx.globalAlpha = clamp(progress * 1.1, 0, 1);
        ctx.fillStyle = "#f6f0dd";
        ctx.font = `700 15px ${UI_FONT}`;
        ctx.textAlign = "center";
        ctx.fillText(state.bannerText, VIEW.width / 2, y + 29);
        ctx.restore();
        ctx.textAlign = "left";
      }

      function drawMenuOrResult() {
        const isMenu = state.mode === "menu";
        const isClear = state.mode === "cleared";
        const accent = isMenu ? "#ffbf73" : isClear ? "#8ff7e3" : "#ff7e8d";
        const title = isMenu ? META.title : isClear ? "Archive Complete" : "Archive Lost";
        const subtitle = isMenu
          ? "폭풍 아카이브의 두 기류 띠를 섞고, 박자 창에서만 폭주를 켜서 종이 활공체를 세 관측대로 보내세요."
          : isClear
          ? "모든 관측대가 기록을 마쳤습니다."
          : failureText(state.failReason);

        drawPanel(116, 70, 728, 386, accent, 0.68);

        ctx.save();
        const poster = ctx.createLinearGradient(116, 70, 844, 456);
        poster.addColorStop(0, "rgba(255, 191, 115, 0.08)");
        poster.addColorStop(0.52, "rgba(143, 247, 227, 0.04)");
        poster.addColorStop(1, "rgba(255, 126, 141, 0.07)");
        ctx.fillStyle = poster;
        drawRoundedRect(116, 70, 728, 386, 24);
        ctx.fill();

        ctx.fillStyle = accent;
        ctx.font = `700 12px ${UI_FONT}`;
        ctx.fillText("STORM ARCHIVE", 152, 112);
        ctx.fillStyle = "#f6f0dd";
        ctx.font = `800 42px ${TITLE_FONT}`;
        ctx.fillText(title, 152, 164);

        ctx.font = `600 16px ${UI_FONT}`;
        ctx.fillStyle = "rgba(246, 240, 221, 0.82)";
        const subtitleLines = wrapText(subtitle, 520, `600 16px ${UI_FONT}`);
        subtitleLines.slice(0, 3).forEach((line, index) => {
          ctx.fillText(line, 152, 196 + index * 24);
        });

        const chips = isMenu
          ? ["CLIMATE PUZZLER", "TEMPO WINDOW", "3 OBSERVATORIES"]
          : isClear
          ? ["ARCHIVE SEALED", `TIME ${state.lastRunTime.toFixed(1)}S`, "ONE LIFE HELD"]
          : ["TEMPO BREAK", `TIME ${state.lastRunTime.toFixed(1)}S`, "TAP TO RETRY"];

        chips.forEach((chip, index) => {
          const chipX = 152 + index * 154;
          drawPanel(chipX, 236, 136, 34, accent, 0.38);
          ctx.fillStyle = "#f6f0dd";
          ctx.font = `700 11px ${UI_FONT}`;
          ctx.fillText(chip, chipX + 14, 257);
        });

        const leftText = isMenu
          ? [
              `조작: ${META.controls}`,
              `클리어: ${META.clearCondition}`,
              `실패: ${META.failCondition}`,
            ]
          : isClear
          ? [
              `클리어: ${META.clearCondition}`,
              "세 돔의 기록광이 연결되며 다음 스테이지로 이어질 준비를 마쳤습니다.",
              "터치 또는 Enter로 다시 시작할 수 있습니다.",
            ]
          : [
              `실패: ${META.failCondition}`,
              failureText(state.failReason),
              "터치 또는 Enter로 재시작하세요.",
            ];

        let textY = 312;
        for (const block of leftText) {
          const lines = wrapText(block, 520, `600 15px ${UI_FONT}`);
          ctx.fillStyle = "rgba(246, 240, 221, 0.88)";
          ctx.font = `600 15px ${UI_FONT}`;
          lines.forEach((line, index) => {
            ctx.fillText(line, 152, textY + index * 22);
          });
          textY += lines.length * 22 + 14;
        }

        ctx.fillStyle = "rgba(246, 240, 221, 0.66)";
        ctx.font = `700 13px ${UI_FONT}`;
        ctx.fillText(isMenu ? "터치 또는 Enter로 시작" : "터치 또는 Enter로 다시 시도", 152, 430);
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = state.screenShake > 0 ? randomBetween(-state.screenShake, state.screenShake) : 0;
        const shakeY = state.screenShake > 0 ? randomBetween(-state.screenShake * 0.6, state.screenShake * 0.6) : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawObservatories();
        drawBand(bands.shear, "shear");
        drawBand(bands.lift, "lift");
        drawStormCore();
        if (state.mode === "running" || state.mode === "failed" || state.mode === "cleared") {
          drawTargetGuides();
        }
        drawGlider();
        drawParticlesAndPopups();
        if (state.mode === "running") {
          drawHUD();
          drawBanner();
        } else {
          drawMenuOrResult();
        }
        ctx.restore();
      }

      function needsAnimationFrame() {
        return (
          state.mode === "running" ||
          state.routeTransition > 0 ||
          state.screenShake > 0 ||
          particles.length > 0 ||
          popups.length > 0 ||
          shockwaves.length > 0
        );
      }

      function ensureAnimationLoop() {
        if (animationFrame) {
          return;
        }
        lastTimestamp = 0;
        animationFrame = window.requestAnimationFrame(frame);
      }

      function frame(timestamp) {
        animationFrame = 0;
        const delta = lastTimestamp ? Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000) : FIXED_DT;
        lastTimestamp = timestamp;
        update(delta);
        render();
        if (needsAnimationFrame()) {
          animationFrame = window.requestAnimationFrame(frame);
        }
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen?.().catch(() => {});
          return;
        }
        canvas.requestFullscreen?.().catch(() => {});
      }

      canvas.addEventListener("pointerdown", (event) => {
        canvas.focus();
        if (state.mode !== "running") {
          startFromTouch();
          return;
        }
        const point = pointerToCanvas(event);
        const bandKey = pickBand(point.x, point.y);
        if (!bandKey) {
          return;
        }
        dragState.pointerId = event.pointerId;
        dragState.bandKey = bandKey;
        updateBandPosition(bandKey, point.x, point.y);
        canvas.setPointerCapture?.(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!dragState.bandKey || dragState.pointerId !== event.pointerId) {
          return;
        }
        const point = pointerToCanvas(event);
        updateBandPosition(dragState.bandKey, point.x, point.y);
      });

      function releaseDrag(event) {
        if (!dragState.bandKey || dragState.pointerId !== event.pointerId) {
          return;
        }
        dragState.pointerId = null;
        dragState.bandKey = null;
      }

      canvas.addEventListener("pointerup", releaseDrag);
      canvas.addEventListener("pointercancel", releaseDrag);
      canvas.addEventListener("lostpointercapture", releaseDrag);

      bindTapButton(rotateBtn, toggleWind);
      bindTapButton(surgeBtn, pulseSurge);

      document.addEventListener("keydown", (event) => {
        if (event.code === "Enter") {
          startFromTouch();
          return;
        }
        if (event.code === "Space") {
          event.preventDefault();
          pulseSurge();
          return;
        }
        if (event.code === "KeyR") {
          event.preventDefault();
          toggleWind();
          return;
        }
        if (event.code === "KeyF") {
          event.preventDefault();
          toggleFullscreen();
        }
        if (event.code === "Escape" && document.fullscreenElement) {
          document.exitFullscreen?.().catch(() => {});
        }
      });

      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        creator: META.creator,
        genre: META.genre,
        clearCondition: META.clearCondition,
      };

      window.relayStageResult = { status: "running" };

      window.render_game_to_text = function renderGameToText() {
        const route = currentRoute();
        return JSON.stringify({
          coordinate_system: "origin at top-left, +x right, +y down",
          mode: state.mode,
          elapsed: Number(state.elapsed.toFixed(2)),
          result: window.relayStageResult.status,
          note: state.note,
          route_index: state.routeIndex,
          route_label: route.label,
          landed_count: state.landedCount,
          miss_streak: state.missStreak,
          wind_state: windStates[state.windIndex].glyph,
          beat_rating: getBeatRating(),
          beat_phase: Number(((state.beatClock % route.beatInterval) / route.beatInterval).toFixed(3)),
          glider: {
            x: Number(glider.x.toFixed(1)),
            y: Number(glider.y.toFixed(1)),
            vx: Number(glider.vx.toFixed(1)),
            vy: Number(glider.vy.toFixed(1)),
          },
          target: {
            x: route.target.x,
            y: route.target.y,
            radius: route.target.radius,
          },
          bands: {
            shear: { x: Number(bands.shear.x.toFixed(1)), y: Number(bands.shear.y.toFixed(1)) },
            lift: { x: Number(bands.lift.x.toFixed(1)), y: Number(bands.lift.y.toFixed(1)) },
          },
          storm_core: {
            x: core.x,
            y: core.y,
            radius: core.radius,
          },
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      };

      window.advanceTime = function advanceTime(ms = 1000 / 60) {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        if (needsAnimationFrame()) {
          ensureAnimationLoop();
        }
        return window.render_game_to_text();
      };

      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.landedCount = 3;
          glider.x = routes[2].target.x;
          glider.y = routes[2].target.y;
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          glider.x = core.x;
          glider.y = core.y;
          failStage("debug_force_fail");
          render();
        },
      };

      updateButtonState();
      reportReadyToHost();
      render();
    </script>
  </body>
</html>
