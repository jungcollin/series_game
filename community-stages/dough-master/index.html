<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>반죽 장인</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #F5E6D0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(139, 105, 20, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(90, 60, 20, 0.92);
        color: #FFF8F0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F5E6D0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(139, 105, 20, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">반죽 장인. 화면을 터치하거나 탭하여 반죽을 치대세요. 모바일에서는 화면 터치로 반죽을 치댑니다. 탄력 게이지가 목표 영역에 도달하면 반죽 완성. 반죽 5개를 완성하면 클리어. 반죽이 과발효되면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="반죽 장인" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "dough-master",
        title: "반죽 장인",
        description: "빵 반죽을 탭으로 치대서 완벽한 탄력을 만드는 게임",
        creator: "jungcollin",
        genre: "Kneading simulation",
        clearCondition: "반죽 5개를 완성하면 클리어",
        failCondition: "반죽이 과발효되면 실패",
        controls: "화면 탭으로 반죽 치대기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      /* ── Colors ── */
      const COL = {
        bg: "#F5E6D0", bgDark: "#E8D5B8",
        board: "#C4956A", boardDark: "#A07850",
        dough: "#D4A574", doughLight: "#E8C9A0", doughDark: "#B88A5C",
        accent: "#8B6914", accentLight: "#B8922E",
        gaugeGood: "#6B9E3A", gaugeBad: "#C75030", gaugeBar: "#E0D0B8",
        text: "#5A3C14", textLight: "rgba(90,60,20,0.6)",
        clear: "#4A8C28", fail: "#A03020",
      };

      /* ── Constants ── */
      const DURATION = 40;
      const TARGET = 5;
      const GAUGE_GOOD_LOW = 65;
      const GAUGE_GOOD_HIGH = 85;
      const KNEAD_BOOST = 12;
      const DECAY_RATE = 8;
      const DOUGH_BASE_R = 70;

      /* ── State ── */
      let mode = "menu", elapsed = 0, completed = 0, gauge = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;
      let doughSquash = 0, completeFlash = 0, completeScale = 1;
      let particles = [];

      /* Board grain dots */
      const grainDots = [];
      for (let i = 0; i < 60; i++) {
        grainDots.push({ x: Math.random()*W, y: Math.random()*H, w: 1+Math.random()*3, h: 0.5+Math.random(), a: 0.03+Math.random()*0.04 });
      }

      /* ── Helpers ── */
      function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
      function lerp(a,b,t){ return a+(b-a)*t; }
      function rand(lo,hi){ return lo+Math.random()*(hi-lo); }

      /* ── Relay Host ── */
      function inRelayHost(){ try{ return window.parent&&window.parent!==window&&window.parent.RelayHost; }catch{ return false; } }
      function reportReady(){ if(inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason){
        if(!inRelayHost()||hostFailedReported) return; hostFailedReported=true;
        window.parent.RelayHost.onStageFailed?.({ stageId:META.id, stageTitle:META.title, reason, durationSec:+elapsed.toFixed(1) });
      }
      function reportCleared(){
        if(!inRelayHost()||hostClearedReported) return; hostClearedReported=true;
        window.parent.RelayHost.onStageCleared?.({ stageId:META.id, stageTitle:META.title, clearCountAfter:relayContext.clearCount+1, durationSec:+elapsed.toFixed(1) });
      }

      /* ── Particles ── */
      function spawnP(x,y,count,color,sz,spd){
        for(let i=0;i<count;i++){
          const a=rand(0,Math.PI*2),s=rand(spd[0],spd[1]);
          particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-rand(20,60), life:1, color, size:rand(sz[0],sz[1]), grav:rand(80,160) });
        }
      }
      function spawnFlour(x,y){
        const cc=["#FFF8E8","#F5E6D0","#E8D5B8"];
        for(let i=0;i<(reducedMotion?6:18);i++) spawnP(x+rand(-30,30),y+rand(-20,20),1,cc[i%3],[2,6],[30,100]);
      }

      /* ── Knead ── */
      function knead(){
        if(mode!=="running") return;
        gauge+=KNEAD_BOOST+rand(-2,2);
        doughSquash=1;
        if(!reducedMotion) spawnP(CX+rand(-40,40),CY+20-20,3,"#FFF8E8",[1,3],[20,50]);
        if(gauge>100) gauge=100;
        if(gauge>=GAUGE_GOOD_LOW&&gauge<=GAUGE_GOOD_HIGH){
          completed++; completeFlash=1; completeScale=1.3;
          spawnFlour(CX,CY+20);
          if(completed>=TARGET){
            mode="clear"; clearAnim=0;
            window.relayStageResult.status="cleared"; reportCleared();
          } else { gauge=0; doughSquash=0; }
        }
      }

      /* ── Reset ── */
      function reset(){
        elapsed=0; completed=0; gauge=0; shake=0; clearAnim=0;
        doughSquash=0; completeFlash=0; completeScale=1; particles=[];
        hostFailedReported=false; hostClearedReported=false;
        window.relayStageResult.status="running";
      }

      /* ── Update ── */
      function update(dt){
        if(mode!=="running") return;
        elapsed+=dt;
        gauge-=DECAY_RATE*dt;
        if(gauge<0) gauge=0;
        if(doughSquash>0){ doughSquash-=dt*6; if(doughSquash<0) doughSquash=0; }
        if(completeFlash>0){ completeFlash-=dt*3; if(completeFlash<0) completeFlash=0; }
        completeScale=lerp(completeScale,1,clamp(dt*5,0,1));
        for(let i=particles.length-1;i>=0;i--){
          const p=particles[i];
          p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.grav*dt; p.vx*=0.98; p.life-=dt*2;
          if(p.life<=0) particles.splice(i,1);
        }
        shake*=0.9; if(shake<0.3) shake=0;
        if(elapsed>=DURATION){
          mode="failed"; shake=10;
          window.relayStageResult.status="failed"; reportFailed("시간 초과");
        }
      }

      /* ── Draw helpers ── */
      function rrect(c,x,y,w,h,r){
        c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
        c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
        c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
        c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
      }

      /* ── Draw ── */
      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0, sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);
        ctx.fillStyle=COL.bg; ctx.fillRect(0,0,W,H);

        /* wood grain */
        if(!reducedMotion){ for(const g of grainDots){ ctx.globalAlpha=g.a; ctx.fillStyle=COL.boardDark; ctx.fillRect(g.x,g.y,g.w,g.h); } ctx.globalAlpha=1; }

        /* board */
        const bw=340,bh=240,bx=CX-bw/2,by=CY-bh/2+30;
        ctx.fillStyle="rgba(90,60,20,0.12)"; ctx.beginPath(); rrect(ctx,bx+4,by+6,bw,bh,12); ctx.fill();
        ctx.beginPath(); rrect(ctx,bx,by,bw,bh,12); ctx.fillStyle=COL.board; ctx.fill();
        ctx.beginPath(); rrect(ctx,bx,by,bw,bh,12); ctx.strokeStyle=COL.boardDark; ctx.lineWidth=2; ctx.stroke();
        ctx.globalAlpha=0.1;
        for(let i=1;i<5;i++){ const ly=by+(bh/5)*i; ctx.beginPath(); ctx.moveTo(bx+10,ly); ctx.lineTo(bx+bw-10,ly); ctx.strokeStyle=COL.boardDark; ctx.lineWidth=1; ctx.stroke(); }
        ctx.globalAlpha=1;

        /* gauge */
        if(mode==="running") drawGauge();

        /* dough */
        drawDough();

        /* particles */
        for(const p of particles){
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);
          ctx.fillStyle=p.color; ctx.globalAlpha=clamp(p.life,0,1); ctx.fill(); ctx.globalAlpha=1;
        }

        /* complete flash */
        if(completeFlash>0.01){ ctx.fillStyle=`rgba(107,158,58,${completeFlash*0.15})`; ctx.fillRect(0,0,W,H); }

        /* HUD */
        if(mode==="running") drawHUD();
        ctx.restore();

        if(mode==="menu") drawMenu();
        else if(mode==="clear") drawClear();
        else if(mode==="failed") drawFailed();
      }

      function drawDough(){
        const dy=CY+20, sq=doughSquash*0.3;
        const rw=DOUGH_BASE_R*(1+sq)*completeScale, rh=DOUGH_BASE_R*(1-sq*0.6)*completeScale;
        const puff=gauge<20?(1+(20-gauge)*0.003):1;
        const fw=rw*puff, fh=rh*puff;
        /* shadow */
        ctx.beginPath(); ctx.ellipse(CX+3,dy+fh*0.7+3,fw*0.85,fh*0.2,0,0,Math.PI*2);
        ctx.fillStyle="rgba(90,60,20,0.15)"; ctx.fill();
        /* body */
        ctx.beginPath(); ctx.ellipse(CX,dy,fw,fh,0,0,Math.PI*2);
        const dg=ctx.createRadialGradient(CX-15,dy-15,0,CX,dy,fw);
        dg.addColorStop(0,COL.doughLight); dg.addColorStop(0.6,COL.dough); dg.addColorStop(1,COL.doughDark);
        ctx.fillStyle=dg; ctx.fill();
        /* folds */
        ctx.globalAlpha=0.15;
        ctx.beginPath(); ctx.arc(CX-15,dy-8,18,0.3,2.2); ctx.strokeStyle=COL.doughDark; ctx.lineWidth=2; ctx.stroke();
        ctx.beginPath(); ctx.arc(CX+20,dy+5,14,1.5,3.8); ctx.stroke();
        ctx.globalAlpha=1;
        /* flour dust */
        ctx.globalAlpha=0.3;
        for(let i=0;i<8;i++){
          const a=(i/8)*Math.PI*2, r=fw*0.4+Math.sin(a*3+elapsed)*5;
          ctx.beginPath(); ctx.arc(CX+Math.cos(a)*r, dy+Math.sin(a)*r*(fh/fw), 1.5, 0, Math.PI*2);
          ctx.fillStyle="#FFF8E8"; ctx.fill();
        }
        ctx.globalAlpha=1;
      }

      function drawGauge(){
        const gx=W-80, gy=80, gw=28, gh=300;
        ctx.beginPath(); rrect(ctx,gx,gy,gw,gh,14); ctx.fillStyle=COL.gaugeBar; ctx.fill();
        ctx.beginPath(); rrect(ctx,gx,gy,gw,gh,14); ctx.strokeStyle=COL.boardDark; ctx.lineWidth=2; ctx.stroke();
        const gt=gy+gh*(1-GAUGE_GOOD_HIGH/100), gb=gy+gh*(1-GAUGE_GOOD_LOW/100);
        ctx.fillStyle="rgba(107,158,58,0.25)"; ctx.fillRect(gx+2,gt,gw-4,gb-gt);
        ctx.strokeStyle=COL.gaugeGood; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
        ctx.beginPath(); ctx.moveTo(gx,gt); ctx.lineTo(gx+gw,gt); ctx.moveTo(gx,gb); ctx.lineTo(gx+gw,gb); ctx.stroke();
        ctx.setLineDash([]);
        const fH=(gauge/100)*gh, fY=gy+gh-fH;
        ctx.save(); ctx.beginPath(); rrect(ctx,gx,gy,gw,gh,14); ctx.clip();
        ctx.fillStyle=(gauge>=GAUGE_GOOD_LOW&&gauge<=GAUGE_GOOD_HIGH)?COL.gaugeGood:gauge>GAUGE_GOOD_HIGH?COL.gaugeBad:COL.dough;
        ctx.fillRect(gx+3,fY,gw-6,fH); ctx.restore();
        ctx.fillStyle=COL.text; ctx.font='500 13px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="top";
        ctx.fillText("탄력",gx+gw/2,gy+gh+8);
      }

      function drawHUD(){
        ctx.fillStyle=COL.text; ctx.font='bold 18px "Segoe UI",sans-serif'; ctx.textAlign="left"; ctx.textBaseline="top";
        ctx.fillText(`완성: ${completed} / ${TARGET}`,24,20);
        for(let i=0;i<TARGET;i++){
          ctx.beginPath(); ctx.arc(24+i*30+10,60,10,0,Math.PI*2);
          ctx.fillStyle=i<completed?COL.accent:COL.gaugeBar; ctx.fill();
          if(i<completed){ ctx.fillStyle="#FFF8E8"; ctx.font='700 10px sans-serif'; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("✓",24+i*30+10,60); }
        }
        const tl=Math.max(0,DURATION-elapsed);
        ctx.fillStyle=tl<10?COL.fail:COL.text; ctx.font='bold 18px "Segoe UI",sans-serif'; ctx.textAlign="right"; ctx.textBaseline="top";
        ctx.fillText(`${Math.ceil(tl)}초`,W-120,20);
        const barW=W-170, barX=24, barY=80, prog=clamp(elapsed/DURATION,0,1);
        ctx.fillStyle=COL.gaugeBar; ctx.fillRect(barX,barY,barW,4);
        ctx.fillStyle=prog>0.75?COL.fail:COL.accent; ctx.fillRect(barX,barY,barW*(1-prog),4);
        if(gauge<10&&completed<TARGET&&elapsed>1){
          ctx.fillStyle=COL.textLight; ctx.font='400 14px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="bottom";
          ctx.fillText("화면을 탭하여 반죽을 치대세요!",CX,H-30);
        }
      }

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40), lh=28, ch=50+lines.length*lh+44;
        const cx=CX-cw/2, cy=CY-ch/2;
        ctx.fillStyle="rgba(245,230,208,0.96)"; ctx.beginPath(); rrect(ctx,cx,cy,cw,ch,10); ctx.fill();
        ctx.fillStyle=accent; ctx.fillRect(cx+14,cy,cw-28,3);
        ctx.fillStyle=COL.text; ctx.font='bold 24px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="top";
        ctx.fillText(title,CX,cy+18);
        ctx.font='400 14px "Segoe UI",sans-serif'; ctx.fillStyle="rgba(90,60,20,0.75)";
        for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],CX,cy+52+i*lh);
        ctx.fillStyle="rgba(90,60,20,0.4)"; ctx.font='400 13px "Segoe UI",sans-serif';
        ctx.fillText("TAP 또는 ENTER",CX,cy+ch-22);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(245,230,208,0.5)"; ctx.fillRect(0,0,W,H);
        drawCard("반죽 장인",["빵 반죽을 탭으로 치대서","완벽한 탄력을 만드세요","","조작: 화면 터치로 치대기","클리어: 반죽 5개 완성","실패: 반죽이 과발효되면 실패"],COL.accent);
      }
      function drawClear(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(245,230,208,${clearAnim*0.5})`; ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3) drawCard("반죽 완성!",[`${Math.ceil(elapsed)}초 만에 완료`,`반죽 ${completed}개 완성`],COL.clear);
      }
      function drawFailed(){
        ctx.fillStyle="rgba(90,40,20,0.25)"; ctx.fillRect(0,0,W,H);
        drawCard("실패",["반죽이 과발효되었습니다",`완성: ${completed} / ${TARGET}`],COL.fail);
      }

      /* ── Input ── */
      function handleStart(){ if(mode==="menu"||mode==="clear"||mode==="failed"){ reset(); mode="running"; } }
      canvas.addEventListener("pointerdown",(e)=>{ e.preventDefault(); if(mode!=="running"){ handleStart(); return; } knead(); });
      canvas.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); if(mode!=="running"){ handleStart(); return; } knead(); } });

      /* ── Game loop ── */
      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){ lastTimestamp=ts; return; }
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT); lastTimestamp=ts;
        let steps=0;
        while(dt>=FIXED_DT&&steps<4){ update(FIXED_DT); dt-=FIXED_DT; steps++; }
        if(dt>0&&steps<4) update(dt);
        draw();
      }

      /* ── Debug ── */
      function renderGameToText(){
        return JSON.stringify({ mode, elapsed:+elapsed.toFixed(1), completed, gauge:+gauge.toFixed(1), result:window.relayStageResult.status });
      }
      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{
        const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000)));
        for(let i=0;i<steps;i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug={
        forceClear(){ reset(); mode="running"; completed=TARGET; mode="clear"; clearAnim=0; window.relayStageResult.status="cleared"; reportCleared(); draw(); },
        forceFail(){ reset(); mode="running"; elapsed=DURATION; mode="failed"; window.relayStageResult.status="failed"; reportFailed("debug_force_fail"); draw(); },
      };

      /* ── Init ── */
      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
