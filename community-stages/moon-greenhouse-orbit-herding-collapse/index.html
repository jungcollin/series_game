<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Greenhouse: Orbit Shepherd</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(181, 247, 255, 0.18), transparent 26%),
          radial-gradient(circle at 82% 22%, rgba(181, 255, 214, 0.14), transparent 24%),
          linear-gradient(180deg, #11223d, #09111f);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Moon Greenhouse: Orbit Shepherd. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은
      마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 이동 후 바로 다음 지점으로 이어
      달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 입니다. 화면 터치와
      드래그로 비콘을 옮기고, 가볍게 탭해 궤도를 뒤집을 수 있습니다. 메뉴, 실행 중 HUD,
      실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Moon Greenhouse: Orbit Shepherd"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const STAGE_ID = "moon-greenhouse-orbit-herding-collapse";
      const TITLE = "Moon Greenhouse: Orbit Shepherd";
      const DESCRIPTION =
        "월광 온실에서 비콘을 끌어 위성 3기를 순서대로 링에 밀어 넣는 붕괴선 생존 퍼즐";
      const CREATOR = "jungcollin";
      const GENRE = "Orbital survival / 붕괴하는 라인";
      const CONTROLS_TEXT =
        "마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_CONDITION_TEXT =
        "붕괴선이 닿기 전에 위성 3기를 목표 링에 순서대로 통과시키면 클리어";
      const FAIL_CONDITION_TEXT =
        "붕괴선에 휩쓸리거나 위성이 소멸 구역에 닿으면 즉시 실패";
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const PLAY_BOUNDS = {
        left: 108,
        right: VIEW.width - 108,
        top: 92,
        bottom: VIEW.height - 96,
      };
      const SATELLITE_R = 12;
      const BEACON_R = 20;
      const GATE_ROUTE = [
        {
          satIndex: 0,
          label: "LUNA-01",
          x: 322,
          y: 216,
          radius: 34,
          ampX: 12,
          ampY: 16,
          phase: 0.5,
          speed: 1.2,
        },
        {
          satIndex: 1,
          label: "MOSS-02",
          x: 570,
          y: 152,
          radius: 36,
          ampX: 18,
          ampY: 12,
          phase: 1.6,
          speed: 1.5,
        },
        {
          satIndex: 2,
          label: "DEW-03",
          x: 788,
          y: 306,
          radius: 40,
          ampX: 14,
          ampY: 20,
          phase: 2.4,
          speed: 1.1,
        },
      ];
      const SATELLITE_BLUEPRINTS = [
        {
          name: "LUNA",
          color: "#7be4ff",
          radius: 56,
          speed: 1.72,
          angle: -0.58,
        },
        {
          name: "MOSS",
          color: "#8dffba",
          radius: 92,
          speed: 1.34,
          angle: 1.62,
        },
        {
          name: "DEW",
          color: "#ffd98e",
          radius: 128,
          speed: 1.08,
          angle: 3.86,
        },
      ];
      const HAZARD_BLUEPRINTS = [
        {
          label: "vent-a",
          baseX: 456,
          baseY: 366,
          ampX: 64,
          ampY: 42,
          speed: 0.72,
          phase: 0.1,
          radius: 28,
          startGate: 1,
          hue: 14,
        },
        {
          label: "vent-b",
          baseX: 694,
          baseY: 198,
          ampX: 54,
          ampY: 52,
          speed: 0.84,
          phase: 1.5,
          radius: 34,
          startGate: 2,
          hue: 324,
        },
        {
          label: "vent-c",
          baseX: 812,
          baseY: 374,
          ampX: 34,
          ampY: 28,
          speed: 1.13,
          phase: 2.8,
          radius: 26,
          startGate: 2,
          hue: 44,
        },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        sceneTime: 0,
        beacon: null,
        orbitDirection: 1,
        orbitFlash: 0,
        collapseX: -252,
        collapseVeilAlpha: 0,
        gateIndex: 0,
        hazards: [],
        satellites: [],
        particles: [],
        shockwaves: [],
        popups: [],
        screenShake: 0,
        flashColor: "rgba(124, 236, 255, 0.18)",
        flashAlpha: 0,
        message: "",
        lastReason: "",
        pointer: {
          active: false,
          pointerId: null,
          downX: 0,
          downY: 0,
          downTime: 0,
          moved: false,
          startedOverlay: false,
        },
        input: {
          left: false,
          right: false,
          up: false,
          down: false,
        },
        note: DESCRIPTION,
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function withAlpha(hex, alpha) {
        const normalized = hex.replace("#", "");
        const full =
          normalized.length === 3
            ? normalized
                .split("")
                .map((part) => `${part}${part}`)
                .join("")
            : normalized;
        const r = parseInt(full.slice(0, 2), 16);
        const g = parseInt(full.slice(2, 4), 16);
        const b = parseInt(full.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function formatSeconds(value) {
        return `${value.toFixed(1)}s`;
      }

      function gateState(index = state.gateIndex) {
        const gate = GATE_ROUTE[index];
        if (!gate) return null;
        return {
          ...gate,
          x: gate.x + Math.sin(state.sceneTime * gate.speed + gate.phase) * gate.ampX,
          y: gate.y + Math.cos(state.sceneTime * (gate.speed + 0.18) + gate.phase) * gate.ampY,
        };
      }

      function collapseFrontAt(y) {
        return (
          state.collapseX +
          y * 0.235 +
          Math.sin(state.sceneTime * 2.1 + y * 0.018) * 8
        );
      }

      function createBeacon() {
        return {
          x: 178,
          y: 314,
          targetX: 178,
          targetY: 314,
          radius: BEACON_R,
        };
      }

      function createSatellites() {
        return SATELLITE_BLUEPRINTS.map((satellite, index) => ({
          ...satellite,
          id: index,
          r: SATELLITE_R,
          x: 0,
          y: 0,
          trail: [],
          passFlash: 0,
        }));
      }

      function createHazards() {
        return HAZARD_BLUEPRINTS.map((hazard) => ({
          ...hazard,
          x: hazard.baseX,
          y: hazard.baseY,
          alpha: 0,
          active: false,
        }));
      }

      function seedWorld() {
        state.beacon = createBeacon();
        state.satellites = createSatellites();
        state.hazards = createHazards();
        state.particles = [];
        state.shockwaves = [];
        state.popups = [];
        state.gateIndex = 0;
        state.orbitDirection = 1;
        state.orbitFlash = 0;
        state.collapseX = -560;
        state.collapseVeilAlpha = 0.22;
        state.screenShake = 0;
        state.flashAlpha = 0;
        state.flashColor = "rgba(124, 236, 255, 0.18)";
        state.lastReason = "";
        state.message = "비콘을 끌어 첫 문으로 밀어 넣으세요.";
      }

      function beginMenuPreview() {
        state.mode = "menu";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.sceneTime = 0;
        state.note = DESCRIPTION;
        seedWorld();
        window.relayStageResult.status = "running";
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.sceneTime = 0;
        state.note = DESCRIPTION;
        seedWorld();
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function pushPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          age: 0,
          life: 1.05,
        });
      }

      function spawnBurst(x, y, color, count, speed) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.22;
          const magnitude = speed * (14 + Math.random() * 34);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * magnitude,
            vy: Math.sin(angle) * magnitude,
            life: 0.55 + Math.random() * 0.5,
            age: 0,
            size: 2 + Math.random() * 4,
            color,
          });
        }
        state.shockwaves.push({
          x,
          y,
          radius: 10,
          age: 0,
          life: 0.45,
          color,
        });
      }

      function failStage(reason = "failed") {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flashColor = "rgba(255, 92, 116, 0.34)";
        state.flashAlpha = 0.48;
        state.screenShake = Math.max(state.screenShake, 18);
        state.note = FAIL_CONDITION_TEXT;
        const failColor = reason === "dissolve_zone" ? "#ffb36b" : "#ff7189";
        spawnBurst(state.beacon.x, state.beacon.y, failColor, 32, 2.8);
        pushPopup(
          reason === "dissolve_zone" ? "소멸 구역 접촉" : "붕괴선 포착",
          state.beacon.x,
          state.beacon.y - 40,
          failColor
        );
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flashColor = "rgba(120, 255, 202, 0.28)";
        state.flashAlpha = 0.42;
        state.screenShake = Math.max(state.screenShake, 10);
        state.note = CLEAR_CONDITION_TEXT;
        spawnBurst(state.beacon.x, state.beacon.y, "#8dffba", 48, 3.8);
        pushPopup("문 통과 완료", state.beacon.x, state.beacon.y - 40, "#8dffba");
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function setBeaconTarget(x, y) {
        state.beacon.targetX = clamp(x, PLAY_BOUNDS.left, PLAY_BOUNDS.right);
        state.beacon.targetY = clamp(y, PLAY_BOUNDS.top, PLAY_BOUNDS.bottom);
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function toggleOrbitDirection() {
        if (state.mode !== "running") {
          return;
        }
        state.orbitDirection *= -1;
        state.orbitFlash = 1;
        state.flashColor = "rgba(133, 250, 255, 0.22)";
        state.flashAlpha = Math.max(state.flashAlpha, 0.16);
        state.screenShake = Math.max(state.screenShake, 5);
        const gate = gateState();
        if (gate) {
          pushPopup(state.orbitDirection > 0 ? "정궤도" : "역궤도", gate.x, gate.y - 28, "#9ae9ff");
        }
        spawnBurst(state.beacon.x, state.beacon.y, "#9ae9ff", 12, 1.2);
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.986 + 8 * dt;
          return particle.age < particle.life;
        });

        state.shockwaves = state.shockwaves.filter((shockwave) => {
          shockwave.age += dt;
          shockwave.radius += 180 * dt;
          return shockwave.age < shockwave.life;
        });

        state.popups = state.popups.filter((popup) => {
          popup.age += dt;
          popup.y -= 24 * dt;
          return popup.age < popup.life;
        });
      }

      function updateHazards() {
        for (const hazard of state.hazards) {
          const active =
            state.mode === "running"
              ? state.gateIndex >= hazard.startGate || state.elapsed > hazard.startGate * 4 + 3
              : true;
          hazard.active = active;
          hazard.x = hazard.baseX + Math.sin(state.sceneTime * hazard.speed + hazard.phase) * hazard.ampX;
          hazard.y =
            hazard.baseY +
            Math.cos(state.sceneTime * (hazard.speed + 0.18) + hazard.phase) * hazard.ampY;
          const targetAlpha = active ? 0.9 : 0.24;
          hazard.alpha = lerp(hazard.alpha, targetAlpha, 0.08);
        }
      }

      function updateSatellites(dt, preview = false) {
        const intensity = clamp(state.elapsed / 17, 0, 1);
        const orbitFactor = preview ? 0.52 : 1 + intensity * 0.34 + state.gateIndex * 0.1;
        for (const satellite of state.satellites) {
          satellite.angle += state.orbitDirection * satellite.speed * orbitFactor * dt;
          satellite.x = state.beacon.x + Math.cos(satellite.angle) * satellite.radius;
          satellite.y = state.beacon.y + Math.sin(satellite.angle) * satellite.radius * 0.72;
          satellite.passFlash = Math.max(0, satellite.passFlash - dt * 1.8);

          if (!preview || satellite.trail.length < 12 || state.sceneTime % 0.033 < dt) {
            satellite.trail.push({ x: satellite.x, y: satellite.y });
          }
          while (satellite.trail.length > 18) {
            satellite.trail.shift();
          }
        }
      }

      function updatePreview(dt) {
        state.collapseX = -612 + Math.sin(state.sceneTime * 0.7) * 18;
        state.beacon.x = 192 + Math.sin(state.sceneTime * 0.55) * 24;
        state.beacon.y = 300 + Math.cos(state.sceneTime * 0.83) * 36;
        state.beacon.targetX = state.beacon.x;
        state.beacon.targetY = state.beacon.y;
        updateHazards();
        updateSatellites(dt, true);
      }

      function checkGateProgress() {
        const gate = gateState();
        if (!gate) return;
        const target = state.satellites[gate.satIndex];
        if (!target) return;

        if (distance(target, gate) <= gate.radius + target.r + 6) {
          target.passFlash = 1;
          spawnBurst(gate.x, gate.y, target.color, 24, 2.2);
          pushPopup(`${gate.label} 통과`, gate.x, gate.y - 34, target.color);
          state.flashColor = withAlpha(target.color, 0.26);
          state.flashAlpha = Math.max(state.flashAlpha, 0.26);
          state.screenShake = Math.max(state.screenShake, 8);
          state.gateIndex += 1;
          if (state.gateIndex >= GATE_ROUTE.length) {
            clearStage();
          } else {
            const nextGate = GATE_ROUTE[state.gateIndex];
            const nextSat = state.satellites[nextGate.satIndex];
            state.message = `${nextSat.name}를 다음 링으로 유도하세요.`;
          }
        }
      }

      function checkFailures() {
        if (state.mode !== "running") {
          return;
        }

        const beaconFront = collapseFrontAt(state.beacon.y);
        if (state.beacon.x - state.beacon.radius < beaconFront + 6) {
          failStage("collapse_line");
          return;
        }

        for (const satellite of state.satellites) {
          if (satellite.x - satellite.r < collapseFrontAt(satellite.y)) {
            failStage("collapse_line");
            return;
          }
        }

        for (const hazard of state.hazards) {
          if (!hazard.active || hazard.alpha < 0.5) {
            continue;
          }
          for (const satellite of state.satellites) {
            if (distance(hazard, satellite) < hazard.radius + satellite.r + 2) {
              failStage("dissolve_zone");
              return;
            }
          }
        }
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        const intensity = clamp(state.elapsed / 18, 0, 1);
        const moveX = Number(state.input.right) - Number(state.input.left);
        const moveY = Number(state.input.down) - Number(state.input.up);

        if (!state.pointer.active && (moveX || moveY)) {
          const length = Math.hypot(moveX, moveY) || 1;
          setBeaconTarget(
            state.beacon.targetX + (moveX / length) * 324 * dt,
            state.beacon.targetY + (moveY / length) * 324 * dt
          );
        }

        state.beacon.x = lerp(state.beacon.x, state.beacon.targetX, 1 - Math.exp(-dt * 8.5));
        state.beacon.y = lerp(state.beacon.y, state.beacon.targetY, 1 - Math.exp(-dt * 8.5));
        state.orbitFlash = Math.max(0, state.orbitFlash - dt * 2.5);
        state.collapseX += (24 + state.gateIndex * 18 + intensity * 22) * dt;
        state.collapseVeilAlpha = 0.18 + intensity * 0.32 + state.gateIndex * 0.08;

        updateHazards();
        updateSatellites(dt, false);
        checkGateProgress();
        checkFailures();
      }

      function update(dt) {
        state.sceneTime += dt;
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * 1.45);
        state.screenShake = Math.max(0, state.screenShake - dt * 18);
        updateParticles(dt);

        if (state.mode === "running") {
          updateRunning(dt);
          return;
        }

        updatePreview(dt);
      }

      function drawRoundedRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#081321");
        sky.addColorStop(0.45, "#13233d");
        sky.addColorStop(1, "#09111f");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const moonGlow = ctx.createRadialGradient(742, 122, 24, 742, 122, 186);
        moonGlow.addColorStop(0, "rgba(242, 248, 255, 0.9)");
        moonGlow.addColorStop(0.22, "rgba(222, 245, 255, 0.42)");
        moonGlow.addColorStop(1, "rgba(222, 245, 255, 0)");
        ctx.fillStyle = moonGlow;
        ctx.beginPath();
        ctx.arc(742, 122, 186, 0, Math.PI * 2);
        ctx.fill();

        const moonDisk = ctx.createRadialGradient(742, 122, 8, 742, 122, 58);
        moonDisk.addColorStop(0, "#fbfdff");
        moonDisk.addColorStop(0.7, "#d5ecff");
        moonDisk.addColorStop(1, "#95c3ea");
        ctx.fillStyle = moonDisk;
        ctx.beginPath();
        ctx.arc(742, 122, 58, 0, Math.PI * 2);
        ctx.fill();

        for (let index = 0; index < 24; index += 1) {
          const x = ((index * 83) % VIEW.width) + Math.sin(state.sceneTime * 0.25 + index) * 18;
          const y = 22 + ((index * 31) % 210);
          const alpha = 0.06 + (index % 5) * 0.014;
          ctx.fillStyle = `rgba(210, 240, 255, ${alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, 1.4 + (index % 3), 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(193, 234, 255, 0.12)";
        for (let arc = 0; arc < 5; arc += 1) {
          const offset = arc * 56;
          ctx.beginPath();
          ctx.arc(480, 560 + offset, 640 - arc * 58, Math.PI * 1.12, Math.PI * 1.88);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(159, 242, 255, 0.12)";
        ctx.lineWidth = 2;
        for (let rib = 0; rib < 9; rib += 1) {
          const x = 126 + rib * 88;
          ctx.beginPath();
          ctx.moveTo(x, VIEW.height);
          ctx.quadraticCurveTo(x - 40, 308, x + 4, 32);
          ctx.stroke();
        }

        const floorGlow = ctx.createLinearGradient(0, 320, 0, VIEW.height);
        floorGlow.addColorStop(0, "rgba(80, 151, 142, 0)");
        floorGlow.addColorStop(1, "rgba(20, 58, 56, 0.9)");
        ctx.fillStyle = floorGlow;
        ctx.fillRect(0, 296, VIEW.width, VIEW.height - 296);

        for (let plant = 0; plant < 18; plant += 1) {
          const baseX = 30 + plant * 54;
          const sway = Math.sin(state.sceneTime * 0.8 + plant) * 8;
          ctx.strokeStyle = `rgba(118, 255, 184, ${0.1 + (plant % 4) * 0.04})`;
          ctx.lineWidth = 2 + (plant % 3) * 0.4;
          ctx.beginPath();
          ctx.moveTo(baseX, VIEW.height);
          ctx.quadraticCurveTo(baseX + sway, 412, baseX - sway * 0.4, 340 - (plant % 3) * 12);
          ctx.stroke();
        }
      }

      function drawCollapseVeil() {
        const veil = ctx.createLinearGradient(0, 0, VIEW.width, 0);
        veil.addColorStop(0, `rgba(255, 74, 100, ${0.18 + state.collapseVeilAlpha * 0.35})`);
        veil.addColorStop(0.25, `rgba(255, 160, 120, ${0.08 + state.collapseVeilAlpha * 0.25})`);
        veil.addColorStop(1, "rgba(255, 160, 120, 0)");
        ctx.fillStyle = veil;
        for (let stripe = 0; stripe < 28; stripe += 1) {
          const y = stripe * 22;
          const front = collapseFrontAt(y);
          ctx.beginPath();
          ctx.moveTo(0, y + 8);
          ctx.lineTo(front, y - 6);
          ctx.lineTo(front + 22, y + 12);
          ctx.lineTo(0, y + 28);
          ctx.closePath();
          ctx.fill();
        }

        ctx.lineWidth = 4;
        for (let line = 0; line < 18; line += 1) {
          const y = line * 32 + 8;
          const front = collapseFrontAt(y);
          ctx.strokeStyle = `rgba(255, ${112 + line * 4}, ${128 + line * 3}, ${0.32 + (line % 4) * 0.07})`;
          ctx.beginPath();
          ctx.moveTo(front - 92, y - 32);
          ctx.lineTo(front + 16, y + 6);
          ctx.stroke();
        }
      }

      function drawHazards() {
        for (const hazard of state.hazards) {
          if (hazard.alpha <= 0.02) continue;
          const alpha = hazard.alpha;
          const outer = ctx.createRadialGradient(
            hazard.x,
            hazard.y,
            8,
            hazard.x,
            hazard.y,
            hazard.radius * 1.6
          );
          outer.addColorStop(0, `hsla(${hazard.hue}, 96%, 78%, ${alpha * 0.45})`);
          outer.addColorStop(0.6, `hsla(${hazard.hue}, 96%, 62%, ${alpha * 0.18})`);
          outer.addColorStop(1, `hsla(${hazard.hue}, 96%, 62%, 0)`);
          ctx.fillStyle = outer;
          ctx.beginPath();
          ctx.arc(hazard.x, hazard.y, hazard.radius * 1.6, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = `hsla(${hazard.hue}, 96%, 74%, ${alpha * 0.56})`;
          ctx.lineWidth = 2.4;
          for (let petal = 0; petal < 6; petal += 1) {
            const angle = state.sceneTime * 0.6 + petal * (Math.PI / 3);
            const px = hazard.x + Math.cos(angle) * hazard.radius * 0.72;
            const py = hazard.y + Math.sin(angle) * hazard.radius * 0.72;
            ctx.beginPath();
            ctx.moveTo(hazard.x, hazard.y);
            ctx.quadraticCurveTo(
              hazard.x + Math.cos(angle + 0.42) * hazard.radius * 0.56,
              hazard.y + Math.sin(angle - 0.42) * hazard.radius * 0.56,
              px,
              py
            );
            ctx.stroke();
          }

          ctx.fillStyle = `rgba(9, 17, 31, ${0.82 * alpha})`;
          ctx.beginPath();
          ctx.arc(hazard.x, hazard.y, hazard.radius * 0.62, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawGate() {
        const gate = gateState();
        if (!gate || state.mode === "cleared") {
          return;
        }
        const target = state.satellites[gate.satIndex];
        const pulse = 1 + Math.sin(state.sceneTime * 4.8) * 0.08;

        const ringGlow = ctx.createRadialGradient(
          gate.x,
          gate.y,
          gate.radius * 0.3,
          gate.x,
          gate.y,
          gate.radius * 2.5
        );
        ringGlow.addColorStop(0, withAlpha(target.color, 0.22));
        ringGlow.addColorStop(0.5, withAlpha(target.color, 0.12));
        ringGlow.addColorStop(1, withAlpha(target.color, 0));
        ctx.fillStyle = ringGlow;
        ctx.beginPath();
        ctx.arc(gate.x, gate.y, gate.radius * 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = withAlpha(target.color, 0.85);
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(gate.x, gate.y, gate.radius * pulse, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = withAlpha("#dffcff", 0.72);
        ctx.lineWidth = 1.5;
        for (let stripe = -2; stripe <= 2; stripe += 1) {
          ctx.beginPath();
          ctx.moveTo(gate.x + stripe * 8, gate.y - gate.radius - 10);
          ctx.lineTo(gate.x + stripe * 12, gate.y + gate.radius + 10);
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(3, 10, 20, 0.72)";
        drawRoundedRect(gate.x - 48, gate.y - 76, 96, 26, 13);
        ctx.fill();
        ctx.strokeStyle = withAlpha(target.color, 0.52);
        ctx.stroke();
        ctx.fillStyle = withAlpha("#f7fdff", 0.98);
        ctx.font = "700 12px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(gate.label, gate.x, gate.y - 58);
        ctx.textAlign = "left";
      }

      function drawBeacon() {
        const beaconGlow = ctx.createRadialGradient(
          state.beacon.x,
          state.beacon.y,
          4,
          state.beacon.x,
          state.beacon.y,
          74
        );
        beaconGlow.addColorStop(0, "rgba(209, 255, 249, 0.9)");
        beaconGlow.addColorStop(0.18, "rgba(164, 247, 255, 0.4)");
        beaconGlow.addColorStop(1, "rgba(164, 247, 255, 0)");
        ctx.fillStyle = beaconGlow;
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, 74, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(198, 255, 250, 0.24)";
        ctx.lineWidth = 1.2;
        for (const satellite of state.satellites) {
          ctx.beginPath();
          ctx.ellipse(
            state.beacon.x,
            state.beacon.y,
            satellite.radius,
            satellite.radius * 0.72,
            0,
            0,
            Math.PI * 2
          );
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(12, 35, 42, 0.92)";
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, state.beacon.radius + 2, 0, Math.PI * 2);
        ctx.fill();
        const beaconFill = ctx.createRadialGradient(
          state.beacon.x - 6,
          state.beacon.y - 8,
          2,
          state.beacon.x,
          state.beacon.y,
          state.beacon.radius + 8
        );
        beaconFill.addColorStop(0, "#ebfffd");
        beaconFill.addColorStop(0.55, "#8eeeff");
        beaconFill.addColorStop(1, "#1f8ba5");
        ctx.fillStyle = beaconFill;
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, state.beacon.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = withAlpha("#ffffff", 0.7);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, 8 + state.orbitFlash * 8, 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawSatellites() {
        for (const satellite of state.satellites) {
          if (satellite.trail.length > 1) {
            ctx.beginPath();
            satellite.trail.forEach((point, index) => {
              if (index === 0) ctx.moveTo(point.x, point.y);
              else ctx.lineTo(point.x, point.y);
            });
            ctx.strokeStyle = withAlpha(satellite.color, 0.1 + satellite.passFlash * 0.18);
            ctx.lineWidth = 3;
            ctx.stroke();
          }

          const glow = ctx.createRadialGradient(
            satellite.x,
            satellite.y,
            2,
            satellite.x,
            satellite.y,
            24 + satellite.passFlash * 16
          );
          glow.addColorStop(0, withAlpha("#ffffff", 0.95));
          glow.addColorStop(0.2, withAlpha(satellite.color, 0.85));
          glow.addColorStop(1, withAlpha(satellite.color, 0));
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, 24 + satellite.passFlash * 16, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#071221";
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, satellite.r + 2, 0, Math.PI * 2);
          ctx.fill();

          const body = ctx.createLinearGradient(
            satellite.x - 10,
            satellite.y - 10,
            satellite.x + 10,
            satellite.y + 10
          );
          body.addColorStop(0, "#ffffff");
          body.addColorStop(0.55, satellite.color);
          body.addColorStop(1, "#23515e");
          ctx.fillStyle = body;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, satellite.r, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = withAlpha("#ffffff", 0.54);
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(satellite.x - 8, satellite.y);
          ctx.lineTo(satellite.x + 8, satellite.y);
          ctx.moveTo(satellite.x, satellite.y - 8);
          ctx.lineTo(satellite.x, satellite.y + 8);
          ctx.stroke();
        }
      }

      function drawEffects() {
        for (const particle of state.particles) {
          const alpha = 1 - particle.age / particle.life;
          ctx.fillStyle = withAlpha(particle.color, alpha * 0.85);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        for (const shockwave of state.shockwaves) {
          const alpha = 1 - shockwave.age / shockwave.life;
          ctx.strokeStyle = withAlpha(shockwave.color, alpha * 0.62);
          ctx.lineWidth = 3 * alpha;
          ctx.beginPath();
          ctx.arc(shockwave.x, shockwave.y, shockwave.radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (const popup of state.popups) {
          const alpha = 1 - popup.age / popup.life;
          ctx.fillStyle = withAlpha(popup.color, alpha);
          ctx.font = "700 16px 'Avenir Next', 'Segoe UI', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.textAlign = "left";
      }

      function drawHud() {
        const gate = gateState(Math.min(state.gateIndex, GATE_ROUTE.length - 1));
        const target = gate
          ? state.satellites[gate.satIndex]
          : state.satellites[state.satellites.length - 1];

        ctx.fillStyle = "rgba(7, 18, 33, 0.62)";
        drawRoundedRect(18, 16, 250, 118, 20);
        ctx.fill();
        ctx.strokeStyle = "rgba(189, 241, 255, 0.18)";
        ctx.lineWidth = 1.2;
        ctx.stroke();

        ctx.fillStyle = "rgba(240, 252, 255, 0.96)";
        ctx.font = "700 14px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText("Moon Greenhouse", 34, 42);
        ctx.font = "800 28px Georgia, 'Times New Roman', serif";
        ctx.fillText("Orbit Shepherd", 34, 72);

        ctx.font = "600 13px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillStyle = "rgba(220, 240, 248, 0.8)";
        const remaining = Math.max(0, GATE_ROUTE.length - state.gateIndex);
        ctx.fillText(`남은 링 ${remaining}개`, 34, 98);
        ctx.fillText(`시간 ${formatSeconds(state.mode === "running" ? state.elapsed : state.lastRunTime)}`, 34, 118);

        ctx.fillStyle = "rgba(7, 18, 33, 0.58)";
        drawRoundedRect(VIEW.width - 276, 16, 258, 118, 20);
        ctx.fill();
        ctx.strokeStyle = "rgba(189, 241, 255, 0.18)";
        ctx.stroke();

        ctx.fillStyle = withAlpha(target.color, 0.98);
        ctx.font = "800 18px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(`${target.name} 정렬`, VIEW.width - 258, 44);
        ctx.fillStyle = "rgba(220, 240, 248, 0.86)";
        ctx.font = "600 13px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(state.message, VIEW.width - 258, 68);
        ctx.fillText(
          `붕괴선 ${Math.max(0, Math.round((state.beacon.x - collapseFrontAt(state.beacon.y)) / 10))}m`,
          VIEW.width - 258,
          92
        );
        ctx.fillText(
          state.mode === "running"
            ? `${state.orbitDirection > 0 ? "정궤도" : "역궤도"} · 탭 반전`
            : "터치 드래그 · 탭 반전",
          VIEW.width - 258,
          116
        );

        const progressX = 34;
        const progressY = VIEW.height - 34;
        ctx.fillStyle = "rgba(7, 18, 33, 0.56)";
        drawRoundedRect(progressX - 12, progressY - 16, 320, 22, 11);
        ctx.fill();
        for (let index = 0; index < GATE_ROUTE.length; index += 1) {
          const x = progressX + index * 96;
          ctx.strokeStyle = withAlpha(state.satellites[index].color, 0.36);
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, progressY - 4, 9, 0, Math.PI * 2);
          ctx.stroke();
          if (index < state.gateIndex) {
            ctx.fillStyle = state.satellites[index].color;
            ctx.beginPath();
            ctx.arc(x, progressY - 4, 6, 0, Math.PI * 2);
            ctx.fill();
          }
          if (index < GATE_ROUTE.length - 1) {
            ctx.strokeStyle = "rgba(210, 234, 255, 0.18)";
            ctx.beginPath();
            ctx.moveTo(x + 14, progressY - 4);
            ctx.lineTo(x + 82, progressY - 4);
            ctx.stroke();
          }
        }
      }

      function drawOverlayCard(title, accent, subtitle, lines, footer) {
        ctx.fillStyle = "rgba(3, 11, 22, 0.54)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const width = 648;
        const height = 324;
        const x = (VIEW.width - width) / 2;
        const y = (VIEW.height - height) / 2;

        const card = ctx.createLinearGradient(x, y, x + width, y + height);
        card.addColorStop(0, "rgba(10, 24, 40, 0.96)");
        card.addColorStop(1, "rgba(6, 16, 30, 0.92)");
        ctx.fillStyle = card;
        drawRoundedRect(x, y, width, height, 28);
        ctx.fill();

        ctx.strokeStyle = withAlpha(accent, 0.42);
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.fillStyle = "rgba(231, 247, 255, 0.92)";
        ctx.font = "800 18px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(subtitle, x + 36, y + 44);

        ctx.fillStyle = withAlpha(accent, 0.96);
        ctx.font = "800 44px Georgia, 'Times New Roman', serif";
        ctx.fillText(title, x + 36, y + 94);

        ctx.fillStyle = "rgba(226, 242, 250, 0.82)";
        ctx.font = "600 16px 'Avenir Next', 'Segoe UI', sans-serif";
        lines.forEach((line, index) => {
          ctx.fillText(line, x + 36, y + 146 + index * 34);
        });

        ctx.fillStyle = "rgba(210, 232, 241, 0.68)";
        ctx.font = "600 14px 'Avenir Next', 'Segoe UI', sans-serif";
        ctx.fillText(footer, x + 36, y + height - 28);
      }

      function drawMenu() {
        drawOverlayCard(
          "Orbit Shepherd",
          "#9befff",
          "Moon Greenhouse",
          [
            DESCRIPTION,
            "조작: 드래그로 비콘 이동, 짧게 탭해 정궤도와 역궤도 전환",
            "목표: 세 위성을 링에 순서대로 밀어 넣기",
            "위험: 붕괴선과 소멸 구역이 뒤를 조입니다",
            "화면 터치와 드래그로 비콘을 옮기고, 짧게 탭해 궤도를 즉시 뒤집으세요.",
          ],
          "터치 또는 Enter로 시작"
        );
      }

      function drawEndingOverlay() {
        if (state.mode === "failed") {
          const reasonText =
            state.lastReason === "dissolve_zone"
              ? "위성이 소멸 구역에 닿아 궤도가 붕괴되었습니다."
              : "붕괴선이 온실 내부를 덮치며 비콘이 휩쓸렸습니다.";
          drawOverlayCard(
            "Collapse",
            "#ff8c9d",
            "Run Failed",
            [
              reasonText,
              "붕괴선에 휩쓸리거나 소멸 구역에 닿으면 즉시 실패합니다.",
              `생존 시간 ${formatSeconds(state.lastRunTime)}`,
              "다시 터치하거나 Enter를 눌러 즉시 재시작하세요.",
            ],
            "탭 또는 Enter로 재시작"
          );
          return;
        }

        if (state.mode === "cleared") {
          drawOverlayCard(
            "Clear",
            "#8dffba",
            "Moon Gate Stable",
            [
              "세 위성을 목표 링에 순서대로 통과시켰습니다.",
              `클리어 시간 ${formatSeconds(state.lastRunTime)}`,
              "세 개의 위성이 모두 붕괴 문을 통과했습니다.",
              "호스트에서는 다음 스테이지로 이어집니다.",
            ],
            "탭 또는 Enter로 다시 플레이"
          );
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawBackground();

        const shakeX = state.screenShake > 0 ? (Math.random() - 0.5) * state.screenShake : 0;
        const shakeY = state.screenShake > 0 ? (Math.random() - 0.5) * state.screenShake : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawCollapseVeil();
        drawHazards();
        drawGate();
        drawBeacon();
        drawSatellites();
        drawEffects();
        ctx.restore();

        drawHud();

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndingOverlay();
        }

        if (state.flashAlpha > 0.001) {
          ctx.fillStyle = state.flashColor.replace(/[\d.]+\)$/, `${state.flashAlpha})`);
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function renderGameToText() {
        const gate = gateState();
        return JSON.stringify({
          coordinate_system: "origin top-left, x increases right, y increases down",
          mode: state.mode,
          elapsed: Number(state.elapsed.toFixed(2)),
          orbit_direction: state.orbitDirection,
          beacon: {
            x: Number(state.beacon.x.toFixed(1)),
            y: Number(state.beacon.y.toFixed(1)),
            target_x: Number(state.beacon.targetX.toFixed(1)),
            target_y: Number(state.beacon.targetY.toFixed(1)),
          },
          collapse_front_x_at_beacon: Number(collapseFrontAt(state.beacon.y).toFixed(1)),
          next_gate: gate
            ? {
                label: gate.label,
                x: Number(gate.x.toFixed(1)),
                y: Number(gate.y.toFixed(1)),
                target_satellite: state.satellites[gate.satIndex].name,
              }
            : null,
          satellites: state.satellites.map((satellite) => ({
            name: satellite.name,
            x: Number(satellite.x.toFixed(1)),
            y: Number(satellite.y.toFixed(1)),
            radius: satellite.radius,
          })),
          hazards: state.hazards
            .filter((hazard) => hazard.alpha > 0.25)
            .map((hazard) => ({
              label: hazard.label,
              x: Number(hazard.x.toFixed(1)),
              y: Number(hazard.y.toFixed(1)),
              r: hazard.radius,
              active: hazard.active,
            })),
          gate_index: state.gateIndex,
          last_reason: state.lastReason,
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onPointerDown(event) {
        const point = canvasPoint(event);
        canvas.focus();
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
          state.pointer.startedOverlay = true;
          state.pointer.active = false;
          state.pointer.pointerId = null;
          return;
        }

        event.preventDefault();
        state.pointer.active = true;
        state.pointer.pointerId = event.pointerId;
        state.pointer.downX = point.x;
        state.pointer.downY = point.y;
        state.pointer.downTime = performance.now();
        state.pointer.moved = false;
        state.pointer.startedOverlay = false;
        setBeaconTarget(point.x, point.y);
        canvas.setPointerCapture?.(event.pointerId);
      }

      function onPointerMove(event) {
        if (!state.pointer.active || event.pointerId !== state.pointer.pointerId) {
          return;
        }
        const point = canvasPoint(event);
        if (Math.hypot(point.x - state.pointer.downX, point.y - state.pointer.downY) > 12) {
          state.pointer.moved = true;
        }
        setBeaconTarget(point.x, point.y);
      }

      function onPointerUp(event) {
        if (state.pointer.startedOverlay) {
          state.pointer.startedOverlay = false;
          return;
        }
        if (!state.pointer.active || event.pointerId !== state.pointer.pointerId) {
          return;
        }
        const point = canvasPoint(event);
        const duration = performance.now() - state.pointer.downTime;
        if (!state.pointer.moved && duration < 220) {
          toggleOrbitDirection();
        } else {
          setBeaconTarget(point.x, point.y);
        }
        state.pointer.active = false;
        state.pointer.pointerId = null;
      }

      function onPointerCancel(event) {
        if (event.pointerId === state.pointer.pointerId) {
          state.pointer.active = false;
          state.pointer.pointerId = null;
        }
      }

      function setDirectionalInput(key, pressed) {
        if (key === "ArrowLeft" || key === "a" || key === "A") state.input.left = pressed;
        if (key === "ArrowRight" || key === "d" || key === "D") state.input.right = pressed;
        if (key === "ArrowUp" || key === "w" || key === "W") state.input.up = pressed;
        if (key === "ArrowDown" || key === "s" || key === "S") state.input.down = pressed;
      }

      async function toggleFullscreen() {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen?.();
          return;
        }
        await document.exitFullscreen?.();
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
          return;
        }
        if (event.key === " " || event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            toggleOrbitDirection();
          }
          return;
        }
        if (event.key === "f" || event.key === "F") {
          event.preventDefault();
          toggleFullscreen().catch(() => {});
          return;
        }
        setDirectionalInput(event.key, true);
      }

      function onKeyUp(event) {
        setDirectionalInput(event.key, false);
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: STAGE_ID,
        title: TITLE,
        creator: CREATOR,
        genre: GENRE,
        clearCondition: CLEAR_CONDITION_TEXT,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.gateIndex = GATE_ROUTE.length;
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerCancel);
      canvas.addEventListener("lostpointercapture", onPointerCancel);
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      beginMenuPreview();
      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
