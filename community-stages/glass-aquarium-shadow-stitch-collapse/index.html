<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>심해 직조</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
        background: #0a1628; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(0, 180, 220, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(10, 22, 40, 0.92);
        color: #b0e8f0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #0a1628; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(0, 200, 255, 0.5); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">심해 직조. 심해 생물 사이에 발광 실을 연결하세요. 마우스 또는 화면 터치 드래그로 실을 잇습니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 모든 쌍을 연결하면 클리어. 해구가 무너지거나 생물 3마리를 잃으면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="심해 직조" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "glass-aquarium-shadow-stitch-collapse",
        title: "심해 직조",
        description: "심해 생물 사이에 발광 실을 연결하세요. 해구가 무너지기 전에 모든 쌍을 이으세요.",
        creator: "jungcollin",
        genre: "Deep-sea puzzle",
        clearCondition: "해구가 무너지기 전에 모든 쌍 연결",
        failCondition: "해구 붕괴 또는 생물 3마리 유실",
        controls: "터치/드래그로 생물 사이에 발광 실 연결",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#0a1628",
        deep: "#061020",
        cyan: "#00d4ff",
        cyanDim: "rgba(0, 212, 255, 0.3)",
        orange: "#e8832a",
        orangeGlow: "rgba(232, 131, 42, 0.4)",
        thread: "#40f8e0",
        threadGlow: "rgba(64, 248, 224, 0.5)",
        text: "#c0e8f0",
        textDim: "rgba(192, 232, 240, 0.5)",
        danger: "#ff4060",
        wall: "#1a3050",
        wallEdge: "#2a5070",
      };

      // --- Creature types ---
      const CREATURE_TYPES = [
        { shape: "jellyfish", color: "#ff70a0", glow: "rgba(255, 112, 160, 0.4)", symbol: "J" },
        { shape: "anglerfish", color: "#00e8c0", glow: "rgba(0, 232, 192, 0.4)", symbol: "A" },
        { shape: "squid", color: "#a080ff", glow: "rgba(160, 128, 255, 0.4)", symbol: "S" },
        { shape: "urchin", color: "#ffb040", glow: "rgba(255, 176, 64, 0.4)", symbol: "U" },
        { shape: "starfish", color: "#60d0ff", glow: "rgba(96, 208, 255, 0.4)", symbol: "T" },
      ];

      // --- State ---
      const DURATION = 40;
      const MAX_LOST = 3;
      const PAIR_COUNT = 6;
      const COLLAPSE_SPEED = 38;

      let mode = "menu";
      let elapsed = 0;
      let lost = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      // Trench walls
      let wallLeft = 0;
      let wallRight = W;

      // Creatures & connections
      let creatures = [];
      let connections = [];
      let dragging = null;
      let dragLine = null;
      let connectedCount = 0;
      let totalPairs = 0;

      // Bubbles (ambient)
      let bubbles = [];

      // Particles
      let particles = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawning ---
      function generateCreatures() {
        creatures = [];
        connections = [];
        connectedCount = 0;

        const usedTypes = [];
        for (let i = 0; i < PAIR_COUNT; i++) {
          usedTypes.push(CREATURE_TYPES[i % CREATURE_TYPES.length]);
        }
        totalPairs = PAIR_COUNT;

        const margin = 80;
        const placed = [];

        for (let i = 0; i < PAIR_COUNT; i++) {
          const type = usedTypes[i];
          for (let side = 0; side < 2; side++) {
            let x, y, tries = 0;
            do {
              x = rand(margin + 40, W - margin - 40);
              y = rand(margin, H - margin);
              tries++;
            } while (tries < 50 && placed.some(p => dist(p.x, p.y, x, y) < 70));

            const creature = {
              x, y, baseX: x, baseY: y,
              type, pairId: i, side,
              r: 18,
              wobble: rand(0, Math.PI * 2),
              wobbleSpeed: rand(0.8, 1.6),
              alpha: 1,
              connected: false,
              lost: false,
              pulse: 0,
            };
            creatures.push(creature);
            placed.push({ x, y });
          }
        }
      }

      function initBubbles() {
        bubbles = [];
        if (reducedMotion) return;
        for (let i = 0; i < 20; i++) {
          bubbles.push({
            x: rand(0, W), y: rand(0, H),
            r: rand(1, 4), speed: rand(10, 30),
            alpha: rand(0.1, 0.3), drift: rand(-5, 5),
          });
        }
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(30, 100);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color,
            size: rand(2, 5),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; lost = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        wallLeft = 0; wallRight = W;
        dragging = null; dragLine = null;
        hostFailedReported = false;
        hostClearedReported = false;
        particles = [];
        window.relayStageResult.status = "running";
        generateCreatures();
        initBubbles();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Wall collapse from both sides
        const collapseRate = COLLAPSE_SPEED + progress() * 20;
        wallLeft += collapseRate * dt * 0.5;
        wallRight -= collapseRate * dt * 0.5;

        // Check creatures caught by walls
        for (const c of creatures) {
          if (c.lost || c.connected) continue;
          if (c.x - c.r < wallLeft || c.x + c.r > wallRight) {
            c.lost = true;
            lost++;
            shake = 6;
            flashAlpha = 0.3;
            spawnParticles(c.x, c.y, reducedMotion ? 3 : 8, COL.danger);
          }
        }

        // Wobble creatures
        for (const c of creatures) {
          if (c.lost) continue;
          c.wobble += c.wobbleSpeed * dt;
          c.x = c.baseX + Math.sin(c.wobble) * 8;
          c.y = c.baseY + Math.cos(c.wobble * 0.7) * 5;
          if (c.pulse > 0) c.pulse *= 0.92;
        }

        // Bubbles
        for (const b of bubbles) {
          b.y -= b.speed * dt;
          b.x += b.drift * dt;
          if (b.y < -10) { b.y = H + 10; b.x = rand(0, W); }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.94; p.vy *= 0.94;
          p.life -= dt * 2.5;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Shake/flash decay
        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        // Win/lose
        if (connectedCount >= totalPairs) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (lost >= MAX_LOST) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("생물 유실");
        } else if (wallRight - wallLeft < 60) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("해구 붕괴");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background - deep ocean gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#0c1e38");
        grad.addColorStop(0.5, "#081428");
        grad.addColorStop(1, "#040c18");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Trench walls
        drawWalls();

        // Bubbles
        drawBubbles();

        // Connections
        drawConnections();

        // Drag line
        if (dragLine && dragging) {
          ctx.beginPath();
          ctx.moveTo(dragging.x, dragging.y);
          ctx.lineTo(dragLine.x, dragLine.y);
          ctx.strokeStyle = COL.threadGlow;
          ctx.lineWidth = 3;
          ctx.setLineDash([6, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // Creatures
        drawCreatures();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        // Flash
        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(255, 64, 96, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawWalls() {
        // Left wall
        const wallGrad = ctx.createLinearGradient(wallLeft - 40, 0, wallLeft, 0);
        wallGrad.addColorStop(0, COL.deep);
        wallGrad.addColorStop(0.7, COL.wall);
        wallGrad.addColorStop(1, COL.wallEdge);
        ctx.fillStyle = wallGrad;
        ctx.fillRect(0, 0, wallLeft, H);

        // Glow edge left
        ctx.strokeStyle = COL.orangeGlow;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(wallLeft, 0); ctx.lineTo(wallLeft, H);
        ctx.stroke();

        // Right wall
        const wallGrad2 = ctx.createLinearGradient(wallRight, 0, wallRight + 40, 0);
        wallGrad2.addColorStop(0, COL.wallEdge);
        wallGrad2.addColorStop(0.3, COL.wall);
        wallGrad2.addColorStop(1, COL.deep);
        ctx.fillStyle = wallGrad2;
        ctx.fillRect(wallRight, 0, W - wallRight, H);

        ctx.strokeStyle = COL.orangeGlow;
        ctx.beginPath();
        ctx.moveTo(wallRight, 0); ctx.lineTo(wallRight, H);
        ctx.stroke();
      }

      function drawBubbles() {
        for (const b of bubbles) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(100, 200, 240, ${b.alpha})`;
          ctx.fill();
        }
      }

      function drawConnections() {
        for (const conn of connections) {
          const a = conn.a, b = conn.b;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          // Slight curve
          const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2 - 20;
          ctx.quadraticCurveTo(mx, my, b.x, b.y);
          ctx.strokeStyle = a.type.color;
          ctx.lineWidth = 2.5;
          ctx.globalAlpha = 0.7;
          ctx.stroke();
          ctx.globalAlpha = 1;

          // Glow
          ctx.strokeStyle = a.type.glow;
          ctx.lineWidth = 6;
          ctx.globalAlpha = 0.3;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      function drawCreatures() {
        for (const c of creatures) {
          if (c.lost) continue;
          ctx.save();
          ctx.translate(c.x, c.y);

          // Glow
          const glowR = c.r + 8 + (c.pulse > 0.05 ? c.pulse * 6 : 0);
          ctx.beginPath();
          ctx.arc(0, 0, glowR, 0, Math.PI * 2);
          ctx.fillStyle = c.type.glow;
          ctx.fill();

          // Body
          ctx.beginPath();
          const wobR = c.r + Math.sin(c.wobble * 2) * 2;
          ctx.arc(0, 0, wobR, 0, Math.PI * 2);
          ctx.fillStyle = c.connected ? c.type.color : lerp_color(c.type.color, "#ffffff", 0.2);
          ctx.fill();

          // Symbol
          ctx.fillStyle = "#000";
          ctx.font = "bold 14px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(c.type.symbol, 0, 1);

          // Highlight if dragging
          if (dragging === c) {
            ctx.beginPath();
            ctx.arc(0, 0, wobR + 4, 0, Math.PI * 2);
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          ctx.restore();
        }
      }

      function lerp_color(c1, c2, t) {
        // Simple hex lerp
        return c1; // keep simple, color is fine as-is
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = "500 15px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${connectedCount} / ${totalPairs}`, 24, 20);

        ctx.textAlign = "right";
        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.fillText(`${Math.ceil(timeLeft)}`, W - 24, 20);

        // Lives (bottom center)
        const dotY = H - 24;
        for (let i = 0; i < MAX_LOST; i++) {
          const dotX = CX - (MAX_LOST - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_LOST - lost ? COL.cyan : COL.textDim;
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(10, 22, 40, 0.92)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.cyan;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 22px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px sans-serif";
        ctx.fillStyle = COL.textDim;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(192, 232, 240, 0.35)";
        ctx.font = "400 13px sans-serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(10, 22, 40, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("심해 직조", [
          "심해 생물 사이에 발광 실을 연결하세요",
          "같은 종류의 생물 쌍을 터치로 이으세요",
          "",
          "조작: 생물을 터치 후 드래그",
          "클리어: 모든 쌍 연결",
          "실패: 해구 붕괴 또는 3마리 유실",
        ], COL.cyan);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(10, 22, 40, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("직조 완성", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `연결: ${connectedCount}쌍`,
          ], COL.cyan);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(40, 10, 20, 0.4)";
        ctx.fillRect(0, 0, W, H);
        drawCard("직조 실패", [
          lost >= MAX_LOST ? "너무 많은 생물을 잃었습니다" : "해구가 무너졌습니다",
          `연결: ${connectedCount} / ${totalPairs}`,
        ], COL.danger);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function findCreatureAt(px, py) {
        for (const c of creatures) {
          if (c.lost || c.connected) continue;
          if (dist(c.x, c.y, px, py) < c.r + 12) return c;
        }
        return null;
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        const c = findCreatureAt(p.x, p.y);
        if (c) {
          dragging = c;
          dragLine = { x: p.x, y: p.y };
          c.pulse = 1;
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || !dragging) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        dragLine = { x: p.x, y: p.y };
      });

      canvas.addEventListener("pointerup", (e) => {
        if (mode !== "running" || !dragging) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        const target = findCreatureAt(p.x, p.y);
        if (target && target !== dragging && target.type === dragging.type && target.pairId === dragging.pairId) {
          // Successful connection
          connections.push({ a: dragging, b: target });
          dragging.connected = true;
          target.connected = true;
          connectedCount++;
          spawnParticles((dragging.x + target.x) / 2, (dragging.y + target.y) / 2, reducedMotion ? 4 : 10, dragging.type.color);
        }
        dragging = null;
        dragLine = null;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;

        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          connectedCount, lost, totalPairs,
          result: window.relayStageResult.status,
          creatures: creatures.filter(c => !c.lost && !c.connected).length,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          connectedCount = totalPairs;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          lost = MAX_LOST;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      initBubbles();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
