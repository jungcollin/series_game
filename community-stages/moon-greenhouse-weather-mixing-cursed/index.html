<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>달빛 정원사</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Segoe UI", sans-serif;
        background: #1a1832; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 170, 210, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 30, 60, 0.92);
        color: #e8e0f0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #1a1832; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 170, 220, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">달빛 정원사. 프리즘을 드래그하여 달빛을 분리하고 꽃에 비추세요. 마우스 또는 화면 터치 드래그로 프리즘을 움직입니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 15송이 꽃을 피우면 클리어. 그림자에 빛을 비추면 꽃이 시들어 3송이 시들면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="달빛 정원사" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "moon-greenhouse-weather-mixing-cursed",
        title: "달빛 정원사",
        description: "프리즘을 움직여 달빛을 색으로 분리하고 꽃에 비추세요. 저주 그림자를 피하세요.",
        creator: "jungcollin",
        genre: "Light puzzle",
        clearCondition: "15송이 꽃을 피우면 클리어",
        failCondition: "그림자에 빛을 비추면 꽃이 시들어 3송이 시들면 실패",
        controls: "마우스 또는 터치 드래그로 프리즘을 움직여 달빛을 꽃에 비추세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#1a1832",
        bgGrad: "#2a2448",
        moonlight: "#f0e8d0",
        silver: "rgba(220, 215, 240, 0.7)",
        lavender: "#b8a0d8",
        lavenderLight: "rgba(184, 160, 216, 0.3)",
        green: "#7cc47a",
        greenLight: "rgba(124, 196, 122, 0.3)",
        red: "#e86060",
        redLight: "rgba(232, 96, 96, 0.15)",
        shadow: "#2a1840",
        prism: "#d8d0f0",
        pink: "#e8a0b8",
        blue: "#80b0e8",
        yellow: "#e8d870",
        text: "#e8e0f0",
        textDim: "rgba(232, 224, 240, 0.5)",
      };

      const FLOWER_COLORS = [COL.pink, COL.blue, COL.yellow, COL.lavender, COL.green];
      const BEAM_COLORS = ["#e8a0b8", "#80b0e8", "#e8d870", "#b8a0d8", "#7cc47a"];

      // --- State ---
      const DURATION = 45;
      const TARGET = 15;
      const MAX_WILTS = 3;

      let mode = "menu";
      let elapsed = 0;
      let bloomed = 0;
      let wilted = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;

      // Prism
      let prism = { x: CX, y: 160, targetX: CX, targetY: 160 };

      // Moon beams from top
      let moonY = -20;

      // Flowers
      let flowers = [];
      let shadows = [];
      let beams = [];
      let particles = [];
      let stars = [];
      let spawnTimer = 0;
      let shadowTimer = 0;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawning ---
      function spawnFlower() {
        const colorIdx = Math.floor(Math.random() * FLOWER_COLORS.length);
        flowers.push({
          x: rand(80, W - 80),
          y: rand(H * 0.55, H - 60),
          color: FLOWER_COLORS[colorIdx],
          colorIdx,
          r: 18,
          bloom: 0,
          bloomTarget: 1,
          hit: 0,
          alive: true,
          petalPhase: rand(0, Math.PI * 2),
        });
      }

      function spawnShadow() {
        shadows.push({
          x: rand(100, W - 100),
          y: rand(H * 0.55, H - 60),
          r: 22,
          alpha: 0,
          age: 0,
          maxAge: rand(5, 8),
          alive: true,
          pulse: rand(0, Math.PI * 2),
        });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(30, 100);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 30,
            life: 1, color,
            size: rand(2, 4),
          });
        }
      }

      function initStars() {
        stars = [];
        for (let i = 0; i < 40; i++) {
          stars.push({
            x: rand(0, W), y: rand(0, H * 0.45),
            size: rand(0.8, 2.2),
            twinkle: rand(0, Math.PI * 2),
            speed: rand(0.5, 2),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; bloomed = 0; wilted = 0;
        clearAnim = 0;
        prism = { x: CX, y: 160, targetX: CX, targetY: 160 };
        flowers = []; shadows = []; beams = []; particles = [];
        spawnTimer = 0.5; shadowTimer = 3;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        initStars();
        // Spawn initial flowers
        for (let i = 0; i < 4; i++) spawnFlower();
      }

      // --- Update beams from prism ---
      function updateBeams() {
        beams = [];
        // Three beams spread from prism downward
        const spread = 0.6;
        const angles = [-spread, 0, spread];
        const beamColorSets = [0, 2, 4]; // pink, yellow, green
        for (let i = 0; i < 3; i++) {
          const angle = Math.PI / 2 + angles[i] * 0.5;
          const len = 400;
          beams.push({
            x1: prism.x, y1: prism.y + 15,
            x2: prism.x + Math.cos(angle) * len,
            y2: prism.y + 15 + Math.sin(angle) * len,
            colorIdx: beamColorSets[i],
            color: BEAM_COLORS[beamColorSets[i]],
          });
        }
      }

      // --- Point to line segment distance ---
      function pointToSegDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) return dist(px, py, x1, y1);
        let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
        t = clamp(t, 0, 1);
        return dist(px, py, x1 + t * dx, y1 + t * dy);
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Prism movement
        const lerpSpeed = 10;
        prism.x = lerp(prism.x, prism.targetX, clamp(lerpSpeed * dt, 0, 1));
        prism.y = lerp(prism.y, prism.targetY, clamp(lerpSpeed * dt, 0, 1));
        prism.x = clamp(prism.x, 40, W - 40);
        prism.y = clamp(prism.y, 40, H * 0.45);

        updateBeams();

        // Spawn flowers
        const spawnInterval = lerp(2.5, 1.5, progress());
        spawnTimer -= dt;
        if (spawnTimer <= 0 && flowers.filter(f => f.alive).length < 7) {
          spawnFlower();
          spawnTimer = spawnInterval;
        }

        // Spawn shadows (cursed)
        shadowTimer -= dt;
        if (shadowTimer <= 0 && shadows.filter(s => s.alive).length < 3) {
          spawnShadow();
          shadowTimer = lerp(5, 3, progress());
        }

        // Check beam-flower collisions
        for (const f of flowers) {
          if (!f.alive) continue;
          let beamHit = false;
          for (const b of beams) {
            const d = pointToSegDist(f.x, f.y, b.x1, b.y1, b.x2, b.y2);
            if (d < f.r + 12) {
              beamHit = true;
              f.hit += dt * 1.8;
              break;
            }
          }
          if (!beamHit) {
            f.hit = Math.max(0, f.hit - dt * 0.5);
          }

          // Bloom when hit enough
          if (f.hit >= 1.2 && f.bloom < 1) {
            f.bloom = 1;
            bloomed++;
            spawnParticles(f.x, f.y, reducedMotion ? 4 : 8, f.color);
          }

          f.petalPhase += dt * 1.5;
        }

        // Check beam-shadow collisions (wilt a nearby flower)
        for (const s of shadows) {
          if (!s.alive) continue;
          s.age += dt;
          s.alpha = clamp(s.age * 2, 0, 0.8);
          s.pulse += dt * 2;

          let shadowHit = false;
          for (const b of beams) {
            const d = pointToSegDist(s.x, s.y, b.x1, b.y1, b.x2, b.y2);
            if (d < s.r + 8) {
              shadowHit = true;
              break;
            }
          }

          if (shadowHit) {
            // Wilt: find nearest unbloomed flower
            wilted++;
            spawnParticles(s.x, s.y, reducedMotion ? 3 : 6, COL.shadow);
            s.alive = false;
          }

          if (s.age >= s.maxAge) {
            s.alive = false;
          }
        }

        // Remove dead
        flowers = flowers.filter(f => f.alive || f.bloom >= 1);
        shadows = shadows.filter(s => s.alive);

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 40 * dt;
          p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Stars twinkle
        for (const s of stars) {
          s.twinkle += s.speed * dt;
        }

        // Win/lose
        if (bloomed >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (wilted >= MAX_WILTS) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("꽃 시들음");
        } else if (elapsed >= DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();

        // Night sky background
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#0e0c20");
        grad.addColorStop(0.4, "#1a1832");
        grad.addColorStop(0.7, "#252040");
        grad.addColorStop(1, "#1a2818");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Stars
        drawStars();

        // Moon (top center)
        drawMoon();

        // Ground (garden)
        drawGround();

        // Moonbeam (from moon to prism)
        drawMoonbeam();

        // Prism
        drawPrism();

        // Beams from prism
        if (mode === "running") drawBeams();

        // Shadows (cursed)
        drawShadows();

        // Flowers
        drawFlowers();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        ctx.restore();

        // Overlays
        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawStars() {
        if (reducedMotion) return;
        for (const s of stars) {
          const a = (Math.sin(s.twinkle) * 0.3 + 0.5) * 0.6;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220, 215, 240, ${a})`;
          ctx.fill();
        }
      }

      function drawMoon() {
        const mx = CX, my = 55;
        // Glow
        const glow = ctx.createRadialGradient(mx, my, 10, mx, my, 80);
        glow.addColorStop(0, "rgba(240, 232, 208, 0.4)");
        glow.addColorStop(0.5, "rgba(240, 232, 208, 0.1)");
        glow.addColorStop(1, "rgba(240, 232, 208, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(mx - 80, my - 80, 160, 160);

        // Moon body
        ctx.beginPath();
        ctx.arc(mx, my, 28, 0, Math.PI * 2);
        ctx.fillStyle = COL.moonlight;
        ctx.fill();

        // Craters
        ctx.beginPath();
        ctx.arc(mx - 8, my - 6, 5, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(200, 190, 170, 0.3)";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(mx + 10, my + 5, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawGround() {
        // Soft garden ground
        const gy = H * 0.52;
        const gGrad = ctx.createLinearGradient(0, gy, 0, H);
        gGrad.addColorStop(0, "rgba(30, 50, 30, 0.6)");
        gGrad.addColorStop(1, "rgba(20, 35, 20, 0.8)");
        ctx.fillStyle = gGrad;
        ctx.beginPath();
        ctx.moveTo(0, gy);
        // Gentle hills
        for (let x = 0; x <= W; x += 60) {
          const hillY = gy + Math.sin(x * 0.01 + 1) * 12;
          ctx.lineTo(x, hillY);
        }
        ctx.lineTo(W, H);
        ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fill();
      }

      function drawMoonbeam() {
        if (mode !== "running") return;
        const mx = CX, my = 55;
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.beginPath();
        ctx.moveTo(mx - 8, my + 28);
        ctx.lineTo(prism.x - 15, prism.y);
        ctx.lineTo(prism.x + 15, prism.y);
        ctx.lineTo(mx + 8, my + 28);
        ctx.closePath();
        ctx.fillStyle = COL.moonlight;
        ctx.fill();
        ctx.restore();
      }

      function drawPrism() {
        const px = prism.x, py = prism.y;
        // Triangle prism
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(px, py - 18);
        ctx.lineTo(px - 16, py + 12);
        ctx.lineTo(px + 16, py + 12);
        ctx.closePath();
        ctx.fillStyle = "rgba(216, 208, 240, 0.6)";
        ctx.fill();
        ctx.strokeStyle = "rgba(216, 208, 240, 0.9)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Sparkle in center
        ctx.beginPath();
        ctx.arc(px, py + 2, 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.fill();
        ctx.restore();
      }

      function drawBeams() {
        for (const b of beams) {
          ctx.save();
          ctx.globalAlpha = 0.25;
          ctx.beginPath();
          ctx.moveTo(b.x1, b.y1);
          ctx.lineTo(b.x2, b.y2);
          ctx.strokeStyle = b.color;
          ctx.lineWidth = 6;
          ctx.lineCap = "round";
          ctx.stroke();

          // Inner bright line
          ctx.globalAlpha = 0.5;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawFlowers() {
        for (const f of flowers) {
          ctx.save();
          ctx.translate(f.x, f.y);

          // Stem
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(0, 20);
          ctx.strokeStyle = "rgba(80, 140, 70, 0.6)";
          ctx.lineWidth = 2;
          ctx.stroke();

          if (f.bloom >= 1) {
            // Bloomed flower - full petals
            const petalCount = 6;
            for (let i = 0; i < petalCount; i++) {
              const angle = (i / petalCount) * Math.PI * 2 + f.petalPhase * 0.2;
              ctx.beginPath();
              ctx.ellipse(
                Math.cos(angle) * 10, Math.sin(angle) * 10,
                7, 4, angle, 0, Math.PI * 2
              );
              ctx.fillStyle = f.color;
              ctx.globalAlpha = 0.8;
              ctx.fill();
            }
            // Center
            ctx.globalAlpha = 1;
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fillStyle = COL.moonlight;
            ctx.fill();
          } else {
            // Bud - small circle
            const budSize = 6 + f.hit * 4;
            ctx.beginPath();
            ctx.arc(0, 0, budSize, 0, Math.PI * 2);
            ctx.fillStyle = f.color;
            ctx.globalAlpha = 0.4 + f.hit * 0.3;
            ctx.fill();

            // Glow when being hit
            if (f.hit > 0.2) {
              ctx.beginPath();
              ctx.arc(0, 0, budSize + 6, 0, Math.PI * 2);
              ctx.fillStyle = f.color;
              ctx.globalAlpha = f.hit * 0.15;
              ctx.fill();
            }
          }

          ctx.restore();
        }
      }

      function drawShadows() {
        for (const s of shadows) {
          ctx.save();
          ctx.translate(s.x, s.y);
          ctx.globalAlpha = s.alpha * 0.6;

          // Dark wispy shape
          const pulse = Math.sin(s.pulse) * 3;
          ctx.beginPath();
          ctx.arc(0, 0, s.r + pulse, 0, Math.PI * 2);
          ctx.fillStyle = COL.shadow;
          ctx.fill();

          // Inner dark core
          ctx.beginPath();
          ctx.arc(0, 0, s.r * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(20, 10, 30, 0.8)";
          ctx.fill();

          // Small eyes
          ctx.globalAlpha = s.alpha;
          ctx.fillStyle = "#a060c0";
          ctx.beginPath();
          ctx.arc(-5, -3, 2, 0, Math.PI * 2);
          ctx.arc(5, -3, 2, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life * 0.8;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px "Noto Sans KR", sans-serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${bloomed} / ${TARGET}`, 24, 20);

        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(timeLeft)}`, W - 24, 20);

        // Wilt indicators (bottom center)
        const dotY = H - 24;
        for (let i = 0; i < MAX_WILTS; i++) {
          const dotX = CX - (MAX_WILTS - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_WILTS - wilted ? COL.lavender : "rgba(60, 40, 80, 0.3)";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(30, 25, 50, 0.92)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.lavender;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = `bold 22px "Noto Sans KR", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = `400 14px "Noto Sans KR", sans-serif`;
        ctx.fillStyle = COL.textDim;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(232, 224, 240, 0.35)";
        ctx.font = `400 13px "Noto Sans KR", sans-serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(15, 12, 30, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("달빛 정원사", [
          "프리즘을 드래그해 달빛을 분리하고",
          "꽃봉오리에 빛을 비추세요",
          "",
          "조작: 드래그로 프리즘 이동",
          "클리어: 15송이 꽃 피우기",
          "실패: 그림자 3번 빛에 노출",
        ], COL.lavender);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(15, 12, 30, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("만개", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `${bloomed}송이 피움`,
          ], COL.green);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(30, 10, 20, 0.4)";
        ctx.fillRect(0, 0, W, H);
        drawCard("시들음", [
          elapsed >= DURATION ? "시간이 다했습니다" : "그림자에 빛이 닿았습니다",
          `피운 꽃: ${bloomed} / ${TARGET}`,
        ], COL.red);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        prism.targetX = p.x;
        prism.targetY = p.y;
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running") return;
        const p = getCanvasPos(e.clientX, e.clientY);
        prism.targetX = p.x;
        prism.targetY = p.y;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          bloomed, wilted,
          result: window.relayStageResult.status,
          flowers: flowers.length, shadows: shadows.length,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          bloomed = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          wilted = MAX_WILTS;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      initStars();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
