<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusk Subway: Mirror Heist</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Pretendard", "Segoe UI", sans-serif;
        background: #081018;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0.12);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(12, 20, 34, 0.94);
        color: #f6f8fb;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #1c2130 0%, #081018 100%);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 3px solid rgba(244, 247, 250, 0.92);
        outline-offset: -6px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dusk Subway: Mirror Heist. 터치 또는 Enter로 시작하세요. 이동, 클릭 또는
      터치로 패턴을 훔치고, 스페이스 또는 두 손가락 탭으로 패턴을 재생하세요.
      과열 직전에는 짧게 식히고, 모바일에서는 화면 터치와 드래그만으로도 플레이
      가능합니다. 과열 게이지가 폭주하거나 감시 시선에 오래 걸리면 즉시 실패합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dusk Subway: Mirror Heist"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TAU = Math.PI * 2;
      const HALL = { x: 88, y: 82, width: 784, height: 372 };
      const PLAYER_RADIUS = 16;
      const PLAYER_SPEED = 214;
      const MAX_HEAT = 100;
      const MAX_EXPOSURE = 100;
      const STEAL_RANGE = 76;
      const VAULT = { x: 848, y: 270, radius: 58 };
      const META_CONTROLS =
        "이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능";
      const META_CLEAR = "과열을 폭주시키지 않고 서로 다른 패턴 3개로 금고 문을 열면 클리어";
      const META_FAIL = "과열 게이지가 폭주하거나 감시 시선에 오래 걸리면 즉시 실패";
      const VENTS = [
        { x: 162, y: 412, radius: 48 },
        { x: 598, y: 414, radius: 42 },
      ];
      const PILLARS = [
        { x: 296, y: 158, width: 56, height: 180 },
        { x: 504, y: 110, width: 58, height: 214 },
        { x: 690, y: 208, width: 54, height: 170 },
      ];
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const automatedBrowser = navigator.webdriver === true;
      const relayContext =
        window.RelayRuntime?.readContext("dusk-subway-mirror-theft-heat") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const pointer = {
        activeId: null,
        target: null,
        startPoint: null,
        moved: false,
        startedAt: 0,
      };

      const keys = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      const patternLibrary = [
        {
          id: "amber-brake",
          name: "Amber Brake",
          color: "#ff9868",
          glow: "#ffd4b7",
          icons: ["←", "↑", "→", "↓"],
          waypoints: [
            { x: 226, y: 184 },
            { x: 274, y: 138 },
            { x: 334, y: 184 },
            { x: 250, y: 232 },
          ],
          beatDuration: 0.58,
          speed: 94,
          scanRange: 184,
          scanArc: 1.02,
          scanOffset: -0.16,
          accent: "#7a3422",
        },
        {
          id: "teal-feint",
          name: "Teal Feint",
          color: "#58d8d5",
          glow: "#d1fff9",
          icons: ["↑", "→", "↓", "←"],
          waypoints: [
            { x: 452, y: 332 },
            { x: 516, y: 280 },
            { x: 582, y: 334 },
            { x: 494, y: 390 },
          ],
          beatDuration: 0.52,
          speed: 100,
          scanRange: 198,
          scanArc: 0.96,
          scanOffset: 0.12,
          accent: "#154c54",
        },
        {
          id: "rose-loop",
          name: "Rose Loop",
          color: "#ff5c88",
          glow: "#ffd5df",
          icons: ["→", "↓", "←", "↑"],
          waypoints: [
            { x: 678, y: 170 },
            { x: 744, y: 216 },
            { x: 708, y: 278 },
            { x: 636, y: 230 },
          ],
          beatDuration: 0.5,
          speed: 106,
          scanRange: 178,
          scanArc: 1.08,
          scanOffset: 0.18,
          accent: "#71243b",
        },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = createInitialState();

      function createInitialState() {
        return {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          ambientTime: 0,
          screenFlash: 0,
          shake: 0,
          failureReason: "",
          clearCountdown: 0,
          player: createPlayer(),
          sentinels: patternLibrary.map(createSentinel),
          stolenOrder: [],
          replay: null,
          vaultProgress: 0,
          vaultPulse: 0,
          sentToVault: [],
          heat: 24,
          exposure: 0,
          visibleSentinelIds: [],
          particles: [],
          popups: [],
          trainLights: Array.from({ length: 18 }, (_, index) => ({
            x: 72 + index * 58,
            width: 42 + (index % 3) * 10,
          })),
          message: "그림자 사이로 움직이며 패턴 3개를 훔치세요.",
          lastFootstep: 0,
          dragGlow: 0,
          promptPulse: 0,
        };
      }

      function createPlayer() {
        return {
          x: 138,
          y: 408,
          radius: PLAYER_RADIUS,
          vx: 0,
          vy: 0,
          moveIntensity: 0,
          inVent: false,
          nearVault: false,
          mirrorPulse: 0,
          afterglow: [],
        };
      }

      function createSentinel(config) {
        const direction = Math.atan2(
          config.waypoints[1].y - config.waypoints[0].y,
          config.waypoints[1].x - config.waypoints[0].x
        );
        return {
          ...config,
          x: config.waypoints[0].x,
          y: config.waypoints[0].y,
          waypointIndex: 1,
          beatIndex: 0,
          beatTimer: 0,
          pulse: 0,
          stolen: false,
          stolenPulse: 0,
          facing: direction,
          visible: false,
        };
      }

      function resetRun() {
        const fresh = createInitialState();
        Object.keys(state).forEach((key) => delete state[key]);
        Object.assign(state, fresh);
        pointer.activeId = null;
        pointer.target = null;
        pointer.startPoint = null;
        pointer.moved = false;
        keys.left = false;
        keys.right = false;
        keys.up = false;
        keys.down = false;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        resetRun();
        state.mode = "running";
        if (automatedBrowser) {
          render();
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function lerpAngle(start, end, amount) {
        let delta = ((end - start + Math.PI * 3) % TAU) - Math.PI;
        return start + delta * amount;
      }

      function distanceBetween(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function normalize(x, y) {
        const length = Math.hypot(x, y) || 1;
        return { x: x / length, y: y / length, length };
      }

      function segmentIntersectsRect(ax, ay, bx, by, rect) {
        let t0 = 0;
        let t1 = 1;
        const dx = bx - ax;
        const dy = by - ay;
        const p = [-dx, dx, -dy, dy];
        const q = [ax - rect.x, rect.x + rect.width - ax, ay - rect.y, rect.y + rect.height - ay];
        for (let index = 0; index < 4; index += 1) {
          const pi = p[index];
          const qi = q[index];
          if (pi === 0) {
            if (qi < 0) {
              return false;
            }
            continue;
          }
          const ratio = qi / pi;
          if (pi < 0) {
            t0 = Math.max(t0, ratio);
          } else {
            t1 = Math.min(t1, ratio);
          }
          if (t0 > t1) {
            return false;
          }
        }
        return true;
      }

      function lineBlockedByPillar(ax, ay, bx, by) {
        return PILLARS.some((pillar) =>
          segmentIntersectsRect(ax, ay, bx, by, {
            x: pillar.x - 8,
            y: pillar.y - 8,
            width: pillar.width + 16,
            height: pillar.height + 16,
          })
        );
      }

      function pointInCone(px, py, coneX, coneY, angle, arc, range) {
        const dx = px - coneX;
        const dy = py - coneY;
        const distance = Math.hypot(dx, dy);
        if (distance > range) {
          return false;
        }
        const targetAngle = Math.atan2(dy, dx);
        const diff = Math.abs(((targetAngle - angle + Math.PI * 3) % TAU) - Math.PI);
        return diff <= arc * 0.5;
      }

      function playerVisibleToSentinel(sentinel) {
        if (sentinel.stolen) {
          return false;
        }
        if (
          !pointInCone(
            state.player.x,
            state.player.y,
            sentinel.x,
            sentinel.y,
            sentinel.facing,
            sentinel.scanArc,
            sentinel.scanRange
          )
        ) {
          return false;
        }
        return !lineBlockedByPillar(sentinel.x, sentinel.y, state.player.x, state.player.y);
      }

      function currentSubmittedSet() {
        if (!state.sentToVault) {
          state.sentToVault = [];
        }
        return state.sentToVault;
      }

      function findSentinelById(patternId) {
        return state.sentinels.find((sentinel) => sentinel.id === patternId);
      }

      function spawnParticles({
        x,
        y,
        color,
        count = 12,
        speed = 130,
        spread = Math.PI,
        life = 0.65,
        size = 3,
      }) {
        const total = reduceMotion ? Math.ceil(count * 0.4) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * spread;
          const velocity = speed * (0.35 + Math.random() * 0.8);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: life * (0.55 + Math.random() * 0.8),
            maxLife: life,
            size: size * (0.8 + Math.random() * 1.2),
            color,
          });
        }
      }

      function addPopup(text, x, y, color = "#f6f8fb") {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: 1.2,
          maxLife: 1.2,
        });
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function failStage(reason) {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.failureReason = reason;
        state.lastRunTime = state.elapsed;
        state.screenFlash = 0.45;
        state.shake = 16;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
        if (automatedBrowser) {
          render();
        }
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.screenFlash = 0.55;
        state.shake = 12;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
        if (automatedBrowser) {
          render();
        }
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function canvasPointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function insideVault() {
        return distanceBetween(state.player.x, state.player.y, VAULT.x, VAULT.y) <= VAULT.radius + 12;
      }

      function insideVent() {
        return VENTS.some((vent) => distanceBetween(state.player.x, state.player.y, vent.x, vent.y) <= vent.radius);
      }

      function attemptStealAt(x, y) {
        if (state.mode !== "running" || state.replay) {
          return;
        }
        const sentinel = state.sentinels.find(
          (entry) => distanceBetween(x, y, entry.x, entry.y) <= 38 || distanceBetween(state.player.x, state.player.y, entry.x, entry.y) <= 40
        );
        if (!sentinel) {
          state.message = "적에게 바짝 붙은 뒤 몸체를 터치해 패턴을 복사하세요.";
          return;
        }
        if (distanceBetween(state.player.x, state.player.y, sentinel.x, sentinel.y) > STEAL_RANGE) {
          addPopup("너무 멀다", sentinel.x, sentinel.y - 28, "#ffd2a8");
          state.message = "패턴은 가까이 붙어야 훔칠 수 있습니다.";
          return;
        }
        if (sentinel.stolen) {
          addPopup("이미 복사됨", sentinel.x, sentinel.y - 28, sentinel.glow);
          state.message = "이미 확보한 패턴입니다. 다른 경비를 노리세요.";
          return;
        }
        if (state.visibleSentinelIds.includes(sentinel.id)) {
          state.heat = clamp(state.heat + 5, 0, MAX_HEAT);
          addPopup("시선 고정", sentinel.x, sentinel.y - 28, "#ff8c85");
          state.message = "감시선 안에서는 복사할 수 없습니다. 기둥 뒤로 숨으세요.";
          return;
        }

        sentinel.stolen = true;
        sentinel.stolenPulse = 1;
        state.stolenOrder.push(sentinel.id);
        state.heat = clamp(state.heat + 22, 0, MAX_HEAT);
        state.screenFlash = Math.max(state.screenFlash, 0.24);
        state.shake = Math.max(state.shake, 10);
        state.player.mirrorPulse = 1;
        spawnParticles({
          x: sentinel.x,
          y: sentinel.y,
          color: sentinel.color,
          count: 24,
          speed: 160,
          spread: Math.PI * 1.8,
          life: 0.78,
          size: 4,
        });
        addPopup("패턴 복사", sentinel.x, sentinel.y - 34, sentinel.glow);
        if (state.stolenOrder.length === patternLibrary.length) {
          state.message = "세 패턴 확보. 금고 앞에서 Space 또는 두 손가락 탭으로 재생하세요.";
        } else {
          state.message = "좋습니다. 과열을 식히며 다음 패턴을 노리세요.";
        }
      }

      function attemptReplay() {
        if (state.mode !== "running" || state.replay) {
          return;
        }
        const submitted = currentSubmittedSet();
        const nextPatternId = state.stolenOrder.find((patternId) => !submitted.includes(patternId));
        if (!insideVault()) {
          state.message = "금고 링 안으로 들어간 뒤 패턴을 재생하세요.";
          addPopup("금고 앞에서만", VAULT.x, VAULT.y - 64, "#c7eef5");
          return;
        }
        if (!nextPatternId) {
          state.message = "먼저 서로 다른 적 패턴 3개를 모두 훔쳐야 합니다.";
          addPopup("패턴 부족", VAULT.x, VAULT.y - 64, "#ffd6c2");
          return;
        }
        const pattern = findSentinelById(nextPatternId);
        if (!pattern) {
          return;
        }
        state.replay = {
          patternId: pattern.id,
          timer: 0,
          duration: 1.16,
          iconIndex: 0,
          originX: state.player.x,
          originY: state.player.y,
          icons: pattern.icons.slice(),
          color: pattern.color,
        };
        state.heat = clamp(state.heat + 16, 0, MAX_HEAT);
        state.player.mirrorPulse = 1;
        state.vaultPulse = 1;
        state.message = "재생 중... 박자 사이를 잠깐 식히며 락을 여세요.";
        addPopup(`재생 ${state.vaultProgress + 1}/3`, VAULT.x, VAULT.y - 72, pattern.glow);
      }

      function updateSentinel(sentinel, dt) {
        const target = sentinel.waypoints[sentinel.waypointIndex];
        const dx = target.x - sentinel.x;
        const dy = target.y - sentinel.y;
        const distance = Math.hypot(dx, dy);
        if (distance < 7) {
          sentinel.waypointIndex = (sentinel.waypointIndex + 1) % sentinel.waypoints.length;
        } else {
          const step = Math.min(distance, sentinel.speed * dt);
          sentinel.x += (dx / distance) * step;
          sentinel.y += (dy / distance) * step;
        }

        const nextTarget = sentinel.waypoints[sentinel.waypointIndex];
        const nextAngle = Math.atan2(nextTarget.y - sentinel.y, nextTarget.x - sentinel.x);
        const wobble = Math.sin(state.ambientTime * 1.4 + sentinel.scanOffset * 10) * 0.26;
        sentinel.facing = lerpAngle(sentinel.facing, nextAngle + sentinel.scanOffset + wobble, dt * 4.5);

        sentinel.beatTimer += dt;
        if (sentinel.beatTimer >= sentinel.beatDuration) {
          sentinel.beatTimer -= sentinel.beatDuration;
          sentinel.beatIndex = (sentinel.beatIndex + 1) % sentinel.icons.length;
          sentinel.pulse = 1;
        }

        sentinel.pulse = Math.max(0, sentinel.pulse - dt * 2.1);
        sentinel.stolenPulse = Math.max(0, sentinel.stolenPulse - dt * 1.3);
      }

      function updateReplay(dt) {
        if (!state.replay) {
          return;
        }
        const replay = state.replay;
        replay.timer += dt;
        replay.iconIndex = Math.min(
          replay.icons.length - 1,
          Math.floor((replay.timer / replay.duration) * replay.icons.length)
        );
        state.heat = clamp(state.heat + dt * 8.5, 0, MAX_HEAT);
        state.player.mirrorPulse = 1;

        const segmentLength = 18;
        const icon = replay.icons[replay.iconIndex];
        let offsetX = 0;
        let offsetY = 0;
        if (icon === "←") offsetX = -segmentLength;
        if (icon === "→") offsetX = segmentLength;
        if (icon === "↑") offsetY = -segmentLength;
        if (icon === "↓") offsetY = segmentLength;

        state.player.afterglow.push({
          x: replay.originX + offsetX,
          y: replay.originY + offsetY,
          color: replay.color,
          life: 0.34,
          maxLife: 0.34,
        });

        if (replay.timer >= replay.duration) {
          currentSubmittedSet().push(replay.patternId);
          state.vaultProgress = currentSubmittedSet().length;
          state.vaultPulse = 1;
          state.shake = Math.max(state.shake, 8);
          spawnParticles({
            x: VAULT.x,
            y: VAULT.y,
            color: replay.color,
            count: 18,
            speed: 150,
            spread: Math.PI * 1.6,
            life: 0.7,
            size: 4,
          });
          addPopup(`금고 락 ${state.vaultProgress}/3`, VAULT.x, VAULT.y - 76, replay.color);
          state.replay = null;
          if (state.vaultProgress >= 3) {
            clearStage();
          } else {
            state.message = "좋습니다. 잠깐 멈춰 식힌 뒤 다음 패턴을 재생하세요.";
          }
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.94;
          particle.vy = particle.vy * 0.94 + 18 * dt;
          return particle.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= 24 * dt;
          return popup.life > 0;
        });

        state.player.afterglow = state.player.afterglow.filter((ghost) => {
          ghost.life -= dt;
          return ghost.life > 0;
        });
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.ambientTime += dt;
        state.screenFlash = Math.max(0, state.screenFlash - dt * 1.8);
        state.shake = Math.max(0, state.shake - dt * 36);
        state.promptPulse = Math.max(0, state.promptPulse - dt * 2);

        state.sentinels.forEach((sentinel) => updateSentinel(sentinel, dt));
        state.visibleSentinelIds = state.sentinels
          .filter((sentinel) => {
            sentinel.visible = playerVisibleToSentinel(sentinel);
            return sentinel.visible;
          })
          .map((sentinel) => sentinel.id);

        let moveX = 0;
        let moveY = 0;
        if (!state.replay) {
          if (keys.left) moveX -= 1;
          if (keys.right) moveX += 1;
          if (keys.up) moveY -= 1;
          if (keys.down) moveY += 1;

          if (pointer.target) {
            const pointerDx = pointer.target.x - state.player.x;
            const pointerDy = pointer.target.y - state.player.y;
            const pointerDistance = Math.hypot(pointerDx, pointerDy);
            if (pointerDistance > 10) {
              moveX += pointerDx / pointerDistance;
              moveY += pointerDy / pointerDistance;
            }
          }
        }

        const normalizedMove = moveX || moveY ? normalize(moveX, moveY) : { x: 0, y: 0, length: 0 };
        const motionPenalty = state.heat > 82 ? 0.88 : 1;
        const speed = PLAYER_SPEED * motionPenalty;
        state.player.moveIntensity = clamp(normalizedMove.length, 0, 1);
        state.player.vx = lerp(state.player.vx, normalizedMove.x * speed, dt * 10);
        state.player.vy = lerp(state.player.vy, normalizedMove.y * speed, dt * 10);

        if (state.replay) {
          state.player.vx = lerp(state.player.vx, 0, dt * 12);
          state.player.vy = lerp(state.player.vy, 0, dt * 12);
        }

        state.player.x = clamp(state.player.x + state.player.vx * dt, HALL.x + 22, HALL.x + HALL.width - 22);
        state.player.y = clamp(state.player.y + state.player.vy * dt, HALL.y + 26, HALL.y + HALL.height - 18);

        state.player.inVent = insideVent();
        state.player.nearVault = insideVault();
        state.dragGlow = pointer.target ? Math.min(1, state.dragGlow + dt * 4) : Math.max(0, state.dragGlow - dt * 4);
        state.player.mirrorPulse = Math.max(0, state.player.mirrorPulse - dt * 1.8);

        const moving = Math.hypot(state.player.vx, state.player.vy) > 26;
        if (moving) {
          state.heat += dt * 6.8;
          state.lastFootstep -= dt;
          if (state.lastFootstep <= 0) {
            state.lastFootstep = reduceMotion ? 0.14 : 0.08;
            spawnParticles({
              x: state.player.x,
              y: state.player.y + 10,
              color: state.player.inVent ? "#9ff8ff" : "#a4b4d8",
              count: 4,
              speed: 48,
              spread: Math.PI,
              life: 0.36,
              size: 2.5,
            });
          }
        } else {
          state.lastFootstep = 0;
        }

        const visible = state.visibleSentinelIds.length > 0;
        if (visible) {
          state.exposure = clamp(state.exposure + dt * (38 + state.heat * 0.14), 0, MAX_EXPOSURE);
          state.heat = clamp(state.heat + dt * 3.4, 0, MAX_HEAT);
          state.message = "감시선 노출 중. 기둥 뒤나 그림자 통로로 벗어나세요.";
        } else {
          const cooldown = moving ? 4.2 : 13.5;
          const ventBonus = state.player.inVent ? 18 : 0;
          state.exposure = clamp(state.exposure - dt * (44 + ventBonus * 0.3), 0, MAX_EXPOSURE);
          state.heat = clamp(state.heat - dt * (cooldown + ventBonus), 0, MAX_HEAT);
        }

        updateReplay(dt);
        updateParticles(dt);

        if (state.player.nearVault && state.stolenOrder.length > state.vaultProgress && !state.replay) {
          state.promptPulse = 1;
          state.message = "금고 링 안. Space 또는 두 손가락 탭으로 다음 패턴을 재생하세요.";
        } else if (!visible && !state.replay && state.stolenOrder.length < patternLibrary.length) {
          state.message = "기둥 뒤에서 타이밍을 보고 적 본체를 터치해 패턴을 훔치세요.";
        }

        if (state.heat >= MAX_HEAT) {
          failStage("overheat");
        }
        if (state.exposure >= MAX_EXPOSURE) {
          failStage("gaze_lock");
        }
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          state.ambientTime += dt;
          state.screenFlash = Math.max(0, state.screenFlash - dt * 1.2);
          state.shake = Math.max(0, state.shake - dt * 26);
          updateParticles(dt);
          state.sentinels.forEach((sentinel) => {
            sentinel.beatTimer += dt;
            if (sentinel.beatTimer >= sentinel.beatDuration) {
              sentinel.beatTimer -= sentinel.beatDuration;
              sentinel.beatIndex = (sentinel.beatIndex + 1) % sentinel.icons.length;
              sentinel.pulse = 0.8;
            }
            sentinel.pulse = Math.max(0, sentinel.pulse - dt * 2);
          });
        }
      }

      function drawRoundedPanel(x, y, width, height, radius, fillStyle, strokeStyle = null, lineWidth = 1.5) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
        ctx.fillStyle = fillStyle;
        ctx.fill();
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.lineWidth = lineWidth;
          ctx.stroke();
        }
      }

      function drawPatternStrip(x, y, icons, color, activeIndex, dimmed = false) {
        icons.forEach((icon, index) => {
          const chipX = x + index * 24;
          const active = index === activeIndex;
          drawRoundedPanel(
            chipX,
            y,
            20,
            20,
            7,
            active
              ? `rgba(${hexToRgb(color)}, ${dimmed ? 0.44 : 0.95})`
              : dimmed
                ? "rgba(255,255,255,0.06)"
                : "rgba(6,12,20,0.56)",
            active ? color : "rgba(255,255,255,0.08)",
            active ? 1.6 : 1
          );
          ctx.fillStyle = active ? "#081018" : dimmed ? "rgba(255,255,255,0.4)" : "#f4f7fa";
          ctx.font = "700 12px Avenir Next";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(icon, chipX + 10, y + 10);
        });
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
      }

      function hexToRgb(hex) {
        const normalized = hex.replace("#", "");
        const value = parseInt(normalized, 16);
        const size = normalized.length === 3 ? 1 : 2;
        if (size === 1) {
          const r = parseInt(normalized[0] + normalized[0], 16);
          const g = parseInt(normalized[1] + normalized[1], 16);
          const b = parseInt(normalized[2] + normalized[2], 16);
          return `${r}, ${g}, ${b}`;
        }
        const r = (value >> 16) & 255;
        const g = (value >> 8) & 255;
        const b = value & 255;
        return `${r}, ${g}, ${b}`;
      }

      function drawBackground() {
        const duskGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);

        duskGradient.addColorStop(0.35, "#384452");

        const windowGradient = ctx.createLinearGradient(0, 0, VIEW.width, 0);
        windowGradient.addColorStop(0, "rgba(255, 172, 122, 0.52)");
        windowGradient.addColorStop(0.4, "rgba(255, 220, 174, 0.12)");

        ctx.fillStyle = windowGradient;
        ctx.fillRect(70, 24, VIEW.width - 140, 86);

        ctx.fillStyle = "rgba(250, 190, 132, 0.16)";
        state.trainLights.forEach((light, index) => {
          const drift = ((state.ambientTime * 58 + index * 27) % (VIEW.width + 120)) - 90;

        });

        drawRoundedPanel(HALL.x - 18, HALL.y - 26, HALL.width + 36, HALL.height + 52, 34, "rgba(4, 10, 16, 0.48)");

        const floorGradient = ctx.createLinearGradient(0, HALL.y, 0, HALL.y + HALL.height);
        floorGradient.addColorStop(0, "rgba(25, 35, 48, 0.95)");

        drawRoundedPanel(HALL.x, HALL.y, HALL.width, HALL.height, 28, floorGradient, "rgba(255,255,255,0.08)");

        ctx.fillStyle = "rgba(190, 234, 255, 0.06)";
        ctx.fillRect(HALL.x + 18, HALL.y + 56, HALL.width - 36, 3);
        ctx.fillRect(HALL.x + 18, HALL.y + 244, HALL.width - 36, 2);

        const platformGlow = ctx.createLinearGradient(0, HALL.y + HALL.height - 90, 0, HALL.y + HALL.height);
        platformGlow.addColorStop(0, "rgba(125, 210, 236, 0)");
        platformGlow.addColorStop(1, "rgba(125, 210, 236, 0.18)");
        ctx.fillStyle = platformGlow;
        ctx.fillRect(HALL.x + 22, HALL.y + HALL.height - 96, HALL.width - 44, 86);

        VENTS.forEach((vent) => {
          const pulse = 0.35 + Math.sin(state.ambientTime * 3 + vent.x * 0.02) * 0.08;
          const gradient = ctx.createRadialGradient(vent.x, vent.y, 4, vent.x, vent.y, vent.radius);
          gradient.addColorStop(0, `rgba(114, 245, 255, ${0.36 + pulse})`);
          gradient.addColorStop(0.3, "rgba(75, 214, 233, 0.18)");
          gradient.addColorStop(1, "rgba(75, 214, 233, 0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(vent.x, vent.y, vent.radius, 0, TAU);
          ctx.fill();

          ctx.strokeStyle = "rgba(189, 252, 255, 0.2)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.arc(vent.x, vent.y, vent.radius * 0.72, 0, TAU);
          ctx.stroke();
        });

        PILLARS.forEach((pillar) => {
          const pillarGradient = ctx.createLinearGradient(pillar.x, pillar.y, pillar.x + pillar.width, pillar.y + pillar.height);
          pillarGradient.addColorStop(0, "#344350");
          pillarGradient.addColorStop(0.5, "#1b2630");
          pillarGradient.addColorStop(1, "#0f171f");
          ctx.shadowColor = "rgba(0, 0, 0, 0.28)";
          ctx.shadowBlur = 16;
          drawRoundedPanel(pillar.x, pillar.y, pillar.width, pillar.height, 18, pillarGradient, "rgba(255,255,255,0.06)");
          ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          ctx.fillRect(pillar.x + 10, pillar.y + 12, 5, pillar.height - 24);
        });
      }

      function drawCone(sentinel) {
        if (sentinel.stolen) {
          return;
        }
        const alertBoost = sentinel.visible ? 0.26 : 0;
        const gradient = ctx.createRadialGradient(
          sentinel.x,
          sentinel.y,
          10,
          sentinel.x + Math.cos(sentinel.facing) * sentinel.scanRange * 0.5,
          sentinel.y + Math.sin(sentinel.facing) * sentinel.scanRange * 0.5,
          sentinel.scanRange
        );
        gradient.addColorStop(0, `rgba(${hexToRgb(sentinel.color)}, ${0.42 + alertBoost})`);
        gradient.addColorStop(0.55, `rgba(${hexToRgb(sentinel.color)}, ${0.14 + alertBoost * 0.5})`);
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(sentinel.x, sentinel.y);
        ctx.arc(
          sentinel.x,
          sentinel.y,
          sentinel.scanRange,
          sentinel.facing - sentinel.scanArc / 2,
          sentinel.facing + sentinel.scanArc / 2
        );
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.restore();
      }

      function drawSentinel(sentinel) {
        drawCone(sentinel);

        ctx.save();
        ctx.translate(sentinel.x, sentinel.y);
        const bodyScale = sentinel.stolen ? 0.88 : 1;
        const pulse = sentinel.pulse * 0.9;
        ctx.shadowColor = sentinel.color;
        ctx.shadowBlur = sentinel.stolen ? 6 : 18;
        ctx.fillStyle = sentinel.stolen ? "rgba(255,255,255,0.12)" : sentinel.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 17 * bodyScale, 24 * bodyScale, 0, 0, TAU);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = sentinel.stolen ? "rgba(12,18,28,0.9)" : "rgba(12,18,28,0.82)";
        ctx.beginPath();
        ctx.ellipse(0, 4, 12 * bodyScale, 17 * bodyScale, 0, 0, TAU);
        ctx.fill();

        ctx.fillStyle = sentinel.glow;
        ctx.fillRect(-9, -3, 18, 4);
        ctx.globalAlpha = 0.25 + pulse;
        ctx.fillStyle = sentinel.glow;
        ctx.beginPath();
        ctx.arc(0, 0, 34 + pulse * 12, 0, TAU);
        ctx.fill();
        ctx.restore();
        ctx.globalAlpha = 1;

        drawRoundedPanel(
          sentinel.x - 56,
          sentinel.y - 62,
          112,
          28,
          12,
          sentinel.stolen ? "rgba(255,255,255,0.06)" : `rgba(${hexToRgb(sentinel.color)}, 0.14)`,
          sentinel.stolen ? "rgba(255,255,255,0.08)" : `rgba(${hexToRgb(sentinel.glow)}, 0.28)`
        );
        ctx.fillStyle = sentinel.stolen ? "rgba(255,255,255,0.56)" : "#f6f8fb";
        ctx.font = "700 11px Avenir Next";
        ctx.fillText(sentinel.name, sentinel.x - 46, sentinel.y - 44);
        drawPatternStrip(sentinel.x - 44, sentinel.y - 58, sentinel.icons, sentinel.color, sentinel.beatIndex, sentinel.stolen);

        if (!sentinel.stolen) {
          ctx.strokeStyle = `rgba(${hexToRgb(sentinel.color)}, ${0.28 + sentinel.pulse * 0.24})`;
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.arc(sentinel.x, sentinel.y, STEAL_RANGE - 8, 0, TAU);
          ctx.stroke();
        }
      }

      function drawVault() {
        const outer = ctx.createRadialGradient(VAULT.x, VAULT.y, 16, VAULT.x, VAULT.y, 76);
        outer.addColorStop(0, "rgba(122, 226, 240, 0.24)");
        outer.addColorStop(1, "rgba(122, 226, 240, 0)");
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(VAULT.x, VAULT.y, 76 + state.vaultPulse * 8, 0, TAU);
        ctx.fill();

        drawRoundedPanel(VAULT.x - 52, VAULT.y - 92, 104, 184, 28, "rgba(9, 18, 28, 0.92)", "rgba(163, 222, 230, 0.26)", 2);
        drawRoundedPanel(VAULT.x - 38, VAULT.y - 66, 76, 132, 22, "rgba(26, 44, 58, 0.9)", "rgba(163, 222, 230, 0.18)", 1.6);
        ctx.strokeStyle = "rgba(224, 246, 255, 0.3)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(VAULT.x, VAULT.y, 20, 0, TAU);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(VAULT.x, VAULT.y, 7, 0, TAU);
        ctx.stroke();

        for (let index = 0; index < 3; index += 1) {
          const angle = -Math.PI / 2 + index * (TAU / 3);
          const slotX = VAULT.x + Math.cos(angle) * 58;
          const slotY = VAULT.y + Math.sin(angle) * 58;
          const filled = index < state.vaultProgress;
          ctx.beginPath();
          ctx.arc(slotX, slotY, 10, 0, TAU);
          ctx.fillStyle = filled ? "#80f2ff" : "rgba(255,255,255,0.08)";
          ctx.fill();
          ctx.strokeStyle = filled ? "rgba(218, 251, 255, 0.9)" : "rgba(255,255,255,0.14)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        if (state.player.nearVault && state.mode === "running" && state.stolenOrder.length > state.vaultProgress) {
          const alpha = 0.55 + state.promptPulse * 0.35;
          drawRoundedPanel(
            VAULT.x - 98,
            VAULT.y - 136,
            196,
            28,
            12,
            `rgba(8,16,24, ${0.82 + state.promptPulse * 0.08})`,
            `rgba(128, 242, 255, ${alpha})`,
            1.5
          );
          ctx.fillStyle = `rgba(236, 250, 255, ${0.92})`;
          ctx.font = "700 12px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText("SPACE / 두 손가락 탭으로 재생", VAULT.x, VAULT.y - 117);
          ctx.textAlign = "left";
        }
      }

      function drawPlayer() {
        const playerX = state.player.x;
        const playerY = state.player.y;

        state.player.afterglow.forEach((ghost) => {
          const alpha = ghost.life / ghost.maxLife;
          ctx.globalAlpha = alpha * 0.58;
          ctx.fillStyle = ghost.color;
          ctx.beginPath();
          ctx.arc(ghost.x, ghost.y, 12 + (1 - alpha) * 6, 0, TAU);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        ctx.shadowColor = state.player.inVent ? "#90f0ff" : "#8bb4ff";
        ctx.shadowBlur = 18 + state.player.mirrorPulse * 18;
        ctx.fillStyle = "#d6eef5";
        ctx.beginPath();
        ctx.arc(playerX, playerY, 8, 0, TAU);
        ctx.fill();
        ctx.shadowBlur = 0;

        const bodyGradient = ctx.createLinearGradient(playerX, playerY - 22, playerX, playerY + 24);
        bodyGradient.addColorStop(0, "#112233");
        bodyGradient.addColorStop(1, "#0d141d");
        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.ellipse(playerX, playerY + 6, 14, 22, 0, 0, TAU);
        ctx.fill();

        ctx.fillStyle = state.player.inVent ? "#7ef5ff" : "#9cc9ff";
        ctx.beginPath();
        ctx.arc(playerX, playerY, 4 + state.player.mirrorPulse * 2.2, 0, TAU);
        ctx.fill();

        ctx.strokeStyle = `rgba(195, 236, 255, ${0.14 + state.dragGlow * 0.3})`;
        ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.arc(playerX, playerY, PLAYER_RADIUS + 8 + state.player.mirrorPulse * 8, 0, TAU);
        ctx.stroke();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          const alpha = particle.life / particle.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, TAU);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        state.popups.forEach((popup) => {
          const alpha = popup.life / popup.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "700 16px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        });
        ctx.textAlign = "left";
        ctx.globalAlpha = 1;
      }

      }

      function drawOverlay(title, accent, bodyLines, footer) {
        const vignette = ctx.createRadialGradient(VIEW.width / 2, VIEW.height / 2, 120, VIEW.width / 2, VIEW.height / 2, 480);
        vignette.addColorStop(0, "rgba(6,10,15,0.18)");
        vignette.addColorStop(1, "rgba(4,8,12,0.78)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        drawRoundedPanel(128, 88, 704, 364, 30, "rgba(9, 16, 24, 0.82)", "rgba(255,255,255,0.08)", 2);
        const panelGradient = ctx.createLinearGradient(128, 88, 832, 452);
        panelGradient.addColorStop(0, `rgba(${hexToRgb(accent)}, 0.18)`);
        panelGradient.addColorStop(1, "rgba(255,255,255,0.02)");
        drawRoundedPanel(148, 108, 664, 324, 26, panelGradient, `rgba(${hexToRgb(accent)}, 0.24)`, 1.2);

        ctx.fillStyle = "#f6f8fb";
        ctx.font = "800 34px Avenir Next";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 154);
        ctx.fillStyle = accent;
        ctx.font = "700 14px Avenir Next";
        ctx.fillText("Dusk Subway: Mirror Heist", VIEW.width / 2, 184);

        ctx.font = "600 20px Avenir Next";
        ctx.fillStyle = "#eff7ff";
        bodyLines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 42);
        });

        ctx.fillStyle = "rgba(239,247,255,0.72)";
        ctx.font = "600 15px Avenir Next";
        ctx.fillText(footer, VIEW.width / 2, 386);

        ctx.textAlign = "left";
      }

      function drawMenuOverlay() {
        drawOverlay(
          "황혼 지하철 잠입",
          "#ff9a69",
          [
            "그림자와 기둥 뒤를 타며 감시 패턴 3개를 훔치세요.",
            META_CONTROLS,
            "금고 링 안에서 Space 또는 두 손가락 탭으로 패턴을 재생하세요.",
            "과열 직전엔 잠깐 멈추거나 환기 구역에서 식혀야 합니다.",
            META_FAIL,
          ],
          "터치 또는 Enter로 시작"
        );
      }

      function drawFailureOverlay() {
        const reason =
          state.failureReason === "overheat"
            ? "과열이 폭주해 미러 코어가 터졌습니다."
            : "감시 시선에 오래 노출되어 즉시 제압당했습니다.";
        drawOverlay(
          "잠입 실패",
          "#ff6d6a",
          [
            reason,
            `확보한 패턴 ${state.stolenOrder.length}/3, 금고 락 ${state.vaultProgress}/3`,
            `버틴 시간 ${state.lastRunTime.toFixed(1)}초`,
            `${META_FAIL}. 잠깐 식히거나 기둥 뒤로 완전히 숨으세요.`,
          ],
          "터치 또는 Enter로 재시작"
        );
      }

      function drawClearOverlay() {
        drawOverlay(
          "금고 개방",
          "#7bf0ff",
          [
            `${META_CLEAR}.`,
            `최종 시간 ${state.lastRunTime.toFixed(1)}초 / 과열 ${Math.round(state.heat)}%`,
            "황혼 플랫폼 끝에서 미러 칩을 무사히 회수했습니다.",
          ],
          "터치 또는 Enter로 다시 침투"
        );
      }

      function renderScene() {
        ctx.save();
        const shakeX = reduceMotion ? 0 : (Math.random() - 0.5) * state.shake;
        const shakeY = reduceMotion ? 0 : (Math.random() - 0.5) * state.shake;
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawVault();
        state.sentinels.forEach(drawSentinel);
        drawPlayer();
        drawParticles();
        drawHud();
        ctx.restore();

        if (state.screenFlash > 0) {
          ctx.fillStyle = `rgba(255,255,255, ${state.screenFlash * 0.28})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        renderScene();

        if (state.mode === "menu") {
          drawMenuOverlay();
          return;
        }
        if (state.mode === "failed") {
          drawFailureOverlay();
          return;
        }
        if (state.mode === "cleared") {
          drawClearOverlay();
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "origin top-left, x increases right, y increases down",
          mode: state.mode,
          result: window.relayStageResult.status,
          player: {
            x: Math.round(state.player.x),
            y: Math.round(state.player.y),
            heat: Math.round(state.heat),
            exposure: Math.round(state.exposure),
            in_vent: state.player.inVent,
            near_vault: state.player.nearVault,
          },
          stolen_patterns: state.stolenOrder.slice(),
          vault_progress: state.vaultProgress,
          replaying_pattern: state.replay?.patternId || null,
          sentinels: state.sentinels.map((sentinel) => ({
            id: sentinel.id,
            x: Math.round(sentinel.x),
            y: Math.round(sentinel.y),
            stolen: sentinel.stolen,
            sees_player: sentinel.visible,
            beat: sentinel.icons[sentinel.beatIndex],
          })),
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        const key = event.key.toLowerCase();
        if ((state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") && (key === "enter" || key === " ")) {
          event.preventDefault();
          startFromTouch();
          return;
        }
        if (state.mode !== "running") {
          if (key === "f") {
            event.preventDefault();
            toggleFullscreen();
          }
          return;
        }
        if (key === "arrowleft" || key === "a") keys.left = true;
        if (key === "arrowright" || key === "d") keys.right = true;
        if (key === "arrowup" || key === "w") keys.up = true;
        if (key === "arrowdown" || key === "s") keys.down = true;
        if (key === " ") {
          event.preventDefault();
          attemptReplay();
        }
        if (key === "f") {
          event.preventDefault();
          toggleFullscreen();
        }
      }

      function onKeyUp(event) {
        const key = event.key.toLowerCase();
        if (key === "arrowleft" || key === "a") keys.left = false;
        if (key === "arrowright" || key === "d") keys.right = false;
        if (key === "arrowup" || key === "w") keys.up = false;
        if (key === "arrowdown" || key === "s") keys.down = false;
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) {
            await document.documentElement.requestFullscreen?.();
          } else {
            await document.exitFullscreen?.();
          }
        } catch (error) {
          return;
        }
      }

      function onPointerDown(event) {
        canvas.focus();
        if (event.pointerType === "mouse" && event.button !== 0) {
          return;
        }
        const point = canvasPointFromEvent(event);
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
          return;
        }
        pointer.activeId = event.pointerId;
        pointer.target = point;
        pointer.startPoint = point;
        pointer.moved = false;
        pointer.startedAt = performance.now();
      }

      function onPointerMove(event) {
        if (pointer.activeId !== event.pointerId || state.mode !== "running") {
          return;
        }
        const point = canvasPointFromEvent(event);
        if (distanceBetween(point.x, point.y, pointer.startPoint.x, pointer.startPoint.y) > 10) {
          pointer.moved = true;
        }
        pointer.target = point;
      }

      function releasePointer(event) {
        if (pointer.activeId !== event.pointerId) {
          return;
        }
        const point =
          typeof event.clientX === "number" && typeof event.clientY === "number"
            ? canvasPointFromEvent(event)
            : pointer.startPoint || { x: state.player.x, y: state.player.y };
        const isTap = !pointer.moved && performance.now() - pointer.startedAt < 260;
        pointer.activeId = null;
        pointer.target = null;
        pointer.startPoint = null;
        if (isTap) {
          attemptStealAt(point.x, point.y);
        }
      }

      function onTouchStart(event) {
        if (event.touches.length >= 2 && state.mode === "running") {
          event.preventDefault();
          attemptReplay();
          return;
        }
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "dusk-subway-mirror-theft-heat",
        title: "Dusk Subway: Mirror Heist",
        creator: "jungcollin",
        genre: "Pattern theft stealth / 과열 관리",
        clearCondition: META_CLEAR,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.stolenOrder = patternLibrary.map((pattern) => pattern.id);
          state.vaultProgress = 3;
          currentSubmittedSet().splice(0, currentSubmittedSet().length, ...state.stolenOrder);
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);
      canvas.addEventListener("touchstart", onTouchStart, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      if (!automatedBrowser) {
        animationFrame = requestAnimationFrame(frame);
      }
    </script>
  </body>
</html>
