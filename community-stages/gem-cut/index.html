<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>보석 세공</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:"Trebuchet MS","Segoe UI",sans-serif; background:#0e0a14; }
      body { display:grid; place-items:center; }
      a, canvas { -webkit-tap-highlight-color: rgba(148,163,184,0.2); }
      .skip-link { position:absolute; top:12px; left:12px; z-index:10; width:1px; height:1px; padding:0; overflow:hidden; clip:rect(0,0,0,0); clip-path:inset(50%); border-radius:999px; background:rgba(60,40,20,0.92); color:#faf6f0; font-weight:800; text-decoration:none; white-space:nowrap; transition:transform 0.15s ease; }
      .skip-link:focus, .skip-link:focus-visible { width:auto; height:auto; padding:12px 16px; overflow:visible; clip:auto; clip-path:none; }
      .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
      canvas { display:block; width:100%; height:100%; background:#0e0a14; touch-action:none; }
      canvas:focus-visible { outline:4px solid rgba(100,200,150,0.6); outline-offset:-8px; }
      @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; scroll-behavior:auto!important; } }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">보석 세공. 화면을 드래그하여 절단선을 정밀하게 맞추고 손을 떼어 깎으세요. 터치로 조작합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="보석 세공" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
    "use strict";
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    let W, H, CX, CY;
    const FIXED_DT = 1/60, MAX_DT = 1/20;
    const relayCtx = window.RelayRuntime?.readContext("gem-cut") || { history:[], clearCount:0, previousStageId:null };

    const C = {
      bg1:"#0e0a14", bg2:"#18122a", bg3:"#221a38",
      text:"#e8e0d0", textDim:"#7a6a80", accent:"#d4a843",
      success:"#50c878", fail:"#e05050",
      workbench:"#2a2238", workbenchEdge:"rgba(255,255,255,0.06)",
      rawStone:"#6a6070", rawStoneEdge:"#504860",
    };
    const GEMS = [
      { fill:"#2dba7e", stroke:"#1a9060", shine:"#a0f0d0", inner:"#40d898", name:"에메랄드" },
      { fill:"#d04070", stroke:"#a83058", shine:"#f0a0c0", inner:"#e06090", name:"루비" },
      { fill:"#4088e0", stroke:"#3068c0", shine:"#a0d0f8", inner:"#60a0f0", name:"사파이어" },
      { fill:"#e0a830", stroke:"#c08820", shine:"#f8e8a0", inner:"#f0c050", name:"토파즈" },
      { fill:"#9868d0", stroke:"#7848b0", shine:"#c8a8f0", inner:"#a880e0", name:"자수정" },
    ];

    /* ── difficulty per gem ── */
    const TOLERANCE =  [0.28, 0.22, 0.16, 0.12, 0.09]; // angle radians (~16deg -> ~5deg)
    const DEPTH_TOL =  [0.25, 0.20, 0.16, 0.12, 0.09]; // depth tolerance (fraction of max radius)
    const GEM_SIDES =  [5,    6,    6,    7,    8    ];
    const GUIDE_LEN =  [1.0,  0.7,  0.5,  0.3,  0.0  ]; // guide line visibility (0=hidden)
    const INERTIA =    [0.15, 0.12, 0.10, 0.08, 0.06 ]; // lower = heavier tool, harder to control
    const ROTATION_SPEED = [0, 0, 0.15, 0.25, 0.35]; // gem rotation speed (rad/sec)
    const MAX_CUT_R = 100; // max cut radius in gem-scale units

    const TIME_LIMIT = 50, TARGET_GEMS = 5, MAX_MISTAKES = 3;

    /* ── state ── */
    let mode = "menu", elapsed = 0, lastRunTime = 0, menuAnim = 0;
    let hostFailedReported = false, hostClearedReported = false;
    let animFrame = 0, lastTs = 0;
    let gemsCompleted = 0, mistakes = 0;
    let gem = null; // current gem
    let cutAngle = 0; // current tool angle (with inertia)
    let cutDist = 0.5; // current tool distance from center (0-1, with inertia)
    let targetPointer = 0; // raw pointer angle
    let targetDist = 0.5; // raw pointer distance (0-1)
    let cutFeedback = 0, cutSuccess = false;
    let gemCompleteAnim = 0;
    let shakeTimer = 0, shakeIntensity = 0;
    let particles = [], sparkles = [];
    let gemRotation = 0; // current gem rotation offset
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* ── layout ── */
    let gemCX, gemCY, gemScale;
    function calcLayout() {
      CX = W/2; CY = H/2;
      gemScale = Math.min(W/420, H/700, 1.3);
      gemCX = CX;
      gemCY = CY + H * 0.02;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const cssW = Math.max(1, rect.width || window.innerWidth);
      const cssH = Math.max(1, rect.height || window.innerHeight);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = cssW; H = cssH;
      calcLayout();
    }

    function angleDiff(a, b) { return ((b - a) % (Math.PI*2) + Math.PI*3) % (Math.PI*2) - Math.PI; }
    function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

    /* ── relay ── */
    window.relayStageMeta = {
      id: "gem-cut", title: "보석 세공",
      description: "드래그로 절단선을 정밀하게 맞추고 탭하여 보석을 깎으세요",
      creator: "jungcollin", genre: "Precision cutting",
      controls: "드래그로 각도 조절, 탭으로 절단",
      clearCondition: "보석 5개를 세공하면 클리어",
      failCondition: "시간 초과 또는 실수 3회 시 실패",
    };
    window.relayStageResult = { status:"running" };
    function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch(e) { return false; } }
    function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
    function reportFailed(reason) { if (!inRelayHost()||hostFailedReported) return; hostFailedReported=true; window.parent.RelayHost.onStageFailed?.({stageId:"gem-cut",stageTitle:"보석 세공",reason,durationSec:+lastRunTime.toFixed(1)}); }
    function reportCleared() { if (!inRelayHost()||hostClearedReported) return; hostClearedReported=true; window.parent.RelayHost.onStageCleared?.({stageId:"gem-cut",stageTitle:"보석 세공",clearCountAfter:relayCtx.clearCount+1,durationSec:+lastRunTime.toFixed(1)}); }

    /* ── gem generation ── */
    function createGem() {
      const idx = Math.min(gemsCompleted, GEMS.length - 1);
      const color = GEMS[idx];
      const sides = GEM_SIDES[idx];
      const baseAngle = Math.random() * Math.PI * 2;
      const targetAngles = [], targetRadii = [];
      for (let i = 0; i < sides; i++) {
        targetAngles.push(baseAngle + (Math.PI * 2 / sides) * i);
        targetRadii.push(0.4 + Math.random() * 0.45); // 0.4-0.85 of MAX_CUT_R
      }

      // Raw stone vertices (irregular shape)
      const rawVerts = [];
      const rawN = sides * 5;
      for (let i = 0; i < rawN; i++) {
        const a = (Math.PI * 2 / rawN) * i;
        rawVerts.push({ angle: a, radius: (85 + Math.random() * 25 + Math.sin(a * 3) * 10) * gemScale });
      }

      gem = { sides, targetAngles, targetRadii, cutAngles: [], cutRadii: [], color, cutIndex: 0, rawVerts };
      cutAngle = targetAngles[0] + rand(-1.0, 1.0);
      cutDist = targetRadii[0] + rand(-0.3, 0.3);
      targetPointer = cutAngle;
      targetDist = cutDist;
      gemRotation = 0;
    }

    /* ── particles ── */
    function spawnChips(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random()*Math.PI*2, spd = 60+Math.random()*100;
        particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-30, life:1, decay:1.2+Math.random()*0.8, size:2+Math.random()*4, color, type:"chip" });
      }
    }
    function spawnSparkles(cx, cy, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random()*Math.PI*2, dist = Math.random()*70*gemScale;
        sparkles.push({ x:cx+Math.cos(a)*dist, y:cy+Math.sin(a)*dist, life:1, decay:0.7+Math.random()*0.6, size:2+Math.random()*3 });
      }
    }

    /* ── game flow ── */
    function startGame() {
      mode = "running"; elapsed = 0; lastRunTime = 0;
      gemsCompleted = 0; mistakes = 0;
      particles = []; sparkles = [];
      hostFailedReported = false; hostClearedReported = false;
      window.relayStageResult.status = "running";
      cutFeedback = 0; gemCompleteAnim = 0; shakeTimer = 0;
      createGem();
    }
    function failGame(reason) { mode = "failed"; lastRunTime = elapsed; window.relayStageResult.status = "failed"; reportFailed(reason); }
    function clearGame() { mode = "cleared"; lastRunTime = elapsed; window.relayStageResult.status = "cleared"; reportCleared(); }

    function attemptCut() {
      if (!gem || cutFeedback > 0.1 || gemCompleteAnim > 0) return;
      const idx = Math.min(gemsCompleted, TOLERANCE.length - 1);
      const angleTol = TOLERANCE[idx];
      const depthTol = DEPTH_TOL[idx];
      const targetAngle = gem.targetAngles[gem.cutIndex] + gemRotation;
      const targetR = gem.targetRadii[gem.cutIndex];
      const angleDelta = Math.abs(angleDiff(cutAngle, targetAngle));
      const depthDelta = Math.abs(cutDist - targetR);

      if (angleDelta < angleTol && depthDelta < depthTol) {
        gem.cutAngles.push(cutAngle - gemRotation);
        gem.cutRadii.push(cutDist);
        gem.cutIndex++;
        cutFeedback = 0.35; cutSuccess = true;
        const r = cutDist * MAX_CUT_R * gemScale;
        const cx = gemCX + Math.cos(cutAngle) * r;
        const cy = gemCY + Math.sin(cutAngle) * r;
        spawnChips(cx, cy, gem.color.shine, 10);

        if (gem.cutIndex >= gem.sides) {
          gemsCompleted++;
          gemCompleteAnim = 1.0;
          spawnSparkles(gemCX, gemCY, 25);
          if (gemsCompleted >= TARGET_GEMS) setTimeout(() => clearGame(), 700);
        }
      } else {
        mistakes++;
        cutFeedback = 0.35; cutSuccess = false;
        shakeTimer = 0.3; shakeIntensity = 5;
        if (mistakes >= MAX_MISTAKES) setTimeout(() => failGame("실수 " + MAX_MISTAKES + "회"), 500);
      }
    }

    /* ── input ── */
    let pointerDown = false;
    function updatePointerTarget(e) {
      const r = canvas.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width * W;
      const py = (e.clientY - r.top) / r.height * H;
      targetPointer = Math.atan2(py - gemCY, px - gemCX);
      const dist = Math.hypot(px - gemCX, py - gemCY);
      targetDist = Math.min(1, Math.max(0, dist / (MAX_CUT_R * gemScale)));
    }

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      if (mode !== "running") { startGame(); return; }
      pointerDown = true;
      updatePointerTarget(e);
      if (canvas.setPointerCapture && e.pointerId !== undefined) {
        try { canvas.setPointerCapture(e.pointerId); } catch {}
      }
      canvas.focus();
    });
    canvas.addEventListener("pointermove", (e) => {
      e.preventDefault();
      if (mode !== "running" || !pointerDown) return;
      updatePointerTarget(e);
    });
    canvas.addEventListener("pointerup", (e) => {
      e.preventDefault();
      if (mode === "running" && pointerDown) attemptCut();
      pointerDown = false;
      if (canvas.releasePointerCapture && e.pointerId !== undefined) {
        try { canvas.releasePointerCapture(e.pointerId); } catch {}
      }
    });
    canvas.addEventListener("pointercancel", (e) => {
      e.preventDefault(); pointerDown = false;
    });
    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (mode !== "running") startGame(); else attemptCut(); }
      if (mode === "running") {
        if (e.key === "ArrowLeft") targetPointer -= 0.03;
        if (e.key === "ArrowRight") targetPointer += 0.03;
      }
    });

    /* ── update ── */
    function update(dt) {
      menuAnim += dt;
      if (mode !== "running") {
        for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=150*dt; p.life-=p.decay*dt; }
        particles = particles.filter(p => p.life > 0);
        for (const s of sparkles) s.life -= s.decay * dt;
        sparkles = sparkles.filter(s => s.life > 0);
        return;
      }
      elapsed += dt;
      if (elapsed >= TIME_LIMIT) { failGame("시간 초과"); return; }
      if (cutFeedback > 0) cutFeedback = Math.max(0, cutFeedback - dt);
      if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);

      if (gemCompleteAnim > 0) {
        gemCompleteAnim = Math.max(0, gemCompleteAnim - dt);
        if (gemCompleteAnim <= 0 && gemsCompleted < TARGET_GEMS) createGem();
      }

      // Cut line inertia — heavier tool on harder gems
      if (gem && gem.cutIndex < gem.sides) {
        const idx = Math.min(gemsCompleted, INERTIA.length - 1);
        const factor = INERTIA[idx];
        const aDiff = angleDiff(cutAngle, targetPointer);
        cutAngle += aDiff * factor;
        cutDist += (targetDist - cutDist) * factor;
      }

      // Gem rotation (later gems)
      if (gem) {
        const idx = Math.min(gemsCompleted, ROTATION_SPEED.length - 1);
        gemRotation += ROTATION_SPEED[idx] * dt;
      }

      for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=150*dt; p.life-=p.decay*dt; }
      particles = particles.filter(p => p.life > 0);
      for (const s of sparkles) s.life -= s.decay * dt;
      sparkles = sparkles.filter(s => s.life > 0);
    }

    /* ── draw helpers ── */
    function drawBg() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, C.bg1); g.addColorStop(0.5, C.bg2); g.addColorStop(1, C.bg3);
      ctx.fillStyle = g; ctx.fillRect(-10, -10, W+20, H+20);

      // Workbench circle
      ctx.beginPath();
      ctx.arc(gemCX, gemCY, 120 * gemScale, 0, Math.PI * 2);
      ctx.fillStyle = C.workbench; ctx.fill();
      ctx.strokeStyle = C.workbenchEdge; ctx.lineWidth = 1.5; ctx.stroke();
    }

    function drawRawStone(cx, cy, verts, rotation) {
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(rotation);
      ctx.beginPath();
      for (let i = 0; i < verts.length; i++) {
        const v = verts[i];
        const x = Math.cos(v.angle) * v.radius, y = Math.sin(v.angle) * v.radius;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      const sg = ctx.createRadialGradient(0, 0, 0, 0, 0, 100 * gemScale);
      sg.addColorStop(0, "#807080"); sg.addColorStop(1, C.rawStone);
      ctx.fillStyle = sg; ctx.fill();
      ctx.strokeStyle = C.rawStoneEdge; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    function drawCutFacets(cx, cy, g, rotation) {
      if (g.cutAngles.length === 0) return;
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(rotation);
      ctx.beginPath();
      for (let i = 0; i < g.cutAngles.length; i++) {
        const a = g.cutAngles[i];
        const r = (g.cutRadii[i] || 0.65) * MAX_CUT_R * gemScale;
        const x = Math.cos(a) * r, y = Math.sin(a) * r;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      if (g.cutAngles.length >= g.sides) ctx.closePath();

      const complete = g.cutAngles.length >= g.sides;
      const maxR = Math.max(...g.cutRadii.map(r => r * MAX_CUT_R * gemScale), 60);
      if (complete) {
        const gg = ctx.createRadialGradient(0, -15*gemScale, 0, 0, 0, maxR);
        gg.addColorStop(0, g.color.inner); gg.addColorStop(0.6, g.color.fill); gg.addColorStop(1, g.color.stroke);
        ctx.fillStyle = gg; ctx.fill();
        // Shine facet
        if (g.cutAngles.length >= 3) {
          ctx.beginPath();
          for (let i = 0; i < Math.min(3, g.cutAngles.length); i++) {
            const a = g.cutAngles[i];
            const r = (g.cutRadii[i] || 0.65) * MAX_CUT_R * gemScale * 0.45;
            i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
          }
          ctx.closePath();
          ctx.fillStyle = g.color.shine + "50"; ctx.fill();
        }
      } else {
        ctx.fillStyle = g.color.fill + "60"; ctx.fill();
      }
      ctx.strokeStyle = g.color.stroke; ctx.lineWidth = 2; ctx.stroke();
      ctx.restore();
    }

    function drawGuideLines(cx, cy, g, rotation) {
      const idx = Math.min(gemsCompleted, GUIDE_LEN.length - 1);
      const visibility = GUIDE_LEN[idx];
      if (visibility <= 0) return;

      ctx.save(); ctx.translate(cx, cy); ctx.rotate(rotation);
      for (let i = g.cutIndex; i < g.sides; i++) {
        const a = g.targetAngles[i];
        const tr = g.targetRadii[i];
        const isCurrent = i === g.cutIndex;
        const pointR = tr * MAX_CUT_R * gemScale;

        // Thin guide line from center outward
        const lineLen = (isCurrent ? 105 : 60) * gemScale * visibility;
        ctx.beginPath();
        ctx.setLineDash(isCurrent ? [5, 4] : [2, 6]);
        ctx.moveTo(Math.cos(a) * 20 * gemScale, Math.sin(a) * 20 * gemScale);
        ctx.lineTo(Math.cos(a) * lineLen, Math.sin(a) * lineLen);
        ctx.strokeStyle = isCurrent
          ? `rgba(212,168,67,${0.3 * visibility})`
          : `rgba(150,140,120,${0.15 * visibility})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        // Target point (shows exact position: angle + depth)
        if (isCurrent && visibility > 0.2) {
          const tx = Math.cos(a) * pointR, ty = Math.sin(a) * pointR;
          // Crosshair
          const ch = 6 * visibility;
          ctx.strokeStyle = `rgba(212,168,67,${0.6 * visibility})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(tx - ch, ty); ctx.lineTo(tx + ch, ty); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(tx, ty - ch); ctx.lineTo(tx, ty + ch); ctx.stroke();
          // Ring
          ctx.beginPath();
          ctx.arc(tx, ty, 5 * visibility, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(212,168,67,${0.5 * visibility})`;
          ctx.lineWidth = 1.5; ctx.stroke();
        } else if (!isCurrent && visibility > 0.4) {
          // Small dot for future cuts
          ctx.beginPath();
          ctx.arc(Math.cos(a) * pointR, Math.sin(a) * pointR, 2.5 * visibility, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(150,140,120,${0.3 * visibility})`;
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawCutLine(cx, cy) {
      if (!gem || gem.cutIndex >= gem.sides || gemCompleteAnim > 0) return;
      const idx = Math.min(gemsCompleted, TOLERANCE.length - 1);
      const angleTol = TOLERANCE[idx];
      const depthTol = DEPTH_TOL[idx];
      const targetAngle = gem.targetAngles[gem.cutIndex] + gemRotation;
      const targetR = gem.targetRadii[gem.cutIndex];
      const aDiff = Math.abs(angleDiff(cutAngle, targetAngle));
      const dDiff = Math.abs(cutDist - targetR);
      const angleOk = aDiff < angleTol;
      const depthOk = dDiff < depthTol;

      // Combined precision indicator
      let lineColor, indicatorText;
      if (angleOk && depthOk && aDiff < angleTol * 0.4 && dDiff < depthTol * 0.4) {
        lineColor = C.success; indicatorText = "PERFECT";
      } else if (angleOk && depthOk) {
        lineColor = C.accent; indicatorText = "GOOD";
      } else if (angleOk || depthOk) {
        lineColor = "#e0a030"; indicatorText = "";
      } else {
        lineColor = C.fail; indicatorText = "";
      }

      const toolR = cutDist * MAX_CUT_R * gemScale;
      const endX = cx + Math.cos(cutAngle) * toolR;
      const endY = cy + Math.sin(cutAngle) * toolR;

      // Tool line from center to tool head
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(cutAngle) * 15 * gemScale, cy + Math.sin(cutAngle) * 15 * gemScale);
      ctx.lineTo(endX, endY);
      ctx.stroke();

      // Tool head (diamond chisel)
      ctx.save();
      ctx.translate(endX, endY);
      ctx.rotate(cutAngle);
      ctx.fillStyle = lineColor;
      ctx.beginPath();
      ctx.moveTo(0, -6); ctx.lineTo(10, 0); ctx.lineTo(0, 6); ctx.lineTo(-3, 0);
      ctx.closePath(); ctx.fill();
      ctx.restore();

      // Precision text near tool
      if (indicatorText && pointerDown) {
        ctx.textAlign = "center";
        ctx.font = `bold ${Math.max(10, 12 * gemScale)}px 'Trebuchet MS',sans-serif`;
        ctx.fillStyle = lineColor;
        ctx.fillText(indicatorText, endX + Math.cos(cutAngle + 0.4) * 22, endY + Math.sin(cutAngle + 0.4) * 22);
      }

      // Tolerance indicators when dragging
      if (pointerDown) {
        // Angle tolerance arc at current depth
        const arcR = targetR * MAX_CUT_R * gemScale;
        ctx.beginPath();
        ctx.arc(cx, cy, arcR, targetAngle - angleTol, targetAngle + angleTol);
        ctx.strokeStyle = angleOk ? `rgba(80,200,120,0.2)` : `rgba(255,255,255,0.08)`;
        ctx.lineWidth = 6 * gemScale;
        ctx.stroke();

        // Depth tolerance ring (target radius range)
        const innerR = (targetR - depthTol) * MAX_CUT_R * gemScale;
        const outerR = (targetR + depthTol) * MAX_CUT_R * gemScale;
        ctx.beginPath();
        ctx.arc(cx, cy, innerR, targetAngle - 0.3, targetAngle + 0.3);
        ctx.strokeStyle = depthOk ? `rgba(80,200,120,0.15)` : `rgba(255,255,255,0.05)`;
        ctx.lineWidth = 1; ctx.stroke();
        ctx.beginPath();
        ctx.arc(cx, cy, outerR, targetAngle - 0.3, targetAngle + 0.3);
        ctx.strokeStyle = depthOk ? `rgba(80,200,120,0.15)` : `rgba(255,255,255,0.05)`;
        ctx.lineWidth = 1; ctx.stroke();
      }
    }

    function drawHUD() {
      const tl = Math.max(0, TIME_LIMIT - elapsed);
      const pad = 16;

      // Gem indicators
      for (let i = 0; i < TARGET_GEMS; i++) {
        const gc = GEMS[i % GEMS.length];
        const dx = pad + i * 26, dy = 24;
        ctx.beginPath();
        const n = GEM_SIDES[i]; const r = 8;
        for (let j = 0; j < n; j++) {
          const a = -Math.PI/2 + (Math.PI*2/n)*j;
          j === 0 ? ctx.moveTo(dx + Math.cos(a)*r, dy + Math.sin(a)*r) : ctx.lineTo(dx + Math.cos(a)*r, dy + Math.sin(a)*r);
        }
        ctx.closePath();
        if (i < gemsCompleted) { ctx.fillStyle = gc.fill; ctx.fill(); }
        else if (i === gemsCompleted) { ctx.strokeStyle = gc.fill; ctx.lineWidth = 2; ctx.stroke(); }
        else { ctx.strokeStyle = C.textDim; ctx.lineWidth = 1; ctx.stroke(); }
      }

      // Timer
      ctx.textAlign = "right"; ctx.fillStyle = tl < 10 ? C.fail : C.text;
      ctx.font = "600 16px 'Trebuchet MS',sans-serif";
      ctx.fillText(Math.ceil(tl) + "s", W - pad, 28);

      // Miss marks
      ctx.textAlign = "left";
      for (let i = 0; i < MAX_MISTAKES; i++) {
        ctx.fillStyle = i < mistakes ? C.fail : "rgba(255,255,255,0.15)";
        ctx.font = "14px sans-serif";
        ctx.fillText("\u2716", pad + i * 20, 52);
      }

      // Gem name + progress
      if (gem && gemCompleteAnim <= 0) {
        ctx.textAlign = "center"; ctx.fillStyle = gem.color.fill;
        ctx.font = `500 ${Math.max(11, 13 * gemScale)}px 'Trebuchet MS',sans-serif`;
        ctx.fillText(`${gem.color.name} (${gem.cutIndex}/${gem.sides})`, CX, H - 16);

        // Difficulty label
        const labels = ["보통", "정밀", "까다로움", "고난이도", "장인"];
        const dIdx = Math.min(gemsCompleted, labels.length - 1);
        ctx.fillStyle = C.textDim;
        ctx.font = `400 ${Math.max(9, 10 * gemScale)}px 'Trebuchet MS',sans-serif`;
        ctx.fillText(labels[dIdx], CX, H - 34);
      }
    }

    function drawRR(x,y,w,h,r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

    function drawCard(title, lines, accent) {
      ctx.fillStyle = "rgba(10,6,16,0.7)"; ctx.fillRect(0,0,W,H);
      const cw = Math.min(320, W - 40);
      const ch = 50 + lines.length * 28 + 44;
      const cx = (W - cw)/2, cy = (H - ch)/2 + 20;
      drawRR(cx, cy, cw, ch, 12); ctx.fillStyle = "rgba(30,22,42,0.95)"; ctx.fill();
      ctx.strokeStyle = accent + "60"; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = accent; ctx.fillRect(cx + 20, cy + 8, cw - 40, 2);
      ctx.textAlign = "center"; ctx.fillStyle = C.text; ctx.font = "bold 22px 'Trebuchet MS',sans-serif";
      ctx.fillText(title, W/2, cy + 38);
      ctx.font = "400 13px 'Trebuchet MS',sans-serif"; ctx.fillStyle = C.textDim;
      lines.forEach((l, i) => ctx.fillText(l, W/2, cy + 64 + i * 28));
      ctx.fillStyle = accent + "80"; ctx.font = "400 11px 'Trebuchet MS',sans-serif";
      ctx.fillText("TAP to play", W/2, cy + ch - 14); ctx.textAlign = "left";
    }

    /* ── render ── */
    function render() {
      ctx.save();
      if (shakeTimer > 0 && !reducedMotion) {
        const s = shakeIntensity * (shakeTimer / 0.3);
        ctx.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s);
      }
      drawBg();

      if (mode === "menu") {
        // Decorative gem
        ctx.save(); ctx.translate(CX, CY - 30);
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = -Math.PI/2 + (Math.PI*2/6)*i, r = 40 * gemScale;
          i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.closePath();
        const mg = ctx.createRadialGradient(0, -10, 0, 0, 0, 40*gemScale);
        mg.addColorStop(0, GEMS[0].inner); mg.addColorStop(1, GEMS[0].fill);
        ctx.fillStyle = mg; ctx.fill();
        ctx.strokeStyle = GEMS[0].stroke; ctx.lineWidth = 2; ctx.stroke();
        // Shine
        ctx.beginPath(); ctx.moveTo(0, -35*gemScale); ctx.lineTo(-15*gemScale, -10*gemScale); ctx.lineTo(0, -18*gemScale);
        ctx.closePath(); ctx.fillStyle = "rgba(255,255,255,0.35)"; ctx.fill();
        ctx.restore();

        drawCard("보석 세공", [
          "드래그로 절단선을 맞추고 손을 떼어 절단",
          "난이도가 점점 올라갑니다",
          "보석 5개를 세공하면 클리어!"
        ], GEMS[0].fill);
        ctx.restore(); return;
      }

      if (mode === "running") {
        if (gem && gemCompleteAnim <= 0) {
          drawRawStone(gemCX, gemCY, gem.rawVerts, gemRotation);
          drawCutFacets(gemCX, gemCY, gem, gemRotation);
          drawGuideLines(gemCX, gemCY, gem, gemRotation);
          drawCutLine(gemCX, gemCY);
        }
        if (gemCompleteAnim > 0 && gem) {
          const sc = 1 + (1 - gemCompleteAnim) * 0.3;
          ctx.save(); ctx.translate(gemCX, gemCY); ctx.scale(sc, sc);
          ctx.globalAlpha = gemCompleteAnim;
          ctx.rotate(gemRotation);
          ctx.beginPath();
          for (let i = 0; i < gem.cutAngles.length; i++) {
            const a = gem.cutAngles[i];
            const cr = (gem.cutRadii[i] || 0.65) * MAX_CUT_R * gemScale;
            i === 0 ? ctx.moveTo(Math.cos(a)*cr, Math.sin(a)*cr) : ctx.lineTo(Math.cos(a)*cr, Math.sin(a)*cr);
          }
          ctx.closePath();
          const maxR = Math.max(...gem.cutRadii.map(r => r * MAX_CUT_R * gemScale), 60);
          const gg = ctx.createRadialGradient(0, -15*gemScale, 0, 0, 0, maxR);
          gg.addColorStop(0, gem.color.inner); gg.addColorStop(1, gem.color.fill);
          ctx.fillStyle = gg; ctx.fill();
          ctx.strokeStyle = gem.color.stroke; ctx.lineWidth = 3; ctx.stroke();
          ctx.globalAlpha = 1; ctx.restore();

          ctx.textAlign = "center"; ctx.fillStyle = C.success;
          ctx.font = `bold ${Math.max(16, 20*gemScale)}px 'Trebuchet MS',sans-serif`;
          ctx.globalAlpha = gemCompleteAnim;
          ctx.fillText("완성!", CX, gemCY - 100 * gemScale);
          ctx.globalAlpha = 1;
        }

        // Particles
        for (const p of particles) {
          ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        for (const s of sparkles) {
          ctx.globalAlpha = s.life;
          ctx.fillStyle = "#fff";
          ctx.beginPath(); ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = C.accent;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.size * s.life * 0.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        if (cutFeedback > 0) {
          ctx.fillStyle = cutSuccess
            ? `rgba(80,200,120,${cutFeedback * 0.5})`
            : `rgba(224,80,80,${cutFeedback * 0.5})`;
          ctx.fillRect(0, 0, W, H);
        }

        drawHUD();
        ctx.restore(); return;
      }

      if (mode === "failed") {
        for (const p of particles) {
          ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        drawCard("실패", [
          mistakes >= MAX_MISTAKES ? `실수 ${MAX_MISTAKES}회 초과` : "시간 초과",
          `완성: ${gemsCompleted}개 / ${TARGET_GEMS}개`,
          `시간: ${lastRunTime.toFixed(1)}초`
        ], C.fail);
        ctx.restore(); return;
      }

      if (mode === "cleared") {
        // Victory gems
        for (let i = 0; i < TARGET_GEMS; i++) {
          const gc = GEMS[i % GEMS.length];
          const n = GEM_SIDES[i], r = 22 * gemScale;
          const gx = CX + (i - 2) * 55 * gemScale, gy = CY - 60;
          const bob = Math.sin(menuAnim * 1.5 + i) * 5;
          ctx.beginPath();
          for (let j = 0; j < n; j++) {
            const a = -Math.PI/2 + (Math.PI*2/n)*j;
            j === 0 ? ctx.moveTo(gx + Math.cos(a)*r, gy + bob + Math.sin(a)*r) : ctx.lineTo(gx + Math.cos(a)*r, gy + bob + Math.sin(a)*r);
          }
          ctx.closePath();
          const vg = ctx.createRadialGradient(gx, gy + bob - 5, 0, gx, gy + bob, r);
          vg.addColorStop(0, gc.inner); vg.addColorStop(1, gc.fill);
          ctx.fillStyle = vg; ctx.fill();
          ctx.strokeStyle = gc.stroke; ctx.lineWidth = 2; ctx.stroke();
        }
        if (Math.random() < 0.06) {
          const gi = Math.floor(Math.random() * TARGET_GEMS);
          spawnSparkles(CX + (gi - 2) * 55 * gemScale, CY - 60, 3);
        }
        for (const s of sparkles) {
          ctx.globalAlpha = s.life; ctx.fillStyle = "#fff";
          ctx.beginPath(); ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        drawCard("세공 완료!", [
          `보석 ${TARGET_GEMS}개 완성`,
          `시간: ${lastRunTime.toFixed(1)}초`
        ], C.success);
        ctx.restore(); return;
      }
      ctx.restore();
    }

    /* ── loop ── */
    function frame(ts) { const dt = lastTs ? Math.min((ts-lastTs)/1000, MAX_DT) : FIXED_DT; lastTs = ts; update(dt); render(); animFrame = requestAnimationFrame(frame); }

    function renderGameToText() {
      return JSON.stringify({
        mode, elapsed: Math.round(elapsed*10)/10,
        gemsCompleted, mistakes,
        currentGem: gem ? `${gem.color.name} ${gem.cutIndex}/${gem.sides}` : null,
        tolerance: TOLERANCE[Math.min(gemsCompleted, TOLERANCE.length-1)],
        timeLeft: Math.max(0, Math.round((TIME_LIMIT-elapsed)*10)/10),
        result: window.relayStageResult.status
      });
    }

    window.render_game_to_text = renderGameToText;
    window.advanceTime = (ms=16.67) => { const steps = Math.max(1, Math.round(ms/(FIXED_DT*1000))); for(let i=0;i<steps;i++) update(FIXED_DT); render(); return renderGameToText(); };
    window.relayStageDebug = {
      forceClear() { startGame(); clearGame(); render(); },
      forceFail() { startGame(); failGame("debug_force_fail"); render(); }
    };

    canvas.addEventListener("click", () => canvas.focus());
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
    resizeCanvas();
    reportReady(); render(); canvas.focus();
    animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
