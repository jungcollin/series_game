<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>보석 세공</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #faf6f0;
      }
      body { display: grid; place-items: center; }
      a, canvas { -webkit-tap-highlight-color: rgba(148,163,184,0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0,0,0,0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60,40,20,0.92);
        color: #faf6f0; font-weight: 800; text-decoration: none;
        white-space: nowrap; transition: transform 0.15s ease;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0;
        margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
        white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        background: #faf6f0; touch-action: none;
      }
      canvas:focus-visible {
        outline: 4px solid rgba(80,60,30,0.6); outline-offset: -8px;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">보석 세공. 터치로 커팅 각도를 조절하고 탭하여 원석을 깎아 보석을 완성하세요.</p>
    <canvas id="game" width="960" height="540" aria-label="보석 세공" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
    "use strict";
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const FIXED_DT = 1/60, MAX_DT = 1/20;
    const relayCtx = window.RelayRuntime?.readContext("gem-cut") || { history:[], clearCount:0, previousStageId:null };

    const COL = {
      bg: "#faf6f0", emerald: "#2d9d6e", emeraldDark: "#1a7a50",
      rose: "#c4876e", roseDark: "#a06050", gold: "#d4a843",
      text: "#3c2814", textLight: "#7a6050", cardBg: "rgba(245,239,230,0.96)",
      fail: "#c44040", clear: "#2d9d6e"
    };
    const GEM_COLORS = [
      { fill: "#2d9d6e", stroke: "#1a7a50", shine: "#8eeac0", name: "에메랄드" },
      { fill: "#c44070", stroke: "#a03060", shine: "#f0a0c0", name: "루비" },
      { fill: "#4080d0", stroke: "#3060b0", shine: "#a0c8f0", name: "사파이어" },
      { fill: "#d4a843", stroke: "#b08930", shine: "#f0e0a0", name: "토파즈" },
      { fill: "#9060c0", stroke: "#7040a0", shine: "#c8a0e8", name: "자수정" }
    ];
    const TIME_LIMIT = 40, TARGET_GEMS = 5, MAX_MISTAKES = 3;

    let mode = "menu", elapsed = 0, lastRunTime = 0;
    let hostFailedReported = false, hostClearedReported = false;
    let animFrame = 0, lastTs = 0;
    let gemsCompleted = 0, mistakes = 0, currentGem = null, cutAngle = 0;
    let cutFeedback = 0, cutSuccess = false, gemCompleteAnim = 0;
    let shakeTimer = 0, shakeIntensity = 0;
    let particles = [], sparkles = [];
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function angleDiff(a, b) { return ((b - a) % (Math.PI*2) + Math.PI*3) % (Math.PI*2) - Math.PI; }

    function createGem() {
      const sides = 5 + Math.floor(Math.random() * 4);
      const color = GEM_COLORS[gemsCompleted % GEM_COLORS.length];
      const targetAngles = [], baseAngle = Math.random() * Math.PI * 2;
      for (let i = 0; i < sides; i++) targetAngles.push(baseAngle + (Math.PI*2/sides)*i);
      const vertices = [], n = sides * 4;
      for (let i = 0; i < n; i++) { const a = (Math.PI*2/n)*i; vertices.push({ angle: a, radius: 110 + Math.random()*30 + Math.sin(a*3)*15 }); }
      currentGem = { sides, targetAngles, cutAngles: [], color, cutIndex: 0, vertices };
      cutAngle = targetAngles[0] + (Math.random() - 0.5) * 1.5;
    }

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random()*Math.PI*2, spd = 80+Math.random()*120;
        particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, decay: 1.5+Math.random(), size: 3+Math.random()*4, color });
      }
    }
    function spawnSparkles(cx, cy) {
      for (let i = 0; i < 20; i++) {
        const a = Math.random()*Math.PI*2, dist = Math.random()*80;
        sparkles.push({ x: cx+Math.cos(a)*dist, y: cy+Math.sin(a)*dist, life: 1, decay: 0.8+Math.random()*0.6, size: 2+Math.random()*3 });
      }
    }

    function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch(e) { return false; } }
    function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
    function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId:"gem-cut", stageTitle:"보석 세공", reason, durationSec:+lastRunTime.toFixed(1) }); }
    function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId:"gem-cut", stageTitle:"보석 세공", clearCountAfter: relayCtx.clearCount+1, durationSec:+lastRunTime.toFixed(1) }); }

    function startGame() {
      mode = "running"; elapsed = 0; lastRunTime = 0; gemsCompleted = 0; mistakes = 0;
      particles = []; sparkles = []; hostFailedReported = false; hostClearedReported = false;
      window.relayStageResult.status = "running"; cutFeedback = 0; gemCompleteAnim = 0; shakeTimer = 0;
      createGem();
    }
    function failGame(reason) { mode = "failed"; lastRunTime = elapsed; window.relayStageResult.status = "failed"; reportFailed(reason); }
    function clearGame() { mode = "cleared"; lastRunTime = elapsed; window.relayStageResult.status = "cleared"; reportCleared(); }

    function attemptCut() {
      if (!currentGem || cutFeedback > 0 || gemCompleteAnim > 0) return;
      const gem = currentGem, target = gem.targetAngles[gem.cutIndex];
      const diff = Math.abs(angleDiff(cutAngle, target));
      if (diff < 0.35) {
        gem.cutAngles.push(cutAngle); gem.cutIndex++;
        cutFeedback = 0.4; cutSuccess = true;
        spawnParticles(W/2+Math.cos(cutAngle)*100, H/2+20+Math.sin(cutAngle)*100, gem.color.shine, 12);
        if (gem.cutIndex >= gem.sides) {
          gemsCompleted++; gemCompleteAnim = 1.2; spawnSparkles(W/2, H/2+20);
          if (gemsCompleted >= TARGET_GEMS) setTimeout(() => clearGame(), 800);
        }
      } else {
        mistakes++; cutFeedback = 0.4; cutSuccess = false; shakeTimer = 0.3; shakeIntensity = 6;
        if (mistakes >= MAX_MISTAKES) setTimeout(() => failGame("실수 3회"), 500);
      }
    }

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect(), px = (e.clientX-r.left)/r.width*W, py = (e.clientY-r.top)/r.height*H;
      if (mode !== "running") { startGame(); return; }
      cutAngle = Math.atan2(py-(H/2+20), px-W/2); attemptCut();
    });
    canvas.addEventListener("pointermove", (e) => {
      e.preventDefault(); if (mode !== "running" || !currentGem) return;
      const r = canvas.getBoundingClientRect(), px = (e.clientX-r.left)/r.width*W, py = (e.clientY-r.top)/r.height*H;
      cutAngle = Math.atan2(py-(H/2+20), px-W/2);
    });
    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); if (mode !== "running") startGame(); else attemptCut(); }
      if (mode === "running") { if (e.key === "ArrowLeft") cutAngle -= 0.1; if (e.key === "ArrowRight") cutAngle += 0.1; if (e.key === " ") { e.preventDefault(); attemptCut(); } }
    });

    function update(dt) {
      if (mode !== "running") return;
      elapsed += dt;
      if (elapsed >= TIME_LIMIT) { failGame("시간 초과"); return; }
      if (cutFeedback > 0) cutFeedback = Math.max(0, cutFeedback - dt);
      if (gemCompleteAnim > 0) { gemCompleteAnim = Math.max(0, gemCompleteAnim - dt); if (gemCompleteAnim <= 0 && gemsCompleted < TARGET_GEMS) createGem(); }
      if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);
      for (const p of particles) { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 200*dt; p.life -= p.decay*dt; }
      particles = particles.filter(p => p.life > 0);
      for (const s of sparkles) s.life -= s.decay * dt;
      sparkles = sparkles.filter(s => s.life > 0);
    }

    function drawRR(x, y, w, h, r) {
      ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
      ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
      ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
    }
    function drawCard(title, lines, accent) {
      ctx.fillStyle = "rgba(250,246,240,0.5)"; ctx.fillRect(0,0,W,H);
      const cw = 320, ch = 44+lines.length*28+44, cx = (W-cw)/2, cy = (H-ch)/2;
      drawRR(cx,cy,cw,ch,10); ctx.fillStyle = COL.cardBg; ctx.fill();
      ctx.fillStyle = accent; ctx.fillRect(cx+20, cy+8, cw-40, 3);
      ctx.textAlign = "center"; ctx.fillStyle = COL.text; ctx.font = "bold 24px 'Trebuchet MS',sans-serif";
      ctx.fillText(title, W/2, cy+38);
      ctx.font = "400 13px 'Trebuchet MS',sans-serif"; ctx.fillStyle = COL.textLight;
      lines.forEach((l,i) => ctx.fillText(l, W/2, cy+64+i*28));
      ctx.fillStyle = "#aaa"; ctx.font = "400 12px 'Trebuchet MS',sans-serif";
      ctx.fillText("TAP \ub610\ub294 ENTER", W/2, cy+ch-16); ctx.textAlign = "left";
    }
    function drawGem(cx, cy, gem) {
      ctx.save(); ctx.translate(cx, cy);
      ctx.beginPath();
      for (let i = 0; i < gem.vertices.length; i++) { const v = gem.vertices[i], x = Math.cos(v.angle)*v.radius, y = Math.sin(v.angle)*v.radius; i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); }
      ctx.closePath(); ctx.fillStyle = "#d0c8b8"; ctx.strokeStyle = "#b0a898"; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
      if (gem.cutAngles.length > 0) {
        ctx.beginPath();
        for (let i = 0; i < gem.cutAngles.length; i++) { const a = gem.cutAngles[i], x = Math.cos(a)*90, y = Math.sin(a)*90; i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); }
        if (gem.cutAngles.length >= gem.sides) ctx.closePath();
        ctx.fillStyle = gem.cutAngles.length >= gem.sides ? gem.color.fill : gem.color.fill+"80"; ctx.fill();
        ctx.strokeStyle = gem.color.stroke; ctx.lineWidth = 2; ctx.stroke();
        if (gem.cutAngles.length >= gem.sides) {
          ctx.beginPath(); for (let i=0;i<Math.min(3,gem.cutAngles.length);i++) { const a=gem.cutAngles[i],x=Math.cos(a)*50,y=Math.sin(a)*50; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
          ctx.closePath(); ctx.fillStyle = gem.color.shine+"60"; ctx.fill();
        }
      }
      for (let i = gem.cutAngles.length; i < gem.sides; i++) {
        const a = gem.targetAngles[i], cur = i === gem.cutIndex;
        ctx.beginPath(); ctx.setLineDash(cur ? [6,4] : [3,6]); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*130, Math.sin(a)*130);
        ctx.strokeStyle = cur ? COL.gold : "#c0b8a8"; ctx.lineWidth = cur ? 2.5 : 1; ctx.stroke(); ctx.setLineDash([]);
        if (cur) { ctx.beginPath(); ctx.arc(Math.cos(a)*115, Math.sin(a)*115, 6, 0, Math.PI*2); ctx.fillStyle = COL.gold; ctx.fill(); }
      }
      if (gem.cutIndex < gem.sides && gemCompleteAnim <= 0) {
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(cutAngle)*140, Math.sin(cutAngle)*140);
        ctx.strokeStyle = COL.rose; ctx.lineWidth = 3; ctx.stroke();
        ctx.beginPath(); ctx.arc(Math.cos(cutAngle)*130, Math.sin(cutAngle)*130, 8, 0, Math.PI*2);
        ctx.fillStyle = COL.roseDark; ctx.fill();
      }
      ctx.restore();
    }
    function drawHUD() {
      const tl = Math.max(0, TIME_LIMIT - elapsed);
      ctx.fillStyle = COL.text; ctx.font = "600 16px 'Trebuchet MS',sans-serif"; ctx.textAlign = "left";
      ctx.fillText(`${gemsCompleted} / ${TARGET_GEMS}`, 20, 30);
      for (let i=0;i<TARGET_GEMS;i++) { ctx.beginPath(); for (let j=0;j<5;j++) { const a=-Math.PI/2+(Math.PI*2/5)*j,r=8,gx=100+i*22; j===0?ctx.moveTo(gx+Math.cos(a)*r,25+Math.sin(a)*r):ctx.lineTo(gx+Math.cos(a)*r,25+Math.sin(a)*r); } ctx.closePath(); ctx.fillStyle = i<gemsCompleted ? GEM_COLORS[i%GEM_COLORS.length].fill : "#d8d0c4"; ctx.fill(); }
      ctx.textAlign = "right"; ctx.fillStyle = tl<10 ? COL.fail : COL.text; ctx.fillText(Math.ceil(tl)+"s", W-20, 30);
      ctx.fillStyle = "#e0d8cc"; ctx.fillRect(W-180, 38, 160, 4);
      ctx.fillStyle = tl<10 ? COL.fail : COL.emerald; ctx.fillRect(W-180, 38, 160*(tl/TIME_LIMIT), 4);
      ctx.textAlign = "left"; for (let i=0;i<MAX_MISTAKES;i++) { ctx.fillStyle = i<mistakes ? COL.fail : "#d8d0c4"; ctx.font = "16px sans-serif"; ctx.fillText("\u2716", 20+i*22, 58); }
      if (currentGem && gemCompleteAnim <= 0) { ctx.textAlign = "center"; ctx.fillStyle = currentGem.color.fill; ctx.font = "500 14px 'Trebuchet MS',sans-serif"; ctx.fillText(currentGem.color.name+` (${currentGem.cutIndex}/${currentGem.sides})`, W/2, H-30); }
    }

    function render() {
      ctx.save();
      if (shakeTimer > 0 && !reducedMotion) { const s = shakeIntensity*(shakeTimer/0.3); ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }
      ctx.fillStyle = COL.bg; ctx.fillRect(-10,-10,W+20,H+20);
      ctx.strokeStyle = "#ece6dc"; ctx.lineWidth = 0.5;
      for (let x=0;x<W;x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
      for (let y=0;y<H;y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

      if (mode === "menu") {
        ctx.save(); ctx.translate(W/2, H/2-60);
        ctx.beginPath(); for (let i=0;i<6;i++) { const a=-Math.PI/2+(Math.PI*2/6)*i,r=50; i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); }
        ctx.closePath(); ctx.fillStyle = COL.emerald; ctx.fill(); ctx.strokeStyle = COL.emeraldDark; ctx.lineWidth = 3; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,-40); ctx.lineTo(-20,-10); ctx.lineTo(0,-20); ctx.closePath(); ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill();
        ctx.restore();
        drawCard("보석 세공", ["터치로 커팅 각도 조절 후 탭으로 깎기","클리어: 보석 5개를 세공하면 클리어","실패: 시간 초과 또는 실수 3회 시 실패"], COL.emerald);
        ctx.restore(); return;
      }
      if (mode === "running") {
        ctx.beginPath(); ctx.arc(W/2,H/2+20,150,0,Math.PI*2); ctx.fillStyle = "#e8e0d4"; ctx.fill(); ctx.strokeStyle = "#d0c8b8"; ctx.lineWidth = 2; ctx.stroke();
        if (currentGem && gemCompleteAnim <= 0) drawGem(W/2, H/2+20, currentGem);
        if (gemCompleteAnim > 0 && currentGem) {
          const sc = 1+(1-gemCompleteAnim/1.2)*0.3; ctx.save(); ctx.translate(W/2,H/2+20); ctx.scale(sc,sc); ctx.globalAlpha = gemCompleteAnim/1.2;
          ctx.beginPath(); for (let i=0;i<currentGem.cutAngles.length;i++) { const a=currentGem.cutAngles[i],x=Math.cos(a)*90,y=Math.sin(a)*90; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
          ctx.closePath(); ctx.fillStyle = currentGem.color.fill; ctx.fill(); ctx.strokeStyle = currentGem.color.stroke; ctx.lineWidth = 3; ctx.stroke();
          ctx.globalAlpha = 1; ctx.restore();
          ctx.textAlign = "center"; ctx.fillStyle = COL.emerald; ctx.font = "bold 20px 'Trebuchet MS',sans-serif";
          ctx.globalAlpha = gemCompleteAnim/1.2; ctx.fillText("\uc644\uc131!", W/2, H/2-90); ctx.globalAlpha = 1;
        }
        for (const p of particles) { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
        for (const s of sparkles) { ctx.globalAlpha = s.life; ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2); ctx.fill(); ctx.fillStyle = COL.gold; ctx.beginPath(); ctx.arc(s.x,s.y,s.size*s.life*0.5,0,Math.PI*2); ctx.fill(); }
        ctx.globalAlpha = 1;
        if (cutFeedback > 0) { ctx.fillStyle = cutSuccess ? `rgba(45,157,110,${cutFeedback/0.4*0.3})` : `rgba(196,64,64,${cutFeedback/0.4*0.3})`; ctx.fillRect(0,0,W,H); }
        drawHUD(); ctx.restore(); return;
      }
      if (mode === "failed") { drawCard("\uc2e4\ud328", [mistakes>=MAX_MISTAKES?"\uc2e4\uc218 3\ud68c \ucd08\uacfc":"\uc2dc\uac04 \ucd08\uacfc", `\uc644\uc131: ${gemsCompleted}\uac1c \xb7 \uc2dc\uac04: ${lastRunTime.toFixed(1)}\ucd08`], COL.fail); ctx.restore(); return; }
      if (mode === "cleared") {
        const sx = W/2-(TARGET_GEMS-1)*40;
        for (let i=0;i<TARGET_GEMS;i++) { const gc=GEM_COLORS[i%GEM_COLORS.length]; ctx.beginPath(); const n=5+i; for (let j=0;j<n;j++) { const a=-Math.PI/2+(Math.PI*2/n)*j,r=20,gx=sx+i*80,gy=H/2-60; j===0?ctx.moveTo(gx+Math.cos(a)*r,gy+Math.sin(a)*r):ctx.lineTo(gx+Math.cos(a)*r,gy+Math.sin(a)*r); } ctx.closePath(); ctx.fillStyle=gc.fill; ctx.fill(); ctx.strokeStyle=gc.stroke; ctx.lineWidth=2; ctx.stroke(); }
        drawCard("\uc138\uacf5 \uc644\ub8cc!", [`\ubcf4\uc11d ${TARGET_GEMS}\uac1c \uc644\uc131`, `\uc2dc\uac04: ${lastRunTime.toFixed(1)}\ucd08`], COL.clear); ctx.restore(); return;
      }
      ctx.restore();
    }

    function frame(ts) { const dt = lastTs ? Math.min((ts-lastTs)/1000, MAX_DT) : FIXED_DT; lastTs = ts; update(dt); render(); animFrame = requestAnimationFrame(frame); }
    function renderGameToText() { return JSON.stringify({ mode, elapsed: Math.round(elapsed*10)/10, gemsCompleted, mistakes, currentGemCuts: currentGem ? `${currentGem.cutIndex}/${currentGem.sides}` : null, timeLeft: Math.max(0, Math.round((TIME_LIMIT-elapsed)*10)/10), result: window.relayStageResult.status }); }

    window.render_game_to_text = renderGameToText;
    window.advanceTime = (ms=16.67) => { const steps = Math.max(1, Math.round(ms/(FIXED_DT*1000))); for (let i=0;i<steps;i++) update(FIXED_DT); render(); return renderGameToText(); };
    window.relayStageMeta = { id:"gem-cut", title:"보석 세공", creator:"jungcollin", genre:"Angle cutting", clearCondition:"보석 5개를 세공하면 클리어" };
    window.relayStageResult = { status: "running" };
    window.relayStageDebug = { forceClear() { startGame(); clearGame(); render(); }, forceFail() { startGame(); failGame("debug_force_fail"); render(); } };

    canvas.addEventListener("click", () => canvas.focus());
    window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
    reportReady(); render(); canvas.focus(); animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
