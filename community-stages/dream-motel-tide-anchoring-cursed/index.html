<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>꿈 포수</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Segoe UI", sans-serif;
        background: #2a1f38; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 140, 170, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(50, 30, 60, 0.92);
        color: #f0e8e0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #2a1f38; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 160, 180, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">꿈 포수. 떠다니는 좋은 꿈 조각을 탭하여 붙잡으세요. 마우스 클릭 또는 화면 터치로 꿈을 붙잡습니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 좋은 꿈 20개를 붙잡으면 클리어. 악몽 3개를 붙잡거나 꿈이 모두 흩어지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="꿈 포수" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "dream-motel-tide-anchoring-cursed",
        title: "꿈 포수",
        description: "잠든 마음속을 떠다니는 꿈 조각을 탭하여 붙잡으세요. 악몽을 피하세요.",
        creator: "jungcollin",
        genre: "Tap catcher",
        clearCondition: "좋은 꿈 20개를 붙잡으면 클리어",
        failCondition: "악몽 3개를 붙잡거나 꿈이 모두 흩어지면 실패",
        controls: "마우스 클릭 또는 터치로 떠다니는 꿈 조각을 탭하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#2a1f38",
        bgDeep: "#1a1228",
        purple: "#9878b8",
        purpleLight: "rgba(152, 120, 184, 0.3)",
        peach: "#e8b898",
        peachLight: "rgba(232, 184, 152, 0.3)",
        cream: "#f0e8d8",
        creamLight: "rgba(240, 232, 216, 0.15)",
        nightmare: "#5828a0",
        nightmareGlow: "rgba(88, 40, 160, 0.4)",
        damage: "#a03050",
        text: "#f0e8e0",
        textDim: "rgba(240, 232, 224, 0.5)",
      };

      // Dream shapes
      const DREAM_SHAPES = ["circle", "star", "cloud", "heart"];
      const DREAM_COLORS = [COL.peach, COL.cream, "#c8a0d0", "#a0c8d8", "#d8c8a0"];

      // --- State ---
      const DURATION = 50;
      const TARGET = 20;
      const MAX_NIGHTMARES = 3;

      let mode = "menu";
      let elapsed = 0;
      let anchored = 0;
      let nightmaresCaught = 0;
      let corruption = 0; // 0-1 visual corruption
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;
      let shake = 0;

      let dreams = [];
      let particles = [];
      let bgBubbles = [];
      let spawnTimer = 0;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawning ---
      function spawnDream(isNightmare) {
        const side = Math.random() < 0.5 ? -1 : 1;
        const shape = DREAM_SHAPES[Math.floor(Math.random() * DREAM_SHAPES.length)];
        const color = isNightmare ? COL.nightmare : DREAM_COLORS[Math.floor(Math.random() * DREAM_COLORS.length)];
        const speed = rand(30, 70);

        dreams.push({
          x: side < 0 ? -30 : W + 30,
          y: rand(80, H - 80),
          vx: -side * speed,
          vy: rand(-15, 15),
          r: rand(18, 28),
          shape,
          color,
          isNightmare,
          alpha: 0,
          age: 0,
          fadeLife: rand(5, 9),
          wobble: rand(0, Math.PI * 2),
          wobbleAmp: rand(20, 40),
          rotation: rand(0, Math.PI * 2),
          rotSpeed: rand(-1, 1),
        });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(30, 90);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color,
            size: rand(2, 5),
          });
        }
      }

      function initBubbles() {
        bgBubbles = [];
        if (reducedMotion) return;
        for (let i = 0; i < 15; i++) {
          bgBubbles.push({
            x: rand(0, W), y: rand(0, H),
            r: rand(20, 60),
            drift: rand(0.1, 0.3),
            phase: rand(0, Math.PI * 2),
            alpha: rand(0.02, 0.06),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; anchored = 0; nightmaresCaught = 0;
        corruption = 0; clearAnim = 0; shake = 0;
        dreams = []; particles = [];
        spawnTimer = 0.8;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        initBubbles();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Spawn dreams
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          const nightmareChance = lerp(0.15, 0.35, progress());
          const isNightmare = Math.random() < nightmareChance;
          spawnDream(isNightmare);
          if (progress() > 0.4 && Math.random() < 0.3) spawnDream(false);
          spawnTimer = lerp(1.4, 0.7, progress());
        }

        // Update dreams
        for (let i = dreams.length - 1; i >= 0; i--) {
          const d = dreams[i];
          d.age += dt;
          d.wobble += dt * 1.5;
          d.rotation += d.rotSpeed * dt;

          // Fade in/out
          if (d.age < 0.5) d.alpha = d.age * 2;
          else if (d.age > d.fadeLife - 1) d.alpha = clamp((d.fadeLife - d.age), 0, 1);
          else d.alpha = 1;

          // Movement with wobble
          d.x += d.vx * dt;
          d.y += d.vy * dt + Math.sin(d.wobble) * d.wobbleAmp * dt;

          // Remove if faded or off screen
          if (d.age >= d.fadeLife || d.x < -60 || d.x > W + 60) {
            dreams.splice(i, 1);
          }
        }

        // Corruption visual
        corruption = clamp(nightmaresCaught / MAX_NIGHTMARES, 0, 1);

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.95; p.vy *= 0.95;
          p.life -= dt * 2.5;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Background bubbles
        for (const b of bgBubbles) {
          b.phase += b.drift * dt;
          b.y -= 5 * dt;
          if (b.y < -b.r) { b.y = H + b.r; b.x = rand(0, W); }
        }

        // Shake decay
        shake *= 0.9;
        if (shake < 0.3) shake = 0;

        // Win/lose
        if (anchored >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (nightmaresCaught >= MAX_NIGHTMARES) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("악몽 침투");
        } else if (elapsed >= DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();

        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background gradient
        const grad = ctx.createRadialGradient(CX, CY, 50, CX, CY, 500);
        grad.addColorStop(0, "#3a2848");
        grad.addColorStop(0.5, "#2a1f38");
        grad.addColorStop(1, "#1a1228");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Corruption tint
        if (corruption > 0) {
          ctx.fillStyle = `rgba(60, 20, 80, ${corruption * 0.2})`;
          ctx.fillRect(0, 0, W, H);
        }

        // Background bubbles
        drawBubbles();

        // Dreams
        drawDreams();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBubbles() {
        for (const b of bgBubbles) {
          const pulse = Math.sin(b.phase) * 0.3 + 0.7;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.r * pulse, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(152, 120, 184, ${b.alpha})`;
          ctx.fill();
        }
      }

      function drawShape(x, y, r, shape, rotation) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);

        switch (shape) {
          case "circle":
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fill();
            break;
          case "star": {
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
              const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
              const outerX = Math.cos(angle) * r;
              const outerY = Math.sin(angle) * r;
              const innerAngle = angle + Math.PI / 5;
              const innerX = Math.cos(innerAngle) * r * 0.4;
              const innerY = Math.sin(innerAngle) * r * 0.4;
              if (i === 0) ctx.moveTo(outerX, outerY);
              else ctx.lineTo(outerX, outerY);
              ctx.lineTo(innerX, innerY);
            }
            ctx.closePath();
            ctx.fill();
            break;
          }
          case "cloud":
            ctx.beginPath();
            ctx.arc(-r * 0.3, 0, r * 0.6, 0, Math.PI * 2);
            ctx.arc(r * 0.3, 0, r * 0.6, 0, Math.PI * 2);
            ctx.arc(0, -r * 0.3, r * 0.55, 0, Math.PI * 2);
            ctx.fill();
            break;
          case "heart": {
            const s = r * 0.06;
            ctx.beginPath();
            ctx.moveTo(0, r * 0.35);
            ctx.bezierCurveTo(-r, -r * 0.3, -r * 0.5, -r, 0, -r * 0.4);
            ctx.bezierCurveTo(r * 0.5, -r, r, -r * 0.3, 0, r * 0.35);
            ctx.fill();
            break;
          }
        }
        ctx.restore();
      }

      function drawDreams() {
        for (const d of dreams) {
          ctx.save();
          ctx.globalAlpha = d.alpha * 0.8;

          if (d.isNightmare) {
            // Nightmare glow
            const glow = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r + 10);
            glow.addColorStop(0, COL.nightmareGlow);
            glow.addColorStop(1, "rgba(88, 40, 160, 0)");
            ctx.fillStyle = glow;
            ctx.fillRect(d.x - d.r - 10, d.y - d.r - 10, (d.r + 10) * 2, (d.r + 10) * 2);
          } else {
            // Good dream glow
            const glow = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r + 8);
            glow.addColorStop(0, `rgba(240, 232, 216, 0.15)`);
            glow.addColorStop(1, "rgba(240, 232, 216, 0)");
            ctx.fillStyle = glow;
            ctx.fillRect(d.x - d.r - 8, d.y - d.r - 8, (d.r + 8) * 2, (d.r + 8) * 2);
          }

          // Shape
          ctx.fillStyle = d.color;
          drawShape(d.x, d.y, d.r, d.shape, d.rotation);

          // Nightmare: add small warning marks
          if (d.isNightmare) {
            ctx.globalAlpha = d.alpha * 0.5;
            ctx.fillStyle = "#a060e0";
            // Jagged edges
            for (let i = 0; i < 4; i++) {
              const angle = (i / 4) * Math.PI * 2 + d.rotation;
              const sx = d.x + Math.cos(angle) * (d.r + 4);
              const sy = d.y + Math.sin(angle) * (d.r + 4);
              ctx.beginPath();
              ctx.arc(sx, sy, 2, 0, Math.PI * 2);
              ctx.fill();
            }
          }

          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life * 0.8;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px "Noto Sans KR", sans-serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${anchored} / ${TARGET}`, 24, 20);

        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(timeLeft)}`, W - 24, 20);

        // Nightmare indicators (bottom center)
        const dotY = H - 24;
        for (let i = 0; i < MAX_NIGHTMARES; i++) {
          const dotX = CX - (MAX_NIGHTMARES - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_NIGHTMARES - nightmaresCaught ? COL.peach : "rgba(60, 30, 50, 0.3)";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(40, 28, 55, 0.93)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.peach;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = `bold 22px "Noto Sans KR", sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = `400 14px "Noto Sans KR", sans-serif`;
        ctx.fillStyle = COL.textDim;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(240, 232, 224, 0.35)";
        ctx.font = `400 13px "Noto Sans KR", sans-serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(20, 14, 30, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("꿈 포수", [
          "떠다니는 꿈 조각을 탭하여 붙잡으세요",
          "악몽 조각은 비슷하지만 어둡습니다",
          "",
          "조작: 탭하여 꿈 붙잡기",
          "클리어: 좋은 꿈 20개 붙잡기",
          "실패: 악몽 3개 붙잡기",
        ], COL.peach);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(20, 14, 30, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("단꿈", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `붙잡은 꿈: ${anchored}개`,
          ], COL.peach);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(40, 15, 30, 0.4)";
        ctx.fillRect(0, 0, W, H);
        drawCard("악몽", [
          elapsed >= DURATION ? "꿈이 모두 흩어졌습니다" : "악몽에 잠식되었습니다",
          `붙잡은 꿈: ${anchored} / ${TARGET}`,
        ], COL.damage);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      function handleTap(cx, cy) {
        // Check if tap hits any dream (newest first for z-order)
        for (let i = dreams.length - 1; i >= 0; i--) {
          const d = dreams[i];
          if (d.alpha < 0.2) continue;
          if (dist(cx, cy, d.x, d.y) < d.r + 10) {
            if (d.isNightmare) {
              nightmaresCaught++;
              shake = 6;
              spawnParticles(d.x, d.y, reducedMotion ? 3 : 8, COL.nightmare);
            } else {
              anchored++;
              spawnParticles(d.x, d.y, reducedMotion ? 4 : 10, d.color);
            }
            dreams.splice(i, 1);
            return;
          }
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        handleTap(p.x, p.y);
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          anchored, nightmaresCaught, corruption: +corruption.toFixed(2),
          result: window.relayStageResult.status,
          dreams: dreams.length,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          anchored = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          nightmaresCaught = MAX_NIGHTMARES;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      initBubbles();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
