<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biomech Theater: Tide Anchor</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        background:
          radial-gradient(circle at top, #1c2948 0%, rgba(28, 41, 72, 0.2) 36%, transparent 58%),
          linear-gradient(180deg, #05070f 0%, #0b1020 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(165, 180, 252, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(10, 15, 31, 0.94);
        color: #eef2ff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.16s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(244, 244, 245, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Biomech Theater: Tide Anchor. 캔버스를 터치하거나 Enter로 시작하세요.
      기본 조작은 포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수,
      같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능
      입니다. 클리어 조건은 동기화 문을 모두 맞춘 뒤 조류 6파를 넘기며 발전기를 지키면
      클리어, 실패 조건은 동기화 창을 여러 번 놓치거나 중요 화물이 유실되면 즉시 실패
      입니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Biomech Theater: Tide Anchor"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TOTAL_WAVES = 6;
      const MISS_LIMIT = 4;
      const ANCHOR_HOLD = 0.54;
      const ANCHOR_REDEPLOY = 0.08;
      const GENERATOR = { x: VIEW.width * 0.5, y: VIEW.height - 84 };
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext =
        window.RelayRuntime?.readContext("biomech-theater-tide-anchoring-sync") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };
      const STAGE_COPY = {
        title: "Biomech Theater: Tide Anchor",
        description:
          "예고선 위에 닻을 미리 꽂아 조류와 동기화 문을 같은 박자로 고정하세요.",
        controls:
          "포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능",
        clearCondition:
          "동기화 문을 모두 맞춘 뒤 조류 6파를 넘기며 발전기를 지키면 클리어",
        failCondition:
          "동기화 창을 여러 번 놓치거나 중요 화물이 유실되면 즉시 실패",
      };
      const WAVE_BLUEPRINTS = [
        {
          accent: "#74f9ff",
          tempo: 88,
          drift: -1,
          cargo: { x: 204, y: 382 },
          gates: [
            { x: 308, y: 176 },
            { x: 628, y: 226 },
          ],
        },
        {
          accent: "#9f7cff",
          tempo: 94,
          drift: 1,
          cargo: { x: 754, y: 396 },
          gates: [
            { x: 676, y: 170 },
            { x: 370, y: 236 },
          ],
        },
        {
          accent: "#50f1d8",
          tempo: 100,
          drift: -1,
          cargo: { x: 484, y: 390 },
          gates: [
            { x: 266, y: 162 },
            { x: 734, y: 248 },
          ],
        },
        {
          accent: "#ff8bd9",
          tempo: 108,
          drift: 1,
          cargo: { x: 242, y: 404 },
          gates: [
            { x: 604, y: 188 },
            { x: 778, y: 266 },
          ],
        },
        {
          accent: "#5dd8ff",
          tempo: 116,
          drift: -1,
          cargo: { x: 734, y: 380 },
          gates: [
            { x: 354, y: 190 },
            { x: 542, y: 148 },
          ],
        },
        {
          accent: "#ffc878",
          tempo: 124,
          drift: 1,
          cargo: { x: 478, y: 402 },
          gates: [
            { x: 762, y: 196 },
            { x: 230, y: 228 },
          ],
        },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        waveIndex: 0,
        waveIntro: 0,
        locks: 0,
        misses: 0,
        aim: { x: VIEW.width * 0.5, y: VIEW.height * 0.58 },
        pointer: {
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.58,
          down: false,
          id: null,
          startX: 0,
          startY: 0,
          startTime: 0,
          swipeTriggered: false,
        },
        anchor: {
          active: false,
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.58,
          life: 0,
          cooldown: 0,
          pulse: 0,
          flash: 0,
        },
        waves: buildWaves(),
        popups: [],
        particles: [],
        shards: [],
        tideTime: 0,
        generatorGlow: 0.7,
        screenShake: 0,
        flash: 0,
        overlayPulse: 0,
        lastReason: "",
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function easeInOutSine(value) {
        return -(Math.cos(Math.PI * value) - 1) / 2;
      }

      function dist(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function rgba(hex, alpha) {
        const safe = String(hex || "#ffffff").replace("#", "");
        const full =
          safe.length === 3
            ? safe
                .split("")
                .map((char) => char + char)
                .join("")
            : safe.padEnd(6, "f");
        const red = parseInt(full.slice(0, 2), 16);
        const green = parseInt(full.slice(2, 4), 16);
        const blue = parseInt(full.slice(4, 6), 16);
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: clamp((event.clientX - rect.left) * scaleX, 0, VIEW.width),
          y: clamp((event.clientY - rect.top) * scaleY, 0, VIEW.height),
        };
      }

      function wavePulseTime(index) {
        return 1.58 - index * 0.04;
      }

      function gateStartTime(index) {
        return 3.02 - index * 0.03;
      }

      function gateGap(index) {
        return 0.82 - index * 0.05;
      }

      function gateWindow(index) {
        return Math.max(0.16, 0.22 - index * 0.012);
      }

      function buildWaves() {
        return WAVE_BLUEPRINTS.map((blueprint, index) => {
          const cargoTime = wavePulseTime(index);
          const gateA = gateStartTime(index);
          const gap = gateGap(index);
          const window = gateWindow(index);
          const wave = {
            index: index + 1,
            accent: blueprint.accent,
            tempo: blueprint.tempo,
            drift: blueprint.drift,
            duration: gateA + gap + 1.45,
            time: 0,
            gateLocked: false,
            resolved: false,
            cargoSecured: false,
            cargoLost: false,
            cargo: {
              x: blueprint.cargo.x,
              y: blueprint.cargo.y,
              bob: Math.random() * Math.PI * 2,
            },
            events: [
              {
                kind: "cargo",
                x: blueprint.cargo.x,
                y: blueprint.cargo.y,
                t: cargoTime,
                window: window + 0.05,
                radius: 44,
                status: "pending",
                label: "Cargo",
              },
              {
                kind: "gateA",
                x: blueprint.gates[0].x,
                y: blueprint.gates[0].y,
                t: gateA,
                window,
                radius: 38,
                status: "pending",
                label: "Sync I",
              },
              {
                kind: "gateB",
                x: blueprint.gates[1].x,
                y: blueprint.gates[1].y,
                t: gateA + gap,
                window,
                radius: 38,
                status: "pending",
                label: "Sync II",
              },
            ],
          };
          return wave;
        });
      }

      function activeWave() {
        return state.waves[state.waveIndex] || null;
      }

      function addPopup(text, x, y, color, size = 22) {
        state.popups.push({
          text,
          x,
          y,
          color,
          size,
          life: 1.1,
        });
      }

      function spawnParticles(x, y, color, amount, speed = 1) {
        const count = reduceMotion ? Math.max(4, Math.round(amount * 0.35)) : amount;
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.6;
          const force = (18 + Math.random() * 34) * speed;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * force,
            vy: Math.sin(angle) * force,
            life: 0.55 + Math.random() * 0.55,
            size: 2 + Math.random() * 5,
            color,
          });
        }
      }

      function spawnShards(x, y, color) {
        const count = reduceMotion ? 5 : 14;
        for (let index = 0; index < count; index += 1) {
          state.shards.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 220,
            vy: -40 - Math.random() * 180,
            rot: Math.random() * Math.PI * 2,
            vr: (Math.random() - 0.5) * 8,
            size: 8 + Math.random() * 12,
            life: 0.7 + Math.random() * 0.5,
            color,
          });
        }
      }

      function addShake(amount) {
        state.screenShake = Math.max(state.screenShake, amount);
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.waveIndex = 0;
        state.waveIntro = 1.2;
        state.locks = 0;
        state.misses = 0;
        state.anchor.active = false;
        state.anchor.life = 0;
        state.anchor.cooldown = 0;
        state.anchor.flash = 0;
        state.waves = buildWaves();
        state.popups = [];
        state.particles = [];
        state.shards = [];
        state.generatorGlow = 1;
        state.flash = 0.5;
        state.screenShake = 0;
        state.lastReason = "";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        addPopup("PREDICT THE TIDE", VIEW.width * 0.5, 106, "#c9fbff", 24);
      }

      function startStage() {
        if (state.mode === "running") {
          return;
        }
        resetRun();
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.anchor.active = false;
        state.flash = 0.95;
        addShake(18);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.anchor.active = false;
        state.flash = 0.6;
        state.generatorGlow = 1.3;
        addPopup("THEATER SYNCHRONIZED", VIEW.width * 0.5, 126, "#f9ffe8", 28);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function deployAnchor(x, y) {
        if (state.mode !== "running") {
          return;
        }
        if (state.anchor.cooldown > 0) {
          return;
        }
        state.anchor.active = true;
        state.anchor.x = x;
        state.anchor.y = y;
        state.anchor.life = ANCHOR_HOLD;
        state.anchor.pulse = 1;
        state.anchor.flash = 1;
        state.anchor.cooldown = ANCHOR_REDEPLOY;
        spawnParticles(x, y, "#a4ffef", 10, 0.8);
      }

      function recallAnchor(trigger = "manual") {
        if (!state.anchor.active) {
          return;
        }
        spawnParticles(state.anchor.x, state.anchor.y, "#ffffff", 8, 0.5);
        addPopup(trigger === "swipe" ? "RECALL" : "RESET", state.anchor.x, state.anchor.y - 18, "#d8e6ff", 16);
        state.anchor.active = false;
        state.anchor.life = 0;
        state.anchor.cooldown = Math.max(state.anchor.cooldown, 0.06);
      }

      function currentBeatFill(wave) {
        if (!wave) {
          return 0;
        }
        const beatDuration = 60 / wave.tempo;
        return (wave.time % beatDuration) / beatDuration;
      }

      function gateUnlocked(wave, kind) {
        if (kind === "gateA") {
          return true;
        }
        return wave.events[1].status === "hit";
      }

      function hitEvent(wave, event) {
        if (event.status !== "pending") {
          return;
        }
        event.status = "hit";
        state.generatorGlow = 1.25;
        state.flash = Math.max(state.flash, 0.22);
        addShake(event.kind === "cargo" ? 8 : 6);
        spawnParticles(event.x, event.y, wave.accent, event.kind === "cargo" ? 20 : 12, 1);
        if (event.kind === "cargo") {
          wave.cargoSecured = true;
          addPopup("ANCHOR HOLD", event.x, event.y - 52, "#c9fff4", 22);
        } else if (event.kind === "gateA") {
          addPopup("SYNC 1/2", event.x, event.y - 46, wave.accent, 20);
        } else if (event.kind === "gateB") {
          wave.gateLocked = true;
          state.locks += 1;
          addPopup("SYNC LOCK", VIEW.width * 0.5, 106, "#f7f2ff", 24);
          spawnParticles((wave.events[1].x + wave.events[2].x) * 0.5, 188, "#ffffff", 18, 1.1);
        }
        state.anchor.active = false;
        state.anchor.life = 0;
        state.anchor.cooldown = 0.05;
      }

      function updateWave(dt) {
        const wave = activeWave();
        if (!wave || state.mode !== "running") {
          return;
        }

        wave.time += dt;
        wave.cargo.bob += dt * 2.8;

        for (const event of wave.events) {
          if (event.status !== "pending") {
            continue;
          }
          const canHit = event.kind === "gateB" ? gateUnlocked(wave, event.kind) : true;
          if (
            canHit &&
            state.anchor.active &&
            Math.abs(wave.time - event.t) <= event.window &&
            dist(state.anchor.x, state.anchor.y, event.x, event.y) <= event.radius + 34
          ) {
            hitEvent(wave, event);
            continue;
          }
          if (wave.time > event.t + event.window) {
            if (event.kind === "cargo") {
              event.status = "missed";
              wave.cargoLost = true;
              spawnShards(event.x, event.y, "#ff6e86");
              addPopup("CARGO LOST", event.x, event.y - 40, "#ffb5bf", 24);
              failStage("cargo_lost");
              return;
            }
            if (event.kind === "gateA" || (event.kind === "gateB" && gateUnlocked(wave, event.kind))) {
              event.status = "missed";
            }
          }
        }

        if (wave.time >= wave.duration) {
          if (!wave.resolved) {
            wave.resolved = true;
            if (!wave.gateLocked) {
              state.misses += 1;
              state.flash = Math.max(state.flash, 0.48);
              addShake(12);
              addPopup("WINDOW LOST", VIEW.width * 0.5, 106, "#ffc0cb", 23);
              if (state.misses >= MISS_LIMIT) {
                failStage("sync_miss");
                return;
              }
            } else {
              addPopup(`WAVE ${wave.index} HELD`, VIEW.width * 0.5, 106, "#c9ffe8", 20);
            }
          }

          state.waveIndex += 1;
          if (state.waveIndex >= TOTAL_WAVES) {
            if (state.locks === TOTAL_WAVES) {
              clearStage();
            } else {
              failStage("unsynced_doors");
            }
            return;
          }
          state.waveIntro = 1.05;
          state.generatorGlow = 1.1;
          addPopup(`WAVE ${state.waveIndex + 1}`, VIEW.width * 0.5, 146, "#d9f8ff", 24);
        }
      }

      function updatePopups(dt) {
        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          popup.y -= dt * 30;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          particle.life -= dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }
        for (let index = state.shards.length - 1; index >= 0; index -= 1) {
          const shard = state.shards[index];
          shard.x += shard.vx * dt;
          shard.y += shard.vy * dt;
          shard.vy += 340 * dt;
          shard.rot += shard.vr * dt;
          shard.life -= dt;
          if (shard.life <= 0) {
            state.shards.splice(index, 1);
          }
        }
      }

      function update(dt) {
        state.overlayPulse += dt;
        state.tideTime += dt;
        state.generatorGlow = lerp(state.generatorGlow, state.mode === "running" ? 0.82 : 0.68, 0.05);
        state.flash = Math.max(0, state.flash - dt * 1.5);
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.anchor.cooldown = Math.max(0, state.anchor.cooldown - dt);
        state.anchor.pulse = Math.max(0, state.anchor.pulse - dt * 2.8);
        state.anchor.flash = Math.max(0, state.anchor.flash - dt * 4);
        state.waveIntro = Math.max(0, state.waveIntro - dt);
        state.aim.x = lerp(state.aim.x, state.pointer.x, 0.25);
        state.aim.y = lerp(state.aim.y, state.pointer.y, 0.25);

        if (state.anchor.active) {
          state.anchor.life -= dt;
          if (state.anchor.life <= 0) {
            state.anchor.active = false;
          }
        }

        if (state.mode === "running") {
          state.elapsed += dt;
          updateWave(dt);
        }

        updatePopups(dt);
        updateParticles(dt);

        if (!reduceMotion && state.mode === "running" && Math.random() < 0.25) {
          const wave = activeWave();
          state.particles.push({
            x: Math.random() * VIEW.width,
            y: VIEW.height - 120 + Math.sin(state.tideTime * 2 + Math.random() * 3) * 36,
            vx: wave ? wave.drift * (-18 - Math.random() * 28) : -18,
            vy: -8 - Math.random() * 14,
            life: 0.4 + Math.random() * 0.6,
            size: 1 + Math.random() * 3,
            color: wave ? rgba(wave.accent, 0.8) : "rgba(130, 226, 255, 0.75)",
          });
        }
      }

      function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle = null) {
        const safeRadius = Math.min(radius, width * 0.5, height * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + safeRadius, y);
        ctx.lineTo(x + width - safeRadius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + safeRadius);
        ctx.lineTo(x + width, y + height - safeRadius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - safeRadius, y + height);
        ctx.lineTo(x + safeRadius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - safeRadius);
        ctx.lineTo(x, y + safeRadius);
        ctx.quadraticCurveTo(x, y, x + safeRadius, y);
        ctx.closePath();
        if (fillStyle) {
          ctx.fillStyle = fillStyle;
          ctx.fill();
        }
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.stroke();
        }
      }

      function drawBackground(wave) {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#090b14");
        gradient.addColorStop(0.4, "#10162a");
        gradient.addColorStop(1, "#06070d");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const topGlow = ctx.createRadialGradient(
          VIEW.width * 0.5,
          84,
          12,
          VIEW.width * 0.5,
          84,
          380
        );
        topGlow.addColorStop(0, rgba(wave?.accent || "#79dbff", 0.28));
        topGlow.addColorStop(0.6, rgba(wave?.accent || "#79dbff", 0.06));
        topGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = topGlow;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 4; index += 1) {
          const x = index * 240 + Math.sin(state.tideTime * 0.4 + index * 0.7) * 14;
          const pillar = ctx.createLinearGradient(x, 0, x + 110, 0);
          pillar.addColorStop(0, "rgba(92, 108, 142, 0)");
          pillar.addColorStop(0.4, "rgba(92, 108, 142, 0.16)");
          pillar.addColorStop(0.7, "rgba(133, 149, 184, 0.08)");
          pillar.addColorStop(1, "rgba(92, 108, 142, 0)");
          ctx.fillStyle = pillar;
          ctx.fillRect(x, 0, 110, VIEW.height);
        }

        for (let index = 0; index < 5; index += 1) {
          const y = 110 + index * 62;
          ctx.strokeStyle = `rgba(186, 200, 228, ${0.04 + index * 0.01})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(72, y + Math.sin(state.tideTime * 0.5 + index) * 6);
          ctx.bezierCurveTo(260, y - 14, 640, y + 18, 888, y + Math.cos(state.tideTime * 0.7 + index) * 12);
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(6, 10, 18, 0.88)";
        ctx.fillRect(0, VIEW.height - 126, VIEW.width, 126);
      }

      function drawTheaterFrame(wave) {
        ctx.save();
        ctx.strokeStyle = "rgba(216, 226, 255, 0.13)";
        ctx.lineWidth = 2;
        drawRoundedRect(20, 20, VIEW.width - 40, VIEW.height - 40, 28, null, ctx.strokeStyle);

        for (let side = 0; side < 2; side += 1) {
          const dir = side === 0 ? 1 : -1;
          const baseX = side === 0 ? 0 : VIEW.width;
          const curtainGradient = ctx.createLinearGradient(baseX, 0, baseX + dir * 190, 0);
          curtainGradient.addColorStop(0, rgba(wave?.accent || "#7cdbff", 0.02));
          curtainGradient.addColorStop(0.45, rgba(side === 0 ? "#17223d" : "#2a1327", 0.82));
          curtainGradient.addColorStop(1, rgba("#05070d", 0.18));
          ctx.fillStyle = curtainGradient;
          ctx.beginPath();
          ctx.moveTo(baseX, 0);
          for (let step = 0; step <= 12; step += 1) {
            const y = (VIEW.height / 12) * step;
            const inward = 110 + Math.sin(state.tideTime * 1.4 + step * 0.5 + side) * 14;
            ctx.lineTo(baseX + dir * inward, y);
          }
          ctx.lineTo(baseX, VIEW.height);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      function drawTideForecast(wave) {
        if (!wave) {
          return;
        }
        const beat = currentBeatFill(wave);
        for (let index = 0; index < 3; index += 1) {
          const lineY = 360 + index * 24;
          const swing = Math.sin(state.tideTime * 1.2 + index * 0.7) * 18;
          ctx.strokeStyle = rgba(wave.accent, 0.12 + index * 0.05);
          ctx.lineWidth = 10 - index * 2;
          ctx.beginPath();
          const startX = wave.drift > 0 ? -120 : VIEW.width + 120;
          const endX = wave.drift > 0 ? VIEW.width + 90 : -90;
          const controlX = VIEW.width * 0.5 + wave.drift * (120 - index * 22);
          ctx.moveTo(startX, lineY + swing);
          ctx.quadraticCurveTo(controlX, lineY - 54 + index * 8, endX, lineY + 14);
          ctx.stroke();
        }

        ctx.fillStyle = rgba("#f8fafc", 0.08 + beat * 0.08);
        ctx.fillRect(0, VIEW.height - 130, VIEW.width, 3);
      }

      function drawEvent(wave, event) {
        const timeDelta = event.t - wave.time;
        const absDelta = Math.abs(timeDelta);
        const armed = event.kind !== "gateB" || gateUnlocked(wave, event.kind);
        const nearWindow = absDelta <= event.window;
        const pulse = clamp(1 - absDelta / 1.2, 0, 1);
        const baseColor =
          event.kind === "cargo"
            ? "#ffdc9d"
            : event.kind === "gateA"
              ? wave.accent
              : "#f5c8ff";
        const alpha = event.status === "hit" ? 0.9 : event.status === "missed" ? 0.2 : 0.3 + pulse * 0.5;
        ctx.save();
        ctx.translate(event.x, event.y);

        if (event.kind === "cargo") {
          const shield = ctx.createRadialGradient(0, 0, 6, 0, 0, 62);
          shield.addColorStop(0, rgba(baseColor, 0.28 + pulse * 0.2));
          shield.addColorStop(0.6, rgba(baseColor, 0.08));
          shield.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = shield;
          ctx.fillRect(-72, -72, 144, 144);
          drawRoundedRect(-34, -24, 68, 48, 14, rgba("#10131d", 0.94), rgba(baseColor, alpha));
          ctx.fillStyle = rgba("#f5e6ba", 0.95);
          ctx.fillRect(-18, -6, 36, 12);
          ctx.strokeStyle = rgba(baseColor, alpha);
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, 42 + pulse * 12, 0, Math.PI * 2);
          ctx.stroke();
          if (nearWindow) {
            ctx.strokeStyle = rgba("#ffffff", 0.85);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 24 + pulse * 8, 0, Math.PI * 2);
            ctx.stroke();
          }
        } else {
          ctx.rotate(state.tideTime * (event.kind === "gateA" ? 0.8 : -0.8));
          ctx.strokeStyle = rgba(baseColor, armed ? alpha : 0.12);
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(0, 0, 28 + pulse * 10, 0, Math.PI * 2);
          ctx.stroke();
          for (let spoke = 0; spoke < 4; spoke += 1) {
            ctx.save();
            ctx.rotate((Math.PI * 2 * spoke) / 4);
            drawRoundedRect(18, -5, 18, 10, 4, rgba(baseColor, armed ? 0.86 : 0.18));
            ctx.restore();
          }
          ctx.fillStyle = rgba("#0f1220", 0.96);
          ctx.beginPath();
          ctx.arc(0, 0, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = rgba("#ffffff", armed ? 0.92 : 0.3);
          ctx.font = "700 11px Avenir Next, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(event.kind === "gateA" ? "I" : "II", 0, 4);
        }

        ctx.restore();

        ctx.fillStyle = rgba("#dbe8ff", armed ? 0.9 : 0.36);
        ctx.font = "600 12px Avenir Next, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        const tag =
          event.status === "hit"
            ? "LOCKED"
            : event.status === "missed"
              ? "MISSED"
              : `${event.label} ${timeDelta > 0 ? `T-${timeDelta.toFixed(1)}` : "LIVE"}`;
        ctx.fillText(tag, event.x, event.y - (event.kind === "cargo" ? 54 : 44));
      }

      function drawGenerator(wave) {
        ctx.save();
        const pulse = 0.72 + Math.sin(state.tideTime * 3.4) * 0.08 + state.generatorGlow * 0.18;
        const core = ctx.createRadialGradient(
          GENERATOR.x,
          GENERATOR.y,
          10,
          GENERATOR.x,
          GENERATOR.y,
          90
        );
        core.addColorStop(0, rgba(wave?.accent || "#9cecff", 0.88));
        core.addColorStop(0.4, rgba("#d7fdff", 0.36));
        core.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(GENERATOR.x, GENERATOR.y, 90, 0, Math.PI * 2);
        ctx.fill();

        drawRoundedRect(
          GENERATOR.x - 74,
          GENERATOR.y - 34,
          148,
          62,
          26,
          "rgba(11, 16, 28, 0.96)",
          rgba("#c8d9ff", 0.18)
        );

        ctx.strokeStyle = rgba(wave?.accent || "#9cecff", 0.72);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(GENERATOR.x, GENERATOR.y - 3, 28 + pulse * 6, 0, Math.PI * 2);
        ctx.stroke();

        for (let spoke = 0; spoke < 6; spoke += 1) {
          const angle = state.tideTime * 0.8 + (Math.PI * 2 * spoke) / 6;
          ctx.strokeStyle = rgba("#edf7ff", 0.2 + spoke * 0.03);
          ctx.beginPath();
          ctx.moveTo(GENERATOR.x + Math.cos(angle) * 18, GENERATOR.y + Math.sin(angle) * 18);
          ctx.lineTo(GENERATOR.x + Math.cos(angle) * 46, GENERATOR.y + Math.sin(angle) * 46);
          ctx.stroke();
        }

        const waveEvents = wave ? [wave.events[0], wave.events[1], wave.events[2]] : [];
        for (const event of waveEvents) {
          if (!event || event.status === "missed") {
            continue;
          }
          ctx.strokeStyle = rgba(
            event.kind === "cargo" ? "#ffe49a" : wave.accent,
            event.status === "hit" ? 0.46 : 0.14
          );
          ctx.lineWidth = event.kind === "cargo" ? 3 : 2;
          ctx.beginPath();
          ctx.moveTo(GENERATOR.x, GENERATOR.y - 12);
          ctx.quadraticCurveTo(
            (GENERATOR.x + event.x) * 0.5,
            Math.min(GENERATOR.y - 140, event.y + 94),
            event.x,
            event.y
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawAnchor(wave) {
        if (state.anchor.active) {
          ctx.save();
          ctx.strokeStyle = rgba("#d5fff9", 0.86);
          ctx.lineWidth = 2.6;
          ctx.beginPath();
          ctx.moveTo(GENERATOR.x, GENERATOR.y - 8);
          ctx.quadraticCurveTo(
            (GENERATOR.x + state.anchor.x) * 0.5,
            Math.min(GENERATOR.y - 180, state.anchor.y - 40),
            state.anchor.x,
            state.anchor.y
          );
          ctx.stroke();

          const glow = ctx.createRadialGradient(
            state.anchor.x,
            state.anchor.y,
            2,
            state.anchor.x,
            state.anchor.y,
            48
          );
          glow.addColorStop(0, rgba("#ffffff", 0.9));
          glow.addColorStop(0.45, rgba(wave?.accent || "#7cecff", 0.36));
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(state.anchor.x - 54, state.anchor.y - 54, 108, 108);
          ctx.strokeStyle = rgba("#e7fff7", 0.94);
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(state.anchor.x, state.anchor.y, 14 + state.anchor.pulse * 16, 0, Math.PI * 2);
          ctx.stroke();
          for (let spoke = 0; spoke < 4; spoke += 1) {
            const angle = (Math.PI * 2 * spoke) / 4 + state.tideTime * 1.5;
            ctx.beginPath();
            ctx.moveTo(state.anchor.x + Math.cos(angle) * 20, state.anchor.y + Math.sin(angle) * 20);
            ctx.lineTo(state.anchor.x + Math.cos(angle) * 34, state.anchor.y + Math.sin(angle) * 34);
            ctx.stroke();
          }
          ctx.restore();
        }

        ctx.save();
        ctx.translate(state.aim.x, state.aim.y);
        ctx.strokeStyle = rgba("#ffffff", 0.82);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 16, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-28, 0);
        ctx.lineTo(-8, 0);
        ctx.moveTo(8, 0);
        ctx.lineTo(28, 0);
        ctx.moveTo(0, -28);
        ctx.lineTo(0, -8);
        ctx.moveTo(0, 8);
        ctx.lineTo(0, 28);
        ctx.stroke();
        ctx.fillStyle = rgba("#eaffff", 0.2);
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawHud(wave) {
        drawRoundedRect(22, 22, 242, 84, 22, "rgba(9, 13, 22, 0.72)", "rgba(216, 226, 255, 0.12)");
        ctx.fillStyle = "rgba(236, 241, 255, 0.88)";
        ctx.font = "700 14px Avenir Next, Segoe UI, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`WAVE ${Math.min(state.waveIndex + 1, TOTAL_WAVES)} / ${TOTAL_WAVES}`, 42, 50);
        ctx.fillText(`SYNC LOCK ${state.locks} / ${TOTAL_WAVES}`, 42, 74);
        ctx.fillStyle = state.misses >= MISS_LIMIT - 1 ? "#ffb3c4" : "rgba(236, 241, 255, 0.8)";
        ctx.fillText(`MISSED WINDOWS ${state.misses} / ${MISS_LIMIT}`, 42, 98);

        drawRoundedRect(
          VIEW.width - 286,
          22,
          264,
          84,
          22,
          "rgba(9, 13, 22, 0.72)",
          "rgba(216, 226, 255, 0.12)"
        );
        ctx.textAlign = "left";
        ctx.fillStyle = "rgba(236, 241, 255, 0.88)";
        ctx.fillText(`ANCHOR ${state.anchor.active ? "DEPLOYED" : state.anchor.cooldown > 0 ? "RECHARGE" : "READY"}`, VIEW.width - 266, 50);
        ctx.fillText(`RECALL SWIPE ${state.anchor.active ? "ONLINE" : "IDLE"}`, VIEW.width - 266, 74);
        ctx.fillText(
          wave ? `TEMPO ${wave.tempo} BPM` : "TEMPO STANDBY",
          VIEW.width - 266,
          98
        );

        drawRoundedRect(
          VIEW.width * 0.5 - 184,
          VIEW.height - 90,
          368,
          40,
          20,
          "rgba(10, 14, 24, 0.82)",
          rgba(wave?.accent || "#89e8ff", 0.2)
        );
        const barX = VIEW.width * 0.5 - 160;
        const barY = VIEW.height - 70;
        ctx.fillStyle = "rgba(96, 114, 148, 0.34)";
        ctx.fillRect(barX, barY, 320, 4);
        if (wave) {
          const points = [wave.events[0], wave.events[1], wave.events[2]];
          points.forEach((event, index) => {
            const offset = clamp(event.t / wave.duration, 0, 1);
            const x = barX + 320 * offset;
            ctx.fillStyle =
              event.kind === "cargo"
                ? "#ffd787"
                : event.kind === "gateA"
                  ? wave.accent
                  : "#f6c9ff";
            ctx.beginPath();
            ctx.arc(x, barY + 2, index === 0 ? 6 : 5, 0, Math.PI * 2);
            ctx.fill();
          });
          const cursor = barX + 320 * clamp(wave.time / wave.duration, 0, 1);
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(cursor - 1, barY - 8, 2, 20);
        }
      }

      function drawOverlayCard(title, subtitle, accent, actionLabel) {
        const cardWidth = 620;
        const cardHeight = 290;
        const cardX = VIEW.width * 0.5 - cardWidth * 0.5;
        const cardY = VIEW.height * 0.5 - cardHeight * 0.5;
        const glow = ctx.createLinearGradient(cardX, cardY, cardX + cardWidth, cardY + cardHeight);
        glow.addColorStop(0, rgba(accent, 0.18));
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = "rgba(4, 7, 14, 0.7)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.fillStyle = glow;
        ctx.fillRect(cardX - 10, cardY - 10, cardWidth + 20, cardHeight + 20);
        drawRoundedRect(cardX, cardY, cardWidth, cardHeight, 30, "rgba(8, 12, 24, 0.92)", rgba(accent, 0.36));
        ctx.fillStyle = rgba("#ffffff", 0.96);
        ctx.textAlign = "left";
        ctx.font = "800 36px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(title, cardX + 38, cardY + 58);
        ctx.font = "500 17px Avenir Next, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(231, 237, 255, 0.82)";
        wrapText(subtitle, cardX + 38, cardY + 92, 540, 28);

        ctx.font = "600 16px Avenir Next, Segoe UI, sans-serif";
        ctx.fillStyle = rgba(accent, 0.96);
        ctx.fillText(actionLabel, cardX + 38, cardY + cardHeight - 34);
      }

      function wrapText(text, x, y, width, lineHeight) {
        const words = String(text).split(/\s+/);
        let line = "";
        let lineY = y;
        for (const word of words) {
          const trial = line ? `${line} ${word}` : word;
          if (ctx.measureText(trial).width > width && line) {
            ctx.fillText(line, x, lineY);
            line = word;
            lineY += lineHeight;
          } else {
            line = trial;
          }
        }
        if (line) {
          ctx.fillText(line, x, lineY);
        }
      }

      function drawMenu() {
        drawOverlayCard(
          "Biomech Theater",
          "시간 조류 예고선을 읽고 닻을 미리 꽂아 화물과 동기화 문을 같은 박자로 고정하세요.",
          "#78f2ff",
          "터치/클릭/Enter로 시작"
        );
        drawRoundedRect(168, 330, 624, 132, 26, "rgba(10, 14, 24, 0.88)", "rgba(120, 242, 255, 0.2)");
        ctx.textAlign = "left";
        ctx.fillStyle = "rgba(235, 241, 255, 0.88)";
        ctx.font = "600 16px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(`조작  ${STAGE_COPY.controls}`, 194, 364);
        ctx.fillText(`클리어  ${STAGE_COPY.clearCondition}`, 194, 404);
        ctx.fillStyle = "rgba(255, 196, 208, 0.92)";
        ctx.fillText(`실패  ${STAGE_COPY.failCondition}`, 194, 444);
      }

      function failureCopy() {
        switch (state.lastReason) {
          case "cargo_lost":
            return "핵심 화물이 급류에 휩쓸렸습니다. 예고선보다 반 박자 빠르게 닻을 꽂으세요.";
          case "sync_miss":
            return "동기화 창을 너무 많이 놓쳤습니다. 첫 문과 둘째 문을 같은 박자로 이어서 묶어야 합니다.";
          default:
            return "발전기와 동기화 문이 어긋났습니다. 박자와 위치를 다시 읽어야 합니다.";
        }
      }

      function drawEndState() {
        if (state.mode === "failed") {
          drawOverlayCard(
            "Sync Collapse",
            failureCopy(),
            "#ff91ba",
            "터치/클릭/Enter로 재시작"
          );
        } else if (state.mode === "cleared") {
          drawOverlayCard(
            "Stage Cleared",
            "6파를 모두 넘기고 모든 동기화 문을 잠갔습니다. 바이오메크 극장이 정상 박동으로 복귀했습니다.",
            "#c7ff84",
            "터치/클릭/Enter로 다시 플레이"
          );
        }
      }

      function drawWaveIntro(wave) {
        if (!wave || state.waveIntro <= 0) {
          return;
        }
        const t = easeOutCubic(clamp(state.waveIntro / 1.05, 0, 1));
        ctx.save();
        ctx.globalAlpha = 0.15 + t * 0.7;
        ctx.textAlign = "center";
        ctx.fillStyle = rgba(wave.accent, 0.92);
        ctx.font = "800 40px Avenir Next, Segoe UI, sans-serif";
        ctx.fillText(`WAVE ${wave.index}`, VIEW.width * 0.5, 170 - (1 - t) * 18);
        ctx.font = "600 16px Avenir Next, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(232, 239, 255, 0.84)";
        ctx.fillText("Anchor cargo, then lock the twin sync doors.", VIEW.width * 0.5, 200 - (1 - t) * 12);
        ctx.restore();
      }

      function drawPopups() {
        for (const popup of state.popups) {
          const alpha = clamp(popup.life, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = `800 ${popup.size}px Avenir Next, Segoe UI, sans-serif`;
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {
          ctx.fillStyle = particle.color;
          ctx.globalAlpha = clamp(particle.life * 1.2, 0, 1);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        for (const shard of state.shards) {
          ctx.save();
          ctx.translate(shard.x, shard.y);
          ctx.rotate(shard.rot);
          ctx.globalAlpha = clamp(shard.life, 0, 1);
          drawRoundedRect(-shard.size * 0.5, -shard.size * 0.18, shard.size, shard.size * 0.36, 4, rgba(shard.color, 0.86));
          ctx.restore();
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const wave = activeWave();
        const shakeX = state.screenShake > 0 && !reduceMotion ? (Math.random() - 0.5) * state.screenShake : 0;
        const shakeY = state.screenShake > 0 && !reduceMotion ? (Math.random() - 0.5) * state.screenShake : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground(wave);
        drawTheaterFrame(wave);
        drawTideForecast(wave);

        if (wave) {
          drawEvent(wave, wave.events[0]);
          drawEvent(wave, wave.events[1]);
          drawEvent(wave, wave.events[2]);
        }

        drawGenerator(wave);
        drawAnchor(wave);
        drawParticles();
        drawHud(wave);
        drawWaveIntro(wave);
        drawPopups();

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndState();
        }

        if (state.flash > 0) {
          ctx.fillStyle =
            state.mode === "failed"
              ? `rgba(255, 80, 120, ${state.flash * 0.18})`
              : `rgba(255, 255, 255, ${state.flash * 0.16})`;
          ctx.fillRect(-40, -40, VIEW.width + 80, VIEW.height + 80);
        }
        ctx.restore();
      }

      function gameLoop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        let delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        delta = Math.min(MAX_DT, delta || FIXED_DT);
        update(delta);
        render();
        animationFrame = window.requestAnimationFrame(gameLoop);
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus();
        const point = canvasPoint(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        state.pointer.down = true;
        state.pointer.id = event.pointerId;
        state.pointer.startX = point.x;
        state.pointer.startY = point.y;
        state.pointer.startTime = performance.now();
        state.pointer.swipeTriggered = false;
        canvas.setPointerCapture?.(event.pointerId);

        if (state.mode !== "running") {
          startStage();
        }
      }

      function handlePointerMove(event) {
        const point = canvasPoint(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        if (
          state.mode === "running" &&
          state.pointer.down &&
          state.anchor.active &&
          !state.pointer.swipeTriggered
        ) {
          const moved = Math.hypot(point.x - state.pointer.startX, point.y - state.pointer.startY);
          const vertical = point.y - state.pointer.startY;
          if (moved > 92 || vertical > 56) {
            state.pointer.swipeTriggered = true;
            recallAnchor("swipe");
          }
        }
      }

      function handlePointerUp(event) {
        if (state.pointer.id !== null && event.pointerId !== state.pointer.id) {
          return;
        }
        const point = canvasPoint(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        const elapsed = performance.now() - state.pointer.startTime;
        const moved = Math.hypot(point.x - state.pointer.startX, point.y - state.pointer.startY);
        const tapped = elapsed < 300 && moved < 22;
        state.pointer.down = false;
        state.pointer.id = null;
        canvas.releasePointerCapture?.(event.pointerId);

        if (state.mode === "running" && tapped && !state.pointer.swipeTriggered) {
          deployAnchor(state.aim.x, state.aim.y);
        }
      }

      function handleKeyDown(event) {
        if (event.code === "Enter") {
          event.preventDefault();
          if (state.mode === "running") {
            deployAnchor(state.aim.x, state.aim.y);
          } else {
            startStage();
          }
        } else if (event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            deployAnchor(state.aim.x, state.aim.y);
          }
        } else if (event.code === "ShiftLeft" || event.code === "ShiftRight" || event.code === "KeyR") {
          event.preventDefault();
          recallAnchor("manual");
        }
      }

      function renderGameToText() {
        const wave = activeWave();
        const payload = {
          note: "origin=(0,0) top-left, +x right, +y down",
          mode: state.mode,
          wave: wave ? wave.index : TOTAL_WAVES,
          elapsed: Number(state.elapsed.toFixed(2)),
          misses: state.misses,
          locks: state.locks,
          aim: {
            x: Number(state.aim.x.toFixed(1)),
            y: Number(state.aim.y.toFixed(1)),
          },
          anchor: {
            active: state.anchor.active,
            x: Number(state.anchor.x.toFixed(1)),
            y: Number(state.anchor.y.toFixed(1)),
            life: Number(Math.max(0, state.anchor.life).toFixed(2)),
          },
          events: wave
            ? wave.events.map((event) => ({
                kind: event.kind,
                status: event.status,
                x: event.x,
                y: event.y,
                timeToBeat: Number((event.t - wave.time).toFixed(2)),
              }))
            : [],
          reason: state.lastReason || null,
        };
        return JSON.stringify(payload);
      }

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("pointerup", handlePointerUp);
      window.addEventListener("pointercancel", handlePointerUp);
      window.addEventListener("keydown", handleKeyDown);
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "biomech-theater-tide-anchoring-sync",
        title: "Biomech Theater: Tide Anchor",
        creator: "jungcollin",
        genre: "Prediction survival / 동기화 문",
        clearCondition: STAGE_COPY.clearCondition,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          state.locks = TOTAL_WAVES;
          clearStage();
        },
        forceFail() {
          failStage("debug_fail");
        },
      };

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
