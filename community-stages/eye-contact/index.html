<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>눈 맞춤</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #f0ece4; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 120, 80, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(50, 70, 40, 0.92);
        color: #f0ece4; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f0ece4; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(80, 120, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">눈 맞춤. 화면을 터치하여 움직이는 생물 위에 손가락을 올리고 계속 추적하세요. 모바일에서는 터치와 드래그로 생물을 따라갑니다. 누적 추적 20초 달성 시 클리어. 3번 놓치면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="눈 맞춤" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "eye-contact",
        title: "눈 맞춤",
        description: "움직이는 생물을 손가락으로 계속 추적하세요",
        creator: "jungcollin",
        genre: "Focus tracking",
        clearCondition: "누적 추적 20초 달성 시 클리어",
        failCondition: "3번 놓치면 실패",
        controls: "터치로 생물 추적",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#f0ece4", bgWarm: "#e8e0d4",
        creature: "#5a8a48", creatureDark: "#3a6a28",
        creatureEye: "#f0f0e8", creaturePupil: "#2a3a20",
        trail: "rgba(90,138,72,0.15)",
        amber: "#d4a030", amberLight: "rgba(212,160,48,0.3)",
        grass: "#b8cc90", grassDark: "#98ac70",
        flower1: "#e8a0a0", flower2: "#d0c080",
        text: "#3a4a2a", textLight: "rgba(58,74,42,0.6)",
        fail: "#c05040", ring: "rgba(90,138,72,0.4)",
      };

      const TARGET_TIME = 20;
      const MAX_MISSES = 3;
      const TRACK_RADIUS = 35;
      const CREATURE_R = 18;

      let mode = "menu";
      let elapsed = 0, trackedTime = 0, misses = 0;
      let lastTimestamp = 0, animFrame = 0;
      let shake = 0, clearAnim = 0;
      let hostFailedReported = false, hostClearedReported = false;

      // Creature state
      let cx = CX, cy = CY;
      let cvx = 0, cvy = 0;
      let cTargetX = CX, cTargetY = CY;
      let cWobble = 0, cBlink = 0, cBlinkTimer = 0;

      // Finger state
      let fingerDown = false, fingerX = 0, fingerY = 0;
      let isTracking = false;
      let trackLostTimer = 0;
      let trackGlowAlpha = 0;

      // Decoys (appear later)
      let decoys = [];
      let decoyTimer = 0;

      // Ambient
      let grassTufts = [];
      let flowers = [];
      let particles = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color, sizeRange) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), speed = rand(20, 80);
          particles.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed - 20, life: 1, color, size: rand(sizeRange[0], sizeRange[1]) });
        }
      }

      function initAmbient() {
        grassTufts = [];
        flowers = [];
        for (let i = 0; i < 30; i++) {
          grassTufts.push({ x: rand(10, W - 10), y: rand(10, H - 10), h: rand(6, 14), w: rand(2, 4) });
        }
        for (let i = 0; i < 8; i++) {
          flowers.push({ x: rand(30, W - 30), y: rand(30, H - 30), size: rand(4, 8),
            color: Math.random() > 0.5 ? COL.flower1 : COL.flower2 });
        }
      }

      function pickNewTarget() {
        const margin = 80;
        cTargetX = rand(margin, W - margin);
        cTargetY = rand(margin, H - margin);
      }

      function reset() {
        elapsed = 0; trackedTime = 0; misses = 0;
        shake = 0; clearAnim = 0;
        cx = CX; cy = CY; cvx = 0; cvy = 0;
        cWobble = 0; cBlink = 0; cBlinkTimer = rand(2, 4);
        fingerDown = false; isTracking = false; trackLostTimer = 0; trackGlowAlpha = 0;
        decoys = []; decoyTimer = 8;
        particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        pickNewTarget(); initAmbient();
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Creature AI - move toward target with wobbly motion
        const speed = lerp(60, 140, clamp(trackedTime / TARGET_TIME, 0, 1));
        const dx = cTargetX - cx, dy = cTargetY - cy;
        const d = Math.hypot(dx, dy) || 1;
        if (d < 30) pickNewTarget();

        const ax = (dx / d) * speed;
        const ay = (dy / d) * speed;
        cvx = lerp(cvx, ax, clamp(2 * dt, 0, 1));
        cvy = lerp(cvy, ay, clamp(2 * dt, 0, 1));
        cx += cvx * dt; cy += cvy * dt;
        cx = clamp(cx, 40, W - 40); cy = clamp(cy, 40, H - 40);
        cWobble += dt * 4;

        // Blink
        cBlinkTimer -= dt;
        if (cBlinkTimer <= 0) { cBlink = 0.15; cBlinkTimer = rand(2, 5); }
        if (cBlink > 0) cBlink -= dt;

        // Tracking check
        if (fingerDown) {
          const fingerDist = dist(fingerX, fingerY, cx, cy);
          if (fingerDist <= TRACK_RADIUS) {
            if (!isTracking) { isTracking = true; trackLostTimer = 0; }
            trackedTime += dt;
            trackGlowAlpha = lerp(trackGlowAlpha, 0.6, clamp(4 * dt, 0, 1));
          } else {
            if (isTracking) {
              trackLostTimer += dt;
              if (trackLostTimer > 0.5) {
                isTracking = false;
                misses++;
                shake = 5;
                spawnParticles(cx, cy, reducedMotion ? 3 : 8, COL.fail, [2, 5]);
                if (misses >= MAX_MISSES) {
                  mode = "failed";
                  window.relayStageResult.status = "failed";
                  reportFailed("추적 실패");
                  return;
                }
              }
            }
            trackGlowAlpha = lerp(trackGlowAlpha, 0, clamp(6 * dt, 0, 1));
          }
        } else {
          if (isTracking) {
            trackLostTimer += dt;
            if (trackLostTimer > 0.3) {
              isTracking = false;
              misses++;
              shake = 5;
              spawnParticles(cx, cy, reducedMotion ? 3 : 8, COL.fail, [2, 5]);
              if (misses >= MAX_MISSES) {
                mode = "failed";
                window.relayStageResult.status = "failed";
                reportFailed("추적 실패");
                return;
              }
            }
          }
          trackGlowAlpha = lerp(trackGlowAlpha, 0, clamp(6 * dt, 0, 1));
        }

        // Decoys
        decoyTimer -= dt;
        if (decoyTimer <= 0 && decoys.length < 3 && trackedTime > 5) {
          decoys.push({
            x: rand(80, W - 80), y: rand(80, H - 80),
            tx: rand(80, W - 80), ty: rand(80, H - 80),
            speed: rand(50, 90), wobble: rand(0, Math.PI * 2),
          });
          decoyTimer = rand(6, 10);
        }
        for (const dec of decoys) {
          const ddx = dec.tx - dec.x, ddy = dec.ty - dec.y;
          const dd = Math.hypot(ddx, ddy) || 1;
          if (dd < 20) { dec.tx = rand(80, W - 80); dec.ty = rand(80, H - 80); }
          dec.x += (ddx / dd) * dec.speed * dt;
          dec.y += (ddy / dd) * dec.speed * dt;
          dec.wobble += dt * 3;
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 60 * dt; p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;

        // Win check
        if (trackedTime >= TARGET_TIME) {
          mode = "clear"; clearAnim = 0;
          spawnParticles(cx, cy, reducedMotion ? 5 : 15, COL.amber, [3, 7]);
          window.relayStageResult.status = "cleared";
          reportCleared();
        }
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background
        const bgGrad = ctx.createRadialGradient(CX, CY, 100, CX, CY, 500);
        bgGrad.addColorStop(0, COL.bg); bgGrad.addColorStop(1, COL.bgWarm);
        ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

        // Grass tufts
        for (const g of grassTufts) {
          ctx.fillStyle = COL.grass;
          ctx.fillRect(g.x, g.y, g.w, g.h);
          ctx.fillStyle = COL.grassDark;
          ctx.fillRect(g.x, g.y + g.h - 2, g.w, 2);
        }

        // Flowers
        for (const f of flowers) {
          ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
          ctx.fillStyle = f.color; ctx.fill();
          ctx.beginPath(); ctx.arc(f.x, f.y, f.size * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = COL.flower2; ctx.fill();
        }

        // Tracking glow
        if (trackGlowAlpha > 0.02 && !reducedMotion) {
          ctx.beginPath(); ctx.arc(cx, cy, TRACK_RADIUS + 8, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(212,160,48,${trackGlowAlpha * 0.25})`; ctx.fill();
        }

        // Tracking ring
        if (isTracking || fingerDown) {
          ctx.beginPath(); ctx.arc(cx, cy, TRACK_RADIUS, 0, Math.PI * 2);
          ctx.strokeStyle = isTracking ? COL.amber : COL.ring;
          ctx.lineWidth = isTracking ? 3 : 1.5;
          ctx.setLineDash(isTracking ? [] : [4, 4]);
          ctx.stroke(); ctx.setLineDash([]);
        }

        // Decoys (smaller, slightly transparent)
        for (const dec of decoys) {
          ctx.save(); ctx.globalAlpha = 0.5;
          const wobX = Math.sin(dec.wobble) * 3;
          drawCreature(dec.x + wobX, dec.y, 12, false);
          ctx.globalAlpha = 1; ctx.restore();
        }

        // Main creature
        const wobbleX = Math.sin(cWobble) * 3;
        const wobbleY = Math.cos(cWobble * 0.7) * 2;
        drawCreature(cx + wobbleX, cy + wobbleY, CREATURE_R, true);

        // Finger indicator
        if (fingerDown && mode === "running") {
          ctx.beginPath(); ctx.arc(fingerX, fingerY, 6, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(200,170,120,0.3)"; ctx.fill();
        }

        // Particles
        for (const p of particles) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * clamp(p.life, 0, 1), 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fill(); ctx.globalAlpha = 1;
        }

        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawCreature(x, y, r, isMain) {
        // Body
        ctx.beginPath(); ctx.ellipse(x, y, r, r * 0.8, 0, 0, Math.PI * 2);
        ctx.fillStyle = isMain ? COL.creature : COL.grassDark; ctx.fill();

        // Belly
        ctx.beginPath(); ctx.ellipse(x, y + r * 0.15, r * 0.6, r * 0.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = isMain ? "#7aaa60" : "#a8bc88"; ctx.fill();

        // Eyes
        if (isMain) {
          const eyeY = y - r * 0.2;
          const eyeSpread = r * 0.35;
          const blinkH = cBlink > 0 ? 0.5 : r * 0.35;

          // Left eye
          ctx.beginPath(); ctx.ellipse(x - eyeSpread, eyeY, r * 0.2, blinkH, 0, 0, Math.PI * 2);
          ctx.fillStyle = COL.creatureEye; ctx.fill();
          if (cBlink <= 0) {
            // Pupil follows finger
            let px = 0, py = 0;
            if (fingerDown) {
              const dx = fingerX - (x - eyeSpread), dy = fingerY - eyeY;
              const d = Math.hypot(dx, dy) || 1;
              px = (dx / d) * 2; py = (dy / d) * 1.5;
            }
            ctx.beginPath(); ctx.arc(x - eyeSpread + px, eyeY + py, r * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = COL.creaturePupil; ctx.fill();
          }

          // Right eye
          ctx.beginPath(); ctx.ellipse(x + eyeSpread, eyeY, r * 0.2, blinkH, 0, 0, Math.PI * 2);
          ctx.fillStyle = COL.creatureEye; ctx.fill();
          if (cBlink <= 0) {
            let px = 0, py = 0;
            if (fingerDown) {
              const dx = fingerX - (x + eyeSpread), dy = fingerY - eyeY;
              const d = Math.hypot(dx, dy) || 1;
              px = (dx / d) * 2; py = (dy / d) * 1.5;
            }
            ctx.beginPath(); ctx.arc(x + eyeSpread + px, eyeY + py, r * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = COL.creaturePupil; ctx.fill();
          }

          // Smile
          ctx.beginPath();
          ctx.arc(x, y + r * 0.1, r * 0.25, 0.1, Math.PI - 0.1);
          ctx.strokeStyle = COL.creatureDark; ctx.lineWidth = 1.5; ctx.stroke();
        }
      }

      function drawHUD() {
        // Tracked time progress bar
        const barW = 200, barH = 10;
        const barX = CX - barW / 2, barY = 20;
        ctx.fillStyle = "rgba(200,210,180,0.4)"; ctx.fillRect(barX, barY, barW, barH);
        const prog = clamp(trackedTime / TARGET_TIME, 0, 1);
        ctx.fillStyle = prog > 0.8 ? COL.amber : COL.creature;
        ctx.fillRect(barX, barY, barW * prog, barH);
        ctx.strokeStyle = "rgba(58,74,42,0.3)"; ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barW, barH);

        ctx.fillStyle = COL.text; ctx.font = "bold 13px Trebuchet MS, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(`${trackedTime.toFixed(1)}s / ${TARGET_TIME}s`, CX, 34);

        // Misses (top-right)
        ctx.textAlign = "right";
        ctx.fillStyle = misses > 0 ? COL.fail : COL.textLight;
        ctx.font = "bold 14px Trebuchet MS, sans-serif";
        ctx.fillText(`놓침: ${misses}/${MAX_MISSES}`, W - 20, 20);

        // Hint
        if (trackedTime < 2 && !fingerDown) {
          ctx.textAlign = "center";
          ctx.fillStyle = COL.textLight; ctx.font = "14px Trebuchet MS, sans-serif";
          ctx.fillText("생물 위에 손가락을 올리세요", CX, H - 40);
        }

        // Tracking status
        if (isTracking) {
          ctx.fillStyle = COL.amber; ctx.font = "bold 12px Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("추적 중!", CX, 52);
        }
      }

      function roundRect(c, x, y, w, h, r) {
        c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r);
        c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
      }
      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40), lineH = 26;
        const cardH = 48 + lines.length * lineH + 36;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(240,236,228,0.96)"; ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cardX + 14, cardY, cardW - 28, 3);
        ctx.fillStyle = COL.text; ctx.font = "bold 24px Trebuchet MS, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cardY + 18);
        ctx.font = "400 14px Trebuchet MS, sans-serif"; ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 52 + i * lineH);
        ctx.fillStyle = "rgba(58,74,42,0.35)"; ctx.font = "400 13px Trebuchet MS, sans-serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(240,236,228,0.5)"; ctx.fillRect(0, 0, W, H);
        drawCard("눈 맞춤", [
          "움직이는 생물을 터치로 추적하세요",
          "",
          "조작: 터치 드래그로 생물 따라가기",
          "클리어: 누적 추적 20초 달성",
          "실패: 3번 놓치면 실패",
        ], COL.creature);
      }
      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(240,236,228,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 완료`, "마음이 통했어요!"], COL.creature);
      }
      function drawFailed() {
        ctx.fillStyle = "rgba(100,60,40,0.2)"; ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["추적을 너무 많이 놓쳤습니다", `추적 시간: ${trackedTime.toFixed(1)}s`], COL.fail);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
      }
      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        fingerDown = true;
        const p = getCanvasPos(e.clientX, e.clientY);
        fingerX = p.x; fingerY = p.y;
        canvas.setPointerCapture(e.pointerId);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (!fingerDown || mode !== "running") return;
        const p = getCanvasPos(e.clientX, e.clientY);
        fingerX = p.x; fingerY = p.y;
      });
      canvas.addEventListener("pointerup", () => { fingerDown = false; });
      canvas.addEventListener("pointercancel", () => { fingerDown = false; });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), trackedTime: +trackedTime.toFixed(1), misses, isTracking, result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; trackedTime = TARGET_TIME; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; misses = MAX_MISSES; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      initAmbient(); reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
