<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>물고기 줄다리기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #B8D8E8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(30, 80, 120, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(20, 60, 90, 0.92);
        color: #F0F8FF; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #B8D8E8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(30, 80, 120, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">물고기 줄다리기. 화면을 터치하고 드래그하여 물고기 반대 방향으로 당기세요. 모바일에서는 화면 터치 드래그로 조종합니다. 물고기 5마리를 낚으면 클리어. 줄이 끊어지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="물고기 줄다리기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "fish-tug",
        title: "물고기 줄다리기",
        description: "물고기와 줄다리기로 낚아올리는 게임",
        creator: "jungcollin",
        genre: "Fishing tug-of-war",
        clearCondition: "물고기 5마리를 낚으면 클리어",
        failCondition: "줄이 끊어지면 실패",
        controls: "드래그로 낚싯대 조종",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      /* ── Colors ── */
      const COL = {
        sky: "#C8E6F0", skyTop: "#A0CCE0",
        water: "#4A90B8", waterDeep: "#2A6090", waterLight: "#6BB0D8",
        sand: "#E8D8B0", sandDark: "#C8B890",
        rod: "#8B6040", rodDark: "#6A4830",
        line: "#E8E8E8", lineTense: "#FF6040",
        fish: "#E88030", fishDark: "#C06820", fishLight: "#FFB060",
        bobber: "#E04040",
        text: "#1E3C5A", textLight: "rgba(30,60,90,0.6)",
        clear: "#2A8040", fail: "#B03020",
        accent: "#2068A0",
      };

      /* ── Constants ── */
      const DURATION = 45;
      const TARGET = 5;
      const TENSION_MAX = 100;
      const TENSION_BREAK = 95;
      const REEL_RATE = 30;
      const FISH_PULL = 20;
      const TENSION_DECAY = 15;
      const WATER_Y = H * 0.45;

      /* ── State ── */
      let mode = "menu", elapsed = 0, caught = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;
      let particles = [];

      /* Fish state */
      let fish = null;
      let tension = 0;
      let fishDist = 100; /* distance from shore, 0 = caught */
      let rodTipX = 200, rodTipY = WATER_Y - 60;
      let dragX = 0, dragY = 0, isDragging = false;
      let fishTimer = 0;
      let fishDir = 0; /* angle fish is pulling */
      let fishDirTimer = 0;
      let catchAnim = 0;
      let wavePhase = 0;

      /* ── Helpers ── */
      function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
      function lerp(a,b,t){ return a+(b-a)*t; }
      function rand(lo,hi){ return lo+Math.random()*(hi-lo); }

      /* ── Relay Host ── */
      function inRelayHost(){ try{ return window.parent&&window.parent!==window&&window.parent.RelayHost; }catch{ return false; } }
      function reportReady(){ if(inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason){
        if(!inRelayHost()||hostFailedReported) return; hostFailedReported=true;
        window.parent.RelayHost.onStageFailed?.({ stageId:META.id, stageTitle:META.title, reason, durationSec:+elapsed.toFixed(1) });
      }
      function reportCleared(){
        if(!inRelayHost()||hostClearedReported) return; hostClearedReported=true;
        window.parent.RelayHost.onStageCleared?.({ stageId:META.id, stageTitle:META.title, clearCountAfter:relayContext.clearCount+1, durationSec:+elapsed.toFixed(1) });
      }

      /* ── Particles ── */
      function spawnP(x,y,count,color,sz,spd){
        for(let i=0;i<count;i++){
          const a=rand(0,Math.PI*2),s=rand(spd[0],spd[1]);
          particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-rand(10,40), life:1, color, size:rand(sz[0],sz[1]), grav:rand(60,120) });
        }
      }

      function spawnSplash(x,y){
        const cc=["#FFFFFF","#C8E6F0","#6BB0D8"];
        for(let i=0;i<(reducedMotion?4:12);i++) spawnP(x+rand(-10,10),y,1,cc[i%3],[2,5],[40,100]);
      }

      /* ── Fish spawning ── */
      function spawnFish(){
        fishDist = 80 + rand(0, 30);
        fishDir = rand(-1, 1);
        fishDirTimer = rand(0.5, 1.5);
        tension = 20;
        fish = {
          x: CX + rand(-100, 200),
          y: WATER_Y + 40 + rand(20, 80),
          size: 18 + rand(0, 10),
          speed: FISH_PULL + caught * 4,
          wobble: 0,
        };
      }

      /* ── Reset ── */
      function reset(){
        elapsed=0; caught=0; tension=0; shake=0; clearAnim=0; catchAnim=0;
        particles=[]; fishTimer=1.5; fish=null; fishDist=100;
        isDragging=false; wavePhase=0;
        hostFailedReported=false; hostClearedReported=false;
        window.relayStageResult.status="running";
      }

      /* ── Update ── */
      function update(dt){
        if(mode!=="running") return;
        elapsed+=dt;
        wavePhase+=dt;

        /* fish spawning */
        if(!fish){
          fishTimer-=dt;
          if(fishTimer<=0) spawnFish();
        }

        /* fish behavior */
        if(fish){
          fish.wobble+=dt*4;
          fishDirTimer-=dt;
          if(fishDirTimer<=0){
            fishDir=rand(-1,1);
            fishDirTimer=rand(0.4,1.2);
          }

          /* fish pulls away */
          fishDist+=fish.speed*dt*0.5;

          /* dragging reels in */
          if(isDragging){
            const reelPower = REEL_RATE + caught * 3;
            fishDist-=reelPower*dt;
            tension+=((fish.speed+10)*dt*1.5);
          } else {
            tension-=TENSION_DECAY*dt;
          }

          tension=clamp(tension,0,TENSION_MAX);
          fishDist=clamp(fishDist,0,150);

          /* fish position */
          const fx = CX + 100 + fishDist * 2 + Math.sin(fish.wobble)*15;
          const fy = WATER_Y + 50 + Math.cos(fish.wobble*0.7)*10;
          fish.x = lerp(fish.x, fx, clamp(dt*3,0,1));
          fish.y = lerp(fish.y, fy, clamp(dt*3,0,1));

          /* caught! */
          if(fishDist<=0){
            caught++;
            catchAnim=1;
            spawnSplash(rodTipX+50, WATER_Y);
            fish=null;
            fishTimer=1.5;
            tension=0;
            if(caught>=TARGET){
              mode="clear"; clearAnim=0;
              window.relayStageResult.status="cleared"; reportCleared();
            }
          }

          /* line breaks */
          if(tension>=TENSION_BREAK){
            mode="failed"; shake=12;
            window.relayStageResult.status="failed"; reportFailed("줄이 끊어짐");
          }
        }

        /* particles */
        for(let i=particles.length-1;i>=0;i--){
          const p=particles[i];
          p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.grav*dt; p.life-=dt*2.5;
          if(p.life<=0) particles.splice(i,1);
        }

        /* catch anim */
        if(catchAnim>0){ catchAnim-=dt*2; if(catchAnim<0) catchAnim=0; }

        shake*=0.9; if(shake<0.3) shake=0;

        /* time out */
        if(elapsed>=DURATION){
          mode="failed"; shake=8;
          window.relayStageResult.status="failed"; reportFailed("시간 초과");
        }
      }

      /* ── Draw helpers ── */
      function rrect(c,x,y,w,h,r){
        c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
        c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
        c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
        c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
      }

      /* ── Draw ── */
      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0, sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);

        /* sky */
        const skyGrad=ctx.createLinearGradient(0,0,0,WATER_Y);
        skyGrad.addColorStop(0,COL.skyTop); skyGrad.addColorStop(1,COL.sky);
        ctx.fillStyle=skyGrad; ctx.fillRect(0,0,W,WATER_Y);

        /* clouds */
        if(!reducedMotion){
          ctx.globalAlpha=0.4;
          ctx.fillStyle="#FFFFFF";
          for(let i=0;i<3;i++){
            const cx2=((elapsed*15+i*350)%1200)-120, cy2=40+i*35;
            ctx.beginPath(); ctx.ellipse(cx2,cy2,60+i*10,18,0,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(cx2+30,cy2-8,35,14,0,0,Math.PI*2); ctx.fill();
          }
          ctx.globalAlpha=1;
        }

        /* water */
        const waterGrad=ctx.createLinearGradient(0,WATER_Y,0,H);
        waterGrad.addColorStop(0,COL.waterLight); waterGrad.addColorStop(0.4,COL.water); waterGrad.addColorStop(1,COL.waterDeep);
        ctx.fillStyle=waterGrad; ctx.fillRect(0,WATER_Y,W,H-WATER_Y);

        /* waves */
        ctx.strokeStyle="rgba(255,255,255,0.2)"; ctx.lineWidth=2;
        for(let w=0;w<3;w++){
          ctx.beginPath();
          for(let x=0;x<=W;x+=5){
            const wy=WATER_Y+w*25+Math.sin(x*0.02+wavePhase*2+w)*4;
            x===0?ctx.moveTo(x,wy):ctx.lineTo(x,wy);
          }
          ctx.stroke();
        }

        /* sand/shore */
        ctx.fillStyle=COL.sand;
        ctx.beginPath(); ctx.moveTo(0,WATER_Y-10);
        ctx.quadraticCurveTo(80,WATER_Y+15,0,WATER_Y+30);
        ctx.lineTo(0,WATER_Y-10); ctx.fill();

        /* rod */
        drawRod();

        /* fishing line */
        if(fish) drawLine();

        /* fish */
        if(fish) drawFish();

        /* bobber */
        if(fish){
          const bx=fish.x-fishDist*0.5, by=WATER_Y-2+Math.sin(wavePhase*3)*3;
          ctx.beginPath(); ctx.arc(bx,by,6,0,Math.PI*2);
          ctx.fillStyle=COL.bobber; ctx.fill();
          ctx.beginPath(); ctx.arc(bx,by,6,0,Math.PI*2);
          ctx.strokeStyle="#C03030"; ctx.lineWidth=1.5; ctx.stroke();
        }

        /* particles */
        for(const p of particles){
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);
          ctx.fillStyle=p.color; ctx.globalAlpha=clamp(p.life,0,1); ctx.fill(); ctx.globalAlpha=1;
        }

        /* tension meter */
        if(mode==="running") drawHUD();

        ctx.restore();

        if(mode==="menu") drawMenu();
        else if(mode==="clear") drawClear();
        else if(mode==="failed") drawFailed();
      }

      function drawRod(){
        const baseX=100, baseY=WATER_Y+10;
        rodTipX=200; rodTipY=WATER_Y-70;

        /* rod body */
        ctx.strokeStyle=COL.rod; ctx.lineWidth=5; ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(baseX,baseY); ctx.quadraticCurveTo(140,WATER_Y-30,rodTipX,rodTipY); ctx.stroke();
        ctx.strokeStyle=COL.rodDark; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(baseX,baseY); ctx.quadraticCurveTo(140,WATER_Y-30,rodTipX,rodTipY); ctx.stroke();

        /* reel */
        ctx.beginPath(); ctx.arc(baseX+20,baseY-5,8,0,Math.PI*2);
        ctx.fillStyle=COL.rodDark; ctx.fill();
        ctx.strokeStyle="#888"; ctx.lineWidth=1; ctx.stroke();
      }

      function drawLine(){
        const bx=fish.x-fishDist*0.5, by=WATER_Y-2+Math.sin(wavePhase*3)*3;
        const tensionRatio=tension/TENSION_MAX;
        ctx.strokeStyle=tensionRatio>0.7?COL.lineTense:COL.line;
        ctx.lineWidth=tensionRatio>0.7?2.5:1.5;
        ctx.beginPath(); ctx.moveTo(rodTipX,rodTipY);
        const midY=WATER_Y-30+tensionRatio*20;
        ctx.quadraticCurveTo((rodTipX+bx)/2,midY,bx,by);
        ctx.stroke();

        /* line to fish underwater */
        ctx.globalAlpha=0.5;
        ctx.strokeStyle=COL.line; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(fish.x,fish.y); ctx.stroke();
        ctx.globalAlpha=1;
      }

      function drawFish(){
        const f=fish;
        ctx.save();
        ctx.translate(f.x,f.y);
        const flip=fishDist>50?1:-1;
        ctx.scale(flip,1);

        /* body */
        ctx.beginPath();
        ctx.ellipse(0,0,f.size,f.size*0.5,0,0,Math.PI*2);
        const fg=ctx.createRadialGradient(-3,-3,0,0,0,f.size);
        fg.addColorStop(0,COL.fishLight); fg.addColorStop(0.6,COL.fish); fg.addColorStop(1,COL.fishDark);
        ctx.fillStyle=fg; ctx.fill();

        /* tail */
        ctx.beginPath();
        ctx.moveTo(-f.size,0);
        const tailWag=Math.sin(f.wobble*2)*5;
        ctx.lineTo(-f.size-12,tailWag-8);
        ctx.lineTo(-f.size-12,tailWag+8);
        ctx.closePath();
        ctx.fillStyle=COL.fish; ctx.fill();

        /* eye */
        ctx.beginPath(); ctx.arc(f.size*0.5,-2,3,0,Math.PI*2);
        ctx.fillStyle="#FFF"; ctx.fill();
        ctx.beginPath(); ctx.arc(f.size*0.5+1,-2,1.5,0,Math.PI*2);
        ctx.fillStyle="#222"; ctx.fill();

        /* fin */
        ctx.beginPath();
        ctx.moveTo(0,f.size*0.3);
        ctx.lineTo(-5,f.size*0.3+8);
        ctx.lineTo(5,f.size*0.3+6);
        ctx.closePath();
        ctx.fillStyle=COL.fishDark; ctx.globalAlpha=0.6; ctx.fill(); ctx.globalAlpha=1;

        ctx.restore();
      }

      function drawHUD(){
        /* caught count */
        ctx.fillStyle=COL.text; ctx.font='bold 18px "Segoe UI",sans-serif'; ctx.textAlign="left"; ctx.textBaseline="top";
        ctx.fillText(`낚은 수: ${caught} / ${TARGET}`,24,20);

        /* fish icons */
        for(let i=0;i<TARGET;i++){
          ctx.fillStyle=i<caught?COL.fish:"rgba(30,60,90,0.2)";
          ctx.font='16px sans-serif'; ctx.fillText("🐟",24+i*28,46);
        }

        /* time */
        const tl=Math.max(0,DURATION-elapsed);
        ctx.fillStyle=tl<10?COL.fail:COL.text; ctx.font='bold 18px "Segoe UI",sans-serif'; ctx.textAlign="right"; ctx.textBaseline="top";
        ctx.fillText(`${Math.ceil(tl)}초`,W-24,20);

        /* tension bar */
        const barX=W-200, barY=50, barW=170, barH=14;
        ctx.fillStyle="rgba(255,255,255,0.3)";
        ctx.beginPath(); rrect(ctx,barX,barY,barW,barH,7); ctx.fill();

        const tensionRatio=tension/TENSION_MAX;
        const tColor=tensionRatio>0.7?"#E04040":tensionRatio>0.4?"#E0A030":"#40A060";
        ctx.save(); ctx.beginPath(); rrect(ctx,barX,barY,barW,barH,7); ctx.clip();
        ctx.fillStyle=tColor; ctx.fillRect(barX,barY,barW*tensionRatio,barH);
        ctx.restore();

        ctx.fillStyle=COL.text; ctx.font='500 12px "Segoe UI",sans-serif'; ctx.textAlign="right"; ctx.textBaseline="top";
        ctx.fillText("줄 긴장도",barX-8,barY+1);

        /* drag hint */
        if(!fish && elapsed>0.5){
          ctx.fillStyle=COL.textLight; ctx.font='400 14px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="bottom";
          ctx.fillText("물고기를 기다리는 중...",CX,H-30);
        } else if(fish && !isDragging && elapsed>1){
          ctx.fillStyle=COL.textLight; ctx.font='400 14px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="bottom";
          ctx.fillText("화면을 드래그하여 당기세요!",CX,H-30);
        }
      }

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40), lh=28, ch=50+lines.length*lh+44;
        const cx=CX-cw/2, cy=CY-ch/2;
        ctx.fillStyle="rgba(200,230,240,0.96)"; ctx.beginPath(); rrect(ctx,cx,cy,cw,ch,10); ctx.fill();
        ctx.fillStyle=accent; ctx.fillRect(cx+14,cy,cw-28,3);
        ctx.fillStyle=COL.text; ctx.font='bold 24px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="top";
        ctx.fillText(title,CX,cy+18);
        ctx.font='400 14px "Segoe UI",sans-serif'; ctx.fillStyle="rgba(30,60,90,0.75)";
        for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],CX,cy+52+i*lh);
        ctx.fillStyle="rgba(30,60,90,0.4)"; ctx.font='400 13px "Segoe UI",sans-serif';
        ctx.fillText("TAP 또는 ENTER",CX,cy+ch-22);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(180,216,232,0.5)"; ctx.fillRect(0,0,W,H);
        drawCard("물고기 줄다리기",["물고기와 줄다리기로 낚아올리세요","","조작: 화면 터치 드래그로 당기기","클리어: 물고기 5마리 낚기","실패: 줄이 끊어지면 실패"],COL.accent);
      }
      function drawClear(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(180,216,232,${clearAnim*0.5})`; ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3) drawCard("대어 포획!",[`${Math.ceil(elapsed)}초 만에 완료`,`물고기 ${caught}마리 낚음`],COL.clear);
      }
      function drawFailed(){
        ctx.fillStyle="rgba(60,30,20,0.25)"; ctx.fillRect(0,0,W,H);
        const reason=tension>=TENSION_BREAK?"줄이 끊어졌습니다":"시간이 다 되었습니다";
        drawCard("실패",[reason,`낚은 수: ${caught} / ${TARGET}`],COL.fail);
      }

      /* ── Input ── */
      function handleStart(){ if(mode==="menu"||mode==="clear"||mode==="failed"){ reset(); mode="running"; } }

      function getCanvasPos(cx,cy){
        const r=canvas.getBoundingClientRect();
        return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) };
      }

      canvas.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if(mode!=="running"){ handleStart(); return; }
        isDragging=true;
        const p=getCanvasPos(e.clientX,e.clientY);
        dragX=p.x; dragY=p.y;
      });
      canvas.addEventListener("pointermove",(e)=>{
        if(!isDragging||mode!=="running") return;
        const p=getCanvasPos(e.clientX,e.clientY);
        dragX=p.x; dragY=p.y;
      });
      canvas.addEventListener("pointerup",(e)=>{ isDragging=false; });
      canvas.addEventListener("pointercancel",()=>{ isDragging=false; });
      canvas.addEventListener("keydown",(e)=>{
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); if(mode!=="running") handleStart(); else isDragging=!isDragging; }
      });

      /* ── Game loop ── */
      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){ lastTimestamp=ts; return; }
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT); lastTimestamp=ts;
        let steps=0;
        while(dt>=FIXED_DT&&steps<4){ update(FIXED_DT); dt-=FIXED_DT; steps++; }
        if(dt>0&&steps<4) update(dt);
        draw();
      }

      /* ── Debug ── */
      function renderGameToText(){
        return JSON.stringify({ mode, elapsed:+elapsed.toFixed(1), caught, tension:+tension.toFixed(1), fishDist:+fishDist.toFixed(1), result:window.relayStageResult.status });
      }
      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{
        const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000)));
        for(let i=0;i<steps;i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug={
        forceClear(){ reset(); mode="running"; caught=TARGET; mode="clear"; clearAnim=0; window.relayStageResult.status="cleared"; reportCleared(); draw(); },
        forceFail(){ reset(); mode="running"; tension=TENSION_BREAK; mode="failed"; window.relayStageResult.status="failed"; reportFailed("debug_force_fail"); draw(); },
      };

      /* ── Init ── */
      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
