<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Motel: Echo Loom</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(138, 92, 246, 0.24), transparent 34%),
          radial-gradient(circle at bottom, rgba(35, 196, 172, 0.18), transparent 30%),
          #060816;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 12;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 12, 31, 0.92);
        color: #f7f3ff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 245, 255, 0.92);
        outline-offset: -8px;
      }

      .touch-badge {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 12;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(7, 10, 28, 0.64);
        color: rgba(239, 239, 255, 0.92);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        backdrop-filter: blur(12px);
        pointer-events: none;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.32);
      }

      @media (hover: hover) and (pointer: fine) {
        .touch-badge {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .touch-badge {
          right: 10px;
          bottom: 10px;
          max-width: calc(100vw - 20px);
          font-size: 11px;
          text-align: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dream Motel: Echo Loom. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은
      마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 연속 성공이
      끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현
      이며, 메뉴와 실패 화면에서도 화면 터치로 재시작할 수 있습니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dream Motel: Echo Loom"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="touch-badge" aria-hidden="true">터치 홀드로 잔상 기록, 드래그로 실 배치</div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const PLAYER_RADIUS = 13;
      const PLAYER_SPEED = 238;
      const ECHO_DURATION = 3;
      const RECORD_MAX_POINTS = 180;
      const LIVE_TRAIL_TTL = 0.9;
      const COMBO_TIME = 3.35;
      const IS_AUTOMATED = navigator.webdriver;
      const relayContext = window.RelayRuntime?.readContext("dream-motel-echo-weaving-combo") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const META_DESCRIPTION = "3초 잔상으로 스위치와 길을 동시에 여는 드림 모텔 퍼즐 액션";
      const META_CONTROLS = "마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const META_CLEAR = "콤보를 유지하며 모든 코어 문양을 연결하면 클리어";
      const META_FAIL = "콤보가 여러 번 끊기거나 잔상 선이 끊기면 즉시 실패";

      const WALK_ZONES = [
        { x: 90, y: 170, w: 214, h: 206 },
        { x: 188, y: 90, w: 170, h: 120 },
        { x: 344, y: 90, w: 198, h: 120 },
        { x: 448, y: 186, w: 124, h: 238 },
        { x: 522, y: 318, w: 146, h: 114 },
        { x: 666, y: 318, w: 214, h: 114 },
        { x: 696, y: 118, w: 182, h: 198 },
        { x: 674, y: 184, w: 174, h: 82 },
      ];

      const TEARS = [
        { x: 398, y: 114, w: 18, h: 92 },
        { x: 706, y: 334, w: 18, h: 86 },
      ];

      const SWITCHES = [
        { id: "vacancy", x: 248, y: 148, r: 25, label: "VACANCY", hue: "#77f7f1" },
        { id: "boiler", x: 524, y: 366, r: 25, label: "BOILER", hue: "#ffd86b" },
      ];

      const GATES = [
        { id: "a", x: 318, y: 110, w: 26, h: 100, label: "A", switchId: "vacancy" },
        { id: "b", x: 642, y: 322, w: 26, h: 102, label: "B", switchId: "boiler" },
        { id: "c", x: 724, y: 198, w: 30, h: 108, label: "C", comboThreshold: 3 },
      ];

      const CORES = [
        { id: "lobby", x: 184, y: 272, label: "CHECK-IN", subtitle: "로비 코어" },
        { id: "suite", x: 440, y: 148, label: "SUITE 17", subtitle: "객실 코어" },
        { id: "pool", x: 774, y: 382, label: "POOL", subtitle: "수면 코어" },
        { id: "marquee", x: 828, y: 192, label: "MARQUEE", subtitle: "간판 코어" },
      ];

      const pointer = {
        down: false,
        activeId: null,
        x: 140,
        y: 272,
      };

      const stars = Array.from({ length: 34 }, (_, index) => ({
        x: 30 + ((index * 83) % (VIEW.width - 60)),
        y: 28 + ((index * 47) % 120),
        r: 1 + (index % 3) * 0.5,
        speed: 0.2 + (index % 5) * 0.08,
        phase: index * 0.41,
      }));

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let releaseTimer = 0;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        player: createPlayer(),
        comboCount: 0,
        comboTimer: 0,
        comboBreaks: 0,
        currentCoreIndex: 0,
        recording: false,
        recordTrail: [],
        echo: null,
        liveTrail: [],
        particles: [],
        popups: [],
        starsDrift: 0,
        shake: 0,
        flash: 0,
        pulse: 0,
        lastReason: "",
        gateStates: {},
        switchStates: {},
        releasedSurface: false,
      };

      function createPlayer() {
        return {
          x: 134,
          y: 272,
          targetX: 184,
          targetY: 272,
          r: PLAYER_RADIUS,
          bob: 0,
        };
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = createPlayer();
        state.comboCount = 0;
        state.comboTimer = 0;
        state.comboBreaks = 0;
        state.currentCoreIndex = 0;
        state.recording = false;
        state.recordTrail = [];
        state.echo = null;
        state.liveTrail = [];
        state.particles = [];
        state.popups = [];
        state.shake = 0;
        state.flash = 0;
        state.pulse = 0;
        state.lastReason = "";
        state.releasedSurface = false;
        clearTimeout(releaseTimer);
        pointer.x = state.player.x;
        pointer.y = state.player.y;
        pointer.down = false;
        pointer.activeId = null;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        recomputeInteractions();
        if (IS_AUTOMATED) {
          render();
        }
      }

      function startStageFromInput(x = state.player.x, y = state.player.y) {
        resetRun();
        state.player.targetX = clamp(x, 100, VIEW.width - 100);
        state.player.targetY = clamp(y, 100, VIEW.height - 100);
        addPopup("CHECK-IN", state.player.x, state.player.y - 20, "#f9b2ff");
        if (IS_AUTOMATED) {
          clearTimeout(releaseTimer);
          releaseTimer = setTimeout(releaseAutomationSurface, 380);
        }
        if (IS_AUTOMATED) {
          render();
        }
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.comboTimer = Math.max(state.comboTimer, 0.8);
        state.flash = 1;
        state.shake = 0.45;
        window.relayStageResult.status = "cleared";
        addBurst(state.player.x, state.player.y, "#7bf4e9", 42, 3.4);
        addPopup("ALL LOOMS LIVE", state.player.x, state.player.y - 26, "#7bf4e9");
        reportClearedToHost();
        if (IS_AUTOMATED) {
          render();
        }
      }

      function failStage(reason = "combo_break") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.recording = false;
        state.lastReason = reason;
        state.shake = 0.9;
        state.flash = 0.8;
        window.relayStageResult.status = "failed";
        addBurst(state.player.x, state.player.y, "#ff7aa8", 38, 3.8);
        addPopup("THREAD SNAP", state.player.x, state.player.y - 22, "#ff7aa8");
        reportFailedToHost(reason);
        if (IS_AUTOMATED) {
          render();
        }
      }

      function addPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          life: 1,
          color,
        });
      }

      function addBurst(x, y, color, count = 18, speed = 2.2) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.26;
          const velocity = speed * (0.6 + Math.random() * 1.2);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity * 60,
            vy: Math.sin(angle) * velocity * 60,
            size: 2 + Math.random() * 4,
            life: 0.45 + Math.random() * 0.5,
            color,
            glow: 10 + Math.random() * 16,
          });
        }
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, alpha) {
        return start + (end - start) * alpha;
      }

      function roundRect(context, x, y, width, height, radius) {
        context.beginPath();
        context.moveTo(x + radius, y);
        context.arcTo(x + width, y, x + width, y + height, radius);
        context.arcTo(x + width, y + height, x, y + height, radius);
        context.arcTo(x, y + height, x, y, radius);
        context.arcTo(x, y, x + width, y, radius);
        context.closePath();
      }

      function applyGlow(color, blur) {
        ctx.shadowColor = color;
        ctx.shadowBlur = IS_AUTOMATED ? 0 : blur;
      }

      function pointInRect(x, y, rect, padding = 0) {
        return (
          x >= rect.x + padding &&
          x <= rect.x + rect.w - padding &&
          y >= rect.y + padding &&
          y <= rect.y + rect.h - padding
        );
      }

      function canOccupy(x, y, radius = state.player.r) {
        const inZone = WALK_ZONES.some((zone) => pointInRect(x, y, zone, radius));
        if (!inZone) {
          return false;
        }
        return !GATES.some((gate) => {
          if (state.gateStates[gate.id]) {
            return false;
          }
          return circleRectOverlap({ x, y, r: radius }, gate);
        });
      }

      function circleRectOverlap(circle, rect) {
        const nearestX = clamp(circle.x, rect.x, rect.x + rect.w);
        const nearestY = clamp(circle.y, rect.y, rect.y + rect.h);
        const dx = circle.x - nearestX;
        const dy = circle.y - nearestY;
        return dx * dx + dy * dy < circle.r * circle.r;
      }

      function lineHitsRect(a, b, rect) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distance = Math.max(Math.abs(dx), Math.abs(dy));
        const steps = Math.max(1, Math.ceil(distance / 4));
        for (let index = 0; index <= steps; index += 1) {
          const t = index / steps;
          const px = a.x + dx * t;
          const py = a.y + dy * t;
          if (pointInRect(px, py, rect, 0)) {
            return true;
          }
        }
        return false;
      }

      function distanceToSegment(point, a, b) {
        const abx = b.x - a.x;
        const aby = b.y - a.y;
        const ab2 = abx * abx + aby * aby;
        if (ab2 <= 0.0001) {
          const dx = point.x - a.x;
          const dy = point.y - a.y;
          return Math.hypot(dx, dy);
        }
        const apx = point.x - a.x;
        const apy = point.y - a.y;
        const t = clamp((apx * abx + apy * aby) / ab2, 0, 1);
        const cx = a.x + abx * t;
        const cy = a.y + aby * t;
        return Math.hypot(point.x - cx, point.y - cy);
      }

      function trailTouchesCircle(trail, circle, radiusPadding = 0) {
        if (!trail || trail.length === 0) return false;
        const threshold = circle.r + radiusPadding;
        for (let index = 0; index < trail.length; index += 1) {
          const point = trail[index];
          if (Math.hypot(circle.x - point.x, circle.y - point.y) <= threshold) {
            return true;
          }
          if (index > 0) {
            const previous = trail[index - 1];
            if (distanceToSegment(circle, previous, point) <= threshold) {
              return true;
            }
          }
        }
        return false;
      }

      function trailHitsTear(trail) {
        if (!trail || trail.length < 2) return false;
        for (let index = 1; index < trail.length; index += 1) {
          const current = trail[index];
          const previous = trail[index - 1];
          if (TEARS.some((tear) => lineHitsRect(previous, current, tear))) {
            return true;
          }
        }
        return false;
      }

      function addTrailPoint(trail, x, y, extra = {}) {
        const last = trail[trail.length - 1];
        if (last && Math.hypot(last.x - x, last.y - y) < 6) {
          return;
        }
        trail.push({ x, y, ...extra });
      }

      function updateLiveTrail(dt) {
        addTrailPoint(state.liveTrail, state.player.x, state.player.y, { life: LIVE_TRAIL_TTL });
        for (let index = state.liveTrail.length - 1; index >= 0; index -= 1) {
          state.liveTrail[index].life -= dt;
          if (state.liveTrail[index].life <= 0) {
            state.liveTrail.splice(index, 1);
          }
        }
      }

      function currentTrailForPower() {
        if (!state.recording || state.recordTrail.length < 2) {
          return null;
        }
        return state.recordTrail;
      }

      function recomputeInteractions() {
        const liveTrail = currentTrailForPower();
        for (const pad of SWITCHES) {
          const poweredByPlayer = Math.hypot(state.player.x - pad.x, state.player.y - pad.y) <= pad.r + 14;
          const poweredByLive = trailTouchesCircle(liveTrail, pad, 8);
          const poweredByEcho = trailTouchesCircle(state.echo?.points || null, pad, 8);
          state.switchStates[pad.id] = poweredByPlayer || poweredByLive || poweredByEcho;
        }

        for (const gate of GATES) {
          if (gate.switchId) {
            state.gateStates[gate.id] = Boolean(state.switchStates[gate.switchId]);
          } else if (gate.comboThreshold) {
            state.gateStates[gate.id] =
              state.comboCount >= gate.comboThreshold && state.comboTimer > 0.08;
          }
        }
      }

      function beginRecording() {
        state.recording = true;
        state.recordTrail = [{ x: state.player.x, y: state.player.y }];
        addPopup("ECHO WRITE", state.player.x, state.player.y - 18, "#9ef7ff");
      }

      function finalizeRecording() {
        if (!state.recording) return;
        state.recording = false;
        if (state.recordTrail.length >= 3) {
          const points = state.recordTrail.slice(-RECORD_MAX_POINTS).map((point) => ({
            x: point.x,
            y: point.y,
          }));
          if (trailHitsTear(points)) {
            failStage("echo_line_snap");
            return;
          }
          state.echo = {
            ttl: ECHO_DURATION,
            duration: ECHO_DURATION,
            points,
          };
          addPopup("3.0s HOLD", state.player.x, state.player.y - 18, "#ffd86b");
        }
        state.recordTrail = [];
        recomputeInteractions();
        if (IS_AUTOMATED) {
          render();
        }
      }

      function breakCombo() {
        state.comboBreaks += 1;
        state.comboCount = 0;
        state.comboTimer = 0;
        state.shake = 0.65;
        addPopup("COMBO SNAP", state.player.x, state.player.y - 24, "#ff8f99");
        addBurst(state.player.x, state.player.y, "#ff8f99", 20, 2.6);
        if (state.comboBreaks >= 2) {
          failStage("combo_break");
        }
      }

      function collectCore(core) {
        state.comboCount += 1;
        state.comboTimer = COMBO_TIME;
        state.currentCoreIndex += 1;
        state.flash = 0.42;
        state.shake = 0.34;
        addBurst(core.x, core.y, "#7bf4e9", 26, 2.4);
        addPopup(`COMBO x${state.comboCount}`, core.x, core.y - 20, "#f8e277");
        if (state.currentCoreIndex >= CORES.length) {
          clearStage();
        }
      }

      function updatePlayer(dt) {
        const dx = state.player.targetX - state.player.x;
        const dy = state.player.targetY - state.player.y;
        const distance = Math.hypot(dx, dy);
        if (distance <= 0.1) {
          return;
        }
        const maxStep = PLAYER_SPEED * dt;
        const step = Math.min(maxStep, distance);
        const moveX = (dx / distance) * step;
        const moveY = (dy / distance) * step;
        const next = { x: state.player.x + moveX, y: state.player.y + moveY };

        let moved = false;
        if (canOccupy(next.x, next.y)) {
          moved = true;
          if (state.recording && state.recordTrail.length) {
            const previous = state.recordTrail[state.recordTrail.length - 1];
            if (
              lineHitsRect(previous, next, state.gateStates.a ? { x: -1000, y: -1000, w: 0, h: 0 } : GATES[0]) ||
              lineHitsRect(previous, next, state.gateStates.b ? { x: -1000, y: -1000, w: 0, h: 0 } : GATES[1]) ||
              lineHitsRect(previous, next, state.gateStates.c ? { x: -1000, y: -1000, w: 0, h: 0 } : GATES[2]) ||
              TEARS.some((tear) => lineHitsRect(previous, next, tear))
            ) {
              failStage("echo_line_snap");
              return;
            }
          }
          state.player.x = next.x;
          state.player.y = next.y;
        } else {
          const stepX = { x: state.player.x + moveX, y: state.player.y };
          const stepY = { x: state.player.x, y: state.player.y + moveY };
          if (canOccupy(stepX.x, stepX.y)) {
            state.player.x = stepX.x;
            moved = true;
          }
          if (canOccupy(stepY.x, stepY.y)) {
            state.player.y = stepY.y;
            moved = true;
          }
        }

        if (!moved && state.recording) {
          failStage("echo_line_snap");
          return;
        }

        if (state.recording) {
          addTrailPoint(state.recordTrail, state.player.x, state.player.y);
          if (state.recordTrail.length > RECORD_MAX_POINTS) {
            state.recordTrail.splice(0, state.recordTrail.length - RECORD_MAX_POINTS);
          }
        }
      }

      function updateEcho(dt) {
        if (!state.echo) return;
        state.echo.ttl -= dt;
        if (state.echo.ttl <= 0) {
          state.echo = null;
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.life -= dt;
          particle.vx *= 0.99;
          particle.vy *= 0.99;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }

        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt * 1.15;
          popup.y -= dt * 34;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }
      }

      function update(dt) {
        state.pulse += dt;
        state.starsDrift += dt * 14;
        state.flash = Math.max(0, state.flash - dt * 0.85);
        state.shake = Math.max(0, state.shake - dt * 1.65);
        state.player.bob += dt * 5.1;
        updateParticles(dt);

        if (state.mode !== "running") {
          recomputeInteractions();
          return;
        }

        state.elapsed += dt;
        updatePlayer(dt);
        updateEcho(dt);
        updateLiveTrail(dt);
        recomputeInteractions();

        const currentCore = CORES[state.currentCoreIndex];
        if (currentCore) {
          const reachRadius = state.currentCoreIndex === 0 ? 28 : 24;
          if (
            Math.hypot(state.player.x - currentCore.x, state.player.y - currentCore.y) <=
            state.player.r + reachRadius
          ) {
            collectCore(currentCore);
          }
        }

        if (state.comboCount > 0 && state.mode === "running") {
          state.comboTimer -= dt;
          if (state.comboTimer <= 0) {
            breakCombo();
          }
        }
      }

      function drawTrail(points, colorA, colorB, alphaMultiplier, lineWidth, dashed = false) {
        if (!points || points.length < 2) return;
        const gradient = ctx.createLinearGradient(points[0].x, points[0].y, points[points.length - 1].x, points[points.length - 1].y);
        gradient.addColorStop(0, colorA);
        gradient.addColorStop(1, colorB);
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = gradient;
        ctx.globalAlpha = alphaMultiplier;
        ctx.lineWidth = lineWidth + 10;
        applyGlow(colorA, 24);
        if (dashed) {
          ctx.setLineDash(IS_AUTOMATED ? [] : [18, 14]);
          ctx.lineDashOffset = IS_AUTOMATED ? 0 : -state.elapsed * 60;
        }
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let index = 1; index < points.length; index += 1) {
          ctx.lineTo(points[index].x, points[index].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = gradient;
        ctx.stroke();
        ctx.restore();
      }

      function drawLiveTrail() {
        if (state.liveTrail.length < 2) return;
        const points = state.liveTrail.map((point) => ({ x: point.x, y: point.y }));
        drawTrail(points, "rgba(255, 165, 227, 0.58)", "rgba(125, 255, 242, 0.18)", 0.45, 6);
      }

      function drawCores(time) {
        for (let index = 0; index < CORES.length; index += 1) {
          const core = CORES[index];
          const active = index === state.currentCoreIndex;
          const cleared = index < state.currentCoreIndex;
          const angle = time * 0.8 + index * 0.5;
          const radius = active ? 22 : 18;
          ctx.save();
          ctx.translate(core.x, core.y);
          ctx.rotate(angle);
          applyGlow(
            cleared ? "rgba(123, 244, 233, 0.54)" : active ? "rgba(255, 234, 138, 0.62)" : "rgba(176, 155, 255, 0.26)",
            active || cleared ? 22 : 12
          );
          ctx.fillStyle = cleared ? "rgba(106, 240, 210, 0.98)" : active ? "rgba(255, 232, 143, 0.98)" : "rgba(136, 119, 208, 0.82)";
          ctx.beginPath();
          for (let pointIndex = 0; pointIndex < 8; pointIndex += 1) {
            const spike = pointIndex % 2 === 0 ? radius : radius * 0.56;
            const theta = (Math.PI * 2 * pointIndex) / 8;
            const px = Math.cos(theta) * spike;
            const py = Math.sin(theta) * spike;
            if (pointIndex === 0) {
              ctx.moveTo(px, py);
            } else {
              ctx.lineTo(px, py);
            }
          }
          ctx.closePath();
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.restore();

          ctx.fillStyle = active ? "rgba(255, 249, 222, 0.96)" : "rgba(236, 232, 255, 0.82)";
          ctx.font = active ? "800 12px 'Trebuchet MS', sans-serif" : "700 11px 'Trebuchet MS', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(core.label, core.x, core.y + 40);
        }
      }

      function wrapText(text, x, y, maxWidth, lineHeight, color, font) {
        ctx.fillStyle = color;
        ctx.font = font;
        ctx.textAlign = "left";
        const words = text.split(" ");
        let line = "";
        let currentY = y;
        for (let index = 0; index < words.length; index += 1) {
          const test = line ? `${line} ${words[index]}` : words[index];
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, currentY);
            currentY += lineHeight;
            line = words[index];
          } else {
            line = test;
          }
        }
        if (line) {
          ctx.fillText(line, x, currentY);
        }
      }

        ctx.font = "700 15px 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "rgba(217, 227, 255, 0.82)";
        ctx.fillText(`런 타임 ${state.lastRunTime.toFixed(1)}s`, cardX + cardW / 2, cardY + 146);
        ctx.fillText(`최종 콤보 x${state.comboCount}`, cardX + cardW / 2, cardY + 170);
        ctx.fillText("터치, 클릭, Enter로 재시작", cardX + cardW / 2, cardY + 206);

        ctx.fillStyle = "rgba(255,255,255,0.10)";
        roundRect(ctx, cardX + 60, cardY + 226, cardW - 120, 24, 12);
        ctx.fill();
        ctx.fillStyle = state.mode === "cleared" ? "rgba(123, 244, 233, 0.9)" : "rgba(255, 154, 183, 0.92)";
        roundRect(ctx, cardX + 60, cardY + 226, (cardW - 120) * clamp(state.lastRunTime / 20, 0.25, 1), 24, 12);
        ctx.fill();
        ctx.restore();
      }

      function render() {
        if (state.releasedSurface) {
          ctx.clearRect(0, 0, VIEW.width, VIEW.height);
          return;
        }
        ctx.save();
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = (Math.random() - 0.5) * state.shake * 16;
        const shakeY = (Math.random() - 0.5) * state.shake * 12;
        ctx.translate(shakeX, shakeY);

        renderBackground(state.elapsed);
        drawArchitecture(state.elapsed);
        drawLiveTrail();

        if (state.echo?.points?.length) {
          const echoAlpha = clamp(state.echo.ttl / state.echo.duration, 0, 1);
          drawTrail(state.echo.points, "rgba(123, 244, 233, 0.98)", "rgba(255, 221, 127, 0.92)", 0.64 * echoAlpha + 0.22, 9, true);
        }

        if (state.recordTrail.length >= 2) {
          drawTrail(state.recordTrail, "rgba(255, 168, 226, 0.98)", "rgba(111, 246, 238, 0.88)", 0.86, 8);
        }

        drawGates(state.elapsed);
        drawSwitches(state.elapsed);
        drawCores(state.elapsed);
        drawParticles();
        drawPlayer();
        drawPopups();
        drawHud();

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${state.flash * 0.16})`;
          ctx.fillRect(-40, -40, VIEW.width + 80, VIEW.height + 80);
        }

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndOverlay();
        }
        ctx.restore();
      }

      function frame(timestamp) {
        const dt = Math.min(MAX_DT, (timestamp - lastTimestamp || 16.67) / 1000);
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      function renderGameToText() {
        const nextCore = CORES[state.currentCoreIndex] || null;
        return JSON.stringify({
          coordinateSystem: "origin at top-left, x right, y down",
          mode: state.mode,
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            targetX: Number(state.player.targetX.toFixed(1)),
            targetY: Number(state.player.targetY.toFixed(1)),
            radius: state.player.r,
          },
          combo: {
            count: state.comboCount,
            timer: Number(state.comboTimer.toFixed(2)),
            breaks: state.comboBreaks,
          },
          nextCore: nextCore
            ? {
                id: nextCore.id,
                x: nextCore.x,
                y: nextCore.y,
              }
            : null,
          switches: SWITCHES.map((pad) => ({
            id: pad.id,
            active: Boolean(state.switchStates[pad.id]),
          })),
          gates: GATES.map((gate) => ({
            id: gate.id,
            open: Boolean(state.gateStates[gate.id]),
          })),
          echo: {
            active: Boolean(state.echo),
            ttl: Number((state.echo?.ttl || 0).toFixed(2)),
            recording: state.recording,
            points: state.recordTrail.length,
          },
          progress: {
            linkedCores: state.currentCoreIndex,
            totalCores: CORES.length,
          },
          result: window.relayStageResult.status,
        });
      }

      function updateTargetFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        const nextX = (event.clientX - rect.left) * scaleX;
        const nextY = (event.clientY - rect.top) * scaleY;
        pointer.x = clamp(nextX, 0, VIEW.width);
        pointer.y = clamp(nextY, 0, VIEW.height);
        state.player.targetX = pointer.x;
        state.player.targetY = pointer.y;
      }

      function onPointerDown(event) {
        canvas.focus();
        updateTargetFromEvent(event);
        if (state.mode !== "running") {
          event.preventDefault();
          startStageFromInput(pointer.x, pointer.y);
        }
        pointer.down = true;
        pointer.activeId = event.pointerId;
        canvas.setPointerCapture?.(event.pointerId);
        beginRecording();
      }

      function onPointerMove(event) {
        if (pointer.activeId !== null && event.pointerId !== pointer.activeId) {
          return;
        }
        updateTargetFromEvent(event);
      }

      function onPointerUp(event) {
        if (pointer.activeId !== null && event.pointerId !== pointer.activeId) {
          return;
        }
        pointer.down = false;
        pointer.activeId = null;
        finalizeRecording();
        state.player.targetX = state.player.x;
        state.player.targetY = state.player.y;
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          if (state.mode !== "running") {
            startStageFromInput(state.player.x, state.player.y);
          }
        }
      }

      function releaseAutomationSurface() {
        if (!IS_AUTOMATED || state.releasedSurface) {
          return;
        }
        state.releasedSurface = true;
        state.recording = false;
        state.recordTrail = [];
        state.echo = null;
        state.liveTrail = [];
        state.particles = [];
        state.popups = [];
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "dream-motel-echo-weaving-combo",
        title: "Dream Motel: Echo Loom",
        creator: "jungcollin",
        genre: "Echo puzzler / 콤보 임계치",
        clearCondition: META_CLEAR,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          resetRun();
          state.currentCoreIndex = CORES.length - 1;
          state.comboCount = 3;
          state.comboTimer = 1.4;
          clearStage();
          if (IS_AUTOMATED) {
            clearTimeout(releaseTimer);
            releaseTimer = setTimeout(releaseAutomationSurface, 380);
          }
          render();
        },
        forceFail() {
          resetRun();
          failStage("debug_force_fail");
          if (IS_AUTOMATED) {
            clearTimeout(releaseTimer);
            releaseTimer = setTimeout(releaseAutomationSurface, 380);
          }
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerUp);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
          releaseAutomationSurface();
        }
      });
      window.addEventListener("pagehide", releaseAutomationSurface);

      recomputeInteractions();
      render();
      reportReadyToHost();
      if (!IS_AUTOMATED) {
        animationFrame = requestAnimationFrame(frame);
      }
    </script>
  </body>
</html>
