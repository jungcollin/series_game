<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>음표 열쇠</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #f0eff8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 100, 180, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 40, 80, 0.92);
        color: #f0f0ff; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f0eff8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(100, 80, 160, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">음표 열쇠. 화면 터치로 음표를 순서대로 눌러 음악 상자의 잠금을 해제하세요.</p>
    <canvas id="game" width="960" height="540" aria-label="음표 열쇠" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "music-key",
        title: "음표 열쇠",
        description: "멜로디를 기억하고 음표를 순서대로 탭해 잠금을 해제하세요",
        creator: "jungcollin",
        genre: "Sequence memory puzzle",
        clearCondition: "잠금 5개를 해제하면 클리어",
        failCondition: "3번 틀리면 실패",
        controls: "화면 터치로 음표를 순서대로 누르세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const NOTE_COLORS = ["#c06878", "#d8a040", "#60a878", "#5888c8", "#9870b0"];
      const NOTE_LIGHT = ["#e8b0b8", "#f0d890", "#a8d8b8", "#a0c8e8", "#c8b0d8"];
      const NOTE_NAMES = ["도", "레", "미", "파", "솔"];

      const COL = {
        bg: "#f0eff8",
        bgDark: "#e0dff0",
        hud: "#3a3a5a",
        card: "rgba(240, 239, 248, 0.96)",
        accent: "#6868a8",
        danger: "#c04040",
        success: "#50a868",
        box: "#d8c8a0",
        boxDark: "#b8a880",
        lock: "#8080a8",
      };

      // --- State ---
      const TARGET_LOCKS = 5;
      const MAX_MISSES = 3;
      const NOTE_COUNT = 5;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let clearAnim = 0;

      let unlockedCount = 0;
      let missCount = 0;
      let sequence = [];
      let seqLength = 3;
      let playerInput = [];
      let phase = "showing"; // "showing" | "input" | "result"
      let showIndex = 0;
      let showTimer = 0;
      let noteFlash = new Array(NOTE_COUNT).fill(0);
      let resultMsg = "";
      let resultTimer = 0;
      let particles = [];
      let lockAngle = 0;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function generateSequence() {
        sequence = [];
        for (let i = 0; i < seqLength; i++) {
          sequence.push(Math.floor(Math.random() * NOTE_COUNT));
        }
        playerInput = [];
        phase = "showing";
        showIndex = -1;
        showTimer = 0.6;
        noteFlash = new Array(NOTE_COUNT).fill(0);
      }

      function reset() {
        elapsed = 0; shake = 0; clearAnim = 0;
        unlockedCount = 0; missCount = 0;
        seqLength = 3;
        particles = []; lockAngle = 0;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateSequence();
      }

      function spawnUnlockParticles() {
        if (reducedMotion) return;
        for (let i = 0; i < 18; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(50, 140);
          particles.push({
            x: CX, y: CY - 60,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 20,
            life: 1, size: rand(3, 6),
            color: NOTE_COLORS[Math.floor(rand(0, NOTE_COUNT))],
          });
        }
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Lock animation
        lockAngle += dt * 0.5;

        // Note flash decay
        for (let i = 0; i < NOTE_COUNT; i++) {
          noteFlash[i] *= 0.9;
        }

        // Showing sequence
        if (phase === "showing") {
          showTimer -= dt;
          if (showTimer <= 0) {
            showIndex++;
            if (showIndex >= seqLength) {
              phase = "input";
              playerInput = [];
            } else {
              noteFlash[sequence[showIndex]] = 1;
              showTimer = 0.6;
            }
          }
        }

        // Result phase
        if (phase === "result") {
          resultTimer -= dt;
          if (resultTimer <= 0) {
            if (unlockedCount >= TARGET_LOCKS) {
              mode = "clear"; clearAnim = 0;
              window.relayStageResult.status = "cleared";
              reportCleared();
            } else if (missCount >= MAX_MISSES) {
              mode = "failed";
              window.relayStageResult.status = "failed";
              reportFailed("3번 실패");
            } else {
              seqLength = Math.min(3 + unlockedCount, 7);
              generateSequence();
            }
          }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 50 * dt;
          p.life -= dt * 1.5;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88;
        if (shake < 0.3) shake = 0;
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background
        ctx.fillStyle = COL.bg;
        ctx.fillRect(0, 0, W, H);

        // Subtle musical staff lines
        ctx.strokeStyle = "rgba(100, 100, 140, 0.06)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          const y = 160 + i * 16;
          ctx.beginPath();
          ctx.moveTo(50, y); ctx.lineTo(W - 50, y);
          ctx.stroke();
        }

        if (mode === "running") {
          drawMusicBox();
          drawNoteButtons();
          drawSequenceIndicator();
          drawHUD();
          drawResultText();
        }

        // Particles
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawMusicBox() {
        // Music box body
        const bx = CX - 80, by = CY - 120, bw = 160, bh = 100;
        ctx.fillStyle = COL.box;
        ctx.beginPath();
        roundRect(ctx, bx, by, bw, bh, 8);
        ctx.fill();
        ctx.strokeStyle = COL.boxDark;
        ctx.lineWidth = 2;
        ctx.stroke();

        // Decorative line
        ctx.strokeStyle = "#c8b898";
        ctx.lineWidth = 1;
        ctx.strokeRect(bx + 8, by + 8, bw - 16, bh - 16);

        // Lock icon
        const lockY = by + bh / 2;
        ctx.save();
        ctx.translate(CX, lockY);

        // Lock body
        ctx.fillStyle = COL.lock;
        ctx.beginPath();
        roundRect(ctx, -14, -8, 28, 22, 4);
        ctx.fill();

        // Lock shackle
        ctx.strokeStyle = COL.lock;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, -8, 10, Math.PI, 0);
        ctx.stroke();

        // Lock progress indicator
        const progress = unlockedCount / TARGET_LOCKS;
        ctx.fillStyle = COL.success;
        ctx.beginPath();
        roundRect(ctx, -14, -8, 28 * progress, 22, 4);
        ctx.fill();

        // Keyhole
        ctx.fillStyle = "#f0eff8";
        ctx.beginPath();
        ctx.arc(0, 2, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(-1.5, 2, 3, 6);

        ctx.restore();

        // Lock count text
        ctx.fillStyle = COL.hud;
        ctx.font = "500 13px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(`${unlockedCount}/${TARGET_LOCKS} 해제`, CX, by + bh + 20);
      }

      function drawNoteButtons() {
        const buttonY = CY + 80;
        const spacing = 80;
        const startX = CX - (NOTE_COUNT - 1) * spacing / 2;

        for (let i = 0; i < NOTE_COUNT; i++) {
          const bx = startX + i * spacing;
          const flash = noteFlash[i];
          const r = 28 + flash * 6;

          // Button circle
          ctx.beginPath();
          ctx.arc(bx, buttonY, r, 0, Math.PI * 2);
          if (flash > 0.1) {
            ctx.fillStyle = NOTE_COLORS[i];
          } else {
            ctx.fillStyle = NOTE_LIGHT[i];
          }
          ctx.fill();
          ctx.strokeStyle = NOTE_COLORS[i];
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // Note name
          ctx.fillStyle = flash > 0.1 ? "#fff" : NOTE_COLORS[i];
          ctx.font = "bold 16px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(NOTE_NAMES[i], bx, buttonY);
        }

        // Phase instruction
        if (phase === "showing") {
          ctx.fillStyle = "rgba(58, 58, 90, 0.5)";
          ctx.font = "400 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText("멜로디를 기억하세요...", CX, buttonY + 50);
        } else if (phase === "input") {
          ctx.fillStyle = "rgba(58, 58, 90, 0.5)";
          ctx.font = "400 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText(`화면 터치로 음표를 누르세요 (${playerInput.length}/${seqLength})`, CX, buttonY + 50);
        }
      }

      function drawSequenceIndicator() {
        // Small dots showing sequence progress
        const dotY = CY + 145;
        const dotSpacing = 14;
        const startX = CX - (seqLength - 1) * dotSpacing / 2;

        for (let i = 0; i < seqLength; i++) {
          ctx.beginPath();
          ctx.arc(startX + i * dotSpacing, dotY, 4, 0, Math.PI * 2);
          if (phase === "input" && i < playerInput.length) {
            ctx.fillStyle = playerInput[i] === sequence[i] ? COL.success : COL.danger;
          } else if (phase === "showing" && i <= showIndex) {
            ctx.fillStyle = NOTE_COLORS[sequence[i]];
          } else {
            ctx.fillStyle = "rgba(0,0,0,0.1)";
          }
          ctx.fill();
        }
      }

      function drawResultText() {
        if (phase !== "result") return;
        const alpha = clamp(resultTimer / 1.2, 0, 1);
        ctx.globalAlpha = alpha;
        ctx.font = "bold 24px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillStyle = resultMsg === "해제!" ? COL.success : COL.danger;
        ctx.fillText(resultMsg, CX, CY + 30);
        ctx.globalAlpha = 1;
      }

      function drawHUD() {
        ctx.fillStyle = COL.hud;
        ctx.font = "600 16px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`해제: ${unlockedCount}/${TARGET_LOCKS}`, 20, 16);

        ctx.textAlign = "right";
        ctx.fillStyle = missCount > 1 ? COL.danger : COL.hud;
        ctx.fillText(`실수: ${missCount}/${MAX_MISSES}`, W - 20, 16);

        // Sequence length indicator
        ctx.textAlign = "center";
        ctx.fillStyle = COL.hud;
        ctx.fillText(`음표 ${seqLength}개`, CX, 16);
      }

      // --- Cards ---
      function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y); c.lineTo(x + w - r, y);
        c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r);
        c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h);
        c.arcTo(x, y + h, x, y + h - r, r);
        c.lineTo(x, y + r);
        c.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = COL.card;
        ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 8); ctx.fill();
        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);
        ctx.fillStyle = COL.hud;
        ctx.font = "bold 22px Trebuchet MS";
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);
        ctx.font = "400 14px Trebuchet MS";
        ctx.fillStyle = "rgba(58, 58, 90, 0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        ctx.fillStyle = "rgba(58, 58, 90, 0.4)";
        ctx.font = "400 13px Trebuchet MS";
        ctx.fillText("탭 또는 ENTER", CX, cardY + cardH - 20);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(240, 239, 248, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("음표 열쇠", [
          "멜로디를 기억하고",
          "화면 터치로 음표를 순서대로 누르세요",
          "",
          "조작: 화면 터치로 음표 선택",
          "클리어: 잠금 5개 해제",
          "실패: 3번 틀리면 게임 오버",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(240, 239, 248, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 완료`, "음악 상자가 열렸습니다!"], COL.accent);
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(80, 60, 80, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["너무 많이 틀렸습니다", `해제: ${unlockedCount}/${TARGET_LOCKS}`], COL.danger);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      function handleTap(cx, cy) {
        if (mode !== "running" || phase !== "input") return;

        const buttonY = CY + 80;
        const spacing = 80;
        const startX = CX - (NOTE_COUNT - 1) * spacing / 2;

        for (let i = 0; i < NOTE_COUNT; i++) {
          const bx = startX + i * spacing;
          if (Math.hypot(cx - bx, cy - buttonY) < 36) {
            noteFlash[i] = 1;
            playerInput.push(i);

            // Check input
            const idx = playerInput.length - 1;
            if (playerInput[idx] !== sequence[idx]) {
              // Wrong!
              missCount++;
              shake = 8;
              phase = "result";
              resultMsg = "틀렸어요!";
              resultTimer = 1.2;

              if (missCount >= MAX_MISSES) {
                mode = "failed";
                window.relayStageResult.status = "failed";
                reportFailed("3번 실패");
              }
              return;
            }

            if (playerInput.length === seqLength) {
              // Correct full sequence!
              unlockedCount++;
              phase = "result";
              resultMsg = "해제!";
              resultTimer = 1.2;
              spawnUnlockParticles();

              if (unlockedCount >= TARGET_LOCKS) {
                // Will transition on result timer
              }
            }
            return;
          }
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        handleTap(p.x, p.y);
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug ---
      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), unlockedCount, missCount, phase, result: window.relayStageResult.status });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          unlockedCount = TARGET_LOCKS;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          missCount = MAX_MISSES;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      generateSequence();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
