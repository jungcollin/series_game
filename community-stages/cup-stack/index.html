<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>종이컵 쌓기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #FFF8E7; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(200, 160, 120, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80, 50, 30, 0.92);
        color: #FFF8E7; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        background: #FFF8E7; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(255, 127, 127, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">종이컵 쌓기. 종이컵 스피드 스태킹. 좌우로 움직이는 컵을 탭하여 피라미드를 쌓는 게임. 탭으로 컵 놓기. 모바일에서는 화면 터치로 플레이합니다. 피라미드 3단 완성 시 클리어. 컵이 쓰러지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="종이컵 쌓기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      let W = canvas.width;
      let H = canvas.height;
      let CX = W / 2;
      let CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "cup-stack",
        title: "종이컵 쌓기",
        description: "좌우로 움직이는 컵을 탭하여 피라미드를 완성하세요.",
        creator: "jungcollin",
        genre: "Speed stacking",
        clearCondition: "피라미드 3단 완성 시 클리어",
        failCondition: "컵이 쓰러지면 실패",
        controls: "탭으로 컵 놓기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#FFF8E7",
        table: "#D4A574",
        tableDark: "#B8895A",
        cup: "#FF7F7F",
        cupDark: "#E65C5C",
        cupLight: "#FFB3B3",
        accent: "#98D8C8",
        accentDark: "#6BC4B0",
        text: "#4A3728",
        textLight: "rgba(74, 55, 40, 0.6)",
        success: "#7BC47F",
        fail: "#E65C5C",
      };

      const DURATION = 35;
      const CUP_W = 52;
      const CUP_H = 60;
      const ROWS = [5, 3, 1];
      const TOTAL_CUPS = 9;
      let TABLE_Y = H - Math.max(80, H * 0.15);
      const BASE_SPEED = 260;
      const TOLERANCE = 30;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let clearAnim = 0;

      let placedCups = [];
      let movingCup = { x: CX, dir: 1, speed: BASE_SPEED };
      let currentRow = 0;
      let currentCol = 0;
      let totalPlaced = 0;
      let particles = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function movingRange() { return Math.min(200, W * 0.36); }
      function movingStartOffset() { return Math.min(180, W * 0.35); }
      function resizeCanvas() {
        const prevCX = CX;
        const prevTableY = TABLE_Y;
        const rect = canvas.getBoundingClientRect();
        const cssWidth = Math.max(1, rect.width || window.innerWidth);
        const cssHeight = Math.max(1, rect.height || window.innerHeight);
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(cssWidth * dpr);
        canvas.height = Math.round(cssHeight * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        W = cssWidth;
        H = cssHeight;
        CX = W / 2;
        CY = H / 2;
        TABLE_Y = H - Math.max(80, H * 0.15);

        const dx = CX - prevCX;
        const dy = TABLE_Y - prevTableY;
        if (Number.isFinite(dx) && Number.isFinite(dy)) {
          for (const cup of placedCups) {
            cup.x += dx;
            cup.y += dy;
          }
          for (const p of particles) {
            p.x += dx;
            p.y += dy;
          }
          if (movingCup) {
            movingCup.x += dx;
          }
        }
      }

      function getSlotPos(row, col) {
        const rowCount = ROWS[row];
        const spacing = CUP_W + 14;
        const totalW = (rowCount - 1) * spacing;
        const startX = CX - totalW / 2;
        const x = startX + col * spacing;
        const y = TABLE_Y - (row + 1) * (CUP_H - 6);
        return { x, y };
      }

      function getMovingCupY() {
        return TABLE_Y - (currentRow + 1) * (CUP_H - 6);
      }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color, sizeRange) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(60, 180);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - rand(30, 80),
            life: 1, color,
            size: rand(sizeRange[0], sizeRange[1]),
          });
        }
      }

      function reset() {
        elapsed = 0; shake = 0; clearAnim = 0;
        placedCups = []; particles = [];
        currentRow = 0; currentCol = 0; totalPlaced = 0;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        movingCup = { x: CX - movingStartOffset(), dir: 1, speed: BASE_SPEED };
      }

      function placeCup() {
        if (mode !== "running" || currentRow >= ROWS.length) return;
        const target = getSlotPos(currentRow, currentCol);
        const diff = Math.abs(movingCup.x - target.x);

        if (diff > TOLERANCE) {
          triggerFall(movingCup.x, getMovingCupY());
          return;
        }

        const snapX = lerp(movingCup.x, target.x, 0.7);
        placedCups.push({
          x: snapX, y: target.y,
          row: currentRow, col: currentCol,
          bounceT: 1, fallAngle: 0, fallVx: 0, fallVy: 0,
        });

        spawnParticles(snapX, target.y, reducedMotion ? 3 : 8, COL.accent, [3, 6]);
        totalPlaced++;

        currentCol++;
        if (currentCol >= ROWS[currentRow]) {
          currentRow++;
          currentCol = 0;
        }

        if (totalPlaced >= TOTAL_CUPS) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          spawnParticles(CX, CY, reducedMotion ? 6 : 25, COL.success, [4, 8]);
          spawnParticles(CX, CY, reducedMotion ? 4 : 15, COL.cup, [3, 7]);
          return;
        }

        movingCup.speed = BASE_SPEED + totalPlaced * 22;
        movingCup.dir = 1;
        const nextTarget = getSlotPos(currentRow, currentCol);
        movingCup.x = nextTarget.x - movingRange();
      }

      function triggerFall(x, y) {
        shake = 10;
        spawnParticles(x, y, reducedMotion ? 4 : 12, COL.cupDark, [3, 7]);
        for (const cup of placedCups) {
          cup.fallVx = rand(-50, 50);
          cup.fallVy = rand(-80, -20);
        }
        mode = "failed";
        window.relayStageResult.status = "failed";
        reportFailed("컵 낙하");
      }

      function update(dt) {
        if (mode === "running") {
          elapsed += dt;
          if (elapsed >= DURATION) {
            mode = "failed";
            window.relayStageResult.status = "failed";
            reportFailed("시간 초과");
            return;
          }
          if (currentRow < ROWS.length) {
            const target = getSlotPos(currentRow, currentCol);
            const range = movingRange();
            movingCup.x += movingCup.dir * movingCup.speed * dt;
            if (movingCup.x > target.x + range) { movingCup.x = target.x + range; movingCup.dir = -1; }
            else if (movingCup.x < target.x - range) { movingCup.x = target.x - range; movingCup.dir = 1; }
          }
        }

        for (const cup of placedCups) {
          if (cup.bounceT > 0) cup.bounceT = Math.max(0, cup.bounceT - dt * 5);
          if (mode === "failed" && (cup.fallVx !== 0 || cup.fallVy !== 0)) {
            cup.fallVy += 500 * dt;
            cup.x += cup.fallVx * dt;
            cup.y += cup.fallVy * dt;
            cup.fallAngle += cup.fallVx * 0.004 * dt * 60;
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 250 * dt; p.life -= dt * 2.2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88;
        if (shake < 0.3) shake = 0;
      }

      function drawCup(x, y, highlight, angle) {
        ctx.save();
        if (angle) {
          ctx.translate(x, y + CUP_H / 2);
          ctx.rotate(angle);
          ctx.translate(-x, -(y + CUP_H / 2));
        }
        const topW = CUP_W * 1.12;
        const botW = CUP_W * 0.72;
        const color = highlight ? COL.accent : COL.cup;
        const dark = highlight ? COL.accentDark : COL.cupDark;
        const light = highlight ? "#c8efe8" : COL.cupLight;

        ctx.beginPath();
        ctx.moveTo(x - topW / 2, y);
        ctx.lineTo(x + topW / 2, y);
        ctx.lineTo(x + botW / 2, y + CUP_H);
        ctx.lineTo(x - botW / 2, y + CUP_H);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        ctx.beginPath();
        ctx.ellipse(x, y, topW / 2, 5, 0, 0, Math.PI * 2);
        ctx.fillStyle = light;
        ctx.fill();

        ctx.fillStyle = dark;
        const stripeW = topW - 10;
        ctx.fillRect(x - stripeW / 2, y + CUP_H * 0.32, stripeW, 3);
        ctx.fillRect(x - stripeW / 2 + 3, y + CUP_H * 0.52, stripeW - 6, 2);

        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.fillRect(x - topW / 2 + 5, y + 3, 5, CUP_H * 0.55);

        ctx.restore();
      }

      function drawTable() {
        const grad = ctx.createLinearGradient(0, TABLE_Y, 0, H);
        grad.addColorStop(0, COL.table);
        grad.addColorStop(1, COL.tableDark);
        ctx.fillStyle = grad;
        ctx.fillRect(0, TABLE_Y, W, H - TABLE_Y);
        ctx.fillStyle = COL.tableDark;
        ctx.fillRect(0, TABLE_Y, W, 4);
        ctx.strokeStyle = "rgba(160, 110, 60, 0.15)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          const gy = TABLE_Y + 16 + i * 18;
          ctx.beginPath();
          ctx.moveTo(60, gy);
          ctx.bezierCurveTo(W * 0.3, gy - 2, W * 0.7, gy + 2, W - 60, gy);
          ctx.stroke();
        }
      }

      function drawSlotGuides() {
        for (let r = 0; r < ROWS.length; r++) {
          for (let c = 0; c < ROWS[r]; c++) {
            const placed = placedCups.some(cup => cup.row === r && cup.col === c);
            if (placed) continue;
            const pos = getSlotPos(r, c);
            const isCurrent = r === currentRow && c === currentCol;
            ctx.globalAlpha = isCurrent ? 0.3 : 0.12;
            drawCup(pos.x, pos.y, isCurrent, 0);
          }
        }
        ctx.globalAlpha = 1;
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = "bold 18px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`컵: ${totalPlaced}/${TOTAL_CUPS}`, 24, 20);

        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.textAlign = "right";
        ctx.fillStyle = timeLeft < 10 ? COL.fail : COL.text;
        ctx.fillText(`${Math.ceil(timeLeft)}초`, W - 24, 20);

        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.fillRect(24, 46, W - 48, 4);
        ctx.fillStyle = COL.accent;
        ctx.fillRect(24, 46, (W - 48) * (totalPlaced / TOTAL_CUPS), 4);

        const rowNames = ["1단 (5개)", "2단 (3개)", "3단 (1개)"];
        if (currentRow < 3) {
          ctx.fillStyle = COL.textLight;
          ctx.font = "500 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(rowNames[currentRow], CX, 22);
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y); c.lineTo(x + w - r, y);
        c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r);
        c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h);
        c.arcTo(x, y + h, x, y + h - r, r);
        c.lineTo(x, y + r);
        c.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40);
        const lineH = 28;
        const cardH = 50 + lines.length * lineH + 44;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(255,248,231,0.95)";
        roundRect(ctx, cardX, cardY, cardW, cardH, 12);
        ctx.fill();

        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 16, cardY, cardW - 32, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 24px Trebuchet MS";
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "500 14px Trebuchet MS";
        ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 52 + i * lineH);
        }

        ctx.fillStyle = "rgba(74,55,40,0.35)";
        ctx.font = "400 13px Trebuchet MS";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 22);
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        ctx.fillStyle = COL.bg;
        ctx.fillRect(0, 0, W, H);

        if (!reducedMotion) {
          ctx.globalAlpha = 0.03; ctx.fillStyle = "#D4A574";
          for (let i = 0; i < 15; i++) {
            const px = (i * 157 + Math.floor(elapsed * 0.3) * 23) % W;
            const py = (i * 223 + Math.floor(elapsed * 0.3) * 31) % H;
            ctx.fillRect(px, py, 3, 3);
          }
          ctx.globalAlpha = 1;
        }

        drawTable();
        if (mode === "running") drawSlotGuides();

        for (const cup of placedCups) {
          const bounce = cup.bounceT > 0 ? Math.sin(cup.bounceT * Math.PI) * -12 : 0;
          drawCup(cup.x, cup.y + bounce, false, cup.fallAngle);
        }

        if (mode === "running" && currentRow < ROWS.length) {
          const my = getMovingCupY();
          ctx.setLineDash([6, 6]);
          ctx.strokeStyle = "rgba(74,55,40,0.12)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(movingCup.x, my + CUP_H);
          ctx.lineTo(movingCup.x, TABLE_Y);
          ctx.stroke();
          ctx.setLineDash([]);

          const swing = Math.sin(elapsed * 3.5) * 2;
          drawCup(movingCup.x, my + swing, false, 0);

          ctx.fillStyle = COL.textLight;
          ctx.font = "bold 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(movingCup.dir > 0 ? "→" : "←", movingCup.x, my - 14);
        }

        drawParticles();
        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") {
          ctx.fillStyle = "rgba(255,248,231,0.5)";
          ctx.fillRect(0, 0, W, H);
          drawCard("종이컵 쌓기", [
            "좌우로 움직이는 컵을 탭하여",
            "피라미드를 완성하세요!",
            "",
            "조작: 탭으로 컵 놓기",
            "클리어: 피라미드 3단 완성",
            "실패: 컵이 빗나가면 쓰러짐",
          ], COL.cup);
        } else if (mode === "clear") {
          clearAnim = clamp(clearAnim + 0.02, 0, 1);
          ctx.fillStyle = `rgba(255,248,231,${clearAnim * 0.5})`;
          ctx.fillRect(0, 0, W, H);
          if (clearAnim > 0.3) {
            drawCard("피라미드 완성!", [
              `${Math.ceil(elapsed)}초 만에 완료`,
              `컵 ${totalPlaced}개 적립 성공`,
            ], COL.success);
          }
        } else if (mode === "failed") {
          ctx.fillStyle = "rgba(80,40,20,0.25)";
          ctx.fillRect(0, 0, W, H);
          drawCard("쓰러졌다!", [
            elapsed >= DURATION ? "시간이 다했습니다" : "컵이 빗나갔습니다",
            `쌓은 컵: ${totalPlaced}/${TOTAL_CUPS}`,
          ], COL.fail);
        }
      }

      function handleTap() {
        if (mode !== "running") {
          reset(); mode = "running"; return;
        }
        placeCup();
      }

      canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); handleTap(); });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleTap(); }
      });

      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          totalPlaced, currentRow, currentCol,
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          totalPlaced = TOTAL_CUPS;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
