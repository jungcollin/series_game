<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>연못지기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Serif KR", "Georgia", serif;
        background: #2a4a3a; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 180, 120, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(30, 60, 40, 0.92);
        color: #e0f0e0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #c8dcc8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(80, 140, 80, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">연못지기. 잉어를 원형 궤도로 이끌어 연꽃 고리를 통과시키세요. 마우스 또는 터치로 잉어 유도, 모바일은 화면 터치와 드래그. 15마리를 고리에 통과시키면 성공. 왜가리에게 3마리 잡히면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="연못지기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "glass-aquarium-orbit-herding-witness",
        title: "연못지기",
        description: "잉어를 원형 궤도로 이끌어 연꽃 고리를 통과시키세요.",
        creator: "jungcollin",
        genre: "Herding puzzle",
        clearCondition: "15마리를 고리에 통과시키면 성공",
        failCondition: "왜가리에게 3마리 잡히면 실패",
        controls: "마우스 또는 터치로 잉어를 유도하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        water: "#a0c8b0",
        waterDeep: "#78a890",
        waterLight: "#d0e8d8",
        koi: "#e87830",
        koiWhite: "#f0e8d8",
        lilyPad: "#5a8a50",
        lilyFlower: "#e8c8d0",
        gate: "#c8a040",
        gateGlow: "rgba(200, 160, 64, 0.3)",
        heron: "#607068",
        heronShadow: "rgba(60, 70, 60, 0.25)",
        caught: "#a03020",
        text: "#2a3a2a",
        textLight: "rgba(42, 58, 42, 0.6)",
        accent: "#4a7a4a",
      };

      // --- State ---
      const DURATION = 45;
      const TARGET = 15;
      const MAX_CAUGHT = 3;
      const MAX_KOI = 6;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      let passed = 0;
      let caught = 0;
      let pointerPos = { x: CX, y: CY };

      // Koi fish
      let kois = [];

      // Ring gates (lily pads with gates)
      let gate = { x: 0, y: 0, r: 30, angle: 0, timer: 0 };

      // Lily pads (shadow cover)
      let lilyPads = [];

      // Heron
      let heron = { x: CX, y: 60, targetX: CX, scanAngle: 0, witnessTimer: 0 };

      // Witness gauge
      let witnessGauge = 0;

      let particles = [];
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      // Ripples
      let ripples = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Setup ---
      function spawnGate() {
        const angle = rand(0, Math.PI * 2);
        const r = rand(100, 200);
        gate.x = CX + Math.cos(angle) * r;
        gate.y = CY + 40 + Math.sin(angle) * r * 0.6;
        gate.x = clamp(gate.x, 80, W - 80);
        gate.y = clamp(gate.y, 120, H - 60);
        gate.timer = 0;
      }

      function spawnKoi() {
        const angle = rand(0, Math.PI * 2);
        const r = rand(60, 180);
        kois.push({
          x: CX + Math.cos(angle) * r,
          y: CY + 60 + Math.sin(angle) * r * 0.6,
          vx: rand(-20, 20), vy: rand(-10, 10),
          color: Math.random() < 0.4 ? COL.koiWhite : COL.koi,
          wobble: rand(0, Math.PI * 2),
          size: rand(8, 12),
          hidden: false,
        });
      }

      function buildLilyPads() {
        lilyPads = [];
        for (let i = 0; i < 7; i++) {
          lilyPads.push({
            x: rand(80, W - 80),
            y: rand(120, H - 60),
            r: rand(30, 50),
            rotation: rand(0, Math.PI * 2),
            hasFlower: Math.random() < 0.3,
          });
        }
      }

      function reset() {
        elapsed = 0; passed = 0; caught = 0; witnessGauge = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        pointerPos = { x: CX, y: CY };
        kois = []; particles = []; ripples = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        heron = { x: CX, y: 55, targetX: CX, scanAngle: 0, witnessTimer: 0 };
        buildLilyPads();
        spawnGate();
        for (let i = 0; i < 4; i++) spawnKoi();
      }

      function spawnParticles(x, y, count, color, sizeRange) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), sp = rand(20, 70);
          particles.push({
            x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, color, size: rand(sizeRange[0], sizeRange[1]),
          });
        }
      }

      function addRipple(x, y) {
        ripples.push({ x, y, r: 5, maxR: rand(20, 35), life: 1 });
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Koi spawning
        if (kois.length < MAX_KOI && Math.random() < dt * 0.8) spawnKoi();

        // Move koi toward pointer (herding)
        for (const k of kois) {
          k.wobble += dt * 2.5;
          const dx = pointerPos.x - k.x;
          const dy = pointerPos.y - k.y;
          const d = Math.hypot(dx, dy) || 1;

          // Koi flee from pointer if too close, follow if moderate distance
          const fleeR = 60;
          const followR = 200;
          if (d < fleeR) {
            k.vx -= (dx / d) * 180 * dt;
            k.vy -= (dy / d) * 180 * dt;
          } else if (d < followR) {
            k.vx += (dx / d) * 50 * dt;
            k.vy += (dy / d) * 50 * dt;
          }

          // Wobble
          k.vx += Math.cos(k.wobble) * 15 * dt;
          k.vy += Math.sin(k.wobble * 1.3) * 10 * dt;

          // Drag
          k.vx *= 0.97; k.vy *= 0.97;
          k.x += k.vx * dt;
          k.y += k.vy * dt;

          // Bounds (pond area)
          k.x = clamp(k.x, 30, W - 30);
          k.y = clamp(k.y, 90, H - 30);

          // Check if hidden under lily pad
          k.hidden = false;
          for (const lp of lilyPads) {
            if (dist(k.x, k.y, lp.x, lp.y) < lp.r - 5) {
              k.hidden = true; break;
            }
          }

          // Gate collision
          if (dist(k.x, k.y, gate.x, gate.y) < gate.r + k.size) {
            passed++;
            addRipple(k.x, k.y);
            spawnParticles(gate.x, gate.y, reducedMotion ? 3 : 6, COL.gate, [2, 4]);
            k.x = rand(60, W - 60);
            k.y = rand(150, H - 60);
            k.vx = 0; k.vy = 0;
            spawnGate();
          }
        }

        // Heron AI: scans across pond
        heron.scanAngle += dt * 0.6;
        heron.targetX = CX + Math.sin(heron.scanAngle) * (W * 0.35);
        heron.x = lerp(heron.x, heron.targetX, dt * 1.2);

        // Witness mechanic: heron sees exposed koi
        let visibleKoi = 0;
        for (const k of kois) {
          if (!k.hidden) {
            // Check if koi is roughly under the heron's gaze cone
            const hdist = Math.abs(k.x - heron.x);
            if (hdist < 120) visibleKoi++;
          }
        }

        if (visibleKoi > 0) {
          witnessGauge += dt * visibleKoi * 0.12;
        } else {
          witnessGauge = Math.max(0, witnessGauge - dt * 0.08);
        }

        // Heron strikes when gauge fills
        if (witnessGauge >= 1) {
          witnessGauge = 0;
          // Heron catches nearest visible koi
          let nearest = null, nearDist = Infinity;
          for (let i = 0; i < kois.length; i++) {
            if (kois[i].hidden) continue;
            const d = Math.abs(kois[i].x - heron.x);
            if (d < nearDist) { nearDist = d; nearest = i; }
          }
          if (nearest !== null) {
            const k = kois[nearest];
            caught++;
            shake = 6; flashAlpha = 0.3;
            spawnParticles(k.x, k.y, reducedMotion ? 3 : 7, COL.caught, [2, 5]);
            addRipple(k.x, k.y);
            kois.splice(nearest, 1);
          }
        }

        // Gate timeout: move gate if not reached
        gate.timer += dt;
        if (gate.timer > 8) spawnGate();

        // Ripples
        for (let i = ripples.length - 1; i >= 0; i--) {
          const r = ripples[i];
          r.r += dt * 30;
          r.life -= dt * 1.5;
          if (r.life <= 0) ripples.splice(i, 1);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.93; p.vy *= 0.93;
          p.life -= dt * 2.2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.9;

        // Win/lose
        if (passed >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared();
        } else if (caught >= MAX_CAUGHT) {
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("왜가리 포식");
        } else if (elapsed >= DURATION) {
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        drawPond();
        drawRipples();
        drawLilyPads();
        drawGate();
        drawKoi();
        drawHeronShadow();
        drawHeron();
        drawParticles();
        if (mode === "running") drawHUD();

        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(160, 48, 32, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawPond() {
        // Jade green water
        const bg = ctx.createRadialGradient(CX, CY + 30, 50, CX, CY + 30, 400);
        bg.addColorStop(0, COL.waterLight);
        bg.addColorStop(0.6, COL.water);
        bg.addColorStop(1, COL.waterDeep);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Subtle water texture
        if (!reducedMotion) {
          ctx.globalAlpha = 0.04;
          ctx.fillStyle = "#4a6a5a";
          const t = Math.floor(elapsed * 0.3);
          for (let i = 0; i < 20; i++) {
            const px = ((i * 137 + t * 31) % W);
            const py = ((i * 211 + t * 47) % H);
            ctx.fillRect(px, py, rand(3, 8), 1);
          }
          ctx.globalAlpha = 1;
        }

        // Pond edge (bank)
        ctx.fillStyle = "#8aaa80";
        ctx.fillRect(0, 0, W, 80);
        const bankGrad = ctx.createLinearGradient(0, 60, 0, 95);
        bankGrad.addColorStop(0, "#8aaa80");
        bankGrad.addColorStop(1, COL.water);
        ctx.fillStyle = bankGrad;
        ctx.fillRect(0, 60, W, 35);
      }

      function drawRipples() {
        for (const r of ripples) {
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(255, 255, 255, ${r.life * 0.3})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }

      function drawLilyPads() {
        for (const lp of lilyPads) {
          ctx.save();
          ctx.translate(lp.x, lp.y);
          ctx.rotate(lp.rotation);
          ctx.beginPath();
          ctx.arc(0, 0, lp.r, 0.15, Math.PI * 2 - 0.15);
          ctx.lineTo(0, 0); ctx.closePath();
          ctx.fillStyle = COL.lilyPad; ctx.globalAlpha = 0.6; ctx.fill(); ctx.globalAlpha = 1;
          // Veins
          ctx.strokeStyle = "rgba(80, 120, 70, 0.3)"; ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
            const va = (i / 4) * Math.PI * 2 + 0.3;
            ctx.beginPath(); ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(va) * lp.r * 0.8, Math.sin(va) * lp.r * 0.8); ctx.stroke();
          }
          if (lp.hasFlower) {
            for (let p = 0; p < 5; p++) {
              const pa = (p / 5) * Math.PI * 2;
              ctx.beginPath();
              ctx.ellipse(Math.cos(pa) * 8, Math.sin(pa) * 8, 6, 4, pa, 0, Math.PI * 2);
              ctx.fillStyle = COL.lilyFlower; ctx.globalAlpha = 0.7; ctx.fill(); ctx.globalAlpha = 1;
            }
            ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fillStyle = "#e8d080"; ctx.fill();
          }
          ctx.restore();
        }
      }

      function drawGate() {
        // Ring gate (golden ring in the water)
        const pulse = Math.sin(elapsed * 3) * 3;
        ctx.beginPath();
        ctx.arc(gate.x, gate.y, gate.r + pulse, 0, Math.PI * 2);
        ctx.fillStyle = COL.gateGlow;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(gate.x, gate.y, gate.r, 0, Math.PI * 2);
        ctx.strokeStyle = COL.gate;
        ctx.lineWidth = 3;
        ctx.stroke();

        // Inner shimmer
        ctx.beginPath();
        ctx.arc(gate.x, gate.y, gate.r - 5, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(200, 160, 64, 0.3)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      function drawKoi() {
        for (const k of kois) {
          ctx.save();
          const angle = Math.atan2(k.vy, k.vx);
          ctx.translate(k.x, k.y); ctx.rotate(angle);
          ctx.beginPath(); ctx.ellipse(0, 0, k.size, k.size * 0.5, 0, 0, Math.PI * 2);
          ctx.fillStyle = k.color; ctx.globalAlpha = k.hidden ? 0.3 : 0.85; ctx.fill();
          const tailWag = Math.sin(k.wobble * 3) * 0.3;
          ctx.beginPath(); ctx.moveTo(-k.size, 0);
          ctx.lineTo(-k.size - 6, -4 + tailWag * 4);
          ctx.lineTo(-k.size - 6, 4 + tailWag * 4); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.arc(k.size * 0.5, -k.size * 0.15, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = "#1a1a1a"; ctx.globalAlpha = k.hidden ? 0.2 : 0.8; ctx.fill();
          ctx.globalAlpha = 1; ctx.restore();
        }
      }

      function drawHeronShadow() {
        // Shadow on water below heron
        ctx.beginPath();
        ctx.ellipse(heron.x, 110, 60, 15, 0, 0, Math.PI * 2);
        ctx.fillStyle = COL.heronShadow;
        ctx.fill();

        // Gaze cone (subtle)
        ctx.beginPath();
        ctx.moveTo(heron.x, 80);
        ctx.lineTo(heron.x - 100, H);
        ctx.lineTo(heron.x + 100, H);
        ctx.closePath();
        ctx.fillStyle = `rgba(60, 70, 60, ${0.03 + witnessGauge * 0.06})`;
        ctx.fill();
      }

      function drawHeron() {
        const hx = heron.x, hy = heron.y;
        ctx.beginPath(); ctx.ellipse(hx, hy, 18, 12, 0, 0, Math.PI * 2);
        ctx.fillStyle = COL.heron; ctx.fill();
        ctx.beginPath(); ctx.moveTo(hx + 8, hy - 6);
        ctx.quadraticCurveTo(hx + 14, hy - 22, hx + 6, hy - 30);
        ctx.strokeStyle = COL.heron; ctx.lineWidth = 4; ctx.stroke();
        ctx.beginPath(); ctx.arc(hx + 5, hy - 32, 5, 0, Math.PI * 2);
        ctx.fillStyle = COL.heron; ctx.fill();
        ctx.beginPath(); ctx.moveTo(hx + 9, hy - 33);
        ctx.lineTo(hx + 20, hy - 30); ctx.lineTo(hx + 9, hy - 29); ctx.closePath();
        ctx.fillStyle = "#c8a040"; ctx.fill();
        const eyeColor = witnessGauge > 0.5 ? `rgba(200, 50, 30, ${0.5 + witnessGauge * 0.5})` : "#1a1a1a";
        ctx.beginPath(); ctx.arc(hx + 7, hy - 33, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = eyeColor; ctx.fill();
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
          ctx.fill(); ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px "Noto Serif KR", serif`;
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`${passed} / ${TARGET}`, 24, 20);

        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(Math.max(0, DURATION - elapsed))}`, W - 24, 20);

        // Witness gauge bar
        const barW = 80, barH = 6;
        const barX = CX - barW / 2, barY = 20;
        ctx.fillStyle = "rgba(42, 58, 42, 0.15)";
        ctx.fillRect(barX, barY, barW, barH);
        const wCol = witnessGauge > 0.7 ? COL.caught : COL.heron;
        ctx.fillStyle = wCol;
        ctx.fillRect(barX, barY, barW * clamp(witnessGauge, 0, 1), barH);

        // Caught dots
        const dotY = H - 24;
        for (let i = 0; i < MAX_CAUGHT; i++) {
          const dotX = CX - (MAX_CAUGHT - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_CAUGHT - caught ? COL.accent : "#c0d0c0";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(220, 238, 220, 0.95)";
        ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 8); ctx.fill();

        ctx.fillStyle = accent || COL.accent;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = `bold 22px "Noto Serif KR", serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = `400 14px "Noto Serif KR", serif`;
        ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);

        ctx.fillStyle = "rgba(42, 58, 42, 0.35)";
        ctx.font = `400 13px "Noto Serif KR", serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(200, 220, 200, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("연못지기", [
          "잉어를 원형 궤도로 이끌어",
          "연꽃 고리를 통과시키세요",
          "",
          "조작: 터치/클릭으로 잉어 유도",
          "클리어: 15마리 고리 통과",
          "실패: 왜가리에게 3마리 잡힘",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(200, 220, 200, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("연못 평화", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `잡힌 잉어: ${caught}마리`,
          ], COL.accent);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(40, 50, 40, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("왜가리 승리", [
          elapsed >= DURATION ? "시간이 다했습니다" : "잉어가 너무 많이 잡혔습니다",
          `통과: ${passed} / ${TARGET}`,
        ], COL.caught);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        pointerPos = getCanvasPos(e.clientX, e.clientY);
        addRipple(pointerPos.x, pointerPos.y);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running") return;
        pointerPos = getCanvasPos(e.clientX, e.clientY);
      });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          passed, caught, witnessGauge: +witnessGauge.toFixed(2),
          kois: kois.length, result: window.relayStageResult.status,
        });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running"; passed = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running"; caught = MAX_CAUGHT;
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      buildLilyPads(); spawnGate();
      for (let i = 0; i < 4; i++) spawnKoi();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
