<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>버블 팝</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">버블 팝. 캔버스를 터치하거나 Enter로 시작하세요. 마우스 클릭 또는 터치로 떨어지는 버블을 터뜨리세요.</p>
    <canvas id="game" width="960" height="540" aria-label="버블 팝" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("bubble-pop") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      // Game constants
      const TIME_LIMIT = 30;
      const CLEAR_COUNT = 25;
      const MAX_FLOOR = 3;
      const BUBBLE_MIN_R = 22;
      const BUBBLE_MAX_R = 38;
      const BUBBLE_COLORS = [
        { fill: "#ef4444", glow: "rgba(239,68,68,0.3)" },
        { fill: "#3b82f6", glow: "rgba(59,130,246,0.3)" },
        { fill: "#22c55e", glow: "rgba(34,197,94,0.3)" },
        { fill: "#f59e0b", glow: "rgba(245,158,11,0.3)" },
        { fill: "#a855f7", glow: "rgba(168,85,247,0.3)" },
        { fill: "#ec4899", glow: "rgba(236,72,153,0.3)" },
      ];
      const SPAWN_BASE = 0.7;
      const SPEED_BASE = 60;
      const SPEED_VAR = 40;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        bubbles: [],
        popped: 0,
        floorCount: 0,
        nextSpawn: 0,
        effects: [],
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.bubbles = [];
        state.popped = 0;
        state.floorCount = 0;
        state.nextSpawn = 0.3;
        state.effects = [];
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function spawnBubble() {
        const r = BUBBLE_MIN_R + Math.random() * (BUBBLE_MAX_R - BUBBLE_MIN_R);
        const x = r + Math.random() * (VIEW.width - r * 2);
        const colorIdx = Math.floor(Math.random() * BUBBLE_COLORS.length);
        const speedMult = 1 + state.elapsed / 40;
        state.bubbles.push({
          x,
          y: -r,
          r,
          color: colorIdx,
          speed: (SPEED_BASE + Math.random() * SPEED_VAR) * speedMult,
          wobblePhase: Math.random() * Math.PI * 2,
          wobbleAmp: 15 + Math.random() * 20,
          alive: true,
        });
      }

      function addPopEffect(x, y, colorIdx) {
        const count = 6;
        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2;
          state.effects.push({
            x, y,
            vx: Math.cos(angle) * (80 + Math.random() * 60),
            vy: Math.sin(angle) * (80 + Math.random() * 60),
            life: 0.4,
            maxLife: 0.4,
            r: 4 + Math.random() * 4,
            color: BUBBLE_COLORS[colorIdx].fill,
          });
        }
      }

      function handleClick(canvasX, canvasY) {
        if (state.mode !== "running") {
          startFromTouch();
          return;
        }

        // Convert canvas pixel coords to game coords
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        const gx = canvasX * scaleX;
        const gy = canvasY * scaleY;

        // Check bubbles from front (last) to back (first) for click
        for (let i = state.bubbles.length - 1; i >= 0; i--) {
          const b = state.bubbles[i];
          if (!b.alive) continue;
          const dx = gx - b.x;
          const dy = gy - b.y;
          if (dx * dx + dy * dy <= b.r * b.r * 1.3) {
            b.alive = false;
            state.popped++;
            addPopEffect(b.x, b.y, b.color);

            if (state.popped >= CLEAR_COUNT) {
              clearStage();
            }
            return;
          }
        }
      }

      function update(dt) {
        if (state.mode !== "running") return;
        state.elapsed += dt;

        // Spawn
        if (state.elapsed >= state.nextSpawn) {
          spawnBubble();
          const spawnInterval = Math.max(0.25, SPAWN_BASE - state.elapsed / 80);
          state.nextSpawn = state.elapsed + spawnInterval * (0.7 + Math.random() * 0.6);
        }

        // Move bubbles
        for (const b of state.bubbles) {
          if (!b.alive) continue;
          b.y += b.speed * dt;
          b.x += Math.sin(state.elapsed * 2 + b.wobblePhase) * b.wobbleAmp * dt;
          b.x = Math.max(b.r, Math.min(VIEW.width - b.r, b.x));

          // Hit floor
          if (b.y - b.r > VIEW.height) {
            b.alive = false;
            state.floorCount++;
            if (state.floorCount >= MAX_FLOOR) {
              failStage("버블이 바닥에 3개 닿음");
              return;
            }
          }
        }

        // Clean dead bubbles
        state.bubbles = state.bubbles.filter(b => b.alive || b.y < VIEW.height + 100);

        // Update effects
        for (const e of state.effects) {
          e.x += e.vx * dt;
          e.y += e.vy * dt;
          e.vy += 200 * dt;
          e.life -= dt;
        }
        state.effects = state.effects.filter(e => e.life > 0);

        // Time up
        if (state.elapsed >= TIME_LIMIT) {
          if (state.popped >= CLEAR_COUNT) {
            clearStage();
          } else {
            failStage("시간 초과");
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.92)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardW = Math.min(680, VIEW.width - 40);
        const cardX = (VIEW.width - cardW) / 2;
        const cardY = 80;
        const cardH = 380;

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.beginPath();
        ctx.roundRect(cardX, cardY, cardW, cardH, 16);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(cardX, cardY, cardW, cardH, 16);
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = "700 38px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, cardY + 58);

        ctx.fillStyle = "#1e293b";
        ctx.font = "600 20px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, cardY + 112 + index * 38);
        });
        ctx.textAlign = "left";
      }

      function drawBubble(b) {
        const c = BUBBLE_COLORS[b.color];
        // Glow
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r + 6, 0, Math.PI * 2);
        ctx.fillStyle = c.glow;
        ctx.fill();

        // Main bubble
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = c.fill;
        ctx.fill();

        // Highlight
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.3, b.r * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fill();

        // Small highlight
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.1, b.y - b.r * 0.5, b.r * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.fill();
      }

      function render() {
        if (state.mode === "menu") {
          renderCard("버블 팝", [
            "떨어지는 버블을 클릭/터치해서 터뜨리세요!",
            "",
            "조작: 마우스 클릭 또는 터치",
            "클리어: 30초 안에 버블 25개 터뜨리면 클리어",
            "실패: 버블이 바닥에 3개 닿으면 실패",
            "",
            "Enter 또는 터치로 시작",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          // Background gradient
          const grad = ctx.createLinearGradient(0, 0, 0, VIEW.height);
          grad.addColorStop(0, "#0c1222");
          grad.addColorStop(1, "#1a1a3e");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          // Stars
          ctx.fillStyle = "rgba(255,255,255,0.15)";
          for (let i = 0; i < 30; i++) {
            const sx = ((i * 137 + 50) % VIEW.width);
            const sy = ((i * 97 + 30) % (VIEW.height - 60));
            ctx.fillRect(sx, sy, 2, 2);
          }

          // Bubbles
          for (const b of state.bubbles) {
            if (b.alive) drawBubble(b);
          }

          // Pop effects
          for (const e of state.effects) {
            ctx.globalAlpha = e.life / e.maxLife;
            ctx.beginPath();
            ctx.arc(e.x, e.y, e.r * (e.life / e.maxLife), 0, Math.PI * 2);
            ctx.fillStyle = e.color;
            ctx.fill();
          }
          ctx.globalAlpha = 1;

          // HUD - popped count
          ctx.fillStyle = "#f8fafc";
          ctx.font = "700 24px Trebuchet MS";
          ctx.textAlign = "left";
          ctx.fillText(`${state.popped} / ${CLEAR_COUNT}`, 20, 35);

          // HUD - floor warning
          ctx.fillStyle = state.floorCount >= 2 ? "#ef4444" : "#94a3b8";
          ctx.font = "600 18px Trebuchet MS";
          ctx.fillText(`놓침: ${state.floorCount} / ${MAX_FLOOR}`, 20, 60);

          // HUD - timer
          const timeLeft = Math.max(0, TIME_LIMIT - state.elapsed);
          ctx.fillStyle = timeLeft <= 5 ? "#ef4444" : "#f8fafc";
          ctx.font = "700 24px Trebuchet MS";
          ctx.textAlign = "right";
          ctx.fillText(`${Math.ceil(timeLeft)}초`, VIEW.width - 20, 35);

          // Progress bar
          const barW = 160;
          const barH = 6;
          const barX = (VIEW.width - barW) / 2;
          const barY = 16;
          const progress = Math.min(1, state.popped / CLEAR_COUNT);
          ctx.fillStyle = "rgba(248,250,252,0.15)";
          ctx.beginPath();
          ctx.roundRect(barX, barY, barW, barH, 3);
          ctx.fill();
          ctx.fillStyle = progress >= 1 ? "#22c55e" : "#3b82f6";
          ctx.beginPath();
          ctx.roundRect(barX, barY, barW * progress, barH, 3);
          ctx.fill();

          ctx.textAlign = "left";
          return;
        }

        if (state.mode === "failed") {
          renderCard("실패!", [
            state.floorCount >= MAX_FLOOR ? "버블이 바닥에 3개 닿음!" : "시간 초과!",
            "",
            `터뜨린 버블: ${state.popped} / ${CLEAR_COUNT}`,
            `놓친 버블: ${state.floorCount}`,
            "",
            "Enter 또는 터치로 재도전",
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
          renderCard("클리어!", [
            "축하합니다!",
            "",
            `터뜨린 버블: ${state.popped}`,
            `클리어 시간: ${state.lastRunTime.toFixed(1)}초`,
          ], "#15803d");
          return;
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "canvas 960x540, bubbles fall from top",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          popped: state.popped,
          target: CLEAR_COUNT,
          floorCount: state.floorCount,
          maxFloor: MAX_FLOOR,
          activeBubbles: state.bubbles.filter(b => b.alive).length,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function getCanvasCoords(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: event.clientX - rect.left,
          y: event.clientY - rect.top,
        };
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode !== "running") {
          event.preventDefault();
          startStage();
        }
      }

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        handleClick(event.clientX - rect.left, event.clientY - rect.top);
      });

      canvas.addEventListener("touchstart", (event) => {
        event.preventDefault();
        if (state.mode !== "running") {
          startFromTouch();
          return;
        }
        for (const touch of event.changedTouches) {
          const rect = canvas.getBoundingClientRect();
          handleClick(touch.clientX - rect.left, touch.clientY - rect.top);
        }
      }, { passive: false });

      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "bubble-pop",
        title: "버블 팝",
        creator: "Claude",
        genre: "Arcade",
        clearCondition: "30초 안에 버블 25개 터뜨리면 클리어",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
