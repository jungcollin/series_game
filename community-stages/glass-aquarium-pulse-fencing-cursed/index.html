<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Glass Aquarium: Pulse Fence</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 18%, rgba(97, 232, 255, 0.12), transparent 28%),
          radial-gradient(circle at 84% 8%, rgba(255, 125, 120, 0.14), transparent 25%),
          linear-gradient(180deg, #041720, #021018);
      }

      body {
        display: grid;
        place-items: center;
        touch-action: none;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(5, 17, 24, 0.92);
        color: #f8feff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 50% 46%, rgba(111, 240, 255, 0.1), transparent 28%),
          linear-gradient(180deg, rgba(10, 53, 74, 0.95), rgba(2, 14, 23, 0.98));
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Glass Aquarium: Pulse Fence. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 포인터·터치 드래그로 방패 회전, 탭으로 순간 증폭, 픽업 전 페널티 확인 이며, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현합니다.
      클리어 조건은 저주를 견디며 20연속 파형 반사, 실패 조건은 저주 한계 초과 또는 같은 문양 3회 누적 입니다.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Glass Aquarium: Pulse Fence" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: window.innerWidth, height: window.innerHeight, dpr: 1 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext = window.RelayRuntime?.readContext("glass-aquarium-pulse-fencing-cursed") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const SYMBOLS = [
        { id: "pearl", label: "진주", color: "#85e8ff", glow: "rgba(133, 232, 255, 0.65)" },
        { id: "coral", label: "산호", color: "#ff947a", glow: "rgba(255, 148, 122, 0.68)" },
        { id: "iris", label: "홍채", color: "#ffc878", glow: "rgba(255, 200, 120, 0.62)" },
        { id: "thorn", label: "가시", color: "#d59cff", glow: "rgba(213, 156, 255, 0.62)" },
      ];
      const SYMBOL_BY_ID = Object.fromEntries(SYMBOLS.map((symbol) => [symbol.id, symbol]));
      const HUD_LABEL_FULL = "포인터·터치 드래그로 방패 회전, 탭으로 순간 증폭, 픽업 전 페널티 확인";
      const HUD_LABEL_COMPACT = "터치 드래그 회전 · 탭 증폭";
      const SAFE_PICKUPS = [
        {
          id: "buffer-coral",
          name: "완충 산호",
          badge: "안전",
          accent: "#87f0ff",
          boon: "저주 압력 -18",
          penalty: "속류 5초 + 압력 6",
        },
        {
          id: "fin-prism",
          name: "지느러미 프리즘",
          badge: "안전",
          accent: "#9fe6ff",
          boon: "다음 4회 방패 폭 증가",
          penalty: "조류 왜곡 6초 + 압력 8",
        },
        {
          id: "jelly-vent",
          name: "정화 해파리",
          badge: "안전",
          accent: "#b8ffde",
          boon: "가장 높은 문양 -1, 감속 3회",
          penalty: "강타 1회 예약 + 압력 7",
        },
      ];
      const RISK_PICKUPS = [
        {
          id: "abyss-pearl",
          name: "심해 진주",
          badge: "고위험",
          accent: "#ffd286",
          boon: "문양 전부 제거, 자동 증폭 3회",
          penalty: "방패 협착 8초 + 압력 24",
        },
        {
          id: "fracture-lens",
          name: "균열 렌즈",
          badge: "고위험",
          accent: "#ffb39f",
          boon: "압력 -8, 감속 4회",
          penalty: "문양 1개 주입, 강타 2회, 압력 18",
        },
        {
          id: "current-pin",
          name: "전류 핀",
          badge: "고위험",
          accent: "#f4a6ff",
          boon: "방패 폭 5회 증가, 자동 증폭 2회",
          penalty: "조류 왜곡 8초, 속류 8초, 압력 22",
        },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let accumulator = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      let pointerState = {
        active: false,
        id: null,
        x: 0,
        y: 0,
        startX: 0,
        startY: 0,
        startedAt: 0,
        moved: false,
      };

      const keyboard = {
        left: false,
        right: false,
      };

      const ambient = {
        bubbles: [],
        fish: [],
        motes: [],
      };

      const state = {
        mode: "menu",
        sceneTime: 0,
        elapsed: 0,
        lastRunTime: 0,
        chain: 0,
        bestChain: 0,
        curseLoad: 12,
        curseCap: 100,
        shieldAngle: -Math.PI / 2,
        boostTimer: 0,
        boostCooldown: 0,
        autoBoostCharges: 0,
        widenCharges: 0,
        slowCharges: 0,
        forcedSurgeWaves: 0,
        spawnTimer: 0.8,
        waves: [],
        particles: [],
        ripples: [],
        popups: [],
        residues: {},
        modifiers: {
          hasten: 0,
          drift: 0,
          narrow: 0,
        },
        pickupOptions: [],
        pickupBounds: [],
        choiceHover: -1,
        nextPickupAt: 4,
        screenShake: 0,
        flash: 0,
        glassCrack: 0,
        lastMessage: "문양 파형을 읽고 반사하세요.",
        failReason: "",
        pickupQueued: false,
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function wrapAngle(angle) {
        while (angle <= -Math.PI) angle += Math.PI * 2;
        while (angle > Math.PI) angle -= Math.PI * 2;
        return angle;
      }

      function shortestAngle(a, b) {
        return wrapAngle(a - b);
      }

      function rand(min = 0, max = 1) {
        return lerp(min, max, Math.random());
      }

      function choice(list) {
        return list[Math.floor(Math.random() * list.length)];
      }

      function createResidues() {
        return {
          pearl: 0,
          coral: 0,
          iris: 0,
          thorn: 0,
        };
      }

      function getArena() {
        const size = Math.min(VIEW.width, VIEW.height);
        return {
          cx: VIEW.width * 0.5,
          cy: VIEW.height * 0.54,
          outerRadius: size * 0.46,
          shieldRadius: size * 0.235,
          ringRadius: size * 0.33,
          coreRadius: size * 0.086,
          panelX: Math.max(18, VIEW.width * 0.045),
          panelY: Math.max(18, VIEW.height * 0.04),
        };
      }

      function resizeCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        VIEW.width = Math.max(320, window.innerWidth);
        VIEW.height = Math.max(320, window.innerHeight);
        VIEW.dpr = dpr;
        canvas.width = Math.round(VIEW.width * dpr);
        canvas.height = Math.round(VIEW.height * dpr);
        canvas.style.width = `${VIEW.width}px`;
        canvas.style.height = `${VIEW.height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        primeAmbient();
      }

      function primeAmbient() {
        const bubbleCount = REDUCED_MOTION ? 12 : 20;
        const fishCount = REDUCED_MOTION ? 1 : 2;
        ambient.bubbles = Array.from({ length: bubbleCount }, () => ({
          x: rand(0, VIEW.width),
          y: rand(0, VIEW.height),
          r: rand(1.4, 5.4),
          speed: rand(12, 42),
          drift: rand(-16, 16),
          phase: rand(0, Math.PI * 2),
          alpha: rand(0.16, 0.42),
        }));
        ambient.fish = Array.from({ length: fishCount }, (_, index) => ({
          x: rand(-VIEW.width * 0.2, VIEW.width * 1.2),
          y: VIEW.height * (0.25 + index * 0.15) + rand(-20, 20),
          speed: rand(16, 34) * (index % 2 === 0 ? 1 : -1),
          scale: rand(0.7, 1.25),
          alpha: rand(0.06, 0.11),
        }));
        ambient.motes = Array.from({ length: 10 }, () => ({
          x: rand(0, VIEW.width),
          y: rand(0, VIEW.height),
          size: rand(14, 48),
          alpha: rand(0.03, 0.08),
          drift: rand(-6, 6),
          phase: rand(0, Math.PI * 2),
        }));
      }

      function roundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function wrapCanvasText(text, x, y, maxWidth, lineHeight) {
        const words = String(text).split(" ");
        let line = "";
        let offsetY = 0;
        words.forEach((word, index) => {
          const probe = line ? `${line} ${word}` : word;
          if (ctx.measureText(probe).width > maxWidth && line) {
            ctx.fillText(line, x, y + offsetY);
            line = word;
            offsetY += lineHeight;
          } else {
            line = probe;
          }
          if (index === words.length - 1 && line) {
            ctx.fillText(line, x, y + offsetY);
          }
        });
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.chain = 0;
        state.bestChain = 0;
        state.curseLoad = 12;
        state.shieldAngle = -Math.PI / 2;
        state.boostTimer = 0;
        state.boostCooldown = 0;
        state.autoBoostCharges = 0;
        state.widenCharges = 0;
        state.slowCharges = 0;
        state.forcedSurgeWaves = 0;
        state.spawnTimer = 0.45;
        state.waves = [];
        state.particles = [];
        state.ripples = [];
        state.popups = [];
        state.residues = createResidues();
        state.modifiers = { hasten: 0, drift: 0, narrow: 0 };
        state.pickupOptions = [];
        state.pickupBounds = [];
        state.choiceHover = -1;
        state.nextPickupAt = 4;
        state.screenShake = 0;
        state.flash = 0;
        state.glassCrack = 0;
        state.lastMessage = "첫 파형이 접근합니다.";
        state.failReason = "";
        state.pickupQueued = false;
        hostFailedReported = false;
        hostClearedReported = false;
        spawnWave(true);
        window.relayStageResult.status = "running";
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.failReason = reason;
        state.lastMessage = reason === "sigil-stack" ? "같은 문양이 세 번 박혔습니다." : "저주 압력이 한계선을 넘었습니다.";
        state.screenShake = Math.max(state.screenShake, 16);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.lastMessage = "수조 코어가 안정을 되찾았습니다.";
        state.flash = 1;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function makePopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          vy: -24,
          life: 1,
          color,
        });
      }

      function spawnBurst(x, y, color, count, spread = 1) {
        for (let index = 0; index < count; index += 1) {
          const angle = rand(-Math.PI, Math.PI);
          const speed = rand(40, 180) * spread;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.35, 0.9),
            radius: rand(2, 8),
            color,
          });
        }
      }

      function spawnRipple(x, y, color, baseRadius = 18) {
        state.ripples.push({
          x,
          y,
          radius: baseRadius,
          width: 12,
          life: 0.48,
          color,
        });
      }

      function getShieldAngle() {
        const drift = state.modifiers.drift > 0 ? Math.sin(state.sceneTime * 2.7) * 0.18 : 0;
        return wrapAngle(state.shieldAngle + drift);
      }

      function getShieldHalfArc() {
        let value = 0.32;
        if (state.widenCharges > 0) {
          value += 0.1;
        }
        if (state.modifiers.narrow > 0) {
          value -= 0.11;
        }
        return clamp(value, 0.18, 0.52);
      }

      function getProgress() {
        return clamp(state.chain / 20, 0, 1);
      }

      function getSpawnInterval() {
        const progress = getProgress();
        const hasteFactor = state.modifiers.hasten > 0 ? 0.88 : 1;
        return lerp(1.08, 0.46, progress) * hasteFactor;
      }

      function getWaveSpeed() {
        const progress = getProgress();
        const hasteFactor = state.modifiers.hasten > 0 ? 1.2 : 1;
        return lerp(122, 238, progress) * hasteFactor;
      }

      function activateBoost() {
        if (state.mode !== "running" || state.boostCooldown > 0) {
          return;
        }
        state.boostTimer = 0.28;
        state.boostCooldown = 0.58;
        state.flash = Math.max(state.flash, 0.45);
        state.lastMessage = "증폭 장막 전개";
        const arena = getArena();
        const angle = getShieldAngle();
        const x = arena.cx + Math.cos(angle) * arena.shieldRadius;
        const y = arena.cy + Math.sin(angle) * arena.shieldRadius;
        spawnBurst(x, y, "rgba(255, 233, 171, 0.95)", REDUCED_MOTION ? 8 : 16, 0.9);
        spawnRipple(x, y, "rgba(255, 223, 153, 0.78)", 14);
      }

      function spawnWave(immediate = false) {
        const arena = getArena();
        const progress = getProgress();
        const baseAngle = rand(0, Math.PI * 2);
        const burstCount =
          progress > 0.72 ? (Math.random() < 0.46 ? 2 : 1) :
          progress > 0.42 ? (Math.random() < 0.28 ? 2 : 1) :
          1;

        for (let index = 0; index < burstCount; index += 1) {
          const symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
          const offset = burstCount === 2 ? (index === 0 ? -0.34 : 0.34) : 0;
          const requireBoost = state.forcedSurgeWaves > 0
            ? ((state.forcedSurgeWaves -= 1), true)
            : Math.random() < lerp(0.12, 0.55, progress);
          const speedMultiplier = state.slowCharges > 0 ? 0.82 : 1;
          if (state.slowCharges > 0) {
            state.slowCharges -= 1;
          }
          state.waves.push({
            angle: wrapAngle(baseAngle + offset),
            radius: immediate ? arena.outerRadius * 0.96 : arena.outerRadius + rand(18, 60),
            speed: getWaveSpeed() * speedMultiplier,
            symbolId: symbol.id,
            requireBoost,
            reflected: false,
            dead: false,
            hold: immediate ? 0.05 : index * 0.14,
            alpha: 1,
            pulse: rand(0, Math.PI * 2),
          });
        }
      }

      function addResidue(symbolId, amount = 1) {
        state.residues[symbolId] = (state.residues[symbolId] || 0) + amount;
        const total = state.residues[symbolId];
        const arena = getArena();
        const symbol = SYMBOL_BY_ID[symbolId];
        makePopup(`${symbol.label} 침식 +${amount}`, arena.cx, arena.cy + 18, symbol.color);
        spawnBurst(arena.cx, arena.cy, symbol.glow, REDUCED_MOTION ? 8 : 18, 0.65);
        state.glassCrack = clamp(state.glassCrack + 0.24, 0, 1);
        if (total >= 3) {
          failStage("sigil-stack");
        }
      }

      function reduceHighestResidue() {
        const entries = Object.entries(state.residues).sort((a, b) => b[1] - a[1]);
        const target = entries.find((entry) => entry[1] > 0);
        if (target) {
          state.residues[target[0]] -= 1;
          return target[0];
        }
        return null;
      }

      function applyPickup(option) {
        let summary = option.name;

        switch (option.id) {
          case "buffer-coral":
            state.curseLoad = Math.max(0, state.curseLoad - 18);
            state.modifiers.hasten = Math.max(state.modifiers.hasten, 5);
            state.curseLoad += 6;
            summary = "완충 산호: 압력 완화, 대신 속류 발생";
            break;
          case "fin-prism":
            state.widenCharges += 4;
            state.modifiers.drift = Math.max(state.modifiers.drift, 6);
            state.curseLoad += 8;
            summary = "지느러미 프리즘: 방패가 넓어졌지만 조류가 흔들립니다";
            break;
          case "jelly-vent": {
            const reduced = reduceHighestResidue();
            state.slowCharges += 3;
            state.forcedSurgeWaves += 1;
            state.curseLoad += 7;
            summary = reduced
              ? `정화 해파리: ${SYMBOL_BY_ID[reduced].label} 침식을 낮췄습니다`
              : "정화 해파리: 잔류 문양은 없지만 다음 강타가 예약됐습니다";
            break;
          }
          case "abyss-pearl":
            state.residues = createResidues();
            state.autoBoostCharges += 3;
            state.modifiers.narrow = Math.max(state.modifiers.narrow, 8);
            state.curseLoad += 24;
            summary = "심해 진주: 코어는 깨끗해졌지만 방패가 좁아집니다";
            break;
          case "fracture-lens":
            state.curseLoad = Math.max(0, state.curseLoad - 8);
            state.slowCharges += 4;
            addResidue(choice(SYMBOLS).id, 1);
            state.forcedSurgeWaves += 2;
            state.curseLoad += 18;
            summary = "균열 렌즈: 느려졌지만 다른 문양이 코어에 스며듭니다";
            break;
          case "current-pin":
            state.widenCharges += 5;
            state.autoBoostCharges += 2;
            state.modifiers.drift = Math.max(state.modifiers.drift, 8);
            state.modifiers.hasten = Math.max(state.modifiers.hasten, 8);
            state.curseLoad += 22;
            summary = "전류 핀: 넓어졌지만 수조 흐름이 거칠어졌습니다";
            break;
          default:
            break;
        }

        state.lastMessage = summary;
        state.pickupQueued = false;
        state.mode = state.mode === "failed" ? "failed" : "running";
        state.pickupOptions = [];
        state.pickupBounds = [];
        state.choiceHover = -1;
        if (state.curseLoad >= state.curseCap) {
          failStage("curse-overflow");
        }
        makePopup(option.badge === "고위험" ? "위험한 증폭" : "안정 선택", VIEW.width * 0.5, VIEW.height * 0.18, option.accent);
        spawnBurst(VIEW.width * 0.5, VIEW.height * 0.26, option.accent, REDUCED_MOTION ? 10 : 18, 0.8);
      }

      function buildPickupOptions() {
        const safe = { ...choice(SAFE_PICKUPS) };
        const risky = { ...choice(RISK_PICKUPS) };
        state.pickupOptions = Math.random() < 0.5 ? [safe, risky] : [risky, safe];
      }

      function openPickupChoice() {
        state.mode = "choosing";
        state.choiceHover = -1;
        buildPickupOptions();
        state.lastMessage = "픽업 아이콘을 읽고 하나만 고르세요.";
      }

      function reflectWave(wave, arena) {
        if (wave.dead) {
          return;
        }
        const symbol = SYMBOL_BY_ID[wave.symbolId];
        wave.reflected = true;
        wave.speed *= wave.requireBoost ? 1.95 : 1.45;
        wave.radius = arena.shieldRadius;
        state.chain += 1;
        state.bestChain = Math.max(state.bestChain, state.chain);
        state.flash = Math.max(state.flash, wave.requireBoost ? 0.9 : 0.45);
        state.screenShake = Math.max(state.screenShake, wave.requireBoost ? 9 : 5);
        state.glassCrack = Math.max(0, state.glassCrack - 0.06);
        if (state.widenCharges > 0) {
          state.widenCharges -= 1;
        }
        makePopup(
          wave.requireBoost ? "AMP REFLECT" : "REFLECT",
          arena.cx + Math.cos(wave.angle) * arena.shieldRadius,
          arena.cy + Math.sin(wave.angle) * arena.shieldRadius,
          wave.requireBoost ? "#ffd482" : symbol.color
        );
        spawnBurst(arena.cx + Math.cos(wave.angle) * arena.shieldRadius, arena.cy + Math.sin(wave.angle) * arena.shieldRadius, symbol.glow, REDUCED_MOTION ? 10 : 22, 1.05);
        spawnRipple(arena.cx, arena.cy, symbol.glow, arena.coreRadius + 10);
        state.lastMessage = wave.requireBoost ? `${symbol.label} 강타를 증폭으로 반사` : `${symbol.label} 파형 반사 성공`;
        if (state.chain >= 20) {
          clearStage();
          return;
        }
        if (state.chain >= state.nextPickupAt) {
          state.pickupQueued = true;
          state.nextPickupAt += 4;
        }
      }

      function missWave(wave, arena) {
        if (wave.dead) {
          return;
        }
        const symbol = SYMBOL_BY_ID[wave.symbolId];
        wave.dead = true;
        state.chain = 0;
        state.curseLoad += 12;
        state.lastMessage = `${symbol.label} 문양이 코어에 박혔습니다`;
        makePopup("CORE HIT", arena.cx, arena.cy - 24, "#ff6d8c");
        spawnBurst(arena.cx, arena.cy, symbol.glow, REDUCED_MOTION ? 12 : 26, 1.15);
        spawnRipple(arena.cx, arena.cy, "rgba(255, 120, 140, 0.76)", arena.coreRadius + 18);
        addResidue(wave.symbolId, 1);
        state.screenShake = Math.max(state.screenShake, 11);
        state.flash = Math.max(state.flash, 0.8);
        if (state.curseLoad >= state.curseCap) {
          failStage("curse-overflow");
        }
      }

      function updateAmbient(dt) {
        ambient.bubbles.forEach((bubble) => {
          bubble.y -= bubble.speed * dt;
          bubble.x += Math.sin(state.sceneTime * 0.7 + bubble.phase) * bubble.drift * dt;
          if (bubble.y < -16) {
            bubble.y = VIEW.height + rand(8, 40);
            bubble.x = rand(0, VIEW.width);
          }
          if (bubble.x < -20) bubble.x = VIEW.width + 20;
          if (bubble.x > VIEW.width + 20) bubble.x = -20;
        });
        ambient.fish.forEach((fish) => {
          fish.x += fish.speed * dt;
          if (fish.speed > 0 && fish.x > VIEW.width + 120) fish.x = -140;
          if (fish.speed < 0 && fish.x < -140) fish.x = VIEW.width + 120;
        });
        ambient.motes.forEach((mote) => {
          mote.y += Math.sin(state.sceneTime * 0.42 + mote.phase) * 2 * dt;
          mote.x += mote.drift * dt * 0.35;
          if (mote.x < -50) mote.x = VIEW.width + 50;
          if (mote.x > VIEW.width + 50) mote.x = -50;
        });
      }

      function updateModifiers(dt) {
        Object.keys(state.modifiers).forEach((key) => {
          state.modifiers[key] = Math.max(0, state.modifiers[key] - dt);
        });
      }

      function updateProjectiles(dt) {
        const arena = getArena();
        const shieldAngle = getShieldAngle();
        const halfArc = getShieldHalfArc();
        const boostActive = state.boostTimer > 0.02;

        state.waves.forEach((wave) => {
          if (wave.dead) {
            return;
          }
          if (wave.hold > 0) {
            wave.hold -= dt;
            return;
          }

          wave.pulse += dt * 4.2;
          if (!wave.reflected) {
            wave.radius -= wave.speed * dt;
            if (wave.radius <= arena.shieldRadius + 18) {
              const aligned = Math.abs(shortestAngle(wave.angle, shieldAngle)) <= halfArc;
              const canHandle = !wave.requireBoost || boostActive || state.autoBoostCharges > 0;
              if (aligned && canHandle) {
                if (wave.requireBoost && !boostActive && state.autoBoostCharges > 0) {
                  state.autoBoostCharges -= 1;
                }
                reflectWave(wave, arena);
              } else if (wave.radius <= arena.coreRadius + 8) {
                missWave(wave, arena);
              }
            }
            if (wave.radius <= arena.coreRadius + 8) {
              missWave(wave, arena);
            }
          } else {
            wave.radius += wave.speed * dt;
            wave.alpha -= dt * 1.6;
            if (wave.radius > arena.outerRadius + 70 || wave.alpha <= 0) {
              wave.dead = true;
            }
          }
        });
        state.waves = state.waves.filter((wave) => !wave.dead);
      }

      function updateEffects(dt) {
        state.boostTimer = Math.max(0, state.boostTimer - dt);
        state.boostCooldown = Math.max(0, state.boostCooldown - dt);
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.flash = Math.max(0, state.flash - dt * 1.65);
        state.glassCrack = Math.max(0, state.glassCrack - dt * 0.02);

        state.particles.forEach((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy = particle.vy * 0.985 + 12 * dt;
        });
        state.particles = state.particles.filter((particle) => particle.life > 0);

        state.ripples.forEach((ripple) => {
          ripple.life -= dt;
          ripple.radius += dt * 92;
          ripple.width = Math.max(2, ripple.width - dt * 7);
        });
        state.ripples = state.ripples.filter((ripple) => ripple.life > 0);

        state.popups.forEach((popup) => {
          popup.life -= dt;
          popup.y += popup.vy * dt;
          popup.vy *= 0.92;
        });
        state.popups = state.popups.filter((popup) => popup.life > 0);
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.spawnTimer -= dt;
        if (keyboard.left) {
          state.shieldAngle -= dt * 2.75;
        }
        if (keyboard.right) {
          state.shieldAngle += dt * 2.75;
        }
        if (state.spawnTimer <= 0 && state.mode === "running") {
          spawnWave(false);
          state.spawnTimer = getSpawnInterval();
        }
        updateProjectiles(dt);
        if (state.pickupQueued && state.waves.length === 0 && state.mode === "running") {
          openPickupChoice();
        }
      }

      function update(dt) {
        state.sceneTime += dt;
        updateAmbient(dt);
        updateModifiers(dt);
        updateEffects(dt);
        if (state.mode === "running") {
          updateRunning(dt);
        }
      }

      function drawSigil(id, x, y, size, alpha = 1) {
        const symbol = SYMBOL_BY_ID[id];
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = symbol.color;
        ctx.fillStyle = symbol.color;
        ctx.lineWidth = Math.max(1.4, size * 0.12);
        ctx.globalAlpha = alpha;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        if (id === "pearl") {
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.38, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.09, 0, Math.PI * 2);
          ctx.fill();
        } else if (id === "coral") {
          ctx.beginPath();
          ctx.moveTo(0, size * 0.42);
          ctx.lineTo(0, -size * 0.28);
          ctx.moveTo(0, -size * 0.08);
          ctx.lineTo(-size * 0.28, -size * 0.34);
          ctx.moveTo(0, -size * 0.04);
          ctx.lineTo(size * 0.26, -size * 0.32);
          ctx.stroke();
        } else if (id === "iris") {
          ctx.beginPath();
          ctx.moveTo(0, -size * 0.42);
          ctx.lineTo(size * 0.3, 0);
          ctx.lineTo(0, size * 0.42);
          ctx.lineTo(-size * 0.3, 0);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.1, 0, Math.PI * 2);
          ctx.fill();
        } else if (id === "thorn") {
          ctx.beginPath();
          ctx.moveTo(-size * 0.34, size * 0.24);
          ctx.lineTo(0, -size * 0.38);
          ctx.lineTo(size * 0.34, size * 0.24);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-size * 0.18, size * 0.06);
          ctx.lineTo(size * 0.18, size * 0.06);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawBackground(arena) {
        const base = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        base.addColorStop(0, "#083042");
        base.addColorStop(0.52, "#072737");
        base.addColorStop(1, "#020d15");
        ctx.fillStyle = base;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const glow = ctx.createRadialGradient(arena.cx, arena.cy, 40, arena.cx, arena.cy, arena.outerRadius * 1.18);
        glow.addColorStop(0, "rgba(102, 245, 255, 0.18)");
        glow.addColorStop(0.45, "rgba(91, 226, 255, 0.07)");
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 6; index += 1) {
          const x = VIEW.width * (0.08 + index * 0.16) + Math.sin(state.sceneTime * 0.6 + index) * 14;
          const ray = ctx.createLinearGradient(x, 0, x + 24, VIEW.height);
          ray.addColorStop(0, "rgba(196, 248, 255, 0.18)");
          ray.addColorStop(0.35, "rgba(116, 226, 255, 0.05)");
          ray.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = ray;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + 72, 0);
          ctx.lineTo(x + 22, VIEW.height);
          ctx.lineTo(x - 32, VIEW.height);
          ctx.closePath();
          ctx.fill();
        }

        ambient.motes.forEach((mote) => {
          ctx.fillStyle = `rgba(214, 255, 255, ${mote.alpha})`;
          ctx.beginPath();
          ctx.ellipse(mote.x, mote.y, mote.size, mote.size * 0.24, state.sceneTime * 0.08 + mote.phase, 0, Math.PI * 2);
          ctx.fill();
        });

        ambient.fish.forEach((fish) => {
          ctx.save();
          ctx.translate(fish.x, fish.y + Math.sin(state.sceneTime * 1.6 + fish.x * 0.02) * 6);
          ctx.scale(fish.speed > 0 ? fish.scale : -fish.scale, fish.scale);
          ctx.globalAlpha = fish.alpha;
          ctx.fillStyle = "#041018";
          ctx.beginPath();
          ctx.ellipse(0, 0, 28, 10, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(-26, 0);
          ctx.lineTo(-44, -10);
          ctx.lineTo(-42, 10);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });

        ambient.bubbles.forEach((bubble) => {
          ctx.strokeStyle = `rgba(213, 255, 255, ${bubble.alpha})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = `rgba(255, 255, 255, ${bubble.alpha * 0.32})`;
          ctx.beginPath();
          ctx.arc(bubble.x - bubble.r * 0.25, bubble.y - bubble.r * 0.25, bubble.r * 0.24, 0, Math.PI * 2);
          ctx.fill();
        });

        const floorGradient = ctx.createLinearGradient(0, VIEW.height * 0.68, 0, VIEW.height);
        floorGradient.addColorStop(0, "rgba(4, 16, 22, 0)");
        floorGradient.addColorStop(1, "rgba(2, 6, 10, 0.96)");
        ctx.fillStyle = floorGradient;
        ctx.fillRect(0, VIEW.height * 0.66, VIEW.width, VIEW.height * 0.34);
      }

      function drawAquariumGlass(arena) {
        ctx.save();
        roundedRect(arena.panelX, arena.panelY, VIEW.width - arena.panelX * 2, VIEW.height - arena.panelY * 2, 28);
        const frameGradient = ctx.createLinearGradient(arena.panelX, arena.panelY, VIEW.width - arena.panelX, VIEW.height - arena.panelY);
        frameGradient.addColorStop(0, "rgba(188, 249, 255, 0.42)");
        frameGradient.addColorStop(0.4, "rgba(72, 193, 219, 0.08)");
        frameGradient.addColorStop(1, "rgba(11, 58, 74, 0.42)");
        ctx.fillStyle = "rgba(147, 234, 255, 0.04)";
        ctx.fill();
        ctx.strokeStyle = frameGradient;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.strokeStyle = "rgba(218, 251, 255, 0.14)";
        ctx.beginPath();
        ctx.moveTo(arena.panelX + 22, arena.panelY + 18);
        ctx.lineTo(VIEW.width - arena.panelX - 84, arena.panelY + 18);
        ctx.stroke();

        ctx.globalAlpha = state.glassCrack * 0.9;
        if (state.glassCrack > 0.02) {
          ctx.strokeStyle = "rgba(255, 172, 188, 0.34)";
          ctx.lineWidth = 1.2;
          for (let index = 0; index < 3; index += 1) {
            const anchorX = arena.cx + (index - 1) * arena.coreRadius * 1.2;
            const anchorY = arena.cy + arena.coreRadius * 0.25;
            ctx.beginPath();
            ctx.moveTo(anchorX, anchorY);
            ctx.lineTo(anchorX + 34, anchorY + 18);
            ctx.lineTo(anchorX + 62, anchorY + 42);
            ctx.moveTo(anchorX + 18, anchorY + 9);
            ctx.lineTo(anchorX - 6, anchorY + 26);
            ctx.stroke();
          }
        }
        ctx.restore();
      }

      function drawArena(arena) {
        ctx.save();
        ctx.translate(
          state.screenShake ? rand(-state.screenShake, state.screenShake) : 0,
          state.screenShake ? rand(-state.screenShake, state.screenShake) : 0
        );

        ctx.strokeStyle = "rgba(158, 234, 255, 0.16)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.outerRadius, 0, Math.PI * 2);
        ctx.stroke();

        for (let index = 0; index < 16; index += 1) {
          const angle = (Math.PI * 2 * index) / 16 + state.sceneTime * 0.03;
          const x = arena.cx + Math.cos(angle) * arena.outerRadius;
          const y = arena.cy + Math.sin(angle) * arena.outerRadius;
          ctx.fillStyle = "rgba(201, 248, 255, 0.12)";
          ctx.beginPath();
          ctx.arc(x, y, 3.2, 0, Math.PI * 2);
          ctx.fill();
        }

        state.waves.forEach((wave) => {
          const symbol = SYMBOL_BY_ID[wave.symbolId];
          if (wave.hold > 0) {
            return;
          }
          const x = arena.cx + Math.cos(wave.angle) * wave.radius;
          const y = arena.cy + Math.sin(wave.angle) * wave.radius;
          const trailAlpha = wave.reflected ? wave.alpha * 0.16 : 0.22;
          ctx.strokeStyle = `rgba(201, 245, 255, ${trailAlpha})`;
          ctx.lineWidth = wave.requireBoost ? 3.4 : 2;
          ctx.beginPath();
          ctx.moveTo(arena.cx, arena.cy);
          ctx.lineTo(x, y);
          ctx.stroke();

          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.shadowColor = symbol.color;
          ctx.shadowBlur = wave.requireBoost ? 26 : 18;
          const glow = ctx.createRadialGradient(x, y, 2, x, y, wave.requireBoost ? 22 : 16);
          glow.addColorStop(0, "rgba(255,255,255,0.95)");
          glow.addColorStop(0.3, symbol.glow);
          glow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(x, y, wave.requireBoost ? 18 : 13, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          if (wave.requireBoost) {
            ctx.strokeStyle = "rgba(255, 220, 144, 0.85)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(x, y, 22 + Math.sin(wave.pulse * 1.2) * 2, 0, Math.PI * 2);
            ctx.stroke();
          }

          drawSigil(wave.symbolId, x, y, wave.requireBoost ? 13 : 10, wave.reflected ? wave.alpha : 1);
        });

        state.ripples.forEach((ripple) => {
          ctx.strokeStyle = ripple.color.replace("0.78", String(clamp(ripple.life * 1.7, 0, 0.85)));
          ctx.lineWidth = ripple.width;
          ctx.beginPath();
          ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
          ctx.stroke();
        });

        const ringGlow = ctx.createRadialGradient(arena.cx, arena.cy, arena.coreRadius * 0.6, arena.cx, arena.cy, arena.shieldRadius * 1.1);
        ringGlow.addColorStop(0, "rgba(214, 255, 255, 0.22)");
        ringGlow.addColorStop(0.4, "rgba(84, 217, 255, 0.06)");
        ringGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = ringGlow;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.shieldRadius * 1.06, 0, Math.PI * 2);
        ctx.fill();

        const shieldAngle = getShieldAngle();
        const halfArc = getShieldHalfArc();
        ctx.save();
        ctx.strokeStyle = state.boostTimer > 0.02 ? "rgba(255, 225, 151, 0.98)" : "rgba(134, 244, 255, 0.98)";
        ctx.shadowColor = state.boostTimer > 0.02 ? "rgba(255, 209, 121, 0.9)" : "rgba(116, 242, 255, 0.82)";
        ctx.shadowBlur = state.boostTimer > 0.02 ? 22 : 16;
        ctx.lineCap = "round";
        ctx.lineWidth = Math.max(12, arena.shieldRadius * 0.09);
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.shieldRadius, shieldAngle - halfArc, shieldAngle + halfArc);
        ctx.stroke();
        ctx.restore();

        ctx.strokeStyle = "rgba(189, 246, 255, 0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.ringRadius, 0, Math.PI * 2);
        ctx.stroke();

        const coreGlow = ctx.createRadialGradient(arena.cx, arena.cy, 4, arena.cx, arena.cy, arena.coreRadius * 2.5);
        coreGlow.addColorStop(0, "rgba(255,255,255,0.98)");
        coreGlow.addColorStop(0.24, "rgba(196, 252, 255, 0.82)");
        coreGlow.addColorStop(0.55, "rgba(121, 233, 255, 0.26)");
        coreGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = coreGlow;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.coreRadius * 2.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(240, 255, 255, 0.95)";
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.coreRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(149, 240, 255, 0.68)";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.coreRadius, 0, Math.PI * 2);
        ctx.stroke();

        SYMBOLS.forEach((symbol, index) => {
          const angle = -Math.PI / 2 + (Math.PI * 2 * index) / SYMBOLS.length;
          const x = arena.cx + Math.cos(angle) * (arena.coreRadius + 26);
          const y = arena.cy + Math.sin(angle) * (arena.coreRadius + 26);
          const count = state.residues[symbol.id];
          ctx.fillStyle = count > 0 ? "rgba(9, 28, 37, 0.92)" : "rgba(9, 28, 37, 0.54)";
          ctx.beginPath();
          ctx.arc(x, y, 16, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = count >= 2 ? "rgba(255, 121, 142, 0.88)" : "rgba(181, 246, 255, 0.2)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(x, y, 16, 0, Math.PI * 2);
          ctx.stroke();
          drawSigil(symbol.id, x, y - 1, 10, count > 0 ? 1 : 0.36);
          if (count > 0) {
            ctx.fillStyle = "#ffffff";
            ctx.font = "700 13px Trebuchet MS";
            ctx.textAlign = "center";
            ctx.fillText(String(count), x, y + 26);
          }
        });

        state.particles.forEach((particle) => {
          ctx.fillStyle = particle.color.replace("0.95", String(clamp(particle.life, 0, 1)));
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius * particle.life, 0, Math.PI * 2);
          ctx.fill();
        });

        state.popups.forEach((popup) => {
          ctx.globalAlpha = clamp(popup.life, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.font = "700 18px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        });
        ctx.globalAlpha = 1;
        ctx.textAlign = "left";
        ctx.restore();
      }

      function drawMenuHero(arena) {
        ctx.save();
        const heroGlow = ctx.createRadialGradient(arena.cx, arena.cy, arena.coreRadius * 0.4, arena.cx, arena.cy, arena.outerRadius * 0.78);
        heroGlow.addColorStop(0, "rgba(202, 253, 255, 0.22)");
        heroGlow.addColorStop(0.42, "rgba(93, 231, 255, 0.08)");
        heroGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = heroGlow;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.outerRadius * 0.78, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(175, 245, 255, 0.16)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.outerRadius * 0.82, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.ringRadius, 0, Math.PI * 2);
        ctx.stroke();

        const shieldAngle = -Math.PI / 2;
        ctx.strokeStyle = "rgba(136, 244, 255, 0.96)";
        ctx.shadowColor = "rgba(116, 242, 255, 0.6)";
        ctx.shadowBlur = 12;
        ctx.lineCap = "round";
        ctx.lineWidth = Math.max(10, arena.shieldRadius * 0.08);
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.shieldRadius, shieldAngle - 0.34, shieldAngle + 0.34);
        ctx.stroke();
        ctx.shadowBlur = 0;

        const coreGlow = ctx.createRadialGradient(arena.cx, arena.cy, 4, arena.cx, arena.cy, arena.coreRadius * 2.2);
        coreGlow.addColorStop(0, "rgba(255,255,255,0.98)");
        coreGlow.addColorStop(0.3, "rgba(196, 252, 255, 0.82)");
        coreGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = coreGlow;
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.coreRadius * 2.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(240, 255, 255, 0.96)";
        ctx.beginPath();
        ctx.arc(arena.cx, arena.cy, arena.coreRadius, 0, Math.PI * 2);
        ctx.fill();

        SYMBOLS.forEach((symbol, index) => {
          const angle = -Math.PI / 2 + (Math.PI * 2 * index) / SYMBOLS.length;
          const x = arena.cx + Math.cos(angle) * (arena.ringRadius + 20);
          const y = arena.cy + Math.sin(angle) * (arena.ringRadius + 20);
          ctx.fillStyle = "rgba(7, 22, 30, 0.88)";
          ctx.beginPath();
          ctx.arc(x, y, 20, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(184, 245, 255, 0.16)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.arc(x, y, 20, 0, Math.PI * 2);
          ctx.stroke();
          drawSigil(symbol.id, x, y, 12, 0.95);
        });
        ctx.restore();
      }

      function drawHud() {
        const leftX = Math.max(18, VIEW.width * 0.035);
        const topY = Math.max(18, VIEW.height * 0.04);
        const cardWidth = Math.min(360, VIEW.width * 0.42);

        ctx.save();
        roundedRect(leftX, topY, cardWidth, 104, 24);
        ctx.fillStyle = "rgba(4, 17, 24, 0.62)";
        ctx.fill();
        ctx.strokeStyle = "rgba(171, 244, 255, 0.14)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = "#e8feff";
        ctx.font = "700 30px Trebuchet MS";
        ctx.fillText(`REFLECT ${state.chain}/20`, leftX + 20, topY + 36);
        ctx.font = "600 14px Trebuchet MS";
        ctx.fillStyle = "rgba(223, 251, 255, 0.74)";
        ctx.fillText("20연속 반사 시 클리어", leftX + 20, topY + 58);

        const boostRatio = state.boostCooldown > 0 ? 1 - clamp(state.boostCooldown / 0.58, 0, 1) : 1;
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        roundedRect(leftX + 20, topY + 70, cardWidth - 40, 12, 999);
        ctx.fill();
        const boostGradient = ctx.createLinearGradient(leftX + 20, topY + 70, leftX + cardWidth - 20, topY + 70);
        boostGradient.addColorStop(0, "#74ebff");
        boostGradient.addColorStop(1, "#ffd78f");
        ctx.fillStyle = boostGradient;
        roundedRect(leftX + 20, topY + 70, (cardWidth - 40) * boostRatio, 12, 999);
        ctx.fill();

        const rightWidth = Math.min(320, VIEW.width * 0.34);
        const rightX = VIEW.width - rightWidth - leftX;
        roundedRect(rightX, topY, rightWidth, 128, 24);
        ctx.fillStyle = "rgba(4, 17, 24, 0.62)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 170, 180, 0.18)";
        ctx.stroke();
        ctx.fillStyle = "#f7fdff";
        ctx.font = "700 17px Trebuchet MS";
        ctx.fillText("저주 압력", rightX + 18, topY + 28);
        ctx.fillText(`자동 증폭 ${state.autoBoostCharges}`, rightX + 18, topY + 94);

        const pressureRatio = clamp(state.curseLoad / state.curseCap, 0, 1);
        roundedRect(rightX + 18, topY + 38, rightWidth - 36, 16, 999);
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fill();
        const pressureGradient = ctx.createLinearGradient(rightX + 18, 0, rightX + rightWidth - 18, 0);
        pressureGradient.addColorStop(0, "#74ebff");
        pressureGradient.addColorStop(0.5, "#ffd27f");
        pressureGradient.addColorStop(1, "#ff6989");
        ctx.fillStyle = pressureGradient;
        roundedRect(rightX + 18, topY + 38, (rightWidth - 36) * pressureRatio, 16, 999);
        ctx.fill();
        ctx.fillStyle = "rgba(235, 254, 255, 0.78)";
        ctx.font = "600 13px Trebuchet MS";
        ctx.fillText(`${Math.round(state.curseLoad)} / ${state.curseCap}`, rightX + rightWidth - 76, topY + 29);
        ctx.fillText(`방패 폭 +${state.widenCharges}`, rightX + 18, topY + 114);

        const effects = [];
        if (state.modifiers.hasten > 0) effects.push(`속류 ${state.modifiers.hasten.toFixed(1)}s`);
        if (state.modifiers.drift > 0) effects.push(`조류 왜곡 ${state.modifiers.drift.toFixed(1)}s`);
        if (state.modifiers.narrow > 0) effects.push(`협착 ${state.modifiers.narrow.toFixed(1)}s`);
        if (effects.length) {
          let x = leftX;
          const y = topY + 118;
          ctx.font = "600 13px Trebuchet MS";
          effects.slice(0, 3).forEach((label) => {
            const width = ctx.measureText(label).width + 24;
            roundedRect(x, y, width, 28, 999);
            ctx.fillStyle = "rgba(255, 123, 142, 0.12)";
            ctx.fill();
            ctx.strokeStyle = "rgba(255, 160, 178, 0.18)";
            ctx.stroke();
            ctx.fillStyle = "#ffd9df";
            ctx.fillText(label, x + 12, y + 18);
            x += width + 8;
          });
        }

        ctx.fillStyle = "rgba(232, 254, 255, 0.7)";
        ctx.font = "600 14px Trebuchet MS";
        ctx.fillText(VIEW.width < 560 ? HUD_LABEL_COMPACT : HUD_LABEL_FULL, leftX, VIEW.height - 28);
        ctx.restore();
      }

      function drawPickupOverlay() {
        const width = Math.min(820, VIEW.width * 0.88);
        const height = Math.min(320, VIEW.height * 0.42);
        const x = (VIEW.width - width) * 0.5;
        const y = VIEW.height * 0.13;

        ctx.save();
        ctx.fillStyle = "rgba(1, 8, 12, 0.66)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        roundedRect(x, y, width, height, 28);
        ctx.fillStyle = "rgba(6, 20, 29, 0.92)";
        ctx.fill();
        ctx.strokeStyle = "rgba(169, 246, 255, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = "#f2ffff";
        ctx.font = "700 34px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("저주 픽업 선택", VIEW.width * 0.5, y + 44);
        ctx.font = "600 15px Trebuchet MS";
        ctx.fillStyle = "rgba(226, 251, 255, 0.78)";
        ctx.fillText("보너스와 패널티를 동시에 읽고 하나만 탭하세요.", VIEW.width * 0.5, y + 70);

        const gap = 18;
        const cardWidth = (width - gap * 3) / 2;
        const cardHeight = height - 110;
        state.pickupBounds = [];

        state.pickupOptions.forEach((option, index) => {
          const cardX = x + gap + index * (cardWidth + gap);
          const cardY = y + 92;
          const hovered = state.choiceHover === index;
          state.pickupBounds.push({ x: cardX, y: cardY, width: cardWidth, height: cardHeight });
          roundedRect(cardX, cardY, cardWidth, cardHeight, 24);
          ctx.fillStyle = hovered ? "rgba(16, 44, 58, 0.98)" : "rgba(9, 28, 38, 0.96)";
          ctx.fill();
          ctx.strokeStyle = hovered ? option.accent : "rgba(183, 245, 255, 0.12)";
          ctx.lineWidth = hovered ? 2.5 : 1.2;
          ctx.stroke();

          roundedRect(cardX + 18, cardY + 18, 66, 28, 999);
          ctx.fillStyle = option.badge === "고위험" ? "rgba(255, 118, 145, 0.16)" : "rgba(127, 241, 255, 0.14)";
          ctx.fill();
          ctx.fillStyle = option.accent;
          ctx.font = "700 13px Trebuchet MS";
          ctx.textAlign = "left";
          ctx.fillText(option.badge, cardX + 31, cardY + 37);

          ctx.font = "700 25px Trebuchet MS";
          ctx.fillStyle = "#f5feff";
          ctx.fillText(option.name, cardX + 18, cardY + 76);

          ctx.fillStyle = option.accent;
          ctx.font = "700 15px Trebuchet MS";
          ctx.fillText("보너스", cardX + 18, cardY + 112);
          ctx.fillStyle = "#dbfdff";
          ctx.font = "600 17px Trebuchet MS";
          wrapCanvasText(option.boon, cardX + 18, cardY + 138, cardWidth - 36, 22);

          ctx.fillStyle = "#ff9aad";
          ctx.font = "700 15px Trebuchet MS";
          ctx.fillText("페널티", cardX + 18, cardY + 186);
          ctx.fillStyle = "rgba(255, 227, 232, 0.92)";
          ctx.font = "600 17px Trebuchet MS";
          wrapCanvasText(option.penalty, cardX + 18, cardY + 212, cardWidth - 36, 22);
        });

        ctx.textAlign = "left";
        ctx.restore();
      }

      function drawMenuOverlay() {
        const width = Math.min(760, VIEW.width * 0.88);
        const height = Math.min(430, VIEW.height * 0.62);
        const x = (VIEW.width - width) * 0.5;
        const y = VIEW.height * 0.11;
        ctx.save();
        ctx.fillStyle = "rgba(1, 8, 12, 0.42)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        roundedRect(x, y, width, height, 30);
        ctx.fillStyle = "rgba(5, 22, 31, 0.9)";
        ctx.fill();
        ctx.strokeStyle = "rgba(171, 246, 255, 0.18)";
        ctx.lineWidth = 1.4;
        ctx.stroke();
        ctx.fillStyle = "#8af6ff";
        ctx.font = "700 18px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("GLASS AQUARIUM", VIEW.width * 0.5, y + 48);
        ctx.fillStyle = "#f7ffff";
        ctx.font = "700 48px Trebuchet MS";
        ctx.fillText("Pulse Fence", VIEW.width * 0.5, y + 96);
        ctx.fillStyle = "rgba(229, 252, 255, 0.82)";
        ctx.font = "600 18px Trebuchet MS";
        wrapCanvasText("유리 수조 중앙에서 방패를 돌리며 저주가 묻은 픽업까지 관리하는 반응 액션.", x + 60, y + 140, width - 120, 26);

        const lines = [
          `조작: ${window.relayStageMeta.controls}`,
          `클리어: ${window.relayStageMeta.clearCondition}`,
          `실패: ${window.relayStageMeta.failCondition}`,
          "모바일은 화면 터치와 드래그, 짧은 탭만으로 플레이 가능합니다.",
        ];
        ctx.textAlign = "left";
        ctx.font = "600 17px Trebuchet MS";
        lines.forEach((line, index) => {
          const rowY = y + 202 + index * 40;
          ctx.fillStyle = index === 1 ? "#8ef6ff" : index === 2 ? "#ffb7c4" : "rgba(236, 252, 255, 0.86)";
          ctx.fillText(line, x + 42, rowY);
        });
        ctx.textAlign = "center";
        ctx.font = "700 20px Trebuchet MS";
        ctx.fillStyle = "#ffd688";
        ctx.fillText("화면 터치 또는 Enter", VIEW.width * 0.5, y + height - 54);
        ctx.restore();
      }

      function drawEndOverlay(cleared) {
        const width = Math.min(680, VIEW.width * 0.84);
        const height = Math.min(320, VIEW.height * 0.46);
        const x = (VIEW.width - width) * 0.5;
        const y = VIEW.height * 0.18;
        ctx.save();
        ctx.fillStyle = "rgba(1, 8, 12, 0.58)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        roundedRect(x, y, width, height, 28);
        ctx.fillStyle = "rgba(5, 22, 31, 0.94)";
        ctx.fill();
        ctx.strokeStyle = cleared ? "rgba(143, 249, 255, 0.42)" : "rgba(255, 128, 151, 0.32)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.textAlign = "center";
        ctx.fillStyle = cleared ? "#8ff9ff" : "#ff88a4";
        ctx.font = "700 40px Trebuchet MS";
        ctx.fillText(cleared ? "AQUARIUM STABLE" : "AQUARIUM FRACTURED", VIEW.width * 0.5, y + 72);
        ctx.fillStyle = "#f5ffff";
        ctx.font = "600 22px Trebuchet MS";
        ctx.fillText(cleared ? "20연속 파형 반사 성공" : state.lastMessage, VIEW.width * 0.5, y + 118);
        ctx.font = "600 18px Trebuchet MS";
        ctx.fillStyle = "rgba(230, 253, 255, 0.8)";
        ctx.fillText(`최대 연속 반사 ${state.bestChain} / 20`, VIEW.width * 0.5, y + 166);
        ctx.fillText(`잔여 문양 ${Object.values(state.residues).reduce((sum, value) => sum + value, 0)} · 저주 압력 ${Math.round(state.curseLoad)}`, VIEW.width * 0.5, y + 196);
        ctx.fillStyle = "#ffd889";
        ctx.font = "700 19px Trebuchet MS";
        ctx.fillText("화면 터치 또는 Enter로 재시작", VIEW.width * 0.5, y + height - 44);
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const arena = getArena();
        drawBackground(arena);
        if (state.mode === "menu") {
          drawMenuHero(arena);
          drawAquariumGlass(arena);
          drawMenuOverlay();
        } else {
          drawArena(arena);
          drawAquariumGlass(arena);
          drawHud();
        }

        if (state.mode === "choosing") {
          drawPickupOverlay();
        } else if (state.mode === "failed") {
          drawEndOverlay(false);
        } else if (state.mode === "cleared") {
          drawEndOverlay(true);
        }

        if (state.flash > 0.02) {
          ctx.fillStyle = `rgba(255, 255, 255, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function handleChoiceTap(point) {
        const pickedIndex = state.pickupBounds.findIndex((bound) =>
          point.x >= bound.x &&
          point.x <= bound.x + bound.width &&
          point.y >= bound.y &&
          point.y <= bound.y + bound.height
        );
        if (pickedIndex >= 0) {
          applyPickup(state.pickupOptions[pickedIndex]);
        }
      }

      function updateChoiceHover(point) {
        state.choiceHover = state.pickupBounds.findIndex((bound) =>
          point.x >= bound.x &&
          point.x <= bound.x + bound.width &&
          point.y >= bound.y &&
          point.y <= bound.y + bound.height
        );
      }

      function getCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function updateShieldFromPoint(point) {
        const arena = getArena();
        state.shieldAngle = Math.atan2(point.y - arena.cy, point.x - arena.cx);
      }

      function startFromMenuOrRestart() {
        resetRun();
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus();
        const point = getCanvasPoint(event);
        pointerState = {
          active: true,
          id: event.pointerId,
          x: point.x,
          y: point.y,
          startX: point.x,
          startY: point.y,
          startedAt: performance.now(),
          moved: false,
        };
        try { canvas.setPointerCapture?.(event.pointerId); } catch (_) { /* synthetic events may lack active pointer */ }

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startFromMenuOrRestart();
          return;
        }
        if (state.mode === "choosing") {
          updateChoiceHover(point);
          return;
        }
        updateShieldFromPoint(point);
      }

      function handlePointerMove(event) {
        const point = getCanvasPoint(event);
        if (state.mode === "choosing") {
          updateChoiceHover(point);
        }
        if (!pointerState.active || event.pointerId !== pointerState.id) {
          return;
        }
        if (Math.hypot(point.x - pointerState.startX, point.y - pointerState.startY) > 8) {
          pointerState.moved = true;
        }
        if (state.mode === "running") {
          updateShieldFromPoint(point);
        }
      }

      function handlePointerUp(event) {
        const point = getCanvasPoint(event);
        if (state.mode === "choosing") {
          handleChoiceTap(point);
        } else if (state.mode === "running" && pointerState.active && event.pointerId === pointerState.id) {
          updateShieldFromPoint(point);
          const quickTap = !pointerState.moved && performance.now() - pointerState.startedAt < 220;
          if (quickTap) {
            activateBoost();
          }
        }
        if (pointerState.active && event.pointerId === pointerState.id) {
          pointerState.active = false;
          pointerState.id = null;
        }
      }

      function handleDirectionalKey(event, isDown) {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          keyboard.left = isDown;
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          keyboard.right = isDown;
        }
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen?.();
        } else {
          canvas.requestFullscreen?.();
        }
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000 || FIXED_DT);
        lastTimestamp = timestamp;
        accumulator += dt;
        while (accumulator >= FIXED_DT) {
          update(FIXED_DT);
          accumulator -= FIXED_DT;
        }
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      window.relayStageMeta = {
        id: "glass-aquarium-pulse-fencing-cursed",
        title: "Glass Aquarium: Pulse Fence",
        description: "유리 수조 중앙의 방패를 돌려 문양 파형을 튕기고, 저주가 섞인 픽업 선택까지 버티는 반응 액션.",
        creator: "jungcollin",
        genre: "Reactive shield action / 저주 픽업",
        clearCondition: "저주를 견디며 20연속 파형 반사",
        failCondition: "저주 한계 초과 또는 같은 문양 3회 누적",
        controls: "포인터·터치 드래그로 방패 회전, 탭으로 순간 증폭, 픽업 전 페널티 확인",
      };

      window.relayStageResult = {
        status: "menu",
      };

      window.render_game_to_text = function renderGameToText() {
        const arena = getArena();
        return JSON.stringify({
          mode: state.mode,
          note: "origin=center, +x right, +y down",
          arena: {
            cx: Number(arena.cx.toFixed(1)),
            cy: Number(arena.cy.toFixed(1)),
            coreRadius: Number(arena.coreRadius.toFixed(1)),
          },
          chain: state.chain,
          curseLoad: Math.round(state.curseLoad),
          shieldAngleDeg: Math.round((getShieldAngle() * 180) / Math.PI),
          boostReady: state.boostCooldown <= 0,
          autoBoostCharges: state.autoBoostCharges,
          residues: state.residues,
          activeWaves: state.waves.slice(0, 4).map((wave) => ({
            symbol: wave.symbolId,
            angleDeg: Math.round((wave.angle * 180) / Math.PI),
            radius: Number(wave.radius.toFixed(1)),
            requireBoost: wave.requireBoost,
            reflected: wave.reflected,
          })),
          pickupOptions: state.mode === "choosing"
            ? state.pickupOptions.map((option) => ({
                name: option.name,
                badge: option.badge,
                penalty: option.penalty,
              }))
            : [],
        });
      };

      window.advanceTime = function advanceTime(ms) {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageDebug = {
        forceClear() {
          clearStage();
          render();
        },
        forceFail() {
          failStage("debug");
          render();
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startFromMenuOrRestart();
          } else if (state.mode === "choosing" && state.pickupOptions[0]) {
            applyPickup(state.pickupOptions[0]);
          }
        }
        if (event.key === " ") {
          event.preventDefault();
          if (state.mode === "running") {
            activateBoost();
          }
        }
        if (event.key === "f" || event.key === "F") {
          event.preventDefault();
          toggleFullscreen();
        }
        handleDirectionalKey(event, true);
      });

      window.addEventListener("keyup", (event) => {
        handleDirectionalKey(event, false);
      });

      window.addEventListener("resize", resizeCanvas);

      resizeCanvas();
      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
