<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" href="data:," />
    <title>Moon Greenhouse: Debt Auction</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Noto Sans KR", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(192, 244, 255, 0.25), transparent 34%),
          linear-gradient(180deg, #081121 0%, #0e1730 55%, #09111f 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(194, 255, 248, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 20, 37, 0.92);
        color: #f5fbff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(226, 255, 249, 0.94);
        outline-offset: -6px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Moon Greenhouse: Debt Auction. 화면 터치 또는 Enter로 시작하세요.
      클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능.
      클리어 조건은 동기화 문을 모두 맞춘 뒤 시간을 0으로 만들지 않고 마지막 경매를 넘기면 클리어.
      실패 조건은 동기화 창을 여러 번 놓치거나 시간 잔고가 바닥나거나 코어가 파괴되면 실패.
    </p>
    <canvas
      id="game"
      width="1280"
      height="720"
      aria-label="Moon Greenhouse: Debt Auction"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const META = {
        id: "moon-greenhouse-debt-auction-sync",
        title: "Moon Greenhouse: Debt Auction",
        creator: "jungcollin",
        creatorGithub: "jungcollin",
        genre: "Risk market defense / 동기화 문",
        description:
          "남은 시간을 입찰해 장비를 사고, 좌우 문을 같은 박자에 닫아 온실 코어를 지키세요.",
        controls:
          "클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능",
        clearCondition:
          "동기화 문을 모두 맞춘 뒤 시간을 0으로 만들지 않고 마지막 경매를 넘기면 클리어",
        failCondition:
          "동기화 창을 여러 번 놓치거나 시간 잔고가 바닥나거나 코어가 파괴되면 실패",
      };

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const HOLD_THRESHOLD = 0.42;
      const START_TIME = 44;
      const BASE_CORE_HP = 4;
      const BASE_MISS_LIMIT = 4;
      const LOCALE = "ko-KR";
      const numberFormatter = new Intl.NumberFormat(LOCALE, {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      });
      const integerFormatter = new Intl.NumberFormat(LOCALE);
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const WAVE_DEFS = [
        { name: "개화 경매", auctionDuration: 7.2, beatInterval: 0.9, pairs: 3, offers: ["guard", "coolant", "broker"] },
        { name: "은빛 증기", auctionDuration: 6.9, beatInterval: 0.86, pairs: 4, offers: ["prism", "guard", "moss"] },
        { name: "차광 투매", auctionDuration: 6.5, beatInterval: 0.82, pairs: 4, offers: ["coolant", "broker", "prism"] },
        { name: "최종 만기", auctionDuration: 6.2, beatInterval: 0.78, pairs: 5, offers: ["guard", "moss", "prism"] },
      ];

      const CARD_LIBRARY = {
        guard: {
          id: "guard",
          name: "루나 실드",
          cost: 5.6,
          accent: "#7cf7ff",
          short: "보호",
          lines: ["차광막 2회", "코어면 양측 1회"],
        },
        coolant: {
          id: "coolant",
          name: "안개 냉각기",
          cost: 6.1,
          accent: "#a2ffc7",
          short: "완화",
          lines: ["동기화 창 +", "박자 속도 완화"],
        },
        prism: {
          id: "prism",
          name: "부채 프리즘",
          cost: 6.8,
          accent: "#f7b7ff",
          short: "환급",
          lines: ["완벽 박자 환급", "리듬 판정 넓힘"],
        },
        moss: {
          id: "moss",
          name: "이끼 배터리",
          cost: 7.2,
          accent: "#ffd38d",
          short: "회복",
          lines: ["코어 +1", "실패 허용 +1"],
        },
        broker: {
          id: "broker",
          name: "에코 브로커",
          cost: 4.9,
          accent: "#8ba7ff",
          short: "거래",
          lines: ["같은 박자 폭 +", "다음 입찰 할인"],
        },
      };

      const ambientSeeds = Array.from({ length: reducedMotion ? 18 : 38 }, (_, index) => ({
        x: ((index * 97) % VIEW.width) + 24,
        y: ((index * 57) % VIEW.height) + 24,
        speed: 10 + (index % 5) * 5,
        radius: 2 + (index % 3) * 1.4,
        alpha: 0.1 + (index % 4) * 0.05,
      }));

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostClearedReported = false;
      let hostFailedReported = false;
      let itemCounter = 0;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }

      function toCanvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((clientX - rect.left) / rect.width) * VIEW.width,
          y: ((clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function pointInRect(point, rect) {
        return (
          point.x >= rect.x &&
          point.x <= rect.x + rect.width &&
          point.y >= rect.y &&
          point.y <= rect.y + rect.height
        );
      }

      function pointInCircle(point, circle) {
        return distance(point.x, point.y, circle.x, circle.y) <= circle.radius;
      }

      function createState() {
        return {
          mode: "menu",
          phase: "menu",
          elapsed: 0,
          lastRunTime: 0,
          timeLeft: START_TIME,
          waveIndex: 0,
          pairIndex: 0,
          combo: 0,
          coreHp: BASE_CORE_HP,
          maxCoreHp: BASE_CORE_HP,
          syncMisses: 0,
          missLimit: BASE_MISS_LIMIT,
          offers: [],
          inventory: [],
          slots: { left: null, core: null, right: null },
          drag: null,
          pressedTarget: null,
          activePair: null,
          settleTimer: 0,
          settleNext: null,
          waveStats: null,
          laneShields: { left: 0, right: 0 },
          popups: [],
          particles: [],
          flashes: [],
          beamBursts: [],
          moonOffset: 0,
          metronome: 0,
          auctionTimer: 0,
          message: "",
          streakGlow: 0,
          screenShake: 0,
          pulsePreview: 0,
        };
      }

      let state = createState();

      function getSlotRects() {
        return {
          left: { x: 338, y: 546, width: 166, height: 116, lane: "left", label: "LEFT RAIL" },
          core: { x: 557, y: 536, width: 166, height: 126, lane: "core", label: "CORE SPINE" },
          right: { x: 776, y: 546, width: 166, height: 116, lane: "right", label: "RIGHT RAIL" },
        };
      }

      function getGatePads() {
        return {
          left: { x: 256, y: 368, radius: 74 },
          right: { x: 1024, y: 368, radius: 74 },
        };
      }

      function getCorePoint() {
        return { x: 640, y: 324, radius: 56 };
      }

      function getOfferRects() {
        return state.offers.map((offer, index) => ({
          offerId: offer.offerId,
          x: 935,
          y: 148 + index * 146,
          width: 278,
          height: 126,
        }));
      }

      function getInventoryRects() {
        return state.inventory.map((item, index) => ({
          itemId: item.itemId,
          x: 48 + (index % 3) * 164,
          y: 538 + Math.floor(index / 3) * 70,
          width: 152,
          height: 56,
        }));
      }

      function getStartButtonRect() {
        return { x: 964, y: 578, width: 234, height: 66 };
      }

      function getPassiveTradeDiscount() {
        let discount = 0;
        for (const slotName of Object.keys(state.slots)) {
          const item = state.slots[slotName];
          if (!item || item.cardId !== "broker") {
            continue;
          }
          discount += slotName === "core" ? 0.9 : 0.45;
        }
        return discount;
      }

      function getCoreBoosts() {
        const coreItem = state.slots.core;
        return {
          maxHpBonus: coreItem?.cardId === "moss" ? 1 : 0,
          missBonus: coreItem?.cardId === "moss" ? 1 : 0,
        };
      }

      function syncCaps() {
        const boosts = getCoreBoosts();
        state.maxCoreHp = BASE_CORE_HP + boosts.maxHpBonus;
        state.missLimit = BASE_MISS_LIMIT + boosts.missBonus;
        state.coreHp = clamp(state.coreHp, 0, state.maxCoreHp);
      }

      function createPopup(text, x, y, color = "#f7fbff", velocityY = -44) {
        state.popups.push({
          text,
          x,
          y,
          color,
          ttl: 1,
          velocityY,
        });
      }

      function createFlash(x, y, radius, color) {
        state.flashes.push({ x, y, radius, color, ttl: 0.34 });
      }

      function burstParticles(x, y, color, count, speed = 120) {
        const amount = reducedMotion ? Math.max(5, Math.round(count * 0.4)) : count;
        for (let index = 0; index < amount; index += 1) {
          const angle = (Math.PI * 2 * index) / amount + Math.random() * 0.25;
          const velocity = speed * (0.6 + Math.random() * 0.6);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            radius: 2 + Math.random() * 4,
            ttl: 0.4 + Math.random() * 0.45,
            color,
          });
        }
      }

      function createItem(cardId) {
        const card = CARD_LIBRARY[cardId];
        itemCounter += 1;
        return {
          itemId: `${cardId}-${itemCounter}`,
          cardId,
          name: card.name,
          accent: card.accent,
          short: card.short,
          lines: card.lines.slice(),
        };
      }

      function updateRelayResult(status = state.mode === "failed" ? "failed" : state.mode === "cleared" ? "cleared" : "running") {
        window.relayStageResult.status = status;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: META.id,
          stageTitle: META.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: META.id,
          stageTitle: META.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state = createState();
        hostFailedReported = false;
        hostClearedReported = false;
        updateRelayResult("running");
        state.mode = "running";
        state.phase = "auction";
        state.message = "온실 시장 개장";
        state.timeLeft = START_TIME;
        state.coreHp = BASE_CORE_HP;
        syncCaps();
        beginAuction(0);
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.phase = "failed";
        state.lastRunTime = state.elapsed;
        updateRelayResult("failed");
        reportFailedToHost(reason);
        state.screenShake = 0.5;
        createPopup("파산", 640, 214, "#ffc7b6", -18);
        burstParticles(640, 324, "#ff8478", 22, 180);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.phase = "cleared";
        state.lastRunTime = state.elapsed;
        updateRelayResult("cleared");
        reportClearedToHost();
        state.screenShake = 0.28;
        createPopup("정산 완료", 640, 196, "#d6fff8", -18);
        burstParticles(640, 290, "#9fffe2", 32, 220);
      }

      function beginAuction(waveIndex) {
        if (waveIndex >= WAVE_DEFS.length) {
          if (state.timeLeft > 0) {
            clearStage();
          } else {
            failStage("time-bank-empty");
          }
          return;
        }
        state.waveIndex = waveIndex;
        state.pairIndex = 0;
        state.activePair = null;
        state.waveStats = null;
        state.phase = "auction";
        state.auctionTimer = WAVE_DEFS[waveIndex].auctionDuration;
        state.settleTimer = 0;
        state.settleNext = null;
        state.offers = WAVE_DEFS[waveIndex].offers.map((cardId, index) => {
          const base = CARD_LIBRARY[cardId];
          return {
            offerId: `wave-${waveIndex}-${cardId}-${index}`,
            cardId,
            sold: false,
            cost: Number((base.cost + waveIndex * 0.4 + index * 0.2).toFixed(1)),
          };
        });
        syncCaps();
        if (state.slots.core?.cardId === "moss") {
          state.coreHp = clamp(state.coreHp + 1, 0, state.maxCoreHp);
        }
        state.message = `${WAVE_DEFS[waveIndex].name} 경매`;
        state.streakGlow = 0.2;
        createPopup(`WAVE ${waveIndex + 1}`, 182, 84, "#c8fbff", -12);
      }

      function computeWaveStats() {
        const stats = {
          beatInterval: WAVE_DEFS[state.waveIndex].beatInterval,
          syncWindow: 0.165,
          perfectWindow: 0.085,
          sameBeatWindow: 0.18,
          missPenalty: 2.4,
          refund: 0,
          laneRefund: { left: 0, right: 0 },
          laneShields: { left: 0, right: 0 },
        };

        for (const slotName of Object.keys(state.slots)) {
          const item = state.slots[slotName];
          if (!item) {
            continue;
          }
          switch (item.cardId) {
            case "guard":
              if (slotName === "core") {
                stats.laneShields.left += 1;
                stats.laneShields.right += 1;
                stats.syncWindow += 0.015;
              } else {
                stats.laneShields[slotName] += 2;
              }
              break;
            case "coolant":
              stats.syncWindow += slotName === "core" ? 0.04 : 0.03;
              stats.beatInterval += slotName === "core" ? 0.02 : 0.015;
              break;
            case "prism":
              if (slotName === "core") {
                stats.refund += 1.25;
                stats.perfectWindow += 0.02;
              } else {
                stats.laneRefund[slotName] += 0.95;
                stats.sameBeatWindow += 0.012;
              }
              break;
            case "moss":
              if (slotName === "core") {
                stats.missPenalty -= 0.35;
              } else {
                stats.laneShields[slotName] += 1;
                stats.missPenalty -= 0.15;
              }
              break;
            case "broker":
              stats.sameBeatWindow += slotName === "core" ? 0.04 : 0.028;
              stats.refund += slotName === "core" ? 0.4 : 0;
              stats.missPenalty -= slotName === "core" ? 0.28 : 0.12;
              break;
            default:
              break;
          }
        }

        stats.missPenalty = clamp(stats.missPenalty, 1.2, 3.2);
        return stats;
      }

      function beginDefense() {
        if (state.phase !== "auction") {
          return;
        }
        state.phase = "defense";
        state.waveStats = computeWaveStats();
        state.laneShields = {
          left: state.waveStats.laneShields.left,
          right: state.waveStats.laneShields.right,
        };
        state.message = `${WAVE_DEFS[state.waveIndex].name} 방어`;
        createPopup("동기화 개시", 1072, 610, "#d6fff7", -20);
        startNextPair();
      }

      function startNextPair() {
        if (state.mode !== "running") {
          return;
        }
        const wave = WAVE_DEFS[state.waveIndex];
        if (state.pairIndex >= wave.pairs) {
          state.phase = "settle";
          state.settleTimer = 0.9;
          state.settleNext = state.waveIndex === WAVE_DEFS.length - 1 ? "clear" : "wave";
          state.message = state.waveIndex === WAVE_DEFS.length - 1 ? "최종 정산" : "다음 경매 준비";
          return;
        }
        state.phase = "defense";
        state.activePair = {
          age: 0,
          beatTime: state.waveStats.beatInterval * (1.3 + state.pairIndex * 0.05),
          duration: state.waveStats.beatInterval * (1.88 + state.pairIndex * 0.05),
          taps: { left: null, right: null },
          result: null,
        };
        state.pulsePreview = 0;
      }

      function resolveTap(lane, beatTime) {
        const tap = state.activePair?.taps[lane];
        if (tap !== null && Math.abs(tap - beatTime) <= state.waveStats.syncWindow) {
          return {
            ok: true,
            perfect: Math.abs(tap - beatTime) <= state.waveStats.perfectWindow,
            tapTime: tap,
            shielded: false,
          };
        }
        if (state.laneShields[lane] > 0) {
          state.laneShields[lane] -= 1;
          createPopup("차광막", lane === "left" ? 256 : 1024, 300, "#c4fdff", -18);
          return {
            ok: true,
            perfect: false,
            tapTime: beatTime,
            shielded: true,
          };
        }
        return {
          ok: false,
          perfect: false,
          tapTime: tap,
          shielded: false,
        };
      }

      function evaluatePair() {
        const pair = state.activePair;
        if (!pair || pair.result) {
          return;
        }

        const beatTime = pair.beatTime;
        const left = resolveTap("left", beatTime);
        const right = resolveTap("right", beatTime);
        const sameBeatGap = Math.abs((left.tapTime ?? beatTime) - (right.tapTime ?? beatTime));
        const synced = left.ok && right.ok && sameBeatGap <= state.waveStats.sameBeatWindow;
        const perfect = synced && left.perfect && right.perfect;

        pair.result = { synced, perfect };
        state.activePair = null;

        if (synced) {
          const refund = state.waveStats.refund + state.waveStats.laneRefund.left + state.waveStats.laneRefund.right + Math.min(0.8, state.combo * 0.14) + (perfect ? 0.8 : 0.2);
          state.timeLeft = clamp(state.timeLeft + refund, 0, 99.9);
          state.combo += 1;
          state.pairIndex += 1;
          state.streakGlow = clamp(state.streakGlow + 0.25, 0, 1.5);
          state.screenShake = Math.max(state.screenShake, perfect ? 0.18 : 0.08);
          const color = perfect ? "#f8d6ff" : "#ccfff4";
          createPopup(perfect ? "완벽 동기화" : "동기화 성공", 640, 182, color, -16);
          createPopup(`+${numberFormatter.format(refund)}s`, 640, 222, "#fff2c3", -12);
          burstParticles(640, 324, color, perfect ? 24 : 14, perfect ? 250 : 160);
          const gates = getGatePads();
          state.beamBursts.push({ from: gates.left, ttl: 0.35, color });
          state.beamBursts.push({ from: gates.right, ttl: 0.35, color });
          state.settleTimer = perfect ? 0.28 : 0.22;
          state.phase = "settle";
          state.settleNext = "pair";
        } else {
          const failedLanes = (left.ok ? 0 : 1) + (right.ok ? 0 : 1);
          state.combo = 0;
          state.syncMisses += 1;
          state.coreHp -= failedLanes === 2 ? 2 : 1;
          state.timeLeft -= state.waveStats.missPenalty;
          state.screenShake = 0.34;
          createPopup("동기화 누락", 640, 188, "#ffcac4", -14);
          createPopup(`-${numberFormatter.format(state.waveStats.missPenalty)}s`, 640, 226, "#ffd3b8", -10);
          burstParticles(640, 324, "#ff8d8d", 20, 210);
          if (!left.ok) {
            burstParticles(256, 368, "#ff8d8d", 10, 160);
          }
          if (!right.ok) {
            burstParticles(1024, 368, "#ff8d8d", 10, 160);
          }
          if (state.syncMisses >= state.missLimit) {
            failStage("sync-window-missed");
            return;
          }
          if (state.coreHp <= 0) {
            failStage("core-destroyed");
            return;
          }
          if (state.timeLeft <= 0) {
            failStage("time-bank-empty");
            return;
          }
          state.settleTimer = 0.44;
          state.phase = "settle";
          state.settleNext = "pair";
        }
      }

      function buyOffer(offerId, instantBid = false, pointer = null) {
        const offer = state.offers.find((entry) => entry.offerId === offerId);
        if (!offer || offer.sold || state.phase !== "auction") {
          return false;
        }
        const totalDiscount = getPassiveTradeDiscount() + (instantBid ? 0.8 : 0);
        const finalCost = Math.max(1.4, Number((offer.cost - totalDiscount).toFixed(1)));
        offer.sold = true;
        state.timeLeft -= finalCost;
        const item = createItem(offer.cardId);
        state.inventory.push(item);
        createPopup(`-${numberFormatter.format(finalCost)}s`, 1070, 196, "#ffd8c2", -10);
        createPopup(instantBid ? "즉시 입찰" : "낙찰", 1072, 158, CARD_LIBRARY[offer.cardId].accent, -16);
        burstParticles(1080, 206, CARD_LIBRARY[offer.cardId].accent, 12, 160);
        if (pointer) {
          state.drag = {
            itemId: item.itemId,
            pointerX: pointer.x,
            pointerY: pointer.y,
            offsetX: 76,
            offsetY: 28,
            source: "inventory",
          };
        }
        if (state.timeLeft <= 0) {
          failStage("time-bank-empty");
          return true;
        }
        return true;
      }

      function removeItemById(itemId) {
        const inventoryIndex = state.inventory.findIndex((entry) => entry.itemId === itemId);
        if (inventoryIndex >= 0) {
          return state.inventory.splice(inventoryIndex, 1)[0];
        }
        for (const slotName of Object.keys(state.slots)) {
          if (state.slots[slotName]?.itemId === itemId) {
            const item = state.slots[slotName];
            state.slots[slotName] = null;
            return item;
          }
        }
        return null;
      }

      function placeDraggedItem(targetSlotName) {
        if (!state.drag) {
          return;
        }
        const dragItem = removeItemById(state.drag.itemId);
        if (!dragItem) {
          state.drag = null;
          return;
        }
        const occupyingItem = state.slots[targetSlotName];
        state.slots[targetSlotName] = dragItem;
        if (occupyingItem) {
          state.inventory.push(occupyingItem);
        }
        syncCaps();
        if (targetSlotName === "core" && dragItem.cardId === "moss") {
          state.coreHp = clamp(state.coreHp + 1, 0, state.maxCoreHp);
        }
        createPopup(`${dragItem.short} 배치`, getSlotRects()[targetSlotName].x + 80, 506, dragItem.accent, -14);
        createFlash(getSlotRects()[targetSlotName].x + 80, getSlotRects()[targetSlotName].y + 52, 58, dragItem.accent);
        state.drag = null;
      }

      function returnDraggedItemToInventory() {
        if (!state.drag) {
          return;
        }
        const item = removeItemById(state.drag.itemId);
        if (item) {
          state.inventory.push(item);
        }
        state.drag = null;
      }

      function tapLane(lane) {
        if (state.mode !== "running" || state.phase !== "defense" || !state.activePair) {
          return;
        }
        const age = state.activePair.age;
        const existing = state.activePair.taps[lane];
        if (existing === null || Math.abs(age - state.activePair.beatTime) < Math.abs(existing - state.activePair.beatTime)) {
          state.activePair.taps[lane] = age;
          const pad = getGatePads()[lane];
          createFlash(pad.x, pad.y, 42, lane === "left" ? "#92f7ff" : "#ffbbff");
          burstParticles(pad.x, pad.y, lane === "left" ? "#92f7ff" : "#ffbbff", 10, 120);
        }
      }

      function findAuctionTarget(point) {
        const offerRects = getOfferRects();
        for (const rect of offerRects) {
          if (pointInRect(point, rect)) {
            return { kind: "offer", offerId: rect.offerId, rect };
          }
        }
        const inventoryRects = getInventoryRects();
        for (const rect of inventoryRects) {
          if (pointInRect(point, rect)) {
            return { kind: "inventory", itemId: rect.itemId, rect };
          }
        }
        const slots = getSlotRects();
        for (const slotName of Object.keys(slots)) {
          const rect = slots[slotName];
          if (pointInRect(point, rect) && state.slots[slotName]) {
            return { kind: "slot-item", itemId: state.slots[slotName].itemId, slotName, rect };
          }
        }
        if (pointInRect(point, getStartButtonRect())) {
          return { kind: "start-defense" };
        }
        return null;
      }

      function handlePointerDown(event) {
        const point = toCanvasPoint(event.clientX, event.clientY);
        canvas.focus();

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }

        if (state.phase === "auction") {
          const target = findAuctionTarget(point);
          if (target?.kind === "offer") {
            state.pressedTarget = {
              kind: "offer",
              offerId: target.offerId,
              startX: point.x,
              startY: point.y,
              hold: 0,
              triggered: false,
              pointer,
            };
            return;
          }
          if (target?.kind === "inventory" || target?.kind === "slot-item") {
            state.drag = {
              itemId: target.itemId,
              pointerX: point.x,
              pointerY: point.y,
              offsetX: 76,
              offsetY: 28,
              source: target.kind,
            };
            return;
          }
          if (target?.kind === "start-defense") {
            beginDefense();
            return;
          }
        }

        if (state.phase === "defense") {
          const pads = getGatePads();
          if (pointInCircle(point, pads.left) || point.x < VIEW.width * 0.42) {
            tapLane("left");
          } else if (pointInCircle(point, pads.right) || point.x > VIEW.width * 0.58) {
            tapLane("right");
          }
        }
      }

      function handlePointerMove(event) {
        const point = toCanvasPoint(event.clientX, event.clientY);
        if (state.drag) {
          state.drag.pointerX = point.x;
          state.drag.pointerY = point.y;
        }
      }

      function handlePointerUp(event) {
        const point = toCanvasPoint(event.clientX, event.clientY);
        if (state.drag) {
          const slots = getSlotRects();
          let dropped = false;
          for (const slotName of Object.keys(slots)) {
            if (pointInRect(point, slots[slotName])) {
              placeDraggedItem(slotName);
              dropped = true;
              break;
            }
          }
          if (!dropped) {
            returnDraggedItemToInventory();
          }
        } else if (state.pressedTarget?.kind === "offer" && !state.pressedTarget.triggered) {
          buyOffer(state.pressedTarget.offerId, false, null);
        }
        state.pressedTarget = null;
      }

      function handleKeyboard(event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
            return;
          }
          if (state.phase === "auction") {
            beginDefense();
          }
        }
        if (event.key.toLowerCase() === "a" || event.key === "ArrowLeft") {
          tapLane("left");
        }
        if (event.key.toLowerCase() === "l" || event.key === "ArrowRight") {
          tapLane("right");
        }
        if (event.key.toLowerCase() === "f") {
          toggleFullscreen();
        }
      }

      async function toggleFullscreen() {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
            return;
          }
          await canvas.requestFullscreen?.();
        } catch (error) {
          console.warn("fullscreen-toggle-failed", error);
        }
      }

      function updateAuction(dt) {
        state.auctionTimer -= dt;
        if (state.auctionTimer <= 0) {
          beginDefense();
        }
      }

      function updateDefense(dt) {
        if (!state.activePair) {
          return;
        }
        state.activePair.age += dt;
        state.pulsePreview = clamp(state.activePair.age / state.activePair.beatTime, 0, 1.25);
        if (state.activePair.age >= state.activePair.duration) {
          evaluatePair();
        }
      }

      function updateSettle(dt) {
        state.settleTimer -= dt;
        if (state.settleTimer > 0) {
          return;
        }
        const next = state.settleNext;
        state.settleNext = null;
        if (next === "pair") {
          startNextPair();
          return;
        }
        if (next === "wave") {
          beginAuction(state.waveIndex + 1);
          return;
        }
        if (next === "clear") {
          if (state.timeLeft > 0) {
            clearStage();
          } else {
            failStage("time-bank-empty");
          }
        }
      }

      function step(dt) {
        syncCaps();
        const delta = clamp(dt, 0, MAX_DT);
        state.moonOffset += delta * 7;
        state.metronome += delta;

        if (state.mode === "running") {
          state.elapsed += delta;
          const drain = state.phase === "auction" ? 0.55 : 0.95;
          state.timeLeft -= delta * drain;
          if (state.timeLeft <= 0) {
            failStage("time-bank-empty");
          }
        }

        if (state.mode === "running" && state.phase === "auction") {
          updateAuction(delta);
        } else if (state.mode === "running" && state.phase === "defense") {
          updateDefense(delta);
        } else if (state.mode === "running" && state.phase === "settle") {
          updateSettle(delta);
        }

        if (state.pressedTarget?.kind === "offer" && !state.pressedTarget.triggered) {
          state.pressedTarget.hold += delta;
          if (state.pressedTarget.hold >= HOLD_THRESHOLD) {
            state.pressedTarget.triggered = buyOffer(
              state.pressedTarget.offerId,
              true,
              state.pressedTarget.pointer
            );
          }
        }

        state.screenShake = Math.max(0, state.screenShake - delta * 1.8);
        state.streakGlow = Math.max(0, state.streakGlow - delta * 0.6);

        state.popups = state.popups.filter((popup) => {
          popup.ttl -= delta;
          popup.y += popup.velocityY * delta;
          return popup.ttl > 0;
        });

        state.flashes = state.flashes.filter((flash) => {
          flash.ttl -= delta;
          return flash.ttl > 0;
        });

        state.beamBursts = state.beamBursts.filter((beam) => {
          beam.ttl -= delta;
          return beam.ttl > 0;
        });

        state.particles = state.particles.filter((particle) => {
          particle.ttl -= delta;
          particle.x += particle.vx * delta;
          particle.y += particle.vy * delta;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          return particle.ttl > 0;
        });
      }

      function drawRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawGlassPanel(x, y, width, height, accent, alpha = 0.18) {
        ctx.save();
        drawRoundedRect(x, y, width, height, 26);
        const fill = ctx.createLinearGradient(x, y, x + width, y + height);
        fill.addColorStop(0, `rgba(18, 34, 58, ${0.92})`);
        fill.addColorStop(1, `rgba(10, 20, 36, ${0.72})`);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.2;
        ctx.globalAlpha = alpha;
        ctx.stroke();
        ctx.restore();
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#08121c");
        sky.addColorStop(0.42, "#0c1731");
        sky.addColorStop(1, "#09111d");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const moonX = 970 + Math.sin(state.moonOffset * 0.18) * 22;
        const moonY = 126 + Math.cos(state.moonOffset * 0.16) * 10;
        const moonGradient = ctx.createRadialGradient(moonX, moonY, 24, moonX, moonY, 140);
        moonGradient.addColorStop(0, "rgba(245, 255, 246, 0.95)");
        moonGradient.addColorStop(0.26, "rgba(180, 255, 233, 0.44)");
        moonGradient.addColorStop(1, "rgba(180, 255, 233, 0)");
        ctx.fillStyle = moonGradient;
        ctx.beginPath();
        ctx.arc(moonX, moonY, 140, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(15, 30, 50, 0.85)";
        ctx.fillRect(0, 566, VIEW.width, VIEW.height - 566);

        for (let index = 0; index < 7; index += 1) {
          const x = 110 + index * 176;
          ctx.strokeStyle = "rgba(138, 237, 223, 0.16)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x - 60, 566);
          ctx.quadraticCurveTo(x, 90, x + 60, 566);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(166, 255, 227, 0.12)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(120, 566);
        ctx.lineTo(1160, 566);
        ctx.stroke();

        for (let index = 0; index < ambientSeeds.length; index += 1) {
          const mote = ambientSeeds[index];
          const x = (mote.x + state.moonOffset * mote.speed * 0.1) % (VIEW.width + 40) - 20;
          const y = (mote.y + Math.sin((state.moonOffset + index) * 0.2) * 20 + VIEW.height) % (VIEW.height + 60) - 30;
          ctx.fillStyle = `rgba(194, 255, 236, ${mote.alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, mote.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawHeader() {
        drawGlassPanel(34, 28, 426, 112, "rgba(140, 248, 255, 0.38)");
        ctx.fillStyle = "#f7fdff";
        ctx.font = '700 38px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("Moon Greenhouse", 58, 74);
        ctx.fillStyle = "rgba(214, 251, 255, 0.8)";
        ctx.font = '600 18px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("Debt Auction", 60, 102);
        ctx.fillStyle = "rgba(196, 255, 239, 0.72)";
        ctx.font = '500 15px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(META.description, 58, 126);

        const waveX = 480;
        drawGlassPanel(waveX, 28, 250, 112, "rgba(191, 157, 255, 0.34)");
        ctx.fillStyle = "#d9f8ff";
        ctx.font = '700 18px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(`WAVE ${state.waveIndex + 1}/${WAVE_DEFS.length}`, waveX + 26, 62);
        ctx.fillStyle = "rgba(240, 248, 255, 0.94)";
        ctx.font = '600 26px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(WAVE_DEFS[state.waveIndex]?.name || "대기", waveX + 26, 96);
        ctx.fillStyle = "rgba(201, 215, 233, 0.72)";
        ctx.font = '500 14px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(state.phase === "auction" ? "경매 시간 동안 장비를 끌어다 배치" : "좌우 문을 같은 박자에 닫기", waveX + 26, 122);

        drawGlassPanel(754, 28, 492, 112, "rgba(255, 227, 155, 0.34)");
        const barWidth = 176;
        const hpRatio = clamp(state.coreHp / Math.max(1, state.maxCoreHp), 0, 1);
        const missRatio = clamp((state.missLimit - state.syncMisses) / Math.max(1, state.missLimit), 0, 1);

        ctx.fillStyle = "#f5fcff";
        ctx.font = '700 16px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("시간 잔고", 778, 56);
        ctx.fillText("코어", 962, 56);
        ctx.fillText("동기화 여유", 1112, 56);

        ctx.fillStyle = "#fff5d8";
        ctx.font = '700 32px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(`${numberFormatter.format(Math.max(0, state.timeLeft))}s`, 778, 92);

        drawRoundedRect(954, 70, barWidth, 18, 9);
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fill();
        drawRoundedRect(954, 70, barWidth * hpRatio, 18, 9);
        const hpFill = ctx.createLinearGradient(954, 70, 954 + barWidth, 70);
        hpFill.addColorStop(0, "#8bfde3");
        hpFill.addColorStop(1, "#69c4ff");
        ctx.fillStyle = hpFill;
        ctx.fill();

        drawRoundedRect(1108, 70, barWidth - 34, 18, 9);
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fill();
        drawRoundedRect(1108, 70, (barWidth - 34) * missRatio, 18, 9);
        const missFill = ctx.createLinearGradient(1108, 70, 1230, 70);
        missFill.addColorStop(0, "#ffe290");
        missFill.addColorStop(1, "#ff97c2");
        ctx.fillStyle = missFill;
        ctx.fill();

        ctx.fillStyle = "#d9f8ff";
        ctx.font = '600 14px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(`${state.coreHp}/${state.maxCoreHp}`, 954, 104);
        ctx.fillText(`${state.syncMisses}/${state.missLimit}`, 1108, 104);
      }

      function drawCoreAndRails() {
        const core = getCorePoint();
        const gates = getGatePads();
        const shakeX = (Math.random() - 0.5) * state.screenShake * 18;
        const shakeY = (Math.random() - 0.5) * state.screenShake * 18;
        ctx.save();
        ctx.translate(shakeX, shakeY);

        drawGlassPanel(124, 160, 760, 476, "rgba(126, 255, 230, 0.14)", 0.12);

        ctx.strokeStyle = "rgba(132, 255, 238, 0.16)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(108, 378);
        ctx.bezierCurveTo(168, 316, 208, 316, gates.left.x - 28, gates.left.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(1170, 378);
        ctx.bezierCurveTo(1110, 316, 1070, 316, gates.right.x + 28, gates.right.y);
        ctx.stroke();

        for (const beam of state.beamBursts) {
          ctx.strokeStyle = beam.color;
          ctx.globalAlpha = clamp(beam.ttl / 0.35, 0, 1) * 0.85;
          ctx.lineWidth = 10;
          ctx.beginPath();
          ctx.moveTo(beam.from.x, beam.from.y);
          ctx.lineTo(core.x, core.y);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        for (const side of ["left", "right"]) {
          const pad = gates[side];
          const accent = side === "left" ? "#92f7ff" : "#f0b9ff";
          const pulse = state.phase === "defense" && state.activePair
            ? clamp(state.activePair.age / state.activePair.beatTime, 0, 1.2)
            : 0;
          const ringRadius = 24 + pulse * 110;
          ctx.fillStyle = "rgba(18, 31, 53, 0.9)";
          ctx.beginPath();
          ctx.arc(pad.x, pad.y, pad.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = accent;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(pad.x, pad.y, pad.radius - 10, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = state.phase === "defense" ? 0.52 : 0.18;
          ctx.strokeStyle = accent;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(pad.x, pad.y, ringRadius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.fillStyle = "rgba(245, 251, 255, 0.88)";
          ctx.font = '700 14px "Avenir Next", "Noto Sans KR", sans-serif';
          ctx.textAlign = "center";
          ctx.fillText(side === "left" ? "LEFT TAP" : "RIGHT TAP", pad.x, pad.y + 6);
        }

        const coreGlow = ctx.createRadialGradient(core.x, core.y, 24, core.x, core.y, 140);
        coreGlow.addColorStop(0, "rgba(255, 252, 233, 0.98)");
        coreGlow.addColorStop(0.25, "rgba(151, 255, 230, 0.54)");
        coreGlow.addColorStop(1, "rgba(151, 255, 230, 0)");
        ctx.fillStyle = coreGlow;
        ctx.beginPath();
        ctx.arc(core.x, core.y, 140 + state.streakGlow * 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(245, 255, 250, 0.92)";
        ctx.beginPath();
        ctx.arc(core.x, core.y, core.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(183, 255, 224, 0.66)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(core.x, core.y, core.radius + 10, 0, Math.PI * 2);
        ctx.stroke();

        if (state.phase === "defense" && state.activePair) {
          const beatRatio = clamp(state.activePair.age / state.activePair.beatTime, 0, 1.25);
          const sweepAngle = -Math.PI / 2 + beatRatio * Math.PI * 2;
          ctx.strokeStyle = "rgba(255, 234, 171, 0.9)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(core.x, core.y, 86, -Math.PI / 2, sweepAngle);
          ctx.stroke();

          ctx.strokeStyle = "rgba(255, 240, 214, 0.5)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(core.x, core.y, 102, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(14, 27, 44, 0.86)";
        ctx.font = '800 18px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("SYNC CORE", core.x, core.y + 7);
        ctx.textAlign = "left";
        ctx.restore();
      }

      function drawSlots() {
        const slots = getSlotRects();
        for (const slotName of Object.keys(slots)) {
          const rect = slots[slotName];
          const item = state.slots[slotName];
          const accent = item ? item.accent : "rgba(202, 239, 255, 0.24)";
          drawGlassPanel(rect.x, rect.y, rect.width, rect.height, accent, item ? 0.24 : 0.12);
          ctx.fillStyle = "rgba(218, 245, 255, 0.72)";
          ctx.font = '700 13px "Avenir Next", "Noto Sans KR", sans-serif';
          ctx.fillText(rect.label, rect.x + 20, rect.y + 24);

          if (item) {
            ctx.fillStyle = item.accent;
            ctx.font = '700 22px "Avenir Next", "Noto Sans KR", sans-serif';
            ctx.fillText(item.name, rect.x + 20, rect.y + 58);
            ctx.fillStyle = "rgba(240, 248, 255, 0.76)";
            ctx.font = '600 14px "Avenir Next", "Noto Sans KR", sans-serif';
            ctx.fillText(item.lines[0], rect.x + 20, rect.y + 84);
            ctx.fillText(item.lines[1], rect.x + 20, rect.y + 104);
          } else {
            ctx.fillStyle = "rgba(191, 223, 242, 0.54)";
            ctx.font = '600 16px "Avenir Next", "Noto Sans KR", sans-serif';
            ctx.fillText(slotName === "core" ? "드래그로 코어 증폭기 배치" : "드래그로 차광 모듈 배치", rect.x + 20, rect.y + 70);
          }
        }
      }

      function drawAuctionPanel() {
        drawGlassPanel(910, 132, 330, 534, "rgba(244, 211, 255, 0.24)");
        ctx.fillStyle = "#f6fbff";
        ctx.font = '700 28px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("월광 경매장", 938, 174);
        ctx.fillStyle = "rgba(214, 234, 255, 0.7)";
        ctx.font = '600 14px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("길게 누르면 즉시 입찰 할인, 낙찰 후 슬롯으로 드래그", 938, 198);

        const offerRects = getOfferRects();
        offerRects.forEach((rect, index) => {
          const offer = state.offers[index];
          const card = CARD_LIBRARY[offer.cardId];
          const glow = (state.pressedTarget?.offerId === offer.offerId ? 0.4 : 0.16) + (offer.sold ? -0.05 : 0);
          drawRoundedRect(rect.x, rect.y, rect.width, rect.height, 24);
          const fill = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y + rect.height);
          fill.addColorStop(0, offer.sold ? "rgba(25, 39, 56, 0.72)" : "rgba(17, 31, 52, 0.92)");
          fill.addColorStop(1, offer.sold ? "rgba(12, 20, 32, 0.84)" : "rgba(13, 22, 39, 0.82)");
          ctx.fillStyle = fill;
          ctx.fill();
          ctx.strokeStyle = card.accent;
          ctx.globalAlpha = glow;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.globalAlpha = 1;

          ctx.fillStyle = card.accent;
          ctx.font = '700 24px "Avenir Next", "Noto Sans KR", sans-serif';
          ctx.fillText(card.name, rect.x + 22, rect.y + 40);
          ctx.fillStyle = "rgba(237, 246, 255, 0.78)";
          ctx.font = '600 16px "Avenir Next", "Noto Sans KR", sans-serif';
          ctx.fillText(card.lines[0], rect.x + 22, rect.y + 72);
          ctx.fillText(card.lines[1], rect.x + 22, rect.y + 94);

          ctx.fillStyle = "rgba(255, 244, 217, 0.94)";
          ctx.font = '700 22px "Avenir Next", "Noto Sans KR", sans-serif';
          const finalCost = Math.max(1.4, Number((offer.cost - getPassiveTradeDiscount()).toFixed(1)));
          ctx.fillText(`${numberFormatter.format(finalCost)}s`, rect.x + 22, rect.y + 116);

          if (offer.sold) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
            ctx.font = '800 22px "Avenir Next", "Noto Sans KR", sans-serif';
            ctx.fillText("SOLD", rect.x + rect.width - 84, rect.y + 44);
          } else {
            ctx.fillStyle = "rgba(214, 239, 255, 0.66)";
            ctx.font = '700 14px "Avenir Next", "Noto Sans KR", sans-serif';
            ctx.fillText("길게 눌러 -0.8s 즉시 입찰", rect.x + rect.width - 182, rect.y + 110);
          }
        });

        const inventoryRects = getInventoryRects();
        ctx.fillStyle = "rgba(214, 239, 255, 0.82)";
        ctx.font = '700 16px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("보유 모듈", 50, 518);
        inventoryRects.forEach((rect) => {
          const item = state.inventory.find((entry) => entry.itemId === rect.itemId);
          if (!item) {
            return;
          }
          drawRoundedRect(rect.x, rect.y, rect.width, rect.height, 20);
          const fill = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y + rect.height);
          fill.addColorStop(0, "rgba(15, 27, 46, 0.92)");
          fill.addColorStop(1, "rgba(9, 18, 31, 0.86)");
          ctx.fillStyle = fill;
          ctx.fill();
          ctx.strokeStyle = item.accent;
          ctx.globalAlpha = 0.34;
          ctx.stroke();
          ctx.globalAlpha = 1;
          ctx.fillStyle = item.accent;
          ctx.font = '700 18px "Avenir Next", "Noto Sans KR", sans-serif';
          ctx.fillText(item.name, rect.x + 14, rect.y + 34);
        });

        const startRect = getStartButtonRect();
        drawRoundedRect(startRect.x, startRect.y, startRect.width, startRect.height, 22);
        const startFill = ctx.createLinearGradient(startRect.x, startRect.y, startRect.x + startRect.width, startRect.y);
        startFill.addColorStop(0, "rgba(122, 255, 216, 0.94)");
        startFill.addColorStop(1, "rgba(138, 196, 255, 0.94)");
        ctx.fillStyle = startFill;
        ctx.fill();
        ctx.fillStyle = "#08131f";
        ctx.font = '800 22px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("동기화 문 개방", startRect.x + 30, startRect.y + 42);
        ctx.font = '700 14px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(`자동 시작 ${numberFormatter.format(Math.max(0, state.auctionTimer))}s`, startRect.x + 30, startRect.y + 60);
      }

      function drawDefenseHud() {
        drawGlassPanel(910, 132, 330, 210, "rgba(148, 236, 255, 0.18)");
        ctx.fillStyle = "#f6fbff";
        ctx.font = '700 24px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("동기화 시퀀스", 938, 172);
        ctx.fillStyle = "rgba(222, 240, 255, 0.74)";
        ctx.font = '600 14px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("좌우 패드를 같은 박자에 연속 입력", 938, 194);

        const current = Math.min(state.pairIndex + (state.activePair ? 1 : 0), WAVE_DEFS[state.waveIndex].pairs);
        ctx.fillStyle = "#d8fbff";
        ctx.font = '700 38px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(`${current}/${WAVE_DEFS[state.waveIndex].pairs}`, 938, 248);

        ctx.fillStyle = "rgba(255, 244, 204, 0.88)";
        ctx.font = '700 16px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(`좌 차광 ${integerFormatter.format(state.laneShields.left)}`, 938, 288);
        ctx.fillText(`우 차광 ${integerFormatter.format(state.laneShields.right)}`, 1062, 288);

        if (state.activePair) {
          const remain = Math.max(0, state.activePair.beatTime - state.activePair.age);
          ctx.fillStyle = "rgba(243, 236, 255, 0.84)";
          ctx.font = '600 16px "Avenir Next", "Noto Sans KR", sans-serif';
          ctx.fillText(`다음 박자 ${numberFormatter.format(remain)}s`, 938, 320);
        }
      }

      function drawDragItem() {
        if (!state.drag) {
          return;
        }
        const item =
          state.inventory.find((entry) => entry.itemId === state.drag.itemId) ||
          Object.values(state.slots).find((entry) => entry?.itemId === state.drag.itemId);
        if (!item) {
          return;
        }
        const x = state.drag.pointerX - state.drag.offsetX;
        const y = state.drag.pointerY - state.drag.offsetY;
        ctx.save();
        ctx.globalAlpha = 0.94;
        drawRoundedRect(x, y, 152, 56, 20);
        ctx.fillStyle = "rgba(17, 29, 49, 0.96)";
        ctx.fill();
        ctx.strokeStyle = item.accent;
        ctx.globalAlpha = 0.7;
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillStyle = item.accent;
        ctx.font = '700 18px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(item.name, x + 14, y + 34);
        ctx.restore();
      }

      function drawEffects() {
        for (const flash of state.flashes) {
          ctx.save();
          ctx.globalAlpha = clamp(flash.ttl / 0.34, 0, 1) * 0.7;
          ctx.strokeStyle = flash.color;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(flash.x, flash.y, flash.radius * (1 + (1 - flash.ttl / 0.34) * 0.5), 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        for (const particle of state.particles) {
          ctx.save();
          ctx.globalAlpha = clamp(particle.ttl, 0, 1);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        for (const popup of state.popups) {
          ctx.save();
          ctx.globalAlpha = clamp(popup.ttl, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.font = '700 24px "Avenir Next", "Noto Sans KR", sans-serif';
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        }
        ctx.textAlign = "left";
      }

      function drawMenuOrResult() {
        if (state.mode === "running") {
          return;
        }
        ctx.save();
        ctx.fillStyle = "rgba(5, 13, 24, 0.5)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        drawGlassPanel(160, 116, 960, 488, "rgba(177, 247, 255, 0.3)");
        ctx.fillStyle = "#f7fdff";
        ctx.font = '700 54px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(META.title, 206, 206);
        ctx.fillStyle = "rgba(213, 247, 255, 0.82)";
        ctx.font = '600 20px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText("시간을 입찰해 차광 장비를 사고, 좌우 문을 같은 박자에 닫아 코어를 지키는 리스크 퍼즐 디펜스.", 206, 244);

        const lines = state.mode === "menu"
          ? [
              "경매 카드 선택: 클릭 또는 터치",
              "모듈 배치: 낙찰 카드를 슬롯으로 드래그",
              "즉시 입찰: 카드 길게 눌러 할인 구매",
              "방어: 좌우 패드를 같은 박자에 연속 입력",
              "모바일: 화면 터치와 드래그만으로 전부 플레이 가능",
            ]
          : state.mode === "failed"
            ? [
                `실패 원인: ${state.timeLeft <= 0 ? "시간 잔고 소진" : state.coreHp <= 0 ? "코어 붕괴" : "동기화 누락 누적"}`,
                `버틴 시간 ${numberFormatter.format(state.lastRunTime)}s`,
                `남은 잔고 ${numberFormatter.format(Math.max(0, state.timeLeft))}s`,
                `누락 ${state.syncMisses}/${state.missLimit} | 코어 ${Math.max(0, state.coreHp)}/${state.maxCoreHp}`,
              ]
            : [
                "모든 경매 파동을 넘기고 시간을 남겼습니다.",
                `클리어 시간 ${numberFormatter.format(state.lastRunTime)}s`,
                `최종 잔고 ${numberFormatter.format(Math.max(0, state.timeLeft))}s`,
                `누락 ${state.syncMisses}/${state.missLimit} | 코어 ${Math.max(0, state.coreHp)}/${state.maxCoreHp}`,
              ];

        ctx.fillStyle = "rgba(244, 251, 255, 0.92)";
        ctx.font = '700 24px "Avenir Next", "Noto Sans KR", sans-serif';
        lines.forEach((line, index) => {
          ctx.fillText(line, 208, 326 + index * 56);
        });

        ctx.fillStyle = state.mode === "menu" ? "#d4fff3" : state.mode === "failed" ? "#ffc2bf" : "#d8fff1";
        ctx.font = '800 26px "Avenir Next", "Noto Sans KR", sans-serif';
        ctx.fillText(state.mode === "menu" ? "화면 터치 또는 Enter로 시작" : "화면 터치 또는 Enter로 재도전", 208, 548);
        ctx.restore();
      }

      function drawFooterHint() {
        if (state.mode !== "running") {
          return;
        }
        ctx.fillStyle = "rgba(215, 233, 250, 0.62)";
        ctx.font = '600 13px "Avenir Next", "Noto Sans KR", sans-serif';
        const hint =
          state.phase === "auction"
            ? "시장 카드를 눌러 낙찰하고, 슬롯으로 끌어 장비를 세팅하세요."
            : state.phase === "defense"
              ? "좌우 게이트를 같은 박자에 눌러 동기화 문을 닫으세요."
              : state.message;
        ctx.fillText(hint, 40, 700);
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawBackground();
        drawHeader();
        drawCoreAndRails();
        drawSlots();

        if (state.mode === "running" && state.phase === "auction") {
          drawAuctionPanel();
        } else if (state.mode === "running") {
          drawDefenseHud();
        }

        drawEffects();
        drawDragItem();
        drawFooterHint();
        drawMenuOrResult();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        step(delta);
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      canvas.addEventListener("pointerdown", handlePointerDown);
      window.addEventListener("pointermove", handlePointerMove);
      window.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener(
        "touchstart",
        (event) => {
          if (event.touches[0]) {
            handlePointerDown({
              clientX: event.touches[0].clientX,
              clientY: event.touches[0].clientY,
            });
          }
          event.preventDefault();
        },
        { passive: false }
      );
      canvas.addEventListener("keydown", handleKeyboard);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && document.fullscreenElement) {
          document.exitFullscreen?.();
        }
      });

      window.render_game_to_text = () => {
        const payload = {
          mode: state.mode,
          phase: state.phase,
          timeLeft: Number(Math.max(0, state.timeLeft).toFixed(1)),
          wave: state.waveIndex + 1,
          pair: state.pairIndex + (state.activePair ? 1 : 0),
          combo: state.combo,
          coreHp: state.coreHp,
          syncMisses: state.syncMisses,
          slots: Object.fromEntries(
            Object.entries(state.slots).map(([slot, item]) => [slot, item ? item.cardId : null])
          ),
          inventory: state.inventory.map((item) => item.cardId),
          activePair: state.activePair
            ? {
                beatTime: Number(state.activePair.beatTime.toFixed(2)),
                age: Number(state.activePair.age.toFixed(2)),
                taps: state.activePair.taps,
              }
            : null,
        };
        return JSON.stringify(payload);
      };

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          step(FIXED_DT);
        }
        render();
      };

      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        creator: META.creator,
        genre: META.genre,
        description: META.description,
        controls: META.controls,
        clearCondition: META.clearCondition,
        failCondition: META.failCondition,
      };

      window.relayStageResult = { status: "running" };

      window.relayStageDebug = {
        forceClear() {
          state.timeLeft = Math.max(1.2, state.timeLeft);
          clearStage();
        },
        forceFail() {
          failStage("debug-force-fail");
        },
      };

      render();
      reportReadyToHost();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
