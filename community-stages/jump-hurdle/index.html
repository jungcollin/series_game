<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jump Hurdle</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">Jump Hurdle. 캔버스를 터치하거나 Enter로 시작하세요. 진행 중에는 Space 또는 위쪽 화살표, 모바일에서는 화면 터치로 점프할 수 있습니다.</p>
    <canvas id="game" width="960" height="540" aria-label="Jump Hurdle" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("jump-hurdle") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const GROUND_Y = 420;
      const GRAVITY = 1540;
      const JUMP_VEL = -640;
      const PLAYER_W = 36;
      const PLAYER_H = 52;
      const SCROLL_SPEED_BASE = 170;
      const TOTAL_TIME = 22;
      const DOOR_APPEAR_TIME = 18;
      const input = { jump: false };
      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      const state = { mode: "menu", elapsed: 0, lastRunTime: 0, hp: 8, note: "점프로 장애물을 피하는 게임. 장애물에 걸리면 실패" };
      let player = {};
      let obstacles = [];
      let door = null;
      let nextObstacleTimer = 0;
      let scrollSpeed = SCROLL_SPEED_BASE;
      let stars = [];
      function createStars() { stars = []; for (let i = 0; i < 60; i++) { stars.push({ x: Math.random() * VIEW.width, y: Math.random() * (GROUND_Y - 40), size: Math.random() * 2 + 0.5, speed: Math.random() * 30 + 10 }); } }
      function resetGame() { player = { x: 120, y: GROUND_Y - PLAYER_H, vy: 0, onGround: true, w: PLAYER_W, h: PLAYER_H }; obstacles = []; door = null; nextObstacleTimer = 1.8; scrollSpeed = SCROLL_SPEED_BASE; createStars(); }
      function spawnObstacle() { const types = ["low", "mid", "tall"]; const type = types[Math.floor(Math.random() * types.length)]; let w, h; if (type === "low") { w = 20; h = 22; } else if (type === "mid") { w = 20; h = 34; } else { w = 16; h = 46; } obstacles.push({ x: VIEW.width + 20, y: GROUND_Y - h, w, h, type }); }
      function spawnDoor() { door = { x: VIEW.width + 40, y: GROUND_Y - 80, w: 50, h: 80 }; }
      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch (error) { return false; } }
      function reportReadyToHost() { if (!inRelayHost()) return; window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailedToHost(reason = "failed") { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: window.relayStageMeta.id, stageTitle: window.relayStageMeta.title, reason, durationSec: Number(state.lastRunTime.toFixed(1)) }); }
      function reportClearedToHost() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: window.relayStageMeta.id, stageTitle: window.relayStageMeta.title, clearCountAfter: relayContext.clearCount + 1, durationSec: Number(state.lastRunTime.toFixed(1)) }); }
      function startStage() { state.mode = "running"; state.elapsed = 0; state.lastRunTime = 0; state.hp = 8; window.relayStageResult.status = "running"; hostFailedReported = false; hostClearedReported = false; resetGame(); }
      function failStage(reason = "hit_obstacle") { state.mode = "failed"; state.lastRunTime = state.elapsed; window.relayStageResult.status = "failed"; reportFailedToHost(reason); }
      function clearStage() { state.mode = "cleared"; state.lastRunTime = state.elapsed; window.relayStageResult.status = "cleared"; reportClearedToHost(); }
      function rectsOverlap(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
      function update(dt) { if (state.mode !== "running") return; state.elapsed += dt; scrollSpeed = SCROLL_SPEED_BASE + state.elapsed * 1.5; if (input.jump && player.onGround) { player.vy = JUMP_VEL; player.onGround = false; } input.jump = false; player.vy += GRAVITY * dt; player.y += player.vy * dt; if (player.y >= GROUND_Y - player.h) { player.y = GROUND_Y - player.h; player.vy = 0; player.onGround = true; } if (state.elapsed < DOOR_APPEAR_TIME) { nextObstacleTimer -= dt; if (nextObstacleTimer <= 0) { spawnObstacle(); const minI = Math.max(1.45, 2.2 - state.elapsed * 0.015); nextObstacleTimer = minI + Math.random() * 0.45; } } if (state.elapsed >= DOOR_APPEAR_TIME && !door) { spawnDoor(); } for (const obs of obstacles) { obs.x -= scrollSpeed * dt; } obstacles = obstacles.filter((o) => o.x + o.w > -20); if (door) { door.x -= scrollSpeed * dt; } for (const star of stars) { star.x -= star.speed * dt; if (star.x < -4) star.x = VIEW.width + 4; } const pb = { x: player.x + 9, y: player.y + 8, w: player.w - 18, h: player.h - 14 }; for (const obs of obstacles) { if (rectsOverlap(pb, obs)) { if (state.hp > 1) { state.hp -= 1; obs.x = -999; continue; } failStage("hit_obstacle"); return; } } if (door && rectsOverlap(pb, door)) { clearStage(); return; } if (door && door.x + door.w < 0) { clearStage(); return; } if (state.elapsed >= TOTAL_TIME) { clearStage(); return; } }
      function renderCard(title, lines, accent) { ctx.fillStyle = "rgba(15, 23, 42, 0.88)"; ctx.fillRect(0, 0, VIEW.width, VIEW.height); ctx.fillStyle = "rgba(248, 250, 252, 0.98)"; ctx.fillRect(128, 92, 704, 356); ctx.strokeStyle = accent; ctx.lineWidth = 4; ctx.strokeRect(128, 92, 704, 356); ctx.fillStyle = accent; ctx.font = "700 42px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText(title, VIEW.width / 2, 162); ctx.fillStyle = "#0f172a"; ctx.font = "600 22px Trebuchet MS"; lines.forEach((line, index) => { ctx.fillText(line, VIEW.width / 2, 228 + index * 42); }); ctx.textAlign = "left"; }
      function drawGround() { ctx.fillStyle = "#334155"; ctx.fillRect(0, GROUND_Y, VIEW.width, VIEW.height - GROUND_Y); ctx.strokeStyle = "#64748b"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(VIEW.width, GROUND_Y); ctx.stroke(); }
      function drawPlayer() { ctx.fillStyle = "#38bdf8"; ctx.fillRect(player.x, player.y, player.w, player.h); ctx.fillStyle = "#fff"; ctx.fillRect(player.x + 22, player.y + 10, 8, 8); ctx.fillStyle = "#0f172a"; ctx.fillRect(player.x + 26, player.y + 12, 4, 4); const lp = Math.sin(state.elapsed * 12) * 4; ctx.fillStyle = "#38bdf8"; ctx.fillRect(player.x + 6, player.y + player.h, 8, 6 + (player.onGround ? lp : -4)); ctx.fillRect(player.x + 22, player.y + player.h, 8, 6 + (player.onGround ? -lp : -4)); }
      function drawObstacles() { for (const obs of obstacles) { if (obs.type === "low") { ctx.fillStyle = "#ef4444"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.fillStyle = "#fca5a5"; for (let i = 0; i < 3; i++) { const sx = obs.x + 4 + i * 10; ctx.beginPath(); ctx.moveTo(sx, obs.y); ctx.lineTo(sx + 5, obs.y - 8); ctx.lineTo(sx + 10, obs.y); ctx.fill(); } } else if (obs.type === "mid") { ctx.fillStyle = "#f97316"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.fillStyle = "#fdba74"; ctx.fillRect(obs.x + 4, obs.y + 4, obs.w - 8, 6); } else { ctx.fillStyle = "#dc2626"; ctx.fillRect(obs.x, obs.y, obs.w, obs.h); ctx.fillStyle = "#fca5a5"; ctx.fillRect(obs.x + 3, obs.y + 3, obs.w - 6, 8); ctx.fillRect(obs.x + 3, obs.y + obs.h - 11, obs.w - 6, 8); } } }
      function drawDoor() { if (!door) return; ctx.fillStyle = "#22c55e"; ctx.fillRect(door.x, door.y, door.w, door.h); ctx.fillStyle = "#15803d"; ctx.fillRect(door.x + 6, door.y + 6, door.w - 12, door.h - 6); ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(door.x + door.w - 14, door.y + door.h / 2, 4, 0, Math.PI * 2); ctx.fill(); const ga = 0.3 + 0.2 * Math.sin(state.elapsed * 6); ctx.shadowColor = "#22c55e"; ctx.shadowBlur = 20; ctx.fillStyle = `rgba(34, 197, 94, ${ga})`; ctx.fillRect(door.x - 4, door.y - 4, door.w + 8, door.h + 8); ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.font = "bold 14px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText("EXIT", door.x + door.w / 2, door.y - 8); ctx.textAlign = "left"; }
      function drawHUD() { const tl = Math.max(0, TOTAL_TIME - state.elapsed); const bW = 200, bH = 16, bX = VIEW.width / 2 - bW / 2, bY = 20; ctx.fillStyle = "rgba(30, 41, 59, 0.7)"; ctx.fillRect(bX - 2, bY - 2, bW + 4, bH + 4); ctx.fillStyle = tl > 5 ? "#22c55e" : "#ef4444"; ctx.fillRect(bX, bY, bW * (tl / TOTAL_TIME), bH); ctx.strokeStyle = "#94a3b8"; ctx.lineWidth = 1; ctx.strokeRect(bX, bY, bW, bH); ctx.fillStyle = "#f8fafc"; ctx.font = "bold 20px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText(`${tl.toFixed(1)}s`, VIEW.width / 2, bY + bH + 24); ctx.textAlign = "left"; if (state.elapsed >= DOOR_APPEAR_TIME - 2 && state.elapsed < DOOR_APPEAR_TIME) { ctx.fillStyle = "#fbbf24"; ctx.font = "bold 18px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText("문이 곧 나타납니다!", VIEW.width / 2, bY + bH + 52); ctx.textAlign = "left"; } if (door) { ctx.fillStyle = "#22c55e"; ctx.font = "bold 18px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText("문에 도달하세요!", VIEW.width / 2, bY + bH + 52); ctx.textAlign = "left"; } }
      function drawStars() { ctx.fillStyle = "#cbd5e1"; for (const star of stars) { ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill(); } }
      function render() { ctx.clearRect(0, 0, VIEW.width, VIEW.height); if (state.mode === "menu") { renderCard("Jump Hurdle", ["조작: Space / Up / 화면 터치로 점프", "클리어: 22초 동안 장애물을 피하고 문에 도달", "실패: 장애물에 부딪히면 즉시 실패", "터치 또는 Enter로 시작"], "#f97316"); return; } if (state.mode === "running") { ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, VIEW.width, VIEW.height); drawStars(); drawGround(); drawObstacles(); drawDoor(); drawPlayer(); drawHUD(); return; } if (state.mode === "failed") { renderCard("실패!", ["장애물에 부딪혔습니다.", `생존 시간: ${state.lastRunTime.toFixed(1)}초`], "#b91c1c"); return; } renderCard("클리어!", ["문에 성공적으로 도달했습니다!", `클리어 시간: ${state.lastRunTime.toFixed(1)}초`], "#15803d"); }
      function renderGameToText() { const extra = {}; if (state.mode === "running") { extra.player_y = Math.round(player.y); extra.player_on_ground = player.onGround; extra.obstacle_count = obstacles.length; extra.time_left = Math.round((TOTAL_TIME - state.elapsed) * 10) / 10; extra.door_visible = !!door; extra.scroll_speed = Math.round(scrollSpeed); extra.hp = state.hp; } return JSON.stringify({ coordinate_system: "canvas 960x540, ground at y=420", mode: state.mode, elapsed: Math.round(state.elapsed * 10) / 10, result: window.relayStageResult.status, note: state.note, ...extra, relay_context: { previous_stage_id: relayContext.previousStageId, clear_count_before_this_stage: relayContext.clearCount, visited_stage_ids: relayContext.history } }); }
      function onKeyDown(event) { if (event.key === "Enter" && state.mode === "menu") { event.preventDefault(); startStage(); return; } if ((event.key === " " || event.key === "ArrowUp") && state.mode === "running") { event.preventDefault(); input.jump = true; } }
      canvas.addEventListener("touchstart", (e) => { e.preventDefault(); if (state.mode === "menu") { startStage(); } else if (state.mode === "running") { input.jump = true; } });
      canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") { startStage(); } else if (state.mode === "running") { input.jump = true; } });
      function frame(timestamp) { const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT; lastTimestamp = timestamp; update(dt); render(); animationFrame = requestAnimationFrame(frame); }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let index = 0; index < steps; index += 1) { update(FIXED_DT); } render(); return renderGameToText(); };
      window.relayStageMeta = { id: "jump-hurdle", title: "Jump Hurdle", creator: "Contributor", genre: "Platformer", clearCondition: "22초 동안 장애물을 피하고 문에 도달하면 클리어" };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = { forceClear() { startStage(); clearStage(); render(); }, forceFail() { startStage(); failStage("debug_force_fail"); render(); } };
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));
      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
