<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jump Hurdle</title>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Jump Hurdle. 캔버스를 터치하거나 Enter로 시작하세요. 진행 중에는 Space 또는 위쪽
      화살표, 모바일에서는 화면 터치로 점프할 수 있습니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Jump Hurdle"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>

    <script src="../relay-runtime.js"></script>
    <script src="../stage-kit.js"></script>
    <script>
      const TITLE = "Jump Hurdle";
      const DESCRIPTION = "장애물을 넘고 끝에 나타나는 문에 도달해야 하는 플랫폼 스테이지입니다.";
      const CLEAR_CONDITION = "30초 동안 장애물을 피하고 문에 도달하면 클리어";
      const FAIL_CONDITION = "장애물에 부딪히면 즉시 실패";
      const CONTROLS = "Space / Up / 화면 터치로 점프";

      const GROUND_Y = 420;
      const GRAVITY = 1800;
      const JUMP_VEL = -620;
      const PLAYER_W = 36;
      const PLAYER_H = 52;
      const SCROLL_SPEED_BASE = 280;
      const TOTAL_TIME = 30;
      const DOOR_APPEAR_TIME = 28;

      let player = {};
      let obstacles = [];
      let door = null;
      let nextObstacleTimer = 0;
      let scrollSpeed = SCROLL_SPEED_BASE;
      let stars = [];

      function createStars(view) {
        stars = [];
        for (let index = 0; index < 60; index += 1) {
          stars.push({
            x: Math.random() * view.width,
            y: Math.random() * (GROUND_Y - 40),
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 30 + 10,
          });
        }
      }

      function resetGame(view) {
        player = {
          x: 120,
          y: GROUND_Y - PLAYER_H,
          vy: 0,
          onGround: true,
          w: PLAYER_W,
          h: PLAYER_H,
        };
        obstacles = [];
        door = null;
        nextObstacleTimer = 1.2;
        scrollSpeed = SCROLL_SPEED_BASE;
        createStars(view);
      }

      function spawnObstacle(view) {
        const types = ["low", "mid", "tall"];
        const type = types[Math.floor(Math.random() * types.length)];
        let width = 0;
        let height = 0;

        if (type === "low") {
          width = 28;
          height = 32;
        } else if (type === "mid") {
          width = 24;
          height = 52;
        } else {
          width = 20;
          height = 72;
        }

        obstacles.push({
          x: view.width + 20,
          y: GROUND_Y - height,
          w: width,
          h: height,
          type,
        });
      }

      function spawnDoor(view) {
        door = {
          x: view.width + 40,
          y: GROUND_Y - 80,
          w: 50,
          h: 80,
        };
      }

      function rectsOverlap(a, b) {
        return (
          a.x < b.x + b.w &&
          a.x + a.w > b.x &&
          a.y < b.y + b.h &&
          a.y + a.h > b.y
        );
      }

      function drawGround(ctx2d, view) {
        ctx2d.fillStyle = "#334155";
        ctx2d.fillRect(0, GROUND_Y, view.width, view.height - GROUND_Y);
        ctx2d.strokeStyle = "#64748b";
        ctx2d.lineWidth = 2;
        ctx2d.beginPath();
        ctx2d.moveTo(0, GROUND_Y);
        ctx2d.lineTo(view.width, GROUND_Y);
        ctx2d.stroke();
      }

      function drawPlayer(ctx2d, elapsed) {
        ctx2d.fillStyle = "#38bdf8";
        ctx2d.fillRect(player.x, player.y, player.w, player.h);
        ctx2d.fillStyle = "#fff";
        ctx2d.fillRect(player.x + 22, player.y + 10, 8, 8);
        ctx2d.fillStyle = "#0f172a";
        ctx2d.fillRect(player.x + 26, player.y + 12, 4, 4);
        const legPulse = Math.sin(elapsed * 12) * 4;
        ctx2d.fillStyle = "#38bdf8";
        ctx2d.fillRect(player.x + 6, player.y + player.h, 8, 6 + (player.onGround ? legPulse : -4));
        ctx2d.fillRect(player.x + 22, player.y + player.h, 8, 6 + (player.onGround ? -legPulse : -4));
      }

      function drawObstacles(ctx2d) {
        for (const obstacle of obstacles) {
          if (obstacle.type === "low") {
            ctx2d.fillStyle = "#ef4444";
            ctx2d.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx2d.fillStyle = "#fca5a5";
            for (let index = 0; index < 3; index += 1) {
              const spikeX = obstacle.x + 4 + index * 10;
              ctx2d.beginPath();
              ctx2d.moveTo(spikeX, obstacle.y);
              ctx2d.lineTo(spikeX + 5, obstacle.y - 8);
              ctx2d.lineTo(spikeX + 10, obstacle.y);
              ctx2d.fill();
            }
          } else if (obstacle.type === "mid") {
            ctx2d.fillStyle = "#f97316";
            ctx2d.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx2d.fillStyle = "#fdba74";
            ctx2d.fillRect(obstacle.x + 4, obstacle.y + 4, obstacle.w - 8, 6);
          } else {
            ctx2d.fillStyle = "#dc2626";
            ctx2d.fillRect(obstacle.x, obstacle.y, obstacle.w, obstacle.h);
            ctx2d.fillStyle = "#fca5a5";
            ctx2d.fillRect(obstacle.x + 3, obstacle.y + 3, obstacle.w - 6, 8);
            ctx2d.fillRect(obstacle.x + 3, obstacle.y + obstacle.h - 11, obstacle.w - 6, 8);
          }
        }
      }

      function drawDoor(ctx2d, elapsed) {
        if (!door) {
          return;
        }

        ctx2d.fillStyle = "#22c55e";
        ctx2d.fillRect(door.x, door.y, door.w, door.h);
        ctx2d.fillStyle = "#15803d";
        ctx2d.fillRect(door.x + 6, door.y + 6, door.w - 12, door.h - 6);
        ctx2d.fillStyle = "#fbbf24";
        ctx2d.beginPath();
        ctx2d.arc(door.x + door.w - 14, door.y + door.h / 2, 4, 0, Math.PI * 2);
        ctx2d.fill();

        const glowAlpha = 0.3 + 0.2 * Math.sin(elapsed * 6);
        ctx2d.shadowColor = "#22c55e";
        ctx2d.shadowBlur = 20;
        ctx2d.fillStyle = `rgba(34, 197, 94, ${glowAlpha})`;
        ctx2d.fillRect(door.x - 4, door.y - 4, door.w + 8, door.h + 8);
        ctx2d.shadowBlur = 0;
        ctx2d.fillStyle = "#fff";
        ctx2d.font = "bold 14px Trebuchet MS";
        ctx2d.textAlign = "center";
        ctx2d.fillText("EXIT", door.x + door.w / 2, door.y - 8);
        ctx2d.textAlign = "left";
      }

      function drawHud(ctx2d, view, elapsed) {
        const timeLeft = Math.max(0, TOTAL_TIME - elapsed);
        const barWidth = 200;
        const barHeight = 16;
        const barX = view.width / 2 - barWidth / 2;
        const barY = 20;

        ctx2d.fillStyle = "rgba(30, 41, 59, 0.7)";
        ctx2d.fillRect(barX - 2, barY - 2, barWidth + 4, barHeight + 4);
        ctx2d.fillStyle = timeLeft > 5 ? "#22c55e" : "#ef4444";
        ctx2d.fillRect(barX, barY, barWidth * (timeLeft / TOTAL_TIME), barHeight);
        ctx2d.strokeStyle = "#94a3b8";
        ctx2d.lineWidth = 1;
        ctx2d.strokeRect(barX, barY, barWidth, barHeight);
        ctx2d.fillStyle = "#f8fafc";
        ctx2d.font = "bold 20px Trebuchet MS";
        ctx2d.textAlign = "center";
        ctx2d.fillText(`${timeLeft.toFixed(1)}s`, view.width / 2, barY + barHeight + 24);

        if (elapsed >= DOOR_APPEAR_TIME - 2 && elapsed < DOOR_APPEAR_TIME) {
          ctx2d.fillStyle = "#fbbf24";
          ctx2d.font = "bold 18px Trebuchet MS";
          ctx2d.fillText("문이 곧 나타납니다!", view.width / 2, barY + barHeight + 52);
        }

        if (door) {
          ctx2d.fillStyle = "#22c55e";
          ctx2d.font = "bold 18px Trebuchet MS";
          ctx2d.fillText("문에 도달하세요!", view.width / 2, barY + barHeight + 52);
        }

        ctx2d.textAlign = "left";
      }

      function drawStars(ctx2d) {
        ctx2d.fillStyle = "#cbd5e1";
        for (const star of stars) {
          ctx2d.beginPath();
          ctx2d.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx2d.fill();
        }
      }

      const stage = window.StageKit.create({
        id: "jump-hurdle",
        title: TITLE,
        creator: {
          name: "지현정",
          avatar: null,
          github: "jyeonjeeong",
        },
        genre: "Platformer",
        clearCondition: CLEAR_CONDITION,
        failCondition: FAIL_CONDITION,
        controls: CONTROLS,
        note: "점프로 장애물을 피하는 게임. 장애물에 걸리면 실패",
        canvas: "#game",
        controlsLayout: {
          preset: "tap_only",
        },
        initialState() {
          return {
            mode: "menu",
            elapsed: 0,
            lastRunTime: 0,
            note: "점프로 장애물을 피하는 게임. 장애물에 걸리면 실패",
          };
        },
        onInit(ctx) {
          ctx.installKeyboard({
            Enter: "start",
            " ": "jump",
            ArrowUp: "jump",
          });

          // StageKit installs touchstart / pointerdown handlers here for mobile start and jump.
          ctx.installTouchStart((runtime) => {
            if (runtime.state.mode === "menu") {
              runtime.start();
              return;
            }

            if (runtime.state.mode === "running") {
              runtime.input.jump = true;
            }
          });
        },
        onStart(ctx) {
          resetGame(ctx.view);
        },
        update(dt, ctx) {
          if (ctx.state.mode === "menu") {
            if (ctx.input.start) {
              ctx.input.start = false;
              ctx.start();
            }
            return;
          }

          if (ctx.state.mode !== "running") {
            return;
          }

          ctx.state.elapsed += dt;
          scrollSpeed = SCROLL_SPEED_BASE + ctx.state.elapsed * 4;

          if (ctx.input.jump && player.onGround) {
            player.vy = JUMP_VEL;
            player.onGround = false;
          }
          ctx.input.jump = false;

          player.vy += GRAVITY * dt;
          player.y += player.vy * dt;

          if (player.y >= GROUND_Y - player.h) {
            player.y = GROUND_Y - player.h;
            player.vy = 0;
            player.onGround = true;
          }

          if (ctx.state.elapsed < DOOR_APPEAR_TIME) {
            nextObstacleTimer -= dt;
            if (nextObstacleTimer <= 0) {
              spawnObstacle(ctx.view);
              const minInterval = Math.max(0.6, 1.4 - ctx.state.elapsed * 0.025);
              nextObstacleTimer = minInterval + Math.random() * 0.6;
            }
          }

          if (ctx.state.elapsed >= DOOR_APPEAR_TIME && !door) {
            spawnDoor(ctx.view);
          }

          for (const obstacle of obstacles) {
            obstacle.x -= scrollSpeed * dt;
          }
          obstacles = obstacles.filter((obstacle) => obstacle.x + obstacle.w > -20);

          if (door) {
            door.x -= scrollSpeed * dt;
          }

          for (const star of stars) {
            star.x -= star.speed * dt;
            if (star.x < -4) {
              star.x = ctx.view.width + 4;
            }
          }

          const playerBounds = {
            x: player.x + 4,
            y: player.y + 4,
            w: player.w - 8,
            h: player.h - 4,
          };

          for (const obstacle of obstacles) {
            if (rectsOverlap(playerBounds, obstacle)) {
              ctx.fail("hit_obstacle");
              return;
            }
          }

          if (door && rectsOverlap(playerBounds, door)) {
            ctx.clear();
            return;
          }

          if (door && door.x + door.w < 0) {
            ctx.fail("missed_door");
            return;
          }

          if (ctx.state.elapsed >= TOTAL_TIME + 4) {
            ctx.fail("timeout");
          }
        },
        render(ctx) {
          const { ctx2d, view, state } = ctx;
          ctx2d.clearRect(0, 0, view.width, view.height);

          if (state.mode === "menu") {
            ctx.renderCard(
              TITLE,
              [
                `조작: ${CONTROLS}`,
                `클리어: ${CLEAR_CONDITION}`,
                `실패: ${FAIL_CONDITION}`,
                "터치 또는 Enter로 시작",
              ],
              "#f97316"
            );
            return;
          }

          if (state.mode === "running") {
            ctx2d.fillStyle = "#0f172a";
            ctx2d.fillRect(0, 0, view.width, view.height);
            drawStars(ctx2d);
            drawGround(ctx2d, view);
            drawObstacles(ctx2d);
            drawDoor(ctx2d, state.elapsed);
            drawPlayer(ctx2d, state.elapsed);
            drawHud(ctx2d, view, state.elapsed);
            return;
          }

          if (state.mode === "failed") {
            ctx.renderCard(
              "실패!",
              ["장애물에 부딪혔습니다.", `생존 시간: ${state.lastRunTime.toFixed(1)}초`],
              "#b91c1c"
            );
            return;
          }

          ctx.renderCard(
            "클리어!",
            ["문에 성공적으로 도달했습니다!", `클리어 시간: ${state.lastRunTime.toFixed(1)}초`],
            "#15803d"
          );
        },
        serialize(ctx) {
          const snapshot = {
            coordinate_system: "canvas 960x540, ground at y=420",
            mode: ctx.state.mode,
            elapsed: Math.round(ctx.state.elapsed * 10) / 10,
          };

          if (ctx.state.mode === "running") {
            snapshot.player_y = Math.round(player.y);
            snapshot.player_on_ground = player.onGround;
            snapshot.obstacle_count = obstacles.length;
            snapshot.time_left = Math.round((TOTAL_TIME - ctx.state.elapsed) * 10) / 10;
            snapshot.door_visible = !!door;
            snapshot.scroll_speed = Math.round(scrollSpeed);
          }

          return snapshot;
        },
      });
    </script>
  </body>
</html>
