<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dream Motel: Shadow Stitch</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #2b143e 0%, #100817 42%, #050409 100%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0.14);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 10, 18, 0.92);
        color: #fef8ff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(254, 248, 255, 0.95);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dream Motel: Shadow Stitch. 캔버스를 터치하거나 Enter로 시작하세요.
      기본 조작은 이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기,
      후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도
      플레이 가능하게 구현 입니다. 클리어 조건은 축소 구간 끝까지 버티며 봉합
      다리로 4개 제단을 모두 점등하면 클리어 입니다. 실패 조건은 안전 영역 밖에
      오래 머물거나 강한 빛에 오래 노출돼 실이 타면 실패 입니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dream Motel: Shadow Stitch"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");

      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 18;
      const SURVIVE_TIME = 54;
      const SHADOW_START = 246;
      const SHADOW_END = 88;
      const PLAYER_RADIUS = 13;
      const PLAYER_SPEED = 228;
      const PLAYER_PAD_RADIUS = 58;
      const STITCH_WIDTH = 26;
      const NODE_SAFE_RADIUS = 18;
      const ALTAR_SAFE_RADIUS = 24;
      const MAX_STITCH_LENGTH = 216;
      const MAX_STITCHES = 5;
      const DOUBLE_TAP_MS = 280;
      const BOUNDS = { minX: 70, maxX: 890, minY: 84, maxY: 456 };
      const relayContext =
        window.RelayRuntime?.readContext("dream-motel-shadow-stitch-shrink") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const META = {
        id: "dream-motel-shadow-stitch-shrink",
        title: "Dream Motel: Shadow Stitch",
        description:
          "경계선을 꿰매 어둠 다리를 만들고, 줄어드는 모텔 안전권 속 4개 제단을 켜는 액션 퍼즐",
        creator: "jungcollin",
        genre: "Light-shadow action / 축소 아레나",
        controls:
          "이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition:
          "축소 구간 끝까지 버티며 봉합 다리로 4개 제단을 모두 점등하면 클리어",
        failCondition:
          "안전 영역 밖에 오래 머물거나 강한 빛에 오래 노출돼 실이 타면 실패",
      };

      const ALTAR_DEFS = [
        { id: "nw-altar", key: "lobby", name: "Lobby", x: 206, y: 124, color: "#f55d92" },
        { id: "ne-altar", key: "suite", name: "Suite", x: 754, y: 124, color: "#7f7dff" },
        { id: "se-altar", key: "pool", name: "Pool", x: 754, y: 416, color: "#4ff7ff" },
        { id: "sw-altar", key: "sign", name: "Sign", x: 206, y: 416, color: "#ffd56c" },
      ];

      const NODES = [
        { id: "hub", x: 480, y: 270, kind: "hub" },
        { id: "nw-inner", x: 390, y: 194, kind: "inner" },
        { id: "ne-inner", x: 570, y: 194, kind: "inner" },
        { id: "se-inner", x: 570, y: 346, kind: "inner" },
        { id: "sw-inner", x: 390, y: 346, kind: "inner" },
        { id: "nw-altar", x: 206, y: 124, kind: "altar", altarKey: "lobby" },
        { id: "ne-altar", x: 754, y: 124, kind: "altar", altarKey: "suite" },
        { id: "se-altar", x: 754, y: 416, kind: "altar", altarKey: "pool" },
        { id: "sw-altar", x: 206, y: 416, kind: "altar", altarKey: "sign" },
      ];

      const keys = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function createPlayer() {
        return {
          x: 480,
          y: 270,
          vx: 0,
          vy: 0,
          facing: 0,
          pulse: 0,
        };
      }

      function createAltars() {
        return ALTAR_DEFS.map((altar) => ({
          ...altar,
          lit: false,
          pulse: 0,
        }));
      }

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        clock: 0,
        player: createPlayer(),
        altars: createAltars(),
        stitches: [],
        particles: [],
        popups: [],
        shake: 0,
        flash: 0,
        threadHeat: 0,
        hardLightLevel: 0,
        movePad: null,
        stitchDrag: null,
        lastTapAt: 0,
        lastTapPos: { x: 0, y: 0 },
        currentPointerType: "mouse",
        message: "중심 그림자를 너무 일찍 비우지 마세요.",
        connectedNodes: new Set(["hub"]),
        connectedAltars: new Set(),
        lastDangerPulse: 0,
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason) {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeInOutCubic(value) {
        if (value < 0.5) {
          return 4 * value * value * value;
        }
        return 1 - Math.pow(-2 * value + 2, 3) / 2;
      }

      function getStageProgress() {
        return clamp(state.elapsed / SURVIVE_TIME, 0, 1);
      }

      function getShrinkProgress() {
        const progress = getStageProgress();
        if (progress < 0.58) {
          return 0.46 * easeInOutCubic(progress / 0.58);
        }
        const late = (progress - 0.58) / 0.42;
        return 0.46 + 0.54 * Math.pow(late, 1.45);
      }

      function getShadowRadius() {
        return lerp(SHADOW_START, SHADOW_END, getShrinkProgress());
      }

      function roundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function getNode(nodeId) {
        return NODES.find((node) => node.id === nodeId) || null;
      }

      function pointToCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      function nearestNode(x, y, radius) {
        let winner = null;
        let bestDistance = radius;
        for (const node of NODES) {
          const d = distance(x, y, node.x, node.y);
          if (d <= bestDistance) {
            bestDistance = d;
            winner = node;
          }
        }
        return winner;
      }

      function canonicalPair(a, b) {
        return [a, b].sort().join("::");
      }

      function distanceToSegment(px, py, ax, ay, bx, by) {
        const dx = bx - ax;
        const dy = by - ay;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) {
          return distance(px, py, ax, ay);
        }
        const t = clamp(((px - ax) * dx + (py - ay) * dy) / lenSq, 0, 1);
        const tx = ax + dx * t;
        const ty = ay + dy * t;
        return distance(px, py, tx, ty);
      }

      function createParticle(x, y, color, power = 1, kind = "spark") {
        const angle = Math.random() * Math.PI * 2;
        const speed = (35 + Math.random() * 150) * power;
        return {
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.28 + Math.random() * 0.55,
          maxLife: 0.28 + Math.random() * 0.55,
          size: 2 + Math.random() * 4.5,
          color,
          kind,
        };
      }

      function burst(x, y, color, count = 12, power = 1, kind = "spark") {
        for (let index = 0; index < count; index += 1) {
          state.particles.push(createParticle(x, y, color, power, kind));
        }
      }

      function popup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          vy: -32,
          life: 1,
          color,
        });
      }

      function isTouchLike() {
        return state.currentPointerType !== "mouse";
      }

      function getLightPools() {
        const progress = getStageProgress();
        const activeCount = progress > 0.72 ? 4 : progress > 0.3 ? 3 : 2;
        const t = state.clock;
        const pools = [
          {
            x: 480 + Math.sin(t * 0.82) * 250,
            y: 108 + Math.cos(t * 0.54) * 26,
            rx: 108,
            ry: 48,
            rotation: 0.14 * Math.sin(t * 0.36),
            color: "rgba(255, 172, 107, 0.22)",
          },
          {
            x: 236 + Math.cos(t * 0.96 + 1.3) * 54,
            y: 284 + Math.sin(t * 0.62 + 0.7) * 114,
            rx: 84,
            ry: 56,
            rotation: -0.42,
            color: "rgba(255, 119, 175, 0.18)",
          },
          {
            x: 724 + Math.sin(t * 0.76 + 2.1) * 72,
            y: 314 + Math.cos(t * 0.88 + 0.9) * 98,
            rx: 92,
            ry: 52,
            rotation: 0.58,
            color: "rgba(87, 246, 255, 0.18)",
          },
          {
            x: 480 + Math.sin(t * 1.15 + 0.4) * 138,
            y: 268 + Math.cos(t * 1.02 + 1.9) * 76,
            rx: 64,
            ry: 36,
            rotation: t * 0.12,
            color: "rgba(255, 235, 143, 0.15)",
          },
        ];
        return pools.slice(0, activeCount);
      }

      function pointInRotatedEllipse(x, y, ellipse) {
        const cos = Math.cos(-ellipse.rotation);
        const sin = Math.sin(-ellipse.rotation);
        const dx = x - ellipse.x;
        const dy = y - ellipse.y;
        const rx = dx * cos - dy * sin;
        const ry = dx * sin + dy * cos;
        const nx = rx / ellipse.rx;
        const ny = ry / ellipse.ry;
        return nx * nx + ny * ny <= 1;
      }

      function getHardLightLevel(x, y, lightPools) {
        let level = 0;
        for (const light of lightPools) {
          if (!pointInRotatedEllipse(x, y, light)) {
            continue;
          }
          const cos = Math.cos(-light.rotation);
          const sin = Math.sin(-light.rotation);
          const dx = x - light.x;
          const dy = y - light.y;
          const rx = dx * cos - dy * sin;
          const ry = dx * sin + dy * cos;
          const normalized =
            1 - clamp((rx * rx) / (light.rx * light.rx) + (ry * ry) / (light.ry * light.ry), 0, 1);
          level = Math.max(level, normalized);
        }
        return level;
      }

      function isPointSafe(x, y) {
        if (distance(x, y, 480, 270) <= getShadowRadius()) {
          return true;
        }

        for (const node of NODES) {
          if (distance(x, y, node.x, node.y) <= NODE_SAFE_RADIUS) {
            return true;
          }
        }

        for (const altar of state.altars) {
          if (distance(x, y, altar.x, altar.y) <= ALTAR_SAFE_RADIUS) {
            return true;
          }
        }

        for (const stitch of state.stitches) {
          if (stitch.integrity <= 0.16) {
            continue;
          }
          const start = getNode(stitch.a);
          const end = getNode(stitch.b);
          if (!start || !end) {
            continue;
          }
          if (
            distanceToSegment(x, y, start.x, start.y, end.x, end.y) <=
            STITCH_WIDTH * (0.7 + stitch.integrity * 0.34)
          ) {
            return true;
          }
        }
        return false;
      }

      function buildConnectionGraph() {
        const adjacency = new Map();
        for (const node of NODES) {
          adjacency.set(node.id, []);
        }
        for (const stitch of state.stitches) {
          if (stitch.integrity <= 0.14) {
            continue;
          }
          adjacency.get(stitch.a)?.push(stitch.b);
          adjacency.get(stitch.b)?.push(stitch.a);
        }

        const connectedNodes = new Set(["hub"]);
        const stack = ["hub"];
        while (stack.length) {
          const current = stack.pop();
          const neighbors = adjacency.get(current) || [];
          for (const neighbor of neighbors) {
            if (connectedNodes.has(neighbor)) {
              continue;
            }
            connectedNodes.add(neighbor);
            stack.push(neighbor);
          }
        }

        const connectedAltars = new Set();
        for (const altar of state.altars) {
          if (connectedNodes.has(altar.id)) {
            connectedAltars.add(altar.key);
          }
        }

        state.connectedNodes = connectedNodes;
        state.connectedAltars = connectedAltars;
      }

      function removeStitch(stitchIndex, reason, color = "#ffd68b") {
        const stitch = state.stitches[stitchIndex];
        if (!stitch) {
          return;
        }
        const start = getNode(stitch.a);
        const end = getNode(stitch.b);
        if (start && end) {
          burst((start.x + end.x) / 2, (start.y + end.y) / 2, color, 18, 1.25, "thread");
        }
        state.stitches.splice(stitchIndex, 1);
        if (reason) {
          popup(reason, 480, 98, color);
        }
      }

      function cutLatestStitch() {
        if (!state.stitches.length || state.mode !== "running") {
          return;
        }
        removeStitch(state.stitches.length - 1, "실 절단", "#ff90bc");
        state.flash = Math.max(state.flash, 0.12);
        state.shake = Math.max(state.shake, 5);
      }

      function tryCreateStitch(startId, endId) {
        const start = getNode(startId);
        const end = getNode(endId);
        if (!start || !end || startId === endId) {
          return;
        }

        if (state.mode !== "running") {
          return;
        }

        const pairId = canonicalPair(startId, endId);
        const already = state.stitches.find((stitch) => stitch.id === pairId);
        if (already) {
          popup("이미 봉합됨", (start.x + end.x) / 2, (start.y + end.y) / 2, "#ffd68b");
          return;
        }

        const linkDistance = distance(start.x, start.y, end.x, end.y);
        if (linkDistance > MAX_STITCH_LENGTH) {
          popup("경계가 너무 멀다", (start.x + end.x) / 2, (start.y + end.y) / 2, "#ffd68b");
          return;
        }

        if (state.stitches.length >= MAX_STITCHES) {
          removeStitch(0, "낡은 실 풀림", "#ffd68b");
        }

        state.stitches.push({
          id: pairId,
          a: startId,
          b: endId,
          integrity: 1,
          pulse: 1,
          age: 0,
        });

        burst((start.x + end.x) / 2, (start.y + end.y) / 2, "#74f5ff", 14, 1.05, "thread");
        popup("봉합 완료", (start.x + end.x) / 2, (start.y + end.y) / 2 - 12, "#74f5ff");
        state.flash = Math.max(state.flash, 0.09);
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = createPlayer();
        state.altars = createAltars();
        state.stitches = [];
        state.particles = [];
        state.popups = [];
        state.shake = 0;
        state.flash = 0;
        state.threadHeat = 0;
        state.hardLightLevel = 0;
        state.movePad = null;
        state.stitchDrag = null;
        state.message = "빛이 깊어질수록 중심을 다시 잇는 길이 중요합니다.";
        state.connectedNodes = new Set(["hub"]);
        state.connectedAltars = new Set();
        state.lastDangerPulse = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.message =
          reason === "unlit-altars"
            ? "끝까지 버텼지만 제단이 모두 깨어나지 못했습니다."
            : "강한 빛이 실을 태웠습니다.";
        state.flash = 0.42;
        state.shake = 14;
        burst(state.player.x, state.player.y, "#ffad7c", 28, 1.55, "ember");
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.message = "모텔의 네 그림자 제단이 모두 점등됐습니다.";
        state.flash = 0.5;
        state.shake = 10;
        for (const altar of state.altars) {
          burst(altar.x, altar.y, altar.color, 16, 1.4, "glow");
        }
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromMenu() {
        resetRun();
      }

      function updatePlayer(dt) {
        const moveX =
          (keys.right ? 1 : 0) -
          (keys.left ? 1 : 0) +
          (state.movePad ? state.movePad.dx : 0);
        const moveY =
          (keys.down ? 1 : 0) -
          (keys.up ? 1 : 0) +
          (state.movePad ? state.movePad.dy : 0);

        const length = Math.hypot(moveX, moveY) || 1;
        const targetX = moveX / length;
        const targetY = moveY / length;
        const active = Math.hypot(moveX, moveY) > 0.12;

        state.player.vx = active ? targetX * PLAYER_SPEED : 0;
        state.player.vy = active ? targetY * PLAYER_SPEED : 0;

        state.player.x = clamp(state.player.x + state.player.vx * dt, BOUNDS.minX, BOUNDS.maxX);
        state.player.y = clamp(state.player.y + state.player.vy * dt, BOUNDS.minY, BOUNDS.maxY);
        state.player.pulse += dt * (active ? 7.2 : 4.2);

        if (active) {
          state.player.facing = Math.atan2(targetY, targetX);
        }
      }

      function updateStitches(dt, lightPools) {
        for (let index = state.stitches.length - 1; index >= 0; index -= 1) {
          const stitch = state.stitches[index];
          const start = getNode(stitch.a);
          const end = getNode(stitch.b);
          if (!start || !end) {
            state.stitches.splice(index, 1);
            continue;
          }

          stitch.age += dt;
          stitch.pulse = Math.max(0, stitch.pulse - dt * 2.2);

          const midpoint = {
            x: (start.x + end.x) / 2,
            y: (start.y + end.y) / 2,
          };
          const lightLevel = Math.max(
            getHardLightLevel(start.x, start.y, lightPools),
            getHardLightLevel(end.x, end.y, lightPools),
            getHardLightLevel(midpoint.x, midpoint.y, lightPools) * 1.05
          );

          if (lightLevel > 0.08) {
            stitch.integrity -= dt * (0.18 + lightLevel * (0.4 + getStageProgress() * 0.36));
            if (Math.random() < lightLevel * 0.28) {
              state.particles.push(createParticle(midpoint.x, midpoint.y, "#ffca7c", 0.7, "ember"));
            }
          } else {
            stitch.integrity = Math.min(1, stitch.integrity + dt * 0.04);
          }

          if (stitch.integrity <= 0) {
            removeStitch(index, "빛에 소실", "#ffca7c");
          }
        }
      }

      function updateAltars(dt) {
        for (const altar of state.altars) {
          altar.pulse = Math.max(0, altar.pulse - dt * 1.8);
          if (altar.lit) {
            continue;
          }
          if (!state.connectedAltars.has(altar.key)) {
            continue;
          }
          if (distance(state.player.x, state.player.y, altar.x, altar.y) > PLAYER_RADIUS + ALTAR_SAFE_RADIUS) {
            continue;
          }

          altar.lit = true;
          altar.pulse = 1;
          state.threadHeat = Math.max(0, state.threadHeat - 0.13);
          popup(`${altar.name} 점등`, altar.x, altar.y - 22, altar.color);
          burst(altar.x, altar.y, altar.color, 22, 1.3, "glow");
          state.flash = Math.max(state.flash, 0.18);
          state.shake = Math.max(state.shake, 8);
        }
      }

      function updateThreadHeat(dt, lightPools) {
        const safe = isPointSafe(state.player.x, state.player.y);
        const hardLight = getHardLightLevel(state.player.x, state.player.y, lightPools);
        state.hardLightLevel = hardLight;

        let rise = 0;
        if (!safe) {
          rise += 0.88 + getStageProgress() * 0.76;
        }
        if (hardLight > 0.08) {
          rise += 0.72 + hardLight * 1.06 + getStageProgress() * 0.58;
        }

        if (rise > 0) {
          state.threadHeat = clamp(state.threadHeat + rise * dt * 0.24, 0, 1);
          const pulseDelay = Math.max(0.14, 0.32 - getStageProgress() * 0.12);
          if (state.elapsed - state.lastDangerPulse > pulseDelay) {
            state.lastDangerPulse = state.elapsed;
            state.shake = Math.max(state.shake, 4 + hardLight * 5);
            if (hardLight > 0.18) {
              state.particles.push(
                createParticle(state.player.x, state.player.y, "#ffcd86", 0.6, "ember")
              );
            }
          }
        } else {
          const coolRate = hardLight > 0.06 ? 0.035 : 0.16;
          state.threadHeat = clamp(state.threadHeat - coolRate * dt, 0, 1);
        }

        if (state.threadHeat >= 1) {
          failStage("burned");
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.97;
          particle.vy = particle.vy * 0.97 + (particle.kind === "ember" ? -8 : 18) * dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }

        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popupItem = state.popups[index];
          popupItem.life -= dt * 0.82;
          popupItem.y += popupItem.vy * dt;
          if (popupItem.life <= 0) {
            state.popups.splice(index, 1);
          }
        }
      }

      function update(dt) {
        const lightPools = getLightPools();
        state.clock += dt;
        state.shake = Math.max(0, state.shake - dt * 18);
        state.flash = Math.max(0, state.flash - dt * 1.25);

        updateParticles(dt);

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        updatePlayer(dt);
        updateStitches(dt, lightPools);
        buildConnectionGraph();
        updateAltars(dt);
        updateThreadHeat(dt, lightPools);

        if (state.altars.every((altar) => altar.lit) && state.elapsed >= SURVIVE_TIME) {
          clearStage();
        } else if (state.elapsed >= SURVIVE_TIME) {
          failStage("unlit-altars");
        }
      }

      function drawShadowField() {
        const radius = getShadowRadius();
        const shadow = ctx.createRadialGradient(480, 270, radius * 0.16, 480, 270, radius * 1.12);
        shadow.addColorStop(0, "rgba(7, 9, 14, 0.12)");

        ctx.beginPath();

        ctx.fill();

        ctx.save();
        ctx.strokeStyle = "rgba(126, 242, 255, 0.32)";
        ctx.lineWidth = 2.2;
        ctx.setLineDash([8, 10]);
        ctx.beginPath();
        ctx.arc(480, 270, radius, state.clock * 0.8, Math.PI * 2 + state.clock * 0.8);
        ctx.stroke();

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const coreGlow = ctx.createRadialGradient(480, 270, 20, 480, 270, radius * 0.78);
        coreGlow.addColorStop(0, "rgba(122, 244, 255, 0.16)");
        coreGlow.addColorStop(1, "rgba(122, 244, 255, 0)");
        ctx.fillStyle = coreGlow;
        ctx.beginPath();
        ctx.arc(480, 270, radius * 0.78, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawLightPools(lightPools) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const light of lightPools) {
          const glow = ctx.createRadialGradient(light.x, light.y, 12, light.x, light.y, light.rx);
          glow.addColorStop(0, light.color.replace("0.22", "0.4").replace("0.18", "0.36").replace("0.15", "0.3"));
          glow.addColorStop(0.35, light.color);
          glow.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.save();
          ctx.translate(light.x, light.y);
          ctx.rotate(light.rotation);
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.ellipse(0, 0, light.rx, light.ry, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();
      }

      function drawNodes() {
        for (const node of NODES) {
          const connected = state.connectedNodes.has(node.id);
          const baseColor =
            node.kind === "hub"
              ? "#9af4ff"
              : node.kind === "altar"
                ? state.altars.find((altar) => altar.id === node.id)?.color || "#fff"
                : "#8e87ff";

          ctx.save();
          ctx.shadowBlur = connected ? 18 : 10;
          ctx.shadowColor = connected ? baseColor : "rgba(255, 255, 255, 0.08)";
          ctx.fillStyle = connected ? baseColor : "rgba(223, 224, 255, 0.36)";
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.kind === "hub" ? 8 : 6, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = connected ? "rgba(255,255,255,0.72)" : "rgba(255,255,255,0.22)";
          ctx.lineWidth = node.kind === "hub" ? 2.6 : 1.5;
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.kind === "hub" ? 13 : 10, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawAltars() {
        for (const altar of state.altars) {
          const connected = state.connectedAltars.has(altar.key);
          const pulse = altar.pulse > 0 ? Math.sin(altar.pulse * Math.PI) * 14 : 0;

          ctx.save();
          ctx.translate(altar.x, altar.y);
          ctx.shadowBlur = altar.lit ? 28 : connected ? 14 : 8;
          ctx.shadowColor = altar.color;
          ctx.fillStyle = altar.lit ? altar.color : "rgba(22, 24, 34, 0.85)";
          roundedRect(-24, -16, 48, 32, 12);
          ctx.fill();

          ctx.lineWidth = 2;
          ctx.strokeStyle = altar.lit ? "rgba(255,255,255,0.92)" : "rgba(255,255,255,0.32)";
          roundedRect(-24, -16, 48, 32, 12);
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 248, 252, 0.94)";
          ctx.font = "800 11px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(altar.name, 0, 4);

          if (pulse > 0) {
            ctx.strokeStyle = altar.color;
            ctx.lineWidth = 2.8;
            ctx.globalAlpha = 0.75;
            ctx.beginPath();
            ctx.arc(0, 0, 28 + pulse, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      function drawStitches() {
        for (const stitch of state.stitches) {
          const start = getNode(stitch.a);
          const end = getNode(stitch.b);
          if (!start || !end) {
            continue;
          }

          ctx.save();
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.shadowBlur = 22;
          ctx.shadowColor = `rgba(86, 240, 255, ${0.35 + stitch.integrity * 0.28})`;

          ctx.strokeStyle = `rgba(10, 12, 19, ${0.7 + stitch.integrity * 0.18})`;
          ctx.lineWidth = STITCH_WIDTH + stitch.pulse * 4;
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();

          ctx.strokeStyle = `rgba(102, 244, 255, ${0.22 + stitch.integrity * 0.56})`;
          ctx.lineWidth = 3.4;
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();

          ctx.restore();
        }

        if (state.stitchDrag) {
          const start = getNode(state.stitchDrag.startId);
          if (!start) {
            return;
          }
          ctx.save();
          ctx.strokeStyle = "rgba(255, 194, 113, 0.7)";
          ctx.lineWidth = 3;
          ctx.setLineDash([10, 8]);
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(state.stitchDrag.x, state.stitchDrag.y);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawPlayer() {
        const bob = Math.sin(state.player.pulse) * 2.4;
        const safe = isPointSafe(state.player.x, state.player.y);

        ctx.save();
        ctx.translate(state.player.x, state.player.y + bob);

        ctx.globalAlpha = 0.32;
        ctx.fillStyle = safe ? "#54efff" : "#ffb46d";
        ctx.beginPath();
        ctx.ellipse(0, 18, 19, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 26;
        ctx.shadowColor = safe ? "#6ef3ff" : "#ffbd80";
        const body = ctx.createRadialGradient(-5, -8, 4, 0, 0, 22);
        body.addColorStop(0, safe ? "#f9fdff" : "#fff0d9");
        body.addColorStop(0.5, safe ? "#9ef7ff" : "#ffb06f");
        body.addColorStop(1, safe ? "#3d8cff" : "#ff6f61");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(0, 0, PLAYER_RADIUS + (state.hardLightLevel > 0.15 ? 2 : 0), 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.82)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(state.player.facing) * 16, Math.sin(state.player.facing) * 16);
        ctx.stroke();

        ctx.restore();
      }

      function drawParticles() {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = particle.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          if (!particle.color.startsWith("rgb")) {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = alpha;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
        ctx.restore();
      }

          ctx.fillStyle = popupItem.color;

      function drawMiniPoster(x, y, width, height) {
        roundedRect(x, y, width, height, 28);
        const card = ctx.createLinearGradient(x, y, x + width, y + height);
        card.addColorStop(0, "rgba(247, 89, 152, 0.24)");
        card.addColorStop(0.45, "rgba(67, 42, 102, 0.34)");
        card.addColorStop(1, "rgba(64, 227, 255, 0.26)");
        ctx.fillStyle = card;
        ctx.fill();

        ctx.save();
        ctx.beginPath();
        roundedRect(x, y, width, height, 28);
        ctx.clip();
        ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
        for (let index = 0; index < 8; index += 1) {
          ctx.fillRect(x + 18 + index * 36, y + 18, 10, height - 36);
        }
        ctx.fillStyle = "rgba(255,255,255,0.14)";
        ctx.beginPath();
        ctx.arc(x + width / 2, y + height / 2, 74, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(126, 242, 255, 0.4)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(x + width / 2, y + height / 2, 52, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawResultOverlay(title, accent, subtitle) {
        roundedRect(184, 144, 592, 244, 30);
        ctx.fillStyle = "rgba(9, 10, 16, 0.78)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 1.4;
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = accent;
        ctx.font = "900 38px Trebuchet MS";
        ctx.fillText(title, 480, 214);
        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.font = "800 18px Trebuchet MS";
        wrapTextCentered(subtitle, 480, 248, 480, 24);
        ctx.fillStyle = "rgba(255,255,255,0.74)";
        ctx.font = "800 16px Trebuchet MS";
        ctx.fillText(`생존 ${state.lastRunTime.toFixed(1)}초`, 480, 302);
        ctx.fillText(`제단 점등 ${state.altars.filter((altar) => altar.lit).length}/4`, 480, 332);
        ctx.fillStyle = "#ffeff7";
        ctx.font = "900 16px Trebuchet MS";
        ctx.fillText("Enter 또는 화면 터치로 재시작", 480, 370);
      }

      function wrapText(text, x, y, maxWidth, lineHeight) {
        const words = String(text).split(/\s+/);
        let line = "";
        let row = 0;
        for (const word of words) {
          const testLine = line ? `${line} ${word}` : word;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            ctx.fillText(line, x, y + row * lineHeight);
            line = word;
            row += 1;
          } else {
            line = testLine;
          }
        }
        if (line) {
          ctx.fillText(line, x, y + row * lineHeight);
        }
      }

      function wrapTextCentered(text, centerX, y, maxWidth, lineHeight) {
        const words = String(text).split(/\s+/);
        let line = "";
        let row = 0;
        for (const word of words) {
          const testLine = line ? `${line} ${word}` : word;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            ctx.fillText(line, centerX, y + row * lineHeight);
            line = word;
            row += 1;
          } else {
            line = testLine;
          }
        }
        if (line) {
          ctx.fillText(line, centerX, y + row * lineHeight);
        }
      }

      function drawScene() {
        const lightPools = getLightPools();
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.save();
        if (state.shake > 0.1) {
          ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
        }

        drawBackground();
        drawShadowField();
        drawStitches();
        drawLightPools(lightPools);
        drawNodes();
        drawAltars();
        drawPlayer();
        drawParticles();
        drawHud();
        drawTouchPad();
        drawPopups();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed") {
          drawResultOverlay("THREAD BURNED", "#ffb079", state.message);
        } else if (state.mode === "cleared") {
          drawResultOverlay("MOTEL AWAKENS", "#7ef4ff", state.message);
        }

        if (state.flash > 0.01) {
          ctx.fillStyle = `rgba(255, 255, 255, ${state.flash * 0.22})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
        ctx.restore();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        if (document.hidden) {
          lastTimestamp = timestamp;
          animationFrame = window.requestAnimationFrame(frame);
          return;
        }
        const dt = clamp((timestamp - lastTimestamp) / 1000, 0, MAX_DT);
        lastTimestamp = timestamp;
        const steps = Math.max(1, Math.ceil(dt / FIXED_DT));
        for (let index = 0; index < steps; index += 1) {
          update(dt / steps);
        }
        drawScene();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function handleRestartIntent() {
        if (state.mode === "menu") {
          startFromMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          resetRun();
        }
      }

      function handlePointerDown(event) {
        state.currentPointerType = event.pointerType || "mouse";
        canvas.focus();
        const position = pointToCanvas(event.clientX, event.clientY);

        if (state.mode !== "running") {
          handleRestartIntent();
          return;
        }

        const now = performance.now();
        if (
          now - state.lastTapAt < DOUBLE_TAP_MS &&
          distance(position.x, position.y, state.lastTapPos.x, state.lastTapPos.y) < 36
        ) {
          cutLatestStitch();
          state.lastTapAt = 0;
          return;
        }

        state.lastTapAt = now;
        state.lastTapPos = position;

        const node = nearestNode(position.x, position.y, 28);
        if (node) {
          state.stitchDrag = {
            pointerId: event.pointerId,
            startId: node.id,
            x: position.x,
            y: position.y,
          };
          canvas.setPointerCapture?.(event.pointerId);
          return;
        }

        if (event.pointerType !== "mouse") {
          state.movePad = {
            pointerId: event.pointerId,
            originX: position.x,
            originY: position.y,
            dx: 0,
            dy: 0,
          };
          canvas.setPointerCapture?.(event.pointerId);
        }
      }

      function handlePointerMove(event) {
        const position = pointToCanvas(event.clientX, event.clientY);

        if (state.stitchDrag && state.stitchDrag.pointerId === event.pointerId) {
          state.stitchDrag.x = position.x;
          state.stitchDrag.y = position.y;
        }

        if (state.movePad && state.movePad.pointerId === event.pointerId) {
          const dx = clamp((position.x - state.movePad.originX) / PLAYER_PAD_RADIUS, -1, 1);
          const dy = clamp((position.y - state.movePad.originY) / PLAYER_PAD_RADIUS, -1, 1);
          state.movePad.dx = dx;
          state.movePad.dy = dy;
        }
      }

      function handlePointerUp(event) {
        const position = pointToCanvas(event.clientX, event.clientY);

        if (state.stitchDrag && state.stitchDrag.pointerId === event.pointerId) {
          const endNode = nearestNode(position.x, position.y, 30);
          if (endNode) {
            tryCreateStitch(state.stitchDrag.startId, endNode.id);
          }
          state.stitchDrag = null;
        }

        if (state.movePad && state.movePad.pointerId === event.pointerId) {
          state.movePad = null;
        }

        canvas.releasePointerCapture?.(event.pointerId);
      }

      function setKeyState(code, pressed) {
        if (code === "ArrowLeft" || code === "KeyA") keys.left = pressed;
        if (code === "ArrowRight" || code === "KeyD") keys.right = pressed;
        if (code === "ArrowUp" || code === "KeyW") keys.up = pressed;
        if (code === "ArrowDown" || code === "KeyS") keys.down = pressed;
      }

      function handleKeyDown(event) {
        if (event.code === "Enter" || event.code === "Space") {
          if (state.mode !== "running") {
            event.preventDefault();
            handleRestartIntent();
            return;
          }
        }

        if (event.code === "KeyX") {
          event.preventDefault();
          cutLatestStitch();
          return;
        }

        setKeyState(event.code, true);
      }

      function handleKeyUp(event) {
        setKeyState(event.code, false);
      }

      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        creator: META.creator,
        genre: META.genre,
        clearCondition: META.clearCondition,
      };

      window.relayStageResult = {
        status: "running",
      };

      window.render_game_to_text = () =>
        JSON.stringify({
          mode: state.mode,
          note: "origin=(0,0) top-left, +x right, +y down",
          timeLeft: Number(Math.max(0, SURVIVE_TIME - state.elapsed).toFixed(1)),
          threadHeat: Number(state.threadHeat.toFixed(2)),
          shadowRadius: Number(getShadowRadius().toFixed(1)),
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
          },
          litAltars: state.altars.filter((altar) => altar.lit).map((altar) => altar.key),
          connectedAltars: Array.from(state.connectedAltars),
          stitches: state.stitches.map((stitch) => ({
            a: stitch.a,
            b: stitch.b,
            integrity: Number(stitch.integrity.toFixed(2)),
          })),
          hardLight: Number(state.hardLightLevel.toFixed(2)),
        });

      window.advanceTime = (ms) => {
        const total = Math.max(1, ms);
        const steps = Math.max(1, Math.round(total / (1000 / 60)));
        const dt = Math.min(MAX_DT, total / 1000 / steps);
        for (let index = 0; index < steps; index += 1) {
          update(dt);
        }
        drawScene();
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            resetRun();
          }
          for (const altar of state.altars) {
            altar.lit = true;
          }
          state.elapsed = SURVIVE_TIME;
          clearStage();
          drawScene();
        },
        forceFail() {
          if (state.mode === "menu") {
            resetRun();
          }
          state.threadHeat = 1;
          failStage("debug");
          drawScene();
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);

      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      document.addEventListener("visibilitychange", () => {
        lastTimestamp = 0;
        if (!document.hidden) {
          drawScene();
        }
      });

      reportReadyToHost();
      drawScene();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
