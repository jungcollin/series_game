<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop stop-color='%23ffb16c'/%3E%3Cstop offset='1' stop-color='%2364d8ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='%230a101a'/%3E%3Ccircle cx='32' cy='32' r='20' fill='none' stroke='url(%23g)' stroke-width='8'/%3E%3Cpath d='M32 11v11M32 42v11M11 32h11M42 32h11' stroke='%23fff1dc' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <title>Dusk Subway: Pulse Fence</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Pretendard", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 12%, rgba(255, 159, 98, 0.18), transparent 28%),
          radial-gradient(circle at 80% 18%, rgba(120, 207, 255, 0.12), transparent 30%),
          linear-gradient(180deg, #21152c 0%, #0c101d 48%, #05070d 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(12, 16, 29, 0.94);
        color: #f5f7ff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dusk Subway: Pulse Fence. 캔버스를 터치하거나 Enter로 시작하세요.
      포인터/터치 드래그로 방패 회전, 탭으로 순간 증폭, 모바일은 터치와 드래그만으로 플레이.
      충전 1칸 이상 남기고 20연속 파형 반사. 충전 소진 뒤 과충전 파형을 놓치거나 같은 문양 3회 누적.
    </p>
    <canvas
      id="game"
      width="1280"
      height="720"
      aria-label="Dusk Subway: Pulse Fence"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.53 };
      const FIXED_DT = 1 / 60;
      const FRAME_MS = 1000 / 60;
      const MAX_DT = 1 / 20;
      const CORE_RADIUS = 68;
      const SHIELD_RADIUS = 178;
      const SPAWN_RADIUS = 520;
      const BASE_SHIELD_ARC = 0.62;
      const BOOST_ARC_BONUS = 0.22;
      const BOOST_DURATION = 0.24;
      const MAX_CHARGES = 7;
      const TARGET_COMBO = 20;
      const SURGE_INDICES = new Set([3, 7, 11, 15, 19]);
      const LANE_ANGLES = [-2.46, -1.82, -1.17, -0.46, 0.26, 1.02, 1.72, 2.44];
      const relayContext = window.RelayRuntime?.readContext(
        "dusk-subway-pulse-fencing-charge"
      ) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      ).matches;

      const META = {
        id: "dusk-subway-pulse-fencing-charge",
        title: "Dusk Subway: Pulse Fence",
        description:
          "황혼 승강장 중앙에서 회전 방패와 증폭 탭으로 문양 파형 20연속을 반사하세요.",
        creator: "jungcollin",
        genre: "Reactive shield action / 제한 충전",
        clearCondition: "충전 1칸 이상 남기고 20연속 파형 반사",
        failCondition: "충전 소진 뒤 과충전 파형을 놓치거나 같은 문양 3회 누적",
        controls:
          "포인터/터치 드래그로 방패 회전, 탭으로 순간 증폭, 모바일은 터치와 드래그만으로 플레이",
      };

      const GLYPHS = [
        {
          id: "ember",
          name: "EMBER",
          color: "#ff8d5d",
          glow: "rgba(255, 141, 93, 0.42)",
          shadow: "#ffd0a7",
          stroke: "#fff2dd",
        },
        {
          id: "tide",
          name: "TIDE",
          color: "#64d8ff",
          glow: "rgba(100, 216, 255, 0.4)",
          shadow: "#d8ffff",
          stroke: "#e8fdff",
        },
        {
          id: "prism",
          name: "PRISM",
          color: "#b891ff",
          glow: "rgba(184, 145, 255, 0.4)",
          shadow: "#efe4ff",
          stroke: "#f7efff",
        },
        {
          id: "verdant",
          name: "VERDANT",
          color: "#89f29f",
          glow: "rgba(137, 242, 159, 0.4)",
          shadow: "#e9ffe7",
          stroke: "#f7fff5",
        },
      ];
      const glyphMap = Object.fromEntries(GLYPHS.map((glyph) => [glyph.id, glyph]));

      let animationFrame = 0;
      let lastTimestamp = 0;
      let attemptCount = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let rng = createRng(1);

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        sceneTime: 0,
        shieldAngle: -Math.PI * 0.5,
        boostTime: 0,
        charges: MAX_CHARGES,
        combo: 0,
        reflectedTotal: 0,
        missedTotal: 0,
        sequenceIndex: 0,
        nextSpawnIn: 0.18,
        platformPulse: 0,
        cameraShake: 0,
        flashTime: 0,
        trainPhase: 0,
        pointerId: null,
        pointerStartX: 0,
        pointerStartY: 0,
        pointerDownAt: 0,
        pointerMoved: false,
        turnLeft: false,
        turnRight: false,
        note: META.description,
        failureReason: "",
        endGlow: 0,
        announcement: "DRAG TO ROTATE / TAP TO AMP",
        announcementTimer: 1.8,
        pulses: [],
        particles: [],
        popups: [],
        stackByGlyph: {},
        lastLaneIndex: 0,
      };

      function resetStacks() {
        state.stackByGlyph = Object.fromEntries(
          GLYPHS.map((glyph) => [glyph.id, 0])
        );
      }

      resetStacks();

      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        description: META.description,
        creator: META.creator,
        genre: META.genre,
        clearCondition: META.clearCondition,
        failCondition: META.failCondition,
        controls: META.controls,
      };

      window.relayStageResult = {
        status: "running",
      };

      function createRng(seed) {
        let value = seed >>> 0;
        return () => {
          value += 0x6d2b79f5;
          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function normalizeAngle(angle) {
        const tau = Math.PI * 2;
        let normalized = angle % tau;
        if (normalized > Math.PI) normalized -= tau;
        if (normalized < -Math.PI) normalized += tau;
        return normalized;
      }

      function angleDistance(a, b) {
        return normalizeAngle(a - b);
      }

      function rand(min = 0, max = 1) {
        return min + (max - min) * rng();
      }

      function roundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawText(text, x, y, options = {}) {
        const {
          size = 20,
          weight = 700,
          color = "#f7f8fe",
          align = "left",
          baseline = "alphabetic",
          shadow = "rgba(6, 10, 20, 0.34)",
          shadowBlur = 10,
        } = options;
        ctx.save();
        ctx.font = `${weight} ${size}px "Avenir Next", "Pretendard", "Segoe UI", sans-serif`;
        ctx.fillStyle = color;
        ctx.textAlign = align;
        ctx.textBaseline = baseline;
        ctx.shadowColor = shadow;
        ctx.shadowBlur = shadowBlur;
        ctx.fillText(text, x, y);
        ctx.restore();
      }

      function drawWrappedText(text, x, y, maxWidth, lineHeight, options = {}) {
        ctx.save();
        const size = options.size || 18;
        const weight = options.weight || 600;
        ctx.font = `${weight} ${size}px "Avenir Next", "Pretendard", "Segoe UI", sans-serif`;
        ctx.fillStyle = options.color || "#d9deef";
        ctx.textAlign = options.align || "left";
        ctx.textBaseline = "top";
        ctx.shadowColor = options.shadow || "rgba(6, 10, 20, 0.28)";
        ctx.shadowBlur = options.shadowBlur || 8;

        const words = String(text).split(" ");
        const lines = [];
        let line = "";
        for (const word of words) {
          const next = line ? `${line} ${word}` : word;
          if (ctx.measureText(next).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = next;
          }
        }
        if (line) {
          lines.push(line);
        }

        lines.forEach((entry, index) => {
          ctx.fillText(entry, x, y + index * lineHeight);
        });
        ctx.restore();
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: META.id,
          stageTitle: META.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: META.id,
          stageTitle: META.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function currentShieldArc() {
        const boostRatio = state.boostTime > 0 ? state.boostTime / BOOST_DURATION : 0;
        return BASE_SHIELD_ARC + BOOST_ARC_BONUS * boostRatio;
      }

      function queueAnnouncement(text, duration = 1.1) {
        state.announcement = text;
        state.announcementTimer = Math.max(state.announcementTimer, duration);
      }

      function addPopup(text, color, x = CENTER.x, y = CENTER.y - 150) {
        state.popups.push({
          text,
          color,
          x,
          y,
          life: 0.85,
        });
      }

      function spawnBurst(x, y, color, amount, outward = 1) {
        const count = prefersReducedMotion ? Math.ceil(amount * 0.45) : amount;
        for (let index = 0; index < count; index += 1) {
          const angle = rand(-Math.PI, Math.PI);
          const speed = rand(40, 220) * outward;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            color,
            size: rand(2, 7),
            life: rand(0.22, 0.72),
          });
        }
      }

      function resetRun(mode = "menu") {
        attemptCount += 1;
        rng = createRng(0x51c3a + attemptCount * 7919);
        state.mode = mode;
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.shieldAngle = -Math.PI * 0.5;
        state.boostTime = 0;
        state.charges = MAX_CHARGES;
        state.combo = 0;
        state.reflectedTotal = 0;
        state.missedTotal = 0;
        state.sequenceIndex = 0;
        state.nextSpawnIn = 0.18;
        state.platformPulse = 0;
        state.cameraShake = 0;
        state.flashTime = 0;
        state.failureReason = "";
        state.endGlow = 0;
        state.announcement = "DRAG TO ROTATE / TAP TO AMP";
        state.announcementTimer = 1.8;
        state.pulses = [];
        state.particles = [];
        state.popups = [];
        state.lastLaneIndex = 0;
        resetStacks();
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
      }

      function startStage() {
        resetRun("running");
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") return;
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.failureReason = reason;
        state.endGlow = 1;
        state.flashTime = 0.55;
        state.cameraShake = 18;
        window.relayStageResult.status = "failed";
        queueAnnouncement("SIGNAL LOST", 1.6);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") return;
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.endGlow = 1;
        state.flashTime = 0.7;
        state.cameraShake = 8;
        window.relayStageResult.status = "cleared";
        queueAnnouncement("TRACK OPEN", 1.6);
        reportClearedToHost();
      }

      function pointFromClient(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      function aimShieldAt(point) {
        state.shieldAngle = normalizeAngle(
          Math.atan2(point.y - CENTER.y, point.x - CENTER.x)
        );
      }

      function setTurnState(key, pressed) {
        if (key === "ArrowLeft" || key === "a" || key === "A") {
          state.turnLeft = pressed;
        }
        if (key === "ArrowRight" || key === "d" || key === "D") {
          state.turnRight = pressed;
        }
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.().catch(() => {});
        } else {
          document.exitFullscreen?.().catch(() => {});
        }
      }

      function triggerBoost() {
        if (state.mode !== "running") return;
        if (state.boostTime > 0.08) return;
        if (state.charges <= 0) {
          queueAnnouncement("NO RESERVE", 0.8);
          state.cameraShake = Math.max(state.cameraShake, 4);
          addPopup("0", "#ff8d5d", VIEW.width - 170, 92);
          return;
        }
        state.charges -= 1;
        state.boostTime = BOOST_DURATION;
        state.flashTime = Math.max(state.flashTime, 0.16);
        state.platformPulse = Math.max(state.platformPulse, 0.75);
        queueAnnouncement("AMP WINDOW", 0.65);
        addPopup("AMP", "#fff0d7", VIEW.width - 186, 92);
        spawnBurst(
          CENTER.x + Math.cos(state.shieldAngle) * SHIELD_RADIUS,
          CENTER.y + Math.sin(state.shieldAngle) * SHIELD_RADIUS,
          "rgba(255, 234, 197, 0.88)",
          18,
          1
        );

        for (const pulse of state.pulses) {
          if (pulse.reflected || pulse.resolved || pulse.prep > 0) continue;
          const aligned =
            Math.abs(angleDistance(pulse.angle, state.shieldAngle)) <
            currentShieldArc() * 0.5 + 0.12;
          const nearShield = Math.abs(pulse.radius - SHIELD_RADIUS) < 54;
          if (aligned && nearShield) {
            reflectPulse(pulse, true);
            break;
          }
        }
      }

      function chooseGlyph() {
        const stacked = GLYPHS.filter((glyph) => state.stackByGlyph[glyph.id] > 0);
        if (stacked.length && rng() < 0.45) {
          return stacked[Math.floor(rng() * stacked.length)];
        }
        return GLYPHS[Math.floor(rng() * GLYPHS.length)];
      }

      function chooseLaneIndex() {
        const offsets = [2, 3, 4, 5, 1, 6, 0, 7];
        for (const offset of offsets) {
          const index = (state.lastLaneIndex + offset + Math.floor(rng() * 2)) % LANE_ANGLES.length;
          if (index !== state.lastLaneIndex) {
            state.lastLaneIndex = index;
            return index;
          }
        }
        state.lastLaneIndex = (state.lastLaneIndex + 3) % LANE_ANGLES.length;
        return state.lastLaneIndex;
      }

      function spawnPulse() {
        const surge = SURGE_INDICES.has(state.sequenceIndex);
        const laneIndex = chooseLaneIndex();
        const angle = normalizeAngle(LANE_ANGLES[laneIndex] + rand(-0.08, 0.08));
        const glyph = chooseGlyph();
        const difficulty = clamp(state.sequenceIndex / 20, 0, 1);
        state.pulses.push({
          glyphId: glyph.id,
          angle,
          laneIndex,
          radius: SPAWN_RADIUS,
          speed: lerp(166, 244, difficulty),
          prep: clamp((surge ? 0.88 : 0.72) - difficulty * 0.18, 0.42, 0.92),
          spin: rand(0, Math.PI * 2),
          surge,
          reflected: false,
          resolved: false,
          alpha: 1,
        });
        state.sequenceIndex += 1;
        state.nextSpawnIn = clamp(1.12 - difficulty * 0.28 + rand(-0.08, 0.1), 0.62, 1.18);
      }

      function reflectPulse(pulse, boostedReflect = false) {
        if (pulse.reflected || pulse.resolved) return;
        const glyph = glyphMap[pulse.glyphId];
        pulse.reflected = true;
        pulse.resolved = true;
        pulse.radius = SHIELD_RADIUS + 10;
        pulse.speed *= pulse.surge ? 1.42 : 1.34;
        pulse.alpha = 1;
        state.combo += 1;
        state.reflectedTotal += 1;
        state.platformPulse = 1;
        state.cameraShake = pulse.surge ? 10 : 6;
        state.flashTime = Math.max(state.flashTime, pulse.surge ? 0.12 : 0.07);

        if (state.stackByGlyph[pulse.glyphId] > 0) {
          state.stackByGlyph[pulse.glyphId] -= 1;
          addPopup(`${glyph.name} 정화`, glyph.color, CENTER.x, CENTER.y + 112);
        }

        const tip = pulse.surge ? "SURGE RETURN" : boostedReflect ? "SNAP PARRY" : "PARRY";
        queueAnnouncement(tip, pulse.surge ? 0.9 : 0.55);
        addPopup(
          `x${state.combo}`,
          pulse.surge ? "#fff2dd" : glyph.stroke,
          CENTER.x + Math.cos(pulse.angle) * 120,
          CENTER.y + Math.sin(pulse.angle) * 120
        );
        spawnBurst(
          CENTER.x + Math.cos(pulse.angle) * SHIELD_RADIUS,
          CENTER.y + Math.sin(pulse.angle) * SHIELD_RADIUS,
          glyph.glow,
          pulse.surge ? 32 : 18
        );

        if (state.combo >= TARGET_COMBO && state.charges > 0) {
          clearStage();
        }
      }

      function absorbPulse(pulse) {
        if (pulse.resolved) return;
        pulse.resolved = true;
        pulse.alpha = 0;
        const glyph = glyphMap[pulse.glyphId];
        state.combo = 0;
        state.missedTotal += 1;
        state.stackByGlyph[pulse.glyphId] += 1;
        state.cameraShake = pulse.surge ? 18 : 11;
        state.flashTime = Math.max(state.flashTime, pulse.surge ? 0.42 : 0.24);
        queueAnnouncement(pulse.surge ? "CORE BREACH" : "STACKING", 0.85);
        addPopup(
          `${glyph.name} +1`,
          "#ffd5b8",
          CENTER.x + Math.cos(pulse.angle) * 66,
          CENTER.y + Math.sin(pulse.angle) * 66
        );
        spawnBurst(
          CENTER.x + Math.cos(pulse.angle) * 54,
          CENTER.y + Math.sin(pulse.angle) * 54,
          pulse.surge ? "rgba(255, 226, 201, 0.92)" : glyph.glow,
          pulse.surge ? 28 : 16,
          0.7
        );

        if (pulse.surge && state.charges === 0) {
          failStage("depleted-overload");
          return;
        }
        if (state.stackByGlyph[pulse.glyphId] >= 3) {
          failStage(`glyph-${pulse.glyphId}`);
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 1 - dt * 1.8;
          particle.vy *= 1 - dt * 1.8;
          particle.size *= 1 - dt * 0.95;
          return particle.life > 0.02 && particle.size > 0.6;
        });
      }

      function updatePopups(dt) {
        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= 42 * dt;
          return popup.life > 0;
        });
      }

      function updatePulses(dt) {
        state.pulses = state.pulses.filter((pulse) => {
          pulse.spin += dt * (pulse.surge ? 4.6 : 3.2);
          if (pulse.prep > 0) {
            pulse.prep = Math.max(0, pulse.prep - dt);
            return true;
          }

          if (pulse.reflected) {
            pulse.radius += pulse.speed * dt;
            pulse.alpha -= dt * 0.44;
            return pulse.radius < SPAWN_RADIUS + 180 && pulse.alpha > 0.04;
          }

          pulse.radius -= pulse.speed * dt;
          if (pulse.radius <= SHIELD_RADIUS + 8) {
            const aligned =
              Math.abs(angleDistance(pulse.angle, state.shieldAngle)) <
              currentShieldArc() * 0.5 + 0.08;
            if (aligned && (!pulse.surge || state.boostTime > 0)) {
              reflectPulse(pulse);
              return true;
            }
          }

          if (pulse.radius <= CORE_RADIUS + 20) {
            absorbPulse(pulse);
            return false;
          }

          return true;
        });
      }

      function updateRunning(dt) {
        const turn =
          (state.turnRight ? 1 : 0) -
          (state.turnLeft ? 1 : 0);
        if (turn !== 0) {
          state.shieldAngle = normalizeAngle(state.shieldAngle + turn * dt * 2.8);
        }

        state.elapsed += dt;
        state.lastRunTime = state.elapsed;
        state.nextSpawnIn -= dt;
        if (state.nextSpawnIn <= 0 && state.mode === "running") {
          spawnPulse();
        }

        updatePulses(dt);
        state.boostTime = Math.max(0, state.boostTime - dt);
        state.platformPulse = Math.max(0, state.platformPulse - dt * 1.35);
        state.cameraShake = Math.max(0, state.cameraShake - dt * 22);
        state.flashTime = Math.max(0, state.flashTime - dt * 1.8);

        if (state.combo >= TARGET_COMBO && state.charges > 0) {
          clearStage();
        }
      }

      function updateAmbient(dt) {
        state.sceneTime += dt;
        state.trainPhase = (state.trainPhase + dt * 0.08) % 1;
        state.announcementTimer = Math.max(0, state.announcementTimer - dt);
        state.endGlow = Math.max(0, state.endGlow - dt * 0.28);
      }

      function step(dt) {
        updateAmbient(dt);
        updateParticles(dt);
        updatePopups(dt);
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          state.platformPulse = Math.max(0, state.platformPulse - dt * 1.1);
          state.boostTime = Math.max(0, state.boostTime - dt * 1.4);
          state.cameraShake = Math.max(0, state.cameraShake - dt * 20);
          state.flashTime = Math.max(0, state.flashTime - dt * 1.8);
        }
      }

      function drawPlatform() {
        const ringGradient = ctx.createRadialGradient(
          CENTER.x,

          36,

        );
        ringGradient.addColorStop(0, "rgba(255, 230, 198, 0.06)");
        ringGradient.addColorStop(0.45, "rgba(22, 26, 39, 0.15)");
        ringGradient.addColorStop(1, "rgba(6, 8, 13, 0)");
        ctx.fillStyle = ringGradient;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, 410, 0, Math.PI * 2);
        ctx.fill();

        for (let index = 0; index < LANE_ANGLES.length; index += 1) {
          const angle = LANE_ANGLES[index];
          const sx = CENTER.x + Math.cos(angle) * (CORE_RADIUS + 80);
          const sy = CENTER.y + Math.sin(angle) * (CORE_RADIUS + 80);
          const ex = CENTER.x + Math.cos(angle) * (SPAWN_RADIUS + 16);
          const ey = CENTER.y + Math.sin(angle) * (SPAWN_RADIUS + 16);
          const laneGlow = 0.14 + Math.max(0, Math.sin(state.sceneTime * 1.4 + index) * 0.05);

          ctx.strokeStyle = `rgba(140, 164, 214, ${laneGlow})`;
          ctx.lineWidth = 18;
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(ex, ey);
          ctx.stroke();

          ctx.strokeStyle = "rgba(0, 0, 0, 0.28)";
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(ex, ey);
          ctx.stroke();

          for (let sleeper = 0; sleeper < 10; sleeper += 1) {
            const t = sleeper / 9;
            const px = lerp(sx, ex, t);
            const py = lerp(sy, ey, t);
            const nx = Math.cos(angle + Math.PI * 0.5);
            const ny = Math.sin(angle + Math.PI * 0.5);
            ctx.strokeStyle = "rgba(252, 232, 203, 0.09)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(px - nx * 13, py - ny * 13);
            ctx.lineTo(px + nx * 13, py + ny * 13);
            ctx.stroke();
          }

        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, SHIELD_RADIUS + 30, 0, Math.PI * 2);

      function drawSigil(glyph, x, y, size, rotation = 0, alpha = 1) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = glyph.stroke;
        ctx.fillStyle = glyph.color;
        ctx.shadowColor = glyph.glow;
        ctx.shadowBlur = size * 0.85;
        ctx.lineWidth = Math.max(2, size * 0.12);

        if (glyph.id === "ember") {
          ctx.beginPath();
          ctx.moveTo(0, -size * 0.7);
          ctx.lineTo(size * 0.48, 0);
          ctx.lineTo(0, size * 0.72);
          ctx.lineTo(-size * 0.48, 0);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, -size * 0.35);
          ctx.lineTo(0, size * 0.28);
          ctx.moveTo(-size * 0.24, 0);
          ctx.lineTo(size * 0.24, 0);
          ctx.stroke();
        } else if (glyph.id === "tide") {
          ctx.beginPath();
          ctx.arc(-size * 0.08, 0, size * 0.44, Math.PI * 0.28, Math.PI * 1.62);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(size * 0.14, 0, size * 0.26, -Math.PI * 0.62, Math.PI * 0.74);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-size * 0.36, size * 0.16);
          ctx.lineTo(size * 0.36, size * 0.16);
          ctx.stroke();
        } else if (glyph.id === "prism") {
          ctx.beginPath();
          for (let index = 0; index < 6; index += 1) {
            const angle = -Math.PI * 0.5 + (Math.PI * 2 * index) / 6;
            const px = Math.cos(angle) * size * 0.56;
            const py = Math.sin(angle) * size * 0.56;
            if (index === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, -size * 0.34);
          ctx.lineTo(size * 0.3, size * 0.2);
          ctx.lineTo(-size * 0.3, size * 0.2);
          ctx.closePath();
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.48, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.22, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-size * 0.52, 0);
          ctx.lineTo(-size * 0.18, 0);
          ctx.moveTo(size * 0.18, 0);
          ctx.lineTo(size * 0.52, 0);
          ctx.moveTo(0, -size * 0.52);
          ctx.lineTo(0, -size * 0.18);
          ctx.moveTo(0, size * 0.18);
          ctx.lineTo(0, size * 0.52);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawPulses() {
        for (const pulse of state.pulses) {
          const glyph = glyphMap[pulse.glyphId];
          const pointX = CENTER.x + Math.cos(pulse.angle) * pulse.radius;
          const pointY = CENTER.y + Math.sin(pulse.angle) * pulse.radius;

          if (pulse.prep > 0) {
            const prepAlpha = clamp(1 - pulse.prep / 0.92, 0.2, 1);
            const portalX = CENTER.x + Math.cos(pulse.angle) * SPAWN_RADIUS;
            const portalY = CENTER.y + Math.sin(pulse.angle) * SPAWN_RADIUS;
            ctx.save();
            ctx.globalAlpha = prepAlpha;
            ctx.strokeStyle = pulse.surge ? "rgba(255, 240, 212, 0.78)" : glyph.glow;
            ctx.lineWidth = pulse.surge ? 10 : 6;
            ctx.beginPath();
            ctx.moveTo(CENTER.x + Math.cos(pulse.angle) * (SHIELD_RADIUS + 30), CENTER.y + Math.sin(pulse.angle) * (SHIELD_RADIUS + 30));
            ctx.lineTo(portalX, portalY);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(portalX, portalY, pulse.surge ? 22 : 16, 0, Math.PI * 2);
            ctx.stroke();
            drawSigil(glyph, portalX, portalY, pulse.surge ? 22 : 16, pulse.spin, prepAlpha);
            ctx.restore();
            continue;
          }

          const trailLength = pulse.surge ? 82 : 58;
          const tailX = CENTER.x + Math.cos(pulse.angle) * (pulse.radius + trailLength);
          const tailY = CENTER.y + Math.sin(pulse.angle) * (pulse.radius + trailLength);
          const gradient = ctx.createLinearGradient(tailX, tailY, pointX, pointY);
          if (pulse.reflected) {
            gradient.addColorStop(0, "rgba(255, 250, 240, 0)");
            gradient.addColorStop(1, "rgba(255, 248, 234, 0.82)");
          } else {
            gradient.addColorStop(0, "rgba(255, 255, 255, 0)");
            gradient.addColorStop(1, pulse.surge ? "rgba(255, 238, 211, 0.9)" : glyph.glow);
          }
          ctx.save();
          ctx.globalAlpha = pulse.alpha;
          ctx.strokeStyle = gradient;
          ctx.lineWidth = pulse.surge ? 11 : 8;
          ctx.beginPath();
          ctx.moveTo(tailX, tailY);
          ctx.lineTo(pointX, pointY);
          ctx.stroke();
          ctx.restore();

          drawSigil(
            glyph,
            pointX,
            pointY,
            pulse.surge ? 24 : 18,
            pulse.spin,
            pulse.reflected ? 0.9 : 1
          );
        }
      }

          const orbGradient = ctx.createRadialGradient(tip.x, tip.y, 1, tip.x, tip.y, 24);

          ctx.fill();

          color: "rgba(120, 255, 175, 0.88)",
        });
        drawText(META.clearCondition, 162, 624, {
          size: 14,
          weight: 700,
          color: "#eef7ee",
        });
        drawText("실패", 98, 648, {
          size: 13,
          weight: 800,
          color: "rgba(255, 152, 123, 0.88)",
        });
        drawWrappedText(META.failCondition, 162, 636, 300, 22, {
          size: 14,
          weight: 700,
          color: "#eef0f8",
        });

        drawText("캔버스를 터치하거나 Enter", 676, 548, {
          size: 28,
          weight: 900,
          color: "#fff1dc",
          align: "center",
        });
        drawText("드래그로 회전, 짧게 탭해 증폭", 676, 584, {
          size: 18,
          weight: 700,
          color: "#d9e1f8",
          align: "center",
        });
      }

      function drawEndCard() {
        const clear = state.mode === "cleared";
        roundedRect(332, 200, 616, 318, 38);
        ctx.fillStyle = clear
          ? "rgba(15, 23, 19, 0.78)"
          : "rgba(20, 11, 13, 0.78)";
        ctx.fill();
        ctx.strokeStyle = clear
          ? "rgba(188, 255, 198, 0.2)"
          : "rgba(255, 182, 155, 0.18)";
        ctx.lineWidth = 2;
        ctx.stroke();

        drawText(clear ? "TRACK OPEN" : "SIGNAL LOST", 640, 258, {
          size: 54,
          weight: 900,
          color: clear ? "#efffe7" : "#fff0e8",
          align: "center",
        });
        drawText(
          clear
            ? "황혼 열차가 통과했습니다."
            : state.failureReason === "depleted-overload"
            ? "예비 충전이 바닥난 상태에서 과충전 파형을 놓쳤습니다."
            : "동일 문양이 세 번 누적되어 코어가 잠겼습니다.",
          640,
          300,
          {
            size: 20,
            weight: 700,
            color: "#dbe1f3",
            align: "center",
          }
        );

        drawText(`최종 연속 반사 ${state.combo}`, 640, 356, {
          size: 20,
          weight: 800,
          color: "#fff2dd",
          align: "center",
        });
        drawText(`잔여 충전 ${state.charges}칸`, 640, 388, {
          size: 18,
          weight: 700,
          color: clear ? "#bff8c8" : "#ffd1bc",
          align: "center",
        });
        drawWrappedText(
          clear ? META.clearCondition : META.failCondition,
          640,
          424,
          420,
          26,
          {
            size: 17,
            weight: 700,
            color: "#dbe1f3",
            align: "center",
          }
        );
        drawText("터치 또는 Enter로 재시작", 640, 486, {
          size: 18,
          weight: 800,
          color: "#fff3df",
          align: "center",
        });
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawBackdrop();

        const shakeX = Math.sin(state.sceneTime * 34) * state.cameraShake;
        const shakeY = Math.cos(state.sceneTime * 29) * state.cameraShake * 0.72;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawPlatform();
        drawPulses();
        drawParticles();
        drawCore();
        drawShield();
        drawPopups();
        ctx.restore();

        if (state.flashTime > 0.01) {
          ctx.fillStyle = `rgba(255, 239, 212, ${state.flashTime * 0.12})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        drawHud();
        if (state.mode === "menu") {
          drawMenuCard();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndCard();
        }
      }

      function runFrame(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const elapsed = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        step(elapsed);
        render();
        animationFrame = window.requestAnimationFrame(runFrame);
      }

      function startLoop() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        lastTimestamp = 0;
        animationFrame = window.requestAnimationFrame(runFrame);
      }

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / FRAME_MS));
        for (let index = 0; index < steps; index += 1) {
          step(FIXED_DT);
        }
        render();
        return window.render_game_to_text();
      };

      window.render_game_to_text = () =>
        JSON.stringify({
          mode: state.mode,
          note: META.description,
          coordSystem: "origin=center of arena, +x right, +y down, shieldAngle radians from center",
          combo: state.combo,
          targetCombo: TARGET_COMBO,
          charges: state.charges,
          shieldAngle: Number(state.shieldAngle.toFixed(3)),
          shieldArc: Number(currentShieldArc().toFixed(3)),
          stacks: state.stackByGlyph,
          pulses: state.pulses.slice(0, 5).map((pulse) => ({
            glyph: pulse.glyphId,
            surge: pulse.surge,
            stage: pulse.prep > 0 ? "telegraph" : pulse.reflected ? "reflected" : "inbound",
            angle: Number(pulse.angle.toFixed(3)),
            radius: Number(pulse.radius.toFixed(1)),
          })),
        });

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") startStage();
          clearStage();
        },
        forceFail() {
          if (state.mode === "menu") startStage();
          failStage("debug-fail");
        },
      };

      canvas.addEventListener("pointerdown", (event) => {
        canvas.focus({ preventScroll: true });
        if (state.mode === "menu") {
          startStage();
          return;
        }
        if (state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }

        const point = pointFromClient(event.clientX, event.clientY);
        state.pointerId = event.pointerId;
        state.pointerStartX = point.x;
        state.pointerStartY = point.y;
        state.pointerDownAt = performance.now();
        state.pointerMoved = false;
        aimShieldAt(point);
        canvas.setPointerCapture(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (state.pointerId !== event.pointerId || state.mode !== "running") return;
        const point = pointFromClient(event.clientX, event.clientY);
        if (Math.hypot(point.x - state.pointerStartX, point.y - state.pointerStartY) > 14) {
          state.pointerMoved = true;
        }
        aimShieldAt(point);
      });

      canvas.addEventListener("pointerup", (event) => {
        if (state.pointerId !== event.pointerId) return;
        const point = pointFromClient(event.clientX, event.clientY);
        const duration = performance.now() - state.pointerDownAt;
        const moved = Math.hypot(point.x - state.pointerStartX, point.y - state.pointerStartY);
        if (duration < 180 && moved < 18 && state.mode === "running") {
          triggerBoost();
        }
        state.pointerId = null;
        canvas.releasePointerCapture(event.pointerId);
      });

      canvas.addEventListener("pointercancel", () => {
        state.pointerId = null;
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
        } else if (event.key === " " || event.key === "Spacebar") {
          event.preventDefault();
          triggerBoost();
        } else if (event.key === "f" || event.key === "F") {
          event.preventDefault();
          toggleFullscreen();
        }
        setTurnState(event.key, true);
      });

      window.addEventListener("keyup", (event) => {
        setTurnState(event.key, false);
      });

      document.addEventListener("fullscreenchange", () => {
        render();
      });

      resetRun("menu");
      reportReadyToHost();
      render();
      startLoop();
    </script>
  </body>
</html>
