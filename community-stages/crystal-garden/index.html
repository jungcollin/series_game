<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>수정 정원</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #F0F0FF; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(140, 160, 220, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 50, 100, 0.92);
        color: #F0F0FF; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F0F0FF; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(140, 160, 220, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">수정 정원. 빈 공간에 화면 터치로 수정 씨앗을 심어 결정을 키우는 게임. 결정으로 영역을 채우면 클리어. 씨앗을 모두 쓰면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="수정 정원" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "crystal-garden",
        title: "수정 정원",
        description: "빈 공간에 수정 씨앗을 심어 결정을 키우는 게임",
        creator: "jungcollin",
        genre: "Growth simulation",
        clearCondition: "결정으로 영역을 채우면 클리어",
        failCondition: "씨앗을 모두 쓰면 실패",
        controls: "화면 터치로 수정 씨앗 심기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#F0F0FF",
        bgGrad: "#E0E0F5",
        crystal1: "#9BB8E8",
        crystal2: "#C5A8F0",
        crystal3: "#A8D8E8",
        crystalGlow: "rgba(155, 184, 232, 0.3)",
        grid: "rgba(140, 160, 220, 0.12)",
        gridActive: "rgba(140, 160, 220, 0.3)",
        text: "#3C3264",
        textLight: "rgba(60, 50, 100, 0.5)",
        success: "#6BA88E",
        fail: "#B86464",
        accent: "#8C7CC8",
        seedIcon: "#D4C5F9",
      };

      // --- Grid ---
      const GRID_COLS = 8;
      const GRID_ROWS = 5;
      const CELL_W = 80;
      const CELL_H = 70;
      const GRID_X = CX - (GRID_COLS * CELL_W) / 2;
      const GRID_Y = 100;
      const FILL_TARGET = 0.65;

      // --- State ---
      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      let seeds = 8;
      let maxSeeds = 8;
      let grid = []; // 2D: 0=empty, 1+=crystal growth level
      let crystalAge = []; // age per cell for animation
      let crystalColor = []; // color index per cell
      let fillRatio = 0;
      let displayFill = 0;
      let particles = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Particles ---
      function spawnParticles(x, y, count, color) {
        if (reducedMotion) count = Math.min(count, 3);
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(20, 80);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 20,
            life: 1, color, size: rand(2, 5),
          });
        }
      }

      // --- Grid helpers ---
      function initGrid() {
        grid = [];
        crystalAge = [];
        crystalColor = [];
        for (let r = 0; r < GRID_ROWS; r++) {
          grid[r] = [];
          crystalAge[r] = [];
          crystalColor[r] = [];
          for (let c = 0; c < GRID_COLS; c++) {
            grid[r][c] = 0;
            crystalAge[r][c] = 0;
            crystalColor[r][c] = Math.floor(Math.random() * 3);
          }
        }
      }

      function cellCenter(r, c) {
        return {
          x: GRID_X + c * CELL_W + CELL_W / 2,
          y: GRID_Y + r * CELL_H + CELL_H / 2,
        };
      }

      function getCellFromPos(px, py) {
        const c = Math.floor((px - GRID_X) / CELL_W);
        const r = Math.floor((py - GRID_Y) / CELL_H);
        if (c >= 0 && c < GRID_COLS && r >= 0 && r < GRID_ROWS) return { r, c };
        return null;
      }

      function plantSeed(r, c) {
        if (grid[r][c] > 0 || seeds <= 0) return false;
        seeds--;
        grid[r][c] = 1;
        crystalAge[r][c] = 0;
        const pos = cellCenter(r, c);
        spawnParticles(pos.x, pos.y, 8, COL.crystal1);
        return true;
      }

      function growCrystals(dt) {
        // Crystals grow to neighbors over time
        const toGrow = [];
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            if (grid[r][c] > 0) {
              crystalAge[r][c] += dt;
              // Grow to neighbors when mature enough
              if (crystalAge[r][c] > 1.5 && grid[r][c] < 3) {
                grid[r][c] = Math.min(3, grid[r][c] + dt * 0.8);
              }
              if (crystalAge[r][c] > 2) {
                const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                for (const [dr, dc] of dirs) {
                  const nr = r + dr, nc = c + dc;
                  if (nr >= 0 && nr < GRID_ROWS && nc >= 0 && nc < GRID_COLS && grid[nr][nc] === 0) {
                    if (Math.random() < dt * 0.6) {
                      toGrow.push({ r: nr, c: nc, parent: { r, c } });
                    }
                  }
                }
              }
            }
          }
        }
        for (const g of toGrow) {
          if (grid[g.r][g.c] === 0) {
            grid[g.r][g.c] = 0.5;
            crystalAge[g.r][g.c] = 0;
            crystalColor[g.r][g.c] = crystalColor[g.parent.r][g.parent.c];
            const pos = cellCenter(g.r, g.c);
            if (!reducedMotion) spawnParticles(pos.x, pos.y, 3, COL.crystal2);
          }
        }
      }

      function calcFillRatio() {
        let filled = 0;
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            if (grid[r][c] > 0.5) filled++;
          }
        }
        return filled / (GRID_ROWS * GRID_COLS);
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; shake = 0; flashAlpha = 0; clearAnim = 0;
        seeds = maxSeeds; fillRatio = 0; displayFill = 0;
        particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        initGrid();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        growCrystals(dt);
        fillRatio = calcFillRatio();
        displayFill = lerp(displayFill, fillRatio, dt * 4);

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 40 * dt;
          p.life -= dt * 1.8;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.9;
        if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        // Win check
        if (fillRatio >= FILL_TARGET) {
          mode = "clear";
          clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          spawnParticles(CX, CY, 25, COL.crystal2);
        } else if (seeds <= 0 && fillRatio < FILL_TARGET) {
          // Check if still growing
          let stillGrowing = false;
          for (let r = 0; r < GRID_ROWS && !stillGrowing; r++) {
            for (let c = 0; c < GRID_COLS && !stillGrowing; c++) {
              if (grid[r][c] > 0 && crystalAge[r][c] < 3) {
                // Check if any neighbor is empty
                const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                for (const [dr, dc] of dirs) {
                  const nr = r + dr, nc = c + dc;
                  if (nr >= 0 && nr < GRID_ROWS && nc >= 0 && nc < GRID_COLS && grid[nr][nc] === 0) {
                    stillGrowing = true;
                  }
                }
              }
            }
          }
          if (!stillGrowing) {
            mode = "failed";
            window.relayStageResult.status = "failed";
            reportFailed("씨앗 소진");
            shake = 8;
            flashAlpha = 0.2;
          }
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background gradient
        const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
        bgGrad.addColorStop(0, COL.bg);
        bgGrad.addColorStop(1, COL.bgGrad);
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        // Subtle sparkles
        if (!reducedMotion) {
          ctx.globalAlpha = 0.06;
          for (let i = 0; i < 20; i++) {
            const sx2 = (i * 173 + Math.floor(elapsed * 2) * 37) % W;
            const sy2 = (i * 211 + Math.floor(elapsed * 3) * 53) % H;
            ctx.fillStyle = "#C5A8F0";
            ctx.fillRect(sx2, sy2, 2, 2);
          }
          ctx.globalAlpha = 1;
        }

        if (mode === "running" || mode === "clear" || mode === "failed") {
          drawGrid();
          drawCrystals();
          drawParticles();
          if (mode === "running") drawHUD();
        }

        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(184, 100, 100, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawGrid() {
        ctx.strokeStyle = COL.grid;
        ctx.lineWidth = 1;
        for (let r = 0; r <= GRID_ROWS; r++) {
          ctx.beginPath();
          ctx.moveTo(GRID_X, GRID_Y + r * CELL_H);
          ctx.lineTo(GRID_X + GRID_COLS * CELL_W, GRID_Y + r * CELL_H);
          ctx.stroke();
        }
        for (let c = 0; c <= GRID_COLS; c++) {
          ctx.beginPath();
          ctx.moveTo(GRID_X + c * CELL_W, GRID_Y);
          ctx.lineTo(GRID_X + c * CELL_W, GRID_Y + GRID_ROWS * CELL_H);
          ctx.stroke();
        }
      }

      function drawCrystals() {
        const colors = [COL.crystal1, COL.crystal2, COL.crystal3];
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            if (grid[r][c] <= 0) continue;
            const pos = cellCenter(r, c);
            const growthLevel = clamp(grid[r][c], 0, 3);
            const scale = clamp(growthLevel / 3, 0.2, 1);
            const color = colors[crystalColor[r][c]];
            const age = crystalAge[r][c];

            // Glow
            if (age < 2 && !reducedMotion) {
              ctx.beginPath();
              ctx.arc(pos.x, pos.y, CELL_W * 0.4 * scale, 0, Math.PI * 2);
              ctx.fillStyle = COL.crystalGlow;
              ctx.fill();
            }

            // Crystal shape (hexagonal prism-like)
            drawCrystalShape(pos.x, pos.y, scale, color, age);
          }
        }
      }

      function drawCrystalShape(x, y, scale, color, age) {
        const s = CELL_W * 0.35 * scale;
        const h = CELL_H * 0.4 * scale;
        const pulse = Math.sin(age * 3) * 0.05 + 1;
        const ps = s * pulse;

        ctx.save();
        ctx.translate(x, y);

        // Main crystal body
        ctx.beginPath();
        ctx.moveTo(0, -h);
        ctx.lineTo(ps * 0.6, -h * 0.3);
        ctx.lineTo(ps * 0.5, h * 0.5);
        ctx.lineTo(0, h);
        ctx.lineTo(-ps * 0.5, h * 0.5);
        ctx.lineTo(-ps * 0.6, -h * 0.3);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        // Highlight facet
        ctx.beginPath();
        ctx.moveTo(0, -h);
        ctx.lineTo(ps * 0.6, -h * 0.3);
        ctx.lineTo(ps * 0.2, h * 0.2);
        ctx.lineTo(0, -h * 0.5);
        ctx.closePath();
        ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
        ctx.fill();

        // Small side crystal
        if (scale > 0.6) {
          ctx.beginPath();
          ctx.moveTo(ps * 0.3, -h * 0.1);
          ctx.lineTo(ps * 0.8, -h * 0.6);
          ctx.lineTo(ps * 0.5, h * 0.1);
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.6;
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        ctx.restore();
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = clamp(p.life, 0, 1);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        // Seeds remaining
        ctx.fillStyle = COL.text;
        ctx.font = "600 16px 'Segoe UI', sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`씨앗: ${seeds} / ${maxSeeds}`, 24, 20);

        // Fill progress
        const fillPct = Math.floor(displayFill * 100);
        const targetPct = Math.floor(FILL_TARGET * 100);
        ctx.textAlign = "right";
        ctx.fillStyle = fillPct >= targetPct ? COL.success : COL.text;
        ctx.fillText(`채움: ${fillPct}% / ${targetPct}%`, W - 24, 20);

        // Progress bar
        const barX = W - 164, barY = 44, barW = 140, barH = 6;
        ctx.fillStyle = "rgba(140, 160, 220, 0.15)";
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = displayFill >= FILL_TARGET ? COL.success : COL.accent;
        ctx.fillRect(barX, barY, barW * Math.min(displayFill / FILL_TARGET, 1), barH);

        // Hint
        ctx.fillStyle = COL.textLight;
        ctx.font = "400 13px 'Segoe UI', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("빈 칸을 터치하여 씨앗을 심으세요", CX, H - 20);
      }

      // --- Overlay cards ---
      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
        ctx.closePath();
      }

      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40);
        const lineH = 28;
        const cardH = 50 + lines.length * lineH + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(240, 240, 255, 0.96)";
        roundRect(ctx, cardX, cardY, cardW, cardH, 10);
        ctx.fill();

        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 24px 'Segoe UI', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px 'Segoe UI', sans-serif";
        ctx.fillStyle = "rgba(60, 50, 100, 0.75)";
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 52 + i * lineH);
        }

        ctx.fillStyle = COL.textLight;
        ctx.font = "400 13px 'Segoe UI', sans-serif";
        ctx.fillText("TAP 또는 ENTER", CX, cardY + cardH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(240, 240, 255, 0.5)";
        ctx.fillRect(0, 0, W, H);

        drawCard("수정 정원", [
          "빈 공간에 씨앗을 심어 결정을 키우세요",
          "",
          "조작: 화면 터치로 수정 씨앗 심기",
          "클리어: 결정으로 영역을 채우면 클리어",
          "실패: 씨앗을 모두 쓰면 실패",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(240, 240, 255, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);

        if (clearAnim > 0.3) {
          drawCard("정원 완성!", [
            `${Math.ceil(elapsed)}초 만에 완성`,
            `채움율: ${Math.floor(fillRatio * 100)}%`,
          ], COL.success);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(60, 50, 100, 0.2)";
        ctx.fillRect(0, 0, W, H);
        drawCard("씨앗 소진", [
          `채움율: ${Math.floor(fillRatio * 100)}% / ${Math.floor(FILL_TARGET * 100)}%`,
          "더 넓게 심어보세요",
        ], COL.fail);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        const cell = getCellFromPos(p.x, p.y);
        if (cell) {
          plantSeed(cell.r, cell.c);
        }
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }

        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;

        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);

        draw();
      }

      // --- Debug ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          seeds, fillRatio: +fillRatio.toFixed(2),
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          for (let r = 0; r < GRID_ROWS; r++)
            for (let c = 0; c < GRID_COLS; c++) {
              grid[r][c] = 3; crystalAge[r][c] = 5;
            }
          fillRatio = 1; displayFill = 1;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          seeds = 0;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      initGrid();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
