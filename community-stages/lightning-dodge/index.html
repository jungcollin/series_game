<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightning Dodge</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        background: #020617;
      }

      canvas {
        background: #020617;
      }

      .mobile-controls__row {
        gap: 12px;
      }

      .mobile-btn {
        min-width: 72px;
        min-height: 72px;
        padding: 0 18px;
        background: rgba(15, 23, 42, 0.78);
        font-size: 28px;
      }

      .mobile-btn[data-active="true"] {
        background: rgba(59, 130, 246, 0.86);
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Lightning Dodge. 캔버스를 터치하거나 Enter로 시작하세요. 진행 중에는 방향키
      왼쪽과 오른쪽 또는 A와 D, 모바일에서는 화면 좌우 버튼으로 이동합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Lightning Dodge"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../stage-kit.js"></script>
    <script>
      const TITLE = "Lightning Dodge";
      const DESCRIPTION = "번개 예고선을 보고 낙뢰를 피하며 35초를 버티는 아케이드 생존 스테이지입니다.";
      const CLEAR_CONDITION = "35초 동안 번개 예고선을 보고 모든 낙뢰를 피하기";
      const FAIL_CONDITION = "번개에 한 번이라도 맞으면 즉시 종료";
      const CONTROLS = "터치 또는 Enter로 시작, 방향키/A/D 또는 화면 좌우 버튼으로 이동";

      const SURVIVAL_TIME = 35;
      const GROUND_Y = 450;
      const PLAYER_WIDTH = 48;
      const PLAYER_HEIGHT = 66;
      const PLAYER_SPEED = 360;
      const STRIKE_BASE_WIDTH = 84;
      const STRIKE_GAP_MIN = 150;
      const MIN_SPAWN_INTERVAL = 0.26;
      const ENDGAME_RELIEF_WINDOW = 10;
      const PLAYER_HITBOX_INSET_X = 10;
      const PLAYER_HITBOX_INSET_Y = 10;
      const PLAYER_HITBOX_INSET_BOTTOM = 4;

      let runtimeInput = { left: false, right: false, start: false };
      let viewRef = { width: 960, height: 540 };

      function createPlayer() {
        return {
          x: viewRef.width / 2 - PLAYER_WIDTH / 2,
          y: GROUND_Y - PLAYER_HEIGHT,
          width: PLAYER_WIDTH,
          height: PLAYER_HEIGHT,
          bob: 0,
        };
      }

      function createStormBands() {
        return Array.from({ length: 4 }, (_, index) => ({
          x: index * 260,
          y: 74 + index * 28,
          width: 260 + index * 40,
          speed: 10 + index * 8,
          alpha: 0.12 + index * 0.04,
        }));
      }

      function createInitialState() {
        return {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          note: DESCRIPTION,
          player: createPlayer(),
          stormBands: createStormBands(),
          warnings: [],
          sparks: [],
          rainOffset: 0,
          spawnTimer: 0.9,
          spawnInterval: 1.1,
          strikeCounter: 0,
          flashAlpha: 0,
          shake: 0,
          lastReason: "",
        };
      }

      const state = createInitialState();

      function resetRun() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.note = DESCRIPTION;
        state.player = createPlayer();
        state.stormBands = createStormBands();
        state.warnings = [];
        state.sparks = [];
        state.rainOffset = 0;
        state.spawnTimer = 0.65;
        state.spawnInterval = 1.1;
        state.strikeCounter = 0;
        state.flashAlpha = 0;
        state.shake = 0;
        state.lastReason = "";
      }

      function spawnBurst(x, y, color, count) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.45;
          const speed = 40 + Math.random() * 180;
          state.sparks.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.35,
            color,
            size: 2 + Math.random() * 3,
          });
        }
      }

      function randomX(seed, left, right) {
        const raw = Math.sin(seed * 91.73 + 12.37) * 43758.5453;
        const normalized = raw - Math.floor(raw);
        return left + normalized * (right - left);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function rectOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function roundRect(context, x, y, width, height, radius) {
        context.beginPath();
        context.moveTo(x + radius, y);
        context.arcTo(x + width, y, x + width, y + height, radius);
        context.arcTo(x + width, y + height, x, y + height, radius);
        context.arcTo(x, y + height, x, y, radius);
        context.arcTo(x, y, x + width, y, radius);
        context.closePath();
      }

      function getProgress() {
        return clamp(state.elapsed / SURVIVAL_TIME, 0, 1);
      }

      function getIntensity() {
        const progress = getProgress();
        return progress * progress * (0.78 + progress * 0.22);
      }

      function getEndgameRelief() {
        const timeRemaining = SURVIVAL_TIME - state.elapsed;
        return clamp((ENDGAME_RELIEF_WINDOW - timeRemaining) / ENDGAME_RELIEF_WINDOW, 0, 1);
      }

      function getPlayerRenderY(player) {
        return player.y + Math.sin(player.bob) * 1.8;
      }

      function getPlayerHitRect(player) {
        return {
          x: player.x + PLAYER_HITBOX_INSET_X,
          y: getPlayerRenderY(player) + PLAYER_HITBOX_INSET_Y,
          w: player.width - PLAYER_HITBOX_INSET_X * 2,
          h: player.height - PLAYER_HITBOX_INSET_Y - PLAYER_HITBOX_INSET_BOTTOM,
        };
      }

      function getStrikeGapMin() {
        return STRIKE_GAP_MIN - getIntensity() * 42;
      }

      function getStrikeWidth() {
        return STRIKE_BASE_WIDTH + getIntensity() * 32;
      }

      function getStrikeHitWidth(warning) {
        return Math.max(28, warning.width * 0.42);
      }

      function pickSpawnCenters(count) {
        const centers = [];
        const halfWidth = getStrikeWidth() / 2;
        const minX = 80 + halfWidth;
        const maxX = viewRef.width - 80 - halfWidth;

        for (let attempts = 0; attempts < 64 && centers.length < count; attempts += 1) {
          const candidate = randomX(state.strikeCounter + attempts + state.elapsed * 10, minX, maxX);
          let valid = true;
          for (const existing of centers) {
            if (Math.abs(existing - candidate) < getStrikeGapMin()) {
              valid = false;
              break;
            }
          }
          if (valid) {
            centers.push(candidate);
          }
        }

        while (centers.length < count) {
          centers.push(minX + ((centers.length + 1) / (count + 1)) * (maxX - minX));
        }

        return centers;
      }

      function spawnStrikeSet() {
        state.strikeCounter += 1;
        const intensity = getIntensity();
        const endgameRelief = getEndgameRelief();
        const strikeWidth = getStrikeWidth();
        const strikeCount =
          intensity > 0.9
            ? state.strikeCounter % 2 === 0
              ? 3
              : 2
            : intensity > 0.76
              ? state.strikeCounter % 2 === 0 || endgameRelief < 0.3
                ? 3
                : 2
              : intensity > 0.42 && state.strikeCounter % 2 === 0
                ? 2
                : 1;
        const warningDuration = Math.max(0.28, 0.98 - intensity * 0.56 + endgameRelief * 0.05);
        const impactDuration = 0.18 + intensity * 0.1;
        const centers = pickSpawnCenters(strikeCount);

        for (const center of centers) {
          state.warnings.push({
            centerX: center,
            width: strikeWidth,
            phase: "warning",
            timer: warningDuration,
            warningDuration,
            impactDuration,
            impactTimer: impactDuration,
          });
        }
      }

      function updateStorm(dt) {
        state.rainOffset = (state.rainOffset + dt * 320) % 34;
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * 2.4);
        state.shake = Math.max(0, state.shake - dt * 36);

        for (const band of state.stormBands) {
          band.x += band.speed * dt;
          if (band.x > viewRef.width + 160) {
            band.x = -band.width - 40;
          }
        }

        state.sparks = state.sparks.filter((spark) => {
          spark.x += spark.vx * dt;
          spark.y += spark.vy * dt;
          spark.life -= dt;
          spark.vy += dt * 120;
          return spark.life > 0;
        });
      }

      function updatePlayer(dt) {
        const direction = (runtimeInput.right ? 1 : 0) - (runtimeInput.left ? 1 : 0);
        state.player.x += direction * PLAYER_SPEED * dt;
        state.player.x = clamp(state.player.x, 28, viewRef.width - state.player.width - 28);
        state.player.bob += dt * (direction === 0 ? 2 : 10);
      }

      function updateWarnings(dt, runtime) {
        const playerRect = getPlayerHitRect(state.player);
        const aliveWarnings = [];

        for (const warning of state.warnings) {
          if (warning.phase === "warning") {
            warning.timer -= dt;
            if (warning.timer <= 0) {
              warning.phase = "impact";
              warning.impactTimer = warning.impactDuration;
              state.flashAlpha = Math.max(state.flashAlpha, 0.55);
              state.shake = Math.max(state.shake, 10);
              spawnBurst(warning.centerX, 86, "#fef3c7", 9);
            }
            aliveWarnings.push(warning);
            continue;
          }

          warning.impactTimer -= dt;
          const hitWidth = getStrikeHitWidth(warning);
          const strikeRect = {
            x: warning.centerX - hitWidth / 2,
            y: 86,
            w: hitWidth,
            h: GROUND_Y - 60,
          };
          if (rectOverlap(playerRect, strikeRect)) {
            runtime.fail("lightning_hit");
          }
          if (warning.impactTimer > 0) {
            aliveWarnings.push(warning);
          }
        }

        state.warnings = aliveWarnings;
      }

      function drawBackground(ctx2d) {
        const gradient = ctx2d.createLinearGradient(0, 0, 0, viewRef.height);
        gradient.addColorStop(0, "#050816");
        gradient.addColorStop(0.58, "#0f1b35");
        gradient.addColorStop(1, "#12263c");
        ctx2d.fillStyle = gradient;
        ctx2d.fillRect(0, 0, viewRef.width, viewRef.height);

        ctx2d.fillStyle = "rgba(226, 232, 240, 0.05)";
        for (const band of state.stormBands) {
          ctx2d.beginPath();
          ctx2d.ellipse(band.x, band.y, band.width * 0.45, 34, 0, 0, Math.PI * 2);
          ctx2d.fill();
          ctx2d.beginPath();
          ctx2d.ellipse(band.x + 60, band.y + 18, band.width * 0.35, 26, 0, 0, Math.PI * 2);
          ctx2d.fill();
        }

        ctx2d.strokeStyle = "rgba(191, 219, 254, 0.16)";
        ctx2d.lineWidth = 2;
        for (let x = -40; x < viewRef.width + 40; x += 28) {
          ctx2d.beginPath();
          ctx2d.moveTo(x, 110 + ((x / 28) % 2) * 6);
          ctx2d.lineTo(x - 18, viewRef.height + state.rainOffset);
          ctx2d.stroke();
        }
      }

      function drawArena(ctx2d) {
        ctx2d.fillStyle = "#1d4d3c";
        ctx2d.fillRect(0, GROUND_Y, viewRef.width, viewRef.height - GROUND_Y);

        ctx2d.fillStyle = "#264653";
        ctx2d.fillRect(0, GROUND_Y - 18, viewRef.width, 18);

        ctx2d.fillStyle = "#415a77";
        for (let index = 0; index < 24; index += 1) {
          ctx2d.fillRect(index * 44, GROUND_Y - 24, 18, 4);
        }
      }

      function drawWarnings(ctx2d) {
        for (const warning of state.warnings) {
          const left = warning.centerX - warning.width / 2;
          if (warning.phase === "warning") {
            const pulse =
              0.45 + 0.35 * Math.sin((warning.timer / warning.warningDuration) * Math.PI * 8);
            ctx2d.fillStyle = `rgba(250, 204, 21, ${0.18 + pulse * 0.3})`;
            ctx2d.fillRect(left, 84, warning.width, GROUND_Y - 70);

            ctx2d.strokeStyle = "rgba(253, 224, 71, 0.94)";
            ctx2d.lineWidth = 3;
            ctx2d.setLineDash([12, 10]);
            ctx2d.strokeRect(left + 2, 88, warning.width - 4, GROUND_Y - 78);
            ctx2d.setLineDash([]);
            continue;
          }

          const t = warning.impactTimer / warning.impactDuration;
          const alpha = 0.55 + (1 - t) * 0.4;
          const gradient = ctx2d.createLinearGradient(warning.centerX, 84, warning.centerX, GROUND_Y);
          gradient.addColorStop(0, `rgba(255,255,255,${alpha})`);
          gradient.addColorStop(0.3, `rgba(191,219,254,${alpha})`);
          gradient.addColorStop(1, "rgba(59,130,246,0.08)");
          ctx2d.fillStyle = gradient;
          ctx2d.fillRect(left, 84, warning.width, GROUND_Y - 66);

          ctx2d.strokeStyle = `rgba(255,255,255,${alpha})`;
          ctx2d.lineWidth = 5;
          ctx2d.beginPath();
          ctx2d.moveTo(warning.centerX, 84);
          ctx2d.lineTo(warning.centerX - 18, 180);
          ctx2d.lineTo(warning.centerX + 12, 266);
          ctx2d.lineTo(warning.centerX - 10, 360);
          ctx2d.lineTo(warning.centerX + 8, GROUND_Y - 6);
          ctx2d.stroke();
        }
      }

      function drawPlayer(ctx2d) {
        const x = state.player.x;
        const y = getPlayerRenderY(state.player);

        ctx2d.fillStyle = "#e2e8f0";
        roundRect(ctx2d, x + 8, y + 6, 32, 40, 12);
        ctx2d.fill();

        ctx2d.fillStyle = "#f97316";
        roundRect(ctx2d, x + 10, y + 12, 28, 12, 6);
        ctx2d.fill();

        ctx2d.fillStyle = "#0f172a";
        ctx2d.fillRect(x + 14, y + 46, 8, 18);
        ctx2d.fillRect(x + 28, y + 46, 8, 18);

        ctx2d.fillStyle = "#f8fafc";
        ctx2d.fillRect(x + 16, y + 20, 6, 6);
        ctx2d.fillRect(x + 28, y + 20, 6, 6);
      }

      function drawHud(ctx2d) {
        ctx2d.fillStyle = "rgba(8, 15, 27, 0.72)";
        roundRect(ctx2d, 28, 26, 232, 92, 18);
        ctx2d.fill();

        ctx2d.fillStyle = "#f59e0b";
        ctx2d.font = "700 14px Trebuchet MS";
        ctx2d.fillText("LIGHTNING DODGE", 48, 52);

        ctx2d.fillStyle = "#f8fafc";
        ctx2d.font = "700 28px Trebuchet MS";
        ctx2d.fillText(`${Math.max(0, SURVIVAL_TIME - state.elapsed).toFixed(1)}s`, 48, 84);

        ctx2d.font = "600 16px Trebuchet MS";
        ctx2d.fillStyle = "rgba(226, 232, 240, 0.88)";
        ctx2d.fillText("좌우 이동으로 예고선을 피하세요", 48, 108);
      }

      function drawSparks(ctx2d) {
        for (const spark of state.sparks) {
          ctx2d.fillStyle = spark.color;
          ctx2d.globalAlpha = Math.max(0, spark.life * 1.9);
          ctx2d.fillRect(spark.x, spark.y, spark.size, spark.size);
          ctx2d.globalAlpha = 1;
        }
      }

      function renderCard(ctx2d, title, lines, accent) {
        ctx2d.fillStyle = "rgba(3, 7, 18, 0.7)";
        ctx2d.fillRect(0, 0, viewRef.width, viewRef.height);

        ctx2d.fillStyle = "rgba(248, 250, 252, 0.96)";
        roundRect(ctx2d, 140, 96, 680, 320, 28);
        ctx2d.fill();

        ctx2d.strokeStyle = accent;
        ctx2d.lineWidth = 4;
        roundRect(ctx2d, 140, 96, 680, 320, 28);
        ctx2d.stroke();

        ctx2d.textAlign = "center";
        ctx2d.fillStyle = accent;
        ctx2d.font = "700 44px Trebuchet MS";
        ctx2d.fillText(title, viewRef.width / 2, 162);

        ctx2d.fillStyle = "#0f172a";
        ctx2d.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx2d.fillText(line, viewRef.width / 2, 228 + index * 44);
        });
        ctx2d.textAlign = "left";
      }

      function drawOverlay(ctx2d) {
        if (state.mode === "running") {
          return;
        }

        if (state.mode === "menu") {
          renderCard(
            ctx2d,
            TITLE,
            [
              "좌우 이동으로 예고선을 보고 낙뢰를 피하세요.",
              `클리어 조건: ${CLEAR_CONDITION}`,
              `실패 조건: ${FAIL_CONDITION}`,
              CONTROLS,
            ],
            "#f59e0b"
          );
          return;
        }

        if (state.mode === "failed") {
          renderCard(
            ctx2d,
            "RUN OVER",
            [
              "낙뢰에 맞았습니다.",
              `버틴 시간 ${state.lastRunTime.toFixed(1)}초`,
              "Enter로 다시 도전할 수 있습니다.",
            ],
            "#ef4444"
          );
          return;
        }

        renderCard(
          ctx2d,
          "ALL CLEAR",
          [
            "폭풍을 모두 버텼습니다.",
            `생존 시간 ${state.lastRunTime.toFixed(1)}초`,
            "다음 스테이지로 이어집니다.",
          ],
          "#22c55e"
        );
      }

      function renderFlash(ctx2d) {
        if (state.flashAlpha <= 0) {
          return;
        }
        ctx2d.fillStyle = `rgba(255,255,255,${state.flashAlpha * 0.5})`;
        ctx2d.fillRect(0, 0, viewRef.width, viewRef.height);
      }

      const stage = window.StageKit.create({
        id: "lightning-dodge",
        title: TITLE,
        creator: {
          name: "JungCollin",
          avatar: null,
          github: "jungcollin",
        },
        genre: "Arcade survival",
        clearCondition: CLEAR_CONDITION,
        failCondition: FAIL_CONDITION,
        controls: CONTROLS,
        note: DESCRIPTION,
        canvas: "#game",
        controlsLayout: {
          preset: "move2",
        },
        initialState() {
          return state;
        },
        onInit(ctx) {
          viewRef = ctx.view;
          runtimeInput = ctx.input;

          ctx.installKeyboard({
            Enter: "start",
            ArrowLeft: "left",
            ArrowRight: "right",
            a: "left",
            d: "right",
          });

          // StageKit installs touchstart / pointerdown handlers here for mobile start.
          ctx.installTouchStart((runtime) => {
            if (runtime.state.mode !== "running") {
              runtime.start();
            }
          });

          document.querySelectorAll(".mobile-btn").forEach((button) => {
            button.addEventListener("pointerdown", () => {
              if (ctx.state.mode !== "running") {
                ctx.start();
              }
            });
          });
        },
        onStart() {
          resetRun();
        },
        onFail(reason) {
          state.flashAlpha = 0.95;
          state.shake = 18;
          state.lastReason = reason;
          spawnBurst(state.player.x + state.player.width / 2, state.player.y + 20, "#f8fafc", 18);
        },
        onClear() {
          state.flashAlpha = 0.65;
          state.shake = 0;
          for (let index = 0; index < 28; index += 1) {
            spawnBurst(120 + (index % 7) * 120, 120 + Math.floor(index / 7) * 48, "#fde68a", 6);
          }
        },
        update(dt, ctx) {
          updateStorm(dt);

          if (ctx.state.mode !== "running") {
            if (ctx.input.start) {
              ctx.input.start = false;
              ctx.start();
            }
            return;
          }

          state.elapsed += dt;
          const intensity = getIntensity();
          const endgameRelief = getEndgameRelief();
          state.spawnInterval = Math.max(
            MIN_SPAWN_INTERVAL,
            1.1 - intensity * 0.84 + endgameRelief * 0.04
          );
          state.spawnTimer -= dt;
          while (state.spawnTimer <= 0) {
            spawnStrikeSet();
            state.spawnTimer += state.spawnInterval;
          }

          updatePlayer(dt);
          updateWarnings(dt, ctx);

          if (ctx.state.mode === "running" && state.elapsed >= SURVIVAL_TIME) {
            ctx.clear();
          }
        },
        render(ctx) {
          const ctx2d = ctx.ctx2d;
          ctx2d.save();
          if (state.shake > 0 && state.mode !== "menu") {
            const offset = Math.sin(state.elapsed * 60) * state.shake * 0.2;
            ctx2d.translate(offset, 0);
          }

          drawBackground(ctx2d);
          drawArena(ctx2d);
          drawWarnings(ctx2d);
          drawPlayer(ctx2d);
          drawHud(ctx2d);
          drawSparks(ctx2d);
          renderFlash(ctx2d);
          drawOverlay(ctx2d);
          ctx2d.restore();
        },
        serialize() {
          const intensity = getIntensity();
          const playerHitRect = getPlayerHitRect(state.player);
          return {
            coordinate_system: "origin top-left, x right, y down, units in pixels",
            mode: state.mode,
            player: {
              x: Math.round(state.player.x),
              y: Math.round(state.player.y),
              w: state.player.width,
              h: state.player.height,
              hitbox: {
                x: Math.round(playerHitRect.x),
                y: Math.round(playerHitRect.y),
                w: Math.round(playerHitRect.w),
                h: Math.round(playerHitRect.h),
              },
            },
            time_remaining: Number(Math.max(0, SURVIVAL_TIME - state.elapsed).toFixed(1)),
            intensity: Number(intensity.toFixed(2)),
            endgame_relief: Number(getEndgameRelief().toFixed(2)),
            spawn_interval: Number(state.spawnInterval.toFixed(2)),
            warnings: state.warnings.slice(0, 4).map((warning) => ({
              phase: warning.phase,
              x: Math.round(warning.centerX),
              width: warning.width,
              hit_width: Number(getStrikeHitWidth(warning).toFixed(1)),
              time_to_impact:
                warning.phase === "warning"
                  ? Number(Math.max(0, warning.timer).toFixed(2))
                  : 0,
            })),
          };
        },
      });

      window.__relayDebug = {
        setElapsed(seconds) {
          state.elapsed = clamp(seconds, 0, SURVIVAL_TIME);
          stage.ctx2d && stage.canvas && stage.canvas.focus();
        },
        setPlayerX(x) {
          state.player.x = clamp(x, 28, viewRef.width - state.player.width - 28);
        },
        clearWarnings() {
          state.warnings = [];
        },
        injectImpactWarning(centerX, width = getStrikeWidth(), impactDuration = 0.25) {
          state.warnings.push({
            centerX,
            width,
            phase: "impact",
            timer: 0,
            warningDuration: impactDuration,
            impactDuration,
            impactTimer: impactDuration,
          });
        },
