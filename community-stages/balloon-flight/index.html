<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>풍선 여행</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #F0E8F8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 140, 200, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(100, 60, 120, 0.92);
        color: #fff; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F0E8F8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(100, 60, 120, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">풍선 여행. 화면 터치로 풍선을 좌우로 이동하세요. 장애물을 피하며 하늘 끝까지 올라가면 클리어. 장애물에 부딪히면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="풍선 여행" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "balloon-flight",
        title: "풍선 여행",
        description: "풍선을 타고 장애물을 피하며 하늘 끝까지 올라가는 게임",
        creator: "jungcollin",
        genre: "Swipe action",
        clearCondition: "하늘 끝까지 도달하면 클리어",
        failCondition: "장애물에 부딪히면 실패",
        controls: "화면 터치로 풍선을 좌우로 이동",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const COL = {
        skyTop: "#B0D4F1", skyMid: "#E6E6FA", skyBot: "#FFE4E1",
        balloon: "#FFB6C1", balloonDark: "#E89AAA",
        string: "#A08060",
        cloud: "rgba(255,255,255,0.8)", cloudShadow: "rgba(200,200,220,0.3)",
        bird: "#6A5A4A",
        star: "#FFD700", starGlow: "rgba(255,215,0,0.3)",
        text: "#5A4060", textLight: "rgba(90,64,96,0.6)",
        card: "rgba(255,252,250,0.95)", accent: "#E89AAA", damage: "#B04050",
      };

      const GOAL_HEIGHT = 3000;
      const RISE_SPEED = 80;
      const MOVE_SPEED = 300;
      const BALLOON_R = 20;

      let mode = "menu", elapsed = 0, altitude = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;

      let balloon = { x: CX, y: H * 0.6, tx: CX };
      let obstacles = [];
      let clouds = [];
      let particles = [];
      let spawnTimer = 0;
      let bgStars = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function spawnObstacle() {
        const type = Math.random();
        if (type < 0.5) {
          // Bird flying across
          const fromLeft = Math.random() > 0.5;
          obstacles.push({
            type: "bird", x: fromLeft ? -30 : W + 30, y: rand(80, H - 80),
            vx: (fromLeft ? 1 : -1) * rand(80, 150), r: 15,
            wing: 0, wingSpeed: rand(6, 10),
          });
        } else {
          // Cloud obstacle
          const x = rand(60, W - 60);
          obstacles.push({
            type: "cloud", x, y: -40, vy: rand(30, 60),
            w: rand(60, 120), h: rand(30, 50),
          });
        }
      }

      function initBgStars() {
        bgStars = [];
        for (let i = 0; i < 20; i++) {
          bgStars.push({ x: rand(0, W), y: rand(0, H), size: rand(1, 2.5), alpha: rand(0.1, 0.4) });
        }
      }

      function reset() {
        elapsed = 0; altitude = 0; shake = 0; clearAnim = 0;
        balloon = { x: CX, y: H * 0.6, tx: CX };
        obstacles = []; clouds = []; particles = []; spawnTimer = 0;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        initBgStars();
        for (let i = 0; i < 4; i++) {
          clouds.push({ x: rand(0, W), y: rand(0, H), w: rand(60, 140), h: rand(25, 45), speed: rand(5, 15) });
        }
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        altitude += RISE_SPEED * dt;

        // Move balloon toward touch
        balloon.x = lerp(balloon.x, balloon.tx, clamp(8 * dt, 0, 1));
        balloon.x = clamp(balloon.x, BALLOON_R + 10, W - BALLOON_R - 10);

        // Gentle bob
        balloon.y = H * 0.6 + Math.sin(elapsed * 2) * 5;

        // Spawn obstacles
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnObstacle();
          const progress = altitude / GOAL_HEIGHT;
          spawnTimer = lerp(1.5, 0.6, progress);
        }

        // Update obstacles
        for (const o of obstacles) {
          if (o.type === "bird") {
            o.x += o.vx * dt;
            o.wing += o.wingSpeed * dt;
          } else {
            o.y += o.vy * dt;
          }
        }

        // Collision check
        for (const o of obstacles) {
          let hit = false;
          if (o.type === "bird") {
            const dx = balloon.x - o.x, dy = balloon.y - o.y;
            hit = Math.hypot(dx, dy) < BALLOON_R + o.r;
          } else {
            const hw = o.w / 2, hh = o.h / 2;
            hit = balloon.x + BALLOON_R > o.x - hw && balloon.x - BALLOON_R < o.x + hw &&
                  balloon.y + BALLOON_R > o.y - hh && balloon.y - BALLOON_R < o.y + hh;
          }
          if (hit) {
            mode = "failed"; shake = 10;
            spawnBurst(balloon.x, balloon.y);
            window.relayStageResult.status = "failed"; reportFailed("장애물 충돌");
            return;
          }
        }

        // Remove off-screen obstacles
        obstacles = obstacles.filter(o => {
          if (o.type === "bird") return o.x > -50 && o.x < W + 50;
          return o.y < H + 50;
        });

        // Clouds scroll down
        for (const c of clouds) {
          c.y += 20 * dt;
          if (c.y > H + 50) { c.y = -50; c.x = rand(0, W); }
        }

        // Particles
        if (!reducedMotion && Math.random() < 0.15) {
          particles.push({
            x: balloon.x + rand(-8, 8), y: balloon.y + BALLOON_R + 10,
            vx: rand(-5, 5), vy: rand(10, 30), life: 1, size: rand(1, 3),
          });
        }
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.life -= dt * 2; if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;

        if (altitude >= GOAL_HEIGHT) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared();
        }
      }

      function spawnBurst(x, y) {
        for (let i = 0; i < (reducedMotion ? 4 : 12); i++) {
          const a = rand(0, Math.PI * 2), sp = rand(40, 120);
          particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, size: rand(2, 5) });
        }
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Sky gradient changes with altitude
        const progress = clamp(altitude / GOAL_HEIGHT, 0, 1);
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        if (progress < 0.5) {
          grad.addColorStop(0, COL.skyTop); grad.addColorStop(1, COL.skyBot);
        } else {
          const t = (progress - 0.5) * 2;
          grad.addColorStop(0, lerpColor("#B0D4F1", "#6080B0", t));
          grad.addColorStop(1, lerpColor("#FFE4E1", "#E6E6FA", t));
        }
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

        // Stars become visible at high altitude
        if (progress > 0.5) {
          const starAlpha = (progress - 0.5) * 2;
          for (const s of bgStars) {
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,215,0,${s.alpha * starAlpha})`; ctx.fill();
          }
        }

        // Background clouds
        for (const c of clouds) {
          ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
          ctx.fillStyle = COL.cloud; ctx.fill();
        }

        // Obstacles
        for (const o of obstacles) {
          if (o.type === "bird") {
            drawBird(o);
          } else {
            ctx.beginPath(); ctx.ellipse(o.x, o.y, o.w / 2, o.h / 2, 0, 0, Math.PI * 2);
            ctx.fillStyle = COL.cloudShadow; ctx.fill();
            ctx.beginPath(); ctx.ellipse(o.x, o.y - 3, o.w / 2, o.h / 2, 0, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(200,200,220,0.7)"; ctx.fill();
          }
        }

        // Balloon
        drawBalloon();

        // Particles
        for (const p of particles) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = COL.balloon; ctx.globalAlpha = p.life * 0.5; ctx.fill(); ctx.globalAlpha = 1;
        }

        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBird(o) {
        ctx.save(); ctx.translate(o.x, o.y);
        const wing = Math.sin(o.wing) * 8;
        ctx.strokeStyle = COL.bird; ctx.lineWidth = 2; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(-12, wing); ctx.quadraticCurveTo(-4, -wing, 0, 0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(12, wing); ctx.quadraticCurveTo(4, -wing, 0, 0); ctx.stroke();
        ctx.restore();
      }

      function drawBalloon() {
        const bx = balloon.x, by = balloon.y;

        // String
        ctx.beginPath(); ctx.moveTo(bx, by + BALLOON_R);
        ctx.quadraticCurveTo(bx + 3, by + BALLOON_R + 15, bx, by + BALLOON_R + 25);
        ctx.strokeStyle = COL.string; ctx.lineWidth = 1.5; ctx.stroke();

        // Balloon body
        ctx.beginPath(); ctx.ellipse(bx, by, BALLOON_R, BALLOON_R * 1.2, 0, 0, Math.PI * 2);
        ctx.fillStyle = COL.balloon; ctx.fill();
        ctx.strokeStyle = COL.balloonDark; ctx.lineWidth = 1.5; ctx.stroke();

        // Highlight
        ctx.beginPath(); ctx.ellipse(bx - 6, by - 8, 5, 7, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill();

        // Knot
        ctx.beginPath(); ctx.moveTo(bx - 3, by + BALLOON_R); ctx.lineTo(bx + 3, by + BALLOON_R);
        ctx.lineTo(bx, by + BALLOON_R + 5); ctx.closePath();
        ctx.fillStyle = COL.balloonDark; ctx.fill();
      }

      function lerpColor(c1, c2, t) {
        const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
        const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
        const r = Math.round(lerp(r1, r2, t)), g = Math.round(lerp(g1, g2, t)), b = Math.round(lerp(b1, b2, t));
        return `rgb(${r},${g},${b})`;
      }

      function drawHUD() {
        const progress = clamp(altitude / GOAL_HEIGHT, 0, 1);
        ctx.fillStyle = COL.text; ctx.font = "bold 16px Trebuchet MS,sans-serif";
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`\uD83C\uDF88 ${Math.round(progress * 100)}%`, 20, 16);

        // Altitude bar (right side vertical)
        const barH = H - 80, barX = W - 20, barY = 40;
        ctx.fillStyle = "rgba(90,64,96,0.15)";
        ctx.fillRect(barX - 3, barY, 6, barH);
        ctx.fillStyle = COL.accent;
        ctx.fillRect(barX - 3, barY + barH * (1 - progress), 6, barH * progress);

        // Goal marker
        ctx.fillStyle = COL.text; ctx.font = "12px Trebuchet MS,sans-serif";
        ctx.textAlign = "right"; ctx.fillText("\u2605", barX - 8, barY - 2);
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
      }
      function drawCard(title, lines, accent) {
        const cW = Math.min(340, W - 40), lH = 24, cH = 44 + lines.length * lH + 36;
        const cX = CX - cW / 2, cY = CY - cH / 2;
        ctx.fillStyle = COL.card; roundRect(ctx, cX, cY, cW, cH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cX + 16, cY, cW - 32, 3);
        ctx.fillStyle = COL.text; ctx.font = "bold 22px Trebuchet MS,sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cY + 16);
        ctx.font = "14px Trebuchet MS,sans-serif"; ctx.fillStyle = "rgba(90,64,96,0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cY + 48 + i * lH);
        ctx.fillStyle = "rgba(90,64,96,0.35)"; ctx.font = "13px Trebuchet MS,sans-serif";
        ctx.fillText("TAP or ENTER", CX, cY + cH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(255,252,250,0.4)"; ctx.fillRect(0, 0, W, H);
        drawCard("풍선 여행", ["풍선을 타고 하늘 끝까지", "올라가세요!", "", "조작: 화면 터치로 풍선을 좌우로 이동", "클리어: 하늘 끝까지 도달", "실패: 장애물에 부딪히면"], COL.accent);
      }
      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(255,252,250,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 하늘 끝 도달`, `\uD83C\uDF88 여행 완료!`], COL.accent);
      }
      function drawFailed() {
        ctx.fillStyle = "rgba(80,30,40,0.25)"; ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["장애물에 부딪혔습니다", `\uD83C\uDF88 ${Math.round(altitude / GOAL_HEIGHT * 100)}% 도달`], COL.damage);
      }

      function handleStart() { if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; } }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const rect = canvas.getBoundingClientRect();
        balloon.tx = (e.clientX - rect.left) * (W / rect.width);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running") return;
        const rect = canvas.getBoundingClientRect();
        balloon.tx = (e.clientX - rect.left) * (W / rect.width);
      });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
        if (e.key === "ArrowLeft") balloon.tx = clamp(balloon.tx - 40, 30, W - 30);
        if (e.key === "ArrowRight") balloon.tx = clamp(balloon.tx + 40, 30, W - 30);
      });

      function gameLoop(ts) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = ts; return; }
        let dt = Math.min((ts - lastTimestamp) / 1000, MAX_DT); lastTimestamp = ts;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), altitude: Math.round(altitude), progress: Math.round(altitude / GOAL_HEIGHT * 100), result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const s = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < s; i++) update(FIXED_DT); draw(); return renderGameToText(); };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; altitude = GOAL_HEIGHT; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; mode = "failed"; shake = 10; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      initBgStars(); reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
