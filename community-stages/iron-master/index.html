<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>다림질 달인</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #f8f0f4; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(160, 100, 140, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(100, 60, 80, 0.92);
        color: #faf4f8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px; overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%; max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f8f0f4; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(160, 100, 140, 0.5); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">다림질 달인. 주름진 옷 위를 드래그로 다리미질하여 주름을 펴세요. 모바일에서는 화면을 터치하고 드래그하여 다리미를 움직입니다. PC에서는 마우스 드래그로 조작합니다. 너무 오래 한곳에 머물면 옷이 타요! 옷 5벌을 다리면 클리어. 옷 3벌을 태우면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="다림질 달인" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60, MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "iron-master", title: "다림질 달인",
        description: "주름진 옷 위를 드래그로 다리미질하여 주름을 펴세요.",
        creator: "jungcollin", genre: "Drag smoothing",
        clearCondition: "옷 5벌을 다리면 클리어",
        failCondition: "옷 3벌을 태우면 실패",
        controls: "터치 드래그로 다리미를 움직이세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#f8f0f4", board: "#e8dce4", boardEdge: "#c8b0c0",
        cloth: "#e0d0e8", clothLight: "#f0e8f4", wrinkle: "rgba(140,100,130,0.4)",
        iron: "#c0c8d0", ironFace: "#a0a8b0", ironHandle: "#707880",
        steam: "rgba(200,200,210,0.4)", burn: "#8a5030",
        text: "#5a3050", accent: "#a07090", fail: "#b04040",
      };

      const CLOTHES_TO_WIN = 5, MAX_BURNS = 3;
      const CLOTH_X = CX - 160, CLOTH_Y = 100, CLOTH_W = 320, CLOTH_H = 300;
      const GRID_COLS = 10, GRID_ROWS = 10;
      const CELL_W = CLOTH_W / GRID_COLS, CELL_H = CLOTH_H / GRID_ROWS;
      const SMOOTH_THRESHOLD = 0.8;

      let mode = "menu", elapsed = 0, completed = 0, burned = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, flashAlpha = 0, clearAnim = 0;

      let ironX = CX, ironY = CY, ironTargetX = CX, ironTargetY = CY;
      let ironing = false;
      let grid = []; // wrinkle grid
      let heatGrid = []; // heat accumulation
      let clothBurned = false;
      let particles = [];
      let resultMsg = "", resultTimer = 0;
      let clothColors = [
        { main: "#e0d0e8", light: "#f0e8f4", wrinkle: "rgba(140,100,130,0.4)" },
        { main: "#d0e0d8", light: "#e8f4e8", wrinkle: "rgba(100,130,110,0.4)" },
        { main: "#e0d8c8", light: "#f4f0e4", wrinkle: "rgba(130,120,100,0.4)" },
        { main: "#d0d8e8", light: "#e4ecf4", wrinkle: "rgba(100,110,140,0.4)" },
        { main: "#e8d0d0", light: "#f4e4e4", wrinkle: "rgba(140,100,100,0.4)" },
      ];
      let currentClothIdx = 0;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function initCloth() {
        grid = []; heatGrid = []; clothBurned = false;
        for (let r = 0; r < GRID_ROWS; r++) {
          grid[r] = []; heatGrid[r] = [];
          for (let c = 0; c < GRID_COLS; c++) {
            grid[r][c] = Math.random() < 0.55 ? rand(0.4, 1) : 0;
            heatGrid[r][c] = 0;
          }
        }
      }

      function getSmoothness() {
        let total = 0, smooth = 0;
        for (let r = 0; r < GRID_ROWS; r++)
          for (let c = 0; c < GRID_COLS; c++) {
            total++;
            smooth += 1 - Math.min(1, grid[r][c]);
          }
        return total > 0 ? smooth / total : 1;
      }

      function spawnSteam(x, y) {
        if (reducedMotion && particles.length > 10) return;
        particles.push({ x: x + rand(-8, 8), y, vx: rand(-10, 10), vy: rand(-40, -20), life: 1, size: rand(4, 8), type: "steam" });
      }

      function spawnBurnParticle(x, y) {
        particles.push({ x, y, vx: rand(-20, 20), vy: rand(-30, -10), life: 1, size: rand(3, 6), type: "burn" });
      }

      function reset() {
        elapsed = 0; completed = 0; burned = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        particles = []; resultMsg = ""; resultTimer = 0;
        currentClothIdx = 0; initCloth();
        ironX = CX; ironY = CY; ironTargetX = CX; ironTargetY = CY;
      }

      function startNewCloth() {
        currentClothIdx = (currentClothIdx + 1) % clothColors.length;
        initCloth();
        resultMsg = ""; resultTimer = 0;
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        if (resultTimer > 0) {
          resultTimer -= dt;
          if (resultTimer <= 0) {
            resultMsg = "";
            if (completed >= CLOTHES_TO_WIN) {
              mode = "clear"; clearAnim = 0;
              window.relayStageResult.status = "cleared"; reportCleared(); return;
            }
            if (burned >= MAX_BURNS) {
              mode = "failed"; window.relayStageResult.status = "failed";
              reportFailed("태움 초과"); return;
            }
            startNewCloth();
          }
          updateParticles(dt); return;
        }

        // Iron movement
        ironX = lerp(ironX, ironTargetX, clamp(12 * dt, 0, 1));
        ironY = lerp(ironY, ironTargetY, clamp(12 * dt, 0, 1));

        // Iron effect on cloth
        if (ironing) {
          const gc = (ironX - CLOTH_X) / CELL_W;
          const gr = (ironY - CLOTH_Y) / CELL_H;

          for (let r = 0; r < GRID_ROWS; r++)
            for (let c = 0; c < GRID_COLS; c++) {
              const dx = c + 0.5 - gc, dy = r + 0.5 - gr;
              const dd = Math.sqrt(dx * dx + dy * dy);
              if (dd < 2.0) {
                const force = (1 - dd / 2.0) * dt * 1.5;
                grid[r][c] = Math.max(0, grid[r][c] - force);
                heatGrid[r][c] += force * 2;

                // Steam
                if (grid[r][c] > 0.1 && Math.random() < 0.15) {
                  const px = CLOTH_X + (c + 0.5) * CELL_W;
                  const py = CLOTH_Y + (r + 0.5) * CELL_H;
                  spawnSteam(px, py);
                }
              }
            }

          // Check burn
          for (let r = 0; r < GRID_ROWS; r++)
            for (let c = 0; c < GRID_COLS; c++)
              if (heatGrid[r][c] > 3.5 && !clothBurned) {
                clothBurned = true; burned++;
                resultMsg = "태움!"; resultTimer = 1.5;
                shake = 8; flashAlpha = 0.3;
                for (let i = 0; i < 10; i++) {
                  spawnBurnParticle(CLOTH_X + (c + 0.5) * CELL_W, CLOTH_Y + (r + 0.5) * CELL_H);
                }
              }
        }

        // Cool heat slowly
        for (let r = 0; r < GRID_ROWS; r++)
          for (let c = 0; c < GRID_COLS; c++)
            heatGrid[r][c] = Math.max(0, heatGrid[r][c] - dt * 0.3);

        // Check completion
        if (!clothBurned && getSmoothness() >= SMOOTH_THRESHOLD) {
          completed++;
          resultMsg = "완료!"; resultTimer = 1.2;
          for (let i = 0; i < 8; i++) spawnSteam(CX + rand(-50, 50), CY);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;
        updateParticles(dt);
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);

        // Ironing board
        ctx.fillStyle = COL.board;
        ctx.fillRect(CLOTH_X - 30, CLOTH_Y - 20, CLOTH_W + 60, CLOTH_H + 50);
        ctx.strokeStyle = COL.boardEdge; ctx.lineWidth = 2;
        ctx.strokeRect(CLOTH_X - 30, CLOTH_Y - 20, CLOTH_W + 60, CLOTH_H + 50);

        if (mode === "running") {
          drawCloth();
          drawIron();
          drawParticles();
          drawHUD();
          if (resultMsg) drawResultLabel();
        }

        if (flashAlpha > 0.01) { ctx.fillStyle = `rgba(176,64,64,${flashAlpha})`; ctx.fillRect(0, 0, W, H); }
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawCloth() {
        const cc = clothColors[currentClothIdx];
        // Cloth base
        ctx.fillStyle = cc.light;
        ctx.fillRect(CLOTH_X, CLOTH_Y, CLOTH_W, CLOTH_H);

        // Wrinkles
        for (let r = 0; r < GRID_ROWS; r++)
          for (let c = 0; c < GRID_COLS; c++) {
            const w = grid[r][c];
            if (w > 0.05) {
              const cx = CLOTH_X + c * CELL_W, cy = CLOTH_Y + r * CELL_H;
              ctx.fillStyle = cc.wrinkle;
              ctx.globalAlpha = w * 0.6;
              // Wrinkle line pattern
              ctx.fillRect(cx + 2, cy + CELL_H * 0.3, CELL_W - 4, 2);
              ctx.fillRect(cx + 4, cy + CELL_H * 0.6, CELL_W - 8, 1.5);
              ctx.globalAlpha = 1;
            }
            // Heat indicator
            const h = heatGrid[r][c];
            if (h > 1.5) {
              const cx = CLOTH_X + c * CELL_W, cy = CLOTH_Y + r * CELL_H;
              ctx.fillStyle = `rgba(138,80,48,${(h - 1.5) * 0.2})`;
              ctx.fillRect(cx, cy, CELL_W, CELL_H);
            }
          }

        // Cloth border
        ctx.strokeStyle = cc.wrinkle; ctx.lineWidth = 1;
        ctx.strokeRect(CLOTH_X, CLOTH_Y, CLOTH_W, CLOTH_H);

        // Smoothness progress
        const sm = getSmoothness();
        const barW = CLOTH_W, barX = CLOTH_X, barY = CLOTH_Y + CLOTH_H + 12;
        ctx.fillStyle = "rgba(160,100,140,0.15)";
        ctx.fillRect(barX, barY, barW, 6);
        ctx.fillStyle = sm >= SMOOTH_THRESHOLD ? "rgba(80,160,80,0.6)" : COL.accent;
        ctx.fillRect(barX, barY, barW * sm, 6);
      }

      function drawIron() {
        // Iron shadow
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.fillRect(ironX - 18, ironY + 8, 36, 12);

        // Iron body
        ctx.beginPath();
        ctx.moveTo(ironX - 20, ironY + 10);
        ctx.lineTo(ironX + 20, ironY + 10);
        ctx.lineTo(ironX + 15, ironY - 5);
        ctx.lineTo(ironX, ironY - 15);
        ctx.lineTo(ironX - 15, ironY - 5);
        ctx.closePath();
        ctx.fillStyle = COL.iron; ctx.fill();
        ctx.strokeStyle = COL.ironHandle; ctx.lineWidth = 1.5; ctx.stroke();

        // Iron plate (bottom)
        ctx.fillStyle = COL.ironFace;
        ctx.fillRect(ironX - 18, ironY + 4, 36, 6);

        // Handle
        ctx.fillStyle = COL.ironHandle;
        ctx.fillRect(ironX - 8, ironY - 22, 16, 10);
        ctx.beginPath();
        ctx.arc(ironX, ironY - 22, 8, Math.PI, 0);
        ctx.fill();

        // Heat indicator on iron
        if (ironing) {
          ctx.fillStyle = "rgba(240,120,48,0.3)";
          ctx.fillRect(ironX - 16, ironY + 5, 32, 4);
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.globalAlpha = p.life;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.type === "steam" ? COL.steam : COL.burn;
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = '500 15px "Trebuchet MS",sans-serif';
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`완료: ${completed} / ${CLOTHES_TO_WIN}`, 24, 20);
        ctx.textAlign = "right";
        let ft = ""; for (let i = 0; i < MAX_BURNS; i++) ft += i < burned ? "✕ " : "○ ";
        ctx.fillText(ft.trim(), W - 24, 20);
      }

      function drawResultLabel() {
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = 'bold 28px "Trebuchet MS",sans-serif';
        if (resultMsg === "완료!") {
          ctx.fillStyle = "rgba(60,140,60,0.85)"; ctx.fillText("깔끔!", CX, CLOTH_Y - 40);
        } else {
          ctx.fillStyle = "rgba(176,64,64,0.85)"; ctx.fillText("태움!", CX, CLOTH_Y - 40);
        }
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y);
        c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r);
        c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h);
        c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cW = Math.min(320, W - 40), lH = 26;
        const cH = 42 + lines.length * lH + 40;
        const cX = CX - cW / 2, cY = CY - cH / 2;
        ctx.fillStyle = "rgba(248,240,244,0.95)"; roundRect(ctx, cX, cY, cW, cH, 8); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cX + 12, cY, cW - 24, 3);
        ctx.fillStyle = COL.text; ctx.font = 'bold 22px "Trebuchet MS",sans-serif';
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cY + 16);
        ctx.font = '400 14px "Trebuchet MS",sans-serif'; ctx.fillStyle = "rgba(90,48,80,0.7)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cY + 48 + i * lH);
        ctx.fillStyle = "rgba(90,48,80,0.35)"; ctx.font = '400 13px "Trebuchet MS",sans-serif';
        ctx.fillText("TAP or ENTER", CX, cY + cH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(248,240,244,0.5)"; ctx.fillRect(0, 0, W, H);
        drawCard("다림질 달인", [
          "주름진 옷 위를 드래그로",
          "다리미질하여 주름을 펴세요",
          "", "조작: 터치 드래그로 다리미 이동",
          "클리어: 옷 5벌 다림질", "실패: 옷 3벌 태움",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(248,240,244,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("빳빳하게 완성!", [`${Math.ceil(elapsed)}초 만에 완료`, `완료: ${completed}벌`], COL.accent);
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(80,40,40,0.3)"; ctx.fillRect(0, 0, W, H);
        drawCard("옷이 탔어요!", ["다리미를 너무 오래 누르면 안 돼요", `완료: ${completed} / ${CLOTHES_TO_WIN}`], COL.fail);
      }

      function getCanvasPos(cx, cy) {
        const r = canvas.getBoundingClientRect();
        return { x: (cx - r.left) * (W / r.width), y: (cy - r.top) * (H / r.height) };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        if (resultTimer > 0) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        ironing = true;
        ironTargetX = p.x; ironTargetY = p.y;
      });
      canvas.addEventListener("pointermove", (e) => {
        if (!ironing) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        ironTargetX = p.x; ironTargetY = p.y;
      });
      canvas.addEventListener("pointerup", () => { ironing = false; });
      canvas.addEventListener("pointercancel", () => { ironing = false; });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      function gameLoop(ts) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = ts; return; }
        let dt = Math.min((ts - lastTimestamp) / 1000, MAX_DT); lastTimestamp = ts;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), completed, burned, smoothness: +getSmoothness().toFixed(2), result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const s = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < s; i++) update(FIXED_DT); draw(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; completed = CLOTHES_TO_WIN; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; burned = MAX_BURNS; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      initCloth(); reportReady(); animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
