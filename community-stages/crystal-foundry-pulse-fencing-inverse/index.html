<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Pulse Fence</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop stop-color='%236ee7ff'/%3E%3Cstop offset='1' stop-color='%23ff6f91'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill='url(%23g)' d='M32 4 51 18 44 47 20 60 7 30 20 10Z'/%3E%3Cpath fill='%23050816' d='M32 14 41 22 37 38 25 47 18 28 25 16Z'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #050816;
        --bg-1: #0d1330;
        --bg-2: #13234d;
        --panel: rgba(10, 16, 36, 0.72);
        --line: rgba(143, 208, 255, 0.26);
        --text: #eef8ff;
        --subtle: #a9c9e9;
        --amber: #ffb14a;
        --rose: #ff6f91;
        --cyan: #6ee7ff;
        --teal: #65f0c4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% 18%, rgba(93, 170, 255, 0.18), transparent 38%),
          radial-gradient(circle at 22% 88%, rgba(54, 255, 199, 0.12), transparent 26%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1) 46%, #09101f 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(110, 231, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(5, 10, 22, 0.96);
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(238, 248, 255, 0.94);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        inset: auto 0 0;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 14px calc(14px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        width: min(100%, 360px);
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        pointer-events: auto;
      }

      .mobile-btn {
        appearance: none;
        min-height: 58px;
        border: 1px solid rgba(143, 208, 255, 0.28);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(23, 37, 72, 0.96), rgba(7, 12, 27, 0.96));
        color: var(--text);
        font: 800 20px/1 "Avenir Next", "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        box-shadow:
          0 18px 30px rgba(4, 7, 17, 0.38),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        background:
          linear-gradient(180deg, rgba(46, 83, 148, 0.98), rgba(15, 29, 60, 0.96));
        border-color: rgba(110, 231, 255, 0.62);
        box-shadow:
          0 0 22px rgba(110, 231, 255, 0.24),
          0 18px 30px rgba(4, 7, 17, 0.38);
      }

      .mobile-btn--boost {
        background:
          linear-gradient(180deg, rgba(110, 37, 69, 0.98), rgba(25, 10, 22, 0.98));
        border-color: rgba(255, 111, 145, 0.42);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          width: min(100%, 332px);
          gap: 8px;
        }

        .mobile-btn {
          min-height: 54px;
          border-radius: 16px;
          font-size: 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Pulse Fence. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 포인터 또는 터치 드래그로 방패 각도 조절, 탭으로 순간 증폭, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Crystal Foundry: Pulse Fence"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" id="mobile-controls">
      <div class="mobile-controls__row">
        <button class="mobile-btn" id="rotate-left" aria-label="방패 왼쪽 회전">LEFT</button>
        <button class="mobile-btn mobile-btn--boost" id="boost-btn" aria-label="순간 증폭">BOOST</button>
        <button class="mobile-btn" id="rotate-right" aria-label="방패 오른쪽 회전">RIGHT</button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.54 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const CORE_RADIUS = 40;
      const SHIELD_RADIUS = 134;
      const OUTER_RING = 356;
      const TARGET_CHAIN = 20;
      const TOTAL_WINDOWS = 3;
      const relayContext = window.RelayRuntime?.readContext("crystal-foundry-pulse-fencing-inverse") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const META = {
        id: "crystal-foundry-pulse-fencing-inverse",
        title: "Crystal Foundry: Pulse Fence",
        description: "회전 방패로 수정 파형을 반사하고, 역전 신호에는 반대 입력으로 버티는 반응 액션.",
        creator: "jungcollin",
        genre: "Reactive shield action / 역전 버스트",
        controls:
          "포인터 또는 터치 드래그로 방패 각도 조절, 탭으로 순간 증폭, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition: "역전 구간을 모두 견디고 20연속 파형을 반사하면 클리어",
        failCondition: "역전 버스트에 연속으로 휘말리거나 코어에 같은 문양이 3번 누적되면 실패",
      };

      const NUMBER_DECIMAL = new Intl.NumberFormat("ko-KR", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1,
      });
      const NUMBER_INTEGER = new Intl.NumberFormat("ko-KR");

      const SIGILS = [
        { id: "spire", name: "첨정", icon: "△", color: "#ffb24c", trail: "rgba(255, 178, 76, 0.28)" },
        { id: "facet", name: "절편", icon: "◇", color: "#6ee7ff", trail: "rgba(110, 231, 255, 0.28)" },
        { id: "rune", name: "룬편", icon: "✦", color: "#ff6f91", trail: "rgba(255, 111, 145, 0.28)" },
      ];

      const BURST_WINDOWS = [
        { start: 4.3, duration: 2.9, pulses: [0.55, 1.7] },
        { start: 10.2, duration: 3.05, pulses: [0.5, 1.45] },
        { start: 15.7, duration: 3.2, pulses: [0.45, 1.4, 2.2] },
      ];

      const backdropCrystals = Array.from({ length: 18 }, (_, index) => {
        const ratio = index / 18;
        return {
          angle: ratio * Math.PI * 2,
          radius: 248 + (index % 3) * 44,
          width: 22 + (index % 4) * 7,
          height: 54 + (index % 5) * 10,
          spin: (index % 2 === 0 ? 1 : -1) * (0.06 + (index % 5) * 0.015),
          alpha: 0.18 + (index % 4) * 0.04,
          hue:
            index % 3 === 0
              ? "rgba(110, 231, 255, 0.48)"
              : index % 3 === 1
                ? "rgba(255, 111, 145, 0.44)"
                : "rgba(255, 178, 76, 0.42)",
        };
      });

      const emberField = Array.from({ length: 54 }, (_, index) => ({
        x: Math.random() * VIEW.width,
        y: Math.random() * VIEW.height,
        size: 1.2 + Math.random() * 2.8,
        driftX: (Math.random() - 0.5) * 6,
        driftY: -6 - Math.random() * 18,
        alpha: 0.16 + Math.random() * 0.34,
        phase: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 0.8,
      }));

      const input = {
        left: false,
        right: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let dragSession = null;
      let burstWindows = [];
      let pulses = [];
      let particles = [];
      let popups = [];
      let shockRings = [];
      let lastFailureReason = META.failCondition;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        sceneTime: 0,
        note: META.description,
        shieldAngle: -Math.PI / 2,
        shieldTargetAngle: -Math.PI / 2,
        inverseActive: false,
        activeWindowIndex: -1,
        streak: 0,
        bestStreak: 0,
        reflectedTotal: 0,
        windowsCleared: 0,
        burstCatchChain: 0,
        coreMarks: { spire: 0, facet: 0, rune: 0 },
        boostTimer: 0,
        boostCooldown: 0,
        spawnTimer: 0.75,
        screenShake: 0,
        flash: 0,
        message: { text: "", timer: 0, color: "#eef8ff" },
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function wrapAngle(angle) {
        let value = angle;
        while (value <= -Math.PI) value += Math.PI * 2;
        while (value > Math.PI) value -= Math.PI * 2;
        return value;
      }

      function angleDelta(from, to) {
        return wrapAngle(to - from);
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function formatSeconds(value) {
        return NUMBER_DECIMAL.format(Math.max(0, value));
      }

      function formatCount(value) {
        return NUMBER_INTEGER.format(Math.max(0, value));
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function showMessage(text, color = "#eef8ff") {
        state.message.text = text;
        state.message.timer = 1.18;
        state.message.color = color;
      }

      function createShockRing(color, size = SHIELD_RADIUS) {
        shockRings.push({
          radius: size,
          alpha: 0.42,
          life: 0.52,
          color,
        });
      }

      function spawnParticles(x, y, color, count, speedScale = 1) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.35;
          const speed = (44 + Math.random() * 120) * speedScale;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.3 + Math.random() * 0.36,
            radius: 1.8 + Math.random() * 3.5,
            color,
          });
        }
      }

      function spawnPopup(text, x, y, color) {
        popups.push({
          text,
          x,
          y,
          vy: -30 - Math.random() * 10,
          life: 0.7,
          color,
        });
      }

      function computeProgress() {
        const timeRatio = clamp(state.elapsed / 22, 0, 1);
        const chainRatio = clamp(state.streak / TARGET_CHAIN, 0, 1);
        return clamp(Math.max(timeRatio, chainRatio * 0.92), 0, 1);
      }

      function getShieldArc() {
        return state.boostTimer > 0 ? 0.72 : 0.48;
      }

      function getTurnSpeed() {
        return state.boostTimer > 0 ? 2.9 : 2.45;
      }

      function currentActiveWindowIndex() {
        for (let index = 0; index < burstWindows.length; index += 1) {
          const windowDef = burstWindows[index];
          if (state.elapsed >= windowDef.start && state.elapsed <= windowDef.start + windowDef.duration) {
            return index;
          }
        }
        return -1;
      }

      function resetWindows() {
        burstWindows = BURST_WINDOWS.map((windowDef) => ({
          ...windowDef,
          started: false,
          finished: false,
          spawned: windowDef.pulses.map(() => false),
        }));
      }

      function resetGameState() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.shieldAngle = -Math.PI / 2;
        state.shieldTargetAngle = -Math.PI / 2;
        state.inverseActive = false;
        state.activeWindowIndex = -1;
        state.streak = 0;
        state.bestStreak = 0;
        state.reflectedTotal = 0;
        state.windowsCleared = 0;
        state.burstCatchChain = 0;
        state.coreMarks = { spire: 0, facet: 0, rune: 0 };
        state.boostTimer = 0;
        state.boostCooldown = 0;
        state.spawnTimer = 0.7;
        state.screenShake = 0;
        state.flash = 0;
        state.message = { text: "", timer: 0, color: "#eef8ff" };
        lastFailureReason = META.failCondition;
        pulses = [];
        particles = [];
        popups = [];
        shockRings = [];
        resetWindows();
      }

      function startStage() {
        resetGameState();
        state.mode = "running";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        showMessage("펄스 주조 개시", "#6ee7ff");
      }

      function failStage(reason = "failed", label = META.failCondition) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        state.flash = Math.max(state.flash, 0.52);
        state.screenShake = Math.max(state.screenShake, 0.62);
        lastFailureReason = label;
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        state.flash = Math.max(state.flash, 0.56);
        createShockRing("rgba(101, 240, 196, 0.62)", SHIELD_RADIUS - 18);
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function getCanvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      function activateBoost() {
        if (state.mode !== "running" || state.boostCooldown > 0.08) {
          return;
        }
        state.boostTimer = 0.34;
        state.boostCooldown = 0.78;
        showMessage("순간 증폭", "#ff8db3");
        createShockRing("rgba(255, 111, 145, 0.42)");
      }

      function bindHoldButton(button, onPress, onRelease) {
        const release = (event) => {
          event?.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function chooseSpawnAngle(isBurst) {
        const baseOffsets = isBurst
          ? [-1.18, -0.94, 0.96, 1.22]
          : [-2.1, -1.42, -0.82, -0.46, 0.5, 0.86, 1.42, 2.15];
        const offset = baseOffsets[Math.floor(Math.random() * baseOffsets.length)] + (Math.random() - 0.5) * 0.18;
        return wrapAngle(state.shieldTargetAngle + offset);
      }

      function spawnPulse(isBurst = false) {
        const progress = computeProgress();
        const sigil = SIGILS[Math.floor(Math.random() * SIGILS.length)];
        pulses.push({
          angle: chooseSpawnAngle(isBurst),
          distance: OUTER_RING + 18 + Math.random() * 26,
          speed:
            lerp(122, 196, progress) *
            (isBurst ? 1.14 : 1) *
            (state.inverseActive ? 1.08 : 1) *
            (0.94 + Math.random() * 0.22),
          size: isBurst ? 16 + Math.random() * 4 : 11 + Math.random() * 4,
          twist: (Math.random() - 0.5) * 1.3,
          sigil,
          burst: isBurst,
          shieldChecked: false,
          pulseTrail: 24 + Math.random() * 8,
        });
      }

      function handleBurstCaught(reason) {
        state.burstCatchChain += 1;
        state.flash = Math.max(state.flash, 0.82);
        state.screenShake = Math.max(state.screenShake, 0.78);
        createShockRing("rgba(255, 111, 145, 0.58)");
        showMessage(
          state.burstCatchChain >= 2 ? "역전 버스트 붕괴" : "역전 버스트 피격",
          "#ff6f91",
        );
        if (state.burstCatchChain >= 2) {
          failStage(reason, "역전 버스트에 연속으로 휘말렸습니다.");
        }
      }

      function reflectPulse(pulse) {
        const x = CENTER.x + Math.cos(pulse.angle) * pulse.distance;
        const y = CENTER.y + Math.sin(pulse.angle) * pulse.distance;
        spawnParticles(x, y, pulse.sigil.color, pulse.burst ? 22 : 14, pulse.burst ? 1.3 : 1);
        spawnPopup(
          pulse.burst ? "BURST PARRY" : pulse.sigil.icon + " REFLECT",
          x,
          y - 18,
          pulse.burst ? "#ff9cb8" : pulse.sigil.color,
        );
        createShockRing(pulse.burst ? "rgba(255, 111, 145, 0.48)" : pulse.sigil.trail);
        state.flash = Math.max(state.flash, pulse.burst ? 0.3 : 0.16);
        state.screenShake = Math.max(state.screenShake, pulse.burst ? 0.22 : 0.12);
        state.streak += 1;
        state.bestStreak = Math.max(state.bestStreak, state.streak);
        state.reflectedTotal += 1;
        if (pulse.burst) {
          state.burstCatchChain = 0;
          showMessage("역전 상쇄 성공", "#ffb4c7");
        }
      }

      function hitCore(pulse) {
        const x = CENTER.x + Math.cos(pulse.angle) * (CORE_RADIUS + 10);
        const y = CENTER.y + Math.sin(pulse.angle) * (CORE_RADIUS + 10);
        state.coreMarks[pulse.sigil.id] += 1;
        state.streak = 0;
        spawnParticles(x, y, pulse.sigil.color, 18, 1.05);
        spawnPopup("CORE " + pulse.sigil.icon, x, y - 16, pulse.sigil.color);
        state.screenShake = Math.max(state.screenShake, 0.44);
        state.flash = Math.max(state.flash, 0.28);
        showMessage(pulse.sigil.icon + " 문양 누적", pulse.sigil.color);
        if (pulse.burst) {
          handleBurstCaught("inverse_burst_core");
        }
        if (state.coreMarks[pulse.sigil.id] >= 3) {
          failStage("sigil_tripled", "코어에 같은 문양이 3번 누적되었습니다.");
        }
      }

      function processPulseInteraction(pulse) {
        const shieldArc = getShieldArc();
        const shieldTolerance = shieldArc + pulse.size * 0.008;
        const distanceToShield = pulse.distance - SHIELD_RADIUS;
        if (!pulse.shieldChecked && distanceToShield <= 14) {
          pulse.shieldChecked = true;
          const alignment = Math.abs(angleDelta(state.shieldAngle, pulse.angle));
          const boostReady = state.boostTimer > 0.03;
          if (alignment <= shieldTolerance && (!pulse.burst || boostReady)) {
            reflectPulse(pulse);
            return "remove";
          }
          if (pulse.burst && alignment <= shieldTolerance && !boostReady) {
            handleBurstCaught("inverse_burst_unboosted");
            return "remove";
          }
        }
        if (pulse.distance <= CORE_RADIUS + 10) {
          hitCore(pulse);
          return "remove";
        }
        return "keep";
      }

      function updateBurstWindows() {
        state.activeWindowIndex = currentActiveWindowIndex();
        state.inverseActive = state.activeWindowIndex !== -1;

        for (let index = 0; index < burstWindows.length; index += 1) {
          const windowDef = burstWindows[index];
          if (!windowDef.started && state.elapsed >= windowDef.start) {
            windowDef.started = true;
            showMessage("역전 신호 점등", "#ff95b5");
            state.flash = Math.max(state.flash, 0.26);
            createShockRing("rgba(255, 111, 145, 0.42)", SHIELD_RADIUS + 12);
          }

          if (!windowDef.finished && state.elapsed >= windowDef.start + windowDef.duration) {
            windowDef.finished = true;
            state.windowsCleared = burstWindows.filter((entry) => entry.finished).length;
            showMessage("입력 정상화", "#6ee7ff");
          }

          for (let pulseIndex = 0; pulseIndex < windowDef.pulses.length; pulseIndex += 1) {
            if (!windowDef.spawned[pulseIndex] && state.elapsed >= windowDef.start + windowDef.pulses[pulseIndex]) {
              windowDef.spawned[pulseIndex] = true;
              spawnPulse(true);
            }
          }
        }
      }

      function updateGameplay(dt) {
        state.elapsed += dt;
        state.lastRunTime = state.elapsed;
        updateBurstWindows();

        const controlSign = state.inverseActive ? -1 : 1;
        const turnIntent = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        if (turnIntent !== 0) {
          state.shieldTargetAngle = wrapAngle(
            state.shieldTargetAngle + turnIntent * getTurnSpeed() * controlSign * dt,
          );
        }
        state.shieldAngle = wrapAngle(
          state.shieldAngle + angleDelta(state.shieldAngle, state.shieldTargetAngle) * Math.min(1, 8.8 * dt),
        );

        if (state.boostTimer > 0) {
          state.boostTimer = Math.max(0, state.boostTimer - dt);
        }
        if (state.boostCooldown > 0) {
          state.boostCooldown = Math.max(0, state.boostCooldown - dt);
        }

        const progress = computeProgress();
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          spawnPulse(false);
          if (state.inverseActive && Math.random() < 0.32) {
            spawnPulse(false);
          }
          state.spawnTimer =
            lerp(0.86, 0.42, progress) * (state.inverseActive ? 0.76 : 1) * (0.94 + Math.random() * 0.18);
        }

        const nextPulses = [];
        for (let index = 0; index < pulses.length; index += 1) {
          const pulse = pulses[index];
          pulse.distance -= pulse.speed * dt;
          pulse.angle = wrapAngle(pulse.angle + pulse.twist * dt * (pulse.burst ? 0.24 : 0.12));
          const action = processPulseInteraction(pulse);
          if (action === "keep") {
            nextPulses.push(pulse);
          }
        }
        pulses = nextPulses;

        if (
          state.windowsCleared >= TOTAL_WINDOWS &&
          state.streak >= TARGET_CHAIN &&
          state.mode === "running"
        ) {
          clearStage();
        }
      }

      function updateParticles(dt) {
        for (let index = particles.length - 1; index >= 0; index -= 1) {
          const particle = particles[index];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          if (particle.life <= 0) {
            particles.splice(index, 1);
          }
        }

        for (let index = popups.length - 1; index >= 0; index -= 1) {
          const popup = popups[index];
          popup.life -= dt;
          popup.y += popup.vy * dt;
          if (popup.life <= 0) {
            popups.splice(index, 1);
          }
        }

        for (let index = shockRings.length - 1; index >= 0; index -= 1) {
          const ring = shockRings[index];
          ring.life -= dt;
          ring.radius += 140 * dt;
          ring.alpha *= 0.92;
          if (ring.life <= 0) {
            shockRings.splice(index, 1);
          }
        }

        for (let index = 0; index < emberField.length; index += 1) {
          const ember = emberField[index];
          ember.phase += dt * ember.speed;
          ember.x += ember.driftX * dt;
          ember.y += ember.driftY * dt;
          if (ember.y < -12) ember.y = VIEW.height + 12;
          if (ember.x < -12) ember.x = VIEW.width + 12;
          if (ember.x > VIEW.width + 12) ember.x = -12;
        }
      }

      function update(dt) {
        state.sceneTime += dt;
        if (state.screenShake > 0) {
          state.screenShake = Math.max(0, state.screenShake - dt * 1.8);
        }
        if (state.flash > 0) {
          state.flash = Math.max(0, state.flash - dt * 1.55);
        }
        if (state.message.timer > 0) {
          state.message.timer = Math.max(0, state.message.timer - dt);
        }

        if (state.mode === "running") {
          updateGameplay(dt);
        }

        updateParticles(dt);
      }

      function drawPanel(x, y, width, height, accent) {
        const gradient = ctx.createLinearGradient(x, y, x + width, y + height);
        gradient.addColorStop(0, "rgba(7, 12, 27, 0.82)");
        gradient.addColorStop(1, "rgba(13, 23, 48, 0.72)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, 26);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.strokeStyle = "rgba(255, 255, 255, 0.06)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x + 10, y + 10, width - 20, height - 20, 20);
        ctx.stroke();
      }

        const bg = ctx.createRadialGradient(CENTER.x, CENTER.y - 34, 40, CENTER.x, CENTER.y, 470);

        for (let index = 0; index < emberField.length; index += 1) {
          const ember = emberField[index];

          ctx.fillStyle = "rgba(173, 227, 255," + (ember.alpha * flicker).toFixed(3) + ")";
          ctx.beginPath();

          ctx.fill();
        }

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);

        for (let index = 0; index < backdropCrystals.length; index += 1) {
          const crystal = backdropCrystals[index];
          ctx.save();
          ctx.rotate(crystal.angle + state.sceneTime * crystal.spin);
          ctx.translate(crystal.radius, 0);
          ctx.fillStyle = crystal.hue.replace(/0\.\d+\)/, (crystal.alpha + Math.sin(state.sceneTime + index) * 0.04).toFixed(3) + ")");
          ctx.beginPath();
          ctx.moveTo(0, -crystal.height * 0.56);
          ctx.lineTo(crystal.width, -crystal.height * 0.1);
          ctx.lineTo(crystal.width * 0.42, crystal.height * 0.56);
          ctx.lineTo(-crystal.width * 0.38, crystal.height * 0.34);
          ctx.lineTo(-crystal.width * 0.5, -crystal.height * 0.12);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        for (let index = 0; index < 4; index += 1) {
          ctx.strokeStyle = index % 2 === 0 ? "rgba(110, 231, 255, 0.08)" : "rgba(255, 111, 145, 0.06)";
          ctx.lineWidth = 20 - index * 4;
          ctx.beginPath();
          ctx.arc(0, 0, 170 + index * 32, state.sceneTime * (0.1 + index * 0.02), state.sceneTime * (0.1 + index * 0.02) + Math.PI * 1.4);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawFoundryRing() {
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);

        const ringGradient = ctx.createRadialGradient(0, 0, SHIELD_RADIUS - 28, 0, 0, OUTER_RING);
        ringGradient.addColorStop(0, "rgba(110, 231, 255, 0.05)");
        ringGradient.addColorStop(0.5, "rgba(110, 231, 255, 0.02)");
        ringGradient.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = ringGradient;
        ctx.beginPath();
        ctx.arc(0, 0, OUTER_RING, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(143, 208, 255, 0.12)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, OUTER_RING - 16, 0, Math.PI * 2);
        ctx.stroke();

        for (let index = 0; index < 12; index += 1) {
          const angle = (Math.PI * 2 * index) / 12 + state.sceneTime * 0.02;
          ctx.save();
          ctx.rotate(angle);
          ctx.strokeStyle =
            index % 2 === 0 ? "rgba(110, 231, 255, 0.16)" : "rgba(255, 178, 76, 0.14)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(SHIELD_RADIUS + 38, 0);
          ctx.lineTo(OUTER_RING - 28, 0);
          ctx.stroke();
          ctx.restore();
        }

        for (let index = 0; index < shockRings.length; index += 1) {
          const ring = shockRings[index];
          ctx.strokeStyle = ring.color.replace(/0\.\d+\)/, ring.alpha.toFixed(3) + ")");
          ctx.lineWidth = 10;
          ctx.beginPath();
          ctx.arc(0, 0, ring.radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (state.inverseActive) {
          ctx.strokeStyle = "rgba(255, 111, 145, 0.34)";
          ctx.lineWidth = 18;
          ctx.beginPath();
          ctx.arc(0, 0, SHIELD_RADIUS + 22, state.sceneTime * 1.4, state.sceneTime * 1.4 + Math.PI * 1.22);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawSigil(type, x, y, size, alpha = 1, burst = false) {
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = type.color.replace(/0\.\d+\)/, alpha.toFixed(3) + ")");
        ctx.fillStyle = burst ? "rgba(255, 255, 255, 0.9)" : type.color;
        ctx.lineWidth = burst ? 2.4 : 2;
        if (type.id === "spire") {
          ctx.beginPath();
          ctx.moveTo(0, -size);
          ctx.lineTo(size * 0.86, size * 0.7);
          ctx.lineTo(-size * 0.86, size * 0.7);
          ctx.closePath();
          ctx.stroke();
        } else if (type.id === "facet") {
          ctx.beginPath();
          ctx.moveTo(0, -size);
          ctx.lineTo(size * 0.8, 0);
          ctx.lineTo(0, size);
          ctx.lineTo(-size * 0.8, 0);
          ctx.closePath();
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.moveTo(-size * 0.82, 0);
          ctx.lineTo(0, -size);
          ctx.lineTo(size * 0.82, 0);
          ctx.lineTo(0, size);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, -size * 0.92);
          ctx.lineTo(0, size * 0.92);
          ctx.moveTo(-size * 0.92, 0);
          ctx.lineTo(size * 0.92, 0);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPulses() {
        for (let index = 0; index < pulses.length; index += 1) {
          const pulse = pulses[index];
          const x = CENTER.x + Math.cos(pulse.angle) * pulse.distance;
          const y = CENTER.y + Math.sin(pulse.angle) * pulse.distance;
          const tailX = CENTER.x + Math.cos(pulse.angle) * (pulse.distance + pulse.pulseTrail);
          const tailY = CENTER.y + Math.sin(pulse.angle) * (pulse.distance + pulse.pulseTrail);
          const glow = pulse.burst ? 18 : 12;

          ctx.strokeStyle = pulse.burst ? "rgba(255, 111, 145, 0.6)" : pulse.sigil.trail;
          ctx.lineWidth = pulse.burst ? 7 : 5;
          ctx.beginPath();
          ctx.moveTo(tailX, tailY);
          ctx.lineTo(x, y);
          ctx.stroke();

          const radial = ctx.createRadialGradient(x, y, 0, x, y, glow + pulse.size);
          radial.addColorStop(0, pulse.burst ? "rgba(255, 245, 248, 0.92)" : pulse.sigil.color);
          radial.addColorStop(0.48, pulse.burst ? "rgba(255, 111, 145, 0.48)" : pulse.sigil.trail);
          radial.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = radial;
          ctx.beginPath();
          ctx.arc(x, y, glow + pulse.size, 0, Math.PI * 2);
          ctx.fill();

          drawSigil(pulse.sigil, x, y, pulse.size, 1, pulse.burst);
        }
      }

      function drawCore() {
        const flicker = 0.88 + Math.sin(state.sceneTime * 3.4) * 0.06;

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        ctx.rotate(state.sceneTime * 0.46);

        const halo = ctx.createRadialGradient(0, 0, 12, 0, 0, 104);
        halo.addColorStop(0, "rgba(235, 248, 255, 0.72)");
        halo.addColorStop(0.4, "rgba(110, 231, 255, 0.18)");
        halo.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(0, 0, 104, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(110, 231, 255, 0.22)";
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(0, 0, CORE_RADIUS + 18, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "rgba(224, 245, 255, 0.98)";
        ctx.beginPath();
        ctx.moveTo(0, -CORE_RADIUS * 1.24);
        ctx.lineTo(CORE_RADIUS * 0.84, 0);
        ctx.lineTo(0, CORE_RADIUS * 1.24);
        ctx.lineTo(-CORE_RADIUS * 0.84, 0);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(7, 12, 27, 0.28)";
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.restore();

        ctx.fillStyle = "rgba(255, 255, 255, " + flicker.toFixed(3) + ")";
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, 11, 0, Math.PI * 2);
        ctx.fill();

        const sigilOrder = [
          { sigil: SIGILS[0], y: -78 },
          { sigil: SIGILS[1], y: 0 },
          { sigil: SIGILS[2], y: 78 },
        ];
        for (let index = 0; index < sigilOrder.length; index += 1) {
          const entry = sigilOrder[index];
          const count = state.coreMarks[entry.sigil.id];
          const slotX = CENTER.x + 270;
          const slotY = CENTER.y + entry.y;

          ctx.fillStyle = "rgba(8, 12, 26, 0.64)";
          ctx.beginPath();
          ctx.roundRect(slotX - 44, slotY - 25, 88, 50, 18);
          ctx.fill();
          ctx.strokeStyle = "rgba(143, 208, 255, 0.16)";
          ctx.lineWidth = 1;
          ctx.stroke();

          drawSigil(entry.sigil, slotX - 20, slotY, 10, 1, false);
          ctx.fillStyle = count >= 2 ? entry.sigil.color : "rgba(238, 248, 255, 0.92)";
          ctx.font = "700 17px Avenir Next";
          ctx.textAlign = "left";
          ctx.fillText(String(count) + "/3", slotX - 4, slotY + 6);
        }
      }

      function drawShield() {
        const arc = getShieldArc();
        const boostAlpha = state.boostTimer > 0 ? 1 : 0;
        const inverseHue = state.inverseActive ? "rgba(255, 111, 145, 0.44)" : "rgba(110, 231, 255, 0.42)";

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        ctx.rotate(state.shieldAngle);

        ctx.strokeStyle = "rgba(255, 255, 255, 0.07)";
        ctx.lineWidth = 22;
        ctx.beginPath();
        ctx.arc(0, 0, SHIELD_RADIUS, -arc - 0.05, arc + 0.05);
        ctx.stroke();

        const shieldGradient = ctx.createLinearGradient(-SHIELD_RADIUS, 0, SHIELD_RADIUS, 0);
        shieldGradient.addColorStop(0, "#66f0c4");
        shieldGradient.addColorStop(0.5, "#d8f7ff");
        shieldGradient.addColorStop(1, "#ffb14a");
        ctx.strokeStyle = shieldGradient;
        ctx.lineWidth = state.boostTimer > 0 ? 18 : 14;
        ctx.beginPath();
        ctx.arc(0, 0, SHIELD_RADIUS, -arc, arc);
        ctx.stroke();

        ctx.strokeStyle = inverseHue;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, SHIELD_RADIUS + 18, -arc * 0.82, arc * 0.82);
        ctx.stroke();

        const tipRadius = SHIELD_RADIUS + 8;
        for (const sign of [-1, 1]) {
          const tipAngle = arc * sign;
          const tipX = Math.cos(tipAngle) * tipRadius;
          const tipY = Math.sin(tipAngle) * tipRadius;
          ctx.fillStyle = sign === -1 ? "#6ee7ff" : "#ffb14a";
          ctx.beginPath();
          ctx.moveTo(tipX, tipY);
          ctx.lineTo(Math.cos(tipAngle - sign * 0.16) * (tipRadius + 20), Math.sin(tipAngle - sign * 0.16) * (tipRadius + 20));
          ctx.lineTo(Math.cos(tipAngle - sign * 0.32) * (tipRadius + 6), Math.sin(tipAngle - sign * 0.32) * (tipRadius + 6));
          ctx.closePath();
          ctx.fill();
        }

        if (boostAlpha > 0) {
          ctx.strokeStyle = "rgba(255, 111, 145, " + (0.24 + boostAlpha * 0.28).toFixed(3) + ")";
          ctx.lineWidth = 26;
          ctx.beginPath();
          ctx.arc(0, 0, SHIELD_RADIUS, -arc - 0.11, arc + 0.11);
          ctx.stroke();
        }
        ctx.restore();
      }

        ];
        const clearLines = [
          "20연속 반사와 모든 역전 구간 돌파를 완료했습니다.",
          "수정 주조소의 펄스 흐름이 안정화되었습니다.",
          "소요 시간 " + formatSeconds(state.lastRunTime) + "초",
        ];
        const failLines = [
          lastFailureReason,
          "연속 반사 최고 기록 " + formatCount(state.bestStreak) + " / " + formatCount(TARGET_CHAIN),
          "버스트 피격 누적 " + formatCount(state.burstCatchChain) + " / 2",
        ];
        const lines = mode === "menu" ? menuLines : mode === "cleared" ? clearLines : failLines;
        lines.forEach((line, index) => {
          ctx.fillText(line, x + 30, y + 98 + index * 32);
        });

        ctx.fillStyle = "rgba(255, 255, 255, 0.82)";
        ctx.font = "700 14px Avenir Next";
        ctx.fillText(mode === "menu" ? "터치 또는 Enter로 시작" : "터치 또는 Enter로 재시작", x + 30, y + height - 24);

        ctx.textAlign = "center";
        ctx.fillStyle = mode === "failed" ? "#ff8db3" : mode === "cleared" ? "#65f0c4" : "#6ee7ff";
        ctx.font = "800 66px Avenir Next";
        ctx.fillText(
          mode === "menu" ? "◌" : mode === "cleared" ? "20" : String(Math.min(3, Math.max(0, state.coreMarks.spire + state.coreMarks.facet + state.coreMarks.rune))),
          x + width - 84,
          y + 96,
        );
        ctx.font = "700 13px Avenir Next";
        ctx.fillText(mode === "menu" ? "START" : mode === "cleared" ? "CHAIN" : "STACK", x + width - 84, y + 122);
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = (Math.random() - 0.5) * 14 * state.screenShake;
        const shakeY = (Math.random() - 0.5) * 10 * state.screenShake;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackdrop();
        drawFoundryRing();
        drawPulses();
        drawCore();
        drawShield();

        for (let index = 0; index < particles.length; index += 1) {
          const particle = particles[index];
          const alpha = clamp(particle.life / 0.66, 0, 1);
          ctx.fillStyle = particle.color.replace(/0\.\d+\)/, alpha.toFixed(3) + ")");
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.fill();
        }

        for (let index = 0; index < popups.length; index += 1) {
          const popup = popups[index];
          const alpha = clamp(popup.life / 0.7, 0, 1);
          ctx.fillStyle = popup.color.replace(/0\.\d+\)/, alpha.toFixed(3) + ")");
          ctx.font = "800 15px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.textAlign = "left";

        drawHud();
        if (state.mode !== "running") {
          drawOverlay(state.mode);
        }

        if (state.flash > 0) {
          const alpha = clamp(state.flash, 0, 1) * (state.mode === "failed" ? 0.28 : 0.18);
          ctx.fillStyle =
            state.mode === "failed"
              ? "rgba(255, 111, 145, " + alpha.toFixed(3) + ")"
              : "rgba(238, 248, 255, " + alpha.toFixed(3) + ")";
          ctx.fillRect(-32, -32, VIEW.width + 64, VIEW.height + 64);
        }
        ctx.restore();
      }

      function renderGameToText() {
        const closestPulses = [...pulses]
          .sort((a, b) => a.distance - b.distance)
          .slice(0, 4)
          .map((pulse) => ({
            sigil: pulse.sigil.id,
            burst: pulse.burst,
            angle_deg: Math.round((wrapAngle(pulse.angle) * 180) / Math.PI),
            distance: Math.round(pulse.distance),
          }));

        return JSON.stringify({
          coordinate_system: "center at 480,292; angle 0 is right, -90 is up",
          mode: state.mode,
          result: window.relayStageResult.status,
          elapsed: Math.round(state.elapsed * 10) / 10,
          shield_angle_deg: Math.round((wrapAngle(state.shieldAngle) * 180) / Math.PI),
          inverse_active: state.inverseActive,
          boost_ready: state.boostCooldown <= 0.08,
          boost_timer: Math.round(state.boostTimer * 100) / 100,
          streak: state.streak,
          target_chain: TARGET_CHAIN,
          burst_catch_chain: state.burstCatchChain,
          inverse_windows_cleared: state.windowsCleared,
          core_marks: state.coreMarks,
          nearest_pulses: closestPulses,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          event.preventDefault();
          if (state.mode !== "running") startFromTouch();
          input.left = true;
        } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          event.preventDefault();
          if (state.mode !== "running") startFromTouch();
          input.right = true;
        } else if (event.key === " " || event.key === "Spacebar") {
          event.preventDefault();
          if (state.mode !== "running") {
            startFromTouch();
          } else {
            activateBoost();
          }
        } else if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode !== "running") {
            startFromTouch();
          } else {
            activateBoost();
          }
        }
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          input.left = false;
        } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          input.right = false;
        }
      }

      function handlePointerDown(event) {
        canvas.focus();
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
          return;
        }
        event.preventDefault();
        const point = getCanvasPoint(event.clientX, event.clientY);
        dragSession = {
          pointerId: event.pointerId,
          lastAngle: Math.atan2(point.y - CENTER.y, point.x - CENTER.x),
          lastX: event.clientX,
          lastY: event.clientY,
          moved: 0,
          downAt: performance.now(),
        };
        canvas.setPointerCapture?.(event.pointerId);
      }

      function handlePointerMove(event) {
        if (!dragSession || dragSession.pointerId !== event.pointerId || state.mode !== "running") {
          return;
        }
        event.preventDefault();
        const point = getCanvasPoint(event.clientX, event.clientY);
        const nextAngle = Math.atan2(point.y - CENTER.y, point.x - CENTER.x);
        const delta = angleDelta(dragSession.lastAngle, nextAngle);
        state.shieldTargetAngle = wrapAngle(
          state.shieldTargetAngle + delta * (state.inverseActive ? -1 : 1),
        );
        dragSession.moved += Math.hypot(event.clientX - dragSession.lastX, event.clientY - dragSession.lastY);
        dragSession.lastAngle = nextAngle;
        dragSession.lastX = event.clientX;
        dragSession.lastY = event.clientY;
      }

      function handlePointerUp(event) {
        if (!dragSession || dragSession.pointerId !== event.pointerId) {
          return;
        }
        event.preventDefault();
        const elapsedMs = performance.now() - dragSession.downAt;
        if (state.mode === "running" && dragSession.moved < 18 && elapsedMs < 220) {
          activateBoost();
        }
        dragSession = null;
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        creator: META.creator,
        genre: META.genre,
        clearCondition: META.clearCondition,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.streak = TARGET_CHAIN;
          burstWindows.forEach((entry) => {
            entry.started = true;
            entry.finished = true;
            entry.spawned = entry.spawned.map(() => true);
          });
          state.windowsCleared = TOTAL_WINDOWS;
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          state.coreMarks.spire = 3;
          failStage("debug_force_fail", "코어에 같은 문양이 3번 누적되었습니다.");
          render();
        },
      };

      bindHoldButton(
        document.querySelector("#rotate-left"),
        () => {
          input.left = true;
        },
        () => {
          input.left = false;
        },
      );
      bindHoldButton(
        document.querySelector("#rotate-right"),
        () => {
          input.right = true;
        },
        () => {
          input.right = false;
        },
      );
      bindHoldButton(
        document.querySelector("#boost-btn"),
        () => {
          activateBoost();
        },
        () => {},
      );

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);
      canvas.addEventListener(
        "touchstart",
        (event) => {
          if (state.mode !== "running") {
            event.preventDefault();
            startFromTouch();
          }
        },
        { passive: false },
      );
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      resetWindows();
      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
