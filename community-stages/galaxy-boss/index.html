<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galaxy Boss</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        background: #020617;
      }

      canvas {
        background: #020617;
      }

      .mobile-controls {
        justify-content: space-between;
        align-items: flex-end;
      }

      .mobile-controls__cluster {
        pointer-events: auto;
        display: grid;
        gap: 10px;
      }

      .mobile-controls__row {
        display: flex;
        justify-content: center;
        gap: 10px;
        width: auto;
      }

      .mobile-btn {
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        font-size: 24px;
      }

      .mobile-btn--fire {
        min-width: 84px;
        font-size: 20px;
      }

      .mobile-btn[data-active="true"] {
        background: rgba(59, 130, 246, 0.86);
      }

      .mobile-btn--fire[data-active="true"] {
        background: rgba(239, 68, 68, 0.9);
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Galaxy Boss. 캔버스를 터치하거나 Enter로 시작한 뒤 방향키 또는 모바일 화면
      버튼으로 이동하고 Space 또는 발사 버튼으로 공격하세요.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Galaxy Boss"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작 버튼">
      <div class="mobile-controls__cluster">
        <div class="mobile-controls__row">
          <button class="mobile-btn" type="button" data-control="up" data-active="false" aria-label="위로 이동">▲</button>
        </div>
        <div class="mobile-controls__row">
          <button class="mobile-btn" type="button" data-control="left" data-active="false" aria-label="왼쪽으로 이동">◀</button>
          <button class="mobile-btn" type="button" data-control="down" data-active="false" aria-label="아래로 이동">▼</button>
          <button class="mobile-btn" type="button" data-control="right" data-active="false" aria-label="오른쪽으로 이동">▶</button>
        </div>
      </div>
      <div class="mobile-controls__cluster">
        <div class="mobile-controls__row">
          <button class="mobile-btn mobile-btn--fire" type="button" data-control="shoot" data-active="false" aria-label="발사">발사</button>
        </div>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../stage-kit.js"></script>
    <script>
      const TITLE = "Galaxy Boss";
      const DESCRIPTION = "보스를 피해 공격하며 체력을 모두 깎아야 하는 아케이드 슈터 스테이지입니다.";
      const CLEAR_CONDITION = "보스 체력을 모두 깎아 격추하기";
      const FAIL_CONDITION = "보스 몸체나 탄에 한 번이라도 맞으면 즉시 종료됩니다.";
      const CONTROLS = "터치 또는 Enter로 시작, 방향키/화면 버튼으로 이동, Space/발사 버튼으로 공격합니다.";

      const PLAYER_SPEED = 360;
      const PLAYER_BULLET_SPEED = 680;
      const BOSS_BULLET_SPEED = 220;
      const PLAYER_FIRE_COOLDOWN = 0.16;
      const BOSS_START_HP = 26;
      const PLAYER_HIT_RADIUS = 7;
      const PLAYER_HIT_OFFSET_Y = 5;

      let runtime = null;
      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: DESCRIPTION,
        player: null,
        boss: null,
        playerBullets: [],
        enemyBullets: [],
        stars: [],
        explosions: [],
        victoryFlash: 0,
      };

      function createPlayer() {
        return {
          x: runtime.view.width / 2,
          y: runtime.view.height - 86,
          w: 34,
          h: 34,
          fireCooldown: 0,
        };
      }

      function getPlayerHitCircle(player) {
        return {
          x: player.x,
          y: player.y + PLAYER_HIT_OFFSET_Y,
          r: PLAYER_HIT_RADIUS,
        };
      }

      function createBoss() {
        return {
          x: runtime.view.width / 2,
          y: 112,
          w: 176,
          h: 96,
          hp: BOSS_START_HP,
          maxHp: BOSS_START_HP,
          direction: 1,
          speed: 126,
          volleyCooldown: 0.9,
          phaseTimer: 0,
        };
      }

      function createStars() {
        return Array.from({ length: 70 }, (_, index) => ({
          x: (index * 83) % runtime.view.width,
          y: (index * 47) % runtime.view.height,
          size: 1 + (index % 3),
          speed: 30 + (index % 5) * 18,
        }));
      }

      function resetRun() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = createPlayer();
        state.boss = createBoss();
        state.playerBullets = [];
        state.enemyBullets = [];
        state.stars = createStars();
        state.explosions = [];
        state.victoryFlash = 0;
      }

      function spawnExplosion(x, y, color, radius) {
        state.explosions.push({
          x,
          y,
          color,
          radius,
          life: 0.45,
        });
      }

      function spawnPlayerBullet() {
        const player = state.player;
        state.playerBullets.push({
          x: player.x,
          y: player.y - player.h * 0.6,
          vy: -PLAYER_BULLET_SPEED,
          r: 5,
        });
      }

      function spawnBossVolley() {
        const boss = state.boss;
        const spread = [-0.55, -0.28, 0, 0.28, 0.55];
        for (const factor of spread) {
          state.enemyBullets.push({
            x: boss.x + factor * 90,
            y: boss.y + 44,
            vx: factor * 120,
            vy: BOSS_BULLET_SPEED + Math.abs(factor) * 48,
            r: 10,
          });
        }
      }

      function updateStars(dt) {
        for (const star of state.stars) {
          star.y += star.speed * dt;
          if (star.y > runtime.view.height + 4) {
            star.y = -4;
            star.x = (star.x + 137) % runtime.view.width;
          }
        }
      }

      function updateExplosions(dt) {
        state.explosions = state.explosions.filter((explosion) => {
          explosion.life -= dt;
          explosion.radius += dt * 60;
          return explosion.life > 0;
        });
        state.victoryFlash = Math.max(0, state.victoryFlash - dt * 2.2);
      }

      function drawBackground(ctx2d) {
        const gradient = ctx2d.createLinearGradient(0, 0, 0, runtime.view.height);
        gradient.addColorStop(0, "#020617");
        gradient.addColorStop(0.5, "#0f172a");
        gradient.addColorStop(1, "#111827");
        ctx2d.fillStyle = gradient;
        ctx2d.fillRect(0, 0, runtime.view.width, runtime.view.height);

        ctx2d.fillStyle = "rgba(96, 165, 250, 0.12)";
        ctx2d.beginPath();
        ctx2d.arc(170, 98, 120, 0, Math.PI * 2);
        ctx2d.fill();

        ctx2d.fillStyle = "rgba(244, 114, 182, 0.09)";
        ctx2d.beginPath();
        ctx2d.arc(800, 148, 160, 0, Math.PI * 2);
        ctx2d.fill();

        if (state.victoryFlash > 0) {
          ctx2d.fillStyle = `rgba(250, 204, 21, ${state.victoryFlash * 0.18})`;
          ctx2d.fillRect(0, 0, runtime.view.width, runtime.view.height);
        }
      }

      function drawStars(ctx2d) {
        for (const star of state.stars) {
          ctx2d.fillStyle = `rgba(226, 232, 240, ${0.35 + star.size * 0.15})`;
          ctx2d.fillRect(star.x, star.y, star.size, star.size);
        }
      }

      function drawBossAura(ctx2d) {
        const boss = state.boss;
        const aura = ctx2d.createRadialGradient(boss.x, boss.y, 12, boss.x, boss.y, 124);
        aura.addColorStop(0, "rgba(244, 114, 182, 0.32)");
        aura.addColorStop(1, "rgba(244, 114, 182, 0)");
        ctx2d.fillStyle = aura;
        ctx2d.beginPath();
        ctx2d.arc(boss.x, boss.y + 10, 124, 0, Math.PI * 2);
        ctx2d.fill();
      }

      function drawBoss(ctx2d) {
        const boss = state.boss;
        ctx2d.save();
        ctx2d.translate(boss.x, boss.y);

        ctx2d.fillStyle = "#ec4899";
        ctx2d.beginPath();
        ctx2d.moveTo(-76, 10);
        ctx2d.lineTo(-32, -42);
        ctx2d.lineTo(0, -28);
        ctx2d.lineTo(32, -42);
        ctx2d.lineTo(76, 10);
        ctx2d.lineTo(42, 46);
        ctx2d.lineTo(-42, 46);
        ctx2d.closePath();
        ctx2d.fill();

        ctx2d.fillStyle = "#1e1b4b";
        ctx2d.fillRect(-22, -22, 44, 52);
        ctx2d.fillStyle = "#fdf2f8";
        ctx2d.fillRect(-56, 12, 112, 10);
        ctx2d.fillStyle = "#0f172a";
        ctx2d.beginPath();
        ctx2d.arc(-24, -4, 9, 0, Math.PI * 2);
        ctx2d.arc(24, -4, 9, 0, Math.PI * 2);
        ctx2d.fill();
        ctx2d.restore();
      }

      function drawPlayer(ctx2d) {
        const player = state.player;
        ctx2d.save();
        ctx2d.translate(player.x, player.y);

        ctx2d.fillStyle = "#38bdf8";
        ctx2d.beginPath();
        ctx2d.moveTo(0, -20);
        ctx2d.lineTo(18, 18);
        ctx2d.lineTo(0, 10);
        ctx2d.lineTo(-18, 18);
        ctx2d.closePath();
        ctx2d.fill();

        ctx2d.fillStyle = "#e0f2fe";
        ctx2d.fillRect(-7, -6, 14, 24);
        ctx2d.fillStyle = "#f97316";
        ctx2d.fillRect(-3, 18, 6, 10);
        ctx2d.restore();
      }

      function drawPlayerBullets(ctx2d) {
        ctx2d.fillStyle = "#fde047";
        for (const bullet of state.playerBullets) {
          ctx2d.beginPath();
          ctx2d.arc(bullet.x, bullet.y, bullet.r, 0, Math.PI * 2);
          ctx2d.fill();
        }
      }

      function drawEnemyBullets(ctx2d) {
        ctx2d.fillStyle = "#fb7185";
        for (const bullet of state.enemyBullets) {
          ctx2d.beginPath();
          ctx2d.arc(bullet.x, bullet.y, bullet.r, 0, Math.PI * 2);
          ctx2d.fill();
        }
      }

      function drawExplosions(ctx2d) {
        for (const explosion of state.explosions) {
          ctx2d.fillStyle = explosion.color;
          ctx2d.globalAlpha = Math.max(0, explosion.life * 1.6);
          ctx2d.beginPath();
          ctx2d.arc(explosion.x, explosion.y, explosion.radius, 0, Math.PI * 2);
          ctx2d.fill();
          ctx2d.globalAlpha = 1;
        }
      }

      function drawHud(ctx2d) {
        ctx2d.fillStyle = "rgba(15, 23, 42, 0.78)";
        ctx2d.fillRect(18, 16, 328, 110);
        ctx2d.fillStyle = "#f8fafc";
        ctx2d.font = "700 22px Trebuchet MS";
        ctx2d.fillText(TITLE, 34, 44);
        ctx2d.font = "600 16px Trebuchet MS";
        ctx2d.fillText("방향키 이동 / Space 발사", 34, 70);
        ctx2d.fillText(`생존 시간 ${state.elapsed.toFixed(1)}초`, 34, 94);

        const boss = state.boss;
        const ratio = clamp(boss.hp / boss.maxHp, 0, 1);
        ctx2d.fillStyle = "rgba(15, 23, 42, 0.7)";
        ctx2d.fillRect(560, 24, 316, 24);
        ctx2d.fillStyle = "#ef4444";
        ctx2d.fillRect(560, 24, 316 * ratio, 24);
        ctx2d.strokeStyle = "rgba(248, 250, 252, 0.7)";
        ctx2d.strokeRect(560, 24, 316, 24);
        ctx2d.fillStyle = "#f8fafc";
        ctx2d.font = "700 15px Trebuchet MS";
        ctx2d.fillText(`BOSS HP ${boss.hp} / ${boss.maxHp}`, 652, 41);
      }

      function drawOverlay(ctx2d) {
        if (state.mode === "running") {
          return;
        }

        ctx2d.fillStyle = "rgba(2, 6, 23, 0.62)";
        ctx2d.fillRect(0, 0, runtime.view.width, runtime.view.height);

        const title =
          state.mode === "menu" ? TITLE : state.mode === "failed" ? "GAME OVER" : "CLEAR";
        const accent =
          state.mode === "menu" ? "#f97316" : state.mode === "failed" ? "#ef4444" : "#22c55e";
        const lines =
          state.mode === "menu"
            ? [
                `클리어 조건: ${CLEAR_CONDITION}`,
                `실패 조건: ${FAIL_CONDITION}`,
                CONTROLS,
              ]
            : state.mode === "failed"
              ? [
                  `생존 시간 ${state.lastRunTime.toFixed(1)}초`,
                  "공유 목숨 1개가 끝났습니다.",
                  "Enter로 다시 시작합니다.",
                ]
              : [
                  `격추 완료 시간 ${state.lastRunTime.toFixed(1)}초`,
                  "보스를 쓰러뜨렸습니다.",
                  "호스트가 다음 랜덤 스테이지를 바로 고릅니다.",
                ];

        ctx2d.fillStyle = "rgba(248, 250, 252, 0.96)";
        roundRect(ctx2d, 170, 128, 620, 250, 28);
        ctx2d.fill();
        ctx2d.strokeStyle = accent;
        ctx2d.lineWidth = 4;
        roundRect(ctx2d, 170, 128, 620, 250, 28);
        ctx2d.stroke();

        ctx2d.fillStyle = accent;
        ctx2d.font = "700 44px Trebuchet MS";
        ctx2d.textAlign = "center";
        ctx2d.fillText(title, runtime.view.width / 2, 188);
        ctx2d.fillStyle = "#0f172a";
        ctx2d.font = "600 22px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx2d.fillText(line, runtime.view.width / 2, 244 + index * 42);
        });
        ctx2d.textAlign = "left";
      }

      function roundRect(ctx2d, x, y, width, height, radius) {
        ctx2d.beginPath();
        ctx2d.moveTo(x + radius, y);
        ctx2d.arcTo(x + width, y, x + width, y + height, radius);
        ctx2d.arcTo(x + width, y + height, x, y + height, radius);
        ctx2d.arcTo(x, y + height, x, y, radius);
        ctx2d.arcTo(x, y, x + width, y, radius);
        ctx2d.closePath();
      }

      function rectOverlap(a, b) {
        return (
          a.x - a.w / 2 < b.x + b.w / 2 &&
          a.x + a.w / 2 > b.x - b.w / 2 &&
          a.y - a.h / 2 < b.y + b.h / 2 &&
          a.y + a.h / 2 > b.y - b.h / 2
        );
      }

      function circleRectOverlap(circle, rect) {
        const nearestX = clamp(circle.x, rect.x - rect.w / 2, rect.x + rect.w / 2);
        const nearestY = clamp(circle.y, rect.y - rect.h / 2, rect.y + rect.h / 2);
        const dx = circle.x - nearestX;
        const dy = circle.y - nearestY;
        return dx * dx + dy * dy <= circle.r * circle.r;
      }

      function circleOverlap(a, b) {
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const distanceLimit = a.r + b.r;
        return dx * dx + dy * dy <= distanceLimit * distanceLimit;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function round1(value) {
        return Math.round(value * 10) / 10;
      }

      window.__relayDebug = {
        setElapsed(seconds) {
          state.elapsed = clamp(seconds, 0, 999);
        },
        setPlayerX(x) {
          state.player.x = clamp(x, 42, runtime.view.width - 42);
        },
      };

      const stage = window.StageKit.create({
        id: "galaxy-boss",
        title: TITLE,
        creator: {
          name: "JungCollin",
          avatar: null,
          github: "jungcollin",
        },
        genre: "Arcade shooter",
        clearCondition: CLEAR_CONDITION,
        failCondition: FAIL_CONDITION,
        controls: CONTROLS,
        note: DESCRIPTION,
        canvas: "#game",
        initialState() {
          return state;
        },
        onInit(ctx) {
          runtime = ctx;
          ctx.installKeyboard({
            ArrowLeft: "left",
            ArrowRight: "right",
            ArrowUp: "up",
            ArrowDown: "down",
            Enter: "start",
            " ": "shoot",
          });
          ctx.bindMobileControls(".mobile-controls");

          // StageKit installs touchstart / pointerdown handlers here for mobile start.
          ctx.installTouchStart((runtimeCtx) => {
            if (runtimeCtx.state.mode !== "running") {
              runtimeCtx.start();
            }
          });
          ctx.canvas.addEventListener("click", () => {
            if (ctx.state.mode !== "running") {
              ctx.start();
            }
            ctx.canvas.focus();
          });

          document.querySelectorAll(".mobile-btn").forEach((button) => {
            button.addEventListener("pointerdown", () => {
              if (ctx.state.mode !== "running") {
                ctx.start();
              }
            });
          });

          window.addEventListener("blur", () => {
            ctx.input.left = false;
            ctx.input.right = false;
            ctx.input.up = false;
            ctx.input.down = false;
            ctx.input.shoot = false;
          });

          resetRun();
          ctx.setMode("menu");
        },
        onStart() {
          resetRun();
        },
        onFail() {
          spawnExplosion(state.player.x, state.player.y, "#fb7185", 22);
        },
        onClear() {
          state.victoryFlash = 1;
          spawnExplosion(state.boss.x, state.boss.y, "#fde047", 42);
          spawnExplosion(state.boss.x - 54, state.boss.y + 16, "#f97316", 28);
          spawnExplosion(state.boss.x + 54, state.boss.y + 6, "#60a5fa", 28);
        },
        update(dt, ctx) {
          updateStars(dt);
          updateExplosions(dt);

          if (state.mode !== "running") {
            if (ctx.input.start) {
              ctx.input.start = false;
              ctx.start();
            }
            return;
          }

          state.elapsed += dt;
          const player = state.player;
          const boss = state.boss;

          const dx = (ctx.input.right ? 1 : 0) - (ctx.input.left ? 1 : 0);
          const dy = (ctx.input.down ? 1 : 0) - (ctx.input.up ? 1 : 0);
          player.x = clamp(player.x + dx * PLAYER_SPEED * dt, 42, runtime.view.width - 42);
          player.y = clamp(player.y + dy * PLAYER_SPEED * dt, runtime.view.height - 150, runtime.view.height - 42);
          player.fireCooldown = Math.max(0, player.fireCooldown - dt);

          if (ctx.input.shoot && player.fireCooldown === 0) {
            spawnPlayerBullet();
            player.fireCooldown = PLAYER_FIRE_COOLDOWN;
          }

          boss.phaseTimer += dt;
          boss.x += boss.direction * boss.speed * dt;
          if (boss.x < 140) {
            boss.x = 140;
            boss.direction = 1;
          }
          if (boss.x > runtime.view.width - 140) {
            boss.x = runtime.view.width - 140;
            boss.direction = -1;
          }
          boss.y = 102 + Math.sin(boss.phaseTimer * 1.8) * 18;
          boss.volleyCooldown -= dt;
          if (boss.volleyCooldown <= 0) {
            spawnBossVolley();
            const hpRatio = boss.hp / boss.maxHp;
            boss.volleyCooldown = Math.max(0.28, 0.88 * hpRatio + 0.16);
          }

          const alivePlayerBullets = [];
          for (const bullet of state.playerBullets) {
            bullet.y += bullet.vy * dt;
            if (bullet.y < -20) {
              continue;
            }
            if (circleRectOverlap(bullet, boss)) {
              boss.hp -= 1;
              spawnExplosion(bullet.x, bullet.y, "#fde047", 10);
              if (boss.hp <= 0) {
                ctx.clear();
              }
              continue;
            }
            alivePlayerBullets.push(bullet);
          }
          state.playerBullets = alivePlayerBullets;

          const aliveEnemyBullets = [];
          const playerHitCircle = getPlayerHitCircle(player);
          for (const bullet of state.enemyBullets) {
            bullet.x += bullet.vx * dt;
            bullet.y += bullet.vy * dt;
            if (
              bullet.x < -32 ||
              bullet.x > runtime.view.width + 32 ||
              bullet.y > runtime.view.height + 32
            ) {
              continue;
            }
            if (circleOverlap(bullet, playerHitCircle)) {
              ctx.fail("boss_bullet");
              continue;
            }
            aliveEnemyBullets.push(bullet);
          }
          state.enemyBullets = aliveEnemyBullets;

          if (rectOverlap(player, boss)) {
            ctx.fail("boss_collision");
          }
        },
        render(ctx) {
          const ctx2d = ctx.ctx2d;
          drawBackground(ctx2d);
          drawStars(ctx2d);
          drawBossAura(ctx2d);
          drawBoss(ctx2d);
          drawPlayerBullets(ctx2d);
          drawEnemyBullets(ctx2d);
          drawPlayer(ctx2d);
          drawExplosions(ctx2d);
          drawHud(ctx2d);
          drawOverlay(ctx2d);
        },
        serialize() {
          const playerHitCircle = getPlayerHitCircle(state.player);
          return {
            coordinate_system: "origin top-left, x right, y down, units in pixels",
            mode: state.mode,
            elapsed: round1(state.mode === "running" ? state.elapsed : state.lastRunTime),
            player: {
              x: round1(state.player.x),
              y: round1(state.player.y),
              fire_cooldown: round1(state.player.fireCooldown),
              hit_circle: {
                x: round1(playerHitCircle.x),
                y: round1(playerHitCircle.y),
                r: playerHitCircle.r,
              },
            },
            boss: {
              x: round1(state.boss.x),
              y: round1(state.boss.y),
              hp: state.boss.hp,
              max_hp: state.boss.maxHp,
              volley_cooldown: round1(state.boss.volleyCooldown),
            },
            player_bullets: state.playerBullets.slice(0, 8).map((bullet) => ({
              x: round1(bullet.x),
              y: round1(bullet.y),
            })),
            enemy_bullets: state.enemyBullets.slice(0, 12).map((bullet) => ({
              x: round1(bullet.x),
              y: round1(bullet.y),
              vx: round1(bullet.vx),
              vy: round1(bullet.vy),
            })),
          };
        },
      });
    </script>
  </body>
</html>
