<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>볼링 퍼즐</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #F5EDE0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 120, 80, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80, 60, 40, 0.92);
        color: #F5EDE0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F5EDE0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 120, 80, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">볼링 퍼즐. 화면을 터치하여 발사 각도를 정하고 장애물 사이로 공을 굴려 핀을 쓰러뜨리세요. 모바일에서는 화면 터치만으로 플레이합니다. 핀 30개를 쓰러뜨리면 클리어. 공 3개를 놓치면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="볼링 퍼즐" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "bowling-puzzle",
        title: "볼링 퍼즐",
        description: "장애물 사이로 공을 굴려 핀을 쓰러뜨리세요",
        creator: "jungcollin",
        genre: "Puzzle bowling",
        clearCondition: "핀 30개를 쓰러뜨리면 클리어",
        failCondition: "공 3개를 놓치면 실패",
        controls: "화면 터치로 발사 각도 결정",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#F5EDE0", lane: "#E8DCC8", laneLine: "#D4C8B0",
        ball: "#C07040", ballHighlight: "#D89060",
        pin: "#F0F0E8", pinStripe: "#CC4444",
        wall: "#A09080", wallDark: "#807060",
        text: "#4A3A28", textLight: "#8A7A68",
        success: "#6A9A50", danger: "#C04040",
        accent: "#C07040",
      };

      const TARGET_PINS = 30;
      const MAX_GUTTER = 3;
      const BALL_R = 10;
      const PIN_R = 7;
      const BALL_SPEED = 400;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      let pinsHit = 0;
      let gutters = 0;
      let shake = 0;
      let roundNum = 0;

      // Aiming
      let aimAngle = 0; // oscillating angle
      let aimDir = 1;
      let aimSpeed = 1.8;
      let aimLocked = false;

      // Ball
      let ball = null; // { x, y, vx, vy, active }

      // Pins
      let pins = [];

      // Walls/obstacles
      let walls = [];

      // Particles
      let particles = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function randInt(lo, hi) { return Math.floor(rand(lo, hi + 1)); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color, sizeRange, speedRange) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), s = rand(speedRange[0], speedRange[1]);
          particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
            life: 1, decay: rand(0.8, 1.5), color, size: rand(sizeRange[0], sizeRange[1]) });
        }
      }

      function generateRound() {
        roundNum++;
        const diff = Math.min(roundNum / 8, 1);
        aimAngle = 0; aimDir = 1; aimLocked = false;
        aimSpeed = lerp(1.5, 2.5, diff);
        ball = null;

        // Generate pins (3-6 pins at top)
        pins = [];
        const pinCount = randInt(3, Math.min(3 + roundNum, 6));
        const pinAreaY = rand(60, 120);
        const pinSpread = lerp(180, 280, diff);
        for (let i = 0; i < pinCount; i++) {
          const px = CX - pinSpread / 2 + (pinSpread / (pinCount - 1 || 1)) * i + rand(-10, 10);
          const py = pinAreaY + rand(-15, 15);
          pins.push({ x: px, y: py, hit: false, fallAngle: 0, fallSpeed: 0 });
        }

        // Generate walls (0-3 obstacles)
        walls = [];
        const wallCount = Math.min(roundNum - 1, 3);
        for (let i = 0; i < wallCount; i++) {
          const wy = lerp(180, 350, (i + 0.5) / wallCount) + rand(-20, 20);
          const wx = CX + rand(-150, 150);
          const ww = rand(40, 80);
          const wh = rand(12, 20);
          walls.push({ x: wx - ww / 2, y: wy, w: ww, h: wh });
        }
      }

      function startGame() {
        mode = "running"; elapsed = 0; pinsHit = 0; gutters = 0;
        shake = 0; roundNum = 0; particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateRound();
      }

      function failGame(reason) {
        mode = "failed"; window.relayStageResult.status = "failed"; reportFailed(reason);
      }
      function clearGame() {
        mode = "cleared"; window.relayStageResult.status = "cleared"; reportCleared();
        for (let i = 0; i < 40; i++)
          spawnParticles(rand(100, 860), rand(80, 400), 1, [COL.accent, "#FFD700", COL.success, "#FFF"][randInt(0, 3)], [3, 7], [40, 120]);
      }

      function launchBall() {
        if (aimLocked || (ball && ball.active)) return;
        aimLocked = true;
        const angle = -Math.PI / 2 + aimAngle;
        ball = {
          x: CX, y: H - 50,
          vx: Math.cos(angle) * BALL_SPEED,
          vy: Math.sin(angle) * BALL_SPEED,
          active: true,
        };
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = W / rect.width, sy = H / rect.height;
        const touch = e.touches ? e.touches[0] : e;
        return { x: (touch.clientX - rect.left) * sx, y: (touch.clientY - rect.top) * sy };
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { startGame(); return; }
        launchBall();
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && mode !== "running") { e.preventDefault(); startGame(); }
        if (e.key === " " && mode === "running") { e.preventDefault(); launchBall(); }
      });

      function update(dt) {
        elapsed += dt;

        if (mode !== "running") {
          particles = particles.filter(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= p.decay * dt; return p.life > 0; });
          return;
        }

        if (shake > 0) shake = Math.max(0, shake - dt * 3);

        // Aim oscillation
        if (!aimLocked) {
          aimAngle += aimDir * aimSpeed * dt;
          if (aimAngle > 0.7) { aimAngle = 0.7; aimDir = -1; }
          if (aimAngle < -0.7) { aimAngle = -0.7; aimDir = 1; }
        }

        // Ball physics
        if (ball && ball.active) {
          ball.x += ball.vx * dt;
          ball.y += ball.vy * dt;

          // Wall bounce
          if (ball.x < BALL_R) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
          if (ball.x > W - BALL_R) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }

          // Obstacle collision
          walls.forEach(w => {
            if (ball.x + BALL_R > w.x && ball.x - BALL_R < w.x + w.w &&
                ball.y + BALL_R > w.y && ball.y - BALL_R < w.y + w.h) {
              // Determine bounce direction
              const overlapLeft = (ball.x + BALL_R) - w.x;
              const overlapRight = (w.x + w.w) - (ball.x - BALL_R);
              const overlapTop = (ball.y + BALL_R) - w.y;
              const overlapBottom = (w.y + w.h) - (ball.y - BALL_R);
              const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
              if (minOverlap === overlapTop || minOverlap === overlapBottom) {
                ball.vy = -ball.vy;
                ball.y += minOverlap === overlapTop ? -overlapTop : overlapBottom;
              } else {
                ball.vx = -ball.vx;
                ball.x += minOverlap === overlapLeft ? -overlapLeft : overlapRight;
              }
            }
          });

          // Pin collision
          let hitThisFrame = 0;
          pins.forEach(p => {
            if (p.hit) return;
            if (dist(ball.x, ball.y, p.x, p.y) < BALL_R + PIN_R) {
              p.hit = true;
              p.fallAngle = Math.atan2(p.y - ball.y, p.x - ball.x);
              p.fallSpeed = rand(3, 6);
              pinsHit++;
              hitThisFrame++;
              spawnParticles(p.x, p.y, 6, COL.pin, [2, 4], [40, 100]);
            }
          });

          if (hitThisFrame > 0 && pinsHit >= TARGET_PINS) {
            clearGame(); return;
          }

          // Ball out of bounds
          if (ball.y < -20 || ball.y > H + 20) {
            ball.active = false;
            const hitAny = pins.some(p => p.hit);
            if (!pins.every(p => p.hit) && !hitAny) {
              gutters++;
              shake = 0.3;
              if (gutters >= MAX_GUTTER) { failGame("놓침 3회"); return; }
            }
            setTimeout(() => { if (mode === "running") generateRound(); }, 500);
          }
        }

        // Pin fall animation
        pins.forEach(p => {
          if (p.hit) {
            p.x += Math.cos(p.fallAngle) * p.fallSpeed;
            p.y += Math.sin(p.fallAngle) * p.fallSpeed;
            p.fallSpeed *= 0.95;
          }
        });

        particles = particles.filter(p => {
          p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 80 * dt;
          p.life -= p.decay * dt; return p.life > 0;
        });
      }

      function drawLane() {
        // Lane
        ctx.fillStyle = COL.lane;
        ctx.fillRect(CX - 200, 0, 400, H);
        // Lane lines
        ctx.strokeStyle = COL.laneLine; ctx.lineWidth = 1;
        ctx.setLineDash([8, 12]);
        ctx.beginPath(); ctx.moveTo(CX - 200, 0); ctx.lineTo(CX - 200, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(CX + 200, 0); ctx.lineTo(CX + 200, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(CX, 0); ctx.lineTo(CX, H); ctx.stroke();
        ctx.setLineDash([]);
        // Gutters
        ctx.fillStyle = COL.bg;
        ctx.fillRect(0, 0, CX - 200, H);
        ctx.fillRect(CX + 200, 0, CX - 200, H);
      }

      function drawWalls() {
        walls.forEach(w => {
          ctx.fillStyle = COL.wall;
          ctx.beginPath(); ctx.roundRect(w.x, w.y, w.w, w.h, 4); ctx.fill();
          ctx.fillStyle = COL.wallDark;
          ctx.fillRect(w.x, w.y, w.w, 3);
        });
      }

      function drawPins() {
        pins.forEach(p => {
          if (p.hit) {
            ctx.globalAlpha = 0.4;
          }
          // Pin body
          ctx.fillStyle = COL.pin;
          ctx.beginPath(); ctx.arc(p.x, p.y, PIN_R, 0, Math.PI * 2); ctx.fill();
          // Stripe
          ctx.fillStyle = COL.pinStripe;
          ctx.fillRect(p.x - PIN_R + 2, p.y - 2, (PIN_R - 2) * 2, 4);
          ctx.globalAlpha = 1;
        });
      }

      function drawBall() {
        if (!ball) return;
        ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = COL.ball; ctx.fill();
        // Highlight
        ctx.beginPath(); ctx.arc(ball.x - 3, ball.y - 3, 3, 0, Math.PI * 2);
        ctx.fillStyle = COL.ballHighlight; ctx.fill();
        // Finger holes
        ctx.fillStyle = COL.accent + "80";
        ctx.beginPath(); ctx.arc(ball.x + 2, ball.y - 2, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ball.x - 3, ball.y + 1, 2, 0, Math.PI * 2); ctx.fill();
      }

      function drawAim() {
        if (aimLocked || (ball && ball.active)) return;
        const angle = -Math.PI / 2 + aimAngle;
        const len = 100;
        const ax = CX + Math.cos(angle) * len;
        const ay = H - 50 + Math.sin(angle) * len;
        ctx.beginPath(); ctx.moveTo(CX, H - 50); ctx.lineTo(ax, ay);
        ctx.strokeStyle = COL.accent; ctx.lineWidth = 3;
        ctx.setLineDash([6, 4]); ctx.stroke(); ctx.setLineDash([]);
        // Arrow head
        const ha = angle + Math.PI;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax + Math.cos(ha + 0.4) * 12, ay + Math.sin(ha + 0.4) * 12);
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax + Math.cos(ha - 0.4) * 12, ay + Math.sin(ha - 0.4) * 12);
        ctx.strokeStyle = COL.accent; ctx.lineWidth = 2; ctx.stroke();

        // Launch prompt
        const pulse = Math.sin(elapsed * 3) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(192,112,64,${pulse})`;
        ctx.font = "15px 'Trebuchet MS'"; ctx.textAlign = "center";
        ctx.fillText("탭하여 발사!", CX, H - 15);
        ctx.textAlign = "left";
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = "bold 20px 'Trebuchet MS'";
        ctx.textAlign = "left"; ctx.fillText("핀 " + pinsHit + "/" + TARGET_PINS, 20, 32);
        ctx.textAlign = "center"; ctx.fillText("라운드 " + roundNum, CX, 32);
        ctx.textAlign = "right";
        ctx.fillStyle = gutters >= 2 ? COL.danger : COL.text;
        ctx.fillText("놓침 " + gutters + "/" + MAX_GUTTER, W - 20, 32);
        ctx.textAlign = "left";
      }

      function drawParticles() {
        particles.forEach(p => {
          ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      function renderMenu() {
        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);
        drawLane();
        const cw = 340, ch = 300, cx = CX - cw / 2, cy = CY - ch / 2 - 10;
        ctx.fillStyle = "rgba(245,237,224,0.95)";
        ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 16); ctx.fill();
        ctx.strokeStyle = COL.accent; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 16); ctx.stroke();
        ctx.textAlign = "center";
        ctx.fillStyle = COL.accent; ctx.font = "bold 34px 'Trebuchet MS'";
        ctx.fillText("볼링 퍼즐", CX, cy + 48);
        ctx.fillStyle = COL.text; ctx.font = "17px 'Trebuchet MS'";
        ctx.fillText("장애물 사이로 핀을 쓰러뜨리세요", CX, cy + 82);
        ctx.fillStyle = COL.textLight; ctx.font = "15px 'Trebuchet MS'";
        ctx.fillText("조작: 화면 터치로 발사", CX, cy + 116);
        ctx.fillStyle = COL.success; ctx.fillText("클리어: 핀 30개 쓰러뜨리기", CX, cy + 148);
        ctx.fillStyle = COL.danger; ctx.fillText("실패: 놓침 3회", CX, cy + 175);
        const pulse = Math.sin(elapsed * 3) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(192,112,64,${pulse})`; ctx.font = "bold 20px 'Trebuchet MS'";
        ctx.fillText("탭하여 시작", CX, cy + 240);
        ctx.textAlign = "left";
      }

      function renderRunning() {
        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);
        if (shake > 0) { ctx.save(); ctx.translate(rand(-shake * 8, shake * 8), rand(-shake * 8, shake * 8)); }
        drawLane(); drawWalls(); drawPins(); drawBall();
        drawAim(); drawHUD(); drawParticles();
        if (shake > 0) ctx.restore();
      }

      function renderResult(title, subtitle, color) {
        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);
        drawLane(); drawParticles();
        const cw = 340, ch = 210, cx = CX - cw / 2, cy = CY - ch / 2;
        ctx.fillStyle = "rgba(245,237,224,0.95)";
        ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 16); ctx.fill();
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(cx, cy, cw, ch, 16); ctx.stroke();
        ctx.textAlign = "center";
        ctx.fillStyle = color; ctx.font = "bold 34px 'Trebuchet MS'"; ctx.fillText(title, CX, cy + 50);
        ctx.fillStyle = COL.text; ctx.font = "17px 'Trebuchet MS'"; ctx.fillText(subtitle, CX, cy + 85);
        ctx.fillStyle = COL.textLight; ctx.font = "15px 'Trebuchet MS'";
        ctx.fillText("핀 " + pinsHit + "개 | 라운드 " + roundNum + " | " + elapsed.toFixed(1) + "초", CX, cy + 115);
        const pulse = Math.sin(elapsed * 3) * 0.3 + 0.7;
        ctx.fillStyle = `rgba(192,112,64,${pulse})`; ctx.font = "bold 18px 'Trebuchet MS'";
        ctx.fillText("탭하여 재시작", CX, cy + 175);
        ctx.textAlign = "left";
      }

      function render() {
        if (mode === "menu") { renderMenu(); return; }
        if (mode === "running") { renderRunning(); return; }
        if (mode === "cleared") { renderResult("스트라이크!", "모든 핀을 쓰러뜨렸습니다!", COL.success); return; }
        if (mode === "failed") { renderResult("실패", "공이 모두 빠졌습니다...", COL.danger); return; }
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), pinsHit, gutters, roundNum, ballActive: ball ? ball.active : false });
      }

      function frame(ts) {
        const dt = lastTimestamp ? Math.min((ts - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = ts; update(dt); render();
        animFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        render(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { startGame(); clearGame(); render(); },
        forceFail() { startGame(); failGame("debug_force_fail"); render(); },
      };

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
      reportReady(); render(); canvas.focus();
      animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
