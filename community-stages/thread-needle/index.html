<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>실 꿰기 달인</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #FDF6EC; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 140, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80, 50, 30, 0.92);
        color: #FDF6EC; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #FDF6EC; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 120, 80, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">실 꿰기 달인. 화면을 터치 드래그하여 실 끝을 바늘구멍에 통과시키세요. 모바일에서는 터치 드래그로 조작합니다. 35초 제한. 실패 5회 시 게임 오버.</p>
    <canvas id="game" width="960" height="540" aria-label="실 꿰기 달인" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "thread-needle",
        title: "실 꿰기 달인",
        description: "흔들리는 실을 정밀하게 드래그하여 바늘구멍을 통과시키세요",
        creator: "jungcollin",
        genre: "Precision drag",
        clearCondition: "바늘 8개를 꿰면 클리어",
        failCondition: "시간 초과 또는 실패 5회",
        controls: "터치 드래그로 실을 바늘구멍에 맞추세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#FDF6EC", bgDark: "#EDE0D0",
        text: "#5A3E28", textLight: "rgba(90, 62, 40, 0.5)",
        needle: "#8C8C8C", needleEye: "#D4A050",
        thread: "#C46040", threadLight: "#E08060",
        accent: "#C47840", success: "#70A868", fail: "#C06050",
        fabric: "#F0E4D4",
      };

      const DURATION = 35;
      const TARGET_NEEDLES = 8;
      const MAX_FAILS = 5;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      let threaded = 0;
      let fails = 0;
      let shake = 0;
      let flashAlpha = 0;
      let flashColor = COL.success;
      let clearAnim = 0;

      // Needle
      let needle = { x: CX + 80, y: CY, eyeRadius: 12, wobble: 0, wobbleSpeed: 1.5 };

      // Thread tip (player controls)
      let threadTip = { x: CX - 120, y: CY };
      let threadTarget = { x: CX - 120, y: CY };
      let isDragging = false;

      // Thread trail
      let threadTrail = [];

      // Success animation
      let successFlash = 0;
      let threadedAnim = 0;

      // Particles
      let particles = [];

      // Difficulty scaling
      function getDifficulty() {
        const d = threaded / TARGET_NEEDLES;
        return {
          wobbleSpeed: 1.5 + d * 3,
          wobbleAmplitude: 15 + d * 20,
          eyeRadius: 14 - d * 4,
        };
      }

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(30, 100);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: rand(2, 5),
          });
        }
      }

      function setupNeedle() {
        const diff = getDifficulty();
        needle.wobbleSpeed = diff.wobbleSpeed;
        needle.eyeRadius = diff.eyeRadius;
        needle.x = CX + rand(40, 160);
        needle.y = CY + rand(-80, 80);
        needle.wobble = rand(0, Math.PI * 2);
        threadTip = { x: CX - 120, y: needle.y };
        threadTarget = { x: CX - 120, y: needle.y };
        threadTrail = [];
        isDragging = false;
      }

      function reset() {
        elapsed = 0; threaded = 0; fails = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        successFlash = 0; threadedAnim = 0;
        particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        setupNeedle();
      }

      function checkThread() {
        const diff = getDifficulty();
        const wobbleY = Math.sin(needle.wobble) * diff.wobbleAmplitude;
        const eyeY = needle.y + wobbleY;
        const d = dist(threadTip.x, threadTip.y, needle.x, eyeY);

        if (threadTip.x >= needle.x - 5) {
          if (d < needle.eyeRadius + 3) {
            // Success!
            threaded++;
            successFlash = 1;
            flashAlpha = 0.2; flashColor = COL.success;
            spawnParticles(needle.x, eyeY, reducedMotion ? 4 : 10, COL.needleEye);

            if (threaded >= TARGET_NEEDLES) {
              mode = "clear"; clearAnim = 0;
              window.relayStageResult.status = "cleared"; reportCleared();
            } else {
              setupNeedle();
            }
          } else {
            // Missed the eye
            fails++;
            shake = 8;
            flashAlpha = 0.3; flashColor = COL.fail;
            spawnParticles(threadTip.x, threadTip.y, reducedMotion ? 3 : 6, COL.fail);

            if (fails >= MAX_FAILS) {
              mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("실패 횟수 초과");
            } else {
              setupNeedle();
            }
          }
        }
      }

      function update(dt) {
        if (mode !== "running" && mode !== "clear") {
          shake *= 0.88; if (shake < 0.3) shake = 0; flashAlpha *= 0.92;
          if (mode === "clear") clearAnim = clamp(clearAnim + dt * 1.5, 0, 1);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt;
            p.life -= dt * 2.5;
            if (p.life <= 0) particles.splice(i, 1);
          }
          return;
        }

        if (mode === "running") elapsed += dt;

        // Needle wobble
        const diff = getDifficulty();
        needle.wobble += diff.wobbleSpeed * dt;

        // Thread movement (smooth lerp toward target)
        threadTip.x = lerp(threadTip.x, threadTarget.x, clamp(10 * dt, 0, 1));
        threadTip.y = lerp(threadTip.y, threadTarget.y, clamp(10 * dt, 0, 1));

        // Thread trail
        threadTrail.unshift({ x: threadTip.x, y: threadTip.y });
        if (threadTrail.length > 20) threadTrail.pop();

        // Check if thread reached needle
        if (isDragging) checkThread();

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.96; p.vy *= 0.96; p.life -= dt * 2.5;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;
        successFlash *= 0.93;
        threadedAnim *= 0.95;

        if (mode === "running" && elapsed >= DURATION) {
          mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("시간 초과");
        }
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background
        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);

        // Fabric texture
        if (!reducedMotion) {
          ctx.globalAlpha = 0.03; ctx.strokeStyle = COL.text;
          ctx.lineWidth = 0.5;
          for (let x = 0; x < W; x += 20) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
          }
          for (let y = 0; y < H; y += 20) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
          }
          ctx.globalAlpha = 1;
        }

        if (mode === "running" || mode === "clear" || mode === "failed") drawGame();

        if (flashAlpha > 0.01) {
          ctx.fillStyle = flashColor === COL.fail ? `rgba(192,96,80,${flashAlpha})` : `rgba(112,168,104,${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        for (const p of particles) {
          ctx.globalAlpha = clamp(p.life, 0, 1);
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawGame() {
        const diff = getDifficulty();
        const wobbleY = Math.sin(needle.wobble) * diff.wobbleAmplitude;
        const eyeX = needle.x;
        const eyeY = needle.y + wobbleY;

        // Guide line (faint)
        ctx.strokeStyle = "rgba(90, 62, 40, 0.08)";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(CX - 200, eyeY); ctx.lineTo(eyeX - 30, eyeY); ctx.stroke();
        ctx.setLineDash([]);

        // Needle body
        ctx.strokeStyle = COL.needle;
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(eyeX, eyeY - 40);
        ctx.lineTo(eyeX, eyeY + 40);
        ctx.stroke();

        // Needle point
        ctx.fillStyle = COL.needle;
        ctx.beginPath();
        ctx.moveTo(eyeX - 3, eyeY + 40);
        ctx.lineTo(eyeX + 3, eyeY + 40);
        ctx.lineTo(eyeX, eyeY + 55);
        ctx.closePath();
        ctx.fill();

        // Needle eye
        ctx.strokeStyle = COL.needleEye;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.ellipse(eyeX, eyeY, needle.eyeRadius, needle.eyeRadius * 0.6, 0, 0, Math.PI * 2);
        ctx.stroke();

        // Eye glow hint
        ctx.fillStyle = `rgba(212, 160, 80, 0.1)`;
        ctx.beginPath();
        ctx.ellipse(eyeX, eyeY, needle.eyeRadius + 4, needle.eyeRadius * 0.6 + 4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Thread trail
        if (threadTrail.length > 1) {
          ctx.strokeStyle = COL.thread;
          ctx.lineWidth = 2.5;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(threadTrail[0].x, threadTrail[0].y);
          for (let i = 1; i < threadTrail.length; i++) {
            const t = threadTrail[i];
            ctx.globalAlpha = 1 - i / threadTrail.length;
            ctx.lineTo(t.x, t.y);
          }
          ctx.globalAlpha = 1;
          ctx.stroke();
        }

        // Thread tip
        ctx.fillStyle = COL.thread;
        ctx.beginPath();
        ctx.arc(threadTip.x, threadTip.y, 4, 0, Math.PI * 2);
        ctx.fill();

        // Thread origin
        ctx.fillStyle = COL.threadLight;
        ctx.beginPath();
        ctx.arc(CX - 200, threadTip.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = COL.thread;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(CX - 200, threadTip.y);
        ctx.lineTo(threadTip.x, threadTip.y);
        ctx.stroke();

        // Distance indicator
        const d = dist(threadTip.x, threadTip.y, eyeX, eyeY);
        if (d < 60 && isDragging) {
          const closeness = 1 - d / 60;
          ctx.strokeStyle = `rgba(212, 160, 80, ${closeness * 0.4})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.ellipse(eyeX, eyeY, needle.eyeRadius + 8, needle.eyeRadius * 0.6 + 8, 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        drawHUD();
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = `500 16px "Segoe UI", sans-serif`;
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.fillStyle = timeLeft < 10 ? COL.fail : COL.text;
        ctx.fillText(`${Math.ceil(timeLeft)}`, 24, 20);

        ctx.fillStyle = COL.text; ctx.textAlign = "center";
        ctx.fillText(`${threaded} / ${TARGET_NEEDLES}`, CX, 20);

        // Threaded dots
        for (let i = 0; i < TARGET_NEEDLES; i++) {
          const ix = CX - (TARGET_NEEDLES - 1) * 10 + i * 20;
          ctx.beginPath(); ctx.arc(ix, 44, 5, 0, Math.PI * 2);
          if (i < threaded) { ctx.fillStyle = COL.needleEye; ctx.fill(); }
          else { ctx.strokeStyle = COL.textLight; ctx.lineWidth = 1.5; ctx.stroke(); }
        }

        ctx.textAlign = "right";
        ctx.fillStyle = fails > 2 ? COL.fail : COL.text;
        ctx.fillText(`\u2717 ${fails}/${MAX_FAILS}`, W - 24, 20);

        const barW = W - 48;
        ctx.fillStyle = COL.bgDark; ctx.fillRect(24, 58, barW, 3);
        const progress = clamp(elapsed / DURATION, 0, 1);
        ctx.fillStyle = progress > 0.75 ? COL.fail : COL.accent;
        ctx.fillRect(24, 58, barW * (1 - progress), 3);
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r); ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r); ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r); ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r); ctx.closePath();
      }

      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40); const lineH = 26;
        const cardH = 50 + lines.length * lineH + 36;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(253,246,236,0.96)"; roundRect(cardX, cardY, cardW, cardH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cardX + 16, cardY, cardW - 32, 3);
        ctx.fillStyle = COL.text; ctx.font = `bold 24px "Segoe UI", sans-serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cardY + 16);
        ctx.font = `400 14px "Segoe UI", sans-serif`; ctx.fillStyle = "rgba(90,62,40,0.7)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * lineH);
        ctx.fillStyle = "rgba(90,62,40,0.35)"; ctx.font = `400 13px "Segoe UI", sans-serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(253,246,236,0.5)"; ctx.fillRect(0, 0, W, H);
        drawCard("실 꿰기 달인", [
          "흔들리는 실을 드래그하여",
          "바늘구멍을 통과시키세요", "",
          "조작: 화면 터치 드래그",
          "클리어: 바늘 8개 꿰기",
          "실패: 시간초과 또는 실패 5회",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(253,246,236,${clearAnim * 0.6})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("꿰기 완성!", [`${Math.ceil(elapsed)}초 만에 완료`, `실패: ${fails}회`], COL.success);
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(60,30,20,0.25)"; ctx.fillRect(0, 0, W, H);
        const reason = elapsed >= DURATION ? "시간이 다했습니다" : "실패가 너무 많습니다";
        drawCard("실패", [reason, `완성: ${threaded} / ${TARGET_NEEDLES}`, `실패: ${fails}회`], COL.fail);
      }

      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        isDragging = true;
        const p = getCanvasPos(e.clientX, e.clientY);
        threadTarget.x = p.x; threadTarget.y = p.y;
      });
      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || !isDragging) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        threadTarget.x = p.x; threadTarget.y = p.y;
      });
      canvas.addEventListener("pointerup", () => { isDragging = false; });
      canvas.addEventListener("pointercancel", () => { isDragging = false; });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (mode !== "running") handleStart(); }
      });

      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), threaded, fails, result: window.relayStageResult.status });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; threaded = TARGET_NEEDLES; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; fails = MAX_FAILS; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      setupNeedle();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
