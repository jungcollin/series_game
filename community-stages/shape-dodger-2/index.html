<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>도형 피하기 2</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">도형 피하기 2. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 화면 터치로 이동 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="도형 피하기 2" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("shape-dodger-2") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "떨어지는 도형들을 피해 10초 동안 살아남으세요.",
      };

      let player = { x: VIEW.width / 2, y: VIEW.height / 2, targetX: VIEW.width / 2, targetY: VIEW.height / 2, radius: 15, speed: 600 };
      let obstacles = [];
      let obstacleTimer = 0;

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;

        player.x = VIEW.width / 2;
        player.y = VIEW.height / 2;
        player.targetX = VIEW.width / 2;
        player.targetY = VIEW.height / 2;
        obstacles = [];
        obstacleTimer = 0;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (state.elapsed >= 10) {
            clearStage();
            return;
          }

          const dx = player.targetX - player.x;
          const dy = player.targetY - player.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 0) {
            const moveDist = Math.min(dist, player.speed * dt);
            player.x += (dx / dist) * moveDist;
            player.y += (dy / dist) * moveDist;
          }

          player.x = Math.max(player.radius, Math.min(VIEW.width - player.radius, player.x));
          player.y = Math.max(player.radius, Math.min(VIEW.height - player.radius, player.y));

          obstacleTimer -= dt;
          if (obstacleTimer <= 0) {
            const spawnRate = Math.max(0.1, 0.4 - (state.elapsed / 10) * 0.3);
            obstacleTimer = spawnRate;

            const size = 15 + Math.random() * 20;
            obstacles.push({
              x: Math.random() * VIEW.width,
              y: -size,
              size: size,
              speed: 200 + Math.random() * 300 + (state.elapsed * 20),
              type: Math.random() < 0.5 ? "rect" : "circle"
            });
          }

          for (let i = obstacles.length - 1; i >= 0; i--) {
            const obs = obstacles[i];
            obs.y += obs.speed * dt;

            let collision = false;
            if (obs.type === "circle") {
              const odx = player.x - obs.x;
              const ody = player.y - obs.y;
              const dist = Math.sqrt(odx * odx + ody * ody);
              if (dist < player.radius + obs.size / 2) {
                collision = true;
              }
            } else {
              const closestX = Math.max(obs.x - obs.size / 2, Math.min(player.x, obs.x + obs.size / 2));
              const closestY = Math.max(obs.y - obs.size / 2, Math.min(player.y, obs.y + obs.size / 2));
              const odx = player.x - closestX;
              const ody = player.y - closestY;
              if (odx * odx + ody * ody < player.radius * player.radius) {
                collision = true;
              }
            }

            if (collision) {
              failStage("도형과 충돌");
              return;
            }

            if (obs.y - obs.size > VIEW.height) {
              obstacles.splice(i, 1);
            }
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function render() {
        if (state.mode === "menu") {
          renderCard("도형 피하기 2", [
            "떨어지는 도형들을 피해 10초 동안 살아남으세요.",
            "조작: 화면 터치로 이동",
            "클리어 조건: 10초 버티기",
            "실패 조건: 도형과 충돌",
            "터치 또는 Enter로 시작. 모바일 화면 조작도 함께 구현하세요.",
            "390px 모바일에서도 메뉴가 가로로 깨지지 않게 유지하세요.",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          ctx.fillStyle = "#0f172a";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          for (const obs of obstacles) {
            ctx.fillStyle = "#ef4444";
            ctx.beginPath();
            if (obs.type === "circle") {
              ctx.arc(obs.x, obs.y, obs.size / 2, 0, Math.PI * 2);
              ctx.fill();
            } else {
              ctx.fillRect(obs.x - obs.size / 2, obs.y - obs.size / 2, obs.size, obs.size);
            }
          }

          ctx.fillStyle = "#3b82f6";
          ctx.beginPath();
          ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
          ctx.beginPath();
          ctx.arc(player.targetX, player.targetY, player.radius * 0.8, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#f8fafc";
          ctx.font = "700 32px Trebuchet MS";
          ctx.textAlign = "center";
          const timeLeft = Math.max(0, 10 - state.elapsed).toFixed(1);
          ctx.fillText(`버틴 시간: ${state.elapsed.toFixed(1)}s / 10.0s`, VIEW.width / 2, 40);
          ctx.textAlign = "left";

          return;
        }

        if (state.mode === "failed") {
          renderCard("실패", [
            "도형과 충돌",
            "공유 목숨 1개가 즉시 종료되었습니다.",
            "최종 스테이지에서는 실제 실패 원인을 보여주세요.",
          ], "#b91c1c");
          return;
        }

        renderCard("클리어", [
          "10초 버티기",
          "호스트가 다음 미플레이 스테이지를 랜덤으로 선택합니다.",
          "최종 스테이지에서는 실제 클리어 연출로 교체하세요.",
        ], "#15803d");
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "shape-dodger-2",
        title: "도형 피하기 2",
        creator: "Jules",
        genre: "아케이드",
        clearCondition: "10초 버티기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      function handleMoveInput(clientX, clientY) {
        if (state.mode !== "running") return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        player.targetX = (clientX - rect.left) * scaleX;
        player.targetY = (clientY - rect.top) * scaleY;
      }

      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        } else {
          event.preventDefault();
          const touch = event.touches[0];
          handleMoveInput(touch.clientX, touch.clientY);
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", (event) => {
        if (state.mode === "running") {
          event.preventDefault();
          const touch = event.touches[0];
          handleMoveInput(touch.clientX, touch.clientY);
        }
      }, { passive: false });

      let isMouseDown = false;
      canvas.addEventListener("mousedown", (event) => {
        if (state.mode === "running") {
          isMouseDown = true;
          handleMoveInput(event.clientX, event.clientY);
        }
      });
      canvas.addEventListener("mousemove", (event) => {
        if (state.mode === "running" && isMouseDown) {
          handleMoveInput(event.clientX, event.clientY);
        }
      });
      window.addEventListener("mouseup", () => {
        isMouseDown = false;
      });

      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
