<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>화석 발굴</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #f0e4d0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(160, 130, 90, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80, 60, 30, 0.92);
        color: #f0e4d0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f0e4d0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(160, 120, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">화석 발굴. 암석을 터치하여 조심스럽게 발굴하세요. 모바일에서는 화면 터치로 암석을 깹니다. 화석 5개를 발굴하면 클리어.</p>
    <canvas id="game" width="960" height="540" aria-label="화석 발굴" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "fossil-dig",
        title: "화석 발굴",
        description: "암석을 탭하여 숨겨진 화석을 발굴하세요",
        creator: "jungcollin",
        genre: "Excavation tap",
        clearCondition: "화석 5개를 발굴하면 클리어",
        failCondition: "화석 3개를 손상시키면 실패",
        controls: "암석을 터치하여 조심스럽게 발굴",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      // Colors: sandy beige / terracotta / bone white
      const COL = {
        bg: "#f0e4d0", rock: "#b89a6a", rockDark: "#8a7040",
        rockLight: "#d4be94", fossil: "#e8dcc0",
        fossilBone: "#f5efe0", fossilDark: "#c8b898",
        dirt: "#a08050", dirtLight: "#c4a878",
        text: "#4a3820", accent: "#b07830",
        fail: "#b03030", success: "#2e8b57",
      };

      const TARGET_FOSSILS = 5, MAX_DAMAGE = 3;
      const GRID_COLS = 8, GRID_ROWS = 6;
      const CELL = 56;
      const GRID_X = CX - (GRID_COLS * CELL) / 2;
      const GRID_Y = CY - (GRID_ROWS * CELL) / 2 + 20;

      let mode = "menu", elapsed = 0, fossilsFound = 0, damage = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0, successFlash = 0;
      let particles = [];

      // Grid cells: each has rock layers (3=full, 2=cracked, 1=thin, 0=exposed)
      // Some cells contain fossil parts
      let cells = [];
      let fossilCells = []; // set of indices that are fossil

      // Fossil shapes (relative positions)
      const FOSSIL_SHAPES = [
        // Fish: horizontal
        [{dr:0,dc:0},{dr:0,dc:1},{dr:0,dc:2},{dr:0,dc:3}],
        // Leaf: diagonal
        [{dr:0,dc:0},{dr:1,dc:1},{dr:2,dc:2}],
        // Shell: L shape
        [{dr:0,dc:0},{dr:1,dc:0},{dr:2,dc:0},{dr:2,dc:1}],
        // Bone: T shape
        [{dr:0,dc:0},{dr:0,dc:1},{dr:0,dc:2},{dr:1,dc:1}],
        // Claw: hook
        [{dr:0,dc:0},{dr:1,dc:0},{dr:1,dc:1},{dr:1,dc:2}],
      ];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), spd = rand(30, 90);
          particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 20, life: 1, color, size: rand(2, 5) });
        }
      }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function generateDigSite() {
        cells = [];
        fossilCells = new Set();

        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            cells.push({ rock: 3, hasFossil: false, damaged: false, revealAnim: 0 });
          }
        }

        // Place fossils
        const numFossils = 2 + Math.floor(Math.random() * 2); // 2-3 fossils per dig
        const usedCells = new Set();

        for (let f = 0; f < numFossils; f++) {
          const shape = FOSSIL_SHAPES[Math.floor(Math.random() * FOSSIL_SHAPES.length)];
          let placed = false;
          for (let attempt = 0; attempt < 30; attempt++) {
            const startR = Math.floor(Math.random() * (GRID_ROWS - 3));
            const startC = Math.floor(Math.random() * (GRID_COLS - 4));
            const indices = shape.map(s => (startR + s.dr) * GRID_COLS + (startC + s.dc));
            const valid = indices.every(idx => idx >= 0 && idx < GRID_COLS * GRID_ROWS && !usedCells.has(idx));
            if (valid) {
              indices.forEach(idx => {
                cells[idx].hasFossil = true;
                fossilCells.add(idx);
                usedCells.add(idx);
              });
              placed = true;
              break;
            }
          }
        }
      }

      function reset() {
        elapsed = 0; fossilsFound = 0; damage = 0;
        shake = 0; clearAnim = 0; successFlash = 0; particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateDigSite();
      }

      function checkFossilComplete() {
        // Check if any fossil shape is fully exposed
        let allFossilsExposed = true;
        for (const idx of fossilCells) {
          if (cells[idx].rock > 0) { allFossilsExposed = false; break; }
        }
        if (allFossilsExposed && fossilCells.size > 0) {
          fossilsFound += fossilCells.size;
          successFlash = 1;
          if (fossilsFound >= TARGET_FOSSILS) {
            mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared();
          } else {
            setTimeout(() => { if (mode === "running") generateDigSite(); }, 600);
          }
        }
      }

      function handleTap(cx, cy) {
        if (mode !== "running") return;
        const col = Math.floor((cx - GRID_X) / CELL);
        const row = Math.floor((cy - GRID_Y) / CELL);
        if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return;

        const idx = row * GRID_COLS + col;
        const cell = cells[idx];
        if (cell.rock <= 0) return;

        cell.rock--;
        const px = GRID_X + col * CELL + CELL / 2;
        const py = GRID_Y + row * CELL + CELL / 2;
        spawnParticles(px, py, reducedMotion ? 3 : 6, COL.dirtLight);

        if (cell.rock === 0 && cell.hasFossil) {
          cell.revealAnim = 1;
          spawnParticles(px, py, reducedMotion ? 4 : 10, COL.fossilBone);
          checkFossilComplete();
        }

        // If we tap too many non-fossil cells that are already exposed... check for over-digging
        // Damage if tapping a fossil cell when rock is already 0 (hitting exposed fossil)
        if (cell.rock === 0 && !cell.hasFossil) {
          // Dig empty - no penalty, just wasted tap
        }
      }

      // Extra mechanic: double-tapping exposed fossil damages it
      let lastTapIdx = -1, lastTapTime = 0;
      function handleTapWithDamage(cx, cy) {
        if (mode !== "running") return;
        const col = Math.floor((cx - GRID_X) / CELL);
        const row = Math.floor((cy - GRID_Y) / CELL);
        if (col < 0 || col >= GRID_COLS || row < 0 || row >= GRID_ROWS) return;
        const idx = row * GRID_COLS + col;
        const cell = cells[idx];

        if (cell.rock > 0) {
          cell.rock--;
          const px = GRID_X + col * CELL + CELL / 2;
          const py = GRID_Y + row * CELL + CELL / 2;
          spawnParticles(px, py, reducedMotion ? 3 : 6, COL.dirtLight);

          if (cell.rock === 0) {
            cell.revealAnim = 1;
            if (cell.hasFossil) {
              spawnParticles(px, py, reducedMotion ? 4 : 10, COL.fossilBone);
            }
            checkFossilComplete();
          }
        } else if (cell.hasFossil && !cell.damaged) {
          // Hitting exposed fossil = damage!
          cell.damaged = true;
          damage++;
          shake = 10;
          const px = GRID_X + col * CELL + CELL / 2;
          const py = GRID_Y + row * CELL + CELL / 2;
          spawnParticles(px, py, reducedMotion ? 3 : 8, COL.fail);
          if (damage >= MAX_DAMAGE) {
            mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("화석 손상 3회");
          }
        }
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 120 * dt; p.life -= dt * 2.2;
          if (p.life <= 0) particles.splice(i, 1);
        }
        for (const c of cells) {
          if (c.revealAnim > 0) c.revealAnim *= 0.92;
        }
        shake *= 0.88; if (shake < 0.3) shake = 0;
        successFlash *= 0.92;
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);

        // Layered earth background
        ctx.fillStyle = "#d8c8a8"; ctx.fillRect(0, H * 0.15, W, H * 0.85);
        ctx.fillStyle = "#c8b898"; ctx.fillRect(0, H * 0.45, W, H * 0.55);
        ctx.fillStyle = "#b8a888"; ctx.fillRect(0, H * 0.75, W, H * 0.25);

        if (mode === "running" || mode === "clear" || mode === "failed") {
          drawGrid();
          drawParticles();
          if (mode === "running") drawHUD();
        }

        if (successFlash > 0.01) { ctx.fillStyle = `rgba(46, 139, 87, ${successFlash * 0.12})`; ctx.fillRect(0, 0, W, H); }
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawGrid() {
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            const idx = r * GRID_COLS + c;
            const cell = cells[idx];
            const x = GRID_X + c * CELL;
            const y = GRID_Y + r * CELL;
            const cx = x + CELL / 2;
            const cy = y + CELL / 2;

            // Background of cell
            ctx.fillStyle = "#c8b090";
            ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);

            if (cell.rock > 0) {
              // Rock layers
              const alpha = cell.rock / 3;
              const rockColors = [COL.rockLight, COL.rock, COL.rockDark];
              ctx.fillStyle = rockColors[3 - cell.rock] || COL.rock;
              ctx.globalAlpha = 0.3 + alpha * 0.7;
              ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
              ctx.globalAlpha = 1;

              // Crack lines for partially broken
              if (cell.rock < 3) {
                ctx.strokeStyle = "rgba(200, 180, 150, 0.6)";
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + 8, y + 8);
                ctx.lineTo(cx + rand(-5, 5), cy + rand(-5, 5));
                ctx.lineTo(x + CELL - 8, y + CELL - 8);
                ctx.stroke();
              }

              // Hint: slight color difference for fossil cells at rock=1
              if (cell.rock === 1 && cell.hasFossil) {
                ctx.fillStyle = "rgba(245, 239, 224, 0.25)";
                ctx.fillRect(x + 6, y + 6, CELL - 12, CELL - 12);
              }
            } else {
              // Exposed
              if (cell.hasFossil) {
                // Fossil piece
                const revealScale = 1 + cell.revealAnim * 0.3;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(revealScale, revealScale);

                ctx.fillStyle = cell.damaged ? "#d08080" : COL.fossilBone;
                ctx.beginPath();
                ctx.arc(0, 0, CELL / 2 - 6, 0, Math.PI * 2);
                ctx.fill();

                // Bone texture
                ctx.fillStyle = cell.damaged ? "#c06060" : COL.fossilDark;
                ctx.beginPath();
                ctx.arc(-4, -4, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(6, 3, 4, 0, Math.PI * 2);
                ctx.fill();

                if (cell.damaged) {
                  // Crack mark
                  ctx.strokeStyle = COL.fail;
                  ctx.lineWidth = 2;
                  ctx.beginPath();
                  ctx.moveTo(-8, -8); ctx.lineTo(8, 8);
                  ctx.moveTo(8, -8); ctx.lineTo(-8, 8);
                  ctx.stroke();
                }

                ctx.restore();
              } else {
                // Empty dirt
                ctx.fillStyle = "#b8a070";
                ctx.fillRect(x + 2, y + 2, CELL - 4, CELL - 4);
              }
            }
          }
        }

        // Grid lines
        ctx.strokeStyle = "rgba(100, 80, 50, 0.15)"; ctx.lineWidth = 1;
        for (let r = 0; r <= GRID_ROWS; r++) { ctx.beginPath(); ctx.moveTo(GRID_X, GRID_Y + r * CELL); ctx.lineTo(GRID_X + GRID_COLS * CELL, GRID_Y + r * CELL); ctx.stroke(); }
        for (let c = 0; c <= GRID_COLS; c++) { ctx.beginPath(); ctx.moveTo(GRID_X + c * CELL, GRID_Y); ctx.lineTo(GRID_X + c * CELL, GRID_Y + GRID_ROWS * CELL); ctx.stroke(); }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fill(); ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = "600 16px 'Segoe UI', sans-serif";
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`화석 ${fossilsFound} / ${TARGET_FOSSILS}`, 24, 16);
        ctx.textAlign = "right";
        const safe = MAX_DAMAGE - damage;
        let h = "";
        for (let i = 0; i < MAX_DAMAGE; i++) h += i < safe ? "●" : "○";
        ctx.fillStyle = damage > 0 ? COL.fail : COL.text;
        ctx.fillText(h, W - 24, 16);
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40), cardH = 42 + lines.length * 28 + 44;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(240, 228, 208, 0.95)"; ctx.beginPath(); roundRect(cardX, cardY, cardW, cardH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cardX + 14, cardY, cardW - 28, 3);
        ctx.fillStyle = COL.text; ctx.font = "bold 22px 'Segoe UI', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 16);
        ctx.font = "400 14px 'Segoe UI', sans-serif"; ctx.fillStyle = "rgba(74, 56, 32, 0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 48 + i * 28);
        ctx.fillStyle = "rgba(74, 56, 32, 0.4)"; ctx.font = "400 13px 'Segoe UI', sans-serif";
        ctx.fillText("TAP 또는 ENTER", CX, cardY + cardH - 24);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(240, 228, 208, 0.5)"; ctx.fillRect(0, 0, W, H);
        drawCard("화석 발굴", ["암석을 터치해 화석을 찾으세요", "", "조작: 암석 터치로 발굴 (3번 탭)", "클리어: 화석 5개 발굴", "실패: 노출된 화석 3번 타격"], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(240, 228, 208, ${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("발굴 성공!", [`${Math.ceil(elapsed)}초 만에 완료`, `화석 ${fossilsFound}개 발굴`], COL.success);
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(80, 40, 20, 0.3)"; ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["화석을 너무 많이 손상시켰습니다", `화석 ${fossilsFound} / ${TARGET_FOSSILS} 발굴`], COL.fail);
      }

      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
      }

      function handleStart() { if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; } }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        handleTapWithDamage(p.x, p.y);
      });
      canvas.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); } });

      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT); lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), fossilsFound, damage, result: window.relayStageResult.status });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT); draw(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; fossilsFound = TARGET_FOSSILS; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; damage = MAX_DAMAGE; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      generateDigSite(); reportReady(); animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
