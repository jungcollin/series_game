<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storm Archive: Mirror Heist</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        background: #08111f;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas,
      button {
        -webkit-tap-highlight-color: rgba(103, 232, 249, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 17, 31, 0.96);
        color: #f8fafc;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 50% 45%, #112746 0%, #07101d 52%, #030711 100%);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(186, 230, 253, 0.95);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 12px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__frame {
        pointer-events: auto;
        width: min(100%, 372px);
        display: grid;
        gap: 10px;
      }

      .mobile-controls__row {
        display: grid;
        gap: 10px;
      }

      .mobile-controls__row--move {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .mobile-controls__row--actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 18px;
        min-height: 56px;
        padding: 0 12px;
        background:
          linear-gradient(180deg, rgba(30, 41, 59, 0.86), rgba(8, 15, 28, 0.92)),
          rgba(8, 15, 28, 0.92);
        color: #e2e8f0;
        font: 700 15px/1 "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        letter-spacing: 0.02em;
        box-shadow:
          0 12px 28px rgba(2, 6, 23, 0.38),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: translateY(1px) scale(0.98);
        background:
          linear-gradient(180deg, rgba(8, 145, 178, 0.88), rgba(3, 7, 18, 0.96)),
          rgba(8, 15, 28, 0.92);
        color: #f8fafc;
      }

      .mobile-btn--ghost {
        opacity: 0;
        pointer-events: none;
      }

      .mobile-btn--action {
        min-height: 60px;
        font-size: 14px;
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls__frame {
          width: min(100%, 344px);
        }

        .mobile-controls__row {
          gap: 8px;
        }

        .mobile-btn {
          min-height: 52px;
          border-radius: 16px;
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Storm Archive: Mirror Heist. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 이동, 클릭 또는 터치로 패턴 훔치기,
      스페이스 또는 두 손가락 탭으로 패턴 재생, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현
      입니다. 클리어 조건은 축소 구간 끝까지 버티며 서로 다른 패턴 3개로 금고 문을 열면 클리어 이고, 실패 조건은 안전 영역 밖에 오래
      머물거나 감시 시선에 오래 걸리면 즉시 실패 입니다.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Storm Archive: Mirror Heist" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls" aria-label="모바일 조작 버튼">
      <div class="mobile-controls__frame">
        <div class="mobile-controls__row mobile-controls__row--move">
          <button class="mobile-btn mobile-btn--ghost" type="button" aria-hidden="true" tabindex="-1"></button>
          <button class="mobile-btn" type="button" data-control="up" data-active="false" aria-label="위로 이동">▲</button>
          <button class="mobile-btn mobile-btn--ghost" type="button" aria-hidden="true" tabindex="-1"></button>
          <button class="mobile-btn" type="button" data-control="left" data-active="false" aria-label="왼쪽으로 이동">◀</button>
          <button class="mobile-btn" type="button" data-control="down" data-active="false" aria-label="아래로 이동">▼</button>
          <button class="mobile-btn" type="button" data-control="right" data-active="false" aria-label="오른쪽으로 이동">▶</button>
        </div>
        <div class="mobile-controls__row mobile-controls__row--actions">
          <button class="mobile-btn mobile-btn--action" type="button" data-action="steal" aria-label="가까운 감시자 패턴 훔치기">패턴 흡수</button>
          <button class="mobile-btn mobile-btn--action" type="button" data-action="replay" aria-label="금고에 훔친 패턴 재생">패턴 재생</button>
        </div>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const SURVIVAL_TIME = 42;
      const PLAYER_RADIUS = 16;
      const PLAYER_SPEED = 285;
      const STEAL_RADIUS = 72;
      const STEAL_CHANNEL_TIME = 0.72;
      const REPLAY_RADIUS = 82;
      const REPLAY_TIME = 1.05;
      const DETECTION_LIMIT = 2.3;
      const STORM_LIMIT = 1.18;
      const VAULT_CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.53 };
      const relayContext = window.RelayRuntime?.readContext("storm-archive-mirror-theft-shrink") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const META = {
        id: "storm-archive-mirror-theft-shrink",
        title: "Storm Archive: Mirror Heist",
        creator: "jungcollin",
        genre: "Pattern theft stealth / 축소 아레나",
        clearCondition: "축소 구간 끝까지 버티며 서로 다른 패턴 3개로 금고 문을 열면 클리어",
        failCondition: "안전 영역 밖에 오래 머물거나 감시 시선에 오래 걸리면 즉시 실패",
        controls:
          "이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        description: "감시자의 동작 패턴을 훔쳐 복제하고, 폭풍 속 축소 금고실에서 3개 문양을 재생해 탈출하는 잠입 액션",
      };

      const PATTERN_ORDER = ["sweep", "spiral", "needle"];
      const PATTERN_DEFS = {
        sweep: {
          id: "sweep",
          label: "Sweep",
          icon: "ARC",
          color: "#67e8f9",
          accent: "#0ea5e9",
        },
        spiral: {
          id: "spiral",
          label: "Spiral",
          icon: "LOOP",
          color: "#f472b6",
          accent: "#ec4899",
        },
        needle: {
          id: "needle",
          label: "Needle",
          icon: "RUSH",
          color: "#fbbf24",
          accent: "#f97316",
        },
      };

      const input = {
        left: false,
        right: false,
        up: false,
        down: false,
        pointerActive: false,
        pointerX: VAULT_CENTER.x,
        pointerY: VAULT_CENTER.y,
        pointerType: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        sceneTime: 0,
        elapsed: 0,
        lastRunTime: 0,
        lastReason: "",
        lastSuccess: "",
        flash: 0,
        shake: 0,
        player: createPlayer(),
        sentinels: createSentinels(),
        popups: [],
        particles: [],
        echoes: [],
        channel: null,
        replay: null,
        exposure: 0,
        stormExposure: 0,
        inventory: [],
        deposited: [],
        vaultReady: false,
      };

      function createPlayer() {
        return {
          x: VAULT_CENTER.x,
          y: VAULT_CENTER.y + 84,
          radius: PLAYER_RADIUS,
          bob: 0,
          pulse: 0,
          dragTrail: [],
        };
      }

      function createSentinels() {
        return PATTERN_ORDER.map((id, index) => ({
          ...PATTERN_DEFS[id],
          index,
          stolen: false,
          pos: { x: VAULT_CENTER.x, y: VAULT_CENTER.y },
          prev: { x: VAULT_CENTER.x, y: VAULT_CENTER.y },
          vel: { x: 0, y: 0 },
          trail: [],
        }));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function easeOutQuint(t) {
        return 1 - Math.pow(1 - t, 5);
      }

      function length(x, y) {
        return Math.hypot(x, y);
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function normalize(x, y) {
        const size = Math.hypot(x, y) || 1;
        return { x: x / size, y: y / size };
      }

      function safeRadiusAt(time) {
        const progress = clamp(time / SURVIVAL_TIME, 0, 1);
        return lerp(246, 92, Math.pow(progress, 1.08)) + Math.sin(state.sceneTime * 1.8) * (7 - progress * 3);
      }

      function stormIntensityAt(time) {
        return clamp(time / SURVIVAL_TIME, 0, 1);
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.lastReason = "";
        state.lastSuccess = "";
        state.flash = 0.28;
        state.shake = 10;
        state.player = createPlayer();
        state.sentinels = createSentinels();
        state.popups = [];
        state.particles = [];
        state.echoes = [];
        state.channel = null;
        state.replay = null;
        state.exposure = 0;
        state.stormExposure = 0;
        state.inventory = [];
        state.deposited = [];
        state.vaultReady = false;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        pushPopup("거울 대역 잠입 시작", "#bae6fd");
        canvas.focus();
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 0.9;
        state.shake = 18;
        state.channel = null;
        state.replay = null;
        window.relayStageResult.status = "failed";
        burst(state.player.x, state.player.y, "#fda4af", 26, 260);
        pushPopup(reasonToText(reason), "#fecdd3");
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.lastSuccess = "금고 문 개방 완료";
        state.flash = 0.8;
        state.shake = 14;
        window.relayStageResult.status = "cleared";
        burst(VAULT_CENTER.x, VAULT_CENTER.y, "#a7f3d0", 48, 320);
        pushPopup("폭풍 아카이브 탈출 성공", "#d1fae5");
        reportClearedToHost();
      }

      function reasonToText(reason) {
        switch (reason) {
          case "storm":
            return "축소 장벽에 오래 노출되었습니다";
          case "vision":
            return "감시 시선에 오래 걸렸습니다";
          case "vault_locked":
            return "서로 다른 패턴 3개가 모이지 않았습니다";
          default:
            return "잠입이 붕괴되었습니다";
        }
      }

      function patternDisplay(id) {
        const pattern = PATTERN_DEFS[id];
        return pattern ? pattern.label : "Unknown";
      }

      function burst(x, y, color, count, speed) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.16;
          const velocity = speed * (0.35 + Math.random() * 0.9);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: 0.5 + Math.random() * 0.45,
            maxLife: 0.5 + Math.random() * 0.45,
            color,
            size: 1.5 + Math.random() * 5.5,
          });
        }
      }

      function pushPopup(text, color) {
        state.popups.push({
          text,
          color,
          life: 1.7,
          maxLife: 1.7,
          yOffset: 0,
        });
        if (state.popups.length > 5) {
          state.popups.shift();
        }
      }

      function getSentinelPath(id, time) {
        if (id === "sweep") {
          return {
            x: VAULT_CENTER.x + Math.sin(time * 0.98) * 225,
            y: VAULT_CENTER.y - 108 + Math.sin(time * 1.96) * 54,
          };
        }
        if (id === "spiral") {
          const angle = time * 1.02;
          const radius = 116 + Math.sin(time * 1.72) * 54;
          return {
            x: VAULT_CENTER.x + Math.cos(angle) * radius,
            y: VAULT_CENTER.y + Math.sin(angle) * radius * 0.68 - 14,
          };
        }
        const triangle = Math.asin(Math.sin(time * 1.38)) * (2 / Math.PI);
        return {
          x: VAULT_CENTER.x + triangle * 205,
          y: VAULT_CENTER.y + 134 * Math.sin(time * 0.69 + Math.PI / 4),
        };
      }

      function samplePatternPoint(id, t, radiusScale) {
        const radius = radiusScale || 34;
        const centered = clamp(t, 0, 1);
        if (id === "sweep") {
          return {
            x: lerp(-radius * 1.4, radius * 1.4, centered),
            y: Math.sin(centered * Math.PI * 2) * radius * 0.42,
          };
        }
        if (id === "spiral") {
          const angle = centered * Math.PI * 3.4;
          const dist = centered * radius * 1.35;
          return {
            x: Math.cos(angle) * dist,
            y: Math.sin(angle) * dist,
          };
        }
        return {
          x: lerp(-radius * 1.4, radius * 1.4, centered),
          y: (Math.sin(centered * Math.PI * 4) > 0 ? -1 : 1) * radius * 0.58,
        };
      }

      function drawRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function currentShakeOffset() {
        if (state.shake <= 0) {
          return { x: 0, y: 0 };
        }
        return {
          x: (Math.random() - 0.5) * state.shake,
          y: (Math.random() - 0.5) * state.shake,
        };
      }

      function updatePlayer(dt) {
        let moveX = 0;
        let moveY = 0;
        if (input.left) moveX -= 1;
        if (input.right) moveX += 1;
        if (input.up) moveY -= 1;
        if (input.down) moveY += 1;

        if (input.pointerActive) {
          const direction = normalize(input.pointerX - state.player.x, input.pointerY - state.player.y);
          const dist = distance(state.player, { x: input.pointerX, y: input.pointerY });
          if (dist > 7) {
            moveX += direction.x * clamp(dist / 54, 0, 1.25);
            moveY += direction.y * clamp(dist / 54, 0, 1.25);
          }
        }

        const direction = normalize(moveX, moveY);
        const replaySlow = state.replay ? 0.48 : 1;
        state.player.x += direction.x * PLAYER_SPEED * replaySlow * dt;
        state.player.y += direction.y * PLAYER_SPEED * replaySlow * dt;
        state.player.x = clamp(state.player.x, 44, VIEW.width - 44);
        state.player.y = clamp(state.player.y, 52, VIEW.height - 48);
        state.player.bob += dt * (direction.x || direction.y ? 8 : 3.5);
        state.player.pulse += dt * 2.2;
        state.player.dragTrail.push({
          x: state.player.x,
          y: state.player.y,
          life: 0.28,
        });
        if (state.player.dragTrail.length > 14) {
          state.player.dragTrail.shift();
        }
        for (const trail of state.player.dragTrail) {
          trail.life -= dt;
        }
        state.player.dragTrail = state.player.dragTrail.filter((trail) => trail.life > 0);
      }

      function updateSentinels(dt) {
        const intensity = stormIntensityAt(state.elapsed);
        for (const sentinel of state.sentinels) {
          const t = state.sceneTime * (1 + intensity * 0.24) + sentinel.index * 1.9;
          const next = getSentinelPath(sentinel.id, t);
          sentinel.prev.x = sentinel.pos.x;
          sentinel.prev.y = sentinel.pos.y;
          sentinel.pos.x = next.x;
          sentinel.pos.y = next.y;
          sentinel.vel.x = (sentinel.pos.x - sentinel.prev.x) / Math.max(dt, 0.0001);
          sentinel.vel.y = (sentinel.pos.y - sentinel.prev.y) / Math.max(dt, 0.0001);
          sentinel.trail.push({
            x: sentinel.pos.x,
            y: sentinel.pos.y,
            life: sentinel.stolen ? 0.45 : 0.75,
          });
          if (sentinel.trail.length > 22) {
            sentinel.trail.shift();
          }
          for (const node of sentinel.trail) {
            node.life -= dt;
          }
          sentinel.trail = sentinel.trail.filter((node) => node.life > 0);
        }
      }

      function updateChannel(dt) {
        if (!state.channel) {
          return;
        }
        const sentinel = state.sentinels.find((entry) => entry.id === state.channel.id);
        if (!sentinel || sentinel.stolen) {
          state.channel = null;
          return;
        }

        const inRange = distance(state.player, sentinel.pos) <= STEAL_RADIUS;
        if (!inRange) {
          state.channel.progress -= dt * 1.8;
          if (state.channel.progress <= 0) {
            state.channel = null;
            pushPopup("패턴 연결이 끊겼습니다", "#fde68a");
          }
          return;
        }

        state.channel.progress += dt;
        if (Math.random() < 0.25) {
          state.particles.push({
            x: lerp(state.player.x, sentinel.pos.x, Math.random()),
            y: lerp(state.player.y, sentinel.pos.y, Math.random()),
            vx: (Math.random() - 0.5) * 34,
            vy: (Math.random() - 0.5) * 34,
            life: 0.28,
            maxLife: 0.28,
            color: sentinel.color,
            size: 2 + Math.random() * 3,
          });
        }

        if (state.channel.progress >= STEAL_CHANNEL_TIME) {
          sentinel.stolen = true;
          state.channel = null;
          if (!state.inventory.includes(sentinel.id)) {
            state.inventory.push(sentinel.id);
          }
          burst(sentinel.pos.x, sentinel.pos.y, sentinel.color, 20, 210);
          pushPopup(patternDisplay(sentinel.id) + " 패턴 복제", sentinel.color);
          state.flash = Math.max(state.flash, 0.35);
          state.shake = Math.max(state.shake, 7);
        }
      }

      function updateReplay(dt) {
        if (!state.replay) {
          return;
        }
        state.replay.progress += dt / REPLAY_TIME;
        if (Math.random() < 0.4) {
          const point = samplePatternPoint(state.replay.id, Math.random(), 38);
          state.particles.push({
            x: VAULT_CENTER.x + point.x,
            y: VAULT_CENTER.y + point.y,
            vx: (Math.random() - 0.5) * 50,
            vy: (Math.random() - 0.5) * 50,
            life: 0.32,
            maxLife: 0.32,
            color: PATTERN_DEFS[state.replay.id].color,
            size: 2 + Math.random() * 4,
          });
        }

        if (state.replay.progress >= 1) {
          const patternId = state.replay.id;
          if (!state.deposited.includes(patternId)) {
            state.deposited.push(patternId);
          }
          state.echoes.push({
            id: patternId,
            life: 1.25,
            maxLife: 1.25,
          });
          burst(VAULT_CENTER.x, VAULT_CENTER.y, PATTERN_DEFS[patternId].color, 22, 220);
          pushPopup(patternDisplay(patternId) + " 기록 봉인", PATTERN_DEFS[patternId].color);
          state.replay = null;
          if (state.deposited.length >= 3) {
            state.vaultReady = true;
            pushPopup("금고 문이 열린 채로 고정되었습니다", "#86efac");
          }
        }
      }

      function updateExposure(dt) {
        const safeRadius = safeRadiusAt(state.elapsed);
        const distFromCenter = distance(state.player, VAULT_CENTER);
        const outside = distFromCenter > safeRadius;
        const intensity = stormIntensityAt(state.elapsed);

        if (outside) {
          state.stormExposure += dt * (1.05 + intensity * 1.1);
          if (Math.random() < 0.22) {
            state.particles.push({
              x: state.player.x + (Math.random() - 0.5) * 38,
              y: state.player.y + (Math.random() - 0.5) * 38,
              vx: (Math.random() - 0.5) * 30,
              vy: -50 - Math.random() * 80,
              life: 0.25,
              maxLife: 0.25,
              color: "#7dd3fc",
              size: 2 + Math.random() * 2.5,
            });
          }
        } else {
          state.stormExposure = Math.max(0, state.stormExposure - dt * 0.95);
        }

        let seen = false;
        for (const sentinel of state.sentinels) {
          const dir = normalize(sentinel.vel.x || 1, sentinel.vel.y);
          const toPlayer = { x: state.player.x - sentinel.pos.x, y: state.player.y - sentinel.pos.y };
          const dist = length(toPlayer.x, toPlayer.y);
          const range = 168 + intensity * 54 + sentinel.index * 10;
          if (dist > range) {
            continue;
          }
          const target = normalize(toPlayer.x, toPlayer.y);
          const dot = dir.x * target.x + dir.y * target.y;
          const spread = sentinel.stolen ? 0.5 : 0.34;
          if (dot >= 1 - spread) {
            seen = true;
            break;
          }
        }

        if (seen) {
          state.exposure += dt * (0.95 + intensity * 0.8);
        } else {
          state.exposure = Math.max(0, state.exposure - dt * 0.82);
        }

        if (state.stormExposure >= STORM_LIMIT) {
          failStage("storm");
        } else if (state.exposure >= DETECTION_LIMIT) {
          failStage("vision");
        }
      }

      function updateParticles(dt) {
        for (const particle of state.particles) {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          particle.life -= dt;
        }
        state.particles = state.particles.filter((particle) => particle.life > 0);

        for (const popup of state.popups) {
          popup.life -= dt;
          popup.yOffset += dt * 18;
        }
        state.popups = state.popups.filter((popup) => popup.life > 0);

        for (const echo of state.echoes) {
          echo.life -= dt;
        }
        state.echoes = state.echoes.filter((echo) => echo.life > 0);

        state.flash = Math.max(0, state.flash - dt * 1.25);
        state.shake = Math.max(0, state.shake - dt * 24);
      }

      function update(dt) {
        const step = Math.min(MAX_DT, dt);
        state.sceneTime += step;

        if (state.mode !== "running") {
          updateParticles(step);
          return;
        }

        state.elapsed = Math.min(SURVIVAL_TIME, state.elapsed + step);
        updatePlayer(step);
        updateSentinels(step);
        updateChannel(step);
        updateReplay(step);
        updateExposure(step);
        updateParticles(step);

        if (state.mode !== "running") {
          return;
        }

        if (state.elapsed >= SURVIVAL_TIME) {
          if (state.deposited.length >= 3) {
            clearStage();
          } else {
            failStage("vault_locked");
          }
        }
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#091325");
        gradient.addColorStop(0.48, "#0d2138");
        gradient.addColorStop(1, "#040813");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const centerGlow = ctx.createRadialGradient(VAULT_CENTER.x, VAULT_CENTER.y, 0, VAULT_CENTER.x, VAULT_CENTER.y, 360);
        centerGlow.addColorStop(0, "rgba(34, 211, 238, 0.16)");
        centerGlow.addColorStop(0.52, "rgba(56, 189, 248, 0.06)");
        centerGlow.addColorStop(1, "rgba(3, 7, 18, 0)");
        ctx.fillStyle = centerGlow;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.strokeStyle = "rgba(125, 211, 252, 0.08)";
        ctx.lineWidth = 1;
        for (let index = 0; index < 18; index += 1) {
          const y = 36 + index * 28;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(VIEW.width, y + Math.sin(state.sceneTime * 0.8 + index) * 8);
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(148, 163, 184, 0.09)";
        ctx.lineWidth = 1;
        for (let index = 0; index < 28; index += 1) {
          const x = index * 38 + ((state.sceneTime * 28) % 38);
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x - 140, VIEW.height);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawArena() {
        const safeRadius = safeRadiusAt(state.elapsed);
        ctx.save();
        ctx.translate(VAULT_CENTER.x, VAULT_CENTER.y);

        const floor = ctx.createRadialGradient(0, 0, 32, 0, 0, 310);
        floor.addColorStop(0, "rgba(14, 116, 144, 0.18)");
        floor.addColorStop(0.5, "rgba(8, 47, 73, 0.24)");
        floor.addColorStop(1, "rgba(2, 6, 23, 0)");
        ctx.fillStyle = floor;
        ctx.beginPath();
        ctx.arc(0, 0, 300, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(125, 211, 252, 0.08)";
        ctx.lineWidth = 1;
        for (let ring = 0; ring < 6; ring += 1) {
          ctx.beginPath();
          ctx.arc(0, 0, 58 + ring * 42, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(34, 197, 94, 0.16)";
        ctx.lineWidth = 1;
        ctx.setLineDash([5, 8]);
        for (let line = 0; line < 6; line += 1) {
          ctx.beginPath();
          ctx.moveTo(-260 + line * 104, -220);
          ctx.lineTo(-260 + line * 104, 220);
          ctx.stroke();
        }
        ctx.setLineDash([]);

        const danger = ctx.createRadialGradient(0, 0, safeRadius - 40, 0, 0, safeRadius + 110);
        danger.addColorStop(0, "rgba(125, 211, 252, 0)");
        danger.addColorStop(0.72, "rgba(56, 189, 248, 0.06)");
        danger.addColorStop(1, "rgba(244, 63, 94, 0.28)");
        ctx.fillStyle = danger;
        ctx.beginPath();
        ctx.arc(0, 0, safeRadius + 110, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(125, 211, 252, 0.95)";
        ctx.lineWidth = 3;
        ctx.shadowColor = "rgba(56, 189, 248, 0.48)";
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.arc(0, 0, safeRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "rgba(248, 113, 113, 0.24)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(0, 0, safeRadius + 18 + Math.sin(state.sceneTime * 4) * 5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawVault() {
        ctx.save();
        ctx.translate(VAULT_CENTER.x, VAULT_CENTER.y);

        const glow = ctx.createRadialGradient(0, 0, 12, 0, 0, 92);
        glow.addColorStop(0, state.vaultReady ? "rgba(134, 239, 172, 0.42)" : "rgba(103, 232, 249, 0.28)");
        glow.addColorStop(1, "rgba(3, 7, 18, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 92, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(6, 12, 24, 0.92)";
        ctx.strokeStyle = state.vaultReady ? "rgba(134, 239, 172, 0.92)" : "rgba(125, 211, 252, 0.52)";
        ctx.lineWidth = 3;
        drawRoundedRect(-58, -58, 116, 116, 28);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "rgba(148, 163, 184, 0.22)";
        ctx.lineWidth = 1;
        drawRoundedRect(-40, -40, 80, 80, 20);
        ctx.stroke();

        const slotPositions = [
          { x: -24, y: -10 },
          { x: 0, y: 22 },
          { x: 24, y: -10 },
        ];

        for (let index = 0; index < slotPositions.length; index += 1) {
          const slot = slotPositions[index];
          const id = state.deposited[index];
          ctx.save();
          ctx.translate(slot.x, slot.y);
          ctx.strokeStyle = "rgba(148, 163, 184, 0.32)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(0, 0, 14, 0, Math.PI * 2);
          ctx.stroke();
          if (id) {
            const pattern = PATTERN_DEFS[id];
            ctx.strokeStyle = pattern.color;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            for (let step = 0; step <= 18; step += 1) {
              const point = samplePatternPoint(id, step / 18, 8);
              if (step === 0) ctx.moveTo(point.x, point.y);
              else ctx.lineTo(point.x, point.y);
            }
            ctx.stroke();
          }
          ctx.restore();
        }

        if (state.replay) {
          const pattern = PATTERN_DEFS[state.replay.id];
          ctx.strokeStyle = pattern.color;
          ctx.lineWidth = 3;
          ctx.shadowColor = pattern.color;
          ctx.shadowBlur = 18;
          ctx.beginPath();
          for (let step = 0; step <= 26; step += 1) {
            const t = (step / 26) * clamp(state.replay.progress * 1.12, 0, 1);
            const point = samplePatternPoint(state.replay.id, t, 34);
            if (step === 0) ctx.moveTo(point.x, point.y);
            else ctx.lineTo(point.x, point.y);
          }
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        for (const echo of state.echoes) {
          const pattern = PATTERN_DEFS[echo.id];
          const alpha = echo.life / echo.maxLife;
          ctx.strokeStyle = pattern.color.replace(")", "");
          ctx.lineWidth = 1 + alpha * 2.5;
          ctx.globalAlpha = alpha * 0.45;
          ctx.beginPath();
          ctx.arc(0, 0, lerp(32, 78, 1 - alpha), 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        ctx.fillStyle = state.vaultReady ? "#bbf7d0" : "#dbeafe";
        ctx.font = "700 11px Segoe UI";
        ctx.textAlign = "center";
        ctx.fillText(state.vaultReady ? "UNSEALED" : "LOCK CORE", 0, 4);
        ctx.restore();
      }

      function drawSentinels() {
        const intensity = stormIntensityAt(state.elapsed);
        for (const sentinel of state.sentinels) {
          const direction = normalize(sentinel.vel.x || 1, sentinel.vel.y);
          const range = 168 + intensity * 54 + sentinel.index * 10;
          const spread = sentinel.stolen ? 0.9 : 0.68;

          ctx.save();
          for (let index = 0; index < sentinel.trail.length; index += 1) {
            const node = sentinel.trail[index];
            const alpha = node.life * (sentinel.stolen ? 0.18 : 0.36);
            ctx.fillStyle = hexToRgba(sentinel.color, alpha);
            ctx.beginPath();
            ctx.arc(node.x, node.y, 4 + index * 0.08, 0, Math.PI * 2);
            ctx.fill();
          }

          const coneGradient = ctx.createRadialGradient(
            sentinel.pos.x,
            sentinel.pos.y,
            16,
            sentinel.pos.x,
            sentinel.pos.y,
            range
          );
          coneGradient.addColorStop(0, hexToRgba(sentinel.color, sentinel.stolen ? 0.1 : 0.2));
          coneGradient.addColorStop(1, "rgba(3, 7, 18, 0)");
          ctx.fillStyle = coneGradient;
          ctx.beginPath();
          ctx.moveTo(sentinel.pos.x, sentinel.pos.y);
          ctx.arc(
            sentinel.pos.x,
            sentinel.pos.y,
            range,
            Math.atan2(direction.y, direction.x) - spread,
            Math.atan2(direction.y, direction.x) + spread
          );
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = hexToRgba(sentinel.color, sentinel.stolen ? 0.28 : 0.6);
          ctx.lineWidth = sentinel.stolen ? 1.5 : 2.2;
          ctx.beginPath();
          ctx.arc(sentinel.pos.x, sentinel.pos.y, STEAL_RADIUS, 0, Math.PI * 2);
          ctx.stroke();

          ctx.shadowColor = sentinel.color;
          ctx.shadowBlur = sentinel.stolen ? 14 : 24;
          const bodyGradient = ctx.createRadialGradient(
            sentinel.pos.x - 5,
            sentinel.pos.y - 7,
            0,
            sentinel.pos.x,
            sentinel.pos.y,
            24
          );
          bodyGradient.addColorStop(0, "#f8fafc");
          bodyGradient.addColorStop(0.32, sentinel.color);
          bodyGradient.addColorStop(1, sentinel.accent);
          ctx.fillStyle = bodyGradient;
          ctx.beginPath();
          ctx.arc(sentinel.pos.x, sentinel.pos.y, sentinel.stolen ? 11 : 14, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          ctx.strokeStyle = "rgba(255,255,255,0.22)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(sentinel.pos.x, sentinel.pos.y);
          ctx.lineTo(sentinel.pos.x + direction.x * 22, sentinel.pos.y + direction.y * 22);
          ctx.stroke();

          ctx.fillStyle = sentinel.stolen ? "rgba(226,232,240,0.82)" : "#f8fafc";
          ctx.font = "700 9px Segoe UI";
          ctx.textAlign = "center";
          ctx.fillText(sentinel.icon, sentinel.pos.x, sentinel.pos.y + 2.5);
          ctx.restore();
        }
      }

      function drawChannel() {
        if (!state.channel) {
          return;
        }
        const sentinel = state.sentinels.find((entry) => entry.id === state.channel.id);
        if (!sentinel) {
          return;
        }
        const alpha = clamp(state.channel.progress / STEAL_CHANNEL_TIME, 0, 1);
        ctx.save();
        ctx.strokeStyle = sentinel.color;
        ctx.lineWidth = 2.5;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(state.player.x, state.player.y);
        ctx.lineTo(sentinel.pos.x, sentinel.pos.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(sentinel.pos.x, sentinel.pos.y, 20, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * alpha);
        ctx.stroke();
        ctx.restore();
      }

      function drawPlayer() {
        ctx.save();
        for (const trail of state.player.dragTrail) {
          ctx.fillStyle = `rgba(191, 219, 254, ${trail.life * 0.55})`;
          ctx.beginPath();
          ctx.arc(trail.x, trail.y, 5 + trail.life * 8, 0, Math.PI * 2);
          ctx.fill();
        }

        const bobY = Math.sin(state.player.bob) * 2.5;
        const outer = ctx.createRadialGradient(
          state.player.x - 4,
          state.player.y - 6 + bobY,
          0,
          state.player.x,
          state.player.y + bobY,
          32
        );
        outer.addColorStop(0, "#ffffff");
        outer.addColorStop(0.28, "#bfdbfe");
        outer.addColorStop(0.6, "#67e8f9");
        outer.addColorStop(1, "#0369a1");
        ctx.shadowColor = "rgba(56, 189, 248, 0.65)";
        ctx.shadowBlur = 26;
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(state.player.x, state.player.y + bobY, state.player.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(
          state.player.x,
          state.player.y + bobY,
          state.player.radius + 4 + Math.sin(state.player.pulse * 4) * 1.6,
          0,
          Math.PI * 2
        );
        ctx.stroke();

        ctx.fillStyle = "#082f49";
        ctx.beginPath();
        ctx.arc(state.player.x - 4, state.player.y - 2 + bobY, 2, 0, Math.PI * 2);
        ctx.arc(state.player.x + 4, state.player.y - 2 + bobY, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = hexToRgba(particle.color, alpha);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawHUD() {
        ctx.save();
        ctx.fillStyle = "rgba(2, 6, 23, 0.72)";
        drawRoundedRect(18, 16, 316, 96, 22);
        ctx.fill();
        ctx.strokeStyle = "rgba(148, 163, 184, 0.18)";
        ctx.lineWidth = 1;
        drawRoundedRect(18, 16, 316, 96, 22);
        ctx.stroke();

        ctx.fillStyle = "#e2e8f0";
        ctx.font = "700 13px Segoe UI";
        ctx.fillText("STORM ARCHIVE // MIRROR HEIST", 34, 36);
        ctx.fillStyle = "#94a3b8";
        ctx.font = "500 12px Segoe UI";

        ctx.font = "600 11px Segoe UI";
        ctx.fillText("끝까지 버티며 금고 유지", VIEW.width - 156, 58);

        drawInventoryPanel();
        drawPopups();

      }

      function drawMeter(x, y, width, height, ratio, color, label) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.92)";
        drawRoundedRect(x, y, width, height, height * 0.5);
        ctx.fill();
        ctx.fillStyle = hexToRgba(color, 0.92);
        drawRoundedRect(x, y, width * clamp(ratio, 0, 1), height, height * 0.5);
        ctx.fill();
        ctx.fillStyle = "#cbd5e1";
        ctx.font = "600 10px Segoe UI";
        ctx.fillText(label, x, y - 4);

      function drawInventoryPanel() {
        ctx.fillStyle = "rgba(2, 6, 23, 0.72)";
        drawRoundedRect(VIEW.width - 230, 76, 204, 104, 22);
        ctx.fill();
        ctx.strokeStyle = "rgba(148, 163, 184, 0.18)";
        ctx.lineWidth = 1;
        drawRoundedRect(VIEW.width - 230, 76, 204, 104, 22);
        ctx.stroke();

        ctx.fillStyle = "#e2e8f0";
        ctx.font = "700 12px Segoe UI";
        ctx.fillText("복제 패턴", VIEW.width - 212, 98);

        PATTERN_ORDER.forEach((id, index) => {
          const x = VIEW.width - 204 + index * 62;
          const y = 116;
          const acquired = state.inventory.includes(id);
          const deposited = state.deposited.includes(id);
          const pattern = PATTERN_DEFS[id];
          ctx.fillStyle = acquired ? hexToRgba(pattern.color, deposited ? 0.22 : 0.14) : "rgba(15, 23, 42, 0.94)";
          ctx.strokeStyle = acquired ? pattern.color : "rgba(148, 163, 184, 0.24)";
          ctx.lineWidth = 1.5;
          drawRoundedRect(x, y, 50, 46, 16);
          ctx.fill();
          ctx.stroke();
          if (acquired) {
            ctx.strokeStyle = pattern.color;
            ctx.lineWidth = 2;

            for (let step = 0; step <= 18; step += 1) {
              const point = samplePatternPoint(id, step / 18, 10);
              if (step === 0) ctx.moveTo(x + 25 + point.x, y + 22 + point.y);
              else ctx.lineTo(x + 25 + point.x, y + 22 + point.y);
            }
            ctx.stroke();
          } else {
            ctx.fillStyle = "#475569";
            ctx.font = "700 9px Segoe UI";
            ctx.textAlign = "center";
            ctx.fillText(pattern.icon, x + 25, y + 25);

          }
        });

        ctx.fillStyle = state.vaultReady ? "#86efac" : "#cbd5e1";
        ctx.font = "600 11px Segoe UI";
        ctx.fillText(
          state.vaultReady ? "세 문양 봉인 완료. 끝까지 버티세요." : "가까이서 클릭/터치로 훔치고, 중앙에서 재생",
          VIEW.width - 212,
          170
        );
      }

      function drawPopups() {
        for (let index = 0; index < state.popups.length; index += 1) {
          const popup = state.popups[index];
          const alpha = clamp(popup.life / popup.maxLife, 0, 1);
          ctx.fillStyle = hexToRgba(popup.color, alpha);
          ctx.font = "700 16px Segoe UI";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, VIEW.width * 0.5, 62 + index * 20 - popup.yOffset);
        }
        ctx.textAlign = "left";
      }

      function drawOverlay() {
        if (state.mode === "running") {
          return;
        }

        ctx.save();
        ctx.fillStyle = state.mode === "menu" ? "rgba(2, 6, 23, 0.44)" : "rgba(2, 6, 23, 0.68)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const panelWidth = 520;
        const panelHeight = state.mode === "menu" ? 320 : 250;
        const x = (VIEW.width - panelWidth) / 2;
        const y = state.mode === "menu" ? 88 : 132;

        ctx.fillStyle = "rgba(6, 11, 22, 0.88)";
        drawRoundedRect(x, y, panelWidth, panelHeight, 30);
        ctx.fill();
        ctx.strokeStyle = "rgba(148, 163, 184, 0.2)";
        ctx.lineWidth = 1.2;
        drawRoundedRect(x, y, panelWidth, panelHeight, 30);
        ctx.stroke();

        const headerGradient = ctx.createLinearGradient(x, y, x + panelWidth, y + 72);
        headerGradient.addColorStop(0, "rgba(103, 232, 249, 0.16)");
        headerGradient.addColorStop(0.5, "rgba(244, 114, 182, 0.12)");
        headerGradient.addColorStop(1, "rgba(251, 191, 36, 0.16)");
        ctx.fillStyle = headerGradient;
        drawRoundedRect(x + 18, y + 18, panelWidth - 36, 72, 20);
        ctx.fill();

        ctx.fillStyle = "#bae6fd";
        ctx.font = "700 12px Segoe UI";
        ctx.fillText("STORM ARCHIVE OP // 09", x + 38, y + 42);
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 34px Segoe UI";
        ctx.fillText("Mirror Heist", x + 36, y + 78);

        if (state.mode === "menu") {
          ctx.fillStyle = "#cbd5e1";
          ctx.font = "600 16px Segoe UI";
          wrapText("감시자의 동작 패턴을 훔쳐 중앙 금고에 재생하세요. 안전 원은 계속 줄어들고, 시선 누적과 장벽 누적이 동시에 압박합니다.", x + 38, y + 122, panelWidth - 76, 24);
          ctx.fillStyle = "#e2e8f0";
          ctx.font = "700 14px Segoe UI";
          wrapText("이동: 방향키/WASD 또는 드래그", x + 38, y + 182, panelWidth - 76, 22);
          wrapText("훔치기: 가까운 감시자를 클릭/터치 또는 패턴 흡수", x + 38, y + 206, panelWidth - 76, 22);
          wrapText("재생: 중앙 금고에서 Space, 두 손가락 탭, 패턴 재생", x + 38, y + 230, panelWidth - 76, 22);
          ctx.fillStyle = "#86efac";
          ctx.font = "700 14px Segoe UI";
          wrapText(META.clearCondition, x + 38, y + 264, panelWidth - 76, 22);
          ctx.fillStyle = "#fca5a5";
          wrapText(META.failCondition, x + 38, y + 288, panelWidth - 76, 22);
          ctx.fillStyle = "#f8fafc";
          ctx.font = "700 14px Segoe UI";
          ctx.textAlign = "center";
          ctx.fillText("클릭, 터치 또는 Enter로 시작", VIEW.width / 2, y + panelHeight - 22);
          ctx.textAlign = "left";
          return;
        }

        const success = state.mode === "cleared";
        ctx.fillStyle = success ? "#86efac" : "#fda4af";
        ctx.font = "700 30px Segoe UI";
        ctx.fillText(success ? "VAULT OPEN" : "HEIST FAILED", x + 36, y + 126);
        ctx.fillStyle = "#cbd5e1";
        ctx.font = "600 16px Segoe UI";
        wrapText(success ? state.lastSuccess : reasonToText(state.lastReason), x + 36, y + 156, panelWidth - 72, 24);
        ctx.fillStyle = "#e2e8f0";
        ctx.font = "600 14px Segoe UI";
        ctx.fillText(`복제 ${state.inventory.length}/3  |  봉인 ${state.deposited.length}/3  |  생존 ${state.lastRunTime.toFixed(1)}초`, x + 36, y + 206);
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 14px Segoe UI";
        ctx.textAlign = "center";
        ctx.fillText("클릭, 터치 또는 Enter로 재도전", VIEW.width / 2, y + panelHeight - 24);
        ctx.textAlign = "left";
        ctx.restore();
      }

      function wrapText(text, x, y, maxWidth, lineHeight) {
        const words = String(text).split(" ");
        let line = "";
        let currentY = y;
        for (let index = 0; index < words.length; index += 1) {
          const test = line ? `${line} ${words[index]}` : words[index];
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, currentY);
            line = words[index];
            currentY += lineHeight;
          } else {
            line = test;
          }
        }
        if (line) {
          ctx.fillText(line, x, currentY);
        }
      }

      function drawFlash() {
        if (state.flash <= 0) {
          return;
        }
        const alpha = clamp(state.flash, 0, 1);
        const gradient = ctx.createRadialGradient(VAULT_CENTER.x, VAULT_CENTER.y, 0, VAULT_CENTER.x, VAULT_CENTER.y, 440);
        gradient.addColorStop(0, `rgba(191, 219, 254, ${alpha * 0.2})`);
        gradient.addColorStop(0.58, `rgba(244, 114, 182, ${alpha * 0.08})`);
        gradient.addColorStop(1, `rgba(255, 255, 255, ${alpha * 0.18})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
      }

      function hexToRgba(hex, alpha) {
        const normalized = hex.replace("#", "");
        const value =
          normalized.length === 3
            ? normalized
                .split("")
                .map((char) => char + char)
                .join("")
            : normalized;
        const number = parseInt(value, 16);
        const red = (number >> 16) & 255;
        const green = (number >> 8) & 255;
        const blue = number & 255;
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shake = currentShakeOffset();
        ctx.save();
        ctx.translate(shake.x, shake.y);
        drawBackground();
        drawArena();
        drawVault();
        drawSentinels();
        drawChannel();
        drawPlayer();
        drawParticles();
        drawHUD();
        drawOverlay();
        drawFlash();
        ctx.restore();
      }

      function findNearestStealable(pointerPoint) {
        let best = null;
        let bestDistance = Infinity;
        for (const sentinel of state.sentinels) {
          if (sentinel.stolen) {
            continue;
          }
          const playerDist = distance(state.player, sentinel.pos);
          if (playerDist > STEAL_RADIUS) {
            continue;
          }
          const pointerDist = pointerPoint ? distance(pointerPoint, sentinel.pos) : playerDist;
          if (pointerPoint && pointerDist > 34) {
            continue;
          }
          if (playerDist < bestDistance) {
            best = sentinel;
            bestDistance = playerDist;
          }
        }
        return best;
      }

      function tryStartSteal(pointerPoint) {
        if (state.mode !== "running" || state.replay) {
          return false;
        }
        const sentinel = findNearestStealable(pointerPoint || null);
        if (!sentinel) {
          pushPopup("감시자 범위 안에서 패턴을 흡수하세요", "#fde68a");
          return false;
        }
        state.channel = {
          id: sentinel.id,
          progress: 0,
        };
        pushPopup(patternDisplay(sentinel.id) + " 동기화 시작", sentinel.color);
        return true;
      }

      function tryReplay() {
        if (state.mode !== "running" || state.replay) {
          return false;
        }
        if (distance(state.player, VAULT_CENTER) > REPLAY_RADIUS) {
          pushPopup("중앙 금고 코어에서 재생하세요", "#fde68a");
          return false;
        }
        const nextPattern = state.inventory.find((id) => !state.deposited.includes(id));
        if (!nextPattern) {
          pushPopup("아직 복제한 패턴이 없습니다", "#cbd5e1");
          return false;
        }
        state.replay = {
          id: nextPattern,
          progress: 0,
        };
        state.flash = Math.max(state.flash, 0.24);
        state.shake = Math.max(state.shake, 5);
        pushPopup(patternDisplay(nextPattern) + " 재생 중", PATTERN_DEFS[nextPattern].color);
        return true;
      }

      function coordinateFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function handlePrimaryPress(point, pointerType) {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
        }

        input.pointerActive = true;
        input.pointerType = pointerType || "pointer";
        input.pointerX = point.x;
        input.pointerY = point.y;
        tryStartSteal(point);
      }

      function handlePointerDown(event) {
        event.preventDefault();
        const point = coordinateFromEvent(event);
        handlePrimaryPress(point, event.pointerType || "pointer");
      }

      function handlePointerMove(event) {
        if (!input.pointerActive) {
          return;
        }
        const point = coordinateFromEvent(event);
        input.pointerX = point.x;
        input.pointerY = point.y;
      }

      function handlePointerUp(event) {
        if (event) {
          event.preventDefault();
        }
        input.pointerActive = false;
        input.pointerType = null;
      }

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);
      canvas.addEventListener("pointerleave", handlePointerUp);
      canvas.addEventListener("touchstart", (event) => {
        if (event.touches.length >= 2) {
          event.preventDefault();
          if (state.mode !== "running") {
            resetRun();
          }
          tryReplay();
          return;
        }
      }, { passive: false });

      document.addEventListener("keydown", (event) => {
        if (event.code === "Enter") {
          if (state.mode !== "running") {
            event.preventDefault();
            resetRun();
          }
        } else if (event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            tryReplay();
          } else {
            resetRun();
          }
        } else if (event.code === "KeyF") {
          event.preventDefault();
          if (document.fullscreenElement) {
            document.exitFullscreen?.();
          } else {
            canvas.requestFullscreen?.();
          }
        } else if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = true;
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = true;
        } else if (event.code === "ArrowUp" || event.code === "KeyW") {
          input.up = true;
        } else if (event.code === "ArrowDown" || event.code === "KeyS") {
          input.down = true;
        }
      });

      document.addEventListener("keyup", (event) => {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = false;
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = false;
        } else if (event.code === "ArrowUp" || event.code === "KeyW") {
          input.up = false;
        } else if (event.code === "ArrowDown" || event.code === "KeyS") {
          input.down = false;
        }
      });

      function bindHoldButton(button, control) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          input[control] = false;
          button.dataset.active = "false";
        };
        const press = (event) => {
          event.preventDefault();
          if (state.mode !== "running") {
            resetRun();
          }
          input[control] = true;
          button.dataset.active = "true";
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      }

      document.querySelectorAll("[data-control]").forEach((button) => {
        bindHoldButton(button, button.dataset.control);
      });

      document.querySelector('[data-action="steal"]')?.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        if (state.mode !== "running") {
          resetRun();
        }
        tryStartSteal(null);
      });

      document.querySelector('[data-action="replay"]')?.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        if (state.mode !== "running") {
          resetRun();
        }
        tryReplay();
      });

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = clamp((timestamp - lastTimestamp) / 1000, 0, MAX_DT);
        lastTimestamp = timestamp;
        update(dt || FIXED_DT);
        render();
        animationFrame = window.requestAnimationFrame(loop);
      }

      function renderGameToText() {
        const safeRadius = Number(safeRadiusAt(state.elapsed).toFixed(1));
        return JSON.stringify({
          coordinateSystem: "origin top-left, x rightward, y downward",
          mode: state.mode,
          timeRemaining: Number(Math.max(0, SURVIVAL_TIME - state.elapsed).toFixed(1)),
          safeZone: {
            center: { x: Number(VAULT_CENTER.x.toFixed(1)), y: Number(VAULT_CENTER.y.toFixed(1)) },
            radius: safeRadius,
          },
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            radius: state.player.radius,
          },
          exposure: {
            vision: Number(state.exposure.toFixed(2)),
            visionLimit: DETECTION_LIMIT,
            storm: Number(state.stormExposure.toFixed(2)),
            stormLimit: STORM_LIMIT,
          },
          sentinels: state.sentinels.map((sentinel) => ({
            id: sentinel.id,
            stolen: sentinel.stolen,
            x: Number(sentinel.pos.x.toFixed(1)),
            y: Number(sentinel.pos.y.toFixed(1)),
          })),
          inventory: [...state.inventory],
          deposited: [...state.deposited],
          replaying: state.replay ? state.replay.id : null,
          channeling: state.channel ? state.channel.id : null,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let step = 0; step < steps; step += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        creator: META.creator,
        genre: META.genre,
        clearCondition: META.clearCondition,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          state.elapsed = SURVIVAL_TIME;
          state.inventory = [...PATTERN_ORDER];
          state.deposited = [...PATTERN_ORDER];
          state.vaultReady = true;
          clearStage();
          render();
        },
        forceFail() {
          failStage("vision");
          render();
        },
      };

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(loop);

      window.addEventListener("beforeunload", () => {
        if (animationFrame) {
          window.cancelAnimationFrame(animationFrame);
        }
      });
    </script>
  </body>
</html>
