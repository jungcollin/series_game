<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>풍선 동물</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #FFF5E6; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(230, 126, 34, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(120, 60, 30, 0.92);
        color: #FFF5E6; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #FFF5E6; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(230, 126, 34, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">풍선 동물. 화면에 표시된 비틀기 포인트를 순서대로 터치하여 풍선을 동물 모양으로 만드세요. 정확한 포인트를 터치하면 풍선이 비틀어집니다. 풍선 동물 5개를 완성하면 클리어. 잘못된 터치 3회 또는 35초 초과 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="풍선 동물" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = 960, H = 540, CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60, MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "balloon-twist", title: "풍선 동물",
        description: "풍선을 비틀어 귀여운 동물을 만드세요",
        creator: "jungcollin", genre: "Shape matching",
        clearCondition: "풍선 동물 5개 완성 시 클리어",
        failCondition: "풍선 터짐 3회 또는 시간 초과",
        controls: "비틀기 포인트를 순서대로 터치하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const BALLOON_COLORS = ["#E74C3C", "#3498DB", "#2ECC71", "#F39C12", "#9B59B6"];
      const COL = { bg: "#FFF5E6", bgWarm: "#FFE8CC", text: "#5D3A1A", accent: "#E67E22", miss: "#C0392B", success: "#27AE60", confetti: ["#E74C3C", "#3498DB", "#2ECC71", "#F39C12", "#9B59B6", "#E91E63"] };

      const DURATION = 35, TARGET = 5, MAX_POP = 3;
      let mode = "menu", elapsed = 0, completed = 0, pops = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, shakeX = 0, shakeY = 0, clearAnim = 0;
      let particles = [], feedbackText = "", feedbackTimer = 0, feedbackColor = "";

      // Animal templates: each has twist points to tap in order
      const ANIMALS = [
        { name: "강아지", segments: [
          { type: "body", cx: CX, cy: CY + 20, rx: 70, ry: 40 },
          { type: "head", cx: CX + 90, cy: CY - 20, rx: 35, ry: 30 },
          { type: "ear", cx: CX + 115, cy: CY - 50, rx: 12, ry: 20 },
          { type: "tail", cx: CX - 80, cy: CY - 10, rx: 20, ry: 10 },
          { type: "leg", cx: CX - 30, cy: CY + 65, rx: 10, ry: 20 },
          { type: "leg", cx: CX + 30, cy: CY + 65, rx: 10, ry: 20 },
        ]},
        { name: "기린", segments: [
          { type: "body", cx: CX, cy: CY + 40, rx: 55, ry: 35 },
          { type: "neck", cx: CX + 40, cy: CY - 30, rx: 15, ry: 50 },
          { type: "head", cx: CX + 50, cy: CY - 80, rx: 25, ry: 20 },
          { type: "horn", cx: CX + 55, cy: CY - 105, rx: 6, ry: 12 },
          { type: "leg", cx: CX - 25, cy: CY + 80, rx: 10, ry: 25 },
          { type: "leg", cx: CX + 20, cy: CY + 80, rx: 10, ry: 25 },
        ]},
        { name: "토끼", segments: [
          { type: "body", cx: CX, cy: CY + 30, rx: 45, ry: 40 },
          { type: "head", cx: CX, cy: CY - 30, rx: 35, ry: 30 },
          { type: "ear", cx: CX - 15, cy: CY - 80, rx: 10, ry: 30 },
          { type: "ear", cx: CX + 15, cy: CY - 80, rx: 10, ry: 30 },
          { type: "tail", cx: CX - 45, cy: CY + 40, rx: 15, ry: 15 },
        ]},
        { name: "백조", segments: [
          { type: "body", cx: CX, cy: CY + 30, rx: 60, ry: 35 },
          { type: "neck", cx: CX - 40, cy: CY - 20, rx: 12, ry: 40 },
          { type: "head", cx: CX - 50, cy: CY - 60, rx: 22, ry: 18 },
          { type: "wing", cx: CX + 30, cy: CY, rx: 30, ry: 25 },
          { type: "tail", cx: CX + 65, cy: CY + 10, rx: 18, ry: 12 },
        ]},
        { name: "곰", segments: [
          { type: "body", cx: CX, cy: CY + 20, rx: 60, ry: 45 },
          { type: "head", cx: CX, cy: CY - 40, rx: 40, ry: 35 },
          { type: "ear", cx: CX - 35, cy: CY - 70, rx: 15, ry: 15 },
          { type: "ear", cx: CX + 35, cy: CY - 70, rx: 15, ry: 15 },
          { type: "leg", cx: CX - 30, cy: CY + 70, rx: 15, ry: 20 },
          { type: "leg", cx: CX + 30, cy: CY + 70, rx: 15, ry: 20 },
        ]},
      ];

      let currentAnimal = null;
      let currentColor = "";
      let twistIndex = 0; // which segment to twist next
      let twistedSegments = []; // indices of completed segments
      let completedAnimals = []; // {animal, color, scale}
      let usedAnimalIndices = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function pickAnimal() {
        let idx;
        do { idx = Math.floor(Math.random() * ANIMALS.length); } while (usedAnimalIndices.includes(idx) && usedAnimalIndices.length < ANIMALS.length);
        usedAnimalIndices.push(idx);
        currentAnimal = ANIMALS[idx];
        currentColor = BALLOON_COLORS[completed % BALLOON_COLORS.length];
        twistIndex = 0; twistedSegments = [];
      }

      function spawnConfetti(x, y, count) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), spd = rand(80, 200);
          particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - rand(60, 140), life: 1, size: rand(4, 8), color: COL.confetti[Math.floor(Math.random() * COL.confetti.length)], gravity: 200, rot: rand(0, Math.PI * 2), rotSpd: rand(-6, 6) });
        }
      }

      function spawnPopParticles(x, y) {
        for (let i = 0; i < 12; i++) {
          const a = rand(0, Math.PI * 2), spd = rand(60, 150);
          particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 0.8, size: rand(3, 7), color: currentColor, gravity: 100, rot: 0, rotSpd: 0 });
        }
      }

      function startGame() {
        mode = "running"; elapsed = 0; completed = 0; pops = 0;
        shake = 0; clearAnim = 0; particles = []; completedAnimals = []; usedAnimalIndices = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        pickAnimal();
      }

      function tryTwist(px, py) {
        if (!currentAnimal || mode !== "running") return;
        const seg = currentAnimal.segments[twistIndex];
        const dx = (px - seg.cx) / seg.rx, dy = (py - seg.cy) / seg.ry;
        const d = Math.sqrt(dx * dx + dy * dy);

        if (d < 1.5) {
          // Correct twist point!
          twistedSegments.push(twistIndex);
          twistIndex++;
          shake = 0.1;
          spawnConfetti(seg.cx, seg.cy, 6);

          if (twistIndex >= currentAnimal.segments.length) {
            // Animal complete!
            completed++;
            feedbackText = currentAnimal.name + " 완성!"; feedbackTimer = 1.0; feedbackColor = COL.success;
            spawnConfetti(CX, CY, 20);
            shake = 0.25;
            completedAnimals.push({ idx: usedAnimalIndices[usedAnimalIndices.length - 1], color: currentColor });
            if (completed >= TARGET) {
              mode = "cleared"; clearAnim = 0;
              window.relayStageResult.status = "cleared"; reportCleared();
            } else { pickAnimal(); }
          } else {
            feedbackText = "비틀기!"; feedbackTimer = 0.5; feedbackColor = COL.accent;
          }
        } else {
          // Wrong spot - pop!
          pops++;
          shake = 0.2;
          spawnPopParticles(px, py);
          feedbackText = "펑!"; feedbackTimer = 0.8; feedbackColor = COL.miss;
          if (pops >= MAX_POP) {
            mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("풍선 터짐 3회");
          }
        }
      }

      function update(dt) {
        if (mode === "running") {
          elapsed += dt;
          if (elapsed >= DURATION) { mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("시간 초과"); return; }
        }
        if (mode === "cleared") clearAnim = Math.min(1, clearAnim + dt * 1.5);
        if (shake > 0) { shake = Math.max(0, shake - dt * 4); shakeX = (Math.random() - 0.5) * shake * 14; shakeY = (Math.random() - 0.5) * shake * 14; } else { shakeX = 0; shakeY = 0; }
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]; p.life -= dt * 1.8; if (p.life <= 0) { particles.splice(i, 1); continue; }
          p.vy += (p.gravity || 0) * dt; p.x += p.vx * dt; p.y += p.vy * dt;
          if (p.rot !== undefined) p.rot += p.rotSpd * dt;
        }
        if (feedbackTimer > 0) feedbackTimer -= dt;
      }

      function drawBg() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#FFF5E6"); grad.addColorStop(1, "#FFE8CC");
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

        // Festive bunting
        ctx.strokeStyle = "rgba(230,126,34,0.3)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, 40); ctx.quadraticCurveTo(CX, 70, W, 40); ctx.stroke();
        const flags = ["#E74C3C", "#3498DB", "#2ECC71", "#F39C12", "#9B59B6"];
        for (let i = 0; i < 12; i++) {
          const t = (i + 0.5) / 12;
          const fx = W * t, fy = 40 + Math.sin(t * Math.PI) * 30;
          ctx.fillStyle = flags[i % flags.length];
          ctx.beginPath(); ctx.moveTo(fx - 8, fy); ctx.lineTo(fx + 8, fy); ctx.lineTo(fx, fy + 16); ctx.closePath(); ctx.fill();
        }

        // Completed animals display (small, on sides)
        for (let i = 0; i < completedAnimals.length; i++) {
          const ca = completedAnimals[i];
          const animal = ANIMALS[ca.idx];
          const ox = 60 + i * 50, oy = H - 60;
          ctx.save(); ctx.translate(ox, oy); ctx.scale(0.3, 0.3);
          drawBalloonAnimal(animal, ca.color, animal.segments.length);
          ctx.restore();
        }
      }

      function drawBalloonSegment(seg, color, alpha) {
        ctx.save(); ctx.globalAlpha = alpha;
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.ellipse(seg.cx, seg.cy, seg.rx, seg.ry, 0, 0, Math.PI * 2); ctx.fill();
        // Shine
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.beginPath(); ctx.ellipse(seg.cx - seg.rx * 0.2, seg.cy - seg.ry * 0.3, seg.rx * 0.35, seg.ry * 0.25, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }

      function drawBalloonAnimal(animal, color, twistedCount) {
        // Draw twisted (completed) segments
        for (let i = 0; i < twistedCount; i++) {
          drawBalloonSegment(animal.segments[i], color, 1);
          // Twist knot between segments
          if (i > 0) {
            const prev = animal.segments[i - 1], curr = animal.segments[i];
            const mx = (prev.cx + curr.cx) / 2, my = (prev.cy + curr.cy) / 2;
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.beginPath(); ctx.arc(mx, my, 4, 0, Math.PI * 2); ctx.fill();
          }
        }
      }

      function drawCurrentAnimal() {
        if (!currentAnimal || mode !== "running") return;

        // Ghost outline for upcoming segments
        for (let i = twistedSegments.length; i < currentAnimal.segments.length; i++) {
          const seg = currentAnimal.segments[i];
          ctx.save();
          ctx.strokeStyle = i === twistIndex ? currentColor : "rgba(200,180,160,0.4)";
          ctx.lineWidth = i === twistIndex ? 3 : 2;
          ctx.setLineDash(i === twistIndex ? [] : [6, 4]);
          ctx.beginPath(); ctx.ellipse(seg.cx, seg.cy, seg.rx, seg.ry, 0, 0, Math.PI * 2); ctx.stroke();
          ctx.setLineDash([]);

          // Next twist point indicator
          if (i === twistIndex) {
            const pulse = Math.sin(elapsed * 4) * 0.2 + 0.8;
            ctx.globalAlpha = pulse;
            ctx.fillStyle = currentColor;
            ctx.beginPath(); ctx.arc(seg.cx, seg.cy, 8, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1;
            // Label
            ctx.fillStyle = COL.text; ctx.font = "bold 14px Trebuchet MS"; ctx.textAlign = "center";
            ctx.fillText("터치!", seg.cx, seg.cy + seg.ry + 18);
            ctx.textAlign = "left";
          }
          ctx.restore();
        }

        // Draw twisted segments
        drawBalloonAnimal(currentAnimal, currentColor, twistedSegments.length);

        // Animal name
        ctx.fillStyle = COL.text; ctx.font = "bold 22px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText(currentAnimal.name, CX, 90);
        ctx.textAlign = "left";
      }

      function drawHUD() {
        const tl = Math.max(0, DURATION - elapsed), tr = tl / DURATION;
        ctx.fillStyle = "rgba(93,58,26,0.15)"; ctx.fillRect(30, 15, W - 60, 10);
        ctx.fillStyle = tr > 0.25 ? COL.accent : COL.miss; ctx.fillRect(30, 15, (W - 60) * tr, 10);
        ctx.fillStyle = COL.text; ctx.font = "bold 24px Trebuchet MS"; ctx.textAlign = "left";
        ctx.fillText("\uD83C\uDF88 " + completed + " / " + TARGET, 30, 50);
        ctx.textAlign = "right"; ctx.fillStyle = pops > 0 ? COL.miss : COL.text;
        ctx.fillText("\uD83D\uDCA5 " + pops + " / " + MAX_POP, W - 30, 50);
        ctx.textAlign = "center"; ctx.font = "bold 18px Trebuchet MS";
        ctx.fillStyle = tr > 0.25 ? COL.text : COL.miss; ctx.fillText(Math.ceil(tl) + "초", CX, 46);
        ctx.textAlign = "left";
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.save(); ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.color;
          if (p.rot !== undefined && p.size > 5) {
            ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
          } else { ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }
          ctx.restore();
        }
      }

      function drawFeedback() {
        if (feedbackTimer <= 0) return;
        ctx.save(); ctx.globalAlpha = clamp(feedbackTimer / 0.3, 0, 1);
        ctx.fillStyle = feedbackColor; ctx.font = "bold 34px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText(feedbackText, CX, CY - 110 - (1 - feedbackTimer) * 20);
        ctx.restore(); ctx.textAlign = "left";
      }

      function drawCard(title, lines, accent) {
        ctx.fillStyle = "rgba(93,58,26,0.7)"; ctx.fillRect(0, 0, W, H);
        const cw = Math.min(680, W - 40), cx2 = (W - cw) / 2, cy2 = 70, ch = 400;
        ctx.fillStyle = "#FFF8F0"; ctx.beginPath(); ctx.roundRect(cx2, cy2, cw, ch, 16); ctx.fill();
        ctx.fillStyle = accent; ctx.beginPath(); ctx.roundRect(cx2, cy2, cw, 8, [16, 16, 0, 0]); ctx.fill();
        ctx.fillStyle = accent; ctx.font = "bold 38px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText(title, CX, cy2 + 60);
        ctx.fillStyle = COL.text; ctx.font = "600 20px Trebuchet MS";
        lines.forEach((l, i) => ctx.fillText(l, CX, cy2 + 110 + i * 36));
        ctx.fillStyle = "rgba(93,58,26,0.5)"; ctx.font = "500 18px Trebuchet MS";
        ctx.fillText("터치 또는 Enter로 시작", CX, cy2 + ch - 30); ctx.textAlign = "left";
      }

      function render() {
        ctx.save(); ctx.translate(shakeX, shakeY);
        if (mode === "menu") {
          drawBg();
          drawCard("풍선 동물", ["조작: 비틀기 포인트를 순서대로 터치", "\uD83C\uDF88 표시된 위치를 터치해 풍선을 비틀세요", "\u2705 풍선 동물 5개 완성 시 클리어", "\u274C 잘못 터치 3회 또는 35초 초과 시 실패"], COL.accent);
          ctx.restore(); return;
        }
        if (mode === "running") {
          drawBg(); drawCurrentAnimal(); drawParticles(); drawHUD(); drawFeedback();
          ctx.restore(); return;
        }
        if (mode === "cleared") {
          drawBg(); drawParticles();
          const a = clamp(clearAnim, 0, 1); ctx.save(); ctx.globalAlpha = a;
          ctx.fillStyle = "rgba(39,174,96,0.15)"; ctx.fillRect(0, 0, W, H);
          const cw2 = Math.min(500, W - 40);
          ctx.fillStyle = "#FFF8F0"; ctx.beginPath(); ctx.roundRect((W - cw2) / 2, 140, cw2, 260, 16); ctx.fill();
          ctx.fillStyle = COL.success; ctx.font = "bold 44px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText("클리어!", CX, 210);
          ctx.fillStyle = COL.text; ctx.font = "600 24px Trebuchet MS";
          ctx.fillText("풍선 동물 " + completed + "개 완성", CX, 260); ctx.fillText(elapsed.toFixed(1) + "초 소요", CX, 300);
          ctx.fillStyle = "rgba(93,58,26,0.5)"; ctx.font = "500 18px Trebuchet MS"; ctx.fillText("터치하여 다시 시작", CX, 370);
          ctx.textAlign = "left"; ctx.restore(); ctx.restore(); return;
        }
        if (mode === "failed") {
          drawBg(); drawParticles();
          drawCard("실패", [pops >= MAX_POP ? "풍선이 3번 터졌어요!" : "시간 초과!", "풍선 동물 " + completed + "개 / 목표 " + TARGET + "개", elapsed.toFixed(1) + "초 소요"], COL.miss);
          ctx.restore(); return;
        }
        ctx.restore();
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * W / rect.width, y: (e.clientY - rect.top) * H / rect.height };
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { startGame(); return; }
        const pos = getCanvasPos(e);
        tryTwist(pos.x, pos.y);
      });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", (e) => { if ((e.key === "Enter" || e.key === " ") && mode !== "running") { e.preventDefault(); startGame(); } });

      function frame(ts) {
        const dt = lastTimestamp ? Math.min((ts - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = ts; update(dt); render(); animFrame = requestAnimationFrame(frame);
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), completed, pops, target: TARGET, maxPop: MAX_POP, timeLimit: DURATION, currentAnimal: currentAnimal?.name, twistIndex, result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < steps; i++) update(FIXED_DT); render(); return renderGameToText(); };
      window.relayStageDebug = {
        forceClear() { startGame(); completed = TARGET; mode = "cleared"; clearAnim = 1; window.relayStageResult.status = "cleared"; reportCleared(); render(); },
        forceFail() { startGame(); pops = MAX_POP; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); render(); },
      };

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
      reportReady(); render(); canvas.focus(); animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
