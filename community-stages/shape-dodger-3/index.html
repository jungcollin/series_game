<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>도형 피하기 3</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }


      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">도형 피하기 3. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 화면 터치, 화살표 키 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="도형 피하기 3" aria-describedby="stage-instructions" tabindex="0"></canvas>

    <div class="mobile-controls" aria-hidden="true">
      <div class="mobile-controls__row">
        <button class="mobile-btn" id="btn-left" aria-label="왼쪽 이동">◀</button>
        <button class="mobile-btn" id="btn-right" aria-label="오른쪽 이동">▶</button>
      </div>
    </div>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("shape-dodger-3") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const GAME_DURATION = 20;
      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "다가오는 도형들을 20초 동안 피하세요!",
      };

      const player = { x: VIEW.width / 2, y: VIEW.height - 60, size: 30, speed: 450, glow: 0 };
      const obstacles = [];
      const particles = [];
      const keys = { left: false, right: false };
      const touchBtns = { left: false, right: false };

      function spawnObstacle() {
        const size = 25 + Math.random() * 40;
        const x = Math.random() * (VIEW.width - size);
        const y = -size;
        const speed = 180 + Math.random() * 250 + (state.elapsed * 12);

        const types = ["circle", "triangle", "diamond", "hexagon"];
        const type = types[Math.floor(Math.random() * types.length)];

        const hue = Math.floor(Math.random() * 360);
        const color = `hsl(${hue}, 80%, 60%)`;
        const glowColor = `hsla(${hue}, 80%, 60%, 0.5)`;
        const spin = (Math.random() - 0.5) * 5;

        obstacles.push({ x, y, size, speed, type, color, glowColor, angle: 0, spin });
      }

      function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 400,
            vy: (Math.random() - 0.5) * 400,
            life: 1.0,
            color: color,
            size: 4 + Math.random() * 6
          });
        }
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        player.x = VIEW.width / 2;
        obstacles.length = 0;
        particles.length = 0;
        keys.left = false;
        keys.right = false;
        touchBtns.left = false;
        touchBtns.right = false;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (keys.left || touchBtns.left) player.x -= player.speed * dt;
          if (keys.right || touchBtns.right) player.x += player.speed * dt;

          // Constraints
          if (player.x < 0) player.x = 0;
          if (player.x > VIEW.width - player.size) player.x = VIEW.width - player.size;

          // Glow effect pulsing
          player.glow = Math.abs(Math.sin(state.elapsed * 5)) * 10;

          // Spawn logic (slightly faster spawning over time)
          if (Math.random() < 0.04 + state.elapsed * 0.003) {
            spawnObstacle();
          }

          // Move particles
          for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt * 1.5;
            if (p.life <= 0) particles.splice(i, 1);
          }

          // Move and check collisions
          for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            obs.y += obs.speed * dt;
            obs.angle += obs.spin * dt;

            // Collision detection with a slightly smaller hitbox for fairness
            const hitboxMargin = 4;
            if (
              player.x + hitboxMargin < obs.x + obs.size &&
              player.x + player.size - hitboxMargin > obs.x &&
              player.y + hitboxMargin < obs.y + obs.size &&
              player.y + player.size - hitboxMargin > obs.y
            ) {
              spawnParticles(player.x + player.size/2, player.y + player.size/2, "#ef4444", 30);
              failStage("도형에 충돌 시 실패");
              return;
            }

            if (obs.y > VIEW.height) {
              obstacles.splice(i, 1);
            }
          }

          if (state.elapsed >= GAME_DURATION) {
            clearStage();
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function render() {
        if (state.mode === "menu") {
          renderCard("도형 피하기 3", [
            "다가오는 도형들을 20초 동안 피하세요!",
            "조작: 화면 터치, 화살표 키",
            "클리어 조건: 20초 동안 도형 피하기",
            "실패 조건: 도형에 충돌 시 실패",
            "터치 또는 Enter로 시작.",
          ], "#f97316");
          return;
        }

        if (state.mode === "running" || state.mode === "failed") {
          // Draw background with slight movement
          const bgOffset = (state.elapsed * 50) % 100;
          const grad = ctx.createLinearGradient(0, bgOffset - 100, 0, VIEW.height + bgOffset);
          grad.addColorStop(0, "#020617");
          grad.addColorStop(1, "#0f172a");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          // Grid lines for speed effect
          ctx.strokeStyle = "rgba(51, 65, 85, 0.3)";
          ctx.lineWidth = 1;
          for (let i = 0; i < VIEW.width; i += 60) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, VIEW.height);
            ctx.stroke();
          }
          for (let i = bgOffset - 100; i < VIEW.height; i += 60) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(VIEW.width, i);
            ctx.stroke();
          }

          // Draw player (spaceship style)
          if (state.mode === "running") {
            ctx.save();
            ctx.translate(player.x + player.size/2, player.y + player.size/2);

            // Engine glow
            ctx.shadowColor = "#3b82f6";
            ctx.shadowBlur = 10 + player.glow;

            ctx.fillStyle = "#60a5fa";
            ctx.beginPath();
            ctx.moveTo(0, -player.size/2); // Nose
            ctx.lineTo(player.size/2, player.size/2); // Right wing
            ctx.lineTo(0, player.size/4); // Engine indent
            ctx.lineTo(-player.size/2, player.size/2); // Left wing
            ctx.closePath();
            ctx.fill();

            // Cockpit
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#93c5fd";
            ctx.beginPath();
            ctx.arc(0, 0, player.size/6, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
          }

          // Draw obstacles
          for (let obs of obstacles) {
            ctx.save();
            ctx.translate(obs.x + obs.size/2, obs.y + obs.size/2);
            ctx.rotate(obs.angle);

            ctx.shadowColor = obs.glowColor;
            ctx.shadowBlur = 15;
            ctx.fillStyle = obs.color;
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 2;

            ctx.beginPath();
            if (obs.type === "circle") {
              ctx.arc(0, 0, obs.size/2, 0, Math.PI * 2);
            } else if (obs.type === "triangle") {
              ctx.moveTo(0, -obs.size/2);
              ctx.lineTo(obs.size/2, obs.size/2);
              ctx.lineTo(-obs.size/2, obs.size/2);
              ctx.closePath();
            } else if (obs.type === "diamond") {
              ctx.moveTo(0, -obs.size/2);
              ctx.lineTo(obs.size/2, 0);
              ctx.lineTo(0, obs.size/2);
              ctx.lineTo(-obs.size/2, 0);
              ctx.closePath();
            } else if (obs.type === "hexagon") {
              for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const x = (obs.size/2) * Math.cos(angle);
                const y = (obs.size/2) * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
              }
              ctx.closePath();
            } else {
              ctx.rect(-obs.size/2, -obs.size/2, obs.size, obs.size);
            }
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          }

          // Draw particles
          for (let p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
          }

          // Draw UI
          const remaining = Math.max(0, GAME_DURATION - state.elapsed);

          // Progress bar
          ctx.fillStyle = "rgba(15, 23, 42, 0.7)";
          ctx.fillRect(VIEW.width/2 - 150, 15, 300, 20);

          const progress = 1 - (remaining / GAME_DURATION);
          ctx.fillStyle = progress > 0.8 ? "#ef4444" : "#3b82f6";
          ctx.fillRect(VIEW.width/2 - 148, 17, Math.max(0, 296 * (1 - progress)), 16);

          ctx.strokeStyle = "#ffffff";
          ctx.lineWidth = 2;
          ctx.strokeRect(VIEW.width/2 - 150, 15, 300, 20);

          ctx.fillStyle = "#ffffff";
          ctx.font = "800 24px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(`${remaining.toFixed(1)}s`, VIEW.width / 2, 65);

          if (state.mode === "failed") {
            // Draw overlay for failed state
            ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
            ctx.fillRect(0, 0, VIEW.width, VIEW.height);
            renderCard("실패", [
              "도형에 충돌 시 실패",
            ], "#b91c1c");
          }

          return;
        }

        if (state.mode === "cleared") {
          // Keep drawing background and player for victory state
          const bgOffset = (state.elapsed * 50) % 100;
          const grad = ctx.createLinearGradient(0, bgOffset - 100, 0, VIEW.height + bgOffset);
          grad.addColorStop(0, "#020617");
          grad.addColorStop(1, "#0f172a");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          // Fly away effect
          player.y -= player.speed * 2 * FIXED_DT;

          ctx.save();
          ctx.translate(player.x + player.size/2, player.y + player.size/2);

          ctx.shadowColor = "#3b82f6";
          ctx.shadowBlur = 20;

          ctx.fillStyle = "#60a5fa";
          ctx.beginPath();
          ctx.moveTo(0, -player.size/2);
          ctx.lineTo(player.size/2, player.size/2);
          ctx.lineTo(0, player.size/4);
          ctx.lineTo(-player.size/2, player.size/2);
          ctx.closePath();
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.fillStyle = "#93c5fd";
          ctx.beginPath();
          ctx.arc(0, 0, player.size/6, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();

          // Draw overlay for cleared state
          ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          renderCard("클리어", [
            "20초 동안 도형 피하기",
          ], "#15803d");
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
        if (event.key === "ArrowLeft") keys.left = true;
        if (event.key === "ArrowRight") keys.right = true;
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft") keys.left = false;
        if (event.key === "ArrowRight") keys.right = false;
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "shape-dodger-3",
        title: "도형 피하기 3",
        creator: "Jules",
        genre: "Dodger",
        clearCondition: "20초 동안 도형 피하기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      bindHoldButton(
        document.querySelector("#btn-left"),
        () => (touchBtns.left = true),
        () => (touchBtns.left = false)
      );
      bindHoldButton(
        document.querySelector("#btn-right"),
        () => (touchBtns.right = true),
        () => (touchBtns.right = false)
      );

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
