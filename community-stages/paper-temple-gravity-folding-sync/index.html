<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Temple: Gravity Fold</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 16%, rgba(255, 214, 102, 0.18), transparent 22%),
          radial-gradient(circle at 82% 12%, rgba(138, 92, 246, 0.16), transparent 26%),
          linear-gradient(180deg, #120f1f 0%, #1e1a2f 44%, #120f1f 100%);
        font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 232, 170, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(18, 15, 31, 0.96);
        color: #fff8dd;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 239, 196, 0.96);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Paper Temple: Gravity Fold. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은
      좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 같은 박자에 맞춰 연속 입력,
      모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 이며, 모바일에서는 화면
      터치와 드래그로 이동하고 짧게 탭해 축을 접습니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Paper Temple: Gravity Fold"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const META_DESCRIPTION =
        "중력을 접어 코어를 흔들림 없이 배달하고, 동기화 문을 같은 박자에 맞춰 열어라.";
      const META_CONTROLS =
        "좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const META_CLEAR_CONDITION =
        "동기화 문을 모두 맞춘 뒤 코어를 균열 없이 목적 슬롯까지 옮기면 클리어";
      const META_FAIL_CONDITION =
        "동기화 창을 여러 번 놓치거나 코어 충격 게이지가 가득 차면 실패";

      const canvas = document.querySelector("#game");
      const LOW_FX = window.innerWidth <= 480;
      const IS_AUTOMATED = navigator.webdriver === true;
      const SAFE_CAPTURE_MODE = LOW_FX && IS_AUTOMATED;
      if (IS_AUTOMATED) {
        canvas.width = 640;
        canvas.height = 360;
      }
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const FX_SCALE = LOW_FX ? 0.58 : 1;
      const WORLD_LENGTH = 2440;
      const CORRIDOR = { top: 104, bottom: 438 };
      const PLAYER_Y = 272;
      const PLAYER_SPEED = 308;
      const TETHER_LENGTH = 58;
      const CORE_RADIUS = 15;
      const CORE_GRAVITY = 1200;
      const SPRING_FORCE = 22;
      const STABILIZE_FORCE = 28;
      const SHOCK_MAX = 100;
      const MAX_SYNC_MISSES = 4;
      const GOAL = { x: WORLD_LENGTH - 104, y: PLAYER_Y };
      const FLASH_DECAY = 1.7;
      const shakeScale =
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches
          ? 0.2
          : LOW_FX
            ? 0.68
            : 1;

      const relayContext = window.RelayRuntime?.readContext(
        "paper-temple-gravity-folding-sync"
      ) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const GRAVITIES = [
        { id: "down", label: "하강", x: 0, y: 1, color: "#ffd166" },
        { id: "left", label: "좌접힘", x: -1, y: 0, color: "#f472b6" },
        { id: "up", label: "상승", x: 0, y: -1, color: "#7dd3fc" },
        { id: "right", label: "우접힘", x: 1, y: 0, color: "#c084fc" },
      ];

      const OBSTACLES = [
        { x: 360, y: 118, w: 132, h: 122, tint: "#f4d5a1" },
        { x: 530, y: 310, w: 154, h: 116, tint: "#efd39f" },
        { x: 900, y: 208, w: 24, h: 132, tint: "#f6deb3" },
        { x: 1048, y: 116, w: 128, h: 112, tint: "#f6dcb0" },
        { x: 1254, y: 322, w: 144, h: 96, tint: "#efd1a0" },
        { x: 1600, y: 154, w: 26, h: 150, tint: "#f2d5a7" },
        { x: 1700, y: 228, w: 26, h: 154, tint: "#f3d7ad" },
        { x: 1862, y: 118, w: 132, h: 126, tint: "#f5ddb3" },
        { x: 2058, y: 314, w: 142, h: 108, tint: "#efd3a2" },
      ];

      const BACK_LANTERNS = [
        { x: 214, y: 130, sway: 0.6, glow: "#ffcf84" },
        { x: 842, y: 120, sway: 0.9, glow: "#ffc56b" },
        { x: 1490, y: 128, sway: 0.7, glow: "#ffe2a9" },
        { x: 2140, y: 116, sway: 0.95, glow: "#ffd796" },
      ];

      const AMBIENT_MOTES = Array.from({ length: LOW_FX ? 14 : 34 }, (_, index) => ({
        x: Math.random() * WORLD_LENGTH,
        y: 80 + Math.random() * 360,
        radius: 1 + Math.random() * 2.8,
        speed: 6 + Math.random() * 16,
        phase: index * 0.83,
        alpha: 0.08 + Math.random() * 0.18,
      }));

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const keys = {
        left: false,
        right: false,
        stabilize: false,
      };

      const pointer = {
        active: false,
        id: null,
        startX: 0,
        startY: 0,
        x: 0,
        y: 0,
        downAt: 0,
        moved: false,
        dragMove: false,
        startedStage: false,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        sceneTime: 0,
        lastRunTime: 0,
        note: META_DESCRIPTION,
        gravityIndex: 0,
        gravityFlash: 0,
        inputMove: 0,
        stabilizeHold: false,
        player: createPlayer(),
        core: createCore(),
        gates: createGates(),
        particles: [],
        popups: [],
        flashAlpha: 0,
        shake: 0,
        syncMisses: 0,
        beatTrail: 0,
        crackGlow: 0,
        goalGlow: 0,
        impactClock: 0,
        lastReason: "",
      };

      function createPlayer() {
        return {
          x: 126,
          y: PLAYER_Y,
          width: 88,
          height: 58,
          velocityX: 0,
          bob: 0,
        };
      }

      function createCore() {
        const gravity = GRAVITIES[0];
        return {
          x: 126 + gravity.x * TETHER_LENGTH,
          y: PLAYER_Y + gravity.y * TETHER_LENGTH,
          vx: 0,
          vy: 0,
          radius: CORE_RADIUS,
          shock: 0,
          cracks: 0,
        };
      }

      function createGates() {
        return [
          {
            id: 1,
            x: 744,
            y: PLAYER_Y,
            padX: 674,
            interval: 0.72,
            window: 0.13,
            phase: 0.24,
            required: 2,
            hits: 0,
            open: false,
            openFx: 0,
            lastBeat: -1,
          },
          {
            id: 2,
            x: 1464,
            y: PLAYER_Y,
            padX: 1392,
            interval: 0.68,
            window: 0.12,
            phase: 0.08,
            required: 2,
            hits: 0,
            open: false,
            openFx: 0,
            lastBeat: -1,
          },
          {
            id: 3,
            x: 2180,
            y: PLAYER_Y,
            padX: 2104,
            interval: 0.64,
            window: 0.11,
            phase: 0.16,
            required: 2,
            hits: 0,
            open: false,
            openFx: 0,
            lastBeat: -1,
          },
        ];
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(from, to, amount) {
        return from + (to - from) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - clamp(value, 0, 1), 3);
      }

      function withAlpha(color, alpha) {
        if (typeof color !== "string") {
          return color;
        }
        const value = clamp(alpha, 0, 1);
        if (color.startsWith("#")) {
          const hex = color.slice(1);
          const normalized =
            hex.length === 3
              ? hex
                  .split("")
                  .map((part) => part + part)
                  .join("")
              : hex;
          const r = Number.parseInt(normalized.slice(0, 2), 16);
          const g = Number.parseInt(normalized.slice(2, 4), 16);
          const b = Number.parseInt(normalized.slice(4, 6), 16);
          return `rgba(${r}, ${g}, ${b}, ${value})`;
        }
        if (color.startsWith("rgba(")) {
          return color.replace(/rgba\(([^)]+)\)/, (_, parts) => {
            const channels = parts.split(",").map((part) => part.trim()).slice(0, 3);
            return `rgba(${channels.join(", ")}, ${value})`;
          });
        }
        if (color.startsWith("rgb(")) {
          return color.replace("rgb(", "rgba(").replace(")", `, ${value})`);
        }
        return color;
      }

      function worldToScreenX(worldX, cameraX) {
        return worldX - cameraX + VIEW.width * 0.5;
      }

      function rectContainsCircle(rect, circle) {
        const nearestX = clamp(circle.x, rect.x, rect.x + rect.w);
        const nearestY = clamp(circle.y, rect.y, rect.y + rect.h);
        const dx = circle.x - nearestX;
        const dy = circle.y - nearestY;
        return dx * dx + dy * dy < circle.radius * circle.radius;
      }

      function circleRectCollision(circle, rect) {
        const nearestX = clamp(circle.x, rect.x, rect.x + rect.w);
        const nearestY = clamp(circle.y, rect.y, rect.y + rect.h);
        let dx = circle.x - nearestX;
        let dy = circle.y - nearestY;
        let distSq = dx * dx + dy * dy;

        if (distSq > circle.radius * circle.radius) {
          return null;
        }

        if (distSq === 0) {
          const left = Math.abs(circle.x - rect.x);
          const right = Math.abs(rect.x + rect.w - circle.x);
          const top = Math.abs(circle.y - rect.y);
          const bottom = Math.abs(rect.y + rect.h - circle.y);
          const minPenetration = Math.min(left, right, top, bottom);
          if (minPenetration === left) {
            dx = -1;
            dy = 0;
          } else if (minPenetration === right) {
            dx = 1;
            dy = 0;
          } else if (minPenetration === top) {
            dx = 0;
            dy = -1;
          } else {
            dx = 0;
            dy = 1;
          }
          distSq = 1;
        }

        const dist = Math.sqrt(distSq);
        return {
          normalX: dx / dist,
          normalY: dy / dist,
          penetration: circle.radius - dist,
          pointX: nearestX,
          pointY: nearestY,
        };
      }

      function currentGravity() {
        return GRAVITIES[state.gravityIndex];
      }

      function currentGate() {
        return state.gates.find((gate) => !gate.open) || null;
      }

      function maxPlayerX() {
        const gate = currentGate();
        return gate ? gate.padX + 12 : GOAL.x - 40;
      }

      function gateBeatInfo(gate) {
        const raw = (state.elapsed - gate.phase) / gate.interval;
        const nearestBeat = Math.round(raw);
        const beatTime = gate.phase + nearestBeat * gate.interval;
        const delta = state.elapsed - beatTime;
        const cycle =
          (((state.elapsed - gate.phase) % gate.interval) + gate.interval) % gate.interval;
        return {
          beatIndex: nearestBeat,
          delta,
          cycle: cycle / gate.interval,
          inWindow: Math.abs(delta) <= gate.window,
        };
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function pushPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: 0.86,
          maxLife: 0.86,
        });
      }

      function emitParticles(x, y, count, palette, speed = 120) {
        const total = Math.max(4, Math.round(count * FX_SCALE));
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / total + Math.random() * 0.5;
          const magnitude = speed * (0.45 + Math.random() * 0.7);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * magnitude,
            vy: Math.sin(angle) * magnitude,
            life: 0.4 + Math.random() * 0.55,
            maxLife: 0.4 + Math.random() * 0.55,
            size: 2 + Math.random() * 5,
            color: palette[index % palette.length],
            glow: 12 + Math.random() * 24,
          });
        }
        if (LOW_FX && state.particles.length > 96) {
          state.particles.splice(0, state.particles.length - 96);
        }
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.gravityIndex = 0;
        state.gravityFlash = 0;
        state.inputMove = 0;
        state.stabilizeHold = false;
        state.player = createPlayer();
        state.core = createCore();
        state.gates = createGates();
        state.flashAlpha = 0;
        state.shake = 0;
        state.syncMisses = 0;
        state.beatTrail = 0;
        state.crackGlow = 0;
        state.goalGlow = 0;
        state.impactClock = 0;
        state.lastReason = "";
        state.note = META_DESCRIPTION;
        state.particles.length = 0;
        state.popups.length = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.goalGlow = 1.4;
        window.relayStageResult.status = "cleared";
        emitParticles(
          GOAL.x,
          GOAL.y,
          28,
          ["#fff1b4", "#f59e0b", "#f97316", "#fff8dd"],
          180
        );
        reportClearedToHost();
      }

      function setGravity(nextIndex) {
        state.gravityIndex = (nextIndex + GRAVITIES.length) % GRAVITIES.length;
        state.gravityFlash = 1;
        state.flashAlpha = Math.max(state.flashAlpha, 0.22);
        state.shake = Math.max(state.shake, 6 * shakeScale);
        const gravity = currentGravity();
        state.note = `중력 접힘: ${gravity.label}`;
        emitParticles(
          state.player.x,
          state.player.y,
          10,
          [gravity.color, "#fff8dd", "rgba(255,255,255,0.72)"],
          90
        );
      }

      function registerGateMiss(gate, text) {
        gate.hits = 0;
        state.syncMisses += 1;
        state.flashAlpha = Math.max(state.flashAlpha, 0.26);
        state.shake = Math.max(state.shake, 5 * shakeScale);
        state.note = `동기화 이탈 ${state.syncMisses}/${MAX_SYNC_MISSES}`;
        pushPopup(text, gate.padX, gate.y - 42, "#fb7185");
        emitParticles(gate.x, gate.y, 10, ["#fb7185", "#fecdd3", "#f97316"], 70);
        if (state.syncMisses >= MAX_SYNC_MISSES) {
          failStage("동기화 창 초과");
        }
      }

      function trySyncGate() {
        const gate = currentGate();
        if (!gate || state.mode !== "running") {
          return;
        }
        const gateDistance = Math.abs(state.player.x - gate.padX);
        if (gateDistance > 56) {
          return;
        }

        const beat = gateBeatInfo(gate);
        if (beat.beatIndex <= gate.lastBeat) {
          registerGateMiss(gate, "너무 빠름");
          return;
        }

        if (!beat.inWindow) {
          registerGateMiss(gate, "박자 이탈");
          gate.lastBeat = beat.beatIndex;
          return;
        }

        gate.lastBeat = beat.beatIndex;
        gate.hits += 1;
        state.beatTrail = 1;
        state.goalGlow = Math.max(state.goalGlow, 0.18);
        state.note = `동기화 문 ${gate.id}: ${gate.hits}/${gate.required}`;
        pushPopup(`SYNC ${gate.hits}/${gate.required}`, gate.padX, gate.y - 48, "#fef3c7");
        emitParticles(gate.x, gate.y, 14, ["#fef3c7", "#ffd166", "#fb923c"], 92);
        if (gate.hits >= gate.required) {
          gate.open = true;
          gate.openFx = 1.2;
          state.note = `동기화 문 ${gate.id} 개방`;
          pushPopup("문 개방", gate.x, gate.y - 66, "#fde68a");
          emitParticles(gate.x, gate.y, 22, ["#fff8dd", "#ffd166", "#f59e0b"], 160);
        }
      }

      function tapAction() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        setGravity(state.gravityIndex + 1);
        trySyncGate();
      }

      function updatePlayer(dt) {
        let move = 0;
        if (keys.left) move -= 1;
        if (keys.right) move += 1;

        if (pointer.active && pointer.dragMove) {
          const offset = clamp((pointer.x - VIEW.width * 0.5) / (VIEW.width * 0.22), -1, 1);
          move = Math.abs(offset) < 0.18 ? 0 : offset;
        }

        state.inputMove = move;
        state.stabilizeHold =
          keys.stabilize ||
          (pointer.active && !pointer.dragMove && performance.now() - pointer.downAt > 170);

        const player = state.player;
        player.velocityX = move * PLAYER_SPEED;
        player.x = clamp(player.x + player.velocityX * dt, 92, maxPlayerX());
        player.bob += dt * (1.2 + Math.abs(move) * 2.8);
      }

      function resolveCoreImpact(normalX, normalY, pointX, pointY) {
        const core = state.core;
        core.x += normalX;
        core.y += normalY;
        const normalVelocity = core.vx * normalX + core.vy * normalY;
        if (normalVelocity < 0) {
          core.vx -= normalX * normalVelocity * 1.45;
          core.vy -= normalY * normalVelocity * 1.45;
        }
        const speed = Math.sqrt(core.vx * core.vx + core.vy * core.vy);
        const shockGain = clamp(speed * 0.045 * (state.stabilizeHold ? 0.58 : 1), 1.5, 18);
        core.shock = clamp(core.shock + shockGain, 0, SHOCK_MAX);
        core.cracks = Math.floor(core.shock / 26);
        state.flashAlpha = Math.max(state.flashAlpha, 0.18);
        state.shake = Math.max(state.shake, Math.min(10, shockGain * 0.55) * shakeScale);
        state.crackGlow = 1;
        state.impactClock = 0.18;
        emitParticles(
          pointX,
          pointY,
          8,
          ["#fff8dd", "#f5c87a", "#f59e0b", "#f97316"],
          86
        );
        pushPopup("충격", core.x, core.y - 26, "#fb923c");
        if (core.shock >= SHOCK_MAX) {
          failStage("코어 파손");
        }
      }

      function collideCoreWithBounds() {
        const core = state.core;
        if (core.y - core.radius < CORRIDOR.top) {
          core.y = CORRIDOR.top + core.radius;
          resolveCoreImpact(0, 1, core.x, CORRIDOR.top);
        } else if (core.y + core.radius > CORRIDOR.bottom) {
          core.y = CORRIDOR.bottom - core.radius;
          resolveCoreImpact(0, -1, core.x, CORRIDOR.bottom);
        }

        if (core.x - core.radius < 44) {
          core.x = 44 + core.radius;
          resolveCoreImpact(1, 0, 44, core.y);
        }
      }

      function activeCollisionRects() {
        const rects = OBSTACLES.slice();
        for (const gate of state.gates) {
          if (!gate.open) {
            rects.push({ x: gate.x, y: CORRIDOR.top, w: 24, h: CORRIDOR.bottom - CORRIDOR.top, tint: "#f3e0b6" });
          }
        }
        return rects;
      }

      function updateCore(dt) {
        const gravity = currentGravity();
        const core = state.core;
        const anchorX = state.player.x;
        const anchorY = state.player.y + 4;
        const desiredX = anchorX + gravity.x * TETHER_LENGTH;
        const desiredY = anchorY + gravity.y * TETHER_LENGTH;

        core.vx += gravity.x * CORE_GRAVITY * dt;
        core.vy += gravity.y * CORE_GRAVITY * dt;

        const toAnchorX = core.x - anchorX;
        const toAnchorY = core.y - anchorY;
        const dist = Math.max(0.001, Math.hypot(toAnchorX, toAnchorY));
        const stretch = dist - TETHER_LENGTH;
        core.vx += (-toAnchorX / dist) * stretch * SPRING_FORCE * dt * 60;
        core.vy += (-toAnchorY / dist) * stretch * SPRING_FORCE * dt * 60;

        if (state.stabilizeHold) {
          core.vx += (desiredX - core.x) * STABILIZE_FORCE * dt;
          core.vy += (desiredY - core.y) * STABILIZE_FORCE * dt;
        }

        const damping = state.stabilizeHold ? 0.882 : 0.955;
        core.vx *= Math.pow(damping, dt * 60);
        core.vy *= Math.pow(damping, dt * 60);
        core.x += core.vx * dt;
        core.y += core.vy * dt;

        collideCoreWithBounds();
        for (const rect of activeCollisionRects()) {
          const hit = circleRectCollision(core, {
            x: rect.x,
            y: rect.y,
            w: rect.w,
            h: rect.h,
          });
          if (!hit) {
            continue;
          }
          core.x += hit.normalX * hit.penetration;
          core.y += hit.normalY * hit.penetration;
          resolveCoreImpact(hit.normalX, hit.normalY, hit.pointX, hit.pointY);
        }

        const recovery = state.stabilizeHold ? 7.2 : 3.8;
        core.shock = clamp(core.shock - recovery * dt, 0, SHOCK_MAX);
        core.cracks = Math.floor(core.shock / 26);

        if (
          state.gates.every((gate) => gate.open) &&
          state.player.x > GOAL.x - 168
        ) {
          core.vx += (GOAL.x - core.x) * 4.8 * dt;
          core.vy += (GOAL.y - core.y) * 4.8 * dt;
          const distanceToGoal = Math.hypot(core.x - GOAL.x, core.y - GOAL.y);
          if (distanceToGoal < 18 && Math.hypot(core.vx, core.vy) < 60) {
            clearStage();
          }
        }
      }

      function updateParticles(dt) {
        for (const particle of state.particles) {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= Math.pow(0.92, dt * 60);
          particle.vy *= Math.pow(0.92, dt * 60);
          particle.life -= dt;
        }
        state.particles = state.particles.filter((particle) => particle.life > 0);

        for (const popup of state.popups) {
          popup.y -= dt * 24;
          popup.life -= dt;
        }
        state.popups = state.popups.filter((popup) => popup.life > 0);
      }

      function update(dt) {
        state.sceneTime += dt;
        state.gravityFlash = Math.max(0, state.gravityFlash - dt * 1.8);
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * FLASH_DECAY);
        state.shake = Math.max(0, state.shake - dt * 16);
        state.beatTrail = Math.max(0, state.beatTrail - dt * 2.6);
        state.goalGlow = Math.max(0, state.goalGlow - dt * 1.6);
        state.crackGlow = Math.max(0, state.crackGlow - dt * 2.2);
        state.impactClock = Math.max(0, state.impactClock - dt);

        for (const gate of state.gates) {
          gate.openFx = Math.max(0, gate.openFx - dt * 1.8);
        }

        if (state.mode === "running") {
          state.elapsed += dt;
          updatePlayer(dt);
          updateCore(dt);
          state.note = currentGate()
            ? `문 ${currentGate().id} 박자 ${currentGate().hits}/${currentGate().required}`
            : "목적 슬롯으로 코어를 밀어 넣으세요";
        }

        updateParticles(dt);
      }

      function drawRoundedRect(x, y, w, h, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function drawBackdrop(cameraX) {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#171326");
        sky.addColorStop(0.42, "#201b33");
        sky.addColorStop(1, "#110f1e");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const halo = ctx.createRadialGradient(
          VIEW.width * 0.52,
          126,
          20,
          VIEW.width * 0.52,
          126,
          280
        );
        halo.addColorStop(0, "rgba(255, 214, 120, 0.28)");
        halo.addColorStop(0.4, "rgba(255, 188, 93, 0.12)");
        halo.addColorStop(1, "rgba(255, 188, 93, 0)");
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, VIEW.width, 280);

        for (let layer = 0; layer < (LOW_FX ? 2 : 4); layer += 1) {
          const parallax = 0.16 + layer * 0.12;
          const offset = (cameraX * parallax) % 620;
          ctx.fillStyle = `rgba(${layer % 2 ? "255, 237, 209" : "221, 184, 131"}, ${0.03 + layer * 0.02})`;
          for (let index = -2; index < 4; index += 1) {
            const baseX = index * 420 - offset;
            ctx.beginPath();
            ctx.moveTo(baseX, 110 + layer * 32);
            ctx.lineTo(baseX + 150, 46 + layer * 22);
            ctx.lineTo(baseX + 330, 102 + layer * 26);
            ctx.lineTo(baseX + 250, 176 + layer * 28);
            ctx.lineTo(baseX + 32, 168 + layer * 26);
            ctx.closePath();
            ctx.fill();
          }
        }

        for (const [index, lantern] of BACK_LANTERNS.entries()) {
          if (LOW_FX && index % 2 === 1) {
            continue;
          }
          const x = worldToScreenX(lantern.x, cameraX);
          const swing = Math.sin(state.sceneTime * lantern.sway) * 8;
          ctx.strokeStyle = "rgba(242, 219, 179, 0.24)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + swing, lantern.y - 22);
          ctx.stroke();

          const glow = ctx.createRadialGradient(
            x + swing,
            lantern.y,
            6,
            x + swing,
            lantern.y,
            54
          );
          glow.addColorStop(0, lantern.glow);
          glow.addColorStop(0.2, "rgba(255, 222, 156, 0.28)");
          glow.addColorStop(1, "rgba(255, 222, 156, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(x + swing - 54, lantern.y - 54, 108, 108);

          drawRoundedRect(x + swing - 18, lantern.y - 16, 36, 34, 10);
          ctx.fillStyle = "rgba(255, 246, 217, 0.94)";
          ctx.fill();
          ctx.strokeStyle = "rgba(131, 76, 43, 0.5)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        for (const mote of AMBIENT_MOTES) {
          const x = worldToScreenX(
            mote.x + Math.sin(state.sceneTime * 0.18 + mote.phase) * 22,
            cameraX * 0.84
          );
          const y = mote.y + Math.sin(state.sceneTime * mote.speed * 0.05 + mote.phase) * 8;
          ctx.fillStyle = `rgba(255, 240, 207, ${mote.alpha})`;
          ctx.beginPath();
          ctx.arc(x, y, mote.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawTempleGeometry(cameraX) {
        const corridor = ctx.createLinearGradient(0, CORRIDOR.top, 0, CORRIDOR.bottom);
        corridor.addColorStop(0, "rgba(92, 70, 49, 0.3)");
        corridor.addColorStop(0.5, "rgba(35, 28, 44, 0.14)");
        corridor.addColorStop(1, "rgba(92, 70, 49, 0.34)");
        ctx.fillStyle = corridor;
        ctx.fillRect(0, CORRIDOR.top, VIEW.width, CORRIDOR.bottom - CORRIDOR.top);

        const topGradient = ctx.createLinearGradient(0, 0, 0, CORRIDOR.top + 46);
        topGradient.addColorStop(0, "#2d2431");
        topGradient.addColorStop(1, "#1c1728");
        ctx.fillStyle = topGradient;
        ctx.fillRect(0, 0, VIEW.width, CORRIDOR.top);

        const bottomGradient = ctx.createLinearGradient(0, CORRIDOR.bottom - 20, 0, VIEW.height);
        bottomGradient.addColorStop(0, "#1d1723");
        bottomGradient.addColorStop(1, "#0d0a12");
        ctx.fillStyle = bottomGradient;
        ctx.fillRect(0, CORRIDOR.bottom, VIEW.width, VIEW.height - CORRIDOR.bottom);

        const guide = ctx.createLinearGradient(0, CORRIDOR.top, 0, CORRIDOR.bottom);
        guide.addColorStop(0, "rgba(255, 233, 184, 0.04)");
        guide.addColorStop(0.5, "rgba(255, 238, 206, 0.1)");
        guide.addColorStop(1, "rgba(255, 233, 184, 0.04)");
        ctx.fillStyle = guide;
        ctx.fillRect(0, CORRIDOR.top + 16, VIEW.width, CORRIDOR.bottom - CORRIDOR.top - 32);

        ctx.strokeStyle = "rgba(255, 244, 214, 0.08)";
        ctx.lineWidth = 1.5;
        for (let index = 0; index < 14; index += 1) {
          const worldX = 90 + index * 182;
          const x = worldToScreenX(worldX, cameraX);
          ctx.beginPath();
          ctx.moveTo(x, CORRIDOR.top + 10);
          ctx.lineTo(x + 48, PLAYER_Y);
          ctx.lineTo(x, CORRIDOR.bottom - 10);
          ctx.stroke();
        }

        for (const obstacle of OBSTACLES) {
          const x = worldToScreenX(obstacle.x, cameraX);
          const paper = ctx.createLinearGradient(x, obstacle.y, x + obstacle.w, obstacle.y + obstacle.h);
          paper.addColorStop(0, "rgba(255, 250, 233, 0.92)");
          paper.addColorStop(0.45, obstacle.tint);
          paper.addColorStop(1, "rgba(182, 128, 76, 0.84)");
          drawRoundedRect(x, obstacle.y, obstacle.w, obstacle.h, 14);
          ctx.fillStyle = paper;
          ctx.shadowColor = "rgba(15, 11, 20, 0.28)";
          ctx.shadowBlur = LOW_FX ? 6 : 18;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(124, 83, 52, 0.34)";
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.strokeStyle = "rgba(255, 247, 224, 0.26)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x + 14, obstacle.y + 12);
          ctx.lineTo(x + obstacle.w - 12, obstacle.y + obstacle.h * 0.34);
          ctx.lineTo(x + 16, obstacle.y + obstacle.h - 12);
          ctx.stroke();
        }
      }

      function drawGate(gate, cameraX) {
        const x = worldToScreenX(gate.x, cameraX);
        const padX = worldToScreenX(gate.padX, cameraX);
        const beat = gateBeatInfo(gate);
        const windowGlow = beat.inWindow ? 1 : 0.3 + (1 - beat.cycle) * 0.35;

        ctx.save();
        ctx.translate(x, gate.y);

        const pulseRadius = 56 + Math.sin(state.sceneTime * (4.6 + gate.id)) * 6;
        if (!LOW_FX) {
          const pulse = ctx.createRadialGradient(0, 0, 10, 0, 0, 110);
          pulse.addColorStop(0, `rgba(255, 227, 166, ${0.32 * windowGlow})`);
          pulse.addColorStop(0.35, `rgba(255, 208, 105, ${0.18 * windowGlow})`);
          pulse.addColorStop(1, "rgba(255, 208, 105, 0)");
          ctx.fillStyle = pulse;
          ctx.fillRect(-110, -110, 220, 220);
        }

        ctx.strokeStyle = `rgba(255, 234, 194, ${0.44 + beat.inWindow * 0.28})`;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(0, 0, pulseRadius, 0, Math.PI * 2);
        ctx.stroke();

        ctx.lineWidth = 13;
        ctx.strokeStyle = "rgba(105, 72, 44, 0.64)";
        ctx.beginPath();
        ctx.moveTo(0, -112);
        ctx.lineTo(0, 112);
        ctx.stroke();

        if (!gate.open) {
          ctx.fillStyle = "rgba(244, 220, 178, 0.94)";
          drawRoundedRect(-12, -112, 24, 224, 10);
          ctx.fill();
          ctx.strokeStyle = "rgba(130, 84, 51, 0.4)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        const progressWidth = 94;
        drawRoundedRect(-progressWidth * 0.5, -152, progressWidth, 18, 9);
        ctx.fillStyle = "rgba(26, 19, 34, 0.72)";
        ctx.fill();
        drawRoundedRect(
          -progressWidth * 0.5 + 2,
          -150,
          (progressWidth - 4) * (gate.hits / gate.required),
          14,
          7
        );
        ctx.fillStyle = gate.open ? "#fde68a" : "#fb923c";
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = "rgba(255, 246, 218, 0.8)";
        ctx.font = "700 15px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(`SYNC ${gate.id}`, padX, gate.y + 102);
      }

      function drawGoal(cameraX) {
        const x = worldToScreenX(GOAL.x, cameraX);
        const glow = ctx.createRadialGradient(x, GOAL.y, 10, x, GOAL.y, 82);
        glow.addColorStop(0, `rgba(255, 235, 188, ${0.38 + state.goalGlow * 0.35})`);
        glow.addColorStop(0.4, `rgba(255, 196, 96, ${0.18 + state.goalGlow * 0.24})`);
        glow.addColorStop(1, "rgba(255, 196, 96, 0)");

      function drawTether(cameraX) {
        const playerX = worldToScreenX(state.player.x, cameraX);
        const coreX = worldToScreenX(state.core.x, cameraX);
        const gradient = ctx.createLinearGradient(playerX, state.player.y, coreX, state.core.y);
        gradient.addColorStop(0, "rgba(255, 241, 205, 0.28)");
        gradient.addColorStop(0.5, "rgba(255, 214, 102, 0.8)");
        gradient.addColorStop(1, "rgba(255, 248, 221, 0.38)");
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(playerX, state.player.y + 6);
        ctx.quadraticCurveTo(
          (playerX + coreX) * 0.5,
          (state.player.y + state.core.y) * 0.5 + Math.sin(state.sceneTime * 8) * 4,
          coreX,
          state.core.y
        );
        ctx.stroke();
      }

      function drawCore(cameraX) {
        const x = worldToScreenX(state.core.x, cameraX);
        const y = state.core.y;

        if (!LOW_FX) {
          const aura = ctx.createRadialGradient(x, y, 6, x, y, 54);
          aura.addColorStop(0, "rgba(255, 247, 214, 0.92)");
          aura.addColorStop(0.24, gravity.color);
          aura.addColorStop(0.7, "rgba(255, 215, 122, 0.12)");
          aura.addColorStop(1, "rgba(255, 215, 122, 0)");
          ctx.fillStyle = aura;
          ctx.fillRect(x - 54, y - 54, 108, 108);
        }

        ctx.beginPath();
        ctx.arc(x, y, state.core.radius + 8, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 250, 238, 0.12)";
        ctx.fill();

        crystal.addColorStop(0, "#fffdf7");
        crystal.addColorStop(0.4, "#ffe49b");

        ctx.arc(x, y, state.core.radius, 0, Math.PI * 2);
        ctx.fillStyle = crystal;
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 254, 244, 0.8)";

        ctx.strokeStyle = `rgba(149, 82, 24, ${0.34 + state.crackGlow * 0.3})`;
        ctx.lineWidth = 2.1;
        for (let crack = 0; crack < state.core.cracks; crack += 1) {
          const angle = -0.7 + crack * 0.9;
          ctx.beginPath();
          ctx.moveTo(x - Math.cos(angle) * 4, y - Math.sin(angle) * 5);
          ctx.lineTo(x + Math.cos(angle) * 8, y + Math.sin(angle) * 9);
          ctx.lineTo(x + Math.cos(angle + 0.6) * 4, y + Math.sin(angle + 0.6) * 3);

      function drawParticles(cameraX) {
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          const x = worldToScreenX(particle.x, cameraX);
          ctx.fillStyle = withAlpha(particle.color, alpha);
          ctx.shadowColor = withAlpha(particle.color, alpha);
          ctx.shadowBlur = particle.glow * alpha;
          ctx.beginPath();
          ctx.arc(x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }

      function drawPopups(cameraX) {
        ctx.textAlign = "center";

          ctx.fillStyle = withAlpha(popup.color, alpha);
          ctx.fillText(popup.text, worldToScreenX(popup.x, cameraX), popup.y);

        ctx.fillStyle = "#fff1cf";
        ctx.font = "600 14px Georgia, serif";
        ctx.fillText(state.note, 40, VIEW.height - 41);
      }

      function drawSafeRunning(cameraX) {
        ctx.fillStyle = "#171326";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.fillStyle = "#231b34";
        ctx.fillRect(0, CORRIDOR.top, VIEW.width, CORRIDOR.bottom - CORRIDOR.top);
        ctx.fillStyle = "#110f1d";
        ctx.fillRect(0, 0, VIEW.width, CORRIDOR.top);
        ctx.fillRect(0, CORRIDOR.bottom, VIEW.width, VIEW.height - CORRIDOR.bottom);

        ctx.strokeStyle = "rgba(255, 244, 218, 0.08)";
        ctx.lineWidth = 1;
        for (let index = 0; index < 10; index += 1) {
          const x = worldToScreenX(120 + index * 220, cameraX);
          ctx.beginPath();
          ctx.moveTo(x, CORRIDOR.top + 6);
          ctx.lineTo(x + 36, PLAYER_Y);
          ctx.lineTo(x, CORRIDOR.bottom - 6);
          ctx.stroke();
        }

        for (const obstacle of OBSTACLES) {
          const x = worldToScreenX(obstacle.x, cameraX);
          drawRoundedRect(x, obstacle.y, obstacle.w, obstacle.h, 12);
          ctx.fillStyle = "#e7cfaa";
          ctx.fill();
          ctx.strokeStyle = "rgba(123, 86, 57, 0.42)";
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        for (const gate of state.gates) {
          const x = worldToScreenX(gate.x, cameraX);
          ctx.strokeStyle = gate.open ? "#fde68a" : "#ffd166";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(x, gate.y, 36, 0, Math.PI * 2);
          ctx.stroke();
          if (!gate.open) {
            ctx.fillStyle = "#f4dfb6";
            drawRoundedRect(x - 10, CORRIDOR.top, 20, CORRIDOR.bottom - CORRIDOR.top, 10);
            ctx.fill();
          }
        }

        const goalX = worldToScreenX(GOAL.x, cameraX);
        ctx.strokeStyle = "#fff2c8";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.arc(goalX, GOAL.y, 22, 0, Math.PI * 2);
        ctx.stroke();

        const playerX = worldToScreenX(state.player.x, cameraX);
        ctx.strokeStyle = "#ffd166";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(playerX, state.player.y);
        ctx.lineTo(worldToScreenX(state.core.x, cameraX), state.core.y);
        ctx.stroke();

        drawRoundedRect(playerX - 32, state.player.y - 18, 64, 40, 16);
        ctx.fillStyle = "#d7ab6a";
        ctx.fill();
        ctx.strokeStyle = "#6b4221";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(worldToScreenX(state.core.x, cameraX), state.core.y, state.core.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#ffd166";
        ctx.fill();
        ctx.strokeStyle = "#fff7dc";
        ctx.stroke();

        drawHud();
      }

      function drawSafeOverlay(title, subtitle, accent, actionText) {
        ctx.fillStyle = "#171326";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.fillStyle = "#231b34";
        ctx.fillRect(0, CORRIDOR.top, VIEW.width, CORRIDOR.bottom - CORRIDOR.top);

        drawRoundedRect(74, 48, VIEW.width - 148, VIEW.height - 96, 28);
        ctx.fillStyle = "rgba(18, 14, 28, 0.96)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 244, 218, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = "#f6d68a";
        ctx.font = "700 16px Georgia, serif";
        ctx.textAlign = "left";
        ctx.fillText("Paper Temple: Gravity Fold", 104, 96);
        ctx.fillStyle = "#fff8e7";
        ctx.font = "700 34px Georgia, serif";
        ctx.fillText(title, 104, 138);
        ctx.fillStyle = "#f3e5c4";
        ctx.font = "600 15px Georgia, serif";
        ctx.fillText(subtitle, 104, 170);

        drawRoundedRect(104, 200, VIEW.width - 208, 52, 18);
        ctx.fillStyle = "rgba(255, 244, 218, 0.06)";
        ctx.fill();
        ctx.fillStyle = "#fff4d8";
        ctx.font = "600 13px Georgia, serif";
        ctx.fillText(META_DESCRIPTION, 122, 221);
        ctx.fillText("터치 드래그 이동, 탭 접기, 길게 눌러 안정화", 122, 242);

        drawRoundedRect(104, VIEW.height - 116, VIEW.width - 208, 50, 20);
        ctx.fillStyle = accent;
        ctx.fill();
        ctx.fillStyle = "#1b130b";
        ctx.font = "700 16px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(actionText, VIEW.width * 0.5, VIEW.height - 84);
      }

      function drawMenuOrEnd(title, subtitle, accent, actionText) {
        const vignette = ctx.createRadialGradient(
          VIEW.width * 0.5,
          VIEW.height * 0.46,
          60,
          VIEW.width * 0.5,
          VIEW.height * 0.46,
          360
        );
        vignette.addColorStop(0, "rgba(255, 224, 156, 0.08)");
        vignette.addColorStop(1, "rgba(7, 6, 12, 0.75)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        drawRoundedRect(92, 58, VIEW.width - 184, VIEW.height - 116, 34);
        const panel = ctx.createLinearGradient(92, 58, VIEW.width - 92, VIEW.height - 58);
        panel.addColorStop(0, "rgba(29, 21, 38, 0.9)");
        panel.addColorStop(1, "rgba(18, 14, 24, 0.94)");
        ctx.fillStyle = panel;
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 244, 218, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 212, 122, 0.92)";
        ctx.font = "700 18px Georgia, serif";
        ctx.textAlign = "left";
        ctx.fillText("Paper Temple: Gravity Fold", 134, 118);
        ctx.fillStyle = "#fff8e7";
        ctx.font = "700 42px Georgia, serif";
        ctx.fillText(title, 134, 168);
        ctx.fillStyle = "#f3e5c4";
        ctx.font = "600 17px Georgia, serif";
        ctx.fillText(subtitle, 134, 206);

        drawRoundedRect(134, 236, VIEW.width - 268, 64, 22);
        ctx.fillStyle = "rgba(255, 244, 218, 0.06)";
        ctx.fill();
        ctx.fillStyle = "#fff4d8";
        ctx.font = "600 15px Georgia, serif";
        ctx.fillText(META_DESCRIPTION, 156, 262);
        ctx.fillText("터치 드래그로 이동, 짧은 탭으로 접기, 길게 눌러 코어 안정화", 156, 286);

        const rows = [
          `조작: ${META_CONTROLS}`,
          `클리어: ${META_CLEAR_CONDITION}`,
          `실패: ${META_FAIL_CONDITION}`,
        ];
        rows.forEach((row, index) => {
          drawRoundedRect(134, 324 + index * 58, VIEW.width - 268, 44, 16);
          ctx.fillStyle = "rgba(255, 244, 218, 0.05)";
          ctx.fill();
          ctx.fillStyle = index === 2 ? "#fecaca" : "#f8e8c3";
          ctx.font = "600 13px Georgia, serif";
          ctx.fillText(row, 150, 351 + index * 58);
        });

        drawRoundedRect(134, VIEW.height - 124, VIEW.width - 268, 58, 24);
        ctx.fillStyle = accent;
        ctx.fill();
        ctx.fillStyle = "#1b130b";
        ctx.font = "700 18px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(actionText, VIEW.width * 0.5, VIEW.height - 88);
      }

      function render() {
        const cameraX = clamp(state.player.x, VIEW.width * 0.5, WORLD_LENGTH - VIEW.width * 0.5);
        const shakeX = state.shake ? (Math.random() - 0.5) * state.shake : 0;
        const shakeY = state.shake ? (Math.random() - 0.5) * state.shake : 0;

        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.save();
        ctx.translate(shakeX, shakeY);

        if (SAFE_CAPTURE_MODE && state.mode === "running") {
          drawSafeRunning(cameraX);
        } else if (IS_AUTOMATED && state.mode !== "running") {
          if (state.mode === "menu") {
            drawSafeOverlay("종이 사원 배송 개시", "중력을 접으며 코어를 박자에 맞춰 운반하세요.", "#fbbf24", "탭 또는 Enter로 시작");
          } else if (state.mode === "failed") {
            drawSafeOverlay("코어 붕괴", state.lastReason || "사원의 접힘을 버티지 못했습니다.", "#f87171", "탭 또는 Enter로 다시 도전");
          } else {
            drawSafeOverlay("배달 동기화 완료", `기록 ${state.lastRunTime.toFixed(1)}초`, "#facc15", "탭 또는 Enter로 다시 플레이");
          }
        } else {
          drawBackdrop(cameraX);
          drawTempleGeometry(cameraX);
          for (const gate of state.gates) {
            drawGate(gate, cameraX);
          }
          drawGoal(cameraX);
          drawTether(cameraX);
          drawPlayer(cameraX);
          drawCore(cameraX);
          drawParticles(cameraX);
          drawPopups(cameraX);
        }

        if (state.mode === "running" && !SAFE_CAPTURE_MODE) {
          drawHud();
        } else if (state.mode === "menu") {
          drawMenuOrEnd("종이 사원 배송 개시", "중력을 접으며 코어를 박자에 맞춰 운반하세요.", "#fbbf24", "탭 또는 Enter로 시작");
        } else if (state.mode === "failed") {
          drawMenuOrEnd(
            "코어 붕괴",
            state.lastReason || "사원의 접힘을 버티지 못했습니다.",
            "rgba(248, 113, 113, 0.92)",
            "탭 또는 Enter로 다시 도전"
          );
        } else if (state.mode === "cleared") {
          drawMenuOrEnd(
            "배달 동기화 완료",
            `기록 ${state.lastRunTime.toFixed(1)}초`,
            "rgba(250, 204, 21, 0.92)",
            "탭 또는 Enter로 다시 플레이"
          );
        }

        if (state.flashAlpha > 0) {
          ctx.fillStyle = `rgba(255, 240, 209, ${state.flashAlpha})`;
          ctx.fillRect(-8, -8, VIEW.width + 16, VIEW.height + 16);
        }

        ctx.restore();
      }

      function stepSimulation(ms) {
        const dt = Math.min(MAX_DT, Math.max(0, ms / 1000));
        update(dt);
        render();
      }

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        update(delta);
        render();
        animationFrame = window.requestAnimationFrame(loop);
      }

      function pointerDown(clientX, clientY, pointerId) {
        pointer.active = true;
        pointer.id = pointerId;
        pointer.startX = clientX;
        pointer.startY = clientY;
        pointer.x = clientX;
        pointer.y = clientY;
        pointer.downAt = performance.now();
        pointer.moved = false;
        pointer.dragMove = false;
        pointer.startedStage = false;

        if (state.mode !== "running") {
          startStage();
          pointer.startedStage = true;
        }
      }

      function pointerMove(clientX, clientY) {
        if (!pointer.active) {
          return;
        }
        pointer.x = clientX;
        pointer.y = clientY;
        const dx = clientX - pointer.startX;
        const dy = clientY - pointer.startY;
        const distance = Math.hypot(dx, dy);
        const heldLong = performance.now() - pointer.downAt > 170;
        pointer.moved = heldLong && distance < 18;
        pointer.dragMove = Math.abs(dx) > 12;
      }

      function pointerUp(clientX, clientY) {
        if (!pointer.active) {
          return;
        }
        const duration = performance.now() - pointer.downAt;
        const dx = clientX - pointer.startX;
        const dy = clientY - pointer.startY;
        const distance = Math.hypot(dx, dy);
        const wasTap = duration < 220 && distance < 10;

        if (state.mode === "running" && wasTap && !pointer.startedStage) {
          tapAction();
        }

        pointer.active = false;
        pointer.id = null;
        pointer.moved = false;
        pointer.dragMove = false;
        pointer.startedStage = false;
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.().catch(() => {});
        } else {
          document.exitFullscreen?.().catch(() => {});
        }
      }

      if (IS_AUTOMATED) {
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            state.particles.length = 0;
            state.popups.length = 0;
            canvas.width = 160;
            canvas.height = 90;
          } else {
            canvas.width = 640;
            canvas.height = 360;
            render();
          }
        });
      }

      canvas.addEventListener("pointerdown", (event) => {
        canvas.focus({ preventScroll: true });
        pointerDown(event.clientX, event.clientY, event.pointerId);
        canvas.setPointerCapture?.(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (pointer.id !== event.pointerId) {
          return;
        }
        pointerMove(event.clientX, event.clientY);
      });

      canvas.addEventListener("pointerup", (event) => {
        if (pointer.id !== event.pointerId) {
          return;
        }
        pointerUp(event.clientX, event.clientY);
      });

      canvas.addEventListener("pointercancel", () => {
        pointer.active = false;
        pointer.id = null;
        pointer.moved = false;
        pointer.dragMove = false;
        pointer.startedStage = false;
      });

      canvas.addEventListener(
        "touchstart",
        () => {},
        { passive: true }
      );

      window.addEventListener("keydown", (event) => {
        if (event.repeat && event.key !== "f") {
          if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
            keys.left = true;
          }
          if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
            keys.right = true;
          }
          if (event.key === " ") {
            keys.stabilize = true;
          }
          return;
        }

        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          keys.left = true;
          event.preventDefault();
        } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          keys.right = true;
          event.preventDefault();
        } else if (event.key === " ") {
          keys.stabilize = true;
          event.preventDefault();
        } else if (event.key === "Enter") {
          if (state.mode === "running") {
            tapAction();
          } else {
            startStage();
          }
          event.preventDefault();
        } else if (event.key === "e" || event.key === "E") {
          if (state.mode === "running") {
            tapAction();
          }
          event.preventDefault();
        } else if (event.key === "f" || event.key === "F") {
          toggleFullscreen();
          event.preventDefault();
        } else if (event.key === "Escape" && document.fullscreenElement) {
          document.exitFullscreen?.().catch(() => {});
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          keys.left = false;
        } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          keys.right = false;
        } else if (event.key === " ") {
          keys.stabilize = false;
        }
      });

      window.render_game_to_text = () =>
        JSON.stringify({
          mode: state.mode,
          coordinateSystem: "origin: top-left, +x right, +y down",
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            velocityX: Number(state.player.velocityX.toFixed(1)),
          },
          gravity: currentGravity().id,
          stabilize: Boolean(state.stabilizeHold),
          core: {
            x: Number(state.core.x.toFixed(1)),
            y: Number(state.core.y.toFixed(1)),
            vx: Number(state.core.vx.toFixed(1)),
            vy: Number(state.core.vy.toFixed(1)),
            shock: Number(state.core.shock.toFixed(1)),
            cracks: state.core.cracks,
          },
          syncMisses: state.syncMisses,
          currentGate: currentGate()
            ? {
                id: currentGate().id,
                padX: currentGate().padX,
                hits: currentGate().hits,
                required: currentGate().required,
              }
            : null,
          gates: state.gates.map((gate) => ({
            id: gate.id,
            open: gate.open,
            hits: gate.hits,
          })),
          goal: {
            x: GOAL.x,
            y: GOAL.y,
          },
          note: state.note,
          elapsed: Number(state.elapsed.toFixed(2)),
        });

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return window.render_game_to_text();
      };

      window.relayStageMeta = {
        id: "paper-temple-gravity-folding-sync",
        title: "Paper Temple: Gravity Fold",
        creator: "jungcollin",
        genre: "Gravity courier / 동기화 문",
        clearCondition: META_CLEAR_CONDITION,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.gates.forEach((gate) => {
            gate.open = true;
            gate.hits = gate.required;
          });
          state.player.x = GOAL.x - 18;
          state.core.x = GOAL.x;
          state.core.y = GOAL.y;
          state.core.vx = 0;
          state.core.vy = 0;
          state.core.shock = 0;
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          state.core.shock = SHOCK_MAX;
          failStage("코어 파손");
          render();
        },
      };

      reportReadyToHost();
      render();
      if (!IS_AUTOMATED) {
        animationFrame = window.requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>
