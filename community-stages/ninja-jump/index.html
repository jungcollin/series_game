<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>닌자 점프</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">닌자 점프. 캔버스를 터치하거나 점프 버튼을 눌러 점프하세요.</p>
    <div class="mobile-controls">
      <div class="mobile-controls__row">
        <button id="btn-jump" class="mobile-btn" data-active="false">점프</button>
      </div>
    </div>
    <canvas id="game" width="960" height="540" aria-label="닌자 점프" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("ninja-jump") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "수리검을 피하는 간단한 점프 게임입니다.",
        player: { y: 400, vy: 0, isJumping: false, radius: 20 },
        shurikens: [],
        spawnTimer: 0
      };

      function jump() {
        if (!state.player.isJumping && state.mode === "running") {
          state.player.vy = -1200;
          state.player.isJumping = true;
        }
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = { y: 400, vy: 0, isJumping: false, radius: 20 };
        state.shurikens = [];
        state.spawnTimer = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (state.elapsed >= 15) {
            clearStage();
            return;
          }

          // Player physics
          state.player.vy += 3000 * dt; // gravity
          state.player.y += state.player.vy * dt;

          if (state.player.y >= 400) {
            state.player.y = 400;
            state.player.vy = 0;
            state.player.isJumping = false;
          }

          // Spawn shurikens
          state.spawnTimer -= dt;
          if (state.spawnTimer <= 0) {
            state.shurikens.push({ x: VIEW.width + 50, y: 400, radius: 15, speed: 400 + Math.random() * 200, angle: 0 });
            state.spawnTimer = 1.0 + Math.random() * 1.5;
          }

          // Update shurikens & collision
          for (let i = state.shurikens.length - 1; i >= 0; i--) {
            const s = state.shurikens[i];
            s.x -= s.speed * dt;
            s.angle += 10 * dt;

            const dx = (state.player.radius + 100) - s.x; // Player x is fixed at 100
            const dy = state.player.y - s.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < state.player.radius + s.radius - 5) { // small leniency
              failStage("수리검에 닿았습니다!");
              return;
            }

            if (s.x < -50) {
              state.shurikens.splice(i, 1);
            }
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function render() {
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        // Ground
        ctx.fillStyle = "#334155";
        ctx.fillRect(0, 420, VIEW.width, VIEW.height - 420);

        if (state.mode === "running" || state.mode === "failed" || state.mode === "cleared") {
          // Time remaining
          const remaining = Math.max(0, 15 - state.elapsed);
          ctx.fillStyle = "#f8fafc";
          ctx.font = "bold 32px Trebuchet MS";
          ctx.textAlign = "right";
          ctx.fillText(`Time: ${remaining.toFixed(1)}s`, VIEW.width - 24, 48);

          // Player (Ninja)
          ctx.fillStyle = "#3b82f6";
          ctx.beginPath();
          ctx.arc(100 + state.player.radius, state.player.y, state.player.radius, 0, Math.PI * 2);
          ctx.fill();

          // Shurikens
          ctx.fillStyle = "#ef4444";
          for (const s of state.shurikens) {
            ctx.save();
            ctx.translate(s.x, s.y);
            ctx.rotate(s.angle);
            ctx.beginPath();
            for (let i = 0; i < 4; i++) {
              ctx.lineTo(0, -s.radius);
              ctx.lineTo(s.radius/3, -s.radius/3);
              ctx.rotate(Math.PI / 2);
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
        }

        if (state.mode === "menu") {
          renderCard("닌자 점프", [
            "수리검을 피하는 간단한 점프 게임입니다.",
            "조작: 화면 터치/클릭 또는 스페이스바로 점프",
            "클리어 조건: 15초 동안 수리검을 피해 살아남기",
            "실패 조건: 수리검에 닿으면 실패",
            "화면을 터치하거나 Enter를 눌러 시작하세요.",
          ], "#f97316");
        } else if (state.mode === "failed") {
          renderCard("실패", [
            "수리검에 닿으면 실패",
            "공유 목숨 1개가 즉시 종료되었습니다.",
          ], "#b91c1c");
        } else if (state.mode === "cleared") {
          renderCard("클리어", [
            "15초 동안 수리검을 피해 살아남기",
            "호스트가 다음 미플레이 스테이지를 랜덤으로 선택합니다.",
          ], "#15803d");
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        } else if (event.code === "Space") {
          event.preventDefault();
          if (state.mode === "menu") {
             startStage();
          } else {
             jump();
          }
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "ninja-jump",
        title: "닌자 점프",
        creator: "Jules",
        genre: "Arcade",
        clearCondition: "15초 동안 수리검을 피해 살아남기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        event.preventDefault();
        if (state.mode !== "running") {
          startFromTouch();
        } else {
          jump();
        }
      }, { passive: false });

      canvas.addEventListener("mousedown", (event) => {
        event.preventDefault();
        if (state.mode !== "running") {
          startStage();
        } else {
          jump();
        }
      });
      canvas.addEventListener("click", () => canvas.focus());

      const btnJump = document.getElementById("btn-jump");
      bindHoldButton(btnJump, () => {
        if (state.mode !== "running") {
          startFromTouch();
        } else {
          jump();
        }
      });

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
