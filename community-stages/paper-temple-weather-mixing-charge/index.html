<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Paper Temple: Weather Mix</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #241f37;
        --mist: rgba(255, 252, 248, 0.9);
        --gold: #ffd37b;
        --teal: #78f0df;
        --coral: #ff8a78;
        --violet: #8c8cff;
        --shadow: rgba(16, 10, 33, 0.36);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(176, 214, 255, 0.2), transparent 34%),
          linear-gradient(180deg, #fbefe0 0%, #f5c993 32%, #8f6885 68%, #1a1430 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 255, 255, 0.14);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 30;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(22, 17, 39, 0.94);
        color: #fffdf6;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .stage-shell {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      canvas:focus-visible,
      .touch-btn:focus-visible {
        outline: 3px solid rgba(255, 249, 214, 0.96);
        outline-offset: 3px;
      }

      .touch-controls {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 20;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }

      .touch-controls__row {
        pointer-events: auto;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        width: min(100%, 420px);
      }

      .touch-btn {
        appearance: none;
        border: 1px solid rgba(255, 248, 235, 0.16);
        border-radius: 18px;
        min-height: 56px;
        padding: 12px 14px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0.08)),
          rgba(27, 19, 45, 0.72);
        color: #fff8ef;
        font: 700 14px/1.1 "Avenir Next", "Segoe UI", sans-serif;
        box-shadow:
          0 18px 38px rgba(12, 7, 24, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
        touch-action: manipulation;
      }

      .touch-btn[data-variant="charge"] {
        background:
          linear-gradient(180deg, rgba(255, 193, 132, 0.44), rgba(255, 128, 95, 0.18)),
          rgba(48, 21, 22, 0.74);
      }

      .touch-btn[data-variant="ghost"] {
        background:
          linear-gradient(180deg, rgba(176, 214, 255, 0.2), rgba(255, 255, 255, 0.08)),
          rgba(24, 22, 39, 0.74);
      }

      .touch-btn:active,
      .touch-btn[data-active="true"] {
        transform: translateY(1px) scale(0.985);
      }

      @media (max-width: 560px) {
        .touch-controls__row {
          gap: 8px;
        }

        .touch-btn {
          min-height: 52px;
          padding: 10px 12px;
          border-radius: 16px;
          font-size: 13px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Paper Temple: Weather Mix. 첫 터치 또는 Enter로 시작합니다.
      터치/드래그로 구름 이동, 탭으로 바람 전환, 충전 기류는 결정적 순간에만 사용.
      충전을 남기며 활공체 3개를 관측대에 모두 착륙시키기.
      충전을 다 쓴 뒤 길을 놓치거나 폭풍 코어에 빨려 들어가기.
      모바일에서는 화면 버튼과 드래그만으로도 플레이 가능합니다.
    </p>
    <main class="stage-shell">
      <canvas
        id="game"
        width="960"
        height="540"
        aria-label="Paper Temple: Weather Mix"
        aria-describedby="stage-instructions"
        tabindex="0"
      ></canvas>
      <nav class="touch-controls" aria-label="게임 조작">
        <div class="touch-controls__row">
          <button id="wind-button" class="touch-btn" type="button">결 전환</button>
          <button id="charge-button" class="touch-btn" type="button" data-variant="charge">
            기류 펄스
          </button>
          <button id="restart-button" class="touch-btn" type="button" data-variant="ghost">
            재시작
          </button>
        </div>
      </nav>
    </main>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "paper-temple-weather-mixing-charge";
      const STAGE_TITLE = "Paper Temple: Weather Mix";
      const STAGE_DESCRIPTION = "구름 결을 섞어 종이 활공체 세 대를 세 관측대에 착륙시키는 제한 충전 활공 퍼즐.";
      const STAGE_GENRE = "Climate puzzler / 제한 충전";
      const STAGE_CONTROLS = "터치/드래그로 구름 이동, 탭으로 바람 전환, 충전 기류는 결정적 순간에만 사용";
      const STAGE_CLEAR = "충전을 남기며 활공체 3개를 관측대에 모두 착륙시키기";
      const STAGE_FAIL = "충전을 다 쓴 뒤 길을 놓치거나 폭풍 코어에 빨려 들어가기";
      const VIEW = { width: 960, height: 540 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const CHARGE_LIMIT = 5;
      const ROUND_DELAY = 1.2;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const windButton = document.querySelector("#wind-button");
      const chargeButton = document.querySelector("#charge-button");
      const restartButton = document.querySelector("#restart-button");

      const palette = {
        skyTop: "#f7efe1",
        skyMid: "#f2b97d",
        skyBottom: "#24193f",
        paper: "#fff7ea",
        ink: "#302540",
        gold: "#ffd37b",
        amber: "#ffb55b",
        coral: "#ff8a78",
        teal: "#7ef0dd",
        cyan: "#acf1ff",
        jade: "#68d8be",
        violet: "#8886ff",
        storm: "#6a55cc",
        shadow: "rgba(12, 7, 25, 0.36)",
      };

      const observatories = [
        { x: 842, y: 146, id: "상층", color: palette.gold, landed: false },
        { x: 862, y: 272, id: "중층", color: palette.teal, landed: false },
        { x: 840, y: 404, id: "하층", color: palette.coral, landed: false },
      ];

      const roundPlan = [
        { spawnY: 360, targetIndex: 0, note: "상층 관측대로 끌어올리세요." },
        { spawnY: 162, targetIndex: 1, note: "중층 관측대에 결을 맞추세요." },
        { spawnY: 304, targetIndex: 2, note: "하층 관측대에 미세 착륙하세요." },
      ];

      const cloudPresets = [
        {
          id: "north",
          x: 250,
          y: 168,
          width: 218,
          height: 74,
          accent: palette.cyan,
          label: "북결",
        },
        {
          id: "middle",
          x: 474,
          y: 292,
          width: 232,
          height: 80,
          accent: palette.teal,
          label: "중결",
        },
        {
          id: "south",
          x: 690,
          y: 214,
          width: 210,
          height: 70,
          accent: palette.coral,
          label: "남결",
        },
      ];

      const stormCore = { x: 648, y: 268, radius: 50, influence: 170 };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        landedCount: 0,
        currentRound: 0,
        charges: CHARGE_LIMIT,
        windDirection: 1,
        pulseTimer: 0,
        shake: 0,
        transitionTimer: 0,
        overlayFlash: 0,
        outcome: "",
        note: STAGE_DESCRIPTION,
        pointerMode: "idle",
        activePointerId: null,
        pointerDownAt: null,
      };

      const clouds = cloudPresets.map((preset, index) => ({
        ...preset,
        homeY: preset.y,
        bobPhase: index * 1.6,
        glow: 0,
      }));

      let glider = null;
      let particles = [];
      let wisps = [];
      let popups = [];
      let lastTimestamp = 0;
      let animationFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function dist(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function makeGlider(spawnY) {
        return {
          x: 108,
          y: spawnY,
          vx: 150,
          vy: -16,
          pitch: 0,
          trail: 0,
          alive: true,
          landed: false,
          pulseGlow: 0,
        };
      }

      function resetClouds() {
        for (let index = 0; index < clouds.length; index += 1) {
          clouds[index].y = cloudPresets[index].y;
          clouds[index].glow = 0;
        }
      }

      function resetRunState() {
        state.mode = "menu";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.landedCount = 0;
        state.currentRound = 0;
        state.charges = CHARGE_LIMIT;
        state.windDirection = 1;
        state.pulseTimer = 0;
        state.shake = 0;
        state.transitionTimer = 0;
        state.overlayFlash = 0;
        state.outcome = "";
        state.note = STAGE_DESCRIPTION;
        state.pointerMode = "idle";
        state.activePointerId = null;
        state.pointerDownAt = null;
        glider = null;
        particles = [];
        wisps = [];
        popups = [];
        for (const observatory of observatories) {
          observatory.landed = false;
        }
        resetClouds();
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "menu";
        updateButtons();
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: STAGE_ID,
          stageTitle: STAGE_TITLE,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: STAGE_ID,
          stageTitle: STAGE_TITLE,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        description: STAGE_DESCRIPTION,
        genre: STAGE_GENRE,
        clearCondition: STAGE_CLEAR,
        failCondition: STAGE_FAIL,
        controls: STAGE_CONTROLS,
      };

      window.relayStageResult = {
        status: "menu",
      };

      function pushPopup(text, x, y, color, scale = 1) {
        popups.push({
          text,
          x,
          y,
          color,
          age: 0,
          life: 1.1,
          scale,
        });
      }

      function emitBurst(x, y, color, count, speedMin, speedMax, sizeMin = 3, sizeMax = 8) {
        for (let index = 0; index < count; index += 1) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(speedMin, speedMax);
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: rand(sizeMin, sizeMax),
            color,
            life: rand(0.4, 1.1),
            age: 0,
            alpha: rand(0.4, 1),
          });
        }
      }

      function emitRibbonWisp(cloud) {
        wisps.push({
          x: cloud.x - cloud.width / 2 + rand(0, cloud.width),
          y: cloud.y + rand(-cloud.height * 0.28, cloud.height * 0.28),
          vx: rand(22, 54),
          vy: rand(-12, 12) + state.windDirection * -18,
          size: rand(12, 24),
          color: cloud.accent,
          age: 0,
          life: rand(0.7, 1.5),
        });
      }

      function setOutcome(mode, reason, detail, color) {
        state.mode = mode;
        state.lastRunTime = state.elapsed;
        state.outcome = detail;
        state.note = detail;
        state.overlayFlash = 1;
        window.relayStageResult.status = mode;
        pushPopup(reason, VIEW.width / 2, 114, color, 1.35);
      }

      function failStage(reason = "core", detail = STAGE_FAIL) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        setOutcome("failed", "경로 붕괴", detail, palette.coral);
        state.shake = Math.max(state.shake, 18);
        if (glider) {
          emitBurst(glider.x, glider.y, palette.coral, 36, 48, 260, 4, 12);
        }
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared" || state.mode === "failed") {
          return;
        }
        setOutcome("cleared", "혼합 성공", "세 관측대를 모두 열고 충전을 남겼습니다.", palette.gold);
        state.shake = Math.max(state.shake, 10);
        emitBurst(760, 210, palette.gold, 48, 40, 220, 3, 10);
        emitBurst(760, 210, palette.teal, 38, 35, 170, 2, 8);
        reportClearedToHost();
      }

      function getCurrentPlan() {
        return roundPlan[Math.min(state.currentRound, roundPlan.length - 1)];
      }

      function spawnCurrentGlider() {
        const plan = getCurrentPlan();
        glider = makeGlider(plan.spawnY);
        state.note = plan.note;
        pushPopup(`활공 ${state.currentRound + 1}`, 140, 124, palette.paper, 0.95);
      }

      function startStage() {
        resetRunState();
        state.mode = "running";
        state.note = getCurrentPlan().note;
        window.relayStageResult.status = "running";
        spawnCurrentGlider();
      }

      function restartStage() {
        startStage();
      }

      function landCurrentGlider() {
        const plan = getCurrentPlan();
        const observatory = observatories[plan.targetIndex];
        observatory.landed = true;
        state.landedCount += 1;
        pushPopup("정밀 착륙", glider.x + 12, glider.y - 18, observatory.color, 1.1);
        emitBurst(glider.x, glider.y, observatory.color, 28, 30, 180, 3, 8);
        state.shake = Math.max(state.shake, 7);
        glider.alive = false;
        glider.landed = true;
        state.transitionTimer = ROUND_DELAY;
        state.currentRound += 1;
        if (state.currentRound >= roundPlan.length) {
          if (state.charges > 0) {
            clearStage();
          } else {
            failStage("empty-charge", "마지막 충전까지 태워 봉인 문양이 꺼졌습니다.");
          }
        } else {
          state.note = roundPlan[state.currentRound].note;
        }
      }

      function toggleWindDirection() {
        if (state.mode !== "running") {
          return;
        }
        state.windDirection *= -1;
        state.shake = Math.max(state.shake, 4);
        pushPopup(
          state.windDirection > 0 ? "상승 결" : "하강 결",
          176,
          86,
          state.windDirection > 0 ? palette.teal : palette.coral,
          0.95
        );
        for (const cloud of clouds) {
          cloud.glow = 1;
        }
      }

      function useCharge() {
        if (state.mode !== "running" || state.charges <= 0 || state.transitionTimer > 0 || !glider || !glider.alive) {
          return;
        }
        state.charges -= 1;
        state.pulseTimer = 1.15;
        glider.vx = Math.min(glider.vx + 24, 196);
        glider.vy -= state.windDirection * 18;
        glider.pulseGlow = 1;
        state.shake = Math.max(state.shake, 10);
        emitBurst(glider.x, glider.y, palette.gold, 30, 34, 210, 3, 9);
        emitBurst(glider.x, glider.y, palette.teal, 16, 26, 140, 2, 6);
        pushPopup("기류 펄스", glider.x + 8, glider.y - 20, palette.gold, 1);
        if (state.charges === 0) {
          pushPopup("잔여 충전 0", VIEW.width - 126, 84, palette.coral, 0.9);
        }
        updateButtons();
      }

      function getMixStrength(index) {
        const cloud = clouds[index];
        let mix = 0;
        if (index > 0) {
          mix += Math.max(0, 1 - Math.abs(cloud.y - clouds[index - 1].y) / 88);
        }
        if (index < clouds.length - 1) {
          mix += Math.max(0, 1 - Math.abs(cloud.y - clouds[index + 1].y) / 88);
        }
        return clamp(mix, 0, 1.8);
      }

      function updateClouds(dt) {
        for (let index = 0; index < clouds.length; index += 1) {
          const cloud = clouds[index];
          cloud.bobPhase += dt * (0.7 + index * 0.1);
          cloud.glow = Math.max(0, cloud.glow - dt * 1.8);
          if (Math.random() < 0.15 + getMixStrength(index) * 0.08) {
            emitRibbonWisp(cloud);
          }
        }
      }

      function updateParticles(dt) {
        particles = particles.filter((particle) => {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.986 + 16 * dt;
          return particle.age < particle.life;
        });

        wisps = wisps.filter((wisp) => {
          wisp.age += dt;
          wisp.x += wisp.vx * dt;
          wisp.y += wisp.vy * dt;
          wisp.vx *= 0.996;
          wisp.vy *= 0.995;
          return wisp.age < wisp.life;
        });

        popups = popups.filter((popup) => {
          popup.age += dt;
          popup.y -= 24 * dt;
          return popup.age < popup.life;
        });
      }

      function updateTransition(dt) {
        if (state.transitionTimer <= 0 || state.mode !== "running") {
          return;
        }
        state.transitionTimer -= dt;
        if (state.transitionTimer <= 0 && state.currentRound < roundPlan.length) {
          spawnCurrentGlider();
        }
      }

      function updateGlider(dt) {
        if (state.mode !== "running" || !glider || !glider.alive || state.transitionTimer > 0) {
          return;
        }

        const plan = getCurrentPlan();
        const target = observatories[plan.targetIndex];
        let accelerationY = 42;
        let accelerationX = 0;
        let mixApplied = 0;

        for (let index = 0; index < clouds.length; index += 1) {
          const cloud = clouds[index];
          const withinX = glider.x > cloud.x - cloud.width / 2 && glider.x < cloud.x + cloud.width / 2;
          const distanceY = Math.abs(glider.y - cloud.y);
          if (!withinX || distanceY > cloud.height * 0.9) {
            continue;
          }
          const influence = 1 - distanceY / (cloud.height * 0.9);
          const mixStrength = getMixStrength(index);
          const towardCenter = (cloud.y - glider.y) * 4.8;
          const directionalLift = -state.windDirection * (92 + mixStrength * 42);
          accelerationY += towardCenter + directionalLift * influence;
          accelerationX += influence * (18 + mixStrength * 8);
          mixApplied = Math.max(mixApplied, mixStrength);
          cloud.glow = Math.max(cloud.glow, 0.65);
          if (Math.random() < 0.08 + mixStrength * 0.05) {
            emitRibbonWisp(cloud);
          }
        }

        const dx = stormCore.x - glider.x;
        const dy = stormCore.y - glider.y;
        const distanceToCore = Math.max(16, Math.hypot(dx, dy));
        const influenceRatio = clamp(1 - distanceToCore / stormCore.influence, 0, 1);
        const pulseShield = state.pulseTimer > 0 ? 0.12 : 1;
        const stormPull = influenceRatio * influenceRatio * 170 * pulseShield;
        accelerationX += (dx / distanceToCore) * stormPull;
        accelerationY += (dy / distanceToCore) * stormPull;

        if (state.pulseTimer > 0) {
          accelerationX -= (dx / distanceToCore) * 96;
          accelerationY -= (dy / distanceToCore) * 96;
          accelerationX += 28;
        }

        glider.vx = clamp(glider.vx + accelerationX * dt, 98, 210);
        glider.vy = clamp(glider.vy + accelerationY * dt, -220, 220);
        glider.vx *= 0.996;
        glider.vy *= 0.994;
        glider.x += glider.vx * dt;
        glider.y += glider.vy * dt;
        glider.pitch = lerp(glider.pitch, clamp(glider.vy / 120, -0.8, 0.65), 0.08);
        glider.trail += dt * 9;
        glider.pulseGlow = Math.max(0, glider.pulseGlow - dt * 1.6);

        if (distanceToCore < stormCore.radius + 12) {
          failStage("storm-core", "폭풍 코어에 빨려 들어갔습니다.");
          return;
        }

        if (glider.y < 38) {
          glider.y = 38;
          glider.vy = Math.max(glider.vy, 24);
        }
        if (glider.y > VIEW.height - 36) {
          failStage("missed-route", "활공체가 사원 하층을 스쳐 경로를 잃었습니다.");
          return;
        }

        if (glider.x > target.x - 26) {
          const onTarget = Math.abs(glider.y - target.y) < 28 && Math.abs(glider.vy) < 96;
          if (onTarget) {
            landCurrentGlider();
            return;
          }
          if (glider.x > target.x + 22) {
            failStage("missed-route", "관측대 접근각이 어긋나 착륙에 실패했습니다.");
            return;
          }
        }

        if (glider.x > VIEW.width + 30) {
          failStage("missed-route", "구름 결을 놓쳐 활공체가 사원 밖으로 흘렀습니다.");
          return;
        }

        if (mixApplied > 0.85 && Math.random() < 0.2) {
          emitBurst(glider.x - 12, glider.y + 6, palette.paper, 1, 10, 40, 1, 3);
        }
      }

      function step(dt) {
        const clamped = Math.min(dt, MAX_DT);
        if (state.mode === "running") {
          state.elapsed += clamped;
        }
        state.pulseTimer = Math.max(0, state.pulseTimer - clamped);
        state.shake = Math.max(0, state.shake - clamped * 28);
        state.overlayFlash = Math.max(0, state.overlayFlash - clamped * 1.8);
        updateClouds(clamped);
        updateTransition(clamped);
        updateGlider(clamped);
        updateParticles(clamped);
        updateButtons();
      }

      function advanceSimulation(ms) {
        let remaining = Math.max(0, ms) / 1000;
        while (remaining > 0) {
          const delta = Math.min(FIXED_DT, remaining);
          step(delta);
          remaining -= delta;
        }
        draw();
      }

      function getWorldPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = (clientX - rect.left) * (VIEW.width / rect.width);
        const y = (clientY - rect.top) * (VIEW.height / rect.height);
        return { x, y };
      }

      function hitCloud(worldX, worldY) {
        for (let index = clouds.length - 1; index >= 0; index -= 1) {
          const cloud = clouds[index];
          const handleX = cloud.x - cloud.width * 0.42;
          const handleDistance = dist(worldX, worldY, handleX, cloud.y);
          const withinBody =
            Math.abs(worldX - cloud.x) < cloud.width / 2 &&
            Math.abs(worldY - cloud.y) < cloud.height / 2 + 10;
          if (handleDistance < 28 || withinBody) {
            return cloud;
          }
        }
        return null;
      }

      function pointerDown(clientX, clientY, pointerId = 1) {
        const point = getWorldPoint(clientX, clientY);
        canvas.focus({ preventScroll: true });

        if (state.mode === "menu") {
          startStage();
          return;
        }
        if (state.mode === "failed" || state.mode === "cleared") {
          restartStage();
          return;
        }
        if (state.mode !== "running") {
          return;
        }

        state.activePointerId = pointerId;
        state.pointerDownAt = { ...point, moved: false, time: performance.now() };
        const cloud = hitCloud(point.x, point.y);
        if (cloud) {
          state.pointerMode = "drag-cloud";
          state.dragCloudId = cloud.id;
          state.dragOffsetY = point.y - cloud.y;
        } else {
          state.pointerMode = "tap-toggle";
        }
      }

      function pointerMove(clientX, clientY, pointerId = 1) {
        if (state.activePointerId !== pointerId || state.mode !== "running") {
          return;
        }
        const point = getWorldPoint(clientX, clientY);
        if (state.pointerDownAt) {
          if (Math.abs(point.x - state.pointerDownAt.x) > 6 || Math.abs(point.y - state.pointerDownAt.y) > 6) {
            state.pointerDownAt.moved = true;
          }
        }
        if (state.pointerMode !== "drag-cloud") {
          return;
        }
        const cloud = clouds.find((entry) => entry.id === state.dragCloudId);
        if (!cloud) {
          return;
        }
        cloud.y = clamp(point.y - state.dragOffsetY, 90, 448);
        cloud.glow = 1;
      }

      function pointerUp(clientX, clientY, pointerId = 1) {
        if (state.activePointerId !== pointerId) {
          return;
        }
        const point = getWorldPoint(clientX, clientY);
        const wasTap =
          state.pointerMode === "tap-toggle" &&
          state.pointerDownAt &&
          !state.pointerDownAt.moved &&
          dist(point.x, point.y, state.pointerDownAt.x, state.pointerDownAt.y) < 16;

        state.pointerMode = "idle";
        state.activePointerId = null;
        state.dragCloudId = null;
        state.dragOffsetY = 0;

        if (wasTap) {
          toggleWindDirection();
        }
      }

      function onCanvasPointerDown(event) {
        pointerDown(event.clientX, event.clientY, event.pointerId);
      }

      function onCanvasPointerMove(event) {
        pointerMove(event.clientX, event.clientY, event.pointerId);
      }

      function onCanvasPointerUp(event) {
        pointerUp(event.clientX, event.clientY, event.pointerId);
      }

      function updateButtons() {
        windButton.textContent = state.windDirection > 0 ? "상승 결" : "하강 결";
        windButton.setAttribute("aria-pressed", state.windDirection > 0 ? "true" : "false");
        chargeButton.textContent = `기류 ${state.charges}`;
        chargeButton.disabled = state.mode !== "running" || state.charges <= 0;
        chargeButton.setAttribute("aria-disabled", chargeButton.disabled ? "true" : "false");
        restartButton.textContent =
          state.mode === "menu" ? "시작" : state.mode === "running" ? "재시작" : "다시";
      }

      function drawSky() {
        const skyGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        skyGradient.addColorStop(0, palette.skyTop);
        skyGradient.addColorStop(0.32, palette.skyMid);
        skyGradient.addColorStop(0.72, "#8d6885");
        skyGradient.addColorStop(1, palette.skyBottom);
        ctx.fillStyle = skyGradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const halo = ctx.createRadialGradient(280, 92, 20, 280, 92, 320);
        halo.addColorStop(0, "rgba(255, 250, 225, 0.58)");
        halo.addColorStop(0.45, "rgba(255, 204, 146, 0.18)");
        halo.addColorStop(1, "rgba(255, 204, 146, 0)");
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 11; index += 1) {
          const ribbonY = 72 + index * 28 + Math.sin(state.elapsed * 0.6 + index) * 6;
          const ribbon = ctx.createLinearGradient(0, ribbonY, VIEW.width, ribbonY + 40);
          ribbon.addColorStop(0, "rgba(255,255,255,0)");
          ribbon.addColorStop(0.3, "rgba(255,244,219,0.06)");
          ribbon.addColorStop(0.72, "rgba(166,230,255,0.08)");
          ribbon.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = ribbon;
          ctx.fillRect(0, ribbonY, VIEW.width, 42);
        }
      }

        ctx.beginPath();

        ctx.lineTo(170, 354);
        ctx.lineTo(242, 310);
        ctx.lineTo(340, 352);
        ctx.lineTo(450, 292);
        ctx.lineTo(560, 348);
        ctx.lineTo(664, 300);
        ctx.lineTo(764, 342);

        ctx.lineTo(960, 362);

      function drawStormCore() {
        const pulse = 1 + Math.sin(state.elapsed * 2.4) * 0.08 + state.pulseTimer * 0.12;
        ctx.save();
        ctx.translate(stormCore.x, stormCore.y);
        ctx.rotate(state.elapsed * 0.48);
        for (let ring = 3; ring >= 1; ring -= 1) {
          const radius = stormCore.radius + ring * 22 + Math.sin(state.elapsed * 2 + ring) * 4;
          ctx.beginPath();
          ctx.strokeStyle =
            ring === 3
              ? "rgba(171, 202, 255, 0.18)"
              : ring === 2
                ? "rgba(160, 134, 255, 0.28)"
                : "rgba(255, 153, 130, 0.2)";
          ctx.lineWidth = ring === 1 ? 10 : 7;
          ctx.arc(0, 0, radius * pulse, 0, Math.PI * 2);
          ctx.stroke();
        }
        const vortex = ctx.createRadialGradient(0, 0, 6, 0, 0, stormCore.radius * 1.2);
        vortex.addColorStop(0, "rgba(255, 248, 218, 0.92)");
        vortex.addColorStop(0.2, "rgba(142, 230, 255, 0.74)");
        vortex.addColorStop(0.55, "rgba(134, 115, 255, 0.42)");
        vortex.addColorStop(1, "rgba(134, 115, 255, 0)");
        ctx.fillStyle = vortex;
        ctx.beginPath();
        ctx.arc(0, 0, stormCore.radius * 1.35 * pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawCloudRibbon(cloud, index) {
        const mixStrength = getMixStrength(index);
        const liftGlow = cloud.glow * 0.6 + mixStrength * 0.16;
        ctx.save();
        ctx.translate(cloud.x, cloud.y + Math.sin(cloud.bobPhase) * 2.5);
        ctx.shadowColor = `rgba(126, 240, 221, ${0.26 + liftGlow})`;
        ctx.shadowBlur = 24 + mixStrength * 12;

        for (let puff = 0; puff < 6; puff += 1) {
          const offset = -cloud.width * 0.45 + puff * (cloud.width / 5);
          const radiusX = 28 + (puff % 2) * 10 + mixStrength * 6;
          const radiusY = 18 + ((puff + 1) % 2) * 6 + mixStrength * 4;
          const cloudGradient = ctx.createRadialGradient(offset, 0, 4, offset, 0, radiusX + 8);
          cloudGradient.addColorStop(0, "rgba(255, 251, 241, 0.95)");
          cloudGradient.addColorStop(0.65, `rgba(255, 251, 241, ${0.72 + mixStrength * 0.08})`);
          cloudGradient.addColorStop(1, "rgba(255, 251, 241, 0)");
          ctx.fillStyle = cloudGradient;
          ctx.beginPath();
          ctx.ellipse(offset, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        const stream = ctx.createLinearGradient(-cloud.width / 2, 0, cloud.width / 2, 0);
        stream.addColorStop(0, `${cloud.accent}10`);
        stream.addColorStop(0.2, `${cloud.accent}99`);
        stream.addColorStop(0.5, mixStrength > 0.5 ? "#fff6dd" : `${cloud.accent}cc`);
        stream.addColorStop(0.82, `${cloud.accent}7a`);
        stream.addColorStop(1, `${cloud.accent}10`);
        ctx.fillStyle = stream;
        ctx.fillRect(-cloud.width / 2, -cloud.height * 0.32, cloud.width, cloud.height * 0.64);

        ctx.strokeStyle = `rgba(255, 248, 231, ${0.3 + mixStrength * 0.1})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(-cloud.width / 2 + 8, 0);
        for (let stepIndex = 0; stepIndex <= 7; stepIndex += 1) {
          const x = -cloud.width / 2 + (cloud.width / 7) * stepIndex;
          const y = Math.sin(stepIndex * 0.8 + state.elapsed * 1.6 + index) * (4 + mixStrength * 4);
          ctx.lineTo(x, y);
        }
        ctx.stroke();

        const handleX = -cloud.width * 0.42;
        ctx.fillStyle = "rgba(36, 29, 57, 0.72)";
        ctx.beginPath();
        ctx.arc(handleX, 0, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 244, 221, 0.86)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(handleX - 6, -6);
        ctx.lineTo(handleX + 6, -6);
        ctx.moveTo(handleX - 6, 0);
        ctx.lineTo(handleX + 6, 0);
        ctx.moveTo(handleX - 6, 6);
        ctx.lineTo(handleX + 6, 6);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(36, 29, 57, 0.82)";
        ctx.fillRect(-32, cloud.height * 0.42, 64, 18);
        ctx.fillStyle = "rgba(255, 248, 236, 0.92)";
        ctx.font = '700 11px "Avenir Next", "Segoe UI", sans-serif';
        ctx.textAlign = "center";
        ctx.fillText(cloud.label, 0, cloud.height * 0.42 + 12.5);
        ctx.restore();
      }

      function drawObservatory(observatory, index) {
        const currentPlan = getCurrentPlan();
        const active = state.mode === "running" && currentPlan.targetIndex === index && state.currentRound < roundPlan.length;
        ctx.save();
        ctx.translate(observatory.x, observatory.y);
        ctx.shadowColor = observatory.color;
        ctx.shadowBlur = observatory.landed ? 26 : active ? 18 : 10;
        ctx.fillStyle = observatory.landed ? observatory.color : "rgba(255, 250, 240, 0.9)";
        ctx.fillRect(-6, -36, 12, 72);
        ctx.beginPath();
        ctx.moveTo(-38, -12);
        ctx.lineTo(0, -46);
        ctx.lineTo(38, -12);
        ctx.closePath();
        ctx.fill();
        ctx.fillRect(-26, -10, 52, 10);
        ctx.fillStyle = observatory.landed ? "rgba(255, 248, 232, 0.98)" : "rgba(255, 255, 255, 0.64)";
        ctx.fillRect(-34, 16, 68, 8);
        if (active) {
          ctx.strokeStyle = "rgba(255, 250, 222, 0.82)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 32 + Math.sin(state.elapsed * 4) * 2, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawGlider() {
        if (!glider) {
          return;
        }
        ctx.save();
        ctx.translate(glider.x, glider.y);
        ctx.rotate(glider.pitch);
        ctx.shadowColor = "rgba(12, 7, 24, 0.4)";
        ctx.shadowBlur = 16;
        ctx.fillStyle = "rgba(28, 22, 40, 0.22)";
        ctx.beginPath();
        ctx.ellipse(0, 18, 34, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        if (state.pulseTimer > 0 || glider.pulseGlow > 0) {
          const ring = 24 + (1 - state.pulseTimer / 1.15) * 56;
          ctx.strokeStyle = `rgba(255, 214, 125, ${0.2 + state.pulseTimer * 0.45})`;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(0, 0, ring, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.fillStyle = palette.paper;
        ctx.beginPath();
        ctx.moveTo(-26, -6);
        ctx.lineTo(18, -14);
        ctx.lineTo(26, 0);
        ctx.lineTo(18, 14);
        ctx.lineTo(-26, 6);
        ctx.lineTo(-4, 0);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(255, 214, 125, 0.68)";
        ctx.beginPath();
        ctx.moveTo(-6, -2);
        ctx.lineTo(18, -7);
        ctx.lineTo(18, 7);
        ctx.lineTo(-6, 2);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(71, 58, 92, 0.4)";
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(-26, -6);
        ctx.lineTo(26, 0);
        ctx.lineTo(-26, 6);
        ctx.moveTo(-4, 0);
        ctx.lineTo(14, 0);
        ctx.stroke();
        ctx.restore();
      }

      function drawParticles() {
        for (const wisp of wisps) {
          const alpha = 1 - wisp.age / wisp.life;
          const gradient = ctx.createRadialGradient(wisp.x, wisp.y, 1, wisp.x, wisp.y, wisp.size);
          gradient.addColorStop(0, `${wisp.color}${Math.floor(alpha * 220).toString(16).padStart(2, "0")}`);
          gradient.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(wisp.x, wisp.y, wisp.size, 0, Math.PI * 2);
          ctx.fill();
        }

        for (const particle of particles) {
          const alpha = clamp(1 - particle.age / particle.life, 0, 1) * particle.alpha;
          ctx.fillStyle = particle.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          if (!particle.color.startsWith("rgb")) {
            ctx.fillStyle = particle.color.startsWith("#")
              ? `rgba(255, 222, 196, ${alpha})`
              : particle.color;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
      }

          );
        } else if (state.mode === "failed") {
          drawOverlayCard(
            "Route Broken",
            "Fail",
            palette.coral,
            [
              state.outcome,
              "구름 높이를 다시 섞고, 코어 직전에 펄스를 아껴 쓰세요.",
              `현재 규칙: ${STAGE_FAIL}`,
            ],
            "터치 또는 Enter로 재시도. 모바일에서는 하단 버튼과 드래그만으로 플레이 가능."
          );
        }
      }

      function drawPopups() {
        ctx.save();
        ctx.textAlign = "center";
        for (const popup of popups) {
          const t = popup.age / popup.life;
          const alpha = clamp(1 - t, 0, 1);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = `700 ${Math.round(14 + popup.scale * 8)}px "Avenir Next", "Segoe UI", sans-serif`;
          ctx.fillText(popup.text, popup.x, popup.y - easeOutCubic(t) * 10);
        }
        ctx.restore();
      }

      function drawFloorMist() {
        const floor = ctx.createLinearGradient(0, 340, 0, VIEW.height);
        floor.addColorStop(0, "rgba(255, 245, 231, 0)");
        floor.addColorStop(0.4, "rgba(210, 181, 196, 0.12)");
        floor.addColorStop(1, "rgba(18, 14, 31, 0.86)");
        ctx.fillStyle = floor;
        ctx.fillRect(0, 320, VIEW.width, VIEW.height - 320);
      }

      function drawScene() {
        drawSky();
        drawTempleSilhouettes();
        drawStormCore();
        for (let index = 0; index < observatories.length; index += 1) {
          drawObservatory(observatories[index], index);
        }
        for (let index = 0; index < clouds.length; index += 1) {
          drawCloudRibbon(clouds[index], index);
        }
        drawFloorMist();
        drawParticles();
        drawGlider();
        drawHUD();
        drawPopups();
      }

      function draw() {
        ctx.save();
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        if (state.shake > 0) {
          ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));
        }
        drawScene();
        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawOutcome();
        }
        ctx.restore();
      }

      function renderGameToText() {
        const plan = getCurrentPlan();
        const target = observatories[plan.targetIndex];
        const payload = {
          mode: state.mode,
          note: state.note,
          coordinateSystem: "origin top-left, x right, y down",
          charges: state.charges,
          windDirection: state.windDirection > 0 ? "updraft" : "downdraft",
          landedCount: state.landedCount,
          currentRound: state.currentRound + 1,
          pulseTimer: Number(state.pulseTimer.toFixed(2)),
          glider: glider
            ? {
                x: Number(glider.x.toFixed(1)),
                y: Number(glider.y.toFixed(1)),
                vx: Number(glider.vx.toFixed(1)),
                vy: Number(glider.vy.toFixed(1)),
              }
            : null,
          target: {
            x: target.x,
            y: target.y,
            id: target.id,
          },
          clouds: clouds.map((cloud) => ({
            id: cloud.id,
            x: cloud.x,
            y: Number(cloud.y.toFixed(1)),
            width: cloud.width,
            mix: Number(getMixStrength(clouds.indexOf(cloud)).toFixed(2)),
          })),
          observatories: observatories.map((observatory) => ({
            id: observatory.id,
            landed: observatory.landed,
          })),
        };
        return JSON.stringify(payload);
      }

      function gameLoop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        step(delta);
        draw();
        animationFrame = window.requestAnimationFrame(gameLoop);
      }

      async function toggleFullscreen() {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen?.();
        } else {
          await document.exitFullscreen?.();
        }
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = function advanceTime(ms) {
        advanceSimulation(ms);
      };
      window.relayStageDebug = {
        forceClear() {
          state.charges = Math.max(state.charges, 1);
          clearStage();
          draw();
        },
        forceFail() {
          failStage("debug-fail", "강제 실패 디버그 호출.");
          draw();
        },
      };

      canvas.addEventListener("pointerdown", onCanvasPointerDown);
      canvas.addEventListener("pointermove", onCanvasPointerMove);
      canvas.addEventListener("pointerup", onCanvasPointerUp);
      canvas.addEventListener("pointercancel", onCanvasPointerUp);
      canvas.addEventListener("lostpointercapture", (event) => onCanvasPointerUp(event));

      windButton.addEventListener("pointerdown", () => {
        windButton.dataset.active = "true";
      });
      windButton.addEventListener("pointerup", () => {
        windButton.dataset.active = "false";
      });
      windButton.addEventListener("click", () => {
        if (state.mode === "menu") {
          startStage();
          return;
        }
        toggleWindDirection();
      });

      chargeButton.addEventListener("pointerdown", () => {
        chargeButton.dataset.active = "true";
      });
      chargeButton.addEventListener("pointerup", () => {
        chargeButton.dataset.active = "false";
      });
      chargeButton.addEventListener("click", () => {
        if (state.mode === "menu") {
          startStage();
          return;
        }
        useCharge();
      });

      restartButton.addEventListener("click", () => {
        if (state.mode === "menu") {
          startStage();
          return;
        }
        restartStage();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu") {
            startStage();
          } else if (state.mode === "failed" || state.mode === "cleared") {
            restartStage();
          }
        } else if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          toggleFullscreen().catch(() => {});
        } else if (event.key === " " || event.code === "Space") {
          event.preventDefault();
          if (state.mode === "menu") {
            startStage();
          } else {
            useCharge();
          }
        } else if (event.key.toLowerCase() === "r") {
          event.preventDefault();
          restartStage();
        } else if (event.key.toLowerCase() === "w" || event.key === "ArrowUp" || event.key === "ArrowDown") {
          event.preventDefault();
          if (state.mode === "menu") {
            startStage();
          } else {
            toggleWindDirection();
          }
        }
      });

      resetRunState();
      reportReadyToHost();
      draw();
      animationFrame = window.requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
