<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poop Rain 60</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 237, 198, 0.92), transparent 30%),
          linear-gradient(180deg, #90d4f2 0%, #d5edf8 28%, #f3d4b3 72%, #e8ce94 100%);
        color: #172033;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(23, 50, 77, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        transform: translateY(-140%);
        padding: 12px 16px;
        border-radius: 999px;
        background: #17324d;
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        transition: transform 0.15s ease;
      }

      .skip-link:focus-visible {
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .shell {
        width: min(100vw, 1080px);
        padding: 20px;
      }

      canvas {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 28px;
        border: 4px solid rgba(255, 251, 241, 0.7);
        background: #93d6f2;
        box-shadow:
          inset 0 0 0 3px rgba(255, 255, 255, 0.52),
          0 28px 70px rgba(15, 23, 42, 0.18);
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(23, 50, 77, 0.24);
        outline-offset: 6px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <main class="shell">
      <p id="stage-instructions" class="sr-only">Poop Rain 60. 캔버스에 포커스를 두고 Enter로 시작하세요. 진행 중에는 좌우 방향키로 이동하고 F로 전체화면을 켤 수 있습니다.</p>
      <canvas id="game" width="960" height="540" aria-label="Poop Rain 60" aria-describedby="stage-instructions" tabindex="0"></canvas>
    </main>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const SURVIVAL_TIME = 60;
      const GROUND_Y = 454;
      const PLAYER_SPEED = 360;
      const PLAYER_WIDTH = 56;
      const PLAYER_HEIGHT = 64;
      const BASE_SPAWN = 0.62;
      const relayContext = window.RelayRuntime?.readContext("poop-rain-60") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      let hostFailedReported = false;
      let hostClearedReported = false;

      const input = {
        left: false,
        right: false,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        poopHitsDodged: 0,
        player: createPlayer(),
        poops: [],
        spawnTimer: 0,
        spawnInterval: BASE_SPAWN,
        poopCounter: 0,
        clouds: [
          { x: 90, y: 96, w: 180, h: 54, speed: 10 },
          { x: 360, y: 142, w: 220, h: 62, speed: 18 },
          { x: 680, y: 112, w: 190, h: 58, speed: 14 },
        ],
        confetti: [],
      };

      let animationFrame = 0;
      let lastTimestamp = 0;

      function createPlayer() {
        return {
          x: VIEW.width / 2 - PLAYER_WIDTH / 2,
          y: GROUND_Y - PLAYER_HEIGHT,
          width: PLAYER_WIDTH,
          height: PLAYER_HEIGHT,
        };
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.poopHitsDodged = 0;
        state.player = createPlayer();
        state.poops = [];
        state.spawnTimer = 0.2;
        state.spawnInterval = BASE_SPAWN;
        state.poopCounter = 0;
        state.confetti = [];
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failRun() {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost();
      }

      function clearRun() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        spawnConfetti();
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function inRelayHost() {
        return window.parent && window.parent !== window && window.parent.RelayHost;
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost() {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearedBeforeFail: relayContext.clearCount,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function spawnConfetti() {
        state.confetti = [];
        for (let i = 0; i < 60; i += 1) {
          state.confetti.push({
            x: Math.random() * VIEW.width,
            y: -Math.random() * 120,
            vy: 80 + Math.random() * 180,
            size: 6 + Math.random() * 8,
            hue: 24 + Math.random() * 50,
          });
        }
      }

      function nextSpawnX(index) {
        const raw = Math.sin(index * 12.9898 + 78.233) * 43758.5453;
        const normalized = raw - Math.floor(raw);
        return 40 + normalized * (VIEW.width - 80);
      }

      function spawnPoop() {
        state.poopCounter += 1;
        const x = nextSpawnX(state.poopCounter);
        state.poops.push({
          x,
          y: -36,
          vx: Math.sin(state.poopCounter * 0.73) * 18,
          vy: 180 + Math.min(240, state.elapsed * 4.2) + (state.poopCounter % 5) * 18,
          size: 18 + (state.poopCounter % 4) * 3,
          wobble: state.poopCounter * 0.41,
        });
      }

      function update(dt) {
        updateClouds(dt);
        updateConfetti(dt);

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        state.spawnInterval = Math.max(0.22, BASE_SPAWN - state.elapsed * 0.0042);
        state.spawnTimer -= dt;
        while (state.spawnTimer <= 0) {
          spawnPoop();
          state.spawnTimer += state.spawnInterval;
        }

        const direction = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        state.player.x += direction * PLAYER_SPEED * dt;
        state.player.x = clamp(state.player.x, 18, VIEW.width - state.player.width - 18);

        for (const poop of state.poops) {
          poop.wobble += dt * 6;
          poop.x += poop.vx * dt + Math.sin(poop.wobble) * 22 * dt;
          poop.y += poop.vy * dt;
        }

        const playerRect = {
          x: state.player.x,
          y: state.player.y,
          w: state.player.width,
          h: state.player.height,
        };
        const alivePoops = [];
        for (const poop of state.poops) {
          const poopRect = {
            x: poop.x - poop.size * 0.68,
            y: poop.y - poop.size * 0.78,
            w: poop.size * 1.36,
            h: poop.size * 1.56,
          };
          if (rectOverlap(playerRect, poopRect)) {
            failRun();
            break;
          }
          if (poop.y < GROUND_Y + 46) {
            alivePoops.push(poop);
          } else {
            state.poopHitsDodged += 1;
          }
        }
        state.poops = alivePoops;

        if (state.mode === "running" && state.elapsed >= SURVIVAL_TIME) {
          clearRun();
        }
      }

      function updateClouds(dt) {
        for (const cloud of state.clouds) {
          cloud.x += cloud.speed * dt;
          if (cloud.x > VIEW.width + 140) {
            cloud.x = -cloud.w - 80;
          }
        }
      }

      function updateConfetti(dt) {
        state.confetti = state.confetti.filter((piece) => {
          piece.y += piece.vy * dt;
          return piece.y < VIEW.height + 20;
        });
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawSky();
        drawClouds();
        drawGround();
        drawShadows();
        drawPoops();
        drawPlayer();
        drawHud();
        drawOverlay();
      }

      function drawSky() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#8cd4f6");
        gradient.addColorStop(0.6, "#c4eefe");
        gradient.addColorStop(1, "#f0d1a5");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.beginPath();
        ctx.arc(820, 88, 42, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawClouds() {
        for (const cloud of state.clouds) {
          ctx.fillStyle = "rgba(255,255,255,0.82)";
          roundCloud(cloud.x, cloud.y, cloud.w, cloud.h);
          ctx.fill();
        }
      }

      function roundCloud(x, y, w, h) {
        ctx.beginPath();
        ctx.arc(x, y + h * 0.4, h * 0.34, Math.PI * 0.5, Math.PI * 1.5);
        ctx.arc(x + w * 0.26, y + h * 0.2, h * 0.32, Math.PI, Math.PI * 2);
        ctx.arc(x + w * 0.52, y + h * 0.18, h * 0.38, Math.PI, Math.PI * 2);
        ctx.arc(x + w * 0.78, y + h * 0.34, h * 0.3, Math.PI * 1.5, Math.PI * 0.5);
        ctx.closePath();
      }

      function drawGround() {
        ctx.fillStyle = "#977445";
        ctx.fillRect(0, GROUND_Y, VIEW.width, VIEW.height - GROUND_Y);
        ctx.fillStyle = "#dab575";
        ctx.fillRect(0, GROUND_Y, VIEW.width, 18);
        ctx.fillStyle = "rgba(61, 101, 46, 0.7)";
        for (let x = 0; x < VIEW.width; x += 22) {
          ctx.fillRect(x + 5, GROUND_Y - 8, 14, 8);
        }
      }

      function drawShadows() {
        for (const poop of state.poops) {
          const distance = clamp((GROUND_Y - poop.y) / GROUND_Y, 0, 1);
          const width = poop.size * (1.6 - distance * 0.8);
          const alpha = 0.08 + (1 - distance) * 0.18;
          ctx.fillStyle = `rgba(69, 48, 28, ${alpha})`;
          ctx.beginPath();
          ctx.ellipse(poop.x, GROUND_Y + 8, width, 8, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawPoops() {
        for (const poop of state.poops) {
          drawPoop(poop);
        }
      }

      function drawPoop(poop) {
        ctx.save();
        ctx.translate(poop.x, poop.y);
        ctx.fillStyle = "#6b3d18";
        ctx.beginPath();
        ctx.moveTo(-poop.size * 0.55, poop.size * 0.45);
        ctx.bezierCurveTo(-poop.size * 0.8, -poop.size * 0.05, -poop.size * 0.28, -poop.size * 0.32, 0, -poop.size * 0.15);
        ctx.bezierCurveTo(poop.size * 0.26, -poop.size * 0.48, poop.size * 0.7, -poop.size * 0.08, poop.size * 0.54, poop.size * 0.46);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#4e2f12";
        ctx.beginPath();
        ctx.arc(-poop.size * 0.12, -poop.size * 0.05, poop.size * 0.1, 0, Math.PI * 2);
        ctx.arc(poop.size * 0.2, poop.size * 0.06, poop.size * 0.08, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawPlayer() {
        const player = state.player;
        ctx.fillStyle = "#213752";
        ctx.fillRect(player.x + 10, player.y, player.width - 20, 16);
        ctx.fillStyle = "#f5bb7d";
        ctx.fillRect(player.x + 11, player.y + 14, player.width - 22, 16);
        ctx.fillStyle = "#d35b1f";
        ctx.fillRect(player.x + 5, player.y + 28, player.width - 10, 20);
        ctx.fillStyle = "#236cb8";
        ctx.fillRect(player.x + 3, player.y + 44, player.width - 6, 18);
        ctx.fillStyle = "#162032";
        ctx.fillRect(player.x + 5, player.y + 58, 14, 6);
        ctx.fillRect(player.x + player.width - 19, player.y + 58, 14, 6);
      }

      function drawHud() {
        ctx.fillStyle = "rgba(17, 24, 39, 0.82)";
        ctx.fillRect(20, 18, 322, 104);
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 20px Trebuchet MS";
        ctx.fillText("Poop Rain 60", 36, 46);
        ctx.font = "600 16px Trebuchet MS";
        const shownTime = state.mode === "running" ? state.elapsed : state.lastRunTime;
        const remain = Math.max(0, SURVIVAL_TIME - shownTime);
        ctx.fillText(`남은 시간 ${remain.toFixed(1)}s`, 36, 74);
        ctx.fillText(`피한 똥 ${state.poopHitsDodged}`, 36, 98);
      }

      function drawOverlay() {
        if (state.mode === "menu") {
          drawCenterCard("똥비 60초 생존", [
            "좌우 이동으로 하늘에서 떨어지는 똥을 60초 동안 피하세요.",
            "실패 조건: 똥에 한 번이라도 맞으면 즉시 종료.",
            "Enter로 시작, 방향키 좌우로 이동, F로 전체화면.",
          ], "#c64b17");
          return;
        }

        if (state.mode === "failed") {
          drawCenterCard("실패", [
            `생존 시간 ${state.lastRunTime.toFixed(1)}초`,
            "똥에 맞는 순간 공유 목숨 1개가 끝납니다.",
            "Enter로 다시 시작하세요.",
          ], "#8f1d1d");
          return;
        }

        if (state.mode === "cleared") {
          drawCenterCard("클리어", [
            "60초를 버텼습니다.",
            "다음 스테이지는 안 해본 게임 중 랜덤으로 선택됩니다.",
            "Enter로 다음 랜덤 스테이지로 이동합니다.",
          ], "#166534");
          drawConfetti();
        }
      }

      function drawCenterCard(title, lines, accent) {
        const width = 620;
        const height = 228;
        const x = (VIEW.width - width) / 2;
        const y = 126;

        ctx.fillStyle = "rgba(255, 250, 241, 0.95)";
        ctx.fillRect(x, y, width, height);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(x, y, width, height);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, y + 54);
        ctx.fillStyle = "#172033";
        ctx.font = "600 19px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, y + 102 + index * 34);
        });
        ctx.textAlign = "left";
      }

      function drawConfetti() {
        for (const piece of state.confetti) {
          ctx.fillStyle = `hsl(${piece.hue} 85% 55%)`;
          ctx.fillRect(piece.x, piece.y, piece.size, piece.size * 0.55);
        }
      }

      function rectOverlap(a, b) {
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function round1(value) {
        return Math.round(value * 10) / 10;
      }

      function renderGameToText() {
        const shownTime = state.mode === "running" ? state.elapsed : state.lastRunTime;
        return JSON.stringify({
          coordinate_system: "origin top-left, x right, y down, units in pixels",
          mode: state.mode,
          player: {
            x: round1(state.player.x),
            y: round1(state.player.y),
            w: state.player.width,
            h: state.player.height,
          },
          time_remaining: round1(Math.max(0, SURVIVAL_TIME - shownTime)),
          dodged: state.poopHitsDodged,
          active_poops: state.poops.slice(0, 8).map((poop) => ({
            x: round1(poop.x),
            y: round1(poop.y),
            size: poop.size,
            vy: round1(poop.vy),
          })),
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          canvas.requestFullscreen?.();
        }
      }

      function onKeyDown(event) {
        const lower = event.key.toLowerCase();
        if (event.key === "ArrowLeft") {
          input.left = true;
        }
        if (event.key === "ArrowRight") {
          input.right = true;
        }
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed") {
            resetRun();
          } else if (state.mode === "cleared") {
            if (inRelayHost()) {
              return;
            }
            if (window.RelayRuntime && window.COMMUNITY_STAGE_REGISTRY) {
              window.RelayRuntime.goToRandomNext(window.COMMUNITY_STAGE_REGISTRY, "poop-rain-60");
            } else {
              resetRun();
            }
          }
        }
        if (lower === "f") {
          toggleFullscreen();
        }
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft") {
          input.left = false;
        }
        if (event.key === "ArrowRight") {
          input.right = false;
        }
      }

      function frame(timestamp) {
        const delta = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(delta);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "poop-rain-60",
        title: "Poop Rain 60",
        creator: "Codex",
        genre: "Arcade survival",
        clearCondition: "60초 동안 하늘에서 떨어지는 똥을 피하기",
        previousStageId: relayContext.previousStageId,
      };
      window.relayStageResult = { status: "running" };
      window.resetGame = resetRun;
      window.__relayDebug = {
        setPlayerX(x) {
          state.player.x = clamp(x, 18, VIEW.width - state.player.width - 18);
          render();
        },
        setElapsed(seconds) {
          state.elapsed = Math.max(0, seconds);
          render();
        },
        clearPoops() {
          state.poops = [];
          render();
        },
        spawnPoopAt(x, y = -20, vy = 220, size = 22) {
          state.poops.push({
            x,
            y,
            vx: 0,
            vy,
            size,
            wobble: 0,
          });
          render();
        },
      };
      window.relayStageDebug = {
        forceClear() {
          resetRun();
          state.elapsed = SURVIVAL_TIME;
          clearRun();
          render();
        },
        forceFail() {
          resetRun();
          failRun();
          render();
        },
      };

      document.addEventListener("keydown", onKeyDown);
      document.addEventListener("keyup", onKeyUp);
      document.addEventListener("fullscreenchange", render);
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("blur", () => {
        input.left = false;
        input.right = false;
      });

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));
    </script>
  </body>
</html>
