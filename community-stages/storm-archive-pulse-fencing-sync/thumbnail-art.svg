<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="480" y1="0" x2="480" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10263A"/>
      <stop offset="1" stop-color="#050910"/>
    </linearGradient>
    <radialGradient id="storm" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(480 250) rotate(90) scale(210 280)">
      <stop stop-color="#5AC9FF" stop-opacity=".45"/>
      <stop offset=".55" stop-color="#1A4367" stop-opacity=".18"/>
      <stop offset="1" stop-color="#061018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="300" y1="180" x2="620" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9AE7FF"/>
      <stop offset=".55" stop-color="#68D0FF"/>
      <stop offset="1" stop-color="#7BFFD8"/>
    </linearGradient>
    <linearGradient id="pulseA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9AE7FF"/>
      <stop offset="1" stop-color="#6FAEFF"/>
    </linearGradient>
    <linearGradient id="pulseB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD48A"/>
      <stop offset="1" stop-color="#FF8E74"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#storm)"/>

  <g opacity=".35" stroke="#8FD8FF">
    <path d="M180 118C244 86 334 74 430 96C524 118 612 180 702 194C777 206 832 192 870 176" stroke-width="2"/>
    <path d="M112 394C210 330 284 280 390 286C489 292 566 360 662 378C748 394 824 372 894 332" stroke-width="2"/>
    <circle cx="480" cy="270" r="92" stroke-width="2"/>
    <circle cx="480" cy="270" r="138" stroke-width="1.5"/>
    <circle cx="480" cy="270" r="198" stroke-width="1.5" opacity=".5"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="480" cy="270" r="46" fill="#F1FCFF"/>
    <circle cx="480" cy="270" r="82" fill="#8FD8FF" fill-opacity=".16"/>
    <path d="M566 178C618 193 659 221 694 256" stroke="url(#shield)" stroke-width="24" stroke-linecap="round"/>
    <path d="M564 178C619 191 660 220 696 257" stroke="#F8FDFF" stroke-width="9" stroke-linecap="round"/>
  </g>

  <g filter="url(#glow)">
    <path d="M748 168L658 210" stroke="url(#pulseA)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="648" cy="214" r="12" fill="url(#pulseA)"/>
    <text x="648" y="220" text-anchor="middle" font-size="20" font-family="Trebuchet MS, sans-serif" font-weight="700" fill="#F8FDFF">△</text>

    <path d="M716 212L626 238" stroke="url(#pulseB)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="616" cy="241" r="12" fill="url(#pulseB)"/>
    <text x="616" y="247" text-anchor="middle" font-size="20" font-family="Trebuchet MS, sans-serif" font-weight="700" fill="#F8FDFF">◇</text>
  </g>

  <g fill="#DDF2FF" fill-opacity=".92" font-family="Trebuchet MS, sans-serif">
    <text x="58" y="74" font-size="22" font-weight="700" letter-spacing="3">STORM ARCHIVE</text>
    <text x="58" y="116" font-size="54" font-weight="800">Pulse Fence</text>
    <text x="58" y="154" font-size="22" fill="#A7C3D6">SYNC GATE 3 / FINAL RUSH</text>
  </g>

  <g>
    <rect x="58" y="400" width="260" height="24" rx="12" fill="#173043"/>
    <rect x="58" y="400" width="194" height="24" rx="12" fill="url(#shield)"/>
    <text x="58" y="384" font-size="20" font-family="Trebuchet MS, sans-serif" font-weight="700" fill="#DDF2FF">연속 반사 14 / 20</text>

    <rect x="700" y="402" width="188" height="58" rx="18" fill="#0B1725" fill-opacity=".88" stroke="#36566E"/>
    <text x="720" y="436" font-size="18" font-family="Trebuchet MS, sans-serif" font-weight="700" fill="#DDF2FF">실수 1 / 4</text>
    <text x="720" y="456" font-size="14" font-family="Trebuchet MS, sans-serif" fill="#9EC0D7">코어 문양 1 · 0 · 1</text>
  </g>
</svg>
