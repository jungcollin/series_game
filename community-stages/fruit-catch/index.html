<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>과일 잡기 - One Life Relay</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        background-color: #0f172a;
        color: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        min-height: 400px;
        height: 100dvh;
        overflow: hidden;
        touch-action: none;
        user-select: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }

      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #2563eb;
        color: white;
        padding: 8px;
        z-index: 100;
      }
      .skip-link:focus { top: 0; }

      #game-container {
        position: relative;
        width: 100%;
        max-width: 960px;
        aspect-ratio: 16 / 9; min-height: 250px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #1e293b;
      }
      canvas:focus-visible { outline: 4px solid #3b82f6; outline-offset: -4px; }

      .mobile-controls {
        position: absolute;
        bottom: 24px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        padding: 0 48px;
        pointer-events: none;
        z-index: 10;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
        cursor: pointer;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">과일 잡기. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 좌우 화살표 키 또는 화면 양쪽 터치 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>

    <div id="game-container">
      <canvas id="game" width="960" height="540" aria-label="과일 잡기" aria-describedby="stage-instructions" tabindex="0"></canvas>

      <div class="mobile-controls" aria-hidden="true">
        <button type="button" class="mobile-btn" id="btn-left" aria-label="왼쪽 이동">◀</button>
        <button type="button" class="mobile-btn" id="btn-right" aria-label="오른쪽 이동">▶</button>
      </div>
    </div>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("fruit-catch") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "떨어지는 과일을 잡는 게임입니다.",
        playerX: VIEW.width / 2,
        playerY: VIEW.height - 50,
        playerWidth: 80,
        playerHeight: 20,
        score: 0,
        items: [],
        itemTimer: 0,
        targetScore: 10,
        keys: { ArrowLeft: false, ArrowRight: false }
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.playerX = VIEW.width / 2;
        state.score = 0;
        state.items = [];
        state.itemTimer = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        document.querySelector('.mobile-controls').style.pointerEvents = 'auto';
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
        document.querySelector('.mobile-controls').style.pointerEvents = 'none';
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
        document.querySelector('.mobile-controls').style.pointerEvents = 'none';
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function spawnItem() {
        const type = Math.random() < 0.2 ? 'bomb' : 'fruit';
        const item = {
          x: Math.random() * (VIEW.width - 40) + 20,
          y: -20,
          radius: 15,
          type: type,
          speed: 150 + Math.random() * 100 + (state.score * 10)
        };
        state.items.push(item);
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          const speed = 400;
          if (state.keys.ArrowLeft) state.playerX -= speed * dt;
          if (state.keys.ArrowRight) state.playerX += speed * dt;

          state.playerX = Math.max(state.playerWidth / 2, Math.min(VIEW.width - state.playerWidth / 2, state.playerX));

          state.itemTimer += dt;
          if (state.itemTimer > Math.max(0.4, 1.2 - state.score * 0.05)) {
            spawnItem();
            state.itemTimer = 0;
          }

          for (let i = state.items.length - 1; i >= 0; i--) {
            let item = state.items[i];
            item.y += item.speed * dt;

            // Collision logic
            if (item.y + item.radius > state.playerY &&
                item.y - item.radius < state.playerY + state.playerHeight &&
                item.x + item.radius > state.playerX - state.playerWidth/2 &&
                item.x - item.radius < state.playerX + state.playerWidth/2) {

              if (item.type === 'bomb') {
                failStage("폭탄을 잡았습니다.");
              } else {
                state.score++;
                state.items.splice(i, 1);
                if (state.score >= state.targetScore) {
                  clearStage();
                }
              }
            } else if (item.y > VIEW.height + 20) {
              state.items.splice(i, 1);
            }
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function drawGame() {
        ctx.fillStyle = "#1e293b";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        // Player
        ctx.fillStyle = "#3b82f6";
        ctx.fillRect(state.playerX - state.playerWidth / 2, state.playerY, state.playerWidth, state.playerHeight);

        // Items
        for (let item of state.items) {
          ctx.beginPath();
          ctx.arc(item.x, item.y, item.radius, 0, Math.PI * 2);
          ctx.fillStyle = item.type === 'bomb' ? '#ef4444' : '#22c55e';
          ctx.fill();
          ctx.closePath();
        }

        // UI
        ctx.fillStyle = "#fff";
        ctx.font = "24px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`점수: ${state.score} / ${state.targetScore}`, 20, 40);
      }

      function render() {
        drawGame(); // Draw game in background even when menu/cleared/failed

        if (state.mode === "menu") {
          renderCard("과일 잡기", [
            "떨어지는 과일을 잡는 게임입니다.",
            "조작: 좌우 화살표 키 또는 화면 양쪽 터치",
            "클리어 조건: 과일을 10개 잡으세요.",
            "실패 조건: 폭탄을 잡으면 실패합니다.",
            "터치 또는 Enter로 시작."
          ], "#f97316");
          return;
        }

        if (state.mode === "failed") {
          renderCard("실패", [
            "폭탄을 잡으면 실패합니다.",
            "공유 목숨 1개가 즉시 종료되었습니다."
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
            renderCard("클리어", [
            "과일을 10개 잡으세요.",
            "호스트가 다음 미플레이 스테이지를 랜덤으로 선택합니다."
            ], "#15803d");
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
        if (event.key in state.keys) {
          event.preventDefault();
          state.keys[event.key] = true;
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
              startStage();
          }
        }
      }

      function onKeyUp(event) {
        if (event.key in state.keys) {
          event.preventDefault();
          state.keys[event.key] = false;
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "fruit-catch",
        title: "과일 잡기",
        creator: "AI Agent",
        genre: "아케이드",
        clearCondition: "과일을 10개 잡으세요.",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      // Set up mobile controls
      const btnLeft = document.getElementById("btn-left");
      const btnRight = document.getElementById("btn-right");

      bindHoldButton(
        btnLeft,
        () => { state.keys.ArrowLeft = true; },
        () => { state.keys.ArrowLeft = false; }
      );
      bindHoldButton(
        btnRight,
        () => { state.keys.ArrowRight = true; },
        () => { state.keys.ArrowRight = false; }
      );

      // Also support direct canvas touch for moving
      canvas.addEventListener("touchstart", (event) => {
        event.preventDefault();
        startFromTouch();
        if (state.mode === "running") {
            const touch = event.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;

            // Very simple mapping: if touch is on left half, move left, else right
            if (touchX < rect.width / 2) {
                state.keys.ArrowLeft = true;
                state.keys.ArrowRight = false;
            } else {
                state.keys.ArrowLeft = false;
                state.keys.ArrowRight = true;
            }
        }
      }, { passive: false });

      canvas.addEventListener("touchmove", (event) => {
          event.preventDefault();
          if (state.mode === "running") {
            const touch = event.touches[0];
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            if (touchX < rect.width / 2) {
                state.keys.ArrowLeft = true;
                state.keys.ArrowRight = false;
            } else {
                state.keys.ArrowLeft = false;
                state.keys.ArrowRight = true;
            }
          }
      }, {passive: false});

      canvas.addEventListener("touchend", (event) => {
          event.preventDefault();
          state.keys.ArrowLeft = false;
          state.keys.ArrowRight = false;
      }, {passive: false});

      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
