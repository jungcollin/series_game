<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midnight Harbor: Gravity Fold</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(62, 109, 185, 0.24), transparent 38%),
          linear-gradient(180deg, #020617 0%, #07111f 52%, #091d2c 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(125, 211, 252, 0.24);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 30;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.94);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(186, 230, 253, 0.96);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 12px;
        z-index: 24;
        display: flex;
        justify-content: center;
        padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 18px;
        min-height: 56px;
        padding: 0 10px;
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.72));
        color: #e2e8f0;
        box-shadow:
          0 10px 24px rgba(2, 6, 23, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        font: 800 15px/1 "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        touch-action: none;
        transition:
          transform 0.16s ease,
          background 0.16s ease,
          border-color 0.16s ease;
      }

      .mobile-btn[data-active="true"] {
        transform: translateY(1px) scale(0.97);
        background:
          linear-gradient(180deg, rgba(14, 165, 233, 0.92), rgba(37, 99, 235, 0.84));
        border-color: rgba(186, 230, 253, 0.72);
      }

      .mobile-btn:focus-visible {
        outline: 3px solid rgba(186, 230, 253, 0.95);
        outline-offset: 2px;
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls__row {
          gap: 6px;
          width: min(100%, 340px);
        }

        .mobile-btn {
          min-height: 54px;
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Midnight Harbor: Gravity Fold. 좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      목격 게이지를 낮게 유지한 채 코어를 균열 없이 목적 슬롯까지 옮기면 클리어. 목격 게이지가 끝까지 차거나 코어 충격 게이지가 가득 차면 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Midnight Harbor: Gravity Fold"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작">
      <div class="mobile-controls__row">
        <button id="left-btn" class="mobile-btn" type="button" aria-label="왼쪽 이동">좌</button>
        <button id="right-btn" class="mobile-btn" type="button" aria-label="오른쪽 이동">우</button>
        <button id="fold-btn" class="mobile-btn" type="button" aria-label="중력 축 전환">중력</button>
        <button id="stabilize-btn" class="mobile-btn" type="button" aria-label="안정화 유지">정지</button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const TITLE = "Midnight Harbor: Gravity Fold";
      const STAGE_ID = "midnight-harbor-gravity-folding-witness";
      const CREATOR = "jungcollin";
      const GENRE = "Gravity courier / 목격 게이지";
      const CONTROLS_TEXT =
        "좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_CONDITION =
        "목격 게이지를 낮게 유지한 채 코어를 균열 없이 목적 슬롯까지 옮기면 클리어";
      const FAIL_CONDITION =
        "목격 게이지가 끝까지 차거나 코어 충격 게이지가 가득 차면 실패";
      const DESCRIPTION =
        "중력 축을 접고 펴며 항만 사이를 미끄러져, 시선이 몰리는 막판 전에 코어를 숨겨 배달하세요.";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const leftButton = document.querySelector("#left-btn");
      const rightButton = document.querySelector("#right-btn");
      const foldButton = document.querySelector("#fold-btn");
      const stabilizeButton = document.querySelector("#stabilize-btn");

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let foldCooldown = 0;

      const WORLD = {
        left: 34,
        top: 34,
        right: 926,
        bottom: 506,
      };

      const START = { x: 110, y: 430 };
      const GOAL = { x: 872, y: 120, w: 54, h: 90 };
      const HARBOR_LINE = 362;

      const GRAVITY_AXES = [
        { name: "DOWN", x: 0, y: 1, label: "중력 하강" },
        { name: "RIGHT", x: 1, y: 0, label: "중력 우측 접힘" },
        { name: "UP", x: 0, y: -1, label: "중력 상승" },
        { name: "LEFT", x: -1, y: 0, label: "중력 좌측 접힘" },
      ];

      const OBSTACLES = [
        {
          x: 178,
          y: 108,
          w: 188,
          h: 56,
          label: "north-stack",
          palette: ["#294b73", "#1e3654"],
        },
        {
          x: 246,
          y: 346,
          w: 238,
          h: 92,
          label: "dry-dock",
          palette: ["#71412b", "#512d1f"],
        },
        {
          x: 416,
          y: 204,
          w: 82,
          h: 178,
          label: "signal-pillar",
          palette: ["#475569", "#1e293b"],
        },
        {
          x: 586,
          y: 112,
          w: 106,
          h: 64,
          label: "crane-hub",
          palette: ["#5a2d72", "#321747"],
        },
        {
          x: 626,
          y: 298,
          w: 188,
          h: 48,
          label: "gantry-bridge",
          palette: ["#7c3b2d", "#4b241e"],
        },
        {
          x: 744,
          y: 174,
          w: 86,
          h: 154,
          label: "inspection-wall",
          palette: ["#1f4f68", "#113142"],
        },
      ];

      const WATCHERS = [
        {
          x: 210,
          y: 82,
          base: 0.78,
          sweep: 0.5,
          speed: 0.9,
          arc: 0.64,
          range: 292,
          intensity: 14,
          activation: 0,
          color: "#7dd3fc",
          name: "dock-cam-alpha",
        },
        {
          x: 566,
          y: 476,
          base: -1.65,
          sweep: 0.78,
          speed: 1.05,
          arc: 0.6,
          range: 318,
          intensity: 18,
          activation: 0.18,
          color: "#fca5a5",
          name: "dock-cam-beta",
        },
        {
          x: 878,
          y: 72,
          base: 2.38,
          sweep: 0.94,
          speed: 1.2,
          arc: 0.5,
          range: 288,
          intensity: 24,
          activation: 0.42,
          color: "#fde68a",
          name: "dock-cam-gamma",
        },
      ];

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        gravityIndex: 0,
        witness: 10,
        shock: 0,
        progress: 0,
        dockProgress: 0,
        shake: 0,
        flash: 0,
        glitch: 0,
        overlayPulse: 0,
        infoPulse: 0,
        currentToast: "",
        visibleWatchers: [],
        player: null,
        core: null,
        particles: [],
        popups: [],
        input: {
          moveX: 0,
          keyLeft: false,
          keyRight: false,
          stabilizeKey: false,
          stabilizeHold: false,
          dragMove: 0,
          pointerId: null,
          pointerActive: false,
          pointerStartX: 0,
          pointerStartY: 0,
          pointerX: 0,
          pointerY: 0,
          pointerTime: 0,
          pointerMoved: false,
        },
      };

      function resetEntities() {
        state.player = {
          x: START.x,
          y: START.y,
          vx: 0,
          vy: 0,
          r: 18,
        };
        state.core = {
          x: START.x,
          y: START.y + 40,
          vx: 0,
          vy: 0,
          r: 15,
          cracks: 0,
        };
      }

      resetEntities();

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function length(x, y) {
        return Math.sqrt(x * x + y * y);
      }

      function normalize(x, y) {
        const mag = length(x, y) || 1;
        return { x: x / mag, y: y / mag };
      }

      function angleDiff(a, b) {
        let value = a - b;
        while (value > Math.PI) value -= Math.PI * 2;
        while (value < -Math.PI) value += Math.PI * 2;
        return value;
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function addPopup(text, x, y, color) {
        state.popups.push({ text, x, y, color, life: 0.9 });
      }

      function addImpactBurst(x, y, color, count) {
        const particleCount = prefersReducedMotion ? Math.max(4, Math.floor(count * 0.35)) : count;
        for (let index = 0; index < particleCount; index += 1) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 180);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.24, 0.58),
            radius: rand(1.5, 4.8),
            color,
          });
        }
      }

      function pushToast(text, color) {
        state.currentToast = text;
        addPopup(text, state.core.x, state.core.y - 20, color);
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function currentGravity() {
        return GRAVITY_AXES[state.gravityIndex];
      }

      function resetRound() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.gravityIndex = 0;
        state.witness = 12;
        state.shock = 0;
        state.progress = 0;
        state.dockProgress = 0;
        state.shake = 0;
        state.flash = 0;
        state.glitch = 0;
        state.overlayPulse = 0;
        state.infoPulse = 0;
        state.currentToast = "";
        state.visibleWatchers = [];
        state.particles = [];
        state.popups = [];
        state.input.dragMove = 0;
        state.input.pointerActive = false;
        state.input.pointerId = null;
        state.input.pointerMoved = false;
        state.input.stabilizeHold = false;
        resetEntities();
        foldCooldown = 0;
      }

      function startStage() {
        resetRound();
        state.mode = "running";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        canvas.focus({ preventScroll: true });
      }

      function failStage(reason = FAIL_CONDITION) {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.currentToast = reason;
        state.shake = Math.max(state.shake, 18);
        state.flash = 0.48;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.currentToast = "슬롯 잠금 완료";
        state.flash = 0.28;
        window.relayStageResult.status = "cleared";
        addImpactBurst(GOAL.x + GOAL.w * 0.5, GOAL.y + GOAL.h * 0.5, "#67e8f9", 46);
        reportClearedToHost();
      }

      function cycleGravity() {
        if (state.mode !== "running" || foldCooldown > 0) {
          return;
        }
        state.gravityIndex = (state.gravityIndex + 1) % GRAVITY_AXES.length;
        foldCooldown = 0.22;
        state.shake = Math.max(state.shake, 6);
        state.flash = Math.max(state.flash, 0.08);
        addImpactBurst(state.player.x, state.player.y, "#7dd3fc", 18);
        pushToast(currentGravity().label, "#7dd3fc");
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function setMoveInput(direction, active) {
        if (direction < 0) {
          state.input.keyLeft = active;
        }
        if (direction > 0) {
          state.input.keyRight = active;
        }
      }

      function setButtonActive(button, active) {
        if (button) {
          button.dataset.active = active ? "true" : "false";
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          setButtonActive(button, false);
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          setButtonActive(button, true);
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function bindTapButton(button, onTap) {
        if (!button) {
          return;
        }
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          setButtonActive(button, true);
          onTap?.();
          button.setPointerCapture?.(event.pointerId);
        });
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          setButtonActive(button, false);
        };
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      bindHoldButton(leftButton, () => setMoveInput(-1, true), () => setMoveInput(-1, false));
      bindHoldButton(rightButton, () => setMoveInput(1, true), () => setMoveInput(1, false));
      bindTapButton(foldButton, () => cycleGravity());
      bindHoldButton(
        stabilizeButton,
        () => {
          state.input.stabilizeHold = true;
        },
        () => {
          state.input.stabilizeHold = false;
        }
      );

      function reflectVelocity(entity, nx, ny, restitution) {
        const dot = entity.vx * nx + entity.vy * ny;
        if (dot >= 0) {
          return 0;
        }
        entity.vx -= (1 + restitution) * dot * nx;
        entity.vy -= (1 + restitution) * dot * ny;
        return Math.abs(dot);
      }

      function resolveBounds(entity, restitution, impactScale) {
        let impact = 0;
        if (entity.x - entity.r < WORLD.left) {
          entity.x = WORLD.left + entity.r;
          impact = Math.max(impact, reflectVelocity(entity, 1, 0, restitution));
        }
        if (entity.x + entity.r > WORLD.right) {
          entity.x = WORLD.right - entity.r;
          impact = Math.max(impact, reflectVelocity(entity, -1, 0, restitution));
        }
        if (entity.y - entity.r < WORLD.top) {
          entity.y = WORLD.top + entity.r;
          impact = Math.max(impact, reflectVelocity(entity, 0, 1, restitution));
        }
        if (entity.y + entity.r > WORLD.bottom) {
          entity.y = WORLD.bottom - entity.r;
          impact = Math.max(impact, reflectVelocity(entity, 0, -1, restitution));
        }
        if (impact > 0 && impactScale > 0) {
          applyCoreImpact(impact * impactScale, entity.x, entity.y);
        }
      }

      function resolveCircleRect(entity, rect, restitution, impactScale) {
        const closestX = clamp(entity.x, rect.x, rect.x + rect.w);
        const closestY = clamp(entity.y, rect.y, rect.y + rect.h);
        let dx = entity.x - closestX;
        let dy = entity.y - closestY;
        let distanceSq = dx * dx + dy * dy;

        if (distanceSq >= entity.r * entity.r) {
          return;
        }

        if (distanceSq === 0) {
          const leftDist = Math.abs(entity.x - rect.x);
          const rightDist = Math.abs(rect.x + rect.w - entity.x);
          const topDist = Math.abs(entity.y - rect.y);
          const bottomDist = Math.abs(rect.y + rect.h - entity.y);
          const minDist = Math.min(leftDist, rightDist, topDist, bottomDist);
          if (minDist === leftDist) {
            dx = -1;
            dy = 0;
          } else if (minDist === rightDist) {
            dx = 1;
            dy = 0;
          } else if (minDist === topDist) {
            dx = 0;
            dy = -1;
          } else {
            dx = 0;
            dy = 1;
          }
          distanceSq = 1;
        }

        const distance = Math.sqrt(distanceSq);
        const nx = dx / distance;
        const ny = dy / distance;
        const overlap = entity.r - distance;
        entity.x += nx * overlap;
        entity.y += ny * overlap;
        const impact = reflectVelocity(entity, nx, ny, restitution);
        if (impact > 0 && impactScale > 0) {
          applyCoreImpact(impact * impactScale, entity.x - nx * entity.r, entity.y - ny * entity.r);
        }
      }

      function applyCoreImpact(impact, x, y) {
        if (impact < 42 || state.mode !== "running") {
          return;
        }
        const normalizedImpact = clamp((impact - 42) * 0.22, 1.4, 18);
        state.shock = clamp(state.shock + normalizedImpact, 0, 100);
        state.shake = Math.max(state.shake, normalizedImpact * 0.8);
        state.flash = Math.max(state.flash, normalizedImpact * 0.008);
        state.core.cracks = clamp(state.shock / 24, 0, 4);
        addImpactBurst(x, y, "#fb7185", 14 + Math.floor(normalizedImpact));
        if (normalizedImpact > 5.5) {
          pushToast("코어 균열", "#fb7185");
        }
        if (state.shock >= 100) {
          failStage(FAIL_CONDITION);
        }
      }

      function pointInsideRect(x, y, rect, padding = 0) {
        return (
          x >= rect.x - padding &&
          x <= rect.x + rect.w + padding &&
          y >= rect.y - padding &&
          y <= rect.y + rect.h + padding
        );
      }

      function lineBlocked(startX, startY, endX, endY) {
        for (const rect of OBSTACLES) {
          const steps = 12;
          for (let index = 1; index < steps; index += 1) {
            const amount = index / steps;
            const x = lerp(startX, endX, amount);
            const y = lerp(startY, endY, amount);
            if (pointInsideRect(x, y, rect, 2)) {
              return true;
            }
          }
        }
        return false;
      }

      function watcherVisibility(watcher) {
        if (state.progress < watcher.activation) {
          return { visible: false, angle: watcher.base, strength: 0 };
        }
        const intensityBoost = 1 + Math.max(0, state.progress - watcher.activation) * 0.9;
        const sweepAngle = watcher.base + Math.sin(state.elapsed * watcher.speed + watcher.activation * 7) * watcher.sweep;
        const dx = state.core.x - watcher.x;
        const dy = state.core.y - watcher.y;
        const dist = length(dx, dy);
        const angle = Math.atan2(dy, dx);
        const diff = Math.abs(angleDiff(angle, sweepAngle));
        const unblocked = !lineBlocked(watcher.x, watcher.y, state.core.x, state.core.y);
        const visible = dist < watcher.range && diff < watcher.arc && unblocked;
        const strength = visible
          ? (1 - dist / watcher.range) * watcher.intensity * intensityBoost
          : 0;
        return { visible, angle: sweepAngle, strength };
      }

      function updateWitness(dt) {
        state.visibleWatchers = [];
        const coreSpeed = length(state.core.vx, state.core.vy);
        const calmBonus = state.input.stabilizeHold && coreSpeed < 74 ? 8 : 0;
        const basePressure = 2.5 + state.progress * 10 + Math.max(0, state.progress - 0.66) * 16;

        let exposure = 0;
        for (const watcher of WATCHERS) {
          const result = watcherVisibility(watcher);
          if (result.visible) {
            state.visibleWatchers.push({
              name: watcher.name,
              angle: Number(result.angle.toFixed(2)),
              strength: Number(result.strength.toFixed(1)),
            });
            exposure += result.strength;
          }
        }

        if (exposure > 0) {
          const multiplier = state.input.stabilizeHold && coreSpeed < 92 ? 0.58 : 1;
          state.witness = clamp(state.witness + (basePressure + exposure) * dt * multiplier, 0, 100);
          state.glitch = Math.max(state.glitch, clamp(exposure * 0.008, 0.06, 0.34));
          if (exposure > 14 && Math.random() < 0.035) {
            addImpactBurst(state.core.x, state.core.y, "#fef08a", 6);
          }
        } else {
          state.witness = clamp(state.witness - (7 + calmBonus + Math.max(0, 8 - basePressure * 0.2)) * dt, 0, 100);
        }

        if (state.witness >= 100) {
          failStage(FAIL_CONDITION);
        }
      }

      function updateDocking(dt) {
        const insideGoal =
          pointInsideRect(state.core.x, state.core.y, GOAL, -6) &&
          pointInsideRect(state.player.x, state.player.y, { x: GOAL.x - 94, y: GOAL.y - 42, w: 158, h: 146 });
        const coreSpeed = length(state.core.vx, state.core.vy);
        if (insideGoal && coreSpeed < 104) {
          state.dockProgress = clamp(state.dockProgress + dt * (state.input.stabilizeHold ? 1.6 : 1), 0, 1);
          if (state.dockProgress >= 1) {
            clearStage();
          }
        } else {
          state.dockProgress = clamp(state.dockProgress - dt * 0.9, 0, 1);
        }
      }

      function updateParticles(dt) {
        for (const particle of state.particles) {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 12 * dt;
          particle.life -= dt;
        }
        state.particles = state.particles.filter((particle) => particle.life > 0);

        for (const popup of state.popups) {
          popup.y -= 18 * dt;
          popup.life -= dt;
        }
        state.popups = state.popups.filter((popup) => popup.life > 0);
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.overlayPulse += dt;
        state.infoPulse += dt;
        foldCooldown = Math.max(0, foldCooldown - dt);
        state.shake = Math.max(0, state.shake - dt * 18);
        state.flash = Math.max(0, state.flash - dt * 1.35);
        state.glitch = Math.max(0, state.glitch - dt * 1.2);

        const moveInput =
          (state.input.keyRight ? 1 : 0) -
          (state.input.keyLeft ? 1 : 0) +
          state.input.dragMove;
        const moveX = clamp(moveInput, -1, 1);
        const gravity = currentGravity();
        const player = state.player;
        const core = state.core;

        const stabilizeActive = state.input.stabilizeHold || state.input.stabilizeKey;
        const thrust = 980;
        const gravityForce = 420;

        player.vx += moveX * thrust * dt;
        player.vx += gravity.x * gravityForce * dt;
        player.vy += gravity.y * gravityForce * dt;
        player.vy += Math.sin(state.elapsed * 2.8) * 4 * dt;

        const playerDamping = stabilizeActive ? 0.91 : 0.968;
        player.vx *= playerDamping;
        player.vy *= playerDamping;

        const playerSpeed = length(player.vx, player.vy);
        const maxPlayerSpeed = stabilizeActive ? 146 : 278;
        if (playerSpeed > maxPlayerSpeed) {
          const norm = normalize(player.vx, player.vy);
          player.vx = norm.x * maxPlayerSpeed;
          player.vy = norm.y * maxPlayerSpeed;
        }

        player.x += player.vx * dt;
        player.y += player.vy * dt;
        resolveBounds(player, 0.14, 0);
        for (const rect of OBSTACLES) {
          resolveCircleRect(player, rect, 0.1, 0);
        }

        const tetherOffset = 46;
        const targetX = player.x - gravity.x * tetherOffset;
        const targetY = player.y - gravity.y * tetherOffset;
        const springX = targetX - core.x;
        const springY = targetY - core.y;

        core.vx += springX * (stabilizeActive ? 12.5 : 8.3) * dt;
        core.vy += springY * (stabilizeActive ? 12.5 : 8.3) * dt;
        core.vx += player.vx * 0.18 * dt * 60;
        core.vy += player.vy * 0.18 * dt * 60;
        core.vx += gravity.x * gravityForce * 0.84 * dt;
        core.vy += gravity.y * gravityForce * 0.84 * dt;

        const coreDamping = stabilizeActive ? 0.88 : 0.975;
        core.vx *= coreDamping;
        core.vy *= coreDamping;

        const coreSpeed = length(core.vx, core.vy);
        const maxCoreSpeed = stabilizeActive ? 168 : 324;
        if (coreSpeed > maxCoreSpeed) {
          const norm = normalize(core.vx, core.vy);
          core.vx = norm.x * maxCoreSpeed;
          core.vy = norm.y * maxCoreSpeed;
        }

        core.x += core.vx * dt;
        core.y += core.vy * dt;
        resolveBounds(core, 0.28, 1);
        for (const rect of OBSTACLES) {
          resolveCircleRect(core, rect, 0.28, 1);
        }

        const routeDistance = length(GOAL.x - START.x, GOAL.y - START.y);
        const remainingDistance = length(GOAL.x - core.x, GOAL.y - core.y);
        state.progress = clamp(1 - remainingDistance / routeDistance, 0, 1);

        if (Math.abs(core.x - player.x) > 74 || Math.abs(core.y - player.y) > 74) {
          state.shock = clamp(state.shock + dt * 3.1, 0, 100);
        } else {
          state.shock = clamp(state.shock - dt * (stabilizeActive ? 4.2 : 1.25), 0, 100);
        }

        updateWitness(dt);
        updateDocking(dt);

        if (state.progress > 0.74 && state.visibleWatchers.length > 0 && Math.random() < 0.02) {
          pushToast("시선 집중", "#fde68a");
        }
      }

      function update(dt) {
        updateParticles(dt);
        if (state.mode === "running") {
          updateRunning(dt);
          return;
        }
        state.overlayPulse += dt;
        state.infoPulse += dt;
        state.shake = Math.max(0, state.shake - dt * 18);
        state.flash = Math.max(0, state.flash - dt * 1.35);
        state.glitch = Math.max(0, state.glitch - dt * 1.1);
      }

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function fillRoundedRect(x, y, w, h, r, fillStyle) {
        roundedRect(x, y, w, h, r);
        ctx.fillStyle = fillStyle;
        ctx.fill();
      }

      function strokeRoundedRect(x, y, w, h, r, strokeStyle, lineWidth) {
        roundedRect(x, y, w, h, r);
        ctx.strokeStyle = strokeStyle;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }

      function drawWatchCones() {
        for (const watcher of WATCHERS) {
          const result = watcherVisibility(watcher);
          if (state.progress < watcher.activation) {
            continue;
          }
          const alpha = result.visible ? 0.18 : 0.08;
          const range = watcher.range;
          const grad = ctx.createRadialGradient(watcher.x, watcher.y, 0, watcher.x, watcher.y, range);
          grad.addColorStop(0, `${watcher.color}66`);
          grad.addColorStop(0.3, `${watcher.color}2f`);
          grad.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.beginPath();
          ctx.moveTo(watcher.x, watcher.y);
          ctx.arc(
            watcher.x,
            watcher.y,
            range,
            result.angle - watcher.arc,
            result.angle + watcher.arc
          );
          ctx.closePath();
          ctx.fillStyle = grad;
          ctx.globalAlpha = alpha;
          ctx.fill();
          ctx.restore();

          ctx.save();
          ctx.shadowColor = watcher.color;
          ctx.shadowBlur = 18;
          ctx.fillStyle = watcher.color;
          ctx.beginPath();
          ctx.arc(watcher.x, watcher.y, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawObstacles() {
        for (const rect of OBSTACLES) {
          const grad = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
          grad.addColorStop(0, rect.palette[0]);
          grad.addColorStop(1, rect.palette[1]);
          ctx.save();
          ctx.shadowColor = "rgba(2, 6, 23, 0.42)";
          ctx.shadowBlur = 26;
          fillRoundedRect(rect.x, rect.y, rect.w, rect.h, 14, grad);
          ctx.restore();
          strokeRoundedRect(rect.x, rect.y, rect.w, rect.h, 14, "rgba(255,255,255,0.08)", 1.5);

          ctx.save();
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = "#f8fafc";
          for (let strip = 0; strip < rect.w; strip += 26) {
            ctx.fillRect(rect.x + strip, rect.y + 10, 8, rect.h - 20);
          }
          ctx.restore();
        }
      }

      function drawGoal() {
        const pulse = 0.5 + Math.sin(state.overlayPulse * 3.4) * 0.5;
        const glow = ctx.createRadialGradient(
          GOAL.x + GOAL.w / 2,
          GOAL.y + GOAL.h / 2,

        );
        glow.addColorStop(0, "rgba(103, 232, 249, 0.38)");
        glow.addColorStop(0.6, "rgba(34, 211, 238, 0.12)");
        glow.addColorStop(1, "rgba(34, 211, 238, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(GOAL.x - 60, GOAL.y - 60, 174, 188);

        fillRoundedRect(GOAL.x, GOAL.y, GOAL.w, GOAL.h, 18, "rgba(8, 47, 73, 0.72)");
        strokeRoundedRect(GOAL.x, GOAL.y, GOAL.w, GOAL.h, 18, "rgba(125, 211, 252, 0.9)", 2.5);
        ctx.save();
        ctx.shadowColor = "#67e8f9";

        ctx.lineWidth = 5;
        ctx.strokeRect(GOAL.x + 11, GOAL.y + 12, GOAL.w - 22, GOAL.h - 24);

        if (state.dockProgress > 0) {
          ctx.fillStyle = "rgba(165, 243, 252, 0.18)";
          ctx.fillRect(GOAL.x + 8, GOAL.y + GOAL.h - 12 - (GOAL.h - 16) * state.dockProgress, GOAL.w - 16, (GOAL.h - 16) * state.dockProgress);

      }

        fillRoundedRect(675, 101, (238 * state.shock) / 100, 12, 6, shockGrad);

        fillRoundedRect(22, 468, 262, 46, 18, "rgba(5, 15, 28, 0.58)");
        strokeRoundedRect(22, 468, 262, 46, 18, "rgba(186, 230, 253, 0.12)", 1);
        ctx.fillStyle = "#cbd5e1";
        ctx.font = "600 12px Trebuchet MS";
        ctx.fillText("엄폐하거나 길게 눌러 안정화하면 목격과 충격이 느리게 오른다", 38, 496);

        fillRoundedRect(344, 468, 274, 46, 18, "rgba(5, 15, 28, 0.58)");
        strokeRoundedRect(344, 468, 274, 46, 18, "rgba(186, 230, 253, 0.12)", 1);
        ctx.fillStyle = "#cbd5e1";
        ctx.fillText(`진행 ${Math.round(state.progress * 100)}%`, 360, 496);
        ctx.textAlign = "right";
        ctx.fillStyle = "#67e8f9";
        ctx.fillText(`도킹 ${Math.round(state.dockProgress * 100)}%`, 600, 496);
        ctx.textAlign = "left";

        if (state.currentToast) {
          ctx.save();
          ctx.globalAlpha = 0.78 + Math.sin(state.overlayPulse * 9) * 0.12;
          fillRoundedRect(352, 20, 256, 34, 16, "rgba(15, 23, 42, 0.74)");
          strokeRoundedRect(352, 20, 256, 34, 16, "rgba(125, 211, 252, 0.24)", 1);
          ctx.fillStyle = "#e2e8f0";
          ctx.font = "700 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(state.currentToast, 480, 42);
          ctx.restore();
          ctx.textAlign = "left";
        }
      }

      function drawMenuOverlay() {
        ctx.save();
        ctx.globalAlpha = 0.78;
        fillRoundedRect(104, 68, 752, 404, 30, "rgba(3, 10, 20, 0.72)");
        ctx.restore();
        strokeRoundedRect(104, 68, 752, 404, 30, "rgba(148, 163, 184, 0.22)", 1.5);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 44px Trebuchet MS";
        ctx.fillText("MIDNIGHT HARBOR", 140, 138);
        ctx.fillStyle = "#7dd3fc";
        ctx.font = "700 22px Trebuchet MS";
        ctx.fillText("GRAVITY FOLD", 142, 172);

        ctx.fillStyle = "#cbd5e1";
        ctx.font = "600 20px Trebuchet MS";
        ctx.fillText("한밤의 항만에서 코어를 접힌 중력 사이로 숨겨 배달하세요.", 140, 220);
        ctx.fillText("막판으로 갈수록 감시선이 몰리니, 컨테이너 뒤 정지 타이밍이 중요합니다.", 140, 250);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText("조작", 140, 304);
        ctx.fillStyle = "#cbd5e1";
        ctx.font = "600 16px Trebuchet MS";
        ctx.fillText(CONTROLS_TEXT, 140, 332);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText("목표", 140, 380);
        ctx.fillStyle = "#a7f3d0";
        ctx.fillText(CLEAR_CONDITION, 140, 408);
        ctx.fillStyle = "#fecaca";
        ctx.fillText(FAIL_CONDITION, 140, 436);

        const pulse = 0.5 + Math.sin(state.overlayPulse * 3.6) * 0.5;
        fillRoundedRect(580, 362, 214, 58, 20, `rgba(14, 165, 233, ${0.22 + pulse * 0.24})`);
        strokeRoundedRect(580, 362, 214, 58, 20, "rgba(186, 230, 253, 0.84)", 2);
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 22px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("터치 또는 Enter", 687, 399);
        ctx.textAlign = "left";
      }

      function drawEndOverlay(title, subtitle, accent, lines) {
        ctx.save();
        ctx.globalAlpha = 0.82;
        fillRoundedRect(156, 98, 648, 342, 30, "rgba(2, 8, 19, 0.82)");
        ctx.restore();
        strokeRoundedRect(156, 98, 648, 342, 30, accent, 2);

        ctx.fillStyle = accent;
        ctx.font = "700 46px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, 480, 166);
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 22px Trebuchet MS";
        ctx.fillText(subtitle, 480, 206);

        ctx.fillStyle = "#cbd5e1";
        ctx.font = "600 18px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, 480, 256 + index * 34);
        });

        fillRoundedRect(304, 360, 352, 52, 18, "rgba(15, 23, 42, 0.72)");
        strokeRoundedRect(304, 360, 352, 52, 18, "rgba(226, 232, 240, 0.28)", 1.5);
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText("터치 또는 Enter로 다시 시도", 480, 393);
        ctx.textAlign = "left";
      }

      function drawScene() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        let shakeX = 0;
        let shakeY = 0;
        if (state.shake > 0 && !prefersReducedMotion) {
          shakeX = rand(-state.shake, state.shake);
          shakeY = rand(-state.shake, state.shake);
        }

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawSky();
        drawHarborBackdrop();
        drawWatchCones();
        drawObstacles();
        drawGoal();
        drawTetherAndPlayer();
        drawParticles();
        drawHud();
        ctx.restore();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed") {
          drawEndOverlay("배달 실패", "목격선 또는 균열이 임계치에 도달했습니다.", "#fb7185", [
            `생존 시간 ${state.lastRunTime.toFixed(1)}초`,
            `목격 ${Math.round(state.witness)}% / 충격 ${Math.round(state.shock)}%`,
            "엄폐 뒤에서 정지하거나, 슬롯 직전에는 짧은 폴드만 사용하세요.",
          ]);
        } else if (state.mode === "cleared") {
          drawEndOverlay("배달 완료", "코어를 들키지 않고 슬롯에 잠갔습니다.", "#67e8f9", [
            `완료 시간 ${state.lastRunTime.toFixed(1)}초`,
            `목격 ${Math.round(state.witness)}% / 충격 ${Math.round(state.shock)}%`,
            "막판 감시선 전에 숨었다가 짧게 도킹하면 더 안정적으로 클리어됩니다.",
          ]);
        }

        if (state.flash > 0) {
          ctx.save();
          ctx.globalAlpha = state.flash;
          ctx.fillStyle = state.mode === "failed" ? "#f43f5e" : "#7dd3fc";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.restore();
        }

        if (state.glitch > 0 && !prefersReducedMotion) {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = state.glitch * 0.38;
          ctx.fillStyle = "#fde68a";
          for (let index = 0; index < 4; index += 1) {
            const y = rand(0, VIEW.height);
            ctx.fillRect(0, y, VIEW.width, rand(4, 10));
          }
          ctx.restore();
        }
      }

      function renderGameToText() {
        const gravity = currentGravity();
        return JSON.stringify({
          mode: state.mode,
          note: "origin=(0,0) top-left; +x right, +y down",
          title: TITLE,
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            vx: Number(state.player.vx.toFixed(1)),
            vy: Number(state.player.vy.toFixed(1)),
          },
          core: {
            x: Number(state.core.x.toFixed(1)),
            y: Number(state.core.y.toFixed(1)),
            vx: Number(state.core.vx.toFixed(1)),
            vy: Number(state.core.vy.toFixed(1)),
          },
          goal: {
            x: GOAL.x,
            y: GOAL.y,
            w: GOAL.w,
            h: GOAL.h,
            dockProgress: Number(state.dockProgress.toFixed(2)),
          },
          gravity: gravity.name,
          witness: Number(state.witness.toFixed(1)),
          shock: Number(state.shock.toFixed(1)),
          progress: Number(state.progress.toFixed(2)),
          stabilizing: Boolean(state.input.stabilizeHold || state.input.stabilizeKey),
          visibleWatchers: state.visibleWatchers,
        });
      }

      function step(dt) {
        const slicedDt = Math.min(dt, MAX_DT);
        update(slicedDt);
        drawScene();
      }

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        let delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        while (delta > 0) {
          const slice = Math.min(FIXED_DT, delta);
          step(slice);
          delta -= slice;
        }
        animationFrame = window.requestAnimationFrame(loop);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          step(FIXED_DT);
        }
        return window.render_game_to_text();
      };
      window.relayStageMeta = {
        id: STAGE_ID,
        title: TITLE,
        creator: CREATOR,
        genre: GENRE,
        clearCondition: CLEAR_CONDITION,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.witness = 24;
          state.shock = 14;
          state.core.x = GOAL.x + GOAL.w / 2;
          state.core.y = GOAL.y + GOAL.h / 2;
          state.player.x = GOAL.x - 40;
          state.player.y = GOAL.y + GOAL.h / 2;
          clearStage();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          state.witness = 100;
          state.shock = 100;
          failStage(FAIL_CONDITION);
        },
      };

      window.addEventListener("keydown", (event) => {
        if (event.repeat && (event.key === " " || event.key === "Enter")) {
          event.preventDefault();
          return;
        }

        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
          setMoveInput(-1, true);
        }
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") {
          setMoveInput(1, true);
        }
        if (event.key.toLowerCase() === "s" || event.key === "Shift") {
          state.input.stabilizeKey = true;
        }
        if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "running") {
            cycleGravity();
          } else {
            startStage();
          }
        }
        if (event.key.toLowerCase() === "r" && state.mode !== "running") {
          startStage();
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
          setMoveInput(-1, false);
        }
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") {
          setMoveInput(1, false);
        }
        if (event.key.toLowerCase() === "s" || event.key === "Shift") {
          state.input.stabilizeKey = false;
        }
      });

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        canvas.setPointerCapture?.(event.pointerId);
        startFromTouch();
        state.input.pointerId = event.pointerId;
        state.input.pointerActive = true;
        state.input.pointerStartX = event.clientX;
        state.input.pointerStartY = event.clientY;
        state.input.pointerX = event.clientX;
        state.input.pointerY = event.clientY;
        state.input.pointerTime = performance.now();
        state.input.pointerMoved = false;
        state.input.dragMove = 0;
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!state.input.pointerActive || state.input.pointerId !== event.pointerId) {
          return;
        }
        state.input.pointerX = event.clientX;
        state.input.pointerY = event.clientY;
        const dx = event.clientX - state.input.pointerStartX;
        const dy = event.clientY - state.input.pointerStartY;
        const distance = length(dx, dy);
        if (distance > 10) {
          state.input.pointerMoved = true;
        }
        if (Math.abs(dx) > 8) {
          state.input.dragMove = clamp(dx / 72, -1, 1);
        }
        if (distance < 18 && performance.now() - state.input.pointerTime > 190) {
          state.input.stabilizeHold = true;
        } else if (distance > 18) {
          state.input.stabilizeHold = false;
        }
      });

      function releaseCanvasPointer(event) {
        if (!state.input.pointerActive || (event && state.input.pointerId !== event.pointerId)) {
          return;
        }
        const elapsed = performance.now() - state.input.pointerTime;
        if (
          state.mode === "running" &&
          !state.input.pointerMoved &&
          elapsed < 180
        ) {
          cycleGravity();
        }
        state.input.pointerActive = false;
        state.input.pointerId = null;
        state.input.dragMove = 0;
        state.input.stabilizeHold = false;
      }

      canvas.addEventListener("pointerup", releaseCanvasPointer);
      canvas.addEventListener("pointercancel", releaseCanvasPointer);
      canvas.addEventListener("lostpointercapture", releaseCanvasPointer);

      if ("ontouchstart" in window) {
        canvas.addEventListener(
          "touchstart",
          (event) => {
            if (event.cancelable) {
              event.preventDefault();
            }
          },
          { passive: false }
        );
      }

      drawScene();
      reportReadyToHost();
      animationFrame = window.requestAnimationFrame(loop);

      window.addEventListener("beforeunload", () => {
        window.cancelAnimationFrame(animationFrame);
      });
    </script>
  </body>
</html>
