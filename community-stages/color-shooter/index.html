<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>색깔 슈터</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">색깔 슈터. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 키보드 방향키로 이동, 스페이스바로 쏘기. 모바일은 화면 하단 버튼 터치로 좌우 이동, 화면 터치로 쏘기 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="색깔 슈터" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <div class="mobile-controls" aria-label="모바일 조작 버튼">
      <div class="mobile-controls__row">
        <button class="mobile-btn" type="button" data-control="left" data-active="false" aria-label="왼쪽으로 이동">◀</button>
        <button class="mobile-btn" type="button" data-control="right" data-active="false" aria-label="오른쪽으로 이동">▶</button>
      </div>
    </div>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("color-shooter") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const COLORS = ["#ef4444", "#3b82f6", "#eab308"]; // Red, Blue, Yellow

      const input = { left: false, right: false };

      const TIME_LIMIT = 40;
      const SCORE_GOAL = 20;
      const BULLET_SPEED = 600;
      const TARGET_SPEED = 150;
      const TARGET_SPAWN_INTERVAL = 1.0;

      let spawnTimer = 0;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        score: 0,
        player: {
          x: 480,
          y: 480,
          width: 40,
          height: 40,
          speed: 400,
          colorIndex: 0
        },
        bullets: [],
        targets: []
      };

      function shoot() {
        if (state.mode !== "running") return;
        state.bullets.push({
          x: state.player.x,
          y: state.player.y - state.player.height / 2,
          radius: 5,
          colorIndex: state.player.colorIndex
        });
        // change player color after shooting
        state.player.colorIndex = (state.player.colorIndex + 1) % COLORS.length;
      }

      function spawnTarget() {
        const margin = 30;
        const x = margin + Math.random() * (VIEW.width - margin * 2);
        const colorIndex = Math.floor(Math.random() * COLORS.length);
        state.targets.push({
          x: x,
          y: -20,
          radius: 20,
          colorIndex: colorIndex
        });
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.score = 0;
        state.player.x = VIEW.width / 2;
        state.player.colorIndex = 0;
        state.bullets = [];
        state.targets = [];
        spawnTimer = TARGET_SPAWN_INTERVAL;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (state.elapsed >= TIME_LIMIT) {
            failStage("시간 초과");
            return;
          }

          if (input.left) {
            state.player.x -= state.player.speed * dt;
          }
          if (input.right) {
            state.player.x += state.player.speed * dt;
          }

          const margin = 20;
          if (state.player.x < margin) state.player.x = margin;
          if (state.player.x > VIEW.width - margin) state.player.x = VIEW.width - margin;

          // Move bullets
          for (let i = state.bullets.length - 1; i >= 0; i--) {
            state.bullets[i].y -= BULLET_SPEED * dt;
            if (state.bullets[i].y < -10) {
              state.bullets.splice(i, 1);
            }
          }

          // Move targets
          for (let i = state.targets.length - 1; i >= 0; i--) {
            state.targets[i].y += TARGET_SPEED * dt;
            if (state.targets[i].y > VIEW.height + 20) {
              // Missed target, penalize or ignore. For now ignore.
              state.targets.splice(i, 1);
            }
          }

          // Collision logic
          for (let i = state.bullets.length - 1; i >= 0; i--) {
            let hit = false;
            for (let j = state.targets.length - 1; j >= 0; j--) {
              const dx = state.bullets[i].x - state.targets[j].x;
              const dy = state.bullets[i].y - state.targets[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < state.bullets[i].radius + state.targets[j].radius) {
                hit = true;
                if (state.bullets[i].colorIndex === state.targets[j].colorIndex) {
                  state.score++;
                  state.targets.splice(j, 1);
                  if (state.score >= SCORE_GOAL) {
                    clearStage();
                    return;
                  }
                } else {
                  failStage("틀린 색상을 맞춤");
                  return;
                }
                break;
              }
            }
            if (hit) {
              state.bullets.splice(i, 1);
            }
          }

          spawnTimer -= dt;
          if (spawnTimer <= 0) {
            spawnTarget();
            spawnTimer = TARGET_SPAWN_INTERVAL * (0.5 + Math.random() * 0.5) * Math.max(0.3, 1 - state.score / SCORE_GOAL * 0.5);
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function render() {
        // Clear background
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        if (state.mode === "menu") {
          renderCard("색깔 슈터", [
            "같은 색깔의 과녁을 맞추세요!",
            "조작: 방향키 이동, Space 발사 / 터치 버튼",
            "클리어: 맞는 색상 과녁 20개 명중",
            "실패: 틀린 색상 명중 또는 시간 초과",
            "터치 또는 Enter로 시작",
          ], "#f97316");
          return;
        }

        if (state.mode === "running" || state.mode === "cleared" || state.mode === "failed") {
          // Draw targets
          state.targets.forEach(t => {
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
            ctx.fillStyle = COLORS[t.colorIndex];
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();
          });

          // Draw bullets
          state.bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
            ctx.fillStyle = COLORS[b.colorIndex];
            ctx.fill();
          });

          // Draw player
          ctx.fillStyle = COLORS[state.player.colorIndex];
          ctx.fillRect(state.player.x - state.player.width / 2, state.player.y - state.player.height / 2, state.player.width, state.player.height);
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 2;
          ctx.strokeRect(state.player.x - state.player.width / 2, state.player.y - state.player.height / 2, state.player.width, state.player.height);

          // Draw HUD
          ctx.fillStyle = "#fff";
          ctx.font = "bold 24px Trebuchet MS";
          ctx.fillText(`Score: ${state.score} / ${SCORE_GOAL}`, 20, 40);
          ctx.fillText(`Time: ${Math.ceil(Math.max(0, TIME_LIMIT - state.elapsed))}s`, VIEW.width - 150, 40);

          if (state.mode === "running") {
            return;
          }
        }

        if (state.mode === "failed") {
          renderCard("실패", [
            "틀린 색상을 맞추거나 시간이 초과되었습니다.",
            `최종 점수: ${state.score}`,
            "Enter 또는 화면을 터치해 다시 시도하세요."
          ], "#b91c1c");
          return;
        }

        renderCard("클리어", [
          "20개의 색상을 성공적으로 맞췄습니다!",
          `소요 시간: ${state.elapsed.toFixed(1)}초`,
          "다음 스테이지로 이동합니다."
        ], "#15803d");
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
        }
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") { input.left = true; event.preventDefault(); }
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") { input.right = true; event.preventDefault(); }
        if (event.key === " " && state.mode === "running") { shoot(); event.preventDefault(); }
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") input.left = false;
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") input.right = false;
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "color-shooter",
        title: "색깔 슈터",
        creator: "Jules",
        genre: "Arcade",
        clearCondition: "20개의 맞는 색상 과녁을 맞추기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        event.preventDefault();
        if (state.mode !== "running") {
          startFromTouch();
        } else {
          // Check if touch is in upper area to shoot
          const touch = event.touches[0];
          const rect = canvas.getBoundingClientRect();
          const y = (touch.clientY - rect.top) / rect.height * VIEW.height;
          // Shoot if touch is in upper 80% of screen (above the bottom buttons/player area roughly)
          if (y < VIEW.height * 0.8) {
            shoot();
          }
        }
      }, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());

      document.querySelectorAll(".mobile-btn").forEach((button) => {
        bindHoldButton(
          button,
          () => { input[button.dataset.control] = true; },
          () => { input[button.dataset.control] = false; }
        );
      });

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
