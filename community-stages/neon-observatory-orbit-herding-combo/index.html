<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Observatory: Orbit Shepherd</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040816;
        --ink: #eff6ff;
        --ink-dim: #bfd0ff;
        --panel: rgba(8, 14, 36, 0.68);
        --panel-edge: rgba(130, 173, 255, 0.2);
        --cyan: #7ef9ff;
        --teal: #7dfdc8;
        --gold: #ffd86b;
        --rose: #ff7fc8;
        --danger: #ff5d8f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #12204d 0%, #050917 56%, #02040b 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(126, 249, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 14, 36, 0.96);
        color: #f8fbff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible,
      #reverse-button:focus-visible {
        outline: 3px solid rgba(255, 255, 255, 0.92);
        outline-offset: 3px;
      }

      #reverse-button {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 18;
        appearance: none;
        border: 1px solid rgba(124, 250, 255, 0.28);
        border-radius: 999px;
        min-width: 132px;
        min-height: 52px;
        padding: 0 18px calc(env(safe-area-inset-bottom, 0px) * 0.18);
        background:
          linear-gradient(135deg, rgba(15, 38, 79, 0.9), rgba(8, 14, 36, 0.88)),
          rgba(8, 14, 36, 0.84);
        color: var(--ink);
        font: 800 15px/1 "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.04em;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.42), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        touch-action: manipulation;
      }

      #reverse-button[data-active="true"] {
        transform: translateY(1px) scale(0.98);
        background:
          linear-gradient(135deg, rgba(38, 72, 145, 0.98), rgba(17, 114, 164, 0.94)),
          rgba(12, 26, 58, 0.9);
      }

      @media (max-width: 520px) {
        #reverse-button {
          right: 12px;
          bottom: 12px;
          min-width: 118px;
          min-height: 48px;
          padding: 0 16px calc(env(safe-area-inset-bottom, 0px) * 0.18);
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Neon Observatory: Orbit Shepherd. 캔버스를 터치하거나 Enter로 시작합니다. 마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
    </p>
    <p id="stage-meta-copy" class="sr-only">
      클리어 조건: 콤보를 유지하며 위성 3기를 목표 링에 순서대로 통과시키면 클리어. 실패 조건: 콤보가 여러 번 끊기거나 위성이 소멸 구역에 닿으면 즉시 실패.
    </p>
    <button id="reverse-button" type="button" data-active="false" aria-label="궤도 반전">궤도 반전</button>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Neon Observatory: Orbit Shepherd"
      aria-describedby="stage-instructions stage-meta-copy"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_META = Object.freeze({
        id: "neon-observatory-orbit-herding-combo",
        title: "Neon Observatory: Orbit Shepherd",
        creator: "jungcollin",
        genre: "Orbital survival / 콤보 임계치",
        description: "네온 천문대에서 비콘 궤도로 위성 3기를 몰아 연속 패턴 문을 여는 생존 퍼즐",
        controls:
          "마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition: "콤보를 유지하며 위성 3기를 목표 링에 순서대로 통과시키면 클리어",
        failCondition: "콤보가 여러 번 끊기거나 위성이 소멸 구역에 닿으면 즉시 실패",
      });

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const reverseButton = document.querySelector("#reverse-button");
      const VIEW = { width: canvas.width, height: canvas.height };
      const CENTER = { x: VIEW.width / 2, y: VIEW.height / 2 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const BASE_COMBO_WINDOW = 7.6;
      const COMBO_BREAK_LIMIT = 3;
      const BEACON_MOVE_RADIUS = 126;
      const GOAL_RADIUS = 226;
      const ORBIT_RADII = [76, 112, 148];
      const SATELLITE_LIBRARY = [
        { label: "A", color: "#7ef9ff", accent: "#b9f8ff", speed: 1.55, trailColor: "rgba(126, 249, 255, __ALPHA__)" },
        { label: "B", color: "#ff7fc8", accent: "#ffd6ec", speed: 1.9, trailColor: "rgba(255, 127, 200, __ALPHA__)" },
        { label: "C", color: "#ffd86b", accent: "#fff1bf", speed: 1.32, trailColor: "rgba(255, 216, 107, __ALPHA__)" },
      ];
      const GATE_PATTERN = [0, 2, 1];
      const GATE_SLOTS = [-0.68, 1.56, 3.78];
      const HAZARD_LIBRARY = [
        { orbitX: 132, orbitY: 98, size: 28, speed: 0.56, phase: 0.2 },
        { orbitX: 84, orbitY: 152, size: 24, speed: -0.43, phase: 1.8 },
        { orbitX: 172, orbitY: 118, size: 20, speed: 0.34, phase: 3.1 },
      ];
      const STAR_COUNT = 52;
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext = window.RelayRuntime?.readContext(STAGE_META.id) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let isDisposed = false;
      let isPaused = false;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const input = {
        pointerId: null,
        downAt: 0,
        downX: 0,
        downY: 0,
        moved: false,
        keyboard: {
          left: false,
          right: false,
          up: false,
          down: false,
        },
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        sceneTime: 0,
        lastRunTime: 0,
        combo: 0,
        comboBreaks: 0,
        comboWindow: BASE_COMBO_WINDOW,
        comboTimer: BASE_COMBO_WINDOW,
        hazardGrace: 0,
        targetIndex: 0,
        orbitDirection: 1,
        message: "비콘을 몰아 패턴 문을 순서대로 켜세요",
        resultTitle: "",
        resultBody: "",
        statusPulse: 0,
        gatePulse: 0,
        flash: 0,
        flashColor: "#7ef9ff",
        shake: 0,
        beacon: null,
        satellites: [],
        hazards: [],
        stars: createStars(),
        particles: [],
        shockRings: [],
        popups: [],
      };

      function createStars() {
        return Array.from({ length: STAR_COUNT }, (_, index) => ({
          x: Math.random() * VIEW.width,
          y: Math.random() * VIEW.height,
          size: 0.8 + Math.random() * 2.2,
          drift: 0.2 + Math.random() * 0.5,
          twinkle: Math.random() * Math.PI * 2,
          depth: 0.18 + (index % 4) * 0.06,
        }));
      }

      function createBeacon() {
        return {
          x: CENTER.x,
          y: CENTER.y + 54,
          targetX: CENTER.x,
          targetY: CENTER.y + 54,
          trail: [],
        };
      }

      function createSatellites() {
        return SATELLITE_LIBRARY.map((config, index) => ({
          id: index,
          label: config.label,
          color: config.color,
          accent: config.accent,
          trailColor: config.trailColor,
          speed: config.speed,
          angle: -Math.PI / 2 + index * 2.06,
          radius: ORBIT_RADII[index],
          visualRadius: 9 + index,
          trail: [],
          x: CENTER.x,
          y: CENTER.y,
          prevCenterDistance: ORBIT_RADII[index],
          flare: 0,
          phase: Math.random() * Math.PI * 2,
        }));
      }

      function createHazards() {
        return HAZARD_LIBRARY.map((config, index) => ({
          id: index,
          orbitX: config.orbitX,
          orbitY: config.orbitY,
          size: config.size,
          speed: config.speed,
          phase: config.phase,
          x: CENTER.x,
          y: CENTER.y,
          pulse: index * 0.8,
          enabled: index < 2,
        }));
      }

      function initializeRun(mode = "menu") {
        state.mode = mode;
        state.elapsed = 0;
        state.sceneTime = 0;
        state.lastRunTime = 0;
        state.combo = 0;
        state.comboBreaks = 0;
        state.comboWindow = BASE_COMBO_WINDOW;
        state.comboTimer = BASE_COMBO_WINDOW;
        state.hazardGrace = mode === "running" ? 2.2 : 0;
        state.targetIndex = 0;
        state.orbitDirection = 1;
        state.message = "비콘을 몰아 패턴 문을 순서대로 켜세요";
        state.resultTitle = "";
        state.resultBody = "";
        state.statusPulse = 0;
        state.gatePulse = 0;
        state.flash = 0;
        state.flashColor = "#7ef9ff";
        state.shake = 0;
        state.beacon = createBeacon();
        state.satellites = createSatellites();
        state.hazards = createHazards();
        state.particles = [];
        state.shockRings = [];
        state.popups = [];
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = mode === "running" ? "running" : "menu";
        updateScene(0, mode === "running");
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function clamp01(value) {
        return clamp(value, 0, 1);
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function angleDiff(a, b) {
        const diff = ((a - b + Math.PI) % (Math.PI * 2)) - Math.PI;
        return diff < -Math.PI ? diff + Math.PI * 2 : diff;
      }

      function distanceBetween(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function addTrailPoint(trail, point, maxLength) {
        trail.push({ x: point.x, y: point.y });
        if (trail.length > maxLength) {
          trail.shift();
        }
      }

      function pointerToCanvas(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function clampBeaconTarget(x, y) {
        const dx = x - CENTER.x;
        const dy = y - CENTER.y;
        const length = Math.hypot(dx, dy);
        if (length <= BEACON_MOVE_RADIUS || !length) {
          return { x, y };
        }
        const scale = BEACON_MOVE_RADIUS / length;
        return {
          x: CENTER.x + dx * scale,
          y: CENTER.y + dy * scale,
        };
      }

      function setBeaconTarget(x, y) {
        const next = clampBeaconTarget(x, y);
        state.beacon.targetX = next.x;
        state.beacon.targetY = next.y;
      }

      function getDifficulty() {
        if (state.mode !== "running") {
          return 0.16;
        }
        return clamp01(state.elapsed / 26 + state.combo * 0.17 + state.targetIndex * 0.12);
      }

      function getGateAngle(slotIndex) {
        const base = GATE_SLOTS[slotIndex];
        const drift = Math.sin(state.sceneTime * (0.55 + slotIndex * 0.07) + slotIndex * 1.8) * 0.17;
        return base + drift;
      }

      function getActiveGateAngle() {
        return getGateAngle(GATE_PATTERN[state.targetIndex] ?? GATE_PATTERN[0]);
      }

      function getHazardSize(hazard) {
        const difficulty = getDifficulty();
        return hazard.size + Math.sin(state.sceneTime * 2.4 + hazard.pulse) * 3 + difficulty * 8;
      }

      function getHazardPosition(hazard) {
        return {
          x: hazard.x,
          y: hazard.y,
          size: getHazardSize(hazard),
        };
      }

      function getKeyboardVector() {
        return {
          x: (input.keyboard.right ? 1 : 0) - (input.keyboard.left ? 1 : 0),
          y: (input.keyboard.down ? 1 : 0) - (input.keyboard.up ? 1 : 0),
        };
      }

      function updateScene(dt, interactive) {
        const beacon = state.beacon;
        const keyboard = getKeyboardVector();
        if (interactive) {
          const length = Math.hypot(keyboard.x, keyboard.y);
          if (length > 0) {
            const speed = 230;
            setBeaconTarget(
              beacon.targetX + (keyboard.x / length) * speed * dt,
              beacon.targetY + (keyboard.y / length) * speed * dt
            );
          }
        } else {
          const idleRadiusX = 54 + Math.sin(state.sceneTime * 0.6) * 10;
          const idleRadiusY = 38 + Math.cos(state.sceneTime * 0.44) * 8;
          setBeaconTarget(
            CENTER.x + Math.cos(state.sceneTime * 0.74) * idleRadiusX,
            CENTER.y + 32 + Math.sin(state.sceneTime * 0.92) * idleRadiusY
          );
        }

        const follow = clamp(dt * 8.4, 0, 1);
        beacon.x = lerp(beacon.x, beacon.targetX, follow);
        beacon.y = lerp(beacon.y, beacon.targetY, follow);
        addTrailPoint(beacon.trail, beacon, 16);

        const difficulty = getDifficulty();
        state.hazards.forEach((hazard, index) => {
          const enabled = index < 2 || difficulty > 0.52;
          hazard.enabled = enabled;
          if (!enabled) {
            return;
          }
          const time = state.sceneTime * (1 + difficulty * 0.62) * hazard.speed + hazard.phase;
          hazard.x = CENTER.x + Math.cos(time) * hazard.orbitX;
          hazard.y =
            CENTER.y +
            Math.sin(time * (1.2 + index * 0.06) + index * 0.7) * hazard.orbitY * 0.62;
        });

        state.satellites.forEach((satellite, index) => {
          const speed = satellite.speed * (1 + difficulty * 0.18);
          satellite.angle += dt * speed * state.orbitDirection;
          const wobble = Math.sin(state.sceneTime * (2 + index * 0.18) + satellite.phase) * (4 + difficulty * 4);
          const orbitX = satellite.radius + wobble;
          const orbitY = orbitX * (0.88 + index * 0.03);
          const nextX = beacon.x + Math.cos(satellite.angle) * orbitX;
          const nextY = beacon.y + Math.sin(satellite.angle) * orbitY;
          satellite.prevCenterDistance = Math.hypot(satellite.x - CENTER.x, satellite.y - CENTER.y);
          satellite.x = nextX;
          satellite.y = nextY;
          satellite.flare = Math.max(0, satellite.flare - dt * 1.8);
          addTrailPoint(satellite.trail, satellite, 22);
        });
      }

      function emitParticles(x, y, color, count, power) {
        const particleCount = reduceMotion ? Math.max(4, Math.floor(count * 0.35)) : count;
        for (let index = 0; index < particleCount; index += 1) {
          const angle = (Math.PI * 2 * index) / particleCount + Math.random() * 0.36;
          const velocity = power * (0.58 + Math.random() * 0.74);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: 0.6 + Math.random() * 0.5,
            size: 2 + Math.random() * 4,
            color,
          });
        }
      }

      function addPopup(text, color, x, y) {
        state.popups.push({
          text,
          color,
          x,
          y,
          life: 1.05,
          maxLife: 1.05,
        });
      }

      function addShockRing(x, y, color, radius) {
        state.shockRings.push({
          x,
          y,
          color,
          radius,
          life: 0.6,
          maxLife: 0.6,
        });
      }

      function reverseOrbit(source = "flip") {
        if (state.mode !== "running") {
          return;
        }
        state.orbitDirection *= -1;
        state.statusPulse = 1;
        state.flash = 0.12;
        state.flashColor = "#7ef9ff";
        emitParticles(state.beacon.x, state.beacon.y, "#7ef9ff", 12, 52);
        addPopup(source === "button" ? "REVERSE" : "FLIP", "#7ef9ff", state.beacon.x, state.beacon.y - 28);
      }

      function startStage() {
        initializeRun("running");
        state.message = "연속 루트를 유지하세요";
        window.relayStageResult.status = "running";
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (_error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.resultTitle = "ORBIT SHATTERED";
        state.resultBody =
          reason === "hazard"
            ? "소멸 구역이 위성을 집어삼켰습니다. 더 넓은 안전 곡선을 유지하세요."
            : "콤보 문 연결이 무너졌습니다. 더 빠르게 순서를 잇고 리듬을 유지하세요.";
        state.message = reason === "hazard" ? "소멸 구역 접촉" : "콤보 붕괴";
        state.flash = 0.45;
        state.flashColor = "#ff5d8f";
        state.shake = 14;
        emitParticles(state.beacon.x, state.beacon.y, "#ff7aa8", 14, 76);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.resultTitle = "PATTERN DOOR OPEN";
        state.resultBody = "위성 3기가 끊기지 않는 네온 콤보로 관측소 문을 열었습니다.";
        state.message = "콤보 연결 완료";
        state.flash = 0.5;
        state.flashColor = "#7efdc8";
        state.shake = 10;
        emitParticles(CENTER.x, CENTER.y, "#7efdc8", 20, 88);
        addShockRing(CENTER.x, CENTER.y, "#7efdc8", 72);
        addPopup("ALL THREE LOCKED", "#7efdc8", CENTER.x, CENTER.y - 78);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function breakCombo() {
        state.comboBreaks += 1;
        state.combo = 0;
        state.targetIndex = 0;
        state.comboWindow = BASE_COMBO_WINDOW;
        state.comboTimer = BASE_COMBO_WINDOW + 0.3;
        state.statusPulse = 1;
        state.flash = 0.18;
        state.flashColor = "#ff9f68";
        state.shake = Math.max(state.shake, 8);
        state.message = "콤보가 끊겼습니다. 패턴이 처음부터 재동기화됩니다.";
        state.orbitDirection *= -1;
        emitParticles(state.beacon.x, state.beacon.y, "#ffb870", 14, 60);
        addPopup("COMBO BROKEN", "#ffb870", state.beacon.x, state.beacon.y - 32);
        if (state.comboBreaks >= COMBO_BREAK_LIMIT) {
          failStage("combo_break");
        }
      }

      function handleGateSuccess(target) {
        state.combo += 1;
        state.targetIndex += 1;
        state.comboWindow = Math.max(5.2, BASE_COMBO_WINDOW - state.combo * 0.68);
        state.comboTimer = state.comboWindow;
        state.gatePulse = 1;
        state.statusPulse = 1;
        state.flash = 0.22;
        state.flashColor = target.color;
        state.shake = Math.max(state.shake, 7 + state.combo * 2);
        state.message = `${target.label} 위성 고정 완료. 다음 패턴을 이어가세요.`;
        target.flare = 1;
        emitParticles(target.x, target.y, target.color, 16, 72);
        addShockRing(target.x, target.y, target.color, 34 + state.combo * 6);
        addPopup(`${state.combo} HIT COMBO`, target.color, target.x, target.y - 24);
        if (state.targetIndex >= SATELLITE_LIBRARY.length) {
          clearStage();
        }
      }

      function checkGateSuccess() {
        if (state.mode !== "running" || state.targetIndex >= state.satellites.length) {
          return;
        }
        const target = state.satellites[state.targetIndex];
        const activeGateAngle = getActiveGateAngle();
        const currentDistance = Math.hypot(target.x - CENTER.x, target.y - CENTER.y);
        const currentAngle = Math.atan2(target.y - CENTER.y, target.x - CENTER.x);
        const gateWidth = 0.24 - state.comboBreaks * 0.01;
        const crossedOutward =
          target.prevCenterDistance < GOAL_RADIUS - 10 && currentDistance >= GOAL_RADIUS - 10;

        if (crossedOutward && Math.abs(angleDiff(currentAngle, activeGateAngle)) <= gateWidth) {
          handleGateSuccess(target);
        }
      }

      function checkHazardCollision() {
        if (state.mode !== "running") {
          return;
        }
        if (state.hazardGrace > 0) {
          return;
        }
        for (const satellite of state.satellites) {
          for (const hazard of state.hazards) {
            if (!hazard.enabled) {
              continue;
            }
            const sample = getHazardPosition(hazard);
            const hitDistance = sample.size + satellite.visualRadius * 0.8;
            if (Math.hypot(satellite.x - sample.x, satellite.y - sample.y) < hitDistance) {
              addPopup("NULL ZONE", "#ff7aa8", satellite.x, satellite.y - 20);
              failStage("hazard");
              return;
            }
          }
        }
      }

      function updateEffects(dt) {
        state.flash = Math.max(0, state.flash - dt * 1.25);
        state.shake = Math.max(0, state.shake - dt * 18);
        state.gatePulse = Math.max(0, state.gatePulse - dt * 2.2);
        state.statusPulse = Math.max(0, state.statusPulse - dt * 2.4);

        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 8 * dt;
          particle.size *= 0.993;
          return particle.life > 0.02;
        });

        state.shockRings = state.shockRings.filter((ring) => {
          ring.life -= dt;
          ring.radius += dt * 160;
          return ring.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= dt * 34;
          return popup.life > 0;
        });
      }

      function update(dt) {
        if (state.mode === "running") {
          state.sceneTime += dt;
          updateScene(dt, true);
          state.elapsed += dt;
          state.comboTimer -= dt;
          state.hazardGrace = Math.max(0, state.hazardGrace - dt);
          if (state.comboTimer <= 0) {
            breakCombo();
          }
          checkGateSuccess();
          checkHazardCollision();
          updateEffects(dt);
          return;
        }
        if (state.mode === "menu") {
          state.sceneTime += dt;
          updateScene(dt, false);
          updateEffects(dt);
        }
      }

      function wrapText(text, maxWidth) {
        const words = String(text).split(" ");
        const lines = [];
        let current = "";
        words.forEach((word) => {
          const candidate = current ? `${current} ${word}` : word;
          if (ctx.measureText(candidate).width <= maxWidth || !current) {
            current = candidate;
          } else {
            lines.push(current);
            current = word;
          }
        });
        if (current) {
          lines.push(current);
        }
        return lines;
      }

      function roundedRectPath(x, y, width, height, radius) {
        const clamped = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + clamped, y);
        ctx.arcTo(x + width, y, x + width, y + height, clamped);
        ctx.arcTo(x + width, y + height, x, y + height, clamped);
        ctx.arcTo(x, y + height, x, y, clamped);
        ctx.arcTo(x, y, x + width, y, clamped);
        ctx.closePath();
      }

      function drawBackground() {
        const baseGradient = ctx.createRadialGradient(
          CENTER.x,
          CENTER.y - 30,
          40,
          CENTER.x,
          CENTER.y,
          VIEW.width * 0.62
        );
        baseGradient.addColorStop(0, "#11265c");
        baseGradient.addColorStop(0.38, "#09142f");
        baseGradient.addColorStop(0.75, "#040914");
        baseGradient.addColorStop(1, "#02040b");
        ctx.fillStyle = baseGradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (let ribbon = 0; ribbon < 3; ribbon += 1) {
          ctx.beginPath();
          const startY = 86 + ribbon * 44;
          for (let x = -60; x <= VIEW.width + 60; x += 48) {
            const wave =
              startY +
              Math.sin(state.sceneTime * (0.52 + ribbon * 0.07) + x * 0.012 + ribbon * 1.4) *
                (18 + ribbon * 5);
            if (x === -60) {
              ctx.moveTo(x, wave);
            } else {
              ctx.lineTo(x, wave);
            }
          }
          ctx.lineWidth = 14 - ribbon * 3;
          ctx.strokeStyle = ribbon === 0 ? "rgba(126, 249, 255, 0.12)" : ribbon === 1 ? "rgba(255, 127, 200, 0.1)" : "rgba(125, 253, 200, 0.08)";
          ctx.stroke();
        }
        ctx.restore();

        state.stars.forEach((star) => {
          const alpha = 0.32 + (Math.sin(state.sceneTime * (1.2 + star.depth) + star.twinkle) + 1) * 0.2;
          ctx.fillStyle = `rgba(220, 232, 255, ${alpha.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y + Math.sin(state.sceneTime * star.drift + star.twinkle) * 3, star.size, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawArena() {
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        const outerGlow = ctx.createRadialGradient(0, 0, 80, 0, 0, GOAL_RADIUS + 48);
        outerGlow.addColorStop(0, "rgba(40, 72, 146, 0)");
        outerGlow.addColorStop(0.75, "rgba(63, 103, 212, 0.08)");
        outerGlow.addColorStop(1, "rgba(4, 8, 22, 0)");
        ctx.fillStyle = outerGlow;
        ctx.beginPath();
        ctx.arc(0, 0, GOAL_RADIUS + 48, 0, Math.PI * 2);
        ctx.fill();

        [62, 108, 152, GOAL_RADIUS - 22].forEach((radius, index) => {
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.strokeStyle = index === 3 ? "rgba(119, 170, 255, 0.18)" : "rgba(78, 108, 178, 0.12)";
          ctx.lineWidth = index === 3 ? 2.2 : 1;
          ctx.setLineDash(index === 3 ? [9, 11] : [4, 10]);
          ctx.stroke();
        });
        ctx.setLineDash([]);

        const frameGradient = ctx.createLinearGradient(-GOAL_RADIUS, -GOAL_RADIUS, GOAL_RADIUS, GOAL_RADIUS);
        frameGradient.addColorStop(0, "rgba(126, 249, 255, 0.2)");
        frameGradient.addColorStop(0.55, "rgba(255, 127, 200, 0.12)");
        frameGradient.addColorStop(1, "rgba(255, 216, 107, 0.18)");
        ctx.beginPath();
        ctx.arc(0, 0, GOAL_RADIUS, 0, Math.PI * 2);
        ctx.strokeStyle = frameGradient;
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
        ctx.lineWidth = 14;
        ctx.beginPath();
        ctx.arc(0, 0, GOAL_RADIUS + 16, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawGateRing() {
        GATE_SLOTS.forEach((_, slotIndex) => {
          const angle = getGateAngle(slotIndex);
          const active = GATE_PATTERN[state.targetIndex] === slotIndex;
          const color = active ? state.satellites[state.targetIndex]?.color || "#7ef9ff" : "rgba(146, 176, 255, 0.26)";
          const width = active ? 0.28 + state.gatePulse * 0.05 : 0.18;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, GOAL_RADIUS, angle - width, angle + width);
          ctx.strokeStyle = active ? color : "rgba(126, 148, 196, 0.28)";
          ctx.lineWidth = active ? 15 : 9;
          ctx.stroke();

          const tip = {
            x: CENTER.x + Math.cos(angle) * (GOAL_RADIUS + 2),
            y: CENTER.y + Math.sin(angle) * (GOAL_RADIUS + 2),
          };
          ctx.beginPath();
          ctx.arc(tip.x, tip.y, active ? 7 + state.gatePulse * 2 : 4, 0, Math.PI * 2);
          ctx.fillStyle = active ? color : "rgba(122, 145, 192, 0.36)";
          ctx.fill();
        });
      }

      function drawHazards() {
        state.hazards.forEach((hazard) => {
          if (!hazard.enabled) {
            return;
          }
          const sample = getHazardPosition(hazard);
          const gradient = ctx.createRadialGradient(sample.x, sample.y, 4, sample.x, sample.y, sample.size * 2.1);
          gradient.addColorStop(0, "rgba(8, 10, 18, 0.96)");
          gradient.addColorStop(0.46, "rgba(85, 6, 35, 0.9)");
          gradient.addColorStop(0.76, "rgba(255, 102, 140, 0.22)");
          gradient.addColorStop(1, "rgba(255, 102, 140, 0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.arc(sample.x, sample.y, sample.size * 2.1, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.arc(sample.x, sample.y, sample.size, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(7, 10, 17, 0.92)";
          ctx.fill();

          ctx.beginPath();
          ctx.arc(sample.x, sample.y, sample.size * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255, 152, 178, 0.18)";
          ctx.fill();
        });
      }

      function drawTrail(trail, color, width, alphaScale) {
        if (trail.length < 2) {
          return;
        }
        ctx.save();
        ctx.lineCap = "round";
        for (let index = 1; index < trail.length; index += 1) {
          const previous = trail[index - 1];
          const current = trail[index];
          const alpha = (index / trail.length) * alphaScale;
          ctx.strokeStyle = color.replace("__ALPHA__", alpha.toFixed(3));
          ctx.lineWidth = (index / trail.length) * width;
          ctx.beginPath();
          ctx.moveTo(previous.x, previous.y);
          ctx.lineTo(current.x, current.y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawSatellites() {
        drawTrail(state.beacon.trail, "rgba(161, 208, 255, __ALPHA__)", 8, 0.24);
        state.satellites.forEach((satellite, index) => {
          drawTrail(satellite.trail, satellite.trailColor, 10 + index * 1.8, 0.34);
        });

        state.satellites.forEach((satellite, index) => {
          const active = state.targetIndex === index && state.mode === "running";
          ctx.fillStyle = satellite.color;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, satellite.visualRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, satellite.visualRadius * 0.46, 0, Math.PI * 2);
          ctx.fillStyle = satellite.accent;
          ctx.fill();

          if (active) {
            ctx.beginPath();
            ctx.arc(
              satellite.x,
              satellite.y,
              satellite.visualRadius + 8 + Math.sin(state.sceneTime * 9) * 1.8,
              0,
              Math.PI * 2
            );
            ctx.strokeStyle = `rgba(255,255,255,${(0.46 + state.gatePulse * 0.22).toFixed(3)})`;
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        });

        const beacon = state.beacon;
        ctx.save();
        ctx.translate(beacon.x, beacon.y);
        ctx.rotate(state.sceneTime * 0.9);
        ctx.fillStyle = "rgba(18, 34, 72, 0.94)";
        ctx.beginPath();
        ctx.arc(0, 0, 17, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(126, 249, 255, 0.92)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -12);
        ctx.lineTo(12, 0);
        ctx.lineTo(0, 12);
        ctx.lineTo(-12, 0);
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = "#f0fbff";
        ctx.beginPath();
        ctx.arc(0, 0, 4.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          ctx.fillStyle = particle.color;
          ctx.globalAlpha = clamp01(particle.life / 0.9);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, Math.max(0.8, particle.size), 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        state.shockRings.forEach((ring) => {
          ctx.strokeStyle = ring.color;
          ctx.globalAlpha = clamp01(ring.life / ring.maxLife) * 0.72;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
          ctx.stroke();
        });
        ctx.globalAlpha = 1;

        state.popups.forEach((popup) => {
          ctx.globalAlpha = clamp01(popup.life / popup.maxLife);
          ctx.font = "800 18px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = popup.color;
          ctx.fillText(popup.text, popup.x, popup.y);
        });
        ctx.globalAlpha = 1;
      }

      function drawPanel(x, y, width, height, glow) {
        roundedRectPath(x, y, width, height, 22);
        ctx.fillStyle = "rgba(8, 14, 36, 0.7)";
        ctx.fill();
        ctx.lineWidth = 1.2;
        ctx.strokeStyle = glow || "rgba(130, 173, 255, 0.18)";
        ctx.stroke();
      }

      function drawHUD() {
        ctx.save();
        const topLeftX = 18;
        const topY = 16;
        drawPanel(topLeftX, topY, 238, 112, "rgba(126, 249, 255, 0.16)");
        drawPanel(VIEW.width - 208, topY, 190, 112, "rgba(255, 216, 107, 0.16)");

        ctx.fillStyle = "rgba(191, 208, 255, 0.84)";
        ctx.font = "700 12px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("NEON OBSERVATORY", topLeftX + 18, topY + 22);
        ctx.font = "800 28px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "#eff6ff";
        ctx.fillText(`${state.combo}/3 COMBO`, topLeftX + 18, topY + 54);
        ctx.font = "700 13px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(191, 208, 255, 0.78)";
        ctx.fillText(`남은 동기화 ${Math.max(0, state.comboTimer).toFixed(1)}초`, topLeftX + 18, topY + 78);
        ctx.fillText(`콤보 붕괴 ${state.comboBreaks}/${COMBO_BREAK_LIMIT}`, topLeftX + 18, topY + 98);

        const barX = topLeftX + 148;
        const barY = topY + 82;
        const barWidth = 82;
        const ratio = clamp01(state.comboTimer / Math.max(4.6, state.comboWindow));
        roundedRectPath(barX, barY, barWidth, 10, 999);
        ctx.fillStyle = "rgba(148, 163, 184, 0.2)";
        ctx.fill();
        roundedRectPath(barX, barY, barWidth * ratio, 10, 999);
        const barGradient = ctx.createLinearGradient(barX, barY, barX + barWidth, barY);
        barGradient.addColorStop(0, "#7ef9ff");
        barGradient.addColorStop(1, ratio < 0.34 ? "#ff7a8a" : "#ffd86b");
        ctx.fillStyle = barGradient;
        ctx.fill();

        ctx.textAlign = "right";
        ctx.fillStyle = "rgba(191, 208, 255, 0.8)";
        ctx.font = "700 12px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("PATTERN ORDER", VIEW.width - 34, topY + 22);
        SATELLITE_LIBRARY.forEach((satellite, index) => {
          const active = state.targetIndex === index && state.mode === "running";
          const cleared = state.targetIndex > index || state.mode === "cleared";
          const chipWidth = 42;
          const chipX = VIEW.width - 34 - (SATELLITE_LIBRARY.length - index) * 48;
          const chipY = topY + 38;
          roundedRectPath(chipX, chipY, chipWidth, 46, 16);
          ctx.fillStyle = cleared
            ? "rgba(18, 78, 62, 0.72)"
            : active
              ? "rgba(28, 74, 104, 0.82)"
              : "rgba(10, 16, 36, 0.62)";
          ctx.fill();
          ctx.strokeStyle = cleared ? "rgba(125, 253, 200, 0.68)" : active ? satellite.color : "rgba(148, 163, 184, 0.18)";
          ctx.stroke();
          ctx.fillStyle = cleared ? "#7efdc8" : satellite.color;
          ctx.font = "800 20px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(satellite.label, chipX + chipWidth / 2, chipY + 22);
          ctx.font = "700 10px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
          ctx.fillStyle = "rgba(239, 246, 255, 0.84)";
          ctx.fillText(cleared ? "LOCK" : active ? "LIVE" : "WAIT", chipX + chipWidth / 2, chipY + 36);
        });

        ctx.textAlign = "left";
        ctx.font = "700 12px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(191, 208, 255, 0.82)";
        ctx.fillText(state.message, 20, VIEW.height - 24);
        ctx.restore();
      }

      function drawOverlayCard() {
        const cardWidth = Math.min(VIEW.width * 0.84, 470);
        const cardHeight = Math.min(VIEW.height * (state.mode === "menu" ? 0.82 : 0.74), state.mode === "menu" ? 398 : 332);
        const x = (VIEW.width - cardWidth) / 2;
        const y = (VIEW.height - cardHeight) / 2;

        ctx.save();
        drawPanel(x, y, cardWidth, cardHeight, "rgba(160, 198, 255, 0.24)");

        ctx.fillStyle = "rgba(191, 208, 255, 0.8)";
        ctx.font = "800 12px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("NEON OBSERVATORY / ORBIT SHEPHERD", x + 28, y + 28);

        const title =
          state.mode === "menu"
            ? STAGE_META.title
            : state.resultTitle;
        ctx.fillStyle = "#f8fbff";
        ctx.font = "800 30px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(title, x + 28, y + 68);

        ctx.font = "700 15px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(220, 230, 255, 0.82)";
        const summary =
          state.mode === "menu"
            ? STAGE_META.description
            : state.resultBody;
        wrapText(summary, cardWidth - 56).forEach((line, index) => {
          ctx.fillText(line, x + 28, y + 104 + index * 20);
        });

        const lines =
          state.mode === "menu"
            ? [
                `조작: ${STAGE_META.controls}`,
                `클리어: ${STAGE_META.clearCondition}`,
                `실패: ${STAGE_META.failCondition}`,
              ]
            : [
                `기록 ${state.lastRunTime.toFixed(1)}초 / 콤보 붕괴 ${state.comboBreaks}/${COMBO_BREAK_LIMIT}`,
                state.mode === "cleared"
                  ? "화면 터치 또는 Enter로 다음 관측 루프를 바로 재시작합니다."
                  : "화면 터치 또는 Enter로 즉시 재도전합니다.",
              ];

        let lineY = y + 148;
        lines.forEach((line) => {
          const wrapped = wrapText(line, cardWidth - 68);
          roundedRectPath(x + 22, lineY - 14, cardWidth - 44, wrapped.length * 20 + 18, 18);
          ctx.fillStyle = "rgba(13, 21, 48, 0.74)";
          ctx.fill();
          ctx.strokeStyle = "rgba(126, 170, 255, 0.16)";
          ctx.stroke();
          ctx.fillStyle = "#edf4ff";
          ctx.font = "700 13px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
          wrapped.forEach((wrappedLine, index) => {
            ctx.fillText(wrappedLine, x + 34, lineY + index * 18);
          });
          lineY += wrapped.length * 20 + 30;
        });

        roundedRectPath(x + 28, y + cardHeight - 56, 188, 34, 999);
        ctx.fillStyle =
          state.mode === "menu"
            ? "rgba(126, 249, 255, 0.18)"
            : state.mode === "cleared"
              ? "rgba(125, 253, 200, 0.18)"
              : "rgba(255, 127, 200, 0.18)";
        ctx.fill();
        ctx.strokeStyle =
          state.mode === "menu"
            ? "rgba(126, 249, 255, 0.36)"
            : state.mode === "cleared"
              ? "rgba(125, 253, 200, 0.4)"
              : "rgba(255, 127, 200, 0.34)";
        ctx.stroke();
        ctx.fillStyle = "#f8fbff";
        ctx.font = "800 13px Avenir Next, Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("화면 터치 / Enter 시작", x + 46, y + cardHeight - 34);
        ctx.restore();
      }

      function drawFlashOverlay() {
        if (state.flash <= 0.001) {
          return;
        }
        ctx.fillStyle = state.flashColor;
        ctx.globalAlpha = clamp01(state.flash * 0.22);
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.globalAlpha = 1;
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = reduceMotion ? 0 : Math.sin(state.sceneTime * 34) * state.shake * 0.32;
        const shakeY = reduceMotion ? 0 : Math.cos(state.sceneTime * 29) * state.shake * 0.28;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawArena();
        drawGateRing();
        drawHazards();
        drawSatellites();
        drawParticles();
        drawHUD();
        if (state.mode !== "running") {
          drawOverlayCard();
        }
        drawFlashOverlay();
        ctx.restore();
      }

      function frame(timestamp) {
        if (isDisposed || isPaused) {
          animationFrame = 0;
          return;
        }
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000 || FIXED_DT);
        lastTimestamp = timestamp;
        update(delta);
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function startLoop() {
        if (isDisposed || isPaused || animationFrame) {
          return;
        }
        lastTimestamp = 0;
        animationFrame = window.requestAnimationFrame(frame);
      }

      function stopLoop() {
        isDisposed = true;
        if (animationFrame) {
          window.cancelAnimationFrame(animationFrame);
          animationFrame = 0;
        }
      }

      function setPaused(paused) {
        if (isDisposed) {
          return;
        }
        isPaused = paused;
        if (paused) {
          if (animationFrame) {
            window.cancelAnimationFrame(animationFrame);
            animationFrame = 0;
          }
          return;
        }
        startLoop();
      }

      function handleCanvasActivation(event) {
        const point = pointerToCanvas(event);
        canvas.focus({ preventScroll: true });
        if (state.mode !== "running") {
          startStage();
          setBeaconTarget(point.x, point.y);
          return;
        }
        input.pointerId = event.pointerId;
        input.downAt = performance.now();
        input.downX = point.x;
        input.downY = point.y;
        input.moved = false;
        setBeaconTarget(point.x, point.y);
        canvas.setPointerCapture?.(event.pointerId);
      }

      function endPointer(event) {
        if (input.pointerId !== event.pointerId) {
          return;
        }
        const point = pointerToCanvas(event);
        const elapsed = performance.now() - input.downAt;
        const movedDistance = Math.hypot(point.x - input.downX, point.y - input.downY);
        if (state.mode === "running" && elapsed < 220 && movedDistance < 12 && !input.moved) {
          reverseOrbit();
        }
        input.pointerId = null;
        input.moved = false;
      }

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        handleCanvasActivation(event);
      });

      canvas.addEventListener("pointermove", (event) => {
        const point = pointerToCanvas(event);
        if (state.mode !== "running") {
          return;
        }
        if (event.pointerType === "mouse" && input.pointerId === null) {
          setBeaconTarget(point.x, point.y);
          return;
        }
        if (input.pointerId === event.pointerId) {
          if (Math.hypot(point.x - input.downX, point.y - input.downY) > 8) {
            input.moved = true;
          }
          setBeaconTarget(point.x, point.y);
        }
      });

      canvas.addEventListener("pointerup", endPointer);
      canvas.addEventListener("pointercancel", endPointer);

      reverseButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        reverseButton.dataset.active = "true";
        if (state.mode !== "running") {
          startStage();
          return;
        }
        reverseOrbit("button");
      });

      ["pointerup", "pointercancel", "pointerleave"].forEach((type) => {
        reverseButton.addEventListener(type, () => {
          reverseButton.dataset.active = "false";
        });
      });

      window.addEventListener("keydown", (event) => {
        const key = event.key.toLowerCase();
        if (key === "enter") {
          event.preventDefault();
          startStage();
          return;
        }
        if (key === " " || key === "spacebar") {
          event.preventDefault();
          reverseOrbit();
          return;
        }
        if (key === "arrowleft" || key === "a") {
          input.keyboard.left = true;
        } else if (key === "arrowright" || key === "d") {
          input.keyboard.right = true;
        } else if (key === "arrowup" || key === "w") {
          input.keyboard.up = true;
        } else if (key === "arrowdown" || key === "s") {
          input.keyboard.down = true;
        } else if (key === "f") {
          if (document.fullscreenElement) {
            document.exitFullscreen?.();
          } else {
            document.documentElement.requestFullscreen?.().catch(() => {});
          }
        }
      });

      window.addEventListener("keyup", (event) => {
        const key = event.key.toLowerCase();
        if (key === "arrowleft" || key === "a") {
          input.keyboard.left = false;
        } else if (key === "arrowright" || key === "d") {
          input.keyboard.right = false;
        } else if (key === "arrowup" || key === "w") {
          input.keyboard.up = false;
        } else if (key === "arrowdown" || key === "s") {
          input.keyboard.down = false;
        }
      });

      window.render_game_to_text = () => {
        const activeGate = getActiveGateAngle();
        return JSON.stringify({
          mode: state.mode,
          coordinateSystem: "origin top-left, +x right, +y down",
          note: STAGE_META.description,
          combo: {
            streak: state.combo,
            breaks: state.comboBreaks,
            timeLeft: Number(Math.max(0, state.comboTimer).toFixed(2)),
            hazardGrace: Number(Math.max(0, state.hazardGrace).toFixed(2)),
            targetOrderIndex: state.targetIndex,
          },
          beacon: {
            x: Number(state.beacon.x.toFixed(1)),
            y: Number(state.beacon.y.toFixed(1)),
            targetX: Number(state.beacon.targetX.toFixed(1)),
            targetY: Number(state.beacon.targetY.toFixed(1)),
          },
          orbitDirection: state.orbitDirection,
          gates: GATE_PATTERN.map((slot, index) => ({
            order: index,
            active: index === state.targetIndex,
            angle: Number(getGateAngle(slot).toFixed(3)),
          })),
          activeGateAngle: Number(activeGate.toFixed(3)),
          satellites: state.satellites.map((satellite) => ({
            id: satellite.id,
            label: satellite.label,
            x: Number(satellite.x.toFixed(1)),
            y: Number(satellite.y.toFixed(1)),
            distanceToCenter: Number(Math.hypot(satellite.x - CENTER.x, satellite.y - CENTER.y).toFixed(1)),
          })),
          hazards: state.hazards
            .filter((hazard) => hazard.enabled)
            .map((hazard) => {
              const sample = getHazardPosition(hazard);
              return {
                x: Number(sample.x.toFixed(1)),
                y: Number(sample.y.toFixed(1)),
                r: Number(sample.size.toFixed(1)),
              };
            }),
          resultStatus: window.relayStageResult.status,
        });
      };

      window.advanceTime = (ms) => {
        if (isDisposed) {
          return;
        }
        const total = Math.max(1, Number(ms) || 0);
        const steps = Math.max(1, Math.round(total / (1000 / 60)));
        const dt = Math.min(MAX_DT, total / 1000 / steps);
        for (let index = 0; index < steps; index += 1) {
          update(dt);
        }
        render();
      };

      window.relayStageMeta = {
        id: STAGE_META.id,
        title: STAGE_META.title,
        creator: STAGE_META.creator,
        genre: STAGE_META.genre,
        clearCondition: STAGE_META.clearCondition,
      };

      window.relayStageResult = { status: "menu" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "running") {
            startStage();
          }
          clearStage();
        },
        forceFail() {
          if (state.mode !== "running") {
            startStage();
          }
          failStage("debug_fail");
        },
      };

      initializeRun("menu");
      render();
      reportReadyToHost();
      window.addEventListener("pagehide", stopLoop, { once: true });
      window.addEventListener("beforeunload", stopLoop, { once: true });
      document.addEventListener("visibilitychange", () => {
        setPaused(document.visibilityState === "hidden");
      });
      startLoop();
    </script>
  </body>
</html>
