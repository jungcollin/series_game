<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스테이지 플레이 - One Life Relay</title>
    <meta
      name="description"
      content="One Life Relay 커뮤니티 스테이지를 플레이하고 좋아요와 댓글로 반응을 남기세요."
    />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <style>
      :root {
        color-scheme: dark;
        --void: #000000;
        --surface: #050505;
        --surface-raised: #0a0a0a;
        --ink: #ffffff;
        --ink-2: #888888;
        --ink-3: #444444;
        --wire: rgba(255, 255, 255, 0.06);
        --wire-hover: rgba(255, 255, 255, 0.12);
        --wire-active: rgba(255, 255, 255, 0.25);
        --font-display: "Space Grotesk", "Pretendard", "Inter", sans-serif;
        --font-body: "Pretendard", "Inter", sans-serif;
        --font-mono: "IBM Plex Mono", "Menlo", monospace;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--font-body);
        color: var(--ink);
        background: var(--void);
        min-height: 100vh;
        overflow-x: hidden;
      }

      h1, h2, h3 { margin: 0; scroll-margin-top: 24px; }

      .skip-link {
        position: absolute; top: -40px; left: 0;
        background: var(--ink); color: var(--void);
        padding: 12px; z-index: 9999; font-weight: 700;
        text-decoration: none; transition: transform 0.2s;
      }
      .skip-link:focus { transform: translateY(40px); }

      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }

      .play-shell {
        min-height: 100vh;
        width: min(100%, 1120px);
        margin: 0 auto;
        padding: 24px 24px 48px;
        display: grid;
        gap: 12px;
      }

      .play-topbar {
        padding: 20px;
        border: 1px solid var(--wire);
        background: var(--surface);
        display: grid;
        gap: 12px;
      }

      .play-topbar-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .play-topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .play-topbar-left h1 {
        font-family: var(--font-display);
        font-size: clamp(1.2rem, 3vw, 2rem);
        font-weight: 800;
        line-height: 0.96;
        letter-spacing: -0.04em;
        overflow-wrap: anywhere;
      }

      .play-topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .play-meta-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .play-info-creator {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .creator-avatar {
        width: 24px; height: 24px;
        object-fit: cover;
        background: var(--wire-active);
        flex-shrink: 0;
      }

      .creator-avatar-placeholder {
        width: 24px; height: 24px;
        background: var(--wire-active);
        color: var(--ink);
        display: grid; place-items: center;
        font-family: var(--font-mono);
        font-size: 0.7rem; font-weight: 700;
        flex-shrink: 0;
      }

      .creator-name {
        font-family: var(--font-mono);
        font-weight: 600;
        font-size: 0.75rem;
        color: var(--ink-3);
      }

      .play-info-genre {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border: 1px solid var(--wire);
        background: transparent;
        color: var(--ink-2);
        font-family: var(--font-mono);
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .play-info-condition {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        color: var(--ink-3);
        font-weight: 500;
        overflow-wrap: anywhere;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .action-btn {
        appearance: none;
        border: 1px solid var(--wire);
        background: transparent;
        color: var(--ink-2);
        min-height: 36px;
        padding: 8px 14px;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        cursor: pointer;
        text-decoration: none;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        transition: border-color 0.12s, color 0.12s, background 0.12s;
      }

      .action-btn:hover {
        border-color: var(--wire-active);
        color: var(--ink);
        background: rgba(255,255,255,0.03);
      }

      .action-btn-primary {
        background: var(--ink);
        color: var(--void);
        border-color: var(--ink);
        font-weight: 700;
      }

      .action-btn-primary:hover {
        background: #d0d0d0;
        border-color: #d0d0d0;
      }

      .vote-group {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .vote-group[data-loading="true"] {
        visibility: hidden;
      }

      .vote-loading {
        margin: 0;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--ink-3);
      }

      .vote-loading[hidden] {
        display: none;
      }

      .vote-btn {
        appearance: none;
        width: 36px; height: 36px;
        border: 1px solid var(--wire);
        background: transparent;
        color: var(--ink-2);
        font-size: 0.88rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border-color 0.12s, background 0.12s;
        font-family: inherit;
        line-height: 1;
        touch-action: manipulation;
      }

      .vote-btn:hover {
        border-color: var(--wire-active);
        background: rgba(255,255,255,0.04);
      }

      .vote-btn[data-active="true"] {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--void);
      }

      .vote-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      .vote-heart {
        display: flex;
        align-items: center;
        gap: 4px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--ink-3);
        font-variant-numeric: tabular-nums;
      }

      .heart-icon {
        font-size: 0.85em;
        line-height: 1;
      }

      .vote-heart[data-score-state="positive"],
      .vote-heart[data-score-state="positive-strong"] {
        color: var(--ink-2);
      }

      .vote-heart[data-score-state="negative"],
      .vote-heart[data-score-state="negative-strong"] {
        color: var(--ink-3);
      }

      .vote-feedback {
        margin: 0;
        font-family: var(--font-mono);
        font-size: 0.7rem;
        font-weight: 600;
        color: var(--ink-3);
        word-break: keep-all;
      }

      .play-frame-wrap {
        --frame-max-h: min(calc(100vh - 200px), 720px);
        position: relative;
        width: min(100%, calc(var(--frame-max-h) * 16 / 9));
        aspect-ratio: 16 / 9;
        margin-inline: auto;
        border: 1px solid var(--wire);
        overflow: hidden;
        background: var(--void);
      }

      .play-frame {
        width: 100%;
        height: 100%;
        display: block;
        border: 0;
        background: var(--void);
      }

      .play-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 5;
      }

      .play-overlay[hidden] {
        display: none;
      }

      .play-overlay-card {
        width: min(100%, 460px);
        padding: 24px;
        background: var(--surface);
        border: 1px solid var(--wire);
        text-align: center;
      }

      .play-overlay-card h2 {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        font-weight: 800;
        line-height: 0.92;
        letter-spacing: -0.04em;
        text-transform: uppercase;
      }

      .play-overlay-card p {
        margin: 10px 0 0;
        line-height: 1.5;
        color: var(--ink-2);
        font-size: 0.88rem;
        word-break: keep-all;
      }

      .overlay-actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      .comments-section {
        padding: 20px;
        border: 1px solid var(--wire);
        background: var(--surface);
        display: grid;
        gap: 12px;
      }

      .comments-title {
        font-family: var(--font-mono);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ink-2);
      }

      .comment-form {
        display: grid;
        gap: 6px;
      }

      .comment-form-row {
        display: flex;
        gap: 6px;
        align-items: flex-end;
      }

      .comment-name-input,
      .comment-text-input {
        appearance: none;
        border: 1px solid var(--wire);
        padding: 10px 12px;
        background: var(--void);
        color: var(--ink);
        font-family: var(--font-body);
        font-size: 1rem;
        transition: border-color 0.12s;
      }

      .comment-name-input::placeholder,
      .comment-text-input::placeholder {
        color: var(--ink-3);
      }

      .comment-name-input {
        width: 160px;
        flex-shrink: 0;
      }

      .comment-text-input {
        flex: 1;
        min-width: 0;
        resize: none;
        min-height: 44px;
        height: 44px;
        line-height: 1.45;
        overflow-y: auto;
      }

      .comment-name-input:focus,
      .comment-text-input:focus {
        outline: none;
        border-color: var(--wire-active);
      }

      .comment-submit {
        appearance: none;
        border: 1px solid var(--ink);
        background: var(--ink);
        color: var(--void);
        min-height: 44px;
        padding: 10px 16px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        touch-action: manipulation;
        transition: background 0.12s;
      }

      .comment-submit:hover {
        background: #d0d0d0;
      }

      .comment-submit:disabled {
        opacity: 0.5;
        cursor: default;
      }

      .comment-submit[data-loading="true"] {
        cursor: progress;
      }

      .comment-submit[data-loading="true"]::before {
        content: "";
        width: 0.85em;
        height: 0.85em;
        border: 2px solid rgba(0,0,0,0.2);
        border-top-color: var(--void);
        border-radius: 50%;
        animation: button-spin 0.8s linear infinite;
        margin-right: 6px;
      }

      .comment-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 2px;
      }

      .comment-item {
        padding: 12px 14px;
        border: 1px solid var(--wire);
        background: var(--void);
        transition: border-color 0.12s;
      }

      .comment-item:hover {
        border-color: var(--wire-hover);
      }

      .comment-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 4px;
      }

      .comment-author {
        font-weight: 700;
        font-size: 0.82rem;
      }

      .comment-date {
        font-family: var(--font-mono);
        font-size: 0.68rem;
        color: var(--ink-3);
        font-weight: 600;
        flex-shrink: 0;
        font-variant-numeric: tabular-nums;
      }

      .comment-body {
        margin: 0;
        font-size: 0.85rem;
        line-height: 1.55;
        color: var(--ink-2);
        overflow-wrap: anywhere;
      }

      .comment-empty {
        color: var(--ink-3);
        font-family: var(--font-mono);
        font-size: 0.78rem;
        font-weight: 600;
      }

      .comment-status {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--ink-3);
        min-height: 1.2em;
      }

      .play-error {
        padding: 48px 24px;
        text-align: center;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--ink-3);
      }

      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        outline: 1px solid var(--ink);
        outline-offset: 2px;
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      @keyframes button-spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 680px) {
        .play-shell {
          gap: 8px;
          padding: 12px 10px 28px;
        }
        .play-topbar {
          gap: 10px;
          padding: 14px;
        }
        .play-topbar-row {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }
        .play-topbar-left {
          width: 100%;
          gap: 8px;
          align-items: flex-start;
          flex-wrap: wrap;
        }
        .play-topbar-left h1 {
          width: 100%;
          font-size: 1.15rem;
          line-height: 1.02;
        }
        .play-topbar-right {
          width: 100%;
          justify-content: space-between;
          gap: 6px;
          flex-wrap: wrap;
        }
        .play-meta-row {
          display: grid;
          gap: 8px;
          align-items: flex-start;
        }
        .play-info-condition {
          font-size: 0.68rem;
          line-height: 1.4;
        }
        .play-frame-wrap {
          --frame-max-h: min(calc(100vh - 260px), 560px);
        }
        .play-overlay { padding: 14px; }
        .play-overlay-card { padding: 18px 14px; }
        .play-overlay-card h2 { font-size: 1.6rem; }
        .comments-section {
          gap: 10px;
          padding: 14px 12px;
        }
        .comment-form-row {
          flex-direction: column;
          gap: 8px;
        }
        .comment-name-input,
        .comment-text-input,
        .comment-submit {
          width: 100%;
        }
        .comment-text-input {
          min-height: 80px;
          height: 80px;
        }
      }

      @media (max-width: 420px) {
        .play-shell { padding: 8px 6px 20px; }
        .play-topbar { padding: 12px; }
        .play-topbar-left h1 { font-size: 1.05rem; }
        .action-btn, .comment-submit {
          min-height: 40px;
          padding: 10px 12px;
          font-size: 0.84rem;
        }

        .vote-btn {
          width: 44px;
          height: 44px;
        }

        .vote-heart {
          font-size: 0.86rem;
        }

        .play-frame-wrap {
          --frame-max-h: min(calc(100vh - 250px), 500px);
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#play-shell">본문으로 건너뛰기</a>
    <main class="play-shell" id="play-shell">
      <!-- Populated by JS -->
    </main>
    <script src="./relay-runtime.js"></script>
    <script src="./registry.js"></script>
    <script src="./likes-client.js"></script>
    <script>
      (function () {
        var SUPABASE_URL = "https://ikrhlbwsrahnswuhuyka.supabase.co";
        var SUPABASE_ANON_KEY =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlrcmhsYndzcmFobnN3dWh1eWthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDA3OTgsImV4cCI6MjA4OTQ3Njc5OH0.Gg9sjaq-Mwv0sqOm1G4u0sIyMmkUtTccW5nL-TuMDnk";
        var COMMENT_NAME_KEY = "one-life-relay-comment-name";

        var shellEl = document.getElementById("play-shell");
        var entries = window.COMMUNITY_STAGE_REGISTRY || [];
        var params = new URLSearchParams(window.location.search);
        var stageId = params.get("stage");

        function normalizeCreator(creator) {
          if (window.RelayRuntime && window.RelayRuntime.normalizeCreator) {
            return window.RelayRuntime.normalizeCreator(creator);
          }
          if (typeof creator === "string") return { name: creator, avatar: null, github: null };
          if (!creator) return { name: "Unknown", avatar: null, github: null };
          return { name: creator.name || "Unknown", avatar: creator.avatar || null, github: creator.github || null };
        }

        function getAvatarUrl(creator) {
          if (window.RelayRuntime && window.RelayRuntime.getCreatorAvatarUrl) {
            return window.RelayRuntime.getCreatorAvatarUrl(creator);
          }
          var c = normalizeCreator(creator);
          if (c.avatar) return c.avatar;
          if (c.github) return "https://github.com/" + c.github + ".png?size=80";
          return null;
        }

        function escapeHtml(v) {
          return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
        }

        function getScoreState(score) {
          if (score <= -5) return "negative-strong";
          if (score < 0) return "negative";
          if (score >= 10) return "positive-strong";
          if (score > 0) return "positive";
          return "neutral";
        }

        function getScoreHeartIcon(score) {
          var state = getScoreState(score);
          if (state === "negative" || state === "negative-strong") return "\uD83D\uDDA4";
          if (state === "neutral") return "\uD83E\uDD0D";
          return "\u2764\uFE0F";
        }

        function setScoreVisual(el, score) {
          if (!el) return;
          el.dataset.scoreState = getScoreState(score);
          var iconEl = el.querySelector(".heart-icon");
          if (iconEl) {
            iconEl.textContent = getScoreHeartIcon(score);
          }
          el.setAttribute("aria-label", "좋아요 점수 " + score);
        }

        function formatDate(value) {
          if (!value) return "";
          var d = new Date(value);
          if (isNaN(d.getTime())) return "";
          return new Intl.DateTimeFormat("ko-KR", { month: "numeric", day: "numeric", hour: "numeric", minute: "2-digit" }).format(d);
        }

        function getSavedName() {
          try { return window.localStorage.getItem(COMMENT_NAME_KEY) || ""; } catch(e) { return ""; }
        }

        function saveName(name) {
          try { window.localStorage.setItem(COMMENT_NAME_KEY, name); } catch(e) {}
        }

        var stage = entries.find(function (e) { return e.id === stageId; });

        if (!stage) {
          shellEl.innerHTML =
            '<div class="play-error">' +
            "<p>스테이지를 찾을 수 없습니다.</p>" +
            '<a href="./gallery.html" class="action-btn" style="display:inline-block;margin-top:12px">갤러리로 돌아가기</a>' +
            "</div>";
          return;
        }

        var creator = normalizeCreator(stage.creator);
        var avatarUrl = getAvatarUrl(stage.creator);
        var avatarHtml = avatarUrl
          ? '<img class="creator-avatar" src="' + escapeHtml(avatarUrl) + '" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'grid\'" />' +
            '<span class="creator-avatar-placeholder" style="display:none">' + escapeHtml(creator.name.charAt(0).toUpperCase()) + "</span>"
          : '<span class="creator-avatar-placeholder">' + escapeHtml(creator.name.charAt(0).toUpperCase()) + "</span>";

        var myVote = (window.LikesClient.getCachedVotes() || {})[stageId] || 0;
        var currentScore = 0;

        document.title = stage.title + " - One Life Relay";

        shellEl.innerHTML =
          // === Header (title + creator + description + vote) ===
          '<div class="play-topbar">' +
            '<div class="play-topbar-row">' +
              '<div class="play-topbar-left">' +
                '<a href="./gallery.html" class="action-btn">&lt; 갤러리</a>' +
                "<h1>" + escapeHtml(stage.title) + "</h1>" +
              "</div>" +
              '<div class="play-topbar-right">' +
                '<p id="vote-loading" class="vote-loading">좋아요를 불러오는 중…</p>' +
                '<div id="vote-group" class="vote-group" data-loading="true">' +
                  '<button id="play-vote-up" class="vote-btn vote-up" data-active="' + (myVote === 1) + '" type="button" aria-label="' + escapeHtml(stage.title) + ' 좋아요">\uD83D\uDC4D</button>' +
                  '<button id="play-vote-down" class="vote-btn vote-down" data-active="' + (myVote === -1) + '" type="button" aria-label="' + escapeHtml(stage.title) + ' 싫어요">\uD83D\uDC4E</button>' +
                  '<span id="play-vote-heart" class="vote-heart" data-score-state="neutral" aria-label="좋아요 점수 0"><span class="heart-icon" aria-hidden="true">\uD83E\uDD0D</span> <span id="play-vote-score" class="vote-score">0</span></span>' +
                "</div>" +
              "</div>" +
            "</div>" +
            '<div class="play-meta-row">' +
              '<div class="play-info-creator">' +
                avatarHtml +
                '<span class="creator-name">' + escapeHtml(creator.name) + "</span>" +
              "</div>" +
              '<span class="play-info-genre">' + escapeHtml(stage.genre) + "</span>" +
              '<span class="play-info-condition">' + escapeHtml(stage.clearCondition) + "</span>" +
            "</div>" +
            '<p id="vote-feedback" class="vote-feedback" aria-live="polite"></p>' +
          "</div>" +

          // === Game Frame ===
          '<div class="play-frame-wrap">' +
            '<iframe id="play-frame" class="play-frame" title="' + escapeHtml(stage.title) + ' 플레이 화면"></iframe>' +
            '<div id="play-overlay" class="play-overlay" hidden>' +
              '<div class="play-overlay-card">' +
                '<h2 id="overlay-title"></h2>' +
                '<p id="overlay-copy"></p>' +
                '<div class="overlay-actions">' +
                  '<button id="play-retry" class="action-btn action-btn-primary" type="button">다시 플레이</button>' +
                  '<a href="./gallery.html" class="action-btn">갤러리로</a>' +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>" +

          // === Comments ===
          '<div class="comments-section">' +
            '<h3 class="comments-title">댓글</h3>' +
            '<form id="comment-form" class="comment-form">' +
              '<label class="sr-only" for="comment-name">닉네임</label>' +
              '<label class="sr-only" for="comment-text">댓글 내용</label>' +
              '<div class="comment-form-row">' +
                '<input id="comment-name" class="comment-name-input" name="authorName" type="text" placeholder="닉네임…" maxlength="24" autocomplete="nickname" value="' + escapeHtml(getSavedName()) + '" />' +
                '<textarea id="comment-text" class="comment-text-input" name="commentBody" placeholder="댓글을 입력해 주세요…" maxlength="500" rows="1"></textarea>' +
                '<button class="comment-submit" type="submit">등록</button>' +
              "</div>" +
              '<p id="comment-status" class="comment-status" aria-live="polite"></p>' +
            "</form>" +
            '<ul id="comment-list" class="comment-list">' +
              '<li class="comment-empty">댓글을 불러오는 중…</li>' +
            "</ul>" +
          "</div>";

        // === DOM refs ===
        var frameEl = document.getElementById("play-frame");
        var overlayEl = document.getElementById("play-overlay");
        var overlayTitleEl = document.getElementById("overlay-title");
        var overlayCopyEl = document.getElementById("overlay-copy");
        var retryBtn = document.getElementById("play-retry");
        var voteGroupEl = document.getElementById("vote-group");
        var voteLoadingEl = document.getElementById("vote-loading");
        var upBtn = document.getElementById("play-vote-up");
        var downBtn = document.getElementById("play-vote-down");
        var heartEl = document.getElementById("play-vote-heart");
        var scoreEl = document.getElementById("play-vote-score");
        var voteFeedbackEl = document.getElementById("vote-feedback");
        var commentForm = document.getElementById("comment-form");
        var commentNameEl = document.getElementById("comment-name");
        var commentTextEl = document.getElementById("comment-text");
        var commentListEl = document.getElementById("comment-list");
        var commentStatusEl = document.getElementById("comment-status");

        // === Stage load ===
        function loadStage() {
          overlayEl.hidden = true;
          frameEl.src = stage.path;
        }

        window.RelayHost = {
          onStageReady: function () {},
          onStageCleared: function (payload) {
            overlayTitleEl.textContent = "CLEAR!";
            overlayCopyEl.textContent = (payload.stageTitle || stage.title) + " 클리어!";
            overlayEl.hidden = false;
          },
          onStageFailed: function (payload) {
            overlayTitleEl.textContent = "GAME OVER";
            overlayCopyEl.textContent = (payload.stageTitle || stage.title) + "에서 실패했습니다.";
            overlayEl.hidden = false;
          },
        };

        retryBtn.addEventListener("click", loadStage);

        // === Vote ===
        function handleVote(voteValue) {
          if (upBtn.disabled) return;
          upBtn.disabled = true;
          downBtn.disabled = true;
          voteFeedbackEl.textContent = "";

          var oldScore = currentScore;
          var oldVote = myVote;
          var newVote = (oldVote === voteValue) ? 0 : voteValue;
          var newScore = oldScore - oldVote + newVote;

          myVote = newVote;
          currentScore = newScore;
          scoreEl.textContent = newScore;
          setScoreVisual(heartEl, newScore);
          upBtn.dataset.active = (newVote === 1).toString();
          downBtn.dataset.active = (newVote === -1).toString();

          window.LikesClient.castVote(stageId, voteValue)
            .then(function () {
              upBtn.disabled = false;
              downBtn.disabled = false;
            })
            .catch(function () {
              myVote = oldVote; currentScore = oldScore;
              scoreEl.textContent = oldScore;
              setScoreVisual(heartEl, oldScore);
              upBtn.dataset.active = (oldVote === 1).toString();
              downBtn.dataset.active = (oldVote === -1).toString();
              voteFeedbackEl.textContent = "투표를 저장하지 못했습니다. 잠시 후 다시 시도해 주세요.";
              upBtn.disabled = false; downBtn.disabled = false;
            });
        }

        upBtn.addEventListener("click", function () { handleVote(1); });
        downBtn.addEventListener("click", function () { handleVote(-1); });

        Promise.all([
          window.LikesClient.fetchVoteScores().catch(function () { return new Map(); }),
          window.LikesClient.fetchMyVotes(window.LikesClient.getVisitorId()).catch(function () { return {}; }),
        ]).then(function (results) {
          var scores = results[0];
          var votes = results[1];
          var s = scores.get(stageId);
          currentScore = s ? s.score : 0;
          myVote = votes[stageId] || 0;
          scoreEl.textContent = currentScore;
          setScoreVisual(heartEl, currentScore);
          upBtn.dataset.active = (myVote === 1).toString();
          downBtn.dataset.active = (myVote === -1).toString();
          voteGroupEl.dataset.loading = "false";
          voteLoadingEl.hidden = true;
        });

        // === Comments ===
        function supaRequest(path, opts) {
          opts = opts || {};
          return fetch(SUPABASE_URL + "/rest/v1/" + path, {
            method: opts.method || "GET",
            headers: Object.assign({
              apikey: SUPABASE_ANON_KEY,
              Authorization: "Bearer " + SUPABASE_ANON_KEY,
              "Content-Type": "application/json",
            }, opts.headers || {}),
            body: opts.body ? JSON.stringify(opts.body) : undefined,
          }).then(function (r) {
            return r.text().then(function (t) {
              var p = t ? JSON.parse(t) : null;
              if (!r.ok) throw new Error((p && p.message) || "Error " + r.status);
              return p;
            });
          });
        }

        function renderComments(comments) {
          if (!comments || !comments.length) {
            commentListEl.innerHTML = '<li class="comment-empty">아직 댓글이 없습니다. 첫 댓글을 남겨보세요!</li>';
            return;
          }
          commentListEl.innerHTML = comments.map(function (c) {
            return '<li class="comment-item">' +
              '<div class="comment-header">' +
                '<span class="comment-author">' + escapeHtml(c.author_name) + '</span>' +
                '<span class="comment-date">' + escapeHtml(formatDate(c.created_at)) + '</span>' +
              '</div>' +
              '<p class="comment-body">' + escapeHtml(c.body) + '</p>' +
            '</li>';
          }).join("");
        }

        function loadComments() {
          supaRequest(
            "stage_comments?stage_id=eq." + encodeURIComponent(stageId) +
            "&select=author_name,body,created_at&order=created_at.desc&limit=50"
          )
            .then(renderComments)
            .catch(function () {
              commentListEl.innerHTML = '<li class="comment-empty">댓글을 불러오지 못했습니다.</li>';
            });
        }

        commentTextEl.addEventListener("keydown", function (event) {
          if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
            event.preventDefault();
            commentForm.requestSubmit();
          }
        });

        commentForm.addEventListener("submit", function (e) {
          e.preventDefault();
          var name = (commentNameEl.value || "").trim().slice(0, 24);
          var body = (commentTextEl.value || "").trim().slice(0, 500);

          if (name.length < 1) {
            commentStatusEl.textContent = "닉네임을 입력해주세요.";
            commentNameEl.focus();
            return;
          }
          if (body.length < 1) {
            commentStatusEl.textContent = "댓글 내용을 입력해주세요.";
            commentTextEl.focus();
            return;
          }

          var submitBtn = commentForm.querySelector(".comment-submit");
          submitBtn.disabled = true;
          submitBtn.dataset.loading = "true";
          commentStatusEl.textContent = "등록 중…";

          supaRequest("stage_comments", {
            method: "POST",
            headers: { Prefer: "return=representation" },
            body: {
              stage_id: stageId,
              author_name: name,
              body: body,
              visitor_id: window.LikesClient.getVisitorId(),
            },
          })
            .then(function () {
              saveName(name);
              commentTextEl.value = "";
              commentStatusEl.textContent = "댓글을 등록했습니다.";
              submitBtn.disabled = false;
              submitBtn.dataset.loading = "false";
              loadComments();
            })
            .catch(function (err) {
              commentStatusEl.textContent = "등록 실패: " + err.message;
              submitBtn.disabled = false;
              submitBtn.dataset.loading = "false";
            });
        });

        window.addEventListener("keydown", function(e) {
          if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
            var active = document.activeElement;
            if (active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA")) {
              return;
            }
            e.preventDefault();
          }
        }, { capture: false });

        loadComments();
        loadStage();
      })();
    </script>
  </body>
</html>
