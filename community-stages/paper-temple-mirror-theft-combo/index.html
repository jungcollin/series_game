<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Temple: Mirror Heist</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #2a1f3f 0%, rgba(42, 31, 63, 0.2) 30%, transparent 55%),
          radial-gradient(circle at 20% 20%, rgba(234, 179, 8, 0.14), transparent 28%),
          linear-gradient(180deg, #140f1f 0%, #0a0910 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(248, 250, 252, 0.16);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at top, rgba(253, 224, 71, 0.07), transparent 32%),
          linear-gradient(180deg, #1a1325 0%, #0b0a10 100%);
        touch-action: none;
      }

      canvas:focus-visible,
      .mobile-btn:focus-visible {
        outline: 3px solid rgba(255, 251, 235, 0.95);
        outline-offset: 2px;
      }

      .mobile-controls {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 18;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-bottom: calc(env(safe-area-inset-bottom, 0px));
      }

      .mobile-btn {
        appearance: none;
        min-width: 94px;
        min-height: 56px;
        border: 0;
        border-radius: 999px;
        padding: 0 20px;
        background:
          linear-gradient(135deg, rgba(251, 191, 36, 0.92), rgba(249, 115, 22, 0.92));
        color: #140f1f;
        font: 900 16px "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        box-shadow:
          0 18px 40px rgba(249, 115, 22, 0.28),
          inset 0 1px 0 rgba(255, 251, 235, 0.8);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          right: 12px;
          bottom: 12px;
        }

        .mobile-btn {
          min-width: 86px;
          min-height: 52px;
          padding: 0 18px;
          font-size: 15px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Paper Temple: Mirror Heist. 캔버스를 터치하거나 Enter로 시작하세요.
      기본 조작은 이동, 클릭/터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로
      재생, 모바일은 터치·드래그만으로 플레이 입니다. 콤보 유지하며 패턴 3개로
      금고 열기, 콤보 3회 붕괴 또는 감시에 오래 노출 시 실패합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Paper Temple: Mirror Heist"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작">
      <button
        id="replay-button"
        class="mobile-btn"
        type="button"
        data-active="false"
        aria-label="패턴 재생"
      >
        재생
      </button>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "paper-temple-mirror-theft-combo";
      const STAGE_TITLE = "Paper Temple: Mirror Heist";
      const STAGE_CREATOR = "jungcollin";
      const STAGE_GENRE = "Pattern theft stealth / 콤보 임계치";
      const STAGE_DESCRIPTION =
        "경비의 동작 패턴을 훔쳐 복사한 몸짓으로 봉인을 풀고, 콤보를 잇는 잠입 액션";
      const STAGE_CONTROLS =
        "이동, 클릭/터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 재생, 모바일은 터치·드래그만으로 플레이";
      const STAGE_CLEAR = "콤보 유지하며 패턴 3개로 금고 열기";
      const STAGE_FAIL = "콤보 3회 붕괴 또는 감시에 오래 노출";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const replayButton = document.querySelector("#replay-button");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const PLAYER_RADIUS = 16;
      const PLAYER_SPEED = 296;
      const PLAYER_DRAG_REACH = 12;
      const STEAL_RADIUS = 78;
      const ALTAR_RADIUS = 56;
      const MAX_BREAKS = 3;
      const BASE_EXPOSURE_LIMIT = 2.55;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const PATTERNS = [
        {
          id: "fan",
          name: "접부채",
          hue: "#73d0ff",
          glow: "#d7f4ff",
          points: [
            [-0.9, 0.42],
            [-0.2, -0.58],
            [0.38, 0.12],
            [0.84, -0.34],
            [0.96, 0.58],
          ],
        },
        {
          id: "ribbon",
          name: "비단결",
          hue: "#ff9eb7",
          glow: "#ffe0ea",
          points: [
            [-1.0, 0.0],
            [-0.48, -0.54],
            [0.0, 0.38],
            [0.44, -0.32],
            [0.92, 0.56],
          ],
        },
        {
          id: "seal",
          name: "봉인각",
          hue: "#f7d16c",
          glow: "#fff4d6",
          points: [
            [-0.88, 0.52],
            [-0.62, -0.46],
            [0.12, -0.56],
            [0.52, -0.04],
            [0.24, 0.56],
            [0.88, 0.3],
          ],
        },
      ];

      const GUARD_BLUEPRINTS = [
        {
          patternId: 0,
          hue: "#73d0ff",
          glow: "#daf5ff",
          speed: 112,
          phaseOffset: 0.0,
          path: [
            { x: 168, y: 436 },
            { x: 292, y: 314 },
            { x: 208, y: 208 },
            { x: 104, y: 308 },
          ],
        },
        {
          patternId: 1,
          hue: "#ff9eb7",
          glow: "#ffe3eb",
          speed: 118,
          phaseOffset: 1.4,
          path: [
            { x: 480, y: 446 },
            { x: 572, y: 298 },
            { x: 482, y: 176 },
            { x: 388, y: 294 },
          ],
        },
        {
          patternId: 2,
          hue: "#f7d16c",
          glow: "#fff0b8",
          speed: 126,
          phaseOffset: 2.8,
          path: [
            { x: 790, y: 430 },
            { x: 676, y: 304 },
            { x: 754, y: 204 },
            { x: 872, y: 304 },
          ],
        },
      ];

      const PAPER_FIBERS = Array.from({ length: 54 }, (_, index) => ({
        x: 28 + (index * 173) % VIEW.width,
        y: 34 + (index * 97) % VIEW.height,
        length: 18 + (index % 5) * 12,
        angle: ((index % 9) / 9) * Math.PI,
        alpha: 0.04 + (index % 7) * 0.007,
      }));

      const DUST = Array.from({ length: 30 }, (_, index) => ({
        x: 14 + (index * 29.7) % VIEW.width,
        y: 18 + (index * 53.3) % VIEW.height,
        r: 1.2 + (index % 4) * 0.5,
        speed: 8 + (index % 5) * 2,
        phase: index * 0.41,
      }));

      const input = {
        left: false,
        right: false,
        up: false,
        down: false,
        targetActive: false,
        targetX: VIEW.width / 2,
        targetY: VIEW.height - 96,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        sceneTime: 0,
        note: STAGE_DESCRIPTION,
        player: createPlayer(),
        guards: createGuards(),
        altars: createAltars(),
        particles: [],
        ribbons: [],
        popups: [],
        carriedPattern: null,
        comboCount: 0,
        comboArmed: false,
        comboTimer: 0,
        comboWindow: 0,
        breaks: 0,
        exposure: 0,
        exposureFlash: 0,
        detectedCount: 0,
        unlockCount: 0,
        shake: 0,
        flash: 0,
        lastReason: "",
      };

      function createPlayer() {
        return {
          x: VIEW.width / 2,
          y: VIEW.height - 104,
          radius: PLAYER_RADIUS,
          facing: -Math.PI / 2,
          pulse: 0,
          trail: [],
        };
      }

      function createGuards() {
        return GUARD_BLUEPRINTS.map((blueprint) => {
          const start = blueprint.path[0];
          return {
            patternId: blueprint.patternId,
            hue: blueprint.hue,
            glow: blueprint.glow,
            x: start.x,
            y: start.y,
            prevX: start.x,
            prevY: start.y,
            path: blueprint.path,
            pathIndex: 1,
            speed: blueprint.speed,
            phaseOffset: blueprint.phaseOffset,
            cycle: 3.35,
            activeWindow: 1.26,
            castTimer: blueprint.phaseOffset,
            cooldown: 0,
            dirAngle: -Math.PI / 2,
            shardX: start.x,
            shardY: start.y - 32,
            pulse: 0,
          };
        });
      }

      function createAltars() {
        return PATTERNS.map((pattern, index) => ({
          id: pattern.id,
          patternId: index,
          x: 226 + index * 254,
          y: 122,
          radius: ALTAR_RADIUS,
          unlocked: false,
          pulse: 0,
          energy: 0,
        }));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - clamp(t, 0, 1), 3);
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function distance(aX, aY, bX, bY) {
        return Math.hypot(aX - bX, aY - bY);
      }

      function normalizeAngle(angle) {
        while (angle > Math.PI) angle -= Math.PI * 2;
        while (angle < -Math.PI) angle += Math.PI * 2;
        return angle;
      }

      function getComboWindow() {
        return clamp(6.1 - state.unlockCount * 0.55 - state.breaks * 0.2, 3.35, 6.1);
      }

      function getExposureLimit() {
        return clamp(BASE_EXPOSURE_LIMIT - state.breaks * 0.38, 1.45, BASE_EXPOSURE_LIMIT);
      }

      function getPattern(patternId) {
        return PATTERNS[patternId] || PATTERNS[0];
      }

      function pointInCone(px, py, guard) {
        const dx = px - guard.x;
        const dy = py - guard.y;
        const distanceToPlayer = Math.hypot(dx, dy);
        const viewLength = 164 + state.unlockCount * 18;
        if (distanceToPlayer > viewLength) {
          return false;
        }
        const angleToPlayer = Math.atan2(dy, dx);
        const angleDelta = Math.abs(normalizeAngle(angleToPlayer - guard.dirAngle));
        const halfAngle = 0.56 + state.unlockCount * 0.04;
        return angleDelta <= halfAngle || distanceToPlayer < 42;
      }

      function clientToCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((clientX - rect.left) / rect.width) * canvas.width,
          y: ((clientY - rect.top) / rect.height) * canvas.height,
        };
      }

      function addPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          vy: -28,
          life: 1.2,
          maxLife: 1.2,
          color,
        });
      }

      function spawnBurst(x, y, color, amount, speed) {
        for (let index = 0; index < amount; index += 1) {
          const angle = (Math.PI * 2 * index) / amount + rand(-0.25, 0.25);
          const velocity = speed * rand(0.58, 1.1);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            size: rand(3, 8),
            life: rand(0.55, 1.15),
            maxLife: rand(0.55, 1.15),
            color,
          });
        }
      }

      function spawnRibbon(x, y, patternId) {
        const pattern = getPattern(patternId);
        state.ribbons.push({
          x,
          y,
          patternId,
          life: 0.72,
          maxLife: 0.72,
          color: pattern.hue,
        });
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = createPlayer();
        state.guards = createGuards();
        state.altars = createAltars();
        state.particles = [];
        state.ribbons = [];
        state.popups = [];
        state.carriedPattern = null;
        state.comboCount = 0;
        state.comboArmed = false;
        state.comboTimer = 0;
        state.comboWindow = 0;
        state.breaks = 0;
        state.exposure = 0;
        state.exposureFlash = 0;
        state.detectedCount = 0;
        state.unlockCount = 0;
        state.shake = 0;
        state.flash = 0;
        state.lastReason = "";
        input.targetActive = false;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
        }
      }

      function failRun(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.shake = 0.7;
        state.flash = 0.4;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearRun() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.lastReason = "cleared";
        state.flash = 0.35;
        spawnBurst(VIEW.width / 2, 180, "#fff4d6", 24, 180);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function registerSuccess(label, x, y, color) {
        state.comboCount += 1;
        state.comboArmed = true;
        state.comboWindow = getComboWindow();
        state.comboTimer = state.comboWindow;
        state.flash = 0.16;
        addPopup(label, x, y, color);
      }

      function breakCombo(reason, x, y) {
        if (!state.comboArmed) {
          return;
        }
        state.comboArmed = false;
        state.comboTimer = 0;
        state.comboCount = 0;
        state.carriedPattern = null;
        state.breaks += 1;
        state.flash = 0.28;
        state.shake = Math.max(state.shake, 0.32);
        addPopup("콤보 붕괴", x, y, "#fb7185");
        spawnBurst(x, y, "#fb7185", 12, 132);
        state.exposure = clamp(state.exposure + 0.28, 0, getExposureLimit());
        if (state.breaks >= MAX_BREAKS) {
          failRun(reason || "combo_collapse");
        }
      }

      function advanceGuard(guard, dt) {
        const speed = guard.speed * (1 + state.unlockCount * 0.06);
        let remaining = speed * dt;
        while (remaining > 0) {
          const target = guard.path[guard.pathIndex];
          const dx = target.x - guard.x;
          const dy = target.y - guard.y;
          const segment = Math.hypot(dx, dy);
          if (segment < 0.001) {
            guard.pathIndex = (guard.pathIndex + 1) % guard.path.length;
            continue;
          }
          const step = Math.min(segment, remaining);
          guard.x += (dx / segment) * step;
          guard.y += (dy / segment) * step;
          remaining -= step;
          if (step === segment) {
            guard.pathIndex = (guard.pathIndex + 1) % guard.path.length;
          } else {
            break;
          }
        }
      }

      function updateGuards(dt) {
        for (const guard of state.guards) {
          guard.prevX = guard.x;
          guard.prevY = guard.y;
          advanceGuard(guard, dt);
          const velocityX = guard.x - guard.prevX;
          const velocityY = guard.y - guard.prevY;
          if (Math.hypot(velocityX, velocityY) > 0.001) {
            guard.dirAngle = Math.atan2(velocityY, velocityX);
          }
          guard.castTimer = (guard.castTimer + dt) % guard.cycle;
          guard.cooldown = Math.max(0, guard.cooldown - dt);
          guard.pulse = Math.max(0, guard.pulse - dt * 2.2);
          const active =
            !state.altars[guard.patternId].unlocked &&
            guard.cooldown <= 0 &&
            guard.castTimer < guard.activeWindow;
          const arc = Math.sin((guard.castTimer / guard.activeWindow) * Math.PI);
          const side = Math.sin(state.sceneTime * 3.6 + guard.phaseOffset) * 14;
          guard.shardX =
            guard.x + Math.cos(guard.dirAngle + Math.PI / 2) * (34 + side * 0.15);
          guard.shardY =
            guard.y + Math.sin(guard.dirAngle + Math.PI / 2) * (34 + side * 0.15) -
            arc * 12;
          guard.active = active;
        }
      }

      function updatePlayer(dt) {
        const player = state.player;
        let moveX = 0;
        let moveY = 0;

        if (input.left) moveX -= 1;
        if (input.right) moveX += 1;
        if (input.up) moveY -= 1;
        if (input.down) moveY += 1;

        if (moveX !== 0 || moveY !== 0) {
          const magnitude = Math.hypot(moveX, moveY) || 1;
          moveX /= magnitude;
          moveY /= magnitude;
          player.x += moveX * PLAYER_SPEED * dt;
          player.y += moveY * PLAYER_SPEED * dt;
          player.facing = Math.atan2(moveY, moveX);
        } else if (input.targetActive) {
          const dx = input.targetX - player.x;
          const dy = input.targetY - player.y;
          const distanceToTarget = Math.hypot(dx, dy);
          if (distanceToTarget > PLAYER_DRAG_REACH) {
            const step = Math.min(distanceToTarget, PLAYER_SPEED * dt);
            player.x += (dx / distanceToTarget) * step;
            player.y += (dy / distanceToTarget) * step;
            player.facing = Math.atan2(dy, dx);
          }
        }

        player.x = clamp(player.x, 72, VIEW.width - 72);
        player.y = clamp(player.y, 88, VIEW.height - 58);
        player.pulse += dt * 5.4;
        player.trail.push({
          x: player.x,
          y: player.y,
          life: 0.32,
        });
        player.trail = player.trail
          .map((entry) => ({ x: entry.x, y: entry.y, life: entry.life - dt }))
          .filter((entry) => entry.life > 0);
      }

      function updateParticles(dt) {
        state.particles = state.particles
          .map((particle) => ({
            ...particle,
            x: particle.x + particle.vx * dt,
            y: particle.y + particle.vy * dt,
            vx: particle.vx * 0.98,
            vy: particle.vy * 0.98 + 14 * dt,
            life: particle.life - dt,
          }))
          .filter((particle) => particle.life > 0);

        state.ribbons = state.ribbons
          .map((ribbon) => ({
            ...ribbon,
            y: ribbon.y - 14 * dt,
            life: ribbon.life - dt,
          }))
          .filter((ribbon) => ribbon.life > 0);

        state.popups = state.popups
          .map((popup) => ({
            ...popup,
            y: popup.y + popup.vy * dt,
            life: popup.life - dt,
          }))
          .filter((popup) => popup.life > 0);

        state.shake = Math.max(0, state.shake - dt * 2.2);
        state.flash = Math.max(0, state.flash - dt * 1.7);
        state.exposureFlash = Math.max(0, state.exposureFlash - dt * 2.8);
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        updatePlayer(dt);
        updateGuards(dt);

        let detectedCount = 0;
        for (const guard of state.guards) {
          if (state.altars[guard.patternId].unlocked) {
            continue;
          }
          if (pointInCone(state.player.x, state.player.y, guard)) {
            detectedCount += 1;
          }
        }
        state.detectedCount = detectedCount;

        if (detectedCount > 0) {
          const intensity = 0.88 + detectedCount * 0.38 + state.unlockCount * 0.16;
          state.exposure = clamp(state.exposure + dt * intensity, 0, getExposureLimit());
          state.exposureFlash = clamp(state.exposureFlash + dt * 2.2, 0, 1);
          if (state.comboArmed) {
            state.comboTimer = Math.max(0, state.comboTimer - dt * 0.3);
          }
        } else {
          state.exposure = Math.max(0, state.exposure - dt * 0.62);
        }

        if (state.comboArmed) {
          state.comboTimer = Math.max(0, state.comboTimer - dt);
          if (state.comboTimer <= 0.001) {
            breakCombo("combo_timeout", state.player.x, state.player.y - 12);
          }
        }

        for (const altar of state.altars) {
          altar.pulse = Math.max(0, altar.pulse - dt * 2.4);
          altar.energy = Math.max(0, altar.energy - dt * 1.8);
        }

        if (state.exposure >= getExposureLimit() - 0.001) {
          failRun("감시 시선에 오래 노출");
        }
      }

      function update(dt) {
        state.sceneTime += dt;
        for (const mote of DUST) {
          mote.y += mote.speed * dt;
          if (mote.y > VIEW.height + 18) {
            mote.y = -12;
            mote.x = rand(40, VIEW.width - 40);
          }
        }
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          updateGuards(dt * 0.5);
        }
        updateParticles(dt);
      }

      function setTarget(clientX, clientY) {
        const point = clientToCanvas(clientX, clientY);
        input.targetActive = true;
        input.targetX = clamp(point.x, 72, VIEW.width - 72);
        input.targetY = clamp(point.y, 88, VIEW.height - 58);
        return point;
      }

      function trySteal(point) {
        if (state.mode !== "running") {
          return false;
        }
        let targetGuard = null;
        let bestDistance = Infinity;
        for (const guard of state.guards) {
          const altar = state.altars[guard.patternId];
          if (altar.unlocked || !guard.active) {
            continue;
          }
          const playerDistance = distance(state.player.x, state.player.y, guard.x, guard.y);
          if (playerDistance > STEAL_RADIUS) {
            continue;
          }
          const pointerDistance = distance(point.x, point.y, guard.shardX, guard.shardY);
          if (pointerDistance > 124) {
            continue;
          }
          if (pointerDistance < bestDistance) {
            targetGuard = guard;
            bestDistance = pointerDistance;
          }
        }

        if (!targetGuard) {
          return false;
        }

        const currentAltar = state.altars[targetGuard.patternId];
        if (currentAltar.unlocked) {
          return false;
        }

        const pattern = getPattern(targetGuard.patternId);
        state.carriedPattern = targetGuard.patternId;
        targetGuard.cooldown = 1.55;
        targetGuard.pulse = 1;
        registerSuccess("패턴 탈취", state.player.x, state.player.y - 28, pattern.glow);
        spawnRibbon(state.player.x, state.player.y - 16, targetGuard.patternId);
        spawnBurst(targetGuard.shardX, targetGuard.shardY, pattern.hue, 14, 145);
        return true;
      }

      function tryReplay(source = "button") {
        if (state.mode !== "running") {
          return;
        }
        const player = state.player;
        let altarOn = null;
        for (const altar of state.altars) {
          if (distance(player.x, player.y, altar.x, altar.y) <= altar.radius + 18) {
            altarOn = altar;
            break;
          }
        }

        if (!altarOn) {
          addPopup("제단 위에서 재생", player.x, player.y - 20, "#dbeafe");
          return;
        }

        if (altarOn.unlocked) {
          addPopup("이미 열린 봉인", altarOn.x, altarOn.y - 24, "#fef3c7");
          return;
        }

        if (state.carriedPattern === altarOn.patternId) {
          const pattern = getPattern(altarOn.patternId);
          altarOn.unlocked = true;
          altarOn.pulse = 1;
          altarOn.energy = 1.4;
          state.unlockCount += 1;
          registerSuccess("봉인 해제", altarOn.x, altarOn.y - 28, pattern.glow);
          spawnRibbon(altarOn.x, altarOn.y - 10, altarOn.patternId);
          spawnBurst(altarOn.x, altarOn.y, pattern.hue, 18, 166);
          state.carriedPattern = null;
          if (state.unlockCount >= PATTERNS.length) {
            clearRun();
          }
          return;
        }

        if (state.carriedPattern === null) {
          addPopup("훔친 패턴이 필요", altarOn.x, altarOn.y - 24, "#fef3c7");
          return;
        }

        breakCombo("wrong_pattern_replay", altarOn.x, altarOn.y);
        addPopup(
          source === "button" ? "거울 재생 실패" : "패턴 불일치",
          altarOn.x,
          altarOn.y - 44,
          "#fecaca"
        );
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startFromTouch();
          }
          return;
        }
        if (event.key === " " || event.key === "Spacebar") {
          event.preventDefault();
          tryReplay("space");
          return;
        }
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          input.left = true;
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          input.right = true;
        }
        if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
          input.up = true;
        }
        if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
          input.down = true;
        }
        if ((event.key === "f" || event.key === "F") && document.fullscreenEnabled) {
          if (document.fullscreenElement) {
            document.exitFullscreen().catch(() => {});
          } else {
            canvas.requestFullscreen?.().catch(() => {});
          }
        }
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          input.left = false;
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          input.right = false;
        }
        if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
          input.up = false;
        }
        if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
          input.down = false;
        }
      }

      function handleMousePointerDown(event) {
        if (event.pointerType === "touch") {
          return;
        }
        event.preventDefault();
        if (state.mode !== "running") {
          startFromTouch();
          return;
        }
        const point = setTarget(event.clientX, event.clientY);
        trySteal(point);
      }

      function handleMousePointerMove(event) {
        if (event.pointerType === "touch") {
          return;
        }
        if (event.buttons > 0 && state.mode === "running") {
          event.preventDefault();
          setTarget(event.clientX, event.clientY);
        }
      }

      function handleTouchStart(event) {
        if (event.touches.length >= 2) {
          event.preventDefault();
          if (state.mode === "running") {
            tryReplay("two_finger");
          }
          return;
        }
        const touch = event.touches[0];
        if (!touch) {
          return;
        }
        event.preventDefault();
        if (state.mode !== "running") {
          startFromTouch();
          return;
        }
        const point = setTarget(touch.clientX, touch.clientY);
        trySteal(point);
      }

      function handleTouchMove(event) {
        const touch = event.touches[0];
        if (!touch || state.mode !== "running") {
          return;
        }
        event.preventDefault();
        setTarget(touch.clientX, touch.clientY);
      }

      function handleTouchEnd() {
        if (!input.left && !input.right && !input.up && !input.down) {
          input.targetActive = true;
        }
      }

      function bindReplayButton(button) {
        const activate = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = "true";
          tryReplay("button");
        };
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = "false";
        };
        button.addEventListener("pointerdown", activate, { passive: false });
        button.addEventListener("pointerup", release, { passive: false });
        button.addEventListener("pointercancel", release, { passive: false });
        button.addEventListener("pointerleave", release, { passive: false });
      }

      function drawPatternGlyph(patternId, x, y, scale, alpha, lineWidth) {
        const pattern = getPattern(patternId);
        ctx.save();
        ctx.translate(x, y);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = pattern.hue;
        ctx.globalAlpha = alpha;
        ctx.shadowColor = pattern.hue;
        ctx.shadowBlur = 18 * alpha;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        pattern.points.forEach((point, index) => {
          const px = point[0] * scale;
          const py = point[1] * scale;
          if (index === 0) {
            ctx.moveTo(px, py);
          } else {
            ctx.lineTo(px, py);
          }
        });
        ctx.stroke();
        ctx.restore();
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#171226");
        sky.addColorStop(0.5, "#120f1d");
        sky.addColorStop(1, "#09070d");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const floor = ctx.createLinearGradient(0, 270, 0, VIEW.height);
        floor.addColorStop(0, "rgba(102, 65, 40, 0.06)");
        floor.addColorStop(1, "rgba(199, 136, 67, 0.18)");
        ctx.fillStyle = floor;
        ctx.fillRect(0, 260, VIEW.width, VIEW.height - 260);

        for (const dust of DUST) {
          ctx.beginPath();
          ctx.fillStyle = `rgba(255, 248, 220, ${0.08 + Math.sin(state.sceneTime + dust.phase) * 0.04})`;
          ctx.arc(
            dust.x + Math.sin(state.sceneTime * 0.7 + dust.phase) * 12,
            dust.y,
            dust.r,
            0,
            Math.PI * 2
          );
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255, 239, 193, 0.05)";
        for (const fiber of PAPER_FIBERS) {
          ctx.save();
          ctx.translate(fiber.x, fiber.y);
          ctx.rotate(fiber.angle);
          ctx.globalAlpha = fiber.alpha;
          ctx.fillRect(0, 0, fiber.length, 1.1);
          ctx.restore();
        }

        for (let column = 0; column < 5; column += 1) {
          const x = 80 + column * 200;
          const beam = ctx.createLinearGradient(x - 34, 0, x + 34, 0);
          beam.addColorStop(0, "rgba(38, 30, 54, 0.18)");
          beam.addColorStop(0.5, "rgba(233, 213, 162, 0.12)");
          beam.addColorStop(1, "rgba(38, 30, 54, 0.18)");
          ctx.fillStyle = beam;
          ctx.fillRect(x - 34, 54, 68, 376);
          ctx.fillStyle = "rgba(255, 241, 209, 0.08)";
          ctx.fillRect(x - 46, 44, 92, 14);
          ctx.fillRect(x - 46, 430, 92, 14);
        }

        const vaultGlow = ctx.createRadialGradient(480, 110, 20, 480, 110, 240);
        vaultGlow.addColorStop(0, "rgba(250, 204, 21, 0.23)");
        vaultGlow.addColorStop(0.3, "rgba(244, 114, 182, 0.08)");
        vaultGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = vaultGlow;
        ctx.fillRect(220, 0, 520, 300);

        const doorGradient = ctx.createLinearGradient(0, 60, 0, 268);
        doorGradient.addColorStop(0, "#26192c");
        doorGradient.addColorStop(1, "#120f18");
        ctx.fillStyle = doorGradient;
        ctx.beginPath();
        ctx.moveTo(292, 268);
        ctx.lineTo(292, 134);
        ctx.quadraticCurveTo(292, 60, 360, 60);
        ctx.lineTo(600, 60);
        ctx.quadraticCurveTo(668, 60, 668, 134);
        ctx.lineTo(668, 268);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 234, 182, 0.18)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 224, 160, 0.12)";
        ctx.fillRect(318, 86, 324, 22);
        ctx.fillRect(318, 118, 324, 6);

        for (const lanternX of [158, 802]) {
          const flicker = Math.sin(state.sceneTime * 4.8 + lanternX) * 0.12 + 0.84;
          const glow = ctx.createRadialGradient(lanternX, 92, 0, lanternX, 92, 96);
          glow.addColorStop(0, `rgba(252, 211, 77, ${0.28 * flicker})`);
          glow.addColorStop(0.5, `rgba(249, 115, 22, ${0.14 * flicker})`);
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(lanternX - 100, -6, 200, 200);
          ctx.fillStyle = "#3b1d15";
          ctx.fillRect(lanternX - 11, 34, 22, 54);
          ctx.fillStyle = "#fbbf24";
          ctx.fillRect(lanternX - 10, 48, 20, 28);
        }

        ctx.fillStyle = "rgba(253, 244, 214, 0.06)";
        for (let y = 272; y <= 486; y += 30) {
          ctx.fillRect(54, y, VIEW.width - 108, 1);
        }
      }

      function drawAltars() {
        for (const altar of state.altars) {
          const pattern = getPattern(altar.patternId);
          const active = state.carriedPattern === altar.patternId && !altar.unlocked;
          const progress = altar.unlocked ? 1 : 0;
          const glowSize = 62 + Math.sin(state.sceneTime * 4 + altar.x * 0.01) * 4;
          const glow = ctx.createRadialGradient(altar.x, altar.y, 10, altar.x, altar.y, glowSize);
          glow.addColorStop(
            0,
            altar.unlocked
              ? "rgba(255, 248, 220, 0.64)"
              : active
                ? "rgba(255, 248, 220, 0.34)"
                : "rgba(255, 248, 220, 0.08)"
          );
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(altar.x, altar.y, glowSize, 0, Math.PI * 2);
          ctx.fill();

          ctx.save();
          ctx.translate(altar.x, altar.y);
          ctx.rotate(Math.PI / 4);
          ctx.fillStyle = altar.unlocked
            ? "rgba(255, 251, 235, 0.48)"
            : "rgba(42, 28, 52, 0.92)";
          ctx.strokeStyle = altar.unlocked ? pattern.glow : "rgba(255, 234, 182, 0.18)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.roundRect(-38, -38, 76, 76, 18);
          ctx.fill();
          ctx.stroke();
          ctx.restore();

          drawPatternGlyph(
            altar.patternId,
            altar.x,
            altar.y,
            20 + altar.energy * 12 + progress * 3,
            altar.unlocked ? 0.9 : active ? 0.85 : 0.45,
            altar.unlocked ? 5 : 4
          );

          if (altar.unlocked) {
            ctx.fillStyle = "rgba(255, 251, 235, 0.9)";
            ctx.font = "700 12px Trebuchet MS";
            ctx.textAlign = "center";
            ctx.fillText("열림", altar.x, altar.y + 48);
          }
        }
      }

      function drawGuards() {
        for (const guard of state.guards) {
          if (state.altars[guard.patternId].unlocked) {
            continue;
          }
          const pattern = getPattern(guard.patternId);
          const detected = pointInCone(state.player.x, state.player.y, guard);
          const viewLength = 164 + state.unlockCount * 18;
          const spread = 0.56 + state.unlockCount * 0.04;

          ctx.save();
          ctx.translate(guard.x, guard.y);
          ctx.rotate(guard.dirAngle);
          const cone = ctx.createLinearGradient(0, 0, viewLength, 0);
          cone.addColorStop(0, detected ? "rgba(251, 113, 133, 0.28)" : "rgba(125, 211, 252, 0.18)");
          cone.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = cone;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(viewLength, -viewLength * Math.tan(spread) * 0.24);
          ctx.lineTo(viewLength, viewLength * Math.tan(spread) * 0.24);
          ctx.closePath();
          ctx.fill();
          ctx.restore();

          ctx.save();
          ctx.translate(guard.x, guard.y);
          ctx.shadowColor = pattern.hue;
          ctx.shadowBlur = 18 + guard.pulse * 20;
          ctx.fillStyle = "rgba(28, 22, 36, 0.98)";
          ctx.beginPath();
          ctx.arc(0, 0, 22, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = guard.hue;
          ctx.beginPath();
          ctx.arc(0, -6, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255, 248, 220, 0.9)";
          ctx.beginPath();
          ctx.arc(5, -8, 2.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          if (guard.active) {
            const shimmer = 0.45 + Math.sin(state.sceneTime * 8 + guard.phaseOffset) * 0.12;
            ctx.save();
            ctx.shadowColor = pattern.hue;
            ctx.shadowBlur = 20;
            ctx.fillStyle = `rgba(255, 255, 255, ${shimmer})`;
            ctx.beginPath();
            ctx.arc(guard.shardX, guard.shardY, 7 + shimmer * 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            drawPatternGlyph(guard.patternId, guard.shardX, guard.shardY, 16, 0.8, 3.2);
          }
        }
      }

      function drawPlayer() {
        const player = state.player;
        const carry = state.carriedPattern;
        for (const trail of player.trail) {
          ctx.fillStyle = `rgba(255, 248, 220, ${trail.life * 0.12})`;
          ctx.beginPath();
          ctx.arc(trail.x, trail.y, player.radius * trail.life * 1.5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.facing + Math.PI / 2);
        const aura = ctx.createRadialGradient(0, 0, 8, 0, 0, 40);
        aura.addColorStop(0, carry === null ? "rgba(255, 248, 220, 0.28)" : `${getPattern(carry).hue}66`);
        aura.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(0, 0, 40 + Math.sin(player.pulse) * 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f7ead4";
        ctx.shadowColor = carry === null ? "#f8fafc" : getPattern(carry).hue;
        ctx.shadowBlur = carry === null ? 18 : 28;
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(16, -2);
        ctx.lineTo(10, 20);
        ctx.lineTo(-10, 20);
        ctx.lineTo(-16, -2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#2f2433";
        ctx.fillRect(-6, -9, 12, 16);
        ctx.restore();

        if (carry !== null) {
          drawPatternGlyph(carry, player.x, player.y - 34, 16, 0.9, 3.2);
        }
      }

      function drawRibbons() {
        for (const ribbon of state.ribbons) {
          const t = 1 - ribbon.life / ribbon.maxLife;
          drawPatternGlyph(
            ribbon.patternId,
            ribbon.x,
            ribbon.y - t * 12,
            20 + t * 6,
            1 - t,
            4 - t * 1.5
          );
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = particle.life / particle.maxLife;
          ctx.fillStyle = `${particle.color}${alpha < 0.4 ? "66" : "aa"}`;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawPopups() {
        ctx.textAlign = "center";
        for (const popup of state.popups) {
          const alpha = popup.life / popup.maxLife;
          ctx.font = "800 18px Trebuchet MS";
          ctx.fillStyle = popup.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          if (!popup.color.startsWith("#")) {
            ctx.fillStyle = popup.color;
            ctx.globalAlpha = alpha;
          }
          ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
          ctx.shadowBlur = 10;
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.globalAlpha = 1;
        }
      }

      function drawHud() {
        const comboRatio = state.comboArmed && state.comboWindow > 0
          ? clamp(state.comboTimer / state.comboWindow, 0, 1)
          : 0;
        const exposureRatio = clamp(state.exposure / getExposureLimit(), 0, 1);

        ctx.save();
        ctx.fillStyle = "rgba(11, 10, 16, 0.62)";
        ctx.strokeStyle = "rgba(255, 240, 207, 0.14)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(18, 16, 286, 92, 24);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(255, 245, 220, 0.92)";
        ctx.font = "800 14px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.fillText("MIRROR HEIST", 34, 40);

        ctx.font = "700 12px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 245, 220, 0.7)";
        ctx.fillText("콤보 안정도", 34, 64);
        ctx.fillText("감시 노출", 34, 92);

        ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
        ctx.beginPath();
        ctx.roundRect(118, 50, 160, 11, 999);
        ctx.roundRect(118, 78, 160, 11, 999);
        ctx.fill();

        const comboGradient = ctx.createLinearGradient(118, 0, 278, 0);
        comboGradient.addColorStop(0, "#7dd3fc");
        comboGradient.addColorStop(1, "#f9a8d4");
        ctx.fillStyle = comboGradient;
        ctx.beginPath();
        ctx.roundRect(118, 50, 160 * comboRatio, 11, 999);
        ctx.fill();

        const exposureGradient = ctx.createLinearGradient(118, 0, 278, 0);
        exposureGradient.addColorStop(0, "#fde68a");
        exposureGradient.addColorStop(0.55, "#fb923c");
        exposureGradient.addColorStop(1, "#fb7185");
        ctx.fillStyle = exposureGradient;
        ctx.beginPath();
        ctx.roundRect(118, 78, 160 * exposureRatio, 11, 999);
        ctx.fill();

        ctx.textAlign = "right";
        ctx.font = "800 12px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 245, 220, 0.9)";
        ctx.fillText(
          state.comboArmed ? `${state.comboCount} COMBO` : "첫 탈취로 기동",
          278,
          64
        );
        ctx.fillText(`${state.breaks}/${MAX_BREAKS} 붕괴`, 278, 92);
        ctx.restore();

        ctx.save();
        ctx.fillStyle = "rgba(11, 10, 16, 0.58)";
        ctx.strokeStyle = "rgba(255, 240, 207, 0.14)";
        ctx.beginPath();
        ctx.roundRect(716, 16, 226, 92, 24);
        ctx.fill();
        ctx.stroke();

        ctx.textAlign = "left";
        ctx.fillStyle = "rgba(255, 245, 220, 0.72)";
        ctx.font = "700 12px Trebuchet MS";
        ctx.fillText("훔친 패턴", 734, 40);
        ctx.fillText("열린 봉인", 734, 84);

        if (state.carriedPattern === null) {
          ctx.fillStyle = "rgba(255, 245, 220, 0.92)";
          ctx.font = "800 18px Trebuchet MS";
          ctx.fillText("비어 있음", 734, 64);
        } else {
          const pattern = getPattern(state.carriedPattern);
          drawPatternGlyph(state.carriedPattern, 782, 60, 20, 0.95, 4.4);
          ctx.fillStyle = "rgba(255, 245, 220, 0.92)";
          ctx.font = "800 18px Trebuchet MS";
          ctx.fillText(pattern.name, 812, 66);
        }

        for (const altar of state.altars) {
          const x = 804 + altar.patternId * 40;
          ctx.globalAlpha = altar.unlocked ? 1 : 0.25;
          drawPatternGlyph(altar.patternId, x, 80, 10, altar.unlocked ? 0.95 : 0.3, 3);
        }
        ctx.globalAlpha = 1;
        ctx.restore();

        ctx.save();
        ctx.textAlign = "center";
        ctx.font = "700 12px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 245, 220, 0.74)";
        ctx.fillText("탭으로 훔치고 제단 위에서 재생", VIEW.width / 2, 30);
        ctx.fillText("모바일은 드래그 이동, 두 손가락 탭 또는 재생 버튼", VIEW.width / 2, 48);
        ctx.restore();
      }

      function drawMenuCard(title, subtitle, buttonCopy) {
        const cardY = 300;
        const gradient = ctx.createLinearGradient(0, cardY - 130, 0, cardY + 110);
        gradient.addColorStop(0, "rgba(30, 20, 38, 0.86)");
        gradient.addColorStop(1, "rgba(11, 10, 16, 0.92)");
        ctx.fillStyle = gradient;
        ctx.strokeStyle = "rgba(255, 239, 193, 0.18)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(108, cardY - 120, 744, 242, 34);
        ctx.fill();
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = "#fff7e6";
        ctx.font = "900 38px Trebuchet MS";
        ctx.fillText(title, VIEW.width / 2, cardY - 58);
        ctx.font = "700 16px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 242, 210, 0.76)";
        ctx.fillText(subtitle, VIEW.width / 2, cardY - 26);

        ctx.font = "700 15px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 242, 210, 0.96)";
        ctx.fillText(STAGE_DESCRIPTION, VIEW.width / 2, cardY + 10);

        ctx.textAlign = "left";
        ctx.font = "800 14px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 240, 207, 0.96)";
        ctx.fillText("조작", 146, cardY + 52);
        ctx.fillText("클리어", 146, cardY + 82);
        ctx.fillText("실패", 146, cardY + 112);
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 245, 220, 0.78)";
        ctx.fillText(STAGE_CONTROLS, 214, cardY + 52);
        ctx.fillText(STAGE_CLEAR, 214, cardY + 82);
        ctx.fillText(STAGE_FAIL, 214, cardY + 112);

        ctx.textAlign = "center";
        ctx.font = "900 15px Trebuchet MS";
        ctx.fillStyle = "#140f1f";
        const buttonGradient = ctx.createLinearGradient(0, 0, 0, 50);
        buttonGradient.addColorStop(0, "#fde68a");
        buttonGradient.addColorStop(1, "#fb923c");
        ctx.fillStyle = buttonGradient;
        ctx.beginPath();
        ctx.roundRect(VIEW.width / 2 - 158, cardY + 144, 316, 48, 999);
        ctx.fill();
        ctx.fillStyle = "#140f1f";
        ctx.fillText(buttonCopy, VIEW.width / 2, cardY + 176);
      }

      function drawOverlay() {
        ctx.fillStyle = "rgba(7, 5, 10, 0.48)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        if (state.mode === "menu") {
          drawMenuCard(
            "Paper Temple: Mirror Heist",
            "경비의 동작을 훔쳐 세 봉인을 같은 흐름으로 연속 해제하세요",
            "터치 또는 Enter로 잠입 시작"
          );
          return;
        }

        if (state.mode === "failed") {
          drawMenuCard(
            "거울 잠입 실패",
            state.lastReason || "감시 사슬이 닫혔습니다",
            "터치 또는 Enter로 재도전"
          );
          return;
        }

        if (state.mode === "cleared") {
          drawMenuCard(
            "금고 개방 성공",
            `${Math.max(1, state.comboCount)} 콤보 흐름으로 봉인을 끝까지 연결했습니다`,
            "터치 또는 Enter로 다시 실행"
          );
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = state.shake > 0 ? Math.sin(state.sceneTime * 40) * state.shake * 7 : 0;
        const shakeY = state.shake > 0 ? Math.cos(state.sceneTime * 36) * state.shake * 5 : 0;
        ctx.save();
        ctx.translate(shakeX, shakeY);

        drawBackground();
        drawAltars();
        drawGuards();
        drawRibbons();
        drawPlayer();
        drawParticles();
        drawHud();
        drawPopups();

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255, 248, 220, ${state.flash * 0.22})`;
          ctx.fillRect(-12, -12, VIEW.width + 24, VIEW.height + 24);
        }
        if (state.exposureFlash > 0) {
          ctx.fillStyle = `rgba(251, 113, 133, ${state.exposureFlash * 0.1})`;
          ctx.fillRect(-12, -12, VIEW.width + 24, VIEW.height + 24);
        }

        if (state.mode !== "running") {
          drawOverlay();
        }
        ctx.restore();
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "origin at top-left; x right, y down; units in canvas pixels",
          mode: state.mode,
          result: window.relayStageResult.status,
          elapsed: Number(state.elapsed.toFixed(1)),
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
          },
          carried_pattern:
            state.carriedPattern === null ? null : getPattern(state.carriedPattern).name,
          unlocked_seals: state.altars
            .filter((altar) => altar.unlocked)
            .map((altar) => getPattern(altar.patternId).name),
          combo: {
            count: state.comboCount,
            armed: state.comboArmed,
            timer: Number(state.comboTimer.toFixed(2)),
            breaks: state.breaks,
          },
          exposure: {
            value: Number(state.exposure.toFixed(2)),
            limit: Number(getExposureLimit().toFixed(2)),
            detected_by: state.detectedCount,
          },
          guards: state.guards
            .filter((guard) => !state.altars[guard.patternId].unlocked)
            .map((guard) => ({
              pattern: getPattern(guard.patternId).name,
              x: Number(guard.x.toFixed(1)),
              y: Number(guard.y.toFixed(1)),
              active: guard.active,
            })),
          objective: STAGE_CLEAR,
          hint:
            state.mode === "running"
              ? "가까이 다가가 탭으로 패턴 탈취, 같은 문양 제단 위에서 재생"
              : "터치 또는 Enter로 시작",
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp
          ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT)
          : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        creator: STAGE_CREATOR,
        genre: STAGE_GENRE,
        clearCondition: STAGE_CLEAR,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          resetRun();
          state.altars.forEach((altar) => {
            altar.unlocked = true;
          });
          state.unlockCount = PATTERNS.length;
          clearRun();
          render();
        },
        forceFail() {
          resetRun();
          failRun("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", handleMousePointerDown, { passive: false });
      canvas.addEventListener("pointermove", handleMousePointerMove, { passive: false });
      canvas.addEventListener("touchstart", handleTouchStart, { passive: false });
      canvas.addEventListener("touchmove", handleTouchMove, { passive: false });
      canvas.addEventListener("touchend", handleTouchEnd, { passive: true });
      canvas.addEventListener("click", () => canvas.focus());
      bindReplayButton(replayButton);
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
