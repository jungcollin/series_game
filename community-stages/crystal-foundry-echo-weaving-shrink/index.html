<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Echo Loom</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, #24153d 0%, #090814 50%, #040208 100%);
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      #game,
      canvas {
        -webkit-tap-highlight-color: rgba(129, 212, 250, 0.24);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(10, 10, 20, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      #game {
        position: fixed;
        inset: 0;
        display: block;
        touch-action: none;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #06030d;
      }

      #game:focus-visible {
        outline: 4px solid rgba(240, 171, 252, 0.95);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Echo Loom. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 이며, 모바일에서는 화면 터치와 드래그로 플레이할 수 있습니다.
    </p>
    <div
      id="game"
      aria-label="Crystal Foundry: Echo Loom"
      aria-describedby="stage-instructions"
      tabindex="0"
    >
      <canvas id="game-surface" width="960" height="540"></canvas>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const TITLE = "Crystal Foundry: Echo Loom";
      const DESCRIPTION = "3초 잔상 실로 코어를 잇고, 줄어드는 안전 구간 끝까지 버티는 퍼즐 액션.";
      const CREATOR = "jungcollin";
      const GENRE = "Echo puzzler / 축소 아레나";
      const CONTROLS_TEXT =
        "마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_TEXT = "축소 구간 끝까지 버티며 모든 코어 문양을 연결하면 클리어";
      const FAIL_TEXT = "안전 영역 밖에 오래 머물거나 잔상 선이 끊기면 즉시 실패";
      const STAGE_ID = "crystal-foundry-echo-weaving-shrink";
      const searchParams = new URLSearchParams(window.location.search);
      const automation = {
        autostart: searchParams.get("autostart") === "1",
        autofail: searchParams.get("autofail") === "1",
        autoclear: searchParams.get("autoclear") === "1",
        handledEnd: false,
      };
      const stageRoot = document.querySelector("#game");
      const canvas = document.querySelector("#game-surface");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.54 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TOTAL_DURATION = 19.5;
      const SAFE_RADIUS_START = 248;
      const SAFE_RADIUS_END = 108;
      const SAFE_GRACE_LIMIT = 0.82;
      const RECORD_MAX_SECONDS = 3;
      const MAX_ECHOES = 2;
      const PLAYER_SPEED = 410;
      const PLAYER_RADIUS = 12;
      const ANCHOR_RADIUS = 34;
      const SIGIL_RADIUS = 16;
      const SIGIL_TOUCH_RADIUS = 28;
      const pointer = {
        down: false,
        active: false,
        id: null,
        x: CENTER.x,
        y: CENTER.y,
      };
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const echoPalette = ["#7ae7ff", "#ffb885", "#f8a0ff"];
      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        safeRadius: SAFE_RADIUS_START,
        outsideTime: 0,
        player: createPlayer(),
        recorder: createRecorder(),
        echoes: [],
        sigils: createSigils(),
        particles: [],
        popups: [],
        shake: 0,
        flash: 0,
        lastReason: "",
        sealArmed: false,
        armTime: 0,
        previewTime: 0,
      };

      function createPlayer() {
        return {
          x: CENTER.x,
          y: CENTER.y,
          vx: 0,
          vy: 0,
          radius: PLAYER_RADIUS,
          spin: 0,
          glow: 0,
        };
      }

      function createRecorder() {
        return {
          active: false,
          points: [],
          color: echoPalette[0],
          index: 0,
        };
      }

      function createSigils() {
        const labels = ["A", "B", "C"];
        return labels.map((label, index) => ({
          label,
          angleBase: -Math.PI / 2 + index * ((Math.PI * 2) / labels.length),
          radiusPhase: index * 1.8,
          x: CENTER.x,
          y: CENTER.y,
          active: false,
          justActivated: false,
          glow: 0,
        }));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, t) {
        return start + (end - start) * t;
      }

      function easeOutCubic(t) {
        const p = clamp(t, 0, 1);
        return 1 - Math.pow(1 - p, 3);
      }

      function easeInQuad(t) {
        const p = clamp(t, 0, 1);
        return p * p;
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function normalize(vx, vy, length = 1) {
        const size = Math.hypot(vx, vy) || 1;
        return { x: (vx / size) * length, y: (vy / size) * length };
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function getCanvasPoint(event) {
        const rect = stageRoot.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.safeRadius = SAFE_RADIUS_START;
        state.outsideTime = 0;
        state.player = createPlayer();
        state.recorder = createRecorder();
        state.echoes = [];
        state.sigils = createSigils();
        state.particles = [];
        state.popups = [];
        state.shake = 0;
        state.flash = 0;
        state.lastReason = "";
        state.sealArmed = false;
        state.armTime = 0;
        automation.handledEnd = false;
        pointer.active = false;
        pointer.down = false;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        pushPopup("직조 시작", CENTER.x, 110, "#7ae7ff", 1.1);
      }

      function startStage() {
        resetRun();
        ensureAnimationLoop();
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.shake = 18;
        state.flash = 0.8;
        pointer.down = false;
        state.recorder.active = false;
        window.relayStageResult.status = "failed";
        spawnBurst(state.player.x, state.player.y, "#ff8ea1", 28, 1.4);
        pushPopup(reasonToPopup(reason), state.player.x, state.player.y - 24, "#ffd2db", 1.1);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.9;
        state.shake = 10;
        pointer.down = false;
        state.recorder.active = false;
        window.relayStageResult.status = "cleared";
        spawnBurst(CENTER.x, CENTER.y, "#90ffe0", 46, 1.9);
        pushPopup("직조 완료", CENTER.x, 124, "#d9ffb7", 1.6);
        reportClearedToHost();
      }

      function reasonToPopup(reason) {
        if (reason === "safe-zone") {
          return "안전 구역 붕괴";
        }
        if (reason === "thread-snap") {
          return "잔상 실이 끊어짐";
        }
        if (reason === "timeout") {
          return "직조 미완성";
        }
        return "주조 실패";
      }

      function pushPopup(text, x, y, color, life = 0.9) {
        state.popups.push({
          text,
          x,
          y,
          color,
          age: 0,
          life,
        });
      }

      function spawnBurst(x, y, color, count, energy = 1) {
        const total = reducedMotion ? Math.ceil(count * 0.38) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / Math.max(1, total) + randomRange(-0.25, 0.25);
          const speed = randomRange(48, 220) * energy;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: randomRange(2, 7),
            life: randomRange(0.35, 1.05),
            age: 0,
            color,
          });
        }
      }

      function beginRecord() {
        if (state.mode !== "running") {
          return;
        }
        state.recorder.active = true;
        state.recorder.points = [
          { x: state.player.x, y: state.player.y, t: state.elapsed },
        ];
        state.recorder.index += 1;
        state.recorder.color = echoPalette[state.recorder.index % echoPalette.length];
        state.player.glow = 1;
      }

      function finalizeRecord() {
        if (!state.recorder.active) {
          return;
        }
        recordPoint(true);
        const normalized = normalizeThread(state.recorder.points);
        if (normalized.length >= 3) {
          state.echoes.push({
            points: normalized,
            age: 0,
            life: RECORD_MAX_SECONDS,
            color: state.recorder.color,
            anchored: threadAnchored(normalized),
          });
          if (state.echoes.length > MAX_ECHOES) {
            state.echoes.shift();
          }
          pushPopup("잔상 기록", state.player.x, state.player.y - 28, state.recorder.color, 0.85);
        }
        state.recorder.active = false;
        state.recorder.points = [];
      }

      function normalizeThread(points) {
        if (!points || points.length < 3) {
          return [];
        }
        const lastTime = points[points.length - 1].t;
        const trimmed = points.filter((point) => lastTime - point.t <= RECORD_MAX_SECONDS);
        if (trimmed.length < 3) {
          return [];
        }
        const startTime = trimmed[0].t;
        return trimmed.map((point) => ({
          x: point.x,
          y: point.y,
          t: point.t - startTime,
        }));
      }

      function recordPoint(force = false) {
        if (!state.recorder.active) {
          return;
        }
        const points = state.recorder.points;
        const lastPoint = points[points.length - 1];
        const now = state.elapsed;
        if (
          force ||
          !lastPoint ||
          distance(lastPoint.x, lastPoint.y, state.player.x, state.player.y) > 7 ||
          now - lastPoint.t > 0.06
        ) {
          points.push({ x: state.player.x, y: state.player.y, t: now });
        }
        while (points.length > 2 && now - points[0].t > RECORD_MAX_SECONDS) {
          points.shift();
        }
      }

      function threadAnchored(points) {
        return points.some((point) => distance(point.x, point.y, CENTER.x, CENTER.y) <= ANCHOR_RADIUS + 12);
      }

      function pointOnThread(points, travel) {
        if (!points.length) {
          return { x: CENTER.x, y: CENTER.y };
        }
        const maxTime = points[points.length - 1].t || 0;
        if (maxTime <= 0) {
          return { x: points[points.length - 1].x, y: points[points.length - 1].y };
        }
        const targetTime = clamp(travel, 0, 1) * maxTime;
        for (let index = 1; index < points.length; index += 1) {
          const prev = points[index - 1];
          const next = points[index];
          if (targetTime > next.t) {
            continue;
          }
          const ratio = clamp((targetTime - prev.t) / Math.max(0.0001, next.t - prev.t), 0, 1);
          return {
            x: lerp(prev.x, next.x, ratio),
            y: lerp(prev.y, next.y, ratio),
          };
        }
        const last = points[points.length - 1];
        return { x: last.x, y: last.y };
      }

      function distancePointToSegment(point, a, b) {
        const abx = b.x - a.x;
        const aby = b.y - a.y;
        const lengthSquared = abx * abx + aby * aby;
        if (lengthSquared <= 0.0001) {
          return distance(point.x, point.y, a.x, a.y);
        }
        const t = clamp(
          ((point.x - a.x) * abx + (point.y - a.y) * aby) / lengthSquared,
          0,
          1
        );
        const closestX = a.x + abx * t;
        const closestY = a.y + aby * t;
        return distance(point.x, point.y, closestX, closestY);
      }

      function threadTouchesSigil(thread, sigil) {
        if (!thread.anchored || thread.points.length < 2) {
          return false;
        }
        for (let index = 1; index < thread.points.length; index += 1) {
          const a = thread.points[index - 1];
          const b = thread.points[index];
          if (
            distancePointToSegment({ x: sigil.x, y: sigil.y }, a, b) <= SIGIL_TOUCH_RADIUS
          ) {
            return true;
          }
        }
        return false;
      }

      function getLiveThreads() {
        const threads = [];
        if (state.recorder.active && state.recorder.points.length >= 2) {
          const points = normalizeThread(state.recorder.points);
          if (points.length >= 2) {
            threads.push({
              type: "recording",
              points,
              color: state.recorder.color,
              anchored: threadAnchored(points),
              head: { x: state.player.x, y: state.player.y },
            });
          }
        }
        state.echoes.forEach((echo) => {
          threads.push({
            type: "echo",
            points: echo.points,
            color: echo.color,
            anchored: echo.anchored,
            head: pointOnThread(echo.points, echo.age / Math.max(0.001, echo.life)),
          });
        });
        return threads;
      }

      function updateSigils(dt, threads) {
        const clock = state.previewTime;
        const shrinkProgress = easeOutCubic(state.elapsed / TOTAL_DURATION);
        const orbitRadius = lerp(188, 102, shrinkProgress);
        state.sigils.forEach((sigil, index) => {
          const angleWobble = Math.sin(clock * 0.7 + index * 1.1) * 0.18;
          const radiusWobble = Math.sin(clock * 1.4 + sigil.radiusPhase) * 8;
          const angle = sigil.angleBase + angleWobble;
          const radius = orbitRadius + radiusWobble;
          sigil.x = CENTER.x + Math.cos(angle) * radius;
          sigil.y = CENTER.y + Math.sin(angle) * radius;
          const wasActive = sigil.active;
          sigil.active = threads.some((thread) => threadTouchesSigil(thread, sigil));
          sigil.justActivated = !wasActive && sigil.active;
          sigil.glow = clamp(
            sigil.glow + (sigil.active ? dt * 5.8 : -dt * 4),
            0,
            1
          );
          if (sigil.justActivated) {
            spawnBurst(sigil.x, sigil.y, "#9ce7ff", 10, 0.7);
            pushPopup(`문양 ${sigil.label}`, sigil.x, sigil.y - 22, "#d5f4ff", 0.5);
          }
        });
      }

      function armSeal() {
        if (state.sealArmed) {
          return;
        }
        state.sealArmed = true;
        state.armTime = state.elapsed;
        state.flash = 0.34;
        state.shake = 8;
        spawnBurst(CENTER.x, CENTER.y, "#f6d0ff", 24, 1.1);
        pushPopup("봉인 채널 유지", CENTER.x, 100, "#ffe5fb", 1.2);
      }

      function updateRun(dt) {
        state.elapsed += dt;
        state.previewTime = state.elapsed;
        const shrinkProgress = easeInQuad(state.elapsed / TOTAL_DURATION);
        state.safeRadius = lerp(SAFE_RADIUS_START, SAFE_RADIUS_END, shrinkProgress);
        state.player.spin += dt * (state.recorder.active ? 7.6 : 3.8);
        state.player.glow = clamp(state.player.glow + (state.recorder.active ? dt * 3 : -dt * 2), 0, 1);

        if (pointer.active) {
          const toTargetX = pointer.x - state.player.x;
          const toTargetY = pointer.y - state.player.y;
          const desired = normalize(toTargetX, toTargetY, PLAYER_SPEED);
          state.player.vx = lerp(state.player.vx, desired.x, dt * 8);
          state.player.vy = lerp(state.player.vy, desired.y, dt * 8);
        } else {
          state.player.vx = lerp(state.player.vx, 0, dt * 7);
          state.player.vy = lerp(state.player.vy, 0, dt * 7);
        }

        state.player.x = clamp(state.player.x + state.player.vx * dt, 42, VIEW.width - 42);
        state.player.y = clamp(state.player.y + state.player.vy * dt, 54, VIEW.height - 40);

        if (state.recorder.active) {
          recordPoint();
        }

        state.echoes.forEach((echo) => {
          echo.age += dt;
        });
        state.echoes = state.echoes.filter((echo) => echo.age < echo.life);

        const threads = getLiveThreads();
        updateSigils(dt, threads);
        const allConnected = state.sigils.every((sigil) => sigil.active);

        if (allConnected) {
          armSeal();
        } else if (state.sealArmed) {
          failStage("thread-snap");
          return;
        }

        const fromCenter = distance(state.player.x, state.player.y, CENTER.x, CENTER.y);
        if (fromCenter > state.safeRadius) {
          state.outsideTime += dt;
          if (state.outsideTime >= SAFE_GRACE_LIMIT) {
            failStage("safe-zone");
            return;
          }
        } else {
          state.outsideTime = Math.max(0, state.outsideTime - dt * 2.2);
        }

        if (state.elapsed >= TOTAL_DURATION) {
          if (state.sealArmed && allConnected) {
            clearStage();
          } else {
            failStage("timeout");
          }
        }

        if (!automation.handledEnd && automation.autofail && state.elapsed >= 0.45) {
          automation.handledEnd = true;
          failStage("debug");
        } else if (!automation.handledEnd && automation.autoclear && state.elapsed >= 0.45) {
          automation.handledEnd = true;
          clearStage();
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.age += dt;
          if (particle.age >= particle.life) {
            return false;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= Math.pow(0.9, dt * 12);
          particle.vy = particle.vy * Math.pow(0.9, dt * 12) + 48 * dt;
          return true;
        });

        state.popups = state.popups.filter((popup) => {
          popup.age += dt;
          popup.y -= dt * 28;
          return popup.age < popup.life;
        });

        state.shake = Math.max(0, state.shake - dt * 26);
        state.flash = Math.max(0, state.flash - dt * 1.4);
      }

      function updatePreview(dt) {
        state.previewTime += dt;
        updateSigils(0, []);
      }

      function advanceState(dt) {
        if (state.mode === "running") {
          updateRun(dt);
        } else {
          updatePreview(dt);
        }
        updateParticles(dt);
      }

      function drawBackground() {
        const progress = clamp(state.elapsed / TOTAL_DURATION, 0, 1);
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#261443");
        gradient.addColorStop(0.52, "#0f0b23");
        gradient.addColorStop(1, "#05030c");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const furnace = ctx.createRadialGradient(
          CENTER.x,
          CENTER.y + 20,
          20,
          CENTER.x,
          CENTER.y + 20,
          350
        );
        furnace.addColorStop(0, "rgba(250, 169, 255, 0.22)");
        furnace.addColorStop(0.36, "rgba(92, 186, 255, 0.18)");
        furnace.addColorStop(1, "rgba(6, 3, 13, 0)");
        ctx.fillStyle = furnace;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = "#67d8ff";
        ctx.lineWidth = 1.2;
        for (let index = 0; index < 10; index += 1) {
          const y = 66 + index * 34;
          ctx.beginPath();
          ctx.moveTo(0, y + Math.sin(state.previewTime * 0.8 + index) * 8);
          ctx.lineTo(VIEW.width, y + Math.cos(state.previewTime * 0.6 + index) * 12);
          ctx.stroke();
        }
        ctx.restore();

        for (let index = 0; index < 12; index += 1) {
          const angle = (Math.PI * 2 * index) / 12 + state.previewTime * 0.06;
          const distanceFromCenter = 255 + Math.sin(state.previewTime * 0.8 + index) * 16;
          const shardX = CENTER.x + Math.cos(angle) * distanceFromCenter;
          const shardY = CENTER.y + Math.sin(angle) * distanceFromCenter;
          ctx.save();
          ctx.translate(shardX, shardY);
          ctx.rotate(angle + state.previewTime * 0.15);
          ctx.fillStyle = index % 2 === 0 ? "rgba(118, 226, 255, 0.11)" : "rgba(255, 183, 201, 0.09)";
          ctx.beginPath();
          ctx.moveTo(0, -18);
          ctx.lineTo(9, 6);
          ctx.lineTo(0, 18);
          ctx.lineTo(-8, 3);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        ctx.strokeStyle = "rgba(255, 216, 160, 0.14)";
        ctx.lineWidth = 18;
        ctx.beginPath();
        ctx.arc(0, 0, 288, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(255, 140, 189, 0.14)";
        ctx.lineWidth = 9;
        ctx.beginPath();
        ctx.arc(0, 0, 220 + progress * 18, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }

      function drawSafeZone() {
        const dangerRadius = state.safeRadius + 22;
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        const outer = ctx.createRadialGradient(0, 0, state.safeRadius * 0.25, 0, 0, dangerRadius);
        outer.addColorStop(0, "rgba(19, 11, 32, 0)");
        outer.addColorStop(0.65, "rgba(255, 79, 131, 0)");
        outer.addColorStop(1, "rgba(255, 79, 131, 0.24)");
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(0, 0, dangerRadius, 0, Math.PI * 2);
        ctx.arc(0, 0, state.safeRadius, 0, Math.PI * 2, true);
        ctx.fill("evenodd");

        ctx.strokeStyle = "rgba(104, 232, 255, 0.65)";
        ctx.lineWidth = 4;
        ctx.shadowColor = "#67dcff";
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(0, 0, state.safeRadius, -Math.PI / 2, Math.PI * 1.5);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255, 233, 188, 0.22)";
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 12]);
        ctx.beginPath();
        ctx.arc(0, 0, ANCHOR_RADIUS + 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      function drawCenterAnchor() {
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        const core = ctx.createRadialGradient(0, 0, 2, 0, 0, 54);
        core.addColorStop(0, "#ffffff");
        core.addColorStop(0.35, "#b6f5ff");
        core.addColorStop(1, "rgba(93, 136, 255, 0)");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(0, 0, 58, 0, Math.PI * 2);
        ctx.fill();

        ctx.rotate(state.previewTime * 0.35);
        for (let index = 0; index < 6; index += 1) {
          ctx.rotate(Math.PI / 3);
          ctx.strokeStyle = index % 2 === 0 ? "rgba(255, 219, 166, 0.65)" : "rgba(117, 231, 255, 0.65)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(0, -12);
          ctx.lineTo(0, -38);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawSigils() {
        state.sigils.forEach((sigil) => {
          ctx.save();
          ctx.translate(sigil.x, sigil.y);
          const halo = ctx.createRadialGradient(0, 0, 3, 0, 0, 34);
          halo.addColorStop(
            0,
            sigil.active ? "rgba(255, 255, 255, 0.95)" : "rgba(210, 237, 255, 0.5)"
          );
          halo.addColorStop(
            0.45,
            sigil.active ? "rgba(121, 236, 255, 0.52)" : "rgba(121, 236, 255, 0.14)"
          );
          halo.addColorStop(1, "rgba(20, 17, 33, 0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(0, 0, 34, 0, Math.PI * 2);
          ctx.fill();

          ctx.rotate(state.previewTime * 0.7 + sigil.angleBase);
          ctx.strokeStyle = sigil.active ? "#eaf9ff" : "rgba(183, 213, 255, 0.82)";
          ctx.fillStyle = sigil.active ? "rgba(140, 233, 255, 0.3)" : "rgba(34, 25, 60, 0.88)";
          ctx.lineWidth = 2.8;
          ctx.shadowColor = sigil.active ? "#7ae7ff" : "transparent";
          ctx.shadowBlur = sigil.active ? 10 : 0;
          ctx.beginPath();
          for (let index = 0; index < 6; index += 1) {
            const angle = -Math.PI / 2 + (Math.PI * 2 * index) / 6;
            const radius = index % 2 === 0 ? 18 : 9;
            const px = Math.cos(angle) * radius;
            const py = Math.sin(angle) * radius;
            if (index === 0) {
              ctx.moveTo(px, py);
            } else {
              ctx.lineTo(px, py);
            }
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.shadowBlur = 0;
          ctx.fillStyle = sigil.active ? "#fefce8" : "#cfe4ff";
          ctx.font = "700 12px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(sigil.label, 0, 1);
          ctx.restore();
        });
      }

      function drawThread(thread, alphaMultiplier = 1) {
        if (!thread.points || thread.points.length < 2) {
          return;
        }
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = thread.color;
        ctx.lineWidth = thread.type === "recording" ? 6 : 5;
        ctx.globalAlpha = (thread.type === "recording" ? 0.96 : 0.75) * alphaMultiplier;
        ctx.shadowColor = thread.color;
        ctx.shadowBlur = thread.type === "recording" ? 10 : 7;
        ctx.beginPath();
        ctx.moveTo(thread.points[0].x, thread.points[0].y);
        for (let index = 1; index < thread.points.length; index += 1) {
          ctx.lineTo(thread.points[index].x, thread.points[index].y);
        }
        ctx.stroke();

        if (thread.head) {
          const glow = ctx.createRadialGradient(thread.head.x, thread.head.y, 3, thread.head.x, thread.head.y, 26);
          glow.addColorStop(0, "#ffffff");
          glow.addColorStop(0.35, thread.color);
          glow.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(thread.head.x, thread.head.y, 24, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawPlayer() {
        ctx.save();
        ctx.translate(state.player.x, state.player.y);
        ctx.rotate(state.player.spin);
        ctx.shadowColor = "#ffc1ec";
        ctx.shadowBlur = 10 + state.player.glow * 8;
        ctx.fillStyle = "#fff4b7";
        ctx.beginPath();
        ctx.moveTo(0, -16);
        ctx.lineTo(12, 0);
        ctx.lineTo(0, 16);
        ctx.lineTo(-12, 0);
        ctx.closePath();
        ctx.fill();

        ctx.rotate(Math.PI / 4);
        ctx.fillStyle = "rgba(113, 231, 255, 0.95)";
        ctx.fillRect(-4, -4, 8, 8);
        ctx.restore();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          const alpha = 1 - particle.age / particle.life;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        state.popups.forEach((popup) => {
          const alpha = 1 - popup.age / popup.life;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "700 15px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        });
      }

      function drawHud() {
        const remaining = Math.max(0, TOTAL_DURATION - state.elapsed);
        const allConnected = state.sigils.every((sigil) => sigil.active);
        const graceRatio = 1 - clamp(state.outsideTime / SAFE_GRACE_LIMIT, 0, 1);

        ctx.save();
        ctx.fillStyle = "rgba(8, 10, 20, 0.62)";
        roundRect(18, 16, 238, 106, 22);
        ctx.fill();
        roundRect(VIEW.width - 224, 16, 206, 106, 22);
        ctx.fill();

        ctx.fillStyle = "#ecfeff";
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillText("Shrink End", 34, 40);
        ctx.font = "800 34px Trebuchet MS";
        ctx.fillStyle = remaining < 5 ? "#ffd1de" : "#fff3bd";
        ctx.fillText(remaining.toFixed(1), 34, 78);

        ctx.font = "700 13px Trebuchet MS";
        ctx.fillStyle = "#a7f3d0";
        ctx.fillText(`Echo ${state.echoes.length}/${MAX_ECHOES}`, 34, 102);

        ctx.fillStyle = "#ecfeff";
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillText("Seal", VIEW.width - 206, 40);
        ctx.font = "800 24px Trebuchet MS";
        ctx.fillStyle = state.sealArmed ? "#f8d6ff" : "#cde9ff";
        ctx.fillText(state.sealArmed ? "LOCKED" : allConnected ? "READY" : "WEAVE", VIEW.width - 206, 74);
        ctx.font = "700 12px Trebuchet MS";
        ctx.fillStyle = "#ffe3ad";
        ctx.fillText(state.sealArmed ? "실 끊기면 즉시 붕괴" : "세 문양 동시 연결", VIEW.width - 206, 98);

        drawMeter(34, 114, 188, 8, graceRatio, "#67d8ff", "safe");
        drawMeter(VIEW.width - 206, 114, 162, 8, clamp((TOTAL_DURATION - remaining) / TOTAL_DURATION, 0, 1), "#f6b0ff", "seal");
        ctx.restore();
      }

      function drawMeter(x, y, width, height, ratio, color) {
        ctx.save();
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        roundRect(x, y, width, height, height / 2);
        ctx.fill();
        ctx.fillStyle = color;
        roundRect(x, y, width * clamp(ratio, 0, 1), height, height / 2);
        ctx.fill();
        ctx.restore();
      }

      function roundRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
      }

      function drawOverlay(title, accent, subtitleLines, footer) {
        ctx.save();
        ctx.fillStyle = "rgba(5, 6, 15, 0.68)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        const cardWidth = 540;
        const cardHeight = 320;
        const cardX = VIEW.width / 2 - cardWidth / 2;
        const cardY = VIEW.height / 2 - cardHeight / 2;
        const panel = ctx.createLinearGradient(cardX, cardY, cardX + cardWidth, cardY + cardHeight);
        panel.addColorStop(0, "rgba(21, 18, 40, 0.94)");
        panel.addColorStop(1, "rgba(9, 15, 28, 0.94)");
        ctx.fillStyle = panel;
        roundRect(cardX, cardY, cardWidth, cardHeight, 28);
        ctx.fill();

        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        ctx.shadowColor = accent;
        ctx.shadowBlur = 22;
        roundRect(cardX, cardY, cardWidth, cardHeight, 28);
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 16px Trebuchet MS";
        ctx.fillText(TITLE, cardX + 34, cardY + 42);
        ctx.font = "800 42px Trebuchet MS";
        ctx.fillStyle = accent;
        ctx.fillText(title, cardX + 34, cardY + 94);
        ctx.font = "700 15px Trebuchet MS";
        ctx.fillStyle = "#dbeafe";
        subtitleLines.forEach((line, index) => {
          ctx.fillText(line, cardX + 34, cardY + 134 + index * 26);
        });

        ctx.font = "700 14px Trebuchet MS";
        ctx.fillStyle = "#fef3c7";
        wrapText(ctx, footer, cardX + 34, cardY + 212, cardWidth - 68, 22);

        ctx.font = "700 13px Trebuchet MS";
        ctx.fillStyle = "#8bd6ff";
        ctx.fillText("터치 또는 Enter", cardX + 34, cardY + 278);
        ctx.fillStyle = "#f0abfc";
        ctx.fillText("F 전체화면", cardX + 180, cardY + 278);
        ctx.restore();
      }

      function wrapText(context, text, x, y, maxWidth, lineHeight) {
        const words = String(text).split(" ");
        let line = "";
        let cursorY = y;
        words.forEach((word) => {
          const candidate = line ? `${line} ${word}` : word;
          if (context.measureText(candidate).width > maxWidth && line) {
            context.fillText(line, x, cursorY);
            line = word;
            cursorY += lineHeight;
          } else {
            line = candidate;
          }
        });
        if (line) {
          context.fillText(line, x, cursorY);
        }
      }

      function drawMenu() {
        drawOverlay(
          "ECHO LOOM",
          "#86e8ff",
          [
            DESCRIPTION,
            CLEAR_TEXT,
            FAIL_TEXT,
          ],
          `${CONTROLS_TEXT}`
        );
      }

      function drawResult() {
        if (state.mode === "failed") {
          drawOverlay(
            "THREAD BROKEN",
            "#ff9bb9",
            [
              reasonToPopup(state.lastReason),
              CLEAR_TEXT,
              FAIL_TEXT,
            ],
            `재시작 후 중심 앵커를 먼저 스치고, 두 개의 잔상을 마지막까지 남기세요. ${CONTROLS_TEXT}`
          );
        } else if (state.mode === "cleared") {
          drawOverlay(
            "FOUNDRY SEALED",
            "#98ffdd",
            [
              "세 문양의 실을 끝까지 유지했습니다.",
              CLEAR_TEXT,
              `완주 시간 ${state.lastRunTime.toFixed(1)}초`,
            ],
            `${CONTROLS_TEXT}`
          );
        }
      }

      function drawInstructionHint() {
        if (state.mode !== "running") {
          return;
        }
        ctx.save();
        ctx.fillStyle = "rgba(7, 10, 20, 0.56)";
        roundRect(VIEW.width / 2 - 176, VIEW.height - 48, 352, 30, 15);
        ctx.fill();
        ctx.fillStyle = "#dbeafe";
        ctx.font = "700 12px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("중심을 스친 뒤 바깥 문양까지 드래그하고, 손을 떼어 3초 잔상을 남기세요.", VIEW.width / 2, VIEW.height - 28);
        ctx.restore();
      }

      function drawFlash() {
        if (state.flash <= 0) {
          return;
        }
        ctx.save();
        ctx.globalAlpha = state.flash * 0.22;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.save();
        const shakePower = state.shake;
        if (shakePower > 0.01) {
          ctx.translate(randomRange(-shakePower, shakePower), randomRange(-shakePower, shakePower));
        }

        drawBackground();
        drawSafeZone();
        drawCenterAnchor();
        const threads = getLiveThreads();
        threads.forEach((thread) => drawThread(thread));
        drawSigils();
        drawPlayer();
        drawParticles();
        drawHud();
        drawInstructionHint();
        ctx.restore();
        drawFlash();

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawResult();
        }
      }

      function frame(timestamp) {
        animationFrame = 0;
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        let delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        delta = Math.min(delta, MAX_DT);
        while (delta > 0) {
          const step = Math.min(FIXED_DT, delta);
          advanceState(step);
          delta -= step;
        }
        render();
        if (
          state.mode === "running" ||
          state.flash > 0.001 ||
          state.shake > 0.001 ||
          state.particles.length > 0 ||
          state.popups.length > 0
        ) {
          animationFrame = window.requestAnimationFrame(frame);
        } else {
          lastTimestamp = 0;
        }
      }

      function ensureAnimationLoop() {
        if (!animationFrame) {
          animationFrame = window.requestAnimationFrame(frame);
        }
      }

      function onPointerDown(event) {
        const point = getCanvasPoint(event);
        pointer.down = true;
        pointer.active = state.mode === "running";
        pointer.id = event.pointerId;
        pointer.x = point.x;
        pointer.y = point.y;
        stageRoot.focus();

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        beginRecord();
      }

      function onPointerMove(event) {
        if (pointer.id !== null && event.pointerId !== pointer.id) {
          return;
        }
        const point = getCanvasPoint(event);
        pointer.x = point.x;
        pointer.y = point.y;
        pointer.active = pointer.down && state.mode === "running";
      }

      function onPointerUp(event) {
        if (pointer.id !== null && event.pointerId !== pointer.id) {
          return;
        }
        pointer.down = false;
        pointer.active = false;
        pointer.id = null;
        finalizeRecord();
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen?.();
          return;
        }
        stageRoot.requestFullscreen?.().catch(() => {});
      }

      stageRoot.addEventListener("pointerdown", onPointerDown);
      stageRoot.addEventListener("pointermove", onPointerMove);
      stageRoot.addEventListener("pointerup", onPointerUp);
      stageRoot.addEventListener("pointercancel", onPointerUp);
      stageRoot.addEventListener("pointerleave", () => {
        if (!pointer.down) {
          pointer.active = false;
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
        }
        if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          toggleFullscreen();
        }
      });

      window.advanceTime = (ms) => {
        const total = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < total; index += 1) {
          advanceState(FIXED_DT);
        }
        render();
      };

      window.render_game_to_text = () =>
        JSON.stringify({
          mode: state.mode,
          note: "origin=(0,0) top-left, x right, y down",
          timeRemaining: Number(Math.max(0, TOTAL_DURATION - state.elapsed).toFixed(2)),
          safeRadius: Number(state.safeRadius.toFixed(1)),
          outsideTime: Number(state.outsideTime.toFixed(2)),
          sealArmed: state.sealArmed,
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            vx: Number(state.player.vx.toFixed(1)),
            vy: Number(state.player.vy.toFixed(1)),
          },
          recording: state.recorder.active,
          echoes: state.echoes.map((echo) => ({
            age: Number(echo.age.toFixed(2)),
            anchored: echo.anchored,
            head: pointOnThread(echo.points, echo.age / Math.max(0.001, echo.life)),
          })),
          sigils: state.sigils.map((sigil) => ({
            label: sigil.label,
            x: Number(sigil.x.toFixed(1)),
            y: Number(sigil.y.toFixed(1)),
            active: sigil.active,
          })),
          relayStatus: window.relayStageResult.status,
        });

      window.relayStageMeta = {
        id: STAGE_ID,
        title: TITLE,
        creator: CREATOR,
        genre: GENRE,
        clearCondition: CLEAR_TEXT,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.sealArmed = true;
          state.elapsed = TOTAL_DURATION;
          state.sigils.forEach((sigil) => {
            sigil.active = true;
          });
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("debug");
          render();
        },
      };

      updateSigils(0, []);
      if (automation.autostart) {
        startStage();
      }
      reportReadyToHost();
      render();
    </script>
  </body>
</html>
