<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>모래성 쌓기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #F4E3C1; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 160, 120, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(100, 80, 50, 0.92);
        color: #fff; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F4E3C1; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(100, 80, 50, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">모래성 쌓기. 화면 터치로 모래 블록을 정확한 위치에 떨어뜨려 모래성을 쌓으세요. 모래성 5층을 완성하면 클리어. 파도에 무너지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="모래성 쌓기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "sand-castle",
        title: "모래성 쌓기",
        description: "파도가 오기 전에 모래 블록을 쌓아 모래성을 완성하는 게임",
        creator: "jungcollin",
        genre: "Building defense",
        clearCondition: "모래성 5층을 완성하면 클리어",
        failCondition: "파도에 무너지면 실패",
        controls: "화면 터치로 모래 블록을 쌓고 스와이프로 보강",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const COL = {
        skyTop: "#87CEEB", skyBot: "#B0E0F0",
        sand: "#F4E3C1", sandDark: "#D4C3A1", sandWet: "#C4A882",
        ocean: "#5B9BD5", oceanDark: "#3A7AB5", foam: "#F0F8FF",
        block: "#E8D0A0", blockDark: "#C8B080", blockHighlight: "#FFF0D0",
        flag: "#E06040",
        text: "#6A5030", textLight: "rgba(106,80,48,0.6)",
        card: "rgba(255,252,245,0.95)", accent: "#5B9BD5", damage: "#A04030",
      };

      const TARGET_FLOORS = 5;
      const BLOCK_W = 70, BLOCK_H = 28;
      const BASE_Y = H - 80;
      const WAVE_INTERVAL_BASE = 7;

      let mode = "menu", elapsed = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;

      let floors = 0;
      let blocks = []; // placed blocks
      let currentBlock = null; // moving block
      let waveTimer = 0;
      let waveActive = false;
      let waveX = 0;
      let waveStrength = 0;
      let particles = [];
      let oceanOffset = 0;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function spawnBlock() {
        const y = BASE_Y - floors * BLOCK_H - BLOCK_H;
        currentBlock = {
          x: 80, y: y, w: BLOCK_W - floors * 6, h: BLOCK_H,
          vx: 120 + floors * 30, placed: false,
        };
      }

      function placeBlock() {
        if (!currentBlock || currentBlock.placed) return;
        currentBlock.placed = true;

        const targetX = CX;
        const tolerance = currentBlock.w * 0.6;
        const off = Math.abs(currentBlock.x - targetX);

        if (off < tolerance) {
          // Good placement
          currentBlock.x = clamp(currentBlock.x, targetX - tolerance, targetX + tolerance);
          blocks.push({ ...currentBlock, hp: 2 });
          floors++;
          spawnPlaceParticles(currentBlock.x, currentBlock.y);

          if (floors >= TARGET_FLOORS) {
            mode = "clear"; clearAnim = 0;
            window.relayStageResult.status = "cleared"; reportCleared();
            return;
          }
          setTimeout(() => { if (mode === "running") spawnBlock(); }, 300);
        } else {
          // Miss - block falls away
          spawnMissParticles(currentBlock.x, currentBlock.y);
          shake = 5;
          setTimeout(() => { if (mode === "running") spawnBlock(); }, 500);
        }
        currentBlock = null;
      }

      function spawnPlaceParticles(x, y) {
        for (let i = 0; i < (reducedMotion ? 3 : 8); i++) {
          const a = rand(-Math.PI, 0), sp = rand(20, 60);
          particles.push({ x: x + rand(-20, 20), y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, size: rand(2, 4), color: COL.sandDark });
        }
      }

      function spawnMissParticles(x, y) {
        for (let i = 0; i < (reducedMotion ? 3 : 8); i++) {
          const a = rand(0, Math.PI * 2), sp = rand(30, 80);
          particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, size: rand(2, 5), color: COL.sandWet });
        }
      }

      function reset() {
        elapsed = 0; floors = 0; shake = 0; clearAnim = 0;
        blocks = []; currentBlock = null; particles = [];
        waveTimer = WAVE_INTERVAL_BASE; waveActive = false; waveX = -100; waveStrength = 0;
        oceanOffset = 0;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        spawnBlock();
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        oceanOffset = Math.sin(elapsed * 1.5) * 3;

        // Move current block
        if (currentBlock && !currentBlock.placed) {
          currentBlock.x += currentBlock.vx * dt;
          if (currentBlock.x > W - 60 || currentBlock.x < 60) {
            currentBlock.vx *= -1;
            currentBlock.x = clamp(currentBlock.x, 60, W - 60);
          }
        }

        // Wave timer
        waveTimer -= dt;
        if (waveTimer <= 0 && !waveActive && floors > 0) {
          waveActive = true;
          waveX = -80;
          waveStrength = 0.5 + floors * 0.15;
        }

        // Wave movement
        if (waveActive) {
          waveX += 200 * dt;
          if (waveX > W + 80) {
            waveActive = false;
            waveTimer = WAVE_INTERVAL_BASE - floors * 0.5;
          }

          // Wave hits blocks
          for (let i = blocks.length - 1; i >= 0; i--) {
            const b = blocks[i];
            if (Math.abs(waveX - b.x) < 40 && !b.waveHit) {
              b.waveHit = true;
              b.hp -= waveStrength;
              if (b.hp <= 0) {
                spawnMissParticles(b.x, b.y);
                blocks.splice(i, 1);
                floors = blocks.length;
                shake = 8;
                if (floors === 0 && elapsed > 3) {
                  mode = "failed";
                  window.relayStageResult.status = "failed"; reportFailed("파도에 무너짐");
                  return;
                }
              }
            }
          }
        } else {
          // Reset wave hit flags
          for (const b of blocks) b.waveHit = false;
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 80 * dt;
          p.life -= dt * 2; if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Sky
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, COL.skyTop); grad.addColorStop(1, COL.skyBot);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

        // Sand beach
        ctx.fillStyle = COL.sand; ctx.fillRect(0, BASE_Y + 10, W, H - BASE_Y);
        // Wet sand line
        ctx.fillStyle = COL.sandWet;
        ctx.fillRect(0, H - 30 + oceanOffset, W, 30);

        // Ocean
        ctx.fillStyle = COL.ocean;
        ctx.fillRect(0, H - 20 + oceanOffset, W, 30);

        // Ocean foam
        for (let x = 0; x < W; x += 40) {
          const foamY = H - 22 + oceanOffset + Math.sin(x * 0.05 + elapsed * 2) * 3;
          ctx.beginPath(); ctx.ellipse(x, foamY, 20, 4, 0, 0, Math.PI * 2);
          ctx.fillStyle = COL.foam; ctx.fill();
        }

        // Wave
        if (waveActive) {
          ctx.save();
          ctx.globalAlpha = 0.7;
          ctx.fillStyle = COL.oceanDark;
          ctx.beginPath();
          ctx.ellipse(waveX, BASE_Y + 15, 50, 20 + waveStrength * 15, 0, 0, Math.PI * 2);
          ctx.fill();
          // Foam on wave
          ctx.fillStyle = COL.foam;
          ctx.beginPath();
          ctx.ellipse(waveX - 15, BASE_Y + 5, 30, 8, -0.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.restore();
        }

        // Guide line for stacking
        if (mode === "running") {
          ctx.setLineDash([4, 4]);
          ctx.strokeStyle = "rgba(106,80,48,0.2)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(CX, BASE_Y); ctx.lineTo(CX, BASE_Y - TARGET_FLOORS * BLOCK_H - 20);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // Placed blocks
        for (let i = 0; i < blocks.length; i++) {
          drawBlock(blocks[i], i);
        }

        // Current block
        if (currentBlock && !currentBlock.placed) {
          drawMovingBlock(currentBlock);
        }

        // Flag on top if cleared
        if (mode === "clear" && blocks.length > 0) {
          const top = blocks[blocks.length - 1];
          ctx.fillStyle = COL.flag;
          ctx.fillRect(top.x, top.y - 30, 2, 30);
          ctx.beginPath();
          ctx.moveTo(top.x + 2, top.y - 30);
          ctx.lineTo(top.x + 18, top.y - 24);
          ctx.lineTo(top.x + 2, top.y - 18);
          ctx.closePath(); ctx.fill();
        }

        // Particles
        for (const p of particles) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fill(); ctx.globalAlpha = 1;
        }

        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBlock(b, idx) {
        const w = b.w, h = b.h;
        // Shadow
        ctx.fillStyle = "rgba(106,80,48,0.1)";
        ctx.fillRect(b.x - w / 2 + 3, b.y + 3, w, h);
        // Block
        ctx.fillStyle = COL.block;
        ctx.fillRect(b.x - w / 2, b.y, w, h);
        // Top highlight
        ctx.fillStyle = COL.blockHighlight;
        ctx.fillRect(b.x - w / 2, b.y, w, 4);
        // Border
        ctx.strokeStyle = COL.blockDark; ctx.lineWidth = 1;
        ctx.strokeRect(b.x - w / 2, b.y, w, h);
        // Crenellation on top block
        if (idx === blocks.length - 1) {
          const cw = 8, gap = 6;
          for (let cx = b.x - w / 2 + 4; cx < b.x + w / 2 - 4; cx += cw + gap) {
            ctx.fillStyle = COL.blockDark;
            ctx.fillRect(cx, b.y - 6, cw, 6);
          }
        }
      }

      function drawMovingBlock(b) {
        const w = b.w, h = b.h;
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = COL.block;
        ctx.fillRect(b.x - w / 2, b.y, w, h);
        ctx.strokeStyle = COL.blockDark; ctx.lineWidth = 1.5;
        ctx.strokeRect(b.x - w / 2, b.y, w, h);
        ctx.globalAlpha = 1;

        // Drop indicator
        ctx.setLineDash([3, 3]);
        ctx.strokeStyle = "rgba(106,80,48,0.3)";
        ctx.beginPath(); ctx.moveTo(b.x, b.y + h); ctx.lineTo(b.x, BASE_Y);
        ctx.stroke(); ctx.setLineDash([]);
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = "bold 16px Trebuchet MS,sans-serif";
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`\uD83C\uDFF0 ${floors} / ${TARGET_FLOORS}`, 20, 16);

        if (!waveActive) {
          const nextWave = Math.max(0, waveTimer);
          ctx.textAlign = "right"; ctx.font = "14px Trebuchet MS,sans-serif"; ctx.fillStyle = COL.textLight;
          ctx.fillText(`\uD83C\uDF0A ${Math.ceil(nextWave)}s`, W - 20, 16);
        } else {
          ctx.textAlign = "right"; ctx.font = "bold 14px Trebuchet MS,sans-serif"; ctx.fillStyle = COL.damage;
          ctx.fillText("\uD83C\uDF0A 파도!", W - 20, 16);
        }
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
      }
      function drawCard(title, lines, accent) {
        const cW = Math.min(340, W - 40), lH = 24, cH = 44 + lines.length * lH + 36;
        const cX = CX - cW / 2, cY = CY - cH / 2;
        ctx.fillStyle = COL.card; roundRect(ctx, cX, cY, cW, cH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cX + 16, cY, cW - 32, 3);
        ctx.fillStyle = COL.text; ctx.font = "bold 22px Trebuchet MS,sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cY + 16);
        ctx.font = "14px Trebuchet MS,sans-serif"; ctx.fillStyle = "rgba(106,80,48,0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cY + 48 + i * lH);
        ctx.fillStyle = "rgba(106,80,48,0.35)"; ctx.font = "13px Trebuchet MS,sans-serif";
        ctx.fillText("TAP or ENTER", CX, cY + cH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(255,252,245,0.4)"; ctx.fillRect(0, 0, W, H);
        drawCard("모래성 쌓기", ["파도가 오기 전에 모래 블록을", "쌓아 모래성을 완성하세요!", "", "조작: 화면 터치로 블록을 떨어뜨리기", "클리어: 모래성 5층 완성", "실패: 파도에 무너지면"], COL.accent);
      }
      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(255,252,245,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 완성`, `\uD83C\uDFF0 ${floors}층 모래성 완성!`], COL.accent);
      }
      function drawFailed() {
        ctx.fillStyle = "rgba(40,30,20,0.25)"; ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["파도에 모래성이 무너졌습니다", `\uD83C\uDFF0 ${floors} / ${TARGET_FLOORS}`], COL.damage);
      }

      function handleStart() { if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; } }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        placeBlock();
      });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (mode !== "running") handleStart(); else placeBlock(); }
      });

      function gameLoop(ts) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = ts; return; }
        let dt = Math.min((ts - lastTimestamp) / 1000, MAX_DT); lastTimestamp = ts;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), floors, waveActive, result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const s = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < s; i++) update(FIXED_DT); draw(); return renderGameToText(); };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; for (let i = 0; i < TARGET_FLOORS; i++) { blocks.push({ x: CX, y: BASE_Y - i * BLOCK_H - BLOCK_H, w: BLOCK_W - i * 6, h: BLOCK_H, hp: 2 }); } floors = TARGET_FLOORS; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; floors = 0; blocks = []; mode = "failed"; shake = 8; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
