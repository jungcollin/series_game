<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Reversal Escape</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">Time Reversal Escape. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 좌우 이동, 점프 (터치/키보드 방향키), 시간 되감기 (버튼/Shift) 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <div class="mobile-controls">
      <div class="mobile-controls__row">
        <button type="button" class="mobile-btn" id="btn-left" aria-label="왼쪽 이동">←</button>
        <button type="button" class="mobile-btn" id="btn-right" aria-label="오른쪽 이동">→</button>
        <button type="button" class="mobile-btn" id="btn-jump" aria-label="점프">↑</button>
        <button type="button" class="mobile-btn" id="btn-rewind" aria-label="시간 되감기">⏪</button>
      </div>
    </div>
    <canvas id="game" width="960" height="540" aria-label="Time Reversal Escape" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("time-reversal-escape") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "시간을 되돌리는 능력을 이용해 15초 안에 탈출하세요. 모바일 터치 가능.",
      };

      const gameState = {
        player: {
          x: 100,
          y: 400,
          vx: 0,
          vy: 0,
          width: 32,
          height: 32,
          color: "#38bdf8",
          onGround: false,
          history: [] // stores past states for rewind
        },
        input: {
          left: false,
          right: false,
          jump: false,
          rewind: false
        },
        platforms: [
          { x: 0, y: 500, w: 960, h: 40, color: "#1e293b" },
          { x: 200, y: 400, w: 150, h: 20, color: "#334155" },
          { x: 450, y: 300, w: 150, h: 20, color: "#334155" },
          { x: 700, y: 200, w: 150, h: 20, color: "#334155" }
        ],
        spikes: [
          { x: 350, y: 480, w: 100, h: 20, color: "#ef4444", vx: 150, minX: 250, maxX: 600 },
          { x: 600, y: 280, w: 40, h: 20, color: "#ef4444", vx: 0 }
        ],
        goal: { x: 800, y: 140, w: 60, h: 60, color: "#10b981" },
        particles: [],
        shake: 0,
        maxTime: 15
      };

      function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          gameState.particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 400,
            vy: (Math.random() - 0.5) * 400,
            life: 1.0,
            color: color
          });
        }
      }

      function resetGame() {
        gameState.player = {
          x: 100, y: 400, vx: 0, vy: 0, width: 32, height: 32, color: "#38bdf8", onGround: false, history: []
        };
        gameState.particles = [];
        gameState.shake = 0;
        // reset spike positions
        gameState.spikes[0].x = 350;
      }

      function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.w &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.h &&
               rect1.y + rect1.height > rect2.y;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        resetGame();
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function update(dt) {
        if (state.mode !== "running") return;

        if (gameState.input.rewind && gameState.player.history.length > 0) {
          // Rewind time
          const prev = gameState.player.history.pop();
          gameState.player.x = prev.x;
          gameState.player.y = prev.y;
          gameState.player.vx = prev.vx;
          gameState.player.vy = prev.vy;
          state.elapsed -= dt;
          if (state.elapsed < 0) state.elapsed = 0;

          gameState.spikes.forEach((spike, idx) => {
             if (spike.vx !== 0 && prev.spikes && prev.spikes[idx]) {
                spike.x = prev.spikes[idx].x;
             }
          });

          // Add rewind particles
          if (Math.random() < 0.3) {
             gameState.particles.push({
                x: gameState.player.x + Math.random() * gameState.player.width,
                y: gameState.player.y + Math.random() * gameState.player.height,
                vx: 0, vy: -50, life: 0.5, color: "#a855f7"
             });
          }
        } else {
          // Normal time
          state.elapsed += dt;

          if (state.elapsed >= gameState.maxTime) {
             failStage("시간 초과");
             return;
          }

          // Save history (max ~180 frames = 3 seconds)
          gameState.player.history.push({
             x: gameState.player.x,
             y: gameState.player.y,
             vx: gameState.player.vx,
             vy: gameState.player.vy,
             spikes: gameState.spikes.map(s => ({x: s.x}))
          });
          if (gameState.player.history.length > 180) {
             gameState.player.history.shift();
          }

          // Physics
          gameState.player.vy += 1200 * dt; // gravity

          if (gameState.input.left) {
             gameState.player.vx -= 2000 * dt;
          } else if (gameState.input.right) {
             gameState.player.vx += 2000 * dt;
          } else {
             gameState.player.vx *= Math.pow(0.001, dt); // friction
          }

          // Clamp velocity
          gameState.player.vx = Math.max(-400, Math.min(400, gameState.player.vx));
          if (Math.abs(gameState.player.vx) < 10) gameState.player.vx = 0;

          // X movement
          gameState.player.x += gameState.player.vx * dt;

          // Platform collision X
          gameState.platforms.forEach(plat => {
             if (checkCollision(gameState.player, plat)) {
                if (gameState.player.vx > 0) {
                   gameState.player.x = plat.x - gameState.player.width;
                } else if (gameState.player.vx < 0) {
                   gameState.player.x = plat.x + plat.w;
                }
                gameState.player.vx = 0;
             }
          });

          // Y movement
          gameState.player.y += gameState.player.vy * dt;
          gameState.player.onGround = false;

          // Platform collision Y
          gameState.platforms.forEach(plat => {
             if (checkCollision(gameState.player, plat)) {
                if (gameState.player.vy > 0) {
                   if (!gameState.player.onGround && gameState.player.vy > 200) {
                      spawnParticles(gameState.player.x + gameState.player.width/2, gameState.player.y + gameState.player.height, "#e2e8f0", 5);
                   }
                   gameState.player.y = plat.y - gameState.player.height;
                   gameState.player.onGround = true;
                } else if (gameState.player.vy < 0) {
                   gameState.player.y = plat.y + plat.h;
                }
                gameState.player.vy = 0;
             }
          });

          // Jump
          if (gameState.input.jump && gameState.player.onGround) {
             gameState.player.vy = -600;
             gameState.player.onGround = false;
             spawnParticles(gameState.player.x + gameState.player.width/2, gameState.player.y + gameState.player.height, "#38bdf8", 10);
          }

          // Spike movement
          gameState.spikes.forEach(spike => {
             if (spike.vx !== 0) {
                spike.x += spike.vx * dt;
                if (spike.x < spike.minX) {
                   spike.x = spike.minX;
                   spike.vx *= -1;
                } else if (spike.x > spike.maxX) {
                   spike.x = spike.maxX;
                   spike.vx *= -1;
                }
             }

             // Spike collision
             if (checkCollision(gameState.player, spike)) {
                gameState.shake = 10;
                spawnParticles(gameState.player.x + gameState.player.width/2, gameState.player.y + gameState.player.height/2, "#ef4444", 30);
                failStage("가시에 닿았습니다");
             }
          });

          // Bounds collision
          if (gameState.player.y > 600 || gameState.player.x < -50 || gameState.player.x > 1000) {
             failStage("화면 밖으로 떨어졌습니다");
          }

          // Goal collision
          if (checkCollision(gameState.player, gameState.goal)) {
             spawnParticles(gameState.goal.x + gameState.goal.w/2, gameState.goal.y + gameState.goal.h/2, "#10b981", 50);
             clearStage();
          }
        }

        // Update particles
        gameState.particles.forEach(p => {
           p.x += p.vx * dt;
           p.y += p.vy * dt;
           p.life -= dt * 2;
        });
        gameState.particles = gameState.particles.filter(p => p.life > 0);

        // Shake
        if (gameState.shake > 0) {
           gameState.shake -= dt * 30;
           if (gameState.shake < 0) gameState.shake = 0;
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function render() {
        if (state.mode === "menu") {
          renderCard("Time Reversal Escape", [
            "시간을 되돌리는 능력을 이용해 15초 안에 탈출하세요. 모바일 터치 가능.",
            "조작: 좌우 이동, 점프 (터치/키보드 방향키), 시간 되감기 (버튼/Shift)",
            "클리어 조건: 시간을 되돌려 함정을 피하고 출구에 도달하기",
            "실패 조건: 가시에 닿거나 화면 밖으로 떨어지기",
            "터치 또는 Enter로 시작. 모바일 화면 조작도 함께 구현하세요.",
            "390px 모바일에서도 메뉴가 가로로 깨지지 않게 유지하세요.",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          ctx.fillStyle = "#0f172a";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          ctx.save();
          if (gameState.shake > 0) {
            ctx.translate((Math.random()-0.5)*gameState.shake, (Math.random()-0.5)*gameState.shake);
          }

          // Goal
          ctx.fillStyle = gameState.goal.color;
          ctx.shadowBlur = 20;
          ctx.shadowColor = gameState.goal.color;
          ctx.fillRect(gameState.goal.x, gameState.goal.y, gameState.goal.w, gameState.goal.h);
          ctx.shadowBlur = 0;

          // Platforms
          gameState.platforms.forEach(p => {
            const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
            grad.addColorStop(0, "#475569");
            grad.addColorStop(1, "#1e293b");
            ctx.fillStyle = grad;
            ctx.fillRect(p.x, p.y, p.w, p.h);
          });

          // Spikes
          gameState.spikes.forEach(s => {
            ctx.fillStyle = s.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = s.color;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y + s.h);
            ctx.lineTo(s.x + s.w/2, s.y);
            ctx.lineTo(s.x + s.w, s.y + s.h);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
          });

          // Rewind trails
          if (gameState.input.rewind && gameState.player.history.length > 0) {
             ctx.fillStyle = "rgba(168, 85, 247, 0.2)";
             for (let i = 0; i < gameState.player.history.length; i += 5) {
                const h = gameState.player.history[i];
                ctx.fillRect(h.x, h.y, gameState.player.width, gameState.player.height);
             }
          }

          // Player
          const playerColor = gameState.input.rewind ? "#a855f7" : gameState.player.color;
          ctx.fillStyle = playerColor;
          ctx.shadowBlur = 15;
          ctx.shadowColor = playerColor;
          ctx.fillRect(gameState.player.x, gameState.player.y, gameState.player.width, gameState.player.height);
          ctx.shadowBlur = 0;

          // Particles
          gameState.particles.forEach(p => {
             ctx.globalAlpha = p.life;
             ctx.fillStyle = p.color;
             ctx.fillRect(p.x, p.y, 4, 4);
             ctx.globalAlpha = 1.0;
          });

          ctx.restore();

          // UI
          ctx.fillStyle = "#f8fafc";
          ctx.font = "bold 24px Trebuchet MS";
          const timeLeft = Math.max(0, gameState.maxTime - state.elapsed).toFixed(1);
          ctx.fillText(`Time: ${timeLeft}s`, 20, 40);

          if (gameState.input.rewind) {
             ctx.fillStyle = "#a855f7";
             ctx.font = "bold 36px Trebuchet MS";
             ctx.textAlign = "center";
             ctx.fillText("⏪ REWINDING...", VIEW.width/2, 80);
             ctx.textAlign = "left";
          }
          return;
        }

        if (state.mode === "failed") {
          renderCard("실패", [
            "가시에 닿거나 화면 밖으로 떨어지기",
            "공유 목숨 1개가 즉시 종료되었습니다.",
            "최종 스테이지에서는 실제 실패 원인을 보여주세요.",
          ], "#b91c1c");
          return;
        }

        renderCard("클리어", [
          "시간을 되돌려 함정을 피하고 출구에 도달하기",
          "호스트가 다음 미플레이 스테이지를 랜덤으로 선택합니다.",
          "최종 스테이지에서는 실제 클리어 연출로 교체하세요.",
        ], "#15803d");
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (state.mode === "running") {
           if (event.key === "ArrowLeft") gameState.input.left = true;
           if (event.key === "ArrowRight") gameState.input.right = true;
           if (event.key === "ArrowUp" || event.key === " ") gameState.input.jump = true;
           if (event.key === "Shift") gameState.input.rewind = true;
        } else if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft") gameState.input.left = false;
        if (event.key === "ArrowRight") gameState.input.right = false;
        if (event.key === "ArrowUp" || event.key === " ") gameState.input.jump = false;
        if (event.key === "Shift") gameState.input.rewind = false;
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "time-reversal-escape",
        title: "Time Reversal Escape",
        creator: "Jules",
        genre: "Puzzle Action",
        clearCondition: "시간을 되돌려 함정을 피하고 출구에 도달하기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      bindHoldButton(document.getElementById("btn-left"), () => gameState.input.left = true, () => gameState.input.left = false);
      bindHoldButton(document.getElementById("btn-right"), () => gameState.input.right = true, () => gameState.input.right = false);
      bindHoldButton(document.getElementById("btn-jump"), () => gameState.input.jump = true, () => gameState.input.jump = false);
      bindHoldButton(document.getElementById("btn-rewind"), () => gameState.input.rewind = true, () => gameState.input.rewind = false);

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
