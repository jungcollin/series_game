<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Observatory: Tide Anchor</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(81, 214, 255, 0.18), transparent 38%),
          linear-gradient(180deg, #030712 0%, #071626 52%, #04060d 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(110, 231, 255, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at top, rgba(81, 214, 255, 0.14), transparent 28%),
          linear-gradient(180deg, #020617 0%, #071225 52%, #02050b 100%);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(224, 242, 254, 0.94);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Neon Observatory: Tide Anchor. 캔버스를 터치하거나 Enter로 시작하세요. 기본
      조작은 포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 박자
      링이 맞을 때 핵심 입력 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이
      가능하게 구현 입니다. 시작 후에는 화물을 탭해 닻을 박고, 코어 링을 탭하거나
      Space를 눌러 박자에 맞춰 펄스를 발동하세요. 메뉴, 실행 중 HUD, 실패와 클리어
      화면은 390픽셀 모바일에서도 가로로 넘치지 않게 유지됩니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Neon Observatory: Tide Anchor"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "neon-observatory-tide-anchoring-tempo";
      const STAGE_TITLE = "Neon Observatory: Tide Anchor";
      const STAGE_DESCRIPTION =
        "예고된 시간 조류에 닻을 꽂고 박자 윈도우에 맞춰 급류를 봉인하는 예측형 생존 스테이지.";
      const STAGE_CREATOR = "jungcollin";
      const STAGE_GENRE = "Prediction survival / 템포 윈도우";
      const STAGE_CONTROLS =
        "포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 박자 링이 맞을 때 핵심 입력 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const STAGE_CLEAR_CONDITION =
        "템포 창을 놓치지 않고 조류 6파를 넘기며 발전기를 지키면 클리어";
      const STAGE_FAIL_CONDITION =
        "핵심 입력을 연속으로 박자 밖에 쓰거나 중요 화물이 유실되면 즉시 실패";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const CORE = { x: VIEW.width * 0.5, y: VIEW.height * 0.53 };
      const CORE_RADIUS = 42;
      const PULSE_GATE_RADIUS = 110;
      const POINTER_TAP_DISTANCE = 16;
      const SWIPE_RECALL_DISTANCE = 44;
      const ANCHOR_RANGE = 78;
      const ORBIT_RADIUS_X = 260;
      const ORBIT_RADIUS_Y = 136;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const WAVE_BLUEPRINTS = [
        {
          targetId: "aurora",
          laneAngle: -2.7,
          forecastDuration: 3.2,
          surgeDuration: 0.95,
          windowTolerance: 22,
          curveLift: -112,
          label: "Aster Slip",
        },
        {
          targetId: "meridian",
          laneAngle: -0.2,
          forecastDuration: 3.0,
          surgeDuration: 0.9,
          windowTolerance: 18,
          curveLift: -66,
          label: "Prism Shear",
        },
        {
          targetId: "umbra",
          laneAngle: 0.72,
          forecastDuration: 2.8,
          surgeDuration: 0.84,
          windowTolerance: 16,
          curveLift: 86,
          label: "Lumen Undertow",
        },
        {
          targetId: "aurora",
          laneAngle: 2.52,
          forecastDuration: 2.6,
          surgeDuration: 0.78,
          windowTolerance: 14,
          curveLift: 124,
          label: "Archive Wake",
        },
        {
          targetId: "umbra",
          laneAngle: -0.96,
          forecastDuration: 2.45,
          surgeDuration: 0.72,
          windowTolerance: 12,
          curveLift: -142,
          label: "Rift Cascade",
        },
        {
          targetId: "meridian",
          laneAngle: 1.18,
          forecastDuration: 2.28,
          surgeDuration: 0.66,
          windowTolerance: 10,
          curveLift: 158,
          label: "Final Torrent",
        },
      ];

      const pointerState = {
        active: false,
        down: false,
        startX: CORE.x,
        startY: CORE.y,
        x: CORE.x,
        y: CORE.y,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        waveIndex: 0,
        wavePhase: "forecast",
        waveTime: 0,
        phaseGap: 0,
        offbeatStreak: 0,
        flash: 0,
        shake: 0,
        observatorySpin: 0,
        auroraShift: 0,
        reticlePulse: 0,
        anchor: createAnchorState(),
        wave: cloneWave(0),
        cargos: createCargos(),
        starfield: createStarfield(),
        particles: [],
        ripples: [],
        popups: [],
        lastReason: "",
      };

      function createAnchorState() {
        return {
          targetId: null,
          glow: 0,
          locked: false,
          trail: 0,
          recallFlash: 0,
        };
      }

      function createCargos() {
        return [
          {
            id: "aurora",
            label: "A1",
            name: "오로라 화물",
            tint: "#59e7ff",
            baseAngle: -2.36,
            pulse: 0,
            stress: 0,
            lost: false,
          },
          {
            id: "meridian",
            label: "M2",
            name: "메리디안 화물",
            tint: "#b3ff6e",
            baseAngle: -0.05,
            pulse: 0,
            stress: 0,
            lost: false,
          },
          {
            id: "umbra",
            label: "U3",
            name: "엄브라 화물",
            tint: "#ff7ff7",
            baseAngle: 1.98,
            pulse: 0,
            stress: 0,
            lost: false,
          },
        ];
      }

      function createStarfield() {
        return Array.from({ length: 78 }, (_, index) => ({
          x: (index * 67) % VIEW.width,
          y: (index * 97) % VIEW.height,
          size: 0.8 + (index % 4) * 0.45,
          speed: 6 + (index % 7) * 2,
          alpha: 0.12 + (index % 5) * 0.07,
        }));
      }

      function cloneWave(index) {
        const blueprint = WAVE_BLUEPRINTS[index];
        return {
          ...blueprint,
          sequence: index + 1,
          locked: false,
          deflected: false,
          forecastBurst: false,
        };
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, t) {
        return start + (end - start) * t;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function easeInOutSine(t) {
        return -(Math.cos(Math.PI * t) - 1) / 2;
      }

      function formatSeconds(value) {
        return `${value.toFixed(1)}s`;
      }

      function distance(aX, aY, bX, bY) {
        return Math.hypot(aX - bX, aY - bY);
      }

      function getCargoPosition(cargo) {
        const angle =
          cargo.baseAngle +
          state.observatorySpin * 0.42 +
          Math.sin(state.elapsed * 1.4 + cargo.baseAngle) * 0.08;
        return {
          x: CORE.x + Math.cos(angle) * ORBIT_RADIUS_X,
          y: CORE.y + Math.sin(angle) * ORBIT_RADIUS_Y,
        };
      }

      function getCargo(id) {
        return state.cargos.find((cargo) => cargo.id === id) || null;
      }

      function getTargetCargo() {
        return getCargo(state.wave.targetId);
      }

      function getSelectedCargo() {
        return getNearestCargo(pointerState.x, pointerState.y, ANCHOR_RANGE);
      }

      function getNearestCargo(x, y, radius = ANCHOR_RANGE) {
        let best = null;
        let bestDistance = radius;
        for (const cargo of state.cargos) {
          if (cargo.lost) {
            continue;
          }
          const position = getCargoPosition(cargo);
          const currentDistance = distance(x, y, position.x, position.y);
          if (currentDistance <= bestDistance) {
            best = cargo;
            bestDistance = currentDistance;
          }
        }
        return best;
      }

      function getWaveTargetPosition() {
        const cargo = getTargetCargo();
        return cargo ? getCargoPosition(cargo) : { x: CORE.x, y: CORE.y };
      }

      function getWavePath() {
        const end = getWaveTargetPosition();
        const angle = state.wave.laneAngle;
        const start = {
          x: end.x + Math.cos(angle) * 520,
          y: end.y + Math.sin(angle) * 520,
        };
        const midpoint = {
          x: lerp(start.x, end.x, 0.5),
          y: lerp(start.y, end.y, 0.5),
        };
        const normalAngle = angle + Math.PI / 2;
        const control = {
          x: midpoint.x + Math.cos(normalAngle) * state.wave.curveLift,
          y: midpoint.y + Math.sin(normalAngle) * state.wave.curveLift,
        };
        return { start, control, end };
      }

      function quadraticPoint(path, t) {
        const inv = 1 - t;
        return {
          x: inv * inv * path.start.x + 2 * inv * t * path.control.x + t * t * path.end.x,
          y: inv * inv * path.start.y + 2 * inv * t * path.control.y + t * t * path.end.y,
        };
      }

      function addPopup(text, color, x = CORE.x, y = CORE.y) {
        state.popups.push({
          text,
          color,
          x,
          y,
          life: 0.9,
          maxLife: 0.9,
        });
      }

      function addRipple(x, y, color, maxRadius = 120) {
        state.ripples.push({
          x,
          y,
          color,
          radius: 18,
          maxRadius,
          life: 0.65,
          maxLife: 0.65,
        });
      }

      function spawnBurst(x, y, color, count, speedMin, speedMax) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.2;
          const speed = lerp(speedMin, speedMax, Math.random());
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 4,
            life: 0.55 + Math.random() * 0.35,
            maxLife: 0.9,
            color,
          });
        }
      }

      function beginWave(index) {
        state.waveIndex = index;
        state.wave = cloneWave(index);
        state.wavePhase = "forecast";
        state.waveTime = 0;
        state.phaseGap = 0;
        state.anchor.locked = false;
        state.anchor.glow = 0.8;
        const target = getTargetCargo();
        if (target) {
          const targetPosition = getCargoPosition(target);
          addPopup(
            `파 ${index + 1}: ${target.name}`,
            target.tint,
            targetPosition.x,
            targetPosition.y - 38
          );
          addRipple(targetPosition.x, targetPosition.y, target.tint, 94);
        }
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.waveIndex = 0;
        state.wavePhase = "forecast";
        state.waveTime = 0;
        state.phaseGap = 0;
        state.offbeatStreak = 0;
        state.flash = 0;
        state.shake = 0;
        state.observatorySpin = 0;
        state.auroraShift = 0;
        state.reticlePulse = 0;
        state.anchor = createAnchorState();
        state.cargos = createCargos();
        state.particles = [];
        state.ripples = [];
        state.popups = [];
        state.lastReason = "";
        beginWave(0);
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 1.1;
        state.shake = 10;
        spawnBurst(CORE.x, CORE.y, "#7cf7ff", 28, 60, 240);
        addRipple(CORE.x, CORE.y, "#9afcff", 220);
        addPopup("OBSERVATORY STABLE", "#9afcff", CORE.x, CORE.y - 86);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function failStage(reason = "failed") {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 0.85;
        state.shake = 14;
        const target = getTargetCargo();
        const focus = target ? getCargoPosition(target) : { x: CORE.x, y: CORE.y };
        spawnBurst(focus.x, focus.y, "#ff7d9f", 30, 90, 290);
        addRipple(focus.x, focus.y, "#ff5c7a", 180);
        addPopup("ANCHOR LOST", "#ff8aa3", focus.x, focus.y - 42);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function fireAnchor(cargo) {
        if (!cargo || state.mode !== "running") {
          return;
        }
        state.anchor.targetId = cargo.id;
        state.anchor.locked = false;
        state.anchor.glow = 1;
        state.anchor.trail = 1;
        const position = getCargoPosition(cargo);
        cargo.pulse = 1;
        addPopup("ANCHOR SET", cargo.tint, position.x, position.y - 34);
        spawnBurst(position.x, position.y, cargo.tint, 10, 25, 120);
      }

      function recallAnchor() {
        if (!state.anchor.targetId || state.anchor.locked) {
          return;
        }
        const cargo = getCargo(state.anchor.targetId);
        const position = cargo ? getCargoPosition(cargo) : { x: CORE.x, y: CORE.y };
        addPopup("ANCHOR RETRIEVED", "#c8f7ff", position.x, position.y - 28);
        addRipple(position.x, position.y, "#7ef7ff", 78);
        state.anchor.targetId = null;
        state.anchor.glow = 0.4;
        state.anchor.recallFlash = 1;
      }

      function getBeatRadius() {
        const progress = clamp(state.waveTime / state.wave.forecastDuration, 0, 1);
        return lerp(228, 54, easeInOutSine(progress));
      }

      function isPulseInWindow() {
        return Math.abs(getBeatRadius() - PULSE_GATE_RADIUS) <= state.wave.windowTolerance;
      }

      function deflectWave() {
        const cargo = getTargetCargo();
        const position = cargo ? getCargoPosition(cargo) : { x: CORE.x, y: CORE.y };
        state.wave.locked = true;
        state.anchor.locked = true;
        state.offbeatStreak = 0;
        state.shake = Math.max(state.shake, 6);
        state.flash = Math.max(state.flash, 0.22);
        addPopup("LOCKED IN TEMPO", "#84f0ff", CORE.x, CORE.y - 102);
        addRipple(CORE.x, CORE.y, "#84f0ff", 158);
        spawnBurst(position.x, position.y, cargo ? cargo.tint : "#84f0ff", 16, 50, 170);
      }

      function attemptPulse() {
        if (state.mode !== "running") {
          return;
        }
        if (state.wavePhase !== "forecast") {
          state.offbeatStreak += 1;
          addPopup(`OFF-BEAT ${state.offbeatStreak}/2`, "#ff8aa3", CORE.x, CORE.y - 82);
          state.shake = Math.max(state.shake, 8);
          if (state.offbeatStreak >= 2) {
            failStage("offbeat_streak");
          }
          return;
        }

        if (isPulseInWindow()) {
          if (state.anchor.targetId === state.wave.targetId) {
            deflectWave();
            return;
          }
          const target = getTargetCargo();
          addPopup(
            state.anchor.targetId ? "WRONG CARGO" : "NO ANCHOR",
            "#ffd978",
            CORE.x,
            CORE.y - 82
          );
          state.shake = Math.max(state.shake, 5);
          if (target) {
            const position = getCargoPosition(target);
            target.stress = 1;
            addRipple(position.x, position.y, "#ffd978", 74);
          }
          return;
        }

        state.offbeatStreak += 1;
        state.flash = Math.max(state.flash, 0.14);
        state.shake = Math.max(state.shake, 7);
        addPopup(`OFF-BEAT ${state.offbeatStreak}/2`, "#ff8aa3", CORE.x, CORE.y - 82);
        if (state.offbeatStreak >= 2) {
          failStage("offbeat_streak");
        }
      }

      function onWaveResolved() {
        const currentWave = state.wave;
        if (currentWave.locked && state.anchor.targetId === currentWave.targetId) {
          const target = getTargetCargo();
          const position = target ? getCargoPosition(target) : { x: CORE.x, y: CORE.y };
          currentWave.deflected = true;
          spawnBurst(position.x, position.y, target ? target.tint : "#84f0ff", 18, 60, 180);
          addPopup(`${currentWave.label} 봉인`, "#abfffe", position.x, position.y - 34);
          addRipple(position.x, position.y, "#7ef9ff", 112);
          state.anchor.targetId = null;
          state.anchor.locked = false;
          state.wavePhase = "resolve";
          state.waveTime = 0;
          state.phaseGap = 0.8;
          if (state.waveIndex >= WAVE_BLUEPRINTS.length - 1) {
            clearStage();
          }
          return;
        }

        const target = getTargetCargo();
        if (target) {
          target.lost = true;
          target.stress = 1;
        }
        failStage("cargo_lost");
      }

      function updateCargos(dt) {
        for (const cargo of state.cargos) {
          cargo.pulse = Math.max(0, cargo.pulse - dt * 1.5);
          cargo.stress = Math.max(0, cargo.stress - dt * 1.25);
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          if (particle.life <= 0) {
            return false;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          return true;
        });
        state.ripples = state.ripples.filter((ripple) => {
          ripple.life -= dt;
          if (ripple.life <= 0) {
            return false;
          }
          const progress = 1 - ripple.life / ripple.maxLife;
          ripple.radius = lerp(18, ripple.maxRadius, easeOutCubic(progress));
          return true;
        });
        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= dt * 24;
          if (popup.life <= 0) {
            return false;
          }
          return true;
        });
      }

      function updateForecast(dt) {
        state.waveTime += dt;
        const target = getTargetCargo();
        if (target) {
          target.stress = Math.max(target.stress, 0.2 + Math.sin(state.waveTime * 3.2) * 0.08);
        }
        if (
          !state.wave.forecastBurst &&
          state.waveTime >= state.wave.forecastDuration * 0.42
        ) {
          const position = getWaveTargetPosition();
          spawnBurst(position.x, position.y, "#8af8ff", 8, 20, 80);
          state.wave.forecastBurst = true;
        }
        if (state.waveTime >= state.wave.forecastDuration) {
          state.wavePhase = "surge";
          state.waveTime = 0;
          addPopup("TIDE INCOMING", "#d3feff", CORE.x, 92);
          state.shake = Math.max(state.shake, 4);
        }
      }

      function updateSurge(dt) {
        state.waveTime += dt;
        const target = getTargetCargo();
        if (target) {
          target.stress = Math.max(target.stress, 0.4);
        }
        if (state.waveTime >= state.wave.surgeDuration) {
          onWaveResolved();
        }
      }

      function updateResolve(dt) {
        if (state.mode !== "running") {
          return;
        }
        state.waveTime += dt;
        state.phaseGap -= dt;
        if (state.phaseGap <= 0) {
          beginWave(state.waveIndex + 1);
        }
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.observatorySpin += dt * 0.24;
        state.auroraShift += dt * 18;
        state.flash = Math.max(0, state.flash - dt * 1.8);
        state.shake = Math.max(0, state.shake - dt * 18);
        state.reticlePulse += dt * 4;
        state.anchor.glow = Math.max(0.18, state.anchor.glow - dt * 0.9);
        state.anchor.trail = Math.max(0, state.anchor.trail - dt * 2.2);
        state.anchor.recallFlash = Math.max(0, state.anchor.recallFlash - dt * 2.4);
        updateCargos(dt);
        updateParticles(dt);
        if (state.mode !== "running") {
          return;
        }
        if (state.wavePhase === "forecast") {
          updateForecast(dt);
        } else if (state.wavePhase === "surge") {
          updateSurge(dt);
        } else {
          updateResolve(dt);
        }
      }

      function updateAmbient(dt) {
        state.observatorySpin += dt * 0.04;
        state.auroraShift += dt * 8;
        state.flash = Math.max(0, state.flash - dt * 1.2);
        state.shake = Math.max(0, state.shake - dt * 18);
        state.reticlePulse += dt * 2.4;
        state.anchor.recallFlash = Math.max(0, state.anchor.recallFlash - dt * 2.2);
        updateParticles(dt);
      }

      function update(dt) {
        for (const star of state.starfield) {
          star.y += star.speed * dt;
          if (star.y > VIEW.height + 4) {
            star.y = -4;
          }
        }
        if (state.mode === "running") {
          updateRunning(dt);
          return;
        }
        updateAmbient(dt);
      }

      function wrapText(text, maxWidth) {
        const words = String(text).split(" ");
        const lines = [];
        let current = "";
        for (const word of words) {
          const next = current ? `${current} ${word}` : word;
          if (ctx.measureText(next).width > maxWidth && current) {
            lines.push(current);
            current = word;
          } else {
            current = next;
          }
        }
        if (current) {
          lines.push(current);
        }
        return lines;
      }

      function drawRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + width - r, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + r);
        ctx.lineTo(x + width, y + height - r);
        ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        ctx.lineTo(x + r, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function drawBackground() {
        const bg = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        bg.addColorStop(0, "#030712");
        bg.addColorStop(0.48, "#071426");
        bg.addColorStop(1, "#02050b");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const haze = ctx.createRadialGradient(CORE.x, 84, 0, CORE.x, 84, 420);
        haze.addColorStop(0, "rgba(82, 243, 255, 0.22)");
        haze.addColorStop(0.45, "rgba(41, 128, 255, 0.08)");
        haze.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 3; index += 1) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${index === 1 ? "176, 255, 244" : "84, 214, 255"}, ${
            0.08 + index * 0.04
          })`;
          ctx.lineWidth = 34 - index * 8;
          ctx.lineCap = "round";
          ctx.moveTo(-80, 80 + index * 70 + Math.sin(state.auroraShift * 0.05 + index) * 18);
          ctx.bezierCurveTo(
            220,
            10 + index * 40,
            540,
            160 + Math.sin(state.auroraShift * 0.08 + index * 2) * 42,
            VIEW.width + 80,
            36 + index * 60
          );
          ctx.stroke();
        }

        for (const star of state.starfield) {
          ctx.fillStyle = `rgba(218, 245, 255, ${star.alpha})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(6, 12, 22, 0.46)";
        ctx.fillRect(0, VIEW.height - 110, VIEW.width, 110);
      }

      function drawOrbits() {
        ctx.save();
        ctx.translate(CORE.x, CORE.y);
        ctx.rotate(state.observatorySpin * 0.35);
        ctx.strokeStyle = "rgba(113, 218, 255, 0.12)";
        ctx.lineWidth = 1.5;
        for (let index = 0; index < 3; index += 1) {
          ctx.beginPath();
          ctx.ellipse(0, 0, ORBIT_RADIUS_X - index * 34, ORBIT_RADIUS_Y - index * 20, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawWavePath(path, progress, color, thickness, alphaScale, dashed) {
        ctx.save();
        if (dashed) {
          ctx.setLineDash([14, 10]);
          ctx.lineDashOffset = -state.elapsed * 60;
        }
        ctx.beginPath();
        const startPoint = quadraticPoint(path, 0);
        ctx.moveTo(startPoint.x, startPoint.y);
        const segments = 40;
        for (let index = 1; index <= segments; index += 1) {
          const t = (progress * index) / segments;
          const point = quadraticPoint(path, t);
          ctx.lineTo(point.x, point.y);
        }
        ctx.strokeStyle = color.replace("__ALPHA__", alphaScale.toFixed(3));
        ctx.lineCap = "round";
        ctx.lineWidth = thickness;
        ctx.stroke();
        ctx.restore();
      }

      function drawWaveForecast(path) {
        drawWavePath(path, 1, "rgba(118, 245, 255, __ALPHA__)", 24, 0.08, false);
        drawWavePath(path, 1, "rgba(132, 252, 255, __ALPHA__)", 9, 0.32, true);
        const cueT = 0.16 + ((Math.sin(state.elapsed * 4.2) + 1) * 0.14);
        const cue = quadraticPoint(path, cueT);
        const targetPosition = getWaveTargetPosition();
        const cueGradient = ctx.createRadialGradient(cue.x, cue.y, 2, cue.x, cue.y, 32);
        cueGradient.addColorStop(0, "rgba(227, 254, 255, 0.95)");
        cueGradient.addColorStop(1, "rgba(227, 254, 255, 0)");
        ctx.fillStyle = cueGradient;
        ctx.beginPath();
        ctx.arc(cue.x, cue.y, 32, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 248, 166, 0.65)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(targetPosition.x - 22, targetPosition.y);
        ctx.lineTo(targetPosition.x + 22, targetPosition.y);
        ctx.moveTo(targetPosition.x, targetPosition.y - 22);
        ctx.lineTo(targetPosition.x, targetPosition.y + 22);
        ctx.stroke();
      }

      function drawWaveSurge(path) {
        const progress = clamp(state.waveTime / state.wave.surgeDuration, 0, 1);
        drawWavePath(path, progress, "rgba(92, 248, 255, __ALPHA__)", 40, 0.11, false);
        drawWavePath(path, progress, "rgba(218, 255, 255, __ALPHA__)", 18, 0.34, false);
        drawWavePath(path, progress, "rgba(107, 146, 255, __ALPHA__)", 8, 0.85, false);
        const head = quadraticPoint(path, progress);
        const headGlow = ctx.createRadialGradient(head.x, head.y, 4, head.x, head.y, 54);
        headGlow.addColorStop(0, "rgba(235, 255, 255, 0.95)");
        headGlow.addColorStop(0.4, "rgba(103, 232, 249, 0.42)");
        headGlow.addColorStop(1, "rgba(103, 232, 249, 0)");
        ctx.fillStyle = headGlow;
        ctx.beginPath();
        ctx.arc(head.x, head.y, 54, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawCore() {
        ctx.save();
        ctx.translate(CORE.x, CORE.y);
        ctx.rotate(state.observatorySpin);
        const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, 150);
        halo.addColorStop(0, "rgba(142, 251, 255, 0.32)");
        halo.addColorStop(0.55, "rgba(41, 175, 255, 0.12)");
        halo.addColorStop(1, "rgba(41, 175, 255, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(0, 0, 150, 0, Math.PI * 2);
        ctx.fill();

        for (let index = 0; index < 3; index += 1) {
          ctx.strokeStyle = `rgba(${index === 1 ? "205, 255, 247" : "77, 211, 255"}, ${
            0.16 + index * 0.08
          })`;
          ctx.lineWidth = 16 - index * 4;
          ctx.beginPath();
          ctx.arc(0, 0, 76 + index * 20, index * 1.1, index * 1.1 + Math.PI * 1.2);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(255, 252, 180, 0.72)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, PULSE_GATE_RADIUS, 0, Math.PI * 2);
        ctx.stroke();

        if (state.mode === "running" && state.wavePhase === "forecast") {
          const radius = getBeatRadius();
          ctx.strokeStyle = isPulseInWindow()
            ? "rgba(255, 250, 182, 0.96)"
            : "rgba(134, 240, 255, 0.82)";
          ctx.lineWidth = isPulseInWindow() ? 9 : 5;
          ctx.shadowColor = isPulseInWindow() ? "#fff2a1" : "#71e5ff";
          ctx.shadowBlur = isPulseInWindow() ? 22 : 12;
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }

        const coreGradient = ctx.createRadialGradient(0, 0, 6, 0, 0, CORE_RADIUS + 22);
        coreGradient.addColorStop(0, "rgba(245, 255, 255, 1)");
        coreGradient.addColorStop(0.25, "rgba(118, 245, 255, 0.94)");
        coreGradient.addColorStop(0.75, "rgba(39, 109, 255, 0.6)");
        coreGradient.addColorStop(1, "rgba(39, 109, 255, 0)");
        ctx.fillStyle = coreGradient;
        ctx.beginPath();
        ctx.arc(0, 0, CORE_RADIUS + 22, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#e4feff";
        ctx.beginPath();
        ctx.arc(0, 0, CORE_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawAnchor() {
        if (!state.anchor.targetId) {
          return;
        }
        const cargo = getCargo(state.anchor.targetId);
        if (!cargo || cargo.lost) {
          return;
        }
        const position = getCargoPosition(cargo);
        const gradient = ctx.createLinearGradient(CORE.x, CORE.y, position.x, position.y);
        gradient.addColorStop(0, "rgba(193, 253, 255, 0.96)");
        gradient.addColorStop(0.45, "rgba(120, 225, 255, 0.88)");
        gradient.addColorStop(1, cargo.tint + "cc");
        ctx.strokeStyle = gradient;
        ctx.lineWidth = state.anchor.locked ? 6.5 : 4;
        ctx.shadowColor = cargo.tint;
        ctx.shadowBlur = state.anchor.locked ? 18 : 10;
        ctx.beginPath();
        ctx.moveTo(CORE.x, CORE.y);
        ctx.lineTo(position.x, position.y);
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = cargo.tint;
        ctx.beginPath();
        ctx.arc(position.x, position.y, state.anchor.locked ? 16 : 12, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawCargos() {
        const selected = getSelectedCargo();
        for (const cargo of state.cargos) {
          const position = getCargoPosition(cargo);
          const isTarget = cargo.id === state.wave.targetId && state.mode === "running";
          const isAnchored = cargo.id === state.anchor.targetId;
          const outerGlow = ctx.createRadialGradient(position.x, position.y, 10, position.x, position.y, 56);
          outerGlow.addColorStop(
            0,
            cargo.lost ? "rgba(255, 98, 135, 0.34)" : `${cargo.tint}55`
          );
          outerGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = outerGlow;
          ctx.beginPath();
          ctx.arc(position.x, position.y, 56 + cargo.pulse * 10, 0, Math.PI * 2);
          ctx.fill();

          ctx.save();
          ctx.translate(position.x, position.y);
          ctx.rotate(state.observatorySpin * 0.8 + cargo.baseAngle);
          drawRoundedRect(-22, -16, 44, 32, 12);
          const glass = ctx.createLinearGradient(-22, -16, 22, 20);
          glass.addColorStop(0, cargo.lost ? "rgba(255, 122, 152, 0.95)" : `${cargo.tint}ee`);
          glass.addColorStop(1, cargo.lost ? "rgba(140, 39, 70, 0.7)" : "rgba(9, 18, 34, 0.9)");
          ctx.fillStyle = glass;
          ctx.fill();
          ctx.strokeStyle = isTarget
            ? "rgba(255, 248, 180, 0.92)"
            : isAnchored
              ? "rgba(227, 255, 255, 0.92)"
              : "rgba(230, 247, 255, 0.24)";
          ctx.lineWidth = isTarget ? 3 : 2;
          ctx.stroke();
          ctx.restore();

          ctx.font = "700 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillStyle = "#e6fbff";
          ctx.fillText(cargo.label, position.x, position.y + 38);

          if (isTarget || isAnchored || selected?.id === cargo.id) {
            ctx.strokeStyle = isTarget
              ? "rgba(255, 245, 168, 0.95)"
              : isAnchored
                ? "rgba(147, 251, 255, 0.9)"
                : "rgba(194, 247, 255, 0.66)";
            ctx.lineWidth = isTarget ? 4 : 2;
            ctx.beginPath();
            ctx.arc(position.x, position.y, 31 + Math.sin(state.elapsed * 5 + cargo.baseAngle) * 2, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
        ctx.textAlign = "left";
      }

      function drawCursor() {
        if (!pointerState.active && state.mode !== "running") {
          return;
        }
        const cargo = getSelectedCargo();
        const x = cargo ? getCargoPosition(cargo).x : pointerState.x;
        const y = cargo ? getCargoPosition(cargo).y : pointerState.y;
        const radius = 16 + Math.sin(state.reticlePulse) * 2.5;
        ctx.strokeStyle = cargo ? "rgba(214, 250, 255, 0.88)" : "rgba(142, 245, 255, 0.72)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x - radius - 6, y);
        ctx.lineTo(x - radius + 2, y);
        ctx.moveTo(x + radius - 2, y);
        ctx.lineTo(x + radius + 6, y);
        ctx.moveTo(x, y - radius - 6);
        ctx.lineTo(x, y - radius + 2);
        ctx.moveTo(x, y + radius - 2);
        ctx.lineTo(x, y + radius + 6);
        ctx.stroke();
      }

      function drawHudPanel(x, y, width, title, accent) {
        drawRoundedRect(x, y, width, 84, 22);
        ctx.fillStyle = "rgba(4, 10, 20, 0.72)";
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = accent;
        ctx.font = "700 13px Trebuchet MS";
        ctx.fillText(title, x + 18, y + 20);
      }

      function drawHud() {
        if (state.mode !== "running") {
          return;
        }

        const target = getTargetCargo();
        const targetName = target ? target.name : "none";
        const anchored = state.anchor.targetId ? getCargo(state.anchor.targetId)?.name : "없음";
        drawHudPanel(20, 18, 292, "OBSERVATORY", "rgba(137, 248, 255, 0.82)");
        ctx.fillStyle = "#ebfdff";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText(`파 ${state.waveIndex + 1}/6  ${state.wave.label}`, 38, 48);
        ctx.font = "600 13px Trebuchet MS";
        ctx.fillStyle = "rgba(215, 247, 255, 0.9)";
        ctx.fillText(`예측 화물  ${targetName}`, 38, 70);
        ctx.fillText(`현재 닻  ${anchored || "없음"}`, 160, 70);

        drawHudPanel(VIEW.width - 292, 18, 272, "TEMPO", "rgba(255, 236, 148, 0.84)");
        ctx.fillStyle = "#fff7d0";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText(state.wavePhase === "forecast" ? "PULSE WINDOW" : "SURGE", VIEW.width - 274, 48);
        ctx.font = "600 13px Trebuchet MS";
        ctx.fillStyle = "rgba(255, 245, 210, 0.92)";
        ctx.fillText(`오프비트 ${state.offbeatStreak}/2`, VIEW.width - 274, 70);
        const barX = VIEW.width - 164;
        const barY = 62;
        const progress =
          state.wavePhase === "forecast"
            ? clamp(state.waveTime / state.wave.forecastDuration, 0, 1)
            : clamp(state.waveTime / state.wave.surgeDuration, 0, 1);
        drawRoundedRect(barX, barY - 12, 122, 10, 10);
        ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
        ctx.fill();
        drawRoundedRect(barX, barY - 12, 122 * progress, 10, 10);
        ctx.fillStyle = state.wavePhase === "forecast" ? "#90f2ff" : "#ffd37c";
        ctx.fill();

        ctx.font = "600 12px Trebuchet MS";
        ctx.fillStyle = "rgba(224, 245, 255, 0.78)";
        const helper =
          "화물 탭=닻 발사  코어 탭/Space=펄스  길게 스와이프=회수";
        ctx.fillText(helper, 28, VIEW.height - 18);
      }

      function drawRipplesAndParticles() {
        for (const ripple of state.ripples) {
          const alpha = clamp(ripple.life / ripple.maxLife, 0, 1);
          ctx.strokeStyle = ripple.color
            .replace("rgb(", "rgba(")
            .replace(")", `, ${alpha * 0.8})`);
          if (!ripple.color.startsWith("rgb")) {
            ctx.strokeStyle = ripple.color.replace(")", `, ${alpha * 0.8})`);
          }
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = `${particle.color}${alpha < 1 ? "" : ""}`;
          if (particle.color.startsWith("#")) {
            const r = parseInt(particle.color.slice(1, 3), 16);
            const g = parseInt(particle.color.slice(3, 5), 16);
            const b = parseInt(particle.color.slice(5, 7), 16);
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
          } else {
            ctx.fillStyle = particle.color;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.textAlign = "center";
        for (const popup of state.popups) {
          const alpha = clamp(popup.life / popup.maxLife, 0, 1);
          ctx.font = "700 18px Trebuchet MS";
          ctx.fillStyle = popup.color.startsWith("#")
            ? `rgba(${parseInt(popup.color.slice(1, 3), 16)}, ${parseInt(
                popup.color.slice(3, 5),
                16
              )}, ${parseInt(popup.color.slice(5, 7), 16)}, ${alpha})`
            : popup.color;
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.textAlign = "left";
      }

        ctx.font = "600 15px Trebuchet MS";
        ctx.fillStyle = "rgba(211, 244, 255, 0.86)";
        ctx.fillText("모바일에서는 화물 탭, 코어 탭, 드래그 스와이프만으로 플레이할 수 있습니다.", 152, 510);
      }

      function drawEndOverlay(title, accent, subtitle) {
        drawRoundedRect(180, 116, VIEW.width - 360, VIEW.height - 232, 30);
        ctx.fillStyle = "rgba(5, 8, 18, 0.82)";
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = "#f9feff";
        ctx.font = "700 46px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 188);
        ctx.fillStyle = accent;
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText(subtitle, VIEW.width / 2, 224);
        ctx.font = "600 18px Trebuchet MS";
        ctx.fillStyle = "rgba(233, 248, 255, 0.92)";
        ctx.fillText(`생존 시간 ${formatSeconds(state.lastRunTime)}`, VIEW.width / 2, 272);
        if (state.mode === "failed") {
          ctx.fillText(
            state.lastReason === "offbeat_streak"
              ? "핵심 입력을 연속으로 박자 밖에 사용했습니다."
              : "중요 화물이 급류에 휩쓸렸습니다.",
            VIEW.width / 2,
            312
          );
        } else {
          ctx.fillText("예측과 리듬을 모두 읽어 6파를 봉인했습니다.", VIEW.width / 2, 312);
        }
        ctx.font = "600 16px Trebuchet MS";
        ctx.fillStyle = "rgba(216, 242, 255, 0.84)";
        ctx.fillText("터치 또는 Enter로 다시 시작", VIEW.width / 2, 384);
        ctx.fillText("화물을 탭해 닻을 연결하고 코어를 눌러 박자를 맞추세요.", VIEW.width / 2, 414);
        ctx.textAlign = "left";
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawBackground();

        ctx.save();
        const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        ctx.translate(shakeX, shakeY);
        drawOrbits();
        const wavePath = getWavePath();
        if (state.mode === "running") {
          if (state.wavePhase === "forecast") {
            drawWaveForecast(wavePath);
          } else {
            drawWaveSurge(wavePath);
          }
        }
        drawCore();
        drawAnchor();
        drawCargos();
        drawCursor();
        drawRipplesAndParticles();
        ctx.restore();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed") {
          drawEndOverlay("ANCHOR FAILURE", "rgba(255, 147, 166, 0.95)", "critical loss");
        } else if (state.mode === "cleared") {
          drawEndOverlay("OBSERVATORY SECURED", "rgba(152, 248, 255, 0.95)", "all six tides sealed");
        }

        drawHud();

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(202, 247, 255, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function renderGameToText() {
        const cargos = state.cargos.map((cargo) => {
          const position = getCargoPosition(cargo);
          return {
            id: cargo.id,
            label: cargo.label,
            x: Math.round(position.x),
            y: Math.round(position.y),
            lost: cargo.lost,
          };
        });
        return JSON.stringify({
          coordinate_system: "960x540 canvas, origin top-left",
          mode: state.mode,
          elapsed: Number(state.elapsed.toFixed(2)),
          wave: state.waveIndex + 1,
          phase: state.wavePhase,
          targetCargo: state.wave.targetId,
          anchoredCargo: state.anchor.targetId,
          selectedCargo: getSelectedCargo()?.id || null,
          beatRadius: Number(getBeatRadius().toFixed(1)),
          pulseGateRadius: PULSE_GATE_RADIUS,
          pulseTolerance: state.wave.windowTolerance,
          offbeatStreak: state.offbeatStreak,
          relayResult: window.relayStageResult.status,
          cargos,
          relayContext: {
            previousStageId: relayContext.previousStageId,
            clearCountBeforeThisStage: relayContext.clearCount,
            visitedStageIds: relayContext.history,
          },
        });
      }

      function handlePointerTap(x, y) {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
          return;
        }
        if (distance(x, y, CORE.x, CORE.y) <= 74) {
          attemptPulse();
          return;
        }
        const cargo = getNearestCargo(x, y, ANCHOR_RANGE);
        if (cargo) {
          fireAnchor(cargo);
        }
      }

      function updatePointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        pointerState.x = (event.clientX - rect.left) * scaleX;
        pointerState.y = (event.clientY - rect.top) * scaleY;
        pointerState.active = true;
      }

      function onPointerDown(event) {
        event.preventDefault();
        canvas.focus();
        updatePointerPosition(event);
        pointerState.down = true;
        pointerState.startX = pointerState.x;
        pointerState.startY = pointerState.y;
      }

      function onPointerMove(event) {
        updatePointerPosition(event);
      }

      function onPointerUp(event) {
        event.preventDefault();
        updatePointerPosition(event);
        const moved = distance(
          pointerState.startX,
          pointerState.startY,
          pointerState.x,
          pointerState.y
        );
        pointerState.down = false;
        if (moved >= SWIPE_RECALL_DISTANCE) {
          recallAnchor();
          return;
        }
        if (moved <= POINTER_TAP_DISTANCE) {
          handlePointerTap(pointerState.x, pointerState.y);
        }
      }

      function onPointerCancel() {
        pointerState.down = false;
      }

      function onTouchStart(event) {
        if (event.cancelable) {
          event.preventDefault();
        }
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            resetRun();
          }
          return;
        }
        if (event.code === "Space" || event.key.toLowerCase() === "x") {
          event.preventDefault();
          attemptPulse();
          return;
        }
        if (event.key.toLowerCase() === "r") {
          event.preventDefault();
          if (state.mode !== "running") {
            resetRun();
          }
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        creator: STAGE_CREATOR,
        genre: STAGE_GENRE,
        clearCondition: STAGE_CLEAR_CONDITION,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          resetRun();
          clearStage();
          render();
        },
        forceFail() {
          resetRun();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerCancel);
      canvas.addEventListener("touchstart", onTouchStart, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
