<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>색깔 맞추기</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">색깔 맞추기. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 마우스 클릭 또는 화면 터치로 같은 색상 선택 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="색깔 맞추기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("color-match") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "주어진 색상과 같은 색상의 타일을 빠르게 찾아 누르세요!",
        matches: 0,
        targetColorIndex: 0,
        colors: [],
        tiles: [] // { x, y, width, height, colorIndex }
      };

      const GAME_TIME = 15;
      const WIN_MATCHES = 10;
      const TILE_COLORS = [
        "#ef4444", "#f97316", "#eab308", "#22c55e",
        "#06b6d4", "#3b82f6", "#8b5cf6", "#ec4899"
      ];

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function initBoard() {
        state.matches = 0;
        nextTurn();
      }

      function nextTurn() {
        state.colors = [...TILE_COLORS].sort(() => Math.random() - 0.5).slice(0, 4);
        state.targetColorIndex = Math.floor(Math.random() * 4);

        const size = 160;
        const gap = 20;
        const startX = VIEW.width / 2 - size - gap / 2;
        const startY = VIEW.height / 2 - size - gap / 2 + 40;

        const positions = [
          { x: startX, y: startY },
          { x: startX + size + gap, y: startY },
          { x: startX, y: startY + size + gap },
          { x: startX + size + gap, y: startY + size + gap }
        ];

        state.tiles = positions.map((pos, i) => ({
          x: pos.x,
          y: pos.y,
          width: size,
          height: size,
          colorIndex: i
        }));
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        initBoard();
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;
          if (state.elapsed >= GAME_TIME) {
            failStage("time_over");
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function render() {
        if (state.mode === "menu") {
          renderCard("색깔 맞추기", [
            "같은 색상의 타일을 빠르게 찾아 누르세요!",
            "조작: 클릭 또는 터치로 색상 선택",
            "클리어: 15초 안에 10번 맞추기",
            "실패: 시간 초과",
            "터치 또는 Enter로 시작",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          ctx.fillStyle = "#0f172a";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          // Top Bar
          ctx.fillStyle = "rgba(15, 23, 42, 0.8)";
          ctx.fillRect(0, 0, VIEW.width, 80);

          ctx.fillStyle = "#f8fafc";
          ctx.font = "bold 28px Trebuchet MS";
          ctx.textAlign = "left";
          ctx.fillText(`Matches: ${state.matches} / ${WIN_MATCHES}`, 30, 50);

          ctx.textAlign = "right";
          const timeLeft = Math.max(0, GAME_TIME - state.elapsed).toFixed(1);
          ctx.fillStyle = timeLeft <= 3 ? "#ef4444" : "#f8fafc";
          ctx.fillText(`Time: ${timeLeft}s`, VIEW.width - 30, 50);

          // Target Color
          ctx.textAlign = "center";
          ctx.fillStyle = "#f8fafc";
          ctx.font = "bold 24px Trebuchet MS";
          ctx.fillText("이 색깔을 찾으세요:", VIEW.width / 2 - 40, 45);

          ctx.fillStyle = state.colors[state.targetColorIndex];
          ctx.beginPath();
          ctx.arc(VIEW.width / 2 + 100, 38, 20, 0, Math.PI * 2);
          ctx.fill();

          // Tiles
          state.tiles.forEach((tile) => {
            ctx.fillStyle = state.colors[tile.colorIndex];

            // Draw tile with rounded corners
            const radius = 16;
            ctx.beginPath();
            ctx.moveTo(tile.x + radius, tile.y);
            ctx.lineTo(tile.x + tile.width - radius, tile.y);
            ctx.quadraticCurveTo(tile.x + tile.width, tile.y, tile.x + tile.width, tile.y + radius);
            ctx.lineTo(tile.x + tile.width, tile.y + tile.height - radius);
            ctx.quadraticCurveTo(tile.x + tile.width, tile.y + tile.height, tile.x + tile.width - radius, tile.y + tile.height);
            ctx.lineTo(tile.x + radius, tile.y + tile.height);
            ctx.quadraticCurveTo(tile.x, tile.y + tile.height, tile.x, tile.y + tile.height - radius);
            ctx.lineTo(tile.x, tile.y + radius);
            ctx.quadraticCurveTo(tile.x, tile.y, tile.x + radius, tile.y);
            ctx.closePath();
            ctx.fill();
          });

          return;
        }

        if (state.mode === "failed") {
          renderCard("실패", [
            "15초가 지나면 실패",
            "공유 목숨 1개가 즉시 종료되었습니다.",
            "최종 스테이지에서는 실제 실패 원인을 보여주세요.",
          ], "#b91c1c");
          return;
        }

        renderCard("클리어", [
          "15초 안에 같은 색상의 타일을 10번 맞추기",
          "호스트가 다음 미플레이 스테이지를 랜덤으로 선택합니다.",
          "최종 스테이지에서는 실제 클리어 연출로 교체하세요.",
        ], "#15803d");
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          matches: state.matches,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function handleInteraction(clientX, clientY) {
        if (state.mode !== "running") return;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        for (const tile of state.tiles) {
          if (x >= tile.x && x <= tile.x + tile.width &&
              y >= tile.y && y <= tile.y + tile.height) {

            if (tile.colorIndex === state.targetColorIndex) {
              state.matches++;
              if (state.matches >= WIN_MATCHES) {
                clearStage();
              } else {
                nextTurn();
              }
            } else {
              // Penalty for wrong click? Or just ignore? Let's reduce time or ignore.
              // We'll just ignore to make it simpler, but could add penalty.
            }
            break;
          }
        }
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "color-match",
        title: "색깔 맞추기",
        creator: "Jules",
        genre: "퍼즐/순발력",
        clearCondition: "15초 안에 같은 색상의 타일을 10번 맞추기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        } else if (event.touches.length > 0) {
          event.preventDefault();
          handleInteraction(event.touches[0].clientX, event.touches[0].clientY);
        }
      }, { passive: false });

      canvas.addEventListener("pointerdown", (event) => {
        if (state.mode === "running" && event.pointerType !== "touch") {
          handleInteraction(event.clientX, event.clientY);
        }
      });

      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
