<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storm Archive: Shadow Stitch</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(39, 94, 124, 0.32), transparent 40%),
          linear-gradient(180deg, #061019 0%, #04070f 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(143, 199, 255, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(4, 11, 18, 0.92);
        color: #f3fbff;
        font-weight: 800;
        text-decoration: none;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible,
      .mobile-btn:focus-visible {
        outline: 3px solid rgba(193, 245, 255, 0.98);
        outline-offset: 3px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 14px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 12px calc(14px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__grid {
        pointer-events: auto;
        display: grid;
        grid-template-columns: repeat(3, minmax(64px, 88px));
        grid-template-areas:
          ". up cut"
          "left down right";
        gap: 10px;
        width: min(100%, 304px);
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(157, 230, 255, 0.24);
        border-radius: 20px;
        min-height: 64px;
        padding: 0 14px;
        background:
          linear-gradient(180deg, rgba(22, 40, 58, 0.92), rgba(6, 14, 22, 0.92));
        color: #e9fbff;
        font: 800 17px/1 "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.02em;
        box-shadow:
          0 16px 30px rgba(0, 0, 0, 0.36),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: translateY(1px) scale(0.97);
        background:
          linear-gradient(180deg, rgba(74, 128, 161, 0.94), rgba(17, 53, 75, 0.94));
      }

      .mobile-btn--cut {
        border-color: rgba(255, 175, 138, 0.35);
        background:
          linear-gradient(180deg, rgba(89, 40, 35, 0.94), rgba(41, 17, 18, 0.94));
        color: #ffe8df;
      }

      .mobile-btn[data-control="up"] {
        grid-area: up;
      }

      .mobile-btn[data-control="left"] {
        grid-area: left;
      }

      .mobile-btn[data-control="down"] {
        grid-area: down;
      }

      .mobile-btn[data-control="right"] {
        grid-area: right;
      }

      .mobile-btn[data-control="cut"] {
        grid-area: cut;
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 10px;
          padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__grid {
          grid-template-columns: repeat(3, minmax(58px, 82px));
          gap: 8px;
          width: min(100%, 286px);
        }

        .mobile-btn {
          min-height: 58px;
          border-radius: 18px;
          font-size: 15px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Storm Archive: Shadow Stitch. 캔버스를 터치하거나 Enter로 시작하세요.
      이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      콤보를 유지하며 봉합 다리로 4개 제단을 모두 점등하면 클리어.
      콤보가 여러 번 끊기거나 강한 빛에 오래 노출돼 실이 타면 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Storm Archive: Shadow Stitch"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작 패널">
      <div class="mobile-controls__grid">
        <button class="mobile-btn" type="button" data-control="up" data-active="false" aria-label="위로 이동">▲</button>
        <button class="mobile-btn" type="button" data-control="left" data-active="false" aria-label="왼쪽으로 이동">◀</button>
        <button class="mobile-btn" type="button" data-control="down" data-active="false" aria-label="아래로 이동">▼</button>
        <button class="mobile-btn" type="button" data-control="right" data-active="false" aria-label="오른쪽으로 이동">▶</button>
        <button class="mobile-btn mobile-btn--cut" type="button" data-control="cut" data-active="false" aria-label="실 끊기">실끊기</button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const CENTER = { x: VIEW.width / 2, y: VIEW.height / 2 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const HUB_RADIUS = 84;
      const ALTAR_RADIUS = 58;
      const PLAYER_RADIUS = 15;
      const BRIDGE_HALF_WIDTH = 17;
      const PLAYER_SPEED = 240;
      const COMBO_WINDOW = 4.8;
      const MAX_BREAKS = 3;
      const MAX_THREAD_HEAT = 100;
      const LIGHT_HOLD_TIME = 0.7;
      const BRIDGE_DURATION = 6.6;
      const TAP_WINDOW_MS = 280;
      const TAP_DISTANCE = 26;
      const REDUCE_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext =
        window.RelayRuntime?.readContext("storm-archive-shadow-stitch-combo") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };
      const metaCopy = {
        controls:
          "이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition: "콤보를 유지하며 봉합 다리로 4개 제단을 모두 점등하면 클리어",
        failCondition: "콤보가 여러 번 끊기거나 강한 빛에 오래 노출돼 실이 타면 실패",
      };

      const altars = [
        { id: "northwest", label: "북서 제단", x: 178, y: 138, hue: 194 },
        { id: "northeast", label: "북동 제단", x: 782, y: 138, hue: 24 },
        { id: "southeast", label: "남동 제단", x: 782, y: 402, hue: 326 },
        { id: "southwest", label: "남서 제단", x: 178, y: 402, hue: 112 },
      ];

      const bridges = altars.map((altar, index) => {
        const dx = altar.x - CENTER.x;
        const dy = altar.y - CENTER.y;
        const length = Math.hypot(dx, dy);
        const nx = dx / length;
        const ny = dy / length;
        return {
          id: altar.id,
          altarIndex: index,
          startX: CENTER.x + nx * (HUB_RADIUS + 10),
          startY: CENTER.y + ny * (HUB_RADIUS + 10),
          endX: altar.x - nx * (ALTAR_RADIUS + 10),
          endY: altar.y - ny * (ALTAR_RADIUS + 10),
          nx,
          ny,
          length:
            Math.hypot(
              altar.x - nx * (ALTAR_RADIUS + 10) - (CENTER.x + nx * (HUB_RADIUS + 10)),
              altar.y - ny * (ALTAR_RADIUS + 10) - (CENTER.y + ny * (HUB_RADIUS + 10))
            ) || 1,
          active: false,
          timer: 0,
          intensity: 0,
          stitchWindow: 0,
          stitchCooldown: 0,
        };
      });

      const input = {
        up: false,
        down: false,
        left: false,
        right: false,
        pointerId: null,
        pointerMode: "idle",
        pointerWorld: { x: CENTER.x, y: CENTER.y },
        stitchLane: null,
        moveTarget: null,
        lastTapMs: 0,
        lastTapPos: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let loopActive = false;
      let manualStepping = false;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        player: { x: CENTER.x, y: CENTER.y, glow: 0, pulse: 0 },
        altars: altars.map((altar) => ({
          id: altar.id,
          label: altar.label,
          lit: false,
          glow: 0,
          charge: 0,
        })),
        combo: 0,
        comboTimer: 0,
        comboBreaks: 0,
        threadHeat: 16,
        playerExposure: 0,
        bridgeExposure: 0,
        popups: [],
        particles: [],
        arcs: [],
        stormOffset: 0,
        rainPhase: 0,
        lightningPulse: 0,
        flashAlpha: 0,
        shake: 0,
        sweep: 0,
        note: "빛과 그림자 경계선을 꿰매 다리로 바꾸며 폭풍 아카이브의 제단 4개를 연속 점등하는 액션 퍼즐",
        lastReason: "",
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "thread_burned") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(from, to, amount) {
        return from + (to - from) * amount;
      }

      function wrapAngle(angle) {
        let value = angle;
        while (value > Math.PI) value -= Math.PI * 2;
        while (value < -Math.PI) value += Math.PI * 2;
        return value;
      }

      function pointDistance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function pointSegmentDistance(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const lengthSq = dx * dx + dy * dy || 1;
        const t = clamp(((px - x1) * dx + (py - y1) * dy) / lengthSq, 0, 1);
        const sx = x1 + dx * t;
        const sy = y1 + dy * t;
        return { distance: Math.hypot(px - sx, py - sy), t, x: sx, y: sy };
      }

      function safeSetPointerCapture(target, pointerId) {
        try {
          target?.setPointerCapture?.(pointerId);
        } catch (error) {
          // Synthetic PointerEvent probes in validation do not always own capture.
        }
      }

      function safeReleasePointerCapture(target, pointerId) {
        try {
          target?.releasePointerCapture?.(pointerId);
        } catch (error) {
          // Ignore capture mismatches so start/release paths stay deterministic.
        }
      }

      function emitPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          ttl: 0.95,
          life: 0.95,
          rise: 0,
        });
      }

      function spawnSparkBurst(x, y, hue, count, speed = 150) {
        const total = REDUCE_MOTION ? Math.max(3, Math.round(count / 2.5)) : Math.max(4, Math.round(count * 0.75));
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / total + Math.random() * 0.35;
          const velocity = speed * (0.42 + Math.random() * 0.72);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            ttl: 0.8 + Math.random() * 0.4,
            life: 0.8 + Math.random() * 0.4,
            size: 3 + Math.random() * 3,
            hue,
          });
        }
      }

      function spawnStitchArc(bridge) {
        for (let step = 0; step < 8; step += 1) {
          const t = step / 7;
          state.arcs.push({
            x: lerp(bridge.startX, bridge.endX, t),
            y: lerp(bridge.startY, bridge.endY, t),
            ttl: 0.38 + t * 0.12,
            life: 0.38 + t * 0.12,
            hue: altars[bridge.altarIndex].hue,
          });
        }
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = { x: CENTER.x, y: CENTER.y, glow: 0, pulse: 0 };
        state.altars = altars.map((altar) => ({
          id: altar.id,
          label: altar.label,
          lit: false,
          glow: 0,
          charge: 0,
        }));
        state.combo = 0;
        state.comboTimer = 0;
        state.comboBreaks = 0;
        state.threadHeat = 16;
        state.playerExposure = 0;
        state.bridgeExposure = 0;
        state.popups = [];
        state.particles = [];
        state.arcs = [];
        state.stormOffset = Math.random() * 200;
        state.rainPhase = Math.random() * 1000;
        state.lightningPulse = 0;
        state.flashAlpha = 0;
        state.shake = 0;
        state.sweep = Math.random() * Math.PI * 2;
        state.lastReason = "";
        bridges.forEach((bridge) => {
          bridge.active = false;
          bridge.timer = 0;
          bridge.intensity = 0;
          bridge.stitchWindow = 0;
          bridge.stitchCooldown = 0;
        });
        input.moveTarget = null;
        input.pointerMode = "idle";
        input.stitchLane = null;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        requestTick();
      }

      function startStage() {
        if (state.mode === "running") {
          return;
        }
        resetRun();
      }

      function rescuePlayerToHub() {
        state.player.x = CENTER.x;
        state.player.y = CENTER.y;
        input.moveTarget = null;
      }

      function cutThreads(manual = true) {
        const hadBridge = bridges.some((bridge) => bridge.active);
        bridges.forEach((bridge) => {
          bridge.active = false;
          bridge.timer = 0;
        });
        state.threadHeat = Math.max(12, state.threadHeat - 34);
        if (!isPassable(state.player.x, state.player.y)) {
          rescuePlayerToHub();
        }
        if (manual && hadBridge && state.mode === "running") {
          emitPopup("실 정리", state.player.x, state.player.y - 30, "rgba(255, 196, 172, 0.95)");
          spawnSparkBurst(state.player.x, state.player.y, 18, 12, 120);
          requestTick();
        }
      }

      function breakCombo(reason = "combo_drop") {
        if (state.mode !== "running") {
          return;
        }
        state.combo = 0;
        state.comboTimer = 0;
        state.comboBreaks += 1;
        state.altars.forEach((altar) => {
          altar.lit = false;
          altar.charge = 0;
          altar.glow = 0;
        });
        cutThreads(false);
        rescuePlayerToHub();
        state.flashAlpha = Math.max(state.flashAlpha, 0.28);
        state.shake = Math.max(state.shake, 8);
        emitPopup("콤보 단절", CENTER.x, CENTER.y - 48, "rgba(255, 181, 148, 0.96)");
        spawnSparkBurst(CENTER.x, CENTER.y, 16, 18, 170);
        requestTick();
        if (state.comboBreaks >= MAX_BREAKS) {
          failStage(reason);
        }
      }

      function failStage(reason = "thread_burned") {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        window.relayStageResult.status = "failed";
        state.flashAlpha = 0.42;
        state.shake = 12;
        reportFailedToHost(reason);
        requestTick();
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        state.flashAlpha = 0.4;
        state.shake = 6;
        spawnSparkBurst(CENTER.x, CENTER.y, 190, 28, 210);
        reportClearedToHost();
        requestTick();
      }

      function anyAltarsUnlit() {
        return state.altars.some((altar) => !altar.lit);
      }

      function getBeams() {
        const base = state.sweep;
        return [
          {
            x: 120,
            y: 72,
            angle: base * 0.78 + 0.46,
            spread: 0.34,
            radius: 840,
            power: 1,
            hue: 36,
          },
          {
            x: VIEW.width - 120,
            y: 84,
            angle: Math.PI - base * 0.82 - 0.36,
            spread: 0.32,
            radius: 840,
            power: 0.92,
            hue: 210,
          },
        ];
      }

      function getLightIntensity(x, y) {
        const beams = getBeams();
        let value = 0;
        for (const beam of beams) {
          const dx = x - beam.x;
          const dy = y - beam.y;
          const distance = Math.hypot(dx, dy);
          if (distance > beam.radius) {
            continue;
          }
          const angle = Math.atan2(dy, dx);
          const delta = Math.abs(wrapAngle(angle - beam.angle));
          if (delta > beam.spread) {
            continue;
          }
          const core = 1 - delta / beam.spread;
          const falloff = 1 - distance / beam.radius;
          value = Math.max(value, core * core * falloff * beam.power);
        }
        return clamp(value, 0, 1);
      }

      function updateBridgeWindows() {
        for (const bridge of bridges) {
          const midX = (bridge.startX + bridge.endX) / 2;
          const midY = (bridge.startY + bridge.endY) / 2;
          const midIntensity = getLightIntensity(midX, midY);
          const startIntensity = getLightIntensity(bridge.startX, bridge.startY);
          const endIntensity = getLightIntensity(bridge.endX, bridge.endY);
          const boundaryScore = 1 - Math.min(1, Math.abs(midIntensity - 0.42) / 0.26);
          bridge.intensity = Math.max(startIntensity, endIntensity, midIntensity);
          bridge.stitchWindow =
            startIntensity < 0.6 && endIntensity < 0.6 ? clamp(boundaryScore, 0, 1) : 0;
        }
      }

      function isPassable(x, y) {
        if (pointDistance(x, y, CENTER.x, CENTER.y) <= HUB_RADIUS - PLAYER_RADIUS * 0.3) {
          return true;
        }
        for (const altar of altars) {
          if (pointDistance(x, y, altar.x, altar.y) <= ALTAR_RADIUS - PLAYER_RADIUS * 0.25) {
            return true;
          }
        }
        for (const bridge of bridges) {
          if (!bridge.active) {
            continue;
          }
          const segment = pointSegmentDistance(
            x,
            y,
            bridge.startX,
            bridge.startY,
            bridge.endX,
            bridge.endY
          );
          if (segment.distance <= BRIDGE_HALF_WIDTH - PLAYER_RADIUS * 0.15) {
            return true;
          }
        }
        return false;
      }

      function getWorldPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function findAnchor(point) {
        for (const bridge of bridges) {
          if (pointDistance(point.x, point.y, bridge.startX, bridge.startY) <= 26) {
            return { bridge, side: "start" };
          }
          if (pointDistance(point.x, point.y, bridge.endX, bridge.endY) <= 26) {
            return { bridge, side: "end" };
          }
        }
        return null;
      }

      function attemptStitch(bridge, point) {
        if (state.mode !== "running") {
          return false;
        }
        if (bridge.stitchWindow <= 0.14 || bridge.stitchCooldown > 0) {
          emitPopup("경계선이 흐림", point.x, point.y - 22, "rgba(255, 214, 186, 0.95)");
          state.threadHeat = Math.min(MAX_THREAD_HEAT, state.threadHeat + 6);
          state.shake = Math.max(state.shake, 3);
          return false;
        }
        const segment = pointSegmentDistance(
          point.x,
          point.y,
          bridge.startX,
          bridge.startY,
          bridge.endX,
          bridge.endY
        );
        if (segment.distance > 30 || segment.t < 0.8) {
          return false;
        }
        bridge.active = true;
        bridge.timer = BRIDGE_DURATION;
        bridge.stitchCooldown = 0.55;
        state.combo += 1;
        state.comboTimer = COMBO_WINDOW + Math.min(0.8, state.combo * 0.08);
        state.threadHeat = Math.max(8, state.threadHeat - 8);
        state.flashAlpha = Math.max(state.flashAlpha, 0.14);
        state.lightningPulse = 0.8;
        state.player.glow = 1;
        spawnStitchArc(bridge);
        spawnSparkBurst(point.x, point.y, altars[bridge.altarIndex].hue, 14, 145);
        emitPopup(`봉합 +${state.combo}`, point.x, point.y - 26, "rgba(187, 246, 255, 0.96)");
        return true;
      }

      function handlePointerDown(event) {
        const point = getWorldPoint(event);
        input.pointerId = event.pointerId;
        input.pointerWorld = point;
        safeSetPointerCapture(canvas, event.pointerId);

        if (state.mode !== "running") {
          startStage();
        }

        const now = performance.now();
        const lastTap = input.lastTapPos;
        if (
          lastTap &&
          now - input.lastTapMs < TAP_WINDOW_MS &&
          pointDistance(point.x, point.y, lastTap.x, lastTap.y) < TAP_DISTANCE &&
          state.mode === "running"
        ) {
          cutThreads(true);
          input.pointerMode = "idle";
          input.moveTarget = null;
          input.lastTapMs = 0;
          input.lastTapPos = null;
          event.preventDefault();
          return;
        }
        input.lastTapMs = now;
        input.lastTapPos = point;

        const anchor = findAnchor(point);
        if (anchor) {
          input.pointerMode = "stitch";
          input.stitchLane = anchor.bridge.id;
        } else {
          input.pointerMode = "move";
          input.moveTarget = point;
        }
        event.preventDefault();
        requestTick();
      }

      function handlePointerMove(event) {
        if (input.pointerId !== event.pointerId) {
          return;
        }
        const point = getWorldPoint(event);
        input.pointerWorld = point;
        if (input.pointerMode === "move") {
          input.moveTarget = point;
        } else if (input.pointerMode === "stitch") {
          const bridge = bridges.find((item) => item.id === input.stitchLane);
          if (bridge && attemptStitch(bridge, point)) {
            input.pointerMode = "idle";
            input.stitchLane = null;
          }
        }
        event.preventDefault();
      }

      function releasePointer(event) {
        if (event && input.pointerId !== null && event.pointerId !== input.pointerId) {
          return;
        }
        input.pointerMode = "idle";
        input.pointerId = null;
        input.stitchLane = null;
        safeReleasePointerCapture(canvas, event?.pointerId);
      }

      function bindMobileHold(control) {
        const button = document.querySelector(`[data-control="${control}"]`);
        if (!button) {
          return;
        }
        const on = (event) => {
          event.preventDefault();
          if (state.mode !== "running") {
            startStage();
          }
          input[control] = true;
          button.dataset.active = "true";
          safeSetPointerCapture(button, event.pointerId);
        };
        const off = (event) => {
          if (event) {
            event.preventDefault();
          }
          input[control] = false;
          button.dataset.active = "false";
        };
        button.addEventListener("pointerdown", on);
        button.addEventListener("pointerup", off);
        button.addEventListener("pointercancel", off);
        button.addEventListener("lostpointercapture", off);
      }

      function bindCutButton() {
        const button = document.querySelector('[data-control="cut"]');
        if (!button) {
          return;
        }
        const activate = (event) => {
          event.preventDefault();
          if (state.mode !== "running") {
            startStage();
          }
          button.dataset.active = "true";
          cutThreads(true);
          setTimeout(() => {
            button.dataset.active = "false";
          }, 120);
        };
        button.addEventListener("pointerdown", activate);
      }

      function setKeyState(event, pressed) {
        const key = event.key.toLowerCase();
        if (key === "arrowup" || key === "w") input.up = pressed;
        if (key === "arrowdown" || key === "s") input.down = pressed;
        if (key === "arrowleft" || key === "a") input.left = pressed;
        if (key === "arrowright" || key === "d") input.right = pressed;
        if ((key === "enter" || key === " ") && pressed && state.mode !== "running") {
          startStage();
        }
        if ((key === "x" || key === "c") && pressed && state.mode === "running") {
          cutThreads(true);
        }
        if (key === "f" && pressed && document.fullscreenElement !== canvas) {
          canvas.requestFullscreen?.().catch(() => {});
        }
      }

      function movePlayer(dt) {
        let moveX = 0;
        let moveY = 0;
        if (input.left) moveX -= 1;
        if (input.right) moveX += 1;
        if (input.up) moveY -= 1;
        if (input.down) moveY += 1;

        if (moveX === 0 && moveY === 0 && input.moveTarget) {
          const dx = input.moveTarget.x - state.player.x;
          const dy = input.moveTarget.y - state.player.y;
          const distance = Math.hypot(dx, dy);
          if (distance > 8) {
            moveX = dx / distance;
            moveY = dy / distance;
          } else {
            input.moveTarget = null;
          }
        }

        const moveLength = Math.hypot(moveX, moveY);
        if (moveLength < 0.001) {
          return;
        }
        const nx = moveX / moveLength;
        const ny = moveY / moveLength;
        const distance = PLAYER_SPEED * dt;
        const nextX = state.player.x + nx * distance;
        const nextY = state.player.y + ny * distance;
        if (isPassable(nextX, nextY)) {
          state.player.x = nextX;
          state.player.y = nextY;
          return;
        }
        if (isPassable(nextX, state.player.y)) {
          state.player.x = nextX;
        }
        if (isPassable(state.player.x, nextY)) {
          state.player.y = nextY;
        }
      }

      function updateAltars(dt) {
        let litCount = 0;
        state.altars.forEach((altarState, index) => {
          const altar = altars[index];
          const inside = pointDistance(state.player.x, state.player.y, altar.x, altar.y) <= ALTAR_RADIUS - 12;
          if (altarState.lit) {
            altarState.glow = clamp(altarState.glow + dt * 2.3, 0.5, 1);
            litCount += 1;
            return;
          }
          altarState.glow = Math.max(0, altarState.glow - dt * 1.8);
          if (!inside || state.combo <= 0) {
            altarState.charge = Math.max(0, altarState.charge - dt * 0.8);
            return;
          }
          altarState.charge += dt / LIGHT_HOLD_TIME;
          altarState.glow = clamp(altarState.charge, 0, 1);
          if (altarState.charge >= 1) {
            altarState.lit = true;
            altarState.glow = 1;
            litCount += 1;
            state.combo += 1;
            state.comboTimer = COMBO_WINDOW + 0.55;
            state.threadHeat = Math.max(6, state.threadHeat - 10);
            state.flashAlpha = Math.max(state.flashAlpha, 0.2);
            emitPopup("제단 점등", altar.x, altar.y - 34, "rgba(255, 246, 196, 0.96)");
            spawnSparkBurst(altar.x, altar.y, altar.hue, 18, 170);
          }
        });
        if (litCount === altars.length && state.mode === "running") {
          clearStage();
        }
      }

      function updateHeat(dt) {
        state.playerExposure = getLightIntensity(state.player.x, state.player.y);
        let bridgeExposure = 0;
        bridges.forEach((bridge) => {
          if (!bridge.active) {
            return;
          }
          const midX = (bridge.startX + bridge.endX) / 2;
          const midY = (bridge.startY + bridge.endY) / 2;
          bridgeExposure = Math.max(bridgeExposure, getLightIntensity(midX, midY));
        });
        state.bridgeExposure = bridgeExposure;
        const incoming = Math.max(0, state.playerExposure - 0.28) * 24 + Math.max(0, bridgeExposure - 0.38) * 18;
        const cooling = incoming > 1 ? 2.2 : 8.5;
        state.threadHeat = clamp(state.threadHeat + (incoming - cooling) * dt, 0, MAX_THREAD_HEAT);
        state.player.glow = Math.max(state.player.glow - dt * 1.7, state.playerExposure * 0.9);
        if (incoming > 6) {
          state.flashAlpha = Math.max(state.flashAlpha, 0.11 + incoming * 0.005);
          state.shake = Math.max(state.shake, 2 + incoming * 0.14);
          if (Math.random() < dt * 18) {
            spawnSparkBurst(state.player.x, state.player.y, 18, 5, 80);
          }
        }
        if (state.threadHeat >= MAX_THREAD_HEAT - 0.1) {
          failStage("thread_burned");
        }
      }

      function updateParticles(dt) {
        state.popups = state.popups.filter((popup) => {
          popup.ttl -= dt;
          popup.rise += dt * 30;
          return popup.ttl > 0;
        });
        state.particles = state.particles.filter((particle) => {
          particle.ttl -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.965;
          particle.vy *= 0.965;
          return particle.ttl > 0;
        });
        state.arcs = state.arcs.filter((arc) => {
          arc.ttl -= dt;
          return arc.ttl > 0;
        });
      }

      function update(dt) {
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * 0.7);
        state.shake = Math.max(0, state.shake - dt * 18);
        state.lightningPulse = Math.max(0, state.lightningPulse - dt * 1.6);
        state.stormOffset += dt * (REDUCE_MOTION ? 6 : 15);
        state.rainPhase += dt * (REDUCE_MOTION ? 0.5 : 1.2);
        state.sweep += dt * (REDUCE_MOTION ? 0.36 : 0.72);
        updateBridgeWindows();
        updateParticles(dt);
        bridges.forEach((bridge) => {
          bridge.stitchCooldown = Math.max(0, bridge.stitchCooldown - dt);
        });

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        movePlayer(dt);
        state.player.pulse += dt * 3.5;

        bridges.forEach((bridge) => {
          if (!bridge.active) {
            return;
          }
          bridge.timer -= dt;
          if (bridge.timer <= 0) {
            bridge.active = false;
            bridge.timer = 0;
          }
        });

        if (state.combo > 0) {
          state.comboTimer -= dt;
          if (state.comboTimer <= 0) {
            breakCombo("combo_broken");
          }
        }

        updateAltars(dt);
        updateHeat(dt);

        if (state.mode === "running" && !anyAltarsUnlit() && state.altars.every((altar) => altar.lit)) {
          clearStage();
        }
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#091723");
        sky.addColorStop(0.55, "#071119");
        sky.addColorStop(1, "#04060c");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const vortex = ctx.createRadialGradient(CENTER.x, CENTER.y - 10, 30, CENTER.x, CENTER.y, 340);
        vortex.addColorStop(0, "rgba(57, 111, 149, 0.18)");
        vortex.addColorStop(0.55, "rgba(23, 49, 76, 0.12)");
        vortex.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = vortex;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.72;
        for (let index = 0; index < 4; index += 1) {
          const x = ((state.stormOffset * (20 + index * 6)) % 1300) - 260;
          const y = 54 + index * 52;
          const gradient = ctx.createRadialGradient(x, y, 10, x, y, 180);
          gradient.addColorStop(0, "rgba(48, 88, 116, 0.22)");
          gradient.addColorStop(1, "rgba(7, 16, 24, 0)");
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.ellipse(x, y, 220, 56 + index * 3, 0.12 * index, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(148, 214, 255, 0.08)";
        ctx.lineWidth = 1;
        for (let index = 0; index < 16; index += 1) {
          const x = (index * 37 + state.rainPhase * 120) % (VIEW.width + 80) - 40;
          const y = (index * 28 + state.rainPhase * 260) % (VIEW.height + 80) - 40;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x - 18, y + 40);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawArchitecture() {
        ctx.save();
        ctx.strokeStyle = "rgba(140, 211, 255, 0.06)";
        ctx.lineWidth = 2;
        for (let index = 0; index < 4; index += 1) {
          ctx.beginPath();
          ctx.moveTo(80, 154 + index * 82);
          ctx.lineTo(880, 154 + index * 82);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawLightBeams() {
        const beams = getBeams();
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        beams.forEach((beam) => {
          ctx.fillStyle = `hsla(${beam.hue}, 95%, 76%, 0.09)`;
          ctx.beginPath();
          ctx.moveTo(beam.x, beam.y);
          ctx.arc(beam.x, beam.y, beam.radius, beam.angle - beam.spread, beam.angle + beam.spread);
          ctx.closePath();
          ctx.fill();
        });
        ctx.restore();
      }

      function drawRiftRing() {
        ctx.save();
        bridges.forEach((bridge) => {
          const gradient = ctx.createLinearGradient(bridge.startX, bridge.startY, bridge.endX, bridge.endY);
          gradient.addColorStop(0, "rgba(16, 17, 29, 0.88)");
          gradient.addColorStop(0.5, "rgba(36, 73, 96, 0.72)");
          gradient.addColorStop(1, "rgba(18, 17, 26, 0.88)");
          ctx.strokeStyle = gradient;
          ctx.lineWidth = 34;
          ctx.lineCap = "round";
          ctx.shadowColor = "rgba(58, 150, 198, 0.26)";
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.moveTo(bridge.startX, bridge.startY);
          ctx.lineTo(bridge.endX, bridge.endY);
          ctx.stroke();

          ctx.shadowBlur = 0;
          const stitchColor =
            bridge.stitchWindow > 0.16
              ? `rgba(160, 241, 255, ${0.2 + bridge.stitchWindow * 0.5})`
              : "rgba(255, 154, 114, 0.18)";
          ctx.strokeStyle = stitchColor;
          ctx.lineWidth = 3;
          ctx.setLineDash([10, 9]);
          ctx.lineDashOffset = -state.elapsed * 40;
          ctx.beginPath();
          ctx.moveTo(bridge.startX, bridge.startY);
          ctx.lineTo(bridge.endX, bridge.endY);
          ctx.stroke();
          ctx.setLineDash([]);
        });
        ctx.restore();
      }

      function drawPlatform(x, y, radius, hue, lit, charge) {
        ctx.save();
        const base = ctx.createRadialGradient(x - radius * 0.2, y - radius * 0.4, 12, x, y, radius * 1.3);
        base.addColorStop(0, `hsla(${hue}, 58%, ${lit ? 48 : 26}%, 0.95)`);
        base.addColorStop(0.5, `hsla(${hue}, 32%, ${lit ? 22 : 12}%, 0.95)`);
        base.addColorStop(1, "rgba(4, 9, 15, 0.96)");
        ctx.fillStyle = base;
        ctx.shadowColor = lit ? `hsla(${hue}, 90%, 70%, 0.55)` : "rgba(0, 0, 0, 0.4)";
        ctx.shadowBlur = lit ? 16 : 8;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = lit
          ? `hsla(${hue}, 95%, 84%, ${0.72 + charge * 0.2})`
          : "rgba(152, 214, 255, 0.18)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(x, y, radius - 10, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = lit
          ? `hsla(${hue}, 100%, 78%, ${0.55 + charge * 0.35})`
          : "rgba(98, 164, 200, 0.16)";
        ctx.lineWidth = 2;
        for (let index = 0; index < 5; index += 1) {
          const angle = state.elapsed * 0.7 + index * ((Math.PI * 2) / 5);
          ctx.beginPath();
          ctx.arc(x, y, radius - 20 + Math.sin(angle * 1.7) * 2, angle, angle + 0.65);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawHubAndAltars() {
        drawPlatform(CENTER.x, CENTER.y, HUB_RADIUS + 8, 202, true, 0.7);
        ctx.save();
        ctx.fillStyle = "rgba(180, 231, 255, 0.08)";
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, HUB_RADIUS + 34, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        altars.forEach((altar, index) => {
          const altarState = state.altars[index];
          drawPlatform(altar.x, altar.y, ALTAR_RADIUS, altar.hue, altarState.lit, altarState.glow);

          ctx.save();
          ctx.translate(altar.x, altar.y - 8);
          ctx.fillStyle = altarState.lit
            ? `hsla(${altar.hue}, 100%, 74%, 0.95)`
            : "rgba(145, 188, 212, 0.28)";
          ctx.shadowColor = altarState.lit
            ? `hsla(${altar.hue}, 100%, 72%, 0.75)`
            : "rgba(88, 129, 152, 0.22)";
          ctx.shadowBlur = altarState.lit ? 24 : 10;
          ctx.beginPath();
          ctx.moveTo(0, -28);
          ctx.lineTo(16, -4);
          ctx.lineTo(0, 26);
          ctx.lineTo(-16, -4);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });
      }

      function drawAnchorsAndBridges() {
        bridges.forEach((bridge) => {
          const altar = altars[bridge.altarIndex];
          const activeAlpha = bridge.active ? 1 : 0;
          if (bridge.active) {
            ctx.save();
            ctx.strokeStyle = `hsla(${altar.hue}, 92%, 76%, ${0.62 + Math.sin(state.elapsed * 8) * 0.08})`;
            ctx.lineWidth = 20;
            ctx.lineCap = "round";
            ctx.shadowColor = `hsla(${altar.hue}, 100%, 72%, 0.72)`;
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(bridge.startX, bridge.startY);
            ctx.lineTo(bridge.endX, bridge.endY);
            ctx.stroke();

            ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
            ctx.lineWidth = 2;
            ctx.setLineDash([12, 12]);
            ctx.lineDashOffset = -state.elapsed * 80;
            ctx.beginPath();
            ctx.moveTo(bridge.startX, bridge.startY);
            ctx.lineTo(bridge.endX, bridge.endY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
          }

          const anchorGlow = bridge.active ? 0.92 : 0.24 + bridge.stitchWindow * 0.5;
          for (const [x, y] of [
            [bridge.startX, bridge.startY],
            [bridge.endX, bridge.endY],
          ]) {
            ctx.save();
            ctx.fillStyle =
              bridge.stitchWindow > 0.16
                ? `rgba(183, 244, 255, ${0.34 + bridge.stitchWindow * 0.44})`
                : "rgba(255, 171, 145, 0.24)";
            ctx.shadowColor =
              bridge.stitchWindow > 0.16
                ? "rgba(177, 239, 255, 0.78)"
                : "rgba(255, 161, 125, 0.34)";
            ctx.shadowBlur = 16 + anchorGlow * 12 + activeAlpha * 10;
            ctx.beginPath();
            ctx.arc(x, y, 8 + activeAlpha * 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        });

        if (input.pointerMode === "stitch") {
          const bridge = bridges.find((item) => item.id === input.stitchLane);
          if (bridge) {
            ctx.save();
            ctx.strokeStyle = "rgba(198, 246, 255, 0.94)";
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            ctx.shadowColor = "rgba(198, 246, 255, 0.9)";
            ctx.shadowBlur = 16;
            ctx.beginPath();
            ctx.moveTo(bridge.startX, bridge.startY);
            ctx.lineTo(input.pointerWorld.x, input.pointerWorld.y);
            ctx.stroke();
            ctx.restore();
          }
        }
      }

      function drawPlayer() {
        const exposure = state.playerExposure;
        ctx.save();
        ctx.translate(state.player.x, state.player.y);
        ctx.shadowColor = exposure > 0.4 ? "rgba(255, 196, 144, 0.82)" : "rgba(106, 214, 255, 0.4)";
        ctx.shadowBlur = 10 + state.player.glow * 10;
        const cloak = ctx.createLinearGradient(0, -26, 0, 24);
        cloak.addColorStop(0, "#dceeff");
        cloak.addColorStop(0.35, "#5c97be");
        cloak.addColorStop(1, "#163046");
        ctx.fillStyle = cloak;
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.quadraticCurveTo(18, -8, 15, 18);
        ctx.quadraticCurveTo(0, 28, -15, 18);
        ctx.quadraticCurveTo(-18, -8, 0, -20);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = exposure > 0.45 ? "#ffe1c5" : "#e6f7ff";
        ctx.beginPath();
        ctx.arc(0, -24, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = exposure > 0.55 ? "rgba(255, 161, 114, 0.95)" : "rgba(188, 243, 255, 0.95)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 18 + Math.sin(state.player.pulse) * 1.8, -1.1, 1.2);
        ctx.stroke();
        ctx.restore();
      }

      function drawEffects() {
        ctx.save();
        state.arcs.forEach((arc) => {
          const alpha = arc.ttl / arc.life;
          ctx.fillStyle = `hsla(${arc.hue}, 100%, 82%, ${alpha * 0.75})`;
          ctx.beginPath();
          ctx.arc(arc.x, arc.y, 5 * alpha, 0, Math.PI * 2);
          ctx.fill();
        });
        state.particles.forEach((particle) => {
          const alpha = particle.ttl / particle.life;
          ctx.fillStyle = `hsla(${particle.hue}, 100%, 74%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();
      }

      function drawHudPanel(x, y, width, height, accent) {
        ctx.save();
        ctx.fillStyle = "rgba(6, 16, 24, 0.72)";
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, 18);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawHud() {
        drawHudPanel(18, 18, 224, 106, "rgba(163, 226, 255, 0.16)");
        ctx.fillStyle = "#f3fbff";
        ctx.font = "700 14px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("STORM ARCHIVE", 34, 42);
        ctx.font = "800 28px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "#9ee7ff";
        ctx.fillText(String(state.combo).padStart(2, "0"), 34, 76);
        ctx.font = "700 12px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(232, 247, 255, 0.78)";
        ctx.fillText("콤보", 88, 63);
        ctx.fillText(`단절 ${state.comboBreaks}/${MAX_BREAKS}`, 88, 82);
        ctx.fillText(`점등 ${state.altars.filter((altar) => altar.lit).length}/4`, 88, 101);

        const comboWidth = 178;
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(34, 92, comboWidth, 10);
        const comboRatio = state.combo > 0 ? clamp(state.comboTimer / (COMBO_WINDOW + 0.8), 0, 1) : 0;
        const comboGradient = ctx.createLinearGradient(34, 0, 34 + comboWidth, 0);
        comboGradient.addColorStop(0, "#64f1ff");
        comboGradient.addColorStop(1, "#d8fff3");
        ctx.fillStyle = comboGradient;
        ctx.fillRect(34, 92, comboWidth * comboRatio, 10);

        drawHudPanel(VIEW.width - 238, 18, 220, 106, "rgba(255, 196, 162, 0.16)");
        ctx.fillStyle = "#f3fbff";
        ctx.font = "700 14px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("THREAD HEAT", VIEW.width - 220, 42);
        ctx.font = "800 26px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = state.threadHeat > 68 ? "#ffb48c" : "#ffe7bf";
        ctx.fillText(`${Math.round(state.threadHeat)}%`, VIEW.width - 220, 77);
        ctx.font = "700 12px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(255, 236, 219, 0.78)";
        ctx.fillText(`빛 노출 ${Math.round(state.playerExposure * 100)}%`, VIEW.width - 220, 98);
        ctx.fillText(`다리 노출 ${Math.round(state.bridgeExposure * 100)}%`, VIEW.width - 220, 114);

        const heatWidth = 168;
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(VIEW.width - 220, 86, heatWidth, 10);
        const heatGradient = ctx.createLinearGradient(VIEW.width - 220, 0, VIEW.width - 220 + heatWidth, 0);
        heatGradient.addColorStop(0, "#ffefb0");
        heatGradient.addColorStop(0.6, "#ff9a7a");
        heatGradient.addColorStop(1, "#ff533d");
        ctx.fillStyle = heatGradient;
        ctx.fillRect(VIEW.width - 220, 86, heatWidth * (state.threadHeat / MAX_THREAD_HEAT), 10);

        if (state.mode === "running") {
          drawHudPanel(246, 18, 468, 56, "rgba(194, 245, 255, 0.1)");
          ctx.fillStyle = "rgba(240, 252, 255, 0.9)";
          ctx.font = "700 14px Trebuchet MS, Segoe UI, sans-serif";
          ctx.fillText(metaCopy.clearCondition, 264, 41);
          ctx.fillStyle = "rgba(255, 201, 175, 0.86)";
          ctx.fillText(metaCopy.failCondition, 264, 60);
        }
      }

      function drawOverlayCard(title, subtitle, accent) {
        const width = Math.min(VIEW.width - 48, 612);
        const height = 258;
        const x = (VIEW.width - width) / 2;
        const y = (VIEW.height - height) / 2;
        ctx.save();
        ctx.fillStyle = "rgba(3, 9, 14, 0.84)";
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        ctx.shadowColor = "rgba(0, 0, 0, 0.34)";
        ctx.shadowBlur = 26;
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, 28);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.stroke();

        ctx.fillStyle = "#f7fdff";
        ctx.font = "800 34px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(title, x + 28, y + 54);
        ctx.font = "700 16px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "rgba(233, 247, 255, 0.86)";
        ctx.fillText(subtitle, x + 28, y + 82);

        ctx.font = "700 15px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = "#9ee7ff";
        ctx.fillText(metaCopy.controls, x + 28, y + 122, width - 56);
        ctx.fillStyle = "rgba(239, 249, 255, 0.92)";
        ctx.fillText(metaCopy.clearCondition, x + 28, y + 154, width - 56);
        ctx.fillStyle = "rgba(255, 213, 190, 0.92)";
        ctx.fillText(metaCopy.failCondition, x + 28, y + 184, width - 56);
        ctx.fillStyle = "rgba(207, 248, 255, 0.95)";
        ctx.fillText("Enter/터치 시작, X 또는 더블탭으로 실끊기, F 전체화면", x + 28, y + 222, width - 56);
        ctx.restore();
      }

      function drawModeOverlays() {
        if (state.mode === "menu") {
          drawOverlayCard(
            "Storm Archive: Shadow Stitch",
            "빛의 칼날이 훑는 경계선만 꿰매 다리로 바꿔 네 제단을 한 콤보로 점등하세요.",
            "rgba(155, 236, 255, 0.42)"
          );
          return;
        }
        if (state.mode === "failed") {
          const label =
            state.lastReason === "combo_broken" ? "콤보 붕괴로 문양이 되감겼습니다." : "강한 빛이 실을 태워 봉합이 무너졌습니다.";
          drawOverlayCard("봉합 실패", `${label} ${state.lastRunTime.toFixed(1)}초`, "rgba(255, 180, 156, 0.44)");
          return;
        }
        if (state.mode === "cleared") {
          drawOverlayCard(
            "아카이브 봉합 완료",
            `${state.lastRunTime.toFixed(1)}초 동안 콤보를 유지하며 네 제단을 모두 점등했습니다.`,
            "rgba(192, 255, 218, 0.42)"
          );
        }
      }

      function drawPopups() {
        ctx.save();
        state.popups.forEach((popup) => {
          const alpha = popup.ttl / popup.life;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "800 18px Trebuchet MS, Segoe UI, sans-serif";
          ctx.fillText(popup.text, popup.x, popup.y - popup.rise);
        });
        ctx.restore();
      }

      function drawFlash() {
        if (state.flashAlpha <= 0.001) {
          return;
        }
        ctx.save();
        ctx.fillStyle = `rgba(206, 239, 255, ${state.flashAlpha * 0.35})`;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.restore();
      }

      function render() {
        ctx.save();
        const shakeX = (Math.random() - 0.5) * state.shake;
        const shakeY = (Math.random() - 0.5) * state.shake;
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawArchitecture();
        drawLightBeams();
        drawRiftRing();
        drawHubAndAltars();
        drawAnchorsAndBridges();
        drawEffects();
        drawPlayer();
        drawHud();
        drawPopups();
        drawModeOverlays();
        drawFlash();
        ctx.restore();
      }

      function frame(timestamp) {
        if (manualStepping) {
          loopActive = false;
          animationFrame = 0;
          lastTimestamp = 0;
          return;
        }
        loopActive = true;
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000 || FIXED_DT);
        lastTimestamp = timestamp;
        update(dt);
        render();
        const shouldContinue =
          state.mode === "running" ||
          state.flashAlpha > 0.01 ||
          state.shake > 0.01 ||
          state.popups.length > 0 ||
          state.particles.length > 0 ||
          state.arcs.length > 0;
        if (shouldContinue) {
          animationFrame = window.requestAnimationFrame(frame);
          return;
        }
        loopActive = false;
        animationFrame = 0;
        lastTimestamp = 0;
      }

      function requestTick() {
        if (loopActive || manualStepping) {
          return;
        }
        loopActive = true;
        animationFrame = window.requestAnimationFrame(frame);
      }

      function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          note: "origin=centered top-down canvas, x right, y down",
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
          },
          combo: state.combo,
          comboTimer: Number(state.comboTimer.toFixed(2)),
          comboBreaks: state.comboBreaks,
          threadHeat: Number(state.threadHeat.toFixed(1)),
          playerExposure: Number(state.playerExposure.toFixed(2)),
          litAltars: state.altars.filter((altar) => altar.lit).map((altar) => altar.id),
          altarCharge: state.altars.map((altar) => Number(altar.charge.toFixed(2))),
          bridges: bridges.map((bridge) => ({
            id: bridge.id,
            active: bridge.active,
            timer: Number(bridge.timer.toFixed(2)),
            stitchWindow: Number(bridge.stitchWindow.toFixed(2)),
          })),
        });
      }

      function advanceTime(ms) {
        manualStepping = true;
        if (animationFrame) {
          window.cancelAnimationFrame(animationFrame);
        }
        animationFrame = 0;
        loopActive = false;
        lastTimestamp = 0;
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        manualStepping = false;
      }

      function forceClear() {
        if (state.mode !== "running") {
          startStage();
        }
        state.altars.forEach((altar) => {
          altar.lit = true;
          altar.charge = 1;
          altar.glow = 1;
        });
        state.combo = Math.max(state.combo, 6);
        clearStage();
        render();
        requestTick();
      }

      function forceFail() {
        if (state.mode !== "running") {
          startStage();
        }
        state.threadHeat = MAX_THREAD_HEAT;
        failStage("debug_fail");
        render();
        requestTick();
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceTime;
      window.relayStageMeta = {
        id: "storm-archive-shadow-stitch-combo",
        title: "Storm Archive: Shadow Stitch",
        creator: "jungcollin",
        genre: "Light-shadow action / 콤보 임계치",
        clearCondition: metaCopy.clearCondition,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = { forceClear, forceFail };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("keydown", (event) => setKeyState(event, true));
      window.addEventListener("keyup", (event) => setKeyState(event, false));
      document.addEventListener("fullscreenchange", () => {
        canvas.focus();
      });

      bindMobileHold("up");
      bindMobileHold("left");
      bindMobileHold("down");
      bindMobileHold("right");
      bindCutButton();

      reportReadyToHost();
      render();

      window.addEventListener("beforeunload", () => {
        if (animationFrame) {
          window.cancelAnimationFrame(animationFrame);
        }
      });
    </script>
  </body>
</html>
