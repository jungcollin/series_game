<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>바람 다트</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #E8F0F2; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(70, 130, 180, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(44, 62, 80, 0.92);
        color: #E8F0F2; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #E8F0F2; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(70, 130, 180, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">바람 다트. 드래그로 조준하고 손을 떼면 다트가 발사됩니다. 바람이 다트 궤적을 휘게 합니다. 과녁 중심부를 5회 명중하면 클리어. 다트 10개 소진 또는 40초 초과 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="바람 다트" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = 960, H = 540, CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60, MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "wind-darts", title: "바람 다트",
        description: "바람을 읽고 다트를 던져 과녁을 맞추세요",
        creator: "jungcollin", genre: "Physics aiming",
        clearCondition: "과녁 5회 명중 시 클리어",
        failCondition: "다트 소진 또는 40초 초과 시 실패",
        controls: "드래그로 조준, 손 떼면 발사",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const COL = { sky: "#D4E8F0", skyDark: "#A8C8D8", board: "#C8956C", boardDark: "#8B6340", target: "#C0392B", targetWhite: "#F5F0E8", bullseye: "#E74C3C", dartBody: "#4A6478", dartTip: "#BDC3C7", text: "#2C3E50", accent: "#2980B9", miss: "#C0392B", success: "#27AE60", wind: "#5DADE2", grass: "#7CB342" };

      const DURATION = 40, TARGET_HITS = 5, MAX_DARTS = 10;
      const BOARD_X = 720, BOARD_Y = 240, BOARD_R = 90;
      const THROW_X = 200, THROW_Y = 400;

      let mode = "menu", elapsed = 0, hits = 0, dartsUsed = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, shakeX = 0, shakeY = 0;
      let clearAnim = 0;

      // Wind
      let windX = 0, windY = 0, windTimer = 0;
      let targetWindX = 0, targetWindY = 0;

      // Drag aiming
      let dragging = false, dragStartX = 0, dragStartY = 0, dragX = 0, dragY = 0;

      // Flying dart
      let dart = null; // { x, y, vx, vy }
      let stuckDarts = []; // darts stuck in board

      // Particles
      let particles = [];
      let feedbackText = "", feedbackTimer = 0, feedbackColor = "";

      // Wind streamers (visual)
      let streamers = [];
      for (let i = 0; i < 12; i++) streamers.push({ x: Math.random() * W, y: Math.random() * H * 0.7, phase: Math.random() * Math.PI * 2 });

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function newWind() {
        targetWindX = rand(-120, 120);
        targetWindY = rand(-60, 60);
        windTimer = rand(2, 4);
      }

      function startGame() {
        mode = "running"; elapsed = 0; hits = 0; dartsUsed = 0;
        shake = 0; clearAnim = 0; dart = null; stuckDarts = [];
        particles = []; dragging = false;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        windX = 0; windY = 0; newWind();
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), spd = rand(30, 120);
          particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, life: 1, size: rand(2, 5), color });
        }
      }

      function throwDart(vx, vy) {
        if (dart || mode !== "running") return;
        dartsUsed++;
        dart = { x: THROW_X, y: THROW_Y, vx, vy };
      }

      function onDartLand() {
        const d = dist(dart.x, dart.y, BOARD_X, BOARD_Y);
        if (d < BOARD_R + 10) {
          // Hit the board
          stuckDarts.push({ x: dart.x, y: dart.y, angle: Math.atan2(dart.vy, dart.vx) });
          if (d < 25) {
            hits++; shake = 0.3;
            spawnParticles(dart.x, dart.y, 20, COL.bullseye);
            feedbackText = "명중!"; feedbackTimer = 1.0; feedbackColor = COL.success;
            if (hits >= TARGET_HITS) { mode = "cleared"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); }
          } else if (d < 55) {
            hits++; shake = 0.15;
            spawnParticles(dart.x, dart.y, 10, COL.accent);
            feedbackText = "좋아요!"; feedbackTimer = 0.8; feedbackColor = COL.accent;
            if (hits >= TARGET_HITS) { mode = "cleared"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); }
          } else {
            spawnParticles(dart.x, dart.y, 5, COL.boardDark);
            feedbackText = "아깝다!"; feedbackTimer = 0.8; feedbackColor = "#E67E22";
          }
        } else {
          feedbackText = "빗나감!"; feedbackTimer = 0.8; feedbackColor = COL.miss;
        }
        dart = null;
        if (dartsUsed >= MAX_DARTS && hits < TARGET_HITS && mode === "running") {
          mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("다트 소진");
        }
      }

      function update(dt) {
        if (mode === "running") {
          elapsed += dt;
          if (elapsed >= DURATION) { mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("시간 초과"); return; }

          // Wind update
          windTimer -= dt;
          if (windTimer <= 0) newWind();
          windX = lerp(windX, targetWindX, dt * 2);
          windY = lerp(windY, targetWindY, dt * 2);

          // Dart physics
          if (dart) {
            dart.x += dart.vx * dt;
            dart.y += dart.vy * dt;
            dart.vx += windX * dt * 0.8;
            dart.vy += windY * dt * 0.8 + 80 * dt; // gravity
            // Check if reached board area or out of bounds
            if (dart.x > BOARD_X - 10 || dart.x > W + 20 || dart.y > H + 20 || dart.y < -50) {
              onDartLand();
            }
          }
        }

        if (mode === "cleared") clearAnim = Math.min(1, clearAnim + dt * 1.5);
        if (shake > 0) { shake = Math.max(0, shake - dt * 4); shakeX = (Math.random() - 0.5) * shake * 16; shakeY = (Math.random() - 0.5) * shake * 16; } else { shakeX = 0; shakeY = 0; }
        for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.life -= dt * 2; if (p.life <= 0) { particles.splice(i, 1); continue; } p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 60 * dt; }
        if (feedbackTimer > 0) feedbackTimer -= dt;
        for (const s of streamers) s.phase += dt * 2;
      }

      function drawBg() {
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#87CEEB"); grad.addColorStop(0.6, "#B0D4E8"); grad.addColorStop(1, "#D4E8D0");
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

        // Ground
        ctx.fillStyle = COL.grass; ctx.fillRect(0, H * 0.78, W, H * 0.22);
        ctx.fillStyle = "#6BA03A"; ctx.fillRect(0, H * 0.78, W, 4);

        // Clouds
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        for (const cx of [150, 400, 700]) {
          ctx.beginPath(); ctx.ellipse(cx, 60, 60, 25, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(cx + 30, 50, 40, 20, 0, 0, Math.PI * 2); ctx.fill();
        }

        // Wind streamers
        if (mode === "running") {
          ctx.strokeStyle = "rgba(93,173,226,0.3)";
          ctx.lineWidth = 2;
          for (const s of streamers) {
            const wx = windX * 0.01;
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.quadraticCurveTo(s.x + wx * 30 + Math.sin(s.phase) * 10, s.y + Math.cos(s.phase) * 5, s.x + wx * 60, s.y + Math.sin(s.phase + 1) * 8);
            ctx.stroke();
          }
        }
      }

      function drawBoard() {
        // Stand
        ctx.fillStyle = COL.boardDark;
        ctx.fillRect(BOARD_X - 8, BOARD_Y + BOARD_R, 16, H * 0.78 - BOARD_Y - BOARD_R + 10);

        // Board back
        ctx.fillStyle = COL.board;
        ctx.beginPath(); ctx.arc(BOARD_X, BOARD_Y, BOARD_R + 8, 0, Math.PI * 2); ctx.fill();

        // Target rings
        const rings = [
          { r: BOARD_R, color: COL.targetWhite },
          { r: 72, color: COL.target },
          { r: 55, color: COL.targetWhite },
          { r: 38, color: COL.target },
          { r: 25, color: COL.targetWhite },
          { r: 12, color: COL.bullseye },
        ];
        for (const ring of rings) {
          ctx.fillStyle = ring.color;
          ctx.beginPath(); ctx.arc(BOARD_X, BOARD_Y, ring.r, 0, Math.PI * 2); ctx.fill();
        }

        // Cross lines
        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(BOARD_X - BOARD_R, BOARD_Y); ctx.lineTo(BOARD_X + BOARD_R, BOARD_Y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(BOARD_X, BOARD_Y - BOARD_R); ctx.lineTo(BOARD_X, BOARD_Y + BOARD_R); ctx.stroke();

        // Stuck darts
        for (const sd of stuckDarts) {
          ctx.save(); ctx.translate(sd.x, sd.y); ctx.rotate(sd.angle);
          ctx.fillStyle = COL.dartBody; ctx.fillRect(-16, -2, 20, 4);
          ctx.fillStyle = COL.dartTip; ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(-2, -4); ctx.lineTo(-2, 4); ctx.closePath(); ctx.fill();
          // Flights
          ctx.fillStyle = COL.accent; ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(-22, -6); ctx.lineTo(-22, 0); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(-16, 0); ctx.lineTo(-22, 6); ctx.lineTo(-22, 0); ctx.closePath(); ctx.fill();
          ctx.restore();
        }
      }

      function drawDart() {
        if (!dart) return;
        const angle = Math.atan2(dart.vy, dart.vx);
        ctx.save(); ctx.translate(dart.x, dart.y); ctx.rotate(angle);
        ctx.fillStyle = COL.dartBody; ctx.fillRect(-18, -3, 24, 6);
        ctx.fillStyle = COL.dartTip;
        ctx.beginPath(); ctx.moveTo(6, 0); ctx.lineTo(-2, -5); ctx.lineTo(-2, 5); ctx.closePath(); ctx.fill();
        ctx.fillStyle = COL.accent;
        ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-26, -8); ctx.lineTo(-26, 0); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-26, 8); ctx.lineTo(-26, 0); ctx.closePath(); ctx.fill();
        ctx.restore();
      }

      function drawAimLine() {
        if (!dragging || dart) return;
        const dx = dragStartX - dragX, dy = dragStartY - dragY;
        const power = Math.min(Math.hypot(dx, dy), 200);
        const angle = Math.atan2(dy, dx);

        // Power bar
        ctx.fillStyle = "rgba(44,62,80,0.3)";
        ctx.fillRect(THROW_X - 40, THROW_Y + 30, 80, 8);
        const pRatio = power / 200;
        ctx.fillStyle = pRatio > 0.8 ? COL.miss : COL.accent;
        ctx.fillRect(THROW_X - 40, THROW_Y + 30, 80 * pRatio, 8);

        // Trajectory preview (dotted)
        ctx.strokeStyle = "rgba(41,128,185,0.5)"; ctx.lineWidth = 2; ctx.setLineDash([4, 6]);
        ctx.beginPath(); ctx.moveTo(THROW_X, THROW_Y);
        let px = THROW_X, py = THROW_Y;
        const vx = Math.cos(angle) * power * 3, vy = Math.sin(angle) * power * 3;
        let tvx = vx, tvy = vy;
        for (let i = 0; i < 15; i++) {
          const t = 0.02;
          px += tvx * t; py += tvy * t;
          tvy += 80 * t;
          ctx.lineTo(px, py);
        }
        ctx.stroke(); ctx.setLineDash([]);

        // Throw origin
        ctx.fillStyle = COL.accent;
        ctx.beginPath(); ctx.arc(THROW_X, THROW_Y, 8, 0, Math.PI * 2); ctx.fill();
      }

      function drawWindIndicator() {
        if (mode !== "running") return;
        const wx = 120, wy = 90;
        // Background
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath(); ctx.roundRect(wx - 45, wy - 35, 90, 70, 10); ctx.fill();
        ctx.fillStyle = COL.text; ctx.font = "bold 14px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText("바람", wx, wy - 18);

        // Wind arrow
        const wLen = Math.hypot(windX, windY);
        if (wLen > 5) {
          const wa = Math.atan2(windY, windX);
          const arrowLen = Math.min(wLen * 0.2, 22);
          ctx.strokeStyle = COL.wind; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.moveTo(wx, wy + 5);
          ctx.lineTo(wx + Math.cos(wa) * arrowLen, wy + 5 + Math.sin(wa) * arrowLen);
          ctx.stroke();
          // Arrowhead
          ctx.fillStyle = COL.wind;
          const ax = wx + Math.cos(wa) * arrowLen, ay = wy + 5 + Math.sin(wa) * arrowLen;
          ctx.beginPath(); ctx.moveTo(ax + Math.cos(wa) * 6, ay + Math.sin(wa) * 6);
          ctx.lineTo(ax + Math.cos(wa + 2.3) * 6, ay + Math.sin(wa + 2.3) * 6);
          ctx.lineTo(ax + Math.cos(wa - 2.3) * 6, ay + Math.sin(wa - 2.3) * 6);
          ctx.closePath(); ctx.fill();
        } else {
          ctx.fillStyle = COL.wind; ctx.font = "14px Trebuchet MS"; ctx.fillText("고요", wx, wy + 10);
        }
        ctx.textAlign = "left";
      }

      function drawHUD() {
        const tl = Math.max(0, DURATION - elapsed), tr = tl / DURATION;
        ctx.fillStyle = "rgba(44,62,80,0.15)"; ctx.fillRect(30, 20, W - 60, 10);
        ctx.fillStyle = tr > 0.25 ? COL.accent : COL.miss; ctx.fillRect(30, 20, (W - 60) * tr, 10);
        ctx.fillStyle = COL.text; ctx.font = "bold 26px Trebuchet MS"; ctx.textAlign = "left";
        ctx.fillText("\uD83C\uDFAF " + hits + " / " + TARGET_HITS, 30, 56);
        ctx.textAlign = "right";
        ctx.fillText("\uD83C\uDFF9 " + (MAX_DARTS - dartsUsed), W - 30, 56);
        ctx.textAlign = "center"; ctx.font = "bold 20px Trebuchet MS";
        ctx.fillStyle = tr > 0.25 ? COL.text : COL.miss; ctx.fillText(Math.ceil(tl) + "초", CX, 52);
        ctx.textAlign = "left";
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.save(); ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
      }

      function drawFeedback() {
        if (feedbackTimer <= 0) return;
        ctx.save(); ctx.globalAlpha = clamp(feedbackTimer / 0.4, 0, 1);
        ctx.fillStyle = feedbackColor; ctx.font = "bold 34px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText(feedbackText, BOARD_X, BOARD_Y - BOARD_R - 20 - (1 - feedbackTimer) * 20);
        ctx.restore(); ctx.textAlign = "left";
      }

      function drawCard(title, lines, accent) {
        ctx.fillStyle = "rgba(44,62,80,0.75)"; ctx.fillRect(0, 0, W, H);
        const cw = Math.min(680, W - 40), cx2 = (W - cw) / 2, cy2 = 70, ch = 400;
        ctx.fillStyle = "#F8FBFD"; ctx.beginPath(); ctx.roundRect(cx2, cy2, cw, ch, 16); ctx.fill();
        ctx.fillStyle = accent; ctx.beginPath(); ctx.roundRect(cx2, cy2, cw, 8, [16, 16, 0, 0]); ctx.fill();
        ctx.fillStyle = accent; ctx.font = "bold 38px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText(title, CX, cy2 + 60);
        ctx.fillStyle = COL.text; ctx.font = "600 20px Trebuchet MS";
        lines.forEach((l, i) => ctx.fillText(l, CX, cy2 + 110 + i * 36));
        ctx.fillStyle = "rgba(44,62,80,0.5)"; ctx.font = "500 18px Trebuchet MS";
        ctx.fillText("터치 또는 Enter로 시작", CX, cy2 + ch - 30); ctx.textAlign = "left";
      }

      function render() {
        ctx.save(); ctx.translate(shakeX, shakeY);
        if (mode === "menu") {
          drawBg(); drawBoard();
          drawCard("바람 다트", ["조작: 드래그로 조준, 손 떼면 발사", "\uD83C\uDF2C\uFE0F 바람이 다트 궤적을 휘게 합니다", "\u2705 과녁 5회 명중 시 클리어", "\u274C 다트 10개 소진 또는 40초 초과 시 실패"], COL.accent);
          ctx.restore(); return;
        }
        if (mode === "running") {
          drawBg(); drawBoard(); drawDart(); drawAimLine(); drawWindIndicator();
          drawParticles(); drawHUD(); drawFeedback(); ctx.restore(); return;
        }
        if (mode === "cleared") {
          drawBg(); drawBoard(); drawParticles();
          const a = clamp(clearAnim, 0, 1); ctx.save(); ctx.globalAlpha = a;
          ctx.fillStyle = "rgba(39,174,96,0.2)"; ctx.fillRect(0, 0, W, H);
          const cw2 = Math.min(500, W - 40);
          ctx.fillStyle = "#F8FBFD"; ctx.beginPath(); ctx.roundRect((W - cw2) / 2, 140, cw2, 260, 16); ctx.fill();
          ctx.fillStyle = COL.success; ctx.font = "bold 44px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText("클리어!", CX, 210);
          ctx.fillStyle = COL.text; ctx.font = "600 24px Trebuchet MS";
          ctx.fillText(hits + "회 명중 / 다트 " + dartsUsed + "개 사용", CX, 260);
          ctx.fillText(elapsed.toFixed(1) + "초 소요", CX, 300);
          ctx.fillStyle = "rgba(44,62,80,0.5)"; ctx.font = "500 18px Trebuchet MS"; ctx.fillText("터치하여 다시 시작", CX, 370);
          ctx.textAlign = "left"; ctx.restore(); ctx.restore(); return;
        }
        if (mode === "failed") {
          drawBg(); drawBoard(); drawParticles();
          drawCard("실패", [dartsUsed >= MAX_DARTS ? "다트 소진!" : "시간 초과!", hits + "회 명중 / 목표 " + TARGET_HITS + "회", Math.min(elapsed, DURATION).toFixed(1) + "초 소요"], COL.miss);
          ctx.restore(); return;
        }
        ctx.restore();
      }

      // --- Input ---
      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * W / rect.width, y: (e.clientY - rect.top) * H / rect.height };
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { startGame(); return; }
        if (dart) return;
        const pos = getCanvasPos(e);
        dragging = true; dragStartX = pos.x; dragStartY = pos.y; dragX = pos.x; dragY = pos.y;
        canvas.setPointerCapture(e.pointerId);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const pos = getCanvasPos(e);
        dragX = pos.x; dragY = pos.y;
      });
      canvas.addEventListener("pointerup", (e) => {
        if (!dragging) return;
        dragging = false;
        const dx = dragStartX - dragX, dy = dragStartY - dragY;
        const power = Math.min(Math.hypot(dx, dy), 200);
        if (power > 15) {
          const angle = Math.atan2(dy, dx);
          throwDart(Math.cos(angle) * power * 3, Math.sin(angle) * power * 3);
        }
      });
      canvas.addEventListener("pointercancel", () => { dragging = false; });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", (e) => {
        if ((e.key === "Enter" || e.key === " ") && mode !== "running") { e.preventDefault(); startGame(); }
      });

      function frame(ts) {
        const dt = lastTimestamp ? Math.min((ts - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = ts; update(dt); render(); animFrame = requestAnimationFrame(frame);
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), hits, dartsUsed, targetHits: TARGET_HITS, maxDarts: MAX_DARTS, timeLimit: DURATION, windX: +windX.toFixed(0), windY: +windY.toFixed(0), result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < steps; i++) update(FIXED_DT); render(); return renderGameToText(); };
      window.relayStageDebug = {
        forceClear() { startGame(); hits = TARGET_HITS; mode = "cleared"; clearAnim = 1; window.relayStageResult.status = "cleared"; reportCleared(); render(); },
        forceFail() { startGame(); dartsUsed = MAX_DARTS; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); render(); },
      };

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
      reportReady(); render(); canvas.focus(); animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
