<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Stages</title>
    <link rel="stylesheet" href="./launcher.css" />
  </head>
  <body>
    <main class="launcher-shell">
      <header class="launcher-head">
        <p class="eyebrow">ONE LIFE RELAY</p>
        <h1>Community Stages</h1>
        <p class="subtitle">
          다음 스테이지는 아직 안 해본 게임 중에서 랜덤으로 골라야 합니다.
        </p>
      </header>
      <div class="launcher-actions">
        <button id="random-next" class="primary-btn" type="button">랜덤 다음 스테이지</button>
        <p id="run-status" class="run-status"></p>
      </div>
      <section id="stage-list" class="stage-list"></section>
    </main>
    <script src="./relay-runtime.js"></script>
    <script src="./registry.js"></script>
    <script>
      const entries = window.COMMUNITY_STAGE_REGISTRY || [];
      const listEl = document.querySelector("#stage-list");
      const randomNextBtn = document.querySelector("#random-next");
      const runStatusEl = document.querySelector("#run-status");
      const context = window.RelayRuntime.readContext();

      window.RelayRuntime.decorateRegistryLinks(entries, listEl);

      const alreadyPlayed = context.history.length ? context.history.join(", ") : "없음";
      const finished = new URLSearchParams(window.location.search).get("finished") === "1";
      runStatusEl.textContent = finished
        ? `이번 런에서 더 이상 남은 미플레이 스테이지가 없습니다. 진행 기록: ${alreadyPlayed}`
        : `이번 런에서 이미 진행한 스테이지: ${alreadyPlayed}`;

      randomNextBtn.addEventListener("click", () => {
        const next = window.RelayRuntime.pickRandomNext(entries, context);
        if (!next) {
          runStatusEl.textContent = `이번 런에서 남은 미플레이 스테이지가 없습니다. 진행 기록: ${alreadyPlayed}`;
          return;
        }
        window.location.href = window.RelayRuntime.buildStageUrl(next.path, context, context.previousStageId);
      });
    </script>
  </body>
</html>
