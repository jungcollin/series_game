<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Paper Temple: Echo Loom</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(241, 208, 118, 0.24), transparent 30%),
          linear-gradient(180deg, #1b1223 0%, #0b0e1b 55%, #07090f 100%);
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(254, 240, 138, 0.24);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(254, 240, 138, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Paper Temple: Echo Loom. 마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 박자 링이 맞을 때 핵심 입력 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현. 템포 창을 놓치지 않고 모든 코어 문양을 연결하면 클리어. 핵심 입력을 연속으로 박자 밖에 쓰거나 잔상 선이 끊기면 즉시 실패. 메뉴에서는 화면 터치나 클릭으로 시작하고, 실행 중에는 드래그로 이웃 문양을 따라 움직이며 우하단 박자 인장에 터치 또는 Space로 봉인을 건다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Paper Temple: Echo Loom"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext =
        window.RelayRuntime?.readContext("paper-temple-echo-weaving-tempo") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const META_DESCRIPTION =
        "3초 잔상 실로 스위치와 길을 동시에 열어 종이 사원 코어를 잇는 리듬 퍼즐 액션";
      const META_CONTROLS =
        "마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 박자 링이 맞을 때 핵심 입력 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const META_CLEAR =
        "템포 창을 놓치지 않고 모든 코어 문양을 연결하면 클리어";
      const META_FAIL =
        "핵심 입력을 연속으로 박자 밖에 쓰거나 잔상 선이 끊기면 즉시 실패";

      const TEMPO_INTERVAL = 0.84;
      const TEMPO_WINDOW = 0.11;
      const TRAIL_TTL = 2.9;
      const ECHO_DURATION = 3;
      const SHUTTLE_SPEED = 430;
      const PARTICLE_MAX = 180;
      const PAPER_DUST_COUNT = 26;

      const BEAT_ORB = { x: 840, y: 454, r: 42 };
      const pointer = {
        active: false,
        id: null,
        x: 0,
        y: 0,
      };
      const keyState = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const nodeList = [
        { id: "reel", x: 126, y: 274, type: "reel", label: "실감개" },
        { id: "j1", x: 228, y: 274, type: "junction", label: "첫 틀" },
        { id: "core1", x: 334, y: 158, type: "core", label: "상단 코어" },
        { id: "switchA", x: 334, y: 386, type: "switch", label: "접힘 스위치 A" },
        { id: "d1L", x: 420, y: 274, type: "junction", label: "문 A 왼편" },
        { id: "d1R", x: 548, y: 274, type: "junction", label: "문 A 오른편" },
        { id: "core2", x: 656, y: 158, type: "core", label: "중앙 코어" },
        { id: "switchB", x: 656, y: 386, type: "switch", label: "접힘 스위치 B" },
        { id: "d2L", x: 742, y: 274, type: "junction", label: "문 B 왼편" },
        { id: "d2R", x: 850, y: 274, type: "junction", label: "문 B 오른편" },
        { id: "core3", x: 868, y: 138, type: "core", label: "최종 코어" },
      ];
      const nodeById = Object.fromEntries(nodeList.map((node) => [node.id, node]));

      const edgeList = [
        { from: "reel", to: "j1" },
        { from: "j1", to: "core1" },
        { from: "j1", to: "switchA" },
        { from: "j1", to: "d1L" },
        { from: "d1L", to: "d1R", requires: "switchA", door: "doorA" },
        { from: "d1R", to: "core2" },
        { from: "d1R", to: "switchB" },
        { from: "d1R", to: "d2L" },
        { from: "d2L", to: "d2R", requires: "switchB", door: "doorB" },
        { from: "d2R", to: "core3" },
      ];

      function edgeKey(a, b) {
        return [a, b].sort().join("|");
      }

      const edgeMap = {};
      const adjacency = {};
      for (const node of nodeList) {
        adjacency[node.id] = [];
      }
      for (const edge of edgeList) {
        const key = edgeKey(edge.from, edge.to);
        edgeMap[key] = {
          ...edge,
          key,
          length: Math.hypot(
            nodeById[edge.to].x - nodeById[edge.from].x,
            nodeById[edge.to].y - nodeById[edge.from].y
          ),
        };
        adjacency[edge.from].push(edge.to);
        adjacency[edge.to].push(edge.from);
      }

      function createPaperDust() {
        return Array.from({ length: PAPER_DUST_COUNT }, (_, index) => ({
          x: (index / PAPER_DUST_COUNT) * VIEW.width,
          y: 60 + ((index * 29) % 420),
          vx: 6 + ((index * 13) % 10),
          vy: 2 + ((index * 17) % 8),
          size: 5 + (index % 4) * 3,
          wobble: Math.random() * Math.PI * 2,
        }));
      }

      function createInitialState() {
        return {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          currentNode: "reel",
          move: null,
          stableEdges: new Set(),
          trailEdges: [],
          trailNodes: ["reel"],
          echo: null,
          sealedCores: new Set(),
          recentPopupId: 0,
          popups: [],
          particles: [],
          ribbons: [],
          paperDust: createPaperDust(),
          shake: 0,
          beatFlash: 0,
          disharmonyStreak: 0,
          pointerHintNode: null,
          lastReason: "",
          menuPulse: 0,
          shimmer: 0,
          ambientPhase: Math.random() * Math.PI * 2,
          lastSuccessfulSeal: "",
          finalGlow: 0,
        };
      }

      let state = createInitialState();

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRunState() {
        state.currentNode = "reel";
        state.move = null;
        state.stableEdges = new Set();
        state.trailEdges = [];
        state.trailNodes = ["reel"];
        state.echo = null;
        state.sealedCores = new Set();
        state.popups = [];
        state.particles = [];
        state.ribbons = [];
        state.shake = 0;
        state.beatFlash = 0;
        state.disharmonyStreak = 0;
        state.pointerHintNode = null;
        state.lastReason = "";
        state.lastSuccessfulSeal = "";
        state.finalGlow = 0;
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.menuPulse = 0;
        state.shimmer = 0;
        resetRunState();
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = META_FAIL) {
        if (state.mode !== "running") {
          state.mode = "failed";
        } else {
          state.mode = "failed";
        }
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.shake = Math.max(state.shake, 0.85);
        state.beatFlash = 1;
        window.relayStageResult.status = "failed";
        spawnBurst(getPlayerPosition().x, getPlayerPosition().y, "#fb7185", 28, 220);
        pushPopup(reason, getPlayerPosition().x, getPlayerPosition().y - 24, "#fecdd3");
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.finalGlow = 1;
        state.shake = Math.max(state.shake, 0.6);
        window.relayStageResult.status = "cleared";
        spawnBurst(getPlayerPosition().x, getPlayerPosition().y, "#fde68a", 44, 280);
        pushPopup("모든 코어 봉인 완료", getPlayerPosition().x, getPlayerPosition().y - 28, "#fef3c7");
        reportClearedToHost();
      }

      function getPlayerPosition() {
        if (!state.move) {
          const node = nodeById[state.currentNode];
          return { x: node.x, y: node.y };
        }
        const fromNode = nodeById[state.move.from];
        const toNode = nodeById[state.move.to];
        const t = easeInOut(state.move.progress);
        return {
          x: lerp(fromNode.x, toNode.x, t),
          y: lerp(fromNode.y, toNode.y, t),
        };
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function easeInOut(t) {
        return t * t * (3 - 2 * t);
      }

      function getTempoPhase() {
        const phase = state.elapsed % TEMPO_INTERVAL;
        return phase;
      }

      function getTempoDistance() {
        const phase = getTempoPhase();
        return Math.min(phase, TEMPO_INTERVAL - phase);
      }

      function inTempoWindow() {
        return getTempoDistance() <= TEMPO_WINDOW;
      }

      function isCore(nodeId) {
        return nodeById[nodeId]?.type === "core";
      }

      function isSwitch(nodeId) {
        return nodeById[nodeId]?.type === "switch";
      }

      function getEchoActive() {
        return state.echo && state.echo.expiresAt > state.elapsed ? state.echo : null;
      }

      function getSwitchActive(nodeId) {
        if (state.currentNode === nodeId) {
          return true;
        }
        const echo = getEchoActive();
        return !!echo && echo.nodes.includes(nodeId);
      }

      function getDoorOpenState(doorId) {
        if (doorId === "doorA") {
          return getSwitchActive("switchA");
        }
        if (doorId === "doorB") {
          return getSwitchActive("switchB");
        }
        return false;
      }

      function createRibbonSegment(x1, y1, x2, y2, color, life = 0.4) {
        state.ribbons.push({
          x1,
          y1,
          x2,
          y2,
          color,
          life,
          maxLife: life,
        });
      }

      function spawnBurst(x, y, color, count, speed) {
        for (let index = 0; index < count && state.particles.length < PARTICLE_MAX; index += 1) {
          const angle = (Math.PI * 2 * index) / Math.max(count, 1) + Math.random() * 0.3;
          const magnitude = speed * (0.35 + Math.random() * 0.75);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * magnitude,
            vy: Math.sin(angle) * magnitude,
            color,
            size: 3 + Math.random() * 6,
            life: 0.45 + Math.random() * 0.55,
            maxLife: 0.45 + Math.random() * 0.55,
          });
        }
      }

      function pushPopup(text, x, y, color = "#f8fafc") {
        state.recentPopupId += 1;
        state.popups.push({
          id: state.recentPopupId,
          text,
          x,
          y,
          color,
          life: 1.05,
          maxLife: 1.05,
        });
      }

      function completeEdgeMove(edge, targetNodeId) {
        const targetNode = nodeById[targetNodeId];
        state.currentNode = targetNodeId;
        state.trailEdges.push({
          key: edge.key,
          from: edge.from,
          to: edge.to,
          time: state.elapsed,
        });
        state.trailNodes.push(targetNodeId);
        createRibbonSegment(
          nodeById[edge.from].x,
          nodeById[edge.from].y,
          nodeById[edge.to].x,
          nodeById[edge.to].y,
          "#f59e0b",
          0.35
        );
        spawnBurst(targetNode.x, targetNode.y, "#5eead4", 10, 110);
        if (isCore(targetNodeId) && !state.sealedCores.has(targetNodeId)) {
          pushPopup("코어 발견", targetNode.x, targetNode.y - 26, "#bfdbfe");
        }
        if (isSwitch(targetNodeId)) {
          pushPopup("문양 스위치", targetNode.x, targetNode.y - 26, "#fde68a");
        }
      }

      function beginMove(targetNodeId) {
        if (state.mode !== "running" || state.move || targetNodeId === state.currentNode) {
          return false;
        }
        if (!adjacency[state.currentNode].includes(targetNodeId)) {
          return false;
        }

        const key = edgeKey(state.currentNode, targetNodeId);
        const edge = edgeMap[key];
        if (edge.requires && !getSwitchActive(edge.requires) && !state.stableEdges.has(key)) {
          failStage("잔상 문양이 닫혀 실이 끊겼다");
          return false;
        }

        state.move = {
          from: state.currentNode,
          to: targetNodeId,
          key,
          progress: 0,
          duration: edge.length / SHUTTLE_SPEED,
        };
        state.pointerHintNode = targetNodeId;
        return true;
      }

      function chooseDragTarget() {
        if (!pointer.active || state.move || state.mode !== "running") {
          return;
        }
        const currentNode = nodeById[state.currentNode];
        let bestTarget = null;
        let bestScore = Infinity;
        for (const neighborId of adjacency[state.currentNode]) {
          const neighbor = nodeById[neighborId];
          const distance = Math.hypot(pointer.x - neighbor.x, pointer.y - neighbor.y);
          const originDistance = Math.hypot(pointer.x - currentNode.x, pointer.y - currentNode.y);
          if (originDistance < 20) {
            continue;
          }
          const directionScore = distance + originDistance * 0.08;
          if (distance < 74 && directionScore < bestScore) {
            bestScore = directionScore;
            bestTarget = neighborId;
          }
        }
        if (bestTarget) {
          beginMove(bestTarget);
        }
      }

      function chooseKeyboardTarget() {
        if (state.mode !== "running" || state.move) {
          return;
        }
        const desired = {
          x: (keyState.right ? 1 : 0) - (keyState.left ? 1 : 0),
          y: (keyState.down ? 1 : 0) - (keyState.up ? 1 : 0),
        };
        if (!desired.x && !desired.y) {
          return;
        }

        let bestTarget = null;
        let bestDot = 0.5;
        const currentNode = nodeById[state.currentNode];
        const desiredLength = Math.hypot(desired.x, desired.y) || 1;
        for (const neighborId of adjacency[state.currentNode]) {
          const neighbor = nodeById[neighborId];
          const dx = neighbor.x - currentNode.x;
          const dy = neighbor.y - currentNode.y;
          const length = Math.hypot(dx, dy) || 1;
          const dot = (dx * desired.x + dy * desired.y) / (length * desiredLength);
          if (dot > bestDot) {
            bestDot = dot;
            bestTarget = neighborId;
          }
        }
        if (bestTarget) {
          beginMove(bestTarget);
        }
      }

      function attemptSeal() {
        if (state.mode !== "running") {
          return;
        }

        if (!inTempoWindow()) {
          state.disharmonyStreak += 1;
          state.beatFlash = 1;
          state.shake = Math.max(state.shake, 0.25);
          spawnBurst(BEAT_ORB.x, BEAT_ORB.y, "#f43f5e", 18, 170);
          if (state.disharmonyStreak >= 2) {
            failStage("박자 밖 봉인을 연속으로 써버렸다");
          } else {
            pushPopup("박자를 다시 맞춰", BEAT_ORB.x, BEAT_ORB.y - 54, "#fecdd3");
          }
          return;
        }

        if (!state.trailEdges.length) {
          pushPopup("새 실을 먼저 짜야 한다", BEAT_ORB.x, BEAT_ORB.y - 48, "#dbeafe");
          spawnBurst(BEAT_ORB.x, BEAT_ORB.y, "#93c5fd", 12, 90);
          return;
        }

        state.disharmonyStreak = 0;
        state.beatFlash = 1;
        state.shake = Math.max(state.shake, 0.18);
        const trailNodes = Array.from(new Set(state.trailNodes));
        const sealedThisBeat = [];
        for (const step of state.trailEdges) {
          state.stableEdges.add(step.key);
        }
        for (const nodeId of trailNodes) {
          if (isCore(nodeId) && !state.sealedCores.has(nodeId)) {
            state.sealedCores.add(nodeId);
            sealedThisBeat.push(nodeId);
          }
        }

        state.echo = {
          nodes: trailNodes,
          edges: state.trailEdges.map((edge) => edge.key),
          expiresAt: state.elapsed + ECHO_DURATION,
        };
        state.lastSuccessfulSeal = sealedThisBeat.join(",");

        for (const nodeId of trailNodes) {
          const node = nodeById[nodeId];
          spawnBurst(node.x, node.y, isCore(nodeId) ? "#fef08a" : "#67e8f9", 12, 120);
        }
        pushPopup(
          sealedThisBeat.length ? "잔상 봉인 성공" : "잔상 실 고정",
          BEAT_ORB.x,
          BEAT_ORB.y - 52,
          "#fde68a"
        );
        if (sealedThisBeat.length) {
          pushPopup(
            `코어 ${state.sealedCores.size}/3`,
            nodeById[state.currentNode].x,
            nodeById[state.currentNode].y - 30,
            "#fef3c7"
          );
        }

        state.trailEdges = [];
        state.trailNodes = [state.currentNode];

        if (
          state.currentNode === "core3" &&
          state.sealedCores.has("core1") &&
          state.sealedCores.has("core2") &&
          state.sealedCores.has("core3")
        ) {
          clearStage();
        }
      }

      function collectVisibleEdges() {
        const unstableSet = new Set(state.trailEdges.map((edge) => edge.key));
        const echo = getEchoActive();
        const echoSet = new Set(echo ? echo.edges : []);
        return {
          stable: state.stableEdges,
          unstable: unstableSet,
          echo: echoSet,
        };
      }

      function getTrailRemaining() {
        if (!state.trailEdges.length) {
          return TRAIL_TTL;
        }
        return Math.max(0, TRAIL_TTL - (state.elapsed - state.trailEdges[0].time));
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.shimmer += dt;
        state.menuPulse += dt;
        state.ambientPhase += dt * 1.2;
        state.shake = Math.max(0, state.shake - dt * 2.3);
        state.beatFlash = Math.max(0, state.beatFlash - dt * 2.8);

        if (state.move) {
          state.move.progress += dt / state.move.duration;
          if (state.move.progress >= 1) {
            const edge = edgeMap[state.move.key];
            const targetNodeId = state.move.to;
            state.move = null;
            completeEdgeMove(edge, targetNodeId);
          }
        } else {
          chooseKeyboardTarget();
          chooseDragTarget();
        }

        if (state.trailEdges.length && state.elapsed - state.trailEdges[0].time > TRAIL_TTL) {
          failStage("잔상 선이 봉인 전에 찢어졌다");
          return;
        }

        if (state.echo && state.echo.expiresAt <= state.elapsed) {
          state.echo = null;
          pushPopup("잔상 소멸", BEAT_ORB.x - 12, BEAT_ORB.y - 60, "#bfdbfe");
        }
      }

      function updateVisuals(dt) {
        for (const dust of state.paperDust) {
          dust.wobble += dt * 1.2;
          dust.x = (dust.x + dust.vx * dt + VIEW.width) % VIEW.width;
          dust.y += Math.sin(dust.wobble) * dt * dust.vy * 0.25;
        }

        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 14 * dt;
          return particle.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= dt * 28;
          return popup.life > 0;
        });

        state.ribbons = state.ribbons.filter((ribbon) => {
          ribbon.life -= dt;
          return ribbon.life > 0;
        });

        state.finalGlow = Math.max(0, state.finalGlow - dt * 0.45);
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          state.menuPulse += dt;
          state.shimmer += dt;
          state.ambientPhase += dt * 0.9;
          state.beatFlash = Math.max(0, state.beatFlash - dt * 2.4);
          state.shake = Math.max(0, state.shake - dt * 2);
          state.finalGlow = Math.max(0, state.finalGlow - dt * 0.45);
        }
        updateVisuals(dt);
      }

      function drawLayeredBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#281734");
        gradient.addColorStop(0.52, "#0d1120");
        gradient.addColorStop(1, "#06070b");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const halo = ctx.createRadialGradient(480, 110, 20, 480, 110, 420);
        halo.addColorStop(0, "rgba(252, 211, 77, 0.18)");
        halo.addColorStop(0.5, "rgba(244, 114, 182, 0.08)");
        halo.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let layer = 0; layer < 4; layer += 1) {
          const alpha = 0.06 + layer * 0.03;
          ctx.fillStyle = `rgba(248, 250, 252, ${alpha})`;
          ctx.beginPath();
          ctx.moveTo(0, 72 + layer * 28);
          for (let index = 0; index <= 8; index += 1) {
            const x = (index / 8) * VIEW.width;
            const y = 80 + layer * 28 + Math.sin(state.ambientPhase * 0.6 + index + layer) * 16;
            ctx.lineTo(x, y);
          }
          ctx.lineTo(VIEW.width, 0);
          ctx.lineTo(0, 0);
          ctx.closePath();
          ctx.fill();
        }

        ctx.fillStyle = "rgba(251, 191, 36, 0.08)";
        ctx.fillRect(84, 66, VIEW.width - 168, VIEW.height - 132);

        drawTempleArch(116, 62, 728, 406, "#28152f", "#4b2d48");
        drawTempleArch(154, 88, 652, 362, "#31173b", "#6b4d5f");
        drawTempleArch(214, 110, 534, 314, "#462948", "#a28368");

        ctx.fillStyle = "#140d18";
        ctx.fillRect(0, 424, VIEW.width, 140);

        const floorGradient = ctx.createLinearGradient(0, 410, 0, VIEW.height);
        floorGradient.addColorStop(0, "rgba(248, 250, 252, 0.05)");
        floorGradient.addColorStop(1, "rgba(0, 0, 0, 0.3)");
        ctx.fillStyle = floorGradient;
        ctx.beginPath();
        ctx.moveTo(0, 418);
        ctx.lineTo(VIEW.width, 418);
        ctx.lineTo(VIEW.width, VIEW.height);
        ctx.lineTo(0, VIEW.height);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(245, 158, 11, 0.12)";
        ctx.lineWidth = 1;
        for (let index = 0; index < 7; index += 1) {
          const y = 130 + index * 46;
          ctx.beginPath();
          ctx.moveTo(126, y);
          ctx.lineTo(834, y + (index % 2 === 0 ? 8 : -8));
          ctx.stroke();
        }

        for (const dust of state.paperDust) {
          ctx.save();
          ctx.translate(dust.x, dust.y + Math.sin(dust.wobble) * 6);
          ctx.rotate(Math.sin(dust.wobble) * 0.35);
          ctx.fillStyle = "rgba(254, 243, 199, 0.22)";
          ctx.fillRect(-dust.size * 0.5, -dust.size * 0.5, dust.size, dust.size * 0.66);
          ctx.restore();
        }
      }

      function drawTempleArch(x, y, width, height, fill, accent) {
        ctx.save();
        ctx.fillStyle = fill;
        ctx.beginPath();
        ctx.moveTo(x, y + height);
        ctx.lineTo(x + width * 0.16, y);
        ctx.lineTo(x + width * 0.84, y);
        ctx.lineTo(x + width, y + height);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "rgba(245, 158, 11, 0.08)";
        ctx.fillRect(x + 12, y + height * 0.34, width - 24, 16);
        ctx.fillRect(x + 32, y + height * 0.62, width - 64, 12);
        ctx.restore();
      }

      function drawDoors() {
        for (const edge of edgeList.filter((entry) => entry.door)) {
          const from = nodeById[edge.from];
          const to = nodeById[edge.to];
          const open = getDoorOpenState(edge.door);
          const midX = (from.x + to.x) / 2;
          const midY = (from.y + to.y) / 2;
          const swing = open ? 0.8 : 0.14;
          ctx.save();
          ctx.translate(midX, midY);
          ctx.shadowColor = open ? "rgba(94, 234, 212, 0.55)" : "rgba(251, 191, 36, 0.35)";
          ctx.shadowBlur = open ? 18 : 8;
          ctx.fillStyle = open ? "rgba(94, 234, 212, 0.16)" : "rgba(251, 191, 36, 0.16)";
          ctx.fillRect(-34, -38, 68, 76);

          ctx.fillStyle = "#d6b38a";
          ctx.strokeStyle = open ? "#99f6e4" : "#fcd34d";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-28, -34);
          ctx.lineTo(-2 - 18 * swing, -12);
          ctx.lineTo(-2 - 18 * swing, 32);
          ctx.lineTo(-28, 10);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(28, -34);
          ctx.lineTo(2 + 18 * swing, -12);
          ctx.lineTo(2 + 18 * swing, 32);
          ctx.lineTo(28, 10);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = open ? "#99f6e4" : "#fef3c7";
          ctx.font = "700 11px 'Trebuchet MS', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(open ? "OPEN" : "LOCK", 0, 52);
          ctx.restore();
        }
      }

      function drawEdges() {
        const visible = collectVisibleEdges();
        const echo = getEchoActive();

        for (const edge of edgeList) {
          const from = nodeById[edge.from];
          const to = nodeById[edge.to];
          const key = edge.key;
          ctx.save();
          ctx.lineCap = "round";

          ctx.strokeStyle = "rgba(251, 241, 199, 0.16)";
          ctx.lineWidth = 10;
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(to.x, to.y);
          ctx.stroke();

          if (visible.stable.has(key)) {
            const stableGradient = ctx.createLinearGradient(from.x, from.y, to.x, to.y);
            stableGradient.addColorStop(0, "rgba(254, 240, 138, 0.95)");
            stableGradient.addColorStop(0.5, "rgba(251, 191, 36, 0.95)");
            stableGradient.addColorStop(1, "rgba(253, 224, 71, 0.9)");
            ctx.strokeStyle = stableGradient;
            ctx.shadowColor = "rgba(251, 191, 36, 0.45)";
            ctx.shadowBlur = 18;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
            ctx.stroke();
          }

          if (visible.echo.has(key) && echo) {
            const t = clamp((echo.expiresAt - state.elapsed) / ECHO_DURATION, 0, 1);
            ctx.strokeStyle = `rgba(103, 232, 249, ${0.2 + t * 0.5})`;
            ctx.shadowColor = "rgba(34, 211, 238, 0.42)";
            ctx.shadowBlur = 20;
            ctx.lineWidth = 14;
            ctx.setLineDash([6, 10]);
            ctx.lineDashOffset = -state.shimmer * 80;
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
            ctx.stroke();
          }

          const unstableEdge = state.trailEdges.find((entry) => entry.key === key);
          if (unstableEdge) {
            const age = clamp((state.elapsed - unstableEdge.time) / TRAIL_TTL, 0, 1);
            const unstableGradient = ctx.createLinearGradient(from.x, from.y, to.x, to.y);
            unstableGradient.addColorStop(0, `rgba(244, 114, 182, ${1 - age * 0.35})`);
            unstableGradient.addColorStop(1, `rgba(103, 232, 249, ${1 - age * 0.25})`);
            ctx.strokeStyle = unstableGradient;
            ctx.shadowColor = "rgba(244, 114, 182, 0.45)";
            ctx.shadowBlur = 14;
            ctx.lineWidth = 7;
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
            ctx.stroke();
          }

          ctx.restore();
        }

        for (const ribbon of state.ribbons) {
          ctx.save();
          ctx.globalAlpha = clamp(ribbon.life / ribbon.maxLife, 0, 1) * 0.85;
          ctx.strokeStyle = ribbon.color;
          ctx.lineWidth = 3;
          ctx.shadowColor = ribbon.color;
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.moveTo(ribbon.x1, ribbon.y1);
          ctx.lineTo(ribbon.x2, ribbon.y2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawNodes() {
        const echo = getEchoActive();
        for (const node of nodeList) {
          const hover = pointer.active
            ? Math.max(0, 1 - Math.hypot(pointer.x - node.x, pointer.y - node.y) / 90)
            : 0;
          const activeSwitch = isSwitch(node.id) && getSwitchActive(node.id);
          const sealedCore = isCore(node.id) && state.sealedCores.has(node.id);
          const inEcho = !!echo && echo.nodes.includes(node.id);
          const isCurrent = state.currentNode === node.id && !state.move;

          ctx.save();
          ctx.translate(node.x, node.y);
          const glow = sealedCore
            ? "rgba(254, 240, 138, 0.75)"
            : activeSwitch
              ? "rgba(103, 232, 249, 0.72)"
              : inEcho
                ? "rgba(165, 243, 252, 0.46)"
                : "rgba(251, 191, 36, 0.16)";

          ctx.shadowColor = glow;
          ctx.shadowBlur = 22 + hover * 10;
          ctx.fillStyle = node.type === "reel" ? "#2f1f2f" : "#2a1830";
          drawDiamond(0, 0, node.type === "reel" ? 32 : 26 + hover * 5);

          if (node.type === "reel") {
            ctx.strokeStyle = "#f8d98c";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, 0, 6, 0, Math.PI * 2);
            ctx.stroke();
          } else if (node.type === "switch") {
            ctx.strokeStyle = activeSwitch ? "#67e8f9" : "#fcd34d";
            ctx.lineWidth = 2.6;
            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            ctx.lineTo(0, -10);
            ctx.lineTo(10, 0);
            ctx.lineTo(0, 10);
            ctx.closePath();
            ctx.stroke();
          } else if (node.type === "core") {
            ctx.strokeStyle = sealedCore ? "#fef08a" : "#eab308";
            ctx.lineWidth = 2.6;
            for (let index = 0; index < 3; index += 1) {
              ctx.save();
              ctx.rotate((Math.PI * 2 * index) / 3 + state.shimmer * (sealedCore ? 0.26 : 0.08));
              ctx.beginPath();
              ctx.moveTo(0, -16);
              ctx.lineTo(6, -3);
              ctx.lineTo(0, 16);
              ctx.lineTo(-6, -3);
              ctx.closePath();
              ctx.stroke();
              ctx.restore();
            }
          } else {
            ctx.strokeStyle = "#f5d0a9";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-12, 0);
            ctx.lineTo(0, -12);
            ctx.lineTo(12, 0);
            ctx.lineTo(0, 12);
            ctx.closePath();
            ctx.stroke();
          }

          if (isCurrent) {
            ctx.strokeStyle = "rgba(255,255,255,0.8)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 24 + Math.sin(state.shimmer * 7) * 2, 0, Math.PI * 2);
            ctx.stroke();
          }

          ctx.fillStyle = "rgba(248, 250, 252, 0.86)";
          ctx.font = "700 11px 'Trebuchet MS', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(
            node.type === "core"
              ? sealedCore
                ? "SEALED"
                : "CORE"
              : node.type === "switch"
                ? activeSwitch
                  ? "HOLD"
                  : "SWITCH"
                : node.type === "reel"
                  ? "REEL"
                  : "",
            0,
            42
          );
          ctx.restore();
        }
      }

      function drawDiamond(x, y, size) {
        ctx.beginPath();
        ctx.moveTo(x, y - size);
        ctx.lineTo(x + size, y);
        ctx.lineTo(x, y + size);
        ctx.lineTo(x - size, y);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "rgba(248, 250, 252, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      function drawPlayer() {
        const player = getPlayerPosition();
        const bob = Math.sin(state.shimmer * 10) * 4;
        ctx.save();
        ctx.translate(player.x, player.y + bob);
        ctx.shadowColor = "rgba(254, 240, 138, 0.7)";
        ctx.shadowBlur = 24;
        ctx.fillStyle = "#f8e6a5";
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.bezierCurveTo(14, -18, 20, -8, 18, 4);
        ctx.bezierCurveTo(16, 16, 8, 24, 0, 28);
        ctx.bezierCurveTo(-8, 24, -16, 16, -18, 4);
        ctx.bezierCurveTo(-20, -8, -14, -18, 0, -18);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.arc(0, 2, 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-7, 14);
        ctx.lineTo(7, 14);
        ctx.stroke();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          ctx.save();
          ctx.globalAlpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = particle.color;
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * ctx.globalAlpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPopups() {
        for (const popup of state.popups) {
          const alpha = clamp(popup.life / popup.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "700 15px 'Trebuchet MS', sans-serif";
          ctx.textAlign = "center";
          ctx.shadowColor = "rgba(0, 0, 0, 0.34)";
          ctx.shadowBlur = 10;
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        }
      }

      function drawBeatHud() {
        const phase = getTempoPhase();
        const distance = getTempoDistance();
        const ready = distance <= TEMPO_WINDOW;
        const ringT = phase / TEMPO_INTERVAL;

        ctx.save();
        ctx.translate(BEAT_ORB.x, BEAT_ORB.y);

        ctx.fillStyle = "rgba(9, 11, 21, 0.72)";
        ctx.strokeStyle = "rgba(248, 250, 252, 0.14)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(-76, -72, 114, 106, 20);
        ctx.fill();
        ctx.stroke();

        ctx.shadowColor = ready
          ? "rgba(254, 240, 138, 0.76)"
          : "rgba(103, 232, 249, 0.35)";
        ctx.shadowBlur = 18 + state.beatFlash * 20;
        ctx.strokeStyle = ready ? "#fef08a" : "#67e8f9";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, BEAT_ORB.r + 10 + Math.sin(ringT * Math.PI * 2) * 6, 0, Math.PI * 2);
        ctx.stroke();

        ctx.setLineDash([Math.PI * 18, Math.PI * 70]);
        ctx.lineDashOffset = -ringT * 160;
        ctx.strokeStyle = ready ? "#f59e0b" : "rgba(248,250,252,0.42)";
        ctx.lineWidth = 7;
        ctx.beginPath();
        ctx.arc(0, 0, BEAT_ORB.r, -Math.PI / 2, Math.PI * 1.5);
        ctx.stroke();
        ctx.setLineDash([]);

        const orbGradient = ctx.createRadialGradient(0, -8, 10, 0, 0, BEAT_ORB.r);
        orbGradient.addColorStop(0, ready ? "#fef3c7" : "#d1fae5");
        orbGradient.addColorStop(1, ready ? "#f59e0b" : "#0ea5e9");
        ctx.fillStyle = orbGradient;
        ctx.beginPath();
        ctx.arc(0, 0, BEAT_ORB.r - 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#0f172a";
        ctx.font = "800 15px 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("SEAL", 0, -2);
        ctx.font = "700 10px 'Trebuchet MS', sans-serif";
        ctx.fillText("클릭 / 터치 / Space", -18, 18);

        ctx.fillStyle = "rgba(248, 250, 252, 0.9)";
        ctx.font = "700 11px 'Trebuchet MS', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("박자 링", -60, -46);
        ctx.fillStyle = ready ? "#fde68a" : "#bfdbfe";
        ctx.fillText(ready ? "지금 봉인" : "다음 박자 대기", -60, -30);
        ctx.restore();
      }

      function drawHud() {
        const trailRemaining = getTrailRemaining();
        const sealed = Array.from(state.sealedCores);
        const doorAOpen = getDoorOpenState("doorA");
        const doorBOpen = getDoorOpenState("doorB");

        ctx.save();
        ctx.fillStyle = "rgba(8, 12, 20, 0.58)";
        ctx.strokeStyle = "rgba(248, 250, 252, 0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(22, 18, 320, 98, 22);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#fef3c7";
        ctx.font = "700 14px Georgia, serif";
        ctx.fillText("Paper Temple: Echo Loom", 38, 42);
        ctx.fillStyle = "rgba(248, 250, 252, 0.84)";
        ctx.font = "600 11px 'Trebuchet MS', sans-serif";
        ctx.fillText("드래그로 이웃 문양 이동, 우하단 봉인 인장을 박자에 맞춰 눌러라", 38, 60);
        ctx.fillText(`코어 ${sealed.length}/3  ·  문 A ${doorAOpen ? "열림" : "잠김"}  ·  문 B ${doorBOpen ? "열림" : "잠김"}`, 38, 78);

        ctx.fillStyle = "rgba(248, 250, 252, 0.78)";
        ctx.fillText("불안정 실", 38, 97);
        ctx.fillStyle = trailRemaining < 0.7 ? "#fb7185" : trailRemaining < 1.3 ? "#fbbf24" : "#67e8f9";
        ctx.fillRect(96, 88, 178 * clamp(trailRemaining / TRAIL_TTL, 0, 1), 9);

          97
        );
        ctx.restore();

        drawBeatHud();
      }

        ctx.fillStyle = "#fef3c7";
        ctx.font = "700 18px Georgia, serif";

              "드래그로 인접 문양 사이를 오가며 실을 잇는다",
              "우하단 인장을 클릭 또는 터치 홀드, Space로 봉인",
              "모바일도 화면 터치와 드래그만으로 플레이 가능",
            ],
          },
          {
            title: "클리어",
            lines: ["상단 코어 → 중앙 코어 → 최종 코어를", "모두 박자 안에서 봉인하면 클리어"],
          },
          {
            title: "실패",
            lines: ["봉인을 연속으로 박자 밖에 쓰면 즉시 붕괴", "불안정 실이 3초 안에 봉인되지 않아도 실패"],
          },
        ];

        cards.forEach((card, index) => {
          const x = 128 + index * 244;
          ctx.fillStyle = "rgba(17, 24, 39, 0.74)";
          ctx.beginPath();
          ctx.roundRect(x, 236, 212, 128, 22);
          ctx.fill();
          ctx.fillStyle = index === 0 ? "#67e8f9" : index === 1 ? "#fde68a" : "#fda4af";
          ctx.font = "800 14px 'Trebuchet MS', sans-serif";
          ctx.fillText(card.title, x + 18, 262);
          ctx.fillStyle = "rgba(248, 250, 252, 0.88)";
          ctx.font = "600 12px 'Trebuchet MS', sans-serif";
          card.lines.forEach((line, lineIndex) => {
            ctx.fillText(line, x + 18, 288 + lineIndex * 22);
          });
        });

        ctx.shadowColor = "rgba(254, 240, 138, 0.55)";
        ctx.shadowBlur = 24;
        ctx.fillStyle = `rgba(254, 240, 138, ${0.72 + pulse * 0.18})`;
        ctx.beginPath();
        ctx.roundRect(128, 392, 312, 48, 18);
        ctx.fill();
        ctx.fillStyle = "#111827";
        ctx.font = "800 16px 'Trebuchet MS', sans-serif";
        ctx.fillText("화면 터치 / 클릭 / Enter로 시작", 148, 422);

        ctx.fillStyle = "rgba(248, 250, 252, 0.82)";
        ctx.font = "600 12px 'Trebuchet MS', sans-serif";
        ctx.fillText("문 A는 스위치 A 잔상, 문 B는 스위치 B 잔상이 열어준다", 468, 406);
        ctx.fillText("박자 링이 밝게 닿을 때만 봉인이 완성된다", 468, 426);
        ctx.restore();
      }

      function drawEndOverlay(title, accent, subtitle) {
        ctx.save();
        ctx.fillStyle = "rgba(4, 6, 12, 0.58)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(15, 23, 42, 0.82)";
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(232, 136, 496, 248, 28);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = "800 36px Georgia, serif";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 192);

        ctx.fillStyle = "rgba(248, 250, 252, 0.9)";
        ctx.font = "600 16px 'Trebuchet MS', sans-serif";
        ctx.fillText(subtitle, VIEW.width / 2, 232);

        ctx.fillStyle = "rgba(248, 250, 252, 0.76)";
        ctx.font = "600 13px 'Trebuchet MS', sans-serif";
        ctx.fillText(`기록 ${state.lastRunTime.toFixed(1)}s`, VIEW.width / 2, 266);

        ctx.fillStyle = "rgba(248, 250, 252, 0.88)";
        ctx.font = "700 15px 'Trebuchet MS', sans-serif";
        ctx.fillText(
          state.mode === "failed"
            ? state.lastReason || "실이 끊어졌다"
            : "세 코어의 종이 결이 하나의 직조로 묶였다",
          VIEW.width / 2,
          304
        );

        ctx.fillStyle = accent;
        ctx.beginPath();
        ctx.roundRect(314, 328, 332, 38, 18);
        ctx.fill();
        ctx.fillStyle = "#111827";
        ctx.font = "800 15px 'Trebuchet MS', sans-serif";
        ctx.fillText("화면 터치 / 클릭 / Enter로 재시작", VIEW.width / 2, 353);
        ctx.restore();
      }

      function drawScene() {
        ctx.save();
        const shakeX = (Math.random() - 0.5) * state.shake * 16;
        const shakeY = (Math.random() - 0.5) * state.shake * 12;
        ctx.translate(shakeX, shakeY);
        drawLayeredBackground();
        drawEdges();
        drawDoors();
        drawNodes();
        drawPlayer();
        drawParticles();
        drawGoalHints();
        drawHud();
        drawPopups();
        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed") {
          drawEndOverlay("THREAD COLLAPSE", "#fb7185", "연속 빗박자 또는 봉인 지연으로 직조가 찢어졌습니다");
        } else if (state.mode === "cleared") {
          drawEndOverlay("LOOM SEALED", "#fde68a", "종이 사원의 세 코어가 하나의 템포 결로 잠겼습니다");
        }
        ctx.restore();

        if (state.finalGlow > 0) {
          ctx.save();
          ctx.globalAlpha = state.finalGlow * 0.35;
          ctx.fillStyle = "#fde68a";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.restore();
        }
      }

      function renderFrame(now) {
        if (!lastTimestamp) {
          lastTimestamp = now;
        }
        const delta = clamp((now - lastTimestamp) / 1000, 0, MAX_DT);
        lastTimestamp = now;
        update(delta);
        drawScene();
        animationFrame = window.requestAnimationFrame(renderFrame);
      }

      function toCanvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      function onCanvasPointerDown(event) {
        const point = toCanvasPoint(event.clientX, event.clientY);
        pointer.active = true;
        pointer.id = event.pointerId;
        pointer.x = point.x;
        pointer.y = point.y;
        canvas.setPointerCapture?.(event.pointerId);

        if (state.mode === "menu") {
          startStage();
          return;
        }
        if (state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        if (state.mode !== "running") {
          return;
        }

        const distanceToOrb = Math.hypot(point.x - BEAT_ORB.x, point.y - BEAT_ORB.y);
        if (distanceToOrb <= 68) {
          attemptSeal();
        } else {
          chooseDragTarget();
        }
      }

      function onCanvasPointerMove(event) {
        if (!pointer.active || pointer.id !== event.pointerId) {
          return;
        }
        const point = toCanvasPoint(event.clientX, event.clientY);
        pointer.x = point.x;
        pointer.y = point.y;
      }

      function onCanvasPointerUp(event) {
        if (pointer.id === event.pointerId) {
          pointer.active = false;
          pointer.id = null;
        }
        canvas.releasePointerCapture?.(event.pointerId);
      }

      canvas.addEventListener("pointerdown", onCanvasPointerDown);
      canvas.addEventListener("pointermove", onCanvasPointerMove);
      canvas.addEventListener("pointerup", onCanvasPointerUp);
      canvas.addEventListener("pointercancel", onCanvasPointerUp);
      canvas.addEventListener(
        "touchstart",
        (event) => {
          event.preventDefault();
        },
        { passive: false }
      );

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared")) {
          event.preventDefault();
          startStage();
          return;
        }

        if (state.mode !== "running") {
          return;
        }

        if (event.key === " " || event.code === "Space" || event.key === "Enter") {
          event.preventDefault();
          attemptSeal();
          return;
        }

        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          keyState.left = true;
        } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          keyState.right = true;
        } else if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
          keyState.up = true;
        } else if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
          keyState.down = true;
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          keyState.left = false;
        } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          keyState.right = false;
        } else if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
          keyState.up = false;
        } else if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
          keyState.down = false;
        }
      });

      window.relayStageMeta = {
        id: "paper-temple-echo-weaving-tempo",
        title: "Paper Temple: Echo Loom",
        description: META_DESCRIPTION,
        creator: "jungcollin",
        genre: "Echo puzzler / 템포 윈도우",
        clearCondition: META_CLEAR,
        failCondition: META_FAIL,
        controls: META_CONTROLS,
      };

      window.relayStageResult = {
        status: "running",
      };

      window.render_game_to_text = function renderGameToText() {
        const player = getPlayerPosition();
        return JSON.stringify({
          mode: state.mode,
          objective: META_CLEAR,
          coordinateSystem: "origin top-left, x right, y down",
          currentNode: state.currentNode,
          moveTo: state.move ? state.move.to : null,
          player: {
            x: Number(player.x.toFixed(1)),
            y: Number(player.y.toFixed(1)),
          },
          sealedCores: Array.from(state.sealedCores),
          trail: {
            remaining: Number(getTrailRemaining().toFixed(2)),
            nodes: state.trailNodes.slice(-6),
          },
          echo: state.echo
            ? {
                remaining: Number(Math.max(0, state.echo.expiresAt - state.elapsed).toFixed(2)),
                nodes: state.echo.nodes,
              }
            : null,
          switches: {
            switchA: getSwitchActive("switchA"),
            switchB: getSwitchActive("switchB"),
          },
          beat: {
            inWindow: inTempoWindow(),
            distance: Number(getTempoDistance().toFixed(3)),
            streak: state.disharmonyStreak,
          },
        });
      };

      window.advanceTime = function advanceTime(ms) {
        const total = Math.max(0, Number(ms) || 0);
        const steps = Math.max(1, Math.ceil(total / (1000 / 60)));
        const dt = Math.min(MAX_DT, total / 1000 / steps || FIXED_DT);
        for (let index = 0; index < steps; index += 1) {
          update(dt);
        }
        drawScene();
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "cleared") {
            state.sealedCores = new Set(["core1", "core2", "core3"]);
            clearStage();
          }
        },
        forceFail() {
          if (state.mode !== "failed") {
            failStage("디버그 실패");
          }
        },
      };

      reportReadyToHost();
      drawScene();
      animationFrame = window.requestAnimationFrame(renderFrame);
    </script>
  </body>
</html>
