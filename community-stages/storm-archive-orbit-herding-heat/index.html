<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Storm Archive: Orbit Shepherd</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #040816;
        --bg-1: #0b1230;
        --line: rgba(148, 163, 184, 0.18);
        --ink: #eef6ff;
        --panel: rgba(7, 12, 29, 0.72);
        --panel-strong: rgba(6, 10, 25, 0.86);
        --cyan: #79f5ff;
        --mint: #77ffd8;
        --amber: #ffd579;
        --rose: #ff82bc;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 16%, rgba(90, 181, 255, 0.18), transparent 28%),
          radial-gradient(circle at 82% 18%, rgba(120, 255, 214, 0.16), transparent 26%),
          radial-gradient(circle at 50% 62%, rgba(255, 109, 174, 0.12), transparent 34%),
          linear-gradient(180deg, #030611 0%, #09112b 44%, #060914 100%);
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(121, 245, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        padding: 0;
        border-radius: 999px;
        background: rgba(4, 8, 22, 0.92);
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(121, 245, 255, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 14px;
        z-index: 18;
        display: flex;
        justify-content: center;
        padding: 0 14px calc(14px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 10px;
        width: min(100%, 360px);
        justify-content: space-between;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(121, 245, 255, 0.2);
        border-radius: 999px;
        min-width: 122px;
        min-height: 54px;
        padding: 0 18px;
        background:
          linear-gradient(180deg, rgba(20, 31, 63, 0.94), rgba(8, 14, 34, 0.94));
        box-shadow:
          0 16px 34px rgba(4, 8, 22, 0.42),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        color: var(--ink);
        font: 800 15px/1 "Trebuchet MS", "Segoe UI", sans-serif;
        letter-spacing: 0.04em;
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        border-color: rgba(121, 245, 255, 0.42);
        box-shadow:
          0 12px 22px rgba(4, 8, 22, 0.3),
          0 0 24px rgba(121, 245, 255, 0.24);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 10px;
          padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
        }

        .mobile-btn {
          min-width: 108px;
          min-height: 50px;
          padding: 0 14px;
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Storm Archive: Orbit Shepherd. 마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전,
      과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      과열을 폭주시키지 않고 위성 3기를 목표 링에 순서대로 통과시키면 클리어.
      과열 게이지가 폭주하거나 위성이 소멸 구역에 닿으면 즉시 실패.
      화면 터치와 드래그, 짧은 탭, 모바일 버튼으로 시작과 플레이가 가능합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Storm Archive: Orbit Shepherd"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작 버튼">
      <div class="mobile-controls__row">
        <button class="mobile-btn" type="button" data-control="reverse" data-active="false" aria-label="궤도 반전">
          궤도 반전
        </button>
        <button class="mobile-btn" type="button" data-control="hold" data-active="false" aria-label="짧게 식히기 힌트">
          짧게 식히기
        </button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext =
        window.RelayRuntime?.readContext("storm-archive-orbit-herding-heat") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const STAGE_META = {
        id: "storm-archive-orbit-herding-heat",
        title: "Storm Archive: Orbit Shepherd",
        description:
          "폭풍 기록고에서 비콘을 끌어 위성 떼를 문으로 유도하세요. 급한 조작은 과열되니 짧게 식히는 리듬이 필요합니다.",
        creator: "jungcollin",
        genre: "Orbital survival / 과열 관리",
        clearCondition: "과열을 폭주시키지 않고 위성 3기를 목표 링에 순서대로 통과시키면 클리어",
        failCondition: "과열 게이지가 폭주하거나 위성이 소멸 구역에 닿으면 즉시 실패",
        controls:
          "마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
      };

      const PALETTE = {
        ink: "#eef6ff",
        haze: "rgba(238, 246, 255, 0.68)",
        cyan: "#79f5ff",
        cyanSoft: "rgba(121, 245, 255, 0.18)",
        mint: "#77ffd8",
        amber: "#ffd579",
        rose: "#ff82bc",
        violet: "#728fff",
        danger: "#ff6576",
        dangerSoft: "rgba(255, 101, 118, 0.18)",
        bg0: "#040816",
        bg1: "#09112a",
        bg2: "#13204a",
      };

      const SATELLITE_BLUEPRINTS = [
        { radius: 86, speed: 1.75, size: 13, color: "#79f5ff", glow: "rgba(121, 245, 255, 0.48)", seed: 0.2 },
        { radius: 128, speed: 1.42, size: 14, color: "#ffd579", glow: "rgba(255, 213, 121, 0.44)", seed: 1.4 },
        { radius: 170, speed: 1.12, size: 15, color: "#ff82bc", glow: "rgba(255, 130, 188, 0.42)", seed: 2.6 },
      ];

      const GATE_BLUEPRINTS = [
        { x: 734, y: 154, radius: 44, pulseSpeed: 2.7, phase: 0.2, tint: "#79f5ff" },
        { x: 784, y: 360, radius: 46, pulseSpeed: 3.1, phase: 1.4, tint: "#ffd579" },
        { x: 232, y: 126, radius: 42, pulseSpeed: 2.9, phase: 2.5, tint: "#ff82bc" },
      ];

      const state = createInitialState();
      const keys = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function createInitialState() {
        return {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          heat: 16,
          orbitDirection: 1,
          reverseCooldown: 0,
          reverseFlash: 0,
          gateRejectCooldown: 0,
          beacon: {
            x: 186,
            y: 330,
            targetX: 186,
            targetY: 330,
            prevX: 186,
            prevY: 330,
            speed: 0,
            trail: [],
          },
          pointer: {
            active: false,
            id: null,
            startMode: "menu",
            downAt: 0,
            startClientX: 0,
            startClientY: 0,
            moved: false,
          },
          satellites: createSatellites(),
          gateIndex: 0,
          gateReveal: 0,
          stormDust: createStormDust(),
          particles: [],
          popups: [],
          archivedGhosts: [],
          screenShake: 0,
          stormFlash: 0,
          hintGlow: 0,
          scanTime: 0,
          hotStreak: 0,
          failureReason: null,
        };
      }

      function createSatellites() {
        return SATELLITE_BLUEPRINTS.map((blueprint, index) => ({
          id: index + 1,
          angle: blueprint.seed + index * Math.PI * 0.64,
          radius: blueprint.radius,
          speed: blueprint.speed,
          size: blueprint.size,
          color: blueprint.color,
          glow: blueprint.glow,
          x: 0,
          y: 0,
          archived: false,
        }));
      }

      function createStormDust() {
        const amount = reduceMotion ? 18 : 34;
        return Array.from({ length: amount }, (_, index) => ({
          x: (index * 79) % VIEW.width,
          y: (index * 43) % VIEW.height,
          vx: 18 + (index % 5) * 7,
          vy: -6 + (index % 4) * 4,
          size: 1.5 + (index % 3) * 1.2,
          alpha: 0.15 + (index % 4) * 0.05,
        }));
      }

      function resetState(mode = "menu") {
        const next = createInitialState();
        Object.assign(state, next);
        state.mode = mode;
        window.relayStageResult.status = "running";
      }

      function startStage() {
        resetState("running");
        state.gateReveal = 1;
        state.hintGlow = 1;
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function restartStage() {
        startStage();
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }

      function round(value) {
        return Number(value.toFixed(1));
      }

      function getGateBlueprint(index = state.gateIndex) {
        return GATE_BLUEPRINTS[Math.min(index, GATE_BLUEPRINTS.length - 1)];
      }

      function getGateState(index = state.gateIndex) {
        const blueprint = getGateBlueprint(index);
        const pulse =
          0.5 +
          0.5 * Math.sin(state.elapsed * blueprint.pulseSpeed + blueprint.phase);
        return {
          ...blueprint,
          pulse,
          open: pulse > 0.74,
          innerRadius: blueprint.radius * 0.72,
        };
      }

      function getHazardState() {
        const swingX = Math.sin(state.elapsed * 0.74 + 0.5) * 118;
        const swingY = Math.cos(state.elapsed * 0.92 - 0.2) * 72;
        const intensity = clamp(state.heat / 100, 0, 1);
        return {
          x: 406 + swingX,
          y: 298 + swingY,
          radius: 58 + Math.sin(state.elapsed * 1.8) * 10 + intensity * 16,
        };
      }

      function getCurrentSatellite() {
        return state.satellites[state.gateIndex] || null;
      }

      function addHeat(amount) {
        state.heat = clamp(state.heat + amount, 0, 100);
        if (state.heat > 76) {
          state.hintGlow = 1;
        }
      }

      function showPopup(text, x, y, color = PALETTE.ink, scale = 1) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: 0.95,
          scale,
        });
      }

      function spawnBurst(x, y, color, count = reduceMotion ? 8 : 18) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.24;
          const speed = 40 + Math.random() * 180;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 5,
            life: 0.4 + Math.random() * 0.6,
            color,
          });
        }
      }

      function nudgeShake(amount) {
        state.screenShake = Math.max(state.screenShake, amount);
      }

      function reverseOrbit(source = "tap") {
        if (state.mode !== "running" || state.reverseCooldown > 0) {
          return;
        }
        state.orbitDirection *= -1;
        state.reverseCooldown = 0.18;
        state.reverseFlash = 1;
        state.stormFlash = 1;
        addHeat(10 + state.gateIndex * 2);
        spawnBurst(state.beacon.x, state.beacon.y, PALETTE.cyan, reduceMotion ? 6 : 14);
        showPopup(source === "button" ? "반전 실행" : "궤도 반전", state.beacon.x, state.beacon.y - 42, PALETTE.cyan);
        nudgeShake(reduceMotion ? 2 : 5);
      }

      function failStage(reason = "failed") {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.failureReason = reason;
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        nudgeShake(reduceMotion ? 2.5 : 8);
        spawnBurst(state.beacon.x, state.beacon.y, PALETTE.danger, reduceMotion ? 10 : 24);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        state.reverseFlash = 1;
        state.stormFlash = 1;
        spawnBurst(state.beacon.x, state.beacon.y, PALETTE.mint, reduceMotion ? 14 : 34);
        reportClearedToHost();
      }

      function archiveCurrentSatellite() {
        const satellite = getCurrentSatellite();
        if (!satellite || satellite.archived) {
          return;
        }
        const gate = getGateState();
        satellite.archived = true;
        state.archivedGhosts.push({
          x: satellite.x,
          y: satellite.y,
          targetX: gate.x,
          targetY: gate.y,
          color: satellite.color,
          life: 0.85,
          id: satellite.id,
        });
        spawnBurst(gate.x, gate.y, satellite.color, reduceMotion ? 10 : 22);
        showPopup(`위성 ${satellite.id} 통과`, gate.x, gate.y - 38, satellite.color, 1.18);
        state.gateIndex += 1;
        state.gateReveal = 1;
        state.stormFlash = 1;
        state.hintGlow = 1;
        state.heat = clamp(state.heat - 12, 0, 100);
        nudgeShake(reduceMotion ? 2 : 5);
        if (state.gateIndex >= state.satellites.length) {
          clearStage();
        }
      }

      function rejectGate() {
        const gate = getGateState();
        state.gateRejectCooldown = 0.32;
        addHeat(6);
        state.hintGlow = 1;
        showPopup("문 패턴 불일치", gate.x, gate.y - 38, PALETTE.amber, 0.96);
        spawnBurst(gate.x, gate.y, PALETTE.amber, reduceMotion ? 6 : 12);
        nudgeShake(reduceMotion ? 1.5 : 4);
      }

      function updateBeacon(dt) {
        const moveX = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        const moveY = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);
        if (moveX || moveY) {
          const length = Math.hypot(moveX, moveY) || 1;
          state.beacon.targetX = clamp(
            state.beacon.targetX + (moveX / length) * 320 * dt,
            96,
            VIEW.width - 96
          );
          state.beacon.targetY = clamp(
            state.beacon.targetY + (moveY / length) * 320 * dt,
            86,
            VIEW.height - 86
          );
        }

        state.beacon.prevX = state.beacon.x;
        state.beacon.prevY = state.beacon.y;
        const follow = 1 - Math.exp(-dt * 9.5);
        state.beacon.x = clamp(lerp(state.beacon.x, state.beacon.targetX, follow), 96, VIEW.width - 96);
        state.beacon.y = clamp(lerp(state.beacon.y, state.beacon.targetY, follow), 86, VIEW.height - 86);
        state.beacon.speed =
          distance(
            state.beacon.x,
            state.beacon.y,
            state.beacon.prevX,
            state.beacon.prevY
          ) / Math.max(dt, 0.0001);

        state.beacon.trail.unshift({
          x: state.beacon.x,
          y: state.beacon.y,
          life: 1,
        });
        state.beacon.trail = state.beacon.trail
          .slice(0, reduceMotion ? 8 : 14)
          .map((entry) => ({ ...entry, life: entry.life - dt * 1.9 }))
          .filter((entry) => entry.life > 0);
      }

      function updateHeat(dt) {
        const motionHeat = Math.max(0, state.beacon.speed - 58) * 0.0205 * dt;
        const idleFactor = clamp(1 - state.beacon.speed / 180, 0, 1);
        const cooling = (7 + idleFactor * 18) * dt;
        state.heat = clamp(state.heat + motionHeat - cooling, 0, 100);
        state.hotStreak = clamp(state.hotStreak + (state.heat > 78 ? dt * 1.8 : -dt), 0, 1);
        if (state.heat >= 100) {
          failStage("overheat");
        }
      }

      function updateSatellites(dt) {
        const hazard = getHazardState();
        const target = getCurrentSatellite();
        const heatRatio = clamp(state.heat / 100, 0, 1);
        for (const satellite of state.satellites) {
          if (satellite.archived) {
            continue;
          }
          const wobble = Math.sin(state.elapsed * 1.8 + satellite.id * 1.2) * (2 + heatRatio * 5);
          satellite.angle += state.orbitDirection * satellite.speed * (1 + heatRatio * 0.16) * dt;
          const orbitRadius = satellite.radius + wobble;
          satellite.x = state.beacon.x + Math.cos(satellite.angle) * orbitRadius;
          satellite.y = state.beacon.y + Math.sin(satellite.angle) * orbitRadius;

          if (distance(satellite.x, satellite.y, hazard.x, hazard.y) < hazard.radius + satellite.size * 0.72) {
            failStage("dissolution-zone");
            return;
          }
        }

        if (!target || target.archived) {
          return;
        }

        const gate = getGateState();
        if (distance(target.x, target.y, gate.x, gate.y) < gate.innerRadius + target.size * 0.55) {
          if (gate.open) {
            archiveCurrentSatellite();
          } else if (state.gateRejectCooldown <= 0) {
            rejectGate();
          }
        }
      }

      function updateStormDust(dt) {
        for (const dust of state.stormDust) {
          dust.x += dust.vx * dt;
          dust.y += dust.vy * dt;
          if (dust.x > VIEW.width + 24) {
            dust.x = -24;
          }
          if (dust.y < -24) {
            dust.y = VIEW.height + 24;
          }
        }
      }

      function updateEffects(dt) {
        state.reverseCooldown = Math.max(0, state.reverseCooldown - dt);
        state.reverseFlash = Math.max(0, state.reverseFlash - dt * 2.6);
        state.stormFlash = Math.max(0, state.stormFlash - dt * 2.2);
        state.hintGlow = Math.max(0, state.hintGlow - dt * 1.3);
        state.gateReveal = Math.max(0, state.gateReveal - dt * 0.8);
        state.gateRejectCooldown = Math.max(0, state.gateRejectCooldown - dt);
        state.screenShake = Math.max(0, state.screenShake - dt * 14);

        state.particles = state.particles
          .map((particle) => ({
            ...particle,
            x: particle.x + particle.vx * dt,
            y: particle.y + particle.vy * dt,
            vx: particle.vx * (1 - dt * 1.8),
            vy: particle.vy * (1 - dt * 1.8),
            life: particle.life - dt,
          }))
          .filter((particle) => particle.life > 0);

        state.popups = state.popups
          .map((popup) => ({
            ...popup,
            y: popup.y - dt * 32,
            life: popup.life - dt,
          }))
          .filter((popup) => popup.life > 0);

        state.archivedGhosts = state.archivedGhosts
          .map((ghost) => ({
            ...ghost,
            x: lerp(ghost.x, ghost.targetX, 1 - Math.exp(-dt * 8)),
            y: lerp(ghost.y, ghost.targetY, 1 - Math.exp(-dt * 8)),
            life: ghost.life - dt,
          }))
          .filter((ghost) => ghost.life > 0);
      }

      function update(dt) {
        state.scanTime += dt;
        updateStormDust(dt);
        updateEffects(dt);

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        updateBeacon(dt);
        updateHeat(dt);
        updateSatellites(dt);
      }

      function drawBackground() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        const bgGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        bgGradient.addColorStop(0, "#050914");
        bgGradient.addColorStop(0.56, "#0d1636");
        bgGradient.addColorStop(1, "#040714");
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const stormGradient = ctx.createRadialGradient(
          VIEW.width * 0.5,
          VIEW.height * 0.46,
          40,
          VIEW.width * 0.5,
          VIEW.height * 0.46,
          VIEW.height * 0.72
        );
        stormGradient.addColorStop(0, "rgba(103, 130, 255, 0.12)");
        stormGradient.addColorStop(0.46, "rgba(76, 163, 255, 0.09)");
        stormGradient.addColorStop(1, "rgba(7, 14, 34, 0)");
        ctx.fillStyle = stormGradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.strokeStyle = "rgba(124, 148, 190, 0.08)";
        ctx.lineWidth = 1;
        for (let x = 56; x < VIEW.width; x += 76) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, VIEW.height);
          ctx.stroke();
        }
        for (let y = 36; y < VIEW.height; y += 54) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(VIEW.width, y);
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        for (const dust of state.stormDust) {
          ctx.globalAlpha = dust.alpha;
          ctx.fillStyle = PALETTE.cyan;
          ctx.beginPath();
          ctx.arc(dust.x, dust.y, dust.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawHazard() {
        const hazard = getHazardState();
        ctx.save();
        const hazardGlow = ctx.createRadialGradient(hazard.x, hazard.y, 12, hazard.x, hazard.y, hazard.radius * 1.7);
        hazardGlow.addColorStop(0, "rgba(255, 101, 118, 0.28)");
        hazardGlow.addColorStop(0.42, "rgba(255, 101, 118, 0.16)");
        hazardGlow.addColorStop(1, "rgba(255, 101, 118, 0)");
        ctx.fillStyle = hazardGlow;
        ctx.beginPath();
        ctx.arc(hazard.x, hazard.y, hazard.radius * 1.7, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 136, 147, 0.24)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(hazard.x, hazard.y, hazard.radius + Math.sin(state.elapsed * 2.8) * 4, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalAlpha = 0.9;
        ctx.fillStyle = "rgba(10, 5, 18, 0.92)";
        ctx.beginPath();
        ctx.arc(hazard.x, hazard.y, hazard.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 101, 118, 0.6)";
        ctx.lineWidth = 2;
        for (let index = 0; index < 4; index += 1) {
          const angle = state.elapsed * 0.8 + index * (Math.PI / 2);
          ctx.beginPath();
          ctx.moveTo(hazard.x, hazard.y);
          ctx.lineTo(
            hazard.x + Math.cos(angle) * (hazard.radius + 18),
            hazard.y + Math.sin(angle) * (hazard.radius + 18)
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawGate() {
        if (state.gateIndex >= state.satellites.length) {
          return;
        }
        const gate = getGateState();
        ctx.save();
        ctx.translate(gate.x, gate.y);
        ctx.rotate(state.elapsed * 0.34 + state.gateIndex * 0.16);

        const halo = ctx.createRadialGradient(0, 0, 16, 0, 0, gate.radius * 2.4);
        halo.addColorStop(0, `${gate.tint}2a`);
        halo.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(0, 0, gate.radius * 2.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `${gate.tint}55`;
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(0, 0, gate.radius + 10, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = gate.open ? gate.tint : "rgba(255, 213, 121, 0.78)";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(0, 0, gate.radius, -Math.PI * 0.58, Math.PI * 0.58);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, gate.radius, Math.PI * 0.72, Math.PI * 1.28);
        ctx.stroke();

        ctx.strokeStyle = gate.open ? "rgba(238, 246, 255, 0.85)" : "rgba(255, 213, 121, 0.45)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, gate.innerRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.fillStyle = gate.open ? "rgba(121, 245, 255, 0.16)" : "rgba(255, 213, 121, 0.12)";
        ctx.beginPath();
        ctx.arc(gate.x, gate.y, gate.innerRadius, 0, Math.PI * 2);
        ctx.fill();

        const labelY = gate.y - gate.radius - 24;
        const labelX = gate.x > VIEW.width - 240 ? gate.x - 112 : gate.x;
        ctx.fillStyle = PALETTE.ink;
        ctx.font = "700 15px Trebuchet MS, Segoe UI, sans-serif";
        ctx.textAlign = gate.x > VIEW.width - 240 ? "left" : "center";
        ctx.fillText(`ARCHIVE GATE ${state.gateIndex + 1}`, labelX, labelY);
        ctx.font = "600 11px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = gate.open ? gate.tint : PALETTE.amber;
        ctx.fillText(gate.open ? "동기화 열림" : "패턴 대기", labelX, labelY + 15);
        ctx.restore();
      }

      function drawBeacon() {
        ctx.save();
        for (const trail of state.beacon.trail) {
          ctx.globalAlpha = trail.life * 0.16;
          ctx.fillStyle = PALETTE.cyan;
          ctx.beginPath();
          ctx.arc(trail.x, trail.y, 22 * trail.life, 0, Math.PI * 2);
          ctx.fill();
        }

        const outer = ctx.createRadialGradient(
          state.beacon.x,
          state.beacon.y,
          6,
          state.beacon.x,
          state.beacon.y,
          56
        );
        outer.addColorStop(0, "rgba(121, 245, 255, 0.95)");
        outer.addColorStop(0.3, "rgba(121, 245, 255, 0.36)");
        outer.addColorStop(1, "rgba(121, 245, 255, 0)");
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, 56, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(121, 245, 255, 0.55)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, 26, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(238, 246, 255, 0.72)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(state.beacon.x - 14, state.beacon.y);
        ctx.lineTo(state.beacon.x + 14, state.beacon.y);
        ctx.moveTo(state.beacon.x, state.beacon.y - 14);
        ctx.lineTo(state.beacon.x, state.beacon.y + 14);
        ctx.stroke();

        ctx.fillStyle = "#f7fcff";
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, 7.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawOrbits() {
        ctx.save();
        ctx.lineWidth = 1.5;
        for (const satellite of state.satellites) {
          if (satellite.archived) {
            continue;
          }
          ctx.strokeStyle =
            satellite.id === state.gateIndex + 1
              ? "rgba(238, 246, 255, 0.24)"
              : "rgba(148, 163, 184, 0.16)";
          ctx.beginPath();
          ctx.arc(state.beacon.x, state.beacon.y, satellite.radius, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawSatellites() {
        for (const satellite of state.satellites) {
          if (satellite.archived) {
            continue;
          }
          const isTarget = satellite.id === state.gateIndex + 1;
          ctx.save();
          ctx.shadowColor = satellite.color;
          ctx.shadowBlur = isTarget ? 26 : 16;
          ctx.fillStyle = satellite.color;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, satellite.size, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowBlur = 0;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.82)";
          ctx.lineWidth = isTarget ? 3 : 2;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, satellite.size - 5, 0, Math.PI * 2);
          ctx.stroke();

          ctx.fillStyle = "rgba(4, 8, 22, 0.9)";
          ctx.font = "800 11px Trebuchet MS, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(String(satellite.id), satellite.x, satellite.y + 0.5);

          if (isTarget) {
            ctx.strokeStyle = "rgba(238, 246, 255, 0.78)";
            ctx.setLineDash([5, 6]);
            ctx.beginPath();
            ctx.arc(satellite.x, satellite.y, satellite.size + 10 + Math.sin(state.elapsed * 4) * 1.5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
          }
          ctx.restore();
        }

        for (const ghost of state.archivedGhosts) {
          ctx.save();
          ctx.globalAlpha = ghost.life;
          ctx.fillStyle = ghost.color;
          ctx.beginPath();
          ctx.arc(ghost.x, ghost.y, 9 + ghost.life * 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {
          ctx.save();
          ctx.globalAlpha = clamp(particle.life, 0, 1);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPopups() {
        ctx.save();
        ctx.textAlign = "center";
        for (const popup of state.popups) {
          ctx.globalAlpha = clamp(popup.life, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.font = `800 ${Math.round(16 * popup.scale)}px Trebuchet MS, Segoe UI, sans-serif`;
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.restore();
      }

      function drawHud() {
        const gate = getGateState();
        const target = getCurrentSatellite();
        const heatRatio = clamp(state.heat / 100, 0, 1);

        ctx.save();
        ctx.fillStyle = "rgba(5, 10, 24, 0.62)";
        ctx.beginPath();
        ctx.roundRect(18, 18, 250, 104, 22);
        ctx.fill();

        ctx.fillStyle = "rgba(5, 10, 24, 0.62)";
        ctx.beginPath();
        ctx.roundRect(VIEW.width - 282, 18, 264, 104, 22);
        ctx.fill();

        ctx.fillStyle = PALETTE.ink;
        ctx.textAlign = "left";
        ctx.font = "800 18px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("Storm Archive", 34, 44);
        ctx.font = "600 12px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillStyle = PALETTE.haze;
        ctx.fillText("비콘을 끌어 목표 위성을 문에 맞추고, 급할수록 잠깐 멈춰 열을 식히세요.", 34, 62);

        ctx.fillStyle = PALETTE.ink;
        ctx.font = "700 13px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(`목표 위성 ${target ? target.id : 3}`, 34, 90);
        ctx.fillStyle = gate.open ? PALETTE.cyan : PALETTE.amber;
        ctx.fillText(gate.open ? "문 열림" : "패턴 대기", 34, 108);

        const heatX = VIEW.width - 256;
        const heatY = 52;
        const heatWidth = 212;
        const heatHeight = 14;
        ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
        ctx.beginPath();
        ctx.roundRect(heatX, heatY, heatWidth, heatHeight, 999);
        ctx.fill();
        const heatGradient = ctx.createLinearGradient(heatX, heatY, heatX + heatWidth, heatY);
        heatGradient.addColorStop(0, PALETTE.cyan);
        heatGradient.addColorStop(0.55, PALETTE.amber);
        heatGradient.addColorStop(1, PALETTE.danger);
        ctx.fillStyle = heatGradient;
        ctx.beginPath();
        ctx.roundRect(heatX, heatY, heatWidth * heatRatio, heatHeight, 999);
        ctx.fill();

        ctx.fillStyle = PALETTE.ink;
        ctx.font = "800 13px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(`HEAT ${Math.round(state.heat)}`, heatX, 42);
        ctx.fillStyle = heatRatio > 0.76 ? PALETTE.amber : PALETTE.haze;
        ctx.fillText(heatRatio > 0.76 ? "짧게 식히기" : "안정 범위", heatX, 92);
        ctx.fillStyle = PALETTE.haze;
        ctx.fillText(`문 ${state.gateIndex + 1}/3`, heatX, 110);

        ctx.restore();
      }

      function drawHints() {
        if (state.mode !== "running") {
          return;
        }
        if (state.elapsed > 5.4 && state.heat < 74 && state.hintGlow <= 0.04) {
          return;
        }
        ctx.save();
        ctx.globalAlpha = clamp(0.28 + state.hintGlow * 0.54, 0.18, 0.74);
        ctx.fillStyle = "rgba(6, 11, 28, 0.72)";
        ctx.beginPath();
        ctx.roundRect(VIEW.width * 0.5 - 150, VIEW.height - 108, 300, 34, 999);
        ctx.fill();
        ctx.fillStyle = state.heat > 76 ? PALETTE.amber : PALETTE.haze;
        ctx.textAlign = "center";
        ctx.font = "700 13px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(
          state.heat > 76
            ? "과열 직전. 드래그를 멈추고 짧게 식히세요."
            : "짧은 탭으로 궤도 반전, 드래그로 비콘 이동",
          VIEW.width * 0.5,
          VIEW.height - 86
        );
        ctx.restore();
      }

      function drawMenuOverlay() {
        ctx.save();
        ctx.fillStyle = "rgba(4, 8, 22, 0.3)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(8, 14, 33, 0.82)";
        ctx.beginPath();
        ctx.roundRect(82, 72, VIEW.width - 164, VIEW.height - 144, 30);
        ctx.fill();

        ctx.strokeStyle = "rgba(121, 245, 255, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(82, 72, VIEW.width - 164, VIEW.height - 144, 30);
        ctx.stroke();

        ctx.textAlign = "left";
        ctx.fillStyle = PALETTE.cyan;
        ctx.font = "800 14px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("STORM ARCHIVE RELAY", 128, 128);
        ctx.fillStyle = PALETTE.ink;
        ctx.font = "800 36px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("Orbit Shepherd", 128, 166);

        ctx.fillStyle = PALETTE.haze;
        ctx.font = "600 16px Trebuchet MS, Segoe UI, sans-serif";
        wrapText(
          STAGE_META.description,
          128,
          204,
          VIEW.width - 256,
          24
        );

        drawInfoBlock("조작", STAGE_META.controls, 128, 244, 306);
        drawInfoBlock("클리어", STAGE_META.clearCondition, 470, 244, 272);
        drawInfoBlock("실패", STAGE_META.failCondition, 470, 332, 272);

        ctx.fillStyle = "rgba(121, 245, 255, 0.12)";
        ctx.beginPath();
        ctx.roundRect(128, VIEW.height - 140, VIEW.width - 256, 60, 999);
        ctx.fill();

        ctx.fillStyle = PALETTE.ink;
        ctx.font = "800 18px Trebuchet MS, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("탭 또는 Enter로 시작", VIEW.width * 0.5, VIEW.height - 108);
        ctx.fillStyle = PALETTE.haze;
        ctx.font = "600 14px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("드래그로 위치를 만들고, 짧은 탭으로 궤도를 뒤집어 문 열림 리듬을 맞추세요.", VIEW.width * 0.5, VIEW.height - 86);
        ctx.restore();
      }

      function drawInfoBlock(title, body, x, y, width) {
        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
        ctx.beginPath();
        ctx.roundRect(x, y, width, 72, 20);
        ctx.fill();
        ctx.fillStyle = PALETTE.cyan;
        ctx.font = "800 13px Trebuchet MS, Segoe UI, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(title, x + 18, y + 22);
        ctx.fillStyle = PALETTE.ink;
        ctx.font = "600 14px Trebuchet MS, Segoe UI, sans-serif";
        wrapText(body, x + 18, y + 44, width - 36, 19);
        ctx.restore();
      }

      function drawResultOverlay() {
        if (state.mode === "running" || state.mode === "menu") {
          return;
        }

        const cleared = state.mode === "cleared";
        ctx.save();
        ctx.fillStyle = cleared ? "rgba(5, 16, 22, 0.42)" : "rgba(22, 6, 12, 0.46)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(7, 12, 29, 0.84)";
        ctx.beginPath();
        ctx.roundRect(VIEW.width * 0.5 - 214, VIEW.height * 0.5 - 134, 428, 268, 30);
        ctx.fill();

        ctx.strokeStyle = cleared ? "rgba(119, 255, 216, 0.26)" : "rgba(255, 101, 118, 0.24)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(VIEW.width * 0.5 - 214, VIEW.height * 0.5 - 134, 428, 268, 30);
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = cleared ? PALETTE.mint : PALETTE.danger;
        ctx.font = "800 18px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(cleared ? "ARCHIVE COMPLETE" : "ARCHIVE LOST", VIEW.width * 0.5, VIEW.height * 0.5 - 58);

        ctx.fillStyle = PALETTE.ink;
        ctx.font = "800 34px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(cleared ? "세 위성을 모두 통과시켰습니다." : "과열 패턴이 붕괴했습니다.", VIEW.width * 0.5, VIEW.height * 0.5 - 18);

        ctx.fillStyle = PALETTE.haze;
        ctx.font = "600 16px Trebuchet MS, Segoe UI, sans-serif";
        const detail = cleared
          ? `기록 시간 ${state.lastRunTime.toFixed(1)}초. 다음 릴레이를 준비할 수 있습니다.`
          : state.failureReason === "overheat"
            ? "열 게이지가 폭주했습니다. 다음 시도는 강한 이동 뒤 짧게 멈춰 냉각하세요."
            : "위성이 소멸 구역에 닿았습니다. 비콘을 크게 끌기 전에 위험 원의 이동을 먼저 읽으세요.";
        wrapText(detail, VIEW.width * 0.5 - 160, VIEW.height * 0.5 + 20, 320, 23, true);

        ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
        ctx.beginPath();
        ctx.roundRect(VIEW.width * 0.5 - 154, VIEW.height * 0.5 + 74, 308, 46, 999);
        ctx.fill();
        ctx.fillStyle = PALETTE.ink;
        ctx.font = "800 16px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("탭 또는 Enter로 재시작", VIEW.width * 0.5, VIEW.height * 0.5 + 103);
        ctx.restore();
      }

      function wrapText(text, x, y, maxWidth, lineHeight, centered = false) {
        const words = String(text).split(" ");
        let line = "";
        let row = 0;
        ctx.textAlign = centered ? "center" : "left";
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          const width = ctx.measureText(test).width;
          if (width > maxWidth && line) {
            ctx.fillText(line, x, y + row * lineHeight);
            line = word;
            row += 1;
          } else {
            line = test;
          }
        }
        if (line) {
          ctx.fillText(line, x, y + row * lineHeight);
        }
      }

      function render() {
        const shakeX = state.screenShake ? (Math.random() - 0.5) * state.screenShake * 2 : 0;
        const shakeY = state.screenShake ? (Math.random() - 0.5) * state.screenShake * 2 : 0;
        ctx.save();
        ctx.translate(shakeX, shakeY);

        drawBackground();
        drawHazard();
        drawGate();
        drawOrbits();
        drawBeacon();
        drawSatellites();
        drawParticles();
        drawHud();
        drawHints();
        drawPopups();
        if (state.mode === "menu") {
          drawMenuOverlay();
        }
        drawResultOverlay();
        ctx.restore();
      }

      function stepFrame(dt) {
        update(Math.min(dt, MAX_DT));
        render();
      }

      function gameLoop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        let delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        delta = Math.min(delta, MAX_DT);
        stepFrame(delta);
        animationFrame = window.requestAnimationFrame(gameLoop);
      }

      function clientToWorld(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: clamp(((clientX - rect.left) / rect.width) * VIEW.width, 0, VIEW.width),
          y: clamp(((clientY - rect.top) / rect.height) * VIEW.height, 0, VIEW.height),
        };
      }

      function updatePointerTarget(clientX, clientY) {
        const point = clientToWorld(clientX, clientY);
        state.beacon.targetX = clamp(point.x, 96, VIEW.width - 96);
        state.beacon.targetY = clamp(point.y, 86, VIEW.height - 86);
      }

      function onCanvasPointerDown(event) {
        if (event.button !== undefined && event.button !== 0) {
          return;
        }
        event.preventDefault();
        canvas.focus();
        const modeBefore = state.mode;
        if (modeBefore === "menu") {
          startStage();
        } else if (modeBefore === "failed" || modeBefore === "cleared") {
          restartStage();
        }
        state.pointer.active = true;
        state.pointer.id = event.pointerId;
        state.pointer.startMode = modeBefore;
        state.pointer.downAt = performance.now();
        state.pointer.startClientX = event.clientX;
        state.pointer.startClientY = event.clientY;
        state.pointer.moved = false;
        if (modeBefore === "running") {
          updatePointerTarget(event.clientX, event.clientY);
        }
        canvas.setPointerCapture?.(event.pointerId);
      }

      function onCanvasPointerMove(event) {
        if (!state.pointer.active || state.pointer.id !== event.pointerId) {
          return;
        }
        if (
          Math.hypot(
            event.clientX - state.pointer.startClientX,
            event.clientY - state.pointer.startClientY
          ) > 10
        ) {
          state.pointer.moved = true;
        }
        updatePointerTarget(event.clientX, event.clientY);
      }

      function onCanvasPointerUp(event) {
        if (!state.pointer.active || state.pointer.id !== event.pointerId) {
          return;
        }
        const duration = performance.now() - state.pointer.downAt;
        const wasTap = !state.pointer.moved && duration < 220;
        const startedWhileRunning = state.pointer.startMode === "running";
        state.pointer.active = false;
        state.pointer.id = null;
        if (wasTap && startedWhileRunning && state.mode === "running") {
          reverseOrbit("tap");
        }
      }

      function onCanvasPointerCancel(event) {
        if (!state.pointer.active || state.pointer.id !== event.pointerId) {
          return;
        }
        state.pointer.active = false;
        state.pointer.id = null;
      }

      function onKeyChange(event, pressed) {
        const key = event.key.toLowerCase();
        if (["arrowleft", "arrowright", "arrowup", "arrowdown", " ", "enter", "a", "d", "w", "s"].includes(key)) {
          event.preventDefault();
        }

        if (key === "arrowleft" || key === "a") {
          keys.left = pressed;
        } else if (key === "arrowright" || key === "d") {
          keys.right = pressed;
        } else if (key === "arrowup" || key === "w") {
          keys.up = pressed;
        } else if (key === "arrowdown" || key === "s") {
          keys.down = pressed;
        } else if (pressed && (key === " " || key === "enter")) {
          if (state.mode === "menu") {
            startStage();
          } else if (state.mode === "running") {
            reverseOrbit("key");
          } else {
            restartStage();
          }
        }
      }

      function bindMobileButtons() {
        const reverseButton = document.querySelector('[data-control="reverse"]');
        const holdButton = document.querySelector('[data-control="hold"]');
        if (reverseButton) {
          const triggerReverse = (event) => {
            event.preventDefault();
            canvas.focus();
            if (state.mode === "menu") {
              startStage();
            } else if (state.mode === "failed" || state.mode === "cleared") {
              restartStage();
            }
            reverseButton.dataset.active = "true";
            reverseOrbit("button");
            window.setTimeout(() => {
              reverseButton.dataset.active = "false";
            }, 120);
          };
          reverseButton.addEventListener("pointerdown", triggerReverse);
          reverseButton.addEventListener("click", (event) => event.preventDefault());
        }
        if (holdButton) {
          const flashHint = (event) => {
            event.preventDefault();
            holdButton.dataset.active = "true";
            state.hintGlow = 1;
            showPopup("정지 시 냉각 증가", VIEW.width * 0.5, VIEW.height - 92, PALETTE.mint, 0.92);
            window.setTimeout(() => {
              holdButton.dataset.active = "false";
            }, 150);
          };
          holdButton.addEventListener("pointerdown", flashHint);
          holdButton.addEventListener("click", (event) => event.preventDefault());
        }
      }

      window.relayStageMeta = {
        id: STAGE_META.id,
        title: STAGE_META.title,
        creator: STAGE_META.creator,
        genre: STAGE_META.genre,
        clearCondition: STAGE_META.clearCondition,
        failCondition: STAGE_META.failCondition,
        controls: STAGE_META.controls,
        description: STAGE_META.description,
      };

      window.relayStageResult = { status: "running" };

      window.render_game_to_text = () =>
        JSON.stringify({
          mode: state.mode,
          coordinateSystem: "origin top-left, x right, y down",
          elapsed: round(state.elapsed),
          heat: round(state.heat),
          orbitDirection: state.orbitDirection,
          beacon: {
            x: round(state.beacon.x),
            y: round(state.beacon.y),
            speed: round(state.beacon.speed),
          },
          targetGate:
            state.gateIndex < state.satellites.length
              ? {
                  index: state.gateIndex + 1,
                  ...(() => {
                    const gate = getGateState();
                    return {
                      x: round(gate.x),
                      y: round(gate.y),
                      radius: round(gate.innerRadius),
                      open: gate.open,
                    };
                  })(),
                }
              : null,
          hazard: (() => {
            const hazard = getHazardState();
            return {
              x: round(hazard.x),
              y: round(hazard.y),
              radius: round(hazard.radius),
            };
          })(),
          satellites: state.satellites.map((satellite) => ({
            id: satellite.id,
            archived: satellite.archived,
            x: round(satellite.x),
            y: round(satellite.y),
            radius: round(satellite.radius),
          })),
        });

      window.advanceTime = (ms) => {
        const total = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < total; index += 1) {
          stepFrame(FIXED_DT);
        }
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          for (let index = state.gateIndex; index < state.satellites.length; index += 1) {
            const satellite = state.satellites[index];
            if (satellite) {
              satellite.archived = true;
            }
          }
          state.gateIndex = state.satellites.length;
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("debug-force-fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onCanvasPointerDown, { passive: false });
      canvas.addEventListener("pointermove", onCanvasPointerMove, { passive: false });
      canvas.addEventListener("pointerup", onCanvasPointerUp, { passive: false });
      canvas.addEventListener("pointercancel", onCanvasPointerCancel, { passive: false });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      window.addEventListener("keydown", (event) => onKeyChange(event, true));
      window.addEventListener("keyup", (event) => onKeyChange(event, false));

      bindMobileButtons();
      render();
      reportReadyToHost();
      animationFrame = window.requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
