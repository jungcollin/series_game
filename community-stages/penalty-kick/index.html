<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>승부차기</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0a1628;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0a1628;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">승부차기. 캔버스를 터치하거나 Enter로 시작하세요. 화면 터치/클릭으로 방향 조준 후 킥. 키퍼가 계속 움직이며 막으니 빈 곳을 노리세요. 7번의 킥 중 4골 이상 성공하면 클리어, 4번째 실축 시 즉시 실패합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="승부차기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      /* ===========================
         SETUP & CONSTANTS
         =========================== */
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;

      const GOAL = { left: 230, right: 730, top: 155, bottom: 295, postW: 10 };
      const GOAL_CX = (GOAL.left + GOAL.right) / 2;
      const GOAL_CY = (GOAL.top + GOAL.bottom) / 2;
      const GOAL_W = GOAL.right - GOAL.left;
      const GOAL_H = GOAL.bottom - GOAL.top;
      const FIELD_Y = GOAL.bottom;
      const PENALTY = { x: 480, y: 455 };
      const BALL_R = 10;
      const BALL_FLIGHT = 0.55;
      const KEEPER_BODY_HALF = 15;
      const KEEPER_COLORS = ["#fbbf24", "#3b82f6", "#ef4444"];

      /* ===========================
         ROUND CONFIGS
         Keepers patrol continuously.
         Player clicks/taps to aim.
         =========================== */
      const ROUNDS = [
        {
          name: "기본", emoji: "⚽",
          keepers: [{ patrolSpeed: 2.2, patrolRange: 210, arm: 80, phase: 0 }],
          birds: 0,
        },
        {
          name: "빨라지는 키퍼", emoji: "💨",
          keepers: [{ patrolSpeed: 3.2, patrolRange: 220, arm: 95, phase: 0 }],
          birds: 0,
        },
        {
          name: "긴 팔 키퍼", emoji: "🦑",
          keepers: [{ patrolSpeed: 3.5, patrolRange: 210, arm: 200, phase: 0 }],
          birds: 0,
        },
        {
          name: "거미 키퍼", emoji: "🕷️",
          keepers: [{ patrolSpeed: 4.0, patrolRange: 220, arm: 150, phase: 0, armCount: 6 }],
          birds: 0,
        },
        {
          name: "더블 키퍼", emoji: "👥",
          keepers: [
            { patrolSpeed: 2.8, patrolRange: 155, arm: 140, phase: 0, chaotic: true },
            { patrolSpeed: 3.2, patrolRange: 155, arm: 140, phase: Math.PI * 0.7, chaotic: true },
          ],
          birds: 0,
        },
        {
          name: "비둘기 습격", emoji: "🐦",
          keepers: [{ patrolSpeed: 3.5, patrolRange: 220, arm: 140, phase: 0, chaotic: true }],
          birds: 7,
        },
        {
          name: "최종 방어선", emoji: "🏰",
          keepers: [
            { patrolSpeed: 2.8, patrolRange: 140, arm: 140, phase: 0, chaotic: true },
            { patrolSpeed: 3.2, patrolRange: 140, arm: 140, phase: Math.PI * 0.5, chaotic: true },
            { patrolSpeed: 2.5, patrolRange: 140, arm: 140, phase: Math.PI * 1.2, chaotic: true },
          ],
          birds: 5,
        },
      ];

      /* ===========================
         RELAY CONTEXT
         =========================== */
      const relayContext = window.RelayRuntime?.readContext("penalty-kick") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
      };

      /* ===========================
         GAME STATE
         =========================== */
      const game = {
        round: 0,
        goals: 0,
        misses: 0,
        phase: "intro",
        phaseTimer: 0,
        patrolTimer: 0,
        ballX: PENALTY.x,
        ballY: PENALTY.y,
        targetX: 0,
        targetY: 0,
        ballProgress: 0,
        birdBlocked: false,
        keepers: [],
        birds: [],
        particles: [],
        lastResult: "",
        failReason: "",
        shakeAmount: 0,
        kicking: false,
        /* aim indicator (desktop mouse hover) */
        aimX: -1,
        aimY: -1,
      };

      /* ===========================
         HOST COMMUNICATION
         =========================== */
      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (e) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        game.round = 0;
        game.goals = 0;
        game.misses = 0;
        game.particles = [];
        game.shakeAmount = 0;
        game.kicking = false;
        game.patrolTimer = 0;
        initRound(0);
      }

      function failStage(reason) {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        game.failReason = reason;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        spawnConfetti(W / 2, H / 2, 60);
        reportClearedToHost();
      }

      /* ===========================
         COORDINATE HELPERS
         =========================== */
      function screenToCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) / rect.width * W,
          y: (clientY - rect.top) / rect.height * H,
        };
      }

      function isInGoal(x, y) {
        return x >= GOAL.left + 5 && x <= GOAL.right - 5 &&
               y >= GOAL.top + 5 && y <= GOAL.bottom - 5;
      }

      /* ===========================
         GAME INIT
         =========================== */
      function initRound(idx) {
        const cfg = ROUNDS[idx];
        game.phase = "intro";
        game.phaseTimer = 0;
        game.kicking = false;
        game.birdBlocked = false;
        game.ballX = PENALTY.x;
        game.ballY = PENALTY.y;
        game.ballProgress = 0;

        const kCount = cfg.keepers.length;
        game.keepers = cfg.keepers.map((k, i) => {
          const homeX = kCount === 1
            ? GOAL_CX
            : GOAL.left + (GOAL_W / (kCount + 1)) * (i + 1);
          return {
            x: homeX,
            homeX,
            patrolSpeed: k.patrolSpeed,
            patrolRange: k.patrolRange,
            patrolPhase: k.phase,
            arm: k.arm,
            armCount: k.armCount || 2,
            chaotic: k.chaotic || false,
            chaoticTargetX: homeX,
            chaoticTargetY: 0,
            chaoticTimer: 0,
            offsetY: 0,
            color: KEEPER_COLORS[i % KEEPER_COLORS.length],
          };
        });

        game.birds = [];
        for (let i = 0; i < cfg.birds; i++) {
          game.birds.push({
            x: i % 2 === 0 ? GOAL.left - 40 : GOAL.right + 40,
            y: GOAL.top + 5 + Math.random() * (GOAL_H - 10),
            speed: (70 + Math.random() * 50) * (i % 2 === 0 ? 1 : -1),
            wingPhase: Math.random() * Math.PI * 2,
          });
        }
      }

      /* ===========================
         INPUT: AIM & KICK
         =========================== */
      function handleAimKick(canvasX, canvasY) {
        if (state.mode !== "running" || game.phase !== "aiming") return;
        if (!isInGoal(canvasX, canvasY)) return;

        game.targetX = Math.max(GOAL.left + 12, Math.min(GOAL.right - 12, canvasX));
        game.targetY = Math.max(GOAL.top + 12, Math.min(GOAL.bottom - 12, canvasY));
        game.ballProgress = 0;
        game.phase = "flying";
        game.kicking = true;
        game.birdBlocked = false;
      }

      /* ===========================
         PARTICLES
         =========================== */
      function spawnConfetti(x, y, count) {
        const colors = ["#fbbf24", "#f97316", "#ef4444", "#22c55e", "#3b82f6", "#a855f7"];
        for (let i = 0; i < count; i++) {
          game.particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 500,
            vy: -Math.random() * 350 - 80,
            life: 1,
            color: colors[i % colors.length],
            size: 3 + Math.random() * 5,
            rot: Math.random() * Math.PI * 2,
          });
        }
      }

      function spawnFeathers(x, y) {
        for (let i = 0; i < 12; i++) {
          game.particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 300,
            vy: -Math.random() * 200 - 50,
            life: 1,
            color: i % 2 ? "#cbd5e1" : "#94a3b8",
            size: 3 + Math.random() * 4,
            rot: Math.random() * Math.PI * 2,
          });
        }
      }

      function updateParticles(dt) {
        for (let i = game.particles.length - 1; i >= 0; i--) {
          const p = game.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 450 * dt;
          p.rot += dt * 5;
          p.life -= dt * 1.2;
          if (p.life <= 0) game.particles.splice(i, 1);
        }
      }

      /* ===========================
         UPDATE LOGIC
         =========================== */
      function updateKeepersPatrol(dt) {
        game.patrolTimer += dt;
        const t = game.patrolTimer;
        for (const k of game.keepers) {
          if (k.chaotic) {
            /* random-target movement: pick a spot, dash there, repeat */
            k.chaoticTimer += dt;
            const dx = k.chaoticTargetX - k.x;
            const dy = k.chaoticTargetY - k.offsetY;
            const speed = k.patrolSpeed * 95;
            if ((Math.abs(dx) < 8 && Math.abs(dy) < 4) || k.chaoticTimer > 1.2) {
              k.chaoticTargetX = GOAL.left + 30 + Math.random() * (GOAL_W - 60);
              k.chaoticTargetY = -35 + Math.random() * 70;
              k.chaoticTimer = 0;
            }
            k.x += Math.sign(dx) * Math.min(speed * dt, Math.abs(dx));
            k.offsetY += Math.sign(dy) * Math.min(speed * 0.5 * dt, Math.abs(dy));
          } else {
            const rawX = k.homeX + k.patrolRange * Math.sin(t * k.patrolSpeed + k.patrolPhase);
            k.x = rawX;
          }
          k.x = Math.max(GOAL.left + 10, Math.min(GOAL.right - 10, k.x));
        }
      }

      function updateBirds(dt) {
        for (const b of game.birds) {
          b.x += b.speed * dt;
          b.wingPhase += dt * 8;
          if (b.speed > 0 && b.x > GOAL.right + 40) b.x = GOAL.left - 40;
          if (b.speed < 0 && b.x < GOAL.left - 40) b.x = GOAL.right + 40;
        }
      }

      function getBallPos(progress) {
        const t = progress;
        const sx = PENALTY.x, sy = PENALTY.y;
        const ex = game.targetX, ey = game.targetY;
        const cx = (sx + ex) / 2, cy = Math.min(sy, ey) - 70;
        return {
          x: (1 - t) * (1 - t) * sx + 2 * (1 - t) * t * cx + t * t * ex,
          y: (1 - t) * (1 - t) * sy + 2 * (1 - t) * t * cy + t * t * ey,
        };
      }

      function checkBirdCollision() {
        const bp = getBallPos(game.ballProgress);
        for (const b of game.birds) {
          if (Math.hypot(bp.x - b.x, bp.y - b.y) < 28) return b;
        }
        return null;
      }

      function checkKeeperSave() {
        const bx = game.targetX;
        const by = game.targetY;
        const ky = GOAL.bottom - 50;
        for (const k of game.keepers) {
          const dx = bx - k.x;
          const dy = by - (ky + (k.offsetY || 0));
          const hReach = KEEPER_BODY_HALF + k.arm;
          const vReach = 100;
          if ((dx * dx) / (hReach * hReach) + (dy * dy) / (vReach * vReach) < 1) {
            return true;
          }
        }
        return false;
      }

      function finishRound(result) {
        game.lastResult = result;
        game.phase = "result";
        game.phaseTimer = 0;

        if (result === "goal") {
          game.goals++;
          spawnConfetti(game.targetX, game.targetY, 25);
          game.shakeAmount = 0.7;
        } else {
          game.misses++;
          if (result === "blocked") {
            const bird = game.birds[0];
            if (bird) spawnFeathers(bird.x, bird.y);
          }
          game.shakeAmount = 0.3;
        }
      }

      function advanceRound() {
        const totalKicks = game.goals + game.misses;

        if (game.misses >= 4) {
          failStage("4번 실축으로 실패");
          return;
        }
        if (game.goals >= 4) {
          clearStage();
          return;
        }
        if (totalKicks >= 7) {
          failStage(`${game.goals}골 - 4골 미달`);
          return;
        }

        game.round++;
        initRound(game.round);
      }

      function updateGame(dt) {
        game.phaseTimer += dt;
        game.shakeAmount = Math.max(0, game.shakeAmount - dt * 3);
        updateParticles(dt);
        updateKeepersPatrol(dt);

        switch (game.phase) {
          case "intro":
            updateBirds(dt);
            if (game.phaseTimer >= 1.8) {
              game.phase = "aiming";
              game.phaseTimer = 0;
            }
            break;

          case "aiming":
            updateBirds(dt);
            break;

          case "flying":
            game.ballProgress = Math.min(game.ballProgress + dt / BALL_FLIGHT, 1);
            updateBirds(dt);
            {
              const bp = getBallPos(game.ballProgress);
              game.ballX = bp.x;
              game.ballY = bp.y;
            }
            if (!game.birdBlocked) {
              const hitBird = checkBirdCollision();
              if (hitBird) {
                game.birdBlocked = true;
                finishRound("blocked");
                break;
              }
            }
            if (game.ballProgress >= 1) {
              finishRound(checkKeeperSave() ? "saved" : "goal");
            }
            break;

          case "result":
            updateBirds(dt);
            if (game.lastResult !== "goal" && game.phaseTimer < 1.0) {
              const bounce = game.phaseTimer * 180;
              game.ballY = game.targetY + bounce;
              game.ballX = game.targetX + (game.targetX > GOAL_CX ? 1 : -1) * bounce * 0.3;
            }
            if (game.phaseTimer >= 1.6) {
              advanceRound();
            }
            break;
        }
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;
          updateGame(dt);
        }
        if (state.mode === "cleared") {
          updateParticles(dt);
        }
      }

      /* ===========================
         RENDERING HELPERS
         =========================== */
      function rrect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function txt(str, x, y, size, color, align) {
        ctx.fillStyle = color;
        ctx.font = `800 ${size}px "Trebuchet MS", "Segoe UI", sans-serif`;
        ctx.textAlign = align || "center";
        ctx.textBaseline = "middle";
        ctx.fillText(str, x, y);
      }

      function txtLight(str, x, y, size, color, align) {
        ctx.fillStyle = color;
        ctx.font = `600 ${size}px "Trebuchet MS", "Segoe UI", sans-serif`;
        ctx.textAlign = align || "center";
        ctx.textBaseline = "middle";
        ctx.fillText(str, x, y);
      }

      /* ===========================
         RENDER: BACKGROUND
         =========================== */
      function renderBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, FIELD_Y);
        sky.addColorStop(0, "#1a3a5c");
        sky.addColorStop(1, "#0d1f35");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, FIELD_Y);

        for (let i = 0; i < 48; i++) {
          const h = (i * 73) % 360;
          ctx.fillStyle = `hsla(${h}, 45%, 50%, 0.08)`;
          ctx.fillRect(i * 20, 15 + (i % 5) * 12, 18, FIELD_Y - 50);
        }

        const field = ctx.createLinearGradient(0, FIELD_Y, 0, H);
        field.addColorStop(0, "#2a8538");
        field.addColorStop(1, "#1c6928");
        ctx.fillStyle = field;
        ctx.fillRect(0, FIELD_Y, W, H - FIELD_Y);

        ctx.fillStyle = "rgba(0,0,0,0.035)";
        for (let y = FIELD_Y; y < H; y += 28) {
          if (((y - FIELD_Y) / 28 | 0) % 2) ctx.fillRect(0, y, W, 28);
        }

        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 2;
        ctx.strokeRect(180, FIELD_Y, 600, 210);
        ctx.strokeRect(310, FIELD_Y, 340, 85);

        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(PENALTY.x, PENALTY.y, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.beginPath();
        ctx.arc(PENALTY.x, PENALTY.y, 95, Math.PI * 1.17, Math.PI * 1.83);
        ctx.stroke();
      }

      /* ===========================
         RENDER: GOAL
         =========================== */
      function renderNet() {
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 1;
        for (let x = GOAL.left; x <= GOAL.right; x += 18) {
          ctx.beginPath();
          ctx.moveTo(x, GOAL.top);
          ctx.lineTo(x, GOAL.bottom);
          ctx.stroke();
        }
        for (let y = GOAL.top; y <= GOAL.bottom; y += 18) {
          ctx.beginPath();
          ctx.moveTo(GOAL.left, y);
          ctx.lineTo(GOAL.right, y);
          ctx.stroke();
        }
      }

      function renderGoalPosts() {
        const pw = GOAL.postW;
        ctx.fillStyle = "#e8edf2";
        ctx.fillRect(GOAL.left - pw, GOAL.top - pw, pw, GOAL.bottom - GOAL.top + pw);
        ctx.fillRect(GOAL.right, GOAL.top - pw, pw, GOAL.bottom - GOAL.top + pw);
        ctx.fillRect(GOAL.left - pw, GOAL.top - pw, GOAL_W + 2 * pw, pw);

        ctx.fillStyle = "rgba(0,0,0,0.12)";
        ctx.fillRect(GOAL.left - pw - 3, GOAL.top - pw, 3, GOAL.bottom - GOAL.top + pw);
        ctx.fillRect(GOAL.right + pw, GOAL.top - pw, 3, GOAL.bottom - GOAL.top + pw);
        ctx.fillRect(GOAL.left - pw, GOAL.top - pw - 3, GOAL_W + 2 * pw, 3);
      }

      /* ===========================
         RENDER: KEEPER (patrol + arm wave)
         =========================== */
      function renderKeeper(k) {
        const kx = k.x;
        const ky = GOAL.bottom - 50;
        const bounce = Math.sin(state.elapsed * 5 + k.patrolPhase) * 2;

        ctx.save();
        ctx.translate(kx, ky + bounce + (k.offsetY || 0));

        /* body */
        ctx.fillStyle = k.color;
        rrect(-14, -28, 28, 40, 5);
        ctx.fill();

        /* head */
        ctx.fillStyle = "#fcd34d";
        ctx.beginPath();
        ctx.arc(0, -36, 11, 0, Math.PI * 2);
        ctx.fill();

        /* cap */
        ctx.fillStyle = k.color;
        ctx.beginPath();
        ctx.arc(0, -42, 12, Math.PI, 0);
        ctx.fill();

        /* arms – waving, stretching, multi-arm */
        const isSpider = (k.armCount || 2) > 2;
        const pairs = (k.armCount || 2) / 2;
        /* long-arm keepers: visual 1.5x so arms extend past goal posts */
        const armVisualScale = isSpider ? 2.5 : (k.arm >= 160 ? 1.5 : 0.7);
        const baseArmLen = k.arm * armVisualScale;
        const waveSpd = 5.0 + k.arm * 0.025;
        const waveAmp = 15 + k.arm * 0.22;
        const armW = 6 + k.arm * 0.012;
        const gloveR = 7 + k.arm * 0.02;

        ctx.lineCap = "round";

        for (let p = 0; p < pairs; p++) {
          const shoulderY = -22 + p * 10;
          const phaseOff = p * (Math.PI * 2 / 3);

          /* spider arms stretch in/out independently */
          let pairLen;
          if (isSpider) {
            /* multi-frequency stretch for erratic movement */
            const t = state.elapsed;
            const pOff = p * 1.7;
            const s1 = Math.sin(t * 5.5 + pOff);
            const s2 = Math.sin(t * 8.3 + pOff * 2.1);
            const s3 = Math.sin(t * 3.1 + pOff * 0.6);
            const stretch = 0.05 + 1.05 * (0.5 + 0.22 * s1 + 0.18 * s2 + 0.12 * s3);
            pairLen = baseArmLen * stretch * (1 - p * 0.03);
          } else {
            pairLen = baseArmLen;
          }

          const isLongArm = !isSpider && k.arm >= 160;
          let lTipX, lTipY, rTipX, rTipY;

          if (isLongArm) {
            /* 360° windmill spin */
            const spinAngle = state.elapsed * Math.PI * 4 + k.patrolPhase;
            lTipX = -14 - pairLen * Math.cos(spinAngle);
            lTipY = shoulderY - pairLen * Math.sin(spinAngle);
            rTipX = 14 + pairLen * Math.cos(spinAngle);
            rTipY = shoulderY - pairLen * Math.sin(spinAngle);
          } else if (isSpider) {
            /* spider: angle-based flailing – wide arc sweep */
            const t = state.elapsed;
            const pOff = p * 1.7;
            const aL1 = Math.sin(t * 5.5 + k.patrolPhase + pOff);
            const aL2 = Math.sin(t * 8.7 + pOff * 2.4);
            const aR1 = Math.sin(t * 6.2 + k.patrolPhase + pOff + Math.PI);
            const aR2 = Math.sin(t * 9.8 + pOff * 1.8 + Math.PI);
            /* angle swings ~±130° from horizontal outward */
            const angleL = (aL1 * 0.65 + aL2 * 0.55);
            const angleR = (aR1 * 0.65 + aR2 * 0.55);
            lTipX = -14 - pairLen * Math.cos(angleL * 2.3);
            lTipY = shoulderY - pairLen * Math.sin(angleL * 2.3);
            rTipX = 14 + pairLen * Math.cos(angleR * 2.3);
            rTipY = shoulderY - pairLen * Math.sin(angleR * 2.3);
          } else {
            /* wave up & down */
            const wL = Math.sin(state.elapsed * waveSpd + k.patrolPhase + phaseOff);
            const wR = Math.sin(state.elapsed * waveSpd + k.patrolPhase + phaseOff + Math.PI);
            lTipX = -14 - pairLen;
            lTipY = shoulderY + wL * waveAmp;
            rTipX = 14 + pairLen;
            rTipY = shoulderY + wR * waveAmp;
          }

          ctx.strokeStyle = k.color;
          ctx.lineWidth = armW - p * 0.5;
          ctx.beginPath();
          ctx.moveTo(-14, shoulderY);
          ctx.lineTo(lTipX, lTipY);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(14, shoulderY);
          ctx.lineTo(rTipX, rTipY);
          ctx.stroke();

          ctx.fillStyle = "#16a34a";
          ctx.beginPath();
          ctx.arc(lTipX, lTipY, gloveR - p * 0.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(rTipX, rTipY, gloveR - p * 0.5, 0, Math.PI * 2);
          ctx.fill();
        }

        /* legs */
        ctx.strokeStyle = "#713f12";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(-6, 12);
        ctx.lineTo(-10, 28);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(6, 12);
        ctx.lineTo(10, 28);
        ctx.stroke();

        ctx.restore();
      }

      /* ===========================
         RENDER: BIRD
         =========================== */
      function renderBird(b) {
        const wing = Math.sin(b.wingPhase) * 12;
        const dir = b.speed > 0 ? 1 : -1;

        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.scale(dir, 1);

        ctx.fillStyle = "#94a3b8";
        ctx.beginPath();
        ctx.ellipse(0, 0, 16, 9, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#64748b";
        ctx.beginPath();
        ctx.moveTo(-6, -5);
        ctx.lineTo(-2, -16 + wing);
        ctx.lineTo(6, -5);
        ctx.fill();

        ctx.fillStyle = "#475569";
        ctx.beginPath();
        ctx.arc(12, -3, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f97316";
        ctx.beginPath();
        ctx.moveTo(17, -3);
        ctx.lineTo(22, -1);
        ctx.lineTo(17, 1);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#f8fafc";
        ctx.beginPath();
        ctx.arc(13, -5, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.arc(13.5, -5, 1, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      /* ===========================
         RENDER: BALL & KICKER
         =========================== */
      function renderBall() {
        const bx = game.ballX;
        const by = game.ballY;

        ctx.fillStyle = "rgba(0,0,0,0.18)";
        ctx.beginPath();
        ctx.ellipse(bx + 3, by + 4, BALL_R, BALL_R * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f8fafc";
        ctx.beginPath();
        ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#94a3b8";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(100,116,139,0.4)";
        ctx.beginPath();
        ctx.moveTo(bx - 5, by - 3);
        ctx.lineTo(bx + 2, by - 7);
        ctx.lineTo(bx + 6, by - 1);
        ctx.lineTo(bx + 3, by + 5);
        ctx.lineTo(bx - 4, by + 4);
        ctx.closePath();
        ctx.stroke();

        if (game.phase === "flying" && game.ballProgress < 0.8) {
          for (let i = 1; i <= 4; i++) {
            const tp = Math.max(0, game.ballProgress - i * 0.05);
            const trail = getBallPos(tp);
            ctx.globalAlpha = (1 - i / 5) * 0.3;
            ctx.fillStyle = "#f8fafc";
            ctx.beginPath();
            ctx.arc(trail.x, trail.y, BALL_R * (1 - i * 0.15), 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
        }
      }

      function renderKicker() {
        if (game.phase !== "aiming" && game.phase !== "flying" && game.phase !== "result") return;
        const kx = PENALTY.x;
        const ky = PENALTY.y + 35;

        ctx.save();
        ctx.translate(kx, ky);

        ctx.fillStyle = "#1e3a5f";
        ctx.beginPath();
        ctx.arc(0, -38, 10, 0, Math.PI * 2);
        ctx.fill();
        rrect(-9, -28, 18, 26, 3);
        ctx.fill();

        ctx.strokeStyle = "#1e3a5f";
        ctx.lineWidth = 5;
        ctx.lineCap = "round";

        if (game.kicking && game.ballProgress < 0.3) {
          ctx.beginPath();
          ctx.moveTo(-5, -2);
          ctx.lineTo(-12, 16);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(5, -2);
          ctx.lineTo(22, -12);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.moveTo(-5, -2);
          ctx.lineTo(-10, 16);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(5, -2);
          ctx.lineTo(10, 16);
          ctx.stroke();
        }

        ctx.restore();
      }

      /* ===========================
         RENDER: AIM INDICATOR
         =========================== */
      function renderAimIndicator() {
        if (game.phase !== "aiming") return;
        const ax = game.aimX;
        const ay = game.aimY;
        if (ax < 0 || !isInGoal(ax, ay)) return;

        /* aim dot on goal */
        const pulse = 0.6 + 0.4 * Math.sin(state.elapsed * 5);
        ctx.strokeStyle = `rgba(239, 68, 68, ${0.7 * pulse})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ax, ay, 14, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = `rgba(239, 68, 68, ${0.5 * pulse})`;
        ctx.beginPath();
        ctx.arc(ax, ay, 4, 0, Math.PI * 2);
        ctx.fill();

        /* trajectory guide */
        ctx.strokeStyle = "rgba(239, 68, 68, 0.12)";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(PENALTY.x, PENALTY.y);
        ctx.lineTo(ax, ay);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      /* ===========================
         RENDER: HUD
         =========================== */
      function renderHUD() {
        if (game.phase === "intro") return;

        ctx.fillStyle = "rgba(15, 23, 42, 0.72)";
        rrect(12, 10, W - 24, 44, 14);
        ctx.fill();

        txt(`R${game.round + 1}/7`, 60, 32, 17, "#cbd5e1");
        txt(`⚽ ${game.goals}`, W / 2 - 50, 32, 20, "#22c55e");
        txt(`❌ ${game.misses}`, W / 2 + 50, 32, 20, "#ef4444");

        const cfg = ROUNDS[game.round];
        txt(`${cfg.emoji} ${cfg.name}`, W - 100, 32, 15, "#fbbf24", "right");
      }

      /* ===========================
         RENDER: PARTICLES
         =========================== */
      function renderParticles() {
        for (const p of game.particles) {
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
        }
      }

      /* ===========================
         RENDER: OVERLAYS
         =========================== */
      function renderCard(title, titleColor, borderColor, lines, hintText) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.82)";
        ctx.fillRect(0, 0, W, H);

        const cw = 560, ch = 340;
        const cx = W / 2 - cw / 2, cy = H / 2 - ch / 2;

        ctx.fillStyle = "rgba(248, 250, 252, 0.97)";
        rrect(cx, cy, cw, ch, 24);
        ctx.fill();
        ctx.strokeStyle = borderColor;
        ctx.lineWidth = 3;
        rrect(cx, cy, cw, ch, 24);
        ctx.stroke();

        txt(title, W / 2, cy + 52, 42, titleColor);

        let ly = cy + 110;
        for (const l of lines) {
          txtLight(l.t, W / 2, ly, l.s || 20, l.c || "#475569");
          ly += (l.s || 20) + 14;
        }

        if (hintText) {
          txtLight(hintText, W / 2, cy + ch - 30, 17, "#94a3b8");
        }
      }

      function renderMenuCard() {
        renderBackground();
        renderNet();
        /* show a keeper patrolling in the background */
        const previewK = {
          x: GOAL_CX + 80 * Math.sin(state.elapsed * 1.5),
          homeX: GOAL_CX, patrolSpeed: 1.5, patrolRange: 180,
          patrolPhase: 0, arm: 50, color: KEEPER_COLORS[0],
        };
        renderKeeper(previewK);
        renderGoalPosts();

        renderCard("⚽ 승부차기", "#0f172a", "#f97316", [
          { t: "조작: 화면 터치/클릭으로 방향 조준 후 킥", s: 21, c: "#475569" },
          { t: "키퍼가 움직이는 틈을 노려 골대를 터치!", s: 18, c: "#64748b" },
          { t: "", s: 8 },
          { t: "🏆 클리어: 7번 킥 중 4골 이상", s: 22, c: "#15803d" },
          { t: "❌ 실패: 4번째 실축 시 즉시 실패", s: 22, c: "#dc2626" },
        ], "터치 또는 Enter로 시작");
      }

      function renderFailedScreen() {
        renderBackground();
        renderNet();
        game.keepers.forEach(renderKeeper);
        renderGoalPosts();

        renderCard("실패!", "#dc2626", "#dc2626", [
          { t: `⚽ ${game.goals}골  /  ❌ ${game.misses}실축`, s: 26, c: "#0f172a" },
          { t: "", s: 6 },
          { t: game.failReason, s: 20, c: "#64748b" },
        ], "터치 또는 Enter로 재시작");
      }

      function renderClearedScreen() {
        renderBackground();
        renderNet();
        renderGoalPosts();

        ctx.fillStyle = "rgba(15, 23, 42, 0.75)";
        ctx.fillRect(0, 0, W, H);

        const cw = 480, ch = 260;
        const cx = W / 2 - cw / 2, cy = H / 2 - ch / 2;

        ctx.fillStyle = "rgba(248, 250, 252, 0.97)";
        rrect(cx, cy, cw, ch, 24);
        ctx.fill();
        ctx.strokeStyle = "#22c55e";
        ctx.lineWidth = 3;
        rrect(cx, cy, cw, ch, 24);
        ctx.stroke();

        txt("🎉 클리어!", W / 2, cy + 55, 44, "#15803d");
        txt(`⚽ ${game.goals}골 성공!`, W / 2, cy + 120, 28, "#0f172a");
        txtLight(`${state.lastRunTime.toFixed(1)}초`, W / 2, cy + 165, 20, "#64748b");

        renderParticles();
      }

      function renderRoundIntro() {
        const cfg = ROUNDS[game.round];
        const alpha = Math.min(game.phaseTimer / 0.3, 1) * Math.min((1.8 - game.phaseTimer) / 0.3, 1);
        const a = Math.max(0, Math.min(1, alpha));

        ctx.fillStyle = `rgba(15, 23, 42, ${0.7 * a})`;
        ctx.fillRect(0, 0, W, H);

        ctx.globalAlpha = a;
        const scale = 0.8 + 0.2 * Math.min(game.phaseTimer / 0.4, 1);
        ctx.save();
        ctx.translate(W / 2, H / 2 - 20);
        ctx.scale(scale, scale);

        txt(`Round ${game.round + 1}`, 0, -30, 52, "#f8fafc");
        txt(`${cfg.emoji} ${cfg.name}`, 0, 30, 32, "#fbbf24");

        ctx.restore();
        ctx.globalAlpha = 1;
      }

      function renderRoundResult() {
        const a = Math.min(game.phaseTimer / 0.15, 1) * Math.min((1.6 - game.phaseTimer) / 0.3, 1);
        if (a <= 0) return;

        ctx.globalAlpha = Math.max(0, a);
        const scale = 1 + 0.3 * Math.max(0, 1 - game.phaseTimer / 0.3);

        ctx.save();
        ctx.translate(W / 2, H / 2 - 30);
        ctx.scale(scale, scale);

        if (game.lastResult === "goal") {
          txt("GOAL!", 0, 0, 64, "#22c55e");
        } else if (game.lastResult === "saved") {
          txt("SAVED!", 0, 0, 56, "#ef4444");
        } else if (game.lastResult === "blocked") {
          txt("BLOCKED!", 0, 0, 52, "#64748b");
        }

        ctx.restore();
        ctx.globalAlpha = 1;

        txt(`⚽ ${game.goals}  ❌ ${game.misses}`, W / 2, H / 2 + 40, 24, "#f8fafc");
      }

      /* ===========================
         MAIN RENDER
         =========================== */
      function render() {
        ctx.save();

        if (game.shakeAmount > 0) {
          ctx.translate(
            (Math.random() - 0.5) * game.shakeAmount * 10,
            (Math.random() - 0.5) * game.shakeAmount * 10,
          );
        }

        if (state.mode === "menu") {
          renderMenuCard();
        } else if (state.mode === "running") {
          renderBackground();
          renderNet();
          game.birds.forEach(renderBird);
          game.keepers.forEach(renderKeeper);
          if (game.phase === "aiming") {
            renderBall();
            renderAimIndicator();
            renderKicker();
          } else if (game.phase === "flying" || game.phase === "result") {
            renderKicker();
            renderBall();
          }
          renderGoalPosts();
          renderParticles();
          renderHUD();
          if (game.phase === "intro") renderRoundIntro();
          if (game.phase === "result") renderRoundResult();
        } else if (state.mode === "failed") {
          renderFailedScreen();
        } else if (state.mode === "cleared") {
          renderClearedScreen();
        }

        ctx.restore();
      }

      /* ===========================
         RELAY CONTRACT
         =========================== */
      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "canvas 960x540, goal top 90-295, penalty spot (480,455)",
          mode: state.mode,
          round: game.round + 1,
          phase: game.phase,
          goals: game.goals,
          misses: game.misses,
          keepers: game.keepers.map(k => ({ x: Math.round(k.x), arm: k.arm })),
          birds: game.birds.map(b => ({ x: Math.round(b.x), y: Math.round(b.y) })),
          result: window.relayStageResult.status,
          elapsed: Math.round(state.elapsed * 10) / 10,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count: relayContext.clearCount,
            history: relayContext.history,
          },
        });
      }

      window.render_game_to_text = renderGameToText;

      window.advanceTime = (ms = 16.67) => {
        if (state.mode === "menu") startStage();
        const dt = Math.min(ms / 1000, MAX_DT);
        if (state.mode === "running" && game.phase === "aiming" && game.phaseTimer > 0.4) {
          const rx = GOAL.left + 30 + Math.random() * (GOAL_W - 60);
          const ry = GOAL.top + 30 + Math.random() * (GOAL_H - 60);
          handleAimKick(rx, ry);
        }
        update(dt);
        render();
        return renderGameToText();
      };

      window.relayStageMeta = {
        id: "penalty-kick",
        title: "승부차기",
        creator: "bobby",
        genre: "Sports",
        clearCondition: "7번의 킥 중 4골 이상 성공",
      };

      window.relayStageResult = { status: "running" };

      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      /* ===========================
         INPUT EVENTS
         =========================== */
      function onKeyDown(e) {
        if ((e.key === "Enter" || e.key === " ") && state.mode !== "running") {
          e.preventDefault();
          startStage();
          return;
        }
        if ((e.key === " " || e.key === "Enter") && state.mode === "running" && game.phase === "aiming") {
          e.preventDefault();
          if (game.aimX > 0 && isInGoal(game.aimX, game.aimY)) {
            handleAimKick(game.aimX, game.aimY);
          } else {
            handleAimKick(GOAL_CX, GOAL_CY);
          }
        }
      }

      canvas.addEventListener("mousemove", (e) => {
        const pos = screenToCanvas(e.clientX, e.clientY);
        game.aimX = pos.x;
        game.aimY = pos.y;
      });

      canvas.addEventListener("mouseleave", () => {
        game.aimX = -1;
        game.aimY = -1;
      });

      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (state.mode !== "running") {
          startStage();
          return;
        }
        if (game.phase === "aiming") {
          const touch = e.touches[0];
          const pos = screenToCanvas(touch.clientX, touch.clientY);
          handleAimKick(pos.x, pos.y);
        }
      }, { passive: false });

      canvas.addEventListener("click", (e) => {
        if (state.mode !== "running") {
          startStage();
        } else if (game.phase === "aiming") {
          const pos = screenToCanvas(e.clientX, e.clientY);
          handleAimKick(pos.x, pos.y);
        }
        canvas.focus();
      });

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      /* ===========================
         GAME LOOP
         =========================== */
      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
