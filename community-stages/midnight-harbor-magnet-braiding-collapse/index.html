<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midnight Harbor: Magnet Braid</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(56, 189, 248, 0.16), transparent 28%),
          linear-gradient(180deg, #07111f 0%, #0a1730 48%, #08111c 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Midnight Harbor: Magnet Braid. 캔버스를 터치하거나 Enter로 시작하세요.
      포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      붕괴선이 닿기 전에 에너지 구슬 5개를 다른 극 문에 모두 인도하면 클리어.
      붕괴선에 휩쓸리거나 같은 극이 연속 충돌해 과열되면 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Midnight Harbor: Magnet Braid"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      (() => {
        const canvas = document.querySelector("#game");
        const ctx = canvas.getContext("2d");
        const VIEW = { width: canvas.width, height: canvas.height };
        const FIXED_DT = 1 / 60;
        const MAX_DT = 1 / 20;
        const META_DESCRIPTION =
          "한밤의 항만에서 N극과 S극을 번갈아 꼬아 에너지 구슬 5개를 다른 극 문으로 보내는 붕괴형 자력 퍼즐 러시";
        const META_CONTROLS =
          "포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
        const META_CLEAR =
          "붕괴선이 닿기 전에 에너지 구슬 5개를 다른 극 문에 모두 인도하면 클리어";
        const META_FAIL =
          "붕괴선에 휩쓸리거나 같은 극이 연속 충돌해 과열되면 실패";
        const ORB_SEQUENCE = [
          { polarity: 1, y: 266 },
          { polarity: -1, y: 184 },
          { polarity: 1, y: 338 },
          { polarity: -1, y: 226 },
          { polarity: 1, y: 312 },
        ];
        const HARBOR_TOP = 94;
        const HARBOR_BOTTOM = 452;
        const NODE_DECAY = 1.45;
        const LOCK_TIME = 2.35;
        const COLLAPSE_SPEED = 32;
        const COLLAPSE_PUSH = 0.54;
        const MAGNET_RANGE = 184;
        const MAGNET_FORCE = 580;
        const ORB_RADIUS = 12;
        const GATE_RADIUS = 42;
        const HOLD_MS = 350;
        const DRAG_THRESHOLD = 10;
        const MAX_SHAKE = 16;
        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const relayContext =
          window.RelayRuntime?.readContext("midnight-harbor-magnet-braiding-collapse") || {
            history: [],
            clearCount: 0,
            previousStageId: null,
          };

        const gates = [
          { id: "north-gate", x: 894, y: 162, polarity: 1, label: "N" },
          { id: "south-gate", x: 894, y: 376, polarity: -1, label: "S" },
        ];

        const baseNodes = [
          { id: "n1", x: 168, y: 166, polarity: -1 },
          { id: "n2", x: 244, y: 360, polarity: 1 },
          { id: "n3", x: 366, y: 142, polarity: 1 },
          { id: "n4", x: 448, y: 286, polarity: -1 },
          { id: "n5", x: 582, y: 168, polarity: -1 },
          { id: "n6", x: 660, y: 354, polarity: 1 },
          { id: "n7", x: 770, y: 258, polarity: -1 },
        ];

        const input = {
          selectedNodeId: null,
          pointerId: null,
          pointerDown: false,
          activeNodeId: null,
          startedAt: 0,
          moved: false,
          offsetX: 0,
          offsetY: 0,
        };

        let animationFrame = 0;
        let lastTimestamp = 0;
        let hostFailedReported = false;
        let hostClearedReported = false;

        const state = {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          deliveries: 0,
          sequenceIndex: 0,
          spawnTimer: 0,
          collapseX: -116,
          collapseGlow: 0,
          flash: 0,
          shake: 0,
          message: "자력 매듭 준비",
          messageTimer: 0,
          lastReason: "",
          overheatChain: 0,
          currentOrb: null,
          nodes: [],
          particles: [],
          ripples: [],
          popups: [],
          buoyLights: createBuoyLights(),
          skylineDrift: 0,
          waterPhase: 0,
          laneHighlights: 0,
        };

        function createNodes() {
          return baseNodes.map((node) => ({
            ...node,
            radius: 24,
            collapsed: false,
            collapseTimer: null,
            lockedUntil: 0,
            pulse: 0,
            hitFlash: 0,
            trail: [],
            useCount: 0,
          }));
        }

        function createBuoyLights() {
          return Array.from({ length: 24 }, (_, index) => ({
            x: 48 + index * 40 + (index % 3) * 8,
            y: 360 + (index % 4) * 18,
            size: 1.8 + (index % 3) * 0.7,
            phase: index * 0.72,
          }));
        }

        function createOrb(index) {
          const spec = ORB_SEQUENCE[index];
          return {
            polarity: spec.polarity,
            x: 58,
            y: spec.y,
            vx: 136,
            vy: (index % 2 === 0 ? -1 : 1) * 18,
            radius: ORB_RADIUS,
            trail: [],
            collisionCooldowns: {},
            samePolarityHits: 0,
            gateReached: false,
            deliveredAt: 0,
            halo: 0,
          };
        }

        function resetRun() {
          state.mode = "running";
          state.elapsed = 0;
          state.lastRunTime = 0;
          state.deliveries = 0;
          state.sequenceIndex = 0;
          state.spawnTimer = 0;
          state.collapseX = -116;
          state.collapseGlow = 0;
          state.flash = 0;
          state.shake = 0;
          state.message = "자력 매듭 시작";
          state.messageTimer = 1.1;
          state.lastReason = "";
          state.overheatChain = 0;
          state.nodes = createNodes();
          state.particles = [];
          state.ripples = [];
          state.popups = [];
          state.waterPhase = 0;
          state.skylineDrift = 0;
          state.laneHighlights = 0;
          state.currentOrb = createOrb(0);
          input.selectedNodeId = state.nodes[0].id;
          input.pointerDown = false;
          input.activeNodeId = null;
          window.relayStageResult.status = "running";
          hostFailedReported = false;
          hostClearedReported = false;
        }

        function inRelayHost() {
          try {
            return window.parent && window.parent !== window && window.parent.RelayHost;
          } catch (error) {
            return false;
          }
        }

        function reportReadyToHost() {
          if (inRelayHost()) {
            window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
          }
        }

        function reportFailedToHost(reason = "failed") {
          if (!inRelayHost() || hostFailedReported) {
            return;
          }
          hostFailedReported = true;
          window.parent.RelayHost.onStageFailed?.({
            stageId: window.relayStageMeta.id,
            stageTitle: window.relayStageMeta.title,
            reason,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function reportClearedToHost() {
          if (!inRelayHost() || hostClearedReported) {
            return;
          }
          hostClearedReported = true;
          window.parent.RelayHost.onStageCleared?.({
            stageId: window.relayStageMeta.id,
            stageTitle: window.relayStageMeta.title,
            clearCountAfter: relayContext.clearCount + 1,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function lerp(start, end, t) {
          return start + (end - start) * t;
        }

        function length(x, y) {
          return Math.hypot(x, y);
        }

        function normalize(x, y) {
          const distance = Math.hypot(x, y) || 1;
          return { x: x / distance, y: y / distance };
        }

        function polarityLabel(polarity) {
          return polarity === 1 ? "N" : "S";
        }

        function polarityColor(polarity) {
          return polarity === 1 ? "#fb7185" : "#67e8f9";
        }

        function oppositeGateForOrb(orb) {
          return gates.find((gate) => gate.polarity !== orb.polarity);
        }

        function findNodeById(nodeId) {
          return state.nodes.find((node) => node.id === nodeId) || null;
        }

        function selectNode(nodeId) {
          input.selectedNodeId = nodeId;
          const node = findNodeById(nodeId);
          if (!node) {
            return;
          }
          node.pulse = 1;
          spawnPopup(node.x, node.y - 28, `${node.id.toUpperCase()} 선택`, "#f8fafc");
        }

        function startFromTouch() {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            resetRun();
          }
        }

        function clearStage() {
          state.mode = "cleared";
          state.lastRunTime = state.elapsed;
          state.message = "모든 구슬 인도 완료";
          state.messageTimer = 2.2;
          window.relayStageResult.status = "cleared";
          reportClearedToHost();
        }

        function failStage(reason = "failed") {
          if (state.mode !== "running") {
            return;
          }
          state.mode = "failed";
          state.lastRunTime = state.elapsed;
          state.lastReason = reason;
          state.flash = 0.6;
          shake(10);
          if (reason === "collapse") {
            state.message = "붕괴선에 포착";
          } else if (reason === "overheat") {
            state.message = "과열 붕괴";
          } else {
            state.message = "항만 루트 손실";
          }
          state.messageTimer = 2;
          window.relayStageResult.status = "failed";
          reportFailedToHost(reason);
        }

        function shake(amount) {
          state.shake = Math.min(MAX_SHAKE, state.shake + amount);
        }

        function spawnPopup(x, y, text, color) {
          state.popups.push({
            x,
            y,
            text,
            color,
            life: 0.9,
            ttl: 0.9,
          });
        }

        function spawnParticles(x, y, color, count, spread = 1) {
          const total = prefersReducedMotion ? Math.ceil(count * 0.45) : count;
          for (let index = 0; index < total; index += 1) {
            const angle = Math.random() * Math.PI * 2;
            const speed = (40 + Math.random() * 120) * spread;
            state.particles.push({
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - Math.random() * 24,
              size: 2 + Math.random() * 4,
              life: 0.5 + Math.random() * 0.7,
              ttl: 0.5 + Math.random() * 0.7,
              color,
            });
          }
        }

        function spawnRipple(x, y, color, radius = 26) {
          state.ripples.push({
            x,
            y,
            radius,
            growth: 72,
            life: 0.55,
            ttl: 0.55,
            color,
          });
        }

        function collapseNode(node, reason) {
          if (!node || node.collapsed) {
            return;
          }
          node.collapsed = true;
          node.collapseTimer = 0;
          node.hitFlash = 1;
          spawnParticles(node.x, node.y, "#a5b4fc", 18, 0.9);
          spawnRipple(node.x, node.y, "rgba(165, 180, 252, 0.5)", 18);
          if (reason === "wave") {
            spawnPopup(node.x, node.y - 18, "침수", "#c4b5fd");
          }
          if (input.selectedNodeId === node.id) {
            const fallback = state.nodes.find((candidate) => !candidate.collapsed);
            input.selectedNodeId = fallback ? fallback.id : null;
          }
        }

        function deliverOrb(orb, gate) {
          if (!orb || orb.gateReached) {
            return;
          }
          orb.gateReached = true;
          orb.deliveredAt = state.elapsed;
          state.deliveries += 1;
          state.currentOrb = null;
          state.spawnTimer = 0.8;
          state.collapseX += 10;
          state.laneHighlights = 0.35;
          state.overheatChain = 0;
          state.message = `${state.deliveries}/5 구슬 인도`;
          state.messageTimer = 1.2;
          state.flash = 0.28;
          shake(5);
          spawnParticles(gate.x, gate.y, polarityColor(gate.polarity), 26, 1.2);
          spawnRipple(gate.x, gate.y, "rgba(255,255,255,0.6)", 28);
          spawnPopup(gate.x - 34, gate.y - 50, "BRAID OK", "#f8fafc");
          if (state.deliveries >= ORB_SEQUENCE.length) {
            clearStage();
          }
        }

        function scheduleNodeDecay(node) {
          if (node.lockedUntil > state.elapsed) {
            return;
          }
          if (node.collapseTimer === null) {
            node.collapseTimer = NODE_DECAY;
          }
        }

        function nudgeOrbTowardGate(orb, node) {
          const gate = oppositeGateForOrb(orb);
          const direction = normalize(gate.x - node.x, gate.y - node.y);
          orb.vx = clamp(orb.vx * 0.55 + direction.x * 212, -280, 320);
          orb.vy = clamp(orb.vy * 0.45 + direction.y * 236, -250, 250);
          orb.halo = 1;
        }

        function registerSamePolarityHit(orb, node) {
          orb.samePolarityHits += 1;
          state.overheatChain = orb.samePolarityHits;
          node.hitFlash = 1;
          spawnParticles(orb.x, orb.y, polarityColor(node.polarity), 14, 0.9);
          spawnPopup(orb.x + 18, orb.y - 18, `과열 ${orb.samePolarityHits}`, "#fda4af");
          shake(6);
          if (orb.samePolarityHits >= 2) {
            failStage("overheat");
          }
        }

        function updateOrb(orb, dt) {
          if (!orb) {
            return;
          }

          Object.keys(orb.collisionCooldowns).forEach((key) => {
            orb.collisionCooldowns[key] -= dt;
            if (orb.collisionCooldowns[key] <= 0) {
              delete orb.collisionCooldowns[key];
            }
          });

          const targetGate = oppositeGateForOrb(orb);
          let ax = 48;
          let ay = (targetGate.y - orb.y) * 0.9;

          gates.forEach((gate) => {
            const dx = gate.x - orb.x;
            const dy = gate.y - orb.y;
            const distance = length(dx, dy);
            if (distance < 280) {
              const dir = normalize(dx, dy);
              const pull = gate.polarity !== orb.polarity ? 220 : -110;
              const t = 1 - distance / 280;
              ax += dir.x * pull * t;
              ay += dir.y * pull * t;
            }
            if (distance < GATE_RADIUS) {
              if (gate.polarity !== orb.polarity) {
                deliverOrb(orb, gate);
              } else if (!orb.collisionCooldowns[gate.id]) {
                orb.collisionCooldowns[gate.id] = 0.2;
                registerSamePolarityHit(orb, gate);
                const bounce = normalize(orb.x - gate.x, orb.y - gate.y);
                orb.vx += bounce.x * 160;
                orb.vy += bounce.y * 160;
              }
            }
          });

          state.nodes.forEach((node) => {
            if (node.collapsed) {
              return;
            }
            const dx = node.x - orb.x;
            const dy = node.y - orb.y;
            const distance = length(dx, dy);
            if (distance < MAGNET_RANGE) {
              const dir = normalize(dx, dy);
              const falloff = Math.pow(1 - distance / MAGNET_RANGE, 2);
              const sign = node.polarity === orb.polarity ? -1 : 1;
              const lockBoost = node.lockedUntil > state.elapsed ? 1.24 : 1;
              ax += dir.x * MAGNET_FORCE * falloff * sign * lockBoost;
              ay += dir.y * MAGNET_FORCE * falloff * sign * lockBoost;
            }

            if (distance < node.radius + orb.radius && !orb.collisionCooldowns[node.id]) {
              orb.collisionCooldowns[node.id] = 0.18;
              node.hitFlash = 1;
              node.pulse = 1;
              if (node.polarity === orb.polarity) {
                registerSamePolarityHit(orb, node);
                const bounce = normalize(orb.x - node.x, orb.y - node.y);
                orb.vx += bounce.x * 180;
                orb.vy += bounce.y * 180;
              } else {
                orb.samePolarityHits = 0;
                state.overheatChain = 0;
                scheduleNodeDecay(node);
                nudgeOrbTowardGate(orb, node);
                spawnParticles(node.x, node.y, polarityColor(node.polarity), 18, 1);
                spawnRipple(node.x, node.y, "rgba(248, 250, 252, 0.55)", 22);
                spawnPopup(node.x + 16, node.y - 26, "BRAID", "#f8fafc");
              }
            }
          });

          ax += (state.collapseX + 80 - orb.x) * COLLAPSE_PUSH * 0.2;
          orb.vx = clamp(orb.vx + ax * dt, -220, 336);
          orb.vy = clamp(orb.vy + ay * dt, -236, 236);
          orb.vx *= 0.992;
          orb.vy *= 0.992;
          orb.x += orb.vx * dt;
          orb.y += orb.vy * dt;

          if (orb.y < HARBOR_TOP + 14) {
            orb.y = HARBOR_TOP + 14;
            orb.vy = Math.abs(orb.vy) * 0.45;
          }
          if (orb.y > HARBOR_BOTTOM - 14) {
            orb.y = HARBOR_BOTTOM - 14;
            orb.vy = -Math.abs(orb.vy) * 0.45;
          }
          if (orb.x < 24) {
            orb.x = 24;
            orb.vx = Math.abs(orb.vx) * 0.4;
          }
          if (orb.x > VIEW.width - 18) {
            orb.x = VIEW.width - 18;
            orb.vx = -Math.abs(orb.vx) * 0.4;
          }

          orb.trail.push({ x: orb.x, y: orb.y, life: 0.36 });
          if (orb.trail.length > (prefersReducedMotion ? 10 : 20)) {
            orb.trail.shift();
          }

          if (orb.x < state.collapseX + 14) {
            failStage("collapse");
          }
        }

        function updateNodes(dt) {
          state.nodes.forEach((node) => {
            node.pulse = Math.max(0, node.pulse - dt * 1.6);
            node.hitFlash = Math.max(0, node.hitFlash - dt * 3);
            node.trail.push({ x: node.x, y: node.y, life: 0.4 });
            if (node.trail.length > (prefersReducedMotion ? 4 : 10)) {
              node.trail.shift();
            }

            if (!node.collapsed && node.lockedUntil <= state.elapsed && node.x < state.collapseX + 12) {
              collapseNode(node, "wave");
            }

            if (!node.collapsed && node.collapseTimer !== null && node.lockedUntil <= state.elapsed) {
              node.collapseTimer -= dt;
              if (node.collapseTimer <= 0) {
                collapseNode(node, "decay");
              }
            }
          });
        }

        function updateEffects(dt) {
          state.particles = state.particles.filter((particle) => {
            particle.life -= dt;
            if (particle.life <= 0) {
              return false;
            }
            particle.x += particle.vx * dt;
            particle.y += particle.vy * dt;
            particle.vx *= 0.98;
            particle.vy = particle.vy * 0.98 + 18 * dt;
            return true;
          });

          state.ripples = state.ripples.filter((ripple) => {
            ripple.life -= dt;
            if (ripple.life <= 0) {
              return false;
            }
            ripple.radius += ripple.growth * dt;
            return true;
          });

          state.popups = state.popups.filter((popup) => {
            popup.life -= dt;
            if (popup.life <= 0) {
              return false;
            }
            popup.y -= 20 * dt;
            return true;
          });

          if (state.currentOrb) {
            state.currentOrb.trail.forEach((entry) => {
              entry.life -= dt;
            });
            state.currentOrb.trail = state.currentOrb.trail.filter((entry) => entry.life > 0);
            state.currentOrb.halo = Math.max(0, state.currentOrb.halo - dt * 2);
          }

          state.nodes.forEach((node) => {
            node.trail.forEach((entry) => {
              entry.life -= dt;
            });
            node.trail = node.trail.filter((entry) => entry.life > 0);
          });

          state.flash = Math.max(0, state.flash - dt * 1.4);
          state.shake = Math.max(0, state.shake - dt * 18);
          state.collapseGlow = Math.max(0, state.collapseGlow - dt * 1.2);
          state.messageTimer = Math.max(0, state.messageTimer - dt);
          state.laneHighlights = Math.max(0, state.laneHighlights - dt * 1.5);
        }

        function update(dt) {
          state.waterPhase += dt;
          state.skylineDrift += dt * 10;

          if (state.mode !== "running") {
            updateEffects(dt);
            return;
          }

          state.elapsed += dt;
          state.lastRunTime = state.elapsed;
          state.collapseX += COLLAPSE_SPEED * dt + state.deliveries * 1.15 * dt;
          state.collapseGlow = Math.min(1, state.collapseGlow + dt * 0.5);

          updateNodes(dt);
          updateOrb(state.currentOrb, dt);
          updateEffects(dt);

          if (!state.currentOrb && state.mode === "running" && state.deliveries < ORB_SEQUENCE.length) {
            state.spawnTimer -= dt;
            if (state.spawnTimer <= 0) {
              state.sequenceIndex += 1;
              state.currentOrb = createOrb(state.sequenceIndex);
              state.message = `다음 구슬 ${polarityLabel(state.currentOrb.polarity)}`;
              state.messageTimer = 0.8;
              spawnPopup(96, state.currentOrb.y - 26, `입항 ${polarityLabel(state.currentOrb.polarity)}`, "#f8fafc");
            }
          }

          if (state.collapseX > VIEW.width - 32 && state.mode === "running") {
            failStage("collapse");
          }
        }

        function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle = null, lineWidth = 1) {
          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.arcTo(x + width, y, x + width, y + height, radius);
          ctx.arcTo(x + width, y + height, x, y + height, radius);
          ctx.arcTo(x, y + height, x, y, radius);
          ctx.arcTo(x, y, x + width, y, radius);
          ctx.closePath();
          ctx.fillStyle = fillStyle;
          ctx.fill();
          if (strokeStyle) {
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
          }
        }

        function drawBackground() {
          const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);

          ctx.fillStyle = moonGlow;
          ctx.beginPath();
          ctx.arc(760, 84, 170, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "rgba(4, 12, 24, 0.78)";
          [0, 150, 300, 468, 630, 760].forEach((offset, index) => {
            const height = 118 + (index % 3) * 26;
            ctx.fillRect(offset, 190 - (index % 2) * 22, 72, height);
            ctx.fillRect(offset + 52, 214 - (index % 3) * 16, 34, 132);
          });

          ctx.strokeStyle = "rgba(138, 180, 210, 0.18)";
          ctx.lineWidth = 3;
          [124, 310, 520, 706].forEach((x, index) => {
            ctx.beginPath();
            ctx.moveTo(x, 176 + index * 8);
            ctx.lineTo(x - 18, 288);
            ctx.lineTo(x + 20, 288);

          });

          const water = ctx.createLinearGradient(0, 240, 0, VIEW.height);
          water.addColorStop(0, "rgba(11, 30, 48, 0.76)");

          water.addColorStop(1, "#05101b");
          ctx.fillStyle = water;
          ctx.fillRect(0, 240, VIEW.width, VIEW.height - 240);

          state.buoyLights.forEach((light, index) => {
            const shimmer = 0.45 + Math.sin(state.waterPhase * 2 + light.phase) * 0.28;
            const x = light.x + Math.sin(state.waterPhase + light.phase * 1.6) * 6;
            const y = light.y + Math.sin(state.waterPhase * 2.3 + index) * 3;
            ctx.fillStyle = `rgba(252, 211, 77, ${0.12 + shimmer * 0.24})`;
            ctx.fillRect(x - 2, y, 4, 72 + shimmer * 18);
            ctx.beginPath();
            ctx.arc(x, y, light.size + shimmer * 1.3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(252, 211, 77, ${0.55 + shimmer * 0.35})`;
            ctx.fill();
          });

          for (let wave = 0; wave < 10; wave += 1) {
            const y = 272 + wave * 22;
            const alpha = 0.05 + (wave % 2) * 0.03;
            ctx.strokeStyle = `rgba(103, 232, 249, ${alpha})`;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            for (let x = -24; x <= VIEW.width + 24; x += 18) {
              const ny = y + Math.sin(state.waterPhase * 3.2 + x * 0.014 + wave) * 4;
              if (x === -24) {
                ctx.moveTo(x, ny);
              } else {
                ctx.lineTo(x, ny);
              }
            }
            ctx.stroke();
          }

          ctx.fillStyle = "rgba(148, 163, 184, 0.11)";
          ctx.fillRect(12, 244, VIEW.width - 24, 4);

        function drawCollapseLine() {

        function drawGate(gate) {
          const color = polarityColor(gate.polarity);
          const pulse = 0.8 + Math.sin(state.elapsed * 4 + gate.y * 0.01) * 0.15;
          ctx.save();
          ctx.shadowColor = color;
          ctx.shadowBlur = 26;
          ctx.fillStyle = `rgba(15, 23, 42, 0.86)`;
          drawRoundedRect(gate.x - 26, gate.y - 52, 38, 104, 18, "rgba(8, 19, 31, 0.88)", color, 2.5);
          ctx.beginPath();
          ctx.arc(gate.x - 8, gate.y, GATE_RADIUS * pulse, 0, Math.PI * 2);
          const ring = ctx.createRadialGradient(gate.x - 8, gate.y, 4, gate.x - 8, gate.y, GATE_RADIUS * pulse);
          ring.addColorStop(0, `${color}dd`);
          ring.addColorStop(0.35, `${color}55`);
          ring.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = ring;
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(gate.x - 8, gate.y, 28, 0, Math.PI * 2);
          ctx.stroke();

        function drawNode(node) {
          const color = polarityColor(node.polarity);
          const isSelected = input.selectedNodeId === node.id;
          const locked = node.lockedUntil > state.elapsed;
          const alpha = node.collapsed ? 0.28 : 1;

          node.trail.forEach((entry) => {
            ctx.beginPath();
            ctx.arc(entry.x, entry.y, node.radius * entry.life, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(248, 250, 252, ${entry.life * 0.08})`;
            ctx.fill();
          });

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.shadowColor = color;
          ctx.shadowBlur = node.collapsed ? 8 : 22 + node.hitFlash * 16;

          const ringScale = 1 + node.pulse * 0.18;
          const bodyGradient = ctx.createRadialGradient(node.x - 6, node.y - 8, 4, node.x, node.y, 32);
          bodyGradient.addColorStop(0, "rgba(248,250,252,0.95)");
          bodyGradient.addColorStop(0.24, color);
          bodyGradient.addColorStop(0.78, node.collapsed ? "rgba(71, 85, 105, 0.82)" : "rgba(15,23,42,0.9)");
          bodyGradient.addColorStop(1, "rgba(2, 6, 23, 0.96)");
          ctx.fillStyle = bodyGradient;
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.radius * ringScale, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = isSelected ? "#f8fafc" : color;
          ctx.lineWidth = isSelected ? 3.6 : 2;
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.radius + 5 + node.pulse * 5, 0, Math.PI * 2);
          ctx.stroke();

          if (locked) {
            ctx.strokeStyle = "rgba(250, 204, 21, 0.92)";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 4]);
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.radius + 13, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
          }

          if (node.collapseTimer !== null && !node.collapsed) {
            const ratio = clamp(node.collapseTimer / NODE_DECAY, 0, 1);
            ctx.strokeStyle = "rgba(251, 146, 60, 0.88)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(node.x, node.y, node.radius + 16, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * ratio);
            ctx.stroke();
          }

          ctx.fillStyle = "#f8fafc";
          ctx.font = "900 17px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(polarityLabel(node.polarity), node.x, node.y + 6);
          ctx.font = "700 10px Trebuchet MS";
          ctx.fillStyle = "rgba(248,250,252,0.82)";
          ctx.fillText(node.id.toUpperCase(), node.x, node.y + 32);
          ctx.textAlign = "left";
          ctx.restore();
        }

        function drawOrb(orb) {
          if (!orb) {
            return;
          }
          const color = polarityColor(orb.polarity);
          orb.trail.forEach((entry) => {
            ctx.beginPath();
            ctx.arc(entry.x, entry.y, 8 * entry.life + 2, 0, Math.PI * 2);
            ctx.fillStyle = `${color}${Math.round(entry.life * 80)
              .toString(16)
              .padStart(2, "0")}`;
            ctx.fill();
          });

          ctx.save();
          ctx.shadowColor = color;
          ctx.shadowBlur = 28 + orb.halo * 10;
          ctx.beginPath();
          ctx.arc(orb.x, orb.y, orb.radius + orb.halo * 1.2, 0, Math.PI * 2);
          const glow = ctx.createRadialGradient(orb.x - 3, orb.y - 4, 3, orb.x, orb.y, 24);
          glow.addColorStop(0, "#ffffff");
          glow.addColorStop(0.34, color);
          glow.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = glow;
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.76)";
          ctx.lineWidth = 1.8;
          ctx.stroke();
          ctx.restore();
        }

        function drawParticles() {
          state.ripples.forEach((ripple) => {
            const alpha = ripple.life / ripple.ttl;
            ctx.strokeStyle = ripple.color.replace(/[\d.]+\)$/, `${(alpha * 0.9).toFixed(3)})`);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
            ctx.stroke();
          });

          state.particles.forEach((particle) => {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = particle.life / particle.ttl;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          });
        }

        function render() {
          ctx.clearRect(0, 0, VIEW.width, VIEW.height);
          drawBackground();

          ctx.save();
          if (state.shake > 0 && !prefersReducedMotion) {
            const amount = state.shake;
            ctx.translate((Math.random() - 0.5) * amount, (Math.random() - 0.5) * amount);
          }

          drawCollapseLine();
          gates.forEach(drawGate);
          state.nodes.forEach(drawNode);
          drawOrb(state.currentOrb);
          drawParticles();
          ctx.restore();

          drawHUD();
          drawTextPopups();

          if (state.mode === "menu") {
            drawMenuOverlay();
          }
          if (state.mode === "failed" || state.mode === "cleared") {
            drawResultOverlay();
          }

          if (state.flash > 0) {
            ctx.fillStyle = `rgba(255,255,255,${state.flash * 0.25})`;
            ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          }
        }

        function gameLoop(timestamp) {
          if (!lastTimestamp) {
            lastTimestamp = timestamp;
          }
          let delta = (timestamp - lastTimestamp) / 1000;
          lastTimestamp = timestamp;
          delta = Math.min(MAX_DT, delta);
          while (delta > 0) {
            const step = Math.min(FIXED_DT, delta);
            update(step);
            delta -= step;
          }
          render();
          animationFrame = window.requestAnimationFrame(gameLoop);
        }

        function getCanvasPoint(event) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = VIEW.width / rect.width;
          const scaleY = VIEW.height / rect.height;
          return {
            x: (event.clientX - rect.left) * scaleX,
            y: (event.clientY - rect.top) * scaleY,
          };
        }

        function hitNode(x, y) {
          for (let index = state.nodes.length - 1; index >= 0; index -= 1) {
            const node = state.nodes[index];
            if (node.collapsed) {
              continue;
            }
            if (length(node.x - x, node.y - y) <= node.radius + 10) {
              return node;
            }
          }
          return null;
        }

        function toggleNodePolarity(node) {
          if (!node || node.collapsed) {
            return;
          }
          node.polarity *= -1;
          node.pulse = 1;
          node.hitFlash = 1;
          spawnParticles(node.x, node.y, polarityColor(node.polarity), 14, 0.75);
          spawnPopup(node.x - 12, node.y - 32, polarityLabel(node.polarity), polarityColor(node.polarity));
        }

        function lockNode(node) {
          if (!node || node.collapsed) {
            return;
          }
          node.lockedUntil = state.elapsed + LOCK_TIME;
          node.pulse = 1;
          spawnParticles(node.x, node.y, "#fbbf24", 14, 0.7);
          spawnPopup(node.x - 18, node.y - 30, "LOCK", "#fde68a");
        }

        function handlePointerDown(event) {
          const point = getCanvasPoint(event);
          canvas.focus({ preventScroll: true });
          startFromTouch();
          if (state.mode !== "running") {
            return;
          }
          const node = hitNode(point.x, point.y);
          if (!node) {
            return;
          }
          input.pointerDown = true;
          input.pointerId = event.pointerId;
          input.activeNodeId = node.id;
          input.startedAt = performance.now();
          input.moved = false;
          input.offsetX = point.x - node.x;
          input.offsetY = point.y - node.y;
          selectNode(node.id);
          canvas.setPointerCapture?.(event.pointerId);
          event.preventDefault();
        }

        function handlePointerMove(event) {
          if (!input.pointerDown || input.pointerId !== event.pointerId || !input.activeNodeId) {
            return;
          }
          const node = findNodeById(input.activeNodeId);
          if (!node || node.collapsed) {
            return;
          }
          const point = getCanvasPoint(event);
          const nextX = point.x - input.offsetX;
          const nextY = point.y - input.offsetY;
          const moveDistance = length(nextX - node.x, nextY - node.y);
          if (moveDistance > 0.5) {
            input.moved = input.moved || moveDistance > DRAG_THRESHOLD;
            node.x = clamp(nextX, 110, 812);
            node.y = clamp(nextY, HARBOR_TOP + 12, HARBOR_BOTTOM - 12);
            node.pulse = 0.6;
          }
          event.preventDefault();
        }

        function releasePointer(event) {
          if (!input.pointerDown) {
            return;
          }
          const node = findNodeById(input.activeNodeId);
          const heldFor = performance.now() - input.startedAt;
          if (node && !node.collapsed) {
            if (!input.moved && heldFor >= HOLD_MS) {
              lockNode(node);
            } else if (!input.moved) {
              toggleNodePolarity(node);
            } else {
              spawnPopup(node.x - 12, node.y - 30, "SHIFT", "#93c5fd");
            }
          }
          input.pointerDown = false;
          input.pointerId = null;
          input.activeNodeId = null;
          if (event?.pointerId !== undefined) {
            canvas.releasePointerCapture?.(event.pointerId);
          }
          event?.preventDefault?.();
        }

        function cycleSelectedNode() {
          const liveNodes = state.nodes.filter((node) => !node.collapsed);
          if (!liveNodes.length) {
            input.selectedNodeId = null;
            return;
          }
          const currentIndex = liveNodes.findIndex((node) => node.id === input.selectedNodeId);
          const next = liveNodes[(currentIndex + 1 + liveNodes.length) % liveNodes.length];
          selectNode(next.id);
        }

        function handleKeyDown(event) {
          if ((state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") && (event.key === "Enter" || event.key === " ")) {
            event.preventDefault();
            resetRun();
            return;
          }

          if (state.mode !== "running") {
            return;
          }

          if (event.key === "Tab") {
            event.preventDefault();
            const node = findNodeById(input.selectedNodeId);
            if (node) {
              toggleNodePolarity(node);
            } else {
              cycleSelectedNode();
            }
          }

          if (event.key.toLowerCase() === "q") {
            event.preventDefault();
            cycleSelectedNode();
          }
        }

        function renderGameToText() {
          const selectedNode = findNodeById(input.selectedNodeId);
          const orb = state.currentOrb;
          const payload = {
            mode: state.mode,
            coordinateSystem: "origin top-left, x right, y down",
            deliveries: state.deliveries,
            collapseX: Number(state.collapseX.toFixed(1)),
            overheatChain: state.overheatChain,
            message: state.messageTimer > 0 ? state.message : "",
            orb: orb
              ? {
                  polarity: polarityLabel(orb.polarity),
                  x: Number(orb.x.toFixed(1)),
                  y: Number(orb.y.toFixed(1)),
                  vx: Number(orb.vx.toFixed(1)),
                  vy: Number(orb.vy.toFixed(1)),
                  targetGate: oppositeGateForOrb(orb).id,
                }
              : null,
            selectedNode: selectedNode
              ? {
                  id: selectedNode.id,
                  polarity: polarityLabel(selectedNode.polarity),
                  x: Number(selectedNode.x.toFixed(1)),
                  y: Number(selectedNode.y.toFixed(1)),
                  locked: selectedNode.lockedUntil > state.elapsed,
                  collapseTimer:
                    selectedNode.collapseTimer === null
                      ? null
                      : Number(Math.max(0, selectedNode.collapseTimer).toFixed(2)),
                }
              : null,
            nodes: state.nodes.map((node) => ({
              id: node.id,
              polarity: polarityLabel(node.polarity),
              x: Number(node.x.toFixed(1)),
              y: Number(node.y.toFixed(1)),
              collapsed: node.collapsed,
              locked: node.lockedUntil > state.elapsed,
            })),
          };
          return JSON.stringify(payload);
        }

        window.relayStageMeta = {
          id: "midnight-harbor-magnet-braiding-collapse",
          title: "Midnight Harbor: Magnet Braid",
          description: META_DESCRIPTION,
          creator: "jungcollin",
          genre: "Magnetic routing / 붕괴하는 라인",
          clearCondition: META_CLEAR,
        };

        window.relayStageResult = {
          status: "running",
        };

        window.render_game_to_text = renderGameToText;

        window.advanceTime = (ms) => {
          const steps = Math.max(1, Math.round(ms / (1000 / 60)));
          for (let index = 0; index < steps; index += 1) {
            update(FIXED_DT);
          }
          render();
        };

        window.relayStageDebug = {
          forceClear() {
            if (state.mode === "menu") {
              resetRun();
            }
            state.deliveries = 5;
            clearStage();
            render();
          },
          forceFail() {
            if (state.mode === "menu") {
              resetRun();
            }
            failStage("failed");
            render();
          },
        };

        canvas.addEventListener("pointerdown", handlePointerDown, { passive: false });
        canvas.addEventListener("pointermove", handlePointerMove, { passive: false });
        canvas.addEventListener("pointerup", releasePointer, { passive: false });
        canvas.addEventListener("pointercancel", releasePointer, { passive: false });
        window.addEventListener("keydown", handleKeyDown);

        reportReadyToHost();
        render();
        animationFrame = window.requestAnimationFrame(gameLoop);

        window.addEventListener("beforeunload", () => {
          if (animationFrame) {
            window.cancelAnimationFrame(animationFrame);
          }
        });
      })();
    </script>
  </body>
</html>
