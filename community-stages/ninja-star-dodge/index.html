<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>수리검 피하기</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 400px;
        background: #0f172a;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">수리검 피하기. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 PC: 방향키 이동, 모바일: 화면 터치로 이동 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="수리검 피하기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("ninja-star-dodge") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "사방에서 날아오는 수리검을 피하는 생존 게임",
      };

      const player = {
        x: VIEW.width / 2,
        y: VIEW.height / 2,
        radius: 12,
        speed: 300,
        vx: 0,
        vy: 0
      };

      const keys = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false
      };

      let shurikens = [];
      let shurikenSpawnTimer = 0;
      const SHURIKEN_SPAWN_INTERVAL = 0.5; // seconds
      const SURVIVE_TIME = 20; // seconds

      let isTouching = false;
      let targetX = player.x;
      let targetY = player.y;

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;

        player.x = VIEW.width / 2;
        player.y = VIEW.height / 2;
        shurikens = [];
        shurikenSpawnTimer = 0;
        keys.ArrowUp = false;
        keys.ArrowDown = false;
        keys.ArrowLeft = false;
        keys.ArrowRight = false;
        isTouching = false;
        targetX = player.x;
        targetY = player.y;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function spawnShuriken() {
        const side = Math.floor(Math.random() * 4); // 0: top, 1: right, 2: bottom, 3: left
        let x, y, vx, vy;
        const speed = 150 + Math.random() * 200 + state.elapsed * 5;

        if (side === 0) {
          x = Math.random() * VIEW.width;
          y = -20;
          vx = (Math.random() - 0.5) * speed;
          vy = speed;
        } else if (side === 1) {
          x = VIEW.width + 20;
          y = Math.random() * VIEW.height;
          vx = -speed;
          vy = (Math.random() - 0.5) * speed;
        } else if (side === 2) {
          x = Math.random() * VIEW.width;
          y = VIEW.height + 20;
          vx = (Math.random() - 0.5) * speed;
          vy = -speed;
        } else {
          x = -20;
          y = Math.random() * VIEW.height;
          vx = speed;
          vy = (Math.random() - 0.5) * speed;
        }

        // Aim somewhat towards the player
        const dx = player.x - x;
        const dy = player.y - y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (Math.random() < 0.7) {
            vx = (dx / dist) * speed;
            vy = (dy / dist) * speed;
        }

        shurikens.push({ x, y, vx, vy, radius: 10, rot: 0, rotSpeed: (Math.random() - 0.5) * 20 });
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (state.elapsed >= SURVIVE_TIME) {
            clearStage();
            return;
          }

          // Move player
          if (isTouching) {
             const dx = targetX - player.x;
             const dy = targetY - player.y;
             const dist = Math.sqrt(dx * dx + dy * dy);
             if (dist > player.speed * dt) {
                 player.x += (dx / dist) * player.speed * dt;
                 player.y += (dy / dist) * player.speed * dt;
             } else {
                 player.x = targetX;
                 player.y = targetY;
             }
          } else {
             let dx = 0;
             let dy = 0;
             if (keys.ArrowUp) dy -= 1;
             if (keys.ArrowDown) dy += 1;
             if (keys.ArrowLeft) dx -= 1;
             if (keys.ArrowRight) dx += 1;

             if (dx !== 0 || dy !== 0) {
               const length = Math.sqrt(dx * dx + dy * dy);
               player.x += (dx / length) * player.speed * dt;
               player.y += (dy / length) * player.speed * dt;
             }
          }

          // Clamp player
          player.x = Math.max(player.radius, Math.min(VIEW.width - player.radius, player.x));
          player.y = Math.max(player.radius, Math.min(VIEW.height - player.radius, player.y));

          // Spawn shurikens
          shurikenSpawnTimer -= dt;
          // spawn faster over time
          const currentSpawnInterval = Math.max(0.1, SHURIKEN_SPAWN_INTERVAL - state.elapsed * 0.015);
          if (shurikenSpawnTimer <= 0) {
            spawnShuriken();
            shurikenSpawnTimer = currentSpawnInterval;
          }

          // Move shurikens and check collision
          for (let i = shurikens.length - 1; i >= 0; i--) {
             const s = shurikens[i];
             s.x += s.vx * dt;
             s.y += s.vy * dt;
             s.rot += s.rotSpeed * dt;

             // Collision with player
             const dx = player.x - s.x;
             const dy = player.y - s.y;
             const dist = Math.sqrt(dx * dx + dy * dy);
             if (dist < player.radius + s.radius - 2) {
                 failStage("수리검에 맞음");
                 return;
             }

             // Remove off-screen shurikens
             if (s.x < -100 || s.x > VIEW.width + 100 || s.y < -100 || s.y > VIEW.height + 100) {
                 shurikens.splice(i, 1);
             }
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function drawStar(cx, cy, spikes, outerRadius, innerRadius, rot) {
        let rot1 = Math.PI / 2 * 3;
        let x = cx;
        let y = cy;
        let step = Math.PI / spikes;

        ctx.beginPath();
        ctx.moveTo(cx, cy - outerRadius)
        for(let i=0; i<spikes; i++){
          x = cx + Math.cos(rot1 + rot) * outerRadius;
          y = cy + Math.sin(rot1 + rot) * outerRadius;
          ctx.lineTo(x, y)
          rot1 += step

          x = cx + Math.cos(rot1 + rot) * innerRadius;
          y = cy + Math.sin(rot1 + rot) * innerRadius;
          ctx.lineTo(x, y)
          rot1 += step
        }
        ctx.lineTo(cx, cy - outerRadius)
        ctx.closePath();
      }

      function render() {
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        // draw background grid for visual reference
        ctx.strokeStyle = "#1e293b";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x <= VIEW.width; x += 40) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, VIEW.height);
        }
        for (let y = 0; y <= VIEW.height; y += 40) {
            ctx.moveTo(0, y);
            ctx.lineTo(VIEW.width, y);
        }
        ctx.stroke();

        if (state.mode === "running" || state.mode === "failed" || state.mode === "cleared") {
            // Draw player
            ctx.fillStyle = "#3b82f6"; // blue
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw shurikens
            ctx.fillStyle = "#ef4444"; // red
            for (const s of shurikens) {
                drawStar(s.x, s.y, 4, s.radius * 1.5, s.radius * 0.5, s.rot);
                ctx.fill();
            }

            // Draw timer
            ctx.fillStyle = "#f8fafc";
            ctx.font = "bold 24px Trebuchet MS";
            ctx.textAlign = "center";
            const remaining = Math.max(0, SURVIVE_TIME - state.elapsed);
            ctx.fillText(remaining.toFixed(1) + "s", VIEW.width / 2, 40);
        }

        if (state.mode === "menu") {
          renderCard("수리검 피하기", [
            "사방에서 날아오는 수리검을 피하는 생존 게임",
            "조작: PC 방향키 이동, 모바일 화면 터치",
            "클리어 조건: 20초 생존",
            "실패 조건: 수리검에 맞음",
            "터치 또는 Enter로 시작",
          ], "#f97316");
          return;
        }

        if (state.mode === "failed") {
          renderCard("실패", [
            "수리검에 맞았습니다.",
            "다시 시도해주세요.",
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
            renderCard("클리어", [
            "20초 생존 성공!",
            "다음 스테이지로 이동합니다.",
            ], "#15803d");
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "ninja-star-dodge",
        title: "수리검 피하기",
        creator: "Jules",
        genre: "아케이드 생존",
        clearCondition: "20초 동안 사방에서 날아오는 수리검 피하기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", (e) => {
          onKeyDown(e);
          if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
      });
      window.addEventListener("keyup", (e) => {
          if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
      });

      canvas.addEventListener("pointerdown", (e) => {
          if (state.mode !== "running") {
              startFromTouch();
          } else {
              isTouching = true;
              const rect = canvas.getBoundingClientRect();
              const scaleX = canvas.width / rect.width;
              const scaleY = canvas.height / rect.height;
              targetX = (e.clientX - rect.left) * scaleX;
              targetY = (e.clientY - rect.top) * scaleY;
          }
      });

      canvas.addEventListener("pointermove", (e) => {
          if (isTouching) {
              const rect = canvas.getBoundingClientRect();
              const scaleX = canvas.width / rect.width;
              const scaleY = canvas.height / rect.height;
              targetX = (e.clientX - rect.left) * scaleX;
              targetY = (e.clientY - rect.top) * scaleY;
          }
      });

      canvas.addEventListener("pointerup", () => isTouching = false);
      canvas.addEventListener("pointercancel", () => isTouching = false);

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
