<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Moon Greenhouse: Echo Loom</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 18%, rgba(167, 248, 255, 0.2), transparent 24%),
          radial-gradient(circle at 78% 22%, rgba(255, 234, 170, 0.12), transparent 18%),
          linear-gradient(180deg, #061420 0%, #0a2333 46%, #09151d 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(142, 232, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(6, 20, 32, 0.94);
        color: #effcff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at 50% 24%, rgba(183, 246, 255, 0.08), transparent 22%),
          linear-gradient(180deg, #061420 0%, #0a2333 46%, #09151d 100%);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(223, 252, 255, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Moon Greenhouse: Echo Loom. 캔버스를 터치하거나 Enter로 시작하세요. 기본
      조작은 마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상
      기록, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도
      플레이 가능하게 구현 이며, 모바일에서는 화면 터치와 드래그 홀드로 퍼즐을
      진행합니다. 클리어 조건은 과열을 폭주시키지 않고 모든 코어 문양을 연결하면
      클리어 입니다. 실패 조건은 과열 게이지가 폭주하거나 잔상 선이 끊기면 즉시
      실패 입니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Moon Greenhouse: Echo Loom"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const ECHO_DURATION = 3;
      const RECORD_TIME = 0.48;
      const HEAT_FAILURE = 1;
      const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)").matches;
      const relayContext =
        window.RelayRuntime?.readContext("moon-greenhouse-echo-weaving-heat") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const COLORS = {
        skyTop: "#081625",
        skyBottom: "#09222f",
        moon: "#f4fbff",
        moonGlow: "rgba(202, 247, 255, 0.26)",
        glass: "rgba(151, 239, 255, 0.1)",
        mist: "rgba(118, 234, 255, 0.15)",
        lineIdle: "rgba(114, 237, 255, 0.24)",
        lineNorth: "#7bf6ff",
        lineSouth: "#ffd989",
        lineFinal: "#c0b1ff",
        heatCool: "#78f0ff",
        heatWarn: "#ffd878",
        heatHot: "#ff6c68",
        text: "#eefcff",
        textDim: "rgba(222, 247, 250, 0.78)",
        panel: "rgba(8, 23, 34, 0.56)",
        panelEdge: "rgba(175, 240, 255, 0.18)",
        danger: "#ff8280",
        success: "#b5ffca",
      };

      const NODES = {
        root: { id: "root", x: 124, y: 272, r: 26, label: "Root Loom", kind: "root" },
        topSwitch: {
          id: "topSwitch",
          x: 320,
          y: 152,
          r: 22,
          label: "Moon Valve",
          kind: "switch",
          echoId: "north",
        },
        topCore: {
          id: "topCore",
          x: 640,
          y: 138,
          r: 26,
          label: "North Core",
          kind: "core",
          coreId: "north",
        },
        bottomSwitch: {
          id: "bottomSwitch",
          x: 320,
          y: 392,
          r: 22,
          label: "Dew Valve",
          kind: "switch",
          echoId: "south",
        },
        bottomCore: {
          id: "bottomCore",
          x: 640,
          y: 406,
          r: 26,
          label: "South Core",
          kind: "core",
          coreId: "south",
        },
        crownCore: {
          id: "crownCore",
          x: 842,
          y: 272,
          r: 29,
          label: "Bloom Crown",
          kind: "final",
          coreId: "crown",
        },
      };

      const PATHS = {
        northEcho: {
          id: "northEcho",
          from: "root",
          to: "topSwitch",
          curvature: -72,
          color: COLORS.lineNorth,
        },
        southEcho: {
          id: "southEcho",
          from: "root",
          to: "bottomSwitch",
          curvature: 72,
          color: COLORS.lineSouth,
        },
        northCore: {
          id: "northCore",
          from: "topSwitch",
          to: "topCore",
          curvature: -28,
          color: COLORS.lineNorth,
        },
        southCore: {
          id: "southCore",
          from: "bottomSwitch",
          to: "bottomCore",
          curvature: 28,
          color: COLORS.lineSouth,
        },
        crown: {
          id: "crown",
          from: "root",
          to: "crownCore",
          curvature: 0,
          color: COLORS.lineFinal,
        },
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function createAmbientMotes() {
        const motes = [];
        const count = reduceMotion ? 22 : 44;
        for (let index = 0; index < count; index += 1) {
          motes.push({
            x: Math.random() * VIEW.width,
            y: Math.random() * VIEW.height,
            radius: 1 + Math.random() * 2.8,
            speed: 4 + Math.random() * 11,
            sway: Math.random() * Math.PI * 2,
            alpha: 0.18 + Math.random() * 0.42,
            tint:
              Math.random() > 0.5 ? "rgba(121, 247, 255, 0.7)" : "rgba(255, 225, 166, 0.7)",
          });
        }
        return motes;
      }

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        heat: 0,
        screenShake: 0,
        lineSnapFlash: 0,
        clearFlash: 0,
        failureFlash: 0,
        note:
          "3초 잔상 실로 문양과 스위치를 동시에 엮고, 과열 직전엔 호흡을 끊어 식혀야 하는 월광 온실 퍼즐 액션",
        prompt: "상단과 하단 밸브에 잔상을 기록한 뒤 세 코어를 완성하세요.",
        resultText: "",
        resultReason: "",
        hintPulse: 0,
        pointer: {
          active: false,
          id: null,
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.5,
          startNodeId: null,
          targetNodeId: null,
          pathType: null,
          holdTime: 0,
          completed: false,
        },
        echoes: {
          north: { active: false, time: 0, pulse: 0 },
          south: { active: false, time: 0, pulse: 0 },
        },
        connections: {
          north: false,
          south: false,
          crown: false,
        },
        popups: [],
        bursts: [],
        ambient: createAmbientMotes(),
        actionGlow: 0,
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        const t = clamp(value, 0, 1);
        return 1 - (1 - t) * (1 - t) * (1 - t);
      }

      function distance(aX, aY, bX, bY) {
        return Math.hypot(aX - bX, aY - bY);
      }

      function getNode(nodeId) {
        return NODES[nodeId];
      }

      function getPath(pathId) {
        return PATHS[pathId];
      }

      function isEchoActive(echoId) {
        return Boolean(state.echoes[echoId]?.active && state.echoes[echoId]?.time > 0);
      }

      function canStartFrom(nodeId) {
        if (nodeId === "root") {
          return true;
        }
        if (nodeId === "topSwitch") {
          return isEchoActive("north");
        }
        if (nodeId === "bottomSwitch") {
          return isEchoActive("south");
        }
        return false;
      }

      function getHoverNode(x, y) {
        let best = null;
        let bestDistance = Infinity;
        Object.values(NODES).forEach((node) => {
          const dist = distance(x, y, node.x, node.y);
          if (dist <= node.r + 22 && dist < bestDistance) {
            best = node;
            bestDistance = dist;
          }
        });
        return best;
      }

      function getAvailableTargets(startNodeId) {
        if (startNodeId === "root") {
          const targets = ["topSwitch", "bottomSwitch"];
          if (state.connections.north && state.connections.south && !state.connections.crown) {
            targets.push("crownCore");
          }
          return targets;
        }
        if (startNodeId === "topSwitch" && !state.connections.north && isEchoActive("north")) {
          return ["topCore"];
        }
        if (
          startNodeId === "bottomSwitch" &&
          !state.connections.south &&
          isEchoActive("south")
        ) {
          return ["bottomCore"];
        }
        return [];
      }

      function identifyPath(startNodeId, targetNodeId) {
        if (startNodeId === "root" && targetNodeId === "topSwitch") {
          return { type: "record", echoId: "north", pathId: "northEcho" };
        }
        if (startNodeId === "root" && targetNodeId === "bottomSwitch") {
          return { type: "record", echoId: "south", pathId: "southEcho" };
        }
        if (startNodeId === "topSwitch" && targetNodeId === "topCore" && isEchoActive("north")) {
          return { type: "connect", coreId: "north", pathId: "northCore" };
        }
        if (
          startNodeId === "bottomSwitch" &&
          targetNodeId === "bottomCore" &&
          isEchoActive("south")
        ) {
          return { type: "connect", coreId: "south", pathId: "southCore" };
        }
        if (
          startNodeId === "root" &&
          targetNodeId === "crownCore" &&
          state.connections.north &&
          state.connections.south &&
          isEchoActive("north") &&
          isEchoActive("south")
        ) {
          return { type: "connect", coreId: "crown", pathId: "crown" };
        }
        return null;
      }

      function addPopup(text, x, y, color = COLORS.text) {
        state.popups.push({
          text,
          x,
          y,
          life: 1.15,
          alpha: 1,
          color,
        });
      }

      function addBurst(x, y, color, count = 20, speed = 180) {
        const maxCount = reduceMotion ? Math.round(count * 0.45) : count;
        for (let index = 0; index < maxCount; index += 1) {
          const angle = (Math.PI * 2 * index) / maxCount + Math.random() * 0.18;
          const velocity = speed * (0.55 + Math.random() * 0.6);
          state.bursts.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: 0.55 + Math.random() * 0.35,
            maxLife: 0.9,
            radius: 2 + Math.random() * 4,
            color,
          });
        }
      }

      function setPrompt(text) {
        state.prompt = text;
        state.hintPulse = 1;
      }

      function pulseAction() {
        state.actionGlow = 1;
      }

      function resetRuntimeState() {
        state.mode = "menu";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.heat = 0;
        state.screenShake = 0;
        state.lineSnapFlash = 0;
        state.clearFlash = 0;
        state.failureFlash = 0;
        state.resultText = "";
        state.resultReason = "";
        state.prompt = "상단과 하단 밸브에 잔상을 기록한 뒤 세 코어를 완성하세요.";
        state.pointer.active = false;
        state.pointer.id = null;
        state.pointer.startNodeId = null;
        state.pointer.targetNodeId = null;
        state.pointer.pathType = null;
        state.pointer.holdTime = 0;
        state.pointer.completed = false;
        state.pointer.x = VIEW.width * 0.5;
        state.pointer.y = VIEW.height * 0.5;
        state.echoes.north.active = false;
        state.echoes.north.time = 0;
        state.echoes.north.pulse = 0;
        state.echoes.south.active = false;
        state.echoes.south.time = 0;
        state.echoes.south.pulse = 0;
        state.connections.north = false;
        state.connections.south = false;
        state.connections.crown = false;
        state.popups.length = 0;
        state.bursts.length = 0;
        state.actionGlow = 0;
        state.hintPulse = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        resetRuntimeState();
        state.mode = "running";
        setPrompt("루트 룸에서 시작해 두 밸브에 3초 잔상을 기록하세요.");
      }

      function failStage(reason = "failed", message = "잔상 실이 끊어졌습니다.") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.resultText = message;
        state.resultReason = reason;
        state.failureFlash = 1;
        state.screenShake = 18;
        state.pointer.active = false;
        window.relayStageResult.status = "failed";
        addBurst(VIEW.width * 0.5, VIEW.height * 0.5, "rgba(255, 114, 116, 0.9)", 28, 240);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.resultText = "세 코어가 한 번에 개화했습니다.";
        state.clearFlash = 1;
        state.screenShake = 10;
        state.pointer.active = false;
        window.relayStageResult.status = "cleared";
        addBurst(VIEW.width * 0.5, VIEW.height * 0.5, "rgba(193, 255, 212, 0.95)", 34, 280);
        reportClearedToHost();
      }

      function refreshEcho(echoId) {
        const echo = state.echoes[echoId];
        if (!echo) {
          return;
        }
        echo.active = true;
        echo.time = ECHO_DURATION;
        echo.pulse = 1;
        pulseAction();
        state.heat = clamp(state.heat + 0.08, 0, HEAT_FAILURE);
      }

      function completeConnection(coreId) {
        if (state.connections[coreId]) {
          return;
        }
        state.connections[coreId] = true;
        if (coreId === "north" || coreId === "south") {
          const matchingEcho = state.echoes[coreId];
          matchingEcho.active = true;
          matchingEcho.time = ECHO_DURATION;
          matchingEcho.pulse = 1;
          const otherEcho = state.echoes[coreId === "north" ? "south" : "north"];
          if (otherEcho.active) {
            otherEcho.time = Math.min(ECHO_DURATION, otherEcho.time + 0.55);
            otherEcho.pulse = 1;
          }
        }
        pulseAction();
        state.heat = clamp(state.heat + 0.06, 0, HEAT_FAILURE);
        const node = coreId === "north" ? NODES.topCore : coreId === "south" ? NODES.bottomCore : NODES.crownCore;
        const color =
          coreId === "north"
            ? COLORS.lineNorth
            : coreId === "south"
              ? COLORS.lineSouth
              : COLORS.lineFinal;
        addPopup(
          coreId === "crown" ? "왕관 코어 점등" : coreId === "north" ? "북문양 연결" : "남문양 연결",
          node.x,
          node.y - 28,
          color
        );
        addBurst(node.x, node.y, color, coreId === "crown" ? 26 : 20, coreId === "crown" ? 260 : 210);
        if (coreId === "north" && !state.connections.south) {
          setPrompt("남쪽 밸브도 기록해 두 문양을 함께 밝히세요.");
        } else if (coreId === "south" && !state.connections.north) {
          setPrompt("북쪽 밸브도 기록해 두 문양을 함께 밝히세요.");
        } else if (coreId !== "crown" && state.connections.north && state.connections.south) {
          setPrompt("두 잔상이 살아 있는 동안 Bloom Crown을 바로 연결하세요.");
        }
        if (coreId === "crown") {
          clearStage();
        }
      }

      function getCurvePoints(fromNode, toPoint, curvature) {
        const dx = toPoint.x - fromNode.x;
        const dy = toPoint.y - fromNode.y;
        const midX = fromNode.x + dx * 0.5;
        const midY = fromNode.y + dy * 0.5;
        const length = Math.max(1, Math.hypot(dx, dy));
        const normalX = -dy / length;
        const normalY = dx / length;
        return {
          cpx: midX + normalX * curvature,
          cpy: midY + normalY * curvature,
        };
      }

      function drawBezierPath(fromNode, toPoint, curvature, options = {}) {
        const curve = getCurvePoints(fromNode, toPoint, curvature);
        const width = options.width || 6;
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = options.stroke || COLORS.lineIdle;
        ctx.shadowColor = options.glow || options.stroke || COLORS.lineIdle;
        ctx.shadowBlur = options.blur || 18;
        ctx.globalAlpha = options.alpha ?? 1;
        if (options.dash) {
          ctx.setLineDash(options.dash);
          ctx.lineDashOffset = options.dashOffset || 0;
        } else {
          ctx.setLineDash([]);
        }
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(fromNode.x, fromNode.y);
        ctx.quadraticCurveTo(curve.cpx, curve.cpy, toPoint.x, toPoint.y);
        ctx.stroke();
        ctx.restore();

        if (options.secondaryStroke) {
          ctx.save();
          ctx.globalAlpha = options.secondaryAlpha ?? 0.75;
          ctx.lineCap = "round";
          ctx.lineWidth = Math.max(1.5, width * 0.34);
          ctx.strokeStyle = options.secondaryStroke;
          ctx.beginPath();
          ctx.moveTo(fromNode.x, fromNode.y);
          ctx.quadraticCurveTo(curve.cpx, curve.cpy, toPoint.x, toPoint.y);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawAmbientBackdrop(timeSec) {
        const background = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        background.addColorStop(0, COLORS.skyTop);
        background.addColorStop(1, COLORS.skyBottom);
        ctx.fillStyle = background;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const moonX = 774;
        const moonY = 96;
        const moonGlow = ctx.createRadialGradient(moonX, moonY, 12, moonX, moonY, 96);
        moonGlow.addColorStop(0, "rgba(241, 250, 255, 0.96)");
        moonGlow.addColorStop(0.38, "rgba(190, 244, 255, 0.2)");
        moonGlow.addColorStop(1, "rgba(190, 244, 255, 0)");
        ctx.fillStyle = moonGlow;
        ctx.beginPath();
        ctx.arc(moonX, moonY, 96, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = COLORS.moon;
        ctx.beginPath();
        ctx.arc(moonX, moonY, 34, 0, Math.PI * 2);
        ctx.fill();

        const floorMist = ctx.createLinearGradient(0, VIEW.height * 0.54, 0, VIEW.height);
        floorMist.addColorStop(0, "rgba(27, 72, 76, 0)");
        floorMist.addColorStop(1, "rgba(11, 34, 39, 0.82)");
        ctx.fillStyle = floorMist;
        ctx.fillRect(0, VIEW.height * 0.48, VIEW.width, VIEW.height * 0.52);

        for (let index = 0; index < 4; index += 1) {
          const x = 150 + index * 220;
          const archHeight = 296 + index * 7;
          ctx.save();
          ctx.strokeStyle = "rgba(163, 238, 255, 0.18)";
          ctx.lineWidth = 6;
          ctx.shadowColor = "rgba(127, 227, 255, 0.15)";
          ctx.shadowBlur = 18;
          ctx.beginPath();
          ctx.moveTo(x, 486);
          ctx.quadraticCurveTo(x + 12, 486 - archHeight, x + 84, 86);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + 136, 486);
          ctx.quadraticCurveTo(x + 124, 486 - archHeight, x + 52, 86);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + 18, 334);
          ctx.lineTo(x + 118, 334);
          ctx.stroke();
          ctx.restore();
        }

        ctx.save();
        ctx.strokeStyle = "rgba(139, 231, 255, 0.12)";
        ctx.lineWidth = 2;
        for (let row = 0; row < 6; row += 1) {
          const y = 84 + row * 58;
          ctx.beginPath();
          ctx.moveTo(46, y);
          ctx.lineTo(VIEW.width - 46, y + (row % 2 === 0 ? 18 : -16));
          ctx.stroke();
        }
        ctx.restore();

        state.ambient.forEach((mote) => {
          mote.y -= mote.speed * FIXED_DT;
          mote.sway += FIXED_DT * 0.8;
          if (mote.y < -14) {
            mote.y = VIEW.height + Math.random() * 80;
            mote.x = Math.random() * VIEW.width;
          }
          const x = mote.x + Math.sin(mote.sway + timeSec * 0.45) * 12;
          ctx.save();
          ctx.globalAlpha = mote.alpha;
          ctx.fillStyle = mote.tint;
          ctx.shadowColor = mote.tint;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(x, mote.y, mote.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        ctx.save();
        ctx.globalAlpha = 0.26;
        ctx.fillStyle = "rgba(108, 225, 216, 0.2)";
        for (let index = 0; index < 16; index += 1) {
          const x = 24 + index * 62;
          const sway = Math.sin(timeSec * 0.9 + index * 0.6);
          ctx.beginPath();
          ctx.moveTo(x, VIEW.height);
          ctx.quadraticCurveTo(x + sway * 6, VIEW.height - 30, x + sway * 4, VIEW.height - 68);
          ctx.quadraticCurveTo(x + sway * 8, VIEW.height - 108, x - sway * 2, VIEW.height - 148);
          ctx.lineWidth = 2;
          ctx.strokeStyle = "rgba(140, 255, 214, 0.24)";
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawStaticLanes(timeSec) {
        Object.values(PATHS).forEach((path) => {
          const fromNode = getNode(path.from);
          const toNode = getNode(path.to);
          drawBezierPath(fromNode, toNode, path.curvature, {
            width: 2.5,
            stroke: "rgba(124, 230, 243, 0.12)",
            glow: "rgba(124, 230, 243, 0.08)",
            blur: 10,
          });
        });

        ["northEcho", "southEcho", "northCore", "southCore", "crown"].forEach((pathId) => {
          const path = getPath(pathId);
          const fromNode = getNode(path.from);
          const toNode = getNode(path.to);
          const isActive =
            (pathId === "northEcho" && isEchoActive("north")) ||
            (pathId === "southEcho" && isEchoActive("south")) ||
            (pathId === "northCore" && state.connections.north) ||
            (pathId === "southCore" && state.connections.south) ||
            (pathId === "crown" && state.connections.crown);
          if (!isActive) {
            return;
          }
          const pulse = Math.sin(timeSec * 6 + (pathId === "southCore" ? 1 : 0)) * 0.5 + 0.5;
          drawBezierPath(fromNode, toNode, path.curvature, {
            width: pathId === "crown" ? 9.5 : 8,
            stroke: path.color,
            glow: path.color,
            blur: pathId === "crown" ? 26 : 22,
            dash: [18, 18],
            dashOffset: -timeSec * (pathId === "crown" ? 150 : 110),
            secondaryStroke: "rgba(255, 255, 255, 0.9)",
            secondaryAlpha: 0.18 + pulse * 0.24,
            alpha: 0.8 + pulse * 0.2,
          });
        });
      }

      function drawGateBridges(timeSec) {
        const gateOpenAlpha = 0.14 + Math.sin(timeSec * 6) * 0.04;
        ctx.save();
        [
          {
            x: 500,
            y: 154,
            open: isEchoActive("north"),
            color: COLORS.lineNorth,
            rotation: -0.18,
          },
          {
            x: 500,
            y: 390,
            open: isEchoActive("south"),
            color: COLORS.lineSouth,
            rotation: 0.18,
          },
        ].forEach((gate) => {
          ctx.save();
          ctx.translate(gate.x, gate.y);
          ctx.rotate(gate.rotation);
          ctx.strokeStyle = gate.open ? gate.color : "rgba(255, 255, 255, 0.14)";
          ctx.fillStyle = gate.open ? `${gate.color}22` : "rgba(255, 255, 255, 0.05)";
          ctx.lineWidth = gate.open ? 4 : 2;
          ctx.shadowColor = gate.open ? gate.color : "transparent";
          ctx.shadowBlur = gate.open ? 18 : 0;
          ctx.beginPath();
          ctx.roundRect(-42, -20, 84, 40, 18);
          ctx.fill();
          ctx.stroke();
          ctx.globalAlpha = gate.open ? 0.82 : gateOpenAlpha;
          ctx.beginPath();
          ctx.moveTo(-24, -10);
          ctx.lineTo(0, 0);
          ctx.lineTo(24, 10);
          ctx.stroke();
          ctx.restore();
        });
        ctx.restore();
      }

      function drawNode(node, timeSec) {
        const hover = state.pointer.active && state.pointer.targetNodeId === node.id;
        const coreConnected =
          (node.id === "topCore" && state.connections.north) ||
          (node.id === "bottomCore" && state.connections.south) ||
          (node.id === "crownCore" && state.connections.crown);
        const switchActive =
          (node.id === "topSwitch" && isEchoActive("north")) ||
          (node.id === "bottomSwitch" && isEchoActive("south"));
        const baseGlow =
          node.kind === "root"
            ? "rgba(141, 243, 255, 0.34)"
            : node.kind === "final"
              ? COLORS.lineFinal
              : node.kind === "core"
                ? node.id === "topCore"
                  ? COLORS.lineNorth
                  : COLORS.lineSouth
                : node.id === "topSwitch"
                  ? COLORS.lineNorth
                  : COLORS.lineSouth;
        const glowBoost = hover || switchActive || coreConnected ? 1 : 0.55;

        ctx.save();
        ctx.translate(node.x, node.y);
        ctx.shadowColor = baseGlow;
        ctx.shadowBlur = 18 + glowBoost * 18;
        const outer = ctx.createRadialGradient(0, 0, 4, 0, 0, node.r + 22);
        outer.addColorStop(0, "rgba(255,255,255,0.88)");
        outer.addColorStop(0.28, baseGlow);
        outer.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(0, 0, node.r + 14 + Math.sin(timeSec * 2.4 + node.x * 0.01) * 1.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(10, 29, 41, 0.94)";
        ctx.beginPath();
        ctx.arc(0, 0, node.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = hover || switchActive || coreConnected ? baseGlow : "rgba(197, 242, 255, 0.34)";
        ctx.stroke();

        if (node.kind === "switch") {
          ctx.rotate(timeSec * 0.4 * (node.id === "topSwitch" ? 1 : -1));
          for (let index = 0; index < 6; index += 1) {
            ctx.save();
            ctx.rotate((Math.PI * 2 * index) / 6);
            ctx.fillStyle = switchActive
              ? index % 2 === 0
                ? "rgba(255,255,255,0.92)"
                : baseGlow
              : "rgba(178, 238, 246, 0.42)";
            ctx.beginPath();
            ctx.moveTo(0, -node.r + 5);
            ctx.lineTo(7, -node.r - 13);
            ctx.lineTo(-7, -node.r - 13);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
        } else if (node.kind === "core" || node.kind === "final") {
          const spokes = node.kind === "final" ? 8 : 6;
          for (let index = 0; index < spokes; index += 1) {
            ctx.save();
            ctx.rotate((Math.PI * 2 * index) / spokes + timeSec * 0.15);
            ctx.strokeStyle =
              coreConnected || node.kind === "final"
                ? "rgba(255,255,255,0.84)"
                : "rgba(178, 238, 246, 0.4)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -6);
            ctx.lineTo(0, -node.r + 7);
            ctx.stroke();
            ctx.restore();
          }
          ctx.fillStyle = coreConnected ? "rgba(255,255,255,0.92)" : "rgba(144, 225, 236, 0.36)";
          ctx.beginPath();
          ctx.arc(0, 0, node.kind === "final" ? 8 : 6, 0, Math.PI * 2);
          ctx.fill();
        } else {
          const pulse = 0.7 + Math.sin(timeSec * 3.1) * 0.2;
          ctx.fillStyle = `rgba(255,255,255,${pulse})`;
          ctx.beginPath();
          ctx.arc(0, 0, 8, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawPointerWeave(timeSec) {
        if (!state.pointer.active || !state.pointer.startNodeId) {
          return;
        }
        const startNode = getNode(state.pointer.startNodeId);
        const hoverNode = state.pointer.targetNodeId ? getNode(state.pointer.targetNodeId) : null;
        const targetPoint = hoverNode || { x: state.pointer.x, y: state.pointer.y };
        const pathInfo = hoverNode ? identifyPath(startNode.id, hoverNode.id) : null;
        const pathId = pathInfo?.pathId || (state.pointer.startNodeId === "root" && hoverNode?.id === "topSwitch"
          ? "northEcho"
          : state.pointer.startNodeId === "root" && hoverNode?.id === "bottomSwitch"
            ? "southEcho"
            : state.pointer.startNodeId === "topSwitch"
              ? "northCore"
              : state.pointer.startNodeId === "bottomSwitch"
                ? "southCore"
                : "crown");
        const fallbackPath = getPath(pathId) || { curvature: 0, color: COLORS.lineIdle };
        const validTarget = Boolean(pathInfo);
        drawBezierPath(startNode, targetPoint, fallbackPath.curvature, {
          width: validTarget ? 8.5 : 6,
          stroke: validTarget ? fallbackPath.color : "rgba(255, 131, 131, 0.78)",
          glow: validTarget ? fallbackPath.color : "rgba(255, 131, 131, 0.78)",
          blur: validTarget ? 18 : 10,
          dash: [14, 12],
          dashOffset: -timeSec * 130,
          secondaryStroke: "rgba(255,255,255,0.84)",
          secondaryAlpha: 0.24,
          alpha: validTarget ? 0.92 : 0.7,
        });

        if (pathInfo?.type === "record" && hoverNode) {
          const holdRatio = clamp(state.pointer.holdTime / RECORD_TIME, 0, 1);
          ctx.save();
          ctx.strokeStyle = fallbackPath.color;
          ctx.lineWidth = 5;
          ctx.globalAlpha = 0.75;
          ctx.beginPath();
          ctx.arc(hoverNode.x, hoverNode.y, hoverNode.r + 12, -Math.PI / 2, -Math.PI / 2 + holdRatio * Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawBursts(dt) {
        for (let index = state.bursts.length - 1; index >= 0; index -= 1) {
          const particle = state.bursts[index];
          particle.life -= dt;
          if (particle.life <= 0) {
            state.bursts.splice(index, 1);
            continue;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.984;
          particle.vy *= 0.984;
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 14;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius * (0.6 + alpha), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPopups(dt) {
        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
            continue;
          }
          popup.y -= dt * 26;
          const alpha = clamp(popup.life / 1.15, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.font = "700 16px Trebuchet MS, Segoe UI, sans-serif";
          ctx.textAlign = "center";
          ctx.fillStyle = popup.color;
          ctx.shadowColor = popup.color;
          ctx.shadowBlur = 12;
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        }
      }

      function drawHUD(timeSec) {
        const panelAlpha = state.mode === "menu" ? 0.7 : 0.82;
        ctx.save();
        ctx.globalAlpha = panelAlpha;
        ctx.fillStyle = COLORS.panel;
        ctx.strokeStyle = COLORS.panelEdge;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(28, 22, 328, 118, 22);
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.fillStyle = COLORS.text;
        ctx.font = "800 24px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("Moon Greenhouse: Echo Loom", 48, 52);
        ctx.fillStyle = COLORS.textDim;
        ctx.font = "600 13px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("월광 온실의 결절을 잔상 실로 동시에 지탱하세요.", 48, 75);

        const coreStatus = [
          { label: "북문양", active: state.connections.north, color: COLORS.lineNorth },
          { label: "남문양", active: state.connections.south, color: COLORS.lineSouth },
          { label: "왕관", active: state.connections.crown, color: COLORS.lineFinal },
        ];
        coreStatus.forEach((entry, index) => {
          const x = 48 + index * 92;
          const y = 104;
          ctx.fillStyle = entry.active ? entry.color : "rgba(211, 239, 244, 0.18)";
          ctx.shadowColor = entry.active ? entry.color : "transparent";
          ctx.shadowBlur = entry.active ? 14 : 0;
          ctx.beginPath();
          ctx.arc(x, y, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = COLORS.textDim;
          ctx.font = "700 12px Trebuchet MS, Segoe UI, sans-serif";
          ctx.fillText(entry.label, x + 16, y + 4);
        });
        ctx.restore();

        const heatBarX = 706;
        const heatBarY = 28;
        const heatBarW = 212;
        const heatColor =
          state.heat < 0.58
            ? COLORS.heatCool
            : state.heat < 0.82
              ? COLORS.heatWarn
              : COLORS.heatHot;

        ctx.save();
        ctx.fillStyle = COLORS.panel;
        ctx.strokeStyle = COLORS.panelEdge;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(676, 22, 250, 118, 22);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = COLORS.text;
        ctx.font = "800 15px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("온실 과열", heatBarX, heatBarY);
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.beginPath();
        ctx.roundRect(heatBarX, heatBarY + 10, heatBarW, 14, 7);
        ctx.fill();
        const heatGradient = ctx.createLinearGradient(heatBarX, 0, heatBarX + heatBarW, 0);
        heatGradient.addColorStop(0, COLORS.heatCool);
        heatGradient.addColorStop(0.62, COLORS.heatWarn);
        heatGradient.addColorStop(1, COLORS.heatHot);
        ctx.fillStyle = heatGradient;
        ctx.beginPath();
        ctx.roundRect(heatBarX, heatBarY + 10, heatBarW * clamp(state.heat, 0, 1), 14, 7);
        ctx.fill();
        ctx.strokeStyle = heatColor;
        ctx.globalAlpha = state.heat > 0.8 ? 0.65 + Math.sin(timeSec * 8) * 0.12 : 0.2;
        ctx.beginPath();
        ctx.roundRect(heatBarX - 2, heatBarY + 8, heatBarW + 4, 18, 9);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.fillStyle = COLORS.textDim;
        ctx.font = "700 12px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(state.heat > 0.72 ? "잠깐 손을 떼어 식히세요" : "짧게 쉬면 급속 냉각", heatBarX, heatBarY + 42);

        [
          { id: "north", label: "북 잔상", color: COLORS.lineNorth, x: 706, y: 96 },
          { id: "south", label: "남 잔상", color: COLORS.lineSouth, x: 812, y: 96 },
        ].forEach((entry) => {
          const echo = state.echoes[entry.id];
          const ratio = echo.active ? clamp(echo.time / ECHO_DURATION, 0, 1) : 0;
          ctx.fillStyle = "rgba(255,255,255,0.12)";
          ctx.beginPath();
          ctx.roundRect(entry.x, entry.y, 84, 12, 6);
          ctx.fill();
          if (ratio > 0) {
            ctx.fillStyle = entry.color;
            ctx.shadowColor = entry.color;
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.roundRect(entry.x, entry.y, 84 * ratio, 12, 6);
            ctx.fill();
            ctx.shadowBlur = 0;
          }
          ctx.fillStyle = COLORS.textDim;
          ctx.font = "700 11px Trebuchet MS, Segoe UI, sans-serif";
          ctx.fillText(entry.label, entry.x, entry.y - 6);
          ctx.textAlign = "right";
          ctx.fillText(ratio > 0 ? `${echo.time.toFixed(1)}s` : "--", entry.x + 84, entry.y - 6);
          ctx.textAlign = "left";
        });
        ctx.restore();

        ctx.save();
        const promptAlpha = 0.78 + state.hintPulse * 0.18;
        ctx.globalAlpha = promptAlpha;
        ctx.fillStyle = "rgba(7, 23, 33, 0.5)";
        ctx.strokeStyle = "rgba(175, 240, 255, 0.12)";
        ctx.beginPath();
        ctx.roundRect(242, 478, 476, 38, 19);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = COLORS.textDim;
        ctx.font = "700 13px Trebuchet MS, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(state.prompt, VIEW.width * 0.5, 502);
        ctx.restore();
      }

      function drawMenuOverlay() {
        const alpha = state.mode === "menu" ? 1 : 0;
        if (!alpha) {
          return;
        }
        ctx.save();
        ctx.globalAlpha = alpha;
        const overlay = ctx.createLinearGradient(0, 0, VIEW.width, VIEW.height);
        overlay.addColorStop(0, "rgba(4, 16, 26, 0.62)");
        overlay.addColorStop(1, "rgba(4, 16, 26, 0.18)");
        ctx.fillStyle = overlay;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(8, 22, 32, 0.76)";
        ctx.strokeStyle = "rgba(176, 240, 255, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(58, 82, 428, 286, 28);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = COLORS.text;
        ctx.font = "800 36px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("Moon Greenhouse", 92, 126);
        ctx.font = "800 34px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("Echo Loom", 92, 162);

        ctx.fillStyle = COLORS.textDim;
        ctx.font = "700 15px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(state.note, 92, 196);

        const infoLines = [
          "1. 루트에서 밸브까지 드래그 후 짧게 홀드해 3초 잔상을 기록",
          "2. 열린 문 사이로 북/남 코어를 빠르게 연결",
          "3. 두 잔상이 살아 있을 때 Bloom Crown까지 잇기",
          "식히기: 손을 잠깐 떼면 과열이 빠르게 내려갑니다.",
        ];
        infoLines.forEach((line, index) => {
          ctx.fillStyle = index < 3 ? COLORS.text : COLORS.heatWarn;
          ctx.font = index < 3 ? "700 15px Trebuchet MS, Segoe UI, sans-serif" : "800 14px Trebuchet MS, Segoe UI, sans-serif";
          ctx.fillText(line, 92, 236 + index * 30);
        });

        ctx.fillStyle = "rgba(119, 245, 255, 0.16)";
        ctx.beginPath();
        ctx.roundRect(92, 332, 240, 28, 14);
        ctx.fill();
        ctx.fillStyle = COLORS.text;
        ctx.font = "800 14px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText("터치, 드래그, 홀드 또는 Enter로 시작", 112, 351);
        ctx.restore();
      }

      function drawResultOverlay(kind) {
        if (state.mode !== kind) {
          return;
        }
        const success = kind === "cleared";
        const accent = success ? COLORS.success : COLORS.danger;
        ctx.save();
        ctx.fillStyle = success ? "rgba(5, 28, 22, 0.72)" : "rgba(32, 8, 12, 0.7)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = success ? "rgba(10, 34, 25, 0.88)" : "rgba(37, 10, 16, 0.88)";
        ctx.strokeStyle = success ? "rgba(183, 255, 214, 0.22)" : "rgba(255, 155, 155, 0.22)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(252, 146, 456, 240, 28);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = accent;
        ctx.font = "800 34px Trebuchet MS, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(success ? "GREENHOUSE STABLE" : "OVERHEAT / SNAP", VIEW.width * 0.5, 198);
        ctx.fillStyle = COLORS.text;
        ctx.font = "800 24px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(state.resultText, VIEW.width * 0.5, 236);
        ctx.fillStyle = COLORS.textDim;
        ctx.font = "700 15px Trebuchet MS, Segoe UI, sans-serif";
        ctx.fillText(
          success
            ? `${state.lastRunTime.toFixed(1)}초 만에 세 문양을 동시 점등했습니다.`
            : state.resultReason === "overheat"
              ? "열이 폭주했습니다. 짧은 냉각 템포를 더 섞어 보세요."
              : "밸브 홀드나 연결 드래그를 끝까지 유지해야 합니다.",
          VIEW.width * 0.5,
          276
        );
        ctx.fillText("터치 또는 Enter로 바로 다시 시도", VIEW.width * 0.5, 334);
        ctx.textAlign = "left";
        ctx.restore();
      }

      function drawScene(dt) {
        const shakeX =
          state.screenShake > 0 ? (Math.random() - 0.5) * state.screenShake : 0;
        const shakeY =
          state.screenShake > 0 ? (Math.random() - 0.5) * state.screenShake : 0;
        const timeSec = state.elapsed;

        ctx.save();
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawAmbientBackdrop(timeSec);
        ctx.translate(shakeX, shakeY);

        drawStaticLanes(timeSec);
        drawGateBridges(timeSec);
        drawPointerWeave(timeSec);
        Object.values(NODES).forEach((node) => drawNode(node, timeSec));
        drawBursts(dt);
        drawPopups(dt);
        ctx.restore();

        if (state.lineSnapFlash > 0) {
          ctx.save();
          ctx.globalAlpha = state.lineSnapFlash * 0.18;
          ctx.fillStyle = COLORS.danger;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.restore();
        }

        if (state.clearFlash > 0) {
          ctx.save();
          ctx.globalAlpha = state.clearFlash * 0.16;
          ctx.fillStyle = COLORS.success;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.restore();
        }

        if (state.failureFlash > 0) {
          ctx.save();
          ctx.globalAlpha = state.failureFlash * 0.14;
          ctx.fillStyle = COLORS.danger;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.restore();
        }

        drawHUD(timeSec);
        drawMenuOverlay();
        drawResultOverlay("failed");
        drawResultOverlay("cleared");
      }

      function advanceEchoes(dt) {
        ["north", "south"].forEach((echoId) => {
          const echo = state.echoes[echoId];
          echo.pulse = Math.max(0, echo.pulse - dt * 2.5);
          if (!echo.active) {
            return;
          }
          echo.time -= dt;
          if (echo.time <= 0) {
            echo.time = 0;
            echo.active = false;
            state.lineSnapFlash = 1;
            failStage("echo_snap", "잔상 선이 끊어졌습니다.");
          }
        });
      }

      function updatePointerHold(dt) {
        if (!state.pointer.active || !state.pointer.startNodeId || state.mode !== "running") {
          return;
        }

        const startNode = getNode(state.pointer.startNodeId);
        const hoverNode = getHoverNode(state.pointer.x, state.pointer.y);
        state.pointer.targetNodeId = null;
        state.pointer.pathType = null;

        if (!hoverNode || hoverNode.id === startNode.id) {
          state.pointer.holdTime = 0;
          return;
        }

        const pathInfo = identifyPath(startNode.id, hoverNode.id);
        if (!pathInfo) {
          state.pointer.holdTime = 0;
          return;
        }

        state.pointer.targetNodeId = hoverNode.id;
        state.pointer.pathType = pathInfo.type;

        if (pathInfo.type === "record") {
          state.pointer.holdTime += dt;
          if (state.pointer.holdTime >= RECORD_TIME) {
            refreshEcho(pathInfo.echoId);
            addPopup(
              pathInfo.echoId === "north" ? "북 잔상 기록" : "남 잔상 기록",
              hoverNode.x,
              hoverNode.y - 30,
              pathInfo.echoId === "north" ? COLORS.lineNorth : COLORS.lineSouth
            );
            addBurst(
              hoverNode.x,
              hoverNode.y,
              pathInfo.echoId === "north" ? COLORS.lineNorth : COLORS.lineSouth,
              22,
              190
            );
            setPrompt(
              pathInfo.echoId === "north"
                ? "북문이 열렸습니다. 위 코어를 잇거나 남쪽 잔상을 이어서 기록하세요."
                : "남문이 열렸습니다. 아래 코어를 잇거나 북쪽 잔상을 이어서 기록하세요."
            );
            state.pointer.active = false;
            state.pointer.completed = true;
            state.pointer.startNodeId = null;
            state.pointer.targetNodeId = null;
            state.pointer.holdTime = 0;
          }
          return;
        }

        completeConnection(pathInfo.coreId);
        state.pointer.active = false;
        state.pointer.completed = true;
        state.pointer.startNodeId = null;
        state.pointer.targetNodeId = null;
        state.pointer.holdTime = 0;
      }

      function updateHeat(dt) {
        const pointerHeating = state.pointer.active ? 0.1 : 0;
        const hoverHeating =
          state.pointer.active && state.pointer.pathType === "record" && state.pointer.targetNodeId
            ? 0.18
            : 0;
        const cooling = state.pointer.active ? 0.03 : state.heat > 0.7 ? 0.32 : 0.22;
        state.heat = clamp(state.heat + pointerHeating * dt + hoverHeating * dt - cooling * dt, 0, 1.18);
        if (state.heat >= HEAT_FAILURE) {
          failStage("overheat", "과열 게이지가 폭주했습니다.");
        }
      }

      function updateState(dt) {
        state.hintPulse = Math.max(0, state.hintPulse - dt * 2.2);
        state.actionGlow = Math.max(0, state.actionGlow - dt * 2.8);
        state.screenShake = Math.max(0, state.screenShake - dt * 32);
        state.lineSnapFlash = Math.max(0, state.lineSnapFlash - dt * 2.3);
        state.clearFlash = Math.max(0, state.clearFlash - dt * 1.4);
        state.failureFlash = Math.max(0, state.failureFlash - dt * 1.8);

        if (state.mode === "running") {
          state.elapsed += dt;
          advanceEchoes(dt);
          if (state.mode !== "running") {
            return;
          }
          updatePointerHold(dt);
          updateHeat(dt);
        }
      }

      function gameLoop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = clamp((timestamp - lastTimestamp) / 1000, 0, MAX_DT);
        lastTimestamp = timestamp;
        updateState(dt);
        drawScene(dt);
        animationFrame = window.requestAnimationFrame(gameLoop);
      }

      function getPointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function startInteraction(event) {
        const point = getPointerPosition(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;

        if (state.mode === "menu") {
          startStage();
          return;
        }

        if (state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }

        const node = getHoverNode(point.x, point.y);
        if (!node || !canStartFrom(node.id)) {
          return;
        }

        state.pointer.active = true;
        state.pointer.id = event.pointerId ?? "mouse";
        state.pointer.startNodeId = node.id;
        state.pointer.targetNodeId = null;
        state.pointer.pathType = null;
        state.pointer.holdTime = 0;
        state.pointer.completed = false;
        canvas.setPointerCapture?.(event.pointerId);
      }

      function moveInteraction(event) {
        const point = getPointerPosition(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
      }

      function endInteraction(event, cancelled = false) {
        if (!state.pointer.active) {
          return;
        }
        const releasedWithoutCompletion = !state.pointer.completed;
        state.pointer.active = false;
        state.pointer.id = null;
        state.pointer.startNodeId = null;
        state.pointer.targetNodeId = null;
        state.pointer.pathType = null;
        state.pointer.holdTime = 0;
        state.pointer.completed = false;
        if (releasedWithoutCompletion && state.mode === "running") {
          state.lineSnapFlash = 1;
          failStage(
            cancelled ? "pointer_cancel" : "line_break",
            "잔상 선이 끊어졌습니다."
          );
        }
        canvas.releasePointerCapture?.(event.pointerId);
      }

      canvas.addEventListener("pointerdown", (event) => {
        moveInteraction(event);
        startInteraction(event);
      });
      canvas.addEventListener("pointermove", moveInteraction);
      canvas.addEventListener("pointerup", (event) => {
        moveInteraction(event);
        endInteraction(event, false);
      });
      canvas.addEventListener("pointercancel", (event) => endInteraction(event, true));
      canvas.addEventListener("pointerleave", (event) => {
        if (state.pointer.active && event.pointerType !== "mouse") {
          endInteraction(event, true);
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
          return;
        }
        if (event.key.toLowerCase() === "f") {
          if (document.fullscreenElement) {
            document.exitFullscreen?.();
          } else {
            canvas.requestFullscreen?.().catch(() => {});
          }
        }
      });

      window.render_game_to_text = function renderGameToText() {
        const payload = {
          mode: state.mode,
          coordinateSystem: "origin top-left, x right, y down",
          heat: Number(state.heat.toFixed(2)),
          echoes: {
            north: Number(state.echoes.north.time.toFixed(2)),
            south: Number(state.echoes.south.time.toFixed(2)),
          },
          connections: {
            north: state.connections.north,
            south: state.connections.south,
            crown: state.connections.crown,
          },
          prompt: state.prompt,
          pointer: state.pointer.active
            ? {
                from: state.pointer.startNodeId,
                target: state.pointer.targetNodeId,
                hold: Number(state.pointer.holdTime.toFixed(2)),
                x: Number(state.pointer.x.toFixed(1)),
                y: Number(state.pointer.y.toFixed(1)),
              }
            : null,
          availableFromRoot: getAvailableTargets("root"),
        };
        return JSON.stringify(payload);
      };

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          updateState(FIXED_DT);
        }
        drawScene(FIXED_DT);
      };

      window.relayStageMeta = {
        id: "moon-greenhouse-echo-weaving-heat",
        title: "Moon Greenhouse: Echo Loom",
        creator: "jungcollin",
        genre: "Echo puzzler / 과열 관리",
        clearCondition: "과열을 폭주시키지 않고 모든 코어 문양을 연결하면 클리어",
        failCondition: "과열 게이지가 폭주하거나 잔상 선이 끊기면 즉시 실패",
        controls:
          "마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
      };

      window.relayStageResult = {
        status: "running",
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.connections.north = true;
          state.connections.south = true;
          state.connections.crown = true;
          state.echoes.north.active = true;
          state.echoes.north.time = 1.8;
          state.echoes.south.active = true;
          state.echoes.south.time = 1.8;
          clearStage();
          drawScene(FIXED_DT);
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("debug_fail", "잔상 선이 끊어졌습니다.");
          drawScene(FIXED_DT);
        },
      };

      resetRuntimeState();
      reportReadyToHost();
      drawScene(FIXED_DT);
      animationFrame = window.requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
