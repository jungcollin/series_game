<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>산호 정원</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Georgia", "Noto Serif KR", serif;
        background: #e8ddd0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 180, 160, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 90, 80, 0.92);
        color: #f0ece0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #d0e8e4; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(80, 160, 140, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">산호 정원. 산호를 심어 오염 파도를 막으세요. 마우스 클릭 또는 화면 터치로 산호를 배치합니다. 모바일에서는 화면 터치만으로 플레이할 수 있습니다. 오염 파도를 버텨내면 클리어. 산호초가 완전히 침식되거나 오염이 중심에 도달하면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="산호 정원" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "biomech-theater-debt-auction-collapse",
        title: "산호 정원",
        description: "산호를 심어 오염 파도를 막으세요.",
        creator: "jungcollin",
        genre: "Placement defense",
        clearCondition: "오염 파도를 버텨내면 클리어",
        failCondition: "산호초 침식 또는 오염이 중심 도달 시 실패",
        controls: "터치 또는 클릭으로 산호 배치, 모바일에서는 화면 터치만으로 플레이 가능",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        ocean: "#b8e0d8",
        oceanDeep: "#88c8bc",
        sand: "#e8d8c0",
        sandDark: "#d0c0a0",
        coral: "#e07888",
        coralDark: "#c06070",
        coralLight: "#f0a0a8",
        teal: "#48a898",
        tealLight: "#78c8b8",
        pollution: "#605848",
        pollutionWave: "rgba(80, 72, 56, 0.6)",
        text: "#3a4a48",
        textDim: "rgba(58, 74, 72, 0.5)",
        white: "#f0ece4",
      };

      // --- State ---
      const DURATION = 40;
      const SURVIVE_TIME = 35;
      const CORAL_COST_TIME = 2;
      const MAX_CORALS = 24;
      const ERODE_SPEED_BASE = 30;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      // Reef grid - the erosion line moves from left
      let erosionX = 0;
      let corals = [];
      let pollutionWaves = [];
      let particles = [];
      let bubbles = [];
      let waveTime = 0;
      let coralEnergy = 5;
      let pollutionReach = 0; // how far pollution has penetrated right

      // Sand floor Y
      const SAND_Y = H - 80;
      const REEF_LEFT = 80;
      const REEF_RIGHT = W - 80;
      const REEF_CENTER = CX;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawning ---
      function spawnPollutionWave() {
        const y = rand(80, SAND_Y - 40);
        const speed = lerp(40, 80, progress()) + rand(-10, 10);
        const size = rand(20, 40);
        pollutionWaves.push({
          x: -size, y,
          speed, size,
          hp: 1 + Math.floor(progress() * 2),
          alpha: 0,
        });
      }

      function spawnBubble(x, y) {
        if (reducedMotion) return;
        bubbles.push({
          x: x + rand(-10, 10), y,
          vy: rand(-30, -60),
          size: rand(2, 5),
          life: 1,
        });
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; erosionX = 0; pollutionReach = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        corals = []; pollutionWaves = []; particles = []; bubbles = [];
        coralEnergy = 5; waveTime = 0;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";

        // Pre-place a few starter corals
        for (let i = 0; i < 3; i++) {
          placeCoral(REEF_CENTER + rand(-80, 80), SAND_Y - rand(20, 100));
        }
      }

      function placeCoral(x, y) {
        if (corals.length >= MAX_CORALS) return false;
        // Don't place too close to existing coral
        for (const c of corals) {
          if (dist(c.x, c.y, x, y) < 30) return false;
        }
        // Must be in reef zone
        if (x < REEF_LEFT + 30 || x > REEF_RIGHT - 30 || y < 60 || y > SAND_Y - 10) return false;

        const type = Math.floor(rand(0, 3));
        corals.push({
          x, y, type,
          hp: 3,
          size: rand(14, 22),
          sway: rand(0, Math.PI * 2),
          growth: 0,
        });
        spawnBubble(x, y);
        return true;
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        waveTime += dt;

        // Energy regeneration
        coralEnergy = clamp(coralEnergy + dt * 0.8, 0, 8);

        // Spawn pollution waves
        const waveInterval = lerp(3, 1, progress());
        if (Math.random() < dt / waveInterval) {
          spawnPollutionWave();
        }

        // Update pollution waves
        for (let i = pollutionWaves.length - 1; i >= 0; i--) {
          const pw = pollutionWaves[i];
          pw.alpha = clamp(pw.alpha + dt * 3, 0, 0.8);
          pw.x += pw.speed * dt;

          // Check coral collisions
          for (let j = corals.length - 1; j >= 0; j--) {
            const c = corals[j];
            if (dist(pw.x, pw.y, c.x, c.y) < pw.size + c.size) {
              pw.hp--;
              c.hp--;
              spawnBubble(c.x, c.y);
              if (c.hp <= 0) {
                // Coral destroyed
                spawnParticles(c.x, c.y, reducedMotion ? 3 : 8, COL.coralDark);
                corals.splice(j, 1);
              }
              if (pw.hp <= 0) {
                spawnParticles(pw.x, pw.y, reducedMotion ? 2 : 5, COL.pollution);
                pollutionWaves.splice(i, 1);
                break;
              }
            }
          }

          // Track how far pollution reaches
          if (pw.hp > 0 && pw.x > pollutionReach) {
            pollutionReach = pw.x;
          }

          // Off-screen right
          if (pw.x > W + 40) {
            pollutionWaves.splice(i, 1);
          }
        }

        // Erosion from left
        erosionX = lerp(0, REEF_LEFT + 60, progress());

        // Kill corals in eroded zone
        for (let i = corals.length - 1; i >= 0; i--) {
          if (corals[i].x < erosionX) {
            spawnParticles(corals[i].x, corals[i].y, 4, COL.sandDark);
            corals.splice(i, 1);
          }
        }

        // Coral growth animation
        for (const c of corals) {
          c.growth = clamp(c.growth + dt * 2, 0, 1);
          c.sway += dt * 1.5;
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.94; p.vy *= 0.94;
          p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Bubbles
        for (let i = bubbles.length - 1; i >= 0; i--) {
          const b = bubbles[i];
          b.y += b.vy * dt;
          b.x += Math.sin(waveTime * 3 + i) * 8 * dt;
          b.life -= dt * 1.5;
          if (b.life <= 0) bubbles.splice(i, 1);
        }

        // Shake/flash
        shake *= 0.88;
        if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        // Win/lose
        if (elapsed >= SURVIVE_TIME && corals.length > 0) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (corals.length === 0 && elapsed > 3) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("산호초 전멸");
        } else if (pollutionReach > REEF_RIGHT) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("오염 도달");
        }
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2);
          const spd = rand(20, 80);
          particles.push({
            x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            life: 1, color, size: rand(2, 5),
          });
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Ocean gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#a0d8d0");
        grad.addColorStop(0.6, COL.ocean);
        grad.addColorStop(1, COL.oceanDeep);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Light rays
        drawLightRays();

        // Sand floor
        drawSandFloor();

        // Erosion zone
        drawErosion();

        // Corals
        drawCorals();

        // Pollution waves
        drawPollutionWaves();

        // Bubbles
        drawBubbles();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        // Flash
        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(80, 72, 56, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawLightRays() {
        if (reducedMotion) return;
        ctx.save();
        ctx.globalAlpha = 0.06;
        for (let i = 0; i < 5; i++) {
          const rx = 150 + i * 180 + Math.sin(waveTime * 0.3 + i) * 20;
          ctx.fillStyle = "#f0f8f0";
          ctx.beginPath();
          ctx.moveTo(rx - 15, 0);
          ctx.lineTo(rx + 15, 0);
          ctx.lineTo(rx + 40, H);
          ctx.lineTo(rx - 40, H);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      function drawSandFloor() {
        ctx.fillStyle = COL.sand;
        ctx.beginPath();
        ctx.moveTo(0, SAND_Y);
        for (let x = 0; x <= W; x += 20) {
          const y = SAND_Y + Math.sin(x * 0.03 + waveTime * 0.5) * 4;
          ctx.lineTo(x, y);
        }
        ctx.lineTo(W, H); ctx.lineTo(0, H);
        ctx.closePath();
        ctx.fill();

        // Sand detail
        ctx.fillStyle = COL.sandDark;
        for (let i = 0; i < 15; i++) {
          const px = (i * 73 + 17) % W;
          const py = SAND_Y + 10 + (i * 31) % 50;
          ctx.beginPath();
          ctx.arc(px, py, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawErosion() {
        if (erosionX < 2) return;
        // Eroded zone from left
        ctx.fillStyle = "rgba(80, 72, 56, 0.3)";
        ctx.fillRect(0, 0, erosionX, H);

        // Edge gradient
        const eGrad = ctx.createLinearGradient(erosionX - 30, 0, erosionX + 10, 0);
        eGrad.addColorStop(0, "rgba(80, 72, 56, 0.3)");
        eGrad.addColorStop(1, "rgba(80, 72, 56, 0)");
        ctx.fillStyle = eGrad;
        ctx.fillRect(erosionX - 30, 0, 40, H);
      }

      function drawCorals() {
        for (const c of corals) {
          const scale = c.growth;
          const swayOff = Math.sin(c.sway) * 3;
          ctx.save();
          ctx.translate(c.x + swayOff, c.y);
          ctx.scale(scale, scale);

          // Health-based color
          const healthRatio = c.hp / 3;
          const r = Math.round(lerp(200, 224, healthRatio));
          const g = Math.round(lerp(140, 120, healthRatio));
          const b = Math.round(lerp(140, 136, healthRatio));
          const color = `rgb(${r},${g},${b})`;

          if (c.type === 0) {
            // Branch coral
            drawBranchCoral(c.size, color);
          } else if (c.type === 1) {
            // Fan coral
            drawFanCoral(c.size, color);
          } else {
            // Round coral
            drawRoundCoral(c.size, color);
          }
          ctx.restore();
        }
      }

      function drawBranchCoral(size, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        // Main stem
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(0, -size);
        ctx.stroke();
        // Branches
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.4); ctx.lineTo(-size * 0.5, -size * 0.8);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.6); ctx.lineTo(size * 0.4, -size);
        ctx.stroke();
        // Tips
        ctx.fillStyle = COL.coralLight;
        ctx.beginPath(); ctx.arc(0, -size, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(-size * 0.5, -size * 0.8, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(size * 0.4, -size, 2.5, 0, Math.PI * 2); ctx.fill();
      }

      function drawFanCoral(size, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(0, -size * 0.5, size * 0.6, -Math.PI * 0.8, -Math.PI * 0.2);
        ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = COL.coralDark;
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      function drawRoundCoral(size, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(0, -size * 0.4, size * 0.5, 0, Math.PI * 2);
        ctx.fill();
        // Bumps
        for (let i = 0; i < 4; i++) {
          const a = (i / 4) * Math.PI * 2;
          ctx.beginPath();
          ctx.arc(Math.cos(a) * size * 0.35, -size * 0.4 + Math.sin(a) * size * 0.35, size * 0.2, 0, Math.PI * 2);
          ctx.fillStyle = COL.coralLight;
          ctx.fill();
        }
      }

      function drawPollutionWaves() {
        for (const pw of pollutionWaves) {
          ctx.globalAlpha = pw.alpha;
          ctx.fillStyle = COL.pollution;
          ctx.beginPath();
          ctx.arc(pw.x, pw.y, pw.size, 0, Math.PI * 2);
          ctx.fill();
          // Murky trail
          ctx.fillStyle = COL.pollutionWave;
          ctx.beginPath();
          ctx.ellipse(pw.x - pw.size, pw.y, pw.size * 0.8, pw.size * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawBubbles() {
        for (const b of bubbles) {
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.size * b.life, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(200, 230, 220, ${b.life * 0.5})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px Georgia, serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`산호: ${corals.length}`, 24, 20);

        ctx.textAlign = "right";
        const timeLeft = Math.max(0, SURVIVE_TIME - elapsed);
        ctx.fillText(`${Math.ceil(timeLeft)}`, W - 24, 20);

        // Timer bar
        const barW = W - 48, barX = 24, barY = 44;
        ctx.fillStyle = "rgba(58, 74, 72, 0.15)";
        ctx.fillRect(barX, barY, barW, 2);
        ctx.fillStyle = COL.teal;
        ctx.fillRect(barX, barY, barW * clamp(elapsed / SURVIVE_TIME, 0, 1), 2);

        // Energy dots
        const dotY = H - 24;
        const energyDots = Math.floor(coralEnergy);
        for (let i = 0; i < 8; i++) {
          const dotX = CX - 7 * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
          ctx.fillStyle = i < energyDots ? COL.coral : "rgba(58, 74, 72, 0.15)";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(240, 248, 244, 0.94)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();
        ctx.fillStyle = accent || COL.teal;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);
        ctx.fillStyle = COL.text;
        ctx.font = `bold 22px Georgia, serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);
        ctx.font = `400 14px Georgia, serif`;
        ctx.fillStyle = COL.textDim;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }
        ctx.fillStyle = "rgba(58, 74, 72, 0.3)";
        ctx.font = `400 13px Georgia, serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(208, 232, 228, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("산호 정원", [
          "산호를 심어 오염 파도를 막으세요",
          "",
          "조작: 탭하여 산호 배치",
          "클리어: 오염 파도를 버텨내기",
          "실패: 산호 전멸 또는 오염 도달",
        ], COL.teal);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(208, 232, 228, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("정원 수호", [
            `${Math.ceil(elapsed)}초 동안 버텨냈습니다`,
            `남은 산호: ${corals.length}개`,
          ], COL.teal);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(80, 72, 56, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("정원 침식", [
          corals.length === 0 ? "모든 산호가 파괴되었습니다" : "오염이 중심에 도달했습니다",
          `남은 산호: ${corals.length}개`,
        ], COL.pollution);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        if (coralEnergy >= CORAL_COST_TIME) {
          if (placeCoral(p.x, p.y)) {
            coralEnergy -= CORAL_COST_TIME;
          }
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        // No drag action for this game
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          corals: corals.length, erosionX: +erosionX.toFixed(0),
          pollutionReach: +pollutionReach.toFixed(0),
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          elapsed = SURVIVE_TIME;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          corals = [];
          elapsed = 5;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
