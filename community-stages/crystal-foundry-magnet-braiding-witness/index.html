<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Magnet Braid</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Pretendard", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #18314f 0%, #09111d 42%, #03060c 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(131, 206, 255, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(6, 13, 24, 0.92);
        color: #f7fbff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: min(100vw, calc(100vh * 16 / 9));
        height: min(100vh, calc(100vw * 9 / 16 + 2px));
        max-width: 100vw;
        max-height: 100vh;
        background:
          radial-gradient(circle at 50% 18%, rgba(104, 217, 255, 0.12), transparent 34%),
          linear-gradient(180deg, #13253a 0%, #09111d 45%, #05080f 100%);
        touch-action: none;
        border: 1px solid rgba(220, 245, 255, 0.12);
        box-shadow:
          0 28px 60px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(222, 245, 255, 0.06) inset;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(211, 245, 255, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Magnet Braid. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 이며, 메뉴와 실행 화면 모두 모바일 폭에서 가로로 넘치지 않게 유지됩니다.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Crystal Foundry: Magnet Braid" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const LONG_PRESS_MS = 430;
      const TOTAL_ORBS = 5;
      const ORB_SEQUENCE = [1, -1, 1, -1, 1];
      const relayContext =
        window.RelayRuntime?.readContext("crystal-foundry-magnet-braiding-witness") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const STAGE_COPY = {
        title: "Crystal Foundry: Magnet Braid",
        description:
          "N극과 S극을 번갈아 꼬아 수정 구슬의 길을 짜고, 시선 파동이 번질 때는 들키지 않도록 흐름을 숨기는 자력 퍼즐 러시",
        creator: "jungcollin",
        genre: "Magnetic routing / 목격 게이지",
        controls:
          "포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition:
          "목격 게이지를 낮게 유지한 채 에너지 구슬 5개를 다른 극 문에 모두 인도하면 클리어",
        failCondition:
          "목격 게이지가 끝까지 차거나 같은 극이 연속 충돌해 과열되면 실패",
      };

      const SOCKETS = [
        { id: "s0", x: 178, y: 168 },
        { id: "s1", x: 320, y: 146 },
        { id: "s2", x: 480, y: 134 },
        { id: "s3", x: 640, y: 146 },
        { id: "s4", x: 782, y: 168 },
        { id: "s5", x: 232, y: 360 },
        { id: "s6", x: 480, y: 330 },
        { id: "s7", x: 728, y: 360 },
      ];

      const PILLARS = [
        { x: 248, y: 126, w: 102, h: 284, glow: "rgba(110, 231, 255, 0.28)" },
        { x: 610, y: 126, w: 102, h: 284, glow: "rgba(243, 168, 255, 0.28)" },
      ];

      const SCANNERS = [
        {
          id: "north-left",
          x: 118,
          y: 52,
          baseAngle: 0.92,
          sweep: 0.38,
          spread: 0.3,
          phase: 0,
          tint: "rgba(129, 218, 255, 0.82)",
        },
        {
          id: "north-right",
          x: 842,
          y: 52,
          baseAngle: Math.PI - 0.92,
          sweep: 0.38,
          spread: 0.3,
          phase: 1.7,
          tint: "rgba(255, 177, 219, 0.82)",
        },
      ];

      const GATES = [
        { id: "north-gate", x: 158, y: 78, sign: 1, label: "N GATE" },
        { id: "south-gate", x: 802, y: 78, sign: -1, label: "S GATE" },
      ];

      const input = {
        pointer: {
          active: false,
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.5,
          startX: 0,
          startY: 0,
          pointerId: null,
          downAt: 0,
          nodeId: null,
          moved: false,
          longPressTriggered: false,
          movedNode: false,
        },
        keyboardSelectedIndex: 0,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        delivered: 0,
        witness: 12,
        witnessPeak: 12,
        heat: 0,
        orb: null,
        spawnTimer: 0.2,
        particles: [],
        popups: [],
        embers: createEmbers(),
        nodes: createNodes(),
        selectedNodeId: "braid-a",
        screenFlash: 0,
        screenShake: 0,
        statusMessage: "수정 노드를 엮어 첫 경로를 여세요.",
        statusTint: "#d6f3ff",
        failReason: "",
        scannerState: SCANNERS.map(() => ({ angle: 0, pulse: 0, visible: false })),
        lastVisibility: 0,
        foundryPulse: 0,
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - clamp(t, 0, 1), 3);
      }

      function roundRectPath(context, x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function angleDiff(a, b) {
        let diff = a - b;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return diff;
      }

      function getNodeById(nodeId) {
        return state.nodes.find((node) => node.id === nodeId) || null;
      }

      function getSocketByIndex(index) {
        return SOCKETS[index] || SOCKETS[0];
      }

      function polarityLabel(sign) {
        return sign > 0 ? "N" : "S";
      }

      function polarityColors(sign) {
        return sign > 0
          ? {
              core: "#ffb875",
              glow: "rgba(255, 165, 88, 0.78)",
              trail: "rgba(255, 196, 132, 0.6)",
              shadow: "rgba(255, 124, 54, 0.34)",
            }
          : {
              core: "#85f2ff",
              glow: "rgba(118, 226, 255, 0.78)",
              trail: "rgba(111, 226, 255, 0.62)",
              shadow: "rgba(51, 162, 224, 0.34)",
            };
      }

      function gateForOrb(sign) {
        return sign > 0 ? GATES[1] : GATES[0];
      }

      function wrongGateForOrb(sign) {
        return sign > 0 ? GATES[0] : GATES[1];
      }

      function createNodes() {
        const setup = [
          { id: "braid-a", socketIndex: 5, sign: 1, locked: false },
          { id: "braid-b", socketIndex: 1, sign: -1, locked: false },
          { id: "braid-c", socketIndex: 6, sign: 1, locked: true },
          { id: "braid-d", socketIndex: 3, sign: -1, locked: false },
        ];
        return setup.map((entry, index) => {
          const socket = getSocketByIndex(entry.socketIndex);
          return {
            id: entry.id,
            socketIndex: entry.socketIndex,
            x: socket.x,
            y: socket.y,
            radius: 24,
            sign: entry.sign,
            locked: entry.locked,
            pulse: index * 0.2,
            dragX: socket.x,
            dragY: socket.y,
            collisionCooldown: 0,
          };
        });
      }

      function createEmbers() {
        return Array.from({ length: 42 }, (_, index) => ({
          x: (index * 53) % VIEW.width,
          y: (index * 79) % VIEW.height,
          size: 1.5 + (index % 4),
          speed: 12 + (index % 7) * 4,
          drift: (index % 5) * 0.09,
        }));
      }

      function createOrb(index) {
        const sign = ORB_SEQUENCE[index % ORB_SEQUENCE.length];
        return {
          x: VIEW.width * 0.5 + (Math.random() - 0.5) * 24,
          y: 458,
          vx: (Math.random() - 0.5) * 26,
          vy: -74,
          radius: 16,
          sign,
          age: 0,
          trail: [],
          targetGateId: gateForOrb(sign).id,
          targetGateLabel: polarityLabel(gateForOrb(sign).sign),
          hiddenFrom: 0,
          visibleScanners: 0,
          stallTimer: 0,
        };
      }

      function resetStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.delivered = 0;
        state.witness = 12;
        state.witnessPeak = 12;
        state.heat = 0;
        state.orb = null;
        state.spawnTimer = 0.25;
        state.particles = [];
        state.popups = [];
        state.embers = createEmbers();
        state.nodes = createNodes();
        state.selectedNodeId = "braid-a";
        state.screenFlash = 0;
        state.screenShake = 0;
        state.statusMessage = "첫 자력 매듭을 열고 오른쪽 S 게이트로 흘려보내세요.";
        state.statusTint = "#d6f3ff";
        state.failReason = "";
        state.scannerState = SCANNERS.map(() => ({ angle: 0, pulse: 0, visible: false }));
        state.lastVisibility = 0;
        state.foundryPulse = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        emitBurst(VIEW.width * 0.5, 442, polarityColors(1).core, 18, 2.2, 110);
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function failStage(reason = "목격 게이지가 임계점에 도달했습니다.") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.failReason = reason;
        state.statusMessage = reason;
        state.statusTint = "#ffd3d0";
        state.screenShake = Math.max(state.screenShake, 14);
        state.screenFlash = Math.max(state.screenFlash, 0.28);
        window.relayStageResult.status = "failed";
        emitPopup(reason.includes("과열") ? "OVERHEAT" : "SPOTTED", VIEW.width * 0.5, 198, "#ffe1d2", 1.6, 0);
        emitBurst(state.orb ? state.orb.x : VIEW.width * 0.5, state.orb ? state.orb.y : 320, "#ffd4be", 28, 3.1, 180);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.statusMessage = "자력 결을 모두 봉합했습니다.";
        state.statusTint = "#dafdff";
        state.screenFlash = Math.max(state.screenFlash, 0.42);
        window.relayStageResult.status = "cleared";
        emitPopup("BRAID SEALED", VIEW.width * 0.5, 194, "#d9fbff", 2.1, 0);
        emitBurst(VIEW.width * 0.5, 174, "#b6f8ff", 42, 4.1, 220);
        reportClearedToHost();
      }

      function emitBurst(x, y, color, count, speedScale, sizeBase) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.4;
          const speed = (0.35 + Math.random() * 0.65) * speedScale * 60;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 24,
            life: 0.45 + Math.random() * 0.7,
            maxLife: 0.45 + Math.random() * 0.7,
            size: 4 + Math.random() * sizeBase * 0.04,
            color,
            alpha: 0.9,
          });
        }
      }

      function emitPopup(text, x, y, color, life, driftX) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life,
          maxLife: life,
          vx: driftX,
          vy: -28,
        });
      }

      function updateEmbers(dt) {
        const flow = 1 + state.delivered * 0.2;
        for (const ember of state.embers) {
          ember.y -= ember.speed * flow * dt;
          ember.x += Math.sin((state.elapsed + ember.drift) * 1.6) * 8 * dt;
          if (ember.y < -16) {
            ember.y = VIEW.height + 18;
            ember.x = Math.random() * VIEW.width;
          }
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
            continue;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.975;
          particle.vy = particle.vy * 0.975 + 18 * dt;
        }
      }

      function updatePopups(dt) {
        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
            continue;
          }
          popup.x += popup.vx * dt;
          popup.y += popup.vy * dt;
        }
      }

      function scannerAngle(scanner) {
        const intensity = 0.7 + state.delivered * 0.12;
        return (
          scanner.baseAngle +
          Math.sin(state.elapsed * intensity + scanner.phase) * scanner.sweep
        );
      }

      function scannerPulse(scanner) {
        const speed = 1.55 + state.delivered * 0.1;
        return 0.46 + Math.pow((Math.sin(state.elapsed * speed + scanner.phase) + 1) * 0.5, 1.4) * 0.54;
      }

      function pointInRect(x, y, rect) {
        return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
      }

      function segmentBlockedByPillar(ax, ay, bx, by, rect) {
        const steps = 20;
        for (let index = 0; index <= steps; index += 1) {
          const t = index / steps;
          const px = lerp(ax, bx, t);
          const py = lerp(ay, by, t);
          if (pointInRect(px, py, rect)) {
            return true;
          }
        }
        return false;
      }

      function scannerSeesOrb(scanner, orb) {
        const dx = orb.x - scanner.x;
        const dy = orb.y - scanner.y;
        const angle = Math.atan2(dy, dx);
        const beamAngle = scannerAngle(scanner);
        if (Math.abs(angleDiff(angle, beamAngle)) > scanner.spread) {
          return false;
        }
        for (const pillar of PILLARS) {
          if (segmentBlockedByPillar(scanner.x, scanner.y, orb.x, orb.y, pillar)) {
            return false;
          }
        }
        return true;
      }

      function updateScannerState() {
        state.lastVisibility = 0;
        if (!state.orb) {
          state.scannerState = SCANNERS.map((scanner) => ({
            angle: scannerAngle(scanner),
            pulse: scannerPulse(scanner),
            visible: false,
          }));
          return;
        }

        state.scannerState = SCANNERS.map((scanner) => {
          const pulse = scannerPulse(scanner);
          const visible = scannerSeesOrb(scanner, state.orb);
          if (visible) {
            state.lastVisibility += pulse;
          }
          return {
            angle: scannerAngle(scanner),
            pulse,
            visible,
          };
        });
        state.orb.visibleScanners = state.scannerState.filter((entry) => entry.visible).length;
        state.orb.hiddenFrom = state.scannerState.length - state.orb.visibleScanners;
      }

      function hitNode(x, y) {
        for (let index = state.nodes.length - 1; index >= 0; index -= 1) {
          const node = state.nodes[index];
          const dx = x - node.x;
          const dy = y - node.y;
          if (Math.hypot(dx, dy) <= node.radius + 10) {
            return node;
          }
        }
        return null;
      }

      function occupiedSocketIndices(exceptNodeId) {
        return new Set(
          state.nodes
            .filter((node) => node.id !== exceptNodeId)
            .map((node) => node.socketIndex)
        );
      }

      function snapNode(node) {
        const occupied = occupiedSocketIndices(node.id);
        let nearest = null;
        let nearestDistance = Number.POSITIVE_INFINITY;
        for (let index = 0; index < SOCKETS.length; index += 1) {
          if (occupied.has(index)) {
            continue;
          }
          const socket = SOCKETS[index];
          const distance = Math.hypot(socket.x - node.x, socket.y - node.y);
          if (distance < nearestDistance) {
            nearestDistance = distance;
            nearest = { index, socket };
          }
        }
        if (nearest && nearestDistance <= 92) {
          node.socketIndex = nearest.index;
        }
        const socket = getSocketByIndex(node.socketIndex);
        node.x = socket.x;
        node.y = socket.y;
      }

      function toggleNodePolarity(node) {
        node.sign *= -1;
        state.selectedNodeId = node.id;
        state.screenFlash = Math.max(state.screenFlash, 0.06);
        emitPopup(`${polarityLabel(node.sign)} FLIP`, node.x, node.y - 30, polarityColors(node.sign).core, 0.7, 0);
      }

      function toggleNodeLock(node) {
        node.locked = !node.locked;
        state.selectedNodeId = node.id;
        const label = node.locked ? "FIELD ANCHORED" : "FIELD RELEASED";
        state.statusMessage = node.locked
          ? "고정 노드는 힘이 세지지만 위치를 바꾸려면 다시 길게 눌러야 합니다."
          : "자장 고정을 풀었습니다. 다시 드래그해 새 결을 짜세요.";
        state.statusTint = node.locked ? "#dcfbff" : "#c4daff";
        emitPopup(label, node.x, node.y - 38, node.locked ? "#d8fbff" : "#c6d9ff", 0.9, 0);
      }

      function currentSelectedNode() {
        return getNodeById(state.selectedNodeId) || state.nodes[0] || null;
      }

      function handleNodeLongPress() {
        const pointer = input.pointer;
        if (!pointer.active || pointer.longPressTriggered || !pointer.nodeId) {
          return;
        }
        if (state.mode !== "running") {
          return;
        }
        const heldFor = performance.now() - pointer.downAt;
        const movedDistance = Math.hypot(pointer.x - pointer.startX, pointer.y - pointer.startY);
        if (movedDistance > 10) {
          return;
        }
        if (heldFor >= LONG_PRESS_MS) {
          const node = getNodeById(pointer.nodeId);
          if (node) {
            toggleNodeLock(node);
            pointer.longPressTriggered = true;
            state.screenFlash = Math.max(state.screenFlash, 0.08);
          }
        }
      }

      function pointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function beginRunFromOverlay() {
        resetStage();
      }

      function handlePointerDown(event) {
        const point = pointerPosition(event);
        input.pointer.active = true;
        input.pointer.x = point.x;
        input.pointer.y = point.y;
        input.pointer.startX = point.x;
        input.pointer.startY = point.y;
        input.pointer.pointerId = event.pointerId;
        input.pointer.downAt = performance.now();
        input.pointer.moved = false;
        input.pointer.longPressTriggered = false;
        input.pointer.movedNode = false;
        canvas.setPointerCapture?.(event.pointerId);
        canvas.focus();

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          beginRunFromOverlay();
          input.pointer.nodeId = null;
          event.preventDefault();
          return;
        }

        const node = hitNode(point.x, point.y);
        input.pointer.nodeId = node ? node.id : null;
        if (node) {
          state.selectedNodeId = node.id;
        }
        event.preventDefault();
      }

      function handlePointerMove(event) {
        const point = pointerPosition(event);
        input.pointer.x = point.x;
        input.pointer.y = point.y;
        if (!input.pointer.active || state.mode !== "running") {
          return;
        }
        const node = getNodeById(input.pointer.nodeId);
        if (!node || node.locked) {
          return;
        }
        const movedDistance = Math.hypot(point.x - input.pointer.startX, point.y - input.pointer.startY);
        if (movedDistance > 10) {
          input.pointer.moved = true;
          input.pointer.movedNode = true;
          node.x = clamp(point.x, 68, VIEW.width - 68);
          node.y = clamp(point.y, 118, VIEW.height - 96);
        }
      }

      function finishNodeInteraction() {
        const node = getNodeById(input.pointer.nodeId);
        if (!node) {
          return;
        }
        if (input.pointer.longPressTriggered) {
          return;
        }
        if (input.pointer.movedNode && !node.locked) {
          snapNode(node);
          emitPopup("BRAID SHIFT", node.x, node.y - 30, "#d8ecff", 0.7, 0);
          return;
        }
        toggleNodePolarity(node);
      }

      function clearPointerState(event) {
        if (event && input.pointer.pointerId !== null) {
          canvas.releasePointerCapture?.(input.pointer.pointerId);
        }
        input.pointer.active = false;
        input.pointer.nodeId = null;
        input.pointer.pointerId = null;
      }

      function handlePointerUp(event) {
        if (state.mode === "running") {
          finishNodeInteraction();
        }
        clearPointerState(event);
      }

      function handlePointerCancel(event) {
        const node = getNodeById(input.pointer.nodeId);
        if (node && input.pointer.movedNode && !node.locked) {
          snapNode(node);
        }
        clearPointerState(event);
      }

      function moveSelectedNode(step) {
        const selected = currentSelectedNode();
        if (!selected || selected.locked) {
          return;
        }
        const occupied = occupiedSocketIndices(selected.id);
        const available = SOCKETS.map((socket, index) => ({ socket, index })).filter(
          ({ index }) => !occupied.has(index)
        );
        if (!available.length) {
          return;
        }
        const currentIndex = available.findIndex((entry) => entry.index === selected.socketIndex);
        const next = available[(currentIndex + step + available.length) % available.length];
        selected.socketIndex = next.index;
        snapNode(selected);
      }

      function handleKeyDown(event) {
        if (event.key === "Enter") {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            beginRunFromOverlay();
          }
          event.preventDefault();
          return;
        }
        if (event.key.toLowerCase() === "f") {
          if (document.fullscreenElement) {
            document.exitFullscreen?.();
          } else {
            canvas.requestFullscreen?.().catch(() => {});
          }
          return;
        }
        if (state.mode !== "running") {
          return;
        }
        if (event.key === "Tab") {
          const node = currentSelectedNode();
          if (node) {
            toggleNodePolarity(node);
          }
          event.preventDefault();
          return;
        }
        if (event.key === " ") {
          const node = currentSelectedNode();
          if (node) {
            toggleNodeLock(node);
          }
          event.preventDefault();
          return;
        }
        if (event.key === "ArrowLeft") {
          moveSelectedNode(-1);
          event.preventDefault();
          return;
        }
        if (event.key === "ArrowRight") {
          moveSelectedNode(1);
          event.preventDefault();
          return;
        }
        if (/^[1-4]$/.test(event.key)) {
          const index = Number(event.key) - 1;
          const node = state.nodes[index];
          if (node) {
            state.selectedNodeId = node.id;
          }
          event.preventDefault();
        }
      }

      function applyNodeForce(node, orb, dt) {
        let dx = node.x - orb.x;
        let dy = node.y - orb.y;
        let distance = Math.hypot(dx, dy);
        if (distance < 1) {
          distance = 1;
        }
        const nx = dx / distance;
        const ny = dy / distance;
        const alignment = node.sign === orb.sign ? -1 : 1;
        const strengthBase = node.locked ? 210000 : 130000;
        const force = (alignment * strengthBase) / (distance * distance + 3200);
        orb.vx += nx * force * dt;
        orb.vy += ny * force * dt;

        if (node.collisionCooldown > 0) {
          return;
        }
        if (distance >= node.radius + orb.radius + 2) {
          return;
        }
        node.collisionCooldown = 0.24;
        const collisionColors = polarityColors(node.sign);
        const pushX = (orb.x - node.x) / distance;
        const pushY = (orb.y - node.y) / distance;
        orb.x = node.x + pushX * (node.radius + orb.radius + 2);
        orb.y = node.y + pushY * (node.radius + orb.radius + 2);
        orb.vx += pushX * (alignment < 0 ? 120 : 54);
        orb.vy += pushY * (alignment < 0 ? 120 : 54);
        state.screenShake = Math.max(state.screenShake, alignment < 0 ? 10 : 6);
        emitBurst(orb.x, orb.y, collisionColors.core, alignment < 0 ? 14 : 8, alignment < 0 ? 1.7 : 1.1, 72);

        if (alignment < 0) {
          state.heat = clamp(state.heat + 36, 0, 100);
          state.statusMessage = "같은 극 연속 충돌은 즉시 과열을 부릅니다.";
          state.statusTint = "#ffd2c2";
          emitPopup("OVERHEAT +", orb.x, orb.y - 22, "#ffd7c6", 0.72, 0);
          if (state.heat >= 100) {
            failStage("같은 극이 연속 충돌해 과열되었습니다.");
          }
        } else {
          state.heat = clamp(state.heat - 18, 0, 100);
          emitPopup("BRAID", orb.x, orb.y - 22, "#d7fbff", 0.6, 0);
        }
      }

      function collideGate(gate, orb, isCorrect) {
        const dx = orb.x - gate.x;
        const dy = orb.y - gate.y;
        const distance = Math.hypot(dx, dy);
        if (distance > 42 + orb.radius) {
          return false;
        }
        const colors = polarityColors(isCorrect ? orb.sign : gate.sign);
        emitBurst(gate.x, gate.y + 10, colors.core, isCorrect ? 20 : 14, isCorrect ? 2.5 : 1.8, 110);
        if (isCorrect) {
          state.delivered += 1;
          state.orb = null;
          state.spawnTimer = 0.52;
          state.witness = clamp(state.witness - 10, 0, 100);
          state.heat = clamp(state.heat - 12, 0, 100);
          state.statusMessage =
            state.delivered >= TOTAL_ORBS
              ? "마지막 도가니를 봉합합니다."
              : `${state.delivered}/${TOTAL_ORBS} 결 봉합. 다음 구슬이 더 빠르게 떠오릅니다.`;
          state.statusTint = "#ddfdff";
          state.screenFlash = Math.max(state.screenFlash, 0.16);
          emitPopup("DELIVERED", gate.x, gate.y + 34, "#e0fcff", 0.9, 0);
          if (state.delivered >= TOTAL_ORBS) {
            clearStage();
          }
        } else {
          state.heat = clamp(state.heat + 22, 0, 100);
          orb.vx += gate.x < VIEW.width * 0.5 ? 140 : -140;
          orb.vy += 80;
          emitPopup("WRONG POLE", gate.x, gate.y + 38, "#ffd8c8", 0.86, 0);
          if (state.heat >= 100) {
            failStage("같은 극이 연속 충돌해 과열되었습니다.");
          }
        }
        return true;
      }

      function updateOrb(dt) {
        if (!state.orb) {
          return;
        }

        const orb = state.orb;
        orb.age += dt;
        const targetGate = gateForOrb(orb.sign);
        const wrongGate = wrongGateForOrb(orb.sign);
        const tx = targetGate.x - orb.x;
        const ty = targetGate.y - orb.y;
        const tdist = Math.max(18, Math.hypot(tx, ty));
        const targetForce = 42 + state.delivered * 8;
        orb.vx += (tx / tdist) * targetForce * dt;
        orb.vy += (ty / tdist) * targetForce * dt - 18 * dt;

        for (const node of state.nodes) {
          applyNodeForce(node, orb, dt);
        }

        const speed = Math.hypot(orb.vx, orb.vy);
        if (speed < 22) {
          orb.stallTimer += dt;
        } else {
          orb.stallTimer = Math.max(0, orb.stallTimer - dt * 2);
        }
        if (orb.stallTimer > 1.2) {
          orb.vy -= 42 * dt;
          orb.vx += Math.sin(state.elapsed * 5.2) * 14 * dt;
        }

        const maxSpeed = 265 + state.delivered * 22;
        const nextSpeed = Math.hypot(orb.vx, orb.vy);
        if (nextSpeed > maxSpeed) {
          orb.vx = (orb.vx / nextSpeed) * maxSpeed;
          orb.vy = (orb.vy / nextSpeed) * maxSpeed;
        }
        orb.vx *= 0.992;
        orb.vy *= 0.992;

        orb.x += orb.vx * dt;
        orb.y += orb.vy * dt;

        const floor = 470;
        const leftWall = 42;
        const rightWall = VIEW.width - 42;
        const ceiling = 58;

        if (orb.x < leftWall) {
          orb.x = leftWall;
          orb.vx = Math.abs(orb.vx) * 0.75;
        }
        if (orb.x > rightWall) {
          orb.x = rightWall;
          orb.vx = -Math.abs(orb.vx) * 0.75;
        }
        if (orb.y > floor) {
          orb.y = floor;
          orb.vy = -Math.abs(orb.vy) * 0.72;
        }
        if (orb.y < ceiling) {
          orb.y = ceiling;
          orb.vy = Math.abs(orb.vy) * 0.8;
        }

        for (const node of state.nodes) {
          node.collisionCooldown = Math.max(0, node.collisionCooldown - dt);
        }

        if (collideGate(targetGate, orb, true)) {
          return;
        }
        collideGate(wrongGate, orb, false);

        orb.trail.push({ x: orb.x, y: orb.y });
        if (orb.trail.length > 20) {
          orb.trail.shift();
        }
      }

      function updateWitness(dt) {
        updateScannerState();
        if (!state.orb) {
          state.witness = clamp(state.witness - dt * 10, 0, 100);
          return;
        }
        const speed = Math.hypot(state.orb.vx, state.orb.vy);
        const movementFactor = clamp((speed - 18) / 160, 0, 1);
        const visiblePressure = state.lastVisibility;
        const hiddenBonus = state.orb.hiddenFrom >= 1 ? 1 : 0;
        const stillnessBonus = speed < 40 ? 1 : 0;
        const gain = visiblePressure * (8 + movementFactor * 15) * (1 + state.delivered * 0.1);
        const relief = 5 + hiddenBonus * 11 + stillnessBonus * 7;
        state.witness = clamp(state.witness + dt * (gain - relief), 0, 100);
        state.witnessPeak = Math.max(state.witnessPeak, state.witness);

        if (state.lastVisibility > 0.42) {
          state.statusMessage =
            state.orb.hiddenFrom >= 1
              ? "수정 기둥이 시선을 끊어냈습니다. 잠깐 멈춰 파동을 식히세요."
              : "스캐너가 따라붙습니다. 엄폐하거나 속도를 줄여 파동을 떨구세요.";
          state.statusTint = state.orb.hiddenFrom >= 1 ? "#cfffff" : "#ffd9d0";
        } else if (speed < 40) {
          state.statusMessage = "정지 위장 중. 지금이 다음 매듭을 고를 틈입니다.";
          state.statusTint = "#d2fbff";
        } else {
          state.statusMessage = "다음 스캐너 각도 전에 반대 극 게이트로 길을 이어가세요.";
          state.statusTint = "#d6f3ff";
        }

        if (state.witness >= 100) {
          failStage("목격 게이지가 임계점에 도달했습니다.");
        }
      }

      function updateFoundry(dt) {
        state.screenShake = Math.max(0, state.screenShake - dt * 18);
        state.screenFlash = Math.max(0, state.screenFlash - dt * 1.8);
        state.heat = Math.max(0, state.heat - dt * 5.5);
        state.foundryPulse += dt * (1.4 + state.delivered * 0.08);
      }

      function updateGame(dt) {
        updateEmbers(dt);
        updateParticles(dt);
        updatePopups(dt);
        updateFoundry(dt);
        handleNodeLongPress();

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        if (!state.orb && state.delivered < TOTAL_ORBS) {
          state.spawnTimer -= dt;
          if (state.spawnTimer <= 0) {
            state.orb = createOrb(state.delivered);
            const target = gateForOrb(state.orb.sign);
            state.statusMessage = `${polarityLabel(state.orb.sign)} 구슬 출현. ${target.label}와 반대 극으로 꼬아 보내세요.`;
            state.statusTint = polarityColors(state.orb.sign).core;
          }
        }

        updateOrb(dt);
        updateWitness(dt);
      }

      function updateFrame(deltaSeconds) {
        const dt = Math.min(MAX_DT, deltaSeconds);
        updateGame(dt);
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#13253a");
        gradient.addColorStop(0.48, "#0b1524");
        gradient.addColorStop(1, "#05080f");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const bloom = ctx.createRadialGradient(
          VIEW.width * 0.5,
          160,
          16,
          VIEW.width * 0.5,
          160,
          340
        );
        bloom.addColorStop(0, "rgba(126, 232, 255, 0.22)");
        bloom.addColorStop(0.4, "rgba(94, 176, 255, 0.08)");
        bloom.addColorStop(1, "rgba(6, 10, 15, 0)");
        ctx.fillStyle = bloom;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (const ember of state.embers) {
          ctx.beginPath();
          ctx.fillStyle = `rgba(170, 231, 255, ${0.08 + (ember.size * 0.02)})`;
          ctx.arc(ember.x, ember.y, ember.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
        for (let index = 0; index < 9; index += 1) {
          const y = 84 + index * 44 + Math.sin(state.foundryPulse + index * 0.7) * 6;
          ctx.fillRect(34, y, VIEW.width - 68, 1);
        }
      }

      function drawFloor() {
        const floorGradient = ctx.createLinearGradient(0, 372, 0, VIEW.height);
        floorGradient.addColorStop(0, "rgba(21, 47, 76, 0.2)");
        floorGradient.addColorStop(0.24, "rgba(12, 20, 34, 0.72)");
        floorGradient.addColorStop(1, "rgba(4, 7, 12, 0.98)");
        ctx.fillStyle = floorGradient;
        ctx.fillRect(0, 350, VIEW.width, VIEW.height - 350);

        for (let index = 0; index < 12; index += 1) {
          const bandY = 362 + index * 14;
          ctx.fillStyle = `rgba(107, 164, 204, ${0.03 + index * 0.004})`;
          ctx.fillRect(0, bandY, VIEW.width, 2);
        }

        const crucible = ctx.createLinearGradient(VIEW.width * 0.5 - 140, 418, VIEW.width * 0.5 + 140, 510);
        crucible.addColorStop(0, "rgba(28, 39, 61, 0.92)");
        crucible.addColorStop(0.5, "rgba(10, 18, 34, 0.98)");
        crucible.addColorStop(1, "rgba(28, 39, 61, 0.92)");
        roundRectPath(ctx, VIEW.width * 0.5 - 170, 404, 340, 112, 30);
        ctx.fillStyle = crucible;
        ctx.fill();

        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(145, 231, 255, 0.22)";
        ctx.stroke();

        const coreGlow = ctx.createRadialGradient(VIEW.width * 0.5, 446, 10, VIEW.width * 0.5, 446, 90);
        coreGlow.addColorStop(0, "rgba(118, 235, 255, 0.34)");
        coreGlow.addColorStop(0.65, "rgba(80, 157, 255, 0.12)");
        coreGlow.addColorStop(1, "rgba(13, 25, 41, 0)");
        ctx.fillStyle = coreGlow;
        ctx.beginPath();
        ctx.arc(VIEW.width * 0.5, 446, 94, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawPillars() {
        for (const pillar of PILLARS) {
          const gradient = ctx.createLinearGradient(pillar.x, pillar.y, pillar.x + pillar.w, pillar.y + pillar.h);
          gradient.addColorStop(0, "rgba(22, 53, 82, 0.92)");
          gradient.addColorStop(0.5, "rgba(44, 117, 150, 0.76)");
          gradient.addColorStop(1, "rgba(9, 24, 42, 0.96)");
          roundRectPath(ctx, pillar.x, pillar.y, pillar.w, pillar.h, 22);
          ctx.fillStyle = gradient;
          ctx.fill();

          ctx.strokeStyle = "rgba(227, 247, 255, 0.18)";
          ctx.lineWidth = 1.6;
          ctx.stroke();

          const glow = ctx.createRadialGradient(
            pillar.x + pillar.w * 0.5,
            pillar.y + pillar.h * 0.35,
            14,
            pillar.x + pillar.w * 0.5,
            pillar.y + pillar.h * 0.35,
            120
          );
          glow.addColorStop(0, pillar.glow);
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(pillar.x - 48, pillar.y - 36, pillar.w + 96, pillar.h + 120);

          ctx.beginPath();
          ctx.moveTo(pillar.x + 16, pillar.y + 18);
          ctx.lineTo(pillar.x + pillar.w * 0.5, pillar.y + pillar.h - 18);
          ctx.lineTo(pillar.x + pillar.w - 18, pillar.y + 36);
          ctx.strokeStyle = "rgba(218, 247, 255, 0.2)";
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
      }

      function drawSockets() {
        const occupied = occupiedSocketIndices(null);
        for (let index = 0; index < SOCKETS.length; index += 1) {
          const socket = SOCKETS[index];
          const selected = currentSelectedNode()?.socketIndex === index;
          ctx.beginPath();
          ctx.fillStyle = occupied.has(index)
            ? "rgba(57, 94, 126, 0.26)"
            : "rgba(24, 51, 76, 0.2)";
          ctx.arc(socket.x, socket.y, selected ? 16 : 13, 0, Math.PI * 2);
          ctx.fill();
          ctx.lineWidth = selected ? 2 : 1;
          ctx.strokeStyle = selected ? "rgba(222, 252, 255, 0.58)" : "rgba(132, 192, 224, 0.2)";
          ctx.stroke();
        }
      }

      function drawScannerBeams() {
        for (let index = 0; index < SCANNERS.length; index += 1) {
          const scanner = SCANNERS[index];
          const beam = state.scannerState[index];
          const radius = 520;
          const alpha = 0.06 + beam.pulse * 0.12;
          ctx.save();
          ctx.translate(scanner.x, scanner.y);
          ctx.rotate(beam.angle);
          const beamGradient = ctx.createRadialGradient(0, 0, 8, 0, 0, radius);
          beamGradient.addColorStop(0, scanner.tint.replace("0.82", String(alpha + 0.1)));
          beamGradient.addColorStop(0.35, scanner.tint.replace("0.82", String(alpha)));
          beamGradient.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = beamGradient;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, radius, -scanner.spread, scanner.spread);
          ctx.closePath();
          ctx.fill();
          ctx.restore();

          ctx.beginPath();
          ctx.fillStyle = beam.visible ? "rgba(240, 252, 255, 0.95)" : "rgba(169, 214, 255, 0.58)";
          ctx.arc(scanner.x, scanner.y, 10 + beam.pulse * 3, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.strokeStyle = scanner.tint.replace("0.82", beam.visible ? "0.86" : "0.32");
          ctx.lineWidth = 3;
          ctx.arc(scanner.x, scanner.y, 16 + beam.pulse * 6, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      function drawGates() {
        for (const gate of GATES) {
          const colors = polarityColors(gate.sign);
          const glow = ctx.createRadialGradient(gate.x, gate.y, 12, gate.x, gate.y, 72);
          glow.addColorStop(0, colors.glow.replace("0.78", "0.42"));
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(gate.x, gate.y, 76, 0, Math.PI * 2);
          ctx.fill();

          roundRectPath(ctx, gate.x - 54, gate.y - 22, 108, 52, 18);
          ctx.fillStyle = "rgba(14, 24, 40, 0.88)";
          ctx.fill();
          ctx.strokeStyle = colors.glow.replace("0.78", "0.55");
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.fillStyle = colors.core;
          ctx.font = "800 20px Avenir Next, Pretendard, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(gate.label, gate.x, gate.y + 6);
        }
      }

      function drawNodes() {
        const pointer = input.pointer;
        const selected = currentSelectedNode();
        for (const node of state.nodes) {
          const colors = polarityColors(node.sign);
          const pulse = 0.5 + Math.sin(state.foundryPulse * 3 + node.pulse * 12) * 0.5;
          const glow = ctx.createRadialGradient(node.x, node.y, 10, node.x, node.y, node.locked ? 62 : 48);
          glow.addColorStop(0, colors.glow.replace("0.78", node.locked ? "0.52" : "0.36"));
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.locked ? 62 : 48, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.fillStyle = "rgba(12, 20, 35, 0.92)";
          ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.lineWidth = node === selected ? 3 : 2;
          ctx.strokeStyle = node === selected ? "rgba(238, 251, 255, 0.9)" : colors.glow.replace("0.78", "0.56");
          ctx.stroke();

          ctx.beginPath();
          ctx.strokeStyle = colors.glow.replace("0.78", String(0.28 + pulse * 0.2));
          ctx.lineWidth = 4;
          ctx.arc(node.x, node.y, node.radius + 8, -Math.PI * 0.5, -Math.PI * 0.5 + Math.PI * 2 * (0.22 + pulse * 0.18));
          ctx.stroke();

          ctx.fillStyle = colors.core;
          ctx.font = "900 20px Avenir Next, Pretendard, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(polarityLabel(node.sign), node.x, node.y + 7);

          if (node.locked) {
            ctx.fillStyle = "rgba(240, 250, 255, 0.92)";
            ctx.font = "700 11px Avenir Next, Pretendard, sans-serif";
            ctx.fillText("LOCK", node.x, node.y + 36);
          }
        }

        if (
          pointer.active &&
          pointer.nodeId &&
          !pointer.moved &&
          !pointer.longPressTriggered &&
          state.mode === "running"
        ) {
          const node = getNodeById(pointer.nodeId);
          if (node) {
            const progress = clamp((performance.now() - pointer.downAt) / LONG_PRESS_MS, 0, 1);
            ctx.beginPath();
            ctx.strokeStyle = "rgba(232, 250, 255, 0.8)";
            ctx.lineWidth = 3;
            ctx.arc(node.x, node.y, node.radius + 16, -Math.PI * 0.5, -Math.PI * 0.5 + progress * Math.PI * 2);
            ctx.stroke();
          }
        }
      }

      function drawOrb() {
        if (!state.orb) {
          return;
        }
        const orb = state.orb;
        const colors = polarityColors(orb.sign);
        for (let index = 0; index < orb.trail.length; index += 1) {
          const point = orb.trail[index];
          const alpha = (index + 1) / orb.trail.length;
          ctx.beginPath();
          ctx.fillStyle = colors.trail.replace("0.6", String(alpha * 0.36));
          ctx.arc(point.x, point.y, 4 + alpha * 8, 0, Math.PI * 2);
          ctx.fill();
        }

        const glow = ctx.createRadialGradient(orb.x, orb.y, 8, orb.x, orb.y, 60);
        glow.addColorStop(0, colors.glow.replace("0.78", "0.72"));
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, 62, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = "rgba(14, 19, 31, 0.94)";
        ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = colors.core;
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = colors.core;
        ctx.arc(orb.x, orb.y, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f6fbff";
        ctx.font = "900 13px Avenir Next, Pretendard, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(polarityLabel(orb.sign), orb.x, orb.y + 4);
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = particle.life / particle.maxLife;
          ctx.globalAlpha = alpha * 0.85;
          ctx.beginPath();
          ctx.fillStyle = particle.color;
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawHudBar(x, y, width, height, progress, fillColors, label, valueText) {
        roundRectPath(ctx, x, y, width, height, height * 0.5);
        ctx.fillStyle = "rgba(12, 20, 35, 0.78)";
        ctx.fill();
        ctx.strokeStyle = "rgba(216, 244, 255, 0.12)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const fillWidth = clamp(progress, 0, 1) * (width - 6);
        if (fillWidth > 0) {
          const gradient = ctx.createLinearGradient(x, y, x + width, y);
          gradient.addColorStop(0, fillColors[0]);
          gradient.addColorStop(1, fillColors[1]);
          roundRectPath(ctx, x + 3, y + 3, fillWidth, height - 6, (height - 6) * 0.5);
          ctx.fillStyle = gradient;
          ctx.fill();
        }

        ctx.fillStyle = "rgba(236, 248, 255, 0.92)";
        ctx.font = "700 11px Avenir Next, Pretendard, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(label, x + 14, y - 8);
        ctx.textAlign = "right";
        ctx.fillText(valueText, x + width, y - 8);
      }

      function drawHud() {
        roundRectPath(ctx, 26, 18, 340, 116, 22);
        ctx.fillStyle = "rgba(5, 11, 18, 0.62)";
        ctx.fill();
        ctx.strokeStyle = "rgba(219, 247, 255, 0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = "rgba(220, 247, 255, 0.72)";
        ctx.font = "700 11px Avenir Next, Pretendard, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("CRYSTAL FOUNDRY / BRAID ARRAY", 44, 42);

        ctx.fillStyle = "#f4fbff";
        ctx.font = "800 24px Avenir Next, Pretendard, sans-serif";
        ctx.fillText(STAGE_COPY.title, 44, 70);

        drawHudBar(
          42,
          88,
          196,
          16,
          state.witness / 100,
          ["#7af3ff", "#ff7b86"],
          "목격 게이지",
          `${Math.round(state.witness)}%`
        );
        drawHudBar(
          254,
          88,
          96,
          16,
          state.heat / 100,
          ["#ffc887", "#ff6a57"],
          "과열",
          `${Math.round(state.heat)}%`
        );

        roundRectPath(ctx, VIEW.width - 220, 18, 194, 116, 22);
        ctx.fillStyle = "rgba(5, 11, 18, 0.62)";
        ctx.fill();
        ctx.strokeStyle = "rgba(219, 247, 255, 0.08)";
        ctx.stroke();

        ctx.fillStyle = "rgba(220, 247, 255, 0.7)";
        ctx.font = "700 11px Avenir Next, Pretendard, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("BRAIDS SEALED", VIEW.width - 198, 42);
        ctx.fillStyle = "#f6fbff";
        ctx.font = "900 34px Avenir Next, Pretendard, sans-serif";
        ctx.fillText(`${state.delivered}/${TOTAL_ORBS}`, VIEW.width - 198, 82);

        ctx.font = "700 11px Avenir Next, Pretendard, sans-serif";
        ctx.fillStyle = "rgba(220, 247, 255, 0.72)";
        ctx.fillText("NEXT POLARITIES", VIEW.width - 198, 106);

        for (let index = 0; index < TOTAL_ORBS; index += 1) {
          const sign = ORB_SEQUENCE[index];
          const colors = polarityColors(sign);
          const done = index < state.delivered;
          const x = VIEW.width - 102 + index * 18 - TOTAL_ORBS * 9;
          ctx.beginPath();
          ctx.fillStyle = done ? "rgba(236, 248, 255, 0.16)" : colors.core;
          ctx.arc(x, 103, done ? 5 : 6.5, 0, Math.PI * 2);
          ctx.fill();
        }

        roundRectPath(ctx, 26, VIEW.height - 86, VIEW.width - 52, 54, 18);
        ctx.fillStyle = "rgba(4, 10, 17, 0.52)";
        ctx.fill();
        ctx.strokeStyle = "rgba(220, 246, 255, 0.08)";
        ctx.stroke();

        ctx.fillStyle = state.statusTint;
        ctx.font = "700 14px Avenir Next, Pretendard, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(state.statusMessage, 44, VIEW.height - 52);

        if (state.orb) {
          const target = gateForOrb(state.orb.sign);
          ctx.textAlign = "right";
          ctx.fillStyle = "rgba(220, 247, 255, 0.82)";
          ctx.fillText(
            `${polarityLabel(state.orb.sign)} 구슬 -> ${target.label} / 노출 ${state.orb.visibleScanners} / 엄폐 ${state.orb.hiddenFrom}`,
            VIEW.width - 44,
            VIEW.height - 52
          );
        } else {
          ctx.textAlign = "right";
          ctx.fillStyle = "rgba(220, 247, 255, 0.66)";
          ctx.fillText("다음 용융 구슬 준비 중", VIEW.width - 44, VIEW.height - 52);
        }
      }

      function wrapText(context, text, x, y, maxWidth, lineHeight, color, maxLines) {
        const words = String(text).split(" ");
        let line = "";
        let currentY = y;
        let lines = 0;
        context.fillStyle = color;
        for (let index = 0; index < words.length; index += 1) {
          const test = `${line}${words[index]} `;
          if (context.measureText(test).width > maxWidth && line) {
            context.fillText(line.trim(), x, currentY);
            line = `${words[index]} `;
            currentY += lineHeight;
            lines += 1;
            if (maxLines && lines >= maxLines - 1) {
              break;
            }
          } else {
            line = test;
          }
        }
        if (!maxLines || lines < maxLines) {
          context.fillText(line.trim(), x, currentY);
        }
        return currentY;
      }

      function drawOverlayPanel(title, subtitle, accent) {
        const panelWidth = Math.min(760, VIEW.width - 80);
        const panelHeight = Math.min(356, VIEW.height - 96);
        const x = (VIEW.width - panelWidth) * 0.5;
        const y = (VIEW.height - panelHeight) * 0.5;
        roundRectPath(ctx, x, y, panelWidth, panelHeight, 28);
        ctx.fillStyle = "rgba(3, 8, 15, 0.74)";
        ctx.fill();
        ctx.strokeStyle = "rgba(229, 247, 255, 0.12)";
        ctx.lineWidth = 1;
        ctx.stroke();

        const band = ctx.createLinearGradient(x, y, x + panelWidth, y);
        band.addColorStop(0, `${accent}22`);
        band.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = band;
        roundRectPath(ctx, x + 16, y + 16, panelWidth - 32, 80, 24);
        ctx.fill();

        ctx.fillStyle = "rgba(220, 247, 255, 0.72)";
        ctx.font = "700 12px Avenir Next, Pretendard, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("CRYSTAL FOUNDRY PROTOCOL", x + 34, y + 42);

        ctx.fillStyle = "#f7fbff";
        ctx.font = "900 36px Avenir Next, Pretendard, sans-serif";
        ctx.fillText(title, x + 34, y + 78);

        ctx.font = "600 15px Avenir Next, Pretendard, sans-serif";
        ctx.fillStyle = "rgba(223, 244, 255, 0.84)";
        wrapText(ctx, subtitle, x + 34, y + 112, panelWidth - 68, 24, "rgba(223, 244, 255, 0.84)", 2);

        const cardWidth = (panelWidth - 84) / 2;
        const leftX = x + 28;
        const rightX = x + 44 + cardWidth;
        const cardY = y + 150;
        const cardHeight = 138;

        roundRectPath(ctx, leftX, cardY, cardWidth, cardHeight, 22);
        ctx.fillStyle = "rgba(10, 18, 31, 0.76)";
        ctx.fill();
        ctx.strokeStyle = "rgba(218, 246, 255, 0.08)";
        ctx.stroke();

        roundRectPath(ctx, rightX, cardY, cardWidth, cardHeight, 22);
        ctx.fillStyle = "rgba(10, 18, 31, 0.76)";
        ctx.fill();
        ctx.stroke();

        ctx.font = "700 11px Avenir Next, Pretendard, sans-serif";
        ctx.fillStyle = "rgba(220, 247, 255, 0.66)";
        ctx.fillText("조작", leftX + 18, cardY + 24);
        ctx.fillText("룰", rightX + 18, cardY + 24);

        ctx.font = "600 13px Avenir Next, Pretendard, sans-serif";
        wrapText(ctx, STAGE_COPY.controls, leftX + 18, cardY + 52, cardWidth - 36, 20, "rgba(233, 246, 255, 0.86)", 5);
        wrapText(ctx, STAGE_COPY.clearCondition, rightX + 18, cardY + 52, cardWidth - 36, 20, "rgba(216, 252, 255, 0.92)", 3);
        wrapText(ctx, STAGE_COPY.failCondition, rightX + 18, cardY + 102, cardWidth - 36, 20, "rgba(255, 212, 205, 0.92)", 3);

        roundRectPath(ctx, x + 28, y + panelHeight - 54, panelWidth - 56, 28, 14);
        ctx.fillStyle = "rgba(104, 221, 255, 0.12)";
        ctx.fill();
        ctx.font = "700 12px Avenir Next, Pretendard, sans-serif";
        ctx.fillStyle = "#ecfbff";
        ctx.fillText("터치 또는 Enter로 시작 / Tab으로 극성 전환 / 길게 눌러 자장 고정 / F 전체화면", x + 44, y + panelHeight - 35);
      }

      function drawMenuOverlay() {
        ctx.fillStyle = "rgba(2, 7, 13, 0.48)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        drawOverlayPanel(
          STAGE_COPY.title,
          "수정 주조소에서 N극과 S극을 엮어 구슬을 반대 극 문으로 보내되, 스캐너 파동이 강해질수록 기둥 뒤에서 시선을 끊어야 합니다.",
          "#7ceeff"
        );
      }

      function drawEndOverlay() {
        ctx.fillStyle = state.mode === "cleared" ? "rgba(5, 14, 20, 0.36)" : "rgba(19, 7, 9, 0.42)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        drawOverlayPanel(
          state.mode === "cleared" ? "BRAID COMPLETE" : "FORGE COMPROMISED",
          state.mode === "cleared"
            ? `총 ${state.lastRunTime.toFixed(1)}초 / 최고 목격 ${Math.round(state.witnessPeak)}%. 클릭·터치 또는 Enter로 다시 연습할 수 있습니다.`
            : `${state.failReason || STAGE_COPY.failCondition} 클릭·터치 또는 Enter로 즉시 재도전할 수 있습니다.`,
          state.mode === "cleared" ? "#98f6ff" : "#ff8e7f"
        );
      }

      function drawPopups() {
        ctx.textAlign = "center";
        for (const popup of state.popups) {
          const alpha = popup.life / popup.maxLife;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = popup.text.length > 14 ? "700 14px Avenir Next, Pretendard, sans-serif" : "800 18px Avenir Next, Pretendard, sans-serif";
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.globalAlpha = 1;
      }

      function render() {
        ctx.save();
        const shakeAmount = state.screenShake;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        const shakeX = shakeAmount > 0 ? (Math.random() - 0.5) * shakeAmount : 0;
        const shakeY = shakeAmount > 0 ? (Math.random() - 0.5) * shakeAmount : 0;
        ctx.translate(shakeX, shakeY);

        drawBackground();
        drawScannerBeams();
        drawGates();
        drawFloor();
        drawPillars();
        drawSockets();
        drawNodes();
        drawOrb();
        drawParticles();
        drawHud();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndOverlay();
        }

        drawPopups();

        if (state.screenFlash > 0) {
          ctx.fillStyle = `rgba(215, 246, 255, ${state.screenFlash * 0.28})`;
          ctx.fillRect(-32, -32, VIEW.width + 64, VIEW.height + 64);
        }
        ctx.restore();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(48, timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        updateFrame(delta);
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function renderGameToText() {
        const selected = currentSelectedNode();
        const payload = {
          mode: state.mode,
          origin: "top-left, x→right, y→down",
          delivered: state.delivered,
          targetDeliveries: TOTAL_ORBS,
          witness: Number(state.witness.toFixed(1)),
          heat: Number(state.heat.toFixed(1)),
          elapsed: Number(state.elapsed.toFixed(1)),
          selectedNode: selected
            ? {
                id: selected.id,
                polarity: polarityLabel(selected.sign),
                locked: selected.locked,
                socketIndex: selected.socketIndex,
              }
            : null,
          orb: state.orb
            ? {
                x: Number(state.orb.x.toFixed(1)),
                y: Number(state.orb.y.toFixed(1)),
                vx: Number(state.orb.vx.toFixed(1)),
                vy: Number(state.orb.vy.toFixed(1)),
                polarity: polarityLabel(state.orb.sign),
                targetGate: state.orb.targetGateId,
                visibleScanners: state.orb.visibleScanners,
                hiddenFrom: state.orb.hiddenFrom,
              }
            : null,
          nodes: state.nodes.map((node) => ({
            id: node.id,
            x: Number(node.x.toFixed(1)),
            y: Number(node.y.toFixed(1)),
            socketIndex: node.socketIndex,
            polarity: polarityLabel(node.sign),
            locked: node.locked,
          })),
          result: window.relayStageResult.status,
        };
        return JSON.stringify(payload);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          updateGame(FIXED_DT);
        }
        render();
      };

      window.relayStageMeta = {
        id: "crystal-foundry-magnet-braiding-witness",
        title: STAGE_COPY.title,
        creator: STAGE_COPY.creator,
        genre: STAGE_COPY.genre,
        clearCondition: STAGE_COPY.clearCondition,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          state.delivered = TOTAL_ORBS;
          clearStage();
          render();
        },
        forceFail() {
          failStage("디버그 강제 실패");
          render();
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerCancel);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("keydown", handleKeyDown);

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
