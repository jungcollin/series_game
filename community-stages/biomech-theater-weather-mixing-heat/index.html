<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biomech Theater: Weather Mix</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #090510;
        --bg-1: #160d1e;
        --bg-2: #25152f;
        --line: rgba(244, 221, 193, 0.28);
        --panel: rgba(17, 12, 26, 0.7);
        --panel-strong: rgba(25, 16, 39, 0.88);
        --text: #fff7ec;
        --muted: rgba(255, 244, 229, 0.72);
        --heat: #ff7f4f;
        --cool: #74f1eb;
        --wind: #9eb7ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next Condensed", "Trebuchet MS", "Noto Sans KR",
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(86, 42, 103, 0.66), transparent 45%),
          radial-gradient(circle at 20% 80%, rgba(32, 108, 127, 0.22), transparent 30%),
          linear-gradient(180deg, var(--bg-2), var(--bg-0));
      }

      body {
        position: relative;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(167, 244, 238, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 40;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(9, 5, 16, 0.95);
        color: var(--text);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .stage-shell {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible,
      .control-btn:focus-visible {
        outline: 3px solid rgba(116, 241, 235, 0.95);
        outline-offset: 3px;
      }

      .control-dock {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 16px;
        z-index: 30;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 12px;
        pointer-events: none;
      }

      .control-group {
        display: flex;
        gap: 10px;
        width: min(100%, 420px);
        pointer-events: auto;
      }

      .control-pill {
        min-width: 0;
        padding: 10px 12px;
        border-radius: 18px;
        backdrop-filter: blur(18px);
        background: rgba(12, 10, 22, 0.56);
        border: 1px solid rgba(255, 255, 255, 0.11);
        box-shadow:
          0 16px 40px rgba(3, 3, 10, 0.32),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }

      .control-pill strong {
        display: block;
        margin-bottom: 3px;
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text);
      }

      .control-pill span {
        display: block;
        font-size: 0.78rem;
        line-height: 1.3;
      }

      .control-actions {
        display: flex;
        gap: 10px;
        pointer-events: auto;
      }

      .control-btn {
        appearance: none;
        min-width: 118px;
        min-height: 52px;
        padding: 11px 16px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05)),
          rgba(14, 11, 23, 0.84);
        color: var(--text);
        font: 700 0.95rem/1 "Avenir Next Condensed", "Trebuchet MS",
          "Noto Sans KR", sans-serif;
        letter-spacing: 0.04em;
        box-shadow:
          0 16px 36px rgba(4, 4, 12, 0.34),
          inset 0 1px 0 rgba(255, 255, 255, 0.16);
        cursor: pointer;
        transition:
          transform 120ms ease,
          border-color 120ms ease,
          box-shadow 120ms ease;
      }

      .control-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(255, 255, 255, 0.26);
        box-shadow:
          0 18px 42px rgba(4, 4, 12, 0.4),
          0 0 18px rgba(116, 241, 235, 0.16);
      }

      .control-btn[data-active="true"] {
        transform: scale(0.97);
      }

      .control-btn[data-variant="wind"] {
        color: #eff3ff;
        box-shadow:
          0 16px 36px rgba(4, 4, 12, 0.34),
          0 0 22px rgba(158, 183, 255, 0.14);
      }

      .control-btn[data-variant="cool"] {
        color: #e9fffc;
        box-shadow:
          0 16px 36px rgba(4, 4, 12, 0.34),
          0 0 22px rgba(116, 241, 235, 0.16);
      }

      @media (max-width: 700px) {
        .control-dock {
          flex-direction: column;
          align-items: stretch;
          bottom: 12px;
          left: 12px;
          right: 12px;
          gap: 10px;
        }

        .control-group,
        .control-actions {
          width: 100%;
        }

        .control-actions {
          gap: 8px;
        }

        .control-btn {
          flex: 1 1 0;
          min-width: 0;
          min-height: 56px;
          padding: 10px 12px;
          font-size: 0.88rem;
        }

        .control-pill {
          padding: 10px 11px;
        }

        .control-pill strong {
          font-size: 0.76rem;
        }

        .control-pill span {
          font-size: 0.72rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Biomech Theater: Weather Mix. 캔버스를 터치하거나 Enter로 시작하세요.
      기본 조작은 터치 또는 마우스 드래그로 구름 이동, 탭으로 바람 방향 전환,
      과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이
      가능하게 구현 이며, 모바일에서도 화면 버튼으로 풍향 전환과 급랭을 사용할 수
      있습니다.
    </p>
    <div class="stage-shell">
      <canvas
        id="game"
        width="960"
        height="540"
        aria-label="Biomech Theater: Weather Mix"
        aria-describedby="stage-instructions"
        tabindex="0"
      ></canvas>
      <div class="control-dock" aria-label="게임 조작">
        <div class="control-group">
          <div class="control-pill">
            <strong>Cloud Mix</strong>
            <span>구름을 드래그해 활공 경로를 짜고 버튼으로 흐름을 전환하세요.</span>
          </div>
        </div>
        <div class="control-actions">
          <button
            class="control-btn"
            id="wind-button"
            type="button"
            data-active="false"
            data-variant="wind"
            aria-label="풍향 전환"
          >
            풍향 전환
          </button>
          <button
            class="control-btn"
            id="cool-button"
            type="button"
            data-active="false"
            data-variant="cool"
            aria-label="급랭 분사"
          >
            급랭 분사
          </button>
        </div>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_COPY = {
        description:
          "구름과 풍향을 섞어 세 활공체를 관측대로 보내고, 과열 직전엔 급랭으로 템포를 바꾸는 활공 퍼즐",
        controls:
          "터치 또는 마우스 드래그로 구름 이동, 탭으로 바람 방향 전환, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition:
          "과열을 폭주시키지 않고 활공체를 3개 관측대에 모두 착륙시키면 클리어",
        failCondition:
          "과열 게이지가 폭주하거나 활공체가 폭풍 코어에 빨려 들어가면 실패",
      };

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const windButton = document.querySelector("#wind-button");
      const coolButton = document.querySelector("#cool-button");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const MAX_HEAT = 100;
      const TARGET_ORDER = [0, 1, 2];
      const relayContext =
        window.RelayRuntime?.readContext("biomech-theater-weather-mixing-heat") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function round1(value) {
        return Number(value.toFixed(1));
      }

      function createObservatories() {
        return [
          { x: 816, y: 132, delivered: false, label: "01" },
          { x: 852, y: 268, delivered: false, label: "02" },
          { x: 816, y: 404, delivered: false, label: "03" },
        ];
      }

      function createClouds() {
        return [
          {
            id: "chorus-a",
            x: 266,
            y: 390,
            radius: 66,
            glow: "#ff9f75",
            core: "#fff3d8",
            accent: "#ffd38f",
            power: 288,
            forward: 82,
            coolRate: 2.4,
          },
          {
            id: "chorus-b",
            x: 420,
            y: 212,
            radius: 70,
            glow: "#7fe6ff",
            core: "#dbfffb",
            accent: "#98f6f1",
            power: 316,
            forward: 74,
            coolRate: 4.2,
          },
          {
            id: "chorus-c",
            x: 592,
            y: 336,
            radius: 62,
            glow: "#caa5ff",
            core: "#fff4ff",
            accent: "#d5b2ff",
            power: 262,
            forward: 68,
            coolRate: 2.6,
          },
        ];
      }

      function createCurtains() {
        return Array.from({ length: 8 }, (_, index) => ({
          x: 80 + index * 110,
          speed: 16 + index * 5,
          sway: 10 + index * 4,
          hue: 0.45 + index * 0.06,
        }));
      }

      function createWindRibbons() {
        return Array.from({ length: 3 }, (_, index) => ({
          y: 126 + index * 132,
          amplitude: 24 + index * 6,
          speed: 1.2 + index * 0.25,
          width: 16 + index * 2,
        }));
      }

      function createTurbulenceFields() {
        return [
          { x: 382, y: 156, radius: 58, phase: 0.2, power: 38 },
          { x: 638, y: 378, radius: 62, phase: 1.1, power: 44 },
        ];
      }

      function createPopups() {
        return [];
      }

      function createParticles() {
        return [];
      }

      function createShockwaves() {
        return [];
      }

      function createState() {
        return {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          heat: 22,
          windSign: 1,
          windFlash: 0,
          windCooldown: 0,
          coolBurst: 0,
          coolMeter: 0,
          shake: 0,
          corePulse: 0,
          flare: 0,
          clearedCount: 0,
          launchIndex: 0,
          launchTimer: 0,
          pendingClear: 0,
          lastReason: "",
          note: STAGE_COPY.description,
          glider: null,
          observatories: createObservatories(),
          clouds: createClouds(),
          curtains: createCurtains(),
          ribbons: createWindRibbons(),
          turbulence: createTurbulenceFields(),
          popups: createPopups(),
          particles: createParticles(),
          shockwaves: createShockwaves(),
          drag: {
            pointerId: null,
            cloudId: null,
            offsetX: 0,
            offsetY: 0,
            lastX: 0,
            lastY: 0,
            active: false,
          },
        };
      }

      let state = createState();

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function addPopup(text, x, y, color = "#fff7ec") {
        state.popups.push({
          text,
          x,
          y,
          life: 1,
          color,
        });
      }

      function addBurst(x, y, count, palette, speedScale = 1) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / Math.max(1, count) + Math.random() * 0.34;
          const speed = (40 + Math.random() * 150) * speedScale;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.5 + Math.random() * 0.65,
            size: 2 + Math.random() * 4,
            color: palette[index % palette.length],
          });
        }
      }

      function addShockwave(x, y, color) {
        state.shockwaves.push({
          x,
          y,
          radius: 12,
          alpha: 0.55,
          color,
        });
      }

      function createGlider(targetIndex) {
        const spawnY = [408, 148, 276][targetIndex];
        return {
          x: 88,
          y: spawnY,
          vx: 132,
          vy: targetIndex === 0 ? -12 : targetIndex === 1 ? 18 : -6,
          angle: -0.08,
          radius: 16,
          age: 0,
          trail: [],
          targetIndex,
        };
      }

      function resetButtons() {
        windButton.dataset.active = "false";
        coolButton.dataset.active = "false";
      }

      function startStage() {
        state = createState();
        state.mode = "running";
        state.launchTimer = 0.18;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        resetButtons();
        addPopup("SHOWTIME", VIEW.width * 0.5, 96, "#fff2cf");
      }

      function failStage(reason = "core") {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flare = 0.8;
        state.shake = 0.9;
        window.relayStageResult.status = "failed";
        addShockwave(STATE_CORE.x, STATE_CORE.y, "rgba(255, 118, 94, 0.56)");
        addBurst(
          state.glider ? state.glider.x : STATE_CORE.x,
          state.glider ? state.glider.y : STATE_CORE.y,
          24,
          ["#ffd6b8", "#ff8d66", "#ff5f54"]
        );
        addPopup(reason === "overheat" ? "OVERHEAT" : "CORE LOSS", VIEW.width * 0.5, 112, "#ffd1bc");
        releasePointer();
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flare = 0.72;
        state.shake = 0.35;
        window.relayStageResult.status = "cleared";
        addPopup("ALL LANDED", VIEW.width * 0.5, 104, "#dcfff4");
        addBurst(VIEW.width * 0.72, VIEW.height * 0.38, 34, ["#74f1eb", "#fff5cf", "#9eb7ff"], 1.1);
        reportClearedToHost();
      }

      const STATE_CORE = { x: 520, y: 270, radius: 60, pullRadius: 168 };

      function landGlider() {
        if (!state.glider) {
          return;
        }
        const observatory = state.observatories[state.glider.targetIndex];
        observatory.delivered = true;
        state.clearedCount += 1;
        state.heat = Math.max(8, state.heat - 14);
        addPopup(`OBS-${observatory.label}`, observatory.x, observatory.y - 42, "#d9fff1");
        addShockwave(observatory.x, observatory.y, "rgba(116, 241, 235, 0.55)");
        addBurst(observatory.x, observatory.y, 20, ["#74f1eb", "#ffffff", "#ffd79d"]);
        state.glider = null;
        state.launchIndex += 1;
        if (state.launchIndex >= TARGET_ORDER.length) {
          state.pendingClear = 0.7;
        } else {
          state.launchTimer = 1.1;
        }
      }

      function flipWind() {
        if (state.mode !== "running") {
          startStage();
          return;
        }
        if (state.windCooldown > 0.01) {
          return;
        }
        state.windSign *= -1;
        state.heat += 8.5;
        state.windCooldown = 0.34;
        state.windFlash = 1;
        state.shake = Math.max(state.shake, 0.28);
        addPopup(
          state.windSign > 0 ? "UPDRAFT" : "DOWNDRAFT",
          152,
          VIEW.height - 92,
          state.windSign > 0 ? "#dce8ff" : "#c4faff"
        );
        addShockwave(154, VIEW.height - 96, "rgba(158, 183, 255, 0.38)");
        if (state.heat >= MAX_HEAT) {
          failStage("overheat");
        }
      }

      function coolStage() {
        if (state.mode !== "running") {
          startStage();
          return;
        }
        if (state.coolBurst > 0.1) {
          return;
        }
        state.coolBurst = 0.78;
        state.coolMeter = 1;
        state.heat = Math.max(0, state.heat - 16);
        state.shake = Math.max(state.shake, 0.16);
        addPopup("VENT", VIEW.width - 136, VIEW.height - 92, "#c6fff5");
        addBurst(VIEW.width - 140, VIEW.height - 92, 16, ["#74f1eb", "#defeff", "#ffffff"], 0.78);
      }

      function screenToWorld(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((clientX - rect.left) / rect.width) * VIEW.width,
          y: ((clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function findCloudAtPoint(point) {
        let best = null;
        let bestDistance = Infinity;
        for (const cloud of state.clouds) {
          const gap = Math.hypot(point.x - cloud.x, point.y - cloud.y);
          if (gap < cloud.radius + 18 && gap < bestDistance) {
            best = cloud;
            bestDistance = gap;
          }
        }
        return best;
      }

      function beginPointer(clientX, clientY, pointerId) {
        const point = screenToWorld(clientX, clientY);
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
        if (state.mode !== "running") {
          return;
        }
        const cloud = findCloudAtPoint(point);
        if (!cloud) {
          return;
        }
        state.drag.pointerId = pointerId;
        state.drag.cloudId = cloud.id;
        state.drag.offsetX = point.x - cloud.x;
        state.drag.offsetY = point.y - cloud.y;
        state.drag.lastX = point.x;
        state.drag.lastY = point.y;
        state.drag.active = true;
      }

      function releasePointer(pointerId = null) {
        if (pointerId !== null && state.drag.pointerId !== pointerId) {
          return;
        }
        state.drag.pointerId = null;
        state.drag.cloudId = null;
        state.drag.active = false;
      }

      function movePointer(clientX, clientY, pointerId) {
        if (!state.drag.active || state.drag.pointerId !== pointerId) {
          return;
        }
        const point = screenToWorld(clientX, clientY);
        const cloud = state.clouds.find((entry) => entry.id === state.drag.cloudId);
        if (!cloud) {
          return;
        }
        const nextX = clamp(point.x - state.drag.offsetX, 116, 726);
        const nextY = clamp(point.y - state.drag.offsetY, 92, 448);
        const moveDistance = Math.hypot(point.x - state.drag.lastX, point.y - state.drag.lastY);
        cloud.x = nextX;
        cloud.y = nextY;
        state.heat += Math.min(6, moveDistance * 0.065);
        state.shake = Math.max(state.shake, 0.03);
        state.drag.lastX = point.x;
        state.drag.lastY = point.y;
        if (state.heat >= MAX_HEAT) {
          failStage("overheat");
        }
      }

      function spawnGliderIfNeeded() {
        if (state.glider || state.launchIndex >= TARGET_ORDER.length) {
          return;
        }
        const targetIndex = TARGET_ORDER[state.launchIndex];
        state.glider = createGlider(targetIndex);
        addPopup(`GLIDER ${state.launchIndex + 1}`, 112, 86, "#fff1cd");
        addBurst(102, state.glider.y, 10, ["#ffffff", "#a9d4ff", "#ffd7a8"], 0.55);
      }

      function updateClouds(dt) {
        for (const cloud of state.clouds) {
          cloud.wobble = (cloud.wobble || 0) + dt * (1.4 + cloud.power / 420);
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.992;
          particle.vy = particle.vy * 0.992 + 8 * dt;
          return particle.life > 0;
        });
      }

      function updatePopups(dt) {
        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= 26 * dt;
          return popup.life > 0;
        });
      }

      function updateShockwaves(dt) {
        state.shockwaves = state.shockwaves.filter((wave) => {
          wave.radius += 120 * dt;
          wave.alpha -= dt * 0.7;
          return wave.alpha > 0;
        });
      }

      function updateGlider(dt) {
        const glider = state.glider;
        if (!glider) {
          return;
        }

        glider.age += dt;

        const target = state.observatories[glider.targetIndex];
        const panicBoost = Math.max(0, glider.age - 9) * 22;
        glider.vx += (138 - glider.vx) * 1.4 * dt;
        glider.vx += Math.max(0, target.x - glider.x) * 0.022 * dt;
        glider.vy += 22 * dt;
        glider.vy +=
          Math.sin(glider.x * 0.013 + state.elapsed * 2.2) *
          14 *
          state.windSign *
          dt;

        for (const ribbon of state.ribbons) {
          const lane = 1 - Math.min(1, Math.abs(glider.y - ribbon.y) / 88);
          if (lane > 0) {
            glider.vx += (18 + panicBoost * 0.08) * lane * dt;
            glider.vy += state.windSign * ribbon.amplitude * 0.42 * lane * dt;
          }
        }

        const cloudMute = state.coolBurst > 0 ? 0.58 : 1;
        for (const cloud of state.clouds) {
          const dx = glider.x - cloud.x;
          const dy = glider.y - cloud.y;
          const dist = Math.hypot(dx, dy);
          const influenceRadius = cloud.radius + 24;
          if (dist >= influenceRadius) {
            continue;
          }
          const pull = 1 - dist / influenceRadius;
          glider.vy -= state.windSign * cloud.power * pull * dt * cloudMute;
          glider.vx += cloud.forward * pull * dt * cloudMute;
          state.heat = Math.max(0, state.heat - cloud.coolRate * pull * dt);
          if (Math.random() < 0.42) {
            state.particles.push({
              x: cloud.x + (Math.random() - 0.5) * 20,
              y: cloud.y + (Math.random() - 0.5) * 20,
              vx: (Math.random() - 0.5) * 30,
              vy: -30 - Math.random() * 30,
              life: 0.24 + Math.random() * 0.28,
              size: 2 + Math.random() * 2,
              color: cloud.accent,
            });
          }
        }

        for (const field of state.turbulence) {
          const dx = glider.x - field.x;
          const dy = glider.y - field.y;
          const dist = Math.hypot(dx, dy);
          if (dist >= field.radius) {
            continue;
          }
          const power = (1 - dist / field.radius) * field.power;
          glider.vy += Math.sin(state.elapsed * 7 + field.phase) * power * dt;
          glider.vx -= Math.cos(state.elapsed * 5 + field.phase) * power * 0.5 * dt;
        }

        const coreDx = STATE_CORE.x - glider.x;
        const coreDy = STATE_CORE.y - glider.y;
        const coreDist = Math.hypot(coreDx, coreDy);
        if (coreDist < STATE_CORE.pullRadius) {
          const pull =
            Math.pow(1 - coreDist / STATE_CORE.pullRadius, 2) *
            (82 + state.heat * 0.9 + panicBoost);
          glider.vx += (coreDx / Math.max(1, coreDist)) * pull * dt;
          glider.vy += (coreDy / Math.max(1, coreDist)) * pull * dt;
          if (Math.random() < 0.35) {
            state.particles.push({
              x: glider.x,
              y: glider.y,
              vx: -coreDy * 0.08 + (Math.random() - 0.5) * 18,
              vy: coreDx * 0.08 + (Math.random() - 0.5) * 18,
              life: 0.18 + Math.random() * 0.12,
              size: 2 + Math.random() * 2,
              color: "#ffb28a",
            });
          }
        }

        if (coreDist < STATE_CORE.radius + glider.radius) {
          failStage("core");
          return;
        }

        const dockDistance = distance(glider, target);
        if (dockDistance < 88) {
          const settle = 1 - dockDistance / 88;
          glider.vx += (target.x - glider.x) * settle * 2.8 * dt;
          glider.vy += (target.y - glider.y) * settle * 3.4 * dt;
          glider.vx *= 0.992;
          glider.vy *= 0.985;
        }

        glider.vx = clamp(glider.vx, 44, 248);
        glider.vy = clamp(glider.vy, -220, 220);

        glider.x += glider.vx * dt;
        glider.y += glider.vy * dt;

        if (glider.y < 36) {
          glider.y = 36;
          glider.vy = Math.abs(glider.vy) * 0.36;
        }
        if (glider.y > VIEW.height - 38) {
          glider.y = VIEW.height - 38;
          glider.vy = -Math.abs(glider.vy) * 0.4;
        }
        if (glider.x < 42) {
          glider.x = 42;
          glider.vx = Math.abs(glider.vx) * 0.64;
        }
        if (glider.x > VIEW.width - 34) {
          glider.x = VIEW.width - 34;
          glider.vx *= 0.58;
        }

        glider.angle = lerp(glider.angle, Math.atan2(glider.vy, glider.vx) * 0.78, 0.18);
        glider.trail.push({ x: glider.x, y: glider.y });
        if (glider.trail.length > 20) {
          glider.trail.shift();
        }

        if (dockDistance < 24 && Math.hypot(glider.vx, glider.vy) < 92) {
          landGlider();
        }
      }

      function update(dt) {
        state.elapsed += dt;
        state.lastRunTime = state.mode === "running" ? state.elapsed : state.lastRunTime;
        state.windCooldown = Math.max(0, state.windCooldown - dt);
        state.windFlash = Math.max(0, state.windFlash - dt * 2.4);
        state.coolBurst = Math.max(0, state.coolBurst - dt);
        state.coolMeter = Math.max(0, state.coolMeter - dt * 1.2);
        state.shake = Math.max(0, state.shake - dt * 2.1);
        state.flare = Math.max(0, state.flare - dt * 0.65);
        state.corePulse += dt;

        updateParticles(dt);
        updatePopups(dt);
        updateShockwaves(dt);
        updateClouds(dt);

        if (state.mode !== "running") {
          return;
        }

        if (state.drag.active) {
          state.heat += dt * 9.5;
        } else {
          state.heat -= dt * 6.8;
        }

        if (state.coolBurst > 0) {
          state.heat -= dt * 22;
        }

        state.heat = clamp(state.heat, 0, MAX_HEAT);

        if (state.heat >= MAX_HEAT - 0.001) {
          failStage("overheat");
          return;
        }

        if (!state.glider) {
          if (state.pendingClear > 0) {
            state.pendingClear -= dt;
            if (state.pendingClear <= 0) {
              clearStage();
            }
          } else {
            state.launchTimer -= dt;
            if (state.launchTimer <= 0) {
              spawnGliderIfNeeded();
            }
          }
        }

        updateGlider(dt);
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#3d1c48");
        gradient.addColorStop(0.42, "#1b1028");
        gradient.addColorStop(1, "#090510");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const haze = ctx.createRadialGradient(
          VIEW.width * 0.5,
          VIEW.height * 0.18,
          20,
          VIEW.width * 0.5,
          VIEW.height * 0.18,
          420
        );
        haze.addColorStop(0, "rgba(255, 202, 153, 0.16)");
        haze.addColorStop(0.4, "rgba(141, 224, 255, 0.08)");
        haze.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (const curtain of state.curtains) {
          const sway = Math.sin(state.elapsed * 0.8 + curtain.hue * 6) * curtain.sway;
          const topGlow = 44 + Math.sin(state.elapsed * 1.4 + curtain.hue * 4) * 10;
          ctx.fillStyle = `rgba(53, 24, 66, ${0.24 + curtain.hue * 0.08})`;
          ctx.beginPath();
          ctx.moveTo(curtain.x - 36, -10);
          ctx.bezierCurveTo(
            curtain.x - 12 + sway,
            120,
            curtain.x - 62 - sway,
            300,
            curtain.x - 24,
            VIEW.height + 10
          );
          ctx.lineTo(curtain.x + 24, VIEW.height + 10);
          ctx.bezierCurveTo(
            curtain.x - 4 + sway,
            318,
            curtain.x + 32 - sway,
            118,
            curtain.x + 42,
            -10
          );
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = `rgba(255, 201, 144, ${0.08 + curtain.hue * 0.03})`;
          ctx.fillRect(curtain.x - 4, 0, 8, topGlow);
        }

        ctx.fillStyle = "rgba(255, 228, 192, 0.07)";
        ctx.fillRect(40, 72, VIEW.width - 80, 5);

        for (let index = 0; index < 4; index += 1) {
          const archX = 128 + index * 220;
          ctx.strokeStyle = "rgba(255, 224, 186, 0.1)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(archX, 78);
          ctx.bezierCurveTo(archX + 36, 158, archX - 20, 360, archX + 44, 500);
          ctx.stroke();
        }
      }

      function drawRibbons() {
        for (const ribbon of state.ribbons) {
          ctx.lineWidth = ribbon.width;
          ctx.strokeStyle =
            state.windSign > 0
              ? "rgba(166, 195, 255, 0.18)"
              : "rgba(116, 241, 235, 0.18)";
          ctx.beginPath();
          for (let x = 0; x <= VIEW.width; x += 22) {
            const y =
              ribbon.y +
              Math.sin(x * 0.012 + state.elapsed * ribbon.speed) * ribbon.amplitude * 0.44 +
              Math.cos(x * 0.008 - state.elapsed * 0.9) * 8 * state.windSign;
            if (x === 0) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }
          ctx.stroke();
        }
      }

      function drawObservatories() {
        state.observatories.forEach((observatory, index) => {
          const active = !observatory.delivered && TARGET_ORDER[state.launchIndex] === index;
          const glow = observatory.delivered ? 0.4 : active ? 0.9 : 0.22;
          const halo = ctx.createRadialGradient(
            observatory.x,
            observatory.y,
            8,
            observatory.x,
            observatory.y,
            66
          );
          halo.addColorStop(0, `rgba(116, 241, 235, ${0.3 + glow * 0.3})`);
          halo.addColorStop(1, "rgba(116, 241, 235, 0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(observatory.x, observatory.y, 66, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = observatory.delivered ? "#d7fff8" : "#27192c";
          ctx.strokeStyle = active ? "#fff2cc" : "rgba(255, 228, 193, 0.55)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(observatory.x - 34, observatory.y - 20, 68, 40, 16);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = observatory.delivered ? "#07231f" : "#ffe8c7";
          ctx.font = "700 16px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(observatory.label, observatory.x, observatory.y + 6);

          if (observatory.delivered) {
            ctx.fillStyle = "rgba(116, 241, 235, 0.22)";
            ctx.fillRect(observatory.x - 7, 28, 14, observatory.y - 48);
          }
        });
      }

      function drawCore() {
        const pulse = 1 + Math.sin(state.corePulse * 2.8) * 0.04;
        const flash = state.flare * 0.22 + Math.max(0, state.heat - 70) / 300;
        const outer = ctx.createRadialGradient(
          STATE_CORE.x,
          STATE_CORE.y,
          24,
          STATE_CORE.x,
          STATE_CORE.y,
          150
        );
        outer.addColorStop(0, `rgba(255, 175, 118, ${0.22 + flash})`);
        outer.addColorStop(0.45, "rgba(253, 105, 77, 0.14)");
        outer.addColorStop(1, "rgba(255, 84, 84, 0)");
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(STATE_CORE.x, STATE_CORE.y, 150, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(STATE_CORE.x, STATE_CORE.y);
        ctx.rotate(state.elapsed * 0.65 * state.windSign);
        for (let index = 0; index < 4; index += 1) {
          ctx.rotate(Math.PI / 2);
          ctx.strokeStyle = `rgba(255, 225, 200, ${0.16 - index * 0.024})`;
          ctx.lineWidth = 3 - index * 0.35;
          ctx.beginPath();
          ctx.moveTo(18, 0);
          ctx.lineTo(78 * pulse, 0);
          ctx.stroke();
        }
        ctx.restore();

        const center = ctx.createRadialGradient(
          STATE_CORE.x,
          STATE_CORE.y,
          8,
          STATE_CORE.x,
          STATE_CORE.y,
          STATE_CORE.radius
        );
        center.addColorStop(0, "#fff1d9");
        center.addColorStop(0.32, "#ff9d67");
        center.addColorStop(1, "#6b141d");
        ctx.fillStyle = center;
        ctx.beginPath();
        ctx.arc(STATE_CORE.x, STATE_CORE.y, STATE_CORE.radius * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 232, 214, 0.3)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(STATE_CORE.x, STATE_CORE.y, STATE_CORE.pullRadius, 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawCloud(cloud) {
        const isDragged = state.drag.cloudId === cloud.id;
        const gradient = ctx.createRadialGradient(
          cloud.x - 16,
          cloud.y - 12,
          12,
          cloud.x,
          cloud.y,
          cloud.radius
        );
        gradient.addColorStop(0, cloud.core);
        gradient.addColorStop(0.5, cloud.glow);
        gradient.addColorStop(1, "rgba(255,255,255,0.04)");

        ctx.save();
        ctx.translate(cloud.x, cloud.y);
        ctx.shadowColor = cloud.glow;
        ctx.shadowBlur = isDragged ? 28 : 18;
        ctx.fillStyle = gradient;
        const bob = Math.sin((cloud.wobble || 0) * 1.4) * 4;
        ctx.beginPath();
        ctx.arc(-18, -4 + bob, cloud.radius * 0.44, 0, Math.PI * 2);
        ctx.arc(12, -10 - bob * 0.4, cloud.radius * 0.38, 0, Math.PI * 2);
        ctx.arc(8, 18 + bob * 0.2, cloud.radius * 0.34, 0, Math.PI * 2);
        ctx.arc(-22, 20 - bob * 0.2, cloud.radius * 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = "rgba(255, 255, 255, 0.22)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 4, cloud.radius * 0.72, cloud.radius * 0.48, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle =
          state.windSign > 0 ? "rgba(255, 244, 227, 0.74)" : "rgba(204, 254, 247, 0.74)";
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-cloud.radius * 0.24, 6);
        ctx.lineTo(cloud.radius * 0.22, 6);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(0, 24);
        ctx.stroke();
        ctx.beginPath();
        if (state.windSign > 0) {
          ctx.moveTo(0, -28);
          ctx.lineTo(-8, -15);
          ctx.lineTo(8, -15);
        } else {
          ctx.moveTo(0, 34);
          ctx.lineTo(-8, 21);
          ctx.lineTo(8, 21);
        }
        ctx.closePath();
        ctx.fillStyle =
          state.windSign > 0 ? "rgba(255, 245, 227, 0.78)" : "rgba(204, 254, 247, 0.78)";
        ctx.fill();
        ctx.restore();
      }

      function drawGlider() {
        const glider = state.glider;
        if (!glider) {
          return;
        }

        if (glider.trail.length > 1) {
          ctx.strokeStyle = "rgba(255, 244, 211, 0.28)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          glider.trail.forEach((point, index) => {
            if (index === 0) {
              ctx.moveTo(point.x, point.y);
            } else {
              ctx.lineTo(point.x, point.y);
            }
          });
          ctx.stroke();
        }

        const target = state.observatories[glider.targetIndex];
        ctx.strokeStyle = "rgba(255, 246, 226, 0.16)";
        ctx.setLineDash([6, 10]);
        ctx.beginPath();
        ctx.moveTo(glider.x, glider.y);
        ctx.lineTo(target.x, target.y);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.save();
        ctx.translate(glider.x, glider.y);
        ctx.rotate(glider.angle);
        ctx.shadowColor = "rgba(255, 226, 194, 0.66)";
        ctx.shadowBlur = 18;
        const body = ctx.createLinearGradient(-26, -12, 26, 12);
        body.addColorStop(0, "#fff6e2");
        body.addColorStop(0.52, "#f1d9b8");
        body.addColorStop(1, "#c7a97d");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.moveTo(-24, -10);
        ctx.lineTo(22, 0);
        ctx.lineTo(-24, 10);
        ctx.lineTo(-6, 0);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(80, 54, 38, 0.4)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(-24, -10);
        ctx.lineTo(-6, 0);
        ctx.lineTo(-24, 10);
        ctx.lineTo(22, 0);
        ctx.stroke();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          ctx.globalAlpha = clamp(particle.life, 0, 1);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawShockwaves() {
        for (const wave of state.shockwaves) {
          ctx.strokeStyle = wave.color;
          ctx.globalAlpha = wave.alpha;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }

        ctx.fillText("드래그로 구름 재배치, 버튼 탭으로 풍향/급랭", 839, 68);
      }

      function wrapTextLines(text, maxWidth) {
        const words = String(text).split(" ");
        const lines = [];
        let current = "";
        for (const word of words) {
          const candidate = current ? `${current} ${word}` : word;
          if (ctx.measureText(candidate).width <= maxWidth || !current) {
            current = candidate;
          } else {
            lines.push(current);
            current = word;
          }
        }
        if (current) {
          lines.push(current);
        }
        return lines;
      }

      function drawOverlay(title, accent, bodyLines, footer) {
        const width = Math.min(670, VIEW.width - 92);
        const height = Math.min(330, VIEW.height - 110);
        const x = (VIEW.width - width) / 2;
        const y = (VIEW.height - height) / 2;

        ctx.fillStyle = "rgba(7, 4, 12, 0.72)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const panel = ctx.createLinearGradient(x, y, x, y + height);
        panel.addColorStop(0, "rgba(27, 18, 42, 0.92)");
        panel.addColorStop(1, "rgba(11, 9, 19, 0.92)");
        ctx.fillStyle = panel;
        ctx.beginPath();
        ctx.roundRect(x, y, width, height, 30);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = "800 34px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(title, x + 30, y + 54);

        ctx.fillStyle = "#fff7ed";
        ctx.font = "600 16px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        let cursorY = y + 100;
        for (const line of bodyLines) {
          const wrapped = wrapTextLines(line, width - 60);
          for (const segment of wrapped) {
            ctx.fillText(segment, x + 30, cursorY);
            cursorY += 24;
          }
          cursorY += 6;
        }

        ctx.fillStyle = "rgba(255, 244, 229, 0.68)";
        ctx.font = "600 14px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText(footer, x + 30, y + height - 30);
      }

      function drawMenu() {
        drawOverlay(
          "Biomech Theater: Weather Mix",
          "#fff1cc",
          [
            STAGE_COPY.description,
            `조작: ${STAGE_COPY.controls}`,
            `클리어: ${STAGE_COPY.clearCondition}`,
            `실패: ${STAGE_COPY.failCondition}`,
          ],
          "캔버스를 터치하거나 클릭하면 시작합니다. 드래그는 구름 위에서 바로 작동합니다."
        );
      }

      function drawEndScreen() {
        if (state.mode === "failed") {
          const message =
            state.lastReason === "overheat"
              ? "과열 게이지가 폭주했습니다. 구름 이동을 멈추고 급랭 버튼으로 호흡을 되찾으세요."
              : "활공체가 폭풍 코어에 빨려 들어갔습니다. 구름을 더 일찍 세워 바깥 회랑으로 빼내세요.";
          drawOverlay(
            "Show Collapsed",
            "#ffcfbf",
            [message, `실패: ${STAGE_COPY.failCondition}`],
            "캔버스를 다시 터치하거나 버튼을 탭하면 즉시 재시작합니다."
          );
          return;
        }

        drawOverlay(
          "Curtain Call",
          "#d2fff0",
          [
            "세 활공체가 모두 관측대에 착륙했습니다.",
            `클리어: ${STAGE_COPY.clearCondition}`,
            `기록 ${state.lastRunTime.toFixed(1)}초 / 과열 ${Math.round(state.heat)}%`,
          ],
          "다시 플레이하려면 캔버스를 터치하거나 클릭하세요."
        );
      }

      function drawPopups() {
        ctx.textAlign = "center";
        for (const popup of state.popups) {
          ctx.globalAlpha = clamp(popup.life, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.font = "800 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.globalAlpha = 1;
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.save();
        if (state.shake > 0.001) {
          const shakeX = Math.sin(state.elapsed * 42) * state.shake * 5;
          const shakeY = Math.cos(state.elapsed * 32) * state.shake * 4;
          ctx.translate(shakeX, shakeY);
        }

        drawBackground();
        drawRibbons();
        drawObservatories();
        drawCore();
        state.clouds.forEach(drawCloud);
        drawShockwaves();
        drawGlider();
        drawParticles();
        drawHud();
        drawPopups();

        if (state.windFlash > 0) {
          ctx.fillStyle =
            state.windSign > 0
              ? `rgba(173, 197, 255, ${state.windFlash * 0.12})`
              : `rgba(116, 241, 235, ${state.windFlash * 0.12})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndScreen();
        }

        ctx.restore();
      }

      function frame(timestamp) {
        const deltaSeconds = lastTimestamp
          ? Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000)
          : FIXED_DT;
        lastTimestamp = timestamp;
        update(deltaSeconds);
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function renderGameToText() {
        const glider = state.glider;
        return JSON.stringify({
          mode: state.mode,
          coordinateSystem: "origin top-left, +x right, +y down",
          heat: round1(state.heat),
          wind: state.windSign > 0 ? "updraft" : "downdraft",
          landed: state.observatories.map((observatory) => observatory.delivered),
          target:
            glider !== null
              ? {
                  index: glider.targetIndex,
                  x: round1(state.observatories[glider.targetIndex].x),
                  y: round1(state.observatories[glider.targetIndex].y),
                }
              : null,
          glider:
            glider !== null
              ? {
                  x: round1(glider.x),
                  y: round1(glider.y),
                  vx: round1(glider.vx),
                  vy: round1(glider.vy),
                }
              : null,
          clouds: state.clouds.map((cloud) => ({
            id: cloud.id,
            x: round1(cloud.x),
            y: round1(cloud.y),
            r: round1(cloud.radius),
          })),
          core: { x: STATE_CORE.x, y: STATE_CORE.y, r: STATE_CORE.radius },
        });
      }

      function advanceTime(ms = 16.67) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      }

      function bindButton(button, handler) {
        const activate = (event) => {
          event.preventDefault();
          button.dataset.active = "true";
          handler();
        };
        const release = (event) => {
          event.preventDefault();
          button.dataset.active = "false";
        };
        button.addEventListener("pointerdown", activate);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
        button.addEventListener("click", (event) => event.preventDefault());
      }

      bindButton(windButton, flipWind);
      bindButton(coolButton, coolStage);

      canvas.addEventListener("pointerdown", (event) => {
        canvas.focus({ preventScroll: true });
        canvas.setPointerCapture?.(event.pointerId);
        beginPointer(event.clientX, event.clientY, event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        movePointer(event.clientX, event.clientY, event.pointerId);
      });

      canvas.addEventListener("pointerup", (event) => {
        releasePointer(event.pointerId);
      });

      canvas.addEventListener("pointercancel", (event) => {
        releasePointer(event.pointerId);
      });

      canvas.addEventListener("lostpointercapture", (event) => {
        releasePointer(event.pointerId);
      });

      canvas.addEventListener("touchstart", () => {}, { passive: true });

      window.addEventListener("keydown", (event) => {
        if (event.repeat) {
          return;
        }
        if (event.key === "Enter") {
          startStage();
        } else if (event.key === " ") {
          event.preventDefault();
          flipWind();
        } else if (event.key.toLowerCase() === "c") {
          coolStage();
        }
      });

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      window.relayStageMeta = {
        id: "biomech-theater-weather-mixing-heat",
        title: "Biomech Theater: Weather Mix",
        creator: "jungcollin",
        genre: "Climate puzzler / 과열 관리",
        clearCondition: STAGE_COPY.clearCondition,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "cleared") {
            state.launchIndex = TARGET_ORDER.length;
            state.observatories.forEach((observatory) => {
              observatory.delivered = true;
            });
            state.clearedCount = 3;
            state.glider = null;
            clearStage();
            render();
          }
        },
        forceFail() {
          if (state.mode !== "failed") {
            if (state.mode !== "running") {
              state.mode = "running";
              window.relayStageResult.status = "running";
            }
            failStage("core");
            render();
          }
        },
      };
      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceTime;

      render();
      reportReadyToHost();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
