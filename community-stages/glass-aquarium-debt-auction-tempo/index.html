<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Aquarium: Debt Auction</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(144, 232, 255, 0.22), transparent 36%),
          linear-gradient(180deg, #021826 0%, #04243a 40%, #03111f 100%);
        font-family: "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(149, 226, 255, 0.28);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(4, 21, 33, 0.94);
        color: #f5fbff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        cursor: pointer;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(194, 241, 255, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Glass Aquarium: Debt Auction. 클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 박자 링이 맞을 때 핵심 입력 사용, 모바일은 터치와 드래그만으로 플레이.
      클리어 조건은 템포 창을 놓치지 않고 시간을 0으로 만들지 않으며 마지막 경매를 넘기면 클리어. 실패 조건은 핵심 입력 연속 박자 이탈, 시간 잔고 바닥, 코어 파괴 시 실패.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Glass Aquarium: Debt Auction" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const BEAT_INTERVAL = 1.06;
      const BEAT_TARGET = 0.76;
      const MAX_TIME_BALANCE = 36;
      const relayContext = window.RelayRuntime?.readContext("glass-aquarium-debt-auction-tempo") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const STAGE_TITLE = "Glass Aquarium: Debt Auction";
      const STAGE_DESCRIPTION = "남은 시간을 경매 자원처럼 태워 장비를 사고, 박자 창에 맞춰 수족관 코어를 버티는 리스크 퍼즐";
      const STAGE_CONTROLS = "클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 박자 링이 맞을 때 핵심 입력 사용, 모바일은 터치와 드래그만으로 플레이";
      const STAGE_CLEAR = "템포 창을 놓치지 않고 시간을 0으로 만들지 않으며 마지막 경매를 넘기면 클리어";
      const STAGE_FAIL = "핵심 입력 연속 박자 이탈, 시간 잔고 바닥, 코어 파괴 시 실패";

      const LOT_LIBRARY = [
        {
          key: "prism-net",
          name: "프리즘 그물",
          tag: "순간 화력",
          desc: "정확한 비트마다 강한 밀어내기",
          cost: 5.2,
          color: "#7be1ff",
          damage: 24,
          push: 0.14,
          slow: 1,
          refund: 0,
          windowBoost: 0,
          passiveShield: 0,
        },
        {
          key: "coral-hedge",
          name: "산호 헤지",
          tag: "감속 장벽",
          desc: "파동이 닿으면 채무 웨이브 감속",
          cost: 4.6,
          color: "#ff8db5",
          damage: 14,
          push: 0.08,
          slow: 0.68,
          refund: 0,
          windowBoost: 0,
          passiveShield: 0.7,
        },
        {
          key: "credit-kelp",
          name: "신용 켈프",
          tag: "시간 환수",
          desc: "퍼펙트 비트마다 시간 잔고 회수",
          cost: 6.2,
          color: "#95ffcb",
          damage: 18,
          push: 0.1,
          slow: 1,
          refund: 0.65,
          windowBoost: 0,
          passiveShield: 0,
        },
        {
          key: "tempo-bell",
          name: "템포 벨",
          tag: "윈도우 확장",
          desc: "박자 창 확장과 전역 잔향",
          cost: 5.8,
          color: "#ffe07a",
          damage: 16,
          push: 0.11,
          slow: 1,
          refund: 0,
          windowBoost: 0.032,
          passiveShield: 0,
        },
      ];

      const WAVES = [
        {
          name: "Lease Drift",
          count: 7,
          interval: 1.15,
          speed: 0.118,
          hp: 26,
          damage: 11,
          weights: [0.4, 0.2, 0.4],
          tint: "#7bd7ff",
        },
        {
          name: "Margin Foam",
          count: 9,
          interval: 0.98,
          speed: 0.132,
          hp: 30,
          damage: 13,
          weights: [0.25, 0.5, 0.25],
          tint: "#7fe5ff",
        },
        {
          name: "Tempo Tax",
          count: 11,
          interval: 0.86,
          speed: 0.144,
          hp: 34,
          damage: 15,
          weights: [0.42, 0.18, 0.4],
          tint: "#8ee6ff",
        },
        {
          name: "Glass Panic",
          count: 12,
          interval: 0.74,
          speed: 0.156,
          hp: 37,
          damage: 17,
          weights: [0.3, 0.38, 0.32],
          tint: "#9cf0ff",
        },
        {
          name: "Final Call",
          count: 14,
          interval: 0.62,
          speed: 0.168,
          hp: 42,
          damage: 19,
          weights: [0.34, 0.32, 0.34],
          tint: "#c7f4ff",
        },
      ];

      const LANES = [
        {
          id: 0,
          label: "좌측 조류",
          spawn: { x: 180, y: 72 },
          curveA: { x: 176, y: 184 },
          curveB: { x: 262, y: 286 },
          core: { x: 480, y: 348 },
          slot: { x: 268, y: 250 },
          glass: "#87d8ff",
        },
        {
          id: 1,
          label: "중앙 조류",
          spawn: { x: 480, y: 56 },
          curveA: { x: 498, y: 176 },
          curveB: { x: 490, y: 274 },
          core: { x: 480, y: 348 },
          slot: { x: 480, y: 228 },
          glass: "#8ff7f2",
        },
        {
          id: 2,
          label: "우측 조류",
          spawn: { x: 780, y: 72 },
          curveA: { x: 784, y: 184 },
          curveB: { x: 698, y: 286 },
          core: { x: 480, y: 348 },
          slot: { x: 692, y: 250 },
          glass: "#ffc1e5",
        },
      ];

      let animationFrame = 0;
      let loopActive = false;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const pointer = {
        down: false,
        id: null,
        x: 0,
        y: 0,
        startX: 0,
        startY: 0,
        startTime: 0,
        cardId: null,
        dragging: false,
        longPressFired: false,
        action: "idle",
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        timeBalance: MAX_TIME_BALANCE,
        coreIntegrity: 100,
        beatClock: 0,
        beatFlash: 0,
        offbeatFlash: 0,
        perfectFlash: 0,
        screenShake: 0,
        misbeatStreak: 0,
        waveIndex: 0,
        waveSpawned: 0,
        waveSpawnTimer: 0,
        waveTransition: 0,
        auctionLots: [],
        selectedLotId: null,
        recommendedLane: 1,
        slotDevices: [null, null, null],
        enemies: [],
        particles: [],
        bubbles: [],
        popups: [],
        ribbons: [],
        notice: "",
        noticeColor: "#c6f5ff",
        noticeTimer: 0,
        reason: "",
        resultPulse: 0,
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function pick(array) {
        return array[Math.floor(Math.random() * array.length)];
      }

      function quadraticPoint(start, control, end, t) {
        const inv = 1 - t;
        return {
          x: inv * inv * start.x + 2 * inv * t * control.x + t * t * end.x,
          y: inv * inv * start.y + 2 * inv * t * control.y + t * t * end.y,
        };
      }

      function getLanePoint(laneIndex, t) {
        const lane = LANES[laneIndex];
        const mid = quadraticPoint(lane.spawn, lane.curveA, lane.curveB, t);
        return quadraticPoint(mid, lane.curveB, lane.core, t);
      }

      function getCardRect(index) {
        const width = 214;
        const height = 86;
        const gap = 18;
        const total = width * 3 + gap * 2;
        return {
          x: VIEW.width * 0.5 - total * 0.5 + index * (width + gap),
          y: 28,
          width,
          height,
        };
      }

      function getSlotRect(laneIndex) {
        const slot = LANES[laneIndex].slot;
        return {
          x: slot.x - 74,
          y: slot.y - 48,
          width: 148,
          height: 86,
        };
      }

      function getBeatRect() {
        return {
          x: VIEW.width - 204,
          y: VIEW.height - 144,
          width: 162,
          height: 102,
        };
      }

      function pointInRect(point, rect) {
        return (
          point.x >= rect.x &&
          point.x <= rect.x + rect.width &&
          point.y >= rect.y &&
          point.y <= rect.y + rect.height
        );
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function createBubbleField() {
        state.bubbles.length = 0;
        for (let index = 0; index < 14; index += 1) {
          state.bubbles.push({
            x: rand(80, VIEW.width - 80),
            y: rand(0, VIEW.height),
            radius: rand(3, 12),
            speed: rand(12, 42),
            drift: rand(-18, 18),
            alpha: rand(0.08, 0.32),
          });
        }
      }

      function spawnParticles(x, y, color, count, speed) {
        for (let index = 0; index < count; index += 1) {
          const angle = rand(0, Math.PI * 2);
          const velocity = rand(speed * 0.45, speed);
          const particle = {
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: rand(0.35, 0.9),
            maxLife: 0,
            radius: rand(2, 6),
            color,
          };
          particle.maxLife = particle.life;
          state.particles.push(particle);
        }
      }

      function addPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: 0.9,
          maxLife: 0.9,
        });
      }

      function addRibbon(text, color) {
        state.ribbons.push({
          text,
          color,
          life: 1.15,
          maxLife: 1.15,
        });
      }

      function setNotice(text, color = "#c6f5ff") {
        state.notice = text;
        state.noticeColor = color;
        state.noticeTimer = 2;
      }

      function buildAuctionLots(waveIndex) {
        const pool = [...LOT_LIBRARY];
        const lots = [];
        for (let index = 0; index < 3; index += 1) {
          const choice = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
          lots.push({
            ...choice,
            id: `${waveIndex}-${choice.key}-${index}-${Math.random().toString(16).slice(2, 6)}`,
            rect: getCardRect(index),
          });
        }
        return lots;
      }

      function getWave() {
        return WAVES[Math.min(state.waveIndex, WAVES.length - 1)];
      }

      function getLaneThreat(laneIndex) {
        const enemyThreat = state.enemies
          .filter((enemy) => enemy.lane === laneIndex)
          .reduce((sum, enemy) => sum + enemy.t * 1.4 + enemy.hp / 35, 0);
        const hasDevice = state.slotDevices[laneIndex] ? 0.4 : 1.4;
        return enemyThreat + hasDevice;
      }

      function getRecommendedLane() {
        let bestLane = 0;
        let bestScore = -Infinity;
        for (let laneIndex = 0; laneIndex < LANES.length; laneIndex += 1) {
          const score = getLaneThreat(laneIndex);
          if (score > bestScore) {
            bestScore = score;
            bestLane = laneIndex;
          }
        }
        return bestLane;
      }

      function getSelectedLot() {
        return state.auctionLots.find((lot) => lot.id === state.selectedLotId) || null;
      }

      function getCardAt(point) {
        return state.auctionLots.find((lot) => pointInRect(point, lot.rect)) || null;
      }

      function getSlotAt(point) {
        for (let laneIndex = 0; laneIndex < LANES.length; laneIndex += 1) {
          if (pointInRect(point, getSlotRect(laneIndex))) {
            return laneIndex;
          }
        }
        return -1;
      }

      function getBeatPhase() {
        return (state.beatClock % BEAT_INTERVAL) / BEAT_INTERVAL;
      }

      function getBeatWindow() {
        const bonus = state.slotDevices.reduce(
          (sum, device) => sum + (device ? device.windowBoost : 0),
          0
        );
        return clamp(0.11 + bonus, 0.11, 0.22);
      }

      function spendTime(amount) {
        state.timeBalance = clamp(state.timeBalance - amount, 0, MAX_TIME_BALANCE);
        if (state.timeBalance <= 0) {
          failStage("time-empty");
        }
      }

      function recoverTime(amount) {
        state.timeBalance = clamp(state.timeBalance + amount, 0, MAX_TIME_BALANCE);
      }

      function replaceDevice(laneIndex, lot, instant) {
        const slot = LANES[laneIndex].slot;
        if (state.slotDevices[laneIndex]) {
          spawnParticles(slot.x, slot.y, "#e8fcff", 12, 110);
        }
        state.slotDevices[laneIndex] = {
          key: lot.key,
          name: lot.name,
          color: lot.color,
          damage: lot.damage,
          push: lot.push,
          slow: lot.slow,
          refund: lot.refund,
          windowBoost: lot.windowBoost,
          passiveShield: lot.passiveShield,
          flash: 1.2,
        };
        spendTime(lot.cost);
        state.auctionLots = state.auctionLots.filter((entry) => entry.id !== lot.id);
        state.selectedLotId = null;
        state.recommendedLane = getRecommendedLane();
        spawnParticles(slot.x, slot.y, lot.color, 20, 170);
        addPopup(instant ? "INSTANT BID" : "DEPLOY", slot.x, slot.y - 28, lot.color);
        state.screenShake = Math.max(state.screenShake, 8);
      }

      function tryDeployLot(lot, laneIndex, instant) {
        if (!lot || state.mode !== "running") {
          return false;
        }
        if (state.timeBalance <= lot.cost + 0.15) {
          state.screenShake = Math.max(state.screenShake, 10);
          addPopup("TIME LOW", VIEW.width * 0.5, 122, "#ff8da1");
          setNotice("잔고가 부족해 경매 낙찰 실패", "#ffd2d7");
          return false;
        }
        replaceDevice(laneIndex, lot, instant);
        return true;
      }

      function deploySelectedToLane(laneIndex, instant) {
        return tryDeployLot(getSelectedLot(), laneIndex, instant);
      }

      function getBeatAccuracy() {
        const phase = getBeatPhase();
        let delta = Math.abs(phase - BEAT_TARGET);
        if (delta > 0.5) {
          delta = 1 - delta;
        }
        if (delta <= 0.05) {
          return { label: "perfect", delta };
        }
        if (delta <= getBeatWindow()) {
          return { label: "good", delta };
        }
        return { label: "miss", delta };
      }

      function destroyEnemy(enemy, color, text) {
        const point = getLanePoint(enemy.lane, enemy.t);
        spawnParticles(point.x, point.y, color, 16, 180);
        addPopup(text, point.x, point.y - 14, color);
      }

      function pulseLane(laneIndex, accuracy) {
        const device = state.slotDevices[laneIndex];
        if (!device) {
          return;
        }
        const laneEnemies = state.enemies
          .filter((enemy) => enemy.lane === laneIndex)
          .sort((a, b) => b.t - a.t);
        const primary = laneEnemies[0];
        if (!primary) {
          if (accuracy === "perfect" && device.refund > 0) {
            recoverTime(device.refund * 0.4);
            addPopup("+0.3s", LANES[laneIndex].slot.x, LANES[laneIndex].slot.y - 36, device.color);
          }
          return;
        }

        let damageScale = accuracy === "perfect" ? 1.35 : 0.95;
        if (device.key === "tempo-bell" && accuracy === "perfect") {
          damageScale += 0.15;
        }

        primary.hp -= device.damage * damageScale;
        primary.t = Math.max(0, primary.t - device.push * (accuracy === "perfect" ? 1.28 : 0.92));
        primary.flash = 0.25;
        if (device.slow < 1) {
          primary.slowTimer = 0.95;
        }

        if (accuracy === "perfect" && device.refund > 0) {
          recoverTime(device.refund);
          addPopup(`+${device.refund.toFixed(1)}s`, primary.x, primary.y - 20, "#b8ffd9");
        }

        if (device.key === "tempo-bell" && accuracy === "perfect") {
          for (const enemy of laneEnemies.slice(1, 3)) {
            enemy.hp -= device.damage * 0.55;
            enemy.t = Math.max(0, enemy.t - 0.05);
            enemy.flash = 0.18;
          }
        }

        if (primary.hp <= 0) {
          primary.dead = true;
          destroyEnemy(primary, device.color, accuracy === "perfect" ? "SHATTER" : "BREAK");
        } else {
          const point = getLanePoint(primary.lane, primary.t);
          primary.x = point.x;
          primary.y = point.y;
          spawnParticles(point.x, point.y, device.color, 6, 90);
        }

        device.flash = 0.8;
      }

      function triggerBeat() {
        if (state.mode !== "running") {
          return;
        }
        const accuracy = getBeatAccuracy();
        if (accuracy.label === "miss") {
          state.misbeatStreak += 1;
          state.offbeatFlash = 0.95;
          state.screenShake = Math.max(state.screenShake, 14);
          addRibbon("OFF BEAT", "#ff8ca4");
          addPopup(`x${state.misbeatStreak}`, VIEW.width * 0.5, VIEW.height - 132, "#ffd0da");
          if (state.misbeatStreak >= 3) {
            failStage("tempo-broken");
          } else {
            setNotice("박자 이탈 누적 중", "#ffd2dc");
          }
          return;
        }

        state.misbeatStreak = 0;
        state.beatFlash = 0.95;
        state.perfectFlash = accuracy.label === "perfect" ? 1.1 : 0.45;
        state.screenShake = Math.max(state.screenShake, accuracy.label === "perfect" ? 12 : 7);
        if (accuracy.label === "perfect") {
          recoverTime(0.18);
          state.coreIntegrity = clamp(state.coreIntegrity + 1.2, 0, 100);
          addRibbon("PERFECT WINDOW", "#9ef7ff");
        } else {
          addRibbon("STABLE BEAT", "#ffe08b");
        }

        for (let laneIndex = 0; laneIndex < LANES.length; laneIndex += 1) {
          pulseLane(laneIndex, accuracy.label);
        }
      }

      function startWave(index) {
        state.waveIndex = index;
        state.waveSpawned = 0;
        state.waveSpawnTimer = 0.65;
        state.waveTransition = 0;
        state.auctionLots = buildAuctionLots(index);
        state.selectedLotId = null;
        state.recommendedLane = getRecommendedLane();
        setNotice(`Auction ${index + 1} · ${WAVES[index].name}`, "#c8fbff");
        addRibbon(index === WAVES.length - 1 ? "FINAL AUCTION" : `LOT ${index + 1}`, "#b8eeff");
      }

      function resetState() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.timeBalance = MAX_TIME_BALANCE;
        state.coreIntegrity = 100;
        state.beatClock = 0;
        state.beatFlash = 0;
        state.offbeatFlash = 0;
        state.perfectFlash = 0;
        state.screenShake = 0;
        state.misbeatStreak = 0;
        state.enemies.length = 0;
        state.particles.length = 0;
        state.popups.length = 0;
        state.ribbons.length = 0;
        state.slotDevices = [null, null, null];
        state.notice = "";
        state.noticeTimer = 0;
        state.reason = "";
        state.resultPulse = 0;
        createBubbleField();
        startWave(0);
      }

      function startStage() {
        resetState();
        state.mode = "running";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        ensureAnimationLoop();
      }

      function finishStage(mode, reason) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = mode;
        state.reason = reason;
        state.lastRunTime = state.elapsed;
        state.resultPulse = 1.2;
        window.relayStageResult.status = mode;
      }

      function failStage(reason = "failed") {
        finishStage("failed", reason);
        state.screenShake = Math.max(state.screenShake, 18);
        addRibbon("AQUARIUM BREACH", "#ff9aac");
        ensureAnimationLoop();
        reportFailedToHost(reason);
      }

      function clearStage() {
        finishStage("cleared", "cleared");
        addRibbon("LAST AUCTION CLEARED", "#9ff9ff");
        for (let index = 0; index < 14; index += 1) {
          const angle = (index / 14) * Math.PI * 2;
          state.particles.push({
            x: VIEW.width * 0.5,
            y: VIEW.height * 0.48,
            vx: Math.cos(angle) * rand(50, 180),
            vy: Math.sin(angle) * rand(50, 180),
            life: 1.5,
            maxLife: 1.5,
            radius: rand(4, 9),
            color: pick(["#9ef7ff", "#7be1ff", "#8dffd4", "#ffe086"]),
          });
        }
        ensureAnimationLoop();
        reportClearedToHost();
      }

      function chooseLaneByWeights(weights) {
        const total = weights.reduce((sum, value) => sum + value, 0);
        let remaining = Math.random() * total;
        for (let index = 0; index < weights.length; index += 1) {
          remaining -= weights[index];
          if (remaining <= 0) {
            return index;
          }
        }
        return weights.length - 1;
      }

      function spawnEnemy() {
        const wave = getWave();
        const lane = chooseLaneByWeights(wave.weights);
        const point = getLanePoint(lane, -0.08);
        const enemy = {
          lane,
          wave: state.waveIndex,
          t: -0.08,
          hp: wave.hp * rand(0.9, 1.08),
          speed: wave.speed * rand(0.94, 1.08),
          damage: wave.damage,
          radius: rand(14, 20),
          wobble: rand(0, Math.PI * 2),
          tint: wave.tint,
          flash: 0,
          slowTimer: 0,
          x: point.x,
          y: point.y,
        };
        state.enemies.push(enemy);
        spawnParticles(point.x, point.y, wave.tint, 6, 70);
      }

      function handleWaveProgress(dt) {
        if (state.waveIndex >= WAVES.length) {
          return;
        }

        const wave = getWave();
        if (state.waveSpawned < wave.count) {
          state.waveSpawnTimer -= dt;
          while (state.waveSpawnTimer <= 0 && state.waveSpawned < wave.count) {
            spawnEnemy();
            state.waveSpawned += 1;
            state.waveSpawnTimer += wave.interval * rand(0.82, 1.12);
          }
        } else {
          const sameWaveAlive = state.enemies.some((enemy) => enemy.wave === state.waveIndex);
          if (!sameWaveAlive) {
            state.waveTransition += dt;
            if (state.waveTransition > 0.85) {
              if (state.waveIndex === WAVES.length - 1) {
                clearStage();
              } else {
                startWave(state.waveIndex + 1);
              }
            }
          }
        }
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.lastRunTime = state.elapsed;
        state.beatClock += dt;
        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.beatFlash = Math.max(0, state.beatFlash - dt * 2.4);
        state.offbeatFlash = Math.max(0, state.offbeatFlash - dt * 1.8);
        state.perfectFlash = Math.max(0, state.perfectFlash - dt * 1.55);
        if (state.noticeTimer > 0) {
          state.noticeTimer = Math.max(0, state.noticeTimer - dt);
        }

        const drainRate = 0.34 + state.waveIndex * 0.05;
        spendTime(dt * drainRate);
        if (state.mode !== "running") {
          return;
        }

        handleWaveProgress(dt);

        for (const bubble of state.bubbles) {
          bubble.y -= bubble.speed * dt;
          bubble.x += Math.sin((state.elapsed + bubble.y * 0.01) * 1.4) * bubble.drift * dt;
          if (bubble.y < -30) {
            bubble.y = VIEW.height + rand(4, 80);
            bubble.x = rand(64, VIEW.width - 64);
          }
        }

        for (const device of state.slotDevices) {
          if (!device) {
            continue;
          }
          device.flash = Math.max(0, device.flash - dt * 1.8);
        }

        for (const enemy of state.enemies) {
          const device = state.slotDevices[enemy.lane];
          const slowFactor =
            device && device.slow < 1 && enemy.slowTimer > 0 ? device.slow : 1;
          enemy.slowTimer = Math.max(0, enemy.slowTimer - dt);
          enemy.t += dt * enemy.speed * slowFactor;
          enemy.wobble += dt * 4.5;
          enemy.flash = Math.max(0, enemy.flash - dt * 4);
          const point = getLanePoint(enemy.lane, enemy.t);
          enemy.x = point.x + Math.sin(enemy.wobble) * 4;
          enemy.y = point.y + Math.cos(enemy.wobble * 0.8) * 2;

          if (enemy.t >= 1) {
            state.coreIntegrity = clamp(
              state.coreIntegrity - Math.max(3, enemy.damage - (device?.passiveShield || 0)),
              0,
              100
            );
            enemy.dead = true;
            spawnParticles(LANES[enemy.lane].core.x, LANES[enemy.lane].core.y, "#ffd5df", 14, 160);
            addPopup("CRACK", LANES[enemy.lane].core.x, LANES[enemy.lane].core.y - 40, "#ffb5c4");
            state.screenShake = Math.max(state.screenShake, 18);
            if (state.coreIntegrity <= 0) {
              failStage("core-broken");
            }
          }
        }

        state.enemies = state.enemies.filter((enemy) => !enemy.dead);

        if (
          pointer.down &&
          pointer.action === "card" &&
          pointer.cardId &&
          !pointer.dragging &&
          !pointer.longPressFired &&
          state.mode === "running"
        ) {
          const heldSec = performance.now() * 0.001 - pointer.startTime;
          if (heldSec > 0.45) {
            const lot = getSelectedLot();
            if (lot && deploySelectedToLane(state.recommendedLane, true)) {
              pointer.longPressFired = true;
              pointer.action = "idle";
            }
          }
        }

        for (const particle of state.particles) {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vy += 30 * dt;
          particle.life -= dt;
        }
        state.particles = state.particles.filter((particle) => particle.life > 0);

        for (const popup of state.popups) {
          popup.y -= 42 * dt;
          popup.life -= dt;
        }
        state.popups = state.popups.filter((popup) => popup.life > 0);

        for (const ribbon of state.ribbons) {
          ribbon.life -= dt;
        }
        state.ribbons = state.ribbons.filter((ribbon) => ribbon.life > 0);
      }

      function updateEndState(dt) {
        state.resultPulse = Math.max(0, state.resultPulse - dt * 0.8);
        state.screenShake = Math.max(0, state.screenShake - dt * 20);
        state.beatClock += dt * 0.4;
        for (const bubble of state.bubbles) {
          bubble.y -= bubble.speed * dt * 0.4;
          if (bubble.y < -30) {
            bubble.y = VIEW.height + rand(4, 80);
            bubble.x = rand(64, VIEW.width - 64);
          }
        }
        for (const particle of state.particles) {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vy += 18 * dt;
          particle.life -= dt;
        }
        state.particles = state.particles.filter((particle) => particle.life > 0);
        for (const popup of state.popups) {
          popup.y -= 20 * dt;
          popup.life -= dt;
        }
        state.popups = state.popups.filter((popup) => popup.life > 0);
        for (const ribbon of state.ribbons) {
          ribbon.life -= dt;
        }
        state.ribbons = state.ribbons.filter((ribbon) => ribbon.life > 0);
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else if (state.mode === "failed" || state.mode === "cleared") {
          updateEndState(dt);
        }
      }

      function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
        if (fillStyle) {
          ctx.fillStyle = fillStyle;
          ctx.fill();
        }
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.stroke();
        }
      }

      function drawBackground() {
        const base = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        base.addColorStop(0, "#07263d");
        base.addColorStop(0.48, "#09344d");
        base.addColorStop(1, "#03111d");
        ctx.fillStyle = base;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const glow = ctx.createRadialGradient(
          VIEW.width * 0.5,
          VIEW.height * 0.16,
          40,
          VIEW.width * 0.5,
          VIEW.height * 0.16,
          420
        );
        glow.addColorStop(0, "rgba(167, 247, 255, 0.3)");
        glow.addColorStop(1, "rgba(167, 247, 255, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.12;
        for (let index = 0; index < 3; index += 1) {
          ctx.fillStyle = index % 2 ? "#6bdcff" : "#94f4ff";
          const y = 76 + index * 108;
          ctx.beginPath();
          ctx.ellipse(
            VIEW.width * 0.5 + Math.sin(state.elapsed * 0.6 + index) * 120,
            y + Math.sin(state.elapsed * 1.2 + index * 0.6) * 10,
            180,
            18,
            0,
            0,
            Math.PI * 2
          );
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(220, 248, 255, 0.24)";
        ctx.lineWidth = 8;
        drawRoundedRect(24, 18, VIEW.width - 48, VIEW.height - 36, 28, null, ctx.strokeStyle);
        ctx.restore();

        ctx.save();
        for (const bubble of state.bubbles) {
          ctx.globalAlpha = bubble.alpha;
          ctx.beginPath();
          ctx.fillStyle = "#dbf8ff";
          ctx.arc(bubble.x, bubble.y, bubble.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(219, 248, 255, 0.5)";
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawLanes() {
        for (const lane of LANES) {
          ctx.save();
          ctx.strokeStyle = lane.glass;
          ctx.lineWidth = 24;
          ctx.globalAlpha = 0.14;
          ctx.beginPath();
          ctx.moveTo(lane.spawn.x, lane.spawn.y);
          ctx.quadraticCurveTo(lane.curveA.x, lane.curveA.y, lane.curveB.x, lane.curveB.y);
          ctx.quadraticCurveTo(lane.curveB.x, lane.curveB.y, lane.core.x, lane.core.y);
          ctx.stroke();

          ctx.globalAlpha = 0.38;
          ctx.lineWidth = 7;
          ctx.stroke();

          ctx.fillStyle = "rgba(222, 247, 255, 0.7)";
          ctx.beginPath();
          ctx.arc(lane.spawn.x, lane.spawn.y, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          const slotRect = getSlotRect(lane.id);
          const selected = lane.id === state.recommendedLane && state.mode === "running";
          drawRoundedRect(
            slotRect.x,
            slotRect.y,
            slotRect.width,
            slotRect.height,
            24,
            selected ? "rgba(178, 246, 255, 0.12)" : "rgba(4, 21, 33, 0.28)",
            selected ? "rgba(178, 246, 255, 0.58)" : "rgba(196, 241, 255, 0.22)"
          );

          ctx.fillStyle = "rgba(224, 248, 255, 0.75)";
          ctx.font = "700 12px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(lane.label, slotRect.x + slotRect.width * 0.5, slotRect.y + slotRect.height + 16);
        }
      }

      function drawDevices() {
        for (let laneIndex = 0; laneIndex < state.slotDevices.length; laneIndex += 1) {
          const device = state.slotDevices[laneIndex];
          if (!device) {
            continue;
          }
          const slot = LANES[laneIndex].slot;
          const flash = device.flash;
          ctx.save();
          ctx.translate(slot.x, slot.y);
          const glass = ctx.createLinearGradient(-36, -30, 36, 32);
          glass.addColorStop(0, "rgba(247, 253, 255, 0.96)");
          glass.addColorStop(1, device.color);
          ctx.fillStyle = glass;
          ctx.beginPath();
          ctx.moveTo(-28, 30);
          ctx.lineTo(-10, -30);
          ctx.lineTo(14, -30);
          ctx.lineTo(32, 30);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "rgba(8, 26, 40, 0.34)";
          ctx.fillRect(-12, -8, 24, 32);
          ctx.restore();

          ctx.fillStyle = "rgba(239, 252, 255, 0.86)";
          ctx.font = "700 13px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(device.name, slot.x, slot.y + 58);
        }
      }

      function drawEnemies() {
        for (const enemy of state.enemies) {
          ctx.save();
          ctx.translate(enemy.x, enemy.y);
          ctx.globalAlpha = 0.95;
          ctx.fillStyle = enemy.flash > 0 ? "rgba(255,255,255,0.35)" : "rgba(160, 238, 255, 0.16)";
          ctx.beginPath();
          ctx.arc(0, 0, enemy.radius * 1.8, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.fillStyle = "rgba(242, 250, 255, 0.9)";
          ctx.arc(0, 0, enemy.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(10, 34, 49, 0.25)";
          ctx.lineWidth = 3;
          ctx.stroke();

          ctx.strokeStyle = "rgba(11, 51, 70, 0.35)";
          ctx.lineWidth = 2;
          for (let index = 0; index < 3; index += 1) {
            ctx.beginPath();
            ctx.arc(0, 0, enemy.radius - 4 - index * 4, 0.8, 2.3);
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      function drawCore() {
        const center = { x: VIEW.width * 0.5, y: 350 };
        const beatPhase = getBeatPhase();
        const ringRadius = lerp(18, 86, beatPhase);
        const sweetRadius = lerp(18, 86, BEAT_TARGET);
        const coreGradient = ctx.createRadialGradient(center.x, center.y, 12, center.x, center.y, 84);
        coreGradient.addColorStop(0, "#f8feff");
        coreGradient.addColorStop(0.45, "#8ef2ff");
        coreGradient.addColorStop(1, "rgba(142, 242, 255, 0)");
        ctx.fillStyle = coreGradient;
        ctx.beginPath();
        ctx.arc(center.x, center.y, 78 + state.perfectFlash * 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.globalAlpha = 0.38 + state.beatFlash * 0.2;
        ctx.strokeStyle = "#c4f9ff";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(center.x, center.y, sweetRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.7 - beatPhase * 0.45;
        ctx.strokeStyle = state.offbeatFlash > 0 ? "#ff96a9" : "#9bf4ff";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(center.x, center.y, ringRadius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        const integrityGradient = ctx.createLinearGradient(center.x - 40, center.y - 40, center.x + 40, center.y + 40);
        integrityGradient.addColorStop(0, "#ffffff");
        integrityGradient.addColorStop(1, state.offbeatFlash > 0 ? "#ffb3c3" : "#7de8ff");
        ctx.fillStyle = integrityGradient;
        ctx.beginPath();
        ctx.arc(center.x, center.y, 42 + state.perfectFlash * 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#043249";
        ctx.font = "800 15px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("CORE", center.x, center.y + 6);

        const beatRect = getBeatRect();
        drawRoundedRect(
          beatRect.x,
          beatRect.y,
          beatRect.width,
          beatRect.height,
          26,
          "rgba(5, 22, 35, 0.44)",
          "rgba(171, 241, 255, 0.38)"
        );
        ctx.fillStyle = "#f0fdff";
        ctx.font = "800 24px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("PULSE", beatRect.x + beatRect.width * 0.5, beatRect.y + 40);
        ctx.font = "700 13px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "rgba(240, 253, 255, 0.75)";
        ctx.fillText("링이 맞을 때 터치", beatRect.x + beatRect.width * 0.5, beatRect.y + 66);
        ctx.fillText("ENTER / SPACE", beatRect.x + beatRect.width * 0.5, beatRect.y + 84);
      }

      function drawAuctionCards() {
        ctx.textAlign = "left";
        for (let index = 0; index < state.auctionLots.length; index += 1) {
          const lot = state.auctionLots[index];
          const rect = lot.rect;
          const selected = lot.id === state.selectedLotId;
          const dragging = pointer.dragging && pointer.cardId === lot.id;
          if (dragging) {
            continue;
          }
          ctx.save();
          ctx.shadowColor = selected ? lot.color : "rgba(0,0,0,0.18)";
          ctx.shadowBlur = selected ? 24 : 14;
          const fill = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y + rect.height);
          fill.addColorStop(0, "rgba(8, 25, 38, 0.9)");
          fill.addColorStop(1, "rgba(18, 45, 68, 0.72)");
          drawRoundedRect(
            rect.x,
            rect.y,
            rect.width,
            rect.height,
            26,
            fill,
            selected ? lot.color : "rgba(181, 239, 255, 0.22)"
          );

          ctx.fillStyle = lot.color;
          ctx.fillRect(rect.x + 14, rect.y + 14, 6, rect.height - 28);
          ctx.fillStyle = "#f0fdff";
          ctx.font = "800 20px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(lot.name, rect.x + 28, rect.y + 30);
          ctx.font = "700 12px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillStyle = "rgba(240, 253, 255, 0.72)";
          ctx.fillText(lot.tag, rect.x + 28, rect.y + 48);
          ctx.fillText(lot.desc, rect.x + 28, rect.y + 65);
          ctx.textAlign = "right";
          ctx.fillStyle = lot.color;
          ctx.font = "800 22px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(`${lot.cost.toFixed(1)}s`, rect.x + rect.width - 16, rect.y + 42);
          ctx.font = "700 11px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillStyle = "rgba(240, 253, 255, 0.68)";
          ctx.fillText("hold = instant", rect.x + rect.width - 16, rect.y + 63);
          ctx.restore();
          ctx.textAlign = "left";
        }

        if (pointer.dragging && pointer.cardId) {
          const lot = getSelectedLot();
          if (lot) {
            ctx.save();
            ctx.globalAlpha = 0.92;
            drawRoundedRect(
              pointer.x - 92,
              pointer.y - 42,
              184,
              84,
              24,
              "rgba(8, 26, 38, 0.86)",
              lot.color
            );
            ctx.fillStyle = "#f4fdff";
            ctx.font = "800 19px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(lot.name, pointer.x, pointer.y - 6);
            ctx.font = "700 13px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
            ctx.fillStyle = lot.color;
            ctx.fillText(`${lot.cost.toFixed(1)}s`, pointer.x, pointer.y + 18);
            ctx.restore();
          }
        }
      }

      function drawHud() {
        drawRoundedRect(28, 24, 186, 94, 24, "rgba(4, 19, 30, 0.45)", "rgba(193, 242, 255, 0.22)");
        drawRoundedRect(28, 126, 186, 84, 24, "rgba(4, 19, 30, 0.36)", "rgba(193, 242, 255, 0.18)");

        ctx.fillStyle = "#eefdff";
        ctx.textAlign = "left";
        ctx.font = "800 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText("TIME BALANCE", 44, 50);
        ctx.font = "800 34px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = state.timeBalance < 8 ? "#ff9eb0" : "#9ef7ff";
        ctx.fillText(`${state.timeBalance.toFixed(1)}s`, 44, 86);

        const timeRatio = state.timeBalance / MAX_TIME_BALANCE;
        ctx.fillStyle = "rgba(240, 253, 255, 0.12)";
        ctx.fillRect(44, 94, 146, 8);
        ctx.fillStyle = state.timeBalance < 8 ? "#ff8aa0" : "#8ef3ff";
        ctx.fillRect(44, 94, 146 * timeRatio, 8);

        ctx.fillStyle = "#eefdff";
        ctx.font = "800 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText("CORE GLASS", 44, 150);
        ctx.font = "800 32px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = state.coreIntegrity < 35 ? "#ff9fb4" : "#b8ffef";
        ctx.fillText(`${Math.round(state.coreIntegrity)}%`, 44, 184);

        drawRoundedRect(746, 26, 186, 94, 24, "rgba(4, 19, 30, 0.45)", "rgba(193, 242, 255, 0.22)");
        ctx.textAlign = "right";
        ctx.fillStyle = "#eefdff";
        ctx.font = "800 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText("AUCTION", 916, 50);
        ctx.font = "800 34px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#ffe08b";
        ctx.fillText(`${Math.min(state.waveIndex + 1, WAVES.length)} / ${WAVES.length}`, 916, 86);
        ctx.font = "700 12px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "rgba(240, 253, 255, 0.7)";
        ctx.fillText(getWave().name, 916, 104);

        drawRoundedRect(746, 128, 186, 84, 24, "rgba(4, 19, 30, 0.36)", "rgba(193, 242, 255, 0.18)");
        ctx.font = "800 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#eefdff";
        ctx.fillText("OFF-BEAT", 916, 152);
        ctx.font = "800 32px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = state.misbeatStreak > 0 ? "#ff9bb0" : "#9af2ff";
        ctx.fillText(`${state.misbeatStreak} / 3`, 916, 186);
        ctx.textAlign = "left";

        if (state.noticeTimer > 0 && state.notice) {
          ctx.textAlign = "center";
          ctx.globalAlpha = clamp(state.noticeTimer / 0.3, 0, 1);
          drawRoundedRect(
            VIEW.width * 0.5 - 170,
            126,
            340,
            38,
            20,
            "rgba(4, 22, 35, 0.55)",
            "rgba(194, 242, 255, 0.22)"
          );
          ctx.fillStyle = state.noticeColor;
          ctx.font = "800 15px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(state.notice, VIEW.width * 0.5, 151);
          ctx.globalAlpha = 1;
          ctx.textAlign = "left";
        }
      }

      function drawParticlesAndPopups() {
        for (const particle of state.particles) {
          ctx.save();
          ctx.globalAlpha = particle.life / particle.maxLife;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        ctx.textAlign = "center";
        for (const popup of state.popups) {
          ctx.save();
          ctx.globalAlpha = popup.life / popup.maxLife;
          ctx.fillStyle = popup.color;
          ctx.font = "800 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        }

        let ribbonY = 182;
        for (const ribbon of state.ribbons) {
          const t = clamp(ribbon.life / ribbon.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = t;
          drawRoundedRect(
            VIEW.width * 0.5 - 112,
            ribbonY,
            224,
            26,
            14,
            "rgba(7, 27, 41, 0.48)",
            "rgba(194, 242, 255, 0.16)"
          );
          ctx.fillStyle = ribbon.color;
          ctx.font = "800 14px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(ribbon.text, VIEW.width * 0.5, ribbonY + 18);
          ctx.restore();
          ribbonY += 32;
        }
        ctx.textAlign = "left";
      }

      function wrapText(text, x, y, maxWidth, lineHeight) {
        const words = String(text).split(" ");
        let line = "";
        let offsetY = 0;
        for (const word of words) {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, y + offsetY);
            line = word;
            offsetY += lineHeight;
          } else {
            line = test;
          }
        }
        if (line) {
          ctx.fillText(line, x, y + offsetY);
        }
      }

      function drawMenuOverlay() {
        ctx.save();
        ctx.fillStyle = "rgba(2, 12, 22, 0.48)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        drawRoundedRect(
          108,
          66,
          VIEW.width - 216,
          VIEW.height - 132,
          34,
          "rgba(4, 20, 33, 0.68)",
          "rgba(190, 243, 255, 0.34)"
        );

        ctx.textAlign = "center";
        ctx.fillStyle = "#f3fdff";
        ctx.font = "800 42px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText(STAGE_TITLE, VIEW.width * 0.5, 132);
        ctx.font = "700 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "#a8f2ff";
        ctx.fillText("유리 수족관 시장에서 시간을 경매 자원으로 태운다", VIEW.width * 0.5, 168);

        ctx.textAlign = "left";
        ctx.fillStyle = "rgba(240, 253, 255, 0.92)";
        ctx.font = "700 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText(STAGE_DESCRIPTION, 152, 220);

        const sections = [
          { title: "조작", text: STAGE_CONTROLS, color: "#9ef7ff" },
          { title: "클리어", text: STAGE_CLEAR, color: "#b8ffd4" },
          { title: "실패", text: STAGE_FAIL, color: "#ffb1c0" },
        ];

        sections.forEach((section, index) => {
          const x = 150;
          const y = 256 + index * 82;
          drawRoundedRect(
            x,
            y,
            VIEW.width - 300,
            62,
            22,
            "rgba(9, 30, 45, 0.5)",
            "rgba(185, 240, 255, 0.16)"
          );
          ctx.fillStyle = section.color;
          ctx.font = "800 16px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(section.title, x + 18, y + 22);
          ctx.fillStyle = "rgba(240, 253, 255, 0.84)";
          ctx.font = "700 15px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          wrapText(section.text, x + 18, y + 44, VIEW.width - 338, 18);
        });

        ctx.textAlign = "center";
        ctx.fillStyle = "#ffe08b";
        ctx.font = "800 20px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText("터치 또는 클릭으로 시작 · 드래그로 낙찰 장비 배치", VIEW.width * 0.5, 482);
        ctx.font = "700 14px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillStyle = "rgba(240, 253, 255, 0.68)";
        ctx.fillText("길게 누르면 추천 레인에 즉시 입찰, 링이 겹칠 때 코어를 눌러 파동 발동", VIEW.width * 0.5, 506);
        ctx.restore();
      }

      function failureLabel(reason) {
        if (reason === "tempo-broken") {
          return "박자 이탈이 연속으로 누적됐습니다";
        }
        if (reason === "time-empty") {
          return "시간 잔고가 바닥났습니다";
        }
        if (reason === "core-broken") {
          return "코어가 파괴되었습니다";
        }
        return "유리 수족관이 버티지 못했습니다";
      }

      function drawEndOverlay() {
        const cleared = state.mode === "cleared";
        ctx.save();
        ctx.fillStyle = cleared ? "rgba(3, 14, 24, 0.38)" : "rgba(16, 4, 12, 0.42)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardY = 108 - Math.sin(state.resultPulse * Math.PI) * 8;
        drawRoundedRect(
          170,
          cardY,
          VIEW.width - 340,
          324,
          34,
          "rgba(5, 21, 34, 0.74)",
          cleared ? "rgba(157, 247, 255, 0.42)" : "rgba(255, 171, 191, 0.42)"
        );

        ctx.textAlign = "center";
        ctx.fillStyle = cleared ? "#9ef8ff" : "#ffb1c0";
        ctx.font = "800 42px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText(cleared ? "MARKET STABLE" : "AQUARIUM BREACH", VIEW.width * 0.5, cardY + 72);
        ctx.fillStyle = "#f1fdff";
        ctx.font = "800 24px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText(cleared ? "마지막 경매를 넘겼습니다" : failureLabel(state.reason), VIEW.width * 0.5, cardY + 112);

        const stats = [
          { label: "남은 시간", value: `${state.timeBalance.toFixed(1)}s`, color: "#9ef7ff" },
          { label: "코어 무결성", value: `${Math.round(state.coreIntegrity)}%`, color: "#b8ffd7" },
          { label: "생존 경매", value: `${Math.min(state.waveIndex + (cleared ? 1 : 0), WAVES.length)} / ${WAVES.length}`, color: "#ffe08b" },
        ];

        stats.forEach((stat, index) => {
          const x = 208 + index * 190;
          drawRoundedRect(x, cardY + 146, 162, 88, 24, "rgba(9, 29, 44, 0.6)", "rgba(193, 242, 255, 0.16)");
          ctx.fillStyle = "rgba(240, 253, 255, 0.72)";
          ctx.font = "700 15px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(stat.label, x + 81, cardY + 176);
          ctx.fillStyle = stat.color;
          ctx.font = "800 28px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
          ctx.fillText(stat.value, x + 81, cardY + 212);
        });

        drawRoundedRect(
          VIEW.width * 0.5 - 150,
          cardY + 254,
          300,
          42,
          20,
          cleared ? "rgba(110, 236, 255, 0.18)" : "rgba(255, 148, 175, 0.16)",
          cleared ? "rgba(157, 247, 255, 0.34)" : "rgba(255, 171, 191, 0.34)"
        );
        ctx.fillStyle = "#f1fdff";
        ctx.font = "800 18px 'Avenir Next Condensed', 'Trebuchet MS', sans-serif";
        ctx.fillText("터치 또는 Enter로 재도전", VIEW.width * 0.5, cardY + 282);
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        const shakeX = (Math.random() - 0.5) * state.screenShake;
        const shakeY = (Math.random() - 0.5) * state.screenShake;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawLanes();
        drawDevices();
        drawEnemies();
        drawCore();
        drawAuctionCards();
        drawHud();
        drawParticlesAndPopups();
        ctx.restore();

        if (state.mode === "menu") {
          drawMenuOverlay();
        }
        if (state.mode === "failed" || state.mode === "cleared") {
          drawEndOverlay();
        }
      }

      function ensureAnimationLoop() {
        if (loopActive) {
          return;
        }
        loopActive = true;
        lastTimestamp = 0;
        animationFrame = window.requestAnimationFrame(frame);
      }

      function frame(timestamp) {
        const deltaMs = lastTimestamp ? timestamp - lastTimestamp : 16.67;
        lastTimestamp = timestamp;
        const shouldAnimate =
          state.mode === "running" ||
          state.resultPulse > 0.01 ||
          state.noticeTimer > 0.01 ||
          state.beatFlash > 0.01 ||
          state.offbeatFlash > 0.01;
        if (shouldAnimate && !document.hidden) {
          update(Math.min(MAX_DT, deltaMs / 1000));
        }
        render();
        if (shouldAnimate) {
          animationFrame = window.requestAnimationFrame(frame);
        } else {
          loopActive = false;
          animationFrame = 0;
          lastTimestamp = 0;
        }
      }

      function positionFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function handlePrimaryAction(point) {
        if (state.mode === "menu") {
          startStage();
          return;
        }
        if (state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        if (state.mode !== "running") {
          return;
        }

        const selected = getSelectedLot();
        const card = getCardAt(point);
        const slotIndex = getSlotAt(point);
        const beatRect = getBeatRect();
        const corePoint = { x: VIEW.width * 0.5, y: 350 };
        const overBeat = pointInRect(point, beatRect) || distance(point, corePoint) < 92;

        if (card) {
          state.selectedLotId = card.id;
          state.recommendedLane = getRecommendedLane();
          return;
        }

        if (slotIndex >= 0 && selected) {
          deploySelectedToLane(slotIndex, false);
          return;
        }

        if (overBeat) {
          triggerBeat();
        }
      }

      function onPointerDown(event) {
        const point = positionFromEvent(event);
        canvas.focus({ preventScroll: true });
        pointer.down = true;
        pointer.id = event.pointerId;
        pointer.x = point.x;
        pointer.y = point.y;
        pointer.startX = point.x;
        pointer.startY = point.y;
        pointer.startTime = performance.now() * 0.001;
        pointer.cardId = null;
        pointer.dragging = false;
        pointer.longPressFired = false;
        pointer.action = "tap";
        canvas.setPointerCapture?.(event.pointerId);

        if (state.mode !== "running") {
          handlePrimaryAction(point);
          return;
        }

        const card = getCardAt(point);
        if (card) {
          pointer.action = "card";
          pointer.cardId = card.id;
          state.selectedLotId = card.id;
          state.recommendedLane = getRecommendedLane();
          return;
        }

        handlePrimaryAction(point);
      }

      function onPointerMove(event) {
        if (!pointer.down || pointer.id !== event.pointerId) {
          return;
        }
        const point = positionFromEvent(event);
        pointer.x = point.x;
        pointer.y = point.y;
        if (pointer.action === "card" && pointer.cardId) {
          const moved = Math.hypot(point.x - pointer.startX, point.y - pointer.startY);
          if (moved > 10) {
            pointer.dragging = true;
          }
          const slotIndex = getSlotAt(point);
          if (slotIndex >= 0) {
            state.recommendedLane = slotIndex;
          }
        }
      }

      function onPointerUp(event) {
        if (pointer.id !== null && pointer.id !== event.pointerId) {
          return;
        }
        const point = positionFromEvent(event);
        if (state.mode === "running" && pointer.action === "card" && pointer.cardId && !pointer.longPressFired) {
          if (pointer.dragging) {
            const slotIndex = getSlotAt(point);
            if (slotIndex >= 0) {
              deploySelectedToLane(slotIndex, false);
            }
          } else {
            const slotIndex = getSlotAt(point);
            if (slotIndex >= 0 && getSelectedLot()) {
              deploySelectedToLane(slotIndex, false);
            } else {
              state.selectedLotId = pointer.cardId;
              state.recommendedLane = getRecommendedLane();
            }
          }
        }
        pointer.down = false;
        pointer.id = null;
        pointer.cardId = null;
        pointer.dragging = false;
        pointer.longPressFired = false;
        pointer.action = "idle";
      }

      function onKeyDown(event) {
        if (event.repeat) {
          return;
        }
        if (event.code === "Enter" || event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            triggerBeat();
          } else {
            startStage();
          }
          return;
        }

        if (state.mode !== "running") {
          return;
        }

        if (event.code === "Digit1" || event.code === "Digit2" || event.code === "Digit3") {
          const index = Number(event.code.slice(-1)) - 1;
          if (state.auctionLots[index]) {
            state.selectedLotId = state.auctionLots[index].id;
            state.recommendedLane = getRecommendedLane();
          }
        }

        const laneMap = {
          KeyQ: 0,
          KeyW: 1,
          KeyE: 2,
        };
        if (laneMap[event.code] !== undefined && getSelectedLot()) {
          deploySelectedToLane(laneMap[event.code], false);
        }
      }

      function renderGameToText() {
        const beatPhase = getBeatPhase();
        const selectedLot = getSelectedLot();
        return JSON.stringify({
          mode: state.mode,
          note: "origin=(0,0) top-left, x right, y down",
          wave: `${Math.min(state.waveIndex + (state.mode === "cleared" ? 1 : 0), WAVES.length)}/${WAVES.length}`,
          timeBalance: Number(state.timeBalance.toFixed(1)),
          coreIntegrity: Math.round(state.coreIntegrity),
          misbeatStreak: state.misbeatStreak,
          beat: {
            phase: Number(beatPhase.toFixed(2)),
            target: BEAT_TARGET,
            window: Number(getBeatWindow().toFixed(2)),
          },
          selectedLot: selectedLot
            ? {
                name: selectedLot.name,
                cost: selectedLot.cost,
                recommendedLane: state.recommendedLane,
              }
            : null,
          auctionLots: state.auctionLots.map((lot) => ({
            name: lot.name,
            cost: lot.cost,
            tag: lot.tag,
          })),
          devices: state.slotDevices.map((device, lane) =>
            device
              ? {
                  lane,
                  name: device.name,
                }
              : null
          ),
          enemies: state.enemies.slice(0, 8).map((enemy) => ({
            lane: enemy.lane,
            t: Number(enemy.t.toFixed(2)),
            hp: Math.round(enemy.hp),
          })),
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageMeta = {
        id: "glass-aquarium-debt-auction-tempo",
        title: STAGE_TITLE,
        description: STAGE_DESCRIPTION,
        creator: "jungcollin",
        genre: "Risk market defense / 템포 윈도우",
        clearCondition: STAGE_CLEAR,
        failCondition: STAGE_FAIL,
        controls: STAGE_CONTROLS,
      };

      window.relayStageResult = { status: "menu" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.timeBalance = Math.max(state.timeBalance, 11.4);
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("debug");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerUp);
      canvas.addEventListener("pointerleave", onPointerUp);
      window.addEventListener("keydown", onKeyDown);
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden && state.mode === "running") {
          ensureAnimationLoop();
        }
      });

      resetState();
      render();
      reportReadyToHost();
    </script>
  </body>
</html>
