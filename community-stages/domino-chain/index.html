<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>도미노 연쇄</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:"Trebuchet MS","Segoe UI",sans-serif; background:#1c1824; }
      body { display:grid; place-items:center; }
      a, canvas { -webkit-tap-highlight-color: rgba(148,163,184,0.2); }
      .skip-link { position:absolute; top:12px; left:12px; z-index:10; width:1px; height:1px; padding:0; overflow:hidden; clip:rect(0,0,0,0); clip-path:inset(50%); border-radius:999px; background:rgba(30,30,60,0.92); color:#f5f0e8; font-weight:800; text-decoration:none; white-space:nowrap; transition:transform 0.15s ease; }
      .skip-link:focus, .skip-link:focus-visible { width:auto; height:auto; padding:12px 16px; overflow:visible; clip:auto; clip-path:none; }
      .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
      canvas { display:block; width:100%; height:100%; background:#1c1824; touch-action:none; }
      canvas:focus-visible { outline:4px solid rgba(100,120,200,0.6); outline-offset:-8px; }
      @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; scroll-behavior:auto!important; } }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">도미노 연쇄. 도미노가 쓰러지기 전에 빈칸을 터치하세요.</p>
    <canvas id="game" width="960" height="540" aria-label="도미노 연쇄" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
    "use strict";
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    let W, H, CX, CY;
    const FIXED_DT = 1/60, MAX_DT = 1/20;
    const relayCtx = window.RelayRuntime?.readContext("domino-chain") || { history:[], clearCount:0, previousStageId:null };

    const C = {
      bg1:"#1c1824", bg2:"#252030", bg3:"#302840",
      domino:"#f0ece4", dominoSide:"#d8d0c4", dominoShadow:"#8a8070",
      dominoFall:"#e8e0d0",
      gap:"#e06060", gapGlow:"rgba(224,96,96,0.25)", gapReady:"#50c878",
      table:"#3a3048", tableLine:"rgba(255,255,255,0.04)",
      text:"#e8e0d0", textDim:"#7a7080", accent:"#6080d0",
      success:"#50c878", fail:"#e05050", gold:"#f0d060",
    };

    /* ── config ── */
    const TIME_LIMIT = 50;
    const TARGET_ROUNDS = 5;
    const MAX_MISSES = 3;
    // Per-round config: [domino count, gap count, chain speed (dominoes/sec)]
    const ROUNDS = [
      { count: 10, gaps: 2, speed: 4 },
      { count: 12, gaps: 3, speed: 5 },
      { count: 14, gaps: 3, speed: 6 },
      { count: 14, gaps: 4, speed: 7 },
      { count: 16, gaps: 4, speed: 8 },
    ];

    /* ── state ── */
    let mode = "menu", elapsed = 0, lastRunTime = 0;
    let hostFailedReported = false, hostClearedReported = false;
    let animFrame = 0, lastTs = 0, menuAnim = 0;
    let round = 0, misses = 0;
    let dominoes = []; // {x, y, state: "standing"|"falling"|"fallen"|"gap"|"placed", angle, fallProgress}
    let chainHead = -1; // index of current chain front
    let chainTimer = 0;
    let phase = "ready"; // ready -> chain -> result
    let readyTimer = 0;
    let shakeTimer = 0, shakeIntensity = 0;
    let particles = [];
    let resultTimer = 0, resultSuccess = false;
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* ── layout ── */
    let dominoW, dominoH, tableY, tableH, spacing;
    function calcLayout() {
      CX = W / 2; CY = H / 2;
      dominoH = Math.min(H * 0.12, 70);
      dominoW = dominoH * 0.3;
      tableY = CY + dominoH * 0.1;
      tableH = dominoH * 0.6;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const cssW = Math.max(1, rect.width || window.innerWidth);
      const cssH = Math.max(1, rect.height || window.innerHeight);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = cssW; H = cssH;
      calcLayout();
    }

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
    function easeOut(t) { return 1 - (1 - t) * (1 - t); }

    /* ── relay ── */
    window.relayStageMeta = {
      id: "domino-chain", title: "도미노 연쇄",
      description: "도미노가 쓰러지기 전에 빈칸을 터치해서 연쇄를 이어가세요",
      creator: "jungcollin", genre: "Reaction timing",
      controls: "빈칸 터치로 도미노 배치",
      clearCondition: "5줄 연쇄를 모두 완성하면 클리어",
      failCondition: "시간 초과 또는 끊김 3회 시 실패",
    };
    window.relayStageResult = { status:"running" };
    function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch(e) { return false; } }
    function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
    function reportFailed(reason) { if (!inRelayHost()||hostFailedReported) return; hostFailedReported=true; window.parent.RelayHost.onStageFailed?.({stageId:"domino-chain",stageTitle:"도미노 연쇄",reason,durationSec:+lastRunTime.toFixed(1)}); }
    function reportCleared() { if (!inRelayHost()||hostClearedReported) return; hostClearedReported=true; window.parent.RelayHost.onStageCleared?.({stageId:"domino-chain",stageTitle:"도미노 연쇄",clearCountAfter:relayCtx.clearCount+1,durationSec:+lastRunTime.toFixed(1)}); }

    /* ── game flow ── */
    function generateRound() {
      const cfg = ROUNDS[Math.min(round, ROUNDS.length - 1)];
      const count = cfg.count;
      const margin = Math.max(30, W * 0.08);
      spacing = (W - margin * 2) / (count - 1);
      dominoes = [];

      // Pick gap positions (not first or last)
      const gapSet = new Set();
      while (gapSet.size < cfg.gaps) {
        gapSet.add(2 + Math.floor(Math.random() * (count - 4)));
      }

      for (let i = 0; i < count; i++) {
        const x = margin + i * spacing;
        dominoes.push({
          x, y: tableY,
          state: gapSet.has(i) ? "gap" : "standing",
          angle: 0, fallProgress: 0,
          gapWarning: 0, // visual pulse for approaching chain
        });
      }

      chainHead = -1;
      chainTimer = 0;
      phase = "ready";
      readyTimer = 1.2; // countdown before chain starts
      resultTimer = 0;
    }

    function startGame() {
      mode = "running"; elapsed = 0; lastRunTime = 0;
      round = 0; misses = 0; particles = [];
      hostFailedReported = false; hostClearedReported = false;
      window.relayStageResult.status = "running";
      shakeTimer = 0;
      generateRound();
    }

    function failGame(reason) { mode = "failed"; lastRunTime = elapsed; window.relayStageResult.status = "failed"; reportFailed(reason); }
    function clearGame() { mode = "cleared"; lastRunTime = elapsed; window.relayStageResult.status = "cleared"; reportCleared(); }

    function spawnBurst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2, spd = 50 + Math.random() * 100;
        particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 40, life: 1, decay: 1.2 + Math.random()*0.8, size: 2 + Math.random()*4, color });
      }
    }

    /* ── input ── */
    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      if (mode !== "running") { startGame(); return; }
      if (phase === "result") return;

      const r = canvas.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width * W;
      const py = (e.clientY - r.top) / r.height * H;

      // Find nearest gap
      let best = null, bestDist = spacing * 1.2;
      for (const d of dominoes) {
        if (d.state !== "gap") continue;
        const dist = Math.hypot(px - d.x, py - d.y);
        if (dist < bestDist) { bestDist = dist; best = d; }
      }
      if (best) {
        best.state = "placed";
        best.angle = 0;
        best.fallProgress = 0;
        spawnBurst(best.x, best.y - dominoH * 0.3, C.success, 8);
      }
      canvas.focus();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (mode !== "running") { startGame(); return; }
        // Space/Enter: place the nearest gap to the chain head
        if (phase === "chain") {
          let best = null, bestDist = Infinity;
          for (const d of dominoes) {
            if (d.state !== "gap") continue;
            const idx = dominoes.indexOf(d);
            if (idx > chainHead) {
              const dist = idx - chainHead;
              if (dist < bestDist) { bestDist = dist; best = d; }
            }
          }
          if (best) {
            best.state = "placed";
            best.angle = 0;
            best.fallProgress = 0;
            spawnBurst(best.x, best.y - dominoH * 0.3, C.success, 8);
          }
        }
      }
    });

    /* ── update ── */
    function update(dt) {
      menuAnim += dt;
      if (mode !== "running") {
        for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt; p.life-=p.decay*dt; }
        particles = particles.filter(p => p.life > 0);
        return;
      }
      elapsed += dt;
      if (elapsed >= TIME_LIMIT) { failGame("시간 초과"); return; }
      if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);

      if (phase === "ready") {
        readyTimer -= dt;
        if (readyTimer <= 0) {
          phase = "chain";
          chainHead = 0;
          chainTimer = 0;
          // Start first domino falling
          if (dominoes[0].state === "standing" || dominoes[0].state === "placed") {
            dominoes[0].state = "falling";
          }
        }
        // Warn gaps about approaching chain
        for (const d of dominoes) {
          if (d.state === "gap") d.gapWarning = 0.5 + 0.5 * Math.sin(menuAnim * 4);
        }
        for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt; p.life-=p.decay*dt; }
        particles = particles.filter(p => p.life > 0);
        return;
      }

      if (phase === "chain") {
        const cfg = ROUNDS[Math.min(round, ROUNDS.length - 1)];
        chainTimer += dt;
        const interval = 1 / cfg.speed;

        // Animate falling dominoes
        for (const d of dominoes) {
          if (d.state === "falling") {
            d.fallProgress += dt * cfg.speed * 2.5;
            d.angle = Math.min(Math.PI / 2.5, d.fallProgress * (Math.PI / 2.5));
            if (d.fallProgress >= 1) {
              d.state = "fallen";
              d.angle = Math.PI / 2.5;
            }
          }
        }

        // Warn upcoming gaps
        for (let i = 0; i < dominoes.length; i++) {
          const d = dominoes[i];
          if (d.state === "gap") {
            const dist = i - chainHead;
            if (dist > 0 && dist <= 3) {
              d.gapWarning = 0.5 + 0.5 * Math.sin(menuAnim * (8 - dist * 2));
            }
          }
        }

        // Advance chain
        if (chainTimer >= interval && chainHead < dominoes.length - 1) {
          chainTimer -= interval;
          const current = dominoes[chainHead];

          // Current must be fallen to advance
          if (current.state === "fallen") {
            chainHead++;
            const next = dominoes[chainHead];
            if (next.state === "gap") {
              // Chain broken!
              misses++;
              shakeTimer = 0.4; shakeIntensity = 6;
              spawnBurst(next.x, next.y - dominoH * 0.3, C.fail, 12);
              if (misses >= MAX_MISSES) {
                setTimeout(() => failGame("끊김 " + MAX_MISSES + "회"), 500);
                phase = "result";
              } else {
                phase = "result"; resultTimer = 1.2; resultSuccess = false;
              }
            } else if (next.state === "standing" || next.state === "placed") {
              next.state = "falling";
              next.fallProgress = 0;
              // Small dust
              if (!reducedMotion) spawnBurst(next.x, next.y + dominoH * 0.1, C.dominoShadow, 3);
            }
          }
        }

        // Check if chain completed
        if (chainHead >= dominoes.length - 1 && dominoes[dominoes.length - 1].state === "fallen") {
          round++;
          spawnBurst(CX, tableY - dominoH, C.gold, 20);
          if (round >= TARGET_ROUNDS) {
            setTimeout(() => clearGame(), 600);
            phase = "result"; resultSuccess = true;
          } else {
            phase = "result"; resultTimer = 1.0; resultSuccess = true;
          }
        }
      }

      if (phase === "result" && resultTimer > 0) {
        resultTimer -= dt;
        if (resultTimer <= 0 && mode === "running") {
          generateRound();
        }
      }

      for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt; p.life-=p.decay*dt; }
      particles = particles.filter(p => p.life > 0);
    }

    /* ── draw ── */
    function drawBg() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, C.bg1); g.addColorStop(0.5, C.bg2); g.addColorStop(1, C.bg3);
      ctx.fillStyle = g; ctx.fillRect(-10, -10, W + 20, H + 20);

      // Table surface
      const tTop = tableY - 4;
      const tBot = tableY + tableH;
      const tg = ctx.createLinearGradient(0, tTop, 0, tBot);
      tg.addColorStop(0, C.table); tg.addColorStop(1, "#2a2238");
      ctx.fillStyle = tg;
      ctx.fillRect(0, tTop, W, tBot - tTop);
      // Table edge line
      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(0, tTop, W, 1.5);
    }

    function drawDomino(x, y, w, h, angle, state) {
      ctx.save();
      ctx.translate(x, y);

      // Shadow
      if (state !== "fallen") {
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.beginPath();
        ctx.ellipse(Math.sin(angle) * h * 0.3, h * 0.08, w * 0.8, 3, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Rotate around bottom center
      ctx.rotate(-angle); // tilt right

      // Domino body
      const bx = -w / 2, by = -h;
      ctx.fillStyle = state === "fallen" ? C.dominoFall : C.domino;
      ctx.beginPath();
      const r = 2;
      ctx.moveTo(bx + r, by); ctx.lineTo(bx + w - r, by);
      ctx.quadraticCurveTo(bx + w, by, bx + w, by + r);
      ctx.lineTo(bx + w, by + h - r);
      ctx.quadraticCurveTo(bx + w, by + h, bx + w - r, by + h);
      ctx.lineTo(bx + r, by + h);
      ctx.quadraticCurveTo(bx, by + h, bx, by + h - r);
      ctx.lineTo(bx, by + r);
      ctx.quadraticCurveTo(bx, by, bx + r, by);
      ctx.closePath();
      ctx.fill();

      // Side edge (3D feel)
      ctx.fillStyle = C.dominoSide;
      ctx.fillRect(bx, by + h - 2, w, 2);

      // Center line
      ctx.strokeStyle = "rgba(0,0,0,0.1)";
      ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(bx + 2, by + h / 2); ctx.lineTo(bx + w - 2, by + h / 2); ctx.stroke();

      // Dots
      ctx.fillStyle = C.accent;
      const dotR = Math.max(1.5, w * 0.12);
      ctx.beginPath(); ctx.arc(0, by + h * 0.25, dotR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(-w * 0.15, by + h * 0.72, dotR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(w * 0.15, by + h * 0.72, dotR, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }

    function drawGap(x, y, w, h, warning) {
      ctx.save(); ctx.translate(x, y);

      // Pulsing glow
      const glowA = warning * 0.4;
      ctx.shadowColor = C.gap;
      ctx.shadowBlur = 10 + warning * 8;

      // Dashed outline
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = `rgba(224,96,96,${0.4 + warning * 0.4})`;
      ctx.lineWidth = 2;
      ctx.strokeRect(-w / 2, -h, w, h);
      ctx.setLineDash([]);

      // Fill glow
      ctx.fillStyle = `rgba(224,96,96,${0.05 + warning * 0.1})`;
      ctx.fillRect(-w / 2, -h, w, h);

      // "!" indicator
      ctx.shadowBlur = 0;
      ctx.fillStyle = `rgba(224,96,96,${0.5 + warning * 0.5})`;
      ctx.font = `bold ${Math.max(12, h * 0.28)}px 'Trebuchet MS',sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText("!", 0, -h * 0.35);

      ctx.restore();
    }

    function drawHUD() {
      const tl = Math.max(0, TIME_LIMIT - elapsed);
      const pad = 16;

      // Round dots
      for (let i = 0; i < TARGET_ROUNDS; i++) {
        const dx = pad + i * 24;
        ctx.beginPath(); ctx.arc(dx + 8, 24, 7, 0, Math.PI * 2);
        if (i < round) { ctx.fillStyle = C.success; ctx.fill(); }
        else if (i === round && mode === "running") { ctx.strokeStyle = C.accent; ctx.lineWidth = 2; ctx.stroke(); }
        else { ctx.strokeStyle = C.textDim; ctx.lineWidth = 1; ctx.stroke(); }
      }

      // Timer
      ctx.textAlign = "right"; ctx.fillStyle = tl < 10 ? C.fail : C.text;
      ctx.font = "600 16px 'Trebuchet MS',sans-serif";
      ctx.fillText(Math.ceil(tl) + "s", W - pad, 28);

      // Miss marks
      ctx.textAlign = "left";
      for (let i = 0; i < MAX_MISSES; i++) {
        ctx.fillStyle = i < misses ? C.fail : "rgba(255,255,255,0.15)";
        ctx.font = "14px sans-serif";
        ctx.fillText("\u2716", pad + i * 20, 52);
      }

      // Phase text
      ctx.textAlign = "center"; ctx.font = "400 11px 'Trebuchet MS',sans-serif";
      if (phase === "ready") {
        ctx.fillStyle = C.accent;
        ctx.font = "bold 14px 'Trebuchet MS',sans-serif";
        ctx.fillText("빈칸을 터치해서 준비하세요!", CX, H - 16);
      } else if (phase === "chain") {
        const hasGaps = dominoes.some(d => d.state === "gap");
        if (hasGaps) {
          ctx.fillStyle = C.gap;
          ctx.fillText("빈칸을 빨리 터치하세요!", CX, H - 16);
        } else {
          ctx.fillStyle = C.success;
          ctx.fillText("연쇄 진행 중...", CX, H - 16);
        }
      }
    }

    function drawRR(x,y,w,h,r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

    function drawCard(title, lines, accent) {
      ctx.fillStyle = "rgba(20,15,25,0.7)"; ctx.fillRect(0, 0, W, H);
      const cw = Math.min(320, W - 40);
      const ch = 50 + lines.length * 28 + 44;
      const cx = (W - cw) / 2, cy = (H - ch) / 2 + 20;
      drawRR(cx, cy, cw, ch, 12); ctx.fillStyle = "rgba(40,30,50,0.95)"; ctx.fill();
      ctx.strokeStyle = accent + "60"; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = accent; ctx.fillRect(cx + 20, cy + 8, cw - 40, 2);
      ctx.textAlign = "center"; ctx.fillStyle = C.text; ctx.font = "bold 22px 'Trebuchet MS',sans-serif";
      ctx.fillText(title, W / 2, cy + 38);
      ctx.font = "400 13px 'Trebuchet MS',sans-serif"; ctx.fillStyle = C.textDim;
      lines.forEach((l, i) => ctx.fillText(l, W / 2, cy + 64 + i * 28));
      ctx.fillStyle = accent + "80"; ctx.font = "400 11px 'Trebuchet MS',sans-serif";
      ctx.fillText("TAP to play", W / 2, cy + ch - 14); ctx.textAlign = "left";
    }

    function render() {
      ctx.save();
      if (shakeTimer > 0 && !reducedMotion) {
        const s = shakeIntensity * (shakeTimer / 0.4);
        ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
      }

      drawBg();

      if (mode === "menu") {
        // Decorative standing dominoes
        const count = 7;
        const m = Math.max(40, W * 0.12);
        const sp = (W - m * 2) / (count - 1);
        for (let i = 0; i < count; i++) {
          const bob = Math.sin(menuAnim * 1.5 + i * 0.8) * 2;
          drawDomino(m + i * sp, tableY + bob, dominoW, dominoH, 0, "standing");
        }
        drawCard("도미노 연쇄", [
          "도미노가 쓰러지기 시작합니다",
          "빈칸을 터치해서 연쇄를 이어가세요",
          "5줄 완성하면 클리어!"
        ], C.accent);
        ctx.restore(); return;
      }

      if (mode === "running") {
        // Draw dominoes
        for (let i = 0; i < dominoes.length; i++) {
          const d = dominoes[i];
          if (d.state === "gap") {
            drawGap(d.x, d.y, dominoW + 6, dominoH, d.gapWarning);
          } else if (d.state === "placed") {
            // Just placed — green tint domino
            drawDomino(d.x, d.y, dominoW, dominoH, d.angle, "standing");
            ctx.fillStyle = "rgba(80,200,120,0.15)";
            ctx.fillRect(d.x - dominoW / 2 - 2, d.y - dominoH - 2, dominoW + 4, dominoH + 4);
          } else {
            drawDomino(d.x, d.y, dominoW, dominoH, d.angle, d.state);
          }
        }

        // Chain head indicator
        if (phase === "chain" && chainHead >= 0 && chainHead < dominoes.length) {
          const hd = dominoes[chainHead];
          if (hd.state === "falling" || hd.state === "fallen") {
            ctx.fillStyle = `rgba(240,208,96,${0.3 + 0.2 * Math.sin(menuAnim * 6)})`;
            ctx.beginPath(); ctx.arc(hd.x, hd.y - dominoH - 8, 4, 0, Math.PI * 2); ctx.fill();
          }
        }

        // Ready countdown
        if (phase === "ready" && readyTimer > 0) {
          ctx.textAlign = "center"; ctx.fillStyle = C.accent;
          ctx.font = `bold ${Math.min(40, H * 0.06)}px 'Trebuchet MS',sans-serif`;
          const countNum = Math.ceil(readyTimer);
          ctx.globalAlpha = 0.5 + 0.5 * (readyTimer % 1);
          ctx.fillText(countNum > 0 ? countNum.toString() : "GO!", CX, tableY - dominoH - 30);
          ctx.globalAlpha = 1;
        }

        // Result flash
        if (phase === "result" && resultTimer > 0) {
          ctx.textAlign = "center";
          ctx.font = `bold ${Math.min(28, H * 0.04)}px 'Trebuchet MS',sans-serif`;
          ctx.globalAlpha = Math.min(1, resultTimer * 1.5);
          if (resultSuccess) {
            ctx.fillStyle = C.success;
            ctx.fillText("연쇄 성공!", CX, tableY - dominoH - 30);
          } else {
            ctx.fillStyle = C.fail;
            ctx.fillText("연쇄 끊김!", CX, tableY - dominoH - 30);
          }
          ctx.globalAlpha = 1;
        }

        // Particles
        for (const p of particles) {
          ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        drawHUD();
        ctx.restore(); return;
      }

      if (mode === "failed") {
        // Broken chain visual
        const m = Math.max(40, W * 0.15);
        const sp = (W - m * 2) / 6;
        for (let i = 0; i < 7; i++) {
          if (i === 3) continue; // gap
          const angle = i < 3 ? Math.PI / 2.5 : 0;
          drawDomino(m + i * sp, tableY, dominoW, dominoH, angle, i < 3 ? "fallen" : "standing");
        }
        drawGap(m + 3 * sp, tableY, dominoW + 6, dominoH, 0.5 + 0.5 * Math.sin(menuAnim * 3));
        for (const p of particles) {
          ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        drawCard("실패", [
          misses >= MAX_MISSES ? `끊김 ${MAX_MISSES}회 초과` : "시간 초과",
          `완성: ${round}줄 / ${TARGET_ROUNDS}줄`,
          `시간: ${lastRunTime.toFixed(1)}초`
        ], C.fail);
        ctx.restore(); return;
      }

      if (mode === "cleared") {
        const m = Math.max(40, W * 0.08);
        const sp = (W - m * 2) / 8;
        for (let i = 0; i < 9; i++) {
          const angle = Math.PI / 2.5 * easeOut(Math.min(1, (menuAnim * 2 - i * 0.15)));
          drawDomino(m + i * sp, tableY, dominoW, dominoH, Math.min(angle, Math.PI / 2.5), "fallen");
        }
        if (Math.random() < 0.06) spawnBurst(rand(W * 0.2, W * 0.8), rand(tableY - dominoH * 2, tableY), [C.gold, C.success, C.accent][Math.floor(Math.random() * 3)], 3);
        for (const p of particles) {
          ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        drawCard("연쇄 완료!", [
          `${TARGET_ROUNDS}줄 모두 성공`,
          `시간: ${lastRunTime.toFixed(1)}초`
        ], C.success);
        ctx.restore(); return;
      }
      ctx.restore();
    }

    /* ── loop ── */
    function frame(ts) { const dt = lastTs ? Math.min((ts - lastTs) / 1000, MAX_DT) : FIXED_DT; lastTs = ts; update(dt); render(); animFrame = requestAnimationFrame(frame); }

    function renderGameToText() {
      return JSON.stringify({
        mode, elapsed: Math.round(elapsed * 10) / 10,
        round, misses, phase,
        chainHead, dominoCount: dominoes.length,
        gaps: dominoes.filter(d => d.state === "gap").length,
        timeLeft: Math.max(0, Math.round((TIME_LIMIT - elapsed) * 10) / 10),
        result: window.relayStageResult.status
      });
    }

    window.render_game_to_text = renderGameToText;
    window.advanceTime = (ms = 16.67) => { const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < steps; i++) update(FIXED_DT); render(); return renderGameToText(); };
    window.relayStageDebug = {
      forceClear() { startGame(); clearGame(); render(); },
      forceFail() { startGame(); failGame("debug_force_fail"); render(); }
    };

    canvas.addEventListener("click", () => canvas.focus());
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
    resizeCanvas();
    reportReady(); render(); canvas.focus();
    animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
