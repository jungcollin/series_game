<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>도미노 연쇄</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:"Trebuchet MS","Segoe UI",sans-serif; background:#f5f0e8; }
      body { display:grid; place-items:center; }
      a, canvas { -webkit-tap-highlight-color: rgba(148,163,184,0.2); }
      .skip-link { position:absolute; top:12px; left:12px; z-index:10; width:1px; height:1px; padding:0; overflow:hidden; clip:rect(0,0,0,0); clip-path:inset(50%); border-radius:999px; background:rgba(30,30,60,0.92); color:#f5f0e8; font-weight:800; text-decoration:none; white-space:nowrap; transition:transform 0.15s ease; }
      .skip-link:focus, .skip-link:focus-visible { width:auto; height:auto; padding:12px 16px; overflow:visible; clip:auto; clip-path:none; }
      .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
      canvas { display:block; width:100%; height:100%; background:#f5f0e8; touch-action:none; }
      canvas:focus-visible { outline:4px solid rgba(40,50,100,0.6); outline-offset:-8px; }
      @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; scroll-behavior:auto!important; } }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">도미노 연쇄. 드래그로 도미노를 배치하고 탭하여 연쇄 반응을 시작하세요.</p>
    <canvas id="game" width="960" height="540" aria-label="도미노 연쇄" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
    "use strict";
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const W = 960, H = 540;
    const FIXED_DT = 1/60, MAX_DT = 1/20;
    const relayCtx = window.RelayRuntime?.readContext("domino-chain") || { history:[], clearCount:0, previousStageId:null };

    const COL = {
      bg:"#f5f0e8", ivory:"#fffdf5", navy:"#2a3a6e", navyLight:"#4060a0",
      coral:"#e06050", coralDark:"#c04040", wood:"#c8b898", woodDark:"#a09070",
      text:"#2a2a40", textLight:"#6a6a80", cardBg:"rgba(255,253,245,0.96)",
      fail:"#c04040", clear:"#2a8a50", gold:"#d4a843"
    };

    const TIME_LIMIT = 40, TARGET_ROUNDS = 5, MAX_MISSES = 3;
    let mode = "menu", elapsed = 0, lastRunTime = 0;
    let hostFailedReported = false, hostClearedReported = false;
    let animFrame = 0, lastTs = 0;
    let roundsCompleted = 0, misses = 0;
    let dominoes = [], slots = [], phase = "place"; // place or chain
    let chainIndex = -1, chainTimer = 0;
    let placedCount = 0, currentSlot = 0;
    let shakeTimer = 0, shakeIntensity = 0;
    let particles = [], roundAnim = 0;
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch(e) { return false; } }
    function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
    function reportFailed(reason) { if (!inRelayHost()||hostFailedReported) return; hostFailedReported=true; window.parent.RelayHost.onStageFailed?.({stageId:"domino-chain",stageTitle:"도미노 연쇄",reason,durationSec:+lastRunTime.toFixed(1)}); }
    function reportCleared() { if (!inRelayHost()||hostClearedReported) return; hostClearedReported=true; window.parent.RelayHost.onStageCleared?.({stageId:"domino-chain",stageTitle:"도미노 연쇄",clearCountAfter:relayCtx.clearCount+1,durationSec:+lastRunTime.toFixed(1)}); }

    function generateRound() {
      const count = 6 + Math.floor(Math.random() * 4); // 6-9 dominoes
      slots = []; dominoes = []; placedCount = 0; currentSlot = 0;
      phase = "place"; chainIndex = -1;
      const startX = 100, endX = W - 100;
      const y = H / 2 + 20;
      // Create slots with some gaps
      const gapIndices = new Set();
      while (gapIndices.size < 2) gapIndices.add(1 + Math.floor(Math.random() * (count - 2)));

      for (let i = 0; i < count; i++) {
        const x = startX + (endX - startX) * (i / (count - 1));
        const hasGap = gapIndices.has(i);
        slots.push({ x, y, filled: !hasGap, needsPlace: hasGap, angle: 0, fallen: false, width: 12, height: 40 });
      }
      // Pre-place non-gap dominoes
      for (const s of slots) {
        if (s.filled) dominoes.push({ x: s.x, y: s.y, angle: 0, fallen: false, w: 12, h: 40 });
      }
    }

    function startGame() {
      mode = "running"; elapsed = 0; lastRunTime = 0;
      roundsCompleted = 0; misses = 0; particles = [];
      hostFailedReported = false; hostClearedReported = false;
      window.relayStageResult.status = "running";
      shakeTimer = 0; roundAnim = 0;
      generateRound();
    }
    function failGame(reason) { mode = "failed"; lastRunTime = elapsed; window.relayStageResult.status = "failed"; reportFailed(reason); }
    function clearGame() { mode = "cleared"; lastRunTime = elapsed; window.relayStageResult.status = "cleared"; reportCleared(); }

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random()*Math.PI*2, spd = 60+Math.random()*100;
        particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-40, life:1, decay:1.2+Math.random(), size:3+Math.random()*4, color });
      }
    }

    function tryPlaceDomino(px, py) {
      if (phase !== "place") return;
      // Find nearest unfilled slot
      let best = null, bestDist = 60;
      for (const s of slots) {
        if (!s.needsPlace || s.filled) continue;
        const d = Math.hypot(px - s.x, py - s.y);
        if (d < bestDist) { bestDist = d; best = s; }
      }
      if (best) {
        best.filled = true; best.needsPlace = false;
        dominoes.push({ x: best.x, y: best.y, angle: 0, fallen: false, w: 12, h: 40 });
        placedCount++;
        spawnParticles(best.x, best.y, COL.navyLight, 6);
        // Check if all placed
        if (slots.every(s => s.filled)) {
          phase = "chain";
          chainIndex = 0; chainTimer = 0;
        }
      }
    }

    function startChainManually() {
      if (phase === "place") {
        // Start chain even with gaps = miss
        const gaps = slots.filter(s => !s.filled);
        if (gaps.length > 0) {
          misses += gaps.length;
          shakeTimer = 0.3; shakeIntensity = 5;
          if (misses >= MAX_MISSES) { setTimeout(() => failGame("빈칸 3회"), 400); return; }
        }
        phase = "chain"; chainIndex = 0; chainTimer = 0;
      }
    }

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const r = canvas.getBoundingClientRect();
      const px = (e.clientX-r.left)/r.width*W, py = (e.clientY-r.top)/r.height*H;
      if (mode !== "running") { startGame(); return; }
      if (phase === "place") tryPlaceDomino(px, py);
      else if (phase === "done") { roundAnim = 0; generateRound(); }
    });
    canvas.addEventListener("pointermove", (e) => { e.preventDefault(); });
    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); if (mode !== "running") startGame(); else if (phase === "place") startChainManually(); else if (phase === "done") { roundAnim = 0; generateRound(); } }
      if (e.key === " " && mode === "running") { e.preventDefault(); startChainManually(); }
    });

    function update(dt) {
      if (mode !== "running") return;
      elapsed += dt;
      if (elapsed >= TIME_LIMIT) { failGame("시간 초과"); return; }
      if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);
      if (roundAnim > 0) roundAnim = Math.max(0, roundAnim - dt);

      // Chain animation
      if (phase === "chain" && chainIndex >= 0) {
        chainTimer += dt;
        const speed = 0.08; // time per domino
        while (chainTimer >= speed && chainIndex < slots.length) {
          const slot = slots[chainIndex];
          if (slot.filled) {
            slot.fallen = true;
            // Find corresponding domino
            for (const d of dominoes) {
              if (Math.abs(d.x - slot.x) < 2 && !d.fallen) {
                d.fallen = true; break;
              }
            }
            spawnParticles(slot.x, slot.y - 10, COL.coral, 4);
          }
          chainIndex++; chainTimer -= speed;
        }
        if (chainIndex >= slots.length) {
          // Round complete
          const allFell = slots.every(s => s.filled);
          if (allFell) {
            roundsCompleted++;
            roundAnim = 1.0;
            spawnParticles(W/2, H/2, COL.gold, 15);
            if (roundsCompleted >= TARGET_ROUNDS) {
              setTimeout(() => clearGame(), 600);
              phase = "done";
            } else {
              phase = "done";
              setTimeout(() => { if (mode === "running" && phase === "done") { generateRound(); } }, 1000);
            }
          } else {
            phase = "done";
            setTimeout(() => { if (mode === "running") generateRound(); }, 800);
          }
        }
      }

      for (const p of particles) { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 180*dt; p.life -= p.decay*dt; }
      particles = particles.filter(p => p.life > 0);
    }

    function drawRR(x,y,w,h,r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

    function drawCard(title, lines, accent) {
      ctx.fillStyle = "rgba(245,240,232,0.5)"; ctx.fillRect(0,0,W,H);
      const cw=320, ch=44+lines.length*28+44, cx=(W-cw)/2, cy=(H-ch)/2;
      drawRR(cx,cy,cw,ch,10); ctx.fillStyle=COL.cardBg; ctx.fill();
      ctx.fillStyle=accent; ctx.fillRect(cx+20,cy+8,cw-40,3);
      ctx.textAlign="center"; ctx.fillStyle=COL.text; ctx.font="bold 24px 'Trebuchet MS',sans-serif";
      ctx.fillText(title,W/2,cy+38);
      ctx.font="400 13px 'Trebuchet MS',sans-serif"; ctx.fillStyle=COL.textLight;
      lines.forEach((l,i) => ctx.fillText(l,W/2,cy+64+i*28));
      ctx.fillStyle="#aaa"; ctx.font="400 12px 'Trebuchet MS',sans-serif";
      ctx.fillText("TAP 또는 ENTER",W/2,cy+ch-16); ctx.textAlign="left";
    }

    function drawDomino(x, y, w, h, angle, color, strokeColor) {
      ctx.save(); ctx.translate(x, y); ctx.rotate(angle);
      drawRR(-w/2, -h/2, w, h, 3);
      ctx.fillStyle = color; ctx.fill();
      ctx.strokeStyle = strokeColor; ctx.lineWidth = 1.5; ctx.stroke();
      // Dots
      ctx.fillStyle = strokeColor;
      ctx.beginPath(); ctx.arc(0, -h/4, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, h/4, 2, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    function drawHUD() {
      const tl = Math.max(0, TIME_LIMIT - elapsed);
      ctx.fillStyle=COL.text; ctx.font="600 16px 'Trebuchet MS',sans-serif"; ctx.textAlign="left";
      ctx.fillText(`라운드 ${roundsCompleted} / ${TARGET_ROUNDS}`, 20, 30);
      ctx.textAlign="right"; ctx.fillStyle = tl<10?COL.fail:COL.text;
      ctx.fillText(Math.ceil(tl)+"s", W-20, 30);
      ctx.fillStyle="#e0d8cc"; ctx.fillRect(W-180,38,160,4);
      ctx.fillStyle=tl<10?COL.fail:COL.navy; ctx.fillRect(W-180,38,160*(tl/TIME_LIMIT),4);
      ctx.textAlign="left";
      for (let i=0;i<MAX_MISSES;i++) { ctx.fillStyle=i<misses?COL.fail:"#d8d0c4"; ctx.font="16px sans-serif"; ctx.fillText("\u2716",20+i*22,58); }
      // Phase indicator
      ctx.textAlign="center"; ctx.fillStyle=COL.textLight; ctx.font="500 13px 'Trebuchet MS',sans-serif";
      if (phase==="place") ctx.fillText("빈 자리에 도미노를 놓으세요!", W/2, H-20);
      else if (phase==="chain") ctx.fillText("연쇄 진행 중...", W/2, H-20);
    }

    function render() {
      ctx.save();
      if (shakeTimer>0&&!reducedMotion) { const s=shakeIntensity*(shakeTimer/0.3); ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }
      ctx.fillStyle=COL.bg; ctx.fillRect(-10,-10,W+20,H+20);

      // Wood table texture
      ctx.fillStyle="#e8dcc8"; ctx.fillRect(40, H/2-60, W-80, 120);
      ctx.strokeStyle="#d0c4a8"; ctx.lineWidth=2; ctx.strokeRect(40, H/2-60, W-80, 120);
      for (let x=60;x<W-60;x+=30) { ctx.beginPath(); ctx.moveTo(x,H/2-55); ctx.lineTo(x,H/2+55); ctx.strokeStyle="rgba(180,160,130,0.3)"; ctx.lineWidth=1; ctx.stroke(); }

      if (mode==="menu") {
        // Decorative dominoes
        for (let i=0;i<5;i++) drawDomino(W/2-120+i*60, H/2-70, 14, 44, i*0.15-0.3, COL.ivory, COL.navy);
        drawCard("도미노 연쇄", ["화면 터치로 빈 자리에 도미노 배치","드래그로 도미노 배치 후 탭으로 시작","클리어: 도미노 5줄을 모두 쓰러뜨리면 클리어","실패: 시간 초과 또는 빈칸 3회 시 실패"], COL.navy);
        ctx.restore(); return;
      }

      if (mode==="running") {
        // Draw slots
        for (const s of slots) {
          if (s.needsPlace && !s.filled) {
            // Empty slot indicator
            ctx.setLineDash([4,4]);
            drawRR(s.x-7, s.y-22, 14, 44, 3);
            ctx.strokeStyle=COL.coral; ctx.lineWidth=2; ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle=COL.coral+"30";
            drawRR(s.x-7, s.y-22, 14, 44, 3); ctx.fill();
          }
        }

        // Draw dominoes
        for (const d of dominoes) {
          const angle = d.fallen ? Math.PI/3 : 0;
          const yOff = d.fallen ? 10 : 0;
          drawDomino(d.x, d.y + yOff, d.w, d.h, angle, COL.ivory, COL.navy);
        }

        // Particles
        for (const p of particles) { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
        ctx.globalAlpha=1;

        // Round complete flash
        if (roundAnim > 0) {
          ctx.textAlign="center"; ctx.fillStyle=COL.clear;
          ctx.font="bold 28px 'Trebuchet MS',sans-serif";
          ctx.globalAlpha=roundAnim; ctx.fillText("연쇄 성공!", W/2, H/2-80); ctx.globalAlpha=1;
        }

        drawHUD(); ctx.restore(); return;
      }

      if (mode==="failed") {
        drawCard("실패", [misses>=MAX_MISSES?"빈칸 3회 초과":"시간 초과",`완성: ${roundsCompleted}줄 · 시간: ${lastRunTime.toFixed(1)}초`], COL.fail);
        ctx.restore(); return;
      }
      if (mode==="cleared") {
        for (let i=0;i<7;i++) { const angle=Math.sin(i*0.8)*0.4; drawDomino(W/2-180+i*60, H/2-60, 14,44,angle,COL.ivory,COL.navy); }
        drawCard("연쇄 완료!", [`${TARGET_ROUNDS}줄 모두 성공`,`시간: ${lastRunTime.toFixed(1)}초`], COL.clear);
        ctx.restore(); return;
      }
      ctx.restore();
    }

    function frame(ts) { const dt=lastTs?Math.min((ts-lastTs)/1000,MAX_DT):FIXED_DT; lastTs=ts; update(dt); render(); animFrame=requestAnimationFrame(frame); }
    function renderGameToText() { return JSON.stringify({mode,elapsed:Math.round(elapsed*10)/10,roundsCompleted,misses,phase,dominoCount:dominoes.length,slotsTotal:slots.length,timeLeft:Math.max(0,Math.round((TIME_LIMIT-elapsed)*10)/10),result:window.relayStageResult.status}); }

    window.render_game_to_text = renderGameToText;
    window.advanceTime = (ms=16.67) => { const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000))); for(let i=0;i<steps;i++) update(FIXED_DT); render(); return renderGameToText(); };
    window.relayStageMeta = { id:"domino-chain", title:"도미노 연쇄", creator:"jungcollin", genre:"Chain reaction puzzle", clearCondition:"도미노 5줄을 모두 쓰러뜨리면 클리어" };
    window.relayStageResult = { status:"running" };
    window.relayStageDebug = { forceClear() { startGame(); clearGame(); render(); }, forceFail() { startGame(); failGame("debug_force_fail"); render(); } };

    canvas.addEventListener("click", () => canvas.focus());
    window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
    reportReady(); render(); canvas.focus(); animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
