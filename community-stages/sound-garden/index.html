<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>소리 정원</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #F0EDE4; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(120, 160, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 80, 50, 0.92);
        color: #F0EDE4; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F0EDE4; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(120, 160, 100, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">소리 정원. 하단 팔레트에서 소리 요소를 선택하고 풍경 위 올바른 위치에 배치하세요. 새는 나무 위, 물은 개울 근처, 바람은 풀밭에. 조화로운 배치 8개를 완성하면 클리어. 잘못된 배치 3회 또는 40초 초과 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="소리 정원" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = 960, H = 540, CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60, MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "sound-garden", title: "소리 정원",
        description: "자연의 소리를 배치하여 조화로운 풍경을 만드세요",
        creator: "jungcollin", genre: "Meditative placement",
        clearCondition: "조화로운 소리 풍경 완성",
        failCondition: "불협화음 3회 또는 시간 초과",
        controls: "터치로 소리 요소를 배치하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const COL = { meadow: "#A8C686", meadowDark: "#7BA05B", sky: "#C8DDE8", water: "#7BB8D0", waterDark: "#5A98B0", tree: "#6B8E5A", treeDark: "#4A6E3A", trunk: "#7A5C3A", rock: "#9A9080", path: "#D4C8A8", text: "#3A4A30", accent: "#6B9E5A", miss: "#C0504D", success: "#4A8C5A", warm: "#E8C87A" };

      const DURATION = 40, TARGET = 8, MAX_WRONG = 3;
      let mode = "menu", elapsed = 0, placed = 0, wrong = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, shakeX = 0, shakeY = 0, clearAnim = 0;
      let particles = [], feedbackText = "", feedbackTimer = 0, feedbackColor = "";

      // Sound types and their valid zones
      const SOUND_TYPES = [
        { id: "bird", emoji: "\uD83D\uDC26", name: "새", zone: "tree", color: "#E8A840" },
        { id: "water", emoji: "\uD83D\uDCA7", name: "물", zone: "water", color: "#5AADE2" },
        { id: "wind", emoji: "\uD83C\uDF43", name: "바람", zone: "grass", color: "#7BC86C" },
        { id: "bell", emoji: "\uD83D\uDD14", name: "풍경", zone: "rock", color: "#D4A850" },
        { id: "cricket", emoji: "\uD83E\uDEB2", name: "벌레", zone: "flower", color: "#8BC34A" },
      ];

      // Landscape zones
      const ZONES = [
        { id: "tree", label: "나무", shapes: [{ type: "circle", x: 150, y: 200, r: 70 }, { type: "circle", x: 780, y: 220, r: 60 }] },
        { id: "water", label: "개울", shapes: [{ type: "rect", x: 350, y: 340, w: 260, h: 50 }] },
        { id: "grass", label: "풀밭", shapes: [{ type: "rect", x: 50, y: 360, w: 280, h: 80 }, { type: "rect", x: 630, y: 350, w: 280, h: 80 }] },
        { id: "rock", label: "바위", shapes: [{ type: "circle", x: 500, y: 280, r: 35 }, { type: "circle", x: 680, y: 300, r: 25 }] },
        { id: "flower", label: "꽃밭", shapes: [{ type: "circle", x: 300, y: 290, r: 40 }, { type: "circle", x: 850, y: 350, r: 35 }] },
      ];

      let selectedSound = null;
      let placedSounds = []; // {type, x, y, pulsePhase}
      let nextSoundQueue = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function shuffleQueue() {
        nextSoundQueue = [];
        for (let i = 0; i < 3; i++) {
          for (const st of SOUND_TYPES) nextSoundQueue.push(st);
        }
        for (let i = nextSoundQueue.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [nextSoundQueue[i], nextSoundQueue[j]] = [nextSoundQueue[j], nextSoundQueue[i]];
        }
      }

      function nextSound() {
        if (nextSoundQueue.length === 0) shuffleQueue();
        selectedSound = nextSoundQueue.pop();
      }

      function startGame() {
        mode = "running"; elapsed = 0; placed = 0; wrong = 0;
        shake = 0; clearAnim = 0; particles = []; placedSounds = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        shuffleQueue(); nextSound();
      }

      function spawnRipple(x, y, color) {
        for (let i = 0; i < 8; i++) {
          const a = rand(0, Math.PI * 2), spd = rand(20, 60);
          particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 10, life: 1, size: rand(3, 6), color, type: "circle" });
        }
      }

      function pointInZone(px, py, zoneId) {
        const zone = ZONES.find(z => z.id === zoneId);
        if (!zone) return false;
        for (const s of zone.shapes) {
          if (s.type === "circle") {
            if (Math.hypot(px - s.x, py - s.y) < s.r) return true;
          } else {
            if (px > s.x && px < s.x + s.w && py > s.y && py < s.y + s.h) return true;
          }
        }
        return false;
      }

      function tryPlace(px, py) {
        if (!selectedSound || mode !== "running") return;
        // Check if in correct zone
        if (pointInZone(px, py, selectedSound.zone)) {
          placed++; shake = 0.15;
          placedSounds.push({ type: selectedSound, x: px, y: py, pulsePhase: 0 });
          spawnRipple(px, py, selectedSound.color);
          feedbackText = "\u266A " + selectedSound.name; feedbackTimer = 0.7; feedbackColor = COL.success;
          if (placed >= TARGET) {
            mode = "cleared"; clearAnim = 0;
            window.relayStageResult.status = "cleared"; reportCleared();
          } else { nextSound(); }
        } else {
          wrong++; shake = 0.2;
          feedbackText = "어울리지 않아요"; feedbackTimer = 0.8; feedbackColor = COL.miss;
          spawnRipple(px, py, COL.miss);
          if (wrong >= MAX_WRONG) {
            mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("불협화음 3회");
          }
        }
      }

      function update(dt) {
        if (mode === "running") {
          elapsed += dt;
          if (elapsed >= DURATION) { mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("시간 초과"); return; }
        }
        if (mode === "cleared") clearAnim = Math.min(1, clearAnim + dt * 1.5);
        if (shake > 0) { shake = Math.max(0, shake - dt * 4); shakeX = (Math.random() - 0.5) * shake * 12; shakeY = (Math.random() - 0.5) * shake * 12; } else { shakeX = 0; shakeY = 0; }
        for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.life -= dt * 2; if (p.life <= 0) { particles.splice(i, 1); continue; } p.x += p.vx * dt; p.y += p.vy * dt; }
        for (const ps of placedSounds) ps.pulsePhase += dt * 3;
        if (feedbackTimer > 0) feedbackTimer -= dt;
      }

      function drawLandscape() {
        // Sky
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#B8D4E8"); grad.addColorStop(0.5, "#D0E0D8"); grad.addColorStop(1, COL.meadow);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

        // Distant hills
        ctx.fillStyle = "#A0C0A0";
        ctx.beginPath(); ctx.moveTo(0, 280);
        ctx.quadraticCurveTo(200, 220, 400, 270); ctx.quadraticCurveTo(600, 230, 800, 260);
        ctx.quadraticCurveTo(900, 240, W, 270); ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

        // Ground
        ctx.fillStyle = COL.meadow;
        ctx.beginPath(); ctx.moveTo(0, 320);
        ctx.quadraticCurveTo(300, 300, 500, 310); ctx.quadraticCurveTo(700, 290, W, 310);
        ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

        // Stream
        ctx.fillStyle = COL.water;
        ctx.beginPath(); ctx.moveTo(350, 340); ctx.quadraticCurveTo(420, 335, 480, 345);
        ctx.quadraticCurveTo(540, 355, 610, 340); ctx.lineTo(610, 390);
        ctx.quadraticCurveTo(540, 395, 480, 385); ctx.quadraticCurveTo(420, 380, 350, 390); ctx.closePath(); ctx.fill();
        // Stream shimmer
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(370, 360); ctx.quadraticCurveTo(450, 355, 530, 365); ctx.stroke();

        // Path
        ctx.fillStyle = COL.path;
        ctx.beginPath(); ctx.moveTo(440, H); ctx.quadraticCurveTo(460, 400, 500, 350);
        ctx.quadraticCurveTo(520, 400, 540, H); ctx.fill();

        // Trees
        for (const [tx, ty, ts] of [[150, 200, 1], [780, 220, 0.85]]) {
          ctx.fillStyle = COL.trunk; ctx.fillRect(tx - 6 * ts, ty + 20 * ts, 12 * ts, 60 * ts);
          ctx.fillStyle = COL.tree; ctx.beginPath(); ctx.ellipse(tx, ty, 50 * ts, 45 * ts, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = COL.treeDark; ctx.beginPath(); ctx.ellipse(tx + 5, ty + 8, 35 * ts, 30 * ts, 0, 0, Math.PI * 2); ctx.fill();
        }

        // Rocks
        for (const [rx, ry, rs] of [[500, 280, 1], [680, 300, 0.7]]) {
          ctx.fillStyle = COL.rock; ctx.beginPath(); ctx.ellipse(rx, ry, 30 * rs, 20 * rs, -0.1, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#A8A090"; ctx.beginPath(); ctx.ellipse(rx - 5 * rs, ry - 5 * rs, 20 * rs, 12 * rs, 0, 0, Math.PI * 2); ctx.fill();
        }

        // Flowers
        for (const [fx, fy] of [[280, 280], [310, 300], [320, 285], [840, 340], [860, 355], [850, 365]]) {
          ctx.fillStyle = "#E88090"; ctx.beginPath(); ctx.arc(fx, fy, 5, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#F0C040"; ctx.beginPath(); ctx.arc(fx, fy, 2, 0, Math.PI * 2); ctx.fill();
        }

        // Grass details
        ctx.strokeStyle = COL.meadowDark; ctx.lineWidth = 1;
        for (let i = 50; i < W; i += 25) {
          if (i > 340 && i < 620 && true) continue; // skip stream area
          const gy = 370 + Math.sin(i * 0.05) * 15;
          ctx.beginPath(); ctx.moveTo(i, gy); ctx.lineTo(i - 2, gy - 8); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(i + 8, gy + 3); ctx.lineTo(i + 6, gy - 5); ctx.stroke();
        }
      }

      function drawPlacedSounds() {
        for (const ps of placedSounds) {
          // Pulse ring
          const pulse = Math.sin(ps.pulsePhase) * 0.3 + 0.7;
          ctx.save(); ctx.globalAlpha = 0.3 * pulse;
          ctx.strokeStyle = ps.type.color; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(ps.x, ps.y, 15 + pulse * 8, 0, Math.PI * 2); ctx.stroke();
          ctx.restore();
          // Emoji
          ctx.font = "22px Trebuchet MS"; ctx.textAlign = "center";
          ctx.fillText(ps.type.emoji, ps.x, ps.y + 7); ctx.textAlign = "left";
        }
      }

      function drawSoundPalette() {
        if (mode !== "running" || !selectedSound) return;
        // Current sound indicator at bottom
        const py = H - 50;
        ctx.fillStyle = "rgba(240,237,228,0.9)";
        ctx.beginPath(); ctx.roundRect(CX - 120, py - 25, 240, 50, 12); ctx.fill();
        ctx.strokeStyle = selectedSound.color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(CX - 120, py - 25, 240, 50, 12); ctx.stroke();
        ctx.font = "28px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText(selectedSound.emoji, CX - 50, py + 10);
        ctx.fillStyle = COL.text; ctx.font = "bold 20px Trebuchet MS";
        ctx.fillText(selectedSound.name + " 배치", CX + 20, py + 8);
        ctx.textAlign = "left";

        // Hint: valid zone name
        ctx.fillStyle = "rgba(58,74,48,0.5)"; ctx.font = "14px Trebuchet MS"; ctx.textAlign = "center";
        const zoneLabel = ZONES.find(z => z.id === selectedSound.zone)?.label || "";
        ctx.fillText(zoneLabel + " 근처에 놓으세요", CX, py + 35);
        ctx.textAlign = "left";
      }

      function drawHUD() {
        const tl = Math.max(0, DURATION - elapsed), tr = tl / DURATION;
        ctx.fillStyle = "rgba(58,74,48,0.15)"; ctx.fillRect(30, 15, W - 60, 10);
        ctx.fillStyle = tr > 0.25 ? COL.accent : COL.miss; ctx.fillRect(30, 15, (W - 60) * tr, 10);
        ctx.fillStyle = COL.text; ctx.font = "bold 24px Trebuchet MS"; ctx.textAlign = "left";
        ctx.fillText("\u266A " + placed + " / " + TARGET, 30, 48);
        ctx.textAlign = "right"; ctx.fillStyle = wrong > 0 ? COL.miss : COL.text;
        ctx.fillText("\u2715 " + wrong + " / " + MAX_WRONG, W - 30, 48);
        ctx.textAlign = "center"; ctx.font = "bold 18px Trebuchet MS";
        ctx.fillStyle = tr > 0.25 ? COL.text : COL.miss; ctx.fillText(Math.ceil(tl) + "초", CX, 44);
        ctx.textAlign = "left";
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.save(); ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
      }

      function drawFeedback() {
        if (feedbackTimer <= 0) return;
        ctx.save(); ctx.globalAlpha = clamp(feedbackTimer / 0.3, 0, 1);
        ctx.fillStyle = feedbackColor; ctx.font = "bold 30px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText(feedbackText, CX, 85 - (1 - feedbackTimer / 0.8) * 15);
        ctx.restore(); ctx.textAlign = "left";
      }

      function drawCard(title, lines, accent) {
        ctx.fillStyle = "rgba(58,74,48,0.7)"; ctx.fillRect(0, 0, W, H);
        const cw = Math.min(680, W - 40), cx2 = (W - cw) / 2, cy2 = 70, ch = 400;
        ctx.fillStyle = "#F8F6F0"; ctx.beginPath(); ctx.roundRect(cx2, cy2, cw, ch, 16); ctx.fill();
        ctx.fillStyle = accent; ctx.beginPath(); ctx.roundRect(cx2, cy2, cw, 8, [16, 16, 0, 0]); ctx.fill();
        ctx.fillStyle = accent; ctx.font = "bold 38px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText(title, CX, cy2 + 60);
        ctx.fillStyle = COL.text; ctx.font = "600 20px Trebuchet MS";
        lines.forEach((l, i) => ctx.fillText(l, CX, cy2 + 110 + i * 36));
        ctx.fillStyle = "rgba(58,74,48,0.5)"; ctx.font = "500 18px Trebuchet MS";
        ctx.fillText("터치 또는 Enter로 시작", CX, cy2 + ch - 30); ctx.textAlign = "left";
      }

      function render() {
        ctx.save(); ctx.translate(shakeX, shakeY);
        if (mode === "menu") {
          drawLandscape();
          drawCard("소리 정원", ["조작: 터치로 소리 요소를 풍경에 배치", "\u266A 새는 나무, 물은 개울, 바람은 풀밭에", "\u2705 조화로운 배치 8개 완성 시 클리어", "\u274C 잘못된 배치 3회 또는 40초 초과 시 실패"], COL.accent);
          ctx.restore(); return;
        }
        if (mode === "running") {
          drawLandscape(); drawPlacedSounds(); drawParticles(); drawSoundPalette(); drawHUD(); drawFeedback();
          ctx.restore(); return;
        }
        if (mode === "cleared") {
          drawLandscape(); drawPlacedSounds(); drawParticles();
          const a = clamp(clearAnim, 0, 1); ctx.save(); ctx.globalAlpha = a;
          ctx.fillStyle = "rgba(74,140,90,0.2)"; ctx.fillRect(0, 0, W, H);
          const cw2 = Math.min(500, W - 40);
          ctx.fillStyle = "#F8F6F0"; ctx.beginPath(); ctx.roundRect((W - cw2) / 2, 140, cw2, 260, 16); ctx.fill();
          ctx.fillStyle = COL.success; ctx.font = "bold 44px Trebuchet MS"; ctx.textAlign = "center"; ctx.fillText("클리어!", CX, 210);
          ctx.fillStyle = COL.text; ctx.font = "600 24px Trebuchet MS";
          ctx.fillText("조화로운 소리 풍경 완성", CX, 260); ctx.fillText(elapsed.toFixed(1) + "초 소요", CX, 300);
          ctx.fillStyle = "rgba(58,74,48,0.5)"; ctx.font = "500 18px Trebuchet MS"; ctx.fillText("터치하여 다시 시작", CX, 370);
          ctx.textAlign = "left"; ctx.restore(); ctx.restore(); return;
        }
        if (mode === "failed") {
          drawLandscape(); drawPlacedSounds();
          drawCard("실패", [wrong >= MAX_WRONG ? "불협화음 3회!" : "시간 초과!", placed + "개 배치 / 목표 " + TARGET + "개", elapsed.toFixed(1) + "초 소요"], COL.miss);
          ctx.restore(); return;
        }
        ctx.restore();
      }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * W / rect.width, y: (e.clientY - rect.top) * H / rect.height };
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { startGame(); return; }
        const pos = getCanvasPos(e);
        // Don't place if clicking palette area
        if (pos.y > H - 80) return;
        tryPlace(pos.x, pos.y);
      });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", (e) => { if ((e.key === "Enter" || e.key === " ") && mode !== "running") { e.preventDefault(); startGame(); } });

      function frame(ts) {
        const dt = lastTimestamp ? Math.min((ts - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = ts; update(dt); render(); animFrame = requestAnimationFrame(frame);
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), placed, wrong, target: TARGET, maxWrong: MAX_WRONG, timeLimit: DURATION, currentSound: selectedSound?.id, result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < steps; i++) update(FIXED_DT); render(); return renderGameToText(); };
      window.relayStageDebug = {
        forceClear() { startGame(); placed = TARGET; mode = "cleared"; clearAnim = 1; window.relayStageResult.status = "cleared"; reportCleared(); render(); },
        forceFail() { startGame(); wrong = MAX_WRONG; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); render(); },
      };

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
      reportReady(); render(); canvas.focus(); animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
