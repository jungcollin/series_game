<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storm Archive: Debt Auction</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(83, 207, 215, 0.14), transparent 38%),
          radial-gradient(circle at 80% 18%, rgba(255, 161, 77, 0.18), transparent 22%),
          #060b13;
        font-family: "Avenir Next", "Pretendard", "SUIT Variable", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(123, 233, 255, 0.25);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 15, 25, 0.92);
        color: #f4fcff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(134, 241, 255, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Storm Archive: Debt Auction. 캔버스를 터치하거나 Enter로 시작하세요.
      클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 픽업 선택 전에 페널티 아이콘 확인, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      저주 조합을 버티면서 시간을 0으로 만들지 않고 마지막 경매를 넘기면 클리어.
      저주 누적이 한계를 넘기거나 시간 잔고가 바닥나거나 코어가 파괴되면 실패.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Storm Archive: Debt Auction" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const STAGE = {
        id: "storm-archive-debt-auction-cursed",
        title: "Storm Archive: Debt Auction",
        creator: "jungcollin",
        genre: "Risk market defense / 저주 픽업",
        controls:
          "클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 픽업 선택 전에 페널티 아이콘 확인, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition:
          "저주 조합을 버티면서 시간을 0으로 만들지 않고 마지막 경매를 넘기면 클리어",
        failCondition:
          "저주 누적이 한계를 넘기거나 시간 잔고가 바닥나거나 코어가 파괴되면 실패",
      };

      const relayContext = window.RelayRuntime?.readContext(STAGE.id) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const LANE_Y = [126, 192, 258, 324, 390];
      const LANE_COUNT = LANE_Y.length;
      const SLOT_X = 286;
      const CORE_X = 122;
      const AUCTION_CARD_W = 154;
      const AUCTION_CARD_H = 174;
      const TOTAL_WAVES = 4;
      const CURSE_LIMIT = 100;
      const START_BANK = 46;
      const START_CORE = 100;
      const HOLD_TIME = 0.42;
      const MAX_PARTICLES = REDUCED_MOTION ? 70 : 180;

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const moduleCatalog = {
        turret: {
          key: "turret",
          label: "Storm Rail",
          cost: 3.8,
          accent: "#68e7ff",
          desc: "균형 화력",
          mode: "shooter",
          damage: 10,
          cooldown: 0.56,
          projectileSpeed: 640,
          range: 680,
        },
        spindle: {
          key: "spindle",
          label: "Time Loom",
          cost: 4.6,
          accent: "#c7f16d",
          desc: "킬 시 시간 환급",
          mode: "shooter",
          damage: 7,
          cooldown: 0.36,
          projectileSpeed: 760,
          range: 700,
          killRefund: 0.28,
        },
        pulse: {
          key: "pulse",
          label: "Ledger Burst",
          cost: 5.4,
          accent: "#ffab68",
          desc: "폭발 탄환",
          mode: "shooter",
          damage: 13,
          cooldown: 0.86,
          projectileSpeed: 560,
          range: 740,
          splash: 34,
        },
        lattice: {
          key: "lattice",
          label: "Ward Lattice",
          cost: 4.2,
          accent: "#9d8cff",
          desc: "감속 장벽",
          mode: "support",
          slow: 0.58,
          damageReduction: 0.45,
        },
      };

      const pickupCatalog = [
        {
          key: "amber-clock",
          label: "호박 시계",
          accent: "#f8d66d",
          benefit: "시간 +2.8",
          penaltyLabel: "저주 +14",
          tags: ["+2.8s", "☠"],
          apply() {
            addBank(2.8, "시간 +2.8");
            addCurse(14, "저주 +14");
          },
        },
        {
          key: "rush-ink",
          label: "질주 잉크",
          accent: "#68e7ff",
          benefit: "화력 상승",
          penaltyLabel: "폭풍 속도 +18%",
          tags: ["DPS↑", "속도↑"],
          apply() {
            state.modifiers.damage *= 1.16;
            state.modifiers.fireRate *= 1.14;
            state.modifiers.enemySpeed *= 1.18;
            pushPopup("화력 상승", 520, 92, "#68e7ff");
            pushPopup("폭풍 속도 +18%", 718, 92, "#ff8a8a");
          },
        },
        {
          key: "glass-oath",
          label: "유리 맹세",
          accent: "#9ef5db",
          benefit: "코어 +18",
          penaltyLabel: "시간 소모 +14%",
          tags: ["코어+", "드레인↑"],
          apply() {
            state.core = clamp(state.core + 18, 0, START_CORE + 22);
            state.modifiers.timeDrain *= 1.14;
            pushPopup("코어 +18", 522, 92, "#9ef5db");
            pushPopup("시간 소모 +14%", 716, 92, "#ff8a8a");
          },
        },
        {
          key: "black-ledger",
          label: "검은 원장",
          accent: "#ff7f90",
          benefit: "강화 2중 계약",
          penaltyLabel: "저주 +20 / 다음 경매 +0.8",
          tags: ["강화↑", "☠☠"],
          apply() {
            state.modifiers.fireRate *= 1.28;
            state.modifiers.damage *= 1.18;
            addBank(1.4, "시간 +1.4");
            addCurse(20, "저주 +20");
            state.modifiers.priceMarkup += 0.8;
            pushPopup("다음 경매 +0.8", 720, 92, "#ff8a8a");
          },
        },
        {
          key: "seal-dust",
          label: "봉인 먼지",
          accent: "#d5b8ff",
          benefit: "전 슬롯 보호막",
          penaltyLabel: "다음 웨이브 1레인 봉쇄",
          tags: ["실드", "잠금"],
          apply() {
            state.slots.forEach((slot) => {
              slot.shield = Math.min(28, slot.shield + 16);
            });
            const candidates = state.slots.filter((slot) => slot.module);
            const target = candidates.length
              ? candidates[Math.floor(Math.random() * candidates.length)].lane
              : Math.floor(Math.random() * LANE_COUNT);
            state.modifiers.lockedLane = target;
            pushPopup("전체 보호막", 516, 92, "#d5b8ff");
            pushPopup(`${target + 1}레인 봉쇄`, 710, 92, "#ff8a8a");
          },
        },
      ];

      const enemyCatalog = {
        mote: { hp: 22, speed: 86, damage: 7, curse: 8, radius: 12, color: "#79f3ff" },
        shard: { hp: 38, speed: 64, damage: 11, curse: 12, radius: 15, color: "#ffcc83" },
        reaper: { hp: 62, speed: 56, damage: 17, curse: 17, radius: 19, color: "#ff889d" },
      };

      const state = {
        mode: "menu",
        phase: "menu",
        elapsed: 0,
        lastRunTime: 0,
        bank: START_BANK,
        core: START_CORE,
        curse: 0,
        resultReason: "",
        waveIndex: 0,
        phaseTick: 0,
        offerPulse: 0,
        auctionOffers: [],
        pickupOffers: [],
        pendingModule: null,
        draggingPending: false,
        slots: createSlots(),
        enemies: [],
        bullets: [],
        particles: [],
        popups: [],
        arcs: [],
        interactives: [],
        pointer: { x: VIEW.width * 0.5, y: VIEW.height * 0.5, isDown: false, id: null, moved: false, startX: 0, startY: 0 },
        hold: null,
        wavePlan: [],
        waveTimer: 0,
        waveDuration: 0,
        spawnCursor: 0,
        currentThreat: Array(LANE_COUNT).fill(0),
        activeLockedLane: -1,
        modifiers: { damage: 1, fireRate: 1, enemySpeed: 1, timeDrain: 1, priceMarkup: 0, lockedLane: -1 },
        shake: 0,
        flash: 0,
        flashColor: "#68e7ff",
        announcement: "터치나 Enter로 경매 시작",
      };

      function createSlots() {
        return LANE_Y.map((y, lane) => ({
          lane,
          x: SLOT_X,
          y,
          module: null,
          shield: 0,
          pulse: 0,
          disabled: false,
        }));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function formatSeconds(value) {
        return `${Math.max(0, value).toFixed(1)}s`;
      }

      function setAnnouncement(text) {
        state.announcement = text;
      }

      function pushPopup(text, x, y, color = "#f4fcff", size = 18) {
        state.popups.push({ text, x, y, color, size, life: 0.9, ttl: 0.9 });
      }

      function spawnBurst(x, y, color, count = 12, speed = 110) {
        const total = Math.min(count, MAX_PARTICLES - state.particles.length);
        for (let i = 0; i < total; i += 1) {
          const angle = (Math.PI * 2 * i) / Math.max(1, total) + Math.random() * 0.35;
          const velocity = speed * (0.55 + Math.random() * 0.85);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            color,
            size: 2 + Math.random() * 3.8,
            life: 0.5 + Math.random() * 0.55,
            ttl: 0.5 + Math.random() * 0.55,
          });
        }
      }

      function flashScreen(color, amount = 0.5) {
        state.flash = Math.max(state.flash, amount);
        state.flashColor = color;
      }

      function shakeScreen(amount) {
        state.shake = Math.max(state.shake, amount);
      }

      function addBank(amount, label) {
        state.bank = clamp(state.bank + amount, 0, 99);
        if (label) pushPopup(label, 168, 66, amount >= 0 ? "#9ef5db" : "#ff8a8a");
        if (state.bank <= 0) failStage("time_bank_exhausted");
      }

      function addCurse(amount, label) {
        state.curse = clamp(state.curse + amount, 0, CURSE_LIMIT + 20);
        if (label) pushPopup(label, 344, 66, "#ff9cab");
        if (state.curse >= CURSE_LIMIT) failStage("curse_overflow");
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function sampleUnique(list, count, forcedKey) {
        const pool = list.slice();
        const picked = [];
        if (forcedKey) {
          const forcedIndex = pool.findIndex((entry) => entry.key === forcedKey);
          if (forcedIndex >= 0) picked.push(pool.splice(forcedIndex, 1)[0]);
        }
        while (pool.length && picked.length < count) {
          picked.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
        }
        return picked;
      }

      function buildAuctionOffers(waveIndex) {
        const forcedKeys = ["turret", "spindle", "pulse", "lattice"];
        const mandatory = moduleCatalog[forcedKeys[waveIndex % forcedKeys.length]];
        return sampleUnique(Object.values(moduleCatalog), 3, mandatory.key).map((module, index) => ({
          id: `${module.key}-${waveIndex}-${index}`,
          moduleKey: module.key,
          cost: Number((module.cost + state.modifiers.priceMarkup).toFixed(1)),
        }));
      }

      function buildPickupOffers() {
        return sampleUnique(pickupCatalog, 3, "black-ledger").map((pickup, index) => ({
          ...pickup,
          id: `${pickup.key}-${state.waveIndex}-${index}`,
        }));
      }

      function buildWavePlan(waveIndex) {
        const duration = 6.3 + waveIndex * 1.15;
        const plan = [];
        const totalSpawns = 10 + waveIndex * 4;
        for (let i = 0; i < totalSpawns; i += 1) {
          const time = 0.55 + i * (duration / (totalSpawns + 1)) + Math.random() * 0.28;
          const lane = Math.floor(Math.random() * LANE_COUNT);
          const roll = Math.random() + waveIndex * 0.17;
          const type = roll > 1.12 ? "reaper" : roll > 0.66 ? "shard" : "mote";
          plan.push({ time, lane, type });
        }
        plan.sort((a, b) => a.time - b.time);
        return { duration, events: plan };
      }

      function calculateThreat(plan) {
        const threat = Array(LANE_COUNT).fill(0);
        plan.events.forEach((event) => {
          const template = enemyCatalog[event.type];
          threat[event.lane] += template.hp * 0.4 + template.damage + template.curse * 0.8;
        });
        return threat;
      }

      function createModuleInstance(moduleKey) {
        const base = moduleCatalog[moduleKey];
        return {
          key: base.key,
          label: base.label,
          accent: base.accent,
          mode: base.mode,
          desc: base.desc,
          damage: base.damage || 0,
          cooldown: 0,
          cooldownBase: base.cooldown || 0,
          projectileSpeed: base.projectileSpeed || 0,
          range: base.range || 0,
          killRefund: base.killRefund || 0,
          splash: base.splash || 0,
          slow: base.slow || 1,
          damageReduction: base.damageReduction || 1,
        };
      }

      function resetRun() {
        state.mode = "running";
        state.phase = "auction";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.bank = START_BANK;
        state.core = START_CORE;
        state.curse = 0;
        state.resultReason = "";
        state.waveIndex = 0;
        state.phaseTick = 0;
        state.offerPulse = 0;
        state.auctionOffers = [];
        state.pickupOffers = [];
        state.pendingModule = null;
        state.draggingPending = false;
        state.slots = createSlots();
        state.enemies = [];
        state.bullets = [];
        state.particles = [];
        state.popups = [];
        state.arcs = [];
        state.wavePlan = [];
        state.waveTimer = 0;
        state.waveDuration = 0;
        state.spawnCursor = 0;
        state.currentThreat = Array(LANE_COUNT).fill(0);
        state.activeLockedLane = -1;
        state.modifiers = { damage: 1, fireRate: 1, enemySpeed: 1, timeDrain: 1, priceMarkup: 0, lockedLane: -1 };
        state.shake = 0;
        state.flash = 0;
        state.flashColor = "#68e7ff";
        state.hold = null;
        setAnnouncement("경매 카드 하나를 사서 드래그 배치하세요");
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        prepareAuction(0);
      }

      function startStage() {
        resetRun();
        flashScreen("#68e7ff", 0.3);
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") return;
        state.mode = "failed";
        state.phase = "result";
        state.lastRunTime = state.elapsed;
        state.resultReason = reason;
        window.relayStageResult.status = "failed";
        shakeScreen(16);
        flashScreen("#ff6b82", 0.45);
        spawnBurst(220, 270, "#ff6b82", 26, 170);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") return;
        state.mode = "cleared";
        state.phase = "result";
        state.lastRunTime = state.elapsed;
        state.resultReason = "archive_secured";
        window.relayStageResult.status = "cleared";
        shakeScreen(9);
        flashScreen("#8effca", 0.45);
        spawnBurst(760, 128, "#8effca", 30, 190);
        reportClearedToHost();
      }

      function prepareAuction(waveIndex) {
        state.phase = "auction";
        state.phaseTick = 0;
        state.waveIndex = waveIndex;
        state.pendingModule = null;
        state.draggingPending = false;
        state.auctionOffers = buildAuctionOffers(waveIndex);
        const previewPlan = buildWavePlan(waveIndex);
        state.currentThreat = calculateThreat(previewPlan);
        state.wavePlan = previewPlan.events;
        state.waveDuration = previewPlan.duration;
        state.spawnCursor = 0;
        state.enemies = [];
        state.bullets = [];
        state.activeLockedLane = -1;
        state.slots.forEach((slot) => {
          slot.disabled = false;
        });
        state.curse = Math.max(0, state.curse - 5);
        setAnnouncement(`경매 ${waveIndex + 1}/${TOTAL_WAVES} · 카드 선택 후 드래그 배치`);
      }

      function beginPickupPhase() {
        state.phase = "pickup";
        state.phaseTick = 0;
        state.pickupOffers = buildPickupOffers();
        setAnnouncement("유물을 고르거나 건너뛰고 다음 웨이브로 진입");
      }

      function startWave() {
        const plan = buildWavePlan(state.waveIndex);
        state.phase = "wave";
        state.phaseTick = 0;
        state.waveTimer = 0;
        state.wavePlan = plan.events;
        state.waveDuration = plan.duration;
        state.spawnCursor = 0;
        state.enemies = [];
        state.bullets = [];
        state.pendingModule = null;
        state.draggingPending = false;
        state.activeLockedLane = state.modifiers.lockedLane;
        state.slots.forEach((slot) => {
          slot.disabled = slot.lane === state.activeLockedLane;
          slot.pulse = slot.disabled ? 0.8 : 0;
        });
        state.modifiers.lockedLane = -1;
        setAnnouncement(`웨이브 ${state.waveIndex + 1} 방어 중`);
      }

      function recommendSlot() {
        let bestLane = 0;
        let bestScore = -Infinity;
        state.slots.forEach((slot) => {
          const score = state.currentThreat[slot.lane] + (slot.module ? 0 : 34) + slot.shield * 0.5;
          if (score > bestScore) {
            bestLane = slot.lane;
            bestScore = score;
          }
        });
        return bestLane;
      }

      function purchaseOffer(offer, autoPlace = false) {
        if (!offer || state.phase !== "auction" || state.pendingModule) return;
        if (state.bank - offer.cost <= 0) {
          pushPopup("시간 잔고 부족", 734, 112, "#ff8a8a");
          flashScreen("#ff8a8a", 0.18);
          return;
        }
        addBank(-offer.cost, `-${offer.cost.toFixed(1)}s`);
        state.pendingModule = createModuleInstance(offer.moduleKey);
        state.auctionOffers = state.auctionOffers.filter((entry) => entry.id !== offer.id);
        if (autoPlace) {
          placePendingModule(recommendSlot(), true);
          return;
        }
        state.draggingPending = false;
        setAnnouncement("구매 완료 · 하단 장비를 슬롯으로 드래그");
      }

      function placePendingModule(lane, wasAuto = false) {
        if (!state.pendingModule) return;
        const slot = state.slots[lane];
        if (!slot) return;
        const module = state.pendingModule;
        slot.module = module;
        slot.pulse = 0.9;
        slot.shield = clamp(slot.shield + 6, 0, 28);
        state.pendingModule = null;
        state.draggingPending = false;
        pushPopup(wasAuto ? "AUTO BID" : "배치 완료", slot.x, slot.y - 40, wasAuto ? "#f8d66d" : "#8ef0ff");
        spawnBurst(slot.x + 16, slot.y, module.accent, 18, 130);
        shakeScreen(6);
        beginPickupPhase();
      }

      function applyPickup(pickup) {
        if (!pickup || state.phase !== "pickup") return;
        pickup.apply();
        spawnBurst(726, 322, pickup.accent, 22, 130);
        flashScreen(pickup.accent, 0.2);
        if (state.mode === "running") startWave();
      }

      function skipPickup() {
        if (state.phase !== "pickup") return;
        pushPopup("유물 건너뜀", 718, 460, "#dbe8ef");
        startWave();
      }

      function spawnEnemy(event) {
        const template = enemyCatalog[event.type];
        state.enemies.push({
          id: `${event.type}-${Math.random().toString(16).slice(2, 7)}`,
          type: event.type,
          lane: event.lane,
          x: VIEW.width + 34,
          y: LANE_Y[event.lane],
          hp: template.hp * (1 + state.waveIndex * 0.12),
          maxHp: template.hp * (1 + state.waveIndex * 0.12),
          radius: template.radius,
          color: template.color,
          speed: template.speed * (1 + state.waveIndex * 0.08),
          damage: template.damage * (1 + state.waveIndex * 0.06),
          curse: template.curse,
          pulse: 1,
        });
      }

      function getLaneModifiers(lane) {
        const slot = state.slots[lane];
        const hasLattice = slot?.module?.key === "lattice" && !slot.disabled;
        return {
          slow: hasLattice ? slot.module.slow : 1,
          damageReduction: hasLattice ? slot.module.damageReduction : 1,
        };
      }

      function shootAtEnemy(slot, enemy) {
        const module = slot.module;
        if (!module || module.mode !== "shooter") return;
        state.bullets.push({
          x: slot.x + 24,
          y: slot.y,
          vx: module.projectileSpeed,
          lane: slot.lane,
          moduleKey: module.key,
          damage: module.damage * state.modifiers.damage,
          splash: module.splash || 0,
          color: module.accent,
          life: 1.4,
        });
        module.cooldown = module.cooldownBase;
        slot.pulse = 0.45;
        state.arcs.push({ x1: slot.x + 12, y1: slot.y, x2: enemy.x, y2: enemy.y, color: module.accent, life: 0.08 });
        if (state.arcs.length > 14) state.arcs.shift();
      }

      function damageEnemy(enemy, damage, sourceKey, splash = 0) {
        enemy.hp -= damage;
        enemy.pulse = 0.85;
        spawnBurst(enemy.x, enemy.y, enemy.color, 5, 60);
        if (splash > 0) {
          state.enemies.forEach((other) => {
            if (other === enemy || other.lane !== enemy.lane) return;
            if (Math.abs(other.x - enemy.x) <= splash) {
              other.hp -= damage * 0.45;
              other.pulse = 0.55;
            }
          });
        }
        if (enemy.hp <= 0) killEnemy(enemy, sourceKey);
      }

      function killEnemy(enemy, sourceKey) {
        state.enemies = state.enemies.filter((entry) => entry.id !== enemy.id);
        spawnBurst(enemy.x, enemy.y, enemy.color, 14, 120);
        pushPopup("+정리", enemy.x, enemy.y - 18, "#eaf7ff", 14);
        if (sourceKey === "spindle") addBank(0.28, "시간 +0.3");
      }

      function applyEnemyHit(enemy) {
        const laneMod = getLaneModifiers(enemy.lane);
        const slot = state.slots[enemy.lane];
        let incomingDamage = enemy.damage * laneMod.damageReduction;
        if (slot.shield > 0) {
          const absorbed = Math.min(slot.shield, incomingDamage);
          slot.shield -= absorbed;
          incomingDamage -= absorbed * 0.9;
          pushPopup("보호막", slot.x + 4, slot.y - 20, "#d5b8ff", 13);
        }
        state.core = clamp(state.core - incomingDamage, 0, START_CORE + 22);
        addCurse(enemy.curse, `저주 +${enemy.curse}`);
        state.enemies = state.enemies.filter((entry) => entry.id !== enemy.id);
        flashScreen("#ff8a8a", 0.32);
        shakeScreen(11);
        spawnBurst(CORE_X + 18, enemy.y, "#ffb3be", 18, 150);
        pushPopup(`코어 -${incomingDamage.toFixed(0)}`, 92, enemy.y - 8, "#ffb3be");
        if (state.core <= 0) failStage("core_shattered");
      }

      function updateAuction(dt) {
        state.phaseTick += dt;
        state.offerPulse += dt;
        if (state.hold && state.pointer.isDown && !state.hold.triggered) {
          const heldFor = state.phaseTick - state.hold.startedAt;
          if (heldFor >= HOLD_TIME && !state.pointer.moved) {
            state.hold.triggered = true;
            purchaseOffer(state.hold.offer, true);
          }
        }
      }

      function updateWave(dt) {
        state.phaseTick += dt;
        state.waveTimer += dt;
        state.elapsed += dt;
        addBank(-dt * (1 + state.curse * 0.003) * state.modifiers.timeDrain);
        if (state.mode !== "running") return;

        while (state.spawnCursor < state.wavePlan.length && state.wavePlan[state.spawnCursor].time <= state.waveTimer) {
          spawnEnemy(state.wavePlan[state.spawnCursor]);
          state.spawnCursor += 1;
        }

        state.slots.forEach((slot) => {
          slot.pulse = Math.max(0, slot.pulse - dt * 1.8);
          if (!slot.module || slot.disabled) return;
          slot.module.cooldown = Math.max(0, slot.module.cooldown - dt * state.modifiers.fireRate);
          if (slot.module.mode !== "shooter" || slot.module.cooldown > 0) return;
          const target = state.enemies.find((enemy) => enemy.lane === slot.lane && enemy.x - slot.x <= slot.module.range);
          if (target) shootAtEnemy(slot, target);
        });

        state.bullets = state.bullets.filter((bullet) => {
          bullet.life -= dt;
          bullet.x += bullet.vx * dt;
          const target = state.enemies.find((enemy) => enemy.lane === bullet.lane && Math.abs(enemy.x - bullet.x) <= enemy.radius + 8);
          if (target) {
            damageEnemy(target, bullet.damage, bullet.moduleKey, bullet.splash);
            spawnBurst(bullet.x, bullet.y, bullet.color, 8, 90);
            return false;
          }
          return bullet.life > 0 && bullet.x < VIEW.width + 50;
        });

        state.enemies = state.enemies.filter((enemy) => {
          enemy.pulse = Math.max(0, enemy.pulse - dt * 1.6);
          const laneMod = getLaneModifiers(enemy.lane);
          enemy.x -= enemy.speed * state.modifiers.enemySpeed * laneMod.slow * dt;
          if (Math.random() < 0.28 && state.particles.length < MAX_PARTICLES) {
            state.particles.push({
              x: enemy.x + enemy.radius * 0.1,
              y: enemy.y + (Math.random() - 0.5) * 8,
              vx: -28 - Math.random() * 22,
              vy: (Math.random() - 0.5) * 18,
              color: enemy.color,
              size: 1.8 + Math.random() * 2.2,
              life: 0.24 + Math.random() * 0.2,
              ttl: 0.24 + Math.random() * 0.2,
            });
          }
          if (enemy.x <= CORE_X + 24) {
            applyEnemyHit(enemy);
            return false;
          }
          return true;
        });

        if (state.waveTimer >= state.waveDuration && state.spawnCursor >= state.wavePlan.length && state.enemies.length === 0) {
          finishWave();
        }
      }

      function finishWave() {
        spawnBurst(784, 106, "#8ef0ff", 18, 120);
        pushPopup(`웨이브 ${state.waveIndex + 1} 정리`, 786, 108, "#8ef0ff");
        if (state.waveIndex >= TOTAL_WAVES - 1) {
          clearStage();
          return;
        }
        state.waveIndex += 1;
        prepareAuction(state.waveIndex);
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy *= 0.98;
          return particle.life > 0;
        });
        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= dt * 24;
          return popup.life > 0;
        });
        state.arcs = state.arcs.filter((arc) => {
          arc.life -= dt;
          return arc.life > 0;
        });
        state.flash = Math.max(0, state.flash - dt * 1.8);
        state.shake = Math.max(0, state.shake - dt * 18);
      }

      function update(dt) {
        if (state.mode === "running") {
          if (state.phase === "auction") updateAuction(dt);
          if (state.phase === "wave") updateWave(dt);
          if (state.phase === "pickup") state.phaseTick += dt;
        }
        updateParticles(dt);
      }

      function wrapText(text, x, y, maxWidth, lineHeight, color = "#dfeef6", align = "left", maxLines = Infinity) {
        ctx.save();
        ctx.textAlign = align;
        ctx.fillStyle = color;
        const words = String(text).split(" ");
        const lines = [];
        let line = "";
        words.forEach((word) => {
          const candidate = line ? `${line} ${word}` : word;
          if (ctx.measureText(candidate).width > maxWidth && line) {
            lines.push(line);
            line = word;
          } else {
            line = candidate;
          }
        });
        if (line) lines.push(line);
        lines.slice(0, maxLines).forEach((entry, index) => {
          ctx.fillText(entry, x, y + index * lineHeight);
        });
        ctx.restore();
      }

      function roundedRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
      }

      function addInteractive(type, x, y, width, height, payload) {
        state.interactives.push({ type, x, y, width, height, payload });
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#08111d");
        sky.addColorStop(0.38, "#102031");
        sky.addColorStop(1, "#09121d");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        for (let i = 0; i < 16; i += 1) {
          const x = (i * 118 + state.phaseTick * 18) % (VIEW.width + 180) - 90;
          const alpha = 0.06 + (i % 3) * 0.03;
          const arc = ctx.createLinearGradient(x, 0, x + 120, VIEW.height);
          arc.addColorStop(0, `rgba(104,231,255,${alpha})`);
          arc.addColorStop(1, "rgba(255,171,104,0)");
          ctx.strokeStyle = arc;
          ctx.lineWidth = 1.5 + (i % 4);
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.bezierCurveTo(x + 40, 130, x - 20, 270, x + 86, VIEW.height);
          ctx.stroke();
        }
        ctx.restore();

        ctx.fillStyle = "rgba(255,255,255,0.02)";
        for (let shelf = 0; shelf < 5; shelf += 1) {
          const y = 88 + shelf * 86;
          ctx.fillRect(32, y, VIEW.width - 64, 4);
          for (let book = 0; book < 18; book += 1) {
            const x = 50 + book * 48 + ((shelf % 2) * 9);
            ctx.fillRect(x, y - 28 - (book % 4) * 6, 16 + (book % 3) * 4, 28 + (book % 5) * 5);
          }
        }
      }

      function drawBoard() {
        const panel = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        panel.addColorStop(0, "rgba(5, 12, 20, 0.78)");
        panel.addColorStop(1, "rgba(7, 18, 29, 0.96)");
        ctx.fillStyle = panel;
        roundedRect(20, 18, 920, 504, 28);
        ctx.fill();

        ctx.fillStyle = "rgba(136, 228, 255, 0.08)";
        roundedRect(34, 84, 476, 410, 24);
        ctx.fill();

        const boardGlow = ctx.createLinearGradient(0, 90, 0, 470);
        boardGlow.addColorStop(0, "rgba(104, 231, 255, 0.10)");
        boardGlow.addColorStop(1, "rgba(157, 140, 255, 0.04)");
        ctx.fillStyle = boardGlow;
        roundedRect(48, 100, 438, 378, 24);
        ctx.fill();
        ctx.strokeStyle = "rgba(132, 246, 255, 0.18)";
        ctx.lineWidth = 2;
        roundedRect(48, 100, 438, 378, 24);
        ctx.stroke();

        for (let i = 0; i < LANE_COUNT; i += 1) {
          const y = LANE_Y[i];
          const threat = clamp(state.currentThreat[i] / 120, 0, 1);
          const laneGradient = ctx.createLinearGradient(68, y, 470, y);
          laneGradient.addColorStop(0, `rgba(104,231,255,${0.09 + threat * 0.05})`);
          laneGradient.addColorStop(1, "rgba(104,231,255,0)");
          ctx.strokeStyle = laneGradient;
          ctx.lineWidth = 10;
          ctx.beginPath();
          ctx.moveTo(72, y);
          ctx.lineTo(456, y);
          ctx.stroke();
          ctx.strokeStyle = `rgba(255,255,255,${0.05 + threat * 0.04})`;
          ctx.lineWidth = 1;
          ctx.setLineDash([10, 12]);
          ctx.beginPath();
          ctx.moveTo(70, y);
          ctx.lineTo(460, y);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      function drawCore() {
        const orb = ctx.createRadialGradient(CORE_X, 258, 24, CORE_X, 258, 82);
        orb.addColorStop(0, "rgba(192, 251, 255, 0.95)");
        orb.addColorStop(0.35, "rgba(123, 233, 255, 0.82)");
        orb.addColorStop(1, "rgba(104, 231, 255, 0)");
        ctx.fillStyle = orb;
        ctx.beginPath();
        ctx.arc(CORE_X, 258, 82, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(CORE_X, 258);
        ctx.rotate(Math.sin(state.phaseTick * 1.2) * 0.08);
        ctx.fillStyle = "#eafcff";
        ctx.beginPath();
        ctx.moveTo(0, -44);
        ctx.lineTo(30, 0);
        ctx.lineTo(0, 44);
        ctx.lineTo(-30, 0);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#68e7ff";
        ctx.beginPath();
        ctx.moveTo(0, -24);
        ctx.lineTo(15, 0);
        ctx.lineTo(0, 24);
        ctx.lineTo(-15, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = "rgba(104, 231, 255, 0.24)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(CORE_X, 258, 62 + Math.sin(state.phaseTick * 2.8) * 3, 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawSlotsAndModules() {
        state.slots.forEach((slot) => {
          const pulse = slot.pulse;
          const module = slot.module;
          const shieldGlow = slot.shield > 0 ? 0.18 + slot.shield * 0.004 : 0;
          const base = ctx.createRadialGradient(slot.x, slot.y, 6, slot.x, slot.y, 40);
          base.addColorStop(0, module ? `${module.accent}99` : "rgba(129,160,179,0.25)");
          base.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = base;
          ctx.beginPath();
          ctx.arc(slot.x, slot.y, 42 + pulse * 10, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = slot.disabled ? "rgba(70, 34, 46, 0.86)" : "rgba(9, 18, 31, 0.9)";
          roundedRect(slot.x - 26, slot.y - 24, 52, 48, 18);
          ctx.fill();
          ctx.strokeStyle = slot.disabled ? "rgba(255, 127, 144, 0.42)" : module ? module.accent : "rgba(145, 166, 182, 0.28)";
          ctx.lineWidth = 2 + pulse * 2;
          roundedRect(slot.x - 26, slot.y - 24, 52, 48, 18);
          ctx.stroke();

          if (slot.shield > 0) {
            ctx.strokeStyle = `rgba(213, 184, 255, ${shieldGlow})`;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.arc(slot.x, slot.y, 30, 0, Math.PI * 2);
            ctx.stroke();
          }

          if (module) {
            ctx.fillStyle = module.accent;
            if (module.key === "lattice") {
              for (let i = 0; i < 3; i += 1) ctx.fillRect(slot.x - 14 + i * 10, slot.y - 16, 4, 32);
            } else if (module.key === "pulse") {
              ctx.beginPath();
              ctx.moveTo(slot.x, slot.y - 16);
              ctx.lineTo(slot.x + 16, slot.y);
              ctx.lineTo(slot.x, slot.y + 16);
              ctx.lineTo(slot.x - 16, slot.y);
              ctx.closePath();
              ctx.fill();
            } else if (module.key === "spindle") {
              ctx.beginPath();
              ctx.arc(slot.x, slot.y, 12, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = "#efff9a";
              ctx.beginPath();
              ctx.arc(slot.x, slot.y, 18 + Math.sin(state.phaseTick * 4 + slot.lane) * 2, 0, Math.PI * 2);
              ctx.stroke();
            } else {
              ctx.beginPath();
              ctx.arc(slot.x, slot.y, 14, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillRect(slot.x + 8, slot.y - 3, 18, 6);
            }
          } else {
            ctx.fillStyle = "rgba(219, 232, 239, 0.3)";
            ctx.font = "600 15px Avenir Next";
            ctx.textAlign = "center";
            ctx.fillText(`${slot.lane + 1}`, slot.x, slot.y + 5);
            ctx.textAlign = "left";
          }

          if (state.phase === "auction") addInteractive("slot", slot.x - 30, slot.y - 30, 60, 60, { lane: slot.lane });
        });
      }

      function drawEnemiesAndBullets() {
        state.arcs.forEach((arc) => {
          ctx.globalAlpha = clamp(arc.life / 0.08, 0, 1);
          ctx.strokeStyle = arc.color;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(arc.x1, arc.y1);
          ctx.lineTo(arc.x2, arc.y2);
          ctx.stroke();
        });
        ctx.globalAlpha = 1;

        state.bullets.forEach((bullet) => {
          const glow = ctx.createRadialGradient(bullet.x, bullet.y, 0, bullet.x, bullet.y, 16);
          glow.addColorStop(0, bullet.color);
          glow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, 10, 0, Math.PI * 2);
          ctx.fill();
        });

        state.enemies.forEach((enemy) => {
          const scale = 1 + enemy.pulse * 0.16;
          const glow = ctx.createRadialGradient(enemy.x, enemy.y, 2, enemy.x, enemy.y, enemy.radius * 2.4);
          glow.addColorStop(0, enemy.color);
          glow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(enemy.x, enemy.y, enemy.radius * 2.2 * scale, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = enemy.color;
          ctx.beginPath();
          ctx.moveTo(enemy.x, enemy.y - enemy.radius * scale);
          ctx.lineTo(enemy.x + enemy.radius * scale, enemy.y);
          ctx.lineTo(enemy.x, enemy.y + enemy.radius * scale);
          ctx.lineTo(enemy.x - enemy.radius * scale, enemy.y);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "rgba(8, 15, 25, 0.75)";
          roundedRect(enemy.x - 18, enemy.y + enemy.radius + 8, 36, 5, 3);
          ctx.fill();
          ctx.fillStyle = "#f5fdff";
          roundedRect(enemy.x - 18, enemy.y + enemy.radius + 8, 36 * clamp(enemy.hp / enemy.maxHp, 0, 1), 5, 3);
          ctx.fill();
        });
      }

      function drawAuctionPanel() {
        ctx.font = "600 13px Avenir Next";
        ctx.fillStyle = "rgba(203, 225, 234, 0.76)";
        ctx.fillText("길게 누르면 추천 레인에 즉시 입찰", 556, 170);

        state.auctionOffers.forEach((offer, index) => {
          const module = moduleCatalog[offer.moduleKey];
          const x = 554 + (index % 2) * 176;
          const y = index < 2 ? 188 : 374;
          const compact = index === 2;
          const width = compact ? 346 : AUCTION_CARD_W;
          const height = compact ? 102 : AUCTION_CARD_H;
          const cardGradient = ctx.createLinearGradient(x, y, x + width, y + height);
          cardGradient.addColorStop(0, "rgba(17, 28, 43, 0.96)");
          cardGradient.addColorStop(1, "rgba(104, 231, 255, 0.08)");
          ctx.fillStyle = cardGradient;
          roundedRect(x, y, width, height, 22);
          ctx.fill();
          ctx.strokeStyle = module.accent;
          ctx.lineWidth = 1.8;
          roundedRect(x, y, width, height, 22);
          ctx.stroke();
          ctx.fillStyle = module.accent;
          ctx.font = "700 21px Avenir Next";
          ctx.fillText(module.label, x + 18, y + 34);
          ctx.fillStyle = "#eff9ff";
          ctx.font = compact ? "600 14px Avenir Next" : "600 15px Avenir Next";
          ctx.fillText(module.desc, x + 18, y + (compact ? 56 : 58));
          ctx.font = "700 28px Avenir Next";
          ctx.fillText(`${offer.cost.toFixed(1)}s`, x + width - 78, y + 44);
          ctx.font = compact ? "600 11px Avenir Next" : "600 12px Avenir Next";
          const statText = module.mode === "support" ? "감속 42% · 코어 피해 55% 감소" : `${module.damage || 0} dmg · ${(1 / module.cooldown).toFixed(1)} atk/s`;
          wrapText(
            statText,
            x + 18,
            y + (compact ? 76 : 86),
            width - 36,
            compact ? 14 : 16,
            "rgba(214, 232, 241, 0.88)",
            "left",
            compact ? 1 : 2
          );
          wrapText(
            "탭 구매 → 드래그 배치",
            x + 18,
            y + (compact ? 92 : height - 20),
            width - 36,
            16,
            "rgba(255,255,255,0.56)"
          );
          addInteractive("offer", x, y, width, height, { offerId: offer.id });
        });

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        roundedRect(554, 472, 346, 14, 8);
        ctx.fill();
        ctx.fillStyle = "rgba(104, 231, 255, 0.74)";
        roundedRect(554, 472, 346 * clamp(state.bank / START_BANK, 0, 1), 14, 8);
        ctx.fill();

        if (state.pendingModule) {
          const chipX = state.draggingPending ? state.pointer.x - 58 : 672;
          const chipY = state.draggingPending ? state.pointer.y - 28 : 438;
          ctx.globalAlpha = state.draggingPending ? 0.96 : 1;
          ctx.fillStyle = "rgba(8, 14, 24, 0.92)";
          roundedRect(chipX, chipY, 146, 58, 20);
          ctx.fill();
          ctx.strokeStyle = state.pendingModule.accent;
          ctx.lineWidth = 2.2;
          roundedRect(chipX, chipY, 146, 58, 20);
          ctx.stroke();
          ctx.fillStyle = state.pendingModule.accent;
          ctx.font = "700 18px Avenir Next";
          ctx.fillText(state.pendingModule.label, chipX + 18, chipY + 24);
          ctx.fillStyle = "#eef8ff";
          ctx.font = "600 12px Avenir Next";
          ctx.fillText("슬롯으로 드래그", chipX + 18, chipY + 44);

      function drawWavePanel() {

      function drawRightPanel() {

      function drawHud() {

      function drawMenuOverlay() {

        ctx.fill();

        ctx.fillStyle = "rgba(104, 231, 255, 0.12)";
        roundedRect(530, 94, 302, 124, 24);
        ctx.fill();
        ctx.fillStyle = "#9ef5db";
        ctx.font = "700 14px Avenir Next";
        ctx.fillText("CLEAR", 552, 118);
        wrapText(STAGE.clearCondition, 552, 144, 258, 20, "#effcff", "left", 3);
        ctx.fillStyle = "rgba(255, 127, 144, 0.10)";

        ctx.fill();

        ctx.font = "700 14px Avenir Next";
        ctx.fillText("FAIL", 552, 260);

        ctx.fill();

        ctx.fillText("입장", 552, 404);
        ctx.fillStyle = "#effcff";
        ctx.font = "600 16px Avenir Next";

      }

      function drawResultOverlay() {
        ctx.fillStyle = "rgba(3, 8, 13, 0.56)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        const success = state.mode === "cleared";
        const accent = success ? "#8ef0c0" : "#ff8598";
        const panel = ctx.createLinearGradient(0, 140, 0, 420);
        panel.addColorStop(0, "rgba(8, 16, 28, 0.94)");
        panel.addColorStop(1, "rgba(104, 231, 255, 0.08)");
        ctx.fillStyle = panel;
        roundedRect(178, 118, 604, 304, 32);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        roundedRect(178, 118, 604, 304, 32);
        ctx.stroke();
        ctx.fillStyle = accent;
        ctx.font = "800 42px Avenir Next";
        ctx.textAlign = "center";
        ctx.fillText(success ? "ARCHIVE SECURED" : "DEBT DEFAULTED", 480, 190);
        ctx.fillStyle = "#effcff";
        ctx.font = "600 18px Avenir Next";
        const reasonMap = {
          curse_overflow: "저주 누적이 한계를 넘겼습니다.",
          core_shattered: "코어가 파괴되었습니다.",
          time_bank_exhausted: "시간 잔고가 바닥났습니다.",
          debug_force_fail: "디버그 실패 호출입니다.",
          archive_secured: "마지막 경매와 폭풍 파동을 돌파했습니다.",
        };
        ctx.fillText(reasonMap[state.resultReason] || state.resultReason, 480, 226);
        ctx.font = "700 16px Avenir Next";
        ctx.fillStyle = "rgba(214, 232, 241, 0.82)";
        ctx.fillText(`TIME ${formatSeconds(state.bank)} · CURSE ${Math.round(state.curse)}% · CORE ${Math.round(state.core)}`, 480, 266);
        wrapText(success ? STAGE.clearCondition : STAGE.failCondition, 480, 304, 500, 24, "#effcff", "center", 3);
        ctx.fillStyle = "rgba(255,255,255,0.10)";
        roundedRect(308, 350, 344, 42, 18);
        ctx.fill();
        ctx.fillStyle = "#effcff";
        ctx.font = "600 18px Avenir Next";
        ctx.fillText("다시 경매 열기: 터치 / 클릭 / Enter", 480, 377);
        addInteractive("restart", 308, 350, 344, 42, {});
        ctx.textAlign = "left";
      }

      function drawParticlesAndPopups() {
        state.particles.forEach((particle) => {
          ctx.globalAlpha = clamp(particle.life / particle.ttl, 0, 1);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        state.popups.forEach((popup) => {
          ctx.globalAlpha = clamp(popup.life / popup.ttl, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.font = `700 ${popup.size}px Avenir Next`;
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        });
        ctx.globalAlpha = 1;
        ctx.textAlign = "left";
      }

      function render() {
        state.interactives = [];
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawBoard();
        drawCore();
        drawSlotsAndModules();
        drawEnemiesAndBullets();
        drawRightPanel();
        drawHud();
        drawParticlesAndPopups();
        if (state.mode === "menu") drawMenuOverlay();
        else if (state.mode === "failed" || state.mode === "cleared") drawResultOverlay();
        ctx.restore();
        if (state.flash > 0) {
          ctx.globalAlpha = state.flash * 0.32;
          ctx.fillStyle = state.flashColor;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.globalAlpha = 1;
        }
      }

      function hitTest(x, y) {
        for (let i = state.interactives.length - 1; i >= 0; i -= 1) {
          const item = state.interactives[i];
          if (x >= item.x && x <= item.x + item.width && y >= item.y && y <= item.y + item.height) return item;
        }
        return null;
      }

      function pointerToCanvas(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left) * (VIEW.width / rect.width),
          y: (event.clientY - rect.top) * (VIEW.height / rect.height),
        };
      }

      function handleTapTarget(target) {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        if (!target) return;
        if (target.type === "offer") {
          const offer = state.auctionOffers.find((entry) => entry.id === target.payload.offerId);
          purchaseOffer(offer, false);
        } else if (target.type === "slot" && state.pendingModule) {
          placePendingModule(target.payload.lane, false);
        } else if (target.type === "pickup") {
          const pickup = state.pickupOffers.find((entry) => entry.id === target.payload.pickupId);
          applyPickup(pickup);
        } else if (target.type === "skip-pickup") {
          skipPickup();
        } else if (target.type === "start" || target.type === "restart") {
          startStage();
        }
      }

      function onPointerDown(event) {
        event.preventDefault();
        canvas.focus();
        const point = pointerToCanvas(event);
        state.pointer = { x: point.x, y: point.y, isDown: true, id: event.pointerId, moved: false, startX: point.x, startY: point.y };
        const target = hitTest(point.x, point.y);
        if ((state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") && !target) {
          startStage();
          return;
        }
        if (state.mode === "running" && state.phase === "auction") {
          if (target?.type === "pending-chip" && state.pendingModule) {
            state.draggingPending = true;
            return;
          }
          if (target?.type === "offer") {
            const offer = state.auctionOffers.find((entry) => entry.id === target.payload.offerId);
            state.hold = { offer, startedAt: state.phaseTick, triggered: false };
            return;
          }
        }
        if (target && state.mode !== "running") handleTapTarget(target);
      }

      function onPointerMove(event) {
        const point = pointerToCanvas(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        if (!state.pointer.isDown) return;
        const dx = point.x - state.pointer.startX;
        const dy = point.y - state.pointer.startY;
        if (Math.abs(dx) + Math.abs(dy) > 12) state.pointer.moved = true;
        if (state.pendingModule && state.mode === "running" && state.phase === "auction") state.draggingPending = true;
        if (state.hold && state.pointer.moved) state.hold = null;
      }

      function onPointerUp(event) {
        const point = pointerToCanvas(event);
        const target = hitTest(point.x, point.y);
        if (state.draggingPending && state.pendingModule && state.phase === "auction") {
          if (target?.type === "slot") placePendingModule(target.payload.lane, false);
          state.draggingPending = false;
        } else if (state.hold && !state.hold.triggered && !state.pointer.moved) {
          handleTapTarget(target);
        } else if (!state.pointer.moved) {
          handleTapTarget(target);
        }
        state.pointer.isDown = false;
        state.pointer.id = null;
        state.hold = null;
      }

      function onKeyDown(event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") startStage();
          else if (state.phase === "pickup") skipPickup();
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          mode: state.mode === "running" ? "running" : state.mode,
          phase: state.phase,
          bank: Number(state.bank.toFixed(1)),
          core: Number(state.core.toFixed(1)),
          curse: Number(state.curse.toFixed(1)),
          wave: state.waveIndex + 1,
          wave_timer: Number(state.waveTimer.toFixed(2)),
          pending_module: state.pendingModule ? state.pendingModule.key : null,
          locked_lane: state.activeLockedLane,
          offers: state.auctionOffers.map((offer) => ({ key: offer.moduleKey, cost: offer.cost })),
          pickups: state.pickupOffers.map((pickup) => ({ key: pickup.key, penalty: pickup.penaltyLabel })),
          slots: state.slots.map((slot) => ({ lane: slot.lane, module: slot.module ? slot.module.key : null, shield: Number(slot.shield.toFixed(1)), disabled: slot.disabled })),
          enemies: state.enemies.slice(0, 8).map((enemy) => ({ lane: enemy.lane, x: Number(enemy.x.toFixed(1)), hp: Number(enemy.hp.toFixed(1)), type: enemy.type })),
          result: window.relayStageResult.status,
          result_reason: state.resultReason,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
          coordinate_system: "origin top-left, +x right, +y down",
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i += 1) update(FIXED_DT);
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: STAGE.id,
        title: STAGE.title,
        creator: STAGE.creator,
        genre: STAGE.genre,
        clearCondition: STAGE.clearCondition,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerUp);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
