<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Neon Observatory: Shadow Stitch</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 18%, rgba(117, 255, 225, 0.18), transparent 26%),
          radial-gradient(circle at 78% 12%, rgba(255, 84, 202, 0.16), transparent 24%),
          radial-gradient(circle at 50% 50%, rgba(42, 104, 255, 0.16), transparent 42%),
          linear-gradient(180deg, #050816 0%, #0a1025 46%, #050711 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: transparent;
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(6, 12, 27, 0.95);
        color: #eff8ff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(218, 249, 255, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Neon Observatory: Shadow Stitch. 캔버스를 터치하거나 Enter로 시작하세요. 기본
      조작은 이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 역전
      신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이
      가능하게 구현 이며, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게
      구현 됩니다. 시작 화면과 실패 화면에서도 화면 터치 또는 Enter로 다시
      시작할 수 있습니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Neon Observatory: Shadow Stitch"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext =
        window.RelayRuntime?.readContext("neon-observatory-shadow-stitch-inverse") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const STAGE_TITLE = "Neon Observatory: Shadow Stitch";
      const STAGE_DESCRIPTION =
        "빛 경계를 꿰매 다리를 만들고, 역전 버스트를 견뎌 네 개의 제단을 모두 밝히세요.";
      const CONTROLS_TEXT =
        "이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_TEXT = "역전 구간을 모두 견디고 봉합 다리로 4개 제단을 모두 점등하면 클리어";
      const FAIL_TEXT = "역전 버스트에 연속으로 휘말리거나 강한 빛에 오래 노출돼 실이 타면 실패";

      const CENTER = { x: VIEW.width / 2, y: VIEW.height / 2 };
      const ARENA_RADIUS = 230;
      const HUB_RADIUS = 76;
      const ALTAR_RADIUS = 34;
      const PLAYER_RADIUS = 12;
      const BRIDGE_WIDTH = 16;
      const MAX_ACTIVE_BRIDGES = 2;
      const LIGHT_BEAM_COUNT = 3;
      const BURST_EVENTS = [
        { time: 6.8, warning: 1.3, duration: 2.2 },
        { time: 14.4, warning: 1.35, duration: 2.35 },
        { time: 22.1, warning: 1.4, duration: 2.45 },
        { time: 30.1, warning: 1.45, duration: 2.6 },
      ];

      const altars = [];
      const anchors = [];
      const starfield = [];
      const ambientDots = [];
      const particles = [];
      const ribbons = [];
      const popups = [];
      const activeBridges = [];
      const pointerState = {
        id: null,
        draggingStitch: null,
        pressed: false,
        lastPoint: null,
        lastTapAt: 0,
        lastTapPoint: null,
      };

      const keys = {
        ArrowUp: false,
        ArrowDown: false,
        ArrowLeft: false,
        ArrowRight: false,
        w: false,
        a: false,
        s: false,
        d: false,
        W: false,
        A: false,
        S: false,
        D: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const player = {
        x: CENTER.x,
        y: CENTER.y,
        vx: 0,
        vy: 0,
        radius: PLAYER_RADIUS,
        glow: 0,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: STAGE_DESCRIPTION,
        exposure: 0,
        exposureFlash: 0,
        shake: 0,
        bridgeHint: 0,
        altarHint: 0,
        inverseWarning: false,
        inverseActive: false,
        inverseTimer: 0,
        nextBurstIndex: 0,
        completedBursts: 0,
        burstChain: 0,
        burstRingRadius: 0,
        burstRingAlpha: 0,
        moveTarget: null,
        pointerMove: false,
        hoverAnchor: null,
        resultReason: "",
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function normalize(x, y) {
        const length = Math.hypot(x, y);
        if (length < 0.0001) {
          return { x: 0, y: 0 };
        }
        return { x: x / length, y: y / length };
      }

      function shortestAngle(a, b) {
        let diff = a - b;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return diff;
      }

      function toGamePoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function drawRoundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function createPopup(text, x, y, color, emphasis = 1) {
        popups.push({
          text,
          x,
          y,
          life: 1.2,
          color,
          emphasis,
          rise: 0,
        });
      }

      function burstParticles(x, y, color, count, speed = 1) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.35;
          const power = (45 + Math.random() * 110) * speed;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * power,
            vy: Math.sin(angle) * power,
            life: 0.6 + Math.random() * 0.45,
            size: 1.4 + Math.random() * 5.2,
            color,
          });
        }
      }

      function emitRibbon(x, y, angle, color) {
        ribbons.push({
          x,
          y,
          angle,
          length: 18,
          life: 0.5,
          color,
        });
      }

      function resetAltars() {
        altars.length = 0;
        anchors.length = 0;
        const altarAngles = [-Math.PI / 2, 0, Math.PI / 2, Math.PI];
        altarAngles.forEach((angle, index) => {
          const altarDistance = 176;
          const altarX = CENTER.x + Math.cos(angle) * altarDistance;
          const altarY = CENTER.y + Math.sin(angle) * altarDistance;
          const hubAnchorX = CENTER.x + Math.cos(angle) * 96;
          const hubAnchorY = CENTER.y + Math.sin(angle) * 96;
          const altarAnchorX = altarX - Math.cos(angle) * 42;
          const altarAnchorY = altarY - Math.sin(angle) * 42;
          altars.push({
            id: index,
            x: altarX,
            y: altarY,
            angle,
            lit: false,
            charge: 0,
          });
          anchors.push(
            { id: `hub-${index}`, side: index, kind: "hub", x: hubAnchorX, y: hubAnchorY },
            { id: `altar-${index}`, side: index, kind: "altar", x: altarAnchorX, y: altarAnchorY }
          );
        });
      }

      function resetStarfield() {
        starfield.length = 0;
        ambientDots.length = 0;
        for (let index = 0; index < 92; index += 1) {
          starfield.push({
            x: Math.random() * VIEW.width,
            y: Math.random() * VIEW.height,
            size: Math.random() * 2.1 + 0.6,
            phase: Math.random() * Math.PI * 2,
            alpha: 0.22 + Math.random() * 0.52,
          });
        }
        for (let index = 0; index < 18; index += 1) {
          ambientDots.push({
            radius: 48 + Math.random() * 184,
            angle: Math.random() * Math.PI * 2,
            speed: (Math.random() * 0.45 + 0.15) * (Math.random() < 0.5 ? -1 : 1),
            size: 3 + Math.random() * 7,
            alpha: 0.08 + Math.random() * 0.16,
            color: Math.random() < 0.5 ? "#69f7ff" : "#ff5cc8",
          });
        }
      }

      function getAnchorById(id) {
        return anchors.find((anchor) => anchor.id === id) || null;
      }

      function getBridgeBySide(side) {
        return activeBridges.find((bridge) => bridge.side === side) || null;
      }

      function nearestAnchor(point, radius = 24) {
        let best = null;
        let bestDistance = radius;
        anchors.forEach((anchor) => {
          const current = distance(point.x, point.y, anchor.x, anchor.y);
          if (current <= bestDistance) {
            best = anchor;
            bestDistance = current;
          }
        });
        return best;
      }

      function distanceToSegment(point, start, end) {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const lengthSq = dx * dx + dy * dy || 1;
        const t = clamp(
          ((point.x - start.x) * dx + (point.y - start.y) * dy) / lengthSq,
          0,
          1
        );
        const nearestX = start.x + dx * t;
        const nearestY = start.y + dy * t;
        return {
          distance: distance(point.x, point.y, nearestX, nearestY),
          t,
          x: nearestX,
          y: nearestY,
        };
      }

      function isBridgePair(source, target) {
        if (!source || !target || source.id === target.id) {
          return false;
        }
        if (source.side !== target.side) {
          return false;
        }
        return source.kind !== target.kind;
      }

      function buildBridge(source, target) {
        if (!isBridgePair(source, target)) {
          createPopup("같은 봉합 축만 연결됩니다", CENTER.x, 94, "#ffb98b");
          return;
        }
        if (getBridgeBySide(source.side)) {
          createPopup("이미 연결된 그림자 솔기", CENTER.x, 94, "#8cf3ff");
          return;
        }
        if (activeBridges.length >= MAX_ACTIVE_BRIDGES) {
          state.bridgeHint = 1.5;
          state.shake = Math.max(state.shake, 4);
          createPopup("실 슬롯이 가득 찼습니다. 더블탭으로 실 끊기", CENTER.x, 94, "#ff7fbf", 1.2);
          return;
        }
        const hubAnchor = source.kind === "hub" ? source : target;
        const altarAnchor = source.kind === "altar" ? source : target;
        activeBridges.push({
          side: source.side,
          startId: hubAnchor.id,
          endId: altarAnchor.id,
          pulse: 1,
        });
        state.shake = Math.max(state.shake, 2);
        const midpoint = {
          x: (hubAnchor.x + altarAnchor.x) / 2,
          y: (hubAnchor.y + altarAnchor.y) / 2,
        };
        burstParticles(midpoint.x, midpoint.y, "#7ef6ff", 20, 0.9);
        createPopup("Shadow Stitch", midpoint.x, midpoint.y - 8, "#7ef6ff", 1.15);
      }

      function cutNearestBridge(point) {
        if (!activeBridges.length) {
          createPopup("끊을 실이 없습니다", CENTER.x, 94, "#d6f7ff");
          return false;
        }
        let bridgeIndex = 0;
        let bestDistance = Infinity;
        activeBridges.forEach((bridge, index) => {
          const start = getAnchorById(bridge.startId);
          const end = getAnchorById(bridge.endId);
          if (!start || !end) {
            return;
          }
          const current = point
            ? distanceToSegment(point, start, end).distance
            : index === activeBridges.length - 1
              ? 0
              : Infinity;
          if (current < bestDistance) {
            bestDistance = current;
            bridgeIndex = index;
          }
        });
        const [removed] = activeBridges.splice(bridgeIndex, 1);
        if (!removed) {
          return false;
        }
        const start = getAnchorById(removed.startId);
        const end = getAnchorById(removed.endId);
        const cutX = start && end ? (start.x + end.x) / 2 : CENTER.x;
        const cutY = start && end ? (start.y + end.y) / 2 : CENTER.y;
        burstParticles(cutX, cutY, "#ff7cc6", 14, 0.85);
        createPopup("실 끊기", cutX, cutY - 6, "#ff9bd9");
        return true;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function getBurstEvent(index) {
        return BURST_EVENTS[index] || null;
      }

      function readLightBands() {
        const time = state.elapsed;
        const difficulty = clamp(state.completedBursts / BURST_EVENTS.length, 0, 1);
        const baseWidth = 0.29 - difficulty * 0.03;
        const rotation = time * (0.36 + difficulty * 0.08);
        const beams = [];
        for (let index = 0; index < LIGHT_BEAM_COUNT; index += 1) {
          beams.push({
            angle:
              rotation +
              (Math.PI * 2 * index) / LIGHT_BEAM_COUNT +
              Math.sin(time * 0.8 + index * 1.8) * 0.12,
            width: baseWidth + Math.sin(time * 0.45 + index) * 0.015,
          });
        }
        return beams;
      }

      function getLightIntensity(x, y) {
        const dx = x - CENTER.x;
        const dy = y - CENTER.y;
        const radius = Math.hypot(dx, dy);
        if (radius < HUB_RADIUS - 18 || radius > ARENA_RADIUS) {
          return 0;
        }
        const angle = Math.atan2(dy, dx);
        let intensity = 0.04;
        const beams = readLightBands();
        beams.forEach((beam) => {
          const diff = Math.abs(shortestAngle(angle, beam.angle));
          if (diff < beam.width) {
            intensity = Math.max(intensity, 0.42 + 0.58 * (1 - diff / beam.width));
          }
        });
        intensity += clamp((radius - HUB_RADIUS) / (ARENA_RADIUS - HUB_RADIUS), 0, 1) * 0.08;
        return clamp(intensity, 0, 1);
      }

      function isInHub(x, y) {
        return distance(x, y, CENTER.x, CENTER.y) <= HUB_RADIUS;
      }

      function isInAltar(altar, x, y) {
        return distance(x, y, altar.x, altar.y) <= ALTAR_RADIUS;
      }

      function readSafety(x, y) {
        if (isInHub(x, y)) {
          return { safe: true, onHub: true, onBridge: false, altarId: null };
        }
        for (let index = 0; index < altars.length; index += 1) {
          const altar = altars[index];
          if (isInAltar(altar, x, y)) {
            return { safe: true, onHub: false, onBridge: false, altarId: altar.id };
          }
        }
        for (let index = 0; index < activeBridges.length; index += 1) {
          const bridge = activeBridges[index];
          const start = getAnchorById(bridge.startId);
          const end = getAnchorById(bridge.endId);
          if (!start || !end) {
            continue;
          }
          const near = distanceToSegment({ x, y }, start, end);
          if (near.distance <= BRIDGE_WIDTH) {
            return {
              safe: true,
              onHub: false,
              onBridge: true,
              altarId: bridge.side,
              bridgeT: near.t,
            };
          }
        }
        return { safe: false, onHub: false, onBridge: false, altarId: null };
      }

      function stageClearedConditionsMet() {
        return (
          altars.every((altar) => altar.lit) &&
          state.nextBurstIndex >= BURST_EVENTS.length &&
          !state.inverseActive &&
          !state.inverseWarning
        );
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.exposure = 0;
        state.exposureFlash = 0;
        state.shake = 0;
        state.bridgeHint = 0;
        state.altarHint = 0;
        state.inverseWarning = false;
        state.inverseActive = false;
        state.inverseTimer = 0;
        state.nextBurstIndex = 0;
        state.completedBursts = 0;
        state.burstChain = 0;
        state.burstRingRadius = 0;
        state.burstRingAlpha = 0;
        state.moveTarget = { x: CENTER.x, y: CENTER.y };
        state.pointerMove = false;
        state.resultReason = "";
        pointerState.draggingStitch = null;
        hostFailedReported = false;
        hostClearedReported = false;
        player.x = CENTER.x;
        player.y = CENTER.y;
        player.vx = 0;
        player.vy = 0;
        player.glow = 0;
        activeBridges.length = 0;
        particles.length = 0;
        ribbons.length = 0;
        popups.length = 0;
        altars.forEach((altar) => {
          altar.lit = false;
          altar.charge = 0;
        });
        createPopup("봉합 다리 두 개만 유지할 수 있습니다", CENTER.x, 98, "#7ef6ff");
        window.relayStageResult.status = "running";
      }

      function failStage(reason = FAIL_TEXT) {
        if (state.mode !== "running") {
          state.mode = "failed";
        } else {
          state.mode = "failed";
          state.lastRunTime = state.elapsed;
        }
        state.resultReason = reason;
        state.inverseActive = false;
        state.inverseWarning = false;
        state.pointerMove = false;
        state.moveTarget = null;
        state.shake = Math.max(state.shake, 12);
        burstParticles(player.x, player.y, "#ff7b90", 36, 1.2);
        createPopup("THREAD BURN", player.x, player.y - 18, "#ff9f9a", 1.3);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.inverseActive = false;
        state.inverseWarning = false;
        state.moveTarget = null;
        state.pointerMove = false;
        state.shake = Math.max(state.shake, 5);
        burstParticles(CENTER.x, CENTER.y, "#7ef6ff", 46, 1.25);
        createPopup("OBSERVATORY RESTORED", CENTER.x, CENTER.y - 92, "#8df3ff", 1.35);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function maybeStartFromMenu() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return true;
        }
        return false;
      }

      function handleKeyboardDown(event) {
        if (event.key === "Enter" || event.key === " ") {
          if (maybeStartFromMenu()) {
            event.preventDefault();
            return;
          }
        }
        if (event.key === "f" || event.key === "F") {
          if (!document.fullscreenElement) {
            if (canvas.requestFullscreen) {
              canvas.requestFullscreen().catch(() => {});
            }
          } else if (document.exitFullscreen) {
            document.exitFullscreen().catch(() => {});
          }
        }
        if (event.key in keys) {
          keys[event.key] = true;
          event.preventDefault();
        }
      }

      function handleKeyboardUp(event) {
        if (event.key in keys) {
          keys[event.key] = false;
          event.preventDefault();
        }
      }

      function handlePointerDown(event) {
        const point = toGamePoint(event);
        pointerState.id = event.pointerId;
        pointerState.pressed = true;
        pointerState.lastPoint = point;
        if (maybeStartFromMenu()) {
          return;
        }
        if (state.mode !== "running") {
          return;
        }
        canvas.setPointerCapture?.(event.pointerId);
        const now = performance.now();
        const tappedTwice =
          pointerState.lastTapAt &&
          now - pointerState.lastTapAt < 290 &&
          pointerState.lastTapPoint &&
          distance(point.x, point.y, pointerState.lastTapPoint.x, pointerState.lastTapPoint.y) < 40;
        pointerState.lastTapAt = now;
        pointerState.lastTapPoint = point;
        const anchor = nearestAnchor(point);
        if (anchor) {
          pointerState.draggingStitch = {
            sourceId: anchor.id,
            point,
          };
          state.hoverAnchor = anchor.id;
          return;
        }
        if (tappedTwice) {
          cutNearestBridge(point);
          return;
        }
        state.moveTarget = point;
        state.pointerMove = event.pointerType === "touch";
      }

      function handlePointerMove(event) {
        const point = toGamePoint(event);
        state.hoverAnchor = nearestAnchor(point, 18)?.id || null;
        if (!pointerState.pressed && state.mode !== "menu") {
          return;
        }
        pointerState.lastPoint = point;
        if (pointerState.draggingStitch) {
          pointerState.draggingStitch.point = point;
          return;
        }
        if (state.mode === "running" && pointerState.pressed) {
          if (event.pointerType === "touch" || event.buttons) {
            state.moveTarget = point;
            state.pointerMove = true;
          }
        }
      }

      function handlePointerUp(event) {
        const point = toGamePoint(event);
        if (pointerState.draggingStitch && state.mode === "running") {
          const source = getAnchorById(pointerState.draggingStitch.sourceId);
          const target = nearestAnchor(point);
          if (source && target) {
            buildBridge(source, target);
          }
        }
        pointerState.draggingStitch = null;
        pointerState.pressed = false;
        state.pointerMove = false;
      }

      function readMoveVector() {
        let x = 0;
        let y = 0;
        if (keys.ArrowLeft || keys.a || keys.A) x -= 1;
        if (keys.ArrowRight || keys.d || keys.D) x += 1;
        if (keys.ArrowUp || keys.w || keys.W) y -= 1;
        if (keys.ArrowDown || keys.s || keys.S) y += 1;
        if (x || y) {
          return normalize(x, y);
        }
        if (state.moveTarget) {
          const dx = state.moveTarget.x - player.x;
          const dy = state.moveTarget.y - player.y;
          if (Math.hypot(dx, dy) < 10) {
            state.moveTarget = null;
            return { x: 0, y: 0 };
          }
          return normalize(dx, dy);
        }
        return { x: 0, y: 0 };
      }

      function updatePlayer(dt) {
        const safety = readSafety(player.x, player.y);
        const light = getLightIntensity(player.x, player.y);
        let input = readMoveVector();
        if (state.inverseActive) {
          input = { x: -input.x, y: -input.y };
        }
        const speed = safety.safe ? 194 : 148 - light * 22;
        const desiredVX = input.x * speed;
        const desiredVY = input.y * speed;
        const smoothing = input.x || input.y ? 0.12 : 0.18;
        player.vx = lerp(player.vx, desiredVX, smoothing * 60 * dt);
        player.vy = lerp(player.vy, desiredVY, smoothing * 60 * dt);
        if (!(input.x || input.y)) {
          player.vx *= 0.92;
          player.vy *= 0.92;
        }
        player.x += player.vx * dt;
        player.y += player.vy * dt;
        const dx = player.x - CENTER.x;
        const dy = player.y - CENTER.y;
        const limit = ARENA_RADIUS - player.radius;
        const length = Math.hypot(dx, dy);
        if (length > limit) {
          const ratio = limit / length;
          player.x = CENTER.x + dx * ratio;
          player.y = CENTER.y + dy * ratio;
          player.vx *= 0.32;
          player.vy *= 0.32;
        }
        if (Math.abs(player.vx) + Math.abs(player.vy) > 120 && Math.random() < 0.3) {
          emitRibbon(
            player.x,
            player.y,
            Math.atan2(player.vy, player.vx),
            safety.safe ? "#7ef6ff" : "#ff5cbb"
          );
        }
      }

      function updateExposure(dt) {
        const safety = readSafety(player.x, player.y);
        const light = getLightIntensity(player.x, player.y);
        let change = 0;
        if (safety.safe) {
          change = safety.onBridge ? -26 : safety.onHub ? -32 : -20;
        } else {
          change = 9 + light * 34 + (state.inverseActive ? 5 : 0);
        }
        state.exposure = clamp(state.exposure + change * dt, 0, 100);
        state.exposureFlash = Math.max(state.exposureFlash - dt * 1.5, 0);
        if (!safety.safe && light > 0.65) {
          state.exposureFlash = Math.min(1, state.exposureFlash + dt * 2.4);
        }
        if (state.exposure >= 100) {
          failStage("강한 빛에 오래 노출돼 실이 타버렸습니다");
        }
      }

      function triggerInverseBurst(eventConfig) {
        state.inverseWarning = false;
        state.inverseActive = true;
        state.inverseTimer = eventConfig.duration;
        state.nextBurstIndex += 1;
        state.completedBursts = state.nextBurstIndex;
        state.burstRingRadius = HUB_RADIUS + 12;
        state.burstRingAlpha = 1;
        const safety = readSafety(player.x, player.y);
        if (!safety.safe) {
          state.burstChain += 1;
          state.shake = Math.max(state.shake, 8);
          createPopup(`역전 버스트 ${state.burstChain}/2`, player.x, player.y - 16, "#ff8cda", 1.2);
          burstParticles(player.x, player.y, "#ff7ed4", 22, 1.05);
          if (state.burstChain >= 2) {
            failStage("역전 버스트에 연속으로 휘말렸습니다");
            return;
          }
        } else {
          state.burstChain = 0;
          createPopup("안전 봉합 성공", CENTER.x, 96, "#8df3ff");
        }
      }

      function updateBurstLogic(dt) {
        const next = getBurstEvent(state.nextBurstIndex);
        if (next && !state.inverseWarning && state.elapsed >= next.time - next.warning) {
          state.inverseWarning = true;
          createPopup("역전 신호, 그림자 위로 복귀", CENTER.x, 78, "#ffc777", 1.2);
        }
        if (next && state.elapsed >= next.time) {
          triggerInverseBurst(next);
        }
        if (state.inverseActive) {
          state.inverseTimer -= dt;
          state.burstRingRadius += 260 * dt;
          state.burstRingAlpha = Math.max(0, state.burstRingAlpha - dt * 0.45);
          if (state.inverseTimer <= 0) {
            state.inverseActive = false;
            state.burstRingAlpha = 0.32;
            state.burstRingRadius = ARENA_RADIUS * 1.2;
            if (readSafety(player.x, player.y).safe) {
              state.burstChain = 0;
            }
          }
        } else {
          state.burstRingAlpha = Math.max(0, state.burstRingAlpha - dt * 0.7);
        }
      }

      function updateAltars(dt) {
        altars.forEach((altar) => {
          if (altar.lit) {
            altar.charge = 1;
            return;
          }
          const onAltar = isInAltar(altar, player.x, player.y);
          const bridgeActive = !!getBridgeBySide(altar.id);
          if (onAltar && bridgeActive) {
            altar.charge = clamp(altar.charge + dt * (state.inverseActive ? 0.75 : 1.1), 0, 1);
            if (Math.random() < 0.25) {
              burstParticles(altar.x, altar.y, "#f9f2a8", 2, 0.45);
            }
            if (altar.charge >= 1) {
              altar.lit = true;
              state.altarHint = 1.25;
              state.shake = Math.max(state.shake, 5);
              createPopup(`제단 ${altar.id + 1} 점등`, altar.x, altar.y - 26, "#f9f2a8", 1.3);
              burstParticles(altar.x, altar.y, "#fef1a1", 30, 1.1);
            }
          } else {
            altar.charge = Math.max(0, altar.charge - dt * 0.55);
          }
        });
        if (stageClearedConditionsMet()) {
          clearStage();
        }
      }

      function updateParticles(dt) {
        for (let index = particles.length - 1; index >= 0; index -= 1) {
          const particle = particles[index];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          if (particle.life <= 0) {
            particles.splice(index, 1);
          }
        }
        for (let index = ribbons.length - 1; index >= 0; index -= 1) {
          const ribbon = ribbons[index];
          ribbon.life -= dt;
          ribbon.length += 70 * dt;
          if (ribbon.life <= 0) {
            ribbons.splice(index, 1);
          }
        }
        for (let index = popups.length - 1; index >= 0; index -= 1) {
          const popup = popups[index];
          popup.life -= dt;
          popup.rise += dt * 26;
          if (popup.life <= 0) {
            popups.splice(index, 1);
          }
        }
        state.shake = Math.max(state.shake - dt * 18, 0);
        state.bridgeHint = Math.max(state.bridgeHint - dt, 0);
        state.altarHint = Math.max(state.altarHint - dt, 0);
      }

      function update(dt) {
        if (state.mode !== "running") {
          updateParticles(dt);
          return;
        }
        state.elapsed += dt;
        updateBurstLogic(dt);
        if (state.mode !== "running") {
          updateParticles(dt);
          return;
        }
        updatePlayer(dt);
        updateExposure(dt);
        if (state.mode !== "running") {
          updateParticles(dt);
          return;
        }
        updateAltars(dt);
        updateParticles(dt);
      }

      function drawBackground() {
        const time = state.elapsed;
        const background = ctx.createRadialGradient(
          CENTER.x,
          CENTER.y,
          20,
          CENTER.x,
          CENTER.y,
          VIEW.width * 0.72
        );
        background.addColorStop(0, "#10183e");
        background.addColorStop(0.45, "#071126");
        background.addColorStop(1, "#030712");
        ctx.fillStyle = background;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        starfield.forEach((star) => {
          ctx.globalAlpha = star.alpha + Math.sin(time * 1.4 + star.phase) * 0.08;
          ctx.fillStyle = "#e8fbff";
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;

        ambientDots.forEach((dot, index) => {
          const angle = dot.angle + time * dot.speed;
          const x = CENTER.x + Math.cos(angle) * dot.radius;
          const y = CENTER.y + Math.sin(angle) * dot.radius * 0.76;
          ctx.globalAlpha = dot.alpha;
          ctx.fillStyle = dot.color;
          ctx.beginPath();
          ctx.arc(x, y, dot.size, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      function drawObservatoryBase() {
        const floorGradient = ctx.createRadialGradient(
          CENTER.x,
          CENTER.y,
          24,
          CENTER.x,
          CENTER.y,
          ARENA_RADIUS + 10
        );
        floorGradient.addColorStop(0, "rgba(30, 52, 116, 0.55)");
        floorGradient.addColorStop(0.55, "rgba(8, 17, 39, 0.82)");
        floorGradient.addColorStop(1, "rgba(2, 5, 13, 0.95)");
        ctx.fillStyle = floorGradient;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, ARENA_RADIUS + 18, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(141, 244, 255, 0.22)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, ARENA_RADIUS - 8, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255, 88, 194, 0.14)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, 144 + Math.sin(state.elapsed * 0.7) * 6, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(126, 246, 255, 0.14)";
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, 104 + Math.cos(state.elapsed * 0.55) * 4, 0, Math.PI * 2);
        ctx.stroke();

        const beams = readLightBands();
        beams.forEach((beam, index) => {
          const outer = ctx.createRadialGradient(CENTER.x, CENTER.y, HUB_RADIUS, CENTER.x, CENTER.y, ARENA_RADIUS);
          outer.addColorStop(0, "rgba(255, 231, 143, 0)");
          outer.addColorStop(0.2, index % 2 ? "rgba(255, 201, 107, 0.08)" : "rgba(255, 120, 198, 0.08)");
          outer.addColorStop(1, "rgba(255, 236, 161, 0.18)");
          ctx.save();
          ctx.translate(CENTER.x, CENTER.y);
          ctx.rotate(beam.angle);
          ctx.fillStyle = outer;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, ARENA_RADIUS, -beam.width, beam.width);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });
      }

      function drawSafeIslands() {
        const hubGradient = ctx.createRadialGradient(CENTER.x, CENTER.y, 12, CENTER.x, CENTER.y, HUB_RADIUS + 12);
        hubGradient.addColorStop(0, "rgba(107, 246, 255, 0.82)");
        hubGradient.addColorStop(0.35, "rgba(24, 75, 118, 0.92)");
        hubGradient.addColorStop(1, "rgba(7, 19, 44, 0.98)");
        ctx.fillStyle = hubGradient;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, HUB_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(161, 245, 255, 0.56)";
        ctx.lineWidth = 2.4;
        ctx.stroke();

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        ctx.rotate(state.elapsed * 0.18);
        ctx.strokeStyle = "rgba(255, 143, 214, 0.44)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, 32, 0, Math.PI * 1.35);
        ctx.stroke();
        ctx.strokeStyle = "rgba(144, 248, 255, 0.46)";
        ctx.beginPath();
        ctx.arc(0, 0, 46, Math.PI * 0.18, Math.PI * 1.52);
        ctx.stroke();
        ctx.restore();

        altars.forEach((altar) => {
          const litMix = altar.lit ? 1 : altar.charge;
          const altarGradient = ctx.createRadialGradient(
            altar.x,
            altar.y,
            4,
            altar.x,
            altar.y,
            ALTAR_RADIUS + 16
          );
          altarGradient.addColorStop(0, litMix > 0.8 ? "#fff6b0" : "rgba(122, 250, 255, 0.8)");
          altarGradient.addColorStop(0.34, litMix > 0.8 ? "#ffcb57" : "rgba(40, 85, 140, 0.92)");
          altarGradient.addColorStop(1, "#08122b");
          ctx.fillStyle = altarGradient;
          ctx.beginPath();
          ctx.arc(altar.x, altar.y, ALTAR_RADIUS, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowColor = altar.lit ? "rgba(255, 224, 112, 0.84)" : "rgba(120, 245, 255, 0.36)";
          ctx.shadowBlur = altar.lit ? 22 : 10;
          ctx.strokeStyle = altar.lit ? "rgba(255, 244, 176, 0.98)" : "rgba(164, 246, 255, 0.48)";
          ctx.lineWidth = 2.2;
          ctx.stroke();
          ctx.shadowBlur = 0;

          ctx.fillStyle = altar.lit ? "#fff9cc" : "rgba(222, 249, 255, 0.74)";
          ctx.font = "700 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(String(altar.id + 1), altar.x, altar.y + 5);

          if (!altar.lit && altar.charge > 0) {
            ctx.strokeStyle = "rgba(255, 234, 147, 0.86)";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(
              altar.x,
              altar.y,
              ALTAR_RADIUS + 9,
              -Math.PI / 2,
              -Math.PI / 2 + Math.PI * 2 * altar.charge
            );
            ctx.stroke();
          }
        });
        ctx.textAlign = "left";
      }

      function drawAnchorsAndBridges() {
        activeBridges.forEach((bridge, index) => {
          const start = getAnchorById(bridge.startId);
          const end = getAnchorById(bridge.endId);
          if (!start || !end) {
            return;
          }
          bridge.pulse = Math.max(0, bridge.pulse - FIXED_DT * 1.6);
          const gradient = ctx.createLinearGradient(start.x, start.y, end.x, end.y);
          gradient.addColorStop(0, "#73f8ff");
          gradient.addColorStop(0.52, "#e6ffff");
          gradient.addColorStop(1, "#ff78c5");

          ctx.lineCap = "round";
          ctx.shadowColor = "rgba(120, 247, 255, 0.72)";
          ctx.shadowBlur = 16;
          ctx.strokeStyle = gradient;
          ctx.lineWidth = BRIDGE_WIDTH + 4;
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();
          ctx.shadowBlur = 0;

          ctx.strokeStyle = "rgba(5, 13, 31, 0.76)";
          ctx.lineWidth = 1.8;
          ctx.setLineDash([10, 8]);
          ctx.lineDashOffset = -state.elapsed * 80 - index * 12;
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();
          ctx.setLineDash([]);
        });

        anchors.forEach((anchor) => {
          const isHovered = state.hoverAnchor === anchor.id;
          const active = !!getBridgeBySide(anchor.side);
          const fill = active
            ? "rgba(255, 243, 178, 0.94)"
            : anchor.kind === "hub"
              ? "rgba(120, 247, 255, 0.94)"
              : "rgba(255, 128, 203, 0.9)";
          ctx.shadowColor = active ? "rgba(255, 225, 127, 0.72)" : "rgba(115, 247, 255, 0.42)";
          ctx.shadowBlur = isHovered ? 18 : 10;
          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(anchor.x, anchor.y, isHovered ? 9.5 : 7.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        });

        if (pointerState.draggingStitch) {
          const source = getAnchorById(pointerState.draggingStitch.sourceId);
          const point = pointerState.draggingStitch.point;
          if (source && point) {
            const target = nearestAnchor(point);
            const valid = isBridgePair(source, target);
            ctx.strokeStyle = valid ? "rgba(126, 246, 255, 0.95)" : "rgba(255, 139, 196, 0.72)";
            ctx.lineWidth = 4;
            ctx.setLineDash([9, 7]);
            ctx.lineDashOffset = -state.elapsed * 95;
            ctx.beginPath();
            ctx.moveTo(source.x, source.y);
            ctx.lineTo(point.x, point.y);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      }

      function drawPlayer() {
        const safety = readSafety(player.x, player.y);
        const light = getLightIntensity(player.x, player.y);
        player.glow = lerp(player.glow, safety.safe ? 1 : 0.46 + light * 0.26, 0.1);

        ribbons.forEach((ribbon) => {
          ctx.save();
          ctx.translate(ribbon.x, ribbon.y);
          ctx.rotate(ribbon.angle);
          ctx.globalAlpha = ribbon.life;
          ctx.strokeStyle = ribbon.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(-ribbon.length * 0.4, 0);
          ctx.lineTo(ribbon.length, 0);
          ctx.stroke();
          ctx.restore();
        });
        ctx.globalAlpha = 1;

        ctx.shadowColor = safety.safe ? "rgba(120, 247, 255, 0.95)" : "rgba(255, 96, 181, 0.88)";
        ctx.shadowBlur = 22 * player.glow;
        const playerGradient = ctx.createRadialGradient(
          player.x - 4,
          player.y - 4,
          3,
          player.x,
          player.y,
          player.radius + 8
        );
        playerGradient.addColorStop(0, "#fbfeff");
        playerGradient.addColorStop(0.38, safety.safe ? "#84fbff" : "#ffb9de");
        playerGradient.addColorStop(1, safety.safe ? "#2b87cc" : "#8d296f");
        ctx.fillStyle = playerGradient;
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = safety.safe ? "rgba(234, 255, 255, 0.92)" : "rgba(255, 220, 242, 0.88)";
        ctx.lineWidth = 1.8;
        ctx.stroke();
      }

      function drawBurstFX() {
        if (state.inverseWarning) {
          const pulse = 0.6 + Math.sin(state.elapsed * 12) * 0.2;
          ctx.strokeStyle = `rgba(255, 197, 117, ${0.34 + pulse * 0.2})`;
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, HUB_RADIUS + 22, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (state.burstRingAlpha > 0.01) {
          ctx.strokeStyle = `rgba(255, 132, 220, ${state.burstRingAlpha})`;
          ctx.lineWidth = 12;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, state.burstRingRadius, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      function drawParticles() {
        particles.forEach((particle) => {
          ctx.globalAlpha = clamp(particle.life, 0, 1);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      function drawHudCard(x, y, width, title, value, accent) {
        ctx.fillStyle = "rgba(4, 11, 26, 0.66)";
        drawRoundRect(x, y, width, 42, 16);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 1.2;
        ctx.stroke();
        ctx.fillStyle = "rgba(198, 244, 255, 0.86)";
        ctx.font = "700 11px Trebuchet MS";
        ctx.fillText(title, x + 14, y + 15);
        ctx.fillStyle = "#f8fdff";
        ctx.font = "700 16px Trebuchet MS";
        ctx.fillText(value, x + 14, y + 33);
      }

      function drawHud() {
        drawHudCard(18, 16, 170, "봉합 슬롯", `${activeBridges.length}/${MAX_ACTIVE_BRIDGES}`, "#7cf7ff");
        drawHudCard(
          198,
          16,
          188,
          "역전 버스트",
          `${state.completedBursts}/${BURST_EVENTS.length}${state.inverseActive ? " ACTIVE" : ""}`,
          state.inverseActive ? "#ff8cde" : "#ffc777"
        );
        drawHudCard(
          396,
          16,
          196,
          "제단 점등",
          `${altars.filter((altar) => altar.lit).length}/4`,
          "#f4ed9a"
        );

        const exposureX = VIEW.width - 226;
        const exposureY = 16;
        ctx.fillStyle = "rgba(4, 11, 26, 0.66)";
        drawRoundRect(exposureX, exposureY, 208, 42, 16);
        ctx.fill();
        ctx.strokeStyle = state.exposure > 70 ? "#ff809a" : "#8cf5ff";
        ctx.lineWidth = 1.2;
        ctx.stroke();
        ctx.fillStyle = "rgba(198, 244, 255, 0.86)";
        ctx.font = "700 11px Trebuchet MS";
        ctx.fillText("실 연소도", exposureX + 14, exposureY + 15);
        ctx.fillStyle = "rgba(16, 31, 56, 0.92)";
        drawRoundRect(exposureX + 14, exposureY + 24, 178, 10, 6);
        ctx.fill();
        const fill = ctx.createLinearGradient(exposureX + 14, 0, exposureX + 192, 0);
        fill.addColorStop(0, "#7ef6ff");
        fill.addColorStop(0.68, "#ffc56d");
        fill.addColorStop(1, "#ff708d");
        ctx.fillStyle = fill;
        drawRoundRect(exposureX + 14, exposureY + 24, 178 * (state.exposure / 100), 10, 6);
        ctx.fill();

        if (state.inverseWarning || state.inverseActive || state.bridgeHint > 0 || state.altarHint > 0) {
          const alpha = clamp(
            Math.max(
              state.inverseWarning ? 0.7 : 0,
              state.inverseActive ? 1 : 0,
              state.bridgeHint * 0.7,
              state.altarHint * 0.7
            ),
            0,
            1
          );
          ctx.fillStyle = `rgba(5, 11, 26, ${0.45 + alpha * 0.18})`;
          drawRoundRect(258, VIEW.height - 56, 444, 34, 18);
          ctx.fill();
          ctx.strokeStyle = state.inverseActive
            ? "rgba(255, 138, 220, 0.84)"
            : state.inverseWarning
              ? "rgba(255, 200, 124, 0.82)"
              : state.bridgeHint > 0
                ? "rgba(255, 138, 220, 0.72)"
                : "rgba(248, 239, 164, 0.72)";
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = "#effcff";
          ctx.font = "700 14px Trebuchet MS";
          ctx.textAlign = "center";
          let hint = "제단 위에서 잠시 유지해 점등";
          if (state.inverseActive) {
            hint = "역전 중: 이동 입력이 반대로 작동합니다";
          } else if (state.inverseWarning) {
            hint = "역전 신호: 다음 버스트 전까지 그림자 위로 복귀";
          } else if (state.bridgeHint > 0) {
            hint = "더블탭으로 오래된 실을 끊고 새 봉합 다리를 여세요";
          }
          ctx.fillText(hint, VIEW.width / 2, VIEW.height - 34);
          ctx.textAlign = "left";
        }
      }

      function drawPopups() {
        popups.forEach((popup) => {
          ctx.globalAlpha = clamp(popup.life / 1.2, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.font = `${Math.round(14 + popup.emphasis * 5)}px Trebuchet MS`;
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y - popup.rise);
        });
        ctx.textAlign = "left";
        ctx.globalAlpha = 1;
      }

      function drawOverlayCard(title, lines, accent, subaccent) {
        ctx.fillStyle = "rgba(3, 7, 16, 0.62)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardX = 132;
        const cardY = 84;
        const cardW = VIEW.width - 264;
        const cardH = VIEW.height - 168;
        const gradient = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + cardH);
        gradient.addColorStop(0, "rgba(10, 18, 38, 0.92)");
        gradient.addColorStop(1, "rgba(7, 11, 22, 0.96)");

        ctx.fillStyle = gradient;
        drawRoundRect(cardX, cardY, cardW, cardH, 28);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = subaccent;
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillText("NEON OBSERVATORY", cardX + 30, cardY + 32);
        ctx.fillStyle = "#f5fdff";
        ctx.font = "700 34px Trebuchet MS";
        ctx.fillText(title, cardX + 30, cardY + 76);

        lines.forEach((line, index) => {
          const y = cardY + 126 + index * 34;
          ctx.fillStyle = index === 0 ? "#dffbff" : "#c2d3eb";
          ctx.font = index === 0 ? "700 18px Trebuchet MS" : "600 16px Trebuchet MS";
          ctx.fillText(line, cardX + 30, y);
        });

        ctx.fillStyle = "rgba(130, 244, 255, 0.12)";
        drawRoundRect(cardX + 28, cardY + cardH - 92, cardW - 56, 56, 18);
        ctx.fill();
        ctx.strokeStyle = "rgba(132, 244, 255, 0.26)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.fillStyle = "#effcff";
        ctx.font = "700 15px Trebuchet MS";
        ctx.fillText("화면 터치 또는 Enter", cardX + 48, cardY + cardH - 58);
        ctx.fillStyle = "#b9cae2";
        ctx.font = "600 13px Trebuchet MS";
        ctx.fillText("모바일은 터치 이동, 앵커 드래그 봉합, 더블탭으로 실 끊기", cardX + 48, cardY + cardH - 34);
      }

      function drawMenu() {
        drawOverlayCard(
          STAGE_TITLE,
          [
            STAGE_DESCRIPTION,
            CONTROLS_TEXT,
            CLEAR_TEXT,
            FAIL_TEXT,
          ],
          "rgba(126, 246, 255, 0.88)",
          "#80f5ff"
        );
      }

      function drawFailed() {
        drawOverlayCard(
          "THREAD BURN",
          [
            state.resultReason || FAIL_TEXT,
            `점등한 제단 ${altars.filter((altar) => altar.lit).length}/4`,
            `버틴 역전 버스트 ${state.completedBursts}/${BURST_EVENTS.length}`,
            "안전지대 위에서 버스트를 맞고, 실 슬롯 두 개를 번갈아 쓰세요.",
          ],
          "rgba(255, 121, 155, 0.92)",
          "#ff9ec7"
        );
      }

      function drawCleared() {
        drawOverlayCard(
          "OBSERVATORY RESTORED",
          [
            CLEAR_TEXT,
            `클리어 시간 ${state.lastRunTime.toFixed(1)}초`,
            `점등한 제단 ${altars.filter((altar) => altar.lit).length}/4`,
            "실을 끊어 다시 열 수도 있습니다. 화면 터치 또는 Enter로 재도전.",
          ],
          "rgba(252, 233, 143, 0.92)",
          "#fff3ab"
        );
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.save();
        if (state.shake > 0) {
          ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
        }
        drawBackground();
        drawObservatoryBase();
        drawSafeIslands();
        drawAnchorsAndBridges();
        drawBurstFX();
        drawPlayer();
        drawParticles();
        drawHud();
        drawPopups();
        if (state.exposureFlash > 0.02) {
          ctx.fillStyle = `rgba(255, 135, 116, ${state.exposureFlash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed") {
          drawFailed();
        } else if (state.mode === "cleared") {
          drawCleared();
        }
        ctx.restore();
      }

      function frame(timestamp) {
        const delta = lastTimestamp ? (timestamp - lastTimestamp) / 1000 : FIXED_DT;
        lastTimestamp = timestamp;
        update(Math.min(MAX_DT, delta));
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      function advanceTime(ms) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return window.render_game_to_text();
      }

      function renderGameToText() {
        const payload = {
          mode: state.mode,
          coordinateSystem: "origin top-left, +x right, +y down",
          player: {
            x: Number(player.x.toFixed(1)),
            y: Number(player.y.toFixed(1)),
            vx: Number(player.vx.toFixed(1)),
            vy: Number(player.vy.toFixed(1)),
          },
          exposure: Number(state.exposure.toFixed(1)),
          inverseActive: state.inverseActive,
          inverseWarning: state.inverseWarning,
          completedBursts: state.completedBursts,
          burstChain: state.burstChain,
          bridges: activeBridges.map((bridge) => bridge.side),
          altars: altars.map((altar) => ({
            id: altar.id + 1,
            lit: altar.lit,
            charge: Number(altar.charge.toFixed(2)),
          })),
          target: state.moveTarget
            ? {
                x: Number(state.moveTarget.x.toFixed(1)),
                y: Number(state.moveTarget.y.toFixed(1)),
              }
            : null,
        };
        return JSON.stringify(payload);
      }

      window.relayStageMeta = {
        id: "neon-observatory-shadow-stitch-inverse",
        title: STAGE_TITLE,
        creator: "jungcollin",
        genre: "Light-shadow action / 역전 버스트",
        clearCondition: CLEAR_TEXT,
        failCondition: FAIL_TEXT,
        controls: CONTROLS_TEXT,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          altars.forEach((altar) => {
            altar.lit = true;
            altar.charge = 1;
          });
          state.completedBursts = BURST_EVENTS.length;
          state.nextBurstIndex = BURST_EVENTS.length;
          clearStage();
          render();
        },
        forceFail() {
          failStage("debug-force-fail");
          render();
        },
      };
      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceTime;

      resetAltars();
      resetStarfield();
      reportReadyToHost();

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);
      canvas.addEventListener(
        "touchstart",
        (event) => {
          if (event.cancelable) {
            event.preventDefault();
          }
        },
        { passive: false }
      );
      window.addEventListener("keydown", handleKeyboardDown);
      window.addEventListener("keyup", handleKeyboardUp);

      render();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
