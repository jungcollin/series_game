<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>봉화 릴레이</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #E8D5B7; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 120, 60, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(100, 60, 30, 0.92);
        color: #fff; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #E8D5B7; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(100, 60, 30, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">봉화 릴레이. 화면 터치로 봉화대를 점화하세요. 불이 번져가는 타이밍에 맞춰 다음 봉화를 점화합니다. 5개 봉화대를 모두 점화하면 클리어. 불이 꺼지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="봉화 릴레이" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "beacon-relay",
        title: "봉화 릴레이",
        description: "산 위의 봉화를 차례로 점화해 신호를 전달하는 게임",
        creator: "jungcollin",
        genre: "Chain timing",
        clearCondition: "5개 봉화대를 모두 점화하면 클리어",
        failCondition: "불이 꺼지면 실패",
        controls: "화면 터치로 봉화대를 점화",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const COL = {
        skyTop: "#D4763A", skyMid: "#E8A860", skyBot: "#F0D8A0",
        mountain: "#8B9A6B", mountainDark: "#6B7A4B",
        ground: "#A09060",
        fire: "#FF6020", fireGlow: "rgba(255,96,32,0.4)",
        fireYellow: "#FFD040", ember: "#FF8040",
        stone: "#7A6A5A", stoneDark: "#5A4A3A",
        text: "#5A3A1A", textLight: "rgba(90,58,26,0.6)",
        card: "rgba(255,248,235,0.95)", accent: "#D4763A", damage: "#8B3020",
        signal: "rgba(255,200,80,0.6)",
      };

      const NUM_BEACONS = 5;
      const FIRE_DURATION = 4.0;
      const SIGNAL_SPEED = 120;

      let mode = "menu", elapsed = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;

      let beacons = [];
      let currentBeacon = 0;
      let signalParticles = [];
      let fireParticles = [];
      let wind = { x: 0, timer: 0 };

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function initBeacons() {
        beacons = [];
        const spacing = W / (NUM_BEACONS + 1);
        const heights = [0.55, 0.4, 0.5, 0.35, 0.45];
        for (let i = 0; i < NUM_BEACONS; i++) {
          beacons.push({
            x: spacing * (i + 1),
            y: H * heights[i],
            lit: false, fireLife: 0, fireMax: FIRE_DURATION,
            signalSent: false, hitRadius: 40,
          });
        }
      }

      function reset() {
        elapsed = 0; shake = 0; clearAnim = 0; currentBeacon = 0;
        signalParticles = []; fireParticles = [];
        wind = { x: 0, timer: 0 };
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        initBeacons();
      }

      function igniteBeacon(idx) {
        if (idx < 0 || idx >= NUM_BEACONS) return;
        const b = beacons[idx];
        if (b.lit) return;

        if (idx === 0) {
          b.lit = true; b.fireLife = b.fireMax;
          currentBeacon = 1;
          return;
        }

        const prev = beacons[idx - 1];
        if (prev.lit && prev.fireLife > 0) {
          b.lit = true;
          b.fireLife = b.fireMax;
          currentBeacon = idx + 1;
          spawnFireBurst(b.x, b.y - 20);
        }
      }

      function spawnFireBurst(x, y) {
        for (let i = 0; i < (reducedMotion ? 4 : 12); i++) {
          const a = rand(0, Math.PI * 2), sp = rand(30, 80);
          fireParticles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - rand(20, 60), life: 1, size: rand(2, 5) });
        }
      }

      function tryTap(tx, ty) {
        for (let i = 0; i < NUM_BEACONS; i++) {
          const b = beacons[i];
          if (!b.lit && dist(tx, ty, b.x, b.y - 15) < b.hitRadius) {
            igniteBeacon(i);
            return;
          }
        }
        shake = 3;
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        wind.timer -= dt;
        if (wind.timer <= 0) { wind.x = rand(-20, 20); wind.timer = rand(1, 3); }

        for (const b of beacons) {
          if (b.lit && b.fireLife > 0) {
            b.fireLife -= dt;
            if (!reducedMotion && Math.random() < 0.3) {
              fireParticles.push({
                x: b.x + rand(-8, 8), y: b.y - 25,
                vx: wind.x * 0.5 + rand(-10, 10), vy: -rand(30, 60),
                life: rand(0.3, 0.8), size: rand(2, 4),
              });
            }
          }
        }

        for (let i = fireParticles.length - 1; i >= 0; i--) {
          const p = fireParticles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy -= 20 * dt; p.life -= dt * 1.8;
          if (p.life <= 0) fireParticles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;

        // Check failure: any lit beacon ran out
        for (let i = 0; i < currentBeacon && i < NUM_BEACONS; i++) {
          const b = beacons[i];
          if (b.lit && b.fireLife <= 0 && currentBeacon <= NUM_BEACONS - 1) {
            // Only fail if not all beacons are lit
            if (currentBeacon < NUM_BEACONS) {
              mode = "failed"; shake = 8;
              window.relayStageResult.status = "failed"; reportFailed("불이 꺼짐");
              return;
            }
          }
        }

        // Check win
        if (beacons.every(b => b.lit)) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared();
        }
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Sunset sky
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, COL.skyTop); skyGrad.addColorStop(0.5, COL.skyMid); skyGrad.addColorStop(1, COL.skyBot);
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

        // Mountains
        drawMountains();

        // Ground
        ctx.fillStyle = COL.ground; ctx.fillRect(0, H - 30, W, 30);

        // Beacons
        for (let i = 0; i < beacons.length; i++) drawBeacon(i);

        // Fire particles
        for (const p of fireParticles) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          const t = p.life;
          ctx.fillStyle = t > 0.5 ? COL.fireYellow : COL.ember;
          ctx.globalAlpha = p.life; ctx.fill(); ctx.globalAlpha = 1;
        }

        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawMountains() {
        // Back mountains
        ctx.fillStyle = COL.mountainDark;
        ctx.beginPath(); ctx.moveTo(0, H * 0.6);
        for (let x = 0; x <= W; x += 80) {
          ctx.lineTo(x, H * 0.6 - Math.sin(x * 0.008 + 1) * 60 - Math.sin(x * 0.015) * 30);
        }
        ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();

        // Front mountains
        ctx.fillStyle = COL.mountain;
        ctx.beginPath(); ctx.moveTo(0, H * 0.65);
        for (let x = 0; x <= W; x += 60) {
          ctx.lineTo(x, H * 0.65 - Math.sin(x * 0.01 + 2) * 50 - Math.sin(x * 0.02) * 20);
        }
        ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
      }

      function drawBeacon(idx) {
        const b = beacons[idx];

        // Stone tower
        ctx.fillStyle = COL.stone;
        ctx.fillRect(b.x - 10, b.y - 5, 20, 30);
        ctx.fillStyle = COL.stoneDark;
        ctx.fillRect(b.x - 14, b.y - 8, 28, 6);
        ctx.fillRect(b.x - 12, b.y + 22, 24, 6);

        // Fire bowl
        ctx.beginPath();
        ctx.ellipse(b.x, b.y - 8, 16, 6, 0, 0, Math.PI * 2);
        ctx.fillStyle = COL.stoneDark; ctx.fill();

        if (b.lit && b.fireLife > 0) {
          const intensity = clamp(b.fireLife / b.fireMax, 0, 1);

          // Fire glow
          if (!reducedMotion) {
            ctx.beginPath();
            ctx.arc(b.x, b.y - 20, 30 + intensity * 10, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,96,32,${intensity * 0.2})`;
            ctx.fill();
          }

          // Flames
          const flameH = 20 + intensity * 15;
          for (let f = 0; f < 3; f++) {
            const fx = b.x + (f - 1) * 6 + Math.sin(elapsed * 8 + f * 2) * 3;
            const fy = b.y - 12;
            ctx.beginPath();
            ctx.moveTo(fx - 5, fy);
            ctx.quadraticCurveTo(fx + wind.x * 0.1, fy - flameH * (0.7 + f * 0.1), fx + 5, fy);
            ctx.fillStyle = f === 1 ? COL.fireYellow : COL.fire;
            ctx.globalAlpha = intensity;
            ctx.fill();
            ctx.globalAlpha = 1;
          }

          // Fire life bar under beacon
          const barW = 30, barH = 3;
          ctx.fillStyle = "rgba(90,58,26,0.3)";
          ctx.fillRect(b.x - barW / 2, b.y + 32, barW, barH);
          ctx.fillStyle = intensity > 0.3 ? COL.fire : COL.damage;
          ctx.fillRect(b.x - barW / 2, b.y + 32, barW * intensity, barH);
        } else if (!b.lit) {
          // Unlit indicator - pulsing circle for next target
          if (idx === currentBeacon || (idx === 0 && currentBeacon === 0)) {
            const pulse = 0.4 + Math.sin(elapsed * 4) * 0.2;
            ctx.beginPath();
            ctx.arc(b.x, b.y - 15, 22, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(212,118,58,${pulse})`;
            ctx.lineWidth = 2; ctx.stroke();
          }
        }

        // Number label
        ctx.fillStyle = COL.textLight; ctx.font = "bold 12px Trebuchet MS,sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(`${idx + 1}`, b.x, b.y + 38);
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = "bold 16px Trebuchet MS,sans-serif";
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        const litCount = beacons.filter(b => b.lit).length;
        ctx.fillText(`\uD83D\uDD25 ${litCount} / ${NUM_BEACONS}`, 20, 16);

        ctx.textAlign = "right"; ctx.font = "14px Trebuchet MS,sans-serif"; ctx.fillStyle = COL.textLight;
        ctx.fillText(`${Math.ceil(elapsed)}s`, W - 20, 16);
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
      }
      function drawCard(title, lines, accent) {
        const cW = Math.min(340, W - 40), lH = 24, cH = 44 + lines.length * lH + 36;
        const cX = CX - cW / 2, cY = CY - cH / 2;
        ctx.fillStyle = COL.card; roundRect(ctx, cX, cY, cW, cH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cX + 16, cY, cW - 32, 3);
        ctx.fillStyle = COL.text; ctx.font = "bold 22px Trebuchet MS,sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cY + 16);
        ctx.font = "14px Trebuchet MS,sans-serif"; ctx.fillStyle = "rgba(90,58,26,0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cY + 48 + i * lH);
        ctx.fillStyle = "rgba(90,58,26,0.35)"; ctx.font = "13px Trebuchet MS,sans-serif";
        ctx.fillText("TAP or ENTER", CX, cY + cH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(255,248,235,0.4)"; ctx.fillRect(0, 0, W, H);
        drawCard("봉화 릴레이", ["산 위의 봉화를 차례로 점화해", "신호를 전달하세요!", "", "조작: 화면 터치로 봉화대를 점화", "클리어: 5개 봉화대 모두 점화", "실패: 불이 꺼지면"], COL.accent);
      }
      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(255,248,235,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 신호 전달 완료`, `\uD83D\uDD25 ${NUM_BEACONS}개 봉화 점화`], COL.accent);
      }
      function drawFailed() {
        ctx.fillStyle = "rgba(60,20,10,0.25)"; ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["봉화의 불이 꺼졌습니다", `\uD83D\uDD25 ${beacons.filter(b => b.lit).length} / ${NUM_BEACONS}`], COL.damage);
      }

      function handleStart() { if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; } }

      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) * (W / rect.width), y: (e.clientY - rect.top) * (H / rect.height) };
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e);
        tryTap(p.x, p.y);
      });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (mode !== "running") { handleStart(); return; }
          if (currentBeacon < NUM_BEACONS) igniteBeacon(currentBeacon);
        }
      });

      function gameLoop(ts) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = ts; return; }
        let dt = Math.min((ts - lastTimestamp) / 1000, MAX_DT); lastTimestamp = ts;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        const litCount = beacons.filter(b => b.lit).length;
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), lit: litCount, currentBeacon, result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const s = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < s; i++) update(FIXED_DT); draw(); return renderGameToText(); };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; beacons.forEach(b => { b.lit = true; b.fireLife = b.fireMax; }); currentBeacon = NUM_BEACONS; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; beacons[0].lit = true; beacons[0].fireLife = 0; currentBeacon = 1; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      initBeacons(); reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
