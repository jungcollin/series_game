<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>비빔밥 비비기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #FFF5EB; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(200, 100, 50, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(100, 50, 20, 0.92);
        color: #FFF5EB; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        background: #FFF5EB; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 80, 40, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">비빔밥 비비기. 돌솥 비빔밥을 원형 드래그로 비벼서 모든 재료를 골고루 섞는 게임. 드래그로 원형 비비기. 모바일에서는 화면 터치 드래그로 플레이합니다. 모든 재료를 골고루 비비면 클리어. 시간 초과 또는 밥이 넘치면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="비빔밥 비비기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      let W = canvas.width;
      let H = canvas.height;
      let CX = W / 2;
      let CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "bibimbap-mix",
        title: "비빔밥 비비기",
        description: "돌솥 비빔밥을 원형 드래그로 비벼서 모든 재료를 골고루 섞는 게임.",
        creator: "jungcollin",
        genre: "Mixing action",
        clearCondition: "모든 재료를 골고루 비비면 클리어",
        failCondition: "시간 초과 또는 밥이 넘치면 실패",
        controls: "드래그로 원형 비비기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#FFF5EB",
        bowl: "#5C4033",
        bowlInner: "#8B6914",
        bowlRim: "#7A5C3A",
        rice: "#FFFDE7",
        gochujang: "#C62828",
        spinach: "#4CAF50",
        carrot: "#FF8F00",
        egg: "#FFD54F",
        meat: "#6D4C41",
        sesame: "#FFF8E1",
        text: "#5C3310",
        textLight: "rgba(92, 51, 16, 0.5)",
        success: "#66BB6A",
        fail: "#E53935",
      };

      const DURATION = 35;
      const BOWL_R = 180;
      const MIX_THRESHOLD = 85;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let clearAnim = 0;

      // Ingredients as particles
      let ingredients = [];
      let mixLevel = 0; // 0-100
      let spoonAngle = 0;
      let isDragging = false;
      let lastDragAngle = 0;
      let totalRotation = 0;
      let dragSpeed = 0;
      let spillAmount = 0;
      let particles = [];

      const INGREDIENT_TYPES = [
        { name: "밥", color: COL.rice, count: 30, r: 6 },
        { name: "고추장", color: COL.gochujang, count: 12, r: 5 },
        { name: "시금치", color: COL.spinach, count: 10, r: 4 },
        { name: "당근", color: COL.carrot, count: 10, r: 4 },
        { name: "달걀", color: COL.egg, count: 8, r: 5 },
        { name: "고기", color: COL.meat, count: 8, r: 5 },
      ];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function resizeCanvas() {
        const previousCX = CX;
        const previousCY = CY;
        const rect = canvas.getBoundingClientRect();
        const cssWidth = Math.max(1, rect.width || window.innerWidth);
        const cssHeight = Math.max(1, rect.height || window.innerHeight);
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(cssWidth * dpr);
        canvas.height = Math.round(cssHeight * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        W = cssWidth;
        H = cssHeight;
        CX = W / 2;
        CY = H / 2;

        const offsetX = CX - previousCX;
        const offsetY = CY - previousCY;
        if (Number.isFinite(offsetX) && Number.isFinite(offsetY) && ingredients.length) {
          for (const ing of ingredients) {
            ing.x += offsetX;
            ing.y += offsetY;
          }
          for (const p of particles) {
            p.x += offsetX;
            p.y += offsetY;
          }
        }
      }

      function generateIngredients() {
        ingredients = [];
        // Place each type in a sector of the bowl
        const sectorAngle = Math.PI * 2 / INGREDIENT_TYPES.length;
        INGREDIENT_TYPES.forEach((type, ti) => {
          const baseAngle = ti * sectorAngle;
          for (let i = 0; i < type.count; i++) {
            const angle = baseAngle + rand(-sectorAngle * 0.4, sectorAngle * 0.4);
            const r = rand(20, BOWL_R - 30);
            ingredients.push({
              x: CX + Math.cos(angle) * r,
              y: CY + Math.sin(angle) * r,
              vx: 0, vy: 0,
              type: ti,
              color: type.color,
              r: type.r + rand(-1, 1),
              originalAngle: baseAngle,
            });
          }
        });
      }

      function calculateMixLevel() {
        // Check how evenly distributed the ingredients are
        const sectors = 6;
        const sectorCounts = Array(sectors).fill(null).map(() => Array(INGREDIENT_TYPES.length).fill(0));

        for (const ing of ingredients) {
          const dx = ing.x - CX, dy = ing.y - CY;
          let angle = Math.atan2(dy, dx);
          if (angle < 0) angle += Math.PI * 2;
          const sector = Math.floor(angle / (Math.PI * 2 / sectors)) % sectors;
          sectorCounts[sector][ing.type]++;
        }

        // Calculate evenness (lower deviation = better mix)
        let totalDev = 0;
        let checks = 0;
        for (let t = 0; t < INGREDIENT_TYPES.length; t++) {
          const counts = sectorCounts.map(s => s[t]);
          const avg = counts.reduce((a, b) => a + b, 0) / sectors;
          if (avg === 0) continue;
          const dev = counts.reduce((sum, c) => sum + Math.abs(c - avg), 0) / sectors;
          totalDev += dev / avg;
          checks++;
        }

        if (checks === 0) return 0;
        const avgDev = totalDev / checks;
        return clamp(100 - avgDev * 50, 0, 100);
      }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 120);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 30,
            life: 1, color, size: rand(2, 4),
          });
        }
      }

      function reset() {
        elapsed = 0; shake = 0; clearAnim = 0;
        mixLevel = 0; spoonAngle = 0; isDragging = false;
        totalRotation = 0; dragSpeed = 0; spillAmount = 0;
        particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateIngredients();
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        if (elapsed >= DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
          return;
        }

        // Spill check: if mixing too fast
        if (Math.abs(dragSpeed) > 12) {
          spillAmount += Math.abs(dragSpeed) * dt * 0.5;
          if (spillAmount > 30) {
            shake = 8;
            mode = "failed";
            window.relayStageResult.status = "failed";
            reportFailed("밥이 넘침");
            return;
          }
        }
        spillAmount = Math.max(0, spillAmount - dt * 3);

        // Move ingredients based on spoon rotation
        if (isDragging && Math.abs(dragSpeed) > 0.5) {
          const rotForce = dragSpeed * 8;
          for (const ing of ingredients) {
            const dx = ing.x - CX, dy = ing.y - CY;
            const d = Math.hypot(dx, dy);
            if (d < 10) continue;
            // Circular force
            const nx = -dy / d, ny = dx / d;
            const force = rotForce * (1 - d / BOWL_R) * 0.3;
            ing.vx += nx * force * dt;
            ing.vy += ny * force * dt;
            // Slight radial mixing
            ing.vx += rand(-15, 15) * dt;
            ing.vy += rand(-15, 15) * dt;
          }
        }

        // Update ingredient positions
        for (const ing of ingredients) {
          ing.x += ing.vx * dt;
          ing.y += ing.vy * dt;
          ing.vx *= 0.92;
          ing.vy *= 0.92;

          // Keep inside bowl
          const dx = ing.x - CX, dy = ing.y - CY;
          const d = Math.hypot(dx, dy);
          if (d > BOWL_R - 20) {
            const nx = dx / d, ny = dy / d;
            ing.x = CX + nx * (BOWL_R - 20);
            ing.y = CY + ny * (BOWL_R - 20);
            ing.vx -= nx * Math.abs(ing.vx) * 0.5;
            ing.vy -= ny * Math.abs(ing.vy) * 0.5;
          }
        }

        // Recalculate mix level periodically
        mixLevel = calculateMixLevel();

        // Check win
        if (mixLevel >= MIX_THRESHOLD) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          spawnParticles(CX, CY, reducedMotion ? 8 : 25, COL.success);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 150 * dt; p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.9;
        if (shake < 0.3) shake = 0;
        dragSpeed *= 0.9;
      }

      function drawBowl() {
        // Bowl shadow
        ctx.beginPath();
        ctx.ellipse(CX + 5, CY + 8, BOWL_R + 10, BOWL_R + 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(60,30,10,0.12)";
        ctx.fill();

        // Bowl outer
        ctx.beginPath();
        ctx.arc(CX, CY, BOWL_R + 8, 0, Math.PI * 2);
        ctx.fillStyle = COL.bowl;
        ctx.fill();

        // Bowl inner
        ctx.beginPath();
        ctx.arc(CX, CY, BOWL_R, 0, Math.PI * 2);
        ctx.fillStyle = COL.bowlInner;
        ctx.fill();

        // Bowl inner gradient (depth)
        const grad = ctx.createRadialGradient(CX - 30, CY - 30, 10, CX, CY, BOWL_R);
        grad.addColorStop(0, "rgba(255,255,240,0.15)");
        grad.addColorStop(1, "rgba(0,0,0,0.1)");
        ctx.fillStyle = grad;
        ctx.fill();
      }

      function drawIngredients() {
        for (const ing of ingredients) {
          ctx.beginPath();
          ctx.arc(ing.x, ing.y, ing.r, 0, Math.PI * 2);
          ctx.fillStyle = ing.color;
          ctx.fill();
        }
      }

      function drawSpoon() {
        // Spoon following drag or resting
        const sx = CX + Math.cos(spoonAngle) * 60;
        const sy = CY + Math.sin(spoonAngle) * 60;
        const ex = CX + Math.cos(spoonAngle) * (BOWL_R + 60);
        const ey = CY + Math.sin(spoonAngle) * (BOWL_R + 60);

        // Handle
        ctx.strokeStyle = "#8B7355";
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();

        // Spoon head
        ctx.beginPath();
        ctx.arc(sx, sy, 14, 0, Math.PI * 2);
        ctx.fillStyle = "#A0896C";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx, sy, 10, 0, Math.PI * 2);
        ctx.fillStyle = "#B8A080";
        ctx.fill();
      }

      function drawMixMeter() {
        const meterW = 200;
        const meterH = 12;
        const meterX = CX - meterW / 2;
        const meterY = H - 40;

        ctx.fillStyle = "rgba(0,0,0,0.06)";
        ctx.fillRect(meterX, meterY, meterW, meterH);

        const fillColor = mixLevel > 70 ? COL.success : mixLevel > 40 ? COL.egg : COL.gochujang;
        ctx.fillStyle = fillColor;
        ctx.fillRect(meterX, meterY, meterW * (mixLevel / 100), meterH);

        ctx.strokeStyle = COL.textLight;
        ctx.lineWidth = 1;
        ctx.strokeRect(meterX, meterY, meterW, meterH);

        // Target line
        ctx.strokeStyle = COL.success;
        ctx.lineWidth = 2;
        const targetX = meterX + meterW * (MIX_THRESHOLD / 100);
        ctx.beginPath();
        ctx.moveTo(targetX, meterY - 4);
        ctx.lineTo(targetX, meterY + meterH + 4);
        ctx.stroke();

        ctx.fillStyle = COL.textLight;
        ctx.font = "500 12px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText("섞임 정도", CX, meterY - 8);
      }

      function drawSpillWarning() {
        if (spillAmount > 10) {
          ctx.fillStyle = `rgba(229, 57, 53, ${spillAmount / 40})`;
          ctx.font = "bold 16px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText("너무 빨라요!", CX, 80);
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = "bold 18px Trebuchet MS";
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`섞임: ${Math.round(mixLevel)}%`, 24, 20);

        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.textAlign = "right";
        ctx.fillStyle = timeLeft < 10 ? COL.fail : COL.text;
        ctx.fillText(`${Math.ceil(timeLeft)}초`, W - 24, 20);

        drawMixMeter();
        drawSpillWarning();
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y); c.lineTo(x + w - r, y);
        c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r);
        c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h);
        c.arcTo(x, y + h, x, y + h - r, r);
        c.lineTo(x, y + r);
        c.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40);
        const lineH = 28;
        const cardH = 50 + lines.length * lineH + 44;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(255,245,235,0.95)";
        roundRect(ctx, cardX, cardY, cardW, cardH, 12);
        ctx.fill();

        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 16, cardY, cardW - 32, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 24px Trebuchet MS";
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "500 14px Trebuchet MS";
        ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 52 + i * lineH);
        }

        ctx.fillStyle = "rgba(92,51,16,0.3)";
        ctx.font = "400 13px Trebuchet MS";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 22);
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        ctx.fillStyle = COL.bg;
        ctx.fillRect(0, 0, W, H);

        drawBowl();
        drawIngredients();
        drawSpoon();
        drawParticles();
        if (mode === "running") drawHUD();

        ctx.restore();

        if (mode === "menu") {
          ctx.fillStyle = "rgba(255,245,235,0.5)";
          ctx.fillRect(0, 0, W, H);
          drawCard("비빔밥 비비기", [
            "원형 드래그로 비빔밥을",
            "골고루 비벼주세요!",
            "",
            "조작: 드래그로 원형 비비기",
            "클리어: 재료를 골고루 섞기",
            "실패: 시간 초과 또는 너무 세게",
          ], COL.gochujang);
        } else if (mode === "clear") {
          clearAnim = clamp(clearAnim + 0.02, 0, 1);
          ctx.fillStyle = `rgba(255,245,235,${clearAnim * 0.5})`;
          ctx.fillRect(0, 0, W, H);
          if (clearAnim > 0.3) {
            drawCard("맛있겠다!", [
              `${Math.ceil(elapsed)}초 만에 완성`,
              `섞임 정도: ${Math.round(mixLevel)}%`,
            ], COL.success);
          }
        } else if (mode === "failed") {
          ctx.fillStyle = "rgba(100,40,15,0.25)";
          ctx.fillRect(0, 0, W, H);
          drawCard("이런!", [
            elapsed >= DURATION ? "시간이 다했습니다" : "밥이 넘쳐버렸습니다",
            `섞임 정도: ${Math.round(mixLevel)}%`,
          ], COL.fail);
        }
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const rw = Math.max(1, rect.width);
        const rh = Math.max(1, rect.height);
        return {
          x: (clientX - rect.left) * (W / rw),
          y: (clientY - rect.top) * (H / rh),
        };
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") {
          if (mode === "menu" || mode === "clear" || mode === "failed") {
            reset(); mode = "running";
          } else {
            return;
          }
        }
        const pos = getCanvasPos(e.clientX, e.clientY);
        if (dist(pos.x, pos.y, CX, CY) < BOWL_R + 80) {
          isDragging = true;
          lastDragAngle = Math.atan2(pos.y - CY, pos.x - CX);
          if (canvas.setPointerCapture && e.pointerId !== undefined) {
            try { canvas.setPointerCapture(e.pointerId); } catch {}
          }
        }
        canvas.focus();
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const pos = getCanvasPos(e.clientX, e.clientY);
        const angle = Math.atan2(pos.y - CY, pos.x - CX);
        let delta = angle - lastDragAngle;
        // Normalize
        if (delta > Math.PI) delta -= Math.PI * 2;
        if (delta < -Math.PI) delta += Math.PI * 2;

        dragSpeed = delta * 60; // radians per second-ish
        spoonAngle = angle;
        totalRotation += Math.abs(delta);
        lastDragAngle = angle;
      });

      canvas.addEventListener("pointerup", (e) => {
        isDragging = false;
        if (canvas.releasePointerCapture && e.pointerId !== undefined) {
          try { canvas.releasePointerCapture(e.pointerId); } catch {}
        }
      });
      canvas.addEventListener("pointercancel", (e) => {
        isDragging = false;
        if (canvas.releasePointerCapture && e.pointerId !== undefined) {
          try { canvas.releasePointerCapture(e.pointerId); } catch {}
        }
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (mode !== "running") { reset(); mode = "running"; }
        }
      });

      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          mixLevel: Math.round(mixLevel),
          spillAmount: +spillAmount.toFixed(1),
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          mixLevel = 100;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      resizeCanvas();
      window.addEventListener("resize", resizeCanvas);
      generateIngredients();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
