<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Stages - One Life Relay</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./gallery.css" />
  </head>
  <body>
    <a class="skip-link" href="#gallery-main">본문으로 건너뛰기</a>
    <main id="gallery-main" class="gallery-shell">
      <header class="gallery-topbar">
        <div class="gallery-head">
          <p class="eyebrow">ONE LIFE RELAY</p>
          <div class="gallery-actions">
            <a href="../index.html" class="action-btn">메인으로</a>
          </div>
        </div>
        <div class="gallery-title-block">
          <h1>Community Stages</h1>
          <p class="subtitle">
            전체 스테이지를 둘러보고 마음에 드는 게임에 좋아요를 눌러보세요.
            인기 있는 스테이지가 메인 릴레이에 우선 등장합니다.
          </p>
        </div>
      </header>

      <div class="gallery-sort">
        <span>정렬:</span>
        <button class="sort-btn" data-sort="popular" data-active="true" aria-pressed="true" type="button">인기순</button>
        <button class="sort-btn" data-sort="newest" aria-pressed="false" type="button">최신순</button>
        <button class="sort-btn" data-sort="name" aria-pressed="false" type="button">이름순</button>
      </div>
      <p id="gallery-feedback" class="gallery-feedback" aria-live="polite"></p>

      <section id="gallery-grid" class="gallery-grid"></section>
    </main>
    <script src="./relay-runtime.js"></script>
    <script src="./registry.js"></script>
    <script src="./likes-client.js"></script>
    <script src="./gallery.js"></script>
  </body>
</html>
