<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>커뮤니티 스테이지 - One Life Relay</title>
    <meta
      name="description"
      content="One Life Relay의 커뮤니티 스테이지를 둘러보고 인기순, 최신순, 이름순으로 탐색하세요."
    />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="./gallery.css?v=20260328c" />
  </head>
  <body>
    <a class="skip-link" href="#gallery-main">본문으로 건너뛰기</a>

    <!-- Floating Island Nav -->
    <nav class="navbar" aria-label="주 메뉴">
      <div class="navbar-container">
        <a href="../index.html" class="navbar-brand">
          <span class="logo-text">OLR</span>
        </a>
        <div class="navbar-actions">
          <a href="../index.html" class="nav-btn magnetic-btn">PLAY</a>
        </div>
      </div>
    </nav>

    <main id="gallery-main" class="gallery-shell">
      <header class="gallery-hero reveal-up">
        <h1 class="gallery-title">COMMUNITY STAGES</h1>
        <p class="gallery-subtitle">
          플레이어들이 직접 제작한 스테이지를 탐색하고 평가하세요.
        </p>
      </header>

      <div class="gallery-controls reveal-up" style="transition-delay: 100ms">
        <div class="gallery-sort-group">
          <span class="sort-label">SORT</span>
          <button class="sort-btn magnetic-btn" data-sort="popular" data-active="true" aria-pressed="true" type="button">인기순</button>
          <button class="sort-btn magnetic-btn" data-sort="newest" aria-pressed="false" type="button">최신순</button>
          <button class="sort-btn magnetic-btn" data-sort="name" aria-pressed="false" type="button">이름순</button>
        </div>
        <p id="gallery-feedback" class="gallery-feedback" aria-live="polite"></p>
      </div>

      <section id="gallery-grid" class="gallery-grid"></section>
    </main>

    <script src="./relay-runtime.js"></script>
    <script src="./registry.js"></script>
    <script src="./likes-client.js"></script>
    <script src="./gallery.js"></script>
    <script src="../interactions.js"></script>
  </body>
</html>
