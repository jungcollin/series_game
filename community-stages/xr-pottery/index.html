<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Meteor Sweep 3D</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: #020617;
    }

    .skip-link {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 40;
      width: 1px;
      height: 1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      clip-path: inset(50%);
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.94);
      color: #f8fafc;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .skip-link:focus,
    .skip-link:focus-visible {
      width: auto;
      height: auto;
      padding: 12px 16px;
      overflow: visible;
      clip: auto;
      clip-path: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    canvas#game {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      z-index: 10;
      touch-action: none;
    }

    canvas#game:focus-visible {
      outline: 4px solid rgba(248, 250, 252, 0.92);
      outline-offset: -8px;
    }

    .hud {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      pointer-events: none;
    }

    .chip {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.68);
      border: 1px solid rgba(148, 163, 184, 0.42);
      color: #f8fafc;
      font-size: 14px;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }

    .card {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 20px;
      pointer-events: none;
    }

    .card[hidden] {
      display: none;
    }

    .card-panel {
      width: min(540px, calc(100vw - 40px));
      background: rgba(248, 250, 252, 0.95);
      border: 3px solid #22d3ee;
      border-radius: 18px;
      padding: 20px 20px 18px;
      text-align: center;
      box-shadow: 0 20px 46px rgba(2, 6, 23, 0.45);
      color: #0b1120;
    }

    .card h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4.2vw, 38px);
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .card p {
      margin: 0;
      font-size: clamp(17px, 2.5vw, 21px);
      line-height: 1.35;
      font-weight: 650;
    }

    .card p + p {
      margin-top: 10px;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
  <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js"
        }
      }
    </script>
</head>

<body>
  <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
  <p id="stage-instructions" class="sr-only">Meteor Sweep 3D. 조작: 하단 드래그·화살표 이동, 상단 드래그·Q/E/R/F/Z/X 카메라. 클리어 조건: 35초 안에 에너지 8개 수집. 실패 조건: 운석 충돌 또는 시간 초과. 터치 또는 Enter로 시작.</p>
  <canvas id="game" width="960" height="540" aria-label="Meteor Sweep 3D" aria-describedby="stage-instructions" tabindex="0"></canvas>

  <div class="hud" aria-live="polite">
    <span class="chip" id="hud-time">⏱ 35초</span>
    <span class="chip" id="hud-score">에너지 0/8</span>
    <span class="chip" id="hud-input">입력: 터치/드래그</span>
  </div>

  <div class="card" id="card" role="status">
    <div class="card-panel" id="card-panel">
      <h1 id="card-title">Meteor Sweep 3D</h1>
      <p id="card-line1">조작: 하단 드래그·화살표 이동, 상단 드래그·Q/E/R/F/Z/X 카메라</p>
      <p id="card-line2">클리어: 35초 안에 에너지 8개 수집</p>
      <p id="card-line3">실패: 운석 충돌 또는 시간 초과</p>
      <p id="card-line4">터치 또는 Enter로 시작</p>
    </div>
  </div>

  <script src="../relay-runtime.js"></script>
  <script src="../registry.js"></script>
  <script>
    window.relayStageMeta = {
      id: "xr-pottery",
      title: "Meteor Sweep 3D",
      creator: "jungcollin",
      genre: "Three.js Action",
      controls: "하단 드래그·화살표 이동, 상단 드래그·Q/E/R/F/Z/X 카메라",
      clearCondition: "35초 안에 에너지 8개 수집",
      failCondition: "운석 충돌 또는 시간 초과",
    };

    window.relayStageResult = {
      status: "running",
      mode: "menu",
      inputMode: "pointer",
      elapsed: 0,
      cameraYaw: 0,
      cameraPitch: 0,
      cameraDistance: 3.7,
    };
  </script>

  <script type="module">
    import * as THREE from "three";

    const canvas = document.querySelector("#game");
    const hudTime = document.querySelector("#hud-time");
    const hudScore = document.querySelector("#hud-score");
    const hudInput = document.querySelector("#hud-input");
    const card = document.querySelector("#card");
    const cardPanel = document.querySelector("#card-panel");
    const cardTitle = document.querySelector("#card-title");
    const cardLine1 = document.querySelector("#card-line1");
    const cardLine2 = document.querySelector("#card-line2");
    const cardLine3 = document.querySelector("#card-line3");
    const cardLine4 = document.querySelector("#card-line4");

    const relayContext = window.RelayRuntime?.readContext("xr-pottery") || {
      history: [], clearCount: 0, previousStageId: null,
    };

    const FIXED_DT = 1 / 60;
    const MAX_DT = 1 / 20;
    const DURATION = 35;
    const TARGET_ORBS = 8;
    const PLAYER_SPEED = 2.15;
    const ARENA_HALF_WIDTH = 1.28;
    const CAMERA_DEFAULT = { yaw: 0, pitch: -0.16, distance: 3.7 };
    const CAMERA_LIMITS = {
      yawMin: -0.95,
      yawMax: 0.95,
      pitchMin: -0.6,
      pitchMax: 0.28,
      distanceMin: 2.8,
      distanceMax: 5.3,
    };
    const CAMERA_DRAG_SENSITIVITY = { yaw: 0.0024, pitch: 0.002 };
    const CAMERA_KEY_SPEED = { yaw: 1.28, pitch: 1.0, zoom: 1.7 };
    const CAMERA_WHEEL_SENSITIVITY = 0.0016;

    let lastTimestamp = 0;
    let animationFrame = 0;
    let hostFailedReported = false;
    let hostClearedReported = false;

    const state = {
      mode: "menu",
      elapsed: 0,
      lastRunTime: 0,
      energy: 0,
      inputMode: "pointer",
      playerX: 0,
      worldTime: 0,
      cameraYaw: CAMERA_DEFAULT.yaw,
      cameraPitch: CAMERA_DEFAULT.pitch,
      cameraDistance: CAMERA_DEFAULT.distance,
      note: "Three.js 회피 + 수집 스테이지",
    };

    const input = {
      left: false,
      right: false,
      pointerActive: false,
      pointerId: null,
      pointerMode: "player",
      pointerTargetX: 0,
      pointerMoved: false,
      pointerDownX: 0,
      pointerDownY: 0,
      pointerLastX: 0,
      pointerLastY: 0,
      camYawLeft: false,
      camYawRight: false,
      camPitchUp: false,
      camPitchDown: false,
      camZoomIn: false,
      camZoomOut: false,
    };

    const world = {
      scene: null,
      camera: null,
      renderer: null,
      fallbackContext: null,
      fallbackScale: 1,
      root: null,
      player: null,
      starField: null,
      meteorGroup: null,
      orbGroup: null,
      trailGroup: null,
      meteors: [],
      orbs: [],
      sparkles: [],
      meteorSpawnClock: 0,
      orbSpawnClock: 0,
    };

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function clampCameraState() {
      state.cameraYaw = clamp(state.cameraYaw, CAMERA_LIMITS.yawMin, CAMERA_LIMITS.yawMax);
      state.cameraPitch = clamp(state.cameraPitch, CAMERA_LIMITS.pitchMin, CAMERA_LIMITS.pitchMax);
      state.cameraDistance = clamp(state.cameraDistance, CAMERA_LIMITS.distanceMin, CAMERA_LIMITS.distanceMax);
    }

    function applyCameraPose() {
      if (!world.camera) return;
      clampCameraState();
      const targetX = state.playerX * 0.28;
      const targetY = -0.62;
      const targetZ = -0.08;
      const horizontal = Math.cos(state.cameraPitch) * state.cameraDistance;
      const camX = targetX + Math.sin(state.cameraYaw) * horizontal;
      const camY = 1.2 + Math.sin(state.cameraPitch) * state.cameraDistance;
      const camZ = 0.2 + Math.cos(state.cameraYaw) * horizontal;
      world.camera.position.set(camX, camY, camZ);
      world.camera.lookAt(targetX, targetY, targetZ);
    }

    function adjustCamera(yawDelta, pitchDelta, zoomDelta = 0) {
      state.cameraYaw += yawDelta;
      state.cameraPitch += pitchDelta;
      state.cameraDistance += zoomDelta;
      clampCameraState();
      applyCameraPose();
      state.inputMode = "camera";
    }

    function isWebGLAvailable() {
      try {
        const probe = document.createElement("canvas");
        return Boolean(
          window.WebGLRenderingContext &&
          (probe.getContext("webgl") || probe.getContext("experimental-webgl"))
        );
      } catch {
        return false;
      }
    }

    function resolveRelayStatus(mode) {
      if (mode === "failed") return "failed";
      if (mode === "cleared") return "cleared";
      return "running";
    }

    function syncRelayResult() {
      window.relayStageResult.status = resolveRelayStatus(state.mode);
      window.relayStageResult.mode = state.mode;
      window.relayStageResult.inputMode = state.inputMode;
      window.relayStageResult.elapsed = Number(state.elapsed.toFixed(2));
      window.relayStageResult.energy = state.energy;
      window.relayStageResult.target = TARGET_ORBS;
      window.relayStageResult.playerX = Number(state.playerX.toFixed(3));
      window.relayStageResult.cameraYaw = Number(state.cameraYaw.toFixed(3));
      window.relayStageResult.cameraPitch = Number(state.cameraPitch.toFixed(3));
      window.relayStageResult.cameraDistance = Number(state.cameraDistance.toFixed(2));
    }

    function inRelayHost() {
      try {
        return window.parent && window.parent !== window && window.parent.RelayHost;
      } catch {
        return false;
      }
    }

    function reportReadyToHost() {
      if (!inRelayHost()) return;
      window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
    }

    function reportFailedToHost(reason = "failed") {
      if (!inRelayHost() || hostFailedReported) return;
      hostFailedReported = true;
      window.parent.RelayHost.onStageFailed?.({
        stageId: window.relayStageMeta.id,
        stageTitle: window.relayStageMeta.title,
        reason,
        durationSec: Number(state.lastRunTime.toFixed(1)),
      });
    }

    function reportClearedToHost() {
      if (!inRelayHost() || hostClearedReported) return;
      hostClearedReported = true;
      window.parent.RelayHost.onStageCleared?.({
        stageId: window.relayStageMeta.id,
        stageTitle: window.relayStageMeta.title,
        clearCountAfter: relayContext.clearCount + 1,
        durationSec: Number(state.lastRunTime.toFixed(1)),
      });
    }

    function setupWorld() {
      world.scene = new THREE.Scene();
      world.scene.background = new THREE.Color(0x020617);

      world.camera = new THREE.PerspectiveCamera(52, 16 / 9, 0.1, 30);

      world.root = new THREE.Group();
      world.scene.add(world.root);

      const ambient = new THREE.AmbientLight(0xffffff, 0.58);
      world.scene.add(ambient);

      const key = new THREE.DirectionalLight(0xc4e1ff, 1.03);
      key.position.set(1.8, 2.4, 1.7);
      world.scene.add(key);

      const fill = new THREE.DirectionalLight(0xffdfb9, 0.7);
      fill.position.set(-1.4, 1.7, -1.2);
      world.scene.add(fill);

      const lane = new THREE.Mesh(
        new THREE.PlaneGeometry(3.6, 3.6),
        new THREE.MeshPhongMaterial({ color: 0x0b1328, shininess: 9 })
      );
      lane.position.set(0, -1.18, -0.22);
      lane.rotation.x = -Math.PI / 2;
      world.root.add(lane);

      const laneGuide = new THREE.Mesh(
        new THREE.RingGeometry(0.78, 1.35, 64),
        new THREE.MeshBasicMaterial({ color: 0x134e4a, transparent: true, opacity: 0.42, side: THREE.DoubleSide })
      );
      laneGuide.position.set(0, -1.16, -0.22);
      laneGuide.rotation.x = -Math.PI / 2;
      world.root.add(laneGuide);

      world.meteorGroup = new THREE.Group();
      world.orbGroup = new THREE.Group();
      world.trailGroup = new THREE.Group();
      world.root.add(world.meteorGroup, world.orbGroup, world.trailGroup);

      const playerMat = new THREE.MeshPhongMaterial({ color: 0x60a5fa, shininess: 88 });
      const player = new THREE.Group();
      const nose = new THREE.Mesh(new THREE.ConeGeometry(0.11, 0.3, 16), playerMat);
      nose.rotation.x = Math.PI;
      nose.position.set(0, 0.06, 0);
      const wingLeft = new THREE.Mesh(new THREE.BoxGeometry(0.045, 0.02, 0.19), playerMat);
      wingLeft.position.set(-0.12, 0.05, 0);
      const wingRight = wingLeft.clone();
      wingRight.position.x = 0.12;
      player.add(nose, wingLeft, wingRight);
      player.position.set(0, -0.92, 0.08);
      world.player = player;
      world.root.add(player);
      applyCameraPose();

      const starCount = 140;
      const starGeo = new THREE.BufferGeometry();
      const starPos = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const idx = i * 3;
        starPos[idx] = randomRange(-4.5, 4.5);
        starPos[idx + 1] = randomRange(-2.0, 3.2);
        starPos[idx + 2] = randomRange(-8.0, -1.2);
      }
      starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
      const starMat = new THREE.PointsMaterial({ color: 0xbfdbfe, size: 0.03, sizeAttenuation: true });
      world.starField = new THREE.Points(starGeo, starMat);
      world.scene.add(world.starField);

      if (!isWebGLAvailable()) {
        world.renderer = null;
        world.fallbackContext = canvas.getContext("2d");
        resizeRenderer();
        return;
      }

      try {
        world.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        world.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        world.fallbackContext = null;
        resizeRenderer();
      } catch {
        world.renderer = null;
        world.fallbackContext = canvas.getContext("2d");
        resizeRenderer();
      }
    }

    function resizeRenderer() {
      const w = canvas.clientWidth || window.innerWidth;
      const h = canvas.clientHeight || window.innerHeight;
      world.renderer?.setSize(w, h, false);
      if (world.fallbackContext) {
        world.fallbackScale = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.max(1, Math.round(w * world.fallbackScale));
        canvas.height = Math.max(1, Math.round(h * world.fallbackScale));
        world.fallbackContext.setTransform(world.fallbackScale, 0, 0, world.fallbackScale, 0, 0);
      }
      if (world.camera) {
        world.camera.aspect = w / Math.max(1, h);
        world.camera.updateProjectionMatrix();
      }
    }

    function clearEntities() {
      for (const meteor of world.meteors) {
        world.meteorGroup.remove(meteor.mesh);
      }
      for (const orb of world.orbs) {
        world.orbGroup.remove(orb.mesh);
      }
      for (const sparkle of world.sparkles) {
        world.trailGroup.remove(sparkle.mesh);
      }
      world.meteors.length = 0;
      world.orbs.length = 0;
      world.sparkles.length = 0;
    }

    function spawnMeteor(intensity) {
      const radius = randomRange(0.08, 0.15);
      const mesh = new THREE.Mesh(
        new THREE.IcosahedronGeometry(radius, 0),
        new THREE.MeshPhongMaterial({ color: 0xf97316, emissive: 0x7c2d12, shininess: 16 })
      );
      mesh.position.set(randomRange(-ARENA_HALF_WIDTH, ARENA_HALF_WIDTH), 1.33, randomRange(-0.15, 0.2));
      mesh.rotation.set(randomRange(0, Math.PI), randomRange(0, Math.PI), randomRange(0, Math.PI));
      world.meteorGroup.add(mesh);

      world.meteors.push({
        mesh,
        radius,
        speed: randomRange(0.95, 1.45) + intensity * 0.75,
        rotX: randomRange(-2.2, 2.2),
        rotY: randomRange(-2.4, 2.4),
      });
    }

    function spawnOrb() {
      const mesh = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.07, 0),
        new THREE.MeshPhongMaterial({ color: 0x38bdf8, emissive: 0x0f3d68, shininess: 92 })
      );
      mesh.position.set(randomRange(-ARENA_HALF_WIDTH * 0.95, ARENA_HALF_WIDTH * 0.95), 1.22, randomRange(-0.12, 0.16));
      world.orbGroup.add(mesh);

      world.orbs.push({
        mesh,
        radius: 0.07,
        speed: randomRange(0.8, 1.18),
        spin: randomRange(1.4, 2.7),
      });
    }

    function spawnSparkle(x, y, color = 0x67e8f9) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.028, 8, 8),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95 })
      );
      mesh.position.set(x, y, 0.14);
      world.trailGroup.add(mesh);
      world.sparkles.push({
        mesh,
        radius: 0.028,
        life: 0.34,
        vy: randomRange(0.18, 0.32),
      });
    }

    function startStage() {
      state.mode = "running";
      state.elapsed = 0;
      state.lastRunTime = 0;
      state.energy = 0;
      state.playerX = 0;
      state.inputMode = "pointer";
      state.cameraYaw = CAMERA_DEFAULT.yaw;
      state.cameraPitch = CAMERA_DEFAULT.pitch;
      state.cameraDistance = CAMERA_DEFAULT.distance;
      hostFailedReported = false;
      hostClearedReported = false;

      world.player.position.x = 0;
      applyCameraPose();
      world.meteorSpawnClock = 0.7;
      world.orbSpawnClock = 0.95;
      clearEntities();
      syncRelayResult();
    }

    function failStage(reason = "운석 충돌") {
      if (state.mode !== "running") return;
      state.mode = "failed";
      state.lastRunTime = state.elapsed;
      syncRelayResult();
      reportFailedToHost(reason);
    }

    function clearStage() {
      if (state.mode !== "running") return;
      state.mode = "cleared";
      state.lastRunTime = state.elapsed;
      syncRelayResult();
      reportClearedToHost();
    }

    function updatePlayer(dt) {
      if (input.pointerActive && input.pointerMode === "player") {
        state.playerX += (input.pointerTargetX - state.playerX) * clamp(dt * 11.5, 0, 1);
      } else {
        const direction = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        if (direction !== 0) {
          state.playerX += direction * PLAYER_SPEED * dt;
          state.inputMode = "keyboard";
        }
      }

      state.playerX = clamp(state.playerX, -ARENA_HALF_WIDTH, ARENA_HALF_WIDTH);
      world.player.position.x = state.playerX;
      world.player.rotation.z = -state.playerX * 0.22;
    }

    function updateMeteors(dt) {
      const px = world.player.position.x;
      const py = world.player.position.y;

      for (let i = world.meteors.length - 1; i >= 0; i--) {
        const meteor = world.meteors[i];
        meteor.mesh.position.y -= meteor.speed * dt;
        meteor.mesh.rotation.x += meteor.rotX * dt;
        meteor.mesh.rotation.y += meteor.rotY * dt;

        const dx = meteor.mesh.position.x - px;
        const dy = meteor.mesh.position.y - py;
        if (dx * dx + dy * dy < 0.07) {
          spawnSparkle(px, py + 0.06, 0xfb7185);
          failStage("운석 충돌");
          return;
        }

        if (meteor.mesh.position.y < -1.35) {
          world.meteorGroup.remove(meteor.mesh);
          world.meteors.splice(i, 1);
        }
      }
    }

    function updateOrbs(dt) {
      const px = world.player.position.x;
      const py = world.player.position.y;

      for (let i = world.orbs.length - 1; i >= 0; i--) {
        const orb = world.orbs[i];
        orb.mesh.position.y -= orb.speed * dt;
        orb.mesh.rotation.x += orb.spin * dt;
        orb.mesh.rotation.y += orb.spin * 1.3 * dt;

        const dx = orb.mesh.position.x - px;
        const dy = orb.mesh.position.y - py;
        if (dx * dx + dy * dy < 0.088) {
          spawnSparkle(orb.mesh.position.x, orb.mesh.position.y, 0x67e8f9);
          world.orbGroup.remove(orb.mesh);
          world.orbs.splice(i, 1);
          state.energy += 1;
          if (state.energy >= TARGET_ORBS) {
            clearStage();
            return;
          }
          continue;
        }

        if (orb.mesh.position.y < -1.35) {
          world.orbGroup.remove(orb.mesh);
          world.orbs.splice(i, 1);
        }
      }
    }

    function updateSparkles(dt) {
      for (let i = world.sparkles.length - 1; i >= 0; i--) {
        const sparkle = world.sparkles[i];
        sparkle.life -= dt;
        sparkle.mesh.position.y += sparkle.vy * dt;
        sparkle.mesh.scale.setScalar(Math.max(0.08, sparkle.life * 1.8));
        sparkle.mesh.material.opacity = clamp(sparkle.life * 3.2, 0, 1);
        if (sparkle.life <= 0) {
          world.trailGroup.remove(sparkle.mesh);
          world.sparkles.splice(i, 1);
        }
      }
    }

    function updateSpawns(dt) {
      const intensity = clamp(state.elapsed / DURATION, 0, 1);

      world.meteorSpawnClock -= dt;
      if (world.meteorSpawnClock <= 0) {
        spawnMeteor(intensity);
        world.meteorSpawnClock = randomRange(0.82, 1.05) - intensity * 0.42;
      }

      world.orbSpawnClock -= dt;
      if (world.orbSpawnClock <= 0) {
        spawnOrb();
        world.orbSpawnClock = randomRange(1.05, 1.4);
      }
    }

    function updateCameraControls(dt) {
      let cameraChanged = false;

      if (input.camYawLeft) {
        state.cameraYaw += CAMERA_KEY_SPEED.yaw * dt;
        cameraChanged = true;
      }
      if (input.camYawRight) {
        state.cameraYaw -= CAMERA_KEY_SPEED.yaw * dt;
        cameraChanged = true;
      }
      if (input.camPitchUp) {
        state.cameraPitch += CAMERA_KEY_SPEED.pitch * dt;
        cameraChanged = true;
      }
      if (input.camPitchDown) {
        state.cameraPitch -= CAMERA_KEY_SPEED.pitch * dt;
        cameraChanged = true;
      }
      if (input.camZoomIn) {
        state.cameraDistance -= CAMERA_KEY_SPEED.zoom * dt;
        cameraChanged = true;
      }
      if (input.camZoomOut) {
        state.cameraDistance += CAMERA_KEY_SPEED.zoom * dt;
        cameraChanged = true;
      }

      if (cameraChanged) {
        clampCameraState();
        applyCameraPose();
        state.inputMode = "camera";
      }
    }

    function update(dt) {
      state.worldTime += dt;
      if (world.starField) {
        world.starField.rotation.y += dt * 0.018;
      }
      updateCameraControls(dt);

      if (state.mode === "running") {
        state.elapsed += dt;
        updateSpawns(dt);
        updatePlayer(dt);
        updateMeteors(dt);
        if (state.mode === "running") {
          updateOrbs(dt);
        }
        if (state.mode === "running" && state.elapsed >= DURATION) {
          failStage("시간 초과");
        }
      }

      updateSparkles(dt);
      syncRelayResult();
    }

    function showCard(mode) {
      if (mode === "running") {
        card.hidden = true;
        return;
      }
      card.hidden = false;

      if (mode === "menu") {
        cardPanel.style.borderColor = "#22d3ee";
        cardTitle.textContent = window.relayStageMeta.title;
        cardLine1.textContent = `조작: ${window.relayStageMeta.controls}`;
        cardLine2.textContent = `클리어: ${window.relayStageMeta.clearCondition}`;
        cardLine3.textContent = `실패: ${window.relayStageMeta.failCondition}`;
        cardLine4.textContent = "터치 또는 Enter로 시작";
      } else if (mode === "failed") {
        cardPanel.style.borderColor = "#ef4444";
        cardTitle.textContent = "실패";
        cardLine1.textContent = window.relayStageMeta.failCondition;
        cardLine2.textContent = `에너지 ${state.energy}/${TARGET_ORBS}`;
        cardLine3.textContent = `플레이 시간 ${state.lastRunTime.toFixed(1)}초`;
        cardLine4.textContent = "터치 또는 Enter로 재시작";
      } else {
        cardPanel.style.borderColor = "#10b981";
        cardTitle.textContent = "클리어!";
        cardLine1.textContent = `에너지 ${state.energy}/${TARGET_ORBS}`;
        cardLine2.textContent = `플레이 시간 ${state.lastRunTime.toFixed(1)}초`;
        cardLine3.textContent = "운석을 피하고 목표를 달성했습니다";
        cardLine4.textContent = "터치 또는 Enter로 재시작";
      }
    }

    function renderHud() {
      const timeLeft = Math.max(0, DURATION - state.elapsed);
      hudTime.textContent = `⏱ ${Math.ceil(timeLeft)}초`;
      hudScore.textContent = `에너지 ${state.energy}/${TARGET_ORBS}`;
      const inputLabel = state.inputMode === "keyboard"
        ? "키보드 이동"
        : state.inputMode === "camera"
          ? "카메라 조절"
          : "터치/드래그 이동";
      hudInput.textContent = `입력: ${inputLabel}`;
    }

    function arenaToScreen(x, y, width, height) {
      const topPad = 72;
      const bottomPad = 28;
      const sidePad = 22;
      const playWidth = Math.max(60, width - sidePad * 2);
      const playHeight = Math.max(120, height - topPad - bottomPad);
      const normalizedX = clamp((x + ARENA_HALF_WIDTH) / (ARENA_HALF_WIDTH * 2), 0, 1);
      const normalizedY = clamp((1.35 - y) / 2.7, 0, 1);
      return {
        x: sidePad + normalizedX * playWidth,
        y: topPad + normalizedY * playHeight,
      };
    }

    function renderFallback() {
      const ctx = world.fallbackContext;
      if (!ctx) return;
      const scale = Math.max(1, world.fallbackScale || 1);
      const width = canvas.width / scale;
      const height = canvas.height / scale;

      const sky = ctx.createLinearGradient(0, 0, 0, height);
      sky.addColorStop(0, "#020617");
      sky.addColorStop(1, "#08163a");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, width, height);

      const laneTop = 68;
      const laneBottom = height - 24;
      ctx.fillStyle = "rgba(12, 26, 52, 0.72)";
      ctx.fillRect(18, laneTop, width - 36, laneBottom - laneTop);
      ctx.strokeStyle = "rgba(103, 232, 249, 0.22)";
      ctx.lineWidth = 2;
      ctx.strokeRect(18, laneTop, width - 36, laneBottom - laneTop);

      ctx.fillStyle = "rgba(191, 219, 254, 0.9)";
      const starCount = 48;
      for (let i = 0; i < starCount; i++) {
        const seed = i * 9.73;
        const x = ((Math.sin(seed * 1.13 + state.worldTime * 0.08) * 0.5 + 0.5) * width);
        const y = ((Math.cos(seed * 1.37) * 0.5 + 0.5) * (height * 0.65));
        const size = 0.6 + ((i * 7) % 3) * 0.35;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const meteor of world.meteors) {
        const position = arenaToScreen(meteor.mesh.position.x, meteor.mesh.position.y, width, height);
        const radius = Math.max(6, (meteor.radius || 0.1) * 78);
        ctx.fillStyle = "#f97316";
        ctx.beginPath();
        ctx.arc(position.x, position.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const orb of world.orbs) {
        const position = arenaToScreen(orb.mesh.position.x, orb.mesh.position.y, width, height);
        const radius = Math.max(5, (orb.radius || 0.07) * 82);
        ctx.fillStyle = "#38bdf8";
        ctx.beginPath();
        ctx.arc(position.x, position.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const sparkle of world.sparkles) {
        const position = arenaToScreen(sparkle.mesh.position.x, sparkle.mesh.position.y, width, height);
        const alpha = clamp(sparkle.life * 2.7, 0, 1);
        const radius = Math.max(2.4, (sparkle.radius || 0.028) * 62);
        ctx.fillStyle = `rgba(103, 232, 249, ${alpha})`;
        ctx.beginPath();
        ctx.arc(position.x, position.y, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      const playerPosition = arenaToScreen(state.playerX, -0.92, width, height);
      ctx.save();
      ctx.translate(playerPosition.x, playerPosition.y);
      ctx.rotate(-state.playerX * 0.12);
      ctx.fillStyle = "#60a5fa";
      ctx.beginPath();
      ctx.moveTo(0, -16);
      ctx.lineTo(11, 11);
      ctx.lineTo(-11, 11);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#bfdbfe";
      ctx.beginPath();
      ctx.arc(0, 2, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function renderFrame() {
      if (world.renderer) {
        world.renderer.render(world.scene, world.camera);
      } else {
        renderFallback();
      }
      showCard(state.mode);
      renderHud();
    }

    function screenXToArena(clientX) {
      const rect = canvas.getBoundingClientRect();
      const normalized = (clientX - rect.left) / Math.max(1, rect.width);
      return clamp((normalized - 0.5) * (ARENA_HALF_WIDTH * 2.2), -ARENA_HALF_WIDTH, ARENA_HALF_WIDTH);
    }

    function resolvePointerMode(event) {
      const rect = canvas.getBoundingClientRect();
      const relativeY = (event.clientY - rect.top) / Math.max(1, rect.height);
      const upperZone = relativeY < 0.42;
      const cameraMouseButton = event.pointerType === "mouse" && (event.button === 1 || event.button === 2);
      if (event.shiftKey || cameraMouseButton || upperZone) {
        return "camera";
      }
      return "player";
    }

    function beginPointer(event) {
      input.pointerActive = true;
      input.pointerId = event.pointerId;
      input.pointerDownX = event.clientX;
      input.pointerDownY = event.clientY;
      input.pointerLastX = event.clientX;
      input.pointerLastY = event.clientY;
      input.pointerMoved = false;
      input.pointerMode = resolvePointerMode(event);
      if (input.pointerMode === "camera") {
        state.inputMode = "camera";
      } else {
        input.pointerTargetX = screenXToArena(event.clientX);
        state.inputMode = "pointer";
      }

      if (canvas.setPointerCapture && event.pointerId !== undefined) {
        try {
          canvas.setPointerCapture(event.pointerId);
        } catch {
          // Synthetic pointer events in checks may fail capture.
        }
      }
    }

    function endPointer(event) {
      if (canvas.releasePointerCapture && event.pointerId !== undefined) {
        try {
          canvas.releasePointerCapture(event.pointerId);
        } catch {
          // ignore
        }
      }
      input.pointerActive = false;
      input.pointerId = null;
      input.pointerMoved = false;
    }

    function handlePointerDown(event) {
      if (event.pointerType === "mouse" && ![0, 1, 2].includes(event.button)) return;
      if (state.mode !== "running") {
        startStage();
        beginPointer(event);
        event.preventDefault();
        return;
      }
      beginPointer(event);
      event.preventDefault();
    }

    function handlePointerMove(event) {
      if (!input.pointerActive) return;
      if (event.pointerId !== input.pointerId) return;

      if (input.pointerMode === "camera") {
        const dx = event.clientX - input.pointerLastX;
        const dy = event.clientY - input.pointerLastY;
        if (dx !== 0 || dy !== 0) {
          adjustCamera(-dx * CAMERA_DRAG_SENSITIVITY.yaw, -dy * CAMERA_DRAG_SENSITIVITY.pitch);
        }
      } else {
        input.pointerTargetX = screenXToArena(event.clientX);
        state.inputMode = "pointer";
      }
      const travel = Math.hypot(event.clientX - input.pointerDownX, event.clientY - input.pointerDownY);
      if (travel > 7) {
        input.pointerMoved = true;
      }
      input.pointerLastX = event.clientX;
      input.pointerLastY = event.clientY;
      event.preventDefault();
    }

    function handlePointerUp(event) {
      if (!input.pointerActive || event.pointerId !== input.pointerId) return;
      endPointer(event);
    }

    function handlePointerCancel(event) {
      if (!input.pointerActive || event.pointerId !== input.pointerId) return;
      endPointer(event);
    }

    function handleKeyDown(event) {
      if (event.key === "Enter" && (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared")) {
        event.preventDefault();
        startStage();
        return;
      }

      const lower = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      if (event.key === "ArrowLeft" || lower === "a") {
        input.left = true;
        state.inputMode = "keyboard";
      } else if (event.key === "ArrowRight" || lower === "d") {
        input.right = true;
        state.inputMode = "keyboard";
      } else if (lower === "q") {
        input.camYawLeft = true;
        state.inputMode = "camera";
        event.preventDefault();
      } else if (lower === "e") {
        input.camYawRight = true;
        state.inputMode = "camera";
        event.preventDefault();
      } else if (lower === "r") {
        input.camPitchUp = true;
        state.inputMode = "camera";
        event.preventDefault();
      } else if (lower === "f") {
        input.camPitchDown = true;
        state.inputMode = "camera";
        event.preventDefault();
      } else if (lower === "z") {
        input.camZoomIn = true;
        state.inputMode = "camera";
        event.preventDefault();
      } else if (lower === "x") {
        input.camZoomOut = true;
        state.inputMode = "camera";
        event.preventDefault();
      } else if (lower === "c") {
        state.cameraYaw = CAMERA_DEFAULT.yaw;
        state.cameraPitch = CAMERA_DEFAULT.pitch;
        state.cameraDistance = CAMERA_DEFAULT.distance;
        applyCameraPose();
        state.inputMode = "camera";
        event.preventDefault();
      }
    }

    function handleKeyUp(event) {
      const lower = event.key.length === 1 ? event.key.toLowerCase() : event.key;
      if (event.key === "ArrowLeft" || lower === "a") {
        input.left = false;
      } else if (event.key === "ArrowRight" || lower === "d") {
        input.right = false;
      } else if (lower === "q") {
        input.camYawLeft = false;
      } else if (lower === "e") {
        input.camYawRight = false;
      } else if (lower === "r") {
        input.camPitchUp = false;
      } else if (lower === "f") {
        input.camPitchDown = false;
      } else if (lower === "z") {
        input.camZoomIn = false;
      } else if (lower === "x") {
        input.camZoomOut = false;
      }
    }

    function handleWheel(event) {
      if (state.mode !== "running") return;
      const zoomDelta = event.deltaY * CAMERA_WHEEL_SENSITIVITY;
      adjustCamera(0, 0, zoomDelta);
      event.preventDefault();
    }

    function handleContextMenu(event) {
      event.preventDefault();
    }

    function frame(timestamp) {
      const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
      lastTimestamp = timestamp;

      update(dt);
      renderFrame();
      animationFrame = requestAnimationFrame(frame);
    }

    function renderGameToText() {
      return JSON.stringify({
        mode: state.mode,
        elapsed: Math.round(state.elapsed * 10) / 10,
        result: window.relayStageResult.status,
        note: state.note,
        inputMode: state.inputMode,
        playerX: Number(state.playerX.toFixed(3)),
        energy: state.energy,
        target: TARGET_ORBS,
        meteors: world.meteors.length,
        orbs: world.orbs.length,
        cameraYaw: Number(state.cameraYaw.toFixed(3)),
        cameraPitch: Number(state.cameraPitch.toFixed(3)),
        cameraDistance: Number(state.cameraDistance.toFixed(2)),
      });
    }

    window.render_game_to_text = renderGameToText;
    window.advanceTime = (ms = 16.67) => {
      const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
      for (let i = 0; i < steps; i++) {
        update(FIXED_DT);
      }
      renderFrame();
      return renderGameToText();
    };

    window.relayStageDebug = {
      forceClear: () => {
        startStage();
        state.energy = TARGET_ORBS;
        clearStage();
        renderFrame();
      },
      forceFail: () => {
        startStage();
        failStage("debug_force_fail");
        renderFrame();
      },
    };

    window.addEventListener("resize", resizeRenderer);
    canvas.addEventListener("pointerdown", handlePointerDown, { passive: false });
    canvas.addEventListener("pointermove", handlePointerMove, { passive: false });
    canvas.addEventListener("pointerup", handlePointerUp, { passive: false });
    canvas.addEventListener("pointercancel", handlePointerCancel, { passive: false });
    canvas.addEventListener("wheel", handleWheel, { passive: false });
    canvas.addEventListener("contextmenu", handleContextMenu);
    window.addEventListener("keydown", handleKeyDown);
    window.addEventListener("keyup", handleKeyUp);
    canvas.addEventListener("click", () => canvas.focus());
    window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

    setupWorld();
    syncRelayResult();
    renderFrame();
    reportReadyToHost();
    canvas.focus();
    animationFrame = requestAnimationFrame(frame);
  </script>
</body>

</html>
