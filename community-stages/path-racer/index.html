<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>길 만들기 레이서</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #F0F5E0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(120,180,80,0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0,0,0,0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80,100,50,0.92);
        color: #f5fae8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F0F5E0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(120,180,80,0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">길 만들기 레이서. 화면 터치로 달리는 공 앞에 길 블록을 놓으세요. 결승선까지 도달하면 클리어. 공이 3번 빈 곳에 빠지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="길 만들기 레이서" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "path-racer",
        title: "길 만들기 레이서",
        description: "달리는 공 앞에 길을 깔아주는 퍼즐 레이싱",
        creator: "jungcollin",
        genre: "Puzzle racing",
        clearCondition: "결승선까지 길을 완성하면 클리어",
        failCondition: "공이 3번 빈 곳에 빠지면 실패",
        controls: "화면 터치로 앞에 길 블록을 놓으세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        grass: "#C8E090", grassDark: "#A0C060",
        path: "#E8D8B0", pathDark: "#D0C090", pathLight: "#F0E8D0",
        ball: "#E88040", ballDark: "#C06030", ballShine: "rgba(255,255,255,0.4)",
        hole: "#8A7A60", holeLight: "rgba(138,122,96,0.3)",
        finish: "#FFD54F", finishDark: "#E8B830",
        flag: "#E85050",
        hud: "#6A7A50", fail: "#C25050", success: "#5A9A50",
        cardBg: "rgba(255,255,255,0.95)", card: "#6A7A50",
      };

      // Grid system
      const COLS = 16;
      const ROWS = 7;
      const TILE = 60;
      const OFFSET_X = (W - COLS * TILE) / 2;
      const OFFSET_Y = (H - ROWS * TILE) / 2 + 20;
      const BALL_R = 14;
      const BALL_SPEED = 3; // tiles per second
      const MAX_FALLS = 3;
      const TRACK_LENGTH = 30; // tiles to finish

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      // Track: array of {col, row} positions forming the path
      let track = [];
      let placed = []; // boolean array: is tile placed?
      let ballPos = 0; // float position along track
      let falls = 0;
      let fallAnim = 0;
      let scrollX = 0;
      let particles = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color, sizeR, speedR) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2);
          const spd = rand(speedR[0], speedR[1]);
          particles.push({
            x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            life: 1, decay: rand(0.8, 1.5), color, size: rand(sizeR[0], sizeR[1]),
          });
        }
      }

      function generateTrack() {
        track = [];
        placed = [];
        let col = 1, row = Math.floor(ROWS / 2);
        for (let i = 0; i < TRACK_LENGTH; i++) {
          track.push({ col, row });
          // Pre-place first 3 tiles
          placed.push(i < 3);
          // Next position: mostly right, sometimes up/down
          const r = Math.random();
          if (r < 0.6 || col === 0) {
            col++;
          } else if (r < 0.8 && row > 1) {
            row--;
          } else if (row < ROWS - 2) {
            row++;
          } else {
            col++;
          }
        }
      }

      function startGame() {
        mode = "running"; elapsed = 0;
        falls = 0; fallAnim = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        ballPos = 0; scrollX = 0;
        particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateTrack();
      }

      function doFail(reason) {
        mode = "failed";
        window.relayStageResult.status = "failed";
        reportFailed(reason);
      }

      function doClear() {
        mode = "cleared"; clearAnim = 0;
        window.relayStageResult.status = "cleared";
        reportCleared();
      }

      // Input
      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX - rect.left) / rect.width * W, y: (e.clientY - rect.top) / rect.height * H };
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { startGame(); return; }
        const p = getCanvasPos(e);
        // Find which tile was tapped
        const gridX = Math.floor((p.x - OFFSET_X + scrollX) / TILE);
        const gridY = Math.floor((p.y - OFFSET_Y) / TILE);
        for (let i = 0; i < track.length; i++) {
          if (!placed[i] && track[i].col === gridX && track[i].row === gridY) {
            placed[i] = true;
            const tx = track[i].col * TILE + OFFSET_X - scrollX + TILE / 2;
            const ty = track[i].row * TILE + OFFSET_Y + TILE / 2;
            spawnParticles(tx, ty, 5, COL.pathDark, [2, 4], [20, 50]);
            break;
          }
        }
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && mode !== "running") startGame();
      });

      function update(dt) {
        if (mode !== "running") { if (mode === "cleared") clearAnim += dt; return; }
        elapsed += dt;

        if (fallAnim > 0) {
          fallAnim -= dt;
          if (fallAnim <= 0) {
            // Respawn ball slightly back
            ballPos = Math.max(0, Math.floor(ballPos) - 1);
          }
          return;
        }

        // Move ball
        ballPos += BALL_SPEED * dt;
        const idx = Math.floor(ballPos);

        // Check finish
        if (idx >= TRACK_LENGTH - 1) {
          doClear();
          const t = track[TRACK_LENGTH - 1];
          const fx = t.col * TILE + OFFSET_X - scrollX + TILE / 2;
          const fy = t.row * TILE + OFFSET_Y + TILE / 2;
          spawnParticles(fx, fy, 20, COL.finish, [3, 8], [40, 120]);
          return;
        }

        // Check if current tile is placed
        if (idx >= 0 && idx < TRACK_LENGTH && !placed[idx]) {
          falls++;
          shake = 0.4;
          const t = track[idx];
          const fx = t.col * TILE + OFFSET_X - scrollX + TILE / 2;
          const fy = t.row * TILE + OFFSET_Y + TILE / 2;
          spawnParticles(fx, fy, 8, COL.hole, [2, 5], [30, 70]);
          if (falls >= MAX_FALLS) { doFail("공이 3번 빠짐"); return; }
          fallAnim = 0.6;
        }

        // Scroll camera
        if (idx >= 0 && idx < track.length) {
          const targetScroll = Math.max(0, track[idx].col * TILE - W / 3);
          scrollX = lerp(scrollX, targetScroll, 3 * dt);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 60 * dt; p.vx *= 0.98;
          p.life -= p.decay * dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
        if (shake > 0) shake = Math.max(0, shake - dt * 3);
        if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt);
      }

      function drawBackground() {
        ctx.fillStyle = COL.grass;
        ctx.fillRect(0, 0, W, H);
        // Grass pattern
        if (!reducedMotion) {
          ctx.fillStyle = COL.grassDark;
          for (let i = 0; i < 40; i++) {
            const gx = ((i * 127.3) % (W + 200)) - 50;
            const gy = ((i * 83.7 + 20) % H);
            ctx.fillRect(gx, gy, 3, 8);
          }
        }
      }

      function drawTrack() {
        for (let i = 0; i < track.length; i++) {
          const t = track[i];
          const x = t.col * TILE + OFFSET_X - scrollX;
          const y = t.row * TILE + OFFSET_Y;
          if (x < -TILE || x > W + TILE) continue;

          if (placed[i]) {
            // Placed tile
            ctx.fillStyle = COL.path;
            ctx.beginPath(); ctx.roundRect(x + 2, y + 2, TILE - 4, TILE - 4, 6); ctx.fill();
            ctx.fillStyle = COL.pathLight;
            ctx.beginPath(); ctx.roundRect(x + 4, y + 4, TILE - 8, 4, 2); ctx.fill();
            // Edge marks
            ctx.strokeStyle = COL.pathDark;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.roundRect(x + 2, y + 2, TILE - 4, TILE - 4, 6); ctx.stroke();
          } else {
            // Empty slot (ghost)
            ctx.fillStyle = COL.holeLight;
            ctx.beginPath(); ctx.roundRect(x + 4, y + 4, TILE - 8, TILE - 8, 6); ctx.fill();
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = "rgba(138,122,96,0.4)";
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(x + 4, y + 4, TILE - 8, TILE - 8, 6); ctx.stroke();
            ctx.setLineDash([]);
          }

          // Finish flag on last tile
          if (i === TRACK_LENGTH - 1) {
            const fx = x + TILE / 2;
            const fy = y;
            // Flag pole
            ctx.fillStyle = "#888";
            ctx.fillRect(fx - 1, fy - 20, 3, 35);
            // Flag
            ctx.fillStyle = COL.flag;
            ctx.beginPath();
            ctx.moveTo(fx + 2, fy - 20);
            ctx.lineTo(fx + 22, fy - 12);
            ctx.lineTo(fx + 2, fy - 4);
            ctx.closePath();
            ctx.fill();
          }
        }
      }

      function drawBall() {
        if (fallAnim > 0) return;
        const idx = Math.floor(ballPos);
        const frac = ballPos - idx;
        if (idx < 0 || idx >= track.length) return;

        const t1 = track[idx];
        const t2 = idx + 1 < track.length ? track[idx + 1] : t1;
        const bx = lerp(t1.col, t2.col, frac) * TILE + OFFSET_X - scrollX + TILE / 2;
        const by = lerp(t1.row, t2.row, frac) * TILE + OFFSET_Y + TILE / 2;

        // Shadow
        ctx.beginPath();
        ctx.ellipse(bx + 2, by + BALL_R - 2, BALL_R * 0.8, BALL_R * 0.3, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fill();

        // Ball
        const grd = ctx.createRadialGradient(bx - 4, by - 4, 0, bx, by, BALL_R);
        grd.addColorStop(0, "#FFA060");
        grd.addColorStop(0.7, COL.ball);
        grd.addColorStop(1, COL.ballDark);
        ctx.beginPath();
        ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();

        // Shine
        ctx.beginPath();
        ctx.arc(bx - 4, by - 5, 4, 0, Math.PI * 2);
        ctx.fillStyle = COL.ballShine;
        ctx.fill();
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawHUD() {
        const progress = Math.min(1, ballPos / (TRACK_LENGTH - 1));
        const barW = 200, barH = 8, barX = W / 2 - barW / 2, barY = 18;

        ctx.fillStyle = "rgba(120,150,80,0.2)";
        ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();
        ctx.fillStyle = COL.success;
        ctx.beginPath(); ctx.roundRect(barX, barY, barW * progress, barH, 4); ctx.fill();

        ctx.font = "bold 20px Trebuchet MS"; ctx.textAlign = "left";
        ctx.fillStyle = COL.hud;
        ctx.fillText(`🏁 ${Math.floor(progress * 100)}%`, 20, 32);

        ctx.textAlign = "right";
        ctx.fillStyle = falls > 0 ? COL.fail : COL.hud;
        ctx.fillText(`💥 ${falls}/${MAX_FALLS}`, W - 20, 32);
        ctx.textAlign = "left";
      }

      function drawCard(title, lines, accent, sub) {
        ctx.fillStyle = "rgba(240,245,224,0.92)";
        ctx.fillRect(0, 0, W, H);
        const cardW = Math.min(600, W - 40), cardH = Math.min(360, H - 40);
        const cardX = (W - cardW) / 2, cardY = (H - cardH) / 2;
        ctx.fillStyle = "rgba(120,180,80,0.1)";
        ctx.beginPath(); ctx.roundRect(cardX + 4, cardY + 4, cardW, cardH, 18); ctx.fill();
        ctx.fillStyle = COL.cardBg;
        ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 18); ctx.fill();
        ctx.fillStyle = accent;
        ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, 6, [18, 18, 0, 0]); ctx.fill();
        ctx.fillStyle = accent; ctx.font = "bold 32px Trebuchet MS"; ctx.textAlign = "center";
        ctx.fillText(title, W / 2, cardY + 56);
        ctx.fillStyle = "#4A5A3A"; ctx.font = "500 18px Trebuchet MS";
        lines.forEach((line, i) => { ctx.fillText(line, W / 2, cardY + 100 + i * 36); });
        if (sub) { ctx.fillStyle = "rgba(74,90,58,0.5)"; ctx.font = "400 15px Trebuchet MS"; ctx.fillText(sub, W / 2, cardY + cardH - 24); }
        ctx.textAlign = "left";
      }

      function render() {
        ctx.save();
        if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 14, (Math.random() - 0.5) * shake * 14);

        if (mode === "menu") {
          drawCard("길 만들기 레이서", [
            "달리는 공 앞에 길을 깔아주세요!",
            "👆 화면 터치로 빈 칸에 길 블록 배치",
            "🏁 결승선 도달 → 클리어",
            "💥 공이 3번 빈 곳에 빠지면 실패",
          ], COL.card, "화면 터치 또는 Enter로 시작");
          ctx.restore(); return;
        }

        if (mode === "running") {
          drawBackground(); drawTrack(); drawBall();
          drawParticles(); drawHUD();
          ctx.restore(); return;
        }

        if (mode === "cleared") {
          drawBackground(); drawTrack(); drawParticles();
          ctx.globalAlpha = Math.min(1, clearAnim * 2);
          drawCard("클리어!", ["결승선에 도달했습니다!", `소요 시간: ${elapsed.toFixed(1)}초`], COL.success, "탭으로 다시 시작");
          ctx.globalAlpha = 1; ctx.restore(); return;
        }

        if (mode === "failed") {
          drawBackground(); drawTrack();
          drawCard("실패", ["공이 3번 빈 곳에 빠졌습니다!"], COL.fail, "탭으로 다시 시작");
          ctx.restore(); return;
        }
        ctx.restore();
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt); render();
        animFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = function() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          ballPos: +ballPos.toFixed(1), falls,
          placedCount: placed.filter(Boolean).length,
          trackLength: TRACK_LENGTH,
          result: window.relayStageResult.status,
        });
      };
      window.advanceTime = function(ms) {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        render(); return window.render_game_to_text();
      };
      window.relayStageDebug = {
        forceClear() { startGame(); doClear(); render(); },
        forceFail() { startGame(); doFail("debug_force_fail"); render(); },
      };

      reportReady(); render(); canvas.focus();
      animFrame = requestAnimationFrame(frame);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
    </script>
  </body>
</html>
