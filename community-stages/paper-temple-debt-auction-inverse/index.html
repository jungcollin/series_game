<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Temple: Debt Auction</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        background:
          radial-gradient(circle at top, rgba(250, 218, 150, 0.14), transparent 36%),
          radial-gradient(circle at bottom right, rgba(61, 145, 166, 0.12), transparent 34%),
          #120f17;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(241, 198, 113, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(23, 18, 31, 0.96);
        color: #fff4d6;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at center, rgba(252, 213, 150, 0.04), transparent 32%),
          linear-gradient(180deg, #1a1320 0%, #100d15 100%);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 239, 198, 0.94);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Paper Temple: Debt Auction. 클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시
      입찰, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도
      플레이 가능하게 구현. 역전 구간을 모두 견디고 시간을 0으로 만들지 않고 마지막 경매를
      넘기면 클리어. 역전 버스트에 연속으로 휘말리거나 시간 잔고가 바닥나거나 코어가
      파괴되면 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Paper Temple: Debt Auction"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "paper-temple-debt-auction-inverse";
      const TITLE = "Paper Temple: Debt Auction";
      const CREATOR = "jungcollin";
      const GENRE = "Risk market defense / 역전 버스트";
      const DESCRIPTION =
        "남은 시간을 경매 자원처럼 태워 안전 구간과 부적을 사고, 역전 버스트 때 반전 조작으로 종이 사원을 지키는 리스크 퍼즐 디펜스.";
      const FULL_CONTROLS =
        "클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_CONDITION =
        "역전 구간을 모두 견디고 시간을 0으로 만들지 않고 마지막 경매를 넘기면 클리어";
      const FAIL_CONDITION =
        "역전 버스트에 연속으로 휘말리거나 시간 잔고가 바닥나거나 코어가 파괴되면 실패";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TOTAL_DURATION = 28.8;
      const INITIAL_TIME_BALANCE = 38;
      const CORE_MAX_HEALTH = 100;
      const LONG_PRESS_TIME = 0.38;
      const LANE_SWITCH_PIXELS = 60;
      const LANE_X = [136, 308, 480, 652, 824];
      const LANE_WIDTH = 92;
      const STEWARD_Y = 422;
      const WARD_Y = 272;
      const CORE_Y = 468;
      const FIELD_TOP = 92;
      const INPUT_INVERT_DURATION = 1.9;
      const INPUT_WARNING_DURATION = 0.82;
      const AUCTION_CARD_W = 156;
      const AUCTION_CARD_H = 94;

      const LOT_TYPES = {
        veil: {
          name: "장지 병풍",
          accent: "#f6cb7b",
          glow: "rgba(246, 203, 123, 0.46)",
          short: "1회 차단",
          apply(laneState) {
            laneState.barrier = Math.min(laneState.barrier + 1, 3);
            laneState.flash = 1;
          },
        },
        mirror: {
          name: "역전 종",
          accent: "#9dd9ff",
          glow: "rgba(157, 217, 255, 0.48)",
          short: "버스트 반사",
          apply(laneState) {
            laneState.mirrorTimer = Math.max(laneState.mirrorTimer, 8.4);
            laneState.flash = 1;
          },
        },
        mist: {
          name: "먹 안개",
          accent: "#d9abff",
          glow: "rgba(217, 171, 255, 0.42)",
          short: "감속 장막",
          apply(laneState) {
            laneState.slowTimer = Math.max(laneState.slowTimer, 9.2);
            laneState.flash = 1;
          },
        },
      };

      const AUCTION_SCRIPT = [
        {
          time: 0.08,
          duration: 4.3,
          offers: [
            { type: "veil", cost: 1.8, laneHint: 2, tag: "중앙 봉합" },
            { type: "mist", cost: 2.4, laneHint: 1, tag: "왼측 완화" },
          ],
        },
        {
          time: 6.0,
          duration: 4.2,
          offers: [
            { type: "mirror", cost: 3.3, laneHint: 0, tag: "외곽 반전" },
            { type: "veil", cost: 2.1, laneHint: 3, tag: "우측 봉합" },
          ],
        },
        {
          time: 11.0,
          duration: 4.3,
          offers: [
            { type: "mist", cost: 2.6, laneHint: 4, tag: "끝차선 완화" },
            { type: "mirror", cost: 3.0, laneHint: 2, tag: "중앙 반사" },
          ],
        },
        {
          time: 16.2,
          duration: 4.4,
          offers: [
            { type: "veil", cost: 2.2, laneHint: 1, tag: "좌측 봉합" },
            { type: "mist", cost: 2.8, laneHint: 3, tag: "우측 완화" },
          ],
        },
        {
          time: 21.4,
          duration: 5,
          offers: [
            { type: "mirror", cost: 3.4, laneHint: 4, tag: "종막 반사" },
            { type: "veil", cost: 2.4, laneHint: 2, tag: "핵심 봉합" },
          ],
        },
      ];

      const INVERSE_WINDOWS = [5.8, 11.2, 16.8, 22.2];
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let stageReadyReported = false;

      const input = {
        left: false,
        right: false,
      };

      const pointer = {
        active: false,
        id: null,
        worldX: 0,
        worldY: 0,
        lastX: 0,
        lastY: 0,
        laneAccumulator: 0,
        pressOfferId: null,
        holdTimer: 0,
        draggingOfferId: null,
      };

      function createLaneState() {
        return {
          barrier: 0,
          mirrorTimer: 0,
          slowTimer: 0,
          flash: 0,
        };
      }

      function createRng(seed) {
        let value = seed >>> 0;
        return function next() {
          value += 0x6d2b79f5;
          let t = value;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const state = {
        mode: "menu",
        clock: 0,
        elapsed: 0,
        lastRunTime: 0,
        timeBalance: INITIAL_TIME_BALANCE,
        coreHealth: CORE_MAX_HEALTH,
        corePulse: 0,
        shake: 0,
        flash: 0,
        playerLane: 2,
        playerX: LANE_X[2],
        trail: [],
        laneSystems: LANE_X.map(() => createLaneState()),
        enemies: [],
        particles: [],
        floatingTexts: [],
        activeAuction: null,
        nextAuctionIndex: 0,
        reverseIndex: 0,
        reverseEventId: -1,
        reverseWarning: 0,
        reverseActive: false,
        burstHitEventId: -8,
        waveSchedule: [],
        spawnCursor: 0,
        summaryPulse: 0,
        lastReason: "",
      };

      function buildWaveSchedule() {
        const rng = createRng(0x5f3759df);
        const focusSets = [
          [2, 1, 3],
          [0, 3, 2],
          [4, 2, 1],
          [1, 3, 4],
          [4, 2, 0],
        ];
        const schedule = [];
        for (let group = 0; group < AUCTION_SCRIPT.length; group += 1) {
          const start = AUCTION_SCRIPT[group].time + (group === 0 ? 0.18 : 0.45);
          const end = Math.min(start + 5.4, TOTAL_DURATION - 0.35);
          let current = start;
          let previousLane = 2;
          while (current < end) {
            const focus = focusSets[group];
            const laneBias = focus[Math.floor(rng() * focus.length)];
            let lane = rng() < 0.68 ? laneBias : Math.floor(rng() * LANE_X.length);
            if (lane === previousLane && rng() < 0.32) {
              lane = (lane + 1 + Math.floor(rng() * 2)) % LANE_X.length;
            }
            previousLane = lane;
            const inverseHot = INVERSE_WINDOWS.some(
              (startTime) =>
                current >= startTime - 0.1 && current <= startTime + INPUT_INVERT_DURATION + 0.2
            );
            const type =
              inverseHot || rng() < 0.14 + group * 0.06 ? "burst" : "debt";
            schedule.push({
              time: Number(current.toFixed(3)),
              lane,
              type,
              speed: 92 + group * 10 + Math.round(rng() * 18) + (type === "burst" ? 28 : 0),
              size: type === "burst" ? 25 + Math.round(rng() * 4) : 22 + Math.round(rng() * 5),
            });
            if (group >= 2 && rng() < 0.22 + group * 0.05) {
              const sideLane = Math.max(0, Math.min(LANE_X.length - 1, lane + (rng() < 0.5 ? -1 : 1)));
              schedule.push({
                time: Number((current + 0.24).toFixed(3)),
                lane: sideLane,
                type: rng() < 0.38 ? "burst" : "debt",
                speed: 100 + group * 10 + Math.round(rng() * 16),
                size: 21 + Math.round(rng() * 6),
              });
            }
            current += Math.max(0.38, 0.82 - group * 0.08 + rng() * 0.16);
          }
        }
        schedule.sort((a, b) => a.time - b.time);
        return schedule;
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.timeBalance = INITIAL_TIME_BALANCE;
        state.coreHealth = CORE_MAX_HEALTH;
        state.corePulse = 0;
        state.shake = 0;
        state.flash = 0;
        state.playerLane = 2;
        state.playerX = LANE_X[2];
        state.trail = [];
        state.laneSystems = LANE_X.map(() => createLaneState());
        state.enemies = [];
        state.particles = [];
        state.floatingTexts = [];
        state.activeAuction = null;
        state.nextAuctionIndex = 0;
        state.reverseIndex = 0;
        state.reverseEventId = -1;
        state.reverseWarning = 0;
        state.reverseActive = false;
        state.burstHitEventId = -8;
        state.waveSchedule = buildWaveSchedule();
        state.spawnCursor = 0;
        state.summaryPulse = 0;
        state.lastReason = "";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        pointer.active = false;
        pointer.id = null;
        pointer.pressOfferId = null;
        pointer.holdTimer = 0;
        pointer.draggingOfferId = null;
        input.left = false;
        input.right = false;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (stageReadyReported || !inRelayHost()) {
          return;
        }
        stageReadyReported = true;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason) {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function addFloatingText(text, x, y, color) {
        state.floatingTexts.push({
          text,
          x,
          y,
          vy: -28,
          life: 0.95,
          maxLife: 0.95,
          color,
        });
      }

      function addBurstParticles(x, y, color, count, spread) {
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.24;
          const velocity = spread * (0.6 + Math.random() * 0.6);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity - 8,
            size: 2 + Math.random() * 4,
            life: 0.65 + Math.random() * 0.35,
            maxLife: 1,
            color,
          });
        }
      }

      function laneRect(index) {
        return {
          x: LANE_X[index] - 56,
          y: 228,
          width: 112,
          height: 112,
        };
      }

      function cardRect(index, count) {
        const totalWidth = count * AUCTION_CARD_W + (count - 1) * 18;
        const startX = VIEW.width - totalWidth - 28;
        return {
          x: startX + index * (AUCTION_CARD_W + 18),
          y: 28,
          width: AUCTION_CARD_W,
          height: AUCTION_CARD_H,
        };
      }

      function openAuction(index) {
        const script = AUCTION_SCRIPT[index];
        state.activeAuction = {
          id: index,
          endsAt: script.time + script.duration,
          offers: script.offers.map((offer, offerIndex) => ({
            id: `auction-${index}-${offerIndex}`,
            type: offer.type,
            cost: offer.cost,
            laneHint: offer.laneHint,
            tag: offer.tag,
            sold: false,
            soldLane: null,
            rect: cardRect(offerIndex, script.offers.length),
          })),
          selectedOfferId: null,
        };
        addFloatingText(`제${index + 1} 경매 개시`, 768, 142, "#ffe09a");
      }

      function getCurrentOffer(offerId) {
        if (!state.activeAuction) {
          return null;
        }
        return state.activeAuction.offers.find((offer) => offer.id === offerId) || null;
      }

      function movePlayer(direction) {
        const sign = state.reverseActive ? -1 : 1;
        const nextLane = Math.max(0, Math.min(LANE_X.length - 1, state.playerLane + direction * sign));
        if (nextLane === state.playerLane) {
          return;
        }
        const previousX = state.playerX;
        state.playerLane = nextLane;
        state.shake = Math.max(state.shake, 0.12);
        addBurstParticles(previousX, STEWARD_Y + 22, state.reverseActive ? "#93d9ff" : "#f7ca79", 6, 38);
      }

      function consumeTime(amount) {
        state.timeBalance = Math.max(0, state.timeBalance - amount);
        if (state.timeBalance <= 0) {
          failStage("time_balance_empty");
        }
      }

      function buyOffer(offer, laneIndex, instant) {
        if (!offer || offer.sold || state.mode !== "running") {
          return false;
        }
        if (state.timeBalance <= offer.cost + 0.05) {
          addFloatingText("잔고 부족", LANE_X[laneIndex], 182, "#ff9e96");
          state.flash = Math.max(state.flash, 0.14);
          return false;
        }
        LOT_TYPES[offer.type].apply(state.laneSystems[laneIndex]);
        offer.sold = true;
        offer.soldLane = laneIndex;
        state.activeAuction.selectedOfferId = offer.id;
        consumeTime(offer.cost);
        state.summaryPulse = 1;
        addFloatingText(
          `${instant ? "즉시 낙찰" : "낙찰"} -${offer.cost.toFixed(1)}s`,
          LANE_X[laneIndex],
          198,
          LOT_TYPES[offer.type].accent
        );
        addBurstParticles(LANE_X[laneIndex], WARD_Y + 12, LOT_TYPES[offer.type].accent, 10, 46);
        return true;
      }

      function failStage(reason) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 0.42;
        state.shake = 0.38;
        window.relayStageResult.status = "failed";
        addBurstParticles(VIEW.width / 2, CORE_Y - 12, "#ff8a80", 24, 80);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.2;
        state.summaryPulse = 1;
        window.relayStageResult.status = "cleared";
        addFloatingText("사원 정산 완료", VIEW.width / 2, 154, "#ffefb4");
        addBurstParticles(VIEW.width / 2, 218, "#ffe499", 28, 96);
        reportClearedToHost();
      }

      function isPointInRect(point, rect) {
        return (
          point.x >= rect.x &&
          point.x <= rect.x + rect.width &&
          point.y >= rect.y &&
          point.y <= rect.y + rect.height
        );
      }

      function getLaneFromPoint(point) {
        for (let index = 0; index < LANE_X.length; index += 1) {
          if (isPointInRect(point, laneRect(index))) {
            return index;
          }
        }
        return null;
      }

      function getOfferAtPoint(point) {
        if (!state.activeAuction) {
          return null;
        }
        for (const offer of state.activeAuction.offers) {
          if (isPointInRect(point, offer.rect)) {
            return offer;
          }
        }
        return null;
      }

      function toCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function beginMenuRun() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
        }
      }

      function onPointerDown(event) {
        event.preventDefault();
        const point = toCanvasPoint(event);
        pointer.active = true;
        pointer.id = event.pointerId;
        pointer.worldX = point.x;
        pointer.worldY = point.y;
        pointer.lastX = point.x;
        pointer.lastY = point.y;
        pointer.laneAccumulator = 0;
        if (canvas.setPointerCapture) {
          canvas.setPointerCapture(event.pointerId);
        }
        if (state.mode !== "running") {
          beginMenuRun();
          return;
        }
        const lane = getLaneFromPoint(point);
        const offer = getOfferAtPoint(point);
        if (offer && !offer.sold) {
          state.activeAuction.selectedOfferId = offer.id;
          pointer.pressOfferId = offer.id;
          pointer.holdTimer = 0;
          pointer.draggingOfferId = null;
          return;
        }
        if (lane !== null && state.activeAuction?.selectedOfferId) {
          const selected = getCurrentOffer(state.activeAuction.selectedOfferId);
          if (selected) {
            buyOffer(selected, lane, false);
            return;
          }
        }
      }

      function onPointerMove(event) {
        if (!pointer.active || (pointer.id !== null && event.pointerId !== pointer.id)) {
          return;
        }
        const point = toCanvasPoint(event);
        pointer.worldX = point.x;
        pointer.worldY = point.y;
        if (state.mode !== "running") {
          return;
        }
        if (pointer.pressOfferId) {
          const delta = Math.hypot(point.x - pointer.lastX, point.y - pointer.lastY);
          if (delta > 8) {
            pointer.draggingOfferId = pointer.pressOfferId;
          }
        } else if (point.y >= 286) {
          pointer.laneAccumulator += point.x - pointer.lastX;
          while (Math.abs(pointer.laneAccumulator) >= LANE_SWITCH_PIXELS) {
            movePlayer(pointer.laneAccumulator > 0 ? 1 : -1);
            pointer.laneAccumulator += pointer.laneAccumulator > 0 ? -LANE_SWITCH_PIXELS : LANE_SWITCH_PIXELS;
          }
        }
        pointer.lastX = point.x;
        pointer.lastY = point.y;
      }

      function onPointerUp(event) {
        if (pointer.id !== null && event.pointerId !== pointer.id) {
          return;
        }
        const point = toCanvasPoint(event);
        if (state.mode === "running" && pointer.draggingOfferId) {
          const lane = getLaneFromPoint(point);
          if (lane !== null) {
            buyOffer(getCurrentOffer(pointer.draggingOfferId), lane, false);
          }
        }
        pointer.active = false;
        pointer.id = null;
        pointer.pressOfferId = null;
        pointer.draggingOfferId = null;
        pointer.holdTimer = 0;
        pointer.laneAccumulator = 0;
      }

      function onKeyDown(event) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          beginMenuRun();
          return;
        }
        if (state.mode !== "running") {
          return;
        }
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          event.preventDefault();
          if (!input.left) {
            movePlayer(-1);
          }
          input.left = true;
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          event.preventDefault();
          if (!input.right) {
            movePlayer(1);
          }
          input.right = true;
        }
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          input.left = false;
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          input.right = false;
        }
      }

      function processLongPress(dt) {
        if (!pointer.pressOfferId || pointer.draggingOfferId || !pointer.active) {
          return;
        }
        const offer = getCurrentOffer(pointer.pressOfferId);
        if (!offer || offer.sold) {
          return;
        }
        pointer.holdTimer += dt;
        if (pointer.holdTimer >= LONG_PRESS_TIME) {
          buyOffer(offer, offer.laneHint, true);
          pointer.pressOfferId = null;
          pointer.draggingOfferId = null;
          pointer.holdTimer = 0;
        }
      }

      function spawnEnemy(entry) {
        state.enemies.push({
          lane: entry.lane,
          x: LANE_X[entry.lane],
          y: FIELD_TOP - 36,
          size: entry.size,
          type: entry.type,
          speed: entry.speed,
          rotation: Math.random() * Math.PI * 2,
          spin: (Math.random() * 2 - 1) * 1.8,
          slowApplied: false,
        });
      }

      function damageCore(enemy) {
        const burst = enemy.type === "burst";
        state.coreHealth = Math.max(0, state.coreHealth - (burst ? 28 : 18));
        state.flash = Math.max(state.flash, burst ? 0.36 : 0.2);
        state.shake = Math.max(state.shake, burst ? 0.42 : 0.22);
        state.corePulse = 1;
        addFloatingText(burst ? "버스트 관통" : "부채 증가", enemy.x, CORE_Y - 30, burst ? "#9dd9ff" : "#ffb58c");
        addBurstParticles(enemy.x, CORE_Y - 10, burst ? "#8fd9ff" : "#ffb38d", burst ? 18 : 10, burst ? 72 : 54);
        if (burst && state.reverseActive) {
          if (state.burstHitEventId === state.reverseEventId - 1) {
            state.burstHitEventId = state.reverseEventId;
            failStage("consecutive_inverse_burst");
            return;
          }
          state.burstHitEventId = state.reverseEventId;
        }
        if (state.coreHealth <= 0) {
          failStage("core_destroyed");
        }
      }

      function destroyEnemy(enemy, color, label) {
        addBurstParticles(enemy.x, enemy.y, color, enemy.type === "burst" ? 14 : 10, enemy.type === "burst" ? 66 : 42);
        if (label) {
          addFloatingText(label, enemy.x, enemy.y - 8, color);
        }
      }

      function updateEnemies(dt) {
        while (
          state.spawnCursor < state.waveSchedule.length &&
          state.waveSchedule[state.spawnCursor].time <= state.elapsed
        ) {
          spawnEnemy(state.waveSchedule[state.spawnCursor]);
          state.spawnCursor += 1;
        }

        const nextEnemies = [];
        for (const enemy of state.enemies) {
          const laneState = state.laneSystems[enemy.lane];
          const slowFactor = laneState.slowTimer > 0 ? 0.62 : 1;
          enemy.y += enemy.speed * dt * slowFactor;
          enemy.rotation += enemy.spin * dt;
          if (laneState.barrier > 0 && enemy.y >= WARD_Y - 6 && enemy.y <= WARD_Y + 18) {
            laneState.barrier -= 1;
            laneState.flash = 1;
            destroyEnemy(enemy, "#f6cb7b", "봉합");
            continue;
          }
          if (laneState.mirrorTimer > 0 && enemy.type === "burst" && enemy.y >= WARD_Y - 18 && enemy.y <= WARD_Y + 26) {
            laneState.flash = 1;
            destroyEnemy(enemy, "#9dd9ff", "반사");
            continue;
          }
          const fanReach = Math.abs(enemy.x - state.playerX) < 54 && enemy.y >= STEWARD_Y - 46 && enemy.y <= STEWARD_Y + 10;
          if (fanReach) {
            destroyEnemy(enemy, state.reverseActive ? "#9dd9ff" : "#f1ca79", enemy.type === "burst" ? "절단" : null);
            continue;
          }
          if (enemy.y >= CORE_Y - 8) {
            damageCore(enemy);
            continue;
          }
          nextEnemies.push(enemy);
        }
        state.enemies = nextEnemies;
      }

      function updateAuction(dt) {
        if (
          state.nextAuctionIndex < AUCTION_SCRIPT.length &&
          state.elapsed >= AUCTION_SCRIPT[state.nextAuctionIndex].time
        ) {
          openAuction(state.nextAuctionIndex);
          state.nextAuctionIndex += 1;
        }
        if (state.activeAuction && state.elapsed >= state.activeAuction.endsAt) {
          if (state.activeAuction.offers.every((offer) => offer.sold)) {
            addFloatingText("경매 정산 완료", 774, 144, "#ffe09a");
          }
          state.activeAuction = null;
        }
        processLongPress(dt);
      }

      function updateReverseState() {
        let warning = 0;
        let active = false;
        let eventId = -1;
        for (let index = 0; index < INVERSE_WINDOWS.length; index += 1) {
          const start = INVERSE_WINDOWS[index];
          if (state.elapsed >= start && state.elapsed < start + INPUT_INVERT_DURATION) {
            active = true;
            eventId = index;
            break;
          }
          if (state.elapsed < start && start - state.elapsed < INPUT_WARNING_DURATION) {
            warning = Math.max(warning, 1 - (start - state.elapsed) / INPUT_WARNING_DURATION);
          }
        }
        state.reverseWarning = warning;
        if (active && state.reverseEventId !== eventId) {
          state.reverseEventId = eventId;
          addFloatingText("역전 신호", VIEW.width / 2, 110, "#9dd9ff");
          addBurstParticles(VIEW.width / 2, 140, "#93d9ff", 18, 64);
        }
        state.reverseActive = active;
      }

      function updateLaneSystems(dt) {
        for (const laneState of state.laneSystems) {
          laneState.mirrorTimer = Math.max(0, laneState.mirrorTimer - dt);
          laneState.slowTimer = Math.max(0, laneState.slowTimer - dt);
          laneState.flash = Math.max(0, laneState.flash - dt * 2.2);
        }
      }

      function updateParticles(dt) {
        const kept = [];
        for (const particle of state.particles) {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vy += 24 * dt;
          particle.life -= dt;
          if (particle.life > 0) {
            kept.push(particle);
          }
        }
        state.particles = kept;

        const texts = [];
        for (const text of state.floatingTexts) {
          text.y += text.vy * dt;
          text.life -= dt;
          if (text.life > 0) {
            texts.push(text);
          }
        }
        state.floatingTexts = texts;
      }

      function updateSteward(dt) {
        const targetX = LANE_X[state.playerLane];
        state.playerX += (targetX - state.playerX) * Math.min(1, dt * 13.5);
        state.trail.push({
          x: state.playerX,
          y: STEWARD_Y,
          life: 0.26,
          accent: state.reverseActive ? "#9dd9ff" : "#f7ca79",
        });
        if (state.trail.length > 18) {
          state.trail.shift();
        }
        for (const node of state.trail) {
          node.life -= dt;
        }
        state.trail = state.trail.filter((node) => node.life > 0);
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.clock += dt;
        state.lastRunTime = state.elapsed;
        state.timeBalance = Math.max(0, state.timeBalance - dt);
        if (state.timeBalance <= 0) {
          failStage("time_balance_empty");
          return;
        }
        updateReverseState();
        updateAuction(dt);
        updateLaneSystems(dt);
        updateSteward(dt);
        updateEnemies(dt);
        updateParticles(dt);
        state.flash = Math.max(0, state.flash - dt * 1.5);
        state.shake = Math.max(0, state.shake - dt * 2.2);
        state.corePulse = Math.max(0, state.corePulse - dt * 1.4);
        state.summaryPulse = Math.max(0, state.summaryPulse - dt * 1.5);
        if (
          state.mode === "running" &&
          state.elapsed >= TOTAL_DURATION &&
          state.nextAuctionIndex >= AUCTION_SCRIPT.length &&
          !state.activeAuction &&
          state.enemies.length === 0
        ) {
          clearStage();
        }
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          state.clock += dt;
          updateParticles(dt);
          state.flash = Math.max(0, state.flash - dt * 1.5);
          state.shake = Math.max(0, state.shake - dt * 2.2);
          state.corePulse = Math.max(0, state.corePulse - dt * 1.4);
          state.summaryPulse = Math.max(0, state.summaryPulse - dt * 1.5);
        }
      }

      function drawPaperTexture() {
        const offset = state.clock * 16;
        for (let index = 0; index < 18; index += 1) {
          const y = ((index * 34 + offset) % (VIEW.height + 60)) - 30;
          ctx.strokeStyle = `rgba(255, 244, 211, ${0.02 + (index % 3) * 0.01})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(-40, y);
          ctx.bezierCurveTo(210, y + 10, 720, y - 14, VIEW.width + 40, y + 6);
          ctx.stroke();
        }
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#211923");
        gradient.addColorStop(0.54, "#17121d");
        gradient.addColorStop(1, "#0f1015");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const skyGlow = ctx.createRadialGradient(480, 42, 0, 480, 42, 320);
        skyGlow.addColorStop(0, "rgba(255, 222, 154, 0.24)");
        skyGlow.addColorStop(0.4, "rgba(193, 157, 102, 0.1)");
        skyGlow.addColorStop(1, "rgba(17, 14, 20, 0)");
        ctx.fillStyle = skyGlow;
        ctx.fillRect(0, 0, VIEW.width, 260);

        ctx.fillStyle = "rgba(18, 12, 25, 0.92)";
        ctx.beginPath();
        ctx.moveTo(0, 232);
        ctx.lineTo(138, 164);
        ctx.lineTo(220, 190);
        ctx.lineTo(314, 136);
        ctx.lineTo(408, 182);
        ctx.lineTo(514, 122);
        ctx.lineTo(620, 192);
        ctx.lineTo(722, 152);
        ctx.lineTo(820, 202);
        ctx.lineTo(960, 150);
        ctx.lineTo(960, 334);
        ctx.lineTo(0, 334);
        ctx.closePath();
        ctx.fill();

        drawPaperTexture();

        for (let lane = 0; lane < LANE_X.length; lane += 1) {
          const x = LANE_X[lane];
          const beam = ctx.createLinearGradient(x, FIELD_TOP, x, CORE_Y);
          beam.addColorStop(0, "rgba(255, 239, 199, 0.08)");
          beam.addColorStop(0.56, "rgba(154, 214, 255, 0.03)");
          beam.addColorStop(1, "rgba(255, 239, 199, 0.02)");
          ctx.fillStyle = beam;
          ctx.beginPath();
          ctx.moveTo(x - 48, FIELD_TOP + 8);
          ctx.lineTo(x + 48, FIELD_TOP + 8);
          ctx.lineTo(x + 24, CORE_Y);
          ctx.lineTo(x - 24, CORE_Y);
          ctx.closePath();
          ctx.fill();
        }

        ctx.fillStyle = "rgba(255, 220, 150, 0.08)";
        ctx.fillRect(0, CORE_Y, VIEW.width, VIEW.height - CORE_Y);
      }

      function drawCore() {
        const pulse = 1 + state.corePulse * 0.3;
        ctx.save();
        ctx.translate(VIEW.width / 2, CORE_Y);
        const outerGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, 110);
        outerGlow.addColorStop(0, "rgba(255, 232, 173, 0.32)");
        outerGlow.addColorStop(1, "rgba(255, 232, 173, 0)");
        ctx.fillStyle = outerGlow;
        ctx.beginPath();
        ctx.arc(0, 0, 110 * pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#1d151a";
        ctx.beginPath();
        ctx.moveTo(-146, 46);
        ctx.lineTo(0, -94);
        ctx.lineTo(146, 46);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#f2ddaa";
        ctx.beginPath();
        ctx.moveTo(0, -70);
        ctx.lineTo(92, 22);
        ctx.lineTo(0, 68);
        ctx.lineTo(-92, 22);
        ctx.closePath();
        ctx.fill();

        const gem = ctx.createLinearGradient(-30, -20, 30, 38);
        gem.addColorStop(0, "#fff2c5");
        gem.addColorStop(0.52, "#f1b668");
        gem.addColorStop(1, "#cb6f45");
        ctx.fillStyle = gem;
        ctx.beginPath();
        ctx.moveTo(0, -42);
        ctx.lineTo(28, 0);
        ctx.lineTo(0, 36);
        ctx.lineTo(-28, 0);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 248, 216, 0.65)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-18, -8);
        ctx.lineTo(0, -28);
        ctx.lineTo(16, -2);
        ctx.stroke();
        ctx.restore();
      }

      function drawLaneSystems() {
        for (let lane = 0; lane < LANE_X.length; lane += 1) {
          const laneState = state.laneSystems[lane];
          const x = LANE_X[lane];
          const rect = laneRect(lane);

          ctx.save();
          ctx.fillStyle = `rgba(255, 248, 224, ${state.activeAuction ? 0.04 : 0.02})`;
          ctx.strokeStyle = `rgba(255, 232, 179, ${state.activeAuction ? 0.2 : 0.08})`;
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 22);
          ctx.fill();
          ctx.stroke();

          if (laneState.slowTimer > 0) {
            const fog = ctx.createRadialGradient(x, WARD_Y + 18, 6, x, WARD_Y + 18, 68);
            fog.addColorStop(0, "rgba(217, 171, 255, 0.3)");
            fog.addColorStop(1, "rgba(217, 171, 255, 0)");
            ctx.fillStyle = fog;
            ctx.beginPath();
            ctx.arc(x, WARD_Y + 18, 68, 0, Math.PI * 2);
            ctx.fill();
          }

          if (laneState.barrier > 0) {
            ctx.save();
            ctx.translate(x, WARD_Y + 4);
            ctx.fillStyle = "#f8e8bd";
            ctx.strokeStyle = "rgba(122, 85, 23, 0.34)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-30, -24);
            ctx.lineTo(0, -34);
            ctx.lineTo(30, -24);
            ctx.lineTo(18, 30);
            ctx.lineTo(-18, 30);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#725a27";
            ctx.font = "700 18px Georgia, serif";
            ctx.textAlign = "center";
            ctx.fillText(String(laneState.barrier), 0, 6);
            ctx.restore();
          }

          if (laneState.mirrorTimer > 0) {
            ctx.save();
            ctx.translate(x, WARD_Y - 18);
            ctx.fillStyle = "rgba(157, 217, 255, 0.16)";
            ctx.beginPath();
            ctx.arc(0, 0, 24, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#9dd9ff";
            ctx.lineWidth = 2.4;
            ctx.beginPath();
            ctx.arc(0, 0, 14, Math.PI * 0.25, Math.PI * 1.78);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(0, 16);
            ctx.stroke();
            ctx.restore();
          }

          if (laneState.flash > 0) {
            ctx.fillStyle = `rgba(255, 247, 201, ${laneState.flash * 0.18})`;
            ctx.beginPath();
            ctx.roundRect(rect.x - 4, rect.y - 4, rect.width + 8, rect.height + 8, 28);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function drawEnemies() {
        for (const enemy of state.enemies) {
          ctx.save();
          ctx.translate(enemy.x, enemy.y);
          ctx.rotate(enemy.rotation);
          if (enemy.type === "burst") {
            const burstGradient = ctx.createLinearGradient(-26, -26, 26, 26);
            burstGradient.addColorStop(0, "#d8f6ff");
            burstGradient.addColorStop(0.52, "#7bc8f4");
            burstGradient.addColorStop(1, "#2f6991");
            ctx.fillStyle = burstGradient;
            ctx.beginPath();
            for (let point = 0; point < 8; point += 1) {
              const angle = (Math.PI * 2 * point) / 8;
              const radius = point % 2 === 0 ? enemy.size : enemy.size * 0.45;
              const x = Math.cos(angle) * radius;
              const y = Math.sin(angle) * radius;
              if (point === 0) {
                ctx.moveTo(x, y);
              } else {
                ctx.lineTo(x, y);
              }
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(234, 252, 255, 0.85)";
            ctx.lineWidth = 1.4;
            ctx.stroke();
          } else {
            ctx.fillStyle = "#f3dfb7";
            ctx.strokeStyle = "rgba(103, 70, 30, 0.32)";
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.roundRect(-enemy.size, -enemy.size * 0.8, enemy.size * 2, enemy.size * 1.6, 7);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#6f4b2d";
            ctx.fillRect(-enemy.size + 8, -4, enemy.size * 1.24, 2);
            ctx.fillRect(-enemy.size + 8, 4, enemy.size * 0.94, 2);
          }
          ctx.restore();
        }
      }

      function drawSteward() {
        for (const trail of state.trail) {
          ctx.fillStyle = `${trail.accent}${Math.round(Math.max(0, trail.life) * 110)
            .toString(16)
            .padStart(2, "0")}`;
          ctx.beginPath();
          ctx.arc(trail.x, trail.y + 8, 12 * trail.life, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.translate(state.playerX, STEWARD_Y);
        ctx.fillStyle = "rgba(255, 235, 178, 0.16)";
        ctx.beginPath();
        ctx.arc(0, 8, 50, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#efe2be";
        ctx.beginPath();
        ctx.moveTo(0, -38);
        ctx.lineTo(22, -6);
        ctx.lineTo(0, 34);
        ctx.lineTo(-22, -6);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = state.reverseActive ? "#9dd9ff" : "#f7ca79";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-28, -4);
        ctx.lineTo(0, -34);
        ctx.lineTo(28, -4);
        ctx.stroke();

        ctx.fillStyle = "#7a582d";
        ctx.beginPath();
        ctx.arc(0, -8, 8, 0, Math.PI * 2);
        ctx.fill();

        for (let rib = -1; rib <= 1; rib += 1) {
          ctx.strokeStyle = "rgba(120, 84, 45, 0.42)";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(rib * 8, -22);
          ctx.lineTo(rib * 11, 16);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawAuctionCards() {
        if (!state.activeAuction) {
          return;
        }
        for (const offer of state.activeAuction.offers) {
          const lot = LOT_TYPES[offer.type];
          const rect = offer.rect;
          const selected = state.activeAuction.selectedOfferId === offer.id;
          const sold = offer.sold;
          ctx.save();
          ctx.shadowColor = sold ? "rgba(0, 0, 0, 0)" : lot.glow;
          ctx.shadowBlur = sold ? 0 : 22;
          ctx.fillStyle = sold
            ? "rgba(61, 54, 69, 0.9)"
            : selected
            ? "rgba(43, 34, 25, 0.96)"
            : "rgba(31, 24, 34, 0.92)";
          ctx.strokeStyle = sold ? "rgba(145, 128, 140, 0.36)" : lot.accent;
          ctx.lineWidth = selected ? 3 : 2;
          ctx.beginPath();
          ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 22);
          ctx.fill();
          ctx.stroke();
          ctx.shadowBlur = 0;

          ctx.fillStyle = sold ? "rgba(255,255,255,0.52)" : "#fff2c8";
          ctx.font = "700 20px Georgia, serif";
          ctx.textAlign = "left";
          ctx.fillText(lot.name, rect.x + 16, rect.y + 30);

          ctx.fillStyle = sold ? "rgba(255,255,255,0.46)" : "rgba(255, 241, 207, 0.74)";
          ctx.font = "600 12px Georgia, serif";
          ctx.fillText(`${offer.tag} · ${lot.short}`, rect.x + 16, rect.y + 50);
          ctx.fillText(`추천 차선 ${offer.laneHint + 1}`, rect.x + 16, rect.y + 68);

          ctx.fillStyle = sold ? "rgba(181, 169, 177, 0.52)" : lot.accent;
          ctx.font = "700 18px Georgia, serif";
          ctx.textAlign = "right";
          ctx.fillText(`-${offer.cost.toFixed(1)}s`, rect.x + rect.width - 16, rect.y + 30);

          ctx.font = "600 11px Georgia, serif";
          ctx.fillStyle = sold ? "rgba(208, 191, 203, 0.48)" : "rgba(246, 233, 203, 0.72)";
          ctx.fillText(sold ? "낙찰" : "길게 눌러 즉시 입찰", rect.x + rect.width - 16, rect.y + 72);
          ctx.restore();
        }

        if (pointer.draggingOfferId) {
          const offer = getCurrentOffer(pointer.draggingOfferId);
          if (offer && !offer.sold) {
            const lot = LOT_TYPES[offer.type];
            ctx.save();
            ctx.globalAlpha = 0.88;
            ctx.shadowColor = lot.glow;
            ctx.shadowBlur = 20;
            ctx.fillStyle = "rgba(39, 31, 42, 0.96)";
            ctx.strokeStyle = lot.accent;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(pointer.worldX - 68, pointer.worldY - 48, 136, 84, 18);
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff2c8";
            ctx.font = "700 18px Georgia, serif";
            ctx.textAlign = "center";
            ctx.fillText(lot.name, pointer.worldX, pointer.worldY - 10);
            ctx.fillStyle = lot.accent;
            ctx.font = "700 15px Georgia, serif";
            ctx.fillText(`-${offer.cost.toFixed(1)}s`, pointer.worldX, pointer.worldY + 16);
            ctx.restore();
          }
        }
      }

      function drawHud() {
        ctx.save();
        ctx.fillStyle = "rgba(12, 10, 16, 0.6)";
        ctx.beginPath();
        ctx.roundRect(22, 22, 272, 116, 24);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 233, 179, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = "#fff2cb";
        ctx.font = "700 28px Georgia, serif";
        ctx.textAlign = "left";
        ctx.fillText("잔여 시간", 40, 54);
        ctx.font = "700 42px Georgia, serif";
        ctx.fillStyle = state.timeBalance < 9 ? "#ff9f8f" : "#f7ca79";
        ctx.fillText(`${Math.max(0, state.timeBalance).toFixed(1)}s`, 40, 96);

        ctx.font = "600 13px Georgia, serif";
        ctx.fillStyle = "rgba(255, 239, 205, 0.72)";
        ctx.fillText(`코어 ${Math.max(0, Math.round(state.coreHealth))}%`, 190, 58);
        ctx.fillText(`경매 ${Math.min(state.nextAuctionIndex + (state.activeAuction ? 0 : 0), AUCTION_SCRIPT.length)}/${AUCTION_SCRIPT.length}`, 190, 78);
        ctx.fillText(`남은 웨이브 ${state.waveSchedule.length - state.spawnCursor + state.enemies.length}`, 190, 98);

        ctx.fillStyle = "rgba(255, 241, 207, 0.22)";
        ctx.beginPath();
        ctx.roundRect(190, 106, 78, 10, 999);
        ctx.fill();
        ctx.fillStyle = state.coreHealth > 55 ? "#b8efbf" : state.coreHealth > 24 ? "#ffd687" : "#ff9387";
        ctx.beginPath();
        ctx.roundRect(190, 106, 78 * (state.coreHealth / CORE_MAX_HEALTH), 10, 999);
        ctx.fill();
        ctx.restore();

        const progress = Math.min(1, state.elapsed / TOTAL_DURATION);
        ctx.fillStyle = "rgba(255, 241, 207, 0.1)";
        ctx.beginPath();
        ctx.roundRect(22, 150, VIEW.width - 44, 8, 999);
        ctx.fill();
        ctx.fillStyle = "rgba(246, 203, 123, 0.9)";
        ctx.beginPath();
        ctx.roundRect(22, 150, (VIEW.width - 44) * progress, 8, 999);
        ctx.fill();
      }

      function drawReverseSignal() {
        if (!state.reverseActive && state.reverseWarning <= 0) {
          return;
        }
        const alpha = state.reverseActive ? 0.9 : 0.38 + state.reverseWarning * 0.32;
        ctx.save();
        ctx.textAlign = "center";
        if (state.reverseActive) {
          ctx.fillStyle = "rgba(85, 182, 232, 0.08)";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
        ctx.fillStyle = `rgba(157, 217, 255, ${alpha * 0.18})`;
        ctx.beginPath();
        ctx.roundRect(326, 22, 308, 50, 999);
        ctx.fill();
        ctx.strokeStyle = `rgba(157, 217, 255, ${alpha * 0.74})`;
        ctx.lineWidth = 2.4;
        ctx.stroke();
        ctx.fillStyle = `rgba(236, 251, 255, ${alpha})`;
        ctx.font = "700 22px Georgia, serif";
        ctx.fillText(state.reverseActive ? "역전 버스트 활성" : "역전 신호 접근", VIEW.width / 2, 55);
        ctx.restore();
      }

      function drawParticlesAndText() {
        for (const particle of state.particles) {
          ctx.fillStyle = particle.color;
          ctx.globalAlpha = Math.max(0, particle.life / particle.maxLife);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        for (const text of state.floatingTexts) {
          ctx.fillStyle = text.color;
          ctx.globalAlpha = Math.max(0, text.life / text.maxLife);
          ctx.font = "700 16px Georgia, serif";
          ctx.textAlign = "center";
          ctx.fillText(text.text, text.x, text.y);
        }
        ctx.globalAlpha = 1;
      }

      function drawOverlayCard(title, subtitle, accent, lines) {
        ctx.save();
        ctx.fillStyle = "rgba(10, 8, 14, 0.72)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.shadowColor = accent;
        ctx.shadowBlur = 34;
        ctx.fillStyle = "rgba(21, 16, 26, 0.94)";
        ctx.beginPath();
        ctx.roundRect(122, 82, VIEW.width - 244, VIEW.height - 164, 34);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2.4;
        ctx.stroke();

        ctx.textAlign = "left";
        ctx.fillStyle = "#fff2ca";
        ctx.font = "700 20px Georgia, serif";
        ctx.fillText(TITLE, 158, 136);

        ctx.font = "700 46px Georgia, serif";
        ctx.fillStyle = accent;
        ctx.fillText(title, 158, 192);

        ctx.font = "600 18px Georgia, serif";
        ctx.fillStyle = "rgba(255, 240, 209, 0.82)";
        ctx.fillText(subtitle, 158, 228);

        ctx.font = "600 16px Georgia, serif";
        let lineY = 286;
        for (const line of lines) {
          ctx.fillStyle = line.accent || "rgba(255, 239, 205, 0.88)";
          ctx.fillText(line.text, 158, lineY);
          lineY += 34;
        }
        ctx.restore();
      }

      function drawMenuOverlay() {
        drawOverlayCard("종이 사원 결산", "남은 시간을 경매 자금처럼 태워 버스트 웨이브를 버텨라.", "#f6cb7b", [
          { text: "터치 또는 Enter로 시작" },
          { text: "카드 선택 후 차선에 드래그 배치, 길게 눌러 즉시 입찰" },
          { text: "하단을 드래그하거나 방향키로 수호자를 옮긴다" },
          { text: "푸른 역전 신호 중에는 좌우 입력이 반전된다", accent: "#9dd9ff" },
          { text: "클리어: 마지막 경매 뒤 코어를 지키고 시간 잔고를 남기기" },
          { text: "실패: 연속 버스트 관통, 시간 고갈, 코어 붕괴", accent: "#ffb58c" },
        ]);
      }

      function drawFailedOverlay() {
        const failText =
          state.lastReason === "consecutive_inverse_burst"
            ? "두 번 연속 역전 버스트가 코어를 관통했다."
            : state.lastReason === "time_balance_empty"
            ? "경매에 시간을 너무 써서 잔고가 바닥났다."
            : "사원 코어가 붕괴했다.";
        drawOverlayCard("정산 실패", failText, "#ff968b", [
          { text: `버틴 시간 ${state.lastRunTime.toFixed(1)}s / ${TOTAL_DURATION.toFixed(1)}s` },
          { text: `남은 코어 ${Math.max(0, Math.round(state.coreHealth))}%` },
          { text: "터치 또는 Enter로 즉시 재시도" },
        ]);
      }

      function drawClearOverlay() {
        drawOverlayCard("경매 돌파", "마지막 입찰 뒤에도 사원이 무너지지 않았다.", "#ffe7a3", [
          { text: `남긴 시간 ${state.timeBalance.toFixed(1)}s` },
          { text: `잔존 코어 ${Math.max(0, Math.round(state.coreHealth))}%` },
          { text: "터치 또는 Enter로 다시 플레이" },
        ]);
      }

      function drawScene() {
        const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake * 18 : 0;
        const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake * 12 : 0;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawCore();
        drawLaneSystems();
        drawEnemies();
        drawSteward();
        drawAuctionCards();
        drawParticlesAndText();
        drawHud();
        drawReverseSignal();
        ctx.restore();

        if (state.flash > 0) {
          ctx.fillStyle = state.mode === "failed"
            ? `rgba(255, 126, 102, ${state.flash * 0.28})`
            : `rgba(255, 245, 205, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed") {
          drawFailedOverlay();
        } else if (state.mode === "cleared") {
          drawClearOverlay();
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawScene();
      }

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        update(delta);
        render();
        animationFrame = window.requestAnimationFrame(loop);
      }

      function renderGameToText() {
        const payload = {
          mode: state.mode,
          description: DESCRIPTION,
          timeBalance: Number(state.timeBalance.toFixed(2)),
          elapsed: Number(state.elapsed.toFixed(2)),
          reverseActive: state.reverseActive,
          reverseWarning: Number(state.reverseWarning.toFixed(2)),
          playerLane: state.playerLane,
          coreHealth: Number(state.coreHealth.toFixed(1)),
          activeAuction: state.activeAuction
            ? {
                endsIn: Number(Math.max(0, state.activeAuction.endsAt - state.elapsed).toFixed(2)),
                selectedOfferId: state.activeAuction.selectedOfferId,
                offers: state.activeAuction.offers.map((offer) => ({
                  id: offer.id,
                  type: offer.type,
                  cost: offer.cost,
                  laneHint: offer.laneHint,
                  sold: offer.sold,
                  soldLane: offer.soldLane,
                })),
              }
            : null,
          lanes: state.laneSystems.map((lane, index) => ({
            lane: index,
            barrier: lane.barrier,
            mirrorTimer: Number(lane.mirrorTimer.toFixed(2)),
            slowTimer: Number(lane.slowTimer.toFixed(2)),
          })),
          enemies: state.enemies.map((enemy) => ({
            lane: enemy.lane,
            y: Number(enemy.y.toFixed(1)),
            type: enemy.type,
            speed: enemy.speed,
          })),
          result: window.relayStageResult.status,
        };
        return JSON.stringify(payload);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };

      window.relayStageMeta = {
        id: STAGE_ID,
        title: TITLE,
        creator: CREATOR,
        genre: GENRE,
        clearCondition: CLEAR_CONDITION,
      };

      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "running") {
            resetRun();
          }
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode !== "running") {
            resetRun();
          }
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerUp);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("pointerup", onPointerUp);
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(loop);
    </script>
  </body>
</html>
