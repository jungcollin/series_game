<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Midnight Harbor: Orbit Shepherd</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #04111f;
        --bg-water: #08243b;
        --panel: rgba(4, 16, 28, 0.76);
        --panel-border: rgba(160, 231, 255, 0.18);
        --cyan: #83f4ff;
        --aqua: #41c4ff;
        --gold: #ffd274;
        --rose: #ff85cf;
        --ink: #dff7ff;
        --danger: #ff7f88;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(110, 172, 255, 0.18), transparent 28%),
          linear-gradient(180deg, #061320 0%, #031018 45%, #020b12 100%);
        font-family: "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(131, 244, 255, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(3, 12, 20, 0.92);
        color: #f6fbff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible,
      .reverse-btn:focus-visible {
        outline: 3px solid rgba(131, 244, 255, 0.92);
        outline-offset: 3px;
      }

      .touch-ui {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 12px;
        z-index: 18;
        display: flex;
        justify-content: center;
        pointer-events: none;
        padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
      }

      .touch-ui__row {
        width: min(100%, 340px);
        display: flex;
        justify-content: center;
        gap: 10px;
        pointer-events: auto;
      }

      .reverse-btn {
        appearance: none;
        min-width: 148px;
        min-height: 50px;
        border: 1px solid rgba(131, 244, 255, 0.28);
        border-radius: 999px;
        padding: 0 18px;
        background:
          linear-gradient(180deg, rgba(11, 34, 49, 0.96), rgba(5, 19, 30, 0.92));
        color: var(--ink);
        font: 800 0.96rem/1 "Avenir Next Condensed", "Trebuchet MS", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        box-shadow:
          0 12px 28px rgba(0, 0, 0, 0.34),
          inset 0 0 18px rgba(131, 244, 255, 0.08);
      }

      .reverse-btn[data-active="true"] {
        transform: scale(0.96);
        background:
          linear-gradient(180deg, rgba(26, 74, 103, 0.98), rgba(8, 29, 45, 0.94));
      }

      @media (max-width: 420px) {
        .touch-ui {
          bottom: 10px;
        }

        .reverse-btn {
          min-width: 136px;
          min-height: 48px;
          font-size: 0.9rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Midnight Harbor: Orbit Shepherd. 마우스 또는 터치 드래그로 비콘 이동, 클릭 또는
      탭으로 궤도 반전. 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      클리어 조건은 문을 모두 맞춘 뒤 위성 3기를 순서대로 링 통과. 실패 조건은 동기화
      창 4번 상실 또는 소멸 구역 접촉 시 실패. 캔버스를 터치하거나 Enter로 시작하세요.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Midnight Harbor: Orbit Shepherd"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="touch-ui" aria-hidden="false">
      <div class="touch-ui__row">
        <button class="reverse-btn" id="reverse-button" type="button" aria-label="궤도 반전">
          Orbit Flip
        </button>
      </div>
    </div>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "midnight-harbor-orbit-herding-sync";
      const STAGE_TITLE = "Midnight Harbor: Orbit Shepherd";
      const STAGE_DESCRIPTION =
        "비콘 주위를 도는 위성 떼를 같은 박자로 유도해 동기화 문을 열고 목표 링을 연속 돌파하세요.";
      const STAGE_CONTROLS =
        "마우스 또는 터치 드래그로 비콘 이동, 클릭 또는 탭으로 궤도 반전";
      const STAGE_CLEAR = "문을 모두 맞춘 뒤 위성 3기를 순서대로 링 통과";
      const STAGE_FAIL = "동기화 창 4번 상실 또는 소멸 구역 접촉 시 실패";
      const VIEW = { width: 960, height: 540 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const BPM = 68;
      const BEAT_INTERVAL = 60 / BPM;
      const OPEN_WINDOW = 0.2;
      const ACTIVE_AREA = { left: 86, right: 874, top: 88, bottom: 456 };
      const REDUCE_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const reverseButton = document.querySelector("#reverse-button");

      const COLORS = {
        cyan: "#81f7ff",
        aqua: "#4bc8ff",
        gold: "#ffd676",
        rose: "#ff86d5",
        white: "#eaf8ff",
        ink: "#dff7ff",
        deep: "#04111f",
        warning: "#ff8b92",
      };

      const gates = [
        { id: "A", x: 196, y: 164, color: COLORS.cyan, required: 2, caption: "Dock A" },
        { id: "B", x: 760, y: 188, color: COLORS.gold, required: 2, caption: "Dock B" },
        { id: "C", x: 510, y: 354, color: COLORS.rose, required: 3, caption: "Dock C" },
      ];

      const finalOrder = [0, 1, 2];
      const satelliteBlueprints = [
        { id: 0, label: "I", color: COLORS.cyan, radius: 74, speed: 1.8, angle: 0.4 },
        { id: 1, label: "II", color: COLORS.gold, radius: 114, speed: 1.48, angle: 2.45 },
        { id: 2, label: "III", color: COLORS.rose, radius: 152, speed: 1.18, angle: 4.16 },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let dragPointerId = null;

      const pointerState = {
        active: false,
        moved: false,
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,
        startTime: 0,
      };

      const state = {
        mode: "menu",
        phase: "gates",
        elapsed: 0,
        lastRunTime: 0,
        direction: 1,
        beatClock: 0,
        beatIndex: 0,
        beatPulse: 0,
        beatResolved: false,
        beatSuccess: false,
        beatLabel: "",
        warmup: 1.3,
        misses: 0,
        maxMisses: 4,
        activeGateIndex: 0,
        gateHits: gates.map(() => 0),
        finalPassed: 0,
        flash: 0,
        screenShake: 0,
        overlayFade: 1,
        message: STAGE_DESCRIPTION,
        subtitle: "Beacon drag + beat sync",
        cameraOffsetX: 0,
        cameraOffsetY: 0,
      };

      const beacon = {
        x: VIEW.width / 2,
        y: 314,
        targetX: VIEW.width / 2,
        targetY: 314,
        glow: 0,
      };

      const targetRing = {
        active: false,
        x: 752,
        y: 300,
        radius: 44,
        pulse: 0,
      };

      const satellites = satelliteBlueprints.map((sat) => ({
        ...sat,
        x: 0,
        y: 0,
        trail: [],
        insideTarget: false,
      }));

      const decayZones = [
        { x: 230, y: 360, radius: 46, t: 1.2, speed: 0.7, swingX: 32, swingY: 20 },
        { x: 710, y: 360, radius: 52, t: 3.1, speed: 0.58, swingX: 26, swingY: 26 },
      ];

      const particles = [];
      const ripples = [];
      const popups = [];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function roundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (inRelayHost()) {
          window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
        }
      }

      function reportFailedToHost(reason) {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function addRipple(x, y, color, maxRadius = 76) {
        ripples.push({ x, y, color, age: 0, life: 0.66, maxRadius });
      }

      function addPopup(text, x, y, color, emphasis = false) {
        popups.push({
          text,
          x,
          y,
          color,
          age: 0,
          life: emphasis ? 1.1 : 0.86,
          rise: emphasis ? 40 : 28,
        });
      }

      function burstParticles(x, y, color, amount, speedMin, speedMax) {
        const count = REDUCE_MOTION ? Math.ceil(amount * 0.35) : amount;
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.45;
          const speed = lerp(speedMin, speedMax, Math.random());
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            age: 0,
            life: lerp(0.32, 0.78, Math.random()),
            size: lerp(2, 7, Math.random()),
            color,
          });
        }
      }

      function resetState() {
        state.mode = "running";
        state.phase = "gates";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.direction = 1;
        state.beatClock = 0;
        state.beatIndex = 0;
        state.beatPulse = 0;
        state.beatResolved = false;
        state.beatSuccess = false;
        state.beatLabel = "";
        state.warmup = 1.3;
        state.misses = 0;
        state.activeGateIndex = 0;
        state.gateHits = gates.map(() => 0);
        state.finalPassed = 0;
        state.flash = 0;
        state.screenShake = 0;
        state.overlayFade = 0;
        state.message = STAGE_DESCRIPTION;
        state.subtitle = "Touch + drag only";
        state.cameraOffsetX = 0;
        state.cameraOffsetY = 0;

        beacon.x = VIEW.width / 2;
        beacon.y = 314;
        beacon.targetX = beacon.x;
        beacon.targetY = beacon.y;
        beacon.glow = 1;

        targetRing.active = false;
        targetRing.x = 752;
        targetRing.y = 300;
        targetRing.pulse = 0;

        particles.length = 0;
        ripples.length = 0;
        popups.length = 0;

        satellites.forEach((satellite, index) => {
          satellite.angle = satelliteBlueprints[index].angle;
          satellite.trail = [];
          satellite.insideTarget = false;
        });

        decayZones.forEach((zone, index) => {
          zone.t = 1.4 + index * 1.8;
        });

        updateSatellitePositions(0);
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        resetState();
        addPopup("SHEPHERD ONLINE", beacon.x, beacon.y - 62, COLORS.white, true);
        addRipple(beacon.x, beacon.y, COLORS.cyan, 112);
      }

      function failStage(reason) {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.message =
          reason === "decay_zone"
            ? "위성이 소멸 구역에 삼켜졌습니다."
            : "동기화 창을 너무 많이 놓쳤습니다.";
        state.subtitle = "Tap or Enter to restart";
        window.relayStageResult.status = "failed";
        state.flash = 1;
        state.screenShake = REDUCE_MOTION ? 0 : 16;
        burstParticles(beacon.x, beacon.y, COLORS.warning, 36, 28, 152);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.message = "세 위성이 항만 링을 완벽한 순서로 관통했습니다.";
        state.subtitle = "Relay gate secured";
        window.relayStageResult.status = "cleared";
        state.flash = 1;
        burstParticles(targetRing.x, targetRing.y, COLORS.white, 68, 38, 188);
        addPopup("HARBOR SECURED", targetRing.x, targetRing.y - 44, COLORS.white, true);
        reportClearedToHost();
      }

      function flipOrbit() {
        if (state.mode !== "running") {
          startStage();
          return;
        }
        state.direction *= -1;
        state.beatPulse = Math.max(state.beatPulse, 0.55);
        beacon.glow = 1;
        addRipple(beacon.x, beacon.y, state.direction > 0 ? COLORS.cyan : COLORS.rose, 92);
        addPopup(
          state.direction > 0 ? "CLOCKWISE" : "COUNTER",
          beacon.x,
          beacon.y - 56,
          state.direction > 0 ? COLORS.cyan : COLORS.rose
        );
        burstParticles(
          beacon.x,
          beacon.y,
          state.direction > 0 ? COLORS.cyan : COLORS.rose,
          20,
          14,
          92
        );
      }

      function moveBeaconTarget(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        const x = clamp((clientX - rect.left) * scaleX, ACTIVE_AREA.left, ACTIVE_AREA.right);
        const y = clamp((clientY - rect.top) * scaleY, ACTIVE_AREA.top, ACTIVE_AREA.bottom);
        beacon.targetX = x;
        beacon.targetY = y;
        if (state.mode !== "running") {
          beacon.x = x;
          beacon.y = y;
        }
      }

      function handlePointerDown(clientX, clientY, pointerId) {
        pointerState.active = true;
        pointerState.moved = false;
        pointerState.startX = clientX;
        pointerState.startY = clientY;
        pointerState.lastX = clientX;
        pointerState.lastY = clientY;
        pointerState.startTime = performance.now();
        dragPointerId = pointerId;

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
        moveBeaconTarget(clientX, clientY);
      }

      function handlePointerMove(clientX, clientY) {
        if (!pointerState.active) {
          return;
        }
        const movedDistance = distance(clientX, clientY, pointerState.startX, pointerState.startY);
        pointerState.moved = pointerState.moved || movedDistance > 8;
        pointerState.lastX = clientX;
        pointerState.lastY = clientY;
        moveBeaconTarget(clientX, clientY);
      }

      function handlePointerUp(clientX, clientY) {
        if (!pointerState.active) {
          return;
        }
        const tapDuration = performance.now() - pointerState.startTime;
        const movedDistance = distance(clientX, clientY, pointerState.startX, pointerState.startY);
        pointerState.active = false;
        dragPointerId = null;
        if (tapDuration < 220 && movedDistance < 10) {
          flipOrbit();
        }
      }

      function bindButtonPress(button, onPress) {
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = "false";
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          button.dataset.active = "true";
          onPress();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
        button.addEventListener("click", (event) => {
          event.preventDefault();
        });
      }

      function updateDecayZones(dt) {
        decayZones.forEach((zone, index) => {
          zone.t += dt * zone.speed;
          zone.drawX = zone.x + Math.cos(zone.t + index * 0.6) * zone.swingX;
          zone.drawY = zone.y + Math.sin(zone.t * 1.2 + index) * zone.swingY;
        });
      }

      function updateSatellitePositions(dt) {
        satellites.forEach((satellite) => {
          if (state.mode === "running") {
            const beatBoost = 1 + state.beatPulse * 0.16;
            satellite.angle += dt * satellite.speed * state.direction * beatBoost;
          }
          satellite.x = beacon.x + Math.cos(satellite.angle) * satellite.radius;
          satellite.y = beacon.y + Math.sin(satellite.angle) * satellite.radius * 0.82;
          satellite.trail.push({ x: satellite.x, y: satellite.y });
          const maxTrail = REDUCE_MOTION ? 5 : 12;
          if (satellite.trail.length > maxTrail) {
            satellite.trail.shift();
          }
        });
      }

      function resolveBeatWindow() {
        if (state.phase !== "gates" || state.warmup > 0) {
          return;
        }
        if (state.beatResolved || state.beatClock <= OPEN_WINDOW) {
          return;
        }
        state.beatResolved = true;
        if (state.beatSuccess) {
          return;
        }
        state.misses += 1;
        state.flash = Math.max(state.flash, 0.2);
        state.screenShake = Math.max(state.screenShake, REDUCE_MOTION ? 0 : 8);
        addPopup("MISS WINDOW", VIEW.width / 2, 86, COLORS.warning);
        burstParticles(gates[state.activeGateIndex].x, gates[state.activeGateIndex].y, COLORS.warning, 12, 14, 56);
        if (state.misses >= state.maxMisses) {
          failStage("sync_windows_exhausted");
        }
      }

      function unlockNextGate() {
        state.activeGateIndex += 1;
        state.beatClock = 0;
        state.beatResolved = false;
        state.beatSuccess = false;
        state.beatPulse = 1;
        if (state.activeGateIndex >= gates.length) {
          state.phase = "final";
          targetRing.active = true;
          addPopup("FINAL LOOP", targetRing.x, targetRing.y - 48, COLORS.white, true);
          burstParticles(targetRing.x, targetRing.y, COLORS.white, 28, 18, 108);
          return;
        }
        const nextGate = gates[state.activeGateIndex];
        addPopup(`SYNC ${nextGate.id}`, nextGate.x, nextGate.y - 48, nextGate.color, true);
      }

      function tryRegisterGateHit() {
        if (state.phase !== "gates" || state.warmup > 0 || state.beatResolved || state.beatClock > OPEN_WINDOW) {
          return;
        }
        const gate = gates[state.activeGateIndex];
        const captureRadius = 42;
        const activeSat = satellites.find((satellite) => distance(satellite.x, satellite.y, gate.x, gate.y) <= captureRadius);
        if (!activeSat) {
          return;
        }
        state.beatResolved = true;
        state.beatSuccess = true;
        state.gateHits[state.activeGateIndex] += 1;
        state.flash = Math.max(state.flash, 0.28);
        state.screenShake = Math.max(state.screenShake, REDUCE_MOTION ? 0 : 4);
        addPopup(
          `SYNC +${state.gateHits[state.activeGateIndex]}`,
          gate.x,
          gate.y - 42,
          gate.color,
          state.gateHits[state.activeGateIndex] >= gate.required
        );
        burstParticles(gate.x, gate.y, gate.color, 18, 18, 82);
        addRipple(gate.x, gate.y, gate.color, 96);
        if (state.gateHits[state.activeGateIndex] >= gate.required) {
          unlockNextGate();
        }
      }

      function updateTargetRing(dt) {
        if (!targetRing.active) {
          return;
        }
        const sway = state.elapsed * 0.72;
        targetRing.x = 702 + Math.cos(sway) * 88;
        targetRing.y = 294 + Math.sin(sway * 1.18) * 68;
        targetRing.pulse = (targetRing.pulse + dt * 2.2) % (Math.PI * 2);

        satellites.forEach((satellite) => {
          const inside = distance(satellite.x, satellite.y, targetRing.x, targetRing.y) <= targetRing.radius - 4;
          if (inside && !satellite.insideTarget) {
            const expectedId = finalOrder[state.finalPassed];
            if (satellite.id === expectedId) {
              state.finalPassed += 1;
              addPopup(`SAT ${satellite.label}`, targetRing.x, targetRing.y - 44, satellite.color, true);
              burstParticles(targetRing.x, targetRing.y, satellite.color, 24, 16, 112);
              addRipple(targetRing.x, targetRing.y, satellite.color, 118);
              if (state.finalPassed >= finalOrder.length) {
                clearStage();
              }
            } else {
              state.finalPassed = 0;
              state.screenShake = Math.max(state.screenShake, REDUCE_MOTION ? 0 : 6);
              addPopup("ORDER RESET", targetRing.x, targetRing.y - 44, COLORS.warning);
              burstParticles(targetRing.x, targetRing.y, COLORS.warning, 12, 12, 72);
            }
          }
          satellite.insideTarget = inside;
        });
      }

      function checkDecayFailure() {
        if (state.mode !== "running") {
          return;
        }
        const dangerZone = decayZones.find((zone) =>
          satellites.some(
            (satellite) => distance(satellite.x, satellite.y, zone.drawX, zone.drawY) <= zone.radius - 8
          )
        );
        if (!dangerZone) {
          return;
        }
        burstParticles(dangerZone.drawX, dangerZone.drawY, COLORS.warning, 32, 24, 132);
        addPopup("SATELLITE LOST", dangerZone.drawX, dangerZone.drawY - 38, COLORS.warning, true);
        failStage("decay_zone");
      }

      function updateEffects(dt) {
        particles.forEach((particle) => {
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.986;
          particle.vy *= 0.986;
          particle.vy += 32 * dt;
        });
        for (let index = particles.length - 1; index >= 0; index -= 1) {
          if (particles[index].age >= particles[index].life) {
            particles.splice(index, 1);
          }
        }

        ripples.forEach((ripple) => {
          ripple.age += dt;
        });
        for (let index = ripples.length - 1; index >= 0; index -= 1) {
          if (ripples[index].age >= ripples[index].life) {
            ripples.splice(index, 1);
          }
        }

        popups.forEach((popup) => {
          popup.age += dt;
        });
        for (let index = popups.length - 1; index >= 0; index -= 1) {
          if (popups[index].age >= popups[index].life) {
            popups.splice(index, 1);
          }
        }
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.warmup = Math.max(0, state.warmup - dt);
        state.flash = Math.max(0, state.flash - dt * 1.35);
        state.beatPulse = Math.max(0, state.beatPulse - dt * 1.65);
        state.screenShake = Math.max(0, state.screenShake - dt * 30);
        beacon.glow = Math.max(0, beacon.glow - dt * 1.2);

        beacon.x = lerp(beacon.x, beacon.targetX, 1 - Math.pow(0.0008, dt));
        beacon.y = lerp(beacon.y, beacon.targetY, 1 - Math.pow(0.0008, dt));

        state.beatClock += dt;
        if (state.beatClock >= BEAT_INTERVAL) {
          state.beatClock -= BEAT_INTERVAL;
          state.beatIndex += 1;
          state.beatResolved = false;
          state.beatSuccess = false;
          state.beatPulse = 1;
        }

        updateDecayZones(dt);
        updateSatellitePositions(dt);
        tryRegisterGateHit();
        resolveBeatWindow();
        updateTargetRing(dt);
        checkDecayFailure();
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          state.overlayFade = Math.min(1, state.overlayFade + dt * 2.6);
          state.flash = Math.max(0, state.flash - dt * 1.4);
          state.screenShake = Math.max(0, state.screenShake - dt * 20);
          beacon.glow = Math.max(0, beacon.glow - dt * 1.2);
          updateDecayZones(dt * 0.65);
          updateSatellitePositions(dt * 0.2);
        }
        updateEffects(dt);
        state.cameraOffsetX = REDUCE_MOTION ? 0 : (Math.random() - 0.5) * state.screenShake;
        state.cameraOffsetY = REDUCE_MOTION ? 0 : (Math.random() - 0.5) * state.screenShake;
      }

      function drawArenaGrid() {
        ctx.save();
        ctx.globalAlpha = 0.22;
        ctx.strokeStyle = "rgba(131, 244, 255, 0.18)";
        ctx.lineWidth = 1;
        for (let x = ACTIVE_AREA.left; x <= ACTIVE_AREA.right; x += 52) {
          ctx.beginPath();
          ctx.moveTo(x, ACTIVE_AREA.top);
          ctx.lineTo(x, ACTIVE_AREA.bottom);
          ctx.stroke();
        }
        for (let y = ACTIVE_AREA.top; y <= ACTIVE_AREA.bottom; y += 44) {
          ctx.beginPath();
          ctx.moveTo(ACTIVE_AREA.left, y);
          ctx.lineTo(ACTIVE_AREA.right, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawDecayZones() {
        decayZones.forEach((zone) => {
          const glow = ctx.createRadialGradient(zone.drawX, zone.drawY, 0, zone.drawX, zone.drawY, zone.radius + 34);
          glow.addColorStop(0, "rgba(255, 79, 132, 0.24)");
          glow.addColorStop(0.55, "rgba(111, 19, 48, 0.28)");
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(zone.drawX, zone.drawY, zone.radius + 34, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(255, 120, 142, 0.22)";
          ctx.lineWidth = 3;
          for (let ring = 0; ring < 3; ring += 1) {
            ctx.beginPath();
            ctx.arc(zone.drawX, zone.drawY, zone.radius - ring * 10 + Math.sin(zone.t * 4 + ring) * 3, 0, Math.PI * 2);
            ctx.stroke();
          }

          const center = ctx.createRadialGradient(zone.drawX, zone.drawY, 0, zone.drawX, zone.drawY, zone.radius);
          center.addColorStop(0, "rgba(8, 0, 10, 0.96)");
          center.addColorStop(0.55, "rgba(42, 10, 24, 0.92)");
          center.addColorStop(1, "rgba(89, 34, 53, 0.2)");
          ctx.fillStyle = center;
          ctx.beginPath();
          ctx.arc(zone.drawX, zone.drawY, zone.radius, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawGate(gate, index) {
        const active = state.phase === "gates" && index === state.activeGateIndex;
        const hits = state.gateHits[index];
        const pulse = active ? 1 + Math.sin(state.beatClock / BEAT_INTERVAL * Math.PI * 2) * 0.08 : 1;

        ctx.save();
        ctx.translate(gate.x, gate.y);
        ctx.scale(pulse, pulse);
        const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, active ? 92 : 74);
        halo.addColorStop(0, active ? "rgba(255, 255, 255, 0.16)" : "rgba(255, 255, 255, 0.08)");
        halo.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(0, 0, active ? 92 : 74, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = active ? gate.color : "rgba(151, 192, 214, 0.26)";
        ctx.lineWidth = active ? 4 : 2.5;
        ctx.beginPath();
        ctx.arc(0, 0, 34, 0.22, Math.PI * 2 - 0.22);
        ctx.stroke();

        ctx.strokeStyle = "rgba(220, 242, 255, 0.78)";
        ctx.lineWidth = 1.25;
        ctx.beginPath();
        ctx.arc(0, 0, 18, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = "rgba(5, 18, 29, 0.84)";
        roundRect(gate.x - 48, gate.y + 42, 96, 28, 14);
        ctx.fill();
        ctx.strokeStyle = active ? gate.color : "rgba(151, 192, 214, 0.24)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = COLORS.ink;
        ctx.font = "700 12px Avenir Next Condensed, Trebuchet MS, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(`${gate.caption}  ${hits}/${gate.required}`, gate.x, gate.y + 61);
      }

      function drawFinalRing() {
        if (!targetRing.active) {
          return;
        }
        const pulseScale = 1 + Math.sin(targetRing.pulse) * 0.1;
        const halo = ctx.createRadialGradient(targetRing.x, targetRing.y, 0, targetRing.x, targetRing.y, targetRing.radius + 46);
        halo.addColorStop(0, "rgba(255, 255, 255, 0.18)");
        halo.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(targetRing.x, targetRing.y, targetRing.radius + 46, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(targetRing.x, targetRing.y);
        ctx.scale(pulseScale, pulseScale);
        ctx.strokeStyle = "rgba(231, 250, 255, 0.96)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, targetRing.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.strokeStyle = "rgba(120, 224, 255, 0.44)";
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.arc(0, 0, targetRing.radius + 8, 0.4, Math.PI * 2 - 0.7);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = "rgba(6, 21, 32, 0.82)";
        roundRect(targetRing.x - 72, targetRing.y - 88, 144, 30, 15);
        ctx.fill();
        ctx.strokeStyle = "rgba(231, 250, 255, 0.34)";
        ctx.stroke();
        ctx.fillStyle = COLORS.ink;
        ctx.font = "700 12px Avenir Next Condensed, Trebuchet MS, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("TARGET RING", targetRing.x, targetRing.y - 68);
      }

      function drawBeaconAndOrbits() {
        ctx.strokeStyle = "rgba(126, 228, 255, 0.16)";
        ctx.lineWidth = 2;
        satellites.forEach((satellite) => {
          ctx.beginPath();
          ctx.ellipse(beacon.x, beacon.y, satellite.radius, satellite.radius * 0.82, 0, 0, Math.PI * 2);
          ctx.stroke();
        });

        const aura = ctx.createRadialGradient(beacon.x, beacon.y, 0, beacon.x, beacon.y, 72 + beacon.glow * 22);
        aura.addColorStop(0, "rgba(139, 245, 255, 0.42)");
        aura.addColorStop(1, "rgba(139, 245, 255, 0)");
        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(beacon.x, beacon.y, 72 + beacon.glow * 22, 0, Math.PI * 2);
        ctx.fill();

        const core = ctx.createRadialGradient(beacon.x, beacon.y, 0, beacon.x, beacon.y, 26);
        core.addColorStop(0, "rgba(255, 255, 255, 0.94)");
        core.addColorStop(0.35, "rgba(140, 244, 255, 0.86)");
        core.addColorStop(1, "rgba(52, 130, 168, 0.22)");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(beacon.x, beacon.y, 24, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(228, 249, 255, 0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(beacon.x, beacon.y, 16, 0, Math.PI * 2);
        ctx.stroke();
      }

      function drawSatellites() {
        satellites.forEach((satellite) => {
          if (satellite.trail.length > 1) {
            for (let index = 0; index < satellite.trail.length - 1; index += 1) {
              const point = satellite.trail[index];
              const alpha = index / satellite.trail.length;
              ctx.strokeStyle = satellite.color.replace(")", "");
              ctx.strokeStyle = `rgba(${satellite.id === 0 ? "129,247,255" : satellite.id === 1 ? "255,214,118" : "255,134,213"}, ${alpha * 0.26})`;
              ctx.lineWidth = 3;
              ctx.beginPath();
              ctx.moveTo(point.x, point.y);
              ctx.lineTo(satellite.trail[index + 1].x, satellite.trail[index + 1].y);
              ctx.stroke();
            }
          }

          const glow = ctx.createRadialGradient(satellite.x, satellite.y, 0, satellite.x, satellite.y, 24);
          glow.addColorStop(0, "rgba(255,255,255,0.94)");
          glow.addColorStop(0.45, satellite.color);
          glow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, 22, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = satellite.color;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, 8, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(232, 249, 255, 0.9)";
          ctx.lineWidth = 1.4;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, 12, 0, Math.PI * 2);
          ctx.stroke();
        });
      }

      function drawEffects() {
        ripples.forEach((ripple) => {
          const progress = ripple.age / ripple.life;
          ctx.strokeStyle = ripple.color.replace(")", "");
          const color = ripple.color;
          ctx.strokeStyle = color.startsWith("#") ? color : ripple.color;
          ctx.globalAlpha = 1 - progress;
          ctx.lineWidth = 3 - progress * 2;
          ctx.beginPath();
          ctx.arc(ripple.x, ripple.y, 18 + ripple.maxRadius * progress, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        });

        particles.forEach((particle) => {
          const progress = particle.age / particle.life;
          ctx.globalAlpha = 1 - progress;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * (1 - progress * 0.5), 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        });

        popups.forEach((popup) => {
          const progress = popup.age / popup.life;
          ctx.globalAlpha = 1 - progress;
          ctx.fillStyle = popup.color;
          ctx.font = `${popup.life > 1 ? 800 : 700} ${popup.life > 1 ? 24 : 18}px Avenir Next Condensed, Trebuchet MS, sans-serif`;
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y - progress * popup.rise);
          ctx.globalAlpha = 1;
        });
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawBackground();
        ctx.save();
        ctx.translate(state.cameraOffsetX, state.cameraOffsetY);
        drawArenaGrid();
        drawDecayZones();
        gates.forEach(drawGate);
        drawFinalRing();
        drawBeaconAndOrbits();
        drawSatellites();
        drawEffects();
        drawHud();
        ctx.restore();

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${state.flash * 0.14})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        drawOverlay();
      }

      function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          phase: state.phase,
          misses: state.misses,
          activeGate: state.phase === "gates" ? gates[state.activeGateIndex]?.id || null : null,
          gateHits: state.gateHits,
          finalPassed: state.finalPassed,
          direction: state.direction > 0 ? "clockwise" : "counter",
          beacon: { x: Math.round(beacon.x), y: Math.round(beacon.y) },
          satellites: satellites.map((satellite) => ({
            id: satellite.label,
            x: Math.round(satellite.x),
            y: Math.round(satellite.y),
          })),
          relayContext: {
            previousStageId: relayContext.previousStageId,
            clearCountBeforeThisStage: relayContext.clearCount,
            history: relayContext.history,
          },
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      function advanceSimulation(ms = 16.67) {
        const total = Math.max(1, ms);
        const steps = Math.max(1, Math.round(total / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceSimulation;
      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        creator: "jungcollin",
        genre: "Orbital survival / 동기화 문",
        clearCondition: STAGE_CLEAR,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.phase = "final";
          targetRing.active = true;
          state.finalPassed = 2;
          satellites[2].x = targetRing.x;
          satellites[2].y = targetRing.y;
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        canvas.focus();
        handlePointerDown(event.clientX, event.clientY, event.pointerId);
        canvas.setPointerCapture?.(event.pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (dragPointerId !== event.pointerId) {
          return;
        }
        handlePointerMove(event.clientX, event.clientY);
      });

      canvas.addEventListener("pointerup", (event) => {
        if (dragPointerId !== event.pointerId) {
          return;
        }
        handlePointerUp(event.clientX, event.clientY);
      });

      canvas.addEventListener("pointercancel", () => {
        pointerState.active = false;
        dragPointerId = null;
      });

      canvas.addEventListener("click", () => {
        canvas.focus();
      });

      bindButtonPress(reverseButton, flipOrbit);

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
          return;
        }
        if (event.key === " " || event.key === "Spacebar") {
          event.preventDefault();
          flipOrbit();
          return;
        }
        const step = 22;
        if (event.key === "ArrowLeft") {
          beacon.targetX = clamp(beacon.targetX - step, ACTIVE_AREA.left, ACTIVE_AREA.right);
        } else if (event.key === "ArrowRight") {
          beacon.targetX = clamp(beacon.targetX + step, ACTIVE_AREA.left, ACTIVE_AREA.right);
        } else if (event.key === "ArrowUp") {
          beacon.targetY = clamp(beacon.targetY - step, ACTIVE_AREA.top, ACTIVE_AREA.bottom);
        } else if (event.key === "ArrowDown") {
          beacon.targetY = clamp(beacon.targetY + step, ACTIVE_AREA.top, ACTIVE_AREA.bottom);
        }
      });

      window.addEventListener("beforeunload", () => {
        cancelAnimationFrame(animationFrame);
      });

      reportReadyToHost();
      updateDecayZones(0);
      updateSatellitePositions(0);
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
