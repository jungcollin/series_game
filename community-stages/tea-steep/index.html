<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>차 우리기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #f8f0e0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(160, 120, 80, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80, 50, 30, 0.92);
        color: #faf0e0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f8f0e0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(160, 100, 40, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">차 우리기. 화면 터치를 길게 눌러 차를 우리세요. 적절한 색이 되면 손을 떼세요.</p>
    <canvas id="game" width="960" height="540" aria-label="차 우리기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "tea-steep",
        title: "차 우리기",
        description: "차를 적절한 시간 동안 우려내세요",
        creator: "jungcollin",
        genre: "Hold-timing simulation",
        clearCondition: "차 5잔을 완벽하게 우리면 클리어",
        failCondition: "차 3잔 실패 시 게임 오버",
        controls: "화면 터치를 길게 눌러 차를 우리세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Tea types ---
      const TEAS = [
        { name: "녹차", targetTime: 2.0, tolerance: 0.5, color: "#7ab050", lightColor: "#d8e8c0", darkColor: "#4a7030" },
        { name: "홍차", targetTime: 3.0, tolerance: 0.6, color: "#b05030", lightColor: "#e8c8b8", darkColor: "#803020" },
        { name: "우롱차", targetTime: 2.5, tolerance: 0.5, color: "#c08040", lightColor: "#e8d8b8", darkColor: "#806030" },
        { name: "백차", targetTime: 1.5, tolerance: 0.4, color: "#c8b878", lightColor: "#f0e8d0", darkColor: "#a09060" },
        { name: "보이차", targetTime: 3.5, tolerance: 0.6, color: "#704030", lightColor: "#d8b8a8", darkColor: "#503020" },
        { name: "자스민차", targetTime: 2.2, tolerance: 0.5, color: "#90a848", lightColor: "#e0e8c8", darkColor: "#607830" },
        { name: "캐모마일", targetTime: 2.8, tolerance: 0.5, color: "#d8b040", lightColor: "#f0e0a8", darkColor: "#a08020" },
      ];

      // --- State ---
      const TARGET_CUPS = 5;
      const MAX_FAILS = 3;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let clearAnim = 0;

      let completedCups = 0;
      let failedCups = 0;
      let currentTea = null;
      let steeping = false;
      let steepTime = 0;
      let teaBagY = 0;
      let teaBagTargetY = 0;
      let cupResult = null; // "perfect", "weak", "bitter", null
      let resultTimer = 0;
      let particles = [];
      let steamParticles = [];
      let usedTeas = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function pickNextTea() {
        const available = TEAS.filter((_, i) => !usedTeas.includes(i));
        if (available.length === 0) usedTeas = [];
        const pool = usedTeas.length < TEAS.length ? TEAS.filter((_, i) => !usedTeas.includes(i)) : TEAS;
        const idx = TEAS.indexOf(pool[Math.floor(Math.random() * pool.length)]);
        usedTeas.push(idx);
        currentTea = TEAS[idx];
        steepTime = 0;
        steeping = false;
        cupResult = null;
        resultTimer = 0;
        teaBagY = CY - 120;
        teaBagTargetY = CY - 120;
      }

      function reset() {
        elapsed = 0; shake = 0; clearAnim = 0;
        completedCups = 0; failedCups = 0;
        particles = []; steamParticles = [];
        usedTeas = [];
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        pickNextTea();
      }

      function evaluateTea() {
        const diff = Math.abs(steepTime - currentTea.targetTime);
        if (diff <= currentTea.tolerance) {
          cupResult = "perfect";
          completedCups++;
          spawnSuccessParticles();
        } else if (steepTime < currentTea.targetTime - currentTea.tolerance) {
          cupResult = "weak";
          failedCups++;
          shake = 6;
        } else {
          cupResult = "bitter";
          failedCups++;
          shake = 6;
        }
        resultTimer = 1.5;
      }

      function spawnSuccessParticles() {
        if (reducedMotion) return;
        for (let i = 0; i < 15; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 120);
          particles.push({
            x: CX, y: CY + 40,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 30,
            life: 1, size: rand(3, 6), color: currentTea.color,
          });
        }
      }

      function spawnSteam() {
        if (reducedMotion || steamParticles.length > 8) return;
        steamParticles.push({
          x: CX + rand(-30, 30), y: CY - 30,
          vx: rand(-8, 8), vy: rand(-30, -15),
          life: 1, size: rand(6, 12),
        });
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Steam
        if (Math.random() < 0.08) spawnSteam();

        // Steeping
        if (steeping && cupResult === null) {
          steepTime += dt;
          teaBagTargetY = CY + 20;
          // Auto-fail if way too long
          if (steepTime > currentTea.targetTime * 2.5) {
            steeping = false;
            evaluateTea();
          }
        }

        teaBagY = lerp(teaBagY, teaBagTargetY, clamp(dt * 8, 0, 1));

        // Result timer
        if (cupResult !== null) {
          resultTimer -= dt;
          if (resultTimer <= 0) {
            if (completedCups >= TARGET_CUPS) {
              mode = "clear"; clearAnim = 0;
              window.relayStageResult.status = "cleared";
              reportCleared();
            } else if (failedCups >= MAX_FAILS) {
              mode = "failed";
              window.relayStageResult.status = "failed";
              reportFailed("실패 3잔");
            } else {
              pickNextTea();
            }
          }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 40 * dt;
          p.life -= dt * 1.5;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Steam particles
        for (let i = steamParticles.length - 1; i >= 0; i--) {
          const s = steamParticles[i];
          s.x += s.vx * dt; s.y += s.vy * dt;
          s.life -= dt * 0.8;
          s.size += dt * 3;
          if (s.life <= 0) steamParticles.splice(i, 1);
        }

        shake *= 0.88;
        if (shake < 0.3) shake = 0;
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#f8f0e0");
        grad.addColorStop(1, "#f0e4d0");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Wooden table
        ctx.fillStyle = "#d8c0a0";
        ctx.fillRect(0, H * 0.7, W, H * 0.3);
        ctx.fillStyle = "#c8b090";
        ctx.fillRect(0, H * 0.7, W, 4);

        if (mode === "running") {
          drawCup();
          drawTeaBag();
          drawSteam();
          drawTeaInfo();
          drawHUD();
          drawResult();
        }

        drawParticles();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawCup() {
        const cupX = CX, cupY = CY + 60;
        const cupW = 100, cupH = 90;

        // Saucer
        ctx.fillStyle = "#e8dcc8";
        ctx.beginPath();
        ctx.ellipse(cupX, cupY + cupH / 2 + 8, cupW * 0.7, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Cup body
        ctx.fillStyle = "#f0e8d8";
        ctx.beginPath();
        ctx.moveTo(cupX - cupW / 2, cupY - cupH / 2);
        ctx.lineTo(cupX - cupW / 2 + 10, cupY + cupH / 2);
        ctx.lineTo(cupX + cupW / 2 - 10, cupY + cupH / 2);
        ctx.lineTo(cupX + cupW / 2, cupY - cupH / 2);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#c8b8a0";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Handle
        ctx.beginPath();
        ctx.arc(cupX + cupW / 2 + 8, cupY, 18, -Math.PI * 0.4, Math.PI * 0.4);
        ctx.strokeStyle = "#c8b8a0";
        ctx.lineWidth = 4;
        ctx.stroke();

        // Tea liquid
        if (currentTea) {
          const steepProgress = clamp(steepTime / (currentTea.targetTime * 2), 0, 1);
          const teaColor = lerpColor(currentTea.lightColor, currentTea.darkColor, steepProgress);
          ctx.fillStyle = teaColor;
          const liquidTop = cupY - cupH / 2 + 12;
          const liquidBottom = cupY + cupH / 2 - 4;
          const tl = cupX - cupW / 2 + 6;
          const tr = cupX + cupW / 2 - 6;
          ctx.beginPath();
          ctx.moveTo(tl + 4, liquidTop);
          ctx.lineTo(tl + 8, liquidBottom);
          ctx.lineTo(tr - 8, liquidBottom);
          ctx.lineTo(tr - 4, liquidTop);
          ctx.closePath();
          ctx.fill();
        }

        // Cup rim highlight
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cupX - cupW / 2 + 2, cupY - cupH / 2);
        ctx.lineTo(cupX + cupW / 2 - 2, cupY - cupH / 2);
        ctx.stroke();
      }

      function lerpColor(c1, c2, t) {
        const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
        const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
        const r = Math.round(lerp(r1, r2, t)), g = Math.round(lerp(g1, g2, t)), b = Math.round(lerp(b1, b2, t));
        return `rgb(${r},${g},${b})`;
      }

      function drawTeaBag() {
        if (!currentTea) return;
        // String
        ctx.strokeStyle = "#a09070";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(CX, CY - 130);
        ctx.lineTo(CX, teaBagY);
        ctx.stroke();

        // Tag at top
        ctx.fillStyle = "#e8dcc0";
        ctx.fillRect(CX - 12, CY - 145, 24, 18);
        ctx.strokeStyle = "#c0a880";
        ctx.lineWidth = 1;
        ctx.strokeRect(CX - 12, CY - 145, 24, 18);

        // Tea bag
        ctx.fillStyle = currentTea.color;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.roundRect(CX - 14, teaBagY, 28, 22, 4);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Instruction text
        if (cupResult === null && !steeping) {
          ctx.fillStyle = "rgba(80, 50, 30, 0.5)";
          ctx.font = "400 14px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText("길게 누르세요", CX, CY + 160);
        }
      }

      function drawSteam() {
        for (const s of steamParticles) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220, 210, 200, ${s.life * 0.3})`;
          ctx.fill();
        }
      }

      function drawTeaInfo() {
        if (!currentTea) return;

        // Tea name
        ctx.fillStyle = "#5a3a20";
        ctx.font = "bold 20px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(currentTea.name, CX, 60);

        // Steep gauge
        const gaugeW = 200, gaugeH = 12;
        const gaugeX = CX - gaugeW / 2, gaugeY = 80;

        // Background
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.beginPath();
        ctx.roundRect(gaugeX, gaugeY, gaugeW, gaugeH, 6);
        ctx.fill();

        // Target zone
        const maxTime = currentTea.targetTime * 2;
        const targetStart = (currentTea.targetTime - currentTea.tolerance) / maxTime;
        const targetEnd = (currentTea.targetTime + currentTea.tolerance) / maxTime;
        ctx.fillStyle = "rgba(100, 160, 60, 0.35)";
        ctx.fillRect(gaugeX + targetStart * gaugeW, gaugeY, (targetEnd - targetStart) * gaugeW, gaugeH);

        // Current position
        if (steeping || cupResult !== null) {
          const pos = clamp(steepTime / maxTime, 0, 1);
          ctx.fillStyle = currentTea.color;
          ctx.beginPath();
          ctx.roundRect(gaugeX, gaugeY, pos * gaugeW, gaugeH, 6);
          ctx.fill();

          // Marker
          ctx.fillStyle = "#5a3a20";
          ctx.beginPath();
          ctx.arc(gaugeX + pos * gaugeW, gaugeY + gaugeH / 2, 7, 0, Math.PI * 2);
          ctx.fill();
        }

        // Labels
        ctx.fillStyle = "rgba(80, 50, 30, 0.4)";
        ctx.font = "400 11px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.fillText("연함", gaugeX, gaugeY + gaugeH + 14);
        ctx.textAlign = "right";
        ctx.fillText("진함", gaugeX + gaugeW, gaugeY + gaugeH + 14);
      }

      function drawResult() {
        if (cupResult === null) return;
        const alpha = clamp(resultTimer / 1.5, 0, 1);

        ctx.globalAlpha = alpha;
        ctx.font = "bold 28px Trebuchet MS";
        ctx.textAlign = "center";

        if (cupResult === "perfect") {
          ctx.fillStyle = "#40a060";
          ctx.fillText("완벽한 맛!", CX, CY - 80);
        } else if (cupResult === "weak") {
          ctx.fillStyle = "#c0a040";
          ctx.fillText("너무 연해요...", CX, CY - 80);
        } else {
          ctx.fillStyle = "#c04040";
          ctx.fillText("너무 써요!", CX, CY - 80);
        }
        ctx.globalAlpha = 1;
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = "#5a3a20";
        ctx.font = "600 16px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`성공: ${completedCups}/${TARGET_CUPS}`, 20, 16);

        ctx.textAlign = "center";
        ctx.fillStyle = failedCups > 1 ? "#c03030" : "#5a3a20";
        ctx.fillText(`실패: ${failedCups}/${MAX_FAILS}`, CX, 16);

        // Cup indicators
        for (let i = 0; i < TARGET_CUPS; i++) {
          const dotX = W - 100 + i * 18;
          ctx.beginPath();
          ctx.arc(dotX, 24, 6, 0, Math.PI * 2);
          ctx.fillStyle = i < completedCups ? "#40a060" : "rgba(0,0,0,0.1)";
          ctx.fill();
        }
      }

      // --- Cards ---
      function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y); c.lineTo(x + w - r, y);
        c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r);
        c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h);
        c.arcTo(x, y + h, x, y + h - r, r);
        c.lineTo(x, y + r);
        c.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(248, 240, 224, 0.96)";
        ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 8); ctx.fill();
        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);
        ctx.fillStyle = "#5a3a20";
        ctx.font = "bold 22px Trebuchet MS";
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);
        ctx.font = "400 14px Trebuchet MS";
        ctx.fillStyle = "rgba(90, 58, 32, 0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        ctx.fillStyle = "rgba(90, 58, 32, 0.4)";
        ctx.font = "400 13px Trebuchet MS";
        ctx.fillText("탭 또는 ENTER", CX, cardY + cardH - 20);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(248, 240, 224, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("차 우리기", [
          "화면 터치를 길게 눌러 차를 우리세요",
          "적절한 색이 되면 손을 떼세요!",
          "",
          "조작: 화면 터치 길게 누르기",
          "클리어: 차 5잔 완벽하게 우리기",
          "실패: 차 3잔 실패",
        ], "#a07040");
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(248, 240, 224, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 완료`, "최고의 다도사입니다!"], "#40a060");
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(100, 60, 40, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["차를 너무 많이 망쳤습니다", `성공: ${completedCups}/${TARGET_CUPS}`], "#c03030");
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        if (cupResult !== null) return;
        steeping = true;
        teaBagTargetY = CY + 20;
      });

      canvas.addEventListener("pointerup", (e) => {
        if (mode !== "running" || !steeping) return;
        steeping = false;
        teaBagTargetY = CY - 120;
        if (cupResult === null && steepTime > 0.1) {
          evaluateTea();
        }
      });

      canvas.addEventListener("pointercancel", () => {
        if (steeping) {
          steeping = false;
          teaBagTargetY = CY - 120;
          if (cupResult === null && steepTime > 0.1) evaluateTea();
        }
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug ---
      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), completedCups, failedCups, steepTime: +steepTime.toFixed(2), result: window.relayStageResult.status });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          completedCups = TARGET_CUPS;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          failedCups = MAX_FAILS;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      pickNextTea();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
