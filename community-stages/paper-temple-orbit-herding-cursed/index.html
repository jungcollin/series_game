<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>향 의식</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Serif KR", "Georgia", serif;
        background: #3a2820; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 140, 80, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(50, 30, 20, 0.92);
        color: #f0e0c0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f0e4d0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 120, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">향 의식. 피어오르는 향 연기를 풍경 소리에 맞춰 이끌어 주세요. 마우스 또는 터치로 연기 유도, 모바일은 화면 터치와 드래그. 15개 풍경을 통과시키면 성공. 저주 연기에 3번 닿으면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="향 의식" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "paper-temple-orbit-herding-cursed",
        title: "향 의식",
        description: "피어오르는 향 연기를 풍경 소리에 맞춰 이끌어 주세요.",
        creator: "jungcollin",
        genre: "Meditative herding",
        clearCondition: "15개 풍경을 통과시키면 성공",
        failCondition: "저주 연기에 3번 닿으면 실패",
        controls: "마우스 또는 터치로 연기를 유도하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#f0e4d0",
        bgWarm: "#e8d4b8",
        smoke: "#a09888",
        smokeLight: "rgba(160, 152, 136, 0.5)",
        chime: "#b08830",
        chimeGlow: "rgba(176, 136, 48, 0.25)",
        darkSmoke: "#3a2028",
        darkGlow: "rgba(58, 32, 40, 0.3)",
        offering: "#a03020",
        offeringCloth: "#c04030",
        incense: "#c8a868",
        ash: "#8a7a6a",
        text: "#3a2820",
        textLight: "rgba(58, 40, 32, 0.6)",
        accent: "#b08830",
      };

      // --- State ---
      const DURATION = 45;
      const TARGET = 15;
      const MAX_DISRUPTIONS = 3;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      let passed = 0;
      let disruptions = 0;
      let pointerPos = { x: CX, y: CY };

      // Smoke wisps (the things you guide)
      let wisps = [];
      const MAX_WISPS = 5;

      // Wind chime rings
      let chime = { x: 0, y: 0, r: 28, timer: 0 };

      // Dark smoke (cursed)
      let darkSmokes = [];
      let darkSpawnTimer = 0;

      // Incense sticks (visual)
      let incenseSticks = [];

      // Trail (smoke trail behind pointer)
      let smokeTrail = [];
      const TRAIL_MAX = 30;

      let particles = [];
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;
      let chimePulse = 0;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Setup ---
      function spawnChime() {
        chime.x = rand(120, W - 120);
        chime.y = rand(80, H - 120);
        chime.timer = 0;
      }

      function spawnWisp() {
        // Wisps rise from incense sticks at bottom
        const stickIdx = Math.floor(rand(0, incenseSticks.length));
        const stick = incenseSticks[stickIdx] || { x: CX, y: H - 30 };
        wisps.push({
          x: stick.x + rand(-5, 5),
          y: stick.y - 15,
          vx: rand(-8, 8), vy: rand(-30, -50),
          wobble: rand(0, Math.PI * 2),
          size: rand(6, 10),
          alpha: 0.7,
        });
      }

      function spawnDarkSmoke() {
        const side = Math.random() < 0.5 ? rand(40, 150) : rand(W - 150, W - 40);
        darkSmokes.push({
          x: side, y: rand(100, H - 100),
          vx: side < CX ? rand(15, 35) : rand(-35, -15),
          vy: rand(-20, 10),
          wobble: rand(0, Math.PI * 2),
          size: rand(14, 20),
          pulse: rand(0, Math.PI * 2),
          active: true,
        });
      }

      function buildIncense() {
        incenseSticks = [];
        const count = 3;
        for (let i = 0; i < count; i++) {
          incenseSticks.push({
            x: CX + (i - 1) * 120,
            y: H - 25,
          });
        }
      }

      function reset() {
        elapsed = 0; passed = 0; disruptions = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0; chimePulse = 0;
        darkSpawnTimer = 3;
        pointerPos = { x: CX, y: CY };
        wisps = []; darkSmokes = []; particles = []; smokeTrail = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        buildIncense();
        spawnChime();
        for (let i = 0; i < 3; i++) spawnWisp();
      }

      function spawnParticles(x, y, count, color, sizeRange) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), sp = rand(20, 80);
          particles.push({
            x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, color, size: rand(sizeRange[0], sizeRange[1]),
          });
        }
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Spawn wisps
        if (wisps.length < MAX_WISPS && Math.random() < dt * 0.6) spawnWisp();

        // Smoke trail
        smokeTrail.unshift({ x: pointerPos.x, y: pointerPos.y, age: 0 });
        if (smokeTrail.length > TRAIL_MAX) smokeTrail.pop();
        for (const t of smokeTrail) t.age += dt;
        while (smokeTrail.length > 0 && smokeTrail[smokeTrail.length - 1].age > 1) smokeTrail.pop();

        // Update wisps
        for (const w of wisps) {
          w.wobble += dt * 2;
          // Wisps naturally float upward
          w.vy -= 15 * dt;

          // Guide toward pointer (gentle pull)
          const dx = pointerPos.x - w.x;
          const dy = pointerPos.y - w.y;
          const d = Math.hypot(dx, dy) || 1;
          if (d < 200) {
            w.vx += (dx / d) * 60 * dt;
            w.vy += (dy / d) * 60 * dt;
          }

          // Wobble
          w.vx += Math.cos(w.wobble) * 20 * dt;
          w.vy += Math.sin(w.wobble * 0.7) * 10 * dt;

          // Drag
          w.vx *= 0.975; w.vy *= 0.975;
          w.x += w.vx * dt;
          w.y += w.vy * dt;

          // Bounds
          w.x = clamp(w.x, 20, W - 20);
          w.y = clamp(w.y, 20, H - 20);

          // Fade if too old or off-screen
          w.alpha = clamp(w.alpha - dt * 0.05, 0.2, 0.8);

          // Chime collision
          if (dist(w.x, w.y, chime.x, chime.y) < chime.r + w.size) {
            passed++;
            chimePulse = 1;
            spawnParticles(chime.x, chime.y, reducedMotion ? 3 : 6, COL.chime, [2, 4]);
            // Reset wisp to bottom
            const stick = incenseSticks[Math.floor(rand(0, incenseSticks.length))];
            w.x = stick.x + rand(-5, 5);
            w.y = stick.y - 15;
            w.vx = rand(-5, 5); w.vy = rand(-30, -45);
            w.alpha = 0.7;
            spawnChime();
          }
        }

        // Dark smoke spawning
        darkSpawnTimer -= dt;
        if (darkSpawnTimer <= 0) {
          spawnDarkSmoke();
          darkSpawnTimer = lerp(4, 2, clamp(elapsed / DURATION, 0, 1));
        }

        // Update dark smokes
        for (let i = darkSmokes.length - 1; i >= 0; i--) {
          const ds = darkSmokes[i];
          if (!ds.active) { darkSmokes.splice(i, 1); continue; }
          ds.wobble += dt * 1.5;
          ds.pulse += dt * 3;
          ds.x += ds.vx * dt + Math.cos(ds.wobble) * 8 * dt;
          ds.y += ds.vy * dt + Math.sin(ds.wobble * 0.7) * 5 * dt;

          // Collision with wisps
          for (const w of wisps) {
            if (dist(ds.x, ds.y, w.x, w.y) < ds.size + w.size) {
              ds.active = false;
              disruptions++;
              shake = 6; flashAlpha = 0.3;
              spawnParticles(ds.x, ds.y, reducedMotion ? 3 : 7, COL.darkSmoke, [3, 6]);
              // Boost that wisp speed as "shortcut" effect
              w.vy -= 60;
              break;
            }
          }

          // Remove if off screen
          if (ds.x < -30 || ds.x > W + 30 || ds.y < -30 || ds.y > H + 30) {
            darkSmokes.splice(i, 1);
          }
        }

        // Chime timeout
        chime.timer += dt;
        if (chime.timer > 10) spawnChime();

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.93; p.vy *= 0.93;
          p.life -= dt * 2.2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        chimePulse *= 0.93;
        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.9;

        // Win/lose
        if (passed >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared();
        } else if (disruptions >= MAX_DISRUPTIONS) {
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("의식 붕괴");
        } else if (elapsed >= DURATION) {
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        drawBackground();
        drawIncenseSticks();
        drawSmokeTrail();
        drawChime();
        drawDarkSmokes();
        drawWisps();
        drawParticles();
        if (mode === "running") drawHUD();

        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(58, 32, 40, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBackground() {
        // Warm sandalwood gradient
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, "#f4ead8");
        bg.addColorStop(0.6, COL.bg);
        bg.addColorStop(1, COL.bgWarm);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Subtle texture
        if (!reducedMotion) {
          ctx.globalAlpha = 0.03;
          ctx.fillStyle = COL.ash;
          const t = Math.floor(elapsed * 0.4);
          for (let i = 0; i < 25; i++) {
            const px = ((i * 137 + t * 29) % W);
            const py = ((i * 211 + t * 47) % H);
            ctx.fillRect(px, py, 2, 2);
          }
          ctx.globalAlpha = 1;
        }

        // Offering cloth (bottom strip)
        ctx.fillStyle = COL.offeringCloth;
        ctx.globalAlpha = 0.15;
        ctx.fillRect(0, H - 50, W, 50);
        ctx.globalAlpha = 1;
      }

      function drawIncenseSticks() {
        for (const s of incenseSticks) {
          // Stick
          ctx.fillStyle = COL.incense;
          ctx.fillRect(s.x - 1.5, s.y - 40, 3, 40);

          // Ash tip
          ctx.fillStyle = COL.ash;
          ctx.fillRect(s.x - 2, s.y - 42, 4, 4);

          // Glow at tip
          if (!reducedMotion) {
            ctx.beginPath();
            ctx.arc(s.x, s.y - 42, 6, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 101, 42, ${0.15 + Math.sin(elapsed * 4) * 0.05})`;
            ctx.fill();
          }

          // Bowl
          ctx.beginPath();
          ctx.ellipse(s.x, s.y, 14, 6, 0, 0, Math.PI);
          ctx.fillStyle = "#8a7060";
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(s.x, s.y, 14, 4, 0, 0, Math.PI * 2);
          ctx.fillStyle = "#9a8070";
          ctx.fill();
        }
      }

      function drawSmokeTrail() {
        if (smokeTrail.length < 2) return;
        for (let i = 0; i < smokeTrail.length - 1; i++) {
          const t = smokeTrail[i];
          const n = smokeTrail[i + 1];
          const fade = 1 - clamp(t.age / 1, 0, 1);
          if (fade < 0.02) continue;
          ctx.beginPath();
          ctx.moveTo(t.x, t.y);
          ctx.lineTo(n.x, n.y);
          ctx.strokeStyle = `rgba(160, 152, 136, ${fade * 0.25})`;
          ctx.lineWidth = 3 * fade;
          ctx.lineCap = "round";
          ctx.stroke();
        }
      }

      function drawChime() {
        const pulse = chimePulse * 8;
        // Glow
        ctx.beginPath();
        ctx.arc(chime.x, chime.y, chime.r + 10 + pulse, 0, Math.PI * 2);
        ctx.fillStyle = COL.chimeGlow;
        ctx.fill();

        // Ring body
        ctx.beginPath();
        ctx.arc(chime.x, chime.y, chime.r, 0, Math.PI * 2);
        ctx.strokeStyle = COL.chime;
        ctx.lineWidth = 3;
        ctx.stroke();

        // Inner ring
        ctx.beginPath();
        ctx.arc(chime.x, chime.y, chime.r - 6, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(176, 136, 48, 0.3)";
        ctx.lineWidth = 1;
        ctx.stroke();

        // Hanging line
        ctx.beginPath();
        ctx.moveTo(chime.x, chime.y - chime.r);
        ctx.lineTo(chime.x, chime.y - chime.r - 20);
        ctx.strokeStyle = COL.ash;
        ctx.lineWidth = 1;
        ctx.stroke();

        // Chime character
        ctx.fillStyle = COL.chime;
        ctx.font = `bold 14px "Noto Serif KR", serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("鈴", chime.x, chime.y);
      }

      function drawWisps() {
        for (const w of wisps) {
          // Wisp body (soft smoke circle)
          ctx.beginPath();
          ctx.arc(w.x, w.y, w.size, 0, Math.PI * 2);
          ctx.fillStyle = COL.smokeLight;
          ctx.globalAlpha = w.alpha * 0.6;
          ctx.fill();

          // Inner core
          ctx.beginPath();
          ctx.arc(w.x, w.y, w.size * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = COL.smoke;
          ctx.globalAlpha = w.alpha * 0.8;
          ctx.fill();

          // Wispy tail
          const tailX = w.x - w.vx * 0.15;
          const tailY = w.y - w.vy * 0.15;
          ctx.beginPath();
          ctx.arc(tailX, tailY, w.size * 0.3, 0, Math.PI * 2);
          ctx.globalAlpha = w.alpha * 0.3;
          ctx.fill();

          ctx.globalAlpha = 1;
        }
      }

      function drawDarkSmokes() {
        for (const ds of darkSmokes) {
          if (!ds.active) continue;
          const pr = ds.size + Math.sin(ds.pulse) * 2;

          // Glow
          ctx.beginPath();
          ctx.arc(ds.x, ds.y, pr + 8, 0, Math.PI * 2);
          ctx.fillStyle = COL.darkGlow;
          ctx.fill();

          // Body
          ctx.beginPath();
          ctx.arc(ds.x, ds.y, pr, 0, Math.PI * 2);
          ctx.fillStyle = COL.darkSmoke;
          ctx.globalAlpha = 0.65;
          ctx.fill();
          ctx.globalAlpha = 1;

          // Warning mark
          ctx.fillStyle = "#a06060";
          ctx.font = `bold ${pr}px serif`;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("x", ds.x, ds.y + 1);
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
          ctx.fill(); ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px "Noto Serif KR", serif`;
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`${passed} / ${TARGET}`, 24, 20);

        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(Math.max(0, DURATION - elapsed))}`, W - 24, 20);

        // Disruption dots
        const dotY = H - 24;
        for (let i = 0; i < MAX_DISRUPTIONS; i++) {
          const dotX = CX - (MAX_DISRUPTIONS - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_DISRUPTIONS - disruptions ? COL.accent : "#d8d0c4";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(240, 228, 208, 0.95)";
        ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 8); ctx.fill();

        ctx.fillStyle = accent || COL.accent;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = `bold 22px "Noto Serif KR", serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = `400 14px "Noto Serif KR", serif`;
        ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);

        ctx.fillStyle = "rgba(58, 40, 32, 0.35)";
        ctx.font = `400 13px "Noto Serif KR", serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(240, 228, 208, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("향 의식", [
          "피어오르는 향 연기를",
          "풍경 소리에 맞춰 이끌어 주세요",
          "",
          "조작: 터치/클릭으로 연기 유도",
          "클리어: 15개 풍경 통과",
          "실패: 저주 연기에 3번 닿으면 실패",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(240, 228, 208, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("의식 완성", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `붕괴: ${disruptions}회`,
          ], COL.accent);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(50, 30, 20, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("의식 붕괴", [
          elapsed >= DURATION ? "시간이 다했습니다" : "저주 연기가 의식을 무너뜨렸습니다",
          `통과: ${passed} / ${TARGET}`,
        ], COL.offering);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        pointerPos = getCanvasPos(e.clientX, e.clientY);
      });
      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running") return;
        pointerPos = getCanvasPos(e.clientX, e.clientY);
      });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          passed, disruptions, wisps: wisps.length,
          result: window.relayStageResult.status,
        });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running"; passed = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running"; disruptions = MAX_DISRUPTIONS;
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      buildIncense(); spawnChime();
      for (let i = 0; i < 3; i++) spawnWisp();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
