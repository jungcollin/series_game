<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Observatory: Echo Loom</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(103, 232, 249, 0.14), transparent 36%),
          radial-gradient(circle at 82% 18%, rgba(196, 181, 253, 0.18), transparent 28%),
          linear-gradient(180deg, #07111f 0%, #030712 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(103, 232, 249, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 17, 31, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(103, 232, 249, 0.95);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Neon Observatory: Echo Loom. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은
      마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 이동 후 바로
      다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현
      입니다. 클리어 조건은 붕괴선이 닿기 전에 모든 코어 문양을 연결하면 클리어 이고,
      실패 조건은 붕괴선에 휩쓸리거나 잔상 선이 끊기면 즉시 실패 입니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Neon Observatory: Echo Loom"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "neon-observatory-echo-weaving-collapse",
        title: "Neon Observatory: Echo Loom",
        creator: "jungcollin",
        genre: "Echo puzzler / 붕괴하는 라인",
        description: "3초 잔상을 짜서 스위치와 길을 동시에 여는 네온 천문대 퍼즐 액션",
        controls:
          "마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition: "붕괴선이 닿기 전에 모든 코어 문양을 연결하면 클리어",
        failCondition: "붕괴선에 휩쓸리거나 잔상 선이 끊기면 즉시 실패",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const NODES = [
        { id: "dock", label: "도크", type: "start", x: 92, y: 292, accent: "#38bdf8" },
        { id: "switch1", label: "S1", type: "switch", gate: "gate1", x: 186, y: 214, accent: "#22d3ee" },
        { id: "relay1", label: "R1", type: "relay", x: 324, y: 226, accent: "#a78bfa" },
        { id: "core1", label: "문양 A", type: "core", x: 452, y: 136, accent: "#f0abfc" },
        { id: "core2", label: "문양 B", type: "core", x: 528, y: 344, accent: "#fb7185" },
        { id: "switch2", label: "S2", type: "switch", gate: "gate2", x: 620, y: 248, accent: "#38bdf8" },
        { id: "relay2", label: "R2", type: "relay", x: 748, y: 258, accent: "#c084fc" },
        { id: "core3", label: "문양 C", type: "core", x: 818, y: 134, accent: "#f59e0b" },
        { id: "switch3", label: "S3", type: "switch", gate: "gate3", x: 818, y: 378, accent: "#22d3ee" },
        { id: "core4", label: "문양 Ω", type: "core", x: 900, y: 256, accent: "#fde047", goal: true },
      ];

      const EDGES = [
        { id: "dock-switch1", a: "dock", b: "switch1", type: "normal" },
        { id: "gate1-thread", a: "switch1", b: "relay1", type: "bridge", gate: "gate1" },
        { id: "relay1-core1", a: "relay1", b: "core1", type: "normal" },
        { id: "core1-core2", a: "core1", b: "core2", type: "normal" },
        { id: "core2-switch2", a: "core2", b: "switch2", type: "normal" },
        { id: "gate2-thread", a: "switch2", b: "relay2", type: "bridge", gate: "gate2" },
        { id: "relay2-core3", a: "relay2", b: "core3", type: "normal" },
        { id: "core3-switch3", a: "core3", b: "switch3", type: "normal" },
        { id: "gate3-thread", a: "switch3", b: "core4", type: "bridge", gate: "gate3" },
      ];

      const GATES = {
        gate1: { switchId: "switch1", label: "관측 돔" },
        gate2: { switchId: "switch2", label: "굴절 통로" },
        gate3: { switchId: "switch3", label: "최종 사다리" },
      };

      const CORE_IDS = NODES.filter((node) => node.type === "core").map((node) => node.id);
      const SWITCH_IDS = NODES.filter((node) => node.type === "switch").map((node) => node.id);
      const NODE_LOOKUP = Object.fromEntries(NODES.map((node) => [node.id, node]));
      const EDGE_LOOKUP = new Map(
        EDGES.flatMap((edge) => [
          [`${edge.a}:${edge.b}`, edge],
          [`${edge.b}:${edge.a}`, edge],
        ])
      );
      const STAR_FIELD = Array.from({ length: REDUCED_MOTION ? 42 : 88 }, (_, index) => ({
        x: (index * 137) % VIEW.width,
        y: (index * 83) % VIEW.height,
        size: 0.8 + ((index * 13) % 5) * 0.33,
        speed: 0.8 + ((index * 17) % 7) * 0.16,
        phase: index * 0.73,
      }));

      const COLLAPSE_DELAY = 0.7;
      const COLLAPSE_SPEED = 112;
      const PLAYER_SPEED = 292;
      const ECHO_DURATION = 3;
      const HOLD_DURATION = 0.38;
      const SHAKE_DECAY = REDUCED_MOTION ? 0 : 5.4;

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - clamp(t, 0, 1), 3);
      }

      function distance(a, b) {
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        return Math.hypot(dx, dy);
      }

      function pointDistance(x1, y1, x2, y2) {
        return Math.hypot(x1 - x2, y1 - y2);
      }

      function roundRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
      }

      function getNode(id) {
        return NODE_LOOKUP[id];
      }

      function getEdge(a, b) {
        return EDGE_LOOKUP.get(`${a}:${b}`) || null;
      }

      function createInitialState() {
        const startNode = getNode("dock");
        return {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          note: META.description,
          message: "첫 스위치에서 홀드해 잔상을 짜세요.",
          activatedCores: new Set(),
          wovenEdges: new Set(),
          echoes: Object.fromEntries(Object.keys(GATES).map((gateId) => [gateId, 0])),
          player: {
            x: startNode.x,
            y: startNode.y,
            currentNode: "dock",
            fromNode: null,
            toNode: null,
            progress: 0,
            edgeId: null,
            queue: [],
          },
          drag: {
            active: false,
            pointerId: null,
            route: [],
            moved: false,
            holdNode: null,
            holdElapsed: 0,
            echoTriggered: false,
            startPoint: { x: 0, y: 0 },
            pointer: { x: startNode.x, y: startNode.y },
          },
          particles: [],
          popups: [],
          flash: 0,
          shake: 0,
          clearPulse: 0,
          failureReason: META.failCondition,
        };
      }

      let state = createInitialState();

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRuntime(mode = "menu") {
        state = createInitialState();
        state.mode = mode;
        window.relayStageResult.status = mode === "cleared" ? "cleared" : mode === "failed" ? "failed" : "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        resetRuntime("running");
        state.message = "S1에서 눌러 3초 잔상을 만든 뒤 통로를 짜세요.";
      }

      function triggerShake(amount) {
        if (!REDUCED_MOTION) {
          state.shake = Math.max(state.shake, amount);
        }
      }

      function addParticles(x, y, color, count, spread = 1) {
        const total = REDUCED_MOTION ? Math.ceil(count * 0.35) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / Math.max(total, 1) + Math.random() * 0.8;
          const speed = (60 + Math.random() * 150) * spread;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 4,
            life: 0.36 + Math.random() * 0.5,
            maxLife: 0.36 + Math.random() * 0.5,
            color,
          });
        }
      }

      function addPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: 1,
        });
      }

      function collapseX() {
        return -100 + Math.max(0, state.elapsed - COLLAPSE_DELAY) * COLLAPSE_SPEED;
      }

      function isNodeCollapsed(nodeId) {
        const node = getNode(nodeId);
        return collapseX() > node.x + 18;
      }

      function playerIsOnSwitch(switchId) {
        return state.player.currentNode === switchId;
      }

      function gateActive(gateId, includeOccupant = true) {
        return state.echoes[gateId] > 0 || (includeOccupant && playerIsOnSwitch(GATES[gateId].switchId));
      }

      function canTraverse(edge, forPlanning = false) {
        if (!edge) {
          return false;
        }
        if (isNodeCollapsed(edge.a) || isNodeCollapsed(edge.b)) {
          return false;
        }
        if (edge.type === "bridge") {
          return gateActive(edge.gate, !forPlanning);
        }
        return true;
      }

      function currentObjective() {
        if (state.mode !== "running") {
          return "스테이지 시작 대기";
        }
        if (!state.activatedCores.has("core1")) {
          return "S1에서 홀드 후 첫 두 문양으로 실을 잇기";
        }
        if (!state.activatedCores.has("core2")) {
          return "문양 B를 지나 S2까지 전진";
        }
        if (!state.activatedCores.has("core3")) {
          return "S2에서 잔상을 짜고 상단 문양 C 연결";
        }
        if (!state.activatedCores.has("core4")) {
          return "S3 홀드 후 마지막 문양 Ω를 연결";
        }
        return "모든 문양 연결 완료";
      }

      function failStage(reason = "failed", message = META.failCondition) {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.failureReason = message;
        state.player.queue = [];
        state.drag.active = false;
        state.flash = 0.8;
        triggerShake(14);
        addParticles(state.player.x, state.player.y, "#fb7185", 24, 1.2);
        addPopup("THREAD BREAK", state.player.x, state.player.y - 18, "#ffd6de");
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.clearPulse = 1;
        state.flash = 0.55;
        triggerShake(8);
        addParticles(state.player.x, state.player.y, "#fde68a", 40, 1.35);
        addPopup("ECHO COMPLETE", state.player.x, state.player.y - 22, "#fff0a6");
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function recordEcho(switchId) {
        const node = getNode(switchId);
        const gateId = node.gate;
        state.echoes[gateId] = ECHO_DURATION;
        state.message = `${GATES[gateId].label}에 3초 잔상 고정`;
        state.flash = Math.max(state.flash, 0.16);
        addParticles(node.x, node.y, node.accent, 18, 0.95);
        addPopup("잔상 고정", node.x, node.y - 28, "#d8fbff");
      }

      function activateCore(nodeId) {
        if (state.activatedCores.has(nodeId)) {
          return;
        }
        const node = getNode(nodeId);
        state.activatedCores.add(nodeId);
        state.message = `${node.label} 연결 완료`;
        state.flash = Math.max(state.flash, 0.12);
        addParticles(node.x, node.y, node.accent, 24, 1.05);
        addPopup(`${node.label} 연결`, node.x, node.y - 24, "#ffffff");
        if (state.activatedCores.size === CORE_IDS.length) {
          clearStage();
        }
      }

      function beginMove(nextNodeId) {
        const currentNodeId = state.player.currentNode;
        const edge = getEdge(currentNodeId, nextNodeId);
        if (!edge || !canTraverse(edge, true)) {
          state.message = edge && edge.type === "bridge"
            ? "먼저 스위치를 눌러 3초 잔상을 고정하세요."
            : "무너진 구간은 더 이상 잇지 못합니다.";
          addPopup("경로 불가", state.player.x, state.player.y - 24, "#fecdd3");
          state.player.queue = [];
          return;
        }
        state.player.fromNode = currentNodeId;
        state.player.toNode = nextNodeId;
        state.player.currentNode = null;
        state.player.progress = 0;
        state.player.edgeId = edge.id;
        state.wovenEdges.add(edge.id);
      }

      function tryQueueRoute(route) {
        if (state.mode !== "running" || !state.player.currentNode || !Array.isArray(route) || route.length < 2) {
          return;
        }
        const nextSteps = route.slice(1);
        if (!nextSteps.length) {
          return;
        }
        for (const nodeId of nextSteps) {
          if (!state.player.queue.length || state.player.queue[state.player.queue.length - 1] !== nodeId) {
            state.player.queue.push(nodeId);
          }
        }
      }

      function extendRoute(point) {
        const route = state.drag.route;
        if (!route.length || !state.player.currentNode) {
          return;
        }
        const lastNodeId = route[route.length - 1];
        let best = null;
        let bestDistance = 58;
        for (const node of NODES) {
          if (node.id === lastNodeId) {
            continue;
          }
          const edge = getEdge(lastNodeId, node.id);
          if (!edge || !canTraverse(edge, true)) {
            continue;
          }
          const d = pointDistance(point.x, point.y, node.x, node.y);
          if (d < bestDistance) {
            bestDistance = d;
            best = node;
          }
        }
        if (!best) {
          return;
        }
        if (route.length >= 2 && route[route.length - 2] === best.id) {
          route.pop();
          return;
        }
        if (route.includes(best.id)) {
          return;
        }
        route.push(best.id);
      }

      function nearestCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: clamp((event.clientX - rect.left) * scaleX, 0, VIEW.width),
          y: clamp((event.clientY - rect.top) * scaleY, 0, VIEW.height),
        };
      }

      function onPointerDown(event) {
        canvas.focus();
        if (state.mode === "menu") {
          event.preventDefault();
          startStage();
          return;
        }
        if (state.mode === "failed" || state.mode === "cleared") {
          event.preventDefault();
          startStage();
          return;
        }
        if (state.mode !== "running" || !state.player.currentNode) {
          return;
        }
        event.preventDefault();
        const point = nearestCanvasPoint(event);
        state.drag.active = true;
        state.drag.pointerId = event.pointerId;
        state.drag.route = [state.player.currentNode];
        state.drag.moved = false;
        state.drag.holdNode = SWITCH_IDS.includes(state.player.currentNode) ? state.player.currentNode : null;
        state.drag.holdElapsed = 0;
        state.drag.echoTriggered = false;
        state.drag.startPoint = point;
        state.drag.pointer = point;
        canvas.setPointerCapture?.(event.pointerId);
      }

      function onPointerMove(event) {
        if (!state.drag.active || event.pointerId !== state.drag.pointerId) {
          return;
        }
        const point = nearestCanvasPoint(event);
        state.drag.pointer = point;
        if (!state.drag.moved && pointDistance(point.x, point.y, state.drag.startPoint.x, state.drag.startPoint.y) > 14) {
          state.drag.moved = true;
          state.drag.holdNode = null;
        }
        if (state.drag.moved || state.drag.echoTriggered) {
          extendRoute(point);
        }
      }

      function finishPointerRoute(event) {
        if (!state.drag.active || event.pointerId !== state.drag.pointerId) {
          return;
        }
        if (!state.drag.moved && !state.drag.echoTriggered && state.player.currentNode) {
          extendRoute(state.drag.pointer);
        }
        tryQueueRoute(state.drag.route);
        state.drag.active = false;
        state.drag.pointerId = null;
        state.drag.route = [];
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
          return;
        }
        if (event.key.toLowerCase() === "r") {
          event.preventDefault();
          startStage();
        }
      }

      function updatePlayer(dt) {
        if (!state.player.currentNode && state.player.toNode) {
          const fromNode = getNode(state.player.fromNode);
          const toNode = getNode(state.player.toNode);
          const edge = getEdge(state.player.fromNode, state.player.toNode);
          const totalDistance = distance(fromNode, toNode);
          state.player.progress += (PLAYER_SPEED * dt) / totalDistance;

          if (edge?.type === "bridge" && !gateActive(edge.gate, false)) {
            failStage("thread_broken", META.failCondition);
            return;
          }

          const t = clamp(state.player.progress, 0, 1);
          state.player.x = lerp(fromNode.x, toNode.x, t);
          state.player.y = lerp(fromNode.y, toNode.y, t);

          if (state.player.progress >= 1) {
            state.player.currentNode = state.player.toNode;
            state.player.fromNode = null;
            state.player.toNode = null;
            state.player.edgeId = null;
            state.player.progress = 0;
            const arrived = getNode(state.player.currentNode);
            state.player.x = arrived.x;
            state.player.y = arrived.y;
            if (isNodeCollapsed(arrived.id)) {
              failStage("collapse_line", META.failCondition);
              return;
            }
            if (arrived.type === "core") {
              activateCore(arrived.id);
              if (state.mode !== "running") {
                return;
              }
            }
          }
        }

        if (state.player.currentNode && state.player.queue.length) {
          const nextNodeId = state.player.queue.shift();
          beginMove(nextNodeId);
        }
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;
          state.message = currentObjective();

          for (const gateId of Object.keys(state.echoes)) {
            state.echoes[gateId] = Math.max(0, state.echoes[gateId] - dt);
          }

          if (state.drag.active && state.drag.holdNode && !state.drag.echoTriggered && state.player.currentNode === state.drag.holdNode) {
            state.drag.holdElapsed += dt;
            if (state.drag.holdElapsed >= HOLD_DURATION) {
              state.drag.echoTriggered = true;
              recordEcho(state.drag.holdNode);
            }
          }

          updatePlayer(dt);
          if (state.mode !== "running") {
            updateEffects(dt);
            return;
          }

          if (collapseX() >= state.player.x - 18) {
            failStage("collapse_line", META.failCondition);
          }
        }

        updateEffects(dt);
      }

      function updateEffects(dt) {
        if (state.shake > 0) {
          state.shake = Math.max(0, state.shake - SHAKE_DECAY * dt * 10);
        }
        state.flash = Math.max(0, state.flash - dt * 1.45);
        state.clearPulse = Math.max(0, state.clearPulse - dt * 0.7);

        state.particles = state.particles.filter((particle) => particle.life > 0);
        for (const particle of state.particles) {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
        }

        state.popups = state.popups.filter((popup) => popup.life > 0);
        for (const popup of state.popups) {
          popup.life -= dt * 0.95;
          popup.y -= dt * 26;
        }
      }

      function drawWrappedText(text, x, y, maxWidth, lineHeight, color, font) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.font = font;
        const words = text.split(" ");
        let line = "";
        let cursorY = y;
        for (const word of words) {
          const candidate = line ? `${line} ${word}` : word;
          if (ctx.measureText(candidate).width > maxWidth && line) {
            ctx.fillText(line, x, cursorY);
            line = word;
            cursorY += lineHeight;
          } else {
            line = candidate;
          }
        }
        if (line) {
          ctx.fillText(line, x, cursorY);
          cursorY += lineHeight;
        }
        ctx.restore();
        return cursorY;
      }

      function drawBackground(time) {
        const bg = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        bg.addColorStop(0, "#020817");
        bg.addColorStop(0.58, "#071629");
        bg.addColorStop(1, "#030711");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const hazeA = ctx.createRadialGradient(270, 110, 30, 270, 110, 320);
        hazeA.addColorStop(0, "rgba(45, 212, 191, 0.22)");
        hazeA.addColorStop(1, "rgba(45, 212, 191, 0)");
        ctx.fillStyle = hazeA;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const hazeB = ctx.createRadialGradient(810, 94, 18, 810, 94, 220);
        hazeB.addColorStop(0, "rgba(192, 132, 252, 0.23)");
        hazeB.addColorStop(1, "rgba(192, 132, 252, 0)");
        ctx.fillStyle = hazeB;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.3;
        for (let ring = 0; ring < 7; ring += 1) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(148, 163, 184, ${0.14 - ring * 0.012})`;
          ctx.lineWidth = 1.5;
          ctx.ellipse(
            486,
            272,
            140 + ring * 52,
            70 + ring * 28,
            Math.sin(time * 0.18) * 0.05,
            0,
            Math.PI * 2
          );
          ctx.stroke();
        }
        ctx.restore();

        for (const star of STAR_FIELD) {
          const alpha = 0.24 + (Math.sin(time * star.speed + star.phase) + 1) * 0.18;
          ctx.fillStyle = `rgba(226, 232, 240, ${alpha.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        for (let beam = 0; beam < 3; beam += 1) {
          const alpha = 0.08 + beam * 0.03;
          const offset = Math.sin(time * 0.5 + beam) * 18;
          const beamGrad = ctx.createLinearGradient(0, 0, 0, VIEW.height);
          beamGrad.addColorStop(0, `rgba(56, 189, 248, ${alpha})`);
          beamGrad.addColorStop(1, "rgba(56, 189, 248, 0)");
          ctx.fillStyle = beamGrad;
          ctx.fillRect(150 + beam * 280 + offset, 0, 20, VIEW.height);
        }
        ctx.restore();
      }

      function drawCollapseLine(time) {
        const x = collapseX();
        if (x <= -40) {
          return;
        }
        const glow = ctx.createLinearGradient(x - 44, 0, x + 22, 0);
        glow.addColorStop(0, "rgba(251, 113, 133, 0)");
        glow.addColorStop(0.58, "rgba(251, 113, 133, 0.14)");
        glow.addColorStop(1, "rgba(252, 165, 165, 0.82)");
        ctx.fillStyle = glow;
        ctx.fillRect(x - 52, 0, 74, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.28;
        ctx.fillStyle = "rgba(15, 23, 42, 0.52)";
        ctx.fillRect(0, 0, Math.max(0, x - 8), VIEW.height);
        ctx.restore();

        ctx.strokeStyle = "rgba(255, 214, 222, 0.96)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        for (let y = 0; y <= VIEW.height; y += 24) {
          ctx.lineTo(x + Math.sin(time * 11 + y * 0.08) * 8, y);
        }
        ctx.stroke();
      }

      function drawEdge(edge, time) {
        const from = getNode(edge.a);
        const to = getNode(edge.b);
        const active = edge.type === "bridge" ? gateActive(edge.gate, false) : true;
        const collapsed = isNodeCollapsed(edge.a) || isNodeCollapsed(edge.b);

        ctx.save();
        ctx.lineCap = "round";
        if (edge.type === "bridge") {
          ctx.setLineDash(active ? [] : [12, 10]);
          ctx.strokeStyle = active
            ? `rgba(103, 232, 249, ${0.52 + Math.sin(time * 10 + from.x) * 0.08})`
            : "rgba(248, 113, 113, 0.28)";
          ctx.shadowBlur = active ? 18 : 0;
          ctx.shadowColor = active ? "#67e8f9" : "transparent";
          ctx.lineWidth = active ? 7 : 4;
        } else {
          ctx.strokeStyle = collapsed ? "rgba(71, 85, 105, 0.4)" : "rgba(148, 163, 184, 0.42)";
          ctx.lineWidth = 3;
        }
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
        ctx.restore();
      }

      function drawThreads() {
        ctx.save();
        ctx.lineCap = "round";
        ctx.strokeStyle = "rgba(250, 245, 255, 0.16)";
        ctx.lineWidth = 8;
        for (const edgeId of state.wovenEdges) {
          const edge = EDGES.find((candidate) => candidate.id === edgeId);
          if (!edge) continue;
          const from = getNode(edge.a);
          const to = getNode(edge.b);
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(to.x, to.y);
          ctx.stroke();
        }
        if (state.player.edgeId) {
          const edge = EDGES.find((candidate) => candidate.id === state.player.edgeId);
          if (edge) {
            const from = getNode(edge.a);
            const to = { x: state.player.x, y: state.player.y };
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
            ctx.stroke();
          }
        }
        ctx.restore();
      }

      function drawNode(node, time) {
        const collapsed = isNodeCollapsed(node.id);
        const activeCore = node.type === "core" && state.activatedCores.has(node.id);
        const isSwitch = node.type === "switch";
        const gateId = node.gate;
        const activeGate = gateId ? gateActive(gateId, true) : false;
        const outerRadius = node.type === "core" ? 20 : isSwitch ? 18 : 14;
        const pulse = 1 + Math.sin(time * 4 + node.x * 0.02) * 0.04;

        ctx.save();
        ctx.translate(node.x, node.y);
        if (!collapsed) {
          const halo = ctx.createRadialGradient(0, 0, 0, 0, 0, outerRadius * 2.9);
          halo.addColorStop(0, `${node.accent}55`);
          halo.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(0, 0, outerRadius * 2.7 * pulse, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.beginPath();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = collapsed ? "rgba(100, 116, 139, 0.5)" : "rgba(255,255,255,0.58)";
        if (node.type === "core") {
          for (let index = 0; index < 6; index += 1) {
            const angle = (-Math.PI / 2) + (Math.PI * 2 * index) / 6;
            const radius = index % 2 === 0 ? outerRadius : outerRadius * 0.52;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            if (index === 0) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }
          ctx.closePath();
        } else {
          ctx.arc(0, 0, outerRadius, 0, Math.PI * 2);
        }
        ctx.fillStyle = collapsed
          ? "rgba(30, 41, 59, 0.88)"
          : activeCore
            ? node.accent
            : isSwitch && activeGate
              ? "rgba(103, 232, 249, 0.9)"
              : "rgba(15, 23, 42, 0.88)";
        ctx.fill();
        ctx.stroke();

        if (isSwitch && !collapsed) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(103, 232, 249, ${0.18 + (activeGate ? 0.5 : 0.16)})`;
          ctx.lineWidth = 5;
          const ratio = clamp(state.echoes[gateId] / ECHO_DURATION, 0, 1);
          ctx.arc(0, 0, outerRadius + 8, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * Math.max(ratio, 0.04));
          ctx.stroke();
        }

        ctx.fillStyle = "rgba(241, 245, 249, 0.92)";
        ctx.font = `700 ${node.type === "core" ? 11 : 12}px Trebuchet MS`;
        ctx.textAlign = "center";
        ctx.fillText(node.label, 0, outerRadius + 20);
        ctx.restore();
      }

      function drawPlayer(time) {
        ctx.save();
        ctx.translate(state.player.x, state.player.y);
        const spin = time * 4.8;

        ctx.shadowBlur = 22;
        ctx.shadowColor = "#e879f9";
        ctx.fillStyle = "rgba(251, 207, 232, 0.96)";
        ctx.beginPath();
        for (let index = 0; index < 4; index += 1) {
          const angle = spin + Math.PI / 4 + (Math.PI * index) / 2;
          const radius = index % 2 === 0 ? 14 : 8;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (index === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();
      }

      function drawPreviewRoute() {
        if (!state.drag.active || state.drag.route.length < 2) {
          return;
        }
        ctx.save();
        ctx.lineCap = "round";
        ctx.strokeStyle = "rgba(253, 224, 71, 0.92)";
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#fde047";
        ctx.lineWidth = 5;
        ctx.beginPath();
        const first = getNode(state.drag.route[0]);
        ctx.moveTo(first.x, first.y);
        for (let index = 1; index < state.drag.route.length; index += 1) {
          const node = getNode(state.drag.route[index]);
          ctx.lineTo(node.x, node.y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = particle.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          if (!particle.color.startsWith("rgb")) {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = alpha;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawPopups() {
        ctx.save();
        ctx.textAlign = "center";
        for (const popup of state.popups) {
          const alpha = clamp(popup.life, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.globalAlpha = alpha;
          ctx.font = "700 16px Trebuchet MS";
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.restore();
        ctx.globalAlpha = 1;
      }

      function drawHud() {
        ctx.save();
        roundRect(18, 18, 350, 94, 22);
        ctx.fillStyle = "rgba(2, 6, 23, 0.68)";
        ctx.fill();
        ctx.strokeStyle = "rgba(103, 232, 249, 0.22)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.fillStyle = "rgba(207, 250, 254, 0.96)";
        ctx.font = "700 17px Trebuchet MS";
        ctx.fillText(META.title, 34, 43);
        ctx.fillStyle = "rgba(191, 219, 254, 0.82)";
        ctx.font = "600 13px Trebuchet MS";
        ctx.fillText(`문양 ${state.activatedCores.size}/${CORE_IDS.length}`, 34, 66);
        ctx.fillText(`붕괴선 x ${Math.max(0, Math.round(collapseX()))}`, 34, 86);
        ctx.fillStyle = "rgba(226, 232, 240, 0.88)";
        ctx.fillText(state.message, 150, 66);

        roundRect(692, 18, 250, 114, 22);
        ctx.fillStyle = "rgba(2, 6, 23, 0.68)";
        ctx.fill();
        ctx.strokeStyle = "rgba(251, 191, 36, 0.22)";
        ctx.stroke();

        ctx.fillStyle = "rgba(254, 249, 195, 0.96)";
        ctx.font = "700 15px Trebuchet MS";
        ctx.fillText("Echo Loom", 708, 43);
        let rowY = 68;
        for (const [gateId, gate] of Object.entries(GATES)) {
          const timeLeft = state.echoes[gateId];
          const ratio = clamp(timeLeft / ECHO_DURATION, 0, 1);
          ctx.fillStyle = "rgba(226, 232, 240, 0.78)";
          ctx.font = "600 12px Trebuchet MS";
          ctx.fillText(`${gate.label}`, 708, rowY);
          roundRect(788, rowY - 12, 120, 12, 6);
          ctx.fillStyle = "rgba(30, 41, 59, 0.9)";
          ctx.fill();
          roundRect(788, rowY - 12, 120 * ratio, 12, 6);
          ctx.fillStyle = ratio > 0 ? "rgba(103, 232, 249, 0.92)" : "rgba(71, 85, 105, 0.6)";
          ctx.fill();
          ctx.fillStyle = "rgba(250, 250, 250, 0.86)";
          ctx.fillText(timeLeft > 0 ? `${timeLeft.toFixed(1)}s` : "대기", 914, rowY);
          rowY += 24;
        }
        ctx.restore();
      }

      function drawOverlay(title, accent, subtitle, lines) {
        ctx.save();
        ctx.fillStyle = "rgba(2, 6, 23, 0.68)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        roundRect(118, 74, 724, 392, 34);
        ctx.fillStyle = "rgba(3, 7, 18, 0.82)";
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        ctx.stroke();

        const glow = ctx.createLinearGradient(118, 74, 842, 466);
        glow.addColorStop(0, `${accent}22`);
        glow.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = glow;
        ctx.fill();

        ctx.fillStyle = "#f8fafc";
        ctx.textAlign = "center";
        ctx.font = "700 44px Trebuchet MS";
        ctx.fillText(title, VIEW.width / 2, 156);
        ctx.fillStyle = accent;
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText(subtitle, VIEW.width / 2, 194);

        ctx.textAlign = "left";
        let cursorY = 242;
        for (const line of lines) {
          cursorY = drawWrappedText(line, 168, cursorY, 624, 28, "rgba(226, 232, 240, 0.94)", "600 19px Trebuchet MS");
          cursorY += 8;
        }
        ctx.restore();
      }

      function renderMenu() {
        drawOverlay(
          META.title,
          "#67e8f9",
          "3초 잔상으로 스위치와 길을 동시에 열고, 붕괴선보다 앞서 실을 짜는 퍼즐 액션",
          [
            META.controls,
            META.clearCondition,
            META.failCondition,
            "플레이 팁: 각 S 노드에서 눌러 잔상을 만든 뒤 드래그로 다음 노드를 한 번에 이어 달리세요.",
            "Enter 또는 화면 터치로 시작",
          ]
        );
      }

      function renderOutcome() {
        if (state.mode === "failed") {
          drawOverlay(
            "LOOM COLLAPSED",
            "#fb7185",
            state.failureReason,
            [
              META.failCondition,
              `연결한 문양 ${state.activatedCores.size}/${CORE_IDS.length}`,
              `생존 시간 ${state.lastRunTime.toFixed(1)}초`,
              "다시 짜기: Enter 또는 화면 터치",
            ]
          );
        } else if (state.mode === "cleared") {
          drawOverlay(
            "ECHO COMPLETE",
            "#fde047",
            META.clearCondition,
            [
              `모든 문양을 ${state.lastRunTime.toFixed(1)}초 만에 연결했습니다.`,
              "잔상과 붕괴선 타이밍이 모두 맞물렸습니다.",
              "다시 플레이: Enter 또는 화면 터치",
            ]
          );
        }
      }

      function render() {
        const time = state.elapsed;
        ctx.save();
        if (state.shake > 0) {
          ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
        }

        drawBackground(time);
        drawThreads();
        for (const edge of EDGES) {
          drawEdge(edge, time);
        }

        drawCollapseLine(time);
        drawPreviewRoute();
        for (const node of NODES) {
          drawNode(node, time);
        }
        drawPlayer(time);
        drawParticles();
        drawPopups();
        drawHud();

        if (state.drag.active && state.drag.holdNode && !state.drag.echoTriggered) {
          const progress = clamp(state.drag.holdElapsed / HOLD_DURATION, 0, 1);
          const node = getNode(state.drag.holdNode);
          ctx.save();
          ctx.strokeStyle = "rgba(253, 224, 71, 0.95)";
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.arc(node.x, node.y, 30, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255, 255, 255, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        if (state.mode === "menu") {
          renderMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          renderOutcome();
        }

        ctx.restore();
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "960x540 origin top-left, collapse line moves left to right",
          mode: state.mode,
          elapsed: Number(state.elapsed.toFixed(2)),
          result: window.relayStageResult.status,
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            current_node: state.player.currentNode,
            moving_to: state.player.toNode,
            queue: [...state.player.queue],
          },
          collapse: {
            x: Number(collapseX().toFixed(1)),
            distance_to_goal: Number((getNode("core4").x - collapseX()).toFixed(1)),
          },
          echoes: Object.entries(state.echoes).map(([gateId, remaining]) => ({
            gate: gateId,
            remaining: Number(remaining.toFixed(2)),
          })),
          cores: CORE_IDS.map((id) => ({
            id,
            active: state.activatedCores.has(id),
            collapsed: isNodeCollapsed(id),
          })),
          objective: currentObjective(),
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        creator: META.creator,
        genre: META.genre,
        clearCondition: META.clearCondition,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.activatedCores = new Set(CORE_IDS);
          state.wovenEdges = new Set(EDGES.map((edge) => edge.id));
          state.player.currentNode = "core4";
          state.player.x = getNode("core4").x;
          state.player.y = getNode("core4").y;
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail", META.failCondition);
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown, { passive: false });
      canvas.addEventListener("pointermove", onPointerMove, { passive: true });
      canvas.addEventListener("pointerup", finishPointerRoute, { passive: true });
      canvas.addEventListener("pointercancel", finishPointerRoute, { passive: true });
      canvas.addEventListener("touchstart", (event) => {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          event.preventDefault();
        }
      }, { passive: false });

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => window.cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
