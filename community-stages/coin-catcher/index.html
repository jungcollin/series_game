<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Coin Catcher</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
        object-fit: contain;
        background: #0f172a;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">Coin Catcher. 캔버스를 터치하거나 Enter로 시작하세요. Arrow keys or A/D to move (mobile: on-screen left/right buttons). 코인 20개를 모으면 클리어, 폭탄을 받거나 30초가 지나면 실패합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="Coin Catcher" aria-describedby="stage-instructions" tabindex="0"></canvas>

    <div class="mobile-controls">
      <div class="mobile-controls__row">
        <button class="mobile-btn" id="btn-left" aria-label="Move left">◀</button>
        <button class="mobile-btn" id="btn-right" aria-label="Move right">▶</button>
      </div>
    </div>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: 960, height: 540 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("coin-catcher") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const BASKET_W = 70;
      const BASKET_H = 50;
      const ITEM_R = 16;
      const COINS_TO_WIN = 20;
      const TIME_LIMIT = 30;
      const PLAYER_SPEED = 450;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "Catch falling coins with your basket while avoiding bombs",
        basket: { x: VIEW.width / 2, w: BASKET_W, h: BASKET_H },
        items: [],
        coinsCollected: 0,
        spawnTimer: 0,
        failReason: "",
        keys: { ArrowLeft: false, ArrowRight: false, a: false, d: false },
        particles: [],
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number((state.mode === "running" ? state.elapsed : state.lastRunTime).toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number((state.mode === "running" ? state.elapsed : state.lastRunTime).toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.basket.x = VIEW.width / 2;
        state.items = [];
        state.coinsCollected = 0;
        state.spawnTimer = 0;
        state.failReason = "";
        state.particles = [];
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.failReason = reason;
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 60 + Math.random() * 120;
          state.particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 50,
            life: 0.4 + Math.random() * 0.3,
            r: 2 + Math.random() * 3,
            color,
          });
        }
      }

      function spawnItem() {
        const bombChance = Math.min(0.35, 0.15 + state.elapsed * 0.006);
        const isBomb = Math.random() < bombChance;
        state.items.push({
          x: ITEM_R + Math.random() * (VIEW.width - ITEM_R * 2),
          y: -ITEM_R,
          vy: 150 + Math.random() * 100 + state.elapsed * 4,
          type: isBomb ? "bomb" : "coin",
          angle: 0,
        });
      }

      function update(dt) {
        // Update particles in all modes
        for (let i = state.particles.length - 1; i >= 0; i--) {
          const p = state.particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 200 * dt;
          p.life -= dt;
          if (p.life <= 0) state.particles.splice(i, 1);
        }

        if (state.mode !== "running") return;

        state.elapsed += dt;

        // Time limit check
        if (state.elapsed >= TIME_LIMIT) {
          failStage("time_up");
          return;
        }

        // Move basket
        let dir = 0;
        if (state.keys.ArrowLeft || state.keys.a) dir -= 1;
        if (state.keys.ArrowRight || state.keys.d) dir += 1;
        state.basket.x += dir * PLAYER_SPEED * dt;
        state.basket.x = Math.max(state.basket.w / 2, Math.min(VIEW.width - state.basket.w / 2, state.basket.x));

        // Spawn items
        state.spawnTimer += dt;
        const spawnInterval = Math.max(0.3, 0.7 - state.elapsed * 0.012);
        if (state.spawnTimer >= spawnInterval) {
          state.spawnTimer = 0;
          spawnItem();
        }

        // Update items
        const basketTop = VIEW.height - 20 - state.basket.h;
        const basketBottom = VIEW.height - 20;
        const basketLeft = state.basket.x - state.basket.w / 2;
        const basketRight = state.basket.x + state.basket.w / 2;

        for (let i = state.items.length - 1; i >= 0; i--) {
          const item = state.items[i];
          item.y += item.vy * dt;
          item.angle += 3 * dt;

          // Check collision with basket
          if (
            item.y + ITEM_R > basketTop &&
            item.y - ITEM_R < basketBottom &&
            item.x + ITEM_R > basketLeft &&
            item.x - ITEM_R < basketRight
          ) {
            if (item.type === "bomb") {
              spawnParticles(item.x, item.y, "#ef4444", 12);
              state.items.splice(i, 1);
              failStage("caught_bomb");
              return;
            } else {
              state.coinsCollected++;
              spawnParticles(item.x, item.y, "#fbbf24", 8);
              state.items.splice(i, 1);
              if (state.coinsCollected >= COINS_TO_WIN) {
                clearStage();
                return;
              }
              continue;
            }
          }

          // Remove off-screen items
          if (item.y > VIEW.height + 40) {
            state.items.splice(i, 1);
          }
        }
      }

      function drawTextShadow(text, x, y, font, color) {
        ctx.font = font;
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillText(text, x + 2, y + 2);
        ctx.fillStyle = color;
        ctx.fillText(text, x, y);
      }

      function drawCoin(x, y, r) {
        ctx.fillStyle = "#fbbf24";
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f59e0b";
        ctx.beginPath();
        ctx.arc(x, y, r * 0.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fbbf24";
        ctx.font = `800 ${r}px Trebuchet MS`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("$", x, y + 1);
        ctx.textBaseline = "alphabetic";
      }

      function drawBomb(x, y, r) {
        ctx.fillStyle = "#1e293b";
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#475569";
        ctx.beginPath();
        ctx.arc(x - r * 0.2, y - r * 0.2, r * 0.3, 0, Math.PI * 2);
        ctx.fill();
        // Fuse
        ctx.strokeStyle = "#f97316";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, y - r);
        ctx.quadraticCurveTo(x + 8, y - r - 10, x + 4, y - r - 16);
        ctx.stroke();
        // Spark
        ctx.fillStyle = "#fbbf24";
        ctx.beginPath();
        ctx.arc(x + 4, y - r - 16, 3, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawBasket(x, y, w, h) {
        const left = x - w / 2;
        // Basket body
        ctx.fillStyle = "#92400e";
        ctx.beginPath();
        ctx.moveTo(left + 6, y);
        ctx.lineTo(left - 2, y + h);
        ctx.lineTo(left + w + 2, y + h);
        ctx.lineTo(left + w - 6, y);
        ctx.closePath();
        ctx.fill();
        // Basket stripes
        ctx.strokeStyle = "#78350f";
        ctx.lineWidth = 2;
        for (let i = 1; i < 4; i++) {
          const t = i / 4;
          const ly = y + t * h;
          const lx1 = left + 6 - 8 * t;
          const lx2 = left + w - 6 + 8 * t;
          ctx.beginPath();
          ctx.moveTo(lx1, ly);
          ctx.lineTo(lx2, ly);
          ctx.stroke();
        }
        // Rim
        ctx.fillStyle = "#b45309";
        ctx.fillRect(left + 2, y - 4, w - 4, 8);
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardW = Math.min(704, VIEW.width - 40);
        const cardH = 356;
        const cardX = (VIEW.width - cardW) / 2;
        const cardY = (VIEW.height - cardH) / 2;

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(cardX, cardY, cardW, cardH);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(cardX, cardY, cardW, cardH);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, cardY + 70);

        ctx.fillStyle = "#0f172a";
        const fontSize = cardW < 500 ? 18 : 22;
        ctx.font = `600 ${fontSize}px Trebuchet MS`;
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, cardY + 130 + index * (fontSize + 18));
        });
        ctx.textAlign = "left";
      }

      function renderBackground() {
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        grad.addColorStop(0, "#1e3a5f");
        grad.addColorStop(1, "#0f172a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        // Stars
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        for (let i = 0; i < 30; i++) {
          const sx = (i * 137.5 + 23) % VIEW.width;
          const sy = (i * 97.3 + 11) % (VIEW.height * 0.6);
          ctx.fillRect(sx, sy, 2, 2);
        }

        // Ground
        ctx.fillStyle = "#334155";
        ctx.fillRect(0, VIEW.height - 20, VIEW.width, 20);
      }

      function render() {
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        if (state.mode === "menu") {
          renderCard("Coin Catcher", [
            "Arrow keys or A/D to move (mobile: on-screen left/right buttons)",
            "Clear: Collect 20 coins",
            "Fail: Catch a bomb or time runs out (30s)",
            "화면 터치 또는 Enter로 시작",
          ], "#f97316");
          return;
        }

        // Draw game world for running/failed/cleared
        renderBackground();

        // Draw items
        for (const item of state.items) {
          if (item.type === "coin") {
            drawCoin(item.x, item.y, ITEM_R);
          } else {
            drawBomb(item.x, item.y, ITEM_R);
          }
        }

        // Draw basket
        const basketY = VIEW.height - 20 - state.basket.h;
        drawBasket(state.basket.x, basketY, state.basket.w, state.basket.h);

        // Draw particles
        for (const p of state.particles) {
          ctx.globalAlpha = Math.max(0, p.life / 0.7);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;

        // HUD
        const timeLeft = Math.max(0, TIME_LIMIT - state.elapsed);
        drawTextShadow(`Coins: ${state.coinsCollected} / ${COINS_TO_WIN}`, VIEW.width / 2 - 120, 40, "700 28px Trebuchet MS", "#fbbf24");
        drawTextShadow(`Time: ${timeLeft.toFixed(1)}s`, VIEW.width / 2 + 120, 40, "700 28px Trebuchet MS", timeLeft < 10 ? "#ef4444" : "#f8fafc");

        // Coin progress bar
        const barW = 200;
        const barH = 10;
        const barX = VIEW.width / 2 - barW / 2;
        const barY = 54;
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = "#fbbf24";
        ctx.fillRect(barX, barY, barW * Math.min(1, state.coinsCollected / COINS_TO_WIN), barH);

        if (state.mode === "failed") {
          const reason = state.failReason === "caught_bomb" ? "You caught a bomb!" : "Time ran out!";
          renderCard("Failed", [
            reason,
            `Coins collected: ${state.coinsCollected} / ${COINS_TO_WIN}`,
            `Time: ${state.lastRunTime.toFixed(1)}s`,
            "Touch or Enter to retry",
          ], "#b91c1c");
        }

        if (state.mode === "cleared") {
          renderCard("Cleared!", [
            `All ${COINS_TO_WIN} coins collected!`,
            `Time: ${state.lastRunTime.toFixed(1)}s`,
            "Great job!",
          ], "#15803d");
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "canvas 960x540",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          coinsCollected: state.coinsCollected,
          coinsNeeded: COINS_TO_WIN,
          timeLeft: Math.round(Math.max(0, TIME_LIMIT - state.elapsed) * 10) / 10,
          basketX: Math.round(state.basket.x),
          itemCount: state.items.length,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            event.preventDefault();
            startStage();
          }
        }
        if (event.key in state.keys) {
          state.keys[event.key] = true;
          event.preventDefault();
        }
        if (event.key === "A") state.keys.a = true;
        if (event.key === "D") state.keys.d = true;
      }

      function onKeyUp(event) {
        if (event.key in state.keys) {
          state.keys[event.key] = false;
          event.preventDefault();
        }
        if (event.key === "A") state.keys.a = false;
        if (event.key === "D") state.keys.d = false;
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) return;
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      // Mobile buttons
      bindHoldButton(
        document.getElementById("btn-left"),
        () => { state.keys.ArrowLeft = true; },
        () => { state.keys.ArrowLeft = false; }
      );
      bindHoldButton(
        document.getElementById("btn-right"),
        () => { state.keys.ArrowRight = true; },
        () => { state.keys.ArrowRight = false; }
      );

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "coin-catcher",
        title: "Coin Catcher",
        creator: "Claude",
        genre: "Arcade",
        clearCondition: "Collect 20 coins",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.coinsCollected = COINS_TO_WIN;
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }, { passive: false });
      canvas.addEventListener("pointerdown", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
