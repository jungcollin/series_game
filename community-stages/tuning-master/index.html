<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>조율사</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #FFF8E7; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(212, 167, 106, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(90, 60, 30, 0.92);
        color: #FFF8E7; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #FFF8E7; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(212, 167, 106, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">조율사. 탭으로 바늘이 초록 영역에 있을 때 맞추기. 8개 현을 정확히 조율하면 클리어. 실패 3회 시 게임 오버.</p>
    <canvas id="game" width="960" height="540" aria-label="조율사" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "tuning-master",
        title: "조율사",
        description: "흔들리는 조율 바늘을 정확히 맞춰 악기를 조율하세요",
        creator: "jungcollin",
        genre: "Precision timing",
        clearCondition: "8개 현을 정확히 조율하면 클리어",
        failCondition: "실패 3회 시 게임 오버",
        controls: "탭으로 바늘이 초록 영역에 있을 때 맞추기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#FFF8E7", wood: "#D4A76A", woodDark: "#A67C4A",
        woodLight: "#E8C98A", string: "#8B7355", stringHL: "#2E8B8B",
        green: "#3DAA6D", greenLight: "rgba(61,170,109,0.2)",
        red: "#C0392B", text: "#3C2A14", textLight: "rgba(60,42,20,0.5)",
        needle: "#2E8B8B", gold: "#DAA520",
      };

      const TOTAL = 8, MAX_MISS = 3, DURATION = 40;
      const NAMES = ["E2","A2","D3","G3","B3","E4","A4","D5"];

      let mode="menu", elapsed=0, curStr=0, tuned=0, misses=0;
      let lastTimestamp=0, animFrame=0;
      let hostFailedReported=false, hostClearedReported=false;
      let nAngle=0, nSpeed=2.2, nDir=1, sweetCenter=0, sweetW=0.28;
      let canTap=true, tapCD=0;
      let fbType="", fbTimer=0, shake=0, flashA=0, clearAnim=0;
      let particles=[], strVib=[];

      function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
      function lerp(a,b,t){return a+(b-a)*t;}
      function rand(lo,hi){return lo+Math.random()*(hi-lo);}

      function inRelayHost(){try{return window.parent&&window.parent!==window&&window.parent.RelayHost;}catch{return false;}}
      function reportReady(){if(inRelayHost())window.parent.RelayHost.onStageReady?.(window.relayStageMeta);}
      function reportFailed(reason){
        if(!inRelayHost()||hostFailedReported)return;hostFailedReported=true;
        window.parent.RelayHost.onStageFailed?.({stageId:META.id,stageTitle:META.title,reason,durationSec:+elapsed.toFixed(1)});
      }
      function reportCleared(){
        if(!inRelayHost()||hostClearedReported)return;hostClearedReported=true;
        window.parent.RelayHost.onStageCleared?.({stageId:META.id,stageTitle:META.title,clearCountAfter:relayContext.clearCount+1,durationSec:+elapsed.toFixed(1)});
      }

      function spawnP(x,y,n,col,sr){
        for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(50,150);
        particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color:col,size:rand(sr[0],sr[1])});}
      }

      function setupStr(idx){
        curStr=idx; nAngle=rand(-0.8,0.8); nDir=Math.random()>0.5?1:-1;
        nSpeed=2.2+idx*0.35; sweetW=lerp(0.30,0.16,idx/(TOTAL-1));
        sweetCenter=rand(-0.5,0.5); canTap=true; tapCD=0; strVib=[];
        for(let i=0;i<20;i++)strVib.push({ph:rand(0,Math.PI*2),amp:0,fr:rand(3,8)});
      }

      function reset(){
        elapsed=0;tuned=0;misses=0;shake=0;flashA=0;clearAnim=0;
        fbType="";fbTimer=0;particles=[];
        hostFailedReported=false;hostClearedReported=false;
        window.relayStageResult.status="running"; setupStr(0);
      }

      function handleTap(){
        if(mode!=="running"||!canTap)return;
        const d=Math.abs(nAngle-sweetCenter),half=sweetW/2;
        if(d<half*0.4){
          fbType="perfect";tuned++;canTap=false;tapCD=0.6;
          spawnP(CX,CY-40,reducedMotion?4:12,COL.gold,[3,6]);
          for(const s of strVib)s.amp=rand(3,8);
        }else if(d<half){
          fbType="good";tuned++;canTap=false;tapCD=0.6;
          spawnP(CX,CY-40,reducedMotion?3:8,COL.green,[2,5]);
          for(const s of strVib)s.amp=rand(2,5);
        }else{
          fbType="miss";misses++;canTap=false;tapCD=0.8;
          shake=6;flashA=0.3;
          spawnP(CX,CY-40,reducedMotion?2:6,COL.red,[2,4]);
        }
        fbTimer=0.8;
      }

      function update(dt){
        if(mode!=="running"&&mode!=="clear")return;
        if(mode==="clear"){clearAnim=clamp(clearAnim+dt*1.5,0,1);updP(dt);return;}
        elapsed+=dt;
        nAngle+=nDir*nSpeed*dt;
        if(nAngle>1){nAngle=1;nDir=-1;}
        if(nAngle<-1){nAngle=-1;nDir=1;}
        if(!canTap){
          tapCD-=dt;
          if(tapCD<=0){
            canTap=true;
            if(fbType==="perfect"||fbType==="good"){
              if(tuned>=TOTAL){mode="clear";clearAnim=0;window.relayStageResult.status="cleared";reportCleared();spawnP(CX,CY,reducedMotion?6:20,COL.gold,[3,8]);}
              else setupStr(tuned);
            }else if(misses>=MAX_MISS){mode="failed";window.relayStageResult.status="failed";reportFailed("실패 3회");}
          }
        }
        if(fbTimer>0)fbTimer-=dt;
        shake*=0.88;if(shake<0.3)shake=0;flashA*=0.92;
        for(const s of strVib){s.amp*=0.96;s.ph+=s.fr*dt;}
        updP(dt);
        if(elapsed>=DURATION&&tuned<TOTAL){mode="failed";window.relayStageResult.status="failed";reportFailed("시간 초과");}
      }

      function updP(dt){
        for(let i=particles.length-1;i>=0;i--){
          const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=120*dt;p.life-=dt*2;
          if(p.life<=0)particles.splice(i,1);
        }
      }

      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0,sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);
        ctx.fillStyle=COL.bg;ctx.fillRect(0,0,W,H);
        drawBody();
        if(mode==="running"){drawGauge();drawHUD();drawFB();}
        drawParts();
        if(flashA>0.01){ctx.fillStyle=`rgba(192,57,43,${flashA})`;ctx.fillRect(0,0,W,H);}
        ctx.restore();
        if(mode==="menu")drawMenu();
        else if(mode==="clear")drawClear();
        else if(mode==="failed")drawFailed();
      }

      function drawBody(){
        const bx=CX-200,by=80,bw=400,bh=380;
        ctx.fillStyle="rgba(60,42,20,0.08)";ctx.beginPath();rr(ctx,bx+4,by+4,bw,bh,20);ctx.fill();
        const g=ctx.createLinearGradient(bx,by,bx+bw,by+bh);
        g.addColorStop(0,"#E8C98A");g.addColorStop(0.5,"#D4A76A");g.addColorStop(1,"#C09050");
        ctx.fillStyle=g;ctx.beginPath();rr(ctx,bx,by,bw,bh,20);ctx.fill();
        ctx.beginPath();ctx.arc(CX,CY+60,45,0,Math.PI*2);ctx.fillStyle="rgba(60,42,20,0.35)";ctx.fill();
        ctx.beginPath();ctx.arc(CX,CY+60,52,0,Math.PI*2);ctx.strokeStyle="rgba(166,124,74,0.4)";ctx.lineWidth=3;ctx.stroke();
        for(let i=0;i<TOTAL;i++){
          const x=CX-70+i*20,isCur=mode==="running"&&i===curStr,isTuned=i<tuned;
          ctx.beginPath();
          if(isCur&&strVib.length>0){
            ctx.moveTo(x,by+20);
            for(let j=0;j<20;j++){const t=j/19,sy2=by+20+t*(bh-40);
            const va=strVib[j]?strVib[j].amp*Math.sin(strVib[j].ph)*Math.sin(t*Math.PI):0;
            ctx.lineTo(x+va,sy2);}
          }else{ctx.moveTo(x,by+20);ctx.lineTo(x,by+bh-20);}
          ctx.strokeStyle=isTuned?COL.green:isCur?COL.stringHL:COL.string;
          ctx.lineWidth=isCur?2.5:isTuned?2:1.5;ctx.stroke();
          ctx.beginPath();ctx.arc(x,by+10,4,0,Math.PI*2);
          ctx.fillStyle=isTuned?COL.green:COL.woodDark;ctx.fill();
        }
      }

      function drawGauge(){
        const gy=30,gw=360,gh=36,gx=CX-gw/2;
        ctx.fillStyle="rgba(60,42,20,0.08)";ctx.beginPath();rr(ctx,gx,gy,gw,gh,8);ctx.fill();
        const sl=(sweetCenter-sweetW/2+1)/2,sr2=(sweetCenter+sweetW/2+1)/2;
        const sx2=gx+sl*gw,sw2=(sr2-sl)*gw;
        ctx.fillStyle=COL.greenLight;ctx.fillRect(sx2,gy,sw2,gh);
        ctx.strokeStyle=COL.green;ctx.lineWidth=2;ctx.strokeRect(sx2,gy,sw2,gh);
        const pl=(sweetCenter-sweetW*0.2+1)/2,pr=(sweetCenter+sweetW*0.2+1)/2;
        ctx.fillStyle="rgba(218,165,32,0.25)";ctx.fillRect(gx+pl*gw,gy,(pr-pl)*gw,gh);
        const nx=gx+(nAngle+1)/2*gw;
        ctx.beginPath();ctx.moveTo(nx,gy-4);ctx.lineTo(nx-6,gy-14);ctx.lineTo(nx+6,gy-14);ctx.closePath();
        ctx.fillStyle=canTap?COL.needle:COL.textLight;ctx.fill();
        ctx.beginPath();ctx.moveTo(nx,gy);ctx.lineTo(nx,gy+gh);
        ctx.strokeStyle=canTap?COL.needle:COL.textLight;ctx.lineWidth=3;ctx.stroke();
        ctx.fillStyle=COL.text;ctx.font="bold 14px 'Segoe UI',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(NAMES[curStr],CX,gy+gh+6);
      }

      function drawHUD(){
        ctx.fillStyle=COL.text;ctx.font="600 15px 'Segoe UI',sans-serif";
        ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText(`조율: ${tuned}/${TOTAL}`,24,10);
        ctx.textAlign="right";ctx.fillText(`${Math.ceil(Math.max(0,DURATION-elapsed))}초`,W-24,10);
        for(let i=0;i<MAX_MISS;i++){
          ctx.beginPath();ctx.arc(30+i*22,H-24,6,0,Math.PI*2);
          ctx.fillStyle=i<MAX_MISS-misses?COL.gold:"rgba(60,42,20,0.15)";ctx.fill();
        }
      }

      function drawFB(){
        if(fbTimer<=0)return;
        const a=clamp(fbTimer/0.5,0,1);
        let t="",c="";
        if(fbType==="perfect"){t="완벽!";c=COL.gold;}
        else if(fbType==="good"){t="좋아요!";c=COL.green;}
        else if(fbType==="miss"){t="빗나감!";c=COL.red;}
        ctx.globalAlpha=a;ctx.fillStyle=c;
        ctx.font="bold 28px 'Segoe UI',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.fillText(t,CX,CY-80-(1-a)*20);ctx.globalAlpha=1;
      }

      function drawParts(){
        for(const p of particles){
          ctx.beginPath();ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);
          ctx.fillStyle=p.color;ctx.globalAlpha=clamp(p.life,0,1);ctx.fill();ctx.globalAlpha=1;
        }
      }

      function rr(c,x,y,w,h,r){
        c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
        c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);
        c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
      }

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40),ch=44+lines.length*28+40;
        const cx2=CX-cw/2,cy2=CY-ch/2;
        ctx.fillStyle="rgba(255,248,231,0.96)";ctx.beginPath();rr(ctx,cx2,cy2,cw,ch,10);ctx.fill();
        ctx.fillStyle=accent;ctx.fillRect(cx2+14,cy2,cw-28,3);
        ctx.fillStyle=COL.text;ctx.font="bold 24px 'Segoe UI',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(title,CX,cy2+18);
        ctx.font="400 14px 'Segoe UI',sans-serif";ctx.fillStyle="rgba(60,42,20,0.7)";
        for(let i=0;i<lines.length;i++)ctx.fillText(lines[i],CX,cy2+52+i*28);
        ctx.fillStyle="rgba(60,42,20,0.35)";ctx.font="400 12px 'Segoe UI',sans-serif";
        ctx.fillText("TAP or ENTER",CX,cy2+ch-20);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(255,248,231,0.5)";ctx.fillRect(0,0,W,H);
        drawCard("조율사",["흔들리는 바늘을 정확히 맞춰","악기를 조율하세요","","조작: 화면 터치 또는 탭","클리어: 8개 현 조율 완료","실패: 3번 빗나가면 게임 오버"],COL.wood);
      }

      function drawClear(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(255,248,231,${clearAnim*0.5})`;ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3)drawCard("조율 완료!",[`${Math.ceil(elapsed)}초 만에 완료`,"완벽한 연주를 위한 준비 끝"],COL.gold);
      }

      function drawFailed(){
        ctx.fillStyle="rgba(60,30,20,0.25)";ctx.fillRect(0,0,W,H);
        drawCard("조율 실패",[elapsed>=DURATION?"시간이 다했습니다":`${misses}번 빗나갔습니다`,`조율: ${tuned}/${TOTAL}`],COL.red);
      }

      function handleStart(){if(mode==="menu"||mode==="clear"||mode==="failed"){reset();mode="running";}}

      canvas.addEventListener("pointerdown",(e)=>{e.preventDefault();if(mode!=="running"){handleStart();return;}handleTap();});
      canvas.addEventListener("keydown",(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();if(mode!=="running"){handleStart();return;}handleTap();}});

      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){lastTimestamp=ts;return;}
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT);lastTimestamp=ts;
        let steps=0;
        while(dt>=FIXED_DT&&steps<4){update(FIXED_DT);dt-=FIXED_DT;steps++;}
        if(dt>0&&steps<4)update(dt);draw();
      }

      function renderGameToText(){
        return JSON.stringify({mode,elapsed:+elapsed.toFixed(1),tuned,misses,currentString:curStr,needleAngle:+nAngle.toFixed(2),result:window.relayStageResult.status});
      }

      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{const s=Math.max(1,Math.round(ms/(FIXED_DT*1000)));for(let i=0;i<s;i++)update(FIXED_DT);draw();return renderGameToText();};
      window.relayStageDebug={
        forceClear(){reset();mode="running";tuned=TOTAL;mode="clear";clearAnim=0;window.relayStageResult.status="cleared";reportCleared();draw();},
        forceFail(){reset();mode="running";misses=MAX_MISS;mode="failed";window.relayStageResult.status="failed";reportFailed("debug_force_fail");draw();},
      };

      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
