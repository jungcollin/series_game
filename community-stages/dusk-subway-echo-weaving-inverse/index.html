<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dusk Subway: Echo Loom</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(255, 149, 112, 0.12), transparent 38%),
          linear-gradient(180deg, #120d1f 0%, #1c1430 40%, #090813 100%);
        font-family: "Avenir Next", "Segoe UI", "Noto Sans KR", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 188, 156, 0.28);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(17, 14, 28, 0.92);
        color: #fff5ef;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 230, 217, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dusk Subway: Echo Loom. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 이며, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dusk Subway: Echo Loom"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const META_DESCRIPTION =
        "3초 잔상 실로 문과 문양을 함께 열고, 역전 신호의 반대 입력을 버티는 황혼 지하철 퍼즐 액션.";
      const META_CONTROLS =
        "마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const META_CLEAR =
        "역전 구간을 모두 견디고 모든 코어 문양을 연결하면 클리어";
      const META_FAIL =
        "역전 버스트에 연속으로 휘말리거나 잔상 선이 끊기면 즉시 실패";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext =
        window.RelayRuntime?.readContext("dusk-subway-echo-weaving-inverse") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const NODES = {
        hub: { x: 176, y: 270, type: "hub", label: "허브" },
        switchA: { x: 250, y: 118, type: "switch", gate: "A", label: "상단 스위치" },
        topGate: { x: 338, y: 118, type: "gate", gate: "A", label: "A 게이트" },
        topJunction: { x: 426, y: 118, type: "junction", label: "상단 분기" },
        coreA: { x: 528, y: 118, type: "core", core: "A", label: "상단 코어" },
        switchB: { x: 250, y: 422, type: "switch", gate: "B", label: "하단 스위치" },
        bottomGate: { x: 338, y: 422, type: "gate", gate: "B", label: "B 게이트" },
        bottomJunction: { x: 426, y: 422, type: "junction", label: "하단 분기" },
        coreB: { x: 528, y: 422, type: "core", core: "B", label: "하단 코어" },
        centerGate: { x: 338, y: 270, type: "gate", gate: "C", label: "C 게이트" },
        centerJunction: { x: 430, y: 270, type: "junction", label: "중앙 분기" },
        coreC: { x: 662, y: 270, type: "core", core: "C", label: "중앙 코어" },
      };

      const EDGE_DEFS = [
        { id: "hub-switchA", from: "hub", to: "switchA", bidirectional: true },
        { id: "switchA-hub", from: "switchA", to: "hub", bidirectional: false },
        { id: "switchA-topGate", from: "switchA", to: "topGate", bidirectional: false, gate: "A" },
        { id: "topGate-topJunction", from: "topGate", to: "topJunction", bidirectional: false, gate: "A" },
        { id: "topJunction-hub", from: "topJunction", to: "hub", bidirectional: false },
        { id: "topJunction-coreA", from: "topJunction", to: "coreA", bidirectional: true },
        { id: "coreA-topJunction", from: "coreA", to: "topJunction", bidirectional: false },
        { id: "hub-switchB", from: "hub", to: "switchB", bidirectional: true },
        { id: "switchB-hub", from: "switchB", to: "hub", bidirectional: false },
        { id: "switchB-bottomGate", from: "switchB", to: "bottomGate", bidirectional: false, gate: "B" },
        { id: "bottomGate-bottomJunction", from: "bottomGate", to: "bottomJunction", bidirectional: false, gate: "B" },
        { id: "bottomJunction-hub", from: "bottomJunction", to: "hub", bidirectional: false },
        { id: "bottomJunction-coreB", from: "bottomJunction", to: "coreB", bidirectional: true },
        { id: "coreB-bottomJunction", from: "coreB", to: "bottomJunction", bidirectional: false },
        { id: "hub-centerGate", from: "hub", to: "centerGate", bidirectional: false, gate: "C" },
        { id: "centerGate-centerJunction", from: "centerGate", to: "centerJunction", bidirectional: false, gate: "C" },
        { id: "centerJunction-hub", from: "centerJunction", to: "hub", bidirectional: false },
        { id: "centerJunction-coreC", from: "centerJunction", to: "coreC", bidirectional: true, gate: "C" },
        { id: "coreC-centerJunction", from: "coreC", to: "centerJunction", bidirectional: false },
      ];

      const EDGES = [];
      for (const edge of EDGE_DEFS) {
        EDGES.push(edge);
        if (edge.bidirectional) {
          EDGES.push({
            id: `${edge.id}-back`,
            from: edge.to,
            to: edge.from,
            gate: edge.gate,
            bidirectional: false,
          });
        }
      }

      const OUTGOING = {};
      for (const edge of EDGES) {
        if (!OUTGOING[edge.from]) {
          OUTGOING[edge.from] = [];
        }
        OUTGOING[edge.from].push(edge);
      }

      const BURSTS = [
        { warning: 4.6, active: 6.2, end: 7.35, safeNode: "coreA", label: "UP LINK" },
        { warning: 10.2, active: 11.8, end: 12.95, safeNode: "coreB", label: "DOWN LINK" },
        { warning: 15.9, active: 17.6, end: 18.95, safeNode: "coreC", label: "EXIT LINK" },
      ];

      const GATE_DURATION = 3;
      const ECHO_DURATION = 3;
      const MOVE_SPEED = 240;
      const RECORD_SAMPLE_STEP = 0.05;
      const MIN_ECHO_SAMPLES = 8;
      const NODE_RADIUS = 19;
      const SAFE_RADIUS = 38;

      let animationFrame = 0;
      let lastTimestamp = 0;
      let accumulator = 0;
      let lastRenderedAt = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: META_DESCRIPTION,
        playerNode: "hub",
        playerPos: { x: NODES.hub.x, y: NODES.hub.y },
        currentEdge: null,
        queuedNode: null,
        pointer: {
          active: false,
          down: false,
          x: NODES.hub.x,
          y: NODES.hub.y,
        },
        keyboard: {
          up: false,
          down: false,
          left: false,
          right: false,
          record: false,
        },
        record: {
          active: false,
          duration: 0,
          sampleTimer: 0,
          samples: [],
        },
        echo: null,
        gates: {
          A: 0,
          B: 0,
          C: 0,
        },
        cores: {
          A: false,
          B: false,
          C: false,
        },
        particles: [],
        floaters: [],
        trainOffset: 0,
        screenShake: 0,
        flash: 0,
        burst: {
          index: 0,
          phase: "idle",
          hitThisBurst: false,
          consecutiveHits: 0,
          justResolved: false,
        },
      };

      window.relayStageMeta = {
        id: "dusk-subway-echo-weaving-inverse",
        title: "Dusk Subway: Echo Loom",
        description: META_DESCRIPTION,
        creator: {
          name: "jungcollin",
          avatar: null,
          github: "jungcollin",
        },
        genre: "Echo puzzler / 역전 버스트",
        clearCondition: META_CLEAR,
        failCondition: META_FAIL,
        controls: META_CONTROLS,
      };

      window.relayStageResult = {
        status: "running",
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function toCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: clamp((event.clientX - rect.left) * scaleX, 0, canvas.width),
          y: clamp((event.clientY - rect.top) * scaleY, 0, canvas.height),
        };
      }

      function getGateOpen(gateId) {
        if (gateId === "C") {
          return (
            state.gates.C > 0 ||
            (state.cores.A && state.cores.B && state.burst.index >= 2)
          );
        }
        return state.gates[gateId] > 0;
      }

      function getObjectiveText() {
        if (!state.cores.A) {
          return "상단 코어를 먼저 짜 두세요.";
        }
        if (!state.cores.B) {
          return "하단 코어를 열고 두 번째 역전 구간을 넘기세요.";
        }
        if (!state.cores.C) {
          return "중앙 게이트를 열고 마지막 코어를 잇으세요.";
        }
        return "마지막 역전이 끝날 때까지 문양을 유지하세요.";
      }

      function spawnParticles(x, y, options = {}) {
        const count = options.count || 14;
        const baseColor = options.color || "255, 184, 144";
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.3;
          const speed = (options.speed || 80) * (0.55 + Math.random() * 0.9);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.45 + Math.random() * 0.45,
            maxLife: 0.45 + Math.random() * 0.45,
            size: 2 + Math.random() * 4,
            color: baseColor,
          });
        }
      }

      function pushFloater(text, x, y, color = "#ffd7bf") {
        state.floaters.push({
          text,
          x,
          y,
          vy: -34,
          life: 1,
          color,
        });
      }

      function triggerGate(gateId, sourceLabel) {
        state.gates[gateId] = GATE_DURATION;
        state.flash = Math.max(state.flash, 0.08);
        if (sourceLabel === "player") {
          pushFloater(`Gate ${gateId} OPEN`, NODES[`switch${gateId}`]?.x || 240, NODES[`switch${gateId}`]?.y || 270, "#ffd2aa");
        }
      }

      function setPlayerNode(nodeId) {
        state.playerNode = nodeId;
        state.playerPos.x = NODES[nodeId].x;
        state.playerPos.y = NODES[nodeId].y;
      }

      function beginMovement(edge) {
        const fromNode = NODES[edge.from];
        const toNode = NODES[edge.to];
        const length = distance(fromNode, toNode);
        state.currentEdge = {
          edge,
          from: edge.from,
          to: edge.to,
          progress: 0,
          duration: length / MOVE_SPEED,
        };
        state.queuedNode = null;
      }

      function getPointerVector() {
        const origin = state.currentEdge ? state.playerPos : NODES[state.playerNode];
        let dx = state.pointer.x - origin.x;
        let dy = state.pointer.y - origin.y;
        if (state.keyboard.left || state.keyboard.right || state.keyboard.up || state.keyboard.down) {
          dx = (state.keyboard.right ? 1 : 0) - (state.keyboard.left ? 1 : 0);
          dy = (state.keyboard.down ? 1 : 0) - (state.keyboard.up ? 1 : 0);
          const scale = 220;
          dx *= scale;
          dy *= scale;
        }
        if (state.burst.phase === "active") {
          dx *= -1;
          dy *= -1;
        }
        return { dx, dy };
      }

      function chooseNextEdge(nodeId) {
        const edges = OUTGOING[nodeId] || [];
        const vector = getPointerVector();
        const magnitude = Math.hypot(vector.dx, vector.dy);
        if (magnitude < 20) {
          return null;
        }

        let chosen = null;
        let bestDot = 0.32;
        for (const edge of edges) {
          if (edge.gate && !getGateOpen(edge.gate)) {
            continue;
          }
          if (edge.to === state.playerNode && state.currentEdge) {
            continue;
          }
          const target = NODES[edge.to];
          const origin = NODES[edge.from];
          const edgeDx = target.x - origin.x;
          const edgeDy = target.y - origin.y;
          const edgeLength = Math.hypot(edgeDx, edgeDy) || 1;
          const dot = (vector.dx * edgeDx + vector.dy * edgeDy) / (magnitude * edgeLength);
          if (dot > bestDot) {
            bestDot = dot;
            chosen = edge;
          }
        }
        return chosen;
      }

      function updateRecord(dt) {
        const recording = state.pointer.down || state.keyboard.record;
        if (!recording || state.mode !== "running") {
          if (state.record.active) {
            finalizeRecord();
          }
          return;
        }

        if (!state.record.active) {
          state.record.active = true;
          state.record.duration = 0;
          state.record.sampleTimer = 0;
          state.record.samples = [];
        }

        state.record.duration += dt;
        state.record.sampleTimer += dt;
        while (state.record.sampleTimer >= RECORD_SAMPLE_STEP) {
          state.record.sampleTimer -= RECORD_SAMPLE_STEP;
          state.record.samples.push({
            x: state.playerPos.x,
            y: state.playerPos.y,
            node: state.playerNode,
          });
        }
      }

      function finalizeRecord() {
        state.record.active = false;
        if (state.record.samples.length >= MIN_ECHO_SAMPLES) {
          state.echo = {
            samples: state.record.samples.slice(-Math.ceil(ECHO_DURATION / RECORD_SAMPLE_STEP)),
            time: 0,
            pos: {
              x: state.record.samples[0].x,
              y: state.record.samples[0].y,
            },
            triggeredSwitches: {
              A: false,
              B: false,
            },
          };
          pushFloater("잔상 배치", state.playerPos.x + 18, state.playerPos.y - 18, "#ffd4b8");
        }
        state.record.duration = 0;
        state.record.sampleTimer = 0;
        state.record.samples = [];
      }

      function processNodeArrival(nodeId, sourceLabel) {
        const node = NODES[nodeId];
        if (!node) {
          return;
        }
        if (node.type === "switch") {
          triggerGate(node.gate, sourceLabel);
          if (sourceLabel === "player") {
            spawnParticles(node.x, node.y, { color: "255, 194, 144", count: 16, speed: 70 });
          }
          return;
        }
        if (node.type === "core" && sourceLabel === "player" && !state.cores[node.core]) {
          state.cores[node.core] = true;
          state.screenShake = Math.max(state.screenShake, 10);
          spawnParticles(node.x, node.y, { color: "124, 244, 255", count: 24, speed: 110 });
          pushFloater(`CORE ${node.core}`, node.x, node.y - 22, "#9af8ff");
          if (state.cores.A && state.cores.B) {
            state.gates.C = Math.max(state.gates.C, GATE_DURATION);
          }
        }
      }

      function updateEcho(dt) {
        if (!state.echo) {
          return;
        }
        state.echo.time += dt;
        const ratio = clamp(state.echo.time / ECHO_DURATION, 0, 1);
        const scaled = ratio * (state.echo.samples.length - 1);
        const index = Math.floor(scaled);
        const nextIndex = Math.min(state.echo.samples.length - 1, index + 1);
        const sampleA = state.echo.samples[index];
        const sampleB = state.echo.samples[nextIndex];
        const mix = scaled - index;
        state.echo.pos.x = lerp(sampleA.x, sampleB.x, mix);
        state.echo.pos.y = lerp(sampleA.y, sampleB.y, mix);

        for (const gateId of ["A", "B"]) {
          const switchNode = NODES[`switch${gateId}`];
          if (
            switchNode &&
            distance(state.echo.pos, switchNode) < SAFE_RADIUS &&
            !state.echo.triggeredSwitches[gateId]
          ) {
            state.echo.triggeredSwitches[gateId] = true;
            triggerGate(gateId, "echo");
            pushFloater(`ECHO ${gateId}`, switchNode.x, switchNode.y - 16, "#ffd1bf");
          }
        }

        if (state.echo.time >= ECHO_DURATION) {
          state.echo = null;
        }
      }

      function updateMovement(dt) {
        if (state.currentEdge) {
          state.currentEdge.progress += dt / state.currentEdge.duration;
          const progress = clamp(state.currentEdge.progress, 0, 1);
          const fromNode = NODES[state.currentEdge.from];
          const toNode = NODES[state.currentEdge.to];
          const eased = easeOutCubic(progress);
          state.playerPos.x = lerp(fromNode.x, toNode.x, eased);
          state.playerPos.y = lerp(fromNode.y, toNode.y, eased);
          if (progress >= 1) {
            setPlayerNode(state.currentEdge.to);
            processNodeArrival(state.currentEdge.to, "player");
            state.currentEdge = null;
          }
          return;
        }

        const nextEdge = chooseNextEdge(state.playerNode);
        if (nextEdge) {
          beginMovement(nextEdge);
        }
      }

      function updateGateTimers(dt) {
        for (const gateId of ["A", "B", "C"]) {
          if (state.gates[gateId] <= 0) {
            continue;
          }
          state.gates[gateId] = Math.max(0, state.gates[gateId] - dt);
        }

        const activeEdgeGate = state.currentEdge?.edge?.gate;
        if (activeEdgeGate && !getGateOpen(activeEdgeGate)) {
          failStage("thread-snapped");
        }
      }

      function applyBurstHit() {
        state.burst.hitThisBurst = true;
        state.burst.consecutiveHits += 1;
        state.flash = 0.24;
        state.screenShake = 14;
        spawnParticles(state.playerPos.x, state.playerPos.y, { color: "255, 90, 120", count: 22, speed: 130 });
        pushFloater("역전 피격", state.playerPos.x, state.playerPos.y - 18, "#ff96a0");
        if (state.burst.consecutiveHits >= 2) {
          failStage("burst-chain");
        }
      }

      function updateBursts() {
        const current = BURSTS[state.burst.index];
        if (!current || state.mode !== "running") {
          return;
        }

        let phase = "idle";
        if (state.elapsed >= current.warning && state.elapsed < current.active) {
          phase = "warning";
        } else if (state.elapsed >= current.active && state.elapsed < current.end) {
          phase = "active";
        }

        if (phase !== state.burst.phase) {
          if (phase === "warning") {
            state.flash = Math.max(state.flash, 0.08);
            pushFloater("역전 예고", NODES[current.safeNode].x, NODES[current.safeNode].y - 28, "#ffb8a6");
          }
          if (phase === "active") {
            const safeNode = NODES[current.safeNode];
            if (distance(state.playerPos, safeNode) > SAFE_RADIUS) {
              applyBurstHit();
            } else {
              state.burst.consecutiveHits = 0;
              pushFloater("안정 유지", safeNode.x, safeNode.y - 18, "#95ffda");
            }
          }
          if (state.burst.phase === "active" && phase === "idle") {
            state.burst.index += 1;
            state.burst.hitThisBurst = false;
            state.burst.phase = "idle";
            if (state.burst.index >= BURSTS.length && state.cores.C && state.playerNode === "coreC") {
              clearStage();
            }
            return;
          }
          state.burst.phase = phase;
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
            continue;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
        }

        for (let index = state.floaters.length - 1; index >= 0; index -= 1) {
          const floater = state.floaters[index];
          floater.life -= dt * 0.9;
          if (floater.life <= 0) {
            state.floaters.splice(index, 1);
            continue;
          }
          floater.y += floater.vy * dt;
        }

        state.screenShake = Math.max(0, state.screenShake - dt * 28);
        state.flash = Math.max(0, state.flash - dt * 1.4);
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.trainOffset = (state.trainOffset + dt * 108) % 240;
        updateRecord(dt);
        updateEcho(dt);
        updateMovement(dt);
        updateGateTimers(dt);
        updateBursts();
        updateParticles(dt);

        if (
          state.burst.index >= BURSTS.length &&
          state.cores.C &&
          state.playerNode === "coreC" &&
          state.mode === "running"
        ) {
          clearStage();
        }
      }

      function resetState() {
        state.mode = "menu";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.note = META_DESCRIPTION;
        state.playerNode = "hub";
        state.playerPos.x = NODES.hub.x;
        state.playerPos.y = NODES.hub.y;
        state.currentEdge = null;
        state.queuedNode = null;
        state.pointer.active = false;
        state.pointer.down = false;
        state.pointer.x = NODES.hub.x;
        state.pointer.y = NODES.hub.y;
        state.keyboard.up = false;
        state.keyboard.down = false;
        state.keyboard.left = false;
        state.keyboard.right = false;
        state.keyboard.record = false;
        state.record.active = false;
        state.record.duration = 0;
        state.record.sampleTimer = 0;
        state.record.samples = [];
        state.echo = null;
        state.gates.A = 0;
        state.gates.B = 0;
        state.gates.C = 0;
        state.cores.A = false;
        state.cores.B = false;
        state.cores.C = false;
        state.particles.length = 0;
        state.floaters.length = 0;
        state.screenShake = 0;
        state.flash = 0;
        state.burst.index = 0;
        state.burst.phase = "idle";
        state.burst.hitThisBurst = false;
        state.burst.consecutiveHits = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        resetState();
        state.mode = "running";
        state.note = getObjectiveText();
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        state.note =
          reason === "burst-chain"
            ? META_FAIL
            : "문이 닫히며 실이 끊겼습니다. 루트를 다시 짜세요.";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        state.note = META_CLEAR;
        state.flash = 0.18;
        state.screenShake = 8;
        spawnParticles(NODES.coreC.x, NODES.coreC.y, { color: "124, 244, 255", count: 38, speed: 140 });
        reportClearedToHost();
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          updateParticles(dt);
          state.trainOffset = (state.trainOffset + dt * 40) % 240;
        }
      }

      function drawRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

        for (let index = 0; index < 18; index += 1) {

      function drawRoutePanels() {

        drawRoundedRect(42, 42, 280, 456, 30);
        ctx.stroke();

        ctx.stroke();

        ctx.fillStyle = "rgba(255, 236, 214, 0.03)";

      function drawGate(nodeId, gateId, accent) {
        const node = NODES[nodeId];
        const open = getGateOpen(gateId);
        const width = 34;
        const height = gateId === "C" ? 112 : 126;
        const x = node.x - width / 2;
        const y = node.y - height / 2;

        const gateGradient = ctx.createLinearGradient(x, y, x + width, y);
        if (open) {
          gateGradient.addColorStop(0, "rgba(129, 255, 246, 0.12)");
          gateGradient.addColorStop(1, "rgba(112, 255, 224, 0.48)");
        } else {
          gateGradient.addColorStop(0, "rgba(255, 106, 149, 0.24)");
          gateGradient.addColorStop(1, "rgba(255, 77, 93, 0.54)");
        }
        ctx.fillStyle = gateGradient;
        drawRoundedRect(x, y, width, height, 14);
        ctx.fill();

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = open ? "rgba(149, 255, 223, 0.84)" : `rgba(${accent}, 0.84)`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let offset = -height * 0.35; offset <= height * 0.35; offset += 18) {
          ctx.moveTo(x + 6, node.y + offset);
          ctx.lineTo(x + width - 6, node.y + offset + 10);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawNode(nodeId) {
        const node = NODES[nodeId];
        if (!node) {
          return;
        }
        if (node.type === "gate") {
          const accent = node.gate === "A" ? "255, 186, 112" : node.gate === "B" ? "255, 148, 180" : "114, 255, 224";
          drawGate(nodeId, node.gate, accent);
          return;
        }

        const isSafe = BURSTS[state.burst.index]?.safeNode === nodeId;
        const isCoreLit = node.type === "core" && state.cores[node.core];
        const glowColor =
          node.type === "switch"
            ? "255, 194, 146"
            : node.type === "core"
              ? isCoreLit
                ? "126, 246, 255"
                : "136, 194, 255"
              : "255, 226, 204";

        ctx.save();
        ctx.shadowColor = `rgba(${glowColor}, ${isCoreLit || isSafe ? 0.82 : 0.32})`;
        ctx.shadowBlur = isCoreLit || isSafe ? 28 : 14;
        const gradient = ctx.createRadialGradient(node.x, node.y, 2, node.x, node.y, 22);
        gradient.addColorStop(0, `rgba(${glowColor}, 0.95)`);
        gradient.addColorStop(1, `rgba(${glowColor}, 0.1)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.type === "hub" ? 18 : 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = isSafe ? "rgba(255, 168, 152, 0.96)" : "rgba(255, 255, 255, 0.22)";
        ctx.lineWidth = isSafe ? 3 : 2;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.type === "hub" ? 22 : 18, 0, Math.PI * 2);
        ctx.stroke();

        if (node.type === "switch") {
          const remaining = clamp(state.gates[node.gate] / GATE_DURATION, 0, 1);
          ctx.strokeStyle = "rgba(255, 222, 196, 0.9)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(node.x, node.y, 24, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * remaining);
          ctx.stroke();
        }

        if (node.type === "core") {
          ctx.save();
          ctx.translate(node.x, node.y);
          ctx.rotate((state.elapsed * 0.4 + node.x * 0.001) * (reduceMotion ? 0.05 : 1));
          ctx.strokeStyle = isCoreLit ? "rgba(157, 252, 255, 0.95)" : "rgba(194, 214, 255, 0.46)";
          ctx.lineWidth = 2.4;
          ctx.beginPath();
          for (let point = 0; point < 6; point += 1) {
            const angle = (Math.PI * 2 * point) / 6;
            const radius = point % 2 === 0 ? 13 : 7;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            if (point === 0) {
              ctx.moveTo(x, y);
            } else {
              ctx.lineTo(x, y);
            }
          }
          ctx.closePath();
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawConnections() {
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        for (const edge of EDGES) {
          if (edge.from > edge.to) {
            continue;
          }
          const from = NODES[edge.from];
          const to = NODES[edge.to];
          const available = !edge.gate || getGateOpen(edge.gate);
          ctx.strokeStyle = available ? "rgba(116, 225, 255, 0.16)" : "rgba(255, 118, 140, 0.12)";
          ctx.lineWidth = edge.gate ? 7 : 5;
          ctx.beginPath();
          ctx.moveTo(from.x, from.y);
          ctx.lineTo(to.x, to.y);
          ctx.stroke();
        }

        if (state.record.samples.length > 1) {
          ctx.strokeStyle = "rgba(255, 187, 155, 0.42)";
          ctx.lineWidth = 7;
          ctx.beginPath();
          ctx.moveTo(state.record.samples[0].x, state.record.samples[0].y);
          for (let index = 1; index < state.record.samples.length; index += 1) {
            ctx.lineTo(state.record.samples[index].x, state.record.samples[index].y);
          }
          ctx.stroke();
        }

        if (state.echo?.samples?.length > 1) {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = "rgba(255, 218, 198, 0.32)";
          ctx.lineWidth = 8;
          ctx.beginPath();
          ctx.moveTo(state.echo.samples[0].x, state.echo.samples[0].y);
          for (let index = 1; index < state.echo.samples.length; index += 1) {
            ctx.lineTo(state.echo.samples[index].x, state.echo.samples[index].y);
          }
          ctx.stroke();
          ctx.restore();
        }

        ctx.restore();
      }

      function drawBurstOverlay() {
        const current = BURSTS[state.burst.index];
        if (!current) {
          return;
        }
        if (state.burst.phase === "warning" || state.burst.phase === "active") {
          const safeNode = NODES[current.safeNode];
          const pulse = 1 + Math.sin(state.elapsed * 12) * 0.08;
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle =
            state.burst.phase === "active"
              ? "rgba(255, 92, 120, 0.82)"
              : "rgba(255, 176, 128, 0.82)";
          ctx.lineWidth = state.burst.phase === "active" ? 8 : 5;
          ctx.beginPath();
          ctx.arc(safeNode.x, safeNode.y, SAFE_RADIUS * pulse, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();

          const overlayGradient = ctx.createLinearGradient(0, 0, VIEW.width, VIEW.height);
          overlayGradient.addColorStop(
            0,
            state.burst.phase === "active"
              ? "rgba(255, 72, 94, 0.12)"
              : "rgba(255, 177, 121, 0.08)"
          );
          overlayGradient.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = overlayGradient;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function drawPlayer() {
        ctx.save();
        ctx.translate(state.playerPos.x, state.playerPos.y);
        ctx.rotate((state.elapsed * 2.8 + (state.burst.phase === "active" ? Math.PI : 0)) * (reduceMotion ? 0.18 : 1));
        ctx.shadowColor = "rgba(255, 220, 204, 0.8)";
        ctx.shadowBlur = 24;
        const playerGradient = ctx.createLinearGradient(-18, -18, 18, 18);
        playerGradient.addColorStop(0, "#fff3ea");
        playerGradient.addColorStop(1, "#ffaf86");
        ctx.fillStyle = playerGradient;
        ctx.beginPath();
        ctx.moveTo(0, -16);
        ctx.lineTo(14, 0);
        ctx.lineTo(0, 16);
        ctx.lineTo(-14, 0);
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        if (state.echo) {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.shadowColor = "rgba(255, 238, 217, 0.72)";
          ctx.shadowBlur = 18;
          ctx.fillStyle = "rgba(255, 222, 200, 0.84)";
          ctx.beginPath();
          ctx.arc(state.echo.pos.x, state.echo.pos.y, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawParticlesAndFloaters() {
        for (const particle of state.particles) {
          const alpha = particle.life / particle.maxLife;
          ctx.fillStyle = `rgba(${particle.color}, ${alpha})`;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        for (const floater of state.floaters) {
          ctx.globalAlpha = clamp(floater.life, 0, 1);
          ctx.fillStyle = floater.color;
          ctx.font = '700 14px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillText(floater.text, floater.x, floater.y);
          ctx.globalAlpha = 1;
        }
      }

      function drawHud() {

        ctx.fillStyle = "rgba(11, 10, 20, 0.64)";
        drawRoundedRect(24, 18, 318, 98, 24);
        ctx.fill();
        drawRoundedRect(690, 18, 246, 98, 24);

        ctx.font = '600 14px "Avenir Next", "Segoe UI", sans-serif';

          );

        } else {
          ctx.fillText("모든 역전 완료", 914, 68);

        );

          ctx.fillStyle = open ? "rgba(132, 255, 223, 0.94)" : "rgba(255, 114, 140, 0.74)";
          drawRoundedRect(x, gateY, 98 * clamp(state.gates[gateId] / GATE_DURATION, 0.2, 1), 10, 999);

      function drawOverlay() {
        if (state.mode === "running") {
          return;
        }

        ctx.save();
        ctx.fillStyle = state.mode === "menu" ? "rgba(8, 8, 14, 0.58)" : "rgba(9, 8, 15, 0.7)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        drawRoundedRect(118, 92, 724, 356, 34);
        ctx.fillStyle = "rgba(17, 14, 29, 0.9)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 214, 190, 0.14)";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.textAlign = "left";
        ctx.fillStyle = "#fff3e8";
        ctx.font = '700 36px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillText("Dusk Subway: Echo Loom", 152, 154);
        ctx.fillStyle = "rgba(255, 220, 198, 0.82)";
        ctx.font = '600 18px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillText(

            : state.mode === "failed"
              ? "실이 끊기기 전에 루프를 더 짧게 묶고 안전 노드에서 버스트를 받으세요."
              : "모든 문양이 이어졌습니다. 마지막 역전까지 완전히 봉합됐습니다.",
          152,
          196
        );

        const lines =
          state.mode === "menu"
            ? [
                "1. 허브에서 상단/하단 스위치 쪽으로 홀드 드래그해 잔상을 녹화합니다.",
                "2. 손을 떼면 3초 잔상이 같은 길을 다시 지나며 Gate A/B를 열어 줍니다.",
                "3. 상단, 하단 코어를 켠 뒤 중앙 게이트를 열고 마지막 코어에서 역전 구간을 버티세요.",
                "4. 모바일: 화면 터치 후 드래그 유지, 짧게 떼어 잔상을 배치합니다.",
                "5. 키보드 보조: 화살표 이동, Space 홀드 녹화, Enter 시작, R 재시작.",

            : [
                `기록: ${state.lastRunTime.toFixed(1)}초`,
                `버스트 연속 피격: ${state.burst.consecutiveHits}`,

              ];
        ctx.font = '600 16px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillStyle = "rgba(255, 236, 221, 0.86)";
        lines.forEach((line, index) => {
          ctx.fillText(line, 152, 244 + index * 34);
        });

        ctx.fillStyle = "rgba(255, 176, 132, 0.18)";
        drawRoundedRect(152, 366, 234, 50, 999);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 196, 162, 0.38)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = "#fff5ec";
        ctx.font = '700 18px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillText(state.mode === "menu" ? "터치 또는 Enter로 출발" : "터치 / Enter / R 로 재시작", 176, 398);

        ctx.fillStyle = "rgba(255, 220, 198, 0.66)";
        ctx.font = '600 13px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillText(META_CLEAR, 152, 440);
        ctx.fillText(META_FAIL, 152, 464);
        ctx.restore();
      }

      function render() {
        ctx.save();
        if (state.screenShake > 0 && !reduceMotion) {
          ctx.translate((Math.random() - 0.5) * state.screenShake, (Math.random() - 0.5) * state.screenShake);
        }
        drawBackground();
        drawRoutePanels();
        drawConnections();
        drawNode("hub");
        drawNode("switchA");
        drawNode("topGate");
        drawNode("topJunction");
        drawNode("coreA");
        drawNode("switchB");
        drawNode("bottomGate");
        drawNode("bottomJunction");
        drawNode("coreB");
        drawNode("centerGate");
        drawNode("centerJunction");
        drawNode("coreC");
        drawBurstOverlay();
        drawPlayer();
        drawParticlesAndFloaters();
        drawHud();
        drawOverlay();
        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255, 240, 230, ${state.flash})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
        ctx.restore();
      }

      function frame(timestamp) {
        if (document.hidden || !document.hasFocus()) {
          lastTimestamp = timestamp;
          animationFrame = window.requestAnimationFrame(frame);
          return;
        }
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        accumulator += dt;
        while (accumulator >= FIXED_DT) {
          update(FIXED_DT);
          accumulator -= FIXED_DT;
        }
        const frameBudget = reduceMotion ? 1000 / 18 : 1000 / 30;
        if (!lastRenderedAt || timestamp - lastRenderedAt >= frameBudget) {
          render();
          lastRenderedAt = timestamp;
        }
        animationFrame = window.requestAnimationFrame(frame);
      }

      function handlePrimaryAction(point) {
        state.pointer.active = true;
        state.pointer.down = true;
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        if (state.mode === "menu") {
          startStage();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      canvas.addEventListener("pointerdown", (event) => {
        canvas.setPointerCapture?.(event.pointerId);
        handlePrimaryAction(toCanvasPoint(event));
      });

      canvas.addEventListener("pointermove", (event) => {
        const point = toCanvasPoint(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
      });

      function endPointerRecord() {
        state.pointer.down = false;
        finalizeRecord();
      }

      canvas.addEventListener("pointerup", endPointerRecord);
      canvas.addEventListener("pointercancel", endPointerRecord);
      canvas.addEventListener("pointerleave", (event) => {
        if (event.pointerType === "mouse" && !state.pointer.down) {
          state.pointer.active = false;
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          if (state.mode !== "running") {
            startStage();
          }
          event.preventDefault();
          return;
        }
        if (event.key === "r" || event.key === "R") {
          startStage();
          event.preventDefault();
          return;
        }
        if (event.key === " ") {
          state.keyboard.record = true;
          if (state.mode !== "running") {
            startStage();
          }
          event.preventDefault();
          return;
        }
        if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
          state.keyboard.up = true;
          event.preventDefault();
        }
        if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
          state.keyboard.down = true;
          event.preventDefault();
        }
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          state.keyboard.left = true;
          event.preventDefault();
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          state.keyboard.right = true;
          event.preventDefault();
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.key === " ") {
          state.keyboard.record = false;
          finalizeRecord();
          event.preventDefault();
          return;
        }
        if (event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
          state.keyboard.up = false;
          event.preventDefault();
        }
        if (event.key === "ArrowDown" || event.key === "s" || event.key === "S") {
          state.keyboard.down = false;
          event.preventDefault();
        }
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          state.keyboard.left = false;
          event.preventDefault();
        }
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          state.keyboard.right = false;
          event.preventDefault();
        }
      });

      window.render_game_to_text = function renderGameToText() {
        const currentBurst = BURSTS[state.burst.index] || null;
        return JSON.stringify({
          mode: state.mode,
          coord: "origin top-left, +x right, +y down",
          playerNode: state.playerNode,
          player: {
            x: Number(state.playerPos.x.toFixed(1)),
            y: Number(state.playerPos.y.toFixed(1)),
          },
          recording: state.record.active,
          echo: state.echo
            ? {
                x: Number(state.echo.pos.x.toFixed(1)),
                y: Number(state.echo.pos.y.toFixed(1)),
                remaining: Number((ECHO_DURATION - state.echo.time).toFixed(2)),
              }
            : null,
          gates: {
            A: Number(state.gates.A.toFixed(2)),
            B: Number(state.gates.B.toFixed(2)),
            C: Number(state.gates.C.toFixed(2)),
          },
          cores: { ...state.cores },
          burst: currentBurst
            ? {
                index: state.burst.index + 1,
                phase: state.burst.phase,
                safeNode: currentBurst.safeNode,
              }
            : { index: BURSTS.length, phase: "done", safeNode: "coreC" },
          elapsed: Number(state.elapsed.toFixed(2)),
        });
      };

      window.advanceTime = function advanceTime(ms) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageDebug = {
        forceClear() {
          if (!state.cores.A) {
            state.cores.A = true;
          }
          if (!state.cores.B) {
            state.cores.B = true;
          }
          if (!state.cores.C) {
            state.cores.C = true;
          }
          state.burst.index = BURSTS.length;
          setPlayerNode("coreC");
          clearStage();
        },
        forceFail() {
          failStage("debug");
        },
      };

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          lastTimestamp = performance.now();
          render();
        }
      });

      window.addEventListener("focus", () => {
        lastTimestamp = performance.now();
        render();
      });

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
