<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>거울 글씨</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Helvetica Neue", sans-serif;
        background: #3a3d42; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 120, 140, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 42, 48, 0.92);
        color: #e0ddd8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #4a4e55; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 140, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">거울 글씨. 황혼의 지하철 플랫폼 웅덩이에 비친 반사 글자를 따라 그리세요. 마우스 또는 화면 터치 드래그로 조작합니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 15개의 거울 글자를 완성하면 클리어. 3개의 글자가 너무 왜곡되면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="거울 글씨" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "dusk-subway-echo-weaving-inverse",
        title: "거울 글씨",
        description: "황혼의 지하철 웅덩이에 비친 거울 글자를 따라 그리세요.",
        creator: "jungcollin",
        genre: "Mirror tracing",
        clearCondition: "15개의 거울 글자를 완성하면 클리어",
        failCondition: "3개의 글자가 너무 왜곡되면 실패",
        controls: "마우스 또는 터치 드래그로 반사된 글자를 따라 그리세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        asphalt: "#4a4e55",
        asphaltDark: "#3a3d42",
        puddle: "#5a7a9a",
        sunset: "#d48a3c",
        sunsetGlow: "rgba(212, 138, 60, 0.4)",
        reflection: "rgba(220, 160, 80, 0.7)",
        traceGood: "#c8a050",
        traceBad: "#9a5040",
        textBright: "#e0d5c0",
      };

      // --- Characters: each is line segments (mirrored Y for display) ---
      const CHARS = [
        { name: "\u4e00", strokes: [[[0.2,0.5],[0.8,0.5]]] },
        { name: "\u4e8c", strokes: [[[0.25,0.35],[0.75,0.35]],[[0.2,0.65],[0.8,0.65]]] },
        { name: "\u4e09", strokes: [[[0.25,0.25],[0.75,0.25]],[[0.3,0.5],[0.7,0.5]],[[0.2,0.75],[0.8,0.75]]] },
        { name: "\u5341", strokes: [[[0.2,0.5],[0.8,0.5]],[[0.5,0.2],[0.5,0.8]]] },
        { name: "\u5927", strokes: [[[0.5,0.15],[0.5,0.85]],[[0.15,0.45],[0.85,0.45]],[[0.2,0.85],[0.5,0.55],[0.8,0.85]]] },
        { name: "\u4eba", strokes: [[[0.5,0.15],[0.25,0.85]],[[0.5,0.15],[0.75,0.85]]] },
        { name: "\u53e3", strokes: [[[0.3,0.25],[0.7,0.25],[0.7,0.75],[0.3,0.75],[0.3,0.25]]] },
        { name: "\u65e5", strokes: [[[0.3,0.2],[0.7,0.2],[0.7,0.8],[0.3,0.8],[0.3,0.2]],[[0.3,0.5],[0.7,0.5]]] },
        { name: "\u6708", strokes: [[[0.35,0.15],[0.35,0.85],[0.7,0.85],[0.7,0.15]],[[0.35,0.4],[0.7,0.4]],[[0.35,0.6],[0.7,0.6]]] },
        { name: "\u6728", strokes: [[[0.5,0.15],[0.5,0.85]],[[0.2,0.45],[0.8,0.45]],[[0.25,0.8],[0.5,0.5],[0.75,0.8]]] },
        { name: "\u5c71", strokes: [[[0.5,0.2],[0.5,0.8]],[[0.2,0.5],[0.2,0.8]],[[0.8,0.5],[0.8,0.8]],[[0.15,0.8],[0.85,0.8]]] },
        { name: "\u5ddd", strokes: [[[0.3,0.2],[0.3,0.8]],[[0.5,0.25],[0.5,0.8]],[[0.7,0.2],[0.7,0.8]]] },
        { name: "\u7530", strokes: [[[0.25,0.2],[0.75,0.2],[0.75,0.8],[0.25,0.8],[0.25,0.2]],[[0.5,0.2],[0.5,0.8]],[[0.25,0.5],[0.75,0.5]]] },
        { name: "\u571f", strokes: [[[0.5,0.15],[0.5,0.65]],[[0.25,0.45],[0.75,0.45]],[[0.2,0.8],[0.8,0.8]]] },
        { name: "\u738b", strokes: [[[0.2,0.2],[0.8,0.2]],[[0.3,0.5],[0.7,0.5]],[[0.2,0.8],[0.8,0.8]],[[0.5,0.2],[0.5,0.8]]] },
      ];

      // --- State ---
      const TARGET = 15;
      const MAX_FAILS = 3;
      const PUDDLE_W = 260;
      const PUDDLE_H = 220;
      const MATCH_THRESHOLD = 0.55;
      const CHAR_TIME = 6;

      let mode = "menu";
      let elapsed = 0;
      let completed = 0;
      let fails = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;

      let currentChar = null;
      let tracePoints = [];
      let isDrawing = false;
      let charTimer = 0;
      let feedbackTimer = 0;
      let feedbackType = "";
      let showHint = 0;
      let charQueue = [];

      const PUDDLE_X = CX;
      const PUDDLE_Y = CY + 40;

      let raindrops = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function mirrorY(y) {
        const puddleTop = PUDDLE_Y - PUDDLE_H / 2;
        const puddleBot = PUDDLE_Y + PUDDLE_H / 2;
        const relY = (y - puddleTop) / (puddleBot - puddleTop);
        return puddleBot - relY * (puddleBot - puddleTop);
      }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Character management ---
      function shuffleArray(arr) {
        const s = [...arr];
        for (let i = s.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [s[i], s[j]] = [s[j], s[i]];
        }
        return s;
      }

      function nextChar() {
        if (charQueue.length === 0) charQueue = shuffleArray(CHARS);
        currentChar = charQueue.pop();
        tracePoints = [];
        charTimer = CHAR_TIME;
        showHint = 1.5;
        isDrawing = false;
      }

      function evaluateTrace() {
        if (!currentChar || tracePoints.length < 5) return false;
        const zoneLeft = PUDDLE_X - PUDDLE_W / 2;
        const zoneTop = PUDDLE_Y - PUDDLE_H / 2;

        let strokePoints = [];
        for (const stroke of currentChar.strokes) {
          for (let i = 0; i < stroke.length - 1; i++) {
            const steps = 10;
            for (let s = 0; s <= steps; s++) {
              const t = s / steps;
              const sx = zoneLeft + lerp(stroke[i][0], stroke[i + 1][0], t) * PUDDLE_W;
              const rawY = zoneTop + lerp(stroke[i][1], stroke[i + 1][1], t) * PUDDLE_H;
              const sy = mirrorY(rawY);
              strokePoints.push({ x: sx, y: sy });
            }
          }
        }

        let totalDist = 0;
        for (const sp of strokePoints) {
          let minD = Infinity;
          for (const tp of tracePoints) {
            const d = dist(sp.x, sp.y, tp.x, tp.y);
            if (d < minD) minD = d;
          }
          totalDist += minD;
        }
        return (totalDist / strokePoints.length / PUDDLE_W) < MATCH_THRESHOLD;
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; completed = 0; fails = 0;
        clearAnim = 0; feedbackTimer = 0; feedbackType = "";
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        charQueue = shuffleArray(CHARS);
        raindrops = [];
        nextChar();
        initRain();
      }

      function initRain() {
        if (reducedMotion) return;
        for (let i = 0; i < 12; i++) {
          raindrops.push({
            x: rand(0, W), y: rand(0, H),
            speed: rand(80, 180), size: rand(1, 2.5),
            alpha: rand(0.1, 0.3),
          });
        }
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        charTimer -= dt;
        showHint -= dt;
        feedbackTimer -= dt;

        if (charTimer <= 0 && currentChar) {
          const success = evaluateTrace();
          if (success) { completed++; feedbackType = "good"; }
          else { fails++; feedbackType = "bad"; }
          feedbackTimer = 0.8;
          checkEnd();
          if (mode === "running") nextChar();
        }

        if (!reducedMotion) {
          for (const r of raindrops) {
            r.y += r.speed * dt;
            if (r.y > H + 10) { r.y = -10; r.x = rand(0, W); }
          }
        }
      }

      function checkEnd() {
        if (completed >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (fails >= MAX_FAILS) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("\uae00\uc790 \uc654\uace1 \ucd08\uacfc");
        }
      }

      function submitTrace() {
        if (!currentChar || tracePoints.length < 5) return;
        const success = evaluateTrace();
        if (success) { completed++; feedbackType = "good"; }
        else { fails++; feedbackType = "bad"; }
        feedbackTimer = 0.8;
        checkEnd();
        if (mode === "running") nextChar();
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        ctx.fillStyle = COL.asphalt;
        ctx.fillRect(0, 0, W, H);

        drawPlatform();
        drawPuddle();
        drawRain();

        if (mode === "running") drawHUD();
        if (feedbackTimer > 0) drawFeedback();

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawPlatform() {
        ctx.strokeStyle = "rgba(80, 85, 95, 0.3)";
        ctx.lineWidth = 1;
        for (let y = 0; y < H; y += 30) {
          ctx.beginPath();
          ctx.moveTo(0, y + Math.sin(y * 0.1) * 2);
          ctx.lineTo(W, y + Math.sin(y * 0.1 + 1) * 2);
          ctx.stroke();
        }

        const grad = ctx.createLinearGradient(0, 0, 0, H * 0.35);
        grad.addColorStop(0, "rgba(212, 138, 60, 0.15)");
        grad.addColorStop(1, "rgba(212, 138, 60, 0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H * 0.35);

        ctx.strokeStyle = "rgba(200, 180, 140, 0.2)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, PUDDLE_Y - PUDDLE_H / 2 - 20);
        ctx.lineTo(W, PUDDLE_Y - PUDDLE_H / 2 - 20);
        ctx.stroke();
      }

      function drawPuddle() {
        const px = PUDDLE_X - PUDDLE_W / 2;
        const py = PUDDLE_Y - PUDDLE_H / 2;

        ctx.save();
        ctx.beginPath();
        ctx.ellipse(PUDDLE_X, PUDDLE_Y, PUDDLE_W / 2 + 20, PUDDLE_H / 2 + 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(50, 70, 100, 0.5)";
        ctx.fill();

        ctx.beginPath();
        ctx.ellipse(PUDDLE_X, PUDDLE_Y, PUDDLE_W / 2, PUDDLE_H / 2, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(60, 85, 120, 0.6)";
        ctx.fill();

        const sunGrad = ctx.createRadialGradient(PUDDLE_X, PUDDLE_Y - 30, 10, PUDDLE_X, PUDDLE_Y - 30, 100);
        sunGrad.addColorStop(0, "rgba(212, 138, 60, 0.2)");
        sunGrad.addColorStop(1, "rgba(212, 138, 60, 0)");
        ctx.fillStyle = sunGrad;
        ctx.fill();
        ctx.restore();

        if (!currentChar || mode !== "running") return;

        // Draw mirrored character strokes
        ctx.save();
        ctx.globalAlpha = showHint > 0 ? 0.7 : 0.35;
        ctx.strokeStyle = COL.reflection;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        for (const stroke of currentChar.strokes) {
          ctx.beginPath();
          for (let i = 0; i < stroke.length; i++) {
            const sx = px + stroke[i][0] * PUDDLE_W;
            const rawY = py + stroke[i][1] * PUDDLE_H;
            const sy = mirrorY(rawY);
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
          }
          ctx.stroke();
        }
        ctx.restore();

        // Char name hint
        if (showHint > 0) {
          ctx.fillStyle = COL.textBright;
          ctx.font = "bold 28px 'Noto Sans KR', sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "bottom";
          ctx.globalAlpha = clamp(showHint, 0, 1);
          ctx.fillText(currentChar.name, PUDDLE_X, PUDDLE_Y - PUDDLE_H / 2 - 28);
          ctx.globalAlpha = 1;
        }

        // User trace
        if (tracePoints.length > 1) {
          ctx.strokeStyle = COL.sunset;
          ctx.lineWidth = 3;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.beginPath();
          ctx.moveTo(tracePoints[0].x, tracePoints[0].y);
          for (let i = 1; i < tracePoints.length; i++) ctx.lineTo(tracePoints[i].x, tracePoints[i].y);
          ctx.stroke();
        }
      }

      function drawRain() {
        if (reducedMotion) return;
        for (const r of raindrops) {
          ctx.beginPath();
          ctx.moveTo(r.x, r.y);
          ctx.lineTo(r.x - 0.5, r.y + r.size * 4);
          ctx.strokeStyle = `rgba(150, 170, 200, ${r.alpha})`;
          ctx.lineWidth = r.size * 0.5;
          ctx.stroke();
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.textBright;
        ctx.font = "500 15px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${completed} / ${TARGET}`, 24, 20);

        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(Math.max(0, charTimer))}`, W - 24, 20);

        const barW = W - 48, barX = 24, barY = 44;
        ctx.fillStyle = "rgba(80, 85, 95, 0.5)";
        ctx.fillRect(barX, barY, barW, 2);
        ctx.fillStyle = COL.sunset;
        ctx.fillRect(barX, barY, barW * clamp(charTimer / CHAR_TIME, 0, 1), 2);

        const dotY = H - 24;
        for (let i = 0; i < MAX_FAILS; i++) {
          const dotX = CX - (MAX_FAILS - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_FAILS - fails ? COL.sunset : "rgba(80, 85, 95, 0.4)";
          ctx.fill();
        }
      }

      function drawFeedback() {
        const alpha = clamp(feedbackTimer / 0.8, 0, 1) * 0.25;
        ctx.fillStyle = feedbackType === "good"
          ? `rgba(120, 180, 80, ${alpha})`
          : `rgba(180, 80, 60, ${alpha})`;
        ctx.fillRect(0, 0, W, H);
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(60, 65, 75, 0.95)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.sunset;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.textBright;
        ctx.font = "bold 22px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px 'Noto Sans KR', sans-serif";
        ctx.fillStyle = "rgba(200, 190, 175, 0.7)";
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(200, 190, 175, 0.4)";
        ctx.font = "400 13px 'Noto Sans KR', sans-serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(50, 55, 65, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\uac70\uc6b8 \uae00\uc528", [
          "\ud669\ud63c\uc758 \uc6c5\ub369\uc774\uc5d0 \ube44\uce5c",
          "\uac70\uc6b8 \uae00\uc790\ub97c \ub530\ub77c \uadf8\ub9ac\uc138\uc694",
          "",
          "\uc870\uc791: \ud130\uce58/\ub4dc\ub798\uadf8\ub85c \ub530\ub77c \uadf8\ub9ac\uae30",
          "\ud074\ub9ac\uc5b4: 15\uac1c \uae00\uc790 \uc644\uc131",
          "\uc2e4\ud328: 3\uac1c \uae00\uc790 \uc654\uace1",
        ], COL.sunset);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(50, 55, 65, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("\uac70\uc6b8 \uae00\uc528 \uc644\uc131", [
            `${Math.ceil(elapsed)}\ucd08 \ub9cc\uc5d0 \uc644\ub8cc`,
            `\uc644\uc131: ${completed}\uac1c`,
          ], COL.sunset);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(60, 30, 30, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\uac70\uc6b8\uc774 \ud750\ub824\uc84c\ub2e4", [
          "\uae00\uc790\uac00 \ub108\ubb34 \uc654\uace1\ub418\uc5c8\uc2b5\ub2c8\ub2e4",
          `\uc644\uc131: ${completed} / ${TARGET}`,
        ], COL.traceBad);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        isDrawing = true;
        tracePoints = [{ x: p.x, y: p.y }];
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || !isDrawing) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        const last = tracePoints[tracePoints.length - 1];
        if (dist(last.x, last.y, p.x, p.y) > 3) tracePoints.push({ x: p.x, y: p.y });
      });

      canvas.addEventListener("pointerup", () => {
        if (mode !== "running") return;
        if (isDrawing && tracePoints.length >= 5) submitTrace();
        isDrawing = false;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;

        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          completed, fails,
          result: window.relayStageResult.status,
          currentChar: currentChar?.name || null,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          completed = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          fails = MAX_FAILS;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      initRain();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
