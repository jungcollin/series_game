<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>팽이 대결</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #1a1025;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #1a1025;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">팽이 대결. 캔버스를 터치하거나 Enter로 시작하세요. 터치/클릭으로 팽이 발사, 드래그로 방향과 세기 조절.</p>
    <canvas id="game" width="960" height="540" aria-label="팽이 대결" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("spinning-top-battle") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      // Arena
      const ARENA_CX = VIEW.width / 2;
      const ARENA_CY = VIEW.height / 2 + 10;
      const ARENA_R = 210;

      // Top properties
      const TOP_R = 22;
      const MAX_HP = 3;
      const FRICTION = 0.985;
      const SPIN_DECAY = 0.997;
      const MIN_SPIN = 0.08;
      const LAUNCH_POWER = 0.38;
      const MAX_LAUNCH = 160;
      const COLLISION_BOUNCE = 0.7;
      const DAMAGE_SPEED_THRESHOLD = 2.5;
      const GAME_TIME = 45;
      const WOBBLE_THRESHOLD = 0.2;
      const INVINCIBLE_TIME = 0.6;

      function makeTop(x, y, color, accent) {
        return {
          x, y, vx: 0, vy: 0,
          spin: 1.0, angle: 0,
          hp: MAX_HP, color, accent,
          wobble: 0, dead: false,
          invTimer: 0, flashTimer: 0,
          trail: [],
        };
      }

      const state = {
        mode: "menu",
        phase: "aim",
        elapsed: 0,
        lastRunTime: 0,
        timeLeft: GAME_TIME,
        player: makeTop(ARENA_CX - 100, ARENA_CY + 80, "#3b82f6", "#60a5fa"),
        enemy: makeTop(ARENA_CX + 100, ARENA_CY - 80, "#ef4444", "#f87171"),
        drag: null,
        roundDelay: 0,
        roundNum: 0,
        sparks: [],
        shakeTimer: 0,
        shakeIntensity: 0,
      };

      function resetTops() {
        const p = state.player;
        const e = state.enemy;
        p.x = ARENA_CX - 100; p.y = ARENA_CY + 80;
        p.vx = 0; p.vy = 0; p.spin = 1.0; p.wobble = 0; p.dead = false;
        p.invTimer = 0; p.trail = [];
        e.x = ARENA_CX + 100; e.y = ARENA_CY - 80;
        e.vx = 0; e.vy = 0; e.spin = 1.0; e.wobble = 0; e.dead = false;
        e.invTimer = 0; e.trail = [];
        state.drag = null;
      }

      function dist(a, b) {
        return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
      }

      function speed(t) {
        return Math.sqrt(t.vx ** 2 + t.vy ** 2);
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.phase = "aim";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.timeLeft = GAME_TIME;
        state.roundNum = 0;
        state.sparks = [];
        state.shakeTimer = 0;
        const p = state.player;
        const e = state.enemy;
        p.hp = MAX_HP; e.hp = MAX_HP;
        resetTops();
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason) {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function addSparks(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = Math.random() * Math.PI * 2;
          const spd = 1.5 + Math.random() * 4;
          state.sparks.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 0.3 + Math.random() * 0.4,
            maxLife: 0.3 + Math.random() * 0.4,
            color,
            size: 2 + Math.random() * 3,
          });
        }
      }

      function launchEnemy() {
        const e = state.enemy;
        const p = state.player;
        const dx = p.x - e.x;
        const dy = p.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        const randomAngle = (Math.random() - 0.5) * 0.6;
        const cos = Math.cos(randomAngle);
        const sin = Math.sin(randomAngle);
        const ndx = (dx / d) * cos - (dy / d) * sin;
        const ndy = (dx / d) * sin + (dy / d) * cos;
        const power = 80 + Math.random() * 60;
        e.vx = ndx * power * LAUNCH_POWER;
        e.vy = ndy * power * LAUNCH_POWER;
        e.spin = 1.0;
      }

      function collideWall(top) {
        const dx = top.x - ARENA_CX;
        const dy = top.y - ARENA_CY;
        const d = Math.sqrt(dx * dx + dy * dy);
        const limit = ARENA_R - TOP_R;
        if (d > limit) {
          const nx = dx / d;
          const ny = dy / d;
          top.x = ARENA_CX + nx * limit;
          top.y = ARENA_CY + ny * limit;
          const dot = top.vx * nx + top.vy * ny;
          top.vx -= 2 * dot * nx * 0.6;
          top.vy -= 2 * dot * ny * 0.6;
          top.spin *= 0.97;
          addSparks(top.x + nx * TOP_R, top.y + ny * TOP_R, 3, "#fbbf24");
        }
      }

      function collideTops() {
        const p = state.player;
        const e = state.enemy;
        if (p.dead || e.dead) return;
        const dx = e.x - p.x;
        const dy = e.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const minDist = TOP_R * 2;
        if (d < minDist && d > 0) {
          const nx = dx / d;
          const ny = dy / d;
          const overlap = minDist - d;
          p.x -= nx * overlap * 0.5;
          p.y -= ny * overlap * 0.5;
          e.x += nx * overlap * 0.5;
          e.y += ny * overlap * 0.5;

          const dvx = p.vx - e.vx;
          const dvy = p.vy - e.vy;
          const dvn = dvx * nx + dvy * ny;

          if (dvn > 0) {
            const pSpinFactor = p.spin;
            const eSpinFactor = e.spin;
            const pBounce = COLLISION_BOUNCE * eSpinFactor;
            const eBounce = COLLISION_BOUNCE * pSpinFactor;
            p.vx -= pBounce * dvn * nx;
            p.vy -= pBounce * dvn * ny;
            e.vx += eBounce * dvn * nx;
            e.vy += eBounce * dvn * ny;

            const relSpeed = Math.abs(dvn);
            if (relSpeed > DAMAGE_SPEED_THRESHOLD) {
              const pMomentum = speed(p) * p.spin;
              const eMomentum = speed(e) * e.spin;
              if (pMomentum > eMomentum && e.invTimer <= 0) {
                e.hp--;
                e.invTimer = INVINCIBLE_TIME;
                e.flashTimer = INVINCIBLE_TIME;
                e.spin *= 0.7;
                addSparks((p.x + e.x) / 2, (p.y + e.y) / 2, 12, "#ef4444");
                state.shakeTimer = 0.2;
                state.shakeIntensity = 5;
              } else if (eMomentum > pMomentum && p.invTimer <= 0) {
                p.hp--;
                p.invTimer = INVINCIBLE_TIME;
                p.flashTimer = INVINCIBLE_TIME;
                p.spin *= 0.7;
                addSparks((p.x + e.x) / 2, (p.y + e.y) / 2, 12, "#3b82f6");
                state.shakeTimer = 0.2;
                state.shakeIntensity = 5;
              }
              addSparks((p.x + e.x) / 2, (p.y + e.y) / 2, 8, "#fbbf24");
            }
          }
        }
      }

      function bothStopped() {
        return speed(state.player) < 0.5 && speed(state.enemy) < 0.5;
      }

      function update(dt) {
        if (state.mode !== "running") return;
        state.elapsed += dt;
        state.timeLeft = Math.max(0, GAME_TIME - state.elapsed);

        if (state.shakeTimer > 0) state.shakeTimer -= dt;

        for (let i = state.sparks.length - 1; i >= 0; i--) {
          const s = state.sparks[i];
          s.x += s.vx; s.y += s.vy;
          s.vx *= 0.94; s.vy *= 0.94;
          s.life -= dt;
          if (s.life <= 0) state.sparks.splice(i, 1);
        }

        if (state.player.invTimer > 0) state.player.invTimer -= dt;
        if (state.enemy.invTimer > 0) state.enemy.invTimer -= dt;
        if (state.player.flashTimer > 0) state.player.flashTimer -= dt;
        if (state.enemy.flashTimer > 0) state.enemy.flashTimer -= dt;

        if (state.player.hp <= 0) {
          failStage("내 팽이가 쓰러졌습니다!");
          return;
        }
        if (state.enemy.hp <= 0) {
          clearStage();
          return;
        }
        if (state.timeLeft <= 0) {
          failStage("시간 초과!");
          return;
        }

        if (state.phase === "aim") return;

        if (state.phase === "battle") {
          const tops = [state.player, state.enemy];
          for (const t of tops) {
            if (t.dead) continue;
            t.x += t.vx * dt * 60;
            t.y += t.vy * dt * 60;
            t.vx *= FRICTION;
            t.vy *= FRICTION;
            t.spin *= SPIN_DECAY;
            t.angle += t.spin * 0.3;
            if (t.spin < WOBBLE_THRESHOLD) {
              t.wobble += dt * 8;
            }
            if (t.spin < MIN_SPIN) {
              t.spin = MIN_SPIN;
            }
            t.trail.push({ x: t.x, y: t.y, age: 0 });
            if (t.trail.length > 12) t.trail.shift();
            for (const tr of t.trail) tr.age += dt;
            collideWall(t);
          }
          collideTops();

          if (bothStopped() && state.roundDelay <= 0) {
            state.roundDelay = 0.5;
          }
          if (state.roundDelay > 0) {
            state.roundDelay -= dt;
            if (state.roundDelay <= 0 && bothStopped()) {
              state.phase = "aim";
              state.player.vx = 0; state.player.vy = 0;
              state.enemy.vx = 0; state.enemy.vy = 0;
              state.player.spin = 1.0; state.enemy.spin = 1.0;
              state.player.wobble = 0; state.enemy.wobble = 0;
              state.player.trail = []; state.enemy.trail = [];
              state.drag = null;
            }
          }
        }
      }

      // Drawing helpers
      function drawArena() {
        const grad = ctx.createRadialGradient(ARENA_CX, ARENA_CY, 0, ARENA_CX, ARENA_CY, ARENA_R);
        grad.addColorStop(0, "#2d1f3d");
        grad.addColorStop(0.7, "#1e1530");
        grad.addColorStop(1, "#120c1e");
        ctx.beginPath();
        ctx.arc(ARENA_CX, ARENA_CY, ARENA_R, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(ARENA_CX, ARENA_CY, ARENA_R, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(168, 130, 255, 0.4)";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(ARENA_CX, ARENA_CY, ARENA_R * 0.4, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(168, 130, 255, 0.15)";
        ctx.lineWidth = 1;
        ctx.stroke();

        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(ARENA_CX, ARENA_CY);
          ctx.lineTo(ARENA_CX + Math.cos(a) * ARENA_R, ARENA_CY + Math.sin(a) * ARENA_R);
          ctx.strokeStyle = "rgba(168, 130, 255, 0.08)";
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }

      function drawTop(top) {
        if (top.dead) return;
        const flashing = top.flashTimer > 0 && Math.floor(top.flashTimer * 16) % 2 === 0;

        for (let i = 0; i < top.trail.length; i++) {
          const tr = top.trail[i];
          const alpha = (1 - tr.age * 3) * 0.25 * (i / top.trail.length);
          if (alpha <= 0) continue;
          ctx.beginPath();
          ctx.arc(tr.x, tr.y, TOP_R * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = top.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          ctx.fill();
        }

        ctx.save();
        ctx.translate(top.x, top.y);
        if (top.spin < WOBBLE_THRESHOLD) {
          ctx.translate(Math.sin(top.wobble) * 3, Math.cos(top.wobble * 1.3) * 2);
        }
        ctx.rotate(top.angle);

        if (!flashing) {
          ctx.beginPath();
          ctx.arc(0, 0, TOP_R + 3, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(0,0,0,0.25)";
          ctx.fill();

          const tGrad = ctx.createRadialGradient(-4, -4, 2, 0, 0, TOP_R);
          tGrad.addColorStop(0, top.accent);
          tGrad.addColorStop(1, top.color);
          ctx.beginPath();
          ctx.arc(0, 0, TOP_R, 0, Math.PI * 2);
          ctx.fillStyle = tGrad;
          ctx.fill();

          ctx.strokeStyle = "rgba(255,255,255,0.3)";
          ctx.lineWidth = 2;
          ctx.stroke();

          for (let i = 0; i < 3; i++) {
            const a = (i / 3) * Math.PI * 2;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(Math.cos(a) * TOP_R * 0.75, Math.sin(a) * TOP_R * 0.75);
            ctx.strokeStyle = "rgba(255,255,255,0.25)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          ctx.beginPath();
          ctx.arc(0, 0, 5, 0, Math.PI * 2);
          ctx.fillStyle = "#fff";
          ctx.fill();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, TOP_R, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255,255,255,0.7)";
          ctx.fill();
        }

        ctx.restore();

        const spinGlow = Math.min(1, top.spin);
        if (spinGlow > 0.3) {
          ctx.save();
          ctx.globalAlpha = (spinGlow - 0.3) * 0.3;
          ctx.beginPath();
          ctx.arc(top.x, top.y, TOP_R + 8, 0, Math.PI * 2);
          ctx.strokeStyle = top.accent;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawHP(top, x, y, label) {
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.font = "700 14px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(label, x, y - 6);
        for (let i = 0; i < MAX_HP; i++) {
          const hx = x - (MAX_HP - 1) * 12 + i * 24;
          const hy = y + 8;
          ctx.beginPath();
          ctx.arc(hx, hy, 8, 0, Math.PI * 2);
          if (i < top.hp) {
            ctx.fillStyle = top.color;
            ctx.fill();
            ctx.strokeStyle = "rgba(255,255,255,0.5)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
          } else {
            ctx.fillStyle = "rgba(100,100,100,0.4)";
            ctx.fill();
          }
        }
      }

      function drawAimArrow() {
        if (!state.drag) return;
        const p = state.player;
        const dx = state.drag.sx - state.drag.cx;
        const dy = state.drag.sy - state.drag.cy;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 5) return;
        const power = Math.min(d, MAX_LAUNCH);
        const nx = dx / d;
        const ny = dy / d;

        ctx.save();
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x + nx * power * 1.2, p.y + ny * power * 1.2);
        ctx.strokeStyle = `rgba(96, 165, 250, ${0.4 + (power / MAX_LAUNCH) * 0.5})`;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.setLineDash([]);

        const arrowLen = 10;
        const ax = p.x + nx * power * 1.2;
        const ay = p.y + ny * power * 1.2;
        const angle = Math.atan2(ny, nx);
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - Math.cos(angle - 0.4) * arrowLen, ay - Math.sin(angle - 0.4) * arrowLen);
        ctx.lineTo(ax - Math.cos(angle + 0.4) * arrowLen, ay - Math.sin(angle + 0.4) * arrowLen);
        ctx.closePath();
        ctx.fillStyle = "rgba(96, 165, 250, 0.7)";
        ctx.fill();

        const barW = 60;
        const barH = 6;
        const barX = p.x - barW / 2;
        const barY = p.y + TOP_R + 14;
        const pct = power / MAX_LAUNCH;
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(barX, barY, barW, barH);
        const barColor = pct < 0.5 ? "#60a5fa" : pct < 0.8 ? "#fbbf24" : "#ef4444";
        ctx.fillStyle = barColor;
        ctx.fillRect(barX, barY, barW * pct, barH);
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barW, barH);
        ctx.restore();
      }

      function drawSparks() {
        for (const s of state.sparks) {
          const alpha = s.life / s.maxLife;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size * alpha, 0, Math.PI * 2);
          ctx.fillStyle = s.color.replace(")", `, ${alpha})`).replace("#", "");
          const hex = s.color;
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
          ctx.fill();
        }
      }

      function drawHUD() {
        drawHP(state.player, 80, 28, "MY TOP");
        drawHP(state.enemy, VIEW.width - 80, 28, "ENEMY");

        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = "700 20px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(Math.ceil(state.timeLeft) + "s", VIEW.width / 2, 32);

        if (state.phase === "aim") {
          ctx.fillStyle = "rgba(255,255,255,0.6)";
          ctx.font = "600 16px Trebuchet MS";
          ctx.fillText("드래그로 발사!", VIEW.width / 2, VIEW.height - 24);
        }

        ctx.font = "600 13px Trebuchet MS";
        ctx.fillStyle = "rgba(168, 130, 255, 0.5)";
        ctx.fillText("ROUND " + (state.roundNum + 1), VIEW.width / 2, 54);
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "#1a1025";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        drawArena();

        ctx.fillStyle = "rgba(26, 16, 37, 0.85)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardW = Math.min(680, VIEW.width - 40);
        const cardH = 320;
        const cardX = (VIEW.width - cardW) / 2;
        const cardY = (VIEW.height - cardH) / 2;

        ctx.fillStyle = "rgba(30, 21, 48, 0.95)";
        ctx.strokeStyle = accent;
        ctx.lineWidth = 3;
        const r = 16;
        ctx.beginPath();
        ctx.moveTo(cardX + r, cardY);
        ctx.lineTo(cardX + cardW - r, cardY);
        ctx.quadraticCurveTo(cardX + cardW, cardY, cardX + cardW, cardY + r);
        ctx.lineTo(cardX + cardW, cardY + cardH - r);
        ctx.quadraticCurveTo(cardX + cardW, cardY + cardH, cardX + cardW - r, cardY + cardH);
        ctx.lineTo(cardX + r, cardY + cardH);
        ctx.quadraticCurveTo(cardX, cardY + cardH, cardX, cardY + cardH - r);
        ctx.lineTo(cardX, cardY + r);
        ctx.quadraticCurveTo(cardX, cardY, cardX + r, cardY);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = "700 36px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, cardY + 56);

        ctx.fillStyle = "rgba(248, 250, 252, 0.85)";
        ctx.font = "500 18px Trebuchet MS";
        lines.forEach((line, i) => {
          ctx.fillText(line, VIEW.width / 2, cardY + 106 + i * 34);
        });

        ctx.fillStyle = "rgba(168, 130, 255, 0.5)";
        ctx.font = "500 15px Trebuchet MS";
        ctx.fillText("터치 또는 Enter로 시작", VIEW.width / 2, cardY + cardH - 24);
        ctx.textAlign = "left";
      }

      function render() {
        ctx.save();
        if (state.shakeTimer > 0) {
          const sx = (Math.random() - 0.5) * state.shakeIntensity * 2;
          const sy = (Math.random() - 0.5) * state.shakeIntensity * 2;
          ctx.translate(sx, sy);
        }

        if (state.mode === "menu") {
          renderCard("팽이 대결", [
            "터치/클릭으로 팽이 발사, 드래그로 방향과 세기 조절",
            "상대 팽이를 먼저 쓰러뜨리면 클리어",
            "내 팽이가 먼저 쓰러지면 실패",
            "제한시간 " + GAME_TIME + "초",
          ], "#a882ff");
          ctx.restore();
          return;
        }

        if (state.mode === "running") {
          ctx.fillStyle = "#1a1025";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          drawArena();
          drawSparks();
          drawTop(state.enemy);
          drawTop(state.player);
          if (state.phase === "aim") drawAimArrow();
          drawHUD();
          ctx.restore();
          return;
        }

        if (state.mode === "failed") {
          renderCard("실패!", [
            "내 팽이가 쓰러졌습니다...",
            "경과 시간: " + state.lastRunTime.toFixed(1) + "초",
          ], "#ef4444");
          ctx.restore();
          return;
        }

        if (state.mode === "cleared") {
          renderCard("클리어!", [
            "상대 팽이를 쓰러뜨렸습니다!",
            "경과 시간: " + state.lastRunTime.toFixed(1) + "초",
          ], "#22c55e");
          ctx.restore();
          return;
        }
        ctx.restore();
      }

      // Input handling
      function getCanvasPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      function onPointerDown(e) {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        if (state.mode === "running" && state.phase === "aim") {
          const pos = getCanvasPos(e);
          state.drag = { sx: pos.x, sy: pos.y, cx: pos.x, cy: pos.y };
        }
      }

      function onPointerMove(e) {
        if (state.drag) {
          const pos = getCanvasPos(e);
          state.drag.cx = pos.x;
          state.drag.cy = pos.y;
        }
      }

      function onPointerUp(e) {
        if (state.drag && state.phase === "aim") {
          const dx = state.drag.sx - state.drag.cx;
          const dy = state.drag.sy - state.drag.cy;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d > 15) {
            const power = Math.min(d, MAX_LAUNCH);
            const nx = dx / d;
            const ny = dy / d;
            state.player.vx = nx * power * LAUNCH_POWER;
            state.player.vy = ny * power * LAUNCH_POWER;
            state.player.spin = 1.0;
            launchEnemy();
            state.phase = "battle";
            state.roundNum++;
            state.roundDelay = 0;
          }
          state.drag = null;
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        onPointerDown(e);
      });
      canvas.addEventListener("pointermove", (e) => {
        e.preventDefault();
        onPointerMove(e);
      });
      canvas.addEventListener("pointerup", (e) => {
        e.preventDefault();
        onPointerUp(e);
      });
      canvas.addEventListener("pointercancel", () => {
        state.drag = null;
      });

      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
      }, { passive: false });

      canvas.addEventListener("click", () => canvas.focus());

      window.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
        }
      });

      function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          phase: state.phase,
          elapsed: Math.round(state.elapsed * 10) / 10,
          timeLeft: Math.ceil(state.timeLeft),
          playerHP: state.player.hp,
          enemyHP: state.enemy.hp,
          roundNum: state.roundNum,
          result: window.relayStageResult.status,
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "spinning-top-battle",
        title: "팽이 대결",
        creator: "jungcollin",
        genre: "action",
        clearCondition: "상대 팽이를 먼저 쓰러뜨리면 클리어",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() { startStage(); clearStage(); render(); },
        forceFail() { startStage(); failStage("debug_force_fail"); render(); },
      };

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));
      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
