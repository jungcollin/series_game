<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>반딧불 목동</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Helvetica Neue", sans-serif;
        background: #1a2438; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 160, 80, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(20, 30, 50, 0.92);
        color: #e0d8b0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #1e2a40; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 180, 80, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">반딧불 목동. 바람 방향으로 반딧불을 꽃 등불로 안내하세요. 바람이 역전되면 반대로 움직입니다. 마우스 또는 화면 터치로 바람 방향을 정합니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 20마리 반딧불을 등불로 안내하면 클리어. 5마리가 어둠 속에 사라지면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="반딧불 목동" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "moon-greenhouse-magnet-braiding-inverse",
        title: "반딧불 목동",
        description: "바람 방향으로 반딧불을 꽃 등불로 안내하세요.",
        creator: "jungcollin",
        genre: "Wind guiding",
        clearCondition: "20마리 반딧불을 등불로 안내하면 클리어",
        failCondition: "5마리가 어둠 속에 사라지면 실패",
        controls: "터치/드래그로 바람 방향을 정하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        sky: "#1e2a40",
        moss: "#3a5a3a",
        mossLight: "#4a7a4a",
        firefly: "#e8d060",
        lanternPetal: "#d06880",
        lanternCore: "#e8c048",
        lanternGlow: "rgba(232, 192, 72, 0.25)",
        moon: "#e8e0c8",
        moonGlow: "rgba(232, 224, 200, 0.1)",
        text: "#d0c8a0",
        windArrow: "rgba(140, 180, 220, 0.5)",
        inverse: "rgba(180, 100, 120, 0.6)",
      };

      // --- State ---
      const TARGET = 20;
      const MAX_LOST = 5;
      const LANTERN_COUNT = 5;
      const WIND_STRENGTH = 80;
      const INVERSE_INTERVAL = 8;
      const INVERSE_DURATION = 3;

      let mode = "menu";
      let elapsed = 0;
      let guided = 0;
      let lost = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;

      let windX = 0, windY = 0;
      let pointerX = CX, pointerY = CY;
      let isPointerDown = false;
      let inversed = false;
      let inverseTimer = 0;
      let nextInverseAt = INVERSE_INTERVAL;

      let lanterns = [];
      let fireflies = [];
      let spawnTimer = 0;
      let particles = [];
      let stars = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Init objects ---
      function initLanterns() {
        lanterns = [];
        const margin = 80;
        for (let i = 0; i < LANTERN_COUNT; i++) {
          lanterns.push({
            x: margin + (W - margin * 2) * (i / (LANTERN_COUNT - 1)),
            y: H - 80 - rand(0, 60),
            r: 22, pulse: rand(0, Math.PI * 2), collected: 0,
          });
        }
      }

      function initStars() {
        stars = [];
        if (reducedMotion) return;
        for (let i = 0; i < 40; i++) {
          stars.push({
            x: rand(0, W), y: rand(0, H * 0.5),
            size: rand(0.5, 2), twinkle: rand(0, Math.PI * 2), speed: rand(0.5, 2),
          });
        }
      }

      function spawnFirefly() {
        const side = Math.floor(rand(0, 4));
        let x, y;
        if (side === 0) { x = -10; y = rand(50, H - 100); }
        else if (side === 1) { x = W + 10; y = rand(50, H - 100); }
        else if (side === 2) { x = rand(50, W - 50); y = -10; }
        else { x = rand(50, W - 50); y = H * 0.4; }
        fireflies.push({
          x, y, vx: rand(-15, 15), vy: rand(-15, 15),
          wobble: rand(0, Math.PI * 2), wobbleSpeed: rand(1, 3),
          glow: rand(0, Math.PI * 2), size: rand(3, 5), life: 15 + rand(0, 5),
        });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(20, 60);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: rand(1, 3),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; guided = 0; lost = 0; clearAnim = 0;
        windX = 0; windY = 0;
        inversed = false; inverseTimer = 0;
        nextInverseAt = INVERSE_INTERVAL;
        fireflies = []; particles = []; spawnTimer = 0.5;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        initLanterns();
        initStars();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Inverse wind timer
        if (!inversed && elapsed >= nextInverseAt) {
          inversed = true;
          inverseTimer = INVERSE_DURATION;
        }
        if (inversed) {
          inverseTimer -= dt;
          if (inverseTimer <= 0) {
            inversed = false;
            nextInverseAt = elapsed + INVERSE_INTERVAL;
          }
        }

        // Wind from pointer
        if (isPointerDown) {
          let dx = pointerX - CX, dy = pointerY - CY;
          const len = Math.hypot(dx, dy) || 1;
          dx /= len; dy /= len;
          const str = clamp(Math.hypot(pointerX - CX, pointerY - CY) / 200, 0, 1);
          const sign = inversed ? -1 : 1;
          windX = lerp(windX, sign * dx * WIND_STRENGTH * str, 4 * dt);
          windY = lerp(windY, sign * dy * WIND_STRENGTH * str, 4 * dt);
        } else {
          windX *= 0.95; windY *= 0.95;
        }

        // Spawn fireflies
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnFirefly();
          spawnTimer = lerp(1.2, 0.6, clamp(elapsed / 40, 0, 1));
        }

        // Update fireflies
        for (let i = fireflies.length - 1; i >= 0; i--) {
          const f = fireflies[i];
          f.life -= dt;
          f.wobble += f.wobbleSpeed * dt;
          f.glow += 3 * dt;

          const wx = Math.cos(f.wobble) * 12;
          const wy = Math.sin(f.wobble * 1.3) * 8;
          f.vx = lerp(f.vx, windX + wx, 2 * dt);
          f.vy = lerp(f.vy, windY + wy - 10, 2 * dt);
          f.x += f.vx * dt;
          f.y += f.vy * dt;

          let caught = false;
          for (const l of lanterns) {
            if (dist(f.x, f.y, l.x, l.y) < l.r + f.size + 5) {
              guided++; l.collected++; caught = true;
              spawnParticles(f.x, f.y, reducedMotion ? 3 : 6, COL.firefly);
              break;
            }
          }
          if (caught) { fireflies.splice(i, 1); continue; }

          if (f.life <= 0 || f.x < -40 || f.x > W + 40 || f.y < -40 || f.y > H + 40) {
            lost++;
            fireflies.splice(i, 1);
            continue;
          }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.93; p.vy *= 0.93;
          p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Stars & lanterns
        if (!reducedMotion) { for (const s of stars) s.twinkle += s.speed * dt; }
        for (const l of lanterns) l.pulse += 1.5 * dt;

        // Win/lose
        if (guided >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (lost >= MAX_LOST) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("\ubc18\ub527\ubd88 \uc18c\uc2e4");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();

        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, "#0e1828");
        skyGrad.addColorStop(0.5, COL.sky);
        skyGrad.addColorStop(1, "#1a3028");
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);

        drawMoon();
        drawStars();
        drawGround();
        drawLanterns();
        drawFireflies();
        drawParticles();
        drawWindIndicator();

        if (inversed && mode === "running") drawInverseWarning();
        if (mode === "running") drawHUD();

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawMoon() {
        const grad = ctx.createRadialGradient(W - 100, 60, 15, W - 100, 60, 120);
        grad.addColorStop(0, COL.moonGlow);
        grad.addColorStop(1, "rgba(232, 224, 200, 0)");
        ctx.fillStyle = grad;
        ctx.fillRect(W - 220, 0, 220, 200);
        ctx.beginPath();
        ctx.arc(W - 100, 60, 28, 0, Math.PI * 2);
        ctx.fillStyle = COL.moon;
        ctx.fill();
      }

      function drawStars() {
        if (reducedMotion) return;
        for (const s of stars) {
          const alpha = (Math.sin(s.twinkle) * 0.3 + 0.5) * 0.6;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(220, 215, 200, ${alpha})`;
          ctx.fill();
        }
      }

      function drawGround() {
        const groundY = H - 50;
        ctx.fillStyle = COL.moss;
        ctx.fillRect(0, groundY, W, 50);
        ctx.strokeStyle = COL.mossLight;
        ctx.lineWidth = 2;
        for (let x = 10; x < W; x += 25) {
          const h = 8 + Math.sin(x * 0.3) * 4;
          ctx.beginPath();
          ctx.moveTo(x, groundY);
          ctx.quadraticCurveTo(x - 3, groundY - h, x + 2, groundY - h - 2);
          ctx.stroke();
        }
      }

      function drawLanterns() {
        for (const l of lanterns) {
          const pr = 1 + Math.sin(l.pulse) * 0.15;

          const grad = ctx.createRadialGradient(l.x, l.y, 5, l.x, l.y, l.r * 2.5 * pr);
          grad.addColorStop(0, COL.lanternGlow);
          grad.addColorStop(1, "rgba(232, 192, 72, 0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(l.x, l.y, l.r * 2.5 * pr, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = COL.lanternPetal;
          for (let p = 0; p < 4; p++) {
            const angle = (p / 4) * Math.PI * 2 + l.pulse * 0.2;
            ctx.beginPath();
            ctx.ellipse(l.x + Math.cos(angle) * 8 * pr, l.y + Math.sin(angle) * 8 * pr, 5, 9, angle, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.beginPath();
          ctx.arc(l.x, l.y, 5, 0, Math.PI * 2);
          ctx.fillStyle = COL.lanternCore;
          ctx.fill();

          ctx.strokeStyle = COL.moss;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(l.x, l.y + l.r);
          ctx.lineTo(l.x, H - 50);
          ctx.stroke();
        }
      }

      function drawFireflies() {
        for (const f of fireflies) {
          const alpha = clamp(f.life / 2, 0, 1);
          const gs = (Math.sin(f.glow) * 0.3 + 1) * f.size * 2;

          const grad = ctx.createRadialGradient(f.x, f.y, f.size * 0.3, f.x, f.y, gs);
          grad.addColorStop(0, `rgba(232, 208, 96, ${alpha * 0.6})`);
          grad.addColorStop(1, "rgba(232, 208, 96, 0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(f.x, f.y, gs, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.arc(f.x, f.y, f.size * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(232, 208, 96, ${alpha})`;
          ctx.fill();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawWindIndicator() {
        if (mode !== "running") return;
        if (Math.abs(windX) < 2 && Math.abs(windY) < 2) return;
        const len = Math.hypot(windX, windY);
        const nx = windX / len, ny = windY / len;
        const arrowLen = clamp(len * 0.6, 10, 50);

        ctx.strokeStyle = inversed ? COL.inverse : COL.windArrow;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(CX, CY);
        ctx.lineTo(CX + nx * arrowLen, CY + ny * arrowLen);
        ctx.stroke();

        const ax = CX + nx * arrowLen, ay = CY + ny * arrowLen;
        const angle = Math.atan2(ny, nx);
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - Math.cos(angle - 0.4) * 10, ay - Math.sin(angle - 0.4) * 10);
        ctx.moveTo(ax, ay);
        ctx.lineTo(ax - Math.cos(angle + 0.4) * 10, ay - Math.sin(angle + 0.4) * 10);
        ctx.stroke();
      }

      function drawInverseWarning() {
        const alpha = Math.sin(elapsed * 6) * 0.15 + 0.2;
        ctx.strokeStyle = `rgba(180, 100, 120, ${alpha})`;
        ctx.lineWidth = 4;
        ctx.strokeRect(4, 4, W - 8, H - 8);

        ctx.fillStyle = COL.inverse;
        ctx.font = "bold 14px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(`\uc5ed\ud48d ${Math.ceil(inverseTimer)}`, CX, 12);
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = "500 15px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${guided} / ${TARGET}`, 24, 20);

        const dotY = H - 24;
        for (let i = 0; i < MAX_LOST; i++) {
          const dotX = CX - (MAX_LOST - 1) * 8 + i * 16;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 4, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_LOST - lost ? COL.firefly : "rgba(60, 70, 80, 0.5)";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(30, 42, 64, 0.95)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.lanternCore;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 22px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px 'Noto Sans KR', sans-serif";
        ctx.fillStyle = "rgba(208, 200, 160, 0.7)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);

        ctx.fillStyle = "rgba(208, 200, 160, 0.4)";
        ctx.font = "400 13px 'Noto Sans KR', sans-serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(20, 30, 50, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\ubc18\ub527\ubd88 \ubaa9\ub3d9", [
          "\ubc14\ub78c\uc73c\ub85c \ubc18\ub527\ubd88\uc744",
          "\uaf43 \ub4f1\ubd88\ub85c \uc548\ub0b4\ud558\uc138\uc694",
          "",
          "\uc870\uc791: \ud130\uce58/\ub4dc\ub798\uadf8\ub85c \ubc14\ub78c \ubc29\ud5a5",
          "\ud074\ub9ac\uc5b4: 20\ub9c8\ub9ac \uc548\ub0b4",
          "\uc2e4\ud328: 5\ub9c8\ub9ac \uc18c\uc2e4",
        ], COL.lanternCore);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(20, 30, 50, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("\uc628\uc2e4\uc758 \ubc24", [
            `${Math.ceil(elapsed)}\ucd08 \ub9cc\uc5d0 \uc644\ub8cc`,
            `\uc548\ub0b4: ${guided}\ub9c8\ub9ac`,
          ], COL.lanternCore);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(20, 15, 25, 0.4)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\uc5b4\ub460 \uc18d\uc73c\ub85c", [
          "\ub108\ubb34 \ub9ce\uc740 \ubc18\ub527\ubd88\uc774 \uc0ac\ub77c\uc84c\uc2b5\ub2c8\ub2e4",
          `\uc548\ub0b4: ${guided} / ${TARGET}`,
        ], COL.inverse);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        isPointerDown = true;
        const p = getCanvasPos(e.clientX, e.clientY);
        pointerX = p.x; pointerY = p.y;
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || !isPointerDown) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        pointerX = p.x; pointerY = p.y;
      });

      canvas.addEventListener("pointerup", () => { isPointerDown = false; });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;

        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          guided, lost, inversed,
          result: window.relayStageResult.status,
          fireflies: fireflies.length,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          guided = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          lost = MAX_LOST;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      initStars();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
