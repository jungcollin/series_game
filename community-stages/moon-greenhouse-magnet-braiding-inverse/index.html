<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Greenhouse: Magnet Braid</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(125, 211, 252, 0.14), transparent 34%),
          radial-gradient(circle at 24% 22%, rgba(251, 191, 36, 0.11), transparent 26%),
          linear-gradient(180deg, #04111e 0%, #071c2d 44%, #03111b 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(125, 211, 252, 0.25);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(3, 11, 20, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(236, 253, 245, 0.95);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Moon Greenhouse: Magnet Braid. 캔버스를 터치하거나 Enter로 시작하세요.
      포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 역전 신호가 켜질 때 반대 입력 대비,
      모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      역전 구간을 모두 견디고 에너지 구슬 5개를 다른 극 문에 모두 인도하면 클리어.
      역전 버스트에 연속으로 휘말리거나 같은 극이 연속 충돌해 과열되면 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Moon Greenhouse: Magnet Braid"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "moon-greenhouse-magnet-braiding-inverse";
      const STAGE_TITLE = "Moon Greenhouse: Magnet Braid";
      const STAGE_DESCRIPTION =
        "N극과 S극을 꼬아 구슬 5개를 반대 문으로 보내되, 짧은 역전 버스트마다 반대 입력을 견뎌야 하는 월광 온실 퍼즐 러시.";
      const STAGE_CONTROLS =
        "포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const STAGE_CLEAR_CONDITION =
        "역전 구간을 모두 견디고 에너지 구슬 5개를 다른 극 문에 모두 인도하면 클리어";
      const STAGE_FAIL_CONDITION =
        "역전 버스트에 연속으로 휘말리거나 같은 극이 연속 충돌해 과열되면 실패";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const FIELD_RADIUS = 142;
      const NODE_CORE_RADIUS = 24;
      const LOCK_DURATION = 3.6;
      const HOLD_DURATION = 0.34;
      const ORB_RADIUS = 14;
      const MAX_HEAT = 3;
      const MAX_BURST_CHAIN = 2;
      const REQUIRED_DELIVERIES = 5;
      const MOON = { x: 760, y: 112, radius: 64 };
      const BURST_EVENTS = [
        { warn: 3.2, start: 4.9, end: 6.55 },
        { warn: 9.2, start: 10.65, end: 12.25 },
        { warn: 15.0, start: 16.35, end: 17.95 },
        { warn: 20.9, start: 22.15, end: 23.75 },
        { warn: 26.7, start: 27.95, end: 29.55 },
      ];
      const GATES = [
        { id: "south-gate", x: 872, y: 168, radius: 48, polarity: -1, label: "S" },
        { id: "north-gate", x: 872, y: 372, radius: 48, polarity: 1, label: "N" },
      ];
      const NODES = [
        { id: 1, x: 174, y: 156, polarity: 1, label: "A" },
        { id: 2, x: 288, y: 346, polarity: -1, label: "B" },
        { id: 3, x: 406, y: 174, polarity: 1, label: "C" },
        { id: 4, x: 528, y: 338, polarity: -1, label: "D" },
        { id: 5, x: 652, y: 194, polarity: 1, label: "E" },
        { id: 6, x: 776, y: 324, polarity: -1, label: "F" },
      ];
      const POLARITY_COLORS = {
        1: "#7dd3fc",
        "-1": "#ff9ec2",
      };
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const numberFormat = new Intl.NumberFormat("ko-KR");

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const input = {
        pointerId: null,
        nodeId: null,
        holdElapsed: 0,
        holdTriggered: false,
        isDown: false,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        delivered: 0,
        heat: 0,
        burstChain: 0,
        burstContactsThisWindow: 0,
        nodes: createNodes(),
        orb: null,
        spawnTimer: 0.3,
        particles: [],
        popups: [],
        dust: createDust(),
        vinesOffset: 0,
        flash: 0,
        shake: 0,
        burst: {
          phase: "idle",
          eventIndex: -1,
          timeLeft: BURST_EVENTS[0].warn,
          nextIn: BURST_EVENTS[0].warn,
          currentHit: false,
          completed: 0,
        },
        selectedNodeId: 1,
        message: "월광 온실을 정렬하세요.",
        readyPulse: 0,
        restartHint: false,
        lastFailure: "",
      };

      function createNodes() {
        return NODES.map((node) => ({
          ...node,
          glow: Math.random(),
          lockUntil: 0,
        }));
      }

      function createDust() {
        const count = reducedMotion ? 18 : 36;
        return Array.from({ length: count }, (_, index) => ({
          x: (index / count) * VIEW.width,
          y: 84 + Math.random() * (VIEW.height - 140),
          radius: 1.2 + Math.random() * 3.4,
          speed: 10 + Math.random() * 22,
          drift: Math.random() * Math.PI * 2,
          alpha: 0.15 + Math.random() * 0.25,
          tint: index % 2 === 0 ? "rgba(167, 243, 208, 0.55)" : "rgba(186, 230, 253, 0.5)",
        }));
      }

      function createParticle(x, y, color, velocityScale = 1) {
        const angle = Math.random() * Math.PI * 2;
        const speed = (48 + Math.random() * 120) * velocityScale;
        return {
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 6,
          life: 0.45 + Math.random() * 0.4,
          maxLife: 0.45 + Math.random() * 0.4,
          color,
        };
      }

      function addBurstParticles(x, y, color, count) {
        const total = reducedMotion ? Math.min(10, count) : count;
        for (let index = 0; index < total; index += 1) {
          state.particles.push(createParticle(x, y, color, 1));
        }
      }

      function addPopup(text, x, y, color = "#ecfeff", emphasis = 1) {
        state.popups.push({
          text,
          x,
          y,
          color,
          age: 0,
          life: 0.9,
          emphasis,
        });
      }

      function getNodeById(nodeId) {
        return state.nodes.find((node) => node.id === nodeId) || null;
      }

      function selectedNode() {
        return getNodeById(state.selectedNodeId) || state.nodes[0];
      }

      function getNodeAtPosition(x, y) {
        return (
          state.nodes.find((node) => Math.hypot(node.x - x, node.y - y) <= NODE_CORE_RADIUS + 14) ||
          null
        );
      }

      function polarityLabel(value) {
        return value === 1 ? "N" : "S";
      }

      function gateForPolarity(polarity) {
        return GATES.find((gate) => gate.polarity === -polarity) || GATES[0];
      }

      function effectiveNodePolarity(node) {
        if (state.burst.phase === "active" && !isNodeLocked(node)) {
          return node.polarity * -1;
        }
        return node.polarity;
      }

      function isNodeLocked(node) {
        return node.lockUntil > state.elapsed;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function createOrb() {
        const deliveryIndex = state.delivered;
        const polarity = deliveryIndex % 2 === 0 ? 1 : -1;
        const gate = gateForPolarity(polarity);
        return {
          polarity,
          label: polarityLabel(polarity),
          x: 92,
          y: VIEW.height / 2 + (deliveryIndex % 2 === 0 ? -12 : 12),
          vx: 146 + state.delivered * 12 + state.burst.completed * 5,
          vy: 0,
          radius: ORB_RADIUS,
          trail: [],
          pulse: Math.random() * Math.PI * 2,
          targetGateId: gate.id,
        };
      }

      function resetNodes() {
        state.nodes = createNodes();
        state.selectedNodeId = state.nodes[0].id;
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.delivered = 0;
        state.heat = 0;
        state.burstChain = 0;
        state.burstContactsThisWindow = 0;
        state.orb = null;
        state.spawnTimer = 0.4;
        state.particles = [];
        state.popups = [];
        state.dust = createDust();
        state.vinesOffset = 0;
        state.flash = 0;
        state.shake = 0;
        state.message = "첫 구슬이 출발합니다.";
        state.readyPulse = 0;
        state.restartHint = false;
        state.lastFailure = "";
        state.burst = {
          phase: "idle",
          eventIndex: -1,
          timeLeft: BURST_EVENTS[0].warn,
          nextIn: BURST_EVENTS[0].warn,
          currentHit: false,
          completed: 0,
        };
        resetNodes();
        input.pointerId = null;
        input.nodeId = null;
        input.holdElapsed = 0;
        input.holdTriggered = false;
        input.isDown = false;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        canvas.focus();
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastFailure = reason;
        state.restartHint = true;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.restartHint = true;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function markBurstContact(node, orb) {
        if (state.burst.phase !== "active" || isNodeLocked(node)) {
          return;
        }
        if (!state.burst.currentHit) {
          addPopup("역전 관통", orb.x, orb.y - 22, "#fbbf24", 1.2);
          state.flash = Math.max(state.flash, 0.3);
          state.shake = Math.max(state.shake, reducedMotion ? 8 : 14);
        }
        state.burst.currentHit = true;
        state.burstContactsThisWindow += 1;
      }

      function crashOrb(reason, x, y) {
        if (!state.orb || state.mode !== "running") {
          return;
        }
        state.heat += 1;
        state.message = reason;
        addBurstParticles(x, y, "#ff9ec2", 26);
        addBurstParticles(x, y, "#7dd3fc", 16);
        addPopup("과열 +" + numberFormat.format(1), x, y - 14, "#ffb4cf", 1.3);
        state.flash = Math.max(state.flash, 0.45);
        state.shake = Math.max(state.shake, reducedMotion ? 10 : 18);
        state.orb = null;
        state.spawnTimer = 0.9;
        if (state.heat >= MAX_HEAT) {
          failStage("overheat");
        }
      }

      function deliverOrb(gate) {
        if (!state.orb || state.mode !== "running") {
          return;
        }
        addBurstParticles(gate.x, gate.y, gate.polarity === 1 ? "#7dd3fc" : "#ff9ec2", 34);
        addPopup("유도 성공", gate.x - 10, gate.y - 22, "#d9f99d", 1.35);
        state.delivered += 1;
        state.message = `${state.delivered}/${REQUIRED_DELIVERIES} 구슬 인도`;
        state.flash = Math.max(state.flash, 0.18);
        state.orb = null;
        state.spawnTimer = 0.58;
      }

      function toggleSelectedNode() {
        const node = selectedNode();
        if (!node || state.mode !== "running") {
          return;
        }
        if (isNodeLocked(node)) {
          addPopup("고정 유지", node.x, node.y - 32, "#fde68a", 0.95);
          return;
        }
        node.polarity *= -1;
        addPopup(`${node.label} ${polarityLabel(node.polarity)}`, node.x, node.y - 32, POLARITY_COLORS[node.polarity], 1);
        addBurstParticles(node.x, node.y, POLARITY_COLORS[node.polarity], 12);
      }

      function toggleNodeLock(node) {
        if (!node || state.mode !== "running") {
          return;
        }
        if (isNodeLocked(node)) {
          node.lockUntil = state.elapsed;
          addPopup("고정 해제", node.x, node.y - 34, "#fde68a", 0.95);
          return;
        }
        node.lockUntil = state.elapsed + LOCK_DURATION;
        addPopup("자장 고정", node.x, node.y - 34, "#fef3c7", 1.1);
        addBurstParticles(node.x, node.y, "#fef3c7", 16);
      }

      function selectNode(nodeId) {
        if (!getNodeById(nodeId)) {
          return;
        }
        state.selectedNodeId = nodeId;
      }

      function cycleSelectedNode(direction) {
        const index = state.nodes.findIndex((node) => node.id === state.selectedNodeId);
        if (index === -1) {
          selectNode(state.nodes[0].id);
          return;
        }
        const nextIndex = (index + direction + state.nodes.length) % state.nodes.length;
        selectNode(state.nodes[nextIndex].id);
      }

      function updateBurstPhase() {
        const previousPhase = state.burst.phase;
        const previousIndex = state.burst.eventIndex;
        let phase = "idle";
        let eventIndex = -1;
        let timeLeft = 0;
        let nextIn = null;

        for (let index = 0; index < BURST_EVENTS.length; index += 1) {
          const event = BURST_EVENTS[index];
          if (state.elapsed < event.warn) {
            nextIn = nextIn === null ? event.warn - state.elapsed : nextIn;
            break;
          }
          if (state.elapsed >= event.warn && state.elapsed < event.start) {
            phase = "warning";
            eventIndex = index;
            timeLeft = event.start - state.elapsed;
            nextIn = event.start - state.elapsed;
            break;
          }
          if (state.elapsed >= event.start && state.elapsed < event.end) {
            phase = "active";
            eventIndex = index;
            timeLeft = event.end - state.elapsed;
            break;
          }
        }

        if (phase === "idle" && nextIn === null) {
          nextIn = 0;
        }

        state.burst.timeLeft = timeLeft;
        state.burst.nextIn = nextIn;

        if (phase === previousPhase && eventIndex === previousIndex) {
          return;
        }

        if (previousPhase === "active" && previousIndex !== -1) {
          if (state.burst.currentHit) {
            state.burstChain += 1;
            addPopup(`버스트 연속 ${state.burstChain}/2`, VIEW.width / 2, 72, "#fbbf24", 1.2);
            state.message = "역전 버스트가 정원에 스며듭니다.";
          } else {
            if (state.burstChain > 0) {
              addPopup("자장 안정화", VIEW.width / 2, 72, "#d9f99d", 1.05);
            }
            state.burstChain = 0;
            state.message = "버스트를 견뎠습니다.";
          }
          state.burst.completed = Math.max(state.burst.completed, previousIndex + 1);
          state.burst.currentHit = false;
          if (state.burstChain >= MAX_BURST_CHAIN) {
            failStage("inverse-burst");
          }
        }

        if (phase === "warning") {
          addPopup("역전 신호", VIEW.width / 2, 76, "#c4b5fd", 1);
          state.message = "반대 입력 대비";
        } else if (phase === "active") {
          addPopup("INVERSE BURST", VIEW.width / 2, 76, "#fbbf24", 1.3);
          state.flash = Math.max(state.flash, 0.34);
          state.shake = Math.max(state.shake, reducedMotion ? 8 : 12);
          state.message = "잠금되지 않은 노드가 반전됩니다.";
        }

        state.burst.phase = phase;
        state.burst.eventIndex = eventIndex;
      }

      function maybeSpawnOrb(dt) {
        if (state.delivered >= REQUIRED_DELIVERIES || state.orb || state.mode !== "running") {
          return;
        }
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0) {
          state.orb = createOrb();
          addPopup(`${state.orb.label} 구슬 진입`, 108, 232, POLARITY_COLORS[state.orb.polarity], 1.05);
          state.message = `${state.orb.label} 구슬을 ${gateForPolarity(state.orb.polarity).label} 문으로 유도하세요.`;
        }
      }

      function updateOrb(dt) {
        if (!state.orb) {
          return;
        }

        const orb = state.orb;
        const targetGate = gateForPolarity(orb.polarity);
        orb.pulse += dt * 5;
        const speedTarget = 150 + state.delivered * 12 + state.burst.completed * 6;
        orb.vx += (speedTarget - orb.vx) * Math.min(1, dt * 2.8);
        orb.vy *= 0.98;
        orb.vy += Math.sin(state.elapsed * 2.2 + orb.x * 0.02) * dt * 34;
        orb.vy += (targetGate.y - orb.y) * dt * 0.055;

        for (const node of state.nodes) {
          const dx = node.x - orb.x;
          const dy = node.y - orb.y;
          const distance = Math.hypot(dx, dy);
          if (distance >= FIELD_RADIUS) {
            continue;
          }

          const influence = 1 - distance / FIELD_RADIUS;
          const effectivePolarity = effectiveNodePolarity(node);
          const samePole = effectivePolarity === orb.polarity;
          const desiredY = samePole ? VIEW.height - node.y : node.y;
          orb.vy += (desiredY - orb.y) * influence * dt * 1.65;
          orb.vx += (samePole ? -12 : 14) * influence * dt;

          if (state.burst.phase === "active" && !isNodeLocked(node) && distance < 76) {
            markBurstContact(node, orb);
          }

          if (samePole && distance < NODE_CORE_RADIUS + orb.radius - 2) {
            crashOrb("같은 극 충돌", orb.x, orb.y);
            return;
          }
        }

        orb.x += orb.vx * dt;
        orb.y += orb.vy * dt;

        if (orb.y < 70) {
          orb.y = 70;
          orb.vy = Math.abs(orb.vy) * 0.35;
        } else if (orb.y > VIEW.height - 70) {
          orb.y = VIEW.height - 70;
          orb.vy = -Math.abs(orb.vy) * 0.35;
        }

        orb.trail.push({ x: orb.x, y: orb.y, age: 0 });
        if (orb.trail.length > 20) {
          orb.trail.shift();
        }
        for (const trail of orb.trail) {
          trail.age += dt;
        }

        for (const gate of GATES) {
          const dx = gate.x - orb.x;
          const dy = gate.y - orb.y;
          const distance = Math.hypot(dx, dy);
          if (distance <= gate.radius + orb.radius - 4) {
            if (gate.polarity === -orb.polarity) {
              deliverOrb(gate);
            } else {
              crashOrb("같은 극 문 반발", orb.x, orb.y);
            }
            return;
          }
        }

        if (orb.x > VIEW.width + 48 || orb.x < -24) {
          crashOrb("궤도 이탈", orb.x, orb.y);
        }
      }

      function updateDust(dt) {
        for (const mote of state.dust) {
          mote.x -= mote.speed * dt;
          mote.y += Math.sin(state.elapsed * 0.8 + mote.drift) * dt * 4;
          if (mote.x < -12) {
            mote.x = VIEW.width + 12;
            mote.y = 80 + Math.random() * (VIEW.height - 140);
          }
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 12 * dt;
          particle.size *= 0.992;
          return particle.life > 0.01 && particle.size > 0.4;
        });

        state.popups = state.popups.filter((popup) => {
          popup.age += dt;
          popup.y -= 22 * dt;
          return popup.age < popup.life;
        });

        state.flash = Math.max(0, state.flash - dt * 1.8);
        state.shake = Math.max(0, state.shake - dt * 24);
      }

      function updateHold(dt) {
        if (!input.isDown || input.pointerId === null || input.holdTriggered || state.mode !== "running") {
          return;
        }
        const node = getNodeById(input.nodeId);
        if (!node) {
          return;
        }
        input.holdElapsed += dt;
        if (input.holdElapsed >= HOLD_DURATION) {
          input.holdTriggered = true;
          toggleNodeLock(node);
        }
      }

      function update(dt) {
        if (state.mode !== "running") {
          updateDust(dt);
          updateParticles(dt);
          return;
        }

        state.elapsed += dt;
        state.vinesOffset += dt * 0.8;
        state.readyPulse += dt * 3.5;

        updateBurstPhase();
        updateDust(dt);
        updateHold(dt);
        maybeSpawnOrb(dt);
        updateOrb(dt);
        updateParticles(dt);

        for (const node of state.nodes) {
          node.glow += dt * 0.6;
        }

        if (
          state.delivered >= REQUIRED_DELIVERIES &&
          !state.orb &&
          state.burst.completed >= BURST_EVENTS.length &&
          state.burst.phase === "idle"
        ) {
          clearStage();
        }
      }

      function formatSeconds(value) {
        return `${Math.max(0, value).toFixed(1)}s`;
      }

      function renderBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#06192c");
        sky.addColorStop(0.5, "#0b2430");
        sky.addColorStop(1, "#031018");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const moonGlow = ctx.createRadialGradient(MOON.x, MOON.y, 8, MOON.x, MOON.y, 140);
        moonGlow.addColorStop(0, "rgba(236, 253, 245, 0.95)");
        moonGlow.addColorStop(0.18, "rgba(186, 230, 253, 0.92)");
        moonGlow.addColorStop(0.45, "rgba(125, 211, 252, 0.24)");
        moonGlow.addColorStop(1, "rgba(125, 211, 252, 0)");
        ctx.fillStyle = moonGlow;
        ctx.beginPath();
        ctx.arc(MOON.x, MOON.y, 140, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(236, 253, 245, 0.82)";
        ctx.beginPath();
        ctx.arc(MOON.x, MOON.y, MOON.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(186, 230, 253, 0.18)";
        ctx.lineWidth = 2;
        for (let index = 0; index < 6; index += 1) {
          const x = 76 + index * 164;
          ctx.beginPath();
          ctx.moveTo(x, VIEW.height - 44);
          ctx.quadraticCurveTo(x + 10, 72, x + 24, VIEW.height - 44);
          ctx.stroke();
        }

        ctx.strokeStyle = "rgba(167, 243, 208, 0.12)";
        ctx.lineWidth = 1;
        for (let row = 0; row < 7; row += 1) {
          const y = 108 + row * 54;
          ctx.beginPath();
          ctx.moveTo(40, y);
          ctx.lineTo(VIEW.width - 40, y + Math.sin(row + state.vinesOffset) * 8);
          ctx.stroke();
        }

        const ground = ctx.createLinearGradient(0, 360, 0, VIEW.height);
        ground.addColorStop(0, "rgba(8, 31, 41, 0)");
        ground.addColorStop(0.2, "rgba(4, 20, 30, 0.3)");
        ground.addColorStop(1, "rgba(3, 11, 20, 0.88)");
        ctx.fillStyle = ground;
        ctx.fillRect(0, 330, VIEW.width, VIEW.height - 330);

        ctx.strokeStyle = "rgba(52, 211, 153, 0.15)";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(0, 442);
        ctx.bezierCurveTo(240, 402, 480, 478, VIEW.width, 422);
        ctx.stroke();

        for (const mote of state.dust) {
          ctx.fillStyle = mote.tint.replace(/0\.\d+\)/, `${mote.alpha})`);
          ctx.beginPath();
          ctx.arc(mote.x, mote.y, mote.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function renderBraids() {
        const topPath = [
          { x: 88, y: 268 },
          ...state.nodes.map((node) => ({ x: node.x, y: node.y })),
          { x: 876, y: 166 },
        ];
        const bottomPath = [
          { x: 88, y: 274 },
          ...state.nodes.map((node) => ({ x: node.x, y: VIEW.height - node.y })),
          { x: 876, y: 374 },
        ];

        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        for (const [index, path] of [topPath, bottomPath].entries()) {
          const braid = ctx.createLinearGradient(0, 120, VIEW.width, 420);
          braid.addColorStop(0, index === 0 ? "rgba(125, 211, 252, 0.2)" : "rgba(255, 158, 194, 0.16)");
          braid.addColorStop(0.5, "rgba(217, 249, 157, 0.22)");
          braid.addColorStop(1, index === 0 ? "rgba(255, 158, 194, 0.18)" : "rgba(125, 211, 252, 0.18)");
          ctx.strokeStyle = braid;
          ctx.lineWidth = 16;
          ctx.shadowColor = index === 0 ? "rgba(125, 211, 252, 0.2)" : "rgba(255, 158, 194, 0.18)";
          ctx.shadowBlur = 18;
          ctx.beginPath();
          ctx.moveTo(path[0].x, path[0].y);
          for (let nodeIndex = 1; nodeIndex < path.length; nodeIndex += 1) {
            const previous = path[nodeIndex - 1];
            const current = path[nodeIndex];
            const controlX = (previous.x + current.x) / 2;
            ctx.bezierCurveTo(controlX, previous.y, controlX, current.y, current.x, current.y);
          }
          ctx.stroke();
        }
        ctx.restore();
      }

      function renderGate(gate) {
        const color = POLARITY_COLORS[gate.polarity];
        const glow = ctx.createRadialGradient(gate.x, gate.y, 8, gate.x, gate.y, 64);
        glow.addColorStop(0, gate.polarity === 1 ? "rgba(125, 211, 252, 0.9)" : "rgba(255, 158, 194, 0.86)");
        glow.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(gate.x, gate.y, 64, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(3, 11, 20, 0.8)";
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.roundRect(gate.x - 42, gate.y - 54, 86, 108, 28);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "rgba(236, 253, 245, 0.18)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(gate.x - 22, gate.y - 28);
        ctx.lineTo(gate.x + 22, gate.y - 28);
        ctx.moveTo(gate.x - 22, gate.y + 28);
        ctx.lineTo(gate.x + 22, gate.y + 28);
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.font = "900 34px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(gate.label, gate.x, gate.y + 12);

        ctx.fillStyle = "rgba(236, 253, 245, 0.72)";
        ctx.font = "600 12px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillText("반대 극 문", gate.x, gate.y + 74);
      }

      function renderNode(node) {
        const selected = node.id === state.selectedNodeId;
        const locked = isNodeLocked(node);
        const actualPolarity = node.polarity;
        const displayPolarity = effectiveNodePolarity(node);
        const color = POLARITY_COLORS[displayPolarity];
        const labelAlpha = state.burst.phase === "active" && !locked ? 0.92 : 0.78;
        const pulse = 0.5 + Math.sin(state.elapsed * 4 + node.id) * 0.5;

        ctx.save();

        const halo = ctx.createRadialGradient(node.x, node.y, 4, node.x, node.y, 72);
        halo.addColorStop(0, displayPolarity === 1 ? "rgba(125, 211, 252, 0.28)" : "rgba(255, 158, 194, 0.28)");
        halo.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(node.x, node.y, 72 + pulse * 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(6, 24, 34, 0.9)";
        ctx.strokeStyle = selected ? "rgba(236, 253, 245, 0.88)" : "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = selected ? 3.5 : 2;
        ctx.beginPath();
        ctx.arc(node.x, node.y, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.globalAlpha = labelAlpha;
        ctx.font = "900 22px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(polarityLabel(displayPolarity), node.x, node.y + 8);
        ctx.globalAlpha = 1;

        ctx.fillStyle = "rgba(236, 253, 245, 0.72)";
        ctx.font = "700 12px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillText(node.label, node.x, node.y - 38);

        if (locked) {
          const remaining = Math.max(0, node.lockUntil - state.elapsed);
          ctx.strokeStyle = "rgba(253, 230, 138, 0.92)";
          ctx.lineWidth = 3;
          ctx.setLineDash([14, 8]);
          ctx.lineDashOffset = -state.elapsed * 20;
          ctx.beginPath();
          ctx.arc(node.x, node.y, 38, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);

          ctx.fillStyle = "rgba(254, 243, 199, 0.92)";
          ctx.font = "800 11px 'Avenir Next', 'Trebuchet MS', sans-serif";
          ctx.fillText(`LOCK ${remaining.toFixed(1)}s`, node.x, node.y + 52);
        } else if (state.burst.phase === "active") {
          ctx.strokeStyle = "rgba(251, 191, 36, 0.32)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(node.x, node.y, 40, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (selected) {
          ctx.strokeStyle = "rgba(236, 253, 245, 0.72)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(node.x, node.y, 48 + pulse * 2, 0, Math.PI * 2);
          ctx.stroke();
        }

        if (actualPolarity !== displayPolarity) {
          ctx.fillStyle = "rgba(251, 191, 36, 0.94)";
          ctx.font = "800 11px 'Avenir Next', 'Trebuchet MS', sans-serif";
          ctx.fillText("INV", node.x, node.y - 54);
        }

        ctx.restore();
      }

      function renderOrb() {
        if (!state.orb) {
          return;
        }
        const orb = state.orb;
        for (const trail of orb.trail) {
          const alpha = Math.max(0, 1 - trail.age * 4);
          ctx.fillStyle =
            orb.polarity === 1
              ? `rgba(125, 211, 252, ${alpha * 0.25})`
              : `rgba(255, 158, 194, ${alpha * 0.22})`;
          ctx.beginPath();
          ctx.arc(trail.x, trail.y, orb.radius * (0.45 + alpha * 0.7), 0, Math.PI * 2);
          ctx.fill();
        }

        const glow = ctx.createRadialGradient(orb.x, orb.y, 4, orb.x, orb.y, 48);
        glow.addColorStop(0, orb.polarity === 1 ? "rgba(125, 211, 252, 0.92)" : "rgba(255, 158, 194, 0.92)");
        glow.addColorStop(1, "rgba(255, 255, 255, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, 48, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(3, 11, 20, 0.92)";
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = POLARITY_COLORS[orb.polarity];
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, orb.radius - 2, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = POLARITY_COLORS[orb.polarity];
        ctx.font = "900 16px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(orb.label, orb.x, orb.y + 6);
      }

      function renderParticles() {
        for (const particle of state.particles) {
          const alpha = Math.max(0, particle.life / particle.maxLife);
          ctx.fillStyle = particle.color.replace(/\)$/u, `, ${alpha})`).replace(/rgb(a)?\(/u, "rgba(");
          if (!particle.color.startsWith("rgb")) {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = alpha;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        for (const popup of state.popups) {
          const alpha = 1 - popup.age / popup.life;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = `${Math.round(14 + popup.emphasis * 6)}px 'Avenir Next', 'Trebuchet MS', sans-serif`;
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.globalAlpha = 1;
        }
      }

      function renderHud() {
        ctx.save();
        ctx.fillStyle = "rgba(2, 12, 20, 0.78)";
        ctx.beginPath();
        ctx.roundRect(24, 20, 912, 66, 22);
        ctx.fill();

        ctx.fillStyle = "rgba(236, 253, 245, 0.92)";
        ctx.font = "700 14px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`인도 ${state.delivered}/${REQUIRED_DELIVERIES}`, 44, 44);
        ctx.fillText(`과열 ${state.heat}/${MAX_HEAT}`, 180, 44);
        ctx.fillText(`버스트 ${state.burstChain}/${MAX_BURST_CHAIN}`, 296, 44);
        ctx.fillText(`릴레이 ${relayContext.clearCount} 클리어`, 420, 44);

        const burstText =
          state.burst.phase === "warning"
            ? `역전 예고 ${formatSeconds(state.burst.timeLeft)}`
            : state.burst.phase === "active"
              ? `역전 진행 ${formatSeconds(state.burst.timeLeft)}`
              : state.burst.completed >= BURST_EVENTS.length
                ? "모든 역전 종료"
                : `다음 역전 ${formatSeconds(state.burst.nextIn)}`;
        ctx.fillText(burstText, 580, 44);

        const node = selectedNode();
        const locked = node ? isNodeLocked(node) : false;
        const effective = node ? polarityLabel(effectiveNodePolarity(node)) : "-";
        ctx.fillText(`선택 ${node ? node.label : "-"} / ${effective}${locked ? " / LOCK" : ""}`, 770, 44);

        ctx.fillStyle = "rgba(203, 213, 225, 0.82)";
        ctx.font = "600 12px 'Avenir Next', 'Trebuchet MS', sans-serif";
        ctx.fillText(state.message, 44, 66);
        ctx.fillText("탭: 전환  길게: 고정  드래그: 노드 이동", 580, 66);
        ctx.restore();
      }

        ctx.beginPath();
        ctx.roundRect(170, 96, 620, 348, 34);

      function renderMenu() {
        renderOverlayCard("Magnet Braid", STAGE_DESCRIPTION, "rgba(125, 211, 252, 0.82)", [
          { label: "조작", value: "노드 탭 전환, 길게 눌러 고정, 드래그로 선택", color: "#7dd3fc" },
          { label: "클리어", value: STAGE_CLEAR_CONDITION, color: "#d9f99d" },
          { label: "실패", value: STAGE_FAIL_CONDITION, color: "#ff9ec2" },
          { label: "시작", value: "화면 터치 또는 Enter", color: "#fbbf24" },
        ]);
      }

      function renderFailed() {
        renderOverlayCard("Greenhouse Melt", "역전 버스트가 정원을 잠식했습니다.", "rgba(255, 158, 194, 0.9)", [
          { label: "결과", value: `${state.delivered}/${REQUIRED_DELIVERIES} 인도, 과열 ${state.heat}/${MAX_HEAT}`, color: "#ff9ec2" },
          { label: "원인", value: state.lastFailure === "inverse-burst" ? "연속 역전 피격" : "같은 극 과열", color: "#fbbf24" },
          { label: "재시작", value: "화면 터치 또는 Enter", color: "#7dd3fc" },
        ]);
      }

      function renderCleared() {
        renderOverlayCard("Moon Route Complete", "다섯 구슬과 모든 역전 구간을 완전히 제어했습니다.", "rgba(167, 243, 208, 0.9)", [
          { label: "결과", value: `${state.delivered}/${REQUIRED_DELIVERIES} 인도, ${formatSeconds(state.lastRunTime)} 클리어`, color: "#d9f99d" },
          { label: "릴레이", value: `${relayContext.clearCount + 1}번째 승수 반영`, color: "#7dd3fc" },
          { label: "재도전", value: "화면 터치 또는 Enter", color: "#fbbf24" },
        ]);
      }

      function renderBurstWash() {
        if (state.burst.phase !== "active" && state.burst.phase !== "warning") {
          return;
        }

        const alpha = state.burst.phase === "active" ? 0.18 : 0.08;
        const wave = ctx.createLinearGradient(0, 0, VIEW.width, 0);
        wave.addColorStop(0, `rgba(125, 211, 252, ${alpha})`);
        wave.addColorStop(0.5, `rgba(251, 191, 36, ${alpha + 0.06})`);
        wave.addColorStop(1, `rgba(255, 158, 194, ${alpha})`);
        ctx.fillStyle = wave;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);

        renderBackground();
        renderBraids();
        for (const gate of GATES) {
          renderGate(gate);
        }
        for (const node of state.nodes) {
          renderNode(node);
        }
        renderOrb();
        renderBurstWash();
        renderParticles();
        renderHud();

        if (state.mode === "menu") {
          renderMenu();
        } else if (state.mode === "failed") {
          renderFailed();
        } else if (state.mode === "cleared") {
          renderCleared();
        }

        if (state.flash > 0.01) {
          ctx.fillStyle = `rgba(255, 255, 255, ${state.flash * 0.22})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        ctx.restore();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        update(delta);
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function stepSimulation(ms) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      }

      function pointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function startFromPointer(event) {
        const { x, y } = pointerPosition(event);
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          render();
          return;
        }

        const node = getNodeAtPosition(x, y);
        if (!node) {
          return;
        }

        input.pointerId = event.pointerId;
        input.nodeId = node.id;
        input.holdElapsed = 0;
        input.holdTriggered = false;
        input.isDown = true;
        selectNode(node.id);
        try {
          canvas.setPointerCapture(event.pointerId);
        } catch (error) {
          /* noop */
        }
      }

      function movePointer(event) {
        if (!input.isDown || event.pointerId !== input.pointerId) {
          return;
        }
        const { x, y } = pointerPosition(event);
        const node = getNodeAtPosition(x, y);
        if (node && node.id !== input.nodeId) {
          input.nodeId = node.id;
          input.holdElapsed = 0;
          input.holdTriggered = false;
          selectNode(node.id);
        }
      }

      function releasePointer(event) {
        if (input.pointerId !== null && event.pointerId === input.pointerId) {
          try {
            canvas.releasePointerCapture(event.pointerId);
          } catch (error) {
            /* noop */
          }
        }

        if (!input.isDown || event.pointerId !== input.pointerId) {
          input.pointerId = null;
          input.nodeId = null;
          input.isDown = false;
          return;
        }

        if (!input.holdTriggered) {
          toggleSelectedNode();
        }

        input.pointerId = null;
        input.nodeId = null;
        input.holdElapsed = 0;
        input.holdTriggered = false;
        input.isDown = false;
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          } else {
            toggleSelectedNode();
          }
          event.preventDefault();
          return;
        }

        if (event.key === " " || event.key === "Spacebar") {
          toggleSelectedNode();
          event.preventDefault();
          return;
        }

        if (event.key === "ArrowLeft") {
          cycleSelectedNode(-1);
          event.preventDefault();
          return;
        }

        if (event.key === "ArrowRight") {
          cycleSelectedNode(1);
          event.preventDefault();
          return;
        }

        if (event.key.toLowerCase() === "f") {
          if (state.mode === "running") {
            toggleNodeLock(selectedNode());
          } else if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen?.().catch(() => {});
          } else {
            document.exitFullscreen?.().catch(() => {});
          }
          event.preventDefault();
          return;
        }

        if (event.key === "Escape" && document.fullscreenElement) {
          document.exitFullscreen?.().catch(() => {});
        }
      }

      canvas.addEventListener("pointerdown", startFromPointer);
      canvas.addEventListener("pointermove", movePointer);
      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);
      canvas.addEventListener("lostpointercapture", () => {
        input.pointerId = null;
        input.nodeId = null;
        input.isDown = false;
        input.holdTriggered = false;
        input.holdElapsed = 0;
      });
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("keydown", onKeyDown);

      window.render_game_to_text = function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          coordSpace: "origin top-left, +x right, +y down",
          delivered: state.delivered,
          heat: state.heat,
          burstChain: state.burstChain,
          burst: {
            phase: state.burst.phase,
            eventIndex: state.burst.eventIndex,
            timeLeft: Number((state.burst.timeLeft || 0).toFixed(2)),
            nextIn: Number((state.burst.nextIn || 0).toFixed(2)),
            completed: state.burst.completed,
          },
          selectedNode: state.selectedNodeId,
          nodes: state.nodes.map((node) => ({
            id: node.id,
            x: Math.round(node.x),
            y: Math.round(node.y),
            polarity: polarityLabel(node.polarity),
            effectivePolarity: polarityLabel(effectiveNodePolarity(node)),
            locked: isNodeLocked(node),
          })),
          orb: state.orb
            ? {
                x: Number(state.orb.x.toFixed(1)),
                y: Number(state.orb.y.toFixed(1)),
                vx: Number(state.orb.vx.toFixed(1)),
                vy: Number(state.orb.vy.toFixed(1)),
                polarity: state.orb.label,
                targetGate: state.orb.targetGateId,
              }
            : null,
          gates: GATES.map((gate) => ({
            id: gate.id,
            x: gate.x,
            y: gate.y,
            polarity: gate.label,
          })),
          message: state.message,
        });
      };

      window.advanceTime = function advanceTime(ms) {
        stepSimulation(ms);
      };

      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        creator: "jungcollin",
        genre: "Magnetic routing / 역전 버스트",
        clearCondition: STAGE_CLEAR_CONDITION,
      };

      window.relayStageResult = { status: "running" };

      window.relayStageDebug = {
        forceClear() {
          state.delivered = REQUIRED_DELIVERIES;
          state.burst.completed = BURST_EVENTS.length;
          state.burst.phase = "idle";
          state.orb = null;
          state.elapsed = Math.max(state.elapsed, BURST_EVENTS[BURST_EVENTS.length - 1].end + 0.1);
          clearStage();
          render();
        },
        forceFail() {
          state.heat = MAX_HEAT;
          failStage("debug");
          render();
        },
      };

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
