<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Orbit Shepherd</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(110, 231, 255, 0.24), transparent 38%),
          radial-gradient(circle at bottom, rgba(255, 120, 160, 0.2), transparent 32%),
          #050816;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 15, 31, 0.92);
        color: #eff7ff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(236, 254, 255, 0.94);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Orbit Shepherd. 마우스/터치 드래그로 비콘 이동, 클릭/탭으로
      궤도 반전, 박자 링이 맞을 때 핵심 입력, 모바일은 터치와 드래그만으로 플레이.
      박자 창을 놓치지 않고 위성 3기를 목표 링에 순서대로 통과시키기. 박자 밖 핵심
      입력을 연속으로 쓰거나 위성이 소멸 구역에 닿으면 즉시 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Crystal Foundry: Orbit Shepherd"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const BEAT_INTERVAL = 1.1;
      const BEAT_WINDOW = 0.13;
      const GATE_OPEN_DURATION = 0.82;
      const POINTER_TAP_DISTANCE = 14;
      const POINTER_TAP_TIME = 0.28;
      const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const AUTOMATED_RENDER = navigator.webdriver === true;
      const relayContext =
        window.RelayRuntime?.readContext("crystal-foundry-orbit-herding-tempo") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const STAGE_DESCRIPTION =
        "비콘 주위 위성 떼를 박자 창에 맞춰 뒤집어 순서 문 3개를 통과시키는 수정 주조소 퍼즐.";
      const STAGE_CONTROLS =
        "마우스/터치 드래그로 비콘 이동, 클릭/탭으로 궤도 반전, 박자 링이 맞을 때 핵심 입력, 모바일은 터치와 드래그만으로 플레이";
      const STAGE_CLEAR_CONDITION =
        "박자 창을 놓치지 않고 위성 3기를 목표 링에 순서대로 통과시키기";
      const STAGE_FAIL_CONDITION =
        "박자 밖 핵심 입력을 연속으로 쓰거나 위성이 소멸 구역에 닿으면 즉시 실패";

      const SATELLITE_CONFIGS = [
        {
          id: "amber",
          label: "A",
          name: "Amber",
          color: "#f59e0b",
          glow: "rgba(245, 158, 11, 0.56)",
          trail: "rgba(251, 191, 36, 0.4)",
          orbitRadius: 72,
          angle: -0.8,
          speed: 1.62,
          ellipse: 0.78,
          size: 12,
        },
        {
          id: "cyan",
          label: "B",
          name: "Cyan",
          color: "#22d3ee",
          glow: "rgba(34, 211, 238, 0.54)",
          trail: "rgba(125, 211, 252, 0.38)",
          orbitRadius: 102,
          angle: 1.7,
          speed: 1.34,
          ellipse: 0.72,
          size: 14,
        },
        {
          id: "violet",
          label: "C",
          name: "Violet",
          color: "#c084fc",
          glow: "rgba(192, 132, 252, 0.52)",
          trail: "rgba(216, 180, 254, 0.36)",
          orbitRadius: 136,
          angle: 3.5,
          speed: 1.12,
          ellipse: 0.68,
          size: 15,
        },
      ];

      const GATES = [
        {
          x: 764,
          y: 162,
          radius: 34,
          label: "Gate 01",
          targetSatellite: 0,
          color: "#f59e0b",
          halo: "rgba(251, 191, 36, 0.24)",
        },
        {
          x: 232,
          y: 170,
          radius: 38,
          label: "Gate 02",
          targetSatellite: 1,
          color: "#22d3ee",
          halo: "rgba(34, 211, 238, 0.22)",
        },
        {
          x: 704,
          y: 392,
          radius: 42,
          label: "Gate 03",
          targetSatellite: 2,
          color: "#c084fc",
          halo: "rgba(192, 132, 252, 0.22)",
        },
      ];

      const HAZARDS = [
        { x: 178, y: 400, radius: 42, color: "#fb7185", spin: 1.2 },
        { x: 486, y: 114, radius: 46, color: "#fb7185", spin: -1.05 },
        { x: 820, y: 422, radius: 48, color: "#fb7185", spin: 1.36 },
      ];

      const pointer = {
        down: false,
        id: null,
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,
        startElapsed: 0,
        moved: false,
        ignoreTap: false,
      };

      const keys = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostClearedReported = false;
      let hostFailedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        orbitDirection: 1,
        beatPulse: 0,
        gateOpenTimer: 0,
        misfireStreak: 0,
        gateIndex: 0,
        pulseBoost: 0,
        flash: 0,
        heat: 0.18,
        shake: 0,
        lastJudgement: "READY",
        judgementTimer: 0,
        combo: 0,
        beacon: createBeacon(),
        satellites: createSatellites(),
        particles: [],
        popups: [],
        crystalDrift: buildCrystalDrift(),
        shimmer: 0,
        ringPulse: 0,
        targetMarkerAlpha: 0,
        lastReason: "",
      };

      function createBeacon() {
        return {
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.55,
          targetX: VIEW.width * 0.5,
          targetY: VIEW.height * 0.55,
          radius: 24,
          glow: 0,
        };
      }

      function createSatellites() {
        return SATELLITE_CONFIGS.map((config) => ({
          ...config,
          passed: false,
          resonance: 0,
          x: 0,
          y: 0,
        }));
      }

      function buildCrystalDrift() {
        return Array.from({ length: REDUCED_MOTION ? 12 : 22 }, (_, index) => ({
          x: ((index * 127) % VIEW.width) + (index % 3) * 16,
          y: ((index * 83) % VIEW.height) + (index % 4) * 12,
          size: 16 + (index % 5) * 10,
          sway: 0.35 + (index % 7) * 0.07,
          speed: 0.2 + (index % 6) * 0.04,
          depth: 0.2 + (index % 5) * 0.16,
        }));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, t) {
        return start + (end - start) * t;
      }

      function dist(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function round(value, precision = 1) {
        const factor = 10 ** precision;
        return Math.round(value * factor) / factor;
      }

      function wrapText(text, maxWidth) {
        const words = String(text || "").split(/\s+/);
        const lines = [];
        let line = "";
        for (const word of words) {
          const next = line ? `${line} ${word}` : word;
          if (ctx.measureText(next).width <= maxWidth || !line) {
            line = next;
            continue;
          }
          lines.push(line);
          line = word;
        }
        if (line) {
          lines.push(line);
        }
        return lines;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function getTimeToBeat() {
        const timeSinceBeat = state.elapsed % BEAT_INTERVAL;
        return Math.min(timeSinceBeat, BEAT_INTERVAL - timeSinceBeat);
      }

      function isWithinBeatWindow() {
        return getTimeToBeat() <= BEAT_WINDOW;
      }

      function getActiveGate() {
        return GATES[Math.min(state.gateIndex, GATES.length - 1)] || null;
      }

      function getPointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
          y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function setBeaconTarget(x, y) {
        const padding = 56;
        state.beacon.targetX = clamp(x, padding, VIEW.width - padding);
        state.beacon.targetY = clamp(y, 86, VIEW.height - 74);
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.orbitDirection = 1;
        state.beatPulse = 0;
        state.gateOpenTimer = 0;
        state.misfireStreak = 0;
        state.gateIndex = 0;
        state.pulseBoost = 0;
        state.flash = 0;
        state.heat = 0.18;
        state.shake = 0;
        state.lastJudgement = "SYNC";
        state.judgementTimer = 0;
        state.combo = 0;
        state.beacon = createBeacon();
        state.satellites = createSatellites();
        state.particles = [];
        state.popups = [];
        state.shimmer = 0;
        state.ringPulse = 0;
        state.targetMarkerAlpha = 0;
        state.lastReason = "";
        pointer.down = false;
        pointer.ignoreTap = false;
        window.relayStageResult.status = "running";
        hostClearedReported = false;
        hostFailedReported = false;
        refreshSatellitePositions();
      }

      function startStage() {
        resetRun();
      }

      function clearStage(reason = "sequence_complete") {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 0.92;
        state.shake = REDUCED_MOTION ? 0 : 18;
        state.lastJudgement = "FORGED";
        state.judgementTimer = 1.4;
        spawnRadialBurst(state.beacon.x, state.beacon.y, "#8b5cf6", 44, 2.2);
        spawnRadialBurst(state.beacon.x, state.beacon.y, "#22d3ee", 36, 2);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 1;
        state.shake = REDUCED_MOTION ? 0 : 20;
        state.lastJudgement = reason === "beat_misfire_chain" ? "MISFIRE" : "SHATTERED";
        state.judgementTimer = 1.2;
        spawnRadialBurst(state.beacon.x, state.beacon.y, "#fb7185", 34, 1.9);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function spawnPopup(x, y, text, color) {
        state.popups.push({
          x,
          y,
          text,
          color,
          life: 0.9,
          total: 0.9,
        });
      }

      function spawnParticle(x, y, color, speed, life, size) {
        state.particles.push({
          x,
          y,
          vx: Math.cos(rand(0, Math.PI * 2)) * speed * rand(0.5, 1),
          vy: Math.sin(rand(0, Math.PI * 2)) * speed * rand(0.5, 1),
          color,
          life,
          total: life,
          size,
        });
      }

      function spawnRadialBurst(x, y, color, count, speedScale) {
        const burstCount = REDUCED_MOTION ? Math.ceil(count * 0.35) : count;
        for (let index = 0; index < burstCount; index += 1) {
          spawnParticle(x, y, color, rand(50, 180) * speedScale, rand(0.45, 1.1), rand(2, 5));
        }
      }

      function addBeatResponse(success, gate) {
        if (success) {
          state.misfireStreak = 0;
          state.combo += 1;
          state.orbitDirection *= -1;
          state.gateOpenTimer = GATE_OPEN_DURATION;
          state.pulseBoost = 1;
          state.beatPulse = 1;
          state.ringPulse = 1;
          state.flash = Math.max(state.flash, 0.34);
          state.shake = REDUCED_MOTION ? 0 : 9;
          state.lastJudgement = "SYNC";
          state.judgementTimer = 0.75;
          spawnPopup(state.beacon.x, state.beacon.y - 46, "SYNC", "#dcfce7");
          spawnRadialBurst(state.beacon.x, state.beacon.y, gate?.color || "#22d3ee", 20, 1);
          for (const satellite of state.satellites) {
            satellite.resonance = 1;
          }
          return;
        }
        state.combo = 0;
        state.misfireStreak += 1;
        state.flash = Math.max(state.flash, 0.48);
        state.shake = REDUCED_MOTION ? 0 : 16;
        state.lastJudgement = state.misfireStreak >= 2 ? "BREAK" : "MISS";
        state.judgementTimer = 0.9;
        spawnPopup(state.beacon.x, state.beacon.y - 42, "MISFIRE", "#fecaca");
        spawnRadialBurst(state.beacon.x, state.beacon.y, "#fb7185", 18, 0.9);
        if (state.misfireStreak >= 2) {
          failStage("beat_misfire_chain");
        }
      }

      function handleCoreInput() {
        if (state.mode !== "running") {
          return;
        }
        addBeatResponse(isWithinBeatWindow(), getActiveGate());
      }

      function refreshSatellitePositions() {
        for (const satellite of state.satellites) {
          const pulseRadius = state.pulseBoost * (satellite.passed ? 8 : 18);
          const orbitRadius = satellite.orbitRadius + pulseRadius;
          satellite.x = state.beacon.x + Math.cos(satellite.angle) * orbitRadius;
          satellite.y =
            state.beacon.y + Math.sin(satellite.angle) * orbitRadius * satellite.ellipse;
        }
      }

      function resolveGatePasses() {
        const gate = getActiveGate();
        if (!gate || state.gateOpenTimer <= 0) {
          return;
        }
        const targetSatellite = state.satellites[gate.targetSatellite];
        if (!targetSatellite) {
          return;
        }
        const gateDistance = dist(targetSatellite.x, targetSatellite.y, gate.x, gate.y);
        if (gateDistance > gate.radius + targetSatellite.size * 0.45) {
          return;
        }
        targetSatellite.passed = true;
        state.gateIndex += 1;
        state.gateOpenTimer = 0.18;
        state.flash = 0.7;
        state.shake = REDUCED_MOTION ? 0 : 20;
        state.lastJudgement = "THREAD";
        state.judgementTimer = 1;
        state.combo += 1;
        spawnPopup(gate.x, gate.y - 42, `${gate.label} OPEN`, gate.color);
        spawnRadialBurst(gate.x, gate.y, gate.color, 32, 1.35);
        if (state.gateIndex >= GATES.length) {
          clearStage("sequence_complete");
        }
      }

      function resolveHazards() {
        for (const satellite of state.satellites) {
          for (const hazard of HAZARDS) {
            if (dist(satellite.x, satellite.y, hazard.x, hazard.y) <= hazard.radius + satellite.size - 3) {
              failStage("satellite_dissolved");
              return;
            }
          }
        }
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.shimmer += dt;
        state.beatPulse = Math.max(0, state.beatPulse - dt * 1.9);
        state.gateOpenTimer = Math.max(0, state.gateOpenTimer - dt);
        state.pulseBoost = Math.max(0, state.pulseBoost - dt * 1.8);
        state.flash = Math.max(0, state.flash - dt * 0.9);
        state.judgementTimer = Math.max(0, state.judgementTimer - dt);
        state.ringPulse = Math.max(0, state.ringPulse - dt * 1.2);
        state.targetMarkerAlpha = lerp(state.targetMarkerAlpha, 1, 0.08);
        state.heat = clamp(
          0.18 + state.misfireStreak * 0.17 + (state.gateIndex / GATES.length) * 0.22,
          0,
          1
        );

        const keyboardSpeed = 320;
        let dx = 0;
        let dy = 0;
        if (keys.left) dx -= 1;
        if (keys.right) dx += 1;
        if (keys.up) dy -= 1;
        if (keys.down) dy += 1;
        if (dx || dy) {
          const length = Math.hypot(dx, dy) || 1;
          setBeaconTarget(
            state.beacon.targetX + (dx / length) * keyboardSpeed * dt,
            state.beacon.targetY + (dy / length) * keyboardSpeed * dt
          );
        }

        state.beacon.x = lerp(state.beacon.x, state.beacon.targetX, 0.15);
        state.beacon.y = lerp(state.beacon.y, state.beacon.targetY, 0.15);
        state.beacon.glow = lerp(state.beacon.glow, 0.4 + state.pulseBoost * 0.6, 0.1);

        for (const satellite of state.satellites) {
          satellite.resonance = Math.max(0, satellite.resonance - dt * 1.4);
          satellite.angle +=
            state.orbitDirection *
            satellite.speed *
            dt *
            (1 + state.pulseBoost * 0.9 + satellite.resonance * 0.15);
        }

        refreshSatellitePositions();
        resolveGatePasses();
        resolveHazards();
      }

      function updateAmbient(dt) {
        state.flash = Math.max(0, state.flash - dt * 0.7);
        state.shake = Math.max(0, state.shake - dt * 34);
        state.judgementTimer = Math.max(0, state.judgementTimer - dt);
        state.ringPulse = Math.max(0, state.ringPulse - dt);
        state.targetMarkerAlpha = lerp(state.targetMarkerAlpha, 0.68, 0.04);
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          if (particle.life <= 0) {
            return false;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          particle.vy += 18 * dt;
          return true;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          if (popup.life <= 0) {
            return false;
          }
          popup.y -= 42 * dt;
          return true;
        });
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          updateAmbient(dt);
        }
        updateParticles(dt);
      }

      function drawBackdrop() {
        const background = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        background.addColorStop(0, "#081120");
        background.addColorStop(0.45, "#111c34");
        background.addColorStop(1, "#1b1023");
        ctx.fillStyle = background;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const haze = ctx.createRadialGradient(
          VIEW.width * 0.5,
          120,
          60,
          VIEW.width * 0.5,
          120,
          420
        );
        haze.addColorStop(0, "rgba(91, 246, 255, 0.18)");
        haze.addColorStop(0.55, "rgba(99, 102, 241, 0.08)");
        haze.addColorStop(1, "rgba(10, 16, 36, 0)");
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (const crystal of state.crystalDrift) {
          const sway = Math.sin(state.shimmer * crystal.speed + crystal.depth * 9) * crystal.sway * 14;
          const x = crystal.x + sway;
          const y = crystal.y + Math.cos(state.shimmer * crystal.speed + crystal.depth * 3) * 10;
          const alpha = 0.06 + crystal.depth * 0.06;
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(Math.sin(state.shimmer * crystal.speed) * 0.12);
          ctx.fillStyle = `rgba(155, 215, 255, ${alpha})`;
          ctx.beginPath();
          ctx.moveTo(0, -crystal.size);
          ctx.lineTo(crystal.size * 0.56, 0);
          ctx.lineTo(0, crystal.size);
          ctx.lineTo(-crystal.size * 0.56, 0);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        const furnaceGlow = ctx.createLinearGradient(0, VIEW.height - 170, 0, VIEW.height);
        furnaceGlow.addColorStop(0, "rgba(251, 146, 60, 0)");
        furnaceGlow.addColorStop(1, "rgba(251, 146, 60, 0.24)");
        ctx.fillStyle = furnaceGlow;
        ctx.fillRect(0, VIEW.height - 170, VIEW.width, 170);

        ctx.fillStyle = "rgba(11, 19, 38, 0.88)";
        ctx.fillRect(0, VIEW.height - 74, VIEW.width, 74);
        ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
        for (let index = 0; index < 14; index += 1) {
          const x = index * 74;
          ctx.fillRect(x, VIEW.height - 74, 6, 74);
        }
      }

      function drawHazards() {
        for (const hazard of HAZARDS) {
          const wobble = Math.sin(state.shimmer * hazard.spin * 1.7) * 3;
          const glow = ctx.createRadialGradient(
            hazard.x,
            hazard.y,
            8,
            hazard.x,
            hazard.y,
            hazard.radius + 30
          );
          glow.addColorStop(0, "rgba(255, 191, 202, 0.4)");
          glow.addColorStop(0.55, "rgba(251, 113, 133, 0.24)");
          glow.addColorStop(1, "rgba(251, 113, 133, 0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(hazard.x, hazard.y, hazard.radius + 28, 0, Math.PI * 2);
          ctx.fill();

          ctx.save();
          ctx.translate(hazard.x, hazard.y);
          ctx.rotate(state.shimmer * hazard.spin);
          for (let index = 0; index < 7; index += 1) {
            const angle = (Math.PI * 2 * index) / 7;
            const outer = hazard.radius + 8 + Math.sin(state.shimmer * 2 + index) * 4;
            ctx.strokeStyle = "rgba(255, 204, 214, 0.3)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(Math.cos(angle) * (hazard.radius - 10), Math.sin(angle) * (hazard.radius - 10));
            ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
            ctx.stroke();
          }
          ctx.restore();

          const pool = ctx.createRadialGradient(
            hazard.x + wobble,
            hazard.y - wobble,
            4,
            hazard.x,
            hazard.y,
            hazard.radius
          );
          pool.addColorStop(0, "rgba(255, 244, 247, 0.92)");
          pool.addColorStop(0.3, "rgba(251, 113, 133, 0.92)");
          pool.addColorStop(0.8, "rgba(154, 52, 92, 0.86)");
          pool.addColorStop(1, "rgba(64, 19, 41, 0.96)");
          ctx.fillStyle = pool;
          ctx.beginPath();
          ctx.arc(hazard.x, hazard.y, hazard.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawGuideAndGates() {
        const activeGate = getActiveGate();
        for (let index = 0; index < GATES.length; index += 1) {
          const gate = GATES[index];
          const cleared = index < state.gateIndex;
          const active = gate === activeGate;
          const open = active && state.gateOpenTimer > 0;
          const pulse = active ? 0.6 + Math.sin(state.shimmer * 8) * 0.18 : 0.2;

          ctx.save();
          ctx.strokeStyle = cleared ? "rgba(187, 247, 208, 0.8)" : gate.color;
          ctx.fillStyle = cleared ? "rgba(34, 197, 94, 0.14)" : gate.halo;
          ctx.lineWidth = open ? 6 : active ? 4 : 2.5;
          ctx.beginPath();
          ctx.arc(gate.x, gate.y, gate.radius + (open ? 9 : pulse * 5), 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();

          ctx.strokeStyle = open ? "rgba(255, 255, 255, 0.88)" : "rgba(255, 255, 255, 0.36)";
          ctx.lineWidth = 2;
          ctx.setLineDash(active && !cleared ? [8, 6] : []);
          ctx.beginPath();
          ctx.arc(gate.x, gate.y, gate.radius - 12, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);

          ctx.fillStyle = cleared ? "#dcfce7" : "#e2e8f0";
          ctx.font = "700 12px Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(gate.label, gate.x, gate.y + gate.radius + 22);
          ctx.restore();
        }

        if (!activeGate || state.mode !== "running") {
          return;
        }

        const targetSatellite = state.satellites[activeGate.targetSatellite];
        const orbitRadius = targetSatellite.orbitRadius + state.pulseBoost * 18;
        const guideX = activeGate.x - Math.cos(targetSatellite.angle) * orbitRadius;
        const guideY =
          activeGate.y - Math.sin(targetSatellite.angle) * orbitRadius * targetSatellite.ellipse;

        ctx.save();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 10]);
        ctx.beginPath();
        ctx.moveTo(state.beacon.x, state.beacon.y);
        ctx.lineTo(activeGate.x, activeGate.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(guideX, guideY, 18 + Math.sin(state.shimmer * 7) * 2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
        ctx.beginPath();
        ctx.arc(guideX, guideY, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawOrbitField() {
        ctx.save();
        ctx.strokeStyle = "rgba(148, 163, 184, 0.16)";
        for (let index = 0; index < state.satellites.length; index += 1) {
          const satellite = state.satellites[index];
          const activeGate = getActiveGate();
          const active = activeGate && activeGate.targetSatellite === index;
          ctx.lineWidth = active ? 2.4 : 1.1;
          ctx.strokeStyle = active
            ? `${satellite.color}55`
            : satellite.passed
              ? "rgba(187, 247, 208, 0.18)"
              : "rgba(148, 163, 184, 0.16)";
          ctx.beginPath();
          ctx.ellipse(
            state.beacon.x,
            state.beacon.y,
            satellite.orbitRadius + state.pulseBoost * (satellite.passed ? 8 : 18),
            (satellite.orbitRadius + state.pulseBoost * (satellite.passed ? 8 : 18)) * satellite.ellipse,
            0,
            0,
            Math.PI * 2
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBeacon() {
        const glowRadius = 52 + state.beacon.glow * 30;
        const glow = ctx.createRadialGradient(
          state.beacon.x,
          state.beacon.y,
          8,
          state.beacon.x,
          state.beacon.y,
          glowRadius
        );
        glow.addColorStop(0, "rgba(255, 255, 255, 0.96)");
        glow.addColorStop(0.22, "rgba(125, 211, 252, 0.9)");
        glow.addColorStop(0.48, "rgba(56, 189, 248, 0.32)");
        glow.addColorStop(1, "rgba(56, 189, 248, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, glowRadius, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(state.beacon.x, state.beacon.y);
        ctx.rotate(state.shimmer * 0.7);
        ctx.strokeStyle = "rgba(225, 245, 255, 0.8)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-18, 0);
        ctx.lineTo(18, 0);
        ctx.moveTo(0, -18);
        ctx.lineTo(0, 18);
        ctx.stroke();

        const core = ctx.createRadialGradient(0, 0, 2, 0, 0, state.beacon.radius);
        core.addColorStop(0, "#ffffff");
        core.addColorStop(0.28, "#93c5fd");
        core.addColorStop(0.7, "#2563eb");
        core.addColorStop(1, "#0f172a");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(0, 0, state.beacon.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawSatellites() {
        for (const satellite of state.satellites) {
          ctx.save();
          ctx.strokeStyle = satellite.trail;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(state.beacon.x, state.beacon.y);
          ctx.lineTo(satellite.x, satellite.y);
          ctx.stroke();

          const halo = ctx.createRadialGradient(
            satellite.x,
            satellite.y,
            2,
            satellite.x,
            satellite.y,
            satellite.size * 3.2
          );
          halo.addColorStop(0, "rgba(255, 255, 255, 0.9)");
          halo.addColorStop(0.18, satellite.glow);
          halo.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, satellite.size * 3.2, 0, Math.PI * 2);
          ctx.fill();

          ctx.translate(satellite.x, satellite.y);
          ctx.rotate(state.shimmer * (satellite.speed + 0.3));
          ctx.fillStyle = satellite.passed ? "#dcfce7" : satellite.color;
          ctx.beginPath();
          ctx.moveTo(0, -satellite.size);
          ctx.lineTo(satellite.size * 0.64, 0);
          ctx.lineTo(0, satellite.size);
          ctx.lineTo(-satellite.size * 0.64, 0);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "rgba(255, 255, 255, 0.72)";
          ctx.lineWidth = 1.2;
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
          ctx.font = "700 10px Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(satellite.label, 0, 3);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = particle.life / particle.total;
          ctx.fillStyle = particle.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          if (!particle.color.startsWith("rgb")) {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = alpha;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        for (const popup of state.popups) {
          const alpha = popup.life / popup.total;
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "800 18px Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.globalAlpha = 1;
        }
      }

      function drawHudPanel(x, y, width, height, title) {
        ctx.fillStyle = "rgba(7, 12, 25, 0.68)";
        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = 1;
        roundRect(ctx, x, y, width, height, 18, true, true);
        ctx.fillStyle = "rgba(226, 232, 240, 0.82)";
        ctx.font = "700 11px Trebuchet MS, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(title, x + 16, y + 18);
      }

      function roundRect(targetCtx, x, y, width, height, radius, fill, stroke) {
        targetCtx.beginPath();
        targetCtx.moveTo(x + radius, y);
        targetCtx.arcTo(x + width, y, x + width, y + height, radius);
        targetCtx.arcTo(x + width, y + height, x, y + height, radius);
        targetCtx.arcTo(x, y + height, x, y, radius);
        targetCtx.arcTo(x, y, x + width, y, radius);
        targetCtx.closePath();
        if (fill) {
          targetCtx.fill();
        }
        if (stroke) {
          targetCtx.stroke();
        }
      }

      function drawHud() {
        drawHudPanel(18, 18, 302, 110, "FOUNDRY STATUS");
        ctx.fillStyle = "#eff6ff";
        ctx.font = "800 24px Trebuchet MS, sans-serif";
        ctx.fillText("Crystal Foundry", 34, 50);
        ctx.font = "700 16px Trebuchet MS, sans-serif";
        ctx.fillStyle = "rgba(196, 232, 255, 0.92)";
        ctx.fillText("Orbit Shepherd", 34, 72);
        ctx.font = "600 13px Trebuchet MS, sans-serif";
        ctx.fillStyle = "rgba(191, 219, 254, 0.88)";
        ctx.fillText(`Gate ${Math.min(state.gateIndex + 1, 3)}/3 • ${state.lastJudgement}`, 34, 96);
        ctx.fillStyle = "rgba(226, 232, 240, 0.68)";
        ctx.fillText(`Time ${state.elapsed.toFixed(1)}s`, 34, 116);

        drawHudPanel(VIEW.width - 236, 18, 218, 110, "RESONANCE");
        for (let index = 0; index < 3; index += 1) {
          const filled = index < state.gateIndex;
          ctx.fillStyle = filled ? SATELLITE_CONFIGS[index].color : "rgba(148, 163, 184, 0.26)";
          ctx.beginPath();
          ctx.arc(VIEW.width - 192 + index * 42, 66, 13, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 255, 255, 0.44)";
          ctx.lineWidth = 1.6;
          ctx.stroke();
        }
        ctx.fillStyle = "#eff6ff";
        ctx.font = "700 13px Trebuchet MS, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`Misfire ${state.misfireStreak}/2`, VIEW.width - 218, 98);
        ctx.fillText(`Pulse ${(state.gateOpenTimer > 0 ? state.gateOpenTimer : 0).toFixed(1)}s`, VIEW.width - 218, 118);

        const beatWidth = 360;
        const beatX = VIEW.width * 0.5 - beatWidth * 0.5;
        const beatY = VIEW.height - 52;
        ctx.fillStyle = "rgba(7, 12, 25, 0.68)";
        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        roundRect(ctx, beatX, beatY - 18, beatWidth, 34, 16, true, true);

        const timeSinceBeat = state.elapsed % BEAT_INTERVAL;
        const beatProgress = timeSinceBeat / BEAT_INTERVAL;
        const beatCenter = beatX + beatWidth * beatProgress;
        const beatWindowWidth = (BEAT_WINDOW / BEAT_INTERVAL) * beatWidth;

        ctx.fillStyle = "rgba(30, 41, 59, 0.88)";
        roundRect(ctx, beatX + 8, beatY - 10, beatWidth - 16, 18, 10, true, false);
        ctx.fillStyle = "rgba(248, 250, 252, 0.12)";
        roundRect(
          ctx,
          beatX + beatWidth * 0.5 - beatWindowWidth,
          beatY - 10,
          beatWindowWidth * 2,
          18,
          10,
          true,
          false
        );

        const pulseGradient = ctx.createLinearGradient(beatX + 8, 0, beatX + beatWidth - 8, 0);
        pulseGradient.addColorStop(0, "#22d3ee");
        pulseGradient.addColorStop(0.5, "#f8fafc");
        pulseGradient.addColorStop(1, "#c084fc");
        ctx.fillStyle = pulseGradient;
        roundRect(ctx, beatX + 8, beatY - 10, clamp(beatCenter - beatX - 8, 4, beatWidth - 16), 18, 10, true, false);

        ctx.strokeStyle = isWithinBeatWindow() ? "rgba(255, 255, 255, 0.92)" : "rgba(255, 255, 255, 0.45)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(beatX + beatWidth * 0.5, beatY - 18);
        ctx.lineTo(beatX + beatWidth * 0.5, beatY + 16);
        ctx.stroke();

        ctx.fillStyle = "#e2e8f0";
        ctx.font = "700 12px Trebuchet MS, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("박자 창", beatX + beatWidth * 0.5, beatY - 24);
        ctx.fillText("박자 중앙에 맞춰 탭/클릭", beatX + beatWidth * 0.5, beatY + 34);

        const activeGate = getActiveGate();
        if (activeGate) {
          ctx.textAlign = "left";
          ctx.fillStyle = "rgba(239, 246, 255, 0.82)";
          ctx.font = "700 13px Trebuchet MS, sans-serif";
          ctx.fillText(`Target ${activeGate.label} • ${state.satellites[activeGate.targetSatellite].name}`, 24, VIEW.height - 92);
          ctx.fillStyle = "rgba(191, 219, 254, 0.72)";
          ctx.fillText("Drag the beacon and tap on-beat to flip the orbit.", 24, VIEW.height - 72);
        }

        const heatX = VIEW.width - 190;
        const heatY = VIEW.height - 92;
        drawHudPanel(heatX - 16, heatY - 26, 172, 66, "PRESSURE");
        ctx.fillStyle = "rgba(30, 41, 59, 0.84)";
        roundRect(ctx, heatX, heatY, 132, 12, 8, true, false);
        const heatGradient = ctx.createLinearGradient(heatX, 0, heatX + 132, 0);
        heatGradient.addColorStop(0, "#22d3ee");
        heatGradient.addColorStop(0.62, "#fb7185");
        heatGradient.addColorStop(1, "#f97316");
        ctx.fillStyle = heatGradient;
        roundRect(ctx, heatX, heatY, 132 * state.heat, 12, 8, true, false);
      }

      function drawOverlayPanel(title, accentColor, subtitle, footer) {
        const width = Math.min(760, VIEW.width - 72);
        const height = Math.min(418, VIEW.height - 68);
        const x = VIEW.width * 0.5 - width * 0.5;
        const y = VIEW.height * 0.5 - height * 0.5;

        ctx.fillStyle = "rgba(6, 11, 23, 0.74)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const panelGradient = ctx.createLinearGradient(x, y, x + width, y + height);
        panelGradient.addColorStop(0, "rgba(11, 20, 39, 0.96)");
        panelGradient.addColorStop(1, "rgba(26, 21, 41, 0.96)");
        ctx.fillStyle = panelGradient;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.lineWidth = 1.5;
        roundRect(ctx, x, y, width, height, 28, true, true);

        const accent = ctx.createLinearGradient(x, y, x + width, y);
        accent.addColorStop(0, `${accentColor}`);
        accent.addColorStop(1, "rgba(255, 255, 255, 0.12)");
        ctx.fillStyle = accent;
        roundRect(ctx, x + 24, y + 22, width - 48, 8, 8, true, false);

        ctx.fillStyle = "#eff6ff";
        ctx.font = "800 30px Trebuchet MS, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(title, x + 34, y + 74);
        ctx.fillStyle = "rgba(191, 219, 254, 0.82)";
        ctx.font = "600 16px Trebuchet MS, sans-serif";
        ctx.fillText(subtitle, x + 34, y + 104);

        ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
        roundRect(ctx, x + 32, y + 126, width - 64, height - 188, 22, true, false);

        return {
          x,
          y,
          width,
          height,
          footerY: y + height - 34,
          footer,
        };
      }

        ctx.font = "600 14px Trebuchet MS, sans-serif";
        const memo = cleared
          ? "박자 직전에 비콘을 먼저 위치시키면 다음 게이트가 훨씬 편해집니다."
          : "게이트보다 먼저 비콘 위치를 잡고, 탭은 박자 중앙에만 사용하세요.";
        let memoY = panel.y + 208;
        for (const line of wrapText(memo, 204)) {
          ctx.fillText(line, panel.x + panel.width - 272, memoY);
          memoY += 20;
        }

        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(255, 255, 255, 0.74)";
        ctx.font = "700 15px Trebuchet MS, sans-serif";
        ctx.fillText(panel.footer, VIEW.width * 0.5, panel.footerY);
      }

      function drawJudgement() {
        if (state.judgementTimer <= 0) {
          return;
        }
        const alpha = Math.min(1, state.judgementTimer / 0.6);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = "rgba(255, 255, 255, 0.86)";
        ctx.font = "800 26px Trebuchet MS, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(state.lastJudgement, VIEW.width * 0.5, 142);
        ctx.globalAlpha = 1;
      }

      function drawScene() {
        const shakeX = state.shake > 0 ? rand(-state.shake, state.shake) * 0.35 : 0;
        const shakeY = state.shake > 0 ? rand(-state.shake, state.shake) * 0.28 : 0;

        ctx.save();
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.translate(shakeX, shakeY);
        drawBackdrop();
        drawHazards();
        drawGuideAndGates();
        drawOrbitField();
        drawBeacon();
        drawSatellites();
        drawParticles();
        drawHud();
        drawJudgement();
        ctx.restore();

        if (state.flash > 0) {
          ctx.fillStyle =
            state.mode === "failed"
              ? `rgba(251, 113, 133, ${state.flash * 0.18})`
              : `rgba(125, 211, 252, ${state.flash * 0.14})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed") {
          drawResultOverlay(false);
        } else if (state.mode === "cleared") {
          drawResultOverlay(true);
        }
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        update(delta);
        drawScene();
        if (!AUTOMATED_RENDER) {
          animationFrame = window.requestAnimationFrame(frame);
        }
      }

      function onPointerDown(event) {
        event.preventDefault();
        canvas.focus();
        const position = getPointerPosition(event);
        const needsRestart = state.mode !== "running";
        if (needsRestart) {
          startStage();
        }
        pointer.down = true;
        pointer.id = event.pointerId ?? "mouse";
        pointer.startX = position.x;
        pointer.startY = position.y;
        pointer.lastX = position.x;
        pointer.lastY = position.y;
        pointer.startElapsed = state.elapsed;
        pointer.moved = false;
        pointer.ignoreTap = needsRestart;
        setBeaconTarget(position.x, position.y);
        canvas.setPointerCapture?.(event.pointerId);
        if (AUTOMATED_RENDER) {
          drawScene();
        }
      }

      function onPointerMove(event) {
        if (!pointer.down) {
          return;
        }
        const position = getPointerPosition(event);
        pointer.lastX = position.x;
        pointer.lastY = position.y;
        if (dist(pointer.startX, pointer.startY, position.x, position.y) > POINTER_TAP_DISTANCE) {
          pointer.moved = true;
        }
        setBeaconTarget(position.x, position.y);
        if (AUTOMATED_RENDER) {
          drawScene();
        }
      }

      function onPointerUp(event) {
        if (!pointer.down) {
          return;
        }
        const tapDuration = Math.abs(state.elapsed - pointer.startElapsed);
        const shouldTriggerTap =
          !pointer.ignoreTap &&
          !pointer.moved &&
          tapDuration <= POINTER_TAP_TIME &&
          state.mode === "running";
        pointer.down = false;
        canvas.releasePointerCapture?.(event.pointerId);
        if (shouldTriggerTap) {
          handleCoreInput();
        }
        if (AUTOMATED_RENDER) {
          drawScene();
        }
      }

      function onPointerCancel(event) {
        pointer.down = false;
        canvas.releasePointerCapture?.(event.pointerId);
      }

      function onKeyChange(event, pressed) {
        const code = event.code;
        if (code === "Enter" && pressed) {
          if (state.mode !== "running") {
            startStage();
          }
          return;
        }
        if ((code === "Space" || code === "KeyX") && pressed) {
          event.preventDefault();
          if (state.mode === "running") {
            handleCoreInput();
          }
          return;
        }

        if (code === "ArrowLeft" || code === "KeyA") keys.left = pressed;
        if (code === "ArrowRight" || code === "KeyD") keys.right = pressed;
        if (code === "ArrowUp" || code === "KeyW") keys.up = pressed;
        if (code === "ArrowDown" || code === "KeyS") keys.down = pressed;
      }

      function renderGameToText() {
        const activeGate = getActiveGate();
        return JSON.stringify({
          mode: state.mode,
          note: "origin top-left, x right, y down",
          objective: {
            gateIndex: state.gateIndex,
            totalGates: GATES.length,
            activeGate: activeGate
              ? {
                  label: activeGate.label,
                  x: round(activeGate.x),
                  y: round(activeGate.y),
                  targetSatellite: state.satellites[activeGate.targetSatellite].name,
                  open: state.gateOpenTimer > 0,
                }
              : null,
          },
          beat: {
            timeToWindowSec: round(getTimeToBeat(), 2),
            windowSec: BEAT_WINDOW,
            misfireStreak: state.misfireStreak,
          },
          beacon: {
            x: round(state.beacon.x),
            y: round(state.beacon.y),
          },
          satellites: state.satellites.map((satellite) => ({
            id: satellite.id,
            x: round(satellite.x),
            y: round(satellite.y),
            passed: satellite.passed,
          })),
          hazards: HAZARDS.map((hazard) => ({
            x: hazard.x,
            y: hazard.y,
            radius: hazard.radius,
          })),
          judgement: state.lastJudgement,
        });
      }

      window.relayStageMeta = {
        id: "crystal-foundry-orbit-herding-tempo",
        title: "Crystal Foundry: Orbit Shepherd",
        creator: "jungcollin",
        genre: "Orbital survival / 템포 윈도우",
        clearCondition: STAGE_CLEAR_CONDITION,
      };

      window.relayStageResult = { status: "running" };
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        drawScene();
      };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          clearStage("debug_force_clear");
          drawScene();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("debug_force_fail");
          drawScene();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerCancel);
      canvas.addEventListener("lostpointercapture", onPointerCancel);
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      window.addEventListener("keydown", (event) => onKeyChange(event, true));
      window.addEventListener("keyup", (event) => onKeyChange(event, false));
      window.addEventListener("blur", () => {
        pointer.down = false;
        Object.keys(keys).forEach((key) => {
          keys[key] = false;
        });
      });

      refreshSatellitePositions();
      reportReadyToHost();
      drawScene();
      if (!AUTOMATED_RENDER) {
        animationFrame = window.requestAnimationFrame(frame);
      }
    </script>
  </body>
</html>
