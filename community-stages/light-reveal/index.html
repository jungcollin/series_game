<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>빛의 탐험</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #0A1628; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(200, 180, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(200, 180, 100, 0.92);
        color: #0A1628; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #0A1628; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 180, 100, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">빛의 탐험. 화면을 터치하고 드래그하여 빛을 비추세요. 모바일에서는 화면 터치 드래그로 빛을 움직입니다. 어둠 속에 숨겨진 별을 찾으세요. 숨겨진 별 10개를 찾으면 클리어. 시간 내 미달성 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="빛의 탐험" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "light-reveal",
        title: "빛의 탐험",
        description: "어둠 속에서 빛을 밝혀 숨겨진 별을 찾는 게임",
        creator: "jungcollin",
        genre: "Light discovery",
        clearCondition: "숨겨진 별 10개를 찾으면 클리어",
        failCondition: "시간 내 미달성 시 실패",
        controls: "드래그로 빛 비추기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      /* ── Colors ── */
      const COL = {
        bg: "#0A1628", bgMid: "#101E38",
        star: "#FFD860", starBright: "#FFF0A0", starDim: "#C8A030",
        found: "#FFE888",
        light: "rgba(255,240,180,0.12)",
        lightCore: "rgba(255,245,200,0.25)",
        text: "#C8B880", textLight: "rgba(200,180,128,0.5)",
        accent: "#D4B050",
        clear: "#50B860", fail: "#C05040",
        dust: "rgba(200,180,140,0.15)",
      };

      /* ── Constants ── */
      const DURATION = 35;
      const TARGET = 10;
      const LIGHT_R = 70;
      const STAR_R = 8;
      const FIND_TIME = 0.4;

      /* ── State ── */
      let mode = "menu", elapsed = 0, found = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;
      let particles = [];
      let stars = [];
      let lightX = CX, lightY = CY, isDragging = false;
      let ambientStars = [];
      let twinkle = 0;

      /* ── Helpers ── */
      function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
      function lerp(a,b,t){ return a+(b-a)*t; }
      function rand(lo,hi){ return lo+Math.random()*(hi-lo); }
      function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1,y2-y1); }

      /* ── Relay Host ── */
      function inRelayHost(){ try{ return window.parent&&window.parent!==window&&window.parent.RelayHost; }catch{ return false; } }
      function reportReady(){ if(inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason){
        if(!inRelayHost()||hostFailedReported) return; hostFailedReported=true;
        window.parent.RelayHost.onStageFailed?.({ stageId:META.id, stageTitle:META.title, reason, durationSec:+elapsed.toFixed(1) });
      }
      function reportCleared(){
        if(!inRelayHost()||hostClearedReported) return; hostClearedReported=true;
        window.parent.RelayHost.onStageCleared?.({ stageId:META.id, stageTitle:META.title, clearCountAfter:relayContext.clearCount+1, durationSec:+elapsed.toFixed(1) });
      }

      /* ── Generate stars ── */
      function generateStars(){
        stars = [];
        const margin = 60;
        for(let i=0;i<TARGET;i++){
          let x,y,ok;
          for(let attempt=0;attempt<50;attempt++){
            x = margin + Math.random()*(W-margin*2);
            y = margin + 40 + Math.random()*(H-margin*2-40);
            ok = true;
            for(const s of stars){
              if(dist(x,y,s.x,s.y)<50){ ok=false; break; }
            }
            if(ok) break;
          }
          const points = 4 + Math.floor(Math.random()*3); // 4-6 pointed star
          stars.push({
            x, y,
            size: STAR_R + rand(-2, 3),
            points,
            found: false,
            exposure: 0, // how long light has been on this star
            foundAnim: 0,
            twinklePhase: rand(0, Math.PI*2),
          });
        }

        /* ambient decoration stars */
        ambientStars = [];
        for(let i=0;i<40;i++){
          ambientStars.push({
            x: Math.random()*W,
            y: Math.random()*H,
            size: rand(0.5, 1.5),
            phase: rand(0, Math.PI*2),
            speed: rand(0.5, 2),
          });
        }
      }

      /* ── Reset ── */
      function reset(){
        elapsed=0; found=0; shake=0; clearAnim=0; particles=[];
        isDragging=false; twinkle=0;
        hostFailedReported=false; hostClearedReported=false;
        window.relayStageResult.status="running";
        generateStars();
      }

      /* ── Update ── */
      function update(dt){
        if(mode!=="running") return;
        elapsed+=dt;
        twinkle+=dt;

        /* check light on stars */
        for(const s of stars){
          if(s.found) { s.foundAnim=clamp(s.foundAnim+dt*2,0,1); continue; }
          s.twinklePhase+=dt*2;

          const d = dist(lightX,lightY,s.x,s.y);
          if(isDragging && d < LIGHT_R){
            s.exposure += dt;
            if(s.exposure >= FIND_TIME){
              s.found = true;
              s.foundAnim = 0;
              found++;
              /* sparkle */
              for(let i=0;i<(reducedMotion?4:12);i++){
                const a=rand(0,Math.PI*2),sp=rand(30,80);
                particles.push({ x:s.x,y:s.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color:rand(0,1)>0.5?COL.star:COL.starBright, size:rand(1.5,4), grav:0 });
              }
              if(found>=TARGET){
                mode="clear"; clearAnim=0;
                window.relayStageResult.status="cleared"; reportCleared();
              }
            }
          } else {
            s.exposure = Math.max(0, s.exposure - dt * 0.5);
          }
        }

        /* particles */
        for(let i=particles.length-1;i>=0;i--){
          const p=particles[i];
          p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.96; p.vy*=0.96; p.life-=dt*2;
          if(p.life<=0) particles.splice(i,1);
        }

        shake*=0.9; if(shake<0.3) shake=0;

        if(elapsed>=DURATION){
          mode="failed"; shake=6;
          window.relayStageResult.status="failed"; reportFailed("시간 초과");
        }
      }

      /* ── Draw ── */
      function rrect(c,x,y,w,h,r){
        c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
        c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
        c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
        c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
      }

      function drawStar(cx,cy,r,points,rotation){
        ctx.beginPath();
        for(let i=0;i<points*2;i++){
          const a = rotation + (i*Math.PI)/points;
          const rad = i%2===0 ? r : r*0.4;
          const px = cx+Math.cos(a)*rad, py = cy+Math.sin(a)*rad;
          i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
        }
        ctx.closePath();
      }

      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0, sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);

        /* dark sky */
        const bg=ctx.createRadialGradient(CX,CY,0,CX,CY,W*0.6);
        bg.addColorStop(0,COL.bgMid); bg.addColorStop(1,COL.bg);
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

        /* ambient stars */
        if(!reducedMotion){
          for(const a of ambientStars){
            const tw=Math.sin(a.phase+twinkle*a.speed)*0.3+0.5;
            ctx.beginPath(); ctx.arc(a.x,a.y,a.size,0,Math.PI*2);
            ctx.fillStyle=`rgba(200,200,220,${tw*0.3})`; ctx.fill();
          }
        }

        /* light beam */
        if(isDragging && mode==="running"){
          const lg=ctx.createRadialGradient(lightX,lightY,0,lightX,lightY,LIGHT_R);
          lg.addColorStop(0,COL.lightCore);
          lg.addColorStop(0.5,COL.light);
          lg.addColorStop(1,"rgba(255,240,180,0)");
          ctx.fillStyle=lg;
          ctx.beginPath(); ctx.arc(lightX,lightY,LIGHT_R,0,Math.PI*2); ctx.fill();

          /* dust motes in light */
          if(!reducedMotion){
            ctx.globalAlpha=0.3;
            for(let i=0;i<5;i++){
              const dx=rand(-LIGHT_R*0.7,LIGHT_R*0.7), dy=rand(-LIGHT_R*0.7,LIGHT_R*0.7);
              if(Math.hypot(dx,dy)>LIGHT_R*0.7) continue;
              ctx.beginPath(); ctx.arc(lightX+dx,lightY+dy,rand(0.5,1.5),0,Math.PI*2);
              ctx.fillStyle=COL.dust; ctx.fill();
            }
            ctx.globalAlpha=1;
          }
        }

        /* stars */
        for(const s of stars){
          if(s.found){
            /* found star - always visible with glow */
            const scale = 0.5+s.foundAnim*0.5;
            const glow = Math.sin(twinkle*2+s.twinklePhase)*0.2+0.8;

            /* glow */
            ctx.beginPath(); ctx.arc(s.x,s.y,s.size*2*scale,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,216,96,${0.15*glow})`; ctx.fill();

            /* star shape */
            drawStar(s.x,s.y,s.size*scale,s.points,twinkle*0.3+s.twinklePhase);
            ctx.fillStyle=COL.star; ctx.fill();

            /* bright center */
            ctx.beginPath(); ctx.arc(s.x,s.y,2*scale,0,Math.PI*2);
            ctx.fillStyle=COL.starBright; ctx.fill();

          } else {
            /* hidden star - only visible in light */
            const d = dist(lightX,lightY,s.x,s.y);
            if(isDragging && d < LIGHT_R){
              const visibility = (1-d/LIGHT_R)*0.8;
              const expRatio = clamp(s.exposure/FIND_TIME,0,1);

              /* reveal animation */
              ctx.globalAlpha = visibility;
              drawStar(s.x,s.y,s.size*(0.5+expRatio*0.5),s.points,twinkle*0.5+s.twinklePhase);
              ctx.fillStyle = expRatio>0.5?COL.star:COL.starDim;
              ctx.fill();

              /* exposure ring */
              if(expRatio>0){
                ctx.beginPath(); ctx.arc(s.x,s.y,s.size+6,0,Math.PI*2*expRatio);
                ctx.strokeStyle=`rgba(255,216,96,${visibility*0.6})`; ctx.lineWidth=2; ctx.stroke();
              }
              ctx.globalAlpha=1;
            }
          }
        }

        /* particles */
        for(const p of particles){
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);
          ctx.fillStyle=p.color; ctx.globalAlpha=clamp(p.life,0,1); ctx.fill();
        }
        ctx.globalAlpha=1;

        /* HUD */
        if(mode==="running") drawHUD();
        ctx.restore();

        if(mode==="menu") drawMenu();
        else if(mode==="clear") drawClear();
        else if(mode==="failed") drawFailed();
      }

      function drawHUD(){
        ctx.fillStyle=COL.text; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.textAlign="left"; ctx.textBaseline="top";
        ctx.fillText(`발견: ${found} / ${TARGET}`,20,14);

        /* star icons */
        for(let i=0;i<TARGET;i++){
          const ix=20+i*22, iy=38;
          ctx.fillStyle=i<found?COL.star:"rgba(200,180,128,0.2)";
          ctx.font='12px sans-serif';
          ctx.fillText(i<found?"★":"☆",ix,iy);
        }

        const tl=Math.max(0,DURATION-elapsed);
        ctx.fillStyle=tl<10?COL.fail:COL.text; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.textAlign="right";
        ctx.fillText(`${Math.ceil(tl)}초`,W-20,14);

        if(!isDragging && elapsed>1){
          ctx.fillStyle=COL.textLight; ctx.font='400 14px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="bottom";
          ctx.fillText("화면을 드래그하여 빛을 비추세요",CX,H-20);
        }
      }

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40), lh=28, ch=50+lines.length*lh+44;
        const cx=CX-cw/2, cy=CY-ch/2;
        ctx.fillStyle="rgba(16,30,56,0.95)"; ctx.beginPath(); rrect(ctx,cx,cy,cw,ch,10); ctx.fill();
        ctx.fillStyle=accent; ctx.fillRect(cx+14,cy,cw-28,3);
        ctx.fillStyle=COL.text; ctx.font='bold 24px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="top";
        ctx.fillText(title,CX,cy+18);
        ctx.font='400 14px "Segoe UI",sans-serif'; ctx.fillStyle="rgba(200,180,128,0.75)";
        for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],CX,cy+52+i*lh);
        ctx.fillStyle="rgba(200,180,128,0.4)"; ctx.font='400 13px "Segoe UI",sans-serif';
        ctx.fillText("TAP 또는 ENTER",CX,cy+ch-22);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(10,22,40,0.5)"; ctx.fillRect(0,0,W,H);
        drawCard("빛의 탐험",["어둠 속에서 빛을 비추어","숨겨진 별을 찾으세요","","조작: 화면 터치 드래그로 빛 비추기","클리어: 숨겨진 별 10개 찾기","실패: 시간 내 미달성 시 실패"],COL.accent);
      }
      function drawClear(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(10,22,40,${clearAnim*0.5})`; ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3) drawCard("별자리 완성!",[`${Math.ceil(elapsed)}초 만에 완료`,`별 ${found}개 발견`],COL.clear);
      }
      function drawFailed(){
        ctx.fillStyle="rgba(40,20,20,0.3)"; ctx.fillRect(0,0,W,H);
        drawCard("실패",["시간 내에 별을 찾지 못했습니다",`발견: ${found} / ${TARGET}`],COL.fail);
      }

      /* ── Input ── */
      function handleStart(){ if(mode==="menu"||mode==="clear"||mode==="failed"){ reset(); mode="running"; } }

      function getCanvasPos(cx,cy){
        const r=canvas.getBoundingClientRect();
        return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) };
      }

      canvas.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if(mode!=="running"){ handleStart(); return; }
        isDragging=true;
        const p=getCanvasPos(e.clientX,e.clientY);
        lightX=p.x; lightY=p.y;
      });
      canvas.addEventListener("pointermove",(e)=>{
        if(!isDragging||mode!=="running") return;
        const p=getCanvasPos(e.clientX,e.clientY);
        lightX=p.x; lightY=p.y;
      });
      canvas.addEventListener("pointerup",()=>{ isDragging=false; });
      canvas.addEventListener("pointercancel",()=>{ isDragging=false; });
      canvas.addEventListener("keydown",(e)=>{
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); handleStart(); }
      });

      /* ── Game loop ── */
      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){ lastTimestamp=ts; return; }
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT); lastTimestamp=ts;
        let steps=0;
        while(dt>=FIXED_DT&&steps<4){ update(FIXED_DT); dt-=FIXED_DT; steps++; }
        if(dt>0&&steps<4) update(dt);
        draw();
      }

      /* ── Debug ── */
      function renderGameToText(){
        return JSON.stringify({ mode, elapsed:+elapsed.toFixed(1), found, result:window.relayStageResult.status });
      }
      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{
        const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000)));
        for(let i=0;i<steps;i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug={
        forceClear(){ reset(); mode="running"; found=TARGET; mode="clear"; clearAnim=0; window.relayStageResult.status="cleared"; reportCleared(); draw(); },
        forceFail(){ reset(); mode="running"; elapsed=DURATION; mode="failed"; window.relayStageResult.status="failed"; reportFailed("debug_force_fail"); draw(); },
      };

      /* ── Init ── */
      generateStars();
      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
