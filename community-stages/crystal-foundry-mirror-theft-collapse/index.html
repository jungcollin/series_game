<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Mirror Heist</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-a: #07131f;
        --bg-b: #0b2232;
        --ink: #eef7ff;
        --cyan: #72efff;
        --teal: #42bfc8;
        --amber: #ffc66d;
        --rose: #ff7a9f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(77, 169, 189, 0.24), transparent 38%),
          radial-gradient(circle at 20% 15%, rgba(151, 242, 255, 0.2), transparent 26%),
          linear-gradient(180deg, #040a12, var(--bg-a) 35%, var(--bg-b));
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas,
      button {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 19, 31, 0.94);
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(238, 247, 255, 0.92);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 30;
        display: flex;
        justify-content: center;
        padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 370px);
        pointer-events: auto;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(116, 241, 255, 0.3);
        border-radius: 18px;
        min-width: 58px;
        min-height: 58px;
        padding: 0 14px;
        color: var(--ink);
        font: 800 18px "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          linear-gradient(180deg, rgba(19, 52, 77, 0.88), rgba(8, 22, 34, 0.94));
        box-shadow:
          0 14px 30px rgba(3, 8, 12, 0.42),
          inset 0 0 0 1px rgba(188, 248, 255, 0.08);
        touch-action: none;
      }

      .mobile-btn--wide {
        min-width: 92px;
      }

      .mobile-btn[data-active="true"] {
        transform: translateY(1px) scale(0.97);
        background:
          linear-gradient(180deg, rgba(50, 108, 141, 0.94), rgba(13, 44, 63, 0.98));
        box-shadow:
          0 10px 20px rgba(3, 8, 12, 0.34),
          0 0 28px rgba(114, 239, 255, 0.18);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls__row {
          width: min(100%, 344px);
        }

        .mobile-btn {
          min-width: 54px;
          min-height: 54px;
          font-size: 17px;
          border-radius: 16px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Mirror Heist. 캔버스를 터치하거나 Enter로 시작하세요.
      기본 조작은 이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생,
      이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현
      이며, 클리어 조건은 붕괴선이 닿기 전에 서로 다른 패턴 3개로 금고 문을 열면 클리어,
      실패 조건은 붕괴선에 휩쓸리거나 감시 시선에 오래 걸리면 즉시 실패 입니다.
    </p>
    <canvas id="game" width="1280" height="720" aria-label="Crystal Foundry: Mirror Heist" aria-describedby="stage-instructions" tabindex="0"></canvas>

    <div class="mobile-controls">
      <div class="mobile-controls__row">
        <button class="mobile-btn" data-control="left" aria-label="왼쪽 이동">◀</button>
        <button class="mobile-btn" data-control="up" aria-label="위 이동">▲</button>
        <button class="mobile-btn mobile-btn--wide" data-control="replay" aria-label="패턴 재생">재생</button>
        <button class="mobile-btn" data-control="down" aria-label="아래 이동">▼</button>
        <button class="mobile-btn" data-control="right" aria-label="오른쪽 이동">▶</button>
      </div>
    </div>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const TITLE = "Crystal Foundry: Mirror Heist";
      const DESCRIPTION = "적 패턴을 훔쳐 금고를 열고, 뒤에서 밀려오는 붕괴선을 피해 연쇄 질주하세요.";
      const CONTROLS_TEXT = "이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생, 이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_TEXT = "붕괴선이 닿기 전에 서로 다른 패턴 3개로 금고 문을 열면 클리어";
      const FAIL_TEXT = "붕괴선에 휩쓸리거나 감시 시선에 오래 걸리면 즉시 실패";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("crystal-foundry-mirror-theft-collapse") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches || false;

      const mobileButtons = Object.fromEntries(
        Array.from(document.querySelectorAll("[data-control]")).map((button) => [button.dataset.control, button])
      );

      const PATTERNS = [
        {
          id: "prism-step",
          label: "분광 각보",
          color: "#79f2ff",
          sealColor: "#97f5ff",
          points: [
            { x: -0.58, y: 0.26 },
            { x: -0.16, y: -0.32 },
            { x: 0.18, y: 0.06 },
            { x: 0.54, y: -0.38 },
            { x: 0.28, y: 0.32 },
            { x: -0.04, y: 0.1 },
          ],
        },
        {
          id: "wave-split",
          label: "쌍조 파문",
          color: "#ffc974",
          sealColor: "#ffd896",
          points: [
            { x: -0.62, y: -0.18 },
            { x: -0.36, y: -0.34 },
            { x: -0.14, y: 0.24 },
            { x: 0.12, y: -0.18 },
            { x: 0.38, y: 0.34 },
            { x: 0.62, y: 0.08 },
          ],
        },
        {
          id: "knot-loop",
          label: "반향 매듭",
          color: "#ff85b3",
          sealColor: "#ff9fc3",
          points: [
            { x: -0.54, y: 0 },
            { x: -0.24, y: -0.3 },
            { x: 0.08, y: 0.14 },
            { x: 0.32, y: -0.32 },
            { x: 0.56, y: 0.02 },
            { x: 0.28, y: 0.34 },
            { x: -0.04, y: -0.1 },
            { x: -0.32, y: 0.32 },
            { x: -0.54, y: 0 },
          ],
        },
      ];

      const sentinelBlueprints = [
        {
          patternId: "prism-step",
          anchor: { x: 352, y: 186 },
          scale: 86,
          range: 220,
          fov: 1.08,
          pathSpeed: 0.19,
          sweepSpeed: 1.2,
        },
        {
          patternId: "wave-split",
          anchor: { x: 642, y: 412 },
          scale: 90,
          range: 230,
          fov: 1.16,
          pathSpeed: 0.17,
          sweepSpeed: 1.15,
        },
        {
          patternId: "knot-loop",
          anchor: { x: 934, y: 236 },
          scale: 82,
          range: 248,
          fov: 1.12,
          pathSpeed: 0.2,
          sweepSpeed: 1.34,
        },
      ];

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: DESCRIPTION,
      };

      const gameplay = {
        player: null,
        sentinels: [],
        collectedOrder: [],
        deposited: new Set(),
        currentPatternId: null,
        exposure: 0,
        collapseX: 52,
        popups: [],
        particles: [],
        sparkles: [],
        ambientShards: [],
        floorCracks: [],
        ghosts: [],
        traces: [],
        screenShake: 0,
        flash: 0,
        gatePulse: 0,
        opening: 0,
        inputTarget: null,
      };

      const input = {
        keys: Object.create(null),
        moveButtons: { left: false, right: false, up: false, down: false },
        dragging: false,
        pointerId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        const t = clamp(value, 0, 1);
        return 1 - Math.pow(1 - t, 3);
      }

      function easeInOutSine(value) {
        return -(Math.cos(Math.PI * clamp(value, 0, 1)) - 1) / 2;
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function angleDiff(a, b) {
        let diff = a - b;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return diff;
      }

      function rgba(hex, alpha) {
        const value = hex.replace("#", "");
        const normalized = value.length === 3
          ? value.split("").map((part) => part + part).join("")
          : value;
        const parsed = Number.parseInt(normalized, 16);
        const r = (parsed >> 16) & 255;
        const g = (parsed >> 8) & 255;
        const b = parsed & 255;
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function getPattern(id) {
        return PATTERNS.find((pattern) => pattern.id === id);
      }

      function getPatternLengths(pattern) {
        if (pattern.lengths) {
          return pattern.lengths;
        }
        const lengths = [0];
        for (let index = 1; index < pattern.points.length; index += 1) {
          const prev = pattern.points[index - 1];
          const next = pattern.points[index];
          lengths.push(lengths[index - 1] + distance(prev.x, prev.y, next.x, next.y));
        }
        pattern.lengths = lengths;
        pattern.totalLength = lengths[lengths.length - 1] || 1;
        return lengths;
      }

      function samplePatternPoint(pattern, t) {
        const lengths = getPatternLengths(pattern);
        const totalLength = pattern.totalLength || 1;
        const travel = clamp(t, 0, 1) * totalLength;
        for (let index = 1; index < lengths.length; index += 1) {
          if (travel <= lengths[index]) {
            const start = pattern.points[index - 1];
            const end = pattern.points[index];
            const span = Math.max(0.0001, lengths[index] - lengths[index - 1]);
            const ratio = (travel - lengths[index - 1]) / span;
            return {
              x: lerp(start.x, end.x, ratio),
              y: lerp(start.y, end.y, ratio),
            };
          }
        }
        return pattern.points[pattern.points.length - 1];
      }

      function drawPatternGlyph(pattern, x, y, scale, color, alpha, progress = 1, lineWidth = 4) {
        const visibleSegments = Math.max(2, Math.floor((pattern.points.length - 1) * clamp(progress, 0.16, 1)));
        ctx.beginPath();
        ctx.moveTo(x + pattern.points[0].x * scale, y + pattern.points[0].y * scale);
        for (let index = 1; index <= visibleSegments; index += 1) {
          const point = pattern.points[index];
          if (!point) {
            break;
          }
          ctx.lineTo(x + point.x * scale, y + point.y * scale);
        }
        ctx.strokeStyle = rgba(color, alpha);
        ctx.lineWidth = lineWidth;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();
      }

      function createAmbient() {
        gameplay.sparkles = Array.from({ length: 30 }, (_, index) => ({
          x: randomBetween(20, VIEW.width - 20),
          y: randomBetween(30, VIEW.height - 30),
          size: randomBetween(1.2, 3.8),
          speed: randomBetween(0.2, 0.95),
          seed: index * 2.17,
          hue: ["#72efff", "#ffc66d", "#ff7a9f"][index % 3],
        }));
        gameplay.ambientShards = Array.from({ length: 18 }, (_, index) => ({
          x: randomBetween(100, VIEW.width - 120),
          y: randomBetween(100, VIEW.height - 110),
          scale: randomBetween(18, 54),
          rotation: randomBetween(-1, 1),
          drift: randomBetween(0.24, 0.9),
          glow: ["#72efff", "#4bd8de", "#ffc66d"][index % 3],
        }));
        gameplay.floorCracks = Array.from({ length: 13 }, (_, index) => ({
          x: 110 + index * 90 + (index % 2 === 0 ? 14 : -10),
          y: 470 + (index % 3) * 26,
          len: 40 + (index % 4) * 12,
          tilt: index % 2 === 0 ? 1 : -1,
        }));
      }

      function createPlayer() {
        return {
          x: 116,
          y: 388,
          vx: 0,
          vy: 0,
          radius: 18,
          trail: [],
        };
      }

      function createSentinels() {
        return sentinelBlueprints.map((blueprint, index) => ({
          patternId: blueprint.patternId,
          anchor: { x: blueprint.anchor.x, y: blueprint.anchor.y },
          scale: blueprint.scale,
          range: blueprint.range,
          fov: blueprint.fov,
          pathSpeed: blueprint.pathSpeed,
          sweepSpeed: blueprint.sweepSpeed,
          pathTime: index * 0.22,
          stolen: false,
          flash: 0,
          x: blueprint.anchor.x,
          y: blueprint.anchor.y,
          lookAngle: 0,
        }));
      }

      function resetInput() {
        input.keys = Object.create(null);
        input.moveButtons.left = false;
        input.moveButtons.right = false;
        input.moveButtons.up = false;
        input.moveButtons.down = false;
        input.dragging = false;
        input.pointerId = null;
        gameplay.inputTarget = null;
        Object.values(mobileButtons).forEach((button) => {
          button.dataset.active = "false";
        });
      }

      function setNote(text) {
        state.note = text;
      }

      function addPopup(text, x, y, color) {
        gameplay.popups.push({
          text,
          x,
          y,
          color,
          life: 1.25,
          ttl: 1.25,
        });
      }

      function addParticleBurst(x, y, color, count, speed = 1) {
        const total = reduceMotion ? Math.ceil(count * 0.35) : count;
        for (let index = 0; index < total; index += 1) {
          const ttl = randomBetween(0.35, 1.15);
          gameplay.particles.push({
            x,
            y,
            vx: randomBetween(-180, 180) * speed,
            vy: randomBetween(-180, 180) * speed,
            life: ttl,
            ttl,
            size: randomBetween(1.8, 6.2),
            color,
          });
        }
      }

      function addTrace(x, y, radius, color) {
        gameplay.traces.push({
          x,
          y,
          radius,
          life: 0.48,
          ttl: 0.48,
          color,
        });
      }

      function createGhost(patternId) {
        const pattern = getPattern(patternId);
        const gate = getGatePosition();
        const slotIndex = PATTERNS.findIndex((item) => item.id === patternId);
        gameplay.ghosts.push({
          patternId,
          x: gameplay.player.x,
          y: gameplay.player.y,
          gateX: gate.x - 42 + slotIndex * 40,
          gateY: gate.y - 74 + slotIndex * 74,
          color: pattern.color,
          life: 0.9,
          ttl: 0.9,
        });
      }

      function getGatePosition() {
        return { x: 1112, y: 358 };
      }

      function getInputAxis() {
        let x = 0;
        let y = 0;
        if (input.keys.ArrowLeft || input.keys.a || input.keys.A || input.moveButtons.left) x -= 1;
        if (input.keys.ArrowRight || input.keys.d || input.keys.D || input.moveButtons.right) x += 1;
        if (input.keys.ArrowUp || input.keys.w || input.keys.W || input.moveButtons.up) y -= 1;
        if (input.keys.ArrowDown || input.keys.s || input.keys.S || input.moveButtons.down) y += 1;
        return { x, y };
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        gameplay.player = createPlayer();
        gameplay.sentinels = createSentinels();
        gameplay.collectedOrder = [];
        gameplay.deposited = new Set();
        gameplay.currentPatternId = null;
        gameplay.exposure = 0;
        gameplay.collapseX = 52;
        gameplay.popups = [];
        gameplay.particles = [];
        gameplay.ghosts = [];
        gameplay.traces = [];
        gameplay.screenShake = 0;
        gameplay.flash = 0;
        gameplay.gatePulse = 0;
        gameplay.opening = 0;
        gameplay.inputTarget = null;
        resetInput();
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        setNote("왼쪽의 붕괴선을 등지고 3개의 감시 패턴을 훔친 뒤 금고에서 재생하세요.");
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        gameplay.screenShake = 16;
        gameplay.flash = 1;
        setNote(reason === "collapse" ? "붕괴선이 발밑까지 도달했습니다." : "감시 시선이 너무 오래 머물렀습니다.");
        addParticleBurst(gameplay.player.x, gameplay.player.y, reason === "collapse" ? "#ff7e5f" : "#ff6c94", 38, 1.2);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        gameplay.flash = 1;
        gameplay.screenShake = 10;
        setNote("금고가 열렸습니다. 수정 주조소를 통과했습니다.");
        addParticleBurst(getGatePosition().x, getGatePosition().y, "#9efcff", 56, 1.25);
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function attemptStealAt(x, y) {
        if (state.mode !== "running") {
          return false;
        }
        for (const sentinel of gameplay.sentinels) {
          const pattern = getPattern(sentinel.patternId);
          const nearSentinel = distance(x, y, sentinel.x, sentinel.y) <= 42;
          const nearPlayer = distance(gameplay.player.x, gameplay.player.y, sentinel.x, sentinel.y) <= 88;
          if (nearSentinel && nearPlayer) {
            sentinel.flash = 1;
            gameplay.flash = 0.32;
            gameplay.screenShake = Math.max(gameplay.screenShake, 5);
            if (!sentinel.stolen) {
              sentinel.stolen = true;
              if (!gameplay.collectedOrder.includes(sentinel.patternId)) {
                gameplay.collectedOrder.push(sentinel.patternId);
              }
              gameplay.currentPatternId = sentinel.patternId;
              setNote(`${pattern.label} 패턴을 훔쳤습니다. 금고까지 이어 달리세요.`);
              addPopup("PATTERN STOLEN", sentinel.x, sentinel.y - 48, pattern.color);
              addParticleBurst(sentinel.x, sentinel.y, pattern.color, 28, 1.1);
            } else {
              gameplay.currentPatternId = sentinel.patternId;
              setNote(`${pattern.label} 패턴을 다시 동기화했습니다.`);
              addPopup("SYNCED", sentinel.x, sentinel.y - 40, pattern.color);
            }
            return true;
          }
        }
        return false;
      }

      function attemptReplay() {
        if (state.mode !== "running") {
          return;
        }
        const gate = getGatePosition();
        if (distance(gameplay.player.x, gameplay.player.y, gate.x, gate.y) > 170) {
          setNote("금고 문 앞에서 패턴을 재생해야 합니다.");
          addPopup("VAULT TOO FAR", gameplay.player.x, gameplay.player.y - 34, "#ffc66d");
          return;
        }

        const availablePatternId = gameplay.collectedOrder.find((id) => !gameplay.deposited.has(id));
        if (!availablePatternId) {
          setNote("재생할 패턴이 없습니다. 감시 패턴을 먼저 훔치세요.");
          addPopup("NO PATTERN", gate.x, gate.y - 118, "#ff7a9f");
          return;
        }

        gameplay.deposited.add(availablePatternId);
        gameplay.currentPatternId = gameplay.collectedOrder.find((id) => !gameplay.deposited.has(id)) || null;
        gameplay.gatePulse = 1;
        gameplay.flash = 0.22;
        const pattern = getPattern(availablePatternId);
        addPopup("SEAL LOCKED", gate.x, gate.y - 116 + gameplay.deposited.size * 18, pattern.color);
        addParticleBurst(gate.x, gate.y, pattern.color, 32, 1.2);
        createGhost(availablePatternId);
        setNote(`${pattern.label} 패턴을 금고 봉인에 재생했습니다.`);
        if (gameplay.deposited.size >= PATTERNS.length) {
          gameplay.opening = 1.2;
        }
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.().catch(() => {});
          return;
        }
        document.exitFullscreen?.().catch(() => {});
      }

      function toCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const clientX = event.clientX ?? 0;
        const clientY = event.clientY ?? 0;
        return {
          x: ((clientX - rect.left) / rect.width) * VIEW.width,
          y: ((clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function setPointerTarget(point) {
        gameplay.inputTarget = {
          x: clamp(point.x, 24, VIEW.width - 24),
          y: clamp(point.y, 24, VIEW.height - 24),
        };
      }

      function updateSentinels(dt) {
        for (const sentinel of gameplay.sentinels) {
          const pattern = getPattern(sentinel.patternId);
          sentinel.pathTime += dt * sentinel.pathSpeed * 60;
          const loop = ((sentinel.pathTime % 1) + 1) % 1;
          const point = samplePatternPoint(pattern, loop);
          const future = samplePatternPoint(pattern, (loop + 0.02) % 1);
          sentinel.x = sentinel.anchor.x + point.x * sentinel.scale;
          sentinel.y = sentinel.anchor.y + point.y * sentinel.scale * 0.94;
          const pathAngle = Math.atan2((future.y - point.y) * sentinel.scale, (future.x - point.x) * sentinel.scale);
          sentinel.lookAngle = pathAngle + Math.sin(state.elapsed * sentinel.sweepSpeed + sentinel.anchor.x * 0.01) * 0.44;
          sentinel.flash = Math.max(0, sentinel.flash - dt * 2.2);
        }
      }

      function updatePlayer(dt) {
        const player = gameplay.player;
        const axis = getInputAxis();
        const pointerVector = { x: 0, y: 0 };
        if (gameplay.inputTarget) {
          pointerVector.x = gameplay.inputTarget.x - player.x;
          pointerVector.y = gameplay.inputTarget.y - player.y;
          const pointerDistance = Math.hypot(pointerVector.x, pointerVector.y);
          if (pointerDistance < 10) {
            gameplay.inputTarget = null;
          } else {
            pointerVector.x /= pointerDistance;
            pointerVector.y /= pointerDistance;
          }
        }

        let moveX = axis.x;
        let moveY = axis.y;
        if (moveX === 0 && moveY === 0 && gameplay.inputTarget) {
          moveX = pointerVector.x;
          moveY = pointerVector.y;
        }

        const moveLength = Math.hypot(moveX, moveY) || 1;
        const moving = Math.abs(moveX) + Math.abs(moveY) > 0;
        const speedBoost = gameplay.currentPatternId ? 1.06 : 1;
        const targetVx = (moveX / moveLength) * 282 * (moving ? speedBoost : 0);
        const targetVy = (moveY / moveLength) * 282 * (moving ? speedBoost : 0);
        player.vx = lerp(player.vx, targetVx, 0.18);
        player.vy = lerp(player.vy, targetVy, 0.18);
        player.x = clamp(player.x + player.vx * dt, 48, VIEW.width - 74);
        player.y = clamp(player.y + player.vy * dt, 80, VIEW.height - 96);

        player.trail.push({
          x: player.x,
          y: player.y,
          life: 0.34,
        });
        if (player.trail.length > 18) {
          player.trail.shift();
        }
        for (const point of player.trail) {
          point.life = Math.max(0, point.life - dt);
        }
      }

      function updateExposure(dt) {
        let seenBy = 0;
        for (const sentinel of gameplay.sentinels) {
          const dx = gameplay.player.x - sentinel.x;
          const dy = gameplay.player.y - sentinel.y;
          const range = Math.hypot(dx, dy);
          if (range > sentinel.range) {
            continue;
          }
          const angle = Math.atan2(dy, dx);
          const diff = Math.abs(angleDiff(angle, sentinel.lookAngle));
          if (diff <= sentinel.fov * 0.5) {
            seenBy += 1;
          }
        }

        if (seenBy > 0) {
          gameplay.exposure = clamp(gameplay.exposure + dt * (0.46 + seenBy * 0.38), 0, 1.18);
          if (Math.random() < 0.12) {
            addTrace(gameplay.player.x, gameplay.player.y, 26 + seenBy * 6, "#ff879e");
          }
        } else {
          gameplay.exposure = clamp(gameplay.exposure - dt * 0.24, 0, 1.18);
        }

        if (gameplay.exposure >= 1) {
          failStage("exposure");
        }
      }

      function updateCollapse(dt) {
        const progress = clamp(state.elapsed / 28, 0, 1);
        const speed = 30 + progress * 22 + gameplay.deposited.size * 8;
        gameplay.collapseX += dt * speed;
        if (Math.random() < 0.28 && !reduceMotion) {
          const ttl = randomBetween(0.28, 0.8);
          gameplay.particles.push({
            x: gameplay.collapseX + randomBetween(-18, 8),
            y: randomBetween(88, VIEW.height - 78),
            vx: randomBetween(30, 100),
            vy: randomBetween(-28, 28),
            life: ttl,
            ttl,
            size: randomBetween(2.6, 6.8),
            color: "#ff8b68",
          });
        }
        if (gameplay.player.x - gameplay.player.radius < gameplay.collapseX + 6) {
          failStage("collapse");
        }
      }

      function updateEffects(dt) {
        gameplay.screenShake = Math.max(0, gameplay.screenShake - dt * 24);
        gameplay.flash = Math.max(0, gameplay.flash - dt * 1.8);
        gameplay.gatePulse = Math.max(0, gameplay.gatePulse - dt * 1.6);

        for (let index = gameplay.particles.length - 1; index >= 0; index -= 1) {
          const particle = gameplay.particles[index];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 12 * dt;
          if (particle.life <= 0) {
            gameplay.particles.splice(index, 1);
          }
        }

        for (let index = gameplay.popups.length - 1; index >= 0; index -= 1) {
          const popup = gameplay.popups[index];
          popup.life -= dt;
          popup.y -= dt * 30;
          if (popup.life <= 0) {
            gameplay.popups.splice(index, 1);
          }
        }

        for (let index = gameplay.traces.length - 1; index >= 0; index -= 1) {
          const trace = gameplay.traces[index];
          trace.life -= dt;
          trace.radius += dt * 54;
          if (trace.life <= 0) {
            gameplay.traces.splice(index, 1);
          }
        }

        for (let index = gameplay.ghosts.length - 1; index >= 0; index -= 1) {
          const ghost = gameplay.ghosts[index];
          ghost.life -= dt;
          const ratio = 1 - ghost.life / ghost.ttl;
          ghost.x = lerp(gameplay.player.x, ghost.gateX, easeOutCubic(ratio));
          ghost.y = lerp(gameplay.player.y, ghost.gateY, easeOutCubic(ratio));
          if (ghost.life <= 0) {
            gameplay.ghosts.splice(index, 1);
          }
        }

        if (state.mode === "running" && gameplay.opening > 0) {
          gameplay.opening = Math.max(0, gameplay.opening - dt);
          if (gameplay.opening === 0) {
            clearStage();
          }
        }
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;
          updateSentinels(dt);
          updatePlayer(dt);
          updateExposure(dt);
          updateCollapse(dt);
        }
        updateEffects(dt);
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#07131f");
        gradient.addColorStop(0.55, "#0a1f2e");
        gradient.addColorStop(1, "#06141f");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const roofGlow = ctx.createRadialGradient(VIEW.width * 0.5, 120, 60, VIEW.width * 0.5, 120, 620);
        roofGlow.addColorStop(0, "rgba(122, 240, 255, 0.2)");
        roofGlow.addColorStop(1, "rgba(122, 240, 255, 0)");
        ctx.fillStyle = roofGlow;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height * 0.7);

        ctx.fillStyle = "rgba(6, 20, 30, 0.88)";
        ctx.fillRect(0, 478, VIEW.width, 242);

        for (const shard of gameplay.ambientShards) {
          const bob = Math.sin(state.elapsed * shard.drift + shard.x * 0.01) * 8;
          ctx.save();
          ctx.translate(shard.x, shard.y + bob);
          ctx.rotate(shard.rotation + Math.sin(state.elapsed * 0.2 + shard.y * 0.01) * 0.1);
          ctx.fillStyle = rgba(shard.glow, 0.16);
          ctx.beginPath();
          ctx.moveTo(0, -shard.scale * 0.8);
          ctx.lineTo(shard.scale * 0.48, 0);
          ctx.lineTo(0, shard.scale);
          ctx.lineTo(-shard.scale * 0.42, 0);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }

        ctx.strokeStyle = "rgba(84, 215, 233, 0.12)";
        ctx.lineWidth = 2;
        for (let column = 0; column < 7; column += 1) {
          const x = 120 + column * 170;
          ctx.beginPath();
          ctx.moveTo(x, 72);
          ctx.lineTo(x, 476);
          ctx.stroke();
        }

        for (const crack of gameplay.floorCracks) {
          const active = crack.x < gameplay.collapseX + 120 ? 0.9 : 0.2;
          ctx.strokeStyle = `rgba(255, 127, 95, ${0.06 + active * 0.12})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(crack.x - crack.len * 0.6, crack.y);
          ctx.lineTo(crack.x, crack.y + crack.tilt * 12);
          ctx.lineTo(crack.x + crack.len * 0.5, crack.y - crack.tilt * 9);
          ctx.stroke();
        }

        for (const sparkle of gameplay.sparkles) {
          const flicker = 0.5 + 0.5 * Math.sin(state.elapsed * sparkle.speed * 2.4 + sparkle.seed);
          ctx.fillStyle = rgba(sparkle.hue, 0.18 + flicker * 0.28);
          ctx.beginPath();
          ctx.arc(sparkle.x, sparkle.y, sparkle.size * (0.7 + flicker * 0.5), 0, Math.PI * 2);
          ctx.fill();
        }

        const line = ctx.createLinearGradient(86, 420, VIEW.width - 120, 290);
        line.addColorStop(0, "rgba(120, 244, 255, 0.16)");
        line.addColorStop(1, "rgba(255, 198, 109, 0.2)");
        ctx.strokeStyle = line;
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(102, 410);
        ctx.lineTo(322, 248);
        ctx.lineTo(632, 428);
        ctx.lineTo(916, 246);
        ctx.lineTo(1092, 360);
        ctx.stroke();
      }

      function drawCollapseFront() {
        ctx.fillStyle = "rgba(255, 92, 63, 0.08)";
        ctx.fillRect(0, 0, gameplay.collapseX, VIEW.height);

        const gradient = ctx.createLinearGradient(gameplay.collapseX - 80, 0, gameplay.collapseX + 20, 0);
        gradient.addColorStop(0, "rgba(255, 120, 83, 0)");
        gradient.addColorStop(0.6, "rgba(255, 120, 83, 0.38)");
        gradient.addColorStop(1, "rgba(255, 226, 194, 0.18)");
        ctx.fillStyle = gradient;
        ctx.fillRect(gameplay.collapseX - 90, 0, 110, VIEW.height);

        ctx.beginPath();
        const jag = 18;
        ctx.moveTo(gameplay.collapseX, 0);
        for (let y = 0; y <= VIEW.height + jag; y += jag) {
          const offset = Math.sin(state.elapsed * 8 + y * 0.04) * 10 + Math.cos(y * 0.08) * 4;
          ctx.lineTo(gameplay.collapseX + offset, y);
        }
        ctx.lineTo(0, VIEW.height);
        ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fillStyle = "rgba(255, 106, 74, 0.11)";
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 200, 164, 0.92)";
        ctx.lineWidth = 4;
        ctx.shadowColor = "rgba(255, 154, 110, 0.8)";
        ctx.shadowBlur = 18;
        ctx.beginPath();
        for (let y = 0; y <= VIEW.height + jag; y += jag) {
          const offset = Math.sin(state.elapsed * 8 + y * 0.04) * 10 + Math.cos(y * 0.08) * 4;
          if (y === 0) {
            ctx.moveTo(gameplay.collapseX + offset, y);
          } else {
            ctx.lineTo(gameplay.collapseX + offset, y);
          }
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      function drawGate() {
        const gate = getGatePosition();
        const openRatio = state.mode === "cleared"
          ? 1
          : gameplay.opening > 0
            ? easeInOutSine(1 - gameplay.opening / 1.2)
            : 0;
        const split = 36 * openRatio;

        ctx.save();
        ctx.translate(gate.x, gate.y);

        const glow = ctx.createRadialGradient(0, 0, 60, 0, 0, 170);
        glow.addColorStop(0, rgba("#9af8ff", 0.18 + gameplay.gatePulse * 0.24));
        glow.addColorStop(1, "rgba(154, 248, 255, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 170, 0, Math.PI * 2);
        ctx.fill();

        for (let side = -1; side <= 1; side += 2) {
          ctx.save();
          ctx.translate(side * split, 0);
          ctx.fillStyle = "rgba(9, 24, 36, 0.9)";
          ctx.strokeStyle = "rgba(123, 242, 255, 0.42)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.roundRect(side < 0 ? -94 : -10, -118, 104, 236, 26);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }

        PATTERNS.forEach((pattern, index) => {
          const filled = gameplay.deposited.has(pattern.id);
          const slotY = -74 + index * 74;
          ctx.fillStyle = filled ? rgba(pattern.sealColor, 0.22) : "rgba(255, 255, 255, 0.04)";
          ctx.strokeStyle = filled ? rgba(pattern.sealColor, 0.72) : "rgba(123, 242, 255, 0.22)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.roundRect(-52, slotY - 24, 104, 48, 20);
          ctx.fill();
          ctx.stroke();
          drawPatternGlyph(pattern, 0, slotY, 26, filled ? pattern.sealColor : "#4b7384", filled ? 1 : 0.42, 1, 3.5);
        });

        ctx.restore();
      }

      function drawSentinels() {
        for (const sentinel of gameplay.sentinels) {
          const pattern = getPattern(sentinel.patternId);
          const pulse = 0.55 + 0.45 * Math.sin(state.elapsed * 4 + sentinel.anchor.x * 0.02);
          const bodyRadius = sentinel.stolen ? 17 : 20;

          const cone = ctx.createRadialGradient(sentinel.x, sentinel.y, 18, sentinel.x, sentinel.y, sentinel.range);
          cone.addColorStop(0, rgba(sentinel.stolen ? "#ffb58d" : pattern.color, 0.16));
          cone.addColorStop(1, "rgba(255,255,255,0)");
          ctx.save();
          ctx.translate(sentinel.x, sentinel.y);
          ctx.rotate(sentinel.lookAngle);
          ctx.fillStyle = cone;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, sentinel.range, -sentinel.fov * 0.5, sentinel.fov * 0.5);
          ctx.closePath();
          ctx.fill();
          ctx.restore();

          drawPatternGlyph(pattern, sentinel.anchor.x, sentinel.anchor.y, sentinel.scale, pattern.color, 0.22, 1, 2.5);

          ctx.shadowColor = rgba(pattern.color, 0.7);
          ctx.shadowBlur = 22 + sentinel.flash * 18;
          ctx.fillStyle = rgba(pattern.color, sentinel.stolen ? 0.5 : 0.85);
          ctx.beginPath();
          ctx.arc(sentinel.x, sentinel.y, bodyRadius + sentinel.flash * 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          ctx.fillStyle = "rgba(255,255,255,0.94)";
          ctx.beginPath();
          ctx.arc(sentinel.x - 4, sentinel.y - 5, 5 + pulse * 1.5, 0, Math.PI * 2);
          ctx.arc(sentinel.x + 6, sentinel.y + 3, 3.5 + pulse, 0, Math.PI * 2);
          ctx.fill();

          if (!sentinel.stolen) {
            ctx.strokeStyle = rgba(pattern.color, 0.9);
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(sentinel.x, sentinel.y, 30 + pulse * 8, 0, Math.PI * 2);
            ctx.stroke();
          }
        }
      }

      function drawPlayer() {
        const player = gameplay.player;
        if (!player) {
          return;
        }

        player.trail.forEach((point, index) => {
          const alpha = point.life * 0.28;
          if (alpha <= 0) {
            return;
          }
          ctx.fillStyle = `rgba(142, 247, 255, ${alpha})`;
          ctx.beginPath();
          ctx.arc(point.x, point.y, 8 + index * 0.35, 0, Math.PI * 2);
          ctx.fill();
        });

        const outer = ctx.createRadialGradient(player.x, player.y, 4, player.x, player.y, 28);
        outer.addColorStop(0, "rgba(255,255,255,0.95)");
        outer.addColorStop(0.5, "rgba(134, 242, 255, 0.85)");
        outer.addColorStop(1, "rgba(134, 242, 255, 0.08)");
        ctx.fillStyle = outer;
        ctx.beginPath();
        ctx.arc(player.x, player.y, 30, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#d9fbff";
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 20);
        ctx.lineTo(player.x + 14, player.y - 6);
        ctx.lineTo(player.x + 10, player.y + 18);
        ctx.lineTo(player.x - 12, player.y + 16);
        ctx.lineTo(player.x - 18, player.y - 2);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.86)";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(player.x - 4, player.y - 12);
        ctx.lineTo(player.x + 8, player.y + 4);
        ctx.lineTo(player.x - 6, player.y + 11);
        ctx.stroke();

        if (gameplay.currentPatternId) {
          const pattern = getPattern(gameplay.currentPatternId);
          drawPatternGlyph(pattern, player.x + 34, player.y - 30, 20, pattern.color, 0.9, 1, 3);
        }
      }

      function drawEffects() {
        for (const trace of gameplay.traces) {
          ctx.strokeStyle = rgba(trace.color, trace.life / trace.ttl * 0.4);
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(trace.x, trace.y, trace.radius, 0, Math.PI * 2);
          ctx.stroke();
        }

        for (const particle of gameplay.particles) {
          ctx.fillStyle = rgba(particle.color, particle.life / particle.ttl);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * (particle.life / particle.ttl), 0, Math.PI * 2);
          ctx.fill();
        }

        for (const ghost of gameplay.ghosts) {
          const pattern = getPattern(ghost.patternId);
          const alpha = ghost.life / ghost.ttl;
          drawPatternGlyph(pattern, ghost.x, ghost.y, 28, ghost.color, alpha, 1, 3.2);
        }

        for (const popup of gameplay.popups) {
          ctx.font = "800 18px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillStyle = rgba(popup.color, popup.life / popup.ttl);
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.textAlign = "left";
        }

        if (gameplay.flash > 0) {
          ctx.fillStyle = `rgba(225, 247, 255, ${gameplay.flash * 0.15})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function drawHud() {
        const player = gameplay.player;
        const gate = getGatePosition();
        ctx.save();
        ctx.fillStyle = "rgba(5, 15, 24, 0.74)";
        ctx.strokeStyle = "rgba(114, 239, 255, 0.18)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(26, 22, 360, 110, 20);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#f4fbff";
        ctx.font = "800 20px Trebuchet MS";
        ctx.fillText("MIRROR HEIST", 44, 50);

        ctx.font = "700 14px Trebuchet MS";
        ctx.fillStyle = "rgba(214, 242, 255, 0.86)";
        ctx.fillText(`패턴 ${gameplay.deposited.size}/${PATTERNS.length}`, 44, 78);
        ctx.fillText(`노출 ${(gameplay.exposure * 100).toFixed(0)}%`, 44, 102);
        ctx.fillText(`붕괴선 ${(gameplay.collapseX / 10).toFixed(0)}m`, 168, 78);
        ctx.fillText(`경과 ${state.elapsed.toFixed(1)}s`, 168, 102);

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.roundRect(264, 66, 96, 10, 999);
        ctx.roundRect(264, 94, 96, 10, 999);
        ctx.fill();
        ctx.fillStyle = rgba("#72efff", 0.88);
        ctx.beginPath();
        ctx.roundRect(264, 66, clamp(gameplay.deposited.size / PATTERNS.length, 0, 1) * 96, 10, 999);
        ctx.fill();
        ctx.fillStyle = rgba("#ff7a9f", 0.92);
        ctx.beginPath();
        ctx.roundRect(264, 94, clamp(gameplay.exposure, 0, 1) * 96, 10, 999);
        ctx.fill();
        ctx.restore();

        PATTERNS.forEach((pattern, index) => {
          const x = 450 + index * 92;
          const acquired = gameplay.collectedOrder.includes(pattern.id);
          const deposited = gameplay.deposited.has(pattern.id);
          ctx.fillStyle = acquired ? rgba(pattern.color, deposited ? 0.18 : 0.14) : "rgba(255,255,255,0.04)";
          ctx.strokeStyle = acquired ? rgba(pattern.color, deposited ? 0.92 : 0.54) : "rgba(255,255,255,0.12)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(x, 26, 74, 74, 22);
          ctx.fill();
          ctx.stroke();
          drawPatternGlyph(pattern, x + 37, 63, 22, acquired ? pattern.color : "#425465", acquired ? 1 : 0.36, 1, 3);
          if (gameplay.currentPatternId === pattern.id && !deposited) {
            ctx.strokeStyle = "rgba(255,255,255,0.82)";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.roundRect(x - 3, 23, 80, 80, 24);
            ctx.stroke();
          }
        });

        ctx.fillStyle = "rgba(214, 242, 255, 0.85)";
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillText("클릭/터치로 감시 패턴 훔치기", 804, 42);
        ctx.fillText("Space 또는 재생 버튼으로 봉인 재생", 804, 64);
        ctx.fillText("터치 드래그 또는 방향키 이동", 804, 86);

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.roundRect(766, 108, 474, 40, 18);
        ctx.fill();
        ctx.fillStyle = "rgba(233, 248, 255, 0.92)";
        ctx.font = "700 15px Trebuchet MS";
        ctx.fillText(state.note, 786, 134);

        if (player) {
          ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
          ctx.setLineDash([7, 7]);
          ctx.beginPath();
          ctx.moveTo(player.x, player.y);
          ctx.lineTo(gate.x, gate.y);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }

      function drawOverlay() {
        if (state.mode === "running") {
          return;
        }

        ctx.fillStyle = "rgba(3, 10, 16, 0.58)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const accent = state.mode === "menu" ? "#79f2ff" : state.mode === "failed" ? "#ff8c77" : "#9df6ff";
        const panelX = 110;
        const panelY = 92;
        const panelW = VIEW.width - 220;
        const panelH = VIEW.height - 184;

        const panelGradient = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
        panelGradient.addColorStop(0, "rgba(8, 22, 34, 0.92)");
        panelGradient.addColorStop(1, "rgba(5, 14, 24, 0.96)");
        ctx.fillStyle = panelGradient;
        ctx.strokeStyle = rgba(accent, 0.65);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(panelX, panelY, panelW, panelH, 34);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = rgba(accent, 0.18);
        ctx.beginPath();
        ctx.roundRect(panelX + 24, panelY + 24, panelW - 48, 82, 24);
        ctx.fill();

        ctx.fillStyle = "#f8fcff";
        ctx.font = "800 52px Trebuchet MS";
        ctx.fillText(state.mode === "menu" ? TITLE : state.mode === "failed" ? "FOUNDRY COLLAPSED" : "VAULT OPEN", panelX + 48, panelY + 78);

        ctx.fillStyle = "rgba(229, 245, 255, 0.86)";
        ctx.font = "700 24px Trebuchet MS";
        if (state.mode === "menu") {
          ctx.fillText(DESCRIPTION, panelX + 48, panelY + 144);
        } else if (state.mode === "failed") {
          ctx.fillText(FAIL_TEXT, panelX + 48, panelY + 144);
        } else {
          ctx.fillText(CLEAR_TEXT, panelX + 48, panelY + 144);
        }

        ctx.font = "700 18px Trebuchet MS";
        ctx.fillStyle = "rgba(201, 233, 247, 0.9)";

        const lines = state.mode === "menu"
          ? [
              "조작: 드래그 또는 방향키로 이동, 감시 드론을 클릭/터치해 패턴 복사.",
              "금고 앞에서 Space, 재생 버튼, 또는 두 손가락 탭으로 봉인 재생.",
              "모바일은 터치 드래그와 재생 버튼만으로 플레이 가능.",
              "1. 좌측 붕괴선보다 앞서 각 감시 드론에 붙는다.",
              "2. 클릭 또는 터치로 패턴을 훔치고 바로 다음 지점으로 이어 달린다.",
              "3. 우측 금고 앞에서 Space, 재생 버튼, 또는 두 손가락 탭으로 봉인을 순서대로 재생한다.",
              "Enter, 클릭, 터치로 시작. 모바일은 드래그 이동 + 재생 버튼으로 플레이 가능.",
            ]
          : state.mode === "failed"
            ? [
                state.note,
                `기록 ${state.lastRunTime.toFixed(1)}초`,
                "감시 시선 안에서는 노출 게이지가 빠르게 차오릅니다.",
                "붕괴선이 지나간 뒤의 수정 바닥은 다시 안전해지지 않습니다.",
                "클릭 또는 터치, Enter로 즉시 재시작.",
              ]
            : [
                state.note,
                `기록 ${state.lastRunTime.toFixed(1)}초`,
                "세 봉인을 모두 채워 거울 금고를 열었습니다.",
                "호스트에서는 다음 미플레이 스테이지로 이어집니다.",
                "클릭 또는 터치, Enter로 다시 플레이 가능.",
              ];

        lines.forEach((line, index) => {
          const row = index < 3 ? index : index + 0.4;
          ctx.fillText(line, panelX + 48, panelY + 196 + row * 42);
        });

        PATTERNS.forEach((pattern, index) => {
          const x = panelX + 86 + index * 162;
          const y = panelY + panelH - 106;
          ctx.fillStyle = rgba(pattern.color, 0.14);
          ctx.strokeStyle = rgba(pattern.color, 0.62);
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(x - 56, y - 36, 112, 72, 22);
          ctx.fill();
          ctx.stroke();
          drawPatternGlyph(pattern, x, y, 28, pattern.color, 1, 1, 3.5);
          ctx.fillStyle = "#eff8ff";
          ctx.font = "700 15px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(pattern.label, x, y + 54);
          ctx.textAlign = "left";
        });

        ctx.fillStyle = rgba(accent, 0.9);
        ctx.font = "800 18px Trebuchet MS";
        ctx.fillText(state.mode === "menu" ? "TAP TO BREACH" : "TAP TO RESTART", panelX + panelW - 198, panelY + panelH - 40);
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = gameplay.screenShake > 0 ? Math.sin(state.elapsed * 56) * gameplay.screenShake : 0;
        const shakeY = gameplay.screenShake > 0 ? Math.cos(state.elapsed * 63) * gameplay.screenShake * 0.45 : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        if (state.mode !== "menu") {
          drawCollapseFront();
          drawGate();
        }
        if (gameplay.player) {
          drawSentinels();
          drawPlayer();
          drawEffects();
          drawHud();
        }
        ctx.restore();

        drawOverlay();
      }

      function renderGameToText() {
        const gate = getGatePosition();
        return JSON.stringify({
          coordinate_system: "origin top-left, x right, y down, canvas 1280x720",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          player: gameplay.player
            ? {
                x: Math.round(gameplay.player.x),
                y: Math.round(gameplay.player.y),
                radius: gameplay.player.radius,
              }
            : null,
          collapse_x: Math.round(gameplay.collapseX),
          exposure: Number(gameplay.exposure.toFixed(2)),
          current_pattern: gameplay.currentPatternId,
          stolen_patterns: gameplay.collectedOrder.slice(),
          deposited_patterns: Array.from(gameplay.deposited),
          sentinels: gameplay.sentinels.map((sentinel) => ({
            id: sentinel.patternId,
            x: Math.round(sentinel.x),
            y: Math.round(sentinel.y),
            stolen: sentinel.stolen,
            look_angle: Number(sentinel.lookAngle.toFixed(2)),
          })),
          gate: { x: gate.x, y: gate.y },
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        input.keys[event.key] = true;
        if (event.key === "Enter" && state.mode !== "running") {
          event.preventDefault();
          startStage();
          return;
        }
        if (event.key === " " || event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            attemptReplay();
          }
          return;
        }
        if ((event.key === "r" || event.key === "R") && state.mode !== "running") {
          event.preventDefault();
          startStage();
          return;
        }
        if (event.key === "f" || event.key === "F") {
          event.preventDefault();
          toggleFullscreen();
        }
      }

      function onKeyUp(event) {
        input.keys[event.key] = false;
      }

      function handlePointerDown(event) {
        canvas.focus();
        startFromTouch();
        if (state.mode !== "running") {
          return;
        }
        const point = toCanvasPoint(event);
        if (attemptStealAt(point.x, point.y)) {
          return;
        }
        input.dragging = true;
        input.pointerId = event.pointerId;
        setPointerTarget(point);
        canvas.setPointerCapture?.(event.pointerId);
      }

      function handlePointerMove(event) {
        if (state.mode !== "running" || !input.dragging || input.pointerId !== event.pointerId) {
          return;
        }
        setPointerTarget(toCanvasPoint(event));
      }

      function handlePointerUp(event) {
        if (input.pointerId === event.pointerId) {
          input.dragging = false;
          input.pointerId = null;
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      bindHoldButton(mobileButtons.left, () => { input.moveButtons.left = true; }, () => { input.moveButtons.left = false; });
      bindHoldButton(mobileButtons.right, () => { input.moveButtons.right = true; }, () => { input.moveButtons.right = false; });
      bindHoldButton(mobileButtons.up, () => { input.moveButtons.up = true; }, () => { input.moveButtons.up = false; });
      bindHoldButton(mobileButtons.down, () => { input.moveButtons.down = true; }, () => { input.moveButtons.down = false; });
      mobileButtons.replay?.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        startFromTouch();
        mobileButtons.replay.dataset.active = "true";
        if (state.mode === "running") {
          attemptReplay();
        }
        mobileButtons.replay.setPointerCapture?.(event.pointerId);
      });
      ["pointerup", "pointercancel", "lostpointercapture"].forEach((type) => {
        mobileButtons.replay?.addEventListener(type, () => {
          mobileButtons.replay.dataset.active = "false";
        });
      });

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);
      canvas.addEventListener("lostpointercapture", handlePointerUp);
      canvas.addEventListener("click", () => canvas.focus());
      canvas.addEventListener("touchstart", (event) => {
        if (event.touches.length >= 2) {
          event.preventDefault();
          startFromTouch();
          if (state.mode === "running") {
            attemptReplay();
          }
          return;
        }
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
          return;
        }
        const touch = event.touches[0];
        if (!touch) {
          return;
        }
        setPointerTarget(toCanvasPoint(touch));
      }, { passive: false });
      canvas.addEventListener("touchmove", (event) => {
        const touch = event.touches[0];
        if (!touch || state.mode !== "running") {
          return;
        }
        event.preventDefault();
        setPointerTarget(toCanvasPoint(touch));
      }, { passive: false });
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "crystal-foundry-mirror-theft-collapse",
        title: TITLE,
        creator: "jungcollin",
        genre: "Pattern theft stealth / 붕괴하는 라인",
        clearCondition: CLEAR_TEXT,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          gameplay.collectedOrder = PATTERNS.map((pattern) => pattern.id);
          gameplay.deposited = new Set(PATTERNS.map((pattern) => pattern.id));
          gameplay.currentPatternId = null;
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      createAmbient();
      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
