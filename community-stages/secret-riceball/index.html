<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>몰래 주먹밥</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">몰래 주먹밥. 화면을 꾹 눌러 주먹밥을 먹고, 선생님이 뒤돌아볼 때는 손을 떼세요. Space키로도 먹을 수 있습니다.</p>
    <canvas id="game" width="960" height="540" aria-label="몰래 주먹밥" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      // ===== Setup =====
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("secret-riceball") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      // ===== Game Constants =====
      const TOTAL_BALLS = 5;
      const EAT_TIME = 2.0;
      const WARNING_DUR = 0.5;

      const LEVELS = [
        { wMin: 4.5, wMax: 6.5, lDur: 1.8 },
        { wMin: 3.5, wMax: 5.0, lDur: 2.0 },
        { wMin: 2.5, wMax: 4.0, lDur: 2.2 },
        { wMin: 1.8, wMax: 3.0, lDur: 2.5 },
        { wMin: 1.2, wMax: 2.2, lDur: 3.0 },
      ];

      const CHALK_TEXTS = [
        "1 + 1 = 2",
        "가나다라",
        "수학 시험",
        "2 x 3 = 6",
        "숙제 내일",
        "역사 정리",
        "조용히 해!",
        "3 + 4 = 7",
      ];

      const DESK_Y = 370;
      const BALL_Y = 440;
      const BALL_SPACING = 110;

      // ===== State =====
      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        isEating: false,
        currentBall: 0,
        eatProgress: 0,
        teacherState: "writing",
        stateTimer: 0,
        writeDuration: 5,
        lookDuration: 2,
        teacherAngle: 0,
        chalkText: "",
        chalkLine: 0,
        chalkReveal: 0,
        prevChalkLines: [],
        warningPulse: 0,
        caughtTimer: 0,
        eatEffects: [],
      };

      // ===== Utilities =====
      function getLevel() {
        return LEVELS[Math.min(state.currentBall, LEVELS.length - 1)];
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function getBallX(index) {
        const startX = VIEW.width / 2 - ((TOTAL_BALLS - 1) * BALL_SPACING) / 2;
        return startX + index * BALL_SPACING;
      }

      // ===== Relay Host =====
      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      // ===== Game Control =====
      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.isEating = false;
        state.currentBall = 0;
        state.eatProgress = 0;
        state.teacherState = "writing";
        state.stateTimer = 0;
        state.teacherAngle = 0;
        state.chalkLine = 0;
        state.chalkReveal = 0;
        state.prevChalkLines = [];
        state.warningPulse = 0;
        state.caughtTimer = 0;
        state.eatEffects = [];
        const lv = getLevel();
        state.writeDuration = rand(lv.wMin, lv.wMax);
        state.lookDuration = lv.lDur;
        state.chalkText = CHALK_TEXTS[Math.floor(Math.random() * CHALK_TEXTS.length)];
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "들켰다!") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      // ===== Update =====
      function eatOneBall() {
        state.eatEffects.push({ x: getBallX(state.currentBall), y: BALL_Y, timer: 0 });
        state.currentBall++;
        state.eatProgress = 0;
        if (state.currentBall >= TOTAL_BALLS) {
          clearStage();
          return true;
        }
        return false;
      }

      function progressEating(dt) {
        if (!state.isEating) return false;
        state.eatProgress += dt;
        if (state.eatProgress >= EAT_TIME) {
          return eatOneBall();
        }
        return false;
      }

      function startNewWriteCycle() {
        state.teacherState = "writing";
        state.stateTimer = 0;
        state.chalkReveal = 0;
        const lv = getLevel();
        state.writeDuration = rand(lv.wMin, lv.wMax);
        state.lookDuration = lv.lDur;
        if (state.prevChalkLines.length < 4) {
          state.prevChalkLines.push({
            text: state.chalkText,
            line: state.chalkLine,
          });
        }
        state.chalkLine = (state.chalkLine + 1) % 4;
        state.chalkText = CHALK_TEXTS[Math.floor(Math.random() * CHALK_TEXTS.length)];
      }

      function triggerCaught() {
        state.mode = "caught";
        state.caughtTimer = 0;
        state.isEating = false;
      }

      function update(dt) {
        if (state.mode === "caught") {
          state.caughtTimer += dt;
          if (state.caughtTimer >= 1.2) {
            failStage("선생님한테 들켰다! (" + state.currentBall + "/" + TOTAL_BALLS + " 먹음)");
          }
          return;
        }

        if (state.mode !== "running") return;
        state.elapsed += dt;
        state.stateTimer += dt;

        for (const fx of state.eatEffects) fx.timer += dt;
        state.eatEffects = state.eatEffects.filter((fx) => fx.timer < 0.6);

        switch (state.teacherState) {
          case "writing": {
            state.teacherAngle = Math.max(0, state.teacherAngle - dt * 4);
            state.chalkReveal += dt * 3;

            if (progressEating(dt)) return;

            if (state.stateTimer >= state.writeDuration) {
              state.teacherState = "warning";
              state.stateTimer = 0;
              state.warningPulse = 0;
            }
            break;
          }

          case "warning": {
            state.warningPulse += dt;
            state.teacherAngle = Math.min(1, state.teacherAngle + dt * (1 / WARNING_DUR));

            if (progressEating(dt)) return;

            if (state.stateTimer >= WARNING_DUR) {
              state.teacherState = "looking";
              state.stateTimer = 0;
              state.teacherAngle = 1;
              if (state.isEating) {
                triggerCaught();
                return;
              }
            }
            break;
          }

          case "looking": {
            state.teacherAngle = 1;

            if (state.isEating) {
              triggerCaught();
              return;
            }

            if (state.stateTimer >= state.lookDuration) {
              startNewWriteCycle();
            }
            break;
          }
        }
      }

      // ===== Drawing Helpers =====
      function drawRoundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      // ===== Scene Drawing =====
      function drawBackground() {
        const grad = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        grad.addColorStop(0, "#FFF8E7");
        grad.addColorStop(0.65, "#F5E6CC");
        grad.addColorStop(1, "#E8D5B7");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "#C4A265";
        ctx.fillRect(0, DESK_Y + 20, VIEW.width, VIEW.height - DESK_Y - 20);
      }

      function drawChalkboard() {
        ctx.fillStyle = "#5C3A1E";
        ctx.fillRect(70, 15, 820, 230);

        ctx.fillStyle = "#2B5329";
        ctx.fillRect(82, 27, 796, 206);

        ctx.fillStyle = "#5C3A1E";
        ctx.fillRect(82, 233, 796, 12);

        ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
        ctx.font = "20px 'Trebuchet MS'";
        ctx.textAlign = "left";
        for (const pl of state.prevChalkLines) {
          ctx.fillText(pl.text, 110, 65 + pl.line * 44);
        }

        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        const reveal = Math.min(state.chalkText.length, Math.floor(state.chalkReveal));
        ctx.fillText(state.chalkText.substring(0, reveal), 110, 65 + state.chalkLine * 44);
        ctx.textAlign = "left";
      }

      function drawTeacher() {
        const tx = 480;
        const bodyTop = 170;
        const bodyH = 140;
        const headY = bodyTop - 20;

        const bodyW = 50 * (0.4 + 0.6 * Math.abs(Math.cos(state.teacherAngle * Math.PI)));

        ctx.fillStyle = "#34495E";
        ctx.fillRect(tx - 14, bodyTop + bodyH - 5, 11, 40);
        ctx.fillRect(tx + 3, bodyTop + bodyH - 5, 11, 40);

        ctx.fillStyle = "#1A1A2E";
        drawRoundedRect(tx - 16, bodyTop + bodyH + 30, 15, 8, 3);
        ctx.fill();
        drawRoundedRect(tx + 1, bodyTop + bodyH + 30, 15, 8, 3);
        ctx.fill();

        ctx.fillStyle = "#ECF0F1";
        drawRoundedRect(tx - bodyW / 2, bodyTop, bodyW, bodyH, 6);
        ctx.fill();
        ctx.strokeStyle = "#D5D8DC";
        ctx.lineWidth = 1;
        drawRoundedRect(tx - bodyW / 2, bodyTop, bodyW, bodyH, 6);
        ctx.stroke();

        if (state.teacherAngle < 0.5) {
          ctx.fillStyle = "#2C3E50";
          ctx.beginPath();
          ctx.arc(tx, headY, 20, 0, Math.PI * 2);
          ctx.fill();

          if (state.teacherState === "writing" && state.mode === "running") {
            const armTime = state.elapsed * 2.5;
            const armEndX = tx + 45 + Math.sin(armTime) * 30;
            const armEndY = headY - 40 + Math.cos(armTime * 0.7) * 12;

            ctx.strokeStyle = "#ECF0F1";
            ctx.lineWidth = 8;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(tx + bodyW / 2 - 3, bodyTop + 18);
            ctx.quadraticCurveTo(tx + bodyW / 2 + 15, bodyTop - 10, armEndX, armEndY);
            ctx.stroke();

            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            ctx.arc(armEndX, armEndY, 3, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.strokeStyle = "#ECF0F1";
          ctx.lineWidth = 8;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(tx - bodyW / 2 + 3, bodyTop + 18);
          ctx.lineTo(tx - bodyW / 2 - 6, bodyTop + bodyH - 25);
          ctx.stroke();
        } else {
          ctx.fillStyle = "#FFDAB9";
          ctx.beginPath();
          ctx.arc(tx, headY, 20, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#2C3E50";
          ctx.beginPath();
          ctx.ellipse(tx, headY - 8, 21, 14, 0, Math.PI + 0.3, -0.3);
          ctx.fill();
          ctx.fillRect(tx - 20, headY - 18, 40, 8);

          ctx.strokeStyle = "#333";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(tx - 8, headY + 1, 6, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(tx + 8, headY + 1, 6, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(tx - 2, headY + 1);
          ctx.lineTo(tx + 2, headY + 1);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(tx - 14, headY + 1);
          ctx.lineTo(tx - 20, headY - 1);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(tx + 14, headY + 1);
          ctx.lineTo(tx + 20, headY - 1);
          ctx.stroke();

          const isCaught = state.mode === "caught";

          if (isCaught) {
            ctx.fillStyle = "#2C3E50";
            ctx.beginPath();
            ctx.arc(tx - 8, headY + 2, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(tx + 8, headY + 2, 3.5, 0, Math.PI * 2);
            ctx.fill();
          } else {
            const eyeOff = Math.sin(state.elapsed * 2) * 1.5;
            ctx.fillStyle = "#2C3E50";
            ctx.beginPath();
            ctx.ellipse(tx - 8 + eyeOff, headY + 2, 2.5, 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(tx + 8 + eyeOff, headY + 2, 2.5, 2, 0, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.strokeStyle = "#2C3E50";
          ctx.lineWidth = 2;
          if (isCaught) {
            ctx.beginPath();
            ctx.moveTo(tx - 14, headY - 6);
            ctx.lineTo(tx - 4, headY - 3);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tx + 4, headY - 3);
            ctx.lineTo(tx + 14, headY - 6);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(tx - 14, headY - 5);
            ctx.lineTo(tx - 3, headY - 4);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tx + 3, headY - 4);
            ctx.lineTo(tx + 14, headY - 5);
            ctx.stroke();
          }

          if (isCaught) {
            ctx.fillStyle = "#C0392B";
            ctx.beginPath();
            ctx.ellipse(tx, headY + 14, 6, 5, 0, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.strokeStyle = "#C0392B";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(tx - 5, headY + 13);
            ctx.lineTo(tx + 5, headY + 13);
            ctx.stroke();
          }

          ctx.fillStyle = "#E74C3C";
          ctx.beginPath();
          ctx.moveTo(tx, bodyTop + 2);
          ctx.lineTo(tx - 5, bodyTop + 38);
          ctx.lineTo(tx, bodyTop + 46);
          ctx.lineTo(tx + 5, bodyTop + 38);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = "#FFDAB9";
          ctx.lineWidth = 8;
          ctx.lineCap = "round";
          if (isCaught) {
            ctx.beginPath();
            ctx.moveTo(tx - bodyW / 2, bodyTop + 18);
            ctx.quadraticCurveTo(tx - bodyW / 2 - 18, bodyTop + 50, tx - bodyW / 2 - 3, bodyTop + bodyH - 25);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tx + bodyW / 2, bodyTop + 18);
            ctx.quadraticCurveTo(tx + bodyW / 2 + 18, bodyTop + 50, tx + bodyW / 2 + 3, bodyTop + bodyH - 25);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(tx - bodyW / 2, bodyTop + 18);
            ctx.lineTo(tx - bodyW / 2 - 6, bodyTop + bodyH - 18);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(tx + bodyW / 2, bodyTop + 18);
            ctx.lineTo(tx + bodyW / 2 + 6, bodyTop + bodyH - 18);
            ctx.stroke();
          }
        }

        if (state.teacherState === "warning" || state.teacherState === "looking" || state.mode === "caught") {
          const pulse = Math.sin(state.elapsed * 12) * 0.3 + 0.7;
          ctx.save();
          ctx.globalAlpha = state.mode === "caught" ? 1 : pulse;
          ctx.fillStyle = "#FF4444";
          ctx.font = "bold 32px 'Trebuchet MS'";
          ctx.textAlign = "center";
          ctx.fillText("!", tx, headY - 30);
          ctx.restore();
          ctx.textAlign = "left";
        }
      }

      function drawDesk() {
        ctx.fillStyle = "#8B6914";
        ctx.fillRect(0, DESK_Y, VIEW.width, 6);

        const dGrad = ctx.createLinearGradient(0, DESK_Y + 6, 0, VIEW.height);
        dGrad.addColorStop(0, "#C4893B");
        dGrad.addColorStop(0.3, "#B07830");
        dGrad.addColorStop(1, "#8B6914");
        ctx.fillStyle = dGrad;
        ctx.fillRect(0, DESK_Y + 6, VIEW.width, VIEW.height - DESK_Y - 6);

        ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
        ctx.fillRect(0, DESK_Y, VIEW.width, 2);
      }

      function drawOnigiri(x, y, size, progress) {
        const scale = 1 - progress * 0.35;
        const s = size * scale;

        ctx.save();
        ctx.translate(x, y);

        ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
        ctx.beginPath();
        ctx.ellipse(0, s * 0.45 + 6, s * 0.55, 7, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#FAFAFA";
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.7);
        ctx.quadraticCurveTo(s * 0.8, -s * 0.2, s * 0.6, s * 0.35);
        ctx.quadraticCurveTo(0, s * 0.55, -s * 0.6, s * 0.35);
        ctx.quadraticCurveTo(-s * 0.8, -s * 0.2, 0, -s * 0.7);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#E0E0E0";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = "#1A2E1A";
        ctx.beginPath();
        ctx.moveTo(-s * 0.35, s * 0.0);
        ctx.quadraticCurveTo(-s * 0.45, s * 0.35, -s * 0.3, s * 0.35);
        ctx.lineTo(s * 0.3, s * 0.35);
        ctx.quadraticCurveTo(s * 0.45, s * 0.35, s * 0.35, s * 0.0);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(220, 220, 220, 0.5)";
        ctx.beginPath();
        ctx.ellipse(-s * 0.12, -s * 0.18, 3, 1.5, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(s * 0.08, -s * 0.33, 2.5, 1.5, -0.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        if (progress > 0) {
          const ringColor = state.teacherState === "warning" ? "#FF4444" : "#FF6B35";
          ctx.strokeStyle = ringColor;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(x, y, s * 0.8 + 10, -Math.PI / 2, -Math.PI / 2 + progress * Math.PI * 2);
          ctx.stroke();
        }
      }

      function drawRiceballs() {
        for (let i = 0; i < TOTAL_BALLS; i++) {
          const x = getBallX(i);

          if (i < state.currentBall) {
            ctx.fillStyle = "rgba(250, 250, 250, 0.25)";
            ctx.beginPath();
            ctx.arc(x - 4, BALL_Y + 6, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 5, BALL_Y + 9, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 1, BALL_Y + 4, 2.5, 0, Math.PI * 2);
            ctx.fill();
          } else if (i === state.currentBall) {
            const progress = state.eatProgress / EAT_TIME;
            drawOnigiri(x, BALL_Y, 28, progress);

            if (state.isEating && (state.mode === "running" || state.mode === "caught")) {
              const t = state.elapsed * 8;
              ctx.fillStyle = "rgba(255, 200, 100, 0.6)";
              for (let j = 0; j < 3; j++) {
                const angle = t + j * 2.1;
                const dist = 32 + Math.sin(angle * 3) * 4;
                const cx = x + Math.cos(angle) * dist;
                const cy = BALL_Y + Math.sin(angle) * dist * 0.5;
                ctx.beginPath();
                ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
                ctx.fill();
              }
            }
          } else {
            drawOnigiri(x, BALL_Y, 28, 0);
          }
        }

        for (const fx of state.eatEffects) {
          const alpha = 1 - fx.timer / 0.6;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = "#4CAF50";
          ctx.font = "bold " + Math.round(20 + fx.timer * 14) + "px 'Trebuchet MS'";
          ctx.textAlign = "center";
          ctx.fillText("냐!", fx.x, fx.y - 18 - fx.timer * 50);
          ctx.restore();
        }
        ctx.textAlign = "left";
      }

      function drawHUD() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, VIEW.width, 44);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 20px 'Trebuchet MS'";
        ctx.textAlign = "left";
        ctx.fillText("주먹밥: " + state.currentBall + " / " + TOTAL_BALLS, 18, 30);

        ctx.textAlign = "right";
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.font = "15px 'Trebuchet MS'";
        const diffLv = Math.min(state.currentBall + 1, TOTAL_BALLS);
        let stars = "";
        for (let i = 0; i < 5; i++) stars += i < diffLv ? "★" : "☆";
        ctx.fillText("난이도 " + stars, VIEW.width - 18, 30);

        ctx.textAlign = "center";
        ctx.font = "bold 17px 'Trebuchet MS'";
        if (state.teacherState === "looking" || state.mode === "caught") {
          ctx.fillStyle = "#FF4444";
          ctx.fillText("위험!", VIEW.width / 2, 30);
        } else if (state.teacherState === "warning") {
          ctx.fillStyle = "#FFA500";
          ctx.fillText("주의!", VIEW.width / 2, 30);
        } else {
          ctx.fillStyle = "#4CAF50";
          ctx.fillText("안전", VIEW.width / 2, 30);
        }
        ctx.textAlign = "left";
      }

      function drawDangerOverlay() {
        if (state.teacherState === "warning") {
          const pulse = Math.sin(state.elapsed * 10) * 0.1 + 0.1;
          ctx.fillStyle = "rgba(255, 165, 0, " + pulse + ")";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        } else if (state.teacherState === "looking") {
          const pulse = Math.sin(state.elapsed * 6) * 0.08 + 0.08;
          ctx.fillStyle = "rgba(255, 0, 0, " + pulse + ")";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function drawCaughtOverlay() {
        const flash = Math.min(1, state.caughtTimer * 3);
        ctx.fillStyle = "rgba(255, 0, 0, " + (0.25 * flash) + ")";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        if (state.caughtTimer > 0.2) {
          const scale = Math.min(1, (state.caughtTimer - 0.2) * 3);
          ctx.save();
          ctx.globalAlpha = scale;
          ctx.fillStyle = "#FF0000";
          ctx.strokeStyle = "#FFFFFF";
          ctx.lineWidth = 3;
          ctx.font = "bold " + Math.round(46 * scale + 18) + "px 'Trebuchet MS'";
          ctx.textAlign = "center";
          ctx.strokeText("들켰다!", VIEW.width / 2, VIEW.height / 2 + 20);
          ctx.fillText("들켰다!", VIEW.width / 2, VIEW.height / 2 + 20);
          ctx.restore();
          ctx.textAlign = "left";
        }
      }

      // ===== Render =====
      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 40px 'Trebuchet MS'";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 158);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 21px 'Trebuchet MS'";
        lines.forEach(function (line, index) {
          ctx.fillText(line, VIEW.width / 2, 222 + index * 40);
        });
        ctx.textAlign = "left";
      }

      function renderGame() {
        drawBackground();
        drawChalkboard();
        drawTeacher();
        drawDesk();
        drawRiceballs();
        drawHUD();

        if (state.teacherState === "warning" || state.teacherState === "looking") {
          drawDangerOverlay();
        }

        if (state.teacherState === "writing" && !state.isEating && state.currentBall < TOTAL_BALLS && state.elapsed < 3.5) {
          ctx.fillStyle = "rgba(255, 255, 255, 0.65)";
          ctx.font = "17px 'Trebuchet MS'";
          ctx.textAlign = "center";
          ctx.fillText("화면을 꾹 눌러 먹기! (Space / 터치)", VIEW.width / 2, BALL_Y + 55);
          ctx.textAlign = "left";
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        if (state.mode === "menu") {
          renderCard("몰래 주먹밥", [
            "조작: 화면 터치/클릭으로 주먹밥 먹기",
            "클리어: 선생님한테 안 걸리고 주먹밥을 모두 먹으면 클리어",
            "실패: 선생님이 뒤돌아봤을 때 먹고 있으면 들켜서 실패",
            "",
            "터치 또는 Enter로 시작",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          renderGame();
          return;
        }

        if (state.mode === "caught") {
          renderGame();
          drawCaughtOverlay();
          return;
        }

        if (state.mode === "failed") {
          renderCard("실패!", [
            "선생님한테 들켰다!",
            state.currentBall + " / " + TOTAL_BALLS + " 먹음",
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
          renderCard("클리어!", [
            "주먹밥을 모두 먹었다!",
            "소요 시간: " + state.lastRunTime.toFixed(1) + "초",
          ], "#15803d");
        }
      }

      // ===== Relay Contract =====
      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "canvas 960x540, classroom scene",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          teacher_state: state.teacherState,
          teacher_angle: Math.round(state.teacherAngle * 100) / 100,
          is_eating: state.isEating,
          current_ball: state.currentBall,
          total_balls: TOTAL_BALLS,
          eat_progress: Math.round((state.eatProgress / EAT_TIME) * 100),
          difficulty_level: Math.min(state.currentBall + 1, LEVELS.length),
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = function (ms) {
        ms = ms || 16.67;
        var steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (var i = 0; i < steps; i++) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "secret-riceball",
        title: "몰래 주먹밥",
        creator: "collin",
        genre: "Timing",
        clearCondition: "선생님한테 안 걸리고 주먹밥을 모두 먹으면 클리어",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear: function () {
          startStage();
          clearStage();
          render();
        },
        forceFail: function () {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      // ===== Input =====
      canvas.addEventListener("mousedown", function () {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        if (state.mode === "running") {
          state.isEating = true;
        }
      });

      document.addEventListener("mouseup", function () {
        state.isEating = false;
      });

      canvas.addEventListener("touchstart", function (e) {
        e.preventDefault();
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        if (state.mode === "running") {
          state.isEating = true;
        }
      }, { passive: false });

      canvas.addEventListener("touchend", function (e) {
        e.preventDefault();
        state.isEating = false;
      }, { passive: false });

      canvas.addEventListener("touchcancel", function () {
        state.isEating = false;
      });

      window.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared")) {
          e.preventDefault();
          startStage();
          return;
        }
        if (e.key === " " && state.mode === "running" && !e.repeat) {
          e.preventDefault();
          state.isEating = true;
        }
      });

      window.addEventListener("keyup", function (e) {
        if (e.key === " ") {
          state.isEating = false;
        }
      });

      canvas.addEventListener("click", function () {
        canvas.focus();
      });

      // ===== Game Loop =====
      function frame(timestamp) {
        var dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.addEventListener("beforeunload", function () {
        cancelAnimationFrame(animationFrame);
      });

      // ===== Boot =====
      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
