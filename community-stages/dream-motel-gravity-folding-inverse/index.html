<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Motel: Gravity Fold</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-top: #180d2f;
        --bg-bottom: #060312;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 130, 198, 0.22), transparent 34%),
          radial-gradient(circle at 80% 30%, rgba(76, 194, 255, 0.2), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(255, 186, 230, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(9, 5, 22, 0.94);
        color: #fef6ff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 236, 252, 0.94);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <div class="sr-only" id="stage-instructions">
      <p>Dream Motel: Gravity Fold. 화면을 터치하거나 Enter로 시작합니다.</p>
      <p>좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현</p>
      <p>역전 구간을 모두 견디고 코어를 균열 없이 목적 슬롯까지 옮기면 클리어</p>
      <p>역전 버스트에 연속으로 휘말리거나 코어 충격 게이지가 가득 차면 실패</p>
    </div>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dream Motel: Gravity Fold"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TOTAL_TIME = 31.5;
      const SHOCK_LIMIT = 100;
      const PLAYER_RADIUS = 24;
      const FLOOR_Y = 392;
      const CEILING_Y = 148;
      const HOLD_THRESHOLD = 180;
      const TAP_DISTANCE = 12;
      const relayContext = window.RelayRuntime?.readContext("dream-motel-gravity-folding-inverse") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const stageMeta = {
        id: "dream-motel-gravity-folding-inverse",
        title: "Dream Motel: Gravity Fold",
        creator: "jungcollin",
        genre: "Gravity courier / 역전 버스트",
        clearCondition: "역전 구간을 모두 견디고 코어를 균열 없이 목적 슬롯까지 옮기면 클리어",
        failCondition: "역전 버스트에 연속으로 휘말리거나 코어 충격 게이지가 가득 차면 실패",
        controls:
          "좌우 이동, 클릭 또는 터치로 중력 축 전환, 길게 눌러 안정화, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        description:
          "중력을 접어 천장과 바닥을 오가며 역전 버스트를 버텨 깨지기 쉬운 코어를 목적 슬롯까지 배달하세요.",
      };

      const BURSTS = [
        { warning: 4.9, start: 6.0, pulse: 7.2, end: 8.5, label: "LUNAR SUITE" },
        { warning: 11.0, start: 12.1, pulse: 13.2, end: 14.5, label: "MIRROR HALL" },
        { warning: 17.3, start: 18.5, pulse: 19.5, end: 20.8, label: "VELVET ELEVATOR" },
        { warning: 23.9, start: 25.0, pulse: 26.2, end: 27.6, label: "EXIT SLOT" },
      ];

      const WAVE_LAYOUT = [
        { at: 1.1, lane: 1, x: 760, speed: 270, width: 110, height: 40, hue: 34, glow: "#ffc76a", kind: "cart" },
        { at: 2.0, lane: -1, x: 690, speed: 280, width: 94, height: 28, hue: 198, glow: "#7fe8ff", kind: "drone" },
        { at: 3.2, lane: 1, x: 860, speed: 315, width: 128, height: 44, hue: 16, glow: "#ff8a73", kind: "cart" },
        { at: 4.1, lane: -1, x: 820, speed: 295, width: 104, height: 34, hue: 288, glow: "#ffa1ff", kind: "drone" },
        { at: 6.0, lane: 1, x: 790, speed: 326, width: 124, height: 44, hue: 342, glow: "#ff77bd", kind: "burst-cart" },
        { at: 6.7, lane: -1, x: 840, speed: 336, width: 88, height: 30, hue: 212, glow: "#8ed8ff", kind: "drone" },
        { at: 7.6, lane: 1, x: 720, speed: 348, width: 116, height: 42, hue: 24, glow: "#ffaf67", kind: "cart" },
        { at: 9.4, lane: -1, x: 860, speed: 302, width: 108, height: 34, hue: 54, glow: "#ffe37a", kind: "suite-sign" },
        { at: 10.5, lane: 1, x: 700, speed: 328, width: 112, height: 38, hue: 182, glow: "#79ffea", kind: "cleaner" },
        { at: 12.2, lane: -1, x: 780, speed: 338, width: 96, height: 32, hue: 322, glow: "#ff87da", kind: "burst-cart" },
        { at: 12.9, lane: 1, x: 848, speed: 348, width: 118, height: 40, hue: 12, glow: "#ff7d74", kind: "cart" },
        { at: 13.8, lane: -1, x: 712, speed: 362, width: 94, height: 30, hue: 210, glow: "#8bd7ff", kind: "drone" },
        { at: 15.8, lane: 1, x: 756, speed: 320, width: 104, height: 34, hue: 155, glow: "#7bffb6", kind: "cleaner" },
        { at: 17.2, lane: -1, x: 820, speed: 332, width: 118, height: 40, hue: 48, glow: "#ffe07a", kind: "suite-sign" },
        { at: 18.6, lane: 1, x: 802, speed: 356, width: 132, height: 46, hue: 352, glow: "#ff6fb6", kind: "burst-cart" },
        { at: 19.4, lane: -1, x: 722, speed: 368, width: 96, height: 30, hue: 198, glow: "#7bdcff", kind: "drone" },
        { at: 20.3, lane: 1, x: 846, speed: 378, width: 120, height: 44, hue: 20, glow: "#ffae63", kind: "cart" },
        { at: 22.0, lane: -1, x: 700, speed: 320, width: 98, height: 30, hue: 244, glow: "#a8acff", kind: "mini-bar" },
        { at: 23.2, lane: 1, x: 850, speed: 340, width: 106, height: 34, hue: 138, glow: "#88ffc1", kind: "cleaner" },
        { at: 25.1, lane: -1, x: 792, speed: 370, width: 106, height: 34, hue: 322, glow: "#ff84e0", kind: "burst-cart" },
        { at: 25.9, lane: 1, x: 852, speed: 382, width: 126, height: 44, hue: 10, glow: "#ff7d74", kind: "cart" },
        { at: 26.7, lane: -1, x: 722, speed: 390, width: 92, height: 30, hue: 204, glow: "#8cd8ff", kind: "drone" },
        { at: 28.3, lane: 1, x: 840, speed: 334, width: 110, height: 36, hue: 60, glow: "#fff087", kind: "suite-sign" },
      ];

      const input = {
        axis: 0,
        desiredPointerX: VIEW.width * 0.32,
        pointerId: null,
        pointerStartX: 0,
        pointerStartY: 0,
        pointerMoved: false,
        pointerDownTime: 0,
        pointerMode: "idle",
        holdArmed: false,
        pressStartedStage: false,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: stageMeta.description,
        distance: 0,
        shock: 0,
        inverseActive: false,
        currentBurst: -1,
        burstHitCombo: 0,
        burstHitsTotal: 0,
        burstsCleared: 0,
        stabilizing: false,
        shake: 0,
        flash: 0,
        successFlash: 0,
        failureFlash: 0,
        uiPulse: 0,
        playerX: 238,
        playerVelocityX: 0,
        gravity: 1,
        gravityBlend: 1,
        gravityTween: 1,
        coreSwing: 0,
        coreVelocity: 0,
        spawnIndex: 0,
        obstacles: [],
        particles: [],
        ribbons: [],
        popups: [],
        skyline: [],
        pulseRings: [],
        goalOpen: 0,
        tutorialSeen: false,
        sectionHit: false,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      window.relayStageMeta = {
        id: stageMeta.id,
        title: stageMeta.title,
        creator: stageMeta.creator,
        genre: stageMeta.genre,
        clearCondition: stageMeta.clearCondition,
        failCondition: stageMeta.failCondition,
        controls: stageMeta.controls,
      };
      window.relayStageResult = { status: "running" };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, alpha) {
        return start + (end - start) * alpha;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function laneToY(lane) {
        return lane === 1 ? FLOOR_Y : CEILING_Y;
      }

      function getPlayerY() {
        const blend = (state.gravityBlend + 1) * 0.5;
        return lerp(CEILING_Y, FLOOR_Y, blend);
      }

      function resetBackdrop() {
        state.skyline = Array.from({ length: 18 }, (_, index) => ({
          x: (index / 18) * VIEW.width,
          width: 90 + (index % 3) * 38,
          glow: index % 2 === 0 ? "#ff7bc3" : "#79dcff",
          alpha: 0.16 + (index % 4) * 0.04,
        }));
        state.ribbons = Array.from({ length: 14 }, (_, index) => ({
          x: Math.random() * VIEW.width,
          y: Math.random() * VIEW.height,
          speed: 20 + Math.random() * 24 + index,
          width: 120 + Math.random() * 160,
          color: index % 3 === 0 ? "rgba(255, 140, 197, 0.14)" : "rgba(108, 222, 255, 0.12)",
        }));
      }

      function emitParticles(x, y, color, count, options = {}) {
        for (let index = 0; index < count; index += 1) {
          state.particles.push({
            x,
            y,
            vx: randomBetween(-180, 180) * (options.velocity || 1),
            vy: randomBetween(-180, 180) * (options.velocity || 1),
            life: randomBetween(0.28, 0.85) * (options.life || 1),
            maxLife: randomBetween(0.28, 0.85) * (options.life || 1),
            size: randomBetween(2, 6) * (options.scale || 1),
            color,
          });
        }
      }

      function addPopup(text, color, x = 160, y = 86) {
        state.popups.push({
          text,
          color,
          x,
          y,
          time: 0,
          life: 1.1,
        });
      }

      function createObstacle(config) {
        return {
          ...config,
          collisionGrace: 0,
          phase: Math.random() * Math.PI * 2,
          pulse: Math.random() * 0.6 + 0.4,
        };
      }

      function resetGameState(nextMode) {
        state.mode = nextMode;
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.distance = 0;
        state.shock = 16;
        state.inverseActive = false;
        state.currentBurst = -1;
        state.burstHitCombo = 0;
        state.burstHitsTotal = 0;
        state.burstsCleared = 0;
        state.stabilizing = false;
        state.shake = 0;
        state.flash = 0;
        state.successFlash = 0;
        state.failureFlash = 0;
        state.uiPulse = 0;
        state.playerX = 238;
        state.playerVelocityX = 0;
        state.gravity = 1;
        state.gravityBlend = 1;
        state.gravityTween = 1;
        state.coreSwing = 0;
        state.coreVelocity = 0;
        state.spawnIndex = 0;
        state.obstacles = [];
        state.particles = [];
        state.popups = [];
        state.pulseRings = [];
        state.goalOpen = 0;
        state.sectionHit = false;
        window.relayStageResult.status = "running";
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason) {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        resetGameState("running");
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function failStage(reason) {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.failureFlash = 1;
        window.relayStageResult.status = "failed";
        emitParticles(state.playerX + 20, getPlayerY(), "#ff7b9b", 34, { velocity: 1.25, scale: 1.2 });
        addPopup("CORE CRACK", "#ffd3de", 140, 114);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.successFlash = 1;
        state.goalOpen = 1;
        window.relayStageResult.status = "cleared";
        emitParticles(VIEW.width - 130, FLOOR_Y - 28, "#ffe58e", 42, { velocity: 1.4, scale: 1.4 });
        addPopup("DELIVERY LOCKED", "#ffecc4", VIEW.width - 320, 112);
        reportClearedToHost();
      }

      function toggleGravity() {
        if (state.mode !== "running") {
          return;
        }
        state.gravity *= -1;
        state.gravityTween = 0;
        state.coreVelocity -= state.gravity * 18;
        state.shock = clamp(state.shock + 6, 0, SHOCK_LIMIT);
        state.flash = 0.3;
        addPopup(state.gravity === 1 ? "FLOOR FOLD" : "CEILING FOLD", "#d7f5ff", 120, 128);
        emitParticles(state.playerX + 12, getPlayerY(), "#8fe2ff", 18, { velocity: 0.8 });
      }

      function startStabilize() {
        if (state.mode === "running") {
          state.stabilizing = true;
        }
      }

      function endStabilize() {
        state.stabilizing = false;
      }

      function getInputAxis() {
        let axis = input.axis;
        if (input.pointerMode === "drag") {
          const target = clamp(input.desiredPointerX, 110, VIEW.width - 140);
          const distance = target - state.playerX;
          axis += clamp(distance / 120, -1, 1);
        }
        if (state.inverseActive) {
          axis *= -1;
        }
        return clamp(axis, -1, 1);
      }

      function spawnWave() {
        while (state.spawnIndex < WAVE_LAYOUT.length && WAVE_LAYOUT[state.spawnIndex].at <= state.elapsed) {
          state.obstacles.push(createObstacle(WAVE_LAYOUT[state.spawnIndex]));
          state.spawnIndex += 1;
        }
      }

      function getCurrentBurstIndex() {
        return BURSTS.findIndex((burst) => state.elapsed >= burst.start && state.elapsed < burst.end);
      }

      function getWarningBurstIndex() {
        return BURSTS.findIndex((burst) => state.elapsed >= burst.warning && state.elapsed < burst.start);
      }

      function pushPulseRing(color) {
        state.pulseRings.push({
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.5,
          radius: 18,
          alpha: 0.85,
          grow: 420,
          color,
        });
      }

      function hitBurst() {
        state.sectionHit = true;
        state.burstHitCombo += 1;
        state.burstHitsTotal += 1;
        state.shock = clamp(state.shock + 18, 0, SHOCK_LIMIT);
        state.shake = 0.55;
        state.flash = 0.65;
        addPopup(state.burstHitCombo >= 2 ? "BURST LOCK" : "INVERSE HIT", "#ffd4ea", 122, 84);
        emitParticles(state.playerX + 8, getPlayerY(), "#ff87d8", 28, { velocity: 1.2, scale: 1.1 });
        if (state.burstHitCombo >= 2) {
          failStage("burst_chain");
        }
      }

      function resolveBurstState(previousBurstIndex) {
        const currentBurstIndex = getCurrentBurstIndex();
        state.inverseActive = currentBurstIndex !== -1;
        if (currentBurstIndex !== state.currentBurst) {
          if (currentBurstIndex !== -1) {
            state.sectionHit = false;
            addPopup("INVERSE BURST", "#ffd8f4", 118, 64);
            state.shake = Math.max(state.shake, 0.18);
            pushPulseRing("rgba(255, 120, 222, 0.75)");
          } else if (previousBurstIndex !== -1) {
            if (!state.sectionHit) {
              state.burstHitCombo = 0;
            }
            state.burstsCleared += 1;
            addPopup("SECTION STABLE", "#d8ffe8", 116, 64);
          }
          state.currentBurst = currentBurstIndex;
        }

        BURSTS.forEach((burst, index) => {
          const justCrossedPulse =
            state.elapsed >= burst.pulse &&
            state.elapsed - FIXED_DT < burst.pulse &&
            state.mode === "running";
          if (!justCrossedPulse) {
            return;
          }
          pushPulseRing("rgba(255, 168, 226, 0.78)");
          if (state.stabilizing || Math.abs(state.coreSwing) < 7) {
            addPopup("PULSE HELD", "#caffdc", 128, 102);
            state.shock = clamp(state.shock - 8, 0, SHOCK_LIMIT);
            state.burstHitCombo = 0;
          } else {
            hitBurst();
          }
          if (index === BURSTS.length - 1) {
            state.goalOpen = clamp(state.goalOpen + 0.2, 0, 1);
          }
        });
      }

      function damageShock(amount, reason) {
        state.shock = clamp(state.shock + amount, 0, SHOCK_LIMIT);
        state.shake = Math.max(state.shake, 0.32);
        state.flash = Math.max(state.flash, 0.42);
        emitParticles(state.playerX + 16, getPlayerY(), "#ffd68a", 18, { velocity: 0.9 });
        addPopup(reason, "#ffe8c7", 118, 142);
        if (state.shock >= SHOCK_LIMIT) {
          failStage("shock_overload");
        }
      }

      function updateObstacles(dt) {
        const playerY = getPlayerY();
        state.obstacles.forEach((obstacle) => {
          obstacle.x -= obstacle.speed * dt;
          obstacle.phase += dt * (0.8 + obstacle.pulse * 0.4);
          obstacle.collisionGrace = Math.max(0, obstacle.collisionGrace - dt);
          const laneY = laneToY(obstacle.lane);
          const yOffset =
            obstacle.kind === "drone"
              ? Math.sin(obstacle.phase * 3) * 8
              : obstacle.kind === "suite-sign"
                ? Math.sin(obstacle.phase * 2) * 4
                : 0;
          obstacle.drawY = laneY + yOffset;

          const horizontalHit = Math.abs(obstacle.x - state.playerX) < (obstacle.width * 0.5 + PLAYER_RADIUS);
          const verticalHit = Math.abs(obstacle.drawY - playerY) < 54;
          if (horizontalHit && verticalHit && obstacle.collisionGrace <= 0) {
            obstacle.collisionGrace = 0.28;
            state.playerVelocityX += obstacle.x > state.playerX ? -90 : 90;
            state.coreVelocity += (obstacle.x > state.playerX ? -14 : 14) + state.gravity * 4;
            damageShock(obstacle.kind === "burst-cart" ? 26 : 20, obstacle.kind === "burst-cart" ? "BURST CRACK" : "IMPACT");
          }
        });
        state.obstacles = state.obstacles.filter((obstacle) => obstacle.x > -160);
      }

      function updateParticles(dt) {
        state.particles.forEach((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.96;
          particle.vy = particle.vy * 0.96 + 30 * dt;
        });
        state.particles = state.particles.filter((particle) => particle.life > 0);

        state.popups.forEach((popup) => {
          popup.time += dt;
          popup.y -= 26 * dt;
        });
        state.popups = state.popups.filter((popup) => popup.time < popup.life);

        state.ribbons.forEach((ribbon) => {
          ribbon.x -= ribbon.speed * dt;
          if (ribbon.x + ribbon.width < -40) {
            ribbon.x = VIEW.width + Math.random() * 120;
            ribbon.y = Math.random() * VIEW.height;
          }
        });

        state.pulseRings.forEach((ring) => {
          ring.radius += ring.grow * dt;
          ring.alpha -= dt * 0.7;
        });
        state.pulseRings = state.pulseRings.filter((ring) => ring.alpha > 0);
      }

      function updatePlayer(dt) {
        const axis = getInputAxis();
        const drag = state.stabilizing ? 0.78 : 0.92;
        const acceleration = state.stabilizing ? 620 : 1040;
        state.playerVelocityX += axis * acceleration * dt;
        state.playerVelocityX *= drag;
        state.playerX += state.playerVelocityX * dt;
        state.playerX = clamp(state.playerX, 94, VIEW.width - 122);

        if (state.gravityTween < 1) {
          state.gravityTween = Math.min(1, state.gravityTween + dt * 2.8);
          const eased = easeOutCubic(state.gravityTween);
          state.gravityBlend = lerp(-state.gravity, state.gravity, eased);
        } else {
          state.gravityBlend = lerp(state.gravityBlend, state.gravity, dt * 10);
        }

        const movementImpulse = axis * (state.stabilizing ? 6 : 11);
        state.coreVelocity += movementImpulse * dt * 60;
        state.coreVelocity += (state.gravity - state.gravityBlend) * 12 * dt;
        state.coreVelocity -= state.coreSwing * (state.stabilizing ? 10.4 : 6.5) * dt;
        state.coreVelocity *= state.stabilizing ? 0.84 : 0.93;
        state.coreSwing += state.coreVelocity * dt * 60;
        state.coreSwing = clamp(state.coreSwing, -34, 34);

        const passiveDrain = state.stabilizing ? 14 : 5;
        state.shock = clamp(
          state.shock - passiveDrain * dt - Math.max(0, 8 - Math.abs(state.coreSwing)) * (state.stabilizing ? 0.18 : 0.04) * dt,
          0,
          SHOCK_LIMIT
        );
        state.shock = clamp(state.shock + Math.max(0, Math.abs(state.coreSwing) - 18) * dt * (state.inverseActive ? 2.1 : 1.1), 0, SHOCK_LIMIT);
        if (state.shock >= SHOCK_LIMIT) {
          failStage("shock_overload");
        }
      }

      function update(dt) {
        if (state.mode !== "running") {
          state.shake = Math.max(0, state.shake - dt * 2);
          state.flash = Math.max(0, state.flash - dt * 2.2);
          state.failureFlash = Math.max(0, state.failureFlash - dt * 1.3);
          state.successFlash = Math.max(0, state.successFlash - dt * 1.2);
          updateParticles(dt);
          return;
        }

        const previousBurstIndex = state.currentBurst;
        state.elapsed += dt;
        state.distance = clamp((state.elapsed / TOTAL_TIME) * 100, 0, 100);
        state.uiPulse += dt;
        state.goalOpen = state.elapsed > 28 ? clamp((state.elapsed - 28) / 3.5, 0, 1) : state.goalOpen;

        if (input.holdArmed && performance.now() - input.pointerDownTime >= HOLD_THRESHOLD) {
          input.holdArmed = false;
          startStabilize();
        }

        spawnWave();
        resolveBurstState(previousBurstIndex);
        updatePlayer(dt);
        updateObstacles(dt);
        updateParticles(dt);

        state.shake = Math.max(0, state.shake - dt * 1.8);
        state.flash = Math.max(0, state.flash - dt * 1.7);
        state.failureFlash = Math.max(0, state.failureFlash - dt * 1.3);
        state.successFlash = Math.max(0, state.successFlash - dt * 1.2);

        if (state.elapsed >= TOTAL_TIME) {
          clearStage();
        }
      }

      function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
        if (fillStyle) {
          ctx.fillStyle = fillStyle;
          ctx.fill();
        }
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.stroke();
        }
      }

      function drawBackground() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = Math.sin(state.uiPulse * 34) * state.shake * 10;
        const shakeY = Math.cos(state.uiPulse * 28) * state.shake * 7;
        ctx.save();
        ctx.translate(shakeX, shakeY);

        const skyGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        skyGradient.addColorStop(0, "#1e0f3b");
        skyGradient.addColorStop(0.48, "#0e0c2a");
        skyGradient.addColorStop(1, "#04020d");

        ctx.fillRect(-24, -24, VIEW.width + 48, VIEW.height + 48);

        ctx.fillStyle = "rgba(255, 120, 188, 0.05)";

        state.ribbons.forEach((ribbon) => {

          ribbonGradient.addColorStop(0, "rgba(0, 0, 0, 0)");
          ribbonGradient.addColorStop(0.5, ribbon.color);
          ribbonGradient.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = ribbonGradient;

        state.skyline.forEach((block, index) => {

        });

        const corridorGradient = ctx.createLinearGradient(0, 112, 0, 490);
        corridorGradient.addColorStop(0, "rgba(19, 11, 42, 0.86)");
        corridorGradient.addColorStop(0.38, "rgba(31, 17, 54, 0.98)");
        corridorGradient.addColorStop(1, "rgba(10, 6, 21, 0.98)");
        drawRoundedRect(58, 82, 844, 376, 44, corridorGradient, "rgba(255, 182, 226, 0.18)");

        const glowBand = ctx.createLinearGradient(0, 0, VIEW.width, 0);
        glowBand.addColorStop(0, "rgba(255, 119, 202, 0)");
        glowBand.addColorStop(0.25, "rgba(255, 119, 202, 0.18)");
        glowBand.addColorStop(0.75, "rgba(116, 224, 255, 0.18)");
        glowBand.addColorStop(1, "rgba(116, 224, 255, 0)");
        ctx.fillStyle = glowBand;
        ctx.fillRect(98, 102, 764, 10);
        ctx.fillRect(98, 428, 764, 10);

        for (let index = 0; index < 7; index += 1) {
          const x = 118 + index * 110;
          ctx.fillStyle = "rgba(255, 244, 254, 0.07)";
          ctx.fillRect(x, 126, 10, 286);
          ctx.fillStyle = index % 2 === 0 ? "rgba(255, 124, 197, 0.34)" : "rgba(120, 220, 255, 0.3)";
          ctx.fillRect(x + 2, 122, 6, 294);
        }

        const trackColor = state.inverseActive ? "#ff8ad6" : "#86ddff";
        const trackGlow = state.inverseActive ? "rgba(255, 107, 214, 0.35)" : "rgba(112, 214, 255, 0.28)";
        [FLOOR_Y + 28, CEILING_Y - 28].forEach((trackY, trackIndex) => {
          ctx.save();
          ctx.shadowBlur = 22;
          ctx.shadowColor = trackGlow;
          ctx.fillStyle = trackColor;
          ctx.fillRect(98, trackY, 762, 6);
          ctx.restore();
          for (let index = 0; index < 11; index += 1) {
            const x = 118 + index * 68 - ((state.elapsed * 160 + trackIndex * 32) % 68);
            ctx.fillStyle = "rgba(255,255,255,0.25)";
            ctx.fillRect(x, trackY - 2, 24, 10);
          }
        });

        const slotAlpha = clamp((state.goalOpen - 0.06) * 1.2, 0, 1);
        if (slotAlpha > 0) {
          ctx.save();
          ctx.globalAlpha = slotAlpha;
          ctx.shadowBlur = 34;
          ctx.shadowColor = "rgba(255, 231, 143, 0.7)";
          drawRoundedRect(VIEW.width - 150, FLOOR_Y - 72, 74, 144, 26, "rgba(255, 236, 173, 0.28)", "rgba(255, 242, 199, 0.9)");
          ctx.fillStyle = "rgba(255, 243, 212, 0.94)";
          ctx.fillRect(VIEW.width - 126, FLOOR_Y - 54, 26, 108);
          ctx.restore();
        }

        state.pulseRings.forEach((ring) => {
          ctx.save();
          ctx.globalAlpha = clamp(ring.alpha, 0, 1);
          ctx.strokeStyle = ring.color;
          ctx.lineWidth = 4;
          ctx.shadowBlur = 28;
          ctx.shadowColor = ring.color;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        });

        ctx.restore();
      }

      function drawObstacle(obstacle) {
        const y = obstacle.drawY || laneToY(obstacle.lane);
        ctx.save();
        ctx.translate(obstacle.x, y);
        ctx.shadowBlur = 22;
        ctx.shadowColor = obstacle.glow;
        const gradient = ctx.createLinearGradient(-obstacle.width * 0.5, -obstacle.height, obstacle.width * 0.5, obstacle.height);
        gradient.addColorStop(0, `hsla(${obstacle.hue}, 95%, 78%, 0.95)`);
        gradient.addColorStop(1, `hsla(${obstacle.hue}, 85%, 46%, 0.88)`);
        drawRoundedRect(-obstacle.width * 0.5, -obstacle.height * 0.5, obstacle.width, obstacle.height, 16, gradient);
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.fillRect(-obstacle.width * 0.28, -obstacle.height * 0.25, obstacle.width * 0.56, obstacle.height * 0.14);
        ctx.fillStyle = "rgba(8, 4, 19, 0.36)";
        ctx.fillRect(-obstacle.width * 0.5, obstacle.height * 0.16, obstacle.width, obstacle.height * 0.34);
        ctx.restore();
      }

      function drawPlayer() {
        const y = getPlayerY();
        const coreX = state.playerX + state.coreSwing;
        const auraColor = state.stabilizing ? "rgba(121, 255, 200, 0.45)" : "rgba(122, 223, 255, 0.28)";

        ctx.save();
        ctx.shadowBlur = 28;
        ctx.shadowColor = inverseGlow;
        const platformGradient = ctx.createLinearGradient(state.playerX - 44, y + 12, state.playerX + 44, y + 12);
        platformGradient.addColorStop(0, "#1c2448");
        platformGradient.addColorStop(0.5, "#4459a0");
        platformGradient.addColorStop(1, "#121932");
        drawRoundedRect(state.playerX - 44, y + 10, 88, 18, 9, platformGradient);
        ctx.restore();

        ctx.save();
        ctx.shadowBlur = 22;
        ctx.shadowColor = auraColor;
        ctx.strokeStyle = "rgba(243, 250, 255, 0.68)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(coreX, y - 4, 23, 0, Math.PI * 2);
        ctx.stroke();

        const coreGradient = ctx.createRadialGradient(coreX - 5, y - 10, 4, coreX, y - 4, 26);
        coreGradient.addColorStop(0, "#fffce9");
        coreGradient.addColorStop(0.45, "#ffd48f");
        coreGradient.addColorStop(1, state.inverseActive ? "#ff6fd1" : "#6fe3ff");
        ctx.fillStyle = coreGradient;
        ctx.beginPath();
        ctx.arc(coreX, y - 4, 16, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255,255,255,0.65)";
        ctx.beginPath();
        ctx.arc(coreX - 6, y - 10, 4.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = "rgba(255,255,255,0.36)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(state.playerX, y + 10);
        ctx.lineTo(coreX, y + 4);
        ctx.stroke();

        if (state.stabilizing) {
          ctx.save();
          ctx.globalAlpha = 0.88;
          ctx.strokeStyle = "rgba(145, 255, 197, 0.9)";
          ctx.lineWidth = 4;
          ctx.setLineDash([10, 8]);
          ctx.beginPath();
          ctx.arc(coreX, y - 4, 30 + Math.sin(state.uiPulse * 10) * 2, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();

      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.shadowBlur = 12;
          ctx.shadowColor = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        state.popups.forEach((popup) => {
          const alpha = clamp(1 - popup.time / popup.life, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = '800 18px "Avenir Next", "Segoe UI", sans-serif';
          ctx.shadowBlur = 20;
          ctx.shadowColor = popup.color;
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        });
      }

        drawRoundedRect(46, 62, 200, 14, 7, "rgba(255,255,255,0.08)");
        drawRoundedRect(46, 62, 200 * shockRatio, 14, 7, shockGradient);
        ctx.fillStyle = shockRatio > 0.72 ? "#ffd6e3" : "#dffaff";
        ctx.font = '800 20px "Avenir Next", "Segoe UI", sans-serif';

        const deliveryRatio = clamp(state.distance / 100, 0, 1);

        ctx.fillStyle = state.inverseActive ? "#ffd0f2" : getWarningBurstIndex() !== -1 ? "#ffe3a8" : "#d7ecff";

        ctx.fillStyle = "rgba(255,255,255,0.82)";

        ctx.fillText(state.inverseActive ? "좌우 입력 반전" : "탭/클릭: 중력 전환", 34, 518);
        ctx.fillText(state.stabilizing ? "안정화 유지 중" : "길게 눌러 안정화", 208, 518);
      }

      function drawEndCard(cleared) {
        drawBackground();
        state.obstacles.forEach(drawObstacle);
        drawPlayer();
        drawParticles();

      function render() {
        drawBackground();

        if (state.mode === "menu") {
          drawMenuCard();
          return;
        }

        state.obstacles.forEach(drawObstacle);
        drawPlayer();
        drawParticles();
        drawHud();

        if (state.mode === "failed") {
          drawEndCard(false);
        } else if (state.mode === "cleared") {
          drawEndCard(true);
        }

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255, 164, 205, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
        if (state.failureFlash > 0) {
          ctx.fillStyle = `rgba(255, 72, 117, ${state.failureFlash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
        if (state.successFlash > 0) {
          ctx.fillStyle = `rgba(255, 232, 143, ${state.successFlash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        let delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;
        delta = Math.min(delta, MAX_DT);

        while (delta > 0) {
          const step = Math.min(delta, FIXED_DT);
          update(step);
          delta -= step;
        }
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus({ preventScroll: true });
        const wasRunning = state.mode === "running";
        startFromTouch();
        input.pointerId = event.pointerId;
        input.pointerStartX = event.clientX;
        input.pointerStartY = event.clientY;
        input.pointerMoved = false;
        input.pointerDownTime = performance.now();
        input.pointerMode = "tap";
        input.holdArmed = state.mode === "running";
        input.pressStartedStage = !wasRunning && state.mode === "running";
        input.desiredPointerX = ((event.clientX - canvas.getBoundingClientRect().left) / canvas.getBoundingClientRect().width) * VIEW.width;
        canvas.setPointerCapture?.(event.pointerId);
      }

      function handlePointerMove(event) {
        if (input.pointerId !== event.pointerId) {
          return;
        }
        const rect = canvas.getBoundingClientRect();
        const px = ((event.clientX - rect.left) / rect.width) * VIEW.width;
        input.desiredPointerX = px;
        const dx = event.clientX - input.pointerStartX;
        const dy = event.clientY - input.pointerStartY;
        if (Math.hypot(dx, dy) > TAP_DISTANCE) {
          input.pointerMoved = true;
          input.pointerMode = "drag";
          input.holdArmed = false;
          endStabilize();
        }
      }

      function handlePointerEnd(event) {
        if (input.pointerId !== null && event.pointerId !== undefined && input.pointerId !== event.pointerId) {
          return;
        }
        const elapsed = performance.now() - input.pointerDownTime;
        const shouldToggle =
          state.mode === "running" &&
          !input.pressStartedStage &&
          !input.pointerMoved &&
          elapsed < HOLD_THRESHOLD &&
          input.pointerMode !== "drag";
        if (shouldToggle) {
          toggleGravity();
        }
        endStabilize();
        input.pointerId = null;
        input.pointerMode = "idle";
        input.holdArmed = false;
        input.pressStartedStage = false;
      }

      function handleKeyDown(event) {
        if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
          input.axis = -1;
          if (state.mode !== "running") {
            startFromTouch();
          }
        } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
          input.axis = 1;
          if (state.mode !== "running") {
            startFromTouch();
          }
        } else if (event.key === "Enter") {
          startFromTouch();
        } else if (event.key === " " || event.key === "Spacebar" || event.key === "ArrowUp" || event.key === "w" || event.key === "W") {
          event.preventDefault();
          if (state.mode !== "running") {
            startFromTouch();
          } else {
            toggleGravity();
          }
        } else if (event.key === "Shift") {
          startStabilize();
        }
      }

      function handleKeyUp(event) {
        if (
          event.key === "ArrowLeft" ||
          event.key === "ArrowRight" ||
          event.key === "a" ||
          event.key === "A" ||
          event.key === "d" ||
          event.key === "D"
        ) {
          input.axis = 0;
        } else if (event.key === "Shift") {
          endStabilize();
        }
      }

      function renderGameToText() {
        const warningIndex = getWarningBurstIndex();
        return JSON.stringify({
          mode: state.mode,
          elapsed: Number(state.elapsed.toFixed(1)),
          result: window.relayStageResult.status,
          note: state.note,
          distance_m: Math.round(state.distance),
          shock_pct: Math.round(state.shock),
          player_lane: state.gravity > 0 ? "floor" : "ceiling",
          inverse_state: state.inverseActive ? "active" : warningIndex !== -1 ? "warning" : "idle",
          burst_hits: state.burstHitsTotal,
          obstacles: state.obstacles.length,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = function advanceTime(ms = 16.67) {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "running") {
            startStage();
          }
          state.elapsed = TOTAL_TIME;
          state.distance = 100;
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode !== "running") {
            startStage();
          }
          state.shock = SHOCK_LIMIT;
          failStage("debug_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerEnd);
      canvas.addEventListener("pointercancel", handlePointerEnd);
      canvas.addEventListener("lostpointercapture", handlePointerEnd);
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      window.addEventListener("keydown", handleKeyDown, { passive: false });
      window.addEventListener("keyup", handleKeyUp);

      resetBackdrop();
      resetGameState("menu");
      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
