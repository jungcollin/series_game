<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>트램폴린 별따기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { margin:0; width:100%; height:100%; overflow:hidden; font-family:"Trebuchet MS","Segoe UI",sans-serif; background:#e0f0f8; }
      body { display:grid; place-items:center; }
      a, canvas { -webkit-tap-highlight-color: rgba(148,163,184,0.2); }
      .skip-link { position:absolute; top:12px; left:12px; z-index:10; width:1px; height:1px; padding:0; overflow:hidden; clip:rect(0,0,0,0); clip-path:inset(50%); border-radius:999px; background:rgba(30,60,90,0.92); color:#e0f0f8; font-weight:800; text-decoration:none; white-space:nowrap; transition:transform 0.15s ease; }
      .skip-link:focus, .skip-link:focus-visible { width:auto; height:auto; padding:12px 16px; overflow:visible; clip:auto; clip-path:none; }
      .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
      canvas { display:block; width:100%; height:100%; background:#e0f0f8; touch-action:none; }
      canvas:focus-visible { outline:4px solid rgba(100,160,220,0.6); outline-offset:-8px; }
      @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; animation-iteration-count:1!important; transition-duration:0.01ms!important; scroll-behavior:auto!important; } }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">트램폴린 별따기. 화면 터치로 좌우 이동하여 하늘의 별을 모으세요.</p>
    <canvas id="game" width="960" height="540" aria-label="트램폴린 별따기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
    "use strict";
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    let W = canvas.width;
    let H = canvas.height;
    let CX = W / 2;
    let CY = H / 2;
    const FIXED_DT = 1/60, MAX_DT = 1/20;
    const relayCtx = window.RelayRuntime?.readContext("trampoline-star") || { history:[], clearCount:0, previousStageId:null };

    const COL = {
      bg:"#e0f0f8", sky:"#a0d0f0", skyTop:"#70b0e0", pink:"#f0a0b0", pinkDark:"#d08090",
      lemon:"#f0e070", lemonDark:"#d0c050", tramp:"#e06880", trampDark:"#c05068",
      grass:"#80c870", grassDark:"#60a050", text:"#203050", textLight:"#506880",
      cardBg:"rgba(224,240,248,0.96)", fail:"#c04040", clear:"#2d8a50", gold:"#f0c840",
      star:"#f0c840", starGlow:"#fff8d0"
    };

    const TIME_LIMIT = 35, TARGET_STARS = 15, MAX_MISS = 3;
    const GRAVITY = 600, BOUNCE_VEL = -480, TRAMP_W = 120;
    let TRAMP_Y = H - 80;
    let mode = "menu", elapsed = 0, lastRunTime = 0;
    let hostFailedReported = false, hostClearedReported = false;
    let animFrame = 0, lastTs = 0;
    let starsCollected = 0, misses = 0;
    let player = { x: W/2, y: TRAMP_Y - 20, vy: 0, r: 16, onTramp: true };
    let stars = [];
    let trampX = W / 2;
    let shakeTimer = 0, shakeIntensity = 0;
    let particles = [], clouds = [];
    let targetX = W / 2;
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function resizeCanvas() {
      const prevW = W;
      const prevH = H;
      const rect = canvas.getBoundingClientRect();
      const cssW = Math.max(1, rect.width || window.innerWidth);
      const cssH = Math.max(1, rect.height || window.innerHeight);
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(cssW * dpr);
      canvas.height = Math.round(cssH * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = cssW;
      H = cssH;
      CX = W / 2;
      CY = H / 2;
      TRAMP_Y = H - 80;

      if (prevW > 0 && prevH > 0) {
        const sx = W / prevW;
        const sy = H / prevH;
        trampX *= sx;
        targetX *= sx;
        player.x *= sx;
        player.y *= sy;
        player.y = Math.min(player.y, TRAMP_Y - player.r);
        for (const s of stars) {
          s.x *= sx;
          s.y *= sy;
        }
        for (const c of clouds) {
          c.x *= sx;
          c.y *= sy;
          c.w *= Math.sqrt(sx);
        }
        for (const p of particles) {
          p.x *= sx;
          p.y *= sy;
        }
      }
    }

    window.relayStageMeta = {
      id: "trampoline-star",
      title: "트램폴린 별따기",
      description: "트램폴린 위에서 점프하며 하늘의 별을 모으는 탄성 수집 게임",
      creator: "jungcollin",
      genre: "Bounce collection",
      controls: "화면 터치/드래그로 좌우 이동",
      clearCondition: "별 15개를 모으면 클리어",
      failCondition: "시간 초과 또는 착지 실패 3회",
    };
    window.relayStageResult = { status:"running" };

    function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch(e) { return false; } }
    function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
    function reportFailed(reason) { if (!inRelayHost()||hostFailedReported) return; hostFailedReported=true; window.parent.RelayHost.onStageFailed?.({stageId:"trampoline-star",stageTitle:"트램폴린 별따기",reason,durationSec:+lastRunTime.toFixed(1)}); }
    function reportCleared() { if (!inRelayHost()||hostClearedReported) return; hostClearedReported=true; window.parent.RelayHost.onStageCleared?.({stageId:"trampoline-star",stageTitle:"트램폴린 별따기",clearCountAfter:relayCtx.clearCount+1,durationSec:+lastRunTime.toFixed(1)}); }

    function spawnStars() {
      stars = [];
      for (let i = 0; i < 6; i++) {
        stars.push({
          x: 80 + Math.random() * (W - 160),
          y: 40 + Math.random() * (H * 0.5),
          r: 12 + Math.random() * 6,
          collected: false,
          bobPhase: Math.random() * Math.PI * 2
        });
      }
    }

    function initClouds() {
      clouds = [];
      for (let i = 0; i < 4; i++) {
        clouds.push({ x: Math.random()*W, y: 30+Math.random()*100, w: 60+Math.random()*80, speed: 10+Math.random()*15 });
      }
    }

    function startGame() {
      mode = "running"; elapsed = 0; lastRunTime = 0;
      starsCollected = 0; misses = 0; particles = [];
      hostFailedReported = false; hostClearedReported = false;
      window.relayStageResult.status = "running";
      shakeTimer = 0;
      player = { x: W/2, y: TRAMP_Y - 20, vy: BOUNCE_VEL, r: 16, onTramp: false };
      trampX = W / 2; targetX = W / 2;
      spawnStars(); initClouds();
    }
    function failGame(reason) { mode = "failed"; lastRunTime = elapsed; window.relayStageResult.status = "failed"; reportFailed(reason); }
    function clearGame() { mode = "cleared"; lastRunTime = elapsed; window.relayStageResult.status = "cleared"; reportCleared(); }

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random()*Math.PI*2, spd = 40+Math.random()*80;
        particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-20, life:1, decay:1.5+Math.random(), size:2+Math.random()*3, color });
      }
    }

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      if (mode !== "running") {
        startGame();
      }
      const r = canvas.getBoundingClientRect();
      targetX = (e.clientX - r.left) / r.width * W;
    });
    canvas.addEventListener("pointermove", (e) => {
      e.preventDefault();
      if (mode === "running") {
        const r = canvas.getBoundingClientRect();
        targetX = (e.clientX - r.left) / r.width * W;
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); if (mode !== "running") startGame(); }
      if (mode === "running") {
        if (e.key === "ArrowLeft") targetX = Math.max(40, player.x - 80);
        if (e.key === "ArrowRight") targetX = Math.min(W - 40, player.x + 80);
      }
    });

    function update(dt) {
      if (mode !== "running") return;
      elapsed += dt;
      if (elapsed >= TIME_LIMIT) { failGame("시간 초과"); return; }
      if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);

      // Move trampoline toward target
      trampX += (targetX - trampX) * 6 * dt;
      trampX = Math.max(TRAMP_W/2 + 20, Math.min(W - TRAMP_W/2 - 20, trampX));

      // Player physics
      player.vy += GRAVITY * dt;
      player.y += player.vy * dt;

      // Horizontal movement - player follows trampoline while in air
      const airControl = 4;
      player.x += (trampX - player.x) * airControl * dt;
      player.x = Math.max(player.r, Math.min(W - player.r, player.x));

      // Trampoline bounce
      if (player.y >= TRAMP_Y - player.r && player.vy > 0) {
        if (Math.abs(player.x - trampX) < TRAMP_W / 2 + player.r) {
          // Successful landing
          player.y = TRAMP_Y - player.r;
          player.vy = BOUNCE_VEL - Math.abs(player.vy) * 0.1; // Extra bounce from speed
          player.vy = Math.max(player.vy, -550); // Cap
          spawnParticles(player.x, TRAMP_Y, COL.pink, 6);
        } else if (player.y > H + 50) {
          // Missed trampoline
          misses++;
          shakeTimer = 0.3; shakeIntensity = 6;
          if (misses >= MAX_MISS) { failGame("착지 실패 3회"); return; }
          // Reset player
          player.x = trampX; player.y = TRAMP_Y - player.r;
          player.vy = BOUNCE_VEL;
        }
      }

      // Star collection
      for (const s of stars) {
        if (s.collected) continue;
        s.bobPhase += dt * 2;
        const sy = s.y + Math.sin(s.bobPhase) * 5;
        const dist = Math.hypot(player.x - s.x, player.y - sy);
        if (dist < player.r + s.r) {
          s.collected = true;
          starsCollected++;
          spawnParticles(s.x, sy, COL.star, 10);
          if (starsCollected >= TARGET_STARS) {
            setTimeout(() => clearGame(), 500);
          }
        }
      }

      // Respawn stars if all collected in current batch
      if (stars.every(s => s.collected) && starsCollected < TARGET_STARS) {
        spawnStars();
      }

      // Clouds
      for (const c of clouds) {
        c.x += c.speed * dt;
        if (c.x > W + c.w) c.x = -c.w;
      }

      for (const p of particles) { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 100*dt; p.life -= p.decay*dt; }
      particles = particles.filter(p => p.life > 0);
    }

    function drawRR(x,y,w,h,r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }
    function drawCard(title, lines, accent) {
      ctx.fillStyle="rgba(224,240,248,0.5)"; ctx.fillRect(0,0,W,H);
      const cw=320, ch=44+lines.length*28+44, cx=(W-cw)/2, cy=(H-ch)/2;
      drawRR(cx,cy,cw,ch,10); ctx.fillStyle=COL.cardBg; ctx.fill();
      ctx.fillStyle=accent; ctx.fillRect(cx+20,cy+8,cw-40,3);
      ctx.textAlign="center"; ctx.fillStyle=COL.text; ctx.font="bold 24px 'Trebuchet MS',sans-serif";
      ctx.fillText(title,W/2,cy+38);
      ctx.font="400 13px 'Trebuchet MS',sans-serif"; ctx.fillStyle=COL.textLight;
      lines.forEach((l,i) => ctx.fillText(l,W/2,cy+64+i*28));
      ctx.fillStyle="#aaa"; ctx.font="400 12px 'Trebuchet MS',sans-serif";
      ctx.fillText("TAP 또는 ENTER",W/2,cy+ch-16); ctx.textAlign="left";
    }

    function drawStar(x, y, r, phase) {
      const sy = y + Math.sin(phase) * 5;
      ctx.save(); ctx.translate(x, sy); ctx.rotate(phase * 0.3);
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = -Math.PI/2 + (Math.PI*2/5)*i;
        const a2 = a + Math.PI/5;
        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        ctx.lineTo(Math.cos(a2)*r*0.4, Math.sin(a2)*r*0.4);
      }
      ctx.closePath(); ctx.fillStyle=COL.star; ctx.fill();
      ctx.strokeStyle=COL.lemonDark; ctx.lineWidth=1.5; ctx.stroke();
      // Glow
      ctx.beginPath(); ctx.arc(0, 0, r*0.4, 0, Math.PI*2);
      ctx.fillStyle=COL.starGlow; ctx.fill();
      ctx.restore();
    }

    function drawTrampoline(cx, cy, w) {
      // Legs
      ctx.strokeStyle = "#888"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx-w/2+10, cy); ctx.lineTo(cx-w/2-5, cy+40); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+w/2-10, cy); ctx.lineTo(cx+w/2+5, cy+40); ctx.stroke();
      // Surface
      ctx.beginPath(); ctx.ellipse(cx, cy, w/2, 8, 0, 0, Math.PI*2);
      ctx.fillStyle = COL.tramp; ctx.fill(); ctx.strokeStyle = COL.trampDark; ctx.lineWidth = 2; ctx.stroke();
      // Highlight
      ctx.beginPath(); ctx.ellipse(cx, cy-2, w/2-10, 4, 0, 0, Math.PI);
      ctx.fillStyle = COL.pink+"60"; ctx.fill();
    }

    function drawPlayer(px, py, r) {
      // Shadow
      ctx.beginPath(); ctx.ellipse(px, TRAMP_Y + 5, r*0.8, 4, 0, 0, Math.PI*2);
      ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fill();
      // Body
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2);
      ctx.fillStyle = "#70b8e8"; ctx.fill(); ctx.strokeStyle = "#5098c8"; ctx.lineWidth = 2; ctx.stroke();
      // Face
      ctx.fillStyle = "#304060";
      ctx.beginPath(); ctx.arc(px-4, py-3, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+4, py-3, 2, 0, Math.PI*2); ctx.fill();
      // Smile
      ctx.beginPath(); ctx.arc(px, py+1, 5, 0.1, Math.PI-0.1);
      ctx.strokeStyle = "#304060"; ctx.lineWidth = 1.5; ctx.stroke();
    }

    function drawHUD() {
      const tl = Math.max(0, TIME_LIMIT - elapsed);
      ctx.fillStyle=COL.text; ctx.font="600 16px 'Trebuchet MS',sans-serif"; ctx.textAlign="left";
      ctx.fillText(`\u2605 ${starsCollected} / ${TARGET_STARS}`, 20, 30);
      ctx.textAlign="right"; ctx.fillStyle=tl<10?COL.fail:COL.text;
      ctx.fillText(Math.ceil(tl)+"s", W-20, 30);
      ctx.fillStyle="#c8dce8"; ctx.fillRect(W-180,38,160,4);
      ctx.fillStyle=tl<10?COL.fail:"#70b8e8"; ctx.fillRect(W-180,38,160*(tl/TIME_LIMIT),4);
      ctx.textAlign="left";
      for (let i=0;i<MAX_MISS;i++) { ctx.fillStyle=i<misses?COL.fail:"#c8dce8"; ctx.font="16px sans-serif"; ctx.fillText("\u2716",20+i*22,58); }
    }

    function render() {
      ctx.save();
      if (shakeTimer>0&&!reducedMotion) { const s=shakeIntensity*(shakeTimer/0.3); ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }

      // Sky gradient
      const grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0, COL.skyTop); grad.addColorStop(0.6, COL.sky); grad.addColorStop(0.85, COL.bg); grad.addColorStop(1, COL.grass);
      ctx.fillStyle=grad; ctx.fillRect(-10,-10,W+20,H+20);

      // Ground
      ctx.fillStyle=COL.grass; ctx.fillRect(-10, TRAMP_Y+30, W+20, H-TRAMP_Y);
      ctx.fillStyle=COL.grassDark; ctx.fillRect(-10, TRAMP_Y+30, W+20, 3);

      // Clouds
      for (const c of clouds) {
        ctx.fillStyle="rgba(255,255,255,0.7)";
        ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w/2, 15, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x-c.w*0.25, c.y-8, c.w*0.3, 12, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(c.x+c.w*0.2, c.y-5, c.w*0.25, 10, 0, 0, Math.PI*2); ctx.fill();
      }

      if (mode==="menu") {
        drawStar(W/2-60, H/2-80, 18, 0);
        drawStar(W/2+60, H/2-100, 14, 1);
        drawStar(W/2, H/2-120, 20, 2);
        drawTrampoline(W/2, TRAMP_Y, TRAMP_W);
        drawCard("트램폴린 별따기", ["화면 터치로 좌우 이동","클리어: 별 15개를 모으면 클리어","실패: 시간 초과 또는 착지 실패 3회"], COL.sky);
        ctx.restore(); return;
      }
      if (mode==="running") {
        // Stars
        for (const s of stars) {
          if (!s.collected) drawStar(s.x, s.y, s.r, s.bobPhase);
        }
        drawTrampoline(trampX, TRAMP_Y, TRAMP_W);
        drawPlayer(player.x, player.y, player.r);

        for (const p of particles) { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); }
        ctx.globalAlpha=1;
        drawHUD();
        ctx.textAlign="center"; ctx.fillStyle=COL.textLight; ctx.font="400 12px 'Trebuchet MS',sans-serif";
        ctx.fillText("화면 터치로 좌우 이동", W/2, H-8);
        ctx.restore(); return;
      }
      if (mode==="failed") {
        drawCard("실패", [misses>=MAX_MISS?"착지 실패 3회":"시간 초과",`별: ${starsCollected}개 · 시간: ${lastRunTime.toFixed(1)}초`], COL.fail);
        ctx.restore(); return;
      }
      if (mode==="cleared") {
        for (let i=0;i<5;i++) drawStar(W/2-120+i*60, H/2-60, 16, i*0.8);
        drawCard("별따기 성공!", [`별 ${TARGET_STARS}개 수집`,`시간: ${lastRunTime.toFixed(1)}초`], COL.clear);
        ctx.restore(); return;
      }
      ctx.restore();
    }

    function frame(ts) { const dt=lastTs?Math.min((ts-lastTs)/1000,MAX_DT):FIXED_DT; lastTs=ts; update(dt); render(); animFrame=requestAnimationFrame(frame); }
    function renderGameToText() { return JSON.stringify({mode,elapsed:Math.round(elapsed*10)/10,starsCollected,misses,playerY:Math.round(player.y),playerVY:Math.round(player.vy),starsVisible:stars.filter(s=>!s.collected).length,timeLeft:Math.max(0,Math.round((TIME_LIMIT-elapsed)*10)/10),result:window.relayStageResult.status}); }

    window.render_game_to_text = renderGameToText;
    window.advanceTime = (ms=16.67) => { const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000))); for(let i=0;i<steps;i++) update(FIXED_DT); render(); return renderGameToText(); };
    window.relayStageDebug = { forceClear() { startGame(); clearGame(); render(); }, forceFail() { startGame(); failGame("debug_force_fail"); render(); } };

    canvas.addEventListener("click", () => canvas.focus());
    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
    resizeCanvas();
    reportReady();
    render();
    canvas.focus();
    animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
