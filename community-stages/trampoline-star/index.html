<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>트램폴린 별따기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #e0f0f8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(148,163,184,0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0,0,0,0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(30,60,90,0.92);
        color: #e0f0f8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        background: #e0f0f8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(100,160,220,0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">트램폴린 별따기. 터치 드래그로 트램폴린을 좌우로 움직여 공을 튕겨 별을 모으는 게임. 모바일에서는 화면을 터치 드래그하여 트램폴린을 이동합니다. 별 12개를 모으면 클리어. 시간 초과 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="트램폴린 별따기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      "use strict";
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      let W = canvas.width, H = canvas.height, CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60, MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayCtx = window.RelayRuntime?.readContext("trampoline-star") || {
        history: [], clearCount: 0, previousStageId: null,
      };

      const META = {
        id: "trampoline-star",
        title: "트램폴린 별따기",
        description: "트램폴린으로 공을 튕겨 하늘의 별을 모으는 게임",
        creator: "jungcollin",
        genre: "Bounce collection",
        clearCondition: "별 12개를 모으면 클리어",
        failCondition: "시간 초과 시 실패",
        controls: "터치 드래그로 트램폴린 이동",
      };

      window.relayStageMeta = { ...META };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#e0f0f8", skyTop: "#70b0e0", sky: "#a0d0f0",
        grass: "#80c870", grassDk: "#60a050",
        tramp: "#e06880", trampDk: "#c05068", trampHi: "#f0a0b060",
        ball: "#70b8e8", ballStroke: "#5098c8", ballFace: "#304060",
        star: "#f0c840", starGlow: "#fff8d0", starStroke: "#d0c050",
        text: "#203050", textLt: "#506880",
        card: "rgba(224,240,248,0.96)",
        fail: "#c04040", clear: "#2d8a50",
      };

      // --- Tuning ---
      const GRAVITY = 420;
      const BOUNCE_SPEED = 780;
      const BALL_R = 14;
      const TRAMP_W = 120;
      const TRAMP_HALF = TRAMP_W / 2;
      const MAX_ANGLE = 65; // degrees from vertical
      const TARGET_STARS = 12;
      const TIME_LIMIT = 35;

      let GROUND_Y = H - 65;

      // --- State ---
      let mode = "menu"; // menu | running | clear | failed
      let elapsed = 0, lastTs = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let starsCollected = 0;

      // Trampoline
      let trampX = CX;
      let trampSquish = 0;

      // Ball
      let ball = { x: CX, y: 0, vx: 0, vy: 0, launched: false };

      // Stars, particles, clouds
      let stars = [], particles = [], clouds = [], trails = [];

      // Touch
      let touching = false, touchX = CX;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function resizeCanvas() {
        const prevW = W, prevH = H;
        const rect = canvas.getBoundingClientRect();
        const cssW = Math.max(1, rect.width || window.innerWidth);
        const cssH = Math.max(1, rect.height || window.innerHeight);
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = Math.round(cssW * dpr);
        canvas.height = Math.round(cssH * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        W = cssW; H = cssH; CX = W / 2; CY = H / 2;
        GROUND_Y = H - 65;
        if (prevW > 0 && prevH > 0) {
          const sx = W / prevW, sy = H / prevH;
          trampX *= sx; touchX *= sx;
          ball.x *= sx; ball.y *= sy;
          for (const s of stars) { s.x *= sx; s.y *= sy; }
          for (const c of clouds) { c.x *= sx; c.y *= sy; c.w *= Math.sqrt(sx); }
          for (const p of particles) { p.x *= sx; p.y *= sy; }
          for (const t of trails) { t.x *= sx; t.y *= sy; }
        }
      }

      // --- Relay ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayCtx.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawners ---
      function spawnParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2, spd = 40 + Math.random() * 100;
          particles.push({
            x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 40,
            life: 1, decay: 1.6 + Math.random(), size: 2 + Math.random() * 3, color,
          });
        }
      }

      function initClouds() {
        clouds = [];
        for (let i = 0; i < 4; i++)
          clouds.push({ x: Math.random() * W, y: 15 + Math.random() * 70, w: 50 + Math.random() * 70, speed: 6 + Math.random() * 10 });
      }

      function spawnStarWave() {
        stars = [];
        // 3 tiers: low (easy to reach), mid, high
        const tiers = [
          { min: GROUND_Y * 0.52, max: GROUND_Y * 0.72 },
          { min: GROUND_Y * 0.28, max: GROUND_Y * 0.50 },
          { min: GROUND_Y * 0.06, max: GROUND_Y * 0.26 },
        ];
        // 2 low, 2 mid, 1 high per wave
        const tierIdx = [0, 0, 1, 1, 2];
        for (let i = 0; i < 5; i++) {
          const t = tiers[tierIdx[i]];
          stars.push({
            x: 50 + Math.random() * (W - 100),
            y: t.min + Math.random() * (t.max - t.min),
            r: 14, collected: false,
            phase: Math.random() * Math.PI * 2,
          });
        }
      }

      // --- Game lifecycle ---
      function reset() {
        elapsed = 0;
        starsCollected = 0;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        trampX = CX; trampSquish = 0;
        ball = { x: CX, y: GROUND_Y - BALL_R - 10, vx: 0, vy: 0, launched: false };
        particles = []; trails = [];
        spawnStarWave(); initClouds();
      }

      // --- Input ---
      function getX(e) {
        const rect = canvas.getBoundingClientRect();
        return (e.clientX - rect.left) / rect.width * W;
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") {
          reset(); mode = "running"; return;
        }
        touching = true;
        touchX = getX(e);
        // First tap launches the ball
        if (!ball.launched) {
          ball.launched = true;
          ball.vy = -BOUNCE_SPEED;
          ball.vx = 0;
          trampSquish = 0.4;
          spawnParticles(ball.x, GROUND_Y, COL.tramp, reducedMotion ? 3 : 5);
        }
        if (canvas.setPointerCapture && e.pointerId !== undefined)
          try { canvas.setPointerCapture(e.pointerId); } catch {}
        canvas.focus();
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!touching) return;
        e.preventDefault();
        touchX = getX(e);
      });

      canvas.addEventListener("pointerup", (e) => {
        touching = false;
        if (canvas.releasePointerCapture && e.pointerId !== undefined)
          try { canvas.releasePointerCapture(e.pointerId); } catch {}
      });

      canvas.addEventListener("pointercancel", (e) => {
        touching = false;
        if (canvas.releasePointerCapture && e.pointerId !== undefined)
          try { canvas.releasePointerCapture(e.pointerId); } catch {}
      });

      // Keyboard
      let keyL = false, keyR = false;
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (mode !== "running") { reset(); mode = "running"; return; }
          if (!ball.launched) {
            ball.launched = true; ball.vy = -BOUNCE_SPEED; ball.vx = 0;
            trampSquish = 0.4;
          }
        }
        if (e.key === "ArrowLeft") keyL = true;
        if (e.key === "ArrowRight") keyR = true;
      });
      canvas.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft") keyL = false;
        if (e.key === "ArrowRight") keyR = false;
      });

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        if (elapsed >= TIME_LIMIT) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
          return;
        }

        // Trampoline movement
        if (touching) trampX += (touchX - trampX) * 12 * dt;
        if (keyL) trampX -= 400 * dt;
        if (keyR) trampX += 400 * dt;
        trampX = clamp(trampX, TRAMP_HALF + 8, W - TRAMP_HALF - 8);

        // Tramp squish decay
        if (trampSquish > 0) trampSquish = Math.max(0, trampSquish - dt * 3);

        // Ball on trampoline (not yet launched)
        if (!ball.launched) {
          ball.x = trampX;
          ball.y = GROUND_Y - BALL_R - 10;
          return;
        }

        // Ball physics
        ball.vy += GRAVITY * dt;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        // Wall bounce
        if (ball.x < BALL_R) { ball.x = BALL_R; ball.vx = Math.abs(ball.vx); }
        if (ball.x > W - BALL_R) { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
        // Ceiling bounce
        if (ball.y < BALL_R) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy); }

        // Trail
        if (!reducedMotion && ball.launched && Math.random() < 0.5) {
          trails.push({ x: ball.x, y: ball.y, life: 0.4 });
        }

        // Trampoline bounce
        if (ball.vy > 0 && ball.y >= GROUND_Y - BALL_R - 8) {
          const hitOffset = ball.x - trampX;
          if (Math.abs(hitOffset) < TRAMP_HALF + BALL_R * 0.3) {
            // Bounce! Angle based on where ball hit
            const norm = clamp(hitOffset / TRAMP_HALF, -1, 1);
            const angleRad = norm * MAX_ANGLE * Math.PI / 180;
            ball.vx = Math.sin(angleRad) * BOUNCE_SPEED;
            ball.vy = -Math.cos(angleRad) * BOUNCE_SPEED;
            ball.y = GROUND_Y - BALL_R - 8;
            trampSquish = 0.4;
            spawnParticles(ball.x, GROUND_Y, COL.tramp, reducedMotion ? 2 : 4);
          }
        }

        // Missed (fell below screen)
        if (ball.y > H + 40) {
          ball.x = trampX;
          ball.y = GROUND_Y - BALL_R - 10;
          ball.vx = 0; ball.vy = 0;
          ball.launched = false;
        }

        // Star collection
        for (const s of stars) {
          if (s.collected) continue;
          s.phase += dt * 2;
          const sy = s.y + Math.sin(s.phase) * 4;
          if (Math.hypot(ball.x - s.x, ball.y - sy) < BALL_R + s.r) {
            s.collected = true;
            starsCollected++;
            spawnParticles(s.x, sy, COL.star, reducedMotion ? 5 : 12);
            if (starsCollected >= TARGET_STARS) {
              mode = "clear";
              window.relayStageResult.status = "cleared";
              reportCleared();
              return;
            }
          }
        }

        // Respawn wave
        if (stars.every(s => s.collected) && starsCollected < TARGET_STARS) spawnStarWave();

        // Clouds
        for (const c of clouds) { c.x += c.speed * dt; if (c.x > W + c.w) c.x = -c.w; }

        // Particles
        for (const p of particles) {
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 120 * dt; p.life -= p.decay * dt;
        }
        particles = particles.filter(p => p.life > 0);

        // Trails
        for (const t of trails) t.life -= dt * 2.5;
        trails = trails.filter(t => t.life > 0);
      }

      // --- Drawing ---
      function drawStar(x, y, r, phase) {
        const sy = y + Math.sin(phase) * 4;
        ctx.save(); ctx.translate(x, sy); ctx.rotate(phase * 0.3);
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = -Math.PI / 2 + (Math.PI * 2 / 5) * i;
          const a2 = a + Math.PI / 5;
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
          ctx.lineTo(Math.cos(a2) * r * 0.4, Math.sin(a2) * r * 0.4);
        }
        ctx.closePath();
        ctx.fillStyle = COL.star; ctx.fill();
        ctx.strokeStyle = COL.starStroke; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, r * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = COL.starGlow; ctx.fill();
        ctx.restore();
      }

      function drawTrampoline() {
        const cx = trampX, cy = GROUND_Y;
        const sq = trampSquish * 10;
        // Legs
        ctx.strokeStyle = "#888"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(cx - TRAMP_HALF + 10, cy + sq); ctx.lineTo(cx - TRAMP_HALF - 5, cy + 35); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + TRAMP_HALF - 10, cy + sq); ctx.lineTo(cx + TRAMP_HALF + 5, cy + 35); ctx.stroke();
        // Surface
        ctx.beginPath(); ctx.ellipse(cx, cy + sq, TRAMP_HALF, 8 + sq * 2, 0, 0, Math.PI * 2);
        ctx.fillStyle = COL.tramp; ctx.fill();
        ctx.strokeStyle = COL.trampDk; ctx.lineWidth = 2; ctx.stroke();
        // Highlight
        ctx.beginPath(); ctx.ellipse(cx, cy + sq - 2, TRAMP_HALF - 10, 4, 0, 0, Math.PI);
        ctx.fillStyle = COL.trampHi; ctx.fill();
      }

      function drawBall() {
        const bx = ball.x, by = ball.y;
        // Shadow
        const hRatio = clamp(1 - (GROUND_Y - by) / (GROUND_Y * 0.7), 0.15, 1);
        ctx.beginPath(); ctx.ellipse(bx, GROUND_Y + 4, BALL_R * hRatio, 3 * hRatio, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,0,0,${0.1 * hRatio})`; ctx.fill();
        // Body
        ctx.beginPath(); ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = COL.ball; ctx.fill();
        ctx.strokeStyle = COL.ballStroke; ctx.lineWidth = 2; ctx.stroke();
        // Eyes
        ctx.fillStyle = COL.ballFace;
        ctx.beginPath(); ctx.arc(bx - 4, by - 3, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(bx + 4, by - 3, 2, 0, Math.PI * 2); ctx.fill();
        // Mouth
        if (ball.launched && ball.vy < -100) {
          // Excited going up
          ctx.beginPath(); ctx.arc(bx, by + 2, 4, 0, Math.PI);
          ctx.fillStyle = COL.ballFace; ctx.fill();
        } else {
          // Smile
          ctx.beginPath(); ctx.arc(bx, by + 1, 4.5, 0.15, Math.PI - 0.15);
          ctx.strokeStyle = COL.ballFace; ctx.lineWidth = 1.5; ctx.stroke();
        }
      }

      function drawHUD() {
        const tl = Math.max(0, TIME_LIMIT - elapsed);
        ctx.fillStyle = COL.text; ctx.font = "600 16px 'Trebuchet MS',sans-serif";
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`\u2605 ${starsCollected} / ${TARGET_STARS}`, 20, 20);

        ctx.textAlign = "right";
        ctx.fillStyle = tl < 10 ? COL.fail : COL.text;
        ctx.fillText(Math.ceil(tl) + "s", W - 20, 20);

        // Time bar
        ctx.fillStyle = "#c8dce8"; ctx.fillRect(W - 180, 38, 160, 4);
        ctx.fillStyle = tl < 10 ? COL.fail : "#70b8e8";
        ctx.fillRect(W - 180, 38, 160 * (tl / TIME_LIMIT), 4);

        // Star progress
        ctx.fillStyle = "#c8dce8"; ctx.fillRect(20, 40, 120, 4);
        ctx.fillStyle = COL.star; ctx.fillRect(20, 40, 120 * (starsCollected / TARGET_STARS), 4);
        ctx.textAlign = "left";
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        ctx.fillStyle = "rgba(224,240,248,0.5)"; ctx.fillRect(0, 0, W, H);
        const cw = Math.min(320, W - 40);
        const ch = 50 + lines.length * 28 + 44;
        const cx = (W - cw) / 2, cy = (H - ch) / 2;
        roundRect(cx, cy, cw, ch, 10);
        ctx.fillStyle = COL.card; ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cx + 20, cy + 8, cw - 40, 3);

        ctx.textAlign = "center"; ctx.fillStyle = COL.text;
        ctx.font = "bold 24px 'Trebuchet MS',sans-serif";
        ctx.fillText(title, W / 2, cy + 38);

        ctx.font = "400 13px 'Trebuchet MS',sans-serif"; ctx.fillStyle = COL.textLt;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], W / 2, cy + 64 + i * 28);

        ctx.fillStyle = "#aaa"; ctx.font = "400 12px 'Trebuchet MS',sans-serif";
        ctx.fillText("TAP or ENTER", W / 2, cy + ch - 18);
        ctx.textAlign = "left";
      }

      function draw() {
        ctx.save();

        // Sky
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, COL.skyTop); grad.addColorStop(0.6, COL.sky);
        grad.addColorStop(0.85, COL.bg); grad.addColorStop(1, COL.grass);
        ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

        // Ground
        ctx.fillStyle = COL.grass; ctx.fillRect(0, GROUND_Y + 18, W, H - GROUND_Y);
        ctx.fillStyle = COL.grassDk; ctx.fillRect(0, GROUND_Y + 18, W, 3);

        // Clouds
        for (const c of clouds) {
          ctx.fillStyle = "rgba(255,255,255,0.6)";
          ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w / 2, 13, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(c.x - c.w * 0.25, c.y - 6, c.w * 0.3, 10, 0, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.ellipse(c.x + c.w * 0.2, c.y - 3, c.w * 0.25, 8, 0, 0, Math.PI * 2); ctx.fill();
        }

        if (mode === "menu") {
          drawTrampoline();
          drawStar(CX - 60, CY - 70, 18, 0);
          drawStar(CX + 70, CY - 100, 14, 1.2);
          drawStar(CX, CY - 140, 20, 2.4);
          drawCard("트램폴린 별따기", [
            "터치 드래그로 트램폴린을 이동!",
            "공을 튕겨 별을 모으세요",
            "",
            "조작: 터치 드래그로 트램폴린 이동",
            "클리어: 별 12개 수집",
            "실패: 시간 초과",
          ], "#70b0e0");
          ctx.restore(); return;
        }

        if (mode === "running") {
          // Stars
          for (const s of stars) if (!s.collected) drawStar(s.x, s.y, s.r, s.phase);

          // Trails
          for (const t of trails) {
            ctx.beginPath(); ctx.arc(t.x, t.y, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(112,184,232,${t.life * 0.5})`; ctx.fill();
          }

          drawTrampoline();
          drawBall();

          // Particles
          for (const p of particles) {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
          }
          ctx.globalAlpha = 1;

          drawHUD();

          // Hint
          ctx.textAlign = "center"; ctx.fillStyle = COL.textLt;
          ctx.font = "400 12px 'Trebuchet MS',sans-serif";
          if (!ball.launched) ctx.fillText("탭하여 공을 발사!", CX, H - 8);
          else ctx.fillText("트램폴린으로 공을 받으세요", CX, H - 8);
          ctx.textAlign = "left";

          ctx.restore(); return;
        }

        if (mode === "clear") {
          drawTrampoline();
          for (let i = 0; i < 5; i++) drawStar(CX - 120 + i * 60, CY - 70, 16, i * 0.8 + elapsed);
          drawCard("별따기 성공!", [
            `별 ${TARGET_STARS}개 수집 완료`,
            `시간: ${elapsed.toFixed(1)}초`,
          ], COL.clear);
          ctx.restore(); return;
        }

        if (mode === "failed") {
          drawTrampoline();
          drawCard("실패", [
            "시간 초과",
            `별: ${starsCollected}개 / 시간: ${elapsed.toFixed(1)}초`,
          ], COL.fail);
          ctx.restore(); return;
        }

        ctx.restore();
      }

      // --- Loop ---
      function frame(ts) {
        const dt = lastTs ? Math.min((ts - lastTs) / 1000, MAX_DT) : FIXED_DT;
        lastTs = ts;
        let remain = dt, steps = 0;
        while (remain >= FIXED_DT && steps < 4) { update(FIXED_DT); remain -= FIXED_DT; steps++; }
        if (remain > 0 && steps < 4) update(remain);
        draw();
        animFrame = requestAnimationFrame(frame);
      }

      // --- Debug / Relay ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: Math.round(elapsed * 10) / 10,
          starsCollected, ballLaunched: ball.launched,
          ballX: Math.round(ball.x), ballY: Math.round(ball.y),
          trampX: Math.round(trampX),
          starsVisible: stars.filter(s => !s.collected).length,
          timeLeft: Math.max(0, Math.round((TIME_LIMIT - elapsed) * 10) / 10),
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; starsCollected = TARGET_STARS; mode = "clear"; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      // --- Init ---
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animFrame));
      resizeCanvas();
      initClouds();
      reportReady();
      draw();
      canvas.focus();
      animFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
