<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Tap</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 8px;
        flex-wrap: nowrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 16px;
        flex: 1 1 0;
        min-width: 56px;
        min-height: 64px;
        padding: 0 8px;
        color: #f8fafc;
        font: 800 20px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-lane="0"] { background: rgba(239, 68, 68, 0.8); }
      .mobile-btn[data-lane="1"] { background: rgba(59, 130, 246, 0.8); }
      .mobile-btn[data-lane="2"] { background: rgba(34, 197, 94, 0.8); }
      .mobile-btn[data-lane="3"] { background: rgba(234, 179, 8, 0.8); }

      .mobile-btn[data-active="true"] {
        transform: scale(0.92);
        filter: brightness(1.3);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 8px;
          padding: 0 8px calc(8px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 6px;
          width: min(100%, 340px);
        }

        .mobile-btn {
          min-width: 48px;
          min-height: 56px;
          border-radius: 14px;
          font-size: 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">Rhythm Tap. 캔버스를 터치하거나 Enter로 시작하세요. PC: D/F/J/K 키로 4개 레인 입력. 모바일: 화면 하단 4개 버튼 터치.</p>
    <canvas id="game" width="960" height="540" aria-label="Rhythm Tap" aria-describedby="stage-instructions" tabindex="0"></canvas>

    <nav class="mobile-controls" aria-label="게임 조작">
      <div class="mobile-controls__row">
        <button class="mobile-btn" data-lane="0" aria-label="레인 1">D</button>
        <button class="mobile-btn" data-lane="1" aria-label="레인 2">F</button>
        <button class="mobile-btn" data-lane="2" aria-label="레인 3">J</button>
        <button class="mobile-btn" data-lane="3" aria-label="레인 4">K</button>
      </div>
    </nav>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("rhythm-tap") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      // Game constants
      const LANE_COUNT = 4;
      const LANE_COLORS = ["#ef4444", "#3b82f6", "#22c55e", "#eab308"];
      const LANE_NAMES = ["D", "F", "J", "K"];
      const JUDGE_Y = 460;
      const NOTE_SPEED = 280;
      const NOTE_HEIGHT = 30;
      const NOTE_WIDTH = 80;
      const PERFECT_WINDOW = 30;
      const GOOD_WINDOW = 60;
      const TIME_LIMIT = 30;
      const CLEAR_SCORE = 500;
      const MAX_CONSECUTIVE_MISS = 3;
      const SPAWN_INTERVAL_MIN = 0.25;
      const SPAWN_INTERVAL_MAX = 0.6;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        score: 0,
        combo: 0,
        maxCombo: 0,
        consecutiveMiss: 0,
        notes: [],
        effects: [],
        nextSpawnTime: 0,
        lanePressed: [false, false, false, false],
        perfectCount: 0,
        goodCount: 0,
        missCount: 0,
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.score = 0;
        state.combo = 0;
        state.maxCombo = 0;
        state.consecutiveMiss = 0;
        state.notes = [];
        state.effects = [];
        state.nextSpawnTime = 0.5;
        state.lanePressed = [false, false, false, false];
        state.perfectCount = 0;
        state.goodCount = 0;
        state.missCount = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function spawnNote() {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        state.notes.push({
          lane,
          y: -NOTE_HEIGHT,
          hit: false,
          missed: false,
        });
      }

      function addEffect(lane, text, color) {
        state.effects.push({
          lane,
          text,
          color,
          life: 0.6,
          maxLife: 0.6,
        });
      }

      function hitLane(lane) {
        if (state.mode !== "running") return;

        let bestNote = null;
        let bestDist = Infinity;

        for (const note of state.notes) {
          if (note.lane !== lane || note.hit || note.missed) continue;
          const dist = Math.abs(note.y - JUDGE_Y);
          if (dist < bestDist) {
            bestDist = dist;
            bestNote = note;
          }
        }

        if (bestNote && bestDist <= GOOD_WINDOW) {
          bestNote.hit = true;
          if (bestDist <= PERFECT_WINDOW) {
            state.score += 50;
            state.combo += 1;
            state.consecutiveMiss = 0;
            state.perfectCount += 1;
            addEffect(lane, "PERFECT!", "#fbbf24");
          } else {
            state.score += 25;
            state.combo += 1;
            state.consecutiveMiss = 0;
            state.goodCount += 1;
            addEffect(lane, "GOOD", "#60a5fa");
          }
          if (state.combo > state.maxCombo) state.maxCombo = state.combo;
          // Combo bonus
          if (state.combo >= 10) state.score += 5;
        }
      }

      function update(dt) {
        if (state.mode !== "running") return;
        state.elapsed += dt;

        // Spawn notes
        if (state.elapsed >= state.nextSpawnTime) {
          spawnNote();
          // Occasionally spawn double notes
          if (Math.random() < 0.2 && state.elapsed > 5) {
            const secondLane = Math.floor(Math.random() * LANE_COUNT);
            if (state.notes.length === 0 || state.notes[state.notes.length - 1].lane !== secondLane) {
              spawnNote();
            }
          }
          const interval = SPAWN_INTERVAL_MIN + Math.random() * (SPAWN_INTERVAL_MAX - SPAWN_INTERVAL_MIN);
          // Speed up note spawning over time
          const speedFactor = Math.max(0.6, 1 - state.elapsed / 60);
          state.nextSpawnTime = state.elapsed + interval * speedFactor;
        }

        // Move notes
        for (const note of state.notes) {
          if (!note.hit && !note.missed) {
            note.y += NOTE_SPEED * dt;

            // Miss detection - note passed below judgment line
            if (note.y > JUDGE_Y + GOOD_WINDOW + 20) {
              note.missed = true;
              state.combo = 0;
              state.consecutiveMiss += 1;
              state.missCount += 1;
              addEffect(note.lane, "MISS", "#ef4444");

              if (state.consecutiveMiss >= MAX_CONSECUTIVE_MISS) {
                failStage("3_consecutive_miss");
                return;
              }
            }
          }
        }

        // Remove old notes
        state.notes = state.notes.filter(n => n.y < VIEW.height + 50 || (!n.hit && !n.missed));

        // Update effects
        for (const effect of state.effects) {
          effect.life -= dt;
        }
        state.effects = state.effects.filter(e => e.life > 0);

        // Time up check
        if (state.elapsed >= TIME_LIMIT) {
          if (state.score >= CLEAR_SCORE) {
            clearStage();
          } else {
            failStage("time_up_score_insufficient");
          }
        }
      }

      function getLaneX(lane) {
        const totalWidth = LANE_COUNT * (NOTE_WIDTH + 20);
        const startX = (VIEW.width - totalWidth) / 2;
        return startX + lane * (NOTE_WIDTH + 20) + 10;
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.92)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardW = Math.min(680, VIEW.width - 40);
        const cardX = (VIEW.width - cardW) / 2;
        const cardY = 72;
        const cardH = 400;

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.beginPath();
        ctx.roundRect(cardX, cardY, cardW, cardH, 16);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(cardX, cardY, cardW, cardH, 16);
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = "700 38px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, cardY + 60);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 20px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, cardY + 110 + index * 36);
        });
        ctx.textAlign = "left";
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        if (state.mode === "menu") {
          renderCard("Rhythm Tap", [
            "노트가 떨어지면 타이밍에 맞춰 탭!",
            "",
            "조작: PC: D/F/J/K 키로 4개 레인 입력 | 모바일: 화면 하단 4개 버튼 터치",
            "클리어: 30초 안에 점수 500점 이상 달성하면 클리어",
            "실패: 3번 연속 Miss하면 실패",
            "",
            "터치 또는 Enter로 시작",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          // Background
          ctx.fillStyle = "#0f172a";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          // Lane backgrounds
          for (let i = 0; i < LANE_COUNT; i++) {
            const x = getLaneX(i);
            ctx.fillStyle = `rgba(${i === 0 ? "239,68,68" : i === 1 ? "59,130,246" : i === 2 ? "34,197,94" : "234,179,8"}, 0.08)`;
            ctx.fillRect(x, 0, NOTE_WIDTH, VIEW.height);

            // Lane dividers
            ctx.strokeStyle = "rgba(248, 250, 252, 0.1)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, VIEW.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + NOTE_WIDTH, 0);
            ctx.lineTo(x + NOTE_WIDTH, VIEW.height);
            ctx.stroke();
          }

          // Judgment line
          ctx.strokeStyle = "rgba(248, 250, 252, 0.7)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(getLaneX(0) - 5, JUDGE_Y);
          ctx.lineTo(getLaneX(LANE_COUNT - 1) + NOTE_WIDTH + 5, JUDGE_Y);
          ctx.stroke();

          // Judgment zone glow
          const glowGrad = ctx.createLinearGradient(0, JUDGE_Y - GOOD_WINDOW, 0, JUDGE_Y + GOOD_WINDOW);
          glowGrad.addColorStop(0, "rgba(248,250,252,0)");
          glowGrad.addColorStop(0.4, "rgba(248,250,252,0.06)");
          glowGrad.addColorStop(0.5, "rgba(248,250,252,0.12)");
          glowGrad.addColorStop(0.6, "rgba(248,250,252,0.06)");
          glowGrad.addColorStop(1, "rgba(248,250,252,0)");
          ctx.fillStyle = glowGrad;
          ctx.fillRect(getLaneX(0) - 5, JUDGE_Y - GOOD_WINDOW, getLaneX(3) + NOTE_WIDTH + 10 - getLaneX(0), GOOD_WINDOW * 2);

          // Lane key labels at judgment line
          for (let i = 0; i < LANE_COUNT; i++) {
            const x = getLaneX(i);
            ctx.fillStyle = state.lanePressed[i] ? LANE_COLORS[i] : "rgba(248,250,252,0.3)";
            ctx.font = "700 18px Trebuchet MS";
            ctx.textAlign = "center";
            ctx.fillText(LANE_NAMES[i], x + NOTE_WIDTH / 2, JUDGE_Y + 30);
          }
          ctx.textAlign = "left";

          // Notes
          for (const note of state.notes) {
            if (note.hit || note.missed) continue;
            const x = getLaneX(note.lane);
            const color = LANE_COLORS[note.lane];

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(x + 2, note.y - NOTE_HEIGHT / 2, NOTE_WIDTH - 4, NOTE_HEIGHT, 8);
            ctx.fill();

            // Note shine
            ctx.fillStyle = "rgba(255,255,255,0.25)";
            ctx.beginPath();
            ctx.roundRect(x + 4, note.y - NOTE_HEIGHT / 2 + 2, NOTE_WIDTH - 8, NOTE_HEIGHT / 3, 4);
            ctx.fill();
          }

          // Effects
          for (const effect of state.effects) {
            const x = getLaneX(effect.lane) + NOTE_WIDTH / 2;
            const alpha = effect.life / effect.maxLife;
            const offsetY = (1 - alpha) * 40;
            ctx.globalAlpha = alpha;
            ctx.fillStyle = effect.color;
            ctx.font = "800 22px Trebuchet MS";
            ctx.textAlign = "center";
            ctx.fillText(effect.text, x, JUDGE_Y - 50 - offsetY);
            ctx.globalAlpha = 1;
          }
          ctx.textAlign = "left";

          // HUD - Score
          ctx.fillStyle = "#f8fafc";
          ctx.font = "700 28px Trebuchet MS";
          ctx.fillText(`${state.score}`, 30, 42);
          ctx.font = "500 16px Trebuchet MS";
          ctx.fillStyle = "rgba(248,250,252,0.6)";
          ctx.fillText(`/ ${CLEAR_SCORE}`, 30 + ctx.measureText(`${state.score}`).width + 6, 42);

          // HUD - Timer
          const timeLeft = Math.max(0, TIME_LIMIT - state.elapsed);
          ctx.fillStyle = timeLeft <= 5 ? "#ef4444" : "#f8fafc";
          ctx.font = "700 28px Trebuchet MS";
          ctx.textAlign = "right";
          ctx.fillText(`${Math.ceil(timeLeft)}s`, VIEW.width - 30, 42);
          ctx.textAlign = "left";

          // HUD - Combo
          if (state.combo >= 2) {
            ctx.fillStyle = "#fbbf24";
            ctx.font = "800 24px Trebuchet MS";
            ctx.textAlign = "center";
            ctx.fillText(`${state.combo} COMBO`, VIEW.width / 2, 42);
            ctx.textAlign = "left";
          }

          // HUD - Consecutive miss warning
          if (state.consecutiveMiss > 0) {
            ctx.fillStyle = state.consecutiveMiss >= 2 ? "#ef4444" : "rgba(239,68,68,0.6)";
            ctx.font = "600 16px Trebuchet MS";
            ctx.fillText(`MISS x${state.consecutiveMiss}`, 30, 68);
          }

          // Score bar
          const barW = 200;
          const barH = 6;
          const barX = (VIEW.width - barW) / 2;
          const barY = VIEW.height - 20;
          const progress = Math.min(1, state.score / CLEAR_SCORE);
          ctx.fillStyle = "rgba(248,250,252,0.15)";
          ctx.beginPath();
          ctx.roundRect(barX, barY, barW, barH, 3);
          ctx.fill();
          ctx.fillStyle = progress >= 1 ? "#22c55e" : "#3b82f6";
          ctx.beginPath();
          ctx.roundRect(barX, barY, barW * progress, barH, 3);
          ctx.fill();

          return;
        }

        if (state.mode === "failed") {
          renderCard("실패!", [
            state.consecutiveMiss >= MAX_CONSECUTIVE_MISS ? "3번 연속 Miss!" : `시간 초과 (${state.score}/${CLEAR_SCORE}점)`,
            "",
            `점수: ${state.score}  |  최대 콤보: ${state.maxCombo}`,
            `Perfect: ${state.perfectCount}  Good: ${state.goodCount}  Miss: ${state.missCount}`,
            "",
            "터치 또는 Enter로 재시작",
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
          renderCard("클리어!", [
            `최종 점수: ${state.score}`,
            "",
            `최대 콤보: ${state.maxCombo}`,
            `Perfect: ${state.perfectCount}  Good: ${state.goodCount}  Miss: ${state.missCount}`,
            "",
            `클리어 시간: ${state.lastRunTime.toFixed(1)}초`,
          ], "#15803d");
          return;
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "canvas 960x540",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          score: state.score,
          combo: state.combo,
          maxCombo: state.maxCombo,
          consecutiveMiss: state.consecutiveMiss,
          activeNotes: state.notes.filter(n => !n.hit && !n.missed).length,
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.repeat) return;

        if (event.key === "Enter") {
          if (state.mode !== "running") {
            event.preventDefault();
            startStage();
          }
          return;
        }

        const keyMap = { d: 0, f: 1, j: 2, k: 3 };
        const lane = keyMap[event.key.toLowerCase()];
        if (lane !== undefined) {
          event.preventDefault();
          if (state.mode !== "running") {
            startStage();
            return;
          }
          state.lanePressed[lane] = true;
          hitLane(lane);
        }
      }

      function onKeyUp(event) {
        const keyMap = { d: 0, f: 1, j: 2, k: 3 };
        const lane = keyMap[event.key.toLowerCase()];
        if (lane !== undefined) {
          state.lanePressed[lane] = false;
        }
      }

      // Mobile button bindings
      document.querySelectorAll(".mobile-btn[data-lane]").forEach(btn => {
        const lane = parseInt(btn.dataset.lane);
        const release = (event) => {
          if (event) event.preventDefault();
          btn.dataset.active = "false";
          state.lanePressed[lane] = false;
        };
        btn.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (state.mode !== "running") {
            startStage();
            return;
          }
          btn.dataset.active = "true";
          state.lanePressed[lane] = true;
          hitLane(lane);
          btn.setPointerCapture?.(event.pointerId);
        });
        btn.addEventListener("pointerup", release);
        btn.addEventListener("pointercancel", release);
        btn.addEventListener("lostpointercapture", release);
      });

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "rhythm-tap",
        title: "Rhythm Tap",
        description: "4개 레인의 노트를 박자에 맞춰 입력하는 리듬 게임",
        creator: "Claude",
        genre: "Rhythm",
        clearCondition: "30초 안에 점수 500점 이상 달성하면 클리어",
        failCondition: "3연속 Miss 또는 제한 시간 내 500점 미만 시 실패",
        controls: "D/F/J/K 키 또는 하단 4버튼 터치",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
