<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>자석 미로</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #E8EEF4; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(60, 80, 120, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 55, 80, 0.92);
        color: #F0F4F8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #E8EEF4; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(60, 80, 120, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">자석 미로. 화면을 터치하여 자석을 배치하세요. 모바일에서는 화면 터치로 자석을 놓습니다. 자력으로 구슬을 목표 지점까지 유도합니다. 구슬 5개를 목표에 넣으면 클리어. 구슬이 벽에 부딪히면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="자석 미로" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "magnet-maze",
        title: "자석 미로",
        description: "자석을 배치해 구슬을 목표로 유도하는 퍼즐 게임",
        creator: "jungcollin",
        genre: "Magnetic puzzle",
        clearCondition: "구슬 5개를 목표에 넣으면 클리어",
        failCondition: "구슬이 벽에 부딪히면 실패",
        controls: "탭으로 자석 배치",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      /* ── Colors ── */
      const COL = {
        bg: "#E8EEF4", bgGrid: "#D0D8E4",
        ball: "#A0A8B8", ballShine: "#D0D8E8", ballDark: "#707888",
        magnetN: "#4080C0", magnetS: "#C04040",
        target: "#50B878", targetLight: "rgba(80,184,120,0.2)",
        wall: "#586878", wallLight: "#788898",
        text: "#2A3850", textLight: "rgba(42,56,80,0.5)",
        accent: "#3868A0",
        clear: "#2A8848", fail: "#A03028",
        field: "rgba(64,128,192,0.08)",
      };

      /* ── Constants ── */
      const DURATION = 40;
      const TARGET = 5;
      const BALL_R = 10;
      const MAGNET_R = 16;
      const MAGNET_FORCE = 4000;
      const TARGET_R = 22;
      const MAX_MAGNETS = 3;
      const FRICTION = 0.97;
      const WALL_MARGIN = 40;

      /* ── State ── */
      let mode = "menu", elapsed = 0, scored = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;
      let particles = [];

      let ball = { x: 0, y: 0, vx: 0, vy: 0 };
      let magnets = [];
      let walls = [];
      let targetPos = { x: 0, y: 0 };
      let magnetPulse = 0;
      let goalPulse = 0;
      let roundNum = 0;

      /* ── Helpers ── */
      function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
      function lerp(a,b,t){ return a+(b-a)*t; }
      function rand(lo,hi){ return lo+Math.random()*(hi-lo); }
      function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1,y2-y1); }

      /* ── Relay Host ── */
      function inRelayHost(){ try{ return window.parent&&window.parent!==window&&window.parent.RelayHost; }catch{ return false; } }
      function reportReady(){ if(inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason){
        if(!inRelayHost()||hostFailedReported) return; hostFailedReported=true;
        window.parent.RelayHost.onStageFailed?.({ stageId:META.id, stageTitle:META.title, reason, durationSec:+elapsed.toFixed(1) });
      }
      function reportCleared(){
        if(!inRelayHost()||hostClearedReported) return; hostClearedReported=true;
        window.parent.RelayHost.onStageCleared?.({ stageId:META.id, stageTitle:META.title, clearCountAfter:relayContext.clearCount+1, durationSec:+elapsed.toFixed(1) });
      }

      /* ── Particles ── */
      function spawnP(x,y,count,color,sz,spd){
        for(let i=0;i<count;i++){
          const a=rand(0,Math.PI*2),s=rand(spd[0],spd[1]);
          particles.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, color, size:rand(sz[0],sz[1]), grav:0 });
        }
      }

      /* ── Level generation ── */
      function generateRound(){
        magnets = [];

        const playL = WALL_MARGIN + 20;
        const playR = W - WALL_MARGIN - 20;
        const playT = WALL_MARGIN + 40;
        const playB = H - WALL_MARGIN - 20;

        // Ball start (left side)
        ball.x = playL + rand(30, 80);
        ball.y = playT + rand(40, playB - playT - 40);
        ball.vx = 0; ball.vy = 0;

        // Target (right side)
        targetPos.x = playR - rand(30, 80);
        targetPos.y = playT + rand(40, playB - playT - 40);

        // Walls (obstacles between ball and target)
        walls = [];
        const wallCount = 2 + Math.min(roundNum, 3);
        for(let i = 0; i < wallCount; i++){
          const wx = lerp(playL + 100, playR - 100, (i + 0.5) / wallCount) + rand(-30, 30);
          const wy = rand(playT + 20, playB - 20);
          const wlen = rand(50, 100);
          const wangle = rand(-0.5, 0.5);
          walls.push({
            x1: wx - Math.cos(wangle) * wlen / 2,
            y1: wy - Math.sin(wangle) * wlen / 2,
            x2: wx + Math.cos(wangle) * wlen / 2,
            y2: wy + Math.sin(wangle) * wlen / 2,
          });
        }
      }

      /* ── Reset ── */
      function reset(){
        elapsed=0; scored=0; shake=0; clearAnim=0; particles=[];
        magnetPulse=0; goalPulse=0; roundNum=0;
        hostFailedReported=false; hostClearedReported=false;
        window.relayStageResult.status="running";
        generateRound();
      }

      /* ── Physics ── */
      function pointToSegDist(px,py,x1,y1,x2,y2){
        const dx=x2-x1, dy=y2-y1;
        const len2=dx*dx+dy*dy;
        if(len2===0) return dist(px,py,x1,y1);
        let t=((px-x1)*dx+(py-y1)*dy)/len2;
        t=clamp(t,0,1);
        return dist(px,py,x1+t*dx,y1+t*dy);
      }

      /* ── Update ── */
      function update(dt){
        if(mode!=="running") return;
        elapsed+=dt;
        magnetPulse+=dt*3;
        goalPulse+=dt*2;

        /* magnetic forces */
        let fx=0, fy=0;
        for(const m of magnets){
          const dx=m.x-ball.x, dy=m.y-ball.y;
          const d=Math.hypot(dx,dy);
          if(d<5) continue;
          const force=MAGNET_FORCE/(d*d);
          fx+=dx/d*force; fy+=dy/d*force;
        }

        ball.vx+=fx*dt; ball.vy+=fy*dt;
        ball.vx*=FRICTION; ball.vy*=FRICTION;
        ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;

        /* wall collision */
        for(const w of walls){
          const d=pointToSegDist(ball.x,ball.y,w.x1,w.y1,w.x2,w.y2);
          if(d<BALL_R+4){
            shake=8;
            spawnP(ball.x,ball.y,reducedMotion?3:8,"#A0A8B8",[2,4],[40,100]);
            mode="failed";
            window.relayStageResult.status="failed"; reportFailed("벽 충돌");
            return;
          }
        }

        /* boundary collision */
        if(ball.x<WALL_MARGIN+BALL_R||ball.x>W-WALL_MARGIN-BALL_R||
           ball.y<WALL_MARGIN+BALL_R||ball.y>H-WALL_MARGIN-BALL_R){
          shake=8;
          spawnP(ball.x,ball.y,reducedMotion?3:8,"#A0A8B8",[2,4],[40,100]);
          mode="failed";
          window.relayStageResult.status="failed"; reportFailed("경계 충돌");
          return;
        }

        /* goal check */
        if(dist(ball.x,ball.y,targetPos.x,targetPos.y)<TARGET_R+BALL_R){
          scored++;
          spawnP(targetPos.x,targetPos.y,reducedMotion?5:15,COL.target,[2,5],[50,120]);
          if(scored>=TARGET){
            mode="clear"; clearAnim=0;
            window.relayStageResult.status="cleared"; reportCleared();
          } else {
            roundNum++;
            generateRound();
          }
        }

        /* particles */
        for(let i=particles.length-1;i>=0;i--){
          const p=particles[i];
          p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.95; p.vy*=0.95; p.life-=dt*2.5;
          if(p.life<=0) particles.splice(i,1);
        }

        shake*=0.9; if(shake<0.3) shake=0;

        if(elapsed>=DURATION){
          mode="failed"; shake=8;
          window.relayStageResult.status="failed"; reportFailed("시간 초과");
        }
      }

      /* ── Draw ── */
      function rrect(c,x,y,w,h,r){
        c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
        c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
        c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
        c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
      }

      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0, sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);

        /* background */
        ctx.fillStyle=COL.bg; ctx.fillRect(0,0,W,H);

        /* grid */
        ctx.strokeStyle=COL.bgGrid; ctx.lineWidth=0.5; ctx.globalAlpha=0.5;
        for(let x=WALL_MARGIN;x<=W-WALL_MARGIN;x+=30){
          ctx.beginPath(); ctx.moveTo(x,WALL_MARGIN); ctx.lineTo(x,H-WALL_MARGIN); ctx.stroke();
        }
        for(let y=WALL_MARGIN;y<=H-WALL_MARGIN;y+=30){
          ctx.beginPath(); ctx.moveTo(WALL_MARGIN,y); ctx.lineTo(W-WALL_MARGIN,y); ctx.stroke();
        }
        ctx.globalAlpha=1;

        /* play area border */
        ctx.strokeStyle=COL.wall; ctx.lineWidth=3;
        ctx.strokeRect(WALL_MARGIN,WALL_MARGIN,W-WALL_MARGIN*2,H-WALL_MARGIN*2);

        /* magnetic field lines */
        if(!reducedMotion){
          for(const m of magnets){
            const pulse=Math.sin(magnetPulse)*0.3+0.7;
            for(let r=20;r<=80;r+=20){
              ctx.beginPath(); ctx.arc(m.x,m.y,r*pulse,0,Math.PI*2);
              ctx.strokeStyle=`rgba(64,128,192,${0.12-r*0.001})`; ctx.lineWidth=1; ctx.stroke();
            }
          }
        }

        /* walls */
        for(const w of walls){
          ctx.beginPath(); ctx.moveTo(w.x1,w.y1); ctx.lineTo(w.x2,w.y2);
          ctx.strokeStyle=COL.wall; ctx.lineWidth=8; ctx.lineCap="round"; ctx.stroke();
          ctx.strokeStyle=COL.wallLight; ctx.lineWidth=4; ctx.stroke();
        }

        /* target */
        const gp=Math.sin(goalPulse)*0.3+0.7;
        ctx.beginPath(); ctx.arc(targetPos.x,targetPos.y,TARGET_R+4*gp,0,Math.PI*2);
        ctx.fillStyle=COL.targetLight; ctx.fill();
        ctx.beginPath(); ctx.arc(targetPos.x,targetPos.y,TARGET_R,0,Math.PI*2);
        ctx.fillStyle=COL.target; ctx.globalAlpha=0.3; ctx.fill(); ctx.globalAlpha=1;
        ctx.strokeStyle=COL.target; ctx.lineWidth=2; ctx.stroke();
        ctx.fillStyle=COL.target; ctx.font='bold 14px sans-serif'; ctx.textAlign="center"; ctx.textBaseline="middle";
        ctx.fillText("●",targetPos.x,targetPos.y);

        /* magnets */
        for(const m of magnets){
          ctx.beginPath(); ctx.arc(m.x,m.y,MAGNET_R,0,Math.PI*2);
          const mg=ctx.createRadialGradient(m.x-3,m.y-3,0,m.x,m.y,MAGNET_R);
          mg.addColorStop(0,"#6AB0E0"); mg.addColorStop(1,COL.magnetN);
          ctx.fillStyle=mg; ctx.fill();
          ctx.strokeStyle="#3060A0"; ctx.lineWidth=2; ctx.stroke();
          ctx.fillStyle="#FFF"; ctx.font='bold 12px sans-serif'; ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText("N",m.x,m.y);
        }

        /* ball */
        ctx.beginPath(); ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);
        const bg=ctx.createRadialGradient(ball.x-3,ball.y-3,0,ball.x,ball.y,BALL_R);
        bg.addColorStop(0,COL.ballShine); bg.addColorStop(0.5,COL.ball); bg.addColorStop(1,COL.ballDark);
        ctx.fillStyle=bg; ctx.fill();
        ctx.strokeStyle=COL.ballDark; ctx.lineWidth=1; ctx.stroke();

        /* particles */
        for(const p of particles){
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);
          ctx.fillStyle=p.color; ctx.globalAlpha=clamp(p.life,0,1); ctx.fill(); ctx.globalAlpha=1;
        }

        /* HUD */
        if(mode==="running") drawHUD();
        ctx.restore();

        if(mode==="menu") drawMenu();
        else if(mode==="clear") drawClear();
        else if(mode==="failed") drawFailed();
      }

      function drawHUD(){
        ctx.fillStyle=COL.text; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.textAlign="left"; ctx.textBaseline="top";
        ctx.fillText(`구슬: ${scored} / ${TARGET}`,10,8);

        ctx.fillStyle=COL.textLight; ctx.font='400 13px "Segoe UI",sans-serif';
        ctx.fillText(`자석: ${magnets.length}/${MAX_MAGNETS}`,10,28);

        const tl=Math.max(0,DURATION-elapsed);
        ctx.fillStyle=tl<10?COL.fail:COL.text; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.textAlign="right";
        ctx.fillText(`${Math.ceil(tl)}초`,W-10,8);
      }

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40), lh=28, ch=50+lines.length*lh+44;
        const cx=CX-cw/2, cy=CY-ch/2;
        ctx.fillStyle="rgba(232,238,244,0.96)"; ctx.beginPath(); rrect(ctx,cx,cy,cw,ch,10); ctx.fill();
        ctx.fillStyle=accent; ctx.fillRect(cx+14,cy,cw-28,3);
        ctx.fillStyle=COL.text; ctx.font='bold 24px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="top";
        ctx.fillText(title,CX,cy+18);
        ctx.font='400 14px "Segoe UI",sans-serif'; ctx.fillStyle="rgba(42,56,80,0.75)";
        for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],CX,cy+52+i*lh);
        ctx.fillStyle="rgba(42,56,80,0.4)"; ctx.font='400 13px "Segoe UI",sans-serif';
        ctx.fillText("TAP 또는 ENTER",CX,cy+ch-22);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(232,238,244,0.5)"; ctx.fillRect(0,0,W,H);
        drawCard("자석 미로",["자석을 배치해 구슬을","목표 지점까지 유도하세요","","조작: 화면 터치로 자석 배치","클리어: 구슬 5개를 목표에 넣기","실패: 구슬이 벽에 부딪히면 실패"],COL.accent);
      }
      function drawClear(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(232,238,244,${clearAnim*0.5})`; ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3) drawCard("퍼즐 클리어!",[`${Math.ceil(elapsed)}초 만에 완료`,`구슬 ${scored}개 유도 성공`],COL.clear);
      }
      function drawFailed(){
        ctx.fillStyle="rgba(60,30,30,0.2)"; ctx.fillRect(0,0,W,H);
        drawCard("실패",["구슬이 벽에 부딪혔습니다",`유도 성공: ${scored} / ${TARGET}`],COL.fail);
      }

      /* ── Input ── */
      function handleStart(){ if(mode==="menu"||mode==="clear"||mode==="failed"){ reset(); mode="running"; } }

      function getCanvasPos(cx,cy){
        const r=canvas.getBoundingClientRect();
        return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) };
      }

      canvas.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if(mode!=="running"){ handleStart(); return; }
        const p=getCanvasPos(e.clientX,e.clientY);
        // Check if tapping near existing magnet to remove it
        for(let i=magnets.length-1;i>=0;i--){
          if(dist(p.x,p.y,magnets[i].x,magnets[i].y)<MAGNET_R+10){
            magnets.splice(i,1);
            return;
          }
        }
        // Place new magnet
        if(magnets.length<MAX_MAGNETS){
          // Don't place on ball or target
          if(dist(p.x,p.y,ball.x,ball.y)>BALL_R+20 &&
             dist(p.x,p.y,targetPos.x,targetPos.y)>TARGET_R+20 &&
             p.x>WALL_MARGIN+10 && p.x<W-WALL_MARGIN-10 &&
             p.y>WALL_MARGIN+10 && p.y<H-WALL_MARGIN-10){
            magnets.push({ x:p.x, y:p.y });
          }
        }
      });

      canvas.addEventListener("keydown",(e)=>{
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); handleStart(); }
      });

      /* ── Game loop ── */
      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){ lastTimestamp=ts; return; }
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT); lastTimestamp=ts;
        let steps=0;
        while(dt>=FIXED_DT&&steps<4){ update(FIXED_DT); dt-=FIXED_DT; steps++; }
        if(dt>0&&steps<4) update(dt);
        draw();
      }

      /* ── Debug ── */
      function renderGameToText(){
        return JSON.stringify({ mode, elapsed:+elapsed.toFixed(1), scored, magnets:magnets.length, ballX:+ball.x.toFixed(0), ballY:+ball.y.toFixed(0), result:window.relayStageResult.status });
      }
      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{
        const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000)));
        for(let i=0;i<steps;i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug={
        forceClear(){ reset(); mode="running"; scored=TARGET; mode="clear"; clearAnim=0; window.relayStageResult.status="cleared"; reportCleared(); draw(); },
        forceFail(){ reset(); mode="running"; mode="failed"; window.relayStageResult.status="failed"; reportFailed("debug_force_fail"); draw(); },
      };

      /* ── Init ── */
      generateRound();
      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
