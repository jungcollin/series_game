<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>봄바람</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #F0F5F0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(120, 160, 120, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 90, 60, 0.92);
        color: #F5FFF5; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F0F5F0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(120, 160, 120, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">봄바람. 화면을 터치하고 드래그하여 따뜻한 바람을 보내세요. 모바일에서는 화면 터치 드래그로 바람을 보냅니다. 얼음을 녹여 숨겨진 씨앗에서 꽃을 피우세요. 꽃 8송이를 피우면 클리어. 시간 내 미달성 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="봄바람" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "spring-thaw",
        title: "봄바람",
        description: "따뜻한 바람으로 얼음을 녹여 꽃을 피우는 게임",
        creator: "jungcollin",
        genre: "Thawing warmth",
        clearCondition: "꽃 8송이를 피우면 클리어",
        failCondition: "시간 내 미달성 시 실패",
        controls: "드래그로 따뜻한 바람 보내기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      /* ── Colors ── */
      const COL = {
        bgTop: "#D8E8F0", bgBot: "#F0F5F0",
        snow: "#E8F0F8", snowDark: "#C0D0E0",
        ice: "#A8D0E8", iceLight: "#C8E4F4",
        ground: "#C8B898", groundDark: "#A09070",
        stem: "#5A9050", stemLight: "#78B068",
        petal: "#F0A0B0", petalDark: "#D87890", petalCenter: "#FFD060",
        wind: "rgba(255,200,160,0.3)", windLine: "rgba(255,180,140,0.5)",
        text: "#3A5040", textLight: "rgba(58,80,64,0.5)",
        accent: "#78A068",
        clear: "#3A8848", fail: "#A04030",
      };

      /* ── Constants ── */
      const DURATION = 40;
      const TARGET = 8;
      const MELT_RATE = 0.8;
      const REFREEZE_RATE = 0.06;
      const WIND_RADIUS = 80;

      /* ── State ── */
      let mode = "menu", elapsed = 0, bloomed = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, clearAnim = 0;
      let particles = [];
      let seeds = [];
      let windX = CX, windY = CY, isDragging = false;
      let windParticles = [];

      /* ── Helpers ── */
      function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
      function lerp(a,b,t){ return a+(b-a)*t; }
      function rand(lo,hi){ return lo+Math.random()*(hi-lo); }
      function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1,y2-y1); }

      /* ── Relay Host ── */
      function inRelayHost(){ try{ return window.parent&&window.parent!==window&&window.parent.RelayHost; }catch{ return false; } }
      function reportReady(){ if(inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason){
        if(!inRelayHost()||hostFailedReported) return; hostFailedReported=true;
        window.parent.RelayHost.onStageFailed?.({ stageId:META.id, stageTitle:META.title, reason, durationSec:+elapsed.toFixed(1) });
      }
      function reportCleared(){
        if(!inRelayHost()||hostClearedReported) return; hostClearedReported=true;
        window.parent.RelayHost.onStageCleared?.({ stageId:META.id, stageTitle:META.title, clearCountAfter:relayContext.clearCount+1, durationSec:+elapsed.toFixed(1) });
      }

      /* ── Generate seeds ── */
      function generateSeeds(){
        seeds = [];
        const cols = 4, rows = 2;
        for(let r=0;r<rows;r++){
          for(let c=0;c<cols;c++){
            seeds.push({
              x: 140 + c * 190 + rand(-30,30),
              y: 200 + r * 160 + rand(-20,20),
              ice: 1, /* 1 = fully frozen, 0 = melted */
              bloomProgress: 0,
              bloomed: false,
              petalAngles: Array.from({length:5},(_,i)=>i*Math.PI*2/5+rand(-0.2,0.2)),
              swayPhase: rand(0,Math.PI*2),
            });
          }
        }
      }

      /* ── Reset ── */
      function reset(){
        elapsed=0; bloomed=0; shake=0; clearAnim=0;
        particles=[]; windParticles=[];
        isDragging=false;
        hostFailedReported=false; hostClearedReported=false;
        window.relayStageResult.status="running";
        generateSeeds();
      }

      /* ── Update ── */
      function update(dt){
        if(mode!=="running") return;
        elapsed+=dt;

        /* update seeds */
        for(const s of seeds){
          if(s.bloomed) { s.swayPhase+=dt; continue; }

          const d = dist(windX,windY,s.x,s.y);
          if(isDragging && d < WIND_RADIUS){
            const power = 1 - d/WIND_RADIUS;
            s.ice -= MELT_RATE * power * dt;
          } else {
            s.ice += REFREEZE_RATE * dt;
          }
          s.ice = clamp(s.ice,0,1);

          if(s.ice <= 0){
            s.bloomProgress += dt * 1.5;
            if(s.bloomProgress >= 1){
              s.bloomed = true;
              s.bloomProgress = 1;
              bloomed++;
              /* bloom particles */
              for(let i=0;i<(reducedMotion?4:10);i++){
                const a=rand(0,Math.PI*2),sp=rand(20,60);
                particles.push({ x:s.x,y:s.y-20, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-30, life:1, color:rand(0,1)>0.5?COL.petal:"#FFE0E8", size:rand(2,5), grav:40 });
              }
              if(bloomed>=TARGET){
                mode="clear"; clearAnim=0;
                window.relayStageResult.status="cleared"; reportCleared();
              }
            }
          }
          s.swayPhase+=dt;
        }

        /* wind particles */
        if(isDragging && !reducedMotion){
          for(let i=0;i<2;i++){
            const a=rand(0,Math.PI*2),r=rand(0,WIND_RADIUS);
            windParticles.push({ x:windX+Math.cos(a)*r, y:windY+Math.sin(a)*r, vx:rand(-20,20), vy:rand(-40,-10), life:1, size:rand(1,3) });
          }
        }
        for(let i=windParticles.length-1;i>=0;i--){
          const p=windParticles[i];
          p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt*2;
          if(p.life<=0) windParticles.splice(i,1);
        }

        /* bloom particles */
        for(let i=particles.length-1;i>=0;i--){
          const p=particles[i];
          p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.grav*dt; p.vx*=0.97; p.life-=dt*1.5;
          if(p.life<=0) particles.splice(i,1);
        }

        shake*=0.9; if(shake<0.3) shake=0;

        if(elapsed>=DURATION){
          mode="failed"; shake=6;
          window.relayStageResult.status="failed"; reportFailed("시간 초과");
        }
      }

      /* ── Draw ── */
      function rrect(c,x,y,w,h,r){
        c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
        c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
        c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
        c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
      }

      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0, sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);

        /* sky gradient */
        const bg=ctx.createLinearGradient(0,0,0,H);
        bg.addColorStop(0,COL.bgTop); bg.addColorStop(1,COL.bgBot);
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

        /* ground */
        ctx.fillStyle=COL.ground;
        ctx.beginPath(); ctx.moveTo(0,H*0.65);
        for(let x=0;x<=W;x+=60) ctx.lineTo(x,H*0.65+Math.sin(x*0.01)*8);
        ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();

        /* snow patches on ground */
        const snowAmount = seeds.reduce((a,s)=>a+s.ice,0)/seeds.length;
        if(snowAmount>0.1){
          ctx.globalAlpha=snowAmount*0.4;
          ctx.fillStyle=COL.snow;
          for(let x=20;x<W;x+=80){
            ctx.beginPath(); ctx.ellipse(x,H*0.65+rand(-5,5),40,8,0,0,Math.PI*2); ctx.fill();
          }
          ctx.globalAlpha=1;
        }

        /* wind effect */
        if(isDragging && mode==="running"){
          ctx.globalAlpha=0.15;
          ctx.beginPath(); ctx.arc(windX,windY,WIND_RADIUS,0,Math.PI*2);
          const wg=ctx.createRadialGradient(windX,windY,0,windX,windY,WIND_RADIUS);
          wg.addColorStop(0,"rgba(255,200,160,0.4)"); wg.addColorStop(1,"rgba(255,200,160,0)");
          ctx.fillStyle=wg; ctx.fill();
          ctx.globalAlpha=1;
        }

        /* wind particles */
        for(const wp of windParticles){
          ctx.beginPath(); ctx.arc(wp.x,wp.y,wp.size*wp.life,0,Math.PI*2);
          ctx.fillStyle=COL.windLine; ctx.globalAlpha=wp.life*0.6; ctx.fill();
        }
        ctx.globalAlpha=1;

        /* seeds / flowers */
        for(const s of seeds) drawSeed(s);

        /* bloom particles */
        for(const p of particles){
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);
          ctx.fillStyle=p.color; ctx.globalAlpha=clamp(p.life,0,1); ctx.fill();
        }
        ctx.globalAlpha=1;

        /* HUD */
        if(mode==="running") drawHUD();
        ctx.restore();

        if(mode==="menu") drawMenu();
        else if(mode==="clear") drawClear();
        else if(mode==="failed") drawFailed();
      }

      function drawSeed(s){
        const baseY = s.y;

        if(s.bloomed || s.bloomProgress > 0){
          /* stem */
          const stemH = 35 * (s.bloomed ? 1 : s.bloomProgress);
          const sway = Math.sin(s.swayPhase*1.5)*3*(s.bloomed?1:s.bloomProgress);
          ctx.strokeStyle=COL.stem; ctx.lineWidth=3; ctx.lineCap="round";
          ctx.beginPath(); ctx.moveTo(s.x,baseY);
          ctx.quadraticCurveTo(s.x+sway,baseY-stemH/2,s.x+sway*0.5,baseY-stemH);
          ctx.stroke();

          /* flower head */
          if(s.bloomProgress > 0.3 || s.bloomed){
            const scale = s.bloomed ? 1 : (s.bloomProgress-0.3)/0.7;
            const fx = s.x+sway*0.5, fy = baseY-stemH;
            /* petals */
            for(const pa of s.petalAngles){
              const px=fx+Math.cos(pa)*10*scale, py=fy+Math.sin(pa)*10*scale;
              ctx.beginPath(); ctx.ellipse(px,py,6*scale,4*scale,pa,0,Math.PI*2);
              ctx.fillStyle=COL.petal; ctx.fill();
            }
            /* center */
            ctx.beginPath(); ctx.arc(fx,fy,4*scale,0,Math.PI*2);
            ctx.fillStyle=COL.petalCenter; ctx.fill();
          }
        }

        /* ice crystal over seed */
        if(s.ice > 0.01 && !s.bloomed){
          const iceR = 20 + s.ice * 8;
          ctx.globalAlpha = s.ice * 0.7;
          ctx.beginPath(); ctx.ellipse(s.x,baseY-10,iceR,iceR*0.7,0,0,Math.PI*2);
          const ig=ctx.createRadialGradient(s.x-3,baseY-13,0,s.x,baseY-10,iceR);
          ig.addColorStop(0,COL.iceLight); ig.addColorStop(1,COL.ice);
          ctx.fillStyle=ig; ctx.fill();

          /* ice crystal lines */
          ctx.strokeStyle="rgba(255,255,255,0.4)"; ctx.lineWidth=1;
          for(let i=0;i<3;i++){
            const a=(i/3)*Math.PI+0.3;
            ctx.beginPath();
            ctx.moveTo(s.x+Math.cos(a)*5,baseY-10+Math.sin(a)*3);
            ctx.lineTo(s.x+Math.cos(a)*iceR*0.6,baseY-10+Math.sin(a)*iceR*0.4);
            ctx.stroke();
          }
          ctx.globalAlpha=1;

          /* seed dot under ice */
          ctx.beginPath(); ctx.arc(s.x,baseY,4,0,Math.PI*2);
          ctx.fillStyle=COL.groundDark; ctx.globalAlpha=0.4; ctx.fill(); ctx.globalAlpha=1;
        }
      }

      function drawHUD(){
        ctx.fillStyle=COL.text; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.textAlign="left"; ctx.textBaseline="top";
        ctx.fillText(`꽃: ${bloomed} / ${TARGET}`,20,14);

        const tl=Math.max(0,DURATION-elapsed);
        ctx.fillStyle=tl<10?COL.fail:COL.text; ctx.font='bold 16px "Segoe UI",sans-serif'; ctx.textAlign="right";
        ctx.fillText(`${Math.ceil(tl)}초`,W-20,14);

        /* progress bar */
        const barX=20, barY=38, barW=W-40, barH=4;
        ctx.fillStyle="rgba(120,160,120,0.2)"; ctx.fillRect(barX,barY,barW,barH);
        const prog=clamp(elapsed/DURATION,0,1);
        ctx.fillStyle=prog>0.75?COL.fail:COL.accent; ctx.fillRect(barX,barY,barW*(1-prog),barH);

        if(!isDragging && elapsed>1){
          ctx.fillStyle=COL.textLight; ctx.font='400 14px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="bottom";
          ctx.fillText("화면을 드래그하여 따뜻한 바람을 보내세요",CX,H-20);
        }
      }

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40), lh=28, ch=50+lines.length*lh+44;
        const cx=CX-cw/2, cy=CY-ch/2;
        ctx.fillStyle="rgba(240,245,240,0.96)"; ctx.beginPath(); rrect(ctx,cx,cy,cw,ch,10); ctx.fill();
        ctx.fillStyle=accent; ctx.fillRect(cx+14,cy,cw-28,3);
        ctx.fillStyle=COL.text; ctx.font='bold 24px "Segoe UI",sans-serif'; ctx.textAlign="center"; ctx.textBaseline="top";
        ctx.fillText(title,CX,cy+18);
        ctx.font='400 14px "Segoe UI",sans-serif'; ctx.fillStyle="rgba(58,80,64,0.75)";
        for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],CX,cy+52+i*lh);
        ctx.fillStyle="rgba(58,80,64,0.4)"; ctx.font='400 13px "Segoe UI",sans-serif';
        ctx.fillText("TAP 또는 ENTER",CX,cy+ch-22);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(240,245,240,0.5)"; ctx.fillRect(0,0,W,H);
        drawCard("봄바람",["따뜻한 바람으로 얼음을 녹여","꽃을 피우세요","","조작: 화면 터치 드래그로 바람 보내기","클리어: 꽃 8송이 피우기","실패: 시간 내 미달성 시 실패"],COL.accent);
      }
      function drawClear(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(240,245,240,${clearAnim*0.5})`; ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3) drawCard("봄이 왔어요!",[`${Math.ceil(elapsed)}초 만에 완료`,`꽃 ${bloomed}송이 만개`],COL.clear);
      }
      function drawFailed(){
        ctx.fillStyle="rgba(60,40,30,0.2)"; ctx.fillRect(0,0,W,H);
        drawCard("실패",["시간 내에 꽃을 피우지 못했습니다",`핀 꽃: ${bloomed} / ${TARGET}`],COL.fail);
      }

      /* ── Input ── */
      function handleStart(){ if(mode==="menu"||mode==="clear"||mode==="failed"){ reset(); mode="running"; } }

      function getCanvasPos(cx,cy){
        const r=canvas.getBoundingClientRect();
        return { x:(cx-r.left)*(W/r.width), y:(cy-r.top)*(H/r.height) };
      }

      canvas.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if(mode!=="running"){ handleStart(); return; }
        isDragging=true;
        const p=getCanvasPos(e.clientX,e.clientY);
        windX=p.x; windY=p.y;
      });
      canvas.addEventListener("pointermove",(e)=>{
        if(!isDragging||mode!=="running") return;
        const p=getCanvasPos(e.clientX,e.clientY);
        windX=p.x; windY=p.y;
      });
      canvas.addEventListener("pointerup",()=>{ isDragging=false; });
      canvas.addEventListener("pointercancel",()=>{ isDragging=false; });
      canvas.addEventListener("keydown",(e)=>{
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); handleStart(); }
      });

      /* ── Game loop ── */
      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){ lastTimestamp=ts; return; }
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT); lastTimestamp=ts;
        let steps=0;
        while(dt>=FIXED_DT&&steps<4){ update(FIXED_DT); dt-=FIXED_DT; steps++; }
        if(dt>0&&steps<4) update(dt);
        draw();
      }

      /* ── Debug ── */
      function renderGameToText(){
        return JSON.stringify({ mode, elapsed:+elapsed.toFixed(1), bloomed, result:window.relayStageResult.status });
      }
      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{
        const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000)));
        for(let i=0;i<steps;i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug={
        forceClear(){ reset(); mode="running"; bloomed=TARGET; mode="clear"; clearAnim=0; window.relayStageResult.status="cleared"; reportCleared(); draw(); },
        forceFail(){ reset(); mode="running"; elapsed=DURATION; mode="failed"; window.relayStageResult.status="failed"; reportFailed("debug_force_fail"); draw(); },
      };

      /* ── Init ── */
      generateSeeds();
      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
