<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>별자리 지도사</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Georgia", "Noto Serif KR", serif;
        background: #141830; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 160, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(20, 24, 48, 0.92);
        color: #e8e0d0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #141830; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 160, 100, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">별자리 지도사. 감시탑 탐조등을 피해 별자리 패턴을 따라 그리세요. 마우스 또는 화면 터치 드래그로 별을 연결합니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 모든 별자리를 완성하면 클리어. 목격 게이지가 가득 차면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="별자리 지도사" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "neon-observatory-debt-auction-witness",
        title: "별자리 지도사",
        description: "감시탑 탐조등을 피해 별자리를 완성하세요.",
        creator: "jungcollin",
        genre: "Stealth tracing",
        clearCondition: "모든 별자리 패턴을 완성하면 클리어",
        failCondition: "목격 게이지가 가득 차면 실패",
        controls: "드래그로 별과 별을 연결, 탐조등을 피해 그늘에서 작업, 모바일에서는 화면 터치와 드래그만으로 플레이 가능",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        sky: "#141830",
        skyLight: "#1c2240",
        star: "#e8e0d0",
        starBright: "#fffff0",
        brass: "#c0a860",
        brassLight: "#d8c888",
        brassDim: "rgba(192, 168, 96, 0.3)",
        searchlight: "rgba(255, 250, 220, 0.12)",
        searchCore: "rgba(255, 250, 220, 0.25)",
        line: "rgba(192, 168, 96, 0.5)",
        lineDone: "rgba(192, 168, 96, 0.8)",
        witness: "#c06040",
        witnessBg: "rgba(192, 96, 64, 0.15)",
        text: "#c8c0b0",
        textDim: "rgba(200, 192, 176, 0.5)",
      };

      // --- Constellation patterns ---
      const PATTERNS = [
        { name: "삼각", stars: [{x:200,y:120},{x:140,y:240},{x:260,y:240}], edges:[[0,1],[1,2],[2,0]] },
        { name: "지팡이", stars: [{x:420,y:100},{x:440,y:200},{x:460,y:300},{x:430,y:400}], edges:[[0,1],[1,2],[2,3]] },
        { name: "왕관", stars: [{x:620,y:200},{x:680,y:120},{x:740,y:160},{x:800,y:100},{x:860,y:200}], edges:[[0,1],[1,2],[2,3],[3,4]] },
        { name: "화살", stars: [{x:300,y:360},{x:380,y:320},{x:460,y:360},{x:380,y:420}], edges:[[0,1],[1,2],[1,3]] },
      ];

      // --- State ---
      const DURATION = 60;
      const MAX_WITNESS = 100;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      let witness = 0;
      let constellations = [];
      let completedCount = 0;
      let searchlights = [];
      let dragging = false;
      let dragFrom = null; // {ci, si}
      let dragX = 0, dragY = 0;
      let cursorX = CX, cursorY = CY;
      let bgStars = [];
      let twinkleTime = 0;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function initBgStars() {
        bgStars = [];
        for (let i = 0; i < 80; i++) {
          bgStars.push({
            x: rand(0, W), y: rand(0, H),
            size: rand(0.5, 2), twinkle: rand(0, Math.PI * 2),
          });
        }
      }

      function initSearchlights() {
        searchlights = [
          { x: 0, y: H, angle: -Math.PI / 3, speed: 0.3, range: 500 },
          { x: W, y: H, angle: -Math.PI * 2 / 3, speed: -0.25, range: 480 },
        ];
        if (progress() > 0.4) {
          searchlights.push({ x: W / 2, y: H + 30, angle: -Math.PI / 2, speed: 0.35, range: 450 });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; witness = 0; completedCount = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        dragging = false; dragFrom = null;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        twinkleTime = 0;

        // Build constellations from patterns
        constellations = PATTERNS.map(p => ({
          name: p.name,
          stars: p.stars.map(s => ({ ...s })),
          edges: p.edges.map(e => [...e]),
          completedEdges: [],
          done: false,
        }));

        initBgStars();
        initSearchlights();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        twinkleTime += dt;

        // Searchlight sweep
        for (const sl of searchlights) {
          sl.angle += sl.speed * dt;
          // Bounce at limits
          if (sl.angle < -Math.PI + 0.2) sl.speed = Math.abs(sl.speed);
          if (sl.angle > -0.2) sl.speed = -Math.abs(sl.speed);
        }

        // Add 3rd searchlight when past 40%
        if (elapsed > DURATION * 0.4 && searchlights.length < 3) {
          searchlights.push({ x: W / 2, y: H + 30, angle: -Math.PI / 2, speed: 0.35, range: 450 });
        }

        // Check if cursor is in searchlight
        let inLight = false;
        for (const sl of searchlights) {
          if (isInSearchlight(cursorX, cursorY, sl)) {
            inLight = true;
            break;
          }
        }

        // Witness gauge: increases when in light AND dragging, decreases slowly otherwise
        if (inLight && dragging) {
          witness += dt * 35;
          flashAlpha = Math.max(flashAlpha, 0.08);
        } else if (inLight) {
          witness += dt * 12;
        } else {
          witness -= dt * 5;
        }
        witness = clamp(witness, 0, MAX_WITNESS);

        // Shake/flash
        shake *= 0.88;
        if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        // Win/lose
        if (witness >= MAX_WITNESS) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("발각");
        } else if (completedCount >= constellations.length) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (elapsed >= DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      function isInSearchlight(px, py, sl) {
        const dx = px - sl.x, dy = py - sl.y;
        const d = Math.hypot(dx, dy);
        if (d > sl.range || d < 20) return false;
        const angle = Math.atan2(dy, dx);
        const diff = Math.abs(normalizeAngle(angle - sl.angle));
        return diff < 0.18;
      }

      function normalizeAngle(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Sky
        ctx.fillStyle = COL.sky;
        ctx.fillRect(0, 0, W, H);

        // Background stars
        drawBgStars();

        // Searchlights
        drawSearchlights();

        // Ground silhouette
        drawGround();

        // Constellations
        drawConstellations();

        // Drag line
        if (dragging && dragFrom) {
          const fromStar = constellations[dragFrom.ci].stars[dragFrom.si];
          ctx.beginPath();
          ctx.moveTo(fromStar.x, fromStar.y);
          ctx.lineTo(dragX, dragY);
          ctx.strokeStyle = COL.line;
          ctx.lineWidth = 2;
          ctx.setLineDash([6, 4]);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // Compass rose (small, bottom-right)
        drawCompass();

        // HUD
        if (mode === "running") drawHUD();

        // Flash
        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(255, 250, 220, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBgStars() {
        for (const s of bgStars) {
          const twinkle = Math.sin(twinkleTime * 1.5 + s.twinkle) * 0.3 + 0.5;
          ctx.fillStyle = COL.star;
          ctx.globalAlpha = twinkle * 0.5;
          ctx.fillRect(s.x, s.y, s.size, s.size);
        }
        ctx.globalAlpha = 1;
      }

      function drawSearchlights() {
        for (const sl of searchlights) {
          ctx.save();
          const spread = 0.14;
          ctx.beginPath();
          ctx.moveTo(sl.x, sl.y);
          ctx.lineTo(
            sl.x + Math.cos(sl.angle - spread) * sl.range,
            sl.y + Math.sin(sl.angle - spread) * sl.range
          );
          ctx.lineTo(
            sl.x + Math.cos(sl.angle + spread) * sl.range,
            sl.y + Math.sin(sl.angle + spread) * sl.range
          );
          ctx.closePath();

          const grad = ctx.createRadialGradient(sl.x, sl.y, 10, sl.x, sl.y, sl.range);
          grad.addColorStop(0, COL.searchCore);
          grad.addColorStop(0.4, COL.searchlight);
          grad.addColorStop(1, "rgba(255, 250, 220, 0)");
          ctx.fillStyle = grad;
          ctx.fill();
          ctx.restore();
        }
      }

      function drawGround() {
        // Hills silhouette
        ctx.fillStyle = "#0c1020";
        ctx.beginPath();
        ctx.moveTo(0, H);
        ctx.lineTo(0, H - 40);
        ctx.quadraticCurveTo(120, H - 70, 240, H - 45);
        ctx.quadraticCurveTo(400, H - 20, 500, H - 55);
        ctx.quadraticCurveTo(650, H - 80, 780, H - 35);
        ctx.quadraticCurveTo(880, H - 20, W, H - 50);
        ctx.lineTo(W, H);
        ctx.closePath();
        ctx.fill();

        // Watchtower silhouettes
        drawTower(0, H, 20);
        drawTower(W, H, 18);
        if (searchlights.length > 2) drawTower(W / 2, H + 30, 16);
      }

      function drawTower(x, baseY, w) {
        ctx.fillStyle = "#0a0e18";
        ctx.fillRect(x - w / 2, baseY - 80, w, 80);
        // Top
        ctx.beginPath();
        ctx.moveTo(x - w, baseY - 80);
        ctx.lineTo(x, baseY - 95);
        ctx.lineTo(x + w, baseY - 80);
        ctx.closePath();
        ctx.fill();
      }

      function drawConstellations() {
        for (const c of constellations) {
          // Completed edges
          for (const e of c.completedEdges) {
            const s1 = c.stars[e[0]], s2 = c.stars[e[1]];
            ctx.beginPath();
            ctx.moveTo(s1.x, s1.y);
            ctx.lineTo(s2.x, s2.y);
            ctx.strokeStyle = COL.lineDone;
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          // Incomplete edges (hint)
          for (const e of c.edges) {
            const done = c.completedEdges.some(ce => (ce[0] === e[0] && ce[1] === e[1]) || (ce[0] === e[1] && ce[1] === e[0]));
            if (done) continue;
            const s1 = c.stars[e[0]], s2 = c.stars[e[1]];
            ctx.beginPath();
            ctx.moveTo(s1.x, s1.y);
            ctx.lineTo(s2.x, s2.y);
            ctx.strokeStyle = "rgba(192, 168, 96, 0.1)";
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
          }

          // Stars
          for (let i = 0; i < c.stars.length; i++) {
            const s = c.stars[i];
            const connected = c.completedEdges.some(e => e[0] === i || e[1] === i);

            // Glow
            ctx.beginPath();
            ctx.arc(s.x, s.y, connected ? 10 : 7, 0, Math.PI * 2);
            ctx.fillStyle = connected ? COL.brassDim : "rgba(232, 224, 208, 0.08)";
            ctx.fill();

            // Star dot
            ctx.beginPath();
            ctx.arc(s.x, s.y, connected ? 4 : 3, 0, Math.PI * 2);
            ctx.fillStyle = connected ? COL.brassLight : COL.star;
            ctx.fill();
          }

          // Done label
          if (c.done) {
            const cx = c.stars.reduce((s, p) => s + p.x, 0) / c.stars.length;
            const cy = c.stars.reduce((s, p) => s + p.y, 0) / c.stars.length;
            ctx.fillStyle = COL.brass;
            ctx.font = `bold 12px Georgia, serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(c.name, cx, cy - 18);
          }
        }
      }

      function drawCompass() {
        const cx = W - 50, cy = H - 50, r = 18;
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.strokeStyle = COL.brass;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
        // N arrow
        ctx.fillStyle = COL.brass;
        ctx.beginPath();
        ctx.moveTo(cx, cy - r + 2);
        ctx.lineTo(cx - 4, cy - 4);
        ctx.lineTo(cx + 4, cy - 4);
        ctx.closePath();
        ctx.fill();
        ctx.font = `9px Georgia, serif`;
        ctx.textAlign = "center";
        ctx.fillText("N", cx, cy - r - 4);
        ctx.restore();
      }

      function drawHUD() {
        // Top-left: completed count
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px Georgia, serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${completedCount} / ${constellations.length}`, 24, 20);

        // Top-right: time
        ctx.textAlign = "right";
        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.fillText(`${Math.ceil(timeLeft)}`, W - 24, 20);

        // Timer bar
        const barW = W - 48, barX = 24, barY = 44;
        ctx.fillStyle = "rgba(200, 192, 176, 0.1)";
        ctx.fillRect(barX, barY, barW, 2);
        ctx.fillStyle = COL.brass;
        ctx.fillRect(barX, barY, barW * (1 - progress()), 2);

        // Witness gauge (bottom center)
        const gaugeW = 120, gaugeH = 6;
        const gx = CX - gaugeW / 2, gy = H - 28;
        ctx.fillStyle = COL.witnessBg;
        ctx.fillRect(gx, gy, gaugeW, gaugeH);
        const wr = witness / MAX_WITNESS;
        ctx.fillStyle = wr > 0.7 ? COL.witness : COL.brass;
        ctx.fillRect(gx, gy, gaugeW * wr, gaugeH);

        // Label
        ctx.fillStyle = COL.textDim;
        ctx.font = `400 11px Georgia, serif`;
        ctx.textAlign = "center";
        ctx.fillText("목격", CX, gy - 6);
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(20, 24, 48, 0.94)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();
        ctx.fillStyle = accent || COL.brass;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);
        ctx.fillStyle = COL.star;
        ctx.font = `bold 22px Georgia, serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);
        ctx.font = `400 14px Georgia, serif`;
        ctx.fillStyle = COL.textDim;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }
        ctx.fillStyle = "rgba(200, 192, 176, 0.3)";
        ctx.font = `400 13px Georgia, serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(20, 24, 48, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("별자리 지도사", [
          "탐조등을 피해 별자리를 따라 그리세요",
          "",
          "조작: 드래그로 별과 별을 연결",
          "클리어: 모든 별자리 완성",
          "실패: 목격 게이지 가득 참",
        ], COL.brass);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(20, 24, 48, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("지도 완성", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `${completedCount}개 별자리 기록`,
          ], COL.brass);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(40, 20, 15, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("발각", [
          witness >= MAX_WITNESS ? "탐조등에 발각되었습니다" : "시간이 다했습니다",
          `완성: ${completedCount} / ${constellations.length}`,
        ], COL.witness);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      function findNearestStar(px, py, maxDist) {
        let best = null, bestD = maxDist;
        for (let ci = 0; ci < constellations.length; ci++) {
          const c = constellations[ci];
          if (c.done) continue;
          for (let si = 0; si < c.stars.length; si++) {
            const s = c.stars[si];
            const d = dist(px, py, s.x, s.y);
            if (d < bestD) {
              bestD = d; best = { ci, si };
            }
          }
        }
        return best;
      }

      function tryConnect(from, to) {
        if (from.ci !== to.ci) return false;
        if (from.si === to.si) return false;
        const c = constellations[from.ci];
        // Check if this edge exists in pattern
        const edgeMatch = c.edges.find(e =>
          (e[0] === from.si && e[1] === to.si) || (e[0] === to.si && e[1] === from.si)
        );
        if (!edgeMatch) return false;
        // Check if already completed
        const already = c.completedEdges.some(e =>
          (e[0] === from.si && e[1] === to.si) || (e[0] === to.si && e[1] === from.si)
        );
        if (already) return false;

        c.completedEdges.push([from.si, to.si]);

        // Check if constellation is complete
        if (c.completedEdges.length === c.edges.length) {
          c.done = true;
          completedCount++;
        }
        return true;
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        cursorX = p.x; cursorY = p.y;
        const star = findNearestStar(p.x, p.y, 30);
        if (star) {
          dragging = true;
          dragFrom = star;
          dragX = p.x; dragY = p.y;
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running") return;
        const p = getCanvasPos(e.clientX, e.clientY);
        cursorX = p.x; cursorY = p.y;
        if (dragging) {
          dragX = p.x; dragY = p.y;
        }
      });

      canvas.addEventListener("pointerup", (e) => {
        if (mode !== "running" || !dragging) { dragging = false; dragFrom = null; return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        const star = findNearestStar(p.x, p.y, 30);
        if (star && dragFrom) {
          tryConnect(dragFrom, star);
        }
        dragging = false;
        dragFrom = null;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          completedCount, witness: +witness.toFixed(1),
          result: window.relayStageResult.status,
          constellations: constellations.length,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          for (const c of constellations) {
            c.completedEdges = c.edges.map(e => [...e]);
            c.done = true;
          }
          completedCount = constellations.length;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          witness = MAX_WITNESS;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      initBgStars();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
