<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>바람개비 마을</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #e8f4e8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 160, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(34, 80, 50, 0.92);
        color: #f0f8f0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #dceedd; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(34, 120, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">바람개비 마을. 스와이프로 바람을 만들어 바람개비를 목표 속도로 회전시키세요. 너무 세게 돌리면 고장납니다. 화면을 스와이프하여 바람을 일으키세요.</p>
    <canvas id="game" width="960" height="540" aria-label="바람개비 마을" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "pinwheel-village",
        title: "바람개비 마을",
        description: "스와이프로 바람을 만들어 바람개비를 목표 속도로 회전시키세요",
        creator: "jungcollin",
        genre: "Rotational speed-matching",
        clearCondition: "바람개비 5개를 목표 속도로 회전",
        failCondition: "시간 초과 또는 바람개비 3개 고장",
        controls: "화면을 스와이프하여 바람을 일으키세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        sky: "#dceedd",
        skyTop: "#a8d8b0",
        grass: "#6db36d",
        grassDark: "#4a8a4a",
        ground: "#c4a86a",
        stem: "#5a7a4a",
        blade1: "#e06040",
        blade2: "#e8a030",
        blade3: "#4090d0",
        blade4: "#d060a0",
        target: "#2a8a4a",
        danger: "#c03030",
        broken: "#888888",
        hud: "#2a5a3a",
        card: "rgba(240, 248, 240, 0.96)",
        accent: "#2a8a4a",
      };

      // --- State ---
      const DURATION = 40;
      const TARGET_COUNT = 5;
      const MAX_BROKEN = 3;
      const PINWHEEL_COUNT = 5;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let clearAnim = 0;

      // Wind
      let windForceX = 0;
      let windForceY = 0;
      let windDecay = 0.92;
      let swipeStart = null;
      let swipeTrail = [];

      // Particles
      let particles = [];
      let leaves = [];

      // Pinwheels
      let pinwheels = [];

      function initPinwheels() {
        pinwheels = [];
        const spacing = W / (PINWHEEL_COUNT + 1);
        const colors = [COL.blade1, COL.blade2, COL.blade3, COL.blade4, COL.blade1];
        for (let i = 0; i < PINWHEEL_COUNT; i++) {
          const targetSpeed = 2 + Math.random() * 3; // rad/s target
          pinwheels.push({
            x: spacing * (i + 1),
            y: H * 0.48 - Math.random() * 30,
            stemH: 120 + Math.random() * 40,
            angle: Math.random() * Math.PI * 2,
            speed: 0, // current rad/s
            targetSpeed: targetSpeed,
            bladeColor: colors[i],
            bladeColor2: colors[(i + 2) % 5],
            radius: 34 + Math.random() * 8,
            matched: false,
            matchTimer: 0,
            broken: false,
            breakAnim: 0,
            wobble: 0,
          });
        }
      }

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawn ---
      function spawnLeaf() {
        if (reducedMotion || leaves.length > 15) return;
        leaves.push({
          x: rand(-20, W + 20),
          y: rand(-20, -5),
          vx: rand(-10, 10),
          vy: rand(20, 50),
          rot: rand(0, Math.PI * 2),
          rotSpeed: rand(-2, 2),
          size: rand(4, 8),
          life: 1,
          color: Math.random() > 0.5 ? "#8ab060" : "#c0a050",
        });
      }

      function spawnWindParticle(x, y, vx, vy) {
        if (reducedMotion) return;
        particles.push({
          x, y, vx: vx * 0.3 + rand(-20, 20), vy: vy * 0.3 + rand(-10, 10),
          life: 1, size: rand(2, 4), color: "rgba(200, 220, 200, 0.6)",
        });
      }

      // --- Reset ---
      function reset() {
        elapsed = 0;
        shake = 0; clearAnim = 0;
        windForceX = 0; windForceY = 0;
        swipeStart = null; swipeTrail = [];
        particles = []; leaves = [];
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        initPinwheels();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Wind decay
        windForceX *= windDecay;
        windForceY *= windDecay;
        if (Math.abs(windForceX) < 0.01) windForceX = 0;
        if (Math.abs(windForceY) < 0.01) windForceY = 0;

        // Update pinwheels
        let matchedCount = 0;
        let brokenCount = 0;
        for (const pw of pinwheels) {
          if (pw.broken) {
            brokenCount++;
            pw.breakAnim = clamp(pw.breakAnim + dt * 2, 0, 1);
            pw.speed *= 0.95;
            continue;
          }
          if (pw.matched) {
            matchedCount++;
            pw.angle += pw.targetSpeed * dt;
            pw.matchTimer += dt;
            continue;
          }

          // Wind effect on pinwheel based on proximity
          const windMag = Math.hypot(windForceX, windForceY);
          const windEffect = windMag * 0.15;
          pw.speed += windEffect * dt * 60;
          pw.speed *= 0.985; // friction

          // Wobble from wind
          pw.wobble = lerp(pw.wobble, windForceX * 0.02, clamp(dt * 5, 0, 1));

          pw.angle += pw.speed * dt;

          // Check if speed matches target (within tolerance)
          const speedDiff = Math.abs(pw.speed - pw.targetSpeed);
          const tolerance = pw.targetSpeed * 0.2;
          if (speedDiff < tolerance && pw.speed > 0.5) {
            pw.matchTimer += dt;
            if (pw.matchTimer > 0.8) {
              pw.matched = true;
              spawnMatchParticles(pw.x, pw.y - pw.stemH);
            }
          } else {
            pw.matchTimer = Math.max(0, pw.matchTimer - dt * 2);
          }

          // Break if too fast
          if (pw.speed > pw.targetSpeed * 2.5) {
            pw.broken = true;
            pw.breakAnim = 0;
            shake = 10;
            spawnBreakParticles(pw.x, pw.y - pw.stemH);
          }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.96; p.vy *= 0.96;
          p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Leaves
        if (Math.random() < 0.03) spawnLeaf();
        for (let i = leaves.length - 1; i >= 0; i--) {
          const l = leaves[i];
          l.x += (l.vx + windForceX * 30) * dt;
          l.y += l.vy * dt;
          l.rot += l.rotSpeed * dt;
          if (l.y > H + 20 || l.x < -40 || l.x > W + 40) leaves.splice(i, 1);
        }

        // Shake decay
        shake *= 0.88;
        if (shake < 0.3) shake = 0;

        // Win/lose
        if (matchedCount >= TARGET_COUNT) {
          mode = "clear";
          clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (brokenCount >= MAX_BROKEN) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("바람개비 고장");
        } else if (elapsed >= DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      function spawnMatchParticles(x, y) {
        for (let i = 0; i < 12; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 100);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, size: rand(3, 6), color: "#4aba6a",
          });
        }
      }

      function spawnBreakParticles(x, y) {
        for (let i = 0; i < 16; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(50, 120);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, size: rand(3, 7), color: "#aa4444",
          });
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        drawBackground();
        drawLeaves();
        drawPinwheels();
        drawParticles();
        drawWindTrail();
        if (mode === "running") drawHUD();

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBackground() {
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#b0dce0");
        grad.addColorStop(0.5, "#dceedd");
        grad.addColorStop(0.75, "#c8e0c0");
        grad.addColorStop(1, COL.grass);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Clouds
        drawCloud(120, 60, 50);
        drawCloud(400, 90, 40);
        drawCloud(700, 45, 55);
        drawCloud(850, 100, 35);

        // Hills
        ctx.fillStyle = "#90c890";
        ctx.beginPath();
        ctx.moveTo(0, H * 0.7);
        ctx.quadraticCurveTo(W * 0.25, H * 0.55, W * 0.5, H * 0.65);
        ctx.quadraticCurveTo(W * 0.75, H * 0.75, W, H * 0.6);
        ctx.lineTo(W, H); ctx.lineTo(0, H);
        ctx.fill();

        // Ground
        ctx.fillStyle = COL.grass;
        ctx.fillRect(0, H * 0.78, W, H * 0.22);

        // Grass line
        ctx.fillStyle = COL.grassDark;
        ctx.fillRect(0, H * 0.78, W, 3);
      }

      function drawCloud(x, y, size) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.beginPath();
        ctx.arc(x, y, size * 0.6, 0, Math.PI * 2);
        ctx.arc(x + size * 0.5, y - size * 0.2, size * 0.5, 0, Math.PI * 2);
        ctx.arc(x + size, y, size * 0.55, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawPinwheels() {
        for (const pw of pinwheels) {
          const topY = pw.y - pw.stemH;

          // Stem with wobble
          ctx.save();
          ctx.translate(pw.x, pw.y);
          ctx.rotate(pw.wobble);
          ctx.translate(-pw.x, -pw.y);

          ctx.strokeStyle = COL.stem;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.moveTo(pw.x, pw.y);
          ctx.lineTo(pw.x, topY);
          ctx.stroke();

          // Target speed indicator (arc below pinwheel)
          if (!pw.matched && !pw.broken) {
            const indicatorY = topY + pw.radius + 14;
            const barW = 50;
            const barH = 6;
            const barX = pw.x - barW / 2;

            // Background bar
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(barX, indicatorY, barW, barH);

            // Target zone
            const targetNorm = pw.targetSpeed / (pw.targetSpeed * 2.5);
            const toleranceNorm = (pw.targetSpeed * 0.2) / (pw.targetSpeed * 2.5);
            const zoneStart = clamp((targetNorm - toleranceNorm) * barW, 0, barW);
            const zoneEnd = clamp((targetNorm + toleranceNorm) * barW, 0, barW);
            ctx.fillStyle = "rgba(42, 138, 74, 0.5)";
            ctx.fillRect(barX + zoneStart, indicatorY, zoneEnd - zoneStart, barH);

            // Current speed marker
            const currentNorm = clamp(pw.speed / (pw.targetSpeed * 2.5), 0, 1);
            const markerX = barX + currentNorm * barW;
            ctx.fillStyle = pw.speed > pw.targetSpeed * 2 ? COL.danger : "#333";
            ctx.beginPath();
            ctx.arc(markerX, indicatorY + barH / 2, 4, 0, Math.PI * 2);
            ctx.fill();
          }

          // Pinwheel blades
          ctx.save();
          ctx.translate(pw.x, topY);
          ctx.rotate(pw.angle);

          if (pw.broken) {
            ctx.globalAlpha = 0.4;
          }

          const r = pw.radius;
          for (let b = 0; b < 4; b++) {
            ctx.save();
            ctx.rotate(b * Math.PI / 2);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(r * 0.2, -r);
            ctx.lineTo(-r * 0.15, -r * 0.3);
            ctx.closePath();
            ctx.fillStyle = b % 2 === 0 ? pw.bladeColor : pw.bladeColor2;
            ctx.fill();
            ctx.restore();
          }

          ctx.globalAlpha = 1;

          // Center dot
          ctx.beginPath();
          ctx.arc(0, 0, 4, 0, Math.PI * 2);
          ctx.fillStyle = pw.broken ? COL.broken : "#fff";
          ctx.fill();
          ctx.strokeStyle = pw.broken ? COL.broken : "#555";
          ctx.lineWidth = 1.5;
          ctx.stroke();

          ctx.restore();

          // Matched indicator
          if (pw.matched) {
            ctx.fillStyle = COL.target;
            ctx.font = "bold 16px Trebuchet MS";
            ctx.textAlign = "center";
            ctx.fillText("✓", pw.x, topY + pw.radius + 28);
          }

          // Broken X
          if (pw.broken) {
            ctx.fillStyle = COL.danger;
            ctx.font = "bold 18px Trebuchet MS";
            ctx.textAlign = "center";
            ctx.fillText("✗", pw.x, topY + pw.radius + 28);
          }

          ctx.restore();
        }
      }

      function drawLeaves() {
        for (const l of leaves) {
          ctx.save();
          ctx.translate(l.x, l.y);
          ctx.rotate(l.rot);
          ctx.fillStyle = l.color;
          ctx.beginPath();
          ctx.ellipse(0, 0, l.size, l.size * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawWindTrail() {
        if (swipeTrail.length < 2) return;
        ctx.strokeStyle = "rgba(180, 220, 200, 0.5)";
        ctx.lineWidth = 3;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(swipeTrail[0].x, swipeTrail[0].y);
        for (let i = 1; i < swipeTrail.length; i++) {
          ctx.lineTo(swipeTrail[i].x, swipeTrail[i].y);
        }
        ctx.stroke();
      }

      function drawHUD() {
        const matched = pinwheels.filter(p => p.matched).length;
        const broken = pinwheels.filter(p => p.broken).length;
        const timeLeft = Math.max(0, DURATION - elapsed);

        // Top-left: matched count
        ctx.fillStyle = COL.hud;
        ctx.font = "600 16px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`완료: ${matched}/${TARGET_COUNT}`, 20, 16);

        // Top-center: broken count
        ctx.textAlign = "center";
        ctx.fillStyle = broken > 0 ? COL.danger : COL.hud;
        ctx.fillText(`고장: ${broken}/${MAX_BROKEN}`, CX, 16);

        // Top-right: time
        ctx.textAlign = "right";
        ctx.fillStyle = timeLeft < 10 ? COL.danger : COL.hud;
        ctx.fillText(`${Math.ceil(timeLeft)}초`, W - 20, 16);

        // Timer bar
        const barW = W - 40;
        const progress = 1 - elapsed / DURATION;
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(20, 38, barW, 3);
        ctx.fillStyle = timeLeft < 10 ? COL.danger : COL.accent;
        ctx.fillRect(20, 38, barW * progress, 3);
      }

      // --- Overlay cards ---
      function roundRect(cx, x, y, w, h, r) {
        cx.beginPath();
        cx.moveTo(x + r, y);
        cx.lineTo(x + w - r, y);
        cx.arcTo(x + w, y, x + w, y + r, r);
        cx.lineTo(x + w, y + h - r);
        cx.arcTo(x + w, y + h, x + w - r, y + h, r);
        cx.lineTo(x + r, y + h);
        cx.arcTo(x, y + h, x, y + h - r, r);
        cx.lineTo(x, y + r);
        cx.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = COL.card;
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.hud;
        ctx.font = "bold 22px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px Trebuchet MS";
        ctx.fillStyle = "rgba(42, 90, 58, 0.75)";
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(42, 90, 58, 0.4)";
        ctx.font = "400 13px Trebuchet MS";
        ctx.fillText("탭 또는 ENTER", CX, cardY + cardH - 20);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(220, 238, 221, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("바람개비 마을", [
          "스와이프로 바람을 일으켜",
          "바람개비를 목표 속도로 돌리세요",
          "",
          "조작: 화면 터치 후 스와이프",
          "클리어: 바람개비 5개 속도 맞추기",
          "실패: 고장 3개 또는 시간 초과",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(220, 238, 221, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("클리어!", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            "모든 바람개비가 돌아갑니다!",
          ], COL.accent);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(100, 60, 60, 0.3)";
        ctx.fillRect(0, 0, W, H);
        const broken = pinwheels.filter(p => p.broken).length;
        drawCard("실패", [
          broken >= MAX_BROKEN ? "바람개비가 너무 많이 고장났습니다" : "시간이 다했습니다",
          `완료: ${pinwheels.filter(p => p.matched).length}/${TARGET_COUNT}`,
        ], COL.danger);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        swipeStart = { x: p.x, y: p.y, time: Date.now() };
        swipeTrail = [{ x: p.x, y: p.y }];
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || !swipeStart) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        swipeTrail.push({ x: p.x, y: p.y });
        if (swipeTrail.length > 20) swipeTrail.shift();

        // Generate wind particles along trail
        if (Math.random() < 0.3) {
          spawnWindParticle(p.x, p.y, p.x - swipeStart.x, p.y - swipeStart.y);
        }
      });

      canvas.addEventListener("pointerup", (e) => {
        if (mode !== "running" || !swipeStart) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        const dx = p.x - swipeStart.x;
        const dy = p.y - swipeStart.y;
        const dt = (Date.now() - swipeStart.time) / 1000;
        const swipeDist = Math.hypot(dx, dy);

        if (swipeDist > 20 && dt > 0.01) {
          const speed = clamp(swipeDist / dt / 800, 0.1, 1.5);
          windForceX = (dx / swipeDist) * speed;
          windForceY = (dy / swipeDist) * speed;
        }

        swipeStart = null;
        swipeTrail = [];
      });

      canvas.addEventListener("pointercancel", () => {
        swipeStart = null;
        swipeTrail = [];
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          matched: pinwheels.filter(p => p.matched).length,
          broken: pinwheels.filter(p => p.broken).length,
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          pinwheels.forEach(p => p.matched = true);
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          for (let i = 0; i < MAX_BROKEN; i++) pinwheels[i].broken = true;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      initPinwheels();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
