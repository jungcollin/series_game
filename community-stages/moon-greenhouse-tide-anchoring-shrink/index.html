<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Greenhouse: Tide Anchor</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 16% 18%, rgba(233, 247, 255, 0.24), transparent 18%),
          radial-gradient(circle at 82% 12%, rgba(104, 255, 206, 0.14), transparent 20%),
          linear-gradient(180deg, #04101a 0%, #071922 38%, #07110f 100%);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(164, 255, 233, 0.16);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(4, 16, 26, 0.9);
        color: #f4fffc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(230, 255, 249, 0.95);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Moon Greenhouse: Tide Anchor. 포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현. 축소 구간 끝까지 버티며 조류 6파를 넘기며 발전기를 지키면 클리어. 안전 영역 밖에 오래 머물거나 중요 화물이 유실되면 즉시 실패. 메뉴와 결과 화면에서도 화면 터치와 드래그만으로 시작과 재시도가 가능합니다.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Moon Greenhouse: Tide Anchor" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      (() => {
        const TITLE = "Moon Greenhouse: Tide Anchor";
        const DESCRIPTION = "예고된 시간 조류를 읽고 닻 버블로 화물과 발전기를 묶어 버티는 월광 온실 생존";
        const CREATOR = "jungcollin";
        const GENRE = "Prediction survival / 축소 아레나";
        const EXACT_CONTROLS =
          "포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
        const EXACT_CLEAR =
          "축소 구간 끝까지 버티며 조류 6파를 넘기며 발전기를 지키면 클리어";
        const EXACT_FAIL = "안전 영역 밖에 오래 머물거나 중요 화물이 유실되면 즉시 실패";

        const canvas = document.querySelector("#game");
        const ctx = canvas.getContext("2d");
        const VIEW = { width: canvas.width, height: canvas.height };
        const CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.53 };
        const FIXED_DT = 1 / 60;
        const MAX_DT = 1 / 20;
        const ARENA_RADIUS = 232;
        const GREENHOUSE_RADIUS = 256;
        const SAFE_RADIUS_START = 212;
        const SAFE_RADIUS_END = 118;
        const PLAYER_RADIUS = 12;
        const CARGO_RADIUS = 18;
        const GENERATOR_RADIUS = 34;
        const MAX_ANCHORS = 2;
        const ANCHOR_RADIUS = 94;
        const PLAYER_MAX_SPEED = 410;
        const PLAYER_ACCEL = 7.2;
        const PLAYER_DAMPING = 0.9;
        const PLAYER_EXPOSURE_LIMIT = 1.18;
        const PLAYER_EDGE_LIMIT = ARENA_RADIUS - 14;
        const CARGO_EDGE_LIMIT = GREENHOUSE_RADIUS - 18;
        const TAP_DISTANCE = 14;
        const SWIPE_DISTANCE = 48;
        const TAP_TIME = 360;
        const SWIPE_TIME = 800;
        const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const relayContext =
          window.RelayRuntime?.readContext("moon-greenhouse-tide-anchoring-shrink") || {
            history: [],
            clearCount: 0,
            previousStageId: null,
          };

        const WAVE_CONFIGS = [
          {
            name: "Lunar East Wash",
            label: "동측 세류",
            forecast: 2.9,
            surge: 3.1,
            targetSafeRadius: 208,
            baseStrength: 120,
            dirAngle: Math.PI,
            lanes: [
              { offset: 0, width: 86, strength: 1 },
              { offset: -116, width: 58, strength: 0.84 },
            ],
          },
          {
            name: "Northglass Fold",
            label: "북측 접힘",
            forecast: 2.8,
            surge: 3.15,
            targetSafeRadius: 194,
            baseStrength: 132,
            dirAngle: Math.PI * 0.72,
            lanes: [
              { offset: 0, width: 82, strength: 1 },
              { offset: 92, width: 54, strength: 0.88 },
            ],
          },
          {
            name: "South Echo",
            label: "남측 반향",
            forecast: 2.75,
            surge: 3.25,
            targetSafeRadius: 178,
            baseStrength: 146,
            dirAngle: -Math.PI * 0.52,
            lanes: [
              { offset: 0, width: 80, strength: 1.02 },
              { offset: -108, width: 60, strength: 0.92 },
              { offset: 108, width: 46, strength: 0.72 },
            ],
          },
          {
            name: "Mirror Shear",
            label: "거울 전단",
            forecast: 2.65,
            surge: 3.35,
            targetSafeRadius: 160,
            baseStrength: 160,
            dirAngle: 0,
            lanes: [
              { offset: 0, width: 78, strength: 1.04 },
              { offset: 104, width: 52, strength: 0.86 },
              { offset: -104, width: 52, strength: 0.86 },
            ],
          },
          {
            name: "Clockbloom Spiral",
            label: "시계화 나선",
            forecast: 2.55,
            surge: 3.45,
            targetSafeRadius: 140,
            baseStrength: 176,
            dirAngle: -Math.PI * 0.88,
            lanes: [
              { offset: 0, width: 76, strength: 1.12 },
              { offset: 78, width: 48, strength: 0.88 },
              { offset: -132, width: 46, strength: 0.92 },
            ],
          },
          {
            name: "Final Moonrush",
            label: "월광 급류",
            forecast: 2.35,
            surge: 3.85,
            targetSafeRadius: SAFE_RADIUS_END,
            baseStrength: 194,
            dirAngle: Math.PI * 0.36,
            lanes: [
              { offset: 0, width: 74, strength: 1.2 },
              { offset: 92, width: 44, strength: 0.96 },
              { offset: -92, width: 44, strength: 0.96 },
              { offset: -150, width: 38, strength: 0.78 },
            ],
          },
        ];

        const staticLeaves = Array.from({ length: 18 }, (_, index) => {
          const angle = (Math.PI * 2 * index) / 18;
          const radius = 248 + (index % 3) * 14;
          return {
            x: CENTER.x + Math.cos(angle) * radius,
            y: CENTER.y + Math.sin(angle) * radius,
            size: 10 + (index % 4) * 6,
            angle,
            drift: 0.45 + (index % 5) * 0.11,
            hue: 130 + (index % 5) * 16,
          };
        });

        const moonMotifs = Array.from({ length: 52 }, (_, index) => ({
          x: 48 + ((index * 151) % (VIEW.width - 96)),
          y: 36 + ((index * 97) % (VIEW.height - 72)),
          r: 0.8 + (index % 5) * 0.7,
          alpha: 0.06 + (index % 7) * 0.018,
          drift: 0.2 + (index % 9) * 0.04,
        }));

        const pointer = {
          x: CENTER.x,
          y: CENTER.y + 90,
          down: false,
          moved: false,
          startX: 0,
          startY: 0,
          startTime: 0,
        };

        let animationFrame = 0;
        let lastTimestamp = 0;
        let hostFailedReported = false;
        let hostClearedReported = false;
        let waveAudioPulse = 0;
        let nextAnchorId = 1;

        const state = {
          mode: "menu",
          waveIndex: 0,
          wavePhase: "forecast",
          phaseTimer: 0,
          elapsed: 0,
          lastRunTime: 0,
          safeRadius: SAFE_RADIUS_START,
          player: createPlayer(),
          cargo: createCargo(),
          generatorShield: 100,
          anchors: [],
          particles: [],
          popups: [],
          trail: [],
          dangerFlash: 0,
          clearFlash: 0,
          shake: 0,
          bloomPulse: 0,
          lastReason: "",
          readyReported: false,
        };

        function createPlayer() {
          return {
            x: CENTER.x - 6,
            y: CENTER.y + 102,
            vx: 0,
            vy: 0,
            exposure: 0,
            glow: 0,
          };
        }

        function createCargo() {
          return {
            x: CENTER.x + 104,
            y: CENTER.y + 22,
            vx: 0,
            vy: 0,
            wobble: 0,
          };
        }

        function clamp(value, min, max) {
          return Math.min(max, Math.max(min, value));
        }

        function lerp(a, b, t) {
          return a + (b - a) * t;
        }

        function easeOutCubic(t) {
          const clamped = clamp(t, 0, 1);
          return 1 - Math.pow(1 - clamped, 3);
        }

        function angleToVector(angle) {
          return { x: Math.cos(angle), y: Math.sin(angle) };
        }

        function length(x, y) {
          return Math.hypot(x, y);
        }

        function distance(a, b) {
          return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function clampPointToCircle(point, radius) {
          const dx = point.x - CENTER.x;
          const dy = point.y - CENTER.y;
          const dist = Math.hypot(dx, dy);
          if (dist <= radius) {
            return { x: point.x, y: point.y };
          }
          const scale = radius / Math.max(dist, 0.001);
          return {
            x: CENTER.x + dx * scale,
            y: CENTER.y + dy * scale,
          };
        }

        function normalize(x, y) {
          const len = Math.hypot(x, y) || 1;
          return { x: x / len, y: y / len };
        }

        function roundedRectPath(x, y, width, height, radius) {
          const r = Math.max(0, Math.min(radius, width * 0.5, height * 0.5));
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + width - r, y);
          ctx.quadraticCurveTo(x + width, y, x + width, y + r);
          ctx.lineTo(x + width, y + height - r);
          ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
          ctx.lineTo(x + r, y + height);
          ctx.quadraticCurveTo(x, y + height, x, y + height - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
        }

        function currentWave() {
          return WAVE_CONFIGS[Math.min(state.waveIndex, WAVE_CONFIGS.length - 1)];
        }

        function inRelayHost() {
          try {
            return window.parent && window.parent !== window && window.parent.RelayHost;
          } catch (error) {
            return false;
          }
        }

        function reportReadyToHost() {
          if (!inRelayHost() || state.readyReported) {
            return;
          }
          state.readyReported = true;
          window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
        }

        function reportFailedToHost(reason = "failed") {
          if (!inRelayHost() || hostFailedReported) {
            return;
          }
          hostFailedReported = true;
          window.parent.RelayHost.onStageFailed?.({
            stageId: window.relayStageMeta.id,
            stageTitle: window.relayStageMeta.title,
            reason,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function reportClearedToHost() {
          if (!inRelayHost() || hostClearedReported) {
            return;
          }
          hostClearedReported = true;
          window.parent.RelayHost.onStageCleared?.({
            stageId: window.relayStageMeta.id,
            stageTitle: window.relayStageMeta.title,
            clearCountAfter: relayContext.clearCount + 1,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function resetRun() {
          state.mode = "running";
          state.waveIndex = 0;
          state.wavePhase = "forecast";
          state.phaseTimer = 0;
          state.elapsed = 0;
          state.lastRunTime = 0;
          state.safeRadius = SAFE_RADIUS_START;
          state.player = createPlayer();
          state.cargo = createCargo();
          state.generatorShield = 100;
          state.anchors = [];
          state.particles = [];
          state.popups = [];
          state.trail = [];
          state.dangerFlash = 0;
          state.clearFlash = 0;
          state.shake = 0;
          state.bloomPulse = 0;
          state.lastReason = "";
          hostFailedReported = false;
          hostClearedReported = false;
          waveAudioPulse = 0;
          pointer.x = state.player.x;
          pointer.y = state.player.y;
          pointer.down = false;
          pointer.moved = false;
          window.relayStageResult.status = "running";
          spawnBurst(CENTER.x, CENTER.y, 24, "rgba(201,255,240,0.7)", 150);
          addPopup("TIDE READ", CENTER.x, CENTER.y - 120, "#dffff7");
        }

        function startOrRestart() {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            resetRun();
          }
        }

        function failStage(reason = "failed") {
          if (state.mode === "failed" || state.mode === "cleared") {
            return;
          }
          state.mode = "failed";
          state.lastRunTime = state.elapsed;
          state.lastReason = reason;
          state.dangerFlash = 1;
          state.shake = Math.max(state.shake, 18);
          window.relayStageResult.status = "failed";
          reportFailedToHost(reason);
        }

        function clearStage() {
          if (state.mode === "failed" || state.mode === "cleared") {
            return;
          }
          state.mode = "cleared";
          state.lastRunTime = state.elapsed;
          state.lastReason = "cleared";
          state.clearFlash = 1;
          state.shake = 0;
          window.relayStageResult.status = "cleared";
          spawnBurst(CENTER.x, CENTER.y, 42, "rgba(227,255,209,0.9)", 210);
          addPopup("GREENHOUSE HELD", CENTER.x, CENTER.y - 118, "#f4ffd8");
          reportClearedToHost();
        }

        function addPopup(text, x, y, color) {
          state.popups.push({
            text,
            x,
            y,
            vy: -20 - Math.random() * 24,
            life: 1,
            color,
          });
        }

        function spawnBurst(x, y, count, color, speed) {
          const total = REDUCED_MOTION ? Math.max(8, Math.floor(count * 0.4)) : count;
          for (let index = 0; index < total; index += 1) {
            const angle = (Math.PI * 2 * index) / total + Math.random() * 0.6;
            const velocity = speed * (0.3 + Math.random() * 0.9);
            state.particles.push({
              x,
              y,
              vx: Math.cos(angle) * velocity,
              vy: Math.sin(angle) * velocity,
              life: 0.5 + Math.random() * 0.6,
              size: 2 + Math.random() * 5,
              color,
            });
          }
        }

        function getCanvasPoint(event) {
          const rect = canvas.getBoundingClientRect();
          const scaleX = VIEW.width / rect.width;
          const scaleY = VIEW.height / rect.height;
          return clampPointToCircle(
            {
              x: (event.clientX - rect.left) * scaleX,
              y: (event.clientY - rect.top) * scaleY,
            },
            GREENHOUSE_RADIUS - 8
          );
        }

        function placeAnchor(x, y) {
          if (state.mode !== "running") {
            return;
          }
          const clamped = clampPointToCircle({ x, y }, ARENA_RADIUS - 20);
          const existingIndex = state.anchors.findIndex(
            (anchor) => Math.hypot(anchor.x - clamped.x, anchor.y - clamped.y) < 34
          );
          if (existingIndex >= 0) {
            state.anchors.splice(existingIndex, 1);
          } else if (state.anchors.length >= MAX_ANCHORS) {
            state.anchors.shift();
          }

          state.anchors.push({
            id: nextAnchorId += 1,
            x: clamped.x,
            y: clamped.y,
            radius: ANCHOR_RADIUS,
            pulse: 1,
          });
          state.shake = Math.max(state.shake, 4);
          state.bloomPulse = 1;
          addPopup("ANCHOR", clamped.x, clamped.y - 18, "#acfff0");
          spawnBurst(clamped.x, clamped.y, 16, "rgba(121,255,224,0.82)", 100);
        }

        function recallAnchors() {
          if (state.mode !== "running" || !state.anchors.length) {
            return;
          }
          state.anchors.forEach((anchor) => {
            spawnBurst(anchor.x, anchor.y, 14, "rgba(212,255,240,0.6)", 86);
          });
          state.anchors = [];
          addPopup("RECALL", CENTER.x, CENTER.y + state.safeRadius + 28, "#ffffff");
          state.shake = Math.max(state.shake, 5);
        }

        function handleTapOrSwipe(dist, elapsedMs) {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startOrRestart();
            return;
          }
          if (state.mode !== "running") {
            return;
          }
          if (dist >= SWIPE_DISTANCE && elapsedMs <= SWIPE_TIME) {
            recallAnchors();
            return;
          }
          if (dist <= TAP_DISTANCE && elapsedMs <= TAP_TIME) {
            placeAnchor(pointer.x, pointer.y);
          }
        }

        function onPointerDown(event) {
          event.preventDefault();
          const point = getCanvasPoint(event);
          pointer.down = true;
          pointer.moved = false;
          pointer.startX = point.x;
          pointer.startY = point.y;
          pointer.startTime = performance.now();
          pointer.x = point.x;
          pointer.y = point.y;
          canvas.focus();
        }

        function onPointerMove(event) {
          const point = getCanvasPoint(event);
          pointer.x = point.x;
          pointer.y = point.y;
          if (pointer.down) {
            if (
              Math.hypot(point.x - pointer.startX, point.y - pointer.startY) > 8
            ) {
              pointer.moved = true;
            }
          }
        }

        function onPointerUp(event) {
          event.preventDefault();
          const point = getCanvasPoint(event);
          pointer.x = point.x;
          pointer.y = point.y;
          const dist = Math.hypot(point.x - pointer.startX, point.y - pointer.startY);
          const elapsedMs = performance.now() - pointer.startTime;
          handleTapOrSwipe(dist, elapsedMs);
          pointer.down = false;
          pointer.moved = false;
        }

        function onPointerCancel() {
          pointer.down = false;
          pointer.moved = false;
        }

        function onKeyDown(event) {
          if (event.key === "Enter") {
            startOrRestart();
          } else if (event.key === " ") {
            event.preventDefault();
            placeAnchor(pointer.x, pointer.y);
          } else if (event.key.toLowerCase() === "r") {
            recallAnchors();
          }
        }

        canvas.addEventListener("pointerdown", onPointerDown);
        canvas.addEventListener("pointermove", onPointerMove);
        canvas.addEventListener("pointerup", onPointerUp);
        canvas.addEventListener("pointercancel", onPointerCancel);
        canvas.addEventListener("contextmenu", (event) => event.preventDefault());
        window.addEventListener("pointerup", () => {
          if (pointer.down) {
            pointer.down = false;
          }
        });
        window.addEventListener("keydown", onKeyDown);
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            pointer.down = false;
          }
        });

        function getWaveVectors(wave) {
          const dir = angleToVector(wave.dirAngle);
          const normal = { x: -dir.y, y: dir.x };
          return { dir, normal };
        }

        function laneInfluence(point, wave) {
          const { dir, normal } = getWaveVectors(wave);
          const relX = point.x - CENTER.x;
          const relY = point.y - CENTER.y;
          const along = relX * dir.x + relY * dir.y;
          const influences = [];
          wave.lanes.forEach((lane) => {
            const across = relX * normal.x + relY * normal.y - lane.offset;
            const halfWidth = lane.width * 0.5;
            if (Math.abs(across) <= halfWidth && Math.abs(along) <= GREENHOUSE_RADIUS + 24) {
              const intensity = (1 - Math.abs(across) / halfWidth) * lane.strength;
              influences.push({
                intensity,
                along,
                across,
              });
            }
          });
          return { dir, normal, influences };
        }

        function isInsideAnyAnchorBubble(point) {
          return state.anchors.some((anchor) => distance(anchor, point) <= anchor.radius);
        }

        function applyWaveForces(entity, radius, dt, isCargo = false) {
          const wave = currentWave();
          if (state.wavePhase !== "surge") {
            return;
          }
          const { dir, influences } = laneInfluence(entity, wave);
          if (!influences.length) {
            return;
          }
          let totalInfluence = influences.reduce((sum, lane) => sum + lane.intensity, 0);
          if (isInsideAnyAnchorBubble(entity)) {
            totalInfluence *= isCargo ? 0.12 : 0.18;
          }
          const strength = wave.baseStrength * totalInfluence;
          entity.vx += dir.x * strength * dt;
          entity.vy += dir.y * strength * dt;
          if (!REDUCED_MOTION && Math.random() < totalInfluence * 0.06) {
            const spreadX = -dir.y * (Math.random() - 0.5) * 48;
            const spreadY = dir.x * (Math.random() - 0.5) * 48;
            state.particles.push({
              x: entity.x + spreadX,
              y: entity.y + spreadY,
              vx: dir.x * 40 + (Math.random() - 0.5) * 30,
              vy: dir.y * 40 + (Math.random() - 0.5) * 30,
              life: 0.32 + Math.random() * 0.22,
              size: 1.5 + Math.random() * 2.5,
              color: "rgba(200,255,248,0.36)",
            });
          }

          state.shake = Math.max(state.shake, clamp(strength * 0.01, 0, 10));
        }

        function applyAnchorFieldToEntity(entity, forceScale, damping, dt) {
          state.anchors.forEach((anchor) => {
            const dx = anchor.x - entity.x;
            const dy = anchor.y - entity.y;
            const dist = Math.hypot(dx, dy);
            if (dist > anchor.radius) {
              return;
            }
            const pull = 1 - dist / anchor.radius;
            const force = forceScale * pull;
            entity.vx += (dx / Math.max(dist, 1)) * force * dt;
            entity.vy += (dy / Math.max(dist, 1)) * force * dt;
            entity.vx *= damping;
            entity.vy *= damping;
          });
        }

        function updatePlayer(dt) {
          const player = state.player;
          const target = clampPointToCircle(pointer, PLAYER_EDGE_LIMIT);
          const dx = target.x - player.x;
          const dy = target.y - player.y;
          const desired = normalize(dx, dy);
          const desiredSpeed = clamp(Math.hypot(dx, dy) * PLAYER_ACCEL, 0, PLAYER_MAX_SPEED);
          player.vx = lerp(player.vx, desired.x * desiredSpeed, clamp(dt * 6, 0, 1));
          player.vy = lerp(player.vy, desired.y * desiredSpeed, clamp(dt * 6, 0, 1));
          applyWaveForces(player, PLAYER_RADIUS, dt, false);
          applyAnchorFieldToEntity(player, 420, 0.94, dt);
          player.vx *= Math.pow(PLAYER_DAMPING, dt * 60);
          player.vy *= Math.pow(PLAYER_DAMPING, dt * 60);
          player.x += player.vx * dt;
          player.y += player.vy * dt;

          const clamped = clampPointToCircle(player, GREENHOUSE_RADIUS - PLAYER_RADIUS - 4);
          if (clamped.x !== player.x || clamped.y !== player.y) {
            player.x = clamped.x;
            player.y = clamped.y;
            player.vx *= 0.6;
            player.vy *= 0.6;
          }

          const safeDist = Math.hypot(player.x - CENTER.x, player.y - CENTER.y);
          if (safeDist > state.safeRadius - PLAYER_RADIUS) {
            player.exposure += dt;
            state.dangerFlash = Math.min(1, state.dangerFlash + dt * 1.4);
          } else {
            player.exposure = Math.max(0, player.exposure - dt * 1.6);
          }

          if (safeDist > GREENHOUSE_RADIUS + 8 || player.exposure >= PLAYER_EXPOSURE_LIMIT) {
            failStage("safe_zone_exposure");
          }
        }

        function updateCargo(dt) {
          const cargo = state.cargo;
          const player = state.player;
          const dxToPlayer = player.x - cargo.x;
          const dyToPlayer = player.y - cargo.y;
          const distToPlayer = Math.hypot(dxToPlayer, dyToPlayer);
          const followStrength = state.wavePhase === "surge" ? 60 : 124;
          const centerReturnStrength = state.wavePhase === "surge" ? 42 : 64;

          if (distToPlayer < 220) {
            cargo.vx += (dxToPlayer / Math.max(distToPlayer, 1)) * followStrength * dt;
            cargo.vy += (dyToPlayer / Math.max(distToPlayer, 1)) * followStrength * dt;
          }

          const centerDx = CENTER.x - cargo.x;
          const centerDy = CENTER.y - cargo.y;
          const centerDist = Math.hypot(centerDx, centerDy);
          cargo.vx += (centerDx / Math.max(centerDist, 1)) * centerReturnStrength * dt;
          cargo.vy += (centerDy / Math.max(centerDist, 1)) * centerReturnStrength * dt;

          applyWaveForces(cargo, CARGO_RADIUS, dt, true);
          applyAnchorFieldToEntity(cargo, 560, 0.91, dt);

          cargo.vx *= Math.pow(0.94, dt * 60);
          cargo.vy *= Math.pow(0.94, dt * 60);
          cargo.x += cargo.vx * dt;
          cargo.y += cargo.vy * dt;
          cargo.wobble += dt * 3.4;

          const cargoDist = Math.hypot(cargo.x - CENTER.x, cargo.y - CENTER.y);
          if (cargoDist > CARGO_EDGE_LIMIT) {
            spawnBurst(cargo.x, cargo.y, 32, "rgba(255,157,120,0.9)", 180);
            failStage("cargo_lost");
          }
        }

        function updateGenerator(dt) {
          const wave = currentWave();
          const generatorPoint = { x: CENTER.x, y: CENTER.y };
          const anchorCover = isInsideAnyAnchorBubble(generatorPoint);
          const centerImpact = laneInfluence(generatorPoint, wave).influences.length;
          if (state.wavePhase === "surge" && centerImpact) {
            if (anchorCover) {
              state.generatorShield = Math.min(100, state.generatorShield + dt * 6);
            } else {
              state.generatorShield -= dt * (7 + state.waveIndex * 4) * centerImpact;
              state.dangerFlash = Math.min(1, state.dangerFlash + dt * 1.1);
              state.shake = Math.max(state.shake, 4 + centerImpact * 2);
              if (Math.random() < 0.12) {
                state.particles.push({
                  x: CENTER.x + (Math.random() - 0.5) * 60,
                  y: CENTER.y + (Math.random() - 0.5) * 60,
                  vx: (Math.random() - 0.5) * 90,
                  vy: (Math.random() - 0.5) * 90,
                  life: 0.35 + Math.random() * 0.3,
                  size: 2 + Math.random() * 4,
                  color: "rgba(255,210,159,0.65)",
                });
              }
            }
          } else if (anchorCover) {
            state.generatorShield = Math.min(100, state.generatorShield + dt * 3.2);
          }

          if (state.generatorShield <= 0) {
            spawnBurst(CENTER.x, CENTER.y, 36, "rgba(255,204,160,0.95)", 220);
            failStage("generator_down");
          }
        }

        function updateWaveState(dt) {
          if (state.mode !== "running") {
            return;
          }
          const wave = currentWave();
          state.phaseTimer += dt;
          state.safeRadius = lerp(
            state.safeRadius,
            wave.targetSafeRadius,
            1 - Math.exp(-dt * 1.8)
          );
          waveAudioPulse += dt * (state.wavePhase === "surge" ? 4.4 : 2.4);

          if (state.wavePhase === "forecast" && state.phaseTimer >= wave.forecast) {
            state.wavePhase = "surge";
            state.phaseTimer = 0;
            state.shake = Math.max(state.shake, 5);
            addPopup("SURGE", CENTER.x, CENTER.y - state.safeRadius - 12, "#ecfff6");
            spawnBurst(CENTER.x, CENTER.y, 20, "rgba(183,255,229,0.66)", 130);
          } else if (state.wavePhase === "surge" && state.phaseTimer >= wave.surge) {
            state.waveIndex += 1;
            if (state.waveIndex >= WAVE_CONFIGS.length) {
              clearStage();
            } else {
              state.wavePhase = "forecast";
              state.phaseTimer = 0;
              state.shake = Math.max(state.shake, 3);
              addPopup(
                `WAVE ${state.waveIndex + 1}`,
                CENTER.x,
                CENTER.y - state.safeRadius - 8,
                "#cbffeb"
              );
            }
          }
        }

        function updateParticles(dt) {
          state.particles = state.particles.filter((particle) => {
            particle.x += particle.vx * dt;
            particle.y += particle.vy * dt;
            particle.vx *= Math.pow(0.92, dt * 60);
            particle.vy *= Math.pow(0.92, dt * 60);
            particle.life -= dt;
            return particle.life > 0;
          });
          state.popups = state.popups.filter((popup) => {
            popup.y += popup.vy * dt;
            popup.life -= dt * 1.15;
            return popup.life > 0;
          });
        }

        function update(dt) {
          if (state.mode === "running") {
            state.elapsed += dt;
            updateWaveState(dt);
            updatePlayer(dt);
            updateCargo(dt);
            updateGenerator(dt);
            updateParticles(dt);
            state.bloomPulse = Math.max(0, state.bloomPulse - dt * 1.8);
            state.dangerFlash = Math.max(0, state.dangerFlash - dt * 0.7);
            state.shake = Math.max(0, state.shake - dt * 18);
          } else {
            updateParticles(dt);
            state.clearFlash = Math.max(0, state.clearFlash - dt * 0.7);
            state.dangerFlash = Math.max(0, state.dangerFlash - dt * 0.9);
          }

          if (state.mode === "running") {
            state.trail.push({
              x: state.player.x,
              y: state.player.y,
              cargoX: state.cargo.x,
              cargoY: state.cargo.y,
              life: 0.46,
            });
          }
          state.trail = state.trail
            .map((entry) => ({ ...entry, life: entry.life - dt }))
            .filter((entry) => entry.life > 0)
            .slice(-18);
        }

        function drawBackground() {
          const background = ctx.createLinearGradient(0, 0, 0, VIEW.height);
          background.addColorStop(0, "#051018");
          background.addColorStop(0.48, "#0b1d24");
          background.addColorStop(1, "#09100e");
          ctx.fillStyle = background;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          moonMotifs.forEach((star) => {
            const flicker = 0.6 + 0.4 * Math.sin(state.elapsed * star.drift + star.x * 0.01);
            ctx.fillStyle = `rgba(218, 244, 255, ${star.alpha * flicker})`;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
            ctx.fill();
          });

          const moonGradient = ctx.createRadialGradient(154, 114, 22, 154, 114, 124);
          moonGradient.addColorStop(0, "rgba(246, 252, 255, 0.95)");
          moonGradient.addColorStop(0.45, "rgba(193, 243, 255, 0.35)");
          moonGradient.addColorStop(1, "rgba(113, 208, 226, 0)");
          ctx.fillStyle = moonGradient;
          ctx.beginPath();
          ctx.arc(154, 114, 124, 0, Math.PI * 2);
          ctx.fill();

          staticLeaves.forEach((leaf, index) => {
            const sway = Math.sin(state.elapsed * leaf.drift + index) * 8;
            ctx.save();
            ctx.translate(leaf.x + sway * 0.4, leaf.y + Math.cos(state.elapsed * leaf.drift) * 6);
            ctx.rotate(leaf.angle + sway * 0.01);
            const leafGradient = ctx.createLinearGradient(
              -leaf.size,
              -leaf.size,
              leaf.size,
              leaf.size
            );
            leafGradient.addColorStop(0, `hsla(${leaf.hue}, 66%, 48%, 0.28)`);
            leafGradient.addColorStop(1, `hsla(${leaf.hue + 18}, 76%, 68%, 0.06)`);
            ctx.fillStyle = leafGradient;
            ctx.beginPath();
            ctx.moveTo(-leaf.size, 0);
            ctx.quadraticCurveTo(0, -leaf.size * 0.78, leaf.size, 0);
            ctx.quadraticCurveTo(0, leaf.size * 0.62, -leaf.size, 0);
            ctx.fill();
            ctx.restore();
          });

          ctx.save();
          ctx.strokeStyle = "rgba(212, 255, 244, 0.08)";
          ctx.lineWidth = 2;
          for (let index = 0; index < 8; index += 1) {
            const angle = (-Math.PI * 0.78) + (index / 7) * Math.PI * 1.56;
            ctx.beginPath();
            ctx.moveTo(CENTER.x, VIEW.height + 48);
            ctx.quadraticCurveTo(
              CENTER.x + Math.cos(angle) * 120,
              140,
              CENTER.x + Math.cos(angle) * (GREENHOUSE_RADIUS + 70),
              CENTER.y + Math.sin(angle) * (GREENHOUSE_RADIUS + 70)
            );
            ctx.stroke();
          }
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, GREENHOUSE_RADIUS + 10, Math.PI * 1.04, Math.PI * 1.96);
          ctx.strokeStyle = "rgba(204, 255, 244, 0.11)";
          ctx.lineWidth = 5;
          ctx.stroke();
          ctx.restore();
        }

        function drawArena() {
          const outer = ctx.createRadialGradient(
            CENTER.x,
            CENTER.y,
            24,
            CENTER.x,
            CENTER.y,
            GREENHOUSE_RADIUS + 20
          );
          outer.addColorStop(0, "rgba(68, 255, 208, 0.06)");
          outer.addColorStop(0.7, "rgba(27, 154, 130, 0.12)");
          outer.addColorStop(1, "rgba(4, 27, 26, 0)");
          ctx.fillStyle = outer;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, GREENHOUSE_RADIUS + 18, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(171, 255, 238, 0.14)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, ARENA_RADIUS + 12, 0, Math.PI * 2);
          ctx.stroke();

          ctx.save();
          ctx.strokeStyle = "rgba(200, 255, 240, 0.11)";
          ctx.setLineDash([4, 18]);
          ctx.lineWidth = 1.5;
          for (let ring = 1; ring <= 4; ring += 1) {
            ctx.beginPath();
            ctx.arc(CENTER.x, CENTER.y, 62 + ring * 40, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();

          const safeGlow = ctx.createRadialGradient(
            CENTER.x,
            CENTER.y,
            state.safeRadius - 22,
            CENTER.x,
            CENTER.y,
            state.safeRadius + 22
          );
          safeGlow.addColorStop(0, "rgba(116, 255, 214, 0)");
          safeGlow.addColorStop(0.72, "rgba(116, 255, 214, 0.12)");
          safeGlow.addColorStop(1, "rgba(116, 255, 214, 0)");
          ctx.fillStyle = safeGlow;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, state.safeRadius + 24, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = `rgba(154, 255, 229, ${0.62 + 0.1 * Math.sin(state.elapsed * 2)})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, state.safeRadius, 0, Math.PI * 2);
          ctx.stroke();
        }

        function drawWaveForecast() {
          if (state.mode !== "running") {
            return;
          }
          const wave = currentWave();
          const { dir, normal } = getWaveVectors(wave);
          const forecastRatio =
            state.wavePhase === "forecast"
              ? clamp(state.phaseTimer / wave.forecast, 0, 1)
              : 1;
          wave.lanes.forEach((lane, laneIndex) => {
            const alpha =
              state.wavePhase === "forecast"
                ? 0.16 + forecastRatio * 0.16
                : 0.1 + 0.15 * Math.sin(waveAudioPulse + laneIndex);
            const laneLength = GREENHOUSE_RADIUS * 2.14;
            const x1 =
              CENTER.x +
              normal.x * lane.offset -
              dir.x * laneLength * 0.5 -
              normal.y * 0;
            const y1 =
              CENTER.y +
              normal.y * lane.offset -
              dir.y * laneLength * 0.5 +
              normal.x * 0;
            const x2 = x1 + dir.x * laneLength;
            const y2 = y1 + dir.y * laneLength;
            const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
            gradient.addColorStop(0, `rgba(147, 255, 233, ${alpha * 0.1})`);
            gradient.addColorStop(0.24, `rgba(183, 255, 238, ${alpha * 0.78})`);
            gradient.addColorStop(0.5, `rgba(245, 254, 255, ${alpha})`);
            gradient.addColorStop(0.76, `rgba(138, 255, 225, ${alpha * 0.68})`);
            gradient.addColorStop(1, `rgba(98, 255, 211, ${alpha * 0.08})`);

            ctx.save();
            ctx.translate(CENTER.x + normal.x * lane.offset, CENTER.y + normal.y * lane.offset);
            ctx.rotate(Math.atan2(dir.y, dir.x));
            ctx.fillStyle = gradient;
            roundedRectPath(-laneLength * 0.5, -lane.width * 0.5, laneLength, lane.width, 24);
            ctx.fill();

            if (state.wavePhase === "forecast") {
              ctx.strokeStyle = `rgba(239, 255, 248, ${0.34 + forecastRatio * 0.18})`;
              ctx.lineWidth = 1.5;
              ctx.setLineDash([10, 14]);
              ctx.beginPath();
              ctx.moveTo(-laneLength * 0.46, 0);
              ctx.lineTo(laneLength * 0.46, 0);
              ctx.stroke();
              ctx.setLineDash([]);
            }

            if (state.wavePhase === "surge") {
              for (let arrow = 0; arrow < 4; arrow += 1) {
                const pulse = ((waveAudioPulse * 70 + arrow * 120) % laneLength) - laneLength * 0.5;
                ctx.fillStyle = "rgba(250, 255, 252, 0.42)";
                ctx.beginPath();
                ctx.moveTo(pulse, 0);
                ctx.lineTo(pulse - 12, -6);
                ctx.lineTo(pulse - 12, 6);
                ctx.closePath();
                ctx.fill();
              }
            }
            ctx.restore();
          });
        }

        function drawAnchors() {
          state.anchors.forEach((anchor) => {
            const pulse = 1 + Math.sin(state.elapsed * 5 + anchor.id) * 0.06 + anchor.pulse * 0.1;
            ctx.save();
            ctx.translate(anchor.x, anchor.y);
            ctx.strokeStyle = "rgba(180, 255, 235, 0.32)";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(0, 0, anchor.radius, 0, Math.PI * 2);
            ctx.stroke();

            const bubble = ctx.createRadialGradient(0, 0, 10, 0, 0, anchor.radius);
            bubble.addColorStop(0, "rgba(180, 255, 244, 0.18)");
            bubble.addColorStop(0.62, "rgba(66, 194, 165, 0.12)");
            bubble.addColorStop(1, "rgba(37, 121, 100, 0)");
            ctx.fillStyle = bubble;
            ctx.beginPath();
            ctx.arc(0, 0, anchor.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.scale(pulse, pulse);
            const anchorGradient = ctx.createLinearGradient(-16, -16, 16, 16);
            anchorGradient.addColorStop(0, "#fbfffe");
            anchorGradient.addColorStop(1, "#73ffd3");
            ctx.fillStyle = anchorGradient;
            ctx.beginPath();
            ctx.moveTo(0, -18);
            ctx.lineTo(14, 0);
            ctx.lineTo(0, 18);
            ctx.lineTo(-14, 0);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "rgba(4, 35, 24, 0.56)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
            anchor.pulse = Math.max(0, anchor.pulse - 0.025);
          });
        }

        function drawGenerator() {
          ctx.save();
          ctx.translate(CENTER.x, CENTER.y);
          const core = ctx.createRadialGradient(0, 0, 6, 0, 0, 56);
          core.addColorStop(0, "rgba(255, 254, 248, 0.96)");
          core.addColorStop(0.26, "rgba(224, 255, 169, 0.92)");
          core.addColorStop(0.58, "rgba(111, 255, 169, 0.34)");
          core.addColorStop(1, "rgba(111, 255, 169, 0)");
          ctx.fillStyle = core;
          ctx.beginPath();
          ctx.arc(0, 0, 56 + state.bloomPulse * 12, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(208, 255, 237, 0.52)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(0, 0, GENERATOR_RADIUS, 0, Math.PI * 2);
          ctx.stroke();

          ctx.save();
          ctx.rotate(state.elapsed * 0.6);
          for (let arm = 0; arm < 4; arm += 1) {
            ctx.rotate(Math.PI * 0.5);
            ctx.fillStyle = "rgba(207, 255, 232, 0.44)";
            roundedRectPath(18, -4, 22, 8, 4);
            ctx.fill();
          }
          ctx.restore();

          ctx.fillStyle = "#f7fff5";
          ctx.beginPath();
          ctx.arc(0, 0, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawTrail() {
          state.trail.forEach((entry) => {
            ctx.fillStyle = `rgba(160, 255, 233, ${entry.life * 0.13})`;
            ctx.beginPath();
            ctx.arc(entry.x, entry.y, PLAYER_RADIUS * entry.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = `rgba(255, 224, 176, ${entry.life * 0.09})`;
            ctx.beginPath();
            ctx.arc(entry.cargoX, entry.cargoY, CARGO_RADIUS * 0.8 * entry.life, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        function drawPlayer() {
          const player = state.player;
          ctx.save();
          ctx.translate(player.x, player.y);
          ctx.rotate(Math.atan2(player.vy, player.vx || 0.001) + Math.PI * 0.4);
          const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, 32);
          glow.addColorStop(0, "rgba(245, 255, 253, 0.92)");
          glow.addColorStop(0.4, "rgba(156, 255, 223, 0.42)");
          glow.addColorStop(1, "rgba(68, 255, 210, 0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, 30, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#effff8";
          ctx.beginPath();
          ctx.moveTo(18, 0);
          ctx.quadraticCurveTo(2, -13, -14, 0);
          ctx.quadraticCurveTo(1, 13, 18, 0);
          ctx.fill();
          ctx.fillStyle = "#79ffd2";
          ctx.beginPath();
          ctx.arc(-2, 0, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          if (player.exposure > 0) {
            ctx.strokeStyle = `rgba(255, 144, 125, ${0.3 + player.exposure * 0.5})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(
              player.x,
              player.y,
              18 + Math.sin(state.elapsed * 9) * 2,
              0,
              Math.PI * 2
            );
            ctx.stroke();
          }
        }

        function drawCargo() {
          const cargo = state.cargo;
          ctx.save();
          ctx.translate(cargo.x, cargo.y);
          ctx.rotate(Math.sin(cargo.wobble) * 0.16);
          const pod = ctx.createLinearGradient(-22, -18, 22, 18);
          pod.addColorStop(0, "#fff7e7");

        function drawPointer() {
          if (state.mode !== "running") {
            return;
          }
          ctx.save();
          ctx.translate(pointer.x, pointer.y);
          ctx.strokeStyle = "rgba(231, 255, 248, 0.74)";
          ctx.lineWidth = 1.6;

          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(-18, 0);

          ctx.moveTo(8, 0);
          ctx.lineTo(18, 0);

          ctx.lineTo(0, -8);

        }

        function drawParticles() {
          state.particles.forEach((particle) => {
            ctx.fillStyle = particle.color.replace(
              /[\d.]+\)$/,
              `${clamp(particle.life, 0, 1)})`
            );

            ctx.fill();
          });
        }

        function drawHud() {
          const wave = currentWave();
          const countdown =
            state.mode === "running"
              ? Math.max(
                  0,
                  (state.wavePhase === "forecast" ? wave.forecast : wave.surge) - state.phaseTimer
                )
              : 0;

          ctx.save();
          ctx.fillStyle = "rgba(5, 20, 24, 0.7)";
          roundedRectPath(20, 18, 246, 86, 24);
          ctx.fill();
          roundedRectPath(VIEW.width - 252, 18, 232, 86, 24);
          ctx.fill();
          roundedRectPath(322, 18, 316, 72, 24);
          ctx.fill();

          ctx.fillStyle = "#d9fff4";
          ctx.font = '700 15px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillText("Moon Greenhouse", 36, 44);
          ctx.font = '600 13px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillStyle = "rgba(219,255,244,0.82)";
          ctx.fillText(`Wave ${Math.min(state.waveIndex + 1, 6)} / 6`, 36, 67);
          ctx.fillText(
            `닻 ${state.anchors.length}/${MAX_ANCHORS} · ${state.wavePhase === "forecast" ? "예측" : "급류"}`,
            36,
            88
          );

          ctx.textAlign = "center";
          ctx.font = '700 13px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillStyle = "rgba(216,255,244,0.78)";
          ctx.fillText(
            state.mode === "running" ? wave.label : "Moon Greenhouse",
            VIEW.width * 0.5,
            42
          );
          ctx.font = '700 22px "Iowan Old Style", "Times New Roman", serif';
          ctx.fillStyle = "#f1fff8";
          ctx.fillText(
            state.mode === "running"
              ? `${state.wavePhase === "forecast" ? "충돌까지" : "급류 종료"} ${countdown.toFixed(1)}s`
              : TITLE,
            VIEW.width * 0.5,
            69
          );
          ctx.textAlign = "left";

          ctx.fillStyle = "#d9fff4";
          ctx.font = '700 15px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillText("Generator Shield", VIEW.width - 234, 44);
          ctx.fillStyle = "rgba(219,255,244,0.82)";
          ctx.font = '700 24px "Iowan Old Style", "Times New Roman", serif';
          ctx.fillText(`${Math.max(0, Math.round(state.generatorShield))}%`, VIEW.width - 234, 74);
          ctx.fillStyle = "rgba(255,255,255,0.12)";
          roundedRectPath(VIEW.width - 234, 82, 180, 10, 5);
          ctx.fill();
          const shieldGradient = ctx.createLinearGradient(VIEW.width - 234, 82, VIEW.width - 54, 82);
          shieldGradient.addColorStop(0, "#91ffca");
          shieldGradient.addColorStop(0.5, "#eaff8c");
          shieldGradient.addColorStop(1, "#fff0a0");
          ctx.fillStyle = shieldGradient;
          roundedRectPath(
            VIEW.width - 234,
            82,
            180 * clamp(state.generatorShield / 100, 0, 1),
            10,
            5
          );
          ctx.fill();

          ctx.fillStyle = "rgba(8, 26, 25, 0.58)";
          roundedRectPath(20, VIEW.height - 66, 352, 34, 17);
          ctx.fill();
          ctx.fillStyle = "rgba(227,255,246,0.86)";
          ctx.font = '600 13px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillText("탭 발사 · 스와이프 회수 · 중심 통로는 후반까지 비워두기", 34, VIEW.height - 44);
          ctx.restore();
        }

        function drawOverlay() {
          if (state.mode === "running") {
            return;
          }

          const panelWidth = 420;
          const panelHeight = state.mode === "menu" ? 290 : 250;
          const panelX = VIEW.width * 0.5 - panelWidth * 0.5;
          const panelY = VIEW.height * 0.5 - panelHeight * 0.5;

          ctx.save();
          ctx.fillStyle = "rgba(2, 10, 14, 0.58)";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          const panel = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelHeight);
          panel.addColorStop(0, "rgba(12, 31, 35, 0.92)");
          panel.addColorStop(1, "rgba(6, 18, 22, 0.94)");
          ctx.fillStyle = panel;
          roundedRectPath(panelX, panelY, panelWidth, panelHeight, 28);
          ctx.fill();
          ctx.strokeStyle = "rgba(198, 255, 240, 0.2)";
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.fillStyle = "#d5fff1";
          ctx.font = '700 16px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillText("월광 온실 / Time Tide Relay", panelX + 28, panelY + 40);
          ctx.font = '700 34px "Iowan Old Style", "Times New Roman", serif';
          ctx.fillStyle = "#f7fff8";
          ctx.fillText(
            state.mode === "menu"
              ? "Moon Greenhouse"
              : state.mode === "cleared"
                ? "Anchor Held"
                : "Glassline Lost",
            panelX + 28,
            panelY + 86
          );
          ctx.font = '700 18px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillStyle = "rgba(233,255,246,0.84)";
          ctx.fillText(
            state.mode === "menu"
              ? "예고선에 맞춰 닻 버블을 깔고 화물과 발전기를 함께 지켜내세요."
              : state.mode === "cleared"
                ? "조류 6파를 넘기고 축소 구간 끝까지 버텼습니다."
                : state.lastReason === "cargo_lost"
                  ? "중요 화물이 급류에 유실되었습니다."
                  : state.lastReason === "generator_down"
                    ? "발전기가 버티지 못했습니다."
                    : "안전 영역 밖 노출이 한계를 넘었습니다.",
            panelX + 28,
            panelY + 118
          );

          ctx.font = '600 14px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillStyle = "rgba(220,255,244,0.84)";
          if (state.mode === "menu") {
            const lines = [
              "드래그로 이동 유도, 탭으로 닻 버블 배치, 빠른 스와이프로 회수",
              "예측선이 지나갈 자리에 닻을 깔아 발전기와 화물을 동시에 감싸기",
              "후반엔 안전권이 줄어드니 중심 복귀 통로를 남겨두기",
            ];
            lines.forEach((line, index) => {
              ctx.fillText(line, panelX + 28, panelY + 160 + index * 28);
            });
            ctx.fillStyle = "rgba(242,255,251,0.94)";
            ctx.font = '700 15px "Avenir Next", "Segoe UI", sans-serif';
            ctx.fillText("화면 터치 또는 클릭으로 시작", panelX + 28, panelY + 250);
          } else {
            ctx.fillText(`생존 시간 ${state.lastRunTime.toFixed(1)}초`, panelX + 28, panelY + 162);
            ctx.fillText(`발전기 ${Math.max(0, Math.round(state.generatorShield))}% 유지`, panelX + 28, panelY + 190);
            ctx.fillStyle = "rgba(242,255,251,0.94)";
            ctx.font = '700 15px "Avenir Next", "Segoe UI", sans-serif';
            ctx.fillText("화면 터치 또는 클릭으로 재시도", panelX + 28, panelY + 224);
          }
          ctx.restore();
        }

        function drawPopups() {
          ctx.save();
          ctx.textAlign = "center";
          state.popups.forEach((popup) => {
            ctx.fillStyle = popup.color.replace(/[\d.]+\)$/, `${popup.life})`);
            ctx.font = '700 16px "Avenir Next", "Segoe UI", sans-serif';
            ctx.fillText(popup.text, popup.x, popup.y);
          });
          ctx.textAlign = "left";
          ctx.restore();
        }

        function drawVignette() {
          const vignette = ctx.createRadialGradient(
            CENTER.x,
            CENTER.y,
            120,
            CENTER.x,
            CENTER.y,
            VIEW.height * 0.7
          );
          vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
          vignette.addColorStop(
            1,
            `rgba(5, 9, 10, ${0.22 + state.dangerFlash * 0.28 + state.clearFlash * 0.12})`
          );
          ctx.fillStyle = vignette;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          if (state.dangerFlash > 0.02) {
            ctx.fillStyle = `rgba(255, 110, 90, ${state.dangerFlash * 0.08})`;
            ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          }
          if (state.clearFlash > 0.02) {
            ctx.fillStyle = `rgba(191, 255, 184, ${state.clearFlash * 0.12})`;
            ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          }
        }

        function render() {
          const shakeX = (Math.random() - 0.5) * state.shake;
          const shakeY = (Math.random() - 0.5) * state.shake;
          ctx.save();
          ctx.clearRect(0, 0, VIEW.width, VIEW.height);
          ctx.translate(shakeX, shakeY);
          drawBackground();
          drawArena();
          drawWaveForecast();
          drawTrail();
          drawAnchors();
          drawGenerator();
          drawCargo();
          drawPlayer();
          drawPointer();
          drawParticles();
          drawHud();
          drawPopups();
          drawOverlay();
          drawVignette();
          ctx.restore();
        }

        function frame(timestamp) {
          const minFrameGap = document.hidden ? 220 : state.mode === "running" ? 16 : 34;
          if (lastTimestamp && timestamp - lastTimestamp < minFrameGap) {
            animationFrame = window.requestAnimationFrame(frame);
            return;
          }
          if (!lastTimestamp) {
            lastTimestamp = timestamp;
          }
          const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
          lastTimestamp = timestamp;
          update(delta);
          render();
          animationFrame = window.requestAnimationFrame(frame);
        }

        window.render_game_to_text = () =>
          JSON.stringify({
            mode: state.mode,
            phase: state.wavePhase,
            wave: Math.min(state.waveIndex + 1, WAVE_CONFIGS.length),
            elapsed: Number(state.elapsed.toFixed(2)),
            safeRadius: Number(state.safeRadius.toFixed(1)),
            player: {
              x: Number(state.player.x.toFixed(1)),
              y: Number(state.player.y.toFixed(1)),
              exposure: Number(state.player.exposure.toFixed(2)),
            },
            cargo: {
              x: Number(state.cargo.x.toFixed(1)),
              y: Number(state.cargo.y.toFixed(1)),
              distFromCenter: Number(distance(state.cargo, CENTER).toFixed(1)),
              anchored: isInsideAnyAnchorBubble(state.cargo),
            },
            generator: {
              shield: Number(state.generatorShield.toFixed(1)),
              anchored: isInsideAnyAnchorBubble(CENTER),
            },
            anchors: state.anchors.map((anchor) => ({
              x: Number(anchor.x.toFixed(1)),
              y: Number(anchor.y.toFixed(1)),
              radius: anchor.radius,
            })),
            tide: {
              label: currentWave().label,
              countdown: Number(
                Math.max(
                  0,
                  (state.wavePhase === "forecast" ? currentWave().forecast : currentWave().surge) -
                    state.phaseTimer
                ).toFixed(2)
              ),
            },
            note: "origin=centered arena in a 960x540 canvas, x increases right and y increases down",
          });

        window.advanceTime = (ms) => {
          const steps = Math.max(1, Math.round(ms / (1000 / 60)));
          for (let index = 0; index < steps; index += 1) {
            update(FIXED_DT);
          }
          render();
          return window.render_game_to_text();
        };

        window.relayStageMeta = {
          id: "moon-greenhouse-tide-anchoring-shrink",
          title: TITLE,
          creator: CREATOR,
          genre: GENRE,
          clearCondition: EXACT_CLEAR,
        };

        window.relayStageResult = { status: "running" };
        window.relayStageDebug = {
          forceClear() {
            if (state.mode !== "running") {
              resetRun();
            }
            clearStage();
          },
          forceFail() {
            if (state.mode !== "running") {
              resetRun();
            }
            failStage("debug_force_fail");
          },
        };

        reportReadyToHost();
        render();
        animationFrame = window.requestAnimationFrame(frame);

        window.addEventListener("beforeunload", () => {
          if (animationFrame) {
            window.cancelAnimationFrame(animationFrame);
          }
        });
      })();
    </script>
  </body>
</html>
