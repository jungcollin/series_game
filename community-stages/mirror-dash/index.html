<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ъ▒░ьЪ╕ ыМАьЛЬ</title>
    <style>
      :root {
        color-scheme: light;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%); border-radius: 999px;
        background: rgba(15, 23, 42, 0.92); color: #f8fafc; font-weight: 800;
        text-decoration: none; white-space: nowrap; transition: transform 0.15s ease;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px; overflow: visible;
        clip: auto; clip-path: none; transform: translateY(0);
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%; background: #0f172a;
        touch-action: manipulation;
      }
      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9); outline-offset: -8px;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">ъ▓МьЮД ь║Фы▓ДьКдыбЬ ъ▒┤ыДИыЫ░ъ╕░</a>
    <p id="stage-instructions" class="sr-only">ъ▒░ьЪ╕ ыМАьЛЬ. эЩФый┤ эД░ь╣Ш/эБ┤ыжньЛЬ ьаРэФД. 20ь┤Иъ░Д ьГБэХШ ыМАь╣ньЬ╝ыбЬ ьЫАьзБьЭ┤ый░ ьГЭьб┤эХШьД╕ьЪФ.</p>
    <canvas id="game" width="960" height="540" aria-label="ъ▒░ьЪ╕ ыМАьЛЬ" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("mirror-dash") || {
        history: [], clearCount: 0, previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const GAME_DURATION = 20;
      const GRAVITY = 2500;
      const JUMP_VELOCITY = -800;
      const SPEED = 450;
      const PLAYER_SIZE = 40;
      const CENTER_Y = VIEW.height / 2;

      const state = {
        mode: "menu", elapsed: 0, lastRunTime: 0,
        note: "ъ▒░ьЪ╕ь▓ШыЯ╝ ьГБэХШъ░А ы░ШьаДыРЬ ъ│╡ъ░ДьЧРьДЬ ыПЩьЛЬьЧР ьаРэФДэХШый░ ьЮеьХаым╝ьЭД эФ╝эХШьД╕ьЪФ.",
        topPlayer: { y: CENTER_Y - PLAYER_SIZE, vy: 0, grounded: true },
        bottomPlayer: { y: CENTER_Y, vy: 0, grounded: true },
        obstacles: [],
        particles: [],
        lastObstacleTime: 0,
        shakeTime: 0
      };

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch (error) { return false; }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id, stageTitle: window.relayStageMeta.title,
          reason, durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id, stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1, durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function createParticles(x, y, color) {
          for (let i = 0; i < 15; i++) {
              state.particles.push({
                  x: x,
                  y: y,
                  vx: (Math.random() - 0.5) * 400,
                  vy: (Math.random() - 0.5) * 400,
                  life: 1.0,
                  color: color
              });
          }
      }

      function startStage() {
        state.mode = "running"; state.elapsed = 0; state.lastRunTime = 0;
        state.topPlayer = { y: CENTER_Y - PLAYER_SIZE, vy: 0, grounded: true };
        state.bottomPlayer = { y: CENTER_Y, vy: 0, grounded: true };
        state.obstacles = [];
        state.particles = [];
        state.lastObstacleTime = 0;
        state.shakeTime = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false; hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed"; state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed"; reportFailedToHost(reason);
        createParticles(200 + PLAYER_SIZE / 2, state.topPlayer.y + PLAYER_SIZE / 2, '#22d3ee');
        createParticles(200 + PLAYER_SIZE / 2, state.bottomPlayer.y + PLAYER_SIZE / 2, '#f472b6');
        state.shakeTime = 0.5;
      }

      function clearStage() {
        state.mode = "cleared"; state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared"; reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        } else if (state.mode === "running") {
            jump();
        }
      }

      function spawnObstacles() {
          const type = Math.floor(Math.random() * 3); // 0: top, 1: bottom, 2: both
          const width = 30 + Math.random() * 40;
          const height = 40 + Math.random() * 40;

          if (type === 0 || type === 2) {
              state.obstacles.push({
                  x: VIEW.width,
                  y: CENTER_Y - height,
                  w: width,
                  h: height,
                  world: 'top'
              });
          }
          if (type === 1 || type === 2) {
              state.obstacles.push({
                  x: VIEW.width,
                  y: CENTER_Y,
                  w: width,
                  h: height,
                  world: 'bottom'
              });
          }
      }

      function jump() {
          if (state.topPlayer.grounded) {
              state.topPlayer.vy = JUMP_VELOCITY;
              state.topPlayer.grounded = false;
              createParticles(200 + PLAYER_SIZE/2, state.topPlayer.y + PLAYER_SIZE, '#22d3ee');
          }
          if (state.bottomPlayer.grounded) {
              state.bottomPlayer.vy = -JUMP_VELOCITY; // Inverted gravity jump
              state.bottomPlayer.grounded = false;
              createParticles(200 + PLAYER_SIZE/2, state.bottomPlayer.y, '#f472b6');
          }
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          // Physics
          // Top player
          if (!state.topPlayer.grounded) {
              state.topPlayer.vy += GRAVITY * dt;
              state.topPlayer.y += state.topPlayer.vy * dt;
              if (state.topPlayer.y >= CENTER_Y - PLAYER_SIZE) {
                  state.topPlayer.y = CENTER_Y - PLAYER_SIZE;
                  state.topPlayer.vy = 0;
                  state.topPlayer.grounded = true;
              }
          }

          // Bottom player (inverted)
          if (!state.bottomPlayer.grounded) {
              state.bottomPlayer.vy -= GRAVITY * dt;
              state.bottomPlayer.y += state.bottomPlayer.vy * dt;
              if (state.bottomPlayer.y <= CENTER_Y) {
                  state.bottomPlayer.y = CENTER_Y;
                  state.bottomPlayer.vy = 0;
                  state.bottomPlayer.grounded = true;
              }
          }

          // Obstacles
          const obstacleInterval = Math.max(0.6, 1.5 - state.elapsed * 0.04);
          if (state.elapsed - state.lastObstacleTime > obstacleInterval) {
              spawnObstacles();
              state.lastObstacleTime = state.elapsed;
          }

          for (let i = state.obstacles.length - 1; i >= 0; i--) {
              let obs = state.obstacles[i];
              obs.x -= SPEED * dt;

              // Collision detection
              const pX = 200;
              const pW = PLAYER_SIZE;
              const pH = PLAYER_SIZE;
              let playerY = obs.world === 'top' ? state.topPlayer.y : state.bottomPlayer.y;

              if (
                  pX < obs.x + obs.w &&
                  pX + pW > obs.x &&
                  playerY < obs.y + obs.h &&
                  playerY + pH > obs.y
              ) {
                  failStage("ьЮеьХаым╝ьЧР ь╢йыПМэЦИьК╡ыЛИыЛд.");
                  return;
              }

              if (obs.x + obs.w < 0) {
                  state.obstacles.splice(i, 1);
              }
          }

          if (state.elapsed >= GAME_DURATION) {
              clearStage();
              return;
          }
        }

        // Always update particles
        for (let i = state.particles.length - 1; i >= 0; i--) {
            let p = state.particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt * 2;
            if (p.life <= 0) {
                state.particles.splice(i, 1);
            }
        }

        if (state.shakeTime > 0) {
            state.shakeTime -= dt;
        }
      }

      function drawPlayer(x, y, color, innerColor) {
          const w = PLAYER_SIZE;
          const h = PLAYER_SIZE;

          ctx.shadowColor = color;
          ctx.shadowBlur = 20;
          ctx.strokeStyle = color;
          ctx.lineWidth = 4;

          // Outer glowing box
          ctx.beginPath();
          ctx.roundRect(x, y, w, h, 8);
          ctx.stroke();

          // Inner core
          ctx.fillStyle = innerColor;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.roundRect(x + 8, y + 8, w - 16, h - 16, 4);
          ctx.fill();

          ctx.shadowBlur = 0; // Reset
      }

      function drawRect(x, y, w, h, color, shadowColor, shadowBlur) {
          ctx.fillStyle = color;
          ctx.shadowColor = shadowColor || 'transparent';
          ctx.shadowBlur = shadowBlur || 0;
          ctx.fillRect(x, y, w, h);
          ctx.shadowBlur = 0; // Reset
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent; ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);
        ctx.fillStyle = accent; ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center"; ctx.fillText(title, VIEW.width / 2, 162);
        ctx.fillStyle = "#0f172a"; ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => { ctx.fillText(line, VIEW.width / 2, 232 + index * 46); });
        ctx.textAlign = "left";
      }

      function render() {
        ctx.save();

        if (state.shakeTime > 0) {
            const intensity = state.shakeTime * 20;
            const dx = (Math.random() - 0.5) * intensity;
            const dy = (Math.random() - 0.5) * intensity;
            ctx.translate(dx, dy);
        }

        // Gradient Background
        const bgGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        bgGradient.addColorStop(0, '#0f172a'); // Very dark blue top
        bgGradient.addColorStop(0.5, '#1e1b4b'); // Deep purple center
        bgGradient.addColorStop(1, '#0f172a'); // Very dark blue bottom
        ctx.fillStyle = bgGradient;
        ctx.fillRect(-20, -20, VIEW.width + 40, VIEW.height + 40); // Slightly larger to cover shake

        // Center Neon Line
        ctx.strokeStyle = '#06b6d4'; // Cyan
        ctx.lineWidth = 4;
        ctx.shadowColor = '#06b6d4';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.moveTo(0, VIEW.height / 2);
        ctx.lineTo(VIEW.width, VIEW.height / 2);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Obstacles
        for (let obs of state.obstacles) {
            if (obs.world === 'top') {
                drawRect(obs.x, obs.y, obs.w, obs.h, '#ef4444', '#ef4444', 15); // Red
            } else {
                drawRect(obs.x, obs.y, obs.w, obs.h, '#ef4444', '#ef4444', 15); // Red
            }
        }

        // Trails / Particles
        for (let p of state.particles) {
            ctx.globalAlpha = Math.max(0, p.life);
            drawRect(p.x, p.y, 6, 6, p.color);
        }
        ctx.globalAlpha = 1.0;

        // Players
        if (state.mode !== "failed") {
            // Top Player (Cyan)
            drawPlayer(200, state.topPlayer.y, '#22d3ee', '#cffafe');
            // Bottom Player (Pink)
            drawPlayer(200, state.bottomPlayer.y, '#f472b6', '#fce7f3');
        }

        if (state.mode === "menu") {
          renderCard("ъ▒░ьЪ╕ ыМАьЛЬ", [
            "ъ▒░ьЪ╕ь▓ШыЯ╝ ьГБэХШъ░А ы░ШьаДыРЬ ъ│╡ъ░ДьЧРьДЬ ыПЩьЛЬьЧР ьаРэФДэХШый░ ьЮеьХаым╝ьЭД эФ╝эХШьД╕ьЪФ.",
            "ьб░ьЮС: эЩФый┤ эД░ь╣Ш/эБ┤ыжн, ьКдэОШьЭ┤ьКды░Ф ьаРэФД",
            "эБ┤ыжмьЦ┤ ьб░ъ▒┤: 20ь┤Иъ░Д ьГЭьб┤",
            "ьЛдэМи ьб░ъ▒┤: ьЮеьХаым╝ьЧР ь╢йыПМ",
            "эД░ь╣Ш, эБ┤ыжн ыШРыКФ EnterыбЬ ьЛЬьЮС.",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
           // Timer
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.font = "700 32px Trebuchet MS";
            ctx.textAlign = "center";
            const remaining = Math.max(0, GAME_DURATION - state.elapsed).toFixed(1);
            ctx.fillText(remaining + "s", VIEW.width / 2, 50);
            ctx.textAlign = "left";
        }

        if (state.mode === "failed") {
          renderCard("ьЛдэМи", [
            "ьЮеьХаым╝ьЧР ь╢йыПМэЦИьК╡ыЛИыЛд.",
            "ыЛдьЛЬ ьЛЬыПДэХШыадый┤ эЩФый┤ьЭД эД░ь╣ШэХШъ▒░ыВШ Enterые╝ ыИДые┤ьД╕ьЪФ."
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
            renderCard("эБ┤ыжмьЦ┤!", [
            "20ь┤Иъ░Д ьГЭьб┤эЦИьК╡ыЛИыЛд!",
            "ыМАыЛиэХйыЛИыЛд."
            ], "#15803d");
        }

        ctx.restore();
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode, elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status, note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.code === "Space" || event.key === "Enter" || event.code === "ArrowUp") {
            event.preventDefault();
            if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
                startStage();
            } else if (state.mode === "running") {
                jump();
            }
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt); render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) update(FIXED_DT);
        render(); return renderGameToText();
      };
      window.relayStageMeta = {
        id: "mirror-dash", title: "ъ▒░ьЪ╕ ыМАьЛЬ", creator: "Jules",
        genre: "эН╝ьжР ыЯмыДИ", clearCondition: "20ь┤Иъ░Д ьГБэХШ ыМАь╣ньЬ╝ыбЬ ьЫАьзБьЭ┤ый░ ьГЭьб┤", controls: "эЩФый┤ эД░ь╣Ш/эБ┤ыжньЛЬ ьаРэФД"
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() { startStage(); clearStage(); render(); },
        forceFail() { startStage(); failStage("debug_force_fail"); render(); },
      };

      canvas.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
      });
      canvas.addEventListener("touchstart", (event) => {
          event.preventDefault();
          startFromTouch();
      }, { passive: false });
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render(); canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
