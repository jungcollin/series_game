<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Biomech Theater: Pulse Fence</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #03060e;
        --bg-1: #0f1730;
        --bg-2: #2f1d2b;
        --ink: #eef7ff;
        --cyan: #72f0ff;
        --teal: #64ffd0;
        --gold: #ffd58e;
        --rose: #ff98aa;
        --violet: #baa7ff;
        --shadow: rgba(2, 10, 20, 0.65);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(80, 191, 255, 0.18), transparent 30%),
          radial-gradient(circle at bottom, rgba(255, 121, 150, 0.14), transparent 28%),
          linear-gradient(180deg, var(--bg-1), var(--bg-0));
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(114, 240, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 16, 27, 0.92);
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 213, 142, 0.9);
        outline-offset: -10px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 18;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        justify-content: center;
        width: min(100%, 320px);
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        min-width: 136px;
        min-height: 58px;
        padding: 0 22px;
        background:
          linear-gradient(180deg, rgba(127, 247, 255, 0.38), rgba(34, 53, 82, 0.9)),
          rgba(8, 16, 27, 0.82);
        color: var(--ink);
        font: 900 15px/1 "Avenir Next Condensed", "Trebuchet MS", sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        box-shadow:
          0 12px 24px rgba(3, 9, 20, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        pointer-events: auto;
        touch-action: manipulation;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        background:
          linear-gradient(180deg, rgba(255, 213, 142, 0.62), rgba(91, 49, 28, 0.96)),
          rgba(17, 20, 30, 0.88);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-btn {
          min-width: 124px;
          min-height: 54px;
          padding: 0 18px;
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Biomech Theater: Pulse Fence. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은
      포인터 또는 터치 드래그로 방패 각도 조절, 탭으로 순간 증폭, 연속 성공이 끊기지 않게
      안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 이며,
      모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 입니다. 목표는
      콤보를 유지하며 20연속 파형을 반사하면 클리어 이고, 실패 조건은
      콤보가 여러 번 끊기거나 코어에 같은 문양이 3번 누적되면 실패 입니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Biomech Theater: Pulse Fence"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-hidden="false">
      <div class="mobile-controls__row">
        <button id="pulse-btn" class="mobile-btn" type="button" aria-label="순간 증폭">
          Pulse
        </button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const pulseButton = document.querySelector("#pulse-btn");
      const VIEW = { width: canvas.width, height: canvas.height };
      const TAU = Math.PI * 2;
      const CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.5 + 6 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("biomech-theater-pulse-fencing-combo") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const reducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches ?? false;
      const targetCombo = 20;
      const maxComboBreaks = 4;
      const markFailCount = 3;
      const shieldRadius = 174;
      const outerRadius = 434;
      const coreRadius = 54;
      const baseShieldArc = 0.62;
      const boostShieldArc = 1.08;
      const sigils = [
        {
          id: "spire",
          label: "Spire",
          color: "#ff9974",
          glow: "rgba(255, 153, 116, 0.38)",
        },
        {
          id: "lattice",
          label: "Lattice",
          color: "#7cf5ff",
          glow: "rgba(124, 245, 255, 0.34)",
        },
        {
          id: "iris",
          label: "Iris",
          color: "#d4bbff",
          glow: "rgba(212, 187, 255, 0.34)",
        },
      ];

      window.relayStageMeta = {
        id: "biomech-theater-pulse-fencing-combo",
        title: "Biomech Theater: Pulse Fence",
        description: "바이오메크 극장 결투장 중앙에서 방패를 돌리며 콤보 임계치 파형을 막는 반응 액션",
        creator: {
          name: "jungcollin",
          github: "jungcollin",
        },
        genre: "Reactive shield action / 콤보 임계치",
        clearCondition: "콤보를 유지하며 20연속 파형을 반사하면 클리어",
        failCondition: "콤보가 여러 번 끊기거나 코어에 같은 문양이 3번 누적되면 실패",
        controls:
          "포인터 또는 터치 드래그로 방패 각도 조절, 탭으로 순간 증폭, 연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
      };

      window.relayStageResult = {
        status: "menu",
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let waveSerial = 0;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "방패를 돌리고 탭 증폭으로 문양 파형을 밀어내세요.",
        combo: 0,
        bestCombo: 0,
        comboBreaks: 0,
        comboMeter: 0,
        totalPerfects: 0,
        shieldAngle: -Math.PI * 0.5,
        targetShieldAngle: -Math.PI * 0.5,
        dragActive: false,
        pointerId: null,
        pointerStartX: 0,
        pointerStartY: 0,
        pointerMoved: false,
        pointerDownAt: 0,
        pointerCanvasX: CENTER.x,
        pointerCanvasY: CENTER.y - shieldRadius,
        amplifyTimer: 0,
        amplifyCooldown: 0,
        spawnTimer: 0.72,
        pulseFlash: 0,
        screenFlash: 0,
        stageBeat: 0,
        shake: 0,
        sweep: 0,
        currentTime: 0,
        sigilMarks: {
          spire: 0,
          lattice: 0,
          iris: 0,
        },
        waves: [],
        particles: [],
        echoes: [],
        popups: [],
        scanLines: [],
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function easeInOutSine(t) {
        return -(Math.cos(Math.PI * t) - 1) * 0.5;
      }

      function normalizeAngle(angle) {
        let result = angle;
        while (result <= -Math.PI) result += TAU;
        while (result > Math.PI) result -= TAU;
        return result;
      }

      function angleLerp(start, end, amount) {
        const delta = normalizeAngle(end - start);
        return normalizeAngle(start + delta * amount);
      }

      function angleDelta(a, b) {
        return Math.abs(normalizeAngle(a - b));
      }

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function randomChoice(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function getSigilById(id) {
        return sigils.find((sigil) => sigil.id === id) || sigils[0];
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRun() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.combo = 0;
        state.bestCombo = 0;
        state.comboBreaks = 0;
        state.comboMeter = 0;
        state.totalPerfects = 0;
        state.sigilMarks.spire = 0;
        state.sigilMarks.lattice = 0;
        state.sigilMarks.iris = 0;
        state.waves = [];
        state.particles = [];
        state.echoes = [];
        state.popups = [];
        state.scanLines = [];
        state.spawnTimer = 0.68;
        state.shieldAngle = -Math.PI * 0.5;
        state.targetShieldAngle = -Math.PI * 0.5;
        state.dragActive = false;
        state.pointerId = null;
        state.pointerMoved = false;
        state.pointerDownAt = 0;
        state.amplifyTimer = 0;
        state.amplifyCooldown = 0;
        state.pulseFlash = 0;
        state.screenFlash = 0;
        state.shake = 0;
        state.stageBeat = 0;
        state.sweep = 0;
      }

      function startStage() {
        resetRun();
        state.mode = "running";
        spawnWave();
        state.spawnTimer = 0.92;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromMenu() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function getIntensity() {
        return clamp(0.18 + state.combo / targetCombo - state.comboBreaks * 0.08, 0.12, 1);
      }

      function getShieldArc() {
        const amount = clamp(state.amplifyTimer / 0.32, 0, 1);
        return lerp(baseShieldArc, boostShieldArc, amount);
      }

      function updateShieldTarget(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = ((clientX - rect.left) / rect.width) * VIEW.width;
        const y = ((clientY - rect.top) / rect.height) * VIEW.height;
        state.pointerCanvasX = x;
        state.pointerCanvasY = y;
        state.targetShieldAngle = Math.atan2(y - CENTER.y, x - CENTER.x);
      }

      function triggerAmplify(source = "input") {
        if (state.mode !== "running" || state.amplifyCooldown > 0) {
          return;
        }
        state.amplifyTimer = 0.32;
        state.amplifyCooldown = 0.12;
        state.pulseFlash = 1;
        state.screenFlash = Math.max(state.screenFlash, 0.14);
        state.shake = Math.max(state.shake, source === "button" ? 8 : 6);
        pulseButton.dataset.active = "true";
        for (let index = 0; index < (reducedMotion ? 10 : 18); index += 1) {
          const angle = randomRange(0, TAU);
          const speed = randomRange(60, 220);
          state.particles.push({
            x: CENTER.x + Math.cos(angle) * shieldRadius,
            y: CENTER.y + Math.sin(angle) * shieldRadius,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: randomRange(0.24, 0.5),
            maxLife: randomRange(0.24, 0.5),
            size: randomRange(2, 5),
            color: index % 2 === 0 ? "#7cf5ff" : "#ffd58e",
          });
        }
      }

      function registerComboBreak(label, color) {
        state.combo = 0;
        state.comboMeter *= 0.45;
        state.comboBreaks += 1;
        state.shake = Math.max(state.shake, 14);
        state.screenFlash = Math.max(state.screenFlash, 0.24);
        state.popups.push({
          text: label,
          color,
          age: 0,
          life: 0.72,
          x: CENTER.x,
          y: CENTER.y - 144,
          scale: 1,
        });
        if (state.comboBreaks >= maxComboBreaks) {
          failStage("combo-break");
        }
      }

      function spawnWave() {
        const intensity = getIntensity();
        const sigil = randomChoice(sigils);
        const startAngle = randomRange(-Math.PI, Math.PI);
        const drift = randomRange(-0.64, 0.64) * (0.72 + intensity * 0.5);
        const endAngle = normalizeAngle(startAngle + drift);
        const travelTime = clamp(1.52 - intensity * 0.46 + randomRange(-0.06, 0.1), 0.86, 1.62);
        const wave = {
          id: waveSerial,
          serial: waveSerial,
          sigil: sigil.id,
          startAngle,
          endAngle,
          angle: startAngle,
          radius: outerRadius,
          age: 0,
          life: travelTime,
          resolved: false,
          glow: 0,
          arcBias: randomRange(0.9, 1.18),
          trail: [],
          parryRadius: shieldRadius + 18,
        };
        waveSerial += 1;
        state.waves.push(wave);
      }

      function emitParticles(x, y, color, count, spread = 1) {
        const amount = reducedMotion ? Math.ceil(count * 0.45) : count;
        for (let index = 0; index < amount; index += 1) {
          const angle = randomRange(0, TAU);
          const speed = randomRange(36, 240) * spread;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: randomRange(0.2, 0.8),
            maxLife: randomRange(0.2, 0.8),
            size: randomRange(2, 7),
            color,
          });
        }
      }

      function emitEcho(angle, color) {
        state.echoes.push({
          angle,
          age: 0,
          life: 0.38,
          color,
        });
      }

      function scorePerfect(wave, point) {
        const sigil = getSigilById(wave.sigil);
        state.combo += 1;
        state.totalPerfects += 1;
        state.bestCombo = Math.max(state.bestCombo, state.combo);
        state.comboMeter = clamp(state.combo / targetCombo, 0, 1);
        state.shake = Math.max(state.shake, 12);
        state.screenFlash = Math.max(state.screenFlash, 0.18);
        state.popups.push({
          text: state.combo >= targetCombo ? "FINAL RETURN" : `COMBO ${state.combo}`,
          color: sigil.color,
          age: 0,
          life: 0.66,
          x: point.x,
          y: point.y - 28,
          scale: 1.1,
        });
        emitParticles(point.x, point.y, sigil.color, 32, 1.18);
        emitEcho(wave.angle, sigil.color);
        if (state.combo >= targetCombo) {
          clearStage();
        }
      }

      function scoreWeak(wave, point) {
        emitParticles(point.x, point.y, "#ffd58e", 18, 0.8);
        registerComboBreak("SAFE ROUTE LOST", "#ffd58e");
      }

      function scoreLeak(wave, point) {
        const sigil = getSigilById(wave.sigil);
        state.sigilMarks[wave.sigil] += 1;
        emitParticles(point.x, point.y, sigil.color, 28, 1.2);
        registerComboBreak(`${sigil.label.toUpperCase()} MARK`, sigil.color);
        if (state.sigilMarks[wave.sigil] >= markFailCount) {
          failStage(`${wave.sigil}-overload`);
        }
      }

      function resolveWave(wave) {
        if (wave.resolved) {
          return;
        }
        const point = {
          x: CENTER.x + Math.cos(wave.angle) * wave.parryRadius,
          y: CENTER.y + Math.sin(wave.angle) * wave.parryRadius,
        };
        const aligned = angleDelta(state.shieldAngle, wave.angle) <= getShieldArc() * 0.54;
        const amplified = state.amplifyTimer > 0.06;

        wave.resolved = true;
        if (aligned && amplified) {
          scorePerfect(wave, point);
        } else if (aligned) {
          scoreWeak(wave, point);
        } else {
          scoreLeak(wave, point);
        }
      }

      function updateWave(wave, dt) {
        wave.age += dt;
        const progress = clamp(wave.age / wave.life, 0, 1);
        const eased = easeOutCubic(progress);
        wave.radius = lerp(outerRadius, wave.parryRadius, eased);
        wave.angle = angleLerp(wave.startAngle, wave.endAngle, easeInOutSine(progress));
        wave.glow = Math.sin(progress * Math.PI) * 0.5 + 0.5;
        wave.trail.push({
          x: CENTER.x + Math.cos(wave.angle) * wave.radius,
          y: CENTER.y + Math.sin(wave.angle) * wave.radius,
          alpha: 0.4 + wave.glow * 0.4,
        });
        if (wave.trail.length > 16) {
          wave.trail.shift();
        }
        if (progress >= 1) {
          resolveWave(wave);
        }
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          if (particle.life <= 0) {
            return false;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy *= 0.98;
          return true;
        });
      }

      function updatePopups(dt) {
        state.popups = state.popups.filter((popup) => {
          popup.age += dt;
          popup.y -= 28 * dt;
          popup.scale = 1 + popup.age * 0.18;
          return popup.age < popup.life;
        });
      }

      function updateEchoes(dt) {
        state.echoes = state.echoes.filter((echo) => {
          echo.age += dt;
          return echo.age < echo.life;
        });
      }

      function tickRunning(dt) {
        state.elapsed += dt;
        state.comboMeter = Math.max(state.comboMeter - dt * 0.02, state.combo / targetCombo);
        state.stageBeat += dt * (1.3 + getIntensity() * 1.6);
        state.sweep += dt * 0.75;
        state.shieldAngle = angleLerp(
          state.shieldAngle,
          state.targetShieldAngle,
          clamp(dt * 11.5, 0, 1)
        );
        state.spawnTimer -= dt;
        if (state.spawnTimer <= 0 && state.mode === "running") {
          spawnWave();
          const intensity = getIntensity();
          state.spawnTimer = clamp(1.24 - intensity * 0.42 + randomRange(-0.05, 0.08), 0.56, 1.3);
        }
        if (state.amplifyTimer > 0) {
          state.amplifyTimer = Math.max(0, state.amplifyTimer - dt);
          if (state.amplifyTimer <= 0) {
            pulseButton.dataset.active = "false";
          }
        }
        if (state.amplifyCooldown > 0) {
          state.amplifyCooldown = Math.max(0, state.amplifyCooldown - dt);
        }
        state.pulseFlash = Math.max(0, state.pulseFlash - dt * 2.6);
        state.screenFlash = Math.max(0, state.screenFlash - dt * 1.9);
        state.shake = Math.max(0, state.shake - dt * 26);

        for (const wave of state.waves) {
          updateWave(wave, dt);
        }
        state.waves = state.waves.filter((wave) => wave.age < wave.life + 0.01);
        updateParticles(dt);
        updatePopups(dt);
        updateEchoes(dt);
      }

      function tickScene(dt) {
        state.currentTime += dt;
        if (state.mode === "running") {
          tickRunning(dt);
        } else {
          state.stageBeat += dt * 0.7;
          state.sweep += dt * 0.35;
          state.screenFlash = Math.max(0, state.screenFlash - dt * 1.3);
          state.shake = Math.max(0, state.shake - dt * 18);
          updateParticles(dt);
          updatePopups(dt);
          updateEchoes(dt);
        }
      }

      function drawGlyph(sigilId, x, y, size, strokeAlpha = 1) {
        const sigil = getSigilById(sigilId);
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = sigil.color;
        ctx.globalAlpha *= strokeAlpha;
        ctx.lineWidth = Math.max(1.4, size * 0.14);
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (sigilId === "spire") {
          ctx.beginPath();
          ctx.moveTo(0, -size);
          ctx.lineTo(size * 0.86, size * 0.78);
          ctx.lineTo(-size * 0.86, size * 0.78);
          ctx.closePath();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, -size * 0.34);
          ctx.lineTo(0, size * 0.5);
          ctx.stroke();
        } else if (sigilId === "lattice") {
          ctx.strokeRect(-size * 0.78, -size * 0.78, size * 1.56, size * 1.56);
          ctx.beginPath();
          ctx.moveTo(-size * 0.78, 0);
          ctx.lineTo(size * 0.78, 0);
          ctx.moveTo(0, -size * 0.78);
          ctx.lineTo(0, size * 0.78);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.86, 0, TAU);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(0, 0, size * 0.32, 0, TAU);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBackdrop() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#05111f");
        gradient.addColorStop(0.45, "#0e1730");
        gradient.addColorStop(1, "#05070f");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.35;
        for (let index = 0; index < 10; index += 1) {
          const x = (index / 9) * VIEW.width;
          const width = 40 + Math.sin(state.sweep * 0.9 + index) * 18;
          const shade = ctx.createLinearGradient(x - width, 0, x + width, VIEW.height);
          shade.addColorStop(0, "rgba(255, 255, 255, 0)");
          shade.addColorStop(0.5, index % 2 === 0 ? "rgba(124, 245, 255, 0.08)" : "rgba(255, 153, 116, 0.07)");
          shade.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = shade;
          ctx.fillRect(x - width, 0, width * 2, VIEW.height);
        }
        ctx.restore();

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        for (let index = 0; index < 6; index += 1) {
          const radius = 210 + index * 34;
          ctx.strokeStyle = index % 2 === 0 ? "rgba(124, 245, 255, 0.12)" : "rgba(255, 153, 116, 0.08)";
          ctx.lineWidth = index % 2 === 0 ? 14 : 6;
          ctx.beginPath();
          ctx.arc(0, 0, radius, state.sweep + index * 0.45, state.sweep + index * 0.45 + Math.PI * 1.2);
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        ctx.globalAlpha = 0.18;
        for (let index = 0; index < 16; index += 1) {
          const angle = (index / 16) * TAU + state.sweep * 0.18;
          const inner = 230;
          const outer = 322 + Math.sin(state.stageBeat + index) * 8;
          ctx.strokeStyle = index % 3 === 0 ? "#7cf5ff" : "#ff9974";
          ctx.lineWidth = index % 2 === 0 ? 3 : 2;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
          ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawArena() {
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);

        const floor = ctx.createRadialGradient(0, 44, 24, 0, 62, 280);
        floor.addColorStop(0, "rgba(255, 213, 142, 0.22)");
        floor.addColorStop(0.4, "rgba(124, 245, 255, 0.09)");
        floor.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = floor;
        ctx.beginPath();
        ctx.ellipse(0, 82, 312, 146, 0, 0, TAU);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = 2;
        for (let index = 0; index < 5; index += 1) {
          const radius = 120 + index * 46;
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, TAU);
          ctx.stroke();
        }

        ctx.lineWidth = 16;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.06)";
        ctx.beginPath();
        ctx.arc(0, 0, shieldRadius + 26, 0, TAU);
        ctx.stroke();

        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(124, 245, 255, 0.18)";
        ctx.beginPath();
        ctx.arc(0, 0, shieldRadius + 46, state.sweep * 0.9, state.sweep * 0.9 + Math.PI * 1.5);
        ctx.stroke();

        ctx.restore();
      }

      function drawTelegraphs() {
        for (const wave of state.waves) {
          const sigil = getSigilById(wave.sigil);
          const startX = CENTER.x + Math.cos(wave.startAngle) * outerRadius;
          const startY = CENTER.y + Math.sin(wave.startAngle) * outerRadius;
          const endX = CENTER.x + Math.cos(wave.endAngle) * wave.parryRadius;
          const endY = CENTER.y + Math.sin(wave.endAngle) * wave.parryRadius;
          const controlRadius = outerRadius * 0.56;
          const controlX = CENTER.x + Math.cos((wave.startAngle + wave.endAngle) * 0.5) * controlRadius;
          const controlY = CENTER.y + Math.sin((wave.startAngle + wave.endAngle) * 0.5) * controlRadius;

          ctx.save();
          ctx.strokeStyle = sigil.glow;
          ctx.lineWidth = 3 + wave.glow * 2.5;
          ctx.setLineDash([10, 14]);
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          ctx.quadraticCurveTo(controlX, controlY, endX, endY);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawWave(wave) {
        const sigil = getSigilById(wave.sigil);
        const x = CENTER.x + Math.cos(wave.angle) * wave.radius;
        const y = CENTER.y + Math.sin(wave.angle) * wave.radius;

        ctx.save();
        for (let index = 0; index < wave.trail.length; index += 1) {
          const point = wave.trail[index];
          const alpha = (index + 1) / wave.trail.length;
          ctx.fillStyle = sigil.glow.replace(/0\.\d+\)/, `${(point.alpha * alpha).toFixed(2)})`);
          ctx.beginPath();
          ctx.arc(point.x, point.y, 5 + alpha * 8, 0, TAU);
          ctx.fill();
        }

        ctx.shadowColor = sigil.color;
        ctx.shadowBlur = 22 + wave.glow * 16;
        ctx.fillStyle = sigil.color;
        ctx.beginPath();
        ctx.arc(x, y, 14 + wave.glow * 4, 0, TAU);
        ctx.fill();

        ctx.shadowBlur = 0;
        drawGlyph(wave.sigil, x, y, 12 + wave.glow * 4, 0.9);

        const progress = clamp(wave.age / wave.life, 0, 1);
        const ringRadius = 22 + (1 - progress) * 16 + Math.sin(state.stageBeat * 5 + wave.serial) * 1.5;
        ctx.strokeStyle = sigil.color;
        ctx.globalAlpha = 0.28 + wave.glow * 0.18;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, ringRadius, 0, TAU);
        ctx.stroke();
        ctx.restore();
      }

      function drawShield() {
        const arc = getShieldArc();
        const pulse = Math.sin(state.stageBeat * 6) * 0.06 + 0.94;
        const boost = clamp(state.amplifyTimer / 0.32, 0, 1);
        const shieldGradient = ctx.createLinearGradient(CENTER.x - 80, CENTER.y - 80, CENTER.x + 80, CENTER.y + 80);
        shieldGradient.addColorStop(0, "#7cf5ff");
        shieldGradient.addColorStop(0.5, boost > 0 ? "#ffd58e" : "#72f0ff");
        shieldGradient.addColorStop(1, "#ff98aa");

        ctx.save();
        ctx.strokeStyle = shieldGradient;
        ctx.lineWidth = 14 + boost * 8;
        ctx.lineCap = "round";
        ctx.shadowColor = boost > 0 ? "#ffd58e" : "#7cf5ff";
        ctx.shadowBlur = 28 + boost * 12;
        ctx.beginPath();
        ctx.arc(
          CENTER.x,
          CENTER.y,
          shieldRadius,
          state.shieldAngle - arc * 0.5,
          state.shieldAngle + arc * 0.5
        );
        ctx.stroke();

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255,255,255,0.8)";
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(
          CENTER.x,
          CENTER.y,
          shieldRadius,
          state.shieldAngle - arc * 0.42,
          state.shieldAngle + arc * 0.42
        );
        ctx.stroke();

        const tipRadius = shieldRadius;
        for (const sign of [-1, 1]) {
          const angle = state.shieldAngle + arc * 0.46 * sign;
          const x = CENTER.x + Math.cos(angle) * tipRadius;
          const y = CENTER.y + Math.sin(angle) * tipRadius;
          ctx.fillStyle = sign < 0 ? "#7cf5ff" : "#ffd58e";
          ctx.beginPath();
          ctx.arc(x, y, 5 + boost * 3, 0, TAU);
          ctx.fill();
        }

        if (boost > 0) {
          ctx.strokeStyle = "rgba(255, 213, 142, 0.34)";
          ctx.lineWidth = 24 + boost * 10;
          ctx.beginPath();
          ctx.arc(
            CENTER.x,
            CENTER.y,
            shieldRadius,
            state.shieldAngle - arc * 0.5,
            state.shieldAngle + arc * 0.5
          );
          ctx.stroke();
        }

        ctx.restore();

        const anchorX = CENTER.x + Math.cos(state.shieldAngle) * shieldRadius;
        const anchorY = CENTER.y + Math.sin(state.shieldAngle) * shieldRadius;
        ctx.save();
        ctx.globalAlpha = 0.16;
        ctx.strokeStyle = "#eef7ff";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(CENTER.x, CENTER.y);
        ctx.lineTo(anchorX * pulse + CENTER.x * (1 - pulse), anchorY * pulse + CENTER.y * (1 - pulse));
        ctx.stroke();
        ctx.restore();
      }

      function drawCore() {
        ctx.save();
        const heartbeat = Math.sin(state.stageBeat * 2.4) * 0.5 + 0.5;
        const glow = 28 + heartbeat * 24 + state.pulseFlash * 18;
        const gradient = ctx.createRadialGradient(CENTER.x, CENTER.y, 8, CENTER.x, CENTER.y, coreRadius + 28);
        gradient.addColorStop(0, "rgba(255, 255, 255, 0.98)");
        gradient.addColorStop(0.18, "rgba(255, 239, 214, 0.94)");
        gradient.addColorStop(0.6, "rgba(124, 245, 255, 0.22)");
        gradient.addColorStop(1, "rgba(124, 245, 255, 0)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, coreRadius + glow, 0, TAU);
        ctx.fill();

        ctx.fillStyle = "#eef7ff";
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, coreRadius, 0, TAU);
        ctx.fill();

        ctx.fillStyle = "#10162a";
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, coreRadius * 0.54, 0, TAU);
        ctx.fill();

        drawGlyph("iris", CENTER.x, CENTER.y, 14, 0.85);
        ctx.restore();
      }

      function drawMarks() {
        const entries = [
          { id: "spire", x: CENTER.x - 188, y: CENTER.y + 146 },
          { id: "lattice", x: CENTER.x, y: CENTER.y + 174 },
          { id: "iris", x: CENTER.x + 188, y: CENTER.y + 146 },
        ];

        for (const entry of entries) {
          const count = state.sigilMarks[entry.id];
          ctx.save();
          ctx.translate(entry.x, entry.y);
          const sigil = getSigilById(entry.id);
          ctx.fillStyle = "rgba(4, 11, 22, 0.82)";
          ctx.beginPath();
          ctx.roundRect(-46, -30, 92, 60, 20);
          ctx.fill();
          ctx.strokeStyle = sigil.glow;
          ctx.lineWidth = 2;
          ctx.stroke();
          drawGlyph(entry.id, -18, 0, 10, 0.9);
          for (let index = 0; index < markFailCount; index += 1) {
            ctx.fillStyle = index < count ? sigil.color : "rgba(255,255,255,0.12)";
            ctx.beginPath();
            ctx.arc(12 + index * 16, 0, 5.2, 0, TAU);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function drawHUD() {
        ctx.save();

        ctx.fillStyle = "rgba(5, 10, 20, 0.74)";
        ctx.beginPath();
        ctx.roundRect(28, 24, 218, 92, 24);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(VIEW.width - 262, 24, 234, 92, 24);
        ctx.fill();

        ctx.fillStyle = "#eef7ff";
        ctx.font = '900 14px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.letterSpacing = "0.08em";
        ctx.fillText("PULSE FENCE", 48, 48);
        ctx.fillStyle = "rgba(238, 247, 255, 0.72)";
        ctx.font = '700 13px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText("combo threshold", 48, 68);

        ctx.fillStyle = "#eef7ff";
        ctx.font = '900 34px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(String(state.combo).padStart(2, "0"), 48, 103);
        ctx.font = '800 15px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillStyle = "rgba(238, 247, 255, 0.72)";
        ctx.fillText(`/ ${targetCombo}`, 98, 103);

        const meterX = 48;
        const meterY = 84;
        const meterW = 158;
        const meterH = 10;
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath();
        ctx.roundRect(meterX, meterY, meterW, meterH, 999);
        ctx.fill();
        const fillW = meterW * clamp(state.comboMeter, 0, 1);
        const meterGradient = ctx.createLinearGradient(meterX, meterY, meterX + meterW, meterY);
        meterGradient.addColorStop(0, "#7cf5ff");
        meterGradient.addColorStop(0.5, "#ffd58e");
        meterGradient.addColorStop(1, "#ff98aa");
        ctx.fillStyle = meterGradient;
        ctx.beginPath();
        ctx.roundRect(meterX, meterY, fillW, meterH, 999);
        ctx.fill();

        ctx.fillStyle = "rgba(238, 247, 255, 0.72)";
        ctx.font = '700 13px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText("combo breaks", VIEW.width - 240, 50);
        ctx.fillText("amplify", VIEW.width - 240, 88);

        ctx.fillStyle = "#eef7ff";
        ctx.font = '900 30px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText(`${state.comboBreaks}/${maxComboBreaks}`, VIEW.width - 240, 78);

        const ampW = 162;
        const ampFill = ampW * clamp(state.amplifyTimer / 0.32, 0, 1);
        ctx.fillStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath();
        ctx.roundRect(VIEW.width - 240, 98, ampW, 10, 999);
        ctx.fill();
        ctx.fillStyle = state.amplifyTimer > 0 ? "#ffd58e" : "rgba(255,255,255,0.16)";
        ctx.beginPath();
        ctx.roundRect(VIEW.width - 240, 98, ampFill, 10, 999);
        ctx.fill();

        ctx.fillStyle = "rgba(238, 247, 255, 0.72)";
        ctx.font = '700 12px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
        ctx.fillText("Drag shield, tap Pulse", VIEW.width - 240, 126);

        ctx.restore();
      }

      function drawParticles() {
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawEchoes() {
        for (const echo of state.echoes) {
          const alpha = 1 - echo.age / echo.life;
          ctx.save();
          ctx.strokeStyle = echo.color;
          ctx.globalAlpha = alpha * 0.72;
          ctx.lineWidth = 28 * alpha;
          ctx.beginPath();
          ctx.arc(CENTER.x, CENTER.y, shieldRadius + echo.age * 260, echo.angle - 0.1, echo.angle + 0.1);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawPopups() {
        for (const popup of state.popups) {
          const alpha = 1 - popup.age / popup.life;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(popup.x, popup.y);
          ctx.scale(popup.scale, popup.scale);
          ctx.textAlign = "center";
          ctx.fillStyle = popup.color;
          ctx.font = '900 24px "Avenir Next Condensed", "Trebuchet MS", sans-serif';
          ctx.fillText(popup.text, 0, 0);
          ctx.restore();
        }
      }

      function drawOverlayCard(title, subtitle, accent, footer) {

        const border = ctx.createLinearGradient(x, y, x + cardW, y + cardH);

      function drawMenu() {
        drawOverlayCard(
          "Pulse Fence",
          "문양 파형이 코어에 닿기 직전, 증폭 반사로 20연속 콤보를 완성하세요.",

        ctx.roundRect(202, 376, 556, 96, 24);

        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.textAlign = "center";

      function drawEndState() {
        if (state.mode === "cleared") {
          drawOverlayCard(
            "Stage Clear",
            `20연속 반사 달성 · ${state.lastRunTime.toFixed(1)}s`,
            "#ffd58e",
            "펄스 장막이 극장 전체를 잠금 해제했습니다."
          );
        } else if (state.mode === "failed") {
          drawOverlayCard(
            "System Breach",
            `최고 콤보 ${state.bestCombo} · 누적 단절 ${state.comboBreaks}`,
            "#ff98aa",
            "문양 잔향이 코어에 스며들었습니다."
          );
        }
      }

      function drawScene() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawBackdrop();

        ctx.save();
        const shakeX = reducedMotion ? 0 : randomRange(-state.shake, state.shake);
        const shakeY = reducedMotion ? 0 : randomRange(-state.shake, state.shake) * 0.65;
        ctx.translate(shakeX, shakeY);
        drawArena();
        drawTelegraphs();
        drawEchoes();
        for (const wave of state.waves) {
          drawWave(wave);
        }
        drawShield();
        drawCore();
        drawMarks();
        drawParticles();
        ctx.restore();

        drawHUD();
        drawPopups();

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndState();
        }

        if (state.screenFlash > 0) {
          ctx.save();
          ctx.fillStyle = `rgba(255, 248, 231, ${state.screenFlash.toFixed(3)})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.restore();
        }
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000 || FIXED_DT);
        lastTimestamp = timestamp;
        tickScene(delta);
        drawScene();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function stepBy(ms) {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          tickScene(FIXED_DT);
        }
        drawScene();
      }

      function bindCanvasPointer() {
        const releasePointer = (event) => {
          if (event.pointerId !== state.pointerId) {
            return;
          }
          const elapsedMs = performance.now() - state.pointerDownAt;
          if (
            state.mode === "running" &&
            !state.pointerMoved &&
            elapsedMs < 220
          ) {
            triggerAmplify("tap");
          }
          state.dragActive = false;
          state.pointerId = null;
          state.pointerMoved = false;
          canvas.releasePointerCapture?.(event.pointerId);
        };

        canvas.addEventListener("pointerdown", (event) => {
          canvas.focus();
          if (state.mode !== "running") {
            startFromMenu();
            updateShieldTarget(event.clientX, event.clientY);
            return;
          }
          state.dragActive = true;
          state.pointerId = event.pointerId;
          state.pointerMoved = false;
          state.pointerDownAt = performance.now();
          state.pointerStartX = event.clientX;
          state.pointerStartY = event.clientY;
          updateShieldTarget(event.clientX, event.clientY);
          canvas.setPointerCapture?.(event.pointerId);
        });

        canvas.addEventListener("pointermove", (event) => {
          if (state.mode !== "running") {
            return;
          }
          if (state.dragActive && event.pointerId === state.pointerId) {
            if (Math.hypot(event.clientX - state.pointerStartX, event.clientY - state.pointerStartY) > 8) {
              state.pointerMoved = true;
            }
            updateShieldTarget(event.clientX, event.clientY);
          }
        });

        canvas.addEventListener("pointerup", releasePointer);
        canvas.addEventListener("pointercancel", releasePointer);
        canvas.addEventListener("pointerleave", (event) => {
          if (state.dragActive && event.pointerId === state.pointerId && state.pointerMoved) {
            state.dragActive = false;
            state.pointerId = null;
          }
        });
      }

      function bindKeyboard() {
        window.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            startFromMenu();
            return;
          }
          if (event.key === " " || event.key === "Spacebar") {
            event.preventDefault();
            triggerAmplify("keyboard");
            return;
          }
          if (state.mode !== "running") {
            return;
          }
          if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
            state.targetShieldAngle -= 0.26;
          } else if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") {
            state.targetShieldAngle += 0.26;
          } else if (event.key === "ArrowUp" || event.key.toLowerCase() === "w") {
            state.targetShieldAngle = -Math.PI * 0.5;
          } else if (event.key === "ArrowDown" || event.key.toLowerCase() === "s") {
            state.targetShieldAngle = Math.PI * 0.5;
          }
          state.targetShieldAngle = normalizeAngle(state.targetShieldAngle);
        });
      }

      function bindPulseButton(button) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = state.amplifyTimer > 0 ? "true" : "false";
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (state.mode !== "running") {
            startFromMenu();
          }
          triggerAmplify("button");
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
      }

      window.render_game_to_text = function renderGameToText() {
        const payload = {
          mode: state.mode,
          combo: state.combo,
          comboBreaks: state.comboBreaks,
          comboMeter: Number(state.comboMeter.toFixed(2)),
          sigilMarks: state.sigilMarks,
          shieldAngleDeg: Number((((state.shieldAngle * 180) / Math.PI) + 360).toFixed(1)) % 360,
          amplifyActive: state.amplifyTimer > 0,
          note: "origin=center, degrees clockwise from right; 270 means up",
          waves: state.waves.slice(0, 3).map((wave) => ({
            sigil: wave.sigil,
            angleDeg: Number((((wave.angle * 180) / Math.PI) + 360).toFixed(1)) % 360,
            radius: Number(wave.radius.toFixed(1)),
            timeToImpact: Number(Math.max(0, wave.life - wave.age).toFixed(2)),
          })),
        };
        return JSON.stringify(payload);
      };

      window.advanceTime = function advanceTime(ms) {
        stepBy(ms);
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.combo = targetCombo;
          state.comboMeter = 1;
          clearStage();
          drawScene();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          state.comboBreaks = maxComboBreaks;
          failStage("debug-force");
          drawScene();
        },
      };

      bindCanvasPointer();
      bindKeyboard();
      bindPulseButton(pulseButton);
      reportReadyToHost();
      drawScene();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
