<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusk Subway: Debt Auction</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 18%, rgba(255, 185, 109, 0.24), transparent 28%),
          radial-gradient(circle at 84% 12%, rgba(73, 201, 255, 0.18), transparent 30%),
          linear-gradient(180deg, #0a0f1c 0%, #09111a 42%, #05070c 100%);
        font-family: "Arial Rounded MT Bold", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(125, 211, 252, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 12;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 15, 28, 0.94);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(186, 230, 253, 0.94);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dusk Subway: Debt Auction. 클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰,
      연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이
      가능하게 구현. 콤보를 유지하며 시간을 0으로 만들지 않고 마지막 경매를 넘기면 클리어.
      콤보가 여러 번 끊기거나 시간 잔고가 바닥나거나 코어가 파괴되면 실패.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Dusk Subway: Debt Auction" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      (() => {
        const canvas = document.querySelector("#game");
        const ctx = canvas.getContext("2d");
        const VIEW = { width: canvas.width, height: canvas.height };
        const FIXED_DT = 1 / 60;
        const MAX_DT = 1 / 20;

        const STAGE_ID = "dusk-subway-debt-auction-combo";
        const STAGE_TITLE = "Dusk Subway: Debt Auction";
        const CREATOR = "jungcollin";
        const GENRE = "Risk market defense / 콤보 임계치";
        const DESCRIPTION =
          "남은 시간을 입찰 자본으로 태워 선로와 장비를 사고, 연속 방어 콤보를 잇는 황혼 지하철 리스크 퍼즐.";
        const CONTROLS =
          "클릭 또는 터치로 경매 선택, 드래그로 배치, 길게 눌러 즉시 입찰, 연속 성공이 끊기지 않게 안전 루트 유지, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
        const CLEAR_CONDITION = "콤보를 유지하며 시간을 0으로 만들지 않고 마지막 경매를 넘기면 클리어";
        const FAIL_CONDITION = "콤보가 여러 번 끊기거나 시간 잔고가 바닥나거나 코어가 파괴되면 실패";

        const TRACKS = [
          { lane: 0, y: 152, label: "UPLINE A", tint: "#82d9ff" },
          { lane: 1, y: 270, label: "EXCHANGE B", tint: "#ffd26f" },
          { lane: 2, y: 388, label: "DOWNLINE C", tint: "#ff8fbc" },
        ];

        const ROUTE_X = 412;
        const GEAR_X = 690;
        const CORE_X = 860;
        const SPAWN_X = 96;
        const TOTAL_AUCTIONS = 8;
        const AUCTION_DURATION = 5.2;
        const AUCTION_GAP = 4.45;
        const START_RESERVE = 28.5;
        const PASSIVE_DRAIN = 0.17;
        const START_CORE = 100;
        const MAX_BREAKS = 3;

        const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

        const SLOT_BLUEPRINTS = TRACKS.flatMap((track) => [
          {
            id: `route-${track.lane}`,
            kind: "route",
            lane: track.lane,
            x: ROUTE_X,
            y: track.y - 16,
            ring: 22,
          },
          {
            id: `gear-${track.lane}`,
            kind: "gear",
            lane: track.lane,
            x: GEAR_X,
            y: track.y + 16,
            ring: 24,
          },
        ]);

        const CARD_LIBRARY = {
          safe_route: {
            key: "safe_route",
            kind: "route",
            title: "SAFE ROUTE",
            subtitle: "안전 신호권",
            cost: 2.4,
            duration: 14.6,
            color: "#64dfff",
            accent: "#1e88ff",
            detail: "선로 균열 차단",
            shield: 1,
            slow: 0.9,
          },
          overclock_rail: {
            key: "overclock_rail",
            kind: "route",
            title: "OVERCLOCK",
            subtitle: "오버클럭 우회선",
            cost: 3.5,
            duration: 10.5,
            color: "#ffd16f",
            accent: "#ff8d3b",
            detail: "통과 시 전기 폭주",
            shield: 1,
            slow: 0.72,
            routeBurst: 22,
          },
          pulse_turret: {
            key: "pulse_turret",
            kind: "gear",
            title: "PULSE TURRET",
            subtitle: "펄스 포탑",
            cost: 3.6,
            duration: 16.2,
            color: "#87ffbf",
            accent: "#0ad67c",
            detail: "강한 단발 요격",
            power: 37,
            cooldown: 0.63,
            refund: 0.12,
          },
          hedge_drone: {
            key: "hedge_drone",
            kind: "gear",
            title: "HEDGE DRONE",
            subtitle: "헤지 드론",
            cost: 4.1,
            duration: 12.4,
            color: "#ff8fc3",
            accent: "#ff4d8c",
            detail: "빠른 연사와 환급",
            power: 20,
            cooldown: 0.34,
            refund: 0.28,
          },
          signal_jammer: {
            key: "signal_jammer",
            kind: "gear",
            title: "SIGNAL JAM",
            subtitle: "신호 재머",
            cost: 2.9,
            duration: 11.2,
            color: "#c7a4ff",
            accent: "#8e55ff",
            detail: "감속과 약한 저격",
            power: 13,
            cooldown: 0.46,
            refund: 0.1,
            slow: 0.58,
          },
        };

        const AUCTION_SETS = [
          ["safe_route", "pulse_turret", "signal_jammer"],
          ["overclock_rail", "safe_route", "pulse_turret"],
          ["hedge_drone", "safe_route", "pulse_turret"],
          ["overclock_rail", "signal_jammer", "hedge_drone"],
          ["safe_route", "pulse_turret", "hedge_drone"],
          ["overclock_rail", "signal_jammer", "pulse_turret"],
          ["safe_route", "hedge_drone", "overclock_rail"],
          ["pulse_turret", "signal_jammer", "hedge_drone"],
        ];

        const WAVE_BLUEPRINTS = [
          [
            { lane: 1, type: "collector", delay: 0.8 },
            { lane: 0, type: "collector", delay: 1.5 },
            { lane: 1, type: "broker", delay: 2.2 },
          ],
          [
            { lane: 2, type: "collector", delay: 0.9 },
            { lane: 0, type: "collector", delay: 1.4 },
            { lane: 2, type: "broker", delay: 2.0 },
            { lane: 1, type: "collector", delay: 2.7 },
          ],
          [
            { lane: 0, type: "broker", delay: 0.8 },
            { lane: 1, type: "collector", delay: 1.2 },
            { lane: 2, type: "collector", delay: 1.8 },
            { lane: 1, type: "broker", delay: 2.5 },
            { lane: 0, type: "collector", delay: 3.1 },
          ],
          [
            { lane: 2, type: "broker", delay: 0.8 },
            { lane: 1, type: "collector", delay: 1.1 },
            { lane: 0, type: "collector", delay: 1.8 },
            { lane: 2, type: "express", delay: 2.5 },
            { lane: 1, type: "broker", delay: 3.0 },
          ],
          [
            { lane: 1, type: "broker", delay: 0.7 },
            { lane: 0, type: "collector", delay: 1.2 },
            { lane: 2, type: "broker", delay: 1.8 },
            { lane: 0, type: "express", delay: 2.5 },
            { lane: 1, type: "collector", delay: 3.0 },
            { lane: 2, type: "collector", delay: 3.6 },
          ],
          [
            { lane: 0, type: "broker", delay: 0.75 },
            { lane: 2, type: "collector", delay: 1.15 },
            { lane: 1, type: "express", delay: 1.8 },
            { lane: 0, type: "collector", delay: 2.45 },
            { lane: 2, type: "broker", delay: 3.0 },
            { lane: 1, type: "collector", delay: 3.5 },
          ],
          [
            { lane: 2, type: "express", delay: 0.8 },
            { lane: 1, type: "broker", delay: 1.2 },
            { lane: 0, type: "broker", delay: 1.7 },
            { lane: 2, type: "collector", delay: 2.2 },
            { lane: 1, type: "express", delay: 2.8 },
            { lane: 0, type: "collector", delay: 3.35 },
            { lane: 2, type: "broker", delay: 3.9 },
          ],
          [
            { lane: 0, type: "express", delay: 0.7 },
            { lane: 1, type: "broker", delay: 1.05 },
            { lane: 2, type: "express", delay: 1.5 },
            { lane: 0, type: "collector", delay: 2.0 },
            { lane: 1, type: "express", delay: 2.45 },
            { lane: 2, type: "broker", delay: 2.95 },
            { lane: 0, type: "broker", delay: 3.45 },
            { lane: 1, type: "collector", delay: 3.95 },
          ],
        ];

        const ENEMY_LIBRARY = {
          collector: {
            key: "collector",
            hp: 54,
            speed: 85,
            radius: 14,
            tint: "#84deff",
            reward: 0.18,
            damage: 22,
          },
          broker: {
            key: "broker",
            hp: 92,
            speed: 72,
            radius: 17,
            tint: "#ffd77b",
            reward: 0.22,
            damage: 28,
          },
          express: {
            key: "express",
            hp: 128,
            speed: 102,
            radius: 19,
            tint: "#ff87a0",
            reward: 0.3,
            damage: 34,
          },
        };

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function lerp(a, b, t) {
          return a + (b - a) * t;
        }

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - t, 3);
        }

        function formatTime(value) {
          return `${Math.max(0, value).toFixed(1)}s`;
        }

        function randomBetween(min, max) {
          return lerp(min, max, Math.random());
        }

        function inRelayHost() {
          try {
            return window.parent && window.parent !== window && window.parent.RelayHost;
          } catch (error) {
            return false;
          }
        }

        let animationFrame = 0;
        let lastTimestamp = 0;
        let hostFailedReported = false;
        let hostClearedReported = false;
        let visualClock = 0;
        let pointer = { active: false, x: 0, y: 0 };
        let dragState = null;
        let longPressToken = 0;

        const state = {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          reserveTime: START_RESERVE,
          coreIntegrity: START_CORE,
          combo: 0,
          comboBreaks: 0,
          comboThreshold: 5,
          note: DESCRIPTION,
          auctionIndex: 0,
          auctionGap: 0.18,
          currentAuction: null,
          enemies: [],
          pendingSpawns: [],
          particles: [],
          beams: [],
          floaters: [],
          slots: SLOT_BLUEPRINTS.map((slot) => ({ ...slot, item: null, flash: 0 })),
          laneBreachLock: [0, 0, 0],
          lastOutcome: "",
          impact: 0,
          hint: "화면을 눌러 장을 열고 경매를 시작하세요.",
        };

        function getSlot(lane, kind) {
          return state.slots.find((slot) => slot.lane === lane && slot.kind === kind) || null;
        }

        function getLaneTrack(lane) {
          return TRACKS.find((track) => track.lane === lane) || TRACKS[0];
        }

        function clearTransientInput() {
          if (dragState?.longPressTimer) {
            clearTimeout(dragState.longPressTimer);
          }
          dragState = null;
        }

        function resetStage(mode = "menu") {
          state.mode = mode;
          state.elapsed = 0;
          state.lastRunTime = 0;
          state.reserveTime = START_RESERVE;
          state.coreIntegrity = START_CORE;
          state.combo = 0;
          state.comboBreaks = 0;
          state.comboThreshold = 5;
          state.auctionIndex = 0;
          state.auctionGap = 0.18;
          state.currentAuction = null;
          state.enemies = [];
          state.pendingSpawns = [];
          state.particles = [];
          state.beams = [];
          state.floaters = [];
          state.laneBreachLock = [0, 0, 0];
          state.lastOutcome = "";
          state.impact = 0;
          state.hint = "클릭 또는 터치로 경매를 고르고, 슬롯으로 드래그하세요.";
          state.slots = SLOT_BLUEPRINTS.map((slot) => ({ ...slot, item: null, flash: 0 }));
          clearTransientInput();
          window.relayStageResult.status = mode === "cleared" ? "cleared" : mode === "failed" ? "failed" : "running";
          hostFailedReported = false;
          hostClearedReported = false;
        }

        function reportReadyToHost() {
          if (!inRelayHost()) {
            return;
          }
          window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
        }

        function reportFailedToHost(reason = "failed") {
          if (!inRelayHost() || hostFailedReported) {
            return;
          }
          hostFailedReported = true;
          window.parent.RelayHost.onStageFailed?.({
            stageId: window.relayStageMeta.id,
            stageTitle: window.relayStageMeta.title,
            reason,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function reportClearedToHost() {
          if (!inRelayHost() || hostClearedReported) {
            return;
          }
          hostClearedReported = true;
          window.parent.RelayHost.onStageCleared?.({
            stageId: window.relayStageMeta.id,
            stageTitle: window.relayStageMeta.title,
            clearCountAfter: relayContext.clearCount + 1,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function addFloater(text, x, y, color = "#f8fafc", accent = "#7dd3fc", size = 16) {
          state.floaters.push({
            text,
            x,
            y,
            life: 1,
            color,
            accent,
            size,
          });
        }

        function spawnImpact(x, y, color, count, spread = 1) {
          for (let index = 0; index < count; index += 1) {
            const angle = (Math.PI * 2 * index) / Math.max(1, count) + Math.random() * 0.4;
            const speed = randomBetween(28, 120) * spread;
            state.particles.push({
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: randomBetween(0.35, 0.9),
              size: randomBetween(2, 6),
              color,
            });
          }
        }

        function addBeam(slot, target, color) {
          state.beams.push({
            x1: slot.x,
            y1: slot.y,
            x2: target.x,
            y2: target.y,
            color,
            life: 0.15,
          });
        }

        function getAuctionCardRects() {
          if (!state.currentAuction) {
            return [];
          }
          const cards = state.currentAuction.offers;
          const gap = 20;
          const width = 212;
          const height = 108;
          const totalWidth = cards.length * width + (cards.length - 1) * gap;
          const startX = (VIEW.width - totalWidth) * 0.5;
          const y = VIEW.height - 136;
          return cards.map((offer, index) => ({
            offerId: offer.id,
            x: startX + index * (width + gap),
            y,
            width,
            height,
          }));
        }

        function buildAuction(index) {
          const keys = AUCTION_SETS[Math.min(index, AUCTION_SETS.length - 1)];
          return {
            id: `auction-${index + 1}`,
            index,
            timer: AUCTION_DURATION,
            offers: keys.map((key, cardIndex) => ({
              id: `offer-${index}-${cardIndex}`,
              key,
            })),
          };
        }

        function spawnEnemy(entry) {
          const base = ENEMY_LIBRARY[entry.type];
          const track = getLaneTrack(entry.lane);
          state.enemies.push({
            id: `${entry.type}-${state.elapsed.toFixed(3)}-${Math.random().toString(16).slice(2, 6)}`,
            lane: entry.lane,
            type: entry.type,
            x: SPAWN_X,
            y: track.y,
            hp: base.hp,
            maxHp: base.hp,
            speed: base.speed,
            radius: base.radius,
            tint: base.tint,
            reward: base.reward,
            damage: base.damage,
            breachTriggered: false,
            routeBurstDone: false,
            slowTimer: 0,
            wobble: randomBetween(0, Math.PI * 2),
          });
        }

        function scheduleWave(index) {
          const blueprint = WAVE_BLUEPRINTS[Math.min(index, WAVE_BLUEPRINTS.length - 1)] || [];
          for (const entry of blueprint) {
            state.pendingSpawns.push({
              ...entry,
              time: state.elapsed + entry.delay,
            });
          }
          state.pendingSpawns.sort((a, b) => a.time - b.time);
        }

        function openNextAuction() {
          if (state.auctionIndex >= TOTAL_AUCTIONS || state.currentAuction) {
            return;
          }
          state.currentAuction = buildAuction(state.auctionIndex);
          scheduleWave(state.auctionIndex);
          state.comboThreshold = 5 + Math.floor(state.auctionIndex / 2);
          addFloater(
            state.auctionIndex === TOTAL_AUCTIONS - 1 ? "마지막 경매 개장" : `경매 ${state.auctionIndex + 1} 개장`,
            VIEW.width * 0.5,
            90,
            "#fef3c7",
            "#fb923c",
            18
          );
          state.auctionIndex += 1;
        }

        function closeAuction(skipped = false) {
          if (!state.currentAuction) {
            return;
          }
          if (skipped) {
            addFloater("유찰", VIEW.width * 0.5, VIEW.height - 146, "#dbeafe", "#60a5fa", 18);
          }
          state.currentAuction = null;
          state.auctionGap = AUCTION_GAP;
          clearTransientInput();
        }

        function laneThreatScore(lane) {
          let score = 0;
          for (const enemy of state.enemies) {
            if (enemy.lane === lane) {
              score += enemy.type === "express" ? 2.3 : enemy.type === "broker" ? 1.6 : 1;
            }
          }
          for (const pending of state.pendingSpawns) {
            if (pending.lane === lane && pending.time <= state.elapsed + 4.8) {
              score += pending.type === "express" ? 1.9 : pending.type === "broker" ? 1.35 : 0.85;
            }
          }
          return score;
        }

        function recommendedSlotForCard(cardKey) {
          const definition = CARD_LIBRARY[cardKey];
          const candidates = state.slots.filter((slot) => slot.kind === definition.kind);
          if (!candidates.length) {
            return null;
          }
          let best = candidates[0];
          let bestScore = -Infinity;
          for (const slot of candidates) {
            const threat = laneThreatScore(slot.lane);
            const active = slot.item && slot.item.expiresAt > state.elapsed;
            const remaining = active ? slot.item.expiresAt - state.elapsed : 0;
            const scarcity = active ? clamp(1.5 - remaining / 6, 0.2, 1.2) : 1.5;
            const score = threat * scarcity + (active ? 0.3 : 1.4);
            if (score > bestScore) {
              bestScore = score;
              best = slot;
            }
          }
          return best;
        }

        function applyPurchase(slot, cardKey, instant = false) {
          const definition = CARD_LIBRARY[cardKey];
          if (!slot || slot.kind !== definition.kind || state.mode !== "running") {
            return false;
          }
          const cost = definition.cost + (instant ? 0.6 : 0);
          if (state.reserveTime - cost <= 0) {
            addFloater("시간 부족", slot.x, slot.y - 28, "#fee2e2", "#f87171");
            state.impact = Math.max(state.impact, 6);
            return false;
          }
          state.reserveTime -= cost;
          slot.item = {
            key: definition.key,
            title: definition.subtitle,
            def: definition,
            expiresAt: state.elapsed + definition.duration,
            cooldown: definition.cooldown || 0,
            pulse: 0.9,
          };
          slot.flash = 1;
          addFloater(
            instant ? `${definition.subtitle} 즉시 낙찰` : `${definition.subtitle} 낙찰`,
            slot.x,
            slot.y - 34,
            "#f8fafc",
            definition.color
          );
          spawnImpact(slot.x, slot.y, definition.color, instant ? 22 : 16, 1.1);
          state.hint = "연속 성공이 끊기지 않게 안전 루트 유지.";
          closeAuction(false);
          return true;
        }

        function handleComboBreak(lane, reason) {
          if (state.laneBreachLock[lane] > 0 || state.mode !== "running") {
            return;
          }
          state.laneBreachLock[lane] = 1.8;
          state.combo = 0;
          state.comboBreaks += 1;
          const track = getLaneTrack(lane);
          addFloater("콤보 붕괴", ROUTE_X + 22, track.y - 26, "#fee2e2", "#fb7185", 18);
          spawnImpact(ROUTE_X + 12, track.y, "#fb7185", 24, 1.4);
          state.impact = Math.max(state.impact, 11);
          state.lastOutcome = reason;
          if (state.comboBreaks >= MAX_BREAKS) {
            failStage("combo-break");
          }
        }

        function destroyEnemy(enemy, source) {
          const rewardBonus = state.combo >= state.comboThreshold ? 0.26 : 0;
          const reward = enemy.reward + (source?.def?.refund || 0) + rewardBonus;
          state.reserveTime = clamp(state.reserveTime + reward, 0, 34.5);
          state.combo += 1;
          const surge = state.combo >= state.comboThreshold;
          const color = surge ? "#ffe28a" : "#b8f7ff";
          addFloater(`+${reward.toFixed(1)}s`, enemy.x, enemy.y - 20, "#f8fafc", color, 15);
          if (surge && state.combo === state.comboThreshold) {
            addFloater("콤보 임계치 돌입", enemy.x, enemy.y - 44, "#fff7cc", "#f59e0b", 18);
          }
          spawnImpact(enemy.x, enemy.y, enemy.tint, 18, 1.2);
          state.enemies = state.enemies.filter((entry) => entry.id !== enemy.id);
        }

        function leakEnemy(enemy) {
          state.coreIntegrity = clamp(state.coreIntegrity - enemy.damage, 0, START_CORE);
          state.enemies = state.enemies.filter((entry) => entry.id !== enemy.id);
          addFloater(`코어 -${enemy.damage}`, CORE_X - 16, enemy.y - 32, "#fee2e2", "#f97316");
          spawnImpact(CORE_X - 18, enemy.y, "#ff7f6a", 20, 1.3);
          state.impact = Math.max(state.impact, 14);
          state.lastOutcome = "코어가 시장 충격을 맞았습니다.";
          if (state.coreIntegrity <= 0) {
            failStage("core-destroyed");
          }
        }

        function failStage(reason = "failed") {
          if (state.mode === "failed" || state.mode === "cleared") {
            return;
          }
          state.mode = "failed";
          state.lastRunTime = state.elapsed;
          window.relayStageResult.status = "failed";
          reportFailedToHost(reason);
        }

        function clearStage() {
          if (state.mode === "cleared") {
            return;
          }
          state.mode = "cleared";
          state.lastRunTime = state.elapsed;
          window.relayStageResult.status = "cleared";
          addFloater("종점 돌파", VIEW.width * 0.5, 144, "#fff7cc", "#22c55e", 20);
          reportClearedToHost();
        }

        function startStage() {
          resetStage("running");
          state.hint = "길게 눌러 즉시 입찰, 위험한 라인에 먼저 배치하세요.";
          canvas.focus({ preventScroll: true });
        }

        function getRouteSlotForLane(lane) {
          return getSlot(lane, "route");
        }

        function getGearSlotForLane(lane) {
          return getSlot(lane, "gear");
        }

        function updateWorld(dt) {
          visualClock += dt;
          state.impact = Math.max(0, state.impact - dt * 20);
          for (let lane = 0; lane < state.laneBreachLock.length; lane += 1) {
            state.laneBreachLock[lane] = Math.max(0, state.laneBreachLock[lane] - dt);
          }
          for (const floater of state.floaters) {
            floater.life -= dt * 1.25;
            floater.y -= dt * 26;
          }
          state.floaters = state.floaters.filter((floater) => floater.life > 0);
          for (const particle of state.particles) {
            particle.life -= dt;
            particle.x += particle.vx * dt;
            particle.y += particle.vy * dt;
            particle.vx *= 0.98;
            particle.vy = particle.vy * 0.98 + 18 * dt;
          }
          state.particles = state.particles.filter((particle) => particle.life > 0);
          for (const beam of state.beams) {
            beam.life -= dt;
          }
          state.beams = state.beams.filter((beam) => beam.life > 0);

          for (const slot of state.slots) {
            slot.flash = Math.max(0, slot.flash - dt * 2.4);
            if (slot.item) {
              slot.item.pulse = Math.max(0, slot.item.pulse - dt * 1.6);
            }
          }

          if (state.mode !== "running") {
            return;
          }

          state.elapsed += dt;
          state.reserveTime = Math.max(0, state.reserveTime - dt * PASSIVE_DRAIN);

          if (state.reserveTime <= 0) {
            failStage("time-empty");
          }

          if (state.currentAuction) {
            state.currentAuction.timer -= dt;
            if (state.currentAuction.timer <= 0) {
              closeAuction(true);
            }
          } else if (state.auctionIndex < TOTAL_AUCTIONS) {
            state.auctionGap -= dt;
            if (state.auctionGap <= 0) {
              openNextAuction();
            }
          }

          while (state.pendingSpawns.length && state.pendingSpawns[0].time <= state.elapsed) {
            spawnEnemy(state.pendingSpawns.shift());
          }

          for (const slot of state.slots) {
            if (!slot.item) {
              continue;
            }
            if (slot.item.expiresAt <= state.elapsed) {
              addFloater("만료", slot.x, slot.y - 24, "#dbeafe", "#60a5fa", 14);
              slot.item = null;
              continue;
            }
            if (slot.kind === "gear") {
              slot.item.cooldown -= dt * (state.combo >= state.comboThreshold ? 1.15 : 1);
              if (slot.item.cooldown <= 0) {
                const enemies = state.enemies
                  .filter((enemy) => enemy.lane === slot.lane)
                  .sort((a, b) => b.x - a.x);
                const target = enemies[0];
                if (target) {
                  const power = slot.item.def.power * (state.combo >= state.comboThreshold ? 1.12 : 1);
                  target.hp -= power;
                  slot.item.cooldown = slot.item.def.cooldown;
                  slot.item.pulse = 1;
                  addBeam(slot, target, slot.item.def.color);
                  if (slot.item.def.slow) {
                    target.slowTimer = Math.max(target.slowTimer, 0.55);
                  }
                  if (target.hp <= 0) {
                    destroyEnemy(target, slot.item);
                  }
                }
              }
            }
          }

          const remainingEnemies = [];
          for (const enemy of state.enemies) {
            const routeSlot = getRouteSlotForLane(enemy.lane);
            const routeActive = routeSlot?.item && routeSlot.item.expiresAt > state.elapsed;
            const gearSlot = getGearSlotForLane(enemy.lane);
            const gearActive = gearSlot?.item && gearSlot.item.expiresAt > state.elapsed;
            const routeSlow = routeActive ? routeSlot.item.def.slow || 1 : 1;
            const jammerSlow = gearActive && gearSlot.item.def.slow ? gearSlot.item.def.slow : 1;
            const temporarySlow = enemy.slowTimer > 0 ? 0.72 : 1;

            enemy.slowTimer = Math.max(0, enemy.slowTimer - dt);
            enemy.wobble += dt * 8;
            enemy.x += enemy.speed * routeSlow * jammerSlow * temporarySlow * dt;
            enemy.y = getLaneTrack(enemy.lane).y + Math.sin(enemy.wobble) * 3;

            if (!enemy.breachTriggered && enemy.x >= ROUTE_X - 10) {
              enemy.breachTriggered = true;
              if (!routeActive) {
                handleComboBreak(enemy.lane, "안전 루트 붕괴");
              } else if (routeSlot.item.def.routeBurst && !enemy.routeBurstDone) {
                enemy.routeBurstDone = true;
                enemy.hp -= routeSlot.item.def.routeBurst;
                routeSlot.item.pulse = 1;
                spawnImpact(enemy.x, enemy.y, routeSlot.item.def.color, 12, 0.8);
                if (enemy.hp <= 0) {
                  destroyEnemy(enemy, routeSlot.item);
                  continue;
                }
              }
            }

            if (enemy.x >= CORE_X) {
              leakEnemy(enemy);
              continue;
            }

            remainingEnemies.push(enemy);
          }
          state.enemies = remainingEnemies;

          if (
            state.auctionIndex >= TOTAL_AUCTIONS &&
            !state.currentAuction &&
            state.pendingSpawns.length === 0 &&
            state.enemies.length === 0 &&
            state.mode === "running"
          ) {
            clearStage();
          }
        }

        function drawRoundedRect(x, y, width, height, radius) {
          const clampedRadius = Math.min(radius, width * 0.5, height * 0.5);
          ctx.beginPath();
          ctx.moveTo(x + clampedRadius, y);
          ctx.arcTo(x + width, y, x + width, y + height, clampedRadius);
          ctx.arcTo(x + width, y + height, x, y + height, clampedRadius);
          ctx.arcTo(x, y + height, x, y, clampedRadius);
          ctx.arcTo(x, y, x + width, y, clampedRadius);
          ctx.closePath();
        }

        function drawTextBlock(lines, x, y, width, lineHeight, color, size, weight = "600", align = "left") {
          ctx.save();
          ctx.font = `${weight} ${size}px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif`;
          ctx.fillStyle = color;
          ctx.textAlign = align;
          ctx.textBaseline = "top";
          let cursorY = y;
          for (const line of lines) {
            ctx.fillText(line, x, cursorY, width);
            cursorY += lineHeight;
          }
          ctx.restore();
        }

        function wrapLines(text, maxWidth, font) {
          ctx.save();
          ctx.font = font;
          const words = String(text).split(" ");
          const lines = [];
          let line = "";
          for (const word of words) {
            const candidate = line ? `${line} ${word}` : word;
            if (ctx.measureText(candidate).width <= maxWidth || !line) {
              line = candidate;
            } else {
              lines.push(line);
              line = word;
            }
          }
          if (line) {
            lines.push(line);
          }
          ctx.restore();
          return lines;
        }

        function drawBackground() {
          const duskGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
          duskGradient.addColorStop(0, "#191a33");
          duskGradient.addColorStop(0.28, "#30294a");
          duskGradient.addColorStop(0.6, "#151c26");
          duskGradient.addColorStop(1, "#070a12");
          ctx.fillStyle = duskGradient;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          for (let index = 0; index < 7; index += 1) {
            const x = 32 + index * 134;
            const windowGlow = ctx.createLinearGradient(x, 34, x + 96, 152);
            windowGlow.addColorStop(0, "rgba(255, 193, 118, 0.18)");
            windowGlow.addColorStop(1, "rgba(66, 132, 255, 0.05)");
            ctx.fillStyle = "rgba(12, 19, 33, 0.65)";
            drawRoundedRect(x, 32, 96, 126, 18);
            ctx.fill();
            ctx.fillStyle = windowGlow;
            drawRoundedRect(x + 6, 38, 84, 114, 14);
            ctx.fill();
          }

          ctx.fillStyle = "rgba(6, 11, 20, 0.92)";
          ctx.fillRect(0, 166, VIEW.width, 248);
          ctx.fillStyle = "rgba(12, 16, 22, 0.98)";
          ctx.fillRect(0, 414, VIEW.width, 126);

          const streakBase = (visualClock * 140) % 220;
          for (let index = -1; index < 6; index += 1) {
            const x = VIEW.width - streakBase - index * 218;
            const streak = ctx.createLinearGradient(x, 0, x + 136, 0);
            streak.addColorStop(0, "rgba(255, 207, 96, 0)");
            streak.addColorStop(0.5, "rgba(255, 207, 96, 0.16)");
            streak.addColorStop(1, "rgba(255, 207, 96, 0)");
            ctx.fillStyle = streak;
            ctx.fillRect(x, 194, 136, 164);
          }

          ctx.fillStyle = "rgba(255, 174, 98, 0.08)";
          ctx.fillRect(0, 408, VIEW.width, 4);

          for (const track of TRACKS) {
            const glow = ctx.createLinearGradient(SPAWN_X, track.y, CORE_X, track.y);
            glow.addColorStop(0, "rgba(255,255,255,0)");
            glow.addColorStop(0.28, "rgba(255,255,255,0.06)");
            glow.addColorStop(1, "rgba(255,255,255,0)");
            ctx.strokeStyle = glow;
            ctx.lineWidth = 30;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(SPAWN_X, track.y);
            ctx.lineTo(CORE_X, track.y);
            ctx.stroke();

            ctx.strokeStyle = "rgba(255,255,255,0.08)";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(SPAWN_X, track.y - 9);
            ctx.lineTo(CORE_X, track.y - 9);
            ctx.moveTo(SPAWN_X, track.y + 9);
            ctx.lineTo(CORE_X, track.y + 9);
            ctx.stroke();

            ctx.fillStyle = "rgba(235, 245, 255, 0.72)";
            ctx.font = '700 11px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText(track.label, 56, track.y - 28);
          }

          const coreGlow = ctx.createRadialGradient(CORE_X - 12, 270, 12, CORE_X - 12, 270, 108);
          coreGlow.addColorStop(0, "rgba(110, 235, 255, 0.35)");
          coreGlow.addColorStop(1, "rgba(110, 235, 255, 0)");
          ctx.fillStyle = coreGlow;
          ctx.fillRect(CORE_X - 130, 160, 180, 220);

          drawRoundedRect(CORE_X - 42, 188, 58, 164, 22);
          const coreShell = ctx.createLinearGradient(CORE_X - 42, 188, CORE_X + 16, 352);
          coreShell.addColorStop(0, "rgba(20, 34, 52, 0.95)");
          coreShell.addColorStop(1, "rgba(8, 16, 28, 0.98)");
          ctx.fillStyle = coreShell;
          ctx.fill();

          ctx.fillStyle = "rgba(120, 247, 255, 0.9)";
          ctx.beginPath();
          ctx.arc(CORE_X - 13, 270, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(240, 255, 255, 0.96)";
          ctx.beginPath();
          ctx.arc(CORE_X - 13, 270, 7, 0, Math.PI * 2);
          ctx.fill();
        }

        function drawSlots() {
          for (const slot of state.slots) {
            const active = slot.item && slot.item.expiresAt > state.elapsed;
            const definition = active ? slot.item.def : null;
            const pulse = active ? 0.65 + Math.sin(visualClock * 6 + slot.lane) * 0.08 + slot.item.pulse * 0.3 : 0;
            ctx.save();
            const ringGradient = ctx.createRadialGradient(slot.x, slot.y, 4, slot.x, slot.y, 28);
            ringGradient.addColorStop(0, active ? `${definition.color}dd` : "rgba(255,255,255,0.12)");
            ringGradient.addColorStop(1, "rgba(255,255,255,0)");
            ctx.fillStyle = ringGradient;
            ctx.beginPath();
            ctx.arc(slot.x, slot.y, 34 + pulse * 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = active ? definition.color : "rgba(255,255,255,0.24)";
            ctx.lineWidth = active ? 4 : 2;
            ctx.beginPath();
            ctx.arc(slot.x, slot.y, slot.ring, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = active ? "rgba(10, 17, 28, 0.95)" : "rgba(10, 17, 28, 0.7)";
            ctx.beginPath();
            ctx.arc(slot.x, slot.y, slot.ring - 6, 0, Math.PI * 2);
            ctx.fill();

            if (active) {
              ctx.fillStyle = definition.color;
              ctx.beginPath();
              ctx.arc(slot.x, slot.y, 7 + pulse * 2, 0, Math.PI * 2);
              ctx.fill();
              ctx.font = '700 10px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
              ctx.fillStyle = "rgba(248,250,252,0.94)";
              ctx.textAlign = "center";
              ctx.fillText(
                formatTime(slot.item.expiresAt - state.elapsed),
                slot.x,
                slot.y + slot.ring + 10
              );
            } else {
              ctx.font = '700 9px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
              ctx.fillStyle = "rgba(226,232,240,0.64)";
              ctx.textAlign = "center";
              ctx.fillText(slot.kind === "route" ? "ROUTE" : "GEAR", slot.x, slot.y + slot.ring + 10);
            }
            ctx.restore();
          }

          for (const track of TRACKS) {
            const routeSlot = getRouteSlotForLane(track.lane);
            const routeActive = routeSlot?.item && routeSlot.item.expiresAt > state.elapsed;
            const trackGradient = ctx.createLinearGradient(SPAWN_X, track.y, ROUTE_X + 90, track.y);
            trackGradient.addColorStop(
              0,
              routeActive ? `${routeSlot.item.def.color}22` : "rgba(255, 120, 120, 0.08)"
            );
            trackGradient.addColorStop(
              1,
              routeActive ? `${routeSlot.item.def.color}aa` : "rgba(255, 120, 120, 0.3)"
            );
            ctx.strokeStyle = trackGradient;
            ctx.lineWidth = 10;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(SPAWN_X + 12, track.y);
            ctx.lineTo(ROUTE_X + 30, track.y);
            ctx.stroke();
          }
        }

        function drawEnemies() {
          for (const enemy of state.enemies) {
            const glow = ctx.createRadialGradient(enemy.x, enemy.y, 3, enemy.x, enemy.y, enemy.radius * 2.6);
            glow.addColorStop(0, `${enemy.tint}cc`);
            glow.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius * 2.4, 0, Math.PI * 2);
            ctx.fill();

            const body = ctx.createLinearGradient(
              enemy.x - enemy.radius,
              enemy.y - enemy.radius,
              enemy.x + enemy.radius,
              enemy.y + enemy.radius
            );
            body.addColorStop(0, "rgba(249,250,251,0.92)");
            body.addColorStop(1, enemy.tint);
            ctx.fillStyle = body;
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(10,14,20,0.88)";
            ctx.beginPath();
            ctx.arc(enemy.x + enemy.radius * 0.12, enemy.y - enemy.radius * 0.08, enemy.radius * 0.4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(248,250,252,0.96)";
            ctx.beginPath();
            ctx.arc(enemy.x + enemy.radius * 0.16, enemy.y - enemy.radius * 0.11, enemy.radius * 0.18, 0, Math.PI * 2);
            ctx.fill();

            const hpRatio = clamp(enemy.hp / enemy.maxHp, 0, 1);
            drawRoundedRect(enemy.x - 22, enemy.y - enemy.radius - 16, 44, 5, 3);
            ctx.fillStyle = "rgba(15,23,42,0.74)";
            ctx.fill();
            drawRoundedRect(enemy.x - 22, enemy.y - enemy.radius - 16, 44 * hpRatio, 5, 3);
            ctx.fillStyle = hpRatio > 0.45 ? "rgba(103,232,249,0.94)" : "rgba(251,191,36,0.94)";
            ctx.fill();
          }
        }

        function drawParticles() {
          for (const particle of state.particles) {
            ctx.fillStyle = particle.color.replace(")", `, ${clamp(particle.life, 0, 1)})`).replace("rgb", "rgba");
            if (!ctx.fillStyle.includes("rgba")) {
              ctx.fillStyle = particle.color;
              ctx.globalAlpha = clamp(particle.life, 0, 1);
            }
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size * clamp(particle.life * 1.2, 0.2, 1), 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }

        function drawBeams() {
          for (const beam of state.beams) {
            ctx.save();
            ctx.globalAlpha = clamp(beam.life * 6, 0, 1);
            ctx.strokeStyle = beam.color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(beam.x1, beam.y1);
            ctx.lineTo(beam.x2, beam.y2);
            ctx.stroke();
            ctx.restore();
          }
        }

        function drawHud() {
          drawRoundedRect(24, 20, 266, 82, 24);
          ctx.fillStyle = "rgba(7, 14, 24, 0.74)";
          ctx.fill();
          drawRoundedRect(304, 20, 188, 82, 24);
          ctx.fillStyle = "rgba(7, 14, 24, 0.68)";
          ctx.fill();
          drawRoundedRect(508, 20, 210, 82, 24);
          ctx.fillStyle = "rgba(7, 14, 24, 0.68)";
          ctx.fill();
          drawRoundedRect(732, 20, 204, 82, 24);
          ctx.fillStyle = "rgba(7, 14, 24, 0.68)";
          ctx.fill();

          drawTextBlock(["TIME RESERVE"], 42, 34, 180, 14, "rgba(226,232,240,0.7)", 11, "700");
          drawTextBlock([formatTime(state.reserveTime)], 42, 50, 140, 24, "#f8fafc", 30, "800");
          drawTextBlock(["CORE"], 184, 34, 70, 14, "rgba(226,232,240,0.7)", 11, "700", "right");
          drawTextBlock([`${Math.round(state.coreIntegrity)}%`], 248, 50, 70, 24, "#9be7ff", 24, "800", "right");

          drawTextBlock(["COMBO"], 324, 34, 110, 14, "rgba(226,232,240,0.7)", 11, "700");
          drawTextBlock([`x${state.combo}`], 324, 52, 96, 22, "#fff7cc", 28, "800");
          drawTextBlock([`임계치 ${state.comboThreshold}`], 414, 58, 90, 18, "rgba(253,224,71,0.92)", 14, "700", "right");

          drawTextBlock(["BREAKS"], 530, 34, 100, 14, "rgba(226,232,240,0.7)", 11, "700");
          drawTextBlock([`${state.comboBreaks}/${MAX_BREAKS}`], 530, 54, 80, 18, "#fda4af", 22, "800");
          drawTextBlock(["MARKET"], 622, 34, 80, 14, "rgba(226,232,240,0.7)", 11, "700", "right");
          drawTextBlock([`${state.auctionIndex}/${TOTAL_AUCTIONS}`], 694, 54, 90, 18, "#c4b5fd", 22, "800", "right");

          drawTextBlock(["SURGE"], 754, 34, 100, 14, "rgba(226,232,240,0.7)", 11, "700");
          drawTextBlock(
            [state.combo >= state.comboThreshold ? "ACTIVE" : "STABLE"],
            754,
            55,
            108,
            18,
            state.combo >= state.comboThreshold ? "#fde68a" : "#bae6fd",
            20,
            "800"
          );
          drawTextBlock(
            [state.lastOutcome || state.hint],
            866,
            38,
            100,
            15,
            "rgba(226,232,240,0.78)",
            11,
            "700",
            "right"
          );
        }

        function drawAuctionPanel() {
          if (!state.currentAuction) {
            return;
          }
          drawRoundedRect(146, VIEW.height - 160, VIEW.width - 292, 126, 30);
          const trayGradient = ctx.createLinearGradient(0, VIEW.height - 160, 0, VIEW.height - 34);
          trayGradient.addColorStop(0, "rgba(6, 12, 21, 0.76)");
          trayGradient.addColorStop(1, "rgba(6, 12, 21, 0.9)");
          ctx.fillStyle = trayGradient;
          ctx.fill();

          ctx.fillStyle = "rgba(255,255,255,0.78)";
          ctx.font = '800 14px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
          ctx.textAlign = "left";
          ctx.fillText(
            `경매 ${state.currentAuction.index + 1}  ${state.currentAuction.index === TOTAL_AUCTIONS - 1 ? "FINAL CALL" : "OPEN"}`,
            164,
            VIEW.height - 144
          );
          ctx.textAlign = "right";
          ctx.fillText(`남은 입찰 ${formatTime(state.currentAuction.timer)}`, VIEW.width - 166, VIEW.height - 144);

          const rects = getAuctionCardRects();
          rects.forEach((rect, index) => {
            const offer = state.currentAuction.offers[index];
            const definition = CARD_LIBRARY[offer.key];
            const recommended = recommendedSlotForCard(offer.key);
            const hovered = dragState?.hoverSlotId && recommended && dragState.cardId === offer.id;
            const selected = dragState?.cardId === offer.id;
            drawRoundedRect(rect.x, rect.y, rect.width, rect.height, 22);
            const cardGradient = ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.height);
            cardGradient.addColorStop(0, `${definition.accent}55`);
            cardGradient.addColorStop(1, "rgba(10, 16, 28, 0.96)");
            ctx.fillStyle = cardGradient;
            ctx.fill();
            ctx.lineWidth = selected ? 3.5 : hovered ? 3 : 1.5;
            ctx.strokeStyle = selected ? "#f8fafc" : hovered ? definition.color : `${definition.color}88`;
            ctx.stroke();

            drawRoundedRect(rect.x + 14, rect.y + 12, 76, 22, 12);
            ctx.fillStyle = `${definition.color}22`;
            ctx.fill();
            ctx.fillStyle = definition.color;
            ctx.font = '800 11px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.textAlign = "center";
            ctx.fillText(definition.kind === "route" ? "ROUTE" : "GEAR", rect.x + 52, rect.y + 27);

            ctx.textAlign = "left";
            ctx.fillStyle = "#f8fafc";
            ctx.font = '800 16px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText(definition.title, rect.x + 18, rect.y + 56);
            ctx.fillStyle = "rgba(226,232,240,0.86)";
            ctx.font = '700 13px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText(definition.subtitle, rect.x + 18, rect.y + 76);
            ctx.fillStyle = "rgba(191,219,254,0.82)";
            ctx.font = '700 11px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText(definition.detail, rect.x + 18, rect.y + 94);

            ctx.textAlign = "right";
            ctx.fillStyle = "#fff7cc";
            ctx.font = '800 18px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText(`-${definition.cost.toFixed(1)}s`, rect.x + rect.width - 18, rect.y + 56);
            ctx.fillStyle = "rgba(226,232,240,0.76)";
            ctx.font = '700 11px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText("길게 누르면 즉시 입찰", rect.x + rect.width - 18, rect.y + 92);
          });
        }

        function drawFloaters() {
          for (const floater of state.floaters) {
            const alpha = clamp(floater.life, 0, 1);
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.font = `800 ${floater.size}px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.strokeStyle = floater.accent;
            ctx.lineWidth = 6;
            ctx.strokeText(floater.text, floater.x, floater.y);
            ctx.fillStyle = floater.color;
            ctx.fillText(floater.text, floater.x, floater.y);
            ctx.restore();
          }
        }

        function drawDragGhost() {
          if (!dragState || !state.currentAuction) {
            return;
          }
          const offer = state.currentAuction.offers.find((entry) => entry.id === dragState.cardId);
          if (!offer) {
            return;
          }
          const definition = CARD_LIBRARY[offer.key];
          const x = dragState.x - 86;
          const y = dragState.y - 36;
          ctx.save();
          ctx.globalAlpha = 0.96;
          drawRoundedRect(x, y, 172, 72, 18);
          const ghost = ctx.createLinearGradient(x, y, x, y + 72);
          ghost.addColorStop(0, `${definition.accent}88`);
          ghost.addColorStop(1, "rgba(10, 16, 28, 0.92)");
          ctx.fillStyle = ghost;
          ctx.fill();
          ctx.strokeStyle = definition.color;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = "#f8fafc";
          ctx.font = '800 14px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
          ctx.textAlign = "left";
          ctx.fillText(definition.subtitle, x + 18, y + 30);
          ctx.fillStyle = "rgba(226,232,240,0.84)";
          ctx.font = '700 11px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
          ctx.fillText(`-${definition.cost.toFixed(1)}s`, x + 18, y + 50);
          ctx.restore();

          const recommended = recommendedSlotForCard(offer.key);
          for (const slot of state.slots.filter((entry) => entry.kind === definition.kind)) {
            ctx.save();
            const isTarget = dragState.hoverSlotId === slot.id;
            const isRecommended = recommended && recommended.id === slot.id;
            ctx.strokeStyle = isTarget ? "#f8fafc" : isRecommended ? definition.color : "rgba(226,232,240,0.28)";
            ctx.lineWidth = isTarget ? 4 : 2;
            ctx.setLineDash(isRecommended ? [6, 6] : []);
            ctx.beginPath();
            ctx.arc(slot.x, slot.y, slot.ring + 10, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        }

        function drawOverlay() {
          if (state.mode === "running") {
            return;
          }
          ctx.fillStyle = state.mode === "menu" ? "rgba(4, 8, 16, 0.52)" : "rgba(4, 8, 16, 0.72)";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          drawRoundedRect(110, 70, VIEW.width - 220, state.mode === "menu" ? 392 : 316, 34);
          const panel = ctx.createLinearGradient(110, 70, 110, 462);
          panel.addColorStop(0, "rgba(8, 14, 26, 0.92)");
          panel.addColorStop(1, "rgba(7, 13, 24, 0.84)");
          ctx.fillStyle = panel;
          ctx.fill();
          ctx.strokeStyle = state.mode === "menu" ? "rgba(125, 211, 252, 0.42)" : "rgba(251, 113, 133, 0.4)";
          ctx.lineWidth = 1.5;
          ctx.stroke();

          ctx.fillStyle = "rgba(255, 219, 133, 0.96)";
          ctx.font = '800 15px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
          ctx.textAlign = "left";
          ctx.fillText("DUSK SUBWAY MARKET", 142, 114);
          ctx.fillStyle = "#f8fafc";
          ctx.font = '800 34px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
          ctx.fillText(
            state.mode === "menu" ? STAGE_TITLE : state.mode === "cleared" ? "Market Cleared" : "Auction Collapse",
            142,
            150
          );
          ctx.fillStyle = "rgba(226,232,240,0.84)";
          ctx.font = '700 16px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
          ctx.fillText(DESCRIPTION, 142, 192, VIEW.width - 292);

          if (state.mode === "menu") {
            const blocks = [
              { title: "조작", text: CONTROLS, color: "#7dd3fc" },
              { title: "클리어", text: CLEAR_CONDITION, color: "#86efac" },
              { title: "실패", text: FAIL_CONDITION, color: "#fda4af" },
            ];
            blocks.forEach((block, index) => {
              const x = 142;
              const y = 230 + index * 76;
              const lines = wrapLines(
                block.text,
                VIEW.width - 320,
                '700 13px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif'
              );
              ctx.fillStyle = block.color;
              ctx.font = '800 12px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
              ctx.fillText(block.title, x, y);
              drawTextBlock(
                lines,
                x,
                y + 18,
                VIEW.width - 320,
                18,
                "rgba(226,232,240,0.86)",
                13,
                "700"
              );
            });

            drawRoundedRect(142, 398, 240, 36, 18);
            ctx.fillStyle = "rgba(125, 211, 252, 0.16)";
            ctx.fill();
            ctx.strokeStyle = "rgba(125, 211, 252, 0.44)";
            ctx.stroke();
            ctx.fillStyle = "#f8fafc";
            ctx.font = '800 14px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText("화면 터치 또는 Enter로 개장", 162, 421);
          } else {
            const summary = [
              `생존 시간 ${formatTime(state.lastRunTime)}`,
              `최종 콤보 x${state.combo}`,
              `코어 ${Math.round(state.coreIntegrity)}%`,
              `잔여 시간 ${formatTime(state.reserveTime)}`,
            ];
            drawTextBlock(summary, 142, 236, 260, 24, "#f8fafc", 16, "700");
            drawTextBlock(
              [state.mode === "cleared" ? CLEAR_CONDITION : FAIL_CONDITION],
              142,
              348,
              VIEW.width - 320,
              22,
              state.mode === "cleared" ? "#d9f99d" : "#fecaca",
              15,
              "700"
            );
            drawRoundedRect(142, 392, 232, 36, 18);
            ctx.fillStyle = state.mode === "cleared" ? "rgba(110, 231, 183, 0.16)" : "rgba(251, 113, 133, 0.14)";
            ctx.fill();
            ctx.strokeStyle = state.mode === "cleared" ? "rgba(110, 231, 183, 0.44)" : "rgba(251, 113, 133, 0.44)";
            ctx.stroke();
            ctx.fillStyle = "#f8fafc";
            ctx.font = '800 14px "Arial Rounded MT Bold", "Trebuchet MS", sans-serif';
            ctx.fillText("화면 터치 또는 Enter로 재시작", 162, 415);
          }
        }

        function render() {
          ctx.clearRect(0, 0, VIEW.width, VIEW.height);

          const shakeStrength = state.impact * 0.55;
          const shakeX = shakeStrength ? randomBetween(-shakeStrength, shakeStrength) : 0;
          const shakeY = shakeStrength ? randomBetween(-shakeStrength, shakeStrength) : 0;

          ctx.save();
          ctx.translate(shakeX, shakeY);
          drawBackground();
          drawSlots();
          drawBeams();
          drawEnemies();
          drawParticles();
          drawHud();
          drawAuctionPanel();
          drawFloaters();
          drawDragGhost();
          drawOverlay();
          ctx.restore();
        }

        function frame(timestamp) {
          if (!lastTimestamp) {
            lastTimestamp = timestamp;
          }
          const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
          lastTimestamp = timestamp;
          updateWorld(delta);
          render();
          animationFrame = window.requestAnimationFrame(frame);
        }

        function clientToCanvas(event) {
          const rect = canvas.getBoundingClientRect();
          return {
            x: ((event.clientX - rect.left) / rect.width) * VIEW.width,
            y: ((event.clientY - rect.top) / rect.height) * VIEW.height,
          };
        }

        function hitTestCard(x, y) {
          const rects = getAuctionCardRects();
          return rects.find(
            (rect) =>
              x >= rect.x &&
              x <= rect.x + rect.width &&
              y >= rect.y &&
              y <= rect.y + rect.height
          );
        }

        function hitTestSlot(x, y, kind) {
          return state.slots.find((slot) => {
            if (slot.kind !== kind) {
              return false;
            }
            const dx = x - slot.x;
            const dy = y - slot.y;
            return dx * dx + dy * dy <= Math.pow(slot.ring + 18, 2);
          });
        }

        function triggerInstantBid(cardId) {
          if (!state.currentAuction || state.mode !== "running") {
            return;
          }
          const offer = state.currentAuction.offers.find((entry) => entry.id === cardId);
          if (!offer || !dragState || dragState.cardId !== cardId) {
            return;
          }
          const slot = recommendedSlotForCard(offer.key);
          if (slot && applyPurchase(slot, offer.key, true)) {
            dragState.longPressFired = true;
            clearTransientInput();
          }
        }

        function onPointerDown(event) {
          const position = clientToCanvas(event);
          pointer = { active: true, x: position.x, y: position.y };

          if (state.mode === "menu") {
            startStage();
            render();
            return;
          }

          if (state.mode === "failed" || state.mode === "cleared") {
            startStage();
            render();
            return;
          }

          if (state.mode !== "running" || !state.currentAuction) {
            return;
          }

          const hitCard = hitTestCard(position.x, position.y);
          if (!hitCard) {
            return;
          }

          const token = ++longPressToken;
          dragState = {
            pointerId: event.pointerId,
            cardId: hitCard.offerId,
            x: position.x,
            y: position.y,
            startX: position.x,
            startY: position.y,
            hoverSlotId: null,
            moved: false,
            longPressFired: false,
            longPressTimer: window.setTimeout(() => {
              if (dragState && dragState.cardId === hitCard.offerId && token === longPressToken && !dragState.moved) {
                triggerInstantBid(hitCard.offerId);
              }
            }, 430),
          };
          canvas.setPointerCapture?.(event.pointerId);
        }

        function onPointerMove(event) {
          const position = clientToCanvas(event);
          pointer = { active: true, x: position.x, y: position.y };
          if (!dragState || dragState.pointerId !== event.pointerId || !state.currentAuction) {
            return;
          }
          dragState.x = position.x;
          dragState.y = position.y;
          const distance = Math.hypot(position.x - dragState.startX, position.y - dragState.startY);
          if (distance > 10) {
            dragState.moved = true;
            if (dragState.longPressTimer) {
              clearTimeout(dragState.longPressTimer);
              dragState.longPressTimer = null;
            }
          }
          const offer = state.currentAuction.offers.find((entry) => entry.id === dragState.cardId);
          if (!offer) {
            return;
          }
          const slot = hitTestSlot(position.x, position.y, CARD_LIBRARY[offer.key].kind);
          dragState.hoverSlotId = slot ? slot.id : null;
        }

        function releasePointer(event) {
          pointer.active = false;
          if (!dragState || dragState.pointerId !== event.pointerId) {
            return;
          }
          canvas.releasePointerCapture?.(event.pointerId);
          if (dragState.longPressTimer) {
            clearTimeout(dragState.longPressTimer);
          }
          if (!dragState.longPressFired && state.currentAuction) {
            const offer = state.currentAuction.offers.find((entry) => entry.id === dragState.cardId);
            const definition = offer ? CARD_LIBRARY[offer.key] : null;
            if (offer && definition) {
              const slot = hitTestSlot(dragState.x, dragState.y, definition.kind);
              if (slot) {
                applyPurchase(slot, offer.key, false);
              } else {
                addFloater("드래그해 슬롯에 배치", dragState.x, dragState.y - 22, "#dbeafe", "#60a5fa", 14);
              }
            }
          }
          clearTransientInput();
        }

        function onKeyDown(event) {
          if (event.code === "Enter" || event.code === "Space") {
            if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
              event.preventDefault();
              startStage();
              render();
            }
          }
          if (event.code === "KeyF") {
            event.preventDefault();
            if (!document.fullscreenElement) {
              canvas.requestFullscreen?.().catch(() => {});
            } else {
              document.exitFullscreen?.().catch(() => {});
            }
          }
        }

        function buildRenderSnapshot() {
          return {
            mode: state.mode,
            elapsed: Number(state.elapsed.toFixed(2)),
            reserveTime: Number(state.reserveTime.toFixed(2)),
            coreIntegrity: Number(state.coreIntegrity.toFixed(1)),
            combo: state.combo,
            comboThreshold: state.comboThreshold,
            comboBreaks: state.comboBreaks,
            auctionIndex: state.auctionIndex,
            currentAuction: state.currentAuction
              ? {
                  index: state.currentAuction.index + 1,
                  timer: Number(state.currentAuction.timer.toFixed(2)),
                  offers: state.currentAuction.offers.map((offer) => CARD_LIBRARY[offer.key].subtitle),
                }
              : null,
            slots: state.slots.map((slot) => ({
              lane: slot.lane,
              kind: slot.kind,
              active: Boolean(slot.item && slot.item.expiresAt > state.elapsed),
              item: slot.item?.def.subtitle || null,
              remaining: slot.item ? Number((slot.item.expiresAt - state.elapsed).toFixed(2)) : 0,
            })),
            enemies: state.enemies.map((enemy) => ({
              lane: enemy.lane,
              x: Number(enemy.x.toFixed(1)),
              hp: Number(enemy.hp.toFixed(1)),
              type: enemy.type,
            })),
            coordinateSystem: {
              origin: "top-left",
              xDirection: "right",
              yDirection: "down",
            },
          };
        }

        window.render_game_to_text = () => JSON.stringify(buildRenderSnapshot());
        window.advanceTime = (ms) => {
          const steps = Math.max(1, Math.round(ms / (1000 / 60)));
          for (let index = 0; index < steps; index += 1) {
            updateWorld(ms / 1000 / steps);
          }
          render();
          return window.render_game_to_text();
        };

        window.relayStageMeta = {
          id: STAGE_ID,
          title: STAGE_TITLE,
          creator: CREATOR,
          genre: GENRE,
          clearCondition: CLEAR_CONDITION,
        };

        window.relayStageResult = { status: "running" };
        window.relayStageDebug = {
          forceClear() {
            if (state.mode === "menu") {
              startStage();
            }
            clearStage();
            render();
          },
          forceFail() {
            if (state.mode === "menu") {
              startStage();
            }
            failStage("debug-fail");
            render();
          },
        };

        canvas.addEventListener("pointerdown", onPointerDown);
        canvas.addEventListener("pointermove", onPointerMove);
        canvas.addEventListener("pointerup", releasePointer);
        canvas.addEventListener("pointercancel", releasePointer);
        window.addEventListener("keydown", onKeyDown);

        resetStage("menu");
        reportReadyToHost();
        render();
        animationFrame = window.requestAnimationFrame(frame);

        window.addEventListener("beforeunload", () => {
          if (animationFrame) {
            window.cancelAnimationFrame(animationFrame);
          }
        });
      })();
    </script>
  </body>
</html>
