<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biomech Theater: Mirror Heist</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at top, rgba(72, 206, 255, 0.16), transparent 38%),
          linear-gradient(180deg, #050816 0%, #0b1027 50%, #09060f 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(228, 251, 255, 0.96);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        right: 12px;
        bottom: 14px;
        z-index: 25;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 max(12px, env(safe-area-inset-right, 0px)) calc(8px + env(safe-area-inset-bottom, 0px)) 12px;
        pointer-events: none;
      }

      .mobile-chip {
        pointer-events: auto;
        max-width: min(58vw, 212px);
        padding: 10px 12px;
        border: 1px solid rgba(124, 221, 255, 0.25);
        border-radius: 18px;
        background: rgba(5, 10, 24, 0.72);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.28);
        color: rgba(224, 247, 255, 0.88);
        font-size: 12px;
        line-height: 1.35;
        backdrop-filter: blur(12px);
      }

      .mobile-btn {
        pointer-events: auto;
        appearance: none;
        border: 1px solid rgba(133, 229, 255, 0.28);
        border-radius: 999px;
        min-width: 92px;
        min-height: 56px;
        padding: 0 18px;
        background:
          linear-gradient(180deg, rgba(12, 28, 52, 0.92), rgba(7, 14, 28, 0.92));
        color: #edfdff;
        font: 800 15px "Avenir Next", "Segoe UI", sans-serif;
        letter-spacing: 0.04em;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          0 12px 28px rgba(3, 8, 18, 0.42),
          0 0 18px rgba(95, 211, 255, 0.16);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        background:
          linear-gradient(180deg, rgba(28, 73, 122, 0.94), rgba(8, 28, 62, 0.94));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          0 10px 24px rgba(3, 8, 18, 0.4),
          0 0 24px rgba(95, 211, 255, 0.28);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          right: 8px;
          bottom: 10px;
          gap: 8px;
          padding-left: 8px;
        }

        .mobile-chip {
          max-width: 52vw;
          padding: 8px 10px;
          font-size: 11px;
        }

        .mobile-btn {
          min-width: 84px;
          min-height: 52px;
          padding: 0 16px;
          font-size: 14px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Biomech Theater: Mirror Heist. 캔버스를 터치하거나 Enter로 시작하세요.
      이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      목격 게이지를 낮게 유지한 채 서로 다른 패턴 3개로 금고 문을 열면 클리어.
      목격 게이지가 끝까지 차거나 감시 시선에 오래 걸리면 즉시 실패.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Biomech Theater: Mirror Heist" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls" aria-label="모바일 조작 보조">
      <div class="mobile-chip">드래그 이동 · 적 탭 훔치기 · 두 손가락 탭 또는 재생 버튼</div>
      <button class="mobile-btn" type="button" data-control="replay" data-active="false" aria-label="복사한 패턴 재생">재생</button>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const META_DESCRIPTION = "적 패턴을 훔쳐 복사한 동작으로만 금고 문을 여는 바이오메크 극장 잠입 액션";
      const META_CONTROLS = "이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const META_CLEAR = "목격 게이지를 낮게 유지한 채 서로 다른 패턴 3개로 금고 문을 열면 클리어";
      const META_FAIL = "목격 게이지가 끝까지 차거나 감시 시선에 오래 걸리면 즉시 실패";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const PLAYER_RADIUS = 18;
      const PLAYER_SPEED = 248;
      const STEAL_DISTANCE = 92;
      const CLICK_STEAL_RADIUS = 48;
      const VAULT = { x: VIEW.width / 2, y: 98, radius: 66 };
      const ARENA = { x: 82, y: 64, width: VIEW.width - 164, height: VIEW.height - 112 };
      const COVER_NODES = [
        { x: 286, y: 188, radius: 42, inner: 28 },
        { x: 674, y: 188, radius: 42, inner: 28 },
        { x: 284, y: 326, radius: 42, inner: 28 },
        { x: 676, y: 326, radius: 42, inner: 28 },
      ];
      const SEARCHLIGHT_SOURCES = [
        { x: 72, y: 68, base: 0.72, range: 0.84, speed: 0.76, cone: 0.36, length: 560, tint: "110,225,255" },
        { x: VIEW.width - 72, y: 68, base: Math.PI - 0.72, range: 0.84, speed: 0.82, cone: 0.36, length: 560, tint: "255,143,203" },
        { x: VIEW.width / 2, y: 44, base: Math.PI / 2, range: 0.48, speed: 0.9, cone: 0.3, length: 420, tint: "255,217,123" },
        { x: 90, y: VIEW.height - 92, base: -0.46, range: 0.38, speed: 0.65, cone: 0.28, length: 420, tint: "124,255,219" },
        { x: VIEW.width - 90, y: VIEW.height - 92, base: Math.PI + 0.46, range: 0.38, speed: 0.7, cone: 0.28, length: 420, tint: "165,160,255" },
      ];
      const PERFORMER_DEFS = [
        {
          id: "iris",
          label: "IRIS SWEEP",
          accent: "#7fe8ff",
          glow: "127,232,255",
          baseX: 196,
          baseY: 166,
          readySpeed: 2.2,
          readyPhase: 0.6,
          motion(time) {
            return {
              x: this.baseX + Math.sin(time * 1.45) * 46,
              y: this.baseY + Math.cos(time * 2.2) * 20 + Math.sin(time * 0.6) * 10,
            };
          },
          glyph(time, progress) {
            return [
              { x: Math.sin(time * 6.2) * 18, y: Math.cos(time * 4.2) * 12, r: 7 + progress * 7 },
              { x: -Math.cos(time * 6.2) * 14, y: Math.sin(time * 4.2) * 12, r: 4 + progress * 5 },
            ];
          },
          trailOffset: 0.1,
        },
        {
          id: "spindle",
          label: "SPINDLE CUT",
          accent: "#ff8ae1",
          glow: "255,138,225",
          baseX: 758,
          baseY: 166,
          readySpeed: 2.55,
          readyPhase: 1.8,
          motion(time) {
            return {
              x: this.baseX + Math.cos(time * 1.38) * 42,
              y: this.baseY + Math.sin(time * 2.7) * 18 + Math.cos(time * 0.8) * 10,
            };
          },
          glyph(time, progress) {
            return [
              { x: Math.cos(time * 5.8) * 20, y: Math.sin(time * 3.6) * 9, r: 6 + progress * 7 },
              { x: Math.sin(time * 7.1) * 13, y: -Math.cos(time * 5.4) * 10, r: 4 + progress * 4 },
            ];
          },
          trailOffset: 0.16,
        },
        {
          id: "chorus",
          label: "CHORUS ARC",
          accent: "#ffd66d",
          glow: "255,214,109",
          baseX: VIEW.width / 2,
          baseY: 388,
          readySpeed: 1.96,
          readyPhase: 3.1,
          motion(time) {
            return {
              x: this.baseX + Math.sin(time * 1.85) * 62,
              y: this.baseY + Math.sin(time * 3.7) * 16,
            };
          },
          glyph(time, progress) {
            return [
              { x: Math.sin(time * 5.1) * 15, y: Math.cos(time * 5.1) * 15, r: 5 + progress * 6 },
              { x: Math.sin(time * 5.1 + 1.6) * 15, y: Math.cos(time * 5.1 + 1.6) * 15, r: 4 + progress * 4 },
              { x: Math.sin(time * 5.1 + 3.2) * 15, y: Math.cos(time * 5.1 + 3.2) * 15, r: 3 + progress * 3 },
            ];
          },
          trailOffset: 0.24,
        },
      ];
      const relayContext = window.RelayRuntime?.readContext("biomech-theater-mirror-theft-witness") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const prefersReducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches || false;

      const input = {
        left: false,
        right: false,
        up: false,
        down: false,
        pointerActive: false,
        pointerId: null,
        pointerType: null,
        targetX: VIEW.width / 2,
        targetY: VIEW.height / 2 + 120,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        backgroundTime: 0,
        player: createPlayer(),
        performers: createPerformers(),
        witness: 18,
        exposure: 0,
        detectLevel: 0,
        stillTime: 0,
        witnessPeak: 18,
        vaultUnlocks: [],
        particles: [],
        popups: [],
        ripples: [],
        flash: 0,
        shake: 0,
        replay: null,
        lastReason: "",
      };

      function createPlayer() {
        return {
          x: VIEW.width / 2,
          y: VIEW.height - 118,
          radius: PLAYER_RADIUS,
          speed: 0,
          facing: -Math.PI / 2,
          bob: 0,
          targetX: VIEW.width / 2,
          targetY: VIEW.height - 118,
        };
      }

      function createPerformers() {
        return PERFORMER_DEFS.map((definition) => ({
          ...definition,
          x: definition.baseX,
          y: definition.baseY,
          copied: false,
          ready: false,
          readyMeter: 0,
        }));
      }

      function resetRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = createPlayer();
        state.performers = createPerformers();
        state.witness = 18;
        state.exposure = 0;
        state.detectLevel = 0;
        state.stillTime = 0;
        state.witnessPeak = 18;
        state.vaultUnlocks = [];
        state.particles = [];
        state.popups = [];
        state.ripples = [];
        state.flash = 0;
        state.shake = 0;
        state.replay = null;
        state.lastReason = "";
        input.pointerActive = false;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        addPopup("패턴 3개 확보 후 금고 앞에서 재생", "#99f6ff", VIEW.width / 2, 148, 1.5, true);
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function angleDelta(a, b) {
        let delta = a - b;
        while (delta > Math.PI) delta -= Math.PI * 2;
        while (delta < -Math.PI) delta += Math.PI * 2;
        return delta;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (_error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "witness_maxed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function failStage(reason = "witness_maxed") {
        if (state.mode !== "running") return;
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 1;
        state.shake = 16;
        window.relayStageResult.status = "failed";
        addPopup("목격 급증", "#ff809e", state.player.x, state.player.y - 28, 1.2, true);
        spawnBurst(state.player.x, state.player.y, "255,110,142", 28, 180, 360);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") return;
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.75;
        state.shake = 8;
        window.relayStageResult.status = "cleared";
        addPopup("금고 개방", "#c5ff7b", VAULT.x, VAULT.y + 12, 1.8, true);
        spawnBurst(VAULT.x, VAULT.y + 18, "193,255,123", 42, 180, 420);
        reportClearedToHost();
      }

      function addPopup(text, color, x, y, duration = 1.1, important = false) {
        state.popups.push({
          text,
          color,
          x,
          y,
          life: duration,
          maxLife: duration,
          important,
        });
      }

      function spawnBurst(x, y, color, count, minSpeed, maxSpeed) {
        const total = prefersReducedMotion ? Math.max(8, Math.floor(count * 0.4)) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / total + Math.random() * 0.6;
          const speed = lerp(minSpeed, maxSpeed, Math.random());
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 0.55 + Math.random() * 0.65,
            maxLife: 0.55 + Math.random() * 0.65,
            size: 2 + Math.random() * 7,
            color,
          });
        }
      }

      function addRipple(x, y, color, radius, grow) {
        state.ripples.push({
          x,
          y,
          radius,
          grow,
          alpha: 0.85,
          color,
        });
      }

      function getPendingPatterns() {
        return state.performers.filter((performer) => performer.copied && !state.vaultUnlocks.includes(performer.id));
      }

      function getNextPendingPattern() {
        return getPendingPatterns()[0] || null;
      }

      function updatePerformers(time) {
        state.performers.forEach((performer) => {
          const position = performer.motion(time);
          performer.x = position.x;
          performer.y = position.y;
          performer.readyMeter = (Math.sin(time * performer.readySpeed + performer.readyPhase) + 1) / 2;
          performer.ready = !performer.copied && performer.readyMeter > 0.73;
        });
      }

      function getSearchlights() {
        const unlockCount = state.vaultUnlocks.length;
        const replayBoost = state.replay ? 1 : 0;
        const count = clamp(2 + unlockCount + replayBoost, 2, SEARCHLIGHT_SOURCES.length);

        return SEARCHLIGHT_SOURCES.slice(0, count).map((source, index) => {
          const speedBoost = unlockCount * 0.16 + replayBoost * 0.22;
          const oscillation = Math.sin(state.elapsed * (source.speed + speedBoost) + index * 1.17);
          const angle = source.base + oscillation * (source.range - unlockCount * 0.04);
          return {
            x: source.x,
            y: source.y,
            angle,
            cone: Math.max(0.17, source.cone - unlockCount * 0.018 + replayBoost * 0.015),
            length: source.length + unlockCount * 26 + replayBoost * 30,
            intensity: 0.42 + unlockCount * 0.16 + replayBoost * 0.2,
            tint: source.tint,
          };
        });
      }

      function distancePointToSegment(px, py, ax, ay, bx, by) {
        const abx = bx - ax;
        const aby = by - ay;
        const lengthSq = abx * abx + aby * aby || 1;
        const t = clamp(((px - ax) * abx + (py - ay) * aby) / lengthSq, 0, 1);
        const cx = ax + abx * t;
        const cy = ay + aby * t;
        return Math.hypot(px - cx, py - cy);
      }

      function isCovered(player) {
        return COVER_NODES.some((cover) => distance(player.x, player.y, cover.x, cover.y) <= cover.inner + 8);
      }

      function lineBlocked(ax, ay, bx, by) {
        return COVER_NODES.some((cover) => distancePointToSegment(cover.x, cover.y, ax, ay, bx, by) < cover.inner + 6);
      }

      function calculateDetection(searchlights) {
        const player = state.player;
        const covered = isCovered(player);
        if (covered) {
          return { level: 0, beams: [], covered: true };
        }

        const beams = [];
        let total = 0;
        searchlights.forEach((beam) => {
          const dx = player.x - beam.x;
          const dy = player.y - beam.y;
          const dist = Math.hypot(dx, dy);
          if (dist > beam.length) return;

          const targetAngle = Math.atan2(dy, dx);
          const delta = Math.abs(angleDelta(targetAngle, beam.angle));
          if (delta > beam.cone) return;
          if (lineBlocked(beam.x, beam.y, player.x, player.y)) return;

          const proximity = 1 - dist / beam.length;
          const alignment = 1 - delta / beam.cone;
          const strength = clamp((0.3 + proximity * 0.35 + alignment * 0.55) * beam.intensity, 0, 1.35);
          total += strength;
          beams.push({
            x: beam.x,
            y: beam.y,
            angle: beam.angle,
            strength: Number(strength.toFixed(2)),
          });
        });

        const centerPressure = clamp(1 - distance(player.x, player.y, VAULT.x, VAULT.y) / 190, 0, 1);
        if (state.vaultUnlocks.length > 0) {
          total += centerPressure * (0.08 + state.vaultUnlocks.length * 0.05);
        }
        if (state.replay) {
          total += 0.26 + centerPressure * 0.34;
        }
        return {
          level: clamp(total, 0, 1.5),
          beams,
          covered: false,
        };
      }

      function clampPlayer(player) {
        player.x = clamp(player.x, ARENA.x + player.radius, ARENA.x + ARENA.width - player.radius);
        player.y = clamp(player.y, ARENA.y + player.radius, ARENA.y + ARENA.height - player.radius);
      }

      function movePlayer(dt) {
        const player = state.player;
        if (state.replay) {
          player.x = lerp(player.x, VAULT.x, 0.18);
          player.y = lerp(player.y, VAULT.y + 62, 0.18);
          player.speed = 0;
          return;
        }

        let moveX = 0;
        let moveY = 0;

        if (input.left) moveX -= 1;
        if (input.right) moveX += 1;
        if (input.up) moveY -= 1;
        if (input.down) moveY += 1;

        if (input.pointerActive) {
          const dx = input.targetX - player.x;
          const dy = input.targetY - player.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 4) {
            moveX += dx / Math.max(dist, 1);
            moveY += dy / Math.max(dist, 1);
          }
        }

        const magnitude = Math.hypot(moveX, moveY);
        if (magnitude > 0.001) {
          moveX /= magnitude;
          moveY /= magnitude;
        }

        const spotlightPressure = 1 + state.vaultUnlocks.length * 0.06;
        const speed = PLAYER_SPEED / spotlightPressure;
        const vx = moveX * speed;
        const vy = moveY * speed;
        player.x += vx * dt;
        player.y += vy * dt;
        player.speed = Math.hypot(vx, vy);
        if (player.speed > 1) {
          player.facing = Math.atan2(vy, vx);
        }
        clampPlayer(player);
      }

      function updateSuspicion(dt, detection) {
        const player = state.player;
        const covered = detection.covered;
        const movingFast = player.speed > 50;
        const stillBonus = !covered && player.speed < 16 && state.stillTime > 0.28;

        if (movingFast) {
          state.stillTime = 0;
        } else {
          state.stillTime = clamp(state.stillTime + dt, 0, 3);
        }

        state.detectLevel = detection.level;
        if (detection.level > 0.02) {
          const rate =
            13 +
            detection.level * 31 +
            state.vaultUnlocks.length * 4 +
            (state.replay ? 18 : 0) +
            (movingFast ? 9 : 0);
          state.witness += rate * dt;
          state.exposure = clamp(state.exposure + dt * (0.54 + detection.level * 0.95), 0, 4.2);
          if (!prefersReducedMotion) {
            state.flash = Math.max(state.flash, detection.level * 0.14);
          }
        } else if (covered) {
          state.witness -= 18 * dt;
          state.exposure = clamp(state.exposure - dt * 2.2, 0, 4.2);
        } else if (stillBonus) {
          state.witness -= 10.5 * dt;
          state.exposure = clamp(state.exposure - dt * 1.7, 0, 4.2);
        } else {
          state.witness -= 5.3 * dt;
          state.exposure = clamp(state.exposure - dt * 1.1, 0, 4.2);
        }

        state.witness = clamp(state.witness, 0, 100);
        state.witnessPeak = Math.max(state.witnessPeak, state.witness);

        if (state.witness >= 100) {
          failStage("witness_maxed");
        } else if (state.exposure >= 2.8) {
          failStage("gaze_locked");
        }
      }

      function attemptReplay() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
          return;
        }
        if (state.mode !== "running" || state.replay) return;

        const pending = getNextPendingPattern();
        if (!pending) {
          addPopup("훔친 패턴 없음", "#ffc889", state.player.x, state.player.y - 32, 0.9, false);
          return;
        }

        const distToVault = distance(state.player.x, state.player.y, VAULT.x, VAULT.y + 56);
        if (distToVault > VAULT.radius + 34) {
          addPopup("금고 앞에서 재생", "#9fd8ff", state.player.x, state.player.y - 32, 0.95, false);
          return;
        }

        state.replay = {
          patternId: pending.id,
          label: pending.label,
          color: pending.accent,
          glow: pending.glow,
          timer: 0,
          duration: 1.2,
        };
        state.flash = Math.max(state.flash, 0.24);
        state.shake = Math.max(state.shake, 5);
        addPopup(`${pending.label} 재생`, pending.accent, VAULT.x, VAULT.y + 90, 1, true);
        addRipple(VAULT.x, VAULT.y + 12, pending.glow, 28, 160);
      }

      function completeReplay() {
        const replay = state.replay;
        if (!replay) return;
        state.vaultUnlocks.push(replay.patternId);
        addPopup("락 해제", replay.color, VAULT.x, VAULT.y - 18, 1.1, true);
        spawnBurst(VAULT.x, VAULT.y + 10, replay.glow, 22, 120, 300);
        addRipple(VAULT.x, VAULT.y + 12, replay.glow, 42, 220);
        state.shake = Math.max(state.shake, 10);
        state.witness += 7;
        state.replay = null;
        if (state.vaultUnlocks.length >= 3) {
          clearStage();
        }
      }

      function attemptStealAt(x, y) {
        if (state.mode !== "running" || state.replay) return false;

        let best = null;
        state.performers.forEach((performer) => {
          const clickDistance = distance(x, y, performer.x, performer.y);
          const playerDistance = distance(state.player.x, state.player.y, performer.x, performer.y);
          if (clickDistance > CLICK_STEAL_RADIUS && playerDistance > STEAL_DISTANCE) return;
          if (!best || clickDistance < best.clickDistance) {
            best = { performer, clickDistance, playerDistance };
          }
        });

        if (!best) return false;

        if (best.playerDistance > STEAL_DISTANCE) {
          addPopup("너무 멀다", "#ffc889", best.performer.x, best.performer.y - 28, 0.9, false);
          return true;
        }

        if (best.performer.copied) {
          addPopup("이미 복사됨", "#b6fbff", best.performer.x, best.performer.y - 28, 0.8, false);
          return true;
        }

        if (!best.performer.ready) {
          state.witness = clamp(state.witness + 4, 0, 100);
          state.flash = Math.max(state.flash, 0.18);
          addPopup("동기화 창 아님", "#ff97ae", best.performer.x, best.performer.y - 28, 0.9, false);
          return true;
        }

        best.performer.copied = true;
        best.performer.ready = false;
        state.witness = clamp(state.witness + 6, 0, 100);
        state.shake = Math.max(state.shake, 6);
        state.flash = Math.max(state.flash, 0.22);
        addPopup(`${best.performer.label} 탈취`, best.performer.accent, best.performer.x, best.performer.y - 30, 1.25, true);
        spawnBurst(best.performer.x, best.performer.y, best.performer.glow, 24, 120, 260);
        addRipple(best.performer.x, best.performer.y, best.performer.glow, 18, 140);
        return true;
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          resetRun();
        }
      }

      function getCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function onPointerDown(event) {
        const point = getCanvasPoint(event);
        canvas.focus();
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
          return;
        }

        const stole = attemptStealAt(point.x, point.y);
        if (event.pointerType !== "mouse") {
          input.pointerActive = true;
          input.pointerId = event.pointerId;
          input.pointerType = event.pointerType;
          input.targetX = point.x;
          input.targetY = point.y;
          canvas.setPointerCapture?.(event.pointerId);
        } else if (!stole) {
          input.pointerActive = true;
          input.pointerId = event.pointerId;
          input.pointerType = event.pointerType;
          input.targetX = point.x;
          input.targetY = point.y;
          canvas.setPointerCapture?.(event.pointerId);
        }
      }

      function onPointerMove(event) {
        if (!input.pointerActive || input.pointerId !== event.pointerId) return;
        const point = getCanvasPoint(event);
        input.targetX = point.x;
        input.targetY = point.y;
      }

      function releasePointer(event) {
        if (event && input.pointerId !== null && event.pointerId !== input.pointerId) return;
        input.pointerActive = false;
        input.pointerId = null;
        input.pointerType = null;
      }

      function onTouchStart(event) {
        if (event.touches.length >= 2) {
          event.preventDefault();
          if (state.mode === "running") {
            attemptReplay();
          } else {
            startFromTouch();
          }
        } else if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }

      function bindTapButton(button, onPress) {
        if (!button) return;
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function onKeyChange(event, pressed) {
        const key = event.key.toLowerCase();
        if (key === "arrowleft" || key === "a") input.left = pressed;
        if (key === "arrowright" || key === "d") input.right = pressed;
        if (key === "arrowup" || key === "w") input.up = pressed;
        if (key === "arrowdown" || key === "s") input.down = pressed;
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= Math.pow(0.9, dt * 10);
          particle.vy = particle.vy * Math.pow(0.86, dt * 8) + 24 * dt;
          particle.life -= dt;
          return particle.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= dt * (popup.important ? 20 : 14);
          return popup.life > 0;
        });

        state.ripples = state.ripples.filter((ripple) => {
          ripple.radius += ripple.grow * dt;
          ripple.alpha -= dt * 0.9;
          return ripple.alpha > 0;
        });
      }

      function update(dt) {
        state.backgroundTime += dt;
        state.flash = Math.max(0, state.flash - dt * 0.95);
        state.shake = Math.max(0, state.shake - dt * 12);
        updateParticles(dt);
        updatePerformers(state.backgroundTime);

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        movePlayer(dt);

        if (state.player.speed > 4) {
          state.player.bob = lerp(state.player.bob, 1, 0.14);
        } else {
          state.player.bob = lerp(state.player.bob, 0.18, 0.1);
        }

        const searchlights = getSearchlights();
        const detection = calculateDetection(searchlights);
        updateSuspicion(dt, detection);

        if (state.replay) {
          state.replay.timer += dt;
          if (state.replay.timer >= state.replay.duration) {
            completeReplay();
          }
        }
      }

      function roundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawWrappedText(text, x, y, maxWidth, lineHeight) {
        const words = text.split(" ");
        let line = "";
        let currentY = y;
        words.forEach((word) => {
          const test = line ? `${line} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && line) {
            ctx.fillText(line, x, currentY);
            line = word;
            currentY += lineHeight;
          } else {
            line = test;
          }
        });
        if (line) {
          ctx.fillText(line, x, currentY);
        }
        return currentY;
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#050915");
        gradient.addColorStop(0.5, "#12152a");
        gradient.addColorStop(1, "#0c0810");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const haze = ctx.createRadialGradient(VAULT.x, 128, 90, VAULT.x, 128, 420);
        haze.addColorStop(0, "rgba(72, 200, 255, 0.28)");
        haze.addColorStop(0.55, "rgba(25, 55, 97, 0.14)");
        haze.addColorStop(1, "rgba(5, 7, 16, 0)");
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();
        ctx.globalAlpha = 0.12;
        for (let index = 0; index < 10; index += 1) {
          const y = 48 + index * 44;
          ctx.fillStyle = index % 2 === 0 ? "rgba(255,255,255,0.4)" : "rgba(90,160,255,0.35)";
          ctx.fillRect(0, y + Math.sin(state.backgroundTime * 0.8 + index * 0.6) * 6, VIEW.width, 1);
        }
        ctx.restore();

        ctx.fillStyle = "rgba(32, 10, 32, 0.75)";
        ctx.fillRect(0, VIEW.height - 138, VIEW.width, 150);
        ctx.fillStyle = "rgba(210, 124, 88, 0.08)";
        ctx.fillRect(0, VIEW.height - 116, VIEW.width, 114);

        for (let row = 0; row < 14; row += 1) {
          const offset = (row % 2) * 18;
          for (let col = 0; col < 24; col += 1) {
            const x = 12 + col * 42 + offset;
            const y = VIEW.height - 130 + row * 10 + Math.sin(state.backgroundTime * 1.3 + col * 0.6 + row * 0.4) * 1.5;
            ctx.fillStyle = row < 4 ? "rgba(255, 117, 164, 0.08)" : "rgba(71, 198, 255, 0.05)";
            ctx.fillRect(x, y, 18, 4);
          }
        }

        ctx.save();
        ctx.globalAlpha = 0.35;
        ctx.fillStyle = "rgba(108, 22, 58, 0.86)";
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(84, 0);
        ctx.quadraticCurveTo(20, 130, 64, 210);
        ctx.quadraticCurveTo(102, 310, 26, VIEW.height);
        ctx.lineTo(0, VIEW.height);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(VIEW.width, 0);
        ctx.lineTo(VIEW.width - 84, 0);
        ctx.quadraticCurveTo(VIEW.width - 18, 130, VIEW.width - 64, 210);
        ctx.quadraticCurveTo(VIEW.width - 102, 310, VIEW.width - 26, VIEW.height);
        ctx.lineTo(VIEW.width, VIEW.height);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawArenaShell() {
        const shellGradient = ctx.createLinearGradient(ARENA.x, ARENA.y, ARENA.x, ARENA.y + ARENA.height);
        shellGradient.addColorStop(0, "rgba(9, 19, 40, 0.82)");
        shellGradient.addColorStop(1, "rgba(13, 10, 23, 0.88)");
        ctx.fillStyle = shellGradient;
        roundRect(ARENA.x, ARENA.y, ARENA.width, ARENA.height, 28);
        ctx.fill();

        ctx.strokeStyle = "rgba(124, 227, 255, 0.22)";
        ctx.lineWidth = 2;
        roundRect(ARENA.x, ARENA.y, ARENA.width, ARENA.height, 28);
        ctx.stroke();

        ctx.save();
        ctx.globalAlpha = 0.5;
        for (let line = 0; line < 12; line += 1) {
          const y = ARENA.y + 34 + line * 34;
          ctx.strokeStyle = line % 2 === 0 ? "rgba(89, 206, 255, 0.12)" : "rgba(255, 157, 204, 0.08)";
          ctx.beginPath();
          ctx.moveTo(ARENA.x + 14, y);
          ctx.lineTo(ARENA.x + ARENA.width - 14, y);
          ctx.stroke();
        }
        for (let line = 0; line < 10; line += 1) {
          const x = ARENA.x + 36 + line * 82;
          ctx.strokeStyle = "rgba(120, 170, 255, 0.05)";
          ctx.beginPath();
          ctx.moveTo(x, ARENA.y + 24);
          ctx.lineTo(x, ARENA.y + ARENA.height - 24);
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.4 + state.vaultUnlocks.length * 0.08;
        for (let index = 0; index < 14; index += 1) {
          const x = 84 + index * 58;
          const eyeY = 24 + (index % 2) * 8;
          const open = 5 + state.vaultUnlocks.length * 2 + Math.sin(state.backgroundTime * 2 + index * 0.7) * 1.8;
          ctx.fillStyle = index % 3 === 0 ? "rgba(255, 153, 209, 0.55)" : "rgba(102, 224, 255, 0.48)";
          ctx.beginPath();
          ctx.ellipse(x, eyeY, 14, Math.max(2.5, open), 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(4, 8, 18, 0.8)";
          ctx.beginPath();
          ctx.arc(x + Math.sin(state.backgroundTime * 1.2 + index) * 3, eyeY, 3.5, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function drawSearchlights(searchlights) {
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        searchlights.forEach((beam) => {
          const leftAngle = beam.angle - beam.cone;
          const rightAngle = beam.angle + beam.cone;
          const leftX = beam.x + Math.cos(leftAngle) * beam.length;
          const leftY = beam.y + Math.sin(leftAngle) * beam.length;
          const rightX = beam.x + Math.cos(rightAngle) * beam.length;
          const rightY = beam.y + Math.sin(rightAngle) * beam.length;

          const gradient = ctx.createRadialGradient(beam.x, beam.y, 12, beam.x, beam.y, beam.length);
          gradient.addColorStop(0, `rgba(${beam.tint}, 0.42)`);
          gradient.addColorStop(0.35, `rgba(${beam.tint}, 0.16)`);
          gradient.addColorStop(1, `rgba(${beam.tint}, 0)`);
          ctx.fillStyle = gradient;
          ctx.beginPath();
          ctx.moveTo(beam.x, beam.y);
          ctx.lineTo(leftX, leftY);
          ctx.arc(beam.x, beam.y, beam.length, leftAngle, rightAngle);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = `rgba(${beam.tint}, 0.18)`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(beam.x, beam.y);
          ctx.lineTo(beam.x + Math.cos(beam.angle) * beam.length, beam.y + Math.sin(beam.angle) * beam.length);
          ctx.stroke();
        });
        ctx.restore();
      }

      function drawVault() {
        const pulse = 0.5 + Math.sin(state.backgroundTime * 2.4) * 0.5;
        ctx.save();
        ctx.translate(VAULT.x, VAULT.y);
        const vaultGlow = ctx.createRadialGradient(0, 0, 12, 0, 0, 92);
        vaultGlow.addColorStop(0, "rgba(140, 238, 255, 0.38)");
        vaultGlow.addColorStop(1, "rgba(140, 238, 255, 0)");
        ctx.fillStyle = vaultGlow;
        ctx.fillRect(-110, -110, 220, 220);

        ctx.fillStyle = "rgba(16, 31, 54, 0.96)";
        roundRect(-84, -44, 168, 96, 30);
        ctx.fill();
        ctx.strokeStyle = "rgba(126, 231, 255, 0.4)";
        ctx.lineWidth = 3;
        roundRect(-84, -44, 168, 96, 30);
        ctx.stroke();

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = `rgba(126, 231, 255, ${0.26 + pulse * 0.18})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(0, 4, 36 + pulse * 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = "#dffcff";
        ctx.font = "800 15px Avenir Next";
        ctx.textAlign = "center";
        ctx.fillText("MIRROR VAULT", 0, -58);
        ctx.font = "700 12px Avenir Next";
        ctx.fillStyle = "rgba(210, 244, 255, 0.7)";
        ctx.fillText("복사 패턴만 잠금 해제", 0, 70);

        const slots = [
          { x: -44, id: PERFORMER_DEFS[0].id, accent: PERFORMER_DEFS[0].accent },
          { x: 0, id: PERFORMER_DEFS[1].id, accent: PERFORMER_DEFS[1].accent },
          { x: 44, id: PERFORMER_DEFS[2].id, accent: PERFORMER_DEFS[2].accent },
        ];
        slots.forEach((slot, index) => {
          const unlocked = state.vaultUnlocks.includes(slot.id);
          ctx.fillStyle = unlocked ? slot.accent : "rgba(34, 48, 76, 0.86)";
          ctx.beginPath();
          ctx.arc(slot.x, 4, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = unlocked ? "rgba(255,255,255,0.88)" : "rgba(141, 225, 255, 0.16)";
          ctx.lineWidth = unlocked ? 2 : 1.5;
          ctx.stroke();
          if (unlocked) {
            ctx.fillStyle = "rgba(255,255,255,0.95)";
            ctx.font = "900 13px Avenir Next";
            ctx.fillText(String(index + 1), slot.x, 8.5);
          }
        });

        if (state.replay) {
          const t = clamp(state.replay.timer / state.replay.duration, 0, 1);
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = `rgba(${state.replay.glow}, ${0.35 + (1 - t) * 0.45})`;
          ctx.lineWidth = 4;
          for (let ring = 0; ring < 3; ring += 1) {
            ctx.beginPath();
            ctx.arc(0, 4, 28 + ring * 18 + t * 34, 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }
        ctx.restore();
      }

      function drawCovers() {
        COVER_NODES.forEach((cover, index) => {
          const glow = ctx.createRadialGradient(cover.x, cover.y, 10, cover.x, cover.y, cover.radius + 18);
          glow.addColorStop(0, "rgba(84, 202, 255, 0.16)");
          glow.addColorStop(1, "rgba(84, 202, 255, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(cover.x - cover.radius - 20, cover.y - cover.radius - 20, (cover.radius + 20) * 2, (cover.radius + 20) * 2);

          ctx.fillStyle = index % 2 === 0 ? "rgba(18, 33, 60, 0.94)" : "rgba(20, 26, 54, 0.94)";
          ctx.beginPath();
          ctx.arc(cover.x, cover.y, cover.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(130, 221, 255, 0.28)";
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.strokeStyle = "rgba(111, 225, 255, 0.15)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.arc(cover.x, cover.y, cover.inner, 0, Math.PI * 2);
          ctx.stroke();
        });
      }

      function drawPerformer(performer) {
        const progress = performer.ready ? performer.readyMeter : performer.readyMeter * 0.6;
        ctx.save();

        const trailOffsets = [0.18, 0.1, 0.04];
        trailOffsets.forEach((trailOffset, index) => {
          const ghost = performer.motion(Math.max(0, state.backgroundTime - trailOffset - performer.trailOffset * index));
          ctx.fillStyle = `rgba(${performer.glow}, ${0.08 + index * 0.04})`;
          ctx.beginPath();
          ctx.arc(ghost.x, ghost.y, 17 - index * 3, 0, Math.PI * 2);
          ctx.fill();
        });

        ctx.translate(performer.x, performer.y);
        const bodyGlow = ctx.createRadialGradient(0, 0, 6, 0, 0, 34);
        bodyGlow.addColorStop(0, `rgba(${performer.glow}, ${performer.copied ? 0.18 : 0.42})`);
        bodyGlow.addColorStop(1, `rgba(${performer.glow}, 0)`);
        ctx.fillStyle = bodyGlow;
        ctx.fillRect(-38, -38, 76, 76);

        ctx.fillStyle = performer.copied ? "rgba(24, 33, 58, 0.92)" : "rgba(14, 30, 58, 0.95)";
        ctx.beginPath();
        ctx.ellipse(0, 0, 18, 24, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = performer.accent;
        ctx.lineWidth = performer.copied ? 1.5 : 2.2;
        ctx.beginPath();
        ctx.ellipse(0, 0, 18, 24, 0, 0, Math.PI * 2);
        ctx.stroke();

        performer.glyph(state.backgroundTime, progress).forEach((glyph) => {
          ctx.fillStyle = performer.copied ? "rgba(128, 149, 178, 0.3)" : performer.accent;
          ctx.beginPath();
          ctx.arc(glyph.x, glyph.y, glyph.r, 0, Math.PI * 2);
          ctx.fill();
        });

        if (!performer.copied) {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = `rgba(${performer.glow}, ${performer.ready ? 0.9 : 0.26 + performer.readyMeter * 0.22})`;
          ctx.lineWidth = performer.ready ? 4.2 : 2;
          ctx.beginPath();
          ctx.arc(0, 0, 30 + performer.readyMeter * 8, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        ctx.font = "700 11px Avenir Next";
        ctx.fillStyle = performer.copied ? "rgba(180, 198, 218, 0.74)" : "rgba(236, 251, 255, 0.84)";
        ctx.textAlign = "center";
        ctx.fillText(performer.label, 0, -34);
        ctx.restore();
      }

      function drawPlayer() {
        const player = state.player;
        const covered = isCovered(player);
        const bob = Math.sin(state.backgroundTime * 7.5) * (player.speed > 2 ? 3 : 1.3);
        ctx.save();
        ctx.translate(player.x, player.y + bob);

        const playerGlow = ctx.createRadialGradient(0, 0, 8, 0, 0, 40);
        playerGlow.addColorStop(0, state.replay ? "rgba(255, 232, 142, 0.46)" : "rgba(112, 240, 255, 0.36)");
        playerGlow.addColorStop(1, "rgba(112, 240, 255, 0)");
        ctx.fillStyle = playerGlow;
        ctx.fillRect(-48, -48, 96, 96);

        if (covered) {
          ctx.strokeStyle = "rgba(141, 255, 228, 0.48)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, 24 + Math.sin(state.backgroundTime * 4) * 2, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.rotate(player.facing + Math.PI / 2);
        ctx.fillStyle = "rgba(220, 242, 255, 0.92)";
        ctx.beginPath();
        ctx.moveTo(0, -22);
        ctx.lineTo(15, 18);
        ctx.lineTo(0, 10);
        ctx.lineTo(-15, 18);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = state.replay ? "rgba(255, 231, 144, 0.86)" : "rgba(48, 184, 255, 0.85)";
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawParticles() {
        state.ripples.forEach((ripple) => {
          ctx.strokeStyle = `rgba(${ripple.color}, ${ripple.alpha})`;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
          ctx.stroke();
        });

        state.particles.forEach((particle) => {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = `rgba(${particle.color}, ${alpha})`;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawHUD() {
        ctx.save();
        ctx.fillStyle = "rgba(5, 10, 22, 0.64)";
        roundRect(18, 14, 280, 78, 22);
        ctx.fill();
        roundRect(VIEW.width - 250, 14, 232, 78, 22);
        ctx.fill();

        ctx.fillStyle = "#ecfdff";
        ctx.font = "800 16px Avenir Next";
        ctx.fillText("WITNESS", 36, 38);
        ctx.fillText("PATTERN QUEUE", VIEW.width - 230, 38);

        roundRect(36, 48, 228, 14, 999);
        ctx.fillStyle = "rgba(20, 34, 58, 0.95)";
        ctx.fill();
        const witnessGradient = ctx.createLinearGradient(36, 0, 264, 0);
        witnessGradient.addColorStop(0, "#6ce6ff");
        witnessGradient.addColorStop(0.5, "#ffcf76");
        witnessGradient.addColorStop(1, "#ff7098");
        ctx.fillStyle = witnessGradient;
        roundRect(36, 48, 228 * (state.witness / 100), 14, 999);
        ctx.fill();

        ctx.fillStyle = "rgba(220, 240, 255, 0.82)";
        ctx.font = "700 11px Avenir Next";
        ctx.fillText(`노출 ${state.exposure.toFixed(1)}s`, 36, 80);
        ctx.fillText(`최고치 ${Math.round(state.witnessPeak)}%`, 120, 80);

        const performers = state.performers;
        performers.forEach((performer, index) => {
          const x = VIEW.width - 218 + index * 70;
          const unlocked = state.vaultUnlocks.includes(performer.id);
          const copied = performer.copied;
          ctx.fillStyle = unlocked ? performer.accent : copied ? "rgba(21, 40, 67, 0.96)" : "rgba(17, 24, 45, 0.9)";
          roundRect(x, 48, 56, 24, 14);
          ctx.fill();
          ctx.strokeStyle = copied ? "rgba(255,255,255,0.3)" : "rgba(146, 232, 255, 0.22)";
          ctx.lineWidth = 1.6;
          roundRect(x, 48, 56, 24, 14);
          ctx.stroke();
          ctx.fillStyle = unlocked ? "rgba(255,255,255,0.94)" : copied ? "#eafcff" : "rgba(188, 214, 255, 0.72)";
          ctx.font = "800 11px Avenir Next";
          ctx.fillText(unlocked ? "LOCK" : copied ? "COPY" : "VOID", x + 12, 64);
        });

        ctx.fillStyle = "rgba(214, 240, 255, 0.7)";
        ctx.font = "700 11px Avenir Next";
        ctx.fillText("클릭/탭 훔치기", 36, VIEW.height - 26);
        ctx.fillText("Space/두 손가락 탭 재생", 138, VIEW.height - 26);
        ctx.fillText("엄폐 또는 정지로 목격 억제", 312, VIEW.height - 26);
        ctx.fillText(`${state.vaultUnlocks.length}/3`, VIEW.width - 52, 80);

        if (state.replay) {
          const progress = state.replay.timer / state.replay.duration;
          roundRect(VIEW.width / 2 - 110, 16, 220, 18, 999);
          ctx.fillStyle = "rgba(8, 18, 34, 0.82)";
          ctx.fill();
          ctx.fillStyle = state.replay.color;
          roundRect(VIEW.width / 2 - 110, 16, 220 * progress, 18, 999);
          ctx.fill();
          ctx.fillStyle = "#ffffff";
          ctx.font = "800 12px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(`${state.replay.label} 재생 중`, VIEW.width / 2, 29.5);
          ctx.textAlign = "left";
        }
        ctx.restore();
      }

      function drawOverlay(title, accent, bodyLines, kicker) {
        ctx.save();
        ctx.fillStyle = "rgba(5, 8, 18, 0.6)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const panelX = 118;
        const panelY = 70;
        const panelWidth = VIEW.width - 236;
        const panelHeight = VIEW.height - 140;
        const panelGradient = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelHeight);
        panelGradient.addColorStop(0, "rgba(10, 18, 36, 0.92)");
        panelGradient.addColorStop(1, "rgba(7, 12, 24, 0.96)");
        ctx.fillStyle = panelGradient;
        roundRect(panelX, panelY, panelWidth, panelHeight, 28);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2.5;
        roundRect(panelX, panelY, panelWidth, panelHeight, 28);
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = "700 13px Avenir Next";
        ctx.fillText(kicker, panelX + 42, panelY + 42);
        ctx.fillStyle = "#f5feff";
        ctx.font = "900 44px Avenir Next";
        ctx.fillText(title, panelX + 42, panelY + 92);

        ctx.font = "700 18px Avenir Next";
        bodyLines.forEach((line, index) => {
          ctx.fillStyle = index === 0 ? "rgba(230, 251, 255, 0.94)" : "rgba(207, 227, 242, 0.84)";
          drawWrappedText(line, panelX + 42, panelY + 148 + index * 42, panelWidth - 84, 28);
        });
        ctx.restore();
      }

      function drawScene() {
        drawBackground();
        drawArenaShell();
        const searchlights = getSearchlights();
        drawSearchlights(searchlights);
        drawVault();
        drawCovers();
        state.performers.forEach(drawPerformer);
        drawPlayer();
        drawParticles();
        drawHUD();

        state.popups.forEach((popup) => {
          const alpha = clamp(popup.life / popup.maxLife, 0, 1);
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = popup.important ? "800 16px Avenir Next" : "700 13px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.textAlign = "left";
          ctx.globalAlpha = 1;
        });

        if (state.flash > 0.01) {
          ctx.fillStyle =
            state.mode === "failed"
              ? `rgba(255, 92, 134, ${state.flash * 0.32})`
              : `rgba(151, 235, 255, ${state.flash * 0.22})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function render() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        if (state.shake > 0.1 && !prefersReducedMotion) {
          const offsetX = (Math.random() - 0.5) * state.shake;
          const offsetY = (Math.random() - 0.5) * state.shake;
          ctx.setTransform(1, 0, 0, 1, offsetX, offsetY);
        }

        drawScene();

        if (state.mode === "menu") {
          drawOverlay(
            "Biomech Theater: Mirror Heist",
            "#80eaff",
            [
              META_DESCRIPTION,
              META_CONTROLS,
              `클리어: ${META_CLEAR}`,
              `실패: ${META_FAIL}`,
              "터치 또는 Enter로 시작. 엄폐 기둥 뒤에 멈추면 시선이 빠르게 식습니다.",
            ],
            "PATTERN THEFT STEALTH"
          );
        } else if (state.mode === "failed") {
          const failCopy =
            state.lastReason === "gaze_locked"
              ? "감시 시선에 오래 고정돼 무대 전체가 적색 경보로 잠겼습니다."
              : "목격 게이지가 폭주하며 금고실이 봉쇄됐습니다.";
          drawOverlay(
            "CURTAIN DOWN",
            "#ff7d9d",
            [
              failCopy,
              `최종 목격치 ${Math.round(state.witness)}% · 생존 ${state.lastRunTime.toFixed(1)}초`,
              "터치 또는 Enter로 재시작하고, 엄폐 뒤 정지 타이밍을 더 오래 가져가세요.",
            ],
            "HEIST FAILED"
          );
        } else if (state.mode === "cleared") {
          drawOverlay(
            "VAULT OPEN",
            "#d2ff7c",
            [
              "세 패턴을 모두 재생해 바이오메크 금고가 열렸습니다.",
              `최종 목격치 ${Math.round(state.witness)}% · 클리어 ${state.lastRunTime.toFixed(1)}초`,
              "호스트에선 다음 스테이지로 이어지고, 단독 실행에선 터치 또는 Enter로 다시 플레이할 수 있습니다.",
            ],
            "MIRROR HEIST COMPLETE"
          );
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "origin top-left; x increases right, y increases down",
          mode: state.mode,
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            covered: isCovered(state.player),
            speed: Number(state.player.speed.toFixed(1)),
          },
          witness: Number(state.witness.toFixed(1)),
          exposure_seconds: Number(state.exposure.toFixed(2)),
          unlocks: [...state.vaultUnlocks],
          replaying: state.replay ? state.replay.patternId : null,
          performers: state.performers.map((performer) => ({
            id: performer.id,
            x: Number(performer.x.toFixed(1)),
            y: Number(performer.y.toFixed(1)),
            copied: performer.copied,
            ready: performer.ready,
          })),
          pending_patterns: getPendingPatterns().map((performer) => performer.id),
          searchlights: getSearchlights().map((beam) => ({
            x: Number(beam.x.toFixed(1)),
            y: Number(beam.y.toFixed(1)),
            angle: Number(beam.angle.toFixed(2)),
            cone: Number(beam.cone.toFixed(2)),
          })),
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "biomech-theater-mirror-theft-witness",
        title: "Biomech Theater: Mirror Heist",
        creator: "jungcollin",
        genre: "Pattern theft stealth / 목격 게이지",
        clearCondition: META_CLEAR,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "running") {
            resetRun();
          }
          state.vaultUnlocks = PERFORMER_DEFS.map((performer) => performer.id);
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode !== "running") {
            resetRun();
          }
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);
      canvas.addEventListener("lostpointercapture", releasePointer);
      canvas.addEventListener("touchstart", onTouchStart, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());

      bindTapButton(document.querySelector('[data-control="replay"]'), () => {
        attemptReplay();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared")) {
          event.preventDefault();
          resetRun();
          return;
        }
        if (event.key === " " || event.code === "Space") {
          event.preventDefault();
          attemptReplay();
          return;
        }
        onKeyChange(event, true);
      });

      window.addEventListener("keyup", (event) => {
        onKeyChange(event, false);
      });

      window.addEventListener("blur", () => {
        input.left = false;
        input.right = false;
        input.up = false;
        input.down = false;
        releasePointer();
      });

      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
