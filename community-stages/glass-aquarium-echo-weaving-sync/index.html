<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Aquarium: Echo Loom</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Pretendard Variable", "Apple SD Gothic Neo", "Segoe UI",
          sans-serif;
        background: #03111f;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(122, 216, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(3, 17, 31, 0.92);
        color: #eff9ff;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #03111f;
        touch-action: none;
      }

      canvas:focus-visible,
      .mobile-btn:focus-visible {
        outline: 3px solid rgba(196, 243, 255, 0.96);
        outline-offset: 3px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 18;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        justify-content: center;
        width: min(100%, 320px);
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(174, 240, 255, 0.28);
        border-radius: 18px;
        min-width: 120px;
        min-height: 56px;
        padding: 0 20px;
        background:
          linear-gradient(180deg, rgba(141, 228, 255, 0.3), rgba(10, 49, 76, 0.88)),
          rgba(4, 21, 37, 0.82);
        color: #effaff;
        font: 700 18px/1 "Avenir Next", "Pretendard Variable", "Apple SD Gothic Neo",
          "Segoe UI", sans-serif;
        box-shadow:
          0 12px 26px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.24);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        background:
          linear-gradient(180deg, rgba(255, 168, 234, 0.45), rgba(74, 18, 68, 0.95)),
          rgba(44, 12, 50, 0.94);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-btn {
          min-width: 112px;
          min-height: 52px;
          border-radius: 16px;
          font-size: 17px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Glass Aquarium: Echo Loom. 화면 터치 또는 클릭으로 시작합니다. 마우스 또는 터치 드래그로
      실 배치, 클릭 또는 터치 홀드로 잔상 기록, 같은 박자에 맞춰 연속 입력합니다. 모바일에서는
      화면 터치와 드래그, 하단 잔상 홀드 버튼만으로 플레이할 수 있습니다. 동기화 문을 모두 맞춘
      뒤 모든 코어 문양을 연결하면 클리어, 동기화 창을 여러 번 놓치거나 잔상 선이 끊기면 즉시
      실패합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Glass Aquarium: Echo Loom"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작">
      <div class="mobile-controls__row">
        <button type="button" class="mobile-btn" id="echo-btn" aria-label="잔상 기록 홀드">
          잔상 홀드
        </button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "glass-aquarium-echo-weaving-sync";
      const STAGE_TITLE = "Glass Aquarium: Echo Loom";
      const STAGE_DESCRIPTION =
        "3초 잔상 실로 동기화 문을 같은 박자에 묶고, 마지막 코어 문양까지 한 번에 잇는 유리 수조 퍼즐 액션.";
      const STAGE_GENRE = "Echo puzzler / 동기화 문";
      const CLEAR_CONDITION = "동기화 문을 모두 맞춘 뒤 모든 코어 문양을 연결하면 클리어";
      const FAIL_CONDITION = "동기화 창을 여러 번 놓치거나 잔상 선이 끊기면 즉시 실패";
      const CONTROL_TEXT =
        "마우스 또는 터치 드래그로 실 배치, 클릭 또는 터치 홀드로 잔상 기록, 같은 박자에 맞춰 연속 입력, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const echoButton = document.querySelector("#echo-btn");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const HOLD_DURATION = 0.36;
      const BEAT_INTERVAL = 2.25;
      const BEAT_WINDOW = 0.22;
      const TARGET_SYNCS = 2;
      const MISS_LIMIT = 3;
      const SNAP_DISTANCE = 54;
      const DRAG_BREAK_DISTANCE = 294;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const COLORS = {
        bgTop: "#071827",
        bgBottom: "#02101c",
        aqua: "#81d9ff",
        aquaSoft: "rgba(129, 217, 255, 0.24)",
        cyan: "#7be8ff",
        mint: "#87ffd9",
        pink: "#ff9ddc",
        violet: "#8ba6ff",
        gold: "#ffe8a8",
        white: "#f5feff",
        ink: "#08111d",
        glass: "rgba(167, 233, 255, 0.14)",
        glassBright: "rgba(227, 250, 255, 0.2)",
        danger: "#ff8c9f",
        dangerDeep: "#6c1528",
      };

      const nodes = {
        hub: { x: 480, y: 446, type: "hub", label: "허브" },
        leftRelay: { x: 210, y: 272, type: "relay", label: "좌 릴레이" },
        upperLeft: { x: 308, y: 164, type: "core", label: "코어 1" },
        topDoor: { x: 480, y: 118, type: "door", label: "상단 문" },
        upperRight: { x: 652, y: 164, type: "core", label: "코어 2" },
        rightRelay: { x: 750, y: 272, type: "relay", label: "우 릴레이" },
        lowerRight: { x: 652, y: 380, type: "core", label: "코어 3" },
        bottomDoor: { x: 480, y: 426, type: "door", label: "하단 문" },
        lowerLeft: { x: 308, y: 380, type: "core", label: "코어 4" },
      };

      const connections = {
        hub: ["leftRelay", "upperLeft", "upperRight", "rightRelay", "lowerRight", "lowerLeft"],
        leftRelay: ["hub", "upperLeft", "lowerLeft"],
        upperLeft: ["leftRelay", "hub", "topDoor", "upperRight", "lowerLeft"],
        topDoor: ["upperLeft", "upperRight"],
        upperRight: ["topDoor", "hub", "rightRelay", "upperLeft", "lowerRight"],
        rightRelay: ["hub", "upperRight", "lowerRight"],
        lowerRight: ["rightRelay", "hub", "bottomDoor", "upperRight", "lowerLeft"],
        bottomDoor: ["lowerLeft", "lowerRight"],
        lowerLeft: ["leftRelay", "hub", "bottomDoor", "upperLeft", "lowerRight"],
      };

      const TOP_LOOP = ["hub", "leftRelay", "upperLeft", "topDoor", "upperRight", "rightRelay", "hub"];
      const BOTTOM_LOOP = ["hub", "leftRelay", "lowerLeft", "bottomDoor", "lowerRight", "rightRelay", "hub"];
      const FINAL_CHAIN = ["hub", "upperLeft", "upperRight", "lowerRight", "lowerLeft"];
      const TOP_SIGNATURE = TOP_LOOP.join(">");
      const BOTTOM_SIGNATURE = BOTTOM_LOOP.join(">");
      const FINAL_SIGNATURE = FINAL_CHAIN.join(">");

      const state = {
        mode: "menu",
        phase: "record",
        elapsed: 0,
        lastRunTime: 0,
        currentNodeId: "hub",
        routeNodes: ["hub"],
        topRoutePrimed: false,
        echoRecorded: false,
        echoRoute: null,
        pulses: [],
        particles: [],
        shockwaves: [],
        popups: [],
        bubbles: [],
        phaseTimer: 0,
        beatTimer: 0,
        beatIndex: 0,
        beatResolved: true,
        syncCount: 0,
        misses: 0,
        message: "상단 루프를 그린 뒤 허브를 홀드하세요",
        messageTimer: 0,
        pointer: {
          active: false,
          id: null,
          x: 0,
          y: 0,
          startX: 0,
          startY: 0,
          moved: false,
          holdingHub: false,
          holdTime: 0,
          lastCommitX: 0,
          lastCommitY: 0,
        },
        buttonHold: false,
        buttonHoldTime: 0,
        doorFlashTop: 0,
        doorFlashBottom: 0,
        syncBloom: 0,
        aquariumPulse: 0,
        screenShake: 0,
      };

      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        description: STAGE_DESCRIPTION,
        creator: "jungcollin",
        genre: STAGE_GENRE,
        clearCondition: CLEAR_CONDITION,
        failCondition: FAIL_CONDITION,
        controls: CONTROL_TEXT,
      };

      window.relayStageResult = {
        status: "running",
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function nodeAt(x, y, candidates = Object.keys(nodes)) {
        for (const id of candidates) {
          const node = nodes[id];
          if (Math.hypot(x - node.x, y - node.y) <= SNAP_DISTANCE) {
            return id;
          }
        }
        return null;
      }

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function setMessage(text, tint = COLORS.cyan, duration = 2.2) {
        state.message = text;
        state.messageColor = tint;
        state.messageTimer = duration;
      }

      function spawnAmbientBubbles() {
        state.bubbles = [];
        for (let index = 0; index < 24; index += 1) {
          state.bubbles.push({
            x: rand(76, 884),
            y: rand(78, 490),
            r: rand(2, 8),
            speed: rand(12, 42),
            drift: rand(-12, 12),
            alpha: rand(0.12, 0.45),
          });
        }
      }

      function spawnParticles(x, y, color, count, force = 1) {
        const total = prefersReducedMotion ? Math.ceil(count * 0.45) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(34, 150) * force;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: rand(0.25, 0.65),
            maxLife: 0,
            radius: rand(1.4, 4.6),
            color,
          });
          state.particles[state.particles.length - 1].maxLife =
            state.particles[state.particles.length - 1].life;
        }
      }

      function spawnShockwave(x, y, color, maxRadius) {
        state.shockwaves.push({
          x,
          y,
          color,
          radius: 12,
          maxRadius,
          life: 0.42,
          maxLife: 0.42,
        });
      }

      function spawnPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          vy: -22,
          life: 0.9,
          maxLife: 0.9,
          color,
        });
      }

      function resetPointerState() {
        state.pointer.active = false;
        state.pointer.id = null;
        state.pointer.moved = false;
        state.pointer.holdingHub = false;
        state.pointer.holdTime = 0;
      }

      function resetRoute(nodeId = "hub") {
        state.currentNodeId = nodeId;
        state.routeNodes = [nodeId];
      }

      function startStage() {
        state.mode = "running";
        state.phase = "record";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.phaseTimer = 0;
        state.beatTimer = 0;
        state.beatIndex = 0;
        state.beatResolved = true;
        state.syncCount = 0;
        state.misses = 0;
        state.topRoutePrimed = false;
        state.echoRecorded = false;
        state.echoRoute = null;
        state.pulses.length = 0;
        state.particles.length = 0;
        state.shockwaves.length = 0;
        state.popups.length = 0;
        state.syncBloom = 0;
        state.aquariumPulse = 0;
        state.screenShake = 0;
        state.doorFlashTop = 0;
        state.doorFlashBottom = 0;
        state.buttonHold = false;
        state.buttonHoldTime = 0;
        setMessage("상단 문을 통과하는 루프를 짠 뒤 허브를 길게 눌러 잔상을 저장하세요", COLORS.cyan, 3.2);
        resetPointerState();
        resetRoute("hub");
        spawnAmbientBubbles();
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
      }

      function failStage(reason = FAIL_CONDITION) {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.screenShake = 15;
        state.buttonHold = false;
        state.buttonHoldTime = 0;
        setMessage(reason, COLORS.danger, 3.5);
        spawnParticles(nodes[state.currentNodeId].x, nodes[state.currentNodeId].y, COLORS.danger, 40, 1.15);
        spawnShockwave(nodes[state.currentNodeId].x, nodes[state.currentNodeId].y, COLORS.danger, 180);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.screenShake = 10;
        spawnParticles(nodes.lowerLeft.x, nodes.lowerLeft.y, COLORS.gold, 54, 1.25);
        spawnParticles(nodes.lowerRight.x, nodes.lowerRight.y, COLORS.mint, 54, 1.25);
        spawnShockwave(nodes.hub.x, nodes.hub.y, COLORS.gold, 240);
        setMessage("유리 수조가 동기화되었습니다", COLORS.gold, 3.8);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function triggerLineBreak(reason = "잔상 선이 끊어졌습니다") {
        failStage(reason);
      }

      function isBeatWindow() {
        return state.beatTimer <= BEAT_WINDOW || state.beatTimer >= BEAT_INTERVAL - BEAT_WINDOW;
      }

      function launchPulse(routeNodes, source) {
        const length = Math.max(routeNodes.length - 1, 1);
        state.pulses.push({
          routeNodes: routeNodes.slice(),
          source,
          progress: 0,
          duration: Math.max(0.82, length * 0.26),
          color: source === "echo" ? COLORS.pink : COLORS.cyan,
          width: source === "echo" ? 7 : 8,
        });
      }

      function startSyncPhase() {
        state.phase = "sync";
        state.phaseTimer = 0;
        state.beatTimer = 0;
        state.beatIndex = 0;
        state.beatResolved = true;
        state.echoRecorded = true;
        state.echoRoute = TOP_LOOP.slice();
        state.pulses.length = 0;
        launchPulse(state.echoRoute, "echo");
        spawnPopup("ECHO STORED", nodes.hub.x, nodes.hub.y - 48, COLORS.pink);
        spawnShockwave(nodes.hub.x, nodes.hub.y, COLORS.pink, 180);
        setMessage("하단 루프를 같은 박자에 허브로 되돌려 두 문을 맞추세요", COLORS.mint, 3.2);
      }

      function startFinalPhase() {
        state.phase = "final";
        state.phaseTimer = 0;
        state.pulses.length = 0;
        state.syncBloom = 1.25;
        resetRoute("hub");
        spawnShockwave(nodes.hub.x, nodes.hub.y, COLORS.gold, 260);
        setMessage("숫자 순서대로 코어 네 개를 한 번에 잇으면 클리어", COLORS.gold, 3.2);
      }

      function handleSyncSuccess() {
        state.syncCount += 1;
        state.beatResolved = true;
        state.doorFlashTop = 1;
        state.doorFlashBottom = 1;
        state.syncBloom = 1;
        state.screenShake = 5;
        spawnParticles(nodes.topDoor.x, nodes.topDoor.y, COLORS.pink, 22, 0.95);
        spawnParticles(nodes.bottomDoor.x, nodes.bottomDoor.y, COLORS.cyan, 22, 0.95);
        spawnPopup(`SYNC ${state.syncCount}/${TARGET_SYNCS}`, VIEW.width * 0.5, 96, COLORS.gold);
        setMessage("두 문이 같은 박자로 묶였습니다", COLORS.gold, 1.8);
        if (state.syncCount >= TARGET_SYNCS) {
          startFinalPhase();
        }
      }

      function handleBeatRoll() {
        if (state.phase !== "sync" || state.mode !== "running") {
          return;
        }
        if (!state.beatResolved) {
          state.misses += 1;
          state.screenShake = 4;
          spawnPopup(`MISS ${state.misses}/${MISS_LIMIT}`, VIEW.width * 0.5, 104, COLORS.danger);
          spawnParticles(nodes.topDoor.x, nodes.topDoor.y, COLORS.danger, 16, 0.8);
          spawnParticles(nodes.bottomDoor.x, nodes.bottomDoor.y, COLORS.danger, 16, 0.8);
          setMessage("동기화 창을 놓쳤습니다", COLORS.danger, 1.6);
          if (state.misses >= MISS_LIMIT) {
            triggerLineBreak(FAIL_CONDITION);
            return;
          }
        }
        state.beatResolved = false;
        state.beatIndex += 1;
        launchPulse(TOP_LOOP, "echo");
      }

      function routeSignature(routeNodes) {
        return routeNodes.join(">");
      }

      function evaluateFinishedRoute() {
        const signature = routeSignature(state.routeNodes);
        if (state.phase === "record") {
          if (signature === TOP_SIGNATURE) {
            state.topRoutePrimed = true;
            spawnPopup("TOP LOOP READY", nodes.hub.x, nodes.hub.y - 34, COLORS.cyan);
            spawnParticles(nodes.topDoor.x, nodes.topDoor.y, COLORS.cyan, 20, 0.85);
            setMessage("허브를 길게 눌러 3초 잔상을 저장하세요", COLORS.pink, 2.8);
          } else {
            setMessage("상단 문을 가로지르는 루프여야 합니다", COLORS.aqua, 1.8);
          }
          resetRoute("hub");
          return;
        }

        if (state.phase === "sync") {
          if (signature === BOTTOM_SIGNATURE) {
            launchPulse(BOTTOM_LOOP, "manual");
            spawnParticles(nodes.bottomDoor.x, nodes.bottomDoor.y, COLORS.cyan, 20, 0.85);
            if (isBeatWindow() && !state.beatResolved) {
              handleSyncSuccess();
            } else {
              setMessage("허브로 돌아오는 타이밍을 박자 원과 맞추세요", COLORS.violet, 1.8);
            }
          } else {
            setMessage("하단 문을 통과하는 루프가 필요합니다", COLORS.aqua, 1.8);
          }
          resetRoute("hub");
          return;
        }

        if (state.phase === "final") {
          if (signature === FINAL_SIGNATURE) {
            clearStage();
          } else {
            setMessage("코어는 1→2→3→4 순서로 연결됩니다", COLORS.gold, 1.8);
          }
          resetRoute("hub");
        }
      }

      function canTravelTo(nextId) {
        return connections[state.currentNodeId]?.includes(nextId);
      }

      function commitNode(nextId) {
        if (!nextId || nextId === state.currentNodeId || state.mode !== "running") {
          return;
        }
        if (!canTravelTo(nextId)) {
          triggerLineBreak("실이 허용된 문양을 벗어났습니다");
          return;
        }
        if (state.routeNodes.includes(nextId) && nextId !== "hub") {
          triggerLineBreak("실이 교차하며 끊어졌습니다");
          return;
        }

        const from = nodes[state.currentNodeId];
        const to = nodes[nextId];
        state.currentNodeId = nextId;
        state.routeNodes.push(nextId);
        spawnParticles(to.x, to.y, nextId.includes("Door") ? COLORS.gold : COLORS.cyan, 8, 0.5);
        spawnShockwave(to.x, to.y, COLORS.aquaSoft, 46);
        state.pointer.lastCommitX = to.x;
        state.pointer.lastCommitY = to.y;

        if (nextId === "topDoor") {
          state.doorFlashTop = 0.75;
        } else if (nextId === "bottomDoor") {
          state.doorFlashBottom = 0.75;
        }

        if (state.phase === "final" && routeSignature(state.routeNodes) === FINAL_SIGNATURE) {
          clearStage();
          return;
        }

        if (nextId === "hub" && state.routeNodes.length > 1) {
          evaluateFinishedRoute();
        }
      }

      function tryRecordEcho() {
        if (state.mode !== "running" || state.phase !== "record" || !state.topRoutePrimed) {
          return false;
        }
        if (state.currentNodeId !== "hub" || routeSignature(state.routeNodes) !== "hub") {
          return false;
        }
        startSyncPhase();
        return true;
      }

      function updatePointerCommit() {
        if (!state.pointer.active || state.mode !== "running") {
          return;
        }
        const neighbors = connections[state.currentNodeId] || [];
        const candidate = nodeAt(state.pointer.x, state.pointer.y, neighbors);
        if (!candidate) {
          if (Math.hypot(state.pointer.x - nodes[state.currentNodeId].x, state.pointer.y - nodes[state.currentNodeId].y) > DRAG_BREAK_DISTANCE) {
            triggerLineBreak("실 장력이 한계를 넘었습니다");
          }
          return;
        }
        const movedSinceCommit = Math.hypot(
          state.pointer.x - state.pointer.lastCommitX,
          state.pointer.y - state.pointer.lastCommitY
        );
        if (movedSinceCommit < 18) {
          return;
        }
        commitNode(candidate);
      }

      function handlePointerDown(event) {
        const point = pointFromEvent(event);
        canvas.focus();

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          state.pointer.x = point.x;
          state.pointer.y = point.y;
          return;
        }

        const currentNode = nodes[state.currentNodeId];
        const nearCurrent = Math.hypot(point.x - currentNode.x, point.y - currentNode.y) <= SNAP_DISTANCE + 8;

        state.pointer.active = true;
        state.pointer.id = event.pointerId;
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        state.pointer.startX = point.x;
        state.pointer.startY = point.y;
        state.pointer.lastCommitX = currentNode.x;
        state.pointer.lastCommitY = currentNode.y;
        state.pointer.moved = false;
        state.pointer.holdingHub =
          nearCurrent &&
          state.currentNodeId === "hub" &&
          state.phase === "record" &&
          state.topRoutePrimed;
        state.pointer.holdTime = 0;

        canvas.setPointerCapture?.(event.pointerId);
      }

      function handlePointerMove(event) {
        if (!state.pointer.active || event.pointerId !== state.pointer.id || state.mode !== "running") {
          return;
        }
        const point = pointFromEvent(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        if (Math.hypot(point.x - state.pointer.startX, point.y - state.pointer.startY) > 10) {
          state.pointer.moved = true;
          state.pointer.holdingHub = false;
        }
        updatePointerCommit();
      }

      function handlePointerUp(event) {
        if (state.pointer.active && event.pointerId === state.pointer.id) {
          state.pointer.active = false;
          state.pointer.id = null;
          state.pointer.holdingHub = false;
          state.pointer.holdTime = 0;
        }
      }

      function handleKeyDown(event) {
        if ((state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") && (event.key === "Enter" || event.key === " ")) {
          event.preventDefault();
          startStage();
          return;
        }
        if (state.mode !== "running") {
          return;
        }
        if ((event.key === " " || event.key.toLowerCase() === "e") && state.phase === "record") {
          event.preventDefault();
          tryRecordEcho();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const end = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", end);
        button.addEventListener("pointercancel", end);
        button.addEventListener("lostpointercapture", end);
      }

      function updatePulses(dt) {
        for (let index = state.pulses.length - 1; index >= 0; index -= 1) {
          const pulse = state.pulses[index];
          pulse.progress += dt / pulse.duration;
          if (pulse.progress >= 1) {
            state.pulses.splice(index, 1);
          }
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 8 * dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }
      }

      function updateShockwaves(dt) {
        for (let index = state.shockwaves.length - 1; index >= 0; index -= 1) {
          const ring = state.shockwaves[index];
          ring.life -= dt;
          ring.radius += (ring.maxRadius - ring.radius) * 0.16;
          if (ring.life <= 0) {
            state.shockwaves.splice(index, 1);
          }
        }
      }

      function updatePopups(dt) {
        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          popup.y += popup.vy * dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }
      }

      function updateBubbles(dt) {
        state.aquariumPulse += dt;
        for (const bubble of state.bubbles) {
          bubble.y -= bubble.speed * dt;
          bubble.x += Math.sin(state.aquariumPulse * 0.8 + bubble.y * 0.012) * bubble.drift * dt;
          if (bubble.y < 70 - bubble.r) {
            bubble.y = 492 + bubble.r;
            bubble.x = rand(86, 874);
            bubble.alpha = rand(0.12, 0.45);
          }
        }
      }

      function update(dt) {
        updateBubbles(dt);
        updatePulses(dt);
        updateParticles(dt);
        updateShockwaves(dt);
        updatePopups(dt);

        state.screenShake = Math.max(0, state.screenShake - dt * 24);
        state.doorFlashTop = Math.max(0, state.doorFlashTop - dt * 1.8);
        state.doorFlashBottom = Math.max(0, state.doorFlashBottom - dt * 1.8);
        state.syncBloom = Math.max(0, state.syncBloom - dt * 0.9);

        if (state.messageTimer > 0) {
          state.messageTimer = Math.max(0, state.messageTimer - dt);
        }

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        state.phaseTimer += dt;

        if (state.pointer.holdingHub && !state.pointer.moved) {
          state.pointer.holdTime += dt;
          if (state.pointer.holdTime >= HOLD_DURATION) {
            state.pointer.holdingHub = false;
            state.pointer.active = false;
            tryRecordEcho();
          }
        }

        if (state.buttonHold) {
          state.buttonHoldTime += dt;
          if (state.buttonHoldTime >= HOLD_DURATION) {
            state.buttonHold = false;
            tryRecordEcho();
          }
        }

        if (state.phase === "sync") {
          state.beatTimer += dt;
          if (state.beatTimer >= BEAT_INTERVAL) {
            state.beatTimer -= BEAT_INTERVAL;
            handleBeatRoll();
          }
        }
      }

      function drawBackdrop() {

        ctx.beginPath();
        ctx.moveTo(58, 58);
        ctx.lineTo(326, 58);
        ctx.lineTo(648, 492);

        ctx.fill();

        ctx.beginPath();

        ctx.save();

          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBubbles() {
        for (const bubble of state.bubbles) {
          ctx.save();
          ctx.globalAlpha = bubble.alpha;
          ctx.fillStyle = "rgba(196, 244, 255, 0.72)";
          ctx.beginPath();
          ctx.arc(bubble.x, bubble.y, bubble.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawShockwaves() {
        for (const ring of state.shockwaves) {
          ctx.save();
          ctx.globalAlpha = ring.life / ring.maxLife;
          ctx.strokeStyle = ring.color;
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(ring.x, ring.y, ring.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawEdges(edgeIds, color, alpha, width, dashed = false) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = width;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        if (dashed) {
          ctx.setLineDash([14, 10]);
        }
        ctx.beginPath();
        for (let index = 0; index < edgeIds.length - 1; index += 1) {
          const a = nodes[edgeIds[index]];
          const b = nodes[edgeIds[index + 1]];
          if (index === 0) {
            ctx.moveTo(a.x, a.y);
          }
          ctx.lineTo(b.x, b.y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawHints() {
        if (state.mode !== "running") {
          return;
        }
        if (state.phase === "record") {
          drawEdges(TOP_LOOP, "rgba(123, 232, 255, 0.24)", 1, 10, true);
        } else if (state.phase === "sync") {
          drawEdges(TOP_LOOP, "rgba(255, 157, 220, 0.18)", 1, 10, true);
          drawEdges(BOTTOM_LOOP, "rgba(123, 232, 255, 0.24)", 1, 10, true);
        } else if (state.phase === "final") {
          drawEdges(FINAL_CHAIN, "rgba(255, 232, 168, 0.26)", 1, 12, true);
        }
      }

      function drawRoute() {
        if (state.routeNodes.length <= 1) {
          return;
        }
        ctx.save();
        ctx.strokeStyle = "rgba(122, 238, 255, 0.9)";
        ctx.shadowColor = "rgba(122, 238, 255, 0.52)";
        ctx.shadowBlur = 18;
        ctx.lineWidth = 8;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        for (let index = 0; index < state.routeNodes.length; index += 1) {
          const node = nodes[state.routeNodes[index]];
          if (index === 0) {
            ctx.moveTo(node.x, node.y);
          } else {
            ctx.lineTo(node.x, node.y);
          }
        }
        if (state.pointer.active && state.mode === "running") {
          ctx.lineTo(state.pointer.x, state.pointer.y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawPulses() {
        for (const pulse of state.pulses) {
          drawEdges(
            pulse.routeNodes,
            pulse.source === "echo" ? "rgba(255, 157, 220, 0.42)" : "rgba(123, 232, 255, 0.44)",
            1,
            pulse.width,
            false
          );
          const sample = pulsePoint(pulse.routeNodes, clamp(pulse.progress, 0, 1));
          ctx.save();
          ctx.fillStyle = pulse.color;
          ctx.shadowColor = pulse.color;
          ctx.shadowBlur = pulse.source === "echo" ? 24 : 18;
          ctx.beginPath();
          ctx.arc(sample.x, sample.y, pulse.source === "echo" ? 9 : 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function pulsePoint(routeNodes, progress) {
        const points = routeNodes.map((id) => nodes[id]);
        const segments = [];
        let total = 0;
        for (let index = 0; index < points.length - 1; index += 1) {
          const len = distance(points[index], points[index + 1]);
          segments.push({ a: points[index], b: points[index + 1], len, start: total });
          total += len;
        }
        const target = total * progress;
        for (const segment of segments) {
          if (target <= segment.start + segment.len) {
            const local = clamp((target - segment.start) / segment.len, 0, 1);
            return {
              x: segment.a.x + (segment.b.x - segment.a.x) * local,
              y: segment.a.y + (segment.b.y - segment.a.y) * local,
            };
          }
        }
        return { x: points[points.length - 1].x, y: points[points.length - 1].y };
      }

      function drawNodes() {
        for (const [id, node] of Object.entries(nodes)) {
          const isCore = node.type === "core";
          const isDoor = node.type === "door";
          const isHub = node.type === "hub";
          let glow = COLORS.aqua;
          if (isDoor) {
            glow = id === "topDoor" ? COLORS.pink : COLORS.cyan;
          }
          if (isHub) {
            glow = state.phase === "final" ? COLORS.gold : COLORS.mint;
          }
          if (isCore && state.phase === "final") {
            glow = COLORS.gold;
          }

          const flash =
            id === "topDoor"
              ? state.doorFlashTop
              : id === "bottomDoor"
                ? state.doorFlashBottom
                : 0;
          const radius = isHub ? 22 : isDoor ? 18 : isCore ? 16 : 13;

          ctx.save();
          ctx.translate(node.x, node.y);
          ctx.shadowColor = glow;
          ctx.shadowBlur = 20 + flash * 24;
          ctx.fillStyle = isDoor ? "rgba(10, 29, 46, 0.92)" : "rgba(8, 22, 35, 0.92)";
          ctx.beginPath();
          ctx.arc(0, 0, radius + 6 + flash * 2, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = glow;
          ctx.globalAlpha = 0.14 + flash * 0.35;
          ctx.beginPath();
          ctx.arc(0, 0, radius + 9 + flash * 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;

          ctx.lineWidth = isDoor ? 3 : 2;
          ctx.strokeStyle = isDoor ? glow : "rgba(224, 250, 255, 0.88)";
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.stroke();

          if (isDoor) {
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            ctx.lineTo(10, 0);
            ctx.moveTo(0, -10);
            ctx.lineTo(0, 10);
            ctx.stroke();
          } else if (isHub) {
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, 7, 0, Math.PI * 2);
            ctx.fill();
          } else if (isCore) {
            ctx.strokeStyle = glow;
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(0, -8);
            ctx.lineTo(7, 0);
            ctx.lineTo(0, 8);
            ctx.lineTo(-7, 0);
            ctx.closePath();
            ctx.stroke();
          } else {
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fill();
          }

          if (state.phase === "final" && isCore) {
            const order = { upperLeft: "1", upperRight: "2", lowerRight: "3", lowerLeft: "4" }[id];
            ctx.fillStyle = COLORS.ink;
            ctx.font = "700 12px Avenir Next, Pretendard Variable, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(order, 0, 0.5);
          }
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const particle of state.particles) {

          ctx.fillStyle = particle.color;

          ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPopups() {
        for (const popup of state.popups) {

        ctx.fillText("동기화 문을 모두 맞춘 뒤 모든 코어 문양을 연결하면 클리어", VIEW.width * 0.5, 334);
        ctx.fillStyle = COLORS.danger;
        ctx.fillText("동기화 창을 여러 번 놓치거나 잔상 선이 끊기면 즉시 실패", VIEW.width * 0.5, 366);
        ctx.fillStyle = COLORS.gold;
        ctx.fillText("화면 터치 또는 클릭으로 시작", VIEW.width * 0.5, 406);
        ctx.textAlign = "left";
      }

      function drawEndCard(title, accent, body) {
        drawPanel(188, 128, 584, 244, 28);
        ctx.fillStyle = accent;
        ctx.font = "700 40px Avenir Next, Pretendard Variable, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width * 0.5, 194);
        ctx.fillStyle = COLORS.white;
        ctx.font = "600 18px Avenir Next, Pretendard Variable, sans-serif";
        ctx.fillText(body, VIEW.width * 0.5, 238);
        ctx.fillText(`런 타임 ${state.lastRunTime.toFixed(1)}초`, VIEW.width * 0.5, 272);
        ctx.fillStyle = "rgba(239, 250, 255, 0.84)";
        ctx.fillText("화면 터치 또는 클릭으로 다시 시작", VIEW.width * 0.5, 320);
        ctx.textAlign = "left";
      }

      function drawPanel(x, y, width, height, radius) {
        ctx.save();
        ctx.fillStyle = "rgba(5, 20, 34, 0.72)";
        ctx.strokeStyle = "rgba(183, 239, 255, 0.16)";
        ctx.lineWidth = 1.5;
        ctx.shadowColor = "rgba(0, 0, 0, 0.22)";
        ctx.shadowBlur = 18;
        roundRect(ctx, x, y, width, height, radius);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function roundRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = prefersReducedMotion ? 0 : rand(-state.screenShake, state.screenShake);
        const shakeY = prefersReducedMotion ? 0 : rand(-state.screenShake, state.screenShake);
        ctx.save();
        ctx.translate(shakeX, shakeY);

        drawBackdrop();
        drawBubbles();
        drawShockwaves();
        drawHints();
        drawPulses();
        drawRoute();
        drawNodes();
        drawParticles();
        drawBeatRing();
        drawHud();
        drawPopups();

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed") {
          drawEndCard("AQUARIUM FRACTURED", COLORS.danger, "잔상 실이 끊어졌습니다");
        } else if (state.mode === "cleared") {
          drawEndCard("SYNC SEALED", COLORS.gold, "유리 수조의 코어 문양이 하나로 봉합되었습니다");
        }

        ctx.restore();
      }

      function frame(timestamp) {
        const seconds = timestamp / 1000;
        const dt = Math.min(MAX_DT, Math.max(0, seconds - lastTimestamp || 0));
        lastTimestamp = seconds;
        update(dt || FIXED_DT);
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      window.render_game_to_text = function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          phase: state.phase,
          node: state.currentNodeId,
          route: state.routeNodes,
          topRoutePrimed: state.topRoutePrimed,
          echoRecorded: state.echoRecorded,
          syncCount: state.syncCount,
          misses: state.misses,
          beatRemaining: state.phase === "sync" ? Number((BEAT_INTERVAL - state.beatTimer).toFixed(2)) : null,
          note:
            state.phase === "record"
              ? "상단 루프 기록"
              : state.phase === "sync"
                ? "하단 루프를 박자에 맞춰 허브로 복귀"
                : "코어 1-2-3-4 연결",
          coordinateSystem: "origin top-left, +x right, +y down",
        });
      };

      window.advanceTime = function advanceTime(ms) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageDebug = {
        forceClear() {
          clearStage();
        },
        forceFail() {
          failStage("debug-force-fail");
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);
      canvas.addEventListener("lostpointercapture", handlePointerUp);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("keydown", handleKeyDown);

      bindHoldButton(
        echoButton,
        () => {
          state.buttonHold = true;
          state.buttonHoldTime = 0;
        },
        () => {
          state.buttonHold = false;
          state.buttonHoldTime = 0;
        }
      );

      spawnAmbientBubbles();
      window.relayStageResult.status = "running";
      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
