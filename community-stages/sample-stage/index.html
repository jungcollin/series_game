<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Stage Slot</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 236, 197, 0.92), transparent 30%),
          linear-gradient(180deg, #8fd4f4 0%, #d8eef8 34%, #f6d6b5 100%);
        color: #162032;
      }

      .card {
        width: min(92vw, 760px);
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 250, 241, 0.92);
        border: 3px solid rgba(23, 50, 77, 0.16);
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.18);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Sample Stage Slot</h1>
      <p>이 파일은 다음 참여자가 실제 스테이지 HTML로 교체할 자리입니다.</p>
      <p>
        새 스테이지를 만들 때는 <code>community-stages/&lt;stage-slug&gt;/index.html</code>을
        추가하고 <code>community-stages/registry.js</code>에 등록하세요.
      </p>
      <p>등록 후 <code>/community-stages/</code>에서 클릭해 바로 플레이할 수 있습니다.</p>
    </article>
    <script>
      window.render_game_to_text = () =>
        JSON.stringify({
          mode: "info",
          note: "Replace this placeholder with a real one-life stage.",
        });
      window.advanceTime = () => window.render_game_to_text();
      window.relayStageMeta = {
        id: "sample-stage",
        title: "Sample Stage Slot",
        creator: "Next Contributor",
        genre: "Placeholder",
        clearCondition: "Replace this file with a real stage.",
      };
      window.relayStageResult = { status: "running" };
    </script>
  </body>
</html>
