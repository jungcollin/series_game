<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>미로 탈출</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__grid {
        pointer-events: auto;
        display: grid;
        grid-template-columns: 64px 64px 64px;
        grid-template-rows: 64px 64px;
        gap: 6px;
        justify-items: center;
        align-items: center;
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 16px;
        width: 64px;
        height: 64px;
        padding: 0;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 28px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      #btn-up { grid-column: 2; grid-row: 1; }
      #btn-left { grid-column: 1; grid-row: 2; }
      #btn-down { grid-column: 2; grid-row: 2; }
      #btn-right { grid-column: 3; grid-row: 2; }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__grid {
          grid-template-columns: 56px 56px 56px;
          grid-template-rows: 56px 56px;
          gap: 4px;
        }

        .mobile-btn {
          width: 56px;
          height: 56px;
          min-height: 56px;
          border-radius: 14px;
          font-size: 24px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">미로 탈출. 캔버스를 터치하거나 Enter로 시작하세요. 방향키/WASD 또는 화면 방향 버튼으로 이동합니다. 30초 안에 미로 출구에 도달하면 클리어입니다.</p>
    <canvas id="game" width="960" height="540" aria-label="미로 탈출" aria-describedby="stage-instructions" tabindex="0"></canvas>

    <nav class="mobile-controls" aria-label="게임 조작">
      <div class="mobile-controls__grid">
        <button id="btn-up" class="mobile-btn" aria-label="위">▲</button>
        <button id="btn-left" class="mobile-btn" aria-label="왼쪽">◀</button>
        <button id="btn-down" class="mobile-btn" aria-label="아래">▼</button>
        <button id="btn-right" class="mobile-btn" aria-label="오른쪽">▶</button>
      </div>
    </nav>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TIME_LIMIT = 30;
      const relayContext = window.RelayRuntime?.readContext("maze-escape") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      /* ── Maze Generation (Recursive Backtracking) ── */
      const COLS = 15;
      const ROWS = 9;
      let maze = [];
      let playerCol = 0;
      let playerRow = 0;
      const exitCol = COLS - 1;
      const exitRow = ROWS - 1;

      function initMaze() {
        maze = [];
        for (let r = 0; r < ROWS; r++) {
          maze[r] = [];
          for (let c = 0; c < COLS; c++) {
            maze[r][c] = { top: true, right: true, bottom: true, left: true, visited: false };
          }
        }
        const stack = [];
        let cr = 0, cc = 0;
        maze[cr][cc].visited = true;
        stack.push([cr, cc]);

        while (stack.length > 0) {
          const neighbors = [];
          const dirs = [[-1, 0, "top", "bottom"], [1, 0, "bottom", "top"], [0, -1, "left", "right"], [0, 1, "right", "left"]];
          for (const [dr, dc, wall, opp] of dirs) {
            const nr = cr + dr, nc = cc + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !maze[nr][nc].visited) {
              neighbors.push([nr, nc, wall, opp]);
            }
          }
          if (neighbors.length > 0) {
            const [nr, nc, wall, opp] = neighbors[Math.floor(Math.random() * neighbors.length)];
            maze[cr][cc][wall] = false;
            maze[nr][nc][opp] = false;
            maze[nr][nc].visited = true;
            stack.push([cr, cc]);
            cr = nr;
            cc = nc;
          } else {
            [cr, cc] = stack.pop();
          }
        }
        playerCol = 0;
        playerRow = 0;
      }

      function tryMove(dr, dc) {
        if (state.mode !== "running") return;
        const r = playerRow, c = playerCol;
        const dir = dr === -1 ? "top" : dr === 1 ? "bottom" : dc === -1 ? "left" : "right";
        if (!maze[r][c][dir]) {
          playerRow += dr;
          playerCol += dc;
          if (playerRow === exitRow && playerCol === exitCol) {
            clearStage();
          }
        }
      }

      /* ── State ── */
      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "랜덤 생성된 미로를 탐험하여 출구를 찾아 탈출하는 퍼즐 스테이지입니다.",
      };

      const keys = { up: false, down: false, left: false, right: false };
      let moveTimer = 0;
      const MOVE_INTERVAL = 0.12;

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        initMaze();
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        moveTimer = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "time_up") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      /* ── Input ── */
      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode !== "running") {
          event.preventDefault();
          startStage();
          return;
        }
        if (state.mode !== "running") return;
        switch (event.key) {
          case "ArrowUp": case "w": case "W": keys.up = true; tryMove(-1, 0); break;
          case "ArrowDown": case "s": case "S": keys.down = true; tryMove(1, 0); break;
          case "ArrowLeft": case "a": case "A": keys.left = true; tryMove(0, -1); break;
          case "ArrowRight": case "d": case "D": keys.right = true; tryMove(0, 1); break;
        }
      }

      function onKeyUp(event) {
        switch (event.key) {
          case "ArrowUp": case "w": case "W": keys.up = false; break;
          case "ArrowDown": case "s": case "S": keys.down = false; break;
          case "ArrowLeft": case "a": case "A": keys.left = false; break;
          case "ArrowRight": case "d": case "D": keys.right = false; break;
        }
      }

      function bindHoldButton(button, dir) {
        if (!button) return;
        let pressed = false;
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          pressed = false;
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (state.mode !== "running") startFromTouch();
          button.dataset.active = "true";
          pressed = true;
          if (dir === "up") tryMove(-1, 0);
          else if (dir === "down") tryMove(1, 0);
          else if (dir === "left") tryMove(0, -1);
          else if (dir === "right") tryMove(0, 1);
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      bindHoldButton(document.getElementById("btn-up"), "up");
      bindHoldButton(document.getElementById("btn-down"), "down");
      bindHoldButton(document.getElementById("btn-left"), "left");
      bindHoldButton(document.getElementById("btn-right"), "right");

      /* ── Update ── */
      function update(dt) {
        if (state.mode !== "running") return;
        state.elapsed += dt;
        if (state.elapsed >= TIME_LIMIT) {
          failStage("time_up");
          return;
        }
        moveTimer += dt;
        if (moveTimer >= MOVE_INTERVAL) {
          moveTimer = 0;
          if (keys.up) tryMove(-1, 0);
          else if (keys.down) tryMove(1, 0);
          else if (keys.left) tryMove(0, -1);
          else if (keys.right) tryMove(0, 1);
        }
      }

      /* ── Render ── */
      const MAZE_COLOR = "#94a3b8";
      const WALL_COLOR = "#e2e8f0";
      const PLAYER_COLOR = "#3b82f6";
      const EXIT_COLOR = "#22c55e";
      const BG_COLOR = "#0f172a";
      const HUD_COLOR = "#f8fafc";

      function getMazeDimensions() {
        const padding = 20;
        const hudHeight = 40;
        const availW = VIEW.width - padding * 2;
        const availH = VIEW.height - padding * 2 - hudHeight;
        const cellW = Math.floor(availW / COLS);
        const cellH = Math.floor(availH / ROWS);
        const cellSize = Math.min(cellW, cellH);
        const mazeW = cellSize * COLS;
        const mazeH = cellSize * ROWS;
        const offsetX = Math.floor((VIEW.width - mazeW) / 2);
        const offsetY = hudHeight + Math.floor((VIEW.height - hudHeight - mazeH) / 2);
        return { cellSize, offsetX, offsetY, mazeW, mazeH };
      }

      function renderMaze() {
        const { cellSize, offsetX, offsetY } = getMazeDimensions();
        ctx.strokeStyle = WALL_COLOR;
        ctx.lineWidth = 3;
        ctx.lineCap = "round";

        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const x = offsetX + c * cellSize;
            const y = offsetY + r * cellSize;
            const cell = maze[r][c];
            if (cell.top) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); ctx.stroke(); }
            if (cell.right) { ctx.beginPath(); ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke(); }
            if (cell.bottom) { ctx.beginPath(); ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); ctx.stroke(); }
            if (cell.left) { ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); ctx.stroke(); }
          }
        }

        // Exit marker
        const ex = offsetX + exitCol * cellSize;
        const ey = offsetY + exitRow * cellSize;
        ctx.fillStyle = EXIT_COLOR;
        ctx.globalAlpha = 0.3 + 0.15 * Math.sin(state.elapsed * 4);
        ctx.fillRect(ex + 4, ey + 4, cellSize - 8, cellSize - 8);
        ctx.globalAlpha = 1;
        ctx.font = `700 ${Math.floor(cellSize * 0.5)}px Trebuchet MS`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = EXIT_COLOR;
        ctx.fillText("🚪", ex + cellSize / 2, ey + cellSize / 2);

        // Player
        const px = offsetX + playerCol * cellSize + cellSize / 2;
        const py = offsetY + playerRow * cellSize + cellSize / 2;
        const pr = cellSize * 0.35;
        ctx.beginPath();
        ctx.arc(px, py, pr, 0, Math.PI * 2);
        ctx.fillStyle = PLAYER_COLOR;
        ctx.fill();
        ctx.strokeStyle = "#93c5fd";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function renderHUD() {
        const remaining = Math.max(0, TIME_LIMIT - state.elapsed);
        const barW = 200;
        const barH = 16;
        const barX = VIEW.width / 2 - barW / 2;
        const barY = 12;

        ctx.fillStyle = HUD_COLOR;
        ctx.font = "700 22px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText("⏱ " + remaining.toFixed(1) + "s", 20, 10);

        // Timer bar
        ctx.fillStyle = "rgba(148,163,184,0.3)";
        ctx.fillRect(barX, barY, barW, barH);
        const pct = remaining / TIME_LIMIT;
        ctx.fillStyle = pct > 0.3 ? "#22c55e" : pct > 0.1 ? "#f59e0b" : "#ef4444";
        ctx.fillRect(barX, barY, barW * pct, barH);

        ctx.textAlign = "right";
        ctx.fillStyle = HUD_COLOR;
        ctx.fillText("🚪 출구로!", VIEW.width - 20, 10);
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardW = Math.min(704, VIEW.width - 40);
        const cardX = (VIEW.width - cardW) / 2;
        const cardY = 72;
        const cardH = 400;

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(cardX, cardY, cardW, cardH);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(cardX, cardY, cardW, cardH);

        ctx.fillStyle = accent;
        ctx.font = "700 38px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, cardY + 60);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 20px Trebuchet MS";
        lines.forEach((line, i) => {
          ctx.fillText(line, VIEW.width / 2, cardY + 110 + i * 38, cardW - 40);
        });
        ctx.textAlign = "left";
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        if (state.mode === "menu") {
          renderCard("미로 탈출", [
            "랜덤 생성된 미로를 탐험하여 출구를 찾아 탈출하는 퍼즐 스테이지입니다.",
            "",
            "🎮 조작: 방향키/WASD 또는 화면 버튼으로 이동 (모바일: 화면 방향 버튼 터치)",
            "✅ 클리어: 30초 안에 미로 출구에 도달하기",
            "❌ 실패: 30초 안에 출구에 도달하지 못하면 실패",
            "",
            "터치 또는 Enter로 시작",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          renderMaze();
          renderHUD();
          return;
        }

        if (state.mode === "failed") {
          renderCard("실패!", [
            "시간이 초과되었습니다.",
            "",
            "플레이 시간: " + state.lastRunTime.toFixed(1) + "초",
            "",
            "터치 또는 Enter로 다시 시도",
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
          renderCard("클리어!", [
            "미로를 탈출했습니다!",
            "",
            "클리어 시간: " + state.lastRunTime.toFixed(1) + "초",
            "",
            "터치 또는 Enter로 다시 플레이",
          ], "#15803d");

          if (inRelayHost()) return;
          const reg = window.COMMUNITY_STAGE_REGISTRY;
          if (reg) {
            window.RelayRuntime?.goToRandomNext?.(reg, "maze-escape");
          }
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "grid " + COLS + "x" + ROWS,
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          timeRemaining: Math.round(Math.max(0, TIME_LIMIT - state.elapsed) * 10) / 10,
          player: { col: playerCol, row: playerRow },
          exit: { col: exitCol, row: exitRow },
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      /* ── Game Loop ── */
      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      /* ── Relay Contract ── */
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "maze-escape",
        title: "미로 탈출",
        creator: "Claude",
        genre: "Puzzle",
        clearCondition: "30초 안에 미로 출구에 도달하기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() { startStage(); clearStage(); render(); },
        forceFail() { startStage(); failStage("debug_force_fail"); render(); },
      };

      /* ── Event Listeners ── */
      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      initMaze();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
