<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal Foundry: Tide Anchor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #08111f;
        --bg-night: #10213a;
        --cyan: #79f4ff;
        --ice: #d9fbff;
        --gold: #ffc56e;
        --amber: #ff8f52;
        --rose: #ff6d91;
        --ink: #041018;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 10%, rgba(121, 244, 255, 0.22), transparent 34%),
          radial-gradient(circle at 80% 0%, rgba(255, 143, 82, 0.2), transparent 28%),
          linear-gradient(180deg, #142744 0%, #08111f 56%, #04090f 100%);
        font-family: "Avenir Next", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(121, 244, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(4, 16, 24, 0.96);
        color: #f8fafc;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(217, 251, 255, 0.92);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Crystal Foundry: Tide Anchor. 캔버스를 터치하거나 클릭하거나 Enter로 시작합니다.
      포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      과열을 폭주시키지 않고 조류 6파를 넘기며 발전기를 지키면 클리어.
      과열 게이지가 폭주하거나 중요 화물이 유실되면 즉시 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Crystal Foundry: Tide Anchor"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TAU = Math.PI * 2;
      const LANES = [162, 226, 290, 354];
      const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext =
        window.RelayRuntime?.readContext("crystal-foundry-tide-anchoring-heat") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const META_ID = "crystal-foundry-tide-anchoring-heat";
      const META_TITLE = "Crystal Foundry: Tide Anchor";
      const META_CREATOR = "jungcollin";
      const META_GENRE = "Prediction survival / 과열 관리";
      const META_DESCRIPTION =
        "시간 조류를 예측해 닻으로 화물을 고정하고, 회수와 냉각 리듬으로 6파를 버티는 수정 주조소 생존전";
      const META_CONTROLS =
        "포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const META_CLEAR =
        "과열을 폭주시키지 않고 조류 6파를 넘기며 발전기를 지키면 클리어";
      const META_FAIL =
        "과열 게이지가 폭주하거나 중요 화물이 유실되면 즉시 실패";

      const WAVE_DEFS = [
        {
          name: "Glass Rise",
          lane: 1,
          dir: 1,
          leadDistance: 140,
          leadLift: -22,
          forecast: 2.05,
          duration: 2.55,
          recover: 0.95,
          force: 405,
          turbulence: 44,
          pulseBoost: 0.32,
          pulses: [0.32, 0.65],
        },
        {
          name: "Rewind Pull",
          lane: 2,
          dir: -1,
          leadDistance: -156,
          leadLift: 18,
          forecast: 1.95,
          duration: 2.7,
          recover: 0.9,
          force: 438,
          turbulence: 52,
          pulseBoost: 0.34,
          pulses: [0.24, 0.58, 0.82],
        },
        {
          name: "Prism Shear",
          lane: 0,
          dir: 1,
          leadDistance: 170,
          leadLift: -36,
          forecast: 2.2,
          duration: 2.8,
          recover: 0.95,
          force: 468,
          turbulence: 68,
          pulseBoost: 0.42,
          pulses: [0.29, 0.51, 0.77],
        },
        {
          name: "Forge Snap",
          lane: 3,
          dir: -1,
          leadDistance: -176,
          leadLift: 26,
          forecast: 2.05,
          duration: 2.95,
          recover: 0.95,
          force: 505,
          turbulence: 82,
          pulseBoost: 0.46,
          pulses: [0.22, 0.43, 0.72],
        },
        {
          name: "Time Gale",
          lane: 1,
          dir: 1,
          leadDistance: 182,
          leadLift: -12,
          forecast: 1.9,
          duration: 3.05,
          recover: 0.85,
          force: 548,
          turbulence: 94,
          pulseBoost: 0.48,
          pulses: [0.18, 0.4, 0.62, 0.84],
        },
        {
          name: "Final Temper",
          lane: 2,
          dir: -1,
          leadDistance: -194,
          leadLift: 0,
          forecast: 1.85,
          duration: 3.2,
          recover: 0.7,
          force: 590,
          turbulence: 118,
          pulseBoost: 0.52,
          pulses: [0.15, 0.34, 0.57, 0.8],
        },
      ];

      const input = {
        nudges: { left: false, right: false, up: false, down: false },
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let accumulator = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        waveIndex: 0,
        phase: "menu",
        phaseTime: 0,
        heat: 26,
        heatFlash: 0,
        cameraShake: 0,
        flash: 0,
        warningPulse: 0,
        note: META_DESCRIPTION,
        generatorPulse: 0,
        pointerSession: null,
        ignorePointerUntil: 0,
        cursor: { x: VIEW.width * 0.5, y: VIEW.height * 0.48, active: false },
        reticle: { x: VIEW.width * 0.5, y: VIEW.height * 0.48 },
        anchor: createAnchor(),
        cargo: createCargo(LANES[1]),
        currentWave: null,
        motes: Array.from({ length: REDUCED_MOTION ? 44 : 86 }, createMote),
        shards: [],
        ripples: [],
        popups: [],
      };

      function createAnchor() {
        return {
          active: false,
          locked: false,
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.48,
          radius: 52,
          glow: 0,
          pulse: 0,
          quenchGlow: 0,
        };
      }

      function createCargo(laneY) {
        return {
          x: VIEW.width * 0.5 - 46,
          y: laneY,
          vx: 0,
          vy: 0,
          radius: 18,
          laneY,
          wobble: Math.random() * TAU,
        };
      }

      function createMote() {
        return {
          x: Math.random() * VIEW.width,
          y: Math.random() * VIEW.height,
          z: 0.3 + Math.random() * 0.9,
          speed: 12 + Math.random() * 36,
          size: 1 + Math.random() * 2.4,
          hue: Math.random() > 0.55 ? 190 : 28,
          alpha: 0.08 + Math.random() * 0.28,
        };
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function addPopup(text, x, y, color = "#d9fbff", size = 20) {
        state.popups.push({
          text,
          x,
          y,
          color,
          size,
          life: 0.9,
          maxLife: 0.9,
          vy: -26 - Math.random() * 16,
        });
      }

      function spawnBurst(x, y, color, count, speed) {
        const total = REDUCED_MOTION ? Math.ceil(count * 0.45) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = (index / Math.max(1, total)) * TAU + Math.random() * 0.28;
          const impulse = speed * (0.5 + Math.random() * 0.7);
          state.shards.push({
            x,
            y,
            vx: Math.cos(angle) * impulse,
            vy: Math.sin(angle) * impulse,
            size: 2 + Math.random() * 5,
            color,
            life: 0.45 + Math.random() * 0.5,
            maxLife: 0.9,
          });
        }
      }

      function spawnRipple(x, y, color, maxRadius) {
        state.ripples.push({
          x,
          y,
          radius: 8,
          maxRadius,
          color,
          life: 0.45,
          maxLife: 0.45,
        });
      }

      function buildWave(index) {
        const definition = WAVE_DEFS[index];
        const laneY = LANES[definition.lane];
        const startX = VIEW.width * 0.5 - definition.dir * 116;
        const targetX = clamp(startX + definition.leadDistance, 130, VIEW.width - 130);
        const targetY = clamp(laneY + definition.leadLift, 120, VIEW.height - 150);
        return {
          ...definition,
          laneY,
          startX,
          targetX,
          targetY,
          lockRadius: 58,
          safeRadius: 84,
        };
      }

      function resetTransientEffects() {
        state.shards = [];
        state.ripples = [];
        state.popups = [];
        state.flash = 0;
        state.cameraShake = 0;
      }

      function deployAnchor() {
        if (state.mode !== "running" || state.anchor.active) {
          return;
        }
        state.anchor.active = true;
        state.anchor.locked = false;
        state.anchor.x = clamp(state.reticle.x, 110, VIEW.width - 110);
        state.anchor.y = clamp(state.reticle.y, 102, VIEW.height - 120);
        state.anchor.glow = 1;
        state.anchor.pulse = 1;
        state.heat = clamp(state.heat + 9.5, 0, 100);
        spawnBurst(state.anchor.x, state.anchor.y, "#79f4ff", 18, 74);
        spawnRipple(state.anchor.x, state.anchor.y, "#79f4ff", 76);
        addPopup("ANCHOR", state.anchor.x, state.anchor.y - 16, "#79f4ff", 18);
      }

      function retrieveAnchor(fromSwipe = false) {
        if (!state.anchor.active) {
          return;
        }
        const x = state.anchor.x;
        const y = state.anchor.y;
        state.anchor.active = false;
        state.anchor.locked = false;
        state.anchor.glow = 0;
        state.anchor.pulse = 0;
        state.anchor.quenchGlow = 1;
        state.heat = clamp(state.heat - 13, 0, 100);
        spawnBurst(x, y, "#ffc56e", 16, 66);
        spawnRipple(x, y, "#ffc56e", 88);
        addPopup(fromSwipe ? "QUENCH" : "RETRACT", x, y - 12, "#ffc56e", 18);
      }

      function setWave(index) {
        if (index >= WAVE_DEFS.length) {
          clearStage();
          return;
        }
        const wave = buildWave(index);
        state.waveIndex = index;
        state.phase = "forecast";
        state.phaseTime = 0;
        state.currentWave = wave;
        state.cargo = createCargo(wave.laneY);
        state.cargo.x = wave.startX;
        state.cargo.y = wave.laneY;
        state.cargo.laneY = wave.laneY;
        state.cargo.vx = 0;
        state.cargo.vy = 0;
        state.generatorPulse = 0.15;
        addPopup(`WAVE ${index + 1}`, VIEW.width * 0.5, 88, "#d9fbff", 24);
      }

      function startRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.heat = 26;
        state.heatFlash = 0;
        state.warningPulse = 0;
        state.generatorPulse = 0.2;
        state.anchor = createAnchor();
        state.cursor.active = false;
        state.reticle.x = VIEW.width * 0.5;
        state.reticle.y = VIEW.height * 0.48;
        resetTransientEffects();
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        setWave(0);
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.phase = "failed";
        state.flash = 0.55;
        state.cameraShake = 18;
        window.relayStageResult.status = "failed";
        spawnBurst(state.cargo.x, state.cargo.y, "#ff6d91", 32, 125);
        addPopup(reason === "overheat" ? "MELTDOWN" : "CARGO LOST", state.cargo.x, state.cargo.y - 20, "#ff6d91", 24);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.phase = "cleared";
        state.flash = 0.42;
        state.cameraShake = 8;
        window.relayStageResult.status = "cleared";
        spawnBurst(state.cargo.x, state.cargo.y, "#79f4ff", 42, 140);
        spawnBurst(VIEW.width * 0.5, 186, "#ffc56e", 28, 110);
        addPopup("FOUNDRY STABLE", VIEW.width * 0.5, 112, "#d9fbff", 28);
        reportClearedToHost();
      }

      function setPointerPosition(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        state.cursor.x = clamp((clientX - rect.left) * scaleX, 90, VIEW.width - 90);
        state.cursor.y = clamp((clientY - rect.top) * scaleY, 96, VIEW.height - 96);
        state.cursor.active = true;
      }

      function handlePointerDown(event) {
        if (event.pointerType !== "mouse" && performance.now() < state.ignorePointerUntil) {
          return;
        }
        event.preventDefault();
        setPointerPosition(event.clientX, event.clientY);
        const startedFromOverlay =
          state.mode === "menu" || state.mode === "failed" || state.mode === "cleared";
        if (startedFromOverlay) {
          startRun();
        }
        state.pointerSession = {
          id: event.pointerId,
          startX: state.cursor.x,
          startY: state.cursor.y,
          startTime: performance.now(),
          startedFromOverlay,
        };
      }

      function handlePointerMove(event) {
        if (event.pointerType !== "mouse" && performance.now() < state.ignorePointerUntil) {
          return;
        }
        setPointerPosition(event.clientX, event.clientY);
      }

      function handlePointerUp(event) {
        if (event.pointerType !== "mouse" && performance.now() < state.ignorePointerUntil) {
          return;
        }
        if (!state.pointerSession || state.pointerSession.id !== event.pointerId) {
          return;
        }
        const session = state.pointerSession;
        setPointerPosition(event.clientX, event.clientY);
        state.pointerSession = null;
        if (session.startedFromOverlay || state.mode !== "running") {
          return;
        }
        const dragDistance = Math.hypot(state.cursor.x - session.startX, state.cursor.y - session.startY);
        const heldMs = performance.now() - session.startTime;
        if (state.anchor.active && dragDistance > 42) {
          retrieveAnchor(true);
          return;
        }
        if (!state.anchor.active && dragDistance < 18 && heldMs < 320) {
          deployAnchor();
        }
      }

      function handlePointerCancel(event) {
        if (event.pointerType !== "mouse" && performance.now() < state.ignorePointerUntil) {
          return;
        }
        if (state.pointerSession?.id === event.pointerId) {
          state.pointerSession = null;
        }
      }

      function handleTouchStart(event) {
        event.preventDefault();
        state.ignorePointerUntil = performance.now() + 500;
        const touch = event.changedTouches?.[0];
        if (!touch) {
          return;
        }
        setPointerPosition(touch.clientX, touch.clientY);
        const startedFromOverlay =
          state.mode === "menu" || state.mode === "failed" || state.mode === "cleared";
        if (startedFromOverlay) {
          startRun();
        }
        state.pointerSession = {
          id: `touch-${Date.now()}`,
          startX: state.cursor.x,
          startY: state.cursor.y,
          startTime: performance.now(),
          startedFromOverlay,
        };
      }

      function handleTouchMove(event) {
        event.preventDefault();
        state.ignorePointerUntil = performance.now() + 500;
        const touch = event.changedTouches?.[0] || event.touches?.[0];
        if (!touch) {
          return;
        }
        setPointerPosition(touch.clientX, touch.clientY);
      }

      function handleTouchEnd(event) {
        event.preventDefault();
        state.ignorePointerUntil = performance.now() + 500;
        if (!state.pointerSession) {
          return;
        }
        const touch = event.changedTouches?.[0];
        if (touch) {
          setPointerPosition(touch.clientX, touch.clientY);
        }
        const session = state.pointerSession;
        state.pointerSession = null;
        if (session.startedFromOverlay || state.mode !== "running") {
          return;
        }
        const dragDistance = Math.hypot(state.cursor.x - session.startX, state.cursor.y - session.startY);
        const heldMs = performance.now() - session.startTime;
        if (state.anchor.active && dragDistance > 42) {
          retrieveAnchor(true);
          return;
        }
        if (!state.anchor.active && dragDistance < 18 && heldMs < 360) {
          deployAnchor();
        }
      }

      function handleTouchCancel(event) {
        event.preventDefault();
        state.ignorePointerUntil = performance.now() + 500;
        state.pointerSession = null;
      }

      function updateKeyboardReticle(dt) {
        const speed = 360 * dt;
        if (input.nudges.left) state.cursor.x -= speed;
        if (input.nudges.right) state.cursor.x += speed;
        if (input.nudges.up) state.cursor.y -= speed;
        if (input.nudges.down) state.cursor.y += speed;
        state.cursor.x = clamp(state.cursor.x, 90, VIEW.width - 90);
        state.cursor.y = clamp(state.cursor.y, 96, VIEW.height - 96);
        if (
          input.nudges.left ||
          input.nudges.right ||
          input.nudges.up ||
          input.nudges.down
        ) {
          state.cursor.active = true;
        }
      }

      function handleKeyDown(event) {
        if (event.code === "Enter") {
          event.preventDefault();
          if (state.mode !== "running") {
            startRun();
          }
          return;
        }
        if (event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running" && !state.anchor.active) {
            deployAnchor();
          }
          return;
        }
        if (event.code === "Backspace" || event.code === "KeyR") {
          if (state.mode === "running") {
            event.preventDefault();
            retrieveAnchor();
          }
          return;
        }
        if (event.code === "KeyF") {
          event.preventDefault();
          toggleFullscreen();
          return;
        }
        if (event.code === "ArrowLeft") input.nudges.left = true;
        if (event.code === "ArrowRight") input.nudges.right = true;
        if (event.code === "ArrowUp") input.nudges.up = true;
        if (event.code === "ArrowDown") input.nudges.down = true;
      }

      function handleKeyUp(event) {
        if (event.code === "ArrowLeft") input.nudges.left = false;
        if (event.code === "ArrowRight") input.nudges.right = false;
        if (event.code === "ArrowUp") input.nudges.up = false;
        if (event.code === "ArrowDown") input.nudges.down = false;
      }

      async function toggleFullscreen() {
        try {
          if (document.fullscreenElement) {
            await document.exitFullscreen();
            return;
          }
          await document.documentElement.requestFullscreen?.();
        } catch (error) {
          return;
        }
      }

      function computeSurgeStrength(wave, phaseTime) {
        const normalized = clamp(phaseTime / wave.duration, 0, 1);
        let strength = Math.sin(normalized * Math.PI);
        for (const pulse of wave.pulses) {
          const distanceToPulse = Math.abs(normalized - pulse);
          strength += Math.max(0, 1 - distanceToPulse / 0.13) * wave.pulseBoost;
        }
        return clamp(strength, 0, 1.8);
      }

      function updateForecast(dt) {
        const wave = state.currentWave;
        state.cargo.wobble += dt * 1.8;
        state.cargo.x = lerp(state.cargo.x, wave.startX + Math.sin(state.cargo.wobble) * 6, 0.08);
        state.cargo.y = lerp(state.cargo.y, wave.laneY + Math.cos(state.cargo.wobble * 1.4) * 4, 0.08);
        if (state.phaseTime >= wave.forecast) {
          state.phase = "surge";
          state.phaseTime = 0;
          state.cameraShake = 8;
          state.flash = 0.24;
          spawnBurst(wave.targetX, wave.targetY, "#79f4ff", 20, 88);
          addPopup("TIDE IN", VIEW.width * 0.5, 118, "#ffc56e", 22);
        }
      }

      function updateSurge(dt) {
        const wave = state.currentWave;
        const surge = computeSurgeStrength(wave, state.phaseTime);
        const gust = Math.sin((state.phaseTime * 3.1 + wave.lane) * 2.3) * wave.turbulence;
        const verticalDrift = Math.sin(state.phaseTime * 5.4 + wave.lane * 1.7) * (18 + wave.turbulence * 0.16);
        const target = { x: wave.targetX, y: wave.targetY };
        const closeToTarget =
          state.anchor.active &&
          Math.hypot(state.anchor.x - target.x, state.anchor.y - target.y) < wave.lockRadius;

        if (closeToTarget) {
          state.anchor.locked = true;
        } else if (!state.anchor.active) {
          state.anchor.locked = false;
        }

        if (state.anchor.locked) {
          state.cargo.vx *= 0.78;
          state.cargo.vy *= 0.78;
          state.cargo.x += (state.anchor.x - state.cargo.x) * dt * (7.5 + surge * 4.4);
          state.cargo.y += (state.anchor.y - state.cargo.y) * dt * (7 + surge * 3.2);
          if (Math.random() < 0.18 * surge) {
            spawnBurst(state.cargo.x, state.cargo.y, "#79f4ff", 2, 28);
          }
        } else {
          const desiredVx = wave.dir * (wave.force * (0.36 + surge * 0.92)) + gust;
          const desiredVy = ((wave.laneY + verticalDrift) - state.cargo.y) * 3.6;
          state.cargo.vx += (desiredVx - state.cargo.vx) * dt * 2.1;
          state.cargo.vy += (desiredVy - state.cargo.vy) * dt * 1.8;
          state.cargo.x += state.cargo.vx * dt;
          state.cargo.y += state.cargo.vy * dt;
        }

        if (
          state.cargo.x < 86 ||
          state.cargo.x > VIEW.width - 86 ||
          state.cargo.y < 88 ||
          state.cargo.y > VIEW.height - 88
        ) {
          failStage("cargo_lost");
          return;
        }

        if (state.phaseTime >= wave.duration) {
          state.phase = "recover";
          state.phaseTime = 0;
          state.anchor.locked = false;
          state.cameraShake = 4;
          spawnRipple(state.cargo.x, state.cargo.y, "#d9fbff", 96);
          addPopup("WAVE SECURED", VIEW.width * 0.5, 116, "#d9fbff", 20);
        }
      }

      function updateRecover(dt) {
        const wave = state.currentWave;
        const dockX = VIEW.width * 0.5 - wave.dir * 46;
        state.cargo.x = lerp(state.cargo.x, dockX, 0.08);
        state.cargo.y = lerp(state.cargo.y, wave.laneY, 0.08);
        state.cargo.vx *= 0.84;
        state.cargo.vy *= 0.84;
        if (state.phaseTime >= wave.recover) {
          setWave(state.waveIndex + 1);
        }
      }

      function updateHeat(dt) {
        const wave = state.currentWave;
        let delta = -12.5 * dt;
        if (state.mode !== "running") {
          delta = -9.5 * dt;
        } else if (state.anchor.active) {
          delta = 9 * dt;
          if (state.phase === "forecast") {
            delta += 3.5 * dt;
          }
          if (state.phase === "surge" && wave) {
            delta += (8 + computeSurgeStrength(wave, state.phaseTime) * 11) * dt;
            if (state.anchor.locked) {
              delta += 8.8 * dt;
            }
          }
          if (state.phase === "recover") {
            delta += 5.5 * dt;
          }
        } else if (state.phase === "recover") {
          delta = -25 * dt;
        } else if (state.phase === "forecast") {
          delta = -17.5 * dt;
        }

        state.heat = clamp(state.heat + delta, 0, 100);
        state.heatFlash = Math.max(0, state.heatFlash - dt * 1.4);
        state.warningPulse = Math.max(0, state.warningPulse - dt * 1.8);
        state.anchor.quenchGlow = Math.max(0, state.anchor.quenchGlow - dt * 1.7);

        if (state.heat >= 78) {
          state.warningPulse = Math.min(1, state.warningPulse + dt * 1.6);
        }
        if (state.heat >= 100) {
          failStage("overheat");
        }
      }

      function updateEffects(dt) {
        for (const mote of state.motes) {
          mote.y += mote.speed * mote.z * dt;
          mote.x += Math.sin((state.elapsed + mote.z) * 0.7) * dt * 10 * mote.z;
          if (mote.y > VIEW.height + 20) {
            mote.y = -18;
            mote.x = Math.random() * VIEW.width;
          }
          if (mote.x < -24) mote.x = VIEW.width + 24;
          if (mote.x > VIEW.width + 24) mote.x = -24;
        }

        state.shards = state.shards.filter((shard) => {
          shard.life -= dt;
          shard.x += shard.vx * dt;
          shard.y += shard.vy * dt;
          shard.vx *= 0.985;
          shard.vy = shard.vy * 0.985 + 12 * dt;
          return shard.life > 0;
        });

        state.ripples = state.ripples.filter((ripple) => {
          ripple.life -= dt;
          ripple.radius += (ripple.maxRadius - ripple.radius) * dt * 7.5;
          return ripple.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y += popup.vy * dt;
          return popup.life > 0;
        });

        state.cameraShake = Math.max(0, state.cameraShake - dt * 19);
        state.flash = Math.max(0, state.flash - dt * 0.95);
        state.generatorPulse = Math.max(0, state.generatorPulse - dt * 0.7);
        state.anchor.glow = Math.max(0, state.anchor.glow - dt * 0.55);
        state.anchor.pulse = Math.max(0, state.anchor.pulse - dt * 0.7);
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.phaseTime += dt;
        updateKeyboardReticle(dt);
        if (state.cursor.active) {
          state.reticle.x = lerp(state.reticle.x, state.cursor.x, 0.24);
          state.reticle.y = lerp(state.reticle.y, state.cursor.y, 0.24);
        }

        if (state.phase === "forecast") {
          updateForecast(dt);
        } else if (state.phase === "surge") {
          updateSurge(dt);
        } else if (state.phase === "recover") {
          updateRecover(dt);
        }
      }

      function update(dt) {
        dt = Math.min(dt, MAX_DT);
        if (state.mode === "running") {
          updateRunning(dt);
        }
        updateHeat(dt);
        updateEffects(dt);
      }

      function wrapText(text, x, y, maxWidth, lineHeight) {
        const words = String(text).split(/\s+/);
        let line = "";
        let row = 0;
        for (const word of words) {
          const testLine = line ? `${line} ${word}` : word;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            ctx.fillText(line, x, y + row * lineHeight);
            row += 1;
            line = word;
          } else {
            line = testLine;
          }
        }
        if (line) {
          ctx.fillText(line, x, y + row * lineHeight);
          row += 1;
        }
        return row;
      }

      function drawRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawBackground() {
        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#10213a");
        sky.addColorStop(0.6, "#08111f");
        sky.addColorStop(1, "#04090f");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const orb = ctx.createRadialGradient(VIEW.width * 0.62, 116, 30, VIEW.width * 0.62, 116, 280);
        orb.addColorStop(0, "rgba(121,244,255,0.28)");
        orb.addColorStop(1, "rgba(121,244,255,0)");
        ctx.fillStyle = orb;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 6; index += 1) {
          const x = 62 + index * 154;
          const gradient = ctx.createLinearGradient(0, 84, 0, VIEW.height);
          gradient.addColorStop(0, "rgba(123, 236, 255, 0.05)");
          gradient.addColorStop(1, "rgba(2, 10, 18, 0.65)");
          ctx.fillStyle = gradient;
          drawRoundedRect(x, 72, 78, 322, 34);
          ctx.fill();

          ctx.strokeStyle = "rgba(217, 251, 255, 0.08)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x + 14, 90);
          ctx.lineTo(x + 14, 378);
          ctx.moveTo(x + 64, 90);
          ctx.lineTo(x + 64, 378);
          ctx.stroke();
        }

        const floor = ctx.createLinearGradient(0, 392, 0, VIEW.height);
        floor.addColorStop(0, "rgba(14, 24, 34, 0.2)");
        floor.addColorStop(0.45, "rgba(255, 143, 82, 0.18)");
        floor.addColorStop(1, "rgba(255, 96, 51, 0.35)");
        ctx.fillStyle = floor;
        ctx.fillRect(0, 392, VIEW.width, VIEW.height - 392);

        ctx.strokeStyle = "rgba(255, 197, 110, 0.18)";
        ctx.lineWidth = 3;
        for (const laneY of LANES) {
          ctx.beginPath();
          ctx.moveTo(92, laneY);
          ctx.lineTo(VIEW.width - 92, laneY);
          ctx.stroke();
        }

        for (const mote of state.motes) {
          ctx.fillStyle = mote.hue === 190
            ? `rgba(121, 244, 255, ${mote.alpha})`
            : `rgba(255, 197, 110, ${mote.alpha * 0.82})`;
          ctx.beginPath();
          ctx.arc(mote.x, mote.y, mote.size, 0, TAU);
          ctx.fill();
        }
      }

      function drawGenerator() {
        const coreX = VIEW.width * 0.5;
        const coreY = 116;
        const pulse = state.generatorPulse * 20;
        const ring = ctx.createRadialGradient(coreX, coreY, 14, coreX, coreY, 92 + pulse);
        ring.addColorStop(0, "rgba(217, 251, 255, 0.95)");
        ring.addColorStop(0.25, "rgba(121, 244, 255, 0.52)");
        ring.addColorStop(1, "rgba(121, 244, 255, 0)");
        ctx.fillStyle = ring;
        ctx.beginPath();
        ctx.arc(coreX, coreY, 92 + pulse, 0, TAU);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 197, 110, 0.32)";
        ctx.lineWidth = 12;
        ctx.beginPath();
        ctx.arc(coreX, coreY, 54, 0.2, Math.PI * 1.8);
        ctx.stroke();

        ctx.strokeStyle = "rgba(121, 244, 255, 0.78)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(coreX, coreY, 34, 0, TAU);
        ctx.stroke();

        const core = ctx.createRadialGradient(coreX, coreY, 8, coreX, coreY, 28);
        core.addColorStop(0, "#ffffff");
        core.addColorStop(0.35, "#d9fbff");
        core.addColorStop(1, "#79f4ff");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(coreX, coreY, 28, 0, TAU);
        ctx.fill();
      }

      function drawCurrentWave() {
        if (!state.currentWave) {
          return;
        }
        const wave = state.currentWave;
        const targetX = wave.targetX;
        const targetY = wave.targetY;
        const laneSpan = 670;

        if (state.phase === "forecast") {
          const timeLeft = Math.max(0, wave.forecast - state.phaseTime);
          const alpha = 0.26 + Math.sin(state.elapsed * 5.4) * 0.06;
          ctx.strokeStyle = `rgba(121,244,255,${0.42 + alpha})`;
          ctx.lineWidth = 2;
          ctx.setLineDash([10, 12]);
          ctx.beginPath();
          ctx.moveTo(wave.startX, wave.laneY);
          ctx.quadraticCurveTo(
            lerp(wave.startX, targetX, 0.52),
            wave.laneY + (targetY - wave.laneY) * 1.1 - 26 * wave.dir,
            targetX,
            targetY
          );
          ctx.stroke();
          ctx.setLineDash([]);

          ctx.fillStyle = "rgba(121,244,255,0.18)";
          ctx.beginPath();
          ctx.arc(targetX, targetY, 40 + Math.sin(state.elapsed * 6.4) * 4, 0, TAU);
          ctx.fill();

          ctx.strokeStyle = "rgba(217,251,255,0.88)";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(targetX, targetY, 22, 0, TAU);
          ctx.stroke();

          ctx.fillStyle = "rgba(217,251,255,0.84)";
          ctx.font = '700 12px "Avenir Next", "Segoe UI", sans-serif';
          ctx.textAlign = "center";
          ctx.fillText(`예측 ${timeLeft.toFixed(1)}s`, targetX, targetY - 34);
          ctx.fillText(wave.dir > 0 ? "→" : "←", targetX, targetY + 5);
        }

        if (state.phase === "surge") {
          const strength = computeSurgeStrength(wave, state.phaseTime);
          for (let index = 0; index < 4; index += 1) {
            const ribbonY = wave.laneY - 60 + index * 38;
            const alpha = 0.06 + strength * 0.08 + index * 0.015;
            const gradient = ctx.createLinearGradient(0, 0, laneSpan, 0);
            if (wave.dir > 0) {
              gradient.addColorStop(0, `rgba(121,244,255,0)`);
              gradient.addColorStop(0.45, `rgba(121,244,255,${alpha})`);
              gradient.addColorStop(1, `rgba(255,197,110,${alpha * 0.5})`);
            } else {
              gradient.addColorStop(0, `rgba(255,197,110,${alpha * 0.5})`);
              gradient.addColorStop(0.55, `rgba(121,244,255,${alpha})`);
              gradient.addColorStop(1, `rgba(121,244,255,0)`);
            }
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.moveTo(145, ribbonY);
            for (let step = 0; step <= 16; step += 1) {
              const t = step / 16;
              const x = 145 + t * laneSpan;
              const wobble = Math.sin(t * 10 + state.elapsed * 5 + index) * (8 + strength * 10);
              ctx.lineTo(x, ribbonY + wobble);
            }
            for (let step = 16; step >= 0; step -= 1) {
              const t = step / 16;
              const x = 145 + t * laneSpan;
              const wobble = Math.sin(t * 10 + state.elapsed * 5 + index) * (8 + strength * 10);
              ctx.lineTo(x, ribbonY + 24 + wobble);
            }
            ctx.closePath();
            ctx.fill();
          }
        }
      }

      function drawCargo() {
        const cargo = state.cargo;
        const glow = ctx.createRadialGradient(cargo.x, cargo.y, 4, cargo.x, cargo.y, 54);
        glow.addColorStop(0, "rgba(217,251,255,0.95)");
        glow.addColorStop(0.25, "rgba(121,244,255,0.5)");
        glow.addColorStop(1, "rgba(121,244,255,0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cargo.x, cargo.y, 54, 0, TAU);
        ctx.fill();

        ctx.save();
        ctx.translate(cargo.x, cargo.y);
        const tilt = Math.sin(state.elapsed * 3 + cargo.wobble) * 0.12 + cargo.vx * 0.0007;
        ctx.rotate(tilt);

        ctx.beginPath();
        ctx.moveTo(0, -28);
        ctx.lineTo(24, -4);
        ctx.lineTo(12, 26);
        ctx.lineTo(-12, 26);
        ctx.lineTo(-24, -4);
        ctx.closePath();

        const body = ctx.createLinearGradient(-24, -24, 18, 28);
        body.addColorStop(0, "#e7fbff");
        body.addColorStop(0.4, "#8cecff");
        body.addColorStop(1, "#3277d2");
        ctx.fillStyle = body;
        ctx.fill();

        ctx.strokeStyle = "rgba(217,251,255,0.9)";
        ctx.lineWidth = 2.4;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-10, -10);
        ctx.lineTo(12, 12);
        ctx.moveTo(2, -22);
        ctx.lineTo(10, 2);
        ctx.strokeStyle = "rgba(255,255,255,0.65)";
        ctx.stroke();

        ctx.restore();
      }

      function drawAnchor() {
        const anchor = state.anchor;
        if (state.mode !== "running" && !anchor.active) {
          return;
        }

        if (anchor.active) {
          ctx.strokeStyle = anchor.locked ? "rgba(255,197,110,0.86)" : "rgba(121,244,255,0.78)";
          ctx.lineWidth = anchor.locked ? 3.8 : 3.2;
          ctx.beginPath();
          ctx.moveTo(state.cargo.x, state.cargo.y);
          ctx.quadraticCurveTo(
            lerp(state.cargo.x, anchor.x, 0.46),
            Math.min(state.cargo.y, anchor.y) - 32 - Math.abs(state.cargo.x - anchor.x) * 0.06,
            anchor.x,
            anchor.y
          );
          ctx.stroke();

          const pulse = 1 + Math.sin(state.elapsed * 8) * 0.08 + anchor.pulse * 0.16;
          ctx.strokeStyle = anchor.locked ? "rgba(255,197,110,0.96)" : "rgba(121,244,255,0.96)";
          ctx.lineWidth = 2.6;
          ctx.beginPath();
          ctx.arc(anchor.x, anchor.y, anchor.radius * pulse, 0, TAU);
          ctx.stroke();

          ctx.strokeStyle = "rgba(217,251,255,0.82)";
          ctx.lineWidth = 1.8;
          ctx.beginPath();
          ctx.arc(anchor.x, anchor.y, 22, 0, TAU);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(anchor.x - 10, anchor.y);
          ctx.lineTo(anchor.x + 10, anchor.y);
          ctx.moveTo(anchor.x, anchor.y - 10);
          ctx.lineTo(anchor.x, anchor.y + 10);
          ctx.stroke();
        }

        if (!anchor.active || state.mode === "running") {
          const reticleX = state.reticle.x;
          const reticleY = state.reticle.y;
          const glowAlpha = state.mode === "running" ? 0.18 : 0.12;
          ctx.strokeStyle = `rgba(217,251,255,${0.7 + state.anchor.quenchGlow * 0.18})`;
          ctx.lineWidth = 1.8;
          ctx.beginPath();
          ctx.arc(reticleX, reticleY, 16 + Math.sin(state.elapsed * 5.4) * 1.5, 0, TAU);
          ctx.stroke();

          ctx.strokeStyle = `rgba(121,244,255,${glowAlpha})`;
          ctx.beginPath();
          ctx.arc(reticleX, reticleY, 34, 0, TAU);
          ctx.stroke();
        }
      }

      function drawEffects() {
        for (const ripple of state.ripples) {
          const alpha = ripple.life / ripple.maxLife;
          ctx.strokeStyle = ripple.color
            .replace(")", `, ${alpha * 0.8})`)
            .replace("rgb", "rgba");
          ctx.lineWidth = 2.2;
          ctx.beginPath();
          ctx.arc(ripple.x, ripple.y, ripple.radius, 0, TAU);
          ctx.stroke();
        }

        for (const shard of state.shards) {
          const alpha = clamp(shard.life / shard.maxLife, 0, 1);
          ctx.fillStyle = shard.color.startsWith("#")
            ? hexToRgba(shard.color, alpha)
            : shard.color;
          ctx.beginPath();
          ctx.arc(shard.x, shard.y, shard.size, 0, TAU);
          ctx.fill();
        }
      }

      function hexToRgba(hex, alpha) {
        const value = hex.replace("#", "");
        const size = value.length === 3 ? 1 : 2;
        const parts = [];
        for (let index = 0; index < 3; index += 1) {
          const slice = value.slice(index * size, index * size + size);
          const channel = size === 1 ? parseInt(slice + slice, 16) : parseInt(slice, 16);
          parts.push(channel);
        }
        return `rgba(${parts[0]}, ${parts[1]}, ${parts[2]}, ${alpha})`;
      }

      function drawHud() {
        if (!state.currentWave) {
          return;
        }

        drawRoundedRect(22, 18, 286, 88, 24);
        ctx.fillStyle = "rgba(4,16,24,0.68)";
        ctx.fill();
        ctx.strokeStyle = "rgba(217,251,255,0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.fillStyle = "#d9fbff";
        ctx.font = '700 15px "Avenir Next", "Segoe UI", sans-serif';
        ctx.textAlign = "left";
        ctx.fillText(META_TITLE, 40, 44);

        ctx.fillStyle = "rgba(217,251,255,0.74)";
        ctx.font = '600 12px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillText(
          `WAVE ${state.waveIndex + 1}/${WAVE_DEFS.length}  ·  ${phaseLabel()}`,
          40,
          68
        );
        ctx.fillText(`${state.currentWave.name}`, 40, 88);

        drawRoundedRect(VIEW.width - 276, 18, 254, 88, 24);
        ctx.fillStyle = "rgba(4,16,24,0.68)";
        ctx.fill();
        ctx.strokeStyle = "rgba(217,251,255,0.08)";
        ctx.stroke();

        ctx.fillStyle = "#d9fbff";
        ctx.fillText("Heat", VIEW.width - 254, 42);

        const heatX = VIEW.width - 254;
        const heatY = 56;
        const heatWidth = 212;
        const heatHeight = 18;
        drawRoundedRect(heatX, heatY, heatWidth, heatHeight, 999);
        ctx.fillStyle = "rgba(217,251,255,0.12)";
        ctx.fill();

        const filled = clamp(state.heat / 100, 0, 1);
        const heatGradient = ctx.createLinearGradient(heatX, 0, heatX + heatWidth, 0);
        heatGradient.addColorStop(0, "#79f4ff");
        heatGradient.addColorStop(0.58, "#ffc56e");
        heatGradient.addColorStop(1, "#ff6d91");
        drawRoundedRect(heatX, heatY, heatWidth * filled, heatHeight, 999);
        ctx.fillStyle = heatGradient;
        ctx.fill();

        ctx.fillStyle = "#d9fbff";
        ctx.font = '700 14px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillText(`${Math.round(state.heat)}%`, VIEW.width - 96, 90);

        ctx.fillStyle = "rgba(217,251,255,0.86)";
        ctx.font = '600 12px "Avenir Next", "Segoe UI", sans-serif';
        const hint = state.anchor.active ? "스와이프 회수로 냉각" : "탭 발사로 고정";
        ctx.textAlign = "center";
        ctx.fillText(hint, VIEW.width * 0.5, VIEW.height - 24);
      }

      function phaseLabel() {
        if (state.phase === "forecast") return "예측";
        if (state.phase === "surge") return "급류";
        if (state.phase === "recover") return "냉각";
        if (state.phase === "cleared") return "안정";
        if (state.phase === "failed") return "정지";
        return "대기";
      }

      function drawPopups() {
        ctx.textAlign = "center";
        for (const popup of state.popups) {
          const alpha = clamp(popup.life / popup.maxLife, 0, 1);
          ctx.fillStyle = popup.color.startsWith("#")
            ? hexToRgba(popup.color, alpha)
            : popup.color;
          ctx.font = `700 ${popup.size}px "Avenir Next", "Segoe UI", sans-serif`;
          ctx.fillText(popup.text, popup.x, popup.y);
        }
      }

      function drawOverlayCard(title, subtitle, actionText, accentColor) {
        const cardWidth = Math.min(720, VIEW.width - 88);
        const cardHeight = Math.min(388, VIEW.height - 74);
        const cardX = (VIEW.width - cardWidth) / 2;
        const cardY = (VIEW.height - cardHeight) / 2;

        const fill = ctx.createLinearGradient(cardX, cardY, cardX + cardWidth, cardY + cardHeight);
        fill.addColorStop(0, "rgba(8, 17, 31, 0.94)");
        fill.addColorStop(1, "rgba(10, 27, 44, 0.88)");
        drawRoundedRect(cardX, cardY, cardWidth, cardHeight, 34);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = "rgba(217,251,255,0.14)";
        ctx.lineWidth = 1.3;
        ctx.stroke();

        ctx.fillStyle = accentColor;
        ctx.font = '700 14px "Avenir Next", "Segoe UI", sans-serif';
        ctx.textAlign = "left";
        ctx.fillText("CRYSTAL FOUNDRY", cardX + 34, cardY + 42);

        ctx.fillStyle = "#f7fdff";
        ctx.font = '700 34px "Avenir Next", "Segoe UI", sans-serif';
        ctx.fillText(title, cardX + 34, cardY + 86);

        ctx.fillStyle = "rgba(217,251,255,0.82)";
        ctx.font = '600 16px "Avenir Next", "Segoe UI", sans-serif';
        wrapText(subtitle, cardX + 34, cardY + 118, cardWidth - 68, 24);

        const chips = [
          `예측 고리: 밝은 잔상 위치에 닻 고정`,
          `리듬: 파고 직후 스와이프로 회수`,
          `목표: 6파 생존, 열 100% 금지`,
        ];

        let chipY = cardY + 196;
        for (const chip of chips) {
          drawRoundedRect(cardX + 34, chipY, cardWidth - 68, 40, 18);
          ctx.fillStyle = "rgba(217,251,255,0.07)";
          ctx.fill();
          ctx.fillStyle = "rgba(217,251,255,0.9)";
          ctx.font = '600 14px "Avenir Next", "Segoe UI", sans-serif';
          ctx.fillText(chip, cardX + 50, chipY + 25);
          chipY += 52;
        }

        ctx.fillStyle = "rgba(217,251,255,0.74)";
        ctx.font = '600 14px "Avenir Next", "Segoe UI", sans-serif';
        wrapText(
          "터치/클릭으로 시작하고 잔상 고리에 탭 발사, 파고 직후 스와이프로 회수하세요.",
          cardX + 34,
          cardY + cardHeight - 84,
          cardWidth - 68,
          20
        );

        ctx.fillStyle = accentColor;
        ctx.font = '700 15px "Avenir Next", "Segoe UI", sans-serif';
        ctx.textAlign = "center";
        ctx.fillText(actionText, cardX + cardWidth / 2, cardY + cardHeight - 26);
      }

      function drawResultOverlay() {
        if (state.mode === "menu") {
          drawOverlayCard(
            "Tide Anchor",
            "시간 조류의 잔상을 읽고 중요 화물을 미래 위치에 고정하세요. 너무 오래 붙잡으면 주조소가 과열됩니다.",
            "터치/클릭/Enter 시작  ·  탭 발사  ·  스와이프 회수",
            "#79f4ff"
          );
          return;
        }

        if (state.mode === "failed") {
          const subtitle =
            state.heat >= 100
              ? "과열이 폭주했습니다. 발사 타이밍을 늦추고 파고 직후 바로 회수하세요."
              : "중요 화물이 조류에 유실됐습니다. 예측 고리 중심에 더 일찍 맞춰 두세요.";
          drawOverlayCard(
            "Foundry Lost",
            subtitle,
            `기록 ${state.lastRunTime.toFixed(1)}초  ·  터치/클릭/Enter 재시작`,
            "#ff6d91"
          );
          return;
        }

        if (state.mode === "cleared") {
          drawOverlayCard(
            "Generator Stable",
            "여섯 번의 시간 조류를 봉인했습니다. 닻 회수와 냉각 리듬이 완벽했습니다.",
            `기록 ${state.lastRunTime.toFixed(1)}초  ·  터치/클릭/Enter 재시작`,
            "#ffc56e"
          );
        }
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.save();
        if (state.cameraShake > 0 && !REDUCED_MOTION) {
          ctx.translate((Math.random() - 0.5) * state.cameraShake, (Math.random() - 0.5) * state.cameraShake * 0.7);
        }

        drawBackground();
        drawGenerator();
        drawCurrentWave();
        drawCargo();
        drawAnchor();
        drawEffects();
        if (state.currentWave) {
          drawHud();
        }
        drawPopups();

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(217, 251, 255, ${state.flash * 0.22})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
        ctx.restore();

        drawResultOverlay();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        let delta = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
        lastTimestamp = timestamp;
        accumulator += delta;
        while (accumulator >= FIXED_DT) {
          update(FIXED_DT);
          accumulator -= FIXED_DT;
        }
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function renderGameToText() {
        const wave = state.currentWave;
        const payload = {
          mode: state.mode,
          phase: state.phase,
          coordinateSystem: "origin top-left, x right, y down",
          wave: wave ? state.waveIndex + 1 : 0,
          totalWaves: WAVE_DEFS.length,
          heat: Number(state.heat.toFixed(1)),
          anchor: {
            active: state.anchor.active,
            locked: state.anchor.locked,
            x: Number(state.anchor.x.toFixed(1)),
            y: Number(state.anchor.y.toFixed(1)),
          },
          cargo: {
            x: Number(state.cargo.x.toFixed(1)),
            y: Number(state.cargo.y.toFixed(1)),
            vx: Number(state.cargo.vx.toFixed(1)),
            vy: Number(state.cargo.vy.toFixed(1)),
          },
          target: wave
            ? {
                x: Number(wave.targetX.toFixed(1)),
                y: Number(wave.targetY.toFixed(1)),
                direction: wave.dir > 0 ? "right" : "left",
              }
            : null,
          elapsed: Number(state.elapsed.toFixed(1)),
        };
        return JSON.stringify(payload);
      }

      window.relayStageMeta = {
        id: META_ID,
        title: META_TITLE,
        creator: META_CREATOR,
        genre: META_GENRE,
        clearCondition: META_CLEAR,
      };

      window.relayStageResult = { status: "running" };
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startRun();
          }
          clearStage();
        },
        forceFail() {
          if (state.mode === "menu") {
            startRun();
          }
          failStage("forced_fail");
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerCancel);
      canvas.addEventListener("touchstart", handleTouchStart, { passive: false });
      canvas.addEventListener("touchmove", handleTouchMove, { passive: false });
      canvas.addEventListener("touchend", handleTouchEnd, { passive: false });
      canvas.addEventListener("touchcancel", handleTouchCancel, { passive: false });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);
      window.addEventListener("blur", () => {
        input.nudges.left = false;
        input.nudges.right = false;
        input.nudges.up = false;
        input.nudges.down = false;
      });

      render();
      reportReadyToHost();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
