<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우산 산책</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #B8CFE0;
      }
      body { display: grid; place-items: center; }
      a, canvas { -webkit-tap-highlight-color: rgba(148,163,184,0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0,0,0,0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(15,23,42,0.92);
        color: #f8fafc; font-weight: 800; text-decoration: none;
        white-space: nowrap; transition: transform 0.15s ease;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        background: #B8CFE0; touch-action: manipulation;
      }
      canvas:focus-visible {
        outline: 4px solid rgba(60,80,110,0.5); outline-offset: -8px;
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">우산 산책. 좌우 터치로 우산을 기울여 빗줄기를 막으며 편지를 모으세요.</p>
    <canvas id="game" width="960" height="540" aria-label="우산 산책" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
    (function() {
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = 960, H = 540;
      const FIXED_DT = 1/60, MAX_DT = 1/20;

      const relayContext = window.RelayRuntime?.readContext("umbrella-walk") || {
        history: [], clearCount: 0, previousStageId: null
      };
      let animFrame = 0, lastTs = 0;
      let hostFailedReported = false, hostClearedReported = false;

      const C = {
        sky: "#B8CFE0", skyTop: "#8AACCA", ground: "#A09080",
        groundLight: "#B5A898", puddle: "rgba(120,155,185,0.4)",
        umbrella: "#E8B84B", umbrellaStroke: "#C49A30",
        person: "#5A4A3C", personLight: "#7A6A5A",
        rain: "rgba(160,190,215,0.6)",
        letter: "#F2E8D0", letterStroke: "#C4A870",
        hud: "#3C506E", cardBg: "rgba(220,230,240,0.96)",
        success: "#4A7C59", fail: "#B85450", wet: "#5888A8"
      };

      const TIME_LIMIT = 35;
      const LETTERS_NEEDED = 10;
      const MAX_WETNESS = 100;

      const st = {
        mode: "menu", elapsed: 0, lastRunTime: 0,
        charX: W/2, charY: H - 100,
        tilt: 0, tiltTarget: 0, tiltVisual: 0,
        drops: [], windAngle: 0, windTarget: 0, windTimer: 0,
        letters: [], lettersCollected: 0,
        wetness: 0, particles: [],
        shakeTime: 0, shakeX: 0, shakeY: 0,
        walkPhase: 0, puddles: [],
        inputLeft: false, inputRight: false
      };

      function lerp(a,b,t) { return a+(b-a)*Math.min(1,Math.max(0,t)); }
      function rand(a,b) { return a+Math.random()*(b-a); }
      function shake(d) { st.shakeTime = Math.max(st.shakeTime,d); }

      function spawnParticles(x,y,n,color) {
        for (let i=0;i<n;i++) {
          const ang=Math.random()*Math.PI*2, spd=rand(20,80);
          st.particles.push({
            x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-rand(20,50),
            life:rand(0.3,0.7),maxLife:rand(0.3,0.7),size:rand(2,5),color
          });
        }
      }

      function spawnRainDrop() {
        st.drops.push({x:rand(-50,W+50),y:rand(-40,-10),speed:rand(400,600),len:rand(12,22),alpha:rand(0.3,0.7)});
      }
      function spawnLetter() {
        st.letters.push({x:rand(80,W-80),y:rand(-60,-20),vy:rand(40,70),size:28,collected:false,wobble:rand(0,Math.PI*2)});
      }

      function isUnderUmbrella(x,y) {
        const ux=st.charX, uy=st.charY-70;
        const tOff=st.tiltVisual*50;
        return x>=ux+tOff-55 && x<=ux+tOff+55 && y>=uy-25 && y<=uy+15;
      }

      function initLevel() {
        st.drops=[]; st.letters=[]; st.particles=[];
        st.lettersCollected=0; st.wetness=0;
        st.tilt=0; st.tiltTarget=0; st.tiltVisual=0;
        st.windAngle=0; st.windTarget=0; st.windTimer=3;
        st.walkPhase=0; st.puddles=[];
        for (let i=0;i<8;i++) st.puddles.push({x:rand(40,W-40),y:rand(H-60,H-20),w:rand(30,60),h:rand(8,14)});
      }

      function inRelayHost() {
        try { return window.parent&&window.parent!==window&&window.parent.RelayHost; } catch(e) { return false; }
      }
      function reportReadyToHost() { if(!inRelayHost()) return; window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailedToHost(reason) {
        if(!inRelayHost()||hostFailedReported) return; hostFailedReported=true;
        window.parent.RelayHost.onStageFailed?.({stageId:"umbrella-walk",stageTitle:"우산 산책",reason,durationSec:+st.lastRunTime.toFixed(1)});
      }
      function reportClearedToHost() {
        if(!inRelayHost()||hostClearedReported) return; hostClearedReported=true;
        window.parent.RelayHost.onStageCleared?.({stageId:"umbrella-walk",stageTitle:"우산 산책",clearCountAfter:relayContext.clearCount+1,durationSec:+st.lastRunTime.toFixed(1)});
      }

      function startStage() {
        st.mode="running"; st.elapsed=0; st.lastRunTime=0;
        hostFailedReported=false; hostClearedReported=false;
        window.relayStageResult.status="running"; initLevel();
      }
      function failStage(reason) {
        st.mode="failed"; st.lastRunTime=st.elapsed;
        window.relayStageResult.status="failed"; shake(0.5); reportFailedToHost(reason);
      }
      function clearStage() {
        st.mode="cleared"; st.lastRunTime=st.elapsed;
        window.relayStageResult.status="cleared";
        spawnParticles(st.charX,st.charY-50,30,C.umbrella); reportClearedToHost();
      }

      function update(dt) {
        if (st.mode!=="running") { updateParticles(dt); return; }
        st.elapsed+=dt; st.walkPhase+=dt*6;

        if (st.inputLeft) st.tiltTarget=-1;
        else if (st.inputRight) st.tiltTarget=1;
        else st.tiltTarget=0;
        st.tilt=lerp(st.tilt,st.tiltTarget,dt*8);
        st.tiltVisual=lerp(st.tiltVisual,st.tilt,dt*10);

        st.windTimer-=dt;
        if (st.windTimer<=0) { st.windTarget=rand(-0.6,0.6); st.windTimer=rand(2,4); }
        st.windAngle=lerp(st.windAngle,st.windTarget,dt*2);

        const rainRate=4+st.elapsed*0.15;
        for (let i=0;i<Math.ceil(rainRate);i++) spawnRainDrop();

        if (Math.random()<dt*0.8 && st.lettersCollected+st.letters.filter(l=>!l.collected).length<LETTERS_NEEDED) spawnLetter();

        for (let i=st.drops.length-1;i>=0;i--) {
          const d=st.drops[i];
          d.x+=st.windAngle*120*dt; d.y+=d.speed*dt;
          if (isUnderUmbrella(d.x,d.y)) { spawnParticles(d.x,d.y,2,C.rain); st.drops.splice(i,1); continue; }
          const dx=d.x-st.charX, dy=d.y-st.charY;
          if (Math.abs(dx)<20 && dy>-50 && dy<20) { st.wetness+=0.8; st.drops.splice(i,1); continue; }
          if (d.y>H+10) st.drops.splice(i,1);
        }

        for (let i=st.letters.length-1;i>=0;i--) {
          const l=st.letters[i];
          if (l.collected) { st.letters.splice(i,1); continue; }
          l.y+=l.vy*dt; l.wobble+=dt*3; l.x+=Math.sin(l.wobble)*15*dt;
          const ldx=l.x-st.charX, ldy=l.y-st.charY;
          if (Math.abs(ldx)<35&&Math.abs(ldy)<50) {
            l.collected=true; st.lettersCollected++;
            spawnParticles(l.x,l.y,10,C.letter);
            if (st.lettersCollected>=LETTERS_NEEDED) { clearStage(); return; }
          }
          if (l.y>H+30) st.letters.splice(i,1);
        }

        st.wetness=Math.max(0,st.wetness-dt*3);
        if (st.wetness>=MAX_WETNESS) { failStage("젖음 게이지 초과"); return; }
        if (st.elapsed>=TIME_LIMIT) { failStage("시간 초과"); return; }

        if (st.shakeTime>0) {
          st.shakeTime-=dt;
          st.shakeX=rand(-3,3)*(st.shakeTime/0.5);
          st.shakeY=rand(-3,3)*(st.shakeTime/0.5);
        } else { st.shakeX=0; st.shakeY=0; }
        updateParticles(dt);
      }

      function updateParticles(dt) {
        for (let i=st.particles.length-1;i>=0;i--) {
          const p=st.particles[i];
          p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=100*dt; p.life-=dt;
          if (p.life<=0) st.particles.splice(i,1);
        }
      }

      function render() {
        ctx.save(); ctx.translate(st.shakeX,st.shakeY);
        if (st.mode==="menu") { renderMenu(); ctx.restore(); return; }
        if (st.mode==="failed") { renderGame(); renderOverlay("실패",C.fail,["젖음 게이지가 가득 찼습니다","수집: "+st.lettersCollected+"/"+LETTERS_NEEDED,"터치하여 재시작"]); ctx.restore(); return; }
        if (st.mode==="cleared") { renderGame(); renderOverlay("클리어!",C.success,["편지를 모두 수집했습니다!","시간: "+st.lastRunTime.toFixed(1)+"초","터치하여 재시작"]); ctx.restore(); return; }
        renderGame(); ctx.restore();
      }

      function renderGame() {
        const skyGrad=ctx.createLinearGradient(0,0,0,H);
        skyGrad.addColorStop(0,C.skyTop); skyGrad.addColorStop(0.7,C.sky); skyGrad.addColorStop(1,C.ground);
        ctx.fillStyle=skyGrad; ctx.fillRect(0,0,W,H);

        ctx.fillStyle=C.ground; ctx.fillRect(0,H-70,W,70);
        ctx.fillStyle=C.groundLight; ctx.fillRect(0,H-70,W,3);

        for (const p of st.puddles) {
          ctx.fillStyle=C.puddle; ctx.beginPath();
          ctx.ellipse(p.x,p.y,p.w/2,p.h/2,0,0,Math.PI*2); ctx.fill();
        }

        ctx.fillStyle="rgba(80,90,105,0.25)";
        [[50,200,80,270],[160,160,70,310],[280,180,90,290],[420,140,75,330],[560,170,85,300],[700,130,80,340],[830,190,90,280]].forEach(([bx,by,bw,bh])=>ctx.fillRect(bx,by,bw,bh));

        ctx.strokeStyle=C.rain; ctx.lineWidth=1.5;
        for (const d of st.drops) {
          ctx.globalAlpha=d.alpha;
          const wx=st.windAngle*d.len*0.8;
          ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x+wx,d.y+d.len); ctx.stroke();
        }
        ctx.globalAlpha=1;

        for (const l of st.letters) {
          if (l.collected) continue;
          ctx.save(); ctx.translate(l.x,l.y); ctx.rotate(Math.sin(l.wobble)*0.2);
          ctx.fillStyle=C.letter; ctx.strokeStyle=C.letterStroke; ctx.lineWidth=2;
          ctx.fillRect(-14,-10,28,20); ctx.strokeRect(-14,-10,28,20);
          ctx.beginPath(); ctx.moveTo(-14,-10); ctx.lineTo(0,2); ctx.lineTo(14,-10); ctx.stroke();
          ctx.restore();
        }

        renderCharacter();

        for (const p of st.particles) {
          ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha=1;
        renderHUD();
      }

      function renderCharacter() {
        const cx=st.charX,cy=st.charY;
        ctx.strokeStyle=C.person; ctx.lineWidth=4;
        ctx.beginPath(); ctx.moveTo(cx-8,cy+10); ctx.lineTo(cx-10,cy+30+Math.sin(st.walkPhase)*3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx+8,cy+10); ctx.lineTo(cx+10,cy+30-Math.sin(st.walkPhase)*3); ctx.stroke();
        ctx.fillStyle=C.personLight; ctx.fillRect(cx-10,cy-15,20,28);
        ctx.fillStyle=C.person; ctx.beginPath(); ctx.arc(cx,cy-25,10,0,Math.PI*2); ctx.fill();

        const tOff=st.tiltVisual*50, ux=cx+tOff, uy=cy-70+Math.sin(st.walkPhase)*3;
        ctx.strokeStyle=C.umbrellaStroke; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(cx,cy-15); ctx.lineTo(ux,uy); ctx.stroke();
        ctx.fillStyle=C.umbrella;
        ctx.beginPath(); ctx.ellipse(ux,uy,55,18,st.tiltVisual*0.3,Math.PI,0); ctx.fill();
        ctx.strokeStyle=C.umbrellaStroke; ctx.lineWidth=2;
        ctx.beginPath(); ctx.ellipse(ux,uy,55,18,st.tiltVisual*0.3,Math.PI,0); ctx.stroke();
        for (let i=-2;i<=2;i++) {
          ctx.strokeStyle="rgba(196,154,48,0.4)"; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(ux,uy); ctx.lineTo(ux+i*20,uy-3-Math.abs(i)*3); ctx.stroke();
        }
      }

      function renderHUD() {
        const pad=16,top=14;
        const timeLeft=Math.max(0,TIME_LIMIT-st.elapsed);
        ctx.fillStyle=C.hud; ctx.font="700 20px Trebuchet MS"; ctx.textAlign="left";
        ctx.fillText("⏱ "+Math.ceil(timeLeft)+"초",pad,top+20);
        ctx.fillText("✉ "+st.lettersCollected+"/"+LETTERS_NEEDED,pad,top+48);

        ctx.textAlign="right";
        ctx.fillText("💧",W-pad-110,top+20);
        const barX=W-pad-105,barY=top+8,barW=100,barH=14;
        ctx.fillStyle="rgba(180,200,220,0.5)";
        rr(barX,barY,barW,barH,7); ctx.fill();
        const wetPct=st.wetness/MAX_WETNESS;
        ctx.fillStyle=wetPct>0.7?C.fail:C.wet;
        rr(barX,barY,barW*wetPct,barH,7); ctx.fill();

        ctx.fillStyle=C.hud; ctx.textAlign="center";
        const windStr=st.windAngle<-0.15?"← 바람":st.windAngle>0.15?"바람 →":"잔잔";
        ctx.font="600 16px Trebuchet MS";
        ctx.fillText("🌬 "+windStr,W/2,top+20);
      }

      function renderMenu() {
        const skyGrad=ctx.createLinearGradient(0,0,0,H);
        skyGrad.addColorStop(0,C.skyTop); skyGrad.addColorStop(1,C.sky);
        ctx.fillStyle=skyGrad; ctx.fillRect(0,0,W,H);

        ctx.strokeStyle=C.rain; ctx.lineWidth=1;
        for (let i=0;i<40;i++) {
          ctx.globalAlpha=0.3;
          const rx=rand(0,W),ry=rand(0,H);
          ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx+3,ry+15); ctx.stroke();
        }
        ctx.globalAlpha=1;

        const cw=420,ch=310,cx=(W-cw)/2,cy=(H-ch)/2;
        ctx.fillStyle=C.cardBg; ctx.strokeStyle=C.umbrella; ctx.lineWidth=3;
        rr(cx,cy,cw,ch,18); ctx.fill(); ctx.stroke();

        ctx.fillStyle=C.hud; ctx.textAlign="center";
        ctx.font="800 34px Trebuchet MS";
        ctx.fillText("우산 산책",W/2,cy+48);

        ctx.font="500 16px Trebuchet MS";
        ["비 오는 거리에서 우산을 기울여","떨어지는 편지를 모으세요","",
         "☂ 조작: 좌우 터치로 우산 기울이기",
         "✉ 클리어: 편지 10개를 젖지 않게 수집하면 클리어",
         "💧 실패: 젖음 게이지가 가득 차면 실패","",
         "터치 또는 Enter로 시작"
        ].forEach((l,i)=>ctx.fillText(l,W/2,cy+84+i*28));
      }

      function renderOverlay(title,color,lines) {
        ctx.fillStyle="rgba(184,207,224,0.6)"; ctx.fillRect(0,0,W,H);
        const cw=380,ch=200,cx=(W-cw)/2,cy=(H-ch)/2;
        ctx.fillStyle=C.cardBg; ctx.strokeStyle=color; ctx.lineWidth=3;
        rr(cx,cy,cw,ch,18); ctx.fill(); ctx.stroke();
        ctx.fillStyle=color; ctx.font="800 30px Trebuchet MS"; ctx.textAlign="center";
        ctx.fillText(title,W/2,cy+48);
        ctx.fillStyle=C.hud; ctx.font="500 17px Trebuchet MS";
        lines.forEach((l,i)=>ctx.fillText(l,W/2,cy+85+i*32));
      }

      function rr(x,y,w,h,r) {
        ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
        ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
        ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
        ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
        ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
      }

      canvas.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if (st.mode!=="running") { startStage(); return; }
        const rect=canvas.getBoundingClientRect();
        const cx=(e.clientX-rect.left)/rect.width*W;
        if (cx<W/2) st.inputLeft=true; else st.inputRight=true;
      });
      canvas.addEventListener("pointermove",(e)=>{
        if (st.mode!=="running"||e.buttons===0) return;
        const rect=canvas.getBoundingClientRect();
        const cx=(e.clientX-rect.left)/rect.width*W;
        st.inputLeft=cx<W/2; st.inputRight=cx>=W/2;
      });
      canvas.addEventListener("pointerup",()=>{st.inputLeft=false;st.inputRight=false;});
      canvas.addEventListener("pointercancel",()=>{st.inputLeft=false;st.inputRight=false;});
      canvas.addEventListener("click",()=>canvas.focus());

      window.addEventListener("keydown",(e)=>{
        if (e.key==="Enter"&&st.mode!=="running") { e.preventDefault(); startStage(); return; }
        if (e.key==="ArrowLeft"||e.key==="a") st.inputLeft=true;
        if (e.key==="ArrowRight"||e.key==="d") st.inputRight=true;
      });
      window.addEventListener("keyup",(e)=>{
        if (e.key==="ArrowLeft"||e.key==="a") st.inputLeft=false;
        if (e.key==="ArrowRight"||e.key==="d") st.inputRight=false;
      });

      function frame(ts) {
        const dt=lastTs?Math.min((ts-lastTs)/1000,MAX_DT):FIXED_DT;
        lastTs=ts; update(dt); render();
        animFrame=requestAnimationFrame(frame);
      }

      function renderGameToText() {
        return JSON.stringify({mode:st.mode,elapsed:+(st.elapsed.toFixed(1)),lettersCollected:st.lettersCollected,wetness:Math.round(st.wetness),result:window.relayStageResult.status});
      }

      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{
        const steps=Math.max(1,Math.round(ms/(FIXED_DT*1000)));
        for(let i=0;i<steps;i++) update(FIXED_DT);
        render(); return renderGameToText();
      };
      window.relayStageMeta={id:"umbrella-walk",title:"우산 산책",creator:"jungcollin",genre:"Tilt defense",clearCondition:"편지 10개를 젖지 않게 수집하면 클리어"};
      window.relayStageResult={status:"running"};
      window.relayStageDebug={
        forceClear(){startStage();clearStage();render();},
        forceFail(){startStage();failStage("debug_force_fail");render();}
      };

      reportReadyToHost(); render(); canvas.focus();
      animFrame=requestAnimationFrame(frame);
      window.addEventListener("beforeunload",()=>cancelAnimationFrame(animFrame));
    })();
    </script>
  </body>
</html>
