<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Midnight Harbor: Pulse Fence</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(66, 116, 193, 0.18), transparent 34%),
          linear-gradient(180deg, #020817 0%, #07131f 52%, #04101a 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(154, 208, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
        background: #020817;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(186, 230, 253, 0.95);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Midnight Harbor: Pulse Fence. 포인터 또는 터치 드래그로 방패 각도 조절, 탭으로 순간 증폭, 박자 링이 맞을 때 핵심 입력 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      템포 창을 놓치지 않고 20연속 파형을 반사하면 클리어. 핵심 입력을 연속으로 박자 밖에 쓰거나 코어에 같은 문양이 3번 누적되면 실패.
      화면 터치와 드래그만으로도 시작과 플레이가 가능하며, Enter와 Space, 방향키로도 조작할 수 있습니다.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Midnight Harbor: Pulse Fence" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TARGET_REFLECTIONS = 20;
      const SYMBOLS = ["anchor", "tide", "horn"];
      const SYMBOL_ORDER = {
        anchor: 0,
        tide: 1,
        horn: 2,
      };
      const SYMBOL_STYLE = {
        anchor: { label: "ANCHOR", short: "A", color: "#6ed4ff", glow: "rgba(110, 212, 255, 0.44)" },
        tide: { label: "TIDE", short: "T", color: "#74f3c9", glow: "rgba(116, 243, 201, 0.42)" },
        horn: { label: "HORN", short: "H", color: "#ffb165", glow: "rgba(255, 177, 101, 0.45)" },
      };
      const STAGE_META = {
        id: "midnight-harbor-pulse-fencing-tempo",
        title: "Midnight Harbor: Pulse Fence",
        description: "회전하는 펄스 방패를 입력 타이밍에 맞춰 세워 문양 파형을 받아내는 한밤의 항만 반응 액션",
        creator: {
          name: "jungcollin",
          avatar: null,
          github: "jungcollin",
        },
        genre: "Reactive shield action / 템포 윈도우",
        controls:
          "포인터 또는 터치 드래그로 방패 각도 조절, 탭으로 순간 증폭, 박자 링이 맞을 때 핵심 입력 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition: "템포 창을 놓치지 않고 20연속 파형을 반사하면 클리어",
        failCondition: "핵심 입력을 연속으로 박자 밖에 쓰거나 코어에 같은 문양이 3번 누적되면 실패",
      };
      const relayContext = window.RelayRuntime?.readContext(STAGE_META.id) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const prefersReducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches ?? false;
      const stars = Array.from({ length: 42 }, (_, index) => ({
        x: (index * 71.3) % VIEW.width,
        y: 24 + ((index * 43.7) % 170),
        size: 0.8 + ((index * 17) % 13) / 10,
        alpha: 0.28 + ((index * 9) % 11) / 30,
      }));
      const harborLights = Array.from({ length: 16 }, (_, index) => ({
        x: 30 + index * 58 + (index % 3) * 4,
        y: 250 + (index % 2) * 4,
        color: index % 3 === 0 ? "#ffd36e" : index % 3 === 1 ? "#6ed4ff" : "#8affc4",
      }));
      const pointerState = {
        active: false,
        pointerId: null,
        downX: 0,
        downY: 0,
        downTime: 0,
        moved: false,
        startedRun: false,
      };
      const keys = {
        left: false,
        right: false,
      };
      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        reflections: 0,
        streak: 0,
        bestStreak: 0,
        offbeatChain: 0,
        beatClock: 0,
        beatInterval: 1.05,
        beatWindow: 0.16,
        perfectWindow: 0.085,
        chargeTimer: 0,
        chargeFlash: 0,
        shieldAngle: -Math.PI / 2,
        targetAngle: -Math.PI / 2,
        keyboardVelocity: 0,
        currentWave: null,
        previousWaveAngle: null,
        waterPhase: 0,
        harborFlash: 0,
        screenShake: 0,
        flashLevel: 0,
        hintTimer: 0,
        failureReason: "",
        particles: [],
        popups: [],
        marks: {
          anchor: 0,
          tide: 0,
          horn: 0,
        },
      };
      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostReadyReported = false;
      let hostFailedReported = false;
      let hostClearedReported = false;

      window.relayStageMeta = STAGE_META;
      window.relayStageResult = { status: "running" };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function normalizeAngle(angle) {
        let value = angle;
        while (value <= -Math.PI) value += Math.PI * 2;
        while (value > Math.PI) value -= Math.PI * 2;
        return value;
      }

      function shortestAngleDiff(a, b) {
        return normalizeAngle(a - b);
      }

      function lerpAngle(a, b, amount) {
        return normalizeAngle(a + shortestAngleDiff(b, a) * amount);
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function getCenter() {
        return { x: VIEW.width * 0.5, y: VIEW.height * 0.54 };
      }

      function getShieldRadius() {
        return 128;
      }

      function getProgressRatio() {
        return clamp(state.reflections / TARGET_REFLECTIONS, 0, 1);
      }

      function getHudPulse() {
        return Math.sin(state.elapsed * 6.5) * 0.5 + 0.5;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost() || hostReadyReported) {
          return;
        }
        hostReadyReported = true;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRunState() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.reflections = 0;
        state.streak = 0;
        state.bestStreak = 0;
        state.offbeatChain = 0;
        state.beatClock = 0;
        state.beatInterval = 1.05;
        state.beatWindow = 0.16;
        state.perfectWindow = 0.085;
        state.chargeTimer = 0;
        state.chargeFlash = 0;
        state.shieldAngle = -Math.PI / 2;
        state.targetAngle = -Math.PI / 2;
        state.keyboardVelocity = 0;
        state.previousWaveAngle = null;
        state.currentWave = null;
        state.waterPhase = 0;
        state.harborFlash = 0;
        state.screenShake = 0;
        state.flashLevel = 0;
        state.hintTimer = 0;
        state.failureReason = "";
        state.particles.length = 0;
        state.popups.length = 0;
        state.marks.anchor = 0;
        state.marks.tide = 0;
        state.marks.horn = 0;
        hostFailedReported = false;
        hostClearedReported = false;
        spawnWave();
      }

      function startStage() {
        resetRunState();
        state.mode = "running";
        window.relayStageResult.status = "running";
      }

      function failStage(reason = "failed") {
        if (state.mode !== "running") {
          state.mode = "failed";
        } else {
          state.mode = "failed";
          state.lastRunTime = state.elapsed;
        }
        state.failureReason = reason;
        window.relayStageResult.status = "failed";
        state.screenShake = Math.max(state.screenShake, 0.65);
        state.flashLevel = Math.max(state.flashLevel, 0.55);
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        state.screenShake = Math.max(state.screenShake, 0.3);
        state.flashLevel = Math.max(state.flashLevel, 0.5);
        spawnBurst(getCenter().x, getCenter().y, "#8affc4", 42, 3.8);
        reportClearedToHost();
      }

      function updateBeatTuning() {
        const progress = getProgressRatio();
        state.beatInterval = lerp(1.05, 0.72, progress);
        state.beatWindow = lerp(0.16, 0.105, progress);
        state.perfectWindow = lerp(0.085, 0.05, progress);
      }

      function chooseWaveSymbol() {
        const sorted = SYMBOLS.slice().sort((a, b) => {
          const markDelta = state.marks[a] - state.marks[b];
          if (markDelta !== 0) return markDelta;
          return SYMBOL_ORDER[a] - SYMBOL_ORDER[b];
        });
        const weights = [0.5, 0.32, 0.18];
        const roll = Math.random();
        let acc = 0;
        for (let index = 0; index < sorted.length; index += 1) {
          acc += weights[index];
          if (roll <= acc) {
            return sorted[index];
          }
        }
        return sorted[sorted.length - 1];
      }

      function chooseWaveAngle() {
        const progress = getProgressRatio();
        const preferredJump = lerp(Math.PI * 0.38, Math.PI * 0.62, progress);
        let angle = randomBetween(-Math.PI, Math.PI);
        if (state.previousWaveAngle == null) {
          return angle;
        }
        for (let attempt = 0; attempt < 12; attempt += 1) {
          angle = state.previousWaveAngle + preferredJump + randomBetween(-0.55, 0.55);
          angle = normalizeAngle(angle);
          const diff = Math.abs(shortestAngleDiff(angle, state.previousWaveAngle));
          if (diff > lerp(0.55, 0.95, progress)) {
            return angle;
          }
        }
        return angle;
      }

      function spawnWave() {
        updateBeatTuning();
        const symbol = chooseWaveSymbol();
        const angle = chooseWaveAngle();
        state.previousWaveAngle = angle;
        state.currentWave = {
          symbol,
          angle,
          arcWidth: lerp(0.34, 0.24, getProgressRatio()),
          drift: randomBetween(-0.32, 0.32),
          swell: randomBetween(0.7, 1.3),
        };
      }

      function getWindowMetrics() {
        const remaining = state.beatInterval - state.beatClock;
        return {
          remaining,
          inWindow: remaining <= state.beatWindow,
          perfect: remaining <= state.perfectWindow,
          ratio: clamp(remaining / state.beatInterval, 0, 1),
        };
      }

      function addPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          time: 0,
          life: 0.9,
        });
      }

      function spawnBurst(x, y, color, count, speedScale = 1) {
        const total = prefersReducedMotion ? Math.max(8, Math.round(count * 0.35)) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / total + randomBetween(-0.12, 0.12);
          const speed = randomBetween(70, 220) * speedScale;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: randomBetween(2, 6),
            life: randomBetween(0.35, 0.8),
            time: 0,
            color,
          });
        }
      }

      function symbolImpactPoint(angle) {
        const center = getCenter();
        const radius = getShieldRadius();
        return {
          x: center.x + Math.cos(angle) * radius,
          y: center.y + Math.sin(angle) * radius,
        };
      }

      function registerGoodBeat(isPerfect) {
        state.chargeTimer = isPerfect ? 0.38 : 0.28;
        state.chargeFlash = isPerfect ? 1 : 0.7;
        state.offbeatChain = 0;
        const center = getCenter();
        spawnBurst(center.x, center.y, "#7fe7ff", isPerfect ? 22 : 14, isPerfect ? 1.3 : 1);
        addPopup(isPerfect ? "PERFECT" : "PULSE", center.x, center.y - 98, isPerfect ? "#8affc4" : "#8fe9ff");
      }

      function registerOffbeat() {
        state.offbeatChain += 1;
        state.chargeFlash = 0.35;
        state.flashLevel = Math.max(state.flashLevel, 0.22);
        const center = getCenter();
        spawnBurst(center.x, center.y, "#ff6d7e", 12, 0.75);
        addPopup("OFFBEAT", center.x, center.y - 70, "#ff8e9d");
        if (state.offbeatChain >= 2) {
          failStage("offbeat-chain");
        }
      }

      function attemptCharge() {
        if (state.mode !== "running") {
          return;
        }
        const windowMetrics = getWindowMetrics();
        if (windowMetrics.inWindow) {
          registerGoodBeat(windowMetrics.perfect);
        } else {
          registerOffbeat();
        }
      }

      function reduceMark(symbol) {
        if (state.marks[symbol] > 0) {
          state.marks[symbol] -= 1;
        }
      }

      function recordMark(symbol, reason) {
        state.reflections = 0;
        state.streak = 0;
        state.marks[symbol] += 1;
        state.flashLevel = Math.max(state.flashLevel, 0.35);
        state.harborFlash = Math.max(state.harborFlash, 0.5);
        state.screenShake = Math.max(state.screenShake, 0.45);
        const point = symbolImpactPoint(state.currentWave?.angle ?? state.shieldAngle);
        spawnBurst(point.x, point.y, SYMBOL_STYLE[symbol].color, 24, 1.2);
        addPopup(reason, point.x, point.y - 18, "#ffd6dc");
        if (state.marks[symbol] >= 3) {
          failStage(`sigil-${symbol}`);
        }
      }

      function resolveWaveImpact() {
        if (!state.currentWave || state.mode !== "running") {
          return;
        }
        const wave = state.currentWave;
        const alignmentTolerance = wave.arcWidth + 0.18;
        const aligned = Math.abs(shortestAngleDiff(state.shieldAngle, wave.angle)) <= alignmentTolerance;
        const charged = state.chargeTimer > 0;
        const point = symbolImpactPoint(wave.angle);

        if (aligned && charged) {
          state.reflections += 1;
          state.streak += 1;
          state.bestStreak = Math.max(state.bestStreak, state.streak);
          state.harborFlash = Math.max(state.harborFlash, 0.45);
          state.screenShake = Math.max(state.screenShake, 0.26);
          state.flashLevel = Math.max(state.flashLevel, 0.2);
          reduceMark(wave.symbol);
          spawnBurst(point.x, point.y, SYMBOL_STYLE[wave.symbol].color, 36, 1.7);
          addPopup(
            state.streak >= 10 ? `CHAIN ${state.streak}` : "REFLECT",
            point.x,
            point.y - 20,
            SYMBOL_STYLE[wave.symbol].color
          );
          state.currentWave = null;
          state.beatClock = 0;
          state.chargeTimer = Math.max(0, state.chargeTimer - 0.12);
          if (state.reflections >= TARGET_REFLECTIONS) {
            clearStage();
            return;
          }
          spawnWave();
          return;
        }

        const missReason = charged ? "ANGLE MISS" : "BEAT MISS";
        recordMark(wave.symbol, missReason);
        state.currentWave = null;
        state.beatClock = 0;
        if (state.mode === "running") {
          spawnWave();
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.time += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy *= 0.985;
          particle.vy += 30 * dt;
          if (particle.time >= particle.life) {
            state.particles.splice(index, 1);
          }
        }
      }

      function updatePopups(dt) {
        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.time += dt;
          popup.y -= 28 * dt;
          if (popup.time >= popup.life) {
            state.popups.splice(index, 1);
          }
        }
      }

      function updateGameplay(dt) {
        state.elapsed += dt;
        state.waterPhase += dt;
        state.hintTimer += dt;
        state.screenShake = Math.max(0, state.screenShake - dt * 1.6);
        state.flashLevel = Math.max(0, state.flashLevel - dt * 0.8);
        state.harborFlash = Math.max(0, state.harborFlash - dt * 1.4);
        state.chargeFlash = Math.max(0, state.chargeFlash - dt * 2.6);
        state.chargeTimer = Math.max(0, state.chargeTimer - dt);

        const keyboardDirection = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        if (keyboardDirection !== 0) {
          state.targetAngle = normalizeAngle(state.targetAngle + keyboardDirection * dt * 2.7);
        }
        state.shieldAngle = lerpAngle(state.shieldAngle, state.targetAngle, clamp(dt * 13, 0.08, 0.3));

        updateParticles(dt);
        updatePopups(dt);

        if (state.mode !== "running") {
          return;
        }

        state.beatClock += dt;
        if (state.beatClock >= state.beatInterval) {
          resolveWaveImpact();
        }
      }

      function update(dt) {
        updateGameplay(dt);
      }

      function worldPointFromClient(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY,
        };
      }

      function setShieldTargetFromPoint(x, y) {
        const center = getCenter();
        state.targetAngle = Math.atan2(y - center.y, x - center.x);
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus();
        const point = worldPointFromClient(event.clientX, event.clientY);
        setShieldTargetFromPoint(point.x, point.y);

        const shouldStart = state.mode === "menu" || state.mode === "failed" || state.mode === "cleared";
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }

        pointerState.active = true;
        pointerState.pointerId = event.pointerId;
        pointerState.downX = event.clientX;
        pointerState.downY = event.clientY;
        pointerState.downTime = performance.now();
        pointerState.moved = false;
        pointerState.startedRun = shouldStart;
        canvas.setPointerCapture?.(event.pointerId);
      }

      function handlePointerMove(event) {
        if (!pointerState.active || event.pointerId !== pointerState.pointerId) {
          return;
        }
        const point = worldPointFromClient(event.clientX, event.clientY);
        setShieldTargetFromPoint(point.x, point.y);
        const travel = Math.hypot(event.clientX - pointerState.downX, event.clientY - pointerState.downY);
        if (travel > 14) {
          pointerState.moved = true;
        }
      }

      function handlePointerUp(event) {
        if (!pointerState.active || event.pointerId !== pointerState.pointerId) {
          return;
        }

        const point = worldPointFromClient(event.clientX, event.clientY);
        setShieldTargetFromPoint(point.x, point.y);
        const duration = performance.now() - pointerState.downTime;
        const travel = Math.hypot(event.clientX - pointerState.downX, event.clientY - pointerState.downY);
        if (
          state.mode === "running" &&
          !pointerState.startedRun &&
          duration <= 260 &&
          travel <= 16 &&
          !pointerState.moved
        ) {
          attemptCharge();
        }
        pointerState.active = false;
        pointerState.pointerId = null;
        pointerState.startedRun = false;
      }

      function handlePointerCancel(event) {
        if (event.pointerId !== pointerState.pointerId) {
          return;
        }
        pointerState.active = false;
        pointerState.pointerId = null;
        pointerState.startedRun = false;
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen?.().catch(() => {});
          return;
        }
        canvas.requestFullscreen?.().catch(() => {});
      }

      function handleKeyDown(event) {
        if (event.repeat) {
          if (event.code === "ArrowLeft" || event.code === "ArrowRight" || event.code === "KeyA" || event.code === "KeyD") {
            event.preventDefault();
          }
        }

        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.left = true;
          event.preventDefault();
          return;
        }
        if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.right = true;
          event.preventDefault();
          return;
        }
        if (event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            attemptCharge();
          } else {
            startStage();
          }
          return;
        }
        if (event.code === "Enter") {
          event.preventDefault();
          if (state.mode === "running") {
            attemptCharge();
          } else {
            startStage();
          }
          return;
        }
        if (event.code === "KeyF") {
          event.preventDefault();
          toggleFullscreen();
        }
      }

      function handleKeyUp(event) {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.left = false;
        }
        if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.right = false;
        }
      }

        ctx.shadowBlur = glow;
        ctx.beginPath();
        ctx.arc(center.x, center.y, radius, angle - arcHalf, angle + arcHalf);

        ctx.strokeStyle = charge ? "rgba(250, 255, 255, 0.9)" : "rgba(230, 249, 255, 0.62)";

        const left = {

          y: center.y + Math.sin(angle - arcHalf) * radius,
        };
        const right = {
          x: center.x + Math.cos(angle + arcHalf) * radius,

      function drawWave() {
        if (!state.currentWave) {
          return;
        }

        const center = getCenter();
        const wave = state.currentWave;
        const progress = clamp(state.beatClock / state.beatInterval, 0, 1);
        const startRadius = 310;
        const endRadius = getShieldRadius() + 8;
        const radius = lerp(startRadius, endRadius, progress);
        const sway = Math.sin(progress * Math.PI) * wave.drift * 68;
        const drawAngle = wave.angle + sway / 620;
        const point = {
          x: center.x + Math.cos(drawAngle) * radius,
          y: center.y + Math.sin(drawAngle) * radius,
        };
        const tangent = drawAngle + Math.PI / 2;
        const waveColor = SYMBOL_STYLE[wave.symbol].color;
        const tailLength = 92 + Math.sin(progress * Math.PI) * 18;

        ctx.save();
        ctx.strokeStyle = waveColor;
        ctx.lineWidth = 7;
        ctx.lineCap = "round";
        ctx.shadowColor = SYMBOL_STYLE[wave.symbol].glow;
        ctx.shadowBlur = 22;
        ctx.beginPath();
        for (let step = 0; step <= 12; step += 1) {
          const t = step / 12;
          const localAngle = drawAngle + Math.sin(t * Math.PI * 2 + progress * 8) * 0.03 * wave.swell;
          const localRadius = radius + (t - 0.5) * tailLength;
          const px = center.x + Math.cos(localAngle) * localRadius;
          const py = center.y + Math.sin(localAngle) * localRadius;
          if (step === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
        ctx.beginPath();
        ctx.arc(point.x, point.y, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = waveColor;
        ctx.font = "900 15px Trebuchet MS, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(SYMBOL_STYLE[wave.symbol].short, point.x, point.y + 5);

        ctx.strokeStyle = "rgba(255, 255, 255, 0.16)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(center.x + Math.cos(wave.angle) * 148, center.y + Math.sin(wave.angle) * 148);
        ctx.lineTo(center.x + Math.cos(wave.angle) * 292, center.y + Math.sin(wave.angle) * 292);
        ctx.stroke();
        ctx.restore();
      }

      function drawParagraph(text, x, y, maxWidth, lineHeight, color, font) {
        ctx.fillStyle = color;
        ctx.font = font;
        const words = text.split(" ");
        let line = "";
        let cursorY = y;
        for (const word of words) {
          const testLine = line ? `${line} ${word}` : word;
          if (ctx.measureText(testLine).width > maxWidth && line) {
            ctx.fillText(line, x, cursorY);
            line = word;
            cursorY += lineHeight;
          } else {
            line = testLine;
          }
        }
        if (line) {
          ctx.fillText(line, x, cursorY);
          cursorY += lineHeight;
        }
        return cursorY;
      }

      function roundRect(context, x, y, width, height, radius, fill, stroke) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
        if (fill) context.fill();
        if (stroke) context.stroke();
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeAmount = prefersReducedMotion ? state.screenShake * 1.8 : state.screenShake * 5.5;
        const shakeX = Math.sin(state.elapsed * 42) * shakeAmount;
        const shakeY = Math.cos(state.elapsed * 31) * shakeAmount;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawArena();
        drawWave();
        drawShield();
        drawCore();
        drawParticles();
        drawPopups();
        drawTopHud();
        drawBottomHint();
        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndScreen();
        }
        ctx.restore();

        if (state.flashLevel > 0.02) {
          ctx.fillStyle = `rgba(${state.mode === "failed" ? "255, 88, 108" : "123, 240, 255"}, ${state.flashLevel * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        update(delta);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      function describeCurrentWave() {
        if (!state.currentWave) {
          return null;
        }
        return {
          symbol: state.currentWave.symbol,
          angleDeg: Number(((normalizeAngle(state.currentWave.angle) * 180) / Math.PI).toFixed(1)),
          beatProgress: Number(clamp(state.beatClock / state.beatInterval, 0, 1).toFixed(2)),
          beatRemaining: Number((state.beatInterval - state.beatClock).toFixed(2)),
        };
      }

      window.render_game_to_text = function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          note: "origin=center, angle in degrees clockwise from east",
          reflections: state.reflections,
          streak: state.streak,
          offbeatChain: state.offbeatChain,
          shieldAngleDeg: Number(((normalizeAngle(state.shieldAngle) * 180) / Math.PI).toFixed(1)),
          charged: state.chargeTimer > 0,
          currentWave: describeCurrentWave(),
          marks: { ...state.marks },
        });
      };

      window.advanceTime = function advanceTime(ms) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.reflections = TARGET_REFLECTIONS;
          clearStage();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("debug-force-fail");
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerCancel);
      canvas.addEventListener("pointerleave", handlePointerCancel);
      window.addEventListener("keydown", handleKeyDown, { passive: false });
      window.addEventListener("keyup", handleKeyUp);
      window.addEventListener("blur", () => {
        keys.left = false;
        keys.right = false;
        pointerState.active = false;
        pointerState.pointerId = null;
        pointerState.startedRun = false;
      });

      reportReadyToHost();
      render();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
