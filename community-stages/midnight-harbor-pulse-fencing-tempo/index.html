<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>등대지기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Georgia", "Noto Serif KR", serif;
        background: #1a2a40; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(200, 170, 80, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(26, 42, 64, 0.92);
        color: #f0e8d0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #1a2a40; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 170, 80, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">등대지기. 안개 속 배들을 등대 빛으로 안내하세요. 마우스 클릭 또는 화면 터치로 등대 빛을 깜박여 배를 유도합니다. 모바일에서는 화면 터치만으로 플레이할 수 있습니다. 20척의 배를 안전하게 안내하면 클리어. 3척이 좌초하면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="등대지기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "midnight-harbor-pulse-fencing-tempo",
        title: "등대지기",
        description: "안개 속 배들을 등대 빛으로 안내하세요.",
        creator: "jungcollin",
        genre: "Rhythm guidance",
        clearCondition: "20척의 배를 안전하게 안내하면 클리어",
        failCondition: "3척이 좌초하면 실패",
        controls: "터치 또는 클릭으로 등대 빛 깜박이기, 드래그로 빛 방향 조절, 모바일에서는 화면 터치만으로 플레이 가능",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        sky: "#1a2a40",
        sea: "#0f1e30",
        seaLight: "#1e3450",
        fog: "rgba(180, 195, 210, 0.12)",
        lantern: "#e8b840",
        lanternGlow: "rgba(232, 184, 64, 0.4)",
        lanternBright: "#fff0c0",
        white: "#d8dce4",
        rock: "#2a3648",
        rockLight: "#3a4a60",
        shipSafe: "#c8d8e8",
        shipDanger: "#c06040",
        textDim: "rgba(200, 210, 220, 0.5)",
      };

      // --- State ---
      const DURATION = 50;
      const TARGET = 20;
      const MAX_CRASHES = 3;
      const LIGHTHOUSE_X = 140;
      const LIGHTHOUSE_Y = H - 100;
      const HARBOR_X = W - 80;
      const HARBOR_Y = H - 60;
      const ROCKS = [
        { x: 360, y: 380, r: 30 },
        { x: 520, y: 300, r: 25 },
        { x: 680, y: 360, r: 28 },
        { x: 450, y: 200, r: 22 },
        { x: 750, y: 220, r: 24 },
        { x: 300, y: 260, r: 20 },
      ];

      let mode = "menu";
      let elapsed = 0;
      let guided = 0;
      let crashes = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      // Lighthouse beam
      let beamOn = false;
      let beamTimer = 0;
      let beamAngle = -0.6;
      let beamSweepDir = 1;
      const BEAM_DURATION = 1.2;
      let pulseFlash = 0;

      // Ships
      let ships = [];
      let spawnTimer = 0;

      // Fog layers
      let fogLayers = [];

      // Particles
      let particles = [];

      // Wave offset
      let waveTime = 0;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawning ---
      function spawnShip() {
        const side = Math.random() < 0.5 ? "top" : "right";
        let sx, sy, angle;
        if (side === "top") {
          sx = rand(300, W - 100);
          sy = -20;
          angle = Math.atan2(HARBOR_Y - sy, HARBOR_X - sx) + rand(-0.3, 0.3);
        } else {
          sx = W + 20;
          sy = rand(60, H - 160);
          angle = Math.atan2(HARBOR_Y - sy, HARBOR_X - sx) + rand(-0.3, 0.3);
        }
        const speed = lerp(32, 50, progress()) + rand(-5, 5);
        ships.push({
          x: sx, y: sy,
          angle, speed,
          driftAngle: 0,
          guided: false,
          crashed: false,
          arrived: false,
          alpha: 0,
          size: rand(8, 14),
          wobble: rand(0, Math.PI * 2),
        });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2);
          const spd = rand(20, 80);
          particles.push({
            x, y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            life: 1, color, size: rand(2, 5),
          });
        }
      }

      function initFog() {
        fogLayers = [];
        if (reducedMotion) return;
        for (let i = 0; i < 6; i++) {
          fogLayers.push({
            x: rand(0, W), y: rand(80, H - 120),
            w: rand(200, 400), h: rand(40, 80),
            speed: rand(8, 20), alpha: rand(0.03, 0.08),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; guided = 0; crashes = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        beamOn = false; beamTimer = 0; beamAngle = -0.6; beamSweepDir = 1;
        pulseFlash = 0;
        ships = []; particles = [];
        spawnTimer = 1.5;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        waveTime = 0;
        initFog();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        waveTime += dt;

        // Beam
        if (beamOn) {
          beamTimer -= dt;
          beamAngle += beamSweepDir * 0.4 * dt;
          if (beamAngle > 0.3) beamSweepDir = -1;
          if (beamAngle < -1.2) beamSweepDir = 1;
          if (beamTimer <= 0) beamOn = false;
        }
        pulseFlash *= 0.9;

        // Spawn ships
        const interval = lerp(2.5, 1.2, progress());
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnShip();
          if (progress() > 0.6 && Math.random() < 0.3) spawnShip();
          spawnTimer = interval;
        }

        // Update ships
        for (let i = ships.length - 1; i >= 0; i--) {
          const s = ships[i];
          if (s.crashed || s.arrived) continue;

          s.alpha = clamp(s.alpha + dt * 2, 0, 1);
          s.wobble += dt * 2;

          // Check if in beam
          const inBeam = beamOn && isInBeam(s.x, s.y);
          if (inBeam) s.guided = true;

          // Movement: if guided, steer toward harbor; otherwise drift
          const targetAngle = Math.atan2(HARBOR_Y - s.y, HARBOR_X - s.x);
          if (s.guided) {
            const diff = normalizeAngle(targetAngle - s.angle);
            s.angle += diff * 2.5 * dt;
          } else {
            // Drift randomly
            s.driftAngle += rand(-1, 1) * dt;
            s.angle += s.driftAngle * 0.3 * dt;
          }

          s.x += Math.cos(s.angle) * s.speed * dt;
          s.y += Math.sin(s.angle) * s.speed * dt;

          // Check rock collision
          for (const rock of ROCKS) {
            if (dist(s.x, s.y, rock.x, rock.y) < rock.r + s.size) {
              s.crashed = true;
              crashes++;
              shake = 10;
              flashAlpha = 0.3;
              spawnParticles(s.x, s.y, reducedMotion ? 4 : 10, COL.shipDanger);
              break;
            }
          }

          // Check harbor arrival
          if (dist(s.x, s.y, HARBOR_X, HARBOR_Y) < 40) {
            s.arrived = true;
            guided++;
            spawnParticles(s.x, s.y, reducedMotion ? 3 : 8, COL.lantern);
          }

          // Check out of bounds (crashed into shore or drifted away)
          if (s.x < -40 || s.y > H + 20 || s.y < -60 || s.x > W + 60) {
            if (!s.arrived) {
              s.crashed = true;
              crashes++;
              shake = 6;
              flashAlpha = 0.2;
            }
          }
        }

        // Clean up old ships
        ships = ships.filter(s => !(s.crashed && s.alpha < 0.01) &&
          !(s.arrived && dist(s.x, s.y, HARBOR_X, HARBOR_Y) < 30));

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.94; p.vy *= 0.94;
          p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Fog
        for (const f of fogLayers) {
          f.x += f.speed * dt;
          if (f.x > W + 200) f.x = -f.w;
        }

        // Shake/flash decay
        shake *= 0.88;
        if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        // Win/lose
        if (guided >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (crashes >= MAX_CRASHES) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("배 좌초");
        } else if (elapsed >= DURATION && guided < TARGET) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      function normalizeAngle(a) {
        while (a > Math.PI) a -= Math.PI * 2;
        while (a < -Math.PI) a += Math.PI * 2;
        return a;
      }

      function isInBeam(x, y) {
        const dx = x - LIGHTHOUSE_X, dy = y - LIGHTHOUSE_Y;
        const d = Math.hypot(dx, dy);
        if (d > 600 || d < 30) return false;
        const angle = Math.atan2(dy, dx);
        const diff = Math.abs(normalizeAngle(angle - beamAngle));
        return diff < 0.2;
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Sky gradient
        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, "#0c1828");
        skyGrad.addColorStop(0.5, "#1a2a40");
        skyGrad.addColorStop(1, "#0f1e30");
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, H);

        // Stars
        drawStars();

        // Sea
        drawSea();

        // Rocks
        drawRocks();

        // Beam
        if (beamOn) drawBeam();

        // Ships
        drawShips();

        // Lighthouse
        drawLighthouse();

        // Harbor
        drawHarbor();

        // Fog
        drawFog();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        // Flash
        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(192, 96, 64, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawStars() {
        if (reducedMotion) return;
        ctx.fillStyle = COL.white;
        const seed = 42;
        for (let i = 0; i < 40; i++) {
          const px = (i * 137 + seed * 29) % W;
          const py = (i * 211 + seed * 47) % (H * 0.5);
          const twinkle = Math.sin(waveTime * 1.5 + i) * 0.3 + 0.5;
          ctx.globalAlpha = twinkle * 0.6;
          ctx.fillRect(px, py, 1.5, 1.5);
        }
        ctx.globalAlpha = 1;
      }

      function drawSea() {
        // Dark sea base
        ctx.fillStyle = COL.sea;
        ctx.fillRect(0, H * 0.55, W, H * 0.45);

        // Wave lines
        if (!reducedMotion) {
          ctx.strokeStyle = "rgba(30, 52, 80, 0.5)";
          ctx.lineWidth = 1;
          for (let row = 0; row < 5; row++) {
            const baseY = H * 0.58 + row * 28;
            ctx.beginPath();
            for (let x = 0; x < W; x += 4) {
              const y = baseY + Math.sin(x * 0.02 + waveTime * 0.8 + row) * 4;
              x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
        }
      }

      function drawRocks() {
        for (const rock of ROCKS) {
          ctx.beginPath();
          ctx.arc(rock.x, rock.y, rock.r, 0, Math.PI * 2);
          ctx.fillStyle = COL.rock;
          ctx.fill();
          // Highlight
          ctx.beginPath();
          ctx.arc(rock.x - rock.r * 0.25, rock.y - rock.r * 0.25, rock.r * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = COL.rockLight;
          ctx.fill();
        }
      }

      function drawBeam() {
        ctx.save();
        const beamLen = 600;
        const spread = 0.15;

        // Beam cone
        ctx.beginPath();
        ctx.moveTo(LIGHTHOUSE_X, LIGHTHOUSE_Y - 60);
        ctx.lineTo(
          LIGHTHOUSE_X + Math.cos(beamAngle - spread) * beamLen,
          LIGHTHOUSE_Y - 60 + Math.sin(beamAngle - spread) * beamLen
        );
        ctx.lineTo(
          LIGHTHOUSE_X + Math.cos(beamAngle + spread) * beamLen,
          LIGHTHOUSE_Y - 60 + Math.sin(beamAngle + spread) * beamLen
        );
        ctx.closePath();

        const grad = ctx.createRadialGradient(
          LIGHTHOUSE_X, LIGHTHOUSE_Y - 60, 10,
          LIGHTHOUSE_X, LIGHTHOUSE_Y - 60, beamLen
        );
        grad.addColorStop(0, `rgba(232, 184, 64, ${0.3 + pulseFlash * 0.3})`);
        grad.addColorStop(0.5, "rgba(232, 184, 64, 0.08)");
        grad.addColorStop(1, "rgba(232, 184, 64, 0)");
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.restore();
      }

      function drawShips() {
        for (const s of ships) {
          if (s.crashed) continue;
          ctx.save();
          ctx.globalAlpha = s.alpha * (s.arrived ? 0.5 : 1);
          ctx.translate(s.x, s.y);
          ctx.rotate(s.angle);

          // Ship hull
          const col = s.guided ? COL.lanternBright : COL.shipSafe;
          ctx.fillStyle = col;
          ctx.beginPath();
          ctx.moveTo(s.size, 0);
          ctx.lineTo(-s.size * 0.6, -s.size * 0.4);
          ctx.lineTo(-s.size * 0.6, s.size * 0.4);
          ctx.closePath();
          ctx.fill();

          // Small lantern glow if guided
          if (s.guided) {
            ctx.beginPath();
            ctx.arc(0, 0, s.size * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = COL.lanternGlow;
            ctx.fill();
          }

          ctx.restore();
        }
      }

      function drawLighthouse() {
        const lx = LIGHTHOUSE_X, ly = LIGHTHOUSE_Y;

        // Tower body
        ctx.fillStyle = "#c8baa8";
        ctx.beginPath();
        ctx.moveTo(lx - 14, ly);
        ctx.lineTo(lx - 10, ly - 70);
        ctx.lineTo(lx + 10, ly - 70);
        ctx.lineTo(lx + 14, ly);
        ctx.closePath();
        ctx.fill();

        // Stripes
        ctx.fillStyle = "#8a3030";
        ctx.fillRect(lx - 12, ly - 25, 24, 10);
        ctx.fillRect(lx - 11, ly - 55, 22, 10);

        // Lamp room
        ctx.fillStyle = beamOn ? COL.lanternBright : "#6a5a40";
        ctx.fillRect(lx - 12, ly - 76, 24, 12);

        // Cap
        ctx.fillStyle = "#3a3a3a";
        ctx.beginPath();
        ctx.moveTo(lx - 14, ly - 76);
        ctx.lineTo(lx, ly - 90);
        ctx.lineTo(lx + 14, ly - 76);
        ctx.closePath();
        ctx.fill();

        // Glow
        if (beamOn) {
          ctx.beginPath();
          ctx.arc(lx, ly - 70, 20, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(232, 184, 64, ${0.3 + pulseFlash * 0.4})`;
          ctx.fill();
        }

        // Base rocks
        ctx.fillStyle = COL.rock;
        ctx.beginPath();
        ctx.ellipse(lx, ly + 5, 30, 10, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawHarbor() {
        // Simple dock
        ctx.fillStyle = "#4a3a28";
        ctx.fillRect(HARBOR_X - 20, HARBOR_Y - 10, 40, 20);

        // Lantern on dock
        const glow = Math.sin(waveTime * 2) * 0.1 + 0.3;
        ctx.beginPath();
        ctx.arc(HARBOR_X, HARBOR_Y - 16, 5, 0, Math.PI * 2);
        ctx.fillStyle = COL.lantern;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(HARBOR_X, HARBOR_Y - 16, 12, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(232, 184, 64, ${glow})`;
        ctx.fill();
      }

      function drawFog() {
        for (const f of fogLayers) {
          ctx.fillStyle = `rgba(180, 195, 210, ${f.alpha})`;
          ctx.beginPath();
          ctx.ellipse(f.x + f.w / 2, f.y, f.w / 2, f.h / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.white;
        ctx.font = `500 15px Georgia, serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${guided} / ${TARGET}`, 24, 20);

        ctx.textAlign = "right";
        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.fillText(`${Math.ceil(timeLeft)}`, W - 24, 20);

        // Timer bar
        const barW = W - 48, barX = 24, barY = 44;
        ctx.fillStyle = "rgba(200, 210, 220, 0.15)";
        ctx.fillRect(barX, barY, barW, 2);
        ctx.fillStyle = COL.lantern;
        ctx.fillRect(barX, barY, barW * (1 - progress()), 2);

        // Crash indicators
        const dotY = H - 24;
        for (let i = 0; i < MAX_CRASHES; i++) {
          const dotX = CX - (MAX_CRASHES - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_CRASHES - crashes ? COL.lantern : "rgba(200, 210, 220, 0.2)";
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(15, 25, 40, 0.92)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();
        ctx.fillStyle = accent || COL.lantern;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);
        ctx.fillStyle = COL.white;
        ctx.font = `bold 22px Georgia, serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);
        ctx.font = `400 14px Georgia, serif`;
        ctx.fillStyle = "rgba(200, 210, 220, 0.7)";
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }
        ctx.fillStyle = "rgba(200, 210, 220, 0.4)";
        ctx.font = `400 13px Georgia, serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(10, 20, 35, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("등대지기", [
          "안개 속 배들을 등대 빛으로 안내하세요",
          "",
          "조작: 탭하여 등대 빛 깜박이기",
          "클리어: 20척 안전 도착",
          "실패: 3척 좌초",
        ], COL.lantern);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(10, 20, 35, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("항해 완료", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `안전 도착: ${guided}척`,
          ], COL.lantern);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(40, 20, 15, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("좌초", [
          elapsed >= DURATION ? "시간이 다했습니다" : "너무 많은 배가 좌초했습니다",
          `안전 도착: ${guided} / ${TARGET}`,
        ], COL.shipDanger);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      function activateBeam() {
        beamOn = true;
        beamTimer = BEAM_DURATION;
        pulseFlash = 1;
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        activateBeam();
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || !beamOn) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        // Steer beam toward pointer
        beamAngle = Math.atan2(p.y - (LIGHTHOUSE_Y - 60), p.x - LIGHTHOUSE_X);
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (mode !== "running") handleStart();
          else activateBeam();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          guided, crashes, beamOn,
          result: window.relayStageResult.status,
          ships: ships.length,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          guided = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          crashes = MAX_CRASHES;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      initFog();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
