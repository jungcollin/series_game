<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paper Temple: Shadow Stitch</title>
    <style>
      :root {
        color-scheme: dark;
        --ink-deep: #071421;
        --ink-mid: #143148;
        --paper-cream: #f5e7c8;
        --paper-gold: #f7c767;
        --paper-coral: #ff7d63;
        --thread-cyan: #85f1ff;
        --thread-blue: #5fc4ff;
        --danger: #ff6b7f;
        --danger-deep: #7a2337;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 213, 120, 0.18), transparent 34%),
          radial-gradient(circle at 80% 15%, rgba(95, 196, 255, 0.16), transparent 28%),
          linear-gradient(180deg, #08111a 0%, #0d2230 50%, #061018 100%);
        font-family: "Avenir Next", "Gill Sans", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      button,
      canvas {
        -webkit-tap-highlight-color: rgba(133, 241, 255, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 20, 33, 0.94);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(133, 241, 255, 0.92);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        inset: auto 0 12px 0;
        z-index: 16;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 14px;
        padding: 0 14px calc(14px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__cluster {
        display: grid;
        gap: 10px;
        pointer-events: auto;
      }

      .mobile-controls__row {
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 22px;
        min-width: 62px;
        min-height: 62px;
        padding: 0 14px;
        background:
          linear-gradient(180deg, rgba(17, 41, 56, 0.88), rgba(7, 20, 33, 0.94));
        color: #eef9ff;
        font: 800 22px "Avenir Next", "Gill Sans", "Segoe UI", sans-serif;
        box-shadow:
          0 18px 32px rgba(4, 10, 18, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        touch-action: none;
      }

      .mobile-btn--wide {
        min-width: 90px;
        font-size: 18px;
        letter-spacing: 0.06em;
      }

      .mobile-btn[data-active="true"] {
        transform: translateY(1px) scale(0.97);
        background:
          linear-gradient(180deg, rgba(34, 92, 123, 0.96), rgba(13, 44, 65, 0.98));
        border-color: rgba(133, 241, 255, 0.48);
      }

      .mobile-btn--cut[data-active="true"] {
        background:
          linear-gradient(180deg, rgba(128, 36, 60, 0.98), rgba(76, 18, 38, 0.98));
        border-color: rgba(255, 132, 156, 0.58);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 8px;
          gap: 8px;
          padding: 0 10px calc(10px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__cluster {
          gap: 8px;
        }

        .mobile-controls__row {
          gap: 8px;
        }

        .mobile-btn {
          min-width: 54px;
          min-height: 54px;
          border-radius: 18px;
          font-size: 19px;
        }

        .mobile-btn--wide {
          min-width: 78px;
          font-size: 15px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Paper Temple: Shadow Stitch. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현 이며 모바일 버튼과 화면 터치도 함께 지원합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Paper Temple: Shadow Stitch"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 조작">
      <div class="mobile-controls__cluster">
        <div class="mobile-controls__row">
          <button class="mobile-btn" type="button" data-control="up" data-active="false" aria-label="위로 이동">▲</button>
        </div>
        <div class="mobile-controls__row">
          <button class="mobile-btn" type="button" data-control="left" data-active="false" aria-label="왼쪽으로 이동">◀</button>
          <button class="mobile-btn" type="button" data-control="down" data-active="false" aria-label="아래로 이동">▼</button>
          <button class="mobile-btn" type="button" data-control="right" data-active="false" aria-label="오른쪽으로 이동">▶</button>
        </div>
      </div>
      <div class="mobile-controls__cluster">
        <div class="mobile-controls__row">
          <button class="mobile-btn mobile-btn--wide mobile-btn--cut" type="button" data-control="cut" data-active="false" aria-label="실 끊기">CUT</button>
        </div>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "paper-temple-shadow-stitch-witness";
      const STAGE_TITLE = "Paper Temple: Shadow Stitch";
      const STAGE_DESCRIPTION =
        "빛과 그림자 경계선을 꿰매 다리로 바꾸며, 클리어 직전일수록 몰려드는 시선을 피해 4개 제단을 점등하는 종이 사원 액션 퍼즐.";
      const STAGE_CONTROLS =
        "이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const STAGE_CLEAR =
        "목격 게이지를 낮게 유지한 채 봉합 다리로 4개 제단을 모두 점등하면 클리어";
      const STAGE_FAIL =
        "목격 게이지가 끝까지 차거나 강한 빛에 오래 노출돼 실이 타면 실패";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const PLAYER_SPEED = 198;
      const PLAYER_RADIUS = 14;
      const STITCH_RANGE = 78;
      const BRIDGE_LIMIT = 2;
      const WATCH_FAIL_LIMIT = 1;
      const BURN_FAIL_LIMIT = 1;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const input = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      const ISLANDS = [
        { id: "west", x: 98, y: 284, w: 198, h: 102, tone: "#b1936a", trim: "#f0d39c" },
        { id: "north", x: 350, y: 120, w: 236, h: 94, tone: "#c39a68", trim: "#f7ddb1" },
        { id: "east", x: 684, y: 228, w: 170, h: 110, tone: "#ae8459", trim: "#f7d39d" },
        { id: "start", x: 346, y: 378, w: 250, h: 102, tone: "#c3a06d", trim: "#f6ddb4" },
        { id: "southeast", x: 600, y: 404, w: 230, h: 90, tone: "#b8895b", trim: "#f1cf95" },
      ];

      const ALTAR_BLUEPRINTS = [
        { id: "altar-west", islandId: "west", x: 152, y: 332, radius: 19, label: "서쪽" },
        { id: "altar-north", islandId: "north", x: 474, y: 166, radius: 19, label: "상단" },
        { id: "altar-east", islandId: "east", x: 804, y: 286, radius: 19, label: "동쪽" },
        { id: "altar-southeast", islandId: "southeast", x: 744, y: 446, radius: 19, label: "남쪽" },
      ];

      const SHADOW_ZONES = [
        { x: 200, y: 334, rx: 84, ry: 38, depth: 0.72 },
        { x: 476, y: 168, rx: 106, ry: 38, depth: 0.68 },
        { x: 754, y: 284, rx: 82, ry: 34, depth: 0.66 },
        { x: 714, y: 446, rx: 96, ry: 32, depth: 0.68 },
        { x: 432, y: 426, rx: 108, ry: 42, depth: 0.64 },
      ];

      const SCREEN_PANELS = [
        { x: 156, y: 286, w: 36, h: 76, tilt: -0.1 },
        { x: 418, y: 124, w: 48, h: 80, tilt: 0.08 },
        { x: 736, y: 236, w: 38, h: 84, tilt: -0.06 },
        { x: 666, y: 406, w: 34, h: 70, tilt: 0.09 },
        { x: 392, y: 384, w: 42, h: 84, tilt: -0.07 },
      ];

      const SEAM_BLUEPRINTS = [
        {
          id: "start-west",
          a: { x: 346, y: 400 },
          b: { x: 296, y: 350 },
          label: "입구 봉합",
          risk: 0.22,
        },
        {
          id: "west-north",
          a: { x: 250, y: 286 },
          b: { x: 392, y: 214 },
          label: "측면 봉합",
          risk: 0.28,
        },
        {
          id: "start-north",
          a: { x: 470, y: 378 },
          b: { x: 470, y: 214 },
          label: "천공 봉합",
          risk: 0.44,
        },
        {
          id: "north-east",
          a: { x: 586, y: 192 },
          b: { x: 684, y: 252 },
          label: "회랑 봉합",
          risk: 0.36,
        },
        {
          id: "east-southeast",
          a: { x: 744, y: 338 },
          b: { x: 704, y: 404 },
          label: "심지 봉합",
          risk: 0.42,
        },
        {
          id: "start-southeast",
          a: { x: 596, y: 426 },
          b: { x: 600, y: 438 },
          label: "지름길 봉합",
          risk: 0.56,
        },
      ];

      const WATCHERS = [
        { x: 132, y: 56, baseAngle: 1.01, sweep: 0.34, speed: 1.1, spread: 0.33, length: 316, unlock: 0 },
        { x: 480, y: 34, baseAngle: 1.54, sweep: 0.24, speed: 1.45, spread: 0.26, length: 300, unlock: 1 },
        { x: 828, y: 74, baseAngle: 2.25, sweep: 0.3, speed: 1.08, spread: 0.32, length: 320, unlock: 2 },
        { x: 74, y: 438, baseAngle: -0.3, sweep: 0.24, speed: 1.3, spread: 0.28, length: 270, unlock: 3 },
      ];

      const BEAMS = [
        { x: 248, y: 18, baseAngle: 1.08, sweep: 0.12, speed: 0.92, spread: 0.12, length: 530, unlock: 0, width: 0.7 },
        { x: 784, y: 12, baseAngle: 2.23, sweep: 0.13, speed: 1.08, spread: 0.105, length: 512, unlock: 1, width: 0.8 },
        { x: 512, y: 22, baseAngle: 1.58, sweep: 0.11, speed: 1.34, spread: 0.085, length: 480, unlock: 3, width: 1 },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let pointerCanvasRect = canvas.getBoundingClientRect();

      const reducedMotionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
      let reducedMotion = reducedMotionQuery.matches;
      reducedMotionQuery.addEventListener?.("change", (event) => {
        reducedMotion = event.matches;
      });

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        player: createPlayer(),
        altars: createAltars(),
        seams: createSeams(),
        particles: [],
        popups: [],
        flash: 0,
        scenePulse: 0,
        witness: 0.12,
        threadHeat: 0,
        shake: 0,
        lastReason: "",
        pointer: {
          active: false,
          pointerId: null,
          x: VIEW.width * 0.5,
          y: VIEW.height * 0.5,
          stitching: false,
          seamId: null,
          startEndpoint: null,
          moveTouch: false,
          pointerType: "mouse",
        },
        touchMove: {
          active: false,
          pointerId: null,
          x: 0,
          y: 0,
        },
        lastTap: { time: 0, x: 0, y: 0 },
        vignettePulse: 0,
        frame: 0,
        lastExposure: 0,
      };

      function createPlayer() {
        return {
          x: 472,
          y: 426,
          vx: 0,
          vy: 0,
          radius: PLAYER_RADIUS,
          facing: 1,
          step: 0,
          glow: 0,
        };
      }

      function createAltars() {
        return ALTAR_BLUEPRINTS.map((altar) => ({
          ...altar,
          lit: false,
          glow: 0,
          pulse: Math.random() * Math.PI * 2,
        }));
      }

      function createSeams() {
        return SEAM_BLUEPRINTS.map((seam, index) => ({
          ...seam,
          active: false,
          burn: 0,
          age: index,
          sparkleOffset: Math.random() * 200,
        }));
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }

      function angleDifference(a, b) {
        let diff = b - a;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        return diff;
      }

      function pointInRoundedIsland(x, y, island, padding = 0) {
        return (
          x >= island.x - padding &&
          x <= island.x + island.w + padding &&
          y >= island.y - padding &&
          y <= island.y + island.h + padding
        );
      }

      function pointInShadowZone(x, y) {
        for (const zone of SHADOW_ZONES) {
          const nx = (x - zone.x) / zone.rx;
          const ny = (y - zone.y) / zone.ry;
          if (nx * nx + ny * ny <= 1) {
            return zone.depth;
          }
        }
        return 0;
      }

      function distanceToSegment(px, py, ax, ay, bx, by) {
        const dx = bx - ax;
        const dy = by - ay;
        const lengthSquared = dx * dx + dy * dy;
        if (!lengthSquared) {
          return distance(px, py, ax, ay);
        }
        const t = clamp(((px - ax) * dx + (py - ay) * dy) / lengthSquared, 0, 1);
        const cx = ax + dx * t;
        const cy = ay + dy * t;
        return distance(px, py, cx, cy);
      }

      function isPointWalkable(x, y) {
        for (const island of ISLANDS) {
          if (pointInRoundedIsland(x, y, island, -8)) {
            return true;
          }
        }
        for (const seam of state.seams) {
          if (!seam.active) continue;
          if (distanceToSegment(x, y, seam.a.x, seam.a.y, seam.b.x, seam.b.y) <= 18 + PLAYER_RADIUS) {
            return true;
          }
        }
        return false;
      }

      function getLitAltarsCount() {
        return state.altars.filter((altar) => altar.lit).length;
      }

      function getWatcherAngle(watcher, time) {
        const boost = getLitAltarsCount() * 0.08;
        return watcher.baseAngle + Math.sin(time * watcher.speed + watcher.x * 0.01) * (watcher.sweep + boost);
      }

      function getBeamAngle(beam, time) {
        return beam.baseAngle + Math.sin(time * beam.speed + beam.x * 0.012) * beam.sweep;
      }

      function pointInCone(x, y, originX, originY, angle, length, spread, softness = 0.9) {
        const dx = x - originX;
        const dy = y - originY;
        const dist = Math.hypot(dx, dy);
        if (dist > length || dist < 8) {
          return 0;
        }
        const pointAngle = Math.atan2(dy, dx);
        const diff = Math.abs(angleDifference(angle, pointAngle));
        if (diff > spread) {
          return 0;
        }
        const coneFactor = 1 - diff / spread;
        const distanceFactor = 1 - Math.pow(dist / length, 1.2);
        return Math.pow(clamp(coneFactor * distanceFactor, 0, 1), softness);
      }

      function sampleSeamExposure(seam) {
        let maxExposure = 0;
        const litCount = getLitAltarsCount();
        for (const beam of BEAMS) {
          if (litCount < beam.unlock) continue;
          const angle = getBeamAngle(beam, state.elapsed);
          for (let step = 0; step <= 8; step += 1) {
            const t = step / 8;
            const x = lerp(seam.a.x, seam.b.x, t);
            const y = lerp(seam.a.y, seam.b.y, t);
            const exposure = pointInCone(x, y, beam.x, beam.y, angle, beam.length, beam.spread);
            if (exposure > maxExposure) {
              maxExposure = exposure;
            }
          }
        }
        return maxExposure;
      }

      function activeBridgeCount() {
        return state.seams.filter((seam) => seam.active).length;
      }

      function findClosestAnchor(x, y) {
        let best = null;
        for (const seam of state.seams) {
          const points = [
            { seamId: seam.id, endpoint: "a", x: seam.a.x, y: seam.a.y },
            { seamId: seam.id, endpoint: "b", x: seam.b.x, y: seam.b.y },
          ];
          for (const point of points) {
            const d = distance(x, y, point.x, point.y);
            if (d <= 28 && (!best || d < best.distance)) {
              best = { ...point, distance: d };
            }
          }
        }
        return best;
      }

      function playerNearPoint(point) {
        return distance(state.player.x, state.player.y, point.x, point.y) <= STITCH_RANGE;
      }

      function getSeamById(id) {
        return state.seams.find((seam) => seam.id === id) || null;
      }

      function getSeamAnchorPair(seam, endpoint) {
        return endpoint === "a" ? seam.b : seam.a;
      }

      function spawnParticles(x, y, color, count, speed, life, spread = Math.PI * 2) {
        for (let index = 0; index < count; index += 1) {
          const angle = (spread / count) * index + Math.random() * 0.25;
          const velocity = speed * (0.5 + Math.random() * 0.8);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life,
            maxLife: life,
            color,
            size: 2 + Math.random() * 4,
          });
        }
      }

      function pushPopup(text, x, y, color = "#f7e4bb", emphasis = 0) {
        state.popups.push({
          text,
          x,
          y,
          color,
          age: 0,
          life: 0.9 + emphasis * 0.2,
          emphasis,
        });
      }

      function startRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = createPlayer();
        state.altars = createAltars();
        state.seams = createSeams();
        state.particles = [];
        state.popups = [];
        state.flash = 0;
        state.scenePulse = 0;
        state.witness = 0.12;
        state.threadHeat = 0;
        state.shake = 0;
        state.lastReason = "";
        state.pointer.stitching = false;
        state.pointer.seamId = null;
        state.pointer.startEndpoint = null;
        state.touchMove.active = false;
        state.frame = 0;
        state.lastExposure = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 1;
        state.shake = Math.max(state.shake, 16);
        window.relayStageResult.status = "failed";
        spawnParticles(state.player.x, state.player.y, "#ff8ca3", 18, 78, 0.82);
        pushPopup(reason === "burned" ? "THREAD BURNED" : "WITNESS MAX", state.player.x, state.player.y - 18, "#ffd1da", 1);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared" || state.mode === "failed") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 1;
        state.scenePulse = 1;
        window.relayStageResult.status = "cleared";
        spawnParticles(state.player.x, state.player.y, "#85f1ff", 24, 96, 1.05);
        pushPopup("ALL ALTARS LIT", state.player.x, state.player.y - 20, "#d8fbff", 1);
        reportClearedToHost();
      }

      function safeCutTarget() {
        const active = state.seams
          .filter((seam) => seam.active)
          .filter(
            (seam) =>
              distanceToSegment(
                state.player.x,
                state.player.y,
                seam.a.x,
                seam.a.y,
                seam.b.x,
                seam.b.y
              ) > 26
          )
          .sort((a, b) => b.burn - a.burn || a.age - b.age);
        return active[0] || null;
      }

      function cutSeam(seam, reason = "manual") {
        if (!seam || !seam.active) {
          return false;
        }
        seam.active = false;
        seam.burn = 0;
        state.threadHeat = Math.max(
          0,
          ...state.seams.filter((entry) => entry.active).map((entry) => entry.burn)
        );
        spawnParticles((seam.a.x + seam.b.x) * 0.5, (seam.a.y + seam.b.y) * 0.5, "#ff9aae", 14, 54, 0.6);
        pushPopup(reason === "manual" ? "THREAD CUT" : "SAFE CUT", (seam.a.x + seam.b.x) * 0.5, (seam.a.y + seam.b.y) * 0.5 - 14, "#ffd3dc");
        return true;
      }

      function attemptManualCut() {
        if (state.mode !== "running") {
          return false;
        }
        const seam = safeCutTarget();
        if (!seam) {
          pushPopup("발밑 실은 못 끊음", state.player.x, state.player.y - 28, "#ffd6bd");
          return false;
        }
        return cutSeam(seam, "manual");
      }

      function activateSeam(seam) {
        if (seam.active) {
          pushPopup("이미 봉합됨", (seam.a.x + seam.b.x) * 0.5, (seam.a.y + seam.b.y) * 0.5 - 10, "#e7f7ff");
          return false;
        }
        if (activeBridgeCount() >= BRIDGE_LIMIT) {
          pushPopup("실 슬롯 부족", (seam.a.x + seam.b.x) * 0.5, (seam.a.y + seam.b.y) * 0.5 - 10, "#ffd5c0");
          return false;
        }
        seam.active = true;
        seam.burn = 0;
        seam.age = state.frame;
        spawnParticles((seam.a.x + seam.b.x) * 0.5, (seam.a.y + seam.b.y) * 0.5, "#85f1ff", 16, 72, 0.7);
        pushPopup("STITCH", (seam.a.x + seam.b.x) * 0.5, (seam.a.y + seam.b.y) * 0.5 - 14, "#dffcff");
        state.scenePulse = 0.35;
        return true;
      }

      function handleAltarActivation() {
        for (const altar of state.altars) {
          if (altar.lit) continue;
          if (distance(state.player.x, state.player.y, altar.x, altar.y) <= altar.radius + state.player.radius + 4) {
            altar.lit = true;
            altar.glow = 1;
            state.witness = clamp(state.witness + 0.08, 0, 1);
            state.scenePulse = 0.6;
            state.shake = Math.max(state.shake, 8);
            spawnParticles(altar.x, altar.y, "#ffd775", 18, 86, 0.86);
            pushPopup("ALTAR LIT", altar.x, altar.y - 20, "#fff1c2", 1);
          }
        }
        if (getLitAltarsCount() === state.altars.length) {
          clearStage();
        }
      }

      function updatePlayer(dt) {
        const move = { x: 0, y: 0 };
        if (input.left) move.x -= 1;
        if (input.right) move.x += 1;
        if (input.up) move.y -= 1;
        if (input.down) move.y += 1;

        if (state.touchMove.active && !state.pointer.stitching) {
          move.x += clamp((state.touchMove.x - state.player.x) / 54, -1, 1);
          move.y += clamp((state.touchMove.y - state.player.y) / 54, -1, 1);
        }

        const magnitude = Math.hypot(move.x, move.y) || 1;
        const vx = (move.x / magnitude) * PLAYER_SPEED;
        const vy = (move.y / magnitude) * PLAYER_SPEED;
        state.player.vx = vx;
        state.player.vy = vy;

        const nextX = state.player.x + vx * dt;
        const nextY = state.player.y + vy * dt;
        if (isPointWalkable(nextX, state.player.y)) {
          state.player.x = nextX;
        }
        if (isPointWalkable(state.player.x, nextY)) {
          state.player.y = nextY;
        }
        state.player.x = clamp(state.player.x, state.player.radius + 10, VIEW.width - state.player.radius - 10);
        state.player.y = clamp(state.player.y, state.player.radius + 10, VIEW.height - state.player.radius - 10);
        if (Math.abs(vx) > 10) {
          state.player.facing = vx > 0 ? 1 : -1;
        }
        state.player.step += Math.hypot(vx, vy) * dt * 0.03;
        state.player.glow = lerp(state.player.glow, state.pointer.stitching ? 1 : 0.35, 0.08);
      }

      function updateWitness(dt) {
        const litCount = getLitAltarsCount();
        const shadowDepth = pointInShadowZone(state.player.x, state.player.y);
        const playerSpeed = Math.hypot(state.player.vx, state.player.vy);
        let exposure = 0;
        for (const watcher of WATCHERS) {
          if (litCount < watcher.unlock) continue;
          const angle = getWatcherAngle(watcher, state.elapsed);
          exposure += pointInCone(
            state.player.x,
            state.player.y,
            watcher.x,
            watcher.y,
            angle,
            watcher.length,
            watcher.spread
          );
        }
        exposure *= 1 + litCount * 0.22;
        exposure *= 1 - shadowDepth * 0.9;
        if (state.pointer.stitching) {
          exposure += 0.15;
        }
        if (exposure > 0.12) {
          state.witness = clamp(state.witness + exposure * dt * 0.28, 0, 1);
          if (exposure > 0.75 && state.lastExposure <= 0.75) {
            pushPopup("SEEN!", state.player.x, state.player.y - 26, "#ffd6dc");
            state.shake = Math.max(state.shake, 5);
          }
        } else {
          let coolRate = shadowDepth > 0.4 ? 0.22 : 0.11;
          if (playerSpeed < 16) {
            coolRate += 0.1;
          }
          state.witness = clamp(state.witness - coolRate * dt, 0, 1);
        }
        state.lastExposure = exposure;
        if (state.witness >= WATCH_FAIL_LIMIT) {
          failStage("witness");
        }
      }

      function updateSeams(dt) {
        let maxBurn = 0;
        for (const seam of state.seams) {
          if (!seam.active) {
            seam.burn = Math.max(0, seam.burn - dt * 0.3);
            continue;
          }
          const exposure = sampleSeamExposure(seam);
          if (exposure > 0.08) {
            seam.burn = clamp(seam.burn + dt * (0.22 + exposure * 0.48 + seam.risk * 0.18), 0, 1);
            if (seam.burn > 0.4 && seam.burn - dt < 0.4) {
              pushPopup("실 과열", (seam.a.x + seam.b.x) * 0.5, (seam.a.y + seam.b.y) * 0.5 - 16, "#ffc6cc");
            }
          } else {
            seam.burn = clamp(seam.burn - dt * 0.12, 0, 1);
          }
          maxBurn = Math.max(maxBurn, seam.burn);
          if (seam.burn >= BURN_FAIL_LIMIT) {
            failStage("burned");
          }
        }
        state.threadHeat = maxBurn;
      }

      function updateFx(dt) {
        state.flash = Math.max(0, state.flash - dt * 1.2);
        state.scenePulse = Math.max(0, state.scenePulse - dt * 0.8);
        state.vignettePulse = lerp(state.vignettePulse, state.witness * 0.85 + state.threadHeat * 0.55, 0.08);
        state.shake = Math.max(0, state.shake - dt * 18);

        for (const altar of state.altars) {
          altar.pulse += dt * (altar.lit ? 4 : 2);
          altar.glow = Math.max(altar.lit ? 0.5 : 0, altar.glow - dt * 0.75);
        }

        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.985;
          particle.vy = particle.vy * 0.985 + 12 * dt;
          return particle.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.age += dt;
          popup.y -= dt * (18 + popup.emphasis * 4);
          return popup.age < popup.life;
        });
      }

      function update(dt) {
        state.frame += 1;
        if (state.mode === "running") {
          state.elapsed += dt;
          updatePlayer(dt);
          updateWitness(dt);
          updateSeams(dt);
          handleAltarActivation();
        }
        updateFx(dt);
      }

      function drawRoundedRect(x, y, w, h, r) {
        const radius = Math.min(r, w * 0.5, h * 0.5);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#06111a");
        gradient.addColorStop(0.55, "#0d2735");
        gradient.addColorStop(1, "#07121a");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const halo = ctx.createRadialGradient(480, 110, 40, 480, 110, 410);
        halo.addColorStop(0, "rgba(255, 213, 117, 0.22)");
        halo.addColorStop(0.45, "rgba(255, 170, 101, 0.08)");
        halo.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (const beam of BEAMS) {
          if (getLitAltarsCount() < beam.unlock) continue;
          const angle = getBeamAngle(beam, state.elapsed);
          const tipX = beam.x + Math.cos(angle) * beam.length;
          const tipY = beam.y + Math.sin(angle) * beam.length;
          const beamGradient = ctx.createLinearGradient(beam.x, beam.y, tipX, tipY);
          beamGradient.addColorStop(0, "rgba(255, 236, 180, 0.28)");
          beamGradient.addColorStop(0.45, "rgba(255, 206, 129, 0.16)");
          beamGradient.addColorStop(1, "rgba(255, 179, 108, 0)");
          ctx.save();
          ctx.translate(beam.x, beam.y);
          ctx.rotate(angle);
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(beam.spread) * beam.length, Math.sin(beam.spread) * beam.length);
          ctx.arc(0, 0, beam.length, beam.spread, -beam.spread, true);
          ctx.closePath();
          ctx.fillStyle = beamGradient;
          ctx.fill();
          ctx.restore();
        }

        for (let index = 0; index < 42; index += 1) {
          const x = (index * 137.3) % VIEW.width;
          const y = (index * 83.1 + state.elapsed * (6 + (index % 5))) % VIEW.height;
          const alpha = reducedMotion ? 0.06 : 0.04 + (index % 4) * 0.015;
          ctx.fillStyle = `rgba(255, 244, 218, ${alpha})`;
          ctx.fillRect(x, y, 2, 2);
        }
      }

      function drawTemple() {
        ctx.save();
        ctx.translate(0, 6);
        for (const zone of SHADOW_ZONES) {
          const shadow = ctx.createRadialGradient(zone.x, zone.y, zone.rx * 0.15, zone.x, zone.y, zone.rx);
          shadow.addColorStop(0, "rgba(7, 20, 33, 0.48)");
          shadow.addColorStop(1, "rgba(7, 20, 33, 0)");
          ctx.fillStyle = shadow;
          ctx.beginPath();
          ctx.ellipse(zone.x, zone.y, zone.rx, zone.ry, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();

        for (const island of ISLANDS) {
          ctx.save();
          ctx.shadowColor = "rgba(0, 0, 0, 0.26)";
          ctx.shadowBlur = 24;
          ctx.shadowOffsetY = 14;
          drawRoundedRect(island.x, island.y, island.w, island.h, 26);
          const fill = ctx.createLinearGradient(island.x, island.y, island.x + island.w, island.y + island.h);
          fill.addColorStop(0, island.trim);
          fill.addColorStop(0.55, island.tone);
          fill.addColorStop(1, "#7e6245");
          ctx.fillStyle = fill;
          ctx.fill();
          ctx.restore();

          ctx.save();
          drawRoundedRect(island.x + 6, island.y + 6, island.w - 12, island.h - 12, 20);
          ctx.strokeStyle = "rgba(255, 249, 234, 0.22)";
          ctx.lineWidth = 1.25;
          ctx.stroke();
          ctx.restore();

          for (let stripe = 0; stripe < island.w; stripe += 26) {
            ctx.strokeStyle = "rgba(98, 60, 33, 0.08)";
            ctx.beginPath();
            ctx.moveTo(island.x + stripe, island.y + 8);
            ctx.lineTo(island.x + stripe + 12, island.y + island.h - 8);
            ctx.stroke();
          }
        }

        for (const panel of SCREEN_PANELS) {
          ctx.save();
          ctx.translate(panel.x + panel.w * 0.5, panel.y + panel.h * 0.5);
          ctx.rotate(panel.tilt);
          drawRoundedRect(-panel.w * 0.5, -panel.h * 0.5, panel.w, panel.h, 10);
          const fill = ctx.createLinearGradient(0, -panel.h * 0.5, 0, panel.h * 0.5);
          fill.addColorStop(0, "rgba(249, 229, 188, 0.95)");
          fill.addColorStop(1, "rgba(186, 145, 93, 0.96)");
          ctx.fillStyle = fill;
          ctx.fill();
          ctx.strokeStyle = "rgba(96, 58, 33, 0.24)";
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.restore();
        }
      }

      function drawWatchers() {
        const litCount = getLitAltarsCount();
        for (const watcher of WATCHERS) {
          if (litCount < watcher.unlock) continue;
          const angle = getWatcherAngle(watcher, state.elapsed);
          ctx.save();
          ctx.translate(watcher.x, watcher.y);
          ctx.rotate(angle);
          const coneGradient = ctx.createLinearGradient(0, 0, watcher.length, 0);
          coneGradient.addColorStop(0, "rgba(255, 188, 138, 0.3)");
          coneGradient.addColorStop(0.45, "rgba(255, 137, 110, 0.12)");
          coneGradient.addColorStop(1, "rgba(255, 120, 120, 0)");
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(watcher.length, Math.tan(watcher.spread) * watcher.length);
          ctx.lineTo(watcher.length, -Math.tan(watcher.spread) * watcher.length);
          ctx.closePath();
          ctx.fillStyle = coneGradient;
          ctx.fill();

          ctx.fillStyle = "#ffe8cc";
          ctx.beginPath();
          ctx.ellipse(0, 0, 18, 11, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#0c1623";
          ctx.beginPath();
          ctx.ellipse(4, 0, 7, 7, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#ffb077";
          ctx.beginPath();
          ctx.arc(-7, 0, 3.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawSeams() {
        for (const seam of state.seams) {
          const midX = (seam.a.x + seam.b.x) * 0.5;
          const midY = (seam.a.y + seam.b.y) * 0.5;
          const previewAlpha = seam.active ? 0.08 : 0.22;
          ctx.save();
          ctx.strokeStyle = `rgba(133, 241, 255, ${previewAlpha})`;
          ctx.lineWidth = seam.active ? 8 : 4;
          ctx.setLineDash(seam.active ? [] : [7, 8]);
          ctx.beginPath();
          ctx.moveTo(seam.a.x, seam.a.y);
          ctx.lineTo(seam.b.x, seam.b.y);
          ctx.stroke();
          ctx.restore();

          if (seam.active) {
            ctx.save();
            ctx.strokeStyle = "rgba(7, 20, 33, 0.72)";
            ctx.lineWidth = 24;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(seam.a.x, seam.a.y);
            ctx.lineTo(seam.b.x, seam.b.y);
            ctx.stroke();
            ctx.restore();

            ctx.save();
            const threadGradient = ctx.createLinearGradient(seam.a.x, seam.a.y, seam.b.x, seam.b.y);
            threadGradient.addColorStop(0, "#7bf4ff");
            threadGradient.addColorStop(0.5, seam.burn > 0.35 ? "#ffd06a" : "#5fc4ff");
            threadGradient.addColorStop(1, seam.burn > 0.55 ? "#ff8b7d" : "#9deaff");
            ctx.strokeStyle = threadGradient;
            ctx.lineWidth = 10;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(seam.a.x, seam.a.y);
            ctx.lineTo(seam.b.x, seam.b.y);
            ctx.stroke();

            ctx.strokeStyle = `rgba(255, 248, 232, ${0.4 + seam.burn * 0.35})`;
            ctx.lineWidth = 2.4;
            ctx.setLineDash([4, 12]);
            ctx.lineDashOffset = -(state.elapsed * 120 + seam.sparkleOffset);
            ctx.beginPath();
            ctx.moveTo(seam.a.x, seam.a.y);
            ctx.lineTo(seam.b.x, seam.b.y);
            ctx.stroke();
            ctx.restore();

            if (seam.burn > 0.08) {
              ctx.save();
              ctx.strokeStyle = `rgba(255, 126, 114, ${0.18 + seam.burn * 0.4})`;
              ctx.lineWidth = 18;
              ctx.shadowColor = "rgba(255, 126, 114, 0.4)";
              ctx.shadowBlur = 20;
              ctx.beginPath();
              ctx.moveTo(seam.a.x, seam.a.y);
              ctx.lineTo(seam.b.x, seam.b.y);
              ctx.stroke();
              ctx.restore();
            }
          }

          for (const anchor of [seam.a, seam.b]) {
            const near = playerNearPoint(anchor);
            ctx.save();
            ctx.fillStyle = near ? "#fdf2c6" : "rgba(249, 236, 202, 0.7)";
            ctx.shadowColor = near ? "rgba(255, 222, 142, 0.65)" : "rgba(133, 241, 255, 0.3)";
            ctx.shadowBlur = near ? 16 : 10;
            ctx.beginPath();
            ctx.arc(anchor.x, anchor.y, near ? 7 : 5.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          if (!seam.active) {
            ctx.fillStyle = "rgba(255, 244, 219, 0.52)";
            ctx.font = "600 11px 'Avenir Next', 'Gill Sans', sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(seam.label, midX, midY - 12);
          }
        }

        if (state.pointer.stitching) {
          const seam = getSeamById(state.pointer.seamId);
          if (seam) {
            const anchor = playerNearPoint(seam.a) ? seam.a : seam.b;
            ctx.save();
            ctx.strokeStyle = "rgba(133, 241, 255, 0.9)";
            ctx.lineWidth = 6;
            ctx.setLineDash([10, 8]);
            ctx.lineDashOffset = -state.elapsed * 140;
            ctx.beginPath();
            ctx.moveTo(anchor.x, anchor.y);
            ctx.lineTo(state.pointer.x, state.pointer.y);
            ctx.stroke();
            ctx.restore();
          }
        }
      }

      function drawAltars() {
        for (const altar of state.altars) {
          const litPulse = altar.lit ? 0.55 + Math.sin(altar.pulse) * 0.18 : 0;
          ctx.save();
          ctx.translate(altar.x, altar.y);
          ctx.rotate(Math.sin(altar.pulse * 0.5) * 0.04);

          const ring = ctx.createRadialGradient(0, 0, 2, 0, 0, 30);
          ring.addColorStop(0, altar.lit ? "rgba(255, 244, 184, 0.92)" : "rgba(255, 227, 180, 0.48)");
          ring.addColorStop(0.6, altar.lit ? "rgba(255, 193, 92, 0.38)" : "rgba(247, 199, 103, 0.18)");
          ring.addColorStop(1, "rgba(247, 199, 103, 0)");
          ctx.fillStyle = ring;
          ctx.beginPath();
          ctx.arc(0, 0, 30 + litPulse * 6, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = altar.lit ? "#fff1b2" : "#e1b766";
          ctx.beginPath();
          ctx.arc(0, 0, altar.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = altar.lit ? "#fff8dc" : "rgba(255, 244, 214, 0.62)";
          ctx.lineWidth = 3;
          ctx.stroke();

          ctx.fillStyle = altar.lit ? "#ffcf66" : "#795328";
          ctx.beginPath();
          ctx.arc(0, 0, altar.radius * 0.45, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawPlayer() {
        const bob = Math.sin(state.player.step * 0.8) * 1.8;
        const hidden = pointInShadowZone(state.player.x, state.player.y) > 0.4;

        ctx.save();
        ctx.translate(state.player.x, state.player.y + bob);
        ctx.scale(state.player.facing, 1);

        ctx.shadowColor = hidden ? "rgba(95, 196, 255, 0.26)" : "rgba(255, 222, 136, 0.22)";
        ctx.shadowBlur = 18 + state.player.glow * 14;

        ctx.fillStyle = hidden ? "#86d7ff" : "#fbe2b1";
        ctx.beginPath();
        ctx.arc(0, -12, 12, 0, Math.PI * 2);
        ctx.fill();

        const body = ctx.createLinearGradient(0, -8, 0, 22);
        body.addColorStop(0, hidden ? "#6ac7ff" : "#f2a56b");
        body.addColorStop(1, hidden ? "#2c8bd1" : "#b14e36");
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.moveTo(-12, -2);
        ctx.quadraticCurveTo(-10, 18, 0, 22);
        ctx.quadraticCurveTo(10, 18, 12, -2);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(7, 20, 33, 0.52)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-6, 10);
        ctx.lineTo(-9, 22);
        ctx.moveTo(6, 10);
        ctx.lineTo(9, 22);
        ctx.moveTo(-8, 2);
        ctx.lineTo(-14, 12);
        ctx.moveTo(8, 2);
        ctx.lineTo(14, 12);
        ctx.stroke();

        ctx.fillStyle = "#09131f";
        ctx.beginPath();
        ctx.arc(-4, -14, 1.6, 0, Math.PI * 2);
        ctx.arc(4, -14, 1.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticlesAndPopups() {
        for (const particle of state.particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.fillStyle = particle.color.replace(")", `, ${alpha})`).replace("rgb", "rgba");
          if (!particle.color.startsWith("rgb")) {
            ctx.fillStyle = particle.color;
            ctx.globalAlpha = alpha;
          }
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        for (const popup of state.popups) {
          const alpha = 1 - popup.age / popup.life;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = `${popup.emphasis ? 800 : 700} ${popup.emphasis ? 18 : 15}px "Avenir Next", "Gill Sans", sans-serif`;
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        }
      }

      function drawHud() {
        const litCount = getLitAltarsCount();
        const hudGradient = ctx.createLinearGradient(0, 0, 0, 92);
        hudGradient.addColorStop(0, "rgba(6, 15, 24, 0.88)");
        hudGradient.addColorStop(1, "rgba(6, 15, 24, 0.22)");
        ctx.fillStyle = hudGradient;
        ctx.fillRect(0, 0, VIEW.width, 92);

        ctx.fillStyle = "#f5e7c8";
        ctx.font = "800 24px 'Georgia', 'Times New Roman', serif";
        ctx.textAlign = "left";
        ctx.fillText(STAGE_TITLE, 28, 34);
        ctx.font = "600 13px 'Avenir Next', 'Gill Sans', sans-serif";
        ctx.fillStyle = "rgba(239, 248, 255, 0.82)";
        ctx.fillText("그림자 경계선을 봉합해 제단 4개를 밝히고, 시선을 피해라", 28, 52);

        drawMeter(28, 72, 220, 12, state.witness, "#ff7d8d", "WITNESS");
        drawMeter(264, 72, 184, 12, state.threadHeat, "#ffb55d", "THREAD");

        ctx.textAlign = "right";
        ctx.fillStyle = "#ebf7ff";
        ctx.font = "700 13px 'Avenir Next', 'Gill Sans', sans-serif";
        ctx.fillText(`제단 ${litCount}/4`, VIEW.width - 28, 30);
        ctx.fillText(`활성 봉합 ${activeBridgeCount()}/${BRIDGE_LIMIT}`, VIEW.width - 28, 50);
        ctx.fillText(`시간 ${state.mode === "menu" ? "00.0" : state.elapsed.toFixed(1)}s`, VIEW.width - 28, 70);
      }

      function drawMeter(x, y, width, height, value, color, label) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
        drawRoundedRect(x, y, width, height, height * 0.5);
        ctx.fill();
        drawRoundedRect(x + 2, y + 2, (width - 4) * clamp(value, 0, 1), height - 4, (height - 4) * 0.5);
        const fill = ctx.createLinearGradient(x, y, x + width, y);
        fill.addColorStop(0, color);
        fill.addColorStop(1, "#fff0d0");
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.fillStyle = "rgba(246, 236, 214, 0.72)";
        ctx.font = "700 11px 'Avenir Next', 'Gill Sans', sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(label, x, y - 6);
      }

      function drawOverlayCard(lines, accent, footer) {
        const cardW = 420;
        const cardH = 250;
        const x = (VIEW.width - cardW) * 0.5;
        const y = (VIEW.height - cardH) * 0.5;

        ctx.save();
        ctx.fillStyle = "rgba(3, 10, 17, 0.68)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.shadowColor = "rgba(0, 0, 0, 0.34)";
        ctx.shadowBlur = 30;
        drawRoundedRect(x, y, cardW, cardH, 26);
        const bg = ctx.createLinearGradient(x, y, x + cardW, y + cardH);
        bg.addColorStop(0, "rgba(10, 24, 36, 0.96)");
        bg.addColorStop(1, "rgba(10, 18, 31, 0.96)");
        ctx.fillStyle = bg;
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        drawRoundedRect(x + 8, y + 8, cardW - 16, cardH - 16, 20);
        ctx.stroke();
        ctx.restore();

        ctx.textAlign = "center";
        ctx.fillStyle = "#f5e7c8";
        ctx.font = "800 34px 'Georgia', 'Times New Roman', serif";
        ctx.fillText(lines[0], VIEW.width * 0.5, y + 62);
        ctx.fillStyle = "rgba(235, 247, 255, 0.92)";
        ctx.font = "600 15px 'Avenir Next', 'Gill Sans', sans-serif";
        ctx.fillText(lines[1], VIEW.width * 0.5, y + 102);

        let lineY = y + 138;
        for (let index = 2; index < lines.length; index += 1) {
          ctx.fillStyle = index === 2 ? "#fff5d4" : "rgba(227, 240, 247, 0.84)";
          ctx.fillText(lines[index], VIEW.width * 0.5, lineY);
          lineY += 24;
        }

        ctx.fillStyle = accent;
        ctx.font = "700 13px 'Avenir Next', 'Gill Sans', sans-serif";
        ctx.fillText(footer, VIEW.width * 0.5, y + cardH - 26);
      }

      function drawWrappedText(text, x, y, maxWidth, lineHeight, color, font, align = "center") {
        ctx.save();
        ctx.fillStyle = color;
        ctx.font = font;
        ctx.textAlign = align;
        const words = String(text).split(/\s+/);
        const lines = [];
        let current = "";
        for (const word of words) {
          const attempt = current ? `${current} ${word}` : word;
          if (ctx.measureText(attempt).width > maxWidth && current) {
            lines.push(current);
            current = word;
          } else {
            current = attempt;
          }
        }
        if (current) {
          lines.push(current);
        }
        const drawX = align === "left" ? x : x;
        lines.forEach((line, index) => {
          ctx.fillText(line, drawX, y + index * lineHeight);
        });
        ctx.restore();
        return lines.length;
      }

      function drawMenu() {
        const cardW = 560;
        const cardH = 328;
        const x = (VIEW.width - cardW) * 0.5;
        const y = (VIEW.height - cardH) * 0.5;

        ctx.save();
        ctx.fillStyle = "rgba(3, 10, 17, 0.7)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.shadowColor = "rgba(0, 0, 0, 0.36)";
        ctx.shadowBlur = 32;
        drawRoundedRect(x, y, cardW, cardH, 28);
        const bg = ctx.createLinearGradient(x, y, x + cardW, y + cardH);
        bg.addColorStop(0, "rgba(10, 24, 36, 0.97)");
        bg.addColorStop(1, "rgba(8, 17, 31, 0.97)");
        ctx.fillStyle = bg;
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = "#85f1ff";
        ctx.lineWidth = 2;
        drawRoundedRect(x + 8, y + 8, cardW - 16, cardH - 16, 22);
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = "#f5e7c8";
        ctx.font = "800 34px 'Georgia', 'Times New Roman', serif";
        ctx.fillText(STAGE_TITLE, VIEW.width * 0.5, y + 54);

        let cursorY = y + 82;
        cursorY += drawWrappedText(
          STAGE_DESCRIPTION,
          VIEW.width * 0.5,
          cursorY,
          430,
          20,
          "rgba(235, 247, 255, 0.92)",
          "600 15px 'Avenir Next', 'Gill Sans', sans-serif"
        ) * 20;
        cursorY += 16;
        cursorY += drawWrappedText(
          "빛줄기를 피해 앵커를 드래그해 봉합 다리를 여세요.",
          VIEW.width * 0.5,
          cursorY,
          430,
          19,
          "#fff4d0",
          "700 15px 'Avenir Next', 'Gill Sans', sans-serif"
        ) * 19;
        cursorY += 16;
        cursorY += drawWrappedText(
          STAGE_CONTROLS,
          VIEW.width * 0.5,
          cursorY,
          470,
          18,
          "rgba(227, 240, 247, 0.86)",
          "600 13px 'Avenir Next', 'Gill Sans', sans-serif"
        ) * 18;
        cursorY += 12;
        cursorY += drawWrappedText(
          STAGE_CLEAR,
          VIEW.width * 0.5,
          cursorY,
          470,
          17,
          "#dffcff",
          "700 12px 'Avenir Next', 'Gill Sans', sans-serif"
        ) * 17;
        cursorY += 8;
        drawWrappedText(
          STAGE_FAIL,
          VIEW.width * 0.5,
          cursorY,
          470,
          17,
          "#ffd6cf",
          "700 12px 'Avenir Next', 'Gill Sans', sans-serif"
        );

        ctx.fillStyle = "#85f1ff";
        ctx.font = "700 13px 'Avenir Next', 'Gill Sans', sans-serif";
        ctx.fillText("Tap / Enter to begin", VIEW.width * 0.5, y + cardH - 24);
      }

      function drawEndOverlay() {
        if (state.mode === "failed") {
          const reasonText =
            state.lastReason === "burned"
              ? "강한 빛이 봉합 실을 태웠습니다."
              : "사원의 시선이 당신을 완전히 붙잡았습니다.";
          drawOverlayCard(
            ["STITCH LOST", reasonText, "엄폐 그림자에서 게이지를 식히고,", "남는 봉합부터 잘라 강한 빛 노출을 줄이세요."],
            "#ff8ba0",
            "Tap / Enter to retry"
          );
        }
        if (state.mode === "cleared") {
          drawOverlayCard(
            ["TEMPLE SEALED", "네 개의 제단이 모두 살아났습니다.", "시선 압박을 버틴 채 그림자 다리를 이어", `클리어 시간 ${state.lastRunTime.toFixed(1)}초`],
            "#85f1ff",
            "Tap / Enter to run again"
          );
        }
      }

      function draw() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = state.shake > 0 && !reducedMotion ? Math.sin(state.elapsed * 38) * state.shake * 0.2 : 0;
        const shakeY = state.shake > 0 && !reducedMotion ? Math.cos(state.elapsed * 32) * state.shake * 0.2 : 0;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackground();
        drawWatchers();
        drawTemple();
        drawSeams();
        drawAltars();
        drawPlayer();
        drawParticlesAndPopups();
        drawHud();

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndOverlay();
        }

        ctx.restore();

        if (state.flash > 0) {
          ctx.fillStyle =
            state.mode === "cleared"
              ? `rgba(133, 241, 255, ${state.flash * 0.14})`
              : `rgba(255, 124, 140, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        const vignette = ctx.createRadialGradient(480, 270, 120, 480, 270, 540);
        vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
        vignette.addColorStop(1, `rgba(6, 10, 16, ${0.38 + state.vignettePulse * 0.22})`);
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
      }

      function advanceTime(ms) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        draw();
      }

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = clamp((timestamp - lastTimestamp) / 1000, 0, MAX_DT);
        lastTimestamp = timestamp;
        update(dt);
        draw();
        animationFrame = window.requestAnimationFrame(loop);
      }

      function pointerToCanvas(event) {
        pointerCanvasRect = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - pointerCanvasRect.left) / pointerCanvasRect.width) * VIEW.width,
          y: ((event.clientY - pointerCanvasRect.top) / pointerCanvasRect.height) * VIEW.height,
        };
      }

      function startFromOverlay() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startRun();
          return true;
        }
        return false;
      }

      function maybeRegisterDoubleTap(point) {
        const now = performance.now();
        const isDoubleTap =
          now - state.lastTap.time < 280 &&
          distance(point.x, point.y, state.lastTap.x, state.lastTap.y) < 48;
        state.lastTap = { time: now, x: point.x, y: point.y };
        if (isDoubleTap) {
          attemptManualCut();
          return true;
        }
        return false;
      }

      function handleCanvasPointerDown(event) {
        event.preventDefault();
        canvas.focus({ preventScroll: true });
        const point = pointerToCanvas(event);
        state.pointer.active = true;
        state.pointer.pointerId = event.pointerId;
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        state.pointer.pointerType = event.pointerType || "mouse";

        if (startFromOverlay()) {
          return;
        }

        if (state.mode !== "running") {
          return;
        }

        maybeRegisterDoubleTap(point);

        const anchor = findClosestAnchor(point.x, point.y);
        if (anchor && playerNearPoint(anchor)) {
          state.pointer.stitching = true;
          state.pointer.seamId = anchor.seamId;
          state.pointer.startEndpoint = anchor.endpoint;
          return;
        }

        if (event.pointerType !== "mouse") {
          state.touchMove.active = true;
          state.touchMove.pointerId = event.pointerId;
          state.touchMove.x = point.x;
          state.touchMove.y = point.y;
        }
      }

      function handleCanvasPointerMove(event) {
        if (!state.pointer.active || state.pointer.pointerId !== event.pointerId) {
          return;
        }
        const point = pointerToCanvas(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        if (state.touchMove.active && state.touchMove.pointerId === event.pointerId) {
          state.touchMove.x = point.x;
          state.touchMove.y = point.y;
        }
      }

      function finishPointer(event) {
        if (state.pointer.pointerId !== event.pointerId) {
          return;
        }
        const point = pointerToCanvas(event);
        state.pointer.x = point.x;
        state.pointer.y = point.y;
        if (state.pointer.stitching) {
          const seam = getSeamById(state.pointer.seamId);
          if (seam) {
            const target = findClosestAnchor(point.x, point.y);
            if (target && target.seamId === seam.id && target.endpoint !== state.pointer.startEndpoint) {
              activateSeam(seam);
            } else {
              pushPopup("짝 앵커에 꽂기", point.x, point.y - 12, "#dcefff");
            }
          }
        }
        if (state.touchMove.pointerId === event.pointerId) {
          state.touchMove.active = false;
          state.touchMove.pointerId = null;
        }
        state.pointer.active = false;
        state.pointer.pointerId = null;
        state.pointer.stitching = false;
        state.pointer.seamId = null;
        state.pointer.startEndpoint = null;
      }

      function handleTouchStart(event) {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startFromOverlay();
        }
      }

      function bindMobileButton(button, control) {
        if (!button) return;
        const press = (event) => {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startFromOverlay();
          }
          if (control === "cut") {
            button.dataset.active = "true";
            attemptManualCut();
            window.setTimeout(() => {
              button.dataset.active = "false";
            }, 110);
            return;
          }
          input[control] = true;
          button.dataset.active = "true";
        };
        const release = (event) => {
          event.preventDefault();
          if (control !== "cut") {
            input[control] = false;
          }
          button.dataset.active = "false";
        };
        button.addEventListener("pointerdown", press);
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("pointerleave", release);
      }

      function resetMovementInput() {
        input.left = false;
        input.right = false;
        input.up = false;
        input.down = false;
      }

      function handleKeyChange(event, isDown) {
        const key = event.key.toLowerCase();
        if (key === "enter" || key === " ") {
          if (isDown) {
            startFromOverlay();
          }
          event.preventDefault();
          return;
        }
        if (key === "x" && isDown) {
          attemptManualCut();
          event.preventDefault();
          return;
        }
        if (key === "f" && isDown) {
          toggleFullscreen();
          event.preventDefault();
          return;
        }
        if (key === "arrowleft" || key === "a") input.left = isDown;
        if (key === "arrowright" || key === "d") input.right = isDown;
        if (key === "arrowup" || key === "w") input.up = isDown;
        if (key === "arrowdown" || key === "s") input.down = isDown;
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.().catch(() => {});
        } else {
          document.exitFullscreen?.().catch(() => {});
        }
      }

      function renderGameToText() {
        const shadowDepth = pointInShadowZone(state.player.x, state.player.y);
        return JSON.stringify({
          mode: state.mode,
          note: "origin top-left, x right, y down",
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
            hidden: shadowDepth > 0.4,
            moving: Number(Math.hypot(state.player.vx, state.player.vy).toFixed(1)),
          },
          altars: state.altars.map((altar) => ({ id: altar.id, lit: altar.lit })),
          witness: Number(state.witness.toFixed(3)),
          threadHeat: Number(state.threadHeat.toFixed(3)),
          activeBridges: state.seams.filter((seam) => seam.active).map((seam) => seam.id),
          litCount: getLitAltarsCount(),
          clearCondition: STAGE_CLEAR,
          failCondition: STAGE_FAIL,
        });
      }

      function forceClear() {
        for (const altar of state.altars) {
          altar.lit = true;
          altar.glow = 1;
        }
        clearStage();
        draw();
      }

      function forceFail() {
        failStage("witness");
        draw();
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceTime;
      window.relayStageMeta = {
        id: STAGE_ID,
        title: STAGE_TITLE,
        creator: "jungcollin",
        genre: "Light-shadow action / 목격 게이지",
        clearCondition: STAGE_CLEAR,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear,
        forceFail,
      };

      canvas.addEventListener("pointerdown", handleCanvasPointerDown);
      canvas.addEventListener("pointermove", handleCanvasPointerMove);
      canvas.addEventListener("pointerup", finishPointer);
      canvas.addEventListener("pointercancel", finishPointer);
      canvas.addEventListener("touchstart", handleTouchStart, { passive: true });
      canvas.addEventListener("dblclick", (event) => {
        event.preventDefault();
        attemptManualCut();
      });

      document.addEventListener("keydown", (event) => handleKeyChange(event, true));
      document.addEventListener("keyup", (event) => handleKeyChange(event, false));
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          resetMovementInput();
          state.touchMove.active = false;
        }
      });
      window.addEventListener("resize", () => {
        pointerCanvasRect = canvas.getBoundingClientRect();
      });

      document.querySelectorAll(".mobile-btn").forEach((button) => {
        bindMobileButton(button, button.dataset.control);
      });

      reportReadyToHost();
      draw();
      animationFrame = window.requestAnimationFrame(loop);
    </script>
  </body>
</html>
