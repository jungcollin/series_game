<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>그림자 인형극</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Serif KR", "Georgia", serif;
        background: #f0e8d0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 160, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 35, 25, 0.92);
        color: #f0e8d0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f5edd8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 140, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">그림자 인형극. 종이 인형을 움직여 목표 그림자 모양을 만드세요. 관객에게 들키면 실패합니다. 마우스 또는 화면 터치 드래그로 인형을 움직입니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 12개의 그림자 장면을 완성하면 클리어. 목격 게이지가 가득 차면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="그림자 인형극" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "paper-temple-shadow-stitch-witness",
        title: "그림자 인형극",
        description: "종이 인형을 움직여 목표 그림자 모양을 만드세요.",
        creator: "jungcollin",
        genre: "Shadow matching",
        clearCondition: "12개의 그림자 장면을 완성하면 클리어",
        failCondition: "목격 게이지가 가득 차면 실패",
        controls: "터치/드래그로 인형을 움직여 그림자를 맞추세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        screen: "#f5edd8",
        shadow: "rgba(30, 25, 18, 0.85)",
        lamp: "#e8c850",
        lampGlow: "rgba(232, 200, 80, 0.2)",
        paper: "#f0e8d0",
        puppet: "rgba(50, 40, 28, 0.7)",
        target: "rgba(180, 140, 60, 0.35)",
        targetLine: "rgba(180, 140, 60, 0.6)",
        witness: "#c84848",
        witnessLow: "#88a868",
        text: "#3a3020",
        textLight: "rgba(58, 48, 32, 0.5)",
        frame: "#8a7050",
      };

      // --- Shadow shapes ---
      const SHAPES = [
        { name: "\uc0c8", pts: [[0.5,0.2],[0.2,0.4],[0.1,0.35],[0.3,0.5],[0.2,0.7],[0.4,0.6],[0.5,0.8],[0.6,0.6],[0.8,0.7],[0.7,0.5],[0.9,0.35],[0.8,0.4]] },
        { name: "\ub098\ubb34", pts: [[0.5,0.1],[0.25,0.4],[0.3,0.4],[0.15,0.65],[0.35,0.65],[0.4,0.55],[0.45,0.7],[0.55,0.7],[0.6,0.55],[0.65,0.65],[0.85,0.65],[0.7,0.4],[0.75,0.4]] },
        { name: "\uc0b0", pts: [[0.1,0.8],[0.35,0.3],[0.45,0.5],[0.55,0.2],[0.7,0.55],[0.9,0.8]] },
        { name: "\uc9d1", pts: [[0.2,0.5],[0.5,0.2],[0.8,0.5],[0.8,0.8],[0.2,0.8]] },
        { name: "\ub2ec", pts: (() => { const p = []; for (let i = 0; i < 16; i++) { const a = (i / 16) * Math.PI * 2; p.push([0.5 + Math.cos(a) * 0.3, 0.5 + Math.sin(a) * 0.3]); } return p; })() },
        { name: "\ubcc4", pts: (() => { const p = []; for (let i = 0; i < 10; i++) { const a = (i / 10) * Math.PI * 2 - Math.PI / 2; const r = i % 2 === 0 ? 0.35 : 0.15; p.push([0.5 + Math.cos(a) * r, 0.5 + Math.sin(a) * r]); } return p; })() },
        { name: "\ubb3c\uace0\uae30", pts: [[0.15,0.5],[0.3,0.35],[0.6,0.3],[0.8,0.4],[0.85,0.5],[0.8,0.6],[0.6,0.7],[0.3,0.65]] },
        { name: "\ub098\ube44", pts: [[0.5,0.2],[0.3,0.25],[0.15,0.35],[0.2,0.5],[0.35,0.55],[0.5,0.5],[0.65,0.55],[0.8,0.5],[0.85,0.35],[0.7,0.25]] },
        { name: "\uaf43", pts: (() => { const p = []; for (let i = 0; i < 12; i++) { const a = (i / 12) * Math.PI * 2; const r = i % 2 === 0 ? 0.35 : 0.2; p.push([0.5 + Math.cos(a) * r, 0.5 + Math.sin(a) * r]); } return p; })() },
        { name: "\ud1a0\ub07c", pts: [[0.4,0.15],[0.35,0.35],[0.45,0.35],[0.42,0.15],[0.55,0.15],[0.52,0.35],[0.62,0.35],[0.58,0.15],[0.7,0.3],[0.75,0.5],[0.7,0.7],[0.6,0.8],[0.4,0.8],[0.3,0.7],[0.25,0.5],[0.3,0.3]] },
        { name: "\ubc30", pts: [[0.15,0.6],[0.3,0.75],[0.7,0.75],[0.85,0.6],[0.5,0.6],[0.5,0.25],[0.65,0.45],[0.5,0.45]] },
        { name: "\ud558\ud2b8", pts: (() => { const p = []; for (let i = 0; i < 20; i++) { const t = (i / 20) * Math.PI * 2; const x = 0.5 + 0.25 * Math.pow(Math.sin(t), 3); const y = 0.45 - 0.2 * (Math.cos(t) - 0.3 * Math.cos(2*t) - 0.15 * Math.cos(3*t)); p.push([x, y]); } return p; })() },
      ];

      // --- State ---
      const TARGET = 12;
      const WITNESS_MAX = 100;
      const MATCH_DIST = 35;
      const SCENE_TIME = 8;
      const SCREEN_X = 120, SCREEN_Y = 60;
      const SCREEN_W = W - 240, SCREEN_H = H - 140;
      const SHAPE_SIZE = 140;

      let mode = "menu";
      let elapsed = 0;
      let scenes = 0;
      let witnessGauge = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;

      let currentShape = null;
      let shapeQueue = [];
      let sceneTimer = 0;
      let matchProgress = 0;

      let puppetX = CX, puppetY = CY;
      let puppetTargetX = CX, puppetTargetY = CY;
      let targetX = CX, targetY = CY + 20;

      let eyes = [];
      let eyeFlashTimer = 0;
      let lampFlicker = 0;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Shape management ---
      function shuffleArray(arr) {
        const s = [...arr];
        for (let i = s.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [s[i], s[j]] = [s[j], s[i]];
        }
        return s;
      }

      function nextScene() {
        if (shapeQueue.length === 0) shapeQueue = shuffleArray(SHAPES);
        currentShape = shapeQueue.pop();
        sceneTimer = SCENE_TIME;
        matchProgress = 0;
        targetX = SCREEN_X + SHAPE_SIZE + rand(0, SCREEN_W - SHAPE_SIZE * 2);
        targetY = SCREEN_Y + SHAPE_SIZE / 2 + rand(0, SCREEN_H - SHAPE_SIZE);
        puppetTargetX = CX; puppetTargetY = CY;
      }

      function initEyes() {
        eyes = [];
        for (let i = 0; i < 5; i++) {
          eyes.push({
            x: SCREEN_X + 40 + (SCREEN_W - 80) * (i / 4),
            y: H - 30, openness: 0, lookX: CX, lookY: CY,
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; scenes = 0; witnessGauge = 0; clearAnim = 0;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        shapeQueue = shuffleArray(SHAPES);
        puppetX = CX; puppetY = CY;
        puppetTargetX = CX; puppetTargetY = CY;
        lampFlicker = 0; eyeFlashTimer = 0;
        initEyes();
        nextScene();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        puppetX = lerp(puppetX, puppetTargetX, clamp(8 * dt, 0, 1));
        puppetY = lerp(puppetY, puppetTargetY, clamp(8 * dt, 0, 1));
        puppetX = clamp(puppetX, SCREEN_X + 20, SCREEN_X + SCREEN_W - 20);
        puppetY = clamp(puppetY, SCREEN_Y + 20, SCREEN_Y + SCREEN_H - 20);

        const d = dist(puppetX, puppetY, targetX, targetY);
        const isMatching = d < MATCH_DIST;

        if (isMatching) {
          matchProgress += dt * 1.5;
          if (matchProgress >= 1) {
            scenes++;
            if (scenes >= TARGET) {
              mode = "clear"; clearAnim = 0;
              window.relayStageResult.status = "cleared";
              reportCleared(); return;
            }
            nextScene();
          }
        } else {
          matchProgress = Math.max(0, matchProgress - dt * 0.5);
        }

        sceneTimer -= dt;
        if (sceneTimer <= 0) {
          witnessGauge += 15;
          nextScene();
        }

        if (!isMatching && d > MATCH_DIST * 2) {
          witnessGauge += dt * (5 + scenes * 0.5);
        }
        if (isMatching) witnessGauge = Math.max(0, witnessGauge - dt * 3);

        for (const eye of eyes) {
          eye.openness = lerp(eye.openness, witnessGauge / WITNESS_MAX, 2 * dt);
          eye.lookX = lerp(eye.lookX, puppetX, 3 * dt);
          eye.lookY = lerp(eye.lookY, puppetY, 3 * dt);
        }

        lampFlicker += rand(2, 5) * dt;
        eyeFlashTimer -= dt;
        if (eyeFlashTimer <= 0) {
          witnessGauge += 5;
          eyeFlashTimer = rand(4, 7);
        }

        if (witnessGauge >= WITNESS_MAX) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("\uad00\uac1d\uc5d0\uac8c \ub4e4\ud0b4");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        ctx.fillStyle = COL.paper;
        ctx.fillRect(0, 0, W, H);

        drawFrame();
        drawScreen();
        drawTargetShadow();
        drawPuppetShadow();
        drawLamp();
        drawMatchIndicator();
        drawEyes();

        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawFrame() {
        ctx.strokeStyle = COL.frame;
        ctx.lineWidth = 6;
        ctx.strokeRect(SCREEN_X - 8, SCREEN_Y - 8, SCREEN_W + 16, SCREEN_H + 16);

        const corners = [
          [SCREEN_X - 8, SCREEN_Y - 8], [SCREEN_X + SCREEN_W + 8, SCREEN_Y - 8],
          [SCREEN_X - 8, SCREEN_Y + SCREEN_H + 8], [SCREEN_X + SCREEN_W + 8, SCREEN_Y + SCREEN_H + 8],
        ];
        for (const [cx, cy] of corners) {
          ctx.beginPath();
          ctx.arc(cx, cy, 6, 0, Math.PI * 2);
          ctx.fillStyle = COL.frame;
          ctx.fill();
        }
      }

      function drawScreen() {
        const flicker = Math.sin(lampFlicker) * 0.02;
        ctx.fillStyle = `rgba(245, 237, 216, ${0.95 + flicker})`;
        ctx.fillRect(SCREEN_X, SCREEN_Y, SCREEN_W, SCREEN_H);

        const grad = ctx.createRadialGradient(CX, SCREEN_Y - 20, 20, CX, CY, SCREEN_W * 0.5);
        grad.addColorStop(0, `rgba(232, 200, 80, ${0.1 + flicker})`);
        grad.addColorStop(1, "rgba(232, 200, 80, 0)");
        ctx.fillStyle = grad;
        ctx.fillRect(SCREEN_X, SCREEN_Y, SCREEN_W, SCREEN_H);
      }

      function drawTargetShadow() {
        if (!currentShape) return;
        ctx.save();
        ctx.beginPath();
        for (let i = 0; i < currentShape.pts.length; i++) {
          const px = targetX - SHAPE_SIZE / 2 + currentShape.pts[i][0] * SHAPE_SIZE;
          const py = targetY - SHAPE_SIZE / 2 + currentShape.pts[i][1] * SHAPE_SIZE;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = COL.target;
        ctx.fill();
        ctx.strokeStyle = COL.targetLine;
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = COL.targetLine;
        ctx.font = "400 12px 'Noto Serif KR', serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        ctx.fillText(currentShape.name, targetX, targetY - SHAPE_SIZE / 2 - 8);
        ctx.restore();
      }

      function drawPuppetShadow() {
        if (!currentShape) return;
        ctx.save();
        ctx.beginPath();
        for (let i = 0; i < currentShape.pts.length; i++) {
          const px = puppetX - SHAPE_SIZE / 2 + currentShape.pts[i][0] * SHAPE_SIZE;
          const py = puppetY - SHAPE_SIZE / 2 + currentShape.pts[i][1] * SHAPE_SIZE;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = COL.shadow;
        ctx.fill();
        ctx.restore();

        ctx.strokeStyle = COL.puppet;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(puppetX, puppetY + SHAPE_SIZE * 0.3);
        ctx.lineTo(puppetX + 15, SCREEN_Y + SCREEN_H + 20);
        ctx.stroke();
      }

      function drawLamp() {
        const lampX = CX, lampY = SCREEN_Y - 25;
        const grad = ctx.createRadialGradient(lampX, lampY, 5, lampX, lampY, 40);
        grad.addColorStop(0, COL.lampGlow);
        grad.addColorStop(1, "rgba(232, 200, 80, 0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(lampX, lampY, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(lampX, lampY, 8, 0, Math.PI * 2);
        ctx.fillStyle = COL.lamp;
        ctx.fill();
      }

      function drawMatchIndicator() {
        if (mode !== "running" || matchProgress < 0.01) return;
        ctx.beginPath();
        ctx.arc(targetX, targetY, MATCH_DIST + 5, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * matchProgress);
        ctx.strokeStyle = COL.lamp;
        ctx.lineWidth = 3;
        ctx.stroke();
      }

      function drawEyes() {
        for (const eye of eyes) {
          const open = clamp(eye.openness, 0, 1);
          if (open < 0.05) continue;
          const eyeH = 8 * open;

          ctx.beginPath();
          ctx.ellipse(eye.x, eye.y, 8, eyeH / 2, 0, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(240, 235, 220, ${open * 0.8})`;
          ctx.fill();

          const dx = eye.lookX - eye.x, dy = eye.lookY - eye.y;
          const len = Math.hypot(dx, dy) || 1;
          const px = eye.x + (dx / len) * Math.min(3, len * 0.01);
          const py = eye.y + (dy / len) * Math.min(1.5, len * 0.005);
          ctx.beginPath();
          ctx.arc(px, py, 2.5 * open, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(30, 25, 18, ${open * 0.9})`;
          ctx.fill();
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = "500 15px 'Noto Serif KR', serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${scenes} / ${TARGET}`, 24, 20);

        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(sceneTimer)}`, W - 24, 20);

        const barW = W - 48, barX = 24, barY = 44;
        ctx.fillStyle = "rgba(200, 184, 152, 0.4)";
        ctx.fillRect(barX, barY, barW, 2);
        ctx.fillStyle = COL.lamp;
        ctx.fillRect(barX, barY, barW * clamp(sceneTimer / SCENE_TIME, 0, 1), 2);

        const gaugeW = 120, gaugeX = CX - gaugeW / 2, gaugeY = H - 12;
        const ratio = clamp(witnessGauge / WITNESS_MAX, 0, 1);
        ctx.fillStyle = "rgba(200, 184, 152, 0.3)";
        ctx.fillRect(gaugeX, gaugeY, gaugeW, 4);
        ctx.fillStyle = ratio > 0.7 ? COL.witness : COL.witnessLow;
        ctx.fillRect(gaugeX, gaugeY, gaugeW * ratio, 4);
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(240, 232, 208, 0.95)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.lamp;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 22px 'Noto Serif KR', serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px 'Noto Serif KR', serif";
        ctx.fillStyle = "rgba(58, 48, 32, 0.7)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);

        ctx.fillStyle = "rgba(58, 48, 32, 0.4)";
        ctx.font = "400 13px 'Noto Serif KR', serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(240, 232, 208, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\uadf8\ub9bc\uc790 \uc778\ud615\uadf9", [
          "\uc885\uc774 \uc778\ud615\uc744 \uc6c0\uc9c1\uc5ec",
          "\ubaa9\ud45c \uadf8\ub9bc\uc790 \ubaa8\uc591\uc744 \ub9cc\ub4dc\uc138\uc694",
          "",
          "\uc870\uc791: \ud130\uce58/\ub4dc\ub798\uadf8\ub85c \uc778\ud615 \uc774\ub3d9",
          "\ud074\ub9ac\uc5b4: 12\uac1c \uc7a5\uba74 \uc644\uc131",
          "\uc2e4\ud328: \uad00\uac1d\uc5d0\uac8c \ub4e4\ud0b4",
        ], COL.lamp);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(240, 232, 208, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("\uacf5\uc5f0 \uc131\uacf5", [
            `${Math.ceil(elapsed)}\ucd08 \ub9cc\uc5d0 \uc644\ub8cc`,
            `\uc7a5\uba74: ${scenes}\uac1c`,
          ], COL.lamp);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(60, 30, 20, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\ub4e4\ucf30\ub2e4!", [
          "\uad00\uac1d\uc774 \uc778\ud615\uc0ac\ub97c \ubc1c\uacac\ud588\uc2b5\ub2c8\ub2e4",
          `\uc644\uc131 \uc7a5\uba74: ${scenes} / ${TARGET}`,
        ], COL.witness);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        puppetTargetX = p.x; puppetTargetY = p.y;
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running") return;
        const p = getCanvasPos(e.clientX, e.clientY);
        puppetTargetX = p.x; puppetTargetY = p.y;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;

        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          scenes, witnessGauge: +witnessGauge.toFixed(0),
          result: window.relayStageResult.status,
          currentShape: currentShape?.name || null,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          scenes = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          witnessGauge = WITNESS_MAX;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
