<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>그네 타기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #d4ecf7; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 160, 200, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 80, 60, 0.92);
        color: #f0f8f0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #d4ecf7; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(60, 120, 80, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">그네 타기. 적절한 타이밍에 화면을 터치하여 그네를 높이 올리세요. 목표 높이에 5회 도달하면 클리어. 35초 안에 달성 못하면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="그네 타기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "swing-rider",
        title: "그네 타기",
        description: "적절한 타이밍에 터치하여 그네를 점점 높이 올리세요",
        creator: "jungcollin",
        genre: "Momentum timing",
        clearCondition: "목표 높이에 5회 도달하면 클리어",
        failCondition: "35초 안에 달성 못하면 실패",
        controls: "터치로 그네 가속",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        sky: "#d4ecf7", skyTop: "#a8d8f0",
        grass: "#7bc47f", grassDark: "#5aa85e",
        wood: "#8b6f47", woodDark: "#6b5235",
        rope: "#c4a062", child: "#e8956a", childHair: "#4a3520",
        accent: "#e87040", gold: "#f0c040",
        cloud: "rgba(255,255,255,0.7)",
        text: "#3a5040", textLight: "rgba(58,80,64,0.6)",
      };

      const DURATION = 35;
      const TARGET_HITS = 5;
      const PIVOT_X = CX, PIVOT_Y = 100;
      const ROPE_LEN = 260;
      const GRAVITY = 600;
      const DAMPING = 0.997;
      const BOOST_IMPULSE = 2.8;
      const TARGET_ANGLE = Math.PI / 3.2;

      let mode = "menu";
      let elapsed = 0, angle = 0.15, angularVel = 0, hits = 0;
      let lastTimestamp = 0, animFrame = 0;
      let shake = 0, clearAnim = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let wasAboveTarget = false, boostCooldown = 0, boostFlash = 0, perfectFlash = 0;
      let particles = [], clouds = [], leaves = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function initClouds() {
        clouds = [];
        for (let i = 0; i < 5; i++) clouds.push({ x: rand(0, W), y: rand(20, 120), w: rand(80, 180), h: rand(25, 45), speed: rand(8, 20) });
      }
      function initLeaves() {
        leaves = [];
        if (reducedMotion) return;
        for (let i = 0; i < 6; i++) {
          leaves.push({ x: rand(0, W), y: rand(200, H), vx: rand(-15, 15), vy: rand(-30, -10),
            rot: rand(0, Math.PI * 2), rotSpeed: rand(1, 3), size: rand(4, 8), life: rand(2, 5),
            color: Math.random() > 0.5 ? "#7bc47f" : "#a8cc70" });
        }
      }
      function spawnParticles(x, y, count, color, sizeRange) {
        for (let i = 0; i < count; i++) {
          const a = rand(0, Math.PI * 2), speed = rand(40, 160);
          particles.push({ x, y, vx: Math.cos(a) * speed, vy: Math.sin(a) * speed, life: 1, color, size: rand(sizeRange[0], sizeRange[1]) });
        }
      }

      function reset() {
        elapsed = 0; angle = 0.15; angularVel = 0; hits = 0;
        shake = 0; clearAnim = 0; wasAboveTarget = false;
        boostCooldown = 0; boostFlash = 0; perfectFlash = 0;
        particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        initClouds(); initLeaves();
      }

      function applyBoost() {
        if (mode !== "running" || boostCooldown > 0) return;
        const swingDir = angularVel > 0 ? 1 : -1;
        const posDir = angle > 0 ? 1 : -1;
        if (posDir === swingDir && Math.abs(angle) > 0.05) {
          angularVel += swingDir * BOOST_IMPULSE;
          boostFlash = 1;
          if (Math.abs(angle) > Math.PI / 6) { angularVel += swingDir * 0.5; perfectFlash = 1; }
        } else {
          angularVel += swingDir * BOOST_IMPULSE * 0.3;
          boostFlash = 0.4;
        }
        boostCooldown = 0.15;
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        const ga = -GRAVITY / ROPE_LEN * Math.sin(angle);
        angularVel += ga * dt;
        angularVel *= DAMPING;
        angle += angularVel * dt;
        angle = clamp(angle, -Math.PI / 2.2, Math.PI / 2.2);
        if (boostCooldown > 0) boostCooldown -= dt;

        const absAngle = Math.abs(angle);
        if (absAngle >= TARGET_ANGLE && !wasAboveTarget) {
          wasAboveTarget = true; hits++; shake = 5;
          const bx = PIVOT_X + Math.sin(angle) * ROPE_LEN;
          const by = PIVOT_Y + Math.cos(angle) * ROPE_LEN;
          spawnParticles(bx, by, reducedMotion ? 4 : 12, COL.gold, [3, 7]);
          spawnParticles(bx, by, reducedMotion ? 2 : 6, COL.accent, [2, 5]);
        }
        if (absAngle < TARGET_ANGLE * 0.7) wasAboveTarget = false;

        boostFlash *= 0.92; perfectFlash *= 0.9;

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt; p.vx *= 0.97; p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }
        for (const c of clouds) { c.x += c.speed * dt; if (c.x > W + c.w) c.x = -c.w; }
        if (!reducedMotion) {
          for (let i = leaves.length - 1; i >= 0; i--) {
            const l = leaves[i];
            l.x += l.vx * dt; l.y += l.vy * dt; l.vy += 30 * dt; l.rot += l.rotSpeed * dt; l.life -= dt;
            if (l.life <= 0 || l.y > H + 20) {
              leaves[i] = { x: rand(0, W), y: H + 10, vx: rand(-15, 15), vy: rand(-60, -30),
                rot: rand(0, Math.PI * 2), rotSpeed: rand(1, 3), size: rand(4, 8), life: rand(3, 6),
                color: Math.random() > 0.5 ? "#7bc47f" : "#a8cc70" };
            }
          }
        }
        shake *= 0.88; if (shake < 0.3) shake = 0;

        if (hits >= TARGET_HITS) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared();
        } else if (elapsed >= DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed"; reportFailed("시간 초과");
        }
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, COL.skyTop); skyGrad.addColorStop(0.6, COL.sky); skyGrad.addColorStop(1, "#e8f4e0");
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

        for (const c of clouds) {
          ctx.beginPath(); ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
          ctx.fillStyle = COL.cloud; ctx.fill();
        }

        ctx.fillStyle = COL.grass; ctx.fillRect(0, H - 80, W, 80);
        ctx.fillStyle = COL.grassDark; ctx.fillRect(0, H - 80, W, 4);
        for (let i = 0; i < 20; i++) {
          const gx = (i * 51 + 13) % W;
          ctx.fillStyle = i % 2 === 0 ? "#6ab86e" : "#8ad47a";
          ctx.fillRect(gx, H - 84, 3, 8);
        }

        const tgtY = PIVOT_Y + Math.cos(TARGET_ANGLE) * ROPE_LEN;
        const leftTX = PIVOT_X + Math.sin(-TARGET_ANGLE) * ROPE_LEN;
        const rightTX = PIVOT_X + Math.sin(TARGET_ANGLE) * ROPE_LEN;
        ctx.setLineDash([6, 6]); ctx.strokeStyle = "rgba(240,192,64,0.5)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(leftTX - 30, tgtY); ctx.lineTo(leftTX + 30, tgtY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rightTX - 30, tgtY); ctx.lineTo(rightTX + 30, tgtY); ctx.stroke();
        ctx.setLineDash([]);
        drawStar(leftTX, tgtY - 15, 8, 5, COL.gold, 0.4);
        drawStar(rightTX, tgtY - 15, 8, 5, COL.gold, 0.4);

        ctx.strokeStyle = COL.wood; ctx.lineWidth = 8; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(PIVOT_X - 80, H - 80); ctx.lineTo(PIVOT_X, PIVOT_Y - 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(PIVOT_X + 80, H - 80); ctx.lineTo(PIVOT_X, PIVOT_Y - 10); ctx.stroke();
        ctx.lineWidth = 10;
        ctx.beginPath(); ctx.moveTo(PIVOT_X - 30, PIVOT_Y - 10); ctx.lineTo(PIVOT_X + 30, PIVOT_Y - 10); ctx.stroke();
        ctx.strokeStyle = COL.woodDark; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(PIVOT_X - 78, H - 80); ctx.lineTo(PIVOT_X, PIVOT_Y - 8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(PIVOT_X + 78, H - 80); ctx.lineTo(PIVOT_X, PIVOT_Y - 8); ctx.stroke();

        const endX = PIVOT_X + Math.sin(angle) * ROPE_LEN;
        const endY = PIVOT_Y + Math.cos(angle) * ROPE_LEN;
        ctx.strokeStyle = COL.rope; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(PIVOT_X - 8, PIVOT_Y); ctx.lineTo(endX - 12, endY - 10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(PIVOT_X + 8, PIVOT_Y); ctx.lineTo(endX + 12, endY - 10); ctx.stroke();

        ctx.save(); ctx.translate(endX, endY); ctx.rotate(angle * 0.3);
        ctx.fillStyle = COL.wood; ctx.fillRect(-18, -4, 36, 8);
        ctx.fillStyle = COL.woodDark; ctx.fillRect(-18, 2, 36, 2);
        ctx.fillStyle = COL.child; ctx.fillRect(-5, -30, 10, 20);
        ctx.beginPath(); ctx.arc(0, -38, 10, 0, Math.PI * 2); ctx.fillStyle = "#f0c8a0"; ctx.fill();
        ctx.beginPath(); ctx.arc(0, -42, 10, Math.PI, Math.PI * 2); ctx.fillStyle = COL.childHair; ctx.fill();
        const legKick = Math.sin(angle * 2) * 8;
        ctx.strokeStyle = COL.child; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(-4, -10); ctx.lineTo(-4 + legKick, 0); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(4, -10); ctx.lineTo(4 - legKick, 0); ctx.stroke();
        ctx.strokeStyle = "#f0c8a0"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-5, -26); ctx.lineTo(-12, -14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(5, -26); ctx.lineTo(12, -14); ctx.stroke();
        ctx.restore();

        if (boostFlash > 0.05 && !reducedMotion) {
          ctx.beginPath(); ctx.arc(endX, endY, 30 + boostFlash * 20, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(240,192,64,${boostFlash * 0.3})`; ctx.fill();
        }
        if (perfectFlash > 0.05 && !reducedMotion) {
          ctx.beginPath(); ctx.arc(endX, endY - 20, 15, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(232,112,64,${perfectFlash * 0.5})`; ctx.fill();
        }

        if (!reducedMotion) {
          for (const l of leaves) {
            const alpha = clamp(l.life / 2, 0, 0.7);
            ctx.save(); ctx.translate(l.x, l.y); ctx.rotate(l.rot); ctx.globalAlpha = alpha;
            ctx.fillStyle = l.color; ctx.beginPath(); ctx.ellipse(0, 0, l.size, l.size * 0.5, 0, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1; ctx.restore();
          }
        }
        for (const p of particles) {
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * clamp(p.life, 0, 1), 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.globalAlpha = clamp(p.life, 0, 1); ctx.fill(); ctx.globalAlpha = 1;
        }
        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawStar(x, y, r, pts, color, alpha) {
        ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color; ctx.beginPath();
        for (let i = 0; i < pts * 2; i++) {
          const a = (i * Math.PI) / pts - Math.PI / 2;
          const rd = i % 2 === 0 ? r : r * 0.4;
          if (i === 0) ctx.moveTo(x + Math.cos(a) * rd, y + Math.sin(a) * rd);
          else ctx.lineTo(x + Math.cos(a) * rd, y + Math.sin(a) * rd);
        }
        ctx.closePath(); ctx.fill(); ctx.globalAlpha = 1; ctx.restore();
      }

      function drawHUD() {
        for (let i = 0; i < TARGET_HITS; i++)
          drawStar(28 + i * 28, 24, 10, 5, i < hits ? COL.gold : "rgba(200,200,200,0.5)", i < hits ? 1 : 0.5);
        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.textAlign = "right"; ctx.textBaseline = "top";
        ctx.fillStyle = timeLeft < 10 ? COL.accent : COL.text;
        ctx.font = "bold 18px Trebuchet MS, sans-serif";
        ctx.fillText(`${Math.ceil(timeLeft)}s`, W - 24, 18);
        const barW = W - 48;
        ctx.fillStyle = "rgba(200,220,200,0.4)"; ctx.fillRect(24, 48, barW, 3);
        ctx.fillStyle = COL.grass; ctx.fillRect(24, 48, barW * (1 - elapsed / DURATION), 3);
        if (hits < 2) {
          const ha = 0.3 + Math.sin(elapsed * 3) * 0.15;
          ctx.fillStyle = `rgba(58,80,64,${ha})`; ctx.font = "14px Trebuchet MS, sans-serif";
          ctx.textAlign = "center"; ctx.fillText("↑ 높이 올라갈 때 터치!", CX, H - 90);
        }
      }

      function roundRect(c, x, y, w, h, r) {
        c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r);
        c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
      }
      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40), lineH = 26;
        const cardH = 48 + lines.length * lineH + 36;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(240,248,240,0.96)"; ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cardX + 14, cardY, cardW - 28, 3);
        ctx.fillStyle = COL.text; ctx.font = "bold 24px Trebuchet MS, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cardY + 18);
        ctx.font = "400 14px Trebuchet MS, sans-serif"; ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 52 + i * lineH);
        ctx.fillStyle = "rgba(58,80,64,0.35)"; ctx.font = "400 13px Trebuchet MS, sans-serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(212,236,247,0.5)"; ctx.fillRect(0, 0, W, H);
        drawCard("그네 타기", ["터치 타이밍으로 그네를 높이 올리세요", "", "조작: 화면 터치로 가속", "클리어: 목표 높이 5회 도달", "실패: 35초 안에 미달성"], COL.accent);
      }
      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(212,236,247,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 완료`, `별 ${hits}개 획득`], COL.grass);
      }
      function drawFailed() {
        ctx.fillStyle = "rgba(100,60,40,0.25)"; ctx.fillRect(0, 0, W, H);
        drawCard("실패", ["시간이 다했습니다", `별 ${hits} / ${TARGET_HITS}`], COL.accent);
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }
      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        applyBoost();
      });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (mode !== "running") { handleStart(); return; }
          applyBoost();
        }
      });

      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), angle: +angle.toFixed(3), angularVel: +angularVel.toFixed(3), hits, result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; hits = TARGET_HITS; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; elapsed = DURATION; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      initClouds(); initLeaves(); reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
