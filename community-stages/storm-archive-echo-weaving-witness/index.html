<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>폭풍의 사서</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Serif KR", "Georgia", serif;
        background: #2a2420; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(200, 170, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 35, 30, 0.92);
        color: #f0e8d0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #2a2420; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 170, 100, 0.5); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">폭풍의 사서. 폭풍 속에서 흩어진 고서 페이지를 정리하세요. 번개가 치면 잠시 페이지 위치가 보입니다. 촛불 근처에서 드래그하세요. 마우스 또는 화면 터치 드래그로 페이지를 이동합니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 모든 페이지를 정리하면 클리어. 목격 게이지가 차면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="폭풍의 사서" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "storm-archive-echo-weaving-witness",
        title: "폭풍의 사서",
        description: "폭풍 속에서 흩어진 고서 페이지를 정리하세요. 사서의 시선을 피하세요.",
        creator: "jungcollin",
        genre: "Stealth sorting",
        clearCondition: "폭풍이 끝나기 전에 모든 페이지 정리",
        failCondition: "목격 게이지가 차면 사서에게 발각되어 실패",
        controls: "마우스 또는 터치 드래그로 페이지를 올바른 선반에 배치하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#2a2420",
        bgLight: "#3a3430",
        parchment: "#e8d8a8",
        parchmentDark: "#c8b888",
        gold: "#d8b860",
        goldLight: "rgba(216, 184, 96, 0.3)",
        storm: "#4a5068",
        stormFlash: "rgba(230, 230, 255, 0.8)",
        candle: "#f0c040",
        candleGlow: "rgba(240, 192, 64, 0.15)",
        shadow: "#1a1410",
        witness: "#c85030",
        witnessLight: "rgba(200, 80, 48, 0.3)",
        text: "#e8d8c0",
        textDim: "rgba(232, 216, 192, 0.5)",
        shelf: "#5a4a38",
        shelfLight: "#7a6a50",
      };

      // Page labels (book numbers)
      const BOOK_NAMES = ["I", "II", "III", "IV", "V"];

      // --- State ---
      const STORM_DURATION = 55;
      const TOTAL_PAGES = 12;
      const WITNESS_MAX = 1; // normalized gauge

      let mode = "menu";
      let elapsed = 0;
      let sorted = 0;
      let witnessGauge = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;

      // Lightning
      let lightningTimer = 0;
      let lightningAlpha = 0;
      let lightningDuration = 0;

      // Candle
      let candleFlicker = 0;
      const CANDLE_X = 120;
      const CANDLE_Y = H - 80;
      const CANDLE_RADIUS = 130;

      // Archivist (witness eye)
      let archivistX = W - 100;
      let archivistY = 100;
      let archivistLookAngle = 0;
      let archivistAlertTimer = 0;
      let archivistSweep = 0;

      // Pages
      let pages = [];
      // Shelves (target zones)
      let shelves = [];

      // Dragging
      let dragPage = null;
      let dragOffX = 0, dragOffY = 0;

      let particles = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / STORM_DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Setup ---
      function setupShelves() {
        shelves = [];
        const shelfW = 80;
        const shelfH = 35;
        const startX = 200;
        const spacing = 120;
        const shelfY = H - 50;
        for (let i = 0; i < 5; i++) {
          shelves.push({
            x: startX + i * spacing,
            y: shelfY,
            w: shelfW, h: shelfH,
            bookIdx: i,
            label: BOOK_NAMES[i],
          });
        }
      }

      function setupPages() {
        pages = [];
        // Assign pages to books, scatter them
        let pageIdx = 0;
        for (let bookIdx = 0; bookIdx < 5; bookIdx++) {
          const count = bookIdx < 2 ? 3 : 2; // 3+3+2+2+2 = 12
          for (let p = 0; p < count; p++) {
            pages.push({
              id: pageIdx++,
              bookIdx,
              label: BOOK_NAMES[bookIdx],
              x: rand(100, W - 100),
              y: rand(80, H - 140),
              w: 40, h: 50,
              sorted: false,
              visible: false, // only visible near candle or during lightning
              wobble: rand(0, Math.PI * 2),
            });
          }
        }
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(20, 70);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 20,
            life: 1, color,
            size: rand(1.5, 3.5),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; sorted = 0; witnessGauge = 0;
        clearAnim = 0;
        lightningTimer = rand(3, 6);
        lightningAlpha = 0; lightningDuration = 0;
        candleFlicker = 0;
        archivistLookAngle = 0; archivistAlertTimer = 0;
        archivistSweep = 0;
        dragPage = null;
        particles = [];
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        setupShelves();
        setupPages();
      }

      // --- Is page visible (near candle or lightning) ---
      function isPageVisible(p) {
        if (lightningAlpha > 0.3) return true;
        const d = dist(p.x + p.w / 2, p.y + p.h / 2, CANDLE_X, CANDLE_Y);
        return d < CANDLE_RADIUS;
      }

      // --- Is player in shadow ---
      function isInShadow(x, y) {
        const d = dist(x, y, CANDLE_X, CANDLE_Y);
        return d > CANDLE_RADIUS;
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Lightning
        lightningTimer -= dt;
        if (lightningTimer <= 0) {
          lightningAlpha = 1;
          lightningDuration = rand(0.3, 0.6);
          lightningTimer = rand(4, 8);
        }
        if (lightningAlpha > 0) {
          lightningDuration -= dt;
          if (lightningDuration <= 0) {
            lightningAlpha *= 0.85;
            if (lightningAlpha < 0.05) lightningAlpha = 0;
          }
        }

        // Candle flicker
        candleFlicker += dt * 5;

        // Page visibility
        for (const p of pages) {
          if (p.sorted) continue;
          p.visible = isPageVisible(p);
          p.wobble += dt;
        }

        // Archivist patrol
        archivistSweep += dt * 0.6;
        archivistLookAngle = Math.sin(archivistSweep) * 1.2;

        // Witness gauge: increases when dragging outside shadow
        if (dragPage) {
          const px = dragPage.x + dragPage.w / 2;
          const py = dragPage.y + dragPage.h / 2;
          if (!isInShadow(px, py)) {
            // Visible to archivist - check look angle
            const angleToDrag = Math.atan2(py - archivistY, px - archivistX);
            const angleDiff = Math.abs(angleToDrag - archivistLookAngle);
            if (angleDiff < 1.0) {
              witnessGauge += dt * lerp(0.08, 0.18, progress());
            }
          }
        }

        // Witness gauge also slowly increases when lightning reveals player moving
        if (lightningAlpha > 0.3 && dragPage) {
          witnessGauge += dt * 0.12;
        }

        // Witness gauge slowly decays when not dragging
        if (!dragPage) {
          witnessGauge = Math.max(0, witnessGauge - dt * 0.03);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.95; p.vy *= 0.95;
          p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Win/lose
        if (sorted >= TOTAL_PAGES) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (witnessGauge >= WITNESS_MAX) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("사서에게 발각");
        } else if (elapsed >= STORM_DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("폭풍 종료");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();

        // Dark archive background
        ctx.fillStyle = COL.bg;
        ctx.fillRect(0, 0, W, H);

        // Storm window (top area)
        drawStormWindow();

        // Lightning flash
        if (lightningAlpha > 0.05) {
          ctx.fillStyle = `rgba(230, 230, 255, ${lightningAlpha * 0.15})`;
          ctx.fillRect(0, 0, W, H);
        }

        // Bookshelves background
        drawBookshelvesBackground();

        // Candle & glow
        drawCandle();

        // Shelves (target zones)
        drawShelves();

        // Pages
        drawPages();

        // Archivist
        drawArchivist();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawStormWindow() {
        // Window at top-right
        const wx = W - 180, wy = 20, ww = 140, wh = 80;
        ctx.fillStyle = COL.storm;
        ctx.fillRect(wx, wy, ww, wh);

        // Window frame
        ctx.strokeStyle = COL.shelfLight;
        ctx.lineWidth = 3;
        ctx.strokeRect(wx, wy, ww, wh);
        ctx.beginPath();
        ctx.moveTo(wx + ww / 2, wy);
        ctx.lineTo(wx + ww / 2, wy + wh);
        ctx.moveTo(wx, wy + wh / 2);
        ctx.lineTo(wx + ww, wy + wh / 2);
        ctx.stroke();

        // Rain streaks
        if (!reducedMotion) {
          ctx.strokeStyle = "rgba(180, 200, 220, 0.3)";
          ctx.lineWidth = 1;
          for (let i = 0; i < 8; i++) {
            const rx = wx + rand(5, ww - 5);
            const ry = wy + (elapsed * 100 + i * 40) % wh;
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx - 2, ry + 8);
            ctx.stroke();
          }
        }

        // Lightning bolt in window
        if (lightningAlpha > 0.3) {
          ctx.strokeStyle = `rgba(255, 255, 220, ${lightningAlpha * 0.8})`;
          ctx.lineWidth = 2;
          ctx.beginPath();
          const bx = wx + ww / 2 + rand(-20, 20);
          ctx.moveTo(bx, wy + 5);
          ctx.lineTo(bx - 8, wy + 25);
          ctx.lineTo(bx + 5, wy + 30);
          ctx.lineTo(bx - 5, wy + wh - 5);
          ctx.stroke();
        }
      }

      function drawBookshelvesBackground() {
        // Wooden shelves on walls
        ctx.fillStyle = COL.shelf;
        for (let y = 100; y < H - 100; y += 90) {
          ctx.fillRect(0, y, 60, 8);
          ctx.fillRect(W - 60, y, 60, 8);
        }
      }

      function drawCandle() {
        const cx = CANDLE_X, cy = CANDLE_Y;
        const flickerOffset = Math.sin(candleFlicker) * 2;

        // Glow radius
        const glowR = CANDLE_RADIUS + flickerOffset * 3;
        const glow = ctx.createRadialGradient(cx, cy - 15, 5, cx, cy - 15, glowR);
        glow.addColorStop(0, "rgba(240, 192, 64, 0.18)");
        glow.addColorStop(0.5, "rgba(240, 180, 50, 0.06)");
        glow.addColorStop(1, "rgba(240, 180, 50, 0)");
        ctx.fillStyle = glow;
        ctx.fillRect(cx - glowR, cy - 15 - glowR, glowR * 2, glowR * 2);

        // Candle body
        ctx.fillStyle = "#e8d8b0";
        ctx.fillRect(cx - 5, cy - 25, 10, 25);

        // Flame
        ctx.save();
        ctx.translate(cx, cy - 30 + flickerOffset);
        ctx.beginPath();
        ctx.moveTo(0, -12);
        ctx.bezierCurveTo(-5, -6, -4, 0, 0, 4);
        ctx.bezierCurveTo(4, 0, 5, -6, 0, -12);
        ctx.fillStyle = COL.candle;
        ctx.fill();

        // Inner flame
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.bezierCurveTo(-2, -4, -2, 0, 0, 2);
        ctx.bezierCurveTo(2, 0, 2, -4, 0, -8);
        ctx.fillStyle = "#fff8e0";
        ctx.fill();
        ctx.restore();

        // Candle holder
        ctx.fillStyle = "#8a7860";
        ctx.fillRect(cx - 12, cy, 24, 5);
      }

      function drawShelves() {
        for (const s of shelves) {
          ctx.fillStyle = COL.shelf;
          ctx.fillRect(s.x - s.w / 2, s.y - 2, s.w, 6);

          // Label
          ctx.fillStyle = COL.parchmentDark;
          ctx.font = `500 12px "Noto Serif KR", serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText(s.label, s.x, s.y + 8);

          // Count sorted for this shelf
          const sortedCount = pages.filter(p => p.sorted && p.bookIdx === s.bookIdx).length;
          const totalForBook = pages.filter(p => p.bookIdx === s.bookIdx).length;
          if (sortedCount > 0) {
            ctx.fillStyle = COL.gold;
            ctx.fillText(`${sortedCount}/${totalForBook}`, s.x, s.y + 22);
          }
        }
      }

      function drawPages() {
        for (const p of pages) {
          if (p.sorted) continue;

          const visible = p.visible || p === dragPage;
          const alpha = visible ? 0.9 : 0.08;

          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(p.x, p.y);

          // Page shadow
          ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
          ctx.fillRect(2, 2, p.w, p.h);

          // Page body
          ctx.fillStyle = COL.parchment;
          ctx.fillRect(0, 0, p.w, p.h);

          // Page lines
          ctx.strokeStyle = "rgba(180, 160, 120, 0.3)";
          ctx.lineWidth = 0.5;
          for (let ly = 8; ly < p.h - 5; ly += 7) {
            ctx.beginPath();
            ctx.moveTo(5, ly);
            ctx.lineTo(p.w - 5, ly);
            ctx.stroke();
          }

          // Book label
          ctx.fillStyle = COL.gold;
          ctx.font = `bold 14px "Noto Serif KR", serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(p.label, p.w / 2, p.h / 2);

          ctx.restore();
        }
      }

      function drawArchivist() {
        const ax = archivistX, ay = archivistY;

        // Body (shadowy figure)
        ctx.save();
        ctx.translate(ax, ay);

        // Robe
        ctx.fillStyle = "rgba(30, 25, 20, 0.8)";
        ctx.beginPath();
        ctx.moveTo(0, -20);
        ctx.lineTo(-15, 30);
        ctx.lineTo(15, 30);
        ctx.closePath();
        ctx.fill();

        // Head
        ctx.beginPath();
        ctx.arc(0, -25, 12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(40, 35, 30, 0.9)";
        ctx.fill();

        // Eye (looking direction)
        const eyeX = Math.cos(archivistLookAngle) * 4;
        const eyeY = Math.sin(archivistLookAngle) * 2;
        ctx.beginPath();
        ctx.arc(eyeX, -26, 3, 0, Math.PI * 2);
        ctx.fillStyle = witnessGauge > 0.6 ? COL.witness : COL.candle;
        ctx.fill();

        // Look direction beam (subtle)
        if (witnessGauge > 0.2) {
          ctx.globalAlpha = witnessGauge * 0.15;
          ctx.beginPath();
          ctx.moveTo(0, -25);
          const beamLen = 300;
          const beamAngle = archivistLookAngle;
          ctx.lineTo(Math.cos(beamAngle) * beamLen, -25 + Math.sin(beamAngle) * beamLen);
          ctx.strokeStyle = COL.witness;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life * 0.8;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        // Pages sorted
        ctx.fillStyle = COL.text;
        ctx.font = `500 15px "Noto Serif KR", serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${sorted} / ${TOTAL_PAGES}`, 24, 20);

        // Storm timer
        const timeLeft = Math.max(0, STORM_DURATION - elapsed);
        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(timeLeft)}`, W - 24, 20);

        // Witness gauge (right side vertical bar)
        const barX = W - 20;
        const barH = 120;
        const barY = H / 2 - barH / 2;
        ctx.fillStyle = "rgba(60, 50, 40, 0.5)";
        ctx.fillRect(barX - 4, barY, 8, barH);
        const fillH = barH * clamp(witnessGauge / WITNESS_MAX, 0, 1);
        ctx.fillStyle = witnessGauge > 0.7 ? COL.witness : COL.gold;
        ctx.fillRect(barX - 4, barY + barH - fillH, 8, fillH);

        // Eye icon above gauge
        ctx.fillStyle = witnessGauge > 0.7 ? COL.witness : COL.textDim;
        ctx.font = `400 12px "Noto Serif KR", serif`;
        ctx.textAlign = "center";
        ctx.fillText("eye", barX, barY - 10);
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(35, 30, 25, 0.94)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.gold;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = `bold 22px "Noto Serif KR", serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = `400 14px "Noto Serif KR", serif`;
        ctx.fillStyle = COL.textDim;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(232, 216, 192, 0.35)";
        ctx.font = `400 13px "Noto Serif KR", serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(20, 18, 15, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("폭풍의 사서", [
          "폭풍 속에서 흩어진 페이지를",
          "올바른 선반에 정리하세요",
          "",
          "조작: 드래그로 페이지 이동",
          "클리어: 모든 페이지 정리",
          "실패: 사서에게 발각",
        ], COL.gold);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(20, 18, 15, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("정리 완료", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `페이지: ${sorted}장 정리`,
          ], COL.gold);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(40, 20, 15, 0.4)";
        ctx.fillRect(0, 0, W, H);
        drawCard("발각", [
          elapsed >= STORM_DURATION ? "폭풍이 끝났습니다" : "사서에게 들켰습니다",
          `정리한 페이지: ${sorted} / ${TOTAL_PAGES}`,
        ], COL.witness);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const pos = getCanvasPos(e.clientX, e.clientY);

        // Try to pick up a visible page
        for (let i = pages.length - 1; i >= 0; i--) {
          const p = pages[i];
          if (p.sorted) continue;
          if (!p.visible) continue;
          if (pos.x >= p.x && pos.x <= p.x + p.w &&
              pos.y >= p.y && pos.y <= p.y + p.h) {
            dragPage = p;
            dragOffX = pos.x - p.x;
            dragOffY = pos.y - p.y;
            // Move to end (top of draw order)
            pages.splice(i, 1);
            pages.push(p);
            return;
          }
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || !dragPage) return;
        const pos = getCanvasPos(e.clientX, e.clientY);
        dragPage.x = clamp(pos.x - dragOffX, 0, W - dragPage.w);
        dragPage.y = clamp(pos.y - dragOffY, 0, H - dragPage.h);
      });

      canvas.addEventListener("pointerup", (e) => {
        if (!dragPage) return;
        const px = dragPage.x + dragPage.w / 2;
        const py = dragPage.y + dragPage.h / 2;

        // Check if dropped on correct shelf
        for (const s of shelves) {
          if (px >= s.x - s.w / 2 - 10 && px <= s.x + s.w / 2 + 10 &&
              py >= s.y - 30 && py <= s.y + 20) {
            if (dragPage.bookIdx === s.bookIdx) {
              // Correct placement
              dragPage.sorted = true;
              sorted++;
              spawnParticles(s.x, s.y, reducedMotion ? 3 : 8, COL.gold);
            }
            break;
          }
        }

        dragPage = null;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          sorted, witnessGauge: +witnessGauge.toFixed(2),
          result: window.relayStageResult.status,
          pagesRemaining: pages.filter(p => !p.sorted).length,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          pages.forEach(p => p.sorted = true);
          sorted = TOTAL_PAGES;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          witnessGauge = WITNESS_MAX;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
