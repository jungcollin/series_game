<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>그림자 춤</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #F0EDE8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(160, 140, 120, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 50, 40, 0.92);
        color: #F0EDE8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #F0EDE8; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 100, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">그림자 춤. 화면 터치로 이동, 빛이 없을 때만 움직이기. 무대 끝까지 도달하면 클리어. 스포트라이트에 3번 걸리면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="그림자 춤" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = 960, H = 540, CX = W/2, CY = H/2;
      const FIXED_DT = 1/60, MAX_DT = 1/20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id:"shadow-dance", title:"그림자 춤",
        description:"스포트라이트를 피하며 무대 끝까지 이동하는 리듬 스텔스 게임",
        creator:"jungcollin", genre:"Rhythm stealth",
        clearCondition:"무대 끝까지 도달하면 클리어",
        failCondition:"스포트라이트에 3번 걸리면 실패",
        controls:"화면 터치로 이동, 빛이 없을 때만 움직이기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id)||{history:[],clearCount:0,previousStageId:null};
      window.relayStageMeta = {id:META.id,title:META.title,description:META.description,creator:META.creator,genre:META.genre,clearCondition:META.clearCondition,failCondition:META.failCondition,controls:META.controls};
      window.relayStageResult = {status:"running"};

      const COL = {
        bg:"#F0EDE8", stage:"#DED5C8", stageFloor:"#C8BBA8",
        curtain:"#8B4513", curtainDark:"#6B3510",
        player:"#3C3228", playerShadow:"rgba(60,50,40,0.3)",
        spotlight:"rgba(255,230,150,0.35)", spotlightBright:"rgba(255,220,100,0.6)",
        safe:"#6B8E5A", danger:"#C0392B", warning:"#E8A030",
        text:"#3C3228", textLight:"rgba(60,50,40,0.5)",
        gold:"#DAA520", goalLine:"#6B8E5A",
      };

      const MAX_CAUGHT = 3, DURATION = 40;
      const STAGE_LEFT = 80, STAGE_RIGHT = W - 80;
      const STAGE_TOP = 100, STAGE_BOTTOM = H - 60;
      const GOAL_X = STAGE_RIGHT - 20;

      let mode="menu", elapsed=0, lastTimestamp=0, animFrame=0;
      let hostFailedReported=false, hostClearedReported=false;
      let caught=0, shake=0, flashA=0, clearAnim=0;
      let particles=[];

      // Player
      let player = {x: STAGE_LEFT + 40, y: CY + 40, tx: STAGE_LEFT + 40, ty: CY + 40, moving: false};

      // Spotlights: cycle on/off with rhythm
      let spotlights = [];
      let beatPhase = 0;
      const BEAT_SPEED = 1.2; // beats per second

      // Safe zones (shadows/objects to hide behind)
      let shadows = [];

      function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
      function lerp(a,b,t){return a+(b-a)*t;}
      function rand(lo,hi){return lo+Math.random()*(hi-lo);}
      function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1);}

      function inRelayHost(){try{return window.parent&&window.parent!==window&&window.parent.RelayHost;}catch{return false;}}
      function reportReady(){if(inRelayHost())window.parent.RelayHost.onStageReady?.(window.relayStageMeta);}
      function reportFailed(reason){if(!inRelayHost()||hostFailedReported)return;hostFailedReported=true;window.parent.RelayHost.onStageFailed?.({stageId:META.id,stageTitle:META.title,reason,durationSec:+elapsed.toFixed(1)});}
      function reportCleared(){if(!inRelayHost()||hostClearedReported)return;hostClearedReported=true;window.parent.RelayHost.onStageCleared?.({stageId:META.id,stageTitle:META.title,clearCountAfter:relayContext.clearCount+1,durationSec:+elapsed.toFixed(1)});}

      function spawnP(x,y,n,col,sr){for(let i=0;i<n;i++){const a=rand(0,Math.PI*2),sp=rand(40,120);particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-20,life:1,color:col,size:rand(sr[0],sr[1])});}}

      function generateLevel(){
        spotlights = [];
        // Create spotlights across the stage
        const count = 5;
        for(let i=0;i<count;i++){
          const cx = STAGE_LEFT + 120 + i * ((STAGE_RIGHT-STAGE_LEFT-200)/count);
          spotlights.push({
            x: cx, y: CY + 20,
            radius: rand(60, 90),
            phaseOffset: rand(0, Math.PI*2),
            speed: rand(0.8, 1.5),
            sweepRange: rand(40, 80),
            sweepPhase: rand(0, Math.PI*2),
          });
        }
        // Safe shadow objects (pillars, props)
        shadows = [];
        for(let i=0;i<4;i++){
          shadows.push({
            x: STAGE_LEFT + 160 + i * 160 + rand(-30,30),
            y: STAGE_BOTTOM - rand(20,60),
            w: rand(30,50), h: rand(50,80),
          });
        }
      }

      function reset(){
        elapsed=0;caught=0;shake=0;flashA=0;clearAnim=0;particles=[];
        player={x:STAGE_LEFT+40,y:CY+40,tx:STAGE_LEFT+40,ty:CY+40,moving:false};
        beatPhase=0;
        hostFailedReported=false;hostClearedReported=false;
        window.relayStageResult.status="running";
        generateLevel();
      }

      function isInSpotlight(px, py){
        for(const s of spotlights){
          const on = Math.sin(beatPhase * Math.PI * 2 * s.speed + s.phaseOffset) > -0.2;
          if(!on) continue;
          const sx = s.x + Math.sin(s.sweepPhase + elapsed * 1.5) * s.sweepRange;
          const d = dist(px, py, sx, s.y);
          if(d < s.radius) return true;
        }
        return false;
      }

      function isInShadow(px, py){
        for(const s of shadows){
          if(px > s.x - s.w/2 - 10 && px < s.x + s.w/2 + 10 &&
             py > s.y - s.h && py < s.y + 10) return true;
        }
        return false;
      }

      function update(dt){
        if(mode!=="running"&&mode!=="clear")return;
        if(mode==="clear"){clearAnim=clamp(clearAnim+dt*1.5,0,1);updP(dt);return;}
        elapsed+=dt;
        beatPhase += BEAT_SPEED * dt;

        // Player movement
        const dx = player.tx - player.x, dy = player.ty - player.y;
        const dd = Math.hypot(dx, dy);
        player.moving = dd > 4;
        if(player.moving){
          const speed = 180;
          const step = Math.min(speed*dt, dd);
          player.x += (dx/dd)*step;
          player.y += (dy/dd)*step;
          player.x = clamp(player.x, STAGE_LEFT+10, STAGE_RIGHT-10);
          player.y = clamp(player.y, STAGE_TOP+10, STAGE_BOTTOM-10);
        }

        // Check if caught: moving AND in spotlight AND not in shadow
        if(player.moving && isInSpotlight(player.x, player.y) && !isInShadow(player.x, player.y)){
          caught++;
          shake=7;flashA=0.3;
          spawnP(player.x, player.y, reducedMotion?3:8, COL.danger, [3,6]);
          // Push player back a bit
          player.tx = player.x - 40;
          player.x -= 20;
          if(caught>=MAX_CAUGHT){
            mode="failed";window.relayStageResult.status="failed";reportFailed("스포트라이트에 발각");
            return;
          }
        }

        // Check goal
        if(player.x >= GOAL_X){
          mode="clear";clearAnim=0;
          window.relayStageResult.status="cleared";reportCleared();
          spawnP(player.x,player.y,reducedMotion?6:20,COL.gold,[3,8]);
          return;
        }

        shake*=0.88;if(shake<0.3)shake=0;flashA*=0.92;
        updP(dt);

        if(elapsed>=DURATION){mode="failed";window.relayStageResult.status="failed";reportFailed("시간 초과");}
      }

      function updP(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;p.life-=dt*2.5;if(p.life<=0)particles.splice(i,1);}}

      function draw(){
        ctx.save();
        const sx=shake>0.3?rand(-shake,shake):0,sy=shake>0.3?rand(-shake,shake):0;
        ctx.translate(sx,sy);

        // Background
        ctx.fillStyle=COL.bg;ctx.fillRect(0,0,W,H);

        if(mode==="running"||mode==="clear"||mode==="failed"){
          drawStage();
          drawShadows();
          drawSpotlights();
          drawGoal();
          drawPlayer2();
          if(mode==="running") drawHUD();
        }

        drawParts();
        if(flashA>0.01){ctx.fillStyle=`rgba(192,57,43,${flashA})`;ctx.fillRect(0,0,W,H);}
        ctx.restore();

        if(mode==="menu") drawMenu();
        else if(mode==="clear") drawClearScreen();
        else if(mode==="failed") drawFailedScreen();
      }

      function drawStage(){
        // Stage floor
        ctx.fillStyle=COL.stageFloor;
        ctx.fillRect(STAGE_LEFT, STAGE_TOP, STAGE_RIGHT-STAGE_LEFT, STAGE_BOTTOM-STAGE_TOP);

        // Floor boards
        ctx.strokeStyle="rgba(60,50,40,0.08)";ctx.lineWidth=1;
        for(let y=STAGE_TOP;y<STAGE_BOTTOM;y+=30){
          ctx.beginPath();ctx.moveTo(STAGE_LEFT,y);ctx.lineTo(STAGE_RIGHT,y);ctx.stroke();
        }

        // Side curtains
        const cw = 30;
        ctx.fillStyle=COL.curtain;
        ctx.fillRect(STAGE_LEFT-cw, STAGE_TOP-20, cw, STAGE_BOTTOM-STAGE_TOP+30);
        ctx.fillRect(STAGE_RIGHT, STAGE_TOP-20, cw, STAGE_BOTTOM-STAGE_TOP+30);

        // Curtain folds
        ctx.fillStyle=COL.curtainDark;
        for(let y=STAGE_TOP;y<STAGE_BOTTOM;y+=40){
          ctx.fillRect(STAGE_LEFT-cw, y, 8, 20);
          ctx.fillRect(STAGE_RIGHT+cw-8, y, 8, 20);
        }

        // Top curtain
        ctx.fillStyle=COL.curtain;
        ctx.fillRect(STAGE_LEFT-cw, STAGE_TOP-20, STAGE_RIGHT-STAGE_LEFT+cw*2, 20);

        // Beat indicator at top
        const beatVal = Math.sin(beatPhase * Math.PI * 2);
        const barW = 200, barX = CX-barW/2, barY = STAGE_TOP - 14;
        ctx.fillStyle="rgba(60,50,40,0.1)";ctx.fillRect(barX,barY,barW,6);
        const dotX = barX + ((beatVal+1)/2)*barW;
        ctx.beginPath();ctx.arc(dotX,barY+3,4,0,Math.PI*2);
        ctx.fillStyle = beatVal > -0.2 ? COL.warning : COL.safe;
        ctx.fill();
      }

      function drawShadows(){
        for(const s of shadows){
          // Props (pillar/box shape)
          ctx.fillStyle="rgba(60,50,40,0.15)";
          ctx.fillRect(s.x-s.w/2, s.y-s.h, s.w, s.h);
          ctx.fillStyle="rgba(60,50,40,0.25)";
          ctx.fillRect(s.x-s.w/2, s.y-s.h, s.w, 4);
          // Shadow behind
          ctx.fillStyle="rgba(60,50,40,0.06)";
          ctx.fillRect(s.x-s.w/2-8, s.y-s.h+4, s.w+16, s.h);
        }
      }

      function drawSpotlights(){
        for(const s of spotlights){
          const on = Math.sin(beatPhase * Math.PI * 2 * s.speed + s.phaseOffset) > -0.2;
          const sx = s.x + Math.sin(s.sweepPhase + elapsed * 1.5) * s.sweepRange;
          if(!on) continue;

          // Spotlight cone from top
          const grd = ctx.createRadialGradient(sx, s.y, 0, sx, s.y, s.radius);
          grd.addColorStop(0, COL.spotlightBright);
          grd.addColorStop(0.6, COL.spotlight);
          grd.addColorStop(1, "rgba(255,230,150,0)");
          ctx.fillStyle = grd;
          ctx.fillRect(sx-s.radius, s.y-s.radius, s.radius*2, s.radius*2);

          // Light beam from ceiling
          ctx.beginPath();
          ctx.moveTo(sx-10, STAGE_TOP);
          ctx.lineTo(sx-s.radius*0.6, s.y);
          ctx.lineTo(sx+s.radius*0.6, s.y);
          ctx.lineTo(sx+10, STAGE_TOP);
          ctx.closePath();
          ctx.fillStyle="rgba(255,230,150,0.08)";ctx.fill();
        }
      }

      function drawGoal(){
        // Goal line on right side
        ctx.setLineDash([6,4]);
        ctx.strokeStyle=COL.goalLine;ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(GOAL_X,STAGE_TOP+10);ctx.lineTo(GOAL_X,STAGE_BOTTOM-10);ctx.stroke();
        ctx.setLineDash([]);
        // Arrow
        ctx.fillStyle=COL.goalLine;ctx.font="bold 14px 'Segoe UI',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="bottom";
        ctx.fillText("출구",GOAL_X,STAGE_TOP+8);
      }

      function drawPlayer2(){
        const bob = player.moving ? Math.sin(elapsed*10)*2 : 0;
        const inLight = isInSpotlight(player.x, player.y) && !isInShadow(player.x, player.y);

        ctx.save();ctx.translate(player.x, player.y+bob);

        // Shadow on floor
        ctx.beginPath();ctx.ellipse(0,10,12,4,0,0,Math.PI*2);
        ctx.fillStyle=COL.playerShadow;ctx.fill();

        // Body
        ctx.fillStyle = inLight && player.moving ? COL.danger : COL.player;
        // Head
        ctx.beginPath();ctx.arc(0,-18,8,0,Math.PI*2);ctx.fill();
        // Body
        ctx.fillRect(-6,-10,12,16);
        // Legs
        if(player.moving){
          const legPhase = Math.sin(elapsed*12)*4;
          ctx.fillRect(-5,6,4,8+legPhase);
          ctx.fillRect(1,6,4,8-legPhase);
        }else{
          ctx.fillRect(-5,6,4,8);
          ctx.fillRect(1,6,4,8);
        }

        // Warning indicator
        if(inLight && !isInShadow(player.x, player.y)){
          ctx.fillStyle=`rgba(192,57,43,${0.5+Math.sin(elapsed*8)*0.3})`;
          ctx.font="bold 12px 'Segoe UI',sans-serif";ctx.textAlign="center";
          ctx.fillText("!",0,-30);
        }

        ctx.restore();
      }

      function drawHUD(){
        ctx.fillStyle=COL.text;ctx.font="600 15px 'Segoe UI',sans-serif";
        ctx.textAlign="left";ctx.textBaseline="top";
        const tl=Math.max(0,DURATION-elapsed);
        ctx.fillText(`${Math.ceil(tl)}초`,24,10);
        // Progress
        const prog = clamp((player.x - STAGE_LEFT) / (GOAL_X - STAGE_LEFT), 0, 1);
        ctx.textAlign="right";
        ctx.fillText(`진행: ${Math.floor(prog*100)}%`,W-24,10);
        // Progress bar
        const bw=200,bx=CX-bw/2,by=H-24;
        ctx.fillStyle="rgba(60,50,40,0.1)";ctx.fillRect(bx,by,bw,4);
        ctx.fillStyle=COL.safe;ctx.fillRect(bx,by,bw*prog,4);
        // Lives
        for(let i=0;i<MAX_CAUGHT;i++){
          ctx.beginPath();ctx.arc(30+i*22,H-20,6,0,Math.PI*2);
          ctx.fillStyle=i<MAX_CAUGHT-caught?COL.gold:"rgba(60,50,40,0.15)";ctx.fill();
        }
      }

      function drawParts(){for(const p of particles){ctx.beginPath();ctx.arc(p.x,p.y,p.size*clamp(p.life,0,1),0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=clamp(p.life,0,1);ctx.fill();ctx.globalAlpha=1;}}

      function rr(c2,x,y,w,h,r){c2.beginPath();c2.moveTo(x+r,y);c2.lineTo(x+w-r,y);c2.arcTo(x+w,y,x+w,y+r,r);c2.lineTo(x+w,y+h-r);c2.arcTo(x+w,y+h,x+w-r,y+h,r);c2.lineTo(x+r,y+h);c2.arcTo(x,y+h,x,y+h-r,r);c2.lineTo(x,y+r);c2.arcTo(x,y,x+r,y,r);c2.closePath();}

      function drawCard(title,lines,accent){
        const cw=Math.min(340,W-40),ch=44+lines.length*28+40,cx2=CX-cw/2,cy2=CY-ch/2;
        ctx.fillStyle="rgba(240,237,232,0.96)";ctx.beginPath();rr(ctx,cx2,cy2,cw,ch,10);ctx.fill();
        ctx.fillStyle=accent;ctx.fillRect(cx2+14,cy2,cw-28,3);
        ctx.fillStyle=COL.text;ctx.font="bold 24px 'Segoe UI',sans-serif";
        ctx.textAlign="center";ctx.textBaseline="top";ctx.fillText(title,CX,cy2+18);
        ctx.font="400 14px 'Segoe UI',sans-serif";ctx.fillStyle="rgba(60,50,40,0.7)";
        for(let i=0;i<lines.length;i++)ctx.fillText(lines[i],CX,cy2+52+i*28);
        ctx.fillStyle="rgba(60,50,40,0.35)";ctx.font="400 12px 'Segoe UI',sans-serif";
        ctx.fillText("TAP or ENTER",CX,cy2+ch-20);
      }

      function drawMenu(){
        ctx.fillStyle="rgba(240,237,232,0.5)";ctx.fillRect(0,0,W,H);
        drawCard("그림자 춤",["스포트라이트를 피하며","무대 끝까지 이동하세요","","조작: 화면 터치로 이동","클리어: 무대 끝까지 도달","실패: 빛에 3번 걸리면 게임 오버"],COL.curtain);
      }

      function drawClearScreen(){
        clearAnim=clamp(clearAnim+0.02,0,1);
        ctx.fillStyle=`rgba(240,237,232,${clearAnim*0.5})`;ctx.fillRect(0,0,W,H);
        if(clearAnim>0.3)drawCard("탈출 성공!",[`${Math.ceil(elapsed)}초 만에 완료`,"완벽한 그림자 댄서!"],COL.gold);
      }

      function drawFailedScreen(){
        ctx.fillStyle="rgba(60,30,20,0.25)";ctx.fillRect(0,0,W,H);
        drawCard("발각!",[elapsed>=DURATION?"시간이 다했습니다":"스포트라이트에 걸렸습니다",`발각: ${caught}번`],COL.danger);
      }

      function handleStart(){if(mode==="menu"||mode==="clear"||mode==="failed"){reset();mode="running";}}

      function getCanvasPos(cx,cy){const r=canvas.getBoundingClientRect();return{x:(cx-r.left)*(W/r.width),y:(cy-r.top)*(H/r.height)};}

      canvas.addEventListener("pointerdown",(e)=>{
        e.preventDefault();
        if(mode!=="running"){handleStart();return;}
        const p=getCanvasPos(e.clientX,e.clientY);
        player.tx=p.x;player.ty=p.y;
      });
      canvas.addEventListener("pointermove",(e)=>{
        if(mode!=="running")return;
        if(e.pressure>0){const p=getCanvasPos(e.clientX,e.clientY);player.tx=p.x;player.ty=p.y;}
      });
      canvas.addEventListener("keydown",(e)=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();handleStart();}});

      function gameLoop(ts){
        animFrame=requestAnimationFrame(gameLoop);
        if(!lastTimestamp){lastTimestamp=ts;return;}
        let dt=Math.min((ts-lastTimestamp)/1000,MAX_DT);lastTimestamp=ts;
        let steps=0;while(dt>=FIXED_DT&&steps<4){update(FIXED_DT);dt-=FIXED_DT;steps++;}
        if(dt>0&&steps<4)update(dt);draw();
      }

      function renderGameToText(){
        const prog=clamp((player.x-STAGE_LEFT)/(GOAL_X-STAGE_LEFT),0,1);
        return JSON.stringify({mode,elapsed:+elapsed.toFixed(1),caught,progress:+(prog*100).toFixed(0),result:window.relayStageResult.status});
      }

      window.render_game_to_text=renderGameToText;
      window.advanceTime=(ms=16.67)=>{const s=Math.max(1,Math.round(ms/(FIXED_DT*1000)));for(let i=0;i<s;i++)update(FIXED_DT);draw();return renderGameToText();};
      window.relayStageDebug={
        forceClear(){reset();mode="running";player.x=GOAL_X;mode="clear";clearAnim=0;window.relayStageResult.status="cleared";reportCleared();draw();},
        forceFail(){reset();mode="running";caught=MAX_CAUGHT;mode="failed";window.relayStageResult.status="failed";reportFailed("debug_force_fail");draw();},
      };

      reportReady();
      animFrame=requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
