<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>국수 뽑기</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Segoe UI", sans-serif;
        background: #FFF8F0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(184, 134, 11, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(139, 105, 20, 0.92);
        color: #FFF8F0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #FFF8F0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(184, 134, 11, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">국수 뽑기. 면 반죽을 화면 터치 드래그로 늘리고 탭으로 접어 64가닥 국수를 만드세요. 반죽이 3번 끊어지면 실패합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="국수 뽑기" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "noodle-pull",
        title: "국수 뽑기",
        description: "면 반죽을 늘리고 접어 국수 가닥을 만드세요",
        creator: "jungcollin",
        genre: "Stretch & fold",
        clearCondition: "64가닥 완성 시 클리어",
        failCondition: "반죽이 3번 끊어지면 실패",
        controls: "화면 터치 드래그로 늘리기, 탭으로 접기",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#FFF8F0", bgDark: "#F0E4D0",
        dough: "#E8C870", doughLight: "#F5DFA0", doughDark: "#B8860B",
        table: "#D4A056", tableDark: "#A07030",
        accent: "#CD4528", text: "#5C3A10", textLight: "rgba(92,58,16,0.5)",
      };

      const DURATION = 40;
      const TARGET_STRANDS = 64;
      const MAX_BREAKS = 3;
      const DOUGH_ANCHOR_Y = CY - 100;
      const MAX_STRETCH = 260;
      const SAFE_RATIO = 0.75;
      const FOLD_MIN_RATIO = 0.35;

      let mode = "menu", elapsed = 0, strands = 1, breaks = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let stretchPx = 0, isDragging = false, pDownY = 0;
      let foldAnim = 0, breakAnim = 0, clearAnim = 0;
      let shake = 0, flashAlpha = 0, stretchWarning = 0;
      let flourParts = [], sparkParts = [], noodleLines = [];

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnFlour(x, y, n) {
        if (reducedMotion) n = Math.min(n, 3);
        for (let i = 0; i < n; i++) flourParts.push({ x: x + rand(-30, 30), y, vx: rand(-25, 25), vy: rand(-50, -15), life: 1, size: rand(2, 5) });
      }
      function spawnSpark(x, y, n, color) {
        if (reducedMotion) n = Math.min(n, 4);
        for (let i = 0; i < n; i++) { const a = rand(0, Math.PI * 2), s = rand(40, 120); sparkParts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color, size: rand(2, 6) }); }
      }

      function genNoodleLines() {
        noodleLines = [];
        const cnt = Math.min(strands, 32);
        for (let i = 0; i < cnt; i++) noodleLines.push({ off: rand(-1, 1), wave: rand(0, Math.PI * 2), ws: rand(1.5, 3.5), thick: Math.max(0.8, 4.5 - Math.log2(Math.max(strands, 1)) * 0.6) });
      }

      function reset() {
        elapsed = 0; strands = 1; breaks = 0;
        stretchPx = 0; isDragging = false;
        foldAnim = 0; breakAnim = 0; clearAnim = 0;
        shake = 0; flashAlpha = 0; stretchWarning = 0;
        flourParts = []; sparkParts = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        genNoodleLines();
      }

      function doFold() {
        if (stretchPx / MAX_STRETCH < FOLD_MIN_RATIO) return;
        strands *= 2; foldAnim = 1;
        stretchPx = 0; isDragging = false;
        spawnFlour(CX, DOUGH_ANCHOR_Y + 30, 14);
        genNoodleLines();
        if (strands >= TARGET_STRANDS) { mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); }
      }

      function doBreak() {
        breaks++; breakAnim = 1; shake = 10; flashAlpha = 0.3;
        stretchPx = 0; isDragging = false;
        spawnSpark(CX, DOUGH_ANCHOR_Y + MAX_STRETCH * 0.5, 15, COL.doughDark);
        if (breaks >= MAX_BREAKS) { mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("반죽 파손"); }
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        if (isDragging) {
          const r = stretchPx / MAX_STRETCH;
          stretchWarning = r > SAFE_RATIO ? (r - SAFE_RATIO) / (1 - SAFE_RATIO) : 0;
          if (r >= 1) doBreak();
        } else {
          stretchPx = lerp(stretchPx, 0, clamp(10 * dt, 0, 1));
          stretchWarning = lerp(stretchWarning, 0, clamp(8 * dt, 0, 1));
        }
        foldAnim *= 0.90; breakAnim *= 0.93;
        shake *= 0.87; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.91;
        for (const n of noodleLines) n.wave += n.ws * dt;
        for (let i = flourParts.length - 1; i >= 0; i--) { const p = flourParts[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 80 * dt; p.life -= dt * 1.8; if (p.life <= 0) flourParts.splice(i, 1); }
        for (let i = sparkParts.length - 1; i >= 0; i--) { const p = sparkParts[i]; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.95; p.vy *= 0.95; p.life -= dt * 2.2; if (p.life <= 0) sparkParts.splice(i, 1); }
        if (elapsed >= DURATION && strands < TARGET_STRANDS) { mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("시간 초과"); }
      }

      function draw() {
        ctx.save();
        if (shake > 0.3) ctx.translate(rand(-shake, shake), rand(-shake, shake));
        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);
        drawTable();
        if (mode === "running") drawGuide();
        drawDough();
        drawParts();
        if (mode === "running") drawHUD();
        if (flashAlpha > 0.01) { ctx.fillStyle = `rgba(205,69,40,${flashAlpha})`; ctx.fillRect(0, 0, W, H); }
        ctx.restore();
        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawTable() {
        const ty = H * 0.62;
        const g = ctx.createLinearGradient(0, ty - 10, 0, H);
        g.addColorStop(0, COL.table); g.addColorStop(1, COL.tableDark);
        ctx.fillStyle = g; ctx.fillRect(0, ty, W, H - ty);
        ctx.fillStyle = "rgba(255,255,255,0.18)"; ctx.fillRect(0, ty, W, 3);
        if (!reducedMotion) {
          ctx.globalAlpha = 0.04; ctx.strokeStyle = "#6B4226";
          for (let i = 0; i < 8; i++) { ctx.beginPath(); ctx.moveTo(0, ty + 12 + i * 14); ctx.lineTo(W, ty + 12 + i * 14 + 1); ctx.lineWidth = 1; ctx.stroke(); }
          ctx.globalAlpha = 1;
        }
      }

      function drawGuide() {
        const topY = DOUGH_ANCHOR_Y, safeY = topY + MAX_STRETCH * SAFE_RATIO, dangerY = topY + MAX_STRETCH, hw = 55;
        ctx.fillStyle = "rgba(46,160,67,0.05)"; ctx.fillRect(CX - hw, topY, hw * 2, safeY - topY);
        ctx.fillStyle = "rgba(205,69,40,0.05)"; ctx.fillRect(CX - hw, safeY, hw * 2, dangerY - safeY);
        if (stretchPx > MAX_STRETCH * FOLD_MIN_RATIO) {
          const a = clamp((stretchPx / MAX_STRETCH - FOLD_MIN_RATIO) / 0.15, 0, 0.5);
          ctx.setLineDash([6, 4]); ctx.strokeStyle = `rgba(46,160,67,${a})`; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(CX - 50, safeY); ctx.lineTo(CX + 50, safeY); ctx.stroke(); ctx.setLineDash([]);
          ctx.fillStyle = `rgba(46,160,67,${a})`; ctx.font = '500 13px "Noto Sans KR",sans-serif';
          ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText("탭으로 접기", CX, safeY - 12);
        }
      }

      function drawDough() {
        const topY = DOUGH_ANCHOR_Y, botY = topY + stretchPx, midY = (topY + botY) / 2;
        const dw = lerp(90, 35, clamp(stretchPx / MAX_STRETCH, 0, 1));
        if (strands > 1) {
          for (const n of noodleLines) {
            const xo = n.off * dw * 0.4, wA = stretchPx > 10 ? Math.sin(n.wave) * 3.5 * (stretchPx / MAX_STRETCH) : 0;
            ctx.beginPath(); ctx.moveTo(CX + xo, topY); ctx.quadraticCurveTo(CX + xo + wA, midY, CX + xo - wA * 0.5, botY);
            ctx.strokeStyle = COL.dough; ctx.lineWidth = n.thick; ctx.lineCap = "round"; ctx.stroke();
          }
        }
        const tr = lerp(32, 20, clamp(stretchPx / MAX_STRETCH, 0, 1));
        doughBall(CX, topY, tr); doughBall(CX, botY, tr);
        if (strands === 1 && stretchPx < 8) doughBall(CX, topY + 10, 42);
        if (stretchWarning > 0.01) { ctx.beginPath(); ctx.arc(CX, midY, 55, 0, Math.PI * 2); ctx.fillStyle = `rgba(205,69,40,${stretchWarning * 0.18})`; ctx.fill(); }
        if (foldAnim > 0.05) { ctx.beginPath(); ctx.arc(CX, topY + 20, 45 + foldAnim * 28, 0, Math.PI * 2); ctx.fillStyle = `rgba(245,223,160,${foldAnim * 0.35})`; ctx.fill(); }
      }

      function doughBall(x, y, r) {
        ctx.beginPath(); ctx.ellipse(x + 2, y + 3, r, r * 0.7, 0, 0, Math.PI * 2); ctx.fillStyle = "rgba(160,112,48,0.12)"; ctx.fill();
        const g = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, 0, x, y, r);
        g.addColorStop(0, COL.doughLight); g.addColorStop(0.7, COL.dough); g.addColorStop(1, COL.doughDark);
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
        ctx.beginPath(); ctx.arc(x - r * 0.25, y - r * 0.25, r * 0.28, 0, Math.PI * 2); ctx.fillStyle = "rgba(255,255,255,0.28)"; ctx.fill();
      }

      function drawParts() {
        for (const p of flourParts) { ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${p.life * 0.65})`; ctx.fill(); }
        for (const p of sparkParts) { ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fillStyle = p.color; ctx.fill(); ctx.globalAlpha = 1; }
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = 'bold 17px "Noto Sans KR",sans-serif';
        ctx.textAlign = "left"; ctx.textBaseline = "top"; ctx.fillText(`${strands} / ${TARGET_STRANDS} 가닥`, 24, 18);
        ctx.textAlign = "right"; ctx.fillText(`${Math.ceil(Math.max(0, DURATION - elapsed))}초`, W - 24, 18);
        const bw = W - 48; ctx.fillStyle = COL.bgDark; ctx.fillRect(24, 44, bw, 3);
        const r = Math.max(0, 1 - elapsed / DURATION); ctx.fillStyle = r > 0.25 ? COL.doughDark : COL.accent; ctx.fillRect(24, 44, bw * r, 3);
        for (let i = 0; i < MAX_BREAKS; i++) { const dx = CX - (MAX_BREAKS - 1) * 12 + i * 24; ctx.beginPath(); ctx.arc(dx, H - 26, 6, 0, Math.PI * 2); ctx.fillStyle = i < (MAX_BREAKS - breaks) ? COL.dough : COL.bgDark; ctx.fill(); ctx.lineWidth = 1.5; ctx.strokeStyle = COL.doughDark; ctx.stroke(); }
      }

      function rr(c, x, y, w, h, r) { c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r); c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h); c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r); }
      function drawCard(title, lines, accent) {
        const cw = Math.min(340, W - 40), ch = 44 + lines.length * 28 + 42, cx = CX - cw / 2, cy = CY - ch / 2;
        ctx.fillStyle = "rgba(255,248,240,0.96)"; ctx.beginPath(); rr(ctx, cx, cy, cw, ch, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cx + 16, cy, cw - 32, 3);
        ctx.fillStyle = COL.text; ctx.font = 'bold 24px "Noto Sans KR",sans-serif'; ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cy + 18);
        ctx.font = '400 14px "Noto Sans KR",sans-serif'; ctx.fillStyle = "rgba(92,58,16,0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cy + 52 + i * 28);
        ctx.fillStyle = COL.textLight; ctx.font = '400 12px "Noto Sans KR",sans-serif'; ctx.fillText("화면 터치 또는 ENTER", CX, cy + ch - 22);
      }

      function drawMenu() { ctx.fillStyle = "rgba(255,248,240,0.5)"; ctx.fillRect(0, 0, W, H); drawCard("국수 뽑기", ["면 반죽을 늘리고 접어 국수를 만드세요", "", "조작: 화면 터치 드래그로 늘리기, 탭으로 접기", "클리어: 64가닥 완성", "실패: 반죽 3번 끊김 또는 시간 초과"], COL.doughDark); }
      function drawClear() { clearAnim = clamp(clearAnim + 0.02, 0, 1); ctx.fillStyle = `rgba(255,248,240,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H); if (clearAnim > 0.3) drawCard("완성!", [`${Math.ceil(elapsed)}초 만에 ${strands}가닥 완성`, "맛있는 국수가 되었습니다!"], "#2E8B44"); }
      function drawFailed() { ctx.fillStyle = "rgba(92,58,16,0.25)"; ctx.fillRect(0, 0, W, H); drawCard("실패", [elapsed >= DURATION ? "시간이 다했습니다" : "반죽이 끊어졌습니다", `완성: ${strands} / ${TARGET_STRANDS} 가닥`], COL.accent); }

      function gcp(cx, cy) { const r = canvas.getBoundingClientRect(); return { x: (cx - r.left) * (W / r.width), y: (cy - r.top) * (H / r.height) }; }
      function handleStart() { if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; } }

      canvas.addEventListener("pointerdown", (e) => { e.preventDefault(); if (mode !== "running") { handleStart(); return; } isDragging = true; pDownY = gcp(e.clientX, e.clientY).y; });
      canvas.addEventListener("pointermove", (e) => { if (mode !== "running" || !isDragging) return; stretchPx = clamp((gcp(e.clientX, e.clientY).y - pDownY) * 1.3, 0, MAX_STRETCH); });
      canvas.addEventListener("pointerup", () => { if (mode !== "running") return; if (stretchPx > MAX_STRETCH * FOLD_MIN_RATIO) doFold(); isDragging = false; });
      canvas.addEventListener("pointercancel", () => { isDragging = false; });
      canvas.addEventListener("keydown", (e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (mode !== "running") handleStart(); else doFold(); } });

      function gameLoop(ts) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = ts; return; }
        let dt = Math.min((ts - lastTimestamp) / 1000, MAX_DT); lastTimestamp = ts;
        let steps = 0; while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt); draw();
      }

      function renderGameToText() { return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), strands, breaks, stretchAmount: +stretchPx.toFixed(0), result: window.relayStageResult.status }); }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => { const s = Math.max(1, Math.round(ms / (FIXED_DT * 1000))); for (let i = 0; i < s; i++) update(FIXED_DT); draw(); return renderGameToText(); };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; strands = TARGET_STRANDS; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; breaks = MAX_BREAKS; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      genNoodleLines(); reportReady(); animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
