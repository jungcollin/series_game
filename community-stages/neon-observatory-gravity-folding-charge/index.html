<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>별잡이</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
        background: #080c20; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(255, 200, 60, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(8, 12, 32, 0.92);
        color: #e0d8c0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #080c20; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(255, 200, 60, 0.5); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">별잡이. 밤하늘에서 떨어지는 별을 잡아 별자리 슬롯에 배치하세요. 마우스 또는 화면 터치로 별을 탭하면 중력이 반전됩니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 12개 별을 별자리에 배치하면 클리어. 충전 소진 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="별잡이" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "neon-observatory-gravity-folding-charge",
        title: "별잡이",
        description: "밤하늘에서 떨어지는 별을 중력 반전으로 별자리 슬롯에 배치하세요.",
        creator: "jungcollin",
        genre: "Gravity puzzle",
        clearCondition: "충전을 남기고 별 12개를 별자리에 배치",
        failCondition: "충전 소진 후 미배치 별 남음",
        controls: "터치로 별의 중력 반전 (충전 소모)",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#080c20",
        sky: "#0c1230",
        starGold: "#ffd040",
        starGlow: "rgba(255, 208, 64, 0.4)",
        silver: "#a0b0c8",
        silverGlow: "rgba(160, 176, 200, 0.2)",
        slot: "rgba(160, 176, 200, 0.15)",
        slotFilled: "rgba(255, 208, 64, 0.3)",
        slotLine: "rgba(160, 176, 200, 0.3)",
        charge: "#40c8ff",
        chargeDim: "rgba(64, 200, 255, 0.2)",
        text: "#c8d0e0",
        textDim: "rgba(200, 208, 224, 0.5)",
        danger: "#ff5050",
      };

      // --- State ---
      const TARGET = 12;
      const MAX_CHARGES = 18;
      const GRAVITY = 80;
      const STAR_SPAWN_INTERVAL = 2.2;

      let mode = "menu";
      let elapsed = 0;
      let placed = 0;
      let charges = MAX_CHARGES;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      // Stars
      let stars = [];
      let starSpawnTimer = 1;

      // Constellation slots
      let slots = [];

      // Background stars
      let bgStars = [];

      // Particles
      let particles = [];

      // Constellation lines (between filled slots)
      let constellationLines = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Generation ---
      function generateConstellation() {
        slots = [];
        constellationLines = [];

        // Create constellation pattern in the lower portion of screen
        const baseX = CX - 150;
        const baseY = CY + 40;
        const positions = [
          [0, 0], [60, -30], [120, -10], [180, -40],
          [30, 50], [90, 60], [150, 45], [210, 70],
          [60, 110], [120, 100], [180, 120], [240, 30],
        ];

        for (let i = 0; i < TARGET; i++) {
          const [ox, oy] = positions[i];
          slots.push({
            x: baseX + ox + rand(-10, 10),
            y: baseY + oy + rand(-5, 5),
            r: 14,
            filled: false,
            pulse: 0,
          });
        }

        // Define constellation lines (pairs of slot indices)
        constellationLines = [
          [0, 1], [1, 2], [2, 3], [0, 4], [4, 5],
          [5, 6], [6, 3], [4, 8], [8, 9], [9, 10],
          [5, 9], [6, 11], [3, 11],
        ];
      }

      function initBgStars() {
        bgStars = [];
        for (let i = 0; i < 80; i++) {
          bgStars.push({
            x: rand(0, W), y: rand(0, H),
            r: rand(0.5, 2),
            twinkle: rand(0, Math.PI * 2),
            speed: rand(0.5, 2),
          });
        }
      }

      function spawnStar() {
        const x = rand(60, W - 60);
        stars.push({
          x, y: -15,
          vx: rand(-15, 15),
          vy: GRAVITY * 0.3,
          r: rand(6, 10),
          gravDir: 1, // 1 = down, -1 = up
          wobble: rand(0, Math.PI * 2),
          trail: [],
          flipped: false,
        });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(30, 100);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color, size: rand(2, 4),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; placed = 0; charges = MAX_CHARGES;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        stars = []; particles = [];
        starSpawnTimer = 1.5;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateConstellation();
        initBgStars();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Spawn stars
        starSpawnTimer -= dt;
        if (starSpawnTimer <= 0 && stars.length < 5) {
          spawnStar();
          starSpawnTimer = STAR_SPAWN_INTERVAL;
        }

        // Update stars
        for (let i = stars.length - 1; i >= 0; i--) {
          const s = stars[i];
          s.vy += GRAVITY * s.gravDir * dt;
          s.vy = clamp(s.vy, -250, 250);
          s.x += s.vx * dt;
          s.y += s.vy * dt;
          s.wobble += 3 * dt;

          // Trail
          if (!reducedMotion) {
            s.trail.push({ x: s.x, y: s.y, life: 1 });
            if (s.trail.length > 12) s.trail.shift();
            for (const t of s.trail) t.life -= dt * 3;
          }

          // Bounce off side walls
          if (s.x < 20) { s.x = 20; s.vx = Math.abs(s.vx) * 0.6; }
          if (s.x > W - 20) { s.x = W - 20; s.vx = -Math.abs(s.vx) * 0.6; }

          // Check slot collision
          let slotHit = false;
          for (const slot of slots) {
            if (slot.filled) continue;
            if (dist(s.x, s.y, slot.x, slot.y) < slot.r + s.r) {
              slot.filled = true;
              slot.pulse = 1;
              placed++;
              spawnParticles(slot.x, slot.y, reducedMotion ? 4 : 10, COL.starGold);
              slotHit = true;
              break;
            }
          }
          if (slotHit) { stars.splice(i, 1); continue; }

          // Remove if off screen
          if (s.y > H + 30 || s.y < -50) {
            stars.splice(i, 1);
          }
        }

        // Background star twinkle
        for (const s of bgStars) {
          s.twinkle += s.speed * dt;
        }

        // Slot pulse decay
        for (const slot of slots) {
          if (slot.pulse > 0) slot.pulse *= 0.93;
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.93; p.vy *= 0.93;
          p.life -= dt * 2.5;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        // Win/lose
        if (placed >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (charges <= 0 && stars.length === 0) {
          // Check if there are still unfilled slots
          if (placed < TARGET) {
            mode = "failed";
            window.relayStageResult.status = "failed";
            reportFailed("충전 소진");
          }
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Night sky
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, "#060818");
        grad.addColorStop(0.4, "#0a1028");
        grad.addColorStop(1, "#101830");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Background stars
        drawBgStars();

        // Constellation
        drawConstellation();

        // Falling stars
        drawStars();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(255, 80, 80, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBgStars() {
        for (const s of bgStars) {
          const a = (Math.sin(s.twinkle) * 0.3 + 0.5) * 0.6;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(200, 210, 230, ${a})`;
          ctx.fill();
        }
      }

      function drawConstellation() {
        // Lines
        ctx.lineWidth = 1.5;
        for (const [a, b] of constellationLines) {
          const sa = slots[a], sb = slots[b];
          const bothFilled = sa.filled && sb.filled;
          ctx.beginPath();
          ctx.moveTo(sa.x, sa.y);
          ctx.lineTo(sb.x, sb.y);
          ctx.strokeStyle = bothFilled ? COL.starGold : COL.slotLine;
          ctx.globalAlpha = bothFilled ? 0.6 : 0.2;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Slots
        for (const slot of slots) {
          // Pulse glow
          if (slot.pulse > 0.05) {
            ctx.beginPath();
            ctx.arc(slot.x, slot.y, slot.r + 8 + slot.pulse * 6, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 208, 64, ${slot.pulse * 0.3})`;
            ctx.fill();
          }

          ctx.beginPath();
          ctx.arc(slot.x, slot.y, slot.r, 0, Math.PI * 2);
          if (slot.filled) {
            ctx.fillStyle = COL.slotFilled;
            ctx.fill();
            // Star symbol
            drawStarShape(slot.x, slot.y, 6, 5, COL.starGold);
          } else {
            ctx.strokeStyle = COL.slotLine;
            ctx.lineWidth = 1.5;
            ctx.setLineDash([3, 3]);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      }

      function drawStarShape(cx, cy, r, points, color) {
        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
          const angle = (Math.PI / points) * i - Math.PI / 2;
          const rad = i % 2 === 0 ? r : r * 0.4;
          const px = cx + Math.cos(angle) * rad;
          const py = cy + Math.sin(angle) * rad;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
      }

      function drawStars() {
        for (const s of stars) {
          // Trail
          if (!reducedMotion) {
            for (const t of s.trail) {
              if (t.life <= 0) continue;
              ctx.beginPath();
              ctx.arc(t.x, t.y, s.r * 0.4 * t.life, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(255, 208, 64, ${t.life * 0.3})`;
              ctx.fill();
            }
          }

          // Glow
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r + 8, 0, Math.PI * 2);
          ctx.fillStyle = COL.starGlow;
          ctx.fill();

          // Star body
          drawStarShape(s.x, s.y, s.r, 5, COL.starGold);

          // Direction indicator (small arrow)
          const arrowY = s.gravDir > 0 ? s.y + s.r + 6 : s.y - s.r - 6;
          ctx.beginPath();
          ctx.moveTo(s.x, arrowY);
          ctx.lineTo(s.x - 4, arrowY - 4 * s.gravDir);
          ctx.lineTo(s.x + 4, arrowY - 4 * s.gravDir);
          ctx.closePath();
          ctx.fillStyle = `rgba(255, 208, 64, 0.5)`;
          ctx.fill();
        }
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        // Placed count
        ctx.fillStyle = COL.text;
        ctx.font = "500 15px sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${placed} / ${TARGET}`, 24, 20);

        // Charges (right side)
        ctx.textAlign = "right";
        ctx.fillStyle = charges > 3 ? COL.charge : COL.danger;
        ctx.fillText(`${charges}`, W - 24, 20);

        // Charge bar
        const barW = 80;
        const barX = W - 24 - barW;
        const barY = 40;
        ctx.fillStyle = COL.chargeDim;
        ctx.fillRect(barX, barY, barW, 4);
        ctx.fillStyle = charges > 3 ? COL.charge : COL.danger;
        ctx.fillRect(barX, barY, barW * (charges / MAX_CHARGES), 4);
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(8, 12, 32, 0.92)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.starGold;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 22px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px sans-serif";
        ctx.fillStyle = COL.textDim;
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(200, 208, 224, 0.35)";
        ctx.font = "400 13px sans-serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(8, 12, 32, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("별잡이", [
          "떨어지는 별을 터치해 중력을 반전시키세요",
          "별자리 슬롯에 별을 배치하세요",
          "",
          "조작: 별을 터치하면 중력 반전",
          "클리어: 별 12개를 별자리에 배치",
          "실패: 충전 소진 후 미배치 별 남음",
        ], COL.starGold);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(8, 12, 32, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("별자리 완성", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `남은 충전: ${charges}`,
          ], COL.starGold);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(30, 10, 10, 0.4)";
        ctx.fillRect(0, 0, W, H);
        drawCard("별잡이 실패", [
          "충전이 모두 소진되었습니다",
          `배치: ${placed} / ${TARGET}`,
        ], COL.danger);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);

        // Check if tapping a star to flip its gravity
        for (const s of stars) {
          if (dist(s.x, s.y, p.x, p.y) < s.r + 20) {
            if (charges > 0) {
              charges--;
              s.gravDir *= -1;
              s.vy *= -0.3; // Partial velocity reversal
              s.flipped = true;
              spawnParticles(s.x, s.y, reducedMotion ? 3 : 6, COL.charge);
            } else {
              shake = 4; flashAlpha = 0.15;
            }
            return;
          }
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        // No drag needed for this game
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;

        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          placed, charges, starsOnScreen: stars.length,
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          placed = TARGET;
          for (const s of slots) s.filled = true;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          charges = 0;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      initBgStars();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
