<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusk Subway: Tide Anchor</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 164, 124, 0.22), transparent 34%),
          linear-gradient(180deg, #231929 0%, #0e1424 52%, #060812 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(244, 114, 182, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 11, 22, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at top, rgba(255, 153, 102, 0.12), transparent 34%),
          linear-gradient(180deg, #261926 0%, #11192c 58%, #04060d 100%);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 235, 205, 0.95);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dusk Subway: Tide Anchor. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 포인터
      또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 시선이 몰릴 때는 엄폐
      또는 정지 타이밍 사용, 모바일은 터치와 드래그로 플레이 이며, 황혼 지하철의 기둥
      그림자에 숨어 목격 게이지를 낮게 유지해야 합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dusk Subway: Tide Anchor"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const PLAYER_Y = 418;
      const PLAYER_MIN_X = 110;
      const PLAYER_MAX_X = 850;
      const ANCHOR_Y = 290;
      const ANCHOR_SAFE_RADIUS = 108;
      const MAX_WITNESS = 100;
      const START_DELAY = 0.85;
      const INTERMISSION = 0.9;
      const CARGO_MAX = 100;
      const WITNESS_FAIL_REASON = "주변 시선이 한꺼번에 꽂혔다";
      const CARGO_FAIL_REASON = "중요 화물이 시간 조류에 휩쓸렸다";
      const DESCRIPTION_TEXT =
        "예고선을 읽고 닻을 박아 화물을 고정하되, 시선이 몰릴 때는 정지·엄폐로 목격 게이지를 눌러 버티는 황혼 지하철 생존전";
      const CONTROLS_TEXT =
        "포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 시선이 몰릴 때는 엄폐 또는 정지 타이밍 사용, 모바일은 터치와 드래그로 플레이";
      const CLEAR_TEXT =
        "목격 게이지를 낮게 유지한 채 조류 6파를 넘기며 발전기를 지키면 클리어";
      const FAIL_TEXT =
        "목격 게이지가 끝까지 차거나 중요 화물이 유실되면 즉시 실패";
      const LANE_X = [138, 298, 480, 662, 822];
      const PILLARS = [
        { x: 220, width: 110 },
        { x: 480, width: 124 },
        { x: 742, width: 110 },
      ];
      const WAVE_BLUEPRINTS = [
        {
          label: "Wave 1",
          preview: 2.2,
          impact: 1.15,
          recovery: 0.9,
          startLane: 0,
          targetLane: 1,
          direction: 1,
          scanStart: 0.82,
          scanDuration: 1.3,
          pressure: 0.75,
          witness: 0.72,
          decoyLane: 2,
        },
        {
          label: "Wave 2",
          preview: 2.0,
          impact: 1.08,
          recovery: 0.85,
          startLane: 4,
          targetLane: 3,
          direction: -1,
          scanStart: 0.64,
          scanDuration: 1.36,
          pressure: 0.84,
          witness: 0.82,
          decoyLane: 1,
        },
        {
          label: "Wave 3",
          preview: 1.86,
          impact: 1.02,
          recovery: 0.84,
          startLane: 1,
          targetLane: 2,
          direction: 1,
          scanStart: 0.48,
          scanDuration: 1.45,
          pressure: 0.96,
          witness: 0.92,
          decoyLane: 4,
        },
        {
          label: "Wave 4",
          preview: 1.72,
          impact: 0.98,
          recovery: 0.82,
          startLane: 3,
          targetLane: 1,
          direction: -1,
          scanStart: 0.36,
          scanDuration: 1.56,
          pressure: 1.08,
          witness: 1.02,
          decoyLane: 4,
        },
        {
          label: "Wave 5",
          preview: 1.6,
          impact: 0.94,
          recovery: 0.78,
          startLane: 0,
          targetLane: 2,
          direction: 1,
          scanStart: 0.24,
          scanDuration: 1.72,
          pressure: 1.18,
          witness: 1.14,
          decoyLane: 3,
        },
        {
          label: "Wave 6",
          preview: 1.46,
          impact: 0.9,
          recovery: 0.74,
          startLane: 4,
          targetLane: 2,
          direction: -1,
          scanStart: 0.1,
          scanDuration: 1.86,
          pressure: 1.3,
          witness: 1.26,
          decoyLane: 0,
        },
      ];
      const relayContext = window.RelayRuntime?.readContext("dusk-subway-tide-anchoring-witness") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const keys = {
        left: false,
        right: false,
      };

      const pointer = {
        id: null,
        active: false,
        down: false,
        startX: VIEW.width * 0.5,
        startY: PLAYER_Y,
        lastX: VIEW.width * 0.5,
        lastY: PLAYER_Y,
        moved: false,
        swipeUsed: false,
        downTime: 0,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      function createAmbientLights() {
        return Array.from({ length: 22 }, (_, index) => ({
          x: (index / 22) * VIEW.width,
          y: 92 + (index % 6) * 10,
          width: 38 + (index % 4) * 14,
          speed: 12 + (index % 5) * 5,
          alpha: 0.08 + (index % 5) * 0.024,
        }));
      }

      function createState() {
        return {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          lastReason: "",
          titleFlash: 0,
          sceneTime: 0,
          waveIndex: 0,
          waveDelay: START_DELAY,
          witness: 12,
          cargoIntegrity: CARGO_MAX,
          justStarted: 0,
          summaryAlpha: 0,
          flashAlpha: 0,
          anchorPulse: 0,
          witnessPulse: 0,
          coverPulse: 0,
          messageTimer: 0,
          popups: [],
          particles: [],
          currentWave: null,
          cargoPods: LANE_X.map((x) => ({
            x,
            y: 294,
            glow: 0,
            wobble: Math.random() * Math.PI * 2,
          })),
          ambientLights: createAmbientLights(),
          player: {
            x: VIEW.width * 0.5,
            targetX: VIEW.width * 0.5,
            y: PLAYER_Y,
            velocity: 0,
            bob: 0,
            stillTime: 0,
            cover: 0,
            laneIndex: 2,
          },
          anchor: {
            state: "idle",
            x: VIEW.width * 0.5,
            y: PLAYER_Y - 42,
            laneIndex: null,
            lockedLaneIndex: null,
            targetX: VIEW.width * 0.5,
            progress: 0,
            queuedLaneIndex: null,
            recentFire: 0,
            lineJolt: 0,
          },
          scan: {
            active: false,
            progress: 0,
            beamX: -180,
            strength: 0,
            direction: 1,
          },
          camera: {
            strength: 0,
            x: 0,
            y: 0,
          },
        };
      }

      const state = createState();

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - clamp(value, 0, 1), 3);
      }

      function easeInOutSine(value) {
        return -(Math.cos(Math.PI * clamp(value, 0, 1)) - 1) / 2;
      }

      function easeOutBack(value) {
        const t = clamp(value, 0, 1);
        const c1 = 1.70158;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
      }

      function distance(a, b) {
        return Math.abs(a - b);
      }

      function nearestLaneIndex(x) {
        let bestIndex = 0;
        let bestDistance = Number.POSITIVE_INFINITY;
        LANE_X.forEach((laneX, index) => {
          const currentDistance = distance(laneX, x);
          if (currentDistance < bestDistance) {
            bestDistance = currentDistance;
            bestIndex = index;
          }
        });
        return bestIndex;
      }

      function worldPositionFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const ratioX = VIEW.width / rect.width;
        const ratioY = VIEW.height / rect.height;
        return {
          x: clamp((event.clientX - rect.left) * ratioX, 0, VIEW.width),
          y: clamp((event.clientY - rect.top) * ratioY, 0, VIEW.height),
        };
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function addCameraShake(amount) {
        state.camera.strength = Math.max(state.camera.strength, amount);
      }

      function addPopup(text, x, y, color, options = {}) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: options.life || 1.1,
          maxLife: options.life || 1.1,
          scale: options.scale || 1,
        });
      }

      function addBurst(x, y, options = {}) {
        const count = options.count || 18;
        const palette = options.palette || [
          "rgba(135, 250, 255, 0.95)",
          "rgba(255, 189, 130, 0.95)",
          "rgba(255, 115, 161, 0.95)",
        ];
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.24;
          const speed = (options.speed || 80) * (0.6 + Math.random() * 0.9);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 20,
            life: 0.45 + Math.random() * 0.5,
            maxLife: 0.45 + Math.random() * 0.5,
            size: 2 + Math.random() * 4,
            color: palette[index % palette.length],
          });
        }
      }

      function spawnAmbientSpark() {
        state.particles.push({
          x: 80 + Math.random() * (VIEW.width - 160),
          y: 124 + Math.random() * 320,
          vx: -10 + Math.random() * 20,
          vy: -16 - Math.random() * 24,
          life: 0.8 + Math.random() * 1.2,
          maxLife: 0.8 + Math.random() * 1.2,
          size: 1 + Math.random() * 2.2,
          color: Math.random() > 0.5 ? "rgba(255, 170, 118, 0.22)" : "rgba(141, 250, 255, 0.18)",
        });
      }

      function resetRun() {
        const fresh = createState();
        Object.assign(state, fresh);
        state.mode = "running";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        resetRun();
        addPopup("ANCHOR READY", VIEW.width * 0.5, 108, "#9ffcff", { scale: 1.25, life: 1.1 });
        state.titleFlash = 1;
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.lastReason = "발전기 동기화 유지";
        state.summaryAlpha = 0;
        state.flashAlpha = 0.48;
        window.relayStageResult.status = "cleared";
        addCameraShake(5);
        addBurst(VIEW.width * 0.5, 214, { count: 30, speed: 110 });
        addPopup("WITNESS DROWNED", VIEW.width * 0.5, 168, "#d9ffe7", {
          scale: 1.55,
          life: 1.4,
        });
        reportClearedToHost();
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.summaryAlpha = 0;
        state.flashAlpha = 0.56;
        window.relayStageResult.status = "failed";
        addCameraShake(12);
        addBurst(state.player.x, state.player.y - 42, {
          count: 24,
          speed: 92,
          palette: ["rgba(255, 108, 124, 0.96)", "rgba(255, 204, 138, 0.9)"],
        });
        addPopup("EXPOSED", state.player.x, state.player.y - 72, "#ff9ba8", {
          scale: 1.45,
          life: 1.1,
        });
        reportFailedToHost(reason);
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function isPointerTap() {
        const dx = pointer.lastX - pointer.startX;
        const dy = pointer.lastY - pointer.startY;
        const distanceMoved = Math.hypot(dx, dy);
        return distanceMoved < 16 && performance.now() - pointer.downTime < 260;
      }

      function recallAnchor(manual = true) {
        if (state.anchor.state === "idle") {
          return;
        }
        state.anchor.state = "recalling";
        state.anchor.progress = 0;
        state.anchor.lineJolt = 1;
        state.anchor.recentFire = Math.max(state.anchor.recentFire, manual ? 0.45 : 0.24);
        state.anchorPulse = 1;
        addPopup(manual ? "RECALL" : "RETASK", state.anchor.x, ANCHOR_Y - 26, "#a9fff5", {
          scale: 1.04,
          life: 0.78,
        });
        addBurst(state.anchor.x, ANCHOR_Y + 4, {
          count: manual ? 14 : 10,
          speed: manual ? 86 : 64,
          palette: ["rgba(137, 252, 255, 0.85)", "rgba(255, 203, 147, 0.7)"],
        });
      }

      function fireAnchor(laneIndex, manual = true) {
        if (state.mode !== "running" || state.justStarted > 0) {
          return;
        }
        if (state.anchor.state === "locked" && state.anchor.lockedLaneIndex === laneIndex) {
          addPopup("LOCKED", LANE_X[laneIndex], ANCHOR_Y - 12, "#f9d89b", {
            scale: 0.92,
            life: 0.6,
          });
          return;
        }

        if (state.anchor.state !== "idle") {
          state.anchor.queuedLaneIndex = laneIndex;
          recallAnchor(false);
          return;
        }

        state.anchor.state = "flying";
        state.anchor.laneIndex = laneIndex;
        state.anchor.lockedLaneIndex = null;
        state.anchor.targetX = LANE_X[laneIndex];
        state.anchor.progress = 0;
        state.anchor.recentFire = manual ? 0.95 : 0.75;
        state.anchor.lineJolt = 1;
        state.anchorPulse = 1;
        state.coverPulse = 1;
        addPopup("ANCHOR", LANE_X[laneIndex], ANCHOR_Y - 16, "#a1f7ff", {
          scale: 1.05,
          life: 0.76,
        });
        addBurst(state.player.x, state.player.y - 34, {
          count: 12,
          speed: 76,
          palette: ["rgba(134, 248, 255, 0.9)", "rgba(255, 197, 142, 0.76)"],
        });
      }

      function resolveWaveHit(wave) {
        if (!wave || wave.resolved) {
          return;
        }
        wave.resolved = true;
        const targetX = LANE_X[wave.targetLane];
        const anchored =
          state.anchor.state === "locked" &&
          state.anchor.lockedLaneIndex !== null &&
          distance(LANE_X[state.anchor.lockedLaneIndex], targetX) <= ANCHOR_SAFE_RADIUS;

        if (anchored) {
          const perfect =
            distance(LANE_X[state.anchor.lockedLaneIndex], targetX) <= 26 && state.player.cover > 0.18;
          state.flashAlpha = Math.max(state.flashAlpha, 0.24);
          state.witness = clamp(state.witness - (perfect ? 7.5 : 4.5), 0, MAX_WITNESS);
          state.cargoIntegrity = clamp(state.cargoIntegrity + (perfect ? 4 : 2), 0, CARGO_MAX);
          state.witnessPulse = 1;
          addCameraShake(6);
          addBurst(targetX, ANCHOR_Y + 18, {
            count: perfect ? 26 : 18,
            speed: perfect ? 124 : 92,
            palette: ["rgba(130, 255, 241, 0.96)", "rgba(255, 215, 164, 0.9)"],
          });
          addPopup(perfect ? "VEILED HOLD" : "TIDE HELD", targetX, ANCHOR_Y - 42, "#d8fff1", {
            scale: perfect ? 1.24 : 1.06,
            life: perfect ? 1.18 : 0.92,
          });
        } else {
          const damage = 34;
          state.cargoIntegrity = clamp(state.cargoIntegrity - damage, 0, CARGO_MAX);
          state.flashAlpha = Math.max(state.flashAlpha, 0.52);
          state.witness = clamp(state.witness + 11 + wave.witness * 6, 0, MAX_WITNESS);
          state.witnessPulse = 1;
          addCameraShake(16);
          addBurst(targetX, ANCHOR_Y + 18, {
            count: 26,
            speed: 138,
            palette: ["rgba(255, 111, 143, 0.96)", "rgba(255, 189, 110, 0.9)"],
          });
          addPopup("CARGO SLIP", targetX, ANCHOR_Y - 44, "#ffb9c2", {
            scale: 1.24,
            life: 1,
          });
          if (state.cargoIntegrity <= 0) {
            failStage(CARGO_FAIL_REASON);
          }
        }
      }

      function prepareWave(index) {
        if (index >= WAVE_BLUEPRINTS.length) {
          clearStage();
          return;
        }
        const blueprint = WAVE_BLUEPRINTS[index];
        state.currentWave = {
          ...blueprint,
          time: 0,
          resolved: false,
        };
        state.waveIndex = index;
        state.messageTimer = 0.9;
        addPopup(blueprint.label.toUpperCase(), VIEW.width * 0.5, 88, "#ffd6a2", {
          scale: 1.12,
          life: 0.95,
        });
      }

      function getScanForWave(wave) {
        if (!wave) {
          state.scan.active = false;
          state.scan.progress = 0;
          state.scan.strength = 0;
          return;
        }
        const scanProgress = (wave.time - wave.scanStart) / wave.scanDuration;
        if (scanProgress >= 0 && scanProgress <= 1) {
          state.scan.active = true;
          state.scan.progress = scanProgress;
          state.scan.direction = wave.direction;
          state.scan.strength = wave.witness;
          state.scan.beamX =
            wave.direction > 0
              ? lerp(-140, VIEW.width + 140, scanProgress)
              : lerp(VIEW.width + 140, -140, scanProgress);
          return;
        }
        state.scan.active = false;
        state.scan.progress = 0;
        state.scan.strength = 0;
      }

      function getCoverAmount(x) {
        let best = 0;
        PILLARS.forEach((pillar) => {
          const local = 1 - clamp(distance(x, pillar.x) / (pillar.width * 0.78), 0, 1);
          best = Math.max(best, Math.pow(local, 1.3));
        });
        return best;
      }

      function updatePlayer(dt) {
        const player = state.player;
        let targetX = player.targetX;
        const keyboardDirection = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
        if (keyboardDirection !== 0) {
          targetX = clamp(targetX + keyboardDirection * dt * 360, PLAYER_MIN_X, PLAYER_MAX_X);
        }
        player.targetX = clamp(targetX, PLAYER_MIN_X, PLAYER_MAX_X);
        const previousX = player.x;
        player.x = lerp(player.x, player.targetX, 1 - Math.exp(-dt * 13));
        player.velocity = (player.x - previousX) / Math.max(dt, 0.001);
        player.bob += dt * (1.8 + Math.abs(player.velocity) * 0.01);
        if (Math.abs(player.velocity) < 16) {
          player.stillTime = Math.min(player.stillTime + dt, 3);
        } else {
          player.stillTime = 0;
        }
        player.cover = getCoverAmount(player.x);
        player.laneIndex = nearestLaneIndex(player.x);
      }

      function updateAnchor(dt) {
        const anchor = state.anchor;
        anchor.recentFire = Math.max(0, anchor.recentFire - dt * 1.3);
        anchor.lineJolt = Math.max(0, anchor.lineJolt - dt * 3.2);

        if (anchor.state === "idle") {
          anchor.x = lerp(anchor.x, state.player.x, 1 - Math.exp(-dt * 12));
          anchor.y = lerp(anchor.y, state.player.y - 42, 1 - Math.exp(-dt * 12));
          if (anchor.queuedLaneIndex !== null) {
            const lane = anchor.queuedLaneIndex;
            anchor.queuedLaneIndex = null;
            fireAnchor(lane, false);
          }
          return;
        }

        if (anchor.state === "flying") {
          anchor.progress = clamp(anchor.progress + dt * 3.8, 0, 1);
          const travel = easeOutBack(anchor.progress);
          anchor.x = lerp(state.player.x, anchor.targetX, travel);
          anchor.y = lerp(state.player.y - 42, ANCHOR_Y, travel);
          if (anchor.progress >= 1) {
            anchor.state = "locked";
            anchor.lockedLaneIndex = anchor.laneIndex;
            anchor.x = anchor.targetX;
            anchor.y = ANCHOR_Y;
            addPopup("LOCK", anchor.x, anchor.y - 18, "#fff2b7", {
              scale: 0.92,
              life: 0.64,
            });
          }
          return;
        }

        if (anchor.state === "locked") {
          anchor.x = lerp(anchor.x, LANE_X[anchor.lockedLaneIndex], 1 - Math.exp(-dt * 10));
          anchor.y = lerp(anchor.y, ANCHOR_Y, 1 - Math.exp(-dt * 10));
          return;
        }

        if (anchor.state === "recalling") {
          anchor.progress = clamp(anchor.progress + dt * 4.2, 0, 1);
          const travel = easeOutCubic(anchor.progress);
          anchor.x = lerp(anchor.x, state.player.x, travel);
          anchor.y = lerp(anchor.y, state.player.y - 42, travel);
          if (anchor.progress >= 1) {
            anchor.state = "idle";
            anchor.laneIndex = null;
            anchor.lockedLaneIndex = null;
            anchor.progress = 0;
          }
        }
      }

      function updateWave(dt) {
        if (state.currentWave) {
          const wave = state.currentWave;
          wave.time += dt;
          getScanForWave(wave);
          const impactStart = wave.preview;
          const impactMid = wave.preview + wave.impact * 0.54;
          const total = wave.preview + wave.impact + wave.recovery;
          if (!wave.resolved && wave.time >= impactMid) {
            resolveWaveHit(wave);
          }
          if (wave.time >= total) {
            state.currentWave = null;
            state.waveDelay = INTERMISSION;
            state.scan.active = false;
            state.scan.progress = 0;
            state.scan.strength = 0;
            state.waveIndex += 1;
          }
        } else if (state.waveDelay > 0) {
          state.waveDelay -= dt;
          if (state.waveDelay <= 0) {
            prepareWave(state.waveIndex);
          }
        }
      }

      function updateWitness(dt) {
        if (state.mode !== "running") {
          return;
        }
        const movingAmount = clamp(Math.abs(state.player.velocity) / 230, 0, 1);
        const stillBonus = clamp(state.player.stillTime / 0.36, 0, 1);
        const cover = state.player.cover;
        const anchorExposure =
          state.anchor.state === "flying"
            ? 1
            : state.anchor.state === "locked"
              ? 0.45
              : state.anchor.recentFire * 0.8;
        const scanFocus =
          state.scan.active
            ? 0.26 +
              0.74 *
                (1 - clamp(distance(state.player.x, state.scan.beamX) / 240, 0, 1))
            : 0;

        let witnessDelta = -7 * dt;
        if (state.scan.active) {
          const exposure =
            0.5 +
            movingAmount * 1.4 +
            anchorExposure * 1.35 +
            scanFocus * 0.9 -
            cover * 1.45 -
            stillBonus * 0.9;
          witnessDelta = exposure * state.scan.strength * 8.3 * dt;
        } else {
          witnessDelta =
            (-4.8 - cover * 3.2 - stillBonus * 1.4 + movingAmount * 0.8 + anchorExposure * 0.55) * dt;
        }

        state.witness = clamp(state.witness + witnessDelta, 0, MAX_WITNESS);
        if (witnessDelta > 1.8 * dt) {
          state.witnessPulse = Math.max(state.witnessPulse, 0.34);
        }
        if (state.witness >= MAX_WITNESS) {
          failStage(WITNESS_FAIL_REASON);
        }
      }

      function updateParticles(dt) {
        if (state.mode === "running" && Math.random() < dt * 14) {
          spawnAmbientSpark();
        }

        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          if (particle.life <= 0) {
            return false;
          }
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vy += 40 * dt;
          return true;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          if (popup.life <= 0) {
            return false;
          }
          popup.y -= dt * 18;
          return true;
        });
      }

      function updateAmbient(dt) {
        state.sceneTime += dt;
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * 0.8);
        state.titleFlash = Math.max(0, state.titleFlash - dt * 1.1);
        state.summaryAlpha = Math.min(1, state.summaryAlpha + dt * 1.4);
        state.anchorPulse = Math.max(0, state.anchorPulse - dt * 2.6);
        state.witnessPulse = Math.max(0, state.witnessPulse - dt * 2.9);
        state.coverPulse = Math.max(0, state.coverPulse - dt * 2.2);
        state.messageTimer = Math.max(0, state.messageTimer - dt);
        state.justStarted = Math.max(0, state.justStarted - dt);
        state.camera.strength = Math.max(0, state.camera.strength - dt * 24);
        state.camera.x = (Math.random() - 0.5) * state.camera.strength;
        state.camera.y = (Math.random() - 0.5) * state.camera.strength * 0.65;
        state.ambientLights.forEach((light) => {
          light.x -= light.speed * dt;
          if (light.x < -light.width - 32) {
            light.x = VIEW.width + 40 + Math.random() * 90;
          }
        });
        state.cargoPods.forEach((pod) => {
          pod.wobble += dt * 2.2;
          pod.glow = Math.max(0, pod.glow - dt * 1.7);
        });
      }

      function update(dt) {
        updateAmbient(dt);

        if (state.mode === "running") {
          state.elapsed += dt;
          updatePlayer(dt);
          updateAnchor(dt);
          updateWave(dt);
          updateWitness(dt);
        } else {
          state.player.cover = getCoverAmount(state.player.x);
          updateAnchor(dt);
        }

        updateParticles(dt);
      }

      function renderRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
        if (fillStyle) {
          ctx.fillStyle = fillStyle;
          ctx.fill();
        }
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.stroke();
        }
      }

      function renderWrappedText(text, x, y, maxWidth, lineHeight) {
        const characters = Array.from(text);
        let current = "";
        let lineY = y;
        for (let index = 0; index < characters.length; index += 1) {
          const next = current + characters[index];
          if (ctx.measureText(next).width > maxWidth && current) {
            ctx.fillText(current, x, lineY);
            current = characters[index];
            lineY += lineHeight;
          } else {
            current = next;
          }
        }
        if (current) {
          ctx.fillText(current, x, lineY);
          lineY += lineHeight;
        }
        return lineY;
      }

        ctx.fillRect(0, 431, VIEW.width, 2);

        ctx.strokeStyle = "rgba(255, 232, 205, 0.16)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 386);
        ctx.lineTo(VIEW.width, 386);
        ctx.moveTo(0, 398);
        ctx.lineTo(VIEW.width, 398);
        ctx.stroke();

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        state.ambientLights.forEach((light) => {
          ctx.fillStyle = `rgba(255, 212, 141, ${light.alpha})`;

      }

      function renderPillarsAndCrowd() {
        PILLARS.forEach((pillar, index) => {
          const shadow = ctx.createLinearGradient(pillar.x, 196, pillar.x, 460);
          shadow.addColorStop(0, "rgba(12, 15, 26, 0.12)");
          shadow.addColorStop(1, "rgba(3, 5, 10, 0.54)");
          ctx.fillStyle = shadow;
          ctx.beginPath();
          ctx.moveTo(pillar.x - pillar.width * 0.52, 214);
          ctx.lineTo(pillar.x + pillar.width * 0.52, 214);
          ctx.lineTo(pillar.x + pillar.width * 0.88, 470);
          ctx.lineTo(pillar.x - pillar.width * 0.88, 470);
          ctx.closePath();
          ctx.fill();

          const metalGradient = ctx.createLinearGradient(0, 0, 0, 330);
          metalGradient.addColorStop(0, "#2b3342");
          metalGradient.addColorStop(0.55, "#151b27");
          metalGradient.addColorStop(1, "#0b1018");
          ctx.fillStyle = metalGradient;
          renderRoundedRect(
            pillar.x - pillar.width / 2,
            170,
            pillar.width,
            274,
            18,
            metalGradient,
            "rgba(255, 240, 216, 0.06)"
          );

          ctx.fillStyle = "rgba(255, 203, 145, 0.12)";
          ctx.fillRect(pillar.x - pillar.width / 2 + 12, 188, pillar.width - 24, 6);
          ctx.fillStyle = `rgba(136, 244, 255, ${0.12 + state.coverPulse * 0.18})`;
          ctx.fillRect(pillar.x - 24, 208, 48, 122);

          if (index < 2) {
            ctx.fillStyle = "rgba(12, 16, 27, 0.74)";
            for (let person = 0; person < 5; person += 1) {
              const px = pillar.x - 132 + person * 32 + index * 16;
              const py = 246 + (person % 2) * 12;
              ctx.beginPath();
              ctx.arc(px, py, 10, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillRect(px - 12, py + 10, 24, 42);
            }
          }
        });

        if (!state.scan.active) {
          return;
        }

        ctx.save();
        const beamGradient = ctx.createLinearGradient(0, 60, 0, 420);
        beamGradient.addColorStop(0, `rgba(255, 213, 149, ${0.26 * state.scan.strength})`);
        beamGradient.addColorStop(1, "rgba(255, 213, 149, 0)");
        ctx.fillStyle = beamGradient;
        ctx.beginPath();
        ctx.moveTo(state.scan.beamX - 120, 90);
        ctx.lineTo(state.scan.beamX + 120, 90);
        ctx.lineTo(state.scan.beamX + 220, 460);
        ctx.lineTo(state.scan.beamX - 220, 460);
        ctx.closePath();
        ctx.fill();

        for (let eye = 0; eye < 9; eye += 1) {
          const x = 86 + eye * 96;
          const y = 232 + (eye % 2) * 10;
          const open = 0.35 + 0.65 * (1 - clamp(distance(x, state.scan.beamX) / 220, 0, 1));
          ctx.strokeStyle = `rgba(255, 223, 171, ${0.12 + 0.4 * open})`;
          ctx.lineWidth = 1.7;
          ctx.beginPath();
          ctx.ellipse(x, y, 14, 4 + open * 3, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = `rgba(255, 206, 141, ${0.08 + 0.52 * open})`;
          ctx.beginPath();
          ctx.arc(x, y, 1.6 + open * 1.6, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function renderGeneratorAndCargo() {
        state.cargoPods.forEach((pod, index) => {
          const isTargeted =
            state.currentWave &&
            (state.currentWave.targetLane === index || state.currentWave.decoyLane === index);
          const isAnchorLane = state.anchor.lockedLaneIndex === index || state.anchor.laneIndex === index;
          const sway = Math.sin(state.sceneTime * 2.2 + pod.wobble) * 4;
          const glow = isAnchorLane ? 0.6 + state.anchorPulse * 0.35 : isTargeted ? 0.22 : 0.08;

          ctx.save();
          ctx.translate(0, sway);
          ctx.fillStyle = "rgba(255, 227, 179, 0.08)";
          ctx.fillRect(pod.x - 34, 250, 68, 8);
          ctx.strokeStyle = isTargeted
            ? "rgba(255, 191, 137, 0.85)"
            : "rgba(246, 245, 255, 0.12)";
          ctx.lineWidth = 2;
          renderRoundedRect(
            pod.x - 40,
            264,
            80,
            54,
            18,
            `rgba(19, 25, 39, ${0.92 - glow * 0.16})`,
            ctx.strokeStyle
          );

          const podGradient = ctx.createLinearGradient(pod.x - 34, 264, pod.x + 34, 320);
          podGradient.addColorStop(0, `rgba(79, 207, 255, ${0.14 + glow * 0.34})`);
          podGradient.addColorStop(1, `rgba(255, 160, 120, ${0.12 + glow * 0.28})`);
          ctx.fillStyle = podGradient;
          renderRoundedRect(pod.x - 30, 272, 60, 38, 14, podGradient);
          ctx.strokeStyle = "rgba(255, 243, 219, 0.16)";
          ctx.beginPath();
          ctx.moveTo(pod.x - 16, 288);
          ctx.lineTo(pod.x + 16, 288);
          ctx.moveTo(pod.x, 276);
          ctx.lineTo(pod.x, 304);
          ctx.stroke();

          ctx.shadowColor = isAnchorLane ? "rgba(140, 248, 255, 0.76)" : "transparent";
          ctx.shadowBlur = isAnchorLane ? 18 : 0;
          ctx.fillStyle = `rgba(149, 249, 255, ${0.08 + glow * 0.34})`;
          ctx.fillRect(pod.x - 22, 280, 44, 18);
          ctx.restore();
        });

        const stability = state.cargoIntegrity / CARGO_MAX;
        const corePulse = 0.5 + 0.5 * Math.sin(state.sceneTime * 4.2);
        ctx.save();
        ctx.translate(0, Math.sin(state.sceneTime * 1.6) * 2);
        const shell = ctx.createRadialGradient(480, 356, 12, 480, 356, 86);
        shell.addColorStop(0, `rgba(130, 255, 246, ${0.2 + stability * 0.34})`);
        shell.addColorStop(0.5, `rgba(255, 168, 111, ${0.18 + corePulse * 0.24})`);
        shell.addColorStop(1, "rgba(0, 0, 0, 0)");

        ctx.fillRect(378, 270, 204, 182);

        renderRoundedRect(
          398,
          312,
          164,
          108,
          34,
          "rgba(17, 24, 38, 0.92)",

        ctx.fillStyle = "rgba(255, 186, 134, 0.09)";

        const core = ctx.createRadialGradient(480, 366, 8, 480, 366, 48);
        core.addColorStop(0, `rgba(241, 255, 250, ${0.9 - (1 - stability) * 0.24})`);
        core.addColorStop(0.3, `rgba(128, 255, 247, ${0.68 + corePulse * 0.16})`);
        core.addColorStop(0.7, `rgba(255, 177, 113, ${0.46 + corePulse * 0.18})`);
        core.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = core;
        ctx.beginPath();
        ctx.arc(480, 366, 54, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(148, 255, 247, 0.34)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(480, 366, 30 + corePulse * 5, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = `rgba(255, 98, 127, ${0.12 + (1 - stability) * 0.3})`;
        ctx.fillRect(410, 398, 140, 6);
        ctx.restore();
      }

      function renderForecastLine(x, alpha, lineWidth) {
        ctx.strokeStyle = `rgba(135, 247, 255, ${alpha})`;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.moveTo(x, 206);
        ctx.bezierCurveTo(x - 12, 224, x + 18, 246, x, ANCHOR_Y + 14);
        ctx.stroke();
      }

      function renderWaveEffects() {
        const wave = state.currentWave;
        if (!wave) {
          return;
        }

        const previewProgress = clamp(wave.time / wave.preview, 0, 1);
        const previewAlpha = wave.time < wave.preview ? 0.18 + previewProgress * 0.5 : 0.1;
        const ghostX = lerp(LANE_X[wave.startLane], LANE_X[wave.targetLane], easeInOutSine(previewProgress));
        const decoyX = lerp(LANE_X[wave.decoyLane], LANE_X[wave.targetLane], previewProgress * 0.46);
        renderForecastLine(ghostX, previewAlpha, 6);
        renderForecastLine(decoyX, previewAlpha * 0.36, 3);

        ctx.setLineDash([10, 10]);
        ctx.strokeStyle = `rgba(255, 214, 153, ${0.18 + previewAlpha * 0.6})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(LANE_X[wave.targetLane], 208);
        ctx.lineTo(LANE_X[wave.targetLane], 340);
        ctx.stroke();
        ctx.setLineDash([]);

        if (wave.time >= wave.preview) {
          const local = clamp((wave.time - wave.preview) / wave.impact, 0, 1);
          const crestX =
            wave.direction > 0
              ? lerp(-240, LANE_X[wave.targetLane] + 30, local)
              : lerp(VIEW.width + 240, LANE_X[wave.targetLane] - 30, local);
          const ribbonGradient = ctx.createLinearGradient(crestX - 180, 0, crestX + 180, 0);
          ribbonGradient.addColorStop(0, "rgba(74, 218, 255, 0)");
          ribbonGradient.addColorStop(0.28, `rgba(128, 244, 255, ${0.22 + wave.pressure * 0.1})`);
          ribbonGradient.addColorStop(0.62, `rgba(255, 181, 120, ${0.18 + wave.pressure * 0.1})`);
          ribbonGradient.addColorStop(1, "rgba(255, 181, 120, 0)");
          ctx.fillStyle = ribbonGradient;
          ctx.beginPath();
          ctx.moveTo(crestX - 220, 236);
          ctx.bezierCurveTo(crestX - 112, 194, crestX - 46, 214, crestX + 46, 254);
          ctx.bezierCurveTo(crestX + 118, 286, crestX + 140, 314, crestX + 212, 332);
          ctx.lineTo(crestX + 240, 356);
          ctx.lineTo(crestX - 240, 356);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = `rgba(202, 253, 255, ${0.25 + wave.pressure * 0.24})`;
          ctx.lineWidth = 3 + wave.pressure * 2;
          ctx.beginPath();
          ctx.moveTo(crestX - 196, 238);
          ctx.bezierCurveTo(crestX - 84, 202, crestX - 10, 226, crestX + 76, 272);
          ctx.bezierCurveTo(crestX + 134, 300, crestX + 162, 322, crestX + 208, 330);
          ctx.stroke();
        }

        const timer = Math.max(0, wave.preview + wave.impact * 0.54 - wave.time);
        ctx.fillStyle = "rgba(255, 221, 182, 0.9)";
        ctx.font = "700 14px Avenir Next Condensed, Trebuchet MS, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(`예측 ${timer.toFixed(1)}s`, LANE_X[wave.targetLane], 222);
        ctx.textAlign = "left";
      }

      function renderAnchor() {
        const anchor = state.anchor;
        const lineAlpha =
          anchor.state === "locked"
            ? 0.88
            : anchor.state === "flying" || anchor.state === "recalling"
              ? 0.7
              : 0.12;
        const cableGradient = ctx.createLinearGradient(state.player.x, state.player.y - 36, anchor.x, anchor.y);
        cableGradient.addColorStop(0, `rgba(255, 220, 165, ${lineAlpha * 0.7})`);
        cableGradient.addColorStop(1, `rgba(124, 249, 255, ${lineAlpha})`);

        ctx.strokeStyle = cableGradient;
        ctx.lineWidth = 3.4 + state.anchor.lineJolt * 3.2;
        ctx.beginPath();
        ctx.moveTo(state.player.x + 4, state.player.y - 28);
        ctx.bezierCurveTo(
          lerp(state.player.x, anchor.x, 0.3),
          state.player.y - 70 - state.anchor.lineJolt * 16,
          lerp(state.player.x, anchor.x, 0.76),
          anchor.y - 26,
          anchor.x,
          anchor.y
        );
        ctx.stroke();

        if (anchor.state === "idle") {
          return;

        ctx.save();

                    ? "preview"
                    : wave.time < wave.preview + wave.impact
                      ? "impact"
                      : "recovery",

              }

      function handlePointerDown(event) {
        const world = worldPositionFromEvent(event);
        pointer.id = event.pointerId;
        pointer.active = true;
        pointer.down = true;
        pointer.startX = world.x;
        pointer.startY = world.y;
        pointer.lastX = world.x;
        pointer.lastY = world.y;
        pointer.moved = false;
        pointer.swipeUsed = false;
        pointer.downTime = performance.now();
        canvas.focus();
        canvas.setPointerCapture?.(event.pointerId);
        state.player.targetX = clamp(world.x, PLAYER_MIN_X, PLAYER_MAX_X);

        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
          state.justStarted = 0.16;
          return;
        }
        event.preventDefault();
      }

      function handlePointerMove(event) {
        if (pointer.id !== null && event.pointerId !== pointer.id) {
          return;
        }
        const world = worldPositionFromEvent(event);
        pointer.lastX = world.x;
        pointer.lastY = world.y;
        state.player.targetX = clamp(world.x, PLAYER_MIN_X, PLAYER_MAX_X);
        if (pointer.down) {
          pointer.moved = true;
          const dy = world.y - pointer.startY;
          const dx = world.x - pointer.startX;
          if (
            !pointer.swipeUsed &&
            state.mode === "running" &&
            state.anchor.state !== "idle" &&
            dy > 52 &&
            Math.abs(dy) > Math.abs(dx) + 18
          ) {
            pointer.swipeUsed = true;
            recallAnchor(true);
          }
        }
      }

      function releasePointer(event) {
        if (pointer.id !== null && event && event.pointerId !== pointer.id) {
          return;
        }

        if (state.mode === "running" && pointer.down && !pointer.swipeUsed && isPointerTap()) {
          fireAnchor(nearestLaneIndex(pointer.lastX), true);
        }

        pointer.id = null;
        pointer.active = false;
        pointer.down = false;
        pointer.moved = false;
        pointer.swipeUsed = false;
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen?.();
          return;
        }
        document.documentElement.requestFullscreen?.();
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode !== "running") {
          event.preventDefault();
          startStage();
          return;
        }

        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
          keys.left = true;
          event.preventDefault();
        }
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") {
          keys.right = true;
          event.preventDefault();
        }
        if ((event.key === " " || event.key === "Spacebar") && state.mode === "running") {
          event.preventDefault();
          fireAnchor(state.player.laneIndex, true);
        }
        if (
          (event.key.toLowerCase() === "r" || event.key === "Backspace") &&
          state.mode === "running"
        ) {
          event.preventDefault();
          recallAnchor(true);
        }
        if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          toggleFullscreen();
        }
      }

      function onKeyUp(event) {
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") {
          keys.left = false;
        }
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") {
          keys.right = false;
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);
      canvas.addEventListener("lostpointercapture", releasePointer);
      canvas.addEventListener(
        "touchstart",
        (event) => {
          if (state.mode !== "running") {
            event.preventDefault();
            startFromTouch();
            state.justStarted = 0.16;
          }
        },
        { passive: false }
      );
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
