<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>열차 교차로</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Sans KR", "Helvetica Neue", sans-serif;
        background: #d8ccb8; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(148, 130, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 55, 45, 0.92);
        color: #f0ebe0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #e8ddd0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(80, 140, 80, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">열차 교차로. 신호등에 맞춰 분기점을 전환하여 열차를 올바른 플랫폼으로 안내하세요. 마우스 또는 화면 터치로 분기점을 탭합니다. 모바일에서는 화면 터치만으로 플레이할 수 있습니다. 5 라운드 동안 모든 열차를 올바르게 안내하면 클리어. 탈선 3회로 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="열차 교차로" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "dusk-subway-magnet-braiding-sync",
        title: "열차 교차로",
        description: "신호등에 맞춰 분기점을 전환하여 열차를 올바른 플랫폼으로 안내하세요.",
        creator: "jungcollin",
        genre: "Signal routing",
        clearCondition: "5라운드 동안 모든 열차를 올바르게 안내하면 클리어",
        failCondition: "탈선 3회로 실패",
        controls: "분기점 탭으로 선로 전환",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg: "#e8ddd0",
        platform: "#c8bba8",
        rail: "#7a7570",
        railLight: "#a09888",
        trainA: "#c45040",
        trainB: "#3878a8",
        trainC: "#6a9848",
        signalGreen: "#48a848",
        signalRed: "#c84040",
        signalOff: "#888880",
        text: "#3a3530",
        textLight: "rgba(58, 53, 48, 0.5)",
        beige: "#f0e8d8",
      };

      const TRAIN_COLORS = [COL.trainA, COL.trainB, COL.trainC];
      const PLATFORM_NAMES = ["A", "B", "C"];

      // --- Layout ---
      const JUNCTION_X = CX - 40;
      const JUNCTION_Y = CY;
      const ENTRY_X = 60;
      const PLATFORM_X = W - 120;
      const PLATFORM_YS = [CY - 130, CY, CY + 130];

      // --- State ---
      const TOTAL_ROUNDS = 5;
      const MAX_DERAILS = 3;
      const SIGNAL_WAIT = 2.0;
      const ROUTE_TIME = 3.0;

      let mode = "menu";
      let elapsed = 0;
      let round = 0;
      let derails = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;

      let junctionTarget = 0;
      let junctionHighlight = 0;

      let phase = "signal";
      let phaseTimer = 0;
      let roundTrains = [];
      let currentTrainIdx = 0;
      let trainPos = 0;
      let targetPlatform = 0;
      let signalFlash = 0;
      let resultTimer = 0;

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Round setup ---
      function setupRound() {
        const trainCount = round < 2 ? 2 : 3;
        roundTrains = [];
        const used = [];
        for (let i = 0; i < trainCount; i++) {
          let p;
          do { p = Math.floor(Math.random() * 3); } while (used.includes(p) && used.length < 3);
          used.push(p);
          roundTrains.push({ targetPlatform: p, color: TRAIN_COLORS[p] });
        }
        currentTrainIdx = 0;
        startSignalPhase();
      }

      function startSignalPhase() {
        phase = "signal";
        phaseTimer = SIGNAL_WAIT;
        signalFlash = 0;
        targetPlatform = roundTrains[currentTrainIdx].targetPlatform;
        trainPos = 0;
      }

      function startRoutePhase() {
        phase = "route";
        phaseTimer = ROUTE_TIME;
        trainPos = 0;
      }

      function advanceTrain() {
        currentTrainIdx++;
        if (currentTrainIdx >= roundTrains.length) {
          round++;
          if (round >= TOTAL_ROUNDS) {
            mode = "clear"; clearAnim = 0;
            window.relayStageResult.status = "cleared";
            reportCleared();
            return;
          }
          phase = "result";
          resultTimer = 0.6;
        } else {
          startSignalPhase();
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; round = 0; derails = 0;
        clearAnim = 0; junctionTarget = 0;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        setupRound();
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;
        junctionHighlight *= 0.92;

        if (phase === "signal") {
          phaseTimer -= dt;
          signalFlash += dt * 4;
          if (phaseTimer <= 0) startRoutePhase();
        } else if (phase === "route") {
          phaseTimer -= dt;
          trainPos = clamp(1 - phaseTimer / ROUTE_TIME, 0, 1);

          if (trainPos >= 1) {
            if (junctionTarget === targetPlatform) {
              advanceTrain();
            } else {
              derails++;
              if (derails >= MAX_DERAILS) {
                mode = "failed";
                window.relayStageResult.status = "failed";
                reportFailed("\ud0c8\uc120 \ucd08\uacfc");
                return;
              }
              advanceTrain();
            }
          }
        } else if (phase === "result") {
          resultTimer -= dt;
          if (resultTimer <= 0) setupRound();
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        ctx.fillStyle = COL.bg;
        ctx.fillRect(0, 0, W, H);

        drawTracks();
        drawPlatforms();
        drawJunction();
        drawSignals();
        drawTrain();

        if (mode === "running") drawHUD();
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawTracks() {
        // Entry track
        ctx.strokeStyle = COL.rail;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(ENTRY_X, CY);
        ctx.lineTo(JUNCTION_X, JUNCTION_Y);
        ctx.stroke();

        // Entry ties
        ctx.strokeStyle = COL.railLight;
        ctx.lineWidth = 2;
        for (let x = ENTRY_X; x < JUNCTION_X; x += 20) {
          ctx.beginPath();
          ctx.moveTo(x, CY - 8);
          ctx.lineTo(x, CY + 8);
          ctx.stroke();
        }

        // Branching tracks
        for (let i = 0; i < 3; i++) {
          ctx.strokeStyle = COL.rail;
          ctx.lineWidth = 4;
          const cpx = JUNCTION_X + (PLATFORM_X - JUNCTION_X) * 0.4;
          ctx.beginPath();
          ctx.moveTo(JUNCTION_X, JUNCTION_Y);
          ctx.quadraticCurveTo(cpx, PLATFORM_YS[i], PLATFORM_X, PLATFORM_YS[i]);
          ctx.stroke();

          ctx.strokeStyle = COL.railLight;
          ctx.lineWidth = 2;
          for (let t = 0.1; t < 1; t += 0.08) {
            const bx = (1 - t) * (1 - t) * JUNCTION_X + 2 * (1 - t) * t * cpx + t * t * PLATFORM_X;
            const by = (1 - t) * (1 - t) * JUNCTION_Y + 2 * (1 - t) * t * PLATFORM_YS[i] + t * t * PLATFORM_YS[i];
            const dx = 2 * (1 - t) * (cpx - JUNCTION_X) + 2 * t * (PLATFORM_X - cpx);
            const dy = 2 * (1 - t) * (PLATFORM_YS[i] - JUNCTION_Y);
            const len = Math.hypot(dx, dy) || 1;
            ctx.beginPath();
            ctx.moveTo(bx - (dy / len) * 6, by + (dx / len) * 6);
            ctx.lineTo(bx + (dy / len) * 6, by - (dx / len) * 6);
            ctx.stroke();
          }
        }
      }

      function drawPlatforms() {
        for (let i = 0; i < 3; i++) {
          const py = PLATFORM_YS[i];
          ctx.fillStyle = COL.platform;
          ctx.fillRect(PLATFORM_X - 10, py - 25, 80, 50);
          ctx.strokeStyle = COL.rail;
          ctx.lineWidth = 1;
          ctx.strokeRect(PLATFORM_X - 10, py - 25, 80, 50);

          ctx.fillStyle = TRAIN_COLORS[i];
          ctx.font = "bold 20px 'Noto Sans KR', sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(PLATFORM_NAMES[i], PLATFORM_X + 30, py);
        }
      }

      function drawJunction() {
        const hl = junctionHighlight > 0.05 ? junctionHighlight * 0.3 : 0;
        ctx.beginPath();
        ctx.arc(JUNCTION_X, JUNCTION_Y, 22, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200, 180, 140, ${0.6 + hl})`;
        ctx.fill();
        ctx.strokeStyle = COL.rail;
        ctx.lineWidth = 3;
        ctx.stroke();

        const targetY = PLATFORM_YS[junctionTarget];
        const angle = Math.atan2(targetY - JUNCTION_Y, PLATFORM_X - JUNCTION_X);
        ctx.save();
        ctx.translate(JUNCTION_X, JUNCTION_Y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(8, 0);
        ctx.lineTo(-4, -6);
        ctx.lineTo(-4, 6);
        ctx.closePath();
        ctx.fillStyle = COL.text;
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = COL.text;
        ctx.font = "bold 12px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(PLATFORM_NAMES[junctionTarget], JUNCTION_X, JUNCTION_Y + 28);
      }

      function drawSignals() {
        if (phase !== "signal" || mode !== "running") return;
        const tp = targetPlatform;
        const flashOn = Math.sin(signalFlash) > 0;

        ctx.beginPath();
        ctx.arc(JUNCTION_X - 50, JUNCTION_Y - 30, 12, 0, Math.PI * 2);
        ctx.fillStyle = flashOn ? TRAIN_COLORS[tp] : COL.signalOff;
        ctx.fill();
        ctx.strokeStyle = COL.text;
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = TRAIN_COLORS[tp];
        ctx.font = "bold 16px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(PLATFORM_NAMES[tp], JUNCTION_X - 50, JUNCTION_Y - 30);

        ctx.fillStyle = COL.textLight;
        ctx.font = "400 12px 'Noto Sans KR', sans-serif";
        ctx.fillText(`\uc2e0\ud638 ${Math.ceil(phaseTimer)}`, JUNCTION_X - 50, JUNCTION_Y - 10);
      }

      function drawTrain() {
        if (phase !== "route" || mode !== "running") return;
        const train = roundTrains[currentTrainIdx];
        if (!train) return;

        const tp = junctionTarget;
        let tx, ty;
        if (trainPos < 0.4) {
          const t = trainPos / 0.4;
          tx = lerp(ENTRY_X, JUNCTION_X, t);
          ty = CY;
        } else {
          const t = (trainPos - 0.4) / 0.6;
          const cpx = JUNCTION_X + (PLATFORM_X - JUNCTION_X) * 0.4;
          tx = (1 - t) * (1 - t) * JUNCTION_X + 2 * (1 - t) * t * cpx + t * t * PLATFORM_X;
          ty = (1 - t) * (1 - t) * JUNCTION_Y + 2 * (1 - t) * t * PLATFORM_YS[tp] + t * t * PLATFORM_YS[tp];
        }

        ctx.save();
        ctx.translate(tx, ty);
        ctx.fillStyle = train.color;
        ctx.fillRect(-20, -10, 40, 20);
        ctx.strokeStyle = COL.text;
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-20, -10, 40, 20);
        ctx.fillStyle = COL.beige;
        ctx.fillRect(-14, -6, 8, 5);
        ctx.fillRect(-2, -6, 8, 5);
        ctx.fillRect(10, -6, 8, 5);
        ctx.restore();
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = "500 15px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`\ub77c\uc6b4\ub4dc ${round + 1} / ${TOTAL_ROUNDS}`, 24, 20);

        ctx.textAlign = "right";
        ctx.fillText(`\uc5f4\ucc28 ${currentTrainIdx + 1} / ${roundTrains.length}`, W - 24, 20);

        const dotY = H - 24;
        for (let i = 0; i < MAX_DERAILS; i++) {
          const dotX = CX - (MAX_DERAILS - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_DERAILS - derails ? COL.signalGreen : COL.platform;
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(240, 232, 216, 0.95)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.signalGreen;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.text;
        ctx.font = "bold 22px 'Noto Sans KR', sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = "400 14px 'Noto Sans KR', sans-serif";
        ctx.fillStyle = "rgba(58, 53, 48, 0.7)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);

        ctx.fillStyle = "rgba(58, 53, 48, 0.4)";
        ctx.font = "400 13px 'Noto Sans KR', sans-serif";
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(232, 221, 208, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\uc5f4\ucc28 \uad50\ucc28\ub85c", [
          "\uc2e0\ud638\ub4f1\uc5d0 \ub9de\ucdb0 \ubd84\uae30\uc810\uc744 \uc804\ud658\ud558\uc5ec",
          "\uc5f4\ucc28\ub97c \uc62c\ubc14\ub978 \ud50c\ub7ab\ud3fc\uc73c\ub85c \uc548\ub0b4\ud558\uc138\uc694",
          "",
          "\uc870\uc791: \ubd84\uae30\uc810 \ud0ed\uc73c\ub85c \uc120\ub85c \uc804\ud658",
          "\ud074\ub9ac\uc5b4: 5\ub77c\uc6b4\ub4dc \uc644\uc8fc",
          "\uc2e4\ud328: \ud0c8\uc120 3\ud68c",
        ], COL.signalGreen);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(232, 221, 208, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("\uc6b4\ud589 \uc644\ub8cc", [
            `${Math.ceil(elapsed)}\ucd08 \ub9cc\uc5d0 \uc644\ub8cc`,
            `\ud0c8\uc120: ${derails}\ud68c`,
          ], COL.signalGreen);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(80, 40, 30, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("\uc6b4\ud589 \uc911\ub2e8", [
          "\ud0c8\uc120\uc774 \ub108\ubb34 \ub9ce\uc2b5\ub2c8\ub2e4",
          `\uc644\ub8cc \ub77c\uc6b4\ub4dc: ${round} / ${TOTAL_ROUNDS}`,
        ], COL.signalRed);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        if (dist(p.x, p.y, JUNCTION_X, JUNCTION_Y) < 40) {
          junctionTarget = (junctionTarget + 1) % 3;
          junctionHighlight = 1;
        }
      });

      canvas.addEventListener("pointermove", () => {});

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (mode !== "running") { handleStart(); return; }
          junctionTarget = (junctionTarget + 1) % 3;
          junctionHighlight = 1;
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;

        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          round, derails, junctionTarget,
          phase, currentTrainIdx,
          result: window.relayStageResult.status,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          round = TOTAL_ROUNDS;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          derails = MAX_DERAILS;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
