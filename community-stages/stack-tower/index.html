<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack Tower</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">Stack Tower. 캔버스를 터치하거나 Enter로 시작하세요. 화면 터치 또는 스페이스바로 블록을 떨어뜨려 쌓기.</p>
    <canvas id="game" width="960" height="540" aria-label="Stack Tower" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <nav class="mobile-controls" aria-hidden="true">
      <div class="mobile-controls__row">
        <button id="btn-drop" class="mobile-btn" style="flex: 1 1 200px;">DROP</button>
      </div>
    </nav>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("stack-tower") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const BLOCK_H = 30;
      const INITIAL_W = 300;
      const TARGET_BLOCKS = 10;
      const MIN_WIDTH_RATIO = 0.20;
      const BASE_Y = 480;
      const SWING_BASE_SPEED = 200;

      const COLORS = [
        "#ef4444", "#f97316", "#eab308", "#22c55e", "#06b6d4",
        "#3b82f6", "#8b5cf6", "#ec4899", "#f43f5e", "#14b8a6",
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "좌우로 움직이는 블록을 타이밍에 맞춰 떨어뜨려 쌓으세요!",
      };

      let stack = [];
      let moving = null;
      let falling = null;
      let cutPiece = null;
      let dropRequested = false;
      let cameraY = 0;
      let targetCameraY = 0;
      let particles = [];

      function resetGame() {
        stack = [{
          x: VIEW.width / 2 - INITIAL_W / 2,
          y: BASE_Y,
          w: INITIAL_W,
          color: COLORS[0],
        }];
        moving = {
          x: 0,
          y: BASE_Y - BLOCK_H,
          w: INITIAL_W,
          dir: 1,
          speed: SWING_BASE_SPEED,
          color: COLORS[1],
        };
        falling = null;
        cutPiece = null;
        dropRequested = false;
        cameraY = 0;
        targetCameraY = 0;
        particles = [];
      }

      function getSwingSpeed(level) {
        return SWING_BASE_SPEED + level * 18;
      }

      function spawnNextMoving() {
        const level = stack.length;
        if (level >= TARGET_BLOCKS + 1) return;
        const top = stack[stack.length - 1];
        moving = {
          x: -top.w,
          y: top.y - BLOCK_H,
          w: top.w,
          dir: 1,
          speed: getSwingSpeed(level),
          color: COLORS[level % COLORS.length],
        };
      }

      function spawnParticles(x, y, w, color) {
        for (let i = 0; i < 12; i++) {
          particles.push({
            x: x + Math.random() * w,
            y: y,
            vx: (Math.random() - 0.5) * 200,
            vy: -Math.random() * 150 - 50,
            life: 0.6 + Math.random() * 0.4,
            size: 3 + Math.random() * 4,
            color: color,
          });
        }
      }

      function dropBlock() {
        if (!moving || state.mode !== "running") return;
        const top = stack[stack.length - 1];
        const mLeft = moving.x;
        const mRight = moving.x + moving.w;
        const tLeft = top.x;
        const tRight = top.x + top.w;

        const overlapLeft = Math.max(mLeft, tLeft);
        const overlapRight = Math.min(mRight, tRight);
        const overlapW = overlapRight - overlapLeft;

        if (overlapW <= 0) {
          cutPiece = { x: moving.x, y: moving.y, w: moving.w, vy: 0, color: moving.color };
          moving = null;
          failStage("block_missed");
          return;
        }

        const placed = {
          x: overlapLeft,
          y: moving.y,
          w: overlapW,
          color: moving.color,
        };
        stack.push(placed);
        spawnParticles(placed.x, placed.y, placed.w, placed.color);

        const cutW = moving.w - overlapW;
        if (cutW > 1) {
          const cutX = mLeft < tLeft ? mLeft : overlapRight;
          cutPiece = { x: cutX, y: moving.y, w: cutW, vy: 0, color: moving.color };
        } else {
          cutPiece = null;
          spawnParticles(placed.x, placed.y, placed.w, "#fbbf24");
        }

        moving = null;

        if (overlapW < INITIAL_W * MIN_WIDTH_RATIO) {
          failStage("block_too_narrow");
          return;
        }

        const placedCount = stack.length - 1;
        if (placedCount >= TARGET_BLOCKS) {
          clearStage();
          return;
        }

        targetCameraY = Math.max(0, (stack.length - 5) * BLOCK_H);
        spawnNextMoving();
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) return;
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        resetGame();
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (moving) {
            moving.x += moving.dir * moving.speed * dt;
            if (moving.x + moving.w > VIEW.width - 30) {
              moving.dir = -1;
            } else if (moving.x < 30) {
              moving.dir = 1;
            }
          }

          if (dropRequested && moving) {
            dropRequested = false;
            dropBlock();
          }

          if (cutPiece) {
            cutPiece.vy += 800 * dt;
            cutPiece.y += cutPiece.vy * dt;
            if (cutPiece.y > VIEW.height + 100) cutPiece = null;
          }

          cameraY += (targetCameraY - cameraY) * Math.min(1, dt * 5);

          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 300 * dt;
            p.life -= dt;
            if (p.life <= 0) particles.splice(i, 1);
          }
        }
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.92)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardW = Math.min(680, VIEW.width - 40);
        const cardX = (VIEW.width - cardW) / 2;
        const cardY = 80;
        const cardH = 380;

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(cardX, cardY, cardW, cardH);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(cardX, cardY, cardW, cardH);

        ctx.fillStyle = accent;
        ctx.font = "700 38px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, cardY + 60);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 20px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, cardY + 120 + index * 38);
        });
        ctx.textAlign = "left";
      }

      function drawBlock(block, offsetY) {
        const y = block.y + offsetY;
        ctx.fillStyle = block.color;
        ctx.fillRect(block.x, y, block.w, BLOCK_H);
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.lineWidth = 1;
        ctx.strokeRect(block.x, y, block.w, BLOCK_H);
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.fillRect(block.x, y, block.w, 4);
      }

      function drawHUD() {
        const placedCount = stack.length - 1;
        const barW = 200;
        const barH = 16;
        const barX = VIEW.width / 2 - barW / 2;
        const barY = 18;

        ctx.fillStyle = "rgba(30, 41, 59, 0.8)";
        ctx.fillRect(barX - 60, barY - 6, barW + 120, barH + 36);

        ctx.fillStyle = "#334155";
        ctx.fillRect(barX, barY, barW, barH);
        const ratio = placedCount / TARGET_BLOCKS;
        ctx.fillStyle = ratio >= 0.8 ? "#22c55e" : ratio >= 0.5 ? "#eab308" : "#3b82f6";
        ctx.fillRect(barX, barY, barW * ratio, barH);
        ctx.strokeStyle = "#64748b";
        ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barW, barH);

        ctx.fillStyle = "#f8fafc";
        ctx.font = "bold 18px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(`${placedCount} / ${TARGET_BLOCKS}`, VIEW.width / 2, barY + barH + 24);

        if (stack.length > 1) {
          const top = stack[stack.length - 1];
          const widthPercent = Math.round((top.w / INITIAL_W) * 100);
          ctx.fillStyle = widthPercent < 30 ? "#ef4444" : "#94a3b8";
          ctx.font = "600 14px Trebuchet MS";
          ctx.fillText(`폭: ${widthPercent}%`, VIEW.width / 2, barY + barH + 44);
        }
        ctx.textAlign = "left";
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        if (state.mode === "menu") {
          renderCard("Stack Tower", [
            "좌우로 움직이는 블록을 타이밍 맞춰 쌓으세요!",
            "삐져나온 부분은 잘려나갑니다",
            "",
            "조작: 터치 / 스페이스바로 블록 떨어뜨리기",
            "클리어: 블록 10개 쌓기",
            "실패: 블록 폭이 원래의 20% 미만으로 줄어들면 실패",
          ], "#f97316");
          return;
        }

        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const offsetY = cameraY;

        for (const block of stack) {
          drawBlock(block, offsetY);
        }

        if (moving) {
          drawBlock(moving, offsetY);
        }

        if (cutPiece) {
          ctx.globalAlpha = 0.6;
          ctx.fillStyle = cutPiece.color;
          ctx.fillRect(cutPiece.x, cutPiece.y + offsetY, cutPiece.w, BLOCK_H);
          ctx.globalAlpha = 1;
        }

        for (const p of particles) {
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x - p.size / 2, p.y + offsetY - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;

        if (state.mode === "running") {
          drawHUD();
        }

        if (state.mode === "failed") {
          renderCard("실패!", [
            "블록 폭이 너무 좁아졌습니다!",
            `쌓은 블록: ${stack.length - 1}개`,
            `시간: ${state.lastRunTime.toFixed(1)}초`,
            "",
            "터치 또는 Enter로 재시작",
          ], "#b91c1c");
          return;
        }

        if (state.mode === "cleared") {
          renderCard("클리어!", [
            `블록 ${TARGET_BLOCKS}개를 성공적으로 쌓았습니다!`,
            `클리어 시간: ${state.lastRunTime.toFixed(1)}초`,
            "",
            "터치 또는 Enter로 재시작",
          ], "#15803d");
          return;
        }
      }

      function renderGameToText() {
        const extra = {};
        if (state.mode === "running") {
          extra.stacked = stack.length - 1;
          extra.target = TARGET_BLOCKS;
          if (stack.length > 1) {
            const top = stack[stack.length - 1];
            extra.top_block_width = Math.round(top.w);
            extra.width_ratio = Math.round((top.w / INITIAL_W) * 100) + "%";
          }
          if (moving) {
            extra.moving_x = Math.round(moving.x);
            extra.moving_w = Math.round(moving.w);
          }
        }
        return JSON.stringify({
          coordinate_system: "canvas 960x540",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          ...extra,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared")) {
          event.preventDefault();
          startStage();
          return;
        }
        if (event.key === " " && state.mode === "running") {
          event.preventDefault();
          dropRequested = true;
        }
      }

      canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        } else if (state.mode === "running") {
          dropRequested = true;
        }
      }, { passive: false });

      canvas.addEventListener("click", (e) => {
        canvas.focus();
        if (state.mode === "running") {
          dropRequested = true;
        }
      });

      const btnDrop = document.getElementById("btn-drop");
      if (btnDrop) {
        btnDrop.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          btnDrop.dataset.active = "true";
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          } else if (state.mode === "running") {
            dropRequested = true;
          }
        });
        btnDrop.addEventListener("pointerup", (e) => {
          e.preventDefault();
          btnDrop.dataset.active = "false";
        });
        btnDrop.addEventListener("pointercancel", () => {
          btnDrop.dataset.active = "false";
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "stack-tower",
        title: "Stack Tower",
        creator: "Claude",
        genre: "Arcade precision",
        clearCondition: "블록 10개를 성공적으로 쌓으면 클리어",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
