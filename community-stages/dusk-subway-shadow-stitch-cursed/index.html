<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dusk Subway: Shadow Stitch</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f4f0ff;
        --shadow-ink: rgba(17, 12, 31, 0.9);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at 18% 12%, rgba(255, 180, 125, 0.2), transparent 28%),
          radial-gradient(circle at 82% 8%, rgba(111, 139, 255, 0.2), transparent 24%),
          linear-gradient(180deg, #0f1020 0%, #080b17 44%, #070914 100%);
      }

      body {
        display: grid;
        place-items: center;
        touch-action: none;
      }

      a,
      canvas,
      button {
        -webkit-tap-highlight-color: rgba(255, 184, 133, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 30;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(10, 12, 24, 0.92);
        color: #fbfbff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        outline: 3px solid rgba(255, 186, 109, 0.56);
        outline-offset: 3px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        max-width: 100%;
        max-height: 100%;
        background: transparent;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 234, 204, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 14px;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__cluster {
        display: flex;
        gap: 10px;
        pointer-events: auto;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        min-width: 66px;
        min-height: 66px;
        padding: 0 18px;
        background:
          linear-gradient(180deg, rgba(39, 46, 76, 0.94), rgba(14, 17, 33, 0.96));
        color: #f8f2ff;
        font: 800 19px/1 "Avenir Next", "Apple SD Gothic Neo", sans-serif;
        letter-spacing: 0.04em;
        box-shadow:
          0 16px 28px rgba(2, 4, 11, 0.38),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: translateY(1px) scale(0.97);
        background:
          linear-gradient(180deg, rgba(255, 154, 109, 0.96), rgba(190, 68, 87, 0.96));
      }

      .mobile-btn--cut {
        min-width: 92px;
        background:
          linear-gradient(180deg, rgba(77, 84, 116, 0.96), rgba(19, 23, 40, 0.96));
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 680px) {
        .mobile-controls {
          justify-content: center;
          gap: 10px;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          gap: 8px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__cluster {
          gap: 8px;
        }

        .mobile-btn {
          min-width: 58px;
          min-height: 58px;
          padding: 0 14px;
          font-size: 17px;
        }

        .mobile-btn--cut {
          min-width: 82px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <div class="frame">
      <p id="stage-instructions" class="sr-only">
        Dusk Subway: Shadow Stitch. 화면을 터치하거나 Enter로 시작하세요. 좌우 이동 후 현재
        심봉에서 클릭 또는 터치 드래그로 그림자 솔기를 봉합합니다. 더블탭이나 끊기 버튼으로 실을
        자를 수 있습니다. 저주 픽업은 페널티 아이콘을 보고 선택하세요. 클리어 조건은 저주를
        버티며 4개 제단을 모두 점등하는 것입니다. 실패 조건은 저주 한계 초과 또는 강한 빛에 오래
        노출돼 실이 타는 것입니다.
      </p>
      <canvas
        id="game"
        width="960"
        height="540"
        aria-label="Dusk Subway: Shadow Stitch"
        aria-describedby="stage-instructions"
        tabindex="0"
      ></canvas>
    </div>
    <div class="mobile-controls" aria-label="모바일 조작 버튼">
      <div class="mobile-controls__cluster">
        <button
          class="mobile-btn"
          type="button"
          data-control="left"
          data-active="false"
          aria-label="왼쪽으로 이동"
        >
          ◀
        </button>
        <button
          class="mobile-btn"
          type="button"
          data-control="right"
          data-active="false"
          aria-label="오른쪽으로 이동"
        >
          ▶
        </button>
      </div>
      <div class="mobile-controls__cluster">
        <button
          class="mobile-btn mobile-btn--cut"
          type="button"
          data-control="cut"
          data-active="false"
          aria-label="현재 실 끊기"
        >
          끊기
        </button>
      </div>
    </div>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const REDUCED_MOTION = window.matchMedia?.("(prefers-reduced-motion: reduce)").matches ?? false;
      const LOW_EFFECT_MODE = REDUCED_MOTION || navigator.webdriver === true;
      const numberFormat = new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 1 });
      const relayContext = window.RelayRuntime?.readContext("dusk-subway-shadow-stitch-cursed") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const COLORS = {
        duskGlow: "#ffb07f",
        duskCore: "#ff785a",
        coldGlow: "#71b8ff",
        shadow: "#0d1020",
        deepShadow: "#090b16",
        lilac: "#b89cff",
        haze: "rgba(225, 185, 255, 0.26)",
        warning: "#ff6f67",
        caution: "#ffcd7a",
        safe: "#89ffe3",
        track: "#55607a",
      };

      const NODES = [
        { x: 92, y: 386, label: "진입" },
        { x: 286, y: 260, label: "제단 I" },
        { x: 482, y: 392, label: "제단 II" },
        { x: 678, y: 220, label: "제단 III" },
        { x: 872, y: 340, label: "제단 IV" },
      ];
      const PLATFORM_HALF = 0.18;
      const BRIDGE_START = PLATFORM_HALF;
      const BRIDGE_END = 1 - PLATFORM_HALF;
      const BASE_MOVE_SPEED = 0.82;
      const BASE_SEAM_WIDTH = 28;
      const BASE_HEAT_CAP = 100;
      const MAX_CURSE = 100;
      const GAP_COUNT = NODES.length - 1;
      const PANEL_FONT = '"Avenir Next", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif';

      const PICKUP_PHASES = [
        [
          {
            id: "night-pass",
            title: "야간 패스",
            boon: "이동속도 +18%",
            penalty: "열 흡수 +12%",
            penaltyIcon: "열+",
            curse: 18,
            coolBurst: 4,
            effects: { speed: 0.18, heatRate: 0.12 },
          },
          {
            id: "glass-spool",
            title: "유리 실패",
            boon: "봉합 폭 +14px",
            penalty: "저주 +34 / 열 흡수 +26%",
            penaltyIcon: "☠☠",
            curse: 34,
            coolBurst: 6,
            effects: { seamWidth: 14, heatRate: 0.26 },
          },
        ],
        [
          {
            id: "cold-thread",
            title: "냉각 실타래",
            boon: "열 냉각 +28%",
            penalty: "이동속도 -6%",
            penaltyIcon: "둔",
            curse: 20,
            coolBurst: 8,
            effects: { coolRate: 0.28, speed: -0.06 },
          },
          {
            id: "rush-heels",
            title: "환승 굽",
            boon: "이동속도 +30%",
            penalty: "냉각 -30%",
            penaltyIcon: "냉-",
            curse: 32,
            coolBurst: 2,
            effects: { speed: 0.3, coolRate: -0.3 },
          },
        ],
        [
          {
            id: "ash-filter",
            title: "재 필터",
            boon: "최대 열 +16",
            penalty: "봉합 폭 -4px",
            penaltyIcon: "폭-",
            curse: 22,
            coolBurst: 10,
            effects: { maxHeat: 16, seamWidth: -4 },
          },
          {
            id: "greedy-charm",
            title: "탐식 부적",
            boon: "열 즉시 -18",
            penalty: "저주 +38 / 열 흡수 +35%",
            penaltyIcon: "☠☠☠",
            curse: 38,
            coolBurst: 18,
            effects: { heatRate: 0.35 },
          },
        ],
      ];

      const input = { left: false, right: false };
      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let lastTapTime = 0;
      let lastTapX = 0;
      let lastTapY = 0;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "빛 경계선을 꿰매 길을 만들고, 페널티 아이콘을 보고 저주 픽업을 고르세요.",
        ambientTime: 0,
        playerTrack: 0,
        playerVelocity: 0,
        playerBob: 0,
        threadHeat: 0,
        curse: 0,
        targetGap: 0,
        targetAltar: 1,
        altarsLit: [false, false, false, false],
        bridges: Array.from({ length: GAP_COUNT }, () => ({ active: false })),
        particles: [],
        sparks: [],
        popups: [],
        trainStrips: Array.from({ length: 7 }, (_, index) => ({
          y: 64 + index * 54,
          speed: 22 + index * 7,
          offset: (index * 113) % 240,
        })),
        stitch: {
          active: false,
          gapIndex: 0,
          progress: 0,
          points: [],
          lastCursor: null,
        },
        pickupPhase: 0,
        pickupOptions: [],
        pickupRects: [],
        chosenPickups: [],
        effects: {
          speed: 1,
          seamWidth: 0,
          coolRate: 1,
          heatRate: 1,
          maxHeat: 0,
        },
        screenShake: 0,
        flash: 0,
        promptPulse: 0,
      };

      window.relayStageMeta = {
        id: "dusk-subway-shadow-stitch-cursed",
        title: "Dusk Subway: Shadow Stitch",
        description: "빛 경계선을 꿰매 길을 만들고, 저주 픽업을 골라 4개 제단을 밝혀라.",
        creator: "jungcollin",
        genre: "Light-shadow action / 저주 픽업",
        clearCondition: "저주를 버티며 4개 제단을 모두 점등",
        failCondition: "저주 한계 초과 또는 실이 과열되면 실패",
        controls: "이동, 클릭 또는 터치 드래그로 봉합, 더블탭으로 실 끊기, 모바일 터치 가능",
      };

      window.relayStageResult = { status: "running" };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function distance(ax, ay, bx, by) {
        const dx = ax - bx;
        const dy = ay - by;
        return Math.hypot(dx, dy);
      }

      function normalize(dx, dy) {
        const length = Math.hypot(dx, dy) || 1;
        return { x: dx / length, y: dy / length };
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function recalculateEffects() {
        const totals = {
          speed: 1,
          seamWidth: 0,
          coolRate: 1,
          heatRate: 1,
          maxHeat: 0,
        };
        for (const pickup of state.chosenPickups) {
          totals.speed += pickup.effects.speed || 0;
          totals.seamWidth += pickup.effects.seamWidth || 0;
          totals.coolRate += pickup.effects.coolRate || 0;
          totals.heatRate += pickup.effects.heatRate || 0;
          totals.maxHeat += pickup.effects.maxHeat || 0;
        }
        totals.speed = clamp(totals.speed, 0.65, 1.65);
        totals.coolRate = clamp(totals.coolRate, 0.45, 1.85);
        totals.heatRate = clamp(totals.heatRate, 0.8, 1.9);
        state.effects = totals;
      }

      function getHeatCap() {
        return BASE_HEAT_CAP + state.effects.maxHeat;
      }

      function getMoveSpeed() {
        return BASE_MOVE_SPEED * state.effects.speed;
      }

      function getSeamWidth() {
        return BASE_SEAM_WIDTH + state.effects.seamWidth;
      }

      function renderNowIfNeeded() {
        if (LOW_EFFECT_MODE) {
          render();
        }
      }

      function resetStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.playerTrack = 0;
        state.playerVelocity = 0;
        state.playerBob = 0;
        state.threadHeat = 0;
        state.curse = 0;
        state.targetGap = 0;
        state.targetAltar = 1;
        state.altarsLit = [false, false, false, false];
        state.bridges = Array.from({ length: GAP_COUNT }, () => ({ active: false }));
        state.particles = [];
        state.sparks = [];
        state.popups = [];
        state.stitch = { active: false, gapIndex: 0, progress: 0, points: [], lastCursor: null };
        state.pickupPhase = 0;
        state.pickupOptions = [];
        state.pickupRects = [];
        state.chosenPickups = [];
        state.screenShake = 0;
        state.flash = 0;
        state.promptPulse = 0;
        recalculateEffects();
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        renderNowIfNeeded();
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.screenShake = 16;
        state.flash = 1;
        spawnBurst(getPlayerPosition().x, getPlayerPosition().y, 30, COLORS.warning, 1.3);
        addPopup("실이 탔습니다", getPlayerPosition().x, getPlayerPosition().y - 24, COLORS.warning, 26);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
        renderNowIfNeeded();
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.screenShake = 10;
        state.flash = 0.9;
        spawnBurst(getPlayerPosition().x, getPlayerPosition().y, 44, COLORS.safe, 1.6);
        addPopup("모든 제단 점등", getPlayerPosition().x, getPlayerPosition().y - 18, COLORS.safe, 26);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
        renderNowIfNeeded();
      }

      function toCanvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (event.clientX - rect.left) * (canvas.width / rect.width),
          y: (event.clientY - rect.top) * (canvas.height / rect.height),
        };
      }

      function getGapGeometry(index) {
        const startNode = NODES[index];
        const endNode = NODES[index + 1];
        const dir = normalize(endNode.x - startNode.x, endNode.y - startNode.y);
        const perp = { x: -dir.y, y: dir.x };
        const startAnchor = {
          x: startNode.x + dir.x * 56,
          y: startNode.y + dir.y * 56,
        };
        const endAnchor = {
          x: endNode.x - dir.x * 56,
          y: endNode.y - dir.y * 56,
        };
        return { startNode, endNode, dir, perp, startAnchor, endAnchor };
      }

      function sampleGapPoint(index, t) {
        const gap = getGapGeometry(index);
        const sway = Math.sin(state.ambientTime * 0.8 + index * 1.4) * 10;
        const curve = Math.sin(t * Math.PI + state.ambientTime * 1.2 + index) * (30 + sway);
        const baseX = lerp(gap.startAnchor.x, gap.endAnchor.x, t);
        const baseY = lerp(gap.startAnchor.y, gap.endAnchor.y, t);
        return {
          x: baseX + gap.perp.x * curve,
          y: baseY + gap.perp.y * curve,
        };
      }

      function getTrackPoint(track) {
        const clamped = clamp(track, 0, NODES.length - 1);
        for (let index = 0; index < NODES.length; index += 1) {
          if (Math.abs(clamped - index) <= PLATFORM_HALF) {
            const center = NODES[index];
            const prev = NODES[Math.max(0, index - 1)];
            const next = NODES[Math.min(NODES.length - 1, index + 1)];
            const tangent = normalize(next.x - prev.x, next.y - prev.y);
            const offset = ((clamped - index) / PLATFORM_HALF) * 46;
            return {
              x: center.x + tangent.x * offset,
              y: center.y + tangent.y * offset,
            };
          }
        }

        const gapIndex = clamp(Math.floor(clamped), 0, GAP_COUNT - 1);
        const gapT = clamp((clamped - gapIndex - BRIDGE_START) / (BRIDGE_END - BRIDGE_START), 0, 1);
        return sampleGapPoint(gapIndex, gapT);
      }

      function getPlayerPosition() {
        const point = getTrackPoint(state.playerTrack);
        return {
          x: point.x,
          y: point.y + Math.sin(state.playerBob) * 3,
        };
      }

      function isGapOpen(gapIndex) {
        return Boolean(state.bridges[gapIndex]?.active);
      }

      function isTrackAccessible(track) {
        const clamped = clamp(track, 0, NODES.length - 1);
        for (let index = 0; index < NODES.length; index += 1) {
          if (Math.abs(clamped - index) <= PLATFORM_HALF) {
            return true;
          }
        }
        for (let gapIndex = 0; gapIndex < GAP_COUNT; gapIndex += 1) {
          if (
            clamped >= gapIndex + BRIDGE_START &&
            clamped <= gapIndex + BRIDGE_END &&
            isGapOpen(gapIndex)
          ) {
            return true;
          }
        }
        return false;
      }

      function movePlayer(dt) {
        const direction = (input.right ? 1 : 0) - (input.left ? 1 : 0);
        state.playerVelocity = direction;
        if (!direction) {
          return;
        }
        const step = direction * getMoveSpeed() * dt;
        const desired = state.playerTrack + step;
        const slices = Math.max(1, Math.ceil(Math.abs(step) / 0.015));
        const increment = step / slices;
        for (let index = 0; index < slices; index += 1) {
          const next = clamp(state.playerTrack + increment, 0, NODES.length - 1);
          if (isTrackAccessible(next)) {
            state.playerTrack = next;
          } else {
            break;
          }
        }
      }

      function getBeamStrength(gapIndex, t) {
        const baseTime = state.elapsed * (0.24 + gapIndex * 0.015);
        const beamA = (baseTime + gapIndex * 0.17) % 1;
        const beamB = (1 - baseTime * 0.78 + gapIndex * 0.23) % 1;
        const wrapDistance = (a, b) => {
          const delta = Math.abs(a - b);
          return Math.min(delta, 1 - delta);
        };
        const fromA = Math.exp(-Math.pow(wrapDistance(t, beamA) / 0.09, 2));
        const fromB = Math.exp(-Math.pow(wrapDistance(t, beamB) / 0.11, 2));
        return clamp(fromA * 0.9 + fromB * 0.7, 0, 1.25);
      }

      function findNearestOnGap(gapIndex, x, y) {
        let best = { t: 0, point: sampleGapPoint(gapIndex, 0), distance: Number.POSITIVE_INFINITY };
        for (let sample = 0; sample <= 48; sample += 1) {
          const t = sample / 48;
          const point = sampleGapPoint(gapIndex, t);
          const dist = distance(x, y, point.x, point.y);
          if (dist < best.distance) {
            best = { t, point, distance: dist };
          }
        }
        return best;
      }

      function spawnBurst(x, y, count, color, power = 1) {
        const total = LOW_EFFECT_MODE ? Math.ceil(count * 0.4) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / total + Math.random() * 0.4;
          const velocity = (60 + Math.random() * 120) * power;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            size: 2 + Math.random() * 4,
            life: 0.45 + Math.random() * 0.5,
            color,
          });
        }
      }

      function spawnSpark(x, y, color) {
        state.sparks.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 90,
          vy: -20 - Math.random() * 70,
          life: 0.22 + Math.random() * 0.25,
          size: 1.5 + Math.random() * 2.5,
          color,
        });
      }

      function addPopup(text, x, y, color, size = 18) {
        state.popups.push({
          text,
          x,
          y,
          color,
          size,
          life: 0.8,
        });
      }

      function activateBridge(gapIndex) {
        state.bridges[gapIndex].active = true;
        state.stitch.active = false;
        state.stitch.progress = 0;
        state.stitch.points = [];
        state.stitch.lastCursor = null;
        state.screenShake = Math.max(state.screenShake, 7);
        state.flash = Math.max(state.flash, 0.35);
        const point = sampleGapPoint(gapIndex, 0.6);
        spawnBurst(point.x, point.y, 24, COLORS.lilac, 1.2);
        addPopup("봉합 완료", point.x, point.y - 22, COLORS.lilac, 22);
        renderNowIfNeeded();
      }

      function cutCurrentThread() {
        if (state.mode !== "running") {
          return;
        }
        if (state.stitch.active) {
          const cursor = state.stitch.lastCursor?.point || getPlayerPosition();
          state.stitch = { active: false, gapIndex: 0, progress: 0, points: [], lastCursor: null };
          spawnBurst(cursor.x, cursor.y, 12, COLORS.warning, 0.8);
          addPopup("실 절단", cursor.x, cursor.y - 12, COLORS.warning, 18);
          renderNowIfNeeded();
          return;
        }
        const gapIndex = state.targetGap;
        if (!state.bridges[gapIndex]?.active || state.altarsLit[gapIndex]) {
          return;
        }
        state.bridges[gapIndex].active = false;
        if (
          state.playerTrack > gapIndex + BRIDGE_START &&
          state.playerTrack < gapIndex + BRIDGE_END
        ) {
          state.playerTrack = gapIndex + PLATFORM_HALF - 0.01;
        }
        const point = sampleGapPoint(gapIndex, 0.48);
        spawnBurst(point.x, point.y, 14, COLORS.warning, 0.9);
        addPopup("다리를 끊음", point.x, point.y - 18, COLORS.warning, 18);
        renderNowIfNeeded();
      }

      function beginStitch(x, y) {
        if (state.mode !== "running") {
          return false;
        }
        const gapIndex = state.targetGap;
        if (gapIndex >= GAP_COUNT || state.bridges[gapIndex]?.active) {
          return false;
        }
        const geometry = getGapGeometry(gapIndex);
        if (distance(x, y, geometry.startAnchor.x, geometry.startAnchor.y) > 38) {
          return false;
        }
        if (Math.abs(state.playerTrack - gapIndex) > 0.28) {
          return false;
        }
        state.stitch = {
          active: true,
          gapIndex,
          progress: 0,
          points: [{ x, y, valid: true }],
          lastCursor: { x, y, point: geometry.startAnchor, distance: 0, t: 0 },
        };
        addPopup("봉합 시작", geometry.startAnchor.x, geometry.startAnchor.y - 18, COLORS.caution, 16);
        renderNowIfNeeded();
        return true;
      }

      function updateStitchPointer(x, y) {
        if (!state.stitch.active) {
          return;
        }
        const nearest = findNearestOnGap(state.stitch.gapIndex, x, y);
        const seamWidth = getSeamWidth();
        const valid = nearest.distance <= seamWidth;
        if (valid && nearest.t + 0.08 >= state.stitch.progress) {
          state.stitch.progress = Math.max(state.stitch.progress, nearest.t);
          if (!REDUCED_MOTION && Math.random() < 0.34) {
            spawnSpark(nearest.point.x, nearest.point.y, COLORS.lilac);
          }
        } else if (!valid) {
          state.threadHeat += clamp((nearest.distance - seamWidth) * 0.12, 0.6, 3.8) * state.effects.heatRate;
          state.screenShake = Math.max(state.screenShake, 3.5);
          if (!REDUCED_MOTION) {
            spawnSpark(x, y, COLORS.warning);
          }
        }
        state.stitch.points.push({ x, y, valid });
        if (state.stitch.points.length > 100) {
          state.stitch.points.shift();
        }
        state.stitch.lastCursor = { x, y, ...nearest };
        const geometry = getGapGeometry(state.stitch.gapIndex);
        if (
          state.stitch.progress >= 0.985 &&
          distance(x, y, geometry.endAnchor.x, geometry.endAnchor.y) <= seamWidth + 16
        ) {
          activateBridge(state.stitch.gapIndex);
        } else {
          renderNowIfNeeded();
        }
      }

      function endStitch(cancelled = false) {
        if (!state.stitch.active) {
          return;
        }
        if (cancelled || state.stitch.progress < 0.985) {
          const source = state.stitch.lastCursor?.point || getPlayerPosition();
          spawnBurst(source.x, source.y, 10, COLORS.warning, 0.7);
        }
        state.stitch = { active: false, gapIndex: 0, progress: 0, points: [], lastCursor: null };
        renderNowIfNeeded();
      }

      function openPickupPhase() {
        state.mode = "pickup";
        state.pickupOptions = PICKUP_PHASES[state.pickupPhase] || [];
        state.pickupRects = [];
        renderNowIfNeeded();
      }

      function applyPickup(option) {
        state.chosenPickups.push(option);
        recalculateEffects();
        state.curse += option.curse;
        state.threadHeat = Math.max(0, state.threadHeat - option.coolBurst);
        state.pickupPhase += 1;
        state.mode = "running";
        state.pickupOptions = [];
        state.pickupRects = [];
        state.targetGap += 1;
        state.targetAltar += 1;
        const player = getPlayerPosition();
        spawnBurst(player.x, player.y - 10, 20, COLORS.caution, 1.05);
        addPopup(option.title, player.x, player.y - 24, COLORS.caution, 18);
        if (state.curse >= MAX_CURSE) {
          failStage("curse-overload");
        } else {
          renderNowIfNeeded();
        }
      }

      function handlePickupSelection(x, y) {
        if (state.mode !== "pickup") {
          return false;
        }
        for (let index = 0; index < state.pickupRects.length; index += 1) {
          const rect = state.pickupRects[index];
          if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) {
            applyPickup(state.pickupOptions[index]);
            return true;
          }
        }
        return false;
      }

      function pulseValue(speed, offset = 0) {
        return (Math.sin(state.ambientTime * speed + offset) + 1) / 2;
      }

      function updateGameplay(dt) {
        state.elapsed += dt;
        state.playerBob += dt * (state.playerVelocity ? 10 : 5.5);
        movePlayer(dt);
        state.screenShake = Math.max(0, state.screenShake - dt * 18);
        state.flash = Math.max(0, state.flash - dt * 1.2);
        state.promptPulse = Math.max(0, state.promptPulse - dt * 1.6);

        const track = state.playerTrack;
        let onBridge = false;
        let bridgeGapIndex = -1;
        let bridgeT = 0;
        for (let gapIndex = 0; gapIndex < GAP_COUNT; gapIndex += 1) {
          if (track >= gapIndex + BRIDGE_START && track <= gapIndex + BRIDGE_END && isGapOpen(gapIndex)) {
            onBridge = true;
            bridgeGapIndex = gapIndex;
            bridgeT = clamp((track - gapIndex - BRIDGE_START) / (BRIDGE_END - BRIDGE_START), 0, 1);
            break;
          }
        }

        let heatDelta = 0;
        if (onBridge) {
          const intensity = getBeamStrength(bridgeGapIndex, bridgeT);
          heatDelta += intensity * 28 * state.effects.heatRate * dt;
          if (intensity > 0.45 && Math.random() < 0.35) {
            const sparkPoint = sampleGapPoint(bridgeGapIndex, bridgeT);
            spawnSpark(sparkPoint.x, sparkPoint.y, COLORS.caution);
          }
        } else {
          heatDelta -= 18 * state.effects.coolRate * dt;
        }

        if (state.stitch.active && state.stitch.lastCursor) {
          const { distance: cursorDistance, t, point } = state.stitch.lastCursor;
          const beam = getBeamStrength(state.stitch.gapIndex, t);
          if (beam > 0.22) {
            heatDelta += beam * 24 * state.effects.heatRate * dt;
          }
          if (cursorDistance > getSeamWidth()) {
            heatDelta += ((cursorDistance - getSeamWidth()) / 14) * 8 * dt;
          }
          if (beam > 0.35 && Math.random() < 0.4) {
            spawnSpark(point.x, point.y, COLORS.warning);
          }
        }

        state.threadHeat = clamp(state.threadHeat + heatDelta, 0, getHeatCap());
        if (state.threadHeat >= getHeatCap() - 0.001) {
          failStage("thread-burned");
        }

        if (
          state.mode === "running" &&
          state.targetAltar < NODES.length &&
          Math.abs(state.playerTrack - state.targetAltar) <= 0.055
        ) {
          const altarIndex = state.targetAltar - 1;
          if (!state.altarsLit[altarIndex]) {
            state.altarsLit[altarIndex] = true;
            state.promptPulse = 1;
            state.flash = Math.max(state.flash, 0.45);
            state.screenShake = Math.max(state.screenShake, 7);
            const point = NODES[state.targetAltar];
            spawnBurst(point.x, point.y - 8, 26, COLORS.safe, 1.3);
            addPopup(`${state.targetAltar}번 제단 점등`, point.x, point.y - 36, COLORS.safe, 20);
            if (state.targetAltar === 4) {
              clearStage();
            } else {
              openPickupPhase();
            }
          }
        }
      }

      function updateTrains(dt) {
        for (const strip of state.trainStrips) {
          strip.offset = (strip.offset + strip.speed * dt) % 240;
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy = particle.vy * 0.98 + 12 * dt;
          particle.life -= dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }
        for (let index = state.sparks.length - 1; index >= 0; index -= 1) {
          const spark = state.sparks[index];
          spark.x += spark.vx * dt;
          spark.y += spark.vy * dt;
          spark.vx *= 0.94;
          spark.vy += 80 * dt;
          spark.life -= dt;
          if (spark.life <= 0) {
            state.sparks.splice(index, 1);
          }
        }
        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.y -= 26 * dt;
          popup.life -= dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }
      }

      function update(dt) {
        state.ambientTime += dt;
        updateTrains(dt);
        if (state.mode === "running") {
          updateGameplay(dt);
        } else {
          state.screenShake = Math.max(0, state.screenShake - dt * 18);
          state.flash = Math.max(0, state.flash - dt * 1.1);
        }
        updateParticles(dt);
      }

      function drawRoundedRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawPanel(x, y, width, height, options = {}) {
        const {
          fill = "rgba(12, 15, 30, 0.72)",
          stroke = "rgba(255, 255, 255, 0.08)",
          radius = 20,
          shadow = "rgba(0, 0, 0, 0.24)",
        } = options;
        ctx.save();
        ctx.shadowColor = shadow;
        ctx.shadowBlur = LOW_EFFECT_MODE ? 8 : 24;
        drawRoundedRect(x, y, width, height, radius);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.lineWidth = 1;
        ctx.strokeStyle = stroke;
        ctx.stroke();
        ctx.restore();
      }

      function drawGauge(x, y, width, value, max, colors, label, textValue) {
        drawPanel(x, y, width, 34, {
          fill: "rgba(9, 11, 21, 0.8)",
          stroke: "rgba(255, 255, 255, 0.08)",
          radius: 16,
          shadow: "rgba(0, 0, 0, 0.2)",
        });
        const innerPadding = 3;
        const fillWidth = clamp((value / max) * (width - innerPadding * 2), 0, width - innerPadding * 2);
        const gradient = ctx.createLinearGradient(x, y, x + width, y);
        gradient.addColorStop(0, colors[0]);
        gradient.addColorStop(1, colors[1]);
        drawRoundedRect(x + innerPadding, y + innerPadding, fillWidth, 28, 14);
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.fillStyle = "rgba(249, 246, 255, 0.92)";
        ctx.font = `700 12px ${PANEL_FONT}`;
        ctx.fillText(label, x + 12, y + 21);
        ctx.textAlign = "right";
        ctx.fillStyle = "rgba(255, 246, 235, 0.92)";
        ctx.fillText(textValue, x + width - 10, y + 21);
        ctx.textAlign = "left";
      }

      function drawWrappedText(text, x, y, maxWidth, lineHeight, color, font, maxLines = 3) {
        ctx.save();
        ctx.fillStyle = color;
        ctx.font = font;
        const words = text.split(" ");
        const lines = [];
        let current = "";
        for (const word of words) {
          const test = current ? `${current} ${word}` : word;
          if (ctx.measureText(test).width > maxWidth && current) {
            lines.push(current);
            current = word;
          } else {
            current = test;
          }
        }
        if (current) {
          lines.push(current);
        }
        const finalLines = lines.slice(0, maxLines);
        finalLines.forEach((line, index) => {
          ctx.fillText(line, x, y + lineHeight * index);
        });
        ctx.restore();
      }

      function drawBackground() {
        if (LOW_EFFECT_MODE) {
          const flatSky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
          flatSky.addColorStop(0, "#17182a");
          flatSky.addColorStop(0.45, "#11152a");
          flatSky.addColorStop(1, "#090b14");
          ctx.fillStyle = flatSky;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.fillStyle = "rgba(255, 176, 124, 0.12)";
          ctx.fillRect(0, 0, VIEW.width, 112);
          ctx.fillStyle = "rgba(7, 9, 18, 0.92)";
          ctx.fillRect(0, 176, VIEW.width, VIEW.height - 176);
          ctx.strokeStyle = "rgba(91, 104, 139, 0.22)";
          ctx.lineWidth = 2;
          for (let index = 0; index < 7; index += 1) {
            const y = 255 + index * 40;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(VIEW.width, y + index * 5);
            ctx.stroke();
          }
          return;
        }

        const sky = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        sky.addColorStop(0, "#19162d");
        sky.addColorStop(0.36, "#1c233f");
        sky.addColorStop(0.7, "#0b1021");
        sky.addColorStop(1, "#06080f");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        if (!LOW_EFFECT_MODE) {
          const glow = ctx.createRadialGradient(150, 76, 30, 150, 76, 280);
          glow.addColorStop(0, "rgba(255, 186, 133, 0.42)");
          glow.addColorStop(1, "rgba(255, 186, 133, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          const rightGlow = ctx.createRadialGradient(840, 96, 24, 840, 96, 240);
          rightGlow.addColorStop(0, "rgba(113, 184, 255, 0.3)");
          rightGlow.addColorStop(1, "rgba(113, 184, 255, 0)");
          ctx.fillStyle = rightGlow;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        for (let index = 0; index < (LOW_EFFECT_MODE ? 8 : 16); index += 1) {
          const width = 28 + (index % 4) * 10;
          const x = (index * 67 + state.ambientTime * (8 + (index % 3) * 4)) % (VIEW.width + 120) - 60;
          const y = 42 + (index % 5) * 12;
          ctx.fillStyle = index % 2 ? "rgba(255, 194, 132, 0.22)" : "rgba(126, 169, 255, 0.18)";
          ctx.fillRect(x, y, width, 5);
        }

        ctx.fillStyle = "rgba(11, 15, 29, 0.84)";
        ctx.fillRect(0, 124, VIEW.width, 52);

        for (const strip of state.trainStrips) {
          for (let index = -1; index < 6; index += 1) {
            const x = strip.offset + index * 200 - 80;
            ctx.fillStyle = "rgba(21, 27, 48, 0.42)";
            ctx.fillRect(x, strip.y, 160, 18);
            ctx.fillStyle = "rgba(255, 199, 144, 0.16)";
            ctx.fillRect(x + 14, strip.y + 4, 128, 8);
          }
        }

        const floor = ctx.createLinearGradient(0, 210, 0, VIEW.height);
        floor.addColorStop(0, "rgba(18, 22, 39, 0.25)");
        floor.addColorStop(1, "rgba(4, 5, 10, 0.92)");
        ctx.fillStyle = floor;
        ctx.fillRect(0, 176, VIEW.width, VIEW.height - 176);

        ctx.strokeStyle = "rgba(111, 132, 170, 0.22)";
        ctx.lineWidth = 3;
        for (let index = 0; index < 7; index += 1) {
          const y = 255 + index * 40;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(VIEW.width, y + index * 5);
          ctx.stroke();
        }
      }

      function drawGap(index) {
        if (LOW_EFFECT_MODE) {
          const gap = getGapGeometry(index);
          ctx.save();
          ctx.beginPath();
          for (let sample = 0; sample <= 20; sample += 1) {
            const point = sampleGapPoint(index, sample / 20);
            if (sample === 0) {
              ctx.moveTo(point.x, point.y);
            } else {
              ctx.lineTo(point.x, point.y);
            }
          }
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.strokeStyle = state.bridges[index].active ? "rgba(31, 26, 58, 0.96)" : "rgba(25, 31, 50, 0.92)";
          ctx.lineWidth = state.bridges[index].active ? 18 : 34;
          ctx.stroke();
          ctx.strokeStyle = state.bridges[index].active ? "rgba(255, 182, 130, 0.8)" : "rgba(183, 197, 236, 0.18)";
          ctx.lineWidth = state.bridges[index].active ? 3 : 5;
          ctx.stroke();

          const beamT = ((state.elapsed * 0.24) + index * 0.17) % 1;
          const beam = sampleGapPoint(index, beamT);
          ctx.fillStyle = "rgba(255, 210, 154, 0.48)";
          ctx.beginPath();
          ctx.arc(beam.x, beam.y, 18, 0, Math.PI * 2);
          ctx.fill();

          if (state.targetGap === index && !state.bridges[index].active) {
            for (const anchor of [gap.startAnchor, gap.endAnchor]) {
              ctx.fillStyle = "rgba(255, 227, 184, 0.82)";
              ctx.beginPath();
              ctx.arc(anchor.x, anchor.y, 10, 0, Math.PI * 2);
              ctx.fill();
            }
          }
          ctx.restore();
          return;
        }

        const gap = getGapGeometry(index);
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.beginPath();
        for (let sample = 0; sample <= 32; sample += 1) {
          const point = sampleGapPoint(index, sample / 32);
          if (sample === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        }
        const seamGradient = ctx.createLinearGradient(gap.startAnchor.x, gap.startAnchor.y, gap.endAnchor.x, gap.endAnchor.y);
        seamGradient.addColorStop(0, "rgba(62, 74, 116, 0.56)");
        seamGradient.addColorStop(0.5, "rgba(12, 17, 34, 0.92)");
        seamGradient.addColorStop(1, "rgba(79, 91, 130, 0.56)");
        ctx.strokeStyle = seamGradient;
        ctx.lineWidth = 46;
        ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
        ctx.shadowBlur = LOW_EFFECT_MODE ? 6 : 22;
        ctx.stroke();

        ctx.beginPath();
        for (let sample = 0; sample <= 32; sample += 1) {
          const point = sampleGapPoint(index, sample / 32);
          if (sample === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        }
        ctx.shadowBlur = 0;
        ctx.lineWidth = 8;
        ctx.setLineDash([6, 10]);
        ctx.strokeStyle = state.targetGap === index && !state.bridges[index].active
          ? `rgba(255, 227, 187, ${0.28 + pulseValue(5, index) * 0.44})`
          : "rgba(173, 190, 233, 0.14)";
        ctx.stroke();
        ctx.setLineDash([]);

        for (let beam = 0; beam < (LOW_EFFECT_MODE ? 1 : 2); beam += 1) {
          const beamT = ((state.elapsed * (0.24 + index * 0.015) * (beam ? 0.78 : 1)) + index * (beam ? 0.23 : 0.17) + (beam ? 0.4 : 0)) % 1;
          const point = sampleGapPoint(index, beamT);
          const glow = ctx.createRadialGradient(point.x, point.y, 4, point.x, point.y, 42);
          glow.addColorStop(0, "rgba(255, 207, 147, 0.78)");
          glow.addColorStop(1, "rgba(255, 207, 147, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(point.x - 44, point.y - 44, 88, 88);
        }

        if (state.bridges[index].active) {
          ctx.beginPath();
          for (let sample = 0; sample <= 32; sample += 1) {
            const point = sampleGapPoint(index, sample / 32);
            if (sample === 0) {
              ctx.moveTo(point.x, point.y);
            } else {
              ctx.lineTo(point.x, point.y);
            }
          }
          const bridgeGradient = ctx.createLinearGradient(gap.startAnchor.x, gap.startAnchor.y, gap.endAnchor.x, gap.endAnchor.y);
          bridgeGradient.addColorStop(0, "rgba(32, 30, 59, 0.98)");
          bridgeGradient.addColorStop(0.5, "rgba(16, 13, 33, 1)");
          bridgeGradient.addColorStop(1, "rgba(37, 31, 66, 0.98)");
          ctx.strokeStyle = bridgeGradient;
          ctx.lineWidth = 18;
          ctx.shadowColor = "rgba(184, 156, 255, 0.38)";
          ctx.shadowBlur = LOW_EFFECT_MODE ? 4 : 16;
          ctx.stroke();

          ctx.beginPath();
          for (let sample = 0; sample <= 32; sample += 1) {
            const point = sampleGapPoint(index, sample / 32);
            if (sample === 0) {
              ctx.moveTo(point.x, point.y);
            } else {
              ctx.lineTo(point.x, point.y);
            }
          }
          ctx.lineWidth = 4;
          ctx.setLineDash([2, 10]);
          ctx.strokeStyle = "rgba(255, 180, 127, 0.9)";
          ctx.stroke();
          ctx.setLineDash([]);
        }

        if (state.targetGap === index && !state.bridges[index].active) {
          const pulse = pulseValue(5, index);
          for (const anchor of [gap.startAnchor, gap.endAnchor]) {
            ctx.beginPath();
            ctx.fillStyle = `rgba(255, 219, 179, ${0.6 + pulse * 0.3})`;
            ctx.arc(anchor.x, anchor.y, 9 + pulse * 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255, 186, 124, ${0.44 + pulse * 0.32})`;
            ctx.lineWidth = 2;
            ctx.arc(anchor.x, anchor.y, 16 + pulse * 6, 0, Math.PI * 2);
            ctx.stroke();
          }
        }

        if (state.stitch.active && state.stitch.gapIndex === index && state.stitch.points.length > 1) {
          ctx.beginPath();
          ctx.moveTo(gap.startAnchor.x, gap.startAnchor.y);
          for (const point of state.stitch.points) {
            ctx.lineTo(point.x, point.y);
          }
          ctx.lineWidth = 7;
          ctx.strokeStyle = "rgba(255, 234, 196, 0.92)";
          ctx.shadowColor = "rgba(255, 187, 121, 0.4)";
          ctx.shadowBlur = 14;
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawPlatforms() {
        for (let index = 0; index < NODES.length; index += 1) {
          const node = NODES[index];
          ctx.save();
          ctx.translate(node.x, node.y);
          const pulse = index > 0 && state.targetAltar === index ? pulseValue(6, index) : 0;
          const lit = index > 0 ? state.altarsLit[index - 1] : false;

          if (!LOW_EFFECT_MODE) {
            const shadow = ctx.createRadialGradient(0, 0, 8, 0, 0, 84);
            shadow.addColorStop(0, lit ? "rgba(116, 255, 226, 0.2)" : "rgba(190, 138, 255, 0.16)");
            shadow.addColorStop(1, "rgba(0, 0, 0, 0)");
            ctx.fillStyle = shadow;
            ctx.beginPath();
            ctx.ellipse(0, 0, 90, 70, 0, 0, Math.PI * 2);
            ctx.fill();
          }

          drawRoundedRect(-72, -30, 144, 58, 28);
          ctx.fillStyle = lit
            ? "rgba(17, 33, 38, 0.94)"
            : "rgba(20, 24, 42, 0.96)";
          ctx.fill();
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = lit
            ? "rgba(137, 255, 227, 0.38)"
            : "rgba(255, 255, 255, 0.08)";
          ctx.stroke();

          if (index > 0) {
            ctx.fillStyle = lit ? "rgba(137, 255, 227, 0.78)" : "rgba(255, 188, 136, 0.3)";
            ctx.beginPath();
            ctx.moveTo(-20, -12);
            ctx.lineTo(0, -38 - pulse * 8);
            ctx.lineTo(20, -12);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.arc(0, -6, lit ? 12 + pulse * 2 : 10 + pulse * 3, 0, Math.PI * 2);
            ctx.fillStyle = lit
              ? "rgba(137, 255, 227, 0.94)"
              : `rgba(255, 193, 146, ${0.26 + pulse * 0.3})`;
            ctx.shadowColor = lit ? "rgba(137, 255, 227, 0.5)" : "rgba(255, 169, 104, 0.3)";
            ctx.shadowBlur = LOW_EFFECT_MODE ? 4 : 18;
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = "rgba(245, 241, 255, 0.72)";
            ctx.font = `700 12px ${PANEL_FONT}`;
            ctx.textAlign = "center";
            ctx.fillText(node.label, 0, 28);

            ctx.textAlign = "center";
            ctx.fillText("심봉", 0, 30);

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeX = state.screenShake ? (Math.random() - 0.5) * state.screenShake : 0;
        const shakeY = state.screenShake ? (Math.random() - 0.5) * state.screenShake : 0;
        ctx.save();
        ctx.translate(shakeX, shakeY);

        drawBackground();
        for (let gapIndex = 0; gapIndex < GAP_COUNT; gapIndex += 1) {
          drawGap(gapIndex);
        }
        drawPlatforms();
        drawParticles();
        drawPlayer();
        drawPopups();
        drawHud();

        if (state.flash > 0.01) {
          ctx.fillStyle = `rgba(255, 234, 215, ${state.flash * 0.14})`;
          ctx.fillRect(-16, -16, VIEW.width + 32, VIEW.height + 32);
        }

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "pickup") {
          drawPickupOverlay();
        } else if (state.mode === "failed") {
          drawResultOverlay(false);
        } else if (state.mode === "cleared") {
          drawResultOverlay(true);
        }

        ctx.restore();
      }

      function stepSimulation(dt) {
        update(dt);
        render();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const frameBudget = LOW_EFFECT_MODE ? 1000 / 30 : 1000 / 60;
        if (timestamp - lastTimestamp < frameBudget) {
          animationFrame = window.requestAnimationFrame(frame);
          return;
        }
        let delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        while (delta > 0) {
          const step = Math.min(delta, FIXED_DT);
          stepSimulation(step);
          delta -= step;
        }
        animationFrame = window.requestAnimationFrame(frame);
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen?.().catch(() => {});
          return;
        }
        document.exitFullscreen?.().catch(() => {});
      }

      function handleStartOrRestart() {
        resetStage();
      }

      function onPointerDown(event) {
        const point = toCanvasPoint(event);
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          handleStartOrRestart();
          return;
        }
        if (state.mode === "pickup") {
          handlePickupSelection(point.x, point.y);
          return;
        }

        const now = performance.now();
        if (now - lastTapTime < 280 && distance(point.x, point.y, lastTapX, lastTapY) < 32) {
          cutCurrentThread();
          lastTapTime = 0;
          return;
        }
        lastTapTime = now;
        lastTapX = point.x;
        lastTapY = point.y;

        beginStitch(point.x, point.y);
        updateStitchPointer(point.x, point.y);
      }

      function onPointerMove(event) {
        if (!state.stitch.active) {
          return;
        }
        const point = toCanvasPoint(event);
        updateStitchPointer(point.x, point.y);
      }

      function onPointerUp() {
        endStitch(false);
      }

      function setControl(control, active) {
        if (control === "cut") {
          if (active) {
            cutCurrentThread();
          }
          return;
        }
        input[control] = active;
      }

      function bindHoldButton(button, control) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) {
            event.preventDefault();
          }
          button.dataset.active = "false";
          setControl(control, false);
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            handleStartOrRestart();
          }
          button.dataset.active = "true";
          setControl(control, true);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointerleave", release);
        button.addEventListener("pointercancel", release);
      }

      window.addEventListener("keydown", (event) => {
        if (event.code === "Enter" || event.code === "Space") {
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            event.preventDefault();
            handleStartOrRestart();
            return;
          }
        }
        if (event.code === "KeyF") {
          event.preventDefault();
          toggleFullscreen();
          return;
        }
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = true;
          return;
        }
        if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = true;
          return;
        }
        if (event.code === "KeyX") {
          cutCurrentThread();
        }
      });

      window.addEventListener("keyup", (event) => {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          input.left = false;
        } else if (event.code === "ArrowRight" || event.code === "KeyD") {
          input.right = false;
        }
      });

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerup", onPointerUp);
      window.addEventListener("pointercancel", onPointerUp);
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());

      document.querySelectorAll("[data-control]").forEach((button) => {
        bindHoldButton(button, button.dataset.control);
      });

      window.render_game_to_text = () => {
        const player = getPlayerPosition();
        return JSON.stringify({
          mode:
            state.mode === "pickup"
              ? "running"
              : state.mode,
          overlay: state.mode === "pickup" ? "pickup" : null,
          coordSystem: "x increases right, y increases down, track runs from node 0 to node 4",
          player: {
            x: Number(player.x.toFixed(1)),
            y: Number(player.y.toFixed(1)),
            track: Number(state.playerTrack.toFixed(3)),
          },
          targetAltar: state.targetAltar,
          litAltars: state.altarsLit,
          targetGap: state.targetGap,
          openBridges: state.bridges.map((bridge) => bridge.active),
          stitch: {
            active: state.stitch.active,
            progress: Number(state.stitch.progress.toFixed(2)),
          },
          meters: {
            threadHeat: Math.round(state.threadHeat),
            heatCap: Math.round(getHeatCap()),
            curse: Math.round(state.curse),
          },
        });
      };

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          stepSimulation(ms / 1000 / steps);
        }
        return window.render_game_to_text();
      };

      window.relayStageDebug = {
        forceClear() {
          state.altarsLit = [true, true, true, true];
          clearStage();
          render();
        },
        forceFail() {
          state.threadHeat = getHeatCap();
          failStage("forced");
          render();
        },
      };

      recalculateEffects();
      render();
      reportReadyToHost();
      if (!LOW_EFFECT_MODE) {
        animationFrame = window.requestAnimationFrame(frame);
      }
    </script>
  </body>
</html>
