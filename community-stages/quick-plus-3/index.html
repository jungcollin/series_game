<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Plus 3</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        transform: translateY(-140%);
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        transition: transform 0.15s ease;
      }

      .skip-link:focus-visible {
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">Quick Plus 3. 캔버스에 포커스를 두고 Enter로 시작하세요. 숫자 키로 답을 입력하고 Backspace로 지울 수 있습니다.</p>
    <canvas id="game" width="960" height="540" aria-label="Quick Plus 3" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const QUESTIONS = [
        { a: 2, b: 3, answer: 5 },
        { a: 4, b: 5, answer: 9 },
        { a: 7, b: 1, answer: 8 },
      ];
      const relayContext = window.RelayRuntime?.readContext("quick-plus-3") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let hostFailedReported = false;
      let hostClearedReported = false;
      let animationFrame = 0;
      let lastTimestamp = 0;

      const state = {
        mode: "menu",
        questionIndex: 0,
        input: "",
        elapsed: 0,
        lastRunTime: 0,
        reason: "",
        floaters: Array.from({ length: 18 }, (_, index) => makeFloater(index)),
      };

      function makeFloater(index) {
        return {
          x: (index * 71) % VIEW.width,
          y: (index * 43) % VIEW.height,
          size: 18 + (index % 5) * 8,
          speed: 16 + (index % 4) * 10,
          glyph: ["+", "=", "?", "+"][index % 4],
        };
      }

      function currentQuestion() {
        return QUESTIONS[state.questionIndex] || null;
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost() {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason: state.reason || "wrong_answer",
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetStage() {
        state.mode = "menu";
        state.questionIndex = 0;
        state.input = "";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.reason = "";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        state.mode = "running";
        state.questionIndex = 0;
        state.input = "";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.reason = "";
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason) {
        state.mode = "failed";
        state.reason = reason;
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost();
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function appendDigit(digit) {
        if (state.mode !== "running" || state.input.length >= 2) {
          return;
        }
        state.input += digit;
      }

      function removeDigit() {
        if (state.mode !== "running") {
          return;
        }
        state.input = state.input.slice(0, -1);
      }

      function submitAnswer() {
        if (state.mode !== "running" || !state.input) {
          return;
        }
        const answer = Number(state.input);
        const question = currentQuestion();
        if (!question) {
          return;
        }
        if (answer !== question.answer) {
          failStage("wrong_answer");
          return;
        }
        state.questionIndex += 1;
        state.input = "";
        if (state.questionIndex >= QUESTIONS.length) {
          clearStage();
        }
      }

      function handleKeyDown(event) {
        canvas.focus();

        if (event.key === "Enter") {
          event.preventDefault();
          if (state.mode === "menu") {
            startStage();
          } else if (state.mode === "running") {
            submitAnswer();
          } else if (state.mode === "failed") {
            resetStage();
          }
          return;
        }

        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }

        if (event.key === "Backspace") {
          event.preventDefault();
          removeDigit();
          return;
        }

        if (/^[0-9]$/.test(event.key)) {
          appendDigit(event.key);
        }
      }

      function update(dt) {
        state.elapsed += state.mode === "running" ? dt : 0;
        for (const floater of state.floaters) {
          floater.y -= floater.speed * dt;
          if (floater.y < -40) {
            floater.y = VIEW.height + 40;
            floater.x = (floater.x + 137) % VIEW.width;
          }
        }
      }

      function render() {
        drawBackground();
        drawFrame();
        drawHeader();
        drawQuestionPanel();
        drawInputPanel();
        drawProgress();
        drawOverlay();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#111827");
        gradient.addColorStop(1, "#0b1020");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (const floater of state.floaters) {
          ctx.fillStyle = "rgba(148, 163, 184, 0.18)";
          ctx.font = `700 ${floater.size}px Trebuchet MS`;
          ctx.fillText(floater.glyph, floater.x, floater.y);
        }
      }

      function drawFrame() {
        ctx.fillStyle = "#13203a";
        roundRect(56, 48, 848, 444, 28);
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.16)";
        ctx.lineWidth = 3;
        roundRect(56, 48, 848, 444, 28);
        ctx.stroke();
      }

      function drawHeader() {
        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 22px Trebuchet MS";
        ctx.fillText("Quick Plus 3", 96, 108);

        ctx.fillStyle = "#f97316";
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillText("ONE LIFE MATH", 96, 82);

        ctx.fillStyle = "rgba(226, 232, 240, 0.88)";
        ctx.font = "600 16px Trebuchet MS";
        ctx.fillText("쉬운 더하기 3개를 모두 맞히면 클리어, 한 번이라도 틀리면 즉시 실패", 96, 136);
      }

      function drawQuestionPanel() {
        const question = currentQuestion();
        ctx.fillStyle = "#f8fafc";
        ctx.fillRect(118, 180, 724, 128);

        ctx.fillStyle = "#0f172a";
        ctx.font = "700 24px Trebuchet MS";
        ctx.fillText("문제", 150, 222);

        ctx.font = "700 58px Trebuchet MS";
        const prompt = question ? `${question.a} + ${question.b} = ?` : "3 / 3 완료";
        ctx.fillText(prompt, 150, 278);
      }

      function drawInputPanel() {
        ctx.fillStyle = "#1d4ed8";
        roundRect(118, 334, 360, 90, 22);
        ctx.fill();

        ctx.fillStyle = "#f8fafc";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText("입력한 답", 146, 368);

        ctx.font = "700 42px Trebuchet MS";
        ctx.fillText(state.input || "_", 146, 407);

        ctx.fillStyle = "#e2e8f0";
        ctx.font = "600 18px Trebuchet MS";
        ctx.fillText("숫자 키 입력", 544, 356);
        ctx.fillText("Backspace 지우기", 544, 386);
        ctx.fillText("Enter 제출 / 시작", 544, 416);
      }

      function drawProgress() {
        for (let index = 0; index < QUESTIONS.length; index += 1) {
          const isDone = index < state.questionIndex;
          const isCurrent = index === state.questionIndex && state.mode === "running";
          ctx.fillStyle = isDone ? "#22c55e" : isCurrent ? "#f59e0b" : "rgba(148, 163, 184, 0.38)";
          ctx.beginPath();
          ctx.arc(720 + index * 40, 104, 12, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawOverlay() {
        if (state.mode === "running") {
          return;
        }

        ctx.fillStyle = "rgba(15, 23, 42, 0.54)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.96)";
        roundRect(170, 128, 620, 286, 28);
        ctx.fill();

        const palette =
          state.mode === "failed"
            ? { accent: "#b91c1c", title: "실패" }
            : state.mode === "cleared"
              ? { accent: "#15803d", title: "클리어" }
              : { accent: "#f97316", title: "시작" };

        ctx.strokeStyle = palette.accent;
        ctx.lineWidth = 4;
        roundRect(170, 128, 620, 286, 28);
        ctx.stroke();

        ctx.fillStyle = palette.accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(
          state.mode === "menu" ? "쉬운 더하기 3문제" : palette.title,
          VIEW.width / 2,
          190
        );

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 22px Trebuchet MS";
        const lines =
          state.mode === "menu"
            ? [
                "클리어 조건: 더하기 3문제를 모두 맞히세요.",
                "실패 조건: 한 문제라도 틀리면 즉시 종료됩니다.",
                "Enter로 시작, 숫자 키로 답 입력, Backspace 지우기.",
              ]
            : state.mode === "failed"
              ? [
                  "오답을 입력해서 공유 목숨 1개가 끝났습니다.",
                  `맞힌 문제 수 ${state.questionIndex} / ${QUESTIONS.length}`,
                  "Enter로 처음 화면으로 돌아갑니다.",
                ]
              : [
                  "문제 3개를 모두 맞혔습니다.",
                  "호스트가 아직 안 한 다음 스테이지를 랜덤으로 고릅니다.",
                  "이 스테이지는 즉시 종료 처리됩니다.",
                ];
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 250 + index * 42);
        });
        ctx.textAlign = "left";
      }

      function roundRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
      }

      function renderGameToText() {
        const question = currentQuestion();
        return JSON.stringify({
          coordinate_system: "interface-only stage, no world coordinates",
          mode: state.mode,
          question_number: Math.min(state.questionIndex + 1, QUESTIONS.length),
          total_questions: QUESTIONS.length,
          prompt: question ? `${question.a} + ${question.b}` : null,
          typed_answer: state.input,
          solved_count: state.questionIndex,
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "quick-plus-3",
        title: "Quick Plus 3",
        creator: "Codex",
        genre: "Math quiz",
        clearCondition: "쉬운 더하기 3문제를 모두 맞히기",
      };
      window.relayStageResult = { status: "running" };
      window.__relayDebug = {
        startStage,
        resetStage,
        setInput(value) {
          state.input = String(value).slice(0, 2);
          render();
        },
        submitAnswer,
        getState() {
          return JSON.parse(renderGameToText());
        },
      };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          state.questionIndex = QUESTIONS.length;
          state.input = "";
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          state.input = "";
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("blur", () => {
        state.input = state.mode === "running" ? state.input : "";
      });
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
