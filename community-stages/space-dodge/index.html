<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스페이스 닷지</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #0f172a;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
        transition: transform 0.15s ease;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
        transform: translateY(0);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #0f172a;
        touch-action: manipulation;
        object-fit: contain;
        min-height: 400px;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 16px;
        z-index: 16;
        display: flex;
        justify-content: center;
        padding: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        pointer-events: auto;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: min(100%, 360px);
      }

      .mobile-btn {
        appearance: none;
        border: 0;
        border-radius: 20px;
        flex: 0 1 96px;
        min-width: 64px;
        min-height: 64px;
        padding: 0 16px;
        background: rgba(15, 23, 42, 0.78);
        color: #f8fafc;
        font: 800 24px "Trebuchet MS", "Segoe UI", sans-serif;
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.26);
        touch-action: none;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.96);
        background: rgba(37, 99, 235, 0.9);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          gap: 8px;
          width: min(100%, 320px);
        }

        .mobile-btn {
          flex-basis: 80px;
          min-width: 56px;
          min-height: 56px;
          border-radius: 18px;
          font-size: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">스페이스 닷지. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 터치하여 이동 이며, 모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD, 실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.</p>
    <canvas id="game" width="960" height="540" aria-label="스페이스 닷지" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const relayContext = window.RelayRuntime?.readContext("space-dodge") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "다가오는 운석을 피하세요",
        player: { x: VIEW.width / 2, y: VIEW.height - 60, radius: 20 },
        meteorites: [],
        meteoriteTimer: 0,
        stars: [],
      };

      // Initialize stars for background
      for (let i = 0; i < 100; i++) {
        state.stars.push({
          x: Math.random() * VIEW.width,
          y: Math.random() * VIEW.height,
          speed: Math.random() * 2 + 0.5,
          size: Math.random() * 2 + 1
        });
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.player = { x: VIEW.width / 2, y: VIEW.height - 60, radius: 20 };
        state.meteorites = [];
        state.meteoriteTimer = 0;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function failStage(reason = "failed") {
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function bindHoldButton(button, onPress, onRelease) {
        if (!button) {
          return;
        }
        const release = (event) => {
          if (event) event.preventDefault();
          button.dataset.active = "false";
          onRelease?.();
        };
        button.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          startFromTouch();
          button.dataset.active = "true";
          onPress?.();
          button.setPointerCapture?.(event.pointerId);
        });
        button.addEventListener("pointerup", release);
        button.addEventListener("pointercancel", release);
        button.addEventListener("lostpointercapture", release);
      }

      function update(dt) {
        if (state.mode === "running") {
          state.elapsed += dt;

          if (state.elapsed >= 10) {
            clearStage();
            return;
          }

          // Update stars
          state.stars.forEach(star => {
            star.y += star.speed;
            if (star.y > VIEW.height) {
              star.y = 0;
              star.x = Math.random() * VIEW.width;
            }
          });

          // Spawn meteorites
          state.meteoriteTimer += dt;
          // Spawn rate increases slightly over time
          const spawnInterval = Math.max(0.1, 0.4 - (state.elapsed / 10) * 0.25);
          if (state.meteoriteTimer > spawnInterval) {
            state.meteoriteTimer = 0;
            const radius = Math.random() * 20 + 15;
            state.meteorites.push({
              x: Math.random() * VIEW.width,
              y: -radius,
              radius: radius,
              speedX: (Math.random() - 0.5) * 100, // drift left/right
              speedY: Math.random() * 200 + 150 + (state.elapsed * 20), // falls down, speeds up
              rotation: 0,
              spin: (Math.random() - 0.5) * 5
            });
          }

          // Move meteorites
          for (let i = state.meteorites.length - 1; i >= 0; i--) {
            const m = state.meteorites[i];
            m.x += m.speedX * dt;
            m.y += m.speedY * dt;
            m.rotation += m.spin * dt;

            // Remove off-screen meteorites
            if (m.y > VIEW.height + m.radius) {
              state.meteorites.splice(i, 1);
              continue;
            }

            // Collision detection
            const dx = state.player.x - m.x;
            const dy = state.player.y - m.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Forgive slightly with * 0.8 on player radius
            if (distance < (state.player.radius * 0.8) + (m.radius * 0.9)) {
              failStage("운석에 부딪힘");
              return;
            }
          }
        }
      }

      function drawSpaceship(x, y, radius) {
        ctx.save();
        ctx.translate(x, y);

        // Engine glow
        ctx.beginPath();
        ctx.arc(0, radius, radius * 0.6, 0, Math.PI * 2);
        ctx.fillStyle = "#3b82f6";
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, radius + 5, radius * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = "#60a5fa";
        ctx.fill();

        // Hull
        ctx.beginPath();
        ctx.moveTo(0, -radius);
        ctx.lineTo(radius * 0.8, radius);
        ctx.lineTo(0, radius * 0.5);
        ctx.lineTo(-radius * 0.8, radius);
        ctx.closePath();
        ctx.fillStyle = "#e2e8f0";
        ctx.fill();

        // Cockpit
        ctx.beginPath();
        ctx.moveTo(0, -radius * 0.3);
        ctx.lineTo(radius * 0.3, radius * 0.2);
        ctx.lineTo(-radius * 0.3, radius * 0.2);
        ctx.closePath();
        ctx.fillStyle = "#1e293b";
        ctx.fill();

        ctx.restore();
      }

      function drawMeteorite(x, y, radius, rotation) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotation);

        ctx.beginPath();
        // Draw rocky shape
        const points = 7;
        for (let i = 0; i < points; i++) {
          const angle = (i / points) * Math.PI * 2;
          const r = radius * (0.8 + (Math.sin(angle * 3) * 0.2));
          if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
          else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
        }
        ctx.closePath();

        // Gradient for depth
        const grad = ctx.createRadialGradient(-radius * 0.2, -radius * 0.2, radius * 0.1, 0, 0, radius);
        grad.addColorStop(0, "#94a3b8");
        grad.addColorStop(1, "#475569");

        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = "#334155";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();
      }

      function renderCard(title, lines, accent) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(248, 250, 252, 0.98)";
        ctx.fillRect(128, 92, 704, 356);
        ctx.strokeStyle = accent;
        ctx.lineWidth = 4;
        ctx.strokeRect(128, 92, 704, 356);

        ctx.fillStyle = accent;
        ctx.font = "700 42px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(title, VIEW.width / 2, 162);

        ctx.fillStyle = "#0f172a";
        ctx.font = "600 24px Trebuchet MS";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, 232 + index * 46);
        });
        ctx.textAlign = "left";
      }

      function render() {
        if (state.mode === "menu") {
          renderCard("스페이스 닷지", [
            "다가오는 운석을 피하세요",
            "조작: 터치하여 이동",
            "클리어 조건: 10초 버티기",
            "실패 조건: 운석에 부딪힘",
            "터치 또는 Enter로 시작.",
          ], "#f97316");
          return;
        }

        if (state.mode === "running") {
          // Draw background
          ctx.fillStyle = "#020617";
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);

          // Draw stars
          ctx.fillStyle = "#e2e8f0";
          state.stars.forEach(star => {
            ctx.globalAlpha = Math.random() * 0.5 + 0.5; // twinkling effect
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
          });
          ctx.globalAlpha = 1.0;

          // Draw meteorites
          state.meteorites.forEach(m => {
            drawMeteorite(m.x, m.y, m.radius, m.rotation);
          });

          // Draw player
          drawSpaceship(state.player.x, state.player.y, state.player.radius);

          // Draw HUD
          ctx.fillStyle = "rgba(15, 23, 42, 0.7)";
          ctx.fillRect(0, 0, VIEW.width, 60);
          ctx.fillStyle = "#f8fafc";
          ctx.font = "700 32px Trebuchet MS";
          ctx.textAlign = "left";
          ctx.fillText(`Time: ${(10 - state.elapsed).toFixed(1)}s`, 20, 42);

          return;
        }

        if (state.mode === "failed") {
          renderCard("실패", [
            "운석에 부딪혀 우주선이 파괴되었습니다.",
          ], "#b91c1c");
          return;
        }

        renderCard("클리어!", [
          "무사히 운석 지대를 빠져나왔습니다.",
          "임무 성공!",
        ], "#15803d");
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "interface-only template stage",
          mode: state.mode,
          elapsed: Math.round(state.elapsed * 10) / 10,
          result: window.relayStageResult.status,
          note: state.note,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      const keys = {};

      function onKeyDown(event) {
        keys[event.key] = true;
        if (event.key === "Enter" && state.mode === "menu") {
          event.preventDefault();
          startStage();
        }
      }

      function onKeyUp(event) {
        keys[event.key] = false;
      }

      function handleMovement(dt) {
        if (state.mode !== "running") return;
        const speed = 400 * dt;
        if (keys["ArrowLeft"] || keys["a"]) state.player.x -= speed;
        if (keys["ArrowRight"] || keys["d"]) state.player.x += speed;
        if (keys["ArrowUp"] || keys["w"]) state.player.y -= speed;
        if (keys["ArrowDown"] || keys["s"]) state.player.y += speed;

        // Keep player in bounds
        state.player.x = Math.max(state.player.radius, Math.min(VIEW.width - state.player.radius, state.player.x));
        state.player.y = Math.max(state.player.radius, Math.min(VIEW.height - state.player.radius, state.player.y));
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        handleMovement(dt);
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "space-dodge",
        title: "스페이스 닷지",
        creator: "Jules",
        genre: "아케이드",
        clearCondition: "10초 버티기",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          startStage();
          clearStage();
          render();
        },
        forceFail() {
          startStage();
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("touchstart", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }, { passive: false });
      canvas.addEventListener("click", () => canvas.focus());

      // Pointer handling for touch/mouse
      let isPointerDown = false;
      let lastPointerEvent = null;

      canvas.addEventListener("pointerdown", (event) => {
        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        } else {
          isPointerDown = true;
          lastPointerEvent = event;
        }
      }, { passive: false });

      canvas.addEventListener("pointermove", (event) => {
        if (isPointerDown && state.mode === "running") {
          const rect = canvas.getBoundingClientRect();
          const scaleX = canvas.width / rect.width;
          const scaleY = canvas.height / rect.height;

          let dx = event.clientX - (lastPointerEvent ? lastPointerEvent.clientX : event.clientX);
          let dy = event.clientY - (lastPointerEvent ? lastPointerEvent.clientY : event.clientY);

          state.player.x += dx * scaleX;
          state.player.y += dy * scaleY;

          state.player.x = Math.max(state.player.radius, Math.min(VIEW.width - state.player.radius, state.player.x));
          state.player.y = Math.max(state.player.radius, Math.min(VIEW.height - state.player.radius, state.player.y));

          lastPointerEvent = event;
        }
      }, { passive: false });

      const pointerUpHandler = () => {
        isPointerDown = false;
        lastPointerEvent = null;
      };

      canvas.addEventListener("pointerup", pointerUpHandler);
      canvas.addEventListener("pointercancel", pointerUpHandler);
      canvas.addEventListener("pointerout", pointerUpHandler);

      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("keyup", onKeyUp);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
