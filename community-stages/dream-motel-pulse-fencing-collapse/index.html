<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dream Motel: Pulse Fence</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-deep: #080715;
        --bg-mid: #10192c;
        --panel: rgba(10, 14, 30, 0.7);
        --text: #f6f4ff;
        --cyan: #89f2ff;
        --pink: #ff74c8;
        --gold: #ffd478;
        --danger: #ff5b72;
        --boost: #86ffcf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 18%, rgba(255, 116, 200, 0.22), transparent 28%),
          radial-gradient(circle at 78% 16%, rgba(137, 242, 255, 0.18), transparent 24%),
          linear-gradient(180deg, #120d24 0%, #091120 46%, #03050c 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas,
      button {
        -webkit-tap-highlight-color: rgba(137, 242, 255, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(5, 12, 25, 0.92);
        color: var(--text);
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      canvas:focus-visible,
      .mobile-btn:focus-visible {
        outline: 3px solid rgba(246, 244, 255, 0.94);
        outline-offset: -5px;
      }

      .mobile-controls {
        position: fixed;
        right: 0;
        bottom: 18px;
        z-index: 16;
        display: flex;
        justify-content: flex-end;
        padding: 0 18px calc(18px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
        width: 100%;
      }

      .mobile-controls__row {
        display: flex;
        justify-content: flex-end;
        width: min(100%, 360px);
        pointer-events: auto;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(246, 244, 255, 0.18);
        border-radius: 999px;
        min-width: 132px;
        min-height: 56px;
        padding: 0 18px;
        background:
          linear-gradient(135deg, rgba(134, 255, 207, 0.26), rgba(137, 242, 255, 0.12)),
          rgba(5, 12, 25, 0.82);
        box-shadow:
          0 12px 26px rgba(0, 0, 0, 0.3),
          inset 0 0 26px rgba(134, 255, 207, 0.08);
        color: var(--text);
        font: 800 0.95rem/1 "Avenir Next", "Trebuchet MS", sans-serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        touch-action: manipulation;
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        border-color: rgba(134, 255, 207, 0.42);
        box-shadow:
          0 0 28px rgba(134, 255, 207, 0.28),
          inset 0 0 24px rgba(134, 255, 207, 0.2);
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          bottom: 12px;
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-btn {
          min-width: 118px;
          min-height: 52px;
          padding: 0 16px;
          font-size: 0.88rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dream Motel: Pulse Fence. 화면을 터치하거나 Enter로 시작하세요. 포인터 또는 터치 드래그로
      방패 각도 조절, 탭으로 순간 증폭, 이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는
      화면 터치와 드래그만으로도 플레이 가능하게 구현. 클리어 조건은 붕괴선보다 먼저 20연속
      파형을 반사하면 클리어. 실패 조건은 붕괴선에 휩쓸리거나 코어에 같은 문양이 3번 누적되면
      실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Dream Motel: Pulse Fence"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls" aria-label="모바일 증폭 버튼">
      <div class="mobile-controls__row">
        <button class="mobile-btn" id="boost-button" type="button" data-active="false" aria-label="순간 증폭 사용">
          Pulse
        </button>
      </div>
    </div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const boostButton = document.querySelector("#boost-button");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext = window.RelayRuntime?.readContext("dream-motel-pulse-fencing-collapse") || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.5 };
      const CORE_RADIUS = 54;
      const SHIELD_RADIUS = 146;
      const WAVE_SPAWN_RADIUS = 360;
      const STREAK_TARGET = 20;
      const STACK_FAIL_LIMIT = 3;
      const BASE_PARRY_ANGLE = 0.22;
      const BOOST_PARRY_ANGLE = 0.42;
      const ROOM_RING_RADIUS = 220;
      const SECTOR_ANGLES = Array.from({ length: 12 }, (_, index) => -Math.PI / 2 + index * (Math.PI / 6));
      const SYMBOLS = [
        { id: "moon", color: "#89f2ff", glow: "rgba(137, 242, 255, 0.45)", label: "Moon" },
        { id: "iris", color: "#ff74c8", glow: "rgba(255, 116, 200, 0.45)", label: "Iris" },
        { id: "key", color: "#ffd478", glow: "rgba(255, 212, 120, 0.45)", label: "Key" },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const input = {
        pointerId: null,
        dragging: false,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: "회전 방패로 문양 파형을 튕기고, 방금 안전했던 각도가 붕괴되기 전에 다음 라인으로 미끄러지세요.",
        shieldAngle: -Math.PI / 2,
        targetAngle: -Math.PI / 2,
        boostTimer: 0,
        boostCooldown: 0,
        streak: 0,
        totalReflections: 0,
        totalWaves: 0,
        clearedAt: 0,
        safeAngle: -Math.PI / 2,
        currentWave: null,
        collapseSegments: [],
        particles: [],
        popups: [],
        screenShake: 0,
        flashAlpha: 0,
        vignettePulse: 0,
        previewDrift: 0,
        lastReason: "",
        sigilStacks: { moon: 0, iris: 0, key: 0 },
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - clamp(value, 0, 1), 3);
      }

      function wrapAngle(angle) {
        let next = angle;
        while (next <= -Math.PI) next += Math.PI * 2;
        while (next > Math.PI) next -= Math.PI * 2;
        return next;
      }

      function angleDistance(a, b) {
        return Math.abs(wrapAngle(a - b));
      }

      function approachAngle(current, target, maxStep) {
        const diff = wrapAngle(target - current);
        if (Math.abs(diff) <= maxStep) {
          return wrapAngle(target);
        }
        return wrapAngle(current + Math.sign(diff) * maxStep);
      }

      function pick(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function worldPoint(angle, radius) {
        return {
          x: CENTER.x + Math.cos(angle) * radius,
          y: CENTER.y + Math.sin(angle) * radius,
        };
      }

      function isTouchStage() {
        return window.matchMedia("(hover: none), (pointer: coarse)").matches;
      }

      function getDifficulty() {
        return clamp((state.totalWaves + state.totalReflections * 0.55) / 24, 0, 1);
      }

      function getTurnSpeed() {
        return state.boostTimer > 0 ? 8.8 : 4.9;
      }

      function getParryAngle() {
        return state.boostTimer > 0 ? BOOST_PARRY_ANGLE : BASE_PARRY_ANGLE;
      }

      function getWaveTravelTime() {
        return lerp(1.22, 0.68, getDifficulty());
      }

      function getCollapseLife() {
        return lerp(1.55, 2.15, getDifficulty());
      }

      function getBoostReady() {
        return clamp(1 - state.boostCooldown / 1.05, 0, 1);
      }

      function getRoomIndex(angle) {
        let bestIndex = 0;
        let bestDistance = Infinity;
        for (let index = 0; index < SECTOR_ANGLES.length; index += 1) {
          const distance = angleDistance(angle, SECTOR_ANGLES[index]);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        }
        return bestIndex;
      }

      function setTargetFromClient(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const x = ((clientX - rect.left) / rect.width) * VIEW.width;
        const y = ((clientY - rect.top) / rect.height) * VIEW.height;
        const dx = x - CENTER.x;
        const dy = y - CENTER.y;
        if (Math.hypot(dx, dy) < 12) {
          return;
        }
        state.targetAngle = Math.atan2(dy, dx);
      }

      function spawnParticles(x, y, options = {}) {
        const count = options.count || 12;
        const speed = options.speed || 140;
        const spread = options.spread || Math.PI;
        const baseAngle = options.baseAngle ?? 0;
        const color = options.color || "rgba(255,255,255,0.9)";
        for (let index = 0; index < count; index += 1) {
          const angle = baseAngle + (Math.random() - 0.5) * spread;
          const velocity = speed * (0.4 + Math.random() * 0.8);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: 0.5 + Math.random() * 0.45,
            size: 1.6 + Math.random() * 3.2,
            color,
          });
        }
      }

      function addPopup(text, color) {
        state.popups.push({
          text,
          color,
          life: 0.9,
          y: CENTER.y - 112,
        });
      }

      function chooseNextAngle(previousAngle) {
        const difficulty = getDifficulty();
        const minJump = lerp(0.56, 1.14, difficulty);
        const dangerousAngles = state.collapseSegments
          .filter((segment) => segment.age > 0.12)
          .map((segment) => segment.angle);
        const candidates = SECTOR_ANGLES.filter((angle) => {
          if (angleDistance(angle, previousAngle) < minJump) {
            return false;
          }
          if (dangerousAngles.some((collapseAngle) => angleDistance(angle, collapseAngle) < 0.52)) {
            return false;
          }
          return true;
        });
        if (candidates.length) {
          return pick(candidates);
        }

        return SECTOR_ANGLES
          .slice()
          .sort((left, right) => angleDistance(previousAngle, right) - angleDistance(previousAngle, left))[0];
      }

      function chooseSymbol() {
        const highestStack = Math.max(...Object.values(state.sigilStacks));
        if (highestStack >= 2) {
          const hot = SYMBOLS.filter((symbol) => state.sigilStacks[symbol.id] === highestStack);
          if (Math.random() < 0.65) {
            return pick(hot);
          }
        }
        return pick(SYMBOLS);
      }

      function pushCollapseSegment(angle, symbol) {
        state.collapseSegments.push({
          angle,
          age: 0,
          life: getCollapseLife(),
          width: lerp(0.28, 0.44, getDifficulty()),
          symbol,
        });
        if (state.collapseSegments.length > 4) {
          state.collapseSegments.shift();
        }
      }

      function createWave(spawnAngle) {
        const symbol = chooseSymbol();
        const spawn = worldPoint(spawnAngle, WAVE_SPAWN_RADIUS);
        return {
          angle: spawnAngle,
          symbol,
          spawnX: spawn.x,
          spawnY: spawn.y,
          progress: 0,
          travelTime: getWaveTravelTime(),
          wobble: Math.random() * Math.PI * 2,
          radius: WAVE_SPAWN_RADIUS,
        };
      }

      function queueNextWave(initial = false) {
        const baseAngle = initial ? state.shieldAngle : state.safeAngle;
        const nextAngle = initial ? pick(SECTOR_ANGLES) : chooseNextAngle(baseAngle);
        state.safeAngle = nextAngle;
        state.currentWave = createWave(nextAngle);
        state.totalWaves += 1;
      }

      function resetStageState() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.shieldAngle = -Math.PI / 2;
        state.targetAngle = -Math.PI / 2;
        state.boostTimer = 0;
        state.boostCooldown = 0;
        state.streak = 0;
        state.totalReflections = 0;
        state.totalWaves = 0;
        state.clearedAt = 0;
        state.currentWave = null;
        state.collapseSegments = [];
        state.particles = [];
        state.popups = [];
        state.screenShake = 0;
        state.flashAlpha = 0;
        state.vignettePulse = 0;
        state.previewDrift = 0;
        state.lastReason = "";
        state.sigilStacks = { moon: 0, iris: 0, key: 0 };
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        queueNextWave(true);
      }

      function startStage() {
        resetStageState();
      }

      function triggerBoost() {
        if (state.mode !== "running") {
          return;
        }
        if (state.boostCooldown > 0.04) {
          return;
        }
        state.boostTimer = 0.44;
        state.boostCooldown = 1.05;
        state.screenShake = Math.max(state.screenShake, REDUCED_MOTION ? 3 : 5);
        addPopup("BOOST", "#86ffcf");
        spawnParticles(CENTER.x, CENTER.y, {
          count: REDUCED_MOTION ? 8 : 16,
          speed: 170,
          spread: Math.PI * 2,
          color: "rgba(134,255,207,0.95)",
        });
      }

      function failStage(reason) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flashAlpha = 0.42;
        state.screenShake = Math.max(state.screenShake, REDUCED_MOTION ? 7 : 12);
        window.relayStageResult.status = "failed";
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.clearedAt = state.elapsed;
        state.lastRunTime = state.elapsed;
        state.flashAlpha = 0.28;
        state.screenShake = Math.max(state.screenShake, REDUCED_MOTION ? 4 : 7);
        window.relayStageResult.status = "cleared";
        reportClearedToHost();
      }

      function resolveReflect(wave) {
        const shieldPoint = worldPoint(state.shieldAngle, SHIELD_RADIUS);
        state.streak += 1;
        state.totalReflections += 1;
        state.flashAlpha = 0.18;
        state.screenShake = Math.max(state.screenShake, REDUCED_MOTION ? 3 : 6);
        addPopup(state.boostTimer > 0 ? "Perfect" : "Reflect", wave.symbol.color);
        spawnParticles(shieldPoint.x, shieldPoint.y, {
          count: REDUCED_MOTION ? 10 : 22,
          speed: 220,
          spread: Math.PI * 0.9,
          baseAngle: wave.angle + Math.PI,
          color: wave.symbol.color,
        });
        pushCollapseSegment(wave.angle, wave.symbol);
        state.currentWave = null;
        if (state.streak >= STREAK_TARGET) {
          clearStage();
          return;
        }
        queueNextWave();
      }

      function resolveMiss(wave) {
        state.streak = 0;
        state.currentWave = null;
        state.sigilStacks[wave.symbol.id] += 1;
        state.flashAlpha = 0.34;
        state.screenShake = Math.max(state.screenShake, REDUCED_MOTION ? 6 : 11);
        addPopup(`${wave.symbol.label} Stack`, wave.symbol.color);
        spawnParticles(CENTER.x, CENTER.y, {
          count: REDUCED_MOTION ? 12 : 26,
          speed: 180,
          spread: Math.PI * 2,
          color: wave.symbol.color,
        });
        pushCollapseSegment(wave.angle, wave.symbol);
        if (state.sigilStacks[wave.symbol.id] >= STACK_FAIL_LIMIT) {
          failStage(`sigil_${wave.symbol.id}_overflow`);
          return;
        }
        queueNextWave();
      }

      function updateWave(dt) {
        const wave = state.currentWave;
        if (!wave) {
          return;
        }
        wave.progress = clamp(wave.progress + dt / wave.travelTime, 0, 1.04);
        const eased = easeOutCubic(wave.progress);
        wave.radius = lerp(WAVE_SPAWN_RADIUS, CORE_RADIUS - 4, eased);

        const parryReady = wave.radius <= SHIELD_RADIUS + 22;
        const coreHit = wave.radius <= CORE_RADIUS + 2;
        if (parryReady && angleDistance(state.shieldAngle, wave.angle) <= getParryAngle()) {
          resolveReflect(wave);
          return;
        }
        if (coreHit) {
          resolveMiss(wave);
        }
      }

      function updateCollapse(dt) {
        for (let index = state.collapseSegments.length - 1; index >= 0; index -= 1) {
          const segment = state.collapseSegments[index];
          segment.age += dt;
          if (segment.age >= segment.life) {
            state.collapseSegments.splice(index, 1);
            continue;
          }
          if (
            state.mode === "running" &&
            segment.age > 0.16 &&
            angleDistance(state.shieldAngle, segment.angle) <= lerp(0.1, segment.width, segment.age / segment.life)
          ) {
            failStage("collapse_line");
          }
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.98;
          particle.vy *= 0.98;
          particle.life -= dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }
      }

      function updatePopups(dt) {
        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          popup.y -= dt * 28;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }
      }

      function update(dt) {
        state.previewDrift += dt;
        state.flashAlpha = Math.max(0, state.flashAlpha - dt * 1.8);
        state.screenShake = Math.max(0, state.screenShake - dt * 14);
        state.vignettePulse = Math.max(0, state.vignettePulse - dt);
        state.boostTimer = Math.max(0, state.boostTimer - dt);
        state.boostCooldown = Math.max(0, state.boostCooldown - dt);
        boostButton.dataset.active = state.boostTimer > 0 ? "true" : "false";

        state.shieldAngle = approachAngle(state.shieldAngle, state.targetAngle, getTurnSpeed() * dt);

        updateParticles(dt);
        updatePopups(dt);
        updateCollapse(dt);

        if (state.mode === "running") {
          state.elapsed += dt;
          updateWave(dt);
        }
      }

      function roundRect(context, x, y, width, height, radius) {
        context.beginPath();
        context.moveTo(x + radius, y);
        context.arcTo(x + width, y, x + width, y + height, radius);
        context.arcTo(x + width, y + height, x, y + height, radius);
        context.arcTo(x, y + height, x, y, radius);
        context.arcTo(x, y, x + width, y, radius);
        context.closePath();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#110d23");
        gradient.addColorStop(0.48, "#0a1425");
        gradient.addColorStop(1, "#03060d");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 3; index += 1) {
          const pulse = state.previewDrift * (0.5 + index * 0.16);
          const x = VIEW.width * (0.18 + index * 0.31);
          const y = 48 + Math.sin(pulse + index) * 10;
          const radius = 78 + index * 24;
          const glow = ctx.createRadialGradient(x, y, 0, x, y, radius);
          glow.addColorStop(0, index === 1 ? "rgba(255,116,200,0.12)" : "rgba(137,242,255,0.08)");
          glow.addColorStop(0.58, index === 1 ? "rgba(255,116,200,0.04)" : "rgba(137,242,255,0.03)");
          glow.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(x, y, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.save();
        ctx.translate(0, VIEW.height * 0.55);
        for (let index = 0; index < 24; index += 1) {
          const t = index / 23;
          const y = Math.pow(t, 2.2) * 208;
          ctx.strokeStyle = `rgba(246,244,255,${0.02 + t * 0.06})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(VIEW.width * 0.5 - y * 2.2, y);
          ctx.lineTo(VIEW.width * 0.5 + y * 2.2, y);
          ctx.stroke();
        }
        for (let index = -6; index <= 6; index += 1) {
          ctx.strokeStyle = "rgba(255,255,255,0.028)";
          ctx.beginPath();
          ctx.moveTo(VIEW.width * 0.5 + index * 64, 0);
          ctx.lineTo(VIEW.width * 0.5 + index * 178, 216);
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        for (let index = 0; index < SECTOR_ANGLES.length; index += 1) {
          const angle = SECTOR_ANGLES[index];
          const point = {
            x: Math.cos(angle) * ROOM_RING_RADIUS,
            y: Math.sin(angle) * ROOM_RING_RADIUS,
          };
          const activeDistance = angleDistance(state.safeAngle, angle);
          const isActive = state.mode === "running" && activeDistance < 0.08;
          const doorWidth = 30;
          const doorHeight = 62;
          ctx.save();
          ctx.translate(point.x, point.y);
          ctx.rotate(angle + Math.PI / 2);
          ctx.fillStyle = isActive ? "rgba(137,242,255,0.16)" : "rgba(255,255,255,0.06)";
          ctx.strokeStyle = isActive ? "rgba(137,242,255,0.68)" : "rgba(255,255,255,0.12)";
          ctx.lineWidth = isActive ? 3 : 1.5;
          roundRect(ctx, -doorWidth / 2, -doorHeight / 2, doorWidth, doorHeight, 10);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = isActive ? "#d8fbff" : "rgba(246,244,255,0.65)";
          ctx.font = "600 10px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(String(208 + index), 0, 6);
          ctx.restore();
        }
        ctx.restore();
      }

      function drawArenaRing() {
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);

        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 26;
        ctx.beginPath();
        ctx.arc(0, 0, ROOM_RING_RADIUS - 24, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, SHIELD_RADIUS + 24, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for (let index = 0; index < SECTOR_ANGLES.length; index += 1) {
          const angle = SECTOR_ANGLES[index];
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * (CORE_RADIUS + 18), Math.sin(angle) * (CORE_RADIUS + 18));
          ctx.lineTo(Math.cos(angle) * (ROOM_RING_RADIUS - 6), Math.sin(angle) * (ROOM_RING_RADIUS - 6));
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawCollapseSegments() {
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);
        state.collapseSegments.forEach((segment) => {
          const lifeRatio = segment.age / segment.life;
          const alpha = 0.18 + (1 - lifeRatio) * 0.46;
          const width = lerp(0.12, segment.width, lifeRatio);

          ctx.strokeStyle = `rgba(255,91,114,${alpha})`;
          ctx.lineWidth = 30;
          ctx.beginPath();
          ctx.arc(0, 0, SHIELD_RADIUS + 22, segment.angle - width, segment.angle + width);
          ctx.stroke();

          const gradient = ctx.createLinearGradient(
            Math.cos(segment.angle) * ROOM_RING_RADIUS,
            Math.sin(segment.angle) * ROOM_RING_RADIUS,
            Math.cos(segment.angle) * (CORE_RADIUS - 10),
            Math.sin(segment.angle) * (CORE_RADIUS - 10)
          );
          gradient.addColorStop(0, "rgba(255,91,114,0.02)");
          gradient.addColorStop(0.4, `rgba(255,91,114,${alpha * 0.48})`);
          gradient.addColorStop(1, "rgba(255,255,255,0)");
          ctx.strokeStyle = gradient;
          ctx.lineWidth = 12;
          ctx.beginPath();
          ctx.moveTo(Math.cos(segment.angle) * ROOM_RING_RADIUS, Math.sin(segment.angle) * ROOM_RING_RADIUS);
          ctx.lineTo(Math.cos(segment.angle) * (CORE_RADIUS - 8), Math.sin(segment.angle) * (CORE_RADIUS - 8));
          ctx.stroke();
        });
        ctx.restore();
      }

      function drawCurrentWave() {
        const wave = state.currentWave;
        if (!wave) {
          return;
        }

        const point = worldPoint(wave.angle, wave.radius);
        const telegraph = ctx.createLinearGradient(wave.spawnX, wave.spawnY, CENTER.x, CENTER.y);
        telegraph.addColorStop(0, "rgba(255,255,255,0)");
        telegraph.addColorStop(0.25, wave.symbol.glow);
        telegraph.addColorStop(1, "rgba(255,255,255,0)");
        ctx.strokeStyle = telegraph;
        ctx.lineWidth = 10;
        ctx.beginPath();
        ctx.moveTo(wave.spawnX, wave.spawnY);
        ctx.lineTo(CENTER.x, CENTER.y);
        ctx.stroke();

        ctx.save();
        ctx.translate(point.x, point.y);
        ctx.rotate(wave.angle + Math.PI / 2 + Math.sin(state.elapsed * 8 + wave.wobble) * 0.06);

        ctx.shadowColor = wave.symbol.color;
        ctx.shadowBlur = 28;
        ctx.strokeStyle = wave.symbol.color;
        ctx.lineWidth = 4;
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.quadraticCurveTo(16, -2, 0, 18);
        ctx.quadraticCurveTo(-16, -2, 0, -18);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.82)";
        ctx.lineWidth = 2;
        drawSymbolGlyph(wave.symbol.id, 0, 0, 12);
        ctx.restore();
      }

      function drawSymbolGlyph(symbolId, x, y, size) {
        ctx.beginPath();
        if (symbolId === "moon") {
          ctx.arc(x, y, size, Math.PI * 0.25, Math.PI * 1.75);
          ctx.moveTo(x + size * 0.22, y - size * 0.9);
          ctx.arc(x + size * 0.42, y, size * 0.76, Math.PI * 1.4, Math.PI * 0.6, true);
        } else if (symbolId === "iris") {
          ctx.ellipse(x, y, size * 1.2, size * 0.72, 0, 0, Math.PI * 2);
          ctx.moveTo(x + size * 0.42, y);
          ctx.arc(x, y, size * 0.42, 0, Math.PI * 2);
        } else {
          ctx.moveTo(x, y - size);
          ctx.lineTo(x + size * 0.6, y - size * 0.18);
          ctx.lineTo(x + size * 0.24, y - size * 0.18);
          ctx.lineTo(x + size * 0.24, y + size);
          ctx.lineTo(x - size * 0.24, y + size);
          ctx.lineTo(x - size * 0.24, y - size * 0.18);
          ctx.lineTo(x - size * 0.6, y - size * 0.18);
          ctx.closePath();
        }
        ctx.stroke();
      }

      function drawCore() {
        const coreGlow = ctx.createRadialGradient(CENTER.x, CENTER.y, 0, CENTER.x, CENTER.y, 120);
        coreGlow.addColorStop(0, "rgba(255,255,255,0.58)");
        coreGlow.addColorStop(0.3, "rgba(137,242,255,0.22)");
        coreGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = coreGlow;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, 120, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#f6f4ff";
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, CORE_RADIUS, 0, Math.PI * 2);
        ctx.fill();

        const innerGlow = ctx.createRadialGradient(CENTER.x, CENTER.y, 0, CENTER.x, CENTER.y, CORE_RADIUS);
        innerGlow.addColorStop(0, "rgba(255,255,255,0.94)");
        innerGlow.addColorStop(1, "rgba(193,208,255,0.12)");
        ctx.fillStyle = innerGlow;
        ctx.beginPath();
        ctx.arc(CENTER.x, CENTER.y, CORE_RADIUS - 4, 0, Math.PI * 2);
        ctx.fill();

        SYMBOLS.forEach((symbol, index) => {
          const stack = state.sigilStacks[symbol.id];
          const x = CENTER.x - 52 + index * 52;
          const y = CENTER.y + 90;
          ctx.fillStyle = "rgba(9, 14, 26, 0.62)";
          roundRect(ctx, x - 18, y - 18, 36, 36, 12);
          ctx.fill();
          ctx.strokeStyle = stack >= 2 ? symbol.color : "rgba(255,255,255,0.12)";
          ctx.lineWidth = 2;
          roundRect(ctx, x - 18, y - 18, 36, 36, 12);
          ctx.stroke();
          ctx.strokeStyle = symbol.color;
          ctx.lineWidth = 1.8;
          drawSymbolGlyph(symbol.id, x, y, 7);
          ctx.fillStyle = stack >= 2 ? symbol.color : "rgba(255,255,255,0.72)";
          ctx.font = "700 13px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(`${stack}/${STACK_FAIL_LIMIT}`, x, y + 31);
        });
        ctx.textAlign = "left";
      }

      function drawShield() {
        const shieldPoint = worldPoint(state.shieldAngle, SHIELD_RADIUS);
        const arcHalf = state.boostTimer > 0 ? 0.32 : 0.22;
        ctx.save();
        ctx.translate(CENTER.x, CENTER.y);

        ctx.shadowColor = state.boostTimer > 0 ? "#86ffcf" : "#89f2ff";
        ctx.shadowBlur = state.boostTimer > 0 ? 24 : 18;
        ctx.strokeStyle = state.boostTimer > 0 ? "#86ffcf" : "#89f2ff";
        ctx.lineWidth = 16;
        ctx.beginPath();
        ctx.arc(0, 0, SHIELD_RADIUS, state.shieldAngle - arcHalf, state.shieldAngle + arcHalf);
        ctx.stroke();

        ctx.strokeStyle = "rgba(255,255,255,0.84)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(0, 0, SHIELD_RADIUS, state.shieldAngle - arcHalf * 0.76, state.shieldAngle + arcHalf * 0.76);
        ctx.stroke();

        ctx.restore();

        const glow = ctx.createRadialGradient(shieldPoint.x, shieldPoint.y, 0, shieldPoint.x, shieldPoint.y, 34);
        glow.addColorStop(0, state.boostTimer > 0 ? "rgba(134,255,207,0.32)" : "rgba(137,242,255,0.24)");
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(shieldPoint.x, shieldPoint.y, 34, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(shieldPoint.x, shieldPoint.y);
        ctx.rotate(state.shieldAngle + Math.PI / 2);
        ctx.fillStyle = "rgba(5,12,25,0.92)";
        ctx.strokeStyle = state.boostTimer > 0 ? "#86ffcf" : "#f6f4ff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.quadraticCurveTo(16, -10, 14, 8);
        ctx.quadraticCurveTo(0, 20, -14, 8);
        ctx.quadraticCurveTo(-16, -10, 0, -18);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          ctx.fillStyle = particle.color;
          ctx.globalAlpha = clamp(particle.life * 1.6, 0, 1);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        });
      }

      function drawPopups() {
        ctx.textAlign = "center";
        state.popups.forEach((popup) => {
          ctx.globalAlpha = clamp(popup.life * 1.4, 0, 1);
          ctx.fillStyle = popup.color;
          ctx.font = "800 20px Avenir Next";
          ctx.fillText(popup.text, CENTER.x, popup.y);
        });
        ctx.globalAlpha = 1;
        ctx.textAlign = "left";
      }

      function drawHud() {
        ctx.save();

        ctx.fillStyle = "rgba(5,12,25,0.66)";
        roundRect(ctx, 24, 22, 180, 88, 24);
        ctx.fill();
        ctx.fillStyle = "#f6f4ff";
        ctx.font = "700 13px Avenir Next";
        ctx.fillText("STREAK", 42, 48);
        ctx.font = "800 34px Avenir Next";
        ctx.fillText(`${state.streak}`, 40, 86);
        ctx.font = "700 16px Avenir Next";
        ctx.fillStyle = "rgba(246,244,255,0.8)";
        ctx.fillText(`/ ${STREAK_TARGET}`, 94, 86);
        ctx.fillStyle = "#89f2ff";
        ctx.font = "700 12px Avenir Next";
        ctx.fillText("Collapse before it swallows the lane", 42, 104);

        ctx.fillStyle = "rgba(5,12,25,0.66)";
        roundRect(ctx, VIEW.width - 244, 22, 220, 88, 24);
        ctx.fill();
        ctx.fillStyle = "#f6f4ff";
        ctx.font = "700 13px Avenir Next";
        ctx.fillText("PULSE BOOST", VIEW.width - 222, 48);
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        roundRect(ctx, VIEW.width - 222, 60, 176, 18, 999);
        ctx.fill();
        ctx.fillStyle = "#86ffcf";
        roundRect(ctx, VIEW.width - 222, 60, 176 * getBoostReady(), 18, 999);
        ctx.fill();
        ctx.fillStyle = "rgba(246,244,255,0.82)";
        ctx.font = "700 12px Avenir Next";
        ctx.fillText(state.boostCooldown > 0 ? "cooldown" : "tap or Space", VIEW.width - 222, 100);

        ctx.fillStyle = "rgba(5,12,25,0.46)";
        roundRect(ctx, 308, 24, 344, 36, 18);
        ctx.fill();
        ctx.fillStyle = "rgba(246,244,255,0.84)";
        ctx.font = "700 14px Avenir Next";
        const symbol = state.currentWave?.symbol?.label || "Pulse";
        const room = 208 + getRoomIndex(state.safeAngle);
        ctx.textAlign = "center";
        ctx.fillText(`ROOM ${room}  •  ${symbol} wave inbound`, VIEW.width * 0.5, 48);
        ctx.textAlign = "left";

        ctx.restore();
      }

      function drawOverlay() {
        if (state.mode === "running") {
          return;
        }

        ctx.fillStyle = "rgba(3, 6, 13, 0.62)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.fillStyle = "rgba(7, 13, 24, 0.78)";
        roundRect(ctx, 112, 88, 736, 364, 34);
        ctx.fill();

        const accent =
          state.mode === "cleared" ? "#86ffcf" : state.mode === "failed" ? "#ff5b72" : "#89f2ff";
        ctx.strokeStyle = accent;
        ctx.lineWidth = 3;
        roundRect(ctx, 112, 88, 736, 364, 34);
        ctx.stroke();

        ctx.textAlign = "center";
        ctx.fillStyle = accent;
        ctx.font = "800 18px Avenir Next";
        ctx.fillText("Dream Motel: Pulse Fence", VIEW.width * 0.5, 136);

        ctx.fillStyle = "#f6f4ff";
        ctx.font = "800 46px Avenir Next";
        const title =
          state.mode === "menu" ? "회전 방패를 세워라" : state.mode === "cleared" ? "라인 붕괴 탈출" : "펄스 붕괴";
        ctx.fillText(title, VIEW.width * 0.5, 194);

        ctx.font = "600 21px Avenir Next";
        ctx.fillStyle = "rgba(246,244,255,0.88)";
        const lines =
          state.mode === "menu"
            ? [
                "드래그로 방패를 돌리고, Pulse 탭으로 급회전 구간을 넘기세요.",
                "방금 막은 각도는 곧 붕괴선이 되니 다음 방 번호로 바로 옮겨야 합니다.",
                "20연속 반사로 탈출, 같은 문양 3회 누적 또는 붕괴선 접촉 시 종료.",
              ]
            : state.mode === "cleared"
              ? [
                  `연속 반사 ${state.streak}/${STREAK_TARGET} 성공`,
                  `총 ${state.totalReflections}회 반사, ${state.clearedAt.toFixed(1)}초에 클리어`,
                  "Enter 또는 터치로 다시 도전",
                ]
              : [
                  state.lastReason === "collapse_line"
                    ? "무너진 복도 라인이 방패를 삼켰습니다."
                    : "같은 문양이 코어에 세 번 쌓이며 모텔 결계가 붕괴됐습니다.",
                  `최고 흐름은 ${state.totalReflections}회 반사, 현재 스택 ${Object.values(state.sigilStacks).join("/")}`,
                  "Enter 또는 터치로 다시 도전",
                ];
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width * 0.5, 256 + index * 36);
        });

        if (state.mode === "menu") {
          ctx.fillStyle = "rgba(255,255,255,0.08)";
          roundRect(ctx, 188, 344, 584, 64, 999);
          ctx.fill();
          ctx.fillStyle = "#f6f4ff";
          ctx.font = "800 18px Avenir Next";
          ctx.fillText("터치 또는 Enter로 시작", VIEW.width * 0.5, 384);
        }
        ctx.textAlign = "left";
      }

      function drawFlash() {
        if (state.flashAlpha <= 0) {
          return;
        }
        ctx.fillStyle = `rgba(255,255,255,${state.flashAlpha})`;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
      }

      function render() {
        ctx.save();
        if (state.screenShake > 0 && !REDUCED_MOTION) {
          const shake = state.screenShake;
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
        }
        drawBackground();
        drawArenaRing();
        drawCollapseSegments();
        drawCurrentWave();
        drawCore();
        drawShield();
        drawParticles();
        drawHud();
        drawPopups();
        drawFlash();
        drawOverlay();
        ctx.restore();
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system: "origin top-left, x right, y down, angles in radians from rightward axis",
          mode: state.mode,
          shield: {
            angle: Number(state.shieldAngle.toFixed(2)),
            target_angle: Number(state.targetAngle.toFixed(2)),
            room: 208 + getRoomIndex(state.shieldAngle),
            boost_ready: Number(getBoostReady().toFixed(2)),
            boosted: state.boostTimer > 0,
          },
          streak: state.streak,
          reflections: state.totalReflections,
          current_wave: state.currentWave
            ? {
                symbol: state.currentWave.symbol.id,
                angle: Number(state.currentWave.angle.toFixed(2)),
                room: 208 + getRoomIndex(state.currentWave.angle),
                radius: Number(state.currentWave.radius.toFixed(1)),
                time_to_core: Number(Math.max(0, (1 - state.currentWave.progress) * state.currentWave.travelTime).toFixed(2)),
              }
            : null,
          collapse_segments: state.collapseSegments.slice(0, 4).map((segment) => ({
            angle: Number(segment.angle.toFixed(2)),
            room: 208 + getRoomIndex(segment.angle),
            age: Number(segment.age.toFixed(2)),
          })),
          sigil_stacks: state.sigilStacks,
          result: window.relayStageResult.status,
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startFromInput() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus();
        startFromInput();
        input.pointerId = event.pointerId;
        input.dragging = true;
        canvas.setPointerCapture?.(event.pointerId);
        setTargetFromClient(event.clientX, event.clientY);
      }

      function handlePointerMove(event) {
        if (!input.dragging && event.pointerId !== input.pointerId) {
          return;
        }
        setTargetFromClient(event.clientX, event.clientY);
      }

      function stopDragging(event) {
        if (event && input.pointerId !== null && event.pointerId !== input.pointerId) {
          return;
        }
        input.dragging = false;
        input.pointerId = null;
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.().catch(() => {});
          return;
        }
        document.exitFullscreen?.().catch(() => {});
      }

      function onKeyDown(event) {
        if (event.key === "Enter") {
          event.preventDefault();
          startFromInput();
          return;
        }
        if (event.key === " " || event.key === "Spacebar") {
          event.preventDefault();
          if (state.mode !== "running") {
            startFromInput();
          }
          triggerBoost();
          return;
        }
        if (event.key.toLowerCase() === "f") {
          event.preventDefault();
          toggleFullscreen();
        }
      }

      function frame(timestamp) {
        const dt = lastTimestamp ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT) : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        render();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: "dream-motel-pulse-fencing-collapse",
        title: "Dream Motel: Pulse Fence",
        description:
          "회전 방패로 문양 파형을 튕기고, 방금 안전했던 각도가 붕괴되기 전에 다음 라인으로 미끄러지는 반응 액션",
        creator: {
          name: "jungcollin",
          avatar: null,
          github: "jungcollin",
        },
        genre: "Reactive shield action / 붕괴하는 라인",
        clearCondition: "붕괴선보다 먼저 20연속 파형 반사",
        failCondition: "붕괴선에 휩쓸리거나 같은 문양 3회 누적",
        controls:
          "포인터 또는 터치 드래그로 방패 각도 조절, 탭으로 순간 증폭, 이동 후 바로 다음 지점으로 이어 달리기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          resetStageState();
          state.streak = STREAK_TARGET;
          state.totalReflections = STREAK_TARGET;
          clearStage();
          render();
        },
        forceFail() {
          resetStageState();
          state.sigilStacks.moon = STACK_FAIL_LIMIT;
          failStage("debug_force_fail");
          render();
        },
      };

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", stopDragging);
      canvas.addEventListener("pointercancel", stopDragging);
      canvas.addEventListener("lostpointercapture", stopDragging);
      canvas.addEventListener(
        "touchstart",
        (event) => {
          if (state.mode !== "running") {
            event.preventDefault();
            startFromInput();
          }
        },
        { passive: false }
      );
      canvas.addEventListener("click", () => canvas.focus());
      boostButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        if (state.mode !== "running") {
          startFromInput();
        }
        triggerBoost();
      });
      boostButton.addEventListener("click", (event) => event.preventDefault());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));
      window.addEventListener("resize", () => {
        if (!isTouchStage()) {
          boostButton.dataset.active = "false";
        }
      });

      reportReadyToHost();
      render();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
