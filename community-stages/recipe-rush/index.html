<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>레시피 러시</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        background: #FFF5E6; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(200, 150, 80, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80, 50, 20, 0.92);
        color: #FFF5E6; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #FFF5E6; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(200, 130, 60, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">레시피 러시. 화면에 표시된 재료를 터치하여 올바른 냄비에 넣으세요. 모바일에서는 터치 탭으로 조작합니다. 35초 제한. 잘못 넣기 5회 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="레시피 러시" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "recipe-rush",
        title: "레시피 러시",
        description: "레시피 순서대로 재료를 올바른 냄비에 넣어 요리를 완성하세요",
        creator: "jungcollin",
        genre: "Sorting puzzle",
        clearCondition: "레시피 5개를 완성하면 클리어",
        failCondition: "시간 초과 또는 잘못 넣기 5회",
        controls: "터치로 재료를 올바른 냄비에 넣으세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };
      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      const COL = {
        bg: "#FFF5E6", bgDark: "#F0DCC0",
        text: "#5A3820", textLight: "rgba(90, 56, 32, 0.5)",
        pot1: "#D45040", pot2: "#4890C0", pot3: "#60A050",
        accent: "#D08030", success: "#60A850", fail: "#C05040",
        ingredient: "#F8E8D0",
      };

      // Recipes: each is a sequence of ingredients to put in correct pot
      const INGREDIENTS = [
        { name: "당근", emoji: "\uD83E\uDD55", color: "#E88040" },
        { name: "양파", emoji: "\uD83E\uDDC5", color: "#E8D070" },
        { name: "감자", emoji: "\uD83E\uDD54", color: "#D0A860" },
        { name: "토마토", emoji: "\uD83C\uDF45", color: "#D05040" },
        { name: "버섯", emoji: "\uD83C\uDF44", color: "#B89870" },
        { name: "고추", emoji: "\uD83C\uDF36", color: "#C03030" },
        { name: "마늘", emoji: "\uD83E\uDDC4", color: "#E8D8B8" },
        { name: "브로콜리", emoji: "\uD83E\uDD66", color: "#58A048" },
      ];

      const POT_COUNT = 3;
      const POT_COLORS = [COL.pot1, COL.pot2, COL.pot3];
      const POT_NAMES = ["빨간 냄비", "파란 냄비", "초록 냄비"];

      function generateRecipe() {
        const len = 3 + Math.floor(Math.random() * 2); // 3-4 ingredients
        const steps = [];
        for (let i = 0; i < len; i++) {
          steps.push({
            ingredient: INGREDIENTS[Math.floor(Math.random() * INGREDIENTS.length)],
            pot: Math.floor(Math.random() * POT_COUNT),
          });
        }
        return steps;
      }

      const DURATION = 35;
      const TARGET_RECIPES = 5;
      const MAX_MISTAKES = 5;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      let completedRecipes = 0;
      let mistakes = 0;
      let shake = 0;
      let flashAlpha = 0;
      let flashColor = COL.success;
      let clearAnim = 0;

      let currentRecipe = [];
      let currentStepIndex = 0;
      let potAnims = [0, 0, 0]; // bounce animation per pot
      let ingredientAnim = { scale: 1, y: 0 };
      let particles = [];

      // Pot positions
      const POT_Y = H - 100;
      const POT_W = 100;
      const POT_H = 70;
      function potX(i) { return CX - (POT_COUNT * (POT_W + 30) - 30) / 2 + i * (POT_W + 30) + POT_W / 2; }

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(-Math.PI, 0);
          const speed = rand(40, 120);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: rand(3, 7),
          });
        }
      }

      function nextRecipe() {
        currentRecipe = generateRecipe();
        currentStepIndex = 0;
        ingredientAnim = { scale: 1.3, y: -20 };
      }

      function handlePotTap(potIndex) {
        if (mode !== "running") return;
        if (currentStepIndex >= currentRecipe.length) return;

        const step = currentRecipe[currentStepIndex];
        if (potIndex === step.pot) {
          // Correct!
          potAnims[potIndex] = 1;
          const px = potX(potIndex);
          spawnParticles(px, POT_Y - 20, reducedMotion ? 3 : 8, step.ingredient.color);
          currentStepIndex++;
          ingredientAnim = { scale: 1.3, y: -20 };

          if (currentStepIndex >= currentRecipe.length) {
            // Recipe complete!
            completedRecipes++;
            flashAlpha = 0.2; flashColor = COL.success;
            spawnParticles(CX, CY, reducedMotion ? 5 : 12, COL.accent);

            if (completedRecipes >= TARGET_RECIPES) {
              mode = "clear"; clearAnim = 0;
              window.relayStageResult.status = "cleared"; reportCleared();
            } else {
              nextRecipe();
            }
          }
        } else {
          // Wrong pot!
          mistakes++;
          shake = 8;
          flashAlpha = 0.3; flashColor = COL.fail;

          if (mistakes >= MAX_MISTAKES) {
            mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("잘못 넣기 초과");
          }
        }
      }

      function reset() {
        elapsed = 0; completedRecipes = 0; mistakes = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        potAnims = [0, 0, 0]; particles = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        nextRecipe();
      }

      function update(dt) {
        if (mode !== "running" && mode !== "clear") {
          shake *= 0.88; if (shake < 0.3) shake = 0; flashAlpha *= 0.92;
          if (mode === "clear") clearAnim = clamp(clearAnim + dt * 1.5, 0, 1);
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt;
            p.vy += 150 * dt; p.life -= dt * 2;
            if (p.life <= 0) particles.splice(i, 1);
          }
          return;
        }

        if (mode === "running") elapsed += dt;

        // Pot bounce anims
        for (let i = 0; i < POT_COUNT; i++) potAnims[i] *= 0.9;

        // Ingredient animation
        ingredientAnim.scale = lerp(ingredientAnim.scale, 1, clamp(8 * dt, 0, 1));
        ingredientAnim.y = lerp(ingredientAnim.y, 0, clamp(8 * dt, 0, 1));

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]; p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 150 * dt; p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        if (mode === "running" && elapsed >= DURATION) {
          mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("시간 초과");
        }
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background
        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);

        // Counter pattern
        if (!reducedMotion) {
          ctx.fillStyle = "rgba(200, 170, 130, 0.05)";
          for (let x = 0; x < W; x += 40) for (let y = 0; y < H; y += 40) {
            if ((x / 40 + y / 40) % 2 === 0) ctx.fillRect(x, y, 40, 40);
          }
        }

        if (mode === "running" || mode === "clear" || mode === "failed") drawGame();

        if (flashAlpha > 0.01) {
          ctx.fillStyle = flashColor === COL.fail ? `rgba(192,80,64,${flashAlpha})` : `rgba(96,168,80,${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        for (const p of particles) {
          ctx.globalAlpha = clamp(p.life, 0, 1);
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawGame() {
        // Pots
        for (let i = 0; i < POT_COUNT; i++) {
          const px = potX(i);
          const bounce = potAnims[i] * -8;

          // Pot body
          ctx.fillStyle = POT_COLORS[i];
          roundRect(px - POT_W/2, POT_Y + bounce - POT_H/2, POT_W, POT_H, 8);
          ctx.fill();

          // Pot rim
          ctx.fillStyle = "rgba(255,255,255,0.2)";
          ctx.fillRect(px - POT_W/2 + 4, POT_Y + bounce - POT_H/2, POT_W - 8, 8);

          // Pot handles
          ctx.strokeStyle = POT_COLORS[i];
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(px - POT_W/2 - 8, POT_Y + bounce, 10, -Math.PI/2, Math.PI/2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(px + POT_W/2 + 8, POT_Y + bounce, 10, Math.PI/2, -Math.PI/2);
          ctx.stroke();

          // Pot label
          ctx.fillStyle = "rgba(255,255,255,0.8)";
          ctx.font = `bold 14px "Segoe UI", sans-serif`;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(POT_NAMES[i], px, POT_Y + bounce + 5);
        }

        // Recipe card (top area)
        if (currentRecipe.length > 0) {
          const cardW = Math.min(500, W - 60);
          const cardX = CX - cardW / 2;
          const cardY = 75;

          ctx.fillStyle = "rgba(248, 232, 208, 0.9)";
          roundRect(cardX, cardY, cardW, 60, 8);
          ctx.fill();
          ctx.strokeStyle = COL.accent;
          ctx.lineWidth = 2;
          roundRect(cardX, cardY, cardW, 60, 8);
          ctx.stroke();

          // Recipe steps
          const stepW = cardW / currentRecipe.length;
          for (let i = 0; i < currentRecipe.length; i++) {
            const step = currentRecipe[i];
            const sx = cardX + i * stepW + stepW / 2;
            const sy = cardY + 20;

            const isActive = i === currentStepIndex;
            const isDone = i < currentStepIndex;

            // Ingredient
            ctx.font = isDone ? `20px sans-serif` : isActive ? `28px sans-serif` : `20px sans-serif`;
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.globalAlpha = isDone ? 0.3 : isActive ? 1 : 0.6;
            ctx.fillText(step.ingredient.emoji, sx, sy);

            // Arrow to pot color
            const dotY = cardY + 46;
            ctx.beginPath(); ctx.arc(sx, dotY, 6, 0, Math.PI * 2);
            ctx.fillStyle = isDone ? COL.bgDark : POT_COLORS[step.pot];
            ctx.fill();
            ctx.globalAlpha = 1;

            // Active indicator
            if (isActive) {
              ctx.strokeStyle = COL.accent;
              ctx.lineWidth = 2;
              ctx.beginPath(); ctx.arc(sx, sy, 18, 0, Math.PI * 2); ctx.stroke();
            }
          }
        }

        // Current ingredient display (large)
        if (currentStepIndex < currentRecipe.length) {
          const step = currentRecipe[currentStepIndex];
          const iy = 200 + ingredientAnim.y;
          const scale = ingredientAnim.scale;

          ctx.font = `${Math.round(48 * scale)}px sans-serif`;
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(step.ingredient.emoji, CX, iy);

          ctx.fillStyle = COL.text;
          ctx.font = `bold 16px "Segoe UI", sans-serif`;
          ctx.fillText(`${step.ingredient.name}`, CX, iy + 40);

          // Arrow pointing to target pot
          ctx.fillStyle = POT_COLORS[step.pot];
          ctx.font = `bold 14px "Segoe UI", sans-serif`;
          ctx.fillText(`\u2193 ${POT_NAMES[step.pot]}`, CX, iy + 62);
        }

        drawHUD();
      }

      function drawHUD() {
        ctx.fillStyle = COL.text; ctx.font = `500 16px "Segoe UI", sans-serif`;
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        const timeLeft = Math.max(0, DURATION - elapsed);
        ctx.fillStyle = timeLeft < 10 ? COL.fail : COL.text;
        ctx.fillText(`${Math.ceil(timeLeft)}`, 24, 20);

        ctx.fillStyle = COL.text; ctx.textAlign = "center";
        ctx.fillText(`${completedRecipes} / ${TARGET_RECIPES}`, CX, 20);

        for (let i = 0; i < TARGET_RECIPES; i++) {
          const ix = CX - (TARGET_RECIPES - 1) * 10 + i * 20;
          ctx.beginPath(); ctx.arc(ix, 46, 5, 0, Math.PI * 2);
          if (i < completedRecipes) { ctx.fillStyle = COL.accent; ctx.fill(); }
          else { ctx.strokeStyle = COL.textLight; ctx.lineWidth = 1.5; ctx.stroke(); }
        }

        ctx.textAlign = "right";
        ctx.fillStyle = mistakes > 2 ? COL.fail : COL.text;
        ctx.fillText(`\u2717 ${mistakes}/${MAX_MISTAKES}`, W - 24, 20);

        const barW = W - 48;
        ctx.fillStyle = COL.bgDark; ctx.fillRect(24, 58, barW, 3);
        const progress = clamp(elapsed / DURATION, 0, 1);
        ctx.fillStyle = progress > 0.75 ? COL.fail : COL.accent;
        ctx.fillRect(24, 58, barW * (1 - progress), 3);
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r); ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r); ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r); ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r); ctx.closePath();
      }

      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40); const lineH = 26;
        const cardH = 50 + lines.length * lineH + 36;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = "rgba(255,245,230,0.96)"; roundRect(cardX, cardY, cardW, cardH, 10); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cardX + 16, cardY, cardW - 32, 3);
        ctx.fillStyle = COL.text; ctx.font = `bold 24px "Segoe UI", sans-serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cardY + 16);
        ctx.font = `400 14px "Segoe UI", sans-serif`; ctx.fillStyle = "rgba(90,56,32,0.7)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * lineH);
        ctx.fillStyle = "rgba(90,56,32,0.35)"; ctx.font = `400 13px "Segoe UI", sans-serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(255,245,230,0.5)"; ctx.fillRect(0, 0, W, H);
        drawCard("레시피 러시", [
          "레시피에 따라 재료를",
          "올바른 냄비에 터치하여 넣으세요", "",
          "조작: 화면 터치로 냄비 선택",
          "클리어: 레시피 5개 완성",
          "실패: 시간초과 또는 잘못넣기 5회",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(255,245,230,${clearAnim * 0.6})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("요리 완성!", [`${Math.ceil(elapsed)}초 만에 완료`, `실수: ${mistakes}회`], COL.success);
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(60,30,10,0.25)"; ctx.fillRect(0, 0, W, H);
        const reason = elapsed >= DURATION ? "시간이 다했습니다" : "실수가 너무 많습니다";
        drawCard("실패", [reason, `완성: ${completedRecipes} / ${TARGET_RECIPES}`, `실수: ${mistakes}회`], COL.fail);
      }

      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);

        // Check pot taps
        for (let i = 0; i < POT_COUNT; i++) {
          const px = potX(i);
          if (Math.abs(p.x - px) < POT_W / 2 + 15 && p.y > POT_Y - POT_H && p.y < H) {
            handlePotTap(i);
            return;
          }
        }
      });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); if (mode !== "running") handleStart(); return; }
        if (mode === "running") {
          if (e.key === "1" || e.key === "a") handlePotTap(0);
          else if (e.key === "2" || e.key === "s") handlePotTap(1);
          else if (e.key === "3" || e.key === "d") handlePotTap(2);
        }
      });

      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), completedRecipes, currentStepIndex, mistakes, result: window.relayStageResult.status });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; completedRecipes = TARGET_RECIPES; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; mistakes = MAX_MISTAKES; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      nextRecipe();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
