<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Glass Aquarium: Tide Anchor</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(130, 236, 255, 0.1), transparent 42%),
          linear-gradient(180deg, #071825 0%, #091421 35%, #040910 100%);
        font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(153, 246, 228, 0.18);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(8, 20, 34, 0.94);
        color: #f8fdff;
        font-weight: 800;
        text-decoration: none;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(153, 246, 228, 0.88);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Glass Aquarium: Tide Anchor. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 포인터 또는 터치로 닻 위치 지정, 탭으로 발사, 스와이프로 회수, 모바일은 터치와 드래그만으로 플레이 이며, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현되어 있습니다. 클리어 조건은 충전을 남기고 조류 6파 동안 발전기를 지키기 입니다. 실패 조건은 충전 소진 뒤 핵심 화물 유실 또는 기믹 실수 시 실패 입니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Glass Aquarium: Tide Anchor"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const META = {
        id: "glass-aquarium-tide-anchoring-charge",
        title: "Glass Aquarium: Tide Anchor",
        description:
          "시간 조류 예보선을 읽고 제한 충전 닻으로 유리 수조 화물을 고정해 발전기를 지키는 예측 생존 스테이지",
        creator: {
          name: "jungcollin",
          avatar: null,
          github: "jungcollin",
        },
        genre: "Prediction survival / 제한 충전",
        clearCondition: "충전을 남기고 조류 6파 동안 발전기를 지키기",
        failCondition: "충전 소진 뒤 핵심 화물 유실 또는 기믹 실수 시 실패",
        controls:
          "포인터 또는 터치로 닻 위치 지정, 탭으로 발사, 스와이프로 회수, 모바일은 터치와 드래그만으로 플레이",
      };

      window.relayStageMeta = META;
      window.relayStageResult = { status: "running" };

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const AQUARIUM = { left: 82, right: 878, top: 62, bottom: 472 };
      const GENERATOR = { x: 480, y: 414, r: 56 };
      const CHARGE_LIMIT = 5;
      const PREFERS_REDUCED_MOTION =
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const relayContext =
        window.RelayRuntime?.readContext(META.id) || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const WAVES = [
        {
          name: "Blueback Rise",
          label: "청유리 상승류",
          note: "우상단 고정이 가장 안전합니다.",
          forecast: 2.75,
          surge: 3.15,
          strength: 285,
          current: { x: -0.86, y: 1.52 },
          turbulence: 34,
          seed: 0.7,
          suggested: { x: 738, y: AQUARIUM.top },
        },
        {
          name: "Prism Shear",
          label: "프리즘 전단류",
          note: "같은 닻을 유지하면 충전을 아낄 수 있습니다.",
          forecast: 2.45,
          surge: 3.15,
          strength: 268,
          current: { x: -0.42, y: 1.44 },
          turbulence: 30,
          seed: 1.6,
          suggested: { x: 704, y: AQUARIUM.top },
        },
        {
          name: "Amber Recoil",
          label: "앰버 반동류",
          note: "흐름이 뒤집힙니다. 좌상단으로 재배치하세요.",
          forecast: 2.55,
          surge: 3.2,
          strength: 296,
          current: { x: 0.84, y: 1.48 },
          turbulence: 34,
          seed: 2.2,
          suggested: { x: 252, y: AQUARIUM.top },
        },
        {
          name: "Split Helix",
          label: "이중 나선류",
          note: "좌상단 고정 유지로 두 번째 흐름도 버팁니다.",
          forecast: 2.4,
          surge: 3.15,
          strength: 312,
          current: { x: 1.04, y: 1.3 },
          turbulence: 38,
          seed: 3.1,
          suggested: { x: 220, y: AQUARIUM.top },
        },
        {
          name: "Mirror Drop",
          label: "거울 낙하류",
          note: "정중앙 상단으로 옮겨 수직 낙하를 버티세요.",
          forecast: 2.55,
          surge: 3.3,
          strength: 334,
          current: { x: 0.08, y: 1.88 },
          turbulence: 28,
          seed: 4.4,
          suggested: { x: 480, y: AQUARIUM.top },
        },
        {
          name: "Last Undertow",
          label: "최종 역파류",
          note: "마지막 우상단 예측 고정으로 발전기를 지키세요.",
          forecast: 2.35,
          surge: 3.4,
          strength: 344,
          current: { x: -0.74, y: 1.68 },
          turbulence: 40,
          seed: 5.1,
          suggested: { x: 732, y: AQUARIUM.top },
        },
      ];

      const input = {
        pointerId: null,
        down: false,
        startX: 0,
        startY: 0,
        startTime: 0,
        moved: false,
        keyboardAnchorShift: 0,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let accumulator = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        phase: "forecast",
        elapsed: 0,
        lastRunTime: 0,
        waveIndex: 0,
        phaseTimer: 0,
        charges: CHARGE_LIMIT,
        hint: "예보선을 읽고 벽에 닻을 박으세요.",
        cursor: { x: 738, y: AQUARIUM.top, visible: true },
        candidateAnchor: { x: 738, y: AQUARIUM.top },
        preview: null,
        cargo: createCargo(),
        anchor: null,
        flash: 0,
        banner: 1,
        screenShake: 0,
        causticPhase: 0,
        bubbles: createBubbles(PREFERS_REDUCED_MOTION ? 18 : 34),
        particles: [],
        popups: [],
        ambientDrift: 0,
      };

      function createCargo() {
        return {
          x: 480,
          y: 212,
          vx: 0,
          vy: 0,
          r: 24,
          angle: 0,
          spin: 0,
          glow: 0,
          pulse: 0,
        };
      }

      function createBubbles(count) {
        return Array.from({ length: count }, (_, index) => ({
          x: AQUARIUM.left + 20 + ((index * 97) % (AQUARIUM.right - AQUARIUM.left - 40)),
          y: AQUARIUM.bottom - ((index * 57) % 420),
          r: 3 + (index % 5),
          speed: 10 + (index % 7) * 5,
          sway: 10 + (index % 6) * 3,
          phase: index * 0.83,
          alpha: 0.15 + (index % 5) * 0.05,
        }));
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function easeInOutSine(value) {
        return -(Math.cos(Math.PI * value) - 1) / 2;
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function normalize(x, y) {
        const length = Math.hypot(x, y) || 1;
        return { x: x / length, y: y / length };
      }

      function currentWave() {
        return WAVES[clamp(state.waveIndex, 0, WAVES.length - 1)];
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason) {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: META.id,
          stageTitle: META.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: META.id,
          stageTitle: META.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function pushPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          alpha: 1,
          life: 0.85,
          vy: -30,
        });
      }

      function spawnBurst(x, y, color, count, speedMin, speedMax) {
        const amount = PREFERS_REDUCED_MOTION ? Math.ceil(count * 0.45) : count;
        for (let index = 0; index < amount; index += 1) {
          const angle = (Math.PI * 2 * index) / amount + Math.random() * 0.4;
          const speed = lerp(speedMin, speedMax, Math.random());
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 4,
            alpha: 0.85,
            color,
            life: 0.55 + Math.random() * 0.45,
          });
        }
      }

      function snapAnchorToWall(x, y) {
        const distances = [
          { edge: "top", value: Math.abs(y - AQUARIUM.top) },
          { edge: "bottom", value: Math.abs(y - AQUARIUM.bottom) },
          { edge: "left", value: Math.abs(x - AQUARIUM.left) },
          { edge: "right", value: Math.abs(x - AQUARIUM.right) },
        ];
        distances.sort((a, b) => a.value - b.value);
        const nearest = distances[0].edge;
        if (nearest === "top") {
          return { x: clamp(x, AQUARIUM.left + 12, AQUARIUM.right - 12), y: AQUARIUM.top };
        }
        if (nearest === "bottom") {
          return { x: clamp(x, AQUARIUM.left + 12, AQUARIUM.right - 12), y: AQUARIUM.bottom };
        }
        if (nearest === "left") {
          return { x: AQUARIUM.left, y: clamp(y, AQUARIUM.top + 12, AQUARIUM.bottom - 12) };
        }
        return { x: AQUARIUM.right, y: clamp(y, AQUARIUM.top + 12, AQUARIUM.bottom - 12) };
      }

      function setCandidateAnchor(x, y) {
        state.cursor.x = x;
        state.cursor.y = y;
        state.cursor.visible = true;
        state.candidateAnchor = snapAnchorToWall(x, y);
        refreshPreview();
      }

      function setHint(message) {
        state.hint = message;
      }

      function startStage() {
        state.mode = "running";
        state.phase = "forecast";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.waveIndex = 0;
        state.phaseTimer = 0;
        state.charges = CHARGE_LIMIT;
        state.hint = "예보선이 끝나기 전 안전한 벽에 닻을 박으세요.";
        state.cargo = createCargo();
        state.anchor = null;
        state.preview = null;
        state.flash = 0;
        state.banner = 1;
        state.screenShake = 0;
        state.causticPhase = 0;
        state.particles.length = 0;
        state.popups.length = 0;
        setCandidateAnchor(currentWave().suggested.x, currentWave().suggested.y);
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        pushPopup("WAVE 1 예보 시작", VIEW.width * 0.5, 84, "#8bf2ff");
      }

      function failStage(reason, message) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.flash = 0.58;
        state.screenShake = 16;
        window.relayStageResult.status = "failed";
        setHint(message);
        pushPopup("ANCHOR LOST", state.cargo.x, state.cargo.y - 18, "#ff7f96");
        spawnBurst(state.cargo.x, state.cargo.y, "#ff99aa", 28, 40, 180);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.42;
        window.relayStageResult.status = "cleared";
        setHint("발전기 안정화 완료. 예비 충전을 보존했습니다.");
        pushPopup("GLASS STABLE", VIEW.width * 0.5, 128, "#7effdb");
        spawnBurst(GENERATOR.x, GENERATOR.y - 24, "#7effdb", 36, 30, 170);
        reportClearedToHost();
      }

      function beginWave(index) {
        state.waveIndex = index;
        state.phase = "forecast";
        state.phaseTimer = 0;
        state.banner = 1;
        setCandidateAnchor(currentWave().suggested.x, currentWave().suggested.y);
        setHint(currentWave().note);
        pushPopup(`WAVE ${index + 1}`, VIEW.width * 0.5, 84, "#8bf2ff");
      }

      function finishWave() {
        const nextWave = state.waveIndex + 1;
        if (nextWave >= WAVES.length) {
          if (state.charges > 0) {
            clearStage();
          } else {
            failStage("reserve-empty", "마지막 예비 충전을 남기지 못했습니다.");
          }
          return;
        }
        beginWave(nextWave);
      }

      function updateAmbient(dt) {
        state.causticPhase += dt * 0.7;
        state.ambientDrift += dt;

        for (const bubble of state.bubbles) {
          bubble.y -= bubble.speed * dt;
          bubble.x += Math.sin(state.ambientDrift * 1.4 + bubble.phase) * bubble.sway * dt;
          if (bubble.y < AQUARIUM.top - 18) {
            bubble.y = AQUARIUM.bottom + 18;
            bubble.x =
              AQUARIUM.left + 24 + Math.random() * (AQUARIUM.right - AQUARIUM.left - 48);
          }
        }

        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          particle.alpha = clamp(particle.life * 1.5, 0, 1);
          particle.vy += 18 * dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }

        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          popup.alpha = clamp(popup.life * 1.4, 0, 1);
          popup.y += popup.vy * dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }

        state.flash = Math.max(0, state.flash - dt * 0.8);
        state.banner = Math.max(0, state.banner - dt * 0.48);
        state.screenShake = Math.max(0, state.screenShake - dt * 18);
        state.cargo.glow = Math.max(0, state.cargo.glow - dt * 1.2);
        state.cargo.pulse = Math.max(0, state.cargo.pulse - dt * 1.4);
      }

      function getTideForce(wave, phaseTime, cargoX, cargoY) {
        const progress = clamp(phaseTime / wave.surge, 0, 1);
        const envelope = Math.sin(progress * Math.PI);
        const main = normalize(wave.current.x, wave.current.y);
        const swirl =
          Math.sin(progress * 11 + cargoX * 0.01 + wave.seed) *
          Math.cos(progress * 7 + cargoY * 0.013 + wave.seed) *
          wave.turbulence;
        return {
          x: (main.x * wave.strength + swirl) * envelope,
          y: (main.y * wave.strength + swirl * 0.45) * envelope,
        };
      }

      function applyCargoPhysics(dt, force, anchorPoint, safetyMode) {
        const cargo = state.cargo;
        let ax = force.x;
        let ay = force.y - 10;

        if (anchorPoint) {
          const springX = anchorPoint.x - cargo.x;
          const springY = anchorPoint.y - cargo.y;
          ax += springX * 7.6 - cargo.vx * 5.2;
          ay += springY * 7.6 - cargo.vy * 5.2;
        }

        cargo.vx += ax * dt;
        cargo.vy += ay * dt;

        const drag = safetyMode === "surge" ? 2.15 : 3.7;
        cargo.vx *= 1 / (1 + drag * dt);
        cargo.vy *= 1 / (1 + drag * dt);
        cargo.x += cargo.vx * dt;
        cargo.y += cargo.vy * dt;
        cargo.spin += (cargo.vx * 0.002 - cargo.spin * 2.2) * dt;
        cargo.angle += cargo.spin;

        if (safetyMode !== "surge") {
          cargo.x = clamp(cargo.x, AQUARIUM.left + cargo.r + 4, AQUARIUM.right - cargo.r - 4);
          cargo.y = clamp(cargo.y, AQUARIUM.top + cargo.r + 4, AQUARIUM.bottom - cargo.r - 4);
        }
      }

      function simulateOutcome(anchorPoint) {
        if (state.mode !== "running") {
          return null;
        }
        const wave = currentWave();
        let x = state.cargo.x;
        let y = state.cargo.y;
        let vx = state.cargo.vx;
        let vy = state.cargo.vy;
        const points = [];
        let safe = true;
        let minGeneratorGap = Infinity;

        for (let index = 0; index < 120; index += 1) {
          const dt = wave.surge / 120;
          const force = getTideForce(wave, dt * index, x, y);
          let ax = force.x;
          let ay = force.y - 10;

          if (anchorPoint) {
            const springX = anchorPoint.x - x;
            const springY = anchorPoint.y - y;
            ax += springX * 7.6 - vx * 5.2;
            ay += springY * 7.6 - vy * 5.2;
          }

          vx += ax * dt;
          vy += ay * dt;
          vx *= 1 / (1 + 2.15 * dt);
          vy *= 1 / (1 + 2.15 * dt);
          x += vx * dt;
          y += vy * dt;

          if (index % 8 === 0) {
            points.push({ x, y });
          }

          minGeneratorGap = Math.min(
            minGeneratorGap,
            Math.hypot(x - GENERATOR.x, y - GENERATOR.y) - GENERATOR.r - state.cargo.r
          );
          if (
            x < AQUARIUM.left + state.cargo.r ||
            x > AQUARIUM.right - state.cargo.r ||
            y < AQUARIUM.top + state.cargo.r ||
            y > AQUARIUM.bottom - state.cargo.r ||
            Math.hypot(x - GENERATOR.x, y - GENERATOR.y) <
              GENERATOR.r + state.cargo.r + 4
          ) {
            safe = false;
          }
        }

        return {
          points,
          safe,
          minGeneratorGap,
          final: { x, y },
          risk:
            !safe ? "fail" : minGeneratorGap < 34 ? "tight" : minGeneratorGap < 66 ? "risky" : "safe",
        };
      }

      function refreshPreview() {
        if (state.mode !== "running") {
          state.preview = null;
          return;
        }
        state.preview = simulateOutcome(state.candidateAnchor);
      }

      function fireAnchor() {
        if (state.mode !== "running") {
          startStage();
          return;
        }
        if (state.charges <= 0) {
          setHint("충전이 없습니다. 기존 닻으로 버텨야 합니다.");
          pushPopup("NO CHARGE", state.candidateAnchor.x, state.candidateAnchor.y - 12, "#ffbf6c");
          return;
        }
        if (state.anchor) {
          setHint("닻을 옮기려면 먼저 스와이프로 회수하세요.");
          pushPopup("SWIPE RECALL", state.anchor.x, state.anchor.y - 12, "#ffd68b");
          return;
        }

        state.anchor = {
          x: state.candidateAnchor.x,
          y: state.candidateAnchor.y,
          pulse: 1,
        };
        state.charges -= 1;
        state.cargo.glow = 1;
        state.cargo.pulse = 1;
        state.flash = 0.12;
        spawnBurst(state.anchor.x, state.anchor.y, "#8bf2ff", 20, 30, 150);
        spawnBurst(state.cargo.x, state.cargo.y, "#7ee4ff", 18, 25, 120);
        pushPopup(
          `LOCK ${state.charges}/${CHARGE_LIMIT}`,
          state.anchor.x,
          state.anchor.y - 18,
          "#8bf2ff"
        );
        if (state.charges === 1) {
          setHint("예비 충전이 1개뿐입니다. 다음 재배치를 신중히 결정하세요.");
        } else {
          setHint("닻 고정 완료. 필요하면 길게 스와이프해 회수하세요.");
        }
      }

      function recallAnchor() {
        if (!state.anchor) {
          return;
        }
        spawnBurst(state.anchor.x, state.anchor.y, "#b9fff2", 16, 24, 120);
        pushPopup("RECALL", state.anchor.x, state.anchor.y - 12, "#b9fff2");
        state.anchor = null;
        state.flash = 0.08;
        setHint("닻 회수 완료. 새 예측 고정점을 선택하세요.");
      }

      function handleTapAction() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          return;
        }
        fireAnchor();
      }

      function handleSwipeAction() {
        if (state.mode === "running") {
          recallAnchor();
        }
      }

      function updateGameplay(dt) {
        if (state.mode !== "running") {
          return;
        }

        const wave = currentWave();
        state.elapsed += dt;
        state.phaseTimer += dt;
        state.causticPhase += dt * (state.phase === "surge" ? 1.25 : 0.7);

        if (state.phase === "forecast") {
          const floatForce = {
            x: Math.sin(state.elapsed * 1.4 + wave.seed) * 14,
            y: Math.cos(state.elapsed * 1.1 + wave.seed) * 10,
          };
          applyCargoPhysics(dt, floatForce, state.anchor, "forecast");
          if (state.phaseTimer >= wave.forecast) {
            state.phase = "surge";
            state.phaseTimer = 0;
            state.flash = 0.18;
            setHint("조류 돌입. 화물이 발전기에 닿지 않게 버티세요.");
            pushPopup("SURGE", VIEW.width * 0.5, 104, "#ffde7f");
            spawnBurst(GENERATOR.x, GENERATOR.y - 32, "#ffde7f", 24, 20, 110);
          }
        } else {
          const force = getTideForce(wave, state.phaseTimer, state.cargo.x, state.cargo.y);
          applyCargoPhysics(dt, force, state.anchor, "surge");

          if (
            state.cargo.x < AQUARIUM.left + state.cargo.r ||
            state.cargo.x > AQUARIUM.right - state.cargo.r ||
            state.cargo.y < AQUARIUM.top + state.cargo.r ||
            state.cargo.y > AQUARIUM.bottom - state.cargo.r
          ) {
            failStage("cargo-lost", "핵심 화물이 유리 수조 밖으로 밀려나갔습니다.");
            return;
          }

          if (Math.hypot(state.cargo.x - GENERATOR.x, state.cargo.y - GENERATOR.y) < GENERATOR.r + state.cargo.r + 4) {
            failStage("generator-hit", "화물이 발전기를 강타했습니다.");
            return;
          }

          if (state.phaseTimer >= wave.surge) {
            state.flash = 0.16;
            pushPopup(`WAVE ${state.waveIndex + 1} CLEAR`, VIEW.width * 0.5, 96, "#7effdb");
            spawnBurst(state.cargo.x, state.cargo.y, "#7effdb", 20, 24, 120);
            finishWave();
            return;
          }
        }

        refreshPreview();
      }

      function update(dt) {
        updateAmbient(dt);
        updateGameplay(dt);
      }

      function drawRoundedRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        ctx.closePath();
      }

      function fillRoundedPanel(x, y, width, height, radius, fillStyle, strokeStyle) {
        ctx.save();
        drawRoundedRect(x, y, width, height, radius);
        ctx.fillStyle = fillStyle;
        ctx.fill();
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.lineWidth = 1.2;
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBackground() {
        const ocean = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        ocean.addColorStop(0, "#0a2435");
        ocean.addColorStop(0.5, "#0a1727");
        ocean.addColorStop(1, "#030910");
        ctx.fillStyle = ocean;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        for (let index = 0; index < 3; index += 1) {
          const x = 170 + index * 280 + Math.sin(state.causticPhase * 0.9 + index) * 30;
          const beam = ctx.createLinearGradient(x, 0, x + 150, VIEW.height);
          beam.addColorStop(0, "rgba(146, 240, 255, 0)");
          beam.addColorStop(0.45, "rgba(146, 240, 255, 0.1)");
          beam.addColorStop(1, "rgba(146, 240, 255, 0)");
          ctx.fillStyle = beam;
          ctx.fillRect(x - 10, 0, 170, VIEW.height);
        }

        ctx.save();
        ctx.strokeStyle = "rgba(120, 236, 255, 0.06)";
        ctx.lineWidth = 2;
        for (let index = 0; index < 12; index += 1) {
          const y =
            56 +
            index * 34 +
            Math.sin(state.causticPhase * 1.5 + index * 0.8) * (PREFERS_REDUCED_MOTION ? 3 : 6);
          ctx.beginPath();
          ctx.moveTo(54, y);
          ctx.bezierCurveTo(240, y - 18, 700, y + 18, 906, y);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawAnchorPreview() {
        if (state.mode !== "running") {
          return;
        }

        const preview = state.preview;
        if (!preview || !state.candidateAnchor) {
          return;
        }

        let color = "rgba(126, 255, 219, 0.82)";
        if (preview.risk === "risky") {
          color = "rgba(255, 215, 120, 0.84)";
        }
        if (preview.risk === "tight") {
          color = "rgba(255, 172, 107, 0.88)";
        }
        if (preview.risk === "fail") {
          color = "rgba(255, 125, 148, 0.84)";
        }

        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(state.candidateAnchor.x, state.candidateAnchor.y);
        ctx.lineTo(state.cargo.x, state.cargo.y);
        ctx.stroke();

        ctx.beginPath();
        preview.points.forEach((point, index) => {
          if (index === 0) {
            ctx.moveTo(point.x, point.y);
          } else {
            ctx.lineTo(point.x, point.y);
          }
        });
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(state.candidateAnchor.x, state.candidateAnchor.y, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.8)";
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      function drawAnchorLine() {
        if (!state.anchor) {
          return;
        }
        ctx.save();
        ctx.strokeStyle = "rgba(127, 237, 255, 0.95)";
        ctx.lineWidth = 4;
        ctx.shadowBlur = 16;
        ctx.shadowColor = "rgba(127, 237, 255, 0.8)";
        ctx.beginPath();
        ctx.moveTo(state.anchor.x, state.anchor.y);
        ctx.lineTo(state.cargo.x, state.cargo.y);
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#e6fdff";
        ctx.beginPath();
        ctx.arc(state.anchor.x, state.anchor.y, 8 + Math.sin(state.elapsed * 7) * 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawCargo() {
        ctx.save();
        ctx.translate(state.cargo.x, state.cargo.y);
        ctx.rotate(state.cargo.angle);

        const hull = ctx.createLinearGradient(-24, -28, 24, 28);
        hull.addColorStop(0, "#d2fff9");
        hull.addColorStop(0.28, "#7aecc7");
        hull.addColorStop(0.62, "#36a5b9");
        hull.addColorStop(1, "#0d3f56");
        ctx.shadowBlur = 18 + state.cargo.glow * 18;
        ctx.shadowColor = "rgba(122, 236, 199, 0.7)";
        ctx.fillStyle = hull;
        ctx.beginPath();
        ctx.moveTo(-26, -12);
        ctx.quadraticCurveTo(-14, -30, 0, -32);
        ctx.quadraticCurveTo(22, -24, 28, 0);
        ctx.quadraticCurveTo(22, 22, 0, 30);
        ctx.quadraticCurveTo(-22, 20, -28, 0);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(230, 253, 255, 0.82)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.beginPath();
        ctx.ellipse(-10, -12, 10, 5, -0.2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(13, 63, 86, 0.7)";
        ctx.fillRect(-10, -6, 20, 12);
        ctx.restore();
      }

      function drawParticles() {
        ctx.save();
        for (const particle of state.particles) {
          ctx.globalAlpha = particle.alpha;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        }
        for (const popup of state.popups) {
          ctx.globalAlpha = popup.alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "800 16px Avenir Next, Trebuchet MS, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        }
        ctx.restore();
      }

      function drawWaveArrows() {
        if (state.mode !== "running") {
          return;
        }
        const wave = currentWave();
        const direction = normalize(wave.current.x, wave.current.y);
        const intensity =
          state.phase === "surge" ? Math.sin(clamp(state.phaseTimer / wave.surge, 0, 1) * Math.PI) : 0.3;

        ctx.save();
        ctx.globalAlpha = 0.2 + intensity * 0.24;
        ctx.strokeStyle = "rgba(146, 245, 255, 0.8)";
        ctx.lineWidth = 8;
        for (let index = 0; index < 4; index += 1) {
          const startX = 150 + index * 170 - direction.x * 90;
          const startY = 120 + index * 28 - direction.y * 60;
          const endX = startX + direction.x * 120;
          const endY = startY + direction.y * 120;
          ctx.beginPath();
          ctx.moveTo(startX, startY);
          ctx.lineTo(endX, endY);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(endX, endY);
          ctx.lineTo(endX - direction.x * 22 - direction.y * 14, endY - direction.y * 22 + direction.x * 14);
          ctx.lineTo(endX - direction.x * 22 + direction.y * 14, endY - direction.y * 22 - direction.x * 14);
          ctx.closePath();
          ctx.fillStyle = "rgba(146, 245, 255, 0.8)";
          ctx.fill();
        }
        ctx.restore();
      }

      function wrapLines(text, maxWidth, font) {
        ctx.save();
        ctx.font = font;
        const words = text.split(" ");
        const lines = [];
        let current = "";
        for (const word of words) {
          const next = current ? `${current} ${word}` : word;
          if (ctx.measureText(next).width > maxWidth && current) {
            lines.push(current);
            current = word;
          } else {
            current = next;
          }
        }
        if (current) {
          lines.push(current);
        }
        ctx.restore();
        return lines;
      }

      function drawEndOverlay(mode) {
        const accent = mode === "cleared" ? "#7efedb" : "#ff9eb0";

        const bodyLines = wrapLines(
          mode === "cleared"
            ? "발전기가 끝까지 버텼습니다. 남은 충전으로 수조를 안정화했습니다."
            : state.hint,
          VIEW.width * 0.44,
          "700 17px Avenir Next, Trebuchet MS, sans-serif"
        );
        const footerLines = [
          `진행 파도 ${Math.min(state.waveIndex + (mode === "cleared" ? 1 : 0), WAVES.length)} / ${WAVES.length}`,
          `남은 충전 ${state.charges} / ${CHARGE_LIMIT}`,
          `기록 ${state.lastRunTime.toFixed(1)}초`,
          "탭 또는 Enter로 다시 시작",
        ];
        drawMenuCard(title, accent, bodyLines, footerLines);
      }

      function drawBanner() {
        if (state.banner <= 0 || state.mode !== "running") {
          return;
        }
        const wave = currentWave();
        const progress = easeOutCubic(state.banner);
        ctx.save();
        ctx.globalAlpha = clamp(state.banner * 1.2, 0, 1);
        fillRoundedPanel(
          VIEW.width * 0.31,
          148 - progress * 32,
          VIEW.width * 0.38,
          72,
          20,
          "rgba(6, 18, 31, 0.8)",
          "rgba(146, 245, 255, 0.2)"
        );
        ctx.textAlign = "center";
        ctx.fillStyle = "#f1fdff";
        ctx.font = "800 18px Avenir Next, Trebuchet MS, sans-serif";
        ctx.fillText(`WAVE ${state.waveIndex + 1}`, VIEW.width * 0.5, 176 - progress * 20);
        ctx.fillStyle = "rgba(160, 239, 255, 0.94)";
        ctx.font = "700 14px Avenir Next, Trebuchet MS, sans-serif";
        ctx.fillText(wave.label, VIEW.width * 0.5, 198 - progress * 20);
        ctx.restore();
      }

      function drawVignette() {
        const vignette = ctx.createRadialGradient(
          VIEW.width * 0.5,
          VIEW.height * 0.42,
          120,
          VIEW.width * 0.5,
          VIEW.height * 0.5,
          500
        );
        vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
        vignette.addColorStop(1, "rgba(0, 0, 0, 0.46)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        if (state.flash > 0) {
          ctx.fillStyle =
            state.mode === "failed"
              ? `rgba(255, 123, 149, ${state.flash * 0.22})`
              : `rgba(126, 255, 219, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }
      }

      function render() {
        ctx.save();
        const shake = state.screenShake;
        const offsetX = shake > 0 ? (Math.random() - 0.5) * shake : 0;
        const offsetY = shake > 0 ? (Math.random() - 0.5) * shake : 0;
        ctx.setTransform(1, 0, 0, 1, offsetX, offsetY);

        drawBackground();
        drawAquarium();
        drawBubbles();
        drawWaveArrows();
        drawAnchorPreview();
        drawGenerator();
        drawAnchorLine();
        drawCargo();
        drawParticles();
        drawHud();
        drawBanner();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawEndOverlay(state.mode);
        }

        drawVignette();
        ctx.restore();
      }

      function frame(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const delta = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        accumulator += delta;
        while (accumulator >= FIXED_DT) {
          update(FIXED_DT);
          accumulator -= FIXED_DT;
        }
        render();
        animationFrame = window.requestAnimationFrame(frame);
      }

      function pageToCanvas(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((clientX - rect.left) / rect.width) * VIEW.width,
          y: ((clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus({ preventScroll: true });
        const point = pageToCanvas(event.clientX, event.clientY);
        input.pointerId = event.pointerId;
        input.down = true;
        input.startX = point.x;
        input.startY = point.y;
        input.startTime = performance.now();
        input.moved = false;
        setCandidateAnchor(point.x, point.y);
      }

      function handlePointerMove(event) {
        const point = pageToCanvas(event.clientX, event.clientY);
        if (event.pointerType === "mouse" || input.pointerId === event.pointerId) {
          setCandidateAnchor(point.x, point.y);
        }
        if (input.down) {
          const moved = Math.hypot(point.x - input.startX, point.y - input.startY);
          if (moved > 12) {
            input.moved = true;
          }
        }
      }

      function handlePointerUp(event) {
        if (!input.down) {
          return;
        }
        const point = pageToCanvas(event.clientX, event.clientY);
        const moved = Math.hypot(point.x - input.startX, point.y - input.startY);
        const duration = performance.now() - input.startTime;
        input.down = false;
        input.pointerId = null;
        setCandidateAnchor(point.x, point.y);
        if (moved > 46) {
          handleSwipeAction();
          return;
        }
        if (duration < 280 && moved < 14) {
          handleTapAction();
        }
      }

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", () => {
        input.down = false;
        input.pointerId = null;
      });
      canvas.addEventListener(
        "touchstart",
        (event) => {
          event.preventDefault();
        },
        { passive: false }
      );
      canvas.addEventListener("contextmenu", (event) => event.preventDefault());

      window.addEventListener("keydown", (event) => {
        if (event.code === "Enter") {
          event.preventDefault();
          if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
            startStage();
          }
          return;
        }
        if (event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            fireAnchor();
          }
          return;
        }
        if (event.code === "KeyR" || event.code === "Backspace") {
          event.preventDefault();
          if (state.mode === "running") {
            recallAnchor();
          }
          return;
        }
        if (state.mode === "running") {
          const delta = 56;
          if (event.code === "ArrowLeft") {
            event.preventDefault();
            setCandidateAnchor(state.cursor.x - delta, state.cursor.y);
          } else if (event.code === "ArrowRight") {
            event.preventDefault();
            setCandidateAnchor(state.cursor.x + delta, state.cursor.y);
          } else if (event.code === "ArrowUp") {
            event.preventDefault();
            setCandidateAnchor(state.cursor.x, state.cursor.y - delta);
          } else if (event.code === "ArrowDown") {
            event.preventDefault();
            setCandidateAnchor(state.cursor.x, state.cursor.y + delta);
          }
        }
      });

      window.render_game_to_text = () => {
        const wave = currentWave();
        return JSON.stringify({
          mode: state.mode,
          coordinateSystem: "origin at top-left, x increases right, y increases down",
          phase: state.mode === "running" ? state.phase : null,
          wave: state.mode === "running" ? state.waveIndex + 1 : null,
          charges: state.charges,
          cargo: {
            x: Number(state.cargo.x.toFixed(1)),
            y: Number(state.cargo.y.toFixed(1)),
            vx: Number(state.cargo.vx.toFixed(1)),
            vy: Number(state.cargo.vy.toFixed(1)),
            radius: state.cargo.r,
          },
          generator: GENERATOR,
          anchor: state.anchor
            ? {
                x: Number(state.anchor.x.toFixed(1)),
                y: Number(state.anchor.y.toFixed(1)),
              }
            : null,
          forecastAnchor: state.candidateAnchor
            ? {
                x: Number(state.candidateAnchor.x.toFixed(1)),
                y: Number(state.candidateAnchor.y.toFixed(1)),
              }
            : null,
          tide:
            state.mode === "running"
              ? {
                  label: wave.label,
                  direction: wave.current,
                  remaining: Number(
                    (
                      (state.phase === "forecast" ? wave.forecast : wave.surge) - state.phaseTimer
                    ).toFixed(2)
                  ),
                }
              : null,
          preview: state.preview
            ? {
                risk: state.preview.risk,
                safe: state.preview.safe,
              }
            : null,
        });
      };

      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageDebug = {
        forceClear() {
          state.charges = Math.max(1, state.charges);
          clearStage();
          render();
        },
        forceFail() {
          failStage("debug-force-fail", "강제 실패 디버그 호출");
          render();
        },
      };

      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(frame);
    </script>
  </body>
</html>
