<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Observatory: Mirror Heist</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040816;
        --bg-soft: #091329;
        --ink: #eef6ff;
        --cyan: #72f7ff;
        --cyan-deep: #1eb5ff;
        --gold: #ffcf75;
        --rose: #ff79d9;
        --violet: #8967ff;
        --green: #8effb8;
        --danger: #ff6687;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(78, 185, 255, 0.18), transparent 30%),
          radial-gradient(circle at 20% 20%, rgba(255, 121, 217, 0.14), transparent 32%),
          linear-gradient(180deg, #071122 0%, #02040b 100%);
        font-family: "Avenir Next", "Noto Sans KR", "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas,
      button {
        -webkit-tap-highlight-color: rgba(114, 247, 255, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 20;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(3, 10, 22, 0.96);
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(238, 246, 255, 0.92);
        outline-offset: -8px;
      }

      .mobile-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 18;
        display: flex;
        justify-content: center;
        padding: 0 14px calc(16px + env(safe-area-inset-bottom, 0px));
        pointer-events: none;
      }

      .mobile-controls__row {
        display: flex;
        justify-content: center;
        gap: 12px;
        width: min(100%, 360px);
        pointer-events: auto;
      }

      .mobile-btn {
        appearance: none;
        border: 1px solid rgba(114, 247, 255, 0.34);
        border-radius: 999px;
        min-width: 168px;
        min-height: 56px;
        padding: 0 22px;
        color: var(--ink);
        background:
          linear-gradient(180deg, rgba(23, 43, 80, 0.92), rgba(7, 14, 30, 0.96));
        font: 800 16px "Avenir Next", "Noto Sans KR", "Segoe UI", sans-serif;
        letter-spacing: 0.04em;
        box-shadow:
          0 14px 34px rgba(1, 4, 12, 0.4),
          inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      }

      .mobile-btn[data-active="true"] {
        transform: scale(0.97);
        background:
          linear-gradient(180deg, rgba(37, 84, 138, 0.96), rgba(8, 24, 54, 0.98));
      }

      .mobile-btn.hidden {
        display: none;
      }

      @media (hover: hover) and (pointer: fine) {
        .mobile-controls {
          display: none;
        }
      }

      @media (max-width: 420px) {
        .mobile-controls {
          padding: 0 12px calc(12px + env(safe-area-inset-bottom, 0px));
        }

        .mobile-controls__row {
          width: min(100%, 320px);
        }

        .mobile-btn {
          min-width: 154px;
          min-height: 54px;
          font-size: 15px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Neon Observatory: Mirror Heist. 이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생, 픽업 선택 전에 페널티 아이콘 확인, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현. 저주 조합을 버티면서 서로 다른 패턴 3개로 금고 문을 열면 클리어. 저주 누적이 한계를 넘기거나 감시 시선에 오래 걸리면 즉시 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Neon Observatory: Mirror Heist"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <div class="mobile-controls">
      <div class="mobile-controls__row">
        <button
          id="replay-button"
          class="mobile-btn hidden"
          type="button"
          aria-label="현재 금고 룬을 위한 패턴 재생"
        >
          패턴 재생
        </button>
      </div>
    </div>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_ID = "neon-observatory-mirror-theft-cursed";
      const TITLE = "Neon Observatory: Mirror Heist";
      const CREATOR = "jungcollin";
      const GENRE = "Pattern theft stealth / 저주 픽업";
      const CONTROLS =
        "이동, 클릭 또는 터치로 패턴 훔치기, 스페이스 또는 두 손가락 탭으로 패턴 재생, 픽업 선택 전에 페널티 아이콘 확인, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_CONDITION =
        "저주 조합을 버티면서 서로 다른 패턴 3개로 금고 문을 열면 클리어";
      const FAIL_CONDITION =
        "저주 누적이 한계를 넘기거나 감시 시선에 오래 걸리면 즉시 실패";
      const SHORT_COPY =
        "패턴을 훔쳐 금고에 재생하고, 페널티가 보이는 저주 유물 선택을 버티는 네온 잠입 액션";

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const replayButton = document.querySelector("#replay-button");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const CURSE_LIMIT = 5;
      const EXPOSURE_LIMIT = 1;
      const PLAYER_RADIUS = 14;
      const relayContext = window.RelayRuntime?.readContext(STAGE_ID) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const numberFormatter = new Intl.NumberFormat("ko-KR", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 1,
      });

      const PATTERNS = {
        arc: {
          id: "arc",
          label: "ARC SWEEP",
          korean: "호선 절도",
          color: "#72f7ff",
          glow: "rgba(114, 247, 255, 0.9)",
          icon: "◜◝",
        },
        prism: {
          id: "prism",
          label: "PRISM STEP",
          korean: "프리즘 보행",
          color: "#ffcf75",
          glow: "rgba(255, 207, 117, 0.9)",
          icon: "◈",
        },
        echo: {
          id: "echo",
          label: "ECHO SPIRAL",
          korean: "에코 나선",
          color: "#ff79d9",
          glow: "rgba(255, 121, 217, 0.9)",
          icon: "◎",
        },
      };

      const PICKUP_LIBRARY = [
        {
          id: "veil",
          title: "Shade Veil",
          boonShort: "노출 완화",
          boon: "6초간 감시 노출 상승량 55% 감소",
          penaltyIcon: "+저주",
          penalty: "즉시 저주 +0.8",
          color: "#72f7ff",
          apply() {
            state.effects.veil = 6;
            addCurse(0.8);
          },
        },
        {
          id: "purge",
          title: "Purge Bloom",
          boonShort: "저주 정화",
          boon: "저주 게이지 1.4 정화",
          penaltyIcon: "광각",
          penalty: "8초간 감시 시야각 확대",
          color: "#8effb8",
          apply() {
            state.curse = Math.max(0, state.curse - 1.4);
            state.effects.vision = 8;
          },
        },
        {
          id: "rush",
          title: "Mirror Rush",
          boonShort: "속도 상승",
          boon: "6초간 이동 속도 35% 상승",
          penaltyIcon: "폭주",
          penalty: "6초간 저주 누적 가속",
          color: "#ffcf75",
          apply() {
            state.effects.speed = 6;
            state.effects.surge = 6;
          },
        },
      ];

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        note: SHORT_COPY,
        stars: [],
        dust: [],
        particles: [],
        popups: [],
        sentinels: [],
        pillars: [],
        pickups: [],
        inventory: [],
        submitted: [],
        requiredOrder: ["arc", "prism", "echo"],
        player: {
          x: 150,
          y: VIEW.height - 110,
          vx: 0,
          vy: 0,
          facing: 0,
        },
        vault: {
          x: VIEW.width / 2,
          y: VIEW.height / 2,
          r: 56,
          pulse: 0,
          glow: 0,
        },
        input: {
          keys: Object.create(null),
          pointerActive: false,
          pointerId: null,
          moveTarget: null,
        },
        effects: {
          veil: 0,
          speed: 0,
          vision: 0,
          surge: 0,
        },
        world: {
          rotation: 0,
          haloPulse: 0,
        },
        curse: 0,
        exposure: 0,
        replayCooldown: 0,
        alertPulse: 0,
        screenShake: 0,
        flash: 0,
        pickupCycle: 0,
        currentSightCount: 0,
        replayWave: null,
        pendingClear: 0,
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function distance(ax, ay, bx, by) {
        return Math.hypot(ax - bx, ay - by);
      }

      function normalizeAngle(angle) {
        let current = angle;
        while (current > Math.PI) current -= Math.PI * 2;
        while (current < -Math.PI) current += Math.PI * 2;
        return current;
      }

      function angleDifference(a, b) {
        return normalizeAngle(a - b);
      }

      function rgbaFromHex(hex, alpha) {
        const normalized = hex.replace("#", "");
        const full = normalized.length === 3
          ? normalized
              .split("")
              .map((value) => value + value)
              .join("")
          : normalized;
        const bigint = Number.parseInt(full, 16);
        const red = (bigint >> 16) & 255;
        const green = (bigint >> 8) & 255;
        const blue = bigint & 255;
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function formatNumber(value) {
        return numberFormatter.format(Number(value.toFixed(1)));
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function shuffle(array) {
        const next = array.slice();
        for (let index = next.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [next[index], next[swapIndex]] = [next[swapIndex], next[index]];
        }
        return next;
      }

      function toCanvasPoint(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: ((clientX - rect.left) / rect.width) * VIEW.width,
          y: ((clientY - rect.top) / rect.height) * VIEW.height,
        };
      }

      function makeStars() {
        state.stars = Array.from({ length: reduceMotion ? 42 : 78 }, () => ({
          x: Math.random() * VIEW.width,
          y: Math.random() * VIEW.height,
          r: randomBetween(0.5, 2.4),
          drift: randomBetween(0.5, 1.8),
          alpha: randomBetween(0.25, 0.95),
        }));

        state.dust = Array.from({ length: reduceMotion ? 10 : 18 }, () => ({
          x: Math.random() * VIEW.width,
          y: Math.random() * VIEW.height,
          w: randomBetween(68, 144),
          h: randomBetween(22, 56),
          angle: randomBetween(0, Math.PI * 2),
          color: Math.random() > 0.5 ? "rgba(114, 247, 255, 0.045)" : "rgba(255, 121, 217, 0.04)",
        }));
      }

      function makePillars() {
        const cx = VIEW.width / 2;
        const cy = VIEW.height / 2;
        state.pillars = [
          { x: cx, y: cy - 120, r: 34 },
          { x: cx + 118, y: cy, r: 34 },
          { x: cx, y: cy + 120, r: 34 },
          { x: cx - 118, y: cy, r: 34 },
        ];
      }

      function updateSentinelPaths(time) {
        const difficulty = 1 + state.submitted.length * 0.14 + state.inventory.length * 0.04;
        const rushBoost = state.effects.vision > 0 ? 0.08 : 0;

        state.sentinels.forEach((sentinel) => {
          sentinel.cooldown = Math.max(0, sentinel.cooldown - FIXED_DT);
          const previousX = sentinel.x;
          const previousY = sentinel.y;
          const speed = sentinel.baseSpeed * difficulty * (1 + rushBoost);
          const localTime = time * speed + sentinel.phase;
          let x = sentinel.x;
          let y = sentinel.y;

          if (sentinel.patternId === "arc") {
            x = VIEW.width / 2 + Math.cos(localTime * 0.95) * 270;
            y = VIEW.height / 2 - 112 + Math.sin(localTime * 1.42) * 74;
          } else if (sentinel.patternId === "prism") {
            x = VIEW.width / 2 + Math.sin(localTime * 1.15) * 264;
            y = VIEW.height / 2 + Math.sin(localTime * 0.7 + 0.8) * 188;
          } else {
            const radius = 170 + Math.sin(localTime * 1.7) * 48;
            x = VIEW.width / 2 + Math.cos(localTime * 0.88) * radius;
            y = VIEW.height / 2 + Math.sin(localTime * 0.88) * radius * 0.66;
          }

          sentinel.x = x;
          sentinel.y = y;
          const movementAngle = Math.atan2(y - previousY, x - previousX || 0.001);
          const sweepAmplitude = 0.8 + state.submitted.length * 0.08 + (state.effects.vision > 0 ? 0.18 : 0);
          sentinel.facing =
            movementAngle + Math.sin(localTime * 2 + sentinel.phase * 1.7) * sweepAmplitude;
          sentinel.viewDistance = sentinel.baseViewDistance * (1 + state.submitted.length * 0.06);
          sentinel.coneAngle = sentinel.baseConeAngle + (state.effects.vision > 0 ? 0.18 : 0);
        });
      }

      function createSentinels() {
        state.sentinels = [
          {
            id: "sentinel-arc",
            patternId: "arc",
            x: 0,
            y: 0,
            phase: 0.15,
            facing: 0,
            cooldown: 0,
            baseSpeed: 0.84,
            baseViewDistance: 214,
            baseConeAngle: 1.02,
          },
          {
            id: "sentinel-prism",
            patternId: "prism",
            x: 0,
            y: 0,
            phase: 1.6,
            facing: 0,
            cooldown: 0,
            baseSpeed: 0.76,
            baseViewDistance: 224,
            baseConeAngle: 1.1,
          },
          {
            id: "sentinel-echo",
            patternId: "echo",
            x: 0,
            y: 0,
            phase: 3.12,
            facing: 0,
            cooldown: 0,
            baseSpeed: 0.95,
            baseViewDistance: 208,
            baseConeAngle: 0.96,
          },
        ];
        updateSentinelPaths(0);
      }

      function setReplayButtonVisible(visible) {
        replayButton.classList.toggle("hidden", !visible);
      }

      function resetRun(mode = "menu") {
        state.mode = mode;
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.curse = 0.35;
        state.exposure = 0;
        state.replayCooldown = 0;
        state.inventory = [];
        state.submitted = [];
        state.pickups = [];
        state.effects.veil = 0;
        state.effects.speed = 0;
        state.effects.vision = 0;
        state.effects.surge = 0;
        state.world.rotation = 0;
        state.world.haloPulse = 0;
        state.alertPulse = 0;
        state.screenShake = 0;
        state.flash = 0;
        state.pickupCycle = 0;
        state.currentSightCount = 0;
        state.replayWave = null;
        state.pendingClear = 0;
        state.player.x = 156;
        state.player.y = VIEW.height - 112;
        state.player.vx = 0;
        state.player.vy = 0;
        state.player.facing = -0.4;
        state.input.moveTarget = null;
        state.vault.pulse = 0;
        state.vault.glow = 0;
        state.requiredOrder = shuffle(["arc", "prism", "echo"]);
        state.particles = [];
        state.popups = [];
        createSentinels();
        setReplayButtonVisible(mode === "running");
      }

      function startStage() {
        resetRun("running");
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function addPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: 1.2,
          vy: randomBetween(18, 26),
        });
      }

      function spawnParticles(x, y, color, count, speed) {
        const total = reduceMotion ? Math.max(5, Math.floor(count * 0.45)) : count;
        for (let index = 0; index < total; index += 1) {
          const angle = (Math.PI * 2 * index) / total + Math.random() * 0.4;
          const magnitude = speed * randomBetween(0.45, 1.1);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * magnitude,
            vy: Math.sin(angle) * magnitude,
            life: randomBetween(0.45, 0.95),
            size: randomBetween(2, 6),
            color,
          });
        }
      }

      function addCurse(amount) {
        state.curse = clamp(state.curse + amount, 0, CURSE_LIMIT + 0.3);
        state.flash = Math.max(state.flash, 0.26);
        if (state.curse >= CURSE_LIMIT) {
          failStage("curse-limit");
        }
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.screenShake = Math.max(state.screenShake, 16);
        state.flash = 0.9;
        window.relayStageResult.status = "failed";
        setReplayButtonVisible(false);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.62;
        window.relayStageResult.status = "cleared";
        setReplayButtonVisible(false);
        reportClearedToHost();
      }

      function blockLineWithPillar(ax, ay, bx, by) {
        return state.pillars.some((pillar) => {
          const abx = bx - ax;
          const aby = by - ay;
          const lengthSq = abx * abx + aby * aby || 1;
          const t = clamp(((pillar.x - ax) * abx + (pillar.y - ay) * aby) / lengthSq, 0, 1);
          const closestX = ax + abx * t;
          const closestY = ay + aby * t;
          return distance(closestX, closestY, pillar.x, pillar.y) <= pillar.r + 6;
        });
      }

      function findSentinelAt(x, y) {
        return state.sentinels.find(
          (sentinel) => distance(x, y, sentinel.x, sentinel.y) <= 28
        );
      }

      function sentinelCanSeePlayer(sentinel) {
        const dx = state.player.x - sentinel.x;
        const dy = state.player.y - sentinel.y;
        const dist = Math.hypot(dx, dy);
        if (dist > sentinel.viewDistance) {
          return false;
        }
        const angleToPlayer = Math.atan2(dy, dx);
        if (Math.abs(angleDifference(angleToPlayer, sentinel.facing)) > sentinel.coneAngle / 2) {
          return false;
        }
        if (blockLineWithPillar(sentinel.x, sentinel.y, state.player.x, state.player.y)) {
          return false;
        }
        return true;
      }

      function attemptSteal(sentinel) {
        if (state.mode !== "running") {
          return;
        }
        const pattern = PATTERNS[sentinel.patternId];
        const nearEnough =
          distance(state.player.x, state.player.y, sentinel.x, sentinel.y) <= 86;

        if (!nearEnough) {
          addPopup("더 가까이 침투", sentinel.x, sentinel.y - 30, "#ffcf75");
          return;
        }
        if (sentinelCanSeePlayer(sentinel)) {
          addPopup("시선 차단 필요", sentinel.x, sentinel.y - 30, "#ff6687");
          state.screenShake = Math.max(state.screenShake, 8);
          addCurse(0.18);
          return;
        }
        if (sentinel.cooldown > 0) {
          addPopup("방금 도난됨", sentinel.x, sentinel.y - 30, "#8ea7c9");
          return;
        }
        if (state.submitted.includes(pattern.id) || state.inventory.includes(pattern.id)) {
          addPopup("이미 복사 완료", sentinel.x, sentinel.y - 30, pattern.color);
          return;
        }

        state.inventory.push(pattern.id);
        sentinel.cooldown = 5.6;
        state.vault.glow = 0.9;
        state.screenShake = Math.max(state.screenShake, 5);
        addCurse(0.44);
        spawnParticles(sentinel.x, sentinel.y, pattern.color, 22, 3.6);
        addPopup(`${pattern.korean} 절취`, sentinel.x, sentinel.y - 22, pattern.color);
        spawnPickupPair();
      }

      function nextRequiredPattern() {
        return state.requiredOrder[state.submitted.length] || null;
      }

      function attemptReplay() {
        if (state.mode !== "running" || state.replayCooldown > 0) {
          return;
        }
        const required = nextRequiredPattern();
        const nearVault =
          distance(state.player.x, state.player.y, state.vault.x, state.vault.y) <= 104;

        if (!nearVault) {
          addPopup("금고 링 안에서 재생", state.player.x, state.player.y - 26, "#ffcf75");
          return;
        }
        if (!required || !state.inventory.includes(required)) {
          addPopup("다음 룬 패턴 부족", state.player.x, state.player.y - 26, "#ff6687");
          state.replayCooldown = 0.65;
          addCurse(0.32);
          return;
        }

        state.inventory = state.inventory.filter((patternId) => patternId !== required);
        state.submitted.push(required);
        state.replayCooldown = 1.1;
        state.vault.pulse = 1;
        state.vault.glow = 1;
        state.flash = 0.34;
        state.replayWave = {
          id: required,
          progress: 0,
        };
        spawnParticles(state.vault.x, state.vault.y, PATTERNS[required].color, 28, 4.5);
        addPopup(`${PATTERNS[required].korean} 재생`, state.vault.x, state.vault.y - 72, PATTERNS[required].color);

        if (state.submitted.length >= 3) {
          state.pendingClear = 0.75;
        }
      }

      function spawnPickupPair() {
        const options = shuffle(PICKUP_LIBRARY).slice(0, 2);
        const upper = state.pickupCycle % 2 === 0;
        const y = upper ? 112 : VIEW.height - 118;
        state.pickupCycle += 1;
        state.pickups = options.map((pickup, index) => ({
          id: `${pickup.id}-${state.pickupCycle}-${index}`,
          def: pickup,
          x: index === 0 ? 122 : VIEW.width - 122,
          y,
          ttl: 10.8,
          bob: Math.random() * Math.PI * 2,
          radius: 28,
        }));
      }

      function applyPickup(pickup) {
        pickup.def.apply();
        state.pickups = [];
        spawnParticles(pickup.x, pickup.y, pickup.def.color, 24, 3.5);
        addPopup(`${pickup.def.boonShort} 확보`, pickup.x, pickup.y - 26, pickup.def.color);
      }

      function resolvePlayerCollisions() {
        state.pillars.forEach((pillar) => {
          const dx = state.player.x - pillar.x;
          const dy = state.player.y - pillar.y;
          const dist = Math.hypot(dx, dy) || 1;
          const minDistance = pillar.r + PLAYER_RADIUS + 2;
          if (dist < minDistance) {
            const push = minDistance - dist;
            state.player.x += (dx / dist) * push;
            state.player.y += (dy / dist) * push;
          }
        });

        state.player.x = clamp(state.player.x, 34, VIEW.width - 34);
        state.player.y = clamp(state.player.y, 36, VIEW.height - 34);
      }

      function updatePlayer(dt) {
        const keys = state.input.keys;
        let moveX = 0;
        let moveY = 0;

        if (keys.ArrowLeft || keys.a || keys.A) moveX -= 1;
        if (keys.ArrowRight || keys.d || keys.D) moveX += 1;
        if (keys.ArrowUp || keys.w || keys.W) moveY -= 1;
        if (keys.ArrowDown || keys.s || keys.S) moveY += 1;

        if (moveX !== 0 || moveY !== 0) {
          const length = Math.hypot(moveX, moveY) || 1;
          moveX /= length;
          moveY /= length;
        } else if (state.input.moveTarget) {
          const dx = state.input.moveTarget.x - state.player.x;
          const dy = state.input.moveTarget.y - state.player.y;
          const dist = Math.hypot(dx, dy);
          if (dist > 8) {
            moveX = dx / dist;
            moveY = dy / dist;
          }
        }

        const speedMultiplier = 1 + (state.effects.speed > 0 ? 0.35 : 0);
        const speed = 212 * speedMultiplier;
        state.player.vx = moveX * speed;
        state.player.vy = moveY * speed;
        state.player.x += state.player.vx * dt;
        state.player.y += state.player.vy * dt;

        if (moveX !== 0 || moveY !== 0) {
          state.player.facing = Math.atan2(moveY, moveX);
        }

        resolvePlayerCollisions();
      }

      function updateDetection(dt) {
        let sightCount = 0;

        state.sentinels.forEach((sentinel) => {
          sentinel.seesPlayer = sentinelCanSeePlayer(sentinel);
          if (sentinel.seesPlayer) {
            sightCount += 1;
          }
        });

        state.currentSightCount = sightCount;

        if (sightCount > 0) {
          const veilFactor = state.effects.veil > 0 ? 0.45 : 1;
          const gain =
            dt *
            sightCount *
            (0.44 + state.submitted.length * 0.08) *
            veilFactor *
            (1 + (state.curse / CURSE_LIMIT) * 0.22);
          state.exposure = clamp(state.exposure + gain, 0, EXPOSURE_LIMIT + 0.2);
          state.alertPulse = 1;
          state.screenShake = Math.max(state.screenShake, sightCount > 1 ? 11 : 7);
          if (state.exposure >= EXPOSURE_LIMIT) {
            failStage("watched-too-long");
          }
        } else {
          state.exposure = clamp(state.exposure - dt * 0.3, 0, EXPOSURE_LIMIT);
        }
      }

      function updatePickups(dt) {
        for (let index = state.pickups.length - 1; index >= 0; index -= 1) {
          const pickup = state.pickups[index];
          pickup.ttl -= dt;
          pickup.bob += dt * 2.6;
          if (pickup.ttl <= 0) {
            state.pickups.splice(index, 1);
            continue;
          }
          if (distance(state.player.x, state.player.y, pickup.x, pickup.y) <= pickup.radius + 18) {
            applyPickup(pickup);
            break;
          }
        }
      }

      function updateParticles(dt) {
        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.x += particle.vx * 60 * dt;
          particle.y += particle.vy * 60 * dt;
          particle.vx *= 0.98;
          particle.vy *= 0.98;
          particle.life -= dt * 1.2;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }

        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          popup.y -= popup.vy * dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }
      }

      function updateWorld(dt) {
        state.world.rotation += dt * 0.22;
        state.world.haloPulse += dt * 1.3;
        state.vault.pulse = Math.max(0, state.vault.pulse - dt * 1.6);
        state.vault.glow = Math.max(0, state.vault.glow - dt * 0.7);
        state.flash = Math.max(0, state.flash - dt * 1.4);
        state.alertPulse = Math.max(0, state.alertPulse - dt * 1.9);
        state.screenShake = Math.max(0, state.screenShake - dt * 26);
        state.replayCooldown = Math.max(0, state.replayCooldown - dt);
        state.effects.veil = Math.max(0, state.effects.veil - dt);
        state.effects.speed = Math.max(0, state.effects.speed - dt);
        state.effects.vision = Math.max(0, state.effects.vision - dt);
        state.effects.surge = Math.max(0, state.effects.surge - dt);

        if (state.replayWave) {
          state.replayWave.progress += dt * 1.8;
          if (state.replayWave.progress >= 1) {
            state.replayWave = null;
          }
        }
      }

      function updateCurse(dt) {
        const passiveGain =
          0.026 +
          state.inventory.length * 0.095 +
          (state.effects.surge > 0 ? 0.16 : 0) +
          (state.currentSightCount > 0 ? 0.035 : 0);
        addCurse(dt * passiveGain);
      }

      function update(dt) {
        updateWorld(dt);

        if (state.mode !== "running") {
          return;
        }

        state.elapsed += dt;
        updateSentinelPaths(state.elapsed);
        updatePlayer(dt);
        updateDetection(dt);
        updateCurse(dt);
        updatePickups(dt);
        updateParticles(dt);

        if (!reduceMotion && Math.random() < 0.45) {
          const color = state.currentSightCount ? "#ff6687" : "#72f7ff";
          state.particles.push({
            x: state.player.x,
            y: state.player.y,
            vx: randomBetween(-0.9, 0.9),
            vy: randomBetween(-0.9, 0.9),
            life: randomBetween(0.25, 0.45),
            size: randomBetween(1.2, 2.8),
            color,
          });
        }

        if (state.pendingClear > 0) {
          state.pendingClear -= dt;
          if (state.pendingClear <= 0) {
            clearStage();
          }
        }
      }

      function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + width, y, x + width, y + height, radius);
        ctx.arcTo(x + width, y + height, x, y + height, radius);
        ctx.arcTo(x, y + height, x, y, radius);
        ctx.arcTo(x, y, x + width, y, radius);
        if (fillStyle) {
          ctx.fillStyle = fillStyle;
          ctx.fill();
        }
        if (strokeStyle) {
          ctx.strokeStyle = strokeStyle;
          ctx.stroke();
        }
      }

      function drawBackground() {
        const background = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        background.addColorStop(0, "#071122");
        background.addColorStop(1, "#02050c");
        ctx.fillStyle = background;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        state.dust.forEach((cloud, index) => {
          ctx.save();
          ctx.translate(cloud.x, cloud.y);
          ctx.rotate(cloud.angle + state.world.rotation * (0.08 + index * 0.01));
          const gradient = ctx.createRadialGradient(0, 0, 4, 0, 0, cloud.w);
          gradient.addColorStop(0, cloud.color);
          gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = gradient;
          ctx.fillRect(-cloud.w, -cloud.h, cloud.w * 2, cloud.h * 2);
          ctx.restore();
        });

        state.stars.forEach((star) => {
          const twinkle = 0.4 + Math.sin(state.world.rotation * 12 * star.drift + star.x) * 0.3;
          ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha + twinkle * 0.18})`;
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      function drawHall() {
        const cx = VIEW.width / 2;
        const cy = VIEW.height / 2;
        const shell = ctx.createRadialGradient(cx, cy, 10, cx, cy, 360);
        shell.addColorStop(0, "rgba(19, 34, 66, 0.98)");
        shell.addColorStop(0.5, "rgba(10, 19, 39, 0.94)");
        shell.addColorStop(1, "rgba(2, 6, 14, 0.98)");
        drawRoundedRect(48, 38, 864, 464, 44, shell, "rgba(114, 247, 255, 0.16)");

        for (let ring = 0; ring < 5; ring += 1) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(114, 247, 255, ${0.1 - ring * 0.012})`;
          ctx.lineWidth = ring === 0 ? 2 : 1;
          ctx.ellipse(cx, cy, 108 + ring * 84, 56 + ring * 44, 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(state.world.rotation);
        for (let index = 0; index < 12; index += 1) {
          ctx.rotate((Math.PI * 2) / 12);
          ctx.strokeStyle = index % 2 === 0 ? "rgba(255, 207, 117, 0.14)" : "rgba(114, 247, 255, 0.08)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(0, 62);
          ctx.lineTo(0, 212);
          ctx.stroke();
        }
        ctx.restore();

        state.pillars.forEach((pillar) => {
          const pillarGradient = ctx.createRadialGradient(
            pillar.x - 10,
            pillar.y - 10,
            8,
            pillar.x,
            pillar.y,
            pillar.r + 16
          );
          pillarGradient.addColorStop(0, "rgba(233, 244, 255, 0.95)");
          pillarGradient.addColorStop(0.45, "rgba(112, 197, 255, 0.44)");
          pillarGradient.addColorStop(1, "rgba(18, 34, 66, 0.08)");
          ctx.fillStyle = pillarGradient;
          ctx.beginPath();
          ctx.arc(pillar.x, pillar.y, pillar.r + 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 255, 255, 0.26)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(pillar.x, pillar.y, pillar.r, 0, Math.PI * 2);
          ctx.stroke();
        });
      }

      function drawVault() {
        const pulse = state.vault.pulse;
        const glow = state.vault.glow;
        const radius = state.vault.r + pulse * 6;
        const vaultGradient = ctx.createRadialGradient(
          state.vault.x,
          state.vault.y,
          8,
          state.vault.x,
          state.vault.y,
          86
        );
        vaultGradient.addColorStop(0, "rgba(255, 255, 255, 0.95)");
        vaultGradient.addColorStop(0.32, `rgba(114, 247, 255, ${0.46 + glow * 0.24})`);
        vaultGradient.addColorStop(1, "rgba(114, 247, 255, 0.02)");
        ctx.fillStyle = vaultGradient;
        ctx.beginPath();
        ctx.arc(state.vault.x, state.vault.y, 82 + pulse * 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = rgbaFromHex("#72f7ff", 0.72 + glow * 0.18);
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(state.vault.x, state.vault.y, radius, 0, Math.PI * 2);
        ctx.stroke();

        const required = nextRequiredPattern();
        const slots = state.requiredOrder.map((patternId, index) => {
          const angle = -Math.PI / 2 + index * ((Math.PI * 2) / 3);
          const slotX = state.vault.x + Math.cos(angle) * 92;
          const slotY = state.vault.y + Math.sin(angle) * 58;
          const isDone = index < state.submitted.length;
          const isNext = patternId === required;
          return { patternId, x: slotX, y: slotY, isDone, isNext };
        });

        slots.forEach((slot) => {
          const pattern = PATTERNS[slot.patternId];
          ctx.fillStyle = slot.isDone ? rgbaFromHex(pattern.color, 0.92) : rgbaFromHex(pattern.color, slot.isNext ? 0.42 : 0.18);
          ctx.beginPath();
          ctx.arc(slot.x, slot.y, slot.isDone ? 18 : 15, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = slot.isDone ? "rgba(255,255,255,0.85)" : rgbaFromHex(pattern.color, 0.7);
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = slot.isDone ? "#06111f" : "rgba(255,255,255,0.85)";
          ctx.font = "900 13px Avenir Next";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(pattern.icon, slot.x, slot.y + 0.5);
        });

        if (state.replayWave) {
          const pattern = PATTERNS[state.replayWave.id];
          const progress = state.replayWave.progress;
          ctx.strokeStyle = rgbaFromHex(pattern.color, 0.82 - progress * 0.42);
          ctx.lineWidth = 5 - progress * 2;
          ctx.beginPath();
          ctx.arc(state.player.x, state.player.y, 30 + progress * 128, 0, Math.PI * 2);
          ctx.stroke();
          ctx.strokeStyle = rgbaFromHex(pattern.color, 0.9 - progress * 0.55);
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(state.player.x, state.player.y);
          ctx.lineTo(
            lerp(state.player.x, state.vault.x, progress),
            lerp(state.player.y, state.vault.y, progress)
          );
          ctx.stroke();
        }
      }

      function drawSentinelCone(sentinel) {
        const pattern = PATTERNS[sentinel.patternId];
        const alpha = sentinel.seesPlayer ? 0.18 : 0.11;
        const cone = ctx.createRadialGradient(
          sentinel.x,
          sentinel.y,
          8,
          sentinel.x,
          sentinel.y,
          sentinel.viewDistance
        );
        cone.addColorStop(0, rgbaFromHex(pattern.color, alpha + 0.1));
        cone.addColorStop(0.62, rgbaFromHex(pattern.color, alpha));
        cone.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = cone;
        ctx.beginPath();
        ctx.moveTo(sentinel.x, sentinel.y);
        ctx.arc(
          sentinel.x,
          sentinel.y,
          sentinel.viewDistance,
          sentinel.facing - sentinel.coneAngle / 2,
          sentinel.facing + sentinel.coneAngle / 2
        );
        ctx.closePath();
        ctx.fill();
      }

      function drawSentinel(sentinel) {
        const pattern = PATTERNS[sentinel.patternId];
        drawSentinelCone(sentinel);

        ctx.save();
        ctx.translate(sentinel.x, sentinel.y);
        ctx.rotate(sentinel.facing);
        ctx.shadowColor = pattern.glow;
        ctx.shadowBlur = sentinel.seesPlayer ? 22 : 14;
        ctx.fillStyle = pattern.color;
        ctx.beginPath();
        ctx.moveTo(20, 0);
        ctx.lineTo(-10, -14);
        ctx.lineTo(-18, 0);
        ctx.lineTo(-10, 14);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        ctx.beginPath();
        ctx.arc(2, 0, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.font = "700 12px Avenir Next";
        ctx.textAlign = "center";
        ctx.fillText(pattern.icon, sentinel.x, sentinel.y - 28);

        if (sentinel.cooldown > 0) {
          ctx.fillStyle = "rgba(255,255,255,0.7)";
          ctx.font = "700 11px Avenir Next";
          ctx.fillText(`LOCK ${formatNumber(sentinel.cooldown)}`, sentinel.x, sentinel.y + 30);
        }
      }

      function drawPickups() {
        state.pickups.forEach((pickup) => {
          const bobY = Math.sin(pickup.bob) * 8;
          const x = pickup.x;
          const y = pickup.y + bobY;
          const width = 140;
          const height = 74;

          ctx.save();
          ctx.shadowColor = rgbaFromHex(pickup.def.color, 0.45);
          ctx.shadowBlur = 16;
          drawRoundedRect(
            x - width / 2,
            y - height / 2,
            width,
            height,
            18,
            "rgba(8, 16, 32, 0.88)",
            rgbaFromHex(pickup.def.color, 0.4)
          );
          ctx.restore();

          ctx.fillStyle = pickup.def.color;
          ctx.font = "800 13px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(pickup.def.title, x, y - 13);

          ctx.fillStyle = "rgba(238,246,255,0.92)";
          ctx.font = '600 11px "Noto Sans KR", sans-serif';
          ctx.fillText(pickup.def.boonShort, x, y + 6);
          ctx.fillStyle = "rgba(255, 102, 135, 0.95)";
          ctx.fillText(`${pickup.def.penaltyIcon} ${pickup.def.penalty}`, x, y + 22);
        });
      }

      function drawPlayer() {
        const veilAlpha = state.effects.veil > 0 ? 0.34 : 0;
        const aura = ctx.createRadialGradient(
          state.player.x,
          state.player.y,
          3,
          state.player.x,
          state.player.y,
          34
        );
        aura.addColorStop(0, "rgba(255,255,255,0.96)");
        aura.addColorStop(0.3, `rgba(114,247,255,${0.62 + veilAlpha})`);
        aura.addColorStop(1, "rgba(114,247,255,0)");
        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(state.player.x, state.player.y, 34, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.translate(state.player.x, state.player.y);
        ctx.rotate(state.player.facing);
        ctx.fillStyle = "rgba(255,255,255,0.98)";
        ctx.beginPath();
        ctx.moveTo(18, 0);
        ctx.lineTo(-12, -12);
        ctx.lineTo(-7, 0);
        ctx.lineTo(-12, 12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = state.currentSightCount > 0 ? "#ff6687" : "#72f7ff";
        ctx.beginPath();
        ctx.arc(2, 0, 5.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          ctx.fillStyle = rgbaFromHex(particle.color, particle.life);
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * particle.life, 0, Math.PI * 2);
          ctx.fill();
        });

        state.popups.forEach((popup) => {
          ctx.fillStyle = rgbaFromHex(popup.color, clamp(popup.life, 0, 1));
          ctx.font = '700 14px "Noto Sans KR", sans-serif';
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
        });
      }

      function drawBar(x, y, width, value, color, label, text) {
        drawRoundedRect(x, y, width, 14, 999, "rgba(255,255,255,0.09)", "rgba(255,255,255,0.12)");
        drawRoundedRect(x + 2, y + 2, (width - 4) * clamp(value, 0, 1), 10, 999, color, null);
        ctx.fillStyle = "rgba(255,255,255,0.86)";
        ctx.font = "700 12px Avenir Next";
        ctx.textAlign = "left";
        ctx.fillText(label, x, y - 8);
        ctx.textAlign = "right";
        ctx.fillText(text, x + width, y - 8);
      }

      function drawHUD() {
        drawRoundedRect(
          18,
          16,
          276,
          110,
          22,
          "rgba(4, 11, 24, 0.68)",
          "rgba(114,247,255,0.16)"
        );
        ctx.fillStyle = "rgba(255,255,255,0.96)";
        ctx.font = "800 20px Avenir Next";
        ctx.textAlign = "left";
        ctx.fillText("NEON OBSERVATORY", 34, 44);
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.font = '600 12px "Noto Sans KR", sans-serif';
        ctx.fillText("패턴 절도 / 금고 재생 / 저주 픽업", 34, 62);

        drawBar(
          34,
          82,
          114,
          state.curse / CURSE_LIMIT,
          "rgba(255, 121, 217, 0.94)",
          "CURSE",
          `${formatNumber(state.curse)} / ${CURSE_LIMIT}`
        );
        drawBar(
          164,
          82,
          114,
          state.exposure / EXPOSURE_LIMIT,
          state.currentSightCount > 0 ? "rgba(255,102,135,0.96)" : "rgba(114,247,255,0.92)",
          "WATCH",
          `${Math.round((state.exposure / EXPOSURE_LIMIT) * 100)}%`
        );

        drawRoundedRect(
          VIEW.width - 302,
          16,
          284,
          114,
          22,
          "rgba(4, 11, 24, 0.68)",
          "rgba(255,255,255,0.14)"
        );
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.font = '700 12px "Noto Sans KR", sans-serif';
        ctx.textAlign = "left";
        ctx.fillText("금고 프로토콜", VIEW.width - 286, 40);
        ctx.font = '600 12px "Noto Sans KR", sans-serif';
        ctx.fillStyle = "rgba(255,255,255,0.62)";
        ctx.fillText("다음 룬과 같은 패턴을 훔쳐 금고 링에서 재생", VIEW.width - 286, 58);

        const required = nextRequiredPattern();
        state.requiredOrder.forEach((patternId, index) => {
          const pattern = PATTERNS[patternId];
          const done = index < state.submitted.length;
          const chipX = VIEW.width - 272 + index * 86;
          const chipY = 84;
          drawRoundedRect(
            chipX,
            chipY,
            74,
            28,
            14,
            done ? rgbaFromHex(pattern.color, 0.94) : "rgba(255,255,255,0.06)",
            done ? "rgba(255,255,255,0.4)" : rgbaFromHex(pattern.color, required === patternId ? 0.74 : 0.28)
          );
          ctx.fillStyle = done ? "#06111f" : pattern.color;
          ctx.font = "900 12px Avenir Next";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(pattern.icon, chipX + 18, chipY + 15);
          ctx.font = '700 10px "Noto Sans KR", sans-serif';
          ctx.fillText(done ? "완료" : required === patternId ? "다음" : "대기", chipX + 48, chipY + 15);
        });
        ctx.textBaseline = "alphabetic";

        drawRoundedRect(
          18,
          VIEW.height - 86,
          342,
          54,
          18,
          "rgba(4, 11, 24, 0.66)",
          "rgba(255,255,255,0.12)"
        );
        ctx.fillStyle = "rgba(255,255,255,0.72)";
        ctx.font = '600 12px "Noto Sans KR", sans-serif';
        ctx.textAlign = "left";
        ctx.fillText("보유 패턴", 34, VIEW.height - 57);

        ["arc", "prism", "echo"].forEach((patternId, index) => {
          const pattern = PATTERNS[patternId];
          const owned = state.inventory.includes(patternId);
          const charged = state.submitted.includes(patternId);
          const x = 104 + index * 94;
          const y = VIEW.height - 69;
          drawRoundedRect(
            x,
            y,
            84,
            24,
            12,
            charged
              ? "rgba(255,255,255,0.08)"
              : owned
                ? rgbaFromHex(pattern.color, 0.2)
                : "rgba(255,255,255,0.05)",
            owned || charged ? rgbaFromHex(pattern.color, 0.52) : "rgba(255,255,255,0.08)"
          );
          ctx.fillStyle = charged ? "rgba(255,255,255,0.42)" : owned ? pattern.color : "rgba(255,255,255,0.28)";
          ctx.font = "900 12px Avenir Next";
          ctx.textAlign = "center";
          ctx.fillText(charged ? "LOCK" : pattern.icon, x + 18, y + 16);
          ctx.font = '700 10px "Noto Sans KR", sans-serif';
          ctx.fillText(charged ? "금고 사용" : owned ? "복사됨" : "미획득", x + 54, y + 16);
        });

        if (state.mode === "running") {
          drawRoundedRect(
            VIEW.width / 2 - 122,
            VIEW.height - 74,
            244,
            38,
            19,
            "rgba(4, 11, 24, 0.62)",
            "rgba(255,255,255,0.1)"
          );
          ctx.fillStyle = "rgba(255,255,255,0.86)";
          ctx.font = '600 12px "Noto Sans KR", sans-serif';
          ctx.textAlign = "center";
          ctx.fillText(
            state.replayCooldown > 0
              ? `재생 냉각 ${formatNumber(state.replayCooldown)}초`
              : "SPACE 또는 두 손가락 탭으로 패턴 재생",
            VIEW.width / 2,
            VIEW.height - 50
          );
        }
      }

      function drawVignette() {
        const intensity = clamp(state.alertPulse * 0.36 + state.flash * 0.42, 0, 0.72);
        if (intensity <= 0.01) {
          return;
        }
        const vignette = ctx.createRadialGradient(
          VIEW.width / 2,
          VIEW.height / 2,
          120,
          VIEW.width / 2,
          VIEW.height / 2,
          540
        );
        vignette.addColorStop(0, "rgba(0,0,0,0)");
        vignette.addColorStop(0.7, `rgba(255, 102, 135, ${intensity * 0.18})`);
        vignette.addColorStop(1, `rgba(255, 102, 135, ${intensity * 0.52})`);
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
      }

      function drawOverlay(title, accent, lines, footer) {
        ctx.fillStyle = "rgba(4, 10, 20, 0.64)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        drawRoundedRect(
          VIEW.width / 2 - 250,
          VIEW.height / 2 - 166,
          500,
          332,
          30,
          "rgba(5, 12, 25, 0.9)",
          rgbaFromHex(accent, 0.46)
        );

        const glow = ctx.createRadialGradient(VIEW.width / 2, VIEW.height / 2 - 90, 10, VIEW.width / 2, VIEW.height / 2 - 90, 180);
        glow.addColorStop(0, rgbaFromHex(accent, 0.28));
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.fillRect(VIEW.width / 2 - 250, VIEW.height / 2 - 166, 500, 332);

        ctx.fillStyle = rgbaFromHex(accent, 0.95);
        ctx.font = "800 15px Avenir Next";
        ctx.textAlign = "center";
        ctx.fillText("NEON HEIST PROTOCOL", VIEW.width / 2, VIEW.height / 2 - 112);
        ctx.fillStyle = "rgba(255,255,255,0.98)";
        ctx.font = "800 36px Avenir Next";
        ctx.fillText(title, VIEW.width / 2, VIEW.height / 2 - 68);
        ctx.font = '600 15px "Noto Sans KR", sans-serif';
        ctx.fillStyle = "rgba(255,255,255,0.84)";
        lines.forEach((line, index) => {
          ctx.fillText(line, VIEW.width / 2, VIEW.height / 2 - 24 + index * 28);
        });
        ctx.fillStyle = "rgba(255,255,255,0.64)";
        ctx.font = '600 13px "Noto Sans KR", sans-serif';
        ctx.fillText(footer, VIEW.width / 2, VIEW.height / 2 + 122);
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        drawBackground();

        const shakeX = state.screenShake > 0 ? randomBetween(-state.screenShake, state.screenShake) : 0;
        const shakeY = state.screenShake > 0 ? randomBetween(-state.screenShake, state.screenShake) : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawHall();
        drawVault();
        drawPickups();
        state.sentinels.forEach(drawSentinel);
        drawPlayer();
        drawParticles();
        ctx.restore();

        drawHUD();
        drawVignette();

        if (state.mode === "menu") {
          drawOverlay(
            TITLE,
            "#72f7ff",
            [
              SHORT_COPY,
              "감시 드론의 시야 원뿔을 피하고, 거울 기둥 뒤에서 패턴을 훔치세요.",
              "금고 링 안에서 재생하면 다음 룬이 열리고, 유물은 보너스와 페널티를 함께 남깁니다.",
              "터치 또는 Enter로 시작",
            ],
            "드래그로 이동, 적 탭으로 절도, SPACE 또는 두 손가락 탭으로 재생"
          );
        }

        if (state.mode === "failed") {
          drawOverlay(
            "HEIST COLLAPSED",
            "#ff6687",
            [
              state.curse >= CURSE_LIMIT
                ? "저주 누적이 한계를 넘어 거울 몸체가 붕괴했습니다."
                : "감시 시선에 오래 노출되어 잠입 경보가 터졌습니다.",
              `획득 패턴 ${state.submitted.length}/3`,
              `생존 시간 ${formatNumber(state.lastRunTime)}초`,
              FAIL_CONDITION,
            ],
            "터치, 클릭 또는 Enter로 다시 잠입"
          );
        }

        if (state.mode === "cleared") {
          drawOverlay(
            "VAULT OPEN",
            "#8effb8",
            [
              "세 개의 서로 다른 패턴을 재생해 금고 문을 열었습니다.",
              `클리어 시간 ${formatNumber(state.lastRunTime)}초`,
              `저주 잔량 ${formatNumber(state.curse)} / ${CURSE_LIMIT}`,
              CLEAR_CONDITION,
            ],
            "터치, 클릭 또는 Enter로 다시 플레이"
          );
        }
      }

      function stepFrame(dt) {
        update(dt);
        render();
      }

      function gameLoop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const dt = clamp((timestamp - lastTimestamp) / 1000, 0, MAX_DT);
        lastTimestamp = timestamp;
        stepFrame(dt);
        animationFrame = window.requestAnimationFrame(gameLoop);
      }

      function renderGameToText() {
        const payload = {
          mode: state.mode,
          note: SHORT_COPY,
          space: "origin top-left, x right, y down",
          player: {
            x: Number(state.player.x.toFixed(1)),
            y: Number(state.player.y.toFixed(1)),
          },
          vault: {
            x: state.vault.x,
            y: state.vault.y,
            charged: state.submitted.length,
            next: nextRequiredPattern(),
            near: distance(state.player.x, state.player.y, state.vault.x, state.vault.y) <= 104,
          },
          curse: Number(state.curse.toFixed(2)),
          exposure: Number(state.exposure.toFixed(2)),
          inventory: state.inventory.slice(),
          submitted: state.submitted.slice(),
          sentinels: state.sentinels.map((sentinel) => ({
            pattern: sentinel.patternId,
            x: Number(sentinel.x.toFixed(1)),
            y: Number(sentinel.y.toFixed(1)),
            seesPlayer: !!sentinel.seesPlayer,
            cooldown: Number(sentinel.cooldown.toFixed(1)),
          })),
          pickups: state.pickups.map((pickup) => ({
            boon: pickup.def.boonShort,
            penalty: pickup.def.penalty,
            x: Number(pickup.x.toFixed(1)),
            y: Number(pickup.y.toFixed(1)),
          })),
        };
        return JSON.stringify(payload);
      }

      function startFromInteraction() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
        }
      }

      function handleCanvasPointerDown(event) {
        const point = toCanvasPoint(event.clientX, event.clientY);
        canvas.focus();
        startFromInteraction();

        if (state.mode !== "running") {
          return;
        }

        state.input.pointerActive = true;
        state.input.pointerId = event.pointerId;
        state.input.moveTarget = point;
        canvas.setPointerCapture?.(event.pointerId);
        const sentinel = findSentinelAt(point.x, point.y);
        if (sentinel) {
          attemptSteal(sentinel);
        }
      }

      function handleCanvasPointerMove(event) {
        if (!state.input.pointerActive || state.input.pointerId !== event.pointerId) {
          return;
        }
        state.input.moveTarget = toCanvasPoint(event.clientX, event.clientY);
      }

      function clearPointer(pointerId) {
        if (state.input.pointerId !== pointerId) {
          return;
        }
        state.input.pointerActive = false;
        state.input.pointerId = null;
      }

      canvas.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        handleCanvasPointerDown(event);
      });

      canvas.addEventListener("pointermove", (event) => {
        handleCanvasPointerMove(event);
      });

      canvas.addEventListener("pointerup", (event) => {
        clearPointer(event.pointerId);
      });

      canvas.addEventListener("pointercancel", (event) => {
        clearPointer(event.pointerId);
      });

      canvas.addEventListener("touchstart", (event) => {
        if (event.touches.length >= 2 && state.mode === "running") {
          event.preventDefault();
          attemptReplay();
        }
      }, { passive: false });

      window.addEventListener("keydown", (event) => {
        if (event.repeat) {
          return;
        }
        if (event.key === "Enter") {
          event.preventDefault();
          startFromInteraction();
          return;
        }
        if (event.key === " " || event.code === "Space") {
          event.preventDefault();
          if (state.mode === "running") {
            attemptReplay();
          } else {
            startFromInteraction();
          }
          return;
        }
        state.input.keys[event.key] = true;
      });

      window.addEventListener("keyup", (event) => {
        state.input.keys[event.key] = false;
      });

      replayButton.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        replayButton.dataset.active = "true";
        attemptReplay();
      });
      replayButton.addEventListener("pointerup", () => {
        replayButton.dataset.active = "false";
      });
      replayButton.addEventListener("pointercancel", () => {
        replayButton.dataset.active = "false";
      });

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms) => {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          stepFrame(FIXED_DT);
        }
      };
      window.relayStageMeta = {
        id: STAGE_ID,
        title: TITLE,
        creator: CREATOR,
        genre: GENRE,
        clearCondition: CLEAR_CONDITION,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          clearStage();
          render();
        },
        forceFail() {
          failStage("debug-force-fail");
          render();
        },
      };

      makeStars();
      makePillars();
      resetRun("menu");
      reportReadyToHost();
      render();
      animationFrame = window.requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
