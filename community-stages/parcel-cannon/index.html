<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>택배 대포</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #FFF5E6; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(139, 105, 20, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(80, 60, 20, 0.92);
        color: #FFF5E6; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #FFF5E6; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(139, 105, 20, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">택배 대포. 대포로 택배를 각 집 앞에 정확히 배달하세요. 화면을 드래그하여 각도와 세기를 조절합니다. 모바일에서는 터치 드래그로 플레이할 수 있습니다. 택배 5개를 모두 배달하면 클리어. 택배 3개를 놓치면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="택배 대포" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "parcel-cannon",
        title: "택배 대포",
        description: "대포로 택배를 각 집 앞에 정확히 배달하세요",
        creator: "jungcollin",
        genre: "Projectile puzzle",
        clearCondition: "택배 5개를 모두 배달하면 클리어",
        failCondition: "택배 3개를 놓치면 실패",
        controls: "드래그로 각도와 세기를 조절하여 발사",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        sky: "#E8F4FD",
        skyTop: "#C5DEF0",
        ground: "#D4B896",
        groundDark: "#B89A6E",
        grass: "#8DB956",
        house1: "#E8C9A0",
        house2: "#D4A574",
        roof1: "#C0392B",
        roof2: "#6B8E23",
        roof3: "#2E86C1",
        cannon: "#5D4E37",
        cannonDark: "#3E3425",
        parcel: "#C49A6C",
        parcelTape: "#E8A040",
        target: "rgba(46,204,113,0.4)",
        accent: "#E67E22",
        fail: "#C0392B",
        clear: "#27AE60",
      };

      // --- Constants ---
      const TARGET = 5;
      const MAX_MISS = 3;
      const GRAVITY = 400;
      const CANNON_X = 80;
      const CANNON_Y = H - 110;
      const GROUND_Y = H - 80;
      const PARCEL_SIZE = 22;

      // --- State ---
      let mode = "menu";
      let elapsed = 0;
      let delivered = 0;
      let missed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let flashAlpha = 0;
      let clearAnim = 0;

      let cannonAngle = -Math.PI / 4;
      let cannonPower = 0;
      let dragging = false;
      let dragStart = null;
      let dragCurrent = null;

      let parcel = null;
      let houses = [];
      let currentHouseIdx = 0;
      let particles = [];
      let clouds = [];
      let trail = [];

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Houses ---
      function generateHouses() {
        houses = [];
        const roofColors = [COL.roof1, COL.roof2, COL.roof3, COL.roof1, COL.roof2];
        const houseColors = [COL.house1, COL.house2, COL.house1, COL.house2, COL.house1];
        for (let i = 0; i < TARGET; i++) {
          const x = 250 + i * 140 + rand(-10, 10);
          const w = rand(55, 70);
          const h = rand(50, 70);
          houses.push({
            x, y: GROUND_Y - h, w, h,
            roofH: rand(25, 35),
            color: houseColors[i], roofColor: roofColors[i],
            delivered: false,
            targetX: x + w / 2, targetY: GROUND_Y,
            targetW: w + 20,
            doorX: x + w / 2 - 8, doorW: 16, doorH: 22,
            windowX: x + 10, windowY: GROUND_Y - h + 12,
          });
        }
      }

      function initClouds() {
        clouds = [];
        for (let i = 0; i < 4; i++) {
          clouds.push({
            x: rand(100, W - 100), y: rand(30, 100),
            w: rand(50, 110), h: rand(20, 35),
            speed: rand(5, 15), alpha: rand(0.4, 0.7),
          });
        }
      }

      function spawnParticles(x, y, count, color, sizeRange) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 120);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - rand(30, 80),
            life: 1, color,
            size: rand(sizeRange[0], sizeRange[1]),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; delivered = 0; missed = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        cannonAngle = -Math.PI / 4; cannonPower = 0;
        dragging = false; dragStart = null; dragCurrent = null;
        parcel = null; currentHouseIdx = 0;
        particles = []; trail = [];
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        generateHouses(); initClouds();
      }

      function fire() {
        if (parcel || cannonPower < 0.1) return;
        const speed = cannonPower * 600;
        parcel = {
          x: CANNON_X + Math.cos(cannonAngle) * 40,
          y: CANNON_Y + Math.sin(cannonAngle) * 40,
          vx: Math.cos(cannonAngle) * speed,
          vy: Math.sin(cannonAngle) * speed,
          rot: 0, rotSpeed: rand(-5, 5),
        };
        trail = [];
        shake = 3;
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        for (const c of clouds) {
          c.x += c.speed * dt;
          if (c.x > W + c.w) c.x = -c.w;
        }

        if (parcel) {
          parcel.vy += GRAVITY * dt;
          parcel.x += parcel.vx * dt;
          parcel.y += parcel.vy * dt;
          parcel.rot += parcel.rotSpeed * dt;

          if (!reducedMotion) {
            trail.push({ x: parcel.x, y: parcel.y, life: 1 });
            if (trail.length > 20) trail.shift();
          }

          const house = houses[currentHouseIdx];
          if (house && !house.delivered) {
            const tx = house.targetX;
            const ty = house.targetY;
            const tw = house.targetW;
            if (parcel.y >= ty - PARCEL_SIZE && parcel.x > tx - tw / 2 && parcel.x < tx + tw / 2 && parcel.vy > 0) {
              house.delivered = true;
              delivered++;
              spawnParticles(parcel.x, parcel.y, reducedMotion ? 4 : 12, COL.parcelTape, [3, 6]);
              parcel = null; trail = [];
              currentHouseIdx++;
              if (delivered >= TARGET) {
                mode = "clear"; clearAnim = 0;
                window.relayStageResult.status = "cleared";
                reportCleared();
              }
              return;
            }
          }

          if (parcel && (parcel.y > GROUND_Y || parcel.x > W + 50 || parcel.x < -50)) {
            missed++;
            if (parcel.y <= GROUND_Y + 20) {
              spawnParticles(parcel.x, GROUND_Y, reducedMotion ? 3 : 8, COL.groundDark, [2, 5]);
            }
            shake = 5; flashAlpha = 0.2;
            parcel = null; trail = [];
            if (missed >= MAX_MISS) {
              mode = "failed";
              window.relayStageResult.status = "failed";
              reportFailed("택배 분실");
            }
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 120 * dt; p.life -= dt * 2.5;
          if (p.life <= 0) particles.splice(i, 1);
        }
        for (const t of trail) t.life -= dt * 3;

        shake *= 0.88; if (shake < 0.2) shake = 0;
        flashAlpha *= 0.9;
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.2 ? rand(-shake, shake) : 0;
        const sy = shake > 0.2 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
        skyGrad.addColorStop(0, COL.skyTop);
        skyGrad.addColorStop(1, COL.sky);
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, W, GROUND_Y);

        ctx.fillStyle = COL.ground;
        ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
        ctx.fillStyle = COL.grass;
        ctx.fillRect(0, GROUND_Y - 4, W, 8);

        drawClouds();
        drawHouses();

        if (!parcel && currentHouseIdx < houses.length) {
          const h = houses[currentHouseIdx];
          ctx.fillStyle = COL.target;
          ctx.fillRect(h.targetX - h.targetW / 2, GROUND_Y - 6, h.targetW, 6);
          ctx.fillStyle = "rgba(46,204,113,0.7)";
          ctx.beginPath();
          ctx.moveTo(h.targetX, h.y - 25 + 15);
          ctx.lineTo(h.targetX - 8, h.y - 25);
          ctx.lineTo(h.targetX + 8, h.y - 25);
          ctx.fill();
        }

        drawTrail();
        if (parcel) drawParcel(parcel.x, parcel.y, parcel.rot);
        drawCannon();
        if (dragging && !parcel) drawAimLine();
        drawParticles();
        if (mode === "running") drawHUD();

        if (flashAlpha > 0.01) {
          ctx.fillStyle = `rgba(192,57,43,${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawClouds() {
        for (const c of clouds) {
          ctx.globalAlpha = c.alpha;
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.ellipse(c.x, c.y, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(c.x - c.w * 0.2, c.y + 4, c.w * 0.3, c.h * 0.35, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHouses() {
        for (let i = 0; i < houses.length; i++) {
          const h = houses[i];
          ctx.fillStyle = h.color;
          ctx.fillRect(h.x, h.y, h.w, h.h);

          ctx.fillStyle = h.roofColor;
          ctx.beginPath();
          ctx.moveTo(h.x - 6, h.y);
          ctx.lineTo(h.x + h.w / 2, h.y - h.roofH);
          ctx.lineTo(h.x + h.w + 6, h.y);
          ctx.fill();

          ctx.fillStyle = "#5D4037";
          ctx.fillRect(h.doorX, GROUND_Y - h.doorH, h.doorW, h.doorH);
          ctx.fillStyle = "#FFD700";
          ctx.beginPath();
          ctx.arc(h.doorX + h.doorW - 4, GROUND_Y - h.doorH / 2, 2, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#AED6F1";
          ctx.fillRect(h.windowX, h.windowY, 14, 12);
          ctx.strokeStyle = "#5D4E37";
          ctx.lineWidth = 1.5;
          ctx.strokeRect(h.windowX, h.windowY, 14, 12);
          ctx.beginPath();
          ctx.moveTo(h.windowX + 7, h.windowY);
          ctx.lineTo(h.windowX + 7, h.windowY + 12);
          ctx.stroke();

          if (h.delivered) {
            ctx.fillStyle = "rgba(46,204,113,0.85)";
            ctx.font = "bold 24px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("✓", h.x + h.w / 2, h.y - h.roofH - 12);
          }

          ctx.fillStyle = "rgba(0,0,0,0.3)";
          ctx.font = "bold 12px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "alphabetic";
          ctx.fillText(`${i + 1}`, h.x + h.w / 2, GROUND_Y + 16);
        }
      }

      function drawCannon() {
        ctx.save();
        ctx.translate(CANNON_X, CANNON_Y);

        ctx.fillStyle = COL.cannonDark;
        ctx.beginPath();
        ctx.arc(0, 10, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = COL.cannon;
        ctx.beginPath();
        ctx.arc(0, 10, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = COL.cannonDark;
        ctx.lineWidth = 2;
        for (let a = 0; a < Math.PI * 2; a += Math.PI / 3) {
          ctx.beginPath();
          ctx.moveTo(0, 10);
          ctx.lineTo(Math.cos(a) * 12, 10 + Math.sin(a) * 12);
          ctx.stroke();
        }

        ctx.rotate(cannonAngle);
        ctx.fillStyle = COL.cannonDark;
        ctx.fillRect(-6, -8, 48, 16);
        ctx.fillStyle = COL.cannon;
        ctx.fillRect(-4, -6, 44, 12);
        ctx.fillStyle = "#222";
        ctx.fillRect(38, -9, 6, 18);

        ctx.restore();
      }

      function drawParcel(x, y, rot) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);

        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.fillRect(-PARCEL_SIZE / 2 + 2, 2, PARCEL_SIZE, PARCEL_SIZE);

        ctx.fillStyle = COL.parcel;
        ctx.fillRect(-PARCEL_SIZE / 2, -PARCEL_SIZE / 2, PARCEL_SIZE, PARCEL_SIZE);

        ctx.strokeStyle = COL.parcelTape;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(-PARCEL_SIZE / 2, 0);
        ctx.lineTo(PARCEL_SIZE / 2, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -PARCEL_SIZE / 2);
        ctx.lineTo(0, PARCEL_SIZE / 2);
        ctx.stroke();

        ctx.restore();
      }

      function drawTrail() {
        for (const t of trail) {
          if (t.life <= 0) continue;
          ctx.globalAlpha = t.life * 0.3;
          ctx.fillStyle = COL.parcelTape;
          ctx.beginPath();
          ctx.arc(t.x, t.y, 3 * t.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawAimLine() {
        if (!dragStart || !dragCurrent) return;
        const dx = dragStart.x - dragCurrent.x;
        const dy = dragStart.y - dragCurrent.y;
        const power = clamp(Math.hypot(dx, dy) / 200, 0, 1);
        const angle = Math.atan2(dy, dx);
        const speed = power * 600;
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;

        ctx.setLineDash([4, 6]);
        ctx.strokeStyle = "rgba(230,126,34,0.5)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        let px = CANNON_X + Math.cos(angle) * 40;
        let py = CANNON_Y + Math.sin(angle) * 40;
        ctx.moveTo(px, py);
        for (let t = 0; t < 1.5; t += 0.03) {
          px = CANNON_X + Math.cos(angle) * 40 + vx * t;
          py = CANNON_Y + Math.sin(angle) * 40 + vy * t + 0.5 * GRAVITY * t * t;
          if (py > GROUND_Y) break;
          ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        const barX = CANNON_X - 15, barY = CANNON_Y + 35;
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(barX, barY, 60, 8);
        ctx.fillStyle = power > 0.8 ? COL.fail : COL.accent;
        ctx.fillRect(barX, barY, 60 * power, 8);
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.globalAlpha = clamp(p.life, 0, 1);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = "rgba(255,255,255,0.75)";
        ctx.fillRect(0, 0, W, 40);
        ctx.font = "bold 16px 'Trebuchet MS',sans-serif";
        ctx.textBaseline = "middle";
        ctx.fillStyle = COL.clear;
        ctx.textAlign = "left";
        ctx.fillText(`배달: ${delivered}/${TARGET}`, 20, 20);
        ctx.fillStyle = missed > 0 ? COL.fail : "#666";
        ctx.textAlign = "center";
        ctx.fillText(`실패: ${missed}/${MAX_MISS}`, CX, 20);
        ctx.fillStyle = "#555";
        ctx.textAlign = "right";
        ctx.fillText(`${Math.ceil(elapsed)}초`, W - 20, 20);
      }

      function drawCard(title, lines, accent) {
        const cardW = Math.min(340, W - 40);
        const lineH = 28;
        const cardH = 52 + lines.length * lineH + 36;
        const cardX = CX - cardW / 2;
        const cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 12);
        ctx.fill();
        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 16, cardY, cardW - 32, 3);
        ctx.fillStyle = "#333";
        ctx.font = "bold 24px 'Trebuchet MS',sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);
        ctx.font = "500 14px 'Trebuchet MS',sans-serif";
        ctx.fillStyle = "#555";
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 52 + i * lineH);
        }
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.font = "400 13px 'Trebuchet MS',sans-serif";
        ctx.fillText("탭 또는 Enter로 시작", CX, cardY + cardH - 24);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(255,245,230,0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("택배 대포", [
          "대포로 택배를 집 앞에 배달하세요",
          "",
          "조작: 드래그로 각도·세기 조절 후 놓기",
          "클리어: 택배 5개 배달",
          "실패: 택배 3개 놓침",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(255,255,255,${clearAnim * 0.4})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("배달 완료!", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `실패: ${missed}번`,
          ], COL.clear);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        ctx.fillRect(0, 0, W, H);
        drawCard("배달 실패!", [
          `택배 ${missed}개를 놓쳤습니다`,
          `배달: ${delivered}/${TARGET}`,
        ], COL.fail);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset(); mode = "running";
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        if (parcel) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        dragging = true; dragStart = p; dragCurrent = p;
        canvas.setPointerCapture(e.pointerId);
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        dragCurrent = p;
        const dx = dragStart.x - dragCurrent.x;
        const dy = dragStart.y - dragCurrent.y;
        cannonAngle = clamp(Math.atan2(dy, dx), -Math.PI * 0.85, -0.1);
        cannonPower = clamp(Math.hypot(dx, dy) / 200, 0, 1);
      });

      canvas.addEventListener("pointerup", (e) => {
        if (!dragging) return;
        dragging = false;
        if (cannonPower > 0.05 && !parcel) fire();
        dragStart = null; dragCurrent = null; cannonPower = 0;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT); dt -= FIXED_DT; steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          delivered, missed,
          cannonAngle: +(cannonAngle * 180 / Math.PI).toFixed(0),
          result: window.relayStageResult.status,
          parcelFlying: !!parcel, currentHouse: currentHouseIdx,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          delivered = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          missed = MAX_MISS;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      // --- Init ---
      generateHouses(); initClouds();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
