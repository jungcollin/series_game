<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Midnight Harbor: Shadow Stitch</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(52, 135, 170, 0.18), transparent 28%),
          linear-gradient(180deg, #081220 0%, #03080f 100%);
        font-family: "Avenir Next", "Pretendard Variable", "Apple SD Gothic Neo",
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(123, 240, 255, 0.16);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        background: rgba(5, 12, 20, 0.95);
        color: #f8fbff;
        border-radius: 999px;
        text-decoration: none;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        overflow: visible;
        clip: auto;
        clip-path: none;
        padding: 12px 16px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: min(100vw, calc(100vh * 1.6));
        height: min(100vh, calc(100vw / 1.6));
        max-width: 100%;
        max-height: 100%;
        aspect-ratio: 8 / 5;
        background: linear-gradient(180deg, #0d1826 0%, #04070c 100%);
        box-shadow:
          0 28px 72px rgba(0, 0, 0, 0.52),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 3px solid rgba(123, 240, 255, 0.9);
        outline-offset: -6px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Midnight Harbor: Shadow Stitch. 캔버스를 터치하거나 Enter로 시작하세요.
      이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 과열
      직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이
      가능하게 구현. 과열을 폭주시키지 않고 봉합 다리로 4개 제단을 모두
      점등하면 클리어. 과열 게이지가 폭주하거나 강한 빛에 오래 노출돼 실이
      타면 실패.
    </p>
    <canvas
      id="game"
      width="960"
      height="600"
      aria-label="Midnight Harbor: Shadow Stitch"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      (() => {
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const VIEW_W = 960;
        const VIEW_H = 600;
        const FIXED_DT = 1 / 60;
        const TAU = Math.PI * 2;

        const TITLE = "Midnight Harbor: Shadow Stitch";
        const GENRE = "Light-shadow action / 과열 관리";
        const DESCRIPTION = "빛 경계를 꿰매 다리를 만들고, 식혀가며 네 제단을 밝히세요.";
        const CONTROLS =
          "이동, 클릭 또는 터치 드래그로 그림자 봉합, 더블탭으로 실 끊기, 과열 직전에는 짧게 식히기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
        const CLEAR_TEXT =
          "과열을 폭주시키지 않고 봉합 다리로 4개 제단을 모두 점등하면 클리어";
        const FAIL_TEXT =
          "과열 게이지가 폭주하거나 강한 빛에 오래 노출돼 실이 타면 실패";

        const relayContext =
          (window.RelayRuntime && window.RelayRuntime.readContext("midnight-harbor-shadow-stitch-heat")) || {
            history: [],
            clearCount: 0,
            previousStageId: null,
          };

        const docks = [
          { id: "center", x: 480, y: 418, w: 254, h: 118, r: 28, cool: true },
          { id: "west", x: 150, y: 314, w: 164, h: 94, r: 24 },
          { id: "northwest", x: 248, y: 154, w: 142, h: 80, r: 22 },
          { id: "east", x: 810, y: 314, w: 164, h: 94, r: 24 },
          { id: "northeast", x: 712, y: 154, w: 142, h: 80, r: 22 },
        ];

        const altarsTemplate = [
          { id: "west", x: 150, y: 314, dock: "west", color: "#7bf0ff", label: "W" },
          { id: "northwest", x: 248, y: 154, dock: "northwest", color: "#92baff", label: "NW" },
          { id: "east", x: 810, y: 314, dock: "east", color: "#ffbe76", label: "E" },
          { id: "northeast", x: 712, y: 154, dock: "northeast", color: "#ffd97b", label: "NE" },
        ];

        const linksTemplate = [
          {
            id: "center-west",
            start: { x: 354, y: 378 },
            end: { x: 232, y: 318 },
            control: { x: 300, y: 264 },
            amp: 40,
            speed: 1.4,
            phase: 0.2,
            band: 18,
            width: 30,
            color: "#7bf0ff",
            targetDock: "west",
          },
          {
            id: "west-up",
            start: { x: 186, y: 266 },
            end: { x: 230, y: 194 },
            control: { x: 164, y: 194 },
            amp: 24,
            speed: 1.8,
            phase: 1.4,
            band: 15,
            width: 26,
            color: "#99c7ff",
            targetDock: "northwest",
          },
          {
            id: "center-east",
            start: { x: 606, y: 378 },
            end: { x: 728, y: 318 },
            control: { x: 660, y: 264 },
            amp: -40,
            speed: 1.4,
            phase: 2.2,
            band: 18,
            width: 30,
            color: "#ffbe76",
            targetDock: "east",
          },
          {
            id: "east-up",
            start: { x: 774, y: 266 },
            end: { x: 730, y: 194 },
            control: { x: 796, y: 194 },
            amp: -24,
            speed: 1.8,
            phase: 3.4,
            band: 15,
            width: 26,
            color: "#ffd97b",
            targetDock: "northeast",
          },
        ];

        const spotlightsTemplate = [
          {
            x: 84,
            y: 58,
            base: 0.86,
            sweep: 0.54,
            speed: 0.6,
            phase: 0.0,
            spread: 0.28,
            range: 510,
            strength: 1.0,
            tint: "rgba(123, 240, 255, 0.16)",
          },
          {
            x: 876,
            y: 58,
            base: 2.3,
            sweep: 0.54,
            speed: 0.64,
            phase: 1.8,
            spread: 0.28,
            range: 510,
            strength: 1.0,
            tint: "rgba(255, 188, 118, 0.16)",
          },
          {
            x: 480,
            y: 584,
            base: -1.72,
            sweep: 0.24,
            speed: 0.48,
            phase: 0.8,
            spread: 0.22,
            range: 420,
            strength: 0.82,
            tint: "rgba(255, 120, 104, 0.12)",
          },
        ];

        const state = {
          mode: "menu",
          elapsed: 0,
          lastRunTime: 0,
          heat: 18,
          exposure: 0,
          shake: 0,
          flash: 0,
          touchUi:
            (window.matchMedia && window.matchMedia("(hover: none), (pointer: coarse)").matches) ||
            window.innerWidth < 900,
          keyboard: { up: false, down: false, left: false, right: false },
          movePad: {
            active: false,
            pointerId: null,
            cx: 116,
            cy: 486,
            vx: 0,
            vy: 0,
          },
          lastTap: { time: 0, x: 0, y: 0 },
          stitch: null,
          popups: [],
          sparks: [],
          player: { x: 480, y: 418, vx: 0, vy: 0, heading: -Math.PI / 2, r: 11 },
          altars: [],
          links: [],
          spotlights: [],
        };

        let animationFrame = 0;
        let lastTimestamp = 0;
        let readyReported = false;
        let failedReported = false;
        let clearedReported = false;

        function clamp(v, min, max) {
          return Math.max(min, Math.min(max, v));
        }

        function lerp(a, b, t) {
          return a + (b - a) * t;
        }

        function dist(ax, ay, bx, by) {
          return Math.hypot(ax - bx, ay - by);
        }

        function angleDiff(a, b) {
          let diff = a - b;
          while (diff > Math.PI) diff -= TAU;
          while (diff < -Math.PI) diff += TAU;
          return diff;
        }

        function litAltars() {
          let count = 0;
          for (const altar of state.altars) {
            if (altar.lit) count += 1;
          }
          return count;
        }

        function toView(clientX, clientY) {
          const rect = canvas.getBoundingClientRect();
          return {
            x: ((clientX - rect.left) / rect.width) * VIEW_W,
            y: ((clientY - rect.top) / rect.height) * VIEW_H,
          };
        }

        function cloneAltars() {
          return altarsTemplate.map((altar) => ({
            id: altar.id,
            x: altar.x,
            y: altar.y,
            dock: altar.dock,
            color: altar.color,
            label: altar.label,
            lit: false,
          }));
        }

        function cloneLinks() {
          return linksTemplate.map((link) => ({
            id: link.id,
            start: { x: link.start.x, y: link.start.y },
            end: { x: link.end.x, y: link.end.y },
            control: { x: link.control.x, y: link.control.y },
            amp: link.amp,
            speed: link.speed,
            phase: link.phase,
            band: link.band,
            width: link.width,
            color: link.color,
            targetDock: link.targetDock,
            active: false,
            sealed: false,
            burn: 0,
            path: null,
          }));
        }

        function cloneSpotlights() {
          return spotlightsTemplate.map((spot) => ({
            x: spot.x,
            y: spot.y,
            base: spot.base,
            sweep: spot.sweep,
            speed: spot.speed,
            phase: spot.phase,
            spread: spot.spread,
            range: spot.range,
            strength: spot.strength,
            tint: spot.tint,
          }));
        }

        function pointInRoundedRect(px, py, dock) {
          const dx = Math.abs(px - dock.x);
          const dy = Math.abs(py - dock.y);
          const hx = dock.w / 2;
          const hy = dock.h / 2;
          if (dx > hx || dy > hy) return false;
          if (dx <= hx - dock.r || dy <= hy - dock.r) return true;
          const qx = dx - (hx - dock.r);
          const qy = dy - (hy - dock.r);
          return qx * qx + qy * qy <= dock.r * dock.r;
        }

        function bezier(link, t) {
          const litBoost = 1 + litAltars() * 0.06;
          const offset = Math.sin(state.elapsed * link.speed * litBoost + link.phase) * link.amp;
          const dx = link.end.x - link.start.x;
          const dy = link.end.y - link.start.y;
          const len = Math.max(1, Math.hypot(dx, dy));
          const px = -dy / len;
          const py = dx / len;
          const cx = link.control.x + px * offset;
          const cy = link.control.y + py * offset;
          const inv = 1 - t;
          return {
            x: inv * inv * link.start.x + 2 * inv * t * cx + t * t * link.end.x,
            y: inv * inv * link.start.y + 2 * inv * t * cy + t * t * link.end.y,
          };
        }

        function sampleCurve(link, count) {
          const points = [];
          for (let i = 0; i <= count; i += 1) {
            const t = i / count;
            const p = bezier(link, t);
            p.t = t;
            points.push(p);
          }
          return points;
        }

        function nearestOnCurve(link, x, y) {
          const points = sampleCurve(link, 30);
          let best = null;
          for (const point of points) {
            const d = dist(point.x, point.y, x, y);
            if (!best || d < best.d) {
              best = { x: point.x, y: point.y, t: point.t, d };
            }
          }
          return best;
        }

        function distanceToPath(point, path) {
          if (!path || path.length < 2) return Infinity;
          let best = Infinity;
          for (let i = 0; i < path.length - 1; i += 1) {
            const a = path[i];
            const b = path[i + 1];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const lenSq = dx * dx + dy * dy || 1;
            const t = clamp(((point.x - a.x) * dx + (point.y - a.y) * dy) / lenSq, 0, 1);
            const px = a.x + dx * t;
            const py = a.y + dy * t;
            best = Math.min(best, dist(point.x, point.y, px, py));
          }
          return best;
        }

        function dockById(id) {
          for (const dock of docks) {
            if (dock.id === id) return dock;
          }
          return null;
        }

        function isWalkable(x, y) {
          for (const dock of docks) {
            if (pointInRoundedRect(x, y, dock)) return true;
          }
          for (const link of state.links) {
            if (link.active && link.path && distanceToPath({ x, y }, link.path) <= link.width * 0.5) {
              return true;
            }
          }
          return false;
        }

        function coolingAt(x, y) {
          const center = dockById("center");
          if (!pointInRoundedRect(x, y, center)) return 0;
          const a = clamp(1 - dist(x, y, 438, 418) / 50, 0, 1);
          const b = clamp(1 - dist(x, y, 522, 418) / 50, 0, 1);
          return Math.max(a, b);
        }

        function lightAt(x, y) {
          let best = 0;
          const boost = 1 + litAltars() * 0.08;
          for (const spot of state.spotlights) {
            const dx = x - spot.x;
            const dy = y - spot.y;
            const radius = Math.hypot(dx, dy);
            if (radius > spot.range) continue;
            const angle = Math.atan2(dy, dx);
            const facing = spot.base + Math.sin(state.elapsed * spot.speed * boost + spot.phase) * spot.sweep;
            const diff = Math.abs(angleDiff(angle, facing));
            if (diff > spot.spread * 1.45) continue;
            const radial = 1 - radius / spot.range;
            const angular = 1 - diff / (spot.spread * 1.45);
            best = Math.max(best, Math.pow(radial, 1.6) * Math.pow(angular, 2.1) * spot.strength);
          }
          return clamp(best, 0, 1);
        }

        function addPopup(text, x, y, color) {
          state.popups.push({
            text,
            x,
            y,
            color,
            life: 1,
          });
        }

        function addSpark(x, y, color) {
          state.sparks.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 120,
            vy: (Math.random() - 0.5) * 120,
            color,
            life: 0.7,
          });
        }

        function resetWorld() {
          state.mode = "menu";
          state.elapsed = 0;
          state.lastRunTime = 0;
          state.heat = 18;
          state.exposure = 0;
          state.shake = 0;
          state.flash = 0;
          state.movePad.active = false;
          state.movePad.pointerId = null;
          state.movePad.vx = 0;
          state.movePad.vy = 0;
          state.stitch = null;
          state.popups = [];
          state.sparks = [];
          state.player.x = 480;
          state.player.y = 418;
          state.player.vx = 0;
          state.player.vy = 0;
          state.player.heading = -Math.PI / 2;
          state.altars = cloneAltars();
          state.links = cloneLinks();
          state.spotlights = cloneSpotlights();
          window.relayStageResult.status = "running";
          failedReported = false;
          clearedReported = false;
        }

        function inRelayHost() {
          try {
            return window.parent && window.parent !== window && window.parent.RelayHost;
          } catch (error) {
            return false;
          }
        }

        function reportReady() {
          if (!inRelayHost() || readyReported) return;
          readyReported = true;
          window.parent.RelayHost.onStageReady && window.parent.RelayHost.onStageReady(window.relayStageMeta);
        }

        function reportFail(reason) {
          if (!inRelayHost() || failedReported) return;
          failedReported = true;
          window.parent.RelayHost.onStageFailed &&
            window.parent.RelayHost.onStageFailed({
              stageId: window.relayStageMeta.id,
              stageTitle: window.relayStageMeta.title,
              reason,
              durationSec: Number(state.lastRunTime.toFixed(1)),
            });
        }

        function reportClear() {
          if (!inRelayHost() || clearedReported) return;
          clearedReported = true;
          window.parent.RelayHost.onStageCleared &&
            window.parent.RelayHost.onStageCleared({
              stageId: window.relayStageMeta.id,
              stageTitle: window.relayStageMeta.title,
              clearCountAfter: relayContext.clearCount + 1,
              durationSec: Number(state.lastRunTime.toFixed(1)),
            });
        }

        function startStage() {
          resetWorld();
          state.mode = "running";
          addPopup("Shadow Stitch", 480, 116, "#7bf0ff");
        }

        function failStage(reason) {
          if (state.mode !== "running") return;
          state.mode = "failed";
          state.lastRunTime = state.elapsed;
          state.shake = 0.7;
          state.flash = 0.5;
          window.relayStageResult.status = "failed";
          addPopup(reason === "thread_burn" ? "THREAD BURN" : "OVERHEAT", 480, 124, "#ff8d8d");
          reportFail(reason);
        }

        function clearStage() {
          if (state.mode !== "running") return;
          state.mode = "cleared";
          state.lastRunTime = state.elapsed;
          state.flash = 0.35;
          window.relayStageResult.status = "cleared";
          addPopup("ALL ALTARS LIT", 480, 124, "#d8ffe0");
          reportClear();
        }

        function moveIntent() {
          let x = 0;
          let y = 0;
          if (state.keyboard.left) x -= 1;
          if (state.keyboard.right) x += 1;
          if (state.keyboard.up) y -= 1;
          if (state.keyboard.down) y += 1;
          x += state.movePad.vx;
          y += state.movePad.vy;
          const mag = Math.hypot(x, y);
          if (mag < 0.001) return { x: 0, y: 0, mag: 0 };
          return { x: x / mag, y: y / mag, mag: Math.min(1, mag) };
        }

        function stitchTolerance() {
          return lerp(24, 14, state.heat / 100);
        }

        function beginStitch(pointerId, link, fromEnd) {
          state.stitch = {
            pointerId,
            linkId: link.id,
            fromEnd,
            progress: 0,
          };
          addPopup("SEAM LOCK", state.player.x, state.player.y - 18, link.color);
        }

        function cancelStitch(penalty) {
          if (!state.stitch) return;
          if (penalty) {
            state.heat = clamp(state.heat + 4, 0, 100);
            addPopup("SLIP", state.player.x, state.player.y - 18, "#ffb37b");
          }
          state.stitch = null;
        }

        function linkById(id) {
          for (const link of state.links) {
            if (link.id === id) return link;
          }
          return null;
        }

        function commitStitch(link) {
          link.active = true;
          link.burn = 0;
          link.path = sampleCurve(link, 30);
          state.stitch = null;
          state.heat = clamp(state.heat + 8, 0, 100);
          addPopup("BRIDGE FORMED", (link.start.x + link.end.x) / 2, (link.start.y + link.end.y) / 2, link.color);
          for (let i = 0; i < 12; i += 1) {
            addSpark((link.start.x + link.end.x) / 2, (link.start.y + link.end.y) / 2, link.color);
          }
        }

        function findAnchor(point) {
          for (const link of state.links) {
            if (link.sealed) continue;
            const nearStart = dist(point.x, point.y, link.start.x, link.start.y) <= 30;
            const nearEnd = dist(point.x, point.y, link.end.x, link.end.y) <= 30;
            const playerStart = dist(state.player.x, state.player.y, link.start.x, link.start.y) <= 48;
            const playerEnd = dist(state.player.x, state.player.y, link.end.x, link.end.y) <= 48;
            if (nearStart && playerStart) return { link, fromEnd: false };
            if (nearEnd && playerEnd) return { link, fromEnd: true };
          }
          return null;
        }

        function updateStitch(point) {
          if (!state.stitch) return;
          const link = linkById(state.stitch.linkId);
          if (!link) return;
          const nearest = nearestOnCurve(link, point.x, point.y);
          const oriented = state.stitch.fromEnd ? 1 - nearest.t : nearest.t;
          const target = state.stitch.fromEnd ? link.start : link.end;
          if (nearest.d <= stitchTolerance() && oriented >= state.stitch.progress - 0.08) {
            state.stitch.progress = Math.max(state.stitch.progress, oriented);
            if (dist(point.x, point.y, target.x, target.y) <= 30 && state.stitch.progress >= 0.93) {
              commitStitch(link);
            }
          } else {
            cancelStitch(true);
          }
        }

        function cutThread() {
          if (state.mode !== "running") return false;
          let best = null;
          for (const link of state.links) {
            if (!link.active || link.sealed || !link.path) continue;
            const d = distanceToPath(state.player, link.path);
            if (!best || d < best.d) best = { link, d };
          }
          if (!best || best.d < 12) {
            addPopup("ANCHOR FIRST", state.player.x, state.player.y - 18, "#ffbf84");
            return false;
          }
          best.link.active = false;
          best.link.path = null;
          best.link.burn = 0;
          state.heat = clamp(state.heat - 7, 0, 100);
          addPopup("CUT", state.player.x, state.player.y - 18, "#ffbf84");
          return true;
        }

        function updateMovePad(point) {
          const dx = point.x - state.movePad.cx;
          const dy = point.y - state.movePad.cy;
          const mag = Math.min(1, Math.hypot(dx, dy) / 62);
          const angle = Math.atan2(dy, dx);
          state.movePad.vx = Math.cos(angle) * mag;
          state.movePad.vy = Math.sin(angle) * mag;
        }

        function updatePlayer(dt) {
          const intent = moveIntent();
          const cooling = coolingAt(state.player.x, state.player.y);
          const light = lightAt(state.player.x, state.player.y);
          const speed = lerp(164, 126, state.heat / 100);

          state.player.vx = lerp(state.player.vx, intent.x * speed * intent.mag, 0.2);
          state.player.vy = lerp(state.player.vy, intent.y * speed * intent.mag, 0.2);

          const nextX = state.player.x + state.player.vx * dt;
          const nextY = state.player.y + state.player.vy * dt;
          if (isWalkable(nextX, state.player.y)) state.player.x = nextX;
          else state.player.vx *= 0.15;
          if (isWalkable(state.player.x, nextY)) state.player.y = nextY;
          else state.player.vy *= 0.15;

          if (Math.hypot(state.player.vx, state.player.vy) > 5) {
            state.player.heading = Math.atan2(state.player.vy, state.player.vx);
          }

          const moving = Math.hypot(state.player.vx, state.player.vy) / speed;
          const stitchTax = state.stitch ? 18 : 0;
          const bridgeTax = isWalkable(state.player.x, state.player.y) && !pointInRoundedRect(state.player.x, state.player.y, dockById("center")) ? 4 : 0;
          const cool = cooling > 0 ? 26 + cooling * 20 : light < 0.35 && moving < 0.15 ? 8 : 3;
          state.heat = clamp(state.heat + (moving * 14 + stitchTax + light * 24 + bridgeTax - cool) * dt, 0, 100);

          if (light > 0.72) state.exposure = clamp(state.exposure + dt * (0.52 + light), 0, 3);
          else state.exposure = clamp(state.exposure - dt * (0.82 + cooling * 0.6), 0, 3);

          if (cooling > 0.2 && Math.random() < 0.2) addSpark(state.player.x, state.player.y, "#d9fbff");
          if (state.heat >= 100) failStage("overheat");
          if (state.exposure >= 1.85) failStage("thread_burn");
        }

        function updateLinks(dt) {
          for (const link of state.links) {
            if (!link.active || link.sealed || !link.path) continue;
            let light = 0;
            for (let i = 0; i < link.path.length; i += 5) {
              const point = link.path[i];
              light = Math.max(light, lightAt(point.x, point.y));
            }
            if (light > 0.72) {
              link.burn = clamp(link.burn + dt * (0.46 + light), 0, 1.2);
              if (Math.random() < 0.18) addSpark(link.path[15].x, link.path[15].y, "#ff8d76");
            } else {
              link.burn = clamp(link.burn - dt * 0.24, 0, 1.2);
            }
            if (link.burn >= 1) {
              failStage("thread_burn");
              return;
            }
          }
        }

        function updateAltars() {
          for (const altar of state.altars) {
            if (altar.lit) continue;
            if (dist(state.player.x, state.player.y, altar.x, altar.y) <= 34) {
              altar.lit = true;
              for (const link of state.links) {
                if (link.targetDock === altar.dock && link.active) {
                  link.sealed = true;
                  link.burn = 0;
                }
              }
              state.heat = clamp(state.heat - 10, 0, 100);
              state.exposure = clamp(state.exposure - 0.35, 0, 3);
              addPopup("ALTAR ON", altar.x, altar.y - 24, altar.color);
              for (let i = 0; i < 16; i += 1) addSpark(altar.x, altar.y, altar.color);
              if (litAltars() >= 4) {
                clearStage();
              }
            }
          }
        }

        function updateFx(dt) {
          state.shake = Math.max(0, state.shake - dt * 1.8);
          state.flash = Math.max(0, state.flash - dt);
          state.popups = state.popups.filter((popup) => {
            popup.life -= dt;
            popup.y -= dt * 18;
            return popup.life > 0;
          });
          state.sparks = state.sparks.filter((spark) => {
            spark.life -= dt;
            spark.x += spark.vx * dt;
            spark.y += spark.vy * dt;
            spark.vy += 40 * dt;
            return spark.life > 0;
          });
        }

        function update(dt) {
          updateFx(dt);
          if (state.mode !== "running") return;
          state.elapsed += dt;
          updatePlayer(dt);
          if (state.mode !== "running") return;
          updateLinks(dt);
          if (state.mode !== "running") return;
          updateAltars();
        }

        function roundedRect(x, y, w, h, r) {
          const left = x - w / 2;
          const top = y - h / 2;
          const right = left + w;
          const bottom = top + h;
          ctx.beginPath();
          ctx.moveTo(left + r, top);
          ctx.arcTo(right, top, right, bottom, r);
          ctx.arcTo(right, bottom, left, bottom, r);
          ctx.arcTo(left, bottom, left, top, r);
          ctx.arcTo(left, top, right, top, r);
          ctx.closePath();
        }

        function panel(x, y, w, h) {
          ctx.fillStyle = "rgba(7, 14, 24, 0.84)";
          roundedRect(x + w / 2, y + h / 2, w, h, 18);
          ctx.fill();
          ctx.strokeStyle = "rgba(190, 238, 255, 0.12)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        function drawBackground() {
          const sky = ctx.createLinearGradient(0, 0, 0, VIEW_H);
          sky.addColorStop(0, "#0a1523");
          sky.addColorStop(0.5, "#06111c");
          sky.addColorStop(1, "#04080d");
          ctx.fillStyle = sky;
          ctx.fillRect(0, 0, VIEW_W, VIEW_H);

          ctx.fillStyle = "#0a1928";
          ctx.fillRect(0, 246, VIEW_W, 354);

          ctx.fillStyle = "#09131f";
          const buildings = [
            [0, 184, 70, 62],
            [66, 164, 40, 82],
            [146, 152, 86, 94],
            [268, 184, 72, 62],
            [378, 168, 88, 78],
            [516, 152, 92, 94],
            [654, 182, 80, 64],
            [774, 166, 72, 80],
            [856, 188, 88, 58],
          ];
          for (const item of buildings) {
            ctx.fillRect(item[0], item[1], item[2], item[3]);
          }

          ctx.strokeStyle = "rgba(132, 220, 255, 0.1)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(84, 56);
          ctx.lineTo(84, 248);
          ctx.moveTo(876, 56);
          ctx.lineTo(876, 248);
          ctx.stroke();

          ctx.strokeStyle = "rgba(120, 200, 232, 0.06)";
          for (let row = 0; row < 6; row += 1) {
            const y = 274 + row * 48;
            ctx.beginPath();
            for (let x = -20; x <= VIEW_W + 20; x += 24) {
              const wave = Math.sin(x * 0.02 + state.elapsed * 1.1 + row) * 3;
              if (x === -20) ctx.moveTo(x, y + wave);
              else ctx.lineTo(x, y + wave);
            }
            ctx.stroke();
          }
        }

        function drawSpotlights() {
          const boost = 1 + litAltars() * 0.08;
          for (const spot of state.spotlights) {
            const angle = spot.base + Math.sin(state.elapsed * spot.speed * boost + spot.phase) * spot.sweep;
            ctx.beginPath();
            ctx.moveTo(spot.x, spot.y);
            ctx.lineTo(spot.x + Math.cos(angle - spot.spread) * spot.range, spot.y + Math.sin(angle - spot.spread) * spot.range);
            ctx.arc(spot.x, spot.y, spot.range, angle - spot.spread, angle + spot.spread);
            ctx.closePath();
            ctx.fillStyle = spot.tint;
            ctx.fill();
          }
        }

        function drawDocks() {
          for (const dock of docks) {
            const grad = ctx.createLinearGradient(0, dock.y - dock.h / 2, 0, dock.y + dock.h / 2);
            grad.addColorStop(0, "#183244");
            grad.addColorStop(1, "#0d1f2d");
            ctx.fillStyle = grad;
            roundedRect(dock.x, dock.y, dock.w, dock.h, dock.r);
            ctx.fill();
            ctx.strokeStyle = "rgba(188, 240, 255, 0.12)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }

          for (const vent of [
            [438, 418],
            [522, 418],
          ]) {
            ctx.beginPath();
            ctx.arc(vent[0], vent[1], 22, 0, TAU);
            ctx.fillStyle = "rgba(12, 34, 46, 0.95)";
            ctx.fill();
            ctx.strokeStyle = "rgba(188, 242, 255, 0.22)";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }

        function drawLinkHints() {
          for (const link of state.links) {
            if (link.sealed || link.active) continue;
            const points = sampleCurve(link, 24);
            const near =
              dist(state.player.x, state.player.y, link.start.x, link.start.y) < 90 ||
              dist(state.player.x, state.player.y, link.end.x, link.end.y) < 90 ||
              (state.stitch && state.stitch.linkId === link.id);
            ctx.strokeStyle = near ? link.color : "rgba(255,255,255,0.14)";
            ctx.lineWidth = near ? 4 : 3;
            ctx.setLineDash([7, 10]);
            ctx.lineDashOffset = -state.elapsed * 50;
            ctx.beginPath();
            points.forEach((point, index) => {
              if (index === 0) ctx.moveTo(point.x, point.y);
              else ctx.lineTo(point.x, point.y);
            });
            ctx.stroke();
            ctx.setLineDash([]);

            for (const anchor of [link.start, link.end]) {
              ctx.beginPath();
              ctx.arc(anchor.x, anchor.y, 9, 0, TAU);
              ctx.fillStyle = "#08131d";
              ctx.fill();
              ctx.strokeStyle = link.color;
              ctx.lineWidth = 2;
              ctx.stroke();
            }
          }
        }

        function drawBridges() {
          for (const link of state.links) {
            if (!link.active || !link.path) continue;
            ctx.strokeStyle = "rgba(0,0,0,0.28)";
            ctx.lineWidth = link.width + 8;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            link.path.forEach((point, index) => {
              if (index === 0) ctx.moveTo(point.x, point.y);
              else ctx.lineTo(point.x, point.y);
            });
            ctx.stroke();

            ctx.strokeStyle = link.sealed ? "#effcff" : link.color;
            ctx.lineWidth = link.width;
            ctx.beginPath();
            link.path.forEach((point, index) => {
              if (index === 0) ctx.moveTo(point.x, point.y);
              else ctx.lineTo(point.x, point.y);
            });
            ctx.stroke();

            if (!link.sealed && link.burn > 0.08) {
              ctx.strokeStyle = "rgba(255, 120, 96, 0.5)";
              ctx.lineWidth = 6 + link.burn * 8;
              ctx.beginPath();
              link.path.forEach((point, index) => {
                if (index === 0) ctx.moveTo(point.x, point.y);
                else ctx.lineTo(point.x, point.y);
              });
              ctx.stroke();
            }
          }
        }

        function drawStitch() {
          if (!state.stitch) return;
          const link = linkById(state.stitch.linkId);
          if (!link) return;
          const points = sampleCurve(link, 28);
          const ordered = state.stitch.fromEnd ? points.slice().reverse() : points;
          const count = Math.max(2, Math.floor(state.stitch.progress * (ordered.length - 1)) + 1);
          ctx.strokeStyle = "#f5fcff";
          ctx.lineWidth = link.width - 10;
          ctx.lineCap = "round";
          ctx.beginPath();
          ordered.slice(0, count).forEach((point, index) => {
            if (index === 0) ctx.moveTo(point.x, point.y);
            else ctx.lineTo(point.x, point.y);
          });
          ctx.stroke();
        }

        function drawAltars() {
          for (const altar of state.altars) {
            ctx.beginPath();
            ctx.arc(altar.x, altar.y + 18, 18, 0, TAU);
            ctx.strokeStyle = altar.lit ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.14)";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(altar.x, altar.y - 20);
            ctx.lineTo(altar.x + 11, altar.y + 4);
            ctx.lineTo(altar.x, altar.y + 16);
            ctx.lineTo(altar.x - 11, altar.y + 4);
            ctx.closePath();
            ctx.fillStyle = altar.lit ? altar.color : "rgba(171, 190, 205, 0.44)";
            ctx.fill();

            ctx.fillStyle = altar.lit ? "#05111b" : "rgba(255,255,255,0.78)";
            ctx.font = "800 10px Avenir Next, Pretendard Variable, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(altar.label, altar.x, altar.y + 3);
          }
        }

        function drawPlayer() {
          ctx.save();
          ctx.translate(state.player.x, state.player.y);
          ctx.rotate(state.player.heading + Math.PI / 2);

          ctx.beginPath();
          ctx.ellipse(0, 12, 14, 8, 0, 0, TAU);
          ctx.fillStyle = "rgba(0,0,0,0.35)";
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(0, -12);
          ctx.quadraticCurveTo(14, 2, 8, 18);
          ctx.lineTo(0, 14);
          ctx.lineTo(-8, 18);
          ctx.quadraticCurveTo(-14, 2, 0, -12);
          ctx.closePath();
          ctx.fillStyle = lightAt(state.player.x, state.player.y) > 0.6 ? "#6b3838" : "#152739";
          ctx.fill();

          ctx.beginPath();
          ctx.arc(0, -8, 7, 0, TAU);
          ctx.fillStyle = "#f7efe8";
          ctx.fill();
          ctx.restore();
        }

        function drawFx() {
          for (const spark of state.sparks) {
            ctx.globalAlpha = spark.life / 0.7;
            ctx.fillStyle = spark.color;
            ctx.beginPath();
            ctx.arc(spark.x, spark.y, 2.4, 0, TAU);
            ctx.fill();
          }
          ctx.globalAlpha = 1;

          for (const popup of state.popups) {
            ctx.globalAlpha = popup.life;
            ctx.fillStyle = popup.color;
            ctx.font = "800 14px Avenir Next, Pretendard Variable, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(popup.text, popup.x, popup.y);
          }
          ctx.globalAlpha = 1;
        }

        function drawHud() {
          panel(26, 20, 312, 92);
          ctx.fillStyle = "#f4fbff";
          ctx.textAlign = "left";
          ctx.font = "800 18px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillText("MIDNIGHT HARBOR", 44, 46);
          ctx.font = "600 12px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillStyle = "rgba(214, 236, 247, 0.74)";
          ctx.fillText("shadow seam bridge / heat cadence", 44, 64);

          ctx.fillStyle = "rgba(255,255,255,0.1)";
          ctx.fillRect(44, 78, 136, 12);
          ctx.fillRect(196, 78, 116, 12);

          const heatWidth = 136 * clamp(state.heat / 100, 0, 1);
          const burnWidth = 116 * clamp((state.exposure * 54) / 100, 0, 1);
          const heatGrad = ctx.createLinearGradient(44, 0, 180, 0);
          heatGrad.addColorStop(0, "#69dfff");
          heatGrad.addColorStop(0.55, "#ffbb69");
          heatGrad.addColorStop(1, "#ff6f6f");
          ctx.fillStyle = heatGrad;
          ctx.fillRect(44, 78, heatWidth, 12);

          const burnGrad = ctx.createLinearGradient(196, 0, 312, 0);
          burnGrad.addColorStop(0, "#7bf0ff");
          burnGrad.addColorStop(1, "#fff2b4");
          ctx.fillStyle = burnGrad;
          ctx.fillRect(196, 78, burnWidth, 12);

          ctx.font = "700 11px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillStyle = "rgba(246,251,255,0.78)";
          ctx.fillText("HEAT", 44, 73);
          ctx.fillText("BURN", 196, 73);

          panel(694, 20, 238, 92);
          ctx.fillStyle = "#f4fbff";
          ctx.font = "800 13px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillText("ALTARS", 712, 46);
          ctx.font = "600 12px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillStyle = "rgba(214, 236, 247, 0.74)";
          ctx.fillText(`${litAltars()} / 4 lit`, 712, 64);
          for (let i = 0; i < state.altars.length; i += 1) {
            const altar = state.altars[i];
            const x = 714 + i * 54;
            ctx.beginPath();
            ctx.arc(x + 14, 84, 14, 0, TAU);
            ctx.fillStyle = altar.lit ? altar.color : "rgba(255,255,255,0.08)";
            ctx.fill();
            ctx.strokeStyle = altar.lit ? "rgba(255,255,255,0.55)" : "rgba(255,255,255,0.14)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = altar.lit ? "#04111b" : "rgba(255,255,255,0.78)";
            ctx.font = "800 9px Avenir Next, Pretendard Variable, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(altar.label, x + 14, 87);
          }

          ctx.fillStyle = "rgba(238,247,255,0.74)";
          ctx.font = "700 12px Avenir Next, Pretendard Variable, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(`elapsed ${state.elapsed.toFixed(1)}s`, 480, 34);
        }

        function drawTouchPad() {
          if (!state.touchUi || state.mode !== "running") return;
          ctx.beginPath();
          ctx.arc(state.movePad.cx, state.movePad.cy, 76, 0, TAU);
          ctx.fillStyle = "rgba(8, 16, 24, 0.82)";
          ctx.fill();
          ctx.strokeStyle = "rgba(190, 244, 255, 0.14)";
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(state.movePad.cx + state.movePad.vx * 38, state.movePad.cy + state.movePad.vy * 38, 22, 0, TAU);
          ctx.fillStyle = "rgba(220, 248, 255, 0.86)";
          ctx.fill();

          ctx.fillStyle = "rgba(238,247,255,0.74)";
          ctx.font = "700 11px Avenir Next, Pretendard Variable, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("MOVE", state.movePad.cx, state.movePad.cy + 102);
          ctx.fillText("Double tap = cut", VIEW_W - 118, VIEW_H - 26);
        }

        function overlay(title, accent, lines, footer) {
          panel(186, 126, 588, 346);
          ctx.fillStyle = accent;
          ctx.fillRect(212, 158, 120, 6);
          ctx.fillStyle = "#f8fbff";
          ctx.textAlign = "left";
          ctx.font = "800 34px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillText(title, 212, 208);
          ctx.font = "600 17px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillStyle = "rgba(220,236,246,0.9)";
          for (let i = 0; i < lines.length; i += 1) {
            ctx.fillText(lines[i], 212, 250 + i * 30);
          }
          ctx.font = "700 13px Avenir Next, Pretendard Variable, sans-serif";
          ctx.fillStyle = "rgba(190,216,230,0.76)";
          for (let i = 0; i < footer.length; i += 1) {
            ctx.fillText(footer[i], 212, 390 + i * 22);
          }
        }

        function drawOverlay() {
          if (state.mode === "menu") {
            overlay(
              TITLE,
              "#7bf0ff",
              [
                "포스트에서 포스트로 움직이는 빛 경계를 드래그해 그림자 다리를 만드세요.",
                "실을 너무 오래 밝은 탐조등에 두면 타 버리고, 강한 행동은 과열을 끌어올립니다.",
                "중앙 분무 구역에서 짧게 식힌 뒤 다음 봉합으로 넘어가야 네 제단을 모두 밝힐 수 있습니다.",
              ],
              [
                `조작: ${CONTROLS}`,
                `클리어: ${CLEAR_TEXT}`,
                `실패: ${FAIL_TEXT}`,
                "터치 또는 Enter로 시작",
              ]
            );
          } else if (state.mode === "failed") {
            overlay(
              "THREAD LOST",
              "#ff8d7c",
              [
                "과열이 폭주했거나 강한 빛에 실이 오래 노출됐습니다.",
                "탐조등이 겹치기 전에는 실을 끊고, 중앙 분무 구역에서 열을 정리하세요.",
              ],
              [
                `생존 시간 ${state.lastRunTime.toFixed(1)}초`,
                `점등한 제단 ${litAltars()} / 4`,
                "터치 또는 Enter로 재시작",
              ]
            );
          } else if (state.mode === "cleared") {
            overlay(
              "HARBOR LIT",
              "#caffdf",
              [
                "그림자 봉합이 네 제단을 모두 점등했습니다.",
                "빛과 열의 리듬을 끝까지 제어하며 항만을 건넜습니다.",
              ],
              [
                `클리어 시간 ${state.lastRunTime.toFixed(1)}초`,
                "이 스테이지는 RelayHost에 클리어를 보고합니다.",
              ]
            );
          }
        }

        function render() {
          const shake = state.shake > 0 ? (Math.random() - 0.5) * state.shake * 8 : 0;
          ctx.save();
          ctx.clearRect(0, 0, VIEW_W, VIEW_H);
          ctx.translate(shake, shake);
          drawBackground();
          drawSpotlights();
          drawDocks();
          drawLinkHints();
          drawBridges();
          drawStitch();
          drawAltars();
          drawPlayer();
          drawFx();
          drawHud();
          drawTouchPad();
          if (state.flash > 0) {
            ctx.fillStyle = `rgba(255, 215, 208, ${state.flash * 0.12})`;
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);
          }
          if (state.mode !== "running") {
            ctx.fillStyle = "rgba(0,0,0,0.32)";
            ctx.fillRect(0, 0, VIEW_W, VIEW_H);
            drawOverlay();
          }
          ctx.restore();
        }

        function frame(timestamp) {
          if (!lastTimestamp) lastTimestamp = timestamp;
          const dt = Math.min(0.05, (timestamp - lastTimestamp) / 1000);
          lastTimestamp = timestamp;
          update(dt);
          render();
          animationFrame = requestAnimationFrame(frame);
        }

        function advanceTime(ms) {
          const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
          for (let i = 0; i < steps; i += 1) update(FIXED_DT);
          render();
          return renderGameToText();
        }

        function handlePointerDown(event) {
          const point = toView(event.clientX, event.clientY);
          if (state.mode === "menu") {
            startStage();
            return;
          }
          if (state.mode === "failed" || state.mode === "cleared") {
            startStage();
            return;
          }

          state.touchUi = state.touchUi || event.pointerType === "touch" || event.pointerType === "pen";

          const now = performance.now();
          if (now - state.lastTap.time < 260 && dist(point.x, point.y, state.lastTap.x, state.lastTap.y) < 38) {
            cutThread();
          }
          state.lastTap = { time: now, x: point.x, y: point.y };

          const anchor = findAnchor(point);
          if (anchor && !state.stitch) {
            beginStitch(event.pointerId, anchor.link, anchor.fromEnd);
            return;
          }

          if (
            event.pointerType === "touch" ||
            event.pointerType === "pen" ||
            dist(point.x, point.y, state.movePad.cx, state.movePad.cy) <= 104
          ) {
            state.movePad.active = true;
            state.movePad.pointerId = event.pointerId;
            updateMovePad(point);
          }
        }

        function handlePointerMove(event) {
          const point = toView(event.clientX, event.clientY);
          if (state.movePad.active && state.movePad.pointerId === event.pointerId) {
            updateMovePad(point);
          }
          if (state.stitch && state.stitch.pointerId === event.pointerId) {
            updateStitch(point);
          }
        }

        function handlePointerUp(event) {
          if (state.movePad.pointerId === event.pointerId) {
            state.movePad.active = false;
            state.movePad.pointerId = null;
            state.movePad.vx = 0;
            state.movePad.vy = 0;
          }
          if (state.stitch && state.stitch.pointerId === event.pointerId) {
            cancelStitch(true);
          }
        }

        function handleKey(event, pressed) {
          const key = event.key.toLowerCase();
          if (key === "arrowup" || key === "w") state.keyboard.up = pressed;
          if (key === "arrowdown" || key === "s") state.keyboard.down = pressed;
          if (key === "arrowleft" || key === "a") state.keyboard.left = pressed;
          if (key === "arrowright" || key === "d") state.keyboard.right = pressed;
          if (pressed && (key === "enter" || key === " ")) {
            event.preventDefault();
            if (state.mode !== "running") startStage();
          }
          if (pressed && key === "x") cutThread();
        }

        function renderGameToText() {
          return JSON.stringify({
            coordinate_system: "origin top-left, x right, y down on a 960x600 harbor map",
            mode: state.mode,
            result: window.relayStageResult.status,
            elapsed: Number(state.elapsed.toFixed(2)),
            heat: Number(state.heat.toFixed(1)),
            burn: Number(state.exposure.toFixed(2)),
            player: {
              x: Number(state.player.x.toFixed(1)),
              y: Number(state.player.y.toFixed(1)),
            },
            altars: state.altars.map((altar) => ({
              id: altar.id,
              lit: altar.lit,
              x: altar.x,
              y: altar.y,
            })),
            active_bridges: state.links.filter((link) => link.active).map((link) => ({
              id: link.id,
              sealed: link.sealed,
              burn: Number(link.burn.toFixed(2)),
            })),
            stitch: state.stitch
              ? {
                  linkId: state.stitch.linkId,
                  progress: Number(state.stitch.progress.toFixed(2)),
                }
              : null,
            relay_context: {
              previous_stage_id: relayContext.previousStageId,
              clear_count_before_this_stage: relayContext.clearCount,
              visited_stage_ids: relayContext.history,
            },
            note: DESCRIPTION,
          });
        }

        window.relayStageMeta = {
          id: "midnight-harbor-shadow-stitch-heat",
          title: TITLE,
          creator: "jungcollin",
          genre: GENRE,
          clearCondition: CLEAR_TEXT,
          description: DESCRIPTION,
        };
        window.relayStageResult = { status: "running" };
        window.render_game_to_text = renderGameToText;
        window.advanceTime = advanceTime;
        window.relayStageDebug = {
          forceClear() {
            if (state.mode !== "running") startStage();
            for (const altar of state.altars) altar.lit = true;
            for (const link of state.links) {
              link.active = true;
              link.sealed = true;
              link.path = sampleCurve(link, 30);
            }
            clearStage();
            render();
          },
          forceFail() {
            if (state.mode !== "running") startStage();
            failStage("debug_force_fail");
            render();
          },
        };

        canvas.addEventListener("pointerdown", handlePointerDown);
        canvas.addEventListener("pointermove", handlePointerMove);
        canvas.addEventListener("pointerup", handlePointerUp);
        canvas.addEventListener("pointercancel", handlePointerUp);
        canvas.addEventListener("dblclick", () => {
          cutThread();
        });
        window.addEventListener("keydown", (event) => handleKey(event, true));
        window.addEventListener("keyup", (event) => handleKey(event, false));
        window.addEventListener("blur", () => {
          state.keyboard.up = false;
          state.keyboard.down = false;
          state.keyboard.left = false;
          state.keyboard.right = false;
          state.movePad.active = false;
          state.movePad.pointerId = null;
          state.movePad.vx = 0;
          state.movePad.vy = 0;
          state.stitch = null;
        });

        resetWorld();
        reportReady();
        render();
        animationFrame = requestAnimationFrame(frame);

        window.addEventListener("beforeunload", () => {
          cancelAnimationFrame(animationFrame);
        });
      })();
    </script>
  </body>
</html>
