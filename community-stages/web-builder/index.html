<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>거미줄 건축가</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #e8e0d4; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(140, 120, 100, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 50, 40, 0.92);
        color: #f8f0e8; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #e8e0d4; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(120, 100, 70, 0.6); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">거미줄 건축가. 화면 터치 후 드래그로 앵커 포인트를 연결하여 거미줄을 엮고 벌레를 포획하세요.</p>
    <canvas id="game" width="960" height="540" aria-label="거미줄 건축가" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "web-builder",
        title: "거미줄 건축가",
        description: "앵커 포인트를 연결해 거미줄을 엮고 벌레를 포획하세요",
        creator: "jungcollin",
        genre: "Network building",
        clearCondition: "먹이 10마리를 포획하면 클리어",
        failCondition: "거미줄 5개가 끊어지면 실패",
        controls: "화면 터치 후 드래그로 거미줄을 연결하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        bg1: "#f0e8d8",
        bg2: "#e0d8c8",
        web: "rgba(200, 190, 170, 0.8)",
        webBright: "rgba(220, 210, 190, 0.95)",
        anchor: "#8a7a60",
        anchorHover: "#a08a68",
        bug: "#6a8a50",
        bugDark: "#4a6a38",
        caught: "#c08840",
        broken: "#c06050",
        hud: "#5a4a3a",
        card: "rgba(240, 232, 216, 0.96)",
        accent: "#8a7a50",
        danger: "#c04040",
        success: "#60a050",
        dew: "rgba(180, 210, 230, 0.5)",
      };

      // --- State ---
      const TARGET_CATCH = 10;
      const MAX_BREAKS = 5;
      const DURATION = 40;
      const ANCHOR_COUNT = 12;

      let mode = "menu";
      let elapsed = 0;
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let shake = 0;
      let clearAnim = 0;

      let anchors = [];
      let threads = [];
      let bugs = [];
      let caught = 0;
      let broken = 0;
      let particles = [];
      let dragFrom = null;
      let dragPos = null;
      let spawnTimer = 0;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      function initAnchors() {
        anchors = [];
        // Create anchors in a web-like circular arrangement
        const cx = CX, cy = CY;
        // Center anchor
        anchors.push({ x: cx, y: cy, r: 8 });
        // Inner ring
        for (let i = 0; i < 5; i++) {
          const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
          anchors.push({ x: cx + Math.cos(angle) * 100, y: cy + Math.sin(angle) * 100, r: 7 });
        }
        // Outer ring
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2 - Math.PI / 2 + Math.PI / 6;
          anchors.push({ x: cx + Math.cos(angle) * 200, y: cy + Math.sin(angle) * 200, r: 7 });
        }
      }

      function spawnBug() {
        const side = Math.floor(Math.random() * 4);
        let x, y, vx, vy;
        const speed = 40 + Math.random() * 40;
        if (side === 0) { x = -10; y = rand(50, H - 50); vx = speed; vy = rand(-20, 20); }
        else if (side === 1) { x = W + 10; y = rand(50, H - 50); vx = -speed; vy = rand(-20, 20); }
        else if (side === 2) { x = rand(50, W - 50); y = -10; vx = rand(-20, 20); vy = speed; }
        else { x = rand(50, W - 50); y = H + 10; vx = rand(-20, 20); vy = -speed; }
        bugs.push({
          x, y, vx, vy, r: 6,
          caught: false, catchAnim: 0,
          wingPhase: rand(0, Math.PI * 2),
        });
      }

      function reset() {
        elapsed = 0; shake = 0; clearAnim = 0;
        caught = 0; broken = 0;
        threads = []; bugs = []; particles = [];
        dragFrom = null; dragPos = null;
        spawnTimer = 1;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
        initAnchors();
      }

      // Point-to-line-segment distance
      function pointSegDist(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        const len2 = dx * dx + dy * dy;
        if (len2 === 0) return dist(px, py, ax, ay);
        let t = ((px - ax) * dx + (py - ay) * dy) / len2;
        t = clamp(t, 0, 1);
        return dist(px, py, ax + t * dx, ay + t * dy);
      }

      function spawnCatchParticles(x, y) {
        if (reducedMotion) return;
        for (let i = 0; i < 10; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(30, 80);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, size: rand(2, 5), color: COL.caught,
          });
        }
      }

      function spawnBreakParticles(x, y) {
        if (reducedMotion) return;
        for (let i = 0; i < 8; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(20, 60);
          particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, size: rand(2, 4), color: COL.broken,
          });
        }
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Spawn bugs
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          spawnBug();
          const rate = lerp(2.0, 0.8, clamp(elapsed / DURATION, 0, 1));
          spawnTimer = rate + rand(-0.3, 0.3);
        }

        // Update bugs
        for (let i = bugs.length - 1; i >= 0; i--) {
          const bug = bugs[i];
          if (bug.caught) {
            bug.catchAnim += dt * 3;
            if (bug.catchAnim > 1) bugs.splice(i, 1);
            continue;
          }

          bug.x += bug.vx * dt;
          bug.y += bug.vy * dt;
          bug.wingPhase += dt * 15;

          // Check collision with threads
          let hitThread = -1;
          for (let j = 0; j < threads.length; j++) {
            const th = threads[j];
            const d = pointSegDist(bug.x, bug.y, th.x1, th.y1, th.x2, th.y2);
            if (d < bug.r + 4) {
              hitThread = j;
              break;
            }
          }

          if (hitThread >= 0) {
            bug.caught = true;
            bug.catchAnim = 0;
            caught++;
            spawnCatchParticles(bug.x, bug.y);

            // Thread takes damage - chance to break
            const th = threads[hitThread];
            th.hits = (th.hits || 0) + 1;
            if (th.hits >= 2) {
              spawnBreakParticles((th.x1 + th.x2) / 2, (th.y1 + th.y2) / 2);
              threads.splice(hitThread, 1);
              broken++;
              shake = 5;
            }
          }

          // Remove if off-screen
          if (bug.x < -30 || bug.x > W + 30 || bug.y < -30 || bug.y > H + 30) {
            bugs.splice(i, 1);
          }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.95; p.vy *= 0.95;
          p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88;
        if (shake < 0.3) shake = 0;

        // Win/lose
        if (caught >= TARGET_CATCH) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (broken >= MAX_BREAKS) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("거미줄 파손");
        } else if (elapsed >= DURATION) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("시간 초과");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Background gradient - morning light
        const grad = ctx.createRadialGradient(CX, CY, 50, CX, CY, 400);
        grad.addColorStop(0, COL.bg1);
        grad.addColorStop(1, COL.bg2);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Background branches
        drawBranches();

        if (mode === "running") {
          drawThreads();
          drawDragLine();
          drawAnchors();
          drawBugs();
          drawHUD();
        }

        // Particles
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawBranches() {
        ctx.strokeStyle = "rgba(120, 100, 70, 0.15)";
        ctx.lineWidth = 3;
        // Top-left branch
        ctx.beginPath();
        ctx.moveTo(0, 80); ctx.quadraticCurveTo(120, 100, 200, 50);
        ctx.stroke();
        // Top-right branch
        ctx.beginPath();
        ctx.moveTo(W, 60); ctx.quadraticCurveTo(W - 140, 90, W - 220, 40);
        ctx.stroke();
        // Bottom branches
        ctx.beginPath();
        ctx.moveTo(80, H); ctx.quadraticCurveTo(100, H - 80, 50, H - 140);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(W - 60, H); ctx.quadraticCurveTo(W - 100, H - 90, W - 80, H - 150);
        ctx.stroke();
      }

      function drawThreads() {
        for (const th of threads) {
          const alpha = th.hits ? 0.4 : 0.7;
          ctx.strokeStyle = th.hits ? "rgba(180, 160, 140, 0.4)" : COL.web;
          ctx.lineWidth = th.hits ? 1 : 1.5;
          ctx.beginPath();
          ctx.moveTo(th.x1, th.y1);
          ctx.lineTo(th.x2, th.y2);
          ctx.stroke();

          // Dew drops on threads
          if (!reducedMotion && !th.hits) {
            const mx = (th.x1 + th.x2) / 2;
            const my = (th.y1 + th.y2) / 2;
            ctx.beginPath();
            ctx.arc(mx, my + 2, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = COL.dew;
            ctx.fill();
          }
        }
      }

      function drawDragLine() {
        if (dragFrom === null || dragPos === null) return;
        const a = anchors[dragFrom];
        ctx.strokeStyle = COL.webBright;
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(dragPos.x, dragPos.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawAnchors() {
        for (let i = 0; i < anchors.length; i++) {
          const a = anchors[i];
          ctx.beginPath();
          ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
          ctx.fillStyle = dragFrom === i ? COL.anchorHover : COL.anchor;
          ctx.fill();

          // Highlight ring
          ctx.strokeStyle = "rgba(160, 140, 110, 0.3)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }

      function drawBugs() {
        for (const bug of bugs) {
          ctx.save();
          ctx.translate(bug.x, bug.y);

          if (bug.caught) {
            ctx.globalAlpha = 1 - bug.catchAnim;
            ctx.scale(1 - bug.catchAnim * 0.5, 1 - bug.catchAnim * 0.5);
          }

          // Wings
          const wingAngle = Math.sin(bug.wingPhase) * 0.4;
          ctx.fillStyle = "rgba(180, 200, 160, 0.6)";
          ctx.save();
          ctx.rotate(wingAngle);
          ctx.beginPath();
          ctx.ellipse(-3, -2, 8, 4, -0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          ctx.save();
          ctx.rotate(-wingAngle);
          ctx.beginPath();
          ctx.ellipse(3, -2, 8, 4, 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();

          // Body
          ctx.fillStyle = bug.caught ? COL.caught : COL.bug;
          ctx.beginPath();
          ctx.ellipse(0, 0, 4, 6, 0, 0, Math.PI * 2);
          ctx.fill();

          // Head
          ctx.beginPath();
          ctx.arc(0, -6, 3, 0, Math.PI * 2);
          ctx.fillStyle = COL.bugDark;
          ctx.fill();

          ctx.restore();
        }
      }

      function drawHUD() {
        const timeLeft = Math.max(0, DURATION - elapsed);

        ctx.fillStyle = COL.hud;
        ctx.font = "600 16px Trebuchet MS";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`포획: ${caught}/${TARGET_CATCH}`, 20, 16);

        ctx.textAlign = "center";
        ctx.fillStyle = broken > 3 ? COL.danger : COL.hud;
        ctx.fillText(`끊김: ${broken}/${MAX_BREAKS}`, CX, 16);

        ctx.textAlign = "right";
        ctx.fillStyle = timeLeft < 10 ? COL.danger : COL.hud;
        ctx.fillText(`${Math.ceil(timeLeft)}초`, W - 20, 16);

        // Timer bar
        const barW = W - 40;
        const progress = 1 - elapsed / DURATION;
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.fillRect(20, 38, barW, 3);
        ctx.fillStyle = timeLeft < 10 ? COL.danger : COL.accent;
        ctx.fillRect(20, 38, barW * progress, 3);
      }

      // --- Cards ---
      function roundRect(c, x, y, w, h, r) {
        c.beginPath();
        c.moveTo(x + r, y); c.lineTo(x + w - r, y);
        c.arcTo(x + w, y, x + w, y + r, r);
        c.lineTo(x + w, y + h - r);
        c.arcTo(x + w, y + h, x + w - r, y + h, r);
        c.lineTo(x + r, y + h);
        c.arcTo(x, y + h, x, y + h - r, r);
        c.lineTo(x, y + r);
        c.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;
        ctx.fillStyle = COL.card;
        ctx.beginPath(); roundRect(ctx, cardX, cardY, cardW, cardH, 8); ctx.fill();
        ctx.fillStyle = accent;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);
        ctx.fillStyle = COL.hud;
        ctx.font = "bold 22px Trebuchet MS";
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);
        ctx.font = "400 14px Trebuchet MS";
        ctx.fillStyle = "rgba(90, 74, 58, 0.75)";
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        ctx.fillStyle = "rgba(90, 74, 58, 0.4)";
        ctx.font = "400 13px Trebuchet MS";
        ctx.fillText("탭 또는 ENTER", CX, cardY + cardH - 20);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(232, 224, 212, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("거미줄 건축가", [
          "화면 터치 후 드래그로",
          "앵커를 연결해 거미줄을 엮으세요",
          "",
          "조작: 화면 터치 드래그로 연결",
          "클리어: 먹이 10마리 포획",
          "실패: 줄 5개 끊김 또는 시간 초과",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(232, 224, 212, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("클리어!", [`${Math.ceil(elapsed)}초 만에 완료`, "훌륭한 거미줄을 엮었습니다!"], COL.accent);
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(100, 70, 50, 0.3)";
        ctx.fillRect(0, 0, W, H);
        const reason = broken >= MAX_BREAKS ? "거미줄이 너무 많이 끊어졌습니다" : "시간이 다했습니다";
        drawCard("실패", [reason, `포획: ${caught}/${TARGET_CATCH}`], COL.danger);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return { x: (clientX - rect.left) * (W / rect.width), y: (clientY - rect.top) * (H / rect.height) };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      function findAnchor(x, y) {
        for (let i = 0; i < anchors.length; i++) {
          if (dist(x, y, anchors[i].x, anchors[i].y) < anchors[i].r + 16) return i;
        }
        return -1;
      }

      function threadExists(a, b) {
        return threads.some(th =>
          (th.a === a && th.b === b) || (th.a === b && th.b === a)
        );
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        const idx = findAnchor(p.x, p.y);
        if (idx >= 0) {
          dragFrom = idx;
          dragPos = { x: p.x, y: p.y };
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        if (mode !== "running" || dragFrom === null) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        dragPos = { x: p.x, y: p.y };
      });

      canvas.addEventListener("pointerup", (e) => {
        if (mode !== "running" || dragFrom === null) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        const idx = findAnchor(p.x, p.y);
        if (idx >= 0 && idx !== dragFrom && !threadExists(dragFrom, idx)) {
          const a1 = anchors[dragFrom], a2 = anchors[idx];
          threads.push({
            a: dragFrom, b: idx,
            x1: a1.x, y1: a1.y,
            x2: a2.x, y2: a2.y,
            hits: 0,
          });
        }
        dragFrom = null;
        dragPos = null;
      });

      canvas.addEventListener("pointercancel", () => {
        dragFrom = null; dragPos = null;
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug ---
      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), caught, broken, threads: threads.length, result: window.relayStageResult.status });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          caught = TARGET_CATCH;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared(); draw();
        },
        forceFail() {
          reset(); mode = "running";
          broken = MAX_BREAKS;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail"); draw();
        },
      };

      initAnchors();
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
