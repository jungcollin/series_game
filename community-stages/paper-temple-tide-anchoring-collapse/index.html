<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>서예 달인</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Noto Serif KR", "Palatino Linotype", "Georgia", serif;
        background: #f0e8d0; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(180, 50, 50, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(40, 30, 20, 0.92);
        color: #f4ece0; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #f0e8d0; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(180, 50, 50, 0.5); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">서예 달인. 두루마리에서 떨어지는 한자를 올바른 위치에 찍으세요. 마우스 클릭 또는 화면 터치로 글자를 찍습니다. 모바일에서는 화면 터치와 드래그만으로 플레이할 수 있습니다. 20자를 올바르게 찍으면 클리어. 두루마리가 완전히 말리거나 3자를 틀리면 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="서예 달인" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "paper-temple-tide-anchoring-collapse",
        title: "서예 달인",
        description: "두루마리에서 떨어지는 한자를 올바른 위치에 찍으세요.",
        creator: "jungcollin",
        genre: "Rhythm stamping",
        clearCondition: "20자를 올바르게 찍으면 클리어",
        failCondition: "두루마리가 완전히 말리거나 3자를 틀리면 실패",
        controls: "마우스 클릭 또는 터치로 떨어지는 글자의 올바른 위치를 탭하세요",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [], clearCount: 0, previousStageId: null,
      };

      window.relayStageMeta = {
        id: META.id, title: META.title, description: META.description,
        creator: META.creator, genre: META.genre,
        clearCondition: META.clearCondition, failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };

      // --- Colors ---
      const COL = {
        paper: "#f0e8d0",
        paperLight: "#f8f2e4",
        paperDark: "#d8ceb8",
        ink: "#1a1410",
        inkLight: "rgba(26, 20, 16, 0.4)",
        seal: "#b83230",
        sealLight: "rgba(184, 50, 48, 0.15)",
        scrollEdge: "#c8b898",
        scrollRoll: "#a89878",
        correct: "#2a8a40",
        wrong: "#b83230",
      };

      // Characters to stamp
      const CHARACTERS = [
        "天", "地", "人", "山", "水", "火", "風", "雲", "月", "星",
        "花", "鳥", "龍", "虎", "光", "影", "夢", "心", "道", "和",
        "氣", "力", "靈", "仁", "義", "禮", "智", "信", "德", "福",
      ];

      // --- State ---
      const TARGET = 20;
      const MAX_WRONG = 3;
      const SCROLL_DURATION = 55; // seconds until scroll fully rolls

      let mode = "menu";
      let elapsed = 0;
      let stamped = 0;
      let wrong = 0;
      let scrollRoll = 0; // 0-1, how much scroll has rolled up
      let lastTimestamp = 0;
      let animFrame = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;
      let clearAnim = 0;
      let shake = 0;
      let flashColor = null;
      let flashAlpha = 0;

      // Current character challenge
      let currentChar = null;
      let slots = [];      // stamp positions on screen
      let charPreview = 0;  // preview timer
      let charFalling = false;
      let charY = 0;
      let charTargetSlot = -1; // correct slot index
      let charSpeed = 0;
      let spawnTimer = 0;

      let particles = [];
      let stampMarks = []; // history of stamps on scroll

      // --- Helpers ---
      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }
      function progress() { return clamp(elapsed / SCROLL_DURATION, 0, 1); }

      // --- Relay Host ---
      function inRelayHost() {
        try { return window.parent && window.parent !== window && window.parent.RelayHost; }
        catch { return false; }
      }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) {
        if (!inRelayHost() || hostFailedReported) return;
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) });
      }
      function reportCleared() {
        if (!inRelayHost() || hostClearedReported) return;
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) });
      }

      // --- Spawning ---
      function generateSlots() {
        // 3 slots at bottom of visible scroll area
        slots = [];
        const scrollBottom = getScrollBottom();
        const slotY = scrollBottom - 50;
        const spacing = 140;
        const startX = CX - spacing;
        for (let i = 0; i < 3; i++) {
          slots.push({
            x: startX + i * spacing,
            y: slotY,
            w: 70, h: 70,
          });
        }
      }

      function spawnCharacter() {
        const charIdx = Math.floor(Math.random() * CHARACTERS.length);
        currentChar = CHARACTERS[charIdx];
        charTargetSlot = Math.floor(Math.random() * 3);
        charPreview = 1.5; // seconds of preview
        charFalling = false;
        charY = getScrollTop() + 30;
        charSpeed = lerp(80, 140, progress());
        generateSlots();
      }

      function getScrollTop() {
        return 30 + scrollRoll * 200;
      }

      function getScrollBottom() {
        return H - 30;
      }

      function spawnParticles(x, y, count, color) {
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2);
          const speed = rand(40, 120);
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color,
            size: rand(2, 5),
          });
        }
      }

      // --- Reset ---
      function reset() {
        elapsed = 0; stamped = 0; wrong = 0;
        scrollRoll = 0; clearAnim = 0; shake = 0;
        flashColor = null; flashAlpha = 0;
        currentChar = null; slots = [];
        charPreview = 0; charFalling = false;
        particles = []; stampMarks = [];
        spawnTimer = 1.0;
        hostFailedReported = false;
        hostClearedReported = false;
        window.relayStageResult.status = "running";
      }

      // --- Update ---
      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        // Scroll rolls up over time
        scrollRoll = clamp(elapsed / SCROLL_DURATION, 0, 1);

        // Character spawning
        if (!currentChar) {
          spawnTimer -= dt;
          if (spawnTimer <= 0) {
            spawnCharacter();
          }
        }

        // Character preview then fall
        if (currentChar) {
          if (charPreview > 0) {
            charPreview -= dt;
            if (charPreview <= 0) {
              charFalling = true;
            }
          }

          if (charFalling) {
            charY += charSpeed * dt;
            // If character falls past slots, it's a miss
            if (charY > getScrollBottom() + 20) {
              wrong++;
              shake = 5;
              flashColor = COL.wrong;
              flashAlpha = 0.3;
              currentChar = null;
              spawnTimer = 0.8;
            }
          }
        }

        // Stamp marks age
        for (const m of stampMarks) {
          m.age += dt;
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vx *= 0.93; p.vy *= 0.93;
          p.life -= dt * 2.5;
          if (p.life <= 0) particles.splice(i, 1);
        }

        // Decay
        shake *= 0.9;
        if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;

        // Win/lose
        if (stamped >= TARGET) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
        } else if (wrong >= MAX_WRONG) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("오답 초과");
        } else if (scrollRoll >= 1) {
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("두루마리 말림");
        }
      }

      // --- Draw ---
      function draw() {
        ctx.save();

        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        // Paper background
        ctx.fillStyle = COL.paperLight;
        ctx.fillRect(0, 0, W, H);

        // Draw scroll
        drawScroll();

        // Draw stamp marks
        drawStampMarks();

        // Draw slots
        if (mode === "running" && currentChar) drawSlots();

        // Draw falling character
        if (mode === "running" && currentChar) drawFallingChar();

        // Particles
        drawParticles();

        // HUD
        if (mode === "running") drawHUD();

        // Flash
        if (flashAlpha > 0.01 && flashColor) {
          ctx.fillStyle = flashColor === COL.wrong
            ? `rgba(184, 50, 48, ${flashAlpha})`
            : `rgba(42, 138, 64, ${flashAlpha})`;
          ctx.fillRect(0, 0, W, H);
        }

        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawScroll() {
        const top = getScrollTop();
        const bottom = getScrollBottom();

        // Scroll body
        ctx.fillStyle = COL.paper;
        ctx.fillRect(80, top, W - 160, bottom - top);

        // Scroll edges (left/right borders)
        ctx.fillStyle = COL.scrollEdge;
        ctx.fillRect(80, top, 4, bottom - top);
        ctx.fillRect(W - 84, top, 4, bottom - top);

        // Top roll (the rolling part)
        ctx.fillStyle = COL.scrollRoll;
        ctx.beginPath();
        ctx.ellipse(CX, top, (W - 160) / 2, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // Inner roll shadow
        ctx.fillStyle = COL.scrollEdge;
        ctx.beginPath();
        ctx.ellipse(CX, top, (W - 160) / 2 - 4, 8, 0, 0, Math.PI);
        ctx.fill();

        // Bottom rod
        ctx.fillStyle = COL.scrollRoll;
        ctx.fillRect(76, bottom - 4, W - 152, 8);

        // Rod ends
        ctx.beginPath();
        ctx.arc(76, bottom, 8, 0, Math.PI * 2);
        ctx.arc(W - 76, bottom, 8, 0, Math.PI * 2);
        ctx.fillStyle = "#8a7860";
        ctx.fill();

        // Subtle grid lines on scroll
        ctx.strokeStyle = "rgba(200, 185, 160, 0.3)";
        ctx.lineWidth = 0.5;
        const gridSpacing = 60;
        for (let y = top + gridSpacing; y < bottom; y += gridSpacing) {
          ctx.beginPath();
          ctx.moveTo(84, y);
          ctx.lineTo(W - 84, y);
          ctx.stroke();
        }
        for (let x = 84 + gridSpacing; x < W - 84; x += gridSpacing) {
          ctx.beginPath();
          ctx.moveTo(x, top);
          ctx.lineTo(x, bottom);
          ctx.stroke();
        }
      }

      function drawStampMarks() {
        for (const m of stampMarks) {
          ctx.save();
          ctx.globalAlpha = clamp(1 - m.age * 0.05, 0.3, 1);
          ctx.translate(m.x, m.y);

          // Stamp box
          ctx.fillStyle = m.correct ? COL.sealLight : "rgba(184, 50, 48, 0.08)";
          ctx.fillRect(-25, -25, 50, 50);

          // Character
          ctx.fillStyle = m.correct ? COL.seal : COL.wrong;
          ctx.font = `bold 26px "Noto Serif KR", serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(m.char, 0, 2);

          // Seal border
          ctx.strokeStyle = m.correct ? COL.seal : COL.wrong;
          ctx.lineWidth = 1.5;
          ctx.strokeRect(-25, -25, 50, 50);

          ctx.restore();
        }
      }

      function drawSlots() {
        for (let i = 0; i < slots.length; i++) {
          const s = slots[i];
          ctx.save();

          // Slot outline
          ctx.strokeStyle = i === charTargetSlot && charPreview > 0
            ? COL.seal : COL.inkLight;
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          ctx.strokeRect(s.x - s.w / 2, s.y - s.h / 2, s.w, s.h);
          ctx.setLineDash([]);

          // Show hint character in correct slot during preview
          if (i === charTargetSlot && charPreview > 0) {
            ctx.globalAlpha = clamp(charPreview / 1.5, 0, 0.6);
            ctx.fillStyle = COL.seal;
            ctx.font = `bold 28px "Noto Serif KR", serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(currentChar, s.x, s.y);
          }

          ctx.restore();
        }
      }

      function drawFallingChar() {
        if (!currentChar) return;

        const displayY = charFalling ? charY : getScrollTop() + 50;
        ctx.save();
        ctx.globalAlpha = charPreview > 0 ? 1 : 0.9;

        // Character
        ctx.fillStyle = COL.ink;
        ctx.font = `bold 32px "Noto Serif KR", serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(currentChar, CX, displayY);

        // Guide line from char to slots area
        if (charFalling) {
          ctx.strokeStyle = COL.inkLight;
          ctx.lineWidth = 1;
          ctx.setLineDash([2, 4]);
          ctx.beginPath();
          ctx.moveTo(CX, displayY + 20);
          ctx.lineTo(CX, getScrollBottom() - 80);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        ctx.restore();
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life;
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }

      function drawHUD() {
        ctx.fillStyle = COL.ink;
        ctx.font = `500 15px "Noto Serif KR", serif`;
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText(`${stamped} / ${TARGET}`, 24, 12);

        // Scroll progress bar (top)
        const barW = W - 48;
        ctx.fillStyle = COL.paperDark;
        ctx.fillRect(24, 34, barW, 2);
        ctx.fillStyle = scrollRoll > 0.7 ? COL.wrong : COL.scrollRoll;
        ctx.fillRect(24, 34, barW * scrollRoll, 2);

        // Wrong stamp indicators
        const dotY = H - 16;
        for (let i = 0; i < MAX_WRONG; i++) {
          const dotX = CX - (MAX_WRONG - 1) * 10 + i * 20;
          ctx.beginPath();
          ctx.arc(dotX, dotY, 5, 0, Math.PI * 2);
          ctx.fillStyle = i < MAX_WRONG - wrong ? COL.seal : COL.paperDark;
          ctx.fill();
        }
      }

      // --- Overlay cards ---
      function drawCard(title, lines, accent) {
        const cardW = 320, cardH = 38 + lines.length * 26 + 40;
        const cardX = CX - cardW / 2, cardY = CY - cardH / 2;

        ctx.fillStyle = "rgba(244, 236, 224, 0.95)";
        ctx.beginPath();
        roundRect(ctx, cardX, cardY, cardW, cardH, 8);
        ctx.fill();

        ctx.fillStyle = accent || COL.seal;
        ctx.fillRect(cardX + 12, cardY, cardW - 24, 3);

        ctx.fillStyle = COL.ink;
        ctx.font = `bold 22px "Noto Serif KR", serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText(title, CX, cardY + 18);

        ctx.font = `400 14px "Noto Serif KR", serif`;
        ctx.fillStyle = "rgba(26, 20, 16, 0.7)";
        for (let i = 0; i < lines.length; i++) {
          ctx.fillText(lines[i], CX, cardY + 50 + i * 26);
        }

        ctx.fillStyle = "rgba(26, 20, 16, 0.4)";
        ctx.font = `400 13px "Noto Serif KR", serif`;
        ctx.fillText("TAP or ENTER", CX, cardY + cardH - 20);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.arcTo(x + w, y, x + w, y + r, r);
        ctx.lineTo(x + w, y + h - r);
        ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
        ctx.lineTo(x + r, y + h);
        ctx.arcTo(x, y + h, x, y + h - r, r);
        ctx.lineTo(x, y + r);
        ctx.arcTo(x, y, x + r, y, r);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(240, 232, 208, 0.5)";
        ctx.fillRect(0, 0, W, H);
        drawCard("서예 달인", [
          "두루마리에서 떨어지는 한자를",
          "올바른 위치에 찍으세요",
          "",
          "조작: 탭하여 올바른 칸에 찍기",
          "클리어: 20자 올바르게 찍기",
          "실패: 3자 틀리거나 두루마리 말림",
        ], COL.seal);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(240, 232, 208, ${clearAnim * 0.5})`;
        ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) {
          drawCard("명필", [
            `${Math.ceil(elapsed)}초 만에 완료`,
            `정확 도장: ${stamped}개`,
          ], COL.correct);
        }
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(60, 30, 20, 0.3)";
        ctx.fillRect(0, 0, W, H);
        drawCard("실수", [
          scrollRoll >= 1 ? "두루마리가 말렸습니다" : "틀린 도장이 너무 많습니다",
          `정확 도장: ${stamped} / ${TARGET}`,
        ], COL.wrong);
      }

      // --- Input ---
      function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: (clientX - rect.left) * (W / rect.width),
          y: (clientY - rect.top) * (H / rect.height),
        };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") {
          reset();
          mode = "running";
        }
      }

      function handleTap(cx, cy) {
        if (!currentChar || !charFalling) return;

        // Check which slot was tapped
        for (let i = 0; i < slots.length; i++) {
          const s = slots[i];
          if (cx >= s.x - s.w / 2 - 10 && cx <= s.x + s.w / 2 + 10 &&
              cy >= s.y - s.h / 2 - 10 && cy <= s.y + s.h / 2 + 10) {

            const correct = (i === charTargetSlot);
            stampMarks.push({
              x: s.x, y: s.y,
              char: currentChar,
              correct,
              age: 0,
            });

            if (correct) {
              stamped++;
              flashColor = COL.correct;
              flashAlpha = 0.15;
              spawnParticles(s.x, s.y, reducedMotion ? 4 : 10, COL.seal);
            } else {
              wrong++;
              shake = 6;
              flashColor = COL.wrong;
              flashAlpha = 0.3;
              spawnParticles(s.x, s.y, reducedMotion ? 3 : 6, COL.wrong);
            }

            currentChar = null;
            spawnTimer = 0.6;
            return;
          }
        }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        const p = getCanvasPos(e.clientX, e.clientY);
        handleTap(p.x, p.y);
      });

      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleStart();
        }
      });

      // --- Game loop ---
      function gameLoop(timestamp) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = timestamp; return; }
        let dt = Math.min((timestamp - lastTimestamp) / 1000, MAX_DT);
        lastTimestamp = timestamp;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) {
          update(FIXED_DT);
          dt -= FIXED_DT;
          steps++;
        }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      // --- Debug / test harness ---
      function renderGameToText() {
        return JSON.stringify({
          mode, elapsed: +elapsed.toFixed(1),
          stamped, wrong, scrollRoll: +scrollRoll.toFixed(2),
          result: window.relayStageResult.status,
          currentChar,
        });
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < steps; i++) update(FIXED_DT);
        draw();
        return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() {
          reset(); mode = "running";
          stamped = TARGET;
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared";
          reportCleared();
          draw();
        },
        forceFail() {
          reset(); mode = "running";
          wrong = MAX_WRONG;
          mode = "failed";
          window.relayStageResult.status = "failed";
          reportFailed("debug_force_fail");
          draw();
        },
      };

      // --- Init ---
      reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
