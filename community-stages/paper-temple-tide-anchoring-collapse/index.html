<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2309161a' d='M0 0h64v64H0z'/%3E%3Cpath fill='%23ffefb7' d='M32 8l8 18 16 6-16 6-8 18-8-18-16-6 16-6z'/%3E%3Cpath fill='%236ee7f9' d='M32 24l3 8 8 3-8 3-3 8-3-8-8-3 8-3z'/%3E%3C/svg%3E" />
    <title>Paper Temple: Tide Anchor</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Avenir Next", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
        background:
          radial-gradient(circle at top, rgba(98, 222, 255, 0.15), transparent 46%),
          radial-gradient(circle at 20% 24%, rgba(251, 146, 60, 0.12), transparent 34%),
          linear-gradient(180deg, #1c2339 0%, #0f172d 48%, #08111f 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(148, 163, 184, 0.22);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 5;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 15, 25, 0.92);
        color: #f8fafc;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(255, 255, 255, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Paper Temple: Tide Anchor. 포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 이동 후 바로 다음 지점으로 이어 달리기,
      모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현. 붕괴선이 닿기 전에 조류 6파를 넘기며 발전기를 지키면 클리어. 붕괴선에 휩쓸리거나 중요 화물이 유실되면 즉시 실패.
      화면 터치 또는 Enter로 시작할 수 있습니다.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Paper Temple: Tide Anchor" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const STAGE_META = {
        id: "paper-temple-tide-anchoring-collapse",
        title: "Paper Temple: Tide Anchor",
        creator: "jungcollin",
        genre: "Prediction survival / 붕괴하는 라인",
        clearCondition: "붕괴선이 닿기 전에 조류 6파를 넘기며 발전기를 지키기",
        failCondition: "붕괴선에 휩쓸리거나 중요 화물을 잃으면 즉시 실패",
        controls:
          "포인터 또는 터치로 닻 위치 지정, 탭으로 닻 발사, 스와이프로 회수, 이동 후 바로 다음 지점으로 이어 달리기, 모바일은 터치와 드래그만으로 플레이",
        description:
          "예고선을 읽고 닻을 박아 다음 기둥으로 건너간 뒤, 붕괴선이 삼키기 전에 화물까지 회수하는 예측형 생존",
      };

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const DPR_SAFE_FONT =
        '"Avenir Next", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif';
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const TOTAL_WAVES = 6;
      const SAFE_SEQUENCE = [1, 2, 0, 2, 1, 0];
      const LANE_LABELS = ["상층", "중층", "하층"];
      const CARGO_SLOT_OFFSETS = [
        { x: -56, y: -26 },
        { x: -70, y: 30 },
      ];
      const PAD_LAYOUT = [
        [
          { x: 114, y: 158 },
          { x: 114, y: 270 },
          { x: 114, y: 394 },
        ],
        [
          { x: 236, y: 184 },
          { x: 236, y: 288 },
          { x: 236, y: 414 },
        ],
        [
          { x: 366, y: 148 },
          { x: 366, y: 250 },
          { x: 366, y: 372 },
        ],
        [
          { x: 498, y: 176 },
          { x: 498, y: 298 },
          { x: 498, y: 398 },
        ],
        [
          { x: 628, y: 140 },
          { x: 628, y: 250 },
          { x: 628, y: 360 },
        ],
        [
          { x: 758, y: 166 },
          { x: 758, y: 286 },
          { x: 758, y: 406 },
        ],
        [
          { x: 878, y: 146 },
          { x: 878, y: 264 },
          { x: 878, y: 378 },
        ],
      ];
      const relayContext = window.RelayRuntime?.readContext(STAGE_META.id) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };

      const pointer = {
        x: VIEW.width * 0.5,
        y: VIEW.height * 0.5,
        down: false,
        startX: 0,
        startY: 0,
        moved: false,
        recallTriggered: false,
        pointerId: null,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostClearedReported = false;
      let hostFailedReported = false;

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        currentColumn: 0,
        currentLane: 1,
        waveIndex: 0,
        waveTime: 0,
        currentFrontStartX: PAD_LAYOUT[0][1].x - 170,
        currentFrontEndX: PAD_LAYOUT[1][1].x + 110,
        frontDelay: 0.48,
        frontDuration: 2.55,
        frontX: PAD_LAYOUT[0][1].x - 170,
        frontAlpha: 0,
        preview: [],
        activeTargetLane: null,
        hoverLane: 1,
        anchorHead: null,
        dash: null,
        recallBoost: 0,
        recallPulse: 0,
        ambientTime: 0,
        pulse: 0,
        flash: 0,
        shake: 0,
        lastReason: "",
        comboText: "",
        comboTimer: 0,
        popups: [],
        particles: [],
        fragments: [],
        currentHint:
          "예고선이 가장 늦게 닿는 기둥으로 탭하고, 도착 직후 스와이프로 화물을 회수하세요.",
        player: { x: 0, y: 0, bob: 0 },
        core: { x: 0, y: 0, glow: 0 },
        cargos: [],
      };

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, ratio) {
        return start + (end - start) * ratio;
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function easeInOutSine(value) {
        return -(Math.cos(Math.PI * value) - 1) / 2;
      }

      function distance(x1, y1, x2, y2) {
        return Math.hypot(x2 - x1, y2 - y1);
      }

      function getPad(column, lane) {
        return PAD_LAYOUT[column][lane];
      }

      function getPose(column, lane) {
        const pad = getPad(column, lane);
        return {
          playerX: pad.x + 18,
          playerY: pad.y - 42,
          coreX: pad.x - 8,
          coreY: pad.y - 12,
        };
      }

      function getCandidateColumn() {
        return Math.min(PAD_LAYOUT.length - 1, state.currentColumn + 1);
      }

      function getCargoSlot(index) {
        const slot = CARGO_SLOT_OFFSETS[index];
        return {
          x: state.core.x + slot.x,
          y: state.core.y + slot.y,
        };
      }

      function resetPlayerStack(column, lane) {
        const pose = getPose(column, lane);
        state.player.x = pose.playerX;
        state.player.y = pose.playerY;
        state.player.bob = 0;
        state.core.x = pose.coreX;
        state.core.y = pose.coreY;
        state.core.glow = 0;

        state.cargos = CARGO_SLOT_OFFSETS.map((slot, index) => ({
          index,
          x: pose.coreX + slot.x,
          y: pose.coreY + slot.y,
          vx: 0,
          vy: 0,
          hue: index === 0 ? "#8cf3ff" : "#ffd07c",
        }));
      }

      function createForecasts(waveIndex) {
        const stableLane = SAFE_SEQUENCE[waveIndex];
        const stableTime = 2.88 - waveIndex * 0.12;
        const mediumTime = stableTime - (0.38 - waveIndex * 0.02);
        const riskyTime = mediumTime - (0.35 - waveIndex * 0.02);

        return [0, 1, 2].map((lane) => {
          const isStable = lane === stableLane;
          const isNeighbor = !isStable && Math.abs(lane - stableLane) === 1;
          const arrivalTime = clamp(
            isStable ? stableTime : isNeighbor ? mediumTime : riskyTime,
            1.38,
            3.15
          );
          return {
            lane,
            arrivalTime,
            warningTime: clamp(arrivalTime - 0.82, 0.44, 2.2),
            quality: isStable ? "stable" : isNeighbor ? "medium" : "risky",
          };
        });
      }

      function addPopup(text, x, y, color = "#f8fafc", size = 20) {
        state.popups.push({
          text,
          x,
          y,
          color,
          size,
          life: 0.82,
          maxLife: 0.82,
        });
      }

      function burstFragments(x, y, color, amount = 12, spread = 1) {
        for (let index = 0; index < amount; index += 1) {
          const angle = (Math.PI * 2 * index) / amount + Math.random() * 0.4;
          const speed = (70 + Math.random() * 180) * spread;
          state.fragments.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 4 + Math.random() * 10,
            rot: Math.random() * Math.PI * 2,
            rotSpeed: -5 + Math.random() * 10,
            color,
            life: 0.9 + Math.random() * 0.5,
            maxLife: 1.4,
          });
        }
      }

      function burstSparkles(x, y, color, amount = 16, spread = 1) {
        for (let index = 0; index < amount; index += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = (36 + Math.random() * 120) * spread;
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: 2 + Math.random() * 5,
            color,
            life: 0.35 + Math.random() * 0.45,
            maxLife: 0.8,
          });
        }
      }

      function startWave() {
        state.waveTime = 0;
        state.activeTargetLane = null;
        state.hoverLane = state.currentLane;
        state.anchorHead = null;
        state.dash = null;
        state.recallBoost = 0;
        state.recallPulse = 0;
        state.frontAlpha = 0.9;
        state.pulse = 0.45;

        const currentPad = getPad(state.currentColumn, state.currentLane);
        const nextColumn = getCandidateColumn();
        const middleNextPad = getPad(nextColumn, 1);
        state.frontDelay = Math.max(0.38, 0.58 - state.waveIndex * 0.03);
        state.frontDuration = 2.72 - state.waveIndex * 0.1;
        state.currentFrontStartX = currentPad.x - 170;
        state.currentFrontEndX = middleNextPad.x + 110;
        state.frontX = state.currentFrontStartX;
        state.preview = createForecasts(state.waveIndex);
        state.currentHint =
          state.waveIndex === 0
            ? "예고선 수치를 보고 가장 오래 버틸 기둥을 먼저 고르세요."
            : "지나간 안전 지대는 바로 부서집니다. 도착 즉시 스와이프로 화물을 붙잡으세요.";
        addPopup(`조류 ${state.waveIndex + 1}파`, currentPad.x + 10, currentPad.y - 82, "#ffd580", 22);
      }

      function beginRun() {
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.currentColumn = 0;
        state.currentLane = 1;
        state.waveIndex = 0;
        state.lastReason = "";
        state.comboText = "";
        state.comboTimer = 0;
        state.flash = 0;
        state.shake = 0;
        state.popups = [];
        state.particles = [];
        state.fragments = [];
        resetPlayerStack(0, 1);
        startWave();
        window.relayStageResult.status = "running";
        hostClearedReported = false;
        hostFailedReported = false;
      }

      function startFromTouch() {
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          beginRun();
        }
      }

      function failStage(reason) {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }

        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 0.82;
        state.shake = 14;
        state.recallBoost = 0;
        window.relayStageResult.status = "failed";
        addPopup("봉인 붕괴", state.core.x, state.core.y - 58, "#ff8b9b", 24);
        burstFragments(state.core.x, state.core.y, "rgba(255, 127, 80, 0.9)", 18, 1.3);
        burstSparkles(state.core.x, state.core.y, "rgba(255, 235, 190, 0.95)", 20, 1.2);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode !== "running") {
          return;
        }

        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.9;
        state.shake = 10;
        state.comboText = "종이 사원 고정 완료";
        state.comboTimer = 1.4;
        window.relayStageResult.status = "cleared";
        addPopup("발전기 안정화", state.core.x + 16, state.core.y - 60, "#a7f3d0", 26);
        burstSparkles(state.core.x, state.core.y, "rgba(142, 255, 224, 0.95)", 24, 1.35);
        burstFragments(state.core.x, state.core.y, "rgba(255, 214, 111, 0.9)", 16, 1.2);
        reportClearedToHost();
      }

      function triggerRecall() {
        if (state.mode !== "running" || state.activeTargetLane === null) {
          return;
        }

        state.recallBoost = 1.2;
        state.recallPulse = 0.72;
        state.comboText = "회수";
        state.comboTimer = 0.45;
        addPopup("회수", state.core.x - 12, state.core.y - 52, "#8cf3ff");
        burstSparkles(state.core.x - 10, state.core.y, "rgba(140, 243, 255, 0.92)", 10, 0.8);
        state.cargos.forEach((cargo, index) => {
          const slot = getCargoSlot(index);
          cargo.x = lerp(cargo.x, slot.x, 0.42);
          cargo.y = lerp(cargo.y, slot.y, 0.42);
          cargo.vx += 180 + (slot.x - cargo.x) * 0.9;
          cargo.vy += (slot.y - cargo.y) * 0.9;
        });
      }

      function getForecastForLane(lane) {
        return state.preview.find((entry) => entry.lane === lane);
      }

      function armAnchor(lane) {
        if (
          state.mode !== "running" ||
          state.activeTargetLane !== null ||
          state.currentColumn >= PAD_LAYOUT.length - 1
        ) {
          return;
        }

        const candidateColumn = getCandidateColumn();
        const targetPad = getPad(candidateColumn, lane);
        const startX = state.player.x + 8;
        const startY = state.player.y - 8;
        const travelDuration = 0.12 + distance(startX, startY, targetPad.x, targetPad.y - 18) / 1200;

        state.activeTargetLane = lane;
        state.anchorHead = {
          progress: 0,
          duration: travelDuration,
          startX,
          startY,
          x: startX,
          y: startY,
          targetX: targetPad.x,
          targetY: targetPad.y - 24,
          spin: 0,
        };
        state.currentHint = "도착 직후 스와이프해서 뒤처진 화물을 끌어오세요.";

        const forecast = getForecastForLane(lane);
        addPopup(
          `${LANE_LABELS[lane]} ${forecast ? forecast.arrivalTime.toFixed(1) : "?"}s`,
          targetPad.x,
          targetPad.y - 64,
          forecast?.quality === "stable" ? "#d9f99d" : forecast?.quality === "medium" ? "#ffd580" : "#ff8b9b",
          18
        );
        burstSparkles(startX, startY, "rgba(255, 206, 114, 0.9)", 8, 0.8);
      }

      function beginDash(targetLane) {
        const targetPose = getPose(getCandidateColumn(), targetLane);
        state.dash = {
          elapsed: 0,
          duration: 0.28 + Math.abs(targetPose.playerY - state.player.y) / 900,
          playerStartX: state.player.x,
          playerStartY: state.player.y,
          coreStartX: state.core.x,
          coreStartY: state.core.y,
          playerEndX: targetPose.playerX,
          playerEndY: targetPose.playerY,
          coreEndX: targetPose.coreX,
          coreEndY: targetPose.coreY,
          targetLane,
        };
        state.shake = Math.max(state.shake, 7);
        state.flash = Math.max(state.flash, 0.16);
        burstSparkles(state.core.x, state.core.y, "rgba(127, 249, 255, 0.95)", 12, 1);
        state.cargos.forEach((cargo, index) => {
          cargo.vx -= 150 + index * 36;
          cargo.vy += (index === 0 ? -1 : 1) * 58;
        });
      }

      function resolveHoverLane(x, y) {
        if (state.currentColumn >= PAD_LAYOUT.length - 1) {
          return state.currentLane;
        }

        const candidateColumn = getCandidateColumn();
        let bestLane = state.hoverLane;
        let bestDistance = Infinity;
        for (let lane = 0; lane < 3; lane += 1) {
          const pad = getPad(candidateColumn, lane);
          const candidateDistance = distance(x, y, pad.x, pad.y);
          if (candidateDistance < bestDistance) {
            bestDistance = candidateDistance;
            bestLane = lane;
          }
        }
        return bestDistance <= 150 ? bestLane : state.hoverLane;
      }

      function pointerToCanvas(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function updatePointerPosition(x, y) {
        pointer.x = clamp(x, 0, VIEW.width);
        pointer.y = clamp(y, 0, VIEW.height);
        if (state.mode === "running" && state.activeTargetLane === null) {
          state.hoverLane = resolveHoverLane(pointer.x, pointer.y);
        }
      }

      function handlePointerDown(event) {
        const point = pointerToCanvas(event);
        canvas.focus();
        updatePointerPosition(point.x, point.y);
        pointer.down = true;
        pointer.pointerId = event.pointerId;
        pointer.startX = point.x;
        pointer.startY = point.y;
        pointer.moved = false;
        pointer.recallTriggered = false;
        canvas.setPointerCapture?.(event.pointerId);

        if (state.mode !== "running") {
          event.preventDefault();
          startFromTouch();
        }
      }

      function handlePointerMove(event) {
        const point = pointerToCanvas(event);
        updatePointerPosition(point.x, point.y);

        if (!pointer.down || state.mode !== "running") {
          return;
        }

        const dragDistance = distance(point.x, point.y, pointer.startX, pointer.startY);
        if (dragDistance > 12) {
          pointer.moved = true;
        }
        if (
          dragDistance > 56 &&
          !pointer.recallTriggered &&
          (state.activeTargetLane !== null || point.x < pointer.startX - 14)
        ) {
          pointer.recallTriggered = true;
          triggerRecall();
        }
      }

      function handlePointerUp(event) {
        if (pointer.down && pointer.pointerId !== null) {
          canvas.releasePointerCapture?.(pointer.pointerId);
        }

        const point = pointerToCanvas(event);
        updatePointerPosition(point.x, point.y);
        const dragDistance = distance(point.x, point.y, pointer.startX, pointer.startY);

        if (
          state.mode === "running" &&
          !pointer.recallTriggered &&
          dragDistance < 30 &&
          state.activeTargetLane === null
        ) {
          armAnchor(resolveHoverLane(point.x, point.y));
        }

        pointer.down = false;
        pointer.pointerId = null;
        pointer.moved = false;
        pointer.recallTriggered = false;
      }

      function handlePointerCancel() {
        pointer.down = false;
        pointer.pointerId = null;
        pointer.moved = false;
        pointer.recallTriggered = false;
      }

      function onKeyDown(event) {
        if (event.key === "Enter" && state.mode !== "running") {
          event.preventDefault();
          beginRun();
          return;
        }

        if (state.mode !== "running") {
          return;
        }

        if (event.key === "ArrowUp" || event.key.toLowerCase() === "w") {
          event.preventDefault();
          state.hoverLane = Math.max(0, state.hoverLane - 1);
        } else if (event.key === "ArrowDown" || event.key.toLowerCase() === "s") {
          event.preventDefault();
          state.hoverLane = Math.min(2, state.hoverLane + 1);
        } else if (event.key === " " || event.key === "Enter") {
          event.preventDefault();
          if (state.activeTargetLane === null) {
            armAnchor(state.hoverLane);
          }
        } else if (event.key.toLowerCase() === "x" || event.key === "Backspace") {
          event.preventDefault();
          triggerRecall();
        } else if (event.key.toLowerCase() === "r" && state.mode === "running") {
          event.preventDefault();
          beginRun();
        }
      }

      function updateAnchor(dt) {
        if (!state.anchorHead) {
          return;
        }

        state.anchorHead.progress += dt / state.anchorHead.duration;
        const t = clamp(state.anchorHead.progress, 0, 1);
        const arc = Math.sin(t * Math.PI) * 54;
        state.anchorHead.x = lerp(state.anchorHead.startX, state.anchorHead.targetX, t);
        state.anchorHead.y = lerp(state.anchorHead.startY, state.anchorHead.targetY, t) - arc;
        state.anchorHead.spin += dt * 12;

        if (t >= 1) {
          const targetLane = state.activeTargetLane;
          state.anchorHead = null;
          beginDash(targetLane);
        }
      }

      function updateDash(dt) {
        if (!state.dash) {
          return;
        }

        state.dash.elapsed += dt;
        const t = clamp(state.dash.elapsed / state.dash.duration, 0, 1);
        const eased = easeOutCubic(t);
        state.player.x = lerp(state.dash.playerStartX, state.dash.playerEndX, eased);
        state.player.y = lerp(state.dash.playerStartY, state.dash.playerEndY, easeInOutSine(t));
        state.core.x = lerp(state.dash.coreStartX, state.dash.coreEndX, eased);
        state.core.y = lerp(state.dash.coreStartY, state.dash.coreEndY, easeInOutSine(t));

        if (t >= 1) {
          state.player.x = state.dash.playerEndX;
          state.player.y = state.dash.playerEndY;
          state.core.x = state.dash.coreEndX;
          state.core.y = state.dash.coreEndY;
          state.currentLane = state.dash.targetLane;
          state.dash = null;
          burstSparkles(state.core.x, state.core.y, "rgba(255, 210, 122, 0.9)", 16, 0.9);
        }
      }

      function updateFront(dt) {
        const travel = clamp(
          (state.waveTime - state.frontDelay) / state.frontDuration,
          0,
          1
        );
        state.frontX = lerp(state.currentFrontStartX, state.currentFrontEndX, travel);
        state.frontAlpha = 0.44 + 0.56 * travel;
        if (travel > 0 && Math.random() < 0.55) {
          state.particles.push({
            x: state.frontX + (Math.random() - 0.5) * 24,
            y: 80 + Math.random() * 360,
            vx: -40 - Math.random() * 40,
            vy: -10 + Math.random() * 20,
            size: 2 + Math.random() * 4,
            color: "rgba(150, 245, 255, 0.85)",
            life: 0.24 + Math.random() * 0.28,
            maxLife: 0.52,
          });
        }
      }

      function updateCargo(dt) {
        const recallPower = state.recallBoost;
        const tetherStrength = 6.2 + recallPower * 18.4;
        const damping = Math.pow(0.93, dt * 60);

        state.cargos.forEach((cargo, index) => {
          const slot = getCargoSlot(index);
          cargo.vx += (slot.x - cargo.x) * tetherStrength * dt;
          cargo.vy += (slot.y - cargo.y) * tetherStrength * dt;
          cargo.vx *= damping;
          cargo.vy *= damping;
          cargo.x += cargo.vx * dt;
          cargo.y += cargo.vy * dt;
        });
      }

      function updateParticles(dt) {
        state.particles = state.particles.filter((particle) => {
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          return particle.life > 0;
        });

        state.fragments = state.fragments.filter((fragment) => {
          fragment.life -= dt;
          fragment.vy += 240 * dt;
          fragment.x += fragment.vx * dt;
          fragment.y += fragment.vy * dt;
          fragment.rot += fragment.rotSpeed * dt;
          return fragment.life > 0;
        });

        state.popups = state.popups.filter((popup) => {
          popup.life -= dt;
          popup.y -= 26 * dt;
          return popup.life > 0;
        });
      }

      function updateEffects(dt) {
        state.ambientTime += dt;
        state.elapsed += dt;
        state.lastRunTime = state.elapsed;
        state.player.bob += dt * 5.5;
        state.core.glow = clamp(state.core.glow + dt * 0.9, 0, 1);
        state.recallBoost = Math.max(0, state.recallBoost - dt * 1.65);
        state.recallPulse = Math.max(0, state.recallPulse - dt * 1.8);
        state.comboTimer = Math.max(0, state.comboTimer - dt);
        state.flash = Math.max(0, state.flash - dt * 1.4);
        state.shake = Math.max(0, state.shake - dt * 22);
        state.pulse = Math.max(0, state.pulse - dt * 1.3);
      }

      function getCurrentIntegrity() {
        const forecast = getForecastForLane(state.activeTargetLane ?? state.hoverLane ?? state.currentLane);
        if (!forecast) {
          return 1;
        }
        return clamp(1 - state.waveTime / forecast.arrivalTime, 0, 1);
      }

      function getSecuredCargoRatio() {
        let safeCount = 0;
        state.cargos.forEach((cargo, index) => {
          const slot = getCargoSlot(index);
          if (distance(cargo.x, cargo.y, slot.x, slot.y) <= 40) {
            safeCount += 1;
          }
        });
        return safeCount / state.cargos.length;
      }

      function checkFailures() {
        if (state.mode !== "running") {
          return;
        }

        const forecast = state.activeTargetLane !== null ? getForecastForLane(state.activeTargetLane) : null;
        if (forecast && state.waveTime >= forecast.arrivalTime) {
          failStage("예고선보다 늦게 움직여 목표 기둥이 먼저 무너졌습니다.");
          return;
        }

        if (state.frontX >= state.core.x - 12) {
          failStage("붕괴선에 휩쓸려 발전기가 멈췄습니다.");
          return;
        }

        for (const cargo of state.cargos) {
          if (state.frontX >= cargo.x - 12) {
            failStage("중요 화물이 붕괴선에 휩쓸렸습니다.");
            return;
          }
        }
      }

      function checkWaveAdvance() {
        if (
          state.mode !== "running" ||
          state.activeTargetLane === null ||
          state.dash !== null
        ) {
          return;
        }

        const securedRatio = getSecuredCargoRatio();
        const forecast = getForecastForLane(state.activeTargetLane);
        const settleTime = Math.min(1.15, forecast.arrivalTime - 0.46);

        if (securedRatio >= 1 && state.waveTime >= Math.max(0.74, settleTime)) {
          const nextColumn = getCandidateColumn();
          const nextLane = state.activeTargetLane;
          const integrity = clamp(1 - state.waveTime / forecast.arrivalTime, 0, 1);
          state.comboText = integrity > 0.38 ? "예측 성공" : "간신히 고정";
          state.comboTimer = 0.72;
          addPopup(
            integrity > 0.38 ? "예측 성공" : "간신히 고정",
            state.core.x + 10,
            state.core.y - 56,
            integrity > 0.38 ? "#bef264" : "#ffd580",
            20
          );
          burstSparkles(state.core.x + 8, state.core.y, "rgba(190, 242, 100, 0.9)", 8, 0.75);

          state.currentColumn = nextColumn;
          state.currentLane = nextLane;
          state.waveIndex += 1;
          state.activeTargetLane = null;
          state.anchorHead = null;

          if (state.waveIndex >= TOTAL_WAVES) {
            clearStage();
          } else {
            startWave();
          }
        }
      }

      function update(dt) {
        updateEffects(dt);
        updateParticles(dt);

        if (state.mode !== "running") {
          return;
        }

        state.waveTime += dt;
        updateAnchor(dt);
        updateDash(dt);
        updateFront(dt);
        updateCargo(dt);
        checkFailures();
        checkWaveAdvance();
      }

      function createSceneGradient() {
        const gradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);
        gradient.addColorStop(0, "#231f44");
        gradient.addColorStop(0.48, "#0d2135");
        gradient.addColorStop(1, "#07131f");
        return gradient;
      }

      function drawPaperTexture() {
        ctx.save();
        ctx.globalAlpha = 0.14;
        ctx.strokeStyle = "rgba(248, 246, 221, 0.14)";
        ctx.lineWidth = 1;
        for (let index = 0; index < 18; index += 1) {
          const y = 36 + index * 28 + Math.sin(state.ambientTime * 0.5 + index) * 8;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.bezierCurveTo(
            180,
            y + Math.sin(index) * 12,
            640,
            y - Math.cos(index * 0.7) * 18,
            VIEW.width,
            y + Math.sin(index * 0.37) * 10
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBackdrop() {
        ctx.fillStyle = createSceneGradient();
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const aurora = ctx.createRadialGradient(
          VIEW.width * 0.22,
          120,
          20,
          VIEW.width * 0.22,
          120,
          360
        );
        aurora.addColorStop(0, "rgba(255, 204, 120, 0.16)");
        aurora.addColorStop(0.45, "rgba(123, 217, 255, 0.08)");
        aurora.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = aurora;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        drawPaperTexture();

        ctx.save();
        for (let layer = 0; layer < 3; layer += 1) {
          const alpha = 0.16 + layer * 0.08;
          const yOffset = 220 + layer * 56;
          ctx.fillStyle = `rgba(${18 + layer * 12}, ${34 + layer * 8}, ${50 + layer * 14}, ${alpha})`;
          ctx.beginPath();
          ctx.moveTo(-40, VIEW.height);
          for (let x = -20; x <= VIEW.width + 40; x += 90) {
            const wave = Math.sin(state.ambientTime * (0.45 + layer * 0.12) + x * 0.01 + layer) * (14 + layer * 8);
            ctx.lineTo(x, yOffset + wave);
          }
          ctx.lineTo(VIEW.width + 40, VIEW.height);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(0, 18);
        ctx.fillStyle = "rgba(11, 26, 38, 0.92)";
        ctx.beginPath();
        ctx.moveTo(24, 472);
        ctx.lineTo(140, 320);
        ctx.lineTo(182, 320);
        ctx.lineTo(214, 264);
        ctx.lineTo(328, 264);
        ctx.lineTo(360, 320);
        ctx.lineTo(392, 320);
        ctx.lineTo(466, 236);
        ctx.lineTo(502, 236);
        ctx.lineTo(548, 286);
        ctx.lineTo(584, 286);
        ctx.lineTo(674, 214);
        ctx.lineTo(706, 214);
        ctx.lineTo(778, 268);
        ctx.lineTo(822, 268);
        ctx.lineTo(920, 186);
        ctx.lineTo(960, 186);
        ctx.lineTo(960, 560);
        ctx.lineTo(0, 560);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "rgba(255, 217, 140, 0.08)";
        for (let column = 0; column < PAD_LAYOUT.length; column += 1) {
          const top = PAD_LAYOUT[column][0];
          const bottom = PAD_LAYOUT[column][2];
          ctx.fillRect(top.x - 11, top.y - 18, 22, bottom.y - top.y + 78);
        }
        ctx.restore();
      }

      function drawCurrents() {
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (let ring = 0; ring < 4; ring += 1) {
          const alpha = 0.1 + ring * 0.03;
          ctx.strokeStyle = `rgba(112, 231, 255, ${alpha})`;
          ctx.lineWidth = 2 + ring;
          ctx.beginPath();
          const offset = (state.ambientTime * (22 + ring * 6)) % 260;
          ctx.moveTo(-80 + offset, 84 + ring * 68);
          ctx.bezierCurveTo(
            150 + offset,
            32 + ring * 48,
            520 + offset,
            116 + ring * 56,
            VIEW.width + 60,
            48 + ring * 82
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawPad(column, lane, pad, highlight) {
        const isCollapsed = column < state.currentColumn;
        const isCurrent = column === state.currentColumn && lane === state.currentLane;
        const isCandidate = column === getCandidateColumn() && state.mode === "running";
        const forecast = isCandidate ? getForecastForLane(lane) : null;
        const hover = isCandidate && state.activeTargetLane === null && lane === state.hoverLane;
        const active = state.activeTargetLane === lane && column === getCandidateColumn();

        const integrity = forecast
          ? clamp(1 - state.waveTime / forecast.arrivalTime, 0, 1)
          : isCurrent
            ? clamp(1 - Math.max(0, state.frontX - (pad.x - 86)) / 120, 0, 1)
            : 1;

        const baseColor = isCollapsed
          ? "rgba(23, 31, 43, 0.45)"
          : isCurrent
            ? "rgba(255, 223, 161, 0.92)"
            : forecast?.quality === "stable"
              ? "rgba(206, 250, 132, 0.9)"
              : forecast?.quality === "medium"
                ? "rgba(255, 211, 128, 0.9)"
                : forecast?.quality === "risky"
                  ? "rgba(255, 142, 164, 0.9)"
                  : "rgba(124, 163, 199, 0.45)";

        ctx.save();
        ctx.translate(pad.x, pad.y);

        ctx.shadowColor = isCollapsed
          ? "transparent"
          : active || isCurrent || hover
            ? "rgba(132, 229, 255, 0.65)"
            : "rgba(0, 0, 0, 0.32)";
        ctx.shadowBlur = active ? 28 : hover || isCurrent ? 20 : 12;
        ctx.fillStyle = baseColor;
        ctx.beginPath();
        ctx.moveTo(-42, 0);
        ctx.lineTo(0, -18);
        ctx.lineTo(44, 0);
        ctx.lineTo(0, 20);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = isCollapsed ? "rgba(12, 19, 29, 0.75)" : "rgba(255, 248, 228, 0.16)";
        ctx.beginPath();
        ctx.moveTo(-24, -2);
        ctx.lineTo(0, -11);
        ctx.lineTo(24, -2);
        ctx.lineTo(0, 10);
        ctx.closePath();
        ctx.fill();

        if (!isCollapsed) {
          ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }

        if (forecast) {
          const ringRadius = 30 + Math.sin(state.ambientTime * 4 + lane) * 2;
          ctx.lineWidth = hover || active ? 4 : 3;
          ctx.strokeStyle =
            forecast.quality === "stable"
              ? `rgba(211, 255, 155, ${0.45 + integrity * 0.4})`
              : forecast.quality === "medium"
                ? `rgba(255, 222, 151, ${0.4 + integrity * 0.35})`
                : `rgba(255, 150, 172, ${0.38 + integrity * 0.35})`;
          ctx.beginPath();
          ctx.arc(0, -3, ringRadius, -Math.PI / 2, -Math.PI / 2 + integrity * Math.PI * 2);
          ctx.stroke();

          ctx.fillStyle = "rgba(9, 14, 22, 0.72)";
          ctx.fillRect(-30, 28, 60, 22);
          ctx.fillStyle = "#f8fafc";
          ctx.font = `700 12px ${DPR_SAFE_FONT}`;
          ctx.textAlign = "center";
          ctx.fillText(`${forecast.arrivalTime.toFixed(1)}s`, 0, 43);
        }

        if (isCollapsed || integrity < 0.5) {
          ctx.strokeStyle = `rgba(11, 16, 22, ${0.42 + (1 - integrity) * 0.3})`;
          ctx.lineWidth = 2;
          for (let crack = 0; crack < 3; crack += 1) {
            ctx.beginPath();
            ctx.moveTo(-12 + crack * 10, -2 + crack * 2);
            ctx.lineTo(-4 + crack * 12, 6 + crack * 2);
            ctx.lineTo(6 + crack * 9, 2 + crack * 7);
            ctx.stroke();
          }
        }

        ctx.restore();
      }

      function drawPads() {
        for (let column = 0; column < PAD_LAYOUT.length; column += 1) {
          for (let lane = 0; lane < 3; lane += 1) {
            drawPad(column, lane, getPad(column, lane));
          }
        }

        const finalPad = getPad(PAD_LAYOUT.length - 1, 1);
        ctx.save();
        ctx.translate(finalPad.x + 22, finalPad.y - 76);
        const beam = ctx.createRadialGradient(0, 0, 0, 0, 0, 86);
        beam.addColorStop(0, "rgba(254, 240, 138, 0.34)");
        beam.addColorStop(0.5, "rgba(94, 234, 212, 0.16)");
        beam.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = beam;
        ctx.beginPath();
        ctx.arc(0, 0, 86, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawForecastTrails() {
        if (state.mode !== "running" && state.mode !== "menu") {
          return;
        }

        const from = getPose(state.currentColumn, state.currentLane);
        const candidateColumn = getCandidateColumn();
        ctx.save();
        ctx.globalAlpha = 0.32;
        ctx.lineWidth = 2;
        for (let lane = 0; lane < 3; lane += 1) {
          const pad = getPad(candidateColumn, lane);
          const forecast = getForecastForLane(lane) || createForecasts(state.waveIndex)[lane];
          ctx.strokeStyle =
            forecast.quality === "stable"
              ? "rgba(211, 255, 155, 0.7)"
              : forecast.quality === "medium"
                ? "rgba(255, 214, 136, 0.58)"
                : "rgba(255, 152, 174, 0.54)";
          ctx.beginPath();
          ctx.moveTo(from.coreX, from.coreY);
          ctx.bezierCurveTo(
            from.coreX + 40,
            from.coreY - 82 + lane * 24,
            pad.x - 50,
            pad.y - 42,
            pad.x,
            pad.y - 8
          );
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawAnchorGuide() {
        if (state.mode !== "running" || state.currentColumn >= PAD_LAYOUT.length - 1) {
          return;
        }

        const guideLane = state.activeTargetLane ?? state.hoverLane;
        const targetPad = getPad(getCandidateColumn(), guideLane);
        const startX = state.player.x + 6;
        const startY = state.player.y - 8;

        ctx.save();
        ctx.setLineDash(state.activeTargetLane !== null ? [] : [9, 8]);
        ctx.strokeStyle =
          state.activeTargetLane !== null
            ? "rgba(255, 226, 165, 0.86)"
            : "rgba(159, 239, 255, 0.48)";
        ctx.lineWidth = state.activeTargetLane !== null ? 3.5 : 2.2;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(
          lerp(startX, targetPad.x, 0.48),
          Math.min(startY, targetPad.y) - 72,
          targetPad.x,
          targetPad.y - 14
        );
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        if (state.anchorHead) {
          ctx.save();
          ctx.translate(state.anchorHead.x, state.anchorHead.y);
          ctx.rotate(state.anchorHead.spin);
          ctx.shadowColor = "rgba(255, 208, 124, 0.85)";
          ctx.shadowBlur = 18;
          ctx.fillStyle = "#ffe3a4";
          ctx.beginPath();
          ctx.moveTo(0, -10);
          ctx.lineTo(8, 0);
          ctx.lineTo(0, 11);
          ctx.lineTo(-8, 0);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "#7dd3fc";
          ctx.beginPath();
          ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawCollapseFront() {
        if (state.mode !== "running" && state.mode !== "failed" && state.mode !== "cleared") {
          return;
        }

        ctx.save();
        ctx.translate(state.frontX, 0);
        const gradient = ctx.createLinearGradient(-38, 0, 26, 0);
        gradient.addColorStop(0, "rgba(5, 11, 18, 0)");
        gradient.addColorStop(0.34, `rgba(58, 181, 216, ${0.12 + state.frontAlpha * 0.1})`);
        gradient.addColorStop(0.68, `rgba(119, 244, 255, ${0.26 + state.frontAlpha * 0.24})`);
        gradient.addColorStop(1, `rgba(255, 193, 123, ${0.72 + state.frontAlpha * 0.12})`);
        ctx.fillStyle = gradient;
        ctx.fillRect(-42, 0, 70, VIEW.height);

        ctx.strokeStyle = `rgba(255, 244, 214, ${0.35 + state.frontAlpha * 0.45})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(10, 0);
        for (let y = 0; y <= VIEW.height; y += 14) {
          const drift = Math.sin(state.ambientTime * 7 + y * 0.08) * 9;
          ctx.lineTo(10 + drift, y);
        }
        ctx.stroke();

        ctx.strokeStyle = "rgba(255, 118, 140, 0.24)";
        ctx.lineWidth = 1.5;
        for (let shard = 0; shard < 8; shard += 1) {
          ctx.beginPath();
          const y = 36 + shard * 58;
          ctx.moveTo(-28, y);
          ctx.lineTo(24, y + Math.sin(state.ambientTime * 10 + shard) * 14);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawCargos() {
        state.cargos.forEach((cargo, index) => {
          const slot = getCargoSlot(index);
          ctx.save();
          ctx.strokeStyle =
            index === 0 ? "rgba(121, 236, 255, 0.5)" : "rgba(255, 214, 122, 0.44)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(state.core.x, state.core.y);
          ctx.quadraticCurveTo(
            lerp(state.core.x, cargo.x, 0.5),
            Math.min(state.core.y, cargo.y) - 24,
            cargo.x,
            cargo.y
          );
          ctx.stroke();

          ctx.translate(cargo.x, cargo.y);
          ctx.shadowColor = cargo.hue;
          ctx.shadowBlur = 16 + state.recallPulse * 12;
          ctx.fillStyle = cargo.hue;
          ctx.beginPath();
          ctx.moveTo(0, -12);
          ctx.lineTo(12, -2);
          ctx.lineTo(8, 12);
          ctx.lineTo(-8, 12);
          ctx.lineTo(-12, -2);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = "rgba(9, 13, 19, 0.82)";
          ctx.fillRect(-6, -1, 12, 7);
          ctx.restore();

          if (distance(cargo.x, cargo.y, slot.x, slot.y) < 42) {
            ctx.save();
            ctx.globalAlpha = 0.3 + state.recallPulse * 0.3;
            ctx.strokeStyle = cargo.hue;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cargo.x, cargo.y, 18 + Math.sin(state.ambientTime * 12 + index) * 2, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        });
      }

      function drawCoreAndPlayer() {
        const bob = Math.sin(state.player.bob) * 4;

        ctx.save();
        ctx.translate(state.core.x, state.core.y + bob * 0.4);
        const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 56);
        glow.addColorStop(0, "rgba(255, 241, 180, 0.95)");
        glow.addColorStop(0.36, "rgba(255, 217, 126, 0.58)");
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(0, 0, 56 + state.recallPulse * 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = "rgba(255, 235, 164, 0.9)";
        ctx.shadowBlur = 24;
        ctx.fillStyle = "#ffefb7";
        ctx.beginPath();
        ctx.arc(0, 0, 13, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#6ee7f9";
        ctx.beginPath();
        ctx.arc(0, 0, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.translate(state.player.x, state.player.y + bob);
        ctx.shadowColor = "rgba(8, 15, 24, 0.58)";
        ctx.shadowBlur = 12;
        ctx.fillStyle = "#111c2b";
        ctx.beginPath();
        ctx.ellipse(0, 26, 14, 8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#d9ac6a";
        ctx.beginPath();
        ctx.moveTo(0, -18);
        ctx.lineTo(11, -2);
        ctx.lineTo(8, 20);
        ctx.lineTo(-8, 20);
        ctx.lineTo(-11, -2);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#0b1624";
        ctx.beginPath();
        ctx.moveTo(-4, -18);
        ctx.lineTo(0, -32);
        ctx.lineTo(6, -18);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 245, 220, 0.9)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(8, -4);
        ctx.lineTo(20, -12);
        ctx.stroke();
        ctx.restore();
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          ctx.save();
          ctx.globalAlpha = particle.life / particle.maxLife;
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        state.fragments.forEach((fragment) => {
          ctx.save();
          ctx.translate(fragment.x, fragment.y);
          ctx.rotate(fragment.rot);
          ctx.globalAlpha = fragment.life / fragment.maxLife;
          ctx.fillStyle = fragment.color;
          ctx.fillRect(-fragment.size * 0.5, -fragment.size * 0.22, fragment.size, fragment.size * 0.44);
          ctx.restore();
        });
      }

      function drawTopHud() {
        ctx.save();
        ctx.fillStyle = "rgba(7, 16, 27, 0.72)";
        ctx.fillRect(18, 16, 232, 78);
        ctx.fillRect(710, 16, 232, 78);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
        ctx.lineWidth = 1;
        ctx.strokeRect(18, 16, 232, 78);
        ctx.strokeRect(710, 16, 232, 78);

        ctx.fillStyle = "#8cf3ff";
        ctx.font = `700 13px ${DPR_SAFE_FONT}`;
        ctx.fillText("TIDE READOUT", 32, 40);
        ctx.fillStyle = "#f8fafc";
        ctx.font = `800 26px ${DPR_SAFE_FONT}`;
        ctx.fillText(`${Math.min(TOTAL_WAVES, state.waveIndex + (state.mode === "running" ? 1 : 0))}/${TOTAL_WAVES}`, 32, 72);
        ctx.font = `600 12px ${DPR_SAFE_FONT}`;
        ctx.fillStyle = "rgba(226, 232, 240, 0.82)";
        ctx.fillText("조류 6파를 넘기면 종이 사원이 고정됩니다.", 84, 72);

        ctx.fillStyle = "#ffd580";
        ctx.font = `700 13px ${DPR_SAFE_FONT}`;
        ctx.fillText("ANCHOR STATUS", 724, 40);
        ctx.fillStyle = "#f8fafc";
        ctx.font = `700 17px ${DPR_SAFE_FONT}`;
        ctx.fillText(state.activeTargetLane === null ? "대기" : `${LANE_LABELS[state.activeTargetLane]} 고정중`, 724, 68);
        ctx.fillStyle = "rgba(226, 232, 240, 0.82)";
        ctx.font = `600 12px ${DPR_SAFE_FONT}`;
        ctx.fillText(`화물 ${Math.round(getSecuredCargoRatio() * 100)}% 회수`, 724, 86);
        ctx.restore();

        ctx.save();
        ctx.fillStyle = "rgba(7, 16, 27, 0.64)";
        ctx.fillRect(250, 16, 452, 50);
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.strokeRect(250, 16, 452, 50);
        ctx.fillStyle = "#e5edf6";
        ctx.font = `600 14px ${DPR_SAFE_FONT}`;
        ctx.fillText(state.currentHint, 270, 46);
        ctx.restore();
      }

      function drawBottomHud() {
        ctx.save();
        ctx.fillStyle = "rgba(7, 16, 27, 0.74)";
        ctx.fillRect(20, 472, 920, 48);
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.strokeRect(20, 472, 920, 48);

        ctx.fillStyle = "#f8fafc";
        ctx.font = `600 13px ${DPR_SAFE_FONT}`;
        ctx.fillText("탭 발사", 40, 500);
        ctx.fillStyle = "#8cf3ff";
        ctx.fillText("·", 101, 500);
        ctx.fillStyle = "#f8fafc";
        ctx.fillText("스와이프 회수", 118, 500);
        ctx.fillStyle = "#8cf3ff";
        ctx.fillText("·", 214, 500);
        ctx.fillStyle = "#f8fafc";
        ctx.fillText("화면 터치와 드래그만으로도 플레이 가능", 232, 500);

        const forecast = state.activeTargetLane !== null ? getForecastForLane(state.activeTargetLane) : getForecastForLane(state.hoverLane);
        if (forecast) {
          const barX = 710;
          const barY = 488;
          const barWidth = 190;
          const integrity = state.activeTargetLane !== null ? getCurrentIntegrity() : 1;
          ctx.fillStyle = "rgba(255,255,255,0.12)";
          ctx.fillRect(barX, barY, barWidth, 12);
          const gradient = ctx.createLinearGradient(barX, barY, barX + barWidth, barY);
          gradient.addColorStop(0, "#ff8b9b");
          gradient.addColorStop(0.5, "#ffd580");
          gradient.addColorStop(1, "#bef264");
          ctx.fillStyle = gradient;
          ctx.fillRect(barX, barY, barWidth * integrity, 12);
          ctx.fillStyle = "#cbd5e1";
          ctx.font = `600 11px ${DPR_SAFE_FONT}`;
          ctx.fillText("선택 기둥 잔여 안전도", barX, barY - 6);
        }
        ctx.restore();
      }

      function drawComboText() {
        if (state.comboTimer <= 0 || !state.comboText) {
          return;
        }
        ctx.save();
        ctx.globalAlpha = Math.min(1, state.comboTimer * 2.2);
        ctx.fillStyle = "#f8fafc";
        ctx.font = `800 26px ${DPR_SAFE_FONT}`;
        ctx.textAlign = "center";
        ctx.shadowColor = "rgba(0, 0, 0, 0.45)";
        ctx.shadowBlur = 18;
        ctx.fillText(state.comboText, VIEW.width * 0.5, 122 - (1 - state.comboTimer) * 14);
        ctx.restore();
        ctx.textAlign = "left";
      }

      function drawOverlay(title, accent, copyLines, ctaText) {
        const cardHeight = 320 + Math.max(0, copyLines.length - 4) * 34;
        const cardTop = -cardHeight * 0.5;
        const lineStartY = -18;
        const lineGap = 30;
        const buttonY = Math.min(
          lineStartY + copyLines.length * lineGap + 18,
          cardTop + cardHeight - 70
        );
        ctx.save();
        ctx.fillStyle = "rgba(5, 10, 18, 0.56)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.translate(VIEW.width * 0.5, VIEW.height * 0.5);
        ctx.fillStyle = "rgba(9, 16, 26, 0.88)";
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2.5;
        ctx.shadowColor = accent;
        ctx.shadowBlur = 24;
        ctx.beginPath();
        ctx.roundRect(-298, cardTop, 596, cardHeight, 26);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = accent;
        ctx.font = `800 18px ${DPR_SAFE_FONT}`;
        ctx.fillText("PAPER TEMPLE // TIDE ANCHOR", -246, -122);
        ctx.fillStyle = "#f8fafc";
        ctx.font = `900 42px ${DPR_SAFE_FONT}`;
        ctx.fillText(title, -246, -70);
        ctx.font = `600 17px ${DPR_SAFE_FONT}`;
        ctx.fillStyle = "rgba(226, 232, 240, 0.92)";
        copyLines.forEach((line, index) => {
          ctx.fillText(line, -246, lineStartY + index * lineGap);
        });

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(-246, buttonY, 492, 48);
        ctx.strokeStyle = "rgba(255,255,255,0.12)";
        ctx.strokeRect(-246, buttonY, 492, 48);
        ctx.fillStyle = "#fff7dd";
        ctx.font = `700 16px ${DPR_SAFE_FONT}`;
        ctx.fillText(ctaText, -222, buttonY + 31);
        ctx.restore();
      }

      function drawMenuOverlay() {
        drawOverlay(
          "예고선을 먼저 읽으세요",
          "#8cf3ff",
          [
            STAGE_META.description,
            "가장 늦게 무너질 다음 기둥을 탭해 대시하고,",
            "도착 직후 스와이프로 뒤처진 화물을 회수하세요.",
            "조작: 탭 발사 · 스와이프 회수 · 터치/드래그 플레이",
            "클리어: 조류 6파를 넘기며 발전기 지키기",
            "실패: 붕괴선 접촉 또는 중요 화물 유실",
          ],
          "화면 터치 또는 Enter로 시작"
        );
      }

      function drawFailOverlay() {
        drawOverlay(
          "붕괴선이 연결을 끊었습니다",
          "#ff8b9b",
          [
            state.lastReason || STAGE_META.failCondition,
            "안전 지대가 지나간 뒤 바로 무너져 다음 선택이 이어져야 합니다.",
            "예고 수치가 가장 큰 기둥을 먼저 찍고, 도착 즉시 회수하세요.",
            `생존 시간 ${state.lastRunTime.toFixed(1)}초`,
          ],
          "화면 터치 또는 Enter로 재도전"
        );
      }

      function drawClearOverlay() {
        drawOverlay(
          "발전기 봉인이 유지되었습니다",
          "#bef264",
          [
            "조류 6파를 모두 넘기며 종이 사원의 동력을 지켜냈습니다.",
            "붕괴선보다 빠르게 예측과 회수를 이어 간 판단이 적중했습니다.",
            `완주 기록 ${state.lastRunTime.toFixed(1)}초`,
            "호스트에서는 다음 스테이지로 이어집니다.",
          ],
          "화면 터치 또는 Enter로 다시 플레이"
        );
      }

      function drawPopups() {
        state.popups.forEach((popup) => {
          ctx.save();
          ctx.globalAlpha = popup.life / popup.maxLife;
          ctx.fillStyle = popup.color;
          ctx.font = `800 ${popup.size}px ${DPR_SAFE_FONT}`;
          ctx.textAlign = "center";
          ctx.shadowColor = "rgba(0, 0, 0, 0.42)";
          ctx.shadowBlur = 16;
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        });
        ctx.textAlign = "left";
      }

      function drawFlash() {
        if (state.flash <= 0) {
          return;
        }
        ctx.save();
        ctx.fillStyle = `rgba(255, 237, 188, ${state.flash * 0.22})`;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        ctx.restore();
      }

      function renderScene() {
        const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;

        ctx.save();
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        ctx.translate(shakeX, shakeY);
        drawBackdrop();
        drawCurrents();
        drawForecastTrails();
        drawPads();
        drawAnchorGuide();
        drawCollapseFront();
        drawCargos();
        drawCoreAndPlayer();
        drawParticles();
        if (state.mode === "running") {
          drawTopHud();
          drawBottomHud();
          drawComboText();
        }
        drawPopups();
        ctx.restore();
        drawFlash();

        if (state.mode === "menu") {
          drawMenuOverlay();
        } else if (state.mode === "failed") {
          drawTopHud();
          drawBottomHud();
          drawFailOverlay();
        } else if (state.mode === "cleared") {
          drawTopHud();
          drawBottomHud();
          drawClearOverlay();
        }
      }

      function renderGameToText() {
        return JSON.stringify({
          coordinate_system:
            "origin top-left, x right, y down. pads are the lane anchors by column from left to right.",
          mode: state.mode,
          wave: state.waveIndex + (state.mode === "running" ? 1 : 0),
          elapsed: Number(state.elapsed.toFixed(2)),
          current_column: state.currentColumn,
          current_lane: state.currentLane,
          hover_lane: state.hoverLane,
          active_target_lane: state.activeTargetLane,
          front_x: Number(state.frontX.toFixed(1)),
          core: { x: Number(state.core.x.toFixed(1)), y: Number(state.core.y.toFixed(1)) },
          cargos: state.cargos.map((cargo) => ({
            x: Number(cargo.x.toFixed(1)),
            y: Number(cargo.y.toFixed(1)),
          })),
          forecasts: state.preview.map((forecast) => ({
            lane: forecast.lane,
            arrival_time: Number(forecast.arrivalTime.toFixed(2)),
            quality: forecast.quality,
          })),
          relay_context: {
            previous_stage_id: relayContext.previousStageId,
            clear_count_before_this_stage: relayContext.clearCount,
            visited_stage_ids: relayContext.history,
          },
        });
      }

      function frame(timestamp) {
        const dt = lastTimestamp
          ? Math.min((timestamp - lastTimestamp) / 1000, MAX_DT)
          : FIXED_DT;
        lastTimestamp = timestamp;
        update(dt);
        renderScene();
        animationFrame = requestAnimationFrame(frame);
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const steps = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        renderScene();
        return renderGameToText();
      };
      window.relayStageMeta = {
        id: STAGE_META.id,
        title: STAGE_META.title,
        creator: STAGE_META.creator,
        genre: STAGE_META.genre,
        clearCondition: STAGE_META.clearCondition,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          if (state.mode !== "running") {
            beginRun();
          }
          state.waveIndex = TOTAL_WAVES;
          clearStage();
          renderScene();
        },
        forceFail() {
          if (state.mode !== "running") {
            beginRun();
          }
          failStage("debug_force_fail");
          renderScene();
        },
      };

      resetPlayerStack(0, 1);
      state.preview = createForecasts(0);
      state.hoverLane = 1;

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerCancel);
      canvas.addEventListener(
        "touchstart",
        (event) => {
          if (state.mode !== "running") {
            event.preventDefault();
            startFromTouch();
          }
        },
        { passive: false }
      );
      canvas.addEventListener("click", () => canvas.focus());
      window.addEventListener("keydown", onKeyDown);
      window.addEventListener("beforeunload", () => cancelAnimationFrame(animationFrame));

      reportReadyToHost();
      renderScene();
      canvas.focus();
      animationFrame = requestAnimationFrame(frame);
    </script>
  </body>
</html>
