<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dusk Subway: Orbit Shepherd</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050711;
        font-family: "Avenir Next", "Pretendard Variable", "Apple SD Gothic Neo", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(251, 146, 60, 0.14);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(12, 18, 34, 0.92);
        color: #f8fafc;
        font-weight: 700;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #050711;
        cursor: crosshair;
        touch-action: none;
      }

      canvas:focus-visible {
        outline: 4px solid rgba(248, 250, 252, 0.9);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Dusk Subway: Orbit Shepherd. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 마우스 또는
      터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 후반을 위해 중심 동선을 남겨두기, 모바일에서는
      화면 터치와 드래그만으로도 플레이 가능하게 구현 입니다. 클리어 조건은 축소 구간 끝까지 버티며
      위성 3기를 목표 링에 순서대로 통과시키면 클리어, 실패 조건은 안전 영역 밖에 오래 머물거나 위성이
      소멸 구역에 닿으면 즉시 실패 입니다.
    </p>
    <canvas id="game" width="960" height="540" aria-label="Dusk Subway: Orbit Shepherd" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const META = {
        id: "dusk-subway-orbit-herding-shrink",
        title: "Dusk Subway: Orbit Shepherd",
        creator: "jungcollin",
        genre: "Orbital survival / 축소 아레나",
        description: "황혼 지하철 빛 속에서 비콘 주위를 도는 위성 떼를 세 개의 링으로 순서 유도하는 축소 아레나 퍼즐",
        controls:
          "마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 후반을 위해 중심 동선을 남겨두기, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
        clearCondition: "축소 구간 끝까지 버티며 위성 3기를 목표 링에 순서대로 통과시키면 클리어",
        failCondition: "안전 영역 밖에 오래 머물거나 위성이 소멸 구역에 닿으면 즉시 실패",
      };

      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: canvas.width, height: canvas.height };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const SURVIVAL_TIME = 39;
      const SAFE_START_RADIUS = 228;
      const SAFE_END_RADIUS = 122;
      const ANNIHILATION_RADIUS = 286;
      const EXPOSURE_LIMIT = 1.35;
      const BEACON_RADIUS = 18;
      const CENTER = { x: VIEW.width * 0.5, y: VIEW.height * 0.56 };
      const PLAY_BOUNDS = { left: 92, right: VIEW.width - 92, top: 70, bottom: VIEW.height - 78 };
      const GATE_ANCHORS = [
        { x: -0.82, y: -0.34, hue: 196, label: "Gate 01", station: "West Transfer" },
        { x: 0.84, y: 0.08, hue: 32, label: "Gate 02", station: "Neon Platform" },
        { x: 0.14, y: 0.78, hue: 334, label: "Gate 03", station: "Last Tunnel" },
      ];
      const SATELLITE_PRESETS = [
        { baseOrbit: 74, finalOrbit: 58, speed: 2.55, hue: 196, label: "SAT-1" },
        { baseOrbit: 112, finalOrbit: 84, speed: 2.08, hue: 34, label: "SAT-2" },
        { baseOrbit: 148, finalOrbit: 118, speed: 1.78, hue: 334, label: "SAT-3" },
      ];
      const relayContext = window.RelayRuntime?.readContext(META.id) || {
        history: [],
        clearCount: 0,
        previousStageId: null,
      };
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const backgroundLayer = document.createElement("canvas");
      backgroundLayer.width = VIEW.width;
      backgroundLayer.height = VIEW.height;
      const backgroundCtx = backgroundLayer.getContext("2d");

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      const keyboard = {
        left: false,
        right: false,
        up: false,
        down: false,
      };

      const pointer = {
        active: false,
        pointerId: null,
        x: CENTER.x,
        y: CENTER.y,
        downX: 0,
        downY: 0,
        downTime: 0,
        moved: false,
        startedRound: false,
        suppressClickUntil: 0,
      };

      const state = {
        mode: "menu",
        elapsed: 0,
        lastRunTime: 0,
        safeRadius: SAFE_START_RADIUS,
        exposure: 0,
        orbitDirection: 1,
        gateIndex: 0,
        beacon: createBeacon(),
        satellites: createSatellites(),
        gate: null,
        particles: [],
        popups: [],
        ambientClock: 0,
        trailClock: 0,
        flash: 0,
        invertFlash: 0,
        gatePulse: 0,
        shake: 0,
        lastReason: "",
        warningLevel: 0,
        subwaySweep: 0,
        reducedMotion: prefersReducedMotion,
      };

      function createBeacon() {
        return {
          x: CENTER.x,
          y: CENTER.y,
          targetX: CENTER.x,
          targetY: CENTER.y,
          vx: 0,
          vy: 0,
          glow: 0,
          phase: 0,
        };
      }

      function createSatellites() {
        return SATELLITE_PRESETS.map((preset, index) => ({
          index,
          label: preset.label,
          baseOrbit: preset.baseOrbit,
          finalOrbit: preset.finalOrbit,
          orbit: preset.baseOrbit,
          speed: preset.speed,
          hue: preset.hue,
          angle: -Math.PI / 3 + index * 2.02,
          x: CENTER.x,
          y: CENTER.y,
          prevX: CENTER.x,
          prevY: CENTER.y,
          radius: 10 + index * 1.8,
          delivered: false,
          gateDistance: Infinity,
          pulse: 0,
          wobbleSeed: 0.9 + index * 1.4,
          trail: [],
        }));
      }

      function createGate(index) {
        const anchor = GATE_ANCHORS[Math.min(index, GATE_ANCHORS.length - 1)];
        return {
          index,
          anchorX: anchor.x,
          anchorY: anchor.y,
          hue: anchor.hue,
          label: anchor.label,
          station: anchor.station,
          x: CENTER.x,
          y: CENTER.y,
          radius: 26,
          captureRadius: 24,
          trackRadius: 0,
          spin: 0,
          warmup: 0.35,
        };
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function distance(a, b) {
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        return Math.hypot(dx, dy);
      }

      function angleToVector(angle, radiusX, radiusY) {
        return {
          x: Math.cos(angle) * radiusX,
          y: Math.sin(angle) * radiusY,
        };
      }

      function hsl(h, s, l, a = 1) {
        return `hsla(${h}, ${s}%, ${l}%, ${a})`;
      }

      function roundedRectPath(context, x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function fillRoundedRect(context, x, y, width, height, radius, fillStyle) {
        roundedRectPath(context, x, y, width, height, radius);
        context.fillStyle = fillStyle;
        context.fill();
      }

      function strokeRoundedRect(context, x, y, width, height, radius, strokeStyle, lineWidth = 1) {
        roundedRectPath(context, x, y, width, height, radius);
        context.lineWidth = lineWidth;
        context.strokeStyle = strokeStyle;
        context.stroke();
      }

      function wrapText(context, text, maxWidth) {
        const words = String(text || "").split(/\s+/).filter(Boolean);
        const lines = [];
        let line = "";
        for (const word of words) {
          const testLine = line ? `${line} ${word}` : word;
          if (context.measureText(testLine).width <= maxWidth || !line) {
            line = testLine;
          } else {
            lines.push(line);
            line = word;
          }
        }
        if (line) {
          lines.push(line);
        }
        return lines;
      }

      function formatTime(value) {
        return Math.max(0, value).toFixed(1);
      }

      function describeReason(reason) {
        switch (reason) {
          case "annihilation":
            return "위성이 소멸 구역을 스쳤습니다.";
          case "exposure":
            return "비콘이 안전권 바깥에 너무 오래 머물렀습니다.";
          case "timeout":
            return "축소 종료 전까지 세 번째 위성을 통과시키지 못했습니다.";
          default:
            return "신호가 끊겼습니다. 다시 정렬하세요.";
        }
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function resetRound() {
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.safeRadius = SAFE_START_RADIUS;
        state.exposure = 0;
        state.orbitDirection = 1;
        state.gateIndex = 0;
        state.warningLevel = 0;
        state.flash = 0;
        state.invertFlash = 0;
        state.gatePulse = 0;
        state.shake = 0;
        state.lastReason = "";
        state.particles = [];
        state.popups = [];
        state.beacon = createBeacon();
        state.satellites = createSatellites();
        state.gate = createGate(0);
        pointer.x = CENTER.x;
        pointer.y = CENTER.y;
        hostFailedReported = false;
        hostClearedReported = false;
      }

      function startStage() {
        resetRound();
        state.mode = "running";
        window.relayStageResult.status = "running";
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.flash = 0.46;
        state.shake = 0.9;
        window.relayStageResult.status = "failed";
        spawnBurst(state.beacon.x, state.beacon.y, 6, 22, 20);
        spawnPopup("LINK LOST", state.beacon.x, state.beacon.y - 46, hsl(8, 88, 64), 26);
        reportFailedToHost(reason);
      }

      function clearStage() {
        if (state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.flash = 0.65;
        state.gatePulse = 1;
        window.relayStageResult.status = "cleared";
        for (const satellite of state.satellites) {
          spawnBurst(satellite.x, satellite.y, satellite.hue, 18, 16);
        }
        spawnPopup("ALL GATES LOCKED", CENTER.x, CENTER.y - 80, hsl(52, 92, 68), 28);
        reportClearedToHost();
      }

      function spawnBurst(x, y, hue, count, speed) {
        const actualCount = state.reducedMotion ? Math.ceil(count * 0.35) : count;
        for (let index = 0; index < actualCount; index += 1) {
          const angle = (Math.PI * 2 * index) / Math.max(1, actualCount) + Math.random() * 0.44;
          const magnitude = speed * (0.45 + Math.random() * 0.9);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * magnitude,
            vy: Math.sin(angle) * magnitude,
            life: 0.55 + Math.random() * 0.3,
            age: 0,
            size: 2 + Math.random() * 4,
            hue,
          });
        }
      }

      function spawnPopup(text, x, y, color, size) {
        state.popups.push({
          text,
          x,
          y,
          vy: -18,
          age: 0,
          life: 1.1,
          color,
          size,
        });
      }

      function setPointerTarget(position) {
        pointer.x = clamp(position.x, PLAY_BOUNDS.left, PLAY_BOUNDS.right);
        pointer.y = clamp(position.y, PLAY_BOUNDS.top, PLAY_BOUNDS.bottom);
        state.beacon.targetX = pointer.x;
        state.beacon.targetY = pointer.y;
      }

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = VIEW.width / rect.width;
        const scaleY = VIEW.height / rect.height;
        return {
          x: (event.clientX - rect.left) * scaleX,
          y: (event.clientY - rect.top) * scaleY,
        };
      }

      function toggleOrbit() {
        if (state.mode !== "running") {
          return;
        }
        state.orbitDirection *= -1;
        state.invertFlash = 1;
        state.gatePulse = Math.max(state.gatePulse, 0.36);
        state.shake = Math.max(state.shake, 0.24);
        state.beacon.glow = 1;
        spawnBurst(state.beacon.x, state.beacon.y, state.orbitDirection > 0 ? 188 : 338, 16, 14);
        spawnPopup(state.orbitDirection > 0 ? "CW" : "CCW", state.beacon.x, state.beacon.y - 40, hsl(46, 96, 72), 22);
      }

      function onPointerDown(event) {
        const position = pointFromEvent(event);
        canvas.focus();
        pointer.active = true;
        pointer.pointerId = event.pointerId;
        pointer.downX = position.x;
        pointer.downY = position.y;
        pointer.downTime = performance.now();
        pointer.moved = false;
        pointer.startedRound = false;
        setPointerTarget(position);
        canvas.setPointerCapture?.(event.pointerId);

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          pointer.startedRound = true;
          pointer.suppressClickUntil = performance.now() + 260;
        }
      }

      function handleClickFallback(event) {
        if (performance.now() < pointer.suppressClickUntil) {
          return;
        }
        if (pointer.active) {
          return;
        }
        const position = pointFromEvent(event);
        canvas.focus();
        setPointerTarget(position);
        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          startStage();
          pointer.suppressClickUntil = performance.now() + 260;
          return;
        }
        toggleOrbit();
      }

      function onPointerMove(event) {
        const position = pointFromEvent(event);
        if (event.pointerType === "mouse" && state.mode === "running") {
          setPointerTarget(position);
        }

        if (!pointer.active || pointer.pointerId !== event.pointerId) {
          return;
        }
        if (Math.hypot(position.x - pointer.downX, position.y - pointer.downY) > 10) {
          pointer.moved = true;
        }
        if (state.mode === "running") {
          setPointerTarget(position);
        }
      }

      function onPointerUp(event) {
        if (pointer.pointerId !== event.pointerId) {
          return;
        }
        const releasedQuickly = performance.now() - pointer.downTime < 220;
        if (state.mode === "running" && !pointer.startedRound && !pointer.moved && releasedQuickly) {
          toggleOrbit();
        }
        pointer.active = false;
        pointer.pointerId = null;
        pointer.startedRound = false;
        canvas.releasePointerCapture?.(event.pointerId);
      }

      function onKeyChange(event, active) {
        switch (event.key) {
          case "ArrowLeft":
          case "a":
          case "A":
            keyboard.left = active;
            break;
          case "ArrowRight":
          case "d":
          case "D":
            keyboard.right = active;
            break;
          case "ArrowUp":
          case "w":
          case "W":
            keyboard.up = active;
            break;
          case "ArrowDown":
          case "s":
          case "S":
            keyboard.down = active;
            break;
          case " ":
          case "Enter":
            if (active) {
              if (state.mode === "running") {
                toggleOrbit();
              } else {
                startStage();
              }
            }
            break;
          case "f":
          case "F":
            if (active) {
              toggleFullscreen();
            }
            break;
          default:
            return;
        }
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "a", "A", "d", "D", "w", "W", "s", "S", " ", "Enter", "f", "F"].includes(event.key)) {
          event.preventDefault();
        }
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.().catch(() => {});
        } else {
          document.exitFullscreen?.().catch(() => {});
        }
      }

      function updateKeyboardTarget(dt) {
        const horizontal = (keyboard.right ? 1 : 0) - (keyboard.left ? 1 : 0);
        const vertical = (keyboard.down ? 1 : 0) - (keyboard.up ? 1 : 0);
        if (!horizontal && !vertical) {
          return;
        }
        setPointerTarget({
          x: state.beacon.targetX + horizontal * 290 * dt,
          y: state.beacon.targetY + vertical * 290 * dt,
        });
      }

      function updateAmbientWarnings() {
        const timeLeft = SURVIVAL_TIME - state.elapsed;
        if (timeLeft < 12 && state.warningLevel < 1) {
          state.warningLevel = 1;
          spawnPopup("CENTER LANE", CENTER.x, 84, hsl(44, 96, 72), 24);
        }
        if (timeLeft < 6 && state.warningLevel < 2) {
          state.warningLevel = 2;
          spawnPopup("FINAL SHRINK", CENTER.x, 112, hsl(12, 94, 68), 26);
          state.flash = Math.max(state.flash, 0.2);
        }
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.safeRadius = lerp(SAFE_START_RADIUS, SAFE_END_RADIUS, clamp(state.elapsed / SURVIVAL_TIME, 0, 1));
        state.beacon.phase += dt * 2.8;
        state.subwaySweep += dt * (state.reducedMotion ? 0.28 : 0.8);

        updateKeyboardTarget(dt);

        const beaconResponse = 1 - Math.exp(-dt * 8.2);
        const previousBeaconX = state.beacon.x;
        const previousBeaconY = state.beacon.y;
        state.beacon.x = lerp(state.beacon.x, state.beacon.targetX, beaconResponse);
        state.beacon.y = lerp(state.beacon.y, state.beacon.targetY, beaconResponse);
        state.beacon.vx = (state.beacon.x - previousBeaconX) / dt;
        state.beacon.vy = (state.beacon.y - previousBeaconY) / dt;
        state.beacon.glow = Math.max(0, state.beacon.glow - dt * 1.3);

        updateGate(dt);
        updateSatellites(dt);
        updateExposure(dt);
        updateAmbientWarnings();

        if (state.elapsed >= SURVIVAL_TIME) {
          if (state.gateIndex >= state.satellites.length) {
            clearStage();
          } else {
            failStage("timeout");
          }
        }
      }

      function updateGate(dt) {
        if (!state.gate) {
          return;
        }
        state.gate.warmup = Math.max(0, state.gate.warmup - dt);
        state.gate.spin += dt * (state.orbitDirection > 0 ? 1.7 : -1.7);
        state.gate.radius = 25 + Math.sin(state.ambientClock * 3.6 + state.gate.index) * 1.8;
        state.gate.captureRadius = state.gate.radius - 2;
        state.gate.trackRadius = clamp(
          state.safeRadius * 0.72 + Math.sin(state.elapsed * 1.8 + state.gate.index * 1.3) * 12,
          84,
          172
        );
        state.gate.x = CENTER.x + state.gate.anchorX * state.gate.trackRadius;
        state.gate.y = CENTER.y + state.gate.anchorY * state.gate.trackRadius;
      }

      function updateSatellites(dt) {
        const activeSatellite = state.satellites[state.gateIndex];
        state.trailClock += dt;
        for (const satellite of state.satellites) {
          satellite.prevX = satellite.x;
          satellite.prevY = satellite.y;
          satellite.pulse = Math.max(0, satellite.pulse - dt * 1.8);

          const orbitTarget = satellite.delivered ? satellite.finalOrbit : satellite.baseOrbit;
          satellite.orbit = lerp(satellite.orbit, orbitTarget, 1 - Math.exp(-dt * 4.8));
          satellite.angle += state.orbitDirection * satellite.speed * dt;

          const ellipse = angleToVector(
            satellite.angle,
            satellite.orbit + Math.sin(state.elapsed * (1.6 + satellite.index * 0.22) + satellite.wobbleSeed) * 7,
            satellite.orbit * 0.78 + Math.cos(state.elapsed * (1.2 + satellite.index * 0.34) + satellite.wobbleSeed) * 5
          );
          satellite.x = state.beacon.x + ellipse.x;
          satellite.y = state.beacon.y + ellipse.y;

          if (state.trailClock >= 1 / 60) {
            satellite.trail.push({ x: satellite.x, y: satellite.y });
            if (satellite.trail.length > 18) {
              satellite.trail.shift();
            }
          }

          const centerDistance = distance(satellite, CENTER);
          if (state.mode === "running" && centerDistance >= ANNIHILATION_RADIUS - satellite.radius * 0.15) {
            failStage("annihilation");
            return;
          }

          if (state.mode === "running" && satellite === activeSatellite && state.gate && state.gate.warmup <= 0) {
            const gateDistance = distance(satellite, state.gate);
            if (
              satellite.gateDistance > state.gate.captureRadius + satellite.radius * 0.4 &&
              gateDistance <= state.gate.captureRadius
            ) {
              scoreSatellite(satellite);
            }
            satellite.gateDistance = gateDistance;
          } else {
            satellite.gateDistance = Infinity;
          }
        }
        state.trailClock = 0;
      }

      function scoreSatellite(satellite) {
        satellite.delivered = true;
        satellite.pulse = 1;
        state.gatePulse = 1;
        state.flash = 0.28;
        state.shake = Math.max(state.shake, 0.42);
        spawnBurst(state.gate.x, state.gate.y, satellite.hue, 30, 26);
        spawnPopup(`${satellite.label} LOCK`, state.gate.x, state.gate.y - 28, hsl(satellite.hue, 90, 68), 24);
        state.gateIndex += 1;
        if (state.gateIndex < state.satellites.length) {
          state.gate = createGate(state.gateIndex);
        } else {
          state.gate = null;
          spawnPopup("SURVIVE THE SHRINK", CENTER.x, 100, hsl(52, 96, 70), 26);
        }
      }

      function updateExposure(dt) {
        const distanceFromCenter = distance(state.beacon, CENTER);
        const safeEdge = state.safeRadius - BEACON_RADIUS * 0.5;
        const overshoot = Math.max(0, distanceFromCenter - safeEdge);
        if (overshoot > 0) {
          state.exposure += dt * (0.72 + overshoot / 24);
        } else {
          state.exposure -= dt * 0.86;
        }
        state.exposure = clamp(state.exposure, 0, EXPOSURE_LIMIT);
        if (state.exposure >= EXPOSURE_LIMIT) {
          failStage("exposure");
        }
      }

      function updateEffects(dt) {
        state.ambientClock += dt;
        state.flash = Math.max(0, state.flash - dt * 1.7);
        state.invertFlash = Math.max(0, state.invertFlash - dt * 2.2);
        state.gatePulse = Math.max(0, state.gatePulse - dt * 1.6);
        state.shake = Math.max(0, state.shake - dt * 1.9);

        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.age += dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= 0.97;
          particle.vy *= 0.97;
          if (particle.age >= particle.life) {
            state.particles.splice(index, 1);
          }
        }

        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.age += dt;
          popup.y += popup.vy * dt;
          if (popup.age >= popup.life) {
            state.popups.splice(index, 1);
          }
        }
      }

      function updateMenuPreview(dt) {
        state.safeRadius = SAFE_START_RADIUS - 18;
        state.beacon.phase += dt * 1.6;
        state.beacon.targetX = CENTER.x + Math.sin(state.ambientClock * 0.78) * 72;
        state.beacon.targetY = CENTER.y + Math.cos(state.ambientClock * 1.05) * 46;
        state.beacon.x = lerp(state.beacon.x, state.beacon.targetX, 1 - Math.exp(-dt * 2.4));
        state.beacon.y = lerp(state.beacon.y, state.beacon.targetY, 1 - Math.exp(-dt * 2.4));
        updateGate(dt);
        updateSatellites(dt);
      }

      function update(dt) {
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          updateMenuPreview(dt);
        }
        updateEffects(dt);
      }

          return;

        ctx.save();
        ctx.translate(state.gate.x, state.gate.y);
        ctx.rotate(state.gate.spin);

        const glow = ctx.createRadialGradient(0, 0, 6, 0, 0, 42 + state.gatePulse * 22);

        glow.addColorStop(0.45, hsl(state.gate.hue, 94, 56, 0.12));
        glow.addColorStop(1, "rgba(0,0,0,0)");

        ctx.beginPath();
        ctx.arc(0, 0, 44 + state.gatePulse * 24, 0, Math.PI * 2);

        ctx.strokeStyle = hsl(state.gate.hue, 92, 66, 0.9);

      function drawTrails() {
        for (const satellite of state.satellites) {
          if (satellite.trail.length < 2) {
            continue;
          }
          for (let index = 1; index < satellite.trail.length; index += 1) {
            const previous = satellite.trail[index - 1];
            const current = satellite.trail[index];
            ctx.strokeStyle = hsl(satellite.hue, 92, 68, (index / satellite.trail.length) * 0.18);
            ctx.lineWidth = 2 + (index / satellite.trail.length) * 3;
            ctx.beginPath();
            ctx.moveTo(previous.x, previous.y);
            ctx.lineTo(current.x, current.y);
            ctx.stroke();
          }
        }
      }

        overlayGradient.addColorStop(0, "rgba(13, 18, 35, 0.94)");
        overlayGradient.addColorStop(0.6, "rgba(9, 12, 23, 0.92)");
        overlayGradient.addColorStop(1, "rgba(26, 14, 28, 0.9)");
        fillRoundedRect(ctx, 152, 92, VIEW.width - 304, VIEW.height - 184, 34, overlayGradient);
        strokeRoundedRect(ctx, 152, 92, VIEW.width - 304, VIEW.height - 184, 34, "rgba(255,255,255,0.1)", 1.5);

        ctx.textAlign = "left";
        ctx.fillStyle = hsl(accentHue, 94, 72);
        ctx.font = '700 13px "Space Grotesk", "Pretendard Variable", sans-serif';
        ctx.fillText("TWILIGHT RELAY", 190, 140);

        ctx.fillStyle = "rgba(248, 250, 255, 0.98)";
        ctx.font = '700 42px "Space Grotesk", "Pretendard Variable", sans-serif';
        ctx.fillText(title, 190, 196);

        let y = 244;
        ctx.font = '500 18px "Pretendard Variable", "Apple SD Gothic Neo", sans-serif';
        ctx.fillStyle = "rgba(220, 228, 255, 0.88)";
        for (const line of lines) {
          const wrapped = wrapText(ctx, line, VIEW.width - 380);
          for (const row of wrapped) {
            ctx.fillText(row, 190, y);
            y += 30;
          }
          y += 12;
        }

        ctx.fillStyle = "rgba(255, 239, 186, 0.92)";
        ctx.font = '600 16px "Pretendard Variable", "Apple SD Gothic Neo", sans-serif';
        const footerLines = wrapText(ctx, footer, VIEW.width - 380);
        for (const row of footerLines) {
          ctx.fillText(row, 190, y + 14);
          y += 26;
        }
      }

      function drawMenu() {
        drawOverlay("Orbit Shepherd", 32, [META.description, META.controls, META.clearCondition, META.failCondition], "탭, 클릭, Enter 중 하나로 바로 출발합니다.");
      }

      function drawResult() {
        if (state.mode === "cleared") {
          drawOverlay(
            "Route Secured",
            52,
            [
              "세 위성이 순서대로 게이트를 통과했고 마지막 축소 구간도 버텼습니다.",
              `기록 ${formatTime(state.lastRunTime)}초`,
              META.clearCondition,
            ],
            "탭 또는 클릭으로 같은 패턴을 다시 재생할 수 있습니다."
          );
          return;
        }

        drawOverlay(
          "Signal Lost",
          8,
          [
            describeReason(state.lastReason),
            `기록 ${formatTime(state.lastRunTime)}초`,
            META.failCondition,
          ],
          "탭 또는 클릭으로 즉시 재시작합니다."
        );
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);
        const shakeAmount = state.reducedMotion ? 0 : state.shake * 8;
        const offsetX = shakeAmount ? (Math.random() - 0.5) * shakeAmount : 0;
        const offsetY = shakeAmount ? (Math.random() - 0.5) * shakeAmount : 0;

        ctx.save();
        ctx.translate(offsetX, offsetY);
        drawBackground();
        drawArena();
        drawGate();
        drawTrails();
        drawBeacon();
        drawSatellites();
        drawParticles();
        drawHud();
        drawPopups();
        ctx.restore();

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255, 244, 214, ${state.flash * 0.18})`;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
        }

        if (state.mode === "menu") {
          drawMenu();
        } else if (state.mode === "failed" || state.mode === "cleared") {
          drawResult();
        }
      }

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        let deltaSeconds = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;
        while (deltaSeconds > 0) {
          const step = Math.min(FIXED_DT, deltaSeconds);
          update(step);
          deltaSeconds -= step;
        }
        render();
        animationFrame = requestAnimationFrame(loop);
      }

      function renderGameToText() {
        return JSON.stringify({
          mode: state.mode,
          coordSystem: "origin top-left; +x right; +y down",
          timeLeft: Number(Math.max(0, SURVIVAL_TIME - state.elapsed).toFixed(2)),
          safeRadius: Number(state.safeRadius.toFixed(1)),
          exposure: Number(state.exposure.toFixed(2)),
          orbitDirection: state.orbitDirection > 0 ? "clockwise" : "counterclockwise",
          beacon: {
            x: Number(state.beacon.x.toFixed(1)),
            y: Number(state.beacon.y.toFixed(1)),
            targetX: Number(state.beacon.targetX.toFixed(1)),
            targetY: Number(state.beacon.targetY.toFixed(1)),
          },
          targetSatellite: state.gateIndex < state.satellites.length ? state.satellites[state.gateIndex].label : null,
          gate: state.gate
            ? {
                x: Number(state.gate.x.toFixed(1)),
                y: Number(state.gate.y.toFixed(1)),
                radius: Number(state.gate.captureRadius.toFixed(1)),
                label: state.gate.label,
              }
            : null,
          satellites: state.satellites.map((satellite) => ({
            id: satellite.label,
            x: Number(satellite.x.toFixed(1)),
            y: Number(satellite.y.toFixed(1)),
            orbit: Number(satellite.orbit.toFixed(1)),
            delivered: satellite.delivered,
          })),
          note: META.description,
        });
      }

      function advanceTime(ms) {
        if (state.mode === "menu") {
          startStage();
        }
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      }

      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceTime;
      window.relayStageMeta = {
        id: META.id,
        title: META.title,
        creator: META.creator,
        genre: META.genre,
        clearCondition: META.clearCondition,
        failCondition: META.failCondition,
        controls: META.controls,
      };
      window.relayStageResult = { status: "running" };
      window.relayStageDebug = {
        forceClear() {
          state.gateIndex = state.satellites.length;
          for (const satellite of state.satellites) {
            satellite.delivered = true;
          }
          state.elapsed = SURVIVAL_TIME;
          clearStage();
          render();
        },
        forceFail() {
          failStage("debug");
          render();
        },
      };

      canvas.addEventListener("pointerdown", onPointerDown);
      canvas.addEventListener("pointermove", onPointerMove);
      canvas.addEventListener("pointerup", onPointerUp);
      canvas.addEventListener("pointercancel", onPointerUp);
      canvas.addEventListener("click", handleClickFallback);
      canvas.addEventListener("pointerleave", (event) => {
        if (event.pointerType !== "mouse") {
          return;
        }
        pointer.active = false;
        pointer.pointerId = null;
      });

      window.addEventListener("keydown", (event) => onKeyChange(event, true));
      window.addEventListener("keyup", (event) => onKeyChange(event, false));
      window.addEventListener("blur", () => {
        keyboard.left = false;
        keyboard.right = false;
        keyboard.up = false;
        keyboard.down = false;
        pointer.active = false;
      });
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          lastTimestamp = 0;
        }
      });

      resetRound();
      paintStaticBackground();
      state.mode = "menu";
      window.relayStageResult.status = "running";
      reportReadyToHost();
      render();
      animationFrame = requestAnimationFrame(loop);
    </script>
  </body>
</html>
