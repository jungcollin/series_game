<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>색 연금술사</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background: #faf7f2; display: grid; place-items: center;
      }
      a, canvas { -webkit-tap-highlight-color: rgba(100, 100, 140, 0.2); }
      .skip-link {
        position: absolute; top: 12px; left: 12px; z-index: 10;
        width: 1px; height: 1px; padding: 0; overflow: hidden;
        clip: rect(0, 0, 0, 0); clip-path: inset(50%);
        border-radius: 999px; background: rgba(60, 50, 80, 0.92);
        color: #faf7f2; font-weight: 800; text-decoration: none; white-space: nowrap;
      }
      .skip-link:focus, .skip-link:focus-visible {
        width: auto; height: auto; padding: 12px 16px;
        overflow: visible; clip: auto; clip-path: none;
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
      }
      canvas {
        display: block; width: 100%; height: 100%;
        max-width: 100%; max-height: 100%;
        object-fit: contain; background: #faf7f2; touch-action: none;
      }
      canvas:focus-visible { outline: 4px solid rgba(100, 100, 140, 0.5); outline-offset: -8px; }
      .mobile-controls { display: none; }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important; animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important; scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">색 연금술사. 물감을 드래그로 섞어 목표 색상을 만드세요. 모바일에서는 화면의 물감 원을 터치하여 혼합 영역으로 드래그합니다. PC에서는 마우스로 드래그합니다. 목표 색 5개를 만들면 클리어. 오답 3회 시 실패.</p>
    <canvas id="game" width="960" height="540" aria-label="색 연금술사" aria-describedby="stage-instructions" tabindex="0"></canvas>
    <div class="mobile-controls"></div>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const W = canvas.width, H = canvas.height;
      const CX = W / 2, CY = H / 2;
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const META = {
        id: "color-alchemist",
        title: "색 연금술사",
        description: "물감을 드래그로 섞어 목표 색상을 만드세요.",
        creator: "jungcollin",
        genre: "Color mixing puzzle",
        clearCondition: "목표 색 5개를 만들면 클리어",
        failCondition: "오답 3회 시 실패",
        controls: "터치로 물감을 드래그하여 혼합",
      };

      const relayContext = window.RelayRuntime?.readContext(META.id) || { history: [], clearCount: 0, previousStageId: null };
      window.relayStageMeta = { id: META.id, title: META.title, description: META.description, creator: META.creator, genre: META.genre, clearCondition: META.clearCondition, failCondition: META.failCondition, controls: META.controls };
      window.relayStageResult = { status: "running" };

      const COL = { bg: "#faf7f2", bgDark: "#eee8dd", text: "#3c3250", textLight: "rgba(60,50,80,0.6)", accent: "#7b68ae", fail: "#c04040" };

      const TARGET_COUNT = 5, MAX_FAILS = 3;
      const PALETTE_COLORS = [
        { name: "빨강", r: 220, g: 50, b: 50 },
        { name: "파랑", r: 50, g: 80, b: 220 },
        { name: "노랑", r: 240, g: 210, b: 40 },
        { name: "흰색", r: 240, g: 240, b: 240 },
      ];

      const RECIPES = [
        { a: 0, b: 2, name: "주황", r: 230, g: 130, b: 45 },
        { a: 0, b: 1, name: "보라", r: 135, g: 65, b: 135 },
        { a: 1, b: 2, name: "초록", r: 80, g: 160, b: 60 },
        { a: 0, b: 3, name: "분홍", r: 230, g: 145, b: 145 },
        { a: 1, b: 3, name: "하늘", r: 145, g: 160, b: 230 },
        { a: 2, b: 3, name: "크림", r: 240, g: 225, b: 140 },
      ];

      let mode = "menu", elapsed = 0, score = 0, failCount = 0;
      let lastTimestamp = 0, animFrame = 0;
      let hostFailedReported = false, hostClearedReported = false;
      let shake = 0, flashAlpha = 0, clearAnim = 0;
      let currentTarget = null;
      let mixSlots = [null, null];
      let dragging = null;
      let dragX = 0, dragY = 0;
      let particles = [];
      let resultMsg = "", resultTimer = 0;
      let palettePositions = [];
      let mixAreaX = CX, mixAreaY = CY + 60;

      function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
      function rand(lo, hi) { return lo + Math.random() * (hi - lo); }

      function inRelayHost() { try { return window.parent && window.parent !== window && window.parent.RelayHost; } catch { return false; } }
      function reportReady() { if (inRelayHost()) window.parent.RelayHost.onStageReady?.(window.relayStageMeta); }
      function reportFailed(reason) { if (!inRelayHost() || hostFailedReported) return; hostFailedReported = true; window.parent.RelayHost.onStageFailed?.({ stageId: META.id, stageTitle: META.title, reason, durationSec: +elapsed.toFixed(1) }); }
      function reportCleared() { if (!inRelayHost() || hostClearedReported) return; hostClearedReported = true; window.parent.RelayHost.onStageCleared?.({ stageId: META.id, stageTitle: META.title, clearCountAfter: relayContext.clearCount + 1, durationSec: +elapsed.toFixed(1) }); }

      function setupPalette() {
        palettePositions = [];
        const startX = CX - 150, y = 100, gap = 100;
        for (let i = 0; i < PALETTE_COLORS.length; i++) {
          palettePositions.push({ x: startX + i * gap, y, r: 30 });
        }
      }

      function pickTarget() {
        const available = RECIPES.filter(r => true);
        currentTarget = available[Math.floor(Math.random() * available.length)];
        mixSlots = [null, null];
      }

      function spawnParticles(x, y, count, color) {
        if (reducedMotion) count = Math.min(count, 3);
        for (let i = 0; i < count; i++) {
          const angle = rand(0, Math.PI * 2), speed = rand(40, 120);
          particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, color, size: rand(3, 7) });
        }
      }

      function reset() {
        elapsed = 0; score = 0; failCount = 0;
        shake = 0; flashAlpha = 0; clearAnim = 0;
        hostFailedReported = false; hostClearedReported = false;
        window.relayStageResult.status = "running";
        particles = []; resultMsg = ""; resultTimer = 0;
        setupPalette(); pickTarget();
      }

      function checkMix() {
        if (mixSlots[0] === null || mixSlots[1] === null) return;
        const a = Math.min(mixSlots[0], mixSlots[1]);
        const b = Math.max(mixSlots[0], mixSlots[1]);
        const match = currentTarget.a === a && currentTarget.b === b;
        if (match) {
          score++;
          resultMsg = "정답!";
          const tc = currentTarget;
          spawnParticles(mixAreaX, mixAreaY, 15, `rgb(${tc.r},${tc.g},${tc.b})`);
        } else {
          failCount++;
          resultMsg = "오답...";
          shake = 6; flashAlpha = 0.2;
        }
        resultTimer = 1.2;

        if (score >= TARGET_COUNT) {
          mode = "clear"; clearAnim = 0;
          window.relayStageResult.status = "cleared"; reportCleared();
        } else if (failCount >= MAX_FAILS) {
          mode = "failed"; window.relayStageResult.status = "failed";
          reportFailed("오답 초과");
        }
      }

      function update(dt) {
        if (mode !== "running") return;
        elapsed += dt;

        if (resultTimer > 0) {
          resultTimer -= dt;
          if (resultTimer <= 0 && mode === "running") {
            resultMsg = ""; pickTarget();
          }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 80 * dt; p.life -= dt * 2;
          if (p.life <= 0) particles.splice(i, 1);
        }

        shake *= 0.88; if (shake < 0.3) shake = 0;
        flashAlpha *= 0.92;
      }

      function draw() {
        ctx.save();
        const sx = shake > 0.3 ? rand(-shake, shake) : 0;
        const sy = shake > 0.3 ? rand(-shake, shake) : 0;
        ctx.translate(sx, sy);

        ctx.fillStyle = COL.bg; ctx.fillRect(0, 0, W, H);

        // Subtle workspace line
        ctx.fillStyle = COL.bgDark; ctx.fillRect(40, 160, W - 80, 1);

        if (mode === "running") {
          drawTarget();
          drawPalette();
          drawMixArea();
          drawParticles();
          drawHUD();
          if (resultMsg) drawResult();
          if (dragging !== null) drawDragItem();
        }

        if (flashAlpha > 0.01) { ctx.fillStyle = `rgba(192,64,64,${flashAlpha})`; ctx.fillRect(0, 0, W, H); }
        ctx.restore();

        if (mode === "menu") drawMenu();
        else if (mode === "clear") drawClear();
        else if (mode === "failed") drawFailed();
      }

      function drawTarget() {
        if (!currentTarget) return;
        const tx = CX, ty = 80;
        ctx.fillStyle = COL.text;
        ctx.font = '500 14px "Trebuchet MS",sans-serif';
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("목표 색상", tx, ty - 35);

        ctx.beginPath(); ctx.arc(tx, ty, 28, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${currentTarget.r},${currentTarget.g},${currentTarget.b})`;
        ctx.fill();
        ctx.strokeStyle = "rgba(60,50,80,0.2)"; ctx.lineWidth = 2; ctx.stroke();

        ctx.fillStyle = COL.text;
        ctx.font = 'bold 16px "Trebuchet MS",sans-serif';
        ctx.fillText(currentTarget.name, tx, ty + 45);
      }

      function drawPalette() {
        for (let i = 0; i < PALETTE_COLORS.length; i++) {
          if (dragging === i) continue;
          const pp = palettePositions[i];
          const col = PALETTE_COLORS[i];
          ctx.beginPath(); ctx.arc(pp.x, pp.y + 100, pp.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`;
          ctx.fill();
          ctx.strokeStyle = "rgba(60,50,80,0.15)"; ctx.lineWidth = 2; ctx.stroke();

          ctx.fillStyle = COL.text;
          ctx.font = '400 12px "Trebuchet MS",sans-serif';
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(col.name, pp.x, pp.y + 100 + pp.r + 16);
        }
      }

      function drawMixArea() {
        // Mix zone
        ctx.beginPath(); ctx.arc(mixAreaX, mixAreaY, 50, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(200,195,185,0.3)"; ctx.fill();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = "rgba(60,50,80,0.25)"; ctx.lineWidth = 2; ctx.stroke();
        ctx.setLineDash([]);

        // Slot indicators
        const slotXs = [mixAreaX - 28, mixAreaX + 28];
        for (let i = 0; i < 2; i++) {
          if (mixSlots[i] !== null) {
            const col = PALETTE_COLORS[mixSlots[i]];
            ctx.beginPath(); ctx.arc(slotXs[i], mixAreaY, 18, 0, Math.PI * 2);
            ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`; ctx.fill();
          } else {
            ctx.beginPath(); ctx.arc(slotXs[i], mixAreaY, 18, 0, Math.PI * 2);
            ctx.strokeStyle = "rgba(60,50,80,0.15)"; ctx.lineWidth = 1.5; ctx.stroke();
          }
        }

        // Label
        ctx.fillStyle = COL.textLight;
        ctx.font = '400 12px "Trebuchet MS",sans-serif';
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("혼합 영역", mixAreaX, mixAreaY + 65);
      }

      function drawDragItem() {
        if (dragging === null) return;
        const col = PALETTE_COLORS[dragging];
        ctx.globalAlpha = 0.8;
        ctx.beginPath(); ctx.arc(dragX, dragY, 25, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${col.r},${col.g},${col.b})`; ctx.fill();
        ctx.globalAlpha = 1;
      }

      function drawParticles() {
        for (const p of particles) {
          ctx.globalAlpha = p.life;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fillStyle = p.color; ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function drawHUD() {
        ctx.fillStyle = COL.text;
        ctx.font = '500 15px "Trebuchet MS",sans-serif';
        ctx.textAlign = "left"; ctx.textBaseline = "top";
        ctx.fillText(`완성: ${score} / ${TARGET_COUNT}`, 24, 20);

        ctx.textAlign = "right";
        let ft = ""; for (let i = 0; i < MAX_FAILS; i++) ft += i < failCount ? "✕ " : "○ ";
        ctx.fillText(ft.trim(), W - 24, 20);
      }

      function drawResult() {
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = 'bold 26px "Trebuchet MS",sans-serif';
        ctx.fillStyle = resultMsg === "정답!" ? "rgba(60,140,60,0.85)" : "rgba(192,64,64,0.85)";
        ctx.fillText(resultMsg, CX, mixAreaY + 100);
      }

      function roundRect(c, x, y, w, h, r) {
        c.beginPath(); c.moveTo(x + r, y); c.lineTo(x + w - r, y);
        c.arcTo(x + w, y, x + w, y + r, r); c.lineTo(x + w, y + h - r);
        c.arcTo(x + w, y + h, x + w - r, y + h, r); c.lineTo(x + r, y + h);
        c.arcTo(x, y + h, x, y + h - r, r); c.lineTo(x, y + r); c.arcTo(x, y, x + r, y, r);
      }

      function drawCard(title, lines, accent) {
        const cW = Math.min(320, W - 40), lH = 26;
        const cH = 42 + lines.length * lH + 40;
        const cX = CX - cW / 2, cY = CY - cH / 2;
        ctx.fillStyle = "rgba(250,247,242,0.95)"; roundRect(ctx, cX, cY, cW, cH, 8); ctx.fill();
        ctx.fillStyle = accent; ctx.fillRect(cX + 12, cY, cW - 24, 3);
        ctx.fillStyle = COL.text; ctx.font = 'bold 22px "Trebuchet MS",sans-serif';
        ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.fillText(title, CX, cY + 16);
        ctx.font = '400 14px "Trebuchet MS",sans-serif'; ctx.fillStyle = COL.textLight;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], CX, cY + 48 + i * lH);
        ctx.fillStyle = "rgba(60,50,80,0.35)"; ctx.font = '400 13px "Trebuchet MS",sans-serif';
        ctx.fillText("TAP or ENTER", CX, cY + cH - 22);
      }

      function drawMenu() {
        ctx.fillStyle = "rgba(250,247,242,0.5)"; ctx.fillRect(0, 0, W, H);
        drawCard("색 연금술사", [
          "물감을 드래그로 섞어",
          "목표 색상을 만드세요",
          "", "조작: 터치로 물감 드래그하여 혼합",
          "클리어: 목표 색 5개 완성", "실패: 오답 3회",
        ], COL.accent);
      }

      function drawClear() {
        clearAnim = clamp(clearAnim + 0.02, 0, 1);
        ctx.fillStyle = `rgba(250,247,242,${clearAnim * 0.5})`; ctx.fillRect(0, 0, W, H);
        if (clearAnim > 0.3) drawCard("연금술 완성!", [`${Math.ceil(elapsed)}초 만에 완료`, `완성: ${score}개`], COL.accent);
      }

      function drawFailed() {
        ctx.fillStyle = "rgba(80,40,40,0.3)"; ctx.fillRect(0, 0, W, H);
        drawCard("연금 실패", ["색 배합이 맞지 않습니다", `완성: ${score} / ${TARGET_COUNT}`], COL.fail);
      }

      function getCanvasPos(cx, cy) {
        const r = canvas.getBoundingClientRect();
        return { x: (cx - r.left) * (W / r.width), y: (cy - r.top) * (H / r.height) };
      }

      function handleStart() {
        if (mode === "menu" || mode === "clear" || mode === "failed") { reset(); mode = "running"; }
      }

      canvas.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        if (mode !== "running") { handleStart(); return; }
        if (resultTimer > 0) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        // Check palette hit
        for (let i = 0; i < palettePositions.length; i++) {
          const pp = palettePositions[i];
          if (dist(p.x, p.y, pp.x, pp.y + 100) < pp.r + 8) {
            dragging = i; dragX = p.x; dragY = p.y;
            return;
          }
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        if (dragging === null) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        dragX = p.x; dragY = p.y;
      });

      canvas.addEventListener("pointerup", (e) => {
        if (dragging === null) return;
        const p = getCanvasPos(e.clientX, e.clientY);
        // Check if dropped in mix area
        if (dist(p.x, p.y, mixAreaX, mixAreaY) < 60) {
          if (mixSlots[0] === null) { mixSlots[0] = dragging; }
          else if (mixSlots[1] === null && mixSlots[0] !== dragging) {
            mixSlots[1] = dragging;
            checkMix();
          }
        }
        dragging = null;
      });

      canvas.addEventListener("pointercancel", () => { dragging = null; });
      canvas.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); handleStart(); }
      });

      function gameLoop(ts) {
        animFrame = requestAnimationFrame(gameLoop);
        if (!lastTimestamp) { lastTimestamp = ts; return; }
        let dt = Math.min((ts - lastTimestamp) / 1000, MAX_DT); lastTimestamp = ts;
        let steps = 0;
        while (dt >= FIXED_DT && steps < 4) { update(FIXED_DT); dt -= FIXED_DT; steps++; }
        if (dt > 0 && steps < 4) update(dt);
        draw();
      }

      function renderGameToText() {
        return JSON.stringify({ mode, elapsed: +elapsed.toFixed(1), score, failCount, target: currentTarget?.name || "", result: window.relayStageResult.status });
      }
      window.render_game_to_text = renderGameToText;
      window.advanceTime = (ms = 16.67) => {
        const s = Math.max(1, Math.round(ms / (FIXED_DT * 1000)));
        for (let i = 0; i < s; i++) update(FIXED_DT); draw(); return renderGameToText();
      };
      window.relayStageDebug = {
        forceClear() { reset(); mode = "running"; score = TARGET_COUNT; mode = "clear"; clearAnim = 0; window.relayStageResult.status = "cleared"; reportCleared(); draw(); },
        forceFail() { reset(); mode = "running"; failCount = MAX_FAILS; mode = "failed"; window.relayStageResult.status = "failed"; reportFailed("debug_force_fail"); draw(); },
      };

      setupPalette(); pickTarget(); reportReady();
      animFrame = requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
