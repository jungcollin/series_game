<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Biomech Theater: Orbit Shepherd</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(63, 117, 157, 0.24), transparent 36%),
          radial-gradient(circle at 82% 18%, rgba(208, 74, 130, 0.2), transparent 28%),
          linear-gradient(180deg, #080d17 0%, #04060c 100%);
      }

      body {
        display: grid;
        place-items: center;
      }

      a,
      canvas {
        -webkit-tap-highlight-color: rgba(145, 228, 255, 0.2);
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 12;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(7, 12, 22, 0.94);
        color: #effbff;
        font-weight: 800;
        text-decoration: none;
        white-space: nowrap;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      #game {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
      }

      #game:focus-visible {
        outline: 4px solid rgba(201, 247, 255, 0.96);
        outline-offset: -8px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <div class="sr-only">
      <p id="stage-instructions">
        Biomech Theater: Orbit Shepherd. 캔버스를 터치하거나 Enter로 시작하세요.
        마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 역전 신호가
        켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이
        가능하게 구현. 역전 구간을 모두 견디고 위성 3기를 목표 링에 순서대로
        통과시키면 클리어. 역전 버스트에 연속으로 휘말리거나 위성이 소멸 구역에
        닿으면 즉시 실패.
      </p>
      <p>모바일에서는 화면 터치와 드래그만으로도 시작과 플레이가 가능합니다.</p>
    </div>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="Biomech Theater: Orbit Shepherd"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>

    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      const canvas = document.querySelector("#game");
      const ctx = canvas.getContext("2d");
      const VIEW = { width: 960, height: 540 };
      const FIXED_DT = 1 / 60;
      const MAX_DT = 1 / 20;
      const AUTOMATED = navigator.webdriver === true;
      const REDUCED_MOTION = window.matchMedia("(prefers-reduced-motion: reduce)").matches || AUTOMATED;
      const relayContext =
        window.RelayRuntime?.readContext("biomech-theater-orbit-herding-inverse") || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };

      const TITLE = "Biomech Theater: Orbit Shepherd";
      const DESCRIPTION =
        "비콘 주위를 도는 위성 떼를 몰아 역전 버스트를 버티며 목표 링 3개를 순서대로 통과시키세요.";
      const CONTROLS_TEXT =
        "마우스 또는 터치로 비콘 이동, 클릭 또는 탭으로 궤도 반전, 역전 신호가 켜질 때 반대 입력 대비, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현";
      const CLEAR_CONDITION =
        "역전 구간을 모두 견디고 위성 3기를 목표 링에 순서대로 통과시키면 클리어";
      const FAIL_CONDITION =
        "역전 버스트에 연속으로 휘말리거나 위성이 소멸 구역에 닿으면 즉시 실패";

      const SATELLITE_CONFIGS = [
        { radius: 58, color: "#91efff", accent: "#d7fdff", label: "S1", speed: 1.08 },
        { radius: 86, color: "#ffd36e", accent: "#fff2c7", label: "S2", speed: 0.94 },
        { radius: 114, color: "#ff78b2", accent: "#ffe2ef", label: "S3", speed: 0.82 },
      ];

      const GATE_CONFIGS = [
        {
          x: 780,
          y: 148,
          radius: 36,
          ringColor: "#7fe8ff",
          glow: "rgba(127, 232, 255, 0.36)",
          satelliteIndex: 0,
          unlockAfterBurst: 0,
          name: "Gate I",
          keyword: "First Orbit",
        },
        {
          x: 516,
          y: 414,
          radius: 38,
          ringColor: "#ffd27d",
          glow: "rgba(255, 210, 125, 0.34)",
          satelliteIndex: 1,
          unlockAfterBurst: 1,
          name: "Gate II",
          keyword: "Counter Spin",
        },
        {
          x: 176,
          y: 166,
          radius: 40,
          ringColor: "#ff8dc4",
          glow: "rgba(255, 141, 196, 0.34)",
          satelliteIndex: 2,
          unlockAfterBurst: 2,
          name: "Gate III",
          keyword: "Curtain Break",
        },
      ];

      const BURST_CONFIGS = [
        {
          start: 5.2,
          duration: 3.4,
          angle: Math.PI * 0.18,
          from: -680,
          to: 720,
          width: 68,
          color: "rgba(255, 123, 183, 0.32)",
          stroke: "rgba(255, 185, 214, 0.86)",
          label: "Inverse Burst I",
        },
        {
          start: 12.8,
          duration: 3.1,
          angle: -Math.PI * 0.12,
          from: 710,
          to: -730,
          width: 78,
          color: "rgba(125, 223, 255, 0.28)",
          stroke: "rgba(199, 247, 255, 0.86)",
          label: "Inverse Burst II",
        },
        {
          start: 20.3,
          duration: 3.6,
          angle: Math.PI / 2,
          from: -620,
          to: 620,
          width: 84,
          color: "rgba(255, 216, 129, 0.28)",
          stroke: "rgba(255, 243, 198, 0.88)",
          label: "Inverse Burst III",
        },
      ];

      const HAZARD_CONFIGS = [
        {
          baseX: 480,
          baseY: 106,
          ampX: 118,
          ampY: 18,
          phase: 0.4,
          radius: 58,
          color: "#7a173d",
        },
        {
          baseX: 118,
          baseY: 396,
          ampX: 22,
          ampY: 52,
          phase: 1.7,
          radius: 54,
          color: "#4a0d1f",
        },
        {
          baseX: 840,
          baseY: 386,
          ampX: -28,
          ampY: 44,
          phase: 3.3,
          radius: 62,
          color: "#2f1425",
        },
      ];

      const state = {
        mode: "menu",
        elapsed: 0,
        ambientTime: 0,
        lastRunTime: 0,
        note: DESCRIPTION,
        pointer: {
          x: VIEW.width * 0.42,
          y: VIEW.height * 0.52,
          startX: 0,
          startY: 0,
          active: false,
          downTime: 0,
          distance: 0,
          id: null,
        },
        keys: {
          left: false,
          right: false,
          up: false,
          down: false,
        },
        beacon: null,
        satellites: [],
        gates: [],
        bursts: [],
        completedGates: 0,
        burstResolved: 0,
        corruptionStreak: 0,
        controlsInverted: false,
        lastReason: "",
        popups: [],
        particles: [],
        ribbons: [],
        flash: 0,
        shake: 0,
        statusPulse: 0,
      };

      let animationFrame = 0;
      let lastTimestamp = 0;
      let hostFailedReported = false;
      let hostClearedReported = false;

      window.relayStageMeta = {
        id: "biomech-theater-orbit-herding-inverse",
        title: TITLE,
        description: DESCRIPTION,
        creator: "jungcollin",
        genre: "Orbital survival / 역전 버스트",
        clearCondition: CLEAR_CONDITION,
        failCondition: FAIL_CONDITION,
        controls: CONTROLS_TEXT,
      };

      window.relayStageResult = {
        status: "running",
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function distance(aX, aY, bX, bY) {
        return Math.hypot(aX - bX, aY - bY);
      }

      function easeOutCubic(value) {
        return 1 - Math.pow(1 - value, 3);
      }

      function roundedRectPath(context, x, y, width, height, radius) {
        const safeRadius = Math.min(radius, width * 0.5, height * 0.5);
        context.beginPath();
        context.moveTo(x + safeRadius, y);
        context.lineTo(x + width - safeRadius, y);
        context.quadraticCurveTo(x + width, y, x + width, y + safeRadius);
        context.lineTo(x + width, y + height - safeRadius);
        context.quadraticCurveTo(x + width, y + height, x + width - safeRadius, y + height);
        context.lineTo(x + safeRadius, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - safeRadius);
        context.lineTo(x, y + safeRadius);
        context.quadraticCurveTo(x, y, x + safeRadius, y);
        context.closePath();
      }

      function fillRoundedRect(context, x, y, width, height, radius, fillStyle) {
        context.save();
        roundedRectPath(context, x, y, width, height, radius);
        context.fillStyle = fillStyle;
        context.fill();
        context.restore();
      }

      function strokeRoundedRect(context, x, y, width, height, radius, strokeStyle, lineWidth) {
        context.save();
        roundedRectPath(context, x, y, width, height, radius);
        context.strokeStyle = strokeStyle;
        context.lineWidth = lineWidth;
        context.stroke();
        context.restore();
      }

      function createWorldSnapshot() {
        const beacon = {
          x: VIEW.width * 0.34,
          y: VIEW.height * 0.54,
          targetX: VIEW.width * 0.34,
          targetY: VIEW.height * 0.54,
          vx: 0,
          vy: 0,
          radius: 18,
        };

        return {
          beacon,
          satellites: SATELLITE_CONFIGS.map((config, index) => ({
            ...config,
            angle: -Math.PI / 2 + index * 2.1,
            x: beacon.x,
            y: beacon.y,
            trail: [],
          })),
          gates: GATE_CONFIGS.map((config) => ({
            ...config,
            completed: false,
            pulse: 0,
          })),
          bursts: BURST_CONFIGS.map((config) => ({
            ...config,
            end: config.start + config.duration,
            caught: false,
            resolved: false,
            pulse: 0,
          })),
        };
      }

      function applyWorldSnapshot() {
        const snapshot = createWorldSnapshot();
        state.beacon = snapshot.beacon;
        state.satellites = snapshot.satellites;
        state.gates = snapshot.gates;
        state.bursts = snapshot.bursts;
        state.completedGates = 0;
        state.burstResolved = 0;
        state.corruptionStreak = 0;
        state.controlsInverted = false;
        state.flash = 0;
        state.shake = 0;
        state.lastReason = "";
      }

      function pushPopup(text, x, y, color) {
        state.popups.push({
          text,
          x,
          y,
          color,
          life: 1,
          maxLife: 1,
          vy: -18,
        });
      }

      function pushParticleBurst(x, y, options = {}) {
        const count = REDUCED_MOTION ? 10 : options.count || 22;
        for (let index = 0; index < count; index += 1) {
          const angle = (Math.PI * 2 * index) / count + Math.random() * 0.3;
          const speed = (options.speedMin || 80) + Math.random() * (options.speedMax || 220);
          state.particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: (options.sizeMin || 2.5) + Math.random() * (options.sizeMax || 6),
            color: options.color || "#c9f7ff",
            glow: options.glow || options.color || "#c9f7ff",
            life: (options.lifeMin || 0.35) + Math.random() * (options.lifeMax || 0.75),
            maxLife: (options.lifeMin || 0.35) + Math.random() * (options.lifeMax || 0.75),
            drag: options.drag || 0.9,
          });
        }
      }

      function inRelayHost() {
        try {
          return window.parent && window.parent !== window && window.parent.RelayHost;
        } catch (error) {
          return false;
        }
      }

      function reportReadyToHost() {
        if (!inRelayHost()) {
          return;
        }
        window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
      }

      function reportFailedToHost(reason = "failed") {
        if (!inRelayHost() || hostFailedReported) {
          return;
        }
        hostFailedReported = true;
        window.parent.RelayHost.onStageFailed?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          reason,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function reportClearedToHost() {
        if (!inRelayHost() || hostClearedReported) {
          return;
        }
        hostClearedReported = true;
        window.parent.RelayHost.onStageCleared?.({
          stageId: window.relayStageMeta.id,
          stageTitle: window.relayStageMeta.title,
          clearCountAfter: relayContext.clearCount + 1,
          durationSec: Number(state.lastRunTime.toFixed(1)),
        });
      }

      function startStage() {
        applyWorldSnapshot();
        state.orbitDirection = 1;
        state.mode = "running";
        state.elapsed = 0;
        state.lastRunTime = 0;
        state.statusPulse = 1;
        state.note = DESCRIPTION;
        state.pointer.x = state.beacon.targetX;
        state.pointer.y = state.beacon.targetY;
        window.relayStageResult.status = "running";
        hostFailedReported = false;
        hostClearedReported = false;
        if (AUTOMATED) {
          render();
        }
      }

      function failStage(reason = "failed") {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "failed";
        state.lastRunTime = state.elapsed;
        state.lastReason = reason;
        state.statusPulse = 1;
        state.controlsInverted = false;
        window.relayStageResult.status = "failed";
        state.shake = Math.max(state.shake, 16);
        state.flash = Math.max(state.flash, 0.55);
        pushPopup("SYSTEM FAIL", state.beacon.x, state.beacon.y - 54, "#ffd7eb");
        pushParticleBurst(state.beacon.x, state.beacon.y, {
          color: "#ff9cc7",
          glow: "#fff1f7",
          count: 26,
          speedMin: 90,
          speedMax: 260,
        });
        reportFailedToHost(reason);
        if (AUTOMATED) {
          render();
        }
      }

      function clearStage() {
        if (state.mode === "failed" || state.mode === "cleared") {
          return;
        }
        state.mode = "cleared";
        state.lastRunTime = state.elapsed;
        state.statusPulse = 1;
        window.relayStageResult.status = "cleared";
        state.flash = Math.max(state.flash, 0.8);
        state.shake = Math.max(state.shake, 10);
        pushPopup("CURTAIN OPEN", state.beacon.x, state.beacon.y - 66, "#d3fff8");
        pushParticleBurst(state.beacon.x, state.beacon.y, {
          color: "#c8ffe4",
          glow: "#effff7",
          count: 34,
          speedMin: 110,
          speedMax: 280,
          lifeMin: 0.45,
          lifeMax: 0.9,
        });
        reportClearedToHost();
        if (AUTOMATED) {
          render();
        }
      }

      function getSceneTime() {
        return state.mode === "running" ? state.elapsed : state.ambientTime * 0.75;
      }

      function getBeaconBounds() {
        return {
          minX: 132,
          maxX: VIEW.width - 132,
          minY: 112,
          maxY: VIEW.height - 116,
        };
      }

      function syncPointerFromClient(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        const safeX = (clientX - rect.left) * (VIEW.width / rect.width);
        const safeY = (clientY - rect.top) * (VIEW.height / rect.height);
        const bounds = getBeaconBounds();
        state.pointer.x = clamp(safeX, bounds.minX, bounds.maxX);
        state.pointer.y = clamp(safeY, bounds.minY, bounds.maxY);
        if (state.beacon) {
          state.beacon.targetX = state.pointer.x;
          state.beacon.targetY = state.pointer.y;
        }
      }

      function toggleOrbitDirection() {
        if (state.mode !== "running") {
          return;
        }
        state.satellites.forEach((satellite) => {
          satellite.angle += 0.12 * state.completedGates;
        });
        state.statusPulse = 1;
        state.orbitDirection = (state.orbitDirection || 1) * -1;
        pushPopup(
          state.orbitDirection > 0 ? "CLOCKWISE" : "COUNTER",
          state.beacon.x,
          state.beacon.y - 42,
          state.orbitDirection > 0 ? "#bbf8ff" : "#ffe7a9"
        );
        pushParticleBurst(state.beacon.x, state.beacon.y, {
          color: state.orbitDirection > 0 ? "#90edff" : "#ffd870",
          glow: "#fff5dc",
          count: 14,
          speedMin: 40,
          speedMax: 150,
          lifeMin: 0.22,
          lifeMax: 0.46,
          sizeMin: 1.5,
          sizeMax: 4,
        });
      }

      function getActiveBurst() {
        return state.bursts.find(
          (burst) => !burst.resolved && state.elapsed >= burst.start && state.elapsed < burst.end
        );
      }

      function getBurstProjection(burst, x, y) {
        const progress = clamp((state.elapsed - burst.start) / burst.duration, 0, 1);
        const sweep = lerp(burst.from, burst.to, easeOutCubic(progress));
        const localX = x - VIEW.width / 2;
        const localY = y - VIEW.height / 2;
        const projected = localX * Math.cos(burst.angle) + localY * Math.sin(burst.angle);
        return {
          progress,
          sweep,
          distance: Math.abs(projected - sweep),
        };
      }

      function beaconInsideBurst(burst) {
        if (!state.beacon) {
          return false;
        }
        const projection = getBurstProjection(burst, state.beacon.x, state.beacon.y);
        return projection.distance < burst.width;
      }

      function getHazards() {
        const sceneTime = getSceneTime();
        return HAZARD_CONFIGS.map((config, index) => ({
          id: index,
          x: config.baseX + Math.sin(sceneTime * 0.9 + config.phase) * config.ampX,
          y: config.baseY + Math.cos(sceneTime * 0.72 + config.phase) * config.ampY,
          radius: config.radius + Math.sin(sceneTime * 1.4 + config.phase) * 6,
          color: config.color,
        }));
      }

      function getCurrentGate() {
        return state.gates.find((gate) => !gate.completed) || null;
      }

      function gateUnlocked(gate) {
        return state.burstResolved >= gate.unlockAfterBurst;
      }

      function completeGate(gate, satellite) {
        gate.completed = true;
        gate.pulse = 1;
        state.completedGates += 1;
        state.statusPulse = 1;
        state.flash = Math.max(state.flash, 0.42);
        state.shake = Math.max(state.shake, 7);
        pushPopup(`${gate.name} CLEAR`, gate.x, gate.y - 34, gate.ringColor);
        pushParticleBurst(gate.x, gate.y, {
          color: gate.ringColor,
          glow: satellite.accent,
          count: 28,
          speedMin: 80,
          speedMax: 220,
          lifeMin: 0.3,
          lifeMax: 0.7,
        });
        state.note = `${gate.keyword} 확보. 다음 링으로 이동하세요.`;
      }

      function updateBurstResolution() {
        for (const burst of state.bursts) {
          if (burst.resolved || state.elapsed < burst.end) {
            continue;
          }
          burst.resolved = true;
          state.burstResolved += 1;
          if (burst.caught) {
            state.corruptionStreak += 1;
            state.flash = Math.max(state.flash, 0.34);
            pushPopup("CORRUPTED", VIEW.width * 0.5, 92, "#ffd0eb");
            state.note = "역전 신호에 닿았습니다. 다음 버스트는 절대 피하세요.";
            if (state.corruptionStreak >= 2) {
              failStage("inverse-burst");
              return;
            }
          } else {
            state.corruptionStreak = 0;
            pushPopup("STABLE", VIEW.width * 0.5, 92, "#cbfff5");
            state.note = "역전 구간 안정 통과. 다음 게이트를 준비하세요.";
          }
        }
      }

      function updatePreview(dt) {
        state.satellites.forEach((satellite, index) => {
          satellite.angle += dt * (0.4 + index * 0.08);
          const bob = Math.sin(state.ambientTime * 1.3 + index * 0.8) * 8;
          satellite.x = state.beacon.x + Math.cos(satellite.angle) * (satellite.radius + bob);
          satellite.y = state.beacon.y + Math.sin(satellite.angle) * (satellite.radius + bob * 0.35);
        });
      }

      function updateRunning(dt) {
        state.elapsed += dt;
        state.lastRunTime = state.elapsed;
        updateBurstResolution();
        if (state.mode !== "running") {
          return;
        }

        const keyboardX = Number(state.keys.right) - Number(state.keys.left);
        const keyboardY = Number(state.keys.down) - Number(state.keys.up);
        if (keyboardX || keyboardY) {
          const moveSpeed = 360 * dt;
          state.pointer.x += keyboardX * moveSpeed;
          state.pointer.y += keyboardY * moveSpeed;
          const bounds = getBeaconBounds();
          state.pointer.x = clamp(state.pointer.x, bounds.minX, bounds.maxX);
          state.pointer.y = clamp(state.pointer.y, bounds.minY, bounds.maxY);
          state.beacon.targetX = state.pointer.x;
          state.beacon.targetY = state.pointer.y;
        }

        const activeBurst = getActiveBurst();
        state.controlsInverted = Boolean(activeBurst && beaconInsideBurst(activeBurst));
        if (activeBurst && state.controlsInverted) {
          if (!activeBurst.caught && state.corruptionStreak >= 1) {
            activeBurst.caught = true;
            failStage("inverse-burst");
            return;
          }
          activeBurst.caught = true;
        }

        const bounds = getBeaconBounds();
        const dx = state.beacon.targetX - state.beacon.x;
        const dy = state.beacon.targetY - state.beacon.y;
        const distanceToTarget = Math.hypot(dx, dy);
        const moveScale = distanceToTarget > 0.001 ? 1 / distanceToTarget : 0;
        const reverse = state.controlsInverted ? -1 : 1;
        const accel = 900 * reverse;
        state.beacon.vx += dx * moveScale * accel * dt;
        state.beacon.vy += dy * moveScale * accel * dt;
        const drag = Math.exp(-6.8 * dt);
        state.beacon.vx *= drag;
        state.beacon.vy *= drag;
        state.beacon.x += state.beacon.vx * dt;
        state.beacon.y += state.beacon.vy * dt;

        if (state.beacon.x < bounds.minX || state.beacon.x > bounds.maxX) {
          state.beacon.x = clamp(state.beacon.x, bounds.minX, bounds.maxX);
          state.beacon.vx *= -0.26;
        }
        if (state.beacon.y < bounds.minY || state.beacon.y > bounds.maxY) {
          state.beacon.y = clamp(state.beacon.y, bounds.minY, bounds.maxY);
          state.beacon.vy *= -0.26;
        }

        const orbitBaseSpeed = 1.55 + state.completedGates * 0.18 + Math.min(0.28, state.elapsed * 0.012);
        state.satellites.forEach((satellite, index) => {
          satellite.angle += dt * orbitBaseSpeed * satellite.speed * state.orbitDirection;
          const pulse = Math.sin(state.elapsed * 2 + index * 1.4) * 4.8;
          const radius = satellite.radius + pulse;
          satellite.x = state.beacon.x + Math.cos(satellite.angle) * radius;
          satellite.y = state.beacon.y + Math.sin(satellite.angle) * (radius * 0.92);
          satellite.trail.push({ x: satellite.x, y: satellite.y });
          const trailLimit = REDUCED_MOTION ? 8 : 18;
          if (satellite.trail.length > trailLimit) {
            satellite.trail.shift();
          }
        });

        const hazards = getHazards();
        for (const satellite of state.satellites) {
          for (const hazard of hazards) {
            if (distance(satellite.x, satellite.y, hazard.x, hazard.y) <= hazard.radius - 6) {
              pushParticleBurst(satellite.x, satellite.y, {
                color: "#ffb3d2",
                glow: "#ffe6f0",
                count: 22,
                speedMin: 120,
                speedMax: 300,
              });
              failStage("annihilation-zone");
              return;
            }
          }
        }

        const gate = getCurrentGate();
        if (gate && gateUnlocked(gate)) {
          const satellite = state.satellites[gate.satelliteIndex];
          const ringDistance = distance(satellite.x, satellite.y, gate.x, gate.y);
          if (ringDistance >= gate.radius - 14 && ringDistance <= gate.radius + 16) {
            completeGate(gate, satellite);
          }
        }

        if (
          state.completedGates === state.gates.length &&
          state.burstResolved === state.bursts.length &&
          state.mode === "running"
        ) {
          clearStage();
        }
      }

      function updateEffects(dt) {
        state.flash = Math.max(0, state.flash - dt * 1.4);
        state.shake = Math.max(0, state.shake - dt * 18);
        state.statusPulse = Math.max(0, state.statusPulse - dt * 1.4);

        for (let index = state.particles.length - 1; index >= 0; index -= 1) {
          const particle = state.particles[index];
          particle.life -= dt;
          particle.x += particle.vx * dt;
          particle.y += particle.vy * dt;
          particle.vx *= Math.pow(particle.drag, dt * 60);
          particle.vy *= Math.pow(particle.drag, dt * 60);
          particle.vy += 26 * dt;
          if (particle.life <= 0) {
            state.particles.splice(index, 1);
          }
        }

        for (let index = state.popups.length - 1; index >= 0; index -= 1) {
          const popup = state.popups[index];
          popup.life -= dt;
          popup.y += popup.vy * dt;
          if (popup.life <= 0) {
            state.popups.splice(index, 1);
          }
        }

        state.gates.forEach((gate) => {
          gate.pulse = Math.max(0, gate.pulse - dt * 1.5);
        });
        state.bursts.forEach((burst) => {
          burst.pulse = Math.max(0, burst.pulse - dt * 1.1);
        });
      }

      function update(dt) {
        state.ambientTime += dt;
        if (state.mode === "running") {
          updateRunning(dt);
        } else {
          updatePreview(dt);
        }
        updateEffects(dt);
      }

      function wrapText(text, maxWidth, font) {
        ctx.save();
        ctx.font = font;
        const words = String(text).split(/\s+/);
        const lines = [];
        let line = "";
        for (const word of words) {
          const candidate = line ? `${line} ${word}` : word;
          if (ctx.measureText(candidate).width <= maxWidth || !line) {
            line = candidate;
          } else {
            lines.push(line);
            line = word;
          }
        }
        if (line) {
          lines.push(line);
        }
        ctx.restore();
        return lines;
      }

      function drawBackdrop() {
        const baseGradient = ctx.createLinearGradient(0, 0, 0, VIEW.height);

        baseGradient.addColorStop(0.42, "#0a1627");

        const glowA = ctx.createRadialGradient(180, 94, 20, 180, 94, 240);
        glowA.addColorStop(0, "rgba(96, 226, 255, 0.18)");
        glowA.addColorStop(1, "rgba(96, 226, 255, 0)");
        ctx.fillStyle = glowA;
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const glowB = ctx.createRadialGradient(798, 82, 20, 798, 82, 220);
        glowB.addColorStop(0, "rgba(255, 115, 173, 0.16)");

        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        ctx.save();

        for (let index = 0; index < 7; index += 1) {

          ctx.beginPath();

          ctx.lineTo(offset - 42, VIEW.height);

        }
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.14;
        for (let index = 0; index < 6; index += 1) {
          const span = 84 + index * 42;
          ctx.strokeStyle = "rgba(208, 244, 255, 0.4)";
          ctx.lineWidth = 12 - index * 1.6;
          ctx.beginPath();
          ctx.moveTo(-20, 86 + index * 68);
          ctx.bezierCurveTo(140, 36 + index * 56, 210, 130 + index * 30, 338, 116 + index * 34);

          ctx.beginPath();
          ctx.moveTo(VIEW.width + 20, 84 + index * 68);
          ctx.bezierCurveTo(
            VIEW.width - 140,
            32 + index * 54,
            VIEW.width - 222,
            132 + index * 28,
            VIEW.width - 344,

          );
          ctx.stroke();
        }
        ctx.restore();

        ctx.save();
        ctx.translate(VIEW.width / 2, VIEW.height * 0.72);
        const floorGradient = ctx.createRadialGradient(0, 0, 60, 0, 0, 320);
        floorGradient.addColorStop(0, "rgba(90, 186, 210, 0.18)");
        floorGradient.addColorStop(0.5, "rgba(22, 36, 58, 0.44)");
        floorGradient.addColorStop(1, "rgba(5, 8, 14, 0)");
        ctx.fillStyle = floorGradient;
        ctx.beginPath();
        ctx.ellipse(0, 0, 340, 136, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(177, 242, 255, 0.18)";
        ctx.lineWidth = 1.6;
        for (let ring = 0; ring < 5; ring += 1) {
          ctx.beginPath();
          ctx.ellipse(0, 0, 180 + ring * 42, 60 + ring * 18, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawHazards() {
        const hazards = getHazards();
        hazards.forEach((hazard, index) => {
          ctx.save();
          ctx.translate(hazard.x, hazard.y);
          const halo = ctx.createRadialGradient(0, 0, 8, 0, 0, hazard.radius + 28);
          halo.addColorStop(0, "rgba(255, 184, 218, 0.22)");
          halo.addColorStop(0.45, "rgba(135, 24, 64, 0.34)");
          halo.addColorStop(1, "rgba(10, 6, 12, 0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(0, 0, hazard.radius + 28, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = hazard.color;
          ctx.beginPath();
          ctx.arc(0, 0, hazard.radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(255, 211, 232, 0.28)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, hazard.radius - 12, 0, Math.PI * 2);
          ctx.stroke();

          ctx.rotate(getSceneTime() * 0.8 + index * 0.4);
          for (let tooth = 0; tooth < 9; tooth += 1) {
            ctx.rotate((Math.PI * 2) / 9);
            ctx.strokeStyle = "rgba(255, 219, 236, 0.26)";
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.moveTo(hazard.radius - 9, 0);
            ctx.lineTo(hazard.radius + 9, 0);
            ctx.stroke();
          }
          ctx.restore();
        });
      }

      function drawGate(gate, isCurrent) {
        if (!gate) {
          return;
        }
        const unlocked = gateUnlocked(gate);
        const pulse = gate.pulse + (isCurrent ? 0.25 : 0);
        ctx.save();
        ctx.translate(gate.x, gate.y);

        if (gate.completed) {
          const doneGradient = ctx.createRadialGradient(0, 0, 4, 0, 0, gate.radius + 40);
          doneGradient.addColorStop(0, "rgba(236, 255, 250, 0.24)");
          doneGradient.addColorStop(1, "rgba(236, 255, 250, 0)");
          ctx.fillStyle = doneGradient;
          ctx.beginPath();
          ctx.arc(0, 0, gate.radius + 40, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(212, 255, 241, 0.55)";
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(0, 0, gate.radius - 4, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          const glowRadius = gate.radius + 26 + pulse * 18;
          const glow = ctx.createRadialGradient(0, 0, 8, 0, 0, glowRadius);
          glow.addColorStop(0, gate.glow.replace("0.34", unlocked ? "0.5" : "0.18"));
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = unlocked ? gate.ringColor : "rgba(177, 190, 212, 0.26)";
          ctx.lineWidth = unlocked ? 4 : 2.5;
          ctx.beginPath();
          ctx.arc(0, 0, gate.radius, 0, Math.PI * 2);
          ctx.stroke();

          ctx.setLineDash([8, 8]);
          ctx.lineWidth = 2;
          ctx.strokeStyle = unlocked ? "rgba(255, 255, 255, 0.72)" : "rgba(200, 210, 224, 0.18)";
          ctx.beginPath();
          ctx.arc(0, 0, gate.radius + 12, getSceneTime(), getSceneTime() + Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        ctx.fillStyle = unlocked ? "rgba(239, 250, 255, 0.88)" : "rgba(172, 183, 203, 0.42)";
        ctx.font = "700 14px Trebuchet MS";
        ctx.textAlign = "center";
        ctx.fillText(`S${gate.satelliteIndex + 1}`, 0, 5);
        ctx.restore();
      }

      function drawOrbitSystem() {
        const activeBurst = getActiveBurst();
        const beaconGlow = ctx.createRadialGradient(
          state.beacon.x,
          state.beacon.y,
          4,
          state.beacon.x,
          state.beacon.y,
          90
        );
        beaconGlow.addColorStop(0, state.controlsInverted ? "rgba(255, 188, 225, 0.52)" : "rgba(145, 239, 255, 0.42)");
        beaconGlow.addColorStop(1, "rgba(145, 239, 255, 0)");
        ctx.fillStyle = beaconGlow;
        ctx.beginPath();
        ctx.arc(state.beacon.x, state.beacon.y, 90, 0, Math.PI * 2);
        ctx.fill();

        ctx.save();
        ctx.strokeStyle = state.controlsInverted ? "rgba(255, 196, 226, 0.44)" : "rgba(169, 229, 242, 0.24)";
        ctx.lineWidth = 1.4;
        ctx.setLineDash([7, 10]);
        SATELLITE_CONFIGS.forEach((config, index) => {
          ctx.beginPath();
          ctx.ellipse(
            state.beacon.x,
            state.beacon.y,
            config.radius,
            config.radius * 0.92,
            getSceneTime() * 0.08 + index * 0.2,
            0,
            Math.PI * 2
          );
          ctx.stroke();
        });
        ctx.setLineDash([]);
        ctx.restore();

        state.satellites.forEach((satellite) => {
          ctx.save();
          ctx.strokeStyle = satellite.color.replace(")", "");
          ctx.lineWidth = 2.4;
          for (let index = 1; index < satellite.trail.length; index += 1) {
            const prev = satellite.trail[index - 1];
            const next = satellite.trail[index];
            ctx.globalAlpha = index / satellite.trail.length;
            ctx.strokeStyle = satellite.color;
            ctx.beginPath();
            ctx.moveTo(prev.x, prev.y);
            ctx.lineTo(next.x, next.y);
            ctx.stroke();
          }
          ctx.restore();

          ctx.save();
          ctx.strokeStyle = "rgba(211, 249, 255, 0.18)";
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(state.beacon.x, state.beacon.y);
          ctx.lineTo(satellite.x, satellite.y);
          ctx.stroke();

          const satelliteGlow = ctx.createRadialGradient(satellite.x, satellite.y, 2, satellite.x, satellite.y, 26);
          satelliteGlow.addColorStop(0, satellite.accent);
          satelliteGlow.addColorStop(0.35, satellite.color);
          satelliteGlow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = satelliteGlow;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, 26, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = satellite.color;
          ctx.beginPath();
          ctx.arc(satellite.x, satellite.y, 10.2, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = satellite.accent;
          ctx.beginPath();
          ctx.arc(satellite.x - 2.4, satellite.y - 2.8, 3.1, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        ctx.save();
        ctx.translate(state.beacon.x, state.beacon.y);
        ctx.rotate(getSceneTime() * 0.8);
        ctx.strokeStyle = state.controlsInverted ? "rgba(255, 193, 221, 0.78)" : "rgba(207, 247, 255, 0.82)";
        ctx.lineWidth = 3;
        for (let arm = 0; arm < 4; arm += 1) {
          ctx.rotate(Math.PI / 2);
          ctx.beginPath();
          ctx.moveTo(0, -10);
          ctx.lineTo(0, -28);
          ctx.stroke();
        }
        ctx.fillStyle = state.controlsInverted ? "#ff7daf" : "#91efff";
        ctx.beginPath();
        ctx.arc(0, 0, 17, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#f7feff";
        ctx.beginPath();
        ctx.arc(-4, -5, 4.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = "rgba(240, 251, 255, 0.28)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(state.pointer.x, state.pointer.y, 10, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(state.pointer.x - 15, state.pointer.y);
        ctx.lineTo(state.pointer.x + 15, state.pointer.y);
        ctx.moveTo(state.pointer.x, state.pointer.y - 15);
        ctx.lineTo(state.pointer.x, state.pointer.y + 15);
        ctx.stroke();
        ctx.restore();

        if (activeBurst) {
          const projection = getBurstProjection(activeBurst, state.beacon.x, state.beacon.y);
          if (projection.distance < activeBurst.width * 1.2) {
            const radial = ctx.createRadialGradient(
              state.beacon.x,
              state.beacon.y,
              8,
              state.beacon.x,
              state.beacon.y,
              64
            );
            radial.addColorStop(0, "rgba(255, 216, 234, 0.26)");
            radial.addColorStop(1, "rgba(255, 216, 234, 0)");
            ctx.fillStyle = radial;
            ctx.beginPath();
            ctx.arc(state.beacon.x, state.beacon.y, 64, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      function drawBurstOverlay() {
        const activeBurst = getActiveBurst();
        const nextBurst = state.bursts.find((burst) => !burst.resolved && state.elapsed < burst.start) || null;
        if (activeBurst) {
          const projection = getBurstProjection(activeBurst, VIEW.width / 2, VIEW.height / 2);
          ctx.save();
          ctx.translate(VIEW.width / 2, VIEW.height / 2);
          ctx.rotate(activeBurst.angle + Math.PI / 2);
          const gradient = ctx.createLinearGradient(0, projection.sweep - activeBurst.width, 0, projection.sweep + activeBurst.width);
          gradient.addColorStop(0, "rgba(0, 0, 0, 0)");
          gradient.addColorStop(0.35, activeBurst.color);
          gradient.addColorStop(0.5, activeBurst.stroke);
          gradient.addColorStop(0.65, activeBurst.color);
          gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = gradient;
          ctx.fillRect(-VIEW.width, projection.sweep - activeBurst.width, VIEW.width * 2, activeBurst.width * 2);

          ctx.strokeStyle = activeBurst.stroke;
          ctx.lineWidth = 2;
          for (let stripe = -6; stripe <= 6; stripe += 1) {
            const y = projection.sweep + stripe * 18;
            ctx.globalAlpha = 0.24;
            ctx.beginPath();
            ctx.moveTo(-VIEW.width, y);
            ctx.lineTo(VIEW.width, y);
            ctx.stroke();
          }
          ctx.restore();
        }

        if (nextBurst) {
          const countdown = Math.max(0, nextBurst.start - state.elapsed);
          if (countdown < 2.2 || state.mode !== "running") {
            const intensity = 1 - clamp(countdown / 2.2, 0, 1);
            ctx.save();
            ctx.globalAlpha = 0.18 + intensity * 0.18;
            ctx.strokeStyle = "rgba(255, 243, 198, 0.82)";
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 14]);
            ctx.translate(VIEW.width / 2, VIEW.height / 2);
            ctx.rotate(nextBurst.angle + Math.PI / 2);
            ctx.beginPath();
            ctx.moveTo(-VIEW.width, nextBurst.from * 0.2);
            ctx.lineTo(VIEW.width, nextBurst.from * 0.2);
            ctx.stroke();
            ctx.restore();
          }
        }
      }

      function drawHud() {

        strokeRoundedRect(ctx, 18, 18, 280, 112, 24, "rgba(201, 247, 255, 0.12)", 1.2);
        ctx.fillStyle = "#8cecff";
        ctx.font = "700 12px Trebuchet MS";
        ctx.fillText("BIOMECH THEATER", 36, 40);
        ctx.fillStyle = "#f3fbff";
        ctx.font = "800 26px Trebuchet MS";
        ctx.fillText("Orbit Shepherd", 36, 68);
        ctx.fillStyle = "#b6cddd";
        ctx.font = "600 14px Trebuchet MS";
        ctx.fillText(`Gate ${state.completedGates}/3`, 36, 96);
        ctx.fillText(`Burst ${state.burstResolved}/${state.bursts.length}`, 130, 96);
        ctx.fillText(state.controlsInverted ? "INPUT: REVERSED" : "INPUT: STABLE", 36, 118);

        fillRoundedRect(ctx, VIEW.width - 274, 18, 256, 112, 24, "rgba(9, 13, 22, 0.76)");

        ctx.font = "700 12px Trebuchet MS";
        ctx.fillText("STATUS", VIEW.width - 256, 40);
        ctx.fillStyle = "#f9fbff";
        ctx.font = "800 22px Trebuchet MS";
        ctx.fillText(state.orbitDirection > 0 ? "Clockwise" : "Counter Orbit", VIEW.width - 256, 68);
        ctx.fillStyle = "#cfdae5";
        ctx.font = "600 14px Trebuchet MS";
        const burst = getActiveBurst();
        ctx.fillText(
          burst ? `${burst.label} active` : "Preparing next burst",
          VIEW.width - 256,
          96
        );
        ctx.fillText(`Corruption streak ${state.corruptionStreak}/2`, VIEW.width - 256, 118);

        const gate = getCurrentGate();
        if (gate) {
          fillRoundedRect(ctx, 18, VIEW.height - 86, VIEW.width - 36, 60, 20, "rgba(5, 10, 18, 0.72)");
          strokeRoundedRect(ctx, 18, VIEW.height - 86, VIEW.width - 36, 60, 20, "rgba(255, 255, 255, 0.08)", 1);
          ctx.fillStyle = gate.ringColor;
          ctx.font = "700 13px Trebuchet MS";
          ctx.fillText(gate.name, 36, VIEW.height - 56);
          ctx.fillStyle = "#eefbff";
          ctx.font = "700 20px Trebuchet MS";
          ctx.fillText(
            gateUnlocked(gate)
              ? `S${gate.satelliteIndex + 1}를 ${gate.keyword} 링에 통과시키세요`
              : `다음 버스트를 견뎌야 ${gate.keyword} 링이 열린다`,
            36,
            VIEW.height - 32
          );
        }

        const nextBurst = state.bursts.find((entry) => !entry.resolved && state.elapsed < entry.start);
        if (nextBurst && state.mode === "running") {
          const countdown = Math.max(0, nextBurst.start - state.elapsed);
          fillRoundedRect(ctx, VIEW.width * 0.5 - 112, 18, 224, 36, 18, "rgba(23, 15, 20, 0.66)");
          ctx.fillStyle = countdown < 1.3 ? "#ffd6df" : "#f8edc2";
          ctx.font = "700 15px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(`Next burst ${countdown.toFixed(1)}s`, VIEW.width * 0.5, 41);
          ctx.textAlign = "left";
        }
      }

      function drawParticles() {
        state.particles.forEach((particle) => {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          const glow = ctx.createRadialGradient(
            particle.x,
            particle.y,
            0,
            particle.x,
            particle.y,
            particle.size * 4
          );
          glow.addColorStop(0, particle.glow);
          glow.addColorStop(0.35, particle.color);
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size * 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      }

      function drawPopups() {
        state.popups.forEach((popup) => {
          const alpha = clamp(popup.life / popup.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = popup.color;
          ctx.font = "800 18px Trebuchet MS";
          ctx.textAlign = "center";
          ctx.fillText(popup.text, popup.x, popup.y);
          ctx.restore();
        });
        ctx.textAlign = "left";
      }

      function drawOverlayCard(type) {
        const title =
          type === "menu"
            ? TITLE
            : type === "failed"
              ? "System Collapse"
              : "Curtain Cleared";
        const subtitle =
          type === "menu"
            ? DESCRIPTION
            : type === "failed"
              ? state.lastReason === "inverse-burst"
                ? "역전 버스트를 두 번 연속으로 맞았습니다."
                : "위성이 소멸 구역에 닿아 궤도가 붕괴되었습니다."
              : "세 개의 링과 모든 역전 구간을 버텨냈습니다.";

        ctx.save();
        ctx.fillStyle = type === "menu" ? "rgba(3, 7, 13, 0.36)" : "rgba(6, 8, 12, 0.52)";
        ctx.fillRect(0, 0, VIEW.width, VIEW.height);

        const cardX = 120;
        const cardY = 62;
        const cardW = 720;
        const cardH = 416;
        const cardGradient = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + cardH);
        if (type === "cleared") {
          cardGradient.addColorStop(0, "rgba(8, 26, 31, 0.94)");
          cardGradient.addColorStop(1, "rgba(6, 17, 20, 0.94)");
        } else if (type === "failed") {
          cardGradient.addColorStop(0, "rgba(29, 12, 20, 0.94)");
          cardGradient.addColorStop(1, "rgba(13, 10, 18, 0.94)");
        } else {
          cardGradient.addColorStop(0, "rgba(8, 20, 31, 0.94)");
          cardGradient.addColorStop(1, "rgba(11, 10, 21, 0.94)");
        }
        fillRoundedRect(ctx, cardX, cardY, cardW, cardH, 28, cardGradient);
        strokeRoundedRect(
          ctx,
          cardX,
          cardY,
          cardW,
          cardH,
          28,
          type === "failed" ? "rgba(255, 199, 224, 0.22)" : "rgba(207, 247, 255, 0.22)",
          1.4
        );

        ctx.fillStyle = type === "failed" ? "#ffb4ce" : "#93efff";
        ctx.font = "700 12px Trebuchet MS";
        ctx.fillText("BIOMECH THEATER", cardX + 34, cardY + 34);

        ctx.fillStyle = "#effbff";
        ctx.font = "800 40px Trebuchet MS";
        ctx.fillText(title, cardX + 34, cardY + 78);

        const subtitleLines = wrapText(subtitle, cardW - 80, "600 18px Trebuchet MS");
        ctx.fillStyle = "#cbdbe8";
        ctx.font = "600 18px Trebuchet MS";
        subtitleLines.forEach((line, index) => {
          ctx.fillText(line, cardX + 34, cardY + 118 + index * 24);
        });

        fillRoundedRect(ctx, cardX + 34, cardY + 152, 312, 108, 22, "rgba(255, 255, 255, 0.04)");
        fillRoundedRect(ctx, cardX + 374, cardY + 152, 312, 108, 22, "rgba(255, 255, 255, 0.04)");
        ctx.fillStyle = "#90edff";
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillText("CONTROLS", cardX + 58, cardY + 182);
        ctx.fillStyle = "#f6fbff";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText("드래그로 비콘 이동", cardX + 58, cardY + 208);
        ctx.fillText("짧게 탭해 궤도 반전", cardX + 58, cardY + 232);
        ctx.fillStyle = "#c6d8e2";
        ctx.font = "600 14px Trebuchet MS";
        ctx.fillText("보조 입력: 방향키/WASD 이동, Space 반전", cardX + 58, cardY + 252);

        ctx.fillStyle = type === "failed" ? "#ffd2e8" : "#ffd87b";
        ctx.font = "700 14px Trebuchet MS";
        ctx.fillText("GOAL", cardX + 398, cardY + 182);
        ctx.fillStyle = "#f6fbff";
        ctx.font = "700 18px Trebuchet MS";
        ctx.fillText("세 링을 S1, S2, S3 순서로 통과", cardX + 398, cardY + 208);
        ctx.fillText("버스트 3구간 동안 궤도 유지", cardX + 398, cardY + 232);
        ctx.fillStyle = "#c6d8e2";
        ctx.font = "600 14px Trebuchet MS";
        ctx.fillText("버스트에 두 번 연속 닿으면 종료", cardX + 398, cardY + 252);

        fillRoundedRect(ctx, cardX + 34, cardY + 286, cardW - 68, 88, 22, "rgba(255, 255, 255, 0.04)");
        ctx.fillStyle = "#98ecff";
        ctx.font = "700 13px Trebuchet MS";
        ctx.fillText("META", cardX + 56, cardY + 312);
        ctx.fillStyle = "#dcecf7";
        ctx.font = "600 13px Trebuchet MS";
        wrapText(CONTROLS_TEXT, cardW - 112, "600 13px Trebuchet MS").slice(0, 2).forEach((line, index) => {
          ctx.fillText(line, cardX + 56, cardY + 334 + index * 18);
        });
        wrapText(CLEAR_CONDITION, cardW - 112, "600 13px Trebuchet MS").slice(0, 2).forEach((line, index) => {
          ctx.fillText(line, cardX + 56, cardY + 370 + index * 18);
        });

        ctx.fillStyle = type === "cleared" ? "#d4fff0" : "#eefbff";
        ctx.font = "700 18px Trebuchet MS";
        const footer =
          type === "menu"
            ? "터치, 클릭 또는 Enter로 시작"
            : "터치, 클릭 또는 Enter로 재시작";
        ctx.fillText(footer, cardX + 34, cardY + 402);

        ctx.fillStyle = "#9db7c8";
        ctx.font = "600 13px Trebuchet MS";
        if (type !== "menu") {
          ctx.fillText(
            `Run ${state.lastRunTime.toFixed(1)}s  ·  Gate ${state.completedGates}/3  ·  Burst ${state.burstResolved}/${state.bursts.length}`,
            cardX + 34,
            cardY + 428
          );
        } else {
          ctx.fillText("모바일에서도 화면 터치와 드래그만으로도 플레이 가능", cardX + 34, cardY + 428);
        }
        ctx.restore();
      }

      function render() {
        ctx.clearRect(0, 0, VIEW.width, VIEW.height);

        const shakeX = REDUCED_MOTION ? 0 : (Math.random() - 0.5) * state.shake;
        const shakeY = REDUCED_MOTION ? 0 : (Math.random() - 0.5) * state.shake;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        drawBackdrop();
        drawHazards();
        state.gates.forEach((gate) => drawGate(gate, gate === getCurrentGate()));
        drawOrbitSystem();
        drawBurstOverlay();
        drawParticles();
        if (state.mode === "running") {
          drawHud();
        }
        drawPopups();
        ctx.restore();

        if (state.flash > 0) {
          ctx.save();
          ctx.globalAlpha = state.flash * 0.26;
          const flashGradient = ctx.createLinearGradient(0, 0, VIEW.width, VIEW.height);
          flashGradient.addColorStop(0, state.mode === "failed" ? "#ff95be" : "#bcfff2");
          flashGradient.addColorStop(1, "#ffffff");
          ctx.fillStyle = flashGradient;
          ctx.fillRect(0, 0, VIEW.width, VIEW.height);
          ctx.restore();
        }

        if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
          drawOverlayCard(state.mode);
        }
      }

      function loop(timestamp) {
        if (!lastTimestamp) {
          lastTimestamp = timestamp;
        }
        const deltaSeconds = Math.min(MAX_DT, (timestamp - lastTimestamp) / 1000 || FIXED_DT);
        lastTimestamp = timestamp;
        update(deltaSeconds);
        render();
        animationFrame = window.requestAnimationFrame(loop);
      }

      function handlePointerDown(event) {
        event.preventDefault();
        canvas.focus({ preventScroll: true });
        if (state.mode !== "running") {
          startStage();
          syncPointerFromClient(event.clientX, event.clientY);
          return;
        }
        state.pointer.active = true;
        state.pointer.id = event.pointerId;
        state.pointer.startX = event.clientX;
        state.pointer.startY = event.clientY;
        state.pointer.downTime = performance.now();
        state.pointer.distance = 0;
        syncPointerFromClient(event.clientX, event.clientY);
        canvas.setPointerCapture?.(event.pointerId);
        if (AUTOMATED) {
          render();
        }
      }

      function handlePointerMove(event) {
        if (state.mode !== "running") {
          return;
        }
        if (state.pointer.active && state.pointer.id === event.pointerId) {
          state.pointer.distance = Math.max(
            state.pointer.distance,
            distance(event.clientX, event.clientY, state.pointer.startX, state.pointer.startY)
          );
          syncPointerFromClient(event.clientX, event.clientY);
          return;
        }
        if (event.pointerType === "mouse") {
          syncPointerFromClient(event.clientX, event.clientY);
        }
        if (AUTOMATED) {
          render();
        }
      }

      function handlePointerUp(event) {
        if (state.pointer.active && state.pointer.id === event.pointerId) {
          const shortTap =
            performance.now() - state.pointer.downTime < 220 && state.pointer.distance < 12;
          syncPointerFromClient(event.clientX, event.clientY);
          state.pointer.active = false;
          state.pointer.id = null;
          if (shortTap) {
            toggleOrbitDirection();
          }
        }

        if (state.mode !== "running" && (state.mode === "failed" || state.mode === "cleared")) {
          startStage();
        }
        if (AUTOMATED) {
          render();
        }
      }

      function handleKeyChange(event, pressed) {
        if (event.key === "Enter" && pressed) {
          event.preventDefault();
          if (state.mode !== "running") {
            startStage();
          }
          if (AUTOMATED) {
            render();
          }
          return;
        }

        if ((event.key === " " || event.code === "Space") && pressed) {
          event.preventDefault();
          toggleOrbitDirection();
          if (AUTOMATED) {
            render();
          }
          return;
        }

        const key = event.key.toLowerCase();
        if (key === "arrowleft" || key === "a") state.keys.left = pressed;
        if (key === "arrowright" || key === "d") state.keys.right = pressed;
        if (key === "arrowup" || key === "w") state.keys.up = pressed;
        if (key === "arrowdown" || key === "s") state.keys.down = pressed;
      }

      window.render_game_to_text = function renderGameToText() {
        const currentGate = getCurrentGate();
        const activeBurst = getActiveBurst();
        return JSON.stringify({
          mode: state.mode,
          time: Number(state.elapsed.toFixed(2)),
          axes: { origin: "top-left", x: "right", y: "down" },
          completedGates: state.completedGates,
          burstResolved: state.burstResolved,
          corruptionStreak: state.corruptionStreak,
          controlsInverted: state.controlsInverted,
          activeGate: currentGate
            ? {
                name: currentGate.name,
                satelliteIndex: currentGate.satelliteIndex,
                unlocked: gateUnlocked(currentGate),
                x: Number(currentGate.x.toFixed(1)),
                y: Number(currentGate.y.toFixed(1)),
              }
            : null,
          activeBurst: activeBurst
            ? {
                label: activeBurst.label,
                progress: Number(
                  clamp((state.elapsed - activeBurst.start) / activeBurst.duration, 0, 1).toFixed(2)
                ),
              }
            : null,
          beacon: state.beacon
            ? {
                x: Number(state.beacon.x.toFixed(1)),
                y: Number(state.beacon.y.toFixed(1)),
              }
            : null,
          satellites: state.satellites.map((satellite, index) => ({
            index,
            x: Number(satellite.x.toFixed(1)),
            y: Number(satellite.y.toFixed(1)),
          })),
          hazards: getHazards().map((hazard) => ({
            x: Number(hazard.x.toFixed(1)),
            y: Number(hazard.y.toFixed(1)),
            radius: Number(hazard.radius.toFixed(1)),
          })),
        });
      };

      window.advanceTime = function advanceTime(ms) {
        const steps = Math.max(1, Math.round(ms / (1000 / 60)));
        for (let index = 0; index < steps; index += 1) {
          update(FIXED_DT);
        }
        render();
      };

      window.relayStageDebug = {
        forceClear() {
          if (state.mode === "menu") {
            startStage();
          }
          state.gates.forEach((gate) => {
            gate.completed = true;
          });
          state.completedGates = state.gates.length;
          state.bursts.forEach((burst) => {
            burst.resolved = true;
          });
          state.burstResolved = state.bursts.length;
          clearStage();
          render();
        },
        forceFail() {
          if (state.mode === "menu") {
            startStage();
          }
          failStage("debug-fail");
          render();
        },
      };

      applyWorldSnapshot();
      state.orbitDirection = 1;
      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", handlePointerUp);
      canvas.addEventListener("pointercancel", handlePointerUp);
      canvas.addEventListener("touchstart", () => {}, { passive: true });
      window.addEventListener("keydown", (event) => handleKeyChange(event, true));
      window.addEventListener("keyup", (event) => handleKeyChange(event, false));
      reportReadyToHost();
      if (AUTOMATED) {
        render();
      } else {
        animationFrame = window.requestAnimationFrame(loop);
      }
    </script>
  </body>
</html>
