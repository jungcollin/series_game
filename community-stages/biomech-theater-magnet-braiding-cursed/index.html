<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biomech Theater: Magnet Braid</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #04070d;
        --bg-1: #09111e;
        --ink: #e7f2ff;
        --cyan: #73f0ff;
        --teal: #5dffc7;
        --amber: #ffc86a;
        --rose: #ff6e9e;
        --danger: #ff4f6d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(55, 132, 203, 0.18), transparent 48%),
          linear-gradient(180deg, var(--bg-1), var(--bg-0));
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      body {
        position: relative;
      }

      .skip-link {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        clip-path: inset(50%);
        border-radius: 999px;
        background: rgba(3, 9, 20, 0.92);
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
      }

      .skip-link:focus,
      .skip-link:focus-visible {
        width: auto;
        height: auto;
        padding: 12px 16px;
        overflow: visible;
        clip: auto;
        clip-path: none;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
        -webkit-tap-highlight-color: rgba(115, 240, 255, 0.18);
      }

      canvas:focus-visible {
        outline: 3px solid rgba(115, 240, 255, 0.95);
        outline-offset: -5px;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      Biomech Theater: Magnet Braid. 캔버스를 터치하거나 Enter로 시작하세요.
      포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 픽업 선택 전에 페널티 아이콘 확인, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현.
      저주 조합을 버티면서 에너지 구슬 5개를 다른 극 문에 모두 인도하면 클리어.
      저주 누적이 한계를 넘기거나 같은 극이 연속 충돌해 과열되면 실패.
    </p>
    <canvas
      id="game"
      width="1280"
      height="720"
      aria-label="Biomech Theater: Magnet Braid"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>
    <script src="../relay-runtime.js"></script>
    <script src="../registry.js"></script>
    <script>
      (() => {
        const META = {
          id: "biomech-theater-magnet-braiding-cursed",
          title: "Biomech Theater: Magnet Braid",
          creator: "jungcollin",
          description:
            "극성 노드를 꼬아 다섯 문으로 흘려보내고, 저주 픽업의 대가까지 계산하는 바이오메크 퍼즐 러시.",
          genre: "Magnetic routing / 저주 픽업",
          controls:
            "포인터 또는 터치로 노드 선택, 탭으로 극성 전환, 길게 눌러 자장 고정, 픽업 선택 전에 페널티 아이콘 확인, 모바일에서는 화면 터치와 드래그만으로도 플레이 가능하게 구현",
          clearCondition: "저주 조합을 버티면서 에너지 구슬 5개를 다른 극 문에 모두 인도하면 클리어",
          failCondition: "저주 누적이 한계를 넘기거나 같은 극이 연속 충돌해 과열되면 실패",
        };

        const POLARITY_COLORS = {
          N: "#73f0ff",
          S: "#ff8fb6",
        };
        const GATE_POLARITIES = ["N", "S", "N", "S", "N"];
        const TARGET_ORDER = [2, 1, 3, 0, 4];
        const NODE_LAYOUTS = [
          { id: "braid-1", x: 0.25, y: 0.22 },
          { id: "braid-2", x: 0.75, y: 0.22 },
          { id: "braid-3", x: 0.18, y: 0.43 },
          { id: "braid-4", x: 0.82, y: 0.43 },
          { id: "braid-5", x: 0.25, y: 0.66 },
          { id: "braid-6", x: 0.75, y: 0.66 },
        ];
        const CURSE_LIMIT = 5;
        const HEAT_LIMIT = 5;
        const LONG_PRESS_TIME = 0.38;
        const relayContext = window.RelayRuntime?.readContext(META.id) || {
          history: [],
          clearCount: 0,
          previousStageId: null,
        };
        const mediaQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
        const canvas = document.querySelector("#game");
        const ctx = canvas.getContext("2d");

        let viewWidth = 1280;
        let viewHeight = 720;
        let deviceScale = 1;
        let animationFrame = 0;
        let lastTimestamp = 0;
        let hostFailedReported = false;
        let hostClearedReported = false;

        const pointer = {
          active: false,
          x: 0,
          y: 0,
          hold: 0,
          targetId: null,
          dragged: false,
          longPressHandled: false,
          wasSelected: false,
        };

        const basePickupPool = [
          {
            id: "flux-syringe",
            name: "Flux Syringe",
            tag: "속도 완화",
            effectLabel: "감속 + 안정",
            penaltyLabel: "☠ 1",
            accent: "#73f0ff",
            penalty: 1,
            apply() {
              const orb = state.currentOrb;
              if (!orb) return;
              orb.speedMod = 0.72;
              orb.speedModTimer = 2.7;
              orb.safeContacts += 1;
              burstText("속도 완화", orb.x, orb.y - 18, "#73f0ff");
            },
          },
          {
            id: "anchor-spool",
            name: "Anchor Spool",
            tag: "자장 고정",
            effectLabel: "선택 노드 고정",
            penaltyLabel: "♨ 1",
            accent: "#ffc86a",
            penalty: 0,
            heatPenalty: 1,
            apply() {
              const node = getSelectedOrNearestNode();
              if (!node) return;
              lockNode(node, 4.2);
              state.heat = Math.min(HEAT_LIMIT - 0.1, state.heat + 0.9);
              burstText("고정 스풀", getNodePosition(node).x, getNodePosition(node).y - 24, "#ffc86a");
            },
          },
          {
            id: "hex-idol",
            name: "Hex Idol",
            tag: "강제 보정",
            effectLabel: "문 유도 + 1회 면역",
            penaltyLabel: "☠ 2",
            accent: "#ff6e9e",
            penalty: 2,
            apply() {
              const orb = state.currentOrb;
              if (!orb) return;
              orb.assistTimer = 4;
              orb.safeContacts += 1;
              orb.speedMod = 0.82;
              orb.speedModTimer = 2.5;
              burstText("저주 보정", orb.x, orb.y - 18, "#ff6e9e");
            },
          },
        ];

        const state = createInitialState();

        function createInitialState() {
          return {
            mode: "menu",
            elapsed: 0,
            lastRunTime: 0,
            modeTimer: 0,
            note: META.description,
            deliveryCount: 0,
            curse: 0,
            heat: 0,
            samePoleChain: 0,
            targetGateIndex: TARGET_ORDER[0],
            nodes: NODE_LAYOUTS.map((layout, index) => ({
              id: layout.id,
              polarity: index % 2 === 0 ? "N" : "S",
              lockedUntil: 0,
              pulse: Math.random() * Math.PI * 2,
            })),
            selectedNodeId: NODE_LAYOUTS[2].id,
            currentOrb: null,
            waveRespawnTimer: 0,
            particles: [],
            popups: [],
            traces: [],
            flash: 0,
            screenShake: 0,
            ribbonsPhase: 0,
            pickups: [],
            usedPickupId: null,
            preview: null,
            previewDirty: true,
            ambientSeed: 0,
            backgroundMotes: Array.from({ length: 26 }, (_, index) => ({
              x: Math.random(),
              y: Math.random(),
              speed: 0.03 + Math.random() * 0.08,
              size: 1.5 + Math.random() * 2.8,
              hue: index % 3,
            })),
          };
        }

        function inRelayHost() {
          try {
            return window.parent && window.parent !== window && window.parent.RelayHost;
          } catch (_error) {
            return false;
          }
        }

        function reportReadyToHost() {
          if (!inRelayHost()) return;
          window.parent.RelayHost.onStageReady?.(window.relayStageMeta);
        }

        function reportFailedToHost(reason = "failed") {
          if (!inRelayHost() || hostFailedReported) return;
          hostFailedReported = true;
          window.parent.RelayHost.onStageFailed?.({
            stageId: META.id,
            stageTitle: META.title,
            reason,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function reportClearedToHost() {
          if (!inRelayHost() || hostClearedReported) return;
          hostClearedReported = true;
          window.parent.RelayHost.onStageCleared?.({
            stageId: META.id,
            stageTitle: META.title,
            clearCountAfter: relayContext.clearCount + 1,
            durationSec: Number(state.lastRunTime.toFixed(1)),
          });
        }

        function oppositePolarity(polarity) {
          return polarity === "N" ? "S" : "N";
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function lerp(start, end, t) {
          return start + (end - start) * t;
        }

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - t, 3);
        }

        function choosePickupRotation(index) {
          const rotations = [
            ["hex-idol", "flux-syringe", "anchor-spool"],
            ["anchor-spool", "hex-idol", "flux-syringe"],
            ["flux-syringe", "anchor-spool", "hex-idol"],
          ];
          const order = rotations[index % rotations.length];
          return order
            .map((id) => basePickupPool.find((entry) => entry.id === id))
            .filter(Boolean)
            .map((entry) => ({ ...entry }));
        }

        function getArena() {
          const padX = clamp(viewWidth * 0.05, 18, 56);
          const top = clamp(viewHeight * 0.17, 94, 140);
          const bottom = viewHeight - clamp(viewHeight * 0.17, 124, 170);
          return {
            left: padX,
            right: viewWidth - padX,
            top,
            bottom,
            width: viewWidth - padX * 2,
            height: bottom - top,
          };
        }

        function getNodePosition(node) {
          const arena = getArena();
          const layout = NODE_LAYOUTS.find((entry) => entry.id === node.id);
          return {
            x: arena.left + arena.width * layout.x,
            y: arena.top + arena.height * layout.y,
          };
        }

        function getGatePosition(index) {
          const arena = getArena();
          const ratio = index / (GATE_POLARITIES.length - 1);
          return {
            x: lerp(arena.left + arena.width * 0.08, arena.right - arena.width * 0.08, ratio),
            y: arena.bottom + clamp(viewHeight * 0.03, 18, 28),
          };
        }

        function getPickupRects() {
          const count = 3;
          const width = clamp((viewWidth - 48) / count - 8, 102, 184);
          const height = clamp(viewHeight * 0.112, 72, 92);
          const gap = 8;
          const total = width * count + gap * (count - 1);
          const startX = viewWidth / 2 - total / 2;
          const y = clamp(viewHeight * 0.032, 14, 24);
          return Array.from({ length: count }, (_, index) => ({
            x: startX + index * (width + gap),
            y,
            width,
            height,
          }));
        }

        function getNodeRadius() {
          return clamp(Math.min(viewWidth, viewHeight) * 0.028, 16, 26);
        }

        function getGateRadius() {
          return clamp(Math.min(viewWidth, viewHeight) * 0.032, 18, 28);
        }

        function createOrb() {
          const arena = getArena();
          const spawnOffsets = [0, -0.04, 0.05, -0.09, 0.11];
          const targetGate = GATE_POLARITIES[state.targetGateIndex];
          const spawnOffset = spawnOffsets[state.deliveryCount] ?? 0;
          return {
            x: arena.left + arena.width * (0.5 + spawnOffset),
            y: arena.top - 12,
            vx: (state.deliveryCount - 2) * 10,
            vy: clamp(arena.height * 0.18, 78, 132),
            radius: clamp(Math.min(viewWidth, viewHeight) * 0.017, 9, 14),
            charge: oppositePolarity(targetGate),
            speedMod: 1,
            speedModTimer: 0,
            assistTimer: 0,
            safeContacts: 0,
            lastContactAt: Object.create(null),
            trail: [],
          };
        }

        function lockNode(node, duration) {
          node.lockedUntil = Math.max(node.lockedUntil, state.elapsed + duration);
          state.previewDirty = true;
        }

        function getNodeById(id) {
          return state.nodes.find((entry) => entry.id === id) || null;
        }

        function getSelectedOrNearestNode() {
          const selected = getNodeById(state.selectedNodeId);
          if (selected) return selected;
          const targetPosition = getGatePosition(state.targetGateIndex);
          return state.nodes
            .slice()
            .sort((left, right) => {
              const lp = getNodePosition(left);
              const rp = getNodePosition(right);
              return (
                Math.hypot(lp.x - targetPosition.x, lp.y - targetPosition.y) -
                Math.hypot(rp.x - targetPosition.x, rp.y - targetPosition.y)
              );
            })[0];
        }

        function burstText(text, x, y, color) {
          state.popups.push({
            text,
            x,
            y,
            color,
            life: 0,
            ttl: 0.9,
          });
        }

        function spawnParticles(x, y, color, count, speed = 180) {
          for (let index = 0; index < count; index += 1) {
            const angle = (Math.PI * 2 * index) / count + Math.random() * 0.35;
            const magnitude = speed * (0.4 + Math.random() * 0.8);
            state.particles.push({
              x,
              y,
              vx: Math.cos(angle) * magnitude,
              vy: Math.sin(angle) * magnitude,
              size: 2 + Math.random() * 5,
              life: 0,
              ttl: 0.45 + Math.random() * 0.55,
              color,
            });
          }
        }

        function addTracePoint(orb) {
          orb.trail.push({ x: orb.x, y: orb.y, charge: orb.charge });
          if (orb.trail.length > 22) {
            orb.trail.shift();
          }
        }

        function setFailed(reason) {
          if (state.mode === "failed") return;
          state.mode = "failed";
          state.lastRunTime = state.elapsed;
          window.relayStageResult.status = "failed";
          window.relayStageResult.deliveredCount = state.deliveryCount;
          window.relayStageResult.curse = state.curse;
          state.flash = 0.46;
          state.screenShake = 14;
          reportFailedToHost(reason);
        }

        function setCleared() {
          if (state.mode === "cleared") return;
          state.mode = "cleared";
          state.lastRunTime = state.elapsed;
          window.relayStageResult.status = "cleared";
          window.relayStageResult.deliveredCount = state.deliveryCount;
          window.relayStageResult.curse = state.curse;
          state.flash = 0.28;
          state.screenShake = 8;
          reportClearedToHost();
        }

        function prepareWave() {
          state.targetGateIndex = TARGET_ORDER[state.deliveryCount];
          state.pickups = choosePickupRotation(state.deliveryCount);
          state.usedPickupId = null;
          state.currentOrb = createOrb();
          state.previewDirty = true;
        }

        function startStage() {
          state.mode = "running";
          state.elapsed = 0;
          state.lastRunTime = 0;
          state.modeTimer = 0;
          state.deliveryCount = 0;
          state.curse = 0;
          state.heat = 0;
          state.samePoleChain = 0;
          state.flash = 0;
          state.screenShake = 0;
          state.particles.length = 0;
          state.popups.length = 0;
          state.traces.length = 0;
          state.nodes.forEach((node, index) => {
            node.polarity = index % 2 === 0 ? "N" : "S";
            node.lockedUntil = 0;
          });
          state.selectedNodeId = NODE_LAYOUTS[2].id;
          hostFailedReported = false;
          hostClearedReported = false;
          window.relayStageResult.status = "running";
          window.relayStageResult.deliveredCount = 0;
          window.relayStageResult.curse = 0;
          prepareWave();
        }

        function forceClear() {
          state.deliveryCount = TARGET_ORDER.length;
          window.relayStageResult.deliveredCount = state.deliveryCount;
          setCleared();
        }

        function forceFail() {
          setFailed("forced_fail");
        }

        function applyPickup(pickup) {
          if (!pickup || state.mode !== "running" || state.usedPickupId || !state.currentOrb) {
            return;
          }
          state.usedPickupId = pickup.id;
          if (pickup.penalty) {
            state.curse += pickup.penalty;
          }
          if (pickup.heatPenalty) {
            state.heat = Math.min(HEAT_LIMIT - 0.1, state.heat + pickup.heatPenalty);
          }
          pickup.apply();
          spawnParticles(viewWidth / 2, clamp(viewHeight * 0.08, 44, 76), pickup.accent, mediaQuery.matches ? 8 : 16, 110);
          if (state.curse >= CURSE_LIMIT) {
            burstText("저주 폭주", viewWidth / 2, clamp(viewHeight * 0.12, 72, 100), "#ff4f6d");
            setFailed("curse_limit");
          }
          state.previewDirty = true;
        }

        function handleNodeContact(node, orb, simulate) {
          if (simulate) {
            return;
          }
          const position = getNodePosition(node);
          const samePole = node.polarity === orb.charge;
          const color = samePole ? "#ff4f6d" : "#73f0ff";
          node.pulse = 0;
          spawnParticles(position.x, position.y, color, mediaQuery.matches ? 5 : 9, samePole ? 130 : 95);
          if (samePole) {
            if (orb.safeContacts > 0) {
              orb.safeContacts -= 1;
              state.samePoleChain = 0;
              state.heat = Math.max(0, state.heat - 0.25);
              burstText("HEX SAFE", position.x, position.y - 20, "#ff9bc0");
              return;
            }
            state.samePoleChain += 1;
            state.heat = Math.min(HEAT_LIMIT, state.heat + 1.9);
            burstText("과열 경고", position.x, position.y - 18, "#ff4f6d");
            state.screenShake = Math.max(state.screenShake, 8);
            if (state.samePoleChain >= 2 || state.heat >= HEAT_LIMIT) {
              setFailed("same_pole_overheat");
            }
          } else {
            state.samePoleChain = 0;
            state.heat = Math.max(0, state.heat - 0.95);
            burstText("BRAID LOCK", position.x, position.y - 18, "#73f0ff");
          }
        }

        function getInfluenceStrength(node, orb, dist, radius) {
          const intensity = Math.pow(1 - dist / radius, 2);
          const lockBoost = node.lockedUntil > state.elapsed ? 1.45 : 1;
          const speedBoost = orb.assistTimer > 0 ? 1.18 : 1;
          return intensity * 1250 * lockBoost * speedBoost;
        }

        function updateOrb(dt, orb, simulate = false) {
          const arena = getArena();
          const gateY = getGatePosition(0).y;
          const radius = getNodeRadius() * 4.4;
          const speedMod = orb.speedModTimer > 0 ? orb.speedMod : 1;

          if (!simulate) {
            orb.speedModTimer = Math.max(0, orb.speedModTimer - dt);
            orb.assistTimer = Math.max(0, orb.assistTimer - dt);
            if (orb.speedModTimer <= 0) {
              orb.speedMod = 1;
            }
          }

          orb.vy += 22 * dt;
          orb.vx *= Math.pow(0.988, dt * 60);
          orb.vy *= Math.pow(0.998, dt * 60);

          state.nodes.forEach((node) => {
            const position = getNodePosition(node);
            const dx = position.x - orb.x;
            const dy = position.y - orb.y;
            const dist = Math.hypot(dx, dy);
            if (dist > radius || dist < 0.0001) return;
            const dirX = dx / dist;
            const dirY = dy / dist;
            const tangentX = -dirY;
            const tangentY = dirX;
            const samePole = node.polarity === orb.charge;
            const direction = samePole ? -1 : 1;
            const strength = getInfluenceStrength(node, orb, dist, radius);
            const swirl = node.polarity === "N" ? 1 : -1;
            orb.vx += (dirX * direction + tangentX * 0.24 * swirl) * strength * dt;
            orb.vy += (dirY * direction * 0.46 + tangentY * 0.18 * swirl) * strength * dt;

            if (!simulate && dist <= getNodeRadius() * 1.14) {
              const lastContact = orb.lastContactAt[node.id] ?? -999;
              if (state.elapsed - lastContact > 0.22) {
                orb.lastContactAt[node.id] = state.elapsed;
                handleNodeContact(node, orb, false);
              }
            }
          });

          if (!simulate && orb.assistTimer > 0) {
            const gate = getGatePosition(state.targetGateIndex);
            const dx = gate.x - orb.x;
            const falloff = clamp((orb.y - arena.top) / Math.max(1, arena.height), 0, 1);
            orb.vx += dx * (0.45 + falloff * 0.85) * dt;
          }

          orb.x += orb.vx * dt * speedMod;
          orb.y += orb.vy * dt * speedMod;
          orb.x = clamp(orb.x, arena.left - 24, arena.right + 24);

          if (!simulate) {
            addTracePoint(orb);
          }

          if (!simulate && orb.y >= gateY - getGateRadius() * 0.4) {
            resolveGateContact(orb);
          }

          if (!simulate && (orb.y > viewHeight + 60 || orb.x < -80 || orb.x > viewWidth + 80)) {
            state.curse = Math.min(CURSE_LIMIT, state.curse + 2);
            burstText("저주 누수", viewWidth / 2, gateY - 34, "#ff4f6d");
            state.screenShake = 10;
            if (state.curse >= CURSE_LIMIT) {
              setFailed("curse_limit");
              return;
            }
            state.currentOrb = createOrb();
            state.usedPickupId = null;
            state.pickups = choosePickupRotation(state.deliveryCount);
            state.previewDirty = true;
          }
        }

        function resolveGateContact(orb) {
          if (!state.currentOrb || state.mode !== "running") return;
          const gateRadius = getGateRadius() * 1.12;
          const gates = GATE_POLARITIES.map((polarity, index) => ({
            index,
            polarity,
            ...getGatePosition(index),
          }));
          const gate = gates.find((entry) => Math.hypot(entry.x - orb.x, entry.y - orb.y) <= gateRadius);
          if (!gate) return;

          if (gate.index === state.targetGateIndex && gate.polarity !== orb.charge) {
            spawnParticles(gate.x, gate.y, POLARITY_COLORS[gate.polarity], mediaQuery.matches ? 10 : 20, 190);
            burstText("SYNC", gate.x, gate.y - 30, POLARITY_COLORS[gate.polarity]);
            state.deliveryCount += 1;
            state.samePoleChain = 0;
            state.heat = Math.max(0, state.heat - 0.6);
            window.relayStageResult.deliveredCount = state.deliveryCount;
            window.relayStageResult.curse = state.curse;
            if (state.deliveryCount >= TARGET_ORDER.length) {
              state.currentOrb = null;
              setCleared();
              return;
            }
            prepareWave();
            return;
          }

          state.curse = Math.min(CURSE_LIMIT, state.curse + 2);
          state.flash = 0.24;
          state.screenShake = 12;
          spawnParticles(gate.x, gate.y, "#ff4f6d", mediaQuery.matches ? 8 : 16, 160);
          burstText("CURSE SURGE", gate.x, gate.y - 30, "#ff4f6d");
          if (state.curse >= CURSE_LIMIT) {
            setFailed("curse_limit");
            return;
          }
          state.currentOrb = createOrb();
          state.usedPickupId = null;
          state.pickups = choosePickupRotation(state.deliveryCount);
          state.previewDirty = true;
        }

        function simulatePreview() {
          if (state.mode !== "running") {
            return null;
          }
          const simulation = createOrb();
          const points = [];
          let predictedGateIndex = 0;
          for (let step = 0; step < 220; step += 1) {
            updateOrb(1 / 60, simulation, true);
            if (step % 6 === 0) {
              points.push({ x: simulation.x, y: simulation.y });
            }
            const gateY = getGatePosition(0).y;
            if (simulation.y >= gateY - getGateRadius() * 0.6) {
              let bestIndex = 0;
              let bestDist = Number.POSITIVE_INFINITY;
              GATE_POLARITIES.forEach((_polarity, index) => {
                const gate = getGatePosition(index);
                const dist = Math.hypot(gate.x - simulation.x, gate.y - simulation.y);
                if (dist < bestDist) {
                  bestDist = dist;
                  bestIndex = index;
                }
              });
              predictedGateIndex = bestIndex;
              break;
            }
          }
          return {
            points,
            gateIndex: predictedGateIndex,
          };
        }

        function updatePreview() {
          if (!state.previewDirty) return;
          state.preview = simulatePreview();
          state.previewDirty = false;
        }

        function updateParticles(dt) {
          state.particles = state.particles.filter((particle) => {
            particle.life += dt;
            particle.x += particle.vx * dt;
            particle.y += particle.vy * dt;
            particle.vx *= Math.pow(0.92, dt * 60);
            particle.vy *= Math.pow(0.92, dt * 60);
            return particle.life < particle.ttl;
          });
          state.popups = state.popups.filter((popup) => {
            popup.life += dt;
            popup.y -= dt * 34;
            return popup.life < popup.ttl;
          });
        }

        function updatePointer(dt) {
          if (!pointer.active || !pointer.targetId) return;
          pointer.hold += dt;
          if (pointer.hold >= LONG_PRESS_TIME && !pointer.longPressHandled) {
            const node = getNodeById(pointer.targetId);
            if (node) {
              lockNode(node, 4.4);
              pointer.longPressHandled = true;
              burstText("FIELD LOCK", getNodePosition(node).x, getNodePosition(node).y - 20, "#ffc86a");
              spawnParticles(getNodePosition(node).x, getNodePosition(node).y, "#ffc86a", 12, 120);
            }
          }
        }

        function update(dt) {
          state.modeTimer += dt;
          state.ribbonsPhase += dt;
          state.flash = Math.max(0, state.flash - dt * 1.6);
          state.screenShake = Math.max(0, state.screenShake - dt * 18);
          updateParticles(dt);
          updatePointer(dt);
          state.nodes.forEach((node) => {
            node.pulse += dt * 2.2;
          });

          if (state.mode !== "running") {
            return;
          }

          state.elapsed += dt;
          state.heat = Math.max(0, state.heat - dt * 0.08);

          if (state.currentOrb) {
            updateOrb(dt, state.currentOrb, false);
          }

          updatePreview();
        }

        function drawRoundedRect(x, y, width, height, radius, fillStyle, strokeStyle = null, lineWidth = 1) {
          const r = Math.min(radius, width * 0.5, height * 0.5);
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + width, y, x + width, y + height, r);
          ctx.arcTo(x + width, y + height, x, y + height, r);
          ctx.arcTo(x, y + height, x, y, r);
          ctx.arcTo(x, y, x + width, y, r);
          ctx.closePath();
          if (fillStyle) {
            ctx.fillStyle = fillStyle;
            ctx.fill();
          }
          if (strokeStyle) {
            ctx.strokeStyle = strokeStyle;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
          }
        }

        function drawBackground() {
          const background = ctx.createLinearGradient(0, 0, 0, viewHeight);
          background.addColorStop(0, "#08121f");
          background.addColorStop(0.38, "#060a12");
          background.addColorStop(1, "#020408");
          ctx.fillStyle = background;
          ctx.fillRect(0, 0, viewWidth, viewHeight);

          const aura = ctx.createRadialGradient(viewWidth * 0.5, viewHeight * 0.38, 20, viewWidth * 0.5, viewHeight * 0.38, viewWidth * 0.5);
          aura.addColorStop(0, "rgba(92, 255, 199, 0.12)");
          aura.addColorStop(0.45, "rgba(115, 240, 255, 0.08)");
          aura.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = aura;
          ctx.fillRect(0, 0, viewWidth, viewHeight);

          const arena = getArena();
          ctx.save();
          ctx.lineCap = "round";
          for (let index = 0; index < 5; index += 1) {
            const hue = index % 2 === 0 ? "115, 240, 255" : "255, 110, 158";
            ctx.strokeStyle = `rgba(${hue}, ${0.08 + index * 0.025})`;
            ctx.lineWidth = 18 - index * 2.4;
            ctx.beginPath();
            ctx.moveTo(arena.left - 60, arena.top + arena.height * (0.12 + index * 0.14));
            ctx.bezierCurveTo(
              arena.left + arena.width * 0.32,
              arena.top + arena.height * (0.02 + Math.sin(state.ribbonsPhase + index) * 0.04 + index * 0.12),
              arena.left + arena.width * 0.68,
              arena.top + arena.height * (0.25 - Math.cos(state.ribbonsPhase * 0.9 + index) * 0.05 + index * 0.1),
              arena.right + 60,
              arena.top + arena.height * (0.1 + index * 0.14)
            );
            ctx.stroke();
          }
          ctx.restore();

          state.backgroundMotes.forEach((mote, index) => {
            const y = (mote.y + state.ribbonsPhase * mote.speed) % 1;
            const x = mote.x + Math.sin(state.ribbonsPhase * 0.4 + index) * 0.015;
            const px = x * viewWidth;
            const py = y * viewHeight;
            const color = mote.hue === 0 ? "rgba(115,240,255,0.16)" : mote.hue === 1 ? "rgba(93,255,199,0.13)" : "rgba(255,110,158,0.12)";
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(px, py, mote.size, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        function drawArenaFrame() {
          const arena = getArena();
          drawRoundedRect(
            arena.left - 18,
            arena.top - 18,
            arena.width + 36,
            arena.height + 82,
            34,
            "rgba(7, 15, 27, 0.58)",
            "rgba(115, 240, 255, 0.18)",
            2
          );

          const glass = ctx.createLinearGradient(arena.left, arena.top, arena.left, arena.bottom);
          glass.addColorStop(0, "rgba(19, 34, 58, 0.48)");
          glass.addColorStop(0.5, "rgba(6, 11, 20, 0.66)");
          glass.addColorStop(1, "rgba(3, 6, 12, 0.88)");
          drawRoundedRect(arena.left, arena.top, arena.width, arena.height + 54, 28, glass, "rgba(255,255,255,0.08)", 1);

          ctx.save();
          ctx.globalAlpha = 0.16;
          for (let index = 0; index < 22; index += 1) {
            const x = arena.left + (arena.width / 21) * index;
            ctx.strokeStyle = index % 2 === 0 ? "rgba(115,240,255,0.25)" : "rgba(255,110,158,0.16)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x, arena.top + 6);
            ctx.lineTo(x, arena.bottom + 44);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawGates() {
          const gateRadius = getGateRadius();
          GATE_POLARITIES.forEach((polarity, index) => {
            const gate = getGatePosition(index);
            const isTarget = state.targetGateIndex === index && state.mode === "running";
            const isFilled = index < state.deliveryCount;
            const color = POLARITY_COLORS[polarity];
            const halo = ctx.createRadialGradient(gate.x, gate.y, 4, gate.x, gate.y, gateRadius * 2.8);
            halo.addColorStop(0, isFilled ? "rgba(255,255,255,0.42)" : isTarget ? `${hexToRgba(color, 0.36)}` : `${hexToRgba(color, 0.18)}`);
            halo.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = halo;
            ctx.beginPath();
            ctx.arc(gate.x, gate.y, gateRadius * 2.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = hexToRgba(color, isTarget ? 0.92 : 0.48);
            ctx.lineWidth = isTarget ? 4 : 2;
            ctx.beginPath();
            ctx.arc(gate.x, gate.y, gateRadius * (isTarget ? 1.12 : 0.98), 0, Math.PI * 2);
            ctx.stroke();

            const fill = ctx.createLinearGradient(gate.x, gate.y - gateRadius, gate.x, gate.y + gateRadius);
            fill.addColorStop(0, hexToRgba(color, 0.94));
            fill.addColorStop(1, "rgba(5, 10, 18, 0.9)");
            ctx.fillStyle = fill;
            ctx.beginPath();
            ctx.arc(gate.x, gate.y, gateRadius, 0, Math.PI * 2);
            ctx.fill();

            if (isFilled) {
              ctx.fillStyle = "rgba(255,255,255,0.9)";
              ctx.beginPath();
              ctx.arc(gate.x, gate.y, gateRadius * 0.36, 0, Math.PI * 2);
              ctx.fill();
            }

            ctx.fillStyle = "#08111a";
            ctx.font = `800 ${Math.round(gateRadius * 0.88)}px Trebuchet MS`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(polarity, gate.x, gate.y + 1);
          });
        }

        function drawPreview() {
          if (!state.preview || state.mode !== "running") return;
          const targetColor = POLARITY_COLORS[GATE_POLARITIES[state.targetGateIndex]];
          const predictedColor =
            state.preview.gateIndex === state.targetGateIndex ? "rgba(93,255,199,0.92)" : "rgba(255,110,158,0.84)";
          ctx.save();
          ctx.lineWidth = 3;
          ctx.setLineDash([8, 10]);
          ctx.strokeStyle = predictedColor;
          ctx.beginPath();
          state.preview.points.forEach((point, index) => {
            if (index === 0) {
              ctx.moveTo(point.x, point.y);
            } else {
              ctx.lineTo(point.x, point.y);
            }
          });
          ctx.stroke();
          ctx.restore();

          const predictedGate = getGatePosition(state.preview.gateIndex);
          ctx.save();
          ctx.strokeStyle = predictedColor;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(predictedGate.x, predictedGate.y, getGateRadius() * 1.55, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();

          const targetGate = getGatePosition(state.targetGateIndex);
          ctx.fillStyle = targetColor;
          ctx.font = `700 ${Math.round(clamp(viewWidth * 0.012, 12, 18))}px Trebuchet MS`;
          ctx.textAlign = "left";
          ctx.fillText(
            state.preview.gateIndex === state.targetGateIndex ? "예측 경로 정합" : "예측 경로 이탈",
            targetGate.x - 42,
            targetGate.y - getGateRadius() * 2.4
          );
        }

        function drawNodes() {
          const radius = getNodeRadius();
          state.nodes.forEach((node, index) => {
            const position = getNodePosition(node);
            const color = POLARITY_COLORS[node.polarity];
            const isSelected = state.selectedNodeId === node.id;
            const locked = node.lockedUntil > state.elapsed;
            const pulse = 0.5 + Math.sin(node.pulse + index) * 0.5;
            const halo = ctx.createRadialGradient(position.x, position.y, 4, position.x, position.y, radius * (locked ? 3.1 : 2.5));
            halo.addColorStop(0, hexToRgba(color, locked ? 0.42 : 0.24));
            halo.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = halo;
            ctx.beginPath();
            ctx.arc(position.x, position.y, radius * (locked ? 3.1 : 2.5), 0, Math.PI * 2);
            ctx.fill();

            ctx.save();
            ctx.strokeStyle = hexToRgba(color, 0.24 + pulse * 0.25);
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.arc(position.x, position.y, radius * 1.38, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            const fill = ctx.createLinearGradient(position.x, position.y - radius, position.x, position.y + radius);
            fill.addColorStop(0, hexToRgba(color, 0.96));
            fill.addColorStop(1, "rgba(6, 10, 18, 0.95)");
            ctx.fillStyle = fill;
            ctx.beginPath();
            ctx.arc(position.x, position.y, radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = isSelected ? "rgba(255,255,255,0.94)" : "rgba(255,255,255,0.18)";
            ctx.lineWidth = isSelected ? 3 : 1.4;
            ctx.stroke();

            ctx.fillStyle = "#08111b";
            ctx.font = `800 ${Math.round(radius * 0.9)}px Trebuchet MS`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(node.polarity, position.x, position.y + 1);

            if (locked) {
              ctx.fillStyle = "rgba(255, 200, 106, 0.92)";
              ctx.font = `800 ${Math.round(radius * 0.78)}px Trebuchet MS`;
              ctx.fillText("⛓", position.x, position.y - radius - 14);
            }
          });
        }

        function drawOrb() {
          const orb = state.currentOrb;
          if (!orb) return;

          ctx.save();
          orb.trail.forEach((point, index) => {
            const t = index / Math.max(1, orb.trail.length - 1);
            ctx.fillStyle = hexToRgba(POLARITY_COLORS[orb.charge], t * 0.28);
            ctx.beginPath();
            ctx.arc(point.x, point.y, orb.radius * lerp(0.24, 0.88, t), 0, Math.PI * 2);
            ctx.fill();
          });

          const halo = ctx.createRadialGradient(orb.x, orb.y, 2, orb.x, orb.y, orb.radius * 4.6);
          halo.addColorStop(0, hexToRgba(POLARITY_COLORS[orb.charge], 0.6));
          halo.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = halo;
          ctx.beginPath();
          ctx.arc(orb.x, orb.y, orb.radius * 4.6, 0, Math.PI * 2);
          ctx.fill();

          const fill = ctx.createRadialGradient(orb.x - orb.radius * 0.3, orb.y - orb.radius * 0.4, 0, orb.x, orb.y, orb.radius * 1.25);
          fill.addColorStop(0, "rgba(255,255,255,0.96)");
          fill.addColorStop(0.24, hexToRgba(POLARITY_COLORS[orb.charge], 0.98));
          fill.addColorStop(1, "#09111a");
          ctx.fillStyle = fill;
          ctx.beginPath();
          ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = "rgba(255,255,255,0.82)";
          ctx.lineWidth = 2;
          ctx.stroke();

          ctx.fillStyle = "#04111d";
          ctx.font = `900 ${Math.round(orb.radius * 0.95)}px Trebuchet MS`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(orb.charge, orb.x, orb.y + 1);
          ctx.restore();
        }

        function drawHud() {
          const margin = clamp(viewWidth * 0.02, 14, 28);
          const panelWidth = clamp(viewWidth * 0.26, 210, 360);
          const panelHeight = clamp(viewHeight * 0.155, 92, 124);
          drawRoundedRect(
            margin,
            clamp(viewHeight * 0.13, 92, 116),
            panelWidth,
            panelHeight,
            24,
            "rgba(3, 10, 20, 0.76)",
            "rgba(115, 240, 255, 0.16)",
            1.5
          );

          ctx.fillStyle = "rgba(231,242,255,0.86)";
          ctx.textAlign = "left";
          ctx.textBaseline = "top";
          ctx.font = `800 ${Math.round(clamp(viewWidth * 0.015, 14, 20))}px Trebuchet MS`;
          ctx.fillText("Biomech Theater", margin + 18, clamp(viewHeight * 0.13, 92, 116) + 16);
          ctx.font = `900 ${Math.round(clamp(viewWidth * 0.023, 18, 30))}px Trebuchet MS`;
          ctx.fillStyle = "#f6fbff";
          ctx.fillText("MAGNET BRAID", margin + 18, clamp(viewHeight * 0.13, 92, 116) + 36);

          ctx.font = `700 ${Math.round(clamp(viewWidth * 0.0115, 12, 16))}px Trebuchet MS`;
          ctx.fillStyle = "rgba(210,225,241,0.88)";
          ctx.fillText(`타깃 문 ${state.deliveryCount + 1}/5`, margin + 18, clamp(viewHeight * 0.13, 92, 116) + 72);
          ctx.fillText("다른 극 문 5개를 모두 봉합", margin + 18, clamp(viewHeight * 0.13, 92, 116) + 92);

          const meterWidth = clamp(viewWidth * 0.19, 168, 260);
          const meterX = viewWidth - meterWidth - margin;
          const meterY = clamp(viewHeight * 0.13, 92, 116);
          drawRoundedRect(
            meterX,
            meterY,
            meterWidth,
            panelHeight,
            24,
            "rgba(10, 14, 24, 0.74)",
            "rgba(255,255,255,0.08)",
            1
          );
          ctx.font = `800 ${Math.round(clamp(viewWidth * 0.014, 13, 19))}px Trebuchet MS`;
          ctx.fillStyle = "#f6fbff";
          ctx.fillText("Curse Load", meterX + 18, meterY + 16);
          drawMeter(meterX + 18, meterY + 40, meterWidth - 36, 14, state.curse / CURSE_LIMIT, "#ff5b79");
          ctx.fillStyle = "rgba(221, 232, 241, 0.88)";
          ctx.fillText("Heat Spine", meterX + 18, meterY + 70);
          drawMeter(meterX + 18, meterY + 94, meterWidth - 36, 14, state.heat / HEAT_LIMIT, "#ffc86a");
        }

        function drawMeter(x, y, width, height, ratio, color) {
          drawRoundedRect(x, y, width, height, height / 2, "rgba(255,255,255,0.08)");
          drawRoundedRect(x, y, width * clamp(ratio, 0, 1), height, height / 2, color);
        }

        function drawPickups() {
          if (state.mode !== "running") return;
          const rects = getPickupRects();
          rects.forEach((rect, index) => {
            const pickup = state.pickups[index];
            if (!pickup) return;
            const used = state.usedPickupId === pickup.id;
            const fill = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y + rect.height);
            fill.addColorStop(0, hexToRgba(pickup.accent, used ? 0.16 : 0.26));
            fill.addColorStop(1, "rgba(3, 10, 18, 0.88)");
            drawRoundedRect(
              rect.x,
              rect.y,
              rect.width,
              rect.height,
              20,
              fill,
              used ? "rgba(255,255,255,0.5)" : hexToRgba(pickup.accent, 0.42),
              used ? 2 : 1.4
            );
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            ctx.fillStyle = "#f7fbff";
            ctx.font = `800 ${Math.round(clamp(viewWidth * 0.0115, 11, 16))}px Trebuchet MS`;
            ctx.fillText(pickup.name, rect.x + 14, rect.y + 12);
            ctx.font = `700 ${Math.round(clamp(viewWidth * 0.0105, 10, 14))}px Trebuchet MS`;
            ctx.fillStyle = "rgba(219, 232, 244, 0.92)";
            ctx.fillText(pickup.effectLabel, rect.x + 14, rect.y + 34);
            ctx.fillStyle = hexToRgba(pickup.accent, 0.94);
            ctx.fillText(pickup.tag, rect.x + 14, rect.y + 54);

            const badgeWidth = clamp(rect.width * 0.22, 38, 54);
            drawRoundedRect(
              rect.x + rect.width - badgeWidth - 12,
              rect.y + rect.height - 30,
              badgeWidth,
              20,
              10,
              "rgba(255, 79, 109, 0.18)",
              "rgba(255, 79, 109, 0.46)",
              1
            );
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = `800 ${Math.round(clamp(viewWidth * 0.0105, 10, 14))}px Trebuchet MS`;
            ctx.fillStyle = "#ff8ca6";
            ctx.fillText(pickup.penaltyLabel, rect.x + rect.width - badgeWidth / 2 - 12, rect.y + rect.height - 20);
          });
        }

        function drawSelectedNodeCard() {
          const node = getNodeById(state.selectedNodeId);
          if (!node || state.mode !== "running") return;
          const width = clamp(viewWidth * 0.23, 168, 270);
          const height = clamp(viewHeight * 0.11, 72, 92);
          const x = clamp(viewWidth * 0.04, 14, 30);
          const y = viewHeight - height - clamp(viewHeight * 0.03, 18, 24);
          drawRoundedRect(x, y, width, height, 20, "rgba(4, 10, 18, 0.78)", "rgba(255,255,255,0.1)", 1);
          ctx.fillStyle = "#f5fbff";
          ctx.textAlign = "left";
          ctx.textBaseline = "top";
          ctx.font = `800 ${Math.round(clamp(viewWidth * 0.012, 12, 17))}px Trebuchet MS`;
          ctx.fillText(`선택 노드 ${node.id.replace("braid-", "#")}`, x + 14, y + 12);
          ctx.font = `900 ${Math.round(clamp(viewWidth * 0.018, 16, 24))}px Trebuchet MS`;
          ctx.fillStyle = POLARITY_COLORS[node.polarity];
          ctx.fillText(`${node.polarity} 극`, x + 14, y + 36);
          ctx.font = `700 ${Math.round(clamp(viewWidth * 0.0105, 10, 14))}px Trebuchet MS`;
          ctx.fillStyle = "rgba(219,232,244,0.9)";
          ctx.fillText("탭 전환 / 길게 고정 / 드래그 재선택", x + 14, y + 60);
        }

        function drawParticles() {
          state.particles.forEach((particle) => {
            const alpha = 1 - particle.life / particle.ttl;
            ctx.fillStyle = hexToRgba(particle.color, alpha);
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size * alpha, 0, Math.PI * 2);
            ctx.fill();
          });

          state.popups.forEach((popup) => {
            const alpha = 1 - popup.life / popup.ttl;
            ctx.fillStyle = hexToRgba(popup.color, alpha);
            ctx.font = `900 ${Math.round(clamp(viewWidth * 0.015, 14, 22))}px Trebuchet MS`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(popup.text, popup.x, popup.y);
          });
        }

        function drawOverlayCard(title, lines, accent, hint) {
          const width = clamp(viewWidth * 0.66, 300, 760);
          const height = clamp(viewHeight * 0.46, 246, 360);
          const x = viewWidth / 2 - width / 2;
          const y = viewHeight / 2 - height / 2;
          const fill = ctx.createLinearGradient(x, y, x + width, y + height);
          fill.addColorStop(0, "rgba(4, 10, 19, 0.9)");
          fill.addColorStop(1, "rgba(10, 17, 29, 0.95)");
          drawRoundedRect(x, y, width, height, 34, fill, hexToRgba(accent, 0.46), 2);

          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillStyle = accent;
          ctx.font = `900 ${Math.round(clamp(viewWidth * 0.026, 22, 42))}px Trebuchet MS`;
          ctx.fillText(title, viewWidth / 2, y + 26);
          ctx.fillStyle = "#f6fbff";
          ctx.font = `800 ${Math.round(clamp(viewWidth * 0.013, 13, 18))}px Trebuchet MS`;
          lines.forEach((line, index) => {
            ctx.fillText(line, viewWidth / 2, y + 82 + index * 28);
          });
          ctx.fillStyle = "rgba(209, 224, 237, 0.92)";
          ctx.font = `700 ${Math.round(clamp(viewWidth * 0.011, 11, 15))}px Trebuchet MS`;
          ctx.fillText(hint, viewWidth / 2, y + height - 40);
        }

        function drawMenuOverlay() {
          drawOverlayCard(
            "BIOMECH THEATER",
            [
              "극성 노드를 번갈아 엮어 타깃 문으로 구슬을 인도하세요.",
              "탭으로 전환, 길게 눌러 고정, 픽업은 페널티 아이콘부터 확인.",
              "클리어: 다른 극 문 5개 봉합",
              "실패: 저주 한계 또는 연속 과열",
            ],
            "#73f0ff",
            "터치 또는 클릭으로 시작"
          );
        }

        function drawFailedOverlay() {
          drawOverlayCard(
            "SYSTEM CURSED",
            [
              `인도 성공 ${state.deliveryCount}/5`,
              `저주 ${state.curse.toFixed(0)} / ${CURSE_LIMIT}, 열 ${state.heat.toFixed(1)} / ${HEAT_LIMIT}`,
              "같은 극 연속 충돌을 끊고, 보정 픽업은 저주 한도와 함께 계산하세요.",
            ],
            "#ff6e9e",
            "터치 또는 Enter로 재시작"
          );
        }

        function drawClearedOverlay() {
          drawOverlayCard(
            "CURTAIN SYNC",
            [
              `총 ${state.lastRunTime.toFixed(1)}초`,
              `저주 ${state.curse.toFixed(0)} / ${CURSE_LIMIT}로 극문 5개 동기화 완료`,
              "바이오메크 극장의 자력 브레이드가 완전히 봉합되었습니다.",
            ],
            "#5dffc7",
            "터치 또는 Enter로 다시 플레이"
          );
        }

        function hexToRgba(hex, alpha) {
          const normalized = hex.replace("#", "");
          const value = normalized.length === 3
            ? normalized
                .split("")
                .map((char) => char + char)
                .join("")
            : normalized;
          const r = Number.parseInt(value.slice(0, 2), 16);
          const g = Number.parseInt(value.slice(2, 4), 16);
          const b = Number.parseInt(value.slice(4, 6), 16);
          return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function draw() {
          ctx.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);
          ctx.clearRect(0, 0, viewWidth, viewHeight);
          drawBackground();

          const shakeX = state.screenShake > 0 ? (Math.random() - 0.5) * state.screenShake : 0;
          const shakeY = state.screenShake > 0 ? (Math.random() - 0.5) * state.screenShake * 0.5 : 0;
          ctx.save();
          ctx.translate(shakeX, shakeY);
          drawArenaFrame();
          drawGates();
          drawPreview();
          drawNodes();
          drawOrb();
          ctx.restore();

          drawHud();
          drawPickups();
          drawSelectedNodeCard();
          drawParticles();

          if (state.flash > 0) {
            ctx.fillStyle = `rgba(255, 92, 126, ${state.flash * 0.25})`;
            ctx.fillRect(0, 0, viewWidth, viewHeight);
          }

          if (state.mode === "menu") {
            drawMenuOverlay();
          } else if (state.mode === "failed") {
            drawFailedOverlay();
          } else if (state.mode === "cleared") {
            drawClearedOverlay();
          }
        }

        function pickNodeAt(x, y) {
          const radius = getNodeRadius() * 1.3;
          return state.nodes.find((node) => {
            const position = getNodePosition(node);
            return Math.hypot(position.x - x, position.y - y) <= radius;
          }) || null;
        }

        function pickPickupAt(x, y) {
          const rects = getPickupRects();
          for (let index = 0; index < rects.length; index += 1) {
            const rect = rects[index];
            if (
              x >= rect.x &&
              x <= rect.x + rect.width &&
              y >= rect.y &&
              y <= rect.y + rect.height
            ) {
              return state.pickups[index] || null;
            }
          }
          return null;
        }

        function canvasPoint(event) {
          const rect = canvas.getBoundingClientRect();
          return {
            x: ((event.clientX - rect.left) / rect.width) * viewWidth,
            y: ((event.clientY - rect.top) / rect.height) * viewHeight,
          };
        }

        function onPointerDown(point) {
          pointer.x = point.x;
          pointer.y = point.y;

          if (state.mode === "menu") {
            startStage();
            return;
          }

          if (state.mode === "failed" || state.mode === "cleared") {
            startStage();
            return;
          }

          const pickup = pickPickupAt(point.x, point.y);
          if (pickup) {
            applyPickup(pickup);
            return;
          }

          const node = pickNodeAt(point.x, point.y);
          if (!node) {
            return;
          }

          pointer.active = true;
          pointer.hold = 0;
          pointer.targetId = node.id;
          pointer.dragged = false;
          pointer.longPressHandled = false;
          pointer.wasSelected = state.selectedNodeId === node.id;
          state.selectedNodeId = node.id;
          state.previewDirty = true;
        }

        function onPointerMove(point) {
          pointer.x = point.x;
          pointer.y = point.y;
          if (!pointer.active) return;
          const node = pickNodeAt(point.x, point.y);
          if (node && node.id !== pointer.targetId) {
            pointer.targetId = node.id;
            pointer.dragged = true;
            state.selectedNodeId = node.id;
            state.previewDirty = true;
          }
        }

        function onPointerUp() {
          if (!pointer.active) {
            return;
          }
          const node = getNodeById(pointer.targetId);
          if (node && !pointer.dragged && !pointer.longPressHandled && pointer.wasSelected) {
            node.polarity = oppositePolarity(node.polarity);
            state.previewDirty = true;
            burstText(`${node.polarity} 극 전환`, getNodePosition(node).x, getNodePosition(node).y - 18, POLARITY_COLORS[node.polarity]);
          } else if (node) {
            state.selectedNodeId = node.id;
            state.previewDirty = true;
          }
          pointer.active = false;
          pointer.targetId = null;
        }

        function resizeCanvas() {
          const nextWidth = Math.max(320, window.innerWidth || document.documentElement.clientWidth || 1280);
          const nextHeight = Math.max(320, window.innerHeight || document.documentElement.clientHeight || 720);
          viewWidth = nextWidth;
          viewHeight = nextHeight;
          deviceScale = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = Math.round(viewWidth * deviceScale);
          canvas.height = Math.round(viewHeight * deviceScale);
          canvas.style.width = `${viewWidth}px`;
          canvas.style.height = `${viewHeight}px`;
          ctx.setTransform(deviceScale, 0, 0, deviceScale, 0, 0);
          ctx.imageSmoothingEnabled = true;
          state.previewDirty = true;
          draw();
        }

        function tick(timestamp) {
          const current = timestamp / 1000;
          if (!lastTimestamp) {
            lastTimestamp = current;
          }
          const dt = Math.min(1 / 18, current - lastTimestamp || 1 / 60);
          lastTimestamp = current;
          update(dt);
          draw();
          animationFrame = window.requestAnimationFrame(tick);
        }

        function handleKeydown(event) {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            if (state.mode === "menu" || state.mode === "failed" || state.mode === "cleared") {
              startStage();
            } else if (state.mode === "running") {
              const selected = getNodeById(state.selectedNodeId);
              if (selected) {
                selected.polarity = oppositePolarity(selected.polarity);
                state.previewDirty = true;
              }
            }
          }
        }

        canvas.addEventListener("pointerdown", (event) => {
          event.preventDefault();
          canvas.focus({ preventScroll: true });
          onPointerDown(canvasPoint(event));
          canvas.setPointerCapture?.(event.pointerId);
        });
        canvas.addEventListener("pointermove", (event) => {
          event.preventDefault();
          onPointerMove(canvasPoint(event));
        });
        canvas.addEventListener("pointerup", (event) => {
          event.preventDefault();
          onPointerUp();
          canvas.releasePointerCapture?.(event.pointerId);
        });
        canvas.addEventListener("pointercancel", (event) => {
          event.preventDefault();
          onPointerUp();
          canvas.releasePointerCapture?.(event.pointerId);
        });
        window.addEventListener("keydown", handleKeydown);
        window.addEventListener("resize", resizeCanvas);
        mediaQuery.addEventListener?.("change", () => draw());

        window.relayStageMeta = {
          id: META.id,
          title: META.title,
          creator: META.creator,
          genre: META.genre,
          clearCondition: META.clearCondition,
          failCondition: META.failCondition,
          controls: META.controls,
          description: META.description,
        };
        window.relayStageResult = {
          status: "running",
          deliveredCount: 0,
          curse: 0,
        };
        window.relayStageDebug = {
          forceClear,
          forceFail,
        };
        window.render_game_to_text = () =>
          JSON.stringify({
            mode: state.mode,
            coordSystem: "origin top-left, x right, y down",
            targetGateIndex: state.targetGateIndex,
            deliveredCount: state.deliveryCount,
            curse: Number(state.curse.toFixed(2)),
            heat: Number(state.heat.toFixed(2)),
            samePoleChain: state.samePoleChain,
            selectedNodeId: state.selectedNodeId,
            currentOrb: state.currentOrb
              ? {
                  x: Number(state.currentOrb.x.toFixed(1)),
                  y: Number(state.currentOrb.y.toFixed(1)),
                  charge: state.currentOrb.charge,
                  vx: Number(state.currentOrb.vx.toFixed(1)),
                  vy: Number(state.currentOrb.vy.toFixed(1)),
                }
              : null,
            nodes: state.nodes.map((node) => ({
              id: node.id,
              polarity: node.polarity,
              locked: node.lockedUntil > state.elapsed,
            })),
          });
        window.advanceTime = (ms) => {
          const steps = Math.max(1, Math.round(ms / (1000 / 60)));
          for (let index = 0; index < steps; index += 1) {
            update(1 / 60);
          }
          draw();
        };

        resizeCanvas();
        draw();
        reportReadyToHost();
        animationFrame = window.requestAnimationFrame(tick);
      })();
    </script>
  </body>
</html>
