<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__TITLE__</title>
  </head>
  <body>
    <a class="skip-link" href="#game">게임 캔버스로 건너뛰기</a>
    <p id="stage-instructions" class="sr-only">
      __TITLE__. 캔버스를 터치하거나 Enter로 시작하세요. 기본 조작은 __CONTROLS__ 이며,
      모바일에서는 화면 터치나 버튼 조작도 함께 제공해야 합니다. 메뉴, 실행 중 HUD,
      실패/클리어 화면은 390픽셀 폭 모바일에서도 가로로 넘치지 않게 유지해야 합니다.
    </p>
    <canvas
      id="game"
      width="960"
      height="540"
      aria-label="__TITLE__"
      aria-describedby="stage-instructions"
      tabindex="0"
    ></canvas>

    <script src="../relay-runtime.js"></script>
    <script src="../stage-kit.js"></script>
    <script>
      const TITLE = "__TITLE__";
      const DESCRIPTION = "__DESCRIPTION__";
      const CLEAR_CONDITION = "__CLEAR_CONDITION__";
      const FAIL_CONDITION = "__FAIL_CONDITION__";
      const CONTROLS = "__CONTROLS__";

      const stage = window.StageKit.create({
        id: "__STAGE_ID__",
        title: TITLE,
        creator: __CREATOR_LITERAL__,
        genre: "__GENRE__",
        clearCondition: CLEAR_CONDITION,
        failCondition: FAIL_CONDITION,
        controls: CONTROLS,
        note: DESCRIPTION,
        canvas: "#game",
        controlsLayout: __CONTROLS_LAYOUT__,
        initialState() {
          return {
            mode: "menu",
            elapsed: 0,
            lastRunTime: 0,
            note: DESCRIPTION,
          };
        },
        onInit(ctx) {
          ctx.installKeyboard({
            Enter: "start",
          });

          // StageKit installs touchstart / pointerdown handlers here for mobile start.
          ctx.installTouchStart((runtime) => {
            if (runtime.state.mode === "menu") {
              runtime.start();
            }
          });
        },
        onStart(ctx) {
          ctx.state.elapsed = 0;
          ctx.state.note = DESCRIPTION;
        },
        update(dt, ctx) {
          if (ctx.state.mode === "menu") {
            if (ctx.input.start) {
              ctx.input.start = false;
              ctx.start();
            }
            return;
          }

          if (ctx.state.mode !== "running") {
            return;
          }

          ctx.state.elapsed += dt;
        },
        render(ctx) {
          const { ctx2d, view, state } = ctx;
          ctx2d.clearRect(0, 0, view.width, view.height);

          if (state.mode === "menu") {
            ctx.renderCard(
              TITLE,
              [
                `조작: ${CONTROLS}`,
                `클리어: ${CLEAR_CONDITION}`,
                `실패: ${FAIL_CONDITION}`,
                "터치 또는 Enter로 시작",
              ],
              "#2563eb"
            );
            return;
          }

          if (state.mode === "running") {
            ctx2d.fillStyle = "#0f172a";
            ctx2d.fillRect(0, 0, view.width, view.height);
            ctx2d.fillStyle = "#f8fafc";
            ctx2d.font = "700 44px Trebuchet MS";
            ctx2d.textAlign = "center";
            ctx2d.fillText(TITLE, view.width / 2, 156);
            ctx2d.font = "600 24px Trebuchet MS";
            ctx2d.fillText("여기서 실제 게임 규칙과 렌더링을 구현하세요.", view.width / 2, 228);
            ctx2d.fillText(`경과 시간 ${state.elapsed.toFixed(1)}초`, view.width / 2, 284);
            ctx2d.textAlign = "left";
            return;
          }

          if (state.mode === "failed") {
            ctx.renderCard("실패!", [FAIL_CONDITION, `생존 시간: ${state.lastRunTime.toFixed(1)}초`], "#b91c1c");
            return;
          }

          ctx.renderCard("클리어!", [CLEAR_CONDITION, `클리어 시간: ${state.lastRunTime.toFixed(1)}초`], "#15803d");
        },
        serialize(ctx) {
          return {
            coordinate_system: "canvas 960x540",
            mode: ctx.state.mode,
            elapsed: Math.round(ctx.state.elapsed * 10) / 10,
          };
        },
      });
    </script>
  </body>
</html>
